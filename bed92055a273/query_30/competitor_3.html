</span><a class="image" data-dcnode-id="6912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AA_coloured_voting_box.svg"><img alt="A coloured voting box.svg" class="noviewer" data-dcnode-id="6913" data-file-height="160" data-file-width="160" decoding="async" height="16" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/0/01/A_coloured_voting_box.svg/16px-A_coloured_voting_box.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/0/01/A_coloured_voting_box.svg/24px-A_coloured_voting_box.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/0/01/A_coloured_voting_box.svg/32px-A_coloured_voting_box.svg.png 2x" width="16"></a><span data-dcnode-id="6911" instrument_node="">&nbsp;</span><a data-dcnode-id="6909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Portal%3APolitics" title="Portal:Politics"><span data-dcnode-id="6910" instrument_node="">Politics portal</span></a></td></tr><tr data-dcnode-id="6889"><td class="sidebar-navbar" data-dcnode-id="6890"><div class="navbar plainlinks hlist navbar-mini" data-dcnode-id="6891"><ul data-dcnode-id="6892"><li class="nv-view" data-dcnode-id="6901"><a data-dcnode-id="6902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template%3AVoting" title="Template:Voting"><abbr data-dcnode-id="6903" title="View this template"><span data-dcnode-id="6904" instrument_node="">v</span></abbr></a></li><li class="nv-talk" data-dcnode-id="6897"><a data-dcnode-id="6898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template_talk%3AVoting" title="Template talk:Voting"><abbr data-dcnode-id="6899" title="Discuss this template"><span data-dcnode-id="6900" instrument_node="">t</span></abbr></a></li><li class="nv-edit" data-dcnode-id="6893"><a class="external text" data-dcnode-id="6894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTemplate%3AVoting%26action%3Dedit"><abbr data-dcnode-id="6895" title="Edit this template"><span data-dcnode-id="6896" instrument_node="">e</span></abbr></a></li></ul></div></td></tr></tbody></table><span data-dcnode-id="6886" instrument_node="">
</span><p data-dcnode-id="6866"><span data-dcnode-id="6885" instrument_node="">In </span><a data-dcnode-id="6883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_science" title="Political science"><span data-dcnode-id="6884" instrument_node="">political science</span></a><span data-dcnode-id="6882" instrument_node="">, </span><b data-dcnode-id="6880"><span data-dcnode-id="6881" instrument_node="">voter turnout</span></b><span data-dcnode-id="6879" instrument_node=""> is the percentage of registered </span><a data-dcnode-id="6877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting" title="Voting"><span data-dcnode-id="6878" instrument_node="">voters</span></a><span data-dcnode-id="6876" instrument_node=""> who participated in an </span><a data-dcnode-id="6874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Election" title="Election"><span data-dcnode-id="6875" instrument_node="">election</span></a><span data-dcnode-id="6873" instrument_node=""> (often defined as those who cast a </span><a data-dcnode-id="6871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ballot" title="Ballot"><span data-dcnode-id="6872" instrument_node="">ballot</span></a><span data-dcnode-id="6870" instrument_node="">). </span><a data-dcnode-id="6868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suffrage" title="Suffrage"><span data-dcnode-id="6869" instrument_node="">Registered</span></a><span data-dcnode-id="6867" instrument_node=""> varies by country, and the registered voters should not be confused with the total adult population.
</span></p><p data-dcnode-id="6844"><span data-dcnode-id="6865" instrument_node="">After increasing for many decades, there has been a trend of decreasing voter turnout in most established </span><a data-dcnode-id="6863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democracy" title="Democracy"><span data-dcnode-id="6864" instrument_node="">democracies</span></a><span data-dcnode-id="6862" instrument_node=""> since the 1980s.</span><sup class="reference" data-dcnode-id="6859" id="cite_ref-Niemi_and_Weisberg_p._31_1-0"><a data-dcnode-id="6860" href="#cite_note-Niemi_and_Weisberg_p._31-1"><span data-dcnode-id="6861" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="6856" id="cite_ref-2"><a data-dcnode-id="6857" href="#cite_note-2"><span data-dcnode-id="6858" instrument_node="">[2]</span></a></sup><span data-dcnode-id="6855" instrument_node=""> In general, low turnout is attributed to disillusionment, </span><a data-dcnode-id="6853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apathy" title="Apathy"><span data-dcnode-id="6854" instrument_node="">indifference</span></a><span data-dcnode-id="6852" instrument_node="">, or a sense of futility (the perception that one's vote won't make any difference). According to Stanford University political scientists Adam Bonica and </span><a data-dcnode-id="6850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_McFaul" title="Michael McFaul"><span data-dcnode-id="6851" instrument_node="">Michael McFaul</span></a><span data-dcnode-id="6849" instrument_node="">, there is a consensus among political scientists that "democracies perform better when more people vote."</span><sup class="reference" data-dcnode-id="6846" id="cite_ref-3"><a data-dcnode-id="6847" href="#cite_note-3"><span data-dcnode-id="6848" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6845" instrument_node="">
</span></p><p data-dcnode-id="6827"><span data-dcnode-id="6843" instrument_node="">Low turnout is usually considered to be undesirable. As a result, there have been many efforts to </span><a data-dcnode-id="6841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Get_out_the_vote" title="Get out the vote"><span data-dcnode-id="6842" instrument_node="">increase voter turnout</span></a><span data-dcnode-id="6840" instrument_node=""> and encourage </span><a data-dcnode-id="6838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_participation_%28decision_making%29" title="Public participation (decision making)"><span data-dcnode-id="6839" instrument_node="">participation</span></a><span data-dcnode-id="6837" instrument_node=""> in the political process. In spite of significant study into the issue, scholars are divided on the reasons for the decline. Its cause has been attributed to a wide array of </span><a data-dcnode-id="6835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economics" title="Economics"><span data-dcnode-id="6836" instrument_node="">economic</span></a><span data-dcnode-id="6834" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Demographics" title="Demographics"><span data-dcnode-id="6833" instrument_node="">demographic</span></a><span data-dcnode-id="6831" instrument_node="">, cultural, </span><a data-dcnode-id="6829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Technology" title="Technology"><span data-dcnode-id="6830" instrument_node="">technological</span></a><span data-dcnode-id="6828" instrument_node="">, and institutional factors.
</span></p><p data-dcnode-id="6811"><span data-dcnode-id="6826" instrument_node="">Different countries have very different voter turnout rates. For example, turnout in the </span><a data-dcnode-id="6824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2012_United_States_presidential_election" title="2012 United States presidential election"><span data-dcnode-id="6825" instrument_node="">United States 2012 presidential election</span></a><span data-dcnode-id="6823" instrument_node=""> was about 56%,</span><sup class="reference" data-dcnode-id="6820" id="cite_ref-4"><a data-dcnode-id="6821" href="#cite_note-4"><span data-dcnode-id="6822" instrument_node="">[4]</span></a></sup><span data-dcnode-id="6819" instrument_node=""> while in </span><a data-dcnode-id="6817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malta" title="Malta"><span data-dcnode-id="6818" instrument_node="">Malta</span></a><span data-dcnode-id="6816" instrument_node=""> participation reaches about 95%.</span><sup class="reference" data-dcnode-id="6813" id="cite_ref-5"><a data-dcnode-id="6814" href="#cite_note-5"><span data-dcnode-id="6815" instrument_node="">[5]</span></a></sup><span data-dcnode-id="6812" instrument_node="">
</span></p><span data-dcnode-id="6810" instrument_node="">

</span><div class="hatnote navigation-not-searchable" data-dcnode-id="6481" role="note"><span data-dcnode-id="6484" instrument_node="">Main article: </span><a data-dcnode-id="6482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decision_theory" title="Decision theory"><span data-dcnode-id="6483" instrument_node="">Decision theory</span></a></div><span data-dcnode-id="6480" instrument_node="">
</span><p data-dcnode-id="6457"><span data-dcnode-id="6479" instrument_node="">The chance of any one vote determining the outcome is low. Some studies show that a single vote in a voting scheme such as the </span><a class="mw-redirect" data-dcnode-id="6477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_College_%28United_States%29" title="Electoral College (United States)"><span data-dcnode-id="6478" instrument_node="">Electoral College</span></a><span data-dcnode-id="6476" instrument_node=""> in the United States has an even lower chance of determining the outcome.</span><sup class="reference" data-dcnode-id="6473" id="cite_ref-6"><a data-dcnode-id="6474" href="#cite_note-6"><span data-dcnode-id="6475" instrument_node="">[6]</span></a></sup><span data-dcnode-id="6472" instrument_node=""> Other studies claim that the Electoral College actually increases voting power.</span><sup class="reference" data-dcnode-id="6469" id="cite_ref-7"><a data-dcnode-id="6470" href="#cite_note-7"><span data-dcnode-id="6471" instrument_node="">[7]</span></a></sup><span data-dcnode-id="6468" instrument_node="">  Studies using </span><a data-dcnode-id="6466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Game_theory" title="Game theory"><span data-dcnode-id="6467" instrument_node="">game theory</span></a><span data-dcnode-id="6465" instrument_node="">, which takes into account the ability of voters to </span><a data-dcnode-id="6463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interaction" title="Interaction"><span data-dcnode-id="6464" instrument_node="">interact</span></a><span data-dcnode-id="6462" instrument_node="">, have also found that the expected turnout for any large election should be zero.</span><sup class="reference" data-dcnode-id="6459" id="cite_ref-Kanazawa_8-0"><a data-dcnode-id="6460" href="#cite_note-Kanazawa-8"><span data-dcnode-id="6461" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6458" instrument_node="">
</span></p><p data-dcnode-id="6451"><span data-dcnode-id="6456" instrument_node="">The basic formula for determining whether someone will vote, on the questionable assumption that people act completely rationally, is</span><sup class="reference" data-dcnode-id="6453" id="cite_ref-9"><a data-dcnode-id="6454" href="#cite_note-9"><span data-dcnode-id="6455" instrument_node="">[9]</span></a></sup><span data-dcnode-id="6452" instrument_node="">
</span></p><span data-dcnode-id="6450" instrument_node="">

</span><ul data-dcnode-id="6374"><li data-dcnode-id="6399"><i data-dcnode-id="6404"><span data-dcnode-id="6405" instrument_node="">P</span></i><span data-dcnode-id="6403" instrument_node=""> is the </span><a data-dcnode-id="6401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Probability" title="Probability"><span data-dcnode-id="6402" instrument_node="">probability</span></a><span data-dcnode-id="6400" instrument_node=""> that an individual's vote will affect the outcome of an election,</span></li><span data-dcnode-id="6398" instrument_node="">
</span><li data-dcnode-id="6391"><i data-dcnode-id="6396"><span data-dcnode-id="6397" instrument_node="">B</span></i><span data-dcnode-id="6395" instrument_node=""> is the perceived benefit that would be received if that person's favored </span><a data-dcnode-id="6393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_party" title="Political party"><span data-dcnode-id="6394" instrument_node="">political party</span></a><span data-dcnode-id="6392" instrument_node=""> or candidate were elected,</span></li><span data-dcnode-id="6390" instrument_node="">
</span><li data-dcnode-id="6380"><i data-dcnode-id="6388"><span data-dcnode-id="6389" instrument_node="">D</span></i><span data-dcnode-id="6387" instrument_node=""> originally stood for democracy or </span><a class="mw-redirect" data-dcnode-id="6385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civic_duty" title="Civic duty"><span data-dcnode-id="6386" instrument_node="">civic duty</span></a><span data-dcnode-id="6384" instrument_node="">, but today represents any social or personal </span><a data-dcnode-id="6382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Utility" title="Utility"><span data-dcnode-id="6383" instrument_node="">gratification</span></a><span data-dcnode-id="6381" instrument_node=""> an individual gets from voting, and</span></li><span data-dcnode-id="6379" instrument_node="">
</span><li data-dcnode-id="6375"><i data-dcnode-id="6377"><span data-dcnode-id="6378" instrument_node="">C</span></i><span data-dcnode-id="6376" instrument_node=""> is the time, effort, and financial cost involved in voting.</span></li></ul><span data-dcnode-id="6373" instrument_node="">
</span><p data-dcnode-id="6349"><span data-dcnode-id="6372" instrument_node="">Since </span><i data-dcnode-id="6370"><span data-dcnode-id="6371" instrument_node="">P</span></i><span data-dcnode-id="6369" instrument_node=""> is virtually zero in most elections, </span><i data-dcnode-id="6367"><span data-dcnode-id="6368" instrument_node="">PB</span></i><span data-dcnode-id="6366" instrument_node=""> may be also near zero, and </span><i data-dcnode-id="6364"><span data-dcnode-id="6365" instrument_node="">D</span></i><span data-dcnode-id="6363" instrument_node=""> is thus the most important element in motivating people to vote. For a person to vote, these factors must outweigh </span><i data-dcnode-id="6361"><span data-dcnode-id="6362" instrument_node="">C</span></i><span data-dcnode-id="6360" instrument_node="">. Experimental political science has found that even when </span><i data-dcnode-id="6358"><span data-dcnode-id="6359" instrument_node="">P</span></i><span data-dcnode-id="6357" instrument_node=""> is likely greater than zero, this term has no effect on voter turnout. Enos and Fowler (2014) conducted a field experiment that exploits the rare opportunity of a tied election for major political office. Informing citizens that the special election to break the tie will be close (meaning a high </span><i data-dcnode-id="6355"><span data-dcnode-id="6356" instrument_node="">P</span></i><span data-dcnode-id="6354" instrument_node=""> term)  has little mobilizing effect on voter turnout.</span><sup class="reference" data-dcnode-id="6351" id="cite_ref-10"><a data-dcnode-id="6352" href="#cite_note-10"><span data-dcnode-id="6353" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6350" instrument_node="">
</span></p><p data-dcnode-id="6332"><span data-dcnode-id="6348" instrument_node="">Riker and Ordeshook developed the modern understanding of </span><i data-dcnode-id="6346"><span data-dcnode-id="6347" instrument_node="">D</span></i><span data-dcnode-id="6345" instrument_node="">. They listed five major forms of gratification that people receive for voting: complying with the social obligation to vote; affirming one's allegiance to the political system; affirming a partisan preference (also known as expressive voting, or voting for a candidate to express support, not to achieve any outcome); affirming one's importance to the political system; and, for those who find politics interesting and entertaining, researching and making a decision.</span><sup class="reference" data-dcnode-id="6342" id="cite_ref-11"><a data-dcnode-id="6343" href="#cite_note-11"><span data-dcnode-id="6344" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6341" instrument_node=""> Other political scientists have since added other motivators and questioned some of Riker and Ordeshook's assumptions.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6334" style="white-space:nowrap;"><span data-dcnode-id="6340" instrument_node="">[</span><i data-dcnode-id="6336"><a data-dcnode-id="6337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6338" title="This claim needs references to reliable sources. (August 2009)"><span data-dcnode-id="6339" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6335" instrument_node="">]</span></sup><span data-dcnode-id="6333" instrument_node=""> All of these concepts are inherently imprecise, making it difficult to discover exactly why people choose to vote.
</span></p><p data-dcnode-id="6300"><span data-dcnode-id="6331" instrument_node="">Recently, several scholars have considered the possibility that B includes not only a personal interest in the outcome, but also a concern for the welfare of others in the society (or at least other members of one's favorite group or party).</span><sup class="reference" data-dcnode-id="6328" id="cite_ref-12"><a data-dcnode-id="6329" href="#cite_note-12"><span data-dcnode-id="6330" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="6325" id="cite_ref-13"><a data-dcnode-id="6326" href="#cite_note-13"><span data-dcnode-id="6327" instrument_node="">[13]</span></a></sup><span data-dcnode-id="6324" instrument_node=""> In particular, experiments in which subject </span><a data-dcnode-id="6322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Altruism" title="Altruism"><span data-dcnode-id="6323" instrument_node="">altruism</span></a><span data-dcnode-id="6321" instrument_node=""> was measured using a </span><a data-dcnode-id="6319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dictator_game" title="Dictator game"><span data-dcnode-id="6320" instrument_node="">dictator game</span></a><span data-dcnode-id="6318" instrument_node=""> showed that concern for the well-being of others is a major factor in predicting turnout</span><sup class="reference" data-dcnode-id="6315" id="cite_ref-14"><a data-dcnode-id="6316" href="#cite_note-14"><span data-dcnode-id="6317" instrument_node="">[14]</span></a></sup><span data-dcnode-id="6314" instrument_node=""> and political participation.</span><sup class="reference" data-dcnode-id="6311" id="cite_ref-15"><a data-dcnode-id="6312" href="#cite_note-15"><span data-dcnode-id="6313" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="6308" id="cite_ref-16"><a data-dcnode-id="6309" href="#cite_note-16"><span data-dcnode-id="6310" instrument_node="">[16]</span></a></sup><span data-dcnode-id="6307" instrument_node="">  Note that this motivation is distinct from D, because voters must think others benefit from the </span><i data-dcnode-id="6305"><span data-dcnode-id="6306" instrument_node="">outcome</span></i><span data-dcnode-id="6304" instrument_node=""> of the election, not their </span><i data-dcnode-id="6302"><span data-dcnode-id="6303" instrument_node="">act</span></i><span data-dcnode-id="6301" instrument_node=""> of voting in and of itself.
</span></p><span data-dcnode-id="6299" instrument_node="">
</span><h3 data-dcnode-id="6289"><span class="mw-headline" data-dcnode-id="6297" id="Reasons_for_not_voting"><span data-dcnode-id="6298" instrument_node="">Reasons for not voting</span></span><span class="mw-editsection" data-dcnode-id="6290"><span class="mw-editsection-bracket" data-dcnode-id="6295"><span data-dcnode-id="6296" instrument_node="">[</span></span><a data-dcnode-id="6293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D2" title="Edit section: Reasons for not voting"><span data-dcnode-id="6294" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6291"><span data-dcnode-id="6292" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6288" instrument_node="">
</span><link data-dcnode-id="6287" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6283" role="note"><span data-dcnode-id="6286" instrument_node="">Main article: </span><a data-dcnode-id="6284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abstention" title="Abstention"><span data-dcnode-id="6285" instrument_node="">Abstention</span></a></div><span data-dcnode-id="6282" instrument_node="">
</span><p data-dcnode-id="6276"><span data-dcnode-id="6281" instrument_node="">There are philosophical, moral, and practical reasons that some people cite for not voting in electoral politics. Researchers have also identified several strategic motivations for abstention in which a voter is better off by not voting. The most straightforward example of this is known as the No-Show Paradox, which can occur in both large and small electorates.</span><sup class="reference" data-dcnode-id="6278" id="cite_ref-17"><a data-dcnode-id="6279" href="#cite_note-17"><span data-dcnode-id="6280" instrument_node="">[17]</span></a></sup><span data-dcnode-id="6277" instrument_node="">
</span></p><span data-dcnode-id="6275" instrument_node="">
</span><h2 data-dcnode-id="6265"><span class="mw-headline" data-dcnode-id="6273" id="Significance"><span data-dcnode-id="6274" instrument_node="">Significance</span></span><span class="mw-editsection" data-dcnode-id="6266"><span class="mw-editsection-bracket" data-dcnode-id="6271"><span data-dcnode-id="6272" instrument_node="">[</span></span><a data-dcnode-id="6269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D3" title="Edit section: Significance"><span data-dcnode-id="6270" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6267"><span data-dcnode-id="6268" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6264" instrument_node="">
</span><p data-dcnode-id="6219"><span data-dcnode-id="6263" instrument_node="">High voter turnout is often considered to be desirable, though among political scientists and economists specializing in public choice, the issue is still debated.</span><sup class="reference" data-dcnode-id="6260" id="cite_ref-18"><a data-dcnode-id="6261" href="#cite_note-18"><span data-dcnode-id="6262" instrument_node="">[18]</span></a></sup><span data-dcnode-id="6259" instrument_node=""> A high turnout is generally seen as evidence of the </span><a class="mw-redirect" data-dcnode-id="6257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Legitimacy_%28political_science%29" title="Legitimacy (political science)"><span data-dcnode-id="6258" instrument_node="">legitimacy</span></a><span data-dcnode-id="6256" instrument_node=""> of the current system. </span><a data-dcnode-id="6254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dictator" title="Dictator"><span data-dcnode-id="6255" instrument_node="">Dictators</span></a><span data-dcnode-id="6253" instrument_node=""> have often fabricated high turnouts in </span><a class="mw-redirect" data-dcnode-id="6251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Show_election" title="Show election"><span data-dcnode-id="6252" instrument_node="">showcase elections</span></a><span data-dcnode-id="6250" instrument_node=""> for this purpose. For instance, </span><a data-dcnode-id="6248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saddam_Hussein" title="Saddam Hussein"><span data-dcnode-id="6249" instrument_node="">Saddam Hussein</span></a><span data-dcnode-id="6247" instrument_node="">'s 2002 plebiscite was claimed to have had 100% participation.</span><sup class="reference" data-dcnode-id="6244" id="cite_ref-19"><a data-dcnode-id="6245" href="#cite_note-19"><span data-dcnode-id="6246" instrument_node="">[19]</span></a></sup><span data-dcnode-id="6243" instrument_node=""> Opposition parties sometimes boycott votes they feel are unfair or illegitimate, or if the election is for a government that is considered illegitimate. For example, the </span><a data-dcnode-id="6241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Holy_See" title="Holy See"><span data-dcnode-id="6242" instrument_node="">Holy See</span></a><span data-dcnode-id="6240" instrument_node=""> instructed Italian Catholics to boycott national elections for several decades after the </span><a class="mw-redirect" data-dcnode-id="6238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Italian_unification" title="Italian unification"><span data-dcnode-id="6239" instrument_node="">creation of the state of Italy</span></a><span data-dcnode-id="6237" instrument_node="">.</span><sup class="reference" data-dcnode-id="6234" id="cite_ref-20"><a data-dcnode-id="6235" href="#cite_note-20"><span data-dcnode-id="6236" instrument_node="">[20]</span></a></sup><span data-dcnode-id="6233" instrument_node=""> In some countries, there are threats of violence against those who vote, such as during the </span><a class="mw-redirect" data-dcnode-id="6231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/December_2005_Iraqi_legislative_election" title="December 2005 Iraqi legislative election"><span data-dcnode-id="6232" instrument_node="">2005 Iraq elections</span></a><span data-dcnode-id="6230" instrument_node="">, an example of </span><a data-dcnode-id="6228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voter_suppression" title="Voter suppression"><span data-dcnode-id="6229" instrument_node="">voter suppression</span></a><span data-dcnode-id="6227" instrument_node="">. However, some political scientists question the view that high turnout is an implicit endorsement of the system. Mark N. Franklin contends that in </span><a class="mw-redirect" data-dcnode-id="6225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union_elections" title="European Union elections"><span data-dcnode-id="6226" instrument_node="">European Union elections</span></a><span data-dcnode-id="6224" instrument_node=""> opponents of the federation, and of its legitimacy, are just as likely to vote as proponents.</span><sup class="reference" data-dcnode-id="6221" id="cite_ref-Franklin_21-0"><a data-dcnode-id="6222" href="#cite_note-Franklin-21"><span data-dcnode-id="6223" instrument_node="">[21]</span></a></sup><span data-dcnode-id="6220" instrument_node="">
</span></p><p data-dcnode-id="6160"><span data-dcnode-id="6218" instrument_node="">Assuming that low turnout is a reflection of disenchantment or indifference, a poll with very low turnout may not be an accurate reflection of the </span><a data-dcnode-id="6216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Popular_sovereignty" title="Popular sovereignty"><span data-dcnode-id="6217" instrument_node="">will of the people</span></a><span data-dcnode-id="6215" instrument_node="">. On the other hand, if low turnout is a reflection of contentment of voters about likely winners or parties, then low turnout is as legitimate as high turnout, as long as the right to vote exists. Still, low turnouts can lead to unequal representation among various parts of the population. In developed countries, non-voters tend to be concentrated in particular demographic and socioeconomic groups, especially the </span><a data-dcnode-id="6213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth" title="Youth"><span data-dcnode-id="6214" instrument_node="">young</span></a><span data-dcnode-id="6212" instrument_node=""> and the </span><a data-dcnode-id="6210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poverty" title="Poverty"><span data-dcnode-id="6211" instrument_node="">poor</span></a><span data-dcnode-id="6209" instrument_node="">. However, in </span><a data-dcnode-id="6207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/India" title="India"><span data-dcnode-id="6208" instrument_node="">India</span></a><span data-dcnode-id="6206" instrument_node="">, which boasts an electorate of more than 814&nbsp;million people, the opposite is true. The poor, who comprise the majority of the demographic, are more likely to vote than the rich and the middle classes,</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6199" style="white-space:nowrap;"><span data-dcnode-id="6205" instrument_node="">[</span><i data-dcnode-id="6201"><a data-dcnode-id="6202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6203" title="This claim needs references to reliable sources. (October 2008)"><span data-dcnode-id="6204" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6200" instrument_node="">]</span></sup><span data-dcnode-id="6198" instrument_node=""> and turnout is higher in rural areas than urban areas.</span><sup class="reference" data-dcnode-id="6195" id="cite_ref-22"><a data-dcnode-id="6196" href="#cite_note-22"><span data-dcnode-id="6197" instrument_node="">[22]</span></a></sup><span data-dcnode-id="6194" instrument_node=""> In low-turnout countries, these groups</span><sup class="noprint Inline-Template" data-dcnode-id="6187" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="6193" instrument_node="">[</span><i data-dcnode-id="6189"><a data-dcnode-id="6190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APlease_clarify" title="Wikipedia:Please clarify"><span data-dcnode-id="6191" title="The text near this tag may need clarification or removal of jargon. (July 2009)"><span data-dcnode-id="6192" instrument_node="">clarification needed</span></span></a></i><span data-dcnode-id="6188" instrument_node="">]</span></sup><span data-dcnode-id="6186" instrument_node=""> are often significantly under-represented in elections.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6179" style="white-space:nowrap;"><span data-dcnode-id="6185" instrument_node="">[</span><i data-dcnode-id="6181"><a data-dcnode-id="6182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6183" title="This claim needs references to reliable sources. (July 2009)"><span data-dcnode-id="6184" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6180" instrument_node="">]</span></sup><span data-dcnode-id="6178" instrument_node=""> This has the potential to skew policy. For instance, a high voter turnout among the </span><a data-dcnode-id="6176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Old_age" title="Old age"><span data-dcnode-id="6177" instrument_node="">elderly</span></a><span data-dcnode-id="6175" instrument_node=""> coupled with a low turnout among the young may lead to more money for retirees' </span><a data-dcnode-id="6173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Health_care" title="Health care"><span data-dcnode-id="6174" instrument_node="">health care</span></a><span data-dcnode-id="6172" instrument_node="">, and less for youth employment schemes. Some nations thus have rules that render an election invalid if too few people vote, such as </span><a data-dcnode-id="6170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serbia" title="Serbia"><span data-dcnode-id="6171" instrument_node="">Serbia</span></a><span data-dcnode-id="6169" instrument_node="">, where three successive presidential elections were rendered invalid in 2003.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6162" style="white-space:nowrap;"><span data-dcnode-id="6168" instrument_node="">[</span><i data-dcnode-id="6164"><a data-dcnode-id="6165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6166" title="This claim needs references to reliable sources. (May 2012)"><span data-dcnode-id="6167" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6163" instrument_node="">]</span></sup><span data-dcnode-id="6161" instrument_node="">
</span></p><p data-dcnode-id="6155"><span data-dcnode-id="6159" instrument_node="">These are countries with highest voter turnout </span><a class="external free" data-dcnode-id="6157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.triptrivia.com/which-countries-have-the-highest-and-lowest-voter-turnout/X5NDNlIhqgAGwX6d" rel="nofollow"><span data-dcnode-id="6158" instrument_node="">https://www.triptrivia.com/which-countries-have-the-highest-and-lowest-voter-turnout/X5NDNlIhqgAGwX6d</span></a><span data-dcnode-id="6156" instrument_node="">
</span></p><p data-dcnode-id="6150"><span data-dcnode-id="6154" instrument_node="">There is almost a 40% difference voter turnout between highest and lowest turnout countries </span><a class="external free" data-dcnode-id="6152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arcgis.com/apps/MapJournal/index.html%3Fappid%3D448109665d774cd6a8702bfbd8cc7433" rel="nofollow"><span data-dcnode-id="6153" instrument_node="">https://www.arcgis.com/apps/MapJournal/index.html?appid=448109665d774cd6a8702bfbd8cc7433</span></a><span data-dcnode-id="6151" instrument_node="">
</span></p><span data-dcnode-id="6149" instrument_node="">
</span><h2 data-dcnode-id="6139"><span class="mw-headline" data-dcnode-id="6147" id="Determinants_and_demographics_of_turnout"><span data-dcnode-id="6148" instrument_node="">Determinants and demographics of turnout</span></span><span class="mw-editsection" data-dcnode-id="6140"><span class="mw-editsection-bracket" data-dcnode-id="6145"><span data-dcnode-id="6146" instrument_node="">[</span></span><a data-dcnode-id="6143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D4" title="Edit section: Determinants and demographics of turnout"><span data-dcnode-id="6144" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6141"><span data-dcnode-id="6142" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6138" instrument_node="">
</span><span data-dcnode-id="6137" instrument_node="">
</span><span data-dcnode-id="6129" instrument_node="">
</span><span data-dcnode-id="6128" instrument_node="">
</span><span data-dcnode-id="6125" instrument_node="">
</span><span data-dcnode-id="6121" instrument_node="">

</span><p data-dcnode-id="5941"><span data-dcnode-id="5946" instrument_node="">In each country, some parts of society are more likely to vote than others. In high-turnout countries, these differences tend to be limited. As turnout approaches 90%, it becomes difficult to find significant differences between voters and nonvoters, but in low turnout nations the differences between voters and non-voters can be quite marked.</span><sup class="reference" data-dcnode-id="5943" id="cite_ref-Franklin_21-1"><a data-dcnode-id="5944" href="#cite_note-Franklin-21"><span data-dcnode-id="5945" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5942" instrument_node="">
</span></p><span data-dcnode-id="5940" instrument_node="">
</span><h3 data-dcnode-id="5930"><span class="mw-headline" data-dcnode-id="5938" id="Habit"><span data-dcnode-id="5939" instrument_node="">Habit</span></span><span class="mw-editsection" data-dcnode-id="5931"><span class="mw-editsection-bracket" data-dcnode-id="5936"><span data-dcnode-id="5937" instrument_node="">[</span></span><a data-dcnode-id="5934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D5" title="Edit section: Habit"><span data-dcnode-id="5935" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5932"><span data-dcnode-id="5933" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5929" instrument_node="">
</span><p data-dcnode-id="5919"><span data-dcnode-id="5928" instrument_node="">Turnout differences appear to persist over time; in fact, the strongest predictor of individual turnout is whether or not one voted in the previous election.</span><sup class="reference" data-dcnode-id="5925" id="cite_ref-25"><a data-dcnode-id="5926" href="#cite_note-25"><span data-dcnode-id="5927" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5924" instrument_node=""> As a result, many scholars think of turnout as habitual behavior that can be learned or unlearned, especially among young adults.</span><sup class="reference" data-dcnode-id="5921" id="cite_ref-26"><a data-dcnode-id="5922" href="#cite_note-26"><span data-dcnode-id="5923" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5920" instrument_node="">
</span></p><span data-dcnode-id="5918" instrument_node="">
</span><h3 data-dcnode-id="5908"><span class="mw-headline" data-dcnode-id="5916" id="Childhood_influences"><span data-dcnode-id="5917" instrument_node="">Childhood influences</span></span><span class="mw-editsection" data-dcnode-id="5909"><span class="mw-editsection-bracket" data-dcnode-id="5914"><span data-dcnode-id="5915" instrument_node="">[</span></span><a data-dcnode-id="5912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D6" title="Edit section: Childhood influences"><span data-dcnode-id="5913" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5910"><span data-dcnode-id="5911" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5907" instrument_node="">
</span><p data-dcnode-id="5891"><span data-dcnode-id="5906" instrument_node="">Studies have found that improving children's social skills</span><sup class="reference" data-dcnode-id="5903" id="cite_ref-27"><a data-dcnode-id="5904" href="#cite_note-27"><span data-dcnode-id="5905" instrument_node="">[27]</span></a></sup><sup class="reference" data-dcnode-id="5900" id="cite_ref-28"><a data-dcnode-id="5901" href="#cite_note-28"><span data-dcnode-id="5902" instrument_node="">[28]</span></a></sup><span data-dcnode-id="5899" instrument_node=""> and enrolling them in high-quality </span><a data-dcnode-id="5897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Early_childhood_education" title="Early childhood education"><span data-dcnode-id="5898" instrument_node="">early-childhood</span></a><span data-dcnode-id="5896" instrument_node=""> educational programs</span><sup class="reference" data-dcnode-id="5893" id="cite_ref-29"><a data-dcnode-id="5894" href="#cite_note-29"><span data-dcnode-id="5895" instrument_node="">[29]</span></a></sup><span data-dcnode-id="5892" instrument_node=""> increases their turnout as adults.
</span></p><span data-dcnode-id="5890" instrument_node="">
</span><h3 data-dcnode-id="5880"><span class="mw-headline" data-dcnode-id="5888" id="Demographics"><span data-dcnode-id="5889" instrument_node="">Demographics</span></span><span class="mw-editsection" data-dcnode-id="5881"><span class="mw-editsection-bracket" data-dcnode-id="5886"><span data-dcnode-id="5887" instrument_node="">[</span></span><a data-dcnode-id="5884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D7" title="Edit section: Demographics"><span data-dcnode-id="5885" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5882"><span data-dcnode-id="5883" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5879" instrument_node="">
</span><p data-dcnode-id="5847"><span data-dcnode-id="5878" instrument_node="">Socioeconomic factors are significantly associated with whether individuals develop the habit of voting. The most important socioeconomic factor affecting voter turnout is </span><a data-dcnode-id="5876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Education" title="Education"><span data-dcnode-id="5877" instrument_node="">education</span></a><span data-dcnode-id="5875" instrument_node="">. The more educated a person is, the more likely they are to vote, even controlling for other factors that are closely associated with education level, such as </span><a data-dcnode-id="5873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Income" title="Income"><span data-dcnode-id="5874" instrument_node="">income</span></a><span data-dcnode-id="5872" instrument_node=""> and </span><a data-dcnode-id="5870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_class" title="Social class"><span data-dcnode-id="5871" instrument_node="">class</span></a><span data-dcnode-id="5869" instrument_node="">. Income has some effect independently: wealthier people are more likely to vote, regardless of their educational background. There is some debate over the effects of </span><a class="mw-redirect" data-dcnode-id="5867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnicity" title="Ethnicity"><span data-dcnode-id="5868" instrument_node="">ethnicity</span></a><span data-dcnode-id="5866" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Race_%28classification_of_human_beings%29" title="Race (classification of human beings)"><span data-dcnode-id="5865" instrument_node="">race</span></a><span data-dcnode-id="5863" instrument_node="">, and </span><a data-dcnode-id="5861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gender" title="Gender"><span data-dcnode-id="5862" instrument_node="">gender</span></a><span data-dcnode-id="5860" instrument_node="">. In the past, these factors unquestionably influenced turnout in many nations, but nowadays the consensus among political scientists is that these factors have little effect in Western democracies when education and income differences are taken into account.</span><sup class="reference" data-dcnode-id="5857" id="cite_ref-Sigelman_30-0"><a data-dcnode-id="5858" href="#cite_note-Sigelman-30"><span data-dcnode-id="5859" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5856" instrument_node=""> A 2018 study found that while education did not increase turnout on average, it did raise turnout among individuals from low socioeconomic status households.</span><sup class="reference" data-dcnode-id="5853" id="cite_ref-31"><a data-dcnode-id="5854" href="#cite_note-31"><span data-dcnode-id="5855" instrument_node="">[31]</span></a></sup><span data-dcnode-id="5852" instrument_node=""> Public-sector employees have higher voter turnout than private-sector employees.</span><sup class="reference" data-dcnode-id="5849" id="cite_ref-32"><a data-dcnode-id="5850" href="#cite_note-32"><span data-dcnode-id="5851" instrument_node="">[32]</span></a></sup><span data-dcnode-id="5848" instrument_node="">
</span></p><p data-dcnode-id="5833"><span data-dcnode-id="5846" instrument_node="">However, since different ethnic groups typically have different levels of education and income, there are important differences in turnout between such groups in many societies. Other demographic factors have an important influence: young people are far less likely to vote than the elderly.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5839" style="white-space:nowrap;"><span data-dcnode-id="5845" instrument_node="">[</span><i data-dcnode-id="5841"><a data-dcnode-id="5842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5843" title="This claim needs references to reliable sources. (December 2009)"><span data-dcnode-id="5844" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5840" instrument_node="">]</span></sup><span data-dcnode-id="5838" instrument_node=""> Occupation has little effect on turnout, with the notable exception of higher voting rates among government employees in many countries.</span><sup class="reference" data-dcnode-id="5835" id="cite_ref-Sigelman_30-1"><a data-dcnode-id="5836" href="#cite_note-Sigelman-30"><span data-dcnode-id="5837" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5834" instrument_node="">
</span></p><p data-dcnode-id="5819"><span data-dcnode-id="5832" instrument_node="">There can also be regional differences in voter turnout. One issue that arises in continent-spanning nations, such as Australia, </span><a data-dcnode-id="5830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canada" title="Canada"><span data-dcnode-id="5831" instrument_node="">Canada</span></a><span data-dcnode-id="5829" instrument_node="">, the United States and </span><a data-dcnode-id="5827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russia" title="Russia"><span data-dcnode-id="5828" instrument_node="">Russia</span></a><span data-dcnode-id="5826" instrument_node="">, is that of </span><a data-dcnode-id="5824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Time_zone" title="Time zone"><span data-dcnode-id="5825" instrument_node="">time zones</span></a><span data-dcnode-id="5823" instrument_node="">. Canada banned the broadcasting of election results in any region where the polls have not yet closed; this ban was upheld by the </span><a data-dcnode-id="5821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Court_of_Canada" title="Supreme Court of Canada"><span data-dcnode-id="5822" instrument_node="">Supreme Court of Canada</span></a><span data-dcnode-id="5820" instrument_node="">.
</span></p><span data-dcnode-id="5818" instrument_node="">
</span><h3 data-dcnode-id="5808"><span class="mw-headline" data-dcnode-id="5816" id="Differences_between_elections"><span data-dcnode-id="5817" instrument_node="">Differences between elections</span></span><span class="mw-editsection" data-dcnode-id="5809"><span class="mw-editsection-bracket" data-dcnode-id="5814"><span data-dcnode-id="5815" instrument_node="">[</span></span><a data-dcnode-id="5812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D8" title="Edit section: Differences between elections"><span data-dcnode-id="5813" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5810"><span data-dcnode-id="5811" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5807" instrument_node="">
</span><p data-dcnode-id="5777"><span data-dcnode-id="5806" instrument_node="">Within countries there can be important differences in turnout between individual elections.</span><sup class="reference" data-dcnode-id="5803" id="cite_ref-33"><a data-dcnode-id="5804" href="#cite_note-33"><span data-dcnode-id="5805" instrument_node="">[33]</span></a></sup><span data-dcnode-id="5802" instrument_node=""> Elections where control of the national </span><a data-dcnode-id="5800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Executive_%28government%29" title="Executive (government)"><span data-dcnode-id="5801" instrument_node="">executive</span></a><span data-dcnode-id="5799" instrument_node=""> is not at stake generally have much lower turnouts—often half that for general elections.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5792" style="white-space:nowrap;"><span data-dcnode-id="5798" instrument_node="">[</span><i data-dcnode-id="5794"><a data-dcnode-id="5795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5796" title="This claim needs references to reliable sources. (June 2009)"><span data-dcnode-id="5797" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5793" instrument_node="">]</span></sup><span data-dcnode-id="5791" instrument_node=""> Municipal and provincial elections, and by-elections to fill casual vacancies, typically have lower turnouts, as do elections for the parliament of the supranational </span><a data-dcnode-id="5789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="5790" instrument_node="">European Union</span></a><span data-dcnode-id="5788" instrument_node="">, which is separate from the executive branch of the EU's government. In the United States, </span><a class="mw-redirect" data-dcnode-id="5786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Off-year_elections" title="Off-year elections"><span data-dcnode-id="5787" instrument_node="">midterm congressional elections</span></a><span data-dcnode-id="5785" instrument_node=""> attract far lower turnouts than Congressional elections held concurrently with Presidential ones.</span><sup class="reference" data-dcnode-id="5782" id="cite_ref-34"><a data-dcnode-id="5783" href="#cite_note-34"><span data-dcnode-id="5784" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5781" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="5779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Runoff_election" title="Runoff election"><span data-dcnode-id="5780" instrument_node="">Runoff elections</span></a><span data-dcnode-id="5778" instrument_node=""> also tend to attract lower turnouts.
</span></p><span data-dcnode-id="5776" instrument_node="">
</span><h4 data-dcnode-id="5766"><span class="mw-headline" data-dcnode-id="5774" id="Competitiveness_of_races"><span data-dcnode-id="5775" instrument_node="">Competitiveness of races</span></span><span class="mw-editsection" data-dcnode-id="5767"><span class="mw-editsection-bracket" data-dcnode-id="5772"><span data-dcnode-id="5773" instrument_node="">[</span></span><a data-dcnode-id="5770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D9" title="Edit section: Competitiveness of races"><span data-dcnode-id="5771" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5768"><span data-dcnode-id="5769" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5765" instrument_node="">
</span><p data-dcnode-id="5749"><span data-dcnode-id="5764" instrument_node="">In theory, one of the factors that is most likely to increase turnout is a close race. Following the Downsian Closeness hypothesis</span><sup class="reference" data-dcnode-id="5761" id="cite_ref-35"><a data-dcnode-id="5762" href="#cite_note-35"><span data-dcnode-id="5763" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5760" instrument_node=""> and the idea of </span><a data-dcnode-id="5758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Altruism_theory_of_voting%23Expressive_versus_instrumental_voting" title="Altruism theory of voting"><span data-dcnode-id="5759" instrument_node="">instrumental voting</span></a><span data-dcnode-id="5757" instrument_node="">, voters rationally estimate the costs and benefits of participating in an election. Benefits exceed the costs if a close outcome of the election is expected and voters believe their ballot may be decisive for the outcome. Additionally, in these elections parties increase their mobilization efforts. Although the logic of instrumental voting applies to all elections, the effects are more prominent in democracies and </span><a data-dcnode-id="5755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_system" title="Electoral system"><span data-dcnode-id="5756" instrument_node="">majoritarian electoral systems</span></a><span data-dcnode-id="5754" instrument_node="">.</span><sup class="reference" data-dcnode-id="5751" id="cite_ref-36"><a data-dcnode-id="5752" href="#cite_note-36"><span data-dcnode-id="5753" instrument_node="">[36]</span></a></sup><span data-dcnode-id="5750" instrument_node="">
</span></p><p data-dcnode-id="5720"><span data-dcnode-id="5748" instrument_node="">An example is the </span><a data-dcnode-id="5746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2004_United_States_presidential_election" title="2004 United States presidential election"><span data-dcnode-id="5747" instrument_node="">2004 U.S. presidential election</span></a><span data-dcnode-id="5745" instrument_node="">. With an intensely polarized electorate and all polls showing a close finish between </span><a data-dcnode-id="5743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_the_United_States" title="President of the United States"><span data-dcnode-id="5744" instrument_node="">President</span></a><span data-dcnode-id="5742" instrument_node=""> </span><a data-dcnode-id="5740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_W._Bush" title="George W. Bush"><span data-dcnode-id="5741" instrument_node="">George W. Bush</span></a><span data-dcnode-id="5739" instrument_node=""> and </span><a data-dcnode-id="5737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratic_Party_%28United_States%29" title="Democratic Party (United States)"><span data-dcnode-id="5738" instrument_node="">Democratic</span></a><span data-dcnode-id="5736" instrument_node=""> challenger </span><a class="mw-redirect" data-dcnode-id="5734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_F._Kerry" title="John F. Kerry"><span data-dcnode-id="5735" instrument_node="">John F. Kerry</span></a><span data-dcnode-id="5733" instrument_node="">, the turnout in the election was close to 60%, resulting in a record number of popular votes for both candidates (around 62&nbsp;million for Bush and 59&nbsp;million for Kerry). However, this race also demonstrates the influence that contentious social issues can have on voter turnout; for example, the voter turnout rate in 1860 wherein anti-</span><a data-dcnode-id="5731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slavery" title="Slavery"><span data-dcnode-id="5732" instrument_node="">slavery</span></a><span data-dcnode-id="5730" instrument_node=""> candidate Abraham Lincoln won the election was the second-highest on record (81.2 percent, second only to 1876, with 81.8 percent). Nonetheless, there is evidence to support the argument that predictable election results—where one vote is not seen to be able to make a difference—have resulted in lower turnouts, such as </span><a data-dcnode-id="5728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1996_United_States_presidential_election" title="1996 United States presidential election"><span data-dcnode-id="5729" instrument_node="">Bill Clinton's 1996 re-election</span></a><span data-dcnode-id="5727" instrument_node=""> (which featured the lowest voter turnout in the United States since 1924), the </span><a data-dcnode-id="5725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2001_United_Kingdom_general_election" title="2001 United Kingdom general election"><span data-dcnode-id="5726" instrument_node="">United Kingdom general election of 2001</span></a><span data-dcnode-id="5724" instrument_node="">, and the 2005 </span><a class="mw-redirect" data-dcnode-id="5722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spanish_referendum_on_the_European_Constitution" title="Spanish referendum on the European Constitution"><span data-dcnode-id="5723" instrument_node="">Spanish referendum on the European Constitution</span></a><span data-dcnode-id="5721" instrument_node="">; all of these elections produced decisive results on a low turnout.
</span></p><p data-dcnode-id="5701"><span data-dcnode-id="5719" instrument_node="">A 2020 NBER paper, examining evidence from </span><a class="mw-redirect" data-dcnode-id="5717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Swiss_referenda" title="Swiss referenda"><span data-dcnode-id="5718" instrument_node="">Swiss referenda</span></a><span data-dcnode-id="5716" instrument_node="">, found that an awareness by the electorate that an election would be close increased turnout.</span><sup class="reference" data-dcnode-id="5713" id="cite_ref-Closeness_37-0"><a data-dcnode-id="5714" href="#cite_note-Closeness-37"><span data-dcnode-id="5715" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5712" instrument_node=""> Controlling for canton and vote </span><a data-dcnode-id="5710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fixed_effects_model" title="Fixed effects model"><span data-dcnode-id="5711" instrument_node="">fixed effects</span></a><span data-dcnode-id="5709" instrument_node="">, the study determined "that greater </span><a class="mw-redirect" data-dcnode-id="5707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Swiss_canton" title="Swiss canton"><span data-dcnode-id="5708" instrument_node="">cantonal</span></a><span data-dcnode-id="5706" instrument_node=""> newspaper coverage of close polls significantly increases voter turnout"</span><sup class="reference" data-dcnode-id="5703" id="cite_ref-Closeness_37-1"><a data-dcnode-id="5704" href="#cite_note-Closeness-37"><span data-dcnode-id="5705" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5702" instrument_node="">
</span></p><span data-dcnode-id="5700" instrument_node="">
</span><h3 data-dcnode-id="5690"><span class="mw-headline" data-dcnode-id="5698" id="Incarceration"><span data-dcnode-id="5699" instrument_node="">Incarceration</span></span><span class="mw-editsection" data-dcnode-id="5691"><span class="mw-editsection-bracket" data-dcnode-id="5696"><span data-dcnode-id="5697" instrument_node="">[</span></span><a data-dcnode-id="5694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D10" title="Edit section: Incarceration"><span data-dcnode-id="5695" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5692"><span data-dcnode-id="5693" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5689" instrument_node="">
</span><p data-dcnode-id="5677"><span data-dcnode-id="5688" instrument_node="">One 2017 study in the </span><i data-dcnode-id="5686"><span data-dcnode-id="5687" instrument_node="">Journal of Politics</span></i><span data-dcnode-id="5685" instrument_node=""> found that, in the United States, incarceration had no significant impact on turnout in elections: ex-felons did not become less likely to vote after their time in prison.</span><sup class="reference" data-dcnode-id="5682" id="cite_ref-38"><a data-dcnode-id="5683" href="#cite_note-38"><span data-dcnode-id="5684" instrument_node="">[38]</span></a></sup><span data-dcnode-id="5681" instrument_node=""> Also in the United States, incarceration, probation, and a </span><a class="mw-redirect" data-dcnode-id="5679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Felony_disenfranchisement" title="Felony disenfranchisement"><span data-dcnode-id="5680" instrument_node="">felony record</span></a><span data-dcnode-id="5678" instrument_node=""> deny 5–6&nbsp;million Americans of the right to vote, with reforms gradually leading more states to allow people with felony criminal records to vote, while almost none allow incarcerated people to vote.
</span></p><span data-dcnode-id="5676" instrument_node="">
</span><h3 data-dcnode-id="5666"><span class="mw-headline" data-dcnode-id="5674" id="Costs_of_participation"><span data-dcnode-id="5675" instrument_node="">Costs of participation</span></span><span class="mw-editsection" data-dcnode-id="5667"><span class="mw-editsection-bracket" data-dcnode-id="5672"><span data-dcnode-id="5673" instrument_node="">[</span></span><a data-dcnode-id="5670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D11" title="Edit section: Costs of participation"><span data-dcnode-id="5671" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5668"><span data-dcnode-id="5669" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5665" instrument_node="">
</span><p data-dcnode-id="5628"><span data-dcnode-id="5664" instrument_node="">A 2017 study in </span><i data-dcnode-id="5662"><span data-dcnode-id="5663" instrument_node="">Electoral Studies</span></i><span data-dcnode-id="5661" instrument_node=""> found that Swiss cantons that reduced the costs of postal voting for voters by prepaying the postage on return envelopes (which otherwise cost 85 Swiss Franc cents) were "associated with a statistically significant 1.8 percentage point increase in voter turnout".</span><sup class="reference" data-dcnode-id="5658" id="cite_ref-39"><a data-dcnode-id="5659" href="#cite_note-39"><span data-dcnode-id="5660" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5657" instrument_node=""> A 2016 study in the </span><i data-dcnode-id="5655"><span data-dcnode-id="5656" instrument_node="">American Journal of Political Science</span></i><span data-dcnode-id="5654" instrument_node=""> found that preregistration – allowing young citizens to register before being eligible to vote – increased turnout by 2 to 8 percentage points.</span><sup class="reference" data-dcnode-id="5651" id="cite_ref-40"><a data-dcnode-id="5652" href="#cite_note-40"><span data-dcnode-id="5653" instrument_node="">[40]</span></a></sup><span data-dcnode-id="5650" instrument_node=""> A 2019 study in </span><i data-dcnode-id="5648"><span data-dcnode-id="5649" instrument_node="">Social Science Quarterly</span></i><span data-dcnode-id="5647" instrument_node=""> found that the introduction of a vote‐by‐mail system in Washington state led to an increase in turnout.</span><sup class="reference" data-dcnode-id="5644" id="cite_ref-41"><a data-dcnode-id="5645" href="#cite_note-41"><span data-dcnode-id="5646" instrument_node="">[41]</span></a></sup><span data-dcnode-id="5643" instrument_node=""> Another 2019 study in </span><i data-dcnode-id="5641"><span data-dcnode-id="5642" instrument_node="">Social Science Quarterly</span></i><span data-dcnode-id="5640" instrument_node=""> found that online voter registration increased voter turnout, in particular for young voters.</span><sup class="reference" data-dcnode-id="5637" id="cite_ref-42"><a data-dcnode-id="5638" href="#cite_note-42"><span data-dcnode-id="5639" instrument_node="">[42]</span></a></sup><span data-dcnode-id="5636" instrument_node=""> A 2020 study in </span><i data-dcnode-id="5634"><span data-dcnode-id="5635" instrument_node="">Political Behavior</span></i><span data-dcnode-id="5633" instrument_node=""> found that a single postcard by election officials to unregistered eligible voters boosted registration rates by a percentage point and turnout by 0.9 percentage points, with the strongest effects on young, first-time voters.</span><sup class="reference" data-dcnode-id="5630" id="cite_ref-43"><a data-dcnode-id="5631" href="#cite_note-43"><span data-dcnode-id="5632" instrument_node="">[43]</span></a></sup><span data-dcnode-id="5629" instrument_node="">
</span></p><p data-dcnode-id="5622"><span data-dcnode-id="5627" instrument_node="">The availability of ballot drop boxes increases turnout.</span><sup class="reference" data-dcnode-id="5624" id="cite_ref-44"><a data-dcnode-id="5625" href="#cite_note-44"><span data-dcnode-id="5626" instrument_node="">[44]</span></a></sup><span data-dcnode-id="5623" instrument_node="">
</span></p><p data-dcnode-id="5613"><span data-dcnode-id="5621" instrument_node="">A 2018 study in the </span><i data-dcnode-id="5619"><span data-dcnode-id="5620" instrument_node="">British Journal of Political Science</span></i><span data-dcnode-id="5618" instrument_node=""> found that internet voting in local elections in Ontario, Canada, only had a modest impact on turnout, increasing turnout by 3.5 percentage points. The authors of the study say that the results "suggest that internet voting is unlikely to solve the low turnout crisis, and imply that cost arguments do not fully account for recent turnout declines."</span><sup class="reference" data-dcnode-id="5615" id="cite_ref-45"><a data-dcnode-id="5616" href="#cite_note-45"><span data-dcnode-id="5617" instrument_node="">[45]</span></a></sup><span data-dcnode-id="5614" instrument_node="">
</span></p><p data-dcnode-id="5607"><span data-dcnode-id="5612" instrument_node="">According to an article by Emily Badger in "The New York Times", there is research that explores how the turnout of the 2016 presidential election would have changed if the voter turnout had been different. Badger writes ““If everybody voted, Clinton wins. If minority turnout was equal to white turnout, Clinton wins,” said Mr. Fraga, who describes these patterns in a new book, “The Turnout Gap.” Many white voters who preferred Mr. Trump sat out 2016 as well. So, in this full-turnout counterfactual, Mrs. Clinton doesn't overcome Mr. Trump's narrow victories in Wisconsin, Michigan or Pennsylvania. Rather, she flips Florida, North Carolina and Texas. The preferences of the population are aligned with a Democratic majority in the Senate as well, Mr. Fraga says, despite the bias toward rural states. We don't see that, he argues, because of disparities in turnout.” (Badger, 2018:P. 12-13).</span><sup class="reference" data-dcnode-id="5609" id="cite_ref-46"><a data-dcnode-id="5610" href="#cite_note-46"><span data-dcnode-id="5611" instrument_node="">[46]</span></a></sup><span data-dcnode-id="5608" instrument_node="">
</span></p><span data-dcnode-id="5606" instrument_node="">
</span><h3 data-dcnode-id="5596"><span class="mw-headline" data-dcnode-id="5604" id="Knowledge"><span data-dcnode-id="5605" instrument_node="">Knowledge</span></span><span class="mw-editsection" data-dcnode-id="5597"><span class="mw-editsection-bracket" data-dcnode-id="5602"><span data-dcnode-id="5603" instrument_node="">[</span></span><a data-dcnode-id="5600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D12" title="Edit section: Knowledge"><span data-dcnode-id="5601" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5598"><span data-dcnode-id="5599" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5595" instrument_node="">
</span><p data-dcnode-id="5589"><span data-dcnode-id="5594" instrument_node="">A 2017 experimental study found that by sending registered voters between the ages of 18 and 30 a voter guide containing salient information about candidates in an upcoming election (a list of candidate endorsements and the candidates' policy positions on five issues in the campaign) increased turnout by 0.9 points.</span><sup class="reference" data-dcnode-id="5591" id="cite_ref-47"><a data-dcnode-id="5592" href="#cite_note-47"><span data-dcnode-id="5593" instrument_node="">[47]</span></a></sup><span data-dcnode-id="5590" instrument_node="">
</span></p><span data-dcnode-id="5588" instrument_node="">
</span><h3 data-dcnode-id="5578"><span class="mw-headline" data-dcnode-id="5586" id="Weather"><span data-dcnode-id="5587" instrument_node="">Weather</span></span><span class="mw-editsection" data-dcnode-id="5579"><span class="mw-editsection-bracket" data-dcnode-id="5584"><span data-dcnode-id="5585" instrument_node="">[</span></span><a data-dcnode-id="5582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D13" title="Edit section: Weather"><span data-dcnode-id="5583" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5580"><span data-dcnode-id="5581" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5577" instrument_node="">
</span><p data-dcnode-id="5489"><span data-dcnode-id="5576" instrument_node="">Research results are mixed as to whether bad weather affects turnout. There is research that shows that </span><a data-dcnode-id="5574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Precipitation" title="Precipitation"><span data-dcnode-id="5575" instrument_node="">precipitation</span></a><span data-dcnode-id="5573" instrument_node=""> can reduce turnout, though this effect is generally rather small, with most studies finding each millimeter of rainfall to reduce turnout by 0.015 to 0.1 percentage points.</span><sup class="reference" data-dcnode-id="5570" id="cite_ref-48"><a data-dcnode-id="5571" href="#cite_note-48"><span data-dcnode-id="5572" instrument_node="">[48]</span></a></sup><sup class="reference" data-dcnode-id="5567" id="cite_ref-49"><a data-dcnode-id="5568" href="#cite_note-49"><span data-dcnode-id="5569" instrument_node="">[49]</span></a></sup><sup class="reference" data-dcnode-id="5564" id="cite_ref-:2_50-0"><a data-dcnode-id="5565" href="#cite_note-:2-50"><span data-dcnode-id="5566" instrument_node="">[50]</span></a></sup><sup class="reference" data-dcnode-id="5561" id="cite_ref-Kanazawa_8-1"><a data-dcnode-id="5562" href="#cite_note-Kanazawa-8"><span data-dcnode-id="5563" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="5558" id="cite_ref-51"><a data-dcnode-id="5559" href="#cite_note-51"><span data-dcnode-id="5560" instrument_node="">[51]</span></a></sup><sup class="reference" data-dcnode-id="5555" id="cite_ref-52"><a data-dcnode-id="5556" href="#cite_note-52"><span data-dcnode-id="5557" instrument_node="">[52]</span></a></sup><sup class="reference" data-dcnode-id="5552" id="cite_ref-:1_53-0"><a data-dcnode-id="5553" href="#cite_note-:1-53"><span data-dcnode-id="5554" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="5549" id="cite_ref-:3_54-0"><a data-dcnode-id="5550" href="#cite_note-:3-54"><span data-dcnode-id="5551" instrument_node="">[54]</span></a></sup><span data-dcnode-id="5548" instrument_node=""> At least two studies, however, found no evidence that weather disruptions reduce turnout.</span><sup class="reference" data-dcnode-id="5545" id="cite_ref-55"><a data-dcnode-id="5546" href="#cite_note-55"><span data-dcnode-id="5547" instrument_node="">[55]</span></a></sup><sup class="reference" data-dcnode-id="5542" id="cite_ref-56"><a data-dcnode-id="5543" href="#cite_note-56"><span data-dcnode-id="5544" instrument_node="">[56]</span></a></sup><span data-dcnode-id="5541" instrument_node=""> A 2011 study found "that while rain decreases turnout on average, it does not do so in competitive elections."</span><sup class="reference" data-dcnode-id="5538" id="cite_ref-57"><a data-dcnode-id="5539" href="#cite_note-57"><span data-dcnode-id="5540" instrument_node="">[57]</span></a></sup><span data-dcnode-id="5537" instrument_node=""> Some research has also investigated the effect of temperature on turnout, with some finding increased temperatures to moderately increase turnout.</span><sup class="reference" data-dcnode-id="5534" id="cite_ref-:3_54-1"><a data-dcnode-id="5535" href="#cite_note-:3-54"><span data-dcnode-id="5536" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="5531" id="cite_ref-58"><a data-dcnode-id="5532" href="#cite_note-58"><span data-dcnode-id="5533" instrument_node="">[58]</span></a></sup><sup class="reference" data-dcnode-id="5528" id="cite_ref-59"><a data-dcnode-id="5529" href="#cite_note-59"><span data-dcnode-id="5530" instrument_node="">[59]</span></a></sup><span data-dcnode-id="5527" instrument_node=""> Some other studies, however, found temperature to have no significant impact on turnout.</span><sup class="reference" data-dcnode-id="5524" id="cite_ref-60"><a data-dcnode-id="5525" href="#cite_note-60"><span data-dcnode-id="5526" instrument_node="">[60]</span></a></sup><sup class="reference" data-dcnode-id="5521" id="cite_ref-:4_61-0"><a data-dcnode-id="5522" href="#cite_note-:4-61"><span data-dcnode-id="5523" instrument_node="">[61]</span></a></sup><span data-dcnode-id="5520" instrument_node="">  These variations in turnout can also have partisan impacts; a 2017 study in the journal </span><i data-dcnode-id="5517"><a data-dcnode-id="5518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Politics_Research" title="American Politics Research"><span data-dcnode-id="5519" instrument_node="">American Politics Research</span></a></i><span data-dcnode-id="5516" instrument_node=""> found that rainfall increased Republican vote shares, because it decreased turnout more among Democratic voters than Republican voters.</span><sup class="reference" data-dcnode-id="5513" id="cite_ref-:1_53-1"><a data-dcnode-id="5514" href="#cite_note-:1-53"><span data-dcnode-id="5515" instrument_node="">[53]</span></a></sup><span data-dcnode-id="5512" instrument_node=""> Studies from the </span><a data-dcnode-id="5510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Netherlands" title="Netherlands"><span data-dcnode-id="5511" instrument_node="">Netherlands</span></a><sup class="reference" data-dcnode-id="5507" id="cite_ref-62"><a data-dcnode-id="5508" href="#cite_note-62"><span data-dcnode-id="5509" instrument_node="">[62]</span></a></sup><span data-dcnode-id="5506" instrument_node=""> and </span><a data-dcnode-id="5504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Germany" title="Germany"><span data-dcnode-id="5505" instrument_node="">Germany</span></a><sup class="reference" data-dcnode-id="5501" id="cite_ref-63"><a data-dcnode-id="5502" href="#cite_note-63"><span data-dcnode-id="5503" instrument_node="">[63]</span></a></sup><span data-dcnode-id="5500" instrument_node=""> have also found weather-related turnout decreases to benefit the </span><a data-dcnode-id="5498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right-wing_politics" title="Right-wing politics"><span data-dcnode-id="5499" instrument_node="">right</span></a><span data-dcnode-id="5497" instrument_node="">, while a </span><a data-dcnode-id="5495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spain" title="Spain"><span data-dcnode-id="5496" instrument_node="">Spanish</span></a><span data-dcnode-id="5494" instrument_node=""> study</span><sup class="reference" data-dcnode-id="5491" id="cite_ref-:2_50-1"><a data-dcnode-id="5492" href="#cite_note-:2-50"><span data-dcnode-id="5493" instrument_node="">[50]</span></a></sup><span data-dcnode-id="5490" instrument_node=""> found a reverse relationship.
