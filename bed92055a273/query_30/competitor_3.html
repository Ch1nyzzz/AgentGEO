</span><div class="thumb tright" data-dcnode-id="4712"><div class="thumbinner" data-dcnode-id="4713" style="width:222px;"><a class="image" data-dcnode-id="4719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGOTV.png"><img alt="" class="thumbimage" data-dcnode-id="4720" data-file-height="787" data-file-width="791" decoding="async" height="219" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f1/GOTV.png/220px-GOTV.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f1/GOTV.png/330px-GOTV.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f1/GOTV.png/440px-GOTV.png 2x" width="220"></a><span data-dcnode-id="4718" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4714"><div class="magnify" data-dcnode-id="4716"><a class="internal" data-dcnode-id="4717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGOTV.png" title="Enlarge"></a></div><span data-dcnode-id="4715" instrument_node="">Methods of raising turnout.</span></div></div></div><span data-dcnode-id="4711" instrument_node="">
</span><table class="box-Globalize plainlinks metadata ambox ambox-content ambox-globalize" data-dcnode-id="4674" role="presentation"><tbody data-dcnode-id="4675"><tr data-dcnode-id="4676"><td class="mbox-image" data-dcnode-id="4708"><div data-dcnode-id="4709" style="width:52px"><img alt="Globe icon." data-dcnode-id="4710" data-file-height="290" data-file-width="350" decoding="async" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_globe_content.svg/48px-Ambox_globe_content.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_globe_content.svg/73px-Ambox_globe_content.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_globe_content.svg/97px-Ambox_globe_content.svg.png 2x" width="48"></div></td><td class="mbox-text" data-dcnode-id="4677"><div class="mbox-text-span" data-dcnode-id="4678"><span data-dcnode-id="4707" instrument_node="">The examples and perspective in this section </span><b data-dcnode-id="4702"><span data-dcnode-id="4706" instrument_node="">deal primarily with the United States and do not represent a </span><a data-dcnode-id="4704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AWikiProject_Countering_systemic_bias" title="Wikipedia:WikiProject Countering systemic bias"><span data-dcnode-id="4705" instrument_node="">worldwide view</span></a><span data-dcnode-id="4703" instrument_node=""> of the subject</span></b><span data-dcnode-id="4701" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="4693"><span data-dcnode-id="4700" instrument_node=""> You may </span><a class="external text" data-dcnode-id="4698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit"><span data-dcnode-id="4699" instrument_node="">improve this section</span></a><span data-dcnode-id="4697" instrument_node="">, discuss the issue on the </span><a data-dcnode-id="4695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talk%3AVoter_turnout" title="Talk:Voter turnout"><span data-dcnode-id="4696" instrument_node="">talk page</span></a><span data-dcnode-id="4694" instrument_node="">, or create a new section, as appropriate.</span></span><span data-dcnode-id="4692" instrument_node=""> </span><span class="date-container" data-dcnode-id="4686"><i data-dcnode-id="4687"><span data-dcnode-id="4691" instrument_node="">(</span><span class="date" data-dcnode-id="4689"><span data-dcnode-id="4690" instrument_node="">December 2019</span></span><span data-dcnode-id="4688" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="4679"><i data-dcnode-id="4680"><span data-dcnode-id="4685" instrument_node=""> (</span><small data-dcnode-id="4682"><a data-dcnode-id="4683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="4684" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="4681" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="4673" instrument_node="">
</span><p data-dcnode-id="4631"><span data-dcnode-id="4672" instrument_node="">Many causes have been proposed for this decline; a combination of factors is most likely. When asked why they do not vote, many people report that they have too little free time. However, over the last several decades, studies have consistently shown that the amount of </span><a class="mw-redirect" data-dcnode-id="4670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_time" title="Free time"><span data-dcnode-id="4671" instrument_node="">leisure time</span></a><span data-dcnode-id="4669" instrument_node=""> has not decreased. According to a study by the Heritage Foundation, Americans report on average an additional 7.9 hours of leisure time per week since 1965.</span><sup class="reference" data-dcnode-id="4666" id="cite_ref-122"><a data-dcnode-id="4667" href="#cite_note-122"><span data-dcnode-id="4668" instrument_node="">[122]</span></a></sup><span data-dcnode-id="4665" instrument_node=""> Furthermore, according to a study by the National Bureau of Economic Research, increases in wages and employment actually decrease voter turnout in gubernatorial elections and do not affect national races.</span><sup class="reference" data-dcnode-id="4662" id="cite_ref-123"><a data-dcnode-id="4663" href="#cite_note-123"><span data-dcnode-id="4664" instrument_node="">[123]</span></a></sup><span data-dcnode-id="4661" instrument_node=""> Potential voters' perception that they are busier is common and might be just as important as a real decrease in leisure time. </span><a data-dcnode-id="4659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geographic_mobility" title="Geographic mobility"><span data-dcnode-id="4660" instrument_node="">Geographic mobility</span></a><span data-dcnode-id="4658" instrument_node=""> has increased over the last few decades. There are often barriers to voting in a district where one is a recent arrival, and a new arrival is likely to know little about the local candidate and local issues. </span><a data-dcnode-id="4656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Francis_Fukuyama" title="Francis Fukuyama"><span data-dcnode-id="4657" instrument_node="">Francis Fukuyama</span></a><span data-dcnode-id="4655" instrument_node=""> has blamed the </span><a data-dcnode-id="4653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Welfare_state" title="Welfare state"><span data-dcnode-id="4654" instrument_node="">welfare state</span></a><span data-dcnode-id="4652" instrument_node="">, arguing that the decrease in turnout has come shortly after the government became far more involved in people's lives. He argues in </span><i data-dcnode-id="4650"><span data-dcnode-id="4651" instrument_node="">Trust: The Social Virtues and The Creation of Prosperity</span></i><span data-dcnode-id="4649" instrument_node=""> that the </span><a data-dcnode-id="4647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_capital" title="Social capital"><span data-dcnode-id="4648" instrument_node="">social capital</span></a><span data-dcnode-id="4646" instrument_node=""> essential to high voter turnouts is easily dissipated by government actions. However, on an international level, those states with the most extensive social programs tend to be the ones with the highest turnouts. Richard Sclove argues in </span><i data-dcnode-id="4644"><span data-dcnode-id="4645" instrument_node="">Democracy and Technology</span></i><span data-dcnode-id="4643" instrument_node=""> that technological developments in society such as "automobilization," suburban living, and "an explosive proliferation of home entertainment devices" have contributed to a loss of community, which in turn has weakened participation in civic life.</span><sup class="reference" data-dcnode-id="4640" id="cite_ref-124"><a data-dcnode-id="4641" href="#cite_note-124"><span data-dcnode-id="4642" instrument_node="">[124]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="4633" style="white-space:nowrap;"><span data-dcnode-id="4639" instrument_node="">[</span><i data-dcnode-id="4635"><a data-dcnode-id="4636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="4637" title="The citation is not specific enough to facilitate source verification (September 2009)"><span data-dcnode-id="4638" instrument_node="">not specific enough to verify</span></span></a></i><span data-dcnode-id="4634" instrument_node="">]</span></sup><span data-dcnode-id="4632" instrument_node="">
</span></p><p data-dcnode-id="4622"><span data-dcnode-id="4630" instrument_node="">Trust in government and in politicians has decreased in many nations. However, the first signs of decreasing voter turnout occurred in the early 1960s, which was before the major upheavals of the late 1960s and 1970s. </span><a data-dcnode-id="4628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_D._Putnam" title="Robert D. Putnam"><span data-dcnode-id="4629" instrument_node="">Robert D. Putnam</span></a><span data-dcnode-id="4627" instrument_node=""> argues that the collapse in civil engagement is due to the introduction of television. In the 1950s and 1960s, television quickly became the main leisure activity in developed nations. It replaced earlier more social entertainments such as bridge clubs, church groups, and bowling leagues. Putnam argues that as people retreated within their homes and general social participation declined, so too did voting.</span><sup class="reference" data-dcnode-id="4624" id="cite_ref-125"><a data-dcnode-id="4625" href="#cite_note-125"><span data-dcnode-id="4626" instrument_node="">[125]</span></a></sup><span data-dcnode-id="4623" instrument_node="">
</span></p><p data-dcnode-id="4616"><span data-dcnode-id="4621" instrument_node="">It has been argued that democratic consolidation (the stabilization of new democracies) contributes to the decline in voter turnout. A 2017 study challenges this, however.</span><sup class="reference" data-dcnode-id="4618" id="cite_ref-126"><a data-dcnode-id="4619" href="#cite_note-126"><span data-dcnode-id="4620" instrument_node="">[126]</span></a></sup><span data-dcnode-id="4617" instrument_node="">
</span></p><span data-dcnode-id="4615" instrument_node="">
</span><h4 data-dcnode-id="4605"><span class="mw-headline" data-dcnode-id="4613" id="United_States"><span data-dcnode-id="4614" instrument_node="">United States</span></span><span class="mw-editsection" data-dcnode-id="4606"><span class="mw-editsection-bracket" data-dcnode-id="4611"><span data-dcnode-id="4612" instrument_node="">[</span></span><a data-dcnode-id="4609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D29" title="Edit section: United States"><span data-dcnode-id="4610" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4607"><span data-dcnode-id="4608" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4604" instrument_node="">
</span><p data-dcnode-id="4581"><span data-dcnode-id="4603" instrument_node="">Rosenstone and Hansen contend that the decline in turnout in the United States is the product of a change in campaigning strategies as a result of the so-called new media. Before the introduction of television, almost all of a party's resources would be directed towards intensive local campaigning and </span><a data-dcnode-id="4601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Get_out_the_vote" title="Get out the vote"><span data-dcnode-id="4602" instrument_node="">get out the vote</span></a><span data-dcnode-id="4600" instrument_node=""> initiatives. In the modern era, these resources have been redirected to expensive media campaigns in which the potential voter is a passive participant.</span><sup class="reference" data-dcnode-id="4597" id="cite_ref-127"><a data-dcnode-id="4598" href="#cite_note-127"><span data-dcnode-id="4599" instrument_node="">[127]</span></a></sup><span data-dcnode-id="4596" instrument_node=""> During the same period, </span><a data-dcnode-id="4594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Negative_campaigning" title="Negative campaigning"><span data-dcnode-id="4595" instrument_node="">negative campaigning</span></a><span data-dcnode-id="4593" instrument_node=""> has become ubiquitous in the United States and elsewhere and has been shown to impact voter turnout.</span><sup class="reference" data-dcnode-id="4590" id="cite_ref-128"><a data-dcnode-id="4591" href="#cite_note-128"><span data-dcnode-id="4592" instrument_node="">[128]</span></a></sup><span data-dcnode-id="4589" instrument_node=""> </span><a data-dcnode-id="4587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Attack_ad" title="Attack ad"><span data-dcnode-id="4588" instrument_node="">Attack ads</span></a><span data-dcnode-id="4586" instrument_node=""> and smear campaigns give voters a negative impression of the entire political process. The evidence for this is mixed: elections involving highly unpopular incumbents generally have high turnout; some studies have found that mudslinging and character attacks reduce turnout, but that substantive attacks on a party's record can increase it.</span><sup class="reference" data-dcnode-id="4583" id="cite_ref-129"><a data-dcnode-id="4584" href="#cite_note-129"><span data-dcnode-id="4585" instrument_node="">[129]</span></a></sup><span data-dcnode-id="4582" instrument_node="">
</span></p><p data-dcnode-id="4549"><span data-dcnode-id="4580" instrument_node="">Part of the reason for voter decline in the recent 2016 election is likely because of restrictive voting laws around the country. Brennan Center for Justice reported that in 2016 fourteen states passed restrictive voting laws.</span><sup class="reference" data-dcnode-id="4577" id="cite_ref-130"><a data-dcnode-id="4578" href="#cite_note-130"><span data-dcnode-id="4579" instrument_node="">[130]</span></a></sup><span data-dcnode-id="4576" instrument_node=""> Examples of these laws are photo ID mandates, narrow times for early voter, and limitations on voter registration. Barbour and Wright also believe that one of the causes is restrictive voting laws but they call this system of laws regulating the electorate.</span><sup class="reference" data-dcnode-id="4573" id="cite_ref-Barbour,_Christine_2016_131-0"><a data-dcnode-id="4574" href="#cite_note-Barbour,_Christine_2016-131"><span data-dcnode-id="4575" instrument_node="">[131]</span></a></sup><span data-dcnode-id="4572" instrument_node=""> The Constitution gives states the power to make decisions regarding restrictive voting laws. In 2008 the Supreme Court made a crucial decision regarding Indiana's </span><a class="mw-redirect" data-dcnode-id="4570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voter_ID_law" title="Voter ID law"><span data-dcnode-id="4571" instrument_node="">voter ID law</span></a><span data-dcnode-id="4569" instrument_node=""> in saying that it does not violate the constitution. Since then almost half of the states have passed restrictive voting laws. These laws contribute to Barbour and Wrights idea of the rational nonvoter. This is someone who does not vote because the benefits of them not voting outweighs the cost to vote.</span><sup class="reference" data-dcnode-id="4566" id="cite_ref-Barbour,_Christine_2016_131-1"><a data-dcnode-id="4567" href="#cite_note-Barbour,_Christine_2016-131"><span data-dcnode-id="4568" instrument_node="">[131]</span></a></sup><span data-dcnode-id="4565" instrument_node=""> These laws add to the "cost" of voting, or reason that make it more difficult and to vote. In the United States programs such as </span><a data-dcnode-id="4563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MTV" title="MTV"><span data-dcnode-id="4564" instrument_node="">MTV</span></a><span data-dcnode-id="4562" instrument_node="">'s "</span><a data-dcnode-id="4560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rock_the_Vote" title="Rock the Vote"><span data-dcnode-id="4561" instrument_node="">Rock the Vote</span></a><span data-dcnode-id="4559" instrument_node="">" and the "</span><a class="mw-redirect" data-dcnode-id="4557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vote_or_Die" title="Vote or Die"><span data-dcnode-id="4558" instrument_node="">Vote or Die</span></a><span data-dcnode-id="4556" instrument_node="">" initiatives have been introduced to increase turnouts of those between the ages of 18 and 25. A number of governments and </span><a class="mw-redirect" data-dcnode-id="4554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Election_management_body" title="Election management body"><span data-dcnode-id="4555" instrument_node="">electoral commissions</span></a><span data-dcnode-id="4553" instrument_node=""> have also launched efforts to boost turnout. For instance, </span><a data-dcnode-id="4551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elections_Canada" title="Elections Canada"><span data-dcnode-id="4552" instrument_node="">Elections Canada</span></a><span data-dcnode-id="4550" instrument_node=""> has launched mass media campaigns to encourage voting prior to elections, as have bodies in Taiwan and the United Kingdom.
</span></p><p data-dcnode-id="4536"><span data-dcnode-id="4548" instrument_node="">Google extensively studied the causes behind low voter turnout in the United States, and argues that one of the key reasons behind lack of voter participation is the so-called "interested bystander".</span><sup class="reference" data-dcnode-id="4545" id="cite_ref-:0_132-0"><a data-dcnode-id="4546" href="#cite_note-:0-132"><span data-dcnode-id="4547" instrument_node="">[132]</span></a></sup><span data-dcnode-id="4544" instrument_node=""> According to Google's study, 48.9% of adult Americans can be classified as "interested bystanders", as they are politically informed but are reticent to involve themselves in the civic and political sphere. This category is not limited to any socioeconomic or demographic groups. Google theorizes that individuals in this category suffer from </span><a data-dcnode-id="4542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voter_apathy" title="Voter apathy"><span data-dcnode-id="4543" instrument_node="">voter apathy</span></a><span data-dcnode-id="4541" instrument_node="">, as they are interested in political life but believe that their individual effect would be negligible.</span><sup class="reference" data-dcnode-id="4538" id="cite_ref-133"><a data-dcnode-id="4539" href="#cite_note-133"><span data-dcnode-id="4540" instrument_node="">[133]</span></a></sup><span data-dcnode-id="4537" instrument_node=""> These individuals often participate politically on the local level, but shy away from national elections.
</span></p><span data-dcnode-id="4535" instrument_node="">
</span><h3 data-dcnode-id="4525"><span class="mw-headline" data-dcnode-id="4533" id="Ineligibility"><span data-dcnode-id="4534" instrument_node="">Ineligibility</span></span><span class="mw-editsection" data-dcnode-id="4526"><span class="mw-editsection-bracket" data-dcnode-id="4531"><span data-dcnode-id="4532" instrument_node="">[</span></span><a data-dcnode-id="4529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D30" title="Edit section: Ineligibility"><span data-dcnode-id="4530" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4527"><span data-dcnode-id="4528" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4524" instrument_node="">
</span><p data-dcnode-id="4515"><span data-dcnode-id="4523" instrument_node="">Much of the above analysis is predicated on voter turnout as measured as a percentage of the voting-age population. In a 2001 article in the </span><a data-dcnode-id="4521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Political_Science_Review" title="American Political Science Review"><span data-dcnode-id="4522" instrument_node="">American Political Science Review</span></a><span data-dcnode-id="4520" instrument_node="">, Michael McDonald and Samuel Popkin argued, that at least in the United States, voter turnout since 1972 has not actually declined when calculated for those eligible to vote, what they term the voting-eligible population.</span><sup class="reference" data-dcnode-id="4517" id="cite_ref-134"><a data-dcnode-id="4518" href="#cite_note-134"><span data-dcnode-id="4519" instrument_node="">[134]</span></a></sup><span data-dcnode-id="4516" instrument_node="">  In 1972, noncitizens and ineligible felons (depending on state law) constituted about 2% of the voting-age population. By 2004, ineligible voters constituted nearly 10%. Ineligible voters are not evenly distributed across the country – 20% of California's voting-age population is ineligible to vote – which confounds comparisons of states. Furthermore, they argue that an examination of the Census Bureau's Current Population Survey shows that turnout is low but not declining among the youth, when the high youth turnout of 1972 (the first year 18- to 20-year-olds were eligible to vote in most states) is removed from the trendline.
</span></p><span data-dcnode-id="4514" instrument_node="">
</span><h2 data-dcnode-id="4504"><span class="mw-headline" data-dcnode-id="4512" id="See_also"><span data-dcnode-id="4513" instrument_node="">See also</span></span><span class="mw-editsection" data-dcnode-id="4505"><span class="mw-editsection-bracket" data-dcnode-id="4510"><span data-dcnode-id="4511" instrument_node="">[</span></span><a data-dcnode-id="4508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D31" title="Edit section: See also"><span data-dcnode-id="4509" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4506"><span data-dcnode-id="4507" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4503" instrument_node="">
