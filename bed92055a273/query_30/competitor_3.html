</span></p><p data-dcnode-id="5483"><span data-dcnode-id="5488" instrument_node="">The season and the day of the week (although many nations hold all their elections on the same weekday) can also affect turnout. Weekend and summer elections find more of the population on holiday or uninterested in politics, and have lower turnouts. When nations set fixed election dates, these are usually midweek during the spring or autumn to maximize turnout. Variations in turnout between elections tend to be insignificant. It is extremely rare for factors such as competitiveness, weather, and time of year to cause an increase or decrease in turnout of more than five percentage points, far smaller than the differences between groups within society, and far smaller than turnout differentials between nations.</span><sup class="reference" data-dcnode-id="5485" id="cite_ref-:4_61-1"><a data-dcnode-id="5486" href="#cite_note-:4-61"><span data-dcnode-id="5487" instrument_node="">[61]</span></a></sup><span data-dcnode-id="5484" instrument_node="">
</span></p><span data-dcnode-id="5482" instrument_node="">
</span><h3 data-dcnode-id="5472"><span class="mw-headline" data-dcnode-id="5480" id="Hereditary_factors"><span data-dcnode-id="5481" instrument_node="">Hereditary factors</span></span><span class="mw-editsection" data-dcnode-id="5473"><span class="mw-editsection-bracket" data-dcnode-id="5478"><span data-dcnode-id="5479" instrument_node="">[</span></span><a data-dcnode-id="5476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D14" title="Edit section: Hereditary factors"><span data-dcnode-id="5477" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5474"><span data-dcnode-id="5475" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5471" instrument_node="">
</span><p data-dcnode-id="5449"><span data-dcnode-id="5470" instrument_node="">Limited research suggests that genetic factors may also be important. Some scholars recently argued that the decision to vote in the United States has very strong </span><a data-dcnode-id="5468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heritability" title="Heritability"><span data-dcnode-id="5469" instrument_node="">heritability</span></a><span data-dcnode-id="5467" instrument_node="">, using </span><a class="mw-redirect" data-dcnode-id="5465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twin_studies" title="Twin studies"><span data-dcnode-id="5466" instrument_node="">twin studies</span></a><span data-dcnode-id="5464" instrument_node=""> of validated turnout in Los Angeles and self-reported turnout in the </span><a class="mw-redirect" data-dcnode-id="5462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Longitudinal_Study_of_Adolescent_Health" title="National Longitudinal Study of Adolescent Health"><span data-dcnode-id="5463" instrument_node="">National Longitudinal Study of Adolescent Health</span></a><span data-dcnode-id="5461" instrument_node=""> to establish that.</span><sup class="reference" data-dcnode-id="5458" id="cite_ref-64"><a data-dcnode-id="5459" href="#cite_note-64"><span data-dcnode-id="5460" instrument_node="">[64]</span></a></sup><span data-dcnode-id="5457" instrument_node=""> They suggest that genetics could help to explain why parental turnout is such a strong predictor of voting in young people, and also why voting appears to be habitual.</span><sup class="reference" data-dcnode-id="5454" id="cite_ref-65"><a data-dcnode-id="5455" href="#cite_note-65"><span data-dcnode-id="5456" instrument_node="">[65]</span></a></sup><sup class="reference" data-dcnode-id="5451" id="cite_ref-66"><a data-dcnode-id="5452" href="#cite_note-66"><span data-dcnode-id="5453" instrument_node="">[66]</span></a></sup><span data-dcnode-id="5450" instrument_node=""> Further, they suggest, if there is an innate predisposition to vote or abstain, this would explain why past voting behavior is such a good predictor of future voter reaction.
</span></p><p data-dcnode-id="5430"><span data-dcnode-id="5448" instrument_node="">In addition to the </span><a data-dcnode-id="5446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twin_study" title="Twin study"><span data-dcnode-id="5447" instrument_node="">twin study</span></a><span data-dcnode-id="5445" instrument_node=""> method, scholars have used gene association studies to analyze voter turnout. Two genes that influence social behavior have been directly associated with voter turnout, specifically those regulating the </span><a data-dcnode-id="5443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serotonin" title="Serotonin"><span data-dcnode-id="5444" instrument_node="">serotonin</span></a><span data-dcnode-id="5442" instrument_node=""> system in the brain via the production of </span><a data-dcnode-id="5440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monoamine_oxidase" title="Monoamine oxidase"><span data-dcnode-id="5441" instrument_node="">monoamine oxidase</span></a><span data-dcnode-id="5439" instrument_node=""> and 5HTT.</span><sup class="reference" data-dcnode-id="5436" id="cite_ref-67"><a data-dcnode-id="5437" href="#cite_note-67"><span data-dcnode-id="5438" instrument_node="">[67]</span></a></sup><span data-dcnode-id="5435" instrument_node=""> However, this study was reanalyzed by separate researchers who concluded these "two genes do not predict voter turnout", pointing to several significant errors, as well as "a number of difficulties, both methodological and genetic" in studies in this field. Once these errors were corrected, there was no longer any statistically significant association between common variants of these two genes and voter turnout.</span><sup class="reference" data-dcnode-id="5432" id="cite_ref-68"><a data-dcnode-id="5433" href="#cite_note-68"><span data-dcnode-id="5434" instrument_node="">[68]</span></a></sup><span data-dcnode-id="5431" instrument_node="">
</span></p><span data-dcnode-id="5429" instrument_node="">
</span><h3 data-dcnode-id="5419"><span class="mw-headline" data-dcnode-id="5427" id="Household_socialization"><span data-dcnode-id="5428" instrument_node="">Household socialization</span></span><span class="mw-editsection" data-dcnode-id="5420"><span class="mw-editsection-bracket" data-dcnode-id="5425"><span data-dcnode-id="5426" instrument_node="">[</span></span><a data-dcnode-id="5423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D15" title="Edit section: Household socialization"><span data-dcnode-id="5424" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5421"><span data-dcnode-id="5422" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5418" instrument_node="">
</span><p data-dcnode-id="5402"><span data-dcnode-id="5417" instrument_node="">A 2018 study in the </span><i data-dcnode-id="5415"><span data-dcnode-id="5416" instrument_node="">American Political Science Review</span></i><span data-dcnode-id="5414" instrument_node=""> found that the parents to newly enfranchised voters "become 2.8 percentage points more likely to vote."</span><sup class="reference" data-dcnode-id="5411" id="cite_ref-69"><a data-dcnode-id="5412" href="#cite_note-69"><span data-dcnode-id="5413" instrument_node="">[69]</span></a></sup><span data-dcnode-id="5410" instrument_node=""> A 2018 study in the journal </span><i data-dcnode-id="5408"><span data-dcnode-id="5409" instrument_node="">Political Behavior</span></i><span data-dcnode-id="5407" instrument_node=""> found that increasing the size of households increases a household member's propensity to vote.</span><sup class="reference" data-dcnode-id="5404" id="cite_ref-70"><a data-dcnode-id="5405" href="#cite_note-70"><span data-dcnode-id="5406" instrument_node="">[70]</span></a></sup><span data-dcnode-id="5403" instrument_node="">
</span></p><p data-dcnode-id="5396"><span data-dcnode-id="5401" instrument_node="">A 2018 PlosOne study found that a "partisan who is married to a co-partisan is more likely to vote. This phenomenon is especially pronounced for partisans in closed primaries, elections in which non-partisan registered spouses are ineligible to participate."</span><sup class="reference" data-dcnode-id="5398" id="cite_ref-71"><a data-dcnode-id="5399" href="#cite_note-71"><span data-dcnode-id="5400" instrument_node="">[71]</span></a></sup><span data-dcnode-id="5397" instrument_node="">
</span></p><span data-dcnode-id="5395" instrument_node="">
</span><h3 data-dcnode-id="5385"><span class="mw-headline" data-dcnode-id="5393" id="Ballot_secrecy"><span data-dcnode-id="5394" instrument_node="">Ballot secrecy</span></span><span class="mw-editsection" data-dcnode-id="5386"><span class="mw-editsection-bracket" data-dcnode-id="5391"><span data-dcnode-id="5392" instrument_node="">[</span></span><a data-dcnode-id="5389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D16" title="Edit section: Ballot secrecy"><span data-dcnode-id="5390" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5387"><span data-dcnode-id="5388" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5384" instrument_node="">
</span><p data-dcnode-id="5378"><span data-dcnode-id="5383" instrument_node="">According to a 2018 study, get-out-the-vote groups in the United States who emphasize ballot secrecy along with reminders to vote increase turnout by about 1 percentage point among recently registered nonvoters.</span><sup class="reference" data-dcnode-id="5380" id="cite_ref-72"><a data-dcnode-id="5381" href="#cite_note-72"><span data-dcnode-id="5382" instrument_node="">[72]</span></a></sup><span data-dcnode-id="5379" instrument_node="">
</span></p><span data-dcnode-id="5377" instrument_node="">
</span><h2 data-dcnode-id="5367"><span class="mw-headline" data-dcnode-id="5375" id="International_differences"><span data-dcnode-id="5376" instrument_node="">International differences</span></span><span class="mw-editsection" data-dcnode-id="5368"><span class="mw-editsection-bracket" data-dcnode-id="5373"><span data-dcnode-id="5374" instrument_node="">[</span></span><a data-dcnode-id="5371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D17" title="Edit section: International differences"><span data-dcnode-id="5372" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5369"><span data-dcnode-id="5370" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5366" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5357"><div class="thumbinner" data-dcnode-id="5358" style="width:222px;"><a class="image" data-dcnode-id="5364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVoters%2527_pamphlet_1952_%28page_23_crop%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="5365" data-file-height="2169" data-file-width="1447" decoding="async" height="330" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Voters%2527_pamphlet_1952_%2528page_23_crop%2529.jpg/220px-Voters%2527_pamphlet_1952_%2528page_23_crop%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Voters%27_pamphlet_1952_%28page_23_crop%29.jpg/330px-Voters%27_pamphlet_1952_%28page_23_crop%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Voters%27_pamphlet_1952_%28page_23_crop%29.jpg/440px-Voters%27_pamphlet_1952_%28page_23_crop%29.jpg 2x" width="220"></a><span data-dcnode-id="5363" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5359"><div class="magnify" data-dcnode-id="5361"><a class="internal" data-dcnode-id="5362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVoters%2527_pamphlet_1952_%28page_23_crop%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="5360" instrument_node="">Page from a 1952 United States voters' pamphlet comparing voter turnout in various countries</span></div></div></div><span data-dcnode-id="5356" instrument_node="">
</span><p data-dcnode-id="5350"><span data-dcnode-id="5355" instrument_node="">Voter turnout varies considerably between nations. It tends to be lower in North America, Asia and Latin America than in most of Europe and Oceania. Based on all parliamentary elections between 1945 and 1997, Western Europe averages a 77% turnout, and South and Central America around 54%.</span><sup class="reference" data-dcnode-id="5352" id="cite_ref-73"><a data-dcnode-id="5353" href="#cite_note-73"><span data-dcnode-id="5354" instrument_node="">[73]</span></a></sup><span data-dcnode-id="5351" instrument_node=""> The differences between nations tend to be greater than those between classes, ethnic groups, or regions within nations. Confusingly, some of the factors that cause internal differences do not seem to apply on a global level. For instance, nations with better-educated populaces do not have higher turnouts. 
There are two main commonly cited causes of these international differences: culture and institutions. However, there is much debate over the relative impact of the various factors.
</span></p><p data-dcnode-id="5327"><span data-dcnode-id="5349" instrument_node="">Indonesia, which before 1998 always had a high percentage of voter (more than 87%) but then dip down to low 70% in the </span><a data-dcnode-id="5347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2014_Indonesian_presidential_election" title="2014 Indonesian presidential election"><span data-dcnode-id="5348" instrument_node="">2014</span></a><span data-dcnode-id="5346" instrument_node="">,</span><sup class="reference" data-dcnode-id="5343" id="cite_ref-74"><a data-dcnode-id="5344" href="#cite_note-74"><span data-dcnode-id="5345" instrument_node="">[74]</span></a></sup><span data-dcnode-id="5342" instrument_node=""> saw a record breaking voters in the </span><a data-dcnode-id="5340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2019_Indonesian_general_election" title="2019 Indonesian general election"><span data-dcnode-id="5341" instrument_node="">2019 Indonesian general election</span></a><span data-dcnode-id="5339" instrument_node=""> with more than 158 million people cast their ballots on the same day,</span><sup class="reference" data-dcnode-id="5336" id="cite_ref-75"><a data-dcnode-id="5337" href="#cite_note-75"><span data-dcnode-id="5338" instrument_node="">[75]</span></a></sup><span data-dcnode-id="5335" instrument_node=""> and has been called "the world's most complex one-day elections".</span><sup class="reference" data-dcnode-id="5332" id="cite_ref-76"><a data-dcnode-id="5333" href="#cite_note-76"><span data-dcnode-id="5334" instrument_node="">[76]</span></a></sup><sup class="reference" data-dcnode-id="5329" id="cite_ref-77"><a data-dcnode-id="5330" href="#cite_note-77"><span data-dcnode-id="5331" instrument_node="">[77]</span></a></sup><span data-dcnode-id="5328" instrument_node="">
</span></p><span data-dcnode-id="5326" instrument_node="">
</span><h3 data-dcnode-id="5316"><span class="mw-headline" data-dcnode-id="5324" id="Cultural_factors"><span data-dcnode-id="5325" instrument_node="">Cultural factors</span></span><span class="mw-editsection" data-dcnode-id="5317"><span class="mw-editsection-bracket" data-dcnode-id="5322"><span data-dcnode-id="5323" instrument_node="">[</span></span><a data-dcnode-id="5320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D18" title="Edit section: Cultural factors"><span data-dcnode-id="5321" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5318"><span data-dcnode-id="5319" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5315" instrument_node="">
</span><p data-dcnode-id="5301"><span data-dcnode-id="5314" instrument_node="">Wealth and literacy have some effect on turnout, but are not reliable measures. Countries such as </span><a data-dcnode-id="5312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angola" title="Angola"><span data-dcnode-id="5313" instrument_node="">Angola</span></a><span data-dcnode-id="5311" instrument_node=""> and </span><a data-dcnode-id="5309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethiopia" title="Ethiopia"><span data-dcnode-id="5310" instrument_node="">Ethiopia</span></a><span data-dcnode-id="5308" instrument_node=""> have long had high turnouts, but so have the wealthy states of Europe. The </span><a data-dcnode-id="5306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="5307" instrument_node="">United Nations</span></a><span data-dcnode-id="5305" instrument_node=""> </span><a data-dcnode-id="5303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_Development_Index" title="Human Development Index"><span data-dcnode-id="5304" instrument_node="">Human Development Index</span></a><span data-dcnode-id="5302" instrument_node=""> shows some correlation between higher standards of living and higher turnout. The age of a democracy is also an important factor. Elections require considerable involvement by the population, and it takes some time to develop the cultural habit of voting, and the associated understanding of and confidence in the electoral process. This factor may explain the lower turnouts in the newer democracies of Eastern Europe and Latin America. Much of the impetus to vote comes from a sense of civic duty, which takes time and certain social conditions that can take decades to develop:
</span></p><span data-dcnode-id="5300" instrument_node="">
</span><ul data-dcnode-id="5285"><li data-dcnode-id="5298"><span data-dcnode-id="5299" instrument_node="">trust in government;</span></li><span data-dcnode-id="5297" instrument_node="">
</span><li data-dcnode-id="5295"><span data-dcnode-id="5296" instrument_node="">degree of partisanship among the population;</span></li><span data-dcnode-id="5294" instrument_node="">
</span><li data-dcnode-id="5292"><span data-dcnode-id="5293" instrument_node="">interest in politics, and</span></li><span data-dcnode-id="5291" instrument_node="">
</span><li data-dcnode-id="5286"><span data-dcnode-id="5290" instrument_node="">belief in the efficacy of voting.</span><sup class="reference" data-dcnode-id="5287" id="cite_ref-78"><a data-dcnode-id="5288" href="#cite_note-78"><span data-dcnode-id="5289" instrument_node="">[78]</span></a></sup></li></ul><span data-dcnode-id="5284" instrument_node="">
</span><p data-dcnode-id="5282"><span data-dcnode-id="5283" instrument_node="">Demographics also have an effect. Older people tend to vote more than youths, so societies where the average age is somewhat higher, such as Europe; have higher turnouts than somewhat younger countries such as the United States. Populations that are more mobile and those that have lower marriage rates tend to have lower turnout. In countries that are highly multicultural and multilingual, it can be difficult for national election campaigns to engage all sectors of the population.
</span></p><p data-dcnode-id="5249"><span data-dcnode-id="5281" instrument_node="">The nature of elections also varies between nations. In the United States, </span><a data-dcnode-id="5279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Negative_campaigning" title="Negative campaigning"><span data-dcnode-id="5280" instrument_node="">negative campaigning</span></a><span data-dcnode-id="5278" instrument_node=""> and character attacks are more common than elsewhere, potentially suppressing turnouts. The focus placed on </span><a data-dcnode-id="5276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Get_out_the_vote" title="Get out the vote"><span data-dcnode-id="5277" instrument_node="">get out the vote</span></a><span data-dcnode-id="5275" instrument_node=""> efforts and mass-marketing can have important effects on turnout. Partisanship is an important impetus to turnout, with the highly partisan more likely to vote. Turnout tends to be higher in nations where political allegiance is closely linked to class, ethnic, linguistic, or religious loyalties.</span><sup class="reference" data-dcnode-id="5272" id="cite_ref-79"><a data-dcnode-id="5273" href="#cite_note-79"><span data-dcnode-id="5274" instrument_node="">[79]</span></a></sup><span data-dcnode-id="5271" instrument_node=""> Countries where </span><a class="mw-redirect" data-dcnode-id="5269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Multiparty" title="Multiparty"><span data-dcnode-id="5270" instrument_node="">multiparty</span></a><span data-dcnode-id="5268" instrument_node=""> systems have developed also tend to have higher turnouts. Nations with a party specifically geared towards the </span><a data-dcnode-id="5266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Working_class" title="Working class"><span data-dcnode-id="5267" instrument_node="">working class</span></a><span data-dcnode-id="5265" instrument_node=""> will tend to have higher turnouts among that class than in countries where voters have only </span><a data-dcnode-id="5263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Big_tent" title="Big tent"><span data-dcnode-id="5264" instrument_node="">big tent</span></a><span data-dcnode-id="5262" instrument_node=""> parties, which try to appeal to all the voters, to choose from.</span><sup class="reference" data-dcnode-id="5259" id="cite_ref-80"><a data-dcnode-id="5260" href="#cite_note-80"><span data-dcnode-id="5261" instrument_node="">[80]</span></a></sup><span data-dcnode-id="5258" instrument_node=""> A four-wave panel study conducted during the 2010 Swedish national election campaign, show (1) clear differences in media use between age groups and (2) that both political social media use and attention to political news in traditional media increase political engagement over time.</span><sup class="reference" data-dcnode-id="5255" id="cite_ref-81"><a data-dcnode-id="5256" href="#cite_note-81"><span data-dcnode-id="5257" instrument_node="">[81]</span></a></sup><span data-dcnode-id="5254" instrument_node=""> It's important to note that social media is not always used effectively and may sometimes have a negative impact on the results of the election. Barack Obama utilized Facebook to his benefit during his first run for presidency and truly jumpstarted the use of social media in political campaigns. We recently saw the utilization of social media and perhaps the negative impacts social media has on campaigns in the recent 2020 election.</span><sup class="reference" data-dcnode-id="5251" id="cite_ref-82"><a data-dcnode-id="5252" href="#cite_note-82"><span data-dcnode-id="5253" instrument_node="">[82]</span></a></sup><span data-dcnode-id="5250" instrument_node="">
</span></p><span data-dcnode-id="5248" instrument_node="">
</span><h3 data-dcnode-id="5238"><span class="mw-headline" data-dcnode-id="5246" id="Institutional_factors"><span data-dcnode-id="5247" instrument_node="">Institutional factors</span></span><span class="mw-editsection" data-dcnode-id="5239"><span class="mw-editsection-bracket" data-dcnode-id="5244"><span data-dcnode-id="5245" instrument_node="">[</span></span><a data-dcnode-id="5242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D19" title="Edit section: Institutional factors"><span data-dcnode-id="5243" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5240"><span data-dcnode-id="5241" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5237" instrument_node="">
</span><p data-dcnode-id="5226"><span data-dcnode-id="5236" instrument_node="">Institutional factors have a significant impact on voter turnout. Rules and laws are also generally easier to change than attitudes, so much of the work done on how to improve voter turnout looks at these factors. Making </span><a data-dcnode-id="5234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Compulsory_voting" title="Compulsory voting"><span data-dcnode-id="5235" instrument_node="">voting compulsory</span></a><span data-dcnode-id="5233" instrument_node=""> has a direct and dramatic effect on turnout. Simply making it easier for candidates to stand through easier </span><a data-dcnode-id="5231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nomination_rules" title="Nomination rules"><span data-dcnode-id="5232" instrument_node="">nomination rules</span></a><span data-dcnode-id="5230" instrument_node=""> is believed to increase voting. Conversely, adding barriers, such as a separate </span><a data-dcnode-id="5228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voter_registration" title="Voter registration"><span data-dcnode-id="5229" instrument_node="">registration</span></a><span data-dcnode-id="5227" instrument_node=""> process, can suppress turnout. The salience of an election, the effect that a vote will have on policy, and its proportionality, how closely the result reflects the will of the people, are two structural factors that also likely have important effects on turnout.
</span></p><span data-dcnode-id="5225" instrument_node="">
</span><h4 data-dcnode-id="5215"><span class="mw-headline" data-dcnode-id="5223" id="Voter_registration"><span data-dcnode-id="5224" instrument_node="">Voter registration</span></span><span class="mw-editsection" data-dcnode-id="5216"><span class="mw-editsection-bracket" data-dcnode-id="5221"><span data-dcnode-id="5222" instrument_node="">[</span></span><a data-dcnode-id="5219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D20" title="Edit section: Voter registration"><span data-dcnode-id="5220" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5217"><span data-dcnode-id="5218" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5214" instrument_node="">
</span><p data-dcnode-id="5212"><span data-dcnode-id="5213" instrument_node="">The modalities of how electoral registration is conducted can also affect turnout. For example, until "rolling registration" was introduced in the United Kingdom, there was no possibility of the electoral register being updated during its currency, or even amending genuine mistakes after a certain cutoff date. The register was compiled in October, would come into force the next February, and would remain valid until the next January. The electoral register would become progressively more out of date during its period of validity, as electors moved or died (people studying or working away from home also often had difficulty voting). This meant that elections taking place later in the year tended to have lower turnouts than those earlier in the year. The introduction of rolling registration where the register is updated monthly has reduced but not eliminated this issue since the process of amending the register is not automatic, and some individuals do not join the electoral register until the annual October compilation process.
</span></p><p data-dcnode-id="5204"><span data-dcnode-id="5211" instrument_node="">Another country with a highly efficient registration process is France. At the age of eighteen, all youth are automatically registered. Only new residents and citizens who have moved are responsible for bearing the costs and inconvenience of updating their registration. Similarly, in </span><a data-dcnode-id="5209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nordic_countries" title="Nordic countries"><span data-dcnode-id="5210" instrument_node="">Nordic countries</span></a><span data-dcnode-id="5208" instrument_node="">, all citizens and residents are included in the official population register, which is simultaneously a tax list, voter registration, and membership in the universal health system. Residents are required by law to report any change of address to the register within a short time after moving. This is also the system in </span><a data-dcnode-id="5206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Germany" title="Germany"><span data-dcnode-id="5207" instrument_node="">Germany</span></a><span data-dcnode-id="5205" instrument_node=""> (but without the membership in the health system).
</span></p><p data-dcnode-id="5198"><span data-dcnode-id="5203" instrument_node="">The elimination of registration as a separate bureaucratic step can result in higher voter turnout. This is reflected in statistics from the United States Bureau of Census, 1982–1983. States that have same-day registration, or no registration requirements, have a higher voter turnout than the national average. At the time of that report, the four states that allowed election day registration were Minnesota, Wisconsin, Maine, and Oregon. Since then, Idaho and Maine have changed to allow same-day registration. North Dakota is the only state that requires no registration.</span><sup class="reference" data-dcnode-id="5200" id="cite_ref-83"><a data-dcnode-id="5201" href="#cite_note-83"><span data-dcnode-id="5202" instrument_node="">[83]</span></a></sup><span data-dcnode-id="5199" instrument_node="">
</span></p><p data-dcnode-id="5189"><span data-dcnode-id="5197" instrument_node="">A 2018 study in </span><i data-dcnode-id="5195"><span data-dcnode-id="5196" instrument_node="">The Journal of Politics</span></i><span data-dcnode-id="5194" instrument_node=""> found that Section 5 of the 1965 Voting Rights Act "increased black voter registration by 14–19 percentage points, white registration by 10–13 percentage points, and overall voter turnout by 10–19 percentage points. Additional results for Democratic vote share suggest that some of this overall increase in turnout may have come from reactionary whites."</span><sup class="reference" data-dcnode-id="5191" id="cite_ref-84"><a data-dcnode-id="5192" href="#cite_note-84"><span data-dcnode-id="5193" instrument_node="">[84]</span></a></sup><span data-dcnode-id="5190" instrument_node="">
</span></p><span data-dcnode-id="5188" instrument_node="">
</span><h4 data-dcnode-id="5178"><span class="mw-headline" data-dcnode-id="5186" id="Compulsory_voting"><span data-dcnode-id="5187" instrument_node="">Compulsory voting</span></span><span class="mw-editsection" data-dcnode-id="5179"><span class="mw-editsection-bracket" data-dcnode-id="5184"><span data-dcnode-id="5185" instrument_node="">[</span></span><a data-dcnode-id="5182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D21" title="Edit section: Compulsory voting"><span data-dcnode-id="5183" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5180"><span data-dcnode-id="5181" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5177" instrument_node="">
</span><link data-dcnode-id="5176" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5172" role="note"><span data-dcnode-id="5175" instrument_node="">Main article: </span><a data-dcnode-id="5173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Compulsory_voting" title="Compulsory voting"><span data-dcnode-id="5174" instrument_node="">Compulsory voting</span></a></div><span data-dcnode-id="5171" instrument_node="">
</span><p data-dcnode-id="5133"><span data-dcnode-id="5170" instrument_node="">A strong factor affecting voter turnout is whether voting is compulsory, as countries with compulsory voting tend to have higher voter turnout rates.</span><sup class="reference" data-dcnode-id="5167" id="cite_ref-IIDEA_85-0"><a data-dcnode-id="5168" href="#cite_note-IIDEA-85"><span data-dcnode-id="5169" instrument_node="">[85]</span></a></sup><span data-dcnode-id="5166" instrument_node=""> For example, in </span><a data-dcnode-id="5164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australia" title="Australia"><span data-dcnode-id="5165" instrument_node="">Australia</span></a><span data-dcnode-id="5163" instrument_node="">, voter registration and attendance at a polling booth have been mandatory since the 1920s, with </span><a data-dcnode-id="5161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2016_Australian_federal_election" title="2016 Australian federal election"><span data-dcnode-id="5162" instrument_node="">the 2016 federal election</span></a><span data-dcnode-id="5160" instrument_node=""> having turnout figures of 91% for the </span><a data-dcnode-id="5158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_House_of_Representatives" title="Australian House of Representatives"><span data-dcnode-id="5159" instrument_node="">House of Representatives</span></a><span data-dcnode-id="5157" instrument_node=""> and 91.9% for the </span><a data-dcnode-id="5155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_Senate" title="Australian Senate"><span data-dcnode-id="5156" instrument_node="">Senate</span></a><span data-dcnode-id="5154" instrument_node="">.</span><sup class="reference" data-dcnode-id="5151" id="cite_ref-86"><a data-dcnode-id="5152" href="#cite_note-86"><span data-dcnode-id="5153" instrument_node="">[86]</span></a></sup><span data-dcnode-id="5150" instrument_node=""> In Singapore, where voting is compulsory, turnout at the </span><a data-dcnode-id="5148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2020_Singaporean_general_election" title="2020 Singaporean general election"><span data-dcnode-id="5149" instrument_node="">2020 general election</span></a><span data-dcnode-id="5147" instrument_node=""> was 95.81%, the highest since </span><a data-dcnode-id="5145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1997_Singaporean_general_election" title="1997 Singaporean general election"><span data-dcnode-id="5146" instrument_node="">1997</span></a><sup class="reference" data-dcnode-id="5142" id="cite_ref-87"><a data-dcnode-id="5143" href="#cite_note-87"><span data-dcnode-id="5144" instrument_node="">[87]</span></a></sup><span data-dcnode-id="5141" instrument_node=""> where it was 95.91%. This was an increase from the record low of 93.06% at the </span><a data-dcnode-id="5139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2011_Singaporean_general_election" title="2011 Singaporean general election"><span data-dcnode-id="5140" instrument_node="">2011 general election</span></a><span data-dcnode-id="5138" instrument_node="">.</span><sup class="reference" data-dcnode-id="5135" id="cite_ref-88"><a data-dcnode-id="5136" href="#cite_note-88"><span data-dcnode-id="5137" instrument_node="">[88]</span></a></sup><span data-dcnode-id="5134" instrument_node="">
</span></p><p data-dcnode-id="5096"><span data-dcnode-id="5132" instrument_node="">Penalties for failing to vote are not always strictly enforced, and sanctions for non-voters are often mild.</span><sup class="reference" data-dcnode-id="5129" id="cite_ref-TNI2013_89-0"><a data-dcnode-id="5130" href="#cite_note-TNI2013-89"><span data-dcnode-id="5131" instrument_node="">[89]</span></a></sup><sup class="reference" data-dcnode-id="5126" id="cite_ref-IIDEA_85-1"><a data-dcnode-id="5127" href="#cite_note-IIDEA-85"><span data-dcnode-id="5128" instrument_node="">[85]</span></a></sup><span data-dcnode-id="5125" instrument_node=""> For instance, while voting is nominally compulsory in </span><a data-dcnode-id="5123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greece" title="Greece"><span data-dcnode-id="5124" instrument_node="">Greece</span></a><span data-dcnode-id="5122" instrument_node=""> for adults up to 70 years of age, no one has ever been prosecuted for failing to vote,</span><sup class="reference" data-dcnode-id="5119" id="cite_ref-90"><a data-dcnode-id="5120" href="#cite_note-90"><span data-dcnode-id="5121" instrument_node="">[90]</span></a></sup><span data-dcnode-id="5118" instrument_node=""> with voter turnout rates reaching as low as 57% in the </span><a data-dcnode-id="5116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/September_2015_Greek_legislative_election" title="September 2015 Greek legislative election"><span data-dcnode-id="5117" instrument_node="">September 2015 Greek legislative election</span></a><span data-dcnode-id="5115" instrument_node="">.</span><sup class="reference" data-dcnode-id="5112" id="cite_ref-91"><a data-dcnode-id="5113" href="#cite_note-91"><span data-dcnode-id="5114" instrument_node="">[91]</span></a></sup><span data-dcnode-id="5111" instrument_node=""> In Australia, people who do not vote are subject to a small fine, which is easily waived if an acceptable excuse for failing to vote is provided.</span><sup class="reference" data-dcnode-id="5108" id="cite_ref-TNI2013_89-1"><a data-dcnode-id="5109" href="#cite_note-TNI2013-89"><span data-dcnode-id="5110" instrument_node="">[89]</span></a></sup><span data-dcnode-id="5107" instrument_node=""> In </span><a data-dcnode-id="5105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bolivia" title="Bolivia"><span data-dcnode-id="5106" instrument_node="">Bolivia</span></a><span data-dcnode-id="5104" instrument_node="">, however, if a voter fails to participate in an election, they may be denied withdrawal of their salary from the bank for three months.</span><sup class="reference" data-dcnode-id="5101" id="cite_ref-92"><a data-dcnode-id="5102" href="#cite_note-92"><span data-dcnode-id="5103" instrument_node="">[92]</span></a></sup><sup class="reference" data-dcnode-id="5098" id="cite_ref-IIDEA_85-2"><a data-dcnode-id="5099" href="#cite_note-IIDEA-85"><span data-dcnode-id="5100" instrument_node="">[85]</span></a></sup><span data-dcnode-id="5097" instrument_node="">
</span></p><span data-dcnode-id="5095" instrument_node="">
</span><h4 data-dcnode-id="5085"><span class="mw-headline" data-dcnode-id="5093" id="Salience"><span data-dcnode-id="5094" instrument_node="">Salience</span></span><span class="mw-editsection" data-dcnode-id="5086"><span class="mw-editsection-bracket" data-dcnode-id="5091"><span data-dcnode-id="5092" instrument_node="">[</span></span><a data-dcnode-id="5089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D22" title="Edit section: Salience"><span data-dcnode-id="5090" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5087"><span data-dcnode-id="5088" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5084" instrument_node="">
</span><p data-dcnode-id="5062"><span data-dcnode-id="5083" instrument_node="">Mark N. Franklin argues that salience, the perceived effect that an individual vote will have on how the country is run, has a significant effect on turnout. He presents </span><a data-dcnode-id="5081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Switzerland" title="Switzerland"><span data-dcnode-id="5082" instrument_node="">Switzerland</span></a><span data-dcnode-id="5080" instrument_node=""> as an example of a nation with low salience. The nation's administration is highly decentralized, so that the federal government has limited powers. The government invariably consists of a coalition of parties, and the power wielded by a party is far more closely linked to its position relative to the coalition than to the number of votes it received. Important decisions are placed before the population in a </span><a data-dcnode-id="5078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Referendum" title="Referendum"><span data-dcnode-id="5079" instrument_node="">referendum</span></a><span data-dcnode-id="5077" instrument_node="">. Individual votes for the federal legislature are thus unlikely to have a significant effect on the nation, which probably explains the low average turnouts in that country. By contrast </span><a data-dcnode-id="5075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malta" title="Malta"><span data-dcnode-id="5076" instrument_node="">Malta</span></a><span data-dcnode-id="5074" instrument_node="">, with one of the world's highest voter turnouts, has a single legislature that holds a near monopoly on political power. Malta has a </span><a data-dcnode-id="5072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Two-party_system" title="Two-party system"><span data-dcnode-id="5073" instrument_node="">two-party system</span></a><span data-dcnode-id="5071" instrument_node=""> in which a small swing in votes can completely alter the executive.</span><sup class="reference" data-dcnode-id="5068" id="cite_ref-93"><a data-dcnode-id="5069" href="#cite_note-93"><span data-dcnode-id="5070" instrument_node="">[93]</span></a></sup><span data-dcnode-id="5067" instrument_node=""> On the other hand, countries with a two-party system can experience low turnout if large numbers of potential voters perceive little real difference between the main parties. Voters' perceptions of fairness also have an important effect on salience. If voters feel that the result of an election is more likely to be determined by fraud and corruption than by the will of the people, fewer people will vote.</span><sup class="reference" data-dcnode-id="5064" id="cite_ref-94"><a data-dcnode-id="5065" href="#cite_note-94"><span data-dcnode-id="5066" instrument_node="">[94]</span></a></sup><span data-dcnode-id="5063" instrument_node="">
</span></p><span data-dcnode-id="5061" instrument_node="">
</span><h4 data-dcnode-id="5051"><span class="mw-headline" data-dcnode-id="5059" id="Proportionality"><span data-dcnode-id="5060" instrument_node="">Proportionality</span></span><span class="mw-editsection" data-dcnode-id="5052"><span class="mw-editsection-bracket" data-dcnode-id="5057"><span data-dcnode-id="5058" instrument_node="">[</span></span><a data-dcnode-id="5055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D23" title="Edit section: Proportionality"><span data-dcnode-id="5056" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5053"><span data-dcnode-id="5054" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5050" instrument_node="">
</span><p data-dcnode-id="5042"><span data-dcnode-id="5049" instrument_node="">Another institutional factor that may have an important effect is proportionality, i.e., how closely the legislature reflects the views of the populace. Under a pure </span><a data-dcnode-id="5047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proportional_representation" title="Proportional representation"><span data-dcnode-id="5048" instrument_node="">proportional representation</span></a><span data-dcnode-id="5046" instrument_node=""> system the composition of the legislature is fully proportional to the votes of the populace and a voter can be sure that of being represented in parliament, even if only from the opposition benches. (However many nations that use a form of proportional representation in elections depart from pure proportionality by stipulating that smaller parties are not supported by a certain threshold percentage of votes cast will be excluded from parliament.) By contrast, a voting system based on single seat constituencies (such as the </span><a class="mw-redirect" data-dcnode-id="5044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plurality_electoral_system" title="Plurality electoral system"><span data-dcnode-id="5045" instrument_node="">plurality system</span></a><span data-dcnode-id="5043" instrument_node=""> used in North America, the UK and India) will tend to result in many non-competitive electoral districts, in which the outcome is seen by voters as a foregone conclusion.
</span></p><p data-dcnode-id="5022"><span data-dcnode-id="5041" instrument_node="">Proportional systems tend to produce multiparty </span><a data-dcnode-id="5039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coalition_government" title="Coalition government"><span data-dcnode-id="5040" instrument_node="">coalition governments</span></a><span data-dcnode-id="5038" instrument_node="">. This may reduce salience, if voters perceive that they have little influence over which parties are included in the coalition.</span><sup class="reference" data-dcnode-id="5035" id="cite_ref-95"><a data-dcnode-id="5036" href="#cite_note-95"><span data-dcnode-id="5037" instrument_node="">[95]</span></a></sup><span data-dcnode-id="5034" instrument_node=""> For instance, after the </span><a class="mw-redirect" data-dcnode-id="5032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2005_German_election" title="2005 German election"><span data-dcnode-id="5033" instrument_node="">2005 German election</span></a><span data-dcnode-id="5031" instrument_node="">, the creation of the executive not only expressed the will of the voters of the majority party but also was the result of political deal-making. Although there is no guarantee, this is lessened as the parties usually state with whom they will favour a coalition after the elections.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5024" style="white-space:nowrap;"><span data-dcnode-id="5030" instrument_node="">[</span><i data-dcnode-id="5026"><a data-dcnode-id="5027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5028" title="This claim needs references to reliable sources. (August 2009)"><span data-dcnode-id="5029" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5025" instrument_node="">]</span></sup><span data-dcnode-id="5023" instrument_node="">
</span></p><p data-dcnode-id="5000"><span data-dcnode-id="5021" instrument_node="">Political scientists are divided on whether proportional representation increases voter turnout, though in countries with proportional representation voter turnout is higher.</span><sup class="reference" data-dcnode-id="5018" id="cite_ref-96"><a data-dcnode-id="5019" href="#cite_note-96"><span data-dcnode-id="5020" instrument_node="">[96]</span></a></sup><sup class="reference" data-dcnode-id="5015" id="cite_ref-97"><a data-dcnode-id="5016" href="#cite_note-97"><span data-dcnode-id="5017" instrument_node="">[97]</span></a></sup><sup class="reference" data-dcnode-id="5012" id="cite_ref-98"><a data-dcnode-id="5013" href="#cite_note-98"><span data-dcnode-id="5014" instrument_node="">[98]</span></a></sup><span data-dcnode-id="5011" instrument_node=""> There are other systems that attempt to preserve both salience and proportionality, for example, the </span><a class="mw-redirect" data-dcnode-id="5009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mixed_member_proportional_representation" title="Mixed member proportional representation"><span data-dcnode-id="5010" instrument_node="">Mixed member proportional representation</span></a><span data-dcnode-id="5008" instrument_node=""> system in </span><a data-dcnode-id="5006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand" title="New Zealand"><span data-dcnode-id="5007" instrument_node="">New Zealand</span></a><span data-dcnode-id="5005" instrument_node=""> (in operation since 1996), Germany, and several other countries. However, these tend to be complex electoral systems, and in some cases complexity appears to suppress voter turnout.</span><sup class="reference" data-dcnode-id="5002" id="cite_ref-99"><a data-dcnode-id="5003" href="#cite_note-99"><span data-dcnode-id="5004" instrument_node="">[99]</span></a></sup><span data-dcnode-id="5001" instrument_node=""> The dual system in Germany, though, seems to have had no negative impact on voter turnout.
</span></p><span data-dcnode-id="4999" instrument_node="">
</span><h4 data-dcnode-id="4989"><span class="mw-headline" data-dcnode-id="4997" id="Ease_of_voting"><span data-dcnode-id="4998" instrument_node="">Ease of voting</span></span><span class="mw-editsection" data-dcnode-id="4990"><span class="mw-editsection-bracket" data-dcnode-id="4995"><span data-dcnode-id="4996" instrument_node="">[</span></span><a data-dcnode-id="4993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D24" title="Edit section: Ease of voting"><span data-dcnode-id="4994" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4991"><span data-dcnode-id="4992" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4988" instrument_node="">
</span><p data-dcnode-id="4959"><span data-dcnode-id="4987" instrument_node="">Ease of voting is a factor in rates of turnout. In the United States and most Latin American nations, voters must go through separate </span><a data-dcnode-id="4985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voter_registration" title="Voter registration"><span data-dcnode-id="4986" instrument_node="">voter registration</span></a><span data-dcnode-id="4984" instrument_node=""> procedures before they are allowed to vote. This two-step process quite clearly decreases turnout. US states with no, or easier, registration requirements have larger turnouts.</span><sup class="reference" data-dcnode-id="4981" id="cite_ref-100"><a data-dcnode-id="4982" href="#cite_note-100"><span data-dcnode-id="4983" instrument_node="">[100]</span></a></sup><span data-dcnode-id="4980" instrument_node=""> Other methods of improving turnout include making voting easier through more available </span><a class="mw-redirect" data-dcnode-id="4978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Absentee_voting" title="Absentee voting"><span data-dcnode-id="4979" instrument_node="">absentee polling</span></a><span data-dcnode-id="4977" instrument_node=""> and improved access to polls, such as increasing the number of possible voting locations, lowering the average time voters have to spend waiting in line, or requiring companies to give workers some time off on voting day.</span><sup class="noprint Inline-Template" data-dcnode-id="4970" style="white-space:nowrap;"><span data-dcnode-id="4976" instrument_node="">[</span><i data-dcnode-id="4972"><a class="mw-redirect" data-dcnode-id="4973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AAvoid_weasel_words" title="Wikipedia:Avoid weasel words"><span data-dcnode-id="4974" title="The material near this tag possibly uses too vague attribution or weasel words. (March 2011)"><span data-dcnode-id="4975" instrument_node="">which?</span></span></a></i><span data-dcnode-id="4971" instrument_node="">]</span></sup><span data-dcnode-id="4969" instrument_node=""> In some areas, generally those where some polling centres are relatively inaccessible, such as </span><a data-dcnode-id="4967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/India" title="India"><span data-dcnode-id="4968" instrument_node="">India</span></a><span data-dcnode-id="4966" instrument_node="">, elections often take several days. Some countries have considered </span><a class="mw-redirect" data-dcnode-id="4964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internet_voting" title="Internet voting"><span data-dcnode-id="4965" instrument_node="">Internet voting</span></a><span data-dcnode-id="4963" instrument_node=""> as a possible solution. In other countries, like </span><a data-dcnode-id="4961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/France" title="France"><span data-dcnode-id="4962" instrument_node="">France</span></a><span data-dcnode-id="4960" instrument_node="">, voting is held on the weekend, when most voters are away from work. Therefore, the need for time off from work as a factor in voter turnout is greatly reduced.
</span></p><p data-dcnode-id="4949"><span data-dcnode-id="4958" instrument_node="">Many countries have looked into Internet voting as a possible solution for low voter turnout.  Some countries like France and Switzerland use Internet voting.  However, it has only been used sparingly by a few states in the US. This is due largely to security concerns.  For example, the US Department of Defense looked into making Internet voting secure, but cancelled the effort.</span><sup class="reference" data-dcnode-id="4955" id="cite_ref-101"><a data-dcnode-id="4956" href="#cite_note-101"><span data-dcnode-id="4957" instrument_node="">[101]</span></a></sup><span data-dcnode-id="4954" instrument_node="">  The idea would be that voter turnout would increase because people could cast their vote from the comfort of their own homes, although the few experiments with Internet voting have produced mixed results.</span><sup class="reference" data-dcnode-id="4951" id="cite_ref-102"><a data-dcnode-id="4952" href="#cite_note-102"><span data-dcnode-id="4953" instrument_node="">[102]</span></a></sup><span data-dcnode-id="4950" instrument_node="">
</span></p><p data-dcnode-id="4939"><span data-dcnode-id="4948" instrument_node="">A 2017 study found that the opening and closing hours of polling places determines the age demographics of turnout: turnout among younger voters is higher the longer polling places are open and turnout among older voters decreases the later polling places open.</span><sup class="reference" data-dcnode-id="4945" id="cite_ref-103"><a data-dcnode-id="4946" href="#cite_note-103"><span data-dcnode-id="4947" instrument_node="">[103]</span></a></sup><span data-dcnode-id="4944" instrument_node=""> A 2021 study that used an experiment in Philadelphia found that postcards by election officials encouraging registrants to vote by mail boosted turnout in the 2020 primary elections by 0.4 percentage points.</span><sup class="reference" data-dcnode-id="4941" id="cite_ref-104"><a data-dcnode-id="4942" href="#cite_note-104"><span data-dcnode-id="4943" instrument_node="">[104]</span></a></sup><span data-dcnode-id="4940" instrument_node="">
</span></p><span data-dcnode-id="4938" instrument_node="">
</span><h4 data-dcnode-id="4928"><span class="mw-headline" data-dcnode-id="4936" id="Voter_fatigue"><span data-dcnode-id="4937" instrument_node="">Voter fatigue</span></span><span class="mw-editsection" data-dcnode-id="4929"><span class="mw-editsection-bracket" data-dcnode-id="4934"><span data-dcnode-id="4935" instrument_node="">[</span></span><a data-dcnode-id="4932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D25" title="Edit section: Voter fatigue"><span data-dcnode-id="4933" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4930"><span data-dcnode-id="4931" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4927" instrument_node="">
</span><link data-dcnode-id="4926" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4922" role="note"><span data-dcnode-id="4925" instrument_node="">Main article: </span><a data-dcnode-id="4923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voter_fatigue" title="Voter fatigue"><span data-dcnode-id="4924" instrument_node="">Voter fatigue</span></a></div><span data-dcnode-id="4921" instrument_node="">
</span><p data-dcnode-id="4908"><span data-dcnode-id="4920" instrument_node="">Voter fatigue can lower turnout. If there are many elections in close succession, voter turnout will decrease as the public tires of participating. In low-turnout Switzerland, the average voter is invited to go to the polls an average of seven times a year; the United States has frequent elections, with two votes per year on average, if one includes all levels of government as well as </span><a data-dcnode-id="4918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Primary_election" title="Primary election"><span data-dcnode-id="4919" instrument_node="">primaries</span></a><span data-dcnode-id="4917" instrument_node="">.</span><sup class="reference" data-dcnode-id="4914" id="cite_ref-105"><a data-dcnode-id="4915" href="#cite_note-105"><span data-dcnode-id="4916" instrument_node="">[105]</span></a></sup><span data-dcnode-id="4913" instrument_node=""> Holding multiple elections at the same time can increase turnout; however, presenting voters with massive multipage ballots, as occurs in some parts of the United States, can reduce turnouts.</span><sup class="reference" data-dcnode-id="4910" id="cite_ref-106"><a data-dcnode-id="4911" href="#cite_note-106"><span data-dcnode-id="4912" instrument_node="">[106]</span></a></sup><span data-dcnode-id="4909" instrument_node="">
</span></p><span data-dcnode-id="4907" instrument_node="">
</span><h4 data-dcnode-id="4897"><span class="mw-headline" data-dcnode-id="4905" id="Voter_pledges"><span data-dcnode-id="4906" instrument_node="">Voter pledges</span></span><span class="mw-editsection" data-dcnode-id="4898"><span class="mw-editsection-bracket" data-dcnode-id="4903"><span data-dcnode-id="4904" instrument_node="">[</span></span><a data-dcnode-id="4901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D26" title="Edit section: Voter pledges"><span data-dcnode-id="4902" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4899"><span data-dcnode-id="4900" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4896" instrument_node="">
</span><p data-dcnode-id="4890"><span data-dcnode-id="4895" instrument_node="">A 2018 study found that "young people who pledge to vote are more likely to turn out than those who are contacted using standard Get-Out-the-Vote materials. Overall, pledging to vote increased voter turnout by 3.7 points among all subjects and 5.6 points for people who had never voted before."</span><sup class="reference" data-dcnode-id="4892" id="cite_ref-107"><a data-dcnode-id="4893" href="#cite_note-107"><span data-dcnode-id="4894" instrument_node="">[107]</span></a></sup><span data-dcnode-id="4891" instrument_node="">
</span></p><p data-dcnode-id="4888"><span data-dcnode-id="4889" instrument_node="">Differing methods of measuring voter turnout can contribute to reported differences between nations.  There are difficulties in measuring both the numerator, the number of voters who cast votes, and the denominator, the number of voters eligible to vote.
</span></p><p data-dcnode-id="4883"><span data-dcnode-id="4887" instrument_node="">For the numerator, it is often assumed that the number of voters who went to the polls should equal the number of ballots cast, which in turn should equal the number of votes counted, but this is not the case.  Not all voters who arrive at the polls necessarily cast ballots. Some may be turned away because they are ineligible, some may be turned away improperly, and some who sign the voting register may not actually cast ballots. Furthermore, voters who do cast ballots may abstain, deliberately voting for nobody, or they may </span><a class="mw-redirect" data-dcnode-id="4885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spoiled_ballot" title="Spoiled ballot"><span data-dcnode-id="4886" instrument_node="">spoil</span></a><span data-dcnode-id="4884" instrument_node=""> their votes, either accidentally or as an act of protest.
</span></p><p data-dcnode-id="4878"><span data-dcnode-id="4882" instrument_node="">In the United Kingdom, the </span><a data-dcnode-id="4880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_Commission_%28United_Kingdom%29" title="Electoral Commission (United Kingdom)"><span data-dcnode-id="4881" instrument_node="">Electoral Commission</span></a><span data-dcnode-id="4879" instrument_node=""> distinguishes between "valid vote turnout", which excludes spoilt ballots, and "ballot box turnout", which does not.
</span></p><p data-dcnode-id="4868"><span data-dcnode-id="4877" instrument_node="">In the United States, it has been common to report turnout as the sum of votes for the top race on the ballot, because not all jurisdictions report the actual number of people who went to the polls nor the number of undervotes or overvotes.</span><sup class="reference" data-dcnode-id="4874" id="cite_ref-eac.gov_108-0"><a data-dcnode-id="4875" href="#cite_note-eac.gov-108"><span data-dcnode-id="4876" instrument_node="">[108]</span></a></sup><span data-dcnode-id="4873" instrument_node=""> Overvote rates of around 0.3 percent are typical of well-run elections, but in Gadsden County Florida, the overvote rate was 11 percent in November 2000.</span><sup class="reference" data-dcnode-id="4870" id="cite_ref-Human_Factors_in_Voting_Technology_109-0"><a data-dcnode-id="4871" href="#cite_note-Human_Factors_in_Voting_Technology-109"><span data-dcnode-id="4872" instrument_node="">[109]</span></a></sup><span data-dcnode-id="4869" instrument_node="">
</span></p><p data-dcnode-id="4823"><span data-dcnode-id="4867" instrument_node="">For the denominator, it is often assumed that the number of eligible voters was well defined, but again, this is not the case. In the United States, for example, there is no accurate registry of exactly who is eligible to vote, since only about 70–75% of people choose to register themselves.</span><sup class="reference" data-dcnode-id="4864" id="cite_ref-110"><a data-dcnode-id="4865" href="#cite_note-110"><span data-dcnode-id="4866" instrument_node="">[110]</span></a></sup><span data-dcnode-id="4863" instrument_node=""> Thus, turnout has to be calculated based on population estimates. Some political scientists have argued that these measures do not properly account for the large number of </span><a data-dcnode-id="4861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_card" title="Green card"><span data-dcnode-id="4862" instrument_node="">Legal Permanent Residents</span></a><span data-dcnode-id="4860" instrument_node="">,</span><sup class="reference" data-dcnode-id="4857" id="cite_ref-111"><a data-dcnode-id="4858" href="#cite_note-111"><span data-dcnode-id="4859" instrument_node="">[111]</span></a></sup><span data-dcnode-id="4856" instrument_node=""> </span><a data-dcnode-id="4854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alien_%28law%29" title="Alien (law)"><span data-dcnode-id="4855" instrument_node="">illegal aliens</span></a><span data-dcnode-id="4853" instrument_node="">, disenfranchised </span><a data-dcnode-id="4851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Felony" title="Felony"><span data-dcnode-id="4852" instrument_node="">felons</span></a><span data-dcnode-id="4850" instrument_node=""> and persons who are considered 'mentally incompetent' in the United States, and that American voter turnout is higher than is normally reported.</span><sup class="reference" data-dcnode-id="4847" id="cite_ref-112"><a data-dcnode-id="4848" href="#cite_note-112"><span data-dcnode-id="4849" instrument_node="">[112]</span></a></sup><span data-dcnode-id="4846" instrument_node=""> Even in countries with fewer restrictions on the franchise, VAP turnout can still be biased by large numbers of non-citizen residents, often under-reporting turnout by as much as 10 percentage points.</span><sup class="reference" data-dcnode-id="4843" id="cite_ref-113"><a data-dcnode-id="4844" href="#cite_note-113"><span data-dcnode-id="4845" instrument_node="">[113]</span></a></sup><span data-dcnode-id="4842" instrument_node="">   Professor </span><a data-dcnode-id="4840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_P._McDonald" title="Michael P. McDonald"><span data-dcnode-id="4841" instrument_node="">Michael P. McDonald</span></a><span data-dcnode-id="4839" instrument_node=""> constructed an estimation of the turnout against the '</span><a class="new" data-dcnode-id="4837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_eligible_population%26action%3Dedit%26redlink%3D1" title="Voting eligible population (page does not exist)"><span data-dcnode-id="4838" instrument_node="">voting eligible population</span></a><span data-dcnode-id="4836" instrument_node="">' (VEP), instead of the 'voting age population' (VAP). For the American presidential elections of 2004, turnout could then be expressed as 60.32% of VEP, rather than 55.27% of VAP.</span><sup class="noprint Inline-Template" data-dcnode-id="4828"><span data-dcnode-id="4829" style="white-space: nowrap;"><span data-dcnode-id="4835" instrument_node="">[</span><i data-dcnode-id="4831"><a data-dcnode-id="4832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ALink_rot" title="Wikipedia:Link rot"><span data-dcnode-id="4833" title="&nbsp;Dead link tagged August 2009"><span data-dcnode-id="4834" instrument_node="">dead link</span></span></a></i><span data-dcnode-id="4830" instrument_node="">]</span></span></sup><sup class="reference" data-dcnode-id="4825" id="cite_ref-114"><a data-dcnode-id="4826" href="#cite_note-114"><span data-dcnode-id="4827" instrument_node="">[114]</span></a></sup><span data-dcnode-id="4824" instrument_node="">
</span></p><p data-dcnode-id="4817"><span data-dcnode-id="4822" instrument_node="">In New Zealand, registration is supposed to be universal. This does not eliminate uncertainty in the eligible population because this system has been shown to be unreliable, with a large number of eligible but unregistered citizens creating inflated turnout figures.</span><sup class="reference" data-dcnode-id="4819" id="cite_ref-115"><a data-dcnode-id="4820" href="#cite_note-115"><span data-dcnode-id="4821" instrument_node="">[115]</span></a></sup><span data-dcnode-id="4818" instrument_node="">
</span></p><p data-dcnode-id="4812"><span data-dcnode-id="4816" instrument_node="">A second problem with turnout measurements lies in the way turnout is computed.  One can count the number of voters, or one can count the number of ballots, and in a vote-for-one race, one can sum the number of votes for each candidate.  These are not necessarily identical because not all voters who sign in at the polls necessarily cast ballots, although they ought to, and because voters may cast </span><a class="mw-redirect" data-dcnode-id="4814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spoiled_ballot" title="Spoiled ballot"><span data-dcnode-id="4815" instrument_node="">spoiled ballots</span></a><span data-dcnode-id="4813" instrument_node="">.
</span></p><span data-dcnode-id="4811" instrument_node="">
</span><h2 data-dcnode-id="4801"><span class="mw-headline" data-dcnode-id="4809" id="Trends_of_decreasing_turnout_since_the_1980s"><span data-dcnode-id="4810" instrument_node="">Trends of decreasing turnout since the 1980s</span></span><span class="mw-editsection" data-dcnode-id="4802"><span class="mw-editsection-bracket" data-dcnode-id="4807"><span data-dcnode-id="4808" instrument_node="">[</span></span><a data-dcnode-id="4805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D27" title="Edit section: Trends of decreasing turnout since the 1980s"><span data-dcnode-id="4806" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4803"><span data-dcnode-id="4804" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4800" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4786"><div class="thumbinner" data-dcnode-id="4787" style="width:771px;"><a class="image" data-dcnode-id="4798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVoter_turnout_by_country.png"><img alt="" class="thumbimage" data-dcnode-id="4799" data-file-height="556" data-file-width="769" decoding="async" height="556" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/8/89/Voter_turnout_by_country.png&amp;raw" width="769"></a><span data-dcnode-id="4797" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4788"><span data-dcnode-id="4796" instrument_node="">Change in voter turnout over time for five selected countries</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4789" style="white-space:nowrap;"><span data-dcnode-id="4795" instrument_node="">[</span><i data-dcnode-id="4791"><a data-dcnode-id="4792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4793" title="Where is this data from? And how were these countries selected? (October 2020)"><span data-dcnode-id="4794" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4790" instrument_node="">]</span></sup></div></div></div><span data-dcnode-id="4785" instrument_node="">
</span><p data-dcnode-id="4769"><span data-dcnode-id="4784" instrument_node="">Since around 1985, there has a gradual decrease in voter turnout globally.</span><sup class="reference" data-dcnode-id="4781" id="cite_ref-116"><a data-dcnode-id="4782" href="#cite_note-116"><span data-dcnode-id="4783" instrument_node="">[116]</span></a></sup><span data-dcnode-id="4780" instrument_node=""> A 2017 </span><a data-dcnode-id="4778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Development_Report" title="World Development Report"><span data-dcnode-id="4779" instrument_node="">World Development Report</span></a><span data-dcnode-id="4777" instrument_node=""> by the </span><a data-dcnode-id="4775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Bank" title="World Bank"><span data-dcnode-id="4776" instrument_node="">World Bank</span></a><span data-dcnode-id="4774" instrument_node=""> stated that election turnout is declining across the globe.</span><sup class="reference" data-dcnode-id="4771" id="cite_ref-117"><a data-dcnode-id="4772" href="#cite_note-117"><span data-dcnode-id="4773" instrument_node="">[117]</span></a></sup><span data-dcnode-id="4770" instrument_node="">
</span></p><p data-dcnode-id="4749"><span data-dcnode-id="4768" instrument_node="">Since the 1980s, voter turnout has been declining in the established democracies.</span><sup class="reference" data-dcnode-id="4765" id="cite_ref-Niemi_and_Weisberg_p._31_1-1"><a data-dcnode-id="4766" href="#cite_note-Niemi_and_Weisberg_p._31-1"><span data-dcnode-id="4767" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4764" instrument_node=""> This trend has been significant in Western Europe, Japan and Latin America. It has been a matter of concern and controversy among political scientists for several decades. During this same period, other forms of political participation have also declined, such as voluntary participation in political parties and the attendance of observers at town meetings. The decline in voting has also accompanied a general decline in civic participation, such as church attendance, membership in professional, fraternal, and student societies, youth groups, and parent-teacher associations.</span><sup class="reference" data-dcnode-id="4761" id="cite_ref-118"><a data-dcnode-id="4762" href="#cite_note-118"><span data-dcnode-id="4763" instrument_node="">[118]</span></a></sup><span data-dcnode-id="4760" instrument_node=""> At the same time, some forms of participation have increased. People have become far more likely to participate in </span><a data-dcnode-id="4758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boycott" title="Boycott"><span data-dcnode-id="4759" instrument_node="">boycotts</span></a><span data-dcnode-id="4757" instrument_node="">, </span><a data-dcnode-id="4755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protest" title="Protest"><span data-dcnode-id="4756" instrument_node="">demonstrations</span></a><span data-dcnode-id="4754" instrument_node="">, and to donate to political campaigns.</span><sup class="reference" data-dcnode-id="4751" id="cite_ref-119"><a data-dcnode-id="4752" href="#cite_note-119"><span data-dcnode-id="4753" instrument_node="">[119]</span></a></sup><span data-dcnode-id="4750" instrument_node="">
</span></p><p data-dcnode-id="4733"><span data-dcnode-id="4748" instrument_node="">Before the late 20th century, </span><a data-dcnode-id="4746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suffrage" title="Suffrage"><span data-dcnode-id="4747" instrument_node="">suffrage</span></a><span data-dcnode-id="4745" instrument_node=""> — the right to vote — was so limited in most nations that turnout figures have little relevance to today. One exception was the United States, which had near universal white male suffrage by 1840. The U.S. saw a steady rise in voter turnout during the century, reaching its peak in the years after the </span><a data-dcnode-id="4743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Civil_War" title="American Civil War"><span data-dcnode-id="4744" instrument_node="">Civil War</span></a><span data-dcnode-id="4742" instrument_node="">. Turnout declined from the 1890s until the 1930s, then increased again until 1960, and then entered another period of decline into the 1990s before increasing again.</span><sup class="reference" data-dcnode-id="4739" id="cite_ref-120"><a data-dcnode-id="4740" href="#cite_note-120"><span data-dcnode-id="4741" instrument_node="">[120]</span></a></sup><span data-dcnode-id="4738" instrument_node=""> In Europe, voter turnouts steadily increased from the introduction of universal suffrage before peaking in the mid-to-late 1960s, with modest declines since then. Globally, voter turnout has decreased by about five percentage points over the last four decades.</span><sup class="reference" data-dcnode-id="4735" id="cite_ref-121"><a data-dcnode-id="4736" href="#cite_note-121"><span data-dcnode-id="4737" instrument_node="">[121]</span></a></sup><span data-dcnode-id="4734" instrument_node="">
</span></p><span data-dcnode-id="4732" instrument_node="">
</span><h3 data-dcnode-id="4722"><span class="mw-headline" data-dcnode-id="4730" id="Reasons_for_decline"><span data-dcnode-id="4731" instrument_node="">Reasons for decline</span></span><span class="mw-editsection" data-dcnode-id="4723"><span class="mw-editsection-bracket" data-dcnode-id="4728"><span data-dcnode-id="4729" instrument_node="">[</span></span><a data-dcnode-id="4726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoter_turnout%26action%3Dedit%26section%3D28" title="Edit section: Reasons for decline"><span data-dcnode-id="4727" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4724"><span data-dcnode-id="4725" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4721" instrument_node="">
