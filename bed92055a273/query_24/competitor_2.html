</span><main class="main-content cell small-12 medium-8" data-dcnode-id="401" id="main"><span data-dcnode-id="888" instrument_node="">
</span><article class="post-65006 post type-post status-publish format-standard has-post-thumbnail hentry category-politics-government category-politics tag-elections tag-voting pub_tag-children-youth-and-environments pub_tag-human-rights pub_tag-journal-of-the-early-republic pub_tag-the-annals-of-the-american-academy-of-political-and-social-science pub_tag-the-north-american-review daily_article_types-curio daily_article_types-long-reads do-drop-cap" data-dcnode-id="403" id="post-65006"><span data-dcnode-id="887" instrument_node="">
</span><div class="entry-content" data-dcnode-id="640"><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="885" instrument_node="">In the wake of the Parkland school shooting in February 2018 at Marjory Stoneman Douglas High School, students across the U.S. have mobilized against gun violence. Newly engaged youth activists from majority-white, economically privileged schools like Stoneman Douglas have </span><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chalkbeat.org/posts/chicago/2018/06/15/five-chicago-student-activists/"><span data-dcnode-id="884" instrument_node="">joined forces</span></a><span data-dcnode-id="882" instrument_node=""> with black youth activists in cities like Chicago, with longstanding traditions of organizing by young people. These students have travelled across the country, providing information to their peers and organizing voter registration drives. And yet, until they turn 18, these engaged citizens can’t cast their own ballots.</span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="879" instrument_node="">Some of them are trying to change that. </span><a data-dcnode-id="877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/story/the-voting-age-should-be-lowered-to-16-years-old"><span data-dcnode-id="878" instrument_node="">Vote16</span></a><span data-dcnode-id="876" instrument_node="">, a national initiative of the civics education group Generation Citizen, is supporting local, youth-led efforts in a number of cities to win 16- and 17-year-olds the right to vote in local elections. In Washington, D.C., the kids are also seeking the vote in presidential elections. Sixteen-year-olds can already vote in local races in three Maryland cities and in Berkeley, California.</span></p><span data-dcnode-id="874" instrument_node="">
</span><h2 data-dcnode-id="869"><em data-dcnode-id="870"><span data-dcnode-id="873" instrument_node="">Audio brought to you by&nbsp;</span><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//curio.io/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="872" instrument_node="">curio.io</span></a></em></h2><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="866"><iframe class="optanon-category-C0004" data-dcnode-id="867" data-src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/522245463%3Fsecret_token%3Ds-SPobt&amp;color=%23ff5500&amp;auto_play=false&amp;hide_related=false&amp;show_comments=true&amp;show_user=true&amp;show_reposts=false&amp;show_teaser=true" frameborder="no" height="166" scrolling="no" width="100%"></iframe></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="864" instrument_node="">In some respects, this campaign echoes the youth activism that led to the enfranchisement of 18-year-olds through the passage of the 26</span><sup data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">th</span></sup><span data-dcnode-id="861" instrument_node=""> Amendment in 1971. But it also raises more fundamental questions about who should have a say in the government, an issue that has been up for debate in the U.S. since its very beginning.</span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">The push to give 18-year-olds the vote started when Congress began drafting them in 1942. In both World Wars, the draft began with men ages 21 and older but expanded to include younger men as the need for service members increased.</span></p><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="855" instrument_node="">As the historian Rebecca de Schweinitz writes in her contribution to&nbsp;</span><a data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nyu.universitypressscholarship.com/view/10.18574/nyu/9781479870011.001.0001/upso-9781479870011-chapter-011"><em data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Age in America</span></em></a><span data-dcnode-id="851" instrument_node="">, the concepts of citizen and soldier have been linked for a long time, with Americans generally viewing 21 as the age for taking up both the gun and the ballot. Between 1942 and 1971, youth activists (and their allies) who wanted to reduce the voting age pointed to young men killed in Europe and the Pacific, and then in Korea and Vietnam, who never had the chance to cast a vote.</span></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="848" instrument_node="">They also emphasized the independence of young adults and their contributions to society, de Schweinitz notes. A majority of 18-to-21-year-olds worked full time and paid taxes, and they did not receive </span><a data-dcnode-id="846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//daily.jstor.org/u-s-sentence-children-life-prison/"><span data-dcnode-id="847" instrument_node="">special protections for children</span></a><span data-dcnode-id="845" instrument_node="">, such as juvenile courts, child labor laws, or the right to public schooling. Literature supporting the lower voting age noted that 18-year-olds “bear the burdens of citizenship” and “behave and resume responsibility as adults.”</span></p><span data-dcnode-id="843" instrument_node="">
</span><aside class="pull-quote center" data-dcnode-id="833"><span data-dcnode-id="842" instrument_node="">
</span><div class="pull-quote__text tweetable" data-dcnode-id="835"><a data-dcnode-id="836" href="#" onclick="window.open('https://twitter.com/intent/tweet?text=The%20history%20of%20American%20politics%20is%2C%20to%20some%20extent%2C%20a%20story%20of%20people%20demanding%20the%20right%20to%20vote.%20https://daily.jstor.org/case-lowering-voting-age/%20via%20%40JSTOR_Daily&amp;related=JSTOR_Daily', '_blank', 'width=500,height=500'); return false;"><span data-dcnode-id="841" instrument_node="">The history of American politics is, to some extent, a story of people demanding the right to vote.</span><span class="icon" data-dcnode-id="837"><svg aria-hidden="true" class="svg-inline--fa fa-twitter fa-w-16" data-dcnode-id="839" data-fa-i2svg="" data-icon="twitter" data-prefix="fab" role="img" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M459.37 151.716c.325 4.548.325 9.097.325 13.645 0 138.72-105.583 298.558-298.558 298.558-59.452 0-114.68-17.219-161.137-47.106 8.447.974 16.568 1.299 25.34 1.299 49.055 0 94.213-16.568 130.274-44.832-46.132-.975-84.792-31.188-98.112-72.772 6.498.974 12.995 1.624 19.818 1.624 9.421 0 18.843-1.3 27.614-3.573-48.081-9.747-84.143-51.98-84.143-102.985v-1.299c13.969 7.797 30.214 12.67 47.431 13.319-28.264-18.843-46.781-51.005-46.781-87.391 0-19.492 5.197-37.36 14.294-52.954 51.655 63.675 129.3 105.258 216.365 109.807-1.624-7.797-2.599-15.918-2.599-24.04 0-57.828 46.782-104.934 104.934-104.934 30.213 0 57.502 12.67 76.67 33.137 23.715-4.548 46.456-13.32 66.599-25.34-7.798 24.366-24.366 44.833-46.132 57.827 21.117-2.273 41.584-8.122 60.426-16.243-14.292 20.791-32.161 39.308-52.628 54.253z" data-dcnode-id="840" fill="currentColor"></path></svg></span></a></div><span data-dcnode-id="834" instrument_node="">
</span></aside><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">If these are the standards to determine who should be allowed to vote, then 16-year-olds surely shouldn’t. But neither should a lot of other people who can. The history of American politics is, to some extent, a story of people demanding the right to vote, even if they hadn’t previously been seen as contributors or competent decision-makers by those who did have the right.</span></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="828" instrument_node="">At the time of the Revolutionary War, the historian Donald Ratcliffe observes, the American colonies commonly </span><a class="jcitation" data-dcnode-id="826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/stable/24768843%3Fmag%3Dcase-lowering-voting-age"><span data-dcnode-id="827" instrument_node="">limited the vote</span></a><span data-dcnode-id="825" instrument_node=""> to those considered to have a “stake in society.” That generally meant owning property, or sometimes paying taxes or serving in the military. Laborers, tenant farmers, enslaved or indentured people, and women were excluded. In some cases, new immigrants and racial or religious minorities were too. But the need to whip up broad support pushed the revolutionaries to extend voting rights further. And the rhetoric of the Declaration of Independence suggests that democratic rights should be based not on voters’ qualifications, but on the basic need for the consent of the governed.</span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">“Radicals began to insist that every adult male deserved the right to vote, and that individual citizens needed the vote to protect them against the possible tyranny of lawmakers,” Ratcliffe writes.</span></p><span data-dcnode-id="820" instrument_node="">
</span><div class="daily_email_signup weekly-digest" data-dcnode-id="756"><span data-dcnode-id="819" instrument_node="">

</span><a data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//about.jstor.org/privacy/" target="_blank"><span data-dcnode-id="777" instrument_node="">Privacy Policy</span></a><span data-dcnode-id="775" instrument_node=""> &nbsp; </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jstor.org/contact-us/" target="_blank"><span data-dcnode-id="774" instrument_node="">Contact Us</span></a><br data-dcnode-id="772"><span data-dcnode-id="771" instrument_node="">
You may unsubscribe at any time by clicking on the provided link on any marketing message.</span></p><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="762" style="display: none !important;"><label data-dcnode-id="766"><span data-dcnode-id="768" instrument_node="">Δ</span><textarea cols="45" data-dcnode-id="767" maxlength="100" name="_wpcf7_ak_hp_textarea" rows="8"></textarea></label><input data-dcnode-id="765" id="ak_js_1" name="_wpcf7_ak_js" type="hidden" value="1650828087255"></p><input class="wpcf7-pum" data-dcnode-id="761" type="hidden" value="{&quot;closepopup&quot;:true,&quot;closedelay&quot;:2,&quot;openpopup&quot;:false,&quot;openpopup_id&quot;:0}"><div aria-hidden="true" class="wpcf7-response-output" data-dcnode-id="760"></div></form></div><span data-dcnode-id="757" instrument_node="">
</span></div><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Arguably, the white men of all classes who increasingly gained the right to vote in the early republic had the potential to become landowners, and might be called upon to serve in the military in active combat. But that couldn’t be said for the women, who gained the vote in 1920, as opponents of women’s suffrage were well aware.</span></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="751" instrument_node="">Writing in 1909, the </span><a class="jcitation" data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/stable/25106424%3Fmag%3Dcase-lowering-voting-age"><span data-dcnode-id="750" instrument_node="">anti-suffragist Mrs. Gilbert F. Jones</span></a><span data-dcnode-id="748" instrument_node=""> hung her argument against giving women the vote mostly on men’s military service. “A Government owes its </span><em data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">existence</span></em><span data-dcnode-id="745" instrument_node=""> not to the obedience of its subjects, not to the taxes it receives, but to the fact that the men of the State will come to the support of the State,” she wrote.</span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="742" instrument_node="">Secondarily, she argued that most women of her day couldn’t really be counted as taxpayers since, even if they worked for pay, they weren’t “economically </span><em data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">in</span></em><span data-dcnode-id="739" instrument_node="">dependent.” She claims: “No woman who is economically </span><em data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">de</span></em><span data-dcnode-id="736" instrument_node="">pendent on her husband or father or whomever may be supporting her may properly be said to pay taxes.”</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Americans eventually came around to the idea that women—even if they didn’t work outside the home or fight in wars—were entitled to an equal say in their government. Today, we wouldn’t deny the vote to an adult simply because of a disability that makes it impossible for them to live alone or because their income is too low to pay federal taxes. So why should we keep 16-year-olds—or even younger kids—from the ballot?</span></p><span data-dcnode-id="731" instrument_node="">
</span><aside class="pull-quote center" data-dcnode-id="721"><span data-dcnode-id="730" instrument_node="">
</span><div class="pull-quote__text tweetable" data-dcnode-id="723"><a data-dcnode-id="724" href="#" onclick="window.open('https://twitter.com/intent/tweet?text=We%20have%20little%2C%20if%20any%2C%20evidence%20to%20show%20that%20the%20political%20preferences%20of%20teenagers%20are%20any%20more%20irrational%20than%20those%20of%20adults.%20https://daily.jstor.org/case-lowering-voting-age/%20via%20%40JSTOR_Daily&amp;related=JSTOR_Daily', '_blank', 'width=500,height=500'); return false;"><span data-dcnode-id="729" instrument_node="">We have little, if any, evidence to show that the political preferences of teenagers are any more irrational than those of adults.</span><span class="icon" data-dcnode-id="725"><svg aria-hidden="true" class="svg-inline--fa fa-twitter fa-w-16" data-dcnode-id="727" data-fa-i2svg="" data-icon="twitter" data-prefix="fab" role="img" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M459.37 151.716c.325 4.548.325 9.097.325 13.645 0 138.72-105.583 298.558-298.558 298.558-59.452 0-114.68-17.219-161.137-47.106 8.447.974 16.568 1.299 25.34 1.299 49.055 0 94.213-16.568 130.274-44.832-46.132-.975-84.792-31.188-98.112-72.772 6.498.974 12.995 1.624 19.818 1.624 9.421 0 18.843-1.3 27.614-3.573-48.081-9.747-84.143-51.98-84.143-102.985v-1.299c13.969 7.797 30.214 12.67 47.431 13.319-28.264-18.843-46.781-51.005-46.781-87.391 0-19.492 5.197-37.36 14.294-52.954 51.655 63.675 129.3 105.258 216.365 109.807-1.624-7.797-2.599-15.918-2.599-24.04 0-57.828 46.782-104.934 104.934-104.934 30.213 0 57.502 12.67 76.67 33.137 23.715-4.548 46.456-13.32 66.599-25.34-7.798 24.366-24.366 44.833-46.132 57.827 21.117-2.273 41.584-8.122 60.426-16.243-14.292 20.791-32.161 39.308-52.628 54.253z" data-dcnode-id="728" fill="currentColor"></path></svg></span></a></div><span data-dcnode-id="722" instrument_node="">
</span></aside><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="719" instrument_node="">That was a question some people were asking in the 1970s. Alongside the more mainstream arguments for giving 18-year-olds the vote, advocates for “children’s liberation” were asking why kids shouldn’t have many of the rights of full citizens. Writing in 1974, </span><a class="jcitation" data-dcnode-id="717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/stable/27878983%3Fmag%3Dcase-lowering-voting-age"><span data-dcnode-id="718" instrument_node="">Patricia M. Wald, an attorney working on issues affecting children</span></a><span data-dcnode-id="716" instrument_node="">, acknowledged that much of the talk about children’s rights “appears, at first glance, far-fetched, wildly impractical, or simply woolyheaded.” But, she added, the previous few decades had shown how quickly politically marginalized groups—African-Americans, women, people with disabilities, and LGBTQ+ people, among others—could overturn assumptions about their fitness for civil rights and political power.</span></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">In modern U.S. society, Wald wrote, adolescents should have at least some control over their choices about work, school, and medical care. The juvenile justice system, for example, should not simply back up parents in conflicts with their children and “randomly threaten a teenager with incarceration if he doesn’t obey his parents.” Instead, the system should be a tool that children can also use “as a counterweight against arbitrary parental authority.”</span></p><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Perhaps most radically, Wald suggested that it might be a good idea to enfranchise children as young as 12 or 13. Even if they haven’t yet completed a high school civics class, she wrote:</span></p><span data-dcnode-id="708" instrument_node="">
</span><blockquote data-dcnode-id="705"><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">[W]e have little, if any, evidence to show that the political preferences of teenagers are any more irrational than those of adults. If the debates in your home track with ours, you may have quite the opposite feeling. The stake of young people in their local and national leaders and leadership is enormous; and the automatic disenfranchisement of young citizens, without empirical justification, is a blatant anomaly in our democracy.</span></p></blockquote><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="703" instrument_node="">In 2011, Daniel Hart and Robert Atkins, childhood studies scholars at Rutgers University, bolstered Wald’s anecdotal observations from her own home with survey data suggesting that, on average, adolescents—</span><a class="jcitation" data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/stable/27895968%3Fmag%3Dcase-lowering-voting-age"><span data-dcnode-id="702" instrument_node="">at least those ages 16 and up—are intellectually mature enough to vote</span></a><span data-dcnode-id="700" instrument_node="">. They looked at a U.S. survey that asked people ages 14 and up about their civic knowledge, their tolerance (should unpopular speech or controversial books be allowed?), their political skills (could they write a letter to a politician, or speak at a public meeting?), and their interest (did they follow the news?). The results showed that 16-year-olds scored as well, or nearly as well, as adults on all the measures. Fourteen-year-olds did as well as their elders on some measures, though they were significantly less knowledgeable about civics and less tolerant.</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Hart and Atkins also insisted that 16-year-olds have different interests from adults that ought to be captured at the ballot box. For example, young people are more supportive of federal funding for public schools and for college financial aid. In addition, they wrote, voting is likely to deepen teenagers’ interest in civic life, helping them to become lifelong political participants.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">It’s true that not all 16-year-olds are rational, politically savvy thinkers. But, as theoretical ethicist John Wall writes, it’s not as though we hold adults to that standard:</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">If a particular level of competence were indeed necessary for suffrage, then one could argue that many schizophrenic, senile, low IQ, or even just thoughtless adults should be denied it; while many intelligent, politically active, or even just ordinary children and youth should not.</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="688" instrument_node="">In a 2014 paper, </span><a class="jcitation" data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/stable/10.7721/chilyoutenvi.24.1.0108%3Fmag%3Dcase-lowering-voting-age"><span data-dcnode-id="687" instrument_node="">Wall argued for the total enfranchisement of children</span></a><span data-dcnode-id="685" instrument_node="">. Drawing on an actual proposal introduced in Germany, he suggested that children should receive the right to vote the moment they’re born, with their parents empowered to act as proxies. Then, whenever children develop the interest and capacity to register, they can claim the vote for themselves. In this system, even very young children would be acknowledged as people with political needs, with their parents recognized as the best judges of what those needs are. Meanwhile, older kids with an interest in politics—like the ones organizing around gun violence across the country—would be able to take part in the political system they live in.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">If the standard we hold for who should vote really is the consent of the governed, there’s no reason they shouldn’t.</span></p><span data-dcnode-id="680" instrument_node="">
