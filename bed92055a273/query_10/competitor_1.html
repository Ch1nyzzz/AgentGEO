</span><h1 aria-flowto="middle-center" class="page-2017-title" data-dcnode-id="456"><span class="page-title" data-dcnode-id="457"><span class="field field--name-title field--type-string field--label-hidden" data-dcnode-id="459" property="schema:name"><span data-dcnode-id="460" instrument_node="">Young Women Leader</span></span><span data-dcnode-id="458" instrument_node="">

</span><section about="/diversity/womens-center/young-women-leaders-program" class="node node--type-page node--view-mode-full" data-dcnode-id="355" data-history-node-id="15041" typeof="schema:WebPage"><span data-dcnode-id="444" instrument_node="">
</span><span class="rdf-meta hidden" content="Young Women Leader" data-dcnode-id="443" property="schema:name"></span><span data-dcnode-id="442" instrument_node="">
</span><div class="node__content" data-dcnode-id="357"><span data-dcnode-id="441" instrument_node="">
</span><div class="field field--name-body field--type-text-with-summary field--label-hidden field__item" data-dcnode-id="359" property="schema:text"><div class="align-right embedded-entity" data-dcnode-id="438" data-embed-button="media_entity_embed" data-entity-embed-display="entity_reference:media_thumbnail" data-entity-embed-display-settings="medium" data-entity-type="media" data-entity-uuid="612cec89-f47a-4f1d-b48d-d8ea0ba0f894" data-langcode="en"><span data-dcnode-id="440" instrument_node=""> </span><img alt="Thumbnail" class="image-style-medium" data-dcnode-id="439" height="416" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ohio.edu/sites/default/files/styles/medium/public/2018-07/IMG_3036%2520%25281%2529.jpg%3Fitok%3DdgYoK46Y&amp;raw" title="Every woman is a superhero" typeof="foaf:Image" width="555"></div><span data-dcnode-id="437" instrument_node="">
</span><h2 class="ohioSubHeader" data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">COVID-19 Response:</span></h2><span data-dcnode-id="434" instrument_node="">
</span><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">The Women’s Center was inspired by COVID-19 to think creatively about how we can still support the amazing young leaders that we have worked with the last few years, as well as new young leaders, as we wait for a return to in-person programming.</span></p><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="426"><span data-dcnode-id="430" instrument_node="">Join our </span><a data-dcnode-id="428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ohio.edu/diversity/womens-center/young-leader-empowerment"><span data-dcnode-id="429" instrument_node="">Young Leader Empowerment Series online modules</span></a><span data-dcnode-id="427" instrument_node="">.&nbsp;The amazing thing about this online component as well is that you can work through these modules with other people in your life. Gather (virtually, of course)&nbsp;friends, family, neighbors, and/or your COVID-19 pod, and explore these important topics in a fun, exciting, new, hands-on learning kind of way!</span></p><span data-dcnode-id="425" instrument_node="">
</span><h2 class="ohioSubHeader" data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Apply to be Mentee</span></h2><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="418"><a data-dcnode-id="420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ohio.edu/sites/default/files/sites/womens-center/files/combined%2520application%2520form%25202019%25202020.pdf"><span data-dcnode-id="421" instrument_node="">Apply to be a mentee</span></a><span data-dcnode-id="419" instrument_node="">&nbsp;(updated applications are forthcoming, depending on COVID-19, guidance from Ohio University and the CDC).&nbsp;Please submit completed applications to Dr. Rittenhouse, guidance counselor at Athens Middle School.</span></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">"Being a YWLP mentor has been a transformative experience in my college career. It taught me how to be an impactful leader and become a positive role model. I've made incredible friendships with my fellow mentors and have had the amazing guidance from faculty of this program. YWLP is one of the strongest groups at Ohio University, and I highly recommend it."&nbsp;~ Ami Scherson.</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">The Young Women Leaders Program builds competence, autonomy and connection. A collaboration between the OHIO University's Women's Center and Athens Middle School, the Young Women's Leader Program (YWLP) is an innovative mentoring program designed to empower middle school girls and college women to be leaders and to make positive choices based on their interactions as mentors and peers.</span></p><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">In 2017, the Women's Center partnered with the Rural and Urban Scholars Pathways (RUSP) Program within the Office of Rural and Underserved Programs at the Heritage College of Osteopathic Medicine on a project in which the mentees use photography to document how they relate to topics discussed in the YWLP program. Through the photos and structured discussion, the mentees help to inform the mentors about their experiences, and directly influence the curriculum for the following year.</span></p><span data-dcnode-id="408" instrument_node="">
</span><h2 class="ohioSubHeader" data-dcnode-id="405"><strong data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Would you like to be a mentee?</span></strong></h2><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="403" instrument_node="">Looking for an opportunity for your 7th or 8th grade Young Woman Leader to build confidence? Applications for the 7th and 8th grade participants at Athens Middle School&nbsp;in the program are available at the start of every academic year. Either visit your guidance counselor or</span><a data-dcnode-id="401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ohio.edu/sites/default/files/sites/womens-center/files/combined%2520application%2520form%25202019%25202020.pdf"><span data-dcnode-id="402" instrument_node=""> download them here</span></a><span data-dcnode-id="400" instrument_node="">&nbsp;and submit them to your guidance counselor or the Women's Center to apply:&nbsp;</span><a data-dcnode-id="398" href="mailto:womenscenter@ohio.edu"><span data-dcnode-id="399" instrument_node="">womenscenter@ohio.edu</span></a><span data-dcnode-id="397" instrument_node="">. Questions? Call us at&nbsp;740-593-9625. We currently serve students only at Athens Middle School.</span></p><span data-dcnode-id="395" instrument_node="">
</span><h2 class="ohioSubHeader" data-dcnode-id="392"><strong data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Would you like to be a mentor? Enroll in PCOE 2301C</span></strong></h2><span data-dcnode-id="391" instrument_node="">
</span><div class="align-right embedded-entity" data-dcnode-id="388" data-embed-button="media_entity_embed" data-entity-embed-display="entity_reference:media_thumbnail" data-entity-embed-display-settings="small_262x262" data-entity-type="media" data-entity-uuid="55db38df-0ef2-427e-ac17-3a6a947bf065" data-langcode="en"><span data-dcnode-id="390" instrument_node=""> </span><img alt="Thumbnail" class="image-style-small-262x262" data-dcnode-id="389" height="197" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ohio.edu/sites/default/files/styles/small_262x262/public/2018-07/DKwYTlwW4AUuXnW.jpg%3Fitok%3DN6gJc-Vs&amp;raw" title="YWLP pair 1" typeof="foaf:Image" width="262"></div><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Mentors are recruited through students in the Fall course "PCOE 2301C": Building Leadership in Adolescent Girls Through Mentorship. This course is offered every Fall, Mondays &amp; Wednesdays 3:05 - 5:05PM. This course is only offered in tandem with a service learning opportunity.</span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Youth mentoring programs have proliferated in recent years. This course identifies why mentoring programs have become popular tools to promote self-esteem amongst adolescents, as well as what effective mentoring looks like. In this service learning course, students will have the opportunity to be paired with local area middle school 7th and 8th graders and Ohio University's Women's Center to conduct the Young Women's Leaders Program.&nbsp;</span></p><span data-dcnode-id="381" instrument_node="">
</span><h3 class="ohioSubHeader" data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Service Learning Component</span></h3><span data-dcnode-id="378" instrument_node="">
</span><ul data-dcnode-id="365"><li data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">This program has a gendered focus in looking at the experiences of women, but is open to anyone who believes they would benefit from a program with that lens. In addition to information on mentoring generally, this course takes a gendered approach to understanding the particular challenges that adolescent girls face both within and outside of school. This is a designated service learning course.</span></li><span data-dcnode-id="375" instrument_node="">
</span><li data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">If students would like to be considered as a mentor, they are required to complete both a BCI and FBI background check. The fee for this totals $62 and should be paid for by the student.</span></li><span data-dcnode-id="372" instrument_node="">
</span><li data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Additionally, the service learning requires that students continue mentoring at the middle school through the spring term on Wednesdays (3:05-5:05), though they will no longer be enrolled in the course.</span></li><span data-dcnode-id="369" instrument_node="">
</span><li data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">For those unable to commit to a year long&nbsp;service learning opportunity, there is an alternate service learning option that will enable students to create workshops that may be used with parents of those in the Young Women Leaders Program.</span></li><span data-dcnode-id="366" instrument_node="">
</span></ul><h2 class="ohioSubHeader" data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">History of the Program</span></h2><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Co-founded in 1997 by Edith "Winx" Lawrence, Ph.D. and Kimberley Roberts, Ph.D., and sponsored by the University of Virginia Women's Center and Curry School of Education, the Young Women Leaders Program (YWLP) is an innovative mentoring program that is designed to empower middle school girls and college women to be leaders of themselves and in their families, schools, and communities. Ohio University participates as a sister-site.&nbsp;</span></p></div><span data-dcnode-id="358" instrument_node="">
</span></div><span data-dcnode-id="356" instrument_node="">
