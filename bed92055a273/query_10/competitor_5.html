</span><h1 class="headline entry-title" data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">50 Notable Social Workers in US History</span></h1><span data-dcnode-id="1634" instrument_node="">

</span><meta content="2018-09-20T15:51:50+00:00" data-dcnode-id="1614" itemprop="datePublished"><span data-dcnode-id="1613" instrument_node="">

</span><div class="content-item-text content-item inner block-double" data-dcnode-id="785" itemprop="text"><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Coming of age as a profession in the early 20th century, social work has become a major force for good in the world over the last 100 years. In areas as diverse as medical social work, school social work, international social work, and so many others, countless leaders and practitioners have helped bring healing and wholeness to those in need. In order to inspire beginning social work professionals, we have brought together a collection of fifty important social workers – 33 women and 17 men – in the history of social work in the United States. Arranged chronologically by date of birth, we hope that these stories of lived service give new social workers a sense of pride as they begin their journey on the path to becoming an important part of the profession themselves.</span></p><span data-dcnode-id="1600" instrument_node="">
</span><h3 data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">#1)&nbsp; Jane Addams (1860-1935)</span></h3><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1593" style="text-align: center;"><img alt="" class="wp-image-2637 aligncenter" data-dcnode-id="1596" height="185" sizes="(max-width: 311px) 100vw, 311px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/addams-e1537219170483.jpg&amp;raw" srcset="https://www.bestmswprograms.com/wp-content/uploads/2018/09/addams-e1537219170483.jpg 520w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/addams-e1537219170483-300x178.jpg 300w" width="311"><a data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loc.gov/static/managed-content/uploads/sites/10/1860/09/sep06-addams.jpg"><span data-dcnode-id="1595" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Jane Addams, known as the “mother” of social work, was a pioneer American settlement activist/reformer, social worker, public philosopher, sociologist, public administrator, protestor, author, and leader in women’s suffrage and world peace. She co-founded, with Ellen Gates Starr, an early settlement house in the United States, Chicago’s Hull House that would later become known as one of the most famous settlement houses in America. In an era when presidents such as Theodore Roosevelt and Woodrow Wilson identified themselves as reformers and social activists, Addams was one of the most prominent reformers of the Progressive Era. She helped America address and focus on issues that were of concern to mothers, such as the needs of children, local public health, and world peace. In her essay “Utilization of Women in City Government,” Jane Addams noted the connection between the workings of government and the household, stating that many departments of government, such as sanitation and the schooling of children, could be traced back to traditional women’s roles in the private sphere. Thus, these were matters of which women would have more knowledge than men, so women needed the vote to best voice their opinions. She said that if women were to be responsible for cleaning up their communities and making them better places to live, they needed to be able to vote to do so effectively. Addams became a role model for middle-class women who volunteered to uplift their communities. She is increasingly being recognized as a member of the American pragmatist school of philosophy, and is known by many as the first woman “public philosopher” in the history of the United States. In 1889 she co-founded Hull House, and in 1920 she was a co-founder for the ACLU. In 1931 she became the first American woman to be awarded the Nobel Peace Prize, and is recognized as the founder of the social work profession in the United States.</span></p><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Addams used Hull House to generate system-directed change, on the principle that to keep families safe, community and societal conditions had to be improved. Starr and Addams developed three “ethical principles” for social settlements: “to teach by example, to practice cooperation, and to practice social democracy, that is, egalitarian, or democratic, social relations across class lines.” Thus Hull House offered a comprehensive program of civic, cultural, recreational, and educational activities and attracted admiring visitors from all over the world. In the 1890s Julia Lathrop, Florence Kelley, and other residents of the house made it a world center of social reform activity. Hull House used the latest methodology (pioneering in statistical mapping) to study overcrowding, truancy, typhoid fever, cocaine, children’s reading, newsboys, infant mortality, and midwifery. Starting with efforts to improve the immediate neighborhood, the Hull House group became involved in city- and statewide campaigns for better housing, improvements in public welfare, stricter child-labor laws, and protection of working women. Addams brought in prominent visitors from around the world, and had close links with leading Chicago intellectuals and philanthropists. In 1912, she helped start the new Progressive Party and supported the presidential campaign of Theodore Roosevelt. Addams’ philosophy combined feminist sensibilities with an unwavering commitment to social improvement through cooperative efforts. Although she sympathized with feminists, socialists, and pacifists, Addams refused to be labeled. This refusal was pragmatic rather than ideological.</span></p><span data-dcnode-id="1586" instrument_node="">
</span><h3 data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">#2) Mary Ellen Richmond (1861–1928)</span></h3><span data-dcnode-id="1583" instrument_node="">
</span><p data-dcnode-id="1581"><img alt="" class="wp-image-2638 aligncenter" data-dcnode-id="1582" height="178" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/richmond-e1537219476514.jpg&amp;raw" width="198"></p><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1577" style="text-align: center;"><a data-dcnode-id="1578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn3.msw.usc.edu/content/06eb21393e1d43f19f125a4cbcb8d816/6-Mary-Richmond-182px.jpg"><span data-dcnode-id="1579" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1576" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Mary Ellen Richmond was one of the first social workers to push for the professionalization and standardization of social work. She is credited with creating the first statement of principles for direct social work practice and is most famous for her speech at the 1897 National Conference of Charities and Correction, where she implored schools to train social workers, calling for standardization in the social work field. Her book Social Diagnosis was one of the first social work books to incorporate scientific principles from law, medicine, psychology, psychiatry and history. Her grandmother was an active women’s suffragist who was well known for being a spiritualist and a radical. She grew up being constantly surrounded by discussions of suffrage, political and social beliefs, and spiritualism. This meant she was handed down good critical thinking skills and a caring attitude toward the poor, needy and disabled.Her grandmother taught the important topics of inequality, suffrage, racial problems, spiritualism, and a variety of liberal, social, and political beliefs. A huge part of her work was dedicated to research in the field of social work, which is shown by her instructions on how to gather information, interview methodologies, establishing contact and conducting conversations. By making this, she became a great factor in the profession of social work, Mary Richmond showed the importance of the education of the social work field.</span></p><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1572" instrument_node="">Richmond identified six sources of power that are available to clients and their social workers: sources within the household, in the person of the client, in the neighborhood and wider social networks, in civil agencies, in private and public agencies. Mary Richmond’s lasting impact on the field of social work comes from her deep commitment to ensuring families received appropriate services. Trained as a friendly visitor, she sought to fully understand the problems poor people dealt with and to train her staff to work with families in a structured manner. She felt that professionalization of the friendly visitors would mean that poor families would receive better treatment and therefore improve their circumstances. Richmond worked directly with families in the charity organization, but also as an advocate on the national stage. In addition to her advocacy to professionalize social work she also helped to lobby for legislation to address housing, health, education, and labor. She paid special attention to issues concerning the welfare of children and women. Some of the most notable contributions Mary Richmond gave was that she fought to obtain legislation for deserted wives and founded the Pennsylvania Child Labor Committee, the Public Charities Associated, the juvenile court, and the Housing Association. A huge part of her work was dedicated to research in the field of social work, which is shown by her instructions on how to gather information, interview methodologies, establishing contact and conducting conversations. </span><sup class="reference" data-dcnode-id="1571" id="cite_ref-5"></sup><span data-dcnode-id="1570" instrument_node="">By making this, she became a great factor in the profession of social work, Mary Richmond showed the importance of the education of the social work field.</span></p><span data-dcnode-id="1568" instrument_node="">
</span><h3 data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">#3)&nbsp; Ida B. Wells (1862-1931)</span></h3><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1563"><img alt="" class="wp-image-2639 aligncenter" data-dcnode-id="1564" height="162" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/wells-e1537220059104.jpg&amp;raw" width="240"></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1559" style="text-align: center;"><a data-dcnode-id="1560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/fd/Mary_Garrity_-_Ida_B._Wells-Barnett_-_Google_Art_Project_-_restoration_crop.jpg/200px-Mary_Garrity_-_Ida_B._Wells-Barnett_-_Google_Art_Project_-_restoration_crop.jpg"><span data-dcnode-id="1561" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Ida B. Wells was an integral part of the progressive movement, using her passion about social justice and her skills as a journalist to fight for racial and gender equality. She was the first person to document the lynching of African Americans, and lead many anti-lynching campaigns. Wells worked with other organizers of her time to create the foundations of modern social work. Wells helped found the Alpha Suffrage League, a group for African-American women who supported the woman’s right to vote, and challenged the National American Woman Suffrage Association because of their exclusion of African American women in their movement. Wells was involved in the founding of the NAACP and The Negro Fellowship League, as well as many other organizations that fought for equality for all Americans. Wells was born into slavery on July 16th, 1862 in Holly Springs, Mississippi to political activist parents. She attended college but never graduated after being expelled from disagreeing with and confronting the college’s president. The oldest of 5 kids, Wells became a teacher to support her siblings after her parents passed away from yellow fever when Ida was only 16. Wells moved with three of her younger siblings to Memphis, Tennessee to attend Fisk University. She worked with reformers and activists such as W.E.B. DuBois, Frederick Douglass, and Mary Church Terrell. Wells’s pamphlets “Southern Horrors: Lynch Law in All Its Phases” and “The Red Record: Tabulated Statistics and Alleged Causes of Lynching in the United States” were the first to present the fact that the lynching of African Americans in the US were not happening as a result of fair trials or as a punishment for a crimes committed, but were a retaliation for blacks trying to gain economic, social, or political empowerment.</span></p><span data-dcnode-id="1555" instrument_node="">
</span><p data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">Wells was the frequent target of threats or violence from whites trying to maintain the status quo. She wrote for the Negro Press and had articles on racism and activism that were printed in black newspapers across the country. In addition to founding the Negro Fellowship League, Wells served as its President and helped to open settlement houses that helped African Americans who were migrating to the North from the South. She was involved in expanding school access for black children, and worked with Jane Addams to oppose the establishment of segregated schools in Chicago. Her work on suffrage and women’s rights led to the establishment of the Alpha Suffrage League. Towards the end of her life, Wells’s activism focused on urban reform in Chicago. She passed away from kidney disease in 1931. Since Wells’ death and with the rise of the mid-century civil rights activism, interest in her life and legacy has grown. Awards have been established in Wells’ name by the National Association of Black Journalists, the Medill School of Journalism at Northwestern University, the Coordinating Council for Women in History,the Investigative Fund, the University of Louisville, and the New York County Lawyers Association, among many others. The Ida B. Wells Memorial Foundation and the Ida B. Wells Museum have also been established to protect, preserve and promote Wells’ legacy. In her hometown of Holly Springs, Mississippi, there is an Ida B.Wells-Barnett Museum in her honor that acts as a cultural center of African American history.</span></p><span data-dcnode-id="1552" instrument_node="">
</span><h3 data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">#4) Edith Abbott (1876-1957)</span></h3><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1547"><img alt="" class="size-full wp-image-2640 aligncenter" data-dcnode-id="1548" height="157" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/abbott-e1537220169342.jpg&amp;raw" width="231"></p><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1543" style="text-align: center;"><a data-dcnode-id="1544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn3.msw.usc.edu/content/da34c798b8504eb2ad12eb4ebb467db7/4-Edith_abbott-297x400.jpg"><span data-dcnode-id="1545" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Edith Abbott was an American economist, social worker, educator, and author. While at the University of Chicago working on her doctorate, she met Professor Sophonisba Breckinridge. She earned her doctorate in political economy in 1905. Later, Abbott and Breckinridge would publish multiple studies while at the Chicago School of Civics and Philanthropy. In 1905, Abbott graduated, receiving her Ph.D. in economics. In 1906, Abbott received a Carnegie Fellowship and continued her studies at University College London, and the London School of Economics. She learned from social reformers Sidney Webb and Beatrice Webb, who championed new approaches to dealing with poverty. The Webbs influenced the direction of Abbott’s career. The Webbs were in favour of repealing the British “poor laws”—which they viewed as demeaning to people in poverty—and they supported establishing programs to eliminate poverty. While studying in London, Abbott lived part of the time in a social reformers’ settlement in a poverty-stricken area of the East End, where she gained experience in social work. Abbott returned to the United States and eventually moved into Jane Addams’s Hull House in Chicago with her sister, Grace. Grace and Edith Abbott became great additions to the reform-minded community as they contributed significantly through their commitment to social reform advocacy and scholarship of statistical research.</span></p><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">The long-lasting professional partnership between Abbott and Breckinridge first started during their years together at the School of Civics and Philanthropy. They shared a common interest in detailed statistical investigations of contemporary social problems which they believed they could use to spark reform advocacy. During the first 12 years of their collaboration at the Department of Social Investigation, they jointly produced The Housing Problem in Chicago (1910–15); The Delinquent Child and the Home (1912); and Truancy and Non-Attendance in the Chicago Schools (1917). In 1927, in dedication to the “scientific and professional interests of social work”, Abbott and Breckinridge jointly established the distinguished academic journal, Social Service Review, published by the University of Chicago Press. With the joint efforts of Abbott and Breckinridge, in 1920, the University of Chicago’s Board of Trustees voted to rename the School the University of Chicago Graduate School of Social Service Administration. It was the first graduate school of social work in the country affiliated with a major research university. Abbott was hired as an associate professor of social economy, and was named dean in 1924. She became the first US woman to become the dean of an American graduate school. Abbott, along with Breckinridge, transformed the field of social work by emphasizing the importance of formal education in social work and the need to include field experience as part of the training. They designed a curriculum that heavily emphasized social statistics as the historical, legal, economic and political root causes of social problems and public welfare efforts. In addition, they fought for the professional status of social work.</span></p><span data-dcnode-id="1536" instrument_node="">
</span><h3 data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">#5) Jeannette Rankin (1880-1973)</span></h3><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1531"><img alt="" class="wp-image-2641 aligncenter" data-dcnode-id="1532" height="182" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/rankin-e1537220376236.jpg&amp;raw" width="243"></p><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1527" style="text-align: center;"><a data-dcnode-id="1528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Jeannette_Rankin_cph.3b13863.jpg/220px-Jeannette_Rankin_cph.3b13863.jpg"><span data-dcnode-id="1529" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Jeannette Rankin was an American politician, social worker, women’s rights advocate, and the first woman to hold federal office in the United States. At the age of 27, Rankin moved to San Francisco to take a job in social work. Confident that she had found her calling, she enrolled in the New York School of Philanthropy in New York City (later part of Columbia University School of Social Work) from 1908 to 1909. She then moved to Spokane, Washington, where, after briefly serving as a social worker, she attended the University of Washington and became involved in the women’s suffrage movement. She helped organize the New York Women’s Suffrage Party and worked as a lobbyist for the National American Woman Suffrage Association (NAWSA). In February 1911, Rankin became the first woman to speak before the Montana legislature, making her case for women’s suffrage. By implementing a grassroots organizing strategy, Rankin was able to urge Montana to pass an amendment granting women unrestricted voting rights in November 1914. Rankin later compared her work in the women’s suffrage movement to the pacifist foreign policy that defined her congressional career. She believed, with many suffragists of the period, that the corruption and dysfunction of the United States government was a result of a lack of feminine participation. As she said at a disarmament conference in the interwar period, “The peace problem is a woman’s problem.”</span></p><span data-dcnode-id="1523" instrument_node="">
</span><p data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Rankin’s campaign for one of Montana’s two at-large House seats in the congressional election of 1916 was financed and managed by her brother Wellington, an influential member of the Montana Republican Party. The campaign involved traveling long distances to reach the state’s widely scattered population. Rankin rallied support at train stations, street corners, potluck suppers on ranches, and remote one-room schoolhouses. She was elected on November 7, by a margin of over 7,500 votes, to become the first female member of Congress. By 1917, women had been granted some form of voting rights in about forty states, but Rankin became a driving force in the movement for unrestricted universal enfranchisement. She was instrumental in the creation of the Committee on Woman Suffrage, and became one of its founding members. In January 1918, the committee delivered its report to Congress,and Rankin opened congressional debate on a Constitutional amendment granting universal suffrage to women. The resolution passed in the House but was defeated by the Senate; in 1919 a similar resolution passed both chambers. After ratification by three-fourths of the states, it became the Nineteenth Amendment to the United States Constitution. In the 1960s and 1970s a new generation of pacifists, feminists, and civil rights advocates found inspiration in Rankin, and embraced her efforts in ways that her own generation had not. The Vietnam War mobilized her once again. In January 1968, the Jeannette Rankin Brigade, a coalition of women’s peace groups, organized an anti-war march in Washington, D.C.—the largest march by women since the Woman Suffrage Parade of 1913.</span></p><span data-dcnode-id="1520" instrument_node="">
</span><h2 data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">#6) Frances Perkins (1880-1965)</span></h2><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1515"><img alt="" class="size-full wp-image-2642 aligncenter" data-dcnode-id="1516" height="183" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/perkins-e1537220630406.jpg&amp;raw" width="216"></p><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1511" style="text-align: center;"><a data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Frances_Perkins_cph.3a04983.jpg/220px-Frances_Perkins_cph.3a04983.jpg"><span data-dcnode-id="1513" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Frances Perkins was an American sociologist and workers-rights advocate who served as the U.S. Secretary of Labor from 1933 to 1945, the longest serving in that position, and the first woman appointed to the U.S. Cabinet. Early on in her career, Perkins dipped her toes into on-the-ground social work early in her career in Chicago by volunteering time at settlement houses, including Hull House. The next year, she witnessed the tragic Triangle Shirtwaist Factory fire, a pivotal event in her life.It was because of this event that Frances Perkins would leave her office at the New York Consumers League and become the executive secretary for the Committee on Safety of the City of New York.Having earned the co-operation and the respect of various political factions, Perkins ably helped put New York in the forefront of progressive reform. She expanded factory investigations, reduced the workweek for women to 48 hours and championed minimum wage and unemployment insurance laws. She worked vigorously to put an end to child labor and to provide safety for women workers. Later in her political career, as a loyal supporter of her friend, Franklin D. Roosevelt, she helped pull the labor movement into the New Deal coalition. She and Interior Secretary Harold L. Ickes were the only original members of the Roosevelt cabinet to remain in office for his entire presidency. During her term as Secretary of Labor, Perkins executed many aspects of the New Deal, including the Civilian Conservation Corps, the Public Works Administration and its successor the Federal Works Agency, and the labor portion of the National Industrial Recovery Act.</span></p><span data-dcnode-id="1507" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">With the Social Security Act she established unemployment benefits, pensions for the many uncovered elderly Americans, and welfare for the poorest Americans. She pushed to reduce workplace accidents and helped craft laws against child labor. Through the Fair Labor Standards Act, she established the first minimum wage and overtime laws for American workers, and defined the standard forty-hour work week. She formed governmental policy for working with labor unions and helped to alleviate strikes by way of the United States Conciliation Service. Perkins dealt with many labor questions during World War II, when skilled labor was vital and women were moving into formerly male jobs. Perkins would have been famous simply by being the first woman cabinet member, but her legacy stems from her additional accomplishments. She was largely responsible for the U.S. adoption of social security, unemployment insurance, federal laws regulating child labor, and adoption of the federal minimum wage. The liturgical calendar of the Episcopal Church honors Perkins with a feast day on May 13. She was the winner of the “Golden Halo” in Lent Madness 2013, an educational tool hosted by Forward Movement Publications featuring the saints of the calendar of the Episcopal Church. In 1967, the Telluride House and Cornell University’s School of Industrial and Labor Relations established the Frances Perkins Memorial Fellowship. In 2015, Perkins was named by Equality Forum as one of their 31 Icons of the 2015 LGBT History Month.</span></p><span data-dcnode-id="1504" instrument_node="">
</span><h3 data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">#7) Grace Coyle (1892-1962)</span></h3><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1499"><img alt="" class="wp-image-2643 aligncenter" data-dcnode-id="1500" height="187" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/coyle.jpg&amp;raw" width="176"></p><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1495" style="text-align: center;"><a data-dcnode-id="1496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/d/d4/Grace_Longwell_Coyle.jpg"><span data-dcnode-id="1497" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Coyle received her bachelor’s degree in 1914 from Wells Lake College, a certificate from the New York School of Philanthropy 1915, and she earned a master’s degree in economics in 1928 and a doctoral degree in sociology from Columbia University in 1931. Grace Coyle is known for her development of the scientific approach to group work practice. Her work, teaching, and writing experiences were related to her interest in group work. Her early activities included work in settlement houses and the YWCA. From 1934 to 1962 she taught at the School of Applied Social Sciences at Western Reserve University in Cleveland developing the first group work course to be taught at that university. Grace Coyle made a major contribution through her speeches and writings to acceptance of group work as a component of social work. She felt that group work and case work were compatible and complementary, each would gain by being integrated with the other, and the result would be better service to clients. In her view, group workers required greater awareness of issues of personality and family relationships. Through familiarity with case work the group workers would understand the how a group experience could have therapeutic potential. Case workers needed more understanding of group dynamics and leisure activities. In 1935 she wrote, “One of the primary functions of group work is the attempt to build on the inevitably social interests both of children and adults a type of group experience which will be individually developing and socially useful. By providing within the group work agency for experience in group management, in cooperation for a common interest, in collective behavior, the agency can help its members to discover how to take their place in the organizational life of the community.”</span></p><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1471"><span data-dcnode-id="1490" instrument_node="">Grace Coyle was the president of the National Conference of Social Work in 1940, the president of the American Association of Social Workers in 1942 and the Council on Social Work Education from 1958 to 60. Her many writings include </span><i data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Social Process in Organized Groups</span></i><span data-dcnode-id="1487" instrument_node=""> 1930, </span><i data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Studies in Group Behavior</span></i><span data-dcnode-id="1484" instrument_node=""> 1937, </span><i data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Group Experiences and Democratic Values</span></i><span data-dcnode-id="1481" instrument_node=""> 1947, </span><i data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Group Work with American Youth</span></i><span data-dcnode-id="1478" instrument_node=""> 1948, </span><i data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Social Science in the Professional Education of Social Workers</span></i><span data-dcnode-id="1475" instrument_node=""> 1958. Coyle said in a 1946 paper presented to the members of the American Association for the Study of Group Work at the National Conference of Social Work in Buffalo, “My own hope is that the emerging definition of social work may define it as involving the conscious use of social relations in performing certain community functions, such as child welfare, family welfare or health services, recreation and informal education. Case work, group work, and community organization have this common factor, that they are all based on understanding human relations. While the specific relations used in each are different, the underlying philosophy and approach are the same: a respect for personality and a belief in democracy. This we share with case workers and expert community organization people. It is for this reason that I believe group work as a method falls within the larger scope of social work </span><i data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">as a method</span></i><span data-dcnode-id="1472" instrument_node=""> and as defined above.” A collection of her manuscripts, course outlines and correspondence is located in the archives of Case Western University in Cleveland, Ohio.</span></p><span data-dcnode-id="1470" instrument_node="">
</span><h4 data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">#8) Katherine Brownwell Oettinger (1903-1997)</span></h4><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1465"><img alt="" class="wp-image-2644 aligncenter" data-dcnode-id="1466" height="169" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/oettinger-e1537221531991.jpg&amp;raw" width="248"></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1461" style="text-align: center;"><a data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cb100.acf.hhs.gov/sites/all/themes/danland/images/timeline/timeline_photos/1950-1959/1957%2520Katherine%2520Oettinger.jpg"><span data-dcnode-id="1463" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1460" instrument_node="">
</span><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Kay Oettinger was a devoted wife, loving mother, and hard working professional woman. From the days at Smith College, when her debating team became the first to challenge a team from a men’s college, to her efforts on behalf of international population control, she was always in the forefront of innovation and progress. Her administrative talents were evident early on. Entering Smith College in 1921, she opened her own tea room and also became business manager of the literary magazine. She was a member of Phi Beta Kappa and, on a Rockefeller scholarship, entered the Smith College School of Social Work in 1926. What took place in her career development is exciting and was always significant for widening the horizons of the profession of social welfare. Her first position was with the Charity Organization Society in New York City which probably provided fodder for her lifetime concern for families and children. She left there to take on an assignment as mental health consultant for a visiting nurse association, a new idea subsequently developed in depth and documented by Gerald Caplan when he did his famous work on consultation in Israel and at the Harvard School of Public Health and Harvard Medical School. She was Chief Social Worker for the Department of Mental Health in Pennsylvania. She then moved on to become Dean of the Boston University School of Social Work. As Dean, she exercised her skills in management.</span></p><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1456" instrument_node="">She used figures, particularly the budget, to advocate for more funds for the educational program for social workers entering the mental health field. She participated in curriculum development nationally and in her own school and emphasized interdisciplinary training. With her background, it is not surprising that Kay received the call to serve her country on the national level. In 1957, she became Chief of the United States Children’s Bureau, where she remained until 1968. For one year, she was the Deputy Assistant for HEW. She was an effective advocate on the “Hill” which enabled her to increase the budget and strengthen the programs. She became an enthusiastic worker on the international scene as the US representative to UNICEF. Upon her retirement, she took at position with the International Association of Schools of Social Work, where she pioneered a worldwide program to promote the training of social workers for more effective service in the fields of population control and family planning. In 1984, the Schlessinger Library selected her as one of its subjects for a project entitled “Women in the Federal Government.” She is the author of three books: </span><i data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">Population and Family Planning — Analytical Abstracts for Social Work Educators and Related Disciplines; Social Work in Action: An International Perspective on Population and Family Planning</span></i><span data-dcnode-id="1453" instrument_node="">; and </span><i data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">“Not My Daughter” Facing up to Adolescent Pregnancy.</span></i></p><span data-dcnode-id="1449" instrument_node="">
</span><h3 data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">#9) Harriet Rinaldo (1906-1981)</span></h3><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1444"><img alt="" class="size-full wp-image-2645 aligncenter" data-dcnode-id="1445" height="160" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/rinaldo.jpg&amp;raw" width="114"></p><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1440" style="text-align: center;"><a data-dcnode-id="1441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/0/04/Harriett_Rinaldo.jpg"><span data-dcnode-id="1442" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Harriett Rinaldo was a social worker known for creating personnel standards, rating procedures and recruitment procedures for the Veterans Administration Social Work Service. The standards and procedures she created became a model for the federal government and other social work agencies. She was the first to identify the term “clinical social work” as a specialty standard with its own personnel specifications. Rinaldo was born in Sioux City, Iowa in 1906 and lived in Wheaton, Illinois until she started attending Smith College in 1923. Rinaldo graduated with honors in 1927. She continued at Smith and received a master’s degree in Social Science in 1929. Her thesis was entitled, “The altering of family attitudes toward the child with prolonged illness as a causative factor of behavior problems : a study of fifty cases selected at the Institute for Child Guidance, New York City, from Child Guidance Clinic Records to weigh the importance as factors influencing behavior problems of prolonged illness on a child as compared to the effect of the illness in altering parental and siblings attitudes.”</span></p><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">After receiving a social work degree she worked for the Children’s Aid Society in Philadelphia. She later transferred to the county welfare agency in Philadelphia. In 1943 she moved to New York to work for the Social Security Agency. In 1946 she moved to Washington, DC to join the Veterans Administration where she worked until her retirement in 1972. At the Veterans Administration, Rinaldo recruited hundreds of social workers to support the post World War II VA Medical Services expansion. In this position she established job standards and definitions which later influenced Civil Service requirements for other federal agencies, and for state and local health care programs. Rinaldo served on various committees at the National Association of Social Workers and was a key member of the Committee on the Study of Competence from 1963 to 1970. She was on the Academy of Certified Social Workers (ACSW) Board that developed the first examinations for the ACSW. She was also active in the American Public Welfare Association and the Council on Social Work Education.</span></p><span data-dcnode-id="1433" instrument_node="">
</span><h3 data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">#10) Helen Harris Perlman (1906-2004)</span></h3><span data-dcnode-id="1430" instrument_node="">
</span><p data-dcnode-id="1428"><img alt="" class="wp-image-2646 aligncenter" data-dcnode-id="1429" height="157" loading="lazy" sizes="(max-width: 217px) 100vw, 217px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/perlman-e1537222058411.jpg&amp;raw" srcset="https://www.bestmswprograms.com/wp-content/uploads/2018/09/perlman-e1537222058411.jpg 151w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/perlman-e1537222058411-150x109.jpg 150w" width="217"></p><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1424" style="text-align: center;"><a data-dcnode-id="1425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ssacentennial.uchicago.edu/img/feature-perlman.jpg"><span data-dcnode-id="1426" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Helen Perlman was a pioneering figure in social work who enriched the field of social work with many contributions spanning several decades. She graduated in 1926 from the University of Minnesota with a B.A. in English. &nbsp;At that time it was difficult for Jewish graduates to obtain a job in the humanities so she found a job working as a summer caseworker for the Chicago Jewish Service Bureau. She has said that “a whole world opened up to me”, “I had no idea of the kinds of trouble people had. I found that in many cases, families faced the same kind of problems and conflicts that one encountered in the great works of literature.” She joined the faculty of the School of Social Service Administration, University of Chicago, in 1945. She later became the Distinguished Service Professor Emerita. When she turned 90 the School of Social Service announced the establishment of the Helen Harris Perlman Visiting Professorship in the School. Perlman was a sought after speaker throughout her career, even when she was a student at the New York School of Social Work, and in later years universities in the United States, Europe, Asia, and elsewhere.</span></p><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1419" instrument_node="">She is probably best known for her work carrying forward and integrating concepts that emerged from diverging schools of psychoanalytic thought. Her most widely read work, which she began writing on not long after she joined the faculty in Chicago was </span><i data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Social Casework: A Problem Solving Process</span></i><span data-dcnode-id="1416" instrument_node="">, which is still used as a textbook in schools of social work. Her thinking diverged markedly from the then-current popularity of long-term psychotherapy. She didn’t think that people always needed in-depth therapy. Today this concept of short-term therapy is a common form of help. After writing </span><i data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Social Casework</span></i><span data-dcnode-id="1413" instrument_node=""> she wrote more than 75 articles and seven other books including </span><i data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">So You Want To Be A Social Worker, The Heart Of Helping People</span></i><span data-dcnode-id="1410" instrument_node="">, and edited the book, </span><i data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">Helping: Charlotte Towle On Social Casework</span></i><span data-dcnode-id="1407" instrument_node="">. She also wrote fiction, poetry, and stories, including the short story “</span><i data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Twelfth Summer</span></i><span data-dcnode-id="1404" instrument_node="">‘ which was published in the NEW YORKER magazine in the 1950s. She was active throughout her career in professional and educational organizations related to social work and was honored by the National Association of Social Work, the Association of Clinical Social Workers, and the Council of Social Work Education, and received honorary degrees from Boston University, the University of Southern Florida and her alma mater the University of Minnesota.</span></p><span data-dcnode-id="1402" instrument_node="">
</span><h3 data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">#11) Eulene Hawkins (1906-1999)</span></h3><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1397"><img alt="" class="wp-image-2647 aligncenter" data-dcnode-id="1398" height="182" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/hawkins.jpg&amp;raw" width="162"></p><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1393" style="text-align: center;"><a data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//encrypted-tbn0.gstatic.com/images%3Fq%3Dtbn%3AANd9GcS0B4k1YJM4j89AGNl9VPAgu89kqSTIr4bwH-nwr9iTsNhjuuVy"><span data-dcnode-id="1395" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">Eulene Hawkins provided sixty years of leadership to social service programs. She worked in local, state, federal, private, and public welfare settings. Her outstanding service has been recognized by awards and citations from the Department of Health, Education and Welfare now Health and Human Services. &nbsp;Hawkins was a very versatile social worker and able to provide leadership in a variety of settings and areas. Her period in Alabama from 1932 to 1942 with the University Child Welfare Department, the only social agency of the county offered a home for numerous federal programs. This was a beginning of a county unemployment office, the FRA, an Alabama farm administration. During this period the state and county public welfare were established in accordance with the Social Security Act. Her employment covered a broad range of jobs and activities. As mentioned earlier she worked from 1932 to 1942 with the Child Welfare Department in Alabama, she worked for Red Cross and served as the Director of Home Services in the Washington, D.C. for 19 years.</span></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">In Atlanta, Hawkins oversaw the administration of Title 707 of the Social Security Act which provided undergraduate and graduate funds to schools of social work and also stipends to people. She was particularly recognized for her work in improving minority faculty in schools and in the development of minority stipends particularly with African­-American social workers. She received five different awards from the American Red Cross, the Southeastern Regional Manpower Coordinating Committee, Florida State Advisory Committee Social Work Education Planning Project, East Tennessee State University, Alabama State University, the University of Alabama School of Social Work and the Howard D. Dundee Distinguished Service Award The Alabama Legislature Resolution of Commendation established the Eu/ene Hawkins Social Work award at Tri-State University. Hawkins also received the state of Alabama Department of Pensions and Security now Human Resources Retirement Citation, the Alabama of Conference of Social Work Social Worker of the Year, NASW award, Social Worker of the Year, NASW Alabama chapter, Lifetime Achievement award from NASW, 1991, and the Lifetime Achievement award from Montgomery and Seniors of Achievement the Montgomery Area Council on Aging.</span></p><span data-dcnode-id="1386" instrument_node="">
</span><h3 data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">#12) Margaret Daniel (1908-1997)</span></h3><span data-dcnode-id="1383" instrument_node="">
</span><p data-dcnode-id="1381"><img alt="" class="alignnone size-full wp-image-2704 aligncenter" data-dcnode-id="1382" height="152" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/daniel.jpg&amp;raw" width="123"></p><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Margaret Daniel’s career is synonymous with the beginnings of public welfare in the 1930s and the establishment of professional social work as a career service within the Veteran’s Administration following World War II. Daniel selected social work as her major as an undergraduate at the University of Minnesota where she received her bachelor of science degree in 1931. Until 1941, she participated in the early years of child welfare and public welfare in New York, New Mexico, and Missouri. Following completion of the graduate program at the New York School (Columbia University), and award of the master of social work degree in 1942, she served oversees as a supervisor of the social services in the Armed Service Hospitals in India, China, and Burma. At the end of World War II, her background and demonstrated leadership as a professional social worker made her a natural for pioneer work with the Veteran’s Administration, which was undergoing extensive reformation with new and exciting opportunities for professional service. Beginning in 1946 as a Social Work Consultant in the St. Louis Branch Office she served first a four state and later an eight state area. Later, Daniel moved to the Central Office as Education Chief within the Social Work Service.</span></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1373"><span data-dcnode-id="1376" instrument_node="">During this period, the VA was regarded as a standard bearer for professional social work and Daniel was a leader in establishing educational and experience guidelines for the professional staff. Working with schools of social work, she helped to make VA field work assignments a bastion of excellent supervision and good practice. In 1964, Daniel moved from the VA to the Training Branch of the National Institute of Mental Health (NIMH) where she remained until her retirement in 1973. This was a period when NIMH was the source of significant support for students and faculty in graduate schools of social work, not only for training for mental health, but for all professional social work through the inclusion of mental health content in the generic curriculum. Margaret Daniel left her mark on both social work education and practice through her pioneer work at the VA and her continued contribution at NIMH to high standards in social work education. Throughout her career she served on countless social work boards and committees and was particularly active in the Council on Social Work Education and the National Association of Social Workers</span><i data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">.</span></i></p><span data-dcnode-id="1372" instrument_node="">
</span><h3 data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">#13) Martha Branscombe (1910 -1997)</span></h3><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1367"><img alt="" class="wp-image-2650 aligncenter" data-dcnode-id="1368" height="142" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/branscombe-e1537282968558.jpg&amp;raw" width="197"></p><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1363" style="text-align: center;"><a data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//storage.lib.uchicago.edu/ucpa/series1/derivatives_series1/apf1-02201t.jpg"><span data-dcnode-id="1365" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">From her first employment in 1931 as an Assistant to the Speaker, Alabama House of Representatives, to her last major assignments from 1954 to 1965 as Chief of United Nations Social Services Division, Dr. Martha Branscombe has been a leader in state, national, and international social welfare activities. During the depression years, she served the Alabama Relief Administration as County Director of the Department of Social Welfare as a Regional Advisor. She moved on in 1936 to work with the Tennessee Valley Authority as Consultant on Family Relations to the Land Management Division. Having decided upon social work as her professional career, she took time out to earn both her master’s and PhD at the University of Chicago. While at Chicago, she had the good fortune of serving as an Assistant to Professor Sophonisba P. Breckinridge and Dean Edith Abbott. In 1942, the U.S. Children’s Bureau, then in the Department of Labor, took on the task of preliminary planning for post-War relief for children. Dr. Branscombe was recruited as a Consultant on International Planning. When the Children’s Bureau initiative led to planning for international relief in the Department of State, Dr. Branscombe was loaned to the Department as an assistant to the Director. This activity, in turn, resulted in the creation in 1943 of the United Nations Relief and Rehabilitation Administration.</span></p><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">At the first meeting to organize the agency, she served as an assistant to the U.S. delegation. She then joined UNRRA Headquarters in Washington, DC to participate in organizing and staffing the Social Welfare Section. Early in 1944, as the European Office of UNRRA was being organized in London, she was assigned to assist in establishing the Social Service Division and became temporary head of the Child Welfare Section. Following the end of World War II in Europe, Dr. Branscombe returned to Washington headquarters as Chief of Child Welfare. In 1946, she moved on to direct the European operations of the U.S. Committee for the Care of European Children. As Director of European Operations for the U.S. Committee, Dr. Branscombe was based in Frankfurt, Germany, and worked in close cooperation with U.S. and Allied Military Forces and UNRRA. As a fitting capstone to her distinguished career, Dr. Branscombe joined the United Nations Secretariat in New York City as Chief of the Social Services Division in the Department of Social Affairs. In this position from 1954 to 1965, her leadership had far-reaching results, particularly in the new nations of the Third World. After she left the United Nations, Dr. Branscombe returned to Washington to take on a series of Senior Advisory positions, first with the Head Start Program, then with the Department of State, and finally, with the Vietnam Bureau in the Agency for International Development.</span></p><span data-dcnode-id="1356" instrument_node="">
</span><h3 data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">#14) Alfred Neumann (1910-2002)</span></h3><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><img alt="" class="wp-image-2658 aligncenter" data-dcnode-id="1352" height="177" loading="lazy" sizes="(max-width: 250px) 100vw, 250px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/neuman-e1537286726502.jpg&amp;raw" srcset="https://www.bestmswprograms.com/wp-content/uploads/2018/09/neuman-e1537286726502.jpg 406w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/neuman-e1537286726502-300x212.jpg 300w" width="250"></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1347" style="text-align: center;"><a data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.gettyimages.com/photos/dr-alfred-neumann-jewish-family-childrens-service-picture-id162099340%3Fk%3D6%26m%3D162099340%26s%3D612x612%26w%3D0%26h%3DEvMSa5TJxkoFvzOs3i50S9JXrN_vGxPEwi15rUXhDhw%3D"><span data-dcnode-id="1349" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1346" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">For almost 30 years Fred Neumann was executive director of the Jewish Family and Children’s Service of Colorado (1948 – 1976). His pioneering work included reorganization of the entire social service program of the agency, organization of family counseling, developments of programs in child placement and adoptions and immigration services. He organized the vocational guidance service including psychological and vocational testing and organized the utility workshop of Denver, a sheltered workshop for the rehabilitation of social and emotionally mentally handicapped Jewish and non-Jewish clients from the entire Rocky Mountain area. Throughout his work with the Denver agency and as a consultant with many other agencies throughout the country he tried to find better ways to resettle displaced persons and to help them deal with individual and family problems. Fred Neumann was born in Vienna, Austria. He received a doctorate juris prudence degree from the University of Vienna in 1934 and until 1937 worked in the criminal and civil courts in Vienna. Following Hitler’s occupation of Austria, he was a counselor in the demogration department in Vienna and was instrumental in organizing the relief giving to needy Jewish families, furnishing of emergency housing facilities, setting up of retraining programs and helping with immigration problems in the Jewish community.</span></p><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Sometime after 1938, he was able to leave Vienna and eventually escape to the United States. In 40-41 he went to the school of Social Work at Columbia University and received his masters in 1941. Before going to Denver, he worked with the Jewish Social Service Association in New York City and with the Youth Bureau in Cleveland, Ohio and with Jewish Family and Children’s Services of Minneapolis, Minnesota. He took post graduate training and family and marital counseling at the University of Pennsylvania School of Social Work and at the University of Minnesota School of Social Work. He continued a small private practice after his retirement from the Denver agency. In 1976 Dr. Neumann moved to Sun City, Arizona and became involved with a variety of social agencies and was a board member of Interface Services and of the Jewish Family Service in Phoenix, Arizona. In 1982 he was the recipient of federation service cross 1st class from the Federal Republic of Germany. June 30, 1982 was by the proclamation of the governor of Colorado, the “Dr. Alfred M. Neumann Day”. Another of his pioneering activities from 1966 to 1982 was senior consultant to the Office of Economic Opportunity, Head Start and follow through programs. He trained staff of over 100 Head Start programs in administration and the efficient use of volunteers. Dr. Neumann passed away on March 3, 2002.</span></p><span data-dcnode-id="1340" instrument_node="">
</span><h3 data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">#15) Frances Feldman (1912-2008)</span></h3><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1335"><img alt="" class="wp-image-2652 aligncenter" data-dcnode-id="1336" height="176" loading="lazy" sizes="(max-width: 166px) 100vw, 166px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/feldman-e1537283603567.jpg&amp;raw" srcset="https://www.bestmswprograms.com/wp-content/uploads/2018/09/feldman-e1537283603567.jpg 382w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/feldman-e1537283603567-284x300.jpg 284w" width="166"></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1331" style="text-align: center;"><a data-dcnode-id="1332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jwa.org/weremember/feldman-frances"><span data-dcnode-id="1333" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Frances Feldman, a University of Southern California professor and social work pioneer, conducted a groundbreaking study in the 1970s that showed cancer patients faced discrimination in the workplace. Her research provided the first systematic evidence that employers and co-workers often imposed harsh, even illegal conditions on cancer survivors. According to the National Association of Social Workers, several states modified fair employment legislation because of the study. Social policy and administration have been the center of Frances Feldman’s professional career, which began in 1934. After a number of years as a social worker and administrator in the public welfare and the family service fields, in 1954 she joined the faculty of the School of Social Work at the University of Southern California. For more than 50 years, Feldman examined the social and psychological meanings of work and life. She also established the first faculty and staff counseling center at USC, now a blueprint for employee assistance programs across the country. Her teaching areas were social welfare history, policy, and administration. Feldman’s research and writing center on the psychological, social, and economic meanings of money and work in American families.She has made several pioneering contributions to the profession. Her writings on the meanings of money still constitute the seminal work in this field and have received continued national and international attention. Feldman was instrumental in establishing the first industrial social work curriculum in the west, as well as a University-funded staff faculty counseling center, which has become a model for the creation of employee counseling programs in some government and industry work places in California.</span></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">With George Nickel, she established the first credit counseling services; 280 now exist throughout the nation under the auspices of the National Consumer Credit Association. With Norris Class, Feldman helped to create the still operating Delinquency Control Institute at USC, a training facility for corrections and related personnel. It draws students for its training from around the United States and the world for its programs each year. Feldman’s social work skills have been called on by groups such as the McCone Commission to examine the Watts riots of 1965. Private corporations also call upon her to examine the impact of downsizing policies and actions on employees and their families. Her work on the Alaska Rural Areas Social Services Demonstration not only was ranked by the University of Florida as one of the ten most successful demonstration projects ever funded by HEW, but also led to an invitation from the governments of Mali and Morocco for consultation about dealing with similar problems in those countries. Numerous awards and honors have been bestowed on her. She has served on a number of state and national committees and commissions, including chairing the Governor’s Advisory Committee on Mental Health. Although she officially retired in 1982, she continued to do research, lecture, and volunteer activities, to serve on several agency boards in the wider community, and to conduct invited workshops in various parts of the United States and in other countries.</span></p><span data-dcnode-id="1324" instrument_node="">
</span><h3 data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">#16) John Myron Rockmore (1913-2002)</span></h3><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319"><img alt="" class="wp-image-2657 aligncenter" data-dcnode-id="1320" height="163" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/rockmoore-e1537286408529.jpg&amp;raw" width="145"></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1315" style="text-align: center;"><a data-dcnode-id="1316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//encrypted-tbn0.gstatic.com/images%3Fq%3Dtbn%3AANd9GcQ_BdKzTcyQa7-i8Rspy3STKrZDAPMcZ1UYV9XZ307469w-OZgS"><span data-dcnode-id="1317" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Myron Rockmore had an outstanding career in which he developed psychiatric social work practice as a component of World War II and post-World War II mental health programs. He was known nationally as a leader in psychiatric social work and a pioneer in mental health services. Rockmore received his bachelor’s degree from St. John’s University in 1936; his master’s degree in education from St. Lawrence University in 1937; and his PhD from the New York School of Social Work in 1939. He worked in the New York Department of Social Welfare from 1935 to 1940 and then in the Board of Education Bureau of Child Guidance from 1940 to 1941. With World War II he became the chief of military psychiatric social work in the U.S. Army’s first mental hygiene unit. He was decorated with the Legion of Merit for his social work efforts. After the war, he became a consultant to the Surgeon General of the U.S. Army and was influential in determining policies for the expansion of military social work programs. He also became chief psychiatric social worker with the New York Psychoanalytic Institute (1946 to 1952) were he worked closely with Dr. Marion Kenworthy, a psychiatrist noted for her contribution to social work education. During this same period, 1946-1952, he was a consultant to the Group for Advancement of Psychiatry, which developed concepts of community psychiatry and interdisciplinary teamwork.</span></p><span data-dcnode-id="1311" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">From 1954 until 1977, he served as the first director of psychiatric social work for the Connecticut Department of Mental Hygiene. Rockmore was the first social worker to chair the program committee of the American OrthoPsychiatric Association. He also served on the executive committee of the American Association of Psychiatric Social Workers (AAPSW). As chair of the AAPSW Research Study Committee, he had oversight of an National Institute of Mental Health funded study of psychiatric social work practice. He was Chair of the NASW Council of Social Workers in Mental Health and Psychiatric Services in 1966. Rockmore helped to successfully implement social work as a necessary part of mental health treatment along with psychiatry and nursing. Rockmore was a resident of West Hartford, CT and was born in Brooklyn, N.Y. He was the husband of the late Reva Rockmore, whom he met while he was teaching at Columbia University in the late 1940s and early ’50s. Reva Rockmore was also involved in the social work field, where she served as chairwoman of the National Association of Social Workers school social work council.</span></p><span data-dcnode-id="1308" instrument_node="">
</span><h3 data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">#17) John A. Wallace (1915-2000)</span></h3><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1303"><img alt="" class="size-full wp-image-2654 aligncenter" data-dcnode-id="1304" height="150" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/wallace.jpg&amp;raw" width="127"></p><span data-dcnode-id="1302" instrument_node="">
</span><p data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">John Wallace was an internationally known expert in the field of corrections, who began his career in corrections as a deputy probation officer in Ramsey County, Minnesota. He later became the assistant director of probation and parole for the State of Minnesota; the executive assistant of the National Probation and Parole Association (which later became the National Council on Crime and Delinquency), in New York City; and director of probation for the Supreme Bench of Baltimore City, Maryland. He was the first director of probations, Office of Probation, for the Courts of New York City, where he consolidated and reorganized probation services in the city. Mr. Wallace later served as an advisor to the Ministry of Justice and the Ministry of Social Welfare for the Government of Sri Lanka through the United Nations Development Program (UNDP). He developed training programs in both agencies to improve the use of probation and parole. After returning from Sri Lanka, Mr. Wallace joined the National Institute of Corrections (NIC) in Washington, D.C., where he served as acting director for a short period during a change of administrations. During his years at NIC, he was loaned to UNDP by the U.S. Department of Justice, and served as advisor to the Ministry of Justice, Government of Papua New Guinea.</span></p><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">In this capacity, he helped to develop the laws creating the probation and parole systems in PNG. During his remarkable career, John Wallace was a member of 17 state and national task forces and commissions, including: the first Advisory Board of the National Institute of Corrections, the ACA Advisory Board on Revision of Correctional Standard, the Joint Commission on Correctional Manpower and Training, the President’s Commission on Law Enforcement and Administration of Justice, and Standards and Goals of Criminal Justice. In addition, he served as a commissioned officer in the Medical Administrative Corps during World War II and was a member of the Reserve Officer Corps for 18 years following active military duty. &nbsp;Mr. Wallace’s honors and awards include the “Distinguished Citizen” award, which he received in 1965 from the Macalester College Alumni Association, and the “Outstanding Achievement Award,” conferred in 1968 by the Regents of the University of Minnesota. Mr. Wallace received a bachelor of arts degree from Macalester College, St. Paul, Minnesota, and a master’s degree in social work from the University of Minnesota.</span></p><span data-dcnode-id="1296" instrument_node="">
</span><h3 data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">#18) Howard Gustafson (1916-1966)</span></h3><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1291"><img alt="" class="size-full wp-image-2655 aligncenter" data-dcnode-id="1292" height="158" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/gustafson.gif&amp;raw" width="123"></p><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Howard Gustafson was a graduate of the University of Minnesota and the Mandel School of Applied Social Services at Case Western Reserve University. He was active as a social work leader in Cleveland as well as in Houston, Texas, where he worked with the Community Council of Houston and Harris County. He was elected president of NASW in 1964. At that time he was serving as executive director of the Community Service Council of Indianapolis, a position he had held since 1952. Prior to his election as NASW’s sixth president, he had served the Association in a leadership capacity as member-at-large on the Board of Directors (1957-1960); second vice president (1960-1962); and chair of the Committee on Chapter-National Relations (since 1963). Additionally, he held numerous committee assignments in the Central Indiana Chapter, to which he belonged. A respected authority in the field of community organization, he was a powerful advocate of social work cooperation on the “War on Poverty”. He was also among those directly responsible for the formation of – and was a participating member of – the Office of Equal Opportunity (OEO) Community Action Against Poverty in Indianapolis.</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">He took the occasion in his inaugural address as NASW president in 1965 to stress the antipoverty challenge to social work saying: “We expect as social workers, to give a good account of ourselves in such efforts – and to lead the way in making adaptations and innovations.” On March 25, 1965, as NASW president elect, he participated in the Freedom March in Montgomery, Alabama, and wrote an account of that experience in an article that appeared on the front page of NASW News in May 1965. He recalled: On the way back home, I tried to analyze what the civil rights struggle means to our Association…I was wondering whether social workers, and NASW in particular are Really prepared to act on social issues in their own communities and in their own Agencies…This is what I’ve been thinking about since returning home from Montgomery.” &nbsp;On May 28, 1966, while in Chicago attending the NASW Seminar on Social Action, he died suddenly of a heart attack. He was 50 years old. In his honor, NASW established a major award – the Howard F. Gustafson Award – and also undertook sponsorship of the Howard F. Gustafson Fund, established by the Community Service Council of Indianapolis.</span></p><span data-dcnode-id="1284" instrument_node="">
</span><h3 data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">#19) Ruby Pernell (1917-2001)</span></h3><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1278"><em data-dcnode-id="1279"><img alt="" class="size-full wp-image-2695 aligncenter" data-dcnode-id="1280" height="156" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/pernell.jpg&amp;raw" width="117"></em></p><span data-dcnode-id="1277" instrument_node="">
</span><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Ruby Pernell completed her graduate work at the Pittsburgh School of Social Work, possibly the same time as Dr. Gisela Konopka. Her doctorate degree was from the London School of Economics. Pernell was on the faculty of the Minnesota School of Social Work for many years, and later joined the faculty of the Case Western Reserve School of Social Work. She held the Grace Longwell Coyle Chair in group work. Pernell’s impact on group work education was significant over the years. However, her great contribution as a pioneer in the field of social work was her leadership in the field of international social work. She was Social Welfare Attache to India for the State Department under Ambassador Chester Bowles, one of only two Social Welfare Attaches in the history of our country. Mary Catherine Jennings (another pioneer) was the second Social Welfare Attache, having served in Brazil. Her interest in the field of international social work has also been with the International Council on Social Welfare as well as various consultant activities of an international nature. Pernell served as president of the Minnesota Southern Chapter of the National Association Social Workers. Pernell was hired by the University of Minnesota as a professor of social work in 1948, the same year that Edwin D. Driver was hired by the University of Massachusetts. Pernell and Driver are believed to be the first black faculty members hired by a state flagship university in the twentieth century. At the end of her career, Pernell was considered a pioneer in the field international social work.</span></p><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1273" instrument_node="">Pernell’s work touched many communities: she was a settlement house worker at the Soho Community House in Pittsburgh; a faculty member at the University of Minnesota School of Social Work; a social welfare attaché assigned to India for the State Department; a Visiting Professor at the Universities of Denver, Washington, and Atlanta; Grace Longwell Coyle Professor and professor emerita of Social Work at the School of Applied Social Sciences at Case Western Reserve University from 1968 to 2001 (now the Mandel School of Applied Social Sciences). Pernell also served as the Acting Dean of that institution from 1973 to 1974. She was a founding member of the Association for the Advancement of Social Work with Groups and a board member and advisor to many local and national organizations, including the Peace Corps. As part of her commitment to international social work and study-abroad programs, Pernell served as a consultant for many nations, including Britain, Egypt, the Sudan, Jamaica, Germany, Canada, Sri Lanka, and India. Dr. Pernell wrote over 35 articles and monographs, contributing regularly to journals such as </span><i data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">International Social Work</span></i><span data-dcnode-id="1270" instrument_node="">, </span><i data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Journal of Education for Social Work</span></i><span data-dcnode-id="1267" instrument_node="">, and </span><i data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Social Work</span></i><span data-dcnode-id="1264" instrument_node="">, and authoring chapters in </span><i data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Fundamentals of Social Work Practice</span></i><span data-dcnode-id="1261" instrument_node=""> (1982).</span></p><span data-dcnode-id="1259" instrument_node="">
