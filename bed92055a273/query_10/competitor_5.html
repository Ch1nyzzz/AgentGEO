</span><p data-dcnode-id="937"><span data-dcnode-id="944" instrument_node="">As Chair of the CSWE Commission on Curriculum and Educational Innovation, she oversaw the most significant shift in social work education policy since its inception, moving social work curricula from content-based to competency-based. &nbsp;She was also one of the first advocates of student presenters at NASW conferences. Black is currently Full Professor and Director of the Lehigh Valley Program at Marywood University. She has also taught at Chestnut Hill College in Pennsylvania and the Catholic University of American in Washington, DC. Her affiliations include the Hastings Center for Biomedical Ethics, the Association for the Advancement of Social Group Work, the CSWE, and the Society for Social Work and Research. &nbsp;She served on the editorial board of the journal </span><i data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Social Thought</span></i><span data-dcnode-id="941" instrument_node=""> and the </span><i data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Journal of Education for Social Work</span></i><span data-dcnode-id="938" instrument_node="">. Black has served as a consultant on ethics to the NASW; the Wissahickon Hospice at the University of Pennsylvania; John Hartford Foundation Geriatric Social Work Faculty Scholars Program; and the CSWE Commission on Accreditation. Black received her PhD in 1978 from the Catholic University of America in Washington, DC and her MSW in 1960 from McGill University in Montreal, Canada.</span></p><span data-dcnode-id="936" instrument_node="">
</span><h3 data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">#41) Richard Boettcher (1936- )</span></h3><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><img alt="" class="size-full wp-image-2685 aligncenter" data-dcnode-id="932" height="173" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/boettcher.jpg&amp;raw" width="150"></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Dr. Boettcher has been a social worker and NASW member for more than 50 years and has provided leadership and enrichment to the profession throughout his career. Dr. Boettcher has served social work in many leadership roles.&nbsp; He has served as dean in social work education and as an officer of four different NASW chapters, including president of two. In addition to these formal roles, he has been active in promoting progressive social policies in several states, including Iowa, Michigan, Missouri and Ohio. &nbsp;He also has been a program evaluator for both social agencies and educational programs throughout the country. Professor Boettcher has been an active scholar throughout his professional career, contributing research reports as well as monographs and journal articles. His writing and presentations have covered many areas of social work practice, but his work has given particular attention to social work ethics, ethical challenges, and ethical conflicts. &nbsp;Although, now, professor emeritus at Ohio State University, he continues to be in demand as a speaker and trainer in conferences and social service agency workshops. Dr. Boettcher received his B.A. from Augustana College in 1957 graduating Magna cum Laude; his MSW from Washington University, St. Louis, Missouri, with Research Honors; and his Ph.D. in social work with a minor in sociology from the University of Minnesota in 1970. On several occasions, his colleagues have seen fit to honor Dr. Boettcher’s leadership and contributions to the profession.</span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">He was named Social Worker of the Year by the Mid-Missouri Program Unit in 1983 for his leadership as Director of the School and as the founding president of the Missouri Social Work Educational Consortium. The Central Ohio Unit of NASW acknowledged his leadership in Ohio with a Lifetime Achievement Award in 1994. In 1993 the general assembly of Ohio adopted a “Special Resolution of Recognition” for his leadership and service to the state.&nbsp;Dr. Boettcher has served on a number of professional and community boards including the Accreditation Commission of the Council on Social Work Education, The Board of Directors of Ohio National Association of Social Workers, The Epilepsy Foundation of Central Ohio Board, Youth Advocate Services Board, The Columbus International Program Board, Southside Learning and Development Center Board, and The Board of Directors of the Association for Community Organization and Social Administration, among others. Upon returning to the faculty in 1993, Dr. Boettcher resumed teaching in the area of social administration. He designed and developed two popular new courses for the College namely, “Resource Acquisition for Human Service Organizations,” and “Ethical Dilemmas in Social Work Practice.”</span></p><span data-dcnode-id="924" instrument_node="">
</span><h3 data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">#42) Mimi Abramovitz (1941- )</span></h3><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="919"><img alt="" class="wp-image-2683 aligncenter" data-dcnode-id="920" height="194" loading="lazy" sizes="(max-width: 197px) 100vw, 197px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/mimi-e1537363096984.jpg&amp;raw" srcset="https://www.bestmswprograms.com/wp-content/uploads/2018/09/mimi-e1537363096984.jpg 347w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/mimi-e1537363096984-300x295.jpg 300w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/mimi-e1537363096984-80x80.jpg 80w" width="197"></p><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">A professor at the Silberman School of Social Work at Hunter College (CUNY) in New York, Dr. Mimi Abramovitz received the 2013 Humanitarian and Leadership Award for contributions in the field of social work, women’s rights, and human rights, from the Association for International Conferences. She co-founded the Welfare Rights Initiative at Hunter College, an organization working to allow welfare recipients to attend college. Abramovitz’s early work in women and welfare galvanized a generation of young social workers, focusing on low income women and women of color. Guided by a deep commitment to social justice and social change, her work has influenced public policy through innovative research, activism and writing. She effectively integrates her beliefs in social justice into her work as a social work scholar and educator. Abramovitz is known nationally and internationally as an educator, scholar, social critic, and activist who brought a gender/race/class analysis into the study of the U.S. welfare state. Since the early 1980s, she has taught a variety of social work classes at the Louis V and Samuel J Silberman School of Social Work at Hunter College, City University of New York (CUNY) in New York. She has written groundbreaking books on gendered interpretation of the welfare state for social work and filled a large gap in social work literature by looking at how the revenue side of the welfare state affected women.</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="907"><span data-dcnode-id="914" instrument_node="">Her publications have become a part of course syllabi in sociology, history and women studies. For 30 years her many presentations have influenced social workers, social scientists and policy makers. She has served on two Council on Social Work Education (CSWE) Commissions and now works with the Special Commission on Macro Practice to expand macro content and enrollment in social work schools. &nbsp;Abramovitz co-founded the Welfare Rights initiative at Hunter College. She also co-founded the Undoing Racism Internship Project, in which students conduct anti-racism training for social workers throughout New York City. She has been active in professional organizations as well, including two terms on the Diversity Commission of CSWE, a member of the Research Commission of CSWE, a Faculty Advisory Board member of the Murphy Institute for Worker Education and Labor Studies, an active member of the Board of the National Economic and Social Rights Initiative, a member of the United Way of New York City Income Support Task Force, and editorial board member of </span><i data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Affilia, Social Services Review, Journal of Social Work Education, Journal of Poverty Issues, Journal of Progressive Human Services, Journal of Applied Social Science, Journal of Sociology</span></i><span data-dcnode-id="911" instrument_node=""> and </span><i data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Social Welfare, and Journal of Women and Aging</span></i><span data-dcnode-id="908" instrument_node="">. She has been a member of NASW since 1967 and has served on numerous task forces and commissions.</span></p><span data-dcnode-id="906" instrument_node="">
</span><h3 data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">#43) C.W. King (1941 – )</span></h3><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="901"><img alt="" class="wp-image-2684 aligncenter" data-dcnode-id="902" height="172" loading="lazy" sizes="(max-width: 145px) 100vw, 145px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/king-e1537363272259.jpg&amp;raw" srcset="https://www.bestmswprograms.com/wp-content/uploads/2018/09/king-e1537363272259.jpg 351w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/king-e1537363272259-253x300.jpg 253w" width="145"></p><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="897" style="text-align: center;"><a data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bloximages.chicago2.vip.townnews.com/chippewa.com/content/tncms/assets/v3/editorial/f/40/f40dde78-dd2e-11df-9b4f-001cc4c03286/4cc068070ff64.image.jpg"><span data-dcnode-id="899" instrument_node="">Image Source</span></a></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">As the Director of the Chippewa County Human Services Agency for 27 years, King was responsible for shaping and integrating a variety of local social service programs into an efficient, responsive and client-oriented system. &nbsp;At a time when “institutionalization” was the main focus of treatment, he advocated and led the agency to provide community-based programs for clients. As a result, the Chippewa County Human Services Agency pioneered many innovative programs including a Community Options Program, Community Support Program and a positive development program focused on creating opportunities for clients to become self-supporting through employment. &nbsp;In addition, his advocacy and leadership led to the addition of community-based programs including a sheltered workshop and work programs for the handicapped in Chippewa County. In 1972, C.W. King moved to Chippewa Falls, Wisconsin where he began his long career in professional social work and volunteerism, primarily in the areas of human services, veteran’s affairs, and community-based organizations. As a Vietnam veteran, C.W. King was motivated to become an advocate for programs to benefit veterans suffering from Post Traumatic Stress Disorder (PTSD). &nbsp;He served on the Post Traumatic Treatment Advisory Council for the Veteran’s Administration Hospital in Tomah, WI. It was his work in the 1970s and 1980s with Vietnam veterans experiencing post-traumatic stress syndrome that gained him recognition as the 1985 Wisconsin Social Worker of the Year.</span></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">King helped organize the Wisconsin chapter of NASW and then served a term as Chapter President and as a member of the Board of Directors. &nbsp;On the national level, C.W. King served two terms on the NASW Board of Directors and served as a member of the National Finance Committee. King was nominated and elected Treasurer of NASW and later appointed to serve on the NASW Insurance Trust, where he taught classes in the area of risk management. C.W. King’s leadership and social work values were also exemplified through his many activities as a citizen volunteer focused on making Chippewa Falls a better place in which to live and work. King became a founding director of the Chippewa Falls YMCA and served two years on the Board of Directors, including one term as President. He also provided leadership in the development and construction of the YMCA’s physical structure. King was a member of the local Optimist Club for thirty-six years. He served two terms as President and participated in their annual fund raising activities to support the many local and national youth programs sponsored by the Optimist Club. King also contributed by serving as the President of the Chippewa Falls Police and Fire Commission and City Council, as well as being a member of the VFW, American Legion and the Chippewa Valley Airport Commission.</span></p><span data-dcnode-id="890" instrument_node="">
</span><h3 data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">#44) Dr. Anita Harbert (1942- )</span></h3><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><img alt="" class="size-full wp-image-2686 aligncenter" data-dcnode-id="886" height="138" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/Anita-Harbert.jpg&amp;raw" width="110"></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="881" style="text-align: center;"><a data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//calswec-archive.berkeley.edu/sites/default/files/styles/rtn_faculty_image/public/rtn-faculty-images/harbert_anita.jpg%3Fitok%3DSSUOjM8J"><span data-dcnode-id="883" instrument_node="">Image Source</span></a></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Dr. Anita Harbert is professor emeritus and former Director of the School of Social Work, the University Center on Aging, and the Center for Alcohol and Drug Studies at San Diego State University. The University Center on Aging has been a leader in developing new knowledge, stimulating professional interest, and influencing national and international policy in the area of minority aging. In 1985, Harbert established the Center for Alcohol and Drug Studies and Services to address alcohol and other drug-related problems at the university and in the larger community. The Center specializes in research and evaluation design with an emphasis on socio-behavioral research and applied evaluation, and is an umbrella organization for several alcohol and drug related research initiatives, including the SDSU Driving Under the Influence Program which provides education and counseling services. Harbert was co-founder and President of the Board of Directors of the California Social Work Education Center. &nbsp;When she was the Acting Dean of the School of Social Work at West Virginia University, Harbert had the vision to start an annual professional development conference to train social service practitioners in the field of aging and founded the Summer Institute on Aging in 1977. Building on the Institute on Aging, Harbert gathered an interdisciplinary team to start the Gerontology Center at West Virginia University, now known as the Center on Aging.</span></p><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">She was the Executive Director of the SDSU School of Social Work’s Academy for Professional Excellence, which provides in-service training, technical assistance and research for the eight southern counties in California. The Academy trains approximately 3000 child protective service workers per year in Southern California. Harbert was the Project Director of an Archstone Foundation-funded program to develop standardized curriculum on elder abuse for adult protective services workers in California. With the San Diego County Department of Mental Health Service, she directed a contract to provide training for mental services providers on the Psychosocial Rehabilitation and Recovery Models of services for chronically and persistently mentally ill adults. Throughout her career, Harbert has been the successful recipient of millions of dollars in grants and contracts from national, state and local funding agencies supporting social work education and training for the public social services. From rural West Virginia, Harbert spent years as an educator involved deeply in her community and abroad in the areas of elder care, child protective services training and advocacy, and substance abuse. She received her PhD from the Florence Heller School for Advanced Studies in Social Welfare, Brandeis University, a Master’s of Social Work degree from West Virginia University, and a bachelor’s degree in Psychology from Fairmont State College.</span></p><span data-dcnode-id="874" instrument_node="">
</span><h3 data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">#45) Carmen O. Hendricks (1947-2016)</span></h3><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="869"><img alt="" class="wp-image-2687 aligncenter" data-dcnode-id="870" height="163" loading="lazy" sizes="(max-width: 170px) 100vw, 170px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/hendricks-e1537370350230.jpg&amp;raw" srcset="https://www.bestmswprograms.com/wp-content/uploads/2018/09/hendricks-e1537370350230.jpg 1046w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/hendricks-e1537370350230-300x287.jpg 300w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/hendricks-e1537370350230-768x735.jpg 768w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/hendricks-e1537370350230-1024x980.jpg 1024w" width="170"></p><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="865" style="text-align: center;"><a data-dcnode-id="866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogs.yu.edu/news/wp-content/uploads/sites/19/2012/07/Hendricks.jpg"><span data-dcnode-id="867" instrument_node="">Image Source</span></a></p><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Dr. Carmen Ortiz Hendricks made significant contributions to the practice of social work in the roles of educator, administrator, and multi-cultural scholar. She is nationally and internationally recognized for the advancement of culturally competent practice with such diverse groups as Alzheimer patients, immigrants, traumatized children, and substance abusers. The settings for this practice include hospitals, schools, and child welfare and family agencies. Her field of practice was social work education and most particularly culturally competent social work practice and education. Dr. Ortiz Hendricks chaired the sub-committee of NASW’s national committee on racial and ethnic diversity that developed the association’s standards for culturally competent social work practice. These standards were later endorsed by the Council on Social Work Education (CSWE). She also served as a Commissioner on CSWE’s Commission on Accreditation. Among her most celebrated published works are the two editions of Learning to Teach, Teaching to Learn: A Guide for Social Work Education. &nbsp;Dr. Ortiz Hendricks authored and co-authored articles, monographs, and manuals that address culturally competent practice. Dr. Ortiz Hendricks worked primarily in social work departments of universities in New York City.</span></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">After 25 years at Hunter College School of Social Work, she became Associate Dean and Professor at Yeshiva University, Wurzweiler School of Social Work, also in New York City. In 2007, as part of a Fulbright Scholarship to Israel, she consulted with Israeli social work educators, and taught several classes at Hebrew University and Ben Gurion University. As a member of the Cuban Research Project and Collaborative with the University of Havana, Dr. Ortiz Hendricks also contributed to the practice and education of social workers in Cuba. In addition to her leadership in the area of cultural competency, she championed the cause of recruiting and advancing persons of color to and in the field of social work. Of particular concern to Dr. Ortiz Hendricks was Latinos’ increasing representation in the United States population, not matched by their entry in the social work profession. She wrote articles, and developed and led forums and roundtables on the need to recruit more Latino social workers. Dr. Ortiz Hendricks promoted cultural competency and diversity not only in her public roles but also in her classroom and through interactions with individual students. In the classroom, she modeled the empowerment of students as subjects, based on the teachings of Friere. Through her methods, students became open to new knowledge and ideas and to challenging the prevailing stereotypes and ideologies.</span></p><span data-dcnode-id="858" instrument_node="">
</span><h3 data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">#46) Frederic “Rick” Reamer (1948- )</span></h3><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="853"><img alt="" class="wp-image-2688 aligncenter" data-dcnode-id="854" height="157" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/reamer-e1537370522124.jpg&amp;raw" width="187"></p><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="849" style="text-align: center;"><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ssa.uchicago.edu/sites/default/files/uploads/reamerbig.jpg"><span data-dcnode-id="851" instrument_node="">Image Source</span></a></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Dr. Frederic Reamer has dedicated his career to reforming the ethics, practice, and education of the social work field through his work as a researcher, an author, and a professor. His extensive experience in ethics research has helped NASW and the social work profession as a whole over the years. Reamer chaired the task force wrote the current Code of Ethics implemented by NASW. Currently, he is the chair of the NASW Technology Standards Task Force and continues to serve on the Code of Ethics Revisions Task Force. Reamer is a professor in the graduate program at the Rhode Island College School of Social Work, where he has taught since 1983. Over the years, his research has focused on a variety of human service issues, ranging from mental health and criminal justice to public welfare and professional ethics. Reamer has been a featured essayist on NPR’s Morning Edition, a commentator on NPR’s All Things Considered, and a guest on a variety of radio broadcasts on stations across the country. Starting in 2007, Reamer began as the host and producer of This I Believe – Rhode Island on NPR and Rhode Island Public Radio. He was featured as a commentator in the documentaries “America’s Serial Killers: Portraits of Evil” and “Rampage: Killing without Reason”. Reamer has appeared as an expert on the PBS series This Emotional Life.</span></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">He has distinguishing himself as an expert in the ethical use of technology within social work, and gave the keynote presentation “Managing Social Media and Electronic Communication in Social Work Practice: Ethical and Risk-management Issues” at the 2012 Association of Social Word Boards’ Education Conference, which introduced social work regulators to the ethical, practice and regulatory challenges posed by the quick rise of technology. Reamer has previously worked as the Director of the National Juvenile Justice Assessment Center at the US Department of Justice in the Office of Juvenile Justice and Delinquency Prevention from 1979 to 1981, as a Senior Policy Advisor to the Governor of Rhode Island from 1987 to 1990, and as a Commissioner of the Rhode Island Housing and Mortgage Finance Corporation from 1987 to 1995. He served on the Rhode Island Parole Board from 1992 to 2016. Reamer was the Editor in Chief of the Journal of Social Work Education from 1990 to 1994, Associate Editor of the NASW Encyclopedia of Social Work (20th Edition) and is currently an Associate Editor of the Encyclopedia of Social Work Online. He has lectured around the world on professional ethics, professional malpractice, and liability, including presenting at the 2014 NASW National Conference.</span></p><span data-dcnode-id="842" instrument_node="">
</span><h3 data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">#47) Barbara W. Shank (1949- )</span></h3><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="837"><img alt="" class="wp-image-2689 aligncenter" data-dcnode-id="838" height="168" loading="lazy" sizes="(max-width: 167px) 100vw, 167px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/shank-e1537370815948.jpg&amp;raw" srcset="https://www.bestmswprograms.com/wp-content/uploads/2018/09/shank-e1537370815948.jpg 376w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/shank-e1537370815948-150x150.jpg 150w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/shank-e1537370815948-298x300.jpg 298w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/shank-e1537370815948-80x80.jpg 80w" width="167"></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="833" style="text-align: center;"><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stthomas.edu/media/schoolofsocialwork/images/2015_BlkSuit_BarbaraShank_T4.jpg"><span data-dcnode-id="835" instrument_node="">Image Source</span></a></p><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Dr. Barbara Wenstrom Shank emerged as an early pioneer in developing the principles of BSW generalist practice, defining the nature of the BSW curriculum, and emphasizing the person in environment construct underpinning social work practice. She is an advocate for accreditation standards on all levels of social work education. As an educational leader, Dr. Shank has constantly explored innovations that will provide access to professional social work education, including outreach programs in underserved rural areas and an innovative online doctoral program focused on teaching which has attracted students from many states. Dr. Shank has made significant contributions to social work not only in her leadership as Dean of the School of Social Work at Saint Catherine University/University of Saint Thomas but through her committee leadership in a wide range of social work organizations including NASW, the Council on Social Work Education, the International Association of Schools of Social Work, and the International Consortium of Social Development. Dr. Shank has continued to nurture the relationship between her university and the social work community, recognizing the importance of strong links with practitioners and agencies to the educational endeavor; a recognition exemplified by her commitment to NASW as a member and leader. Dr. Shank received her MSW from University of Minnesota in 1973 and her PhD from same in 1993.</span></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">She began her career as a family court counselor and community corrections worker in St. Paul and eventually became chair and dean of the Social Work Department at the University of St. Thomas and the College of St Catherine in St. Paul. She has been a committee leader in NASW, CSWE, the International Association of Schools of Social Work, and the International Consortium of Social Development. Dr. Shank is the major institutional supporter of the annual NASW-Minnesota conference. She is well recognized as a skilled administrator, educational innovator, and social work advocate and has made multiple professional presentations and received prestigious awards for her work. As an educational leader, Dr. Shank has explored innovations that will provide access to professional social work education, including pioneering efforts in defining and implementing generalist social work education and practice at the baccalaureate level. Dr. Shank works closely with her faculty to develop and hone their skills in teaching and research and created a series of professional development institutes as a venue supporting faculty research interests and publications. The institutes provide low-cost access to professional development seminars in a variety of fields of study. She inspires by her own actions and her wide world view that recognizes social work’s role in advocating for human rights and social development on the national and international stage.</span></p><span data-dcnode-id="826" instrument_node="">
</span><h3 data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">#48) Mark S. Umbreit (1949- )</span></h3><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><img alt="" class="wp-image-2690 aligncenter" data-dcnode-id="822" height="171" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/umbreit.jpg&amp;raw" width="114"></p><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="817" style="text-align: center;"><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apps.cehd.umn.edu/people/Headshot/UmbreitM-2008.jpg"><span data-dcnode-id="819" instrument_node="">Image Source</span></a></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Mark Umbreit is an internationally recognized practitioner and scholar with more than 40 years of experience as a mediator, peacemaker, trainer, teacher, and researcher. He has written 10 books and more than 200 other publications in the fields of restorative justice, mediation, spirituality, forgiveness, and peacemaking. His research has contributed significantly to restorative justice policy development in the United States and other countries. Mark Umbreit received his BA major in Sociology and minored in Psychology from Valparaiso University in 1971, an M.P.A.(Masters in Public Administration) from Indiana University Northwest in 1978, and a Ph.D. in Social Work from the University School of Social Work with an emphasis in criminal and conflict resolution in 1988. In 2006 he received an Honorary Ph.D. from Valparaiso University. Dr. Umbreit’s first employment was in Indiana where was the Director/Founder of the Porter County Peace and Human Relations Center, project of the American Friends Service Committee. After being there two years he became President/Founder of PACT (Prisoner and Community Together) Institute and the PACT Institute of Justice in Valparaiso, Indiana.</span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Umbreit was there for 13 years when he came to Minnesota where he worked for the Minnesota Citizens Council on Crime and Justice as the Vice President for Research and Programs. After three years he worked on his social work degree and served as Research Associate for the Center for Youth Development and Research. During these years he worked closely with Dr. Gisa Konopka. In the recent past, he worked as a Senior International Consultant with the United Nations Development Program and the Ministry of Justice in Turkey to support their legislative efforts to implement victim offender mediation throughout the country. In recent months he has presented his research and provided training workshops in several cities of both Taiwan and Japan. Dr. Umbreit and his colleagues at the Center for Restorative Justice &amp; Peacemaking, at the request of the mayor’s office in St. Paul, MN, conducted an audit of the police civilian internal affairs commission, including recommendations for major structural change to respond to concerns of local communities of color over aggressive policing, all of which were eventually accepted by the St. Paul City Council. At the request of the Nebraska Administrative Office of the Courts, they have been engaged in a five year contract to implement statewide restorative justice policies and practices in Nebraska.</span></p><span data-dcnode-id="810" instrument_node="">
</span><h4 data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">#49) Norma Gray “Cindy” Jones (1951-2017)</span></h4><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><img alt="" class="wp-image-2691 aligncenter" data-dcnode-id="806" height="210" loading="lazy" sizes="(max-width: 138px) 100vw, 138px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/NormaGrayJones.jpg&amp;raw" srcset="https://www.bestmswprograms.com/wp-content/uploads/2018/09/NormaGrayJones.jpg 518w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/NormaGrayJones-197x300.jpg 197w" width="138"></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Norma Gray Jones was the US Navy’s first African American female social work officer. She served for 21 years as a Navy Commander where her work altered Navy social practices and policies. Her efforts included establishing new programs for entry level Navy social workers and implementing Family Advocacy treatment programs worldwide. She held several program management positions to include, Deputy Directory Fleet and Family Support Programs and the Director of Research for the Fleet and Family Support Programs in Millington, TN. She established new billets for Navy social workers in Diego Garcia, and Bahrain. Jones served as Director of Behavioral Health Services at the Naval Hospital, Guantanamo Bay, Cuba, focusing primarily on the “Children Soldiers” population and assisting political prisoners and refugees. Her last position on active duty was, Director of Social Work Department at the Naval Medical Center in Portsmouth, VA. Jones began her military career in San Diego, CA and was then transferred to Adak, Alaska as part of a two-person mental health team, working with military families and family violence issues. The WIC program she established there was used until the base closing in 1996. Jones served as Regional Family Advocacy Representative in London, England, served five major naval bases, and established a position for a naval psychiatrist in the UK, which was a first. She also served as a consultant and trainer to the US Embassies in London and Paris on matters related to family violence.</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">In addition, Jones served individual clients in London. When she returned to the U.S. in 1992, Jones was instrumental in conducting research on treatment modalities to combat family violence while stationed at San Diego Naval Base. As a result of this work, she was invited to earn her PhD. Jones co-facilitated CSWE’s Veterans Social Work Education Task Force which led to the development of the CSWE’s Military Social Work Practice Standards. While in Norfolk she served on the YWCA’s Board of Directors. During this period she served as Associate Professor and Director of the PhD Program at Norfolk State University. She also worked with the female athletes to promote educational development and interpersonal skills. Additionally, she was recognized as the 2005 NASW Social Work Pioneer and the 1993 US Navy Social Worker of the Year. Upon retirement, she joined the faculty of Norfolk State University as associate professor and director of the Ethelyn R. Strong School of Social Work Doctoral (Ph.D.) Program. In 2016, she retired from her last teaching position as clinical associate social work professor with the Army Medical Graduate Education Department at Fort Sam Houston, Texas.</span></p><span data-dcnode-id="798" instrument_node="">
</span><h3 data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">#50) Thomas C. Wells (1957- )</span></h3><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793"><img alt="" class="wp-image-2692 aligncenter" data-dcnode-id="794" height="172" loading="lazy" sizes="(max-width: 173px) 100vw, 173px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/wells-1-e1537371570652.jpg&amp;raw" srcset="https://www.bestmswprograms.com/wp-content/uploads/2018/09/wells-1-e1537371570652.jpg 396w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/wells-1-e1537371570652-150x150.jpg 150w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/wells-1-e1537371570652-300x298.jpg 300w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/wells-1-e1537371570652-80x80.jpg 80w" width="173"></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Wells began his Washington, D.C. career in 1985 as a social worker in the District’s Child Protective Services agency. In 1991, he took the helm of the DC Consortium for Child Welfare, an organization of 20 nonprofit agencies that serve the city’s children and families, where he helped to create neighborhood-based family service collaboratives to coordinate the delivery of city and nonprofit resources to underserved District of Columbia residents. Wells led the 1989 class action lawsuit LaShawn v. Barry to address the City’s failure to protect children in its care. Wells was the architect of a groundbreaking program to match the foster families with children affected by HIV/AIDS. He led the drive to create the DC Family Court. He partnered with leaders in the U.S. Congress in writing the legislation that defined the function and operation of the new court, resulting in 300 percent increase in the number of foster children adopted into permanent homes each year. Wells has also made major contributions to the city as Ward 6 Representative on the City Council. During his time as Council member he helped promote unprecedented growth in public school enrollment, the city’s largest drop in violent crime, economic revitalization, and business expansion in the fastest-growing communities in the nation.</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Wells garnered broad support to make the District of Columbia livable and walkable for all residents. Known for his neighborhood-focused development, Wells championed efforts to ensure availability of public transit, including the construction of new streetcar lines and the expansion of the DC Circulator. As chair of the DC Council Committee on Transportation and Environment, he worked to double the city’s Capital Bikeshare Program. Wells crafted The Anacostia River Cleanup and Protection Act of 2009, to implement $0.05 fee on disposable bags. This landmark legislation prompted thousands of District residents to curb the use of plastic bags and instead opt for reusable green alternatives. Seventy-five percent of DC residents reported a decrease in their use of disposable bags once the bill took effect on January 1, 2010. The legislation also established a fund to restore the District of Columbia water bodies, including the Anacostia River, installed trash traps and provided environmental education for students. A passionate innovator and student of cutting edge solutions, Tommy earned his law degree from the Columbus School of Law at Catholic University in 1991 and a master’s degree in social work from the University of Minnesota in 1983. He and his wife, Barbara, a writer and arts enthusiast, are residents of Ward 6 in the District.</span></p><span data-dcnode-id="786" instrument_node="">
