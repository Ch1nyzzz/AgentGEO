</span><h4 data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">#20)&nbsp; Sister Mary Paul Janchill (1920-2009)</span></h4><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1254"><img alt="" class="size-full wp-image-2656 aligncenter" data-dcnode-id="1255" height="150" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/janchill-e1537286219627.jpg&amp;raw" width="224"></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1250" style="text-align: center;"><a data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.findagrave.com/photos250/photos/2011/363/40838186_132525737566.jpg"><span data-dcnode-id="1252" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Sister Mary Paul Janchill wrote one of the three seminal articles introducing general systems theory to social work practitioners in the late 1960s. &nbsp;Her 1969 article, along with papers by Ann Hartman and Carel Germain, formed the basis for much of the work of the past three decades on systems approaches to social work practice. &nbsp;Sister Mary Paul’s primary contributions to the profession, however, were in her roles as a social work practitioner where she was a model clinician, administrator, advocate, and leader. Sister Mary Paul co-founded the Center for Family Life in Sunset Park in 1978, and also served as its co-director. &nbsp;The Center provides comprehensive, neighborhood-based family support, advocacy, and clinical services to a low-income community in Brooklyn, New York. Some of the outstanding characteristics of the Center are its focus on the family as the unit of attention; holistic, non-stigmatizing approach to services; integration of clinical and community services; 24/7 accessibility; frequent movement between case and cause advocacy; ongoing program development; and its developmental perspective on families and the community.</span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">The Center has been widely heralded as an actual embodiment of the ecosystems perspective on practice, which is so frequently taught and so seldom implemented, and has been cited as an excellent model or program in many professional publications and works for the general public. &nbsp;Sister Janchill joined her order, called the Sisters of the Good Shepherd, in 1945. In 1953, she graduated from St. John’s University. She went on to earn a master’s degree in social work from Catholic University, in 1955, and a doctorate in social work from Columbia University in 1968. &nbsp;In her role as co-director of the Center, she pioneered many of its new approaches to practice, including the first neighborhood-based foster care program in New York City, a range of creative school-based service programs, and an advocacy clinic for neighborhood residents. She also served as a field instructor, supervisor, and role model for many students and workers, and is widely recognized in New York City as a constant advocate for improved policies and programs in the family and child welfare arena. Sister Mary Paul was the recipient of several awards including the White House Award by President Ronald Reagan, “Private Sector Initiative Commendation,” for Exemplary Community Service and the Eleanor Roosevelt Award from the Citizens’ Committee for Children of New York. &nbsp;&nbsp;She also served as a member of the board of directors of the Citizens’ Committee for Children and Lawyers for Children.</span></p><span data-dcnode-id="1243" instrument_node="">
</span><h3 data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">#21) Joan Bonner Conway (1920-2008)</span></h3><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1238"><img alt="" class="size-full wp-image-2661 aligncenter" data-dcnode-id="1239" height="182" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/conway-e1537289120598.jpg&amp;raw" width="173"></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1234" style="text-align: center;"><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mcconaghyfuneralhome.com/fh_live/10400/10470/images/obituaries/290552_fbs.jpg"><span data-dcnode-id="1236" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Fondly referred to as the “dean” of hospital social work directors, Joan Bonner Conway contributed pioneering efforts toward the organizing of professional support structures for the discipline and its medical social work specialty. She was a charter member of NASW and prior to that organization, served as a member of the American Association of Medical Social Workers from 1943-1965. &nbsp;Bonner Conway was also a charter member of the Society for Hospital Social Work Directors and served as representative of the Eastern Pennsylvania chapter for several years. She was also its first chairperson. Bonner Conway was Chair of the Medical Social Work Section of NASW, Philadelphia Chapter, from 1962-65, Chair of the Nominating Committee Medical Social Work Section, Philadelphia Chapter, from 1959-1961, First Vice Chair of the NASW Philadelphia Area Chapter from 1971-73, and a board member of the Pennsylvania state chapter from 1975-1981. She was a charter member of the American Hospital Association’s Society for Hospital Social Work Directors from 1966 until her death, serving as its Philadelphia Area Chapter Chair from 1971-73. Bonner Conway served as director of the Hospital of the University of Pennsylvania from 1971-1987. &nbsp;Her specialization was in the field of medical social work.</span></p><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">While at the University of Pennsylvania, she served as a lecturer and clinical assistant professor of social work as well as contributing to several committees. She was director of the Social Service Department of Magee Memorial Hospital Rehabilitation Center from 1958-1971 and a medical social worker at Albert Einstein Medical Center from 1957-1958. In addition, she taught history at an academy in Venezuela from 1955-57 and was a medical social worker in several Philadelphia-area hospitals in the early 1950’s. Bonner Conway began her career during World War II as a caseworker with the National Red Cross, serving in &nbsp;military hospitals, including Walter Reed General Hospital, from 1943-48. Bonner Conway earned her MSW from Catholic University of America in 1943 and her doctorate in social work from the University of Pennsylvania in 1976. Dr. Bonner Conway served on numerous boards, including the Philadelphia chapter of the American Heart Association, the March of Dimes, the American Red Cross of Southeastern Pennsylvania, Community Health Affiliates, and Catholic Charities of the Archdiocese of Philadelphia. A native of Baltimore, Dr. Conway graduated from St. Leonard’s Academy in West Philadelphia. &nbsp;In 1968, she married Thomas Agnew Conway, a widower with three children. When he died six months later, she stayed close with his children.</span></p><span data-dcnode-id="1227" instrument_node="">
</span><h3 data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">#22)&nbsp; Elaine Rothenberg (1921-1994)</span></h3><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1219"><em data-dcnode-id="1220"><img alt="" class="size-full wp-image-2696 aligncenter" data-dcnode-id="1223" height="170" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/rothenberg.jpg&amp;raw" width="131"><br data-dcnode-id="1222"><span data-dcnode-id="1221" instrument_node="">
</span></em></p><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Elaine Rothenberg made important contributions to Social Work Education in this country. Born in New York City, graduated from Queens College of that city with the highest honors, she went on to Smith College School of Social Work where she earned her MSW in 1943. She grounded her experience in case work both in public welfare in Florida and later in the Family Service Society in Richmond. She went on to the Memorial Guidance Clinic in Richmond where she was both caseworker and supervisor. Her career in academic education began in the School of Social Work, Richmond Professional Institute where she was Professor of Social Work as well as Director of Field Work and Admissions. During this period Smith College recruited her for their summer sessions teaching case work. Later she joined their Seminar faculty. In the late 1960’s Richmond Professional Institute joined the Virginia Commonwealth University. Mrs. Rothenberg became associate Dean of that School of Social Work and in 1972 was named Dean, but her influence extended beyond the School of Social Work. After her retirement as Dean, she was named Professor and Director for Academic Affairs and finally Vice- president of the University and received U.C.V.’s Presidential Medallion, an award for service to the University.</span></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Her successor in the Deanship said of her: “During the years of her deanship she built VCV’s School of Social Work into one of national renown.” Mrs. Rothenberg’s ability and competence was recognized and put to use by local, national and international professional organizations. She was on the Board of Directors of NASW and later on the Executive Committee of that organization at the national level and she also took an active role in committees and taskforces at the State and local level. The Council of Social Work Education used her on their Accreditation Commission and in their House of Delegated. She was a member of the NIMH review committee for their grants to Schools as well as on the review committee for the Office of Human Development Service under the Dept of Human Service. She was frequently used as Consultant on curriculum development in schools of social work. She was in demand as a speaker and as an institute and workshop leader. Although Mrs. Rothenberg spent her last 45 years in Richmond which was her home, she will be missed not only in that locality, but by all the schools and organizations in which she played such an active and significant role.</span></p><span data-dcnode-id="1212" instrument_node="">
</span><h3 data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">#23) Alvin Schorr (1921-2016)</span></h3><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1207"><img alt="" class="alignnone size-full wp-image-2662 aligncenter" data-dcnode-id="1208" height="157" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/schorr-e1537289349403.jpg&amp;raw" width="151"></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1203" style="text-align: center;"><a data-dcnode-id="1204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//msass.case.edu/wp-content/uploads/2016/02/Alvin-Schorr-1988.jpg"><span data-dcnode-id="1205" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Alvin Schorr’s career was identified with public social policy, particularly with the issues surrounding income maintenance. Born in New York City in 1921, Schorr graduated from the City College of New York with a BSS and from Washington University in St. Louis with an MSW. After college he was a social worker and executive in various public assistance, child welfare, and family counseling agencies. This phase of his career culminated with the executive directorship of the Family Service of Northern Virginia. In 1958, Schorr received an appointment as a Family Life Specialist in the Social Security Administration with the responsibility to adapt social security programs to changing family needs. He dealt with issues such as AFDC, housing, and poverty. In 1963, Schorr began a two-year stint as the Social Security Administration’s Acting Chief of Long Range Research, where he headed analyses of poverty in the U.S. and the relationship of family and income development. In 1965, Schorr moved from Social Security to the Office of Economic Opportunity, again in the area of research and planning the allocation of OEO and other government funds in the war against poverty. In 1967, he moved to the Department of Health, Education, and Welfare as the Deputy Assistant Secretary for Individual and Family Services.</span></p><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Schorr moved from the government to the academic sector at the end of the Lyndon Johnson administration.&nbsp;In November, 1968, he went to Brandeis University as professor of social policy and director of the Center for Studies of Income Maintenance Policy (later he initiated a similar center at New York University), a project that provided consultation to model cities programs. In 1970, Schorr became dean of the New York University School of Social Work and in 1973 he became the General Director of the New York Community Service Society, a position he held until 1977. After two years (1977-79) as visiting professor at the Catholic University of America, Schorr became the Leonard Mayo Professor of Family and Child Welfare at Case Western Reserve University in Cleveland. He received numerous awards, among them a Distinguished Service Award (1966) and the Distinguished Alumnus Citation (1970) from Washington University’s George Warren Brown School of Social Work, the Michael Schwerner award for civil rights leadership (1972), and an Honorary Doctor of Humane Letters from Adelphi University (1975). He was a Fulbright Senior Research Scholar in England in 1962-63.</span></p><span data-dcnode-id="1196" instrument_node="">
</span><h3 data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">#24) Whitney M. Young, Jr. (1921-1971)</span></h3><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1191"><img alt="" class="wp-image-2663 size-full aligncenter" data-dcnode-id="1192" height="185" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/young-e1537289545755.jpg&amp;raw" width="206"></p><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1187" style="text-align: center;"><a data-dcnode-id="1188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.harvardsquarelibrary.org/wp-content/uploads/2012/07/young1.jpg"><span data-dcnode-id="1189" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Whitney Young was an American civil rights leader. He spent most of his career working to end employment discrimination in the United States and turning the National Urban League from a relatively passive civil rights organization into one that aggressively worked for equitable access to socioeconomic opportunity for the historically disenfranchised. Young was the son of a Kentucky educator. He graduated from Kentucky State College at 18 and became a high school teacher and coach. From 1942 to 1944, while in the U.S. Army, he studied engineering at the Massachusetts Institute of Technology. After his discharge, he received an MSW from the University of Minnesota (1947) and began to work with the Urban League in Minnesota. He became executive secretary of the Urban League in Omaha, Nebraska in 1950. In that position, he helped get black workers into jobs previously reserved for whites. Under his leadership, the chapter tripled its number of paying members. During this time, he also taught social work at the University of Nebraska and Creighton University, and became dean of the Atlanta University School of Social Work (1954). In 1961, Young was appointed executive director of the National Urban League. Within four years he expanded the organization from 38 employees to 1,600 employees; and from an annual budget of $325,000 to one of $6,100,000. Young served as President of the Urban League until his death in 1971.</span></p><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">The Urban League had traditionally been a cautious and moderate organization with many white members. During Young’s ten-year tenure at the League, he brought the organization to the forefront of the American Civil Rights Movement. He both greatly expanded its mission and kept the support of influential white business and political leaders. A noted civil rights leader and statesman, he worked to eradicate discrimination against blacks and poor people. He served on numerous national boards and advisory committees and received many honorary degrees and awards —including the Medal of Freedom (1969), presented by President Lyndon Johnson—for his outstanding civil rights accomplishments. Despite his reluctance to enter politics himself, Young was an important advisor to Presidents Kennedy, Johnson, and Nixon. In 1968, representatives of President-elect Richard Nixon tried to interest Young in a Cabinet post, but Young refused, believing that he could accomplish more through the Urban League. Young served as President of the National Association of Social Workers (NASW), from 1969 to 1971. Mr. Young spent his tenure as President of NASW ensuring that the profession kept pace with the troubling social and human challenges it was facing. Young’s work was instrumental in breaking down the barriers of segregation and inequality that held back African Americans.</span></p><span data-dcnode-id="1180" instrument_node="">
</span><h3 data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">#25) Barbara K. Shore (1921-2013)</span></h3><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1175"><img alt="" class="size-full wp-image-2664 aligncenter" data-dcnode-id="1176" height="163" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/shore.jpg&amp;raw" width="160"></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Dr. Barbara K. Shore was a graduate of the Carnegie Institute of Technology (now Carnegie Mellon University) and the University of Pittsburgh. She held a Bachelor’s degree, a Master’s degree, and a Doctoral degree in Social Work. She was named a Distinguished Service Professor by the University in 1992 and Professor Emerita in 1996. Dr. Shore was Director of the Doctoral Program in the School of Social Work for almost 20 years. She was National President of the Group to Advance Doctoral Education (GADE), the national organization of all doctoral programs in social work in the United States and Canada. In addition, she was a three-time President of the University of Pittsburgh Senate and has served on a number of Senate committees. She chaired the Tenure and Academic Freedom Committee of the University Senate and served as the Chair of the University Senate’s Anti-Discrimination – Committee. She also served on the Chancellor’s Task Force on Cultural Diversity, on a special committee to select speakers and recipients of honorary degrees from the University, on the Advisory Committee on University Policy for Publications and on the University Task Force on sexual harassment.</span></p><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Dr. Shore wrote and presented more than 50 papers and book chapters and also performed a number of consultancies. Dr. Shore headed the Task Force appointed by Allegheny County Commissioners to study Children and Youth Services (CYS) in 1987. This effort included an in-depth study of the services offered, the staffing, the effect of interventions and the relationship with the Juvenile Court and the private and public sector. The County Commissioners appointed Dr. Shore to co-chair an implementation committee that followed the progress in implementing the recommendations and reported regularly to the Commissioners as well as to the public. Dr. Shore was Vice-chair of the CYS Advisory Board, Co-chair of the Prevention Sub-Committee and Chaired an Ad Hoc Committee to make recommendations to improve the relationships between CYS and Juvenile Court. In September, 1994, she was asked to chair a committee to examine key issues in Children and Youth Services and to make recommendations about the agency’s policy and practices. In addition to serving on this committee, Dr. Shore served on the Mental Health and Mental Retardation Board for Allegheny County. She also co-chaired the Healthy Jewish Community Study that made recommendations for improving the mental and physical health of persons in the Jewish community.</span></p><span data-dcnode-id="1168" instrument_node="">
</span><h3 data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">#26) William “Bill” C. Pugh (1921-1989)</span></h3><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1163"><img alt="" class="wp-image-2694 aligncenter" data-dcnode-id="1164" height="158" loading="lazy" sizes="(max-width: 158px) 100vw, 158px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/pugh-1.jpg&amp;raw" srcset="https://www.bestmswprograms.com/wp-content/uploads/2018/09/pugh-1.jpg 207w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/pugh-1-150x150.jpg 150w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/pugh-1-80x80.jpg 80w" width="158"></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1159" style="text-align: center;"><a data-dcnode-id="1160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.findagrave.com/photos/2015/352/156163805_1450510855.jpg"><span data-dcnode-id="1161" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">In a social work career spanning over 35 years, Bill Pugh developed and implemented social service programs for thousands of Alabama’s citizens. Many of his innovations brought national acclaim to the Alabama social work community: the development of the state’s first legal services program for the poor in cooperation with the Alabama Law School, the development of the first model day care program in the state through the University of Alabama School of Home Economics, and the establishment of the state’s first statewide advocacy program for individuals with developmental disabilities. During the period between 1969 and 1972, Pugh served as the first Deputy Commissioner of the Alabama Department of Pensions and Security (now Human Resources). His creative approach to the use of federal social service funding under Titles IV-A and XX of the Social Security Act resulted in significant improvement in the quality of life for poor adults and children, the mentally ill, and the developmentally disabled in Alabama. The programs developed under his leadership during those important times were viewed as national models by many professionals in other states and the nation. Following his long career with the state’s Department of Pensions and Security, Pugh assumed the position of Special Assistant for Academic Development with the University of Alabama.</span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">His creative social work skills resulted in the establishment of the nation’s first management training program for welfare administrators. Participants in this training program are now providing administrative leadership in various social service programs in over 40 states. Pugh’s career took another turn when he retired from the University of Alabama and began work as Director of AGAPE of Central Alabama, a children’s agency devoted to services to unmarried mothers, adoption placement, marriage counseling, and other family services. Pugh’s legacy to the social work community in Alabama goes far beyond the program developments and management improvements he spearheaded. His most significant legacy is perhaps the identification and discovery of potential social work talent in the scores of young professionals he recruited, trained, and encouraged during his career. Those social workers cause his name and spirit to continue as they work to improve the quality of life for others. Pugh received an MSW degree from Florida State University and a BS from the University of Alabama. He was nominated for NASW’s National Social Worker of the Year in 1983. The social work profession and the state of Alabama lost a leader and pioneer with the death of Bill Pugh.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><h3 data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">#27) Jane Bierdeman-Fike (1922-2012)</span></h3><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1147"><img alt="" class="wp-image-2666 aligncenter" data-dcnode-id="1148" height="162" loading="lazy" sizes="(max-width: 181px) 100vw, 181px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/fike-e1537290424321.jpg&amp;raw" srcset="https://www.bestmswprograms.com/wp-content/uploads/2018/09/fike-e1537290424321.jpg 382w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/fike-e1537290424321-300x269.jpg 300w" width="181"></p><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1143" style="text-align: center;"><a data-dcnode-id="1144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.williamwoods.edu/wp-content/uploads/2015/03/Jane-Bierdeman-Fike1.jpg"><span data-dcnode-id="1145" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Jane Bierdeman-Fike worked as a social worker in the area of mental health for fifty years. Her first job was as a case worker for the St. Louis Welfare Office where she was continuously employed since that time as a social worker in many different places. Beginning in 1962, she was the Director of Psychiatric Social Work at Fulton State Hospital. As director, she advocated for the vulnerable and often unheard residents at Fulton State. She was a role model and mentor for other social workers working with this population and was a great teacher to students all over the state and the United States as a practicum supervisor. Jane believed that those who are oppressed with mental illness need to have a voice and she taught this and lived this belief as a lecturer at William Woods University, University of Missouri School of Social Work in Columbia, George Warren Brown School of Social Work at Washington University and the School of Social Service at Saint Louis University. Prior to being asked to take on the responsibility as Director of Psychiatric Social Work, Jane was a casework supervisor and a psychiatric social worker at St. Louis State Hospital.</span></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">She worked with people with mental health needs from 1955 until her retirement. She didn’t just work with them, she lived for them. Every activity she chooses to participate in she did because she believed it would better their lot in life. She was a role model and social workers across Missouri feel blessed to have worked with her. She was honest, sensitive and caring, and on top of all of that, she knew her practice and stayed current with practice trends. Jane was the rare practitioner who believed in writing up and presenting her practice experiences and interventions. She published several articles and also received several grants. Jane not only served Fulton State Hospital, she served her community. She served on the NASW National Board of Directors and was a catalyst in getting the NASW- Missouri Chapter started. This involved gaining the collaboration of several different social work groups within the state. &nbsp;She served on the NASW Missouri Chapter Executive Committee as Vice-President, elect in 1975, and as President, elected in 1977. She graduated Magna Cum Laude from Maryville College in 1944 with a Bachelor of Arts degree. In 1949 she received her MSW from the School of Social Service, St. Louis University.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><h3 data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">#28) Antonia Pantoja (1922 – 2012)</span></h3><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1131"><img alt="" class="size-full wp-image-2693 aligncenter" data-dcnode-id="1132" height="187" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/pantoja.jpg&amp;raw" width="120"></p><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Antonia Pantoja was regarded by many in the Puerto Rico Latino community as one of the most important leaders in the United States. She was a charismatic and visionary leader. In 1997 she received the Presidential Medal of Freedom, the nation’s highest civilian honor, from President Clinton during a ceremony at the White House. He praised her work as founder of ASPIRA, an organization that promotes cultural pride, education, leadership training and community service for Latino youth. Pantoja also helped found the National Puerto Rico Forum and Boricua College. “Peace and respect – these are the values that define the work of Antonia Pantoja” Clinton said in presenting the award. “Her contributions to her people and, therefore, our country are unsurpassed,” he added, calling Panjota “the most respected and loved member of the Puerto Rican community.” “The impact of her work and her contributions to our community has had reverberations so profound and so broad that for generations to come, she will continue to be an inspiration for young Puerto Ricans,” declared then NASW Executive Director Josephine Nieves at a reception following the presentation. In 1973 she received a Ph.D. from Union Graduate School. She was on the faculty of the School of Social Work, San Diego State University and later founded the Graduate School of Community Development in San Diego, an institution that served communities and neighborhoods throughout the nation.</span></p><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1126" instrument_node="">She was involved in a variety of community and professional organizations, all working toward the goal of building stronger Puerto Rican and minority communities, including the Ford Foundation, the National Urban Coalition, the Museo del Barrio, the National Association of Social Workers, the Council on Social Work Education, and several other groups and organizations. One of her many friends and colleague wrote that “she never had a conversation with her when she was not addressing, or worrying about, a social concern or an in justice…her work was constant, her mind never rested, and everything she did was steeped in her values and ethics. As a result, her friends and admirers were in both high places, and in the Barrios, they were politicians, fundraisers, policy gurus, and in the arts. They lived in the contiguous United States, in Puerto Rico, and many parts of the world. Her friends and admirers were of all ages and all ethnic groups.” She was the author of </span><em data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Memoir of a Visionary</span></em><span data-dcnode-id="1123" instrument_node=""> as well as many other publications and speeches.</span></p><span data-dcnode-id="1121" instrument_node="">
</span><h3 data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">#29) Lillian C. Milanof (1922-2015)</span></h3><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1116"><img alt="" class="size-full wp-image-2667 aligncenter" data-dcnode-id="1117" height="197" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/milanof-e1537290715268.jpg&amp;raw" width="148"></p><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1112" style="text-align: center;"><a data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.f1connect.net/photo/tributes/t/8/r/207x207/3053034/Lillian-Milanof-1435162468.jpg"><span data-dcnode-id="1114" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Lillian Milanof was legendary among social work practitioners in Louisville. Since her career in social work and education began in 1944, clients, students, co-workers, and innumerable others have remarked about her strength, compassion and dedicated advocacy. Renowned for her more than two decades as an educator in the Raymond A. Kent School of Social Work at the University of Louisville, Milanof was also a nationally recognized child welfare expert whose encyclopedic recollection of child caring practices improved contemporary views about child welfare. For 60 years, her professional activities and affiliations were matched by a record of consultation and civic service that, alone, might have been a career. Throughout the 1940s, 1950s, and early 1960s, she held various positions, in public welfare organizations in Ohio and New York. In 1964, she moved to Kentucky and joined the social work faculty at the University of Louisville, where during the next 23 years she taught and advised students and served in administrative positions, including four years as director of admissions. Her sabbatical pursuits during these years included work with the Kentucky Youth Research Center in Frankfort, Kentucky, and the Department of Health, Education, and Welfare in Washington, D.C. She was named Professor Emerita upon her retirement from the University of Louisville in 1986.</span></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Milanof served as a consultant to the Board of Social Work Examiners of Kentucky, the Kentuckiana Children’s Center, the Dessie Scott Children’s Home, United Cerebral Palsy of the Bluegrass, and the Kentucky Youth Research Center. In the 1960s and 1970s, and again in the 1990s, she served on advisory bodies for the administrations of no less than four Kentucky governors. Throughout the 1980s and 1990s, she served on a variety of boards and planning committees for the Roman Catholic Diocese of Louisville and Western Kentucky. In 2002 Milanof was appointed by Mayor David Armstrong to the Louisville and Jefferson County Human Relations Commission. Her community service included work with the Aging Resource Center, the Kentucky Association for Older Persons, the Kentucky Cabinet for Human Resources, and Bridgehaven in Louisville. Milanof researched, reported and written frequently on topics including foster care, social work program assessment and social work education. Her service continued substantially into her post-retirement years. She continued to work with the Kentucky Cabinet for Families and Children, the Kentuckiana Regional Planning and Development Agency, Transit Authority of River City, Metro United Way, the Kentucky Long Term Care Ombudsman Program, and the Home of the Innocents in Louisville.</span></p><span data-dcnode-id="1105" instrument_node="">
</span><h3 data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">#30) Helen Reinherz (1923-2017)</span></h3><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1100"><img alt="50 Notable Social Workers in US History" class="aligncenter" data-dcnode-id="1101" height="130" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cache.legacy.net/legacy/images/cobrands/bostonglobe/photos/w0049682-1_20170329.jpgx%3Fw%3D130%26h%3D180%26v%3D0x000000004d33278d%26option%3D1&amp;raw" title="50 Notable Social Workers in US History" width="130"></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1096" style="text-align: center;"><a data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legacy.com/obituaries/bostonglobe/obituary.aspx%3Fn%3Dhelen-reinherz-zarsky%26pid%3D184752101"><span data-dcnode-id="1098" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">A Charter Member of the NASW, Helen was an active member of the Massachusetts Chapter, and served as the Chairperson of the Research Council. For twelve years she was a member of the Continuing Education Commission of the NASW. Helen received the Award for Greatest Contribution to Social Work Practice from the Massachusetts’s chapter NASW in 1982. She received numerous Awards from the Simmons Alumni Association for writing in mental health and problems of children and youth. In 1996, she received their Lifetime Achievement Award. In 1998, she was the recipient of the first research writing award of the Institute for the Advancement of Social Work Research and the Society for Social Work and Research for the paper “Traumas and Posttraumatic Stress Disorder in a Community Population of Older Adolescents” in the Journal of the American Academy of Child and Adolescent Psychiatry depicting the result of a 20 year study funded by NIMH. After graduating from Simmons College School of Social Work, Helen Reinherz worked as a case worker at the Family Service Bureau of Newton, MA. Her next position was in Child Psychiatry at the Massachusetts General Hospital and as a supervisor of students from Simmons College School of Social Work. Upon leaving that position, she began her career as a researcher with an NIMH grant supervising Harvard students who were volunteering at Metropolitan State Hospital.</span></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Since 1965, she was a member of the Faculty at Simmons College School of Social where she has been a Professor in the Research Department. From 1993 — 1996 she was Director of the Doctoral Program. Her affiliation with Simmons continues as she continues with her research projects. Her studies have focused on preschool children and adolescents. Currently, she is the Principal Investigator, “Simmons Longitudinal Study: Adaptation and Development Across the Lifespan”. In 2005, the Society for Social Work Research, gave her the Distinguished Achievement Award. Also in 2005, she received the NASW Presidential Award for Excellence in Social Work Research. This award “recognized her for her extensive body of research in mental health”. It further stated: “Since 1976, Reinherz has followed a group of community residents from kindergarten to adulthood, examining both risk and protective factors for depression, substance abuse, eating disorders and resilience. This Simmons Longitudinal Study, funded by the NIMH, has resulted in more than 60 articles and chapters in books. Most recently, Reinherz and her colleagues published their findings of child and adolescent risks for depression, resilience and impairments in adulthood from adolescent depression and substance disorders”.</span></p><span data-dcnode-id="1089" instrument_node="">
</span><h3 data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">#31) Edward F. Krise (1924-2003)</span></h3><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1084"><img alt="" class="size-full wp-image-2669 aligncenter" data-dcnode-id="1085" height="166" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/krise.jpg&amp;raw" width="121"></p><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Colonel Edward F. Krise has been a trailblazer, problem-solver and leader in his military career, and in civilian life. He seeks knowledge appropriate to the solution of the problem or crisis at hand, and looks for ways to support improved interpersonal relationships within difficult situations. After leaving military service, Ed Krise went to Brown University where he received a Bachelor of Arts Degree. Then he enrolled in the School of Social Service Administration at the University of Chicago where he received an M.A. in 1950. While at SSA, Ed Krise and his wife lived at Hull House and participated in community activities there. His first social work position was as Executive Secretary, North Dakota Youth Council and representative to the Mid-Century White House Conference on Children and Youth. With the advent of the Korean Conflict, Krise returned to active duty with a commission in the Army Medical Services Corps as a psychiatric social worker. He was one of the first social work officers in the newly established Military Social Work program. For fifteen years, he helped to develop social work roles and programs in various military mental health settings. He also participated in the evaluation of behavioral science programs in Vietnam for the Walter Reed Army Institute of Research. Along with his military assignments, Krise made contracts with mental health and social agencies in the communities where he was located and did part time work in selected agencies and supervised social work students.</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">He took advantage of many continued education opportunities and in 1958 returned to the University of Chicago where he earned a Ph.D. in Social Service Administration. Beginning in 1965, Lt. Colonel Krise was given a series of important assignments in which he used his interpersonal skills and his knowledge and experience in clinical practice, administration, research and human relations. His duties took him away from clinical practice and research and gave him responsibilities for work on significant issues which were important to all servicemen and their families. Initially, he was assigned to develop the Army Community Service Program for the continental United States. These duties included the development of the Army Equal Opportunity program. In 1969, Colonel Krise was transferred to the Army Surgeon General’s Office as Chief of the Office of Patient Care Administration which include staff supervision of CHAMPUS and Chair of the Interdepartmental Committee on Medical Care. In 1970, Col. Krise chaired a committee made up of representatives of each of the Armed Services to evaluate a special report on “Education in Race Relations” The evaluation committee became an implementation committee and in 1971, he was appointed the first Commandant of the Department of Defense Race Relations Institute.</span></p><span data-dcnode-id="1077" instrument_node="">
</span><h3 data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">#32) Bernice Catherine Harper (1925- )</span></h3><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1072"><img alt="" class="wp-image-2670 aligncenter" data-dcnode-id="1073" height="168" loading="lazy" sizes="(max-width: 204px) 100vw, 204px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/harper-e1537291133676.jpg&amp;raw" srcset="https://www.bestmswprograms.com/wp-content/uploads/2018/09/harper-e1537291133676.jpg 362w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/harper-e1537291133676-300x247.jpg 300w" width="204"></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1068" style="text-align: center;"><a data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dworakpeck.usc.edu/sites/default/files/2018-04/bernice_harper_square.jpg"><span data-dcnode-id="1070" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1067" instrument_node="">
</span><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Dr. Bernice Harper was instrumental in developing long term program policies which highlight continuity-of-care, including community and institutional care, and stresses the importance of psychosocial components. She served as the Medical Care Advisor to the Health Care Financing Administration in Washington, DC. Her career in health care and health care policy formulation led her to practice in varied settings, while personifying the values and ethical standards of the social work profession in even the most difficult and highly charged political environments. Harper earned her MSW from the University of Southern California in 1948, her MSc.PH from Harvard University in 1959 and her LLD degree from Faith Grant College, Birmingham, AL. Her commitment to the long term care of those in need has served to demonstrate the best of the best for the profession and for those in need. Her insight and commitment to professionals, especially social workers, who are under both personal and professional stress as they work with patients in the final phases of their lives, combined with her perspective, academic, and practice skills with their families, motivated her to produce a definitive publication on death and the special needs for professionals to cope with their related stress.</span></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">The book, Death: The Coping Mechanism of the Health Professional, was in advance of the interest now placed on this area. Harper identified and labeled specific stages of coping with death that are important to understand, especially for professionals living through the process with clients. Harper’s work at the City of Hope in California as Chief Social Worker and her practice with leukemia patients and families sustained her interest in the important needs of those with chronic and long term illness. She is nationally recognized for her work and is sought after for training workshops and conferences. Bernice Harper has consistently been referred to as the professional’s professional. Harper has been able to represent social work values and bring them into policy statements. She has not compromised the long term health care needs of those in the country. She has also worked with multiple government organizations around minority services and activities for professional as well as other educational needs. Harper serves on the board of directors for the NASW Foundation and has been active and held leadership positions at NASW and the International Conference on Social Welfare. &nbsp;In 2017, Harper was inducted into the California Social Work Hall of Distinction.</span></p><span data-dcnode-id="1061" instrument_node="">
</span><h3 data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">#33) Sabina Shalom (1925- )</span></h3><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1056"><img alt="" class="wp-image-2672 aligncenter" data-dcnode-id="1057" height="176" loading="lazy" sizes="(max-width: 177px) 100vw, 177px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/shalom-e1537296659959.jpeg&amp;raw" srcset="https://www.bestmswprograms.com/wp-content/uploads/2018/09/shalom-e1537296659959.jpeg 305w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/shalom-e1537296659959-150x150.jpeg 150w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/shalom-e1537296659959-300x298.jpeg 300w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/shalom-e1537296659959-80x80.jpeg 80w" width="177"></p><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1052" style="text-align: center;"><a data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pbs.twimg.com/profile_images/3293623994/26c5d6da27a63c0b8085145c2aeb7341.jpeg"><span data-dcnode-id="1054" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Born and educated in Sheffield England, Sabina Shalom was a volunteer with a British Relief Organization working with concentration camp survivors in Europe after World War II. &nbsp;Elie Wiesel, who later became a Nobel Laureate, was a youngster in one of the homes to which Sabina was assigned by Oeuvre des Secours Aux Enfants, France. Her work also encompassed the illegal immigration to Israel of scores of stateless adults and young persons. Later, under the chairmanship of Lady Lionel de Rothschild, Sabina directed “The Children’s Marrainage Scheme,” an organization which brought orphaned children to England and place them in foster homes. Her programs with the BBC London’s overseas service enabled these survivors to broadcast messages abroad hoping to trace living relatives in Europe. The family moved to Canada, the U.S. and then South America for five years in Equatorial Barranquilla, Columbia and later, seven years in Bogota. &nbsp;While in Bogota, Sabina together with medical professionals set up a free welfare clinic for unwed mothers, and under the auspices of the American Women’s Associations, she organized an escort service for the blind and Meals on Wheels for the sick and needy.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Sabina often served as Cultural Attache´ to the Canadian Embassy. With fluency in French and Spanish, she was requested to translate for and accompany Princess Anne when Her Royal Highness visited Columbia and was asked by the Press about Canada’s efforts to improve the life of indigent Columbians. Upon returning to Florida, Sabina and her husband were curators at the International Polish Government’s Holocaust Exhibition and worked together in resettlement programs for Russian immigrants. &nbsp;She read for the Miami Lighthouse for the Blind, became a hospice volunteer and as the Florida spokesperson for the incarcerated Jonathan Pollard traveled extensively to plead against the injustice of the harsh sentence. Sabina was instrumental in advocating for non-smoker’s rights. She pressed charges against a smoker who refused to extinguish his cigarette in an elevator, an action that obliged her to become a witness for the State of Florida. The NASW Florida Chapter awarded her with a Lifetime Achievement Award in recognition of her 50 years of dedicated service. After 30 years of marriage, she asked her husband for a leave of absence with pay. &nbsp;She “put a pack on her back and traveled 50,000 miles alone around the world on $1,500. Out of this experience, she wrote “A Marriage Sabbatical.” Her book was originally published in 1984 and reprinted in 2001.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><h3 data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">#34) Jack Rothman (1927- )</span></h3><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><img alt="" class="wp-image-2673 aligncenter" data-dcnode-id="1041" height="180" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/rothman-e1537297030897.jpg&amp;raw" width="167"></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1036" style="text-align: center;"><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lib.umich.edu/faculty-history/sites/www.lib.umich.edu.faculty-history/files/imagecache/small/sites/default/files/Rothman%2C%2520Jack.jpg"><span data-dcnode-id="1038" instrument_node="">Image Source</span></a></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Jack Rothman has made groundbreaking contributions to the profession in the area of practice and also in research. In addition, he has forcefully forged innovative connections between knowledge development and knowledge utilization for over three decades. This work has been distinctive, distinguished, and impressively path setting. His scholarly work in community organization practice provided the foundation for a sound academic footing for that field. The literature up to that point had been highly descriptive and anecdotal. He formulated the leading conceptualization of community intervention, “Three Models of Community Organization Practice,” which is recognized nationally and internationally as the foremost theoretical construct in that field. His co-­edited textbook, “Strategies of Community Intervention,” which has that piece as its cornerstone article, is in its 7th edition and is the longest standing text in community organization–and possibly in social work generally (originally published in 1974). Rothman’s work was a critical factor in having the professional come to accept social action and political advocacy as legitimate practice functions in the field. In the early 1960s, Rothman joined Professor Meyer Schwartz at the University of Pittsburgh to implement the first contemporary two-year concentration in community organization.</span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">He continued with notable curriculum development work in community organization at the University of Michigan. With his colleagues, he designed the most comprehensive community organization curriculum, built the largest student body in the country, and inspired other similar specializations across the nation. His work was prescient, emerging prior to the profession’s embrace of evidence-based practice and providing a guiding framework for the empirical practice movement that has influenced academic research in social work for several decades. Rothman’s early work at the University of Michigan involved an extensive research utilization effort geared to developing an empirical knowledge base for community intervention. Rothman’s awards include those from: the Evaluation Research Society; ACOSA; and the NASW Foundation, to which can be added two senior Fulbright Research fellowships— in Great Britain and Israel (these fellowship are seldom awarded twice); a Harry Lurie Fellowship; a Distinguished Alumni Award from Ohio State University; and consulting invitations from the National Science Foundation; the Center for Disease Control; the National Task Force on Group Life in America; the Veterans Administration; and numerous other international, national, state and local bodies. He is an American social worker who has gained widespread international recognition and respect for advances in both the research realm and in the field of community intervention, recognition that extends well beyond the field of social work.</span></p><span data-dcnode-id="1029" instrument_node="">
</span><h3 data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">#35) James M. Karls (1927-2008)</span></h3><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><img alt="" class="wp-image-2674 aligncenter" data-dcnode-id="1025" height="168" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/karls.jpg&amp;raw" width="122"></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">After serving in World War II, Dr. Karls began his outstanding 59 years of social work in public mental health services at the local and state level. &nbsp;He started the first mental health clinics in California’s Central Valley. He was the associate director and then director of the Mental Health Training Center in Southern California, which offered seminars to anyone in the mental health field in the southern half of the state. &nbsp;He followed that as director of Mental Health Research for California. He was a part-time faculty member at UCSB, UCLA, University of California, Berkeley, San Francisco State and USC. Perhaps Dr. Karls’ greatest contribution to the public appreciation of social work is his development of the “person in the environment” (PIE) assessment system that distinguishes social work from the other mental health professions. &nbsp;Working with Dr. Karin Wandrei, Dr. Karls used the concept underlying social work practice of person-in-environment to develop a system for social workers to record the results of their assessment that addresses the whole person. It helps the practitioner determine recommended courses of action, and to clearly follow the progress of the work. It is used as a teaching tool not only in the US but internationally.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">PIE provides an alternative to the medical model that has traditionally dominated mental health practice, and encourages social work leadership in social rehabilitation, community resources, and advocacy models. Dr. Karls traveled extensively around the world teaching international social workers about the PIE assessment system. &nbsp;He served as the NASW California Chapter President and the President of the Santa Barbara Mental Health Association. Dr. Karls received numerous social work awards including NASW’s Chapter and Unit Lifetime Achievement awards and the lifetime national recognition award from the National Council for Community Behavioral Healthcare. &nbsp;He founded the California Hall of Distinction that honors past and present great social workers in California, and he was inducted in 2008. Wherever social work systems theory is discussed, person in environment or PIE frequently comes up. When Dr. Karls’ name comes up, social workers throughout the country and around the world nod their heads in acknowledgement to this great social worker who has significantly advanced professional social work in theory and practice.</span></p><span data-dcnode-id="1017" instrument_node="">
</span><h3 data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">#36) Dr. Hobart A. Burch (1932-2012)</span></h3><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1012"><img alt="" class="wp-image-2675 aligncenter" data-dcnode-id="1013" height="157" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/burch.jpg&amp;raw" width="113"></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Dr. Hobart Burch embodied a role model for future social workers in his career. He was a successful practitioner in increasingly responsible leadership positions at the neighborhood and city levels in New York City, Boston and Buffalo. He demonstrated creative and influential leadership in faith-based social work at the National Council of Churches. The mission there was on planning and coordination to weave a safety net of social services well before the concept became popular. He helped shape the Federal Government’s policy and program response to poverty, particularly in youth employment, as a part of the War on Poverty. He had an active and important role in interpreting and promoting professional social work in an environment that was hostile to the profession. He did this, in part, by quickly preparing well-researched policy and program position papers that were used by his superiors in the U.S. Department of Labor. Thus, he helped give real meaning to the efforts to build a “Great Society.” In this role, he helped change the views of many decision makers about the worth of professional social work and some of their clients. &nbsp;He chose to leave Federal service when his convictions were no longer compatible with Federal direction.</span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">He then became the Executive Director of the National Social Welfare Assembly. In this position, he used his knowledge of the Federal system to help guide the efforts of many national non-profit organizations. Dr. Burch completed the final years of a productive career as a professor of social work and as Dean of the School of Social Work in the state of Nebraska. His teaching and educational administration career was distinguished by his commitment to the whole of the profession. For him, the micro/macro split was seen as a window of convenience rather than two different kinds of social work. During this period, his policy research and writing led him to international social work. In this connection, he established a consulting relationship that shared social work policy learning internationally. Dr. Burch received an A.B. in 1953 from Princeton University with a double major in English literature and American civilization program; an MDiv from Union Theological Seminary in 1956; a MSW in 1958 from the Columbia University School of Social Work; and a Ph.D. in Social Policy and Planning from Brandeis University in 1958. &nbsp;He authored several books on social policy.</span></p><span data-dcnode-id="1005" instrument_node="">
</span><h3 data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">#37) Nazneen S. Mayadas (1934- 2015)</span></h3><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="1000"><img alt="" class="wp-image-2676 aligncenter" data-dcnode-id="1001" height="165" loading="lazy" sizes="(max-width: 151px) 100vw, 151px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/mayadas-e1537297762355.jpg&amp;raw" srcset="https://www.bestmswprograms.com/wp-content/uploads/2018/09/mayadas-e1537297762355.jpg 1057w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/mayadas-e1537297762355-275x300.jpg 275w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/mayadas-e1537297762355-768x837.jpg 768w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/mayadas-e1537297762355-940x1024.jpg 940w" width="151"></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="996" style="text-align: center;"><a data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//giving.uta.edu/image/Nazneen-Sada-Mayadas-Tribute-Image.jpg"><span data-dcnode-id="998" instrument_node="">Image Source</span></a></p><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">At the time of her retirement in 2006, Dr. Mayadas had practiced social work for 50 years in India, Canada, The United States, and in her capacity as Chief of Social Services in the Office of the United Nations’ High Commissioner for Refugees, Geneva, Switzerland. Born in Lucknow, India, Nazneen Sada Mayadas held the degrees of Bachelor of Arts from Lucknow University, India; Master of Arts from Allahabad University, India; Master of Social Work from Case Western Reserve University, and a doctorate in Social Work from Washington University, St Louis. Dr. Mayadas served on the faculties of The University of St Louis and The University of Texas at Arlington, where she established herself as a prolific researcher, scholar and award winning teacher. She also served as visiting professor on the faculties of Smith College, George Warren Brown School of Social Work, Washington University, St Louis; and The South Glamorgan Institute, University of Wales, Cardiff. Dr. Mayadas practiced in many countries and continents of the world working for better conditions for refugees. Her services to the profession of social work included national leadership positions such as Chair of the National Association of Social Workers’ Book Committee, Chair of the National Association of Social Workers’ Publications Committee, service on the Council on Social Work Education International Commission and Global Commission, and on the Executive Board of the Association for the Advancement of Social Work with Groups.</span></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="991" instrument_node="">A productive scholar, she published six books, 25 book chapters, and more than 50 journal articles. She was co-editor of </span><i data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Social Development Issues</span></i><span data-dcnode-id="988" instrument_node="">. In 2010 Dr. Mayadas was one of the 15 women whose contributions were celebrated in the book by Professor Alice Lieberman, ‘Women in Social Work who changed the World ‘ published by Lyceum Press. The years between the beginning of her social work career in community work in Calcutta, India, her homeland, and her retirement in 2006 as Professor Emerita at the University of Texas at Arlington, were packed with contributions to the profession. Some of her innovative and groundbreaking achievements and her contributions to the improvement of practice are summarized as follows: Chief of Social Services for The United Nations High Commissioner for Refugees in Geneva in the mid 1980s; a leader in the field of international social work; awarded the ‘Partners in Advancing Social Work Education’ award by the International Commission of the CSWE in 2006; practitioner and teacher of social work across national boundaries over a period of five decades; researcher on effectiveness in the teaching and practice of counseling skills and the use of video in clinical practice and training.</span></p><span data-dcnode-id="986" instrument_node="">
</span><h3 data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">#38) James R. Kelly (1934-2002)</span></h3><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><img alt="" class="wp-image-2677 aligncenter" data-dcnode-id="982" height="161" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/kelly.jpg&amp;raw" width="99"></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Jim Kelly’s pioneering work in the development and administration of the Veterans Administration Extended Care Programs has shaped the modalities of long-term care now available to veterans across the country. &nbsp;As Chief of Community Care Programs (1975-1988) and Director of Extended Care Service (1988-1997) in the VA Central Office, he fostered the growth of new home and community-based services and led the effort to coordinate and integrate individual long-term care programs into a unified continuum of extended care programs. Jim achieved many “firsts” in his pioneering efforts in the VA: &nbsp;implementing legislation and setting standards allowing VA to reimburse community nursing homes; arranging for adoption of Medicare/Medicaid standards by VA; initiating the first federal standards for residential care; implementing Community Residential Care, Adult Day Health Care and Homemaker/Home Health Aide services within the VA system; expanding these programs to include the frail elderly and the mentally ill as well as the physically disabled; establishing a comprehensive policy for VA long-term care programs. &nbsp;&nbsp;With each policy and program development, he held interdisciplinary educational seminars for VA staff and other professional caregivers.</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Jim Kelly graduated from Georgetown University in 1956. &nbsp;He served in the Army for two years, and then went to the School of Social Service Administration at the University of Chicago where he received his MASSA in 1961. &nbsp;His social work career started at the VA Hospital in Perry Point, Maryland, where he was on the staff for 10 years. He was Chief of Social Work Service at the VA Medical Center in Togus, Maine for three years, before being reassigned as one of the original staff members in the Geriatrics and Extended Care Strategic Healthcare Group when it was formed as an office in 1975. The National Council honored Mr. Kelly’s work in Adult Day Health Care on Aging by awarding him the John Heinz Award in 1993. &nbsp;Upon his retirement from the VA, in 1997, Mr. Kelly received a Distinguished Career Award from the Secretary of the Department. The Citation concluded: “Finally, James Kelly epitomizes the public servant at his very best. A career federal employee, he has consistently demonstrated intelligence, hard work, determination, and attention to detail to become and remain a successful leader in long-term care. He has served as a valued mentor to many professionals in long-term care, he has instilled in others the importance of the mission of service to veterans and the expectation of excellence in care, delivery, program management and policy analysis.”</span></p><span data-dcnode-id="974" instrument_node="">
</span><h3 data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">#39) Barbara Mikulski (1936- )</span></h3><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="969"><img alt="" class="wp-image-2678 aligncenter" data-dcnode-id="970" height="141" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/mikulski-e1537298056703.jpeg&amp;raw" width="191"></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="965" style="text-align: center;"><a data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn0.msw.usc.edu/content/d0a6a1afe92844c49f7cd57ebf279ed0/9-mikulski-p2-20120523-400x266.jpeg"><span data-dcnode-id="967" instrument_node="">Image Source</span></a></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Senator Mikulski was the first Democratic woman to serve in both the U.S. House of Representatives and U.S. Senate, the first woman to win a statewide election in Maryland, and the longest serving woman in the history of Congress. &nbsp;Earning a bachelor’s degree in sociology from Mount Saint Agnes College and her Master of Social Work from the University of Maryland, she spent years in the field — organizing communities, explaining Medicare to senior citizens and helping at-risk children. She began her career as a social worker after graduating from the University of Maryland with an MSW. She worked with at-risk children in Baltimore. Senator Mikulski began her political career by organizing neighbors to stop construction of a 16-lane highway through the historic Fells Point area of Baltimore. This highway not only threatened Fells Point, but also would have cut through the first black home ownership neighborhood in the city and would have prevented the successful development of the Harbor Area. Barbara Mikulski became known as the street fighter who beat the highway. This led to a seat on the Baltimore City Council which then led to the United States House of Representatives and now to the United States Senate. Senator Mikulski was elected to the Senate in 1986. She was the first Democratic woman to hold a Senate seat not previously held by her husband; the first Democratic woman to serve in both houses of Congress; and the first woman to win a statewide election in Maryland. Her pioneering efforts and her advocacy on behalf of women candidates has helped elect five new Democratic women to the United States Senate, and has made her the unofficial “Dean of the Senate Women.”</span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">While blocking the freeway gained her local affection in 1968, speaking at Catholic University in 1970 set the stage and tone for her future political career – one that has been driven by passion for social justice and for serving her community that she developed as a social worker. &nbsp;Summarizing her career, Mikulski told the National Association of Social Workers, “Even though I have been a United States senator for more than two decades, I still think of myself as a social worker. I listen to the people and when there are problems, I try to find ways to help. … My experience as a social worker taught me valuable lessons that I still draw on today.” Senator Mikulski is recognized as a national leader on the issue of women’s health care-as one of the originators of the National Service concept-as a champion for the rights of working people-and as an aggressive advocate for jobs for Maryland. &nbsp;In a speech that still resonates today, Mikulski said: “America isn’t a melting pot. It’s a sizzling cauldron. … The ethnic American also feels unappreciated for the contribution he makes to society. He resents the way the working class is looked down upon. … The public and private institutions have made him frustrated by their lack of response to his needs. At present he feels powerless in his daily dealings with and efforts to change them. Unfortunately, because of old prejudices and new fears, anger is generated against other minority groups rather than those who have power. What is needed is an alliance of white and black, white collar, blue collar and no collar based on mutual need, interdependence and respect, an alliance to develop the strategy for new kinds of community organization and political participation.”</span></p><span data-dcnode-id="958" instrument_node="">
</span><h3 data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">#40) Phyllis N. Black (1936- )</span></h3><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="953"><img alt="" class="wp-image-2679 aligncenter" data-dcnode-id="954" height="149" loading="lazy" sizes="(max-width: 150px) 100vw, 150px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestmswprograms.com/wp-content/uploads/2018/09/black-e1537298215766.jpg&amp;raw" srcset="https://www.bestmswprograms.com/wp-content/uploads/2018/09/black-e1537298215766.jpg 137w, https://www.bestmswprograms.com/wp-content/uploads/2018/09/black-e1537298215766-80x80.jpg 80w" width="150"></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="949" style="text-align: center;"><a data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cswe.org/getattachment/ac5209bc-537d-49bb-8a60-5df058f145ad/Dr-Phyllis-Black%2C-MSW%2C-PhD%2C-ACSW%2C-LSW.aspx"><span data-dcnode-id="951" instrument_node="">Image Source</span></a></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Dr. Black has been a pioneer in the fields of group work, ethics, and research. &nbsp;Her early days as a social worker in Harlem and Baltimore modeled the power of group work. &nbsp;Black’s work with the Council on Social Work Education Commission’s on Curriculum and Educational Innovation led to further growth and collaborative efforts in the field. Black is recognized as a leader in the area of social work values and ethics, having authored two books on the topic. &nbsp;Additionally, she designed and implemented the first required course in social work ethics in the country. Her presentations and publications have addressed practice, research, and education in the areas of hospice, rural populations, and genetics. Black has chaired CSWE’s Commission on Social Work Practice and the Ad Hoc Centennial Committee. &nbsp;She was also a member of the Ad Hoc Task Force to Develop Strategies to Increase the Number of Underrepresented Faculty and Underrepresented Students in Social Work Education. Her most well-known contribution to the field may have been her leadership in the development of CSWE’s 2008 Educational Policy and Accreditation Standards.</span></p><span data-dcnode-id="945" instrument_node="">
