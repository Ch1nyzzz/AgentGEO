</span><p data-dcnode-id="7060"><b data-dcnode-id="7081"><span data-dcnode-id="7082" instrument_node="">Teenage pregnancy in the United States</span></b><span data-dcnode-id="7080" instrument_node=""> refers to females under the age of 20 who become </span><a class="mw-redirect" data-dcnode-id="7078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pregnant" title="Pregnant"><span data-dcnode-id="7079" instrument_node="">pregnant</span></a><span data-dcnode-id="7077" instrument_node="">. 89% of these births take place out-of-wedlock.</span><sup class="reference" data-dcnode-id="7074" id="cite_ref-1"><a data-dcnode-id="7075" href="#cite_note-1"><span data-dcnode-id="7076" instrument_node="">[1]</span></a></sup><span data-dcnode-id="7073" instrument_node=""> Since the 1990s, teen pregnancy rates have declined almost continuously in the United States but has one of the highest teenage birth rates among the industrialized nations. The 5 states with the highest teen birth rate are Arkansas, Mississippi, Louisiana, Oklahoma, and Alabama.</span><sup class="reference" data-dcnode-id="7070" id="cite_ref-2"><a data-dcnode-id="7071" href="#cite_note-2"><span data-dcnode-id="7072" instrument_node="">[2]</span></a></sup><span data-dcnode-id="7069" instrument_node="">According to the Centers for Disease Control, evidence suggests that the decline in teenage pregnancy is due to abstinence teaching and the use of birth control. Although the decline is considered good news, the racial/ethnic and geographic disparities continue in The United States.</span><sup class="reference" data-dcnode-id="7066" id="cite_ref-About_Teen_Pregnancy_{{!}}_CDC_3-0"><a data-dcnode-id="7067" href="#cite_note-About_Teen_Pregnancy_%7B%7B!%7D%7D_CDC-3"><span data-dcnode-id="7068" instrument_node="">[3]</span></a></sup><span data-dcnode-id="7065" instrument_node=""> In 2019, the birth rates for Hispanic teens and non-Hispanic Black teens were more than double than the rates for white teens.</span><sup class="reference" data-dcnode-id="7062" id="cite_ref-4"><a data-dcnode-id="7063" href="#cite_note-4"><span data-dcnode-id="7064" instrument_node="">[4]</span></a></sup><span data-dcnode-id="7061" instrument_node="">

</span><h2 data-dcnode-id="6903"><span class="mw-headline" data-dcnode-id="6911" id="Pregnancies"><span data-dcnode-id="6912" instrument_node="">Pregnancies</span></span><span class="mw-editsection" data-dcnode-id="6904"><span class="mw-editsection-bracket" data-dcnode-id="6909"><span data-dcnode-id="6910" instrument_node="">[</span></span><a data-dcnode-id="6907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTeenage_pregnancy_in_the_United_States%26action%3Dedit%26section%3D1" title="Edit section: Pregnancies"><span data-dcnode-id="6908" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6905"><span data-dcnode-id="6906" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6902" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6893"><div class="thumbinner" data-dcnode-id="6894" style="width:222px;"><a class="image" data-dcnode-id="6900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHappy_Birthday_Sweet_16_and_Pink_or_Blue%2C_We_Love_You_cake.jpg"><img alt="" class="thumbimage" data-dcnode-id="6901" data-file-height="684" data-file-width="812" decoding="async" height="185" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Happy_Birthday_Sweet_16_and_Pink_or_Blue%252C_We_Love_You_cake.jpg/220px-Happy_Birthday_Sweet_16_and_Pink_or_Blue%252C_We_Love_You_cake.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Happy_Birthday_Sweet_16_and_Pink_or_Blue%2C_We_Love_You_cake.jpg/330px-Happy_Birthday_Sweet_16_and_Pink_or_Blue%2C_We_Love_You_cake.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Happy_Birthday_Sweet_16_and_Pink_or_Blue%2C_We_Love_You_cake.jpg/440px-Happy_Birthday_Sweet_16_and_Pink_or_Blue%2C_We_Love_You_cake.jpg 2x" width="220"></a><span data-dcnode-id="6899" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6895"><div class="magnify" data-dcnode-id="6897"><a class="internal" data-dcnode-id="6898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHappy_Birthday_Sweet_16_and_Pink_or_Blue%2C_We_Love_You_cake.jpg" title="Enlarge"></a></div><span data-dcnode-id="6896" instrument_node="">"Happy Birthday Sweet 16" / "Pink or Blue, We Love You" cake</span></div></div></div><span data-dcnode-id="6892" instrument_node="">
</span><p data-dcnode-id="6878"><span data-dcnode-id="6891" instrument_node="">According to the Centers for Disease Control, more than four out of five, or 80%, of teenage pregnancies are unintended.</span><sup class="reference" data-dcnode-id="6888" id="cite_ref-:0_5-0"><a data-dcnode-id="6889" href="#cite_note-:0-5"><span data-dcnode-id="6890" instrument_node="">[5]</span></a></sup><span data-dcnode-id="6887" instrument_node=""> In 2010, of the majority of pregnancies to adolescent females in the United States, an estimated 60% ended in live birth, 15% ended in miscarriage, and 30% in abortion.</span><sup class="reference" data-dcnode-id="6884" id="cite_ref-:1_6-0"><a data-dcnode-id="6885" href="#cite_note-:1-6"><span data-dcnode-id="6886" instrument_node="">[6]</span></a></sup><span data-dcnode-id="6883" instrument_node=""> In 2012, there were 104,700 maternal hospital stays for pregnant teens; the number of hospital stays for teen pregnancies decreased by 47 percent from 2000-2012.</span><sup class="reference" data-dcnode-id="6880" id="cite_ref-7"><a data-dcnode-id="6881" href="#cite_note-7"><span data-dcnode-id="6882" instrument_node="">[7]</span></a></sup><span data-dcnode-id="6879" instrument_node="">
</span></p><p data-dcnode-id="6864"><span data-dcnode-id="6877" instrument_node="">In 2014, 249,078 babies were born to girls aged 15–19 years old. This is a birth rate of 24.2 per 1000 girls.</span><sup class="reference" data-dcnode-id="6874" id="cite_ref-:2_8-0"><a data-dcnode-id="6875" href="#cite_note-:2-8"><span data-dcnode-id="6876" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6873" instrument_node=""> However, most adolescents who give birth are over the age of 18. In 2014, 73% of teen births occurred in 18–19 year olds. Pregnancies are much less common among girls younger than 15. In 2008, 6.6 pregnancies occurred per 1,000 teens aged 13–14. In other words, fewer than 1% of teens younger than 15 became pregnant in 2008.</span><sup class="reference" data-dcnode-id="6870" id="cite_ref-gutt_9-0"><a data-dcnode-id="6871" href="#cite_note-gutt-9"><span data-dcnode-id="6872" instrument_node="">[9]</span></a></sup><span data-dcnode-id="6869" instrument_node=""> Pregnant teenagers tend to gain less weight than older mothers, due to the fact that they are still growing and competing for nutrients with the baby during the pregnancy.</span><sup class="reference" data-dcnode-id="6866" id="cite_ref-10"><a data-dcnode-id="6867" href="#cite_note-10"><span data-dcnode-id="6868" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6865" instrument_node="">
</span></p><p data-dcnode-id="6854"><span data-dcnode-id="6863" instrument_node="">Teen pregnancy is defined as pregnancies in girls under the age of 20, regardless of marital status. Teen pregnancy rates have dropped 9% since 2013.</span><sup class="reference" data-dcnode-id="6860" id="cite_ref-:2_8-1"><a data-dcnode-id="6861" href="#cite_note-:2-8"><span data-dcnode-id="6862" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6859" instrument_node=""> Between 1991 and 2014, teenage birth rates dropped 61% nationwide.</span><sup class="reference" data-dcnode-id="6856" id="cite_ref-11"><a data-dcnode-id="6857" href="#cite_note-11"><span data-dcnode-id="6858" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6855" instrument_node="">
</span></p><p data-dcnode-id="6829"><span data-dcnode-id="6853" instrument_node="">Teenage </span><a data-dcnode-id="6851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Birth_rate" title="Birth rate"><span data-dcnode-id="6852" instrument_node="">birth rates</span></a><span data-dcnode-id="6850" instrument_node="">, as opposed to pregnancies, peaked in 1991, when there were 61.8 births per 1,000 teens, and the rate dropped in 17 of the 19 years that followed.</span><sup class="reference" data-dcnode-id="6847" id="cite_ref-birth_slide_12-0"><a data-dcnode-id="6848" href="#cite_note-birth_slide-12"><span data-dcnode-id="6849" instrument_node="">[12]</span></a></sup><span data-dcnode-id="6846" instrument_node=""> Three in ten American girls will get pregnant before age 20. That is almost 750,000 pregnancies a year.</span><sup class="reference" data-dcnode-id="6843" id="cite_ref-:3_13-0"><a data-dcnode-id="6844" href="#cite_note-:3-13"><span data-dcnode-id="6845" instrument_node="">[13]</span></a></sup><span data-dcnode-id="6842" instrument_node=""> Nearly 89% of teenage births occur outside of marriage.</span><sup class="reference" data-dcnode-id="6839" id="cite_ref-:1_6-1"><a data-dcnode-id="6840" href="#cite_note-:1-6"><span data-dcnode-id="6841" instrument_node="">[6]</span></a></sup><span data-dcnode-id="6838" instrument_node=""> Of all girls, 16% will be teen mothers.</span><sup class="reference" data-dcnode-id="6835" id="cite_ref-pregEthnic_14-0"><a data-dcnode-id="6836" href="#cite_note-pregEthnic-14"><span data-dcnode-id="6837" instrument_node="">[14]</span></a></sup><span data-dcnode-id="6834" instrument_node=""> The largest increases in unintended pregnancies were found among girls who were cohabiting, had lower education, and low income.</span><sup class="reference" data-dcnode-id="6831" id="cite_ref-:0_5-1"><a data-dcnode-id="6832" href="#cite_note-:0-5"><span data-dcnode-id="6833" instrument_node="">[5]</span></a></sup><span data-dcnode-id="6830" instrument_node="">
</span></p><span data-dcnode-id="6828" instrument_node="">
</span><h2 data-dcnode-id="6818"><span class="mw-headline" data-dcnode-id="6826" id="Increased_pregnancy_risk_factors_in_teenagers"><span data-dcnode-id="6827" instrument_node="">Increased pregnancy risk factors in teenagers</span></span><span class="mw-editsection" data-dcnode-id="6819"><span class="mw-editsection-bracket" data-dcnode-id="6824"><span data-dcnode-id="6825" instrument_node="">[</span></span><a data-dcnode-id="6822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTeenage_pregnancy_in_the_United_States%26action%3Dedit%26section%3D2" title="Edit section: Increased pregnancy risk factors in teenagers"><span data-dcnode-id="6823" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6820"><span data-dcnode-id="6821" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6817" instrument_node="">
</span><p data-dcnode-id="6815"><span data-dcnode-id="6816" instrument_node="">There are certain factors in an adolescent/teenagers life that make them more pre-disposed to getting pregnant young. Some of which include race, (see below) but also factors such as sexuality, homelessness, foster care, living in rural areas, exposure to drugs and violence can effect whether a teenager gets pregnant young.
</span></p><p data-dcnode-id="6805"><span data-dcnode-id="6814" instrument_node="">The more risks compiled suggests that an adolescent that exhibits any of the risk listed, is at a higher risk for the other factors. This can include the use of alcohol or drugs.</span><sup class="reference" data-dcnode-id="6811" id="cite_ref-15"><a data-dcnode-id="6812" href="#cite_note-15"><span data-dcnode-id="6813" instrument_node="">[15]</span></a></sup><span data-dcnode-id="6810" instrument_node=""> This is consistent with the Jessor Problem Behavior Theory.</span><sup class="reference" data-dcnode-id="6807" id="cite_ref-16"><a data-dcnode-id="6808" href="#cite_note-16"><span data-dcnode-id="6809" instrument_node="">[16]</span></a></sup><span data-dcnode-id="6806" instrument_node="">
</span></p><span data-dcnode-id="6804" instrument_node="">
</span><h2 data-dcnode-id="6794"><span class="mw-headline" data-dcnode-id="6802" id="By_ethnicity"><span data-dcnode-id="6803" instrument_node="">By ethnicity</span></span><span class="mw-editsection" data-dcnode-id="6795"><span class="mw-editsection-bracket" data-dcnode-id="6800"><span data-dcnode-id="6801" instrument_node="">[</span></span><a data-dcnode-id="6798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTeenage_pregnancy_in_the_United_States%26action%3Dedit%26section%3D3" title="Edit section: By ethnicity"><span data-dcnode-id="6799" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6796"><span data-dcnode-id="6797" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6793" instrument_node="">
</span><p data-dcnode-id="6776"><span data-dcnode-id="6792" instrument_node="">Black, Latina, and Native American youth experience the highest rates of teenage pregnancy and childbirth.</span><sup class="reference" data-dcnode-id="6789" id="cite_ref-:2_8-2"><a data-dcnode-id="6790" href="#cite_note-:2-8"><span data-dcnode-id="6791" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6788" instrument_node=""> Studies show that Asians (23 per 1,000) and whites (43 per 1,000)</span><sup class="reference" data-dcnode-id="6785" id="cite_ref-gutt_9-1"><a data-dcnode-id="6786" href="#cite_note-gutt-9"><span data-dcnode-id="6787" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="6782" id="cite_ref-pregEthnic_14-1"><a data-dcnode-id="6783" href="#cite_note-pregEthnic-14"><span data-dcnode-id="6784" instrument_node="">[14]</span></a></sup><span data-dcnode-id="6781" instrument_node=""> have lower rates of pregnancy before the age of 20. The pregnancy rate among black teens decreased 48% between 1990 and 2008, more than the overall U.S. teen pregnancy rate declined during the same period (42%).</span><sup class="reference" data-dcnode-id="6778" id="cite_ref-gutt_9-2"><a data-dcnode-id="6779" href="#cite_note-gutt-9"><span data-dcnode-id="6780" instrument_node="">[9]</span></a></sup><span data-dcnode-id="6777" instrument_node="">
</span></p><p data-dcnode-id="6768"><b data-dcnode-id="6774"><span data-dcnode-id="6775" instrument_node="">Teen birth rates decline by racial groups</span></b><span data-dcnode-id="6773" instrument_node=""> </span><sup class="reference" data-dcnode-id="6770" id="cite_ref-About_Teen_Pregnancy_{{!}}_CDC_3-1"><a data-dcnode-id="6771" href="#cite_note-About_Teen_Pregnancy_%7B%7B!%7D%7D_CDC-3"><span data-dcnode-id="6772" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6769" instrument_node="">
</span></p><p data-dcnode-id="6766"><span data-dcnode-id="6767" instrument_node="">Teen birth rates declined from 2018 to 2019 for several racial groups and for Hispanics.1,2 Among 15- to 19-year-olds, teen birth rates decreased:
</span></p><span data-dcnode-id="6765" instrument_node="">
</span><ul data-dcnode-id="6756"><li data-dcnode-id="6763"><span data-dcnode-id="6764" instrument_node="">5.2% for Hispanic females.</span></li><span data-dcnode-id="6762" instrument_node="">
</span><li data-dcnode-id="6760"><span data-dcnode-id="6761" instrument_node="">5.8% for non-Hispanic White females.</span></li><span data-dcnode-id="6759" instrument_node="">
</span><li data-dcnode-id="6757"><span data-dcnode-id="6758" instrument_node="">1.9% for non-Hispanic Black females.</span></li></ul><span data-dcnode-id="6755" instrument_node="">
</span><p data-dcnode-id="6753"><span data-dcnode-id="6754" instrument_node="">Rates for non-Hispanic American Indian/Alaska Natives (AI/AN), non-Hispanic Asians, and non-Hispanic Native Hawaiian, and other Pacific Islander teenagers were unchanged.
</span></p><p data-dcnode-id="6751"><span data-dcnode-id="6752" instrument_node="">In 2019, the birth rates for Hispanic teens (25.3) and non-Hispanic Black teens (25.8) were more than two times higher than the rate for non-Hispanic White teens (11.4). The birth rate of American Indian/Alaska Native teens (29.2) was highest among all race/ethnicities.
</span></p><span data-dcnode-id="6750" instrument_node="">
</span><h2 data-dcnode-id="6740"><span class="mw-headline" data-dcnode-id="6748" id="By_region"><span data-dcnode-id="6749" instrument_node="">By region</span></span><span class="mw-editsection" data-dcnode-id="6741"><span class="mw-editsection-bracket" data-dcnode-id="6746"><span data-dcnode-id="6747" instrument_node="">[</span></span><a data-dcnode-id="6744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTeenage_pregnancy_in_the_United_States%26action%3Dedit%26section%3D4" title="Edit section: By region"><span data-dcnode-id="6745" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6742"><span data-dcnode-id="6743" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6739" instrument_node="">

</span><h2 data-dcnode-id="5707"><span class="mw-headline" data-dcnode-id="5715" id="Parenting_as_a_teenager"><span data-dcnode-id="5716" instrument_node="">Parenting as a teenager</span></span><span class="mw-editsection" data-dcnode-id="5708"><span class="mw-editsection-bracket" data-dcnode-id="5713"><span data-dcnode-id="5714" instrument_node="">[</span></span><a data-dcnode-id="5711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTeenage_pregnancy_in_the_United_States%26action%3Dedit%26section%3D6" title="Edit section: Parenting as a teenager"><span data-dcnode-id="5712" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5709"><span data-dcnode-id="5710" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5706" instrument_node="">
</span><p data-dcnode-id="5692"><span data-dcnode-id="5705" instrument_node="">There were 334,000 births among teenage girls aged 19 or younger in 2011, representing 8% of all U.S. births.</span><sup class="reference" data-dcnode-id="5702" id="cite_ref-gutt_9-3"><a data-dcnode-id="5703" href="#cite_note-gutt-9"><span data-dcnode-id="5704" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5701" instrument_node=""> Births to teen mothers peaked in 1991 at 62 births per 1,000 girls. This rate was halved by 2011 when there were 31 births per 1,000 girls.</span><sup class="reference" data-dcnode-id="5698" id="cite_ref-gutt_9-4"><a data-dcnode-id="5699" href="#cite_note-gutt-9"><span data-dcnode-id="5700" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5697" instrument_node=""> About 25% of teenage mothers have a second child within 24 months of the first birth.</span><sup class="reference" data-dcnode-id="5694" id="cite_ref-:5_18-0"><a data-dcnode-id="5695" href="#cite_note-:5-18"><span data-dcnode-id="5696" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5693" instrument_node="">
</span></p><p data-dcnode-id="5686"><span data-dcnode-id="5691" instrument_node="">Teenagers are becoming better contracepters because they realize that their sexual partners may not be a reliable coparent. Marriage rates over the 1990s through the 2010s with teenagers has drastically declined because of this realization. Since contraception has become more obtainable for teenagers, they are preventing unwanted pregnancies.</span><sup class="reference" data-dcnode-id="5688" id="cite_ref-Furstenberg_33_19-0"><a data-dcnode-id="5689" href="#cite_note-Furstenberg_33-19"><span data-dcnode-id="5690" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5687" instrument_node="">
</span></p><p data-dcnode-id="5668"><span data-dcnode-id="5685" instrument_node="">For every 1,000 black boys in the United States, 29 of them are fathers, compared to 14 per 1,000 white boys.</span><sup class="reference" data-dcnode-id="5682" id="cite_ref-gutt_9-5"><a data-dcnode-id="5683" href="#cite_note-gutt-9"><span data-dcnode-id="5684" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5681" instrument_node=""> The rate of teen fatherhood declined 36% between 1991 and 2010, from 25 to 16 per 1,000 males aged 15–19. This decline was more substantial among blacks than among whites (50% vs. 26%) and about half of the rate among teen girls.</span><sup class="reference" data-dcnode-id="5678" id="cite_ref-gutt_9-6"><a data-dcnode-id="5679" href="#cite_note-gutt-9"><span data-dcnode-id="5680" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5677" instrument_node=""> Nearly 80% of teenage fathers do not marry the teenage mother of their child.</span><sup class="reference" data-dcnode-id="5674" id="cite_ref-:6_20-0"><a data-dcnode-id="5675" href="#cite_note-:6-20"><span data-dcnode-id="5676" instrument_node="">[20]</span></a></sup><span data-dcnode-id="5673" instrument_node=""> Teenage fathers have 10-15% lower annual earnings than teenagers who do not father children.</span><sup class="reference" data-dcnode-id="5670" id="cite_ref-:6_20-1"><a data-dcnode-id="5671" href="#cite_note-:6-20"><span data-dcnode-id="5672" instrument_node="">[20]</span></a></sup><span data-dcnode-id="5669" instrument_node="">
</span></p><p data-dcnode-id="5658"><span data-dcnode-id="5667" instrument_node="">Most female teens report that they would be very upset (58%) or a little upset (29%) if they got pregnant, while the remaining 13% report that they would be a little or very pleased.</span><sup class="reference" data-dcnode-id="5664" id="cite_ref-gutt_9-7"><a data-dcnode-id="5665" href="#cite_note-gutt-9"><span data-dcnode-id="5666" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5663" instrument_node=""> Most male teens report that they would be very upset (47%) or a little upset (34%) if they got someone pregnant, while the remaining 18% report that they would be a little or very pleased.</span><sup class="reference" data-dcnode-id="5660" id="cite_ref-gutt_9-8"><a data-dcnode-id="5661" href="#cite_note-gutt-9"><span data-dcnode-id="5662" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5659" instrument_node="">
</span></p><p data-dcnode-id="5644"><span data-dcnode-id="5657" instrument_node="">Parenting as a teenager has detrimental effects on the children. Children born to teenage mothers are more likely to: be born prematurely, 50% more likely to repeat a grade, live in poverty, and suffer higher rates of abuse.</span><sup class="reference" data-dcnode-id="5654" id="cite_ref-:5_18-1"><a data-dcnode-id="5655" href="#cite_note-:5-18"><span data-dcnode-id="5656" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5653" instrument_node=""> The sons of teen mothers are 13% more likely to end up incarcerated, and the daughters of teenage mothers are 22% more likely to become teenage mothers.</span><sup class="reference" data-dcnode-id="5650" id="cite_ref-:5_18-2"><a data-dcnode-id="5651" href="#cite_note-:5-18"><span data-dcnode-id="5652" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5649" instrument_node=""> More than 25% of teen mothers live in poverty during their 20s.</span><sup class="reference" data-dcnode-id="5646" id="cite_ref-:6_20-2"><a data-dcnode-id="5647" href="#cite_note-:6-20"><span data-dcnode-id="5648" instrument_node="">[20]</span></a></sup><span data-dcnode-id="5645" instrument_node="">
</span></p><p data-dcnode-id="5638"><span data-dcnode-id="5643" instrument_node="">Teenage pregnancy imposes lasting hardships on two generations: mother and child. Evidence from U.S. studies show that girls who bear their first child at an early age bear more children rapidly and have more unwanted and out-of-wedlock births. Children of teenage parents are more likely to have lower academic achievements and tend to repeat the cycle of early marriage and early childbearing of their parents.</span><sup class="reference" data-dcnode-id="5640" id="cite_ref-21"><a data-dcnode-id="5641" href="#cite_note-21"><span data-dcnode-id="5642" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5639" instrument_node="">
</span></p><p data-dcnode-id="5632"><span data-dcnode-id="5637" instrument_node="">Since the Great Recession, young people take three times longer to gain financial independence than it took for young people three decades ago. It is much harder for teenage parents to be able to support a family compared to the past due to the competitive work environment.</span><sup class="reference" data-dcnode-id="5634" id="cite_ref-Furstenberg_33_19-1"><a data-dcnode-id="5635" href="#cite_note-Furstenberg_33-19"><span data-dcnode-id="5636" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5633" instrument_node="">
</span></p><span data-dcnode-id="5631" instrument_node="">
</span><h2 data-dcnode-id="5621"><span class="mw-headline" data-dcnode-id="5629" id="Supporting_teenage_parents"><span data-dcnode-id="5630" instrument_node="">Supporting teenage parents</span></span><span class="mw-editsection" data-dcnode-id="5622"><span class="mw-editsection-bracket" data-dcnode-id="5627"><span data-dcnode-id="5628" instrument_node="">[</span></span><a data-dcnode-id="5625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTeenage_pregnancy_in_the_United_States%26action%3Dedit%26section%3D7" title="Edit section: Supporting teenage parents"><span data-dcnode-id="5626" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5623"><span data-dcnode-id="5624" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5620" instrument_node="">
</span><p data-dcnode-id="5610"><span data-dcnode-id="5619" instrument_node="">More than 50% of teenage mothers do not graduate from high school.</span><sup class="reference" data-dcnode-id="5616" id="cite_ref-:3_13-1"><a data-dcnode-id="5617" href="#cite_note-:3-13"><span data-dcnode-id="5618" instrument_node="">[13]</span></a></sup><span data-dcnode-id="5615" instrument_node=""> Some high schools in the United States offer a program for pregnant and parenting teens to continue their education. These are sometimes referred to as "Teen Parent Programs".</span><sup class="reference" data-dcnode-id="5612" id="cite_ref-22"><a data-dcnode-id="5613" href="#cite_note-22"><span data-dcnode-id="5614" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5611" instrument_node="">
</span></p><p data-dcnode-id="5600"><span data-dcnode-id="5609" instrument_node="">There are several benefits to these school based programs, the number one benefit being teens are able to continue their high school education. Studies have shown that when teen parents stay in school after being pregnant, they have a better chance of graduating high school.</span><sup class="reference" data-dcnode-id="5606" id="cite_ref-23"><a data-dcnode-id="5607" href="#cite_note-23"><span data-dcnode-id="5608" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5605" instrument_node=""> Less than 2% of teen moms earn a college degree by age 30.</span><sup class="reference" data-dcnode-id="5602" id="cite_ref-:3_13-2"><a data-dcnode-id="5603" href="#cite_note-:3-13"><span data-dcnode-id="5604" instrument_node="">[13]</span></a></sup><span data-dcnode-id="5601" instrument_node=""> Many of these programs offer on-campus childcare. Some even require the pregnant and parenting teens to attend parenting classes or practicum classes. The parenting classes offer a place for these young parents to learn about the basic needs of a child. While, the practicum classes offer a hands on experience caring for the children in the childcare center.
</span></p><p data-dcnode-id="5594"><span data-dcnode-id="5599" instrument_node="">Statistics show that less than 10% of teen parents earn their high school diploma by their eighteenth birthday.</span><sup class="reference" data-dcnode-id="5596" id="cite_ref-24"><a data-dcnode-id="5597" href="#cite_note-24"><span data-dcnode-id="5598" instrument_node="">[24]</span></a></sup><span data-dcnode-id="5595" instrument_node=""> These programs are trying to change those statistics. Currently (2016), San Diego County has seven high schools that offer these teen parent programs.
</span></p><span data-dcnode-id="5593" instrument_node="">
</span><h2 data-dcnode-id="5583"><span class="mw-headline" data-dcnode-id="5591" id="Prevention:_The_Contribution_of_Abstinence_and_Contraceptive_Use"><span data-dcnode-id="5592" instrument_node="">Prevention: The Contribution of Abstinence and Contraceptive Use</span></span><span class="mw-editsection" data-dcnode-id="5584"><span class="mw-editsection-bracket" data-dcnode-id="5589"><span data-dcnode-id="5590" instrument_node="">[</span></span><a data-dcnode-id="5587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTeenage_pregnancy_in_the_United_States%26action%3Dedit%26section%3D8" title="Edit section: Prevention: The Contribution of Abstinence and Contraceptive Use"><span data-dcnode-id="5588" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5585"><span data-dcnode-id="5586" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5582" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5571"><div class="thumbinner" data-dcnode-id="5572" style="width:222px;"><a class="image" data-dcnode-id="5580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APreventing_Teen_Pregnancy_in_the_US-CDC_Vital_Signs-April_2011.pdf"><img alt="" class="thumbimage" data-dcnode-id="5581" data-file-height="1687" data-file-width="1312" decoding="async" height="283" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/62/Preventing_Teen_Pregnancy_in_the_US-CDC_Vital_Signs-April_2011.pdf/page1-220px-Preventing_Teen_Pregnancy_in_the_US-CDC_Vital_Signs-April_2011.pdf.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/62/Preventing_Teen_Pregnancy_in_the_US-CDC_Vital_Signs-April_2011.pdf/page1-330px-Preventing_Teen_Pregnancy_in_the_US-CDC_Vital_Signs-April_2011.pdf.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/62/Preventing_Teen_Pregnancy_in_the_US-CDC_Vital_Signs-April_2011.pdf/page1-440px-Preventing_Teen_Pregnancy_in_the_US-CDC_Vital_Signs-April_2011.pdf.jpg 2x" width="220"></a><span data-dcnode-id="5579" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5573"><div class="magnify" data-dcnode-id="5577"><a class="internal" data-dcnode-id="5578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APreventing_Teen_Pregnancy_in_the_US-CDC_Vital_Signs-April_2011.pdf" title="Enlarge"></a></div><span data-dcnode-id="5576" instrument_node="">Preventing Teen Pregnancy graphic by </span><a data-dcnode-id="5574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Centers_for_Disease_Control_and_Prevention" title="Centers for Disease Control and Prevention"><span data-dcnode-id="5575" instrument_node="">Centers for Disease Control and Prevention</span></a></div></div></div><span data-dcnode-id="5570" instrument_node="">
</span><p data-dcnode-id="5560"><span data-dcnode-id="5569" instrument_node="">The United States has the highest rates of teenage pregnancy and sexually transmitted diseases in developed countries.</span><sup class="reference" data-dcnode-id="5566" id="cite_ref-25"><a data-dcnode-id="5567" href="#cite_note-25"><span data-dcnode-id="5568" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5565" instrument_node=""> The two primary reasons given by teenagers for not using protection is that the chance of becoming pregnant is small, and the failure to anticipate intercourse.</span><sup class="reference" data-dcnode-id="5562" id="cite_ref-26"><a data-dcnode-id="5563" href="#cite_note-26"><span data-dcnode-id="5564" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5561" instrument_node="">
</span></p><p data-dcnode-id="5542"><span data-dcnode-id="5559" instrument_node="">The best method of reducing the consequences of teenage parenthood is by providing reproductive health services to prevent teenagers from becoming pregnant in the first place.</span><sup class="reference" data-dcnode-id="5556" id="cite_ref-Furstenberg_33_19-2"><a data-dcnode-id="5557" href="#cite_note-Furstenberg_33-19"><span data-dcnode-id="5558" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5555" instrument_node=""> Prevention can not only be beneficial on a micro level but it is also beneficial on a more macro scale. Nationally, teen pregnancies cost tax payers an average of $9.4 billion each year.</span><sup class="reference" data-dcnode-id="5552" id="cite_ref-:2_8-3"><a data-dcnode-id="5553" href="#cite_note-:2-8"><span data-dcnode-id="5554" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5551" instrument_node=""> These costs are associated with health care, foster care, criminal justice, public assistance and lost tax revenue.</span><sup class="reference" data-dcnode-id="5548" id="cite_ref-:5_18-3"><a data-dcnode-id="5549" href="#cite_note-:5-18"><span data-dcnode-id="5550" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5547" instrument_node=""> Teen pregnancies can be prevented by increasing access and education on the proper use of contraceptives,</span><sup class="reference" data-dcnode-id="5544" id="cite_ref-:0_5-2"><a data-dcnode-id="5545" href="#cite_note-:0-5"><span data-dcnode-id="5546" instrument_node="">[5]</span></a></sup><span data-dcnode-id="5543" instrument_node=""> as well as parental involvement. The best method of prevention is to integrate sex and STD education into the middle and high school science curriculum as well as addressing the effects of teenage pregnancies in the social studies curriculum.
</span></p><p data-dcnode-id="5536"><span data-dcnode-id="5541" instrument_node="">According to studies conducted by the American Journal of Public Health, the pregnancy rate in The United States can be predictable by analyzing two indexes, the contraceptive risk index and the overall pregnancy risk index.</span><sup class="reference" data-dcnode-id="5538" id="cite_ref-27"><a data-dcnode-id="5539" href="#cite_note-27"><span data-dcnode-id="5540" instrument_node="">[27]</span></a></sup><span data-dcnode-id="5537" instrument_node=""> Using these indexes with previous adolescent pregnancy data, 77% of the decline in pregnancy risk was attributed to contraceptive use. The conclusion from this studies and others, is that improved contraceptive use and teachings is responsible for the decline.
</span></p><span data-dcnode-id="5535" instrument_node="">
</span><h2 data-dcnode-id="5525"><span class="mw-headline" data-dcnode-id="5533" id="International_comparison"><span data-dcnode-id="5534" instrument_node="">International comparison</span></span><span class="mw-editsection" data-dcnode-id="5526"><span class="mw-editsection-bracket" data-dcnode-id="5531"><span data-dcnode-id="5532" instrument_node="">[</span></span><a data-dcnode-id="5529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTeenage_pregnancy_in_the_United_States%26action%3Dedit%26section%3D9" title="Edit section: International comparison"><span data-dcnode-id="5530" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5527"><span data-dcnode-id="5528" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5524" instrument_node="">
</span><link data-dcnode-id="5523" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5519" role="note"><span data-dcnode-id="5522" instrument_node="">Main article: </span><a data-dcnode-id="5520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prevalence_of_teenage_pregnancy" title="Prevalence of teenage pregnancy"><span data-dcnode-id="5521" instrument_node="">Prevalence of teenage pregnancy</span></a></div><span data-dcnode-id="5518" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5506"><div class="thumbinner" data-dcnode-id="5507" style="width:452px;"><a class="image" data-dcnode-id="5516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATeenage_birth_rate_per_1000_women_15%25E2%2580%259319%2C_2000-09.svg"><img alt="" class="thumbimage" data-dcnode-id="5517" data-file-height="477" data-file-width="940" decoding="async" height="228" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Teenage_birth_rate_per_1000_women_15%25E2%2580%259319%252C_2000-09.svg/450px-Teenage_birth_rate_per_1000_women_15%25E2%2580%259319%252C_2000-09.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Teenage_birth_rate_per_1000_women_15%E2%80%9319%2C_2000-09.svg/675px-Teenage_birth_rate_per_1000_women_15%E2%80%9319%2C_2000-09.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Teenage_birth_rate_per_1000_women_15%E2%80%9319%2C_2000-09.svg/900px-Teenage_birth_rate_per_1000_women_15%E2%80%9319%2C_2000-09.svg.png 2x" width="450"></a><span data-dcnode-id="5515" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5508"><div class="magnify" data-dcnode-id="5513"><a class="internal" data-dcnode-id="5514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATeenage_birth_rate_per_1000_women_15%25E2%2580%259319%2C_2000-09.svg" title="Enlarge"></a></div><span data-dcnode-id="5512" instrument_node="">The teenage birth rate per 1,000 women aged 15–19, 2000–2009</span><sup class="reference" data-dcnode-id="5509" id="cite_ref-28"><a data-dcnode-id="5510" href="#cite_note-28"><span data-dcnode-id="5511" instrument_node="">[28]</span></a></sup></div></div></div><span data-dcnode-id="5505" instrument_node="">
</span><p data-dcnode-id="5496"><span data-dcnode-id="5504" instrument_node="">There are large differences in adolescent pregnancy rates among developed nations like Canada, France, Great Britain, Sweden and the United States. The United States has the highest number of teen pregnancies and the highest number of </span><a data-dcnode-id="5502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexually_transmitted_infection" title="Sexually transmitted infection"><span data-dcnode-id="5503" instrument_node="">sexually transmitted infections</span></a><span data-dcnode-id="5501" instrument_node=""> compared to the other four countries. In France and Sweden during the late '90s, pregnancies were 20 per 1,000 girls at ages 15–19.</span><sup class="reference" data-dcnode-id="5498" id="cite_ref-Differences_in_Teenage_Pregnancy_Ra_29-0"><a data-dcnode-id="5499" href="#cite_note-Differences_in_Teenage_Pregnancy_Ra-29"><span data-dcnode-id="5500" instrument_node="">[29]</span></a></sup><span data-dcnode-id="5497" instrument_node="">
</span></p><p data-dcnode-id="5490"><span data-dcnode-id="5495" instrument_node="">In Canada and Great Britain the levels were twice that, and the United States the level was 4 times as high with 84 per 1,000 teenage girls pregnant. The likelihood of pregnant teenage girls having abortions across the four countries differ and exclude miscarriages. In the U.S. abortion rates for 15–19 years are 35% while it was 69% in Sweden, 39% in Great Britain, 46% in Canada, and 51% in France.</span><sup class="reference" data-dcnode-id="5492" id="cite_ref-Differences_in_Teenage_Pregnancy_Ra_29-1"><a data-dcnode-id="5493" href="#cite_note-Differences_in_Teenage_Pregnancy_Ra-29"><span data-dcnode-id="5494" instrument_node="">[29]</span></a></sup><span data-dcnode-id="5491" instrument_node="">
</span></p><p data-dcnode-id="5472"><span data-dcnode-id="5489" instrument_node="">It has been suggested that the U.S. teen pregnancy rate is higher because of the prevalence of abstinence-only sex education. As a result, many adolescents are ignorant about contraception and effective pregnancy prevention. The mentality of some education systems in the U.S. have the idea that if they do not teach safe sex, adolescents will refrain from sex</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5482" style="white-space:nowrap;"><span data-dcnode-id="5488" instrument_node="">[</span><i data-dcnode-id="5484"><a data-dcnode-id="5485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5486" title="This reads like the author's conjecture/opinion, not an established fact. Overly conversational tone, citation reeded (July 2017)"><span data-dcnode-id="5487" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5483" instrument_node="">]</span></sup><span data-dcnode-id="5481" instrument_node="">. As the data concludes from above that compared to the other developed countries the U.S. is four times as likely to have a teen pregnancy. Yet the U.S. also uses less contraceptive, has more abortions</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5474" style="white-space:nowrap;"><span data-dcnode-id="5480" instrument_node="">[</span><i data-dcnode-id="5476"><a data-dcnode-id="5477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5478" title="Citation needed for claim that the US has more abortions than 'the other developed countries' (July 2017)"><span data-dcnode-id="5479" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5475" instrument_node="">]</span></sup><span data-dcnode-id="5473" instrument_node=""> and more prevalence of sexually transmitted diseases than the other developed countries.
</span></p><p data-dcnode-id="5466"><span data-dcnode-id="5471" instrument_node="">Quality of sex education varies across the U.S, with some states offering more comprehensive education than others. 39 states require "some" education related to sexuality. 21 states are required by law to teach sexuality and STD education. 17 states only require the teaching of STIs. 11 states have no requirement.</span><sup class="reference" data-dcnode-id="5468" id="cite_ref-30"><a data-dcnode-id="5469" href="#cite_note-30"><span data-dcnode-id="5470" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5467" instrument_node="">
</span></p><span data-dcnode-id="5465" instrument_node="">
</span><h2 data-dcnode-id="5455"><span class="mw-headline" data-dcnode-id="5463" id="Modern_decline"><span data-dcnode-id="5464" instrument_node="">Modern decline</span></span><span class="mw-editsection" data-dcnode-id="5456"><span class="mw-editsection-bracket" data-dcnode-id="5461"><span data-dcnode-id="5462" instrument_node="">[</span></span><a data-dcnode-id="5459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTeenage_pregnancy_in_the_United_States%26action%3Dedit%26section%3D10" title="Edit section: Modern decline"><span data-dcnode-id="5460" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5457"><span data-dcnode-id="5458" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5454" instrument_node="">
</span><p data-dcnode-id="5448"><span data-dcnode-id="5453" instrument_node="">Although there is a noticeable decline in U.S. teen pregnancy, the current rate is still two to four times more than in Canada, France, Great Britain, and Sweden. The biggest difference in the rate of pregnancies in the United States compared to the other countries is that in America there is a very high unintended pregnancy rate. This unintended pregnancy rate is higher than the total teenage pregnancy rate in all of the four countries.
</span><sup class="reference" data-dcnode-id="5450" id="cite_ref-31"><a data-dcnode-id="5451" href="#cite_note-31"><span data-dcnode-id="5452" instrument_node="">[31]</span></a></sup><span data-dcnode-id="5449" instrument_node="">
</span></p><p data-dcnode-id="5434"><span data-dcnode-id="5447" instrument_node="">In 2010 there was a rate of 57 pregnancies per 1,000 girls aged 15–19. Most of those girls reported that it was an unplanned pregnancy. This shows a 15% drop in pregnancies from 2008 to 2010. There is a huge decline in adolescent pregnancy for the nation as a whole. The cause of these declines are from abstaining from sex or better use of contraceptives.</span><sup class="reference" data-dcnode-id="5444" id="cite_ref-guttmacher.org_32-0"><a data-dcnode-id="5445" href="#cite_note-guttmacher.org-32"><span data-dcnode-id="5446" instrument_node="">[32]</span></a></sup><span data-dcnode-id="5443" instrument_node=""> Birth rates among younger teens ages 15–17 have also fallen faster – dropping by 50%, compared with a 39% decline among older teens ages 18 and 19.</span><sup class="reference" data-dcnode-id="5440" id="cite_ref-33"><a data-dcnode-id="5441" href="#cite_note-33"><span data-dcnode-id="5442" instrument_node="">[33]</span></a></sup><span data-dcnode-id="5439" instrument_node=""> Researchers have concluded that these declines stem from improvement in use of contraceptives.</span><sup class="reference" data-dcnode-id="5436" id="cite_ref-guttmacher.org_32-1"><a data-dcnode-id="5437" href="#cite_note-guttmacher.org-32"><span data-dcnode-id="5438" instrument_node="">[32]</span></a></sup><span data-dcnode-id="5435" instrument_node="">
</span></p><span data-dcnode-id="5433" instrument_node="">
</span><h2 data-dcnode-id="5423"><span class="mw-headline" data-dcnode-id="5431" id="Intentional_teen_pregnancy"><span data-dcnode-id="5432" instrument_node="">Intentional teen pregnancy</span></span><span class="mw-editsection" data-dcnode-id="5424"><span class="mw-editsection-bracket" data-dcnode-id="5429"><span data-dcnode-id="5430" instrument_node="">[</span></span><a data-dcnode-id="5427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTeenage_pregnancy_in_the_United_States%26action%3Dedit%26section%3D11" title="Edit section: Intentional teen pregnancy"><span data-dcnode-id="5428" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5425"><span data-dcnode-id="5426" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5422" instrument_node="">
</span><p data-dcnode-id="5416"><span data-dcnode-id="5421" instrument_node="">According to the Journal of Pediatric Health Care, Approximately 15% of all adolescent pregnancies are planned.</span><sup class="reference" data-dcnode-id="5418" id="cite_ref-34"><a data-dcnode-id="5419" href="#cite_note-34"><span data-dcnode-id="5420" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5417" instrument_node=""> Based upon interviews conducted with pregnant teenagers, there are particular themes based upon wants and needs. Some of the wants expressed by teens includes, "(a) the desire to be or be perceived as more grown up, with increased responsibility, independence and maturity. (b) a long history of desiring pregnancy and the maternal role. c) never having had anything to call their own and wanting something to care for and love; and (d) the pregnancy was the natural next step in their life or their relationship with their boyfriend."In the same study, it was concluded that no one should assume that a teenage pregnancy was an accident or unwanted as some have been proven to be planned.
</span></p><span data-dcnode-id="5415" instrument_node="">
</span><h2 data-dcnode-id="5405"><span class="mw-headline" data-dcnode-id="5413" id="Reality_television_shows_and_teen_pregnancy"><span data-dcnode-id="5414" instrument_node="">Reality television shows and teen pregnancy</span></span><span class="mw-editsection" data-dcnode-id="5406"><span class="mw-editsection-bracket" data-dcnode-id="5411"><span data-dcnode-id="5412" instrument_node="">[</span></span><a data-dcnode-id="5409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTeenage_pregnancy_in_the_United_States%26action%3Dedit%26section%3D12" title="Edit section: Reality television shows and teen pregnancy"><span data-dcnode-id="5410" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5407"><span data-dcnode-id="5408" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5404" instrument_node="">
</span><p data-dcnode-id="5382"><span data-dcnode-id="5403" instrument_node="">Reality television shows featuring teen pregnancy have become increasingly popular over the last few decades. MTV's </span><i data-dcnode-id="5401"><span data-dcnode-id="5402" instrument_node="">16 and Pregnant</span></i><span data-dcnode-id="5400" instrument_node=""> was very popular between the years of 2009-2014. The show featured a different teenage mother each episode and documented most of their pregnancy and a short period after birth. The show and network saw success and went on to produce multiple spin off series including: </span><i data-dcnode-id="5397"><a data-dcnode-id="5398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Teen_Mom" title="Teen Mom"><span data-dcnode-id="5399" instrument_node="">Teen Mom</span></a></i><span data-dcnode-id="5396" instrument_node="">, </span><i data-dcnode-id="5393"><a data-dcnode-id="5394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Teen_Mom_2" title="Teen Mom 2"><span data-dcnode-id="5395" instrument_node="">Teen Mom 2</span></a></i><span data-dcnode-id="5392" instrument_node="">, </span><i data-dcnode-id="5389"><a data-dcnode-id="5390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Teen_Mom_3" title="Teen Mom 3"><span data-dcnode-id="5391" instrument_node="">Teen Mom 3</span></a></i><span data-dcnode-id="5388" instrument_node="">, </span><i data-dcnode-id="5384"><a data-dcnode-id="5386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Teen_Mom%3A_Young_and_Pregnant" title="Teen Mom: Young and Pregnant"><span data-dcnode-id="5387" instrument_node="">Teen Mom: Young and Pregnant</span></a><span data-dcnode-id="5385" instrument_node="">.</span></i><span data-dcnode-id="5383" instrument_node="">
</span></p><p data-dcnode-id="5377"><span data-dcnode-id="5381" instrument_node="">TLC has also engaged in producing this type of content with their television series </span><i data-dcnode-id="5379"><span data-dcnode-id="5380" instrument_node="">Unexpected</span></i><span data-dcnode-id="5378" instrument_node="">.
</span></p><p data-dcnode-id="5371"><span data-dcnode-id="5376" instrument_node="">The results of a study performed for the Journal of Health Communication,</span><sup class="reference" data-dcnode-id="5373" id="cite_ref-35"><a data-dcnode-id="5374" href="#cite_note-35"><span data-dcnode-id="5375" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5372" instrument_node=""> suggest that young women who watched shows such as 16 and Pregnant did report a lower perception of their own risk for pregnancy. The girls also reported predicting the behaviors and intentions that result in teenage pregnancy.
</span></p><span data-dcnode-id="5370" instrument_node="">
</span><h2 data-dcnode-id="5360"><span class="mw-headline" data-dcnode-id="5368" id="See_also"><span data-dcnode-id="5369" instrument_node="">See also</span></span><span class="mw-editsection" data-dcnode-id="5361"><span class="mw-editsection-bracket" data-dcnode-id="5366"><span data-dcnode-id="5367" instrument_node="">[</span></span><a data-dcnode-id="5364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTeenage_pregnancy_in_the_United_States%26action%3Dedit%26section%3D13" title="Edit section: See also"><span data-dcnode-id="5365" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5362"><span data-dcnode-id="5363" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5359" instrument_node="">
