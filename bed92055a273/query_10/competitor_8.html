duate</span><br data-dcnode-id="11302"><span data-dcnode-id="11301" instrument_node="">f6. Should the planning of continuing professional</span><br data-dcnode-id="11300"><span data-dcnode-id="11299" instrument_node="">development programs consider the</span><br data-dcnode-id="11298"><span data-dcnode-id="11297" instrument_node="">ASEAN Qualifications Reference Framework?</span><br data-dcnode-id="11296"><span data-dcnode-id="11295" instrument_node="">A. No, continuing professional development is required</span><br data-dcnode-id="11294"><span data-dcnode-id="11293" instrument_node="">only in the Philippines.</span><br data-dcnode-id="11292"><span data-dcnode-id="11291" instrument_node="">B. Yes, for professionals to be globally competitive.</span><br data-dcnode-id="11290"><span data-dcnode-id="11289" instrument_node="">C. Not necessarily, it is enough that continuing</span><br data-dcnode-id="11288"><span data-dcnode-id="11287" instrument_node="">professional development</span><br data-dcnode-id="11286"><span data-dcnode-id="11285" instrument_node="">programs abide by PQF standards</span><br data-dcnode-id="11284"><span data-dcnode-id="11283" instrument_node="">D. That depends on the profession concerned</span><br data-dcnode-id="11282"><span data-dcnode-id="11281" instrument_node="">f7. The Philippines has the National Competency-Based</span><br data-dcnode-id="11280"><span data-dcnode-id="11279" instrument_node="">Teacher Standards. Should</span><br data-dcnode-id="11278"><span data-dcnode-id="11277" instrument_node="">these be taken into consideration in the planning and</span><br data-dcnode-id="11276"><span data-dcnode-id="11275" instrument_node="">conduct of professional</span><br data-dcnode-id="11274"><span data-dcnode-id="11273" instrument_node="">teachers' continuing professional development</span><br data-dcnode-id="11272"><span data-dcnode-id="11271" instrument_node="">programs?</span><br data-dcnode-id="11270"><span data-dcnode-id="11269" instrument_node="">A. Definitely, yes.</span><br data-dcnode-id="11268"><span data-dcnode-id="11267" instrument_node="">B. Maybe</span><br data-dcnode-id="11266"><span data-dcnode-id="11265" instrument_node="">C. Not necessarily</span><br data-dcnode-id="11264"><span data-dcnode-id="11263" instrument_node="">D. No, the PQF is the only one to be considered.</span><br data-dcnode-id="11262"><span data-dcnode-id="11261" instrument_node="">f8. According to PRC Revised Guidelines For</span><br data-dcnode-id="11260"><span data-dcnode-id="11259" instrument_node="">Continuing Professional Development (Resolution</span><br data-dcnode-id="11258"><span data-dcnode-id="11257" instrument_node="">No. 2013-774, every professional teacher is</span><br data-dcnode-id="11256"><span data-dcnode-id="11255" instrument_node="">required proof of _____ continuing professional</span><br data-dcnode-id="11254"><span data-dcnode-id="11253" instrument_node="">development units for renewal of professional</span><br data-dcnode-id="11252"><span data-dcnode-id="11251" instrument_node="">identification card every three years.</span><br data-dcnode-id="11250"><span data-dcnode-id="11249" instrument_node="">A. 36 C.30 %</span><br data-dcnode-id="11248"><span data-dcnode-id="11247" instrument_node="">B. 45 D. 48</span><br data-dcnode-id="11246"><span data-dcnode-id="11245" instrument_node="">f9. Which is/are a characteristic/s of</span><br data-dcnode-id="11244"><span data-dcnode-id="11243" instrument_node="">quality professional development?</span><br data-dcnode-id="11242"><span data-dcnode-id="11241" instrument_node="">I. Sustained    II. Lifelong III. Self-</span><br data-dcnode-id="11240"><span data-dcnode-id="11239" instrument_node="">directed</span><br data-dcnode-id="11238"><span data-dcnode-id="11237" instrument_node="">A. I and II</span><br data-dcnode-id="11236"><span data-dcnode-id="11235" instrument_node="">B. II and III</span><br data-dcnode-id="11234"><span data-dcnode-id="11233" instrument_node="">C. Ill only</span><br data-dcnode-id="11232"><span data-dcnode-id="11231" instrument_node="">f10. Which is/are teachers' responsibility/ties?</span><br data-dcnode-id="11230"><span data-dcnode-id="11229" instrument_node="">I. Ensure that assessment always supports learning and</span><br data-dcnode-id="11228"><span data-dcnode-id="11227" instrument_node="">is based on a wide range of evidence.</span><br data-dcnode-id="11226"><span data-dcnode-id="11225" instrument_node="">II. Plan, design and carry out assessment as an ongoing</span><br data-dcnode-id="11224"><span data-dcnode-id="11223" instrument_node="">part of learning and teaching and periodically use</span><br data-dcnode-id="11222"><span data-dcnode-id="11221" instrument_node="">specific assessments, tests or examinations as</span><br data-dcnode-id="11220"><span data-dcnode-id="11219" instrument_node="">appropriate.</span><br data-dcnode-id="11218"><span data-dcnode-id="11217" instrument_node="">III. Involve learners fully in assessment and help them to</span><br data-dcnode-id="11216"><span data-dcnode-id="11215" instrument_node="">understand what is expected.</span><br data-dcnode-id="11214"><span data-dcnode-id="11213" instrument_node="">A. I, II and III         C. II and III</span><br data-dcnode-id="11212"><span data-dcnode-id="11211" instrument_node="">ff11. Which role do teachers play when</span><br data-dcnode-id="11210"><span data-dcnode-id="11209" instrument_node="">they help their colleagues by sharing</span><br data-dcnode-id="11208"><span data-dcnode-id="11207" instrument_node="">instructional resources such as Web sites,</span><br data-dcnode-id="11206"><span data-dcnode-id="11205" instrument_node="">readings?</span><br data-dcnode-id="11204"><span data-dcnode-id="11203" instrument_node="">A. Subject expert</span><br data-dcnode-id="11202"><span data-dcnode-id="11201" instrument_node="">B. Community leader</span><br data-dcnode-id="11200"><span data-dcnode-id="11199" instrument_node="">C. Resource provider</span><br data-dcnode-id="11198"><span data-dcnode-id="11197" instrument_node="">f12. When his fellow science teachers share their frustration with</span><br data-dcnode-id="11196"><span data-dcnode-id="11195" instrument_node="">students' poorly written lab reports, Joe suggests that they invite</span><br data-dcnode-id="11194"><span data-dcnode-id="11193" instrument_node="">several English teachers to recommend strategies for writing</span><br data-dcnode-id="11192"><span data-dcnode-id="11191" instrument_node="">instruction. With two English teachers, the science teachers examine</span><br data-dcnode-id="11190"><span data-dcnode-id="11189" instrument_node="">a number of lab reports together and identify strengths and</span><br data-dcnode-id="11188"><span data-dcnode-id="11187" instrument_node="">weaknesses. The English teachers share strategies they use in their</span><br data-dcnode-id="11186"><span data-dcnode-id="11185" instrument_node="">classes to improve students' writing.</span><br data-dcnode-id="11184"><span data-dcnode-id="11183" instrument_node="">Which role do the English teachers play in this case?</span><br data-dcnode-id="11182"><span data-dcnode-id="11181" instrument_node="">A. Curriculum specialist</span><br data-dcnode-id="11180"><span data-dcnode-id="11179" instrument_node="">B. Curriculum designer</span><br data-dcnode-id="11178"><span data-dcnode-id="11177" instrument_node="">C. Instruction specialist</span><br data-dcnode-id="11176"><span data-dcnode-id="11175" instrument_node="">D. Curriculum evaluator</span><br data-dcnode-id="11174"><span data-dcnode-id="11173" instrument_node="">f13. When teachers lead other teachers to agree on</span><br data-dcnode-id="11172"><span data-dcnode-id="11171" instrument_node="">standards, follow the adopted curriculum, use</span><br data-dcnode-id="11170"><span data-dcnode-id="11169" instrument_node="">common pacing charts, and develop shared</span><br data-dcnode-id="11168"><span data-dcnode-id="11167" instrument_node="">assessments, which role do they play?</span><p data-dcnode-id="11166"></p><p data-dcnode-id="11150"><span data-dcnode-id="11165" instrument_node="">A.   Curriculum specialist</span><br data-dcnode-id="11164"><span data-dcnode-id="11163" instrument_node="">B.   Curriculum designer</span><br data-dcnode-id="11162"><span data-dcnode-id="11161" instrument_node="">C.   Instruction specialist</span><br data-dcnode-id="11160"><span data-dcnode-id="11159" instrument_node="">D.   Curriculum evaluator</span><br data-dcnode-id="11158"><span data-dcnode-id="11157" instrument_node="">f14. When teachers serve as role models, acclimate</span><br data-dcnode-id="11156"><span data-dcnode-id="11155" instrument_node="">new teachers to a new school, and advise new</span><br data-dcnode-id="11154"><span data-dcnode-id="11153" instrument_node="">teachers about instruction, curriculum, procedure,</span><br data-dcnode-id="11152"><span data-dcnode-id="11151" instrument_node="">practices, and politics. Which role do they play?</span></p><p data-dcnode-id="11056"><span data-dcnode-id="11149" instrument_node="">A. Principal</span><br data-dcnode-id="11148"><span data-dcnode-id="11147" instrument_node="">B. Mentor</span><br data-dcnode-id="11146"><span data-dcnode-id="11145" instrument_node="">C.Department Head</span><br data-dcnode-id="11144"><span data-dcnode-id="11143" instrument_node="">D. Expert</span><br data-dcnode-id="11142"><span data-dcnode-id="11141" instrument_node="">f15. Teacher A, an experienced teacher,</span><br data-dcnode-id="11140"><span data-dcnode-id="11139" instrument_node="">takes a great deal of time and expertise</span><br data-dcnode-id="11138"><span data-dcnode-id="11137" instrument_node="">and makes a significant contribution to</span><br data-dcnode-id="11136"><span data-dcnode-id="11135" instrument_node="">the development of a new professional.</span><br data-dcnode-id="11134"><span data-dcnode-id="11133" instrument_node="">Which is his role?</span><br data-dcnode-id="11132"><span data-dcnode-id="11131" instrument_node="">A. PrincipalC. Department Head</span><br data-dcnode-id="11130"><span data-dcnode-id="11129" instrument_node="">B. Mentor D. Expert</span><br data-dcnode-id="11128"><span data-dcnode-id="11127" instrument_node="">f16. DepEd A Child- and Community-Centered</span><br data-dcnode-id="11126"><span data-dcnode-id="11125" instrument_node="">Education System (ACCES) describes the learner-</span><br data-dcnode-id="11124"><span data-dcnode-id="11123" instrument_node="">centered education that teachers ought to provide.</span><br data-dcnode-id="11122"><span data-dcnode-id="11121" instrument_node="">Which one does NOT describe learner-centered</span><br data-dcnode-id="11120"><span data-dcnode-id="11119" instrument_node="">education?</span><br data-dcnode-id="11118"><span data-dcnode-id="11117" instrument_node="">A. Culture-responsive</span><br data-dcnode-id="11116"><span data-dcnode-id="11115" instrument_node="">B. Environmentally safe</span><br data-dcnode-id="11114"><span data-dcnode-id="11113" instrument_node="">C. Ethnocentric</span><br data-dcnode-id="11112"><span data-dcnode-id="11111" instrument_node="">D. Culture-sensitive</span><br data-dcnode-id="11110"><span data-dcnode-id="11109" instrument_node="">f17. In a faculty meeting, Peter expresses a concern that teachers may</span><br data-dcnode-id="11108"><span data-dcnode-id="11107" instrument_node="">be treating some students differently from others. Students who come</span><br data-dcnode-id="11106"><span data-dcnode-id="11105" instrument_node="">to him for extra assistance have shared their perspectives, and Peter</span><br data-dcnode-id="11104"><span data-dcnode-id="11103" instrument_node="">wants teachers to know what students</span><br data-dcnode-id="11102"><span data-dcnode-id="11101" instrument_node="">are saying. As his colleagues discuss reasons for low student</span><br data-dcnode-id="11100"><span data-dcnode-id="11099" instrument_node="">achievement, Peter challenges them to explore data about the</span><br data-dcnode-id="11098"><span data-dcnode-id="11097" instrument_node="">relationship between family socio-economic status and discipline</span><br data-dcnode-id="11096"><span data-dcnode-id="11095" instrument_node="">referrals in the school. When a teacher begins to point fingers at</span><br data-dcnode-id="11094"><span data-dcnode-id="11093" instrument_node="">students, he encourages them to examine how they can change his</span><br data-dcnode-id="11092"><span data-dcnode-id="11091" instrument_node="">instructional practices to improve student engagement and</span><br data-dcnode-id="11090"><span data-dcnode-id="11089" instrument_node="">achievement. Teacher Peter plays the role of a___.</span><br data-dcnode-id="11088"><span data-dcnode-id="11087" instrument_node="">A. learner         C. curriculum designer</span><br data-dcnode-id="11086"><span data-dcnode-id="11085" instrument_node="">B. expert          D. catalyst for change</span><br data-dcnode-id="11084"><span data-dcnode-id="11083" instrument_node="">f18. At every team or faculty meeting, Lilian identifies</span><br data-dcnode-id="11082"><span data-dcnode-id="11081" instrument_node="">something new that she tries</span><br data-dcnode-id="11080"><span data-dcnode-id="11079" instrument_node="">to apply in her classroom. Her willingness to explore</span><br data-dcnode-id="11078"><span data-dcnode-id="11077" instrument_node="">new strategies is infectious.</span><br data-dcnode-id="11076"><span data-dcnode-id="11075" instrument_node="">Other teachers, encouraged by her willingness to discuss</span><br data-dcnode-id="11074"><span data-dcnode-id="11073" instrument_node="">what works and what doesn't, begin to talk about their</span><br data-dcnode-id="11072"><span data-dcnode-id="11071" instrument_node="">teaching and how it influences student learning. As a</span><br data-dcnode-id="11070"><span data-dcnode-id="11069" instrument_node="">teacher, she shows that she is a/an .</span><br data-dcnode-id="11068"><span data-dcnode-id="11067" instrument_node="">A. instruction expert C. catalyst for change</span><br data-dcnode-id="11066"><span data-dcnode-id="11065" instrument_node="">B. curriculum plannerD. learner</span><br data-dcnode-id="11064"><span data-dcnode-id="11063" instrument_node="">f19. Which role do teacher-leaders play?</span><br data-dcnode-id="11062"><span data-dcnode-id="11061" instrument_node="">I. Shape the culture of their schools</span><br data-dcnode-id="11060"><span data-dcnode-id="11059" instrument_node="">II. Improve student learning</span><br data-dcnode-id="11058"><span data-dcnode-id="11057" instrument_node="">III. Influence practice among their peers</span></p><p data-dcnode-id="10720"><span data-dcnode-id="11055" instrument_node="">A. I, II        C. II and III</span><br data-dcnode-id="11054"><span data-dcnode-id="11053" instrument_node="">B. I, II and III D. II only</span><br data-dcnode-id="11052"><span data-dcnode-id="11051" instrument_node="">f20. DepEd A Child- and Community-Centered</span><br data-dcnode-id="11050"><span data-dcnode-id="11049" instrument_node="">Education System (ACCES) describes the learner-</span><br data-dcnode-id="11048"><span data-dcnode-id="11047" instrument_node="">centered education that teachers ought to provide.</span><br data-dcnode-id="11046"><span data-dcnode-id="11045" instrument_node="">Which one does NOT describe learner-centered</span><br data-dcnode-id="11044"><span data-dcnode-id="11043" instrument_node="">education?</span><br data-dcnode-id="11042"><span data-dcnode-id="11041" instrument_node="">A. Learning-focused</span><br data-dcnode-id="11040"><span data-dcnode-id="11039" instrument_node="">B. Gender-sensitive</span><br data-dcnode-id="11038"><span data-dcnode-id="11037" instrument_node="">C. Developmental stage-appropriate</span><br data-dcnode-id="11036"><span data-dcnode-id="11035" instrument_node="">D. Exclusive</span><br data-dcnode-id="11034"><span data-dcnode-id="11033" instrument_node="">fEnd of 20</span><br data-dcnode-id="11032"><span data-dcnode-id="11031" instrument_node="">f21. Macrina, the 10th grade language arts team leader,</span><br data-dcnode-id="11030"><span data-dcnode-id="11029" instrument_node="">facilitates a team of her colleagues as they look at the results</span><br data-dcnode-id="11028"><span data-dcnode-id="11027" instrument_node="">of the most recent writing sample, a teacher-</span><br data-dcnode-id="11026"><span data-dcnode-id="11025" instrument_node="">designed assessment given to all incoming 10th grade</span><br data-dcnode-id="11024"><span data-dcnode-id="11023" instrument_node="">students. Macrina guides teachers as they discuss strengths</span><br data-dcnode-id="11022"><span data-dcnode-id="11021" instrument_node="">and weaknesses of students' writing performance as a group,</span><br data-dcnode-id="11020"><span data-dcnode-id="11019" instrument_node="">as individuals, by classrooms, and in disaggregated clusters by</span><br data-dcnode-id="11018"><span data-dcnode-id="11017" instrument_node="">race, gender, and previous school. They then plan instruction</span><br data-dcnode-id="11016"><span data-dcnode-id="11015" instrument_node="">on the basis of these data. Which role does Teacher Macrina</span><br data-dcnode-id="11014"><span data-dcnode-id="11013" instrument_node="">play?</span><br data-dcnode-id="11012"><span data-dcnode-id="11011" instrument_node="">A. Principal         C. Department Head</span><br data-dcnode-id="11010"><span data-dcnode-id="11009" instrument_node="">f22. Teachers have a an important role to play in peace education. How can</span><br data-dcnode-id="11008"><span data-dcnode-id="11007" instrument_node="">they contribute to genuine peace education?</span><br data-dcnode-id="11006"><span data-dcnode-id="11005" instrument_node="">I. By creating a learning environment where both teachers and students</span><br data-dcnode-id="11004"><span data-dcnode-id="11003" instrument_node="">teach</span><br data-dcnode-id="11002"><span data-dcnode-id="11001" instrument_node="">and learn from one another through equitable dialogue</span><br data-dcnode-id="11000"><span data-dcnode-id="10999" instrument_node="">II. By combining lessons with practical application towards societal</span><br data-dcnode-id="10998"><span data-dcnode-id="10997" instrument_node="">transformation</span><br data-dcnode-id="10996"><span data-dcnode-id="10995" instrument_node="">III. By analyzing issues in a holistic way that accounts for the past, present,</span><br data-dcnode-id="10994"><span data-dcnode-id="10993" instrument_node="">and</span><br data-dcnode-id="10992"><span data-dcnode-id="10991" instrument_node="">future, and includes the personal, local and global levels</span><br data-dcnode-id="10990"><span data-dcnode-id="10989" instrument_node="">IV. By promoting values such as compassion, equality, interdependence,</span><br data-dcnode-id="10988"><span data-dcnode-id="10987" instrument_node="">diversity, sustainability, and nonviolence</span><br data-dcnode-id="10986"><span data-dcnode-id="10985" instrument_node="">A. I, II, III, IV B. I, II C. I, II, III D.I only</span><br data-dcnode-id="10984"><span data-dcnode-id="10983" instrument_node="">f23. In her report to UNESCO, LEARNING: The Treasure Within,</span><br data-dcnode-id="10982"><span data-dcnode-id="10981" instrument_node="">Jacques Delors, strongly recommended that all education reform be</span><br data-dcnode-id="10980"><span data-dcnode-id="10979" instrument_node="">conducted in the spirit and essence of sustainable development and</span><br data-dcnode-id="10978"><span data-dcnode-id="10977" instrument_node="">called for the full-fledged pursuit of reorienting education to attain</span><br data-dcnode-id="10976"><span data-dcnode-id="10975" instrument_node="">sustainability. Considering his/her influence on learners -id="10774"><span data-dcnode-id="10773" instrument_node="">Program?</span><br data-dcnode-id="10772"><span data-dcnode-id="10771" instrument_node="">A. Recommended for "Students At Risk of</span><br data-dcnode-id="10770"><span data-dcnode-id="10769" instrument_node="">Dropping Out" who permanently</span><br data-dcnode-id="10768"><span data-dcnode-id="10767" instrument_node="">cannot attend regular classes</span><br data-dcnode-id="10766"><span data-dcnode-id="10765" instrument_node="">B. Falls under the alternative learning system</span><br data-dcnode-id="10764"><span data-dcnode-id="10763" instrument_node="">C. Falls under the informal system</span><br data-dcnode-id="10762"><span data-dcnode-id="10761" instrument_node="">D. Open to all students who are interested</span><br data-dcnode-id="10760"><span data-dcnode-id="10759" instrument_node="">f35. If the school acts as an agent of change, what is</span><br data-dcnode-id="10758"><span data-dcnode-id="10757" instrument_node="">it expected to do?</span><br data-dcnode-id="10756"><span data-dcnode-id="10755" instrument_node="">A. Implements a curriculum that will perpetuate the</span><br data-dcnode-id="10754"><span data-dcnode-id="10753" instrument_node="">entire culture of the community</span><br data-dcnode-id="10752"><span data-dcnode-id="10751" instrument_node="">B. Supplants the community culture with a new one</span><br data-dcnode-id="10750"><span data-dcnode-id="10749" instrument_node="">perceived to be superior to the community culture</span><br data-dcnode-id="10748"><span data-dcnode-id="10747" instrument_node="">C. Enhances curriculum by localizing and indigenizing it</span><br data-dcnode-id="10746"><span data-dcnode-id="10745" instrument_node="">with the help of community</span><br data-dcnode-id="10744"><span data-dcnode-id="10743" instrument_node="">D.Lets teachers indigenize curriculum on their own</span><br data-dcnode-id="10742"><span data-dcnode-id="10741" instrument_node="">f36. Schools shou oup is brainstorming on the topic,</span><br data-dcnode-id="9918"><span data-dcnode-id="9917" instrument_node="">healthy lifestyle. Every member has his/her own role to</span><br data-dcnode-id="9916"><span data-dcnode-id="9915" instrument_node="">do for the realization of one goal - to make and present</span><br data-dcnode-id="9914"><span data-dcnode-id="9913" instrument_node="">a PowerPoint presentation of the topic. What pillar of</span><br data-dcnode-id="9912"><span data-dcnode-id="9911" instrument_node="">education is exemplified most in the given classroom</span><br data-dcnode-id="9910"><span data-dcnode-id="9909" instrument_node="">setting?</span><br data-dcnode-id="9908"><span data-dcnode-id="9907" instrument_node="">A.Learning to know</span><br data-dcnode-id="9906"><span data-dcnode-id="9905" instrument_node="">B. Learning to do</span><br data-dcnode-id="9904"><span data-dcnode-id="9903" instrument_node="">C. Learning to be</span><br data-dcnode-id="9902"><span data-dcnode-id="9901" instrument_node="">f85. Which pillar of education is</span><br data-dcnode-id="9900"><span data-dcnode-id="9899" instrument_node="">developed most when one prepares and</span><br data-dcnode-id="9898"><span data-dcnode-id="9897" instrument_node="">does PowerPoint presentation?</span><p data-dcnode-id="9896"></p><p data-dcnode-id="9304"><span data-dcnode-id="9895" instrument_node="">A. Learning to know</span><br data-dcnode-id="9894"><span data-dcnode-id="9893" instrument_node="">B. Learning to do</span><br data-dcnode-id="9892"><span data-dcnode-id="9891" instrument_node="">C. Learning to be</span><br data-dcnode-id="9890"><span data-dcnode-id="9889" instrument_node="">f86. Students in the Senior High School (Grades 11 and 12) will</span><br data-dcnode-id="9888"><span data-dcnode-id="9887" instrument_node="">select their tracks, namely: academic, tech-voc and sports and</span><br data-dcnode-id="9886"><span data-dcnode-id="9885" instrument_node="">arts and design. What is the main reason behind this?</span><br data-dcnode-id="9884"><span data-dcnode-id="9883" instrument_node="">A. To develop the mastery of knowledge or concepts among</span><br data-dcnode-id="9882"><span data-dcnode-id="9881" instrument_node="">students so they can earn their degrees</span><br data-dcnode-id="9880"><span data-dcnode-id="9879" instrument_node="">B. To develop mastery of skills among students so that they</span><br data-dcnode-id="9878"><span data-dcnode-id="9877" instrument_node="">have chances of employability</span><br data-dcnode-id="9876"><span data-dcnode-id="9875" instrument_node="">C. To develop social skills among students so they will be able</span><br data-dcnode-id="9874"><span data-dcnode-id="9873" instrument_node="">to adapt easily to their working environment</span><br data-dcnode-id="9872"><span data-dcnode-id="9871" instrument_node="">D. To develop their whole personality</span><br data-dcnode-id="9870"><span data-dcnode-id="9869" instrument_node="">f87. The International Commission on Education for the 21st</span><br data-dcnode-id="9868"><span data-dcnode-id="9867" instrument_node="">Century advocates four pillars of learning, namely - learning</span><br data-dcnode-id="9866"><span data-dcnode-id="9865" instrument_node="">to know, learning to do, learning to live together, and</span><br data-dcnode-id="9864"><span data-dcnode-id="9863" instrument_node="">learning to be. Since there are peace and cultural diversity</span><br data-dcnode-id="9862"><span data-dcnode-id="9861" instrument_node="">problems in the world and everywhere, which of the four</span><br data-dcnode-id="9860"><span data-dcnode-id="9859" instrument_node="">pillars should be given more emphasis in teaching?</span><br data-dcnode-id="9858"><span data-dcnode-id="9857" instrument_node="">A. Learning to know</span><br data-dcnode-id="9856"><span data-dcnode-id="9855" instrument_node="">B. Learning to live together</span><br data-dcnode-id="9854"><span data-dcnode-id="985 ><br data-dcnode-id="9818"><span data-dcnode-id="9817" instrument_node="">serves as a member of the election committee. Then, during</span><br data-dcnode-id="9816"><span data-dcnode-id="9815" instrument_node="">one election period her uncle ran for mayor. Laida got very</span><br data-dcnode-id="9814"><span data-dcnode-id="9813" instrument_node="">involved in the campaign. Is Teacher Laida's action ethical?</span><br data-dcnode-id="9812"><span data-dcnode-id="9811" instrument_node="">A. Yes, because she should support her relative.</span><br data-dcnode-id="9810"><span data-dcnode-id="9809" instrument_node="">B. Yes, because it is her role to serve the community.</span><br data-dcnode-id="9808"><span data-dcnode-id="9807" instrument_node="">C. No, because she should be non-partisan.</span><br data-dcnode-id="9806"><span data-dcnode-id="9805" instrument_node="">D. No, because serving during election time is very</span><br data-dcnode-id="9804"><span data-dcnode-id="9803" instrument_node="">dangerous to life.</span><br data-dcnode-id="9802"><span data-dcnode-id="9801" instrument_node="">f91. At Masigasig Elementary School, parents were requested to help</span><br data-dcnode-id="9800"><span data-dcnode-id="9799" instrument_node="">during the Brigada Eskwela before the opening of classes. Mrs. Pedro,</span><br data-dcnode-id="9798"><span data-dcnode-id="9797" instrument_node="">the school principal,</span><br data-dcnode-id="9796"><span data-dcnode-id="9795" instrument_node="">noticed that Ms. Lizardo, a newly hired teacher, was aloof and was</span><br data-dcnode-id="9794"><span data-dcnode-id="9793" instrument_node="">not interacting with parents. As the school head, what should Mrs.</span><br data-dcnode-id="9792"><span data-dcnode-id="9791" instrument_node="">Pedro do?</span><br data-dcnode-id="9790"><span data-dcnode-id="9789" instrument_node="">A. Ask Ms. Lizardo to do other tasks in the office until she is able to</span><br data-dcnode-id="9788"><span data-dcnode-id="9787" instrument_node="">adjust.</span><br data-dcnode-id="9786"><span data-dcnode-id="9785" instrument_node="">B. Request the parents to invite Ms. Lizardo to join them.</span><br data-dcnode-id="9784"><span data-dcnode-id="9783" instrument_node="">C. Cancel the activity so Ms. Lizardo will do the Brigada herself.</span><br data-dcnode-id="9782"><span data-dcnode-id="9781" instrument_node="">D. Advise Ms. Lizardo to supervise and join the parents in their</span><br data-dcnode-id="9780"><span data-dcnode-id="9779" instrument_node="">activities.</span><br data-dcnode-id="9778"><span data-dcnode-id="9777" instrument_node="">f92. Miss Sanchez engaged her learners in</span><br data-dcnode-id="9776"><span data-dcnode-id="9775" instrument_node="">activities where they develop writing, critical</span><br data-dcnode-id="9774"><span data-dcnode-id="9773" instrument_node="">thinking, problem solving skills, and risk taking.</span><br data-dcnode-id="9772"><span data-dcnode-id="9771" instrument_node="">Which of these 21s century skills does Miss</span><br data-dcnode-id="9770"><span data-dcnode-id="9769" instrument_node="">Sanchez possess?</span><br data-dcnode-id="9768"><span data-dcnode-id="9767" instrument_node="">A. Communication Skills</span><br data-dcnode-id="9766"><span data-dcnode-id="9765" instrument_node="">B. Learning and Innovations Skills</span><br data-dcnode-id="9764"><span data-dcnode-id="9763" instrument_node="">C. Information and Technology Skills</span><br data-dcnode-id="9762"><span data-dcnode-id="9761" instrument_node="">f93. In school hours, teacher Manuel leaves school in</span><br data-dcnode-id="9760"><span data-dcnode-id="9759" instrument_node="">a hurry to his tutorial work, of his tutees is a top ten</span><br data-dcnode-id="9758"><span data-dcnode-id="9757" instrument_node="">student in his class. The teacher is paid Php</span><br data-dcnode-id="9756"><span data-dcnode-id="9755" instrument_node="">150.00/hour for his services. What is wrong with</span><br data-dcnode-id="9754"><span data-dcnode-id="9753" instrument_node="">Teacher Manuel's actions?</span><br data-dcnode-id="9752"><span data-dcnode-id="9751" instrument_node="">A. Receiving additional compensation</span><br data-dcnode-id="9750"><span data-dcnode-id="9749" instrument_node="">B. Tutoring after school</span><br data-dcnode-id="9748"><span data-dcnode-id="9747" instrument_node="">C. Always in a hurry to leave school</span><br data-dcnode-id="9746"><span data-dcnode-id="9745" instrument_node="">D. Tutoring his own pupil for a fee</span><br data-dcnode-id="9744"><span data-dcnode-id="9743" instrument_node="">f94. Teacher Carmen is a SPED teacher of children with</span><br data-dcnode-id="9742"><span data-dcnode-id="9741" instrument_node="">behavioral problems. One day, she found one pupil disturbing</span><br data-dcnode-id="9740"><span data-dcnode-id="9739" instrument_node="">the rest of the class. Furious of what she saw, she got her eraser</span><br data-dcnode-id="9738"><span data-dcnode-id="9737" instrument_node="">and threw it to her pupil who was hit in the forehead. Do you</span><br data-dcnode-id="9736"><span data-dcnode-id="9735" instrument_node="">agree with Teacher Carmen's action to discipline her pupil?</span><br data-dcnode-id="9734"><span data-dcnode-id="9733" instrument_node="">A. Yes, because she has to correct the misbehavior immediately.</span><br data-dcnode-id="9732"><span data-dcnode-id="9731" instrument_node="">B. No, because she acted at the height of her anger.</span><br data-dcnode-id="9730"><span data-dcnode-id="9729" instrument_node="">C. Yes, because the pupil's behavior is disturbing the class and</span><br data-dcnode-id="9728"><span data-dcnode-id="9727" instrument_node="">the teaching process.</span><br data-dcnode-id="9726"><span data-dcnode-id="9725" instrument_node="">D. No, because a more appropriate technique can be used to</span><br data-dcnode-id="9724"><span data-dcnode-id="9723" instrument_node="">control the behavior.</span><br data-dcnode-id="9722"><span data-dcnode-id="9721" instrument_node="">f95. Teacher Melvin is a handsome and an intelligent high</span><br data-dcnode-id="9720"><span data-dcnode-id="9719" instrument_node="">school teacher. Most of the time his students have a crush</span><br data-dcnode-id="9718"><span data-dcnode-id="9717" instrument_node="">on him. It so happens that one day, he got attracted to a</span><br data-dcnode-id="9716"><span data-dcnode-id="9715" instrument_node="">beautiful and intelligent girl in his class. Should Teacher</span><br data-dcnode-id="9714"><span data-dcnode-id="9713" instrument_node="">Melvin entertain his feelings toward his student?</span><br data-dcnode-id="9712"><span data-dcnode-id="9711" instrument_node="">A. Yes, for as long as it will not affect his focus in teaching.</span><br data-dcnode-id="9710"><span data-dcnode-id="9709" instrument_node="">B. Yes, he has the right to express his feelings.</span><br data-dcnode-id="9708"><span data-dcnode-id="9707" instrument_node="">C. No, he should not take advantage of his position as a</span><br data-dcnode-id="9706"><span data-dcnode-id="9705" instrument_node="">teacher.</span><br data-dcnode-id="9704"><span data-dcnode-id="9703" instrument_node="">D. No, the parents will file charges against him.</span><br data-dcnode-id="9702"><span data-dcnode-id="9701" instrument_node="">f96. What does "Living with dignity in all places at all times" as</span><br data-dcnode-id="9700"><span data-dcnode-id="9699" instrument_node="">provided for by RA 4670 and Article XI of the Code of Ethics</span><br data-dcnode-id="9698"><span data-dcnode-id="9697" instrument_node="">include?</span><br data-dcnode-id="9696"><span data-dcnode-id="9695" instrument_node="">A. Living together with someone whose marriage has not been</span><br data-dcnode-id="9694"><span data-dcnode-id="9693" instrument_node="">legally annulled.</span><br data-dcnode-id="9692"><span data-dcnode-id="969 ="9265" instrument_node="">B.Group presentation</span><br data-dcnode-id="9264"><span data-dcnode-id="9263" instrument_node="">C.Group processing</span><br data-dcnode-id="9262"><span data-dcnode-id="9261" instrument_node="">f123. Which indicate/s positive interdependence?</span><br data-dcnode-id="9260"><span data-dcnode-id="9259" instrument_node="">I. Group has a clear task or goal so everyone knows</span><br data-dcnode-id="9258"><span data-dcnode-id="9257" instrument_node="">he/she sinks or swims together with the group.</span><br data-dcnode-id="9256"><span data-dcnode-id="9255" instrument_node="">II.The efforts of each person benefit not only the</span><br data-dcnode-id="9254"><span data-dcnode-id="9253" instrument_node="">individual, but also everyoneelse in the group.</span><br data-dcnode-id="9252"><span data-dcnode-id="9251" instrument_node="">III. Each member commits to personal success as</span><br data-dcnode-id="9250"><span data-dcnode-id="9249" instrument_node="">well as the success of every member of the group.</span><br data-dcnode-id="9248"><span data-dcnode-id="9247" instrument_node="">A. I only B.II and IIIC.I and III D. I, II and III</span><br data-dcnode-id="9246"><span data-dcnode-id="9245" instrument_node="">f124. How can one say the cooperative learning group</span><br data-dcnode-id="9244"><span data-dcnode-id="9243" instrument_node="">observes individual and group accountability?</span><br data-dcnode-id="9242"><span data-dcnode-id="9241" instrument_node="">I. The group is accountable for achieving its goals.</span><br data-dcnode-id="9240"><span data-dcnode-id="9239" instrument_node="">II. Each member must be accountable for contributing a fair</span><br data-dcnode-id="9238"><span data-dcnode-id="9237" instrument_node="">share of the work</span><br data-dcnode-id="9236"><span data-dcnode-id="9235" instrument_node="">toward the group goal.</span><br data-dcnode-id="9234"><span data-dcnode-id="9233" instrument_node="">III. The performance of each individual must be assessed and</span><br data-dcnode-id="9232"><span data-dcnode-id="9231" instrument_node="">the results given</span><br data-dcnode-id="9230"><span data-dcnode-id="9229" instrument_node="">back to the group.</span><p data-dcnode-id="9228"></p><p data-dcnode-id="9227"></p><h2 data-dcnode-id="9225"><span data-dcnode-id="9226" instrument_node="">A. I and II B. I and III C. II and III D. I, II and III</span></h2><br data-dcnode-id="9224"><span data-dcnode-id="9223" instrument_node="">f125. Which can be done to ensure positive interdependence?</span><br data-dcnode-id="9222"><span data-dcnode-id="9221" instrument_node="">I. The group has only one pencil, paper, book, or other</span><br data-dcnode-id="9220"><span data-dcnode-id="9219" instrument_node="">resource.</span><br data-dcnode-id="9218"><span data-dcnode-id="9217" instrument_node="">One paper is written by the group.</span><br data-dcnode-id="9216"><span data-dcnode-id="9215" instrument_node="">II. A task is divided into jobs and cannot be finished unless</span><br data-dcnode-id="9214"><span data-dcnode-id="9213" instrument_node="">everyone help.</span><br data-dcnode-id="9212"><span data-dcnode-id="9211" instrument_node="">III. Pass one paper around the group on which each member</span><br data-dcnode-id="9210"><span data-dcnode-id="9209" instrument_node="">must write a section. *</span><br data-dcnode-id="9208"><span data-dcnode-id="9207" instrument_node="">IV. Each person learns a topic and then teaches it to the group.</span><br data-dcnode-id="9206"><span data-dcnode-id="9205" instrument_node="">A. I, II, III, IV and V     C. I, II, III and IV</span><br data-dcnode-id="9204"><span data-dcnode-id="9203" instrument_node="">f126. Prof. B presented a lesson on the agreement of</span><br data-dcnode-id="9202"><span data-dcnode-id="9201" instrument_node="">the subject and the verb. After developmental</span><br data-dcnode-id="9200"><span data-dcnode-id="9199" instrument_node="">activity, he led the class to arrive at a rule. How did</span><br data-dcnode-id="9198"><span data-dcnode-id="9197" instrument_node="">the teacher</span><br data-dcnode-id="9196"><span data-dcnode-id="9195" instrument_node="">proceed?</span><br data-dcnode-id="9194"><span data-dcnode-id="9193" instrument_node="">A. Inductively</span><br data-dcnode-id="9192"><span data-dcnode-id="9191" instrument_node="">B. Deductively</span><br data-dcnode-id="9190"><span data-dcnode-id="9189" instrument_node="">C. Deductively then inductively</span><br data-dcnode-id="9188"><span data-dcnode-id="9187" instrument_node="">D. Inductively then deductively</span><br data-dcnode-id="9186"><span data-dcnode-id="9185" instrument_node="">f127. Which part of lesson development</span><br data-dcnode-id="9184"><span data-dcnode-id="9183" instrument_node="">is concerned with mood setting?</span><br data-dcnode-id="9182"><span data-dcnode-id="9181" instrument_node="">A. Application</span><br data-dcnode-id="9180"><span data-dcnode-id="9179" instrument_node="">B. Motivation</span><br data-dcnode-id="9178"><span data-dcnode-id="9177" instrument_node="">C. Deepening</span><br data-dcnode-id="9176"><span data-dcnode-id="9175" instrument_node="">D. Generalization</span><br data-dcnode-id="9174"><span data-dcnode-id="9173" instrument_node="">f128. In which situation is a learner-centered</span><br data-dcnode-id="9172"><span data-dcnode-id="9171" instrument_node="">approach to curriculum designing utilized</span><br data-dcnode-id="9170"><span data-dcnode-id="9169" instrument_node="">A. The focus of learning is mastery in terms of</span><br data-dcnode-id="9168"><span data-dcnode-id="9167" instrument_node="">content.</span><br data-dcnode-id="9166"><span data-dcnode-id="9165" instrument_node="">B.Teacher considers learners' entry knowledge and</span><br data-dcnode-id="9164"><span data-dcnode-id="9163" instrument_node="">skills.</span><br data-dcnode-id="9162"><span data-dcnode-id="9161" instrument_node="">C.The class activity revolves around finding</span><br data-dcnode-id="9160"><span data-dcnode-id="9159" instrument_node="">solutions to problems.</span><br data-dcnode-id="9158"><span data-dcnode-id="9157" instrument_node="">D. Memorization and drill are important learning</span><br data-dcnode-id="9156"><span data-dcnode-id="9155" instrument_node="">f129. Which level of knowledge is manifested</span><br data-dcnode-id="9154"><span data-dcnode-id="9153" instrument_node="">when a learner is able to answer the question,</span><br data-dcnode-id="9152"><span data-dcnode-id="9151" instrument_node="">"What was most confusing to me about the</span><br data-dcnode-id="9150"><span data-dcnode-id="9149" instrument_node="">material explored in class today?"</span><br data-dcnode-id="9148"><span data-dcnode-id="9147" instrument_node="">A. Factual knowledge</span><br data-dcnode-id="9146"><span data-dcnode-id="9145" instrument_node="">B. Conceptual knowledge</span><br data-dcnode-id="9144"><span data-dcnode-id="9143" instrument_node="">C. Procedural knowledge</span><br data-dcnode-id="9142"><span data-dcnode-id="9141" instrument_node="">D. Metacognitive knowledge</span><br data-dcnode-id="9140"><span data-dcnode-id="9139" instrument_node="">f130. You wanted your students to learn the different</span><br data-dcnode-id="9138"><span data-dcnode-id="9137" instrument_node="">bodies of water as a part of your lesson. Which of</span><br data-dcnode-id="9136"><span data-dcnode-id="9135" instrument_node="">these objectives is NOT appropriate for your lesson?</span><br data-dcnode-id="9134"><span data-dcnode-id="9133" instrument_node="">A. Name the different kinds of bodies of water.</span><br data-dcnode-id="9132"><span data-dcnode-id="9131" instrument_node="">B. Name ways by which we can protect the bodies</span><br data-dcnode-id="9130"><span data-dcnode-id="9129" instrument_node="">of water.</span><br data-dcnode-id="9128"><span data-dcnode-id="9127" instrument_node="">C. Draw the different kinds of bodies of water.</span><br data-dcnode-id="9126"><span data-dcnode-id="9125" instrument_node="">D. Go on a field trip to study all the kinds of bodies</span><br data-dcnode-id="9124"><span data-dcnode-id="9123" instrument_node="">of water.</span><br data-dcnode-id="9122"><span data-dcnode-id="9121" instrument_node="">f131. Mrs. Martinez observes that her students answer</span><br data-dcnode-id="9120"><span data-dcnode-id="9119" instrument_node="">even when not called, shout "Ma'am" to get her attention,</span><br data-dcnode-id="9118"><span data-dcnode-id="9117" instrument_node="">and laugh when someone commits mistakes. What should</span><br data-dcnode-id="9116"><span data-dcnode-id="9115" instrument_node="">she do?</span><br data-dcnode-id="9114"><span data-dcnode-id="9113" instrument_node="">A. Set the rules for the class to observe.</span><br data-dcnode-id="9112"><span data-dcnode-id="9111" instrument_node="">B. Send misbehaving students to the guidance counselor.</span><br data-dcnode-id="9110"><span data-dcnode-id="9109" instrument_node="">C. Involve the whole class in setting rules of conduct for</span><br data-dcnode-id="9108"><span data-dcnode-id="9107" instrument_node="">the whole class.</span><br data-dcnode-id="9106"><span data-dcnode-id="9105" instrument_node="">D. Send a report/letter to the parents about their child's</span><br data-dcnode-id="9104"><span data-dcnode-id="9103" instrument_node="">misbehavior in class.</span><br data-dcnode-id="9102"><span data-dcnode-id="9101" instrument_node="">f132. Teacher Raymond, a Social Studies</span><br data-dcnode-id="9100"><span data-dcnode-id="9099" instrument_node="">teacher, wants his Grade 7 students to express</span><br data-dcnode-id="9098"><span data-dcnode-id="9097" instrument_node="">their opinions, sentiments, and ideas regarding</span><br data-dcnode-id="9096"><span data-dcnode-id="9095" instrument_node="">a certain government issue in the national</span><br data-dcnode-id="9094"><span data-dcnode-id="9093" instrument_node="">level. Which of the following can he BEST use</span><br data-dcnode-id="9092"><span data-dcnode-id="9091" instrument_node="">to facilitate such</span><br data-dcnode-id="9090"><span data-dcnode-id="9089" instrument_node="">A. Forum</span><br data-dcnode-id="9088"><span data-dcnode-id="9087" instrument_node="">B. Blog</span><br data-dcnode-id="9086"><span data-dcnode-id="9085" instrument_node="">C. E-mail</span><br data-dcnode-id="9084"><span data-dcnode-id="9083" instrument_node="">f133. Which of the following situations illustrates the best way</span><br data-dcnode-id="9082"><span data-dcnode-id="9081" instrument_node="">of maintaining an atmosphere conducive to learning during</span><br data-dcnode-id="9080"><span data-dcnode-id="9079" instrument_node="">the experiment period?</span><br data-dcnode-id="9078"><span data-dcnode-id="9077" instrument_node="">A. Handling, distributing and collecting of materials or</span><br data-dcnode-id="9076"><span data-dcnode-id="9075" instrument_node="">equipment are routinized.</span><br data-dcnode-id="9074"><span data-dcnode-id="9073" instrument_node="">B. Experiment tables and chairs are arranged in rows facing</span><br data-dcnode-id="9072"><span data-dcnode-id="9071" instrument_node="">the teacher's table and chair.</span><br data-dcnode-id="9070"><span data-dcnode-id="9069" instrument_node="">C. Learners carry on class experiments following the</span><br data-dcnode-id="9068"><span data-dcnode-id="9067" instrument_node="">procedure quietly and systematically.</span><br data-dcnode-id="9066"><span data-dcnode-id="9065" instrument_node="">D. Materials needed for experiments are to be bought just</span><br data-dcnode-id="9064"><span data-dcnode-id="9063" instrument_node="">before using them to avoid wastage.</span><br data-dcnode-id="9062"><span data-dcnode-id="9061" instrument_node="">f134. Miss Able wants to let her class learn that in the</span><br data-dcnode-id="9060"><span data-dcnode-id="9059" instrument_node="">formation of ice cubes, the surrounding surface of the</span><br data-dcnode-id="9058"><span data-dcnode-id="9057" instrument_node="">water freezes first before the others and to show that I</span><br data-dcnode-id="9056"><span data-dcnode-id="9055" instrument_node="">water expands rather than contracts when frozen.</span><br data-dcnode-id="9054"><span data-dcnode-id="9053" instrument_node="">Which of the following is the most appropriate teaching</span><br data-dcnode-id="9052"><span data-dcnode-id="9051" instrument_node="">strategy for her to use?</span><br data-dcnode-id="9050"><span data-dcnode-id="9049" instrument_node="">A.Problem solving</span><br data-dcnode-id="9048"><span data-dcnode-id="9047" instrument_node="">B. Laboratory activity</span><br data-dcnode-id="9046"><span data-dcnode-id="9045" instrument_node="">C. Investigatory activity</span><br data-dcnode-id="9044"><span data-dcnode-id="9043" instrument_node="">D.Teacher demonstration</span><br data-dcnode-id="9042"><span data-dcnode-id="9041" instrument_node="">f135. Good discipline is characterized by</span><br data-dcnode-id="9040"><span data-dcnode-id="9039" instrument_node="">A. self-direction</span><br data-dcnode-id="9038"><span data-dcnode-id="9037" instrument_node="">B. giving command</span><br data-dcnode-id="9036"><span data-dcnode-id="9035" instrument_node="">C. unquestioning docility and</span><br data-dcnode-id="9034"><span data-dcnode-id="9033" instrument_node="">conformity</span><br data-dcnode-id="9032"><span data-dcnode-id="9031" instrument_node="">D. coercion and punishment</span><br data-dcnode-id="9030"><span data-dcnode-id="9029" instrument_node="">f136. To understand better the meaning of sweet,</span><br data-dcnode-id="9028"><span data-dcnode-id="9027" instrument_node="">Teacher Arabella gives examples of phrases like sugar is</span><br data-dcnode-id="9026"><span data-dcnode-id="9025" instrument_node="">sweet; chocolates are sweet, ripe mangoes are sweet.</span><br data-dcnode-id="9024"><span data-dcnode-id="9023" instrument_node="">Teacher Arabella is trying to develop the learners' ability</span><br data-dcnode-id="9022"><span data-dcnode-id="9021" instrument_node="">to derive the meaning of words co-occurring with the</span><br data-dcnode-id="9020"><span data-dcnode-id="9019" instrument_node="">unknown word, by making use of which clues'?</span><br data-dcnode-id="9018"><span data-dcnode-id="9017" instrument_node="">A.Context</span><br data-dcnode-id="9016"><span data-dcnode-id="9015" instrument_node="">B. Semantic</span><br data-dcnode-id="9014"><span data-dcnode-id="9013" instrument_node="">C. Syntactic</span><br data-dcnode-id="9012"><span data-dcnode-id="9011" instrument_node="">D.Presentation</span><br data-dcnode-id="9010"><span data-dcnode-id="9009" instrument_node="">f137. Teacher Marie designed a lesson where she</span><br data-dcnode-id="9008"><span data-dcnode-id="9007" instrument_node="">wanted her students to design an activity on the</span><br data-dcnode-id="9006"><span data-dcnode-id="9005" instrument_node="">effect of changing the temperature of water on the</span><br data-dcnode-id="9004"><span data-dcnode-id="9003" instrument_node="">dissolving rate of sugar. Which teaching method is</span><br data-dcnode-id="9002"><span data-dcnode-id="9001" instrument_node="">most appropriate for Teacher Marie to use?</span><br data-dcnode-id="9000"><span data-dcnode-id="8999" instrument_node="">A. Direct instruction</span><br data-dcnode-id="8998"><span data-dcnode-id="8997" instrument_node="">B.Demonstration</span><br data-dcnode-id="8996"><span data-dcnode-id="8995" instrument_node="">C.Inquiry</span><br data-dcnode-id="8994"><span data-dcnode-id="8993" instrument_node="">D. Lecture method</span><br data-dcnode-id="8992"><span data-dcnode-id="8991" instrument_node="">f138. Which of the following strategies</span><br data-dcnode-id="8990"><span data-dcnode-id="8989" instrument_ ment_node="">parenting style for adolescents?</span><br data-dcnode-id="4672"><span data-dcnode-id="4671" instrument_node="">A. Authoritative</span><br data-dcnode-id="4670"><span data-dcnode-id="4669" instrument_node="">B. Authoritarian</span><br data-dcnode-id="4668"><span data-dcnode-id="4667" instrument_node="">C. Neglectful</span><br data-dcnode-id="4666"><span data-dcnode-id="4665" instrument_node="">D. Laizzes faire</span><br data-dcnode-id="4664"><span data-dcnode-id="4663" instrument_node="">f394. Which strategies have been proven to</span><br data-dcnode-id="4662"><span data-dcnode-id="4661" instrument_node="">increase children's creative thinking?</span><br data-dcnode-id="4660"><span data-dcnode-id="4659" instrument_node="">I. Encourage brainstorming.</span><br data-dcnode-id="4658"><span data-dcnode-id="4657" instrument_node="">II. Encourage internal motivation.</span><br data-dcnode-id="4656"><span data-dcnode-id="4655" instrument_node="">III. Guide children to take intellectual risks.</span><br data-dcnode-id="4654"><span data-dcnode-id="4653" instrument_node="">A. I and III</span><br data-dcnode-id="4652"><span data-dcnode-id="4651" instrument_node="">B. I and II</span><br data-dcnode-id="4650"><span data-dcnode-id="4649" instrument_node="">C. I, II and III</span><br data-dcnode-id="4648"><span data-dcnode-id="4647" instrument_node="">f395. Researchers have found that executive</span><br data-dcnode-id="4646"><span data-dcnode-id="4645" instrument_node="">functioning is a better predictor of school</span><br data-dcnode-id="4644"><span data-dcnode-id="4643" instrument_node="">readiness rather than IQ. What is an implication of</span><br data-dcnode-id="4642"><span data-dcnode-id="4641" instrument_node="">this to the teaching-learning process?</span><br data-dcnode-id="4640"><span data-dcnode-id="4639" instrument_node="">A. Strengthen executive functioning among</span><br data-dcnode-id="4638"><span data-dcnode-id="4637" instrument_node="">learners.</ ant in counteracting a</span><br data-dcnode-id="4602"><span data-dcnode-id="4601" instrument_node="">deprived early environment's effect on IQ.</span><br data-dcnode-id="4600"><span data-dcnode-id="4599" instrument_node="">II. Modifications in environment can change IQ scores considerably.</span><br data-dcnode-id="4598"><span data-dcnode-id="4597" instrument_node="">III. It is important to consider the types of environments for children.</span><br data-dcnode-id="4596"><span data-dcnode-id="4595" instrument_node="">A. I and II            C. II and III</span><br data-dcnode-id="4594"><span data-dcnode-id="4593" instrument_node="">B. I, II and III          D. I and III</span><br data-dcnode-id="4592"><span data-dcnode-id="4591" instrument_node="">f398. Research found out that children have the highest self-</span><br data-dcnode-id="4590"><span data-dcnode-id="4589" instrument_node="">esteem when they perform competently in domains that are</span><br data-dcnode-id="4588"><span data-dcnode-id="4587" instrument_node="">important to them. Therefore, it is important that</span><br data-dcnode-id="4586"><span data-dcnode-id="4585" instrument_node="">children should be .</span><br data-dcnode-id="4584"><span data-dcnode-id="4583" instrument_node="">I. encouraged to identify and value areas of competence.</span><br data-dcnode-id="4582"><span data-dcnode-id="4581" instrument_node="">II. challenged to do difficult learning tasks.</span><br data-dcnode-id="4580"><span data-dcnode-id="4579" instrument_node="">III. made to understand that academic competence is the only</span><br data-dcnode-id="4578"><span data-dcnode-id="4577" instrument_node="">true form of</span><br data-dcnode-id="4576"><span data-dcnode-id="4575" instrument_node="">competence.</span><br data-dcnode-id="4574"><span data-dcnode-id="4573" instrument_node="">A. I only C. I and II</span><br data-dcnode-id="4572"><span data-dcnode-id="4571" instrument_node="">B. II and III D. Ill only</span><br data-dcnode-id="4570"><span data-dcnode-id="4569" instrument_node="">f399. How should one care for children after a disaster?</span><br data-dcnode-id="4568"><span data-dcnode-id="4567" instrument_node="">A.Encourage children to talk about any disturbing</span><br data-dcnode-id="4566"><span data-dcnode-id="4565" instrument_node="">feeling reassuring them that such feelings are normal</span><br data-dcnode-id="4564"><span data-dcnode-id="4563" instrument_node="">after a stressful event.</span><br data-dcnode-id="4562"><span data-dcnode-id="4561" instrument_node="">B. Discourage children to talk about any disturbing</span><br data-dcnode-id="4560"><span data-dcnode-id="4559" instrument_node="">feeling for this may only make things worse.</span><br data-dcnode-id="4558"><span data-dcnode-id="4557" instrument_node="">C. Do not allow children to retell the events for them not</span><br data-dcnode-id="4556"><span data-dcnode-id="4555" instrument_node="">to be reminded of the event.</span><br data-dcnode-id="4554"><span data-dcnode-id="4553" instrument_node="">D.Make children understand that a disaster is God's will</span><br data-dcnode-id="4552"><span data-dcnode-id="4551" instrument_node="">and there is nothing we can do about it.</span><br data-dcnode-id="4550"><span data-dcnode-id="4549" instrument_node="">f400. . What is the educational implication of the research finding that</span><br data-dcnode-id="4548"><span data-dcnode-id="4547" instrument_node="">participation in extra-curricular activities is associated with positive</span><br data-dcnode-id="4546"><span data-dcnode-id="4545" instrument_node="">academic and psychological outcomes?</span><br data-dcnode-id="4544"><span data-dcnode-id="4543" instrument_node="">I. Schools should organize quality varied extra-curricular activities for</span><br data-dcnode-id="4542"><span data-dcnode-id="4541" instrument_node="">students.</span><br data-dcnode-id="4540"><span data-dcnode-id="4539" instrument_node="">II. Schools should promote a balance of academic and extra-curricular</span><br data-dcnode-id="4538"><span data-dcnode-id="4537" instrument_node="">activities for its students.</span><br data-dcnode-id="4536"><span data-dcnode-id="4535" instrument_node="">III. Students should be encouraged to compensate for their poor academic</span><br data-dcnode-id="4534"><span data-dcnode-id="4533" instrument_node="">performance by taking leadership roles in extra-curricular activities.</span><br data-dcnode-id="4532"><span data-dcnode-id="4531" instrument_node="">A. I and III      C. I and II</span><br data-dcnode-id="4530"><span data-dcnode-id="4529" instrument_node="">B. II and III       D. I only</span><br data-dcnode-id="4528"><span data-dcnode-id="4527" instrument_node="">f401. Case A: Teacher X asked her kindergarten pupils to draw the picture</span><br data-dcnode-id="4526"><span data-dcnode-id="4525" instrument_node="">of their families. After the activity, she collected the children's drawing</span><br data-dcnode-id="4524"><span data-dcnode-id="4523" instrument_node="">and one of these caught her attention. Madeline's drawing showed two</span><br data-dcnode-id="4522"><span data-dcnode-id="4521" instrument_node="">families, one with a father, and the other with just a mother. She</span><br data-dcnode-id="4520"><span data-dcnode-id="4519" instrument_node="">interviewed Madeline about her drawing and found that her parents are</span><br data-dcnode-id="4518"><span data-dcnode-id="4517" instrument_node="">separated and both already have their own families. Madeline is living</span><br data-dcnode-id="4516"><span data-dcnode-id="4515" instrument_node="">with her grandmother. During lunch break; Teacher X shared her</span><br data-dcnode-id="4514"><span data-dcnode-id="4513" instrument_node="">discovery with her co - teachers. Was Teacher X's action acceptable?</span><br data-dcnode-id="4512"><span data-dcnode-id="4511" instrument_node="">A. Yes, other teachers should also know about Madeline.< II. self-competition against standards set</span><br data-dcnode-id="4406"><span data-dcnode-id="4405" instrument_node="">III. within the same gender</span><br data-dcnode-id="4404"><span data-dcnode-id="4403" instrument_node="">A. I and II         C. I only</span><br data-dcnode-id="4402"><span data-dcnode-id="4401" instrument_node="">B.II and III      D. I, II and III</span><br data-dcnode-id="4400"><span data-dcnode-id="4399" instrument_node="">f408. Which is/are characteristics of a culturally responsive</span><br data-dcnode-id="4398"><span data-dcnode-id="4397" instrument_node="">teaching?</span><br data-dcnode-id="4396"><span data-dcnode-id="4395" instrument_node="">I. Crosses disciplines and cultures to engage learners while</span><br data-dcnode-id="4394"><span data-dcnode-id="4393" instrument_node="">respecting their cultural integrity</span><br data-dcnode-id="4392"><span data-dcnode-id="4391" instrument_node="">II. Accommodates the dynamic mix of race, ethnicity, class,</span><br data-dcnode-id="4390"><span data-dcnode-id="4389" instrument_node="">gender, region, religion, and family that contributes to every</span><br data-dcnode-id="4388"><span data-dcnode-id="4387" instrument_node="">student's cultural identity</span><br data-dcnode-id="4386"><span data-dcnode-id="4385" instrument_node="">III. Presents some cultures to be superior than others to improve</span><br data-dcnode-id="4384"><span data-dcnode-id="4383" instrument_node="">inferior cultures</span><br data-dcnode-id="4382"><span data-dcnode-id="4381" instrument_node="">A. I and IIIC. II only</span><br data-dcnode-id="4380"><span data-dcnode-id="4379" instrument_node="">B. Ill only D.I and II</span><br data-dcnode-id="4378"><span data-dcnode-id="4377" instrument_node="">f409. If a teacher works on an intrinsic motivation framework to help develop</span><br data-dcnode-id="4376"><span data-dcnode-id="4375" instrument_node="">intrinsic motivation among learners, which motivational conditions form small groups. She</span><br data-dcnode-id="4346"><span data-dcnode-id="4345" instrument_node="">encourages them to discuss any previous experiences they may have had in doing research as</span><br data-dcnode-id="4344"><span data-dcnode-id="4343" instrument_node="">well as their expectations and concerns for the course. Each group then shares its</span><br data-dcnode-id="4342"><span data-dcnode-id="4341" instrument_node="">experiences, expectations, and concerns as she records them on the chalkboard. In this</span><br data-dcnode-id="4340"><span data-dcnode-id="4339" instrument_node="">manner, she is able to understand her students' perspectives and to increase their connection</span><br data-dcnode-id="4338"><span data-dcnode-id="4337" instrument_node="">to one another and herself.</span><br data-dcnode-id="4336"><span data-dcnode-id="4335" instrument_node="">Which technique did Teacher Z employ to create a favorable learning climate?</span><br data-dcnode-id="4334"><span data-dcnode-id="4333" instrument_node="">A. She established inclusion.</span><br data-dcnode-id="4332"><span data-dcnode-id="4331" instrument_node="">B. She promised not to make research work oppressive.</span><br data-dcnode-id="4330"><span data-dcnode-id="4329" instrument_node="">C. She makes clear that only positive learning experiences should be shared in the group.</span><br data-dcnode-id="4328"><span data-dcnode-id="4327" instrument_node="">D. She grouped the students according to ability.</span><br data-dcnode-id="4326"><span data-dcnode-id="4325" instrument_node="">f411. Teacher Z explains that most people are researchers</span><br data-dcnode-id="4324"><span data-dcnode-id="4323" instrument_node="">much of the time and she asks the students what they would</span><br data-dcnode-id="4322"><span data-dcnode-id="4321" instrument_node="">like to research among themselves. After a lively</span><br data-dcnode-id="4320"><span data-dcnode-id="4319" instrument_node="">discussion, the class decides to investigate and predict the</span><br data-dcnode-id="4318"><span data-dcnode-id="4317" instrument_node="">amount of sleep some members of the class had the previous</span><br data-dcnode-id="4316"><span data-dcnode-id="4315" instrument_node="">night. How may the intrinsically motivating experiences in the</span><br data-dcnode-id="4314"><span data-dcnode-id="4313" instrument_node="">class be described?</span><br data-dcnode-id="4312"><span data-dcnode-id="4311" instrument_node="">I. Students make a choice.</span><br data-dcnode-id="4310"><span data-dcnode-id="4309" instrument_node="">II. Students freely discuss among themselves.</span><br data-dcnode-id="4308"><span data-dcnode-id="4307" instrument_node="">III. Teacher warns them on difficult researches.</span><br data-dcnode-id="4306"><span data-dcnode-id="4305" instrument_node="">A. I only          C. II and III</span><br data-dcnode-id="4304"><span data-dcnode-id="4303" instrument_node="">f412. Increasing latency periods when questioning students helps</span><br data-dcnode-id="4302"><span data-dcnode-id="4301" instrument_node="">create a positive</span><br data-dcnode-id="4300"><span data-dcnode-id="4299" instrument_node="">learning atmosphere. Which practice contradicts this principle?</span><br data-dcnode-id="4298"><span data-dcnode-id="4297" instrument_node="">A. Quickly give up on a student who is struggling with a</span><br data-dcnode-id="4296"><span data-dcnode-id="4295" instrument_node="">response.</span><br data-dcnode-id="4294"><span data-dcnode-id="4293" instrument_node="">B. Make a conscious effort to extend the length of wait time</span><br data-dcnode-id="4292"><span data-dcnode-id="4291" instrument_node="">before student can give a response.</span><br data-dcnode-id="4290"><span data-dcnode-id="4289" instrument_node="">C. Call only on students with hands raised so as not waste time</span><br data-dcnode-id="4288"><span data-dcnode-id="4287" instrument_node="">waiting.</span><br data-dcno as dressing, eating, speaking</span><br data-dcnode-id="4218"><span data-dcnode-id="4217" instrument_node="">III. That it is just men, women excluded, who are basically the same</span><br data-dcnode-id="4216"><span data-dcnode-id="4215" instrument_node="">A. I only C. Ill only</span><br data-dcnode-id="4214"><span data-dcnode-id="4213" instrument_node="">B. I and II D. I, II and III</span><br data-dcnode-id="4212"><span data-dcnode-id="4211" instrument_node="">f417. An atmosphere that is favorable for learning</span><br data-dcnode-id="4210"><span data-dcnode-id="4209" instrument_node="">ensures that what a student learns, how he or she</span><br data-dcnode-id="4208"><span data-dcnode-id="4207" instrument_node="">learns it, and how the student demonstrates what</span><br data-dcnode-id="4206"><span data-dcnode-id="4205" instrument_node="">he or she has learned is a match for that student's</span><br data-dcnode-id="4204"><span data-dcnode-id="4203" instrument_node="">readiness level, interests, and preferred mode of</span><br data-dcnode-id="4202"><span data-dcnode-id="4201" instrument_node="">learning. Which instruction is referred to?</span><br data-dcnode-id="4200"><span data-dcnode-id="4199" instrument_node="">A. Differential C. Differentiated</span><br data-dcnode-id="4198"><span data-dcnode-id="4197" instrument_node="">B. Differing D. Different</span><br data-dcnode-id="4196"><span data-dcnode-id="4195" instrument_node="">f418. In a favorable learning environment,</span><br data-dcnode-id="4194"><span data-dcnode-id="4193" instrument_node="">which competition promotes learning?</span><br data-dcnode-id="4192"><span data-dcnode-id="4191" instrument_node="">A. Between boys and girls</span><br data-dcnode-id="4190"><span data-dcnode-id="4189" instrument_node="">B. Within members of the same gender</span><br data-dcnode-id="4188"><span data-dcnode-id="4187" instrument_node="">C. For academic honors</span><br data-dcnode-id="4186"><span data-dcnode-id="4185" instrument_node="">D. Against standards set</span><br data-dcnode-id="4184"><span data-dcnode-id="4183" instrument_node="">f419. For a positive learning environment it is good to</span><br data-dcnode-id="4182"><span data-dcnode-id="4181" instrument_node="">make clear that an individual's</span><br data-dcnode-id="4180"><span data-dcnode-id="4179" instrument_node="">beliefs and activities should be understood by others</span><br data-dcnode-id="4178"><span data-dcnode-id="4177" instrument_node="">in terms of that individual's</span><br data-dcnode-id="4176"><span data-dcnode-id="4175" instrument_node="">own culture. Which concept is explained?</span><br data-dcnode-id="4174"><span data-dcnode-id="4173" instrument_node="">A. Ethical relativism</span><br data-dcnode-id="4172"><span data-dcnode-id="4171" instrument_node="">B. Cultural relativism</span><br data-dcnode-id="4170"><span data-dcnode-id="4169" instrument_node="">C. Individual differences</span><br data-dcnode-id="4168"><span data-dcnode-id="4167" instrument_node="">D. Cultural sensitivity</span><br data-dcnode-id="4166"><span data-dcnode-id="4165" instrument_node="">f420. Gender stereotypes do not contribute to a positive learning</span><br data-dcnode-id="4164"><span data-dcnode-id="4163" instrument_node="">atmosphere. The following are proofs of gender stereotype in class EXCEPT</span><br data-dcnode-id="4162"><span data-dcnode-id="4161" instrument_node=""> .</span><br data-dcnode-id="4160"><span data-dcnode-id="4159" instrument_node="">A. Boys are asked to solve word problems because they are "naturally"</span><br data-dcnode-id="4158"><span data-dcnode-id="4157" instrument_node="">good</span><br data-dcnode-id="4156"><span data-dcnode-id="4155" instrument_node="">at math.</span><br data-dcnode-id="4154"><span data-dcnode-id="4153" instrument_node="">B. Girls help with the cleaning up of the classroom as they are expected to</span><br data-dcnode-id="4152"><span data-dcnode-id="4151" instrument_node="">be more inclined to do housework.</span><br data-dcnode-id="4150"><span data-dcnode-id="4149" instrument_node="">C. Girls and boys do the same activities in the subject Edukasyong</span><br data-dcnode-id="4148"><span data-dcnode-id="4147" instrument_node="">Pantahanan at Pangkabuhayan</span><br data-dcnode-id="4146"><span data-dcnode-id="4145" instrument_node="">D. Girls are encouraged to be soft spoken and home bound playing with</span><br data-dcnode-id="4144"><span data-dcnode-id="4143" instrument_node="">dolls and kitchen toys while boys are encouraged to be aggressive by</span><br data-dcnode-id="4142"><span data-dcnode-id="4141" instrument_node="">playing outside with cars and guns.</span><br data-dcnode-id="4140"><span data-dcnode-id="4139" instrument_node="">f421. For a favorable learning climate, ethnocentrism should be</span><br data-dcnode-id="4138"><span data-dcnode-id="4137" instrument_node="">out of the picture.</span><br data-dcnode-id="4136"><span data-dcnode-id="4135" instrument_node="">What does this mean?</span><br data-dcnode-id="4134"><span data-dcnode-id="4133" instrument_node="">A. Learners should be discouraged from competing against</span><br data-dcnode-id="4132"><span data-dcnode-id="4131" instrument_node="">one another.</span><br data-dcnode-id="4130"><span data-dcnode-id="4129" instrument_node="">B. No one should think that he/she is better than other</span><br data-dcnode-id="4128"><span data-dcnode-id="4127" instrument_node="">individuals for reasons based solely on his/her heritage.</span><br data-dcnode-id="4126"><span data-dcnode-id="4125" instrument_node="">C. Impress on the learners' minds that some people are better</span><br data-dcnode-id="4124"><span data-dcnode-id="4123" instrument_node="">or worse than them through no fault of their own.</span><br data-dcnode-id="4122"><span data-dcnode-id="4121" instrument_node="">D. No one should accept that other's culture is better than</span><br data-dcnode-id="4120"><span data-dcnode-id="4119" instrument_node="">his/hers.</span><br data-dcnode-id="4118"><span data-dcnode-id="4117" instrument_node="">f422. One group of four students was making sounds in the room while Teacher</span><br data-dcnode-id="4116"><span data-dcnode-id="4115" instrument_node="">B was grading papers during silent reading. He did not know which group</span><br data-dcnode-id="4114"><span data-dcnode-id="4113" instrument_node="">was making the sounds, so he warned the students that they would be inside</span><br data-dcnode-id="4112"><span data-dcnode-id="4111" instrument_node="">for recess if it went on. The offending students knew he did not know who it</span><br data-dcnode-id="4110"><span data-dcnode-id="4109" instrument_node="">was, so they kept it up to test the waters. Mr. B announced to the</span><br data-dcnode-id="4108"><span data-dcnode-id="4107" instrument_node="">class that if he heard noises one more time, the whole class would be in</span><br data-dcnode-id="4106"><span data-dcnode-id="4105" instrument_node="">recess, regardless of who it was. The other students were very upset, and</span><br data-dcnode-id="4104"><span data-dcnode-id="4103" instrument_node="">expressed, "That's not fair!". Was Teacher B's decision fair?</span><br data-dcnode-id="4102"><span data-dcnode-id="4101" instrument_node="">A. Yes, because the class seemed not to have cooperated to stop the</span><br data-dcnode-id="4100"><span data-dcnode-id="4099" instrument_node="">misbehavior</span><br data-dcnode-id="4098"><span data-dcnode-id="4097" instrument_node="">B. Yes, to give a lesson to all.</span><br data-dcnode-id="4096"><span data-dcnode-id="4095" instrument_node="">C. No, it was unfair to punish the whole class for the misdemeanor of one.</span><br data-dcnode-id="4094"><span data-dcnode-id="4093" instrument_node="">D. No, but that was the only way to show to the class he means business.</span><br data-dcnode-id="4092"><span data-dcnode-id="4091" instrument_node="">f423. Prof. A taught her Mathematics class</span><br data-dcnode-id="4090"><span data-dcnode-id="4089" instrument_node="">about addition of fractions. She administer,</span><br data-dcnode-id="4088"><span data-dcnode-id="4087" instrument_node="">an assessment tool to give her feedback so</span><br data-dcnode-id="4086"><span data-dcnode-id="4085" instrument_node="">she can help the students learn more.</span><br data-dcnode-id="4084"><span data-dcnode-id="4083" instrument_node="">What form of assessment was given?</span><br data-dcnode-id="4082"><span data-dcnode-id="4081" instrument_node="">A. Summative C. Peer</span><br data-dcnode-id="4080"><span data-dcnode-id="4079" instrument_node="">B. FormativeD. Self</span><br data-dcnode-id="4078"><span data-dcnode-id="4077" instrument_node="">f424. The class of Mr. San Juan was</span><br data-dcnode-id="4076"><span data-dcnode-id="4075" instrument_node="">asked to provide feedback on each</span><br data-dcnode-id="4074"><span data-dcnode-id="4073" instrument_node="">other's learning. Which form of</span><br data-dcnode-id="4072"><span data-dcnode-id="4071" instrument_node="">assessment was used?</span><br data-dcnode-id="4070"><span data-dcnode-id="4069" instrument_node="">A. Summative C. Peer</span><br data-dcnode-id="4068"><span data-dcnode-id="4067" instrument_node="">B. Formative D. Self</span><br data-dcnode-id="4066"><span data-dcnode-id="4065" instrument_node="">f425. The TLE class of Prof. Bellin was taught</span><br data-dcnode-id="4064"><span data-dcnode-id="4063" instrument_node="">on how to take measurement for a pair of</span><br data-dcnode-id="4062"><span data-dcnode-id="4061" instrument_node="">pants. An assessment was administered by</span><br data-dcnode-id="4060"><span data-dcnode-id="4059" instrument_node="">Prof. Bellin to express judgment on the</span><br data-dcnode-id="4058"><span data-dcnode-id="4057" instrument_node="">students' skill on measurement of pants.</span><br data-dcnode-id="4056"><span data-dcnode-id="4055"
