instrument_node="">f495. Klein wanted to determine students' attitude toward</span><br data-dcnode-id="2806"><span data-dcnode-id="2805" instrument_node="">cheating. She asked them to rate several statements on</span><br data-dcnode-id="2804"><span data-dcnode-id="2803" instrument_node="">the extent to which they agree. What assessment tool did</span><br data-dcnode-id="2802"><span data-dcnode-id="2801" instrument_node="">she use?</span><br data-dcnode-id="2800"><span data-dcnode-id="2799" instrument_node="">A. Activity Sheet</span><br data-dcnode-id="2798"><span data-dcnode-id="2797" instrument_node="">B. Attitude Scale</span><br data-dcnode-id="2796"><span data-dcnode-id="2795" instrument_node="">C. Journal Entry</span><br data-dcnode-id="2794"><span data-dcnode-id="2793" instrument_node="">D. Theme Writing</span><br data-dcnode-id="2792"><span data-dcnode-id="2791" instrument_node="">f496. Leian's school adopts a grading system based on the normal</span><br data-dcnode-id="2790"><span data-dcnode-id="2789" instrument_node="">curve. This is because the administration believes that majority</span><br data-dcnode-id="2788"><span data-dcnode-id="2787" instrument_node="">of the students are average with only a few of them below or</span><br data-dcnode-id="2786"><span data-dcnode-id="2785" instrument_node="">above average. What kind of grading/assessment does this</span><br data-dcnode-id="2784"><span data-dcnode-id="2783" instrument_node="">school have?</span><br data-dcnode-id="2782"><span data-dcnode-id="2781" instrument_node="">A. Criterion-referenced Assessment</span><br data-dcnode-id="2780"><span data-dcnode-id="2779" instrument_node="">B. Percentage Grading</span><br data-dcnode-id="2778"><span data-dcnode-id="2777" instrument_node="">B. Norm-referenced Assessment</span><br data-dcnode-id="2776"><span data-dcnode-id="2775" instrument_node="">C. Relative Grading</span><br data-dcnode-id="2774"><span data-dcnode-id="2773" instrument_node="">f497. . How would the guidance function of the school</span><br data-dcnode-id="2772"><span data-dcnode-id="2771" instrument_node="">make use of test results?</span><br data-dcnode-id="2770"><span data-dcnode-id="2769" instrument_node="">A. Preparing guiding activities for specific learners</span><br data-dcnode-id="2768"><span data-dcnode-id="2767" instrument_node="">B. Determining the appropriateness of the school</span><br data-dcnode-id="2766"><span data-dcnode-id="2765" instrument_node="">curriculum</span><br data-dcnode-id="2764"><span data-dcnode-id="2763" instrument_node="">C. Identifying learners who need corrective and</span><br data-dcnode-id="2762"><span data-dcnode-id="2761" instrument_node="">enrichment experiences</span><br data-dcnode-id="2760"><span data-dcnode-id="2759" instrument_node="">D. Improving the teachers' and the parents'</span><br data-dcnode-id="2758"><span data-dcnode-id="2757" instrument_node="">understanding of children with</span><br data-dcnode-id="2756"><span data-dcnode-id="2755" instrument_node="">problems</span><br data-dcnode-id="2754"><span data-dcnode-id="2753" instrument_node="">fAnswer #498-502.</span><br data-dcnode-id="2752"><span data-dcnode-id="2751" instrument_node="">Below is a result of an item analysis of a multiple choice test of</span><br data-dcnode-id="2750"><span data-dcnode-id="2749" instrument_node="">four (4) options - A, B, 1, D and the number of students out of</span><br data-dcnode-id="2748"><span data-dcnode-id="2747" instrument_node="">100 who chose the item. B is the correct answer.</span><br data-dcnode-id="2746"><span data-dcnode-id="2745" instrument_node="">* Correct answer</span><br data-dcnode-id="2744"><span data-dcnode-id="2743" instrument_node="">               Item Option Option Option Option</span><br data-dcnode-id="2742"><span data-dcnode-id="2741" instrument_node="">                      A      B      C      D</span><p data-dcnode-id="2740"></p><p data-dcnode-id="2698"><span data-dcnode-id="2739" instrument_node="">                 1      50     20*       0      30</span><br data-dcnode-id="2738"><span data-dcnode-id="2737" instrument_node="">f498. Interpret the item analysis.</span><br data-dcnode-id="2736"><span data-dcnode-id="2735" instrument_node="">A. More than 20% got Item 1</span><br data-dcnode-id="2734"><span data-dcnode-id="2733" instrument_node="">correctly.</span><br data-dcnode-id="2732"><span data-dcnode-id="2731" instrument_node="">B. Only 20% got the item correctly.</span><br data-dcnode-id="2730"><span data-dcnode-id="2729" instrument_node="">C. The options are plausible.</span><br data-dcnode-id="2728"><span data-dcnode-id="2727" instrument_node="">D. It is an easy test item.</span><br data-dcnode-id="2726"><span data-dcnode-id="2725" instrument_node="">f499. Which is TRUE of the test result?</span><br data-dcnode-id="2724"><span data-dcnode-id="2723" instrument_node="">A. The % of those who got the item correctly</span><br data-dcnode-id="2722"><span data-dcnode-id="2721" instrument_node="">suggests reteaching.</span><br data-dcnode-id="2720"><span data-dcnode-id="2719" instrument_node="">B. If 50% is set as mastery level, the item was</span><br data-dcnode-id="2718"><span data-dcnode-id="2717" instrument_node="">mastered.</span><br data-dcnode-id="2716"><span data-dcnode-id="2715" instrument_node="">C. The % of those who got the item correctly is</span><br data-dcnode-id="2714"><span data-dcnode-id="2713" instrument_node="">high.</span><br data-dcnode-id="2712"><span data-dcnode-id="2711" instrument_node="">D. The item must have been easy.</span><br data-dcnode-id="2710"><span data-dcnode-id="2709" instrument_node="">f500. What should be done to improve the test</span><br data-dcnode-id="2708"><span data-dcnode-id="2707" instrument_node="">item?</span><br data-dcnode-id="2706"><span data-dcnode-id="2705" instrument_node="">A. No need to improve the test item.</span><br data-dcnode-id="2704"><span data-dcnode-id="2703" instrument_node="">B. Change option C with a more plausible option.</span><br data-dcnode-id="2702"><span data-dcnode-id="2701" instrument_node="">C. Make it a more difficult item.</span><br data-dcnode-id="2700"><span data-dcnode-id="2699" instrument_node="">D. Increase the number of options to 5.</span></p><p data-dcnode-id="2680"><span data-dcnode-id="2697" instrument_node="">.</span><br data-dcnode-id="2696"><span data-dcnode-id="2695" instrument_node="">f501. What can be said of Options A and</span><br data-dcnode-id="2694"><span data-dcnode-id="2693" instrument_node="">D?</span><br data-dcnode-id="2692"><span data-dcnode-id="2691" instrument_node="">A. They are implausible options.</span><br data-dcnode-id="2690"><span data-dcnode-id="2689" instrument_node="">B. They are equally effective distracters.</span><br data-dcnode-id="2688"><span data-dcnode-id="2687" instrument_node="">C. They are plausible options.</span><br data-dcnode-id="2686"><span data-dcnode-id="2685" instrument_node="">D. Option D is a more effective distracter</span><br data-dcnode-id="2684"><span data-dcnode-id="2683" instrument_node="">than Option A.</span><br data-dcnode-id="2682"><span data-dcnode-id="2681" instrument_node="">f502. What is the index of facility of the test item?</span></p><p data-dcnode-id="2642"><span data-dcnode-id="2679" instrument_node="">A. .50</span><br data-dcnode-id="2678"><span data-dcnode-id="2677" instrument_node="">B. .20</span><br data-dcnode-id="2676"><span data-dcnode-id="2675" instrument_node="">C. -.20</span><br data-dcnode-id="2674"><span data-dcnode-id="2673" instrument_node="">D. .30</span><br data-dcnode-id="2672"><span data-dcnode-id="2671" instrument_node="">f503. . Your niece comes home and tells you she deserves a</span><br data-dcnode-id="2670"><span data-dcnode-id="2669" instrument_node="">blow out because she got 9 in a test. What other</span><br data-dcnode-id="2668"><span data-dcnode-id="2667" instrument_node="">information should you ask before you give her a blow out?</ "><span data-dcnode-id="1875" instrument_node="">work - 60/80; performance task - 60/80;</span><br data-dcnode-id="1874"><span data-dcnode-id="1873" instrument_node="">and quarterly test - 40/50. What will be</span><br data-dcnode-id="1872"><span data-dcnode-id="1871" instrument_node="">her weighted score?</span><br data-dcnode-id="1870"><span data-dcnode-id="1869" instrument_node="">A. 76.25 C. 75</span><br data-dcnode-id="1868"><span data-dcnode-id="1867" instrument_node="">B. 80 D. 85</span><br data-dcnode-id="1866"><span data-dcnode-id="1865" instrument_node="">f549. If Bing's weighted score of 76.25</span><br data-dcnode-id="1864"><span data-dcnode-id="1863" instrument_node="">is equivalent to a grade of 85 in the</span><br data-dcnode-id="1862"><span data-dcnode-id="1861" instrument_node="">Report Card, what will be her</span><br data-dcnode-id="1860"><span data-dcnode-id="1859" instrument_node="">descriptive grade?</span><br data-dcnode-id="1858"><span data-dcnode-id="1857" instrument_node="">A. Satisfactory C. Very satisfactory</span><br data-dcnode-id="1856"><span data-dcnode-id="1855" instrument_node="">B. Excellent D. Fairly satisfactory</span><br data-dcnode-id="1854"><span data-dcnode-id="1853" instrument_node="">f550. Are the core values - maka-Diyos, maka-</span><br data-dcnode-id="1852"><span data-dcnode-id="1851" instrument_node="">tao, maka-kalikasan and maka-bansa -</span><br data-dcnode-id="1850"><span data-dcnode-id="1849" instrument_node="">graded in the Report Card?</span><br data-dcnode-id="1848"><span data-dcnode-id="1847" instrument_node="">A. No.</span><br data-dcnode-id="1846"><span data-dcnode-id="1845" instrument_node="">B. Yes, by the use of non-numerical rating</span><br data-dcnode-id="1844"><span data-dcnode-id="1843" instrument_node="">scale.</span><br data-dcnode-id="1842"><span data-dcnode-id="1841" instrument_node="">C. Only the last two- maka-kalikasan and maka-</span><br data-dcnode-id="1840"><span data-dcnode-id="1839" instrument_node="">bansa.</span><br data-dcnode-id="1838"><span data-dcnode-id="1837" instrument_node="">D. Only the core values agreed upon by the</span><br data-dcnode-id="1836"><span data-dcnode-id="1835" instrument_node="">school.</span><br data-dcnode-id="1834"><span data-dcnode-id="1833" instrument_node="">f551. When is a learner retained in</span><br data-dcnode-id="1832"><span data-dcnode-id="1831" instrument_node="">the same grade level? When he</span><br data-dcnode-id="1830"><span data-dcnode-id="1829" instrument_node="">doesn't meet</span><br data-dcnode-id="1828"><span data-dcnode-id="1827" instrument_node="">expectations in subject/s.</span><br data-dcnode-id="1826"><span data-dcnode-id="1825" instrument_node="">A. one     C. three</span><br data-dcnode-id="1824"><span data-dcnode-id="1823" instrument_node="">B. two     D. four</span><br data-dcnode-id="1822"><span data-dcnode-id="1821" instrument_node="">f552. What happens if a learner fails in two subjects?</span><br data-dcnode-id="1820"><span data-dcnode-id="1819" instrument_node="">A. He gets promoted on condition that he goes through a</span><br data-dcnode-id="1818"><span data-dcnode-id="1817" instrument_node="">remedial class and</span><br data-dcnode-id="1816"><span data-dcnode-id="1815" instrument_node="">finally gets at least a grade of 75.</span><br data-dcnode-id="1814"><span data-dcnode-id="1813" instrument_node="">B. He gets promoted on condition that he goes through a</span><br data-dcnode-id="1812"><span data-dcnode-id="1811" instrument_node="">remedial class and</span><br data-dcnode-id="1810"><span data-dcnode-id="1809" instrument_node="">finally gets an average of 75 with his last failing grade.</span><br data-dcnode-id="1808"><span data-dcnode-id="1807" instrument_node="">C. He does not get promoted.</span><br data-dcnode-id="1806"><span data-dcnode-id="1805" instrument_node="">D. He gets promoted on condition that he goes through a</span><br data-dcnode-id="1804"><span data-dcnode-id="1
