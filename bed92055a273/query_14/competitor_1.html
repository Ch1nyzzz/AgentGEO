</span><div class="mainwrap two_col_b" data-dcnode-id="483" id="mainwrap"><span data-dcnode-id="796" instrument_node="">
</span><div class="body-container" data-dcnode-id="501"><span data-dcnode-id="795" instrument_node="">
</span><main class="content" data-dcnode-id="555" id="ctcol"><span data-dcnode-id="794" instrument_node="">
</span><input data-dcnode-id="793" id="needPrintVersion" type="hidden" value="true"><span data-dcnode-id="792" instrument_node="">
</span><h1 data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Civic Engagement</span></h1><span data-dcnode-id="789" instrument_node="">
</span><div class="article-body" data-dcnode-id="781"><span data-dcnode-id="788" instrument_node="">
</span><div class="forceimagewrap" data-dcnode-id="783"><span data-dcnode-id="787" instrument_node="">
</span><div class="wysiwyg lengthy" data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">The term “civic engagement” is not commonly used among psychologists, yet the focus on work for the common good is central to most of the divisions of APA. This section demonstrates ways that psychologists support civic engagement and invites the reader to consider other possible examples.</span></div><span data-dcnode-id="784" instrument_node="">
</span></div><span data-dcnode-id="782" instrument_node="">
</span></div><span data-dcnode-id="780" instrument_node="">
</span><div class="article-body" data-dcnode-id="764"><span data-dcnode-id="779" instrument_node="">
</span><h2 data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Definition of Civic Engagement</span></h2><span data-dcnode-id="776" instrument_node=""> </span><div class="forceimagewrap" data-dcnode-id="766"><span data-dcnode-id="775" instrument_node="">
</span><div class="wysiwyg lengthy" data-dcnode-id="768"><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Service-learning and civic engagement are not the same thing in the sense that not all service-learning has a civic dimension and not all civic engagement is service-learning. For definition’s sake, civic engagement is the broader motif, encompassing service-learning but not limited to it. One useful definition of civic engagement is the following: individual and collective actions designed to identify and address issues of public concern. Civic engagement can take many forms, from individual voluntarism to organizational involvement to electoral participation. It can include efforts to directly address an issue, work with others in a community to solve a problem or interact with the institutions of representative democracy. Civic engagement encompasses a range of specific activities such as working in a soup kitchen, serving on a neighborhood association, writing a letter to an elected official or voting. Indeed, an underlying principal of our approach is that an engaged citizen should have the ability, agency and opportunity to move comfortably among these various types of civic acts.</span></p><span data-dcnode-id="771" instrument_node="">
</span><h6 data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Source: Michael Delli Carpini, Director, Public Policy, The Pew Charitable Trusts.</span></h6></div><span data-dcnode-id="767" instrument_node="">
</span></div><span data-dcnode-id="765" instrument_node="">
</span></div><span data-dcnode-id="763" instrument_node="">
</span><div class="article-body" data-dcnode-id="727"><span data-dcnode-id="762" instrument_node="">
</span><h2 data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Resources for Civic Engagement</span></h2><span data-dcnode-id="759" instrument_node=""> </span><div class="forceimagewrap" data-dcnode-id="729"><span data-dcnode-id="758" instrument_node="">
</span><div class="wysiwyg lengthy" data-dcnode-id="731"><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="756" instrument_node="">
</span><em data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Civic Engagement Across the Curriculum</span></em><span data-dcnode-id="753" instrument_node=""> (2002) is a resource book written by Rick Battistoni and published by the Campus Compact. The book presents frameworks for defining good citizenship and addresses the practical skills of engaged citizenship. The author provides an appendix of assignments and exercises that can be adapted to a variety of courses.</span></p><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="747"><em data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Civic Responsibility and Higher Education</span></em><span data-dcnode-id="748" instrument_node=""> (2000) edited by Thomas Ehrlich presents essays from national leaders who have focused on civic responsibility and higher education.</span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="742"><a data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.compact.org/community-colleges/indicators/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="745" instrument_node="">The Indicators of Engagement Project</span></a><span data-dcnode-id="743" instrument_node=""> is a grant project to document and disseminate best practices of civic engagement on college campuses.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="737"><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mc.maricopa.edu/other/engagement/Journal/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="740" instrument_node="">The Journal for Civic Commitment</span></a><span data-dcnode-id="738" instrument_node=""> is focused on providing discussion and practical ideas for connecting service-learning and civic engagement.</span></p><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="732"><a data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.josseybass.com/WileyCDA/WileyTitle/productCd-0787971189.html" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="735" instrument_node="">Educating Citizens: Preparing America's Undergraduates for Lives of Moral and Civic Responsibility (2003)</span></a><span data-dcnode-id="733" instrument_node=""> by Anne Colby, Thomas Ehrlich, Elizabeth Beamont, and Jason Stephens describes how a variety of institutions are effectively preparing socially responsible graduates.</span></p></div><span data-dcnode-id="730" instrument_node="">
</span></div><span data-dcnode-id="728" instrument_node="">
</span></div><span data-dcnode-id="726" instrument_node="">
</span><div class="article-body" data-dcnode-id="639"><span data-dcnode-id="725" instrument_node="">
</span><h2 data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">APA Divisions with a Role in Civic Engagement</span></h2><span data-dcnode-id="722" instrument_node=""> </span><div class="forceimagewrap" data-dcnode-id="641"><span data-dcnode-id="721" instrument_node="">
</span><div class="wysiwyg lengthy" data-dcnode-id="643"><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Civic engagement is at the forefront of many APA initiatives. Psychologists and psychology educators are leading efforts to address serious societal concerns. Their work can be found in many settings addressing a broad cross section of society. Below are some examples of the work conducted through APA, its members and the people who are served.</span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="717" instrument_node="">Division 9&nbsp;— </span><a data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apa.org/about/division/div9" title="div9"><span data-dcnode-id="716" instrument_node="">Society for the Psychological Study of Social Issues (SPSSI)</span></a><span data-dcnode-id="714" instrument_node=""> welcomes psychologists and allied social scientists who share a common concern with research on psychological aspects of important social issues and social subjects to bring theory and practice into focus on human problems of the group, the community, and the nation, and the increasingly important problems that have no national boundaries. SPSSI has been represented as a Non-Governmental Organization (NGO) at the United Nations since 1987 and has held consultative status with the UN's Economic and Social Council since 1991.</span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="711" instrument_node="">Division 16&nbsp;— </span><a data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apa.org/about/division/div16" title="div16"><span data-dcnode-id="710" instrument_node="">School Psychology</span></a><span data-dcnode-id="708" instrument_node=""> is composed of scientific-practitioner psychologists whose major professional interests lie with children, families, and the schooling process. The Division represents the interests of psychologists engaged in the delivery of comprehensive psychological services to children, adolescents, and families in schools and other applied settings. The Division is dedicated to facilitating the professional practice of school psychology and actively advocates in domains, such as education and health care reform, which have significant implications for the practice of psychology with children.</span></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="705" instrument_node="">Division 17&nbsp;— </span><a data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apa.org/about/division/div17" target="_blank" title="div17"><span data-dcnode-id="704" instrument_node="">Counseling Psychology</span></a><span data-dcnode-id="702" instrument_node=""> brings together psychologists, students and professional affiliates who are dedicated to promoting education and training, scientific investigation, practice, and diversity and public interest in professional psychology. The division is involved with response to disaster and trauma.</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="699" instrument_node="">Division 18&nbsp;— </span><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apa.org/about/division/div18" title="div18"><span data-dcnode-id="698" instrument_node="">Psychologists in Public Service</span></a><span data-dcnode-id="696" instrument_node=""> responds to the needs of the public in areas such as psychological practice, research, training, and policy formation. The Division is comprised of five sections representing a variety of settings: Community and State Hospital Psychologists, Criminal Justice, Police and Public Safety, Program Evaluation, and Veterans Affairs (VA) Psychologists. Federal advocacy is taking place on a number of fronts of interest to public affairs.</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="693" instrument_node="">Division 27&nbsp;— </span><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apa.org/about/division/div27" title="div27"><span data-dcnode-id="692" instrument_node="">Society for Community Research and Action: Division of Community Psychology</span></a><span data-dcnode-id="690" instrument_node=""> encourages the development of theory, research, and practice relevant to the reciprocal relationships between individuals and the social system which constitute the community context.</span></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="687" instrument_node="">Division 35&nbsp;— </span><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apa.org/about/division/div35" title="div35"><span data-dcnode-id="686" instrument_node="">Society for the Psychology of Women</span></a><span data-dcnode-id="684" instrument_node=""> </span><a data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apa.org/about/division/div35" title="div35"></a><span data-dcnode-id="681" instrument_node="">provides an organizational base for all feminists, women and men of all national origins, who are interested in teaching, research, or practice in the psychology of women. The division recognizes a diversity of women's experiences which result from a variety of factors, including ethnicity, culture, language, socioeconomic status, age and sexual orientation.</span></p><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="678" instrument_node="">Division 37&nbsp;— </span><a data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apa.org/about/division/div37" title="div37"><span data-dcnode-id="677" instrument_node="">Child, Youth, and Family Services</span></a><span data-dcnode-id="675" instrument_node=""> is concerned with professional and scientific issues relative to services and service structures for children and youth. The Division seeks to advance research, education, training, and practice and relate psychological knowledge to other fields such as anthropology, law and pediatrics in such areas as employment, education, recreation and family planning. The division is interested in the areas of child maltreatment.</span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="672" instrument_node="">Division 45&nbsp;— </span><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apa.org/about/division/div45" title="div45"><span data-dcnode-id="671" instrument_node="">Society for the Psychological Study of Culture, Ethnicity and Race</span></a><span data-dcnode-id="669" instrument_node="">&nbsp;encourages research on ethnic minority issues and the application of psychological knowledge to ethnic minority issues. The Division promotes public welfare through research and encourages professional relationships among psychologists who share these concerns and interests. Training tapes are available which discuss working with members of diverse communities.</span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="666" instrument_node="">Division 48&nbsp;— </span><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apa.org/about/division/div48" title="div48"><span data-dcnode-id="665" instrument_node="">Society for the Study of Peace, Conflict &amp; Violence: Peace Psychology Division</span></a><span data-dcnode-id="663" instrument_node=""> works to promote peace in the world at large and within nations, communities, and families. It encourages psychological and multidisciplinary research, education and training on issues concerning peace, nonviolent resolution, reconciliation and the causes, consequences and prevention of violence and destructive conflict. The division has a statement on recent terrorist events.</span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="660" instrument_node="">Division 51&nbsp;— </span><a data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apa.org/about/division/div51" title="div51"><span data-dcnode-id="659" instrument_node="">The Society for the Psychological Study of Men and Masculinities</span></a><span data-dcnode-id="657" instrument_node="">&nbsp;advances knowledge in the new psychology of men through research, education, training, public policy and improved clinical services for men. SPSMM provides a forum for members to discuss the critical issues facing men of all races, classes, ethnicities, sexual orientations and nationalities. Members have conducted research in the area of spousal abuse.</span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="654" instrument_node="">Division 53&nbsp;— </span><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.clinicalchildpsychology.org/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="653" instrument_node="">Society of Clinical Child and Adolescent Psychology</span></a><span data-dcnode-id="651" instrument_node=""> represents psychologists who are active in teaching, research, clinical services, administration and advocacy in clinical child psychology to the APA and the public. The division provides valuable information concerning talking with children about disasters and trauma.</span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="648" instrument_node="">Division 55&nbsp;— </span><a data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apa.org/about/division/div55" title="div55"><span data-dcnode-id="647" instrument_node="">American Society for the Advancement of Pharmacotherapy (ASAP)</span></a><span data-dcnode-id="645" instrument_node="">, Division 55, was created to enhance psychological treatments combined with psychopharmacological medications. It promotes the public interest by working for the establishment of high quality statutory and regulatory standards for psychological care. The Division encourages the collaborative practice of psychological and pharmacological treatments with other health professions. The division has developed a statement on the effectiveness of psychologists prescribing medications.</span></p></div><span data-dcnode-id="642" instrument_node="">
