</span><section data-dcnode-id="1940" data-gtm-vis-first-on-screen-50443292_562="861" data-gtm-vis-first-on-screen-50443292_563="861" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="861" data-gtm-vis-recent-on-screen-50443292_563="861" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="1941" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1977" id="Sec1"><span data-dcnode-id="1978" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="1942" id="Sec1-content"><p data-dcnode-id="1957"><span data-dcnode-id="1976" instrument_node="">Young people the world over can be regarded as assets, rather than the liabilities they are often labelled in deficit-based research (Lerner, Alberts, Jelicic, &amp; Smith, </span><a aria-label="Reference 2006" data-dcnode-id="1974" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d23967445e385" title="Lerner, R. M., Alberts, A. E., Jelicic, H., &amp; Smith L. M. (2006). Young people are resources to be developed: Promoting positive youth development through adult-youth relations and community assets. In E. Gil Clary, &amp; J. E. Rhodes (Eds.), Mobilizing adults for positive youth development. The Search Institute series on developmentally attentive community and society, vol 4 (pp. 19–39). Springer. 
              https://doi.org/10.1007/0-387-29340-X_2
              
            "><span data-dcnode-id="1975" instrument_node="">2006</span></a><span data-dcnode-id="1973" instrument_node="">; Such &amp; Walker, </span><a aria-label="Reference 2005" data-dcnode-id="1971" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d23967445e388" title="Such, E., &amp; Walker, R. (2005). Young citizens or policy objects? Children in the ‘rights and responsibilities’ debate. Journal of Social Policy, 34(1), 39–57. 
              https://doi.org/10.1017/S0047279404008256
              
            "><span data-dcnode-id="1972" instrument_node="">2005</span></a><span data-dcnode-id="1970" instrument_node="">). The shrinking segment of the working population in Western countries and the relatively low life expectancy in developing countries call on the global youth population to take on active roles in their communities. Hence, young people can be potential contributors to local, national, and even global affairs. However, they will need to be prepared to be able to engage in these affairs (Lerner, </span><a aria-label="Reference 2020" data-dcnode-id="1968" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d23967445e391" title="Lerner, R. (2020). A roadmap for youth thriving: A Commentary on the Arnold and Gagnon vision for positive youth development. Journal of Youth Development, 15(6), 147–161. 
              https://doi.org/10.5195/jyd.2020.1056
              
            "><span data-dcnode-id="1969" instrument_node="">2020</span></a><span data-dcnode-id="1967" instrument_node="">; Pittman, </span><a aria-label="Reference 1999" data-dcnode-id="1965" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d23967445e394" title="Pittman, K. (1999). Youth today: The power of engagement. Forum for Youth Investment. Retrieved from 
              www.forumforyouthinvestment.org
              
            "><span data-dcnode-id="1966" instrument_node="">1999</span></a><span data-dcnode-id="1964" instrument_node="">). Within the Positive Youth Development (PYD) framework (Lerner et al., </span><a aria-label="Reference 2006" data-dcnode-id="1962" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d23967445e402" title="Lerner, R. M., Alberts, A. E., Jelicic, H., &amp; Smith L. M. (2006). Young people are resources to be developed: Promoting positive youth development through adult-youth relations and community assets. In E. Gil Clary, &amp; J. E. Rhodes (Eds.), Mobilizing adults for positive youth development. The Search Institute series on developmentally attentive community and society, vol 4 (pp. 19–39). Springer. 
              https://doi.org/10.1007/0-387-29340-X_2
              
            "><span data-dcnode-id="1963" instrument_node="">2006</span></a><span data-dcnode-id="1961" instrument_node="">), preparing young people entails enabling them to thrive. Thriving means that in interaction with their settings, young people show healthy levels of Competence (in academic, social, and vocational skills), Confidence (have a sense of mastery and future, positive identity), Character (show moral commitment and respect for societal and cultural rules), Connection (have healthy relation to friends, family, school, and community), and Caring (show empathy and sympathy), the so-called 5Cs of PYD. Contribution, often referred to as the sixth “C,” is a function of the 5Cs. Accordingly, young people can collaborate and contribute to civic development when they are thriving (Lerner et al., </span><a aria-label="Reference 2005" data-dcnode-id="1959" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d23967445e421" title="Lerner, R. M., Lerner, J. V., Almerigi, J. B., Theokas, C., Phelps, E., Gestsdottir, S., Naudeau, S., Jelicic, H., Alberts, A., Ma, L., Smith, L. M., Bobek, D. L., Richman-Raphael, D., Simpson, I., Christiansen, E. D., &amp; von Eye, A. (2005). Positive youth development, participation in community youth development programs, and community contributions of fifth-grade adolescents: Findings from the first wave of the 4-H study of Positive Youth Development. The Journal of Early Adolescence, 25(1), 17–71. 
              https://doi.org/10.1177/0272431604272461
              
            "><span data-dcnode-id="1960" instrument_node="">2005</span></a><span data-dcnode-id="1958" instrument_node="">).</span></p><p data-dcnode-id="1943"><span data-dcnode-id="1956" instrument_node="">As one of the five indicators of thriving, Character is perceived as an essential virtue that may determine the development of other thriving indicators or Cs of PYD (Lerner, </span><a aria-label="Reference 2018a" data-dcnode-id="1954" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d23967445e435" title="Lerner, R. M. (2018a). Character development among youth: Linking lives in time and place. International Journal of Behavioral Development, 42(2), 267–277. 
              https://doi.org/10.1177/0165025417711057
              
            "><span data-dcnode-id="1955" instrument_node="">2018a</span></a><span data-dcnode-id="1953" instrument_node="">). The present chapter explores the role of Character and its association with contribution to local, community, and global affairs (helping peers or neighbors, engaging in community and environmental sustainability activities) and reflects on how promoting Character may lead to the fostering of anti-racism and, consequently, effective collaboration among diverse youth. In the chapter, the different forms of contribution are collectively referred to as civic engagement. Individuals with character strengths are often open to others, tend to embrace cultural differences (Fowers &amp; Davidov, </span><a aria-label="Reference 2006" data-dcnode-id="1951" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d23967445e447" title="Fowers, B. J., &amp; Davidov, B. J. (2006). The virtue of multiculturalism: Personal transformation, character, and openness to the other. American Psychologist, 61(6), 581–594. 
              https://doi.org/10.1037/0003-066X.61.6.581
              
            "><span data-dcnode-id="1952" instrument_node="">2006</span></a><span data-dcnode-id="1950" instrument_node="">), and are more likely to collaborate and contribute to civic development (Oosterhoff et al., </span><a aria-label="Reference 2019" data-dcnode-id="1948" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d23967445e450" title="Oosterhoff, B., Whillock, S., Sanders, C., &amp; Poppler, A. (2019, October). Longitudinal associations between character strengths and civic action: A daily diary study. Retrieved from 
              psyarxiv.com/jmf9s/
              
            "><span data-dcnode-id="1949" instrument_node="">2019</span></a><span data-dcnode-id="1947" instrument_node="">). In the ensuing sections of the chapter, Character as a virtue is described, and its link with interpersonal competence, </span><i data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">anti</span></i><span data-dcnode-id="1944" instrument_node="">-racism, and civic engagement is briefly reviewed. Next, an empirical research on the importance of Character in relation to civic engagement at the local, community, and global levels is outlined, and finally the chapter closes with a discussion of the findings on how various facets of Character, including diversity values, can be applied by youth from diverse backgrounds to circumvent the setbacks of prejudice, discrimination, and racism and work together toward the welfare of the society.</span></p></div></div></section><section data-dcnode-id="1887" data-gtm-vis-first-on-screen-50443292_562="861" data-gtm-vis-first-on-screen-50443292_563="861" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="861" data-gtm-vis-recent-on-screen-50443292_563="861" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="The Virtue of Character"><div class="c-article-section" data-dcnode-id="1888" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1938" id="Sec2"><span data-dcnode-id="1939" instrument_node="">The Virtue of Character</span></h2><div class="c-article-section__content" data-dcnode-id="1889" id="Sec2-content"><p data-dcnode-id="1912"><span data-dcnode-id="1937" instrument_node="">Character, as a virtue, has been a topic of interest in several fields, including social and behavioral science, where its protective and promotive roles on personal development and interpersonal relations are highlighted (Berkowitz, </span><a aria-label="Reference 2011" data-dcnode-id="1935" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d23967445e468" title="Berkowitz, M. W. (2011). What works in values education. International Journal of Educational Research, 50, 153–158. 
              https://doi.org/10.1016/j.ijer.2011.07.003
              
            "><span data-dcnode-id="1936" instrument_node="">2011</span></a><span data-dcnode-id="1934" instrument_node="">; Cohen &amp; Morse, </span><a aria-label="Reference 2014" data-dcnode-id="1932" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d23967445e471" title="Cohen, T. R., &amp; Morse, L. (2014). Moral character: What it is and what it does. Research in Organizational Behavior, 34, 43–61. 
              https://doi.org/10.1016/j.riob.2014.08.003
              
            "><span data-dcnode-id="1933" instrument_node="">2014</span></a><span data-dcnode-id="1931" instrument_node="">; Lerner, </span><a aria-label="Reference 2018a" data-dcnode-id="1929" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d23967445e474" title="Lerner, R. M. (2018a). Character development among youth: Linking lives in time and place. International Journal of Behavioral Development, 42(2), 267–277. 
              https://doi.org/10.1177/0165025417711057
              
            "><span data-dcnode-id="1930" instrument_node="">2018a</span></a><span data-dcnode-id="1928" instrument_node="">). It has also received much attention in philosophy, religion, and education, due to its contribution to self-realization and the creation and maintenance of a functioning social system (Park, </span><a aria-label="Reference 2004" data-dcnode-id="1926" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d23967445e477" title="Park, N. (2004). Character strengths and positive youth development. The Annals of the American Academy of Political and Social Science, 591(1), 40–54. 
              https://doi.org/10.1177/0002716203260079
              
            "><span data-dcnode-id="1927" instrument_node="">2004</span></a><span data-dcnode-id="1925" instrument_node="">; Wren, </span><a aria-label="Reference 2008" data-dcnode-id="1923" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d23967445e480" title="Wren, T. (2008). Philosophical Moorings. In L. P. Nucci &amp; D. Narvaez (Eds.), Handbook of moral and character education (pp. 11–29). Routledge."><span data-dcnode-id="1924" instrument_node="">2008</span></a><span data-dcnode-id="1922" instrument_node="">). Not only has the moral importance of character strengths been emphasized in philosophy, but religion in general has encouraged the cultivation of these strengths (Littman-Ovadia &amp; David, </span><a aria-label="Reference 2020" data-dcnode-id="1920" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d23967445e484" title="Littman-Ovadia, H., &amp; David, A. (2020). Character strengths as manifestations of spiritual life: Realizing the non-dual from the dual. Frontiers in Psychology, 11, 960. 
              https://doi.org/10.3389/fpsyg.2020.00960
              
            "><span data-dcnode-id="1921" instrument_node="">2020</span></a><span data-dcnode-id="1919" instrument_node="">). In education, character strengths are valued positive traits and often considered as the bedrock of optimal functioning and well-being (Lavy, </span><a aria-label="Reference 2020" data-dcnode-id="1917" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d23967445e492" title="Lavy, S. A. (2020). A review of character strengths interventions in Twenty-First-Century schools: Their importance and how they can be fostered. Applied Research Quality Life, 15, 573–596. 
              https://doi.org/10.1007/s11482-018-9700-6
              
            "><span data-dcnode-id="1918" instrument_node="">2020</span></a><span data-dcnode-id="1916" instrument_node="">). Thus, these strengths are perceived as desirable educational outcomes and closely related to intrapersonal and interpersonal competencies essential for thriving in contemporary life and work (Lavy, </span><a aria-label="Reference 2020" data-dcnode-id="1914" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d23967445e495" title="Lavy, S. A. (2020). A review of character strengths interventions in Twenty-First-Century schools: Their importance and how they can be fostered. Applied Research Quality Life, 15, 573–596. 
              https://doi.org/10.1007/s11482-018-9700-6
              
            "><span data-dcnode-id="1915" instrument_node="">2020</span></a><span data-dcnode-id="1913" instrument_node="">). In his speech at Morehouse College in 1948, Martin Luther King Jr. reiterated the value of character when he made the following statement: “We must remember that intelligence is not enough. Intelligence plus character–that is the goal of true education.”</span></p><p data-dcnode-id="1901"><span data-dcnode-id="1911" instrument_node="">In the literature, Character is often depicted as a family of positive traits that reflect the individual’s thoughts, feelings, and behaviors. Adapting a Relational Developmental Systems view, Lerner (</span><a aria-label="Reference 2018b" data-dcnode-id="1909" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d23967445e506" title="Lerner, R. M. (2018b). Character development: Four facets of virtues. Child Development Perspectives, 13, 79–84. 
              https://doi.org/10.1111/cdep.12315
              
            "><span data-dcnode-id="1910" instrument_node="">2018b</span></a><span data-dcnode-id="1908" instrument_node="">) described Character as morally based actions that empower an individual and the contexts they interact with to thrive across time and place, suggesting that character strengths can help foster a harmonic and cohesive multicultural society. Within Positive Psychology, Martin Seligman and colleagues (Peterson &amp; Seligman, </span><a aria-label="Reference 2004" data-dcnode-id="1906" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d23967445e509" title="Peterson, C., &amp; Seligman, M. E. P. (2004). Character strengths and virtues: A handbook and classification. American Psychological Association/Oxford University Press."><span data-dcnode-id="1907" instrument_node="">2004</span></a><span data-dcnode-id="1905" instrument_node="">; Seligman et al., </span><a aria-label="Reference 2009" data-dcnode-id="1903" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d23967445e512" title="Seligman, M. E., Ernst, R. M., Gillham, J., Reivich, K., &amp; Linkins, M. (2009). Positive education: Positive psychology and classroom interventions. Oxford Review of Education, 35(3), 293–311. 
              https://doi.org/10.1080/03054980902934563
              
            "><span data-dcnode-id="1904" instrument_node="">2009</span></a><span data-dcnode-id="1902" instrument_node="">) have extensively studied the concept of character and have proposed 6 classes of virtues that reflect 24 character strengths. These classes of virtues along with samples of associated character strengths in parenthesis include (1) wisdom and knowledge

 (curiosity, open-mindedness), (2) courage (bravery, integrity), (3) humanity (love, kindness), (4) justice (fairness, leadership), (5) temperance (humility, prudence), and (6) transcendence (gratitude, hope). Together, these are virtues that can empower individuals to achieve and maintain optimal levels of well-being for themselves and the people they interact with.</span></p><p data-dcnode-id="1890"><span data-dcnode-id="1900" instrument_node="">In the related but different field of PYD, Character as one of 5Cs of PYD emerges as young people engage in an adaptive developmental regulation with youth contexts (e.g., home, school, and local community; Lerner &amp; Schmid Callina, </span><a aria-label="Reference 2014" data-dcnode-id="1898" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d23967445e557" title="Lerner, R. M., &amp; Schmid Callina, K. (2014). The study of character development: Towards tests of a relational developmental systems model. Human Development, 57(6), 1–25. 
              https://doi.org/10.1159/000368784
              
            "><span data-dcnode-id="1899" instrument_node="">2014</span></a><span data-dcnode-id="1897" instrument_node="">; Wang et al., </span><a aria-label="Reference 2016" data-dcnode-id="1895" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d23967445e560" title="Wang, J., Batanova, M., Ferris, K. A., &amp; Lerner, R. M. (2016). Character development within the relational developmental systems metatheory: A view of the issues. Research in Human Development, 13(2), 91–96. 
              https://doi.org/10.1080/15427609.2016.1165932
              
            "><span data-dcnode-id="1896" instrument_node="">2016</span></a><span data-dcnode-id="1894" instrument_node="">). In fact, Lerner (</span><a aria-label="Reference 2018a" data-dcnode-id="1892" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d23967445e563" title="Lerner, R. M. (2018a). Character development among youth: Linking lives in time and place. International Journal of Behavioral Development, 42(2), 267–277. 
              https://doi.org/10.1177/0165025417711057
              
            "><span data-dcnode-id="1893" instrument_node="">2018a</span></a><span data-dcnode-id="1891" instrument_node="">) argued that Character development may not only be the foundation on which the other thriving indicators (the Cs of PYD) are built but may also be the virtue that empowers the individual to engage in self and societal development. The PYD framework describes four facets of Character, namely, behavioral conduct (acting the way one is supposed to), social conscience (helping make the world a better place to live and donating to help people), personal values (doing the right thing even when difficult and taking responsibility for actions), and diversity values (knowing about and enjoying being with people from other cultures). In the empirical study that is later described, the significance of the four interrelated facets of Character on civic engagement in a Norwegian youth sample is considered.</span></p></div></div></section><section data-dcnode-id="1823" data-gtm-vis-first-on-screen-50443292_562="861" data-gtm-vis-first-on-screen-50443292_563="862" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="861" data-gtm-vis-recent-on-screen-50443292_563="862" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Character, Interpersonal Competence, Anti-racism, and Civic Engagement"><div class="c-article-section" data-dcnode-id="1824" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1885" id="Sec3"><span data-dcnode-id="1886" instrument_node="">Character, Interpersonal Competence, Anti-racism, and Civic Engagement</span></h2><div class="c-article-section__content" data-dcnode-id="1825" id="Sec3-content"><p data-dcnode-id="1880"><span data-dcnode-id="1884" instrument_node="">Owing to contemporary trends, such as globalization and increasing migration, the society is becoming progressively multicultural, which implies that people from diverse races, cultures, and ethnicities are having to live side by side in virtually all societies (Sam &amp; Berry, </span><a aria-label="Reference 2010" data-dcnode-id="1882" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d23967445e588" title="Sam, D. L., &amp; Berry, J. W. (2010). Acculturation: When individuals and groups of different cultural backgrounds meet. Perspectives on Psychological Science: A Journal of the Association for Psychological Science, 5(4), 472–481. 
              https://doi.org/10.1177/1745691610373075
              
            "><span data-dcnode-id="1883" instrument_node="">2010</span></a><span data-dcnode-id="1881" instrument_node="">). The multicultural nature of our societies also signifies that societal challenges cannot be tackled by the majority population alone. Both the majority and minority populations would need to work in partnership to address these challenges. This is even more important for the younger generation as multicultural societies continue to evolve and the proportion of minority groups grow in relation to the general population. To harness the advantages of multiculturalism in resolving societal challenges, majority and minority youth will have to work their way through the perils of prejudice, discrimination, and racism to create a harmonic rapport where their respective competences are respected and brought to the table. Equipping youth with character strengths may contribute to the achievement of this crucial partnership.</span></p><p data-dcnode-id="1869"><span data-dcnode-id="1879" instrument_node="">Good moral character or moral expertise


 has been closely linked to ethical skills such that an individual with healthy levels of the former will also likely exercise the latter (Narvaez, </span><a aria-label="Reference 2006" data-dcnode-id="1877" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d23967445e607" title="Narvaez, D. (2006). Integrative ethical education. In M. Killen &amp; J. G. Smetana (Eds.), Handbook of moral development (pp. 703–732). Lawrence Erlbaum Associates."><span data-dcnode-id="1878" instrument_node="">2006</span></a><span data-dcnode-id="1876" instrument_node="">). Narvaez (</span><a aria-label="Reference 2008" data-dcnode-id="1874" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d23967445e610" title="Narvaez, D. (2008). Human flourishing and moral development: Cognitive and neurobiological perspectives of virtue development. In L. P. Nucci &amp; D. Narvaez (Eds.), Handbook of moral and character education (pp. 310–327). Routledge."><span data-dcnode-id="1875" instrument_node="">2008</span></a><span data-dcnode-id="1873" instrument_node="">) proposed a link between moral expertise and four aspects of ethical skills, namely, ethical sensitivity (i.e., recognizing a moral situation, understanding their role, and being able to take the perspective of others involved); ethical judgment (i.e., being able to reason about one’s responsibility and consequences as well as applying personal and religious codes to resolve complex problems); ethical focus (i.e., being able to adjust priorities over a sustain period of time in a way that reflects a deep commitment to moral and ethical values); and, finally, ethical action (i.e., being able to formulate a moral intention and having the valor to follow through). Consequently, an individual with a good moral character or moral expertise has healthy levels of ethical skills and can take the perspective of others, including those from outside their culture, religion, or race. More importantly, the possession of these skills can lead to the creation of an anti-racism environment where effective collaboration between people of diverse races and origins can occur. Interpersonal competence is, thus, a functional component of good moral character (Fowers &amp; Davidov, </span><a aria-label="Reference 2006" data-dcnode-id="1871" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d23967445e643" title="Fowers, B. J., &amp; Davidov, B. J. (2006). The virtue of multiculturalism: Personal transformation, character, and openness to the other. American Psychologist, 61(6), 581–594. 
              https://doi.org/10.1037/0003-066X.61.6.581
              
            "><span data-dcnode-id="1872" instrument_node="">2006</span></a><span data-dcnode-id="1870" instrument_node="">) that can promote coherence and collaboration in diverse societies.</span></p><p data-dcnode-id="1861"><span data-dcnode-id="1868" instrument_node="">Echoing how healthy levels of ethical skills or moral expertise can facilitate effective collaboration, Cohen and Morse (</span><a aria-label="Reference 2014" data-dcnode-id="1866" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d23967445e654" title="Cohen, T. R., &amp; Morse, L. (2014). Moral character: What it is and what it does. Research in Organizational Behavior, 34, 43–61. 
              https://doi.org/10.1016/j.riob.2014.08.003
              
            "><span data-dcnode-id="1867" instrument_node="">2014</span></a><span data-dcnode-id="1865" instrument_node="">) described three elements of moral character and their influence on organizational behaviors and social relations. The authors referred to motivational, ability, and identity aspects of character, which can have implications for work outcomes. With motivation, the individual considers others’ wants and needs, as well as how their actions can affect other people. When that happens, the individual is motivated to treat others fairly and considerately, a skill which is needed for effective relationship regulation and group functioning (Cohen &amp; Morse, </span><a aria-label="Reference 2014" data-dcnode-id="1863" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d23967445e661" title="Cohen, T. R., &amp; Morse, L. (2014). Moral character: What it is and what it does. Research in Organizational Behavior, 34, 43–61. 
              https://doi.org/10.1016/j.riob.2014.08.003
              
            "><span data-dcnode-id="1864" instrument_node="">2014</span></a><span data-dcnode-id="1862" instrument_node="">). Furthermore, the ability element of moral character empowers the individual to act ethically and desist from behaving unethically. Thus, the individual can regulate behaviors that may have short-term gains but negative long-term consequences for oneself or others. Finally, identity as a third element of moral character reflects how morality is crucial and central to the individual’s self-concept. Thus, the individual is concerned about not only being a moral person but also viewing him- or herself as such. An individual who possesses these three elements of moral character


 reflected in the ability to consider other people’s needs, to act ethically, and to self-identify as a moral person is thus expected to collaborate effectively with people of diverse backgrounds. Moreover, such collaborations between individuals with these elements of moral character


 are likely to initiate settings where anti-racism is practiced and promoted, as it is not only important for the individuals to ethically consider the needs of others different from themselves, but it is also vital for them to enhance their identity through their actions.</span></p><p data-dcnode-id="1856"><span data-dcnode-id="1860" instrument_node="">In empirical research, the theoretical assumption that Character as a thriving indicator is an essential precursor of civic engagement


 and other forms of contribution has been supported. In a study involving 87 children and adolescents who were recruited from 3 US research sites, Metzger et al. (</span><a aria-label="Reference 2016" data-dcnode-id="1858" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d23967445e710" title="Metzger, A., Syvertsen, A. K., Oosterhoff, B., Babskie, E., &amp; Wray-Lake, L. (2016). How children understand civic actions: A mixed methods perspective. Journal of Adolescent Research, 31(5), 507–535. 
              https://doi.org/10.1177/0743558415610002
              
            "><span data-dcnode-id="1859" instrument_node="">2016</span></a><span data-dcnode-id="1857" instrument_node="">) ask participants to classify 12 character strengths, 6 that have been theorized to be civically oriented (future-mindedness, generosity, humility, leadership, purpose, and responsibility) and another 6 that were less related to civic actions (amazed, creativity, forgiveness, gratitude, joy, and thrifty) into 5 categories ranging from “most like” to “least like.” The categorization was to be based on the youth’s perceptions of individuals who engaged in four distinct civic actions, namely, volunteering, voting, protesting, and environmentalism (engaging in environmental or conservation behaviors). Among other results, the youth classified purpose, future-mindedness, generosity, leadership, and responsibility, namely, five character strengths that were civically oriented, as essential across multiple forms of civic action, the results capturing youth understanding of civic values and behaviors.</span></p><p data-dcnode-id="1845"><span data-dcnode-id="1855" instrument_node="">Taking advantage of Metzger et al.’ (</span><a aria-label="Reference 2016" data-dcnode-id="1853" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d23967445e717" title="Metzger, A., Syvertsen, A. K., Oosterhoff, B., Babskie, E., &amp; Wray-Lake, L. (2016). How children understand civic actions: A mixed methods perspective. Journal of Adolescent Research, 31(5), 507–535. 
              https://doi.org/10.1177/0743558415610002
              
            "><span data-dcnode-id="1854" instrument_node="">2016</span></a><span data-dcnode-id="1852" instrument_node="">) findings, Oosterhoff et al. (</span><a aria-label="Reference 2019" data-dcnode-id="1850" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d23967445e720" title="Oosterhoff, B., Whillock, S., Sanders, C., &amp; Poppler, A. (2019, October). Longitudinal associations between character strengths and civic action: A daily diary study. Retrieved from 
              psyarxiv.com/jmf9s/
              
            "><span data-dcnode-id="1851" instrument_node="">2019</span></a><span data-dcnode-id="1849" instrument_node="">), in a longitudinal diary study spanning a 1-week period, explored the association between several character strengths (i.e., sense of purpose, future-mindedness, and gratitude) and civic action (as measured by community service, environmentalism, standard political behavior, and social movement behavior) among 235 college students in the United States. The authors found significant weekly, daily, and next-day associations between a greater sense of purpose and multiple forms of civic behavior. More specifically, a significant association was found between higher daily levels of purpose and greater participation in each form of civic action, while students with a higher sense of purpose, relative to those with a lower sense of purpose, engaged in greater community service during the week. In addition, future-mindedness was found to be associated with higher daily and weekly levels of community service and environmentalism, while between-person weekly and within-person daily associations were found for the links between gratitude, community service, and environmentalism (Oosterhoff et al., </span><a aria-label="Reference 2019" data-dcnode-id="1847" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d23967445e723" title="Oosterhoff, B., Whillock, S., Sanders, C., &amp; Poppler, A. (2019, October). Longitudinal associations between character strengths and civic action: A daily diary study. Retrieved from 
              psyarxiv.com/jmf9s/
              
            "><span data-dcnode-id="1848" instrument_node="">2019</span></a><span data-dcnode-id="1846" instrument_node="">). All these findings, depicting a positive association between character strengths and participation in different civic actions, suggest that the context of specific civic actions could be an arena where young people are able to express their sense of purpose and responsibility toward the welfare of their community.</span></p><p data-dcnode-id="1837"><span data-dcnode-id="1844" instrument_node="">In a review of earlier research comprising 29 articles, book chapters, and books, Lin (</span><a aria-label="Reference 2015" data-dcnode-id="1842" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d23967445e729" title="Lin, A. (2015). Citizenship education in American schools and its role in developing civic engagement: A review of the research. Educational Review, 67(1), 35–63. 
              https://doi.org/10.1080/00131911.2013.813440
              
            "><span data-dcnode-id="1843" instrument_node="">2015</span></a><span data-dcnode-id="1841" instrument_node="">) created a framework to explain, among others, character education as a form of citizenship education together with its role in improving civic engagement


. A major aim of character education programs was to promote ethical values, such as honesty, caring, and trustworthiness, to enable students to become responsible citizens. In his review, Lin (</span><a aria-label="Reference 2015" data-dcnode-id="1839" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d23967445e751" title="Lin, A. (2015). Citizenship education in American schools and its role in developing civic engagement: A review of the research. Educational Review, 67(1), 35–63. 
              https://doi.org/10.1080/00131911.2013.813440
              
            "><span data-dcnode-id="1840" instrument_node="">2015</span></a><span data-dcnode-id="1838" instrument_node="">) found evidence suggesting that character education can promote the development of civic engagement among students at the school level through school bonding. Moreover, school programs that promoted school-family bonding as well had even stronger effects on civic engagement. Thus, there was evidence that character education programs in schools can help students understand the importance of community. In particular, the promotion of the ethical values of honesty, caring, and trustworthiness in the character education program can help students to appreciate as well as accommodate a community of diverse ethnicities, races, and origins.</span></p><p data-dcnode-id="1826"><span data-dcnode-id="1836" instrument_node="">Earlier studies suggest that youth engagement in civic actions do not only entail prosocial contributions in their communities but also include actions that address issues related to racism, discrimination, and injustice (Aldana et al., </span><a aria-label="Reference 2019" data-dcnode-id="1834" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d23967445e767" title="Aldana, A., Bañales, J., &amp; Richards-Schuster, K. (2019). Youth anti-racist engagement: Conceptualization, development, and validation of an anti-racism action scale. Adolescent Research Review, 4, 369–381. 
              https://doi.org/10.1007/s40894-019-00113-1
              
            "><span data-dcnode-id="1835" instrument_node="">2019</span></a><span data-dcnode-id="1833" instrument_node="">). Accordingly, youth civic engagement may be driven by the virtue of character (Oosterhoff et al., </span><a aria-label="Reference 2019" data-dcnode-id="1831" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d23967445e775" title="Oosterhoff, B., Whillock, S., Sanders, C., &amp; Poppler, A. (2019, October). Longitudinal associations between character strengths and civic action: A daily diary study. Retrieved from 
              psyarxiv.com/jmf9s/
              
            "><span data-dcnode-id="1832" instrument_node="">2019</span></a><span data-dcnode-id="1830" instrument_node="">) as well as their intention to address racial or ethnic inequalities (Bañales et al., </span><a aria-label="Reference 2020" data-dcnode-id="1828" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d23967445e778" title="Bañales, J., Mathews, C., Hayat, N., Anyiwo, N., &amp; Diemer, M. A. (2020). Latinx and Black young adults’ pathways to civic/political engagement. Cultural Diversity and Ethnic Minority Psychology, 26(2), 176–188. 
              https://doi.org/10.1037/cdp0000271
              
            "><span data-dcnode-id="1829" instrument_node="">2020</span></a><span data-dcnode-id="1827" instrument_node="">). Having the ethical skills and competencies to address inequalities is essential, especially among young people as the experience of equal rights and opportunities is needed to build a functioning and harmonious society.</span></p></div></div></section><section data-dcnode-id="1779" data-title="The Norwegian Context"><div class="c-article-section" data-dcnode-id="1780" id="Sec4-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1821" id="Sec4"><span data-dcnode-id="1822" instrument_node="">The Norwegian Context</span></h2><div class="c-article-section__content" data-dcnode-id="1781" id="Sec4-content"><p data-dcnode-id="1804"><span data-dcnode-id="1820" instrument_node="">The homogenous society in Norway that has existed for many decades is now giving way to a society where people from different ethnic and racial backgrounds are living closely together. Thus, like many other societies, Norway’s society is becoming increasingly multicultural. At the beginning of the year 2021, 18.5% of the Norwegian population were registered as immigrants (Statistics Norway, </span><a aria-label="Reference 2021" data-dcnode-id="1818" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d23967445e789" title="Statistics Norway. (2021). Immigrants and Norwegian-born to immigrant parents. Retrieved from 
              https://www.ssb.no/en/befolkning/innvandrere/statistikk/innvandrere-og-norskfodte-med-innvandrerforeldre
              
            "><span data-dcnode-id="1819" instrument_node="">2021</span></a><span data-dcnode-id="1817" instrument_node="">) relative to the 6% that were listed in 2000 (Statistics Norway, </span><a aria-label="Reference 2001" data-dcnode-id="1815" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d23967445e792" title="Statistics Norway. (2001). Updated numbers on immigrants 2001. Retrieved from 
              https://www.ssb.no/befolkning/artikler-og-publikasjoner/oppdaterte-tall-om-innvandrere%2D%2D42215
              
            "><span data-dcnode-id="1816" instrument_node="">2001</span></a><span data-dcnode-id="1814" instrument_node="">). Norway is considered as one of the countries in Western Europe with positive attitudes toward immigrants and religious minorities (Norwegian Ministry of Culture, </span><a aria-label="Reference 2020" data-dcnode-id="1812" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d23967445e795" title="Norwegian Ministry of Culture. (2020). The Norwegian Government's Action Plan against Racism and Discrimination on the Grounds of Ethnicity and Religion 2020–2023 (Extracted Version). Retrieved from 
              https://www.regjeringen.no/contentassets/589aa9f4e14540b5a5a6144aaea7b518/action-plan-against-racism-and-discrimination_uu.pdf
              
            "><span data-dcnode-id="1813" instrument_node="">2020</span></a><span data-dcnode-id="1811" instrument_node="">). In a proposal for an action plan to combat racism and discrimination based on the grounds of ethnicity and religion, a unified Norwegian Parliament supported several measures that were outlined (Norwegian Ministry of Culture, </span><a aria-label="Reference 2020" data-dcnode-id="1809" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d23967445e798" title="Norwegian Ministry of Culture. (2020). The Norwegian Government's Action Plan against Racism and Discrimination on the Grounds of Ethnicity and Religion 2020–2023 (Extracted Version). Retrieved from 
              https://www.regjeringen.no/contentassets/589aa9f4e14540b5a5a6144aaea7b518/action-plan-against-racism-and-discrimination_uu.pdf
              
            "><span data-dcnode-id="1810" instrument_node="">2020</span></a><span data-dcnode-id="1808" instrument_node="">). However, in a recent publication by Straiton et al. (</span><a aria-label="Reference 2019" data-dcnode-id="1806" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d23967445e801" title="Straiton, M. L., Aambø, A. K., &amp; Johansen, R. (2019). Perceived discrimination, health and mental health among immigrants in Norway: The role of moderating factors. BMC Public Health, 19, 325. 
              https://doi.org/10.1186/s12889-019-6649-9
              
            "><span data-dcnode-id="1807" instrument_node="">2019</span></a><span data-dcnode-id="1805" instrument_node="">), 27% of the over 4000 immigrants from 12 different countries living in Norway that were involved in a study reported discrimination in the workplace, educational institutions, the healthcare system, or other situations because of their background as immigrants.</span></p><p data-dcnode-id="1796"><span data-dcnode-id="1803" instrument_node="">With the established link between character strengths and civic engagement in earlier research, it would be interesting to examine whether the immense engagement in volunteering and other civic activities in countries, such as Norway, is related to their character strengths (i.e., their interpersonal competence and ability to consider the other). It is estimated that over 50% of the general population in several Scandinavian countries, including Norway, is actively engaged in volunteering work (Qvist et al., </span><a aria-label="Reference 2019" data-dcnode-id="1801" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d23967445e820" title="Qvist, H-P.Y., Folkestad, B., Fridberg, T., &amp; Lundåsen, S. W. (2019). Trends in volunteering in Scandinavia. In L. Henriksen, K. Strømsnes, &amp; L. Svedberg (Eds.), Civic engagement in Scandinavia. Nonprofit and civil society studies (An International Multidisciplinary Series, pp. 67–94). Springer. 
              https://doi.org/10.1007/978-3-319-98717-0_3
              
            "><span data-dcnode-id="1802" instrument_node="">2019</span></a><span data-dcnode-id="1800" instrument_node="">). This is in spite of the assumption related to the classic “crowding out” theory that large welfare states with comprehensive public services like those in Norway would discourage voluntary services and civic engagement (Henriksen et al., </span><a aria-label="Reference 2019" data-dcnode-id="1798" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d23967445e823" title="Henriksen, L. S., Strømsnes, K., &amp; Svedberg, L. (2019). Understanding civic engagement in the Scandinavian context. In L. Henriksen, K. Strømsnes, &amp; L. Svedberg (Eds.), Civic engagement in Scandinavia. Nonprofit and civil society studies (An International Multidisciplinary Series) (pp. 1–31). Springer. 
              https://doi.org/10.1007/978-3-319-98717-0_1
              
            "><span data-dcnode-id="1799" instrument_node="">2019</span></a><span data-dcnode-id="1797" instrument_node="">). If an association is observed between Character and civic engagement in the Norwegian context, both can be fostered in the fight against the social injustice of racism and discrimination.</span></p><p data-dcnode-id="1782"><span data-dcnode-id="1795" instrument_node="">The high levels of civic engagement found in the general Norwegian population have also been observed among the youth, especially with regard to the ideological aspect of civic engagement (Hegna, </span><a aria-label="Reference 2020" data-dcnode-id="1793" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d23967445e849" title="Hegna K. (2020). Young citizenship: Civic engagement and participation in four Nordic countries. In T. Strand (Ed.), Rethinking ethical-political education. Contemporary philosophies and theories in education, vol 16 (pp. 13–28). Springer. 
              https://doi.org/10.1007/978-3-030-49524-4_2
              
            "><span data-dcnode-id="1794" instrument_node="">2020</span></a><span data-dcnode-id="1792" instrument_node="">). Indeed, results of the 2016 International Civic and Citizenship study indicated that 14–15-year-old students in Scandinavia, including Norway, scored significantly higher on civic knowledge, understanding of democracy, and citizenship than the international average (Schulz et al., </span><a aria-label="Reference 2018" data-dcnode-id="1790" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d23967445e857" title="Schulz, W., Ainley, J., Fraillon, J., Losito, B., Agrusti, G., &amp; Friedman, T. (2018). Becomingcitizens in a changing world: IEA international civic and citizenship education study 2016 International report. Springer."><span data-dcnode-id="1791" instrument_node="">2018</span></a><span data-dcnode-id="1789" instrument_node="">). This is not surprising as education on democracy is central in Norwegian school curriculum. However, in terms of voluntary services, not so many were actively involved, although Norwegian students, relative to peers from Asia, Europe, and Latin America, were more likely to indicate that they were members of civic organizations and participated in school democracy (Hegna, </span><a aria-label="Reference 2020" data-dcnode-id="1787" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d23967445e871" title="Hegna K. (2020). Young citizenship: Civic engagement and participation in four Nordic countries. In T. Strand (Ed.), Rethinking ethical-political education. Contemporary philosophies and theories in education, vol 16 (pp. 13–28). Springer. 
              https://doi.org/10.1007/978-3-030-49524-4_2
              
            "><span data-dcnode-id="1788" instrument_node="">2020</span></a><span data-dcnode-id="1786" instrument_node="">). The civic values and behaviors among Norwegian youth can impact their perceptions of immigrants and other minority groups. In a survey that was conducted among the Norwegian population, young people, compared to the older generation, reported more positive attitudes toward immigrants and religious minorities (Norwegian Ministry of Culture, </span><a aria-label="Reference 2020" data-dcnode-id="1784" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d23967445e874" title="Norwegian Ministry of Culture. (2020). The Norwegian Government's Action Plan against Racism and Discrimination on the Grounds of Ethnicity and Religion 2020–2023 (Extracted Version). Retrieved from 
              https://www.regjeringen.no/contentassets/589aa9f4e14540b5a5a6144aaea7b518/action-plan-against-racism-and-discrimination_uu.pdf
              
            "><span data-dcnode-id="1785" instrument_node="">2020</span></a><span data-dcnode-id="1783" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="1510" data-title="This Chapter"><div class="c-article-section" data-dcnode-id="1511" id="Sec5-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1777" id="Sec5"><span data-dcnode-id="1778" instrument_node="">This Chapter</span></h2><div class="c-article-section__content" data-dcnode-id="1512" id="Sec5-content"><p data-dcnode-id="1763"><span data-dcnode-id="1776" instrument_node="">The present chapter focuses on PYD’s four facets of Character in relation to civic engagement (i.e., engagement in local, community, and global affairs) among high school students living in Norway. Character is found to be essential for civic engagement due to its ethical values, and also, the nature of an individual’s civic engagement can be determined by his or her character (Oosterhoff et al., </span><a aria-label="Reference 2019" data-dcnode-id="1774" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d23967445e889" title="Oosterhoff, B., Whillock, S., Sanders, C., &amp; Poppler, A. (2019, October). Longitudinal associations between character strengths and civic action: A daily diary study. Retrieved from 
              psyarxiv.com/jmf9s/
              
            "><span data-dcnode-id="1775" instrument_node="">2019</span></a><span data-dcnode-id="1773" instrument_node="">). The four facets of Character overlap considerably with Peterson and Seligman’s (</span><a aria-label="Reference 2004" data-dcnode-id="1771" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d23967445e892" title="Peterson, C., &amp; Seligman, M. E. P. (2004). Character strengths and virtues: A handbook and classification. American Psychological Association/Oxford University Press."><span data-dcnode-id="1772" instrument_node="">2004</span></a><span data-dcnode-id="1770" instrument_node="">) character strengths, Cohen and Morse’s (</span><a aria-label="Reference 2014" data-dcnode-id="1768" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d23967445e895" title="Cohen, T. R., &amp; Morse, L. (2014). Moral character: What it is and what it does. Research in Organizational Behavior, 34, 43–61. 
              https://doi.org/10.1016/j.riob.2014.08.003
              
            "><span data-dcnode-id="1769" instrument_node="">2014</span></a><span data-dcnode-id="1767" instrument_node="">) three elements of character, and Narvaez’s (</span><a aria-label="Reference 2008" data-dcnode-id="1765" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d23967445e898" title="Narvaez, D. (2008). Human flourishing and moral development: Cognitive and neurobiological perspectives of virtue development. In L. P. Nucci &amp; D. Narvaez (Eds.), Handbook of moral and character education (pp. 310–327). Routledge."><span data-dcnode-id="1766" instrument_node="">2008</span></a><span data-dcnode-id="1764" instrument_node="">) moral expertise, which reflect perspective taking and consideration of the other. Local and global projects involve working together with people from different races, cultures, and ethnicities. Thus, individuals with competence in the Character facets should also engage more in civic development relative to those with little or no such competence. More importantly, individuals contributing to local, community, and global affairs owing to their Character strengths should also have the skills to avoid prejudice, discrimination, and racism and collaborate with people from diverse backgrounds. Thus, the following hypothesis was made: Character (as well as its four facets – behavioral conduct, social conscience, personal values, and diversity values) will be positively associated with civic engagement (i.e., contribution to local, community, and global affairs) among Norwegian youth.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1761" id="Sec6"><span data-dcnode-id="1762" instrument_node="">Methods</span></h3><p data-dcnode-id="1747"><span data-dcnode-id="1760" instrument_node="">To study the role of Character on civic engagement in Norwegian students, a cross-sectional survey was conducted among 220 students (52% males) from 4 high schools in Eastern and Western Norway. The schools were selected through convenience sampling. The age range of students was 16–20&nbsp;years (</span><i data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">M</span></i><sub data-dcnode-id="1755"><i data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">age</span></i></sub><span data-dcnode-id="1754" instrument_node=""> = 17.30, </span><i data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">SD</span></i><span data-dcnode-id="1751" instrument_node=""> = 1.12). About 83% and 87% reported that the highest level of their father’s and mother’s education, respectively, was postsecondary (Table </span><a data-dcnode-id="1749" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="1750" instrument_node="">10.1</span></a><span data-dcnode-id="1748" instrument_node="">). Prior to data collection, Semantix Translations Norway AS, a company that specializes in translation services, translated the questionnaire from English to Norwegian, ensuring preservation of meaning by double-checking and using translation experts in the relevant field of research. Headmasters of the selected high schools were contacted via e-mail with a request to participate in the study and an information letter about the purpose of the study. After agreeing to participate, the schools signed an informed consent form. Once that was done, an electronic version of the questionnaire was administered to students who had also signed an informed consent form to participate in the survey that lasted for approximately 30 minutes. The study was approved by the NSD – Norwegian Centre for Research Data.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1732" data-test="inline-table" id="table-1"><figure data-dcnode-id="1733"><figcaption class="c-article-table__figcaption" data-dcnode-id="1744"><b data-dcnode-id="1745" data-test="table-caption" id="Tab1"><span data-dcnode-id="1746" instrument_node="">Table 10.1 Study variables among high school students in Norway</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1734"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="1735" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-3-030-83545-3_10/tables/1" rel="nofollow"><span data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1736" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1737" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1738" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1741" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1740" fill-rule="evenodd"></path><span data-dcnode-id="1739" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="1718"><span data-dcnode-id="1731" instrument_node="">As part of the survey, students responded to measures on Character and civic engagement. For the four facets of Character (Geldhof et al., </span><a aria-label="Reference 2014" data-dcnode-id="1729" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d23967445e1261" title="Geldhof, G. J., Bowers, E. P., Boyd, M. J., Mueller, M. K., Napolitano, C. M., Schmid, K. L., Lerner, J. V., &amp; Lerner, R. M. (2014). Creation of short and very short measures of the Five Cs of positive youth development. Journal of Research on Adolescence, 24, 163–176. 
              https://doi.org/10.1111/jora.12039
              
            "><span data-dcnode-id="1730" instrument_node="">2014</span></a><span data-dcnode-id="1728" instrument_node="">), eights items (two for each facet) were used. Sample items on the facets include behavioral conduct (e.g., I usually act the way I am supposed to); social conscience (e.g., Helping to make the world a better place to live); personal values (e.g., Doing what I think is right even if my friends make fun of me); and diversity values (e.g., Enjoy being with people from other cultures/ethnicities). On a Likert scale from (1) </span><i data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">Strongly disagree</span></i><span data-dcnode-id="1725" instrument_node=""> to (5) </span><i data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Strongly agree</span></i><span data-dcnode-id="1722" instrument_node="">, students indicated the extent to which the various statements reflected their experiences. A Cronbach’s alpha of .85 was estimated for the eight items that measured Character as a composite variable, while the Spearman-Brown coefficient used to assess reliability between the two items measuring each of the four facets of Character ranged from .69 to .77 (Table </span><a data-dcnode-id="1720" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="1721" instrument_node="">10.1</span></a><span data-dcnode-id="1719" instrument_node="">).</span></p><p data-dcnode-id="1695"><span data-dcnode-id="1717" instrument_node="">For civic engagement in local and community affairs (Lerner et al., </span><a aria-label="Reference 2003" data-dcnode-id="1715" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d23967445e1312" title="Lerner, R. M., Dowling, E. M., &amp; Anderson, P. M. (2003). Positive youth development: Thriving as the basis of personhood and civil society. Applied Developmental Science, 7(3), 172–180. 
              https://doi.org/10.1207/S1532480XADS0703_8
              
            "><span data-dcnode-id="1716" instrument_node="">2003</span></a><span data-dcnode-id="1714" instrument_node="">), students specified the number of hours they spent in a typical week 1) to help friends or neighbors and 2) to volunteer or do something without pay to make their community a better place, respectively. Response categories ranged from (1) </span><i data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">0 hours</span></i><span data-dcnode-id="1711" instrument_node=""> to (5) </span><i data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">6 or more hours</span></i><span data-dcnode-id="1708" instrument_node="">. For engagement in global affair (Wray-Lake et al., </span><a aria-label="Reference 2010" data-dcnode-id="1706" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d23967445e1321" title="Wray-Lake, L., Flanagan, C. A., &amp; Osgood, D. W. (2010). Examining trends in adolescent environmental attitudes, beliefs, and behaviors across three decades. Environment and Behavior, 42, 61–85. 
              https://doi.org/10.1177/0013916509335163
              
            "><span data-dcnode-id="1707" instrument_node="">2010</span></a><span data-dcnode-id="1705" instrument_node="">), students responded to a question on how, in their own actions, they make effort to conserve energy and protect the environment regarding the things they do and buy. Response categories ranged on a Likert scale from (1) </span><i data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">None</span></i><span data-dcnode-id="1702" instrument_node=""> to (4) </span><i data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Quite a bit</span></i><span data-dcnode-id="1699" instrument_node="">. Finally, students also provided information on several demographics, including age and gender (male or female) along with father and mother’s highest completed education (five levels of education, from no education to university education). The demographics were controlled for, as confounders (Wiium et al., </span><a aria-label="Reference 2018" data-dcnode-id="1697" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d23967445e1335" title="Wiium, N., Dost-Gözkan, A., &amp; Kosic, M. (2018). Developmental assets among young people in three European contexts: Italy, Norway and Turkey. Child &amp; Youth Care Forum, 48, 187–206. 
              https://doi.org/10.1007/s10566-018-9446-1
              
            "><span data-dcnode-id="1698" instrument_node="">2018</span></a><span data-dcnode-id="1696" instrument_node="">).</span></p><p data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">To explore the link between Character as a composite variable, its four facets, and civic engagement, mean scores were created for Character and the four facets. Descriptive analysis was conducted on the mean scores along with the civic engagement variables and demographics as the first step of data analysis. Second, correlation analysis was used to investigate zero-order correlations between the demographic variables, Character, the four Character facets, and the civic engagement variables. Lastly, a series of hierarchical multiple regression analysis were executed to test the hypothesis that higher levels of Character (as four facets and as one composite variable) would be associated with higher participation in civic engagement (i.e., in local, community, and global affairs).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1691" id="Sec7"><span data-dcnode-id="1692" instrument_node="">Character and Civic Engagement: Empirical Findings</span></h3><p data-dcnode-id="1656"><span data-dcnode-id="1690" instrument_node="">In descriptive analysis, relatively high scores were found for the Character variables with the mean scores ranging between 3.79 and 4.22 of a maximum score of 5. The mean score for Character as a composite variable was </span><i data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">M</span></i><span data-dcnode-id="1687" instrument_node="">&nbsp;=&nbsp;3.94 (</span><i data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">S.D.</span></i><span data-dcnode-id="1684" instrument_node="">&nbsp;=&nbsp;.69), while the highest mean score of </span><i data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">M</span></i><span data-dcnode-id="1681" instrument_node="">&nbsp;=&nbsp;4.22 (</span><i data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">S.D.</span></i><span data-dcnode-id="1678" instrument_node="">&nbsp;=&nbsp;.80) was registered for the facet, positive values. For engagement in local and community affairs, mean scores were </span><i data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">M</span></i><span data-dcnode-id="1675" instrument_node=""> = 2.46 (</span><i data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">S.D.</span></i><span data-dcnode-id="1672" instrument_node="">&nbsp;=&nbsp;1.11) and </span><i data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">M</span></i><span data-dcnode-id="1669" instrument_node="">&nbsp;=&nbsp;1.68 (</span><i data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">S.D</span></i><span data-dcnode-id="1666" instrument_node="">.&nbsp;=&nbsp;1.16), respectively, indicating that on average, students spent between 2 and 3&nbsp;h and between 0 and 1&nbsp;h a week in local and community affairs, respectively. For engagement in global affair, a mean score of </span><i data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">M</span></i><span data-dcnode-id="1663" instrument_node="">&nbsp;=&nbsp;2.18 (</span><i data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">S.D.</span></i><span data-dcnode-id="1660" instrument_node="">&nbsp;=&nbsp;.86) on a scale of 1 to 4 was estimated (Table </span><a data-dcnode-id="1658" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="1659" instrument_node="">10.1</span></a><span data-dcnode-id="1657" instrument_node="">).</span></p><p data-dcnode-id="1579"><span data-dcnode-id="1655" instrument_node="">In correlational analysis, very few correlations were observed between the demographics, Character, and civic engagement. Here, a small but positive correlation between gender and the facet, social conscience (</span><i data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">r</span></i><span data-dcnode-id="1652" instrument_node="">&nbsp;=&nbsp;.15, </span><i data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">p</span></i><span data-dcnode-id="1649" instrument_node=""> &lt; .05), and between father’s education and engagement in local affairs (</span><i data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">r</span></i><span data-dcnode-id="1646" instrument_node="">&nbsp;=&nbsp;.16, </span><i data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">p</span></i><span data-dcnode-id="1643" instrument_node=""> &lt; .05) and community affairs (</span><i data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">r</span></i><span data-dcnode-id="1640" instrument_node="">&nbsp;=&nbsp;.16, </span><i data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">p</span></i><span data-dcnode-id="1637" instrument_node=""> &lt; .05) were observed. Moderate to strong correlations (.34 – .58) were identified among the four Character facets, while moderate and positive correlations, ranging from .20 to .42, were observed between Character and civic engagement (Table </span><a data-dcnode-id="1635" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="1636" instrument_node="">10.2</span></a><span data-dcnode-id="1634" instrument_node="">). In the multivariate analysis in Table </span><a data-dcnode-id="1632" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="1633" instrument_node="">10.3</span></a><span data-dcnode-id="1631" instrument_node="">, Character as a composite variable was related to all three forms of civic engagement, local (</span><i data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">β</span></i><span data-dcnode-id="1628" instrument_node="">&nbsp;=&nbsp;.30, </span><i data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">p</span></i><span data-dcnode-id="1625" instrument_node=""> &lt; .01), community (</span><i data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">β</span></i><span data-dcnode-id="1622" instrument_node="">&nbsp;=&nbsp;.23, </span><i data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">p</span></i><span data-dcnode-id="1619" instrument_node=""> &lt; .01), and global (</span><i data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">β</span></i><span data-dcnode-id="1616" instrument_node="">&nbsp;=&nbsp;.45, </span><i data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">p</span></i><span data-dcnode-id="1613" instrument_node=""> &lt; .01) affairs, thus confirming the hypothesis of the study. As for the four facets of Character, the diversity values facet was significantly related to engagement in local affair (</span><i data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">β</span></i><span data-dcnode-id="1610" instrument_node="">&nbsp;=&nbsp;.23, </span><i data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">p</span></i><span data-dcnode-id="1607" instrument_node=""> &lt; .05) and to engagement in community (</span><i data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">β</span></i><span data-dcnode-id="1604" instrument_node="">&nbsp;=&nbsp;.17, </span><i data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">p</span></i><span data-dcnode-id="1601" instrument_node="">&nbsp;=&nbsp;.071) and global affairs (</span><i data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">β</span></i><span data-dcnode-id="1598" instrument_node="">&nbsp;=&nbsp;.16, </span><i data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">p</span></i><span data-dcnode-id="1595" instrument_node="">&nbsp;=&nbsp;.057) with marginal significance. Behavioral conduct (</span><i data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">β</span></i><span data-dcnode-id="1592" instrument_node="">&nbsp;=&nbsp;.24, </span><i data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">p</span></i><span data-dcnode-id="1589" instrument_node=""> &lt; .01) and social conscience (</span><i data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">β</span></i><span data-dcnode-id="1586" instrument_node="">&nbsp;=&nbsp;.33, </span><i data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">p</span></i><span data-dcnode-id="1583" instrument_node=""> &lt; .01) were also positively associated with engagement in global affairs. No significant associations were found for positive values in multivariate analyses (Table </span><a data-dcnode-id="1581" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="1582" instrument_node="">10.3</span></a><span data-dcnode-id="1580" instrument_node="">).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1564" data-test="inline-table" id="table-2"><figure data-dcnode-id="1565"><figcaption class="c-article-table__figcaption" data-dcnode-id="1576"><b data-dcnode-id="1577" data-test="table-caption" id="Tab2"><span data-dcnode-id="1578" instrument_node="">Table 10.2 Correlations among demographics, Character, and civic engagement</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1566"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="1567" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-3-030-83545-3_10/tables/2" rel="nofollow"><span data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1568" focusable="false"
