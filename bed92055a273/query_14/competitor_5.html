</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="1547" id="Sec8"><span data-dcnode-id="1548" instrument_node="">Discussion</span></h3><p data-dcnode-id="1536"><span data-dcnode-id="1546" instrument_node="">Based on earlier research findings about the positive association between character strengths and youth engagement in civic actions and activities, the present chapter hypothesized that Character (as measured by items reflecting behavioral conduct, social conscience, positive values, and diversity values) would be positively associated with civic engagement (i.e., contribution to local, community, and global affairs) among Norwegian youth. As expected, and in line with earlier works (e.g., Metzger et al., </span><a aria-label="Reference 2016" data-dcnode-id="1544" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d23967445e3833" title="Metzger, A., Syvertsen, A. K., Oosterhoff, B., Babskie, E., &amp; Wray-Lake, L. (2016). How children understand civic actions: A mixed methods perspective. Journal of Adolescent Research, 31(5), 507–535. 
              https://doi.org/10.1177/0743558415610002
              
            "><span data-dcnode-id="1545" instrument_node="">2016</span></a><span data-dcnode-id="1543" instrument_node="">; Oosterhoff et al., </span><a aria-label="Reference 2019" data-dcnode-id="1541" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d23967445e3836" title="Oosterhoff, B., Whillock, S., Sanders, C., &amp; Poppler, A. (2019, October). Longitudinal associations between character strengths and civic action: A daily diary study. Retrieved from 
              psyarxiv.com/jmf9s/
              
            "><span data-dcnode-id="1542" instrument_node="">2019</span></a><span data-dcnode-id="1540" instrument_node="">), positive associations were observed between Character and civic engagement. Specifically, Character when treated as a composite factor was related to engagement in local (helping friends or neighbors), community (volunteering or doing something without pay to make their community a better place), and global affairs (making effort to conserve energy and protect the environment). As for the Character facets, valuing diversity was significantly related to civic engagement at all three levels, although the significance was only marginal for community and global affairs, while behavioral conduct and social conscience were related to engagement in global affair. These are interesting findings that suggest that having character strengths or ethical morals are thriving indicators that can empower the youth to engage in civic development (Lerner et al., </span><a aria-label="Reference 2005" data-dcnode-id="1538" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d23967445e3853" title="Lerner, R. M., Lerner, J. V., Almerigi, J. B., Theokas, C., Phelps, E., Gestsdottir, S., Naudeau, S., Jelicic, H., Alberts, A., Ma, L., Smith, L. M., Bobek, D. L., Richman-Raphael, D., Simpson, I., Christiansen, E. D., &amp; von Eye, A. (2005). Positive youth development, participation in community youth development programs, and community contributions of fifth-grade adolescents: Findings from the first wave of the 4-H study of Positive Youth Development. The Journal of Early Adolescence, 25(1), 17–71. 
              https://doi.org/10.1177/0272431604272461
              
            "><span data-dcnode-id="1539" instrument_node="">2005</span></a><span data-dcnode-id="1537" instrument_node="">).</span></p><p data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">Even more important, that valuing diversity was related to all three forms of civic engagement, although marginal for community and global affairs, implicitly confirms the significant role of collaborative and intercultural competence in youth engagement in local, community, and global affairs. Valuing diversity means young people enjoy being with people from other cultures and ethnicities, a character strength that can promote anti-racism among groups of diverse youth. Moreover, the moderate to strong correlations observed between diversity values and the three other facets of Character (i.e., behavioral conduct, social conscience, and positive values) indicate that youth who enjoy being with other people of different backgrounds are also responsible, take actions to help make the world a better place to live in, as well as do what they think is right even when they can be scorned. In collaborative efforts, such as those inherent in civic engagement, these character strengths can be crucial in combating prejudice, discrimination, and racism that could pose as obstacles to the efforts.</span></p><p data-dcnode-id="1529"><span data-dcnode-id="1533" instrument_node="">Furthermore, although more research needs to be done to ascertain the factual effect of Character and its facets, differential findings of the facets are in line with findings by Oosterhoff et al. (</span><a aria-label="Reference 2019" data-dcnode-id="1531" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d23967445e3884" title="Oosterhoff, B., Whillock, S., Sanders, C., &amp; Poppler, A. (2019, October). Longitudinal associations between character strengths and civic action: A daily diary study. Retrieved from 
              psyarxiv.com/jmf9s/
              
            "><span data-dcnode-id="1532" instrument_node="">2019</span></a><span data-dcnode-id="1530" instrument_node="">), which indicated that the nature of civic engagement can be determined by character strengths. Among the four facets, the diversity values facet appeared to be more important, followed by behavioral conduct and social conscience. There was an indication that the positive values facet was significant for engagement in local and global affairs in the correlation analysis, although its significance faded in multivariate analysis. Valuing diversity may thus be the strength that aptly depicts the significant role of Character on collaborative efforts in civic engagement. Nevertheless, it is clear from the findings that for civic engagement, as assessed in the present chapter, the role of the composite factor of Character takes precedence over the individual facets. Hence, Character best facilitates civic engagement when considered as a family of virtues rather than when studied as a single positive trait.</span></p><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Some limits of the chapter are that the data is cross-sectional, not representative, and not comprehensive enough in terms of the measures, especially those on civic engagement. Data collected at one point or period of time, the convenience sampling used in the present chapter, and the single-item measures of the civic engagement variables are all limitations that need to be resolved through longitudinal studies, more inclusive sample, and better measures that can accurately depict the worth of Character to youth civic engagement.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1525" id="Sec9"><span data-dcnode-id="1526" instrument_node="">Implications and Conclusions</span></h3><p data-dcnode-id="1517"><span data-dcnode-id="1524" instrument_node="">Despite the limitations, the significant associations found between Character and civic engagement have implications for research, policy, and practice among youth in Norway and Scandinavia. For research, Character as a thriving indicator and a family of virtues needs to be further studied to identify and advance the facets that come together to translate positive ideologies about civic engagement among the youth into actual behaviors that can facilitate effective collaborations among diverse youth. For policy, strategies that cultivate and encourage interpersonal competence among young people of diverse races, cultures, and ethnicities can be integrated into guidelines and norms that govern youth programs and initiatives. Despite Norway’s positive attitudes to immigrants and religious minorities, earlier research on discrimination of immigrants in Norway suggests that many immigrants experience forms of discrimination in various societal contexts due to their immigrant background (Straiton et al., </span><a aria-label="Reference 2019" data-dcnode-id="1522" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d23967445e3927" title="Straiton, M. L., Aambø, A. K., &amp; Johansen, R. (2019). Perceived discrimination, health and mental health among immigrants in Norway: The role of moderating factors. BMC Public Health, 19, 325. 
              https://doi.org/10.1186/s12889-019-6649-9
              
            "><span data-dcnode-id="1523" instrument_node="">2019</span></a><span data-dcnode-id="1521" instrument_node="">). Norwegian youth may show less discrimination as they have been found to have more positive attitudes toward immigrants and minorities (Norwegian Ministry of Culture, </span><a aria-label="Reference 2020" data-dcnode-id="1519" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d23967445e3930" title="Norwegian Ministry of Culture. (2020). The Norwegian Government's Action Plan against Racism and Discrimination on the Grounds of Ethnicity and Religion 2020–2023 (Extracted Version). Retrieved from 
              https://www.regjeringen.no/contentassets/589aa9f4e14540b5a5a6144aaea7b518/action-plan-against-racism-and-discrimination_uu.pdf
              
            "><span data-dcnode-id="1520" instrument_node="">2020</span></a><span data-dcnode-id="1518" instrument_node="">). However, in the action plan that has been put together to combat racism and discrimination of ethnic and religious minorities, it can still be important for the Norwegian government to have strategies that can address the perpetration of racial injustices and inequalities in the interactions that take place between minority and majority youth and the rest of the society.</span></p><p data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">As for practice, strategies that can facilitate character strengths and interpersonal competences among youth can be implemented in schools and other youth contexts that bring together young people of diverse races and origins. Our findings and earlier ones suggest that diversity values, moral expertise, ethical skills, and other interpersonal competences that reflect character strengths are vital for contribution to societal welfare. Intervention strategies in the youth contexts that focus on these strengths will not only be preventing prejudice, discrimination, and racism, but these strategies can enable youth from both minority and majority backgrounds to embrace a climate of anti-racism and collaborate effectively in civic engagements. This is needed as both multicultural societies and societal challenges grow.</span></p><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">In conclusion, research indicates that contribution to community and global development is guided by character strengths, virtues that also consider the needs and wants of others. This consideration for the other person can represent essential intercultural competence needed by young people to collaborate on societal challenges with peers from diverse backgrounds. As societal challenges continue to multiply and intensify, not only will the role of young people become even more important but their ability to collaborate effectively with people of all races and origins as well. Character, as a thriving indicator, has implications for personal development and societal functioning. Thus, the possession of character strengths can enable the youth to avoid barriers related to prejudice, discrimination, and racism and adopt an anti-racism milieu that can facilitate effective collaboration. However, Character would need to be a topic of further research in cross-cultural investigations to uncover and advance the aspects of Character that facilitate interpersonal competence and effective collaboration among all youth, irrespective of their race, creed, or color.</span></p></div></div></section><span data-dcnode-id="1509" instrument_node="">
