</span><section aria-labelledby="Abs1" data-dcnode-id="1995" data-gtm-vis-first-on-screen-50443292_562="860" data-gtm-vis-first-on-screen-50443292_563="861" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="860" data-gtm-vis-recent-on-screen-50443292_563="861" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="1996" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2021" id="Abs1"><span data-dcnode-id="2022" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="1997" id="Abs1-content"><p data-dcnode-id="2016"><span data-dcnode-id="2020" instrument_node="">Young people’s contribution to community development and global affairs, such as environmental sustenance, is essential. Participation in these different forms of civic engagement will require the collective efforts of the youth. As societies around the globe continue to grow culturally diverse, young people will need to see beyond prejudice, discrimination, and racism to collaborate with others from different races and cultures for the common good. Within the Positive Youth Development framework, these collaborative and interpersonal competences have been referred to as </span><i data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">Character</span></i><span data-dcnode-id="2017" instrument_node=""> (e.g., valuing cultural and ethnical diversity). Accordingly, youth with enhanced skills in Character are also expected to support anti-racism and collaborate to contribute to their society. In the present chapter, the extent to which youth living in Norway report indicators of Character is investigated and then looked at in relation to their civic engagement (i.e., contribution to local, community, and global affairs). Findings based on a cross-sectional data of 220 Norwegian students (52% males) indicated relatively high scores on Character. In addition, Character as a reflection of four facets, behavioral conduct, social conscience, positive values, and diversity values, was associated with engagement in local (helping friends and neighbors), community (making community a better place), and global (making effort to conserve energy and protect the environment) affairs. When considered as individual facets, the diversity values facet was important for all three forms of civic engagement, while behavioral conduct and social conscience were essential for engagement in global affair. Supportive of earlier research, the current findings suggest that Character does matter, when it comes to youth contribution to civic development. Thus, the findings can potentially inform policy and practice that seek to address prejudice, discrimination, and racism and facilitate collaboration among youth from diverse races, cultures, and origins toward contribution to the common good of society.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">Keywords</span></h3><ul class="c-article-subject-list" data-dcnode-id="1998"><li class="c-article-subject-list__subject" data-dcnode-id="2011"><span data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">Character</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2008"><span data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">Diversity values</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2005"><span data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Civic engagement</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2002"><span data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">Youth</span></span></li><li class="
