</span><div class="hatnote navigation-not-searchable" data-dcnode-id="3411" role="note"><span data-dcnode-id="3415" instrument_node="">Not to be confused with </span><a data-dcnode-id="3413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Community_engagement" title="Community engagement"><span data-dcnode-id="3414" instrument_node="">Community engagement</span></a><span data-dcnode-id="3412" instrument_node="">.</span></div><span data-dcnode-id="3410" instrument_node="">
</span><link data-dcnode-id="3409" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3404" role="note"><span data-dcnode-id="3408" instrument_node="">"Civic duty" redirects here. For the film, see </span><a data-dcnode-id="3406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civic_Duty_%28film%29" title="Civic Duty (film)"><span data-dcnode-id="3407" instrument_node="">Civic Duty (film)</span></a><span data-dcnode-id="3405" instrument_node="">.</span></div><span data-dcnode-id="3403" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3389"><div class="thumbinner" data-dcnode-id="3390" style="width:222px;"><a class="image" data-dcnode-id="3401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACI_boardwalk_Sandy_sweepers_jeh.jpg"><img alt="" class="thumbimage" data-dcnode-id="3402" data-file-height="2596" data-file-width="3300" decoding="async" height="173" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/62/CI_boardwalk_Sandy_sweepers_jeh.jpg/220px-CI_boardwalk_Sandy_sweepers_jeh.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/62/CI_boardwalk_Sandy_sweepers_jeh.jpg/330px-CI_boardwalk_Sandy_sweepers_jeh.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/62/CI_boardwalk_Sandy_sweepers_jeh.jpg/440px-CI_boardwalk_Sandy_sweepers_jeh.jpg 2x" width="220"></a><span data-dcnode-id="3400" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3391"><div class="magnify" data-dcnode-id="3398"><a class="internal" data-dcnode-id="3399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACI_boardwalk_Sandy_sweepers_jeh.jpg" title="Enlarge"></a></div><a class="mw-redirect" data-dcnode-id="3396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Volunteer" title="Volunteer"><span data-dcnode-id="3397" instrument_node="">Volunteering</span></a><span data-dcnode-id="3395" instrument_node=""> is an important type of civic engagement. Pictured are volunteers cleaning up after the 2012 </span><a data-dcnode-id="3393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hurricane_Sandy" title="Hurricane Sandy"><span data-dcnode-id="3394" instrument_node="">Hurricane Sandy</span></a><span data-dcnode-id="3392" instrument_node="">.</span></div></div></div><span data-dcnode-id="3388" instrument_node="">
</span><p data-dcnode-id="3377"><b data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">Civic engagement</span></b><span data-dcnode-id="3385" instrument_node=""> or </span><b data-dcnode-id="3383"><span data-dcnode-id="3384" instrument_node="">civic participation</span></b><span data-dcnode-id="3382" instrument_node=""> is any individual or group activity addressing issues of public concern.</span><sup class="reference" data-dcnode-id="3379" id="cite_ref-1"><a data-dcnode-id="3380" href="#cite_note-1"><span data-dcnode-id="3381" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3378" instrument_node="">  Civic engagement includes communities working together or individuals working alone in both political and non-political actions to protect public values or make a change in a community. The goal of civic engagement is to address public concerns and promote the quality of the community.
</span></p><p data-dcnode-id="3358"><span data-dcnode-id="3376" instrument_node="">Civic engagement is "a process in which people take collective action to address issues of public concern" and is "instrumental to </span><a data-dcnode-id="3374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democracy" title="Democracy"><span data-dcnode-id="3375" instrument_node="">democracy</span></a><span data-dcnode-id="3373" instrument_node="">" (Checkoway &amp; Aldana, 2012).</span><sup class="reference" data-dcnode-id="3370" id="cite_ref-2"><a data-dcnode-id="3371" href="#cite_note-2"><span data-dcnode-id="3372" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3369" instrument_node=""> Underrepresentation of groups in the government causes issues faced by groups such as </span><a data-dcnode-id="3367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minority_group" title="Minority group"><span data-dcnode-id="3368" instrument_node="">minority</span></a><span data-dcnode-id="3366" instrument_node="">, </span><a data-dcnode-id="3364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disadvantaged" title="Disadvantaged"><span data-dcnode-id="3365" instrument_node="">low-income</span></a><span data-dcnode-id="3363" instrument_node="">, and younger groups to be overlooked or ignored. In turn, issues for higher voting groups are addressed more frequently, causing more bills to be passed to fix these problems (Griffin &amp; Newman, 2008).</span><sup class="reference" data-dcnode-id="3360" id="cite_ref-3"><a data-dcnode-id="3361" href="#cite_note-3"><span data-dcnode-id="3362" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3359" instrument_node="">
</span></p><span data-dcnode-id="3357" instrument_node="">

</span><h2 data-dcnode-id="3059"><span class="mw-headline" data-dcnode-id="3067" id="Forms"><span data-dcnode-id="3068" instrument_node="">Forms</span></span><span class="mw-editsection" data-dcnode-id="3060"><span class="mw-editsection-bracket" data-dcnode-id="3065"><span data-dcnode-id="3066" instrument_node="">[</span></span><a data-dcnode-id="3063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D1" title="Edit section: Forms"><span data-dcnode-id="3064" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3058" instrument_node="">
</span><p data-dcnode-id="3034"><span data-dcnode-id="3057" instrument_node="">Civic engagement can take many forms—from individual </span><a class="mw-redirect" data-dcnode-id="3055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Volunteerism" title="Volunteerism"><span data-dcnode-id="3056" instrument_node="">volunteerism</span></a><span data-dcnode-id="3054" instrument_node="">, community engagement efforts, organizational involvement and government work such as electoral participation. These engagements may include directly addressing a problem through personal work, community based, or work through the institutions of </span><a data-dcnode-id="3052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Representative_democracy" title="Representative democracy"><span data-dcnode-id="3053" instrument_node="">representative democracy</span></a><span data-dcnode-id="3051" instrument_node="">.</span><sup class="reference" data-dcnode-id="3048" id="cite_ref-4"><a data-dcnode-id="3049" href="#cite_note-4"><span data-dcnode-id="3050" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3047" instrument_node=""> Many individuals feel a sense of personal responsibility to actively engage in their community. "Youth civic engagement" has similar aims to develop the community environment and cultivate relationships, although youth civic engagement emphasizes on empowering youth. A study published by the Center for Information &amp; Research on Civic Learning &amp; Engagement at Tufts University categorized civic engagement into three categories: civic, electoral, and political voice.</span><sup class="reference" data-dcnode-id="3044" id="cite_ref-Keeter2002_5-0"><a data-dcnode-id="3045" href="#cite_note-Keeter2002-5"><span data-dcnode-id="3046" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3043" instrument_node=""> Scholars of youth engagement online have called for a broader interpretation of civic engagement that focuses on the purpose behind current institutions and activities and includes emerging institutions and activities that achieve the same purposes.</span><sup class="reference" data-dcnode-id="3040" id="cite_ref-Middaugh2012_6-0"><a data-dcnode-id="3041" href="#cite_note-Middaugh2012-6"><span data-dcnode-id="3042" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3039" instrument_node=""> A journal published by the Journal of Transformative Education suggests the gap in participation forms between different generations.</span><sup class="reference" data-dcnode-id="3036" id="cite_ref-7"><a data-dcnode-id="3037" href="#cite_note-7"><span data-dcnode-id="3038" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3035" instrument_node=""> These civic engagement researchers suggest that the reduction of civic life into small sets of explicitly electoral behaviors may be insufficient to describe the full spectrum of public involvement in civic life.

</span></td><td data-dcnode-id="2942"><span data-dcnode-id="2946" instrument_node="">Written petitions and </span><a data-dcnode-id="2944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canvassing" title="Canvassing"><span data-dcnode-id="2945" instrument_node="">canvassing</span></a><span data-dcnode-id="2943" instrument_node="">
</span></td></tr><tr data-dcnode-id="2928"><td data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node="">Symbolic Non-Participation
</span></td><td data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">
</span></td><td data-dcnode-id="2929"><a data-dcnode-id="2931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boycott" title="Boycott"><span data-dcnode-id="2932" instrument_node="">Boycotting</span></a><span data-dcnode-id="2930" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="2925" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2916"><div class="thumbinner" data-dcnode-id="2917" style="width:304px;"><a class="image" data-dcnode-id="2923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACivic_Engagement.jpg"><img alt="" class="thumbimage" data-dcnode-id="2924" data-file-height="720" data-file-width="1280" decoding="async" height="170" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Civic_Engagement.jpg/302px-Civic_Engagement.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Civic_Engagement.jpg/453px-Civic_Engagement.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Civic_Engagement.jpg/604px-Civic_Engagement.jpg 2x" width="302"></a><span data-dcnode-id="2922" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2918"><div class="magnify" data-dcnode-id="2920"><a class="internal" data-dcnode-id="2921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACivic_Engagement.jpg" title="Enlarge"></a></div><span data-dcnode-id="2919" instrument_node="">An example of civic engagement, in the form of phone banking</span></div></div></div><span data-dcnode-id="2915" instrument_node="">
</span><p data-dcnode-id="2902"><span data-dcnode-id="2914" instrument_node="">Civic engagement reform arose at the beginning of the 21st century after </span><a class="mw-redirect" data-dcnode-id="2912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Putnam" title="Robert Putnam"><span data-dcnode-id="2913" instrument_node="">Robert Putnam</span></a><span data-dcnode-id="2911" instrument_node="">'s book </span><i data-dcnode-id="2908"><a data-dcnode-id="2909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bowling_Alone" title="Bowling Alone"><span data-dcnode-id="2910" instrument_node="">Bowling Alone</span></a></i><span data-dcnode-id="2907" instrument_node=""> brought to light changes in civic participation patterns. Putnam argued that despite rapid increases in higher education opportunities that may foster civic engagement, Americans were dropping out of political and organized community life. A number of studies suggested that while more youth are volunteering, fewer are voting or becoming politically engaged.</span><sup class="reference" data-dcnode-id="2904" id="cite_ref-8"><a data-dcnode-id="2905" href="#cite_note-8"><span data-dcnode-id="2906" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2903" instrument_node="">
</span></p><span data-dcnode-id="2901" instrument_node="">
</span><h2 data-dcnode-id="2891"><span class="mw-headline" data-dcnode-id="2899" id="Role_of_volunteerism_in_transforming_governance"><span data-dcnode-id="2900" instrument_node="">Role of volunteerism in transforming governance</span></span><span class="mw-editsection" data-dcnode-id="2892"><span class="mw-editsection-bracket" data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">[</span></span><a data-dcnode-id="2895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D2" title="Edit section: Role of volunteerism in transforming governance"><span data-dcnode-id="2896" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2890" instrument_node="">
</span><p data-dcnode-id="2881"><span data-dcnode-id="2889" instrument_node="">The State of the World's Volunteerism Report 2015, the first global review of the power of volunteer voices to help improve the way people are governed, draws on evidence from countries as diverse as Brazil, Kenya, Lebanon and Bangladesh. The United Nations report shows how ordinary people are volunteering their time, energies and skills to improve the way they are governed and engaged at local, national and global levels. Better governance at every level is a pre-requisite for the success of the new set of targets for future international development, the </span><a data-dcnode-id="2887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sustainable_Development_Goals" title="Sustainable Development Goals"><span data-dcnode-id="2888" instrument_node="">Sustainable Development Goals</span></a><span data-dcnode-id="2886" instrument_node="">, which has been agreed upon by the United Nations in September 2015.</span><sup class="reference" data-dcnode-id="2883" id="cite_ref-9"><a data-dcnode-id="2884" href="#cite_note-9"><span data-dcnode-id="2885" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2882" instrument_node="">
</span></p><p data-dcnode-id="2866"><span data-dcnode-id="2880" instrument_node="">At the global level, for instance, a diverse group of 37 </span><a class="mw-redirect" data-dcnode-id="2878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Online_volunteering" title="Online volunteering"><span data-dcnode-id="2879" instrument_node="">online volunteers</span></a><span data-dcnode-id="2877" instrument_node=""> from across the globe engaged in 4 months of intense collaboration with the </span><a class="mw-redirect" data-dcnode-id="2875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Department_of_Economic_Affairs" title="United Nations Department of Economic Affairs"><span data-dcnode-id="2876" instrument_node="">United Nations Department of Economic Affairs</span></a><span data-dcnode-id="2874" instrument_node=""> (UN DESA) to process 386 research surveys carried out across 193 UN Member States for the 2014 UN </span><a class="mw-redirect" data-dcnode-id="2872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/E-Government" title="E-Government"><span data-dcnode-id="2873" instrument_node="">E-Government</span></a><span data-dcnode-id="2871" instrument_node=""> Survey. The diversity of nationalities and languages of the online volunteers</span><sup class="reference" data-dcnode-id="2868" id="cite_ref-10"><a data-dcnode-id="2869" href="#cite_note-10"><span data-dcnode-id="2870" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2867" instrument_node="">—more than 65 languages, 15 nationalities, of which half are from developing countries—mirrors the mission of the survey.
</span></p><span data-dcnode-id="2865" instrument_node="">
</span><h2 data-dcnode-id="2855"><span class="mw-headline" data-dcnode-id="2863" id="Benefits_and_challenges"><span data-dcnode-id="2864" instrument_node="">Benefits and challenges</span></span><span class="mw-editsection" data-dcnode-id="2856"><span class="mw-editsection-bracket" data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">[</span></span><a data-dcnode-id="2859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D3" title="Edit section: Benefits and challenges"><span data-dcnode-id="2860" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2854" instrument_node="">
</span><p data-dcnode-id="2849"><span data-dcnode-id="2853" instrument_node="">Civic engagement, in general, can foster community participation and government involvement, according to </span><i data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">ICMA: Leaders at the Core of Better Communities</span></i><span data-dcnode-id="2850" instrument_node="">.
</span></p><p data-dcnode-id="2843"><span data-dcnode-id="2848" instrument_node="">The specific benefits of civic engagement are:</span><sup class="reference" data-dcnode-id="2845" id="cite_ref-11"><a data-dcnode-id="2846" href="#cite_note-11"><span data-dcnode-id="2847" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2844" instrument_node="">
</span></p><span data-dcnode-id="2842" instrument_node="">
</span><ul data-dcnode-id="2818"><li data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">Achieving greater buy-in to decisions with fewer backlashes such as lawsuits, special elections, or a council recall.</span></li><span data-dcnode-id="2839" instrument_node="">
</span><li data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">Engendering trust between citizens and government, which improves public behavior at council meetings.</span></li><span data-dcnode-id="2836" instrument_node="">
</span><li data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">Attaining successful outcomes on complex issues, which helps elected officials avoid choosing between equally unappealing solutions.</span></li><span data-dcnode-id="2833" instrument_node="">
</span><li data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">Developing more creative ideas and better solutions.</span></li><span data-dcnode-id="2830" instrument_node="">
</span><li data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">Implementing ideas, programs, and policies faster and more easily.</span></li><span data-dcnode-id="2827" instrument_node="">
</span><li data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">Creating involved citizens than demanding customers.</span></li><span data-dcnode-id="2824" instrument_node="">
</span><li data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">Building a community within a city.</span></li><span data-dcnode-id="2821" instrument_node="">
</span><li data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">Making jobs easier and more relaxing.</span></li></ul><span data-dcnode-id="2817" instrument_node="">
</span><p data-dcnode-id="2811"><span data-dcnode-id="2816" instrument_node="">While there are benefits to civic engagement, there are challenges to be considered. These challenges include the various factors the ICMA describes. For example, distrust, role clarification, and time all play a role in challenges of civic engagement:</span><sup class="reference" data-dcnode-id="2813" id="cite_ref-:0_12-0"><a data-dcnode-id="2814" href="#cite_note-:0-12"><span data-dcnode-id="2815" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2812" instrument_node="">
</span></p><span data-dcnode-id="2810" instrument_node="">
</span><ul data-dcnode-id="2804"><li data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">Civic engagement often takes longer to show results than direct government action. In the long run, public reactions to government policy or legal decisions can lead to faster change than government involvement in lawsuits or ballot initiatives.</span></li><span data-dcnode-id="2807" instrument_node="">
</span><li data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">For civic engagement to succeed, a layer of transparency and trust between the government and its citizens is needed.</span></li></ul><span data-dcnode-id="2803" instrument_node="">
</span><h2 data-dcnode-id="2793"><span class="mw-headline" data-dcnode-id="2801" id="Local_civic_engagement"><span data-dcnode-id="2802" instrument_node="">Local civic engagement</span></span><span class="mw-editsection" data-dcnode-id="2794"><span class="mw-editsection-bracket" data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">[</span></span><a data-dcnode-id="2797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D4" title="Edit section: Local civic engagement"><span data-dcnode-id="2798" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2792" instrument_node="">
</span><p data-dcnode-id="2787"><span data-dcnode-id="2791" instrument_node="">Within local communities, there are many opportunities for citizens to participate in civic engagement. Volunteering personal time to community projects is widely believed to support the growth of a community as a whole. </span><a data-dcnode-id="2789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Community_engagement" title="Community engagement"><span data-dcnode-id="2790" instrument_node="">Community engagement</span></a><span data-dcnode-id="2788" instrument_node=""> could be found at food pantries, community clean-up programs, and the like, bolstering efforts for a strong community bond.
</span></p><span data-dcnode-id="2786" instrument_node="">
</span><h3 data-dcnode-id="2776"><span class="mw-headline" data-dcnode-id="2784" id="Community_collaboration"><span data-dcnode-id="2785" instrument_node="">Community collaboration</span></span><span class="mw-editsection" data-dcnode-id="2777"><span class="mw-editsection-bracket" data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">[</span></span><a data-dcnode-id="2780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D5" title="Edit section: Community collaboration"><span data-dcnode-id="2781" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2775" instrument_node="">
</span><p data-dcnode-id="2766"><span data-dcnode-id="2774" instrument_node="">Community collaboration includes democratic spaces where people are open to discuss concerns for particular issues regarding </span><a data-dcnode-id="2772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_interest" title="Public interest"><span data-dcnode-id="2773" instrument_node="">public interest</span></a><span data-dcnode-id="2771" instrument_node=""> and means to make the changes necessary. These spaces are often resource centers, such as neighborhood associations or school boards where citizens can obtain information regarding the community (upcoming changes, proposed solutions to existing problems, etc.). Colleges and universities are also offering more opportunities and expecting more students to engage in community volunteer work.</span><sup class="reference" data-dcnode-id="2768" id="cite_ref-13"><a data-dcnode-id="2769" href="#cite_note-13"><span data-dcnode-id="2770" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2767" instrument_node="">
</span></p><p data-dcnode-id="2760"><span data-dcnode-id="2765" instrument_node="">According to a case study conducted in a U.S college in September 2014, there are pivotal leadership qualities that contribute to the development of civic engagement. The study mentions 3 main themes: active, adaptive, and resilient leadership, learning for leadership and engagement for the greater good as the main reasons for the success of The Democracy Commitment (TDC) in the college. TDC is a national initiative that intends to help U.S community colleges educate their students for democracy.</span><sup class="reference" data-dcnode-id="2762" id="cite_ref-14"><a data-dcnode-id="2763" href="#cite_note-14"><span data-dcnode-id="2764" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2761" instrument_node="">
</span></p><p data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">Political participation is another key element that is practiced with regularity. Involvement in public council meeting sessions for discussions informs citizens of necessities and changes that need to be made. Casting an informed vote at the local level can change many things that affect day-to-day life.
</span></p><p data-dcnode-id="2749"><span data-dcnode-id="2757" instrument_node="">Online engagement allows citizens to be involved in their local government that they would not have otherwise by allowing them to voice themselves from the comfort of their own homes. Online engagement involves things such as online voting and public discussion forums that give citizens the opportunity to voice their opinions on topics and offer solutions as well as find others with common interests and create the possibility of forming </span><a data-dcnode-id="2755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Advocacy_group" title="Advocacy group"><span data-dcnode-id="2756" instrument_node="">advocacy groups</span></a><span data-dcnode-id="2754" instrument_node=""> pertaining to particular interests. The use of the internet has allowed for people to have access to information easily and has resulted in a better-informed public as well as creating a new sense of community for citizens.</span><sup class="reference" data-dcnode-id="2751" id="cite_ref-15"><a data-dcnode-id="2752" href="#cite_note-15"><span data-dcnode-id="2753" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2750" instrument_node="">
</span></p><span data-dcnode-id="2748" instrument_node="">
</span><h2 data-dcnode-id="2738"><span class="mw-headline" data-dcnode-id="2746" id="In_the_role_of_state_government"><span data-dcnode-id="2747" instrument_node="">In the role of state government</span></span><span class="mw-editsection" data-dcnode-id="2739"><span class="mw-editsection-bracket" data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">[</span></span><a data-dcnode-id="2742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D6" title="Edit section: In the role of state government"><span data-dcnode-id="2743" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2737" instrument_node="">
</span><p data-dcnode-id="2731"><span data-dcnode-id="2736" instrument_node="">People who serve state governments learn what the community needs through listening to citizens and thus make nuanced decisions. According to Miriam Porter, "turmoil, suspicion, and reduction of public trust" occur with the lack of communication.</span><sup class="reference" data-dcnode-id="2733" id="cite_ref-16"><a data-dcnode-id="2734" href="#cite_note-16"><span data-dcnode-id="2735" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2732" instrument_node=""> Civic engagement has an interrelated relationship within the various entities of the state.Values, knowledge, liberties, skills, ideas, attitudes, and beliefs the population holds are essential to civic engagement in terms of the representation of vast cultural, social, and economic identities.
</span></p><p data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">Civic engagement applied within the state requires local civic engagement. Citizens are the basis of representative democracy. Application of this principle can be found within programs and laws that states have implemented based on a variety of areas concerning that particular state. Health, education, equality, immigration are a few examples of entities that civic engagement can shape within a state.
</span></p><span data-dcnode-id="2728" instrument_node="">
</span><h3 data-dcnode-id="2718"><span class="mw-headline" data-dcnode-id="2726" id="Application_in_health"><span data-dcnode-id="2727" instrument_node="">Application in health</span></span><span class="mw-editsection" data-dcnode-id="2719"><span class="mw-editsection-bracket" data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">[</span></span><a data-dcnode-id="2722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D7" title="Edit section: Application in health"><span data-dcnode-id="2723" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2720"><span data-dcnode-id="2721" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2717" instrument_node="">
</span><p data-dcnode-id="2711"><span data-dcnode-id="2716" instrument_node="">States implement public health programs to better benefit the needs of the society. The State Child Health Insurance Program (SCHIP), for example, is the largest public investment in child health care aiding over 11 million uninsured children in the United States. "This statewide health insurance program for low-income children was associated with improved access, utilization, and quality of care, suggesting that SCHIP has the potential to improve health care for low-income American children".</span><sup class="reference" data-dcnode-id="2713" id="cite_ref-17"><a data-dcnode-id="2714" href="#cite_note-17"><span data-dcnode-id="2715" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2712" instrument_node=""> States take part in the program and sculpt it to better fit the needs of that state's demographics, making their healthcare and the civic engagement process of individuals that take part in the program as well help reform and fix it apart of the state's identity.
</span></p><span data-dcnode-id="2710" instrument_node="">
</span><h3 data-dcnode-id="2700"><span class="mw-headline" data-dcnode-id="2708" id="In_comparison_with_other_countries"><span data-dcnode-id="2709" instrument_node="">In comparison with other countries</span></span><span class="mw-editsection" data-dcnode-id="2701"><span class="mw-editsection-bracket" data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">[</span></span><a data-dcnode-id="2704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D8" title="Edit section: In comparison with other countries"><span data-dcnode-id="2705" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2699" instrument_node="">
</span><p data-dcnode-id="2693"><span data-dcnode-id="2698" instrument_node="">States practicing public involvement and implementing public health programs to better benefit the needs of the society is a concept that is shared by other countries, such as England. A study conducted by Department of Primary Care, University of Liverpool, the Department of Social Medicine, University of Bristol, the Department of Geography and Geology, McMaster Institute of Environment and Health, McMaster University, Avon Health Authority, the School of Journalism, Tom Hopkinson Centre for Media Research, Media and Cultural Studies, Cardiff University, and the Department of Clinical Epidemiology and Biostatistics, Centre for Health Economics and Policy Analysis, McMaster University stated that "There are a number of impulses towards public participation in health care decision making including instrumentalist, communitarian, educative and expressive impulses and the desire for increased accountability".</span><sup class="reference" data-dcnode-id="2695" id="cite_ref-Litva,_Andrea_2002_18-0"><a data-dcnode-id="2696" href="#cite_note-Litva,_Andrea_2002-18"><span data-dcnode-id="2697" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2694" instrument_node="">
</span></p><p data-dcnode-id="2687"><span data-dcnode-id="2692" instrument_node="">Their research included a critical examination of the degree of involvement by the public in healthcare decision making. It is suggested that "public participation in decision making can promote goals, bind individuals or groups together, impart a sense of competence and responsibility and help express political or civic identity".</span><sup class="reference" data-dcnode-id="2689" id="cite_ref-Litva,_Andrea_2002_18-1"><a data-dcnode-id="2690" href="#cite_note-Litva,_Andrea_2002-18"><span data-dcnode-id="2691" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2688" instrument_node=""> The action of the citizens aimed at influencing decisions of representatives ultimately affects the state as a whole. Voting is a key component in civic engagement for the voice of the masses to be heard.
</span></p><span data-dcnode-id="2686" instrument_node="">
</span><h3 data-dcnode-id="2676"><span class="mw-headline" data-dcnode-id="2684" id="Importance_of_voter_turnout"><span data-dcnode-id="2685" instrument_node="">Importance of voter turnout</span></span><span class="mw-editsection" data-dcnode-id="2677"><span class="mw-editsection-bracket" data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">[</span></span><a data-dcnode-id="2680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D9" title="Edit section: Importance of voter turnout"><span data-dcnode-id="2681" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2675" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2666"><div class="thumbinner" data-dcnode-id="2667" style="width:222px;"><a class="image" data-dcnode-id="2673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AI_voted_on_November_8_2016.jpg"><img alt="" class="thumbimage" data-dcnode-id="2674" data-file-height="1936" data-file-width="2592" decoding="async" height="164" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/00/I_voted_on_November_8_2016.jpg/220px-I_voted_on_November_8_2016.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/00/I_voted_on_November_8_2016.jpg/330px-I_voted_on_November_8_2016.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/00/I_voted_on_November_8_2016.jpg/440px-I_voted_on_November_8_2016.jpg 2x" width="220"></a><span data-dcnode-id="2672" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2668"><div class="magnify" data-dcnode-id="2670"><a class="internal" data-dcnode-id="2671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AI_voted_on_November_8_2016.jpg" title="Enlarge"></a></div><span data-dcnode-id="2669" instrument_node="">Voter turn out sticker</span></div></div></div><span data-dcnode-id="2665" instrument_node="">
</span><p data-dcnode-id="2659"><span data-dcnode-id="2664" instrument_node="">The goal for state government in elections is to promote civic engagement. Director Regina Lawrence of Annette Strauss Institute for Civic Life states "Politics and all other forms of engagement are really about trying to make your community, your state, and your nation a better place to live."</span><sup class="reference" data-dcnode-id="2661" id="cite_ref-19"><a data-dcnode-id="2662" href="#cite_note-19"><span data-dcnode-id="2663" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2660" instrument_node=""> Voter Turnout ensures civic engagement among the state with incentives that promises volunteer organizations, charity, and political involvement with everyone in the community who will have a voice to be heard.
</span></p><p data-dcnode-id="2653"><span data-dcnode-id="2658" instrument_node="">The state can help promote civic engagement by ensuring fair voter and redistricting processes; by building partnerships among government agencies, non-profit organizations, and private citizens; and by maintaining networks of information about volunteer and charitable opportunities.</span><sup class="reference" data-dcnode-id="2655" id="cite_ref-vaperforms.virginia.gov_20-0"><a data-dcnode-id="2656" href="#cite_note-vaperforms.virginia.gov-20"><span data-dcnode-id="2657" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2654" instrument_node="">
</span></p><p data-dcnode-id="2644"><span data-dcnode-id="2652" instrument_node="">One of the main factors that determine civic engagement among the people is </span><a data-dcnode-id="2650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voter_turnout" title="Voter turnout"><span data-dcnode-id="2651" instrument_node="">voter turnout</span></a><span data-dcnode-id="2649" instrument_node="">. Voter turnout gauges citizens' level of political involvement, an important component of civic engagement—and a prerequisite for maintaining public accountability.</span><sup class="reference" data-dcnode-id="2646" id="cite_ref-vaperforms.virginia.gov_20-1"><a data-dcnode-id="2647" href="#cite_note-vaperforms.virginia.gov-20"><span data-dcnode-id="2648" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2645" instrument_node="">
</span></p><span data-dcnode-id="2643" instrument_node="">
</span><h4 data-dcnode-id="2633"><span class="mw-headline" data-dcnode-id="2641" id="Example_of_high_voter_turnout"><span data-dcnode-id="2642" instrument_node="">Example of high voter turnout</span></span><span class="mw-editsection" data-dcnode-id="2634"><span class="mw-editsection-bracket" data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">[</span></span><a data-dcnode-id="2637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D10" title="Edit section: Example of high voter turnout"><span data-dcnode-id="2638" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2632" instrument_node="">
</span><ul data-dcnode-id="2620"><li data-dcnode-id="2627"><span data-dcnode-id="2631" instrument_node="">The state can help promote civic engagement by ensuring fair voter and redistricting processes; by building partnerships among government agencies, non-profit organizations, and private citizens; and by maintaining networks of information about volunteer and charitable opportunities.</span><sup class="reference" data-dcnode-id="2628" id="cite_ref-vaperforms.virginia.gov_20-2"><a data-dcnode-id="2629" href="#cite_note-vaperforms.virginia.gov-20"><span data-dcnode-id="2630" instrument_node="">[20]</span></a></sup></li><span data-dcnode-id="2626" instrument_node="">
</span><li data-dcnode-id="2621"><span data-dcnode-id="2625" instrument_node="">Access to information about government activities, decision-making, solicit and use public input, and encourage public employees to donate and serve.</span><sup class="reference" data-dcnode-id="2622" id="cite_ref-vaperforms.virginia.gov_20-3"><a data-dcnode-id="2623" href="#cite_note-vaperforms.virginia.gov-20"><span data-dcnode-id="2624" instrument_node="">[20]</span></a></sup></li></ul><span data-dcnode-id="2619" instrument_node="">
</span><h4 data-dcnode-id="2609"><span class="mw-headline" data-dcnode-id="2617" id="Example_of_low_voter_turnout"><span data-dcnode-id="2618" instrument_node="">Example of low voter turnout</span></span><span class="mw-editsection" data-dcnode-id="2610"><span class="mw-editsection-bracket" data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">[</span></span><a data-dcnode-id="2613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D11" title="Edit section: Example of low voter turnout"><span data-dcnode-id="2614" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2608" instrument_node="">
</span><ul data-dcnode-id="2602"><li data-dcnode-id="2603"><span data-dcnode-id="2607" instrument_node="">Low participation with politics in the state and local government can result in less community involvement such as a lack of funding and leadership directed toward that issue of community involvement.</span><sup class="reference" data-dcnode-id="2604" id="cite_ref-21"><a data-dcnode-id="2605" href="#cite_note-21"><span data-dcnode-id="2606" instrument_node="">[21]</span></a></sup></li></ul><span data-dcnode-id="2601" instrument_node="">
</span><h2 data-dcnode-id="2591"><span class="mw-headline" data-dcnode-id="2599" id="In_marginalized_communities"><span data-dcnode-id="2600" instrument_node="">In marginalized communities</span></span><span class="mw-editsection" data-dcnode-id="2592"><span class="mw-editsection-bracket" data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">[</span></span><a data-dcnode-id="2595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D12" title="Edit section: In marginalized communities"><span data-dcnode-id="2596" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2590" instrument_node="">
</span><p data-dcnode-id="2576"><span data-dcnode-id="2589" instrument_node="">Marginalized is defined as "to put or keep (someone) in a powerless or unimportant position within a society or group" according to Merriam-Webster.</span><sup class="reference" data-dcnode-id="2586" id="cite_ref-22"><a data-dcnode-id="2587" href="#cite_note-22"><span data-dcnode-id="2588" instrument_node="">[22]</span></a></sup><span data-dcnode-id="2585" instrument_node=""> In diverse communities it is perceived that awareness and participation according to a study, using three different types of community service for the interaction between diverse individuals and understanding each other's perspective and enhancing relationships within the community.</span><sup class="reference" data-dcnode-id="2582" id="cite_ref-23"><a data-dcnode-id="2583" href="#cite_note-23"><span data-dcnode-id="2584" instrument_node="">[23]</span></a></sup><span data-dcnode-id="2581" instrument_node=""> In addition, specifically black youth, there is an underlying gap of early civic education where there is lack of and where it thrives. According to Hope and Jagers, they studied civic engagement among black youth using data acquired from the Youth Culture Survey from the Black Youth Project. The assumption is that black youth who experience racial discrimination are fueled to be aware and participate in politics.</span><sup class="reference" data-dcnode-id="2578" id="cite_ref-24"><a data-dcnode-id="2579" href="#cite_note-24"><span data-dcnode-id="2580" instrument_node="">[24]</span></a></sup><span data-dcnode-id="2577" instrument_node="">
</span></p><p data-dcnode-id="2559"><span data-dcnode-id="2575" instrument_node="">Another study by Chan describes the effect of the association of development and environmental factors among a group of at-risk youth such as African-Americans and Latino participants who come from low-income families that dwell in inner-city neighborhoods. Their research resulted in variations according to their participants as the racial minority youth were motivated and had aspiring goals for their futures due to early participation in civic engagement activities, but there was no sufficient evidence that this type of mindset will follow them into their adulthood.</span><sup class="reference" data-dcnode-id="2572" id="cite_ref-25"><a data-dcnode-id="2573" href="#cite_note-25"><span data-dcnode-id="2574" instrument_node="">[25]</span></a></sup><span data-dcnode-id="2571" instrument_node=""> Looking into another oppressed group, Latinos, according to this report in the </span><i data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">New York Times</span></i><span data-dcnode-id="2568" instrument_node="">, states the number of Hispanics eligible to vote increased to an estimate of 10 million between 2000 and 2012, but there is a lack of taking an active approach toward dealing with the issues such as immigration and causing a stir within the Latino community. The Hispanic demographic is becoming a potential influence of power within political polls.</span><sup class="reference" data-dcnode-id="2565" id="cite_ref-26"><a data-dcnode-id="2566" href="#cite_note-26"><span data-dcnode-id="2567" instrument_node="">[26]</span></a></sup><span data-dcnode-id="2564" instrument_node=""> To expand on another group that is oppressed is immigrant parents and their children in Jensen's study their concentration is on Asia and Latin America. In its study. they sampled a small group from a metropolitan area, the difference between both generations varies as the children who were in high school which is 87.5% were stated to be civically engaged. The parents were not civically engaged in issues but developed "bicultural consciousness" such as sending money back to their original country of origin and these participants saw it as their duty in their current state of opportunity to be civically engaged.</span><sup class="reference" data-dcnode-id="2561" id="cite_ref-27"><a data-dcnode-id="2562" href="#cite_note-27"><span data-dcnode-id="2563" instrument_node="">[27]</span></a></sup><span data-dcnode-id="2560" instrument_node="">
</span></p><span data-dcnode-id="2558" instrument_node="">
</span><h2 data-dcnode-id="2548"><span class="mw-headline" data-dcnode-id="2556" id="Technology"><span data-dcnode-id="2557" instrument_node="">Technology</span></span><span class="mw-editsection" data-dcnode-id="2549"><span class="mw-editsection-bracket" data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">[</span></span><a data-dcnode-id="2552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D13" title="Edit section: Technology"><span data-dcnode-id="2553" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2547" instrument_node="">
</span><h3 data-dcnode-id="2537"><span class="mw-headline" data-dcnode-id="2545" id="Types"><span data-dcnode-id="2546" instrument_node="">Types</span></span><span class="mw-editsection" data-dcnode-id="2538"><span class="mw-editsection-bracket" data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">[</span></span><a data-dcnode-id="2541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D14" title="Edit section: Types"><span data-dcnode-id="2542" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2536" instrument_node="">
</span><h4 data-dcnode-id="2526"><span class="mw-headline" data-dcnode-id="2534" id="Television_use"><span data-dcnode-id="2535" instrument_node="">Television use</span></span><span class="mw-editsection" data-dcnode-id="2527"><span class="mw-editsection-bracket" data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">[</span></span><a data-dcnode-id="2530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D15" title="Edit section: Television use"><span data-dcnode-id="2531" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2525" instrument_node="">
</span><p data-dcnode-id="2517"><a data-dcnode-id="2523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_capital" title="Social capital"><span data-dcnode-id="2524" instrument_node="">Social capital</span></a><span data-dcnode-id="2522" instrument_node=""> has been on the decline for years and Putnam looked into why this is. One of the areas the study covered was television and its effects on social and civic engagements. Shah writes that Putnam found the more TV a person watches, the less they are active in outside activities. This is shown with the rise of TV in the 1960s and the fall of civic engagements. They found that though news and educational programming can actually aide in a citizen's knowledge, but the lack of engaging in outside activities and social events hurts civic engagement in general.</span><sup class="reference" data-dcnode-id="2519" id="cite_ref-28"><a data-dcnode-id="2520" href="#cite_note-28"><span data-dcnode-id="2521" instrument_node="">[28]</span></a></sup><span data-dcnode-id="2518" instrument_node="">
</span></p><p data-dcnode-id="2507"><span data-dcnode-id="2516" instrument_node="">Nowadays, the internet has become the main social media outlet. Xenos and Moy found that the internet does help civic engagement but also give "unjustifiable euphoria, abrupt and equally unjustifiable skepticism, and gradual realization that web-based human interaction really does have unique and politically significant properties".</span><sup class="reference" data-dcnode-id="2513" id="cite_ref-29"><a data-dcnode-id="2514" href="#cite_note-29"><span data-dcnode-id="2515" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2512" instrument_node=""> We have all the information we want about and candidate at our fingertips, and the wealth of information is creating a more informed body. But with this comes misinformation and the two collide and do the opposite, creating a public with clashing opinions.</span><sup class="reference" data-dcnode-id="2509" id="cite_ref-auto_30-0"><a data-dcnode-id="2510" href="#cite_note-auto-30"><span data-dcnode-id="2511" instrument_node="">[30]</span></a></sup><span data-dcnode-id="2508" instrument_node="">
</span></p><p data-dcnode-id="2501"><span data-dcnode-id="2506" instrument_node="">In relation to civic engagement and television use, there has been a push for civic engagement from television providers themselves. On September 22, 2020, WarnerMedia launched a nonpartisan voter engagement resource center, with the hopes of giving more citizens the access to vote and better understanding on how to do so.</span><sup class="reference" data-dcnode-id="2503" id="cite_ref-31"><a data-dcnode-id="2504" href="#cite_note-31"><span data-dcnode-id="2505" instrument_node="">[31]</span></a></sup><span data-dcnode-id="2502" instrument_node="">
</span></p><span data-dcnode-id="2500" instrument_node="">
</span><h4 data-dcnode-id="2490"><span class="mw-headline" data-dcnode-id="2498" id="E-Services"><span data-dcnode-id="2499" instrument_node="">E-Services</span></span><span class="mw-editsection" data-dcnode-id="2491"><span class="mw-editsection-bracket" data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">[</span></span><a data-dcnode-id="2494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D16" title="Edit section: E-Services"><span data-dcnode-id="2495" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2489" instrument_node="">
</span><p data-dcnode-id="2483"><span data-dcnode-id="2488" instrument_node="">The Knight Foundation outlines four different ways technology can assist in civic engagement. The four different ways include upgrading and providing e-services, making information more transparent, allowing e-democracy, and a service they call co-production.</span><sup class="reference" data-dcnode-id="2485" id="cite_ref-32"><a data-dcnode-id="2486" href="#cite_note-32"><span data-dcnode-id="2487" instrument_node="">[32]</span></a></sup><span data-dcnode-id="2484" instrument_node=""> E-services would allow digital technologies to improve the efficiency of urban services within a city. This would allow the services to become more effective as well as give the public a way to get involved. E-democracy and co-production would work by allowing citizens to shape public policy by allowing them to partake in actions through technology. The Knight Foundation claims technology can make information more transparent, allowing the public to access the information and get involved.
</span></p><span data-dcnode-id="2482" instrument_node="">
</span><h4 data-dcnode-id="2472"><span class="mw-headline" data-dcnode-id="2480" id="Social_Entrepreneurship"><span data-dcnode-id="2481" instrument_node="">Social Entrepreneurship</span></span><span class="mw-editsection" data-dcnode-id="2473"><span class="mw-editsection-bracket" data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">[</span></span><a data-dcnode-id="2476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D17" title="Edit section: Social Entrepreneurship"><span data-dcnode-id="2477" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2471" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2462"><div class="thumbinner" data-dcnode-id="2463" style="width:222px;"><a class="image" data-dcnode-id="2469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASocial_Media_Marketing_Strategy.jpg"><img alt="" class="thumbimage" data-dcnode-id="2470" data-file-height="514" data-file-width="960" decoding="async" height="118" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/72/Social_Media_Marketing_Strategy.jpg/220px-Social_Media_Marketing_Strategy.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/72/Social_Media_Marketing_Strategy.jpg/330px-Social_Media_Marketing_Strategy.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/72/Social_Media_Marketing_Strategy.jpg/440px-Social_Media_Marketing_Strategy.jpg 2x" width="220"></a><span data-dcnode-id="2468" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2464"><div class="magnify" data-dcnode-id="2466"><a class="internal" data-dcnode-id="2467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASocial_Media_Marketing_Strategy.jpg" title="Enlarge"></a></div><span data-dcnode-id="2465" instrument_node="">Social media platforms as channels for citizen discussions and for governments to reach audiences.</span></div></div></div><span data-dcnode-id="2461" instrument_node="">
</span><p data-dcnode-id="2455"><span data-dcnode-id="2460" instrument_node="">Social entrepreneurship has seen a major increase in activity in recent years. One example can be seen from Eric Gordon and Jessica Philippi, who released a study on their interactive online game for local engagement called Community PlanIt (CPI). The purpose of CPI is to improve civic engagement qualitatively, rather than focusing on increasing the number of citizens getting involved. The study concluded that CPI encourages reflective attitudes and mediates relationships of trust that are needed for functional and continued civic engagement.</span><sup class="reference" data-dcnode-id="2457" id="cite_ref-33"><a data-dcnode-id="2458" href="#cite_note-33"><span data-dcnode-id="2459" instrument_node="">[33]</span></a></sup><span data-dcnode-id="2456" instrument_node="">
</span></p><span data-dcnode-id="2454" instrument_node="">
</span><h4 data-dcnode-id="2444"><span class="mw-headline" data-dcnode-id="2452" id="Social_media"><span data-dcnode-id="2453" instrument_node="">Social media</span></span><span class="mw-editsection" data-dcnode-id="2445"><span class="mw-editsection-bracket" data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">[</span></span><a data-dcnode-id="2448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D18" title="Edit section: Social media"><span data-dcnode-id="2449" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2443" instrument_node="">
</span><p data-dcnode-id="2433"><span data-dcnode-id="2442" instrument_node="">There are handfuls of studies and journals that focus on the impact that social media has on civic engagement. In a study mentioned in a later section on civic engagement around the world, interviewees from Norway “generally use Facebook to invite people to some form of face-to-face meeting at the beginning of a community engagement - and to facilitate the ongoing engagement of participants”.</span><sup class="reference" data-dcnode-id="2439" id="cite_ref-:0_12-1"><a data-dcnode-id="2440" href="#cite_note-:0-12"><span data-dcnode-id="2441" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2438" instrument_node=""> Additional research demonstrates the capabilities of Facebook and other social networks in their enablement of civic participation. In Asia, a study was conducted focusing on the impact that the rise of Internet communication had on social capital. This study concluded that, while the Internet’s role is to provide citizens with more opportunities to contact each other, it does not play a role in increasing different measures of social capital such as trust. Furthermore, the study concluded that “social capital developed through voluntary participation in social organization has the greatest effectiveness in promoting all sorts of civic engagement".</span><sup class="reference" data-dcnode-id="2435" id="cite_ref-34"><a data-dcnode-id="2436" href="#cite_note-34"><span data-dcnode-id="2437" instrument_node="">[34]</span></a></sup><span data-dcnode-id="2434" instrument_node="">
</span></p><span data-dcnode-id="2432" instrument_node="">
</span><h3 data-dcnode-id="2422"><span class="mw-headline" data-dcnode-id="2430" id="Defining_factors"><span data-dcnode-id="2431" instrument_node="">Defining factors</span></span><span class="mw-editsection" data-dcnode-id="2423"><span class="mw-editsection-bracket" data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">[</span></span><a data-dcnode-id="2426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D19" title="Edit section: Defining factors"><span data-dcnode-id="2427" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2421" instrument_node="">
</span><p data-dcnode-id="2411"><span data-dcnode-id="2420" instrument_node="">Efficiency and trust are observed to be the two main logics to effectively improve the effectiveness of the practical application of citizen technology in government projects. Communities can build consensus by reinforcing these two factors, reducing people's antipathy to public officials and social programs without removing legitimate skepticism, and reducing the distance that information barriers create when transmitting data.</span><sup class="reference" data-dcnode-id="2417" id="cite_ref-Corbett_104–113_35-0"><a data-dcnode-id="2418" href="#cite_note-Corbett_104%E2%80%93113-35"><span data-dcnode-id="2419" instrument_node="">[35]</span></a></sup><span data-dcnode-id="2416" instrument_node=""> The confidentiality and security of civic technologies are factors in determining whether online public conversations are supported and popularized by the public.</span><sup class="reference" data-dcnode-id="2413" id="cite_ref-36"><a data-dcnode-id="2414" href="#cite_note-36"><span data-dcnode-id="2415" instrument_node="">[36]</span></a></sup><span data-dcnode-id="2412" instrument_node="">
</span></p><p data-dcnode-id="2401"><span data-dcnode-id="2410" instrument_node="">Local technology has three levels of transformation and dynamic models, from information to participation and empowerment. Web portals, social media platforms, and mobile apps are effective models for reaching a wide range of audiences; Electronic monitoring and management, service efficiency improvement, and business training help ensure increased participation and smooth operation. Open and transparent feedback and data release are factors that encourage future engagement and data accuracy. Completion of this series of information transmission and summary promotes the improvement of the future civic participation model. Future government programs will be citizen-oriented, information-technology-themed, and measured by efficiency and clarity.</span><sup class="reference" data-dcnode-id="2407" id="cite_ref-37"><a data-dcnode-id="2408" href="#cite_note-37"><span data-dcnode-id="2409" instrument_node="">[37]</span></a></sup><span data-dcnode-id="2406" instrument_node=""> Besides, citizen audit provides grassroots organizers with a more durable and stable cooperative structure and strategic shift. It is a method to test the effectiveness of policies and get feedback from citizens, and it can effectively point out deficiencies in current policies and systems.</span><sup class="reference" data-dcnode-id="2403" id="cite_ref-38"><a data-dcnode-id="2404" href="#cite_note-38"><span data-dcnode-id="2405" instrument_node="">[38]</span></a></sup><span data-dcnode-id="2402" instrument_node="">
</span></p><span data-dcnode-id="2400" instrument_node="">
</span><h2 data-dcnode-id="2390"><span class="mw-headline" data-dcnode-id="2398" id="Civic_engagement_around_the_world"><span data-dcnode-id="2399" instrument_node="">Civic engagement around the world</span></span><span class="mw-editsection" data-dcnode-id="2391"><span class="mw-editsection-bracket" data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">[</span></span><a data-dcnode-id="2394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D20" title="Edit section: Civic engagement around the world"><span data-dcnode-id="2395" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2389" instrument_node="">
</span><h3 data-dcnode-id="2379"><span class="mw-headline" data-dcnode-id="2387" id="Norway"><span data-dcnode-id="2388" instrument_node="">Norway</span></span><span class="mw-editsection" data-dcnode-id="2380"><span class="mw-editsection-bracket" data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">[</span></span><a data-dcnode-id="2383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D21" title="Edit section: Norway"><span data-dcnode-id="2384" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2378" instrument_node="">
</span><p data-dcnode-id="2372"><span data-dcnode-id="2377" instrument_node="">First, there is Norway with a study on “Local Newspapers, Facebook and Local Civic Engagement” by Malene Paulsen Lie. The study aimed to “[investigate] how a selection of the inhabitants of two Norwegian communities make use of the local press and Facebook…” and concluded that “both Facebook and the local press play important roles in civic engagement”, illustrating the various mediums that citizens utilize. When looking at the demographics of each medium, this study also saw that the younger demographic strayed from local newspapers and preferred national or international news, while the older demographic prioritized the local newspaper.</span><sup class="reference" data-dcnode-id="2374" id="cite_ref-39"><a data-dcnode-id="2375" href="#cite_note-39"><span data-dcnode-id="2376" instrument_node="">[39]</span></a></sup><span data-dcnode-id="2373" instrument_node="">
</span></p><span data-dcnode-id="2371" instrument_node="">
</span><h3 data-dcnode-id="2361"><span class="mw-headline" data-dcnode-id="2369" id="Poland"><span data-dcnode-id="2370" instrument_node="">Poland</span></span><span class="mw-editsection" data-dcnode-id="2362"><span class="mw-editsection-bracket" data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">[</span></span><a data-dcnode-id="2365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D22" title="Edit section: Poland"><span data-dcnode-id="2366" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2360" instrument_node="">
</span><p data-dcnode-id="2354"><span data-dcnode-id="2359" instrument_node="">In Poland, social media plays an important role in the level of civic engagement for mayoral elections. A study concluded that “successful engagement in social media accounts is also higher when the mayor operates in an active social media environment”.</span><sup class="reference" data-dcnode-id="2356" id="cite_ref-40"><a data-dcnode-id="2357" href="#cite_note-40"><span data-dcnode-id="2358" instrument_node="">[40]</span></a></sup><span data-dcnode-id="2355" instrument_node="">
</span></p><span data-dcnode-id="2353" instrument_node="">
</span><h3 data-dcnode-id="2343"><span class="mw-headline" data-dcnode-id="2351" id="Australia"><span data-dcnode-id="2352" instrument_node="">Australia</span></span><span class="mw-editsection" data-dcnode-id="2344"><span class="mw-editsection-bracket" data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">[</span></span><a data-dcnode-id="2347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D23" title="Edit section: Australia"><span data-dcnode-id="2348" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2342" instrument_node="">
</span><p data-dcnode-id="2332"><span data-dcnode-id="2341" instrument_node="">In Australia, a study was conducted, recognizing various forms of civic engagement such as “social protest and collective action, and specific organizations dedicated to lobbying and advocacy”.</span><sup class="reference" data-dcnode-id="2338" id="cite_ref-:1_41-0"><a data-dcnode-id="2339" href="#cite_note-:1-41"><span data-dcnode-id="2340" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2337" instrument_node=""> The study goes on to say that governments in Australia generally prefer to initiate processes of consultation of their own choosing rather than being perceived to be consulting only in response to pressure and social protest”.</span><sup class="reference" data-dcnode-id="2334" id="cite_ref-:1_41-1"><a data-dcnode-id="2335" href="#cite_note-:1-41"><span data-dcnode-id="2336" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2333" instrument_node="">
</span></p><span data-dcnode-id="2331" instrument_node="">
</span><h3 data-dcnode-id="2321"><span class="mw-headline" data-dcnode-id="2329" id="South_East_Asia"><span data-dcnode-id="2330" instrument_node="">South East Asia</span></span><span class="mw-editsection" data-dcnode-id="2322"><span class="mw-editsection-bracket" data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">[</span></span><a data-dcnode-id="2325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D24" title="Edit section: South East Asia"><span data-dcnode-id="2326" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2320" instrument_node="">
</span><p data-dcnode-id="2314"><span data-dcnode-id="2319" instrument_node="">In South East Asia, a study was conducted focusing on civic engagement within mental health services, more specifically in low and middle-income countries (LMICs). In these countries, the study concluded that Civic Engagement interventions can be successfully implemented yet Western models should be adapted in order to better fit with local cultures and values. Furthermore, the communities in these LMICs that face armed conflict, natural disasters, or political suppression find community cohesion to be a common outcome of civic engagement initiatives. Focusing on the mental health impact, civic engagement allowed citizens to develop a better understanding of the problems and equip themselves with the necessary skills to meet the needs of their local mental health problems. The study refers to the 2004 Asian Tsunami crisis, where “trusted community volunteers played a key role in the delivery of much needed mental health services”.</span><sup class="reference" data-dcnode-id="2316" id="cite_ref-42"><a data-dcnode-id="2317" href="#cite_note-42"><span data-dcnode-id="2318" instrument_node="">[42]</span></a></sup><span data-dcnode-id="2315" instrument_node="">
</span></p><span data-dcnode-id="2313" instrument_node="">
</span><h3 data-dcnode-id="2303"><span class="mw-headline" data-dcnode-id="2311" id="China"><span data-dcnode-id="2312" instrument_node="">China</span></span><span class="mw-editsection" data-dcnode-id="2304"><span class="mw-editsection-bracket" data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">[</span></span><a data-dcnode-id="2307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D25" title="Edit section: China"><span data-dcnode-id="2308" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2302" instrument_node="">
</span><p data-dcnode-id="2296"><span data-dcnode-id="2301" instrument_node="">In China, participatory budgeting experiments, an example of civic empowerment including all members of society, promote a degree of transparency and fairness, as a vast majority of the budgeting takes place at local levels and smaller villages (He). In the next decade, China and the NPC plans to implement more participatory budgeting experiments and an increased amount of participation from citizens. However, the empowerment of local People’s Congresses will remain constrained by the caution of the central leaders and resistance from local governments. In this same way, the government will remain controlling over citizen empowerment.</span><sup class="reference" data-dcnode-id="2298" id="cite_ref-43"><a data-dcnode-id="2299" href="#cite_note-43"><span data-dcnode-id="2300" instrument_node="">[43]</span></a></sup><span data-dcnode-id="2297" instrument_node="">
</span></p><span data-dcnode-id="2295" instrument_node="">
</span><h3 data-dcnode-id="2285"><span class="mw-headline" data-dcnode-id="2293" id="Romania"><span data-dcnode-id="2294" instrument_node="">Romania</span></span><span class="mw-editsection" data-dcnode-id="2286"><span class="mw-editsection-bracket" data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">[</span></span><a data-dcnode-id="2289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D26" title="Edit section: Romania"><span data-dcnode-id="2290" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2284" instrument_node="">
</span><p data-dcnode-id="2253"><span data-dcnode-id="2283" instrument_node="">There are countries, like Romania, where the new technologies started to influence civic participation in the last years. New media is becoming a factor in increasing civic mobilization for the new generations. New studies about that, at </span><a class="new" data-dcnode-id="2281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCenter_for_Civic_Participation_and_Democracy%26action%3Dedit%26redlink%3D1" title="Center for Civic Participation and Democracy (page does not exist)"><span data-dcnode-id="2282" instrument_node="">Center for Civic Participation and Democracy</span></a><span data-dcnode-id="2280" instrument_node=""> from </span><a class="mw-redirect" data-dcnode-id="2278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SNSPA" title="SNSPA"><span data-dcnode-id="2279" instrument_node="">SNSPA</span></a><span data-dcnode-id="2277" instrument_node="">.</span><sup class="reference" data-dcnode-id="2274" id="cite_ref-44"><a data-dcnode-id="2275" href="#cite_note-44"><span data-dcnode-id="2276" instrument_node="">[44]</span></a></sup><span data-dcnode-id="2273" instrument_node=""> </span><a class="new" data-dcnode-id="2271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCenter_for_Civic_Participation_and_Democracy%26action%3Dedit%26redlink%3D1" title="Center for Civic Participation and Democracy (page does not exist)"><span data-dcnode-id="2272" instrument_node="">Center for Civic Participation and Democracy</span></a><span data-dcnode-id="2270" instrument_node=""> (CPD) is a unit of research, analysis, and evaluation of citizen participation in the democratic process, both at the national and </span><a data-dcnode-id="2268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wik
