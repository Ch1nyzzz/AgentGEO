ipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="2269" instrument_node="">European</span></a><span data-dcnode-id="2267" instrument_node=""> level. Created at the </span><a data-dcnode-id="2265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_University_of_Political_Studies_and_Public_Administration" title="National University of Political Studies and Public Administration"><span data-dcnode-id="2266" instrument_node="">National School of Political Science and Public Administration</span></a><span data-dcnode-id="2264" instrument_node="">, CPD brings together experts in areas such as political science, sociology, administrative sciences, communications, international relations, and European studies, and it objectifies the SNSPA role and status of the school of governance. It is run by </span><a data-dcnode-id="2262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Remus_Pricopie" title="Remus Pricopie"><span data-dcnode-id="2263" instrument_node="">Remus Pricopie</span></a><span data-dcnode-id="2261" instrument_node=""> and </span><a class="new" data-dcnode-id="2259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDan_Sultanescu%26action%3Dedit%26redlink%3D1" title="Dan Sultanescu (page does not exist)"><span data-dcnode-id="2260" instrument_node="">Dan Sultanescu</span></a><span data-dcnode-id="2258" instrument_node="">.</span><sup class="reference" data-dcnode-id="2255" id="cite_ref-45"><a data-dcnode-id="2256" href="#cite_note-45"><span data-dcnode-id="2257" instrument_node="">[45]</span></a></sup><span data-dcnode-id="2254" instrument_node="">
</span></p><span data-dcnode-id="2252" instrument_node="">
</span><h2 data-dcnode-id="2242"><span class="mw-headline" data-dcnode-id="2250" id="Role_of_higher_education"><span data-dcnode-id="2251" instrument_node="">Role of higher education</span></span><span class="mw-editsection" data-dcnode-id="2243"><span class="mw-editsection-bracket" data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">[</span></span><a data-dcnode-id="2246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D27" title="Edit section: Role of higher education"><span data-dcnode-id="2247" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2241" instrument_node="">
</span><p data-dcnode-id="2235"><span data-dcnode-id="2240" instrument_node="">It can be argued that a fundamental step in creating a functioning society begins with the civic education of children within the community. According to Diann Cameron Kelly, "When our young children serve their communities through volunteerism, political participation or through vocal activism, they are more likely to emerge...voting and serving all aspects of society".</span><sup class="reference" data-dcnode-id="2237" id="cite_ref-46"><a data-dcnode-id="2238" href="#cite_note-46"><span data-dcnode-id="2239" instrument_node="">[46]</span></a></sup><span data-dcnode-id="2236" instrument_node=""> Kelly argues that children should be taught how their community works and who chooses the rules we live by even before they enter school. Other voices maintain that civic education is a lifelong process, even for those who make decisions on behalf of the citizens they serve.
</span></p><p data-dcnode-id="2198"><span data-dcnode-id="2234" instrument_node="">To answer this challenge, the incorporation of </span><a data-dcnode-id="2232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Service-learning" title="Service-learning"><span data-dcnode-id="2233" instrument_node="">service-learning</span></a><span data-dcnode-id="2231" instrument_node=""> into collegiate course design has gained acceptance as a pedagogy that links curricular content with civic education. In a recent study, students who participated in service learning even one time appear to have made gains in knowledge of and commitment to civic engagement when compared to non-service learners.</span><sup class="reference" data-dcnode-id="2228" id="cite_ref-47"><a data-dcnode-id="2229" href="#cite_note-47"><span data-dcnode-id="2230" instrument_node="">[47]</span></a></sup><span data-dcnode-id="2227" instrument_node=""> </span><a data-dcnode-id="2225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Campus_Compact" title="Campus Compact"><span data-dcnode-id="2226" instrument_node="">Campus Compact</span></a><span data-dcnode-id="2224" instrument_node="">, a coalition of nearly 1200 college presidents (as of 2013) promotes the development of citizenship skills by creating community partnerships and providing resources to train faculty to integrate civic and community-based learning into the curriculum.</span><sup class="reference" data-dcnode-id="2221" id="cite_ref-48"><a data-dcnode-id="2222" href="#cite_note-48"><span data-dcnode-id="2223" instrument_node="">[48]</span></a></sup><span data-dcnode-id="2220" instrument_node=""> Building on the acceptance of service learning and civic engagement in higher education, The Carnegie Foundation for the Advancement in Teaching created the Political Engagement Project in 2003 to develop the political knowledge and skills of college-aged students.</span><sup class="reference" data-dcnode-id="2217" id="cite_ref-49"><a data-dcnode-id="2218" href="#cite_note-49"><span data-dcnode-id="2219" instrument_node="">[49]</span></a></sup><span data-dcnode-id="2216" instrument_node=""> The </span><a data-dcnode-id="2214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Democracy_Project_%28AASCU_initiative%29" title="American Democracy Project (AASCU initiative)"><span data-dcnode-id="2215" instrument_node="">American Democracy Project</span></a><span data-dcnode-id="2213" instrument_node=""> (ADP) was launched in the same year by the </span><a data-dcnode-id="2211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Association_of_State_Colleges_and_Universities" title="American Association of State Colleges and Universities"><span data-dcnode-id="2212" instrument_node="">American Association of State Colleges and Universities (AASCU)</span></a><span data-dcnode-id="2210" instrument_node="">.</span><sup class="reference" data-dcnode-id="2207" id="cite_ref-aascu.org_50-0"><a data-dcnode-id="2208" href="#cite_note-aascu.org-50"><span data-dcnode-id="2209" instrument_node="">[50]</span></a></sup><span data-dcnode-id="2206" instrument_node=""> The American Democracy Project was joined by the American Democracy Commitment,</span><sup class="reference" data-dcnode-id="2203" id="cite_ref-51"><a data-dcnode-id="2204" href="#cite_note-51"><span data-dcnode-id="2205" instrument_node="">[51]</span></a></sup><span data-dcnode-id="2202" instrument_node=""> a partnership of community colleges, to sponsor an annual national conference focused on higher education's role in preparing the next generation of informed, engaged citizens. The American Democracy Project also sponsors campus-based initiatives including voter registration, curriculum revision projects, and special days of action and reflection, such as the MLK Day of Service. In a report entitled,</span><i data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node=""> A Crucible Moment: College Learning and Democracy's Future </span></i><span data-dcnode-id="2199" instrument_node="">issued in 2012 by the National Task Force on Civic Learning and Democratic Engagement, a joint project of the U.S. Department of Education and the American Association of Colleges and Universities, the authors argue that higher education must serve as an intellectual incubator and socially responsible partner in advancing civic learning and democratic engagement.
</span></p><p data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">The report recommends four basic steps to build civic minded institutions:
</span></p><span data-dcnode-id="2195" instrument_node="">
</span><ol data-dcnode-id="2180"><li data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">Foster a civic ethos across the campus culture.</span></li><span data-dcnode-id="2192" instrument_node="">
</span><li data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Make civic literacy a core expectation for all students.</span></li><span data-dcnode-id="2189" instrument_node="">
</span><li data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">Practice civic inquiry across all fields of study.</span></li><span data-dcnode-id="2186" instrument_node="">
</span><li data-dcnode-id="2181"><span data-dcnode-id="2185" instrument_node="">Advance civic action through transformative partnerships.</span><sup class="reference" data-dcnode-id="2182" id="cite_ref-52"><a data-dcnode-id="2183" href="#cite_note-52"><span data-dcnode-id="2184" instrument_node="">[52]</span></a></sup></li></ol><span data-dcnode-id="2179" instrument_node="">
</span><p data-dcnode-id="2169"><span data-dcnode-id="2178" instrument_node="">These higher education-based initiatives endeavor to build in college students, a politically engaged identity while enhancing the capacity to evaluate the political landscape and make informed decisions about participation in our democracy.</span><sup class="reference" data-dcnode-id="2175" id="cite_ref-53"><a data-dcnode-id="2176" href="#cite_note-53"><span data-dcnode-id="2177" instrument_node="">[53]</span></a></sup><span data-dcnode-id="2174" instrument_node=""> As evidenced by the growth in coalitions, professional development opportunities and civic education research, institutions of higher education and their association partners are committed to help prepare the next generation of citizens to become tomorrow's "Stewards of Place".</span><sup class="reference" data-dcnode-id="2171" id="cite_ref-aascu.org_50-1"><a data-dcnode-id="2172" href="#cite_note-aascu.org-50"><span data-dcnode-id="2173" instrument_node="">[50]</span></a></sup><span data-dcnode-id="2170" instrument_node="">
</span></p><p data-dcnode-id="2160"><span data-dcnode-id="2168" instrument_node="">Many universities, like the University of Minnesota, have begun to focus on increasing the civic engagement of students and have mandated that educators begin incorporating it into several school activities. Edwin Fogelman, author of </span><i data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">Civic Engagement at the University of Minnesota,</span></i><span data-dcnode-id="2165" instrument_node=""> states that true civic engagement can only be practiced by those living within a Democracy. According to Fogelman, civic engagement is largely shaped by schools. Education institutions have the skills to foster "civic competence, critical thinking, and Public Spirit, which empower citizens to become engaged". Many claim that civic engagement ought to become part of the curriculum and that higher education institutions should provide opportunities to become engaged such as internships, service-learning, and community based activities. Institutions also need to provide outlets where students can have open discussions over concerns and controversial issues.</span><sup class="reference" data-dcnode-id="2162" id="cite_ref-54"><a data-dcnode-id="2163" href="#cite_note-54"><span data-dcnode-id="2164" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2161" instrument_node="">
</span></p><p data-dcnode-id="2154"><span data-dcnode-id="2159" instrument_node="">Some schools, such as Widener University, have made civic engagement a core goal of the university. The university strives to get students involved in the local community to become more aware and civically engaged. (Civic Engagement And Service Learning In A Metropolitan University: Multiple Approaches And Perspectives).</span><sup class="reference" data-dcnode-id="2156" id="cite_ref-55"><a data-dcnode-id="2157" href="#cite_note-55"><span data-dcnode-id="2158" instrument_node="">[55]</span></a></sup><span data-dcnode-id="2155" instrument_node="">
</span></p><span data-dcnode-id="2153" instrument_node="">
</span><h3 data-dcnode-id="2143"><span class="mw-headline" data-dcnode-id="2151" id="Civic_learning"><span data-dcnode-id="2152" instrument_node="">Civic learning</span></span><span class="mw-editsection" data-dcnode-id="2144"><span class="mw-editsection-bracket" data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">[</span></span><a data-dcnode-id="2147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D28" title="Edit section: Civic learning"><span data-dcnode-id="2148" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2142" instrument_node="">
</span><p data-dcnode-id="2137"><span data-dcnode-id="2141" instrument_node="">In January 2012, the U.S. Department of Education issued a road map titled </span><i data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">Advancing Civic Learning and Engagement in Democracy </span></i><span data-dcnode-id="2138" instrument_node=""> that offers nine steps to enhancing the Department of Education's commitment to civic learning and engagement in democracy.
</span></p><p data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">These steps include:
</span></p><span data-dcnode-id="2134" instrument_node="">
</span><ol data-dcnode-id="2104"><li data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Convene and catalyze schools and post-secondary institutions to increase and enhance high-quality civic learning and engagement</span></li><span data-dcnode-id="2131" instrument_node="">
</span><li data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">Identify additional civic indicators</span></li><span data-dcnode-id="2128" instrument_node="">
</span><li data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">Identify promising practices in civic learning and democratic engagement—and encourage further research to learn what works</span></li><span data-dcnode-id="2125" instrument_node="">
</span><li data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">Leverage federal investments and public-private partnerships</span></li><span data-dcnode-id="2122" instrument_node="">
</span><li data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">Encourage community-based work-study placements</span></li><span data-dcnode-id="2119" instrument_node="">
</span><li data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Encourage public service careers among college students and graduates</span></li><span data-dcnode-id="2116" instrument_node="">
</span><li data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">Support civic learning for a well-rounded K–12 curriculum</span></li><span data-dcnode-id="2113" instrument_node="">
</span><li data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">Engage historically black colleges and universities and other minority-serving institutions—including Hispanic-serving institutions, Asian American and Native American Pacific Islander–Serving Institutions, and tribal colleges and universities-in a national dialogue to identify best practices.</span></li><span data-dcnode-id="2110" instrument_node="">
</span><li data-dcnode-id="2105"><span data-dcnode-id="2109" instrument_node="">Highlight and promote student and family participation in education programs and policies at the federal and local levels</span><sup class="reference" data-dcnode-id="2106" id="cite_ref-56"><a data-dcnode-id="2107" href="#cite_note-56"><span data-dcnode-id="2108" instrument_node="">[56]</span></a></sup></li></ol><span data-dcnode-id="2103" instrument_node="">
</span><p data-dcnode-id="2094"><span data-dcnode-id="2102" instrument_node="">Civic learning, however, also has its challenges. From W. Lance Bennett’s </span><i data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">Young Citizens and New Media</span></i><span data-dcnode-id="2099" instrument_node="">, the challenge of civic education and learning is the integration and adaptation to the more contemporary attitude toward politics, which revolves more around the quality of personal life, social recognition, and self esteem.</span><sup class="reference" data-dcnode-id="2096" id="cite_ref-57"><a data-dcnode-id="2097" href="#cite_note-57"><span data-dcnode-id="2098" instrument_node="">[57]</span></a></sup><span data-dcnode-id="2095" instrument_node="">
</span></p><span data-dcnode-id="2093" instrument_node="">
</span><h3 data-dcnode-id="2083"><span class="mw-headline" data-dcnode-id="2091" id="Youth_participation"><span data-dcnode-id="2092" instrument_node="">Youth participation</span></span><span class="mw-editsection" data-dcnode-id="2084"><span class="mw-editsection-bracket" data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">[</span></span><a data-dcnode-id="2087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCivic_engagement%26action%3Dedit%26section%3D29" title="Edit section: Youth participation"><span data-dcnode-id="2088" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2065"><span data-dcnode-id="2081" instrument_node="">Youth participation has a critical impact on four aspects: democratic decision-making, community cohesion, equity, and personal development of youth themselves.</span><sup class="reference" data-dcnode-id="2078" id="cite_ref-58"><a data-dcnode-id="2079" href="#cite_note-58"><span data-dcnode-id="2080" instrument_node="">[58]</span></a></sup><span data-dcnode-id="2077" instrument_node=""> Domestic and transnational educational cooperation is conducive to sharing and promoting the transmission and popularization of information and may achieve the effect of promoting social advancement and improving the living conditions of citizens and the environment.</span><sup class="reference" data-dcnode-id="2074" id="cite_ref-59"><a data-dcnode-id="2075" href="#cite_note-59"><span data-dcnode-id="2076" instrument_node="">[59]</span></a></sup><span data-dcnode-id="2073" instrument_node=""> Public services and programs contribute to the mental development of rebellious and vulnerable youth groups and change government patterns in the future, as they mobilize the participation of the next generation of citizens. These educational programs aim to apply social science and psychology to stimulate the enthusiasm of the youth community to participate in government projects, thereby promoting the </span><a data-dcnode-id="2071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sustainable_development" title="Sustainable development"><span data-dcnode-id="2072" instrument_node="">sustainable development</span></a><span data-dcnode-id="2070" instrument_node=""> of society.</span><sup class="reference" data-dcnode-id="2067" id="cite_ref-60"><a data-dcnode-id="2068" href="#cite_note-60"><span data-dcnode-id="2069" instrument_node="">[60]</span></a></sup><span data-dcnode-id="2066" instrument_node="">
</span></p><p data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">The design of such government projects remains neutral and open. It remains controversial whether the government has the right to guide teenagers to accept education of this nature. Experts suggest first identifying topics students value, followed by selecting a topic to discuss concrete actions and short-term goals that can be implemented and concluding with feedback and a summary. Teachers are encouraged to validate students' ideas and avoid bringing personal opinions and political stances into the classrooms. 
</span></p><p data-dcnode-id="2053"><span data-dcnode-id="2062" instrument_node="">The general attitude of college students towards online civic responsibility, engagement, learning, and expression is positive. The government may consider the option of strengthening the sense of autonomy of college students in performing their civic duties in reducing the inequalities that currently exist in the K-12 education system.</span><sup class="reference" data-dcnode-id="2059" id="cite_ref-Corbett_104–113_35-1"><a data-dcnode-id="2060" href="#cite_note-Corbett_104%E2%80%93113-35"><span data-dcnode-id="2061" instrument_node="">[35]</span></a></sup><span data-dcnode-id="2058" instrument_node=""> As part of the education system, college students may create accessible participation platforms for vulnerable groups and more through their educational resources or to speak for these groups through community visits and in-depth conversations.</span><sup class="reference" data-dcnode-id="2055" id="cite_ref-61"><a data-dcnode-id="2056" href="#cite_note-61"><span data-dcnode-id="2057" instrument_node="">[61]</span></a></sup><span data-dcnode-id="2054" instrument_node="">
</span></p><span data-dcnode-id="2052" instrument_node="">
