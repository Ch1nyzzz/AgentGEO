</span><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">"The puppy school was fabulous. Fuji had socialision issues in his early years and Lyn facilitated a way for him to co-exist and play with dogs much bigger and active than him. The littlest tips from Lyn go a long way as well, she really knows her stuff"

"We are very happy with the grooming and daycare facilities at The Dog Den. For a 4 month old puppy who was quite introverted and cautious, he comes out of his shell when at TDD. Also the groomer is one of few in the market who understands the complexities of grooming a double coated breed. Highly recommended."

</span><img alt="Trina Lincoln &amp; Bailey" data-dcnode-id="343" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thedogden.co.nz/wp-content/plugins/unyson/framework/static/img/no-image.png&amp;raw"><span data-dcnode-id="342" instrument_node="">

</span><div class="fw-testimonials-text" data-dcnode-id="334"><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Being first time puppy owners choosing the right puppy pre-school was so important to us. Steve and Helen were great answering all of my questions in advance so we knew what to expect and so welcoming each week even remembering all the puppies names.  Preschool was great - Lynn the trainer was amazing and the classes weren’t limited to training but also covered grooming, well-being and whatever else people were struggling with.  The class was disrupted for Covid lockdown and the communication from Dog Den team during this was outstanding.  
We have finished preschool feeling less overwhelmed and are now excited to have Bailey start daycare at the Dog Den confident that Steve and Helen love her as much as we do and that she will have the best time. 
</span></p><span data-dcnode-id="335" instrument_node="">
