;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;B&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;0&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;id&quot;:&quot;ad-446aae6d2651462887de7b8f92d66fab&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1754"></phoenix-ad></div></aside><h2 data-dcnode-id="1750" id="pet-fox-breeds"><span data-dcnode-id="1751" instrument_node="">Pet Fox "Breeds"</span></h2><p data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Within the world of pet foxes, there are only three ways to categorize these animals at the moment:</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-1" data-dcnode-id="1745"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-1" data-dcnode-id="1746" data-zone-count="11"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-db6b2fedd87641ea8e6788182d22261d&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-1&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;1&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;1&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-db6b2fedd87641ea8e6788182d22261d&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1747"></phoenix-ad></div></aside><ol data-dcnode-id="1729"><li data-dcnode-id="1737"><span data-dcnode-id="1744" instrument_node="">There is, of course, the species of the fox. The species name of the red fox is </span><em data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Vulpes vulpes</span></em><span data-dcnode-id="1741" instrument_node="">, while a fennec fox is </span><em data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">Vulpes zerda</span></em><span data-dcnode-id="1738" instrument_node="">.</span></li><span data-dcnode-id="1736" instrument_node="">
</span><li data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Then there is whether or not the fox is domesticated; a complex and ill-defined concept that will be discussed below.</span></li><span data-dcnode-id="1733" instrument_node="">
</span><li data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">And last, while some foxes have different coat colors in captivity, they are not different "breeds" of fox. Instead, they can be described as having different genetic lines.</span></li><span data-dcnode-id="1730" instrument_node="">
</span></ol><p data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">To define the terms that have been floating around on the internet:</span></p><ul data-dcnode-id="1695"><li data-dcnode-id="1720"><strong data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">Canadian marble fox</span></strong><span data-dcnode-id="1724" instrument_node="">: This is nothing more than a domesticated red fox that has a "marble" fur coloration. They descend from the fur trade. Someone made up the "Canadian" part of the word (although some foxes do descend from fur farms in Canada) and its mythological status, claiming an </span><a data-dcnode-id="1722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/446137906824557027/" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1723" instrument_node="">art doll</span></a><span data-dcnode-id="1721" instrument_node=""> is the animal in question. Who knows why.</span></li><span data-dcnode-id="1719" instrument_node="">
</span><li data-dcnode-id="1715"><strong data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Domesticated fox</span></strong><span data-dcnode-id="1716" instrument_node="">: Any fox that descends from a multi-generational breeding program or from fox populations that evolved around human influence.</span></li><span data-dcnode-id="1714" instrument_node="">
</span><li data-dcnode-id="1710"><strong data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Russian domesticated fox</span></strong><span data-dcnode-id="1711" instrument_node="">: A fox that descends from the breeding program that is part of Dmitry Belyaev's Farm Fox Experiment, that was selected for tameness.</span></li><span data-dcnode-id="1709" instrument_node="">
</span><li data-dcnode-id="1705"><strong data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">Silver fox</span></strong><span data-dcnode-id="1706" instrument_node="">: This is another red fox coloration, like the marble, but darker in color. They are common in fur farms.</span></li><span data-dcnode-id="1704" instrument_node="">

alse,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;id&quot;:&quot;ad-eaf48696324c43838f7e2fda3226b013&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1555"></phoenix-ad></div></aside><h2 data-dcnode-id="1551" id="what-is-the-russian-farm-fox-experiment"><span data-dcnode-id="1552" instrument_node="">What Is the Russian Farm Fox Experiment?</span></h2><p data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">This experiment, founded by Dr. Dmitry Belyaev in 1959 at the Institute of Cytology and Genetics, was designed to test for the existence of "domestication syndrome", which is the theory that certain traits and behaviors, such as smaller skull size, upright tail, and unique fur coloration (such as what is seen with the "marble fox") appear when mammals are bred for tameness only.</span></p><p data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">This theory has been the explanation for why Belyaev's foxes seem so similar to pet dogs, despite not being closely related to them taxonomically. The foxes the experiment began with were silver foxes from a fur farm, and it has been reported that some foxes exhibited traits of domestication only 10 generations in. This experiment is ongoing.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-4" data-dcnode-id="1544"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-4" data-dcnode-id="1545" data-zone-count="11"><phoenix-ad class="m-ad not-s frame-class="m-video--frame" iframe-id="dyL6TAVQdXo" lazy-load="" mozallowfullscreen="" scrolling="no" src="https://www.youtube-nocookie.com/embed/dyL6TAVQdXo?start=0" style="position: absolute; display: block; top: 0; max-width: 1100px; width: 100%; bottom: 0;" webkitallowfullscreen="" width="598"></phoenix-iframe></figure></div><h2 data-dcnode-id="934" id="human-tolerant-foxes-occur-naturally"><span data-dcnode-id="935" instrument_node="">Human-Tolerant Foxes Occur Naturally</span></h2><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">As the researchers began to look into the evidence for domestication syndrome, it became apparent that there is not even one stable definition of what domestication is. The described traits of domestication seemed to vary between species, and even members of the same domesticated species have different traits.</span></p><p data-dcnode-id="924"><span data-dcnode-id="931" instrument_node="">There is a popular misconception that there is a significant, night at day difference between domesticated and non-domesticated animals, as the new paper reveals. For instance, many people erroneously believe that domesticated cats (</span><em data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Felis catus</span></em><span data-dcnode-id="928" instrument_node="">) descended from some felid that was substantially different or "wild", while in reality, the ancestor of the domestic cat is nearly indistinguishable from its wild ancestor, which is the African wildcat (</span><em data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Felis lybica</span></em><span data-dcnode-id="925" instrument_node="">).</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-4" data-dcnode-id="921"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-4" data-dcnode-id="922" data-zone-count="9"><phoenix-ad class="m-ad not-size-a not-s </span></phoenix-icon-fallback></button></div></div></phoenix-picture><figcaption data-dcnode-id="858"><p class="tml-image--caption" data-dcnode-id="862" itemprop="caption"><span data-dcnode-id="863" instrument_node="">The current evidence points to dogs self-domesticating by growing comfortable with human presence, as many fox populations around the world also do.</span></p><p class="tml-image--attribution" data-dcnode-id="859" itemprop="author"><span data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">"File:Urban fox and rabbit.jpg" by User Oosoom on en.wikipedia is licensed under CC BY-SA 3.0</span></span></p></figcaption></figure></div><h2 data-dcnode-id="854" id="domesticated-vs-wild-red-foxes"><span data-dcnode-id="855" instrument_node="">Domesticated vs. "Wild" Red Foxes</span></h2><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">While the views of the new study have been contested by the researchers carrying out the experiment and some other biologists, who claim that some of the behavior and physical characteristics of the experiment's foxes were unique from the founder fox population, some facts remain clear.</span></p><ul data-dcnode-id="842"><li data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Animals exhibiting docility can be selectively bred to produce results that can be considered "domestication" in a small number of generations, contrary to the often-repeated claim that animals need "thousands of years" to be domesticated.</span></li><span data-dcnode-id="849" instrument_node="">
</span><li data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">The researchers have revealed that domestication has no clear definition in the first place, and the domesticated animals we think of (dogs, cats, horses, hamsters, etc.) have major differences from each other. Domestication means different characteristics for different species and domestication methods.</span></li><span data-dcnode-id="846" instrument_node="">
</span><li data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">A fox being "domesticated" tells us very little about it. Even fur farm animals that are not specially-bred Russian foxes can be docile and "dog-like". It is probable that the Russian foxes, given being derived from a strict breeding program for tameness, would have better "pet quality" as they were described by the researchers to uniquely seek out human attention, but all of these animals are still foxes, and potential owners should not expect dramatic differences between them.</span></li><span data-dcnode-id="843" instrument_node="">
</span></ul><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-5" data-dcnode-id="839"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-5" data-dcnode-id="840" data-zone-count="9"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-9edc5730b57249289f9b0f46b1e15ba4&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-5&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;5&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;D&quot;],&quot;slotModel nd raised before and after being weaned.</span></p><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Gray’s urine is not as pungent as the other species though smelly. Mine loved people especially children and in the house they ruled the roost putting my dogs in their place when they got tired of teasing them. Gray Foxes are smaller and cat like, they love to climb and in the wild spend a lot of time in trees. I would take my two on leashes to outside the mall where there was a picnic bench. When I’d walk them they’d climb up and perch on my shoulders as people admired them. I would take them to elementary schools where they were as enamored with the children as the children with them.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-8" data-dcnode-id="703"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-8" data-dcnode-id="704" data-zone-count="9"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-ba05ff08053d48548054077c0363fca6&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quo
