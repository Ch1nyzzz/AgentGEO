</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="1028" id="I97fd3f5521ea4401a3062db148878448_sys_txt" systemelement="true"><h3 data-dcnode-id="1029" style="text-align: center;"><span data-dcnode-id="1030" instrument_node="">How to Care for a Pet Fox</span></h3></div></div><div class="Horizontal_Line_Default" data-dcnode-id="1023" id="I9303ecc16de743d8aa04cceb1236cac7" style="display:block;clear: both;margin:0 0 2rem 0;"><span data-dcnode-id="1026" instrument_node=""> </span><div data-dcnode-id="1025" style="border-bottom-width:3px;border-bottom-style:solid;border-bottom-color:#cccccc;font-size:0;padding:0;margin:0;height:0;line-height:0;"></div><span data-dcnode-id="1024" instrument_node="">
</span></div><div class="Text_2_Default" data-dcnode-id="1014" id="Idc0ccb2569504d46a2d88f25e4611f2f" style="display:block;clear: both;margin:1rem 0 0 0;"><span data-dcnode-id="1020" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="1015" id="Idc0ccb2569504d46a2d88f25e4611f2f_sys_txt" systemelement="true"><p data-dcnode-id="1016" style="text-align: center;"><strong data-dcnode-id="1017"><a data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/blackfoxesuk/photos/a.518905904929811/1315434768610250/%3Ftype%3D3%26theater" rel="noopener" target="_blank"><span data-dcnode-id="1019" instrument_node="">Thinking of Getting a Pet Fox? Please, Please, Think Carefully...</span></a></strong></p></div></div><div class="Text_2_Default" data-dcnode-id="974" id="I5934bc36189644e892dd3f3c360a3a41" style="display:block;clear: both;margin:0 0 0 0;"><span data-dcnode-id="1011" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="975" id="I5934bc36189644e892dd3f3c360a3a41_sys_txt" systemelement="true"><p class="_2cuy _3dgx _2vxa" data-dcnode-id="1006" style="color: #1c1e21; text-align: center;"><span data-dcnode-id="1010" instrument_node="">Keeping foxes is not like keeping cats or dogs, it is a </span><strong data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">specialist hobby </span></strong><span data-dcnode-id="1007" instrument_node="">requiring specialist skills and equipment for those with specific interests in exotic animal education, management and behaviour. While their behaviour is often compared to dogs and cats, they are in fact, uniquely vulpine.&nbsp;</span></p><span data-dcnode-id="1005" instrument_node="">
</span><p class="over_outline show_overlays" data-dcnode-id="1000" style="color: #000000; text-align: center;"><strong data-dcnode-id="1002"><a class="over_outline" data-dcnode-id="1003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.surveymonkey.com/results/SM-S3QLHCMSV" rel="noopener" style="color: #de8d24;" target="_blank"><span data-dcnode-id="1004" instrument_node="">Caring for a fox will cost around £17,000</span></a></strong><span data-dcnode-id="1001" instrument_node="">&nbsp;over it's lifetime, with an initial expense of around £3,000 - £4,000 in the first year (purchase cost, enclosure, safety equipment, diet, enrichment, vaccinations and neutering). It is not possible to obtain exotic pet insurance for silver foxes; and as foxes are curious animals that are highly accident prone, it is advised to have a savings account or credit card set aside, which can be used to cover veterinary costs in the event of an emergency.</span></p><span data-dcnode-id="999" instrument_node="">
</span><p class="over_outline show_overlays" data-dcnode-id="987" style="color: #000000; text-align: center;"><span data-dcnode-id="998" instrument_node="">Foxes are</span><span data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">&nbsp;</span></span><strong data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">definitely not</span></strong><span data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">&nbsp;</span></span><span data-dcnode-id="991" instrument_node="">a species recommended for novice animal keepers and even experienced keepers can find them a struggle at times (especially over breeding season). The silver foxes bred in the UK are also a lot more timid than those bred elsewhere (having been bred for tame traits for only a few generations) and they generally do not make suitable subjects for</span><span data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">&nbsp;</span></span><span data-dcnode-id="988" instrument_node="">exotic animal education businesses&nbsp;as a result.</span></p><span data-dcnode-id="986" instrument_node="">
</span><p class="over_outline show_overlays" data-dcnode-id="976" style="color: #000000; text-align: center;"><span data-dcnode-id="985" instrument_node="">If you do consider keeping a domestic silver fox as a pet, please ensure you do your research. There is little support and very few options when it comes to</span><span data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">&nbsp;</span></span><strong data-dcnode-id="980"><a class="over_outline" data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foreverfoxy.co.uk/rehoming.php" rel="noopener" style="color: #de8d24;" target="_blank"><span data-dcnode-id="982" instrument_node="">re-homing silver foxes</span></a></strong><span data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">&nbsp;</span></span><span data-dcnode-id="977" instrument_node="">in the UK.&nbsp; You must be certain you can take on the commitment before making any decisions and you must adequately invest in the equipment required to keep them effectively, prior to bringing one home.&nbsp;</span></p></div></div><div class="Text_2_Default" data-dcnode-id="944" id="I48c832ef9a5840eca00d303ea940cd6f" style="display:block;clear: both;"><span data-dcnode-id="971" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="945" id="I48c832ef9a5840eca00d303ea940cd6f_sys_txt" systemelement="true"><p data-dcnode-id="960" style="text-align: center;"><span data-dcnode-id="966" style="color: #000000;"><span data-dcnode-id="970" instrument_node="">The silver fox is a species kept without license or minimum requirement in the UK, which we feel is less than adequate. To learn more about </span><strong data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">silver foxes and their management</span></strong><span data-dcnode-id="967" instrument_node="">, check out ou</span></span><span data-dcnode-id="965" instrument_node="">r </span><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blackfoxes.co.uk/the-silver-fox.php"><strong data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Courses &amp; Resources</span></strong></a><span data-dcnode-id="961" instrument_node="">&nbsp;section.</span></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="946" style="text-align: center;"><span data-dcnode-id="954" style="color: #000000;"><span data-dcnode-id="958" instrument_node="">Despite all our cautions, should you feel defiant in your goal to obtain a fox and are prepared to put in the resources and commitment necessary, Black Foxes UK has an agreement with UK breeders to provide contact details in return for a fee.&nbsp; </span><strong data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Terms and conditions apply</span></strong><span data-dcnode-id="955" instrument_node="">. Pleas</span></span><span data-dcnode-id="953" instrument_node="">e </span><a data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blackfoxes.co.uk/contact-us.php"><strong data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">get in touch</span></strong></a><span data-dcnode-id="949" instrument_node=""> </span><span data-dcnode-id="947" style="color: #000000;"><span data-dcnode-id="948" instrument_node="">for more details.&nbsp;</span></span></p></div></div><div class="Horizontal_Line_Default" data-dcnode-id="940" id="Iab0368679f5b4529bec920d140e2aa9f" style="display:block;clear: both;margin:1rem 0 3rem 0;"><span data-dcnode-id="943" instrument_node=""> </span><div data-dcnode-id="942" style="border-bottom-width:3px;border-bottom-style:solid;border-bottom-color:#cccccc;font-size:0;padding:0;margin:0;height:0;line-height:0;"></div><span data-dcnode-id="941" instrument_node="">
</span></div><div class="Text_2_Default" data-dcnode-id="933" id="Ia1af1b186bb74971b046d778790bdd6e" style="display:block;clear: both;"><span data-dcnode-id="937" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="934" id="Ia1af1b186bb74971b046d778790bdd6e_sys_txt" systemelement="true"><h6 data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Consider Others</span></h6></div></div><div class="Layout1_Default" data-dcnode-id="889" id="Ibd26a30dcb884a9e82f1c2cb38fb70ac" style="display:block;clear: both;margin:1rem 0 0 0;"><div class="column_Ibd26a30dcb884a9e82f1c2cb38fb70ac column_divider" data-dcnode-id="890"><div class="left" data-dcnode-id="916" id="Left_Ibd26a30dcb884a9e82f1c2cb38fb70ac"><div class="Image_Default" data-dcnode-id="927" id="Ib54dc384dafc440aadd035f90502603b" style="display:block;clear: both;text-align:center;"><img alt="Caring for a Pet Fox" data-dcnode-id="928" id="Ib54dc384dafc440aadd035f90502603b_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blackfoxes.co.uk/resources/Care_for_a_Pet_Fox/Care-for-a-Pet-Fox-Step-16-Version-3.jpg&amp;raw"></div><div class="Text_2_Default" data-dcnode-id="917" id="Ib51f9512bdec4a2eb73a63c4461d25b0" style="display:block;clear: both;"><span data-dcnode-id="924" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="918" id="Ib51f9512bdec4a2eb73a63c4461d25b0_sys_txt" systemelement="true"><p data-dcnode-id="919"><span data-dcnode-id="920" style="color: #222222;"><span data-dcnode-id="923" instrument_node="">©&nbsp;</span><a data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Care-for-a-Pet-Fox" rel="noopener" target="_blank"><span data-dcnode-id="922" instrument_node="">WikiHow.com&nbsp;</span></a></span></p></div></div></div><div class="right" data-dcnode-id="891" id="Right_Ibd26a30dcb884a9e82f1c2cb38fb70ac"><div class="Text_2_Default" data-dcnode-id="892" id="I652c0488678c4c33ae862629508f9033" style="display:block;clear: both;"><span data-dcnode-id="913" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="893" id="I652c0488678c4c33ae862629508f9033_sys_txt" systemelement="true"><p data-dcnode-id="908"><span data-dcnode-id="912" instrument_node="">Before deciding to get a fox, first </span><strong data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">consider others within your environment</span></strong><span data-dcnode-id="909" instrument_node="">; such as other pets, family, neighbours, landlords and colleagues, etc.</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="899" style="color: #545454;"><span data-dcnode-id="906" instrument_node="">Foxes require </span><strong data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">specialist knowledge and skills</span></strong><span data-dcnode-id="903" instrument_node=""> to keep correctly. They are noisy animals that smell pungent, have unpredictable behaviour and generally do not tolerate handling well. For this reason, they are </span><strong data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">not a pet</span></strong><span data-dcnode-id="900" instrument_node=""> most people would find suitable to live with. T</span></span><span data-dcnode-id="898" instrument_node="">heir curious nature and predatory instincts also mean that they should </span><strong data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">never</span></strong><span data-dcnode-id="895" instrument_node=""> be left alone with children or other animals.</span></p></div></div></div></div></div><div class="Text_2_Default" data-dcnode-id="882" id="I831a4e79215d4311bc6d78be89041436" style="display:block;clear: both;margin:0 0 0 0;"><span data-dcnode-id="886" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="883" id="I831a4e79215d4311bc6d78be89041436_sys_txt" systemelement="true"><h6 data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Locate a Fox-Friendly Vet</span></h6></div></div><div class="Layout1_Default" data-dcnode-id="837" id="Ic11dc0dd0a914341bdbb773f8579e8c2" style="display:block;clear: both;margin:1rem 0 0 0;"><div class="column_Ic11dc0dd0a914341bdbb773f8579e8c2 column_divider" data-dcnode-id="838"><div class="left" data-dcnode-id="863" id="Left_Ic11dc0dd0a914341bdbb773f8579e8c2"><div class="Image_Default" data-dcnode-id="875" id="Ic6a8033fc27643e89858d4ec9ad38170" style="display:block;clear: both;text-align:center;"><a data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Care-for-a-Pet-Fox" target="_blank"><img alt="Caring for a Pet Fox" data-dcnode-id="877" id="Ic6a8033fc27643e89858d4ec9ad38170_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blackfoxes.co.uk/resources/Care_for_a_Pet_Fox/Care-for-a-Pet-Fox-Step-15-Version-3.jpg&amp;raw"></a></div><div class="Text_2_Default" data-dcnode-id="864" id="I2a230610bbd7431eaf0b0d34b0e8acff" style="display:block;clear: both;"><span data-dcnode-id="872" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="865" id="I2a230610bbd7431eaf0b0d34b0e8acff_sys_txt" systemelement="true"><p data-dcnode-id="866"><a data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Care-for-a-Pet-Fox%23/Image%3ACare-for-a-Pet-Fox-Step-15-Version-3.jpg" rel="noopener" target="_blank"><span data-dcnode-id="870" style="color: #222222;"><span data-dcnode-id="871" instrument_node="">©&nbsp;</span></span></a><a data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Care-for-a-Pet-Fox" rel="noopener" target="_blank"><span data-dcnode-id="868" instrument_node="">WikiHow.com&nbsp;</span></a></p></div></div></div><div class="right" data-dcnode-id="839" id="Right_Ic11dc0dd0a914341bdbb773f8579e8c2"><div class="Text_2_Default" data-dcnode-id="840" id="Ic24f8204831d47948acbe9c407c9a0cb" style="display:block;clear: both;"><span data-dcnode-id="860" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="841" id="Ic24f8204831d47948acbe9c407c9a0cb_sys_txt" systemelement="true"><p data-dcnode-id="842"><span data-dcnode-id="855" style="color: #000000;"><span data-dcnode-id="859" instrument_node="">Before deciding to bring a fox home a&nbsp;</span><strong data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">fox-friendly veterinarian</span></strong><span data-dcnode-id="856" instrument_node=""> needs to be located. Not all vets are willing or capable of treating silver foxes, so h</span></span><span data-dcnode-id="853" style="color: #000000;"><span data-dcnode-id="854" instrument_node="">aving a vet available </span></span><span data-dcnode-id="852" instrument_node="">prior to bringing a fox home</span><span data-dcnode-id="847" style="color: #000000;"><span data-dcnode-id="851" instrument_node=""> is a must. This ensures their </span><strong data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">initial health check</span></strong><span data-dcnode-id="848" instrument_node=""> is performed as soon as possible, as well as ensuring veterinary assistance, should an unexpected emergency occur. A</span></span><span data-dcnode-id="843" style="color: #000000;"><span data-dcnode-id="846" instrument_node="">s with other pets, foxes require vaccination, neutering, microchipping, regular parasite treatment and regular health checks. </span><strong data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">If any signs of ill heath occur, seek immediate veterinary advice.&nbsp;</span></strong></span></p></div></div></div></div></div><div class="Text_2_Default" data-dcnode-id="826" id="I0bcf530a659742979394c64738312dd2" style="display:block;clear: both;"><span data-dcnode-id="834" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="827" id="I0bcf530a659742979394c64738312dd2_sys_txt" systemelement="true"><h6 data-dcnode-id="828"><strong class="whb" data-dcnode-id="832" style="color: #545454; text-align: left;"><span data-dcnode-id="833" instrument_node="">Build a Secure Enclosure</span></strong><span data-dcnode-id="829" style="color: #545454;"><span data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">&nbsp;</span></span></span></h6></div></div><div class="Layout1_Default" data-dcnode-id="765" id="I5cacf0a17945475ab06a8244549726b8" style="display:block;clear: both;margin:1rem 0 0 0;"><div class="column_I5cacf0a17945475ab06a8244549726b8 column_divider" data-dcnode-id="766"><div class="left" data-dcnode-id="809" id="Left_I5cacf0a17945475ab06a8244549726b8"><div class="Image_Default" data-dcnode-id="820" id="I0821bc106b374838bf6b90320757ec83" style="display:block;clear: both;text-align:center;"><img alt="How to Care for a Pet Fox" data-dcnode-id="821" id="I0821bc106b374838bf6b90320757ec83_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blackfoxes.co.uk/resources/Care_for_a_Pet_Fox/Care-for-a-Pet-Fox-Step-1-Version-3.jpg&amp;raw"></div><div class="Text_2_Default" data-dcnode-id="810" id="I33dd299675b24b369d61c0caefdf5c1c" style="display:block;clear: both;"><span data-dcnode-id="817" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="811" id="I33dd299675b24b369d61c0caefdf5c1c_sys_txt" systemelement="true"><p data-dcnode-id="812"><span data-dcnode-id="813" style="color: #222222;"><span data-dcnode-id="816" instrument_node="">©&nbsp;</span><a data-dcnode-id="814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Care-for-a-Pet-Fox" rel="noopener" target="_blank"><span data-dcnode-id="815" instrument_node="">WikiHow.com&nbsp;</span></a></span></p></div></div></div><div class="right" data-dcnode-id="767" id="Right_I5cacf0a17945475ab06a8244549726b8"><div class="Text_2_Default" data-dcnode-id="768" id="I68644f48fd8e40a38d9234e97792f016" style="display:block;clear: both;margin:0 0 0 0;"><span data-dcnode-id="806" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="769" id="I68644f48fd8e40a38d9234e97792f016_sys_txt" systemelement="true"><p data-dcnode-id="770" style="color: #333333; text-align: left;"><span data-dcnode-id="794" style="color: #000000;"><span data-dcnode-id="805" instrument_node="">A</span><span data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">&nbsp;</span></span><strong data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">minimum</span></strong><span data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">&nbsp;</span></span><span data-dcnode-id="798" instrument_node="">of </span><strong data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">100 square foot</span></strong><span data-dcnode-id="795" instrument_node=""> per fox is recommended when considering enclosure design for foxes and each fox kept will need their own 100 square foot of space. However, a larger area than the minimum space necessary is most ideal. E</span></span><span data-dcnode-id="771" style="color: #000000;"><span data-dcnode-id="793" instrument_node="">nclosures should be located in a protected area away from bad weather, strong winds and direct sunlight, be a minimum of 6 feet in height, have a </span><strong data-dcnode-id="791" style="color: #000000;"><span data-dcnode-id="792" instrument_node="">secure base&nbsp;and roof</span></strong><span data-dcnode-id="790" instrument_node=""> and be made from a minimum of </span><span class="text_exposed_show" data-dcnode-id="780" style="color: #1c1e21;"><span class="subfield" data-dcnode-id="781" style="color: #333333;"><span class="choice__text notranslate" data-dcnode-id="782" style="color: #000000;"><span data-dcnode-id="789" instrument_node="">min. 50</span><span data-dcnode-id="783" style="color: #000000;"><span data-dcnode-id="788" instrument_node="">mm x 50mm, 3-4mm </span><strong data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">galvanized</span></strong><strong data-dcnode-id="784" style="color: #000000;"><span data-dcnode-id="785" instrument_node="">&nbsp;w</span></strong></span></span></span></span><strong data-dcnode-id="778" style="color: #000000;"><span data-dcnode-id="779" instrument_node="">elded steel </span></strong><strong data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">mesh panels,</span></strong><span data-dcnode-id="775" instrument_node="">&nbsp;(with adequate drainage and lighting), example </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.weld-mesh.com/animal-cages/large-cage-for-zoo" rel="noopener" target="_blank"><span data-dcnode-id="774" instrument_node="">here</span></a><span data-dcnode-id="772" instrument_node="">.&nbsp;</span></span></p></div></div></div></div></div><div class="Text_2_Default" data-dcnode-id="754" id="Ie21b4c1a40c241e9b3a8c1773125fb0f" style="display:block;clear: both;margin:0 0 0 0;"><span data-dcnode-id="762" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="755" id="Ie21b4c1a40c241e9b3a8c1773125fb0f_sys_txt" systemelement="true"><h6 data-dcnode-id="756"><strong class="whb" data-dcnode-id="760" style="color: #545454; text-align: left;"><span data-dcnode-id="761" instrument_node="">Prevent Enclosure Escapes</span></strong><span data-dcnode-id="757" style="color: #545454;"><span data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">&nbsp;</span></span></span></h6></div></div><div class="Layout1_Default" data-dcnode-id="708" id="I4196ebcb9d3a4b5c8abd1ab041b41ad2" style="display:block;clear: both;margin:1rem 0 0 0;"><div class="column_I4196ebcb9d3a4b5c8abd1ab041b41ad2 column_divider" data-dcnode-id="709"><div class="left" data-dcnode-id="736" id="Left_I4196ebcb9d3a4b5c8abd1ab041b41ad2"><div class="Image_Default" data-dcnode-id="747" id="I9c74507ff74047d6996be3846b8b4984" style="display:block;clear: both;text-align:center;"><a data-dcnode-id="748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Care-for-a-Pet-Fox" target="_blank"><img alt="Caring for a Pet Fox" data-dcnode-id="749" id="I9c74507ff74047d6996be3846b8b4984_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blackfoxes.co.uk/resources/Care_for_a_Pet_Fox/Care-for-a-Pet-Fox-Step-2-Version-3.jpg&amp;raw"></a></div><div class="Text_2_Default" data-dcnode-id="737" id="Iabd840a008634c119fb1de42af977ad4" style="display:block;clear: both;"><span data-dcnode-id="744" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="738" id="Iabd840a008634c119fb1de42af977ad4_sys_txt" systemelement="true"><p data-dcnode-id="739"><span data-dcnode-id="740" style="color: #222222;"><span data-dcnode-id="743" instrument_node="">©&nbsp;</span><a data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Care-for-a-Pet-Fox" rel="noopener" target="_blank"><span data-dcnode-id="742" instrument_node="">WikiHow.com&nbsp;</span></a></span></p></div></div></div><div class="right" data-dcnode-id="710" id="Right_I4196ebcb9d3a4b5c8abd1ab041b41ad2"><div class="Text_2_Default" data-dcnode-id="711" id="I69222161df0f4bc9af619e4b0d07f5f4" style="display:block;clear: both;"><span data-dcnode-id="733" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="712" id="I69222161df0f4bc9af619e4b0d07f5f4_sys_txt" systemelement="true"><p data-dcnode-id="713"><span data-dcnode-id="732" instrument_node="">Foxes are exceptional diggers, so if an enclosure does not have a </span><strong data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">solid concrete base </span></strong><span data-dcnode-id="729" instrument_node="">(preferred), the fences will need to be sunk&nbsp;</span><strong data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">at least 3 foot</span></strong><span data-dcnode-id="726" instrument_node=""> into the ground and underwired at least&nbsp;</span><strong data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">3 foot across </span></strong><span data-dcnode-id="723" instrument_node="">(example </span><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blackfoxes.co.uk/resources/fox%2520enclosure.jpg"><span data-dcnode-id="722" instrument_node="">here</span></a><span data-dcnode-id="720" instrument_node="">). A more secure alternative option is to lay a wire base under the soil across the entire enclosure. A </span><strong data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">double door entry system</span></strong><span data-dcnode-id="717" instrument_node=""> is a must, aiding to prevent foxes escaping (by darting past those entering their enclosure), as well as being a useful tool for restraining uncooperative foxes. A </span><strong data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">secure lock</span></strong><span data-dcnode-id="714" instrument_node="">&nbsp;also ensures no-one can enter the enclosure without consent.&nbsp;</span></p></div></div></div></div></div><div class="Text_2_Default" data-dcnode-id="696" id="Ia625ce53bf514e4cbbe2057653cd6d15" style="display:block;clear: both;margin:0 0 0 0;"><span data-dcnode-id="705" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="697" id="Ia625ce53bf514e4cbbe2057653cd6d15_sys_txt" systemelement="true"><h6 data-dcnode-id="698"><span data-dcnode-id="704" instrument_node="">&nbsp;</span><strong class="whb" data-dcnode-id="702" style="color: #545454; text-align: left;"><span data-dcnode-id="703" instrument_node="">Make Perimeter Secure</span></strong><span data-dcnode-id="699" style="color: #545454;"><span data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">&nbsp;</span></span></span></h6></div></div><div class="Layout1_Default" data-dcnode-id="650" id="Iaec3dca73c3347efb7a7b47c74e76b05" style="display:block;clear: both;margin:1rem 0 0 0;"><div class="column_Iaec3dca73c3347efb7a7b47c74e76b05 column_divider" data-dcnode-id="651"><div class="left" data-dcnode-id="678" id="Left_Iaec3dca73c3347efb7a7b47c74e76b05"><div class="Image_Default" data-dcnode-id="689" id="I0014e75b6af44dd98d8b59d8ae1f55e4" style="display:block;clear: both;text-align:center;"><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Care-for-a-Pet-Fox" target="_blank"><img alt="Caring for a Pet Fox" data-dcnode-id="691" id="I0014e75b6af44dd98d8b59d8ae1f55e4_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blackfoxes.co.uk/resources/Care_for_a_Pet_Fox/Care-for-a-Pet-Fox-Step-3-Version-3.jpg&amp;raw"></a></div><div class="Text_2_Default" data-dcnode-id="679" id="Ifa1e00c9521d48468a2e4d0b7638a2cc" style="display:block;clear: both;margin:0 0 0 0;"><span data-dcnode-id="686" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="680" id="Ifa1e00c9521d48468a2e4d0b7638a2cc_sys_txt" systemelement="true"><p data-dcnode-id="681"><span data-dcnode-id="682" style="color: #222222;"><span data-dcnode-id="685" instrument_node="">©&nbsp;</span><a data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Care-for-a-Pet-Fox" rel="noopener" target="_blank"><span data-dcnode-id="684" instrument_node="">WikiHow.com&nbsp;</span></a></span></p></div></div></div><div class="right" data-dcnode-id="652" id="Right_Iaec3dca73c3347efb7a7b47c74e76b05"><div class="Text_2_Default" data-dcnode-id="653" id="Ic0b72e094e9848098f31727c54c08051" style="display:block;clear: both;margin:0 0 0 0;"><span data-dcnode-id="675" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="654" id="Ic0b72e094e9848098f31727c54c08051_sys_txt" systemelement="true"><p data-dcnode-id="655"><span data-dcnode-id="674" instrument_node="">Foxes are </span><strong data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">master escape artists </span></strong><span data-dcnode-id="671" instrument_node="">and a 6 foot perimeter fence complete with a </span><strong data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">security overhang</span></strong><span data-dcnode-id="668" instrument_node=""> is necessary to ensure that should an escape occur, the fox is still safely contained within the grounds. The security overhang needs to be at least </span><strong data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">2 foot in width </span></strong><span data-dcnode-id="665" instrument_node="">and set at a</span><strong data-dcnode-id="663"><span data-dcnode-id="664" instrument_node=""> 40 degree angle</span></strong><span data-dcnode-id="662" instrument_node=""> to ensure a fox cannot climb over (example </span><a data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wildlifeonline.me.uk/assets/ugc/images/fox_exclusion_fencing.png" rel="noopener" target="_blank"><span data-dcnode-id="661" instrument_node="">here</span></a><span data-dcnode-id="659" instrument_node="">).&nbsp;The enclosure and perimeter fencing need to be </span><strong data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">checked daily</span></strong><span data-dcnode-id="656" instrument_node=""> for potential damage, overgrown branches and access holes, with any issues being addressed promptly.&nbsp;</span></p></div></div></div></div></div><div class="Text_2_Default" data-dcnode-id="643" id="Ieb2fbc0fefc44de39283965d1fc1e479" style="display:block;clear: both;"><span data-dcnode-id="647" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="644" id="Ieb2fbc0fefc44de39283965d1fc1e479_sys_txt" systemelement="true"><h6 data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">&nbsp;Provide Resting Areas</span></h6></div></div><div class="Layout1_Default" data-dcnode-id="601" id="Ib9ecdacc8e4f45b99cc11897ec3378f3" style="display:block;clear: both;margin:1rem 0 0 0;"><div class="column_Ib9ecdacc8e4f45b99cc11897ec3378f3 column_divider" data-dcnode-id="602"><div class="left" data-dcnode-id="626" id="Left_Ib9ecdacc8e4f45b99cc11897ec3378f3"><div class="Image_Default" data-dcnode-id="637" id="I13e9c2c0f5514bfa9f7255ca0c9a241e" style="display:block;clear: both;text-align:center;"><img data-dcnode-id="638" id="I13e9c2c0f5514bfa9f7255ca0c9a241e_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blackfoxes.co.uk/resources/Care_for_a_Pet_Fox/Care-for-a-Pet-Fox-Step-4-Version-3.jpg&amp;raw"></div><div class="Text_2_Default" data-dcnode-id="627" id="I2c221fb2eb6e4726a168e6b9a476d58e" style="display:block;clear: both;"><span data-dcnode-id="634" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="628" id="I2c221fb2eb6e4726a168e6b9a476d58e_sys_txt" systemelement="true"><p data-dcnode-id="629"><span data-dcnode-id="630" style="color: #222222;"><span data-dcnode-id="633" instrument_node="">©&nbsp;</span><a data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Care-for-a-Pet-Fox" rel="noopener" target="_blank"><span data-dcnode-id="632" instrument_node="">WikiHow.com&nbsp;</span></a></span></p></div></div></div><div class="right" data-dcnode-id="603" id="Right_Ib9ecdacc8e4f45b99cc11897ec3378f3"><div class="Text_2_Default" data-dcnode-id="604" id="Ic81bd8a649a64678bb425883f1d5337e" style="display:block;clear: both;"><span data-dcnode-id="623" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="605" id="Ic81bd8a649a64678bb425883f1d5337e_sys_txt" systemelement="true"><p data-dcnode-id="612"><span data-dcnode-id="622" instrument_node="">Like dogs, foxes spend </span><strong data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">much of the day</span></strong><span data-dcnode-id="619" instrument_node=""> </span><strong data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">sleeping </span></strong><span data-dcnode-id="616" instrument_node="">and a&nbsp;dry, comfortable bed that is protected from the elements is necessary. A </span><strong data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">large dog house</span></strong><span data-dcnode-id="613" instrument_node="">&nbsp;with suitable bedding or substrate works well, but consideration needs to be given to drainage, as foxes like to urinate in their beds to "mark" their territory.</span></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="610" instrument_node="">Foxes also like to make use of </span><strong data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">several resting and vantage points</span></strong><span data-dcnode-id="607" instrument_node="">, preferring to be higher up. So, it is necessary to provide several different spots at different levels within the enclosure.&nbsp;</span></p></div></div></div></div></div><div class="Text_2_Default" data-dcnode-id="594" id="I52b96d7b345d4d04a585cc263af69e60" style="display:block;clear: both;"><span data-dcnode-id="598" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="595" id="I52b96d7b345d4d04a585cc263af69e60_sys_txt" systemelement="true"><h6 data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Provide Enrichment</span></h6></div></div><div class="Layout1_Default" data-dcnode-id="556" id="I421edf14c1fa4b24bc9944f039ac60c7" style="display:block;clear: both;margin:1rem 0 0 0;"><div class="column_I421edf14c1fa4b24bc9944f039ac60c7 column_divider" data-dcnode-id="557"><div class="left" data-dcnode-id="577" id="Left_I421edf14c1fa4b24bc9944f039ac60c7"><div class="Image_Default" data-dcnode-id="588" id="I5cafaff005014e1896d600537a5577c0" style="display:block;clear: both;text-align:center;"><img alt="Caring for a Pet Fox" data-dcnode-id="589" id="I5cafaff005014e1896d600537a5577c0_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blackfoxes.co.uk/resources/Care_for_a_Pet_Fox/Care-for-a-Pet-Fox-Step-5-Version-3.jpg&amp;raw"></div><div class="Text_2_Default" data-dcnode-id="578" id="I70750dd81ae14337907aab24d6e08209" style="display:block;clear: both;"><span data-dcnode-id="585" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="579" id="I70750dd81ae14337907aab24d6e08209_sys_txt" systemelement="true"><p data-dcnode-id="580"><span data-dcnode-id="581" style="color: #222222;"><span data-dcnode-id="584" instrument_node="">©&nbsp;</span><a data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Care-for-a-Pet-Fox" rel="noopener" target="_blank"><span data-dcnode-id="583" instrument_node="">WikiHow.com&nbsp;</span></a></span></p></div></div></div><div class="right" data-dcnode-id="558" id="Right_I421edf14c1fa4b24bc9944f039ac60c7"><div class="Text_2_Default" data-dcnode-id="559" id="I8c90569611984d949056f50366311dc1" style="display:block;clear: both;"><span data-dcnode-id="574" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="560" id="I8c90569611984d949056f50366311dc1_sys_txt" systemelement="true"><p data-dcnode-id="566"><span data-dcnode-id="573" instrument_node="">Foxes are highly intelligent, active animals. For their emotional and physical well-being adequate enrichment is required. This includes </span><strong data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">structural enrichment</span></strong><span data-dcnode-id="570" instrument_node="">, such as climbing platforms, tunnels and digging spots, as well as enrichment that </span><strong data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">stimulates natural behaviours</span></strong><span data-dcnode-id="567" instrument_node=""> and engages the fox's attention such as the toys and mental treat games people use for dogs.&nbsp;</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="561"><strong data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Animal training</span></strong><span data-dcnode-id="562" instrument_node="">&nbsp; is also a great ways to provide enrichment whilst building on the relationship and trust between a fox and it's keeper.&nbsp;</span></p></div></div></div></div></div><div class="Text_2_Default" data-dcnode-id="549" id="I9741f5569ada423e9be6976cbb57e5c3" style="display:block;clear: both;"><span data-dcnode-id="553" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="550" id="I9741f5569ada423e9be6976cbb57e5c3_sys_txt" systemelement="true"><h6 data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Fox-Proof Your Home</span></h6></div></div><div class="Layout1_Default" data-dcnode-id="495" id="I9ba644572d0f4eddbff49c2b43057747" style="display:block;clear: both;margin:1rem 0 0 0;"><div class="column_I9ba644572d0f4eddbff49c2b43057747 column_divider" data-dcnode-id="496"><div class="left" data-dcnode-id="532" id="Left_I9ba644572d0f4eddbff49c2b43057747"><div class="Image_Default" data-dcnode-id="543" id="I27cad6a30daa4a3390a94e56f10efef5" style="display:block;clear: both;text-align:center;"><img alt="Caring for a Pet Fox" data-dcnode-id="544" id="I27cad6a30daa4a3390a94e56f10efef5_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blackfoxes.co.uk/resources/Care_for_a_Pet_Fox/Care-for-a-Pet-Fox-Step-8-Version-3.jpg&amp;raw"></div><div class="Text_2_Default" data-dcnode-id="533" id="I79ec6175813b480b9ed3a0592895104a" style="display:block;clear: both;"><span data-dcnode-id="540" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="534" id="I79ec6175813b480b9ed3a0592895104a_sys_txt" systemelement="true"><p data-dcnode-id="535"><span data-dcnode-id="536" style="color: #222222;"><span data-dcnode-id="539" instrument_node="">©&nbsp;</span><a data-dcnode-id="537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Care-for-a-Pet-Fox" rel="noopener" target="_blank"><span data-dcnode-id="538" instrument_node="">WikiHow.com&nbsp;</span></a></span></p></div></div></div><div class="right" data-dcnode-id="497" id="Right_I9ba644572d0f4eddbff49c2b43057747"><div class="Text_2_Default" data-dcnode-id="498" id="Ifbce6db1268a4f63b5b6f9d466e50232" style="display:block;clear: both;"><span data-dcnode-id="529" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="499" id="Ifbce6db1268a4f63b5b6f9d466e50232_sys_txt" systemelement="true"><p data-dcnode-id="500"><span data-dcnode-id="527" style="color: #000000;"><span data-dcnode-id="528" instrument_node="">Young foxes require time with people for the purpose of socalisation during their first few weeks. F</span></span><span data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">oxes are curious and destructive animals by nature with a habit for&nbsp;</span></span><span data-dcnode-id="524" instrument_node="">thieving&nbsp;and chewing</span><span data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">. A</span></span><span data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">n element of </span></span><strong data-dcnode-id="518" style="color: #000000;"><span data-dcnode-id="519" instrument_node="">"fox-proofing"</span></strong><span data-dcnode-id="510"><span data-dcnode-id="517" instrument_node=""> is necessary to keep them in a home safely, such as; removing unnecessary "stuff", protecting electrical cords, minimizing hiding areas and </span><strong data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">ensuring windows and doors </span></strong><span data-dcnode-id="514" instrument_node="">are </span><a data-dcnode-id="512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blackfoxes.co.uk/resources/window%2520box.JPG" rel="noopener" target="_blank"><span data-dcnode-id="513" instrument_node="">gated</span></a><span data-dcnode-id="511" instrument_node=""> and aren't </span></span><span data-dcnode-id="509" instrument_node="">points for escape.&nbsp;There will also be need for a secure and safe passage from the enclosure to the home</span><strong data-dcnode-id="507" style="color: #000000;"><span data-dcnode-id="508" instrument_node="">, </span></strong><span data-dcnode-id="506" instrument_node="">where applicable</span><span data-dcnode-id="501"><span data-dcnode-id="505" instrument_node="">. Most foxes will need to be in an </span><strong data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">outdoor enclosure by 5-6 months of age</span></strong><span data-dcnode-id="502" instrument_node="">.</span></span></p></div></div></div></div></div><div class="Text_2_Default" data-dcnode-id="488" id="Ie19cf69517ff49479ca0c3095ad85c15" style="display:block;clear: both;"><span data-dcnode-id="492" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="489" id="Ie19cf69517ff49479ca0c3095ad85c15_sys_txt" systemelement="true"><h6 data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Purchase Training &amp; Bonding Aids</span></h6></div></div><div class="Layout1_Default" data-dcnode-id="440" id="Ie989ecea499b4936ac54aca9a2e8ad3d" style="display:block;clear: both;margin:1rem 0 0 0;"><div class="column_Ie989ecea499b4936ac54aca9a2e8ad3d column_divider" data-dcnode-id="441"><div class="left" data-dcnode-id="471" id="Left_Ie989ecea499b4936ac54aca9a2e8ad3d"><div class="Image_Default" data-dcnode-id="482" id="I1db24c1654c849fca6bef6fbd871b1e9" style="display:block;clear: both;text-align:center;"><img alt="Caring For a Pet Fox" data-dcnode-id="483" id="I1db24c1654c849fca6bef6fbd871b1e9_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blackfoxes.co.uk/resources/Care_for_a_Pet_Fox/Care-for-a-Pet-Fox-Step-9-Version-3.jpg&amp;raw"></div><div class="Text_2_Default" data-dcnode-id="472" id="I8e070b53179b4086a1991f038862dee4" style="display:block;clear: both;"><span data-dcnode-id="479" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="473" id="I8e070b53179b4086a1991f038862dee4_sys_txt" systemelement="true"><p data-dcnode-id="474"><span data-dcnode-id="475" style="color: #222222;"><span data-dcnode-id="478" instrument_node="">©&nbsp;</span><a data-dcnode-id="476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Care-for-a-Pet-Fox" rel="noopener" target="_blank"><span data-dcnode-id="477" instrument_node="">WikiHow.com</span></a></span></p></div></div></div><div class="right" data-dcnode-id="442" id="Right_Ie989ecea499b4936ac54aca9a2e8ad3d"><div class="Text_2_Default" data-dcnode-id="443" id="I69d71bc1ff0243e8aa3a42043bece1cc" style="display:block;clear: both;"><span data-dcnode-id="468" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="444" id="I69d71bc1ff0243e8aa3a42043bece1cc_sys_txt" systemelement="true"><p data-dcnode-id="463"><span data-dcnode-id="467" instrument_node="">Keeping or raising a fox indoors requires the same equipment you might need when </span><strong data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">bringing home a new puppy or kitten</span></strong><span data-dcnode-id="464" instrument_node="">, e.g. litter tray, dog crate, travel crate, harness, treats, toys, etc.</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="461" instrument_node="">A</span><span data-dcnode-id="446"><span data-dcnode-id="460" instrument_node="">s with puppies and kittens </span><strong data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">basic training</span></strong><span data-dcnode-id="457" instrument_node=""> needs to begin </span><strong data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">as soon as possible</span></strong><span data-dcnode-id="454" instrument_node="">, including crate training, litter training, bite inhibition, handling and harness training. Unlike with puppies and kittens there is </span><strong data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">no guarantee</span></strong><span data-dcnode-id="451" instrument_node=""> a fox will take to training easily and </span><a data-dcnode-id="448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blackfoxes.co.uk/health-and-safety-precautions.php"><strong data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Specialist Equipment</span></strong></a><span data-dcnode-id="447" instrument_node=""> is required.</span></span></p></div></div></div></div></div><div class="Text_2_Default" data-dcnode-id="433" id="I5b1549c474a8486e97f26cfa7efd2468" style="display:block;clear: both;margin:0 0 0 0;"><span data-dcnode-id="437" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="434" id="I5b1549c474a8486e97f26cfa7efd2468_sys_txt" systemelement="true"><h6 data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Provide Food Bowls &amp; Adequate Diet</span></h6></div></div><div class="Layout1_Default" data-dcnode-id="385" id="I155d5a23b15847248f6c15e756628a62" style="display:block;clear: both;margin:1rem 0 0 0;"><div class="column_I155d5a23b15847248f6c15e756628a62 column_divider" data-dcnode-id="386"><div class="left" data-dcnode-id="415" id="Left_I155d5a23b15847248f6c15e756628a62"><div class="Image_Default" data-dcnode-id="426" id="I58d9d4906a9b496a9248a75810b84f98" style="display:block;clear: both;text-align:center;"><a data-dcnode-id="427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Care-for-a-Pet-Fox" target="_blank"><img alt="Caring for a Pet Fox" data-dcnode-id="428" id="I58d9d4906a9b496a9248a75810b84f98_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blackfoxes.co.uk/resources/Care_for_a_Pet_Fox/Care-for-a-Pet-Fox-Step-10-Version-3.jpg&amp;raw"></a></div><div class="Text_2_Default" data-dcnode-id="416" id="I970511ce5ff64713baa3ce0173ecad5a" style="display:block;clear: both;"><span data-dcnode-id="423" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="417" id="I970511ce5ff64713baa3ce0173ecad5a_sys_txt" systemelement="true"><p data-dcnode-id="418"><span data-dcnode-id="419" style="color: #222222;"><span data-dcnode-id="422" instrument_node="">©&nbsp;</span><a data-dcnode-id="420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Care-for-a-Pet-Fox" rel="noopener" target="_blank"><span data-dcnode-id="421" instrument_node="">WikiHow.com&nbsp;</span></a></span></p></div></div></div><div class="right" data-dcnode-id="387" id="Right_I155d5a23b15847248f6c15e756628a62"><div class="Text_2_Default" data-dcnode-id="388" id="I190990fc51ef46b3b76e71907c21cbb9" style="display:block;clear: both;"><span data-dcnode-id="412" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="389" id="I190990fc51ef46b3b76e71907c21cbb9_sys_txt" systemelement="true"><p data-dcnode-id="406"><span data-dcnode-id="407" style="color: #545454;"><span data-dcnode-id="411" instrument_node="">Foxes will knock over and urinate in their food and water bowls, for this reason </span><strong data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">raised, heavy duty bowls</span></strong><span data-dcnode-id="408" instrument_node=""> are recommended. </span></span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="403" style="color: #545454;"><span data-dcnode-id="404" instrument_node="">F</span></span><span data-dcnode-id="392" style="color: #545454;"><span data-dcnode-id="402" instrument_node="">oxes are </span><strong data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">omnivorous</span></strong><span data-dcnode-id="399" instrument_node="">, eating a wide range of foods but primarily prey on small ground dwelling mammals. A complete,&nbsp;</span><strong data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">high quality dog or cat food</span></strong><span data-dcnode-id="396" instrument_node=""> with sufficient taurine levels will suffice. Insects, eggs, raw meat and veggies can then be offered as </span><strong data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">food enrichment</span></strong><span data-dcnode-id="393" instrument_node=""> or as an additional treat. C</span></span><span data-dcnode-id="391" instrument_node="">heck with your vet if you are concerned about your fox's diet.</span></p></div></div></div></div></div><div class="Text_2_Default" data-dcnode-id="378" id="If08b10b441154db09c17fed6526ecfb2" style="display:block;clear: both;"><span data-dcnode-id="382" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="379" id="If08b10b441154db09c17fed6526ecfb2_sys_txt" systemelement="true"><h6 data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Provide Individual Identification</span></h6></div></div><div class="Layout1_Default" data-dcnode-id="336" id="Ibb6b15b4a37c44699f35c609b85adc08" style="display:block;clear: both;margin:1rem 0 0 0;"><div class="column_Ibb6b15b4a37c44699f35c609b85adc08 column_divider" data-dcnode-id="337"><div class="left" data-dcnode-id="360" id="Left_Ibb6b15b4a37c44699f35c609b85adc08"><div class="Image_Default" data-dcnode-id="372" id="Ifbd325a6285b4c0893519b39b30e20b3" style="display:block;clear: both;text-align:center;"><img data-dcnode-id="373" id="Ifbd325a6285b4c0893519b39b30e20b3_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blackfoxes.co.uk/resources/aid1052014-v4-728px-Choose-a-GPS-Dog-Collar-Step-5-Version-2.jpg.jpg&amp;raw"></div><div class="Text_2_Default" data-dcnode-id="361" id="If8f67032bccd42d8883b21b412d9d233" style="display:block;clear: both;"><span data-dcnode-id="369" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="362" id="If8f67032bccd42d8883b21b412d9d233_sys_txt" systemelement="true"><p data-dcnode-id="363"><span data-dcnode-id="364" style="color: #222222;"><span data-dcnode-id="368" instrument_node="">©&nbsp;</span><a data-dcnode-id="366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Choose-a-GPS-Dog-Collar" rel="noopener" target="_blank"><span data-dcnode-id="367" instrument_node="">WikiHow.com</span></a><span data-dcnode-id="365" instrument_node="">&nbsp;</span></span></p></div></div></div><div class="right" data-dcnode-id="338" id="Right_Ibb6b15b4a37c44699f35c609b85adc08"><div class="Text_2_Default" data-dcnode-id="339" id="I63e14274a0274ffd87e3edac058e0fa8" style="display:block;clear: both;"><span data-dcnode-id="357" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="340" id="I63e14274a0274ffd87e3edac058e0fa8_sys_txt" systemelement="true"><p data-dcnode-id="348"><span data-dcnode-id="349" style="color: #000000;"><span data-dcnode-id="356" instrument_node="">Make sure you fox is always wearing a</span><strong data-dcnode-id="354"><span data-dcnode-id="355" instrument_node=""> collar and I.D tag</span></strong><span data-dcnode-id="353" instrument_node="">. This is so it can be identified as a missing pet and returned in the event of an escape. It is also advised that keepers get their foxes </span><strong data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">microchipped</span></strong><span data-dcnode-id="350" instrument_node=""> and that they keep the details up-to-date for the same reasons (as a secondary measure, should a collar come off).&nbsp;</span></span></p><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="341"><span data-dcnode-id="342" style="color: #000000;"><span data-dcnode-id="346" instrument_node="">A </span><strong data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">GPS tracking device</span></strong><span data-dcnode-id="343" instrument_node=""> is also recommended, meaning a missing fox can be located quickly in the event of an emergency.&nbsp;</span></span></p></div></div></div></div></div><div class="Text_2_Default" data-dcnode-id="329" id="Ic992814a23b54b9e8cf717adffbbfe44" style="display:block;clear: both;"><span data-dcnode-id="333" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="330" id="Ic992814a23b54b9e8cf717adffbbfe44_sys_txt" systemelement="true"><h6 data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Maintain Good Health &amp; Hygiene Practices</span></h6></div></div><div class="Layout1_Default" data-dcnode-id="281" id="I4a6c9cec63b94dfca9016ad24d3ad25d" style="display:block;clear: both;margin:1rem 0 0 0;"><div class="column_I4a6c9cec63b94dfca9016ad24d3ad25d column_divider" data-dcnode-id="282"><div class="left" data-dcnode-id="312" id="Left_I4a6c9cec63b94dfca9016ad24d3ad25d"><div class="Image_Default" data-dcnode-id="323" id="Ib61faa78890544eab2ff7be6b17561db" style="display:block;clear: both;text-align:center;"><img alt="Caring for a Pet Fox" data-dcnode-id="324" id="Ib61faa78890544eab2ff7be6b17561db_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blackfoxes.co.uk/resources/Care_for_a_Pet_Fox/Care-for-a-Pet-Fox-Step-13-Version-3.jpg&amp;raw"></div><div class="Text_2_Default" data-dcnode-id="313" id="I64dbb74d74e84a5f910f62757862290b" style="display:block;clear: both;"><span data-dcnode-id="320" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="314" id="I64dbb74d74e84a5f910f62757862290b_sys_txt" systemelement="true"><p data-dcnode-id="315"><span data-dcnode-id="316" style="color: #222222;"><span data-dcnode-id="319" instrument_node="">©&nbsp;</span><a data-dcnode-id="317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Care-for-a-Pet-Fox" rel="noopener" target="_blank"><span data-dcnode-id="318" instrument_node="">WikiHow.com&nbsp;</span></a></span></p></div></div></div><div class="right" data-dcnode-id="283" id="Right_I4a6c9cec63b94dfca9016ad24d3ad25d"><div class="Text_2_Default" data-dcnode-id="284" id="I67a12c59273f4ee4b0c12ae3186936a0" style="display:block;clear: both;"><span data-dcnode-id="309" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="285" id="I67a12c59273f4ee4b0c12ae3186936a0_sys_txt" systemelement="true"><p data-dcnode-id="302"><span data-dcnode-id="303" style="color: #545454;"><span data-dcnode-id="304" style="color: #000000;"><span data-dcnode-id="308" instrument_node="">Routine health care is an important part of pet ownership and foxes require </span><strong data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">lots of training</span></strong><span data-dcnode-id="305" instrument_node=""> in order to be able to tolerate daily health checks.&nbsp;</span></span></span></p><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="286" style="color: rgb(0, 0, 0);"><span data-dcnode-id="299" style="color: rgb(0, 0, 0);"><span data-dcnode-id="300" instrument_node="">Silver f</span></span><span data-dcnode-id="288" style="color: rgb(0, 0, 0);"><span data-dcnode-id="298" instrument_node="">oxes&nbsp; were bred for their fur and shed heavily throughout spring and summer, so they need to be </span><strong data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">brushed regularly</span></strong><span data-dcnode-id="295" instrument_node="">. Like other pets, their </span><strong data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">nails need to be kept trim</span></strong><span data-dcnode-id="292" instrument_node=""> and free from splits or tears to ensure health and well-being. They can also be prone to </span><strong data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">tooth decay</span></strong><span data-dcnode-id="289" instrument_node="">, so keepers need to be able to check tooth and gum health without stressing their fox.&nbsp;</span></span><span data-dcnode-id="287" style="color: #545454;"></span></p></div></div></div></div></div><div class="Text_2_Default" data-dcnode-id="274" id="I365cc177781e4bb7a2279ff9efa81a41" style="display:block;clear: both;"><span data-dcnode-id="278" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="275" id="I365cc177781e4bb7a2279ff9efa81a41_sys_txt" systemelement="true"><h6 data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">Provide Stimulation &amp; Exercise</span></h6></div></div><div class="Layout1_Default" data-dcnode-id="223" id="I4568acf415db4cec91ab94fc48174360" style="display:block;clear: both;margin:1rem 0 0 0;"><div class="column_I4568acf415db4cec91ab94fc48174360 column_divider" data-dcnode-id="224"><div class="left" data-dcnode-id="256" id="Left_I4568acf415db4cec91ab94fc48174360"><div class="Image_Default" data-dcnode-id="268" id="If8af230811ca4b7a92a0c2615bc16ddd" style="display:block;clear: both;text-align:center;"><img alt="Caring for a Pet Fox" data-dcnode-id="269" id="If8af230811ca4b7a92a0c2615bc16ddd_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blackfoxes.co.uk/resources/Care_for_a_Pet_Fox/Care-for-a-Pet-Fox-Step-20-Version-4.jpg&amp;raw"></div><div class="Text_2_Default" data-dcnode-id="257" id="Id35cd5b71d1f405abf550fc774b25a03" style="display:block;clear: both;"><span data-dcnode-id="265" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="258" id="Id35cd5b71d1f405abf550fc774b25a03_sys_txt" systemelement="true"><p data-dcnode-id="259"><span data-dcnode-id="260" style="color: #222222;"><span data-dcnode-id="264" instrument_node="">©&nbsp;</span><a data-dcnode-id="262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Care-for-a-Pet-Fox" rel="noopener" target="_blank"><span data-dcnode-id="263" instrument_node="">WikiHow.com</span></a><span data-dcnode-id="261" instrument_node="">&nbsp;</span></span></p></div></div></div><div class="right" data-dcnode-id="225" id="Right_I4568acf415db4cec91ab94fc48174360"><div class="Text_2_Default" data-dcnode-id="226" id="I3d7e77d01fd54fd09059dfd9d9836751" style="display:block;clear: both;"><span data-dcnode-id="253" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="227" id="I3d7e77d01fd54fd09059dfd9d9836751_sys_txt" systemelement="true"><p data-dcnode-id="241"><span data-dcnode-id="242" style="color: #000000;"><span data-dcnode-id="252" instrument_node="">A critical component in supplying high standards of care and welfare for foxes is the provision of </span><strong data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">species specific environmental enrichment.</span></strong><span data-dcnode-id="249" instrument_node="">&nbsp;This allows a fox to display its natural behaviours,</span><strong data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="246" instrument_node="">such as; pouncing, caching, playing, digging and climbing. It is just as </span><strong data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">critical to captive animal welfare</span></strong><span data-dcnode-id="243" instrument_node=""> as nutrition and veterinary care.&nbsp;</span></span></p><span data-dcnode-id="240" instrument_node="">
</span><p data-dcnode-id="228"><span data-dcnode-id="229" style="color: #000000;"><span data-dcnode-id="239" instrument_node="">Foxes are </span><strong data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">very high drive</span></strong><span data-dcnode-id="236" instrument_node=""> animals, needing </span><strong data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">lots of</span></strong><span data-dcnode-id="233" instrument_node=""> </span><strong data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">stimulation</span></strong><span data-dcnode-id="230" instrument_node=""> to keep happy. At least 3-4 hours of engaging physical and mental activity daily is needed to keep a fox happy and content.&nbsp;</span></span></p></div></div></div></div></div><div class="Text_2_Default" data-dcnode-id="216" id="I866e8c10b5b94eb39c6422e3a77d1d1e" style="display:block;clear: both;"><span data-dcnode-id="220" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="217" id="I866e8c10b5b94eb39c6422e3a77d1d1e_sys_txt" systemelement="true"><h6 data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">Provide Training</span></h6></div></div><div class="Layout1_Default" data-dcnode-id="170" id="Ida43d0ddb6644da6b9ff6111cec0eb50" style="display:block;clear: both;margin:1rem 0 2rem 0;"><div class="column_Ida43d0ddb6644da6b9ff6111cec0eb50 column_divider" data-dcnode-id="171"><div class="left" data-dcnode-id="198" id="Left_Ida43d0ddb6644da6b9ff6111cec0eb50"><div class="Image_Default" data-dcnode-id="210" id="I2acec3ceb265475bb0a9df175fb381da" style="display:block;clear: both;text-align:center;"><img alt="Caring for a Pet Fox" data-dcnode-id="211" id="I2acec3ceb265475bb0a9df175fb381da_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blackfoxes.co.uk/resources/Care_for_a_Pet_Fox/Care-for-a-Pet-Fox-Step-19-Version-4.jpg&amp;raw"></div><div class="Text_2_Default" data-dcnode-id="199" id="I35741e51e62946e2bd844652d804734b" style="display:block;clear: both;"><span data-dcnode-id="207" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="200" id="I35741e51e62946e2bd844652d804734b_sys_txt" systemelement="true"><p data-dcnode-id="201"><span data-dcnode-id="202" style="color: #222222;"><span data-dcnode-id="206" instrument_node="">©&nbsp;</span><a data-dcnode-id="204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Care-for-a-Pet-Fox" rel="noopener" target="_blank"><span data-dcnode-id="205" instrument_node="">WikiHow.com</span></a><span data-dcnode-id="203" instrument_node="">&nbsp;</span></span></p></div></div></div><div class="right" data-dcnode-id="172" id="Right_Ida43d0ddb6644da6b9ff6111cec0eb50"><div class="Text_2_Default" data-dcnode-id="173" id="I0c7000e48f6b4c2eaf5d3c06a4137367" style="display:block;clear: both;"><span data-dcnode-id="195" instrument_node="">
</span><div class="sys_txt sys_text_widget new-text-widget" data-dcnode-id="174" id="I0c7000e48f6b4c2eaf5d3c06a4137367_sys_txt" systemelement="true"><p data-dcnode-id="175" style="color: #000000;"><span data-dcnode-id="194" instrument_node="">P</span><span data-dcnode-id="186" style="color: #000000;"><span data-dcnode-id="193" instrument_node="">reparing a fox to cope with the </span><strong data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">different challenges </span></strong><span data-dcnode-id="190" instrument_node="">they may face living in captivity is an important aspect of their care and welfare, one that has a </span><strong data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">continuing impact</span></strong><span data-dcnode-id="187" instrument_node=""> throughout their lives.&nbsp;</span></span><span data-dcnode-id="184" style="color: #000000;"><span data-dcnode-id="185" instrument_node="">N</span></span><span data-dcnode-id="176" style="color: #000000;"><span data-dcnode-id="183" instrument_node="">ature and nurture have a complex relationship and getting the balance right can be tricky. </span><strong data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">"Puppy culture"</span></strong><span data-dcnode-id="180" instrument_node=""> is promoted for foxes, along with the same basic training you might provide a dog, but they are a lot more like cats with regards to training. It is important to bare in mind that foxes are very timid, independent animals and training can often be </span><strong data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">at a much slower pace, </span></strong><span data-dcnode-id="177" instrument_node="">it is most effective starting at an early age.</span></span></p></div></div></div></div></div><div class="Horizontal_Line_Default" data-dcnode-id="166" id="Iab07ab0f82564abc866ba48387b9b51c" style="display:block;clear: both;margin:1rem 0 2rem 0;"><span data-dcnode-id="169" in
