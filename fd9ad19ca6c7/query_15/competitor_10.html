fINTRODUCTION
The	study	of	the	English	language	has	spread	all	over	the	world,	and	high	school	and	college
students	everywhere	have	come	to	realize	that	language	mastery	depends	on	the	possession	of
a	 comprehensive	 vocabulary.	 This	 is	 just	 what	 1100	 Words	 You	 Need	 to	 Know	 has	 been
offering	through	the	five	earlier	editions	and	continuing	on	this	sixth	one.



We	 are	 proud	 that	 Amazon.com	 has	 rated	 this	 book	 as	 the	 number	 one	 best	 seller	 in	 its
category.	In	addition	to	the	various	exercises	that	help	readers	learn	challenging	vocabulary,
we	have	now	added	a	section	called	“The	Lighter	Touch	100,”	which	shows	that	vocabulary
can	be	taught	with	a	sense	of	humor.	By	investing	a	mere	15	minutes	with	this	new	book,	you
will	soon	see	a	dramatic	improvement	in	your	vocabulary.

READING	WISELY
The	 youngster	 who	 reads	 voraciously,	 though	 indiscriminately,	 does	 not	 necessarily	 gain	 in
wisdom	over	the	teenager	who	is	more	selective	in	his	reading	choices.	A	young	man	who	has
read	the	life	story	of	every	eminent	athlete	of	the	twentieth	century,	or	a	coed	who	has	steeped
herself	in	every	social-protest	novel	she	can	get	her	hands	on,	may	very	well	be	learning	all
there	is	to	know	in	a	very	limited	area.	But	books	are	replete	with	so	many	wonders	that	it	is
often	discouraging	to	see	bright	young	people	limit	their	own	experiences.

SOLVING	THE	SERVANT	PROBLEM
The	 worlds	 of	 science-fiction	 abound	 with	 wonders.	 Yet	 modern	 technology	 progresses	 so
rapidly	that	what	may	be	today’s	wild	dream	may	be	next	year ’s	kitchen	appliance.	A	British
scientist	 has	 prognosticated	 that	 within	 ten	 years	 every	 suburban	 matron	 will	 have	 her	 own
robot	 servant.	 One	 task	 this	 domesticated	 automaton	 will	 not	 have	 to	 contend	 with	 will	 be
scouring	the	oven	because	even	today	the	newest	ranges	can	be	“programmed”	to	reduce	their
own	baked-on	grime	to	easily	disposed	of	ashes.

Enrico	Fermi	designed	a	device	that	could	eventuate	in	a	chain	reaction.	It	consisted	of	layers
of	 graphite,	 alternated	 with	 chunks	 of	 uranium.	 The	 uranium	 emitted	 neutrons,	 and	 the
graphite	slowed	them	down.	Holes	were	left	for	long	cadmium	safety	rods.	By	withdrawing
those	 control	 rods	 Fermi	 could	 speed	 up	 the	 production	 of	 neutrons,	 thus	 increasing	 the
number	 of	 uranium	 atoms	 that	 would	 be	 split	 (fission).	 When	 the	 rods	 were	 withdrawn	 to	 a
critical	 point,	 then	 the	 neutrons	 would	 be	 produced	 so	 fast	 that	 the	 graphite	 and	 cadmium
could	 not	 absorb	 them.	 In	 that	 manner	 a	 chain	 reaction	 would	 result.	 Slowly,	 Fermi’s	 first
atomic	pile	began	to	grow	in	a	subterranean	room	at	Columbia	University.	The	big	question
remained—was	it	viable?

AN	HISTORIC	SUPREME	COURT	RULING
Lawyer	Kroll	persevered	in	his	defense	of	Danny	Escobedo.	The	case	was	argued	before	the
Supreme	Court,	and	in	1964,	in	a	landmark	decision,	the	Court	reversed	Danny’s	conviction.
Legal	 aid,	 said	 the	 judges,	 must	 be	 instantly	 available	 to	 a	 suspect.	 “A	 system	 of	 law
enforcement	that	comes	to	depend	on	the	confession,”	one	Justice	declared,	“will,	in	the	long
run,	 be	 less	 reliable	 than	 a	 system	 that	 depends	 on	 extrinsic	 evidence	 independently	 secured
through	skillful	investigation.”	A	Justice	who	declaimed	against	the	decision	said,	however,	“I
think	 the	 rule	 is	 ill-conceived	 and	 that	 it	 seriously	 fetters	 perfectly	 legitimate	 methods	 of
criminal	enforcement.”

THE	EFFECTS	OF	THE	ESCOBEDO	DECISION
After	 Danny	 Escobedo’s	 release	 from	 prison,	 hundreds	 of	 inmates	 began	 suits	 for	 their
freedom	 on	 the	 grounds	 that	 their	 rights	 had	 been	 violated,	 too.	 Each	 case	 was	 heard	 on	 its
merits,	 and	 in	 numerous	 instances	 people	 who	 had	 been	 convicted	 of	 serious	 offenses	 were
freed	because	of	the	new	standards	established	in	the	Escobedo	case.	After	getting	out,	Danny
was	 not	 a	 paragon	 of	 virtue,	 according	 to	 the	 police.	 He	 led	 a	 nomadic	 existence,	 drifting
from	job	to	job,	and	was	arrested	frequently.	With	asperity,	and	a	few	choice	epithets,	Danny
referred	 to	 police	 harassment.*	 Although	 the	 Escobedo	 case	 was	 a	 controversial	 one,	 most
agree	that	it	inspired	better	police	training,	better	law	enforcement	procedures,	and	improved
scientific	crime	detection.

QUEENS,	WORKERS,	DRONES
Each	 colony	 of	 honeybees	 consists	 of	 three	 classes:	 a)	 the	 queen	 who	 is	 a	 prolific	 layer	 of
eggs;	b)	the	worker	who	is	the	bulwark	of	the	colony;	and	c)	the	sedentary	drone	whose	only
function	is	to	mate	with	a	young	queen.	The	queen	lays	the	eggs	that	hatch	into	thousands	of
female	workers;	some	queens	live	as	long	as	five	years	and	lay	up	to	one	million	eggs.	The
frugal	worker	builds	and	maintains	the	nest,	collects	and	stores	the	honey,	and	is	the	antithesis
of	the	lazy	drone,	or	male	honeybee,	who	does	not	work	and	has	no	sting.	When	the	drone	is
no	longer	needed,	the	workers,	in	effect,	liquidate*	him	by	letting	him	starve	to	death.	It’s	a
cruel,	cruel	world!

THE	SAGA	OF	THE	QUEEN	BEE
Although	the	virtuosity	of	the	workers	is	remarkable,	the	queen	bee	is	really	the	main	story.
Workers	 choose	 a	 few	 larvae	 to	 be	 queens,	 feeding	 them	 royal	 jelly,	 a	 substance	 rich	 in
proteins	and	vitamins.	While	the	queen	is	changing	from	a	larva	to	a	pupa,	a	team	of	workers
builds	 a	 special	 cell	 for	 her.	 Soon	 the	 young	 queen	 hatches,	 eats	 the	 prepared	 honey,	 and
grows	strong.	After	she	kills	any	rivals	who	have	the	temerity	 to	 challenge	 her,	 an	 amorous
note	is	injected.	She	flies	from	the	hive	and	mates	with	one	or	more	drones	on	her	first	flight.
Then	 the	 process	 of	 egg	 laying	 begins.	 When	 her	 progeny	 saturate	 the	 hive,	 scouts	 are
dispatched	to	find	a	new	location,	and	the	bees	swarm	after	their	leader	to	begin	the	amazing
cycle	again.

reminded	of	a	true	(he	said)	story	that	went	like	this:
Mr.	 D.,	 the	 gang	 kingpin	 in	 our	 community,	 loved	 money.	 Like	 Silas	 Marner,	 the	
weaver	of	George	Eliot’s	novel,	he	enjoyed	counting	his	treasure	each	Friday	night.	Mr.	D’s	
            	was	concealed	in	a	wall	safe	behind	a	painting	in	his	office.	The	$50	and	$100	bills
made	his	hands	dirty	as	he	counted	them	but	Mr.	D	didn’t	mind.	The	filth	of	the	lucre	did	not
disturb	him	at	all.

gotten	gains.	Having	bought	the	combination	from	a	relative	who	had	installed	Mr.	D’s	safe,
he	stuffed	his	loot	into	a	laundry	bag	and	was	halfway	out	the	door	when	he	spied	a	$10	bill
on	the	floor.	His	          	made	him	go	back	for	that	small	change,	and	in	that	moment,	Mr.
D.	arrived	on	the	scene.
The	quick-thinking	thief	blurted	out,	“I’ll	have	the	shirts	back	on	Friday.”	Hoisting	the	laundry
bag	over	his	shoulder,	he	was	out	the	door	before	the	confused	mobster	could	figure	out	what
had	happened.
Timmy,	who	had	listened	patiently,	said,	“I	don’t	believe	a	word	of	that	story	because	it	would
take	a	guy	with	a	great	deal	of	starch	to	pull	it	off!”

Money,	 taxes,	 employment,	 legislation—these	 are	 topics	 that	 we	 associate	 with	 the	 adult
world.	 George	 Richmond,	 a	 Yale	 graduate	 who	 became	 a	                 	 in	 the	 New	 York	 City
school	system,	felt	that	elementary	school	youngsters	could	also	be	interested,	even	excited,
about	 such	 issues.	 He	 experimented	 in	 his	 own	 classes	 with	 the	 Microsociety	 in	 which	 basic
instruction	takes	place	and	is	reinforced	as	pupils	operate	their	own	businesses,	pass	laws,	live
within	the	parameter</span><span data-dcnode-id="138" instrument_node="">s	of	a	constitution	that	they	drafted,	seek	redress	within	their	own	judicial
system,	buy	and	sell	real	estate,	and	so	on.
Richmond’s	 book	 on	 the	 Microsociety	 came	 to	 the	 attention	 of	 the	 school	 board	 in	 Lowell,
Massachusetts,	 and	 their	 members	 decided	 to	 give	 it	 a	 try	 in	 1981.	 In	 much	 less	 than	 a	
          	the	results	were	quite	remarkable:	students	exceeded	the	norm	in	reading	and	math;
8th	graders	passed	college	level	exams;	school	attendance	went	up	to	96%;	and	the	dropout
rate	took	a	nosedive	in	Lowell.
In	Microsociety’s	            	classes,	mornings	are	given	over	to	the	traditional	curriculum.	In
the	 afternoon,	 the	 students	 apply	 what	 they	 learned	 in	 activities	 that	 run	 the	  	 from
keeping	 double	 entry	 books,	 doing	 financial	 audits,	 running	 a	 bank,	 and	 conducting	 court
sessions	to	engaging	in	light	manufacture	that	leads	to	retail	and	wholesale	commerce.
Other	         	 school	 systems	 have	 since	 adopted	 George	 Richmond’s	 innovative	 ideas.
“Microsociety,”	said	a	Yonkers,	New	York	principal,	“gets	kids	to	role-play	life!”
A	 Time	 Magazine	 reporter	 was	 much	 impressed	 with	 Microsociety’s	 results:	 “Such	 an
approach	 would	 go	 a	 long	 way	 toward	 making	 U.S.	 public	 schools	 a	 cradle	 of	 national
renewal.”

fPANORAMA	OF	WORDS
			Originally	introduced	in	the	preceding	edition,	this	section,	in	which	you	will	find	the	1100
     words	in	sources	as	strikingly	disparate	as	the	Toronto	Globe	&amp;	Mail,	Truman	Capote,
     William	Shakespeare,	Agatha	Christie,	Thomas	Mann,	TIME,	Machiavelli,	and	Tom
     Clancy,	validates	the	contention	that	this	selected	group	of	vocabulary	words	has	been
     widely	used	by	educated	writers.

     Most	issues	of	your	local	newspaper,	for	example,	will	contain	at	least	a	dozen	of	the
     words	you	have	encountered	in	these	pages.	But	they	also	appear	in	advertisements,
     obituary	notices,	weather	forecasts,	cartoons,	and	brochures	of	all	sorts.	Wherever	else
     you	come	in	contact	with	adult	vocabulary—radio	and	TV	shows,	news	broadcasts,
     college	entrance	exams,	movie	scripts,	books—you	are	likely	to	find	more	than	a	few	of
     the	words	in	1100	Words	You	Need	to	Know.

     Now,	for	a	useful	summary	of	what	you	have	learned	in	the	forty-six	lessons,	read
     through	the	“Panorama	of	Words,”	noting	the	varied	sources	of	their	usage.	Be	aware
     that	some	of	the	following	quotations	have	been	adapted	or	edited	for	brevity.

Investigators	 found	 that	 a	 series	 of	 mistakes	 led	 to	 the	 sinking	 of	 the	 Titanic.	 A	 wireless
message	had	come	in	from	a	French	liner,	warning	of	ice	ahead,	but	that	was	a	thousand	miles
away,	and	so,	no	need	to	worry.	On	April	13,	the	vessel	Rapphannock	also	warned	the	Titanic
of	dangerous	ice	ahead.	On	the	following	day,	there	came	a	spate*	of	other	warnings	from	a
Cunard	ship,	a	Dutch	liner,	and	the	White	Star	Baltic—all	telling	of	icebergs	about	250	miles
from	 the	 Titanic’s	 current	 position.	 Next	 came	 the	 German	 Amerika,	 echoing	 the	 same
forebodings,	followed	by	the	California,	cautioning	the	Titanic	about	the	field	ice.	Finally,	the
Mesaba	 called	 attention	 to	 an	 enormous	 belt	 of	 ice	 stretching	 directly	 across	 the	 Titanic’s
path.	 All	 the	 messages	 emanating	 from	 sister	 ships	 should	 have	 had	 a	 profound*	 effect	 on
Smith	and	company.
   No	 one	 miscreant	 could	 be	 fingered,	 but	 a	 host	 of	 crew	 members	 were	 certainly
blameworthy.	 Why	 didn’t	 Captain	 Smith’s	 officers	 react	 to	 those	 messages?	 Notations	 were
indeed	 made	 on	 slips	 of	 paper	 but	 largely	 ignored	 and	 forgotten.	 There	 was	 no	 standard
protocol	for	the	handling	of	such	messages;	if	there	had	been,	Captain	Smith	would	certainly
have	taken	a	circuitous	route	so	as	to	avoid	the	dangerous	icebergs.

THE	LAWYERS’	TURN
As	one	might	have	expected,	manifold*	law	suits	against	the	White	Star	Line	began	to	crop	up
within	weeks	of	the	sinking	and	rescue.	The	glut	of	billionaires	on	board	(Astors,	Wideners,
Guggenheims,	Strausses,	et	al.)	did	not	file	any	claims,	but	other	cases	went	all	the	way	to	the
Supreme	Court	and	kept	lawyers	and	judges	busy	for	the	next	four	years.	The	average	claim
had	 been	 for	 a	 modest	 $1500,	 and	 the	 average	 award,	 paid	 by	 the	 White	 Star	 Line,	 was	 a
risible	$1000.	White	Star ’s	top	notch	legal	staff	was	accused	of	using	dilatory	 tactics,	 tiring
the	 claimants	 until	 they	 agreed	 to	 settle	 for	 a	 mere	 pittance*.	 Their	 lawyers	 called	 many
claims	specious	and	rejected	them	out	of	hand.
   The	 denouement	 of	 the	 story	 is	 rather	 sad.	 American	 and	 British	 maritime	 law	 had	 long
given	 special	 protection	 to	 ship	 owners	 on	 the	 grounds	 that	 their	 business	 was	 such	 a	 risky
one.	And	so	there	was	a	limit	to	the	amount	of	money	that	White	Star	could	be	assessed.	In	the
end,	 they	 paid	 only	 4%	 of	 the	 $16	 million	 originally	 demanded	 by	 the	 survivors	 and	 were
happy	to	close	the	books	on	the	ocean	disaster.	We	can	imagine	that	if	a	similar	tragedy	were
to	take	place	today,	the	settlements	would	be	in	the	hundreds	of	millions.

On	Palm	Sunday,	April	9,	1865,	General	Ulysses	S.	Grant	sent	a	terse*	dispatch	to	Secretary

Robert	E.	Lee	had	surrendered.	The	dolorous	Civil	War	that	had	crippled	the	young	nation	was
finally	over.
   President	Lincoln	was	only	56	at	the	time,	but	he	looked	twenty	years	older.	The	burden	of
being	a	wartime	president	had	so	enervated	 Lincoln	 that	 Surgeon	 General	 Barnes	 feared	 an
imminent*	 nervous	 breakdown.	 When	 Grant’s	 news	 reached	 Lincoln,	 he	 went	 to	 the	 front
windows	 of	 the	 White	 House	 and	 waved	 to	 the	 crowd	 below.	 He	 proceeded	 to	 make	 a	 brief
speech	 about	 the	 problems	 of	 Reconstruction	 and	 advocated*	 the	 granting	 of	 suffrage	 to
Negro	soldiers.
   Among	the	listeners	was	a	Southern	patriot,	the	popular	actor	John	Wilkes	Booth,	almost	as
famous	 in	 the	 theater	 as	 his	 father,	 Junius.	 “That’s	 the	 last	 speech	 he	 will	 ever	 make,”	 said
Booth	to	a	fellow	member	of	his	cabal	of	conspirators.	Booth’s	odious	plan	was	to	assassinate
Lincoln	whom	he	hated	passionately,	while	an	associate,	George	Atzerodt,	would	do	the	same

Lincoln’s	family	and	friends	remembered	that	the	President	had	a	prescient	dream	in	March,
several	 weeks	 before	 the	 fatal	 day,	 and	 provided	 them	 with	 a	 verbatim	 account.	 He	 told	 of
entering	the	East	Room	in	the	White	House	where	a	throng*	of	people	were	gathered	around
an	 open	 coffin.	 In	 his	 reverie,	 Lincoln	 asked	 a	 soldier,	 “Who	 is	 dead	 in	 the	 White	 House?”
“The	President,”	was	the	reply.	“He	was	killed	by	an	assassin.”
   Mrs.	 Lincoln	 said,	 “I’m	 glad	 I	 don’t	 believe	 in	 dreams	 or	 I	 should	 be	 in	 terror	 from	 this
time	 forth.”	 Lincoln’s	 was	 the	 calming	 voice,	 “Let’s	 try	 to	 forget	 it.	 I	 think	 the	 Lord	 in	 His
own	good	time	and	way	will	work	this	out	all	right.”
   Of	course,	all	who	loved	Abe	Lincoln	would	have	been	deeply	agitated	if	they	had	known

THE	ASSASSINS	MAKE	READY
The	pathological	yet	articulate	Booth	had	rounded	up	several	co-conspirators	and	shared	his
delusions	of	grandeur	with	them.	He	had	produced	a	polemic	 that	 convinced	 his	 crew	 that	 it
would	be	a	patriotic	thing	to	capture	the	President.	One	of	them	was	assigned	to	shut	off	the
master	gas	valve	at	Ford’s	Theatre	when	Mr.	and	Mrs	Lincoln	were	seated	there	at	the	play.
With	 all	 the	 lights	 out,	 Booth	 would	 bind	 and	 gag	 the	 President.	 Two	 men	 would	 lower
Lincoln	onto	the	stage,	and	then	carry	him	out	the	rear	door	to	a	covered	wagon	waiting	in	the
alley.	They	would	head	for	Port	Tobacco	and	then	ferry	across	the	Potomac	to	their	ultimate*
destination,	Richmond,	Virginia.
    Several	 dry	 runs*	 had	 not	 worked	 out	 for	 the	 cabalists*	 who	 were	 about	 to	 reach	 an
impasse	when	Booth	learned	that	Lincoln	would	be	celebrating	General	Grant’s	victories	with
a	party	at	Ford’s	Theater	on	the	night	of	April	14.	He	promised	the	small	group	that	destiny
was	at	hand;	their	bold	act,	he	said,	would	make	their	names	famous	forever	in	the	annals	of
U.S.	history.
    In	 the	 late	 afternoon	 of	 April	 14,	 Booth	 watched	 a	 rehearsal	 of	 the	 play	 that	 would	 be
performed	that	evening.	He	had	reviewed	his	action	plan	and	the	escape	route,	and	he	believed
it	 to	 be	 foolproof.	 He	 mouthed	 the	 phrase	 he	 would	 use	 after	 killing	 Lincoln,	 “Sic	 Semper
Tyrannis”	(“Thus	always	to	tyrants”).
    The	curtain	was	about	to	go	up	on	one	of	the	darkest	days	in	the	country’s	history.

who	had	denigrated	his	acting	skill,	“When	I	leave	the	stage,	I	will	be	the	most	famous	man	in
America.”
   At	about	10	 ,	with	extreme	guile,	Booth	had	managed	to	be	behind	Box	7	in	the	darkness

of	the	hallway.	He	saw	the	silhouette	of	a	head	above	the	horsehair	rocker.	Derringer	in	his
hand,	he	aimed	it	between	the	President’s	left	ear	and	his	spine.	The	shot	was	drowned	out	by
laughter	on	the	stage.	Shouting	“Revenge	for	the	South,”	Booth	climbed	over	the	ledge	of	the
box	and	jumped	onto	the	stage,	breaking	his	leg	in	the	process.

getaway.	 Days	 later,	 however,	 he	 was	 cornered	 in	 a	 Virginia	 barn	 and	 shot.	 Three	 of	 the
cabal*	members	were	arrested	and	hanged.

lead	 shot	 had	 lodged	 in	 Lincoln’s	 brain,	 a	 bad	 sign.	 Several	 soldiers	 carried	 Mr.	 Lincoln
across	 the	 street	 to	 a	 private	 house.	 His	 family	 physician	 came	 and	 so	 did	 the	 Surgeon
General.	The	President	struggled	throughout	the	long	night,	but	it	was	apparent	that	a	mortal
wound	had	been	inflicted,	and	he	could	not	be	saved.
   At	 7:22	 	 it	 was	 over;	 two	 silver	 coins	 were	 placed	 on	 the	 assassinated	 President’s	 eyes.
