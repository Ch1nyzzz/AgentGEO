ttom" data-dcnode-id="5144"><span data-dcnode-id="5145" instrument_node="">Highlights</span></h2><div data-dcnode-id="5121" id="abst0005"><p data-dcnode-id="5122" id="spar0005"></p><dl class="list" data-dcnode-id="5123"><dt class="list-label" data-dcnode-id="5142"><span data-dcnode-id="5143" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5139"><p data-dcnode-id="5140" id="par0005"><span data-dcnode-id="5141" instrument_node="">Socialization of kittens and factors affecting behaviour towards humans.</span></p></dd><dt class="list-label" data-dcnode-id="5137"><span data-dcnode-id="5138" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5134"><p data-dcnode-id="5135" id="par0010"><span data-dcnode-id="5136" instrument_node="">Cat personalities and owner personalities.</span></p></dd><dt class="list-label" data-dcnode-id="5132"><span data-dcnode-id="5133" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5129"><p data-dcnode-id="5130" id="par0015"><span data-dcnode-id="5131" instrument_node="">Effects of cats on humans.</span></p></dd><dt class="list-label" data-dcnode-id="5127"><span data-dcnode-id="5128" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5124"><p data-dcnode-id="5125" id="par0020"><span data-dcnode-id="5126" instrument_node="">Problems caused by cats including predation on wildlife.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="5114" id="abs0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5118"><span data-dcnode-id="5119" instrument_node="">Abstract</span></h2><div data-dcnode-id="5115" id="abst0010"><p data-dcnode-id="5116" id="spar0010"><span data-dcnode-id="5117" instrument_node="">This review article covers research conducted over the last three decades on cat-human and human-cat interactions and relationships, especially from an ethological point of view. It includes findings on cat-cat and cat-human communication, cat personalities and cat-owner personalities, the effects of cats on humans, and problems caused by cats.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="5090" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="5102"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0376635716302984"><svg class="icon icon-navigate-left" data-dcnode-id="5111" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="5112"></path></svg><span class="button-alternative-text" data-dcnode-id="5104"><strong data-dcnode-id="5109"><span data-dcnode-id="5110" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="5107"><span data-dcnode-id="5108" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5105"><span data-dcnode-id="5106" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="5091"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0376635716303059"><span class="button-alternative-text" data-dcnode-id="5095"><strong data-dcnode-id="5100"><span data-dcnode-id="5101" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="5098"><span data-dcnode-id="5099" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5096"><span data-dcnode-id="5097" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="5093" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="5094"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="5071"><div class="keywords-section" data-dcnode-id="5072" id="kwd0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5088"><span data-dcnode-id="5089" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="5085" id="kw0005"><span data-dcnode-id="5086"><span data-dcnode-id="5087" instrument_node="">Cat-human relationships</span></span></div><div class="keyword" data-dcnode-id="5082" id="kw0010"><span data-dcnode-id="5083"><span data-dcnode-id="5084" instrument_node="">Ethology</span></span></div><div class="keyword" data-dcnode-id="5079" id="kw0015"><span data-dcnode-id="5080"><span data-dcnode-id="5081" instrument_node="">Socialization</span></span></div><div class="keyword" data-dcnode-id="5076" id="kw0020"><span data-dcnode-id="5077"><span data-dcnode-id="5078" instrument_node="">Personality</span></span></div><div class="keyword" data-dcnode-id="5073" id="kw0025"><span data-dcnode-id="5074"><span data-dcnode-id="5075" instrument_node="">Communication</span></span></div></div></div><span data-dcnode-id="5070" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="4471" id="body"><div data-dcnode-id="4472"><section data-dcnode-id="5037" id="sec0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5066" id="sect0020"><span data-dcnode-id="5069" instrument_node="">1</span><span data-dcnode-id="5068" instrument_node="">. </span><span data-dcnode-id="5067" instrument_node="">Introduction</span></h2><p data-dcnode-id="5038" id="par0025"><span data-dcnode-id="5065" instrument_node="">The author has been involved in, conducted or led research on cat behaviour and human-cat relationships while at the University of Zurich from 1982 to 2011 and at the private institute, the Institute for Applied Ethology and Animal Psychology (I.E.A.P.), near Zurich from 1991 to today. Over those years Turner has advised many students and had fruitful collaborations with a number of research assistants, to whom he is greatly indebted for their fine work. Before that period, most of the domestic cat research was conducted by the late Paul </span><a class="workspace-trigger" data-dcnode-id="5063" href="#bib0145" name="bbib0145"><span data-dcnode-id="5064" instrument_node="">Leyhausen, 1956</span></a><span data-dcnode-id="5062" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5060" href="#bib0150" name="bbib0150"><span data-dcnode-id="5061" instrument_node="">Leyhausen, 1979</span></a><span data-dcnode-id="5059" instrument_node=""> who concentrated on the ethology and evolution of predatory behaviour patterns with very little interest in the social behaviour of this ‘solitary species’. It wasn’t until 1970 that Michael Fox, and later, </span><a class="workspace-trigger" data-dcnode-id="5057" href="#bib0120" name="bbib0120"><span data-dcnode-id="5058" instrument_node="">Karsh, 1983a</span></a><span data-dcnode-id="5056" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5054" href="#bib0125" name="bbib0125"><span data-dcnode-id="5055" instrument_node="">Karsh, 1983b</span></a><span data-dcnode-id="5053" instrument_node=""> began looking at the ‘socialization’ of kittens. With the late Leyhausen’s retirement, the number of domestic cat researchers and research centers working on cats increased to the point that a symposium seemed useful to assess current knowledge and knowledge gaps. This was organized in Zurich (Cats’ 86) by the present author and the contributions published in the first edition of </span><em data-dcnode-id="5051"><span data-dcnode-id="5052" instrument_node="">The Domestic Cat. The biology of its behaviour</span></em><span data-dcnode-id="5050" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="5048" href="#bib0315" name="bbib0315"><span data-dcnode-id="5049" instrument_node="">Turner and Bateson, 1988</span></a><span data-dcnode-id="5039"><span data-dcnode-id="5043"><span data-dcnode-id="5047" instrument_node="">), which was translated into several languages and has since enjoyed two further editions (2000, 2014). With some notable exceptions, much of what is known today about cat-human and human-cat interactions and relationships have come from the Zurich lab and will be summarized in this review article. Topics to be covered are: The development of the first relationship of a kitten to humans, in other words, socialization and the sensitive phase; other factors affecting the cat to human relationship; the ethology of cat-human interactions; combining ethological observations and subjective assessments of cat </span><a class="topic-link" data-dcnode-id="5045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/personality-traits" title="Learn more about personality traits from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5046" instrument_node="">personality traits</span></a><span data-dcnode-id="5044" instrument_node="">; cat and cat-human communication; cat and cat-owner personalities; </span></span><a class="topic-link" data-dcnode-id="5041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/breed-differences" title="Learn more about breed differences from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5042" instrument_node="">breed differences</span></a><span data-dcnode-id="5040" instrument_node="">; the effects of cats on humans; and problems caused by cats.</span></span></p></section><section data-dcnode-id="4975" id="sec0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5033" id="sect0025"><span data-dcnode-id="5036" instrument_node="">2</span><span data-dcnode-id="5035" instrument_node="">. </span><span data-dcnode-id="5034" instrument_node="">Socialization and sensitive phase</span></h2><p data-dcnode-id="5004" id="par0030"><a class="workspace-trigger" data-dcnode-id="5031" href="#bib0090" name="bbib0090"><span data-dcnode-id="5032" instrument_node="">Fox (1970)</span></a><span data-dcnode-id="5030" instrument_node=""> was the first researcher to describe the socialization period in cats, “beginning at 17</span><span data-dcnode-id="5029" instrument_node="">&nbsp;</span><span data-dcnode-id="5028" instrument_node="">days of age”, when increased sensory abilities and improved locomotor abilities allow the kitten to interact with the environment and littermates. Later, </span><a class="workspace-trigger" data-dcnode-id="5026" href="#bib0120" name="bbib0120"><span data-dcnode-id="5027" instrument_node="">Karsh, 1983a</span></a><span data-dcnode-id="5025" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5023" href="#bib0125" name="bbib0125"><span data-dcnode-id="5024" instrument_node="">Karsh, 1983b</span></a><span data-dcnode-id="5022" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5020" href="#bib0130" name="bbib0130"><span data-dcnode-id="5021" instrument_node="">Karsh, 1984</span></a><span data-dcnode-id="5019" instrument_node=""> conducted well-designed handling experiments of lab colony kittens by humans and demonstrated a sensitive phase for socialization between the second and seventh week of age. For a detailed description of these and related experiments see </span><a class="workspace-trigger" data-dcnode-id="5017" href="#bib0135" name="bbib0135"><span data-dcnode-id="5018" instrument_node="">Karsh and Turner (1988)</span></a><span data-dcnode-id="5016" instrument_node="">. </span><a class="workspace-trigger" data-dcnode-id="5014" href="#bib0045" name="bbib0045"><span data-dcnode-id="5015" instrument_node="">Casey and Bradshaw (2008)</span></a><span data-dcnode-id="5013" instrument_node=""> later compared the effect of regular “handling” during the socialization period of kittens in three rescue centers (relatively little direct handling, multiple feedings each day and cleaning the cages with mothers and offspring, involving contact with one to four different persons in the cages) and enhanced handling from 2 to 9 weeks of age (increasing holding the kittens from 2 to 5</span><span data-dcnode-id="5012" instrument_node="">&nbsp;</span><span data-dcnode-id="5011" instrument_node="">min at 6 weeks of age and increased time playing with them) before homing. One year later, interviews with the owners revealed that those animals with the enhanced handling showed fewer signs of fear of humans. </span><a class="workspace-trigger" data-dcnode-id="5009" href="#bib0190" name="bbib0190"><span data-dcnode-id="5010" instrument_node="">Meier and Turner (1985)</span></a><span data-dcnode-id="5008" instrument_node=""> were able to demonstrate the existence of socialized and non-socialized adult cats during encounters between cats and an unfamiliar person on neighborhood streets, while </span><a class="workspace-trigger" data-dcnode-id="5006" href="#bib0170" name="bbib0170"><span data-dcnode-id="5007" instrument_node="">Lowe and Bradshaw (2002)</span></a><span data-dcnode-id="5005" instrument_node=""> experimentally demonstrated the stability of responses to being handled by an unfamiliar person from weaning (8 weeks) to three years of age.</span></p><p data-dcnode-id="4983" id="par0035"><span data-dcnode-id="5003" instrument_node="">Concerning the amount of handling, this certainly affects a cat’s attachment to humans. </span><a class="workspace-trigger" data-dcnode-id="5001" href="#bib0125" name="bbib0125"><span data-dcnode-id="5002" instrument_node="">Karsh (1983b)</span></a><span data-dcnode-id="5000" instrument_node=""> conducted an experiment with her lab cats and found that subjects which had been handled for 40</span><span data-dcnode-id="4999" instrument_node="">&nbsp;</span><span data-dcnode-id="4998" instrument_node="">min a day stayed significantly longer with the test person in a holding test than cats handled for only 15</span><span data-dcnode-id="4997" instrument_node="">&nbsp;</span><span data-dcnode-id="4996" instrument_node="">min a day. They also approached a person faster, but did not stay with the person significantly longer. Nevertheless, home-reared cats adopted from Karsh’s colony still surpassed even the long-handled cats on these measures and their adopters reported total interaction times with the adoptees of one to two hours per day. Similar interaction times (on average, 1.5</span><span data-dcnode-id="4995" instrument_node="">&nbsp;</span><span data-dcnode-id="4994" instrument_node="">h) were reported by cat owners in Zurich (</span><a class="workspace-trigger" data-dcnode-id="4992" href="#bib0265" name="bbib0265"><span data-dcnode-id="4993" instrument_node="">Turner 1985</span></a><span data-dcnode-id="4991" instrument_node="">). Most experimental studies have used handling periods of 30–40</span><span data-dcnode-id="4990" instrument_node="">&nbsp;</span><span data-dcnode-id="4989" instrument_node="">min but up to 5</span><span data-dcnode-id="4988" instrument_node="">&nbsp;</span><span data-dcnode-id="4987" instrument_node="">h per day. It seems though that not much changes after more than an hour of handling (</span><a class="workspace-trigger" data-dcnode-id="4985" href="#bib0185" name="bbib0185"><span data-dcnode-id="4986" instrument_node="">McCune et al., 1995</span></a><span data-dcnode-id="4984" instrument_node="">).</span></p><p data-dcnode-id="4976" id="par0040"><span data-dcnode-id="4982" instrument_node="">Regarding the number of handlers a kitten has experienced, the results probably reflect degree of attachment to an individual person as well as original socialization to humans. Looking at Karsh’s 8 lab cats handled daily for 40</span><span data-dcnode-id="4981" instrument_node="">&nbsp;</span><span data-dcnode-id="4980" instrument_node="">min by one person during most of the sensitive period for socialization, they could be held significantly longer by their familiar person than by another unfamiliar person. However, when the holding scores of these cats were compared with those of their littermates who were handled and tested by four different people, they were similar. These results indicate that cats are capable of developing a personal relationship with their individual handlers, but also that socialized animals are able to generalize their responses to other people (see </span><a class="workspace-trigger" data-dcnode-id="4978" href="#bib0280" name="bbib0280"><span data-dcnode-id="4979" instrument_node="">Turner, 1995a</span></a><span data-dcnode-id="4977" instrument_node="">).</span></p></section><section data-dcnode-id="4868" id="sec0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4971" id="sect0030"><span data-dcnode-id="4974" instrument_node="">3</span><span data-dcnode-id="4973" instrument_node="">. </span><span data-dcnode-id="4972" instrument_node="">Other factors affecting the first cat to human relationship</span></h2><section data-dcnode-id="4943" id="sec0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4967" id="sect0035"><span data-dcnode-id="4970" instrument_node="">3.1</span><span data-dcnode-id="4969" instrument_node="">. </span><span data-dcnode-id="4968" instrument_node="">A paternal effect</span></h3><p data-dcnode-id="4960" id="par0045"><a class="workspace-trigger" data-dcnode-id="4965" href="#bib0070" name="bbib0070"><span data-dcnode-id="4966" instrument_node="">Feaver et al. (1986)</span></a><span data-dcnode-id="4964" instrument_node=""> demonstrated that persons familiar with the cats in a research colony, when asked to make independent assessments of the cats’ ‘friendliness to people’, showed high inter-observer correlations of the rank order in which they placed the cats. Independently and later, </span><a class="workspace-trigger" data-dcnode-id="4962" href="#bib0330" name="bbib0330"><span data-dcnode-id="4963" instrument_node="">Turner et al. (1986)</span></a><span data-dcnode-id="4961" instrument_node=""> asked persons familiar with the cats at the Cambridge University cat colony to rank both the mothers and their 3–4-month old offspring on ‘friendliness to people’ without knowledge of the ultimate purpose of their ratings. There was no correlation between the friendliness rankings of the mothers and those of their offspring. The authors later compared paternity of those juveniles, sired by two unrelated fathers over a two-month period, which the offspring had never seen. They found that the friendly-ranked young were significantly disproportionately distributed between the two fathers, assuming expected values intrinsic to the data.</span></p><p data-dcnode-id="4944" id="par0050"><span data-dcnode-id="4951"><span data-dcnode-id="4959" instrument_node="">Similarly, at the Zurich colony with different </span><a class="topic-link" data-dcnode-id="4957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/cat-breeds" title="Learn more about cats bred from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4958" instrument_node="">cats bred</span></a><span data-dcnode-id="4952"><span data-dcnode-id="4956" instrument_node=""> and born there, Turner had four persons familiar with those mothers and their juvenile offspring (between 3 and 8 months old) rank the animals on ‘friendliness to people’, again without mentioning the ultimate hypotheses being examined. The inter-observer rankings of the 8 mothers, as well as of the 35 juveniles were again significantly correlated. The mothers were divided equally into more friendly and less-friendly animals based on rank sums. Two unrelated fathers had also sired all of the Zurich offspring and had left the colony before the first litter arrived. Thirty-two of the offspring could be assigned to the friendlier or less-friendly class, and again Turner found that the friendly young were significantly disproportionately distributed between the two fathers. Male and female offspring were proportionately distributed among the friendlier and less-friendly classes. However in Zurich a significant mother effect was also found on ‘friendliness to people’ and the friendliness of their offspring; this, of course could be genetic and/or modificatory (see below), whereas in both colonies, Cambridge and Zurich, the </span><a class="topic-link" data-dcnode-id="4954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/paternal-effect" title="Learn more about paternal effect from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4955" instrument_node="">paternal effect</span></a><span data-dcnode-id="4953" instrument_node=""> had to be genetic (</span></span></span><a class="workspace-trigger" data-dcnode-id="4949" href="#bib0330" name="bbib0330"><span data-dcnode-id="4950" instrument_node="">Turner et al., 1986</span></a><span data-dcnode-id="4948" instrument_node="">). The authors never proposed “a gene for friendliness” but rather a genetic effect on some behavioral correlate of what one calls friendliness; later, </span><a class="workspace-trigger" data-dcnode-id="4946" href="#bib0180" name="bbib0180"><span data-dcnode-id="4947" instrument_node="">McCune (1995)</span></a><span data-dcnode-id="4945" instrument_node=""> determined that the paternal effect was indeed an effect on ‘boldness’ and exploratory behaviour, which of course might promote contact with persons in the room or environment.</span></p></section><section data-dcnode-id="4924" id="sec0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4939" id="sect0040"><span data-dcnode-id="4942" instrument_node="">3.2</span><span data-dcnode-id="4941" instrument_node="">. </span><span data-dcnode-id="4940" instrument_node="">Presence of the mother nearby</span></h3><p data-dcnode-id="4925" id="par0055"><span data-dcnode-id="4938" instrument_node="">Studies on the effects of early handling on kittens’ behaviour and attachment toward humans have mostly ignored the fact that the mother is normally present during early kitten-human contact. </span><a class="workspace-trigger" data-dcnode-id="4936" href="#bib0235" name="bbib0235"><span data-dcnode-id="4937" instrument_node="">Rodel (1986)</span></a><span data-dcnode-id="4935" instrument_node="">; see also </span><a class="workspace-trigger" data-dcnode-id="4933" href="#bib0290" name="bbib0290"><span data-dcnode-id="4934" instrument_node="">Turner, 2000a</span></a><span data-dcnode-id="4932" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4930" href="#bib0295" name="bbib0295"><span data-dcnode-id="4931" instrument_node="">Turner, 2000b</span></a><span data-dcnode-id="4929" instrument_node=""> examined this effect experimentally in the lab’s human-cat encounter room and found that when the kittens’ mother was present (but restrained in a cage) along with an unfamiliar test person, the kittens entered the room on their own at an earlier age than those kittens tested without their mothers; however they went directly to their mothers and not the test person. Nevertheless these same kittens were still the first ones to start exploring the encounter room with the test person. A human-socialized, calm mother may reduce a kitten’s anxiety and build up its confidence enabling bolder exploration of the environment. On the other hand, if she is shy or nervous, she might induce her kittens to be even more fearful when exposed to humans without her. Further but indirectly, if the mother is fearful or non-socialized to humans she might hide her kittens after birth delaying first kitten contact with people until late or even after the sensitive phase for socialization (</span><a class="workspace-trigger" data-dcnode-id="4927" href="#bib0285" name="bbib0285"><span data-dcnode-id="4928" instrument_node="">Turner, 1995b</span></a><span data-dcnode-id="4926" instrument_node="">). Of course any effects of the mother on her kitten’s behaviour could be either genetic or modificatory or both.</span></p></section><section data-dcnode-id="4914" id="sec0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4920" id="sect0045"><span data-dcnode-id="4923" instrument_node="">3.3</span><span data-dcnode-id="4922" instrument_node="">. </span><span data-dcnode-id="4921" instrument_node="">Curiosity</span></h3><p data-dcnode-id="4915" id="par0060"><span data-dcnode-id="4919" instrument_node="">Curiosity (exploratory behaviour) in older kittens might also promote (first) contact with humans and allow establishment of a relationship with a person, once anxiety in a strange situation has been reduced. </span><a class="workspace-trigger" data-dcnode-id="4917" href="#bib0215" name="bbib0215"><span data-dcnode-id="4918" instrument_node="">Podberscek et al. (1991)</span></a><span data-dcnode-id="4916" instrument_node=""> even found that adult (2–3 years old) male lab cats - presumably socialized toward humans – made more direct contacts with an unfamiliar person than a familiar test person, but that attention-seeking behaviours to both persons declined from day 1 to day 3. Interestingly, many people report that cats at home will first approach a person in a seated group who doesn’t appreciate cat contact. The author hypothesizes that these persons as opposed to other group members avoid eye contact with the cat and any gestures inviting approach by the cat and that the cat is simply ‘curious’ and attempting to assess that person’s position.</span></p></section><section data-dcnode-id="4900" id="sec0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4910" id="sect0050"><span data-dcnode-id="4913" instrument_node="">3.4</span><span data-dcnode-id="4912" instrument_node="">. </span><span data-dcnode-id="4911" instrument_node="">Feeding</span></h3><p data-dcnode-id="4901" id="par0065"><span data-dcnode-id="4909" instrument_node="">Many people claim that house cats, especially those allowed outdoors, are mostly interested in securing a meal and therefore associate with us. Clearly the usual feeding time is one of the most important times for social contact with all cats. However, </span><a class="workspace-trigger" data-dcnode-id="4907" href="#bib0105" name="bbib0105"><span data-dcnode-id="4908" instrument_node="">Geering (1986)</span></a><span data-dcnode-id="4902"><span data-dcnode-id="4906" instrument_node=""> in an </span><a class="topic-link" data-dcnode-id="4904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/outdoor-enclosures" title="Learn more about outdoor enclosure from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4905" instrument_node="">outdoor enclosure</span></a><span data-dcnode-id="4903" instrument_node=""> experiment involving two male students unfamiliar to the colony’s adult cats, whose position in the enclosure, and role as the “feeder” was experimentally varied, was able to show otherwise. The “feeding” person simply held the large food tray until the cats entered the enclosure then placed it mid-way between the two men on the ground. Neither person was allowed to look at, speak with, or otherwise interact with the cats before both, in time, left the enclosure. Geering found that a preference for the feeder (not the food, which was the same over all trials) as shown by cat-initiated contacts developed within the first half of the phase after feeding but disappeared during the second half and switched to the other person when he was the feeder. Her interpretation: yes, the act of feeding can facilitate establishment of a relationship between a cat and a person, but it takes more (e.g. speaking with the cat, stroking the cat) to maintain that preference and relationship.</span></span></p></section><section data-dcnode-id="4869" id="sec0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4896" id="sect0055"><span data-dcnode-id="4899" instrument_node="">3.5</span><span data-dcnode-id="4898" instrument_node="">. </span><span data-dcnode-id="4897" instrument_node="">The effect of later experiences with humans after initial socialization</span></h3><p data-dcnode-id="4874" id="par0070"><a class="workspace-trigger" data-dcnode-id="4894" href="#bib0190" name="bbib0190"><span data-dcnode-id="4895" instrument_node="">Meier and Turner (1985)</span></a><span data-dcnode-id="4893" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4891" href="#bib0215" name="bbib0215"><span data-dcnode-id="4892" instrument_node="">Podberscek et al. (1991)</span></a><span data-dcnode-id="4890" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4888" href="#bib0170" name="bbib0170"><span data-dcnode-id="4889" instrument_node="">Lowe and Bradshaw (2002)</span></a><span data-dcnode-id="4887" instrument_node="">, and </span><a class="workspace-trigger" data-dcnode-id="4885" href="#bib0185" name="bbib0185"><span data-dcnode-id="4886" instrument_node="">McCune et al. (1995)</span></a><span data-dcnode-id="4884" instrument_node=""> found evidence that early experience with humans during the sensitive phase for socialization had long-lasting effects well into adulthood. McCune et al. proposed the term </span><em data-dcnode-id="4882"><span data-dcnode-id="4883" instrument_node="">social referencing</span></em><span data-dcnode-id="4881" instrument_node=""> to refer to the broadening of an animal’s experience during the juvenile period, i.e. after initial socialization. </span><a class="workspace-trigger" data-dcnode-id="4879" href="#bib0280" name="bbib0280"><span data-dcnode-id="4880" instrument_node="">Turner, 1995a</span></a><span data-dcnode-id="4878" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4876" href="#bib0285" name="bbib0285"><span data-dcnode-id="4877" instrument_node="">Turner, 1995b</span></a><span data-dcnode-id="4875" instrument_node=""> has proposed that negative and positive experiences with humans after the sensitive period work differently depending on whether or not a kitten was truly socialized during the sensitive period: a human-friendly, trusting cat needs only a few positive experiences with an unfamiliar person (e.g., a new owner) to show positive behaviour towards that person but significant negative experience to override the initial (positive) socialization. A shy, less socialized cat requires a great deal of positive experience with a stranger to overcome its deficit of experience during the sensitive phase; however, it reacts negatively (and strongly) to even minor negative encounters. The human-friendly, socialized cat generalizes positive experiences quickly; the un-socialized or incompletely socialized cat does not generalize its later positive experiences, but rather, its negative ones. The former cats are relatively easy to re-home, the latter cats require more patience and understanding on the part of a new owner, but probably make good ‘one person’ or ‘one family’ cats in due course. If the latter are rehomed, they start over at square one with the new owners. Many animal shelter directors agree with the author’s premises, but this model still needs testing in the field.</span></p><p data-dcnode-id="4870" id="par0075"><a class="workspace-trigger" data-dcnode-id="4872" href="#bib0055" name="bbib0055"><span data-dcnode-id="4873" instrument_node="">Dinis and Martins (2016)</span></a><span data-dcnode-id="4871" instrument_node=""> compared the reported attachment levels of cat owners to their animals with those of volunteers from a cat rehoming centre and found no significant difference; however amongst the cat owners, duration of ownership had a positive effect on the level of attachment, especially after two years of companionship.</span></p></section></section><section data-dcnode-id="4803" id="sec0045"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4864" id="sect0060"><span data-dcnode-id="4867" instrument_node="">4</span><span data-dcnode-id="4866" instrument_node="">. </span><span data-dcnode-id="4865" instrument_node="">The ethology of cat-human interactions</span></h2><p data-dcnode-id="4853" id="par0080"><span data-dcnode-id="4863" instrument_node="">The period following the initial experimental studies on the sensitive phase of kittens for socialization toward persons witnessed a number of ethological (observational) studies on cat-human interactions both in the lab and home setting. </span><a class="workspace-trigger" data-dcnode-id="4861" href="#bib0200" name="bbib0200"><span data-dcnode-id="4862" instrument_node="">Mertens and Turner (1988)</span></a><span data-dcnode-id="4860" instrument_node=""> published results on first encounters between 19 socialized cats and a convenience sample (volunteer cat friends including children, 6–10 years, and adults, &gt;18years) of 240 persons unfamiliar with the cats in a room with a carpet, table and chairs at the university cat colony. The cats knew each other and were familiar with the encounter room. There were 10 males (all neutered) and 9 females (4 spayed) between 15 and 24 months old. During the first five minutes the human subject had to ignore the cat, which entered the room through a cat-door on the side, and read or look at a magazine. During the following five minutes the person could do as s/he pleased. This allowed recording cat behaviour in two different situations. In a second run of only five minutes the person could do as s/he pleased from the start and human behaviour toward the cat was recorded. Interactions were observed and recorded through a one-way glass window from outside of the room. The results of these experiments in the lab setting have been substantiated by ethological observations in the home setting and can be summarized as follows: The spontaneous behaviour of the cat, e.g. approaches to the person during the first five minutes, was independent of the cats’ sex (but again all males were neutered, as in most households), and independent of the person’s age or gender. Only the individuality (individual differences) of the cats affected their spontaneous behaviour. When data from the second five minutes were compared, the cats </span><em data-dcnode-id="4858"><span data-dcnode-id="4859" instrument_node="">reacted</span></em><span data-dcnode-id="4857" instrument_node=""> to differences in the behaviour of men and women and between children (especially boys) and adults, which were also found in the second run. Changes in the cats’ behaviour between the “reading” and following phase included: decreased vocalizations and increased play behaviour; decreased approaching and increased withdrawal; and increased head rubbing. Most of these results have been confirmed in studies, e.g. </span><a class="workspace-trigger" data-dcnode-id="4855" href="#bib0205" name="bbib0205"><span data-dcnode-id="4856" instrument_node="">Mertens (1991)</span></a><span data-dcnode-id="4854" instrument_node="">, of human-cat interactions in the home setting. Men tend to interact from a seated position, while women and girls (no age difference) more often move down to the level of the cat on the floor. Children, especially the boys, tend to approach the cat directly and quickly as a first social behaviour, which is not always appreciated by the cat. Women speak more frequently with the cat and the cats vocalize more frequently with them as well.</span></p><p data-dcnode-id="4849" id="par0085"><a class="workspace-trigger" data-dcnode-id="4851" href="#bib0215" name="bbib0215"><span data-dcnode-id="4852" instrument_node="">Podberscek et al. (1991)</span></a><span data-dcnode-id="4850" instrument_node=""> observed interactions between lab cats and familiar and unfamiliar persons as mentioned above and found a significant decline in attention behaviours (e.g., rubs against the person, claws the person, stands and watches, stretches head out to person) from the first to second and third day toward both the unfamiliar and familiar person.</span></p><p data-dcnode-id="4829" id="par0090"><a class="workspace-trigger" data-dcnode-id="4847" href="#bib0275" name="bbib0275"><span data-dcnode-id="4848" instrument_node="">Turner’s (1991)</span></a><span data-dcnode-id="4846" instrument_node=""> team visited 158 cat-owning households housing 344 cats in Switzerland (urban, suburban and villages), which had volunteered for participation. Using a catalog of 33 well-defined behavioral elements, which could be exhibited by the person, the cat or both, they recorded all interactions observed between the cat or cats there and the adult woman of the household on three consecutive days (an average 16</span><span data-dcnode-id="4845" instrument_node="">&nbsp;</span><span data-dcnode-id="4844" instrument_node="">h per household of which a cat was present on average 10.8</span><span data-dcnode-id="4843" instrument_node="">&nbsp;</span><span data-dcnode-id="4842" instrument_node="">h). The behavioral elements were recorded on an electronic keyboard chronologically with automatic time measurement. Three elements were particularly of interest: Either the woman or the cat could show an “intent” to interact by approaching the partner or vocalizing with/towards the partner. If either the partner reacted to that or if the initiator continued the approach to within one meter of the partner, then “start interaction” was recorded. “End interaction” was typed whenever one of the two moved more than one meter away or withdrew from the scene entirely without being followed by the partner. From these data it was possible to assess 1) the initiator of an interaction; 2) the partner’s willingness to comply with the assumed interactional wishes of its counterpart; 3) the content of the interactions; and 4) the duration of individual interactions and total interaction time in each relationship sampled. Over 6000 social interactions were registered for the final analyses and of course human demographics (single woman, woman with partner but no children, mothers with children at home and partner) and cat housing conditions (indoor cats </span><em data-dcnode-id="4840"><span data-dcnode-id="4841" instrument_node="">vs.</span></em><span data-dcnode-id="4839" instrument_node=""> cats allowed outdoors, domestic mixtures </span><em data-dcnode-id="4837"><span data-dcnode-id="4838" instrument_node="">vs.</span></em><span data-dcnode-id="4836" instrument_node=""> pedigree cats, single cats </span><em data-dcnode-id="4834"><span data-dcnode-id="4835" instrument_node="">vs.</span></em><span data-dcnode-id="4833" instrument_node=""> cats in multiple cat households) were noted and analyzed by the appropriate tests. Statistically significant results will be summarized here but occasionally also a statistical tendency will be noted as such. For more detail see </span><a class="workspace-trigger" data-dcnode-id="4831" href="#bib0275" name="bbib0275"><span data-dcnode-id="4832" instrument_node="">Turner (1991)</span></a><span data-dcnode-id="4830" instrument_node="">.</span></p><p data-dcnode-id="4827" id="par0095"><span data-dcnode-id="4828" instrument_node="">Concerning initiation of interactions and what Turner called “willingness to comply with the partner’s assumed wishes to interact”: 1) When successful initiations made by the persons and those made by the cats were analyzed separately, the more successful the person was in initiating interactions with the cat, the shorter, the total interaction time with the pet. 2) The higher the proportion of all successful intents to interact that were due to the cat, the more time spent interacting. 3) Willingness to comply with the partner’s assumed wishes to interact was significantly, positively correlated between the cat and the human over all pairs examined.</span></p><p data-dcnode-id="4825" id="par0100"><span data-dcnode-id="4826" instrument_node="">But various parameters were found to influence this “willingness to comply with the partner’s interactional wishes” at least for the human partner: Single women had a tendency to be less willing to comply with their cat’s wishes to interact than women with a partner (but not mothers). The women in general were less willing to comply with their indoor cats’ wishes than those of cats with outdoor access. No differences were found between the owners of housecats (domestic mixtures) and pedigree cats on willingness to comply with interactional wishes. But the women were more willing to comply with the wishes of cats kept singly than those of cats in multiple cat households. As far as the cats’ “willingness to comply with the human partners’ interactional wishes” is concerned, none of the above parameters had even the slightest effect, meaning that the cats were equally willing to comply with the women's interactional wishes independent of her civil status, or the cat’s genetic heritage and housing conditions.</span></p><p data-dcnode-id="4817" id="par0105"><span data-dcnode-id="4824" instrument_node="">Looking at the proportion of successful intents to interact that were </span><em data-dcnode-id="4822"><span data-dcnode-id="4823" instrument_node="">due to the cat</span></em><span data-dcnode-id="4821" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4819" href="#bib0275" name="bbib0275"><span data-dcnode-id="4820" instrument_node="">Turner (1991)</span></a><span data-dcnode-id="4818" instrument_node=""> found that it was significantly lower for single women than for mothers or, as a tendency, women living with just a partner. (More of the intents were due to the women, when they lived alone.) It was significantly higher for indoor cats than for those with outdoor access (meaning the indoor cats are responsible for more interaction time with their owners, perhaps helping to compensate for lower levels of environmental stimuli indoors than outdoors). Further, the proportion of successful intents to interact due to the cat was significantly lower for single cats than for cats living in multiple cat households.</span></p><p data-dcnode-id="4809" id="par0110"><span data-dcnode-id="4816" instrument_node="">Finally looking a </span><em data-dcnode-id="4814"><span data-dcnode-id="4815" instrument_node="">total interaction time per cat</span></em><span data-dcnode-id="4813" instrument_node=""> and per minute of joint human-cat presence) between the cats and women in these households, </span><a class="workspace-trigger" data-dcnode-id="4811" href="#bib0275" name="bbib0275"><span data-dcnode-id="4812" instrument_node="">Turner (1991)</span></a><span data-dcnode-id="4810" instrument_node=""> found significant differences between women without children (more) and mothers (less), between indoor (more) and outdoor (less) cats and between owners with single cats (more) and each cat in multiple cat households (less).</span></p><p data-dcnode-id="4804" id="par0115"><span data-dcnode-id="4808" instrument_node="">Looking specifically at one type of human-cat interaction, namely stroking the cat, </span><a class="workspace-trigger" data-dcnode-id="4806" href="#bib0060" name="bbib0060"><span data-dcnode-id="4807" instrument_node="">Ellis et al. (2015a)</span></a><span data-dcnode-id="4805" instrument_node=""> analyzed the influence of body region touched and handler familiarity on the cats’ behavioral response to being stroked. Both parameters significantly influenced negative responses by the cats.</span></p></section><section data-dcnode-id="4761" id="sec0050"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4799" id="sect0065"><span data-dcnode-id="4802" instrument_node="">5</span><span data-dcnode-id="4801" instrument_node="">. </span><span data-dcnode-id="4800" instrument_node="">Combining ethological observations with subjective (psychological) assessments of cat personality traits</span></h2><p data-dcnode-id="4787" id="par0120"><span data-dcnode-id="4798" instrument_node="">Following </span><a class="workspace-trigger" data-dcnode-id="4796" href="#bib0245" name="bbib0245"><span data-dcnode-id="4797" instrument_node="">Serpell’s (1983)</span></a><span data-dcnode-id="4795" instrument_node=""> lead indicating the usefulness of combining observational data with subjective character trait assessment for dogs, the Zurich team attempted this in its cat work. As an integral, but methodologically separate part of the above-mentioned study, </span><a class="workspace-trigger" data-dcnode-id="4793" href="#bib0325" name="bbib0325"><span data-dcnode-id="4794" instrument_node="">Turner and Stammbach-Geering (1990)</span></a><span data-dcnode-id="4788"><span data-dcnode-id="4792" instrument_node=""> asked the women in those 158 households to assess their cats (one of them in the case of multiple cat households) and relationships to them for 31 traits on a continuous visual analog scale between two extremes for each trait. After completing the form the first time using one symbol to mark the position of their actual (real) cat and relationship between the two extremes, they had to complete the form again, this time using a different symbol for their “ideal cat” or the “ideal relationship”. Significant correlations (positive and negative) between 18 of the traits over all women and differences between “actual” and “ideal” values for each trait over all women were calculated and analyzed along with the effect of the parameters mentioned above in the </span><a class="topic-link" data-dcnode-id="4790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/observational-studies" title="Learn more about observational study from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4791" instrument_node="">observational study</span></a><span data-dcnode-id="4789" instrument_node=""> (civil status, house- vs. pedigree cats, housing conditions).</span></span></p><p data-dcnode-id="4785" id="par0125"><span data-dcnode-id="4786" instrument_node="">Averaged over all 31 traits, 76% of the women rated their actual cat and relationship at exactly the same place along the continuum that their ideal cat/relationship would be found - ranging from 94% for both cleanliness and owner affection to the cat to a low of 42% for degree of dietary specialization (fussiness at meal time). 76% indicated a high level of satisfaction with the cats at least in this sample of volunteer owners.</span></p><p data-dcnode-id="4777" id="par0130"><span data-dcnode-id="4784" instrument_node="">Civil status showed no significant effect on owner-assessment of the cats or relationships; only housing conditions (indoor </span><em data-dcnode-id="4782"><span data-dcnode-id="4783" instrument_node="">vs.</span></em><span data-dcnode-id="4781" instrument_node=""> outdoor and number of cats kept) were found to affect trait rating significantly either for the actual or ideal cat and relationship. Women with outdoor cats said their cats should be (ideally) less friendly to strangers than those with indoor cats. The owners of cats with outdoor access rated their animals as being less curious than the owners of indoor cats and since indoor cats initiated contact with their owners more often than cats allowed outdoors, it is possible that the indoor cats might be more inquisitive and seek environmental stimulation even from their owners. Owners of outdoor cats rated them as being more independent than those with indoor cats and also said their cats should be (ideally) more independent than those with indoor cats. Owners of indoor cats wished (ideally) their cats would more often be close to them than those with outdoor cats and were also more tolerant of their animals’ destructive tendencies (e.g., scratching furniture), although no differences in the actual ratings for indoor and outdoor animals on the latter trait were found. Possible reasons for these findings are discussed in </span><a class="workspace-trigger" data-dcnode-id="4779" href="#bib0325" name="bbib0325"><span data-dcnode-id="4780" instrument_node="">Turner and Stammbach-Geering (1990)</span></a><span data-dcnode-id="4778" instrument_node="">. Lastly on dietary specialization, owners of more than one cat wished (ideally) their cats would be less fussy about food than owners of single cats did, it probably being easier to cope with the preferences of one cat than several, all being fed at the same time.</span></p><p data-dcnode-id="4775" id="par0135"><span data-dcnode-id="4776" instrument_node="">The woman-cat pairs were divided into two groups, one where both partners showed above average ‘willingness to comply with the other’s interactional wishes’ (observational data) and the other where both partners showed low willingness to comply. The women in the two groups rated their cats and relationships differently, but only on three of the traits (one trait, actual values; two traits, the difference between actual and ideal values). On actual values for the trait ‘dietary specialization’, owner-cat pairs showing low willingness to comply with the partner’s interactional wishes rated their cats as being less fussy about what they eat. Also when comparing the amount of difference between actual and ideal values on this trait, the owners who were less willing to comply showed a smaller difference statistically whereas owners more willing to comply with their cats interactional wishes, wished their cats would be less fussy than they were. Further on the trait “independence”, women from pairs less willing to comply showed significantly smaller differences between actual and ideal values, while woman more willing to comply with the cats’ wishes to interact viewed the ideal cat as being even more independent.</span></p><p data-dcnode-id="4766" id="par0140"><span data-dcnode-id="4774" instrument_node="">The more recent work of the team surrounding </span><a class="workspace-trigger" data-dcnode-id="4772" href="#bib0140" name="bbib0140"><span data-dcnode-id="4773" instrument_node="">Kotrschal et al. (2014)</span></a><span data-dcnode-id="4767"><span data-dcnode-id="4771" instrument_node=""> also combines ethological observations with psychological (temperament) assessments of cats with the </span><a class="topic-link" data-dcnode-id="4769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/personality-traits" title="Learn more about personality traits from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4770" instrument_node="">personality traits</span></a><span data-dcnode-id="4768" instrument_node=""> of their owners and these will be summarized further below with other references on cat-owner personalities.</span></span></p><p data-dcnode-id="4762" id="par0145"><a class="workspace-trigger" data-dcnode-id="4764" href="#bib0220" name="bbib0220"><span data-dcnode-id="4765" instrument_node="">Potter and Mills (2015)</span></a><span data-dcnode-id="4763" instrument_node=""> modified the Ainsworth Strange Situation Test to examine the bond between cats and their owners and found that the animals did not show signs of secure attachment to them. The results were consistent with the view that adult cats are typically autonomous and not necessarily dependent on others to provide as sense of security and safety.</span></p></section><section data-dcnode-id="4697" id="sec0055"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4757" id="sect0070"><span data-dcnode-id="4760" instrument_node="">6</span><span data-dcnode-id="4759" instrument_node="">. </span><span data-dcnode-id="4758" instrument_node="">Cat and cat-human communication</span></h2><p data-dcnode-id="4725" id="par0150"><span data-dcnode-id="4756" instrument_node="">Excellent summaries of cat–cat communication over olfactory, auditory, visual and tactile channels are already available in </span><a class="workspace-trigger" data-dcnode-id="4754" href="#bib0015" name="bbib0015"><span data-dcnode-id="4755" instrument_node="">Bradshaw (1992)</span></a><span data-dcnode-id="4753" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4751" href="#bib0025" name="bbib0025"><span data-dcnode-id="4752" instrument_node="">Bradshaw and Cameron-Beaumont (2000)</span></a><span data-dcnode-id="4750" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="4748" href="#bib0030" name="bbib0030"><span data-dcnode-id="4749" instrument_node="">Bradshaw et al. (2012)</span></a><span data-dcnode-id="4747" instrument_node="">. </span><a class="workspace-trigger" data-dcnode-id="4745" href="#bib0035" name="bbib0035"><span data-dcnode-id="4746" instrument_node="">Brown and Bradshaw (2014)</span></a><span data-dcnode-id="4744" instrument_node=""> also added aspects of interspecific (cat-human) communication in a more recent review, which will be mentioned here. Most involve signals used in cat–cat encounters that are applied by the cats in cat-human interactions, some with slight modifications. Early on </span><a class="workspace-trigger" data-dcnode-id="4742" href="#bib0200" name="bbib0200"><span data-dcnode-id="4743" instrument_node="">Mertens and Turner (1988)</span></a><span data-dcnode-id="4741" instrument_node=""> found that head-rubbing on an unfamiliar human partner increased significantly once the stranger’s attention was secured by flank-rubbing. Cats living in the same colony often rub their heads (foreheads, cheeks) on each other upon greeting, which presumably exchanges individual odors of the participants. Whether or not they are mixing a “group odor” has been hypothesized, but not yet examined (</span><a class="workspace-trigger" data-dcnode-id="4739" href="#bib0035" name="bbib0035"><span data-dcnode-id="4740" instrument_node="">Brown and Bradshaw, 2014</span></a><span data-dcnode-id="4738" instrument_node="">). Cats employ vocalizations much more frequently when humans are present than when together with conspecifics, probably reflecting a learning process. Generally, meows are typical attention-seeking vocalizations in interspecific settings and higher pitched (more pleasant) than the equivalent vocalization in feral cats and the wild ancestor of the domestic cat (see e.g., </span><a class="workspace-trigger" data-dcnode-id="4736" href="#bib0340" name="bbib0340"><span data-dcnode-id="4737" instrument_node="">Yeon et al., 2011</span></a><span data-dcnode-id="4735" instrument_node="">). Meows and purring can be varied by the cat in different situations and be interpreted differently by human listeners (</span><a class="workspace-trigger" data-dcnode-id="4733" href="#bib0175" name="bbib0175"><span data-dcnode-id="4734" instrument_node="">McComb et al., 2009</span></a><span data-dcnode-id="4732" instrument_node="">; cited in </span><a class="workspace-trigger" data-dcnode-id="4730" href="#bib0035" name="bbib0035"><span data-dcnode-id="4731" instrument_node="">Brown and Bradshaw, 2014</span></a><span data-dcnode-id="4729" instrument_node="">). In food-soliciting situations elements of meow-like vocalizations are found within the purr and humans can detect the difference. Brown and Bradshaw suggest that this purring may function as a ‘manipulative’ contact- and care-soliciting signal possibly encouraged by the positive response of the owner. </span><a class="workspace-trigger" data-dcnode-id="4727" href="#bib0065" name="bbib0065"><span data-dcnode-id="4728" instrument_node="">Ellis et al. (2015b)</span></a><span data-dcnode-id="4726" instrument_node=""> found that 40% of the participants in their study identified the correct contexts of recorded meow vocalizations of their own cats at a level greater than that predicted by chance. However, no participants performed above chance when the vocalizations were from an unfamiliar cat.</span></p><p data-dcnode-id="4711" id="par0155"><span data-dcnode-id="4724" instrument_node="">One visual signal of the domestic cat must be mentioned: the vertical “tail up”. This has long been associated with affiliative behaviour between cats (see </span><a class="workspace-trigger" data-dcnode-id="4722" href="#bib0025" name="bbib0025"><span data-dcnode-id="4723" instrument_node="">Bradshaw and Cameron-Beaumont, 2000</span></a><span data-dcnode-id="4721" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4719" href="#bib0040" name="bbib0040"><span data-dcnode-id="4720" instrument_node="">Cafazzo and Natoli, 2009</span></a><span data-dcnode-id="4718" instrument_node="">) to signal intention to interact amicably. The same signal is used when cats (re-) establish contact with their owners. </span><a class="workspace-trigger" data-dcnode-id="4716" href="#bib0250" name="bbib0250"><span data-dcnode-id="4717" instrument_node="">Serpell (2014)</span></a><span data-dcnode-id="4715" instrument_node=""> states that it is likely that a sacred cattery or breeding colony of cats adjoined the Temple of Bastet in Bubastis, ancient Egypt, ca. 450 BCE, and </span><a class="workspace-trigger" data-dcnode-id="4713" href="#bib0010" name="bbib0010"><span data-dcnode-id="4714" instrument_node="">Bateson and Turner (2014)</span></a><span data-dcnode-id="4712" instrument_node=""> postulate that the “tail-up” signal, which is not present in the domestic cat’s ancestor, was favored to indicate friendly intentions to other cats kept in dense breeding colonies at that time.</span></p><p data-dcnode-id="4706" id="par0160"><span data-dcnode-id="4710" instrument_node="">Concerning cat-human communication, </span><a class="workspace-trigger" data-dcnode-id="4708" href="#bib0005" name="bbib0005"><span data-dcnode-id="4709" instrument_node="">Bahlig-Pieren and Turner (1999)</span></a><span data-dcnode-id="4707" instrument_node=""> found a clear difference in the ability to interpret facial expressions from still photos and video sequences of behaviour of cats and dogs between experienced owners and inexperienced persons, even though the inexperienced persons still interpreted these better than one might expect.</span></p><p data-dcnode-id="4698" id="par0165"><a class="workspace-trigger" data-dcnode-id="4704" href="#bib0210" name="bbib0210"><span data-dcnode-id="4705" instrument_node="">Miklosi et al. (2005)</span></a><span data-dcnode-id="4699"><span data-dcnode-id="4703" instrument_node=""> compared the ability of dogs and cats to use human pointing gestures in an object-choice task and concluded that both species were equally able to find the hidden food. However, when the hidden food was made inaccessible so that the animals needed to indicate to their naïve owners its location, the cats lacked some of components of attention-getting behaviour that the dogs showed. This was perhaps related to the longer period since domestication and of co-habitation with humans of the </span><a class="topic-link" data-dcnode-id="4701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/canidae" title="Learn more about canids from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4702" instrument_node="">canids</span></a><span data-dcnode-id="4700" instrument_node="">.</span></span></p></section><section data-dcnode-id="4633" id="sec0060"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4693" id="sect0075"><span data-dcnode-id="4696" instrument_node="">7</span><span data-dcnode-id="4695" instrument_node="">. </span><span data-dcnode-id="4694" instrument_node="">Cat personalities and cat-owner personalities</span></h2><p data-dcnode-id="4658" id="par0170"><span data-dcnode-id="4692" instrument_node="">One of the most persistent findings about domestic cat personalities is their ‘individuality’, which has either had to be statistically blocked out as “noise” in order to investigate how other parameters affect cat behaviour (</span><a class="workspace-trigger" data-dcnode-id="4690" href="#bib0280" name="bbib0280"><span data-dcnode-id="4691" instrument_node="">Turner, 1995a</span></a><span data-dcnode-id="4689" instrument_node="">), or indeed examined to determine its origin, development and stability (</span><a class="workspace-trigger" data-dcnode-id="4687" href="#bib0195" name="bbib0195"><span data-dcnode-id="4688" instrument_node="">Mendl and Harcourt, 2000</span></a><span data-dcnode-id="4686" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4684" href="#bib0165" name="bbib0165"><span data-dcnode-id="4685" instrument_node="">Lowe and Bradshaw, 2001</span></a><span data-dcnode-id="4683" instrument_node="">). In spite of the cat’s individuality, several personality types or behavioral styles have consistently emerged in most studies: Karsh’s team (</span><a class="workspace-trigger" data-dcnode-id="4681" href="#bib0135" name="bbib0135"><span data-dcnode-id="4682" instrument_node="">Karsh and Turner, 1988</span></a><span data-dcnode-id="4680" instrument_node="">) identified socialized individuals, which were more ‘timid’. </span><a class="workspace-trigger" data-dcnode-id="4678" href="#bib0070" name="bbib0070"><span data-dcnode-id="4679" instrument_node="">Feaver et al. (1986)</span></a><span data-dcnode-id="4677" instrument_node=""> identified active/aggressive cats, timid/nervous animals, and confident/easy-going animals. </span><a class="workspace-trigger" data-dcnode-id="4675" href="#bib0190" name="bbib0190"><span data-dcnode-id="4676" instrument_node="">Meier and Turner (1985)</span></a><span data-dcnode-id="4674" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4672" href="#bib0270" name="bbib0270"><span data-dcnode-id="4673" instrument_node="">Turner (1988)</span></a><span data-dcnode-id="4671" instrument_node=""> and Mertens and </span><a class="workspace-trigger" data-dcnode-id="4669" href="#bib0275" name="bbib0275"><span data-dcnode-id="4670" instrument_node="">Turner (1991)</span></a><span data-dcnode-id="4668" instrument_node=""> identified two basic cat types: trusting (initiative friendly) and shy/fearful (reserved friendly) when encountering strangers, which remind us of personality dimensions found in other animal species as well as human children (see </span><a class="workspace-trigger" data-dcnode-id="4666" href="#bib0195" name="bbib0195"><span data-dcnode-id="4667" instrument_node="">Mendl and Harcourt, 2000</span></a><span data-dcnode-id="4665" instrument_node="">). At least some traits (e.g. boldness) formed during the socialization period appear to remain stable into adulthood in cats (</span><a class="workspace-trigger" data-dcnode-id="4663" href="#bib0165" name="bbib0165"><span data-dcnode-id="4664" instrument_node="">Lowe and Bradshaw, 2001</span></a><span data-dcnode-id="4662" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4660" href="#bib0170" name="bbib0170"><span data-dcnode-id="4661" instrument_node="">Lowe and Bradshaw, 2002</span></a><span data-dcnode-id="4659" instrument_node="">).</span></p><p data-dcnode-id="4654" id="par0175"><a class="workspace-trigger" data-dcnode-id="4656" href="#bib0255" name="bbib0255"><span data-dcnode-id="4657" instrument_node="">Stammbach and Turner (1999)</span></a><span data-dcnode-id="4655" instrument_node=""> analyzed how social support from other humans, emotional support from the cat, and owner attachment to the cat are interrelated. Overall the results indicated that for some of the 330 volunteer participants filling out all five standardized questionnaires (all confirmed for reliability and validity), cats can substitute for, or replace persons in the social network. But in most cases, cats appear to be an additional source of emotional support, especially for those persons who are strongly attached to their animals. Therefore, both social support and attachment are at work in these relationships, the relative importance of each depending upon the individual person.</span></p><p data-dcnode-id="4650" id="par0180"><a class="workspace-trigger" data-dcnode-id="4652" href="#bib0140" name="bbib0140"><span data-dcnode-id="4653" instrument_node="">Kotrschal et al. (2014)</span></a><span data-dcnode-id="4651" instrument_node=""> have provided the most recent review about cat personalities and how human personalities interact with those of the cat.</span></p><p data-dcnode-id="4638" id="par0185"><span data-dcnode-id="4649" instrument_node="">In particular, the results of the study by </span><a class="workspace-trigger" data-dcnode-id="4647" href="#bib0345" name="bbib0345"><span data-dcnode-id="4648" instrument_node="">Wedl et al. (2011)</span></a><span data-dcnode-id="4646" instrument_node="">, again combining ethological observations of interactions in the home setting with psychological personality assessments (five cat personality axes identified by PCA on the behavioral data; owner personality assessment by NEO-FFI), take investigation of these questions to a higher level than in the past. The PCA identified four cat personality axes very similar to those determined by </span><a class="workspace-trigger" data-dcnode-id="4644" href="#bib0070" name="bbib0070"><span data-dcnode-id="4645" instrument_node="">Feaver et al. (1986)</span></a><span data-dcnode-id="4639"><span data-dcnode-id="4643" instrument_node=""> and others. On the human side, owners scoring higher in Openness had cats that were less anxious and tense and these cats more often ignored the object in a novel object test. Owners high on </span><a class="topic-link" data-dcnode-id="4641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/neuroticism" title="Learn more about Neuroticism from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4642" instrument_node="">Neuroticism</span></a><span data-dcnode-id="4640" instrument_node=""> turned to their cats mainly as emotional social supporters and hence, thereby, may offer a less secure base for the cat than the owners high in Openness. The latter consider their cats companions for play rather than social supporters.</span></span></p><p data-dcnode-id="4634" id="par0190"><a class="workspace-trigger" data-dcnode-id="4636" href="#bib0110" name="bbib0110"><span data-dcnode-id="4637" instrument_node="">Gossling et al. (2010)</span></a><span data-dcnode-id="4635" instrument_node=""> also found significant differences between the personalities of self-identified “dog people” and “cat people” using an Internet survey (over 4’500 participants who completed the NEO-FFI, Big Five Inventory). Self-proclaimed dog people were higher on Extraversion, Agreeableness and Conscientiousness, but lower on Neuroticism and Openness than were the cat people.</span></p></section><section data-dcnode-id="4605" id="sec0065"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4629" id="sect0080"><span data-dcnode-id="4632" instrument_node="">8</span><span data-dcnode-id="4631" instrument_node="">. </span><span data-dcnode-id="4630" instrument_node="">Breed differences</span></h2><p data-dcnode-id="4610" id="par0195"><span data-dcnode-id="4624"><span data-dcnode-id="4628" instrument_node="">There have been very few </span><a class="topic-link" data-dcnode-id="4626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/observational-studies" title="Learn more about observational studies from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4627" instrument_node="">observational studies</span></a><span data-dcnode-id="4625" instrument_node=""> comparing the behaviour of different breeds of cats with each other or with non-pedigree cats (domestic short- or longhaired cats) or their interactions with humans. </span></span><a class="workspace-trigger" data-dcnode-id="4622" href="#bib0285" name="bbib0285"><span data-dcnode-id="4623" instrument_node="">Turner, 1995b</span></a><span data-dcnode-id="4621" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4619" href="#bib0290" name="bbib0290"><span data-dcnode-id="4620" instrument_node="">Turner, 2000a</span></a><span data-dcnode-id="4618" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4616" href="#bib0295" name="bbib0295"><span data-dcnode-id="4617" instrument_node="">Turner, 2000b</span></a><span data-dcnode-id="4611"><span data-dcnode-id="4615" instrument_node=""> compared observed behaviour and ratings of behavioral traits by owners of the two oldest breeds, Siamese and Persian cats, and domestic mixtures (taking into account housing differences). The popular descriptions of the character of these two breeds are the most divergent of all pedigree cats and the rational for their selection was to “ensure” finding differences between </span><a class="topic-link" data-dcnode-id="4613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/cat-breeds" title="Learn more about cat breeds from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4614" instrument_node="">cat breeds</span></a><span data-dcnode-id="4612" instrument_node=""> in behaviour and trait ratings. A few differences were indeed found (Siamese being very vocal and active, Persians quiet and lethargic, domestic mixtures very independent) coinciding with the popular breed descriptions, but not as many as one might expect, indicating convergent artificial selection in the pedigree cats, mostly favoring human-cat interactions and relationships. Nevertheless, the domestic housecats were much more highly rated than either of the pedigree cats on the trait ‘independence’, a cat trait highly appreciated by most cat owners.</span></span></p><p data-dcnode-id="4606" id="par0200"><a class="workspace-trigger" data-dcnode-id="4608" href="#bib0115" name="bbib0115"><span data-dcnode-id="4609" instrument_node="">Hart and Hart (2013)</span></a><span data-dcnode-id="4607" instrument_node=""> interviewed some 80 veterinarians in feline practices randomly chosen across the US and considered to be unbiased authorities on breed differences in cats. These vets first compared neutered males and spayed females independently of cat breed, then ranked a random selection of seven (five breeds plus domestic short- and longhaired cats) out of the 15 cat breeds under consideration along 12 behavioral traits. There were three traits with high predictive value to distinguish the breeds, seven traits with moderate, and two traits with low predictive value. It remains to be seen if comparative behavioral observations coincide with the subjective rankings made by the veterinarians.</span></p></section><section data-dcnode-id="4560" id="sec0070"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4601" id="sect0085"><span data-dcnode-id="4604" instrument_node="">9</span><span data-dcnode-id="4603" instrument_node="">. </span><span data-dcnode-id="4602" instrument_node="">Effects of cats on humans</span></h2><p data-dcnode-id="4590" id="par0205"><span data-dcnode-id="4600" instrument_node="">There have been numerous studies reporting the effect of dogs and cats on cardiovascular health risk factors and especially survival rates after a heart attack (</span><a class="workspace-trigger" data-dcnode-id="4598" href="#bib0095" name="bbib0095"><span data-dcnode-id="4599" instrument_node="">Friedmann et al., 1980</span></a><span data-dcnode-id="4597" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4595" href="#bib0100" name="bbib0100"><span data-dcnode-id="4596" instrument_node="">Friedmann and Thomas, 1995</span></a><span data-dcnode-id="4594" instrument_node="">). Interestingly, although the effect of stroking dogs and cats is different on systolic and diastolic blood pressure (which has not yet been explained), the aforementioned authors as well as </span><a class="workspace-trigger" data-dcnode-id="4592" href="#bib0225" name="bbib0225"><span data-dcnode-id="4593" instrument_node="">Qureshi et al. (2009)</span></a><span data-dcnode-id="4591" instrument_node=""> have found that for cats considered separately, and for both current and past cat owners the risk rates for cardiovascular disease are significantly lower than for non-cat owners.</span></p><p data-dcnode-id="4582" id="par0210"><span data-dcnode-id="4589" instrument_node="">In an early study, </span><a class="workspace-trigger" data-dcnode-id="4587" href="#bib0365" name="bbib0365"><span data-dcnode-id="4588" instrument_node="">Zasloff and Kidd (1994)</span></a><span data-dcnode-id="4586" instrument_node=""> found that adult women living entirely alone were significantly more lonely than those living with pets only, with both other people and pets, and with other people but without pets. Since cats can apparently be a source of emotional support to their owners (</span><a class="workspace-trigger" data-dcnode-id="4584" href="#bib0255" name="bbib0255"><span data-dcnode-id="4585" instrument_node="">Stammbach and Turner, 1999</span></a><span data-dcnode-id="4583" instrument_node="">), especially those with strong attachment to their animals, it seemed reasonable to hypothesize that cats might affect human moods and that human mood might affect behaviour towards the cat.</span></p><p data-dcnode-id="4569" id="par0215"><a class="workspace-trigger" data-dcnode-id="4580" href="#bib0230" name="bbib0230"><span data-dcnode-id="4581" instrument_node="">Rieger and Turner (1999)</span></a><span data-dcnode-id="4579" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4577" href="#bib0320" name="bbib0320"><span data-dcnode-id="4578" instrument_node="">Turner and Rieger (2001)</span></a><span data-dcnode-id="4576" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="4574" href="#bib0335" name="bbib0335"><span data-dcnode-id="4575" instrument_node="">Turner et al. (2003)</span></a><span data-dcnode-id="4573" instrument_node=""> tested these hypotheses with behaviour observations of human-cat interactions and psychological (mood) testing before and after those interactions in private households. The results can be summarized as follows: A depressive mood in the owner significantly affected intentions to interact, the starting of interactions, willingness to comply and interact, head- and flank-rubbing, and vocalizations by the cat. Interacting with one’s own cat can reduce (improve) negative moods (fear, anxiety, depressiveness, introversion), but an affect (increase or change) on positive moods was not found. More mood subscales were affected by the cat (presence and/or interactions) in women than in men, and they were more strongly affected in women than in men. Given these effects on human moods, it should not surprise the reader to note that cats are often present in or around psychiatric clinics and in psychotherapeutic practices (</span><a class="workspace-trigger" data-dcnode-id="4571" href="#bib0300" name="bbib0300"><span data-dcnode-id="4572" instrument_node="">Turner, 2007</span></a><span data-dcnode-id="4570" instrument_node="">). Nevertheless, dogs are much more frequently involved in animal-assisted interventions than cats, probably because they are more easily understood (after tens of thousands of years of co-habitation with people), more easily controlled (trained) and more willing to interact with clients than the felines are due to their basic social nature.</span></p><p data-dcnode-id="4561" id="par0220"><span data-dcnode-id="4568" instrument_node="">Lastly, pets can be considered as social capital of a society. Pet owners have been found to be significantly more likely to get to know people in their neighborhood than non-pet owners, whereas dog owners were significantly more likely than owners of other types of pets to regard people whom they met through their pet as a friend. Pet owners also reported receiving one or more types of social support via people they met through their pet and scored higher on civic engagement scales (</span><a class="workspace-trigger" data-dcnode-id="4566" href="#bib0350" name="bbib0350"><span data-dcnode-id="4567" instrument_node="">Wood et al., 2005</span></a><span data-dcnode-id="4565" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4563" href="#bib0355" name="bbib0355"><span data-dcnode-id="4564" instrument_node="">Wood et al., 2015</span></a><span data-dcnode-id="4562" instrument_node="">).</span></p></section><section data-dcnode-id="4478" id="sec0075"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4556" id="sect0090"><span data-dcnode-id="4559" instrument_node="">10</span><span data-dcnode-id="4558" instrument_node="">. </span><span data-dcnode-id="4557" instrument_node="">Problems caused by cats</span></h2><p data-dcnode-id="4554" id="par0225"><span data-dcnode-id="4555" instrument_node="">No review of human-cat interactions and relationships would be complete without at least mentioning the problems that can be caused by domestic cats, namely: allergies, bites and scratches on owners and non-owners, zoonotic diseases, and predation.</span></p><p data-dcnode-id="4535" id="par0230"><span data-dcnode-id="4553" instrument_node="">Based on a large scale stratified random sample of over 8300 Swiss adults, </span><a class="workspace-trigger" data-dcnode-id="4551" href="#bib0360" name="bbib0360"><span data-dcnode-id="4552" instrument_node="">Wuethrich et al. (1995)</span></a><span data-dcnode-id="4542"><span data-dcnode-id="4550" instrument_node=""> determined a prevalence of allergic reactions via skin prick tests to grass (12.7%), followed by house </span><a class="topic-link" data-dcnode-id="4548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/dust-mites" title="Learn more about dust mite from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4549" instrument_node="">dust mite</span></a><span data-dcnode-id="4543"><span data-dcnode-id="4547" instrument_node=""> (8.9%), </span><a class="topic-link" data-dcnode-id="4545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/betula-pendula" title="Learn more about silver birch from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4546" instrument_node="">silver birch</span></a><span data-dcnode-id="4544" instrument_node=""> pollen (7.9%), cat (3.8%) and dog (2.8%) allergens. Especially the cat allergen prevalence seems to be much lower than that reported orally (e.g., by parents in school classes) without medical testing. Nevertheless, Wuethrich (</span></span></span><em data-dcnode-id="4540"><span data-dcnode-id="4541" instrument_node="">pers. comm.</span></em><span data-dcnode-id="4539" instrument_node="">) cautions about encouraging contact with pets when a child is predestined to develop full-blown asthma from a less serious allergic reaction. On the other hand, there are numerous studies, e.g. </span><a class="workspace-trigger" data-dcnode-id="4537" href="#bib0240" name="bbib0240"><span data-dcnode-id="4538" instrument_node="">Roduit et
