 al. (2010)</span></a><span data-dcnode-id="4536" instrument_node="">, indicating an advantage of mothers having pre-natal contact with cats and farm animals on their toddler’s atopic dermatitis during their first few years.</span></p><p data-dcnode-id="4527" id="par0235"><span data-dcnode-id="4534" instrument_node="">Very few countries require mandatory reporting of cat bites, let alone medical treatment of cat scratches. Both are to be taken seriously given the pathogens found in the mouths and on the claws of this carnivorous species. Bites and zoonotic disease transmission by pets were the topics of a recent three-year study financed by the European Commission Framework Program called CALLISTO and the results are summarized on the website </span><a data-dcnode-id="4532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.callistoproject.eu/joomla/index.php/about-callisto" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4533" instrument_node="">http://www.callistoproject.eu/joomla/index.php/about-callisto</span></a><span data-dcnode-id="4531" instrument_node=""> and in </span><a class="workspace-trigger" data-dcnode-id="4529" href="#bib0260" name="bbib0260"><span data-dcnode-id="4530" instrument_node="">Sterneberg-van der Maaten et al. (2015)</span></a><span data-dcnode-id="4528" instrument_node="">.</span></p><p data-dcnode-id="4481" id="par0240"><span data-dcnode-id="4526" instrument_node="">Another problem is purportedly caused by cats, namely the endangerment of wildlife (birds, mammals, reptiles and amphibians) by owned cats allowed outdoors and feral (free-living) cats. No doubt, such cats kill and consume millions of prey each year (see e.g., </span><a class="workspace-trigger" data-dcnode-id="4524" href="#bib0050" name="bbib0050"><span data-dcnode-id="4525" instrument_node="">Churcher and Lawton, 1987</span></a><span data-dcnode-id="4523" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4521" href="#bib0160" name="bbib0160"><span data-dcnode-id="4522" instrument_node="">Loss et al., 2013</span></a><span data-dcnode-id="4516"><span data-dcnode-id="4520" instrument_node="">), but unless such extrapolations take many factors known to influence predation by cats into account - including prey species density and annual prey production rates, they lack credibility. The results of over 60 field studies about cat predation on the continents and on oceanic island were analyzed by </span><a class="topic-link" data-dcnode-id="4518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/ecologists" title="Learn more about ecologist from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4519" instrument_node="">ecologist</span></a><span data-dcnode-id="4517" instrument_node=""> </span></span><a class="workspace-trigger" data-dcnode-id="4514" href="#bib0080" name="bbib0080"><span data-dcnode-id="4515" instrument_node="">Fitzgerald (1988)</span></a><span data-dcnode-id="4513" instrument_node="">, who came to the conclusion that on the mainland, such cats were not the main cause for the disappearance of endemic wildlife species, as opposed to the situation on small oceanic islands. Further studies and factors were added in </span><a class="workspace-trigger" data-dcnode-id="4511" href="#bib0085" name="bbib0085"><span data-dcnode-id="4512" instrument_node="">Fitzgerald and Turner (2000)</span></a><span data-dcnode-id="4510" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="4508" href="#bib0310" name="bbib0310"><span data-dcnode-id="4509" instrument_node="">Turner (2014)</span></a><span data-dcnode-id="4507" instrument_node=""> all arriving at the same conclusion. More recently it would appear that extreme conservationists consider the outdoor cat to be an enemy “imported” by man, overpopulating the mainland because of human activities (Swiss Animal Protection, Wildlife Office, 2016, pers. comm.). The facts that cats more or less domesticated themselves albeit with some support from early human agrarian settlements (</span><a class="workspace-trigger" data-dcnode-id="4505" href="#bib0155" name="bbib0155"><span data-dcnode-id="4506" instrument_node="">Leyhausen, 1988</span></a><span data-dcnode-id="4504" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4502" href="#bib0015" name="bbib0015"><span data-dcnode-id="4503" instrument_node="">Bradshaw, 1992</span></a><span data-dcnode-id="4501" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4499" href="#bib0250" name="bbib0250"><span data-dcnode-id="4500" instrument_node="">Serpell, 2014</span></a><span data-dcnode-id="4498" instrument_node="">), are socially and environmentally flexible (</span><a class="workspace-trigger" data-dcnode-id="4496" href="#bib0020" name="bbib0020"><span data-dcnode-id="4497" instrument_node="">Bradshaw, 2015</span></a><span data-dcnode-id="4495" instrument_node="">) and capable of surviving on their own, and dispersed from the fertile crescent northwards and eastwards in spite of attempts to prevent that dispersal, speak against this categorization. Cats have </span><em data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">themselves</span></em><span data-dcnode-id="4492" instrument_node=""> successfully expanded their geographic range and increased in population size, using their superior hunting abilities when outside and signals that solicit human support when inside. Random samples of adult persons in all countries that have been surveyed (n</span><span data-dcnode-id="4491" instrument_node="">&nbsp;</span><span data-dcnode-id="4490" instrument_node="">=</span><span data-dcnode-id="4489" instrument_node="">&nbsp;</span><span data-dcnode-id="4488" instrument_node="">12) consider cats to be ideal pet animals and do not agree that stray cats are causing problems in their countries (</span><a class="workspace-trigger" data-dcnode-id="4486" href="#bib0305" name="bbib0305"><span data-dcnode-id="4487" instrument_node="">Turner, 2010</span></a><span data-dcnode-id="4485" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4483" href="#bib0075" name="bbib0075"><span data-dcnode-id="4484" instrument_node="">Fehlbaum et al., 2010</span></a><span data-dcnode-id="4482" instrument_node="">). Intervening to reduce that population is an unwarranted and unjustified intervention in a naturally evolving predator-prey system.</span></p><p data-dcnode-id="4479" id="par0245"><span data-dcnode-id="4480" instrument_node="">Despite the problems potentially caused by domestic cats, one should never forget the health benefits that cat ownership and social support from companion cats bring to millions of cat people throughout the world. As always, one has to balance the costs against the benefits and the present author is convinced that this will favor having cats as companions.</span></p></section><section data-dcnode-id="4473" id="sec0080"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4476" id="sect0095"><span data-dcnode-id="4477" instrument_node="">Conflict of interest</span></h2><p data-dcnode-id="4474" id="par0250"><span data-dcnode-id="4475" instrument_node="">The author has no conflicts of interest and has always followed the Swiss government and university guidelines on ethics and ethical treatment of animals and secured the necessary permits.</span></p></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="4464"><button class="button button-anchor" data-dcnode-id="4468" type="button"><span class="button-text" data-dcnode-id="4469"><span data-dcnode-id="4470" instrument_node="">Special issue articles</span></span></button><button class="button button-anchor" data-dcnode-id="4465" type="button"><span class="button-text" data-dcnode-id="4466"><span data-dcnode-id="4467" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="4463"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="391" id="bibl0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4461"><span data-dcnode-id="4462" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="392" id="bibs0005"><dl class="references" data-dcnode-id="393" id="reference-links-bibs0005"><dt class="label" data-dcnode-id="4458"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="4459" href="#bbib0005" id="ref-id-bib0005"><span data-dcnode-id="4460" instrument_node="">Bahlig-Pieren and Turner, 1999</span></a></dt><dd class="reference" data-dcnode-id="4402" id="sbref0005"><div class="contribution" data-dcnode-id="4441"><span data-dcnode-id="4457" instrument_node="">Z.</span><span data-dcnode-id="4455" instrument_node=""> </span><span data-dcnode-id="4453" instrument_node="">Bahlig-Pieren</span><span data-dcnode-id="4451" instrument_node="">, </span><span data-dcnode-id="4449" instrument_node="">D.C.</span><span data-dcnode-id="4447" instrument_node=""> </span><span data-dcnode-id="4445" instrument_node="">Turner</span><div data-dcnode-id="4442" id="ref-id-sbref0005"><strong class="title" data-dcnode-id="4443"><span data-dcnode-id="4444" instrument_node="">Anthropomorphic interpretations and ethological descriptions of dog and cat behaviour by lay people</span></strong></div></div><div class="host" data-dcnode-id="4415"><span data-dcnode-id="4440" instrument_node="">Anthrozoös</span><span data-dcnode-id="4438" instrument_node="">, </span><span data-dcnode-id="4436" instrument_node="">12</span><span data-dcnode-id="4434" instrument_node=""> (</span><span data-dcnode-id="4432" instrument_node="">4</span><span data-dcnode-id="4430" instrument_node="">)</span><span data-dcnode-id="4428" instrument_node=""> (</ .</span><span data-dcnode-id="431" instrument_node=""> </span><span data-dcnode-id="429" instrument_node="">Kidd</span><div data-dcnode-id="426" id="ref-id-sbref0365"><strong class="title" data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Loneliness and pet ownership among single women</span></strong></div></div><div class="host" data-dcnode-id="399"><span data-dcnode-id="424" instrument_node="">Psychol. Rep.</span><span data-dcnode-id="422" instrument_node="">, </span><span data-dcnode-id="420" instrument_node="">75</span><span data-dcnode-id="418" instrument_node=""> (</span><span data-dcnode-id="416" instrument_node="">2</span><span data-dcnode-id="414" instrument_node="">)</span><span data-dcnode-id="412" instrument_node=""> (</span><span data-dcnode-id="410" instrument_node="">1994</span><span data-dcnode-id="408" instrument_node="">)</span><span data-dcnode-id="406" instrument_node="">, pp. </span><span data-dcnode-id="404" instrument_node="">747</span><span data-dcnode-id="402" instrument_node="">-</span><span data-dcnode-id="400" instrument_node="">752</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="395"><span data-dcnode-id="398" instrument_node=""></span><a aria-describedby="ref-id-sbref0365" class="link" data-dcnode-id="396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DLoneliness%2520and%2520pet%2520ownership%2520among%2520single%2520women%26publication_year%3D1994%26author%3DR.%2520Zasloff%26author%3DA.%2520Kidd" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="397" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="272" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="273"><div class="PageDivider" data-dcnode-id="390"></div><header data-dcnode-id="387" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Cited by (29)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="274"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="275"><ul data-dcnode-id="281"><li class="ListArticleItem" data-dcnode-id="366"><div class="sub-heading" data-dcnode-id="381"><a data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2351989422000117" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="385" id="citing-articles-article0-title"><span data-dcnode-id="386" instrument_node="">A psychological model to understand background reasons for different attitudes and behaviors of youth residents in relation to free-roaming cat problems on a human-inhabited World Heritage Island in Japan</span></h3></a><div class="article-source ellipsis" data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">2022, Global Ecology and Conservation</span></div></div><div class="buttons" data-dcnode-id="375"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="376" type="button"><span class="button-link-text" data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="377" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="378"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="367"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="368" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="369"><p data-dcnode-id="370" id="sp0045"><span data-dcnode-id="374" instrument_node="">Obtaining cooperation from the local people is a key factor in an efficient management of invasive species. However, conflicts between invasive species managers and local people occur, when the target species is strongly bonded with humans. To understand the attitudes and behaviors of local people toward the issues on free-roaming cats (</span><em data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Felis silvestris catus</span></em><span data-dcnode-id="371" instrument_node="">), we conducted a questionnaire study covering all high school students—who are important future stakeholders and could reflect ideas of their parents whose responses are hard to attain—on Tokunoshima Island, Japan, where the ecological negative impacts of free-roaming cats are exacerbated by residents’ feeding. We used a cognitive hierarchy model and structural equation modeling (SEM) to study the relations between our questionnaire items: background characteristics (i.e., cat ownership, education experience around cat-caused negative ecological impacts, attitudes and perceptions around cats and nature), perceptions of the negative cat impacts on nature and people, attitudes toward outdoor cat management, and the frequency of outdoor feeding. Results from 1162 youth respondents showed that cat owners and people who believed that cats are useful for rodent control exhibited a higher frequency of outdoor feeding, perhaps due to feeding their own cats outdoors. Perceptions on the negative impacts of cats on people (e.g., zoonoses and public nuisances) which were disagreed by cat lovers, showed a stronger effect than the perceptions of negative ecological impacts, in terms of the approval of outdoor cat management. In general, informing people about the threats of outdoor cats to people, house-owned cats and livestock through education activities regarding the cat issues will lead to a better understanding and cooperation toward outdoor cat management. Educating teenagers who are more likely to accept new knowledge is especially necessary. Keeping cats indoors and reducing the frequency of feeding outdoor cats are still one of the fundamental solutions to decrease the number of outdoor cats, which will in turn decrease the risk of cat predation on native species.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="339"><div class="sub-heading" data-dcnode-id="360"><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0092656621000982" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="364" id="citing-articles-article1-title"><span data-dcnode-id="365" instrument_node="">A domestic cat (Felis silvestris catus) model of triarchic psychopathy factors: Development and initial validation of the CAT-Tri+ questionnaire</span></h3></a><div class="article-source ellipsis" data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">2021, Journal of Research in Personality</span></div></div><div class="buttons" data-dcnode-id="354"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="355" type="button"><span class="button-link-text" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="356" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="357"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="340"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="341" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="342"><p data-dcnode-id="343" id="sp0010"><span data-dcnode-id="353" instrument_node="">We operationalised the triarchic model of psychopathy (boldness, meanness, and disinhibition) in domestic cats using a cat triarchic (CAT-Tri) questionnaire. In study 1 (</span><em data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">n</span></em><span data-dcnode-id="350" instrument_node="">&nbsp;=&nbsp;549), we identified candidate items for CAT-Tri scales using thematically analysed cat owner questionnaire responses. In study 2 (</span><em data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">n</span></em><span data-dcnode-id="347" instrument_node="">&nbsp;=&nbsp;1463), owners completed a questionnaire battery; the preliminary CAT-Tri questionnaire, Feline Five, and Cat-Owner Relationship Subscales. In study 3 (</span><em data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">n</span></em><span data-dcnode-id="344" instrument_node="">&nbsp;=&nbsp;30), associations between feline daily activity and Cat-Tri scales were investigated. A five-factor cat triarchic plus (CAT-Tri+) solution emerged: boldness, disinhibition, meanness, pet-unfriendliness, and human-unfriendliness. Disinhibition and pet-unfriendliness predicted a higher quality cat-owner relationship; meanness and boldness predicted a lower quality relationship. Findings provide insight into the structure of triarchic psychopathy in cats.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="315"><div class="sub-heading" data-dcnode-id="327"><a data-dcnode-id="336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0191886918305427" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="337" id="citing-articles-article2-title"><span data-dcnode-id="338" instrument_node="">The purrfect match: The influence of personality on owner satisfaction with their domestic cat (Felis silvestris catus)</span></h3></a><div class="article-source ellipsis" data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">2019, Personality and Individual Differences</span></div><div class="CitedSection" data-dcnode-id="328"><div class="snippet" data-dcnode-id="329"><div class="cite-header" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Finally, though research indicates that cat personality is stable from eight weeks of age onwards (Lowe &amp; Bradshaw, 2002), and kittens are advised to not be removed from their mothers for rehoming until after the 8–9 week mark (RSPCA, 2018), longitudinal studies are required to confirm owner and cat personality prior to adoption. Animal personality is subject to change, particularly in response to negative experiences with the owner or if the cat has not been socialised during the sensitive period (Turner, 2017). There are also other factors to consider that may have influenced cat selection and reported satisfaction.</span></p></div></div></div><div class="buttons" data-dcnode-id="321"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="322" type="button"><span class="button-link-text" data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="323" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="324"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="316"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="317" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="318"><p data-dcnode-id="319" id="sp0015"><span data-dcnode-id="320" instrument_node="">Pet animals, and the quality of the owner-pet relationship, have an important impact on owners' lives. Further, similarity of owner-pet personality may impact on owner satisfaction though this has not been investigated in relation to cats. In the current study, cat owners (N = 126) completed a two section questionnaire. The owner section assessed three of the Big Five traits (agreeableness, extraversion, neuroticism), dominance, impulsiveness, the Dark Triad (narcissism, Machiavellianism, psychopathy), and owner satisfaction with their cat. The pet section assessed the Feline Five (agreeableness, dominance, extraversion, impulsiveness, neuroticism). Positive associations were identified between owner and pet dominance and owner and pet impulsivity. Higher owner dominance also positively correlated with cat extraversion, impulsivity, and neuroticism and owner Dark Triad traits were positively correlated with cat dominance, impulsivity, and neuroticism. None of the owner personality traits related to satisfaction with the cat. Overall, owners were more satisfied with cats high in agreeableness and low in neuroticism. Dissimilarity in owner dominance and cat agreeableness, and owner impulsivity and cat agreeableness were correlated with higher satisfaction. Satisfaction was also positively associated with similarity in scores for owner Dark Triad and cat agreeableness. Future research is recommended, focusing on matching of non-identical personality traits.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="304"><div class="sub-heading" data-dcnode-id="309"><a data-dcnode-id="312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1371/journal.pone.0257671" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="313" id="citing-articles-article3-title"><span data-dcnode-id="314" instrument_node="">Cat owners’ perception on having a pet cat during the COVID-19 pandemic</span></h3></a><div class="article-source ellipsis" data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">2021, PLoS ONE</span></div></div><div class="buttons" data-dcnode-id="308"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="305"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="306" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="307"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="293"><div class="sub-heading" data-dcnode-id="298"><a data-dcnode-id="301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3390/ani11102823" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="302" id="citing-articles-article4-title"><span data-dcnode-id="303" instrument_node="">Unanswered questions and hypotheses about domestic cat behavior, ecology, and the cat–human relationship</span></h3></a><div class="article-source ellipsis" data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">2021, Animals</span></div></div><div class="buttons" data-dcnode-id="297"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="294"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="295" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="296"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="282"><div class="sub-heading" data-dcnode-id="287"><a data-dcnode-id="290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3389/fvets.2021.650143" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="291" id="citing-articles-article5-title"><span data-dcnode-id="292" i
