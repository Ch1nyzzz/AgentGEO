</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1799" id="mntl-sc-block_1-0"><span data-dcnode-id="1800" instrument_node="">

In addition to checking the laws surrounding ownership, look carefully at regulations for raccoon owners. For example, what happens to your raccoon if it gets loose? What happens if it scratches or bites someone? In some areas, the laws are quite harsh regarding the treatment of wild animals kept as pets, and they might lead to your pet being euthanized if it's problematic in the community.

There also are ethical considerations surrounding pet raccoons. Are you able to provide a proper and enriching environment for the animal? Can you feed it a healthy diet with the correct nutrition? Will you respect its boundaries as an animal that can't truly be domesticated? You must consider what's best for the animal over your interest in owning one. Experts recommend spending time around raccoons via wildlife rehabilitation or exotic veterinary practices to see what they're really like.

Raccoons are intelligent animals, known for their good memories and problem-solving abilities. Plus, these North American natives are nocturnal, meaning they're most active at night. And even when they're born in captivity or raised by humans, they typically retain their wild traits. That means it takes a lot of effort to care for them.

Raccoons will bond with their humans, especially when raised in captivity from a young age. And many do become quite cuddly or playful at times. However, they also are generally quick to bite—even their favorite people—when something annoys or scares them. Plus, they might attack other pets in your home, especially small animals, as they are predators in the wild.&nbsp;So they are best kept solo.
</span></p><span data-dcnode-id="1605" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1604" id="mntl-sc-block_1-0-23"></div><span data-dcnode-id="1603" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1601" id="mntl-sc-block_1-0-24"><span data-dcnode-id="1602" instrument_node="">
While they do make some vocalizations, raccoons are generally quiet animals. But life won’t feel quiet with a pet raccoon. These animals require a lot of space, upkeep, and supervision.
</span></p><span data-dcnode-id="1600" instrument_node="">

</span><h3 class="comp mntl-sc-block-inlinevideo__title mntl-text-block" data-dcnode-id="1359" id="mntl-sc-block-inlinevideo__title_1-0"><span data-dcnode-id="1360" instrument_node="">
Could You Own a Pet Raccoon?</span></h3><span data-dcnode-id="1358" instrument_node="">
</span></div><span data-dcnode-id="1356" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1355" id="mntl-sc-block_1-0-27"></div><span data-dcnode-id="1354" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1353" id="toc-housing"></span><span data-dcnode-id="1352" instrument_node=""> </span><h2 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1347" id="mntl-sc-block_1-0-28"><span data-dcnode-id="1351" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node=""> Housing </span></span><span data-dcnode-id="1348" instrument_node=""> </span></h2><span data-dcnode-id="1346" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1344" id="mntl-sc-block_1-0-29"><span data-dcnode-id="1345" instrument_node="">
Some people who keep raccoons house them in a large dog crate when they aren't home to watch their pet. However, raccoons are too active to be content in a cage for several hours. So the majority of a pet raccoon's time should be spent roaming your house: playing, climbing on things, exploring, and being mischievous. That means your home must be raccoon-proofed. Raccoons are prone to chewing on cords, climbing on shelves, and knocking down valuables. So anything that might injure them or become damaged must be removed from their area.
</span></p><span data-dcnode-id="1343" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1342" id="mntl-sc-block_1-0-30"></div><span data-dcnode-id="1341" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1339" id="mntl-sc-block_1-0-31"><span data-dcnode-id="1340" instrument_node="">
If you have the space, it's ideal to provide a secure outdoor enclosure for your raccoon. This is a great option when you're busy or need to leave your home and want your pet to have a safe space to play. An outdoor pen should be as large as possible with walls and a ceiling that will contain your animal. Many people build their own pen from wood and screening. Inside, your raccoon should have access to food, water, shelter, and structures (e.g., large branches) for climbing and jumping. Include toys, such as balls and food puzzles, to keep your pet entertained.
</span></p><span data-dcnode-id="1338" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1337" id="mntl-sc-block_1-0-32"></div><span data-dcnode-id="1336" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1335" id="toc-specific-substrate-needs"></span><span data-dcnode-id="1334" instrument_node=""> </span><h3 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1329" id="mntl-sc-block_1-0-33"><span data-dcnode-id="1333" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node=""> Specific Substrate Needs </span></span><span data-dcnode-id="1330" instrument_node=""> </span></h3><span data-dcnode-id="1328" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1326" id="mntl-sc-block_1-0-34"><span data-dcnode-id="1327" instrument_node="">
For the crate interior where your raccoon might temporarily spend time, an easily washable blanket or dog bed on the floor should keep the animal comfortable.
</span></p><span data-dcnode-id="1325" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1324" id="mntl-sc-block_1-0-35"></div><span data-dcnode-id="1323" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1322" id="toc-what-do-raccoons-eat--drink"></span><span data-dcnode-id="1321" instrument_node=""> </span><h2 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1316" id="mntl-sc-block_1-0-36"><span data-dcnode-id="1320" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node=""> What Do Raccoons Eat &amp; Drink? </span></span><span data-dcnode-id="1317" instrument_node=""> </span></h2><span data-dcnode-id="1315" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1310" id="mntl-sc-block_1-0-37"><span data-dcnode-id="1314" instrument_node="">
</span><a data-component="link" data-dcnode-id="1312" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/raccoon-diet-1239361"><span data-dcnode-id="1313" instrument_node="">Raccoons are omnivores</span></a><span data-dcnode-id="1311" instrument_node="">, meaning they eat both meat and plants. Offer your pet a varied diet, including dog food, poultry, fish, eggs, insects, vegetables, and fruits. Treats, such as nuts and other fatty foods, should be offered sparingly to prevent obesity. A dish of clean water should be available at all times. Consult your veterinarian for the quantity and variety that is best for your animal, as this can vary based on age, size, and activity level.
</span></p><span data-dcnode-id="1309" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1308" id="mntl-sc-block_1-0-38"></div><span data-dcnode-id="1307" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1305" id="mntl-sc-block_1-0-39"><span data-dcnode-id="1306" instrument_node="">
Raccoons are messy eaters. They like to dunk their food in their water dish prior to consuming it. That means you'll need to regularly change their water and feed them in a location where it's easy to clean up. Most adult raccoons need two meals per day in the early morning and late evening, though follow your vet's advice on this. You can simply put their food in a bowl. But it's also ideal to take some of it to put in food puzzles or hide around their enclosure as a form of enrichment.
</span></p><span data-dcnode-id="1304" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1303" id="mntl-sc-block_1-0-40"></div><span data-dcnode-id="1302" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="1270" id="toc-common-health-problems"></span><span data-dcnode-id="1269" instrument_node=""> </span><h2 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1264" id="mntl-sc-block_1-0-42"><span data-dcnode-id="1268" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node=""> Common Health Problems </span></span><span data-dcnode-id="1265" instrument_node=""> </span></h2><span data-dcnode-id="1263" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1261" id="mntl-sc-block_1-0-43"><span data-dcnode-id="1262" instrument_node="">
Raccoons can carry a number of parasites, viruses, and bacterial illnesses, including:
</span></p><span data-dcnode-id="1260" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1259" id="mntl-sc-block_1-0-44"></div><span data-dcnode-id="1258" instrument_node="">
</span><ul class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1238" id="mntl-sc-block_1-0-45"><span data-dcnode-id="1257" instrument_node="">
</span><li data-dcnode-id="1254"><a data-component="link" data-dcnode-id="1255" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/how-long-are-rabies-shots-good-3385625"><span data-dcnode-id="1256" instrument_node="">Rabies</span></a></li><span data-dcnode-id="1253" instrument_node="">
</span><li data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Canine distemper&nbsp;</span></li><span data-dcnode-id="1250" instrument_node="">
</span><li data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Leptospirosis</span></li><span data-dcnode-id="1247" instrument_node="">
</span><li data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Toxoplasmosis</span></li><span data-dcnode-id="1244" instrument_node="">
</span><li data-dcnode-id="1240"><span data-dcnode-id="1243" instrument_node="">Intestinal roundworms</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1241" data-id="#citation-2"><span data-dcnode-id="1242" instrument_node="">2</span></span></li><span data-dcnode-id="1239" instrument_node="">
</span></ul><span data-dcnode-id="1237" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1236" id="mntl-sc-block_1-0-46"></div><span data-dcnode-id="1235" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1233" id="mntl-sc-block_1-0-47"><span data-dcnode-id="1234" instrument_node="">
Raccoons born and raised in captivity are less likely to develop many of these diseases. But it's still very important to take your pet for regular vet visits.
</span></p><span data-dcnode-id="1232" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1231" id="mntl-sc-block_1-0-48"></div><span data-dcnode-id="1230" instrument_node="">
</span><div class="comp theme-recipetip text-passage lifestyle-sc-block-callout--icon mntl-sc-block lifestyle-sc-block-callout--recipetip lifestyle-sc-block-callout mntl-sc-block-callout mntl-block" data-dcnode-id="1218" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-49"><span data-dcnode-id="1229" instrument_node="">
</span><h3 class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="1227" id="mntl-sc-block-callout-heading_1-0-1"><span data-dcnode-id="1228" instrument_node="">
Tip</span></h3><span data-dcnode-id="1226" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1220" id="mntl-sc-block-callout-body_1-0-1"><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1221"><a data-component="link" data-dcnode-id="1223" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/veterinarian-for-your-exotic-pet-1237279"><span data-dcnode-id="1224" instrument_node="">Finding a veterinarian for your exotic pet</span></a><span data-dcnode-id="1222" instrument_node=""> can be difficult, as not all vets have experience in raccoons. Prior to acquiring a raccoon as a pet, contact exotic veterinarians in your area to find one who specializes in this animal and is willing to take one on as a patient.</span></p></div><span data-dcnode-id="1219" instrument_node="">
</span></div><span data-dcnode-id="1217" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1216" id="toc-exercise"></span><span data-dcnode-id="1215" instrument_node=""> </span><h2 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1210" id="mntl-sc-block_1-0-50"><span data-dcnode-id="1214" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node=""> Exercise </span></span><span data-dcnode-id="1211" instrument_node=""> </span></h2><span data-dcnode-id="1209" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1207" id="mntl-sc-block_1-0-51"><span data-dcnode-id="1208" instrument_node="">
Captive raccoons can be prone to obesity if they aren't given enough space to roam. Ideally, they should be allowed to move freely around your living area and provided with branches, shelves, and other items to climb for exercise. Some also enjoy playing with toys like balls.
</span></p><span data-dcnode-id="1206" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1205" id="mntl-sc-block_1-0-52"></div><span data-dcnode-id="1204" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1203" id="toc-grooming"></span><span data-dcnode-id="1202" instrument_node=""> </span><h2 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1197" id="mntl-sc-block_1-0-53"><span data-dcnode-id="1201" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node=""> Grooming </span></span><span data-dcnode-id="1198" instrument_node=""> </span></h2><span data-dcnode-id="1196" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1195" id="toc-shedding"></span><span data-dcnode-id="1194" instrument_node=""> </span><h3 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1189" id="mntl-sc-block_1-0-54"><span data-dcnode-id="1193" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node=""> Shedding </span></span><span data-dcnode-id="1190" instrument_node=""> </span></h3><span data-dcnode-id="1188" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1186" id="mntl-sc-block_1-0-55"><span data-dcnode-id="1187" instrument_node="">
Raccoons tend to go through a heavy shedding period at least once a year, as well as in times of stress. Gently brushing them during this time can help to prevent the loose fur from matting.
</span></p><span data-dcnode-id="1185" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1184" id="mntl-sc-block_1-0-56"></div><span data-dcnode-id="1183" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1182" id="toc-bathinggrooming"></span><span data-dcnode-id="1181" instrument_node=""> </span><h3 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1176" id="mntl-sc-block_1-0-57"><span data-dcnode-id="1180" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node=""> Bathing/Grooming </span></span><span data-dcnode-id="1177" instrument_node=""> </span></h3><span data-dcnode-id="1175" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1173" id="mntl-sc-block_1-0-58"><span data-dcnode-id="1174" instrument_node="">
Raccoons are generally very clean animals and will groom themselves much like cats do. They only require occasional baths with a mild shampoo. Consult your vet for the best bathing frequency to avoid irritating their skin. Also, as pet raccoons won't be in their natural environment that wears down their nails, they'll likely need regular nail trims. An experienced vet should be able to do this for you.
</span></p><span data-dcnode-id="1172" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1171" id="mntl-sc-block_1-0-59"></div><span data-dcnode-id="1170" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1169" id="toc-size-information"></span><span data-dcnode-id="1168" instrument_node=""> </span><h2 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1163" id="mntl-sc-block_1-0-60"><span data-dcnode-id="1167" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node=""> Size Information </span></span><span data-dcnode-id="1164" instrument_node=""> </span></h2><span data-dcnode-id="1162" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1160" id="mntl-sc-block_1-0-61"><span data-dcnode-id="1161" instrument_node="">
On average, raccoons reach around 16 to 28 inches long, and they weigh between 7 and 20 pounds.&nbsp;They'll reach their full size between 4 months and 1 year old.
</span></p><span data-dcnode-id="1159" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1158" id="mntl-sc-block_1-0-62"></div><span data-dcnode-id="1157" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1156" id="toc-upkeep-costs"></span><span data-dcnode-id="1155" instrument_node=""> </span><h2 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1150" id="mntl-sc-block_1-0-63"><span data-dcnode-id="1154" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node=""> Upkeep Costs </span></span><span data-dcnode-id="1151" instrument_node=""> </span></h2><span data-dcnode-id="1149" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1147" id="mntl-sc-block_1-0-64"><span data-dcnode-id="1148" instrument_node="">
On a monthly basis, your main essential cost for a raccoon will be its healthy, varied diet. You also might need to spend money on new toys for mental and physical enrichment. Plan to spend between $30 and $50 per month on average, also budgeting for at least an annual veterinary checkup and any emergency medical care.&nbsp;
</span></p><span data-dcnode-id="1146" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1145" id="mntl-sc-block_1-0-65"></div><span data-dcnode-id="1144" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1143" id="toc-training-your-raccoon"></span><span data-dcnode-id="1142" instrument_node=""> </span><h2 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1137" id="mntl-sc-block_1-0-66"><span data-dcnode-id="1141" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node=""> Training Your Raccoon </span></span><span data-dcnode-id="1138" instrument_node=""> </span></h2><span data-dcnode-id="1136" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1134" id="mntl-sc-block_1-0-67"><span data-dcnode-id="1135" instrument_node="">
Thanks to their intelligence, most pet raccoons are able to learn their name and even a few commands, such as “sit” and “shake.”
</span></p><span data-dcnode-id="1133" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1132" id="mntl-sc-block_1-0-68"></div><span data-dcnode-id="1131" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1130" id="toc-potty-training"></span><span data-dcnode-id="1129" instrument_node=""> </span><h3 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1124" id="mntl-sc-block_1-0-69"><span data-dcnode-id="1128" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node=""> Potty Training </span></span><span data-dcnode-id="1125" instrument_node=""> </span></h3><span data-dcnode-id="1123" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1116" id="mntl-sc-block_1-0-70"><span data-dcnode-id="1122" instrument_node="">
Some raccoons can be trained to use a litter box. But they are rather stubborn and selective about when they want to obey.&nbsp;</span><a data-component="link" data-dcnode-id="1120" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/litter-box-training-and-issues-4162112"><span data-dcnode-id="1121" instrument_node="">Litter training</span></a><span data-dcnode-id="1119" instrument_node=""> them is similar to how one would teach a cat to use a litter box.</span><br data-dcnode-id="1118"><span data-dcnode-id="1117" instrument_node="">
</span></p><span data-dcnode-id="1115" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1114" id="mntl-sc-block_1-0-71"></div><span data-dcnode-id="1113" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1112" id="toc-pros--cons-of-keeping-a-raccoon-as-a-pet"></span><span data-dcnode-id="1111" instrument_node=""> </span><h2 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1106" id="mntl-sc-block_1-0-72"><span data-dcnode-id="1110" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node=""> Pros &amp; Cons of Keeping a Raccoon as a Pet </span></span><span data-dcnode-id="1107" instrument_node=""> </span></h2><span data-dcnode-id="1105" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1103" id="mntl-sc-block_1-0-73"><span data-dcnode-id="1104" instrument_node="">
Raccoons can be very amusing and playful pets. And some do enjoy cuddling with their humans. However, providing the right environment for them is difficult. They need lots of safe space to roam and consistent supervision. Plus, as nocturnal animals, their antics will likely keep you up at night.
</span></p><span data-dcnode-id="1102" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1101" id="mntl-sc-block_1-0-74"></div><span data-dcnode-id="1100" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1099" id="toc-purchasing-your-raccoon"></span><span data-dcnode-id="1098" instrument_node=""> </span><h2 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1093" id="mntl-sc-block_1-0-75"><span data-dcnode-id="1097" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node=""> Purchasing Your Raccoon </span></span><span data-dcnode-id="1094" instrument_node=""> </span></h2><span data-dcnode-id="1092" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1087" id="mntl-sc-block_1-0-76"><span data-dcnode-id="1091" instrument_node="">
Never take a raccoon from the wild to raise as a pet. That is typically illegal in most places unless you're a licensed wildlife rehabilitator. And captivity can greatly stress a </span><a data-component="link" data-dcnode-id="1089" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/wild-animals-as-pets-1238595"><span data-dcnode-id="1090" instrument_node="">wild animal</span></a><span data-dcnode-id="1088" instrument_node=""> even to the point of killing it. Plus, animals taken into captivity often can't be released back in the wild if you decide you can't keep your pet because they become too reliant on and comfortable around humans.
</span></p><span data-dcnode-id="1086" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1085" id="mntl-sc-block_1-0-77"></div><span data-dcnode-id="1084" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1082" id="mntl-sc-block_1-0-78"><span data-dcnode-id="1083" instrument_node="">
Thus, it's best to acquire a pet raccoon from a reputable breeder. Adoption opportunities are usually few and far between for raccoons unless you are part of a wildlife rehabilitation network. An exotic veterinarian who knows raccoons might be able to point you toward a good breeder. Visit with the animal in person before you commit; don't acquire an animal over the internet or via a classified ad. Expect to pay between $300 and $700 on average, though this can vary widely.
</span></p><span data-dcnode-id="1081" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1080" id="mntl-sc-block_1-0-79"></div><span data-dcnode-id="1079" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1078" id="toc-reproductionbreeding"></span><span data-dcnode-id="1077" instrument_node=""> </span><h3 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1072" id="mntl-sc-block_1-0-80"><span data-dcnode-id="1076" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node=""> Reproduction/Breeding </span></span><span data-dcnode-id="1073" instrument_node=""> </span></h3><span data-dcnode-id="1071" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1069" id="mntl-sc-block_1-0-81"><span data-dcnode-id="1070" instrument_node="">
A good breeder will be able to show you how they handle and interact with all of their young raccoons to help tame the animals and diminish their desire to bite. The breeder also should give you thorough information on the animal's origin and health history. Some red flags include a raccoon that is underweight with its ribs showing, as well as a very lethargic animal or one that is not interested in food. These are likely signs of ill health.
</span></p><span data-dcnode-id="1068" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1067" id="mntl-sc-block_1-0-82"></div><span data-dcnode-id="1066" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1064" id="mntl-sc-block_1-0-83"><span data-dcnode-id="1065" instrument_node="">
As you will most likely be keeping your raccoon solo, you won't have to worry about accidentally becoming a breeder yourself. You also can discuss spaying or neutering your raccoon with your vet.
</span></p><span data-dcnode-id="1063" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1062" id="mntl-sc-block_1-0-84"></div><span data-dcnode-id="1061" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1060" id="toc-similar-exotic-animals-to-the-raccoon"></span><span data-dcnode-id="1059" instrument_node=""> </span><h2 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1054" id="mntl-sc-block_1-0-85"><span data-dcnode-id="1058" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node=""> Similar Exotic Animals to the Raccoon </span></span><span data-dcnode-id="1055" instrument_node=""> </span></h2><span data-dcnode-id="1053" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1051" id="mntl-sc-block_1-0-86"><span data-dcnode-id="1052" instrument_node="">
If you’re interested in pet raccoons, also check out:
</span></p><span data-dcnode-id="1050" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1049" id="mntl-sc-block_1-0-87"></div><span data-dcnode-id="1048" instrument_node="">
</span><ul class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1034" id="mntl-sc-block_1-0-88"><span data-dcnode-id="1047" instrument_node="">
</span><li data-dcnode-id="1044"><a data-component="link" data-dcnode-id="1045" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/skunks-as-pets-1237314"><span data-dcnode-id="1046" instrument_node="">Skunk</span></a></li><span data-dcnode-id="1043" instrument_node="">
</span><li data-dcnode-id="1040"><a data-component="link" data-dcnode-id="1041" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/pet-capuchin-monkeys-1239552"><span data-dcnode-id="1042" instrument_node="">Capuchin monkey</span></a></li><span data-dcnode-id="1039" instrument_node="">
</span><li data-dcnode-id="1036"><a data-component="link" data-dcnode-id="1037" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/kinkajous-as-pets-1237227"><span data-dcnode-id="1038" instrument_node="">Kinkajou</span></a></li><span data-dcnode-id="1035" instrument_node="">
</span></ul><span data-dcnode-id="1033" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1032" id="mntl-sc-block_1-0-89"></div><span data-dcnode-id="1031" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1024" id="mntl-sc-block_1-0-90"><span data-dcnode-id="1030" instrument_node="">
Please do your research as to whether owning one of these </span><a data-component="link" data-dcnode-id="1028" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/exotic-pets-4162074"><span data-dcnode-id="1029" instrument_node="">exotic animals</span></a><span data-dcnode-id="1027" instrument_node=""> is something you should do.&nbsp;</span><br data-dcnode-id="1026"><span data-dcnode-id="1025" instrument_node="">
</span></p><span data-dcnode-id="1023" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1022" id="mntl-sc-block_1-0-91"></div><span data-dcnode-id="1021" instrument_node="">
</span><div class="comp text-passage mntl-sc-block lifestyle-sc-block-faq mntl-sc-block-faq mntl-block" data-dcnode-id="937" id="mntl-sc-block_1-0-92"><span data-dcnode-id="1020" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1019" id="toc-frequently-asked-questions-ffc8c0c9-ebcc-4b9c-86f3-19f361e80599"></span><span data-dcnode-id="1018" instrument_node="">
</span><div class="comp mntl-sc-block-faq__title mntl-text-block" data-dcnode-id="1016" id="mntl-sc-block-faq__title_1-0"><span data-dcnode-id="1017" instrument_node="">

</span><ul class="comp mntl-sc-block-faq__content mntl-accordion" data-dcnode-id="941" id="mntl-sc-block-faq__content_1-0"><span data-dcnode-id="1014" instrument_node="">
</span><li class="accordion__item js-accordion-item is-active" data-dcnode-id="992"><span data-dcnode-id="1013" instrument_node="">
</span><div class="accordion__header js-accordion-trigger" data-dcnode-id="1008" id="mntl-sc-block-faq__content_1-section-0"><span data-dcnode-id="1012" instrument_node="">
</span><span class="accordion__title" data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Is a raccoon hard to take care of?</span></span><span data-dcnode-id="1009" instrument_node="">
</span></div><span data-dcnode-id="1006" instrument_node="">
</span><div class="accordion__body" data-dcnode-id="995"><span data-dcnode-id="1005" instrument_node="">
</span><div class="comp class com.about.mantle.model.extended.docv2.sc.blocks.StructuredContentFaqEx$Faq mntl-sc-block-faq__accordion-content" data-dcnode-id="997" id="mntl-sc-block-faq__accordion-content_1-0-section-0"><span data-dcnode-id="1004" instrument_node="">
</span><div class="faq-accordion__item-answer" data-dcnode-id="999"><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Raccoons are very difficult to care for, as they need regular supervision and ample space. They are active and intelligent animals that require lots of mental and physical enrichment.</span></p><span data-dcnode-id="1000" instrument_node="">
</span></div><span data-dcnode-id="998" instrument_node="">
</span></div><span data-dcnode-id="996" instrument_node="">
</span></div><span data-dcnode-id="993" instrument_node="">
</span></li><span data-dcnode-id="990" instrument_node="">
</span><li class="accordion__item js-accordion-item is-active" data-dcnode-id="968"><span data-dcnode-id="989" instrument_node="">
</span><div class="accordion__header js-accordion-trigger" data-dcnode-id="984" id="mntl-sc-block-faq__content_1-section-1"><span data-dcnode-id="988" instrument_node="">
</span><span class="accordion__title" data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Can you domesticate a raccoon?</span></span><span data-dcnode-id="985" instrument_node="">
</span></div><span data-dcnode-id="982" instrument_node="">
</span><div class="accordion__body" data-dcnode-id="971"><span data-dcnode-id="981" instrument_node="">
</span><div class="comp class com.about.mantle.model.extended.docv2.sc.blocks.StructuredContentFaqEx$Faq mntl-sc-block-faq__accordion-content" data-dcnode-id="973" id="mntl-sc-block-faq__accordion-content_1-0-section-1"><span data-dcnode-id="980" instrument_node="">
</span><div class="faq-accordion__item-answer" data-dcnode-id="975"><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Raccoons can become relatively tame around people, but they'll never become fully domesticated. They might bite even their favorite people and are often destructive in the home.</span></p><span data-dcnode-id="976" instrument_node="">
</span></div><span data-dcnode-id="974" instrument_node="">
</span></div><span data-dcnode-id="972" instrument_node="">
</span></div><span data-dcnode-id="969" instrument_node="">
</span></li><span data-dcnode-id="966" instrument_node="">
