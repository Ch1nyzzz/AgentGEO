</span><p data-dcnode-id="1672"><strong data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">How many Arctic Foxes live in Iceland? How did they come to </span></strong><strong data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">live</span></strong><strong data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">&nbsp;on the island? What are their typical habitats and how can you spot one for yourself? Where in Iceland can you learn more about this incredible little canine and even grab a photograph? Read on to discover all there is to know about Iceland’s only mammalian native, the Arctic Fox.&nbsp;</span></strong></p><span data-dcnode-id="1671" instrument_node="">

</span><p data-dcnode-id="1651"><span data-dcnode-id="1658" instrument_node="">Iceland—a large, but isolated landmass, edging nefariously against the </span><a data-dcnode-id="1656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arctic_Circle" rel="nofollow" target="_blank"><span data-dcnode-id="1657" instrument_node="">Arctic circle</span></a><span data-dcnode-id="1655" instrument_node="">—has long been of interest to the scientifically minded. Cut off from the evolutionary patterns of mainland Europe and North America,</span><a data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/nature-info"><span data-dcnode-id="1654" instrument_node=""> Iceland’s flora and fauna</span></a><span data-dcnode-id="1652" instrument_node=""> is a fascinating field of study unto its own. After all,&nbsp;which species of animal or plant&nbsp;are hardy enough to inhabit, adapt and thrive on a volcanically-active&nbsp;yet largely frozen island?&nbsp;</span></p><span data-dcnode-id="1650" instrument_node="">
</span><p data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">To be frank with you, it's actually a surprising amount.&nbsp;</span></p><span data-dcnode-id="1647" instrument_node="">

le="evenodd" d="M0 10C0 4.477 4.477 0 10 0c5.52.006 9.994 4.48 10 10 0 5.523-4.477 10-10 10S0 15.523 0 10zm15.712.294a.417.417 0 000-.589l-5.65-5.65a.417.417 0 00-.589 0L8.4 5.13a.417.417 0 000 .59l2.677 2.675a.208.208 0 01-.148.355h-6.16a.417.417 0 00-.416.417v1.665c0 .23.186.416.416.416h6.16a.209.209 0 01.148.355L8.399 14.28a.417.417 0 000 .59l1.074 1.074a.417.417 0 00.59 0z" data-dcnode-id="1424" fill-rule="evenodd"></path></svg></div></div></div></a></div></div></li></ul><a class="e1402jjo4 x-14pday2 e2tvry10" data-dcnode-id="1410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/book-trips-holiday/nature-tours" title="See all tours"><span data-dcnode-id="1414" style="font-size:0"></span><span data-dcnode-id="1413" instrument_node="">See all tours</span><svg class="x-14wq15s e1402jjo5" data-dcnode-id="1411" viewBox="0 0 24 24"><path d="M23.987 12a2.411 2.411 0 00-.814-1.8L11.994.361a1.44 1.44 0 00-1.9 2.162l8.637 7.6a.25.25 0 01-.165.437H1.452a1.44 1.44 0 000 2.88h17.111a.251.251 0 01.165.438l-8.637 7.6a1.44 1.44 0 101.9 2.161L23.172 13.8a2.409 2.409 0 00.815-1.8z" data-dcnode-id="1412"></path></svg></a></div><div data-dcnode-id="887" style="display:contents"><div class="x-psa0i8 e1q7jrc70" data-dcnode-id="888"><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1407" instrument_node="">Now, that’s not to suggest Iceland is famed for its exotic safaris, nor as a habitat that suits large predators—this is despite the prolific merchandising of</span><a data-dcnode-id="1405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/connect-with-locals/nanna/beware-of-polar-bears-in-iceland-it-is-now-puffin-hunting-season"><span data-dcnode-id="1406" instrument_node=""> polar bears,</span></a><span data-dcnode-id="1404" instrument_node=""> an animal that only periodically arrives in Iceland, by accident. In fact, one could argue that, for human beings at least, Iceland’s most dangerous predator is often the weather, a force quite capable of snuffing out lives within a matter of windswept seconds.&nbsp;</span></p><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">And yet, out there in that bleak, beautiful, threatening wild, there is a small, furry meat-eater who has prospered for ten&nbsp;thousand&nbsp;years, battling the elements and the rough terrain to become one of history’s toughest natural survivors.&nbsp;</span></p><span data-dcnode-id="1399" instrument_node="">
</span><hr data-dcnode-id="1398"><ul data-dcnode-id="1392"><li data-dcnode-id="1394"><span data-dcnode-id="1397" instrument_node="">See also: </span><a data-dcnode-id="1395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/travel-info/climate-weather-and-northern-lights-in-iceland"><span data-dcnode-id="1396" instrument_node="">Weather in Iceland and Best Time to Visit&nbsp;</span></a></li><span data-dcnode-id="1393" instrument_node="">
</span></ul><hr data-dcnode-id="1391"><p data-dcnode-id="1381" style="font-size:10px;font-style:italic;"><span class="lazyContainer" data-dcnode-id="1387" style="display: block; padding-bottom: 74.40543601359003%"><img alt="The Arctic Fox is, arguably, the most well adapted predator for sub-arctic environments." class="lazyloaded" data-dcnode-id="1390" data-src="https://guidetoiceland.imgix.net/737548/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-2.jpg?ixlib=php-3.3.0&amp;w=883" height="657" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.imgix.net/737548/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-2.jpg%3Fixlib%3Dphp-3.3.0%26w%3D883&amp;raw" title="The Arctic Fox is, arguably, the most well adapted predator for sub-arctic environments." width="883"><noscript data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">&lt;img alt="The Arctic Fox is, arguably, the most well adapted predator for sub-arctic environments." src="https://guidetoiceland.imgix.net/737548/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-2.jpg?ixlib=php-3.3.0&amp;amp;w=883" width="883" height="657" class="lazyload" title="The Arctic Fox is, arguably, the most well adapted predator for sub-arctic environments."&gt;</span></noscript></span><b data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">&nbsp;</span></b><span data-dcnode-id="1384" instrument_node="">Photo by&nbsp;</span><a data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/photos/nRhzLTFX2Dc" rel="nofollow" target="_blank"><span data-dcnode-id="1383" instrument_node="">Jonatan Pie</span></a></p><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">As Iceland’s only native mammal, this creature has been both a blessing and a curse on the local population, often pinching chickens, young lambs and even burrowing its way into human parlours. All the while, its fur and meat have provided warmth and sustenance in times of overbearing difficulty.&nbsp;</span></p><span data-dcnode-id="1377" instrument_node="">
</span><hr data-dcnode-id="1376"><ul data-dcnode-id="1369"><li data-dcnode-id="1371"><span data-dcnode-id="1375" instrument_node="">See also:&nbsp;</span><a data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/best-of-iceland/the-icelandic-horse-a-comprehensive-guide"><span data-dcnode-id="1374" instrument_node="">The Icelandic Horse | A Comprehensive Guide</span></a><span data-dcnode-id="1372" instrument_node="">&nbsp;</span></li><span data-dcnode-id="1370" instrument_node="">
</span></ul><hr data-dcnode-id="1368"><p data-dcnode-id="1356"><span data-dcnode-id="1367" instrument_node="">I talk, of course, of the Arctic Fox (</span><span data-dcnode-id="1364" style="font-size:16px;"><em data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Vulpes Lagopus</span></em></span><span data-dcnode-id="1363" instrument_node="">), a </span><a data-dcnode-id="1361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/connect-with-locals"><span data-dcnode-id="1362" instrument_node="">verified local </span></a><span data-dcnode-id="1360" instrument_node="">whose&nbsp;knowledge of&nbsp;Iceland surpasses even that of the experts&nbsp;here at&nbsp;</span><a data-dcnode-id="1358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//guidetoiceland.is/"><span data-dcnode-id="1359" instrument_node="">Guide to Iceland</span></a><span data-dcnode-id="1357" instrument_node="">. No other mammal&nbsp;has such an authentic connection to the island, nor do they possess the physical characteristics that deem them masters of their environment.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">And so, with my clumsy human fingers, I will attempt to gracefully detail the lives of these creatures, and perhaps draw out from their existence certain lessons that we can apply to our own lives living in a landscape characterised by ice and fire.&nbsp;</span></p><span data-dcnode-id="1352" instrument_node="">
</span><h2 data-dcnode-id="1345"><strong data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Biology</span></strong><span data-dcnode-id="1349" instrument_node="">&nbsp;</span><a data-dcnode-id="1348" name="1"></a><span data-dcnode-id="1347" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;</span><span class="users-anchor" data-dcnode-id="1346" id="biologyaa-a-a-a-a-a-a-a-a"></span></h2><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1336" style="font-size:10px;font-style:italic;"><span class="lazyContainer" data-dcnode-id="1340" style="display: block; padding-bottom: 66.70441676104191%"><img alt="Though Arctic Foxes are often seen sporting a white coat, they also appear in grey, brown and blue morphs." class="lazyloaded" data-dcnode-id="1343" data-src="https://guidetoiceland.imgix.net/737549/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-3.jpg?ixlib=php-3.3.0&amp;w=883" height="589" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.imgix.net/737549/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-3.jpg%3Fixlib%3Dphp-3.3.0%26w%3D883&amp;raw" title="Though Arctic Foxes are often seen sporting a white coat, they also appear in grey, brown and blue morphs." width="883"><noscript data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">&lt;img alt="Though Arctic Foxes are often seen sporting a white coat, they also appear in grey, brown and blue morphs." src="https://guidetoiceland.imgix.net/737549/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-3.jpg?ixlib=php-3.3.0&amp;amp;w=883" width="883" height="589" class="lazyload" title="Though Arctic Foxes are often seen sporting a white coat, they also appear in grey, brown and blue morphs."&gt;</span></noscript></span><span data-dcnode-id="1339" instrument_node="">Photo by&nbsp;</span><a data-dcnode-id="1337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/photos/nRhzLTFX2Dc" rel="nofollow" target="_blank"><span data-dcnode-id="1338" instrument_node="">Jonatan Pie</span></a></p><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1334" instrument_node="">The Arctic Fox—otherwise referred to as a </span><em data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">snow fox</span></em><span data-dcnode-id="1331" instrument_node="">, </span><em data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">polar fox</span></em><span data-dcnode-id="1328" instrument_node=""> or </span><em data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">white fox</span></em><span data-dcnode-id="1325" instrument_node="">—is a 3&nbsp;to 5 kg (7&nbsp;to 11 lbs) &nbsp;carnivorous mammal, notable for its thick white, blue or brown coat. The colour of the foxes' coat changes&nbsp;to reflect the passing seasons; this is particularly true of those living in Iceland, where only a third&nbsp;will sport a white winter coat. The remaining two thirds will turn brown and grey during the winter, blending in with the country's platinum-coloured hillsides.&nbsp;</span></p><span data-dcnode-id="1323" instrument_node="">
</span><hr data-dcnode-id="1322"><ul data-dcnode-id="1316"><li data-dcnode-id="1318"><span data-dcnode-id="1321" instrument_node="">See also: </span><a data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/nature-info/between-the-seasons-in-iceland"><span data-dcnode-id="1320" instrument_node="">Iceland's Seasonal Contrasts</span></a></li><span data-dcnode-id="1317" instrument_node="">
</span></ul><hr data-dcnode-id="1315"><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">This dense, furry protection provides the fox with an enormous advantage against the cold, with temperatures having to drop as low as -50°C (−94°F) before the animal begins to show visible signs of discomfort. In this sense, the Arctic Fox trumps the mighty, and far more infamous Polar Bear as the Arctic Circle's best-suited predator.&nbsp;</span></p><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1311" instrument_node="">Other adaptations see the Arctic Fox’s coat comprised of multiple fur layers (excellent for heat insulation) as well as a high percentage of body fat and a </span><a data-dcnode-id="1309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Countercurrent_exchange" rel="nofollow" target="_blank"><span data-dcnode-id="1310" instrument_node="">countercurrent heat exchange</span></a><span data-dcnode-id="1308" instrument_node=""> in the paws, helping to maintain core body temperature. The pads on these paws are also covered with a layer of fur. During the autumn months, the Arctic Fox will pack on fat reserves, often increasing its body mass by 50%.&nbsp;</span></p><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Given such evolutionary tools, the Arctic Fox is, truly, a force of nature when it comes to living in some of the most frigid and inhospitable regions on the planet. Unlike most sub-arctic animals, the Arctic Fox does not hibernate throughout the winter but instead adapts itself to the natural surroundings. One clear demonstration of this is how the fox’s coat will morph colour with the passing seasons.&nbsp; &nbsp;</span></p><span data-dcnode-id="1303" instrument_node="">
</span><hr data-dcnode-id="1302"><ul data-dcnode-id="1295"><li data-dcnode-id="1297"><span data-dcnode-id="1301" instrument_node="">Read about the fascinating world of&nbsp;</span><a data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/nature-info/wildlife-and-animals-in-iceland"><span data-dcnode-id="1300" instrument_node="">Wildlife &amp; Animals in Iceland</span></a><span data-dcnode-id="1298" instrument_node="">&nbsp;</span></li><span data-dcnode-id="1296" instrument_node="">
</span></ul><hr data-dcnode-id="1294"><p data-dcnode-id="1286" style="font-size:10px;font-style:italic;"><span class="lazyContainer" data-dcnode-id="1290" style="display: block; padding-bottom: 149.7168742921857%"><img alt="Arctic Foxes are perfectly adapted to Iceland's cold." class="lazyloaded" data-dcnode-id="1293" data-src="https://guidetoiceland.imgix.net/737550/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-4.jpg?ixlib=php-3.3.0&amp;w=883" height="1322" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.imgix.net/737550/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-4.jpg%3Fixlib%3Dphp-3.3.0%26w%3D883&amp;raw" title="Arctic Foxes are perfectly adapted to Iceland's cold." width="883"><noscript data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">&lt;img alt="Arctic Foxes are perfectly adapted to Iceland's cold." src="https://guidetoiceland.imgix.net/737550/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-4.jpg?ixlib=php-3.3.0&amp;amp;w=883" width="883" height="1322" class="lazyload" title="Arctic Foxes are perfectly adapted to Iceland's cold."&gt;</span></noscript></span><span data-dcnode-id="1289" instrument_node="">Photo by&nbsp;</span><a data-dcnode-id="1287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/photos/nRhzLTFX2Dc" rel="nofollow" target="_blank"><span data-dcnode-id="1288" instrument_node="">Jonatan Pie</span></a></p><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">As previously stated, the fox’s coat&nbsp;serves as a particularly efficient means of camouflage, harmonizing flawlessly with a landscape of pure white snow and dark, ragged rock. This serves as an excellent tool for hunting and as an effective means of not being hunted themselves.</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1277"><span data-dcnode-id="1281" instrument_node="">In Iceland, the Arctic Fox has no natural predators, save human beings; elsewhere, the creature is pursued by the likes of the polar bear, their canine cousin, the </span><em data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Red Fox</span></em><span data-dcnode-id="1278" instrument_node="">, and even Golden Eagles.&nbsp;</span></p><span data-dcnode-id="1276" instrument_node="">
</span><hr data-dcnode-id="1275"><ul data-dcnode-id="1269"><li data-dcnode-id="1271"><span data-dcnode-id="1274" instrument_node="">See also: </span><a data-dcnode-id="1272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/nature-info/things-that-can-kill-you-in-iceland"><span data-dcnode-id="1273" instrument_node="">Things That Can Kill You in Iceland&nbsp;</span></a></li><span data-dcnode-id="1270" instrument_node="">
</span></ul><hr data-dcnode-id="1268"><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Keen observers will also note the animals’ short legs, rounded snout and short, tufty ears. Together, these tools allow the Arctic Fox to detect for prey under the snow. Naturalists will often spot the Arctic Fox leaping feet into the air, curling its body and diving snout-first into this frozen blanket, providing one of the more visually stimulating hunting methods in the animal kingdom.&nbsp;</span></p><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1264" instrument_node="">One can also not overlook the creature’s large, bushy tail (or "</span><em data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">brush</span></em><span data-dcnode-id="1261" instrument_node="">"). Measuring at around 14 inches long, the fox will often wrap itself in its own tail to conserve heat. This tail is also utilised in hunting, working as a means of balance and movement, and has evolved over time to provide larger prey with a quick-moving distraction, protecting the animals’ sensitive upper body.&nbsp;</span></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1251" style="font-size:10px;font-style:italic;"><span class="lazyContainer" data-dcnode-id="1255" style="display: block; padding-bottom: 66.5911664779162%"><img alt="Arctic Foxes will often wrap their tails around their bodies in order to preserve heat." class="lazyloaded" data-dcnode-id="1258" data-src="https://guidetoiceland.imgix.net/737551/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-5.jpg?ixlib=php-3.3.0&amp;w=883" height="588" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.imgix.net/737551/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-5.jpg%3Fixlib%3Dphp-3.3.0%26w%3D883&amp;raw" title="Arctic Foxes will often wrap their tails around their bodies in order to preserve heat." width="883"><noscript data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">&lt;img alt="Arctic Foxes will often wrap their tails around their bodies in order to preserve heat." src="https://guidetoiceland.imgix.net/737551/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-5.jpg?ixlib=php-3.3.0&amp;amp;w=883" width="883" height="588" class="lazyload" title="Arctic Foxes will often wrap their tails around their bodies in order to preserve heat."&gt;</span></noscript></span><span data-dcnode-id="1254" instrument_node="">Photo by&nbsp;</span><a data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/photos/nRhzLTFX2Dc" rel="nofollow" target="_blank"><span data-dcnode-id="1253" instrument_node="">Jonatan Pie</span></a></p><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1249" instrument_node="">There are four subspecies of the Arctic Fox: the </span><em data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Iceland Arctic Fox</span></em><span data-dcnode-id="1246" instrument_node="">, the </span><em data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Greenland Arctic Fox</span></em><span data-dcnode-id="1243" instrument_node="">, the </span><em data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Pribilof Islands Arctic Fox</span></em><span data-dcnode-id="1240" instrument_node=""> and, finally, the </span><em data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Bering Islands Arctic Fox</span></em><span data-dcnode-id="1237" instrument_node="">. This range of subspecies and their respective habitats—classified as a “</span><em data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">circumpolar distribution”</span></em><span data-dcnode-id="1234" instrument_node="">—is a testament to the Arctic Fox’s&nbsp;ability to trek over incredible distances.&nbsp;</span></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Arctic Foxes are known to live between three to six&nbsp;years, a respectably long time given the trials and tribulations of life in the wild. In captivity, Arctic Foxes have been known to live to the ripe old age of fourteen.&nbsp;</span></p><span data-dcnode-id="1229" instrument_node="">
</span><h2 data-dcnode-id="1222"><strong data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Habitat &amp; Diet</span></strong><span data-dcnode-id="1226" instrument_node="">&nbsp;</span><a data-dcnode-id="1225" name="2"></a><span data-dcnode-id="1224" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;</span><span class="users-anchor" data-dcnode-id="1223" id="habitat-diet"></span></h2><span data-dcnode-id="1221" instrument_node="">
</span><p data-dcnode-id="1216"><span class="lazyContainer" data-dcnode-id="1217" style="display: block; padding-bottom: 70.32842582106456%"><img alt="Arctic Foxes can be found throughout Iceland, including in the Central Highlands. Populations tend to stick close to areas where they can hunt easy prey." class="lazyload" data-dcnode-id="1220" data-src="https://guidetoiceland.imgix.net/360111/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-6?ixlib=php-3.3.0&amp;w=883" height="621" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/eZ3PQAJLwNj1W9/OwAAAABJRU5ErkJggg==" title="Arctic Foxes can be found throughout Iceland, including in the Central Highlands. Populations tend to stick close to areas where they can hunt easy prey." width="883"><noscript data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">&lt;img alt="Arctic Foxes can be found throughout Iceland, including in the Central Highlands. Populations tend to stick close to areas where they can hunt easy prey." src="https://guidetoiceland.imgix.net/360111/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-6?ixlib=php-3.3.0&amp;amp;w=883" width="883" height="621" class="lazyload" title="Arctic Foxes can be found throughout Iceland, including in the Central Highlands. Populations tend to stick close to areas where they can hunt easy prey."&gt;</span></noscript></span></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">The Arctic Fox is Iceland’s only terrestrial mammal, meaning it is the only&nbsp;native mammal to the country.&nbsp;All the rest—the cattle, sheep, reindeer and horses—were brought deliberately to the island by early settlers (or, in the case of the deer, 18th Century traders who unsuccessfully tried to start a venison farming industry).</span></p><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Though it may appear that these animals are more authentically Icelandic, it was the fox that traipsed these lands first.&nbsp;</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1208" instrument_node="">The Arctic Fox is thought to have come to Iceland by its own means at the end of the last</span><a data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ice_age" rel="nofollow" target="_blank"><span data-dcnode-id="1207" instrument_node=""> Ice Age,</span></a><span data-dcnode-id="1205" instrument_node=""> trotting across the frozen sea from mainland Scandinavia and Greenland. This research was undertaken by the University of Durham, in the UK, and has led to a greater understanding of this small animal’s origins.&nbsp;</span></p><span data-dcnode-id="1203" instrument_node="">
</span><hr data-dcnode-id="1202"><ul data-dcnode-id="1196"><li data-dcnode-id="1198"><span data-dcnode-id="1201" instrument_node="">See also: </span><a data-dcnode-id="1199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/nature-info/birds-in-iceland"><span data-dcnode-id="1200" instrument_node="">Birds in Iceland&nbsp;</span></a></li><span data-dcnode-id="1197" instrument_node="">
</span></ul><hr data-dcnode-id="1195"><p data-dcnode-id="1187"><span data-dcnode-id="1194" instrument_node="">When it comes to population density, biologists look to where the largest number of birds are on the island. That would be the </span><a data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/travel-iceland/drive/westfjords"><span data-dcnode-id="1193" instrument_node="">Westfjords</span></a><span data-dcnode-id="1191" instrument_node="">, where towering and dramatic bird cliffs offer the resident foxes a banquet of eggs and fresh meat. </span><a data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/travel-iceland/drive/hornstrandir"><span data-dcnode-id="1190" instrument_node="">Hornstrandir</span></a><span data-dcnode-id="1188" instrument_node=""> is a particularly notable spot, given the fact that Arctic Foxes are a protected species here, free to roam and hunt without human intrusion.&nbsp;</span></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1178" style="font-size:10px;font-style:italic;"><span class="lazyContainer" data-dcnode-id="1182" style="display: block; padding-bottom: 66.70441676104191%"><img alt="Arctic Foxes are a protected species in Hornstrandir Nature Reserve." class="lazyload" data-dcnode-id="1185" data-src="https://guidetoiceland.imgix.net/737552/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-7.jpg?ixlib=php-3.3.0&amp;w=883" height="589" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/eZ3PQAJLwNj1W9/OwAAAABJRU5ErkJggg==" title="Arctic Foxes are a protected species in Hornstrandir Nature Reserve." width="883"><noscript data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">&lt;img alt="Arctic Foxes are a protected species in Hornstrandir Nature Reserve." src="https://guidetoiceland.imgix.net/737552/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-7.jpg?ixlib=php-3.3.0&amp;amp;w=883" width="883" height="589" class="lazyload" title="Arctic Foxes are a protected species in Hornstrandir Nature Reserve."&gt;</span></noscript></span><span data-dcnode-id="1181" instrument_node="">Photo by&nbsp;</span><a data-dcnode-id="1179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/photos/nRhzLTFX2Dc" rel="nofollow" target="_blank"><span data-dcnode-id="1180" instrument_node="">Jonatan Pie</span></a></p><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1176" instrument_node="">Outside of Iceland, in regions inhabited by larger predators such as wolves and polar bears, Arctic Foxes will often resort to eating </span><a data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carrion" rel="nofollow" target="_blank"><span data-dcnode-id="1175" instrument_node="">carrion</span></a><span data-dcnode-id="1173" instrument_node=""> leftover by their larger mammalian cousins. The foxes will, in fact, deliberately follow such predators, mile after mile, in hope of bagging an easy, second-hand meal. In such circumstances, an Arctic Fox might be found gnawing on seal or caribou carcasses.&nbsp;</span></p><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1170" instrument_node="">Among its other culinary preferences are lemmings, voles, seal pups, mice and flightless young birds. And though the Arctic Fox tends to inhabit and, for lack of a better word, </span><em data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">control,</span></em><span data-dcnode-id="1167" instrument_node=""> up to 9 square kilometres of territory, it will walk far, far beyond that in search of food. The Arctic Fox is very much an opportunistic feeder&nbsp;and will resort&nbsp;to chowing down on berries or even faeces in times of deprivation.&nbsp; &nbsp;</span></p><span data-dcnode-id="1165" instrument_node="">
</span><div data-dcnode-id="1160"><span class="iframe-container" data-dcnode-id="1161"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lazyload" data-dcnode-id="1164" height="403" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/VxiUSZESTXQ&amp;raw" srcdoc="<style>*{padding:0;margin:0;overflow:hidden;}html,body{height:100%;}img,span{position:absolute;width:100%;top:0;bottom:0;margin:auto;}span{height:1.5em;text-align:center;font:48px/1.5 sans-serif;color:white;text-shadow:0 0 0.5em black;}</style><a href=&quot;https://www.youtube.com/embed/VxiUSZESTXQ?autoplay=1&amp;mute=1&quot;><img src=&quot;//img.youtube.com/vi/VxiUSZESTXQ/maxresdefault.jpg&quot; loading=&quot;lazy&quot;><span>▶</span></a>" style="border: 0px; overflow: hidden;" title="The Arctic Fox | A Tale of Iceland's Only Native Mammal - video" width="966"></iframe><noscript data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">&lt;iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" height="403" src="//www.youtube.com/embed/VxiUSZESTXQ" width="966" srcdoc='&amp;lt;style&amp;gt;*{padding:0;margin:0;overflow:hidden;}html,body{height:100%;}img,span{position:absolute;width:100%;top:0;bottom:0;margin:auto;}span{height:1.5em;text-align:center;font:48px/1.5 sans-serif;color:white;text-shadow:0 0 0.5em black;}&amp;lt;/style&amp;gt;&amp;lt;a href="https://www.youtube.com/embed/VxiUSZESTXQ?autoplay=1&amp;amp;mute=1"&amp;gt;&amp;lt;img src="//img.youtube.com/vi/VxiUSZESTXQ/maxresdefault.jpg" loading="lazy"&amp;gt;&amp;lt;span&amp;gt;&amp;#9654;&amp;lt;/span&amp;gt;&amp;lt;/a&amp;gt;' title="The Arctic Fox | A Tale of Iceland's Only Native Mammal - video" style="border: 0px; overflow: hidden;" class="lazyload"&gt;&lt;/iframe&gt;</span></noscript></span></div><span data-dcnode-id="1159" instrument_node="">
</span><div data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">This willingness&nbsp;and physical ability to traverse great distances is&nbsp;just one of the fascinating qualities that this creature possesses. In 2008, an Arctic Fox from Bylot Island, in northern Canada, racked up an astounding 5000 kilometres in only one year, astounding scientists.</span></div><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Given such recent breakthroughs in understanding the foxes' relationship to habitat and food, there is still much to be uncovered about the lives of these small animals.&nbsp;&nbsp;</span></p><span data-dcnode-id="1153" instrument_node="">
</span><h2 data-dcnode-id="1147"><strong data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Reproduction &amp; Behaviour</span></strong><a data-dcnode-id="1150" name="3"></a><span data-dcnode-id="1149" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;</span><span class="users-anchor" data-dcnode-id="1148" id="reproduction-behaviour"></span></h2><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1145" instrument_node="">Arctic Foxes are monogamous animals, meaning that they have one mating partner for life. </span><a data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seasonal_breeder%23Breeding_season" rel="nofollow" target="_blank"><span data-dcnode-id="1144" instrument_node="">Mating season</span></a><span data-dcnode-id="1142" instrument_node=""> takes place each year from April to July; the first litter will be born April/June, whilst the second is born July/August. These litters are known as </span><em data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">kits</span></em><span data-dcnode-id="1139" instrument_node="">, and will often bear 5-12 </span><em data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">whelps</span></em><span data-dcnode-id="1136" instrument_node=""> (Arctic Fox puppies), depending on food scarcity. In the past, up to 25 offspring have been recorded in a single litter.</span></p><span data-dcnode-id="1134" instrument_node="">
</span><div data-dcnode-id="1129"><span class="iframe-container" data-dcnode-id="1130"><iframe class="lazyload" data-dcnode-id="1133" height="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/4mEbpxQj1H0&amp;raw" srcdoc="<style>*{padding:0;margin:0;overflow:hidden;}html,body{height:100%;}img,span{position:absolute;width:100%;top:0;bottom:0;margin:auto;}span{height:1.5em;text-align:center;font:48px/1.5 sans-serif;color:white;text-shadow:0 0 0.5em black;}</style><a href=&quot;https://www.youtube.com/embed/4mEbpxQj1H0?autoplay=1&amp;mute=1&quot;><img src=&quot;//i.ytimg.com/vi/4mEbpxQj1H0/hqdefault.jpg&quot; loading=&quot;lazy&quot;><span>▶</span></a>" style="border: 0px; overflow: hidden;" title="The Arctic Fox | A Tale of Iceland's Only Native Mammal - video" width="560"></iframe><noscript data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">&lt;iframe height="315" src="//www.youtube.com/embed/4mEbpxQj1H0" width="560" srcdoc='&amp;lt;style&amp;gt;*{padding:0;margin:0;overflow:hidden;}html,body{height:100%;}img,span{position:absolute;width:100%;top:0;bottom:0;margin:auto;}span{height:1.5em;text-align:center;font:48px/1.5 sans-serif;color:white;text-shadow:0 0 0.5em black;}&amp;lt;/style&amp;gt;&amp;lt;a href="https://www.youtube.com/embed/4mEbpxQj1H0?autoplay=1&amp;amp;mute=1"&amp;gt;&amp;lt;img src="//i.ytimg.com/vi/4mEbpxQj1H0/hqdefault.jpg" loading="lazy"&amp;gt;&amp;lt;span&amp;gt;&amp;#9654;&amp;lt;/span&amp;gt;&amp;lt;/a&amp;gt;' title="The Arctic Fox | A Tale of Iceland's Only Native Mammal - video" style="border: 0px; overflow: hidden;" class="lazyload"&gt;&lt;/iframe&gt;</span></noscript></span></div><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1122"><br data-dcnode-id="1127"><span data-dcnode-id="1126" instrument_node="">
Whelps are raised in intricate </span><a data-dcnode-id="1124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Burrow" rel="nofollow" target="_blank"><span data-dcnode-id="1125" instrument_node="">underground dens</span></a><span data-dcnode-id="1123" instrument_node="">, the oldest of which can have a hundred different openings. Despite the fact these dens are left uninhabited throughout the majority of the year, it is in this labyrinthine, subterranean world where the Arctic Fox young will first experience the challenges of daily life. These dens are often hundreds of years old are used by numerous generations of Arctic Fox.&nbsp;</span></p><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Still, successfully raising a full litter is a rare occurrence, and in times of food shortage, the weaker siblings are often consumed or abandoned in order to ensure the strongest pups survive. This rather ratchety parenting has nothing, I’m sure, to do with the fact that it is the male Arctic Fox who, in large part, rears the children.&nbsp;</span></p><span data-dcnode-id="1118" instrument_node="">
</span><hr data-dcnode-id="1117"><ul data-dcnode-id="1111"><li data-dcnode-id="1113"><span data-dcnode-id="1116" instrument_node="">See also: </span><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/reykjavik-guide/what-to-do-with-younger-kids-in-the-reykjavik-area"><span data-dcnode-id="1115" instrument_node="">What To Do With Younger Kids in the Reykjavik Area</span></a></li><span data-dcnode-id="1112" instrument_node="">
</span></ul><hr data-dcnode-id="1110"><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Each den will be inhabited by the male, the young and two vixens. Amazingly, one vixen is non-breeding but stays to help raise and wean the litter. Each fox burrow will resemble a familial set-up such as this and&nbsp;are often built a good distance apart from one another in order to avoid competition. These distinct and domestic homes often have a physical separation of two&nbsp;kilometres.&nbsp;</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1099" style="font-size:10px;font-style:italic;"><span class="lazyContainer" data-dcnode-id="1103" style="display: block; padding-bottom: 66.36466591166477%"><img alt="Young Arctic Foxes wear black coats, changing in colour as they reach sexual maturity." class="lazyload" data-dcnode-id="1106" data-src="https://guidetoiceland.imgix.net/737553/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-8.jpg?ixlib=php-3.3.0&amp;w=883" height="586" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/eZ3PQAJLwNj1W9/OwAAAABJRU5ErkJggg==" title="Young Arctic Foxes wear black coats, changing in colour as they reach sexual maturity." width="883"><noscript data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">&lt;img alt="Young Arctic Foxes wear black coats, changing in colour as they reach sexual maturity." src="https://guidetoiceland.imgix.net/737553/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-8.jpg?ixlib=php-3.3.0&amp;amp;w=883" width="883" height="586" class="lazyload" title="Young Arctic Foxes wear black coats, changing in colour as they reach sexual maturity."&gt;</span></noscript></span><span data-dcnode-id="1102" instrument_node="">Photo by&nbsp;</span><a data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/photos/nRhzLTFX2Dc" rel="nofollow" target="_blank"><span data-dcnode-id="1101" instrument_node="">Jonatan Pie</span></a></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Weaning the young is concluded after two to four&nbsp;weeks, after which the whelps emerge from the den. Nine months on, they will have reached sexual maturity, and thus adulthood; by next year’s mating season, the surviving offspring will already be nomadic and hunting. In the intermittent period, the proud parents will have also left one another’s company, only to soon return and start the process over. &nbsp; &nbsp;</span></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1094" instrument_node="">The Arctic Fox is considered a shy creature, spending the majority of the year hunting solitarily at night. With that being said, there have been numerous occasions caught on photograph and video that show the creature’s natural curiosity and intelligence, often trotting right up to photographers and campers. They have even been observed forming small hunting packs to better scour the countryside for food. A group of Arctic Fox is known as a "</span><em data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">skulk</span></em><span data-dcnode-id="1091" instrument_node="">" or "</span><em data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">leash</span></em><span data-dcnode-id="1088" instrument_node="">".&nbsp;</span></p><span data-dcnode-id="1086" instrument_node="">
</span><h2 data-dcnode-id="1079"><strong data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Threats</span></strong><span data-dcnode-id="1083" instrument_node="">&nbsp;</span><a data-dcnode-id="1082" name="4"></a><span data-dcnode-id="1081" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&nbsp;</span><span class="users-anchor" data-dcnode-id="1080" id="threats"></span></h2><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1070" style="font-size:10px;font-style:italic;"><span class="lazyContainer" data-dcnode-id="1074" style="display: block; padding-bottom: 66.5911664779162%"><img alt="Foxes in Iceland are threatened by several factors, mainly humans." class="lazyload" data-dcnode-id="1077" data-src="https://guidetoiceland.imgix.net/737554/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-9.jpg?ixlib=php-3.3.0&amp;w=883" height="588" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/eZ3PQAJLwNj1W9/OwAAAABJRU5ErkJggg==" title="Foxes in Iceland are threatened by several factors, mainly humans." width="883"><noscript data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">&lt;img alt="Foxes in Iceland are threatened by several factors, mainly humans." src="https://guidetoiceland.imgix.net/737554/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-9.jpg?ixlib=php-3.3.0&amp;amp;w=883" width="883" height="588" class="lazyload" title="Foxes in Iceland are threatened by several factors, mainly humans."&gt;</span></noscript></span><span data-dcnode-id="1073" instrument_node="">Photo by </span><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/photos/Ger8FyuOf5c" rel="nofollow" target="_blank"><span data-dcnode-id="1072" instrument_node="">Fabiana Rizzi</span></a></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">The monitoring of Arctic Fox populations in Iceland began in 1979. Until 2010, the species’ population was rising steadily, from around 2000 foxes at the beginning of the survey to approximately 10,000. From 2010, however, biologists began to notice a sudden and steady 32% drop off in numbers.&nbsp;</span></p><span data-dcnode-id="1066" instrument_node="">
</span><hr data-dcnode-id="1065"><ul data-dcnode-id="1059"><li data-dcnode-id="1061"><span data-dcnode-id="1064" instrument_node="">See also:</span><a data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/history-culture/a-darker-shade-of-green-icelands-troubled-environment"><span data-dcnode-id="1063" instrument_node=""> Iceland's Troubled Environment&nbsp;</span></a></li><span data-dcnode-id="1060" instrument_node="">
</span></ul><hr data-dcnode-id="1058"><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">What’s particularly unusual is how this diminishing population doesn’t fit the natural trend; animal populations will often rise and fall every few years or so, depending on the habitat and food scarcity.&nbsp;</span></p><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1053" dir="ltr"><span data-dcnode-id="1054" instrument_node="">That’s not to suggest population numbers have yet reached a critical level; Arctic Foxes are classified as of “Least Concern” by wildlife conservation agencies, meaning there is no threat of imminent extinction.</span></p><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1041" dir="ltr"><span data-dcnode-id="1051" instrument_node="">Still, species move up and down the&nbsp;spectrum as their dietary habits and habitats deteriorate under human influence. Over the last ten years, mankind saw the last of </span><em data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">West African Black Rhinoceros</span></em><span data-dcnode-id="1048" instrument_node="">, the </span><em data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Pyrenean Ibex</span></em><span data-dcnode-id="1045" instrument_node=""> and the</span><em data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node=""> Yangtze River </span></em><span data-dcnode-id="1042" instrument_node="">dolphin, among&nbsp;others. Despite our efforts, it seems mankind is still unable to provide an all-encompassing protection for wild animal species, wherever they sit on the conservation spectrum.&nbsp;</span></p><span data-dcnode-id="1040" instrument_node="">
</span><hr data-dcnode-id="1039"><ul data-dcnode-id="1033"><li data-dcnode-id="1035"><span data-dcnode-id="1038" instrument_node="">See also: </span><a data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/history-culture/sustainable-tourism-in-iceland"><span data-dcnode-id="1037" instrument_node="">Sustainable Tourism in Iceland&nbsp;</span></a></li><span data-dcnode-id="1034" instrument_node="">
</span></ul><hr data-dcnode-id="1032"><p data-dcnode-id="1026" style="font-size:10px;font-style:italic;"><span data-dcnode-id="1031" instrument_node="">&nbsp;</span><span class="lazyContainer" data-dcnode-id="1027" style="display: block; padding-bottom: 66.70441676104191%"><img alt="Arctic foxes are sadly still hunted for sport." class="lazyload" data-dcnode-id="1030" data-src="https://guidetoiceland.imgix.net/737555/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-10.jpg?ixlib=php-3.3.0&amp;w=883" height="589" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/eZ3PQAJLwNj1W9/OwAAAABJRU5ErkJggg==" title="Arctic foxes are sadly still hunted for sport." width="883"><noscript data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">&lt;img alt="Arctic foxes are sadly still hunted for sport." src="https://guidetoiceland.imgix.net/737555/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-10.jpg?ixlib=php-3.3.0&amp;amp;w=883" width="883" height="589" class="lazyload" title="Arctic foxes are sadly still hunted for sport."&gt;</span></noscript></span></p><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1021" style="font-size:10px;font-style:italic;"><span data-dcnode-id="1024" instrument_node="">Photo by&nbsp;</span><a data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/photos/nRhzLTFX2Dc" rel="nofollow" target="_blank"><span data-dcnode-id="1023" instrument_node="">Jonatan Pie</span></a></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018" dir="ltr"><span data-dcnode-id="1019" instrument_node="">Hunting Arctic Fox still takes place in Iceland each year, with it&nbsp;now even being run as a multi-day tour. Why anyone in their right mind might decide to go hunting these animals for fun is far beyond me, but it does strengthen the correlation, even in Iceland, that nature and wildlife is something that we humans love to commodify.</span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015" dir="ltr"><span data-dcnode-id="1016" instrument_node="">By those who partake in blood sports, hunting Arctic Fox in Iceland is justified as a necessary action, utilised to protect cattle and Eider duck populations. This, of course, does not stand up for tourists visiting the island.&nbsp;</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1012" dir="ltr"><span data-dcnode-id="1013" instrument_node="">Whereas historically, foxes were hunted for their prized fur, a recent influx of Mink fur farms across the country have made it a valueless commodity. Still, den hunting does take place, an activity where every animal in the den, young or old, is slaughtered.&nbsp;</span></p><span data-dcnode-id="1011" instrument_node="">
</span><h2 data-dcnode-id="1004"><strong data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">The Arctic Fox Centre</span></strong><span data-dcnode-id="1008" instrument_node="">&nbsp;</span><a data-dcnode-id="1007" name="5"></a><span data-dcnode-id="1006" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&nbsp;</span><span class="users-anchor" data-dcnode-id="1005" id="the-arctic-fox-centreaa-a-a-a-a-a-a-a-a-aa"></span></h2><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="995" style="font-size:10px;font-style:italic;"><span class="lazyContainer" data-dcnode-id="999" style="display: block; padding-bottom: 56.17214043035108%"><img alt="The Arctic Fox Centre in the Westfjords." class="lazyload" data-dcnode-id="1002" data-src="https://guidetoiceland.imgix.net/737556/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-11.jpg?ixlib=php-3.3.0&amp;w=883" height="496" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/eZ3PQAJLwNj1W9/OwAAAABJRU5ErkJggg==" title="The Arctic Fox Centre in the Westfjords." width="883"><noscript data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">&lt;img alt="The Arctic Fox Centre in the Westfjords." src="https://guidetoiceland.imgix.net/737556/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-11.jpg?ixlib=php-3.3.0&amp;amp;w=883" width="883" height="496" class="lazyload" title="The Arctic Fox Centre in the Westfjords."&gt;</span></noscript></span><span data-dcnode-id="998" instrument_node="">Photo by </span><a data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AThe_Arctic_Fox_Center-Building-02.jpg" rel="nofollow" target="_blank"><span data-dcnode-id="997" instrument_node="">MoZie, from Wiki Creative Commons. No edits made.</span></a></p><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="987"><a data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.melrakki.is/about_us/" rel="nofollow" target="_blank"><span data-dcnode-id="993" instrument_node="">The Arctic Fox Centre</span></a><span data-dcnode-id="991" instrument_node=""> is a non-profit organisation founded September 15th, 2007 in the fishing village of&nbsp;</span><a data-dcnode-id="989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/travel-iceland/drive/sudavik"><span data-dcnode-id="990" instrument_node="">Súðavík</span></a><span data-dcnode-id="988" instrument_node="">&nbsp;in Iceland's Westfjords. The centre serves as both a research institute and a natural history exhibition, promoting academic fieldwork and sustainable eco-tourism practices.&nbsp; Working alongside scientists, travel experts, artists and media specialists, the Arctic Fox Centre is the only institution in the world wholly dedicated to the preservation and protection of Iceland's first land mammal.&nbsp;</span></p><span data-dcnode-id="986" instrument_node="">
</span><hr data-dcnode-id="985"><ul data-dcnode-id="979"><li data-dcnode-id="981"><span data-dcnode-id="984" instrument_node="">See also: </span><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/travel-info/the-wild-westfjords-of-iceland"><span data-dcnode-id="983" instrument_node="">The Westfjords of Iceland&nbsp;</span></a></li><span data-dcnode-id="980" instrument_node="">
</span></ul><hr data-dcnode-id="978"><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">The Arctic Fox Centre boasts large display boards comprised of fascinating&nbsp;scientific information and photographs, and taxidermy foxes that present an opportunity to really get to the grips with the physical dimensions and characteristics of the species.</span></p><span data-dcnode-id="975" instrument_node="">
</span><div data-dcnode-id="970"><span class="iframe-container" data-dcnode-id="971"><iframe class="lazyload" data-dcnode-id="974" height="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/y1ZZnQpvC5M&amp;raw" srcdoc="<style>*{padding:0;margin:0;overflow:hidden;}html,body{height:100%;}img,span{position:absolute;width:100%;top:0;bottom:0;margin:auto;}span{height:1.5em;text-align:center;font:48px/1.5 sans-serif;color:white;text-shadow:0 0 0.5em black;}</style><a href=&quot;https://www.youtube.com/embed/y1ZZnQpvC5M?autoplay=1&amp;mute=1&quot;><img src=&quot;//img.youtube.com/vi/y1ZZnQpvC5M/maxresdefault.jpg&quot; loading=&quot;lazy&quot;><span>▶</span></a>" style="border: 0px; overflow: hidden;" title="The Arctic Fox | A Tale of Iceland's Only Native Mammal - video" width="560"></iframe><noscript data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">&lt;iframe height="315" src="//www.youtube.com/embed/y1ZZnQpvC5M" width="560" srcdoc='&amp;lt;style&amp;gt;*{padding:0;margin:0;overflow:hidden;}html,body{height:100%;}img,span{position:absolute;width:100%;top:0;bottom:0;margin:auto;}span{height:1.5em;text-align:center;font:48px/1.5 sans-serif;color:white;text-shadow:0 0 0.5em black;}&amp;lt;/style&amp;gt;&amp;lt;a href="https://www.youtube.com/embed/y1ZZnQpvC5M?autoplay=1&amp;amp;mute=1"&amp;gt;&amp;lt;img src="//img.youtube.com/vi/y1ZZnQpvC5M/maxresdefault.jpg" loading="lazy"&amp;gt;&amp;lt;span&amp;gt;&amp;#9654;&amp;lt;/span&amp;gt;&amp;lt;/a&amp;gt;' title="The Arctic Fox | A Tale of Iceland's Only Native Mammal - video" style="border: 0px; overflow: hidden;" class="lazyload"&gt;&lt;/iframe&gt;</span></noscript></span></div><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="966" dir="ltr"><br data-dcnode-id="968"><span data-dcnode-id="967" instrument_node="">
Visitors to the centre can see two live Arctic Foxes, Ingi and Móri, who were rescued as pups after their parents were killed in a legal fox hunt in 2015. Both blue morphs, these creatures have become the ambassadors of the Arctic Fox here in Iceland, introducing thousands of people every year to the species’ many beautiful traits.&nbsp;</span></p><span data-dcnode-id="965" instrument_node="">
</span><hr data-dcnode-id="964"><ul data-dcnode-id="957" dir="ltr"><li data-dcnode-id="959"><span data-dcnode-id="963" instrument_node="">See&nbsp;also: </span><a data-dcnode-id="961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/best-of-iceland/most-unique-experiences-in-iceland"><span data-dcnode-id="962" instrument_node="">The Most Unique Experiences in Iceland</span></a><span data-dcnode-id="960" instrument_node="">&nbsp;</span></li><span data-dcnode-id="958" instrument_node="">
</span></ul><hr data-dcnode-id="956"><p data-dcnode-id="954" dir="ltr"><span data-dcnode-id="955" instrument_node="">Raised and nurtured by humans, these two foxes are notoriously curious and friendly, coming right up to the wires of their enclosure to take a closer look at those who have travelled so far to see them. For those who lack the patience for tracking foxes in the wild, or are otherwise constrained by time, meeting&nbsp;Ingi and Móri is the surest way of seeing an Arctic Fox up close.&nbsp;</span></p><span data-dcnode-id="953" instrument_node="">
</span><h2 data-dcnode-id="946"><strong data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">How to Spot an Arctic Fox</span></strong><span data-dcnode-id="950" instrument_node="">&nbsp;</span><a data-dcnode-id="949" name="6"></a><span data-dcnode-id="948" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;</span><span class="users-anchor" data-dcnode-id="947" id="how-to-spot-an-arctic-fox"></span></h2><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="937" style="font-size:10px;font-style:italic;"><span class="lazyContainer" data-dcnode-id="941" style="display: block; padding-bottom: 66.47791619479048%"><img alt="Spotting an Arctic Fox in the wild requires patience and perseverance. That's not to say it's impossible though!" class="lazyload" data-dcnode-id="944" data-src="https://guidetoiceland.imgix.net/737557/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-12.jpg?ixlib=php-3.3.0&amp;w=883" height="587" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/eZ3PQAJLwNj1W9/OwAAAABJRU5ErkJggg==" title="Spotting an Arctic Fox in the wild requires patience and perseverance. That's not to say it's impossible though!" width="883"><noscript data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">&lt;img alt="Spotting an Arctic Fox in the wild requires patience and perseverance. That's not to say it's impossible though!" src="https://guidetoiceland.imgix.net/737557/x/0/the-arctic-fox-a-tale-of-iceland-s-only-native-mammal-12.jpg?ixlib=php-3.3.0&amp;amp;w=883" width="883" height="587" class="lazyload" title="Spotting an Arctic Fox in the wild requires patience and perseverance. That's not to say it's impossible though!"&gt;</span></noscript></span><span data-dcnode-id="940" instrument_node="">Photo by&nbsp;</span><a data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/photos/nRhzLTFX2Dc" rel="nofollow" target="_blank"><span data-dcnode-id="939" instrument_node="">Jonatan Pie</span></a></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Unless you happen to be incredibly lucky, spotting an Arctic Fox in the wild will require patience, preparation and a willingness to spend hours exposed to the natural elements. Some insider knowledge is also key; where are the foxes this time of year? Are there any known observation points? How close can one expect to get?</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">With such questions in mind, the next step is to decide whether you're going to participate in an organised wildlife spotting tour or to try your hand at tracking the creature down yourself. Without a measure of a doubt, the recommended method is the former, as it puts the experienced operators at the helm of the operation. By partaking in a group with a tour guide, you are also far more likely to learn about the behaviour, habitats and diet of the Arctic Fox.&nbsp;</span></p><span data-dcnode-id="930" instrument_node="">
</span><hr data-dcnode-id="929"><ul data-dcnode-id="923"><li data-dcnode-id="925"><span data-dcnode-id="928" instrument_node="">See also:</span><a data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/best-of-iceland/silent-iceland-the-best-spots-for-peace-and-quiet"><span data-dcnode-id="927" instrument_node=""> The 7 Best Spots for Peace, Quiet and Silence in Iceland&nbsp;</span></a></li><span data-dcnode-id="924" instrument_node="">
</span></ul><hr data-dcnode-id="922"><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">The Arctic Fox Centre is one such institution that runs these tours, as well as specifically tailored excursions for filmmakers and photographers. In their hands, the centre will organise boat trips to and from Hornstrandir Nature Reserve, as well as settle any accommodation, dietary requirements and the logistics of the shoot itself.</span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="918" instrument_node="">It should be noted that organised </span><a data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/book-holiday-trips/paddle-in-the-wild-of-hornstrandir"><span data-dcnode-id="917" instrument_node="">trips to Hornstrandir</span></a><span data-dcnode-id="915" instrument_node=""> occur only in May, June,&nbsp;July and occasionally August; for "winter shoots", where the white fur is crucial, further planning will have to be made in advance.&nbsp;</span></p><span data-dcnode-id="913" instrument_node="">
</span><div data-dcnode-id="908"><span class="iframe-container" data-dcnode-id="909"><iframe class="lazyload" data-dcnode-id="912" height="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/_uz0Yt-S5yk&amp;raw" srcdoc="<style>*{padding:0;margin:0;overflow:hidden;}html,body{height:100%;}img,span{position:absolute;width:100%;top:0;bottom:0;margin:auto;}span{height:1.5em;text-align:center;font:48px/1.5 sans-serif;color:white;text-shadow:0 0 0.5em black;}</style><a href=&quot;https://www.youtube.com/embed/_uz0Yt-S5yk?autoplay=1&amp;mute=1&quot;><img src=&quot;//img.youtube.com/vi/_uz0Yt-S5yk/maxresdefault.jpg&quot; loading=&quot;lazy&quot;><span>▶</span></a>" style="border: 0px; overflow: hidden;" title="The Arctic Fox | A Tale of Iceland's Only Native Mammal - video" width="560"></iframe><noscript data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">&lt;iframe height="315" src="//www.youtube.com/embed/_uz0Yt-S5yk" width="560" srcdoc='&amp;lt;style&amp;gt;*{padding:0;margin:0;overflow:hidden;}html,body{height:100%;}img,span{position:absolute;width:100%;top:0;bottom:0;margin:auto;}span{height:1.5em;text-align:center;font:48px/1.5 sans-serif;color:white;text-shadow:0 0 0.5em black;}&amp;lt;/style&amp;gt;&amp;lt;a href="https://www.youtube.com/embed/_uz0Yt-S5yk?autoplay=1&amp;amp;mute=1"&amp;gt;&amp;lt;img src="//img.youtube.com/vi/_uz0Yt-S5yk/maxresdefault.jpg" loading="lazy"&amp;gt;&amp;lt;span&amp;gt;&amp;#9654;&amp;lt;/span&amp;gt;&amp;lt;/a&amp;gt;' title="The Arctic Fox | A Tale of Iceland's Only Native Mammal - video" style="border: 0px; overflow: hidden;" class="lazyload"&gt;&lt;/iframe&gt;</span></noscript></span></div><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="904"><br data-dcnode-id="906"><span data-dcnode-id="905" instrument_node="">
But, it is undoubtedly Hornstrandir where guest&nbsp;have the&nbsp;biggest chance of catching sight of this elusive mammal.&nbsp;In fact, the Arctic Foxes that inhabit the area have become surprisingly tame given their regular encounters with humans. In some cases, they may even run up to eat food from a visitor's outstretched palm.&nbsp;</span></p><span data-dcnode-id="903" instrument_node="">
</span><hr data-dcnode-id="902"><ul data-dcnode-id="896"><li data-dcnode-id="898"><span data-dcnode-id="901" instrument_node="">See also:</span><a data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//guidetoiceland.is/best-of-iceland/travel-etiquette-in-iceland"><span data-dcnode-id="900" instrument_node=""> Travel Etiquette in Iceland&nbsp;</span></a></li><span data-dcnode-id="897" instrument_node="">
</span></ul><hr data-dcnode-id="895"><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">This shouldn't be encouraged, don't get me wrong—it motivates the foxes to rely on people for survival—but, if it's happening to you, there's not a lot that can be done to deter it. Curiosity is, after all, a part of the mammalian complex. Simply show respect, keep calm, and allow the fox to continue on its day.&nbsp;&nbsp;</span></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">For those who are hoping to see an Arctic Fox for themselves, it is imperative that the environment should be left as natural and untouched as possible. Littering, or leaving excess equipment, is an omnipresent danger for animals worldwide; best to be elusive, like the fox, leaving no trace but footprints in the snow.&nbsp;</span></p><span data-dcnode-id="889" instrument_node="">
