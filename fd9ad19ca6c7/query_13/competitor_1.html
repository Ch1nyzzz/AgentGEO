</span><h1 data-dcnode-id="4127"><span data-dcnode-id="4128" instrument_node="">State Laws for Keeping Exotic Cats as Pets</span></h1><span data-dcnode-id="4126" instrument_node="">
</span><p data-dcnode-id="4123"><a data-dcnode-id="4124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bigcatalliance.org/" rel="noopener" target="_blank"><img alt="State Laws for Big Cat Ownership" class="alignnone size-large wp-image-156522" data-dcnode-id="4125" data-pin-no-hover="true" height="658" sizes="(max-width: 1053px) 100vw, 1053px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rz6nm7fejf-flywheel.netdna-ssl.com/wp-content/uploads/2019/12/State-Laws-for-Big-Cat-Ownership-1053x658.png&amp;raw" srcset="https://rz6nm7fejf-flywheel.netdna-ssl.com/wp-content/uploads/2019/12/State-Laws-for-Big-Cat-Ownership-1053x658.png 1053w, https://rz6nm7fejf-flywheel.netdna-ssl.com/wp-content/uploads/2019/12/State-Laws-for-Big-Cat-Ownership-670x419.png 670w, https://rz6nm7fejf-flywheel.netdna-ssl.com/wp-content/uploads/2019/12/State-Laws-for-Big-Cat-Ownership-1536x960.png 1536w, https://rz6nm7fejf-flywheel.netdna-ssl.com/wp-content/uploads/2019/12/State-Laws-for-Big-Cat-Ownership-2048x1280.png 2048w, https://rz6nm7fejf-flywheel.netdna-ssl.com/wp-content/uploads/2019/12/State-Laws-for-Big-Cat-Ownership-750x469.png 750w, https://rz6nm7fejf-flywheel.netdna-ssl.com/wp-content/uploads/2019/12/State-Laws-for-Big-Cat-Ownership-1140x713.png 1140w, https://rz6nm7fejf-flywheel.netdna-ssl.com/wp-content/uploads/2019/12/State-Laws-for-Big-Cat-Ownership.png 1080w" width="1053"></a></p><span data-dcnode-id="4122" instrument_node="">
</span><ul data-dcnode-id="4088"><span data-dcnode-id="4121" instrument_node="">
</span><li data-dcnode-id="4114"><strong data-dcnode-id="4119"><span data-dcnode-id="4120" instrument_node="">4 states</span></strong><span data-dcnode-id="4118" instrument_node=""> have no laws on </span><span data-dcnode-id="4116" style="text-decoration: underline;"><span data-dcnode-id="4117" instrument_node="">keeping dangerous wild animals as pets</span></span><span data-dcnode-id="4115" instrument_node="">: Alabama, Nevada, North Carolina, and Wisconsin.</span></li><span data-dcnode-id="4113" instrument_node="">
</span><li data-dcnode-id="4106"><strong data-dcnode-id="4111"><span data-dcnode-id="4112" instrument_node="">6 states</span></strong><span data-dcnode-id="4110" instrument_node=""> do not ban or regulate </span><span data-dcnode-id="4108" style="text-decoration: underline;"><span data-dcnode-id="4109" instrument_node="">keeping big cats as pets</span></span><span data-dcnode-id="4107" instrument_node="">:&nbsp;Alabama, Nevada, North Carolina, Wisconsin, Delaware, and Oklahoma.</span></li><span data-dcnode-id="4105" instrument_node="">
</span><li data-dcnode-id="4098"><strong data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">21</span></strong><span data-dcnode-id="4102" instrument_node="">&nbsp;states ban </span><span data-dcnode-id="4100" style="text-decoration: underline;"><span data-dcnode-id="4101" instrument_node="">all dangerous exotic pets</span></span><span data-dcnode-id="4099" instrument_node="">, while the rest allow certain species or require permits.</span></li><span data-dcnode-id="4097" instrument_node="">

</span><p data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">B* = Partial ban on private ownership of exotic animals — allows&nbsp;ownership of some exotic animals but precludes ownership of the animals listed</span></p><span data-dcnode-id="3330" instrument_node="">
</span><p data-dcnode-id="3328"><span data-dcnode-id="3329" instrument_node="">L = Requires the “owner” of the exotic animal to obtain a license&nbsp;or permit or to register the animal with state or local authorities to privately&nbsp;possess the animal (excludes states only requiring import permits)</span></p><span data-dcnode-id="3327" instrument_node="">
</span><p data-dcnode-id="3325"><span data-dcnode-id="3326" instrument_node="">N = The state does not require the “owner” to obtain a license&nbsp;or permit to possess the animal within the state, but may regulate some aspect&nbsp;thereof (i.e. entry permit, veterinary certificate, etc.)</span></p><span data-dcnode-id="3324" instrument_node="">
</span><p data-dcnode-id="3320"><span data-dcnode-id="3323" instrument_node="">To see a list of states that have passed exotic cat bans since&nbsp;2005 click </span><a data-dcnode-id="3321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bigcatrescue.org/2011/big-cat-bans-enacted/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3322" instrument_node="">HERE</span></a></p><span data-dcnode-id="3319" instrument_node="">
</span><p data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">The steady increase in legislation banning private ownership represents recognition by our society that private ownership leads to massive abuse. Social values evolve. It took decades to ban slavery in England and for women to win the right to vote in America. Those ideas started out as “radical”, held by a small minority. Gradually more and more people understood and agreed until they became a part of our value system that we take for granted today. The same trend is happening with private ownership of exotics. Gradually more and more people are realizing that this simply leads to widespread abuse of these animals. The best evidence of this is the accelerating trend in state laws. Just since 2005 eight more states have passed some level of a ban.</span></p><span data-dcnode-id="3316" instrument_node="">
</span><h2 class="twoColFixLtHdr" data-dcnode-id="3314"><span data-dcnode-id="3315" instrument_node="">Two Things to Know About Petting a Cub</span></h2><span data-dcnode-id="3313" instrument_node="">
</span><p data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">There are some lion and tiger cub exploiters still making the rounds at fairs, flea markets, parking lots and malls who are charging the public $10 – $25 to pet a baby lion cub or to play with a tiger cub.</span></p><span data-dcnode-id="3310" instrument_node="">
</span><p data-dcnode-id="3308"><span data-dcnode-id="3309" instrument_node="">USDA regulations should override state regulations on this matter, but in Florida, the FL Fish &amp; Wildlife Conservation Commission has set its own standard that may differ a bit, but not much from USDA’s ruling.</span></p><span data-dcnode-id="3307" instrument_node="">
</span><p data-dcnode-id="3303"><strong data-dcnode-id="3305"><span data-dcnode-id="3306" instrument_node="">Florida law only allows contact up to 25 lbs for exotic cats. </span></strong><span data-dcnode-id="3304" instrument_node="">Florida law does not protect cubs under that weight limit, despite age.</span></p><span data-dcnode-id="3302" instrument_node="">
</span><p data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">(a) Public contact and exhibition.</span></p><span data-dcnode-id="3299" instrument_node="">
</span><p data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">1. General: All Class I, II or III wildlife that will be used for contact with the public shall have been evaluated by the exhibitor to ensure compatibility with the uses intended. All wildlife shall be exhibited in a manner that prevents injuries to the public and wildlife. The exhibitor shall take reasonable sanitary precautions to minimize the possibility of disease or parasite transmission which could adversely affect the health or welfare of citizens or wildlife. When any conditions exist that result in a threat to human safety, or the welfare of the wildlife, the animal(s) shall, at the direction of a Commission officer, be immediately removed from public contact for an interval necessary to correct the unsafe or deficient condition.</span></p><span data-dcnode-id="3296" instrument_node="">
</span><p data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">2. Class I wildlife shall only be permitted to come into physical contact with the public in accordance with the following:</span></p><span data-dcnode-id="3293" instrument_node="">
</span><p data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">a. Full contact: For the purpose of this section, full contact is defined as situations in which an exhibitor or employee handler maintains proximate control and supervision, while temporarily</span></p><span data-dcnode-id="3290" instrument_node="">
</span><p data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">surrendering physical possession or custody of the animal to another.</span></p><span data-dcnode-id="3287" instrument_node="">
</span><p data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">Full contact with Class I wildlife is authorized only as follows:</span></p><span data-dcnode-id="3284" instrument_node="">
</span><p data-dcnode-id="3279"><span data-dcnode-id="3283" instrument_node="">I. </span><strong data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">Class I cats (Felidae only) that weigh not more than twenty-five (25) pounds</span></strong><span data-dcnode-id="3280" instrument_node="">;</span></p><span data-dcnode-id="3278" instrument_node="">
</span><p data-dcnode-id="3275"><a data-dcnode-id="3276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flrules.org/gateway/readFile.asp%3Fsid%3D0%26tid%3D7515480%26type%3D1%26File%3D68A-6.0023.doc" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3277" instrument_node="">https://www.flrules.org/gateway/readFile.asp?sid=0&amp;tid=7515480&amp;type=1&amp;File=68A-6.0023.doc</span></a></p><span data-dcnode-id="3274" instrument_node="">
</span><p data-dcnode-id="3271"><strong data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">Further, the US Fish &amp; Wildlife Service defines a sanctuary as a facility that does not allow contact between the animals and the public.</span></strong></p><span data-dcnode-id="3270" instrument_node="">
</span><p data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">Accredited wildlife sanctuary means a facility that cares for live specimens of one or more of the prohibited wildlife species and:</span></p><span data-dcnode-id="3267" instrument_node="">
</span><p data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">(1) Is approved by the United States Internal Revenue Service as a corporation that is exempt from taxation under § 501(a) of the Internal Revenue Code of 1986, which is described in §§ 501(c)(3) and 170(b)(1)(A)(vi) of that code;</span></p><span data-dcnode-id="3264" instrument_node="">
</span><p data-dcnode-id="3262"><span data-dcnode-id="3263" instrument_node="">(2) Does not commercially trade in prohibited wildlife species, including offspring, parts, and products;</span></p><span data-dcnode-id="3261" instrument_node="">
</span><p data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">(3) Does not propagate any of the prohibited wildlife species; and</span></p><span data-dcnode-id="3258" instrument_node="">
</span><p data-dcnode-id="3253"><span data-dcnode-id="3257" instrument_node="">(4) </span><strong data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">Does not allow any direct contact</span></strong><span data-dcnode-id="3254" instrument_node=""> between the public and the prohibited wildlife species.</span></p><span data-dcnode-id="3252" instrument_node="">

</span><p data-dcnode-id="3223"><span data-dcnode-id="3224" instrument_node="">No one can possess, sell, or import fish from the genus Clarias or Serrasalmus, Black carp, any species of mongoose, any member of the family Cervidae (deer, elk, moose, caribou), any species of coyote, fox, raccoon, skunk, wild rodents, or wild turkey. There are no licenses or permits required for ownership of exotic animals.</span></p><span data-dcnode-id="3222" instrument_node="">
</span><p data-dcnode-id="3217"><span data-dcnode-id="3221" instrument_node="">Bobcats and mountain lions are not allowed to be imported into the state, transported within the state (except for licensed game breeders), and future possession permits to keep these species will not be issued. </span><a data-dcnode-id="3219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//web.archive.org/web/20140103041417/http%3A//sanctuarystandards.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3220" instrument_node="">Accredited</span></a><span data-dcnode-id="3218" instrument_node=""> educational facilities, research facilities, and permitted rehabilitation facilities shall be exempt from this regulation through the written permission of the Director of the Division of Wildlife and Freshwater Fisheries or his designee. Previous owners that already have permits will be grand fathered, but breeding is prohibited. Also issues permits for the public exhibition of wildlife. Carnivals, zoos, circuses, and other like shows and exhibits where ample provision is made so the birds, animals, reptiles, amphibians, and fish will not escape or be released in this state are permitted. Applications require statement regarding person education and experience, description of facilities, number of species desired, and signed agreement that recommended standards for wildlife exhibition will be adhered to.</span></p><span data-dcnode-id="3216" instrument_node="">
</span><p data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">Section 3-8-1 Rabies vaccine required for any canidae or felidae; applicability. Notwithstanding any provision of law to the contrary, it shall be illegal to own, maintain, sell, or trade any canidae or felidae for which there is no USDA licensed rabies vaccine. Anyone currently owning or maintaining such animal may keep the animal for the length of the animal’s life providing the animal is spayed or neutered and is registered with the Department of Agriculture and Industries. This section does not apply to any zoological parks, circuses, colleges, and universities, animal refuges approved by the Department of Agriculture and Industries, county or municipal humane shelters, the Department of Conservation and Natural Resources, or veterinary clinics.</span></p><span data-dcnode-id="3213" instrument_node="">
</span><p data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">(Acts 1994, No. 94-322, p. 562, §8.) http://wwwlegislature.state.al.us/CodeofAlabama/1975/3-8-1.htm</span></p><span data-dcnode-id="3210" instrument_node="">

</span><p data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">Issues Commercial Wildlife Park Permits. Wild felines must be possessed for commercial purposes only. Has specific requirements to meet definition of commercial; must provide a plan to show a profit, must have experience, maintain business records, hire and train employees, file state and Federal income tax based on this activity, etc. Further, there are caging requirements, and any animal exhibited out of a cage requires a $500,000 liability policy. Big Cats can be held in natural settings. Open topped enclosures must be 10 feet, with double electrified wires on top and fencing sunk 3 feet into ground.</span></p><span data-dcnode-id="3041" instrument_node="">
</span><p data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">Hybrids are not noted as illegal in the statutes however, they are illegal in the City of Denver and other Colorado cities. Bobcat hunting seems to be legal in Colorado. The Colorado laws regarding exotic animals are very confusing and hard to understand.</span></p><span data-dcnode-id="3038" instrument_node="">

</span><p data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">Under § 26-40a, no person shall possess a potentially dangerous animal, which includes wildlife such as the lion, leopard, cheetah, jaguar, ocelot, jaguarundi cat, puma, lynx, or bobcat. The provisions of this section shall not apply to municipal parks, public nonprofit aquaria or zoos, accredited by the Association of Zoos and Aquariums or the Zoological Association of America, nature centers, museums, or exhibitors licensed or registered with the United States Department of Agriculture or laboratories and research facilities maintained by scientific or educational institutions licensed or registered with the United States Department of Agriculture, any licensed veterinarian for the purpose of treatment and care of such animal, or to any person who possesses a breed of felidae certified by The International Cat Association, the Cat Fanciers Association or the American Cat Fanciers Association.&nbsp; As of 2013, any generation of savannah cat is legal to own in Connecticut.</span></p><span data-dcnode-id="3007" instrument_node="">

</span><p data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">When an exotic is kept as a pet, the owner or custodian of the exotic must apply to the Department for an Individual Permit on a form supplied by the Department. Individual Permits granted by the Department shall become null and void when the owner or custodian transfers ownership or custodianship of the exotic to another person. The owner or custodian must obtain a separate Individual Permit for each exotic animal kept as a pet. A background check of an owner or custodian applying for an Individual Permit may be completed by the Department.&nbsp; Owning exotic cats, large and small is legal in Delaware with a permit.</span></p><span data-dcnode-id="2979" instrument_node="">

</span><p data-dcnode-id="2944"><span data-dcnode-id="2948" instrument_node="">See an </span><a data-dcnode-id="2946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bigcatrescue.org/map.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2947" instrument_node="">interactive online map of exotic cat owners</span></a><span data-dcnode-id="2945" instrument_node="">.</span></p><span data-dcnode-id="2943" instrument_node="">
</span><p data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node="">Class I wildlife, which includes tigers and lions, is prohibited from personal possession unless the animal was possessed on or before August 1, 1980; or on or before August 27, 2009 for cougars, panthers or cheetahs. Permits are required for public exhibition, sale or personal possession of Class II wildlife which include bobcats, servals and caracals.&nbsp; All generation of savannah cats are legal.</span></p><span data-dcnode-id="2940" instrument_node="">
</span><p data-dcnode-id="2932"><span data-dcnode-id="2939" instrument_node="">Class I animals (includes panthera cats) can not be kept for personal use – must be commercial exhibitors. Class I permit requires 1 year and 1000 hours experience, details of experience and place acquired and 2 references. Documented educational experience in zoology or other relevant biological sciences, obtained at the college or technical school level or above, may substitute for up to six months or 500 hours of the required experience. The Class I permit applicant still has to prove another documented 500 hours or 6 months, if they have the Biological Sciences qualifications. Class I exhibitors must post a $10,000.00 bond or carry 2 million in liability insurance. Class I animal permits require that facilities for Class I animals must be constructed on properties of not less than 5 acres in size. Under a Class II and Class III permit, animals as large as mountain lions can be kept for pets. Class II permits require 1,000 hours experience, or 100 hours experience and successful completion of a test. Class II and Class III wildlife shall not be possessed in multi-unit dwellings unless the dwelling in which they are housed is equipped with private entrance, exit, and yard area. Class II permits for mountain lion, require that facilities for mountain lions must be constructed on properties of not less than 2 acres in size. Applicants for a Class III animals must be at least 16 years of age and shall require the satisfactory completion of a questionnaire developed by the Commission that assesses the applicant’s knowledge of general husbandry, nutritional, and behavioral characteristics. All permits require adherence to structural cage requirements. There are more than 1500 tigers in Florida, but less than 100 of them are in </span><a data-dcnode-id="2937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//web.archive.org/web/20140103041417/http%3A//sanctuarystandards.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2938" instrument_node="">accredited</span></a><span data-dcnode-id="2936" instrument_node=""> facilities. If you are a resident, type your zip code into any box on this page to see what legislation is pending in your state and make a difference now! &nbsp;Florida issues more than 4000 exotic ownership permits each year and has to employ 27 inspectors at a cost to tax payers of 1.5 million dollars per year, just to allow people to keep, breed and sell exotic pets. Permits cost between 5. and 250. if you have more than ten animals. This does not generate nearly enough revenue to cover the cost of administration. What can a County in Florida do to ban exotic pet ownership when FWCC says they have supreme authority and no intention of banning this inhumane practice? Click here to see what the Attorney General has to say. </span><a data-dcnode-id="2934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bigcatrescue.org/memo-of-law/"><span data-dcnode-id="2935" instrument_node="">Memo of Law</span></a><span data-dcnode-id="2933" instrument_node="">.</span></p><span data-dcnode-id="2931" instrument_node="">

</span><p data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">No person may possess or propagate a deleterious exotic animal in the state, unless such person obtains a possession permit issued by the Administrator. This category includes caracals, cheetahs, jaguars, leopards, lion, ocelots, servals and tigers. Bobcats are classified as a furbearing animal. Furbearers include bobcat, fox, marten, mink, muskrat, beaver, otter, lynx, fisher, and badger. Of these, lynx and fisher are fully protected with no legal harvest, and otters have a quota. Lynx are listed as threatened and wolverine are listed as protected non game. None of the other furbearers have quotas or limits except a few controlled hunts for beavers.&nbsp; Bobcats can be hunted without limit for furring purposes. Other exotic cats can be owned with a permit. Savannah cats can be owned with a permit.</span></p><span data-dcnode-id="2841" instrument_node="">

</span><p data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">Effective 2005, a ban on the private possession of tigers, lions, monkeys, bears, venomous reptiles, and other dangerous wildlife has been enacted in Kentucky. One of the most comprehensive restrictions on the keeping of exotic animals as “pets” in the United States, the regulation also prohibits existing animals from being bred. Existing confining facilities shall be large enough to allow reasonable space for exercise, shelter, and maintenance of sanitary conditions. The holder of an existing pet or breeding permit shall allow a conservation officer to inspect the facilities at any reasonable time. As of 2012 Kentucky has held the record for five years in a row of having the most lacking regulations for protecting animals of all kinds according to the ALDF.&nbsp; With the proper paperwork, interviews, and cage requirements owning servals and other small cats is permitted in most cases. Bobcat hunting is allowed.</span></p><span data-dcnode-id="2679" instrument_node="">

</span><p data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">It is unlawful to possess all subspecies or hybrids of the following big exotic cats: tigers, lions, leopards, snow leopards, clouded leopards, jaguars, cheetahs, cougars or mountain lions. An individual who legally possessed one or more of these exotic cats on August 15, 2006, who can prove legal ownership, is authorized to keep their exotic cats under certain specified conditions. The following entities are exempt from this requirement: zoos accredited or certified by the American Zoo and Aquarium Association; research facilities as defined in the Animal Welfare Act; licensed circuses operating temporarily in the state; and Louisiana colleges or universities possessing a big exotic cat of the species traditionally kept by that college or university as a school mascot. Any person transporting any listed animal through the state is exempt if the transit time is not more than 24 hours, subject to certain conditions.&nbsp; Savannah cats are legal but it appears owning other small cats such as servals is not legal in Louisiana. Bobcats can be hunted.</span></p><span data-dcnode-id="2646" instrument_node="">

</span><p data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">A person may not possess a member of the cat family other than the domestic cat, or a hybrid of a member of the cat family and a domestic cat, if the hybrid weighs over 30 pounds. This provision does not prohibit a person who had lawful possession of a prohibited animal on or before May 31, 2006, from continuing to possess that animal if the person provides written notification to the local animal control authority on or before August 1, 2006. This section does not apply to a research facility or federal research facility licensed under the federal Animal Welfare Act; an exhibitor licensed under the federal Animal Welfare Act; qualified animal sanctuaries, animal control officers; licensed veterinarians; or non-residents in the state for ten days or less for the purpose of traveling between locations outside the state. There is no open season for bobcat trapping or hunting. Maryland Department of Natural Resources has designated the bobcat as a species of special concern. Eastern cougars “disappeared” in the late 1800s. The bobcat and eastern cougar are included on the list of “Rare, Threatened, and Endangered Animals of Maryland.”&nbsp; All savannah cats are allowed to be owned if they weigh under 30 lbs.</span></p><span data-dcnode-id="2569" instrument_node="">

</span><p data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">A person shall not possess any of the following cats of the Felidae family, whether wild or captive bred, including a hybrid cross with such a cat: lion, leopard, snow leopard, clouded leopard, jaguar, tiger, cougar, panther, or cheetah. This prohibition does not apply to persons who were in possession of such animal on July 7, 2000, and who otherwise qualifies for a large carnivore permit. The following entities are exempt from these requirements: an animal control shelter or animal protection shelter; persons licensed by the state or by the U.S. Department of Interior; an approved or accredited zoological park or animal sanctuary; authorized law enforcement officers; a veterinarian temporarily in possession of a large carnivore to provide veterinary services; a person who is not a resident of this state and who is in this state only for the purpose of travel between locations outside of this state; certain for-profit or non-profit businesses whose primary purpose is the presentation of animals including large carnivores to the public for education or exhibition purposes; and circuses. Bobcat hunting/trapping is permitted with the proper fur harvester license issued by the Michigan Department of Natural Resources (MDNR). MDNR regulates the means and methods in which bobcats may be hunted/trapped, establishes open seasons, geographic regions, and bag limits. Furbearer kill tags are required for harvesting bobcat. A person who kills a bobcat shall immediately validate the tag and attach the tag to the hide from the upper jaw to the eye socket or through the lower jaw. MDNR also regulates fur dealers including licensing, shipping permits, labeling and reporting of pelts in possession on the last day of the hunting/trapping season. Cougars were once native to Michigan but were extirpated around the turn of the century.&nbsp; Savannah cats are legal in Michigan all generations.</span></p><spa </span><p data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">It is unlawful for a person to possess a regulated animal. A regulated animal is defined as all members of the felidae family (except domestic cats); all bears; and all non-human primates. A person who possesses a regulated animal on the effective date of the law, January 1, 2005, has 90 days to register the animal with the local animal control authority. Persons possessing a registered regulated animal may replace the regulated animal if he/she dies, but may replace he/she only once. The law also requires those longtime owners to have a written plan to recapture escaped animals and to meet Department of Agriculture requirements for caging, including having a perimeter fence around primary enclosures. Regulated-animal signs must be posted, and wildcats must be registered with local animal-control authorities, who in rural counties might be the sheriff.&nbsp; Bobcat hunting/trapping is legal in Minnesota. Serval hybrids are illegal in Minnesota.</span></p><span data-dcnode-id="2474" instrument_node="">

</span><p data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">Effective January 1, 2012, anyone who possesses, breeds, or transports a tiger, lion, jaguar, leopard, snow leopard, clouded leopard, cheetah, or a hybrid of a listed cat must obtain a permit for each animal. Current owners had 60 days to obtain the permit. Applicants must be at least 21 and not have ever been convicted of animal cruelty or of a felony within the last 10 years, have them microchipped, report any deaths within 10 days, maintain $250,000 of liability insurance, and obtain a permit to transport them. Animal control or humane shelters holding a large carnivore for less than 90 days, law enforcement officers or department of agriculture employees, vets, those just transporting the animal through the state, and USDA Class C Exhibitors who maintain large carnivores on August 28, 2010 are exempt from the permit and microchip requirements, provided that Class C Exhibitors who obtain additional large carnivores must obtain a permit for those animals. Completely exempt from this act are circuses, the University of Missouri-Columbia College of Veterinary Medicine, and zoological parks under Chapter 184. Those who keep a lion, tiger, leopard, ocelot, jaguar, cheetah, margay, mountain lion, Canada lynx, bobcat, or jaguarundi must register them with their local law enforcement agency. This does not apply to a zoological park, circus, scientific or educational institution, research laboratory, veterinary hospital, or animal refuge.&nbsp; You can own just about anything in this state and hunting bobcats is permitted.</span></p><span data-dcnode-id="2414" instrument_node="">

</span><p data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">Bobcats and lynx are listed as furbearers. State issues Fur Farm permit, but make one exception. If animal is raised not for its fur or body parts, a permit is not required. Importation of wild felines into the state requires an import permit. Exotic wildlife is classified into prohibited, controlled, and non-controlled. Servals and jungle cats are non-controlled and may be possessed and sold as pets without a permit. All other felines are automatically prohibited and are limited to zoo or roadside menagerie permit, AZA facility, USDA Class C Exhibitor for less than 90 days, college, university, or government agency for scientific or public health research, scientific institution, USDA nonprofit organization that exhibits wildlife for educational or scientific purposes, a service animal, and national or state agency affiliated rescue facility. Exotic wildlife is classified into prohibited, controlled, and non-controlled. Servals and jungle cats are non-controlled and may be possessed and sold as pets without a permit. Roadside Menagerie is for exhibiting or using wild animals to attract trade. Must keep detailed records of acquisition, birth, death and transfer. There are also housing, feeding, treatment and care regulations. Roadside Menagerie Permits requires proof of liability insurance for bodily injury up to $25,000 per person up to $100,000 on each occurrence along with property damage up to $5,000 per occurrence. Insurance must be with a reputable operation and must cover all injury to the public whether negligent operation, maintenance care, confinement or supervision causes an accident. Permit fees are $10.00 for less then 6 animals, and over 6 animals cost $25.00. No more than 10 animals may be possessed with a Wild Animal Menagerie permit. Has caging, record keeping, feeding, treatment and sanitation requirements. Wild Animal Menagerie is where up to 10 large cats are kept for purposes other than exhibition. Tigers and mountain lions must be tattooed on the left thigh.&nbsp; All generation of savannah cats are legal.</span></p><span data-dcnode-id="2381" instrument_node="">

</span><p data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">In 2009, New Mexico passed new importation rules. All felines other than hybrids are considered Group IV and are limited to scientific studies, restoration and recovery plans, zoos, temporary events/entertainment, service animals or for a qualified expert only. Issues zoo, Class A Parks, and scientific study permits. An additional Class A Parks License is required if facility is over 3200 acres. Has caging and record requirements. New Mexico regulators have just adopted new rules that will prohibit trapping or snaring cougars for sport.&nbsp; Savannah cats are legal. Bobcats are protected furbearers in New Mexico with an established season for hunting and trapping from November 1 to March 15.</span></p><span data-dcnode-id="2231" instrument_node="">

</span><p data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">New York bans the breeding, purchase or sale of wild felines other than hybrids that are at least four generations removed and registered by CFA or TICA for pets. All existing owners had to register their felines by June 30, 2005 and apply for a license. License fee is $170 for 2 years. Exempt are AZA zoos, USDA exhibitors, research facilities, licensed vets, incorporated humane societies, shelters, SPCA, colleges and universities, wildlife rehabilitators, those transporting an animal to an exempted place, wildlife sanctuary, and those traveling through in less than 10 days. Lions require a Dangerous Wildlife License, which is only issued for science, education or exhibition. Native species such as bobcats and cougars may not be kept as pets. Bobcats can be imported for other purposes without a permit, but require a Fur Breeder License to possess or breed. Cougars are considered an endangered species and require an Endangered Species License. In 2012, New York passed legislation which required the department to create lists of prohibited non native species, species that require a permit and legal species. It also passed a ban on releasing exotic animals. On 8/11/2014, a new law passed prohibiting dealers or exhibitors from allowing direct contact with big cats lion, tiger, leopard except clouded leopard, jaguar, cougar or hybrid of such without a permanent physical barrier.&nbsp; New York is the first state to ban anal/genital electrocution of fur-bearing animals (2008). It is legal to hunt bobcats.</span></p><span data-dcnode-id="2198" instrument_node="">

</span><p data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">North Carolina does not have a general statewide law on regulating the ownership of or possession of exotic or dangerous animals. However, every county in the state sets its own ordinances dealing with exotic animal rules. That means it sets rules about what kinds of animals you can own as pets. Requires Wildlife Captivity License for native cougars and bobcats, which is only issued to bona fide publicly supported zoos and educational or scientific research institutions. For private possession of cougars, the state requires natural habitats of rather grandiose proportions: minimum one-acre enclosure, 12-foot fences with 45-degree recurve, pool, den, vegetation and landscaping, property must be owned by applicant. Zoos or Scientific Research facilities are allowed to keep cougars in concrete and chain link cages. Natural habitats are not required for bobcats like they are for cougars, but the state has minimum cage size requirements. Must apply for Import Permit if native feline is being brought into state from outside the state. Must be USDA exhibitor or research institution to import any species native to North or South America. But that is not a requirement to purchase in-state, though NC does not issue permits for pet purposes.&nbsp; Savannah cats are legal. Bobcat hunting is allowed.</span></p><span data-dcnode-id="2167" instrument_node="">

</span><p data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Regulates private ownership of nontraditional livestock, i.e.: all wild animals in captivity, by issuing licenses. Bobcats and lynx are category 3 animals (native to the state) all other felines are Category 4. (Inherently dangerous) Before any class 3 or 4 animals can be imported into the state, an importation permit must be issued. Nontraditional livestock permitees must keep records of sales, purchases, escapes, captures, diseases or animal transfers or births. Record keeping must be available for inspection.&nbsp; Servals and savannah cats are legal. Bobcat hunting is allowed for residents only and in specific areas of the state.</span></p><span data-dcnode-id="2139" instrument_node="">

</span><p data-dcnode-id="2109"><span data-dcnode-id="2113" instrument_node="">Requires a permit to posses the native endangered species, bobcat. Permits issued for zoological, breeding, scientific and educational purposes. Must have permit before the bobcat can be imported into the state. On June 5th, 2012 a law passed that banned the private possession of dangerous wild animals, including most exotic cats. Those who have the animals must register them but cannot buy or breed more. The only exemptions for breeding are AZA accredited zoos (and ZAA for now, but that needs to change) and sanctuaries that are accredited by the Global Federation of Animal Sanctuaries can continue to rescue wild animals. See the details of the </span><a data-dcnode-id="2111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bigcatrescue.org/wp-content/uploads/2014/06/OHIO-WILD-ANIMAL-LAW.docx"><span data-dcnode-id="2112" instrument_node="">OHIO WILD ANIMAL BAN</span></a><span data-dcnode-id="2110" instrument_node="">.&nbsp; Bobcat hunting is illegal. In 2018 there was a proposal to allow hunting of bobcats, but the Ohio Wildlife Council decided to indefinitely postpone the proposal. Savannah cats are legal to own.</span></p><span data-dcnode-id="2108" instrument_node="">

</span><p data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">The state issues noncommercial wildlife breeders permits and commercial wildlife breeders permits. However, exotic felines are exempt from the noncommercial wildlife breeders, commercial wildlife breeders, and import permits. Native bears or cats with an adult weight that exceeds 50 pounds (black bear and cougar) may only be kept under a commercial breeders permit as they are banned as pets. Importation into the state of bobcats or cougars requires an Import Permit. Cage construction and inspection is required before bobcat or cougar permit is issued. Requires that permitee follow the general care guidelines of the AWA. Permit fee is $48.00 for commercial permit and $5.00 for personal possession permit. Exhibition of cougars requires either a Resident Cat/Bear Exhibitors Permit or a Nonresident Cat/Bear Temporary Exhibitors Permit. Effective 5/14/2013 In addition to owners of any member of the family felidae running at large being liable for death or injury to livestock, owners are now also liable for damages caused, including attorney and litigation fees.&nbsp; Owning servals and savannah cats is legal in Oklahoma as is bobcat hunting.</span></p><span data-dcnode-id="2078" instrument_node="">

</span><p data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">Prohibits the keeping of wild and exotic animals that include: Any member of the family Felidae not indigenous to Oregon, except the species Felis catus (domestic cat). It is the policy of the state to protect the public against health and safety risks that exotic animals pose to the community, ensure the health, welfare and safety of exotic animals and ensure the security of facilities in which exotic animals are kept, so as to avoid undue physical or financial risk to the public. A permit is required for keeping and breeding exotic animals. A person may not keep an exotic animal in the state unless the person possesses a valid State Department of Agriculture permit for that animal issued prior to January 1, 2010, or issued as provided in ORS 609.351. A person keeping an exotic animal in the state may not breed that animal; a person may not keep an exotic animal in the state for more than 30 days after the expiration, revocation or suspension of a permit; a person may breed a small exotic feline if the person: is exempt from the requirements for a permit under ORS 609.345; or breeds a small exotic feline with a member of the species Felis catus (domestic cat), and the person has a permit issued by the State Department of Agriculture under ORS 609.351; and the person provides written documentation, including the person’s business license, that the person bred the animals for the purpose of retail sale of the offspring (“small exotic feline” means a member of the family Felidae, except the species Felis catus (domestic cat), that weighs 50 pounds or less when fully mature. [Formerly 609.319] Exempts: Wildlife rehabilitation centers operating under a valid permit issued by the State Fish and Wildlife Commission pursuant to ORS 497.308; a facility operating under a valid license or research facility registration issued by the United States Department of Agriculture pursuant to the federal Animal Welfare Act of 1970 (7 U.S.C. 2133 or 2136); An exotic animal protection organization, including humane societies and animal shelters, incorporated under ORS chapter 65, that houses an exotic animal at the written request of the state or a state agency for a period not to exceed 30 days; a law enforcement agency; a licensed veterinary hospital or clinic.&nbsp; Neither bobcat nor lynx can be bartered, sold or purchased in the state of Oregon. Oregon Dept. of Fish and Wildlife issues holding permit for bobcat, but it is not legal for Oregon residents to sell bobcats. Dept of F &amp; W issue commercial wildlife propagators license for cougars. Bobcat hunting is legal. Is is legal to own a savannah cat but not a serval.</span></p><span data-dcnode-id="2047" instrument_node="">

</span><p data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">Section 47-5-50 Prohibition on sale of wild carnivores as pets states that no carnivores, which normally are not domesticated, may be sold as a pet in this state. Dangerous animals are not permitted beyond premises unless safely restrained. Further, those possessing dangerous animals must maintain them in a controlled and confined manner. Dangerous animal is not defined only on the basis of species. No person may possess with the intent to sell, offer for sale, breed, or buy, or attempt to buy, a known dangerous animal; however, this subsection does not apply to a person who is licensed to possess and breed an animal under the classifications specified and regulated by the United States Department of Agriculture under the Animal Welfare Act as codified in Title 7 of the United States Code. It is illegal to sell, possess or import wild felines except for scientific or exhibition purposes. A new law went into effect 1/1/18 making it illegal for everyday S.C. residents – in other words, not zoos – to buy or own large cats, apes or non-native bears.If you already own an African lion, cougar or some other exotic animal, you can keep your furry friend for the rest of its life, so long as you must register the animal with your local animal control agency and pay a one-time, $500 fee to help the agency pay to enforce the new law; You must give that animal control agency a contingency plan showing how the animal should be quickly and safely recaptured if it escapes; and you must maintain vet records and other important paperwork, such as documents proving you owned the animal in your backyard before Jan. 1, 2018.&nbsp; Servals and savannah cats are legal. Bobcat hunting is allowed for residents only and in specific areas of the state. the bobcat is legally classified as a furbearer and can be taken by hunting or trapping during the open season. Nuisance bobcats can also be taken year- round with a Depredation Permit.</span></p><span data-dcnode-id="1958" instrument_node="">

</span><p data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">Class I felines (inherently dangerous) are lions, tigers, leopards, jaguars, cheetahs, and cougars and may only be possessed by zoos, circuses and commercial propagators. Two years of experience or scoring at least 70% on a test is required. Test is on handling, habits, health care and housing. Have caging, sanitation, and housing standards. Cages must be inspected by TWRA before animals will be permitted. One acre is required for personal possession or 3 acres for commercial propagators. Felines under 25 pounds and between 8 weeks and 3 months are allowed public contact for one hour every 8 hours. Bobcats are considered a native species and require a class II (native) permit. Nature centers may have bobcats for educational purposes. Import permit is required before bringing bobcats into the state. All other felines, bobcat hybrids, and domestic hybrids fall under Class III, which does not require a permit. Nature centers, rehabilitation centers, and educational exhibits are prohibited from possessing Class III felines other than bona fide zoos.&nbsp; Bobcats are hunted and trapped. Savannah cats are legal.</span></p><span data-dcnode-id="1896" instrument_node="">

</span><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">In 2001 the Texas legislature passed a state law mandating that all counties either regulate or ban “dangerous” wild animals. A list of species considered dangerous contains nearly all felines, with only a few species such as geoffroy’s cats, jungle cats and asian leopard cats not listed. Each county must develop a plan to administer a registration process that requires a permit fee, caging standards, $100,000 liability insurance and veterinary care requirements as outlined in the state law. Many counties have chosen to ban rather then fund a county registration requirement. This is an irresponsible way to manage a state wide problem. There are more tigers in Texas than there are left in the wild. The state needs much tougher legislation to prevent the breeding, selling and often the shooting of exotic cats in canned hunts.&nbsp; Servals and savannah cats are legal with permits. Bobcat hunting is legal any time of the year.</span></p><span data-dcnode-id="1866" instrument_node="">

</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">A person may obtain a permit to keep and maintain in captivity as a pet, a wild animal that has been acquired from a commercial dealer or during the legal open hunting season. Bobcat hunting/trapping is permitted with the proper license issued by the West Virginia Division of Natural Resources (WVDNR). WVDNR regulates the means and methods in which bobcats may be hunted/trapped, establishes open seasons, geographic regions, and bag limits. WVDNR provides the following on bobcats: Each person killing a bobcat must attach a completed field tag to the bobcat or remain with the bobcat and have upon their person a completed field tag (or make one) before moving the carcass from where it was killed. The tag shall include: the hunter/trapper’s name, address, hunting license number, date, time, and county of kill. The tag must be attached to the bobcat immediately and remain on the carcass until it is tagged with an official game checking tag which must be completed within 30 days of the close of bobcat season. It is illegal to have in possession an untagged bobcat pelt or parts, after 30 days following the close of the seasons. There is no open season to hunt mountain lions.&nbsp; It is legal to own savannah cats.</span></p><span data-dcnode-id="1699" instrument_node="">

</span><p data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Subject to certain exemptions, no person may possess a live wild animal, including a wild cat, unless the person holds a license or is otherwise approved to possess the animal. A person is exempt from holding a license or other approval to possess live nonnative wild animals that are not an endangered or threatened species, except for nonnative wild animals that are harmful. Cougars are designated by rule to be harmful wild animals. The Wisconsin Department of Natural Resources may designate by rule other species of wild animals as harmful wild animals. The following are exempt from this licensing/approval requirement: a veterinarian, for the purpose of providing medical treatment to wild animals; a public zoo or aquarium; a circus or the Circus World Museum located in Baraboo, Wisconsin; and the Wisconsin Department of Natural Resources.&nbsp; Bobcat hunting/trapping is permitted with the proper license issued by the Wisconsin Department of Natural Resources (WDNR).</span></p><span data-dcnode-id="1671" instrument_node="">

</span><p data-dcnode-id="1651"><a data-dcnode-id="1652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wyo.gov/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1653" instrument_node="">State Web Site</span></a></p><span data-dcnode-id="1650" instrument_node="">

</span><p data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Private ownership of live animals classified as big or trophy game animals, including mountain lions, is prohibited. Subject to certain exemptions, a permit is required prior to importation, possession, and/or confinement of any living wildlife, including all wild mammals and their hybrids.&nbsp; Bobcat hunting/trapping is permitted with the proper license issued by the Wyoming Game and Fish Commission (WGFC).</span></p><span data-dcnode-id="1643" instrument_node="">
</span><p data-dcnode-id="1640"><a data-dcnode-id="1641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/ISul23FDW0Q%3Ffeature%3Doembed%23top"><span data-dcnode-id="1642" instrument_node="">Back to Top</span></a></p><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1636"><strong data-dcnode-id="1637"><a data-dcnode-id="1638" name="USDA"></a></strong></p><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1625"><strong data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">USDA Licensing</span></strong><span data-dcnode-id="1632" instrument_node=""> </span><strong data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">&amp; Federal Laws</span></strong><span data-dcnode-id="1629" instrument_node=""> As of September 17, 2007, it is illegal to transport a big cat across state lines as a pet, which means from any non USDA licensed facility or to any non USDA licensed facility. Read the entire </span><a data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bigcatrescue.org/2011/regulations-to-implement-the-captive-wildlife-safety-act" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1628" instrument_node="">Captive Wildlife Safety Act</span></a><span data-dcnode-id="1626" instrument_node="">. USDA prohibits public contact with big cat babies under the age of 8 weeks and over the age of 12 weeks. If you see someone using a cub who is too young or too old, please photograph the event and report the exhibitor’s name, location and what you saw to stop this abuse. There is only a one month window in which exhibitors are allowed to use the cubs. There is a pending bill to ban all contact with big cats and their babies. Before you pay to have your photo made with a big cat, check with your regional USDA office to make sure you are not breaking the Federal laws. This is an important law that will protect big cats from being bred for this purpose. Many states and individual counties require a USDA license (usually a Class C Exhibitor’s license) as a prerequisite for gaining a permit to possess wild felines. The following explanation may clarify this requirement.</span></p><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1620"><a data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.catlaws.com/" rel="noopener noreferrer" target="_blank"><img align="right" alt="" border="0" data-dcnode-id="1623" data-pin-no-hover="true" height="150" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rz6nm7fejf-flywheel.netdna-ssl.com/images/buttons/Legislation/_d_improd_/AWLawsVoicelessCub_f_improf_150x150.jpg&amp;raw" style="border: 0px initial initial;" width="150"></a><span data-dcnode-id="1621" instrument_node="">Commercial Activity is Required for a USDA License so a person who wants a big cat as a pet will be forced to take the cat out in the open on display or breed and sell cubs in order to circumvent the laws against having the big cats as “pets”. While the requirement was probably well intentioned, it created more opportunity for injury and fatalities than it cured. USDA Animal Welfare Act regulates the use of animals in commerce. Commercial activity is a prerequisite for licensing. If there is no commercial activity, (i.e., the animal is merely a pet), you are not eligible to enroll in the Animal Welfare Program and gain a USDA license. USDA licenses animal facilities which own or possess these animals. The license is issued to an individual. There are three classes of USDA license – A, B and C. For ownership of wild felines, each class of licenses require that the license holder submit a letter saying that they have adequate husbandry knowledge of the species they possess. Class A License In the case of wild felines specifically, a USDA Class A license is mandatory if the individual is engaged in the sales of offspring produced by the individual’s felines. If the individual is breeding his adult animals but is not selling the offspring, he is not eligible for a USDA Class A license. (no commercial activity) Holder’s of a Class A license may not broker animals, only sell their offspring. Class A license for wild felines requires caging that allows the animal to stand up and turn around and a perimeter fence, no closer that 3 feet to the cage. Perimeter fences for felines defined as dangerous (specifically lions, tigers, leopards, jaguars, mountain lion, cheetah) must be eight feet in height. Caging for smaller felines must be surrounded by a six foot perimeter fence. In the case of multiple animal collections, often a single perimeter fence encloses all the animal cages. There is no definition of how this fence is to be constructed. Class B License A USDA Class B license is mandatory if the individual is selling wild felines not bred by the adult animals in the licensee’s possession. That is, they are brokering other people’s animals – buying and selling adults or offspring, not part of the licensee’s long term collection. Holder’s of a Class B license may engage in limited, controlled exhibiting, such as is required to facilitate the sales of offspring or recently acquired animals. When conducting exhibition of animals the licensee must be responsible for physically preventing any direct contact between the visitors and the animals and their cages. This type of exhibiting cannot be a major part of the commercial activity engaged in by the licensee. Class B license for wild felines requires adequate caging and a perimeter fence, no closer than 3 feet to the cage. In the case of multiple animal collections, often a single perimeter fence encloses all the animal cages. Class C License USDA Class C licenses are commonly referred to as an Exhibitor’s license. Person’s holding class C licenses may exhibit their animals to the public. This is the same license all zoos possess. All exhibitors, whether municipal owned zoos, or privately owned roadside zoos and menageries, circuses, or self proclaimed educator’s that bring animals off-site, must adhere to the same minimal USDA guidelines and standards. USDA Class C facilities may breed and sell offspring, they may broker offspring bred by others, and they may exhibit animals, though the major activity of a Class C licensee must be the exhibiting of the animals. Examples of this is found with zoos: 1. they are open to the public (exhibit), 2. produce baby animals and sell them (breeder), 3. they trade animals amongst other zoos and often times sell animals for various reasons after only owning them a short while (broker). Every year the public wants to see babies so all of last year’s babies must be disposed of. Since all of the zoos breed to supply the public’s demand to see babies the offspring are rarely wanted by other zoos so they end up in the hands of backyard breeders and in canned hunts. Minimum USDA Requirements for possession of Wild Felines Facilities which regularly allow the public to view their animals must have these three elements. 1. A cage big enough for the animal to stand up and turn around in. 2. A barrier fence, which can be just a rope. 3. A perimeter fence, of no particular substance or strength. The Animal Welfare Act is enforced by 90 inspectors who are charged with inspecting more than 10,000 licensees that are breeding, selling and exhibiting wildlife. For more information about USDA licenses and the animal welfare act, visit the USDA Animal Care web site at http://www.aphis.usda.gov/ac/. The USDA was originally created to regulate farming and the “use” of animals. Big Cat Rescue does not believe that exotic cats should be “used” and having the oversight of exotic cats in the hands of those who have such an archaic view of animals as mindless creatures who are undeserving of our compassion and respect is a travesty.</span></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1615"><strong data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Important Notice </span></strong><span data-dcnode-id="1616" instrument_node=""> Every effort has been made to ensure that this information is accurate, and appropriate contact information has been included for each state. This is only a brief summary, and laws are being changed daily. In many cases, the actual laws are quite long and involved. This page last partially updated April 2018.</span></p><span data-dcnode-id="1614" instrument_node="">
