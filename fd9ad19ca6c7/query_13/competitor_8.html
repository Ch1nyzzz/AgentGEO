</span></phoenix-icon-fallback></button></div></div></phoenix-picture><figcaption data-dcnode-id="2095"><p class="tml-image--caption" data-dcnode-id="2099" itemprop="caption"><span data-dcnode-id="2100" instrument_node="">In the United States, you cannot own a snowy owl—or any other native owl—as a pet. They are federally protected under the Migratory Bird Treaty Act. </span></p><p class="tml-image--attribution" data-dcnode-id="2096" itemprop="author"><span data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">“Snowy Owl” by Tony Hisgett is licensed under CC BY 2.0</span></span></p></figcaption></figure></div><h2 data-dcnode-id="2091" id="can-you-have-an-owl-as-a-pet"><span data-dcnode-id="2092" instrument_node="">Can You Have an Owl as a Pet? </span></h2><p data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Many websites state that it is illegal to own an owl as a pet, but they are only partially correct.</span></p><p data-dcnode-id="2084"><span data-dcnode-id="2088" instrument_node="">People can own various owls in the UK, but in the United States, you cannot own a snowy owl—or any other native owl—as a pet. They are federally protected under the </span><a data-dcnode-id="2086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fws.gov/birds/policies-and-regulations/laws-legislations/migratory-bird-treaty-act.php" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="2087" instrument_node="">Migratory Bird Treaty Act</span></a><span data-dcnode-id="2085" instrument_node="">. Under the same law, you cannot even possess one of their feathers without a permit from the U.S Fish and Wildlife Service.</span></p><p data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">Permits for native raptor possession are issued only for educational purposes and for falconers. The process of becoming a legal falconer is exceptionally complex and requires training, so this is certainly not casual pet ownership. Other native owl owners are professional animal educators and nature center affiliates, so without this standing, you won’t be able to possess any native raptor.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-2" data-dcnode-id="2079"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-2" data-dcnode-id="2080" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-3d4b23fb52914f6aa8f25c9e159c7eb0&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-2&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;2&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;2&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-3d4b23fb52914f6aa8f25c9e159c7eb0&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="2081"></phoenix-ad></div></aside><h3 data-dcnode-id="2077" id="which-types-of-owls-are-legal-to-own-in-the-united-states"><span data-dcnode-id="2078" instrument_node="">Which Types of Owls Are Legal to Own in the United States?</span></h3><p data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">Non-native raptors are perfectly legal, however, in states that don’t specifically prohibit them. In the United States, the most commonly available exotic owl species that requires no permits is the Eurasian eagle owl—one of the largest owls in the world. The speckled owl is another species but is rarer.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-1" data-dcnode-id="2072"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-1" data-dcnode-id="2073" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot; </span></phoenix-icon-fallback></button></div></div></phoenix-picture><figcaption data-dcnode-id="2017"></figcaption></figure></div><h2 data-dcnode-id="2013" id="do-owls-make-good-pets"><span data-dcnode-id="2014" instrument_node="">Do Owls Make Good Pets? </span></h2><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">Owls certainly aren’t good pets for the majority of potential bird owners, including those interested in other raptors.</span></p><p data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">For people who are used to keeping parrots, perhaps expecting that they could keep an owl (especially a Eurasian eagle-owl) in a large macaw cage in their house, they should be turned off to the idea of keeping these animals when they learn about their requirements in captivity. Relative to their (already large) size, they need an extremely large outdoor enclosure for adequate welfare (or indoors, if you really do have that kind of space to dedicate).</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-3" data-dcnode-id="2006"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-3" data-dcnode-id="2007" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-2c26c407c6224aba9f0d94cffd661094&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-3&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;3&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;3&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-2c26c407c6224aba9f0d94cffd661094&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="2008"></phoenix-ad></div></aside><p data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">Here are some more challenges you'll encounter as an owl owner.</span></p><ul data-dcnode-id="1973"><li data-dcnode-id="2000"><strong data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">Taking vacations can be difficult:</span></strong><span data-dcnode-id="2001" instrument_node=""> Owls are creatures of habit and like to have a routine. A disruption of this routine is very stressful for them. In addition, they may become aggressive to another caretaker—not to mention the challenge of finding someone qualified and willing to watch them.</span></li><span data-dcnode-id="1999" instrument_node="">
</span><li data-dcnode-id="1995"><strong data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">They can be destructive: </span></strong><span data-dcnode-id="1996" instrument_node="">You might come home to find pillows ripped to shreds or your wood floor all torn up.</span></li><span data-dcnode-id="1994" instrument_node="">
</span><li data-dcnode-id="1990"><strong data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">They are high maintenance. </span></strong><span data-dcnode-id="1991" instrument_node="">These raptors require daily feeding, cleaning, and attention. Owls that can fly need to be exercised often or housed in cages that are big enough for them to fly around.</span></li><span data-dcnode-id="1989" instrument_node="">
</span><li data-dcnode-id="1985"><strong data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Don't expect them to be cuddly. </span></strong><span data-dcnode-id="1986" instrument_node="">Owls have still retained their natural instincts, and, unfortunately, snuggling with others isn't one of them.</span></li><span data-dcnode-id="1984" instrument_node="">
</span><li data-dcnode-id="1980"><strong data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">It could be hard to find a vet. </span></strong><span data-dcnode-id="1981" instrument_node="">It's important to find someone who specializes in properly caring for pet owls, which can be difficult given how much there is to know about their health and needs.</span></li><span data-dcnode-id="1979" instrument_node="">
</span><li data-dcnode-id="1975"><strong data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">They'll likely disturb your neighbors all night long.</span></strong><span data-dcnode-id="1976" instrument_node=""> Remember that owls are nocturnal, so they'll be active while you (and your neighbors) are trying to sleep.</span></li><span data-dcnode-id="1974" instrument_node="">
</span></ul><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-2" data-dcnode-id="1970"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-2" data-dcnode-id="1971" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-43f55406b68e481c85d4967999174292&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-2&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;2&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;D&quot;],&quot;slotMo </span><li data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Birds of prey actually prefer the closed-in nature of these somewhat dark enclosures because it helps them feel secure. The windows of the room should be barred for the bird’s comfort.</span></li><span data-dcnode-id="1759" instrument_node="">
</span><li data-dcnode-id="1754"><span data-dcnode-id="1758" instrument_node="">Weathering yard:</span><strong data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node=""> </span></strong><span data-dcnode-id="1755" instrument_node="">This is a large, open flight cage that can be attached to a mew. It is composed of wire mesh, chain link fencing, or netting.</span></li><span data-dcnode-id="1753" instrument_node="">
</span><li data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Perches can be wooden or made out of rope. In terms of their placement, they shouldn't be so close to the wall as to ruffle the bird's tail if they're facing forward.</span></li><span data-dcnode-id="1750" instrument_node="">
</span><li data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">There are many different ways to design mews and weather yards, as well as different substrates that work for different areas. The best substrate to choose is one that can be efficiently cleaned frequently since owls produce a lot of waste.</span></li><span data-dcnode-id="1747" instrument_node="">

</span><p data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">This article is only meant to provide general information and isn’t a comprehensive pet owl care guide. If you are really interested in getting a Eurasian eagle-owl or any other higher-maintenance pet, conduct more thorough research and consult with other owners with experience in owl husbandry as well as zoos and sanctuaries.</span></p><span data-dcnode-id="1722" instrument_node="">
</span></blockquote><h2 data-dcnode-id="1719" id="what-is-the-cost-of-owning-an-owl"><span data-dcnode-id="1720" instrument_node="">What Is the Cost of Owning an Owl? </span></h2><div class="m-table m-detail--body-item l-inline" data-dcnode-id="1679"><table data-dcnode-id="1680"><caption class="caption" data-dcnode-id="1716"><p data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Note: These are just approximate costs since they will vary greatly based on where you live. </span></p></caption><thead data-dcnode-id="1710"><tr data-dcnode-id="1711"><th data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Type of Expense</span></th><th data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Approximate Cost</span></th></tr></thead><tbody data-dcnode-id="1681"><tr data-dcnode-id="1703"><td data-dcnode-id="1707"><p data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">About a month's worth of food (about 200 mice)</span></p></td><td data-dcnode-id="1704"><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">$40 (or less if bought in bulk) </span></p></td></tr><tr data-dcnode-id="1696"><td data-dcnode-id="1700"><p data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Annual wellness exam</span></p></td><td data-dcnode-id="1697"><p data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">$45-$300 (varies tremendously based on your area and how experienced the vet is with exotic animals)</span></p></td></tr><tr data-dcnode-id="1689"><td data-dcnode-id="1693"><p data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Annual fecal exam</span></p></td><td data-dcnode-id="1690"><p data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">$40-$60</span></p></td></tr><tr data-dcnode-id="1682"><td data-dcnode-id="1686"><p data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Construction of cage</span></p></td><td data-dcnode-id="1683"><p d ullscreen="" block-on-gdpr-purpose-consent="content" block-on-gdpr-vendor-consent="youtube" class="m-custom-element" data-dcnode-id="1531" frameborder="0" height="336" iframe-class="m-video--frame" iframe-id="s7hN2Me-qdQ" lazy-load="" mozallowfullscreen="" scrolling="no" src="https://www.youtube-nocookie.com/embed/s7hN2Me-qdQ?start=0" style="position: absolute; display: block; top: 0; max-width: 1100px; width: 100%; bottom: 0;" webkitallowfullscreen="" width="598"></phoenix-iframe></figure></div><h2 data-dcnode-id="1527" id="what-is-a-eurasian-owl-s-average-lifespan"><span data-dcnode-id="1528" instrument_node="">What Is a Eurasian Owl's Average Lifespan? </span></h2><p data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Eurasian eagle-owls can live around 20 years in the wild but up to 50 years in captivity. Do you want to possess a large bird of prey and stock up on frozen small animals for potentially half a century? This includes getting someone to care for your bird if you go away and securing a veterinarian willing to see them if needed. This is an important factor to consider. Other owls have long lifespans as well.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-7" data-dcnode-id="1522"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-7" data-dcnode-id="1523" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]} assRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-b8aefc6a95f74f599d1412fba9a9e9d8&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-9&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;9&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;9&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-b8aefc6a95f74f599d1412fba9a9e9d8&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1515"></phoenix-ad></div></aside><p data-dcnode-id="1508"><span data-dcnode-id="1512" instrument_node="">Many people, unfortunately, get a pet owl only to realize a few years later that it's not a good fit. It's important to note that finding an alternative home for them can be very challenging. Releasing them into the wild is basically a death sentence. Territorial and native habitat requirements are species-specific, and natural foraging tendencies may have been faded due to habituation and domestication—leading to displacement, starvation, potential disease (including introduction), the distribution of native wildlife, and death. In the U.K., </span><a data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.barnowltrust.org.uk/barn-owls-law/keeping-release-barn-owls/%23release" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1511" instrument_node="">it's illegal to release a barn owl </span></a><span data-dcnode-id="1509" instrument_node="">that's been in captivity. And it could be difficult to find a bird sanctuary willing to take your pet since many are at capacity.</span></p><h2 data-dcnode-id="1506" id="what-diseases-could-affect-my-pet-owl"><span data-dcnode-id="1507" instrument_node="">What Diseases Could Affect My Pet Owl? </span></h2><p data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Here are some diseases to watch out for when owning an owl.</span></p><ul data-dcnode-id="1446"><li data-dcnode-id="1500"><strong data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Metabolic Bone Disease:</span></strong><span data-dcnode-id="1501" instrument_node=""> can result from the deficiency of vitamin D, an absolute calcium deficiency, or an inappropriate calcium:phosphorus ratio</span></li><span data-dcnode-id="1499" instrument_node="">
</span><li data-dcnode-id="1495"><strong data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Avian Tuberculosis: </span></strong><span data-dcnode-id="1496" instrument_node="">The organism is ingested by the host, causing lesions in the intestinal wall. Unfortunately, the disease is chronic.</span></li><span data-dcnode-id="1494" instrument_node="">
</span><li data-dcnode-id="1490"><strong data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Pododermatitis or Bumble Foot: </span></strong><span data-dcnode-id="1491" instrument_node="">This disease is primarily a problem of captive raptors. Risk factors include improper size and shape of perches, poor sanitation, trauma, puncture wounds from prey or self-inflicted by talons, and nutritional deficiencies.</span></li><span data-dcnode-id="1489" instrument_node="">
</span><li data-dcnode-id="1485"><strong data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">Pox:</span></strong><span data-dcnode-id="1486" instrument_node=""> There are at least 32 species of pox viruses that cause disease in a wide variety of avian species. Mosquitoes and other blood-sucking organisms may play a major role in transmitting this disease.</span></li><span data-dcnode-id="1484" instrument_node="">
</span><li data-dcnode-id="1480"><strong data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">West Nile Virus: </span></strong><span data-dcnode-id="1481" instrument_node="">The West Nile typically affects juvenile raptors and some of the best ways to protect your owl from it is to cover outdoor facilities with mosquito netting and use USDA-approved carbon dioxide mosquito traps.</span></li><span data-dcnode-id="1479" instrument_node="">
</span><li data-dcnode-id="1470"><strong data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">Aspergillosis: </span></strong><span data-dcnode-id="1476" instrument_node="">It's one of the most frequently encountered </span><a data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merckvetmanual.com/exotic-and-laboratory-animals/pet-birds/mycotic-diseases-of-pet-birds" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1475" instrument_node="">mycotic diseases</span></a><span data-dcnode-id="1473" instrument_node=""> in avian species and one of the most devastating diseases of raptors. </span><strong data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node=""> </span></strong></li><span data-dcnode-id="1469" instrument_node="">
</span><li data-dcnode-id="1463"><strong data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Candidiasis: </span></strong><span data-dcnode-id="1466" instrument_node="">This organism commonly affects the gastrointestinal tract and results in either plaque-like lesions on the tongue, pharynx, and crop or a deep-seated infection of the gastrointestinal tract with or without oral lesions. </span><strong data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node=""> </span></strong></li><span data-dcnode-id="1462" instrument_node="">
</span><li data-dcnode-id="1458"><strong data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Trichomoniasis (Frounce):</span></strong><span data-dcnode-id="1459" instrument_node=""> These infections are seen in captive raptors fed a diet of freshly killed pigeons.</span></li><span data-dcnode-id="1457" instrument_node="">
</span><li data-dcnode-id="1453"><strong data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Hemoparasites: </span></strong><span data-dcnode-id="1454" instrument_node="">A type of parasite frequently observed on blood smears of raptors.</span></li><span data-dcnode-id="1452" instrument_node="">
</span><li data-dcnode-id="1448"><strong data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Lead Poisoning: </span></strong><span data-dcnode-id="1449" instrument_node="">This is an intoxication resulting from absorption of hazardous levels of lead (generally from lead pellets) into body tissues.</span></li><span data-dcnode-id="1447" instrument_node="">
</span></ul><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-8" data-dcnode-id="1443"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-8" data-dcnode-id="1444" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-2f8924e5cc4542d0b7f7968a8dc80177&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-8&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;8&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;D&quot;],&quot;slotMo </span></phoenix-icon-fallback></button></div></div></phoenix-picture><figcaption data-dcnode-id="1385"></figcaption></figure></div><h2 data-dcnode-id="1381" id="experience-is-highly-recommended"><span data-dcnode-id="1382" instrument_node="">Experience Is Highly Recommended </span></h2><p data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Many sellers prefer to sell to owners who have some experience with birds of prey. In general, it is a good idea to become familiar with them before seriously considering purchasing one because there might be aspects of their care that you will deem to be too much to handle.</span></p><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Particularly with Eurasian eagle-owls, they are large birds that could cause harm with their beak and talons, and they require a dedicated owner to commit to their welfare in captivity. Understanding and learning how to train them is important, however many people have a natural affinity for animal training techniques and can be self-taught as long as they are willing to continue learning from experienced people.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-11" data-dcnode-id="1374"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-11" data-dcnode-id="1375" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream 28x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1363"></phoenix-ad></div></aside><h3 data-dcnode-id="1359" id="1-inquire-with-your-state-about-falconry-permit-requirements"><span data-dcnode-id="1360" instrument_node="">1. Inquire With Your State About Falconry Permit Requirements </span></h3><p data-dcnode-id="1354"><span data-dcnode-id="1358" instrument_node="">The first thing you'll want to do is check with your </span><a data-dcnode-id="1356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fws.gov/offices/statelinks.html" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1357" instrument_node="">state's licensing office</span></a><span data-dcnode-id="1355" instrument_node=""> to see what is required in order to obtain a permit. It's important to note that falconry is prohibited in Hawaii. Also, the minimum age for having a permit is 12 years old, but some states require you to be older. </span></p><h3 data-dcnode-id="1352" id="2-read-more-about-the-state-s-regulations-and-level-of-care-required"><span data-dcnode-id="1353" instrument_node="">2. Read More About The State's Regulations and Level of Care Required </span></h3><p data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">The state will send you a list of materials that includes information on caring for these raptors. You'll want to seriously consider if you're ready to put in the work. It would also be a good idea to reach out to a local or state falconry organization, if possible. They may be able to also send you some in-depth literature on regulations and other pertinent information. </span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-12" data-dcnode-id="1347"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-12" data-dcnode-id="1348" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-241b781e391041c4ac8f8f571b68135d&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-12&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;12&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;12&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,& 326"><span data-dcnode-id="1327" instrument_node="">Your sponsor will oversee the construction of your facilities to house your raptor since there are strict legal requirements. These facilities will be inspected by someone from your state wildlife agency. This person will also inspect all of your equipment.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-13" data-dcnode-id="1323"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-13" data-dcnode-id="1324" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-db49f23038d841c180dfde20bde59c95&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-13&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;13&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&qu ,&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1295"></phoenix-ad></div></aside><h3 data-dcnode-id="1290" id="volunteer-at-an-owl-sanctuary"><strong data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Volunteer at an Owl Sanctuary</span></strong></h3><p data-dcnode-id="1285"><span data-dcnode-id="1289" instrument_node="">If you're lucky enough to live near an owl sanctuary, like</span><a data-dcnode-id="1287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//owlsnestsanctuaryforwildlife.com/exotic-pets" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1288" instrument_node=""> Owl's Nest in Tampa Bay</span></a><span data-dcnode-id="1286" instrument_node="">, Florida, you can look into volunteer opportunities. Do a Google search to see if there are any sanctuaries nearby.</span></p><h3 data-dcnode-id="1283" id="become-a-docent"><span data-dcnode-id="1284" instrument_node="">Become a Docent</span></h3><p data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">If you want to hang out with owls (and other animals) while educating others about these wonderful creatures, look into volunteering as a docent. Docents are volunteers who dedicate their time to help develop and produce materials and either visit classrooms or lead tours at a museum or zoo to teach people about various birds and animals. Look into any local museums, zoos, and sanctuaries to inquire about opportunities.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-12" data-dcnode-id="1278"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-12" data-dcnode-id="1279" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quo ;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-4329026bc9404bc595a5a3a7afcda3e4&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-16&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],[970,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;16&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;width&quot;:970,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;B&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;16&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;id&quot;:&quot;ad-4329026bc9404bc595a5a3a7afcda3e4&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1087"></phoenix-ad></div></aside><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">It's true that some animals do not belong in captivity but then I want to know why it is OK for falconers and educators, especially the latter. People tell me I shouldn't keep exotic pets ALL the time, why should I see your complaints as any different? I own solitary predators. It sounds to me that either raptors are like other exotic pets or they are so high-maintenance I question if falconers or 'educators' should be able to own them outside of professional oversight. Which is it?</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-20" data-dcnode-id="1080"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-20" data-dcnode-id="1081" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-f7117f22cb344a0cbf34d94ac5795a74&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-20&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;20&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;20&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-f7117f22cb344a0cbf34d94ac5795a74&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1082"></phoenix-ad></div></aside><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Yes, I get upset that falconers feel only hunters should be able to own these birds. Either these birds are suited for captivity or they aren't. I think I should have just as much of a right to own something as you would to hunt, even if that means I'd have to undergo training and paperwork, this process should NOT be restricted to people who hunt for pleasure. It sounds like if these birds do so badly in captivity maybe hunters should leave them alone too, and use dogs, ferrets, guns, or go to the damn grocery store.</span></p><p data-dcnode-id="1074"><strong data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">UK Falconry Center</span></strong><span data-dcnode-id="1075" instrument_node=""> on August 20, 2019:</span></p><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">As someone who’s worked with owls and is in the UK. Please, please, please.. understand that the amount of people who went through falconry courses to be able to receive experience with our hopes that they’d have a good start to falconry, completely took advantage of falconry. We offer to teach individuals the necessary material needed for good raptor husbandry with they hoped that they’ll be able to carry on with the sport but, unfortunately some folks finish their course, buy an owl, and never do anything with owl besides hold it. A barn owl here sells for 50€ whereas an Eagle owl maybe 200€ or less. I have seen so many escapees and abuse cases, I really wish there was a way to stop how easily available these birds are. The Harry Potter craze left so many abandoned owls to die. When your the one having to bring a beautiful owl into the vet to be euthanized because some idiot got tired of the owl and tossed it into the wild only to have it’s legs snapped in a trap. You’d understand why we wish our country would make stricter Laws. Our country does not care about the outcome of captive raptors and it’s devastating.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-17" data-dcnode-id="1069"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-17" data-dcnode-id="1070" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quo -dcnode-id="1059" instrument_node="">Raptor Educator</span></strong><span data-dcnode-id="1057" instrument_node=""> on August 20, 2019:</span></p><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">You maybe able to find a raptor available but they aren’t going to sell to someone who doesn’t have experience meaning “educational or falconry”. I feel like you’d have a better grasp and understanding for the ethics side of things if you go out with a falconer in the field and or maybe help someone in education. You could make all the points in the world to justify keeping them as pets but we are not the UK or Japan. We want whats best for these animals in the end. The idea that “If I want that animal, I should be able to have it! No exceptions! It’s my dream!” Is not a very good mindset to have in the animal field consider there’s animals that we can absolutely NOT have. I feel like you get irritated when By the mentioning of falconers. Why is that? They may get to own raptors but the amount of legal paper work and exams they put into being able to keep the birds is a lot and they can have them taken away if we don’t comply by regs. For any animal even certain dog breeds that have very high prey drives, it’s unfair to keep them cooped up. We as people treat wildlife as status symbols and possessions when we need to start putting our wants aside and thinking about what’s better for the animal. Will an owl thrive better with an experienced falconer than can help it hunt? Yes, can an experienced raptor educator use an owl as a tool to help educate the public about conservation? Yes, is it fair for an owl to be kept to the same standards of other exotic pets and be made readily available for people who have not a lick of experience to back them up? No, that leads to neglect, improper diet, poor weight management, and poor husbandry. Can you get experience? Definitely! But if your main goal is to get an owl, your not going to find many folks willing to teach you. You refuse to see that various raptor handlers, falconers, ACTUAL people who have worked with these animals for years, are giving you the truthful answer. You keep finding ways to surpass what everyone is saying. If you really think no one is going to go out of the way to buy an owl after reading this, than what was the reason for making the post at all?</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-18" data-dcnode-id="1051"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-18" data-dcnode-id="1052" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-84c929b037614b8484ec388dc5b75144&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-18&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&q  from captivity? This has to be the most bizarre claim of animal ambassador keepers. These animals don't hunt, so are you claiming this is cruel but a little education validates it? Do your birds suffer if you can't fly them as often as they do in the wild, but according to your human schedule whenever you feel like hunting?</span></p><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">'No need for permit' breeders: I have seen these ads and they appear to be willing to sell to the public, which contradicts the claim that you or someone else made that I won't be able to find a raptor. I feel some of the falconers in these comments are just fibbing because they WISH no one else could get a bird except them. I had someone tell me it's not even legal and cite a Texas law as their source. I don't think spreading incorrect information is the best way to go about persuading people from getting owls.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-24" data-dcnode-id="1007"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-24" data-dcnode-id="1008" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slo --fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-10946e284bbb4a0eb548a94ca6b48717&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-20&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],[970,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;20&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;width&quot;:970,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;B&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;20&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;id&quot;:&quot;ad-10946e284bbb4a0eb548a94ca6b48717&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="998"></phoenix-ad></div></aside><p data-dcnode-id="992"><strong data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Owl handler</span></strong><span data-dcnode-id="993" instrument_node=""> on August 19, 2019:</span></p><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">All in all owls aren’t made to be pets and because other countries have laws that allow people to get away with it, the US has a strict mindset on what’s best for raptors. Plus I would not try to make an enemy with falconers. They are lifelines when it comes to raptor emergencies. If they try to explain why something is a poor idea then it’s probably a poor idea. They’re aren’t just hunters either, some are vets, rehabbers, educators, conservationists, breeders, you name it. Falconers have the most knowledge on the health, upkeep, and husbandry of raptors than anyone and their views and advice should be taken seriously. If they say “owls are not pets.” They have the experience to back it up.</span></p><p data-dcnode-id="986"><strong data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Owl Handler</span></strong><span data-dcnode-id="987" instrument_node=""> on August 19, 2019:</span></p><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">The reason for seeing an over abundance owl always kept as “pets” in the UK is simply due people saying they want to get into falconry, getting the necessary paperwork and required education, and then throwing away the falconry part in order to obtain the owl which isn’t fair to the owl because although these animals remained perched and energy saving, the mental stimulation of hunting helps them live healthier lives because they are doing what they should be naturally doing. Owls and even other raptors in captivity are known to be destructive towards objects and themselves from damaging tail feathers, purposely flying into enclosure barriers, pulling out leg feathers, turning frustrations on keepers, and even becoming overweight and lazy. Most people in the UK feed their birds chicks which isin’t a very nutrient packed diet, raptors require and benefit more from natural quarry than low calorie chicks. Owls also do not like interaction despite the videos you may see, people breed imprints for the purpose of education and falconry so handlers have a somewhat human associated  bird to use for demonstrations but people have abused this and try to make them as companion animals. Imprinting alters how the owls see us and giving anyone the chance to own an imprint leads people to believe these birds are naturally cuddly and seek human attention. Another issue is, is that the UK is full of escapee owls due to people who buy these animals as pets, they are far harder than a macaw and people simply toss imprints into the wild to die from starvation or become invasive species. Another thing is although falconers do touch their birds, it’s far less than a pet keeper is going to be touching them. Our oil on our hands are not feather friendly. Also are also slow learners meaning they rely heavily on instinct. That means if an owl grabs you, it will not let go or put two and two together, you WILL have to have someone pry an owl off you and I’ve had it happen. I was crying. Next thing is, coping and making your own anklets! If you don’t know how to do either own your own, owning and owl is probably not best. There may be countries that don’t put the owls best interest at first but in the US we try hard to do what is ethically right for these animals. If they aren’t hunting or being used to teach the public about conservation, then what’s the quality of life for the owl? There’s passionate people who would love to have a pet owl but instead of owning one, they do things to help conserve them like work with them at organizations like I do. Working at a facility is legit like owning one in a sense, you are responsible for their upkeep like husbandry, feeding, weighing, medical work, all that stuff. The moment we start to say “I Want to have” we immediately are throwing aside what’s best for the owls. Unfortunately owning birds of prey is a privilege, reputable breeders will only sell to educational groups and falconers because they know their animal is going into the right hands and will not be treated as a pet. If you see a breeder saying “no need for permits! Not covered under MBTA” the breeder likely only cares about the money vrs the owl and the health quality of the owl sounds pretty iffy from someone who puts money before ethics (many raptors that are sold careless may already have bad temperament or genetic health issues.) if you really really want an owl then become a non profit educator, (it’s actually pretty simple) most breeders are very keep on conservation so I’m sure they’d be willing to sell to those who have prior experience and want to do what’s best for the owls. We have several organizations who have EEOs.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-21" data-dcnode-id="981"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-21" data-dcnode-id="982" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_tha ;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="980"></phoenix-ad></div></aside><aside class="m-in-content-ad-row l-inline not-size-a not-size-c not-size-d" data-ad-group="in_content-21" data-dcnode-id="975"><div class="m-in-content-ad not-size-a not-size-c not-size-d" data-ad-group="in_content-21" data-dcnode-id="976" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-c1615ab729cc49de8610895a20e7473d&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-21&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],[970,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;21&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;width&quot;:970,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;B&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;21&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;id&quot;:&quot;ad-c1615ab729cc49de8610895a20e7473d&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="977"></phoenix-ad></div></aside><p data-dcnode-id="971"><strong data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Melissa A Smith (author)</span></strong><span data-dcnode-id="972" instrument_node=""> from New York on August 18, 2019:</span></p><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Member of US Fish &amp; Wildlife: This article says nothing about it being legal to keep native owls, it very clearly states that is illegal. If someone tells me they got the idea to go eat rocks from this article I'll shrug my shoulders because that information doesn't exist just as much as the idea that it is OK to keep natives doesn't. It has nothing to do with me.</span></p><p data-dcnode-id="965"><strong data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Melissa A Smith (author)</span></strong><span data-dcnode-id="966" instrument_node=""> from New York on August 18, 2019:</span></p><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Rehabber John: I see nothing in this law that pertains to someone not being able to own an exotic owl. Falconry law doesn't apply to the general public, nor would it prohibit a falconer from obtaining an exotic bird of prey. Furthermore, this law appears to be a state law in Texas. It is not Federal. States can enact their own laws so if raptors aren't legal in TX, that is one thing. Most exotic pets are illegal in certain states. That is completely different.</span></p><p data-dcnode-id="959"><strong data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Melissa A Smith (author)</span></strong><span data-dcnode-id="960" instrument_node=""> from New York on August 18, 2019:</span></p><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Owl handler: I would love to talk but how can I talk on Instagram? That site is insufferable for discussions. You should write your information here. I'm interested in real information about raptors as pets, not hunting animals. They are freely kept that way in the UK, so what behavioral problems exist and can you provide an example of poor welfare in captivity? Why do their feathers become damaged while this isn't the case with other birds? I've seen falconers petting their birds before. As other birds are kept as pets (some issues do exist with this as well) I would like to know the differences. It sounds like you are coming from the perspective of a hunter over a pet owner, so is it possible that there is  some bias present over how they can be maintained?</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-22" data-dcnode-id="954"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-22" data-dcnode-id="955" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-5ba08e76727a45f3b0dd103d63f9c051&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-22&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;22&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;D&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;22&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&q rtisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="950"></phoenix-ad></div></aside><p data-dcnode-id="944"><strong data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Rehabber John</span></strong><span data-dcnode-id="945" instrument_node=""> on August 14, 2019:</span></p><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">You do know under</span></p><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">§65.267. Permit Privileges and Restrictions apprentice falconers can’t own imprints right? exotic owls you see in captivity are imprints meaning that Eurasian eagle owl you may want, you will not be able to legally possess. If an apprentice is unable to have imprint raptors, it also means that a person of the general public will also be unable to obtain one or even a bird of prey in general. These are just how the regulations are. Imprints are available to educational organizations, zoos, and general/master class falconers but that’s it.</span></p><p data-dcnode-id="936"><strong data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Owl handler</span></strong><span data-dcnode-id="937" instrument_node=""> on August 14, 2019:</span></p><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Actually this was posted on a falconry forum and it got very heated in there over this so they are likely different individuals. Hopefully I can explain this clearly. The reason most individuals shouldn’t  be owning owls is for the fact that they’re highly regulated, you need to know more than just exotic bird care in order handle these birds. The truth is, is that they aren’t pets for a majority of reasons, owls are solitary and do not seek human affection and even petting these owls can damage feathers due to our oils, they’re highly stressed animals that need the experience of a falconer vrs any old average Joe, the weight management for raptors is a lot different to weight management of other animals because a falconry is just a whole different thing altogether. The owls you see in videos are imprints (likely in the UK or japan) where laws are downplayed and many inexperienced people abuse these birds or decide to keep them only to remain their entire life without hunting, struggling with behavioral problems, and bad conditions. Unfortunately it’s harder to explain all of this in one comment but if you’re interested in discussing more I’d be glad to talk. My Instagram is thedirtygauntlet . :)</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-23" data-dcnode-id="931"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-23" data-dcnode-id="932" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-3aeb4d1042be4065bd9cf9f826a91d0d&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-23&quot;,&quot;slotC rk on August 14, 2019:</span></p><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Member of the North American Falconry Association: You devoted a small paragraph to telling me 'owls aren't pets' yet you're missing one very important piece of information: WHY?</span></p><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">WHY is it OK for an educator or hunter and not someone who just wants to be around a falcon? What ethics are you talking about? I'm completely willing to listen being inexperienced to this topic.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-24" data-dcnode-id="906"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-24" data-dcnode-id="907" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-a37388ddb5034f1e9348fee32a6b3dff&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content
