not-size-c not-size-d" data-ad-group="in_content-24" data-dcnode-id="900"><div class="m-in-content-ad not-size-a not-size-c not-size-d" data-ad-group="in_content-24" data-dcnode-id="901" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-aeadf4e3029c465a84c4d2fd977b5fef&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-24&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],[970,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;24&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;width&quot;:970,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;B&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;24&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;id&quot;:&quot;ad-aeadf4e3029c465a84c4d2fd977b5fef&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="902"></phoenix-ad></div></aside><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">I am, however, experienced on the topic of exotic pet ownership and the screwy mental gymnastics people display when they arbitrarily decide something can't be a pet.</span></p><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">I really hope that arrogance is not your only reason for your comment. I don't think anyone's 'cultural heritage' is more valid than my own pursuit of happiness. There's this crazy idea that I should have equal rights regardless of your feelings.</span></p><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Let me know why you think I am not entitled to the same rights as you.</span></p><p data-dcnode-id="890"><strong data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">General falconer</span></strong><span data-dcnode-id="891" instrument_node=""> on August 13, 2019:</span></p><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">I myself have a Eurasian eagle owl but bringing up “finding a sponsor” just to own an owl is absolutely ridiculous. I can tell you first had nobody will take you on as an apprentice if you only want to own an owl because that portrays falconry in a bad light. I’ve hunted and flown several birds and finally wanted an imprint owl. Owning raptors is by no means a right. It is a privilege and it’s why the regulations are very heavy in terms of owning or even working with them. In the end, breeders are not breeding these as pets, they are breeding these birds for falconry and education and it’s vital you understand that.</span></p><p data-dcnode-id="884"><strong data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Member of US Fish &amp; Wildlife</span></strong><span data-dcnode-id="885" instrument_node=""> on August 13, 2019:</span></p><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">I can tell you off the bat that your information you’re providing is literally fueling the general public into to keep illegal imprints they find either injured or fallen from the nest.. it’s a shame misleading articles like this exist. The people who do get eagle owls either have prior experience or are falconers but, are not kept as pets. I’d recommend talking to falconers and they can explain why these animals are not pets and can further educate you on the dangers of promoting them as such. Have a good day.</span></p><p data-dcnode-id="878"><strong data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Exotic Raptor Breeder/Falconer</span></strong><span data-dcnode-id="879" instrument_node=""> on August 13, 2019:</span></p><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">As a breeder or exotic owls and a falconer. This is a crock of shit. Obvious the original poster is not aware of what is expected of someone getting into falconry. I’ve bred Snowies, Eagle Owls, Spectacles, Barns, and Scops for over 20 years and I can tell you, breeders like me, and others in the US will not sell to anyone who isn’t a general/master falconer or educator. An apprentice may not own any imprint of any sort, this includes exotic imprints. Also a falconer will not take on a apprentice who’s only in it for a pet owl. Your comprehension is ridiculous.</span></p><p data-dcnode-id="872"><strong data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Member of the North American Falconry Association</span></strong><span data-dcnode-id="873" instrument_node=""> on August 13, 2019:</span></p><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Sorry to be the bringer of bad news, but experienced raptor handlers, falconers, and even vets pointed out that your article portrays owls as pets. Owls are not pets and yes, you can buy exotic owls, worked with plenty but no breeder will sell you one unless you’re a falconer or educator. Falconers will not take you as an apprentice if your main goal is to get a “pet owl” that’s just a slap in the face to falconers and educators. Your information is clearly incorrect and I’d recommend working along side educators or falconers to better understand ethics because you do not have the knowledge, experience, or mere understanding of laws and ethics surrounding raptor ownership. Threatening to “ban” a cultural heritage sport just because you can’t own an owl as a pet is absolutely childish. There’s some animals that you can’t keep as pets and you need to accept that.</span></p><p data-dcnode-id="866"><strong data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Melissa A Smith (author)</span></strong><span data-dcnode-id="867" instrument_node=""> from New York on August 11, 2019:</span></p><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Falconer/Raptor Educator: I think you are a joke if you actually believe that hunting is an acceptable freedom for people to have but pet keeping is somehow some degenerate activity. If we lose them as pets I will be the first person pushing legislators to ban falconry. Your comment is reprehensible.</span></p><p data-dcnode-id="860"><strong data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Falconer/Raptor Educator</span></strong><span data-dcnode-id="861" instrument_node=""> on August 11, 2019:</span></p><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Very poor poor advice as to make a whole article regarding the keeping of owls as pets. They aren’t pets. No sponsor will take you in if your goal is to own an owl. That makes falconry, falconry apprentices, and sponsors look like jokes. We only have these animals to hunt with them. Please took encourage stupid ideas to the general public about owning exotic owls because the last thing we need is people keeping them as pets.</span></p><p data-dcnode-id="854"><strong data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Lifemanship</span></strong><span data-dcnode-id="855" instrument_node=""> on August 06, 2019:</span></p><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">AJ, if you want a burrowing owl in your life, move to Pahrump NV. Some people have them living in their yards in the semi-rural areas.  Of course you can't steal a fledgling and keep it as a pet, but you could observe them when they emerge from their burrows. You might luck out and get a family of quail, too. Owl fans used to do an annual burrowing owl count. Maybe they still do. The people involved with that might know which properties have resident burrowing owls.</span></p><p data-dcnode-id="848"><strong data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Melissa A Smith (author)</span></strong><span data-dcnode-id="849" instrument_node=""> from New York on May 27, 2019:</span></p><p data-dcnode-id="845"><a data-dcnode-id="846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newildlife.org/oddpetvet/" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="847" instrument_node="">https://www.newildlife.org/oddpetvet/</span></a></p><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Dr. Rob Adamski, I'm disturbed by your message because you are an 'exotic pet veterinarian'. Are your clients aware that you believe that they are 'negligent', 'unethical', and 'reprehensible'? You may 'only' see clients with reptiles, pet birds, traditional pet rodents, ect., but would you like to explain to me the substantial difference between a pet parrot, which has the mind of a toddler, constantly demands attention and enrichment, and can live 15-80 years? Not to mention that these birds are frequently re-homed and have their own issues in captivity. The answer is that YOU CAN'T. Did you read my article? As far as the legal issues go, the article clearly states that all native owls are strictly illegal unless you have a falconer's permit.</span></p><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">So if someone decides to take a wild owl as a pet, how is that my fault? The article also clearly states how difficult it is to care for an owl. Pretty much the only legal owl that you can find in the pet trade without importing new species is a Eurasian eagle owl. Do you think it sounds likely that even 1% of my readers will consider buying a large owl like this, when I clearly state what it takes to own such an animal? And if someone decides they want to build a large enclosure and take on this challenge, more power to them. People like to keep exotic pets and I own many so-called wild animals as well. None of my information is incorrect or 'unethical'.</span></p><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">You're in the wrong field if you're against your clients and I think that is "reprehensible".</span></p><p data-dcnode-id="835"><strong data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Dr. Robert Adamski</span></strong><span data-dcnode-id="836" instrument_node=""> on May 26, 2019:</span></p><p data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">As a wildlife veterinarian, it is my professional</span></p><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">opinion, With all due respect, that publishing an article like this is reprehensible. Encouraging members of the public to take a wild animal as a pet not only borders on negligence but raises serious animal welfare and ethical concerns not to mention the myriad of potential legal issues. We deal with the repercussions of beliefs and actions fostered by articles like this on a daily basis when members of the public abandon their “wildlife pets” once they realize they do not make good pets. As an college educated member of society with a background in veterinary medicine you should know better. Shame on you for publishing such an article as this. It is the height of irresponsibility.</span></p><p data-dcnode-id="827"><strong data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Me</span></strong><span data-dcnode-id="828" instrument_node=""> on May 10, 2019:</span></p><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">I really want an owl!!!!!!!</span></p><p data-dcnode-id="821"><strong data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Brandy</span></strong><span data-dcnode-id="822" instrument_node=""> on December 17, 2018:</span></p><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">You can love something without being in possession of it.</span></p><p data-dcnode-id="815"><strong data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Angel</span></strong><span data-dcnode-id="816" instrument_node=""> on October 03, 2018:</span></p><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Oh my God finally I find good information!!!!</span></p><p data-dcnode-id="809"><strong data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Ayush</span></strong><span data-dcnode-id="810" instrument_node=""> on May 24, 2018:</span></p><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Snowy owls rock</span></p><p data-dcnode-id="803"><strong data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Anden</span></strong><span data-dcnode-id="804" instrument_node=""> on May 09, 2018:</span></p><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">And an English Mastiff can bite with a force of 500psi with it's sharp pointy teeth meant for squeezing the life from human intruders, doesn't stop the general public from owning Mastiff dogs.</span></p><p data-dcnode-id="797"><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Toph</span></strong><span data-dcnode-id="798" instrument_node=""> on May 08, 2018:</span></p><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Melissa, the talons of the Eurasian owl are capable of exerting around a very generalized 360 psi of pressure.  You probably couldnt squeeze out 100 on a good day.  Now combine that with sharp pointy talons meant for squeezing the life from small animals and puncturing vital organs... they're not for the general public.</span></p><p data-dcnode-id="791"><strong data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Kristofer</span></strong><span data-dcnode-id="792" instrument_node=""> on May 07, 2018:</span></p><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">How much is an owl a little one though because I love owls there so cute</span></p><p data-dcnode-id="785"><strong data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">cody</span></strong><span data-dcnode-id="786" instrument_node=""> on May 04, 2018:</span></p><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">do you have a owl</span></p><p data-dcnode-id="779"><strong data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Ava</span></strong><span data-dcnode-id="780" instrument_node=""> on March 20, 2018:</span></p><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Well than how can you become a falconer?</span></p><p data-dcnode-id="773"><strong data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Melissa A Smith (author)</span></strong><span data-dcnode-id="774" instrument_node=""> from New York on March 11, 2018:</span></p><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Why is using them to hunt or teach so OK but not pet ownership? That's stupid.</span></p><p data-dcnode-id="767"><strong data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Clare</span></strong><span data-dcnode-id="768" instrument_node=""> on March 09, 2018:</span></p><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Raptors aren’t pets. Any responsible breeder will never sell a bird to clueless people. No body has any business keeping birds of prey unless you are a falconer or an educator.</span></p><p data-dcnode-id="761"><strong data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">bookpaw</span></strong><span data-dcnode-id="762" instrument_node=""> on February 20, 2018:</span></p><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">cool</span></p><p data-dcnode-id="755"><strong data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">anz</span></strong><span data-dcnode-id="756" instrument_node=""> on January 26, 2018:</span></p><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">I own a northern hawk owl that i rescued from the clutches of a coyote. It was a young bird unable to fly and would have been dinnner for the coyote if i had not stopped this.  Anubus the owl lives and travels with my wife and me for the last ten months. Anubus is the best pet we have ever owned and has become the third person in our relationship lol. But seriously we share our house and bedroom with anubus and there is nothing that the two of wouldn't do to keep our bird happy and healthy. Also people should understand that you need to be a self employed person or retired as the bird needs a lot of time spent with it. I would advise against owning one if you cannot provide this.  Diet is also expensive. Mice chicken partridge salmon and it all has to be fresh.</span></p><p data-dcnode-id="749"><strong data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">savanna</span></strong><span data-dcnode-id="750" instrument_node=""> on January 13, 2018:</span></p><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">I'm used to thawing dead rodent's and handling bird's and I have outdoor space, so an owl would be ideal.</span></p><p data-dcnode-id="743"><strong data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Heidi</span></strong><span data-dcnode-id="744" instrument_node=""> on January 06, 2018:</span></p><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">The only Owl that I am interested in is the Sunda Scops Owl.</span></p><p data-dcnode-id="737"><strong data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Carolyn Leigh Brown</span></strong><span data-dcnode-id="738" instrument_node=""> on December 18, 2017:</span></p><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">The Right kind owl even if it is a toy owl from the wizard if world of Harry Potter</span></p><p data-dcnode-id="731"><strong data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Kaycee</span></strong><span data-dcnode-id="732" instrument_node=""> on December 07, 2017:</span></p><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">@CS raptors most certainly can be kept as pets, anything is a pet if you own and care for it yourself.</span></p><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">The relationship falconers have with their birds is exceptionally unique, it’s a working relationship...  it’s not the same as pet owners for sure. Although, utilizing falconry trainings techniques is a must for owning any bird of prey.</span></p><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Owning a bird of prey is most certainly not something to be taken lightly. These birds require rigorous care and maintenance to maintain their health.</span></p><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">But, that doesnt make them “not pets”.</span></p><p data-dcnode-id="719"><strong data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">CS</span></strong><span data-dcnode-id="720" instrument_node=""> on November 16, 2017:</span></p><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">I really would never advise anyone to take on the mentality that any species of raptor can be considered a 'pet.' I'm a falconer and I work with exotics as a living. The raptors I work with are not pets, nor are the educational raptors. The relationship one has with a raptor is completely different.</span></p><p data-dcnode-id="713"><strong data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">AP</span></strong><span data-dcnode-id="714" instrument_node=""> on August 02, 2017:</span></p><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">The only owl I want is a burrowing owl, which from what I've seen can be kept in houses, since they live in prairie dog or tortoise burrows and prefer running and hopping to flying.  Unfortunately, they're very much a native owl.  They are however very common as pets across the pond.  This and the federal ban on banded mongooses and meerkats (though I know I hypothetically could have a kusimanse here if I could find one for sale) are probably the two biggest reasons I fantasize about moving to Scotland or Wales.</span></p><p data-dcnode-id="707"><strong data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Kaycee</span></strong><span data-dcnode-id="708" instrument_node=""> on May 17, 2017:</span></p><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Owls are very interesting, I'd love to own one someday when I have the money to but both the animal (Eurasian eagle owls are $4,000, like you said, and an enclosure would be $700+) and the owners of them I've talked to say it's around $200  month to feed them.</span></p><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Thanks for the article!</span></p><p data-dcnode-id="699"><strong data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Melissa A Smith (author)</span></strong><span data-dcnode-id="700" instrument_node=""> from New York on May 14, 2017:</span></p><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">The answers you seek are in the article. It is not a light undertaking.</span></p><p data-dcnode-id="693"><strong data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">DawnNyoka</span></strong><span data-dcnode-id="694" instrument_node=""> on May 13, 2017:</span></p><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">I would love to have an owl for a pet!!!  They are just gorgeous!!</span></p><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">How would I go about owning one?</span></p><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Many thanks,</span></p></div><div class="m-detail--sponsor" data-dcnode-id="685"></div><footer class="m-detail--footer" data-dcnode-id="668"><div class="m-detail--meta" data-dcnode-id="683"><div class="m-description--list" data-dcnode-id="684"></div></div><aside class="m-detail--author-box" data-dcnode-id="669"><div class="m-detail--author-content" data-dcnode-id="670"><div class="m-detail--author-byline" data-dcnode-id="677"><div class="m-detail--author-byline-label" data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">By</span></div><span data-dcnode-id="
