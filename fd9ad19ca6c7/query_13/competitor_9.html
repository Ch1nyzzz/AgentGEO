</span><div class="" data-dcnode-id="507" data-fragments-editor-item-id="10061-9120408" data-fragments-editor-item-type="fragments-editor-mapped-item"><span data-dcnode-id="684" instrument_node="">
</span><div class="journal-content-article" data-analytics-asset-id="9120406" data-analytics-asset-title="Fox welfare" data-analytics-asset-type="web-content" data-dcnode-id="509"><span data-dcnode-id="683" instrument_node="">

</span><img alt="fox crouching low on fence © RSPCA" data-dcnode-id="680" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rspca.org.uk/documents/1494939/0/1167834-fox-on-fence-banner_990x350.jpg/9d1d2926-f628-7b0b-5321-66f4d96612e8%3Ft%3D1648646540323&amp;raw" title="fox crouching low on fence © RSPCA"><span data-dcnode-id="679" instrument_node="">
</span></div><span data-dcnode-id="677" instrument_node="">
</span><div class="contents portlet-type-articlePortlet accordian-portlet-1" data-dcnode-id="559"><span data-dcnode-id="676" instrument_node="">
</span><div class="title" data-dcnode-id="672"><span data-dcnode-id="675" instrument_node="">
</span><h1 data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Fox welfare
    </span></h1></div><span data-dcnode-id="671" instrument_node="">
</span><div class="body" data-dcnode-id="561"><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Foxes are one of Britain's most popular mammals, and they're a common sight in both countryside and urban areas. This page should help answer some of the questions that might be 'foxing' you!</span></p><span data-dcnode-id="667" instrument_node="">
</span><h2 data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Helping your local foxes</span></h2><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="663" instrument_node="">Want to help the foxes in your area? Or perhaps you want to deter them from your garden? Our </span><a data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rspca.org.uk/documents/1494939/7712578/Living%2Bwith%2Bfoxes%2B%2528PDF%2B419KB%2529.pdf/a4ecd8c9-1d64-b6a3-51ef-a755499c9082%3Ft%3D1559136716127" target="_blank"><span data-dcnode-id="662" instrument_node="">Living with Foxes</span></a><span data-dcnode-id="660" instrument_node="">&nbsp;info sheet has all&nbsp;you need to help you live alongside foxes. You can also get some handy booklets on urban and rural foxes from </span><a data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/organisations/natural-england" target="_blank"><span data-dcnode-id="659" instrument_node="">Natural England</span></a><span data-dcnode-id="657" instrument_node="">.</span></p><span data-dcnode-id="655" instrument_node="">
</span><h2 data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Found a fox in need of help?</span></h2><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="651" instrument_node="">As many as </span><strong data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">100,000 foxes may be killed on roads</span></strong><span data-dcnode-id="648" instrument_node=""> each year in the UK, and many more are injured. We care for and rehabilitate injured and orphaned foxes at our </span><a data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rspca.org.uk/whatwedo/care/wildlifecentres"><span data-dcnode-id="647" instrument_node="">wildlife centres</span></a><span data-dcnode-id="645" instrument_node="">.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="642" instrument_node="">Find out what to do with an </span><a data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rspca.org.uk/adviceandwelfare/wildlife/injuredanimals"><span data-dcnode-id="641" instrument_node="">injured or sick fox</span></a><span data-dcnode-id="639" instrument_node=""> or if you are concerned about a </span><a data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rspca.org.uk/adviceandwelfare/wildlife/orphanedanimals/foxcubs"><span data-dcnode-id="638" instrument_node="">fox cub</span></a><span data-dcnode-id="636" instrument_node="">.</span></p><span data-dcnode-id="634" instrument_node="">
</span><h2 data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Found a fox caught in a snare?</span></h2><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="630" instrument_node="">If the fox is still alive, call us on </span><strong data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">0300 1234 999</span></strong><span data-dcnode-id="627" instrument_node="">.</span></p><span data-dcnode-id="625" instrument_node="">
</span><ul data-dcnode-id="608"><span data-dcnode-id="624" instrument_node="">
</span><li data-dcnode-id="620"><strong data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Never try to free an animal from a snare or trap</span></strong><span data-dcnode-id="621" instrument_node=""> - you risk hurting yourself and the animal, and it could be an offence if the animal was legally caught</span></li><span data-dcnode-id="619" instrument_node="">
</span><li data-dcnode-id="615"><strong data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Stay back </span></strong><span data-dcnode-id="616" instrument_node="">to avoid stressing the animal</span></li><span data-dcnode-id="614" instrument_node="">
</span><li data-dcnode-id="610"><strong data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Call us immediately</span></strong><span data-dcnode-id="611" instrument_node=""> with the location</span></li><span data-dcnode-id="609" instrument_node="">
</span></ul><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="606" instrument_node="">We're opposed to the use of snares, but some types are still legal. </span><a data-dcnode-id="604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/organisations/department-for-environment-food-rural-affairs" target="_blank"><span data-dcnode-id="605" instrument_node="">Defra</span></a><span data-dcnode-id="603" instrument_node=""> has published a code of practice for using snares.</span></p><span data-dcnode-id="601" instrument_node="">
</span><h2 data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Do you suspect a fox has been poisoned?&nbsp;</span></h2><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="597" instrument_node="">It's </span><strong data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">illegal to poison</span></strong><span data-dcnode-id="594" instrument_node=""> foxes. The government's </span><a data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hse.gov.uk/pesticides/" target="_blank"><span data-dcnode-id="593" instrument_node="">Wildlife Incident Investigation Scheme</span></a><span data-dcnode-id="591" instrument_node=""> looks into the deaths of wildlife where pesticide poisoning may be involved.</span></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Signs to look out for include:</span></p><span data-dcnode-id="586" instrument_node="">
</span><ul data-dcnode-id="572"><span data-dcnode-id="585" instrument_node="">
</span><li data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Dead animals like rabbits cut open and staked out as bait&nbsp;</span></li><span data-dcnode-id="582" instrument_node="">
</span><li data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Several dead animals close together, such as rabbits</span></li><span data-dcnode-id="579" instrument_node="">
</span><li data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Animals that have died suddenly for no obvious reason</span></li><span data-dcnode-id="576" instrument_node="">
</span><li data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Eggs in unusual places, possibly with an ink mark</span></li><span data-dcnode-id="573" instrument_node="">
</span></ul><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="570" instrument_node="">If you find an animal that you suspect has been poisoned, or find evidence of a pesticide that puts wildlife or pets at risk, contact the </span><strong data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Wildlife Incident Investigation Scheme Hotline on 0800 321 600</span></strong><span data-dcnode-id="567" instrument_node="">.</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Follow the links below for more advice on helping your local wildlife.</span></p><span data-dcnode-id="562" instrument_node="">
