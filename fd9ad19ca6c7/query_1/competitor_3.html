</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1230" id="mntl-sc-block_1-0-9"><span data-dcnode-id="1231" instrument_node="">
Russian toy dogs are bred from the English toy terrier, a tiny dog breed that members of the Russian aristocracy raised as companions. During the Russian revolution, the breed was transformed and almost eliminated. The resulting dogs looked entirely different than their English toy terrier predecessors, so they were renamed Russian toys.
</span></p><span data-dcnode-id="1229" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1218" id="mntl-sc-block_1-0-10"><div class="comp ad-group--sc__ad-4 div mntl-block" data-dcnode-id="1219" id="ad-group--sc__ad-4_1-0"><span data-dcnode-id="1228" instrument_node="">

Russian Toy dogs were originally all short-haired, but in the mid-1900s, a long-haired dog was also bred. This new variety not only has a longer coat, but also boasts fringe on its ears, tail, and the backs of its legs.

This breed wasn't really known outside of Russia until the 1990s, when it started making its way to other countries, including the United States. Since then, Russian toys have become increasingly popular in the United States, thanks to their close resemblance to the </span><a data-component="link" data-dcnode-id="1199" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/breed-profile-chihuahua-1117953"><span data-dcnode-id="1200" instrument_node="">Chihuahua</span></a><span data-dcnode-id="1198" instrument_node=""> and their fun personality. The American Kennel Club and United Kennel Club both recognized this breed officially in 2008.
</span></p><span data-dcnode-id="1196" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1185" id="mntl-sc-block_1-0-14"><div class="comp ad-group--sc__ad-6 div mntl-block" data-dcnode-id="1186" id="ad-group--sc__ad-6_1-0"><span data-dcnode-id="1195" instrument_node="">

Russian toys are a relatively low-maintenance breed, thanks in part to their petite size. Still, providing them with proper care—including diet and exercise—is of utmost importance in order for them to live a healthy and happy life.</span><br data-dcnode-id="1174"><span data-dcnode-id="1173" instrument_node="">

</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1143" id="mntl-sc-block_1-0-19"><span data-dcnode-id="1150" instrument_node="">
Russian toy dogs are a high-energy breed, so plan to provide your pup with plenty of exercise and entertainment. Since these dogs are so small, you won't have to hike miles to tire them out, so meeting their exercise and mental stimulation needs isn't too challenging—you can even play </span><a data-component="link" data-dcnode-id="1148" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/indoor-activities-for-your-dog-1118380"><span data-dcnode-id="1149" instrument_node="">fetch indoors</span></a><span data-dcnode-id="1147" instrument_node=""> with them! It's tempting to think that a Russian toy might make a good "purse dog," but these dogs are inquisitive and energetic. They'd much rather </span><a data-component="link" data-dcnode-id="1145" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/best-dog-leashes-4152097"><span data-dcnode-id="1146" instrument_node="">walk alongside</span></a><span data-dcnode-id="1144" instrument_node=""> you than ride in a purse.
</span></p><span data-dcnode-id="1142" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1131" id="mntl-sc-block_1-0-20"><div class="comp ad-group--sc__ad-8 div mntl-block" data-dcnode-id="1132" id="ad-group--sc__ad-8_1-0"><span data-dcnode-id="1141" instrument_node="">

</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1117" id="mntl-sc-block_1-0-22"><span data-dcnode-id="1121" instrument_node="">
Both smooth-haired and long-haired versions of this breed are easy to groom, but a long-haired dog will require more frequent grooming. Use a soft brush to brush out the coat daily to maintain the coat's health of a long-haired dog. A short-haired dog can do well with less frequent grooming and may benefit from a rubdown with a soft cloth to remove dirt and debris. </span><a data-component="link" data-dcnode-id="1119" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/dog-grooming-basics-1118398"><span data-dcnode-id="1120" instrument_node="">Regular grooming</span></a><span data-dcnode-id="1118" instrument_node=""> is important in helping prevent mats, especially in longhaired dogs.
</span></p><span data-dcnode-id="1116" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1115" id="mntl-sc-block_1-0-23"></div><span data-dcnode-id="1114" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1100" id="mntl-sc-block_1-0-24"><span data-dcnode-id="1113" instrument_node="">
You'll also need to bathe your dog regularly. A monthly (or more) bath with a </span><a data-component="link" data-dcnode-id="1111" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/best-dog-shampoos-4164786"><span data-dcnode-id="1112" instrument_node="">quality dog shampoo </span></a><span data-dcnode-id="1110" instrument_node="">and coat conditioner can help to keep their coat in good condition. Regular </span><a data-component="link" data-dcnode-id="1108" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/how-to-trim-your-dogs-nails-1118395"><span data-dcnode-id="1109" instrument_node="">nail trims</span></a><span data-dcnode-id="1107" instrument_node=""> and </span><a data-component="link" data-dcnode-id="1105" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/dental-care-for-your-dog-1117857"><span data-dcnode-id="1106" instrument_node="">dental cleanings</span></a><span data-dcnode-id="1104" instrument_node=""> are also important in maintaining a Russian Toy's health. You should gently </span><a data-component="link" data-dcnode-id="1102" data-ordinal="4" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/how-to-clean-your-dogs-ears-1118393"><span data-dcnode-id="1103" instrument_node="">clean their ears</span></a><span data-dcnode-id="1101" instrument_node=""> once a week, making sure to take notice if their ears are red, smelly, or leaking in any way, as these can all be signs of a serious infection.
</span></p><span data-dcnode-id="1099" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1098" id="mntl-sc-block_1-0-25"></div><span data-dcnode-id="1097" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1096" id="toc-training"></span><span data-dcnode-id="1095" instrument_node=""> </span><h3 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1090" id="mntl-sc-block_1-0-26"><span data-dcnode-id="1094" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node=""> Training </span></span><span data-dcnode-id="1091" instrument_node=""> </span></h3><span data-dcnode-id="1089" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1087" id="mntl-sc-block_1-0-27"><span data-dcnode-id="1088" instrument_node="">
These dogs are intelligent and thus are relatively easy to train. It's best to start training them when they're young, especially since this breed can get a bit headstrong and stubborn. They respond well to training with help from plenty of treats and positive reinforcement.
</span></p><span data-dcnode-id="1086" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1085" id="mntl-sc-block_1-0-28"></div><span data-dcnode-id="1084" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1083" id="toc-common-health-problems"></span><span data-dcnode-id="1082" instrument_node=""> </span><h2 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1077" id="mntl-sc-block_1-0-29"><span data-dcnode-id="1081" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node=""> Common Health Problems </span></span><span data-dcnode-id="1078" instrument_node=""> </span></h2><span data-dcnode-id="1076" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1074" id="mntl-sc-block_1-0-30"><span data-dcnode-id="1075" instrument_node="">
The Russian toy is a relatively new breed, so there are few common health problems with the breed that have been documented. Because Russian toys are so small, they can be prone to bone fractures from incidents like falling off of a piece of furniture or jumping out of a car. It's important to keep this risk in mind when handling these small dogs and any children in the home also need to be taught safe handling techniques. If larger dogs live in the home, they could also risk the Russian toy's safety, so only supervised interaction is recommended. Beyond that, there are a few common health issues that the Russian toy may encounter. They include:
