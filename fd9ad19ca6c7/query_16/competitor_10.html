"><span class="iconFiller" data-dcnode-id="297"><span class="spaceManWilly" data-dcnode-id="298"><i class="sw swp_twitter_icon" data-dcnode-id="301"></i><span class="swp_share" data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Tweet</span></span></span></span></span></a></div><div class="nc_tweetContainer swp_share_button swp_pinterest" data-dcnode-id="286" data-network="pinterest"><a class="nc_tweet swp_share_link noPop" data-dcnode-id="287" onclick="var e=document.createElement('script');

 " rel="nofollow noreferrer noopener"><span class="swp_count swp_hide" data-dcnode-id="288"><span class="iconFiller" data-dcnode-id="289"><span class="spaceManWilly" data-dcnode-id="290"><i class="sw swp_pinterest_icon" data-dcnode-id="293"></i><span class="swp_share" data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Pin</span></span></span></span></span></a></div><div class="nc_tweetContainer swp_share_button total_shares total_sharesalt" data-dcnode-id="281"><span class="swp_count" data-dcnode-id="282"><span data-dcnode-id="285" instrument_node="">0 </span><span class="swp_label" data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Shares</span></span></span></div></div><p data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">If you keep chickens and want to keep foxes away, then dogs could be something to consider as a deterrent. Perhaps foxes are messing your property up, and you just want to get rid of them. Whatever the situation, this guide has been written to explain whether dogs keep foxes away, and if dog urine, poop, and hair also acts as a deterrent.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="277" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><div class="adthrive" data-dcnode-id="275" id="cls-video-container-pXoUYTEG" style="min-height: 381.375px;"><div data-dcnode-id="276"></div></div><h2 data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Will dogs keep foxes away?</span></h2><p data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">I’ve read lots of online forums about what people saying about keeping foxes away by using dogs. There’s a common theme that runs through all of them; not many people have succeeding in using a dog to deter a fox in their garden or yard.</span></p><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">A lot of comments mentioned how by just having a dog barking in your house it’s unlikely to deter a fox. Urban foxes are particularly bold these days and have no real fear regarding loud noises as they are used to living in close proximity to humans.</span></p><p data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Other people also said they had lets dogs run loose in their gardens and yards for a lot of the day, and even these measures didn’t make a difference. The foxes would still come back once the dogs went indoors for the night.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="266" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Based on this experience, I would say that dogs don’t keep foxes away, and their scent or activity alone probably isn’t going to scare away foxes.</span></p><p data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">But what about other things like dog poop, dog urine, and dog hair? Will these keep foxes away?</span></p><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">To find out I spoke with neighbors of mine who all keep chickens in their garden and have had problems with foxes in the past. Over a period of 3 months we decided to test the various dog deterrents with the following results.</span></p><h3 data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Will dog hair keep foxes away?</span></h3><p data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">The test involved winding dog hair around the chickens fencing. We didn’t just use the hair of one dog though, but got hair from both male and female dogs, and also a variety dog breeds from friends.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="255" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><p data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Unfortunately, the dog hair did not keep the foxes away and proved to be no deterrent whatsoever.</span></p><h3 data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Does dog urine keep foxes away?</span></h3><p data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">Another tip you might find online is how dog urine deters foxes. This was a hard one to test as you can’t really get dog urine unless you are really quick!</span></p><p data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">We heard that male dog urine works best, from an un-neutered dog.</span></p><p data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">How we did it was by tethering my dog and my neighbour’s dog to the back fence, gave them a large bowl of water and left them for couple of hours in the shade. They will then inevitably urinate near the fox entrance.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="244" id="AdThrive_Content_4_desktop" style="min-height: 250px;"></div><p data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">As with the dog hair, dog urine also didn’t keep the foxes away as they came in under the fence the very same night where the urine was.</span></p><blockquote data-dcnode-id="233"><p data-dcnode-id="234"><em data-dcnode-id="235"><strong data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Handy Hint:</span></strong><span data-dcnode-id="239" instrument_node=""> Foxes have been </span><a data-dcnode-id="237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doggysaurus.com/will-fox-attack-dog-eat-dog/"><span data-dcnode-id="238" instrument_node="">known to attack small dogs</span></a><span data-dcnode-id="236" instrument_node="">, and here are some press reports of recent cases.</span></em></p></blockquote><h3 data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Will dog poop keep foxes away?</span></h3><p data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">The last test was simple enough; we positioned dog poop around the perimeter of the chicken fencing over night to see if the foxes would be scared. As you might have already guessed, that night we saw foxes prowling the outside of the chicken coop, completely oblivious to the dog poop.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="228" id="AdThrive_Content_5_desktop" style="min-height: 250px;"></div><p data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">To conclude, dog poop does not keep foxes away and was no form of deterrent at all.</span></p><blockquote data-dcnode-id="217"><p data-dcnode-id="218"><em data-dcnode-id="219"><strong data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">Handy Hint:</span></strong><span data-dcnode-id="223" instrument_node=""> Do you have a dog that loves to eat fox poo? If you, please try to stop it </span><a data-dcnode-id="221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doggysaurus.com/why-dogs-eat-fox-poo/"><span data-dcnode-id="222" instrument_node="">because it might make them ill</span></a><span data-dcnode-id="220" instrument_node=""> as you can learn here.</span></em></p></blockquote><h2 data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">What dogs keep foxes away then?</span></h2><p data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">The only way in which dogs will keep a fox away will be if the dog is physically in the garden at the time the fox tries to enter. Most dogs will chase up to the fox, and the fox will quickly run off as they will be scared of the confrontation.</span></p><p data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">But of course, keeping your dog loose in your garden 24 hours a day is completely impractical for most people, so you need an alternative deterrent that works.</span></p><p data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">And you can see those below.</span></p><h2 data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">Alternative fox deterrents that work</span></h2><p data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">The best repellent isn’t actually a repellent at all, but simply means you secure your chicken coop better. If you still have problems, the following recommendation might help:</span></p><h3 data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">Ultrasonic animal deterrent</span></h3><p data-dcnode-id="197"><span data-dcnode-id="202" instrument_node="">This small machine is simply to set-up and works by emitting flashing lights and sounds that we can’t hear but are irritable to foxes and other pests. You can </span><strong data-dcnode-id="199"><a data-dcnode-id="200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/DURANOM-Ultrasonic-Activated-Repellent-Deterrent/dp/B07DLRDZYB/ref%3Das_li_ss_tl%3Fie%3DUTF8%26linkCode%3Dll1%26tag%3Ddoggysaurus-20%26linkId%3D47cc26620730b4a63a2f9860b36893f8%26language%3Den_US" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="201" instrument_node="">buy this on Amazon</span></a></strong><span data-dcnode-id="198" instrument_node="">.</span></p><p data-dcnode-id="193"><a data-dcnode-id="195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Ultrasonic-Repeller-Waterproof-Effective-Squirrels/dp/B083SPXG3B/ref%3Das_li_ss_il%3Fie%3DUTF8%26linkCode%3Dli3%26tag%3Ddoggysaurus-20%26linkId%3D3cfe128919e859d072fa2d3d78275c08%26language%3Den_US" rel="noopener noreferrer" target="_blank"><img border="0" data-dcnode-id="196" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ws-na.amazon-adsystem.com/widgets/q%3F_encoding%3DUTF8%26ASIN%3DB083SPXG3B%26Format%3D_SL250_%26ID%3DAsinImage%26MarketPlace%3DUS%26ServiceVersion%3D20070822%26WS%3D1%26tag%3Ddoggysaurus-20%26language%3Den_US&amp;raw"></a><img alt="" border="0" data-dcnode-id="194" height="1" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ir-na.amazon-adsystem.com/e/ir%3Ft%3Ddoggysaurus-20%26language%3Den_US%26l%3Dli3%26o%3D1%26a%3DB083SPXG3B&amp;raw" style="border: none !important; margin: 0px !important;" width="1"></p><p data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">There’s a solar panel on it which means you can leave it out to charge by itself. It has a range of 9 meters, and an angle sensor letting it have a wide coverage.</span></p><p data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">It doesn’t just deter foxes but is also said to work on other pests you want to get rid of such as rats, moles, squirrels, and coyotes.</span></p><h3 data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">Remove any food sources</span></h3><p data-dcnode-id="182"><span data-dcnode-id="186" instrument_node="">Another reason that foxes will frequent your property is if they have a readily available food source. To prevent this, keep your dog’s food out of your garden or yard, as it will attract hungry foxes. Some people will even </span><a data-dcnode-id="184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doggysaurus.com/can-foxes-eat-dog-food/"><span data-dcnode-id="185" instrument_node="">leave dog food out for foxes to eat</span></a><span data-dcnode-id="183" instrument_node="">. Don’t do this if you want them to leave your garden alone.</span></p><h2 data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">Conclusion</span></h2><p data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">Unfortunately, dogs don’t have a great track record in keeping foxes away unless the see them in the moment and chase them off. The simple scent of a dog doesn’t seem to act as a deterrent so you will need to take different measure to rid your property of the fox problem.</span></p><h4 data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">You might also like…</span></h4><p data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">I regularly blog about dogs and their relationships with other animals, here’s a selection of some of the most relevant to your search:</span></p><ul data-dcnode-id="164"><li data-dcnode-id="171"><a data-dcnode-id="172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doggysaurus.com/can-foxes-give-dogs-diseases-sick/"><span data-dcnode-id="173" instrument_node="">How foxes can make dogs sick</span></a></li><li data-dcnode-id="168"><a data-dcnode-id="169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doggysaurus.com/do-dogs-get-along-with-chickens/"><span data-dcnode-id="170" instrument_node="">Do dogs get along with chickens without attacking them?</span></a></li><li data-dcnode-id="165"><a data-dcnode-id="166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doggysaurus.com/can-dogs-get-sick-from-chickens/"><span data-dcnode-id="167" instrument_node="">Can dogs get sick from being around chickens?</span></a></li></ul><div class="swp_social_panel swp_horizontal_panel swp_flat_fresh swp_default_full_color swp_individual_full_color swp_other_full_color scale-100 scale-" data-dcnode-id="134" data-float="none" data-float-color="#ffffff" data-float-mobile="none" data-min-width="1100" data-post-id="1158" data-transition="slide"><div class="nc_tweetContainer swp_share_button swp_facebook" data-dcnode-id="156" data-network="facebook"><a class="nc_tweet swp_share_link" data-dcnode-id="157" data-link="https://www.facebook.com/share.php?u=https%3A%2F%2Fdoggysaurus.com%2Fdo-dogs-keep-foxes-away%2F" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/share.php%3Fu%3Dhttps%253A%252F%252Fdoggysaurus.com%252Fdo-dogs-keep-foxes-away%252F" rel="nofollow noreferrer noopener" target="_blank"><
