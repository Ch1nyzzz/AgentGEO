rel="nofollow noreferrer noopener" target="_blank"><span class="swp_count swp_hide" data-dcnode-id="405"><span class="iconFiller" data-dcnode-id="406"><span class="spaceManWilly" data-dcnode-id="407"><i class="sw swp_twitter_icon" data-dcnode-id="410"></i><span class="swp_share" data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Tweet</span></span></span></span></span></a></div><div class="nc_tweetContainer swp_share_button swp_pinterest" data-dcnode-id="395" data-network="pinterest"><a class="nc_tweet swp_share_link noPop" data-dcnode-id="396" onclick="var e=document.createElement('script');

 document.body.appendChild(e);
 " rel="nofollow noreferrer noopener"><span class="swp_count swp_hide" data-dcnode-id="397"><span class="iconFiller" data-dcnode-id="398"><span class="spaceManWilly" data-dcnode-id="399"><i class="sw swp_pinterest_icon" data-dcnode-id="402"></i><span class="swp_share" data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Pin</span></span></span></span></span></a></div><div class="nc_tweetContainer swp_share_button total_shares total_sharesalt" data-dcnode-id="390"><span class="swp_count" data-dcnode-id="391"><span data-dcnode-id="394" instrument_node="">0 </span><span class="swp_label" data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Shares</span></span></span></div></div><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Growing numbers of people are deciding to keep chickens in their back yards and gardens, but with that comes a lot of responsibility. One aspect that is often overlooked though, is just how well dogs get on with chickens and whether they can live together in harmony.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="386" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><div class="adthrive" data-dcnode-id="384" id="cls-video-container-pXoUYTEG" style="min-height: 381.375px;"><div data-dcnode-id="385"></div></div><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Of course, some dogs can be friends with chickens, but you’re still dealing with animal instincts to hunt prey and eat meat… meaning it’s not always as simple as letting both animals live in close proximity to each other.</span></p><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">In this helpful guide I aim to explain to you whether dogs get along with chickens, what breeds are best, and how to take steps to ensure that your dog does not kill your birds.</span></p><h2 data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Can chickens and dogs live together?</span></h2><p data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">You can keep chickens if you have a dog, and in fact it’s extremely popular and plenty of people do it. Having said that, I would not recommend you have dogs running free when chickens are walking about free range, as this increase the risk of a problem.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="375" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><p data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">But to press the point home; have you ever known of a farm that doesn’t have a dog and chickens in it? No, exactly, so humankind has been keeping chickens and dogs together since the beginning of time.</span></p><p data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">But that doesn’t mean it’s easy and there won’t be a chance of your dog killing your chickens and other problems arising.</span></p><h3 data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Will my dog kill my chickens?</span></h3><p data-dcnode-id="364"><span data-dcnode-id="368" instrument_node="">The bottom line is, any dog has the potential to kill your chickens. Dogs that are poorly trained or have behavioral issues can quickly turn, and certain breeds are more </span><a data-dcnode-id="366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doggysaurus.com/walking-dog-with-high-prey-drive/"><span data-dcnode-id="367" instrument_node="">prone to having a high prey drive</span></a><span data-dcnode-id="365" instrument_node=""> compared to others (more on those breeds lower down).</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="363" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><p data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">But even a dog that has been trained to look after chickens or one that has no history of aggression or chasing can kill without warning. You can never trust any dog to not show aggression, even the most well-mannered ones.</span></p><p data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Now the thing is, most dogs won’t actually try and kill your chickens. A death of one of your birds will typically happen due to the chase, as chickens can break their necks trying to escape.</span></p><figure aria-describedby="caption-attachment-1073" class="wp-caption aligncenter" data-dcnode-id="355" id="attachment_1073" style="width: 750px"><img alt="will my dog kill my chickens" class="wp-image-1073 size-full" data-dcnode-id="358" height="500" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doggysaurus.com/wp-content/uploads/2020/07/chickens.jpg&amp;raw" srcset="https://doggysaurus.com/wp-content/uploads/2020/07/chickens.jpg 750w, https://doggysaurus.com/wp-content/uploads/2020/07/chickens-300x200.jpg 300w" width="750"><figcaption class="wp-caption-text" data-dcnode-id="356" id="caption-attachment-1073"><span data-dcnode-id="357" instrument_node="">Dogs can kill chickens without meaning to. Photo from Pixabay on https://pixabay.com/photos/cock-chicken-village-yard-family-1508585/</span></figcaption></figure><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Some will even die of heart attacks during a dog chase… and they won’t always die at the time. Often the dog chase will affect the chicken or hen so badly that it will be days until the ramifications become clear.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="352" id="AdThrive_Content_4_desktop" style="min-height: 250px;"></div><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Ultimately though, all dogs are different and have varying temperaments so there’s no hard and fast rule on why dogs kill chickens and how safe your birds will be.</span></p><blockquote data-dcnode-id="341"><p data-dcnode-id="342"><em data-dcnode-id="343"><strong data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Handy Hint:</span></strong><span data-dcnode-id="347" instrument_node=""> I’ve also written a guide which explains </span><a data-dcnode-id="345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doggysaurus.com/how-stop-dog-killing-chickens/"><span data-dcnode-id="346" instrument_node="">how you train your dog to stop attacking chickens</span></a><span data-dcnode-id="344" instrument_node=""> and killing them.</span></em></p></blockquote><h3 data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Why do dogs kill chickens?</span></h3><p data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">As touched on already, dogs can kill chickens completely by accident during the thrill and excitement of the chase. But others will kill chickens by biting them, and possibly even eating them.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="336" id="AdThrive_Content_5_desktop" style="min-height: 250px;"></div><p data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Having said, it’s quite rare for dogs to eat chickens after a chase or kill, as the majority of dogs kill chickens during the process of having fun.</span></p><p data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">It’s important to remember that the prey chasing instinct is something that your dog can’t help. Because of this, it’s completely down to you to make sure that your chickens are safe from your dog – more on how to do that lower down the page.</span></p><blockquote data-dcnode-id="322"><p data-dcnode-id="323"><strong data-dcnode-id="329"><em data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Handy Hint:</span></em></strong><em data-dcnode-id="324"><span data-dcnode-id="328" instrument_node=""> Did you know that dogs can actually get sick from being in close contact with live chickens? It’s not common, but there are </span><a data-dcnode-id="326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doggysaurus.com/can-dogs-get-sick-from-chickens/"><span data-dcnode-id="327" instrument_node="">ways you can reduce the risk of sickness</span></a><span data-dcnode-id="325" instrument_node="">.</span></em></p></blockquote><h3 data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">What dog breeds are good with chickens?</span></h3><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Certain dog breeds are said to better at being friends with chickens. Below are the dog breeds that are good with chickens according to various websites I’ve read.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="317" id="AdThrive_Content_6_desktop" style="min-height: 250px;"></div><p data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">The common denominator with these chicken-friendly breeds is that they are all said to have low prey drives.</span></p><ul data-dcnode-id="277"><li data-dcnode-id="312"><strong data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Akbash</span></strong></li><li data-dcnode-id="309"><strong data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Anatolian Shepherd</span></strong></li><li data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Bichon Frise</span></li><li data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Boxer Dog</span></li><li data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Cavalier King Charles Spaniel</span></li><li data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Japanese Chin</span></li><li data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Great Pyrenees</span></li><li data-dcnode-id="296"><strong data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Kangal</span></strong></li><li data-dcnode-id="293"><strong data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Komondor</span></strong></li><li data-dcnode-id="290"><strong data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Kuvasz</span></strong></li><li data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Maltese</span></li><li data-dcnode-id="285"><strong data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Maremma Sheepdog</span></strong></li><li data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Old English Sheepdog</span></li><li data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Pyrenean Mastiff</span></li><li data-dcnode-id="278"><strong data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Tibetan Mastiff</span></strong></li></ul><p data-dcnode-id="272"><span data-dcnode-id="276" instrument_node="">The </span><strong data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">ones I have highlighted in bold above are also said to be good livestock guard dogs</span></strong><span data-dcnode-id="273" instrument_node="">, so will help to protect your chickens from predators such as coyotes, foxes, rodents, and snakes.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="271" id="AdThrive_Content_7_desktop" style="min-height: 250px;"></div><h3 data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">What dog breeds don’t get along with chickens?</span></h3><p data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Then there are the dogs that are more likely to kill chickens and would certainly make unlikely friends with your pet poultry. The breeds listed below have high prey drives and are known to have deep hunting instincts.</span></p><ul data-dcnode-id="242"><li data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Airedale</span></li><li data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Borzois</span></li><li data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Greyhound</span></li><li data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Italian Greyhound</span></li><li data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Jack Russell Terrier</span></li><li data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Rat Terrier</span></li><li data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Saluki</span></li><li data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Siberian Husky</span></li><li data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">Weimaraner</span></li><li data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">West Highland Terrier</span></li><li data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Whippet</span></li><li data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Yorkshire Terrier</span></li></ul><h2 data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">How do I introduce my dog to my chickens?</span></h2><p data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">If you do decide to get chickens, you should be really careful about the introductions. Dogs do get on with chickens, but the boundaries need to be set – most of which will be helped by the way you get them used to each other.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="237" id="AdThrive_Content_8_desktop" style="min-height: 250px;"></div><blockquote data-dcnode-id="227"><p data-dcnode-id="228"><strong data-dcnode-id="234"><em data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Handy Hint:</span></em></strong><em data-dcnode-id="229"><span data-dcnode-id="233" instrument_node=""> You should make sure you keep the area clean at all times, as </span><a data-dcnode-id="231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doggysaurus.com/is-chicken-poop-bad-for-dogs/"><span data-dcnode-id="232" instrument_node="">chicken poop can be bad for dogs</span></a><span data-dcnode-id="230" instrument_node=""> when eaten if you have sick birds.</span></em></p></blockquote><p data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">Here are some quick tips on introducing a dog to chickens:</span></p><ol data-dcnode-id="208"><li data-dcnode-id="221"><strong data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Take it very slowly:</span></strong><span data-dcnode-id="222" instrument_node=""> Don’t rush and choose the time perfectly. Ideally you should do it after your dog has had exercise and a meal, as this could put them in a more relaxed state.</span></li><li data-dcnode-id="217"><strong data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">Keep them apart:</span></strong><span data-dcnode-id="218" instrument_node=""> Your dog should be on a leash and your chickens should be in their coop, pen or run with a physical barrier between each animal. They need to be able to see each other but not touch each other.</span></li><li data-dcnode-id="213"><strong data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Walk your dog around the fence:</span></strong><span data-dcnode-id="214" instrument_node=""> Let your dog get used to the movement and smell of the chickens.</span></li><li data-dcnode-id="209"><strong data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">Watch your dog’s body language: </span></strong><span data-dcnode-id="210" instrument_node="">Dogs will often give little clues if they are going to chase. Look for changes in stance, fixed stare, hackles, and stiffening of the body.</span></li></ol><h2 data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">How to keep chickens safe from dogs</span></h2><p data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">There are many different reasons why dogs will chase and ultimately kill chickens. Some of it as I’ve explained is down to wanting to have fun and chasing as a natural instinct. Here’s ways you can curb your dog’s in-built behaviors, reduce risk, and increase the chances of your dog and chickens getting along.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="203" id="AdThrive_Content_9_desktop" style="min-height: 250px;"></div><ol data-dcnode-id="184"><li data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">Don’t leave your dog unattended with chickens and off the leash.</span></li><li data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">Keep your dog fed on a routine so he doesn’t get hungry and want to eat a chicken.</span></li><li data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Keep your dog entertained and exercised so he doesn’t get bored and chase the chickens. This will also help to reduce your dog’s prey drive.</span></li><li data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">Practice and use obedience training such as “leave it”. It’s also useful to have a distraction method such as a high-pitched whistle or fun toy they love.</span></li><li data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">Use buried or apron fencing on your chicken coop as dogs can dig under barriers and wire.</span></li><li data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Use heavy gauge hardware cloth instead of chicken wire as it’s harder for dogs to tear through.</span></li><li data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Make sure the fencing is high enough for your dog to not jump over to gain access to the chicken run.</span></li><li data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">Don’t let chickens wander free range when your dog is also out.</span></li><li data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">Keep your chickens in their area, as this can also stop the spread of disease between the two species.</span></li></ol><h2 data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">Conclusion</span></h2><p data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">Some dogs do get on with chickens, but the reality is that no dog should ever be left unattended and unleashed in the company of poultry. The chickens should always be in their coop, run, or pen when dogs are around, as you cannot legislate for natural instincts.</span></p><p data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">If you are planning on buying chickens, reduce the chance of your dog killing and eating them by erecting strong and secure fences and keeping an eye on your dog at all times.</span></p><h4 data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">You might also like…</span></h4><p data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">I’ve written extensively about the way in which dogs react in certain situations regarding other animals and insects. Here’s a short selection you might enjoy reading.</span></p><ul data-dcnode-id="164"><li data-dcnode-id="171"><a data-dcnode-id="172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doggysaurus.com/why-do-dogs-kill-birds-how-stop/"><span data-dcnode-id="173" instrument_node="">4 reasons why dogs like to keep killing birds despite your training</span></a></li><li data-dcnode-id="168"><a data-dcnode-id="169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doggysaurus.com/dog-eat-bearded-dragon-get-along/"><span data-dcnode-id="170" instrument_node="">Why dogs and bearded dragons should be monitored when together</span></a></li><li data-dcnode-id="165"><a data-dcnode-id="166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doggysaurus.com/are-caterpillars-poisonous-to-dogs/"><span
