</span><div class="thumb tleft" data-dcnode-id="5781"><div class="thumbinner" data-dcnode-id="5782" style="width:222px;"><a class="image" data-dcnode-id="5794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASealing_vessel_%2522Havsel%2522.jpg"><img alt="" class="thumbimage" data-dcnode-id="5795" data-file-height="3264" data-file-width="4928" decoding="async" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Sealing_vessel_%2522Havsel%2522.jpg/220px-Sealing_vessel_%2522Havsel%2522.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Sealing_vessel_%22Havsel%22.jpg/330px-Sealing_vessel_%22Havsel%22.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Sealing_vessel_%22Havsel%22.jpg/440px-Sealing_vessel_%22Havsel%22.jpg 2x" width="220"></a><span data-dcnode-id="5793" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5783"><div class="magnify" data-dcnode-id="5791"><a class="internal" data-dcnode-id="5792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASealing_vessel_%2522Havsel%2522.jpg" title="Enlarge"></a></div><span data-dcnode-id="5790" instrument_node="">The Norwegian sealing vessel </span><i data-dcnode-id="5788"><span data-dcnode-id="5789" instrument_node="">Havsel</span></i><span data-dcnode-id="5787" instrument_node=""> in the </span><a data-dcnode-id="5785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_Ice" title="West Ice"><span data-dcnode-id="5786" instrument_node="">West Ice</span></a><span data-dcnode-id="5784" instrument_node=""> in 2017</span></div></div></div><span data-dcnode-id="5780" instrument_node="">
</span><p data-dcnode-id="5775"><span data-dcnode-id="5779" instrument_node="">The Norwegian sealing season runs from January to September. The hunt involves "seal catching" by seagoing sealing boats on the Arctic </span><a data-dcnode-id="5777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ice_shelf" title="Ice shelf"><span data-dcnode-id="5778" instrument_node="">ice shelf</span></a><span data-dcnode-id="5776" instrument_node="">, and "seal hunting" on the coast and islands of mainland Norway. The latter is carried out by small groups of licensed hunters shooting seals from land and using small boats to retrieve the catch.
</span></p><p data-dcnode-id="5755"><span data-dcnode-id="5774" instrument_node="">In 2005, Norway allowed foreign nationals to take part in the hunt.</span><sup class="reference" data-dcnode-id="5771" id="cite_ref-100"><a data-dcnode-id="5772" href="#cite_note-100"><span data-dcnode-id="5773" instrument_node="">[100]</span></a></sup><span data-dcnode-id="5770" instrument_node=""> In 2006, 17,037 seals (including 13,390 harp and 3,647 hooded seals) were killed.</span><sup class="reference" data-dcnode-id="5767" id="cite_ref-stat_90-13"><a data-dcnode-id="5768" href="#cite_note-stat-90"><span data-dcnode-id="5769" instrument_node="">[90]</span></a></sup><span data-dcnode-id="5766" instrument_node=""> In 2007, the </span><a class="mw-redirect" data-dcnode-id="5764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Norwegian_Ministry_of_Fisheries_and_Coastal_Affairs" title="Norwegian Ministry of Fisheries and Coastal Affairs"><span data-dcnode-id="5765" instrument_node="">Norwegian Ministry of Fisheries and Coastal Affairs</span></a><span data-dcnode-id="5763" instrument_node=""> stated up to 13.5&nbsp;million </span><a data-dcnode-id="5761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Norwegian_krone" title="Norwegian krone"><span data-dcnode-id="5762" instrument_node="">Norwegian krone</span></a><span data-dcnode-id="5760" instrument_node=""> (about US$2.6&nbsp;million) would be given in funding to vessels in the 2007 Norwegian seal hunt.</span><sup class="reference" data-dcnode-id="5757" id="cite_ref-101"><a data-dcnode-id="5758" href="#cite_note-101"><span data-dcnode-id="5759" instrument_node="">[101]</span></a></sup><span data-dcnode-id="5756" instrument_node="">
</span></p><span data-dcnode-id="5754" instrument_node="">
</span><h5 data-dcnode-id="5744"><span class="mw-headline" data-dcnode-id="5752" id="Regulations_2"><span data-dcnode-id="5753" instrument_node="">Regulations</span></span><span class="mw-editsection" data-dcnode-id="5745"><span class="mw-editsection-bracket" data-dcnode-id="5750"><span data-dcnode-id="5751" instrument_node="">[</span></span><a data-dcnode-id="5748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D19" title="Edit section: Regulations"><span data-dcnode-id="5749" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5746"><span data-dcnode-id="5747" instrument_node="">]</span></span></span></h5><span data-dcnode-id="5743" instrument_node="">
</span><p data-dcnode-id="5730"><span data-dcnode-id="5742" instrument_node="">All Norwegian sealing vessels are required to carry a qualified veterinary inspector on board.</span><sup class="reference" data-dcnode-id="5739" id="cite_ref-norwegianembassy_102-0"><a data-dcnode-id="5740" href="#cite_note-norwegianembassy-102"><span data-dcnode-id="5741" instrument_node="">[102]</span></a></sup><span data-dcnode-id="5738" instrument_node=""> Norwegian sealers are required to pass a shooting test each year before the season starts, using the same weapon and ammunition as they would on the ice. Likewise, they have to pass a </span><i data-dcnode-id="5736"><span data-dcnode-id="5737" instrument_node="">hakapik</span></i><span data-dcnode-id="5735" instrument_node=""> test.</span><sup class="reference" data-dcnode-id="5732" id="cite_ref-Selfangstsforskrift_103-0"><a data-dcnode-id="5733" href="#cite_note-Selfangstsforskrift-103"><span data-dcnode-id="5734" instrument_node="">[103]</span></a></sup><span data-dcnode-id="5731" instrument_node="">
</span></p><p data-dcnode-id="5712"><span data-dcnode-id="5729" instrument_node="">Adult seals more than one year old must be shot in the head with expanding bullets, and cannot be clubbed to death. The </span><i data-dcnode-id="5727"><span data-dcnode-id="5728" instrument_node="">hakapik</span></i><span data-dcnode-id="5726" instrument_node=""> shall be used to ensure the animal is dead. This is done by crushing the skull of the shot adult seal with the short end of the </span><i data-dcnode-id="5724"><span data-dcnode-id="5725" instrument_node="">hakapik</span></i><span data-dcnode-id="5723" instrument_node="">, before the long spike is thrust deep into the animal's brain. The seal is then bled by making an incision from its jaw to the end of its </span><a data-dcnode-id="5721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sternum" title="Sternum"><span data-dcnode-id="5722" instrument_node="">sternum</span></a><span data-dcnode-id="5720" instrument_node="">. The killing and bleeding must be done on the ice, and live animals may never be brought on board the ship. Young seals may be killed using just the </span><i data-dcnode-id="5718"><span data-dcnode-id="5719" instrument_node="">hakapik</span></i><span data-dcnode-id="5717" instrument_node="">, but only in the aforementioned manner, i.e., they need not be shot.</span><sup class="reference" data-dcnode-id="5714" id="cite_ref-Selfangstsforskrift_103-1"><a data-dcnode-id="5715" href="#cite_note-Selfangstsforskrift-103"><span data-dcnode-id="5716" instrument_node="">[103]</span></a></sup><span data-dcnode-id="5713" instrument_node="">
</span></p><p data-dcnode-id="5706"><span data-dcnode-id="5711" instrument_node="">Seals in the water and seals with young may not be killed, and the use of traps, artificial lighting, airplanes, or helicopters is forbidden.</span><sup class="reference" data-dcnode-id="5708" id="cite_ref-Selfangstsforskrift_103-2"><a data-dcnode-id="5709" href="#cite_note-Selfangstsforskrift-103"><span data-dcnode-id="5710" instrument_node="">[103]</span></a></sup><span data-dcnode-id="5707" instrument_node="">
</span></p><p data-dcnode-id="5688"><span data-dcnode-id="5705" instrument_node="">The </span><i data-dcnode-id="5703"><span data-dcnode-id="5704" instrument_node="">hakapik</span></i><span data-dcnode-id="5702" instrument_node=""> may only be used by certified seal-catchers (fangstmenn) operating in the </span><a class="mw-redirect" data-dcnode-id="5700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pack_ice" title="Pack ice"><span data-dcnode-id="5701" instrument_node="">pack ice</span></a><span data-dcnode-id="5699" instrument_node=""> of the </span><a data-dcnode-id="5697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arctic_Ocean" title="Arctic Ocean"><span data-dcnode-id="5698" instrument_node="">Arctic Ocean</span></a><span data-dcnode-id="5696" instrument_node=""> and not by coastal seal hunters. All coastal seal hunters must be pre-approved by the </span><a data-dcnode-id="5694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Norwegian_Directorate_of_Fisheries" title="Norwegian Directorate of Fisheries"><span data-dcnode-id="5695" instrument_node="">Norwegian Directorate of Fisheries</span></a><span data-dcnode-id="5693" instrument_node=""> and have to pass a large game hunting test.</span><sup class="reference" data-dcnode-id="5690" id="cite_ref-104"><a data-dcnode-id="5691" href="#cite_note-104"><span data-dcnode-id="5692" instrument_node="">[104]</span></a></sup><span data-dcnode-id="5689" instrument_node="">
</span></p><p data-dcnode-id="5682"><span data-dcnode-id="5687" instrument_node="">In 2007, the European Food Safety Agency confirmed the animals are put to death faster and more humanely in the Norwegian sealing than in large game hunting on land.</span><sup class="reference" data-dcnode-id="5684" id="cite_ref-norwegianembassy_102-1"><a data-dcnode-id="5685" href="#cite_note-norwegianembassy-102"><span data-dcnode-id="5686" instrument_node="">[102]</span></a></sup><span data-dcnode-id="5683" instrument_node="">
</span></p><span data-dcnode-id="5681" instrument_node="">
</span><h5 data-dcnode-id="5671"><span class="mw-headline" data-dcnode-id="5679" id="Export_2"><span data-dcnode-id="5680" instrument_node="">Export</span></span><span class="mw-editsection" data-dcnode-id="5672"><span class="mw-editsection-bracket" data-dcnode-id="5677"><span data-dcnode-id="5678" instrument_node="">[</span></span><a data-dcnode-id="5675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D20" title="Edit section: Export"><span data-dcnode-id="5676" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5673"><span data-dcnode-id="5674" instrument_node="">]</span></span></span></h5><span data-dcnode-id="5670" instrument_node="">
</span><p data-dcnode-id="5635"><span data-dcnode-id="5669" instrument_node="">In Norway in 2004, only Rieber worked with sealskin and seal oil.</span><sup class="reference" data-dcnode-id="5666" id="cite_ref-105"><a data-dcnode-id="5667" href="#cite_note-105"><span data-dcnode-id="5668" instrument_node="">[105]</span></a></sup><span data-dcnode-id="5665" instrument_node=""> In 2001, the biggest producer of raw seal oil was Canada (two percent of the raw oil was processed and sold in Canadian health stores).</span><sup class="reference" data-dcnode-id="5662" id="cite_ref-regj_57-1"><a data-dcnode-id="5663" href="#cite_note-regj-57"><span data-dcnode-id="5664" instrument_node="">[57]</span></a></sup><span data-dcnode-id="5661" instrument_node=""> Rieber had the majority of all distribution of raw seal oil in the world market, but there was no demand for seal oil.</span><sup class="reference" data-dcnode-id="5658" id="cite_ref-regj_57-2"><a data-dcnode-id="5659" href="#cite_note-regj-57"><span data-dcnode-id="5660" instrument_node="">[57]</span></a></sup><span data-dcnode-id="5657" instrument_node=""> From 1995 to 2005, Rieber annually received between 2 and 3&nbsp;million </span><a data-dcnode-id="5655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Norwegian_krone" title="Norwegian krone"><span data-dcnode-id="5656" instrument_node="">Norwegian krone</span></a><span data-dcnode-id="5654" instrument_node=""> in subsidy.</span><sup class="reference" data-dcnode-id="5651" id="cite_ref-106"><a data-dcnode-id="5652" href="#cite_note-106"><span data-dcnode-id="5653" instrument_node="">[106]</span></a></sup><span data-dcnode-id="5650" instrument_node=""> A 2003–2004 parliamentary report says </span><a class="mw-redirect" data-dcnode-id="5648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CG_Rieber_Skinn" title="CG Rieber Skinn"><span data-dcnode-id="5649" instrument_node="">CG Rieber Skinn</span></a><span data-dcnode-id="5647" instrument_node=""> is the only company in the world that delivers skin from </span><a data-dcnode-id="5645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hooded_seal" title="Hooded seal"><span data-dcnode-id="5646" instrument_node="">bluebacks</span></a><span data-dcnode-id="5644" instrument_node="">.</span><sup class="reference" data-dcnode-id="5641" id="cite_ref-107"><a data-dcnode-id="5642" href="#cite_note-107"><span data-dcnode-id="5643" instrument_node="">[107]</span></a></sup><span data-dcnode-id="5640" instrument_node=""> Most of the skins processed by Rieber have been imported from abroad, mainly from Canada. Only a small portion is from the Norwegian hunt. Of the processed skin, five percent is sold in Norway; the rest is exported to the Russian and Asian markets.</span><sup class="reference" data-dcnode-id="5637" id="cite_ref-rieberskinn_52-1"><a data-dcnode-id="5638" href="#cite_note-rieberskinn-52"><span data-dcnode-id="5639" instrument_node="">[52]</span></a></sup><span data-dcnode-id="5636" instrument_node="">
</span></p><p data-dcnode-id="5618"><span data-dcnode-id="5634" instrument_node="">Fortuna Oils AS (established in 2004) is a 100% owned subsidiary of GC Rieber.</span><sup class="reference" data-dcnode-id="5631" id="cite_ref-108"><a data-dcnode-id="5632" href="#cite_note-108"><span data-dcnode-id="5633" instrument_node="">[108]</span></a></sup><span data-dcnode-id="5630" instrument_node=""> They get the majority of their raw oil imported from Newfoundland.</span><sup class="reference" data-dcnode-id="5627" id="cite_ref-fortuna_109-0"><a data-dcnode-id="5628" href="#cite_note-fortuna-109"><span data-dcnode-id="5629" instrument_node="">[109]</span></a></sup><span data-dcnode-id="5626" instrument_node=""> They also have access to raw oil from the Norwegian hunt.</span><sup class="reference" data-dcnode-id="5623" id="cite_ref-110"><a data-dcnode-id="5624" href="#cite_note-110"><span data-dcnode-id="5625" instrument_node="">[110]</span></a></sup><sup class="reference" data-dcnode-id="5620" id="cite_ref-111"><a data-dcnode-id="5621" href="#cite_note-111"><span data-dcnode-id="5622" instrument_node="">[111]</span></a></sup><span data-dcnode-id="5619" instrument_node="">
</span></p><span data-dcnode-id="5617" instrument_node="">
</span><h4 data-dcnode-id="5607"><span class="mw-headline" data-dcnode-id="5615" id="Russia"><span data-dcnode-id="5616" instrument_node="">Russia</span></span><span class="mw-editsection" data-dcnode-id="5608"><span class="mw-editsection-bracket" data-dcnode-id="5613"><span data-dcnode-id="5614" instrument_node="">[</span></span><a data-dcnode-id="5611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D21" title="Edit section: Russia"><span data-dcnode-id="5612" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5609"><span data-dcnode-id="5610" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5606" instrument_node="">
</span><p data-dcnode-id="5589"><span data-dcnode-id="5605" instrument_node="">The Russian seal hunt has not been well monitored since the breakup of the Soviet Union.</span><sup class="reference" data-dcnode-id="5602" id="cite_ref-112"><a data-dcnode-id="5603" href="#cite_note-112"><span data-dcnode-id="5604" instrument_node="">[112]</span></a></sup><span data-dcnode-id="5601" instrument_node=""> The quota in 1998 was 35,000 animals.</span><sup class="reference" data-dcnode-id="5598" id="cite_ref-113"><a data-dcnode-id="5599" href="#cite_note-113"><span data-dcnode-id="5600" instrument_node="">[113]</span></a></sup><span data-dcnode-id="5597" instrument_node=""> Reportedly, many whitecoat pups are not properly killed and are transported, while injured, to processing areas. In January 2000, a bill to ban seal hunting was passed by the Russian parliament by 273 votes to 1, but was vetoed by President </span><a data-dcnode-id="5595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Putin" title="Vladimir Putin"><span data-dcnode-id="5596" instrument_node="">Vladimir Putin</span></a><span data-dcnode-id="5594" instrument_node="">.</span><sup class="reference" data-dcnode-id="5591" id="cite_ref-114"><a data-dcnode-id="5592" href="#cite_note-114"><span data-dcnode-id="5593" instrument_node="">[114]</span></a></sup><span data-dcnode-id="5590" instrument_node="">
</span></p><p data-dcnode-id="5574"><span data-dcnode-id="5588" instrument_node="">On 21 September 2007 in </span><a data-dcnode-id="5586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arkhangelsk" title="Arkhangelsk"><span data-dcnode-id="5587" instrument_node="">Arkhangelsk</span></a><span data-dcnode-id="5585" instrument_node="">, the Norwegian GC Rieber Skinn AS proposed a joint Russian–Norwegian seal hunting project. The campaign was carried out from one hunt boat supplied by GS Rieber Skinn AS in 2007, lasted two weeks, and brought in 40 000 </span><a class="mw-redirect" data-dcnode-id="5583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roubles" title="Roubles"><span data-dcnode-id="5584" instrument_node="">roubles</span></a><span data-dcnode-id="5582" instrument_node=""> per Russian hunter. GS Rieber skinn AS declared a plan to order 20 boats and donate them to the </span><a class="mw-redirect" data-dcnode-id="5580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pomor" title="Pomor"><span data-dcnode-id="5581" instrument_node="">Pomor</span></a><span data-dcnode-id="5579" instrument_node="">.</span><sup class="reference" data-dcnode-id="5576" id="cite_ref-Barents_115-0"><a data-dcnode-id="5577" href="#cite_note-Barents-115"><span data-dcnode-id="5578" instrument_node="">[115]</span></a></sup><span data-dcnode-id="5575" instrument_node=""> CG Rieber Skinn AS, in 2007, established a daughter company in Arkhangelsk, called GC Rieber Skinn Pomor'e Lic. (GC Rieber Skinn Pomorje).
</span></p><p data-dcnode-id="5572"><span data-dcnode-id="5573" instrument_node="">The Norwegian company Polardrift AS, in 2007, had plans to establish a company in Russia, and operate under Russian flag, in close cooperation with GC Rieber Skinn Pomor'e.
</span></p><p data-dcnode-id="5563"><span data-dcnode-id="5571" instrument_node="">Plans for the 2008 season included both helicopter-based hunts, mainly to take </span><a data-dcnode-id="5569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Whitecoat" title="Whitecoat"><span data-dcnode-id="5570" instrument_node="">whitecoats</span></a><span data-dcnode-id="5568" instrument_node="">, and boat-based hunts, mainly targeting beaters.</span><sup class="reference" data-dcnode-id="5565" id="cite_ref-GofN_116-0"><a data-dcnode-id="5566" href="#cite_note-GofN-116"><span data-dcnode-id="5567" instrument_node="">[116]</span></a></sup><span data-dcnode-id="5564" instrument_node="">
</span></p><p data-dcnode-id="5548"><span data-dcnode-id="5562" instrument_node="">On 18 March 2009, Russia's Minister of Natural Resources and Ecology, </span><a class="mw-redirect" data-dcnode-id="5560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yuriy_Trutnev" title="Yuriy Trutnev"><span data-dcnode-id="5561" instrument_node="">Yuriy Trutnev</span></a><span data-dcnode-id="5559" instrument_node="">, announced a complete </span><a data-dcnode-id="5557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ban_%28law%29" title="Ban (law)"><span data-dcnode-id="5558" instrument_node="">ban</span></a><span data-dcnode-id="5556" instrument_node=""> on the hunting of harp seals younger than one year of age in the </span><a data-dcnode-id="5554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_Sea" title="White Sea"><span data-dcnode-id="5555" instrument_node="">White Sea</span></a><span data-dcnode-id="5553" instrument_node="">.</span><sup class="reference" data-dcnode-id="5550" id="cite_ref-117"><a data-dcnode-id="5551" href="#cite_note-117"><span data-dcnode-id="5552" instrument_node="">[117]</span></a></sup><span data-dcnode-id="5549" instrument_node="">
</span></p><span data-dcnode-id="5547" instrument_node="">
</span><h2 data-dcnode-id="5537"><span class="mw-headline" data-dcnode-id="5545" id="Sealing_debate"><span data-dcnode-id="5546" instrument_node="">Sealing debate</span></span><span class="mw-editsection" data-dcnode-id="5538"><span class="mw-editsection-bracket" data-dcnode-id="5543"><span data-dcnode-id="5544" instrument_node="">[</span></span><a data-dcnode-id="5541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D22" title="Edit section: Sealing debate"><span data-dcnode-id="5542" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5539"><span data-dcnode-id="5540" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5536" instrument_node="">
</span><p data-dcnode-id="5534"><span data-dcnode-id="5535" instrument_node="">Canada has become the center of the sealing debate because of the comparatively large size of its hunt.
</span></p><span data-dcnode-id="5533" instrument_node="">
</span><h3 data-dcnode-id="5523"><span class="mw-headline" data-dcnode-id="5531" id="Cruelty_to_animals"><span data-dcnode-id="5532" instrument_node="">Cruelty to animals</span></span><span class="mw-editsection" data-dcnode-id="5524"><span class="mw-editsection-bracket" data-dcnode-id="5529"><span data-dcnode-id="5530" instrument_node="">[</span></span><a data-dcnode-id="5527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D23" title="Edit section: Cruelty to animals"><span data-dcnode-id="5528" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5525"><span data-dcnode-id="5526" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5522" instrument_node="">
</span><p data-dcnode-id="5513"><span data-dcnode-id="5521" instrument_node="">According to a 2002 peer-reviewed study done by five Canadian veterinarians and funded by the </span><a data-dcnode-id="5519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canadian_Veterinary_Medical_Association" title="Canadian Veterinary Medical Association"><span data-dcnode-id="5520" instrument_node="">Canadian Veterinary Medical Association</span></a><span data-dcnode-id="5518" instrument_node=""> (CVMA),</span><sup class="reference" data-dcnode-id="5515" id="cite_ref-pmid12240525_61-2"><a data-dcnode-id="5516" href="#cite_note-pmid12240525-61"><span data-dcnode-id="5517" instrument_node="">[61]</span></a></sup><span data-dcnode-id="5514" instrument_node=""> "the large majority of seals taken during this hunt (at best, 98% in work reported here) are killed in an acceptably humane manner." These veterinarians found, "During the 2001 season in the Gulf, three (1.9%) of 158 seals brought on board of the sealing vessels and directly observed by Daoust had not been killed, and in one (0.86%) of 116 interactions between seals and sealers observed on videotapes by Daoust and Crook, the seal also did not appear to have been killed before being hooked and brought on board." They thus concluded, "This small proportion of animals that are not killed efficiently justifies continued attention to this industry's activities, preferably by members of the veterinary profession, who are best equipped to assess the humaneness of the killing methods."
</span></p><p data-dcnode-id="5511"><span data-dcnode-id="5512" instrument_node="">In observing four videos taken during the 2001 seal hunt in the Gulf of St. Lawrence, the authors of this report state, "A large proportion (87%) of the sealers recorded on the four videotapes failed to palpate the skull or check the corneal reflex before proceeding to hook or bleed the seal or go to another seal."
</span></p><p data-dcnode-id="5502"><span data-dcnode-id="5510" instrument_node="">The </span><a data-dcnode-id="5508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_Canadian_royal_commissions" title="List of Canadian royal commissions"><span data-dcnode-id="5509" instrument_node="">Royal Commission on Seals and the Sealing Industry in Canada</span></a><span data-dcnode-id="5507" instrument_node="">, also known as the Malouf Commission, concluded in a 1986 report, "Judged by the criteria of rapidity of unconsciousness and particularly the absence of preslaughter stress, the clubbing of seal pups is, when properly performed, at least as humane as, and often more humane than, the killing methods used in commercial slaughterhouses, which are accepted by a majority of the public."</span><sup class="reference" data-dcnode-id="5504" id="cite_ref-118"><a data-dcnode-id="5505" href="#cite_note-118"><span data-dcnode-id="5506" instrument_node="">[118]</span></a></sup><span data-dcnode-id="5503" instrument_node="">
</span></p><p data-dcnode-id="5496"><span data-dcnode-id="5501" instrument_node="">According to the (DFO), "The Marine Mammal Regulations stipulate that seals must be harvested quickly using only high-powered rifles, shotguns firing slugs, clubs or hakapiks.</span><sup class="reference" data-dcnode-id="5498" id="cite_ref-faq-canada_1-3"><a data-dcnode-id="5499" href="#cite_note-faq-canada-1"><span data-dcnode-id="5500" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5497" instrument_node="">
</span></p><p data-dcnode-id="5488"><span data-dcnode-id="5495" instrument_node="">However, the </span><a data-dcnode-id="5493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Fund_for_Animal_Welfare" title="International Fund for Animal Welfare"><span data-dcnode-id="5494" instrument_node="">International Fund for Animal Welfare</span></a><sup class="reference" data-dcnode-id="5490" id="cite_ref-119"><a data-dcnode-id="5491" href="#cite_note-119"><span data-dcnode-id="5492" instrument_node="">[119]</span></a></sup><span data-dcnode-id="5489" instrument_node=""> conducted a study that disputed these findings. This report concludes the Canadian commercial seal hunt results in considerable and unacceptable suffering.
</span></p><p data-dcnode-id="5486"><span data-dcnode-id="5487" instrument_node="">The veterinarians examined 76 seal carcasses and found that in 17% of the cases, there were no detectable lesions of the skull, leading them to conclude the clubbing likely did not result in loss of consciousness. In 25% of the remaining cases, the carcasses had minimal to moderate skull fractures, indicative of a "decreased level of consciousness", but probably not unconsciousness. The remaining 58% of the carcasses examined showed extensive skull fractures.
</span></p><p data-dcnode-id="5484"><span data-dcnode-id="5485" instrument_node="">This veterinary study included examination of video footage of 179 seals hunted in 1998, 1999, and 2000. In these videos, 96 seals were shot, 56 were shot and then clubbed or gaffed, 19 were clubbed or gaffed, and 8 were killed by unknown means. In 79% of these cases, sealers did not check the corneal reflex to ensure that the seals were dead prior to hooking or skinning them. In only 6% of these cases, seals were bled immediately, where struck. The average time from initial strike to bleeding was 66 seconds.
</span></p><p data-dcnode-id="5478"><span data-dcnode-id="5483" instrument_node="">In 2005, IFAW published a comparison of the CVMA-funded study and its own study.</span><sup class="reference" data-dcnode-id="5480" id="cite_ref-120"><a data-dcnode-id="5481" href="#cite_note-120"><span data-dcnode-id="5482" instrument_node="">[120]</span></a></sup><span data-dcnode-id="5479" instrument_node=""> In this critique, David M. Lavigne, Science Advisor to IFAW, writes, "The Burdon et al. evidence cited above addresses the question of whether seals were likely conscious or unconscious at the time they were skinned, using post-mortem examination of skulls. In marked contrast, the figure cited from Daoust et al.'s report represents the number of seals clubbed or shot that were brought on board sealing vessels while still conscious. That number ignores any and all animal suffering that occurs between the time animals are clubbed or shot until they eventually reach a sealing vessel, usually on the end of a hook or gaff." Another difference between these reports is "Daoust et al.'s direct observations were made under very different conditions than those provided by Burdon et al. Unlike Burdon et al.'s observations, they were made directly from sealing vessels so that the sealers were unavoidably aware that observers were present. As Daoust et al. (p 692) admit, the presence of an observer on a sealing vessel "may have incited sealers to hit the seals skulls more vigorously". Of course, the presence of an observer also has the potential to modify other sealing practices, including checking for a corneal reflex and bleeding animals immediately after clubbing."
</span></p><p data-dcnode-id="5469"><span data-dcnode-id="5477" instrument_node="">In 2005, the </span><a class="mw-redirect" data-dcnode-id="5475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Wildlife_Fund" title="World Wildlife Fund"><span data-dcnode-id="5476" instrument_node="">World Wildlife Fund</span></a><span data-dcnode-id="5474" instrument_node=""> (WWF) commissioned the Independent Veterinarians Working Group Report. With reference to video evidence, the report states: "Perception of the seal hunt seems to be based largely on emotion, and on visual images that are often difficult even for experienced observers to interpret with certainty. While a hakapik strike on the skull of a seal appears brutal, it is humane if it achieves rapid, irreversible loss of consciousness leading to death."</span><sup class="reference" data-dcnode-id="5471" id="cite_ref-121"><a data-dcnode-id="5472" href="#cite_note-121"><span data-dcnode-id="5473" instrument_node="">[121]</span></a></sup><span data-dcnode-id="5470" instrument_node="">
</span></p><span data-dcnode-id="5468" instrument_node="">
</span><h3 data-dcnode-id="5458"><span class="mw-headline" data-dcnode-id="5466" id="Ecological_feasibility"><span data-dcnode-id="5467" instrument_node="">Ecological feasibility</span></span><span class="mw-editsection" data-dcnode-id="5459"><span class="mw-editsection-bracket" data-dcnode-id="5464"><span data-dcnode-id="5465" instrument_node="">[</span></span><a data-dcnode-id="5462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D24" title="Edit section: Ecological feasibility"><span data-dcnode-id="5463" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5460"><span data-dcnode-id="5461" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5457" instrument_node="">
</span><p data-dcnode-id="5447"><span data-dcnode-id="5456" instrument_node="">In 2013, the Canadian Department of Fisheries and Oceans conducted a population survey. The resulting estimate of the harp seal population was 7.3&nbsp;million animals, over three times what it was in the 1970s.</span><sup class="reference" data-dcnode-id="5453" id="cite_ref-dfo-mpo.gc.ca_60-1"><a data-dcnode-id="5454" href="#cite_note-dfo-mpo.gc.ca-60"><span data-dcnode-id="5455" instrument_node="">[60]</span></a></sup><span data-dcnode-id="5452" instrument_node=""> In 2004, the population estimate was similar: 5.9&nbsp;million (95% CI 4.6&nbsp;million to 7.2&nbsp;million).</span><sup class="reference" data-dcnode-id="5449" id="cite_ref-122"><a data-dcnode-id="5450" href="#cite_note-122"><span data-dcnode-id="5451" instrument_node="">[122]</span></a></sup><span data-dcnode-id="5448" instrument_node="">
</span></p><p data-dcnode-id="5441"><span data-dcnode-id="5446" instrument_node="">Prior to the arrival of European settlers, a much larger population of harp seals migrated to the waters off Newfoundland and Labrador. Settlers began exploiting the population, with kills peaking in the middle of the 1800s. In the first half of the 1840s, 546,000 seals were killed annually. This led to a population decline that adversely affected the industry.</span><sup class="reference" data-dcnode-id="5443" id="cite_ref-heritage.nf.ca_35-1"><a data-dcnode-id="5444" href="#cite_note-heritage.nf.ca-35"><span data-dcnode-id="5445" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5442" instrument_node="">
</span></p><p data-dcnode-id="5439"><span data-dcnode-id="5440" instrument_node="">In the 1950s and 1960s an average of over 291,000 seal pups were killed each year. This led to a population decline to less than 2&nbsp;million seals. Conservationists became alarmed and demanded controls on kill rates. Thus in 1971, Canada instituted a quota system. In the years from 1971 to 1982, an average of 165,627 seals were killed.
</span></p><p data-dcnode-id="5437"><span data-dcnode-id="5438" instrument_node="">In 1983, the European Union banned the import of whitecoat harp seal pup pelts (pelts from pups less than about two weeks of age, when the pups molt). As a result, the market for pelts dropped. The kill rates thus declined in subsequent years to an average of about 52,000 seals from 1983 to 1995. During this time, the harp seal population increased.
</span></p><p data-dcnode-id="5435"><span data-dcnode-id="5436" instrument_node="">After the European Union's ban on whitecoat pelt imports, the Canadian government and sealing industry developed markets for the pelts of beaters. In 1996, the kill rates again increased to over 200,000 each year, except in the year 2000. In 2002 and 2004 to 2006, over 300,000 seal pups were killed each year.
</span></p><p data-dcnode-id="5422"><span data-dcnode-id="5434" instrument_node="">As a result of population concerns, Norway's seal hunt is now controlled by quotas based on recommendations from </span><a data-dcnode-id="5432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Council_for_the_Exploration_of_the_Sea" title="International Council for the Exploration of the Sea"><span data-dcnode-id="5433" instrument_node="">International Council for the Exploration of the Sea</span></a><span data-dcnode-id="5431" instrument_node=""> (ICES),</span><sup class="reference" data-dcnode-id="5428" id="cite_ref-123"><a data-dcnode-id="5429" href="#cite_note-123"><span data-dcnode-id="5430" instrument_node="">[123]</span></a></sup><span data-dcnode-id="5427" instrument_node=""> However, sealing in Norway has declined in recent years, and the quotas have not been reached.</span><sup class="reference" data-dcnode-id="5424" id="cite_ref-124"><a data-dcnode-id="5425" href="#cite_note-124"><span data-dcnode-id="5426" instrument_node="">[124]</span></a></sup><span data-dcnode-id="5423" instrument_node="">
</span></p><p data-dcnode-id="5416"><span data-dcnode-id="5421" instrument_node="">In addition to hunting pressures on the population of harp seals, as ice seals that are dependent on solid sea ice for whelping, the harp seal population is affected by global climate change. The lack of sea ice in recent years has resulted in the drowning deaths of tens of thousands of newborn harp seal pups.</span><sup class="reference" data-dcnode-id="5418" id="cite_ref-125"><a data-dcnode-id="5419" href="#cite_note-125"><span data-dcnode-id="5420" instrument_node="">[125]</span></a></sup><span data-dcnode-id="5417" instrument_node="">
</span></p><span data-dcnode-id="5415" instrument_node="">
</span><h3 data-dcnode-id="5405"><span class="mw-headline" data-dcnode-id="5413" id="Objections_to_fur"><span data-dcnode-id="5414" instrument_node="">Objections to fur</span></span><span class="mw-editsection" data-dcnode-id="5406"><span class="mw-editsection-bracket" data-dcnode-id="5411"><span data-dcnode-id="5412" instrument_node="">[</span></span><a data-dcnode-id="5409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D25" title="Edit section: Objections to fur"><span data-dcnode-id="5410" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5407"><span data-dcnode-id="5408" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5404" instrument_node="">
</span><link data-dcnode-id="5403" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5396" role="note"><span data-dcnode-id="5402" instrument_node="">Main articles: </span><a data-dcnode-id="5400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fur_farming" title="Fur farming"><span data-dcnode-id="5401" instrument_node="">Fur farming</span></a><span data-dcnode-id="5399" instrument_node=""> and </span><a data-dcnode-id="5397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fur_clothing" title="Fur clothing"><span data-dcnode-id="5398" instrument_node="">Fur clothing</span></a></div><span data-dcnode-id="5395" instrument_node="">
</span><p data-dcnode-id="5390"><span data-dcnode-id="5394" instrument_node="">Animal welfare advocates and organizations, such as </span><a class="mw-redirect" data-dcnode-id="5392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PETA" title="PETA"><span data-dcnode-id="5393" instrument_node="">PETA</span></a><span data-dcnode-id="5391" instrument_node="">, object to the use of real fur when many synthetic "faux fur" alternatives are available.
</span></p><span data-dcnode-id="5389" instrument_node="">
</span><h3 data-dcnode-id="5379"><span class="mw-headline" data-dcnode-id="5387" id="Economic_impact"><span data-dcnode-id="5388" instrument_node="">Economic impact</span></span><span class="mw-editsection" data-dcnode-id="5380"><span class="mw-editsection-bracket" data-dcnode-id="5385"><span data-dcnode-id="5386" instrument_node="">[</span></span><a data-dcnode-id="5383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D26" title="Edit section: Economic impact"><span data-dcnode-id="5384" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5381"><span data-dcnode-id="5382" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5378" instrument_node="">
</span><p data-dcnode-id="5352"><span data-dcnode-id="5377" instrument_node="">According to Canadian authorities, the value of the 2004 seal harvest was </span><a data-dcnode-id="5375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canadian_dollar" title="Canadian dollar"><span data-dcnode-id="5376" instrument_node="">C$</span></a><span data-dcnode-id="5374" instrument_node="">16.5&nbsp;million, which significantly contributes to seal manufacturing companies, and for several thousand fishermen and </span><a data-dcnode-id="5372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Nations_in_Canada" title="First Nations in Canada"><span data-dcnode-id="5373" instrument_node="">First Nations</span></a><span data-dcnode-id="5371" instrument_node=""> peoples. For some sealers, they claim, proceeds from the hunt make up a third of their annual income. Critics, however, say this represents only a tiny fraction of the C$600-million Newfoundland fishing industry. Sealing opponents also say $16.5&nbsp;million is insignificant, compared to the funding required to regulate and subsidize the hunt. For 1995 and 1996, there are confirmed reports Fisheries and Oceans Canada encouraged maximum utilization of harvested seals through a $0.20 per pound </span><a data-dcnode-id="5369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Meat" title="Meat"><span data-dcnode-id="5370" instrument_node="">meat</span></a><span data-dcnode-id="5368" instrument_node=""> subsidy.</span><sup class="reference" data-dcnode-id="5365" id="cite_ref-Tobin1996_126-0"><a data-dcnode-id="5366" href="#cite_note-Tobin1996-126"><span data-dcnode-id="5367" instrument_node="">[126]</span></a></sup><span data-dcnode-id="5364" instrument_node=""> The level of subsidy totaled $650,000 in 1997, $440,000 in 1998 and $250,000 in 1999. There were no meat subsidies in 2000.</span><sup class="reference" data-dcnode-id="5361" id="cite_ref-Canada0305_59-3"><a data-dcnode-id="5362" href="#cite_note-Canada0305-59"><span data-dcnode-id="5363" instrument_node="">[59]</span></a></sup><span data-dcnode-id="5360" instrument_node=""> Some critics, such as the McCartneys (see below), have suggested promoting that area as an </span><a data-dcnode-id="5358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecotourism" title="Ecotourism"><span data-dcnode-id="5359" instrument_node="">ecotourism</span></a><span data-dcnode-id="5357" instrument_node=""> site would be far more lucrative than the annual harvest.</span><sup class="reference" data-dcnode-id="5354" id="cite_ref-127"><a data-dcnode-id="5355" href="#cite_note-127"><span data-dcnode-id="5356" instrument_node="">[127]</span></a></sup><span data-dcnode-id="5353" instrument_node="">
</span></p><span data-dcnode-id="5351" instrument_node="">
</span><h3 data-dcnode-id="5341"><span class="mw-headline" data-dcnode-id="5349" id="As_a_culling_method"><span data-dcnode-id="5350" instrument_node="">As a culling method</span></span><span class="mw-editsection" data-dcnode-id="5342"><span class="mw-editsection-bracket" data-dcnode-id="5347"><span data-dcnode-id="5348" instrument_node="">[</span></span><a data-dcnode-id="5345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D27" title="Edit section: As a culling method"><span data-dcnode-id="5346" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5343"><span data-dcnode-id="5344" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5340" instrument_node="">
</span><p data-dcnode-id="5331"><span data-dcnode-id="5339" instrument_node="">In March 2005, Greenpeace asked the DFO to "dispel the myth that seals are hampering the recovery of cod stocks." In doing so, they implied the seal hunt is, at least in part, a </span><a class="mw-redirect" data-dcnode-id="5337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cull" title="Cull"><span data-dcnode-id="5338" instrument_node="">cull</span></a><span data-dcnode-id="5336" instrument_node=""> designed to increase cod stocks. Cod fishing has traditionally been a key part of the Atlantic fishery, and an important part of the economy of Newfoundland and Labrador. Fisheries and Oceans Canada responded there is no connection between the annual seal harvest and the cod fishery, and that the seal hunt is "established on sound conservation principles."</span><sup class="reference" data-dcnode-id="5333" id="cite_ref-128"><a data-dcnode-id="5334" href="#cite_note-128"><span data-dcnode-id="5335" instrument_node="">[128]</span></a></sup><span data-dcnode-id="5332" instrument_node="">
</span></p><span data-dcnode-id="5330" instrument_node="">
</span><h3 data-dcnode-id="5320"><span class="mw-headline" data-dcnode-id="5328" id="Public_opinion"><span data-dcnode-id="5329" instrument_node="">Public opinion</span></span><span class="mw-editsection" data-dcnode-id="5321"><span class="mw-editsection-bracket" data-dcnode-id="5326"><span data-dcnode-id="5327" instrument_node="">[</span></span><a data-dcnode-id="5324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D28" title="Edit section: Public opinion"><span data-dcnode-id="5325" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5322"><span data-dcnode-id="5323" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5319" instrument_node="">
</span><p data-dcnode-id="5304"><span data-dcnode-id="5318" instrument_node="">Internationally, opposition to the seal hunt is comparable to abhorrence about the treatment of animals in other cultural-economic practices such as </span><a data-dcnode-id="5316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bullfighting" title="Bullfighting"><span data-dcnode-id="5317" instrument_node="">bull fighting</span></a><span data-dcnode-id="5315" instrument_node="">, </span><a data-dcnode-id="5313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fox_hunting" title="Fox hunting"><span data-dcnode-id="5314" instrument_node="">fox hunts</span></a><span data-dcnode-id="5312" instrument_node=""> and </span><a data-dcnode-id="5310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Whaling" title="Whaling"><span data-dcnode-id="5311" instrument_node="">whaling</span></a><span data-dcnode-id="5309" instrument_node="">. Within Canada, public opinion is relative to Canadians' geographic proximity to communities with a historical tradition of participating in the seal hunt, and opposition is higher in urban centres outside of Newfoundland and Labrador.</span><sup class="reference" data-dcnode-id="5306" id="cite_ref-129"><a data-dcnode-id="5307" href="#cite_note-129"><span data-dcnode-id="5308" instrument_node="">[129]</span></a></sup><span data-dcnode-id="5305" instrument_node="">
</span></p><span data-dcnode-id="5303" instrument_node="">
</span><h3 data-dcnode-id="5293"><span class="mw-headline" data-dcnode-id="5301" id="Protests"><span data-dcnode-id="5302" instrument_node="">Protests</span></span><span class="mw-editsection" data-dcnode-id="5294"><span class="mw-editsection-bracket" data-dcnode-id="5299"><span data-dcnode-id="5300" instrument_node="">[</span></span><a data-dcnode-id="5297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D29" title="Edit section: Protests"><span data-dcnode-id="5298" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5295"><span data-dcnode-id="5296" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5292" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5283"><div class="thumbinner" data-dcnode-id="5284" style="width:222px;"><a class="image" data-dcnode-id="5290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABlanchon-idlm2006.jpg"><img alt="" class="thumbimage" data-dcnode-id="5291" data-file-height="459" data-file-width="523" decoding="async" height="193" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Blanchon-idlm2006.jpg/220px-Blanchon-idlm2006.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Blanchon-idlm2006.jpg/330px-Blanchon-idlm2006.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Blanchon-idlm2006.jpg/440px-Blanchon-idlm2006.jpg 2x" width="220"></a><span data-dcnode-id="5289" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5285"><div class="magnify" data-dcnode-id="5287"><a class="internal" data-dcnode-id="5288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABlanchon-idlm2006.jpg" title="Enlarge"></a></div><span data-dcnode-id="5286" instrument_node="">Harp seal pup</span></div></div></div><span data-dcnode-id="5282" instrument_node="">
</span><p data-dcnode-id="5266"><span data-dcnode-id="5281" instrument_node="">Many animal protection groups encourage people to petition against the harvest.</span><sup class="reference" data-dcnode-id="5278" id="cite_ref-130"><a data-dcnode-id="5279" href="#cite_note-130"><span data-dcnode-id="5280" instrument_node="">[130]</span></a></sup><span data-dcnode-id="5277" instrument_node=""> Respect for Animals and </span><a data-dcnode-id="5275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Humane_Society_International" title="Humane Society International"><span data-dcnode-id="5276" instrument_node="">Humane Society International</span></a><span data-dcnode-id="5274" instrument_node=""> believe the hunt will be ended only by the financial pressure of a boycott of Canadian seafood. In 2005, the </span><a data-dcnode-id="5272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Humane_Society_of_the_United_States" title="Humane Society of the United States"><span data-dcnode-id="5273" instrument_node="">Humane Society of the United States</span></a><span data-dcnode-id="5271" instrument_node=""> (HSUS) called for such a boycott in the United States.</span><sup class="reference" data-dcnode-id="5268" id="cite_ref-131"><a data-dcnode-id="5269" href="#cite_note-131"><span data-dcnode-id="5270" instrument_node="">[131]</span></a></sup><span data-dcnode-id="5267" instrument_node="">
</span></p><p data-dcnode-id="5257"><span data-dcnode-id="5265" instrument_node="">Protesters frequently use images of whitecoats, despite Canada's ban on the commercial hunting of suckling pups. The HSUS explains this by saying images of the legally hunted ragged jackets are nearly indistinguishable from those of whitecoats. Also, they state, according to official DFO kill reports, 97% percent of the estimated million harp seals killed in the last four years have been under three months old, and the majority of these are less than one month old.</span><sup class="reference" data-dcnode-id="5262" id="cite_ref-132"><a data-dcnode-id="5263" href="#cite_note-132"><span data-dcnode-id="5264" instrument_node="">[132]</span></a></sup><sup class="reference" data-dcnode-id="5259" id="cite_ref-133"><a data-dcnode-id="5260" href="#cite_note-133"><span data-dcnode-id="5261" instrument_node="">[133]</span></a></sup><span data-dcnode-id="5258" instrument_node="">
</span></p><p data-dcnode-id="5230"><span data-dcnode-id="5256" instrument_node="">On 26 March 2006, seven anti-sealing activists were arrested in the Gulf of St. Lawrence for violating the terms of their observer permits. By law, observers must maintain a ten-meter distance between themselves and the sealers.</span><sup class="reference" data-dcnode-id="5253" id="cite_ref-134"><a data-dcnode-id="5254" href="#cite_note-134"><span data-dcnode-id="5255" instrument_node="">[134]</span></a></sup><span data-dcnode-id="5252" instrument_node=""> Five of the protesters were later acquitted.</span><sup class="reference" data-dcnode-id="5249" id="cite_ref-135"><a data-dcnode-id="5250" href="#cite_note-135"><span data-dcnode-id="5251" instrument_node="">[135]</span></a></sup><span data-dcnode-id="5248" instrument_node=""> In the same month, as part of a counterprotest, </span><a data-dcnode-id="5246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Premier_of_Newfoundland_and_Labrador" title="Premier of Newfoundland and Labrador"><span data-dcnode-id="5247" instrument_node="">Newfoundland and Labrador Premier</span></a><span data-dcnode-id="5245" instrument_node=""> </span><a data-dcnode-id="5243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Danny_Williams_%28Canadian_politician%29" title="Danny Williams (Canadian politician)"><span data-dcnode-id="5244" instrument_node="">Danny Williams</span></a><span data-dcnode-id="5242" instrument_node=""> encouraged people in the province to boycott </span><a data-dcnode-id="5240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Costco" title="Costco"><span data-dcnode-id="5241" instrument_node="">Costco</span></a><span data-dcnode-id="5239" instrument_node=""> after the retailer decided to stop carrying seal oil capsules.</span><sup class="reference" data-dcnode-id="5236" id="cite_ref-136"><a data-dcnode-id="5237" href="#cite_note-136"><span data-dcnode-id="5238" instrument_node="">[136]</span></a></sup><span data-dcnode-id="5235" instrument_node=""> Costco stated politics played no role in their decision to remove the capsules, and on April 4 that year, they were again being sold in Costco stores.</span><sup class="reference" data-dcnode-id="5232" id="cite_ref-137"><a data-dcnode-id="5233" href="#cite_note-137"><span data-dcnode-id="5234" instrument_node="">[137]</span></a></sup><span data-dcnode-id="5231" instrument_node="">
</span></p><p data-dcnode-id="5190"><span data-dcnode-id="5229" instrument_node="">In 2009, the European Union passed a law banning the promotion of imported seal products. The law was approved by the </span><a data-dcnode-id="5227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Council_of_the_European_Union" title="Council of the European Union"><span data-dcnode-id="5228" instrument_node="">Council of the European Union</span></a><span data-dcnode-id="5226" instrument_node=""> without debate on 27 July 2009.</span><sup class="reference" data-dcnode-id="5223" id="cite_ref-138"><a data-dcnode-id="5224" href="#cite_note-138"><span data-dcnode-id="5225" instrument_node="">[138]</span></a></sup><span data-dcnode-id="5222" instrument_node=""> Denmark, Romania, and Austria abstained.</span><sup class="reference" data-dcnode-id="5219" id="cite_ref-139"><a data-dcnode-id="5220" href="#cite_note-139"><span data-dcnode-id="5221" instrument_node="">[139]</span></a></sup><span data-dcnode-id="5218" instrument_node=""> The Canadian government responded to the move by stating that it will take the European Union to the </span><a data-dcnode-id="5216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Trade_Organization" title="World Trade Organization"><span data-dcnode-id="5217" instrument_node="">World Trade Organization</span></a><span data-dcnode-id="5215" instrument_node=""> if the ban does not exempt Canada.</span><sup class="reference" data-dcnode-id="5212" id="cite_ref-EU_takes_aim_at_Canada,_bans_seal_products_140-0"><a data-dcnode-id="5213" href="#cite_note-EU_takes_aim_at_Canada,_bans_seal_products-140"><span data-dcnode-id="5214" instrument_node="">[140]</span></a></sup><span data-dcnode-id="5211" instrument_node=""> Canadian </span><a data-dcnode-id="5209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inuit" title="Inuit"><span data-dcnode-id="5210" instrument_node="">Inuit</span></a><span data-dcnode-id="5208" instrument_node=""> from the territory of </span><a data-dcnode-id="5206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nunavut" title="Nunavut"><span data-dcnode-id="5207" instrument_node="">Nunavut</span></a><span data-dcnode-id="5205" instrument_node=""> have opposed the ban and lobbied European Parliament members against it.</span><sup class="reference" data-dcnode-id="5202" id="cite_ref-EU_ban_looms_over_seal_products_141-0"><a data-dcnode-id="5203" href="#cite_note-EU_ban_looms_over_seal_products-141"><span data-dcnode-id="5204" instrument_node="">[141]</span></a></sup><span data-dcnode-id="5201" instrument_node=""> Canadian seal hunting issues had been spotlighted in the months leading up to the </span><a data-dcnode-id="5199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2010_Winter_Olympics" title="2010 Winter Olympics"><span data-dcnode-id="5200" instrument_node="">2010 Winter Olympics</span></a><span data-dcnode-id="5198" instrument_node=""> which were held in </span><a data-dcnode-id="5196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vancouver" title="Vancouver"><span data-dcnode-id="5197" instrument_node="">Vancouver</span></a><span data-dcnode-id="5195" instrument_node="">.</span><sup class="reference" data-dcnode-id="5192" id="cite_ref-142"><a data-dcnode-id="5193" href="#cite_note-142"><span data-dcnode-id="5194" instrument_node="">[142]</span></a></sup><span data-dcnode-id="5191" instrument_node="">
</span></p><span data-dcnode-id="5189" instrument_node="">
</span><h4 data-dcnode-id="5179"><span class="mw-headline" data-dcnode-id="5187" id="Inuit_impact"><span data-dcnode-id="5188" instrument_node="">Inuit impact</span></span><span class="mw-editsection" data-dcnode-id="5180"><span class="mw-editsection-bracket" data-dcnode-id="5185"><span data-dcnode-id="5186" instrument_node="">[</span></span><a data-dcnode-id="5183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D30" title="Edit section: Inuit impact"><span data-dcnode-id="5184" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5181"><span data-dcnode-id="5182" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5178" instrument_node="">
</span><p data-dcnode-id="5155"><span data-dcnode-id="5177" instrument_node="">An important distinction between the southern Canadian seal hunt and the </span><a data-dcnode-id="5175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inuit" title="Inuit"><span data-dcnode-id="5176" instrument_node="">Inuit</span></a><span data-dcnode-id="5174" instrument_node=""> Canadian hunt is that Canadian Inuit typically hunt </span><a data-dcnode-id="5172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ringed_seal" title="Ringed seal"><span data-dcnode-id="5173" instrument_node="">ringed seals</span></a><span data-dcnode-id="5171" instrument_node="">, while the southern Canadian hunt targets the pelt of the </span><a data-dcnode-id="5169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harp_seal" title="Harp seal"><span data-dcnode-id="5170" instrument_node="">harp seal</span></a><span data-dcnode-id="5168" instrument_node="">. Greenlandic Inuit hunt and eat both ringed and harp seals. Protests surrounding the southern seal hunt in Canada have historically impacted Canadian and Greenlandic Inuit.</span><sup class="reference" data-dcnode-id="5165" id="cite_ref-143"><a data-dcnode-id="5166" href="#cite_note-143"><span data-dcnode-id="5167" instrument_node="">[143]</span></a></sup><span data-dcnode-id="5164" instrument_node="">  Because of the impact of protest, profits surrounding the Inuit hunting of ringed seal fall with any ban on any type of seal product, regardless of exemption. For example, in 1963, prices for high-quality pelts of ringed seals could reach above $20.00 each; these same pelts in 1967, the year of the first major protests, would only sell for $2.50 each, which impacted Inuit in many areas.</span><sup class="reference" data-dcnode-id="5161" id="cite_ref-WenzelControversy_12-1"><a data-dcnode-id="5162" href="#cite_note-WenzelControversy-12"><span data-dcnode-id="5163" instrument_node="">[12]</span></a></sup><span data-dcnode-id="5160" instrument_node=""> Protests in other years have resulted in similar decreases in price.</span><sup class="reference" data-dcnode-id="5157" id="cite_ref-WenzelControversy_12-2"><a data-dcnode-id="5158" href="#cite_note-WenzelControversy-12"><span data-dcnode-id="5159" instrument_node="">[12]</span></a></sup><span data-dcnode-id="5156" instrument_node="">
</span></p><span data-dcnode-id="5154" instrument_node="">
</span><h4 data-dcnode-id="5144"><span class="mw-headline" data-dcnode-id="5152" id="Celebrity_involvement"><span data-dcnode-id="5153" instrument_node="">Celebrity involvement</span></span><span class="mw-editsection" data-dcnode-id="5145"><span class="mw-editsection-bracket" data-dcnode-id="5150"><span data-dcnode-id="5151" instrument_node="">[</span></span><a data-dcnode-id="5148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D31" title="Edit section: Celebrity involvement"><span data-dcnode-id="5149" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5146"><span data-dcnode-id="5147" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5143" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5131"><div class="thumbinner" data-dcnode-id="5132" style="width:172px;"><a class="image" data-dcnode-id="5141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJacques-Yves_Cousteau.jpg"><img alt="" class="thumbimage" data-dcnode-id="5142" data-file-height="304" data-file-width="249" decoding="async" height="208" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Jacques-Yves_Cousteau.jpg/170px-Jacques-Yves_Cousteau.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/9/9e/Jacques-Yves_Cousteau.jpg 1.5x" width="170"></a><span data-dcnode-id="5140" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5133"><div class="magnify" data-dcnode-id="5138"><a class="internal" data-dcnode-id="5139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJacques-Yves_Cousteau.jpg" title="Enlarge"></a></div><span data-dcnode-id="5137" instrument_node="">Marine ecologist </span><a data-dcnode-id="5135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacques_Cousteau" title="Jacques Cousteau"><span data-dcnode-id="5136" instrument_node="">Jacques Cousteau</span></a><span data-dcnode-id="5134" instrument_node=""> criticized the seal hunt protest as emotional.</span></div></div></div><span data-dcnode-id="5130" instrument_node="">
</span><p data-dcnode-id="5041"><span data-dcnode-id="5129" instrument_node="">Numerous celebrities have opposed the commercial seal hunt. </span><a data-dcnode-id="5127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rex_Murphy" title="Rex Murphy"><span data-dcnode-id="5128" instrument_node="">Rex Murphy</span></a><span data-dcnode-id="5126" instrument_node=""> has reported celebrities have aided anti-hunt activists since the mid-20th century; </span><a data-dcnode-id="5124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yvette_Mimieux" title="Yvette Mimieux"><span data-dcnode-id="5125" instrument_node="">Yvette Mimieux</span></a><span data-dcnode-id="5123" instrument_node=""> and </span><a data-dcnode-id="5121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Loretta_Swit" title="Loretta Swit"><span data-dcnode-id="5122" instrument_node="">Loretta Swit</span></a><span data-dcnode-id="5120" instrument_node=""> were recruited to attract the attention of international gossip magazines.</span><sup class="reference" data-dcnode-id="5117" id="cite_ref-144"><a data-dcnode-id="5118" href="#cite_note-144"><span data-dcnode-id="5119" instrument_node="">[144]</span></a></sup><span data-dcnode-id="5116" instrument_node=""> Other celebrities who have aligned themselves against the hunt include </span><a data-dcnode-id="5114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Dean_Anderson" title="Richard Dean Anderson"><span data-dcnode-id="5115" instrument_node="">Richard Dean Anderson</span></a><span data-dcnode-id="5113" instrument_node="">, </span><a data-dcnode-id="5111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kim_Basinger" title="Kim Basinger"><span data-dcnode-id="5112" instrument_node="">Kim Basinger</span></a><span data-dcnode-id="5110" instrument_node="">, </span><a data-dcnode-id="5108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Juliette_Binoche" title="Juliette Binoche"><span data-dcnode-id="5109" instrument_node="">Juliette Binoche</span></a><span data-dcnode-id="5107" instrument_node="">,</span><sup class="reference" data-dcnode-id="5104" id="cite_ref-145"><a data-dcnode-id="5105" href="#cite_note-145"><span data-dcnode-id="5106" instrument_node="">[145]</span></a></sup><span data-dcnode-id="5103" instrument_node=""> Sir </span><a data-dcnode-id="5101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_McCartney" title="Paul McCartney"><span data-dcnode-id="5102" instrument_node="">Paul McCartney</span></a><span data-dcnode-id="5100" instrument_node="">, </span><a data-dcnode-id="5098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heather_Mills" title="Heather Mills"><span data-dcnode-id="5099" instrument_node="">Heather Mills</span></a><span data-dcnode-id="5097" instrument_node="">, </span><a data-dcnode-id="5095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pamela_Anderson" title="Pamela Anderson"><span data-dcnode-id="5096" instrument_node="">Pamela Anderson</span></a><span data-dcnode-id="5094" instrument_node="">, </span><a data-dcnode-id="5092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Sheen" title="Martin Sheen"><span data-dcnode-id="5093" instrument_node="">Martin Sheen</span></a><span data-dcnode-id="5091" instrument_node="">, </span><a data-dcnode-id="5089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pierce_Brosnan" title="Pierce Brosnan"><span data-dcnode-id="5090" instrument_node="">Pierce Brosnan</span></a><span data-dcnode-id="5088" instrument_node="">, </span><a data-dcnode-id="5086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morrissey" title="Morrissey"><span data-dcnode-id="5087" instrument_node="">Morrissey</span></a><span data-dcnode-id="5085" instrument_node="">, </span><a data-dcnode-id="5083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_Hilton" title="Paris Hilton"><span data-dcnode-id="5084" instrument_node="">Paris Hilton</span></a><span data-dcnode-id="5082" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Kennedy%2C_Jr." title="Robert Kennedy, Jr."><span data-dcnode-id="5081" instrument_node="">Robert Kennedy, Jr.</span></a><span data-dcnode-id="5079" instrument_node="">,</span><sup class="reference" data-dcnode-id="5076" id="cite_ref-146"><a data-dcnode-id="5077" href="#cite_note-146"><span data-dcnode-id="5078" instrument_node="">[146]</span></a></sup><span data-dcnode-id="5075" instrument_node=""> </span><a data-dcnode-id="5073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rutger_Hauer" title="Rutger Hauer"><span data-dcnode-id="5074" instrument_node="">Rutger Hauer</span></a><span data-dcnode-id="5072" instrument_node="">,</span><sup class="reference" data-dcnode-id="5069" id="cite_ref-147"><a data-dcnode-id="5070" href="#cite_note-147"><span data-dcnode-id="5071" instrument_node="">[147]</span></a></sup><span data-dcnode-id="5068" instrument_node=""> </span><a data-dcnode-id="5066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brigitte_Bardot" title="Brigitte Bardot"><span data-dcnode-id="5067" instrument_node="">Brigitte Bardot</span></a><span data-dcnode-id="5065" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ed_Begley%2C_Jr." title="Ed Begley, Jr."><span data-dcnode-id="5064" instrument_node="">Ed Begley, Jr.</span></a><span data-dcnode-id="5062" instrument_node="">, </span><a data-dcnode-id="5060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Farley_Mowat" title="Farley Mowat"><span data-dcnode-id="5061" instrument_node="">Farley Mowat</span></a><span data-dcnode-id="5059" instrument_node="">, </span><a data-dcnode-id="5057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Linda_Blair" title="Linda Blair"><span data-dcnode-id="5058" instrument_node="">Linda Blair</span></a><span data-dcnode-id="5056" instrument_node="">, the </span><a data-dcnode-id="5054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Hot_Chili_Peppers" title="Red Hot Chili Peppers"><span data-dcnode-id="5055" instrument_node="">Red Hot Chili Peppers</span></a><span data-dcnode-id="5053" instrument_node="">,</span><sup class="reference" data-dcnode-id="5050" id="cite_ref-148"><a data-dcnode-id="5051" href="#cite_note-148"><span data-dcnode-id="5052" instrument_node="">[148]</span></a></sup><span data-dcnode-id="5049" instrument_node=""> and </span><a data-dcnode-id="5047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jackie_Evancho" title="Jackie Evancho"><span data-dcnode-id="5048" instrument_node="">Jackie Evancho</span></a><span data-dcnode-id="5046" instrument_node="">.</span><sup class="reference" data-dcnode-id="5043" id="cite_ref-149"><a data-dcnode-id="5044" href="#cite_note-149"><span data-dcnode-id="5045" instrument_node="">[149]</span></a></sup><span data-dcnode-id="5042" instrument_node="">
</span></p><p data-dcnode-id="5030"><span data-dcnode-id="5040" instrument_node="">In March 2006, Brigitte Bardot traveled to Ottawa to protest the hunt, though the prime minister turned down her request for a meeting. During the same month, Paul and Heather Mills McCartney toured the Gulf of Saint Lawrence's sealing grounds, and spoke out against the seal hunt, including as guests on </span><a data-dcnode-id="5038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Larry_King_Live" title="Larry King Live"><span data-dcnode-id="5039" instrument_node="">Larry King Live</span></a><span data-dcnode-id="5037" instrument_node="">, where the two debated with </span><a data-dcnode-id="5035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Danny_Williams_%28Canadian_politician%29" title="Danny Williams (Canadian politician)"><span data-dcnode-id="5036" instrument_node="">Danny Williams</span></a><span data-dcnode-id="5034" instrument_node="">, the </span><a data-dcnode-id="5032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Premier_of_Newfoundland_and_Labrador" title="Premier of Newfoundland and Labrador"><span data-dcnode-id="5033" instrument_node="">Premier of Newfoundland and Labrador</span></a><span data-dcnode-id="5031" instrument_node="">.
</span></p><p data-dcnode-id="5021"><span data-dcnode-id="5029" instrument_node="">In 1978, marine ecologist </span><a data-dcnode-id="5027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacques_Cousteau" title="Jacques Cousteau"><span data-dcnode-id="5028" instrument_node="">Jacques Cousteau</span></a><span data-dcnode-id="5026" instrument_node=""> criticized the seal hunt protest: "The harp seal question is entirely emotional. We have to be logical. We have to aim our activity first to the endangered species. Those who are moved by the plight of the harp seal could also be moved by the plight of the pig – the way they are slaughtered is horrible."</span><sup class="reference" data-dcnode-id="5023" id="cite_ref-WenzelAnimalRights_150-0"><a data-dcnode-id="5024" href="#cite_note-WenzelAnimalRights-150"><span data-dcnode-id="5025" instrument_node="">[150]</span></a></sup><span data-dcnode-id="5022" instrument_node="">
</span></p><span data-dcnode-id="5020" instrument_node="">
</span><h2 data-dcnode-id="5010"><span class="mw-headline" data-dcnode-id="5018" id="Media"><span data-dcnode-id="5019" instrument_node="">Media</span></span><span class="mw-editsection" data-dcnode-id="5011"><span class="mw-editsection-bracket" data-dcnode-id="5016"><span data-dcnode-id="5017" instrument_node="">[</span></span><a data-dcnode-id="5014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D32" title="Edit section: Media"><span data-dcnode-id="5015" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5012"><span data-dcnode-id="5013" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5009" instrument_node="">
</span><ul data-dcnode-id="4947"><li data-dcnode-id="5000"><span data-dcnode-id="5008" instrument_node="">Alethea Arnaquq-Baril's documentary </span><i data-dcnode-id="5005"><a data-dcnode-id="5006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angry_Inuk" title="Angry Inuk"><span data-dcnode-id="5007" instrument_node="">Angry Inuk</span></a></i><span data-dcnode-id="5004" instrument_node=""> details the relationship between seal hunting, Inuit poverty, and the consequences of international trade bans.</span><sup class="reference" data-dcnode-id="5001" id="cite_ref-151"><a data-dcnode-id="5002" href="#cite_note-151"><span data-dcnode-id="5003" instrument_node="">[151]</span></a></sup></li><span data-dcnode-id="4999" instrument_node="">
</span><li data-dcnode-id="4985"><a data-dcnode-id="4997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rudyard_Kipling" title="Rudyard Kipling"><span data-dcnode-id="4998" instrument_node="">Rudyard Kipling</span></a><span data-dcnode-id="4996" instrument_node="">'s </span><i data-dcnode-id="4994"><span data-dcnode-id="4995" instrument_node="">The White Seal</span></i><span data-dcnode-id="4993" instrument_node="">, part of </span><i data-dcnode-id="4990"><a data-dcnode-id="4991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Jungle_Book" title="The Jungle Book"><span data-dcnode-id="4992" instrument_node="">The Jungle Book</span></a></i><span data-dcnode-id="4989" instrument_node="">, describes seal hunting from the seals' point of view, with the central character being a </span><a data-dcnode-id="4987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fur_seal" title="Fur seal"><span data-dcnode-id="4988" instrument_node="">white seal</span></a><span data-dcnode-id="4986" instrument_node=""> seeking for his seals a safe haven from hunters.</span></li><span data-dcnode-id="4984" instrument_node="">
</span><li data-dcnode-id="4973"><a data-dcnode-id="4982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jack_London" title="Jack London"><span data-dcnode-id="4983" instrument_node="">Jack London</span></a><span data-dcnode-id="4981" instrument_node="">'s novel </span><i data-dcnode-id="4978"><a class="mw-redirect" data-dcnode-id="4979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Sea_Wolf" title="The Sea Wolf"><span data-dcnode-id="4980" instrument_node="">The Sea Wolf</span></a></i><span data-dcnode-id="4977" instrument_node=""> takes place aboard "the schooner </span><i data-dcnode-id="4975"><span data-dcnode-id="4976" instrument_node="">Ghost</span></i><span data-dcnode-id="4974" instrument_node="">, bound seal-hunting for Japan" circa 1893.</span></li><span data-dcnode-id="4972" instrument_node="">
</span><li data-dcnode-id="4962"><a data-dcnode-id="4970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Cushman_Murphy" title="Robert Cushman Murphy"><span data-dcnode-id="4971" instrument_node="">Robert Cushman Murphy</span></a><span data-dcnode-id="4969" instrument_node="">'s book of letters </span><i data-dcnode-id="4967"><span data-dcnode-id="4968" instrument_node="">Logbook for Grace</span></i><span data-dcnode-id="4966" instrument_node=""> describes the expedition of the sealer </span><i data-dcnode-id="4964"><span data-dcnode-id="4965" instrument_node="">Daisy</span></i><span data-dcnode-id="4963" instrument_node=""> in 1912 to South Georgia Island, and includes many details about the brutal elephant seal fishery there.</span></li><span data-dcnode-id="4961" instrument_node="">
</span><li data-dcnode-id="4955"><span data-dcnode-id="4960" instrument_node="">Seal clubbers are a class that player characters can choose in the browser-based RPG </span><i data-dcnode-id="4957"><a data-dcnode-id="4958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Loathing" title="Kingdom of Loathing"><span data-dcnode-id="4959" instrument_node="">Kingdom of Loathing</span></a></i><span data-dcnode-id="4956" instrument_node="">.</span></li><span data-dcnode-id="4954" instrument_node="">
</span><li data-dcnode-id="4948"><span data-dcnode-id="4953" instrument_node="">The topi enemy in the NES game </span><i data-dcnode-id="4950"><a data-dcnode-id="4951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ice_Climber" title="Ice Climber"><span data-dcnode-id="4952" instrument_node="">Ice Climber</span></a></i><span data-dcnode-id="4949" instrument_node=""> is a seal in the Japanese version, however it was changed into a yeti in North American and European versions because of concerns over seal hunting references.</span></li></ul><span data-dcnode-id="4946" instrument_node="">
