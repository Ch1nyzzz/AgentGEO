</span></p><p data-dcnode-id="7168"><span data-dcnode-id="7209" instrument_node="">The seal hunt provided critical winter wages for fishermen, but was dangerous work marked by sealing disasters that claimed hundreds of lives, such as the 1914 Newfoundland Sealing Disaster involving the </span><a data-dcnode-id="7205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SS_Southern_Cross_%281886%29" title="SS Southern Cross (1886)"><span data-dcnode-id="7208" instrument_node="">SS&nbsp;</span><i data-dcnode-id="7206"><span data-dcnode-id="7207" instrument_node="">Southern Cross</span></i></a><span data-dcnode-id="7204" instrument_node="">, the </span><a data-dcnode-id="7200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SS_Newfoundland" title="SS Newfoundland"><span data-dcnode-id="7203" instrument_node="">SS&nbsp;</span><i data-dcnode-id="7201"><span data-dcnode-id="7202" instrument_node="">Newfoundland</span></i></a><span data-dcnode-id="7199" instrument_node="">, and SS </span><i data-dcnode-id="7197"><span data-dcnode-id="7198" instrument_node="">Stephano</span></i><span data-dcnode-id="7196" instrument_node="">.</span><sup class="reference" data-dcnode-id="7193" id="cite_ref-disaster_41-1"><a data-dcnode-id="7194" href="#cite_note-disaster-41"><span data-dcnode-id="7195" instrument_node="">[41]</span></a></sup><span data-dcnode-id="7192" instrument_node=""> The rugged hulls and experienced crews of Newfoundland sealing vessels often led sealers such as </span><i data-dcnode-id="7190"><span data-dcnode-id="7191" instrument_node="">Bear</span></i><span data-dcnode-id="7189" instrument_node=""> and </span><i data-dcnode-id="7187"><span data-dcnode-id="7188" instrument_node="">Terra Nova</span></i><span data-dcnode-id="7186" instrument_node=""> to be hired for Arctic exploration and one sealer </span><i data-dcnode-id="7184"><span data-dcnode-id="7185" instrument_node="">Algerine</span></i><span data-dcnode-id="7183" instrument_node=""> was hired to recover </span><i data-dcnode-id="7181"><span data-dcnode-id="7182" instrument_node="">Titanic</span></i><span data-dcnode-id="7180" instrument_node=""> bodies in 1912. After </span><a data-dcnode-id="7178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="7179" instrument_node="">World War II</span></a><span data-dcnode-id="7177" instrument_node="">, the Newfoundland hunt was dominated by large Norwegian sealing vessels until the late 20th century, when the much diminished hunt shifted to smaller motor fishing vessels, based from outports around Newfoundland and Labrador. In 2007, the commercial seal hunt dividend contributed about $6&nbsp;million to the Newfoundland GDP, a fraction of the industry's former importance.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7170" style="white-space:nowrap;"><span data-dcnode-id="7176" instrument_node="">[</span><i data-dcnode-id="7172"><a data-dcnode-id="7173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7174" title="This claim needs references to reliable sources. (December 2012)"><span data-dcnode-id="7175" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7171" instrument_node="">]</span></sup><span data-dcnode-id="7169" instrument_node="">
</span></p><span data-dcnode-id="7167" instrument_node="">
</span><h3 data-dcnode-id="7157"><span class="mw-headline" data-dcnode-id="7165" id="Environmental_protection"><span data-dcnode-id="7166" instrument_node="">Environmental protection</span></span><span class="mw-editsection" data-dcnode-id="7158"><span class="mw-editsection-bracket" data-dcnode-id="7163"><span data-dcnode-id="7164" instrument_node="">[</span></span><a data-dcnode-id="7161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D8" title="Edit section: Environmental protection"><span data-dcnode-id="7162" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7159"><span data-dcnode-id="7160" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7156" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7135"><div class="thumbinner" data-dcnode-id="7136" style="width:222px;"><a class="image" data-dcnode-id="7154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChoris%2C_Saint_Paul.jpg"><img alt="" class="thumbimage" data-dcnode-id="7155" data-file-height="1051" data-file-width="1343" decoding="async" height="172" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Choris%252C_Saint_Paul.jpg/220px-Choris%252C_Saint_Paul.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Choris%2C_Saint_Paul.jpg/330px-Choris%2C_Saint_Paul.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Choris%2C_Saint_Paul.jpg/440px-Choris%2C_Saint_Paul.jpg 2x" width="220"></a><span data-dcnode-id="7153" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7137"><div class="magnify" data-dcnode-id="7151"><a class="internal" data-dcnode-id="7152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChoris%2C_Saint_Paul.jpg" title="Enlarge"></a></div><span data-dcnode-id="7150" instrument_node="">The Russian </span><i data-dcnode-id="7148"><span data-dcnode-id="7149" instrument_node="">Rurik</span></i><span data-dcnode-id="7147" instrument_node="">, near </span><a data-dcnode-id="7145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saint_Paul_Island_%28Alaska%29" title="Saint Paul Island (Alaska)"><span data-dcnode-id="7146" instrument_node="">Saint Paul Island</span></a><span data-dcnode-id="7144" instrument_node=""> in the </span><a data-dcnode-id="7142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bering_Sea" title="Bering Sea"><span data-dcnode-id="7143" instrument_node="">Bering Sea</span></a><span data-dcnode-id="7141" instrument_node="">. Sealing in the Bering sea led to a diplomatic dispute between the US and Britain in the 1880s, which brought about the first legislative attempts to limit the environmental damage done by the sealers. Drawing by </span><a data-dcnode-id="7139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_Choris" title="Louis Choris"><span data-dcnode-id="7140" instrument_node="">Louis Choris</span></a><span data-dcnode-id="7138" instrument_node=""> in 1817.</span></div></div></div><span data-dcnode-id="7134" instrument_node="">
</span><p data-dcnode-id="7089"><span data-dcnode-id="7133" instrument_node="">The end of the 19th century was marked by the </span><a class="mw-redirect" data-dcnode-id="7131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bering_Sea_Controversy" title="Bering Sea Controversy"><span data-dcnode-id="7132" instrument_node="">Bering Sea Controversy</span></a><span data-dcnode-id="7130" instrument_node=""> between the United States and Great Britain over the management of fur seal harvests.</span><sup class="reference" data-dcnode-id="7127" id="cite_ref-ea_9-1"><a data-dcnode-id="7128" href="#cite_note-ea-9"><span data-dcnode-id="7129" instrument_node="">[9]</span></a></sup><span data-dcnode-id="7126" instrument_node=""> In 1867 the United States government purchased from Russia all her territorial rights in </span><a data-dcnode-id="7124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alaska" title="Alaska"><span data-dcnode-id="7125" instrument_node="">Alaska</span></a><span data-dcnode-id="7123" instrument_node=""> and the adjacent islands, including the </span><a data-dcnode-id="7121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pribilof_Islands" title="Pribilof Islands"><span data-dcnode-id="7122" instrument_node="">Pribilof Islands</span></a><span data-dcnode-id="7120" instrument_node="">, the principal breeding-grounds of the seals in those seas. By </span><a class="mw-redirect" data-dcnode-id="7118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acts_of_Congress" title="Acts of Congress"><span data-dcnode-id="7119" instrument_node="">Acts of Congress</span></a><span data-dcnode-id="7117" instrument_node="">, the killing of seals was strictly regulated on the Pribiloff islands and in "the waters adjacent thereto". Beginning in about 1886, it became the practice of certain British and Canadian vessels to intercept passing seals in the open ocean (over three miles from any shore) and shoot them in the water (pelagic sealing).</span><sup class="reference" data-dcnode-id="7114" id="cite_ref-nie_44-0"><a data-dcnode-id="7115" href="#cite_note-nie-44"><span data-dcnode-id="7116" instrument_node="">[44]</span></a></sup><span data-dcnode-id="7113" instrument_node=""> In the summer of 1886, three British Columbian sealers, the </span><i data-dcnode-id="7111"><span data-dcnode-id="7112" instrument_node="">Carolena</span></i><span data-dcnode-id="7110" instrument_node="">, </span><i data-dcnode-id="7108"><span data-dcnode-id="7109" instrument_node="">Onward</span></i><span data-dcnode-id="7107" instrument_node="">, and </span><i data-dcnode-id="7105"><span data-dcnode-id="7106" instrument_node="">Thornton</span></i><span data-dcnode-id="7104" instrument_node="">, were captured by an American revenue cutter, the </span><a data-dcnode-id="7101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/USRC_Thomas_Corwin_%281876%29" title="USRC Thomas Corwin (1876)"><i data-dcnode-id="7102"><span data-dcnode-id="7103" instrument_node="">Corwin</span></i></a><span data-dcnode-id="7100" instrument_node="">,</span><sup class="reference" data-dcnode-id="7097" id="cite_ref-45"><a data-dcnode-id="7098" href="#cite_note-45"><span data-dcnode-id="7099" instrument_node="">[45]</span></a></sup><span data-dcnode-id="7096" instrument_node=""> The United States claimed exclusive jurisdiction over the sealing industry in the </span><a data-dcnode-id="7094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bering_Sea" title="Bering Sea"><span data-dcnode-id="7095" instrument_node="">Bering Sea</span></a><span data-dcnode-id="7093" instrument_node="">; it also contended that the protection of the </span><a data-dcnode-id="7091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fur_seal" title="Fur seal"><span data-dcnode-id="7092" instrument_node="">fur seal</span></a><span data-dcnode-id="7090" instrument_node=""> was an international duty, and should be secured by international arrangement. The British imperial government repudiated the claim, but was willing to negotiate on the question of international regulation.
</span></p><span data-dcnode-id="7088" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="7076"><div class="thumbinner" data-dcnode-id="7077" style="width:222px;"><a class="image" data-dcnode-id="7086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AH%25C3%25BClgevaatlus%2C_postipaat_Helge.JPG"><img alt="" class="thumbimage" data-dcnode-id="7087" data-file-height="3000" data-file-width="4512" decoding="async" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0a/H%25C3%25BClgevaatlus%252C_postipaat_Helge.JPG/220px-H%25C3%25BClgevaatlus%252C_postipaat_Helge.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0a/H%C3%BClgevaatlus%2C_postipaat_Helge.JPG/330px-H%C3%BClgevaatlus%2C_postipaat_Helge.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/0a/H%C3%BClgevaatlus%2C_postipaat_Helge.JPG/440px-H%C3%BClgevaatlus%2C_postipaat_Helge.JPG 2x" width="220"></a><span data-dcnode-id="7085" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7078"><div class="magnify" data-dcnode-id="7083"><a class="internal" data-dcnode-id="7084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AH%25C3%25BClgevaatlus%2C_postipaat_Helge.JPG" title="Enlarge"></a></div><span data-dcnode-id="7082" instrument_node="">While people living in Estonian coastal areas used to hunt seals, this has changed a lot within the last half century. Within the last decade </span><a data-dcnode-id="7080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecotourism" title="Ecotourism"><span data-dcnode-id="7081" instrument_node="">ecotourism</span></a><span data-dcnode-id="7079" instrument_node=""> has also emerged, and nowadays seal watching tours are being organized.</span></div></div></div><span data-dcnode-id="7075" instrument_node="">
</span><p data-dcnode-id="7073"><span data-dcnode-id="7074" instrument_node="">The issue was taken to arbitration, which concluded in favour of Britain on all points in 1893. Since the decision was in favor of Great Britain, in accordance with the arbitration treaty the tribunal prescribed a series of regulations for preserving the seal herds which were to be binding upon and enforced by both powers. They limited pelagic sealing as to time, place, and manner by fixing a zone of 60 miles (97&nbsp;km) around the Pribilof Islands within which the seals were not to be molested at any time, and from May 1 to July 31 each year they were not to be pursued anywhere in Bering Sea. Only licensed sailing vessels were permitted to engage in fur sealing, and the use of firearms or explosives was prohibited.
</span></p><p data-dcnode-id="7059"><span data-dcnode-id="7072" instrument_node="">This marked the first attempt at establishing regulations on the sealing industry for environmental purposes.</span><sup class="reference" data-dcnode-id="7069" id="cite_ref-nie_44-1"><a data-dcnode-id="7070" href="#cite_note-nie-44"><span data-dcnode-id="7071" instrument_node="">[44]</span></a></sup><span data-dcnode-id="7068" instrument_node=""> However, these regulations failed because the mother seals fed outside the protected area and remained vulnerable.</span><sup class="reference" data-dcnode-id="7065" id="cite_ref-ea_9-2"><a data-dcnode-id="7066" href="#cite_note-ea-9"><span data-dcnode-id="7067" instrument_node="">[9]</span></a></sup><span data-dcnode-id="7064" instrument_node=""> A joint commission of scientists from Britain and the United States further considered the problem, and came to the conclusion that the pelagic sealing needed to be curtailed.  However further joint tribunals did not enact new legal restrictions, and then Japan also embarked upon pelagic sealing.</span><sup class="reference" data-dcnode-id="7061" id="cite_ref-ea_9-3"><a data-dcnode-id="7062" href="#cite_note-ea-9"><span data-dcnode-id="7063" instrument_node="">[9]</span></a></sup><span data-dcnode-id="7060" instrument_node="">
</span></p><p data-dcnode-id="7044"><span data-dcnode-id="7058" instrument_node="">Finally, the </span><a data-dcnode-id="7056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Pacific_Fur_Seal_Convention_of_1911" title="North Pacific Fur Seal Convention of 1911"><span data-dcnode-id="7057" instrument_node="">North Pacific Fur Seal Convention</span></a><span data-dcnode-id="7055" instrument_node=""> severely curtailed the sealing industry. Signed on July 7, 1911, by the United States, </span><a data-dcnode-id="7053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Britain" title="Great Britain"><span data-dcnode-id="7054" instrument_node="">Great Britain</span></a><span data-dcnode-id="7052" instrument_node="">, Japan, and Russia, the treaty was designed to manage the commercial harvest of fur bearing mammals. It outlawed open-water seal hunting and acknowledged the United States' </span><a data-dcnode-id="7050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jurisdiction" title="Jurisdiction"><span data-dcnode-id="7051" instrument_node="">jurisdiction</span></a><span data-dcnode-id="7049" instrument_node=""> in managing the on-shore hunting of seals for commercial purposes.  It was the first international treaty to address wildlife preservation issues.</span><sup class="reference" data-dcnode-id="7046" id="cite_ref-NOAA_46-0"><a data-dcnode-id="7047" href="#cite_note-NOAA-46"><span data-dcnode-id="7048" instrument_node="">[46]</span></a></sup><span data-dcnode-id="7045" instrument_node="">
</span></p><p data-dcnode-id="7029"><span data-dcnode-id="7043" instrument_node="">The treaty was dissolved with the onset of hostilities between the signatories in World War II. However, the treaty set precedent for future national and </span><a class="mw-redirect" data-dcnode-id="7041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_laws" title="International laws"><span data-dcnode-id="7042" instrument_node="">international laws</span></a><span data-dcnode-id="7040" instrument_node=""> and treaties, including the </span><a class="new" data-dcnode-id="7038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFur_Seal_Act_of_1966%26action%3Dedit%26redlink%3D1" title="Fur Seal Act of 1966 (page does not exist)"><span data-dcnode-id="7039" instrument_node="">Fur Seal Act of 1966</span></a><span data-dcnode-id="7037" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="7035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marine_Mammal_Protection_Act_of_1972" title="Marine Mammal Protection Act of 1972"><span data-dcnode-id="7036" instrument_node="">Marine Mammal Protection Act of 1972</span></a><span data-dcnode-id="7034" instrument_node="">.</span><sup class="reference" data-dcnode-id="7031" id="cite_ref-NOAA_46-1"><a data-dcnode-id="7032" href="#cite_note-NOAA-46"><span data-dcnode-id="7033" instrument_node="">[46]</span></a></sup><span data-dcnode-id="7030" instrument_node="">
</span></p><p data-dcnode-id="7023"><span data-dcnode-id="7028" instrument_node="">Today, commercial sealing is conducted by only five nations: Canada, Greenland, Namibia, Norway, and Russia. The United States, which had been heavily involved in the sealing industry, now maintains a complete ban on the commercial hunting of marine mammals, with the exception of indigenous peoples who are allowed to hunt a small number of seals each year.</span><sup class="reference" data-dcnode-id="7025" id="cite_ref-47"><a data-dcnode-id="7026" href="#cite_note-47"><span data-dcnode-id="7027" instrument_node="">[47]</span></a></sup><span data-dcnode-id="7024" instrument_node="">
</span></p><span data-dcnode-id="7022" instrument_node="">
</span><h2 data-dcnode-id="7012"><span class="mw-headline" data-dcnode-id="7020" id="Equipment_and_method"><span data-dcnode-id="7021" instrument_node="">Equipment and method</span></span><span class="mw-editsection" data-dcnode-id="7013"><span class="mw-editsection-bracket" data-dcnode-id="7018"><span data-dcnode-id="7019" instrument_node="">[</span></span><a data-dcnode-id="7016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D9" title="Edit section: Equipment and method"><span data-dcnode-id="7017" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7014"><span data-dcnode-id="7015" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7011" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="6999"><div class="thumbinner" data-dcnode-id="7000" style="width:222px;"><a class="image" data-dcnode-id="7009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHakapik.jpg"><img alt="" class="thumbimage" data-dcnode-id="7010" data-file-height="1944" data-file-width="2592" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Hakapik.jpg/220px-Hakapik.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Hakapik.jpg/330px-Hakapik.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Hakapik.jpg/440px-Hakapik.jpg 2x" width="220"></a><span data-dcnode-id="7008" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7001"><div class="magnify" data-dcnode-id="7006"><a class="internal" data-dcnode-id="7007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHakapik.jpg" title="Enlarge"></a></div><span data-dcnode-id="7005" instrument_node="">A </span><i data-dcnode-id="7002"><a data-dcnode-id="7003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hakapik" title="Hakapik"><span data-dcnode-id="7004" instrument_node="">hakapik</span></a></i></div></div></div><span data-dcnode-id="6998" instrument_node="">
</span><p data-dcnode-id="6992"><span data-dcnode-id="6997" instrument_node="">In the Canadian commercial seal hunt, the majority of the hunters initiate the kill using a firearm. Ninety percent of sealers on the ice floes of the Front (east of Newfoundland), where the majority of non-native seal hunting occurs, use firearms.</span><sup class="reference" data-dcnode-id="6994" id="cite_ref-48"><a data-dcnode-id="6995" href="#cite_note-48"><span data-dcnode-id="6996" instrument_node="">[48]</span></a></sup><span data-dcnode-id="6993" instrument_node="">
</span></p><p data-dcnode-id="6971"><span data-dcnode-id="6991" instrument_node="">An older and more traditional method of killing seals is with a </span><i data-dcnode-id="6988"><a data-dcnode-id="6989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hakapik" title="Hakapik"><span data-dcnode-id="6990" instrument_node="">hakapik</span></a></i><span data-dcnode-id="6987" instrument_node="">: a heavy wooden club with a hammer head and metal hook on the end. The </span><i data-dcnode-id="6985"><span data-dcnode-id="6986" instrument_node="">hakapik</span></i><span data-dcnode-id="6984" instrument_node=""> is used because of its efficiency; the animal can be killed quickly without damage to its pelt. The hammer head is used to crush the seals' thin skulls, while the hook is used to move the carcasses.
Canadian sealing regulations describe the dimensions of the clubs and the </span><i data-dcnode-id="6981"><a data-dcnode-id="6982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hakapik" title="Hakapik"><span data-dcnode-id="6983" instrument_node="">hakapiks</span></a></i><span data-dcnode-id="6980" instrument_node="">, and caliber of the rifles and minimum bullet velocity, that can be used. They state: "Every person who strikes a seal with a club or hakapik shall strike the seal on the forehead until its skull has been crushed," and that "No person shall commence to skin or bleed a seal until the seal is dead," which occurs when it "has a glassy-eyed, staring appearance and exhibits no blinking reflex when its eye is touched while it is in a relaxed condition."</span><sup class="reference" data-dcnode-id="6977" id="cite_ref-49"><a data-dcnode-id="6978" href="#cite_note-49"><span data-dcnode-id="6979" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6976" instrument_node="">
Reportedly, in one study, three out of eight times, the animal was not rendered either dead or unconscious by shooting, and the hunters would then kill the seal using a hakapik or other club of a type that is sanctioned by the governing authority.</span><sup class="reference" data-dcnode-id="6973" id="cite_ref-50"><a data-dcnode-id="6974" href="#cite_note-50"><span data-dcnode-id="6975" instrument_node="">[50]</span></a></sup><span data-dcnode-id="6972" instrument_node="">
</span></p><span data-dcnode-id="6970" instrument_node="">
</span><h2 data-dcnode-id="6960"><span class="mw-headline" data-dcnode-id="6968" id="Modern_sealing"><span data-dcnode-id="6969" instrument_node="">Modern sealing</span></span><span class="mw-editsection" data-dcnode-id="6961"><span class="mw-editsection-bracket" data-dcnode-id="6966"><span data-dcnode-id="6967" instrument_node="">[</span></span><a data-dcnode-id="6964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D10" title="Edit section: Modern sealing"><span data-dcnode-id="6965" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6962"><span data-dcnode-id="6963" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6959" instrument_node="">
</span><h3 data-dcnode-id="6949"><span class="mw-headline" data-dcnode-id="6957" id="Products_made_from_seals"><span data-dcnode-id="6958" instrument_node="">Products made from seals</span></span><span class="mw-editsection" data-dcnode-id="6950"><span class="mw-editsection-bracket" data-dcnode-id="6955"><span data-dcnode-id="6956" instrument_node="">[</span></span><a data-dcnode-id="6953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D11" title="Edit section: Products made from seals"><span data-dcnode-id="6954" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6951"><span data-dcnode-id="6952" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6948" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6936"><div class="thumbinner" data-dcnode-id="6937" style="width:172px;"><a class="image" data-dcnode-id="6946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASelskinnsvest.JPG"><img alt="" class="thumbimage" data-dcnode-id="6947" data-file-height="599" data-file-width="463" decoding="async" height="220" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Selskinnsvest.JPG/170px-Selskinnsvest.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Selskinnsvest.JPG/255px-Selskinnsvest.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Selskinnsvest.JPG/340px-Selskinnsvest.JPG 2x" width="170"></a><span data-dcnode-id="6945" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6938"><div class="magnify" data-dcnode-id="6943"><a class="internal" data-dcnode-id="6944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASelskinnsvest.JPG" title="Enlarge"></a></div><span data-dcnode-id="6942" instrument_node="">A </span><a data-dcnode-id="6940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waistcoat" title="Waistcoat"><span data-dcnode-id="6941" instrument_node="">waistcoat</span></a><span data-dcnode-id="6939" instrument_node=""> made of seal fur</span></div></div></div><span data-dcnode-id="6935" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="6924"><div class="thumbinner" data-dcnode-id="6925" style="width:222px;"><a class="image" data-dcnode-id="6933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APhoeca_groenlandica_piece_of_meat_upernavik_2007-06-26.JPG"><img alt="" class="thumbimage" data-dcnode-id="6934" data-file-height="2112" data-file-width="2816" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/27/Phoeca_groenlandica_piece_of_meat_upernavik_2007-06-26.JPG/220px-Phoeca_groenlandica_piece_of_meat_upernavik_2007-06-26.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/27/Phoeca_groenlandica_piece_of_meat_upernavik_2007-06-26.JPG/330px-Phoeca_groenlandica_piece_of_meat_upernavik_2007-06-26.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/27/Phoeca_groenlandica_piece_of_meat_upernavik_2007-06-26.JPG/440px-Phoeca_groenlandica_piece_of_meat_upernavik_2007-06-26.JPG 2x" width="220"></a><span data-dcnode-id="6932" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6926"><div class="magnify" data-dcnode-id="6930"><a class="internal" data-dcnode-id="6931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APhoeca_groenlandica_piece_of_meat_upernavik_2007-06-26.JPG" title="Enlarge"></a></div><span data-dcnode-id="6929" instrument_node="">Meat from a young </span><a data-dcnode-id="6927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harp_seal" title="Harp seal"><span data-dcnode-id="6928" instrument_node="">harp seal</span></a></div></div></div><span data-dcnode-id="6923" instrument_node="">
</span><p data-dcnode-id="6885"><span data-dcnode-id="6922" instrument_node="">Seal skins have been used by aboriginal people for millennia to make waterproof jackets and boots, and seal fur to make fur coats. Pelts account for over half the processed value of a seal, selling at over C$100 each as of 2006.</span><sup class="reference" data-dcnode-id="6919" id="cite_ref-51"><a data-dcnode-id="6920" href="#cite_note-51"><span data-dcnode-id="6921" instrument_node="">[51]</span></a></sup><span data-dcnode-id="6918" instrument_node=""> According to </span><a class="mw-redirect" data-dcnode-id="6916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Christian_Rieber" title="Paul Christian Rieber"><span data-dcnode-id="6917" instrument_node="">Paul Christian Rieber</span></a><span data-dcnode-id="6915" instrument_node="">, of </span><a class="mw-redirect" data-dcnode-id="6913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GC_Rieber_AS" title="GC Rieber AS"><span data-dcnode-id="6914" instrument_node="">GC Rieber AS</span></a><span data-dcnode-id="6912" instrument_node="">, the difficult ice conditions and low quotas in 2006 resulted in reduced access to seal pelts, which caused the commodity price to be pushed up.</span><sup class="reference" data-dcnode-id="6909" id="cite_ref-rieberskinn_52-0"><a data-dcnode-id="6910" href="#cite_note-rieberskinn-52"><span data-dcnode-id="6911" instrument_node="">[52]</span></a></sup><span data-dcnode-id="6908" instrument_node=""> One high-end fashion designer, </span><a data-dcnode-id="6906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donatella_Versace" title="Donatella Versace"><span data-dcnode-id="6907" instrument_node="">Donatella Versace</span></a><span data-dcnode-id="6905" instrument_node="">, has begun to use seal pelts, while others, such as </span><a data-dcnode-id="6903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Calvin_Klein" title="Calvin Klein"><span data-dcnode-id="6904" instrument_node="">Calvin Klein</span></a><span data-dcnode-id="6902" instrument_node="">, </span><a data-dcnode-id="6900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stella_McCartney" title="Stella McCartney"><span data-dcnode-id="6901" instrument_node="">Stella McCartney</span></a><span data-dcnode-id="6899" instrument_node="">, </span><a data-dcnode-id="6897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tommy_Hilfiger" title="Tommy Hilfiger"><span data-dcnode-id="6898" instrument_node="">Tommy Hilfiger</span></a><span data-dcnode-id="6896" instrument_node="">, and </span><a data-dcnode-id="6894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ralph_Lauren" title="Ralph Lauren"><span data-dcnode-id="6895" instrument_node="">Ralph Lauren</span></a><span data-dcnode-id="6893" instrument_node="">, refrain from using any kind of fur.</span><sup class="reference" data-dcnode-id="6890" id="cite_ref-wspa_53-0"><a data-dcnode-id="6891" href="#cite_note-wspa-53"><span data-dcnode-id="6892" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="6887" id="cite_ref-54"><a data-dcnode-id="6888" href="#cite_note-54"><span data-dcnode-id="6889" instrument_node="">[54]</span></a></sup><span data-dcnode-id="6886" instrument_node="">
</span></p><p data-dcnode-id="6867"><span data-dcnode-id="6884" instrument_node="">Seal meat is a source of food for residents of small coastal communities.</span><sup class="reference" data-dcnode-id="6881" id="cite_ref-portalcity_55-0"><a data-dcnode-id="6882" href="#cite_note-portalcity-55"><span data-dcnode-id="6883" instrument_node="">[55]</span></a></sup><span data-dcnode-id="6880" instrument_node=""> Meat is sold to the Asian pet food market; in 2004, only Taiwan and South Korea purchased seal meat from Canada.</span><sup class="reference" data-dcnode-id="6877" id="cite_ref-seashepherd-facts_56-0"><a data-dcnode-id="6878" href="#cite_note-seashepherd-facts-56"><span data-dcnode-id="6879" instrument_node="">[56]</span></a></sup><span data-dcnode-id="6876" instrument_node=""> The seal blubber is used to make seal oil, which is marketed as a fish oil supplement. In 2001, two percent of Canada's raw seal oil was processed and sold in Canadian health stores.</span><sup class="reference" data-dcnode-id="6873" id="cite_ref-regj_57-0"><a data-dcnode-id="6874" href="#cite_note-regj-57"><span data-dcnode-id="6875" instrument_node="">[57]</span></a></sup><span data-dcnode-id="6872" instrument_node=""> There has been virtually no market for seal organs since 1998.</span><sup class="reference" data-dcnode-id="6869" id="cite_ref-portalcity_55-1"><a data-dcnode-id="6870" href="#cite_note-portalcity-55"><span data-dcnode-id="6871" instrument_node="">[55]</span></a></sup><span data-dcnode-id="6868" instrument_node="">
</span></p><span data-dcnode-id="6866" instrument_node="">
</span><h3 data-dcnode-id="6856"><span class="mw-headline" data-dcnode-id="6864" id="Sealing_states"><span data-dcnode-id="6865" instrument_node="">Sealing states</span></span><span class="mw-editsection" data-dcnode-id="6857"><span class="mw-editsection-bracket" data-dcnode-id="6862"><span data-dcnode-id="6863" instrument_node="">[</span></span><a data-dcnode-id="6860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D12" title="Edit section: Sealing states"><span data-dcnode-id="6861" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6858"><span data-dcnode-id="6859" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6855" instrument_node="">
</span><p data-dcnode-id="6842"><span data-dcnode-id="6854" instrument_node="">In 2005, three companies exported seal skin: </span><a data-dcnode-id="6852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GC_Rieber" title="GC Rieber"><span data-dcnode-id="6853" instrument_node="">Rieber</span></a><span data-dcnode-id="6851" instrument_node=""> in Norway, Atlantic Marine in Canada and Great Greenland in Greenland.</span><sup class="reference" data-dcnode-id="6848" id="cite_ref-igjen_58-0"><a data-dcnode-id="6849" href="#cite_note-igjen-58"><span data-dcnode-id="6850" instrument_node="">[58]</span></a></sup><span data-dcnode-id="6847" instrument_node=""> Their clients were earlier French fashion houses and fur makers in Europe, but today the fur is mainly exported to Russia and China.</span><sup class="reference" data-dcnode-id="6844" id="cite_ref-igjen_58-1"><a data-dcnode-id="6845" href="#cite_note-igjen-58"><span data-dcnode-id="6846" instrument_node="">[58]</span></a></sup><span data-dcnode-id="6843" instrument_node="">
</span></p><span data-dcnode-id="6841" instrument_node="">
</span><h4 data-dcnode-id="6831"><span class="mw-headline" data-dcnode-id="6839" id="Canada"><span data-dcnode-id="6840" instrument_node="">Canada</span></span><span class="mw-editsection" data-dcnode-id="6832"><span class="mw-editsection-bracket" data-dcnode-id="6837"><span data-dcnode-id="6838" instrument_node="">[</span></span><a data-dcnode-id="6835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D13" title="Edit section: Canada"><span data-dcnode-id="6836" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6833"><span data-dcnode-id="6834" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6830" instrument_node="">
</span><p data-dcnode-id="6814"><span data-dcnode-id="6829" instrument_node="">In Canada, the season for the commercial hunt of </span><a data-dcnode-id="6827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harp_seal" title="Harp seal"><span data-dcnode-id="6828" instrument_node="">harp seal</span></a><span data-dcnode-id="6826" instrument_node=""> is from November 15 to May 15.</span><sup class="reference" data-dcnode-id="6823" id="cite_ref-Canada0305_59-0"><a data-dcnode-id="6824" href="#cite_note-Canada0305-59"><span data-dcnode-id="6825" instrument_node="">[59]</span></a></sup><span data-dcnode-id="6822" instrument_node=""> While Inuit hunt seals commercially year-round, most sealing in southern Canada occurs in late March in the </span><a data-dcnode-id="6820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gulf_of_St._Lawrence" title="Gulf of St. Lawrence"><span data-dcnode-id="6821" instrument_node="">Gulf of St. Lawrence</span></a><span data-dcnode-id="6819" instrument_node="">, and during the first or second week of April off Newfoundland, in an area known as the Front. This peak spring period is often mistakenly referred to as the "Canadian Seal Hunt", when in fact seal hunting also happens throughout the year all over the Canadian Arctic.</span><sup class="reference" data-dcnode-id="6816" id="cite_ref-faq-canada_1-1"><a data-dcnode-id="6817" href="#cite_note-faq-canada-1"><span data-dcnode-id="6818" instrument_node="">[1]</span></a></sup><span data-dcnode-id="6815" instrument_node="">
</span></p><p data-dcnode-id="6801"><span data-dcnode-id="6813" instrument_node="">In 2003, the three-year harp seal quota granted by Fisheries and Oceans Canada was increased to a maximum of 975,000 animals per three years, with a maximum of 350,000 animals in any two consecutive years.</span><sup class="reference" data-dcnode-id="6810" id="cite_ref-Canada0305_59-1"><a data-dcnode-id="6811" href="#cite_note-Canada0305-59"><span data-dcnode-id="6812" instrument_node="">[59]</span></a></sup><span data-dcnode-id="6809" instrument_node=""> In 2006, 325,000 harp seals, as well as 10,000 hooded seals and 10,400 </span><a data-dcnode-id="6807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grey_seal" title="Grey seal"><span data-dcnode-id="6808" instrument_node="">grey seals</span></a><span data-dcnode-id="6806" instrument_node=""> were killed. An additional 10,000 animals were allocated for hunting by aboriginal peoples. As of 2012, the population in Canada of the Northwest Atlantic harp seals is approximately 7.3&nbsp;million animals, over three times what it was in the 1970s.</span><sup class="reference" data-dcnode-id="6803" id="cite_ref-dfo-mpo.gc.ca_60-0"><a data-dcnode-id="6804" href="#cite_note-dfo-mpo.gc.ca-60"><span data-dcnode-id="6805" instrument_node="">[60]</span></a></sup><span data-dcnode-id="6802" instrument_node="">
</span></p><p data-dcnode-id="6783"><span data-dcnode-id="6800" instrument_node="">Although around 70% of Canadian seals killed are taken on the Front,</span><sup class="reference" data-dcnode-id="6797" id="cite_ref-faq-canada_1-2"><a data-dcnode-id="6798" href="#cite_note-faq-canada-1"><span data-dcnode-id="6799" instrument_node="">[1]</span></a></sup><span data-dcnode-id="6796" instrument_node=""> private monitors focus on the St. Lawrence hunt, because of its more convenient location.</span><sup class="reference" data-dcnode-id="6793" id="cite_ref-pmid12240525_61-0"><a data-dcnode-id="6794" href="#cite_note-pmid12240525-61"><span data-dcnode-id="6795" instrument_node="">[61]</span></a></sup><span data-dcnode-id="6792" instrument_node=""> The 2006 St. Lawrence leg of the hunt was officially closed on Apr. 3, 2006; sealers had already exceeded the quota by 1,000 animals.</span><sup class="reference" data-dcnode-id="6789" id="cite_ref-62"><a data-dcnode-id="6790" href="#cite_note-62"><span data-dcnode-id="6791" instrument_node="">[62]</span></a></sup><span data-dcnode-id="6788" instrument_node=""> On March 26, 2007, the Newfoundland and Labrador government launched a seal hunt website to counter "misinformation about the sealing industry that is [published] by international animal rights organizations".</span><sup class="reference" data-dcnode-id="6785" id="cite_ref-63"><a data-dcnode-id="6786" href="#cite_note-63"><span data-dcnode-id="6787" instrument_node="">[63]</span></a></sup><span data-dcnode-id="6784" instrument_node="">
</span></p><p data-dcnode-id="6760"><span data-dcnode-id="6782" instrument_node="">Warm winters in the Gulf of Saint Lawrence have led to thinner and more unstable ice there. In 2007, Canada's </span><a data-dcnode-id="6780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fisheries_and_Oceans_Canada" title="Fisheries and Oceans Canada"><span data-dcnode-id="6781" instrument_node="">federal fisheries ministry</span></a><span data-dcnode-id="6779" instrument_node=""> reported that while the pups are born on the ice as usual, the ice floes have started to break up before the pups learn to swim, causing the pups to drown.</span><sup class="reference" data-dcnode-id="6776" id="cite_ref-64"><a data-dcnode-id="6777" href="#cite_note-64"><span data-dcnode-id="6778" instrument_node="">[64]</span></a></sup><span data-dcnode-id="6775" instrument_node=""> Canada reduced the 2007 quota by 20%, because overflights showed large numbers of seal pups were lost to thin and melting ice.</span><sup class="reference" data-dcnode-id="6772" id="cite_ref-Washington_65-0"><a data-dcnode-id="6773" href="#cite_note-Washington-65"><span data-dcnode-id="6774" instrument_node="">[65]</span></a></sup><span data-dcnode-id="6771" instrument_node=""> In southern </span><a data-dcnode-id="6769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labrador" title="Labrador"><span data-dcnode-id="6770" instrument_node="">Labrador</span></a><span data-dcnode-id="6768" instrument_node=""> and off Newfoundland's northeast coast, however, there was extra heavy ice in 2007, and the coast guard estimated as many as 100 vessels were trapped in ice simultaneously.</span><sup class="reference" data-dcnode-id="6765" id="cite_ref-66"><a data-dcnode-id="6766" href="#cite_note-66"><span data-dcnode-id="6767" instrument_node="">[66]</span></a></sup><sup class="reference" data-dcnode-id="6762" id="cite_ref-67"><a data-dcnode-id="6763" href="#cite_note-67"><span data-dcnode-id="6764" instrument_node="">[67]</span></a></sup><span data-dcnode-id="6761" instrument_node="">
</span></p><p data-dcnode-id="6754"><span data-dcnode-id="6759" instrument_node="">The 2010 hunt was cut short because demand for seal pelts was down. Only one local pelt buyer, NuTan Furs, offered to purchase pelts; and it committed to purchase less than 15,000 pelts.</span><sup class="reference" data-dcnode-id="6756" id="cite_ref-68"><a data-dcnode-id="6757" href="#cite_note-68"><span data-dcnode-id="6758" instrument_node="">[68]</span></a></sup><span data-dcnode-id="6755" instrument_node=""> Pelt prices were about C$21/pelt in 2010, which is about twice the 2009 price and about 64% of the 2007 price. The reduced demand is attributable mainly to the 2009 ban on imports of seal products into the European Union.
</span></p><p data-dcnode-id="6748"><span data-dcnode-id="6753" instrument_node="">The 2010 winter was unusually warm, with little ice forming in the Gulf of St. Lawrence in February and March, when harp seals give birth to their pups on ice floes. Around the Gulf, harp seals arrived in late winter to give birth on near-shore ice and even on beaches rather than on their usual whelping grounds: sturdy sea ice. Also, seal pups born elsewhere began floating to shore on small, shrinking pieces of ice. Many others stayed too far north, out of reach of all but the most determined hunters. Environment Canada, the weather forecasting agency, reported the ice was at the lowest level on record.</span><sup class="reference" data-dcnode-id="6750" id="cite_ref-Austen_69-0"><a data-dcnode-id="6751" href="#cite_note-Austen-69"><span data-dcnode-id="6752" instrument_node="">[69]</span></a></sup><span data-dcnode-id="6749" instrument_node="">
</span></p><span data-dcnode-id="6747" instrument_node="">
</span><h5 data-dcnode-id="6737"><span class="mw-headline" data-dcnode-id="6745" id="Regulations"><span data-dcnode-id="6746" instrument_node="">Regulations</span></span><span class="mw-editsection" data-dcnode-id="6738"><span class="mw-editsection-bracket" data-dcnode-id="6743"><span data-dcnode-id="6744" instrument_node="">[</span></span><a data-dcnode-id="6741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D14" title="Edit section: Regulations"><span data-dcnode-id="6742" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6739"><span data-dcnode-id="6740" instrument_node="">]</span></span></span></h5><span data-dcnode-id="6736" instrument_node="">
</span><p data-dcnode-id="6702"><span data-dcnode-id="6735" instrument_node="">The Fisheries Act established "Seal Protection Regulations" in the mid-1960s. The regulations were combined with other Canadian </span><a data-dcnode-id="6733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marine_mammal" title="Marine mammal"><span data-dcnode-id="6734" instrument_node="">marine mammals</span></a><span data-dcnode-id="6732" instrument_node=""> regulations in 1993, to form the "</span><a data-dcnode-id="6730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marine_Mammal_Regulations" title="Marine Mammal Regulations"><span data-dcnode-id="6731" instrument_node="">Marine Mammal Regulations</span></a><span data-dcnode-id="6729" instrument_node="">".</span><sup class="reference" data-dcnode-id="6726" id="cite_ref-70"><a data-dcnode-id="6727" href="#cite_note-70"><span data-dcnode-id="6728" instrument_node="">[70]</span></a></sup><sup class="reference" data-dcnode-id="6723" id="cite_ref-71"><a data-dcnode-id="6724" href="#cite_note-71"><span data-dcnode-id="6725" instrument_node="">[71]</span></a></sup><sup class="reference" data-dcnode-id="6720" id="cite_ref-72"><a data-dcnode-id="6721" href="#cite_note-72"><span data-dcnode-id="6722" instrument_node="">[72]</span></a></sup><span data-dcnode-id="6719" instrument_node=""> In addition to describing the use of the rifle and </span><i data-dcnode-id="6717"><span data-dcnode-id="6718" instrument_node="">hakapik</span></i><span data-dcnode-id="6716" instrument_node="">, the regulations state every person "who fishes for seals for personal or commercial use shall land the </span><a data-dcnode-id="6714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fur" title="Fur"><span data-dcnode-id="6715" instrument_node="">pelt</span></a><span data-dcnode-id="6713" instrument_node=""> or the carcass of the seal."</span><sup class="reference" data-dcnode-id="6710" id="cite_ref-pmid12240525_61-1"><a data-dcnode-id="6711" href="#cite_note-pmid12240525-61"><span data-dcnode-id="6712" instrument_node="">[61]</span></a></sup><span data-dcnode-id="6709" instrument_node=""> The commercial hunting of infant harp seals (</span><a class="mw-redirect" data-dcnode-id="6707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Whitecoats" title="Whitecoats"><span data-dcnode-id="6708" instrument_node="">whitecoats</span></a><span data-dcnode-id="6706" instrument_node="">) and infant hooded seals (bluebacks) was banned in 1987 under pressure from animal rights groups. Now, seals may only be killed once they have started </span><a class="mw-redirect" data-dcnode-id="6704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Molting" title="Molting"><span data-dcnode-id="6705" instrument_node="">molting</span></a><span data-dcnode-id="6703" instrument_node=""> (from 12 to 15 days of age), as this coincides with the time when they are abandoned by their mothers.
</span></p><span data-dcnode-id="6701" instrument_node="">
</span><h5 data-dcnode-id="6691"><span class="mw-headline" data-dcnode-id="6699" id="Export"><span data-dcnode-id="6700" instrument_node="">Export</span></span><span class="mw-editsection" data-dcnode-id="6692"><span class="mw-editsection-bracket" data-dcnode-id="6697"><span data-dcnode-id="6698" instrument_node="">[</span></span><a data-dcnode-id="6695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D15" title="Edit section: Export"><span data-dcnode-id="6696" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6693"><span data-dcnode-id="6694" instrument_node="">]</span></span></span></h5><span data-dcnode-id="6690" instrument_node="">
</span><p data-dcnode-id="6651"><span data-dcnode-id="6689" instrument_node="">Canada's biggest market for seal pelts is Norway.</span><sup class="reference" data-dcnode-id="6686" id="cite_ref-73"><a data-dcnode-id="6687" href="#cite_note-73"><span data-dcnode-id="6688" instrument_node="">[73]</span></a></sup><span data-dcnode-id="6685" instrument_node=""> Carino Limited is one of Newfoundland's largest seal pelt producers. Carino (CAnada–RIeber–NOrway) is marketing its seal pelts mainly through its parent company, </span><a class="mw-redirect" data-dcnode-id="6683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GC_Rieber_Skinn" title="GC Rieber Skinn"><span data-dcnode-id="6684" instrument_node="">GC Rieber Skinn</span></a><span data-dcnode-id="6682" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bergen%2C_Norway" title="Bergen, Norway"><span data-dcnode-id="6681" instrument_node="">Bergen, Norway</span></a><span data-dcnode-id="6679" instrument_node="">.</span><sup class="reference" data-dcnode-id="6676" id="cite_ref-74"><a data-dcnode-id="6677" href="#cite_note-74"><span data-dcnode-id="6678" instrument_node="">[74]</span></a></sup><span data-dcnode-id="6675" instrument_node=""> Canada sold pelts to eleven countries in 2004. The next largest were Germany, Greenland, and China/</span><a data-dcnode-id="6673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hong_Kong" title="Hong Kong"><span data-dcnode-id="6674" instrument_node="">Hong Kong</span></a><span data-dcnode-id="6672" instrument_node="">. Other importers were Finland, Denmark, France, Greece, South Korea, and Russia.</span><sup class="reference" data-dcnode-id="6669" id="cite_ref-seashepherd-facts_56-1"><a data-dcnode-id="6670" href="#cite_note-seashepherd-facts-56"><span data-dcnode-id="6671" instrument_node="">[56]</span></a></sup><span data-dcnode-id="6668" instrument_node=""> Asia remains the principal market for seal meat exports.</span><sup class="reference" data-dcnode-id="6665" id="cite_ref-Canada0305_59-2"><a data-dcnode-id="6666" href="#cite_note-Canada0305-59"><span data-dcnode-id="6667" instrument_node="">[59]</span></a></sup><span data-dcnode-id="6664" instrument_node=""> One of Canada's market access priorities for 2002 was to "continue to press Korean authorities to obtain the necessary approvals for the sale of seal meat for human consumption in Korea."</span><sup class="reference" data-dcnode-id="6661" id="cite_ref-openingdoors_75-0"><a data-dcnode-id="6662" href="#cite_note-openingdoors-75"><span data-dcnode-id="6663" instrument_node="">[75]</span></a></sup><span data-dcnode-id="6660" instrument_node=""> Canadian and Korean officials agreed in 2003 on specific Korean import requirements for seal meat.</span><sup class="reference" data-dcnode-id="6657" id="cite_ref-openingdoors_75-1"><a data-dcnode-id="6658" href="#cite_note-openingdoors-75"><span data-dcnode-id="6659" instrument_node="">[75]</span></a></sup><span data-dcnode-id="6656" instrument_node=""> For 2004, only Taiwan and South Korea purchased seal meat from Canada.</span><sup class="reference" data-dcnode-id="6653" id="cite_ref-seashepherd-facts_56-2"><a data-dcnode-id="6654" href="#cite_note-seashepherd-facts-56"><span data-dcnode-id="6655" instrument_node="">[56]</span></a></sup><span data-dcnode-id="6652" instrument_node="">
</span></p><p data-dcnode-id="6637"><span data-dcnode-id="6650" instrument_node="">Canadian seal product exports reached C$18&nbsp;million in 2006. Of this, C$5.4&nbsp;million went to the EU.</span><sup class="reference" data-dcnode-id="6647" id="cite_ref-76"><a data-dcnode-id="6648" href="#cite_note-76"><span data-dcnode-id="6649" instrument_node="">[76]</span></a></sup><span data-dcnode-id="6646" instrument_node=""> In 2009, the European Union banned all seal imports, shrinking the market.</span><sup class="reference" data-dcnode-id="6643" id="cite_ref-77"><a data-dcnode-id="6644" href="#cite_note-77"><span data-dcnode-id="6645" instrument_node="">[77]</span></a></sup><span data-dcnode-id="6642" instrument_node=""> Where pelts once sold for more than $100, they now fetch $8 to $15 each.</span><sup class="reference" data-dcnode-id="6639" id="cite_ref-Austen_69-1"><a data-dcnode-id="6640" href="#cite_note-Austen-69"><span data-dcnode-id="6641" instrument_node="">[69]</span></a></sup><span data-dcnode-id="6638" instrument_node="">
</span></p><span data-dcnode-id="6636" instrument_node="">
</span><h4 data-dcnode-id="6626"><span class="mw-headline" data-dcnode-id="6634" id="Greenland"><span data-dcnode-id="6635" instrument_node="">Greenland</span></span><span class="mw-editsection" data-dcnode-id="6627"><span class="mw-editsection-bracket" data-dcnode-id="6632"><span data-dcnode-id="6633" instrument_node="">[</span></span><a data-dcnode-id="6630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D16" title="Edit section: Greenland"><span data-dcnode-id="6631" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6628"><span data-dcnode-id="6629" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6625" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6613"><div class="thumbinner" data-dcnode-id="6614" style="width:222px;"><a class="image" data-dcnode-id="6623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGr%25C3%25B6nl%25C3%25A4nder_nach_Seehundjagd.jpg"><img alt="" class="thumbimage" data-dcnode-id="6624" data-file-height="1313" data-file-width="2178" decoding="async" height="133" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Gr%25C3%25B6nl%25C3%25A4nder_nach_Seehundjagd.jpg/220px-Gr%25C3%25B6nl%25C3%25A4nder_nach_Seehundjagd.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Gr%C3%B6nl%C3%A4nder_nach_Seehundjagd.jpg/330px-Gr%C3%B6nl%C3%A4nder_nach_Seehundjagd.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Gr%C3%B6nl%C3%A4nder_nach_Seehundjagd.jpg/440px-Gr%C3%B6nl%C3%A4nder_nach_Seehundjagd.jpg 2x" width="220"></a><span data-dcnode-id="6622" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6615"><div class="magnify" data-dcnode-id="6620"><a class="internal" data-dcnode-id="6621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGr%25C3%25B6nl%25C3%25A4nder_nach_Seehundjagd.jpg" title="Enlarge"></a></div><span data-dcnode-id="6619" instrument_node="">Greenlandic Inuit hunters with several seals, </span><abbr data-dcnode-id="6617" title="circa"><span data-dcnode-id="6618" instrument_node="">c.</span></abbr><span data-dcnode-id="6616" instrument_node=""> 1900. Historically seal hunting was often done from kayak with a harpoon, but today most is done from small motorboat with rifle/shotgun</span></div></div></div><span data-dcnode-id="6612" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6603"><div class="thumbinner" data-dcnode-id="6604" style="width:222px;"><a class="image" data-dcnode-id="6610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGreenland_1999_%2801%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="6611" data-file-height="1284" data-file-width="1682" decoding="async" height="168" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/08/Greenland_1999_%252801%2529.jpg/220px-Greenland_1999_%252801%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/08/Greenland_1999_%2801%29.jpg/330px-Greenland_1999_%2801%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/08/Greenland_1999_%2801%29.jpg/440px-Greenland_1999_%2801%29.jpg 2x" width="220"></a><span data-dcnode-id="6609" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6605"><div class="magnify" data-dcnode-id="6607"><a class="internal" data-dcnode-id="6608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGreenland_1999_%2801%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="6606" instrument_node="">Three women wearing Greenland's National Costume, which contain seal skin</span></div></div></div><span data-dcnode-id="6602" instrument_node="">
</span><p data-dcnode-id="6592"><span data-dcnode-id="6601" instrument_node="">Seals are abundant in Greenland with an estimated total population of 12&nbsp;million, and about 82,000 harp seals, 78,000 ringed seals and a much lower number of hooded seals are killed each year (historically, a couple of other seal species were also hunted).</span><sup class="reference" data-dcnode-id="6598" id="cite_ref-Faktablad_78-0"><a data-dcnode-id="6599" href="#cite_note-Faktablad-78"><span data-dcnode-id="6600" instrument_node="">[78]</span></a></sup><span data-dcnode-id="6597" instrument_node=""> The hunter has to have a hunting license and he/she is obliged to register all kills with the authorities. Young seals and mothers with young are fully protected.</span><sup class="reference" data-dcnode-id="6594" id="cite_ref-SælErhvervsportalen_4-1"><a data-dcnode-id="6595" href="#cite_note-S%C3%A6lErhvervsportalen-4"><span data-dcnode-id="6596" instrument_node="">[4]</span></a></sup><span data-dcnode-id="6593" instrument_node="">
</span></p><p data-dcnode-id="6562"><span data-dcnode-id="6591" instrument_node="">Hunting is done with a rifle or shotgun, which by law has to be at least a </span><a data-dcnode-id="6589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/.22_caliber" title=".22 caliber"><span data-dcnode-id="6590" instrument_node="">.22 caliber</span></a><span data-dcnode-id="6588" instrument_node=""> or a </span><a class="mw-redirect" data-dcnode-id="6586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/20-gauge" title="20-gauge"><span data-dcnode-id="6587" instrument_node="">20-gauge</span></a><span data-dcnode-id="6585" instrument_node="">, respectively.</span><sup class="reference" data-dcnode-id="6582" id="cite_ref-SælErhvervsportalen_4-2"><a data-dcnode-id="6583" href="#cite_note-S%C3%A6lErhvervsportalen-4"><span data-dcnode-id="6584" instrument_node="">[4]</span></a></sup><span data-dcnode-id="6581" instrument_node=""> The most common and widespread method involves using a small boat to slowly approach a seal sitting on ice or swimming at the surface of the water, and shoot it from a distance, aiming for the head. Once shot and killed, the boat rushes up to the seal and hooks the carcass out of the water before it sinks.</span><sup class="reference" data-dcnode-id="6578" id="cite_ref-Faktablad_78-1"><a data-dcnode-id="6579" href="#cite_note-Faktablad-78"><span data-dcnode-id="6580" instrument_node="">[78]</span></a></sup><sup class="reference" data-dcnode-id="6575" id="cite_ref-OCarroll2005_79-0"><a data-dcnode-id="6576" href="#cite_note-OCarroll2005-79"><span data-dcnode-id="6577" instrument_node="">[79]</span></a></sup><span data-dcnode-id="6574" instrument_node=""> Another method is sometimes used in places where the sea is almost entirely covered by ice. The hunter slowly crawls forwards on the ice towards a seal, hiding behind a white screen. Once within shooting range, the seal is shot.</span><sup class="reference" data-dcnode-id="6571" id="cite_ref-Faktablad_78-2"><a data-dcnode-id="6572" href="#cite_note-Faktablad-78"><span data-dcnode-id="6573" instrument_node="">[78]</span></a></sup><span data-dcnode-id="6570" instrument_node=""> Although the killed seal can be retrieved with the use of a </span><a data-dcnode-id="6568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Snowmobile" title="Snowmobile"><span data-dcnode-id="6569" instrument_node="">snowmobile</span></a><span data-dcnode-id="6567" instrument_node="">, it is illegal to use a motor vehicle (including snowmobile), plane or helicopter in the hunt itself.</span><sup class="reference" data-dcnode-id="6564" id="cite_ref-SælErhvervsportalen_4-3"><a data-dcnode-id="6565" href="#cite_note-S%C3%A6lErhvervsportalen-4"><span data-dcnode-id="6566" instrument_node="">[4]</span></a></sup><span data-dcnode-id="6563" instrument_node="">
</span></p><p data-dcnode-id="6523"><span data-dcnode-id="6561" instrument_node="">Seal hunting is very important to the local societies, especially small rural villages. In 2011, there were almost 8,000 hunters, including 2,100 full-time (the remaining are often fishers–hunters), out of a total work force of 32,000 people in Greenland.</span><sup class="reference" data-dcnode-id="6558" id="cite_ref-Faktablad_78-3"><a data-dcnode-id="6559" href="#cite_note-Faktablad-78"><span data-dcnode-id="6560" instrument_node="">[78]</span></a></sup><span data-dcnode-id="6557" instrument_node=""> The </span><a data-dcnode-id="6555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seal_meat" title="Seal meat"><span data-dcnode-id="6556" instrument_node="">meat</span></a><span data-dcnode-id="6554" instrument_node=""> is usually </span><a data-dcnode-id="6552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greenlandic_cuisine" title="Greenlandic cuisine"><span data-dcnode-id="6553" instrument_node="">consumed locally</span></a><span data-dcnode-id="6551" instrument_node=""> and the skin is also used for local clothes (for example, Greenland's National Costume contains seal skin, including in the </span><a class="mw-redirect" data-dcnode-id="6549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kamik" title="Kamik"><span data-dcnode-id="6550" instrument_node="">kamiks</span></a><span data-dcnode-id="6548" instrument_node="">) or sold abroad.</span><sup class="reference" data-dcnode-id="6545" id="cite_ref-Nationaldragt_80-0"><a data-dcnode-id="6546" href="#cite_note-Nationaldragt-80"><span data-dcnode-id="6547" instrument_node="">[80]</span></a></sup><span data-dcnode-id="6544" instrument_node=""> However, exports were hard hit by international campaigns against seal pelts, starting in 1980s (to some degree also later) and often focussing on seals being killed by clubbing or similar methods (especially young, but also adults), methods that were and are not in use in Greenland.</span><sup class="reference" data-dcnode-id="6541" id="cite_ref-upi2008_5-1"><a data-dcnode-id="6542" href="#cite_note-upi2008-5"><span data-dcnode-id="6543" instrument_node="">[5]</span></a></sup><span data-dcnode-id="6540" instrument_node=""> As a consequence, Greenland attempted to distance itself from places where such methods were in use. For example, Greenland banned imports of seal skin from Canada for a period in 2006, specifically citing the way seals were killed.</span><sup class="reference" data-dcnode-id="6537" id="cite_ref-upi2008_5-2"><a data-dcnode-id="6538" href="#cite_note-upi2008-5"><span data-dcnode-id="6539" instrument_node="">[5]</span></a></sup><span data-dcnode-id="6536" instrument_node=""> The European Union ban on seal skins has an exemption for those that originate from subsistence hunts by Inuit or other indigenous communities and using methods where animal welfare is considered (i.e., killed using humane methods),</span><sup class="reference" data-dcnode-id="6533" id="cite_ref-EUSealRegime_81-0"><a data-dcnode-id="6534" href="#cite_note-EUSealRegime-81"><span data-dcnode-id="6535" instrument_node="">[81]</span></a></sup><span data-dcnode-id="6532" instrument_node=""> which has allowed Greenland to continue the trade.</span><sup class="reference" data-dcnode-id="6529" id="cite_ref-SælErhvervsportalen_4-4"><a data-dcnode-id="6530" href="#cite_note-S%C3%A6lErhvervsportalen-4"><span data-dcnode-id="6531" instrument_node="">[4]</span></a></sup><span data-dcnode-id="6528" instrument_node=""> Nevertheless, the number of skins treated for commercial sale (both local and international) has fallen considerably in recent years and by 2017 was below 25,000.</span><sup class="reference" data-dcnode-id="6525" id="cite_ref-82"><a data-dcnode-id="6526" href="#cite_note-82"><span data-dcnode-id="6527" instrument_node="">[82]</span></a></sup><span data-dcnode-id="6524" instrument_node="">
</span></p><span data-dcnode-id="6522" instrument_node="">

</span><p data-dcnode-id="6341"><a data-dcnode-id="6358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Namibia" title="Namibia"><span data-dcnode-id="6359" instrument_node="">Namibia</span></a><span data-dcnode-id="6357" instrument_node=""> is the only country in the </span><a data-dcnode-id="6355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Southern_Hemisphere" title="Southern Hemisphere"><span data-dcnode-id="6356" instrument_node="">Southern Hemisphere</span></a><span data-dcnode-id="6354" instrument_node=""> culling seals. Although the protection and the sustainable use of natural resources is part of Namibia's constitution, it claims to conduct the second largest seal hunt in the world,</span><sup class="reference" data-dcnode-id="6351" id="cite_ref-nam2006_84-3"><a data-dcnode-id="6352" href="#cite_note-nam2006-84"><span data-dcnode-id="6353" instrument_node="">[84]</span></a></sup><span data-dcnode-id="6350" instrument_node=""> mainly because of the huge amount of fish seals are estimated to consume. While a government-initiated study found seal colonies consume more fish than the entire fishing industry can catch,</span><sup class="reference" data-dcnode-id="6347" id="cite_ref-nam2007_85-2"><a data-dcnode-id="6348" href="#cite_note-nam2007-85"><span data-dcnode-id="6349" instrument_node="">[85]</span></a></sup><span data-dcnode-id="6346" instrument_node=""> animal protection society Seal Alert South Africa estimated less than 0.3% losses to commercial fisheries.</span><sup class="reference" data-dcnode-id="6343" id="cite_ref-nam2010-2_83-1"><a data-dcnode-id="6344" href="#cite_note-nam2010-2-83"><span data-dcnode-id="6345" instrument_node="">[83]</span></a></sup><span data-dcnode-id="6342" instrument_node="">
</span></p><p data-dcnode-id="6315"><span data-dcnode-id="6340" instrument_node="">Hunting is done from July to November</span><sup class="reference" data-dcnode-id="6337" id="cite_ref-nam2010-2_83-2"><a data-dcnode-id="6338" href="#cite_note-nam2010-2-83"><span data-dcnode-id="6339" instrument_node="">[83]</span></a></sup><span data-dcnode-id="6336" instrument_node=""> on two places, </span><a data-dcnode-id="6334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cape_Cross" title="Cape Cross"><span data-dcnode-id="6335" instrument_node="">Cape Cross</span></a><span data-dcnode-id="6333" instrument_node=""> and </span><a class="new" data-dcnode-id="6331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAtlas_Bay%26action%3Dedit%26redlink%3D1" title="Atlas Bay (page does not exist)"><span data-dcnode-id="6332" instrument_node="">Atlas Bay</span></a><span data-dcnode-id="6330" instrument_node="">, and in the past at </span><a class="new" data-dcnode-id="6328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWolf_Bay%26action%3Dedit%26redlink%3D1" title="Wolf Bay (page does not exist)"><span data-dcnode-id="6329" instrument_node="">Wolf Bay</span></a><span data-dcnode-id="6327" instrument_node="">.</span><sup class="reference" data-dcnode-id="6324" id="cite_ref-nam2007_85-3"><a data-dcnode-id="6325" href="#cite_note-nam2007-85"><span data-dcnode-id="6326" instrument_node="">[85]</span></a></sup><span data-dcnode-id="6323" instrument_node=""> These two colonies together account for 75% of the </span><a data-dcnode-id="6321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brown_fur_seal" title="Brown fur seal"><span data-dcnode-id="6322" instrument_node="">Cape fur seal</span></a><span data-dcnode-id="6320" instrument_node=""> population of the country.</span><sup class="reference" data-dcnode-id="6317" id="cite_ref-nam2006_84-4"><a data-dcnode-id="6318" href="#cite_note-nam2006-84"><span data-dcnode-id="6319" instrument_node="">[84]</span></a></sup><span data-dcnode-id="6316" instrument_node="">
</span></p><p data-dcnode-id="6296"><a class="mw-redirect" data-dcnode-id="6313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cape_Cross_Seal_Reserve" title="Cape Cross Seal Reserve"><span data-dcnode-id="6314" instrument_node="">Cape Cross</span></a><span data-dcnode-id="6312" instrument_node=""> is a tourism resort and the largest Cape fur seal colony in Namibia. The Department of Tourism has stated</span><sup class="reference" data-dcnode-id="6309" id="cite_ref-88"><a data-dcnode-id="6310" href="#cite_note-88"><span data-dcnode-id="6311" instrument_node="">[88]</span></a></sup><span data-dcnode-id="6308" instrument_node=""> that "Cape Cross Seal Reserve was established to protect the largest breeding colony of Cape fur seals in the world". In season, the resort is closed and sealed off during the culling in the early morning hours, journalists are not allowed to enter.</span><sup class="reference" data-dcnode-id="6305" id="cite_ref-nam2009_86-1"><a data-dcnode-id="6306" href="#cite_note-nam2009-86"><span data-dcnode-id="6307" instrument_node="">[86]</span></a></sup><span data-dcnode-id="6304" instrument_node=""> Namibia's </span><a data-dcnode-id="6302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Society_for_the_Prevention_of_Cruelty_to_Animals" title="Society for the Prevention of Cruelty to Animals"><span data-dcnode-id="6303" instrument_node="">SPCA</span></a><span data-dcnode-id="6301" instrument_node=""> is allowed to observe the culling from 2010 onwards.</span><sup class="reference" data-dcnode-id="6298" id="cite_ref-nam2010_87-2"><a data-dcnode-id="6299" href="#cite_note-nam2010-87"><span data-dcnode-id="6300" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6297" instrument_node="">
</span></p><p data-dcnode-id="6275"><span data-dcnode-id="6295" instrument_node="">Namibia's Ministry of Fisheries announced a three-year rolling quota for the seal harvest, although different quotas per year are sometimes reported.</span><sup class="reference" data-dcnode-id="6292" id="cite_ref-nam2007_85-4"><a data-dcnode-id="6293" href="#cite_note-nam2007-85"><span data-dcnode-id="6294" instrument_node="">[85]</span></a></sup><sup class="reference" data-dcnode-id="6289" id="cite_ref-nam2009_86-2"><a data-dcnode-id="6290" href="#cite_note-nam2009-86"><span data-dcnode-id="6291" instrument_node="">[86]</span></a></sup><span data-dcnode-id="6288" instrument_node=""> The latest</span><sup class="plainlinks noexcerpt noprint asof-tag update" data-dcnode-id="6285" style="display:none;"><a class="external text" data-dcnode-id="6286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit"><span data-dcnode-id="6287" instrument_node="">[update]</span></a></sup><span data-dcnode-id="6284" instrument_node=""> quota announced was in 2009, valid until 2011.</span><sup class="reference" data-dcnode-id="6281" id="cite_ref-nam2010_87-3"><a data-dcnode-id="6282" href="#cite_note-nam2010-87"><span data-dcnode-id="6283" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6280" instrument_node=""> The quotas are usually not filled by the concession holders.</span><sup class="reference" data-dcnode-id="6277" id="cite_ref-nam2010-2_83-3"><a data-dcnode-id="6278" href="#cite_note-nam2010-2-83"><span data-dcnode-id="6279" instrument_node="">[83]</span></a></sup><span data-dcnode-id="6276" instrument_node="">
</span></p><p data-dcnode-id="6259"><span data-dcnode-id="6274" instrument_node="">In 2009, an unusual bid to end seal culling in Namibia was attempted when Seal Alert tried to raise money to purchase the only buyer of Namibian seals, Australian-based Hatem Yavuz, </span><a data-dcnode-id="6272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lock%2C_stock%2C_and_barrel" title="Lock, stock, and barrel"><span data-dcnode-id="6273" instrument_node="">lock, stock, and barrel</span></a><span data-dcnode-id="6271" instrument_node=""> for US$14.2&nbsp;million.</span><sup class="reference" data-dcnode-id="6268" id="cite_ref-nam2009_86-3"><a data-dcnode-id="6269" href="#cite_note-nam2009-86"><span data-dcnode-id="6270" instrument_node="">[86]</span></a></sup><span data-dcnode-id="6267" instrument_node=""> The project did not materialise. Also, the Government of Namibia offered the </span><a data-dcnode-id="6265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Fund_for_Animal_Welfare" title="International Fund for Animal Welfare"><span data-dcnode-id="6266" instrument_node="">International Fund for Animal Welfare</span></a><span data-dcnode-id="6264" instrument_node=""> (IFAW) an opportunity to buy out the two sealers in Namibia to finally end the culling. The offer was rejected.</span><sup class="reference" data-dcnode-id="6261" id="cite_ref-nam2006_84-5"><a data-dcnode-id="6262" href="#cite_note-nam2006-84"><span data-dcnode-id="6263" instrument_node="">[84]</span></a></sup><span data-dcnode-id="6260" instrument_node="">
</span></p><p data-dcnode-id="6246"><span data-dcnode-id="6258" instrument_node="">In 2011, South African activists launched a boycott of Namibian tourism and Namibian products</span><sup class="reference" data-dcnode-id="6255" id="cite_ref-89"><a data-dcnode-id="6256" href="#cite_note-89"><span data-dcnode-id="6257" instrument_node="">[89]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="6248" style="white-space:nowrap;"><span data-dcnode-id="6254" instrument_node="">[</span><i data-dcnode-id="6250"><a data-dcnode-id="6251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability%23Self-published_sources" title="Wikipedia:Verifiability"><span data-dcnode-id="6252" title="The material near this tag may rely on a self-published source. (December 2012)"><span data-dcnode-id="6253" instrument_node="">self-published source?</span></span></a></i><span data-dcnode-id="6249" instrument_node="">]</span></sup><span data-dcnode-id="6247" instrument_node=""> in response to the cull.
</span></p><span data-dcnode-id="6245" instrument_node="">

</span><div class="thumb tleft" data-dcnode-id="5797"><div class="thumbinner" data-dcnode-id="5798" style="width:222px;"><a class="image" data-dcnode-id="5804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASeal_hunting_on_ice_in_1904.jpg"><img alt="" class="thumbimage" data-dcnode-id="5805" data-file-height="480" data-file-width="625" decoding="async" height="169" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Seal_hunting_on_ice_in_1904.jpg/220px-Seal_hunting_on_ice_in_1904.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Seal_hunting_on_ice_in_1904.jpg/330px-Seal_hunting_on_ice_in_1904.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Seal_hunting_on_ice_in_1904.jpg/440px-Seal_hunting_on_ice_in_1904.jpg 2x" width="220"></a><span data-dcnode-id="5803" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5799"><div class="magnify" data-dcnode-id="5801"><a class="internal" data-dcnode-id="5802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASeal_hunting_on_ice_in_1904.jpg" title="Enlarge"></a></div><span data-dcnode-id="5800" instrument_node="">Seal hunting on ice in 1904</span></div></div></div><span data-dcnode-id="5796" instrument_node="">
