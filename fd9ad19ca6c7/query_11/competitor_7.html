</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="628" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="637"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="8328" style="display:none"><span data-dcnode-id="8329" instrument_node="">Personal or commercial hunting of marine mammal</span></div><span data-dcnode-id="8327" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8309"><div class="thumbinner" data-dcnode-id="8310" style="width:264px;"><a class="image" data-dcnode-id="8325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKilling_fur_seals%2C_St_Paul_Island.jpg"><img alt="" class="thumbimage" data-dcnode-id="8326" data-file-height="1591" data-file-width="2770" decoding="async" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/24/Killing_fur_seals%252C_St_Paul_Island.jpg/262px-Killing_fur_seals%252C_St_Paul_Island.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/24/Killing_fur_seals%2C_St_Paul_Island.jpg/393px-Killing_fur_seals%2C_St_Paul_Island.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/24/Killing_fur_seals%2C_St_Paul_Island.jpg/524px-Killing_fur_seals%2C_St_Paul_Island.jpg 2x" width="262"></a><span data-dcnode-id="8324" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8311"><div class="magnify" data-dcnode-id="8322"><a class="internal" data-dcnode-id="8323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKilling_fur_seals%2C_St_Paul_Island.jpg" title="Enlarge"></a></div><span data-dcnode-id="8321" instrument_node="">Killing </span><a data-dcnode-id="8319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fur_seal" title="Fur seal"><span data-dcnode-id="8320" instrument_node="">fur seals</span></a><span data-dcnode-id="8318" instrument_node=""> on </span><a data-dcnode-id="8316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saint_Paul_Island_%28Alaska%29" title="Saint Paul Island (Alaska)"><span data-dcnode-id="8317" instrument_node="">St. Paul Island</span></a><span data-dcnode-id="8315" instrument_node="">, </span><a data-dcnode-id="8313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Territory_of_Alaska" title="Territory of Alaska"><span data-dcnode-id="8314" instrument_node="">Alaska Territory</span></a><span data-dcnode-id="8312" instrument_node="">, 1890s</span></div></div></div><span data-dcnode-id="8308" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8296"><div class="thumbinner" data-dcnode-id="8297" style="width:264px;"><a class="image" data-dcnode-id="8306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASeal-skinning_on_the_floes.jpg"><img alt="" class="thumbimage" data-dcnode-id="8307" data-file-height="1418" data-file-width="2020" decoding="async" height="184" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/36/Seal-skinning_on_the_floes.jpg/262px-Seal-skinning_on_the_floes.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/36/Seal-skinning_on_the_floes.jpg/393px-Seal-skinning_on_the_floes.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/36/Seal-skinning_on_the_floes.jpg/524px-Seal-skinning_on_the_floes.jpg 2x" width="262"></a><span data-dcnode-id="8305" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8298"><div class="magnify" data-dcnode-id="8303"><a class="internal" data-dcnode-id="8304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASeal-skinning_on_the_floes.jpg" title="Enlarge"></a></div><span data-dcnode-id="8302" instrument_node="">Seal </span><a data-dcnode-id="8300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Skinning" title="Skinning"><span data-dcnode-id="8301" instrument_node="">skinning</span></a><span data-dcnode-id="8299" instrument_node=""> in the late 1800s</span></div></div></div><span data-dcnode-id="8295" instrument_node="">
</span><p data-dcnode-id="8282"><b data-dcnode-id="8293"><span data-dcnode-id="8294" instrument_node="">Seal hunting</span></b><span data-dcnode-id="8292" instrument_node="">, or </span><b data-dcnode-id="8290"><span data-dcnode-id="8291" instrument_node="">sealing</span></b><span data-dcnode-id="8289" instrument_node="">, is the personal or commercial hunting of </span><a data-dcnode-id="8287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pinniped" title="Pinniped"><span data-dcnode-id="8288" instrument_node="">seals</span></a><span data-dcnode-id="8286" instrument_node="">. Seal hunting is currently practiced in ten countries: United States (above the </span><a data-dcnode-id="8284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arctic_Circle" title="Arctic Circle"><span data-dcnode-id="8285" instrument_node="">Arctic Circle</span></a><span data-dcnode-id="8283" instrument_node=""> in Alaska), Canada, Namibia, Denmark (in self-governing Greenland only), Iceland, Norway, Russia, Finland and Sweden. Most of the world's seal hunting takes place in Canada and Greenland.
</span></p><p data-dcnode-id="8270"><a data-dcnode-id="8280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fisheries_and_Oceans_Canada" title="Fisheries and Oceans Canada"><span data-dcnode-id="8281" instrument_node="">The Canadian Department of Fisheries and Oceans</span></a><span data-dcnode-id="8279" instrument_node=""> (DFO) regulates the seal hunt in Canada. It sets quotas (total allowable catch – TAC), monitors the hunt, studies the seal population, works with the Canadian Sealers' Association to train sealers on new regulations, and promotes sealing through its website and spokespeople. The DFO set harvest quotas of over 90,000 seals in 2007; 275,000 in 2008; 280,000 in 2009; and 330,000 in 2010.</span><sup class="reference" data-dcnode-id="8276" id="cite_ref-faq-canada_1-0"><a data-dcnode-id="8277" href="#cite_note-faq-canada-1"><span data-dcnode-id="8278" instrument_node="">[1]</span></a></sup><span data-dcnode-id="8275" instrument_node=""> The actual kills in recent years have been less than the quotas: 82,800 in 2007; 217,800 in 2008; 72,400 in 2009; and 67,000 in 2010.</span><sup class="reference" data-dcnode-id="8272" id="cite_ref-2"><a data-dcnode-id="8273" href="#cite_note-2"><span data-dcnode-id="8274" instrument_node="">[2]</span></a></sup><span data-dcnode-id="8271" instrument_node=""> In 2007, Norway claimed that 29,000 harp seals were killed, Russia claimed that 5,479 seals were killed and Greenland claimed that 90,000 seals were killed in their respective seal hunts.
</span></p><p data-dcnode-id="8254"><a data-dcnode-id="8268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harp_seal" title="Harp seal"><span data-dcnode-id="8269" instrument_node="">Harp seal</span></a><span data-dcnode-id="8267" instrument_node=""> populations in the northwest Atlantic declined to approximately 2&nbsp;million in the late 1960s as a result of Canada's annual kill rates, which averaged to over 291,000 from 1952 to 1970.</span><sup class="reference" data-dcnode-id="8264" id="cite_ref-3"><a data-dcnode-id="8265" href="#cite_note-3"><span data-dcnode-id="8266" instrument_node="">[3]</span></a></sup><span data-dcnode-id="8263" instrument_node=""> Conservationists demanded reduced rates of killing and stronger regulations to avert the extinction of the harp seal. In 1971, the Canadian government responded by instituting a quota system. The system was competitive, with each boat catching as many seals as it could before the hunt closed, which the Department of Fisheries and Oceans did when they knew that year's quota had been reached. Because it was thought that the competitive element might cause sealers to cut corners, new regulations were introduced that limited the catch to 400 seals per day, and 2000 per boat total. A 2007 population survey conducted by the DFO estimated the population at 5.5&nbsp;million.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="8256" style="white-space:nowrap;"><span data-dcnode-id="8262" instrument_node="">[</span><i data-dcnode-id="8258"><a data-dcnode-id="8259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="8260" title="This claim needs references to reliable sources. (October 2011)"><span data-dcnode-id="8261" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="8257" instrument_node="">]</span></sup><span data-dcnode-id="8255" instrument_node="">
</span></p><p data-dcnode-id="8214"><span data-dcnode-id="8253" instrument_node="">In Greenland, hunting is done with a firearm (rifle or shotgun) and young are fully protected.</span><sup class="reference" data-dcnode-id="8250" id="cite_ref-SælErhvervsportalen_4-0"><a data-dcnode-id="8251" href="#cite_note-S%C3%A6lErhvervsportalen-4"><span data-dcnode-id="8252" instrument_node="">[4]</span></a></sup><span data-dcnode-id="8249" instrument_node=""> This has caused some conflicts with other seal-hunting nations, as Greenland also was hit by the boycotts that often were aimed at seals (often young) killed by clubbing or similar methods, which have not been in use in Greenland.</span><sup class="reference" data-dcnode-id="8246" id="cite_ref-upi2008_5-0"><a data-dcnode-id="8247" href="#cite_note-upi2008-5"><span data-dcnode-id="8248" instrument_node="">[5]</span></a></sup><span data-dcnode-id="8245" instrument_node=""> It is illegal in Canada to hunt newborn harp seals (</span><a class="mw-redirect" data-dcnode-id="8243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Whitecoats" title="Whitecoats"><span data-dcnode-id="8244" instrument_node="">whitecoats</span></a><span data-dcnode-id="8242" instrument_node="">) and young </span><a data-dcnode-id="8240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hooded_seal" title="Hooded seal"><span data-dcnode-id="8241" instrument_node="">hooded seals</span></a><span data-dcnode-id="8239" instrument_node=""> (bluebacks). When the seal pups begin to molt their downy white fur at the age of 12–14 days, they are called "</span><a data-dcnode-id="8237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ragged-jacket" title="Ragged-jacket"><span data-dcnode-id="8238" instrument_node="">ragged-jacket</span></a><span data-dcnode-id="8236" instrument_node="">" and can be commercially hunted.</span><sup class="reference" data-dcnode-id="8233" id="cite_ref-6"><a data-dcnode-id="8234" href="#cite_note-6"><span data-dcnode-id="8235" instrument_node="">[6]</span></a></sup><span data-dcnode-id="8232" instrument_node=""> After molting, the seals are called "beaters", named for the way they beat the water with their flippers.</span><sup class="reference" data-dcnode-id="8229" id="cite_ref-7"><a data-dcnode-id="8230" href="#cite_note-7"><span data-dcnode-id="8231" instrument_node="">[7]</span></a></sup><span data-dcnode-id="8228" instrument_node=""> The hunt remains highly controversial, attracting significant media coverage and protests each year.</span><sup class="reference" data-dcnode-id="8225" id="cite_ref-EBindustry_8-0"><a data-dcnode-id="8226" href="#cite_note-EBindustry-8"><span data-dcnode-id="8227" instrument_node="">[8]</span></a></sup><span data-dcnode-id="8224" instrument_node=""> Images from past hunts have become iconic symbols for </span><a class="mw-redirect" data-dcnode-id="8222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservationism" title="Conservationism"><span data-dcnode-id="8223" instrument_node="">conservation</span></a><span data-dcnode-id="8221" instrument_node="">, </span><a data-dcnode-id="8219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Animal_welfare" title="Animal welfare"><span data-dcnode-id="8220" instrument_node="">animal welfare</span></a><span data-dcnode-id="8218" instrument_node="">, and </span><a data-dcnode-id="8216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Animal_rights" title="Animal rights"><span data-dcnode-id="8217" instrument_node="">animal rights</span></a><span data-dcnode-id="8215" instrument_node=""> advocates. In 2009, Russia banned the hunting of harp seals less than one year old.

</span><h2 data-dcnode-id="7879"><span class="mw-headline" data-dcnode-id="7887" id="History"><span data-dcnode-id="7888" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="7880"><span class="mw-editsection-bracket" data-dcnode-id="7885"><span data-dcnode-id="7886" instrument_node="">[</span></span><a data-dcnode-id="7883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D1" title="Edit section: History"><span data-dcnode-id="7884" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7881"><span data-dcnode-id="7882" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7878" instrument_node="">
</span><p data-dcnode-id="7839"><span data-dcnode-id="7877" instrument_node="">The term seal is used to refer to a diverse group of animals.  In science, they are grouped together in the </span><a class="mw-redirect" data-dcnode-id="7875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pinnipeds" title="Pinnipeds"><span data-dcnode-id="7876" instrument_node="">Pinnipeds</span></a><span data-dcnode-id="7874" instrument_node="">, which also includes the </span><a data-dcnode-id="7872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walrus" title="Walrus"><span data-dcnode-id="7873" instrument_node="">walrus</span></a><span data-dcnode-id="7871" instrument_node="">, not popularly thought of as a seal, and not considered here.  The two main families of seals are the </span><a class="mw-redirect" data-dcnode-id="7869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Otariidae" title="Otariidae"><span data-dcnode-id="7870" instrument_node="">Otariidae</span></a><span data-dcnode-id="7868" instrument_node=""> (the eared seals; includes </span><a data-dcnode-id="7866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sea_lion" title="Sea lion"><span data-dcnode-id="7867" instrument_node="">sea lions</span></a><span data-dcnode-id="7865" instrument_node="">, and </span><a data-dcnode-id="7863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fur_seal" title="Fur seal"><span data-dcnode-id="7864" instrument_node="">fur seals</span></a><span data-dcnode-id="7862" instrument_node="">), and </span><a class="mw-redirect" data-dcnode-id="7860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phocidae" title="Phocidae"><span data-dcnode-id="7861" instrument_node="">Phocidae</span></a><span data-dcnode-id="7859" instrument_node=""> (the earless seals); animals in the family Phocidae are sometimes referred to as hair seals, and are much more adept in the water than the eared seals, though they have a more difficult time getting around on land. The fur seal yields a valuable fur; the hair seal has no fur, but oil can be obtained from its fat and leather from its hide.</span><sup class="reference" data-dcnode-id="7856" id="cite_ref-ea_9-0"><a data-dcnode-id="7857" href="#cite_note-ea-9"><span data-dcnode-id="7858" instrument_node="">[9]</span></a></sup><span data-dcnode-id="7855" instrument_node="">
Seals have been used for their pelts, their flesh, and their fat, which was often used as </span><a data-dcnode-id="7853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oil_lamp" title="Oil lamp"><span data-dcnode-id="7854" instrument_node="">lamp fuel</span></a><span data-dcnode-id="7852" instrument_node="">, </span><a data-dcnode-id="7850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lubricant" title="Lubricant"><span data-dcnode-id="7851" instrument_node="">lubricants</span></a><span data-dcnode-id="7849" instrument_node="">, </span><a data-dcnode-id="7847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cooking_oil" title="Cooking oil"><span data-dcnode-id="7848" instrument_node="">cooking oil</span></a><span data-dcnode-id="7846" instrument_node="">, a constituent of soap, the liquid base for </span><a class="mw-redirect" data-dcnode-id="7844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_ochre" title="Red ochre"><span data-dcnode-id="7845" instrument_node="">red ochre</span></a><span data-dcnode-id="7843" instrument_node=""> paint, and for processing materials such as leather and </span><a data-dcnode-id="7841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jute" title="Jute"><span data-dcnode-id="7842" instrument_node="">jute</span></a><span data-dcnode-id="7840" instrument_node="">.
</span></p><span data-dcnode-id="7838" instrument_node="">
</span><h3 data-dcnode-id="7828"><span class="mw-headline" data-dcnode-id="7836" id="Traditional_seal_hunting"><span data-dcnode-id="7837" instrument_node="">Traditional seal hunting</span></span><span class="mw-editsection" data-dcnode-id="7829"><span class="mw-editsection-bracket" data-dcnode-id="7834"><span data-dcnode-id="7835" instrument_node="">[</span></span><a data-dcnode-id="7832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D2" title="Edit section: Traditional seal hunting"><span data-dcnode-id="7833" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7830"><span data-dcnode-id="7831" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7827" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7816"><div class="thumbinner" data-dcnode-id="7817" style="width:222px;"><a class="image" data-dcnode-id="7825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEskimo_Seal_Hunting.jpg"><img alt="" class="thumbimage" data-dcnode-id="7826" data-file-height="580" data-file-width="428" decoding="async" height="298" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Eskimo_Seal_Hunting.jpg/220px-Eskimo_Seal_Hunting.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Eskimo_Seal_Hunting.jpg/330px-Eskimo_Seal_Hunting.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/2/2c/Eskimo_Seal_Hunting.jpg 2x" width="220"></a><span data-dcnode-id="7824" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7818"><div class="magnify" data-dcnode-id="7822"><a class="internal" data-dcnode-id="7823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEskimo_Seal_Hunting.jpg" title="Enlarge"></a></div><a data-dcnode-id="7820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inuit" title="Inuit"><span data-dcnode-id="7821" instrument_node="">Inuit</span></a><span data-dcnode-id="7819" instrument_node=""> seal hunting</span></div></div></div><span data-dcnode-id="7815" instrument_node="">
</span><p data-dcnode-id="7791"><span data-dcnode-id="7814" instrument_node="">Archeological evidence indicates the </span><a data-dcnode-id="7812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Native_Americans_in_the_United_States" title="Native Americans in the United States"><span data-dcnode-id="7813" instrument_node="">Native Americans</span></a><span data-dcnode-id="7811" instrument_node=""> and </span><a data-dcnode-id="7809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Nations_in_Canada" title="First Nations in Canada"><span data-dcnode-id="7810" instrument_node="">First Nations</span></a><span data-dcnode-id="7808" instrument_node=""> People in Canada have been hunting seals for at least 4,000 years. Traditionally, when an </span><a data-dcnode-id="7806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inuit" title="Inuit"><span data-dcnode-id="7807" instrument_node="">Inuit</span></a><span data-dcnode-id="7805" instrument_node=""> boy killed his first seal or </span><a class="mw-redirect" data-dcnode-id="7803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caribou" title="Caribou"><span data-dcnode-id="7804" instrument_node="">caribou</span></a><span data-dcnode-id="7802" instrument_node="">, a feast was held. The </span><a data-dcnode-id="7800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seal_meat" title="Seal meat"><span data-dcnode-id="7801" instrument_node="">meat</span></a><span data-dcnode-id="7799" instrument_node=""> was an important source of fat, protein, vitamin A, vitamin B</span><sub data-dcnode-id="7797"><span data-dcnode-id="7798" instrument_node="">12</span></sub><span data-dcnode-id="7796" instrument_node=""> and iron,</span><sup class="reference" data-dcnode-id="7793" id="cite_ref-10"><a data-dcnode-id="7794" href="#cite_note-10"><span data-dcnode-id="7795" instrument_node="">[10]</span></a></sup><span data-dcnode-id="7792" instrument_node=""> and the pelts were prized for their warmth. The Inuit diet is rich in fish, whale, and seal.
</span></p><p data-dcnode-id="7767"><span data-dcnode-id="7790" instrument_node="">There were approximately 150,000 circumpolar Inuit in 2005 in Greenland, Alaska, Russia, and Canada.</span><sup class="reference" data-dcnode-id="7787" id="cite_ref-Ejesiak_11-0"><a data-dcnode-id="7788" href="#cite_note-Ejesiak-11"><span data-dcnode-id="7789" instrument_node="">[11]</span></a></sup><span data-dcnode-id="7786" instrument_node=""> According to Kirt Ejesiak, former secretary and chief of staff to then-Premier of Nunavut, Paul Okalik and the first Inuk from Nunavut to attend Harvard, for the c. 46,000 Canadian Inuit, the seal was not "just a source of cash through fur sales, but the keystone of their culture. Although Inuit harvest and hunt many species that inhabit the desert tundra and ice platforms, the seal is their mainstay. The Inuktitut vocabulary designates specific objects made from seal bone, sinew, fat and fur used as tools, games, thread, cords, fuel, clothing, boats, and tents. There are also words referring to seasons, topography, place names, legends, and kinship relationships based on the seal. One region of Canada's north is inhabited by the </span><a class="mw-redirect" data-dcnode-id="7783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Netsilik_Inuit" title="Netsilik Inuit"><i data-dcnode-id="7784"><span data-dcnode-id="7785" instrument_node="">Netsilingmiut</span></i></a><span data-dcnode-id="7782" instrument_node="">, or "people of the seal."</span><sup class="reference" data-dcnode-id="7779" id="cite_ref-Ejesiak_11-1"><a data-dcnode-id="7780" href="#cite_note-Ejesiak-11"><span data-dcnode-id="7781" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="7776" id="cite_ref-WenzelControversy_12-0"><a data-dcnode-id="7777" href="#cite_note-WenzelControversy-12"><span data-dcnode-id="7778" instrument_node="">[12]</span></a></sup><span data-dcnode-id="7775" instrument_node=""> The title of Ejesiak's article acknowledged the pivotal 1991 publication entitled </span><i data-dcnode-id="7773"><span data-dcnode-id="7774" instrument_node="">Animal Rights, Human Rights</span></i><span data-dcnode-id="7772" instrument_node=""> by George Wenzel, a McGill University geographer and anthropologist who worked more than two decades with the Clyde Inuit of Baffin Island. Wenzel's "scholarly examination" of "the impact of the animal rights movement upon the culture and economy of the Canadian Inuit" was among the first to reveal how animal rights groups, "well-meaning people in the dominant society through misunderstanding and ignorance can inflict destruction" on a vulnerable minority.</span><sup class="reference" data-dcnode-id="7769" id="cite_ref-AINA_13-0"><a data-dcnode-id="7770" href="#cite_note-AINA-13"><span data-dcnode-id="7771" instrument_node="">[13]</span></a></sup><span data-dcnode-id="7768" instrument_node="">
</span></p><p data-dcnode-id="7733"><span data-dcnode-id="7766" instrument_node="">Inuit seal hunting accounts for the majority of the seal hunt, but just three percent of the hunt in southern Canada; it is excluded from the </span><a data-dcnode-id="7764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Commission" title="European Commission"><span data-dcnode-id="7765" instrument_node="">European Commission</span></a><span data-dcnode-id="7763" instrument_node="">'s call in 2006 for a ban on the import, export and sale of all harp and hooded seal products.</span><sup class="reference" data-dcnode-id="7760" id="cite_ref-14"><a data-dcnode-id="7761" href="#cite_note-14"><span data-dcnode-id="7762" instrument_node="">[14]</span></a></sup><span data-dcnode-id="7759" instrument_node=""> </span><a data-dcnode-id="7757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ringed_seal" title="Ringed seal"><span data-dcnode-id="7758" instrument_node="">Ringed seals</span></a><span data-dcnode-id="7756" instrument_node=""> were once the main staple for food, and have been used for clothing, boots, fuel for lamps, as delicacy, containers, </span><a data-dcnode-id="7754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Igloo" title="Igloo"><span data-dcnode-id="7755" instrument_node="">igloo</span></a><span data-dcnode-id="7753" instrument_node=""> windows, and in harnesses for </span><a class="mw-redirect" data-dcnode-id="7751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Huskies" title="Huskies"><span data-dcnode-id="7752" instrument_node="">huskies</span></a><span data-dcnode-id="7750" instrument_node="">. Though no longer used to this extent, ringed seals are still an important food and clothing source for the people of </span><a data-dcnode-id="7748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nunavut" title="Nunavut"><span data-dcnode-id="7749" instrument_node="">Nunavut</span></a><span data-dcnode-id="7747" instrument_node="">.</span><sup class="reference" data-dcnode-id="7744" id="cite_ref-15"><a data-dcnode-id="7745" href="#cite_note-15"><span data-dcnode-id="7746" instrument_node="">[15]</span></a></sup><span data-dcnode-id="7743" instrument_node=""> Called </span><i data-dcnode-id="7741"><span data-dcnode-id="7742" instrument_node="">nayiq</span></i><span data-dcnode-id="7740" instrument_node=""> by the </span><a class="mw-redirect" data-dcnode-id="7738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_Alaskan_Yup%2527ik_people" title="Central Alaskan Yup'ik people"><span data-dcnode-id="7739" instrument_node="">Central Alaskan Yup'ik people</span></a><span data-dcnode-id="7737" instrument_node="">, the ringed seal is also hunted and eaten in </span><a data-dcnode-id="7735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alaska" title="Alaska"><span data-dcnode-id="7736" instrument_node="">Alaska</span></a><span data-dcnode-id="7734" instrument_node="">.
</span></p><p data-dcnode-id="7721"><span data-dcnode-id="7732" instrument_node="">Various seal species were also hunted in northwest Europe and the </span><a data-dcnode-id="7730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baltic_Sea" title="Baltic Sea"><span data-dcnode-id="7731" instrument_node="">Baltic Sea</span></a><span data-dcnode-id="7729" instrument_node=""> at least 8,000 years ago.</span><sup class="reference" data-dcnode-id="7726" id="cite_ref-16"><a data-dcnode-id="7727" href="#cite_note-16"><span data-dcnode-id="7728" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="7723" id="cite_ref-17"><a data-dcnode-id="7724" href="#cite_note-17"><span data-dcnode-id="7725" instrument_node="">[17]</span></a></sup><span data-dcnode-id="7722" instrument_node="">
</span></p><span data-dcnode-id="7720" instrument_node="">
</span><h3 data-dcnode-id="7710"><span class="mw-headline" data-dcnode-id="7718" id="Early_modern_era"><span data-dcnode-id="7719" instrument_node="">Early modern era</span></span><span class="mw-editsection" data-dcnode-id="7711"><span class="mw-editsection-bracket" data-dcnode-id="7716"><span data-dcnode-id="7717" instrument_node="">[</span></span><a data-dcnode-id="7714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D3" title="Edit section: Early modern era"><span data-dcnode-id="7715" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7712"><span data-dcnode-id="7713" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7709" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7698"><div class="thumbinner" data-dcnode-id="7699" style="width:222px;"><a class="image" data-dcnode-id="7707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AReimerswaal_%25C2%25BF_Zeehondenjacht.jpg"><img alt="" class="thumbimage" data-dcnode-id="7708" data-file-height="985" data-file-width="3017" decoding="async" height="72" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Reimerswaal_%25C2%25BF_Zeehondenjacht.jpg/220px-Reimerswaal_%25C2%25BF_Zeehondenjacht.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Reimerswaal_%C2%BF_Zeehondenjacht.jpg/330px-Reimerswaal_%C2%BF_Zeehondenjacht.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Reimerswaal_%C2%BF_Zeehondenjacht.jpg/440px-Reimerswaal_%C2%BF_Zeehondenjacht.jpg 2x" width="220"></a><span data-dcnode-id="7706" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7700"><div class="magnify" data-dcnode-id="7704"><a class="internal" data-dcnode-id="7705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AReimerswaal_%25C2%25BF_Zeehondenjacht.jpg" title="Enlarge"></a></div><span data-dcnode-id="7703" instrument_node="">Seal hunting in </span><a data-dcnode-id="7701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Verdronken_Land_van_Reimerswaal" title="Verdronken Land van Reimerswaal"><span data-dcnode-id="7702" instrument_node="">Reimerswaal</span></a></div></div></div><span data-dcnode-id="7697" instrument_node="">
</span><p data-dcnode-id="7688"><span data-dcnode-id="7696" instrument_node="">The first commercial hunting of seals by Europeans, is said to have occurred in 1515, when a cargo of fur seal skins from Uruguay was sent to Spain for sale in the markets of </span><a data-dcnode-id="7694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seville" title="Seville"><span data-dcnode-id="7695" instrument_node="">Seville</span></a><span data-dcnode-id="7693" instrument_node="">.</span><sup class="reference" data-dcnode-id="7690" id="cite_ref-tas-history_18-0"><a data-dcnode-id="7691" href="#cite_note-tas-history-18"><span data-dcnode-id="7692" instrument_node="">[18]</span></a></sup><span data-dcnode-id="7689" instrument_node="">
</span></p><span data-dcnode-id="7687" instrument_node="">
</span><h4 data-dcnode-id="7677"><span class="mw-headline" data-dcnode-id="7685" id="Newfoundland"><span data-dcnode-id="7686" instrument_node="">Newfoundland</span></span><span class="mw-editsection" data-dcnode-id="7678"><span class="mw-editsection-bracket" data-dcnode-id="7683"><span data-dcnode-id="7684" instrument_node="">[</span></span><a data-dcnode-id="7681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D4" title="Edit section: Newfoundland"><span data-dcnode-id="7682" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7679"><span data-dcnode-id="7680" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7676" instrument_node="">
</span><p data-dcnode-id="7662"><a data-dcnode-id="7674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newfoundland_and_Labrador" title="Newfoundland and Labrador"><span data-dcnode-id="7675" instrument_node="">Newfoundland and Labrador</span></a><span data-dcnode-id="7673" instrument_node=""> and the </span><a data-dcnode-id="7671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gulf_of_St._Lawrence" title="Gulf of St. Lawrence"><span data-dcnode-id="7672" instrument_node="">Gulf of St. Lawrence</span></a><span data-dcnode-id="7670" instrument_node=""> were the first regions to experience large scale sealing. Migratory fishermen began the hunting from as early as the 1500s. Large-scale commercial seal hunting became an annual event starting in 1723 and expanded rapidly near the turn of the 18th century. Initially, the method used was to ensnare the migrating seals in nets anchored to </span><a class="mw-redirect" data-dcnode-id="7668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dock_%28maritime%29" title="Dock (maritime)"><span data-dcnode-id="7669" instrument_node="">shore installations</span></a><span data-dcnode-id="7667" instrument_node="">, known as the 'landsman seal fishery'. The hunt was mainly for the procurement of seal meat as a form of sustenance for the settlements in the area, rather than for commercial gain.</span><sup class="reference" data-dcnode-id="7664" id="cite_ref-Seal_Fishery_19-0"><a data-dcnode-id="7665" href="#cite_note-Seal_Fishery-19"><span data-dcnode-id="7666" instrument_node="">[19]</span></a></sup><span data-dcnode-id="7663" instrument_node="">
</span></p><p data-dcnode-id="7647"><span data-dcnode-id="7661" instrument_node="">From the early 18th century English hunters began to range further afield – 1723 marked the first time that hunters armed with </span><a data-dcnode-id="7659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Firearm" title="Firearm"><span data-dcnode-id="7660" instrument_node="">firearms</span></a><span data-dcnode-id="7658" instrument_node=""> ventured forth in boats to increase their haul. This soon became a sophisticated commercial operation; the seals were transported back to England, where the seal's meat, fur, and oil were sold separately. From 1749, the import of seal oil to England was being recorded annually, and was used as lighting oil, for cooking, in the manufacture of </span><a data-dcnode-id="7656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soap" title="Soap"><span data-dcnode-id="7657" instrument_node="">soap</span></a><span data-dcnode-id="7655" instrument_node=""> and for the treating of </span><a data-dcnode-id="7653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leather" title="Leather"><span data-dcnode-id="7654" instrument_node="">leather</span></a><span data-dcnode-id="7652" instrument_node="">.</span><sup class="reference" data-dcnode-id="7649" id="cite_ref-Seal_Fishery_19-1"><a data-dcnode-id="7650" href="#cite_note-Seal_Fishery-19"><span data-dcnode-id="7651" instrument_node="">[19]</span></a></sup><span data-dcnode-id="7648" instrument_node="">
</span></p><span data-dcnode-id="7646" instrument_node="">
</span><h4 data-dcnode-id="7636"><span class="mw-headline" data-dcnode-id="7644" id="South_Atlantic"><span data-dcnode-id="7645" instrument_node="">South Atlantic</span></span><span class="mw-editsection" data-dcnode-id="7637"><span class="mw-editsection-bracket" data-dcnode-id="7642"><span data-dcnode-id="7643" instrument_node="">[</span></span><a data-dcnode-id="7640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D5" title="Edit section: South Atlantic"><span data-dcnode-id="7641" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7638"><span data-dcnode-id="7639" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7635" instrument_node="">
</span><p data-dcnode-id="7611"><span data-dcnode-id="7634" instrument_node="">It was in the </span><a data-dcnode-id="7632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atlantic_Ocean%23South_Atlantic" title="Atlantic Ocean"><span data-dcnode-id="7633" instrument_node="">South Seas</span></a><span data-dcnode-id="7631" instrument_node=""> that sealing became a major enterprise from the late 18th century. </span><a data-dcnode-id="7629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samuel_Enderby" title="Samuel Enderby"><span data-dcnode-id="7630" instrument_node="">Samuel Enderby</span></a><span data-dcnode-id="7628" instrument_node="">, along with </span><a data-dcnode-id="7626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_Champion_%28businessman%29" title="Alexander Champion (businessman)"><span data-dcnode-id="7627" instrument_node="">Alexander Champion</span></a><span data-dcnode-id="7625" instrument_node=""> and </span><a data-dcnode-id="7623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_St_Barbe" title="John St Barbe"><span data-dcnode-id="7624" instrument_node="">John St Barbe</span></a><span data-dcnode-id="7622" instrument_node=""> organized the first commercial expedition to the </span><a class="mw-redirect" data-dcnode-id="7620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Atlantic_Ocean" title="South Atlantic Ocean"><span data-dcnode-id="7621" instrument_node="">South Atlantic Ocean</span></a><span data-dcnode-id="7619" instrument_node=""> in 1776, initially with the primary aim of </span><a data-dcnode-id="7617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Whaling" title="Whaling"><span data-dcnode-id="7618" instrument_node="">whaling</span></a><span data-dcnode-id="7616" instrument_node="">, although sealing began to play a prominent part in the operation as well. More expeditions were sent in 1777 and 1778 before political and economic troubles hampered the trade for some time.</span><sup class="reference" data-dcnode-id="7613" id="cite_ref-20"><a data-dcnode-id="7614" href="#cite_note-20"><span data-dcnode-id="7615" instrument_node="">[20]</span></a></sup><span data-dcnode-id="7612" instrument_node="">
</span></p><span data-dcnode-id="7610" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="7596"><div class="thumbinner" data-dcnode-id="7597" style="width:222px;"><a class="image" data-dcnode-id="7608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACook-1777.PNG"><img alt="" class="thumbimage" data-dcnode-id="7609" data-file-height="2664" data-file-width="3807" decoding="async" height="154" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/04/Cook-1777.PNG/220px-Cook-1777.PNG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/04/Cook-1777.PNG/330px-Cook-1777.PNG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/04/Cook-1777.PNG/440px-Cook-1777.PNG 2x" width="220"></a><span data-dcnode-id="7607" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7598"><div class="magnify" data-dcnode-id="7605"><a class="internal" data-dcnode-id="7606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACook-1777.PNG" title="Enlarge"></a></div><a data-dcnode-id="7603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Georgia_and_the_South_Sandwich_Islands" title="South Georgia and the South Sandwich Islands"><span data-dcnode-id="7604" instrument_node="">South Georgia island</span></a><span data-dcnode-id="7602" instrument_node=""> became a centre for the sealing industry from the late 18th century, shortly after it was mapped by Captain </span><a data-dcnode-id="7600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Cook" title="James Cook"><span data-dcnode-id="7601" instrument_node="">James Cook</span></a><span data-dcnode-id="7599" instrument_node=""> in 1777.</span></div></div></div><span data-dcnode-id="7595" instrument_node="">
</span><p data-dcnode-id="7568"><span data-dcnode-id="7594" instrument_node="">On 1 September 1788, the 270-ton ship </span><i data-dcnode-id="7592"><span data-dcnode-id="7593" instrument_node="">Emilia</span></i><span data-dcnode-id="7591" instrument_node="">, owned by </span><a data-dcnode-id="7589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samuel_Enderby_%2526_Sons" title="Samuel Enderby &amp; Sons"><span data-dcnode-id="7590" instrument_node="">Samuel Enderby &amp; Sons</span></a><span data-dcnode-id="7588" instrument_node=""> and commanded by Captain James Shields, departed London. The ship went west around </span><a data-dcnode-id="7586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cape_Horn" title="Cape Horn"><span data-dcnode-id="7587" instrument_node="">Cape Horn</span></a><span data-dcnode-id="7585" instrument_node=""> into the </span><a data-dcnode-id="7583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pacific_Ocean" title="Pacific Ocean"><span data-dcnode-id="7584" instrument_node="">Pacific Ocean</span></a><span data-dcnode-id="7582" instrument_node=""> to become the first ship of any nation to conduct operations in the </span><a data-dcnode-id="7580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Southern_Ocean" title="Southern Ocean"><span data-dcnode-id="7581" instrument_node="">Southern Ocean</span></a><span data-dcnode-id="7579" instrument_node="">. </span><i data-dcnode-id="7577"><span data-dcnode-id="7578" instrument_node="">Emilia</span></i><span data-dcnode-id="7576" instrument_node=""> returned to London on 12 March 1790 with a cargo of 139 tons of </span><a data-dcnode-id="7574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Whale_oil" title="Whale oil"><span data-dcnode-id="7575" instrument_node="">sperm oil</span></a><span data-dcnode-id="7573" instrument_node="">.</span><sup class="reference" data-dcnode-id="7570" id="cite_ref-Quarterly_21-0"><a data-dcnode-id="7571" href="#cite_note-Quarterly-21"><span data-dcnode-id="7572" instrument_node="">[21]</span></a></sup><span data-dcnode-id="7569" instrument_node="">
</span></p><p data-dcnode-id="7556"><span data-dcnode-id="7567" instrument_node="">By 1784, the British had fifteen ships in the southern fishery, all from </span><a data-dcnode-id="7565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/London" title="London"><span data-dcnode-id="7566" instrument_node="">London</span></a><span data-dcnode-id="7564" instrument_node="">. By 1790 this port alone had sixty vessels employed in the trade. Between 1793 and 1799 there was an average of sixty vessels in the trade. The average increased to seventy-two in the years between 1800 and 1809.</span><sup class="reference" data-dcnode-id="7561" id="cite_ref-22"><a data-dcnode-id="7562" href="#cite_note-22"><span data-dcnode-id="7563" instrument_node="">[22]</span></a></sup><sup class="reference" data-dcnode-id="7558" id="cite_ref-23"><a data-dcnode-id="7559" href="#cite_note-23"><span data-dcnode-id="7560" instrument_node="">[23]</span></a></sup><span data-dcnode-id="7557" instrument_node="">
</span></p><p data-dcnode-id="7522"><span data-dcnode-id="7555" instrument_node="">The sealing industry extended further south to the </span><a data-dcnode-id="7553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Georgia_and_the_South_Sandwich_Islands" title="South Georgia and the South Sandwich Islands"><span data-dcnode-id="7554" instrument_node="">South Georgia island</span></a><span data-dcnode-id="7552" instrument_node="">, first mapped by Captain </span><a data-dcnode-id="7550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Cook" title="James Cook"><span data-dcnode-id="7551" instrument_node="">James Cook</span></a><span data-dcnode-id="7549" instrument_node=""> in </span><a class="mw-redirect" data-dcnode-id="7545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/HMS_Resolution_%28Cook%29" title="HMS Resolution (Cook)"><span data-dcnode-id="7548" instrument_node="">HMS&nbsp;</span><i data-dcnode-id="7546"><span data-dcnode-id="7547" instrument_node="">Resolution</span></i></a><span data-dcnode-id="7544" instrument_node=""> on 17 January 1775. During the late 18th century and throughout the 19th century, South Georgia was inhabited by English and </span><a data-dcnode-id="7542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yankee" title="Yankee"><span data-dcnode-id="7543" instrument_node="">Yankee</span></a><span data-dcnode-id="7541" instrument_node=""> sealers, who used to live there for considerable periods of time and sometimes overwintered. In 1778, English sealers brought back from the Island of </span><a class="mw-redirect" data-dcnode-id="7539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Georgia_Island" title="South Georgia Island"><span data-dcnode-id="7540" instrument_node="">South Georgia</span></a><span data-dcnode-id="7538" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="7536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magellan_Strait" title="Magellan Strait"><span data-dcnode-id="7537" instrument_node="">Magellan Strait</span></a><span data-dcnode-id="7535" instrument_node=""> area as many as 40,000 seal skins and 2,800&nbsp;tons of </span><a data-dcnode-id="7533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elephant_seal" title="Elephant seal"><span data-dcnode-id="7534" instrument_node="">elephant seal</span></a><span data-dcnode-id="7532" instrument_node=""> oil. More </span><a class="mw-redirect" data-dcnode-id="7530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fur_seals" title="Fur seals"><span data-dcnode-id="7531" instrument_node="">fur seals</span></a><span data-dcnode-id="7529" instrument_node=""> from the island were taken in 1786 by the English sealing vessel </span><i data-dcnode-id="7527"><span data-dcnode-id="7528" instrument_node="">Lord Hawkesbury</span></i><span data-dcnode-id="7526" instrument_node="">, and by 1791, 102 vessels, manned by 3000 sealers, were hunting seals south of the equator. The first commercial visit to the South Sandwich Islands was made in 1816 by another English ship, the </span><i data-dcnode-id="7524"><span data-dcnode-id="7525" instrument_node="">Ann</span></i><span data-dcnode-id="7523" instrument_node="">.
</span></p><p data-dcnode-id="7520"><span data-dcnode-id="7521" instrument_node="">The sealers pursued their trade in a most unsustainable manner, promptly reducing the fur seal population to near extermination. As a result, sealing activities on South Georgia had three marked peaks in 1786–1802, 1814–23, and 1869–1913 respectively, decreasing in between and gradually shifting to elephant seals taken for oil.
</span></p><span data-dcnode-id="7519" instrument_node="">
</span><h4 data-dcnode-id="7509"><span class="mw-headline" data-dcnode-id="7517" id="Pacific"><span data-dcnode-id="7518" instrument_node="">Pacific</span></span><span class="mw-editsection" data-dcnode-id="7510"><span class="mw-editsection-bracket" data-dcnode-id="7515"><span data-dcnode-id="7516" instrument_node="">[</span></span><a data-dcnode-id="7513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D6" title="Edit section: Pacific"><span data-dcnode-id="7514" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7511"><span data-dcnode-id="7512" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7508" instrument_node="">
</span><p data-dcnode-id="7460"><span data-dcnode-id="7507" instrument_node="">Commercial sealing in the </span><a data-dcnode-id="7505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australasia" title="Australasia"><span data-dcnode-id="7506" instrument_node="">Australasian</span></a><span data-dcnode-id="7504" instrument_node=""> region appears to have started with the London-based Massachusetts-born </span><a data-dcnode-id="7502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eber_Bunker" title="Eber Bunker"><span data-dcnode-id="7503" instrument_node="">Eber Bunker</span></a><span data-dcnode-id="7501" instrument_node="">, master of the </span><a data-dcnode-id="7498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_and_Ann_%281759%29" title="William and Ann (1759)"><i data-dcnode-id="7499"><span data-dcnode-id="7500" instrument_node="">William and Ann</span></i></a><span data-dcnode-id="7497" instrument_node="">, who in November 1791 announced his intention to visit and hunt in </span><a data-dcnode-id="7495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand" title="New Zealand"><span data-dcnode-id="7496" instrument_node="">New Zealand</span></a><span data-dcnode-id="7494" instrument_node="">'s </span><a class="mw-redirect" data-dcnode-id="7492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dusky_Sound" title="Dusky Sound"><span data-dcnode-id="7493" instrument_node="">Dusky Sound</span></a><span data-dcnode-id="7491" instrument_node="">.</span><sup class="reference" data-dcnode-id="7488" id="cite_ref-entwisle_24-0"><a data-dcnode-id="7489" href="#cite_note-entwisle-24"><span data-dcnode-id="7490" instrument_node="">[24]</span></a></sup><sup class="reference nowrap" data-dcnode-id="7485"><span data-dcnode-id="7486" title="Page / location: 10–11"><span data-dcnode-id="7487" instrument_node="">: 10–11 </span></span></sup><span data-dcnode-id="7484" instrument_node=""> Captain </span><a data-dcnode-id="7482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Raven" title="William Raven"><span data-dcnode-id="7483" instrument_node="">William Raven</span></a><span data-dcnode-id="7481" instrument_node=""> of the </span><a data-dcnode-id="7478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Britannia_%281783_whaler%29" title="Britannia (1783 whaler)"><i data-dcnode-id="7479"><span data-dcnode-id="7480" instrument_node="">Britannia</span></i></a><span data-dcnode-id="7477" instrument_node=""> stationed a party at Dusky from 1792 to 1793, but the discovery in 1798-1799 of </span><a data-dcnode-id="7475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bass_Strait" title="Bass Strait"><span data-dcnode-id="7476" instrument_node="">Bass Strait</span></a><span data-dcnode-id="7474" instrument_node="">, between mainland Australia and Van Diemen's Land (present-day </span><a data-dcnode-id="7472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tasmania" title="Tasmania"><span data-dcnode-id="7473" instrument_node="">Tasmania</span></a><span data-dcnode-id="7471" instrument_node="">) saw the sealers' focus shift there in 1798, when a gang including Daniel Cooper landed from the </span><i data-dcnode-id="7469"><span data-dcnode-id="7470" instrument_node="">Nautilus</span></i><span data-dcnode-id="7468" instrument_node=""> on </span><a data-dcnode-id="7466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cape_Barren_Island" title="Cape Barren Island"><span data-dcnode-id="7467" instrument_node="">Cape Barren Island</span></a><span data-dcnode-id="7465" instrument_node="">.</span><sup class="reference" data-dcnode-id="7462" id="cite_ref-mcnab1907_25-0"><a data-dcnode-id="7463" href="#cite_note-mcnab1907-25"><span data-dcnode-id="7464" instrument_node="">[25]</span></a></sup><span data-dcnode-id="7461" instrument_node="">
</span></p><p data-dcnode-id="7399"><span data-dcnode-id="7459" instrument_node="">With Bass Strait over-exploited by 1802, commercial attention returned to southern New Zealand waters, where </span><a class="mw-redirect" data-dcnode-id="7457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stewart_Island/Rakiura" title="Stewart Island/Rakiura"><span data-dcnode-id="7458" instrument_node="">Stewart Island/Rakiura</span></a><span data-dcnode-id="7456" instrument_node=""> and </span><a data-dcnode-id="7454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foveaux_Strait" title="Foveaux Strait"><span data-dcnode-id="7455" instrument_node="">Foveaux Strait</span></a><span data-dcnode-id="7453" instrument_node=""> were explored, exploited and charted from 1803 to 1804.</span><sup class="reference" data-dcnode-id="7450" id="cite_ref-26"><a data-dcnode-id="7451" href="#cite_note-26"><span data-dcnode-id="7452" instrument_node="">[26]</span></a></sup><span data-dcnode-id="7449" instrument_node=""> Thereafter, the sealing-industry focus shifted to the sub-Antarctic </span><a data-dcnode-id="7447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antipodes_Islands" title="Antipodes Islands"><span data-dcnode-id="7448" instrument_node="">Antipodes Islands</span></a><span data-dcnode-id="7446" instrument_node="">, 1805–1807, the </span><a data-dcnode-id="7444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Auckland_Islands" title="Auckland Islands"><span data-dcnode-id="7445" instrument_node="">Auckland Islands</span></a><span data-dcnode-id="7443" instrument_node=""> from 1806, the southeast coast of New Zealand's </span><a data-dcnode-id="7441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Island" title="South Island"><span data-dcnode-id="7442" instrument_node="">South Island</span></a><span data-dcnode-id="7440" instrument_node="">, </span><a data-dcnode-id="7438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Otago_Harbour" title="Otago Harbour"><span data-dcnode-id="7439" instrument_node="">Otago Harbour</span></a><span data-dcnode-id="7437" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="7435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solander_Island" title="Solander Island"><span data-dcnode-id="7436" instrument_node="">Solander Island</span></a><span data-dcnode-id="7434" instrument_node=""> by 1809, before focusing further to the south at the newly-discovered </span><a data-dcnode-id="7432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Campbell_Island%2C_New_Zealand" title="Campbell Island, New Zealand"><span data-dcnode-id="7433" instrument_node="">Campbell Island</span></a><span data-dcnode-id="7431" instrument_node=""> (discovered in January 1810) and </span><a data-dcnode-id="7429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Macquarie_Island" title="Macquarie Island"><span data-dcnode-id="7430" instrument_node="">Macquarie Island</span></a><span data-dcnode-id="7428" instrument_node=""> (discovered in July 1810) from 1810.</span><sup class="reference" data-dcnode-id="7425" id="cite_ref-27"><a data-dcnode-id="7426" href="#cite_note-27"><span data-dcnode-id="7427" instrument_node="">[27]</span></a></sup><sup class="reference" data-dcnode-id="7422" id="cite_ref-28"><a data-dcnode-id="7423" href="#cite_note-28"><span data-dcnode-id="7424" instrument_node="">[28]</span></a></sup><sup class="reference" data-dcnode-id="7419" id="cite_ref-29"><a data-dcnode-id="7420" href="#cite_note-29"><span data-dcnode-id="7421" instrument_node="">[29]</span></a></sup><span data-dcnode-id="7418" instrument_node=""> During this period sealers were active on the southern coast of mainland Australia, for example at </span><a data-dcnode-id="7416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kangaroo_Island" title="Kangaroo Island"><span data-dcnode-id="7417" instrument_node="">Kangaroo Island</span></a><span data-dcnode-id="7415" instrument_node="">.</span><sup class="reference" data-dcnode-id="7412" id="cite_ref-30"><a data-dcnode-id="7413" href="#cite_note-30"><span data-dcnode-id="7414" instrument_node="">[30]</span></a></sup><span data-dcnode-id="7411" instrument_node=""> This whole development has been called</span><sup class="noprint Inline-Template" data-dcnode-id="7404" style="white-space:nowrap;"><span data-dcnode-id="7410" instrument_node="">[</span><i data-dcnode-id="7406"><a data-dcnode-id="7407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Words_to_watch%23Unsupported_attributions" title="Wikipedia:Manual of Style/Words to watch"><span data-dcnode-id="7408" title="The material near this tag may use weasel words or too-vague attribution. (September 2014)"><span data-dcnode-id="7409" instrument_node="">by whom?</span></span></a></i><span data-dcnode-id="7405" instrument_node="">]</span></sup><span data-dcnode-id="7403" instrument_node=""> the first sealing boom; it sparked the </span><a data-dcnode-id="7401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sealers%2527_War" title="Sealers' War"><span data-dcnode-id="7402" instrument_node="">Sealers' War</span></a><span data-dcnode-id="7400" instrument_node=""> (1810–&nbsp;) in southern New Zealand.
</span></p><p data-dcnode-id="7393"><span data-dcnode-id="7398" instrument_node="">Australasian sealing measured its output in terms of skins.</span><sup class="reference" data-dcnode-id="7395" id="cite_ref-31"><a data-dcnode-id="7396" href="#cite_note-31"><span data-dcnode-id="7397" instrument_node="">[31]</span></a></sup><span data-dcnode-id="7394" instrument_node="">
</span></p><p data-dcnode-id="7359"><span data-dcnode-id="7392" instrument_node="">By about 1815 sealing in the Pacific had faded in importance. A brief revival occurred from 1823, but this proved very short-lived.</span><sup class="reference" data-dcnode-id="7389" id="cite_ref-mcnab1907_25-1"><a data-dcnode-id="7390" href="#cite_note-mcnab1907-25"><span data-dcnode-id="7391" instrument_node="">[25]</span></a></sup><span data-dcnode-id="7388" instrument_node=""> Although highly profitable at times and affording </span><a data-dcnode-id="7386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_South_Wales" title="New South Wales"><span data-dcnode-id="7387" instrument_node="">New South Wales</span></a><span data-dcnode-id="7385" instrument_node=""> one of its earliest trade staples, sealing's unregulated character saw its self-destruction. Notable traders from Britain and based in Australia included </span><a data-dcnode-id="7383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Simeon_Lord" title="Simeon Lord"><span data-dcnode-id="7384" instrument_node="">Simeon Lord</span></a><span data-dcnode-id="7382" instrument_node="">, </span><a data-dcnode-id="7380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Kable" title="Henry Kable"><span data-dcnode-id="7381" instrument_node="">Henry Kable</span></a><span data-dcnode-id="7379" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="7377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Underwood_%28carpenter%29" title="James Underwood (carpenter)"><span data-dcnode-id="7378" instrument_node="">James Underwood</span></a><span data-dcnode-id="7376" instrument_node=""> and </span><a data-dcnode-id="7374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Campbell_%281769%25E2%2580%25931846%29" title="Robert Campbell (1769–1846)"><span data-dcnode-id="7375" instrument_node="">Robert Campbell</span></a><span data-dcnode-id="7373" instrument_node="">. Plummers of London and the Whitneys of New York also became involved.</span><sup class="reference" data-dcnode-id="7370" id="cite_ref-entwisle_24-1"><a data-dcnode-id="7371" href="#cite_note-entwisle-24"><span data-dcnode-id="7372" instrument_node="">[24]</span></a></sup><sup class="reference" data-dcnode-id="7367" id="cite_ref-32"><a data-dcnode-id="7368" href="#cite_note-32"><span data-dcnode-id="7369" instrument_node="">[32]</span></a></sup><sup class="reference" data-dcnode-id="7364" id="cite_ref-33"><a data-dcnode-id="7365" href="#cite_note-33"><span data-dcnode-id="7366" instrument_node="">[33]</span></a></sup><sup class="reference" data-dcnode-id="7361" id="cite_ref-34"><a data-dcnode-id="7362" href="#cite_note-34"><span data-dcnode-id="7363" instrument_node="">[34]</span></a></sup><span data-dcnode-id="7360" instrument_node="">
</span></p><p data-dcnode-id="7350"><span data-dcnode-id="7358" instrument_node="">By 1830 most Pacific seal-stocks had been seriously depleted, and </span><a data-dcnode-id="7356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lloyd%2527s_Register" title="Lloyd's Register"><span data-dcnode-id="7357" instrument_node="">Lloyd's Register of Shipping</span></a><span data-dcnode-id="7355" instrument_node=""> only showed one full-time sealing vessel on its books.</span><sup class="reference" data-dcnode-id="7352" id="cite_ref-tas-history_18-1"><a data-dcnode-id="7353" href="#cite_note-tas-history-18"><span data-dcnode-id="7354" instrument_node="">[18]</span></a></sup><span data-dcnode-id="7351" instrument_node="">
In the North Pacific, the later 1800s saw large harvests of fur seals. These harvests decreased along with fur-seal populations.
</span></p><span data-dcnode-id="7349" instrument_node="">
</span><h3 data-dcnode-id="7339"><span class="mw-headline" data-dcnode-id="7347" id="Industrial_era"><span data-dcnode-id="7348" instrument_node="">Industrial era</span></span><span class="mw-editsection" data-dcnode-id="7340"><span class="mw-editsection-bracket" data-dcnode-id="7345"><span data-dcnode-id="7346" instrument_node="">[</span></span><a data-dcnode-id="7343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeal_hunting%26action%3Dedit%26section%3D7" title="Edit section: Industrial era"><span data-dcnode-id="7344" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7341"><span data-dcnode-id="7342" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7338" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7326"><div class="thumbinner" data-dcnode-id="7327" style="width:222px;"><a class="image" data-dcnode-id="7336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASealhunt_550.jpg"><img alt="" class="thumbimage" data-dcnode-id="7337" data-file-height="284" data-file-width="500" decoding="async" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/51/Sealhunt_550.jpg/220px-Sealhunt_550.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/51/Sealhunt_550.jpg/330px-Sealhunt_550.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/51/Sealhunt_550.jpg/440px-Sealhunt_550.jpg 2x" width="220"></a><span data-dcnode-id="7335" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7328"><div class="magnify" data-dcnode-id="7333"><a class="internal" data-dcnode-id="7334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASealhunt_550.jpg" title="Enlarge"></a></div><span data-dcnode-id="7332" instrument_node="">Seal hunting in </span><a data-dcnode-id="7330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newfoundland_%28island%29" title="Newfoundland (island)"><span data-dcnode-id="7331" instrument_node="">Newfoundland</span></a><span data-dcnode-id="7329" instrument_node=""> in the 1880s.</span></div></div></div><span data-dcnode-id="7325" instrument_node="">
</span><p data-dcnode-id="7313"><span data-dcnode-id="7324" instrument_node="">Growing from the international </span><a class="mw-redirect" data-dcnode-id="7322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grand_Banks" title="Grand Banks"><span data-dcnode-id="7323" instrument_node="">Grand Banks</span></a><span data-dcnode-id="7321" instrument_node=""> fishery, the Newfoundland hunt initially used small </span><a data-dcnode-id="7319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Schooner" title="Schooner"><span data-dcnode-id="7320" instrument_node="">schooners</span></a><span data-dcnode-id="7318" instrument_node="">. Kill rates averaged 451,000 in the 1830s, and rose to 546,000 annually during the first half of the next decade, which led to a marked decline in the harp seal population that in turn adversely impacted profits in the sealing industry.</span><sup class="reference" data-dcnode-id="7315" id="cite_ref-heritage.nf.ca_35-0"><a data-dcnode-id="7316" href="#cite_note-heritage.nf.ca-35"><span data-dcnode-id="7317" instrument_node="">[35]</span></a></sup><span data-dcnode-id="7314" instrument_node="">
</span></p><p data-dcnode-id="7298"><span data-dcnode-id="7312" instrument_node="">Sealing reached its peak in </span><a class="mw-redirect" data-dcnode-id="7310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newfoundland" title="Newfoundland"><span data-dcnode-id="7311" instrument_node="">Newfoundland</span></a><span data-dcnode-id="7309" instrument_node=""> in the 1860s, with the introduction of more powerful and reliable </span><a data-dcnode-id="7307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Steamship" title="Steamship"><span data-dcnode-id="7308" instrument_node="">steamships</span></a><span data-dcnode-id="7306" instrument_node=""> that were capable of much larger range and storing capacity.</span><sup class="reference" data-dcnode-id="7303" id="cite_ref-36"><a data-dcnode-id="7304" href="#cite_note-36"><span data-dcnode-id="7305" instrument_node="">[36]</span></a></sup><sup class="reference" data-dcnode-id="7300" id="cite_ref-37"><a data-dcnode-id="7301" href="#cite_note-37"><span data-dcnode-id="7302" instrument_node="">[37]</span></a></sup><span data-dcnode-id="7299" instrument_node=""> Annual catches exceeded the 400,000 mark from the 1870s and smaller sealers were steadily pushed out of the market.
</span></p><p data-dcnode-id="7268"><span data-dcnode-id="7297" instrument_node="">The first modern sealing ship was the </span><a class="mw-redirect" data-dcnode-id="7293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/USS_Bear_%281874%29" title="USS Bear (1874)"><span data-dcnode-id="7296" instrument_node="">SS </span><i data-dcnode-id="7294"><span data-dcnode-id="7295" instrument_node="">Bear</span></i></a><span data-dcnode-id="7292" instrument_node="">, built in </span><a data-dcnode-id="7290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dundee" title="Dundee"><span data-dcnode-id="7291" instrument_node="">Dundee</span></a><span data-dcnode-id="7289" instrument_node="">, Scotland in 1874 as a steamer for </span><a class="mw-redirect" data-dcnode-id="7287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seal_hunt" title="Seal hunt"><span data-dcnode-id="7288" instrument_node="">sealing</span></a><span data-dcnode-id="7286" instrument_node="">.</span><sup class="reference" data-dcnode-id="7283" id="cite_ref-38"><a data-dcnode-id="7284" href="#cite_note-38"><span data-dcnode-id="7285" instrument_node="">[38]</span></a></sup><span data-dcnode-id="7282" instrument_node=""> The ship was custom-built for sealing out of </span><a class="mw-redirect" data-dcnode-id="7280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St._John%2527s%2C_Newfoundland" title="St. John's, Newfoundland"><span data-dcnode-id="7281" instrument_node="">St. John's, Newfoundland</span></a><span data-dcnode-id="7279" instrument_node="">, and was the most outstanding sealing vessel of her day and the lead ship in a new generation of sealers.</span><sup class="reference" data-dcnode-id="7276" id="cite_ref-39"><a data-dcnode-id="7277" href="#cite_note-39"><span data-dcnode-id="7278" instrument_node="">[39]</span></a></sup><span data-dcnode-id="7275" instrument_node=""> Heavy-built with 15-centimetre-thick (6-inch) wooden planks, </span><i data-dcnode-id="7273"><span data-dcnode-id="7274" instrument_node="">Bear</span></i><span data-dcnode-id="7272" instrument_node=""> was rigged as a sailing </span><a data-dcnode-id="7270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barquentine" title="Barquentine"><span data-dcnode-id="7271" instrument_node="">barquentine</span></a><span data-dcnode-id="7269" instrument_node=""> but her main power was a steam engine designed to smash deep into ice packs to reach seal herds.
</span></p><span data-dcnode-id="7267" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="7253"><div class="thumbinner" data-dcnode-id="7254" style="width:222px;"><a class="image" data-dcnode-id="7265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUSS_Bear_%28AG-29%29_Antarctica_c1939.jpg"><img alt="" class="thumbimage" data-dcnode-id="7266" data-file-height="1532" data-file-width="1976" decoding="async" height="171" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c5/USS_Bear_%2528AG-29%2529_Antarctica_c1939.jpg/220px-USS_Bear_%2528AG-29%2529_Antarctica_c1939.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c5/USS_Bear_%28AG-29%29_Antarctica_c1939.jpg/330px-USS_Bear_%28AG-29%29_Antarctica_c1939.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c5/USS_Bear_%28AG-29%29_Antarctica_c1939.jpg/440px-USS_Bear_%28AG-29%29_Antarctica_c1939.jpg 2x" width="220"></a><span data-dcnode-id="7264" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7255"><div class="magnify" data-dcnode-id="7262"><a class="internal" data-dcnode-id="7263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUSS_Bear_%28AG-29%29_Antarctica_c1939.jpg" title="Enlarge"></a></div><span data-dcnode-id="7261" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="7257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/USS_Bear_%281874%29" title="USS Bear (1874)"><span data-dcnode-id="7260" instrument_node="">SS </span><i data-dcnode-id="7258"><span data-dcnode-id="7259" instrument_node="">Bear</span></i></a><span data-dcnode-id="7256" instrument_node=""> began sealing operations in the 1870s and radically transformed the industry.</span></div></div></div><span data-dcnode-id="7252" instrument_node="">
</span><p data-dcnode-id="7226"><span data-dcnode-id="7251" instrument_node="">At the time of her arrival in St. John's, there were 300 vessels outfitted each season to hunt seals, but most were small </span><a class="mw-redirect" data-dcnode-id="7249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Schooners" title="Schooners"><span data-dcnode-id="7250" instrument_node="">schooners</span></a><span data-dcnode-id="7248" instrument_node=""> or old sailing </span><a data-dcnode-id="7246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barque" title="Barque"><span data-dcnode-id="7247" instrument_node="">barques</span></a><span data-dcnode-id="7245" instrument_node="">.</span><sup class="reference" data-dcnode-id="7242" id="cite_ref-40"><a data-dcnode-id="7243" href="#cite_note-40"><span data-dcnode-id="7244" instrument_node="">[40]</span></a></sup><span data-dcnode-id="7241" instrument_node=""> The new sealing ships represented by </span><i data-dcnode-id="7239"><span data-dcnode-id="7240" instrument_node="">Bear</span></i><span data-dcnode-id="7238" instrument_node=""> radically transformed the Eastern North Atlantic seal fishery as they replaced the hundreds of smaller sealing vessels owned by merchants in </span><a class="mw-redirect" data-dcnode-id="7236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Outports" title="Outports"><span data-dcnode-id="7237" instrument_node="">outports</span></a><span data-dcnode-id="7235" instrument_node=""> around Newfoundland with large and expensive steamships owned by large British and Newfoundland companies based in St. John's.</span><sup class="reference" data-dcnode-id="7232" id="cite_ref-disaster_41-0"><a data-dcnode-id="7233" href="#cite_note-disaster-41"><span data-dcnode-id="7234" instrument_node="">[41]</span></a></sup><span data-dcnode-id="7231" instrument_node=""> Owned at first by the Scottish firm W. Grieve and Sons, she was acquired in 1880 by R. Steele Junior.</span><sup class="reference" data-dcnode-id="7228" id="cite_ref-42"><a data-dcnode-id="7229" href="#cite_note-42"><span data-dcnode-id="7230" instrument_node="">[42]</span></a></sup><span data-dcnode-id="7227" instrument_node="">
</span></p><p data-dcnode-id="7210"><span data-dcnode-id="7225" instrument_node="">Another famous sealing ship of the era was the </span><a data-dcnode-id="7222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terra_Nova_%28ship%29" title="Terra Nova (ship)"><i data-dcnode-id="7223"><span data-dcnode-id="7224" instrument_node="">Terra Nova</span></i></a><span data-dcnode-id="7221" instrument_node="">, originally built in 1884 for the Dundee whaling and sealing fleet. She was ideally suited to the polar regions and worked for 10 years in the annual seal fishery in the </span><a data-dcnode-id="7219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labrador_Sea" title="Labrador Sea"><span data-dcnode-id="7220" instrument_node="">Labrador Sea</span></a><span data-dcnode-id="7218" instrument_node="">. Large and expensive ships required major capital investments from British and Newfoundland firms, and shifted the industry from merchants in small outports to companies based in St. John's, Newfoundland. By the late 19th century, the sealing industry in Newfoundland was second in importance only to </span><a data-dcnode-id="7216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cod_fishing_in_Newfoundland" title="Cod fishing in Newfoundland"><span data-dcnode-id="7217" instrument_node="">cod fishing</span></a><span data-dcnode-id="7215" instrument_node="">.</span><sup class="reference" data-dcnode-id="7212" id="cite_ref-43"><a data-dcnode-id="7213" href="#cite_note-43"><span data-dcnode-id="7214" instrument_node="">[43]</span></a></sup><span data-dcnode-id="7211" instrument_node="">
