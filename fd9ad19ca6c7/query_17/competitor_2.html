-dcnode-id="3206" instrument_node="">Purpose of shipment;</span></li><li data-dcnode-id="3203"><span data-dcnode-id="3204" instrument_node="">Results of required testing (species dependant).</span></li></ol><div data-dcnode-id="3187"><span data-dcnode-id="3201" instrument_node="">4. Duties of Carriers -</span><br data-dcnode-id="3200"><p data-dcnode-id="3198"><span data-dcnode-id="3199" instrument_node="">A. Owners and operators of private and common carriers, trucks and other conveyances are forbidden to move any livestock into, or through this state except in compliance with provisions set forth in these regulations.</span></p><p data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">B. All railway cars, trucks, and other conveyances used for the transportation of livestock and poultry shall be maintained in a sanitary condition.</span></p><p data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">C. Any carrier failing to comply with any of the provisions of this regulation, or interfering with any duly appointed representative of the Mississippi Board of Animal Health or USDA in the discharge of his duty, or having discharged of his duties, shall be deemed guilty of a misdemeanor and shall be punished as authorized in Sections 69-15-9, 69-15-111, and 69-15-331 of the Mississippi Code, Annotated. (et. seq. 1972)</span></p><p data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">5. Health Certificates -</span></p><p data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">A. Licensed graduate accredited Veterinarians, or Veterinarians regularly employed by the state of origin, or Veterinary Services division of APHIS, USDA are authorized to inspect and issue official health certificates on livestock entering&nbsp;Mississippi.</span></p><p data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">B. All livestock entering Mississippi must be accompanied by an official health certificate, except livestock consigned to slaughtering establishments under State or Federal supervision accompanied by a USDA permit (VS Form 1-27), waybills, bills of lading or certificate of ownership. All tested cattle entering on a health certificate, other than cattle to slaughter, must be individually identified.</span></p></div></blockquote><p data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">Citation:&nbsp;MISS. CODE ANN. §49-8-5 and&nbsp;MISS. CODE ANN. §49-8-7; Mississippi Board of Animal Health</span></p><p data-dcnode-id="3182"><br data-dcnode-id="3183"></p></div></div></div><div data-dcnode-id="1560" id="webs-bin-570715c70cf28c869daeba12"><div data-dcnode-id="1561"><div data-dcnode-id="1562"><p data-dcnode-id="3176"><span class="" data-dcnode-id="3177" style="color: rgb(22, 114, 219);"><span data-dcnode-id="3178" instrument_node="">MISSOURI</span></span></p><p data-dcnode-id="3170"><span class="wz-bold" data-dcnode-id="3174"><span data-dcnode-id="3175" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">To put it simply: </span></span><span data-dcnode-id="3171" instrument_node="">yes, foxes are legal in Missouri.</span></p><p data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="3163"><li data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">A Wildlife Hobby permit is required for personal use, while a Class I Wildlife Breeder permit is required for breeding.</span></li><li data-dcnode-id="3164"><span data-dcnode-id="3165" instrument_node="">Red foxes (Vulpes vulpes) and gray foxes (Urocyon cinereoargenteus) must be kept outside in a kennel and are not allowed inside ?within a residence or inhabited dwelling.?</span></li></ul><p data-dcnode-id="3161"><span data-dcnode-id="3162" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="3086"><p data-dcnode-id="3159"><span data-dcnode-id="3160" instrument_node="">3 CSR 10-9.105 General Provisions</span></p><p data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">PURPOSE: This rule establishes general provisions for the chapter, to be consistent with the format of other chapters.&nbsp;</span></p><p data-dcnode-id="3155"><span data-dcnode-id="3156" instrument_node="">(1) Any person holding wildlife in captivity in any manner shall have in his/her possession the prescribed permit or evidence of exemption. Renewal of permits is conditioned on compliance with provisions of this Code.</span></p><p data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">(2) Confined wildlife held under permit within the provision of this chapter shall include only those species listed on the following Approved Confined Wildlife Species List:</span></p><p data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">Species Code No. - Common Name - Scientific Name</span></p><p data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">Class I Wildlife Breeders</span></p><p data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">Mammals</span></p><p data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;Fox, Gray&nbsp;/&nbsp;Urocyon cinereoargenteus</span></p><p data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;Fox, Red /&nbsp;Vulpes vulpes</span></p><p data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">Wildlife Hobby</span></p><p data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;Fox, Gray /&nbsp;Urocyon cinereoargenteus</span></p><p data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;Fox, Red /&nbsp;Vulpes vulpes</span></p><p data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">?</span></p><p data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">3 CSR 10-9.220 Wildlife Confinement&nbsp;Standards</span></p><p data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">PURPOSE: This rule establishes standards to be followed by those holding wildlife in captivity to assure the animals are confined in humane and sanitary conditions and in ways that prevent escape.</span></p><p data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">(1) Cages, pens or other enclosures for confining wild animals shall be well braced, securely fastened to the floor or ground, covered with a top as required and constructed with material of sufficient strength to prevent escape. Animals may not be released to the wild and must be confined at all times in cages, pens or enclosures except in lead or drag races or birds held under a falconry permit or as otherwise permitted in this chapter. Except for unweaned young, Class II wildlife and bobcat, American badger, coyote, red fox and gray fox may not roam freely anywhere within a residence or inhabited dwelling. The following requirements shall be met:</span></p><p data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">(A) Clean drinking water shall be available in adequate amounts at all times. Semiaquatic animals, such as beaver and muskrat, shall be provided a pool of sufficient water depth for the animal to completely submerge.</span></p><p data-dcnode-id="3125"><span data-dcnode-id="3126" instrument_node="">(B) A shelter shall be provided for security and protection from inclement weather. Shade or an overhead structure shall be provided in warm seasons.</span></p><p data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">© Captive wildlife shall be fed daily or as required with a diet appropriate to the species and the age, size and condition of the animal. Feeding containers shall be kept clean and uneaten food removed within a reasonable time.</span></p><p data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">(D) Animal wastes shall be removed daily and disposed of properly. If bedding is provided, it shall be cleaned out and replaced every two (2) weeks.</span></p><p data-dcnode-id="3119"><span data-dcnode-id="3120" instrument_node="">?</span></p><p data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">(2) Cages, pens or other enclosures for Class I wildlife shall meet the following standards:</span></p><p data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">Species - Enclosure Space (sq. ft.) - Space Per Each Additional Animal (sq. ft) ? Enclosure Height (ft.)</span></p><p data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node="">(G) Gray Fox &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; 40 &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; 8 &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; 5</span></p><p data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">(O) Red Fox &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;40 &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; 8 &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;5</span></p><p data-dcnode-id="3109"><span data-dcnode-id="3110" instrument_node="">(3) Cages, pens or other enclosures for confining Class II wildlife shall be constructed to prevent direct physical contact with the public. At a minimum, this may be accomplished by a secondary barrier of wire mesh no smaller than eleven and one-half (11 ½) gauge with openings of no more than nine (9) square inches, with a minimum distance of three feet (3?) between animal cage and public and a minimum height of six feet (6?). Doors shall remain locked at all times with appropriate locks and chains. Enclosures shall be constructed with a den, nest box or connected housing unit that can be closed off and locked with the animal inside, or be divided cage with a door between the compartments, to allow servicing and cleaning. The enclosure mesh size or spacing of bars shall be sufficient to prevent escape. A barrier system of wet or dry moats or structures, as approved by the American Association of Zoological Parks and Aquariums, will meet these requirements.</span></p><p data-dcnode-id="3107"><span data-dcnode-id="3108" instrument_node="">(A) Class II wildlife shall be confined in cages, pens, enclosures or in buildings of sufficient strength with restraints affixed to all windows, doors or other means of entry or exit. </span></p><p data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">(B) Cages, pens or other enclosures for Class II wildlife shall meet the standards outlined in Appendix A of this rule, which is included herein.</span></p><p data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">?</span></p><p data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">3 CSR 10-9.350 Class I Wildlife Breeder Permit</span></p><p data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">PURPOSE: This rule establishes a permit for wildlife breeders.</span></p><p data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">To exercise the privileges of a Class I wildlife breeder. Fee: fifty dollars ($50).</span></p><p data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">?</span></p><p data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">3 CSR 10-9.420 Wildlife Hobby Permit</span></p><p data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">PURPOSE: This rule establishes a permit to possess certain forms of wildlife for personal use but not for sale.</span></p><p data-dcnode-id="3089"><span data-dcnode-id="3090" instrument_node="">(1) A wildlife hobby permit authorizes the holder to purchase, possess and propagate not more than fifty (50) ring-necked pheasants and bobwhite quail, in the aggregate, for personal use only and not for sale; and to hold in captivity not more than one (1) game mammal purchased from a Missouri wildlife breeder permit holder, except that Class II wildlife, hoofed mammals and skunks may not be held under this permit. Game mammals may be held in captivity but may not be propagated or sold. This permit shall be obtained prior to receipt of wildlife. The permittee must furnish proof that game mammals and birds were legally obtained. Wildlife must be confined in humane and sanitary facilities that meet standards specified in 3 CSR 10-9.220. Wildlife may be disposed of only in accordance with instructions of an agent of the department but may not be released, sold or given away. The permittee is subject to all provisions of section 578.023,</span></p><p data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">(2) Banded birds possessed under this permit may be temporarily released and recaptured when training dogs. Any device used to recapture birds in accordance with this provision must be labeled with the user?s full name, address and wildlife hobby permit number and be attended daily. Fee: ten dollars ($10).</span></p></blockquote><p data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node="">Citation: 3 CSR 10-9.105,&nbsp;3 CSR 10-9.220, 3 CSR 10-9.350,&nbsp;3 CSR 10-9.420</span></p><p data-dcnode-id="3081"><span class="wz-bold" data-dcnode-id="3082"><br data-dcnode-id="3083"></span></p><p data-dcnode-id="3078"><span class="wz-bold" data-dcnode-id="3079" style="color: rgb(22, 114, 219);"><span data-dcnode-id="3080" instrument_node="">MONTANA</span></span></p><p data-dcnode-id="3072"><span class="wz-bold" data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="3074"><span data-dcnode-id="3075" instrument_node="">To put it simply:</span></span><span data-dcnode-id="3073" instrument_node=""> no, foxes are not legal in Montana.</span></p><p data-dcnode-id="3070"><span data-dcnode-id="3071" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="3067"><li data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">Foxes of the Genus&nbsp;Vulpes&nbsp;are explicitly banned. It may be possible to own a fox of a different Genus; examples: gray fox (Urocyon cinereoargenteus), bat eared fox (Otocyon megalotis), et cetera.</span></li></ul><p data-dcnode-id="3065"><span data-dcnode-id="3066" instrument_node="">The legal jargon:&nbsp;</span></p><blockquote data-dcnode-id="2995"><p data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">Prohibited species&nbsp;are live, exotic wildlife species, subspecies, or hybrid of that species, including viable embryos or gametes, that may not be possessed, sold, purchased, exchanged, or transported in Montana, except as provided in&nbsp;MCA 87-5-709 or ARM 12.6.2220.</span></p><p data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">?</span></p><p data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">Mammals</span></p><ul class="style-circle" data-dcnode-id="2996"><li data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">Addax (Addax nasomaculatus)</span></li><li data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">Apes (Pongidae family)</span></li><li data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">Axis deer (Axis axis)</span></li><li data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">Barbary sheep or Auoudad (Ammotragus lervia)</span></li><li data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">Bats (Sub order microchioptera)</span></li><li data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node="">Brushed-tailed possum (Trichosurus vulpecula)</span></li><li data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">Chamois (Rudicapra sp.)</span></li><li data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">Collared peccary (javelina) (Tayassu tajacu)</span></li><li data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">Exotic goats and Ibexes&nbsp;(All species in the genus Capra except domestic goats, Capra hircus)</span></li><li data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">Foxes (Vulpes sp.)</span></li><li data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">Gibbons (primates in the family Hylobatidae)</span></li><li data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">Hyena (Hyaenidae family)</span></li><li data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">Mouflon sheep (Ovis musimon)</span></li><li data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">New World Primates (Cebidae family)</span></li><li data-dcnode-id="3029"><span data-dcnode-id="3030" instrument_node="">Nutria (Myocastor coypus)</span></li><li data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">Old World Monkeys (Cercopithecidae family)</span></li><li data-dcnode-id="3025"><span data-dcnode-id="3026" instrument_node="">Oryx and Gemsbok (Oryx besia, Oryx dammah, Oryx gazella, Oryx leucoryx)</span></li><li data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">Raccoons (Procyon sp.)</span></li><li data-dcnode-id="3021"><span data-dcnode-id="3022" instrument_node="">Reedbucks (Redunca sp.)</span></li><li data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">Red deer (Cervus elaphus)</span></li><li data-dcnode-id="3017"><span data-dcnode-id="3018" instrument_node="">Roe deer (Capreolus capreolus and Capreolus pygarus)</span></li><li data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">Rusa deer (Cervus timorensis)</span></li><li data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">Russian boar, European boar, and hybrids thereof (Sus scrofa scrofa)</span></li><li data-dcnode-id="3011"><span data-dcnode-id="3012" instrument_node="">Sambar deer (Cervus unicolor)</span></li><li data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">Short-tailed opossum (Monodelphis domestica)</span></li><li data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">Sika deer (Cervus nippon)</span></li><li data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">Skunks (Genus Spilogale, Conepatus, and Methitis)</span></li><li data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">Small spotted Genet (Genetta genetta)</span></li><li data-dcnode-id="3001"><span data-dcnode-id="3002" instrument_node="">Southern flying squirrel (Glaucomys volans)</span></li><li data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">Tahr (Hemitragus sp.)</span></li><li data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">Virginia opossum or North American Opossum (Didephis virginiana)</span></li></ul></blockquote><p data-dcnode-id="2991"><span data-dcnode-id="2994" instrument_node="">Citation: </span><a data-dcnode-id="2992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.umblr.com/redirect%3Fz%3Dhttp%253A%252F%252Ffwp.mt.gov%252FfishAndWildlife%252Flicenses%252Fprohibited.html%26t%3DMTI2YWU0NjZmNzNjN2Y4ODI5MTlmYTM1M2ZmYzI3ZTRiNDllNzM1ZSw5ZmIwZ2M3bA%253D%253D" id="5DBD519F-BA27-4A20-B5A1-F5A86657B666"><span data-dcnode-id="2993" instrument_node="">Montana Fish, Wildlife &amp; Parks</span></a></p><p data-dcnode-id="2989"><br data-dcnode-id="2990"></p><p data-dcnode-id="2986"><span class="wz-bold" data-dcnode-id="2987" style="color: rgb(22, 114, 219);"><span data-dcnode-id="2988" instrument_node="">NEBRASKA</span></span></p><p data-dcnode-id="2980"><span class="wz-bold" data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">To put it simply:</span></span><span data-dcnode-id="2981" instrument_node=""> yes, foxes are legal in Nebraska.</span></p><p data-dcnode-id="2978"><span data-dcnode-id="2979" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="2975"><li data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">A Captive Wildlife Permit is required to own a fox.</span></li></ul><p data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="2915"><p data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">Captive Wildlife Permits and Regulations</span></p><p data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">A CAPTIVE WILDLIFE PERMIT IS REQUIRED ON THE BIRDS AND ANIMALS LISTED IN THE TABLE BELOW INCLUDING EGGS FROM THESE SPECIES:&nbsp;</span></p><ul class="style-circle" data-dcnode-id="2920"><li data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">Badger</span></li><li data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node="">Beaver</span></li><li data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">Bobcat**</span></li><li data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">Lynx**</span></li><li data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">Fox ? Gray, Red</span></li><li data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">Mink ? except mutation</span></li><li data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">Muskrat</span></li><li data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">Opossum</span></li><li data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">Raccoon</span></li><li data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">River Otter</span></li><li data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">Weasel ? Long-tailed</span></li><li data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">Squirrel ? Fox, Gray, Flying</span></li><li data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">Cottontail Rabbit</span></li><li data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node="">Sheep ? Bighorn (restricted in Banner, Box, Cheyenne, Dawes, Kimball, Morrill, Scotts Bluff, Sheridan and Sioux counties)</span></li><li data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">Partridge ? Hungarian, Chukar</span></li><li data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node="">Pheasant ? Ring neck or Common Pheasant</span></li><li data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">Quail ? Bobwhite</span></li><li data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">Swan ? Trumpeter, Tundra*</span></li><li data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">Crows</span></li><li data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">Ducks*</span></li><li data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">Geese (Wild Geese: Blue, Snow, Canada, White-front, Ross, Brant, Etc.)</span></li><li data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">Grouse ? Sharp-tail, Prairie Chicken</span></li><li data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">Turkey ? All wild species</span></li><li data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">Migratory ? All species protected by Migratory Bird Treaty Act.*</span></li></ul><p data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">* = Federal permit required in addition to state permit.</span></p><p data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">** = For commercial purposes only.</span></p></blockquote><p data-dcnode-id="2911"><span data-dcnode-id="2914" instrument_node="">Citation: </span><a data-dcnode-id="2912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.umblr.com/redirect%3Fz%3Dhttp%253A%252F%252Foutdoornebraska.ne.gov%252Fwildlife%252Fwildlife_species_guide%252Fcaptive_regulations.asp%26t%3DODVlYzczMzMyYmIzZGQ2OTYwYmU4NmZkNDU4NjI3ZTZmYzhkNzQ2OSxtR3NlRVM3VA%253D%253D" id="D2E23373-722B-4282-B912-332673EB8733"><span data-dcnode-id="2913" instrument_node="">Nebraska Game &amp; Parks</span></a></p><p data-dcnode-id="2909"><br data-dcnode-id="2910"></p><p data-dcnode-id="2906"><span class="wz-bold" data-dcnode-id="2907" style="color: rgb(22, 114, 219);"><span data-dcnode-id="2908" instrument_node="">NEVADA</span></span></p><p data-dcnode-id="2902"><span class="wz-bold" data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node=""> To put it simply: </span></span><span data-dcnode-id="2903" instrument_node="">no, foxes are not legal in Nevada.</span></p><p data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="2829"><p data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">NAC?503.110??Restrictions on importation, transportation and possession of certain species.</span></p><p data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">1. Except as otherwise provided in this section and NAC 504.486, the importation, transportation or possession of the following species of live wildlife or hybrids thereof, including viable embryos or gametes, is prohibited:</span></p><p data-dcnode-id="2894"><span data-dcnode-id="2895" instrument_node="">?</span></p><p data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">(d) Mammals:</span></p><p data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">(1) Wild Dogs or Dhole</span></p><p data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">(2) Raccoon Dog</span></p><p data-dcnode-id="2886"><span data-dcnode-id="2887" instrument_node="">(3) Mongooses and Meerkats</span></p><p data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">(4) Wild European Rabbit</span></p><p data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">(5) Multimammate Rat or Mouse</span></p><p data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">(6) Bats</span></p><p data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">(7) Nutria</span></p><p data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">(8) Coyote</span></p><p data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">(9) Foxes (All species in the genera Vulpes, Fennecus, Urocyon, Alopex, Lycalopex and Pseudalopex)</span></p><p data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">(10) Raccoon</span></p><p data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">(11) Skunk</span></p><p data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">(12) Wild pigs and hogs</span></p><p data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">(13) Axis deer</span></p><p data-dcnode-id="2864"><span data-dcnode-id="2865" instrument_node="">(14) Red deer, elk and wapiti</span></p><p data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">(15) Rusa deer</span></p><p data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">(16) Sambar Deer</span></p><p data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">(17) Sika deer</span></p><p data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">(18) Roe deer</span></p><p data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">(19) White-tailed deer</span></p><p data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">(20) Moose</span></p><p data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">(21) Reedbucks</span></p><p data-dcnode-id="2848"><span data-dcnode-id="2849" instrument_node="">(22) Oryx and Gemsbok</span></p><p data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node="">(23) Addax</span></p><p data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">(24) Blesbok, Topi and Bontebok</span></p><p data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">(25) Hartebeests</span></p><p data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">(26) Wildebeest and Gnus</span></p><p data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">(27) Chamois</span></p><p data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">(28) Tahr</span></p><p data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">(29) Ibex, Wild Goats, Tur and Markhor</span></p><p data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">(30) barbary (Aoudad) Sheep</span></p><p data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">(31) Mouflon sheep, Urial, Bighorn and Argali</span></p></blockquote><p data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">Citation: NAC?503.110</span></p><p data-dcnode-id="2825"><br data-dcnode-id="2826"></p><p data-dcnode-id="2822"><span class="wz-bold" data-dcnode-id="2823" style="color: rgb(22, 114, 219);"><span data-dcnode-id="2824" instrument_node="">NEW HAMPSHIRE</span></span></p><p data-dcnode-id="2816"><span class="wz-bold" data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">To put it simply:&nbsp;</span></span><span data-dcnode-id="2817" instrument_node="">no, foxes are not legal in New Hampshire.</span></p><p data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="2811"><li data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">Foxes are a controlled species in New Hampshire and require a permit. Permits for foxes are category 5 and the&nbsp;permittee must be an exhibitor.</span></li></ul><p data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="2768"><p data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">Fis 802.01 Permittee Categories.</span></p><p data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">(a) For purposes of this chapter the permittee categories shall be as follows:</span></p><p data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">(1) An individual person shall be permittee category 1;</span></p><p data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">(2) A propagator shall be permittee category 2;</span></p><p data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">(3) An individual training and shooting permittee shall be category 3.</span></p><p data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">(4) The person operating a regulated shooting area shall be permittee category 4;</span></p><p data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">(5) An exhibitor shall be permittee category 5; and</span></p><p data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">(6) An aquaculturist shall be permittee category 6;</span></p><p data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">(7) A field trial permittee shall be permittee category 7.</span></p><p data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">?</span></p><p data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">Fis 804.05 Controlled Species - Possession.</span></p><p data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">(a) A permit to possess wildlife shall be required for all species, including hybrids, designated as controlled as cited in the controlled table under (b), below.</span></p><p data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">(b) A permit shall be issued only to a person in the permittee category(ies), as defined in Fis 802.01, and cited Table 800.2:</span></p><p data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">Table 800.2 Controlled Species Table ? Possession</span></p><p data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">Mammals</span></p><p data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">PERMITTEE CATRGORY - / - SPECIES - / - SCIENTIFIC NAME</span></p><p data-dcnode-id="2773"><span data-dcnode-id="2776" instrument_node="">?</span><br data-dcnode-id="2775"><span data-dcnode-id="2774" instrument_node="">5 - / - Fox, Gray Fennec - / - Urocyon cinereoargenteus</span></p><p data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">5 - / - Fox, Red - / - Vulpes vulpes</span></p><p data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">?</span></p></blockquote><p data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">Citation:&nbsp;N.H. Code Admin. R. Fis 802.1 and 804.05</span></p><p data-dcnode-id="2764"><br data-dcnode-id="2765"></p><p data-dcnode-id="2761" style="color: rgb(22, 114, 219);"><span class="wz-bold" data-dcnode-id="2762" style="color: rgb(22, 114, 219);"><span data-dcnode-id="2763" instrument_node="">NEW&nbsp;JERSEY</span></span></p><p data-dcnode-id="2755"><span class="wz-bold" data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">To put it simply</span></span><span data-dcnode-id="2756" instrument_node="">: no, foxes are not legal in New Jersey.</span></p><p data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="2750"><li data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">Foxes are a potentially dangerous species and permits are not given for hobby and pet purposes.</span></li></ul><p data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="2690"><p data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">7:25-4.7 General possession criteria</span></p><p data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">(a) Prior to the issuance of any permit permitted by these regulations, every applicant shall, in forms provided by the Department, demonstrate that:</span></p><p data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">1. The animal will be fed an adequate diet; and</span></p><p data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">2. The animal is housed or caged in a manner that:</span></p><p data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">i. Allows the animal to perform the normal behavior patterns of its species; and</span></p><p data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">ii. Prevents disease, liberation or accidental injury to the animal and the public, and</span></p><p data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">3. The method of acquisition did not violate the laws and regulation of this state, any other state or the Federal Government; and</span></p><p data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">4. The animal shall receive prompt treatment for any illness or injury from a licensed veterinarian; and</span></p><p data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">5. The animal is free of infectious diseases and parasites which may be dangerous to the animal, livestock or people of the state, provided that the Division may request certification that the animal for which the permit is being sought is free from infectious diseases and parasites from a licensed New Jersey veterinarian or a person recognized as qualified to make such certification by the Director of Fish and Wildlife.</span></p><p data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">7:25-4.8 Potentially dangerous species</span></p><p data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">(a) ?Potentially dangerous species? is defined as any exotic mammals, birds, reptiles or amphibians, or nongame species which, in the opinion of the Division, is capable of inflicting serious or fatal injuries or which has the potential to become an agricultural pest, or a menace to the public health or indigenous wildlife populations, including, but not limited to the following:</span></p><p data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">CLASS/ORDER FAMILY</span></p><ul class="style-circle" data-dcnode-id="2709"><li data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">Primates (Cebidae ? New World Monkeys; Cercophithecidae ? Old World Monkeys; Baboons; Pongidae ? Apes)</span></li><li data-dcnode-id="2720"><span data-dcnode-id="2721" instrument_node="">Carnivora (Canidae ? Nondomestic dogs; Ursidae ? Bears; Felidae ? Nondomestic cats)</span></li><li data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">Saura [Venomous] (Helodermatidae ? Gila monsters)</span></li><li data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">Serpentes [Venomous] (Elapidae ? Coral snakes and cobras; Viperidae ? Vipers; Crotalidae ? Pit Vipers)</span></li><li data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">Crocodilia (Alligatoridae ? Alligators and caiman; Crocodylidae ? crocodiles; Gavialidae - gavials)</span></li><li data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">Psittaciformes (Psittaculis spp. ? Ring-necked parakeets; Myiopsitta spp. ? Monk (Quaker) parakeets; Cyanoliseus patagonus ? Patagonian Conures)</span></li><li data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">Rodentia (Cynomys spp. ? Prairie dogs; Spermophilus spp. ? Ground squirrels)</span></li></ul><p data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">(b) The Department, in its discretion, may issue a permit for possession of a potentially dangerous species only after a clear showing that the criteria for the possession of such potentially dangerous species have been met.</span></p><p data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">7:25-4.9 Criteria for the possession of potentially dangerous species</span></p><p data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">(a) In addition to the general criteria enumerated above in section 7:25-4.7, every person applying for a permit to possess potentially dangerous species shall meet each and every of the following criteria to the satisfaction of the Division:</span></p><p data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">1. Education and Background: Persons wishing to apply for a permit to possess a potentially dangerous species must have extensive experience in maintaining the species desired or related species.</span></p><p data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">2. Knowledge: Persons wishing to apply for a permit to possess potentially dangerous species must demonstrate a working knowledge and expertise in handling and caring for each of the species desired.</span></p><p data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">3. Protection of the Public: The housing facilities shall also be constructed to prevent public access to and contact with the animal. The potentially dangerous species shall not be kept as a pet, for hobby purposes or in situations, which, in the judgment of the Department, could adversely affect the health of the animal or which could constitute a hazard to the public.</span></p><p data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">4. Purpose and Intent: Persons applying to possess potentially dangerous species must submit a written statement of the purpose and intent of keeping the species.</span></p><p data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">5. Housing and Feeding: Persons applying for a permit to possess a potentially dangerous species must supply a written description of the housing and caging facilities for the species required. A summary must be submitted of a continuous source of food for the specific diet of the animals. Division personnel may inspect the completed facilities to determine if the facilities are suitable for the animal. Facilities must be constructed to prevent the possible escape of the animal.</span></p><p data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">6. Other Restrictions: Under no circumstances shall a person issued a pet shop or animal dealer permit possess any potentially dangerous species on the commercial premises, except in emergencies and for a limited period of time as stipulated by the Department in writing and subsequently agreed to by the animal dealer or pet shop owner, who shall assume full responsibility for the safety and welfare of both the animal and the public during its temporary storage. A potentially dangerous animal already on display at the premises of a pet shop or animal dealer and already under a permit for such display as of January 17, 1995 may remain so displayed under the terms and conditions of that permit for the lifetime of that animal.</span></p></blockquote><p data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">Citation:&nbsp;NJR&nbsp;7:25-4.7,&nbsp;7:25-4.8,&nbsp;7:25-4.9</span></p><p data-dcnode-id="2686"><br data-dcnode-id="2687"></p><p data-dcnode-id="2679"><span class="" data-dcnode-id="2683"><span class="wz-bold" data-dcnode-id="2684" style="color: rgb(22, 114, 219);"><span data-dcnode-id="2685" instrument_node="">NEW&nbsp;</span></span></span><span class="" data-dcnode-id="2680"><span class="wz-bold" data-dcnode-id="2681" style="color: rgb(22, 114, 219);"><span data-dcnode-id="2682" instrument_node="">MEXICO</span></span></span></p><p data-dcnode-id="2673"><span class="wz-bold" data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">To put it simply: </span></span><span data-dcnode-id="2674" instrument_node="">no, foxes are not legal in New Mexico.</span></p><p data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="2668"><li data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">Foxes are not allowed to be imported into New Mexico for pet purposes. There are no breeders within the state.</span></li></ul><p data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="2631"><p data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">Pursuant to regulation (19 NMAC 35.7) the species importation list shall be maintained,&nbsp;updated or amended by the Director as species information and concerns are identified.</span></p><p data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">The list contains a variety of species for quick reference and public awareness.</span></p><p data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">Each importation group is represented by a roman numeral in the ?Group? column.</span></p><p data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">Importation groups are defined as follows:</span></p><p data-dcnode-id="2654"><span data-dcnode-id="2657" instrument_node="">Group I - Species importation list group I are designated semi-domesticated animals and do not require&nbsp;</span><br data-dcnode-id="2656"><span data-dcnode-id="2655" instrument_node="">an importation permit;</span></p><p data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">Group II - Species importation list group II may be for live non-domesticated animals that are not known to be either invasive or dangerous and do not present a known risk to the health, safety or well-being of the public, domestic livestock or to native wildlife and their habitats.</span></p><p data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">Group III - Species importation list group III may be for live non-domesticated animals that present minimal or manageable concerns that will require specific provisions that must be met prior to issuing an importation permit to address health, safety or well-being of the public, domestic livestock or to native wildlife and their habitats.</span></p><p data-dcnode-id="2648"><span data-dcnode-id="2649" instrument_node="">Group IV - Species importation list group IV may be for live non-domesticated animals that are considered dangerous, invasive, undesirable, state or federal listed threatened, endangered, a furbearer or any other species of concern as identified by the director. The importation of these species are prohibited for the general public but may be allowed for, scientific study, department approved restoration and recovery plans, zoological display, temporary events/entertainment, use as service animal or by a qualified expert.</span></p><p data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">Note: any species of live non-domesticated animal not currently on the species importation list will be designated group IV until such time as another determination is made by the director.</span></p><p data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">?</span></p><p data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">CLASS - QUICK REFERENCE - FAMILY - SCIENTIFIC NAME - COMMON NAME - GROUP</span></p><p data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">?</span></p><p data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">Mammal - Dog, wild - Canidae -&nbsp;Canis simensis - Fox, Simien - IV</span></p><p data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">Mammal - Dog, wild - Canidae -&nbsp;Lycalopex sp. - Fox, South American - IV</span></p><p data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">Mammal - Dog, wild - Canidae -&nbsp;Urocyon littoralis - Fox, Island - IV</span></p><p data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">Mammal - Dog, wild - Canidae -&nbsp;Vulpes (sp.variety) - Fox (any type) - IV</span></p></blockquote><p data-dcnode-id="2627"><span data-dcnode-id="2630" instrument_node="">Citation: </span><a data-dcnode-id="2628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.umblr.com/redirect%3Fz%3Dhttp%253A%252F%252Fwww.wildlife.state.nm.us%252Fapps_permit%252Fdocuments%252Fimportation%252FDIRECTORSIMPORTLISTAUGUST32010.pdf%26t%3DZjA0YTU4ZTcxNTc4OGRlNjRmY2I1NjRkYjcwOGEyNDFkNWY5NTliZSxKcXpiVTNkcQ%253D%253D" id="9B975D56-910F-4539-8997-7487484713AC"><span data-dcnode-id="2629" instrument_node="">New Mexico Department of Game &amp; Fish - Director?s Species Importation List</span></a></p><p data-dcnode-id="2625"><br data-dcnode-id="2626"></p><p data-dcnode-id="2622"><span class="wz-bold" data-dcnode-id="2623" style="color: rgb(22, 114, 219);"><span data-dcnode-id="2624" instrument_node="">NEW&nbsp;YORK</span></span></p><p data-dcnode-id="2616"><span class="wz-bold" data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">To put it simply: </span></span><span data-dcnode-id="2617" instrument_node="">no, most foxes are not legal in New York.</span></p><p data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="2611"><li data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">Fennec foxes (Vulpes zerda) are the only species of fox that are allowed in the state of New York.</span></li></ul><p data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="2512"><p data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">§ 11-0103. Definitions</span></p><p data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">As used in the Fish and Wildlife Law:</span></p><p data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">?</span></p><p data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">e. ?Wild animal? shall not include ?companion animal? as defined in section three hundred fifty of the agriculture and markets law. Wild animal includes, and is limited to, any or all of the following orders and families:</span></p><p data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">(1) Nonhuman primates and prosimians,</span></p><p data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">(2) Felidae and all hybrids thereof, with the exception of the species Felis catus (domesticated and feral cats, which shall mean domesticated cats that were formerly owned and that have been abandoned and that are no longer socialized, as well as offspring of such cats) and hybrids of Felis catus that are registered by the American Cat Fanciers Association or the International Cat Association provided that such cats be without any wild felid parentage for a minimum of five generations,</span></p><p data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">(3) Canidae (with the exception of domesticated dogs and captive bred fennec foxes (vulpes zerda)),</span></p><p data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">(4) Ursidae,</span></p><p data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">(5) All reptiles that are venomous by nature, pursuant to department regulation, and the following species and orders: Burmese Python (Python m. bivittatus), Reticulated Python (Python reticulatus), African Rock Python (Python sabae), Green Anaconda (Eunectes maurinus), Yellow Anaconda (Eunectes notaeus), Australian Amethystine Python (Morelia amethistina and Morelia kinghorni), Indian Python (Python molurus), Asiatic (water) Monitor ( Varanus salvator), Nile Monitor ( Varanus nilocitus), White Throat Monitor ( Varanus albigularis), Black Throat Monitor ( Varanus albigularis ionides) and Crocodile Monitor ( Varanus salvadori), Komodo Dragon (Varanus komodensis) and any hybrid thereof,</span></p><p data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">(6) Crocodylia.</span></p><p data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">?</span></p><p data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">§ 11-0512. Possession, sale, barter, transfer, exchange and import of wild animals as pets prohibited</span></p><p data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">1. It shall be prohibited for any person to:</span></p><p data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">a. knowingly possess, harbor, sell, barter, transfer, exchange or import any wild animal for use as a pet in New York state, except as provided in subdivision three of this section; or</span></p><p data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">b. intentionally release or set at-large any wild animal, authorized by this section for use as a pet, from the location where the animal is permitted to be possessed or harbored.</span></p><p data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">2. This section shall not apply to the following persons and entities with respect to wild animals owned or harbored by them solely for a purpose other than for use as a pet:</span></p><p data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">a. Zoological facilities licensed pursuant to 7 USC. Sec. 2131 et seq.;</span></p><p data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">b. Exhibitors licensed pursuant to the Animal Welfare Act, 7 USC. Sections 2132-2134 and reptile exhibitors who have demonstrated to the department, in accordance with regulations promulgated by the commissioner, that the sole purpose for which the wild animal or animals are used is for exhibition to the public for profit or compensation;</span></p><p data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">c. Research facilities as defined in the Animal Welfare Act, 7 USC. Section 2132 (e), which are licensed by the United States Secretary of Agriculture;</span></p><p data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">d. Licensed veterinarians and incorporated humane societies, animal shelters, societies for the prevention of cruelty to animals or animal welfare organizations in temporary possession of wild animals;</span></p><p data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">e. State universities, private colleges or universities, or state agencies working with wild animals;</span></p><p data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">f. Wildlife rehabilitators licensed pursuant to the provisions of subdivision three of section 11-0515 of this title and regulations promulgated thereunder, who are tending to sick or injured wild animals;</span></p><p data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">g. A person having custody of a wild animal solely for the purpose of transporting it to a licensed veterinarian, wildlife rehabilitator, humane society or other entity authorized by this section to handle or treat wild animals;</span></p><p data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">h. A wildlife sanctuary as defined in subdivision thirty-two of section 11-0103 of this article;</span></p><p data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">i. A person who is not a resident of this state who is in the state only for the purpose of travelling between locations outside the state. In no event shall this time period exceed ten days;</span></p><p data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">j. A person who is paralyzed from the neck down who possesses a new world monkey trained to perform tasks for its owner by an organization described in section 501© of the Internal Revenue Code of 19861 and dedicated to improving the quality of life of persons paralyzed from the neck down.</span></p><p data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">3. Any person who possesses or harbors a wild animal for use as a pet at the time that this section takes effect may retain possession of such animal for the remainder of its life, provided that such person:</span></p><p data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">a. Has not been convicted of any offense relating to cruelty to animals or under a judicial order prohibiting possession of animals;</span></p><p data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">b. Applies to the department within six months of the effective date of this section, and obtains from the department, a license pursuant to subdivision four of this section;</span></p><p data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">c. Complies with all applicable federal, state, or local laws, including any ordinance, rule or regulation adopted by a local board of health, or any rules and regulations established by the department as requisites for ownership of such wild animal; and</span></p><p data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">d. Reports a release to the local police department and animal control immediately upon discovery of the release. Each escape during a twelve month period of time will subject the possessor to penalties by the department pursuant to subdivisions eight and nine of this section.</span></p><p data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">4. The department shall be required to issue licenses authorizing possession of wild animals only to those persons who comply with the provisions of subdivision three of this section and with any regulations promulgated by the department thereunder. Such licenses shall be valid in any jurisdiction within the state where possession of a wild animal is not prohibited by local law or ordinance, rule or regulation adopted by a local board of health, and shall be renewable biennially during the life of the animal subject to continued compliance with the provisions of this section and with any regulations promulgated thereunder. The department shall forward copies of such licenses to the clerk of the city, town or village in which each wild animal is harbored.</span></p><p data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">a. License applications shall include, but shall not be limited to, the following:</span></p><p data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">(1) The name, address and telephone number of the person who owns, possesses or harbors the wild animal or animals, including an acknowledgment that the person who owns, possesses or harbors the wild animal or animals is twenty-one years of age or older.</span></p><p data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">(2) The address of the location where the wild animal or animals will be kept, if different from the above.</span></p><p data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">(3) A detailed description of each wild animal owned, possessed or harbored, including species, gender, age, any identifying characteristics, and an identification tag or tattoo if required by the department, with proof, acceptable to the department, that each such wild animal was acquired prior to the effective date of this section.</span></p><p data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">(4) The name, address and telephone number of the veterinarian, who has agreed to treat the wild animal.</span></p><p data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">(5) An acknowledgment indicating that the wild animal or animals will not be bred.</span></p><p data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">(6) A detailed certification establishing that the location in which the wild animal will be kept complies with all appropriate standards of care and at minimum complies with the standards for animal care set forth in the Federal Animal Welfare Act and other applicable federal, state and local standards, including, but not limited to housing, temperature, ventilation, drainage, sanitation, food, water, exercise and veterinary care appropriate to the species and sufficient to maintain the wild animal in good health.</span></p><p data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">(7) An acknowledgment that the wild animal will not be tied, tethered, or chained outdoors, allowed to run at large and that the wild animal will not be brought to any public park or commercial or retail establishment unless it is being brought to a veterinarian or veterinary clinic.</span></p><p data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">(8) An acknowledgment that possession, harboring or owning such wild animal does not violate any applicable federal, state or local law, including any ordinance, rule or regulation adopted by a local board of health.</span></p><p data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">b. The department shall set biennial license fees for the possession of wild animals pursuant to subdivision three of this section in an amount determined to be reasonable but not more than one hundred seventy-five dollars for two years for each wild animal. License fees shall be used solely for the implementation and enforcement of this section.</span></p><p data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">5. The provisions of the state administrative procedure act shall apply to the denial or revocation of a license.</span></p><p data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">6. Any person in possession of a wild animal as a pet that has been granted a license pursuant to subdivision four of this section shall not breed, or sell, trade, barter or exchange such wild animal.</span></p><p data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">7. A person possessing, owning or harboring a wild animal who is denied a license pursuant to subdivision four of this section, or whose license is revoked, shall surrender such wild animal to the department or an authorized agent thereof at a location designated by the department for such surrender or a police or peace officer of this state, a local animal control officer, or a duly incorporated society for the prevention of cruelty to animals, or provide proof that the animal has been humanely euthanized according to American Veterinary Medical Association standards by a licensed veterinarian.</span></p><p data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">8. The department, any police or peace officer of this state, a local animal control officer, or a duly incorporated society for the prevention of cruelty to animals is hereby authorized to enforce the provisions of this section and issue notices of violation to persons in violation of this section, and shall have the authority to seize any wild animal held in violation of this section. A county society for the prevention of cruelty to animals must obtain a warrant before seizing a wild animal or arresting a person who owns or possesses a wild animal under this section. Wild animals seized or surrendered pursuant to the provisions of this section shall be transferred to a duly incorporated wildlife sanctuary as defined in this section, or a zoological facility, or shall be humanely euthanized. Any costs associated with seizing, transferring, recapturing or euthanizing a wild animal shall be borne by the person who owned, harbored or possessed the animal. The department shall also have the authority to seek injunctive relief in any court of appropriate jurisdiction to prevent continued violations of this section.</span></p><p data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">9. Notwithstanding any other provision of law, any person who knowingly breeds a wild animal or knowingly possesses, owns, harbors, sells, barters, transfers, exchanges, or imports a wild animal for use as a pet or intentionally releases or sets at-large any wild animal, authorized by this section for use as a pet, from the location where the animal is permitted to be possessed or harbored in violation of the provisions of this section shall be subject to a penalty of not more than five hundred dollars for the first offense and not more than one thousand dollars for a second and subsequent offenses. Each instance of breeding, owning, harboring, sale, barter, release, transfer, exchange, or import of a wild animal in violation of this section shall constitute a separate offense.</span></p><p data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">10. Nothing contained in this section shall prevent any city, town or county from enacting more restrictive provisions governing the possession of wild animals for use as pets.</span></p></blockquote><p data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">Citation: NY ENVIR CONSER § 11-0103,&nbsp;§&nbsp;11-0512</span></p><p data-dcnode-id="2508"><br data-dcnode-id="2509"></p><p data-dcnode-id="2503"><span class="" data-dcnode-id="2504"><span data-dcnode-id="2505" style="color: rgb(22, 114, 219);"><span class="wz-bold" data-dcnode-id="2506" style="color: rgb(22, 114, 219);"><span data-dcnode-id="2507" instrument_node="">NORTH CAROLINA</span></span></span></span></p><p data-dcnode-id="2498"><span data-dcnode-id="2500" style="color: rgb(22, 114, 219);"><span class="wz-bold" data-dcnode-id="2501" style="color: rgb(0, 0, 0);"><span data-dcnode-id="2502" instrument_node="">To put it simply:</span></span></span><span data-dcnode-id="2499" instrument_node=""> yes, foxes appear to be legal in North Carolina.</span></p><p data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">Note:&nbsp;</span></p><ul class="style-circle" data-dcnode-id="2493"><li data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">Possession of live wildlife generally requires a permit or license. Contact the Division of Wildlife Management office at (919) 707-0060 for the appropriate permit or license.</span></li></ul><p data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="2451"><p data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">Definition of Terms</span></p><p data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">To understand the law governing the possession, buying and selling of wildlife, one must know and understand the definitions of certain key terms as they are used in the text of the statutes and rules dealing with this subject. These definitions may vary substantially from common usage. N.C.G.S.&nbsp;ß113-129 lists a number of the basic ones. Those relevant to these subjects are:</span></p><p data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">?</span></p><p data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">4. Game Animals&nbsp;? Bear, fox, rabbit, squirrel, wild boar, and deer, not to include fallow deer raised for production and sale under G.S. 106-549.97; bobcat, opossum, and raccoon except when trapped in accordance with provisions relating to fur-bearing animals.&nbsp;</span></p><p data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">?</span></p><p data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">14. Wild Animals&nbsp;? Game animals; furbearing animals; and all other wild mammals except marine mammals found in coastal fishing waters. In addition, this definition includes members of the following groups which are on the federal list of endangered or threatened species: wild amphibians, wild reptiles except sea turtles inhabiting and depending upon coastal fishing waters, and wild invertebrates except invertebrates declared to be pests under the Structural Pest Control Act of North Carolina of 1955 or the North Carolina Pesticide Law of 1971. Nothing in this definition is intended to abrogate G.S. 113-132©, confer jurisdiction upon the Wildlife Resources Commission as to any subject exclusively regulated by any other agency, or to authorize the Wildlife Resources Commission by its regulations to supersede valid provision of law or regulation administered by any other agency.&nbsp;</span></p><p data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">?</span></p><p data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">16. Wildlife&nbsp;? Wild animals; wild birds; all fish found in inland fishing waters; and inland game fish. Unless the context clearly requires otherwise, the definitions of wildlife, wildlife resources, wild animals, wild birds, fish, and the like are deemed to include species normally wild, or indistinguishable from wild species, which are raised or kept in captivity. Nothing in this definition is intended to abrogate the exclusive authority given the Department of Agriculture to regulate the production and sale of pen-raised quail for food purposes.&nbsp;</span></p><p data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">?</span></p><p data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">Possession and Collection</span></p><p data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">Definitions of ?wildlife? in the General Statues vary. For purposes of this section, ?wildlife? is defined as all wild animals found in North Carolina. With respect to possession and collection of wildlife, the Statutes generally distinguish between dead wildlife, live wildlife, and exotic wildlife.</span></p><p data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">Dead Wildlife:&nbsp;Dead wildlife, lawfully taken may be possessed and transported without a permit. See&nbsp;Hunting and&nbsp;Trapping regulations&nbsp;for legal manner of take, seasons, bag limits, and possession limits. An individual may accept the gift of lawfully taken wildlife provided that it does not cause them to exceed the applicable possession limits for that species. If the person receiving the gift notes and preserves in writing the name and address of the donor and under what license or exemption from license requirement the wildlife was taken, they may possess that wildlife without a permit.</span></p><p data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">Dead wildlife may be possessed also under any number of special permits or licenses. You should refer to the terms of that permit or license to determine the legal requirements. Contact the Division of Wildlife Management office at (919) 707-0060 for the appropriate permit or license.</span></p><p data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">Live Wildlife:&nbsp;Possession of live wildlife generally requires a permit or license. Contact the Division of Wildlife Management office at (919) 707-0060 for the appropriate permit or license.</span></p><p data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">There are a few exceptions:</span></p><ol class="style-text" data-dcnode-id="2454"><li data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">The law does allow crippled, injured or orphaned wildlife to be kept in captivity for a period of not longer than 5 days provided that person applies to the Commission for a Captivity Permit within that five day period or gives up possession of the wild animal to a licensed wildlife rehabilitator within that 5 day period. The law is different for crippled, orphaned, or injured bear or deer. For these two species, the Commission should be notified immediately. A Commission representative will then arrange for transport to an approved deer or bear rehabilitation facility.</span></li><li data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">The law allows for taking of bait fish and freshwater mussels in certain situations. See Possession and Collection of Nongame Wildlife for more information.</span></li><li data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">Individuals may hold less than five reptiles or less than 25 amphibians not on the endangered, threatened or special concern lists and not including spotted turtles, Carolina pygmy rattlesnakes, timber (canebrake) rattlesnakes and Eastern coral snakes without a Captivity License or Permit. See Possession and Collection of Nongame Wildlife&nbsp;for more information.</span></li></ol><p data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">Exotic Wildlife:&nbsp;It is unlawful to import, transport, export, purchase, possess, or sell any species of Tongueless or African Clawed Frog (Xenopus&nbsp;spp.), or to stock them in the public or private waters or lands of North Carolina. (Exceptions may be made in certain situations for qualified research institutions). See Possession and Collection of Nongame Wildlife&nbsp;for more information.</span></p></blockquote><p data-dcnode-id="2447"><span data-dcnode-id="2450" instrument_node="">Citation: </span><a data-dcnode-id="2448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.umblr.com/redirect%3Fz%3Dhttp%253A%252F%252Fwww.ncwildlife.org%252FLicensing%252FRegulations%252FNongameandOtherRegulations%252FPossessionandCollection.aspx%26t%3DZTQwMDgwM2YwZTU2NTQxMzE4MDRmMjY1ODUwYWJlNTMyZjFjZDUzMSxISWdrR3B5cw%253D%253D" id="37E39D06-1E14-4BB0-A64D-BBF3E2246F1B"><span data-dcnode-id="2449" instrument_node="">North Carolina Wildlife Resources Commission</span></a></p><p data-dcnode-id="2445"><br data-dcnode-id="2446"></p><p data-dcnode-id="2442"><span class="wz-bold" data-dcnode-id="2443" style="color: rgb(22, 114, 219);"><span data-dcnode-id="2444" instrument_node="">NORTH DAKOTA</span></span></p><p data-dcnode-id="2436"><span class="wz-bold" data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">To put it simply: </span></span><span data-dcnode-id="2437" instrument_node="">yes, foxes are legal in North Dakota.</span></p><p data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="2429"><li data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">Ranch fox (non-red colored red fox (Vulpes vulpes)) are Category 1 Non-Traditional Livestock in North Dakota.&nbsp;Category 1 species do not require nontraditional livestock licensure, but must otherwise comply with laws and rules of the board.</span></li><li data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">Kit foxes (Vulpes macrotis), swift foxes (Vulpes velox), red foxes (Vulpes vulpes), and gray foxes (Urocyon cinereoargenteus)&nbsp;are Category 2 Non-Traditional Livestock in North Dakota.&nbsp;Owners of Category 2 species must maintain nontraditional livestock licensure.&nbsp; A Permit to Possess, Propagate, or Domesticate from the North Dakota Game and Fish Department is required for some Category 2 species.</span></li></ul><p data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="2401"><span data-dcnode-id="2426" instrument_node="">Non-Traditional Livestock (Includes exotic/non-domestic animals)</span><p data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">In North Dakota, non-domestic animals are classified into three categories of Non-Traditional Livestock.&nbsp;</span></p><p data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">Category 1 animals are those species generally considered domestic, or other species that are not inherently dangerous, that do not pose a health risk to humans, domestic or wild species, and do not pose a hazard to the environment as determined by the board.&nbsp; Category 1 includes turkeys, geese and ducks morphologically distinguishable from wild turkeys, geese, and ducks, pigeons, mules, donkeys, asses, ratites, chinchilla, Guinea fowl, ferrets, ranch foxes, ranch mink, peafowl, all pheasants, quail, chukar, hedgehog, and degus.&nbsp; Category 1 species do not require nontraditional livestock licensure, but must otherwise comply with laws and rules of the board.&nbsp; Owners of pheasants, quail, and chukar are required to obtain a Permit to Possess, Propagate, or Domesticate (PPD) according to North Dakota Game and Fish Department regulations.&nbsp; The PPD permit is issued through the Animal Health Division of the North Dakota Department of Agriculture.</span></p><p data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Category 2 animals are certain protected species or those species that may pose health risks to humans or animals or may be environmentally hazardous as determined by the board.&nbsp; Category 2 includes all nondomestic ungulates, including all deer and pronghorn, nondomestic cats not listed in category 3, waterfowl, shorebirds, upland game birds not listed in category 1, crows, wolverines, otters, martens, fishers, kit or swift foxes, badgers, coyotes, mink, red and gray fox, muskrats, beavers, weasels, opossums, prairie dogs, and other ground squirrels.&nbsp; Owners of category 2 species must maintain nontraditional livestock licensure.&nbsp; A Permit to Possess, Propagate, or Domesticate from the North Dakota Game and Fish Department is required for some category 2 species.&nbsp; The PPD permit is issued through the Animal Health Division of the North Dakota Department of Agriculture.</span></p><p data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">Category 3 animals are those species determined by the board to pose special concerns, including species which are inherently dangerous or environmentally hazardous.&nbsp; Owners of category 3 species must maintain nontraditional livestock licensure and are subject to additional housing and care requirements.&nbsp; A Permit to Possess, Propagate, or Domesticate from the North Dakota Game and Fish Department is required for some category 3 species.&nbsp; Category 3 includes the following species and their hybrids:</span></p><div data-dcnode-id="2402"><ul class="style-circle" data-dcnode-id="2403"><li data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">Wild species of the family suidae (any swine not considered domestic in North Dakota by the board)</span></li><li data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">Big cats, including mountain lion, jaguar, leopard, lion, tiger, and cheetah</span></li><li data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">Bears</span></li><li data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">Wolves and wolf-hybrids (any animal that is part wolf)</span></li><li data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">Venomous reptiles</span></li><li data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">Primates</span></li><li data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Non-domestic sheep and their hybrids and non-domestic goats and their hybrids &nbsp;</span></li></ul></div></blockquote><p data-dcnode-id="2397"><span data-dcnode-id="2400" instrument_node="">Citation: </span><a data-dcnode-id="2398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.umblr.com/redirect%3Fz%3Dhttp%253A%252F%252Fwww.nd.gov%252Fndda%252Fprogram%252Fnon-traditional-livestock%26t%3DYzg0ZWJhNjEwOTNhNmI3MTJiMTY4NzhhZTQ2Mzk3MzBlYjRjMDU5NSxxaXRISWZSUA%253D%253D" id="8F3C4129-A852-4567-BAF1-773F64B6CCFE"><span data-dcnode-id="2399" instrument_node="">North Dakota Department of Agriculture</span></a></p><p data-dcnode-id="2395"><br data-dcnode-id="2396"></p><p data-dcnode-id="2392"><span class="wz-bold" data-dcnode-id="2393" style="color: rgb(22, 114, 219);"><span data-dcnode-id="2394" instrument_node="">OHIO</span></span></p><p data-dcnode-id="2386"><span class="wz-bold" data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">To put it simply:</span></span><span data-dcnode-id="2387" instrument_node=""> yes, foxes are legal in Ohio.</span></p><p data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="2381"><li data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">Foxes require a ?noncommercial propagating license,? which costs $25 per year.</span></li></ul><p data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="2344"><p data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">1531.01 Division of wildlife definitions.</span></p><p data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">® ?Game? includes game birds, game quadrupeds, and fur-bearing animals.</span></p><p data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">?</span></p><p data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">(U) ?Wild quadrupeds? includes game quadrupeds and fur-bearing animals.</span></p><p data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">?</span></p><p data-dcnode-id="2367"><span data-dcnode-id="2
