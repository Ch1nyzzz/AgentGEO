ode-id="1608"><span data-dcnode-id="1609" instrument_node="">(B) The applicant must have at least two (2) years of experience in the handling or care of the Class I species for which the applicant is applying, or, in the alternative, must take a written examination, developed and administered by the agency, evidencing basic knowledge of the habits and requirements, in regard to proper diet, health care, exercise needs and housing of the species to be covered by the permit. Experience gained while in violation of this part shall not be considered qualifying experience;</span></p><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">© The facilities for holding Class I wildlife must be located on the premises on which the permit holder resides or shall have a full-time resident caretaker to supervise the care and security of the facilities. Facilities for Class I animals may not be on premises of less than one (1) acre for a personal possession permit and three (3) acres for a commercial propagator facility permit, and may not be located in a multi-unit dwelling or trailer park; and</span></p><p data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">(D) The applicant must have a plan for the quick and safe recapture of the wildlife, or if recapture is impossible, for the destruction of any animal held under the permit. The applicant must have the legal authority to possess weapons or other equipment necessary to carry out the plan and, in fact, possess such weapons or other equipment.</span></p><p data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">(3) The permittee shall control and maintain Class I wildlife at all times in such a manner as to prevent direct exposure or contact between the animal or animals and the public; provided, that a trained elephant may be brought into contact with the public under the close supervision of a qualified trainer or handler.</span></p><p data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">(d) No person shall hold live wildlife in captivity without first obtaining the appropriate permit as provided in this part. The annual permits and fees for holding live wildlife are as follows:</span></p><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">(1)(A) Personal Possession. Class I: $150/animal or $1,000/facility; and</span></p><p data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">(B) Class II: $10.00/animal or $100/facility;</span></p><p data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">(2) Transfer of Ownership. A permit for transferring any Class I or II animal held under a personal possession permit. If the transfer of the animal is ordered by the agency, no transfer permit is required;</span></p><p data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">(3) Commercial Propagator. $1,000/facility for Class I wildlife;</span></p><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">(4) Propagator. $25.00/facility for small game birds and waterfowl; and $100/facility for all Class II wildlife except small game birds and waterfowl;</span></p><p data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">(5) Importation. $10.00/shipment or $100 per year;</span></p><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">(6) Temporary Exhibitor. $100/30 day period;</span></p><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">(7) Permanent Exhibitor. $500/year/facility;</span></p><p data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">(8) Commercial Wildlife Preserve. $150/year for big game; and $75.00/year for small game;</span></p><p data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">(9) Falconry. $40.00/year or other time period as might coincide with federal permit requirements;</span></p><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">(10) Qualification Examination. $10.00/examination; and</span></p><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">(11) Zoos, Nature Centers, Rehabilitation Centers, and Educational Exhibits Certified As Nonprofit. No charge.</span></p><p data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">§ 70-4-411. Imports; permits and papers</span></p><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">(a) All persons wishing to possess Classes I and II live wildlife obtained outside the state of Tennessee shall have in their possession the importation permit required by this part. The permit and all bills of lading and shipping papers relating to any wildlife that such person may have in such person?s possession shall be open and available for inspection at all reasonable times by authorized agency officers and employees for the purpose of ensuring compliance with the provisions of this part.</span></p><p data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">(b) Animals brought into this state under the authority of an annual importation permit must be reported to the agency within five (5) days of the date of importation.</span></p><p data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">© An importation permit is required for all interstate movement of live wildlife except Class III, except no permit is required for zoos and temporary exhibitors.</span></p></blockquote><p data-dcnode-id="1563"><span class="wz-bold" data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Citation:&nbsp;</span></span><span data-dcnode-id="1564" instrument_node="">TN ST §§ 70-4-401 - 417</span></p></div></div></div></div><span data-dcnode-id="1558" instrument_node="">

</span><div class="webs-container webs-module-text" data-dcnode-id="675"><span data-dcnode-id="1549" instrument_node="">
</span><div class="webs-text" data-dcnode-id="677"><p data-dcnode-id="1546"><span class="wz-bold" data-dcnode-id="1547" style="color: rgb(22, 114, 219);"><span data-dcnode-id="1548" instrument_node="">TEXAS</span></span></p><p data-dcnode-id="1538"><span class="wz-bold" data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">To put it simply:</span></span><span data-dcnode-id="1541" instrument_node="">&nbsp;Yes, some foxes are legal in Texas. There has been much debate over this state's laws for years. Sometimes they would change how they interpreted it, but the law has never changed. As of 2018, we have received an email back from a&nbsp;</span><span data-dcnode-id="1539" style="text-align: start; "><span data-dcnode-id="1540" instrument_node="">Texas Parks and Wildlife&nbsp;Department official that states non-native foxes are legal with the permit below (examples such as Arctics and Fennecs): "Gray and red fox may not be possessed as pets in Texas as they are classified as native fur-bearing animals. Fennec and artic fox are non-native species; therefore, possession is regulated by city and county ordinances.</span></span></p><p data-dcnode-id="1535"><span data-dcnode-id="1536" style="text-align: start; "><span data-dcnode-id="1537" instrument_node="">Megan Nelson</span></span></p><p data-dcnode-id="1532"><span data-dcnode-id="1533" style="text-align: start; "><span data-dcnode-id="1534" instrument_node="">512-389-4481 Office</span></span></p><p data-dcnode-id="1529"><span data-dcnode-id="1530" style="text-align: start; "><span data-dcnode-id="1531" instrument_node="">512-389-4550 Fax"</span></span></p><p data-dcnode-id="1526"><span data-dcnode-id="1527" style="text-align: start; "><br data-dcnode-id="1528"></span></p><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="1512"><p data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">GUIDELINES FOR PROPAGATING LIVE FUR-BEARING ANIMALS</span></p><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">This publication is a summary of the requirements specific to holders of a Furbearing Animal Propahators License according to the Statewide Furbearing Animal and Trapping Proclamation (§65.371-§65.385) and Subtitle C, Chapter 71 (§71.001-§71.015) of the Parks and Wildlife Code. A Furbearing animal Propagator is a person licensed to take or possess a living furbearing animal and hold it for propagation or sale. Species subject to these requirements include badger, beaver, civet cat, all fox, mink, muskrat, nutria, opossum, otter, raccoon, ring-tailed cats and all skunks.</span></p><p data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">?</span></p><p data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">General License and Facility Standards Information</span></p><ul class="style-circle" data-dcnode-id="1513"><li data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">A Furbearing Propagation Permit does not authorize individuals to possess live furbearing animals as pets. This IS NOT a ?pet permit.?</span></li></ul></blockquote><p data-dcnode-id="1508"><span data-dcnode-id="1511" instrument_node="">Citation: </span><a data-dcnode-id="1509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.umblr.com/redirect%3Fz%3Dhttp%253A%252F%252Fwww.tpwd.state.tx.us%252Fpublications%252Fpwdpubs%252Fmedia%252Fpwd_lf_w7000_0479_packet.pdf%26t%3DNmUzYjVmYWQ4ZDg0MmNkNGViMGZjYjgyMGRkOWFhMzVjNmMwZWYyNixhWUFaVzJMRA%253D%253D" id="7C52BD32-1F7E-4BFF-8EFC-C70412D227DA"><span data-dcnode-id="1510" instrument_node="">GUIDELINES FOR PROPAGATING LIVE FUR-BEARING ANIMALS</span></a></p><p data-dcnode-id="1505"><span class="wz-bold" data-dcnode-id="1506"><br data-dcnode-id="1507"></span></p><p data-dcnode-id="1502"><span class="wz-bold" data-dcnode-id="1503" style="color: rgb(22, 114, 219);"><span data-dcnode-id="1504" instrument_node="">UTAH</span></span></p><p data-dcnode-id="1496"><span class="wz-bold" data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">To put it simply:</span></span><span data-dcnode-id="1497" instrument_node=""> yes, some foxes are legal in Utah.</span></p><p data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="1491"><li data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Red foxes (Vulpes vulpes) only. All other species are prohibited and controlled and certificates of registration are not given for personal use.</span></li></ul><p data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="1376"><p data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">R657-3-1. Purpose and Authority.</span></p><p data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">(1) Under Title 23, Wildlife Resources Code of Utah and in accordance with a memorandum of understanding with the Department of Agriculture and Food, Department of Health, and the Division of Wildlife Resources, this rule governs the collection, importation, exportation, transportation, and possession of animals and their parts.</span></p><p data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">(2) Nothing in this rule shall be construed as superseding the provisions set forth in Title 23, Wildlife Resources Code of Utah. Any provision of this rule setting forth a criminal violation that overlaps a section of that title is provided in this rule only as a clarification or to provide greater specificity needed for the administration of the provisions of this rule.</span></p><p data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">(3) In addition to this rule, the Wildlife Board may allow the collection, importation, transportation, propagation and possession of species of animal species under specific circumstances as provided in Rules R657-4 through R657-6, R657-9 through R657-11, R657-13, R657-14, R657-16, R657-19, R657-20 through R657-22, R657-33, R657-37, R657-38, R657-40, R657-41, R657-43, R657-44, R657-46 and R657-52 through R657-60. Where a more specific provision has been adopted, that provision shall control.</span></p><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">(4) The importation, distribution, relocation, holding in captivity or possession of coyotes and raccoons in Utah is governed by the Agricultural and Wildlife Damage Prevention Board and is prohibited under Section 4-23-11 and Rule R657-14, except as permitted by the Utah Department of Agriculture and Food.</span></p><p data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">(5) This rule does not apply to division employees acting within the scope of their assigned duties.</span></p><p data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">(6) The English and scientific names used throughout this rule for animals are, at the time of publication, the most widely accepted names. The English and the scientific names of animals change, and the names used in this rule are to be considered synonymous with names in earlier use and with names that, at any time after publication of this rule, may supersede those used herein.</span></p><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">R657-3-2. Species Not Covered by This Rule.</span></p><p data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">The following species of animals are not governed by this rule:</span></p><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">(1) Alpaca (Lama pocos);</span></p><p data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">(2) Ass or donkey (Equus asinus);</span></p><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">(3) American bison, privately owned (Bos bison);</span></p><p data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">(4) Camel (Camelus bactrianus and Camelus dromedarius);</span></p><p data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">(5) Cassowary (All species)(Casuarius);</span></p><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">(6) Cat, domestic, including breeds that are recognized by The International Cat Association as Preliminary New, Advanced New, Non-championship, and Championship Breeds (Felis catus);</span></p><p data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">(7) Cattle (Bos taurus taurus);</span></p><p data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">(8) Chicken (Gallus gallus);</span></p><p data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">(9) Chinchilla (Chinchilla laniger);</span></p><p data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">(10) Dog, domestic including hybrids between wild and domestic species and subspecies (Canis familiaris);</span></p><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">(11) Ducks distinguishable morphologically from wild birds (Anatidae);</span></p><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">(12) Elk, privately owned (Cervus elaphus canadensis);</span></p><p data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">(13) Emu (Dromaius novaehollandiae);</span></p><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">(14) Ferret or polecat, European (Mustela putorius);</span></p><p data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">(15) Fowl (guinea) (Numida meleagris);</span></p><p data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">(16) Fox, privately owned, domestically bred and raised (Vulpes vulpes);</span></p><p data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">(17) Geese, distinguishable morphologically from wild geese (Anatidae);</span></p><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">(18) ?Gerbils? or Mongolian jirds (Meriones unguiculatus);</span></p><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">(19) Goat (Capra hircus);</span></p><p data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">(20) Hamster (All species) (Mesocricetus spp.);</span></p><p data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">(21) Hedgehog (white bellied)(Erinaceideae atelerix albiventris)</span></p><p data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">(22) Horse (Equus caballus);</span></p><p data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">(23) Llama (Lama glama);</span></p><p data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">(24) American Mink, privately owned, ranch-raised (Neovison vision);</span></p><p data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">(25) Mouse, house (Mus musculus);</span></p><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">(26) Mule and hinny (hybrids of Equus caballus and Equus asinus);</span></p><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">(27) Ostrich (Struthio camelus);</span></p><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">(28) Peafowl (Pavo cristatus);</span></p><p data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">(29) Pig, guinea (Cavia porcellus);</span></p><p data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">(30) Pigeon (Columba livia);</span></p><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">(31) Rabbit, European (Oryctolagus cuniculus);</span></p><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">(32) Rats, Norway and Black (Rattus norvegicus and Rattus rattus);</span></p><p data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">(33) Rhea (Rhea americana);</span></p><p data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">(34) Sheep (Ovis aries);</span></p><p data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">(35) Sugar glider (Petaurus breviceps);</span></p><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">(36) Swine, domestic (Sus scrofa domesticus);</span></p><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">(37) Turkey, privately owned, pen-raised domestic varieties (Meleagris gallopavo). Domestic varieties means any turkey or turkey egg held under human control and which is imprinted on other poultry or humans and which does not have morphological characteristics of wild turkeys;</span></p><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">(38) Water buffalo (Bubalis arnee);</span></p><p data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">(39) Yak (Bos mutus); and</span></p><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">(40) Zebu, or ?Brahma? (Bos taurus indicus)</span></p><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">?</span></p><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">R657-3-17. Collection, Importation or Possession for Personal Use.</span></p><p data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">(1) A person may collect, import or possess live or dead animals or their parts for a personal use only as follows:</span></p><p data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">(a) Certificates of registration are not issued for the collection, importation or possession of any live or dead animals or their parts classified as prohibited, except as provided in R657-3-36 or the rules and guidebooks of the Wildlife Board.</span></p><p data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">(b) A certificate of registration is required for collecting, importing or possessing any live or dead animals or their parts classified as controlled, except as otherwise provided by this rule or the rules and guidebooks of the Wildlife Board.</span></p><p data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">© A certificate of registration is not required for collecting, importing or possessing live or dead animals or their parts classified as noncontrolled.</span></p><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">(2) Notwithstanding Subsection (1), a person may import or possess any dead animal or its parts, except as provided in Section R657-3-8, for personal use without obtaining a certificate of registration, provided the animal was legally taken, is held in legal possession, and a valid license, permit, tag, certificate of registration, bill of sale, or invoice is available for inspection upon request.</span></p></blockquote><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Citation:&nbsp;UT ADC R657-3</span></p><p data-dcnode-id="1371"><span class="wz-bold" data-dcnode-id="1372"><br data-dcnode-id="1373"></span></p><p data-dcnode-id="1368"><span class="wz-bold" data-dcnode-id="1369" style="color: rgb(22, 114, 219);"><span data-dcnode-id="1370" instrument_node="">VERMONT</span></span></p><p data-dcnode-id="1362"><span class="wz-bold" data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">To put it simply:</span></span><span data-dcnode-id="1363" instrument_node=""> no, foxes are not legal in Vermont.</span></p><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="1357"><li data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Foxes are not listed as Domestic or Unrestricted Wild Animals, and require an Importation and Possession Permit, which are only issued for bona fide scientific research or educational purposes.</span></li></ul><p data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="1296"><p data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">10 V.S.A. App. § 18. Governing the importation and possession of wild animals, excluding fish</span></p><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">1.0 Authority</span></p><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">1.1 This rule is adopted pursuant to 10 V.S.A. § 4081(a) and (b) which authorizes the board to carry out the purposes of protecting the state?s wildlife, and 10 V.S.A. § 4709 which regulates the importation and possession of wild birds and animals in the state and establishes a permit application fee, and 10 V.S.A. § 4152 establishes scientific and education collection permits.</span></p><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">2.0 Purpose</span></p><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">2.1 It is the purpose of this regulation to carry out the mandate of the Vermont general assembly to control through a permit program the importation and possession of wild animals in Vermont as provided in 10 V.S.A. § 4709. It is the purpose of this statute and its regulations to protect the health, safety and welfare of animals, both wild and domestic, to prevent damage to agriculture and livestock, and to protect the health, safety and welfare of human inhabitants of the state of Vermont.</span></p><p data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">3.0 Definitions</span></p><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">3.1 Wild Animals or Wildlife - All animals, including mammals, birds, amphibians and reptiles, excluding fish and those animals defined by the secretary of agriculture food and markets by rule as pets and those defined as domestic under paragraph 3.2 of this rule. Included in this definition is any part, product, egg, offspring, dead body, or part of the dead body of any such wildlife. Wildlife includes all subspecies of wildlife and any other group of wildlife of the same species, the members of which may interbreed when mature, including any hybrid species except wolf-hybrids. Wild animals taken or possessed, or reared in captivity remain wild animals and are not domestic or tame animals.</span></p><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">3.2 Domestic Birds and Animals - The department shall provide a list of domestic animals and shall update the list as needed, adding or deleting animals as necessary. The list shall be available on the department?s web site, from the department?s headquarters and from the department?s district offices. The list shall also be made available to the media as much as practicably possible to provide maximum notice to the public.</span></p><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">3.3 Board - Vermont fish and wildlife board</span></p><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">3.4 Department - Vermont fish and wildlife department</span></p><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">3.5 Commercial - To sell, have sold, or offer for sale as defined in 10 V.S.A. § 4001(22); barter, exchange and offering or exposing for sale; and possession with the intent to sell, import, or export.</span></p><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">3.6 Commissioner - fish and wildlife department commissioner as defined in 10 V.S.A. § 4001(27).</span></p><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">3.7 Dealer - Any person, who commercially buys or sells any wild animal, as defined in 3.5.</span></p><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">3.8 Unrestricted Wild Animals - Those species determined not to conflict with the purposes of this regulation.</span></p><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">3.9 Native Wildlife - Native to the state of Vermont, either historically or at present.</span></p><p data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">4.0 Imporation or possession of wild animals</span></p><p data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">4.1 Except as otherwise provided by law, it is unlawful for any person to bring into or possess in the state of Vermont any live wild animal, or live ovum or semen thereof, of any kind, unless upon application in writing, the person obtains from the commissioner a permit to do so; or the species of animal, ovum, or semen is listed as a domestic bird or animal, domestic pet, or unrestricted wild animal.</span></p><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">4.2 The importation and possession of dead wild animals, in accordance with all laws and regulations applicable in Vermont or the place of origin, for personal use are exempt from this regulation.</span></p><p data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">4.3 The importation, possession and regulation of pests and beneficial organisms regulated by the secretary of agriculture, food and markets is exempt from this regulation.</span></p><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">5.0 Permits</span></p><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">5.1 Dealer?s Permit</span></p><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">All commercial dealers in Vermont, including, but not limited to pet shop owners, persons raising frogs for sale as institutional experimental animals, and all persons who import, export, and/or sell wild birds and animals must first obtain a valid Dealer?s Permit from the department.</span></p><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Except as provided herein, the cCommissioner shall not issue a permit for the keeping or possession of any wild animal in captivity, except for bona fide scientific or educational purposes as permitted by (10 V.S.A. § 4152).</span></p><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">For purposes other than importation and possession for bona fide research and educational purposes, the commissioner shall not issue a permit unless it has been determined that the wild animal or wildlife proposed to be brought into or possessed in the state does not conflict with the purpose of this regulation. The commissioner shall establish a list of Unrestricted Wild Animals that do not conflict with the purpose of this regulation, are commonly sold in the pet trade, and do not require an Importation and Possession Permit from the department.</span></p><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">The Unrestricted Wild Animals List will consist of those species that are determined to be no threat to the state?s native wildlife, minimal threat to human health and safety, and suitable as pets for the residents of the state. This list is expected to be revised periodically by the Commissioner depending on recent pet trade trends, disease, and health issues. The list shall be posted on the department website and made available at the department?s central and district offices.</span></p><p data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">In accordance with 10 V.S.A. § 4152, the commissioner may issue permits to collect birds, their nests and eggs and wild animals, or their parts thereof, for public scientific research, educational purposes, art, or photography.</span></p><p data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Any person who collects any wild animal within the boundaries of the state of Vermont and sells said wild animal must obtain a Commercial Collection Permit from the department.</span></p><p data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Any person importing or possessing any wild animal for the purposes of temporary exhibition must obtain from the commissioner a permit to do so; unless the species is listed as a domestic bird or animal, domestic pet, or unrestricted wild animal.</span></p><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Any person breeding and propagating wild birds and animals in accordance with 10 V.S.A. § 5207 must obtain from the commissioner a license to do so; unless the species is listed as a domestic bird or animal, domestic pet, or unrestricted wild animal.</span></p></blockquote><p data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">Citation:&nbsp;10 V.S.A. App.&nbsp;§ 18</span></p><p data-dcnode-id="1291"><span class="wz-bold" data-dcnode-id="1292"><br data-dcnode-id="1293"></span></p><p data-dcnode-id="1288"><span class="wz-bold" data-dcnode-id="1289" style="color: rgb(22, 114, 219);"><span data-dcnode-id="1290" instrument_node="">VIRGINIA</span></span></p><p data-dcnode-id="1282"><span class="wz-bold" data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">To put it simply:</span></span><span data-dcnode-id="1283" instrument_node="">&nbsp;no, foxes are legal in Virginia.</span></p><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="1275"><li data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Foxes are no longer legal as of 2017 without a USDA license.&nbsp;</span></li><li data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Some foxes under possession may be grandfathered in if owned prior to 2017.</span></li></ul><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="1150"><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">4 VAC 15-20-50. Definitions; ?wild animal,? ?native animal,? ?naturalized animal,? ?nonnative (exotic) animal? and ?domestic animal.?</span></p><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">In accordance with §29.1-100 of the Code of Virginia, the following terms shall have the meanings ascribed to them by this section when used in regulations of the board:</span></p><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">?Wild animal? means any member of the animal kingdom, except domestic animals, including without limitation any native, naturalized, or nonnative (exotic) mammal, fish, bird, amphibian, reptile, mollusk, crustacean, arthropod or other invertebrate, and includes any hybrid of them, except as otherwise specified in regulations of the board, or part, product, egg, or offspring of them, or the dead body or parts of them.</span></p><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">?Native animal? means those species and subspecies of animals naturally occurring in Virginia, as included in the department?s 20072010 ?List of Native and Naturalized Fauna of Virginia,? with copies available in the Richmond and regional offices of the department.</span></p><p data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">?Naturalized animal? means those species and subspecies of animals not originally native to Virginia which have established wild, self-sustaining populations, as included in the department?s 20072010 ?List of Native and Naturalized Fauna of Virginia,? with copies available in the Richmond and regional offices of the department.</span></p><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">?Nonnative (exotic) animal? means those species and subspecies of animals not naturally occurring in Virginia, excluding domestic and naturalized species.</span></p><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">The following animals are defined as domestic animals:</span></p><ul class="style-circle" data-dcnode-id="1206"><li data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Domestic dog (Canis familiaris), including wolf hybrids.</span></li><li data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Domestic cat (Felis catus), including hybrids with wild felines.</span></li><li data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Domestic horse (Equus caballus), including hybrids with Equus asinus.</span></li><li data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Domestic ass, burro, and donkey (Equus asinus).</span></li><li data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Domestic cattle (Bos taurus and Bos indicus).</span></li><li data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Domestic sheep (Ovis aries) including hybrids with wild sheep.</span></li><li data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Domestic goat (Capra hircus).</span></li><li data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Domestic swine (Sus scrofa domestica), including pot-bellied pig.</span></li><li data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Llama (Lama glama).</span></li><li data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Alpaca (Lama pacos).</span></li><li data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Camels (Camelus bactrianus and Camelus dromedarius).</span></li><li data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Domesticated races of hamsters (Mesocricetus spp.).</span></li><li data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Domesticated races of mink (Mustela vison) where adults are heavier than 1.15 kilograms or their coat color can be distinguished from wild mink.</span></li><li data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Domesticated races of red fox (Vulpes) where their coat color can be distinguished from wild red fox.</span></li><li data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Domesticated races of guinea pigs (Cavia porcellus).</span></li><li data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Domesticated races of gerbils (Meriones unguiculatus).</span></li><li data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Domesticated races of chinchillas (Chinchilla laniger).</span></li><li data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Domesticated races of rats (Rattus norvegicus and Rattus rattus).</span></li><li data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Domesticated races of mice (Mus musculus).</span></li><li data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Domesticated races of European rabbit (Oryctolagus cuniculus).</span></li><li data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Domesticated races of chickens (Gallus).</span></li><li data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Domesticated races of turkeys (Meleagris gallopavo).</span></li><li data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Domesticated races of ducks and geese distinguishable morphologically from wild birds.</span></li><li data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Feral pigeons (Columba domestica and Columba livia) and domesticated races of pigeons.</span></li><li data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Domesticated races of guinea fowl (Numida meleagris).</span></li><li data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Domesticated races of peafowl (Pavo cristatus).</span></li></ul><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">?</span></p><p data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">4 VAC 15-30-40. Importation requirements, possession and sale of nonnative (exotic) animals.</span></p><p data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">A. Permit required. A special permit is required and may be issued by the department, if consistent with the department?s fish and wildlife management program, to import, possess, or sell those nonnative (exotic) animals listed below and in 4 VAC 15-20-210 that the board finds and declares to be predatory or undesirable within the meaning and intent of § 29.1-542 of the Code of Virginia, in that their introduction into the Commonwealth will be detrimental to the native fish and wildlife resources of Virginia:</span></p><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">?</span></p><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">MAMMALS</span></p><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Order ? Family ? Genus/Species ? Common Name</span></p><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Carnivora ? Canidae ? All Species ? Wild Dogs, Wolves, Coyote or Coyote hybrids, Jackals and Foxes</span></p><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">?</span></p><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">PERMIT REQUIREMENTS TO PROPAGATE AND SELL CERTAIN WILDLIFE CONDITIONS OF PERMIT</span></p><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Pursuant to 4 VAC 15-30-10 it shall be unlawful to import, export, buy, sell, offer for sale, or liberate within the Commonwealth any wild animal unless otherwise specifically permitted by law or regulation. Under authority of § 29.1-103 (11) and § 29.1-412 of the Code of Virginia, the Propagate and Sell Permit shall authorize the holder to buy, possess, propagate, and sell certain wildlife.</span></p><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">PROPAGATION AND SELL PERMIT INFORMATION</span></p><p data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">?</span></p><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">3. Authorized Stocks: The following species are authorized for possession and sale by this permit:</span></p><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Furbearers - Fur Farming Only (Captive-bred and raised)</span></p><ul class="style-circle" data-dcnode-id="1171"><li data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Mink (Mustela vison)</span></li><li data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">Red Fox (Vulpes vulpes)</span></li><li data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Grey Fox (Urocyon cinereoargenteus)</span></li></ul><p data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Game Birds (Captive-bred and raised)</span></p><ul class="style-circle" data-dcnode-id="1160"><li data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Bobwhite Quail (Colinus virginianus)</span></li><li data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Ring-necked Pheasant (Phasianus colchicus) including all subspecies and hybrids</span></li><li data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Hungarian Partridge (Perdix perdix)</span></li><li data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Chukar (Alectoris chukar)</span></li></ul><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Migratory Game Birds (captive-bred and raised):</span></p><ul class="style-circle" data-dcnode-id="1151"><li data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Ducks &lt; all species native to Virginia &gt;</span></li><li data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Geese &lt; all species native to Virginia &gt;</span></li><li data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Swans (Mute swans (Cygnus olor), will not be permitted for possession, propagation, purchase or sale on any new applications.)</span></li></ul></blockquote><p data-dcnode-id="1146"><span data-dcnode-id="1149" instrument_node="">Citation:&nbsp;4 VAC 15-20-50,&nbsp;4 VAC 15-30-40,&nbsp;</span><a data-dcnode-id="1147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.umblr.com/redirect%3Fz%3Dhttp%253A%252F%252Fwww.dgif.virginia.gov%252Fforms%252FPERM%252FPERM-014.pdf%26t%3DOTkwZjExZmJhNjNiMjZlYzZmM2QzZjM2MDBjMGFhZWQ2ZTZhMzFjMixrd1RobWdoWQ%253D%253D%26b%3Dt%253Aw_3wCtQ7otwEjgueOstgQQ%26p%3Dhttp%253A%252F%252Ftheartfulfox.tumblr.com%252Fpost%252F67090565633%252Fstate-laws-virginia%26m%3D1" id="F918002E-E4EF-46A1-8428-E4F707071A92"><span data-dcnode-id="1148" instrument_node="">Permit Requirements to Propagate and Sell Certain Wildlife</span></a></p><p data-dcnode-id="1143"><span class="wz-bold" data-dcnode-id="1144"><br data-dcnode-id="1145"></span></p><p data-dcnode-id="1140"><span class="wz-bold" data-dcnode-id="1141" style="color: rgb(22, 114, 219);"><span data-dcnode-id="1142" instrument_node="">WASHINGTON</span></span></p><p data-dcnode-id="1136"><span class="wz-bold" data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node=""> To put it simply:</span></span><span data-dcnode-id="1137" instrument_node=""> no, foxes are not legal in Washington.</span></p><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="1123"><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">WAC 246-100-197</span></p><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Rabies ? Measures to prevent human disease.</span></p><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">?</span></p><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">a) All persons are prohibited from acquiring, selling, bartering, exchanging, giving, purchasing, distributing, or trapping to retain any bat, skunk, fox, raccoon, or coyote, except a zoological park, animal exhibitor, or research facility.</span></p><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">(b) All persons are prohibited from importing into the state any bat, skunk, fox, raccoon, or coyote, except a zoological park, animal exhibitor, or research facility under an entry permit issued by the director of the department of agriculture in consultation with the secretary of the department.</span></p></blockquote><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Citation:&nbsp;WAC 246-100-197</span></p><p data-dcnode-id="1119" style="color: rgb(22, 114, 219);"><br data-dcnode-id="1120" style="color: rgb(22, 114, 219);"></p><p data-dcnode-id="1113"><span class="wz-bold" data-dcnode-id="1116"><span data-dcnode-id="1117" style="color: rgb(22, 114, 219);"><span data-dcnode-id="1118" instrument_node="">WASHINGTON DC</span></span></span><span class="wz-bold" data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node=""> </span></span></p><p data-dcnode-id="1108"><span data-dcnode-id="1112" instrument_node=""> </span><span class="wz-bold" data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">To put it simply: </span></span><span data-dcnode-id="1109" instrument_node="">no, foxes are not legal in Washington DC.</span></p><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="1103"><li data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">A person may only possess the following animals in Washington DC:&nbsp;domestic dogs, domestic cats, domesticated rodents and rabbits,&nbsp;captive-bred species of common cage birds, nonpoisonous snakes, fish, and turtles, and racing pigeons.</span></li></ul><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="1086"><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">§ 8-1808. Prohibited conduct.</span></p><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">?</span></p><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">(h)(1) Except as provided in this subsection, no person shall import into the District, possess, display, offer for sale, trade, barter, exchange, or adoption, or give as a household pet any living member of the animal kingdom including those born or raised in captivity, except the following: domestic dogs (excluding hybrids with wolves, coyotes, or jackals), domestic cats (excluding hybrids with ocelots or margays), domesticated rodents and rabbits, captive-bred species of common cage birds, nonpoisonous snakes, fish, and turtles, traditionally kept in the home for pleasure rather than for commercial purposes, and racing pigeons (when kept in compliance with permit requirements).</span></p><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">(2) A person may offer the species enumerated in paragraph (1) of this subsection to a public zoo, park, or museum for exhibition purposes.</span></p><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">(3) This section shall not apply to federally licensed animal exhibitors; however, the Mayor retains the authority to restrict the movement of any prohibited animal into the District and the conditions under which those movements are made.</span></p><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">(4) The Mayor may allow a licensed wildlife rehabilitator, a licensed veterinarian, or a licensed animal shelter to maintain an animal prohibited in this subsection for treatment or pending appropriate disposition.&nbsp;</span></p><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">(5) Paragraph (1) of this subsection shall not apply to persons who own or possess domestic dog hybrids of wolves, coyotes, or jackals prior to March 17, 1993.</span></p></blockquote><p data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Citation:&nbsp;DC CODE&nbsp;§ 8-1808(h)</span></p><p data-dcnode-id="1082"><br data-dcnode-id="1083"></p><p data-dcnode-id="1079"><span class="wz-bold" data-dcnode-id="1080" style="color: rgb(22, 114, 219);"><span data-dcnode-id="1081" instrument_node="">WEST VIRGINIA</span></span></p><p data-dcnode-id="1073"><span class="wz-bold" data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">To put it simply:</span></span><span data-dcnode-id="1074" instrument_node=""> no, foxes are not legal in West Virginia.</span></p><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="1060"><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">No Importation or Pet Permits Issued for Raccoon, Fox or Skunk in West Virginia</span></p><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Based upon serious public health and wildlife disease concerns associated with the raccoon rabies virus, the West Virginia Division of Natural Resources (DNR) wants to remind the public that no Importation or Pet Permits are issued for raccoon, fox or skunk.</span></p><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">The Division of Natural Resources has not issued Wildlife Importation Permits for these species since 2001 and Pet Permits have not been issued since 2006. ?The decision to deny Importation and Pet Permits for raccoon, fox and skunk has been made following careful deliberation and with concurrence from the West Virginia Department of Agriculture and West Virginia Bureau for Public Health. It is important for our citizens to know that just because they may be able to purchase these animals in other states; it is illegal to bring them into West Virginia. Those who transport or possess these animals face fines and the animals being confiscated,? said DNR Director Frank Jezioro.</span></p><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">The mid-Atlantic raccoon rabies epizootic, which began in the late 1970s, expanded rapidly and spread throughout the northeastern states by the mid-1990s. In an effort to stop the westward spread of raccoon rabies across North America, West Virginia has been participating in a regional oral rabies vaccine (Raboral V-RG) barrier program for the past seven years. ?The United States Department of Agriculture has spent millions of dollars in West Virginia to implement this raccoon rabies barrier program, and we simply cannot risk the potential success of this program by allowing the importation and/or possession of live raccoons, foxes or skunks as pets at this time,? noted Jezioro.</span></p><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">**DNR**</span></p></blockquote><p data-dcnode-id="1056"><span data-dcnode-id="1059" instrument_node="">Citation: </span><a data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.umblr.com/redirect%3Fz%3Dhttp%253A%252F%252Fwww.wvdnr.gov%252F2007news%252F07news101.shtm%26t%3DNTFmOGY4ZGQ0ZTA4NDM1YzVmOGYxZjY1NWY1NzZjZjI5YTQwM2I5MCwyclYwQzh0Yw%253D%253D" id="092CFAD9-3AA2-483E-B082-62A2D127760C"><span data-dcnode-id="1058" instrument_node="">West Virginia Division of Natural Resources</span></a></p><p data-dcnode-id="1053"><span class="wz-bold" data-dcnode-id="1054"><br data-dcnode-id="1055"></span></p><p data-dcnode-id="1050"><span class="wz-bold" data-dcnode-id="1051" style="color: rgb(22, 114, 219);"><span data-dcnode-id="1052" instrument_node="">WISCONSIN</span></span></p><p data-dcnode-id="1044"><span class="wz-bold" data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">To put it simply: </span></span><span data-dcnode-id="1045" instrument_node="">yes, foxes are legal in Wisconsin.</span></p><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="1037"><li data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Raising red foxes (Vulpes vulpes) is considered an agricultural activity and they are recognized as domestic animals by state law.</span></li><li data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Other fox species require a license.</span></li></ul><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="841"><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">29.627?&nbsp;Domestic fur-bearing animal farms.&nbsp;The breeding, raising and producing in captivity, and the marketing, by the producer, of foxes, fitch, nutria, marten, fisher, mink, chinchilla, rabbit or caracul, as live animals, or as animal pelts or carcasses shall be considered an agricultural pursuit, and all such animals so raised in captivity shall be considered domestic animals, subject to all the laws of the state with reference to possession, ownership and taxation as are at any time applicable to domestic animals. All persons engaged in the foregoing activities are farmers and engaged in farming for all statutory purposes.</span></p><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">?</span></p><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">169.04. Possession of live wild animals</span></p><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">(1) Restrictions on possession.</span></p><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">(a) No person may possess any live wild animal unless the wild animal is legally obtained.</span></p><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">(b) No person may possess any live wild animal unless the person holds a license or other approval to possess the wild animal as required under this chapter or under s. 29.319 and the person is otherwise in compliance with this chapter and the rules promulgated under this chapter.</span></p><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">(2) Temporary possession.</span></p><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">(a) A person possessing a live native wild animal for a period not to exceed 24 hours is exempt from having a license or other approval as required under sub. (1)(b) if the person is possessing the wild animal for any of the following purposes:</span></p><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">1. To restrain or transport the wild animal for medical treatment by a veterinarian or by a person holding a rehabilitation license.</span></p><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">2. To remove or transport the wild animal from one location to a more appropriate location.</span></p><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">3. To restrain or transport the wild animal for game censuses or surveys, or other purposes authorized by the department.</span></p><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">(b) If a person possessing a live native wild animal under par. (a) determines that it is necessary to possess the wild animal for a period exceeding 24 hours after the time the wild animal was first possessed, the person shall request that the department approve an extension of the time period for the temporary possession. The department may either deny the requested extension or approve it for a specific period of time.</span></p><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">(d) If a live wild animal has been exposed to or infected with any contagious or infectious disease, as defined under rules promulgated by the department of agriculture, trade and consumer protection under s. 95.001(2), during the time the wild animal is being temporarily possessed, the person possessing the wild animal shall ensure that a veterinarian files with the department of agriculture, trade and consumer protection a copy of a valid certificate of veterinary inspection that certifies that the wild animal is free of any such diseases before releasing it into the wild.</span></p><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">(e) No person may operate on a live skunk to remove its scent glands unless the person holds a Class A or Class B captive wild animal farm license or unless the person is a veterinarian and the person bringing the skunk to the veterinarian holds such a license. A veterinarian to whom a person brings a live skunk for removal of its scent glands shall verify whether the person holds a Class A or Class B captive wild animal farm license. If the person does not hold such a license, the veterinarian shall notify that person that possession of a live skunk is illegal and shall notify the department.</span></p><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">(3) Wild animals under another jurisdiction. A live wild animal possessed by a nonresident under the legal authority of another state, province, or country may be possessed in this state by the nonresident for not more than 60 days from the date the wild animal enters the state if all of the following apply:</span></p><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">(a) The nonresident ensures that a veterinarian files a copy of a valid certificate of veterinary inspection for the wild animal with the department of agriculture, trade and consumer protection.</span></p><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">(b) The nonresident holds every license or other approval that is required by the other state, province, or country.</span></p><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">(4) Exemption for certain wild animals.</span></p><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">(a) A person is exempt from holding a license or other approval as required under this chapter to possess live native wild animals if the wild animals are not endangered or threatened species and are any of the following:</span></p><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">1. Arthropods.</span></p><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">2. Chipmunks.</span></p><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">3. Pocket gophers.</span></p><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">4. Mice.</span></p><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">5. Moles.</span></p><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">6. Mollusks.</span></p><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">7. Opossums.</span></p><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">8. Pigeons.</span></p><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">9. Porcupines.</span></p><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">10. Rats.</span></p><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">11. Shrews.</span></p><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">12. English sparrows.</span></p><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">13. Starlings.</span></p><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">14. Ground squirrels.</span></p><p data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">15. Red squirrels.</span></p><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">16. Voles.</span></p><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">17. Weasels.</span></p><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">(b) A person is exempt from holding a license or other approval as required under this chapter to possess live nonnative wild animals that are not endangered or threatened species, except for any of the following:</span></p><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">1. Pheasants of the species Phasianus colchicus or Syrmaticus reevesii, chukar partridge, gray partridge, or red-legged partridge that are possessed for use under a bird hunting preserve license, a dog training license, a hound training license, a dog club training license, a dog trial license, or a hound trial license.</span></p><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">2. Nonnative wild birds of the family anatidae that are migratory birds.</span></p><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">3. Nonnative wild animals that are harmful wild animals.</span></p><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">(5) Exemption for certain persons and institutions.</span></p><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">(a) Each of the following is exempt from holding a license or other approval as required under this chapter to possess any wild animal:</span></p><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">1. A veterinarian, for the purpose of providing medical treatment to wild animals.</span></p><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">2. A public zoo or aquarium.</span></p><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">3. A circus or the Circus World Museum located in Baraboo, Wisconsin.</span></p><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">4. The department.</span></p><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">5. A person who is licensed under s. 95.68 or 95.71 and who is possessing the wild animal under the authority of the license.</span></p><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">6. A person who is licensed under s. 95.69 and who possesses wild animals for 10 days or less and solely for the purpose of resale or slaughter.</span></p><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">(b) For purposes of par. (a)1., ?medical treatment? does not include rehabilitation.</span></p><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">(5m) Exemption for Certain Deer.</span></p><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">(a) A person holding a rehabilitation license who is rehabilitating white-tailed deer in Walworth County may possess these white-tailed deer after they have been rehabilitated without holding any other license or approval as required under this chapter and without being registered under s. 95.55 if all of the following conditions apply:</span></p><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">1. The deer were taken from the wild before August 1, 2003.</span></p><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">2. The license holder keeps the deer within a fenced area that has a double perimeter fence around the area and that complies with all of the requirements under the rules promulgated under s. 90.21(6).</span></p><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">3. The license holder identifies the deer by tagging or by other means as required by the department of agriculture, trade and consumer protection.</span></p><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">4. The license holder does not propagate the deer or otherwise allow the deer to reproduce.</span></p><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">5. The license holder does not remove, or authorize the removal of, the deer from the facilities and premises that are approved for use under the rehabilitation license.</span></p><p data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">6. The license holder notifies the department of agriculture, trade and consumer protection of any illness found in any of the deer.</span></p><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">7. If any of the deer dies, the license holder shall have the carcass tested for chronic wasting disease and shall have the test results submitted to the department of natural resources and the department of agriculture, trade and consumer protection.</span></p><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">8. If any of the deer is found, as a result of testing, to have chronic wasting disease, the license holder shall have all of the deer destroyed.</span></p><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">(b) Legal title to the white-tailed deer subject to par. (a) remains with the state.</span></p><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">© The holder of the rehabilitation license who possesses the white-tailed deer as authorized under par. (a) shall immediately notify the department if any of the deer are not fenced as required under par. (a) 2., are not identified as required under par. (a) 3., reproduce, or are removed from the facilities and premises that are approved for use under the rehabilitation license.</span></p><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">(d) Upon notification under par. ©, or if the department determines that any of the conditions under par. (a) are not met, the holder of the rehabilitation license shall no longer be authorized to possess the white-tailed deer.</span></p><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">(e) If any of the deer escape from the facilities or premises that are approved for use under the rehabilitation license, the license holder shall notify the department immediately.</span></p><p data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">(f) The holder of the rehabilitation license may not release any of the deer subject to par. (a) into the wild without the prior approval of the department.</span></p><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">(6) Inapplicability to certain wild animals. (a) This section does not authorize the possession of harmful wild animals.</span></p><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">(b) The possession of native wild reptiles and native wild amphibians is subject to s. 169.12 and not to this section.</span></p><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">?</span></p><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">GENERAL FACILITY REQUIREMENTS</span></p><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">1. Pens must be structurally sound, kept in good repair, protect the captive animals from injury, hold the animals securely and prevent other animals from getting inside.</span></p><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">2. Most animals may not be kept in any part of a building or home where people live unless receiving temporary health care, treatment orspecial handling.</span></p><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">3. Areas used for storing food or bedding must be free of trash, animal waste, weeds, insects, etc.</span></p><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">4. All surfaces in a pen, including houses, dens, shelters, fixtures and objects must be easily cleaned or removed or replaced when worn or dirty. Surfaces must be free of rust and jagged edges or sharp points.</span></p><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">5. If raised floors are used they must be constructed so the animals? feet cannot pass through the openings in the floor. If the floor is constructed of wire, a solid resting surface large enough to hold all the animals at the same time must be provided.</span></p><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">6. Animal and food wastes, bedding, debris, garbage, water, other fluids and wastes and dead animals must be frequently collected, removed and disposed of on a regular basis. The department recommends this be done on a daily basis.</span></p><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">7. Standing puddles of water must be drained or mopped up after cleaning or rain so the animals can stay dry.</span></p><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">8. Trash containers in food storage and preparation areas must be leak proof with tight fitting lids. The lids must remain on unless the caretaker is using them.</span></p><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">9. Supplies of food and bedding must be stored in a way that protects them from spoilage, contamination and pest infestation. You must be able to clean around and under the supplies. Foods requiring refrigeration must be stored in a refrigerator. All open food must be kept in a leak proof container with a tight fitting lid.</span></p><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">10. To promote the health of the captive animal an effective program for the control of insects, external parasites, birds and mammals that are pests needs to be developed and followed.</span></p><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">GENERAL PEN AND SHELTER REQUIREMENTS</span></p><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">1. Pens must be large enough to allow each captive wild animal to make normal position changes with plenty of freedom of movement.</span></p><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">2. All captive wild animals housed in the same enclosure must be compatible. Vicious or aggressive animals must be housed separately.</span></p><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">3. Outdoor facilities must provide shelter large enough to fit all animals inside comfortably.</span></p><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">4. Shelters need 4 sides, a roof and a floor and must provide the animals with protection from the cold, heat, sun, snow, wind and rain.</span></p><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">5. A wind and rain break must be provided at the shelter entrance.</span></p><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">6. Shelters need clean dry bedding material if the temperature falls below 50F. Additional bedding is needed if temperatures fall below 35F.</span></p><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">7. Metal barrels, cars, refrigerators, freezers and similar objects may not be used for shelters.</span></p><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">8. Shelters must be ventilated to provide for animal health and well being, and to minimize odors, drafts, ammonia levels and moisture. Ventilation can be provided by windows, doors, vents, fans or air conditioning.</span></p><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">9. Shade areas large enough to contain all the captive wild animals at one time must be provided to protect them from the sun.</span></p><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">10. Outdoor shelter for captive wild birds: May consist of natural vegetation, which provides protection from he sun, wind, rain and snow</span></p><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">SPECIAL PEN REQUIREMENTS</span></p><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">?</span></p><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">COYOTE, FOX AND FISHER PENS</span></p><ul class="style-circle" data-dcnode-id="842"><li data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">These pens must be a minimum of 144 square feet for coyote and 120 square feet for fox and fisher.</span></li><li data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">No more than 2 animals may be held in a minimum square foot pen.</span></li><li data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">A minimum of at least 50 additional square feet is required for each additional animal.</span></li><li data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">The pen height must be a minimum of 6 feet.&nbsp;</span></li></ul></blockquote><p data-dcnode-id="837"><span data-dcnode-id="840" instrument_node="">Citation:&nbsp;WI ST&nbsp;29.627,&nbsp;WI ST 169.04,&nbsp;</span><a data-dcnode-id="838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.umblr.com/redirect%3Fz%3Dhttp%253A%252F%252Fdnr.wi.gov%252Ffiles%252Fpdf%252Fpubs%252Fcs%252FCS0020.pdf%26t%3DMDhiYmM4MzYzZjc1ODMwYmJjMTI4ODU5OWVjMGY2MmJjM2M4ZDgyOSw3ZjZGc0lmWA%253D%253D" id="8746BA5F-97D1-4E95-B7E9-CB43BF937959"><span data-dcnode-id="839" instrument_node="">Captive Wildlife Pen Specifications &amp; Transportation Standards</span></a></p><p data-dcnode-id="834"><span class="wz-bold" data-dcnode-id="835"><br data-dcnode-id="836"></span></p><p data-dcnode-id="831"><span class="wz-bold" data-dcnode-id="832" style="color: rgb(22, 114, 219);"><span data-dcnode-id="833" instrument_node="">WYOMING</span></span></p><p data-dcnode-id="827"><span class="wz-bold" data-dcnode-id="829"><span data-dcnode-id="830" instrument_node=""> To put it simply:</span></span><span data-dcnode-id="828" instrument_node=""> yes, some foxes are legal in Wyoming.</span></p><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="818"><li data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Gray foxes (Urocyon cinereoargenteus) and swift foxes (Vulpes velox) may be imported and possessed with a permit.</span></li><li data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Red foxes (Vulpes vulpes) may be possessed without a permit, but they cannot be imported into the state.</span></li><li data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Exotic foxes may not be imported and possessed because they ?pose a threat to Wyoming?s native foxes in the form of possible hybridization, competition, disease or parasitism.?</span></li></ul><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="685"><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">WYOMING GAME AND FISH COMMISSION</span></p><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">CHAPTER 10</span></p><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">REGULATION FOR IMPORTATION, POSSESSION, CONFINEMENT, TRANSPORTATION, SALE AND DISPOSITION OF LIVE WILDLIFE</span></p><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">?</span></p><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Section 5. Importation/Possession Permit Required For Live Wildlife.</span></p><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Except as exempted in this regulation, a permit from the Department is required prior to importation, possession, confinement, or transportation of any living wildlife. Any living wildlife may be transported through the state of Wyoming if the person transporting said wildlife is in possession of a valid permit for interstate transportation of live wildlife. An interstate transportation permit shall be valid as long as live wildlife are confined within the conveyance. It is a violation of this regulation to intentionally or unintentionally release within Wyoming any wildlife held under an interstate transportation permit.</span></p><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">(a) Importation/Possession Without Permit. The animals listed in this subsection are exempt from this regulation and may be imported, possessed, transported, or confined without securing a permit from the Department. (However, the Wyoming Livestock Board should be contacted regarding their regulations.)</span></p><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">(i) Birds</span></p><ul class="style-circle" data-dcnode-id="771"><li data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Cage and aviary birds,</span></li><li data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Domestic chicken (Gallus gallus),</span></li><li data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Domesticated emu (Dromaius novaehollandiae),</span></li><li data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Domestic greylag goose (Anser anser),</span></li><li data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Domesticated guinea fowl (Numida meleagris),</span></li><li data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Domestic mallard (Anas platyrhynchos) distinguished morphologically from wild mallards,</span></li><li data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Domestic muscovy duck (Cairina moschata),</span></li><li data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Domesticated ostrich (Struthio camelus),</span></li><li data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Domesticated peafowl (Pavo cristatus),</span></li><li data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Pigeons (Columba livia),</span></li><li data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Domesticated rhea (Rhea americana and Rhea pennata),</span></li><li data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Domestic swan goose (Anser cygnoides),</span></li><li data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Domestic turkey (Meleagris gallopavo) distinguished morphologically from wild turkeys,</span></li><li data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Predacious birds as defined in Wyoming Statute §23-1-101(i)(vii): English (house) sparrow (Passer domesticus) and starling (Sturnus vulgaris).</span></li></ul><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">(ii) Mammals</span></p><ul class="style-circle" data-dcnode-id="720"><li data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Domesticated alpaca (Lama pacos),</span></li><li data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Ass, burro, and donkey (Equus asinus),</span></li><li data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Bison (Bison bison); except those classified as wild bison by the Wyoming Game and Fish Commission and the Wyoming Livestock Board,</span></li><li data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Domesticated camel (Camelus bactrianus and Camelus dromedarius),</span></li><li data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Cat (Felis catus),</span></li><li data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Domestic cattle
