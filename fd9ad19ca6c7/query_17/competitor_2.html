 (Bos taurus and Bos indicus),</span></li><li data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Domesticated chinchilla (Chinchilla laniger),</span></li><li data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Dog (Canis familiaris),</span></li><li data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Domestic ferret (Mustela furo),</span></li><li data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Domesticated Mongolian gerbil (Meriones unguiculatus),</span></li><li data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Domestic goat (Capra hircus),</span></li><li data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Domesticated guinea pig (Cavia porcellus),</span></li><li data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Domesticated hamster (Mesocricetus auratus),</span></li><li data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Horse and pony (Equus caballus),</span></li><li data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Domesticated llama (Lama glama),</span></li><li data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Domesticated mouse (Mus musculus),</span></li><li data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Mule and hinny (Equus asinus x Equus caballus),</span></li><li data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Domesticated European rabbit (Oryctolagus cuniculus),</span></li><li data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Domesticated rat (Rattus norvegicus and Rattus rattus),</span></li><li data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Domestic sheep (Ovis aries), distinguished morphologically from wild sheep,</span></li><li data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Domestic swine (Sus domesticus),</span></li><li data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Domesticated vicuna (Vicugna vicugna),</span></li><li data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Domesticated yak (Bos grunniens).</span></li><li data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Predatory animals, excluding wolves and wolf hybrids, as defined in Wyoming Statute §23-1-101(a)(viii): coyote (Canis latrans), jackrabbit (Lepus townsendi and Lepus californicus), porcupine (Erethizon dorsatum), raccoon (Procyon lotor), red fox (Vulpes vulpes), skunk (Mephitis mephitis and Spilogale putorius). Wolves (Canis lupus) or wolf hybrids may not be possessed, imported or sold.</span></li></ul><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">(b) Live wildlife listed in this subsection (excluding any that are endangered or threatened), may be imported, possessed, confined or transported without securing a permit from the Department under this regulation as long as wildlife are held in compliance with appropriate Commission regulations and Wyoming Statutes. A certificate of veterinary inspection shall be issued prior to live wildlife listed in this subsection being imported into the State of Wyoming, unless otherwise specified in this regulation. The Wyoming Game and Fish Commission may consider an application for importation or possession of any animals listed in this subsection that are endangered or threatened by governmental entities, or institutions of higher education for education or research, or to meet Department wildlife management goals, when a need is demonstrated by the applicant.</span></p><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">?</span></p><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">POSSESSING WILDLIFE</span></p><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">A Guide to Understanding Wildlife Possession Laws and Regulations in Wyoming</span></p><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Wildlife conservation within Wyoming is the statutory responsibility of the Wyoming Game and Fish Commission and is implemented by the Wyoming Game and Fish Department. Scientific evidence clearly demonstrates that importation, possession, confinement, transportation, sale and disposition of wildlife may result in disease, genetic, ecological, environmental and other threats to Wyoming?s wildlife.</span></p><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">How Do I Use This Guide?</span></p><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">The chart on the following pages lists various species with associated information on whether or not they may be possessed and/or imported into the state of Wyoming and each species? Chapter 10 Permit requirements.</span></p><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Footnotes and comments incorporate some of the Wyoming Department of Heath and Wyoming Livestock Board rules. Please note that most animals must have a current veterinary health inspection certificate for transport across county or state lines. All game birds also require a Certificate of Origin prior to importation.</span></p><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Permit requirements may vary depending on the proposed use of the wildlife and whether the animal is to be imported into, or simply possessed in Wyoming.</span></p><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">?</span></p><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Wildlife Possession &amp; Importation Guide</span></p><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">This list is not intended to be an inclusive list of all wildlife species. If you have questions regarding the possession and/or importation of any species not delineated in this guide, please contact the nearest Game and Fish Office for additional information.</span></p><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Species ? Possession Allowed? ? Importation Allowed? ? WGFD Possession Permit ? WGFD Importation Permit ? Comments</span></p><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">?</span></p><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Fox, Gray ? Yes ? Yes ? Yes ? Yes ? None</span></p><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Fox, Red ? Yes ? No ? No ? N/A ? None</span></p><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Fox, Swift ? Yes ? Yes ? Yes ? Yes ? None</span></p></blockquote><p data-dcnode-id="678"><span data-dcnode-id="684" instrument_node="">Citation: </span><a data-dcnode-id="682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.umblr.com/redirect%3Fz%3Dhttp%253A%252F%252Fwgfd.wyo.gov%252Fweb2011%252FDepartments%252FHunting%252Fpdfs%252FRegulations_Ch10_Nov2010.pdf%26t%3DMmRhYmZmMDNjNWFiZDM2ZDc2N2MwNDViMjg5Y2VlOGQ4MWUzMTUzZCxLd3BZV1pIZw%253D%253D" id="37575099-2B07-4FCE-A7DA-CECDF78FA4B1"><span data-dcnode-id="683" instrument_node="">Wyoming Game and Fish Commission Chapter 10 Section 5</span></a><span data-dcnode-id="681" instrument_node="">,</span><a data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.umblr.com/redirect%3Fz%3Dhttp%253A%252F%252Fwgfd.wyo.gov%252Fweb2011%252FDepartments%252FHunting%252Fpdfs%252FRegulations_Ch10_Brochure.pdf%26t%3DODQwMmI1OTk0ZjAxNDgzZWZhZWQ0YWE3NmU5ODQyOTM2NTQwM2RiZCxLd3BZV1pIZw%253D%253D" id="96312B7A-5968-43F2-B813-A2FA3C2C56AB"><span data-dcnode-id="680" instrument_node="">Possessing Wildlife: A Guide to Understanding Wildlife Possession Laws and Regulations in Wyoming</span></a></p></div><span data-dcnode-id="676" instrument_node="">

</span><div class="webs-text" data-dcnode-id="254"><p data-dcnode-id="619"><span class="wz-bold" data-dcnode-id="644" style="color: rgb(22, 114, 219);"><span data-dcnode-id="645" instrument_node="">MANITOBA</span></span><br data-dcnode-id="643"><span data-dcnode-id="642" instrument_node="">Are foxes legal&nbsp;➝ NO</span><br data-dcnode-id="641"><span data-dcnode-id="640" instrument_node="">Person contacted on this matter&nbsp;➝ BLAIRE BARTA, legislative specialist of the Manitoba Conservation and Water Stewardship.</span><br data-dcnode-id="639"><span data-dcnode-id="638" instrument_node="">Contact (email/phone)&nbsp;➝&nbsp;</span><a data-dcnode-id="636" href="mailto:Blaire.Barta@gov.mb.ca" id="0D2F6F18-638C-4228-BB25-6D54CF1AFED7"><span data-dcnode-id="637" instrument_node="">Blaire.Barta@gov.mb.ca</span></a><span data-dcnode-id="635" instrument_node="">&nbsp;/ (204) 945-7749&nbsp;</span><br data-dcnode-id="634"><span data-dcnode-id="633" instrument_node="">Excerpts of our conversation&nbsp;➝ « In order for a person to possess domestic foxes in Manitoba, they would require a permit. However a permit would&nbsp;not&nbsp;be issued to a person to possess wildlife in Manitoba to keep as a pet, including Vulpes vulpes. »&nbsp;(the only legal way to possess a fox in Manitoba is if you are an accredited zoological facility, a wildlife rescue or a rehabilitation center).&nbsp;</span><br data-dcnode-id="632"><br data-dcnode-id="631"><span data-dcnode-id="630" instrument_node="">« With regards to Domestic Fennec Foxes, unfortunately these animals are not legal to own within the City of Winnipeg. As per City of Winnipeg Exotic Animal By-law 3389/83, no person, firm or corporation shall keep or harbour "All members of order Carnivora excepting domestic dogs (Canis familiaris), domestic cats (Felis catus) and ferrets. »&nbsp;(Dogs, cats, ferrets, fish, some reptiles (snakes and lizards), some amphibians, some birds and some rodents are the only allowed animals).</span><br data-dcnode-id="629"><br data-dcnode-id="628"><span data-dcnode-id="627" instrument_node="">Laws (The Wildlife Act of Manitoba)&nbsp;➝&nbsp;</span><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//web2.gov.mb.ca/laws/statutes/ccsm/w130e.php" id="721538CC-2150-448B-944A-800F7251877A"><span data-dcnode-id="626" instrument_node="">http://web2.gov.mb.ca/laws/statutes/ccsm/w130e.php</span></a><br data-dcnode-id="624"><span data-dcnode-id="623" instrument_node="">•&nbsp;&nbsp;</span><a data-dcnode-id="621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.winnipeg.ca/cms/animal/faqs/exotic_faq.stm" id="2F919548-8FEB-4B0F-A9DE-E34C836D2DC1"><span data-dcnode-id="622" instrument_node="">http://www.winnipeg.ca/cms/animal/faqs/exotic_faq.stm</span></a><span data-dcnode-id="620" instrument_node=""> </span></p><p data-dcnode-id="615"><span data-dcnode-id="618" instrument_node="">•&nbsp;</span><a data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.winnipeg.ca/CLKDMIS/DocExt/ViewDoc.asp%3FDocumentTypeId%3D1%26DocId%3D480" id="F27A1527-C35F-48F5-83A5-A49D86859B0B"><span data-dcnode-id="617" instrument_node="">http://www.winnipeg.ca/CLKDMIS/DocExt/ViewDoc.asp?DocumentTypeId=1&amp;DocId=480</span></a></p><p data-dcnode-id="613"><br data-dcnode-id="614"></p><p data-dcnode-id="576"><span class="wz-bold" data-dcnode-id="611" style="color: rgb(22, 114, 219);"><span data-dcnode-id="612" instrument_node="">SASKATCHEWAN</span></span><br data-dcnode-id="610"><span data-dcnode-id="609" instrument_node="">Are foxes legal&nbsp;➝ NO</span><br data-dcnode-id="608"><span data-dcnode-id="607" instrument_node="">Person contacted on this matter&nbsp;➝ PENNY LALONDE, licensing specialist of Ministry of Environment (fish and wildlife branch).</span><br data-dcnode-id="606"><span data-dcnode-id="605" instrument_node="">Contact (email/phone)&nbsp;➝&nbsp;</span><a data-dcnode-id="603" href="mailto:penny.lalonde@gov.sk.ca" id="D6B14253-4842-4D94-A800-1C59AC2D699E"><span data-dcnode-id="604" instrument_node="">penny.lalonde@gov.sk.ca</span></a><span data-dcnode-id="602" instrument_node="">&nbsp;/ 306-787-6218 /&nbsp;</span><a data-dcnode-id="600" href="mailto:KSAX@regina.ca" id="A9798D61-49FE-4001-BBE1-E83740F5F8D0"><span data-dcnode-id="601" instrument_node="">KSAX@regina.ca</span></a><br data-dcnode-id="599"><span data-dcnode-id="598" instrument_node="">Excerpts of our conversation&nbsp;➝ « All foxes are defined as wildlife whether it is native or exotic wildlife, it is still wildlife and there are legalities to owning one in captivity in Saskatchewan and a permit would be required to import and retain them in the province. The only permit issued by the Ministry of Environment that allows an individual to retain restricted wildlife in captivity is a Commercial Wildlife Permit for Zoo Purposes. »&nbsp;(so basically you have to own a whole entire zoo in order to have a fox. Not so tempting).</span><br data-dcnode-id="597"><br data-dcnode-id="596"><span data-dcnode-id="595" instrument_node="">« No, they are not legal to import or possess in captivity if you don't have the Zoo permit, but that implies that you should be owner or a zoo facility. There are different color phases of foxes, just as there are different color phases of the black bear but that does not change the genetics of the animal. It is considered wildlife and it is illegal to import or possess. »&nbsp;(all species of foxes, whether they display captive-bred colours or not, are unlawful to possess as pets).&nbsp;</span><br data-dcnode-id="594"><br data-dcnode-id="593"><span data-dcnode-id="592" instrument_node="">« Wildlife not listed in Section 3 of the Captive Wildlife Regulations may not be held in captivity without a licence/permit. »&nbsp;(foxes aren't listed, therefore illegal.)</span><br data-dcnode-id="591"><br data-dcnode-id="590"><span data-dcnode-id="589" instrument_node="">« Foxes are considered livestock, wild or otherwise, according to the attached bylaw.&nbsp;</span><br data-dcnode-id="588"><span data-dcnode-id="587" instrument_node="">Section 26 states: Prohibition Against Livestock</span><br data-dcnode-id="586"><span data-dcnode-id="585" instrument_node="">26 • No person shall keep livestock in any area of the City unless the livestock are kept as part of a public agricultural exhibition or exposition operation or agricultural fair. »</span><br data-dcnode-id="584"><br data-dcnode-id="583"><span data-dcnode-id="582" instrument_node="">Laws (The Captive Wildlife Regulations)&nbsp;➝&nbsp;</span><a data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.qp.gov.sk.ca/documents/English/Regulations/Regulations/W13-1R13.pdf" id="FC80C508-CC0B-4FD0-9930-698036AACD36"><span data-dcnode-id="581" instrument_node="">http://www.qp.gov.sk.ca/documents/English/Regulations/Regulations/W13-1R13.pdf</span></a><span data-dcnode-id="579" instrument_node="">&nbsp;(W-13.1 REG 18, part 3&nbsp;states ALL species that are allowed without a license. Other species require a zoo permit, which implies owning an accredited zoological facility or a&nbsp;wildlife farm).</span><br data-dcnode-id="578"><br data-dcnode-id="577"></p><p data-dcnode-id="552"><span class="wz-bold" data-dcnode-id="574" style="color: rgb(22, 114, 219);"><span data-dcnode-id="575" instrument_node="">NOVA SCOTIA</span></span><br data-dcnode-id="573"><span data-dcnode-id="572" instrument_node="">Are foxes legal&nbsp;➝ NO</span><br data-dcnode-id="571"><span data-dcnode-id="570" instrument_node="">Person contacted on this matter&nbsp;➝ BOB D. PETRIE, legislative specialist of the Wildlife and Natural Resources Division (fish &amp; wildlife branch).</span><br data-dcnode-id="569"><span data-dcnode-id="568" instrument_node="">Contact (email/phone)&nbsp;➝&nbsp;</span><a data-dcnode-id="566" href="mailto:PETRIERD@gov.ns.ca" id="621E1A37-52CB-4AE5-B0E3-E0716ACE5F83"><span data-dcnode-id="567" instrument_node="">PETRIERD@gov.ns.ca</span></a><span data-dcnode-id="565" instrument_node="">&nbsp;/ # unknown</span><br data-dcnode-id="564"><span data-dcnode-id="563" instrument_node="">Excerpts of our conversation&nbsp;➝ « In Nova Scotia, all foxes and other canids (except the domestic dog) are considered 'wildlife' and are therefore not permitted to be kept in captivity without special permission. Canids (except for the domestic dog) are not allowed to being kept as personal pets. » (unless you have special permission, which you could only receive by contacting PETRIERD@gov.ns.ca, you cannot legally possess a fox within the limits of the province of Nova Scotia).</span><br data-dcnode-id="562"><br data-dcnode-id="561"><span data-dcnode-id="560" instrument_node="">Laws (The Wildlife Act of Nova Scotia)&nbsp;➝&nbsp;&nbsp;</span><br data-dcnode-id="559"><span data-dcnode-id="558" instrument_node="">•&nbsp;</span><a data-dcnode-id="556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gov.ns.ca/natr/wildlife/laws/pdf/App2.pdf" id="03548DA2-4257-427D-BE21-4355371374FF"><span data-dcnode-id="557" instrument_node="">http://www.gov.ns.ca/natr/wildlife/laws/pdf/App2.pdf</span></a><span data-dcnode-id="555" instrument_node="">&nbsp;(wildlife legal to be owned as a&nbsp;pet without a permit. Wildlife not listed on the document linked previously may NOT be kept/imported as a pet within the province).</span><br data-dcnode-id="554"><br data-dcnode-id="553"></p><p data-dcnode-id="535"><span class="wz-bold" data-dcnode-id="550" style="color: rgb(22, 114, 219);"><span data-dcnode-id="551" instrument_node="">ALBERTA</span></span><br data-dcnode-id="549"><span data-dcnode-id="548" instrument_node="">Are foxes legal&nbsp;➝ NO (unless you apply for a permit to the Wildlife Ministries of Alberta and get an approbation).&nbsp;</span><br data-dcnode-id="547"><span data-dcnode-id="546" instrument_node="">Person contacted on this matter ➝ IVAN, from the 311 Services of the city of Edmonton.</span><br data-dcnode-id="545"><span data-dcnode-id="544" instrument_node="">Contact (email/phone)&nbsp;➝ Animal Services (780) 496-8860 /&nbsp;</span><a data-dcnode-id="542" href="mailto:311@edmonton.ca" id="7386BCEC-3EC9-477E-8F3A-9BBC24D03716"><span data-dcnode-id="543" instrument_node="">311@edmonton.ca</span></a><br data-dcnode-id="541"><br data-dcnode-id="540"><span data-dcnode-id="539" instrument_node="">Laws (The Wildlife Act of Alberta)&nbsp;➝&nbsp;</span><a data-dcnode-id="537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.qp.alberta.ca/documents/Acts/W10.pdf" id="F082BBFC-D6C3-419A-974C-33B492BB9961"><span data-dcnode-id="538" instrument_node="">http://www.qp.alberta.ca/documents/Acts/W10.pdf</span></a><br data-dcnode-id="536"></p><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node=""> </span></p><p data-dcnode-id="530"><span class="wz-bold" data-dcnode-id="531" style="color: rgb(22, 114, 219);"><br data-dcnode-id="532"></span></p><p data-dcnode-id="494"><span class="wz-bold" data-dcnode-id="528" style="color: rgb(22, 114, 219);"><span data-dcnode-id="529" instrument_node="">BRITISH COLUMBIA</span></span><br data-dcnode-id="527"><span data-dcnode-id="526" instrument_node="">Are foxes legal&nbsp;➝ YES (Permit must be given to you by the Wildlife and Game Preservation&nbsp;</span><span class="wz-italic" data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">before</span></span><span data-dcnode-id="523" instrument_node="">&nbsp;acquiring a red fox or arctic fox (including their captive-bred colour mutations), and your enclosure must be approved by the wildlife agents prior to welcoming the fox onto your property --- fennec foxes, grey foxes and other fox species non-native to BC can only be owned by a citizen holding a valid CAS "Controlled Alien Species" permit and whose enclosure is approved by the Fish &amp; Wildlife Ministries).&nbsp;</span><br data-dcnode-id="522"><span data-dcnode-id="521" instrument_node="">Person contacted on this matter&nbsp;➝ NURIE ALIPERTI, Wildlife and CAS Permit Administrator and KATE THOMPSON, manager at Media Relations.</span><br data-dcnode-id="520"><span data-dcnode-id="519" instrument_node="">Contact (email/phone)&nbsp;➝&nbsp;</span><a data-dcnode-id="517" href="mailto:Nurie.Aliperti@gov.bc.ca" id="473AFE79-E619-4171-A801-815CA2CFE91C"><span data-dcnode-id="518" instrument_node="">Nurie.Aliperti@gov.bc.ca</span></a><span data-dcnode-id="516" instrument_node="">&nbsp;/&nbsp;(250) 952 0681</span><br data-dcnode-id="515"><span data-dcnode-id="514" instrument_node="">Excerpts of our conversation&nbsp;➝ « Red, silver, arctic foxes are considered wildlife and you will require a permit given by the Wildlife and Game Preservation, &nbsp;to be in legal possession of that fox – regardless of whether it is wild or “domestic”. The permit is to be submitted before the animal's purchase, after which wildlife agents will come inspect your property and enclosure. If you don't meet the proper requirements for the enclosure the permit application will be canceled.&nbsp;»</span><br data-dcnode-id="513"><br data-dcnode-id="512"><span data-dcnode-id="511" instrument_node="">« Fennec fox (Vulpes zerda), the Grey fox, as well as other non-native species are members of the family&nbsp;Canidae&nbsp;and are therefore considered to be Controlled Alien Species and, as of April 1, 2010, a person in BC is required to hold a valid CAS permit in order to be in legal possession of it.&nbsp;»&nbsp;(you can have any non-native fox specie, as long as the Fish &amp; Wildlife Ministries approves your application for a&nbsp;CAS permit). There are enclosure requirements coming with this permit, however they are not as strict as the ones for red, silver and arctic foxes.</span><br data-dcnode-id="510"><span data-dcnode-id="509" instrument_node="">•&nbsp;CAS permit application &nbsp;</span><a data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.env.gov.bc.ca/pasb/applications/docs/cas-personal-permit.pdf" id="43FCA4D1-15D1-4545-BF8A-4984BB508583"><span data-dcnode-id="508" instrument_node="">http://www.env.gov.bc.ca/pasb/applications/docs/cas-personal-permit.pdf</span></a><span data-dcnode-id="506" instrument_node=""> </span><br data-dcnode-id="505"><br data-dcnode-id="504"><span data-dcnode-id="503" instrument_node="">Laws (List of Controlled Alien Species + The Wildlife Act of BC)&nbsp;➝&nbsp;</span><a data-dcnode-id="501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.env.gov.bc.ca/fw/wildlifeactreview/cas/pdf/common-all.pdf" id="370AB271-2C3C-4AD2-BBCF-D2CDB7133C6E"><span data-dcnode-id="502" instrument_node="">http://www.env.gov.bc.ca/fw/wildlifeactreview/cas/pdf/common-all.pdf</span></a><span data-dcnode-id="500" instrument_node="">&nbsp;(lists ALL the illegal-to-be-kept-as-pets species).</span><br data-dcnode-id="499"><span data-dcnode-id="498" instrument_node="">•&nbsp;</span><a data-dcnode-id="496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//vancouverhumanesociety.bc.ca/downloads/VHS%2520submission%2520to%2520review%2520of%2520BC%2520Wildlife%2520Act.pdf" id="CA70B45A-5E26-431B-B71D-68DE5FA55A13"><span data-dcnode-id="497" instrument_node="">http://vancouverhumanesociety.bc.ca/downloads/VHS%20submission%20to%20review%20of%20BC%20Wildlife%20Act.pdf</span></a><span data-dcnode-id="495" instrument_node=""> </span></p><p data-dcnode-id="481"><span data-dcnode-id="493" instrument_node="">(specifications about captive exotic animals</span><br data-dcnode-id="492"><span data-dcnode-id="491" instrument_node="">•&nbsp;</span><a data-dcnode-id="489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.env.gov.bc.ca/pasb/docs/wildlife_act/GeneralReg_Nov2005.pdf" id="F6FE3047-57B2-4F12-AD1F-D580A9A7A2D1"><span data-dcnode-id="490" instrument_node="">http://www.env.gov.bc.ca/pasb/docs/wildlife_act/GeneralReg_Nov2005.pdf</span></a><span data-dcnode-id="488" instrument_node=""> </span><br data-dcnode-id="487"><span data-dcnode-id="486" instrument_node="">&nbsp;Details concerning&nbsp;the CAS&nbsp;permit)&nbsp;</span><a data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.env.gov.bc.ca/fw/wildlifeactreview/cas/" id="880681FD-AE82-4625-98DA-30DDFFF5C7B9"><span data-dcnode-id="485" instrument_node="">http://www.env.gov.bc.ca/fw/wildlifeactreview/cas/</span></a><br data-dcnode-id="483"><br data-dcnode-id="482"></p><p data-dcnode-id="457"><span class="wz-bold" data-dcnode-id="479" style="color: rgb(22, 114, 219);"><span data-dcnode-id="480" instrument_node="">ONTARIO</span></span><br data-dcnode-id="478"><span data-dcnode-id="477" instrument_node="">Are foxes legal&nbsp;➝ YES (only&nbsp;non-native "exotic" species that are not endangered).</span><br data-dcnode-id="476"><span data-dcnode-id="475" instrument_node="">Person contacted on this matter&nbsp;➝ KATHY KIRKLAND, Captivity Biologist of Laws.</span><br data-dcnode-id="474"><span data-dcnode-id="473" instrument_node="">Contact (email/phone)&nbsp;➝&nbsp;</span><a data-dcnode-id="471" href="mailto:Kathy.Kirkland@ontario.ca" id="83743B3F-6D5D-43FE-9E3A-3AA403FC8E75"><span data-dcnode-id="472" instrument_node="">Kathy.Kirkland@ontario.ca</span></a><span data-dcnode-id="470" instrument_node="">&nbsp;/ (416) 338-7297</span><br data-dcnode-id="469"><span data-dcnode-id="468" instrument_node="">Excerpts of our conversation&nbsp;➝ « You may purchase and keep a non-native species of fox as a pet in Ontario. There is no provincial permit or license required for the keeping of non-native species as pets; however some municipalities prohibit ownership of foxes and other species as pets. »&nbsp;(like I stated in the description&nbsp;at the beginning of this page, you should always call and ask your municipality about the animal's legality in the city, before actually purchasing it. If your animal is not legal in the city and you get reported, it will be seized and most likely euthanized).</span><br data-dcnode-id="467"><br data-dcnode-id="466"><span data-dcnode-id="465" instrument_node="">« It is unlawful to keep the three species of fox native to Ontario as pets, as they are designated as specially protected wildlife under the Fish and Wildlife Conservation Act, 1997. This includes Arctic Fox (Alopex lagopus), Grey Fox (Urocyon cinereoargenteus) and Red Fox (Vulpes vulpes). »</span><br data-dcnode-id="464"><br data-dcnode-id="463"><span data-dcnode-id="462" instrument_node="">Laws (Wildlife Preservation +&nbsp;Municipalities Act)&nbsp;➝&nbsp;</span><a data-dcnode-id="460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mnr.gov.on.ca/en/Business/FW/2ColumnSubPage/STEL02_168424.html" id="A9E9CF41-E0BD-4FE5-B801-A4BD56099559"><span data-dcnode-id="461" instrument_node="">http://www.mnr.gov.on.ca/en/Business/FW/2ColumnSubPage/STEL02_168424.html</span></a><br data-dcnode-id="459"><br data-dcnode-id="458"></p><p data-dcnode-id="454"><span class="wz-bold" data-dcnode-id="455" style="color: rgb(22, 114, 219);"><span data-dcnode-id="456" instrument_node="">NEWFOUNDLAND</span></span></p><p data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Are foxes legal&nbsp;➝ NO</span></p><p data-dcnode-id="376"><span data-dcnode-id="451" instrument_node="">Person contacted on this matter&nbsp;➝ BRUCE RODRIGUES, Ecosystem Management Ecologist from the Depart. of Environment and Conservation (W.D.)</span><br data-dcnode-id="450"><span data-dcnode-id="449" instrument_node="">Contact (email/phone)&nbsp;➝&nbsp;</span><a data-dcnode-id="447" href="mailto:brucerodrigues@gov.nl.ca" id="E487CFB7-39C1-4428-B811-874DDFC32134"><span data-dcnode-id="448" instrument_node="">brucerodrigues@gov.nl.ca</span></a><span data-dcnode-id="446" instrument_node="">&nbsp;/ (709) 637-2050</span><br data-dcnode-id="445"><span data-dcnode-id="444" instrument_node="">Excerpts of our conversation&nbsp;➝ « If the species being considered is the Red fox (Vulpes vulpes) your request would likely be turned down, since we do not allow native wild species to be kept as pets. »</span><br data-dcnode-id="443"><br data-dcnode-id="442"><span data-dcnode-id="441" instrument_node="">«&nbsp;We will not be permitting fennec foxes as pets. &nbsp;This policy would be in line with the recommendations of the Pet Industry Joint Advisory Council of Canada, an organization which represents the pet industry in Canada. &nbsp;The only canid allowed for possession in Newfoundland and Labrador would be dogs.&nbsp;» (any other exotic non-native fox is illegal too).</span><br data-dcnode-id="440"><br data-dcnode-id="439"><span data-dcnode-id="438" instrument_node="">« The Arctic Fox will not be allowed as a pet. Native species are not allowed as pets. »&nbsp;(therefore red, grey, swift and arctic foxes aren't permitted either).</span><br data-dcnode-id="437"><br data-dcnode-id="436"><span data-dcnode-id="435" instrument_node="">Laws (The Wildlife Act of Newfoundland)&nbsp;➝&nbsp;</span><a data-dcnode-id="433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.assembly.nl.ca/Legislation/sr/Regulations/rc961156.htm%23SchedB_" id="1A7D8D75-E285-454B-9D4F-FCAE5CF51FA2"><span data-dcnode-id="434" instrument_node="">http://www.assembly.nl.ca/Legislation/sr/Regulations/rc961156.htm#SchedB_</span></a><span data-dcnode-id="432" instrument_node="">&nbsp;(lists all animals that can be legally brought and owned&nbsp;into the province without a permit. Foxes aren't part of the legal list, therefore, not legal to import nor own in the province of Newfoundland. Any animal not listed on that document cannot be imported/kept within the boundaries of the province).</span><br data-dcnode-id="431"><br data-dcnode-id="430"><span class="wz-bold" data-dcnode-id="428" style="color: rgb(22, 114, 219);"><span data-dcnode-id="429" instrument_node="">NEW BRUNSWICK</span></span><br data-dcnode-id="427"><span data-dcnode-id="426" instrument_node="">Are foxes legal&nbsp;➝ YES (but strictly captive-bred colours of the Red fox; they cannot be left to run free out of the owner's property).</span><br data-dcnode-id="425"><span data-dcnode-id="424" instrument_node="">Person contacted on this matter&nbsp;➝ Someone from Dep. of Natural Resources &amp; JACQUES DOIRON, by-law Enforcement Officer &amp; Emo Coordinator.</span><br data-dcnode-id="423"><span data-dcnode-id="422" instrument_node="">Contact (email/phone)&nbsp;➝&nbsp;</span><a data-dcnode-id="420" href="mailto:fw_pfweb@gnb.ca" id="2C431B04-F016-4DA8-BB37-AF6F4A12E2AF"><span data-dcnode-id="421" instrument_node="">fw_pfweb@gnb.ca</span></a><span data-dcnode-id="419" instrument_node="">&nbsp;/ (506) 453-3826 /&nbsp;</span><a data-dcnode-id="417" href="mailto:jdoiron@edmundston.ca" id="7C0827BA-3922-4B0E-92B2-2E91C353FDA2"><span data-dcnode-id="418" instrument_node="">jdoiron@edmundston.ca</span></a><span data-dcnode-id="416" instrument_node="">&nbsp;/ (506) 737-6707</span><br data-dcnode-id="415"><span data-dcnode-id="414" instrument_node="">Excerpts of our conversation&nbsp;➝ « It is not permitted to keep foxes or any canids, other than domestic dogs, as pets in New Brunswick. However, we make an exception for foxes presenting unusual colors that cannot be seen on wild specimens.&nbsp;»&nbsp;(wild foxes, wolves, all canid hybrids, jackals, coyotes [...] are illegal).</span><br data-dcnode-id="413"><br data-dcnode-id="412"><span data-dcnode-id="411" instrument_node="">« Foxes on Fox farms in New Brunswick are considered livestock, not pets, and fall under the jurisdiction of the Livestock Operations Act. »&nbsp;(New Brunswick fox farms don't sell live foxes to the general public; they can only sell pelts. They strictly sell - or trade - live fox&nbsp;to other fur farms or, in some cases, to legit zoological facilities. It is unlawful for them to sell a live fox to an individual that is not properly licensed or authorized to keep such animal in captivity in the province of NB).</span><br data-dcnode-id="410"><br data-dcnode-id="409"><span data-dcnode-id="408" instrument_node="">« You do not need a permit for the animal but, article 2c) of our municipal by-law respecting animal control (# 10R2011), says that all wild animals must be in a cage if it is in a public place, street or sidewalk. This means that you can own a fox but you must have it in a cage if you leave your premises. »&nbsp;(basically, you are allowed to have a fox,&nbsp;but you can only let it free at your property. If you decide to bring your fox in town or any other public places, you MUST lock it up in a cage).&nbsp;</span><br data-dcnode-id="407"><br data-dcnode-id="406"><span data-dcnode-id="405" instrument_node="">Laws (Exotic Wildlife Regulation)&nbsp;➝&nbsp;</span><a data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gnb.ca/0062/PDF-regs/92-74.pdf" id="3F0651F5-315A-4614-A9A0-3783E703D2A8"><span data-dcnode-id="404" instrument_node="">http://www.gnb.ca/0062/PDF-regs/92-74.pdf</span></a><span data-dcnode-id="402" instrument_node="">&nbsp;(Regulation 92-74 lists all species legal to be imported/kept as pets).&nbsp;</span><br data-dcnode-id="401"><br data-dcnode-id="400"><span class="wz-bold" data-dcnode-id="398" style="color: rgb(22, 114, 219);"><span data-dcnode-id="399" instrument_node="">PRINCE EDWARD ISLAND (PEI)</span></span><br data-dcnode-id="397"><span data-dcnode-id="396" instrument_node="">Are foxes legal&nbsp;➝ YES (only in Summerside's municipality though).</span><br data-dcnode-id="395"><span data-dcnode-id="394" instrument_node="">Person contacted on this matter&nbsp;➝ RICHARD COLLINS</span><br data-dcnode-id="393"><span data-dcnode-id="392" instrument_node="">Contact (email/phone)&nbsp;➝&nbsp;</span><a data-dcnode-id="390" href="mailto:rcollins@charlottetown.ca" id="43438F6F-B7AE-4E43-85F5-B175E56B8C1E"><span data-dcnode-id="391" instrument_node="">rcollins@charlottetown.ca</span></a><span data-dcnode-id="389" instrument_node="">&nbsp;/ 902 368 4683&nbsp;</span><br data-dcnode-id="388"><span data-dcnode-id="387" instrument_node="">Excerpts of our conversation&nbsp;➝ « To bring foxes into the province or to breed them you need a permit and to keep a fox in captivity&nbsp;may&nbsp;be a violation if you are not in possession of a permit authorizing you to do so. I would strongly suggest you contact Chuck Garrision at 902 368 4683 who is the Wildlife Captivity Officer for the Province. »</span><br data-dcnode-id="386"><br data-dcnode-id="385"><span data-dcnode-id="384" instrument_node="">SUMMERSIDE CITY ➝&nbsp;«&nbsp;...you can&nbsp;obtain an animal permit from the Animal Control Officer in order to&nbsp;keep/harbour these animals within the city + your adjacent neighbours will need to sign off as well.&nbsp;»&nbsp;(''your neighbours will need to sign off'' means they will have to sign an official contract (possibly your permit) which will be proof that they agreed to you having a fox in the neighbourhood - foxes scream and smell, things which could easily bother the neighbours in the long term. If they sign the contract/permit, they agree to tolerate the occasional disturbances that the fox will cause).&nbsp;</span><br data-dcnode-id="383"><br data-dcnode-id="382"><span data-dcnode-id="381" instrument_node="">Laws (The Wildlife Act of PEI)&nbsp;➝&nbsp;</span><a data-dcnode-id="379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gov.pe.ca/law/statutes/pdf/w-04_1.pdf" id="61C6FBC1-2113-4064-BE8C-B1DC3B511F66"><span data-dcnode-id="380" instrument_node="">http://www.gov.pe.ca/law/statutes/pdf/w-04_1.pdf</span></a><span data-dcnode-id="378" instrument_node="">&nbsp;(Summerside allows all federally legal fox species, as long as you are in possession of a provincial permit (contact Chuck Garrision for more information), an animal permit (given by the Animal Control Officer) and that you have the written consent of your neighbours to harbour such an animal in their surroundings).</span><br data-dcnode-id="377"></p><p data-dcnode-id="347"><br data-dcnode-id="375"><span class="wz-bold" data-dcnode-id="373" style="color: rgb(22, 114, 219);"><span data-dcnode-id="374" instrument_node="">NUNAVUT</span></span><br data-dcnode-id="372"><span data-dcnode-id="371" instrument_node="">Are foxes legal&nbsp;➝ NO (foxes are frequently trapped/hunted in Nunavut, and orphan kits are very commonly taken in by local residents and raised as companions or "pets" - no rescued fox has ever been seized for being illegally owned, however, we do not condone this kind of action as it could, one day, put the life of one fox in jeopardy. If you find an injured/orphan fox, please contact the Ministries of Wildlife of your territory to inquire what to do with the animal).</span><br data-dcnode-id="370"><span data-dcnode-id="369" instrument_node="">Person contacted on this matter&nbsp;➝ JIMMY KENNEDY, Coordinator of Regulations and Operations at the Department of Environment from the Wildlife Management Division.</span><br data-dcnode-id="368"><span data-dcnode-id="367" instrument_node="">Contact (email/phone)&nbsp;➝&nbsp;</span><a data-dcnode-id="365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faithfulfoxes.com/s/sitebuilder/pages/285091684/edit" id="EFC91959-5925-437F-8267-F7D82E013788"><span data-dcnode-id="366" instrument_node=""> </span></a><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefriendlyfox.webs.com/legality" id="A7097971-4D79-451E-A2BB-082475D8B44A"><span data-dcnode-id="364" instrument_node="">jikennedy@gov.nu.ca</span></a><span data-dcnode-id="362" instrument_node="">&nbsp; / &nbsp;(867) 934 2052</span><br data-dcnode-id="361"><span data-dcnode-id="360" instrument_node="">Excerpts of our conversation&nbsp;➝&nbsp;«&nbsp;Under the Nunavut Wildlife Act the fox species that are listed as “furbearers” include: Alopex (white fox and arctic fox) and Vulpes (red, cross, black and silver fox). Therefore if the species of fox you are looking at as a domestic pet falls into either of these then it would be considered a furbearer. It would also not be allowed to be imported into Nunavut or possessed in the Territory.&nbsp;»&nbsp;</span><span class="wz-italic" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">(native species of foxes, which are Red foxes and Arctic foxes [including their captive-bred colour mutations] cannot be legally possessed within the Territory).&nbsp;</span></span><br data-dcnode-id="357"><span data-dcnode-id="356" instrument_node="">Section 39 of the&nbsp;Wildlife Licence and Permits Regulations&nbsp;does not allow for the importation of live vertebrates that, in its natural range, is found wild in nature. So this would not allow Gray, Fennec, Bat-Earred, and Corsac foxes.&nbsp;»&nbsp;</span><span class="wz-italic" data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">(fox species which are not native to Nunavut aren't permitted either).</span></span><br data-dcnode-id="353"><br data-dcnode-id="352"><span data-dcnode-id="351" instrument_node="">Laws (The Wildlife Act of Nunavut)&nbsp;➝&nbsp;</span><a data-dcnode-id="349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bcmanr.ca/files/Nunavut_Wildlife_Act.pdf" id="B02B1A9E-CD8C-4834-8A9F-6263B322A766"><span data-dcnode-id="350" instrument_node="">http://www.bcmanr.ca/files/Nunavut_Wildlife_Act.pdf</span></a><br data-dcnode-id="348"></p><p data-dcnode-id="327"><br data-dcnode-id="346"><span class="wz-bold" data-dcnode-id="344" style="color: rgb(22, 114, 219);"><span data-dcnode-id="345" instrument_node="">NORTHWEST TERRITORIES (N.W.T)</span></span><br data-dcnode-id="343"><span data-dcnode-id="342" instrument_node="">Are foxes legal&nbsp;➝ YES (all federally legal species of foxes can be owned in N.W.T. if you are given a permit by the Deputy Minister and go through the application process, which includes the submission of a health certificate for the fox indicating the animal is in good health, given by a licensed veterinarian).&nbsp;</span><br data-dcnode-id="341"><span data-dcnode-id="340" instrument_node="">Person contacted on this matter&nbsp;➝&nbsp;MARK HEYCK, Mayor of the City of Yellowknife.</span><br data-dcnode-id="339"><span data-dcnode-id="338" instrument_node="">Contact (email/phone)&nbsp;➝&nbsp;</span><a data-dcnode-id="336" href="mailto:mheyck@yellowknife.ca" id="DA7C3002-EFCB-43AB-B7A6-6B3A6B47FB46"><span data-dcnode-id="337" instrument_node="">mheyck@yellowknife.ca</span></a><span data-dcnode-id="335" instrument_node="">&nbsp;&nbsp;/ &nbsp;(867) 920-5693</span><br data-dcnode-id="334"><span data-dcnode-id="333" instrument_node="">Excerpts of our conversation&nbsp;➝&nbsp;&nbsp;«&nbsp;Anyone wishing to import live wildlife into the NWT must first go through an application process and obtain a permit. The application requires submission of a health certificate from a licensed veterinarian indicating the animal is in good condition and free of diseases, parasites, etc. Once the application is received, it is evaluated and a determination is made by the Deputy Minister on whether or not to issue the permit.&nbsp;»&nbsp;(Permit can be picked up at the ENR north slave office near the old Johnson's Building Supply location).</span><br data-dcnode-id="332"><br data-dcnode-id="331"><span data-dcnode-id="330" instrument_node="">Laws&nbsp;➝ from the Department of Environment and Natural Ressources.</span><br data-dcnode-id="329"><br data-dcnode-id="328"></p><p data-dcnode-id="292"><span class="wz-bold" data-dcnode-id="325" style="color: rgb(22, 114, 219);"><span data-dcnode-id="326" instrument_node="">YUKON TERRITORIES (YUKON)</span></span><br data-dcnode-id="324"><span data-dcnode-id="323" instrument_node="">Are foxes legal&nbsp;➝ YES (however, being approved is incredibly hard; you have to email a request to own captive wildlife to the government of Yukon&nbsp;- see request below - &nbsp;and send it to the township of Whitehorse by email).</span><br data-dcnode-id="322"><span data-dcnode-id="321" instrument_node="">Person contacted on this matter&nbsp;➝ DAVID BAKICA, District Conservation Officer.</span><br data-dcnode-id="320"><span data-dcnode-id="319" instrument_node="">Contact (email/phone)&nbsp;➝&nbsp;</span><a data-dcnode-id="317" href="mailto:David.Bakica@gov.yk.ca" id="396586F5-7F46-4ECA-A2C4-F95C3A23C655"><span data-dcnode-id="318" instrument_node="">David.Bakica@gov.yk.ca</span></a><span data-dcnode-id="316" instrument_node="">&nbsp;/ (867) 393-7078</span><br data-dcnode-id="315"><span data-dcnode-id="314" instrument_node="">Excerpts of our conversation&nbsp;➝ « All of the animals you describe in your original e-mail would be considered Wildlife under or legislation. At this time there is a moratorium on captive wildlife in the Yukon and new regulations are going to be created regarding captive wildlife. I do not believe regulations are even in the draft stage yet so likely they will not be in place for several years at least. »&nbsp;(currently in the process of debating new laws regarding captive wildlife - to be updated when the results are publicly released).</span><br data-dcnode-id="313"><br data-dcnode-id="312"><span data-dcnode-id="311" instrument_node="">« To be clear, any of the foxes you describe are considered Wildlife under our legislation, and it would be illegal to have any of them alive in captivity in Yukon.»</span><br data-dcnode-id="310"><br data-dcnode-id="309"><span data-dcnode-id="308" instrument_node="">Laws (The Wildlife Act of Yukon)&nbsp;➝&nbsp;</span><a data-dcnode-id="306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gov.yk.ca/legislation/acts/wildlife.pdf" id="4E0D851F-A86F-48EC-A54C-48B90ACDA608"><span data-dcnode-id="307" instrument_node="">http://www.gov.yk.ca/legislation/acts/wildlife.</span></a><br data-dcnode-id="305"><br data-dcnode-id="304"><span data-dcnode-id="303" instrument_node="">Here’s the request that must be completed in order to see if the government accepts your exotic pet.</span><br data-dcnode-id="302"><span data-dcnode-id="301" instrument_node="">134. Every owner of an exotic animal shall register their animal with the City by providing the following information for each exotic animal that is under their care :</span><br data-dcnode-id="300"><span data-dcnode-id="299" instrument_node="">(1) Name, street address, postal code and telephone number of the owner;</span><br data-dcnode-id="298"><span data-dcnode-id="297" instrument_node="">(2) Name and description of the exotic animal; and</span><br data-dcnode-id="296"><span data-dcnode-id="295" instrument_node="">(3) Such other information as may be required by the City (picture of animal, age, health certificate, etc...).</span><br data-dcnode-id="294"><br data-dcnode-id="293"></p><p data-dcnode-id="255"><span class="wz-bold" data-dcnode-id="290" style="color: rgb(22, 114, 219);"><span data-dcnode-id="291" instrument_node="">QUÉBEC</span></span><br data-dcnode-id="289"><span data-dcnode-id="288" instrument_node="">Are foxes legal&nbsp;➝ YES&nbsp;(only Vulpes vulpes [Red fox], Vulpes lagopus [Arctic fox] and their hybrids [Red fox/Arctic fox cross]) specimens that are easily distinguishable from wild foxes by their size, colour or shape).&nbsp;</span><span class="wz-bold" data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Seuls les renards roux (Vulpes vulpes), renards arctiques (Vulpes lagopus) et leurs hybrides qui ne sont pas roux en couleur sont légaux, par exemple, le renard platine, marble, cannelle, argenté, etc.&nbsp;</span></span><br data-dcnode-id="285"><span data-dcnode-id="284" instrument_node="">Person contacted on this matter&nbsp;➝ ALAIN CHAINÉ, legislative specialist of the Ministries of Wildlife and Environment.</span><br data-dcnode-id="283"><span data-dcnode-id="282" instrument_node="">Contact (email/phone)&nbsp;➝&nbsp;</span><a data-dcnode-id="280" href="mailto:alain.chaine@mrnf.gouv.qc.ca" id="CCB23EAE-5E9F-4A30-9CC0-9CEE875C9CD8"><span data-dcnode-id="281" instrument_node="">alain.chaine@mrnf.gouv.qc.ca</span></a><span data-dcnode-id="279" instrument_node="">&nbsp;/ (418) 521-3888 post 7384</span><br data-dcnode-id="278"><span data-dcnode-id="277" instrument_node="">Excerpts of our conversation&nbsp;➝ « La Loi sur la conservation et la mise en valeur de la faune, et particulièrement le Règlement sur les animaux en captivité, interdit la garde d’un renard (Vulpes vulpes) comme animal de compagnie et la possession à des fins personnelles.&nbsp;»&nbsp;</span><br data-dcnode-id="276"><br data-dcnode-id="275"><span data-dcnode-id="274" instrument_node="">« Par contre, certains spécimens de renard se distinguent facilement part leur taille, forme ou couleur des individus sauvages qu’on pourrait voir en nature. Ces spécimens ne correspondraient alors pas à la définition du mot animal de la Loi et pourraient être gardés en captivité comme animal de compagnie. » (Red foxes that can easily be distinguished from wild foxes by their size [some captive-bred foxes can weight up to 35 pounds, while the average wild fox weighs 8-12 pounds], their shape [tailless fox, floppy ears, curly tail...] and their colour [captive-bred colours such as marble, platinum, cinnamon, amber, pearl, white faced...] can be legally possessed within the province without a permit).&nbsp;</span><br data-dcnode-id="273"><span data-dcnode-id="272" instrument_node="">Therefore, all captive-bred colours which are easily distinguishable from the native colour (red) are legal. Foxes which can be distinguished from wild foxes by their shape (floppy ears, curly tail, etc.) can be legally possessed, even if they are red - because their shape does not correspond that of a typical wild fox.&nbsp;</span><br data-dcnode-id="271"><br data-dcnode-id="270"><span data-dcnode-id="269" instrument_node="">Laws (Loi sur la conservation et la mise en valeur de la faune)&nbsp;➝&nbsp;</span><a data-dcnode-id="267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www2.publicationsduquebec.gouv.qc.ca/dynamicSearch/telecharge.php%3F%26file%3D/C_61_1/C61_1R5.HTM" id="B5D1FF38-5DCB-482B-8ABA-6D8976BFFFC4"><span data-dcnode-id="268" instrument_node="">http://www2.publicationsduquebec.gouv.qc.ca/dynamicSearch/telecharge.php?&amp;file=/C_61_1/C61_1R5.HTM</span></a><br data-dcnode-id="266"><span data-dcnode-id="265" instrument_node="">English version&nbsp;➝&nbsp;</span><a data-dcnode-id="263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canlii.org/en/qc/laws/stat/rsq-c-c-61.1/latest/rsq-c-c-61.1.html" id="1F9A7818-6CE4-4C96-BEF7-CABE0D1112EC"><span data-dcnode-id="264" instrument_node="">http://www.canlii.org/en/qc/laws/stat/rsq-c-c-61.1/latest/rsq-c-c-61.1.html&nbsp;</span></a><br data-dcnode-id="262"><br data-dcnode-id="261"><span data-dcnode-id="260" instrument_node="">Magog&nbsp; : You need a permit issued by the Ministries of Wildlife &amp; Environment, if some measures are respected.</span><br data-dcnode-id="259"><span data-dcnode-id="258" instrument_node="">Gatineau, Saint-Jean-sur-Richelieu, Sainte-Hyacinthe : Foxes are illegal to own in the limits of these cities.</span><br data-dcnode-id="257"><span data-dcnode-id="256" instrument_node="">Not all cities in Quebec accept foxes as pets. Make sure you contact your city to find out whether foxes are legal or not to own there, and don't forget to have written proof that they are indeed legal.&nbsp;</span></p></div><span data-dcnode-id="253" instrument_node="">

</span><div class="webs-text" data-dcnode-id="222"><p data-dcnode-id="230"><span data-dcnode-id="231" style="font-size: 10px;"><span data-dcnode-id="232" instrument_node="">Source Accessed and Modified, Chart, 5/28/2010; www.bornfreeusa.org/b4a2_exotic_animals_map.php</span></span></p><p data-dcnode-id="228" style="font-size: 10px;"><span data-dcnode-id="229" instrument_node="">Source Accessed and Modified, State Laws, 3/13/2016;&nbsp;www.theartfulfox.tumblr.com</span></p><p data-dcnode-id="225"><span data-dcnode-id="226" style="font-size: 10px;"><span data-dcnode-id="227" instrument_node="">Source Accessed and Modified, Laws, 3/13/2016; www.livingwithfoxes.weebly.com</span></span></p><span data-dcnode-id="224" instrument_node=""> </span><span data-dcnode-id="223" id=""></span></div><span data-dcnode-id="221" instrument_node="">
