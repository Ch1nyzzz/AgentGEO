368" instrument_node="">(W) ?Fur-bearing animals? includes minks, weasels, raccoons, skunks, opossums, muskrats, fox, beavers, badgers, otters, coyotes, and bobcats.</span></p><p data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">?</span></p><p data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">1533.71 License to raise or keep game birds and animals.</span></p><p data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">(A) Unless otherwise provided in this section or by division rule, any person desiring to engage in the business of raising and selling game birds, game quadrupeds, reptiles, amphibians, or fur-bearing animals in a wholly enclosed preserve of which the person is the owner or lessee, or to have game birds, game quadrupeds, reptiles, amphibians, or fur-bearing animals in captivity, shall submit an application to the division of wildlife for a license to do so. This section does not apply to a person who possesses wild animals under the authority of a license for a wild animal hunting preserve or a commercial bird shooting preserve.</span></p><p data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">The division, when it appears that the application is made in good faith and the applicant is in compliance with division (B) of this section, if applicable, and upon the payment of the fee for each license, may issue to the applicant any of the following licenses that may be applied for:</span></p><p data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">?</span></p><p data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">(2) ?Noncommercial propagating license? permitting the licensee to propagate game birds, game quadrupeds except captive white-tailed deer, reptiles, amphibians, or fur-bearing animals and to hold the animals in captivity. Game birds, game quadrupeds except captive white-tailed deer, reptiles, amphibians, and fur-bearing animals propagated or held in captivity by authority of a noncommercial propagating license are for the licensee?s own use and shall not be sold. The fee for such a license is twenty-five dollars per annum.</span></p><p data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">?</span></p><p data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">1533.77 Records of game held by a licensee; display of license.</span></p><p data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">(A) Each holder of a noncommercial or commercial propagating license issued under section 1533.71 of the Revised Code shall keep the license prominently displayed at the place of business specified in the license, and shall keep accurate written records that shall include the total number of game birds, game quadrupeds, or fur-bearing animals possessed on the date of application for the license, the number subsequently propagated or acquired by purchase or gift, the number that escaped, the number that were released, the number that died, and the name and address of each person or corporation from whom or to whom game birds, game quadrupeds or fur-bearing animals were received as a gift or given as a gift or purchased or sold alive or sold for food, and the date of each transaction. These records shall be kept permanently on the premises stated in the license, and shall be open for inspection by any authorized representative of the division of wildlife at all reasonable times.</span></p><p data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">(B) Each holder of a captive white-tailed deer propagation license issued under section 1533.71 of the Revised Code shall maintain all records that are required in rules adopted under section 943.24 of the Revised Code. The records shall be kept permanently on the premises stated in the license and shall be open for inspection by any authorized representative of the department of agriculture at all reasonable times and of the division of wildlife at all reasonable times in conjunction with an active criminal investigation.</span></p><p data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">© The holder of a captive white-tailed deer propagation license shall not knowingly falsify any record or tag that is required in rules adopted under section 943.24 of the Revised Code or in rules adopted under section 1531.10 of the Revised Code.</span></p></blockquote><p data-dcnode-id="2340"><span data-dcnode-id="2343" instrument_node="">Citation:&nbsp;</span><a data-dcnode-id="2341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.umblr.com/redirect%3Fz%3Dhttp%253A%252F%252Fwww.dnr.state.oh.us%252FPortals%252F9%252Fpdf%252Fpub306.pdf%26t%3DZmExM2Y3MDAyZDk4Y2E5YTI0NWM1YWYxY2EyN2YyZWI3ZjhlYjg1YyxCcHo5aG1rTw%253D%253D" id="40D5B6B4-93DA-4234-B73C-A42328370716"><span data-dcnode-id="2342" instrument_node="">Ohio Department of Natural Resources Division of Wildlife</span></a></p><p data-dcnode-id="2337"><span class="wz-bold" data-dcnode-id="2338"><br data-dcnode-id="2339"></span></p><p data-dcnode-id="2334" style="color: rgb(22, 114, 219);"><span class="wz-bold" data-dcnode-id="2335" style="color: rgb(22, 114, 219);"><span data-dcnode-id="2336" instrument_node="">OKLAHOMA</span></span></p><p data-dcnode-id="2330"><span class="wz-bold" data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node=""> To put it simply:</span></span><span data-dcnode-id="2331" instrument_node=""> yes, foxes are legal in Oklahoma.</span></p><p data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="2325"><li data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">A&nbsp;non-commercial breeder?s license is required for foxes, except fennec foxes (Vulpes zerda), which are&nbsp;exempt from import and export permits, commercial wildlife breeders licenses, noncommercial wildlife breeders licenses and commercial hunting area license requirements.</span></li></ul><p data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="2232"><p data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">APPLICATION FOR NON-COMMERCIAL WILDLIFE BREEDER?S LICENSE</span></p><p data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">There are two types of licenses for breeding birds or animals. With both licenses, you can legally breed only purchased animals and you must have receipts of the purchases of the breeding stock. Also, with both licenses, you need to have the facility built, inspected by the warden of the county in which the facility is located, and have your license in hand before purchasing your breeding stock. Renewal forms for both licenses are mailed to the breeders during late June.</span></p><p data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">The commercial breeder? s license is purchased when the breeder wants to sell the birds or animals he raises or his stock. The license is $48.00 annually and needs to be renewed by July lst.With the commercial license, the breeder is given a two-carbon page sales receipt to use when he sells his animals; one carbon copy for the breeder?s files, one carbon copy to mail to this office and the original to go to the purchaser. An annual report form is completed by the breeder at the end of the year and is mailed to this office giving all the details or purchase, sales, deaths and births of animals being raised for that year.</span></p><p data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">The non-commercial breeder?s license is purchased when the breeder wants to raise animals for his or her own consumption, keep as a pet, or to release with permission of landowner. This license is $10.00 annually and need to be renewed by July 1. An annual report and sales receipts aren?t necessary since there is no sale of animals.</span></p><p data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">If a person intends to purchase animals from out-of-state to breed, he or she will need an import and breeder?s license from the Law Enforcement Division before importing the animals. I have a schedule that?s show which animals require an import permit from ODWC or the Agriculture Department and a breeder?s license from the Oklahoma Department of Wildlife Conservation.</span></p><p data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">?</span></p><p data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">800:25-25-3. Exemptions</span></p><p data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">(a)&nbsp;&nbsp;&nbsp;&nbsp;The following wildlife species are exempt from import and export permits, commercial wildlife breeders licenses, noncommercial wildlife breeders licenses and commercial hunting area license requirements.</span></p><p data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">(1)&nbsp;&nbsp;&nbsp;&nbsp;Alpacas, guanacos and vicuans (all similar to llamas).</span></p><p data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">(2)&nbsp;&nbsp;&nbsp;&nbsp;Bison.</span></p><p data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">(3)&nbsp;&nbsp;&nbsp;&nbsp;Camels.</span></p><p data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">(4)&nbsp;&nbsp;&nbsp;&nbsp;Cats (except native cats and bears).</span></p><p data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">(5)&nbsp;&nbsp;&nbsp;&nbsp;Cattle (Bos sp.)</span></p><p data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">(6)&nbsp;&nbsp;&nbsp;&nbsp;Chickens (domestic fowl, including guineas).</span></p><p data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">(7)&nbsp;&nbsp;&nbsp;&nbsp;Chinchillas.</span></p><p data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">(8)&nbsp;&nbsp;&nbsp;&nbsp;Dogs (except coyotes and native foxes).</span></p><p data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">(9)&nbsp;&nbsp;&nbsp;&nbsp;Exotic tropical fish (except those prohibited from import or possession by Commission regulation or statute)</span></p><p data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">(10)&nbsp;&nbsp;&nbsp;&nbsp;Ferrets (except black-footed, Mustela nigripes).</span></p><p data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">(11)&nbsp;&nbsp;&nbsp;&nbsp;Gerbils.</span></p><p data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">(12)&nbsp;&nbsp;&nbsp;&nbsp;Goats</span></p><p data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">(13)&nbsp;&nbsp;&nbsp;&nbsp;Guinea pigs.</span></p><p data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">(14)&nbsp;&nbsp;&nbsp;&nbsp;Hamsters.</span></p><p data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">(15)&nbsp;&nbsp;&nbsp;&nbsp;Hedgehogs.</span></p><p data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">(16)&nbsp;&nbsp;&nbsp;&nbsp;Horse, donkeys and mules.</span></p><p data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">(17)&nbsp;&nbsp;&nbsp;&nbsp;Llamas.</span></p><p data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">(18)&nbsp;&nbsp;&nbsp;&nbsp;Mice (except those species normally found in the wild).</span></p><p data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">(19)&nbsp;&nbsp;&nbsp;&nbsp;Native invertebrates (except crayfish and all freshwater mussels including Zebra mussel and Asian clam).</span></p><p data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">(20)&nbsp;&nbsp;&nbsp;&nbsp;Peafowl.</span></p><p data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">(21)&nbsp;&nbsp;&nbsp;&nbsp;Pigeons.</span></p><p data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">(22)&nbsp;&nbsp;&nbsp;&nbsp;Migratory waterfowl not listed as protected by Federal Regulation 50 CFR.</span></p><p data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">(23)&nbsp;&nbsp;&nbsp;&nbsp;Pigs except javelinas.</span></p><p data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">(24)&nbsp;&nbsp;&nbsp;&nbsp;Rabbits (except cottontails, jackrabbits and swamp rabbits, and other such species normally found in the wild).</span></p><p data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">(25)&nbsp;&nbsp;&nbsp;&nbsp;Rats (except those species normally found in the wild).</span></p><p data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">(26)&nbsp;&nbsp;&nbsp;&nbsp;Salt water crustaceans and mollusks (import for human consumption).</span></p><p data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">(27)&nbsp;&nbsp;&nbsp;&nbsp;Sheep (except dall and bighorn sheep, Ovis sp.).</span></p><p data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">(28)&nbsp;&nbsp;&nbsp;&nbsp;Turkeys (except Rio Grande, Eastern, Merriam and Osceola or any subspecies).</span></p><p data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">(29)&nbsp;&nbsp;&nbsp;&nbsp;Zebras.</span></p><p data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">(30)&nbsp;&nbsp;&nbsp;&nbsp;Gerboa.</span></p><p data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">(31)&nbsp;&nbsp;&nbsp;&nbsp;Sugar gliders</span></p><p data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">(32)&nbsp;&nbsp;&nbsp;&nbsp;Civits.</span></p><p data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">(33)&nbsp;&nbsp;&nbsp;&nbsp;Wallaby.</span></p><p data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">(34)&nbsp;&nbsp;&nbsp;&nbsp;Kangaroo.</span></p><p data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">(35)&nbsp;&nbsp;&nbsp;&nbsp;Fennec Fox.</span></p><p data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">(36)&nbsp;&nbsp;&nbsp;&nbsp;Coatimundi.</span></p><p data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">(37)&nbsp;&nbsp;&nbsp;&nbsp;Primates.</span></p></blockquote><p data-dcnode-id="2227"><span data-dcnode-id="2231" instrument_node="">Citation: </span><a data-dcnode-id="2229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.umblr.com/redirect%3Fz%3Dhttp%253A%252F%252Fwww.wildlifedepartment.com%252Flawforms%252Fnoncommercialbreeder.pdf%26t%3DYzUxYjE1N2YwYjc1ZTFjMzE2ZmZjYTI2YzQzZjVlNmViOThiZTQ5NywwcHFBY0VMbw%253D%253D" id="753E21C9-F19A-4478-8100-46DE8183CFFD"><span data-dcnode-id="2230" instrument_node="">Application for Non-Commercial Wildlife Breeder?s License</span></a><span data-dcnode-id="2228" instrument_node="">; OK ADC&nbsp;800:25-25-3</span></p><p data-dcnode-id="2225"><br data-dcnode-id="2226"></p><p data-dcnode-id="2222"><span class="wz-bold" data-dcnode-id="2223" style="color: rgb(22, 114, 219);"><span data-dcnode-id="2224" instrument_node="">OREGON</span></span></p><p data-dcnode-id="2216"><span class="wz-bold" data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">To put it simply: </span></span><span data-dcnode-id="2217" instrument_node="">no, foxes are not legal in Oregon.</span></p><p data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="2209"><li data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">Native foxes, red foxes (Vulpes Vulpes) and gray foxes (Urocyon cinereoargenteus), require a fur farm permit. With a fur farm permit, you must have 10 or more foxes and you must raise them for commercial profit.</span></li><li data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Any animal that is not listed as regulated, non-regulated, prohibited or domestic are to be treated as prohibited, which would prohibit all nonnative and exotic fox species.</span></li></ul><p data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="2178"><p data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">635-056-0010</span></p><p data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">Definitions</span></p><p data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">?</span></p><p data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">(3) ?Commercial Fur Farm? means any operation which raises captive fox (Vulpes vulpes or Urocyon cinereoargenteus) or mink (Mustela vison) for profit and possesses 10 or more animals.</span></p><p data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">?</span></p><p data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">(6) Except where used in reference to ORS chapter 609, ?Exotic? means a wildlife species not native to Oregon; foreign or introduced.</span></p><p data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">?</span></p><p data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">635-056-0050</span></p><p data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">Prohibited Species</span></p><p data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">(1) Except as otherwise provided in these rules or other rules of the commission, live wildlife listed below may not be imported, possessed, sold, purchased, exchanged or transported in the state:</span></p><p data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">(a) Prohibited Mammals: Common Name ? Family ? Genus/species:</span></p><p data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">?</span></p><p data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">(B) Order Carnivora:</span></p><p data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">(i) Wild canids ? Canidae ? All native species. However, fox (Vulpes vulpes and Urocyon cinereoargenteus) are exempt from this prohibitition if when part of a commercial fur farming operation or for wildlife rehabilitation purposes by a licensed wildlife rehabilitator;</span></p></blockquote><p data-dcnode-id="2174"><span data-dcnode-id="2177" instrument_node="">Citation:&nbsp;OR CODE&nbsp;635-056-0010 &amp;&nbsp;635-056-0050;&nbsp;</span><a data-dcnode-id="2175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.umblr.com/redirect%3Fz%3Dhttp%253A%252F%252Fwww.oregonlive.com%252Fnews%252Findex.ssf%252F2009%252F03%252Fsenate_passes_dangerous_pets_b.html%26t%3DMzc1OTE2ZmI2ZDFlMjAxY2JiMjk3YWM5NWFkODNhYWJmOGZmOWQ0NyxJaEtCUFJGVg%253D%253D" id="66F77915-3441-41F7-94D1-45C80BCB65DB"><span data-dcnode-id="2176" instrument_node="">OR S.B. 391</span></a></p><p data-dcnode-id="2172"><br data-dcnode-id="2173"></p><p data-dcnode-id="2169"><span class="wz-bold" data-dcnode-id="2170" style="color: rgb(22, 114, 219);"><span data-dcnode-id="2171" instrument_node="">PENNSYLVANIA</span></span></p><p data-dcnode-id="2163"><span class="wz-bold" data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">To put it simply:</span></span><span data-dcnode-id="2164" instrument_node=""> yes, foxes are legal in Pennsylvania, but?</span></p><p data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="2156"><li data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">In order to get a permit, you must&nbsp;have at least two years of experience with foxes (other exotics will not count), a letter from someone who already has a permit that will confirm your experience, and an enclosure built to the PGC?s specifications</span></li><li data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">The PCG is extremely difficult to deal with. According to a Pennsylvanian fox owner, they are no longer giving out permits.</span></li></ul><p data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="2051"><p data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">§&nbsp;147.281.&nbsp;Scope.</span></p><p data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">&nbsp;(a)&nbsp;&nbsp;General and definitions.This subchapter relates to safeguards for public safety, humane care and treatment, adequate housing and nutrition, sanitation, safety, acquisition and disposal of wildlife and exotic wildlife held as part of a menagerie under the act or this part. Definitions contained in section 2961 of the act (relating to definitions) apply to this subchapter.</span></p><p data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">&nbsp;(b)&nbsp;&nbsp;Confinement.It is unlawful to maintain wildlife, in confinement, in an unsanitary or unsafe condition or in a manner which results in maltreatment, mistreatment or neglect. No wildlife may be confined in a pen, cage or enclosure which does not meet minimum pen specifications in this subchapter. An animal may not be chained or tethered, or otherwise impeded from moving freely within a cage or enclosure unless otherwise indicated on the permit.</span></p><p data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">&nbsp;©&nbsp;&nbsp;Housing.Wildlife maintained under section 2964 of the act (relating to menagerie permits) shall be housed in a safe and sanitary manner. Failure to provide sanitary surroundings for wildlife, or failure to adequately protect the public from wildlife possessed under this subchapter is a violation.</span></p><p data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">&nbsp;(d)&nbsp;&nbsp;Bill of sale.It is unlawful for a person to possess wildlife, for the purpose of exhibition, except as provided in this subchapter, without having a bill of sale or other documentary evidence showing the name and address of the supplier of the wildlife.</span></p><p data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">&nbsp;(e)&nbsp;&nbsp;Permit.The menagerie permit shall be produced upon demand of an officer of the Commission.</span></p><p data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">&nbsp;(f)&nbsp;&nbsp;Citizenship.Menagerie permits may be issued to a person who is a citizen of the United States.</span></p><p data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">&nbsp;(g)&nbsp;&nbsp;Experience required.A new applicant for a menagerie permit shall provide documentation of at least 2 years experience of hands-on work with the designated species, including care, feeding, handling, training and husbandry. This experience shall be from a recognized/approved facility and the owner, manager or licensee of this facility shall provide a letter of reference.</span></p><p data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">?</span></p><p data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">§ 147.282. Safety.</span></p><p data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">&nbsp;(a)&nbsp;&nbsp;Cage construction shall be sufficiently strong to contain the wildlife and to protect the animal from injury from other specimens on exhibit. Caging determined unsafe by Commission personnel shall be reconstructed as directed. Reconstruction shall be completed and approved within 30 days after official notification from the Commission.</span></p><p data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">&nbsp;(b)&nbsp;&nbsp;Except as provided in subsections © and (d), wildlife may not be removed from cages or directly exposed to the public. Safety barriers shall be present to adequately prevent wildlife from touching, grasping or biting visitors. Barriers, such as walls, fences, moats, retaining rails and other necessary devices shall be present to prevent the public from approaching the cages, pens, enclosures or areas near enough to contact the wildlife.</span></p><p data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">&nbsp;©&nbsp;&nbsp;Public human contact with the following designated animals is permitted under the specified conditions:</span></p><p data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">&nbsp;&nbsp;&nbsp;(1)&nbsp;&nbsp;Ruminant animals.</span></p><p data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">&nbsp;&nbsp;&nbsp;(2)&nbsp;&nbsp;Organ grinder monkeys, trained performing chimpanzees and elephants if under the immediate control of the handler to preclude danger to the public.</span></p><p data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">&nbsp;(d)&nbsp;&nbsp;Wildlife other than members of the families Ursidae, Felidae and wild Canidae when exhibited on a stage or in an arena, may be removed from their cage by the exhibitor in a manner precluding danger to the public. Other human contact with the wildlife is prohibited.</span></p><p data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">?</span></p><p data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">§ 147.283. Sanitation.</span></p><p data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">&nbsp;(a)&nbsp;&nbsp;Sanitation.&nbsp;Wildlife maintained under this subchapter shall be kept in a sanitary manner.</span></p><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">&nbsp;(b)&nbsp;&nbsp;Water.&nbsp;Clean, fresh water shall be provided daily. Water containers shall be cleaned and disinfected daily.</span></p><p data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">&nbsp;©&nbsp;&nbsp;Food.&nbsp;Food shall be kept in a manner to prevent spoilage or contamination.</span></p><p data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">&nbsp;(d)&nbsp;&nbsp;Waste.&nbsp;Fecal and food waste shall be removed from cages and dens daily and disposed of or stored in a manner to prevent noxious odors or attraction of insects or vermin. Hard floors shall be scrubbed and disinfected at least weekly. Large pens and paddocks with dirt floors shall be raked every 3 days and the waste removed.</span></p><p data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">&nbsp;(e)&nbsp;&nbsp;Drainage and pools.&nbsp;Cages, pens and paddocks shall be designed to provide adequate drainage of the enclosure. Standing water is not allowed except in the case of animals requiring water for wading, submersing or swimming. Pools provided for wildlife shall be cleaned as often as needed to ensure good water quality.</span></p><p data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">&nbsp;(f)&nbsp;&nbsp;General requirements.&nbsp;Procedures for sanitation, water disposal and proper disposition of feces and other waste material shall be in compliance with the requirements of local, State or Federal authorities.</span></p><p data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">?</span></p><p data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">§ 147.284. Housing.</span></p><p data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">&nbsp;(a)&nbsp;&nbsp;Cages or enclosures except paddocks, corrals, islands or grotto-type exhibits shall be covered at the top to prevent escape.</span></p><p data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">&nbsp;(b)&nbsp;&nbsp;A cage or enclosure shall have bedding required for the comfort and protection from inclement weather. A suitable shield for protection against the hot sun rays shall be provided on outside enclosures. If the natural climate of the wildlife being held differs from the climate of the area where the menagerie is located, provisions shall be made to adjust holding conditions to the natural habitat.</span></p><p data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">&nbsp;&nbsp;&nbsp;©&nbsp;Signs shall be conspicuously posted on cages or enclosures prohibiting the public from feeding, except food obtained from the permittee, or annoying the wildlife. The owner or operator is responsible for enforcement.</span></p><p data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">&nbsp;&nbsp;&nbsp;(d)&nbsp;A cage or enclosure shall be labeled in English with the proper common name of the wildlife confined. The letters shall be at least 1 inch in height.</span></p><p data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">&nbsp;&nbsp;&nbsp;(e)&nbsp;A cage shall have a secure locking device and shall be key locked or padlocked.</span></p><p data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">?</span></p><p data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">§ 147.285. Specifications.</span></p><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">&nbsp;It is unlawful for a permit holder to confine wildlife in a pen, cage or enclosure which does not meet minimum specifications or caging requirements. Except as otherwise provided in this section, minimum specifications and caging requirements for captive wildlife shall comply with the following:</span></p><p data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">?</span></p><p data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">&nbsp;(4)&nbsp;&nbsp;Carnivores and certain omnivores with similar requirements.</span></p><p data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">?</span></p><p data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">(xvii)&nbsp;&nbsp;&nbsp;Foxes, jackals, and the like.</span></p><p data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;(A)&nbsp;&nbsp;&nbsp;Number or size:&nbsp;One pair.</span></p><p data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;(B)&nbsp;&nbsp;&nbsp;Cage size:&nbsp;8'L by 4'W by 6'H.</span></p><p data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;©&nbsp;&nbsp;&nbsp;Accessories:&nbsp;One shelf 18"W by 3'H by 4'L. A den or nest box area is also required.</span></p><p data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">?</span></p><p data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">§ 147.286. Acquisition and disposal.</span></p><p data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">&nbsp;(a)&nbsp;&nbsp;Wildlife at a menagerie shall have been lawfully taken, exported, imported, transported, retained and possessed.</span></p><p data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">&nbsp;(b)&nbsp;&nbsp;The acquisition or disposal of wildlife shall be for the sole purpose of maintaining stock for the menagerie. Disposal or transfer for any reason is limited to persons who may lawfully import the wildlife being transferred.</span></p><p data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">&nbsp;©&nbsp;&nbsp;The Commission officer approving the menagerie permit shall be notified, in writing, within 10 days after receipt of additional wildlife.</span></p><p data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">&nbsp;(d)&nbsp;&nbsp;The Commission officer approving the menagerie permit shall be notified, in writing, 10 days prior to disposal of wildlife when feasible.</span></p><p data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">&nbsp;(e)&nbsp;&nbsp;Records shall be maintained of acquisitions and disposals of wildlife as well as wildlife born or hatched at the menagerie. Records shall be in ink and written in plain English. Records shall be available for inspection by Commission personnel at any reasonable hour.</span></p><p data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">?</span></p><p data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">§ 147.287. Health and welfare.</span></p><p data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">&nbsp;Wildlife shall be kept free from parasites, sickness or disease. If sick or unsightly, wildlife shall be removed from public display and immediately given professional medical attention, or be destroyed in a humane manner.</span></p></blockquote><p data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Citation:&nbsp;058 PA. CODE&nbsp;§ 147.281-147.287</span></p><p data-dcnode-id="2046"><span class="wz-bold" data-dcnode-id="2047"><br data-dcnode-id="2048"></span></p><p data-dcnode-id="2043"><span class="wz-bold" data-dcnode-id="2044" style="color: rgb(22, 114, 219);"><span data-dcnode-id="2045" instrument_node="">RHODE ISLAND</span></span></p><p data-dcnode-id="2037"><span class="wz-bold" data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">To put it simply:</span></span><span data-dcnode-id="2038" instrument_node=""> yes, exotic foxes are legal in Rhode Island.</span></p><p data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="2025"><li data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">Red foxes (Vulpes vulpes) and gray foxes (Urocyon cinereoargenteus)&nbsp;are native animals and their importation and possession is restricted to the Rhode Island Department of Environmental Management, the United States Fish and Wildlife Service, the Department of Environmental Management, and American Association of Zoological Parks and Aquariums (AAZPA) approved zoos and research institutes.</span></li><li data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">However, private persons seeking private ownership can own exotic animals - and animals that are neither domestic or native - with an exotic animal possession permit.</span></li><li data-dcnode-id="2026"><span data-dcnode-id="2030" instrument_node="">Examples of exotic foxes: fennec fox (Vulpes zerda), swift fox (Vulpes velox), kit fox (</span><span class="wz-italic" data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Vulpes macrotis</span></span><span data-dcnode-id="2027" instrument_node="">), arctic fox (Vulpes lagopus), et cetera.</span></li></ul><p data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="1932"><p data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">RULES AND REGULATIONS GOVERNING IMPORTATION AND POSSESSION OF NATIVE WILDLIFE</span></p><p data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">PART 1</span></p><p data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">PROHIBITION</span></p><p data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">1.1 ? No person shall import, receive, or possess in this state a native animal, exotic animal, a member of a target species, or a hybrid, unless in possession of a current permit issued by the Director pursuant to these regulations.</span></p><p data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">PART 2</span></p><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">REQUIREMENTS FOR IMPORTATION AND POSSESSION OF NATIVE WILDLIFE</span></p><p data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">2.1 ? A PERMIT to import, receive, or possess in this state native wildlife and hybrids thereof shall be restricted to the Rhode Island Department of Environmental Management, United States Fish and Wildlife Service, Department of Environmental Management (DEM) and American Association of Zoological Parks and Aquariums, (AAZPA) approved zoos and research institutes with approved certification and as determined by the Director that the permit is involved in an approved bona fide experiment or project. Permittee is required to conform with all applicable federal, state and local requirements for licensure certification or permit.</span></p><p data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">Persons applying for permits to possess migratory birds must first acquire appropriate Federal permits in the appropriate category described in 50 CFR Part 21 and 22. Permits issued for the purpose of education must adhere to guidance as directed in the ?Wildlife in Education ? A Guide for the Care and Use of Program Animals? and companion document ?Introduction to Wildlife Education Programming?. &nbsp;Raptor educators may use The Raptor Center?s ?Care and Management of Captive Raptors in place of the ?Wildlife in Education Guide.? Other guidance manuals meeting or exceeding the above may be used if deemed acceptable by the Division.</span></p><p data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">The exception(s) of this section shall be the propagation and raising of game birds pursuant to the provisions of Title 20 rules and regulations governing wildlife rehabilitation and possession of reptiles and amphibians as promulgated annually in Rhode Island hunting rules and regulations.</span></p><p data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">?</span></p><p data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">RULES AND REGULATIONS GOVERNING IMPORTATION AND POSSESSION OF EXOTIC WILD ANIMALS</span></p><p data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">RULE 5: REQUIREMENTS</span></p><p data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">1. A permit to import into, receive, or possess in this state animals defined as exotic animals under section 4.7 herein, shall be restricted to the United States Department of Agriculture (USDA) and the American Association of Zoological Parks and Aquariums (AAZPA) approved zoos and research institutes or other USDA approved facilities as well as exhibitors and private persons seeking to import or possess an exotic animal for private ownership pursuant to the provisions of sections 4-18-3 and 4-18-6 of the Rhode Island General Law, 1956, as amended herein. Obtaining such permit does not preclude conformance with such other Federal, State, or Local requirements for licensure certification or permit which may be required.</span></p><p data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">2. No other person shall be allowed to import, receive, or possess any animals defined as exotic animals under section 4.7 herein, other than USDA/AAZPA approved zoos and research institutes, or as well as exhibitors and private persons seeking to import or possess an exotic animal.</span></p><p data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">3. The Director at his/her discretion may issue an exotic animal possession permit to import, receive, or possess exotic animals as defined in section 54.7. An exotic animal possession permit is not required for importation or possession of domestic animals as defined in section 4.3, or for importation or possession of exempt exotic animals as defined in section 4.6 and listed in Rule 7. Persons wishing to obtain a permit to import or possess native wildlife as defined in section 4.13 can do so through the Department, Division of Fish and Wildlife. Application for an exotic animal possession permit must include the following for each species.</span></p><p data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">a) The number, sex, age, and true scientific name and means of permanent individual identification of each individual animal</span></p><p data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">b) The carrier and point of first arrival as well as the location where each animal will be kept within the state.</span></p><p data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">c) The purpose for which the exotic animal will be imported and possessed</span></p><p data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">d) The full name and complete address of the consignee and consignor</span></p><p data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">e) A ?health certificate? (certificate of veterinary inspection) issued by a federally accredited veterinarian licensed in the state of origin of the exotic animal. The health certificate is to include the results and dates of any testing that was determined necessary by the Director prior to entry into the state of Rhode Island. The health certificate must be as defined in section 4.10 herein.</span></p><p data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">f) The location of where the animal(s) will be held in quarantine upon entry into the state of Rhode Island. This location and all enclosures must be inspected and approved prior to issuance of an exotic animal possession permit.</span></p><p data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">g) The location of where the animal(s) will be permanently held after release from quarantine. This location and all enclosures must be inspected and approved prior to issuance of an exotic animal possession permit.</span></p><p data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">h) The name and address of the veterinarian currently licensed in Rhode Island who will conduct the tests and examinations specified by the Department. A letter from a veterinarian currently licensed in Rhode Island stating that he/she will conduct any testing or examinations as will be required periodically by the Department</span></p><p data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">i) Except for AAZPA certified facilities, any person desiring to import or possess an exotic animal shall also provide a detailed written description to the Department of the manner in which the animal(s)? nutritional, housing, and exercise needs will be met. Approval of this document must be made prior to issuance of an exotic animal possession permit.</span></p><p data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">j) Permit fee as specified by Rhode Island General Law 4-18-8</span></p><p data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">k) Letter from the Department, Division of Fish and Wildlife, endorsed by the Chief of that division or his/her designee stating that the species is neither considered a native species nor a nuisance species as defined in this document.</span></p><p data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">RULE 6 ISSUANCE AND CONDITIONS</span></p><p data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">1. Issuance of exotic animal import permits may be made by the Department upon the following:</span></p><p data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">a) Receipt of written application providing all of the information enumerated in RULE 5 not less than seven (7) days preceding the probable day of shipment of the animal(s).</span></p><p data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">b) Completion of an inspection by the department of the quarantine and final enclosures as enumerated in RULE 5 and approval of those enclosures.</span></p><p data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">c) Payment of the necessary permit fee as required under Rhode Island General Law 4-18-8.</span></p><p data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">d) Determination that possession of the exotic species will not endanger the public health or the health of native wildlife or domestic animals to an extent greater than possession of domestic animals or exempt exotic animals would.</span></p><p data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">e) Approval of the probable point of first entry into the state of Rhode Island</span></p><p data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">f) Receipt and approval by the State Veterinarian of a Health Certificate signed and issued within thirty (30) days of the anticipated arrival of the exotic animal. Such Health Certificate must be issued by a Federally Accredited Veterinarian licensed in the state of origin of the exotic animal(s), be countersigned by the State Veterinarian of the state of origin, and be accompanied by any test records determined to be necessary by the Department. The Health Certificate must state that the animals are free from signs of infectious, contagious, and zoonotic diseases in addition to the specific required tests.</span></p><p data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">2. The permit may, at the discretion of the Director, list specific conditions that must be met and maintained prior to issuance of an exotic animal possession permit.</span></p><p data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">3. The exotic animal possession permit is not transferable to another person or location without the expressed written permission to do so from the Director.</span></p><p data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">4. Any person in possession of an exotic animal possession permit must maintain possession of the animal(s) identified on that permit at the location specified on that permit, and the enclosures that were inspected prior to issuance of that permit.</span></p><p data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">5. Any modification of the enclosure must be inspected and approved before the permitted animal(s) are allowed to be housed within.</span></p><p data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">6. Any exotic animal as permitted shall not be used for breeding purposes without prior approval by the Department. If approval is granted, limits may be imposed as to the number of exotic animals allowed per location, enclosure, or person as in RULE 6 section 2.</span></p><p data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">7. The possessor of any permitted exotic animal must notify the Department within twenty-four (24) hours of the death of that animal, and immediately upon the escape of that animal.</span></p><p data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">&nbsp;8. The exotic animal and the enclosure are subject to periodic inspection by representatives of the Department during normal business hours and without prior notice.</span></p><p data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">9. The Director may order immediate examination and testing of any permitted exotic animal(s) upon suspicion that the animal(s) may be harboring a disease that threatens public health or the health of domestic animals or native wildlife. Measures necessary to do so may include but not be limited to quarantine, seizure, euthanasia, and post-mortem examination.</span></p><p data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">10. Any person bitten, scratched or otherwise injured by an exotic animal must be immediately reported to the Animal Control Officer in the municipality where the animal is housed and to the State Veterinarian.</span></p><p data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">11. The release into the wild of any animal for which an exotic animal possession permit has been issued is prohibited whether or not such release was intentional or accidental.</span></p><p data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">12. Any animal imported with an exotic animal possession permit may, at the discretion of the Director, in accordance with RIGL 4-18-11, be required to undergo a period of quarantine. The terms of the quarantine will be established on a case-by-case basis.&nbsp;</span></p></blockquote><p data-dcnode-id="1925"><span data-dcnode-id="1931" instrument_node="">Citation: </span><a data-dcnode-id="1929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.umblr.com/redirect%3Fz%3Dhttp%253A%252F%252Fwww.dem.ri.gov%252Fpubs%252Fregs%252Fregs%252Ffishwild%252Ff_wimprt.pdf%26t%3DZmM2MGJlNDgxMDY5YzZkNzZiODczMDA5MjRkZmZkOGNjNTRlOTMxNyx0VVI4emlBbg%253D%253D" id="7564AC0B-7582-49DF-BD0A-B67F88AFEEE1"><span data-dcnode-id="1930" instrument_node="">Rules and Regulations Governing Importation and Possession of Native Wildlife</span></a><span data-dcnode-id="1928" instrument_node="">;&nbsp;</span><a data-dcnode-id="1926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.umblr.com/redirect%3Fz%3Dhttp%253A%252F%252Fwww.dem.ri.gov%252Fpubs%252Fregs%252Fregs%252Fagric%252Fxotkanml.pdf%26t%3DMzQ3MjU3YzkxOWFjMThlNTcwYTAxOTA0MjExY2RmMTcyMzFmN2I3MSx0VVI4emlBbg%253D%253D" id="992601A3-D68B-42D6-969C-2EF685BB7D27"><span data-dcnode-id="1927" instrument_node="">Rules and Regulations Governing Importation and Possession of Exotic Wild Animals</span></a></p><p data-dcnode-id="1922"><span class="wz-bold" data-dcnode-id="1923"><br data-dcnode-id="1924"></span></p><p data-dcnode-id="1919"><span class="wz-bold" data-dcnode-id="1920" style="color: rgb(22, 114, 219);"><span data-dcnode-id="1921" instrument_node="">SOUTH CAROLINA</span></span></p><p data-dcnode-id="1913"><span class="wz-bold" data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">To put it simply:</span></span><span data-dcnode-id="1914" instrument_node=""> no, foxes are not legal in South Carolina.</span></p><p data-dcnode-id="1910"><span class="wz-bold" data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">Note:</span></span></p><ul class="style-circle" data-dcnode-id="1901"><li data-dcnode-id="1907"><span data-dcnode-id="1909" instrument_node="">Wild carnivores, which include foxes, are not allowed to be sold as pets within the state of South Carolina.</span><br data-dcnode-id="1908"></li><li data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">In addition to the above, foxes are not legal to import (?bring into this State?) into South Carolina.</span></li><li data-dcnode-id="1902"><span data-dcnode-id="1904" instrument_node="">Any permits for importing and possession are not given for the purpose of pets/personal possession.</span><br data-dcnode-id="1903"></li></ul><p data-dcnode-id="1898"><span class="wz-bold" data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">The legal jargon:</span></span></p><blockquote data-dcnode-id="1868"><p data-dcnode-id="1895"><span data-dcnode-id="1897" instrument_node="">SECTION 47-5-20. Definitions.</span><br data-dcnode-id="1896"></p><p data-dcnode-id="1892"><span data-dcnode-id="1894" instrument_node="">(1) ?Carnivore? means a flesh-eating animal and includes those animals known to be reservoirs of rabies including, but not limited to, raccoons, foxes, skunks, and bobcats and related species including, but not limited to, coyotes, wolves, wolf dogs, weasels, civet cats, spotted skunks, and lynx or the offspring born to any combinations of crossbreeding between these wild animals and domestic dogs or cats.</span><br data-dcnode-id="1893"></p><p data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">?</span></p><p data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">SECTION 47-5-50. Prohibition on sale of wild carnivores as pets; sale of domesticated ferrets.</span></p><p data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">(A) No carnivore, which normally are not domesticated, may be sold as pets in this State. A carnivore kept by an individual must not be allowed to run at large and then returned to confinement. A normally wild animal indigenous to this State, if held captive for a period of time, may be released into the wild. This section does not apply to domesticated ferrets. However, no ferret may be sold in this State without proper and current vaccination against rabies. Evidence of rabies vaccination is a certificate signed by a licensed veterinarian. A person who purchases or possesses a domesticated ferret shall maintain proper vaccination treatment for it annually.</span></p><p data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">?</span></p><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">S.C. CODE REGS. §50-16-20 - Importation of wildlife for certain purposes prohibited; investigation; permit.</span></p><p data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">(A) It is unlawful for a person to import, possess, or transport for the purpose of release or to introduce or bring into this State any live wildlife of the following types without a permit from the department:</span></p><p data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">(1) a furbearer, a member of the family Cervidae, a nondomestic member of the families Suidae (pigs), Tayassuidae (peccaries), Bovidae (bison, mountain goat, mountain sheep), coyote, bear, or turkey (genus Meleagris). Furbearer includes, but is not limited to, red and gray fox, raccoon, opossum, muskrat, mink, skunk, otter, bobcat, weasel, and beaver;</span></p><p data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">(2) a species of marine or estuarine fish, crustacean, mollusk, or other marine invertebrate not already found in the wild, or not native to this State.</span></p><p data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">(3) a species of freshwater fish, crustacean, mollusk, or other freshwater invertebrate not already found in the wild or not native to this State.&nbsp;</span></p><p data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">?</span></p><p data-dcnode-id="1869"><span data-dcnode-id="1871" instrument_node="">Prohibition of Sale, Purchase, Donation, or Transfer of Ownership Wildlife as Pets ? The Department of Health and Environmental Control?s (DHEC) Rabies Control Act (47-5-50) prohibits the sale, purchase, donation, or transfer of ownership of nondomesticated carnivores (raccoons, foxes, skunks, bobcats, coyotes, wolves, wolf dogs, weasels, civet cats, spotted skunks, and lynx or the offspring born to any combinations of crossbreeding (hybrids) between these wild animals and domestic dogs or cats) to private individuals in this State. It is illegal to import native furbearing species into the state for any purpose except with a permit issued by the SCDNR. Requests for importing furbearing animals for private possession violate the spirit of the Rabies Control Act and will be denied. (via South Carolina Hunting &amp; Fishing).</span><br data-dcnode-id="1870"></p></blockquote><p data-dcnode-id="1862"><span class="wz-bold" data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">Citation:&nbsp;</span></span><span data-dcnode-id="1865" instrument_node="">S.C. CODE REGS. §47-5-50 (?Rabies Control Act?) &amp; §50-16-20;</span><a data-dcnode-id="1863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.umblr.com/redirect%3Fz%3Dhttp%253A%252F%252Fwww.eregulations.com%252Fsouthcarolina%252F13scab%252Fgeneral-laws-and-regulations%252F%26t%3DNGZlMTNiNThkZTY5ZWQyNTAyYjZmMTJmMjI3YTIxODJiNmZhNGEyNixlQ0ZWUFhhUQ%253D%253D" id="4D2ED627-05AB-4240-9F6E-5B07CC865BEB"><span data-dcnode-id="1864" instrument_node="">South Carolina Hunting &amp; Fishing</span></a></p><p data-dcnode-id="1860"><br data-dcnode-id="1861"></p><p data-dcnode-id="1857"><span class="wz-bold" data-dcnode-id="1858" style="color: rgb(22, 114, 219);"><span data-dcnode-id="1859" instrument_node="">SOUTH DAKOTA</span></span></p><p data-dcnode-id="1851"><span class="wz-bold" data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">To put it simply:</span></span><span data-dcnode-id="1852" instrument_node=""> yes, foxes are legal in South Dakota.</span></p><p data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="1844"><li data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">Foxes require a possession permit that costs $10 per animal to a maximum of $100. Permits must be renewed annually.</span></li><li data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">Foxes also require a no-cost entry permit when being imported from out of state.</span></li></ul><p data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="1747"><p data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">12:68:18:03. Permit required.</span></p><p data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">A permit from the board is required to import nondomestic animals. In addition, a permit as described in § 12:68:18:03.03 is required to possess in South Dakota any nondomestic mammal, or any of its hybrids, listed in this section:</span></p><p data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">(1) Of the order Carnivora, all nondomestic members of the following families:</span></p><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">(a) Felidae;</span></p><p data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">(b) Canidae;</span></p><p data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">© Ursidae;</span></p><p data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">(d) Mustelidae; and</span></p><p data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">(e) Hyaenidae;</span></p><p data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">(2) Of the order Artiodactyla, all nondomestic members;</span></p><p data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">(3) Of the order Perissodactyla, all nondomestic members of the following families:</span></p><p data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">(a) Tapiridae; and</span></p><p data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">(b) Rhinocerotidae; and</span></p><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">(4) Of the order Proboscidea, all members of the following families:</span></p><p data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">(a) African elephant; and</span></p><p data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">(b) Asian elephant; and</span></p><p data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">(5) Of the order Primates.</span></p><p data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">12:68:18:03.01. Specifically prohibited nondomestic mammals.</span></p><p data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">The board may issue only a temporary permit or a zoo permit for possession of the following nondomestic mammals or any of their hybrids. Possession of these mammals is otherwise specifically prohibited:</span></p><p data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">(1) Of the family Suidae, all nondomestic members; and</span></p><p data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">(2) Of the family Canidae, genus Nyctereutes, species procyonoides (raccoon dog).</span></p><p data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">A person possessing before December 31, 1993, a nondomestic mammal listed in this section may not translocate, purchase additions, or market the mammal within South Dakota. A person possessing such a mammal must quarantine the mammal and must obtain a grandfather permit until the mammal is disposed of.</span></p><p data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">12:68:18:03.02. Specifically restricted nondomestic mammals.</span></p><p data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Possession of the following nondomestic mammals is restricted geographically to the area of South Dakota east of the Missouri River:</span></p><p data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">(1) Nondomestic mammals that are capable of crossbreeding with free-roaming wild elk, specifically including all red deer, sika deer, sambar, Pe?re Davids deer, and axis deer and any of their hybrids; and</span></p><p data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">(2) Nondomestic mammals that are capable of crossbreeding with free-roaming wild sheep and goats or competing aggressively for habitat utilized by wild sheep and goats, specifically including all mouflon, argali, urial, blue sheep, auodad, barbary sheep, and any of their hybrids.</span></p><p data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">12:68:18:03.03. Types of permits?Fees.</span></p><p data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">The board shall issue the following permits to persons who meet the requirements of this chapter and pay the required fee:</span></p><p data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">(1) Entry permit (no fee)?a permit allowing importation of captive nondomestic animals into South Dakota which may be granted by telephone;</span></p><p data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">(2) Temporary permit ($10)?a permit issued to an individual to possess for not more than 14 days a captive nondomestic mammal specifically prohibited in § 12:68:18:03.01 or restricted in § 12:68:18:03.02;</span></p><p data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">(3) Grandfather permit ($10 an animal to a maximum of $100)?a permit issued to an individual who possesses before December 31, 1993, mammals prohibited in § 12:68:18:03.01 or restricted in § 12:68:18:03.02;</span></p><p data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">(4) Dealer auction permit ($100)?an annual permit issued to an individual or a group solely for the purpose of brokering, leasing, purchasing, or selling mammals listed in this chapter whether or not a fee or other compensation is charged for such services;</span></p><p data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">(5) Possession permit ($10 an animal to a maximum of $100)?a permit issued for the possession of mammals listed in this chapter for any reason other than the conditions described in subdivisions (2), (3), and (4) of this section;</span></p><p data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">(6) Zoo permit ($10 an animal to a maximum of $100)?a permit issued to nonprofit exhibitors of nondomestic mammals. A zoo permit allows the possession of any class of nondomestic mammals. The board may approve the permit if it determines that facilities are adequate for confinement.</span></p><p data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">12:68:18:03.04. Application for permit.</span></p><p data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">The board shall provide application forms for all permits required by this chapter. An application must be submitted to the board before the applicant may possess any of the mammals listed in § 12:68:18:03. The permit application must contain all information required in § 12:68:18:06. The board shall issue the permit if the following requirements are met:</span></p><p data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">(1) The required fees are received;</span></p><p data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">(2) Grounds for denial as listed in § 12:68:18:09 do not exist; and</span></p><p data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">(3) The board determines that the facilities and procedures as described in the application are adequate for compliance with this chapter and to provide for the safety of other animals and humans.</span></p><p data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">?</span></p><p data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">12:68:18:06. Annual application required.</span></p><p data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">A person possessing captive nondomestic mammals listed in §§ 12:68:18:03 to 12:68:18:03.02, inclusive, must apply for a permit for captive nondomestic animals annually from the board by January 1.</span></p><p data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">The permit application shall include the following information:</span></p><p data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">(1) The applicant?s name, mailing address, and phone number;</span></p><p data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">(2) The legal description of the premises where the animals are held;</span></p><p data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">(3) An inventory by species, age, and sex of all mammals covered by this permit at application time;</span></p><p data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">(4) A listing of all mammals added to the premises within the past 12 months, including birth additions, and of all disappearances of mammals within the past 12 months, including purchases, sales, leases, gifts, deaths, and escapes. The list must include individual identification of all such mammals by either legible tattoo or eartag as defined in § 12:68:18:07, by a similar tag, or by electronic means; and</span></p><p data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">(5) A description of facilities used for confining mammals for such purposes as testing and identification.</span></p></blockquote><p data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Citation:&nbsp;SD ADC 12:68:18:03 &amp;&nbsp;12:68:18:06</span></p><p data-dcnode-id="1743"><br data-dcnode-id="1744"></p><p data-dcnode-id="1740"><span class="wz-bold" data-dcnode-id="1741" style="color: rgb(22, 114, 219);"><span data-dcnode-id="1742" instrument_node="">TENNESSEE</span></span></p><p data-dcnode-id="1734"><span class="wz-bold" data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">To put it simply:</span></span><span data-dcnode-id="1735" instrument_node=""> yes, foxes are legal in Tennessee.</span></p><p data-dcnode-id="1731"><span class="wz-bold" data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Note:</span></span></p><ul class="style-circle" data-dcnode-id="1721"><li data-dcnode-id="1726"><span data-dcnode-id="1730" instrument_node="">Red foxes (Vulpes vulpes) and gray foxes (Urocyon cinereoargenteus) are Class II wild animals that are native to the state. Tennessee began issuing Class II permits for red and gray foxes again in 2015. Permits cost $31 USD.</span><ul class="style-circle" data-dcnode-id="1727"><li data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">Tennessee has a list of&nbsp;?approved? breeders that can be bought from, however, buying from an&nbsp;?approved? breeder is not required as long as one obtains their fox from a legal breeder and can prove that legality with a sales receipt and USDA papers.</span></li></ul></li><li data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Nonnative (exotic) foxes are Class III wild animals and require no permits except those required by the department of agriculture. They do, however, require an import permit.</span></li><li data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">Davidson County requires one to have a minimum of 5 acres to build an outdoor enclosure.</span></li></ul><p data-dcnode-id="1718"><span class="wz-bold" data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">The legal jargon:</span></span></p><blockquote data-dcnode-id="1567"><p data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">§ 70-4-401. Crimes and offenses</span></p><p data-dcnode-id="1712"><span data-dcnode-id="1715" instrument_node="">(a) It is unlawful for any person to possess, transport, import, export, buy, sell, barter, propagate or transfer any wildlife, whether indigenous to this state or not, except as provided by this part and rules and regulations promulgated by the Tennessee fish and wildlife commission pursuant to this part.</span><br data-dcnode-id="1714"><span data-dcnode-id="1713" instrument_node="">(b) No person shall possess Class I or Class II wildlife without having documentary evidence showing the name and address of the supplier of such wildlife and date of acquisition.</span></p><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">?</span></p><p data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">§ 70-4-403. Classifications</span></p><p data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">Live wildlife, kept and maintained for any purpose, shall be classified in the following five (5) classes:</span></p><p data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">(1) Class I?This class includes all species inherently dangerous to humans. These species may only be possessed by zoos, circuses and commercial propagators, except as otherwise provided in this part. The commission, in conjunction with the commissioner of agriculture, may add or delete species from the list of Class I wildlife by promulgating rules and regulations. The following is a listing of animals considered inherently dangerous:</span></p><p data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">(A) Mammals:</span></p><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">(i) Primates?Gorillas, orangutans, chimpanzees, gibbons, siamangs, mandrills, drills, baboons, Gelada baboons;</span></p><p data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">(ii) Carnivores:</span></p><p data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">(a) Wolves?All species;</span></p><p data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">(b) Bears?All species; and</span></p><p data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">© Lions, tigers, leopards, jaguars, cheetahs, cougars?All species;</span></p><p data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">(iii) Order Proboscidia: Elephants?All species;</span></p><p data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">(iv) Order Perissodactyla: Rhinoceroses?All species; and</span></p><p data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">(v) Order Artiodactyla: Hippopotamus, African buffalo;</span></p><p data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">(B) Reptiles:</span></p><p data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">(i) Order Crocodylia: Crocodiles and alligators?All species; and</span></p><p data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">(ii) Order Serpentes: Snakes?All poisonous species; and</span></p><p data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">© Amphibians: All poisonous species;</span></p><p data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">(2) Class II?This class includes native species, except those listed in other classes;</span></p><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">(3) Class III?This class requires no permits except those required by the department of agriculture, and includes all species not listed in other classes and includes, but is not limited to, those listed in subdivisions (3)(A)-(Q). The commission, in conjunction with the commissioner of agriculture, may add or delete species from the list of Class III wildlife by promulgating rules and regulations:</span></p><p data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">(A) Nonpoisonous reptiles and amphibians except caimans and gavials;</span></p><p data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">(B) Rodents?Gerbils, hamsters, guinea pigs, rats, mice, squirrels and chipmunks;</span></p><p data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">© Rabbits, hares, moles and shrews;</span></p><p data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">(D) Ferrets and chinchillas;</span></p><p data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">(E) Llamas, alpacas, guanacos, vicunas, camels, giraffes and bison;</span></p><p data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">(F) Avian species not otherwise listed, excluding North American game birds, ostriches and cassowary;</span></p><p data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">(G) Semi-domestic hogs, sheep and goats;</span></p><p data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">(H) All fish held in aquaria;</span></p><p data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">(I) Bovidae not otherwise listed;</span></p><p data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">(J) Marsupials;</span></p><p data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">(K) Common domestic farm animals;</span></p><p data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">(L) Equidae;</span></p><p data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">(M) Primates not otherwise listed;</span></p><p data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">(N) Bobcat/domestic cat hybrids;</span></p><p data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">(O) Hybrids resulting from a cross between a Class II species and a domestic animal or Class III species;</span></p><p data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">(P) Cervidae except white-tailed deer and wild elk. Elk originating from a legal source while held in captivity for the purpose of farming shall be regarded as Class III wildlife. All other elk shall be wild elk and shall be regarded as Class II wildlife. No person shall possess elk in captivity within the eastern grand division of the state as defined in § 4-1-202 without having documentary evidence indicating the origin of the elk being held. This documentary evidence will be presented to the agents of the department of agriculture or the wildlife resource agency upon request. Sale documentation of offspring of purchased elk is not required; and</span></p><p data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">(Q) Furbearing mammals, including those native to Tennessee, raised solely for the sale of fur;</span></p><p data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">(4) Class IV?This class includes those native species that may be possessed only by zoos and temporary exhibitors; provided, that rehabilitation facilities may possess Class IV wildlife as provided by rules established by the commission if authorized by a letter from the director of the agency:</span></p><p data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">(A) Black bear (Ursus americanus );</span></p><p data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">(B) White-tailed deer (Odocoileus virginianus );</span></p><p data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">© Wild turkey (Meleagris gallapavo ), including the eggs of wild turkey;</span></p><p data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">(D) Hybrids of a Class IV species other than bobcat shall be Class IV; and</span></p><p data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">(E) Animals that are morphologically indistinguishable from native Class IV wildlife shall be Class IV; and</span></p><p data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">(5) Class V?This class includes such species that the commission, in conjunction with the commissioner of agriculture, may designate by rules and regulations as injurious to the environment. Species so designated may only be held in zoos under such conditions as to prevent the release or escape of such wildlife into the environment.</span></p><p data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">§ 70-4-404. Permits; rules and regulations; fees</span></p><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">(a) The agency shall issue permits for possessing live wildlife as defined in this part.</span></p><p data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">(b)(1) The commission shall adopt reasonable rules for issuing permits to possess live wildlife and establishing the conditions of possessing wildlife. The conditions shall be directed toward assuring the health, welfare, and safety of animals, the public and, where necessary, the security of facilities in which the animals are kept.</span></p><p data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">(2) The executive director of the agency may authorize by letter permission to possess any class of wildlife for approved research studies or for the temporary holding of animals in the interest of public safety. The executive director may exempt specific events from the caging and handling requirements established for Class I wildlife. Approval of an exemption will be based on a written request that outlines safety precautions that must be implemented during the specified activity.</span></p><p data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">© Class I wildlife.</span></p><p data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">(1) Persons legally possessing Class I wildlife prior to June 25, 1991, shall obtain annually a personal possession permit to keep such Class I wildlife. To obtain a personal possession permit, such persons shall comply with all of the provisions of this part. After June 25, 1991, no new animals shall be brought into possession under authority of a personal possession permit. Persons in legal possession of one (1) or more species of Class I wildlife as of June 25, 1991, may maintain the lineage of such species up to a maximum of three (3) animals per species. Persons in legal possession of the offspring of such Class I wildlife shall have a maximum of twelve (12) months from the date of birth of such offspring to obtain appropriate permits for such offspring, or to dispose of such offspring through an appropriate commercial propagator, or by any other manner permitted by law within the state. The provisions of this section apply solely to persons in legal possession of Class I wildlife as of June 25, 1991, and shall not be construed to authorize new personal possession of Class I wildlife.</span></p><p data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">(2) The executive director shall issue a permit upon a satisfactory showing of qualifications to possess live wildlife under the following conditions:</span></p><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">(A) The applicant must be at least twenty-one (21) years of age;</span></p><p data-dcn
