ments are met. Statutory restrictions still apply.</span></p><p data-dcnode-id="4780"><span data-dcnode-id="4781" instrument_node="">All marine animals (vertebrates and invertebrates) except for anadromous and catadromous species.</span></p><p data-dcnode-id="4778"><span data-dcnode-id="4779" instrument_node="">Mammals:</span></p><ul class="style-circle" data-dcnode-id="4761"><li data-dcnode-id="4776"><span data-dcnode-id="4777" instrument_node="">African pygmy hedgehog (Atelerix albiventris, Erinaceus albiventris)</span></li><li data-dcnode-id="4774"><span data-dcnode-id="4775" instrument_node="">Sugar Gliders (Petaurus breviceps)</span></li><li data-dcnode-id="4772"><span data-dcnode-id="4773" instrument_node="">Short-tailed Possum (Monodelphis domestica)</span></li><li data-dcnode-id="4770"><span data-dcnode-id="4771" instrument_node="">Dama Wallaby (Tammar Wallaby) Macropus eugenii</span></li><li data-dcnode-id="4768"><span data-dcnode-id="4769" instrument_node="">Swamp Wallaby Wallabia bicolor</span></li><li data-dcnode-id="4766"><span data-dcnode-id="4767" instrument_node="">Bennet Wallaby (Red-necked Wallaby) Macropus rufogriseus</span></li><li data-dcnode-id="4764"><span data-dcnode-id="4765" instrument_node="">Red Kangaroo Macropus rufus</span></li><li data-dcnode-id="4762"><span data-dcnode-id="4763" instrument_node="">Wallaroo Macropus robustus</span></li></ul></blockquote><p data-dcnode-id="4758"><span data-dcnode-id="4759" instrument_node="">Citation:&nbsp;COLORADO CODE REGULATION 2 CCR §406-8</span></p><p data-dcnode-id="4756"><br data-dcnode-id="4757"></p><p data-dcnode-id="4753"><span class="wz-bold" data-dcnode-id="4754" style="color: rgb(22, 114, 219);"><span data-dcnode-id="4755" instrument_node="">CONNETICUT</span></span></p><p data-dcnode-id="4747"><span class="wz-bold" data-dcnode-id="4751"><span data-dcnode-id="4752" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="4749"><span data-dcnode-id="4750" instrument_node="">To put it simply:&nbsp;</span></span><span data-dcnode-id="4748" instrument_node="">no, foxes are not legal in Connecticut.</span></p><p data-dcnode-id="4745"><span data-dcnode-id="4746" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="4710"><p data-dcnode-id="4743"><span data-dcnode-id="4744" instrument_node="">§ 26-40a. Possession of potentially dangerous animal. Exemptions. Seizure, relocation and disposal. Penalties.</span></p><p data-dcnode-id="4741"><span data-dcnode-id="4742" instrument_node="">(a) No person shall possess a potentially dangerous animal. For the purposes of this section, the following wildlife, or any hybrid thereof, shall be considered potentially dangerous animals:</span></p><p data-dcnode-id="4739"><span data-dcnode-id="4740" instrument_node="">(1) The felidae, including, but not limited to, the lion, leopard, cheetah, jaguar, ocelot, jaguarundi cat, puma, lynx and bobcat;</span></p><p data-dcnode-id="4737"><span data-dcnode-id="4738" instrument_node="">(2) The canidae, including, but not limited to, the wolf, and coyote;</span></p><p data-dcnode-id="4735"><span data-dcnode-id="4736" instrument_node="">(3) The ursidae, including, but not limited to, the black bear, grizzly bear and brown bear; and</span></p><p data-dcnode-id="4733"><span data-dcnode-id="4734" instrument_node="">(4) The hominidae, including, but not limited to, the gorilla, chimpanzee and orangutan.</span></p><p data-dcnode-id="4731"><span data-dcnode-id="4732" instrument_node="">(b) A primate that weighs less than thirty-five pounds at maturity and that was imported or possessed by a person in this state prior to October 1, 2003, shall not be considered a potentially dangerous animal pursuant to this section.</span></p><p data-dcnode-id="4729"><span data-dcnode-id="4730" instrument_node="">© Any such animal illegally possessed may be ordered seized and may be relocated or disposed of as determined by the Commissioner of Environmental Protection. The Department of Environmental Protection shall issue a bill to the owner or person in illegal possession of such potentially dangerous animal for all costs of seizure, care, maintenance, relocation or disposal of such animal. Additionally, any person who violates any provision of this section shall be assessed a civil penalty not to exceed two thousand dollars, to be fixed by the court, for each offense. Each violation shall be a separate and distinct offense and in the case of a continuing violation, each day?s continuance thereof shall be deemed to be a separate and distinct offense. The Commissioner of Environmental Protection may request the Attorney General to institute an action in Superior Court to recover such penalty and any amounts owed pursuant to a bill issued in accordance with this section and for an order providing such equitable and injunctive relief as the court deems appropriate.</span></p><p data-dcnode-id="4727"><span data-dcnode-id="4728" instrument_node="">(d) The provisions of this section shall not apply to municipal parks, zoos, accredited by the Association of Zoos and Aquariums or the Zoological Association of America, public nonprofit aquaria, nature centers, museums, or exhibitors licensed or registered with the United States Department of Agriculture or laboratories and research facilities maintained by scientific or educational institutions licensed or registered with the United States Department of Agriculture or to a person possessing a Bengal cat certified by an internationally recognized multiple-cat domestic feline breeding association as being without wild parentage for a minimum of four prior generations which cat was registered with the Commissioner of Agriculture on or before October 1, 1996, provided no such cat may be imported into this state after June 6, 1996. In any action taken by any official of the state or any municipality to control rabies, a Bengal cat shall be considered not vaccinated for rabies in accordance with accepted veterinary practice.</span></p><p data-dcnode-id="4725"><span data-dcnode-id="4726" instrument_node="">(e) Any person who wilfully violates any provision of subsection (a) of this section shall be guilty of a class A misdemeanor.</span></p><p data-dcnode-id="4723"><span data-dcnode-id="4724" instrument_node="">?</span></p><p data-dcnode-id="4721"><span data-dcnode-id="4722" instrument_node=""> </span></p><p data-dcnode-id="4719"><span data-dcnode-id="4720" instrument_node="">§ 26-55. Permit for importing, introducing into state, possessing or liberating live fish, wild birds, wild mammals, reptiles, amphibians and invertebrates. Regulations. Exemptions. Seizure, relocation and disposal. Penalties.</span></p><p data-dcnode-id="4717"><span data-dcnode-id="4718" instrument_node="">(a) Except as provided in subsection © of this section, no person shall import or introduce into the state, or possess or liberate therein, any live fish, wild bird, wild mammal, reptile, amphibian or invertebrate unless such person has obtained a permit therefor from the commissioner. Such permit may be issued at the discretion of the commissioner under such regulations as the commissioner may prescribe. The commissioner shall by regulation prescribe the numbers of live fish, wild birds, wild mammals, reptiles, amphibians or invertebrates of certain species which may be imported, possessed, introduced into the state or liberated therein. The commissioner may by regulation exempt certain species or groups of live fish from the permit requirements. The commissioner shall by regulation determine which species of wild birds, wild mammals, reptiles, amphibians or invertebrates must meet permit requirements. The commissioner may totally prohibit the importation, possession, introduction into the state or liberation therein of certain species which the commissioner has determined may be a potential threat to humans, agricultural crops or established species of plants, fish, birds, mammals, reptiles, amphibians or invertebrates. The commissioner shall by regulation exempt from permit requirements organizations or institutions such as municipal parks, zoos, laboratories and research facilities maintained by scientific or educational institutions, museums, public nonprofit aquaria or nature centers where live fish, wild birds, wild mammals, reptiles, amphibians or invertebrates are held in strict confinement. For the purpose of this subsection and any regulation adopted pursuant to this subsection, ferrets (Mustela putorius), hedgehogs of the family Erinaceidae, genera Atelerix, sugar gliders (Petaurus breviceps) and degu (Octodon degus) shall not be deemed to be wild mammals.</span></p><p data-dcnode-id="4715"><span data-dcnode-id="4716" instrument_node="">(b) Any such fish, bird, mammal, reptile, amphibian or invertebrate illegally imported into the state or illegally possessed therein may be seized by any representative of the Department of Energy and Environmental Protection and may be relocated or disposed of as determined by the commissioner. The Department of Energy and Environmental Protection shall issue a bill to the owner or person in illegal possession of such animal for all costs of seizure, care, maintenance, relocation or disposal for such animal.</span></p><p data-dcnode-id="4713"><span data-dcnode-id="4714" instrument_node="">© Any person who violates any provision of this section or any regulation adopted by the commissioner pursuant to this section shall be assessed a civil penalty not to exceed one thousand dollars, to be fixed by the court, for each offense. Each violation shall be a separate and distinct offense. In the case of a continuing violation, each day?s continuance thereof shall be deemed to be a separate and distinct offense. The Commissioner of Energy and Environmental Protection may request the Attorney General to institute an action in Superior Court to recover such civil penalty and any amounts owed pursuant to a bill issued in accordance with subsection (b) of this section and for an order providing such equitable and injunctive relief as the court deems appropriate.</span></p><p data-dcnode-id="4711"><span data-dcnode-id="4712" instrument_node="">(d) Any person who willfully violates any provision of this section or any regulation adopted by the commissioner pursuant to this section shall be guilty of a class C misdemeanor.</span></p></blockquote><p data-dcnode-id="4708"><span data-dcnode-id="4709" instrument_node="">Citation:&nbsp;CONNECTICUT GENERAL STATUTE §26-40a &amp; §26-55</span></p><p data-dcnode-id="4705"><span class="wz-bold" data-dcnode-id="4706"><br data-dcnode-id="4707"></span></p><p data-dcnode-id="4702"><span class="wz-bold" data-dcnode-id="4703" style="color: rgb(22, 114, 219);"><span data-dcnode-id="4704" instrument_node="">DELAWARE</span></span></p><p data-dcnode-id="4696"><span class="wz-bold" data-dcnode-id="4700"><span data-dcnode-id="4701" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="4698"><span data-dcnode-id="4699" instrument_node="">To put it simply: </span></span><span data-dcnode-id="4697" instrument_node="">yes, foxes are legal in Delaware.</span></p><p data-dcnode-id="4694"><span data-dcnode-id="4695" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="4669"><p data-dcnode-id="4692"><span data-dcnode-id="4693" instrument_node="">15.0 Collection or Sale of Native Wildlife</span></p><p data-dcnode-id="4690"><span data-dcnode-id="4691" instrument_node="">(Penalty Section 7&nbsp;Del.C.&nbsp;§103(d))</span></p><p data-dcnode-id="4688"><span data-dcnode-id="4689" instrument_node="">15.1 Commercial Collection.</span></p><p data-dcnode-id="4686"><span data-dcnode-id="4687" instrument_node="">15.1.1 Unless otherwise provided by law or regulation of the Department, it shall be unlawful for any person to collect, possess, import, cause to be imported, export, cause to be exported, buy, sell or offer for sale any native wildlife species or any part thereof for commercial purposes without a permit from the Director. The permit shall limit the terms and conditions for collecting or possessing said wildlife within the State.</span></p><p data-dcnode-id="4684"><span data-dcnode-id="4685" instrument_node="">15.1.2 Notwithstanding subsection 15.1.1 of this section, native wildlife species may be possessed, imported, sold or offered for sale for commercial purposes without a permit from the Director if there is written documentation to confirm that said wildlife was legally taken in and transported from another state.</span></p><p data-dcnode-id="4682"><span data-dcnode-id="4683" instrument_node="">?</span></p><p data-dcnode-id="4680"><span data-dcnode-id="4681" instrument_node="">§ 7201. Possession; permit required.</span></p><p data-dcnode-id="4678"><span data-dcnode-id="4679" instrument_node="">No person shall bring into this State, possess, sell or exhibit any live wild mammal or hybrid of a wild mammal or live reptile not native to or generally found in Delaware without first securing a permit under this chapter. The Department of Agriculture may adopt regulations to exempt such mammals and reptiles that do not represent a significant threat to community interests from the provisions of this chapter. Notwithstanding any provision of this chapter to the contrary, except for medical or psychological research or for display in any licensed zoological park or traveling circus, no person shall bring into this State, possess, sell or exhibit any poisonous snake not native to or generally found in Delaware where the venom of such snake poses a risk of serious injury or death to a human, and no permit for the same shall be issued by the Department of Agriculture.</span></p><p data-dcnode-id="4676"><span data-dcnode-id="4677" instrument_node="">§ 7202. Permit; rules and regulations; exemptions.</span></p><p data-dcnode-id="4674"><span data-dcnode-id="4675" instrument_node="">The Department of Agriculture shall enforce this chapter and may issue a permit where the possession or exhibition of a live wild mammal or hybrid of a wild mammal or live reptile will be in the public interest, and may promulgate rules and regulations for the proper enforcement of this chapter. The Department may designate agencies authorized to conduct animal cruelty enforcement and/or dog control enforcement to enforce the provisions of this chapter. The Department shall receive a fee of $25 for each and every permit issued. Nothing in this chapter shall be deemed to prevent the use of any live wild mammal or hybrid of a wild mammal or live reptile in medical or psychological research or for display in any municipal zoological park or traveling circus after issuance of a permit.</span></p><p data-dcnode-id="4672"><span data-dcnode-id="4673" instrument_node="">§ 7203. Penalties.</span></p><p data-dcnode-id="4670"><span data-dcnode-id="4671" instrument_node="">Whoever violates this chapter shall for each offense be fined not more than $500, imprisoned not more than 30 days, or both. Justices of the peace shall have jurisdiction over offenses under this chapter.</span></p></blockquote><p data-dcnode-id="4667"><span data-dcnode-id="4668" instrument_node="">Citation:&nbsp;DELAWARE ADMIN. CODE 15.0-15.1; DELAWARE&nbsp;CODE&nbsp;ANN&nbsp;tit. 3 §7201-7203</span></p><p data-dcnode-id="4665"><br data-dcnode-id="4666"></p><p data-dcnode-id="4662"><span class="wz-bold" data-dcnode-id="4663" style="color: rgb(22, 114, 219);"><span data-dcnode-id="4664" instrument_node="">FLORIDA</span></span></p><p data-dcnode-id="4656"><span class="wz-bold" data-dcnode-id="4660"><span data-dcnode-id="4661" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="4658"><span data-dcnode-id="4659" instrument_node="">To put it simply:</span></span><span data-dcnode-id="4657" instrument_node=""> yes, foxes are legal in Florida.</span></p><p data-dcnode-id="4654"><span data-dcnode-id="4655" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="4437"><p data-dcnode-id="4652"><span data-dcnode-id="4653" instrument_node="">68A-6.0011. Possession of Wildlife in Captivity; Permit Requirements.</span></p><p data-dcnode-id="4650"><span data-dcnode-id="4651" instrument_node="">(1) Except as otherwise provided in this Title, no person shall possess any native or non-native wildlife in captivity except as authorized by permit issued in accordance with Section 379.3761 or 379.3762, F.S., and as provided in this chapter.</span></p><p data-dcnode-id="4648"><span data-dcnode-id="4649" instrument_node="">(2) The provisions of this chapter shall not apply to entities operating solely as research facilities, which are registered and regulated as such in accordance with Animal Welfare Act (7 U.S.C. 2131, et. seq.) and regulations promulgated thereunder, provided the following requirements are met:</span></p><p data-dcnode-id="4646"><span data-dcnode-id="4647" instrument_node="">(a) Such facilities must maintain on premises a detailed research proposal which shall state with particularity the research objectives, methodology, and study duration, and outline planned safegaurds to assure proper containment of the wildlife. Maintain an annual record of progress toward the research project objectives. Such research proposal and record of progress shall be available for inspection upon request of Commission personnel.</span></p><p data-dcnode-id="4644"><span data-dcnode-id="4645" instrument_node="">(b) Such facilities housing wildlife must maintain such wildlife in cages or enclosures which meet the structural requirements as specified in Rule 68A-6.003, F.A.C.</span></p><p data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">(3) The provisions of this chapter shall not apply to persons possessing the following non-native wildlife species exclusively for the purpose of production of meat, skins or hides, feathers or progeny thereof, and not for personal possession or public display or exhibition:</span></p><p data-dcnode-id="4640"><span data-dcnode-id="4641" instrument_node="">(a) Ostrich</span></p><p data-dcnode-id="4638"><span data-dcnode-id="4639" instrument_node="">(b) Cassowary</span></p><p data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">© Rhea</span></p><p data-dcnode-id="4634"><span data-dcnode-id="4635" instrument_node="">(d) Emu</span></p><p data-dcnode-id="4632"><span data-dcnode-id="4633" instrument_node="">(e) Bison</span></p><p data-dcnode-id="4630"><span data-dcnode-id="4631" instrument_node="">?</span></p><p data-dcnode-id="4628"><span data-dcnode-id="4629" instrument_node="">68A-6.002. Categories of Captive Wildlife.</span></p><p data-dcnode-id="4626"><span data-dcnode-id="4627" instrument_node="">(1) The Commission hereby establishes the following categories of wildlife including their taxonomic sucessors and subspecies thereof:</span></p><p data-dcnode-id="4624"><span data-dcnode-id="4625" instrument_node="">(a) Class I:</span></p><p data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">1. Chimpanzees (genus Pan)</span></p><p data-dcnode-id="4620"><span data-dcnode-id="4621" instrument_node="">2. Gorillas (genus Gorilla)</span></p><p data-dcnode-id="4618"><span data-dcnode-id="4619" instrument_node="">3. Gibbons and Siamangs (family Hylobatidae)</span></p><p data-dcnode-id="4616"><span data-dcnode-id="4617" instrument_node="">4. Drills and mandrills (genus Mandrillus)</span></p><p data-dcnode-id="4614"><span data-dcnode-id="4615" instrument_node="">5. Orangutans (genus Pongo)</span></p><p data-dcnode-id="4612"><span data-dcnode-id="4613" instrument_node="">6. Baboons (genus Papio)</span></p><p data-dcnode-id="4610"><span data-dcnode-id="4611" instrument_node="">7. Gelada baboons (genus Theropithecus)</span></p><p data-dcnode-id="4608"><span data-dcnode-id="4609" instrument_node="">8. Snow leopards (Panthera uncia)</span></p><p data-dcnode-id="4606"><span data-dcnode-id="4607" instrument_node="">9. Leopards (Panthera pardus)</span></p><p data-dcnode-id="4604"><span data-dcnode-id="4605" instrument_node="">10. Jaguars (Panthera onca)</span></p><p data-dcnode-id="4602"><span data-dcnode-id="4603" instrument_node="">11. Tigers (Panthera tigris)</span></p><p data-dcnode-id="4600"><span data-dcnode-id="4601" instrument_node="">12. Lions (Panthera leo)</span></p><p data-dcnode-id="4598"><span data-dcnode-id="4599" instrument_node="">13. Bears (family Ursidae)</span></p><p data-dcnode-id="4596"><span data-dcnode-id="4597" instrument_node="">14. Rhinoceros (family Rhinocerotidae)</span></p><p data-dcnode-id="4594"><span data-dcnode-id="4595" instrument_node="">15. Elephants (family Elephantidae)</span></p><p data-dcnode-id="4592"><span data-dcnode-id="4593" instrument_node="">16. Hippopotamuses (family Hippopotamidae)</span></p><p data-dcnode-id="4590"><span data-dcnode-id="4591" instrument_node="">17. Cape buffalos and Gaur (family Bovidae)</span></p><p data-dcnode-id="4588"><span data-dcnode-id="4589" instrument_node="">18. Crocodiles (except dwarf and Congo) (family Crocodylidae)</span></p><p data-dcnode-id="4586"><span data-dcnode-id="4587" instrument_node="">19. Gavials (family Gavialidae)</span></p><p data-dcnode-id="4584"><span data-dcnode-id="4585" instrument_node="">20. Black caimans (Melanosuchus niger)</span></p><p data-dcnode-id="4582"><span data-dcnode-id="4583" instrument_node="">21. Komodo dragons (Varanus komodoensis)</span></p><p data-dcnode-id="4580"><span data-dcnode-id="4581" instrument_node="">22. Hyenas and Aardwolf (family Hyaenidae)</span></p><p data-dcnode-id="4578"><span data-dcnode-id="4579" instrument_node="">23. Cougars, panthers (Puma concolor)</span></p><p data-dcnode-id="4576"><span data-dcnode-id="4577" instrument_node="">24. Cheetahs (Acinonyx jabatus)</span></p><p data-dcnode-id="4574"><span data-dcnode-id="4575" instrument_node="">(b) Class II:</span></p><p data-dcnode-id="4572"><span data-dcnode-id="4573" instrument_node="">1. Howler monkeys (genus Alouatta)</span></p><p data-dcnode-id="4570"><span data-dcnode-id="4571" instrument_node="">2. Uakaris (genus Cacajao)</span></p><p data-dcnode-id="4568"><span data-dcnode-id="4569" instrument_node="">3. Mangabeys (genus Cercocebus)</span></p><p data-dcnode-id="4566"><span data-dcnode-id="4567" instrument_node="">4. Guenons (genus Cercopithecus)</span></p><p data-dcnode-id="4564"><span data-dcnode-id="4565" instrument_node="">5. Patas monkeys (genus Erythrocebus)</span></p><p data-dcnode-id="4562"><span data-dcnode-id="4563" instrument_node="">6. Vervet, Grivet or Green monkeys (genus Chlorocebus)</span></p><p data-dcnode-id="4560"><span data-dcnode-id="4561" instrument_node="">7. Sakis (genus Chiropotes and Pithecea)</span></p><p data-dcnode-id="4558"><span data-dcnode-id="4559" instrument_node="">8. Guereza monkeys (genus Colobus)</span></p><p data-dcnode-id="4556"><span data-dcnode-id="4557" instrument_node="">9. Idris (genus Indri)</span></p><p data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">10. Macaques and Celebes black apes (genus Macaca)</span></p><p data-dcnode-id="4552"><span data-dcnode-id="4553" instrument_node="">11. Langurs (genus Presbytis)</span></p><p data-dcnode-id="4550"><span data-dcnode-id="4551" instrument_node="">12. Douc langurs (genus Pygathrix)</span></p><p data-dcnode-id="4548"><span data-dcnode-id="4549" instrument_node="">13. Snub-nosed langurs (genus Phinopithecus)</span></p><p data-dcnode-id="4546"><span data-dcnode-id="4547" instrument_node="">14. Proboscis monkeys (genus Nasalis)</span></p><p data-dcnode-id="4544"><span data-dcnode-id="4545" instrument_node="">15. Servals (Leptailurus serval)</span></p><p data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">16. European and Canadian lynx (Lynx lynx)</span></p><p data-dcnode-id="4540"><span data-dcnode-id="4541" instrument_node="">17. Bobcats (Lynx rufus)</span></p><p data-dcnode-id="4538"><span data-dcnode-id="4539" instrument_node="">18. Caracals (Caracal caracal)</span></p><p data-dcnode-id="4536"><span data-dcnode-id="4537" instrument_node="">19. African golden cats (Profelis aurata)</span></p><p data-dcnode-id="4534"><span data-dcnode-id="4535" instrument_node="">20. Temminck?s golden cats (Profelis temmincki)</span></p><p data-dcnode-id="4532"><span data-dcnode-id="4533" instrument_node="">21. Fishing cats (Prionailurus viverrina)</span></p><p data-dcnode-id="4530"><span data-dcnode-id="4531" instrument_node="">22. Ocelots (Leopardus pardalis)</span></p><p data-dcnode-id="4528"><span data-dcnode-id="4529" instrument_node="">23. Clouded leopards (Neofelis nebulosa)</span></p><p data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">24. Wolves, coyotes, jackals (family Canidae)</span></p><p data-dcnode-id="4524"><span data-dcnode-id="4525" instrument_node="">25. Indian dholes (Cuon alpinus)</span></p><p data-dcnode-id="4522"><span data-dcnode-id="4523" instrument_node="">26. African hunting dogs (Lycaon pictus)</span></p><p data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">27. Wolverines (Gulo gulo)</span></p><p data-dcnode-id="4518"><span data-dcnode-id="4519" instrument_node="">28. Honey badgers (Mellivora capensis)</span></p><p data-dcnode-id="4516"><span data-dcnode-id="4517" instrument_node="">29. American badgers (Taxides taxus)</span></p><p data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">30. Old World badgers (Meles meles)</span></p><p data-dcnode-id="4512"><span data-dcnode-id="4513" instrument_node="">31. Binturongs (Arctictis binturong)</span></p><p data-dcnode-id="4510"><span data-dcnode-id="4511" instrument_node="">32. Dwarf crocodiles (Osteolaemus tetraspis)</span></p><p data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">33. Alligators, caimans (family Alligatoridae)</span></p><p data-dcnode-id="4506"><span data-dcnode-id="4507" instrument_node="">34. Ostrich (Struthio camelus)</span></p><p data-dcnode-id="4504"><span data-dcnode-id="4505" instrument_node="">35. Cassowary (Casuarius spp.)</span></p><p data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">36. Giraffe and Okapi (family Giraffidae)</span></p><p data-dcnode-id="4500"><span data-dcnode-id="4501" instrument_node="">37. Tapir (family Tapiridae)</span></p><p data-dcnode-id="4498"><span data-dcnode-id="4499" instrument_node="">38. Wild cattle; forest, woodland and aridland antelope; and similar species of non-native hoofstock (family Bovidae)</span></p><p data-dcnode-id="4496"><span data-dcnode-id="4497" instrument_node="">Such non-native hoofstock to include: Forest buffalo, Banteng, Anoa, Waterbuck, Wildebeest, Hartebeest, Eland, Kudu, Nilgai, Bongo, lechwe, Roan and Sable antelope, Sitatunga, Bontebok, Blesbok, Topi, Kob, Addax, Oryx, Gemsbok, and other wild species of the family Bovidae which are of similar size, habits and nature.</span></p><p data-dcnode-id="4494"><span data-dcnode-id="4495" instrument_node="">© Class III: All other wildlife not listed herein, except those for which a permit is not required pursuant to Rule 68A-6.0022, F.A.C.</span></p><p data-dcnode-id="4492"><span data-dcnode-id="4493" instrument_node="">(d) Hybrids resulting from the cross between wildlife and domestic animal, which are substantially similar in size, characteristics and behavior so as to be indistinguishable from the wild animal shall be regulated as wildlife at the higher and more restricted class of the wild parent.</span></p><p data-dcnode-id="4490"><span data-dcnode-id="4491" instrument_node="">(2) Except as provided in Rule 68A-6.0021, F.A.C., Class I wildlife shall not be possessed for personal use.</span></p><p data-dcnode-id="4488"><span data-dcnode-id="4489" instrument_node="">(3) Persons possessing any captive wildlife for purposes of public display or sale shall obtain a permit as specified in Section 379.3761, F.S.</span></p><p data-dcnode-id="4486"><span data-dcnode-id="4487" instrument_node="">(4) Persons possessing Class II wildlife as personal use wildlife shall purchase a permit as provided in Section 379.3762, F.S.</span></p><p data-dcnode-id="4484"><span data-dcnode-id="4485" instrument_node="">(5) Persons possessing Class III wildlife as personal use wildlife shall obtain a no-cost permit from the Executive Director.</span></p><p data-dcnode-id="4482"><span data-dcnode-id="4483" instrument_node="">(6) Fox, skunks, bats, raccoons, or white tail deer taken from the wild shall not be possessed as personal use wildlife and shall be possessed only in accordance with permits issued under Rules 68A-9.002, 68A-9.006, F.A.C., or Section 379.3761, F.S.</span></p><p data-dcnode-id="4480"><span data-dcnode-id="4481" instrument_node="">?</span></p><p data-dcnode-id="4478"><span data-dcnode-id="4479" instrument_node="">68A-6.004. Standard Caging Requirements for Captive Wildlife.</span></p><p data-dcnode-id="4476"><span data-dcnode-id="4477" instrument_node="">(1) No captive wildlife shall be confined in any cage or other enclosure which contains more individual animals, or is smaller in dimension than as specified in this section, or is not equipped as specified in this section, except as defined in Rule 68A-6.0041, F.A.C., or as authorized in accordance with the following:</span></p><p data-dcnode-id="4474"><span data-dcnode-id="4475" instrument_node="">Requests for deviations from standard caging or enclosure requirements may be granted to allow for different size configuration (length, width and height) if the required square footage is adequate and if the locomotory needs of the animal(s) are not compromised. Wet or dry moats may be substituted for the required fencing for retaining some species of wildlife. Any proposed deviations from the standard caging or enclosure requirements, or proposals to use wet or dry moats to substitute for fencing, or proposals to use open air habitats except as provided herein, must be approved in writing by the Commission prior to the use of the cage or enclosure for housing animals.</span></p><p data-dcnode-id="4472"><span data-dcnode-id="4473" instrument_node="">(2) Definitions: Where specified in this section, wildlife cages and enclosures shall be equipped to provide for the protection and welfare of the animals. Such equipment includes, but is not limited to:</span></p><p data-dcnode-id="4470"><span data-dcnode-id="4471" instrument_node="">(a) Shelter, nest box or den: A structure that protects captive wildlife from the elements (weather conditions). Such structures may vary in size depending on the security and biological needs of the species. They are particularly described as follows:</span></p><p data-dcnode-id="4468"><span data-dcnode-id="4469" instrument_node="">1. Shelter: A structure which shall provide protection from the elements and from extremes in temperature that are detrimental to the health and welfare of the animal. When vegetation and landscaping is available to serve as protection from the elements, access to a shelter shall also be provided during inclement weather conditions. Such shelter shall be attached to or adjacent to the paddock, habitat, or enclosure.</span></p><p data-dcnode-id="4466"><span data-dcnode-id="4467" instrument_node="">2. Nest box or den: An enclosed shelter that provides a retreat area within, attached to, or adjacent to a cage or enclosure of specified size, which shall provide protection from the elements and from extremes in temperature that are detrimental to the health and welfare of the animal.</span></p><p data-dcnode-id="4464"><span data-dcnode-id="4465" instrument_node="">(b) Elevated platform or perching area: A surface or structure, either natural or manmade, positioned above the floor, or above the grade level of the cage or enclosure, that will provide a resting area for the animal(s).</span></p><p data-dcnode-id="4462"><span data-dcnode-id="4463" instrument_node="">© Original floor area: The total square footage required for the initial number of animals specified. For example, this is calculated by finding the new total area required for 4 squirrel monkeys when the original floor area equals 20? for 1 or 2 animals (4? x 5? x 5? high). For each additional animal, there is an increase in cage or enclosure size by 25 percent of original floor area. For two additional monkeys: 25% x 20? x 2 animals = 10?; add 10? to 20? = 30 total square feet of floor area required for 4 monkeys. New cages or enclosures can be 6? x 5? x 5? high, or any width/length dimension that equals or exceeds the increased cage or enclosure space.</span></p><p data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node="">(d) Gnawing and chewing items: Natural or artificial materials that provide for the health of teeth, so as to, keep teeth sharp, wear down enamel and promote general oral hygiene. Gnawing items include, but are not limited to, logs and trees. Chewing items include, but are not limited to, woody stems, knuckle bones, and rawhide objects; suitability dependent upon species.</span></p><p data-dcnode-id="4458"><span data-dcnode-id="4459" instrument_node="">?</span></p><p data-dcnode-id="4456"><span data-dcnode-id="4457" instrument_node="">(4) Carnivores and Certain Omnivores with Similar Requirements:</span></p><p data-dcnode-id="4454"><span data-dcnode-id="4455" instrument_node="">?</span></p><p data-dcnode-id="4452"><span data-dcnode-id="4453" instrument_node="">(h) Wild Canids.</span></p><p data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">In addition to the requirements of this section, each cage or enclosure shall be equipped with a shelter(s)/ den(s) that shall accommodate all the animals in the enclosure simultaneously. Each enclosure shall have an accessible device to provide physical stimulation or manipulation compatible with the species. Such device shall be noninjurious, and may include, but is not limited to boxes, balls, bones, barrels, drums, rawhide, pools, etc.</span></p><p data-dcnode-id="4448"><span data-dcnode-id="4449" instrument_node="">1. Foxes, small (e.g., Fennec, kit)</span></p><p data-dcnode-id="4446"><span data-dcnode-id="4447" instrument_node="">a. For one or two animals, a cage 6 feet by 4 feet, 4 feet high. For each additional animal, increase cage size by 25 percent of original floor area.</span></p><p data-dcnode-id="4444"><span data-dcnode-id="4445" instrument_node="">b. Each cage shall have an elevated platform(s) that shall accommodate all animals in the enclosure simultaneously.</span></p><p data-dcnode-id="4442"><span data-dcnode-id="4443" instrument_node="">2. Foxes (e.g., red, grey, Arctic, bat eared, bush dogs)</span></p><p data-dcnode-id="4440"><span data-dcnode-id="4441" instrument_node="">a. For one or two animals, a cage 8 feet by 6 feet, 6 feet high. For each additional animal, increase cage size by 25 percent of original floor area.</span></p><p data-dcnode-id="4438"><span data-dcnode-id="4439" instrument_node="">b. Each cage shall have an elevated platform(s) that shall accommodate all animals in the enclosure simultaneously.</span></p></blockquote><p data-dcnode-id="4435"><span data-dcnode-id="4436" instrument_node="">Citation:&nbsp;FLORIDA ADMIN. CODE 68A-6.0011, 68A-6.002,&nbsp;68A-6.004</span></p><p data-dcnode-id="4433"><br data-dcnode-id="4434"></p><p data-dcnode-id="4430"><span class="wz-bold" data-dcnode-id="4431" style="color: rgb(22, 114, 219);"><span data-dcnode-id="4432" instrument_node="">GEORGIA</span></span></p><p data-dcnode-id="4424"><span class="wz-bold" data-dcnode-id="4428"><span data-dcnode-id="4429" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="4426"><span data-dcnode-id="4427" instrument_node="">To put it simply:</span></span><span data-dcnode-id="4425" instrument_node=""> no, foxes are not legal in Georgia.</span></p><p data-dcnode-id="4422"><span data-dcnode-id="4423" instrument_node="">The legal jargon:</span></p><div data-dcnode-id="4306" id="insideText"><div data-dcnode-id="4307"><div data-dcnode-id="4308" id="node-1202"><div data-dcnode-id="4309"><blockquote data-dcnode-id="4310"><p data-dcnode-id="4420"><span data-dcnode-id="4421" instrument_node="">Keeping Georgia Wildlife as Pets</span></p><p data-dcnode-id="4418"><span data-dcnode-id="4419" instrument_node="">The animals listed below are examples of the exotic species regulated under Georgia Law. The Department should be consulted before any exotic animals which are&nbsp;not normally domesticated in Georgia&nbsp;are acquired. Hybrids or crosses between any combination of domestic animals, wildlife, or regulated wild animals and all subsequent generations are regulated in Georgia and may not be held without a license. The exotic species listed below, except where otherwise noted, may not be held as pets in Georgia. This list is not all inclusive.</span></p><ul class="style-circle" data-dcnode-id="4311"><li data-dcnode-id="4416"><span data-dcnode-id="4417" instrument_node="">Marsupials (wallabies, kangaroos, sugar gliders, etc.); all species</span></li><li data-dcnode-id="4414"><span data-dcnode-id="4415" instrument_node="">Insectivores (shrews, moles, hedgehogs, tenrecs, etc.); all species</span></li><li data-dcnode-id="4412"><span data-dcnode-id="4413" instrument_node="">Flying lemurs; all species</span></li><li data-dcnode-id="4410"><span data-dcnode-id="4411" instrument_node="">Bats; all species</span></li><li data-dcnode-id="4408"><span data-dcnode-id="4409" instrument_node="">Primates (monkeys, apes, etc.); all species</span></li><li data-dcnode-id="4406"><span data-dcnode-id="4407" instrument_node="">Sloths, armadillos, etc.; all species</span></li><li data-dcnode-id="4404"><span data-dcnode-id="4405" instrument_node="">Pangolins or scaly anteaters; all species</span></li><li data-dcnode-id="4402"><span data-dcnode-id="4403" instrument_node="">Rabbits and hares; all species except those normally domesticated</span></li><li data-dcnode-id="4400"><span data-dcnode-id="4401" instrument_node="">Rodents (capybaras, cavies, prairie dogs, degus, etc.); all species except those normally domesticated in Georgia such as hamsters, gerbils, and guinea pigs</span></li><li data-dcnode-id="4398"><span data-dcnode-id="4399" instrument_node="">Whales, dolphins, etc.; all species</span></li><li data-dcnode-id="4396"><span data-dcnode-id="4397" instrument_node="">Carnivores (weasels, ferrets, foxes, cats, bears, wolves, etc.); all species.</span></li><li data-dcnode-id="4394"><span data-dcnode-id="4395" instrument_node="">Aardvark; all species</span></li><li data-dcnode-id="4392"><span data-dcnode-id="4393" instrument_node="">Elephants; all species</span></li><li data-dcnode-id="4390"><span data-dcnode-id="4391" instrument_node="">Conies; all species</span></li><li data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">Manatee, dugong; all species</span></li><li data-dcnode-id="4386"><span data-dcnode-id="4387" instrument_node="">Ungulates (hoof stock); all species except American bison, water buffalos,&nbsp;and llamas</span></li><li data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">Rhinoceros</span></li><li data-dcnode-id="4382"><span data-dcnode-id="4383" instrument_node="">Wart hog</span></li><li data-dcnode-id="4380"><span data-dcnode-id="4381" instrument_node="">Hippopotamus</span></li><li data-dcnode-id="4378"><span data-dcnode-id="4379" instrument_node="">Hawks, eagles, vultures, etc.; all species</span></li><li data-dcnode-id="4376"><span data-dcnode-id="4377" instrument_node="">Turkeys; all species except those normally domesticated</span></li><li data-dcnode-id="4374"><span data-dcnode-id="4375" instrument_node="">Monk parakeet (a.k.a. Quaker parakeet)</span></li><li data-dcnode-id="4372"><span data-dcnode-id="4373" instrument_node="">Cuckoos; all species</span></li><li data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">Owls; all species</span></li><li data-dcnode-id="4368"><span data-dcnode-id="4369" instrument_node="">Sky larks</span></li><li data-dcnode-id="4366"><span data-dcnode-id="4367" instrument_node="">Bulbuls; all species</span></li><li data-dcnode-id="4364"><span data-dcnode-id="4365" instrument_node="">Thrushes; all species of genus&nbsp;Turdus</span></li><li data-dcnode-id="4362"><span data-dcnode-id="4363" instrument_node="">White eyes; all species of genus&nbsp;Zosterops</span></li><li data-dcnode-id="4360"><span data-dcnode-id="4361" instrument_node="">Yellow hammers</span></li><li data-dcnode-id="4358"><span data-dcnode-id="4359" instrument_node="">Sparrows; all species of genus&nbsp;Passer&nbsp;except English sparrow</span></li><li data-dcnode-id="4356"><span data-dcnode-id="4357" instrument_node="">Cape weaver</span></li><li data-dcnode-id="4354"><span data-dcnode-id="4355" instrument_node="">Baya weaver</span></li><li data-dcnode-id="4352"><span data-dcnode-id="4353" instrument_node="">Queleas; all species</span></li><li data-dcnode-id="4350"><span data-dcnode-id="4351" instrument_node="">Blackbirds, grackles, etc.; all species of genera&nbsp;Molothrus, Quiscalus, Agelaius</span></li><li data-dcnode-id="4348"><span data-dcnode-id="4349" instrument_node="">Java sparrow (a.k.a. Java Rice Bird, Java Rice Finch)</span></li><li data-dcnode-id="4346"><span data-dcnode-id="4347" instrument_node="">Starlings, mynas, etc.; all species except European starling and Hill mynas</span></li><li data-dcnode-id="4344"><span data-dcnode-id="4345" instrument_node="">Crows, ravens, etc.; all species</span></li><li data-dcnode-id="4342"><span data-dcnode-id="4343" instrument_node="">Crocodiles, gavials, etc.; all species</span></li><li data-dcnode-id="4340"><span data-dcnode-id="4341" instrument_node="">Alligators and caimans; all species</span></li><li data-dcnode-id="4338"><span data-dcnode-id="4339" instrument_node="">Cobras, coral snakes, etc.; all species</span></li><li data-dcnode-id="4336"><span data-dcnode-id="4337" instrument_node="">Adders, vipers, etc.; all species</span></li><li data-dcnode-id="4334"><span data-dcnode-id="4335" instrument_node="">Pit vipers; all species</span></li><li data-dcnode-id="4332"><span data-dcnode-id="4333" instrument_node="">Venomous colubrid snakes; all species</span></li><li data-dcnode-id="4330"><span data-dcnode-id="4331" instrument_node="">Gila monsters and beaded lizards; all species</span></li><li data-dcnode-id="4328"><span data-dcnode-id="4329" instrument_node="">Giant and Marine toads</span></li><li data-dcnode-id="4326"><span data-dcnode-id="4327" instrument_node="">Banded tetra</span></li><li data-dcnode-id="4324"><span data-dcnode-id="4325" instrument_node="">Piranha; all species</span></li><li data-dcnode-id="4322"><span data-dcnode-id="4323" instrument_node="">Grass, Silver and Bighead carp</span></li><li data-dcnode-id="4320"><span data-dcnode-id="4321" instrument_node="">Air-breathing catfishes; all species</span></li><li data-dcnode-id="4318"><span data-dcnode-id="4319" instrument_node="">Parasitic catfishes; all species</span></li><li data-dcnode-id="4316"><span data-dcnode-id="4317" instrument_node="">Giant walking catfishes; all species</span></li><li data-dcnode-id="4314"><span data-dcnode-id="4315" instrument_node="">Snakeheads; all species of genera&nbsp;Ophicephalus&nbsp;and&nbsp;Channa</span></li><li data-dcnode-id="4312"><span data-dcnode-id="4313" instrument_node="">Fresh-water stingray; all species</span></li></ul></blockquote></div></div></div></div><p data-dcnode-id="4302"><span data-dcnode-id="4305" instrument_node="">Citation: </span><a data-dcnode-id="4303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.umblr.com/redirect%3Fz%3Dhttp%253A%252F%252Fwww.georgiawildlife.com%252Fnode%252F1202%26t%3DNDU2ZDVkNjJhNTI4MDExMWEzODViYTNkNDY4ODFlNGMxYjk2NGI3Yyx3c0VKRDNOOA%253D%253D" id="293E9CAF-F891-4E4F-BCD9-BCF6716151D2"><span data-dcnode-id="4304" instrument_node="">Georgia Department of Natural Resources, Wildlife Resources Division</span></a></p></div><span data-dcnode-id="4300" instrument_node="">

</span><div class="webs-container webs-module-text" data-dcnode-id="3315"><span data-dcnode-id="4291" instrument_node="">
</span><div class="webs-text" data-dcnode-id="3317"><p data-dcnode-id="4288"><span class="wz-bold" data-dcnode-id="4289" style="color: rgb(22, 114, 219);"><span data-dcnode-id="4290" instrument_node="">HAWAII</span></span></p><p data-dcnode-id="4284"><span class="wz-bold" data-dcnode-id="4286"><span data-dcnode-id="4287" instrument_node=""> To put it simply:</span></span><span data-dcnode-id="4285" instrument_node=""> no, foxes are not legal in Hawaii.</span></p><p data-dcnode-id="4282"><span data-dcnode-id="4283" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="4243"><p data-dcnode-id="4277"><span data-dcnode-id="4281" instrument_node="">§4-71-2&nbsp;</span><span class="wz-underline" data-dcnode-id="4279"><span data-dcnode-id="4280" instrument_node="">Definitions</span></span><span data-dcnode-id="4278" instrument_node="">. As used in the chapter:</span></p><p data-dcnode-id="4275"><span data-dcnode-id="4276" instrument_node="">?</span></p><p data-dcnode-id="4273"><span data-dcnode-id="4274" instrument_node="">?Non-domestic animal? means any animal, including mammals, birds, reptiles, amphibians, fishes and invertebrates, other than domestic dog (Canis familiaris), domestic cat (Felis catus), domestic horse (Equus caballus), domestic ass, burro, or donkey (Equus asinus), domestic cattle (Bos taurus and Bos indicus) including the beefalo (3/8 bison and 5/8 domestic cattle), domestic sheep (Ovis aries), domestic goat (Capra hircus), domestic swine (Sus scrofa domestica), domestic pot-bellied pig (Sus salvanis), domestic alpaca (Lama pacos), domestic llama (Lama glama), domesticated races of European rabbit (Oryctolagus cuniculus), domesticated races of chicken (Gallus gallus), domesticated races of turkeys (Meleagris gallopavo), domesticated races of pigeons (Columba domestica and Columba livia), domesticated races of muscovy ducks (Cairina moschata), domesticated races of greylag geese (Anser anser) and swan geese (Anser cygnoides), and domestic hybrids (crosses between two domestic animals). As used in this chapter, the term or word, ?animal,? shall mean ?non-domestic animal;?</span></p><p data-dcnode-id="4271"><span data-dcnode-id="4272" instrument_node="">?</span></p><p data-dcnode-id="4269"><span data-dcnode-id="4270" instrument_node="">SUBCHAPTER 2</span></p><p data-dcnode-id="4267"><span data-dcnode-id="4268" instrument_node="">NON-DOMESTIC ANIMAL INTRODUCTIONS</span></p><p data-dcnode-id="4262"><span data-dcnode-id="4266" instrument_node=""> §4-71-5&nbsp;</span><span class="wz-underline" data-dcnode-id="4264"><span data-dcnode-id="4265" instrument_node="">Notice of quarantine</span></span><span data-dcnode-id="4263" instrument_node="">. The board finds that there exists serious danger to the agricultural, horticultural, and aquacultural industries, natural resources, and environment of Hawaii by the uncontrolled introduction of feral and other non-domestic animals.</span></p><p data-dcnode-id="4257"><span data-dcnode-id="4261" instrument_node=""> §4-71-6&nbsp;</span><span class="wz-underline" data-dcnode-id="4259"><span data-dcnode-id="4260" instrument_node="">Prohibited introductions</span></span><span data-dcnode-id="4258" instrument_node="">. (a) The introduction into Hawaii of live animals or live non-domestic animals as defined in this chapter at any stage of development is prohibited except for those animals on the lists incorporated in §4-71-6.5 by permit, and except as provided by section 150A-6.2, HRS.</span></p><p data-dcnode-id="4255"><span data-dcnode-id="4256" instrument_node="">(b) The list of animals designated as prohibited entry pursuant to section 150A-6.2, HRS, dated November 28, 2006, and located at the end of this chapter is made a part of this section. No person shall introduce into Hawaii any animal from the list of prohibited animals.</span></p><p data-dcnode-id="4250"><span data-dcnode-id="4254" instrument_node=""> §4-71-6.1&nbsp;</span><span class="wz-underline" data-dcnode-id="4252"><span data-dcnode-id="4253" instrument_node="">Ad hoc panel for identification of prohibited hybrid animal</span></span><span data-dcnode-id="4251" instrument_node="">. (a) The chairperson shall establish an ad hoc panel of no fewer than three members with applicable expertise in vertebrate biology to determine if an animal is a prohibited hybrid animal when the branch suspects that the lineage of the animal is not as stated by the owner or on other official documents.</span></p><p data-dcnode-id="4248"><span data-dcnode-id="4249" instrument_node="">(b) The ad hoc panel shall review all pertinent information including, but not limited to, expert consultations, health and pedigree certificates, owner?s statements, branch findings, or viewings of the animal, to determine lineage of a suspect prohibited hybrid animal.</span></p><p data-dcnode-id="4246"><span data-dcnode-id="4247" instrument_node="">© After its review and determination the ad hoc panel shall report its findings to the branch, and appropriate action shall be taken by the branch on the disposition of the suspect hybrid prohibited animal.</span></p><p data-dcnode-id="4244"><span data-dcnode-id="4245" instrument_node="">(d) In any contested case arising out of the identification of a suspected hybrid animal, the method of identification selected by the ad hoc panel shall not be overturned absent evidence of actual bias on the part of one or more of the ad hoc panel members or unless the method of identification lacks a scientific basis.</span></p></blockquote><p data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">Citation:&nbsp;HAWAII ADMIN. RULES&nbsp;§4-71-2,&nbsp;§4-71-5,&nbsp;§4-71-6,&nbsp;§4-71-6.1</span></p><p data-dcnode-id="4239"><br data-dcnode-id="4240"></p><p data-dcnode-id="4236"><span class="wz-bold" data-dcnode-id="4237" style="color: rgb(22, 114, 219);"><span data-dcnode-id="4238" instrument_node="">IDAHO</span></span></p><p data-dcnode-id="4230"><span class="wz-bold" data-dcnode-id="4234"><span data-dcnode-id="4235" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="4232"><span data-dcnode-id="4233" instrument_node="">To put it simply:</span></span><span data-dcnode-id="4231" instrument_node=""> no, foxes are not legal in Idaho.</span></p><p data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="4219"><p data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">25-236.&nbsp;POSSESSION, SALE, TRADE, BARTER, EXCHANGE AND IMPORTATION OF ANIMALS.</span></p><p data-dcnode-id="4224"><span data-dcnode-id="4225" instrument_node="">(1) No person shall possess, offer for sale, trade, barter, exchange or importation into the state of Idaho any fox, skunk or raccoon, except as provided in subsection (2) or (3) of this section.</span></p><p data-dcnode-id="4222"><span data-dcnode-id="4223" instrument_node="">(2) Fur farms may possess or import any domestic fur-bearing animals with a certificate of veterinary inspection and domestic fur-bearing animals may be sold, traded, bartered or exchanged between fur farms in Idaho.</span></p><p data-dcnode-id="4220"><span data-dcnode-id="4221" instrument_node="">(3) Public parks, zoos, museums, and educational institutions may possess or import the animals listed in subsection (1) of this section only if the entity possesses a permit from the department of agriculture and the imported animal is accompanied by a certificate of veterinary inspection. The department of agriculture may refuse to issue a permit if the department finds that the entity requesting the permit does not have physical facilities adequate to maintain the animal in health and safety and to prevent the escape of the animal from confinement. Public parks, zoos, museums, and educational institutions that possess a permit from the department of agriculture may sell, trade, barter or exchange any of the animals listed in subsection (1) of this section with any other entity that has a valid permit from the department of agriculture.</span></p></blockquote><p data-dcnode-id="4217"><span data-dcnode-id="4218" instrument_node="">Citation:&nbsp;ID ST&nbsp;§ 25-236</span></p><p data-dcnode-id="4215"><br data-dcnode-id="4216"></p><p data-dcnode-id="4212"><span class="wz-bold" data-dcnode-id="4213" style="color: rgb(22, 114, 219);"><span data-dcnode-id="4214" instrument_node="">ILLINOIS</span></span></p><p data-dcnode-id="4206"><span class="wz-bold" data-dcnode-id="4210"><span data-dcnode-id="4211" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">To put it simply:</span></span><span data-dcnode-id="4207" instrument_node=""> yes, foxes are legal in Illinois.</span></p><p data-dcnode-id="4204"><span data-dcnode-id="4205" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="4199"><li data-dcnode-id="4202"><span data-dcnode-id="4203" instrument_node="">A fur-bearing mammal breeder permit is required to own a fox.</span></li><li data-dcnode-id="4200"><span data-dcnode-id="4201" instrument_node="">However, a permit is not needed to own a fennec fox (Vulpes zerda).</span></li></ul><p data-dcnode-id="4197"><span data-dcnode-id="4198" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="4182"><p data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">Sec. 3.25.&nbsp;Any individual who, within the State of Illinois, holds, possesses or engages in the breeding or raising of live fur-bearing mammals, protected by this Act, except as provided in Sections 1.6 or 1.7, shall be a fur-bearing mammal breeder in the meaning of this Act. Before any individual shall hold, possess or engage in the breeding or raising of live fur-bearing mammals, he shall first procure a fur-bearing mammal breeder permit. Fur-bearing mammal breeder permits shall be issued by the Department. The annual fee for each fur-bearing mammal breeder permit shall be $25. All fur-bearing mammal breeder permits shall expire on March 31 of each year.</span></p><p data-dcnode-id="4193"><span data-dcnode-id="4194" instrument_node="">Holders of fur-bearing mammal breeder permits may hold, possess, engage in the breeding or raising, sell, or otherwise dispose of live fur-bearing mammals or their green hides, possessed thereunder, at any time of the year.</span></p><p data-dcnode-id="4191"><span data-dcnode-id="4192" instrument_node="">Fur-bearing mammal breeders shall keep a record for 2 years from the date of the acquisition, sale or other disposition of each live fur-bearing mammal or its green hide so raised or propagated, showing the date of such transaction, the name and address of the individual receiving or buying such live fur-bearing mammal or its green hide, and when requested to do so, shall furnish such individual with a certificate of purchase showing the number and kinds of live fur-bearing mammals or green hides so disposed of, the date of the transaction, the name and permit number of the breeder, and the name of the individual receiving, collecting, or buying such live fur-bearing mammals or green hides, and such other information as the Department may require. Such records and certificates of purchase shall be immediately presented to officers or authorized employees of the Department, any sheriff, deputy sheriff, or other peace officer when request is made for same. Failure to produce such records or certificates of purchase shall be prima facie evidence that such live fur-bearing mammals or green hides are contraband with the State of Illinois. The holder of a fur-bearing mammal breeder permit may exhibit fur-bearing mammals commercially.</span></p><p data-dcnode-id="4189"><span data-dcnode-id="4190" instrument_node="">Nothing in this Section shall be construed to give any such permittee authority to take fur-bearing mammals in their wild state contrary to other provisions of this Act, or to remove such permittee from responsibility for the observance of any Federal Laws, rules or regulations which may apply to such fur-bearing mammals.</span></p><p data-dcnode-id="4187"><span data-dcnode-id="4188" instrument_node="">Holders of fur-bearing mammal breeder permits may import fur-bearing mammals into the State of Illinois but may release the same only after health and disease prevention requirements set forth by the Director and other State agencies have been met and permission of the Director has been granted.</span></p><p data-dcnode-id="4185"><span data-dcnode-id="4186" instrument_node="">The breeding, raising and producing in captivity, and the marketing, by the producer, of mink (Mustela vison), red fox (Vulpes vulpes) or arctic fox (Alopex lagopus), as live animals, or as animal pelts or carcasses shall be deemed an agricultural pursuit, and all such animals so raised in captivity shall be deemed domestic animals, subject to all the laws of the State with reference to possession and ownership as are applicable at any time to domestic animals. All individuals engaged in the foregoing activities are fur farmers and engaged in farming for all statutory purposes. Such individuals are exempt from the fur-bearing mammal breeder permit requirements set forth in this Section if: (1) they are defined as farmers for Federal income tax purposes, and (2) at least 20 percent of their gross farm income as reported on Federal tax form Schedule F (Form 1040) for the previous year is generated from the sale of mink, red fox or arctic fox as live animals, animal pelts or carcasses.</span></p><p data-dcnode-id="4183"><span data-dcnode-id="4184" instrument_node="">No fur-bearing mammal breeder permits will be issued to hold, possess, or engage in the breeding and raising of striped skunks acquired after July 1, 1975, or coyotes acquired after July 1, 1978, except for coyotes that are held or possessed by a person who holds a hound running area permit under Section 3.26 of this Act.&nbsp;</span></p></blockquote><p data-dcnode-id="4180"><span data-dcnode-id="4181" instrument_node="">Citation:&nbsp;ILLINOIS WILDLIFE CODE CHAPTER 520 ILCS SECTION 5/3.25</span></p><p data-dcnode-id="4178"><br data-dcnode-id="4179"></p><p data-dcnode-id="4175"><span class="wz-bold" data-dcnode-id="4176" style="color: rgb(22, 114, 219);"><span data-dcnode-id="4177" instrument_node="">INDIANA</span></span></p><p data-dcnode-id="4169"><span class="wz-bold" data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="4171"><span data-dcnode-id="4172" instrument_node="">To put it simply:</span></span><span data-dcnode-id="4170" instrument_node=""> yes, foxes are legal in Indiana.</span></p><p data-dcnode-id="4167"><span data-dcnode-id="4168" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="4014"><p data-dcnode-id="4165"><span data-dcnode-id="4166" instrument_node="">312 IAC 9-11-2 First permit to possess a wild animal</span></p><p data-dcnode-id="4163"><span data-dcnode-id="4164" instrument_node="">Authority: IC 14-22-26</span></p><p data-dcnode-id="4161"><span data-dcnode-id="4162" instrument_node="">Affected: IC 14-11-4; IC 14-22</span></p><p data-dcnode-id="4159"><span data-dcnode-id="4160" instrument_node="">Sec. 2. (a) This section governs the first permit under this rule to possess a particular wild animal.</span></p><p data-dcnode-id="4157"><span data-dcnode-id="4158" instrument_node="">(b) A person who wishes to possess a wild animal, described as Class I or Class II in this rule, must obtain a permit&nbsp;</span></p><p data-dcnode-id="4155"><span data-dcnode-id="4156" instrument_node="">under this rule before the person takes possession of the animal.</span></p><p data-dcnode-id="4153"><span data-dcnode-id="4154" instrument_node="">© A person who wishes to possess a wild animal, described as Class III in this rule must satisfy IC 14-11-4 and obtain&nbsp;</span></p><p data-dcnode-id="4151"><span data-dcnode-id="4152" instrument_node="">a permit under this rule before the person takes possession of the animal. In addition to any procedural requirements, a&nbsp;</span></p><p data-dcnode-id="4149"><span data-dcnode-id="4150" instrument_node="">notice under this subsection must also describe the following:</span></p><p data-dcnode-id="4147"><span data-dcnode-id="4148" instrument_node="">(1) The species of the wild animal.</span></p><p data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">(2) Where the animal will be possessed.</span></p><p data-dcnode-id="4143"><span data-dcnode-id="4144" instrument_node="">(3) The type of enclosure that would be used.</span></p><p data-dcnode-id="4141"><span data-dcnode-id="4142" instrument_node="">(d) Within forty-five (45) days after the issuance of a permit, the permit holder must submit written verification from a&nbsp;</span></p><p data-dcnode-id="4139"><span data-dcnode-id="4140" instrument_node="">licensed veterinarian that the animal appears to be:</span></p><p data-dcnode-id="4137"><span data-dcnode-id="4138" instrument_node="">(1) free of disease;</span></p><p data-dcnode-id="4135"><span data-dcnode-id="4136" instrument_node="">(2) appropriately immunized; and</span></p><p data-dcnode-id="4133"><span data-dcnode-id="4134" instrument_node="">(3) in good health;</span></p><p data-dcnode-id="4131"><span data-dcnode-id="4132" instrument_node="">to the division of fish and wildlife.</span></p><p data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">(e) An application must present a plan for the quick and safe recapture of the wild animal if the animal escapes or, if&nbsp;</span></p><p data-dcnode-id="4127"><span data-dcnode-id="4128" instrument_node="">recapture is impracticable, for the destruction of the animal. After notification by the department of an intention to&nbsp;</span></p><p data-dcnode-id="4125"><span data-dcnode-id="4126" instrument_node="">issue a permit, but before the permit is issued, the applicant must obtain the equipment needed to carry out the&nbsp;</span></p><p data-dcnode-id="4123"><span data-dcnode-id="4124" instrument_node="">recapture and destruction plan. The nature and extent of the recapture plan and the equipment needed are dependent on&nbsp;</span></p><p data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">the danger the escaped animal poses to:</span></p><p data-dcnode-id="4119"><span data-dcnode-id="4120" instrument_node="">(1) persons;</span></p><p data-dcnode-id="4117"><span data-dcnode-id="4118" instrument_node="">(2) domestic animals;</span></p><p data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">(3) livestock; and</span></p><p data-dcnode-id="4113"><span data-dcnode-id="4114" instrument_node="">(4) other wildlife;</span></p><p data-dcnode-id="4111"><span data-dcnode-id="4112" instrument_node="">in the vicinity of the escape.</span></p><p data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">(f) A permit holder who possesses a Class III wild animal must notify the department immediately after the discovery&nbsp;</span></p><p data-dcnode-id="4107"><span data-dcnode-id="4108" instrument_node="">of any escape of the animal.</span></p><p data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">(g) A permit application must be:</span></p><p data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">(1) completed on a department form; and</span></p><p data-dcnode-id="4101"><span data-dcnode-id="4102" instrument_node="">(2) accompanied by a fee in the amount of ten dollars ($10).</span></p><p data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">(h) A conservation officer shall inspect the cages or enclosures after the application is received.</span></p><p data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">(i) An application must show the wild animal was lawfully acquired. A receipted invoice, bill of lading, or other&nbsp;</span></p><p data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">evidence approved by the director shall accompany the application to establish compliance with this subsection.</span></p><p data-dcnode-id="4093"><span data-dcnode-id="4094" instrument_node="">?</span></p><p data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">312 IAC 9-11-7 Class II wild animals for which a permit is required</span></p><p data-dcnode-id="4089"><span data-dcnode-id="4090" instrument_node="">Authority: IC 14-22-26</span></p><p data-dcnode-id="4087"><span data-dcnode-id="4088" instrument_node="">Affected: IC 14-22</span></p><p data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">Sec. 7. (a) A permit is required under this rule for the following Class II wild animals:</span></p><p data-dcnode-id="4083"><span data-dcnode-id="4084" instrument_node="">(1) Beaver (Castor canadensis).</span></p><p data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">(2) Coyote (Castor latrans).</span></p><p data-dcnode-id="4079"><span data-dcnode-id="4080" instrument_node="">(3) Gray fox (Urocyon cinereoargenteus).</span></p><p data-dcnode-id="4077"><span data-dcnode-id="4078" instrument_node="">(4) Red fox (Vulpes fulva).</span></p><p data-dcnode-id="4075"><span data-dcnode-id="4076" instrument_node="">(5) Mink (Mustela vison).</span></p><p data-dcnode-id="4073"><span data-dcnode-id="4074" instrument_node="">(6) Muskrat (Ondatra zibethicus).</span></p><p data-dcnode-id="4071"><span data-dcnode-id="4072" instrument_node="">(7) Opossum (Didelphis marsupialis).</span></p><p data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">(8) Raccoon (Procyon lotor).</span></p><p data-dcnode-id="4067"><span data-dcnode-id="4068" instrument_node="">(9) Skunk (Mephitis mephitis).</span></p><p data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node="">(10) Weasel (Mustela frenata, Mustela nivalis, and Mustela rixosa).</span></p><p data-dcnode-id="4063"><span data-dcnode-id="4064" instrument_node="">(b) As used in this rule, ?Class II wild animal? means a wild animal that, because of its nature, habits, or status, may&nbsp;pose a threat to human safety.</span></p><p data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">?</span></p><p data-dcnode-id="4059"><span data-dcnode-id="4060" instrument_node="">312 IAC 9-11-13 Confining, enclosing, and housing for particular wild animals</span></p><p data-dcnode-id="4057"><span data-dcnode-id="4058" instrument_node="">Authority: IC 14-22-26</span></p><p data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">Affected: IC 14-22</span></p><p data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">Sec. 13. (a) This section sets standards for:</span></p><p data-dcnode-id="4051"><span data-dcnode-id="4052" instrument_node="">(1) confining;</span></p><p data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node="">(2) enclosing; and</span></p><p data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">(3) housing;</span></p><p data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node="">particular kinds of wild animals that must be satisfied by a person licensed under this rule.</span></p><p data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">?</span></p><p data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">(f) Foxes must be provided with the following:</span></p><p data-dcnode-id="4039"><span data-dcnode-id="4040" instrument_node="">(1) A sheltered retreat and either:</span></p><p data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">(A) a den; or</span></p><p data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node="">(B) an elevated wood platform.</span></p><p data-dcnode-id="4033"><span data-dcnode-id="4034" instrument_node="">(2) Limbs.</span></p><p data-dcnode-id="4031"><span data-dcnode-id="4032" instrument_node="">(3) The cage floor shall have a three (3) foot barrier or apron around the inside of the cage. The barrier shall be&nbsp;</span></p><p data-dcnode-id="4029"><span data-dcnode-id="4030" instrument_node="">constructed of one (1) inch by two (2) inch maximum mesh. The mesh shall be made from:</span></p><p data-dcnode-id="4027"><span data-dcnode-id="4028" instrument_node="">(A) nonrusting, galvanized welded steel; or</span></p><p data-dcnode-id="4025"><span data-dcnode-id="4026" instrument_node="">(B) an equivalent material.</span></p><p data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node="">(4) The:</span></p><p data-dcnode-id="4021"><span data-dcnode-id="4022" instrument_node="">(A) walls;</span></p><p data-dcnode-id="4019"><span data-dcnode-id="4020" instrument_node="">(B) roof; and</span></p><p data-dcnode-id="4017"><span data-dcnode-id="4018" instrument_node="">© floor;</span></p><p data-dcnode-id="4015"><span data-dcnode-id="4016" instrument_node="">of the cage shall be constructed of one (1) inch by two (2) inch maximum mesh.</span></p></blockquote><p data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">Citation:&nbsp;312 IAC 9-11-2,&nbsp;312 IAC 9-11-7,&nbsp;312 IAC 9-11-13</span></p><p data-dcnode-id="4010"><br data-dcnode-id="4011"></p><p data-dcnode-id="4007"><span class="wz-bold" data-dcnode-id="4008" style="color: rgb(22, 114, 219);"><span data-dcnode-id="4009" instrument_node="">IOWA</span></span></p><p data-dcnode-id="4001"><span class="wz-bold" data-dcnode-id="4005"><span data-dcnode-id="4006" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="4003"><span data-dcnode-id="4004" instrument_node="">To put it simply:</span></span><span data-dcnode-id="4002" instrument_node=""> no, foxes are not legal in Iowa.</span></p><p data-dcnode-id="3999"><span data-dcnode-id="4000" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="3946"><p data-dcnode-id="3997"><span data-dcnode-id="3998" instrument_node="">717F.1. Definitions</span></p><p data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">?</span></p><p data-dcnode-id="3993"><span data-dcnode-id="3994" instrument_node="">5. a. ?Dangerous wild animal? means any of the following:</span></p><p data-dcnode-id="3991"><span data-dcnode-id="3992" instrument_node="">(1) A member of the family canidae of the order carnivora, including but not limited to wolves, coyotes, and jackals. However, a dangerous wild animal does not include a domestic dog.</span></p><p data-dcnode-id="3989"><span data-dcnode-id="3990" instrument_node="">(2) A member of the family hyaenidae of the order of carnivora, including but not limited to hyenas.</span></p><p data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">(3) A member of the family felidae of the order carnivora, including but not limited to lions, tigers, cougars, leopards, cheetahs, ocelots, and servals. However, a dangerous wild animal does not include a domestic cat.</span></p><p data-dcnode-id="3985"><span data-dcnode-id="3986" instrument_node="">(4) A member of the family ursidae of the order carnivora, including bears and pandas.</span></p><p data-dcnode-id="3983"><span data-dcnode-id="3984" instrument_node="">(5) A member of the family rhinocero tidae order perissodactyla, which is a rhinoceros.</span></p><p data-dcnode-id="3981"><span data-dcnode-id="3982" instrument_node="">(6) A member of the order proboscidea, which are any species of elephant.</span></p><p data-dcnode-id="3979"><span data-dcnode-id="3980" instrument_node="">(7) A member of the order of primates other than humans, and including the following families: callitrichiadae, cebidae, cercopithecidae, cheirogaleidae, daubentoniidae, galagonidae, hominidae, hylobatidae, indridae, lemuridae, loridae, megaladapidae, or tarsiidae. A member includes but is not limited to marmosets, tamarins, monkeys, lemurs, galagos, bushbabies, great apes, gibbons, lesser apes, indris, sifakas, and tarsiers.</span></p><p data-dcnode-id="3977"><span data-dcnode-id="3978" instrument_node="">(8) A member of the order crocodilia, including but not limited to alligators, caimans, crocodiles, and gharials.</span></p><p data-dcnode-id="3975"><span data-dcnode-id="3976" instrument_node="">(9) [Deleted by Acts 2012 (84 G.A.) ch. 1021, S.F. 2285, § 113.]</span></p><p data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node="">(10) A member of the order squamata which is any of the following:</span></p><p data-dcnode-id="3971"><span data-dcnode-id="3972" instrument_node="">(a) A member of the family varanidae, which are limited to water monitors and crocodile monitors.</span></p><p data-dcnode-id="3969"><span data-dcnode-id="3970" instrument_node="">(b) A member of the family atractaspidae, including but not limited to mole vipers and burrowing asps.</span></p><p data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">© A member of the family helodermatidae, including but not limited to beaded lizards and gila monsters.</span></p><p data-dcnode-id="3965"><span data-dcnode-id="3966" instrument_node="">(d) A member of the family elapidae, viperidae, crotalidae, atractaspidae, or hydrophidae which are venomous, including but not limited to cobras, mambas, coral snakes, kraits, adders, vipers, rattlesnakes, copperheads, pit vipers, keelbacks, cottonmouths, and sea snakes.</span></p><p data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">(e) A member of the superfamily henophidia, which are limited to reticulated pythons, anacondas, and African rock pythons.</span></p><p data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">(11) Swine which is a member of the species sus scrofa linnaeus, including but not limited to swine commonly known as Russian boar or European boar of either sex.</span></p><p data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">b. ?Dangerous wild animal? includes an animal which is the offspring of an animal provided in paragraph ?a?, and another animal provided in that paragraph or any other animal. It also includes animals which are the offspring of each subsequent generation. However, a dangerous wild animal does not include the offspring of a domestic dog and a wolf, or the offspring from each subsequent generation in which at least one parent is a domestic dog.</span></p><p data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node="">?</span></p><p data-dcnode-id="3955"><span data-dcnode-id="3956" instrument_node="">717F.3. Dangerous wild animals?prohibitions</span></p><p data-dcnode-id="3953"><span data-dcnode-id="3954" instrument_node="">Except as otherwise provided in this chapter, a person shall not do any of the following:</span></p><p data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">1. Own or possess a dangerous wild animal.</span></p><p data-dcnode-id="3949"><span data-dcnode-id="3950" instrument_node="">2. Cause or allow a dangerous wild animal owned by a person or in the person?s possession to breed.</span></p><p data-dcnode-id="3947"><span data-dcnode-id="3948" instrument_node="">3. Transport a dangerous wild animal into this state.</span></p></blockquote><p data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">Citation: IA ST § 717F.1,&nbsp;IA ST § 717F.3</span></p><p data-dcnode-id="3942"><br data-dcnode-id="3943"></p><p data-dcnode-id="3939"><span class="wz-bold" data-dcnode-id="3940" style="color: rgb(22, 114, 219);"><span data-dcnode-id="3941" instrument_node="">KANSAS</span></span></p><p data-dcnode-id="3933"><span class="wz-bold" data-dcnode-id="3937"><span data-dcnode-id="3938" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="3935"><span data-dcnode-id="3936" instrument_node="">To put it simply:</span></span><span data-dcnode-id="3934" instrument_node=""> no, foxes are not legal in Kansas.</span></p><p data-dcnode-id="3931"><span data-dcnode-id="3932" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="3920"><p data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">INFORMATION ON RABIES CONTROL IN WILDLIFE ANIMALS</span></p><p data-dcnode-id="3927"><span data-dcnode-id="3928" instrument_node="">28-1-14.&nbsp;Rabies control in wildlife animals.&nbsp;(a) The possession or sale of skunks, raccoons, foxes and coyotes for keeping of these mammals as pets shall be prohibited.</span></p><p data-dcnode-id="3925"><span data-dcnode-id="3926" instrument_node="">(b) Removal of musk glands of skunks for purposes of attempted domestication shall be prohibited.</span></p><p data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">© Except as permitted by the secretary, attempts to immunize skunks, coyotes, raccoons, foxes, and other wildlife mammals known to be involved in the transmission of rabies shall be prohibited.</span></p><p data-dcnode-id="3921"><span data-dcnode-id="3922" instrument_node="">(d) Subsections (a) and (b) of this regulation shall not apply to bonafide zoological parks or research institutions.</span></p></blockquote><p data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">Citation:&nbsp;KAR&nbsp;28-1-14</span></p><p data-dcnode-id="3916"><br data-dcnode-id="3917"></p><p data-dcnode-id="3913"><span class="wz-bold" data-dcnode-id="3914" style="color: rgb(22, 114, 219);"><span data-dcnode-id="3915" instrument_node="">KENTUCKY</span></span></p><p data-dcnode-id="3907"><span class="wz-bold" data-dcnode-id="3911"><span data-dcnode-id="3912" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="3909"><span data-dcnode-id="3910" instrument_node="">To put it simply:&nbsp;</span></span><span data-dcnode-id="3908" instrument_node="">there is no simple answer.</span></p><p data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">Note:</span></p><ul class="style-circle" data-dcno
