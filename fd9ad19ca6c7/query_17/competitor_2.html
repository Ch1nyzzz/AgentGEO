 data-dcnode-id="5826" style="color: rgb(179, 2, 37);"><span data-dcnode-id="5827" instrument_node="">NO </span></span><br data-dcnode-id="5825"><br data-dcnode-id="5824"><span class="wz-bold" data-dcnode-id="5822"><span data-dcnode-id="5823" instrument_node="">BRITISH COLUMBIA</span></span><br data-dcnode-id="5821"><span data-dcnode-id="5820" instrument_node="">Are foxes legal&nbsp;?</span><span class="wz-bold" data-dcnode-id="5818" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5819" instrument_node=""> YES</span></span></p><p data-dcnode-id="5808"><span data-dcnode-id="5816" instrument_node="">&nbsp; </span><br data-dcnode-id="5815"><span class="wz-bold" data-dcnode-id="5813"><span data-dcnode-id="5814" instrument_node="">ONTARIO</span></span><br data-dcnode-id="5812"><span data-dcnode-id="5811" instrument_node="">Are foxes legal&nbsp;? </span><span class="wz-bold" data-dcnode-id="5809" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5810" instrument_node="">YES</span></span></p><p data-dcnode-id="5805"><span class="wz-bold" data-dcnode-id="5806" style="color: rgb(42, 125, 51);"><br data-dcnode-id="5807"></span></p><p data-dcnode-id="5798"><span class="wz-bold" data-dcnode-id="5803"><span data-dcnode-id="5804" instrument_node="">NEWFOUNDLAND</span></span><br data-dcnode-id="5802"><span data-dcnode-id="5801" instrument_node="">Are foxes legal&nbsp;?</span><span class="wz-bold" data-dcnode-id="5799" style="color: rgb(179, 2, 37);"><span data-dcnode-id="5800" instrument_node=""> NO</span></span></p><p data-dcnode-id="5795"><span class="wz-bold" data-dcnode-id="5796" style="color: rgb(179, 2, 37);"><br data-dcnode-id="5797"></span></p><p data-dcnode-id="5788"><span class="wz-bold" data-dcnode-id="5793"><span data-dcnode-id="5794" instrument_node="">NEW BRUNSWICK</span></span><br data-dcnode-id="5792"><span data-dcnode-id="5791" instrument_node="">Are foxes legal&nbsp;?</span><span class="wz-bold" data-dcnode-id="5789" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5790" instrument_node=""> YES</span></span></p><p data-dcnode-id="5785"><span class="wz-bold" data-dcnode-id="5786" style="color: rgb(42, 125, 51);"><br data-dcnode-id="5787"></span></p><p data-dcnode-id="5778"><span class="wz-bold" data-dcnode-id="5783"><span data-dcnode-id="5784" instrument_node="">PRINCE EDWARD ISLAND (PEI)</span></span><br data-dcnode-id="5782"><span data-dcnode-id="5781" instrument_node="">Are foxes legal&nbsp;?</span><span class="wz-bold" data-dcnode-id="5779" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5780" instrument_node=""> YES</span></span></p><p data-dcnode-id="5775"><span class="wz-bold" data-dcnode-id="5776" style="color: rgb(42, 125, 51);"><br data-dcnode-id="5777"></span></p><p data-dcnode-id="5768"><span class="wz-bold" data-dcnode-id="5773"><span data-dcnode-id="5774" instrument_node="">NUNAVUT</span></span><br data-dcnode-id="5772"><span data-dcnode-id="5771" instrument_node="">Are foxes legal&nbsp;?</span><span class="wz-bold" data-dcnode-id="5769" style="color: rgb(179, 2, 37);"><span data-dcnode-id="5770" instrument_node=""> NO</span></span></p><p data-dcnode-id="5765"><span class="wz-bold" data-dcnode-id="5766" style="color: rgb(179, 2, 37);"><br data-dcnode-id="5767"></span></p><p data-dcnode-id="5758"><span class="wz-bold" data-dcnode-id="5763"><span data-dcnode-id="5764" instrument_node="">NORTHWEST TERRITORIES (N.W.T)</span></span><br data-dcnode-id="5762"><span data-dcnode-id="5761" instrument_node="">Are foxes legal&nbsp;?</span><span class="wz-bold" data-dcnode-id="5759" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5760" instrument_node=""> YES</span></span></p><p data-dcnode-id="5755"><span class="wz-bold" data-dcnode-id="5756" style="color: rgb(42, 125, 51);"><br data-dcnode-id="5757"></span></p><p data-dcnode-id="5748"><span class="wz-bold" data-dcnode-id="5753"><span data-dcnode-id="5754" instrument_node="">YUKON TERRITORIES (YUKON)</span></span><br data-dcnode-id="5752"><span data-dcnode-id="5751" instrument_node="">Are foxes legal&nbsp;? </span><span class="wz-bold" data-dcnode-id="5749" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5750" instrument_node="">YES</span></span></p><p data-dcnode-id="5745"><span class="wz-bold" data-dcnode-id="5746" style="color: rgb(42, 125, 51);"><br data-dcnode-id="5747"></span></p><p data-dcnode-id="5742"><span class="wz-bold" data-dcnode-id="5743"><span data-dcnode-id="5744" instrument_node="">QUÉBEC</span></span></p><p data-dcnode-id="5737"><span data-dcnode-id="5741" instrument_node="">Are foxes legal&nbsp;? </span><span class="wz-bold" data-dcnode-id="5739" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5740" instrument_node="">YES</span></span><span data-dcnode-id="5738" instrument_node=""> </span></p><p data-dcnode-id="5735"><br data-dcnode-id="5736"></p><p data-dcnode-id="5732" style="text-align: center;"><span class="wz-bold" data-dcnode-id="5733" style="color: rgb(0, 100, 145); font-size: 16px;"><span data-dcnode-id="5734" instrument_node="">EUROPE:</span></span></p><p data-dcnode-id="5614"><span class="wz-bold" data-dcnode-id="5730"><span data-dcnode-id="5731" instrument_node="">Latvia, Hungary,&nbsp;</span></span><span data-dcnode-id="5729" instrument_node="">and</span><span class="wz-bold" data-dcnode-id="5724"><span data-dcnode-id="5728" instrument_node="">&nbsp;Romania: </span><span class="wz-bold" data-dcnode-id="5726" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5727" instrument_node="">YES</span></span><span data-dcnode-id="5725" instrument_node="">,&nbsp;</span></span><span data-dcnode-id="5723" instrument_node="">allow&nbsp;you to catch wild foxes and breed them/sell them as pets (though not recommended). All non-threatened species are legal, and purchasing from fur farms is legal too.</span><br data-dcnode-id="5722"><br data-dcnode-id="5721"><span class="wz-bold" data-dcnode-id="5716"><span data-dcnode-id="5720" instrument_node="">United Kingdom, Scotland: </span><span class="wz-bold" data-dcnode-id="5718" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5719" instrument_node="">YES</span></span><span data-dcnode-id="5717" instrument_node="">,</span></span><span data-dcnode-id="5715" instrument_node="">&nbsp;allow you to keep, breed and sell captive-bred tame foxes as pets. Keeping, breeding or selling wild-caught or orphaned wild foxes is not legal, and any injured or orphaned wild foxes must be given to a wildlife rehabber and released as soon as they are able to survive on their own.&nbsp;</span><br data-dcnode-id="5714"><br data-dcnode-id="5713"><span class="wz-bold" data-dcnode-id="5708"><span data-dcnode-id="5712" instrument_node="">Germany: </span><span class="wz-bold" data-dcnode-id="5710" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5711" instrument_node="">YES</span></span><span data-dcnode-id="5709" instrument_node="">,&nbsp;</span></span><span data-dcnode-id="5707" instrument_node="">you need a license to have a fox, but otherwise, all non-threatened species are legal. The license is easy to obtain.</span><br data-dcnode-id="5706"><br data-dcnode-id="5705"><span class="wz-bold" data-dcnode-id="5700"><span data-dcnode-id="5704" instrument_node="">Finland: </span><span class="wz-bold" data-dcnode-id="5702" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5703" instrument_node="">YES</span></span><span data-dcnode-id="5701" instrument_node="">,&nbsp;</span></span><span data-dcnode-id="5699" instrument_node="">all species are legal, but the fox</span><span class="wz-bold" data-dcnode-id="5697"><span data-dcnode-id="5698" instrument_node=""> </span></span><span data-dcnode-id="5696" instrument_node="">must&nbsp;come from an European breeder with paperwork to prove it. It is</span><span class="wz-bold" data-dcnode-id="5694"><span data-dcnode-id="5695" instrument_node="">&nbsp;illegal to import&nbsp;</span></span><span data-dcnode-id="5693" instrument_node="">a fox from other continents.</span><br data-dcnode-id="5692"><br data-dcnode-id="5691"><span data-dcnode-id="5690" instrument_node="">I</span><span class="wz-bold" data-dcnode-id="5685"><span data-dcnode-id="5689" instrument_node="">reland: </span><span class="wz-bold" data-dcnode-id="5687" style="color: rgb(179, 2, 37);"><span data-dcnode-id="5688" instrument_node="">NO</span></span><span data-dcnode-id="5686" instrument_node="">,&nbsp;</span></span><span data-dcnode-id="5684" instrument_node="">all species of fox are illegal, whether they come from a pet fox breeder or not. The vaccine for foxes is not recognized there, hence why they are illegal to breed and own in the country.&nbsp;</span><br data-dcnode-id="5683"><br data-dcnode-id="5682"><span class="wz-bold" data-dcnode-id="5677"><span data-dcnode-id="5681" instrument_node="">Norway: </span><span class="wz-bold" data-dcnode-id="5679" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5680" instrument_node="">YES</span></span><span data-dcnode-id="5678" instrument_node="">,</span></span><span data-dcnode-id="5676" instrument_node="">importing a fox as a pet is legal, but you'd have to send an individual request to the Norwegian Directory for Nature Management, to the following land address: PB 5672 Sluppen 7485 Trondheim, Norway. You may also submit your application by email:&nbsp;</span><a data-dcnode-id="5674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tamethewild.webs.com/legality" id="925B8A2E-94DA-4476-89EC-CBF0D4E06E30"><span data-dcnode-id="5675" instrument_node="">postmottak@dirnat.no</span></a><span data-dcnode-id="5673" instrument_node=""> </span><br data-dcnode-id="5672"><br data-dcnode-id="5671"><span class="wz-bold" data-dcnode-id="5666"><span data-dcnode-id="5670" instrument_node="">Italy: </span><span class="wz-bold" data-dcnode-id="5668" style="color: rgb(179, 2, 37);"><span data-dcnode-id="5669" instrument_node="">NO</span></span><span data-dcnode-id="5667" instrument_node="">,&nbsp;</span></span><span data-dcnode-id="5665" instrument_node="">all foxes, except for Russian domesticated foxes (from Novosibirsk, Russia, with paperwork proving they come from there), are illegal.</span><br data-dcnode-id="5664"><br data-dcnode-id="5663"><span class="wz-bold" data-dcnode-id="5661"><span data-dcnode-id="5662" instrument_node="">Denmark</span></span><span class="wz-bold" data-dcnode-id="5659"><span data-dcnode-id="5660" instrument_node=""> </span></span><span data-dcnode-id="5658" instrument_node="">and in the</span><span class="wz-bold" data-dcnode-id="5653"><span data-dcnode-id="5657" instrument_node="">&nbsp;Netherlands: </span><span class="wz-bold" data-dcnode-id="5655" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5656" instrument_node="">YES</span></span><span data-dcnode-id="5654" instrument_node="">,&nbsp;</span></span><span data-dcnode-id="5652" instrument_node="">all species of fox, including natives, are legal without the need of a license. Importation is also permitted.</span><br data-dcnode-id="5651"><br data-dcnode-id="5650"><span class="wz-bold" data-dcnode-id="5648"><span data-dcnode-id="5649" instrument_node="">France</span></span><span data-dcnode-id="5647" instrument_node="">&nbsp;and in&nbsp;</span><span class="wz-bold" data-dcnode-id="5642"><span data-dcnode-id="5646" instrument_node="">Belgium:</span><span class="wz-bold" data-dcnode-id="5644" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5645" instrument_node=""> YES</span></span><span data-dcnode-id="5643" instrument_node="">,&nbsp;</span></span><span data-dcnode-id="5641" instrument_node="">you need a capacity certificate (CDC) to be in legal possession of a fox for personal purpose or in order to rehabilitate/release wild foxes.</span><br data-dcnode-id="5640"><br data-dcnode-id="5639"><span class="wz-bold" data-dcnode-id="5634"><span data-dcnode-id="5638" instrument_node="">Turkey: </span><span class="wz-bold" data-dcnode-id="5636" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5637" instrument_node="">YES</span></span><span data-dcnode-id="5635" instrument_node="">,&nbsp;</span></span><span data-dcnode-id="5633" instrument_node="">all non-threatened fox species, including native species, are legal without the need of a license.&nbsp;</span><br data-dcnode-id="5632"><br data-dcnode-id="5631"><span class="wz-bold" data-dcnode-id="5629"><span data-dcnode-id="5630" instrument_node="">Austria</span></span><span data-dcnode-id="5628" instrument_node="">,</span><span class="wz-bold" data-dcnode-id="5626"><span data-dcnode-id="5627" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="5624"><span data-dcnode-id="5625" instrument_node="">Holland</span></span><span data-dcnode-id="5623" instrument_node="">&nbsp;and&nbsp;</span><span class="wz-bold" data-dcnode-id="5618"><span data-dcnode-id="5622" instrument_node="">Poland: </span><span class="wz-bold" data-dcnode-id="5620" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5621" instrument_node="">YES</span></span><span data-dcnode-id="5619" instrument_node="">,&nbsp;</span></span><span data-dcnode-id="5617" instrument_node="">fennec foxes, arctic foxes and non-native red foxes are legal, without the need of a license.</span><br data-dcnode-id="5616"><br data-dcnode-id="5615"></p><p data-dcnode-id="5607"><span class="wz-bold" data-dcnode-id="5612"><span data-dcnode-id="5613" instrument_node="">Spain:</span></span><span data-dcnode-id="5611" instrument_node=""> </span><span class="wz-bold" data-dcnode-id="5609" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5610" instrument_node="">YES</span></span><span data-dcnode-id="5608" instrument_node="">, only red foxes and arctic foxes are legal and no license is needed but proof of obtainment from a breeder is required.</span></p><p data-dcnode-id="5599"><br data-dcnode-id="5606"><span class="wz-bold" data-dcnode-id="5604"><span data-dcnode-id="5605" instrument_node="">Switzerland:</span></span><span data-dcnode-id="5603" instrument_node=""> </span><span class="wz-bold" data-dcnode-id="5601" style="color: rgb(255, 149, 0);"><span data-dcnode-id="5602" instrument_node="">SOME</span></span><span data-dcnode-id="5600" instrument_node="">, Only&nbsp;Fennec foxes are legal. No license is required in order to possess one.</span></p><p data-dcnode-id="5596"><span class="wz-bold" data-dcnode-id="5597"><br data-dcnode-id="5598"></span></p><p data-dcnode-id="5592" style="text-align: center;"><span class="wz-bold" data-dcnode-id="5594" style="color: rgb(0, 100, 145); font-size: 16px;"><span data-dcnode-id="5595" instrument_node="">OCEANA (Australia and Surroundings):</span></span><span data-dcnode-id="5593" instrument_node=""> </span></p><p data-dcnode-id="5572"><span class="wz-bold" data-dcnode-id="5590"><span data-dcnode-id="5591" instrument_node="">AUSTRALIA</span></span><br data-dcnode-id="5589"><span data-dcnode-id="5588" instrument_node="">Are foxes legal&nbsp;? </span><span class="wz-bold" data-dcnode-id="5586" style="color: rgb(179, 2, 37);"><span data-dcnode-id="5587" instrument_node="">NO</span></span><br data-dcnode-id="5585"><span data-dcnode-id="5584" instrument_node="">Foxes were legal in NSW, however, a new law has been passed in 2015 which prohibits anyone from owning a fox in the state. Current fox owners must apply and be granted a license to be able to continue to keep their foxes.</span><br data-dcnode-id="5583"><br data-dcnode-id="5582"><span class="wz-bold" data-dcnode-id="5580"><span data-dcnode-id="5581" instrument_node="">New Zealand - New Guinea - surrounding islands</span></span><br data-dcnode-id="5579"><br data-dcnode-id="5578"><span data-dcnode-id="5577" instrument_node="">Are foxes legal&nbsp;?&nbsp;</span><span class="wz-bold" data-dcnode-id="5575" style="color: rgb(179, 2, 37);"><span data-dcnode-id="5576" instrument_node="">NO</span></span><br data-dcnode-id="5574"><span data-dcnode-id="5573" instrument_node="">In New Zealand and New Guinea, foxes of all species, especially red foxes, are&nbsp;illegal to be kept as pets, because they were&nbsp;introduced on the territory where they killed native wildlife,&nbsp;and thus, are&nbsp;considered pest. They can only be used for educational programs.&nbsp;</span></p><p data-dcnode-id="5570"><br data-dcnode-id="5571"></p><p data-dcnode-id="5567" style="text-align: center; font-size: 8px;"><span class="wz-bold" data-dcnode-id="5568" style="color: rgb(0, 100, 145); font-size: 16px;"><span data-dcnode-id="5569" instrument_node="">ASIA:</span></span></p><p data-dcnode-id="5542"><span class="wz-bold" data-dcnode-id="5563"><span class="wz-bold" data-dcnode-id="5565" style="color: rgb(0, 0, 0);"><span data-dcnode-id="5566" instrument_node="">Korea</span></span><span data-dcnode-id="5564" instrument_node="">&nbsp;</span></span><br data-dcnode-id="5562"><span data-dcnode-id="5561" instrument_node="">Are foxes legal&nbsp;? </span><span class="wz-bold" data-dcnode-id="5559" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5560" instrument_node="">YES</span></span><br data-dcnode-id="5558"><span data-dcnode-id="5557" instrument_node="">Fennec foxes, red foxes, arctic foxes, pale foxes and other non threatened species can legally be possessed, whether they come from captivity - breeders, zoological facilities, fur farms - or from the wild.</span><br data-dcnode-id="5556"><br data-dcnode-id="5555"><span class="wz-bold" data-dcnode-id="5553" style="color: rgb(0, 0, 0);"><span data-dcnode-id="5554" instrument_node="">Japan</span></span><br data-dcnode-id="5552"><span data-dcnode-id="5551" instrument_node="">Are foxes legal&nbsp;? </span><span class="wz-bold" data-dcnode-id="5548"><span class="wz-bold" data-dcnode-id="5549" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5550" instrument_node="">Y</span></span></span><span class="wz-bold" data-dcnode-id="5545" style="color: rgb(42, 125, 51);"><span class="wz-bold" data-dcnode-id="5546" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5547" instrument_node="">ES</span></span></span><br data-dcnode-id="5544"><span data-dcnode-id="5543" instrument_node="">Fennec foxes, red foxes, arctic foxes, pale foxes and other non threatened species, regardless of their colour, can be legally possessed without the need of a license. The foxes must come from breeders, fur farms or zoological facilities. Keeping a wild-caught fox as a pet is illegal.</span></p><p data-dcnode-id="5539"><span class="wz-bold" data-dcnode-id="5540"><br data-dcnode-id="5541"></span></p><p data-dcnode-id="5536" style="text-align: center; color: rgb(0, 100, 145);"><span class="wz-bold" data-dcnode-id="5537" style="color: rgb(0, 100, 145); font-size: 16px;"><span data-dcnode-id="5538" instrument_node="">MIDDLE EAST:</span></span></p><p data-dcnode-id="5529"><span class="wz-bold" data-dcnode-id="5534"><span data-dcnode-id="5535" instrument_node="">Israel:</span></span><span data-dcnode-id="5533" instrument_node=""> </span><span class="wz-bold" data-dcnode-id="5531" style="color: rgb(179, 2, 37);"><span data-dcnode-id="5532" instrument_node="">NO</span></span><span data-dcnode-id="5530" instrument_node="">, All foxes species are banned for private possession in Israel.</span></p><p data-dcnode-id="5526"><span class="wz-bold" data-dcnode-id="5527"><br data-dcnode-id="5528"></span></p><p data-dcnode-id="5523" style="text-align: center;"><span class="wz-bold" data-dcnode-id="5524" style="color: rgb(0, 100, 145); font-size: 16px;"><span data-dcnode-id="5525" instrument_node="">AFRICA:</span></span></p><p data-dcnode-id="5509"><span class="wz-bold" data-dcnode-id="5521"><span data-dcnode-id="5522" instrument_node="">In South Africa:</span></span><span data-dcnode-id="5520" instrument_node=""> </span><span class="wz-bold" data-dcnode-id="5518" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5519" instrument_node="">YES</span></span><span data-dcnode-id="5517" instrument_node="">, all non-threatened fox species are legal for private possession.&nbsp;</span><br data-dcnode-id="5516"><span class="wz-bold" data-dcnode-id="5514"><span data-dcnode-id="5515" instrument_node="">In Ethiopia:</span></span><span data-dcnode-id="5513" instrument_node=""> </span><span class="wz-bold" data-dcnode-id="5511" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5512" instrument_node="">YES</span></span><span data-dcnode-id="5510" instrument_node="">, all non-threatened fox species are legal for private possession.</span></p><p data-dcnode-id="5501"><span class="wz-bold" data-dcnode-id="5504" style="text-align: center; background-color: initial;"><span data-dcnode-id="5508" instrument_node="">In Djibouti: </span><span class="wz-bold" data-dcnode-id="5506" style="color: rgb(42, 125, 51);"><span data-dcnode-id="5507" instrument_node="">YES</span></span><span data-dcnode-id="5505" instrument_node="">,&nbsp;</span></span><span data-dcnode-id="5502" style="text-align: center; background-color: initial;"><span data-dcnode-id="5503" instrument_node="">all non-threatened fox species are legal for private possession.</span></span></p></div></div><span data-dcnode-id="5498" instrument_node="">

</span><div class="webs-text" data-dcnode-id="4301"><p data-dcnode-id="5466"><span class="wz-bold" data-dcnode-id="5467" style="color: rgb(22, 114, 219);"><span data-dcnode-id="5468" instrument_node="">ALABAMA</span></span></p><p data-dcnode-id="5460"><span class="wz-bold" data-dcnode-id="5464"><span data-dcnode-id="5465" instrument_node="">To put it simply</span></span><span class="wz-bold" data-dcnode-id="5462"><span data-dcnode-id="5463" instrument_node="">:</span></span><span data-dcnode-id="5461" instrument_node=""> no, all species of fox are not legal in Alabama.</span></p><p data-dcnode-id="5457"><span class="wz-bold" data-dcnode-id="5458"><span data-dcnode-id="5459" instrument_node="">Legalities:</span></span></p><blockquote data-dcnode-id="5426"><p data-dcnode-id="5455"><span data-dcnode-id="5456" instrument_node="">220-2-.26 Restrictions On Possession, Sale, Importation And/Or Release Of Certain Animals And FIsh.</span></p><p data-dcnode-id="5453"><span data-dcnode-id="5454" instrument_node="">(1) No person, firm, corporation, partnership or association may possess, sell, offer for sale, bring, release, or cause to be brought or imported into the State of Alabama any of the following live fish or animals:</span></p><p data-dcnode-id="5451"><span data-dcnode-id="5452" instrument_node="">Any Walking Catfish or any other fish of the genus Clarias;</span></p><p data-dcnode-id="5449"><span data-dcnode-id="5450" instrument_node="">Any Piranha or any fish of the genus Serrasalmus;</span></p><p data-dcnode-id="5447"><span data-dcnode-id="5448" instrument_node="">Any Black Carp of the genus Mylopharyngodon;</span></p><p data-dcnode-id="5445"><span data-dcnode-id="5446" instrument_node="">Any species of sturgeon not native to Alabama;</span></p><p data-dcnode-id="5443"><span data-dcnode-id="5444" instrument_node="">Any species of Chinese perch (Siniperca spp.);</span></p><p data-dcnode-id="5441"><span data-dcnode-id="5442" instrument_node="">Any species of Snakehead fish (Channa spp.);</span></p><p data-dcnode-id="5439"><span data-dcnode-id="5440" instrument_node="">Any species of Mud carp (Cirrhinus spp.);</span></p><p data-dcnode-id="5437"><span data-dcnode-id="5438" instrument_node="">Blue back herring (Alsoa aestivalis);</span></p><p data-dcnode-id="5435"><span data-dcnode-id="5436" instrument_node="">Any species of fish ?rudd? (Scardinius erythrophthalmus) or ?roach? (Rutilus rutilus) or any hybrids of either species;</span></p><p data-dcnode-id="5433"><span data-dcnode-id="5434" instrument_node="">Any species of nonindigenous venomous reptile;</span></p><p data-dcnode-id="5431"><span data-dcnode-id="5432" instrument_node="">Any species of Mongoose;</span></p><p data-dcnode-id="5429"><span data-dcnode-id="5430" instrument_node="">San Juan Rabbits, Jack Rabbits or any other species of wild rabbit or hare; or</span></p><p data-dcnode-id="5427"><span data-dcnode-id="5428" instrument_node="">Any of the following from any area outside the state of Alabama; any member of the family Cervidae (to include but not be limited to deer, elk, moose, caribou), species of coyote, species of fox, species of raccoon, species of skunk, wild rodent, or strain of wild turkey, black bear (Ursus americanus), mountain lion (Felis concolor), bobcat (Felis rufus), Pronghorn Antelope (Antelocapridae), any nondomestic member of the families Suidae (pigs), Tayassuidae (peccaries), or Bovidae (except bison).</span></p></blockquote><p data-dcnode-id="5422"><span class="wz-bold" data-dcnode-id="5424"><span data-dcnode-id="5425" instrument_node="">Law Citation:&nbsp;</span></span><span data-dcnode-id="5423" instrument_node="">ALABAMA ADMIN CODE r. 220-2-.26 </span></p><p data-dcnode-id="5420"><br data-dcnode-id="5421"></p><p data-dcnode-id="5418"><span data-dcnode-id="5419" instrument_node=""> </span></p><p data-dcnode-id="5415" style="color: rgb(22, 114, 219);"><span class="wz-bold" data-dcnode-id="5416" style="color: rgb(22, 114, 219);"><span data-dcnode-id="5417" instrument_node="">ALASKA</span></span></p><p data-dcnode-id="5409"><span class="wz-bold" data-dcnode-id="5413"><span data-dcnode-id="5414" instrument_node="">T</span></span><span class="wz-bold" data-dcnode-id="5411"><span data-dcnode-id="5412" instrument_node="">o put it simply:</span></span><span data-dcnode-id="5410" instrument_node=""> no, all species of fox are not legal in Alaska.</span></p><p data-dcnode-id="5406"><span class="wz-bold" data-dcnode-id="5407"><span data-dcnode-id="5408" instrument_node="">Note:</span></span></p><ul class="style-circle" data-dcnode-id="5403"><li data-dcnode-id="5404"><span data-dcnode-id="5405" instrument_node="">If a species does not appear in section (b) of regulation 5 AAC 92.029, the Alaska Department of Fish and Game is forbidden from issuing a permit authorizing anyone to possess it as a pet.</span></li></ul><p data-dcnode-id="5400"><span class="wz-bold" data-dcnode-id="5401"><span data-dcnode-id="5402" instrument_node="">Legalities:</span></span></p><blockquote data-dcnode-id="5259"><span data-dcnode-id="5399" instrument_node="">5 AAC 92.029. Permit for possessing live game.</span><br data-dcnode-id="5398"><br data-dcnode-id="5397"><span data-dcnode-id="5396" instrument_node="">(a) Except as otherwise provided in this chapter, or in AS 16, no person may possess, import, release, export, or assist in importing, releasing, or exporting, live game, unless the person holds a possession permit issued by the department.</span><br data-dcnode-id="5395"><br data-dcnode-id="5394"><span data-dcnode-id="5393" instrument_node="">(b) The following species, not including a hybrid of a game animal and a species listed in this subsection, may be possessed, imported, exported, bought, sold, or traded without a permit from the department but may not be released into the wild:</span><ul class="style-circle" data-dcnode-id="5390"><li data-dcnode-id="5391"><span data-dcnode-id="5392" instrument_node="">Common Name? Scientific Name</span></li></ul><ul class="style-circle" data-dcnode-id="5387"><li data-dcnode-id="5388"><span data-dcnode-id="5389" instrument_node="">Dog?&nbsp;Canis familiaris</span></li></ul><ul class="style-circle" data-dcnode-id="5384"><li data-dcnode-id="5385"><span data-dcnode-id="5386" instrument_node="">Cat? Felis catus</span></li></ul><ul class="style-circle" data-dcnode-id="5381"><li data-dcnode-id="5382"><span data-dcnode-id="5383" instrument_node="">Sheep?&nbsp;Ovis aries</span></li></ul><ul class="style-circle" data-dcnode-id="5378"><li data-dcnode-id="5379"><span data-dcnode-id="5380" instrument_node="">Goat?&nbsp;Capra hircus</span></li></ul><ul class="style-circle" data-dcnode-id="5375"><li data-dcnode-id="5376"><span data-dcnode-id="5377" instrument_node="">Cattle?Bos taurus</span></li></ul><ul class="style-circle" data-dcnode-id="5372"><li data-dcnode-id="5373"><span data-dcnode-id="5374" instrument_node="">Oxen?&nbsp;Bos spp.</span></li></ul><ul class="style-circle" data-dcnode-id="5369"><li data-dcnode-id="5370"><span data-dcnode-id="5371" instrument_node="">Horse?&nbsp;Equus caballus</span></li></ul><ul class="style-circle" data-dcnode-id="5366"><li data-dcnode-id="5367"><span data-dcnode-id="5368" instrument_node="">Guinea pig?&nbsp;Cavia porcellus</span></li></ul><ul class="style-circle" data-dcnode-id="5363"><li data-dcnode-id="5364"><span data-dcnode-id="5365" instrument_node="">Reindeer (except feral reindeer)?&nbsp;Rangifer tarandus Var.</span></li></ul><ul class="style-circle" data-dcnode-id="5360"><li data-dcnode-id="5361"><span data-dcnode-id="5362" instrument_node="">Llama?Lama peruana</span></li></ul><ul class="style-circle" data-dcnode-id="5357"><li data-dcnode-id="5358"><span data-dcnode-id="5359" instrument_node="">Alpaca?Lama pacos</span></li></ul><ul class="style-circle" data-dcnode-id="5354"><li data-dcnode-id="5355"><span data-dcnode-id="5356" instrument_node="">One-humped camel?&nbsp;Camelus dromedarius</span></li></ul><ul class="style-circle" data-dcnode-id="5351"><li data-dcnode-id="5352"><span data-dcnode-id="5353" instrument_node="">Ass?&nbsp;Equus asinus Var.</span></li></ul><ul class="style-circle" data-dcnode-id="5348"><li data-dcnode-id="5349"><span data-dcnode-id="5350" instrument_node="">Mule?&nbsp;Equus asinus x caballus</span></li></ul><ul class="style-circle" data-dcnode-id="5345"><li data-dcnode-id="5346"><span data-dcnode-id="5347" instrument_node="">Swine?&nbsp;Sus scrofa Var.</span></li></ul><ul class="style-circle" data-dcnode-id="5342"><li data-dcnode-id="5343"><span data-dcnode-id="5344" instrument_node="">European ferret? Mustela putorius furo</span></li></ul><ul class="style-circle" data-dcnode-id="5339"><li data-dcnode-id="5340"><span data-dcnode-id="5341" instrument_node="">European rabbit?&nbsp;Oryctolagus cuniculus Var.</span></li></ul><ul class="style-circle" data-dcnode-id="5336"><li data-dcnode-id="5337"><span data-dcnode-id="5338" instrument_node="">White rat?&nbsp;Rattus norvegicus Var. albinus</span></li></ul><ul class="style-circle" data-dcnode-id="5333"><li data-dcnode-id="5334"><span data-dcnode-id="5335" instrument_node="">Mice: white, waltzing, singing?&nbsp;Mus musculus Var. shaker, piebald</span></li></ul><ul class="style-circle" data-dcnode-id="5330"><li data-dcnode-id="5331"><span data-dcnode-id="5332" instrument_node="">Fay-tailed gerbil?&nbsp;Pachyuromys duprasi</span></li></ul><ul class="style-circle" data-dcnode-id="5327"><li data-dcnode-id="5328"><span data-dcnode-id="5329" instrument_node="">Gerbil?&nbsp;Gerbillus spp.</span></li></ul><ul class="style-circle" data-dcnode-id="5324"><li data-dcnode-id="5325"><span data-dcnode-id="5326" instrument_node="">Hamster (golden)? Mesocricetus auratus</span></li></ul><ul class="style-circle" data-dcnode-id="5321"><li data-dcnode-id="5322"><span data-dcnode-id="5323" instrument_node="">Chinchilla? Chinchilla laniger</span></li></ul><ul class="style-circle" data-dcnode-id="5318"><li data-dcnode-id="5319"><span data-dcnode-id="5320" instrument_node="">Cavy?&nbsp;Cavia aperea</span></li></ul><ul class="style-circle" data-dcnode-id="5315"><li data-dcnode-id="5316"><span data-dcnode-id="5317" instrument_node="">Hedgehog, African Pygmy? Erinaceus albiventris</span></li></ul><ul class="style-circle" data-dcnode-id="5312"><li data-dcnode-id="5313"><span data-dcnode-id="5314" instrument_node="">Chicken?&nbsp;Gallus gallus Var.</span></li></ul><ul class="style-circle" data-dcnode-id="5309"><li data-dcnode-id="5310"><span data-dcnode-id="5311" instrument_node="">Pigeon?&nbsp;Columia livia Var.</span></li></ul><ul class="style-circle" data-dcnode-id="5306"><li data-dcnode-id="5307"><span data-dcnode-id="5308" instrument_node="">Any Turkey species?&nbsp;Subfamily Meleagridinae</span></li></ul><ul class="style-circle" data-dcnode-id="5303"><li data-dcnode-id="5304"><span data-dcnode-id="5305" instrument_node="">Any Pheasant, Junglefowl or Coturnix species?&nbsp;Subfamily Phasianinae</span></li></ul><ul class="style-circle" data-dcnode-id="5300"><li data-dcnode-id="5301"><span data-dcnode-id="5302" instrument_node="">Any Guineafowl species?&nbsp;Subfamily Numidinae</span></li></ul><ul class="style-circle" data-dcnode-id="5297"><li data-dcnode-id="5298"><span data-dcnode-id="5299" instrument_node="">Canary?&nbsp;Serinus canaria Var.</span></li></ul><ul class="style-circle" data-dcnode-id="5294"><li data-dcnode-id="5295"><span data-dcnode-id="5296" instrument_node="">Parrot, parakeet, cockatiel, macaw, and other members of the Family Psittacidae not prohibited by federal or international law?&nbsp;Family Psittacidae</span></li></ul><ul class="style-circle" data-dcnode-id="5291"><li data-dcnode-id="5292"><span data-dcnode-id="5293" instrument_node="">Toucan?&nbsp;Family Ramphastidae</span></li></ul><ul class="style-circle" data-dcnode-id="5288"><li data-dcnode-id="5289"><span data-dcnode-id="5290" instrument_node="">Any New World Quail species (including Bobwhite)?&nbsp;Subfamily Odontophorinae</span></li></ul><ul class="style-circle" data-dcnode-id="5285"><li data-dcnode-id="5286"><span data-dcnode-id="5287" instrument_node="">Mynah?&nbsp;Acridotheres spp.</span></li></ul><ul class="style-circle" data-dcnode-id="5282"><li data-dcnode-id="5283"><span data-dcnode-id="5284" instrument_node="">Any Peafowl species?&nbsp;Acridotheres spp.</span></li></ul><ul class="style-circle" data-dcnode-id="5279"><li data-dcnode-id="5280"><span data-dcnode-id="5281" instrument_node="">Any duck, goose, swan, or other migratory waterfowl which the U.S. Fish and Wildlife Service determines does not require a federal permit for private ownership? N/A</span></li></ul><ul class="style-circle" data-dcnode-id="5276"><li data-dcnode-id="5277"><span data-dcnode-id="5278" instrument_node="">Chukar partridge?&nbsp;Alectoris chukar</span></li></ul><ul class="style-circle" data-dcnode-id="5273"><li data-dcnode-id="5274"><span data-dcnode-id="5275" instrument_node="">Button&nbsp;?quail??&nbsp;Family Turnicidae in the order Gruiformes</span></li></ul><ul class="style-circle" data-dcnode-id="5270"><li data-dcnode-id="5271"><span data-dcnode-id="5272" instrument_node="">Any nonvenomous reptile (crocodile, alligator, snake, turtle, or lizard) Members of the bird families Fringillidae, Turdidae, Zosteripidae, Pycnonotidae, Timaliidae, and Ploceidae of non-Holarctic origin. Members of the bird families Columbidae and Trogonidae of non-nearctic origin?&nbsp;Class Reptilia</span></li></ul><ul class="style-circle" data-dcnode-id="5267"><li data-dcnode-id="5268"><span data-dcnode-id="5269" instrument_node="">Elk (except feral and wild elk)?&nbsp;(cervus elaphus)</span></li></ul><ul class="style-circle" data-dcnode-id="5264"><li data-dcnode-id="5265"><span data-dcnode-id="5266" instrument_node="">Bison (except feral and wild bison)?&nbsp;(Bison bison)</span></li></ul><ul class="style-circle" data-dcnode-id="5261"><li data-dcnode-id="5262"><span data-dcnode-id="5263" instrument_node="">Muskoxen (except feral and wild muskoxen)?&nbsp;(Ovibos moschatus)</span></li></ul><span data-dcnode-id="5260" instrument_node="">© The department may not issue a permit for the capture, possession, import, or export of any game animal, including a hybrid of a game animal and a species listed in (b) of this section, for use as a pet, exept that a person that possessed a chimpanzee as a pet before January 31, 2010 may obtain a permit from the department before July 1, 2010, in order to maintain possession of the chimpanzee in this state. The propagation of chimpanzees is prohibited in this state.</span></blockquote><p data-dcnode-id="5255"><span class="wz-bold" data-dcnode-id="5257"><span data-dcnode-id="5258" instrument_node="">Citation:</span></span><span data-dcnode-id="5256" instrument_node="">&nbsp;ALASKA ADMIN. CODE tit. 5. §92.029.</span></p><p data-dcnode-id="5253"><br data-dcnode-id="5254"></p><p data-dcnode-id="5250"><span class="wz-bold" data-dcnode-id="5251" style="color: rgb(22, 114, 219);"><span data-dcnode-id="5252" instrument_node="">ARIZONA</span></span></p><p data-dcnode-id="5241"><span class="wz-bold" data-dcnode-id="5248"><span data-dcnode-id="5249" instrument_node="">To put it sim</span></span><span class="wz-bold" data-dcnode-id="5246"><span data-dcnode-id="5247" instrument_node="">ply:</span></span><span data-dcnode-id="5245" instrument_node=""> no</span><span class="wz-bold" data-dcnode-id="5243"><span data-dcnode-id="5244" instrument_node="">,</span></span><span data-dcnode-id="5242" instrument_node="">&nbsp;all species of fox are not legal in Arizona.</span></p><p data-dcnode-id="5238"><span class="wz-bold" data-dcnode-id="5239"><span data-dcnode-id="5240" instrument_node="">Note:</span></span></p><ul class="style-circle" data-dcnode-id="5235"><li data-dcnode-id="5236"><span data-dcnode-id="5237" instrument_node="">The only license given for restricted live wildlife is for educational purposes or commercial purposes only.</span></li></ul><p data-dcnode-id="5232"><span class="wz-bold" data-dcnode-id="5233"><span data-dcnode-id="5234" instrument_node="">Legalities:</span></span></p><blockquote data-dcnode-id="5183"><p data-dcnode-id="5230"><span data-dcnode-id="5231" instrument_node="">24. ?Restricted live wildlife? means wildlife that cannot be imported, exported, or possessed without a special license or lawful exemption. Restricted live wildlife are listed in R12-4-406.</span></p><p data-dcnode-id="5228"><span data-dcnode-id="5229" instrument_node="">?</span></p><p data-dcnode-id="5226"><span data-dcnode-id="5227" instrument_node="">G. Unless specified otherwise, mammals listed below are restricted live wildlife as defined in R12-4-401. The taxonomic classification from Volumes I and II of Walker?s Mammals of the World, Sixth Edition, 1999, and not including any later edition, is the authority in the following designations. A copy is available for inspection at any Department office and from the Johns Hopkins University Press, 2715 N. Charles St., Baltimore, MD 21218-4363.</span></p><p data-dcnode-id="5224"><span data-dcnode-id="5225" instrument_node="">1. All species of the genus Didelphis. Common name: American opossums;</span></p><p data-dcnode-id="5222"><span data-dcnode-id="5223" instrument_node="">2. All species of the order Insectivora. Common names include: Insectivores, shrews, hedgehogs, tenrecs, solenodonts, and moles;</span></p><p data-dcnode-id="5220"><span data-dcnode-id="5221" instrument_node="">3. All species of the order Chiroptera. Common name: bats;</span></p><p data-dcnode-id="5218"><span data-dcnode-id="5219" instrument_node="">4. All species of the family Pongidae of the order Primates. Common names include: orangutans, chimpanzees, gorillas;</span></p><p data-dcnode-id="5216"><span data-dcnode-id="5217" instrument_node="">5. All species of the order Xenarthra. Common names include: edentates; or sloths, anteaters, and armadillos;</span></p><p data-dcnode-id="5214"><span data-dcnode-id="5215" instrument_node="">6. All species of the order Lagomorpha, except the genus Oryctolagus. Common names include: pikas, rabbits,&nbsp;and hares. Genus Oryctolagus, containing domestic rabbits, is not wildlife;</span></p><p data-dcnode-id="5212"><span data-dcnode-id="5213" instrument_node="">7. All species of the following families of the order Rodentia. Common name: rodents.</span></p><p data-dcnode-id="5210"><span data-dcnode-id="5211" instrument_node="">a. The family Sciuridae. Common names: squirrels, chipmunks, marmots, woodchucks, and prairie dogs;</span></p><p data-dcnode-id="5208"><span data-dcnode-id="5209" instrument_node="">b. The family Geomyidae. Common name: pocket gophers;</span></p><p data-dcnode-id="5206"><span data-dcnode-id="5207" instrument_node="">c. The family Castoridae. Common name: beavers;</span></p><p data-dcnode-id="5204"><span data-dcnode-id="5205" instrument_node="">d. The family Erethizontidae. Common name: New World porcupines; and</span></p><p data-dcnode-id="5202"><span data-dcnode-id="5203" instrument_node="">e. The family Capromyidae. Common names include: hutias, coypus, or nutrias;</span></p><p data-dcnode-id="5200"><span data-dcnode-id="5201" instrument_node="">8. All species of the order Carnivora. Common names include: carnivores, skunks, raccoons, bears, foxes, and weasels; and</span></p><p data-dcnode-id="5198"><span data-dcnode-id="5199" instrument_node="">9. All species of the following families of the order Artiodactyla. Common name: even-toed ungulates.</span></p><p data-dcnode-id="5196"><span data-dcnode-id="5197" instrument_node="">a. The family Tayassuidae. Common name: peccaries;</span></p><p data-dcnode-id="5194"><span data-dcnode-id="5195" instrument_node="">b. The family Cervidae. Common names include: cervi;</span></p><p data-dcnode-id="5192"><span data-dcnode-id="5193" instrument_node="">d; or deer, elk, moose, wapiti, and red deer;</span></p><p data-dcnode-id="5190"><span data-dcnode-id="5191" instrument_node="">c. The family Antilocapridae. Common name: pronghorn; and</span></p><p data-dcnode-id="5188"><span data-dcnode-id="5189" instrument_node="">d. The family Bovidae. Common names include: cattle, buffalo, bison, oxen, duikers, antelopes, gazelles, goats, and sheep, except that the following are not restricted:</span></p><p data-dcnode-id="5186"><span data-dcnode-id="5187" instrument_node="">i. The genus Bubalus. Common name: water buffalo; and</span></p><p data-dcnode-id="5184"><span data-dcnode-id="5185" instrument_node="">ii. The genus Bison. Common name: bison, American bison or buffalo.</span></p></blockquote><p data-dcnode-id="5179"><span class="wz-bold" data-dcnode-id="5181"><span data-dcnode-id="5182" instrument_node="">Citation:</span></span><span data-dcnode-id="5180" instrument_node="">&nbsp;ARIZ. COMP. ADMIN R. &amp; REGS. R12-4-406; R12-4-409; R12-4-417; R12-4-425; R12-4-426&nbsp;</span></p><p data-dcnode-id="5176"><span class="wz-bold" data-dcnode-id="5177"><br data-dcnode-id="5178"></span></p><p data-dcnode-id="5173"><span class="wz-bold" data-dcnode-id="5174" style="color: rgb(22, 114, 219);"><span data-dcnode-id="5175" instrument_node="">ARKANSAS</span></span></p><p data-dcnode-id="5169"><span class="wz-bold" data-dcnode-id="5171"><span data-dcnode-id="5172" instrument_node="">To put it simply:</span></span><span data-dcnode-id="5170" instrument_node="">&nbsp;yes, all species of fox are legal in Arkansas.</span></p><p data-dcnode-id="5166"><span class="wz-bold" data-dcnode-id="5167"><span data-dcnode-id="5168" instrument_node="">Note:</span></span></p><ul class="style-circle" data-dcnode-id="5159"><li data-dcnode-id="5164"><span data-dcnode-id="5165" instrument_node="">Red and gray foxes cannot be imported from&nbsp;Alaska, Arizona, Idaho, Illinois,&nbsp;Indiana, Iowa, Minnesota, Missouri, Montana, Nebraska, New Hampshire, New York, North Dakota, Ohio, South Dakota, Texas, Vermont, Wisconsin, Wyoming or Canada.</span></li><li data-dcnode-id="5162"><span data-dcnode-id="5163" instrument_node="">No permit is needed, however, a one-time importation permit is required in order to buy a red or gray fox from out of state.</span></li><li data-dcnode-id="5160"><span data-dcnode-id="5161" instrument_node="">Non-native foxes such as arctics and fennecs must have written proof that they were legally obtained (receipt and USDA papers), and a health certificate issued by an accredited veterinarian.</span></li></ul><p data-dcnode-id="5156"><span class="wz-bold" data-dcnode-id="5157"><span data-dcnode-id="5158" instrument_node="">The legal jargon:</span></span></p><blockquote data-dcnode-id="5062"><p data-dcnode-id="5154"><span data-dcnode-id="5155" instrument_node="">09.10 WILDLIFE IMPORTATION PERMIT REQUIRED</span></p><p data-dcnode-id="5152"><span data-dcnode-id="5153" instrument_node="">09-07, 01-13</span></p><p data-dcnode-id="5150"><span data-dcnode-id="5151" instrument_node="">(A) It is unlawful to import live wildlife into Arkansas without a valid Wildlife Importation Permit issued by the Commission. This permit shall be required regardless of the final destination of the wildlife, whether in Arkansas or points beyond. It also is unlawful for any person to receive, acquire, purchase or possess any wildlife imported into Arkansas in violation of this regulation.</span></p><p data-dcnode-id="5148"><span data-dcnode-id="5149" instrument_node="">(B) It is unlawful for the holder of a Wildlife Importation Permit to cause or permit any wild animal or bird to be imported into Arkansas under inhumane or unhealthy conditions (Addendum F1.04).</span></p><p data-dcnode-id="5146"><span data-dcnode-id="5147" instrument_node="">?</span></p><p data-dcnode-id="5144"><span data-dcnode-id="5145" instrument_node="">09.11 IMPORTATION OF CERTAIN LIVING WILDLIFE PROHIBITED</span></p><p data-dcnode-id="5142"><span data-dcnode-id="5143" instrument_node="">04-13</span></p><p data-dcnode-id="5140"><span data-dcnode-id="5141" instrument_node="">It is unlawful to import, ship, transport, or carry into Arkansas by any means, or to cause to be imported, receive, or to assist in any manner in the importation of any of the following living wildlife:</span></p><p data-dcnode-id="5138"><span data-dcnode-id="5139" instrument_node="">(A)&nbsp;Any member of the Family Cervidae (cervids).</span></p><p data-dcnode-id="5136"><span data-dcnode-id="5137" instrument_node="">(B)&nbsp;Raccoons.</span></p><p data-dcnode-id="5134"><span data-dcnode-id="5135" instrument_node="">©&nbsp;Bats.</span></p><p data-dcnode-id="5132"><span data-dcnode-id="5133" instrument_node="">(D)&nbsp;Skunks.</span></p><p data-dcnode-id="5130"><span data-dcnode-id="5131" instrument_node="">(E)&nbsp;Coyotes that originate from or have lived in Alaska, Idaho, Illinois, Indiana, Iowa, Minnesota, Missouri, Montana, Nebraska, North Dakota, Ohio, South Dakota, Texas, Wisconsin, Wyoming or Canada.</span></p><p data-dcnode-id="5128"><span data-dcnode-id="5129" instrument_node="">(F)&nbsp;Gray and red foxes that originate or have lived in Alaska, Arizona, Idaho, Illinois,&nbsp;Indiana, Iowa, Minnesota, Missouri, Montana, Nebraska, New Hampshire, New York, North Dakota, Ohio, South Dakota, Texas, Vermont, Wisconsin, Wyoming or Canada.</span></p><p data-dcnode-id="5126"><span data-dcnode-id="5127" instrument_node="">?</span></p><p data-dcnode-id="5124"><span data-dcnode-id="5125" instrument_node="">9.14 NATIVE WILDLIFE PETS RESTRICTED</span></p><p data-dcnode-id="5122"><span data-dcnode-id="5123" instrument_node="">04-12</span></p><p data-dcnode-id="5120"><span data-dcnode-id="5121" instrument_node="">It is unlawful to possess native wildlife as pets except as follows:</span></p><p data-dcnode-id="5118"><span data-dcnode-id="5119" instrument_node="">(A) Native wildlife captured from the wild:</span></p><p data-dcnode-id="5116"><span data-dcnode-id="5117" instrument_node="">(1) No more than six per household of any combination of the following animals may be possessed as pets:</span></p><p data-dcnode-id="5114"><span data-dcnode-id="5115" instrument_node="">(a) Hand-captured bobcat, coyote, gray fox, red fox, opossum, rabbit, raccoon and squirrel; and</span></p><p data-dcnode-id="5112"><span data-dcnode-id="5113" instrument_node="">(b) Deer that were captured by hand prior to July 1, 2012 may be retained until their death.</span></p><p data-dcnode-id="5110"><span data-dcnode-id="5111" instrument_node="">© Hand-captured native non-game wildlife other than birds, bats, alligator snapping turtles, ornate box turtles, hellbenders, troglodytic species (cave dwellers), or those animals defined as endangered species.</span></p><p data-dcnode-id="5108"><span data-dcnode-id="5109" instrument_node="">?</span></p><p data-dcnode-id="5106"><span data-dcnode-id="5107" instrument_node="">(B) Captive born native wildlife: No more than six per household of any commercially obtained, captive born native wildlife may be possessed as personal pets in compliance with the following restrictions:</span></p><p data-dcnode-id="5104"><span data-dcnode-id="5105" instrument_node="">(1) Commercially obtained, captive born wildlife pets and/or their offspring shall not be confined with the same species of wild born animals and/or their offspring.</span></p><p data-dcnode-id="5102"><span data-dcnode-id="5103" instrument_node="">(2) Owners shall maintain records of proof of legal ownership of such animals including licenses, bills of sale, bills of lading, receipts, invoices and copies of Wildlife Importation Permits or other satisfactory evidence. The date of acquisition, place of origin, and the name, address, and telephone number of the person from whom the wildlife was acquired shall be recorded. Owners shall provide these records to the Commission upon demand.</span></p><p data-dcnode-id="5100"><span data-dcnode-id="5101" instrument_node="">(3) Commercially obtained, captive born wildlife pets or their offspring shall only be sold in compliance with Code 09.07.</span></p><p data-dcnode-id="5098"><span data-dcnode-id="5099" instrument_node="">(4) Males and females of the same species must be kept in separate enclosures, or if kept in the same enclosure, the owner shall provide proof that all males within the enclosure have been neutered.</span></p><p data-dcnode-id="5096"><span data-dcnode-id="5097" instrument_node="">(5) Owners of commercially obtained or captive born white-tailed deer or elk that were acquired prior to June 30, 2005, and that are kept as personal pets may retain ownership of such animals provided they registered with&nbsp;the Wildlife Management Division by June 30, 2008, and are in compliance with all provisions of this regulation.</span></p><p data-dcnode-id="5094"><span data-dcnode-id="5095" instrument_node="">(6) Owners must immediately test all deer and elk that die in captivity for CWD and forward copies of test results to the Commission within seven days of receipt.</span></p><p data-dcnode-id="5092"><span data-dcnode-id="5093" instrument_node="">(7) All cervids kept in compliance with (B) of this regulation shall be confined within an enclosure that complies with the following requirements:</span></p><p data-dcnode-id="5090"><span data-dcnode-id="5091" instrument_node="">(a) Enclosures shall have a perimeter fence that is not less than eight (8) feet in height and shall be constructed so as to prohibit the escape of confined cervids and the ingress of native cervids.</span></p><p data-dcnode-id="5088"><span data-dcnode-id="5089" instrument_node="">(b) The area of the enclosure shall not be less than 200 square feet for the first cervid and shall be increased in size 150 square feet for each additional cervid.</span></p><p data-dcnode-id="5086"><span data-dcnode-id="5087" instrument_node="">(8) All wildlife possessed in captivity shall be maintained in enclosures, pens, or cages that are sufficiently strong to prevent escape of the wildlife and that will protect the wildlife from injury.</span></p><p data-dcnode-id="5084"><span data-dcnode-id="5085" instrument_node="">© It is unlawful for anyone to keep a native wildlife pet under inhumane or unhealthy conditions.</span></p><p data-dcnode-id="5082"><span data-dcnode-id="5083" instrument_node="">?</span></p><p data-dcnode-id="5080"><span data-dcnode-id="5081" instrument_node="">09.16 LIVE FOX/COYOTE PERMIT REQUIRED</span></p><p data-dcnode-id="5078"><span data-dcnode-id="5079" instrument_node="">09-07</span></p><p data-dcnode-id="5076"><span data-dcnode-id="5077" instrument_node="">It is unlawful to sell or offer for sale live gray fox, red fox or coyote captured from the wild in Arkansas without first obtaining a Live Fox and Coyote Permit from the Commission.</span></p><p data-dcnode-id="5071"><span data-dcnode-id="5075" instrument_node="">?</span><br data-dcnode-id="5074"><br data-dcnode-id="5073"><span data-dcnode-id="5072" instrument_node="">002.00.1-09.02. Possession of Non-Native Wildlife in Captivity Restricted</span></p><p data-dcnode-id="5069"><span data-dcnode-id="5070" instrument_node="">(A) It is unlawful to possess captive non-native wildlife not excepted under Code 09.01, unless the possessor can produce written documentation that such wildlife was legally obtained and has been certified by an accredited veterinarian to be free of diseases and parasites that may pose an adverse risk to native wildlife.</span></p><p data-dcnode-id="5067"><span data-dcnode-id="5068" instrument_node="">(B) It is unlawful for any person to possess mountain lions (Puma concolor) except in compliance with Codes 09.07; 09.13.</span></p><p data-dcnode-id="5065"><span data-dcnode-id="5066" instrument_node="">© It is unlawful to possess tigers, African lions and all species of bears not in compliance with Ark. Code Ann. §§ 20-19-501-511 or Code 09.07.</span></p><p data-dcnode-id="5063"><span data-dcnode-id="5064" instrument_node="">(D) It is unlawful to keep non-native wildlife under inhumane or unhealthy conditions.</span></p></blockquote><p data-dcnode-id="5058"><span class="wz-bold" data-dcnode-id="5060"><span data-dcnode-id="5061" instrument_node="">Citation:</span></span><span data-dcnode-id="5059" instrument_node="">&nbsp;ARKANSAS CODE ANNOTATED §20-19-501-§20-19-511 &amp; GFC 18.17;&nbsp;ARKANSAS STATE GAME AND FISH COMMISSION CODE BOOK 09.02, 09.10, 09.11, 09.14, 09.16</span></p><p data-dcnode-id="5055"><span class="wz-bold" data-dcnode-id="5056"><br data-dcnode-id="5057"></span></p><p data-dcnode-id="5052"><span class="wz-bold" data-dcnode-id="5053" style="color: rgb(22, 114, 219);"><span data-dcnode-id="5054" instrument_node="">CALIFORNIA</span></span></p><p data-dcnode-id="5048"><span class="wz-bold" data-dcnode-id="5050"><span data-dcnode-id="5051" instrument_node="">To put it simply:</span></span><span data-dcnode-id="5049" instrument_node="">&nbsp;no, foxes are not legal in California.</span></p><p data-dcnode-id="5046"><span data-dcnode-id="5047" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="4909"><p data-dcnode-id="5044"><span data-dcnode-id="5045" instrument_node="">§ 671. Importation, Transportation and Possession of Live Restricted Animals.</span></p><p data-dcnode-id="5042"><span data-dcnode-id="5043" instrument_node="">&nbsp;(a) It shall be unlawful to import,&nbsp;transport, or possess live animals restricted in subsection © below except under permit issued by the department. Permits may be issued by the department as specified herein and for purposes designated in Section 671.1 subject to the conditions and restrictions designated by the department. Except for mammals listed in Fish and Game Code Section 3950 or live aquatic animals requiring a permit pursuant to Fish and Game Code Section 2271, no permit is required by this section for any animal being imported, transported, or possessed pursuant to any other permit issued by the department. Cities and counties may also prohibit possession or require a permit for these and other species not requiring a state permit.</span></p><p data-dcnode-id="5040"><span data-dcnode-id="5041" instrument_node="">(b) The commission has determined the below listed animals are not normally domesticated in this state. Mammals listed to prevent the depletion of wild populations and to provide for animal welfare are termed ?welfare animals?, and are designated by the letter ?W?. Those species listed because they pose a threat to native wildlife, the agriculture interests of the state or to public health or safety are termed ?detrimental animals? and are designated by the letter ?D?. The department shall include the list of welfare and detrimental wild animals as part of DFG MANUAL NO. 671 (2/25/92) IMPORTATION, TRANSPORTATION AND POSSESSION OF RESTRICTED SPECIES, to be made available to all permittees and other interested individuals.</span></p><p data-dcnode-id="5038"><span data-dcnode-id="5039" instrument_node="">?</span></p><p data-dcnode-id="5036"><span data-dcnode-id="5037" instrument_node="">(2) Class Mammalia-Mammals</span></p><p data-dcnode-id="5034"><span data-dcnode-id="5035" instrument_node="">(A) Order Primates-Monkeys, Apes</span></p><p data-dcnode-id="5032"><span data-dcnode-id="5033" instrument_node="">All species (W), except humans in the Family Hominidae are not restricted.</span></p><p data-dcnode-id="5030"><span data-dcnode-id="5031" instrument_node="">(B) Order Xenarthra-Sloths, Anteaters, Armadillos, etc.</span></p><p data-dcnode-id="5028"><span data-dcnode-id="5029" instrument_node="">All species:</span></p><p data-dcnode-id="5026"><span data-dcnode-id="5027" instrument_node="">1. Family Dasypodidae-Armadillos-All Species (D).</span></p><p data-dcnode-id="5024"><span data-dcnode-id="5025" instrument_node="">2. Family Bradypodidae-Sloths-(W).</span></p><p data-dcnode-id="5022"><span data-dcnode-id="5023" instrument_node="">3. Family Myrmecophagidae-Anteaters-(W).</span></p><p data-dcnode-id="5020"><span data-dcnode-id="5021" instrument_node="">© Order Marsupialia-Marsupials or Pouched Animals</span></p><p data-dcnode-id="5018"><span data-dcnode-id="5019" instrument_node="">All species (W).</span></p><p data-dcnode-id="5016"><span data-dcnode-id="5017" instrument_node="">(D) Order Insectivora-Shrews, Moles, Hedgehogs, etc.</span></p><p data-dcnode-id="5014"><span data-dcnode-id="5015" instrument_node="">All species (D).</span></p><p data-dcnode-id="5012"><span data-dcnode-id="5013" instrument_node="">(E) Order Dermoptera-Gliding Lemurs</span></p><p data-dcnode-id="5010"><span data-dcnode-id="5011" instrument_node="">All species (D).</span></p><p data-dcnode-id="5008"><span data-dcnode-id="5009" instrument_node="">(F) Order Chiroptera-Bats</span></p><p data-dcnode-id="5006"><span data-dcnode-id="5007" instrument_node="">All species (D).</span></p><p data-dcnode-id="5004"><span data-dcnode-id="5005" instrument_node="">(G) Order Monotremata-Spiny Anteaters, Platypuses</span></p><p data-dcnode-id="5002"><span data-dcnode-id="5003" instrument_node="">All Species (W).</span></p><p data-dcnode-id="5000"><span data-dcnode-id="5001" instrument_node="">(H) Order Pholidota-Pangolins or Scaly Anteaters</span></p><p data-dcnode-id="4998"><span data-dcnode-id="4999" instrument_node="">All species (W).</span></p><p data-dcnode-id="4996"><span data-dcnode-id="4997" instrument_node="">(I) Order Lagomorpha-Pikas, Rabbits, and Hares</span></p><p data-dcnode-id="4994"><span data-dcnode-id="4995" instrument_node="">All species, (D), except domesticated races of rabbits and hares of the Family Leporidae are not restricted.</span></p><p data-dcnode-id="4992"><span data-dcnode-id="4993" instrument_node="">(J) Order Rodentia-Hamsters, Field Mice, Voles, Muskrats, Gerbils, Squirrels, Chipmunks, Woodchucks, and Prairie Dogs</span></p><p data-dcnode-id="4990"><span data-dcnode-id="4991" instrument_node="">1. All species (D), except:</span></p><p data-dcnode-id="4988"><span data-dcnode-id="4989" instrument_node="">a. Ondatra zibethica (Muskrats) are not restricted under conditions set forth in Fish and Game Code Section 2250;</span></p><p data-dcnode-id="4986"><span data-dcnode-id="4987" instrument_node="">b. Domesticated races of golden hamsters of the species Mesocricetus auratus and domesticated races of dwarf hamsters of the Genus Phodopusare not restricted;</span></p><p data-dcnode-id="4984"><span data-dcnode-id="4985" instrument_node="">c. Domesticated races of rats or mice (white or albino; trained, dancing or spinning, laboratory-reared) are not restricted;</span></p><p data-dcnode-id="4982"><span data-dcnode-id="4983" instrument_node="">d. Domesticated races of guinea pigs of the species Cavia porcellus are not restricted; and</span></p><p data-dcnode-id="4980"><span data-dcnode-id="4981" instrument_node="">e. Domesticated races of chinchillas of the species Chinchilla laniger are not restricted.</span></p><p data-dcnode-id="4978"><span data-dcnode-id="4979" instrument_node="">(K) Order Carnivora-Raccoons, Ringtailed Cats, Kinkajous, Coatis, Cacomistles, Weasels, Ferrets, Skunks, Polecats, Stoats, Mongoose, Civets, Wolves, Foxes, Coyotes, Lions, Tigers, Ocelots, Bobcats, Servals, Leopards, Jaguars, Cheetahs, Bears, etc.</span></p><p data-dcnode-id="4976"><span data-dcnode-id="4977" instrument_node="">1. Family Felidae-All species (W) except:</span></p><p data-dcnode-id="4974"><span data-dcnode-id="4975" instrument_node="">a. Acinonyx jubatus (cheetahs)-(D).</span></p><p data-dcnode-id="4972"><span data-dcnode-id="4973" instrument_node="">b. Domestic cats and hybrids of domestic cats are not restricted.</span></p><p data-dcnode-id="4970"><span data-dcnode-id="4971" instrument_node="">2. Family Canidae-All species (W).</span></p><p data-dcnode-id="4968"><span data-dcnode-id="4969" instrument_node="">a. Wolf hybrids Canis familiaris (domestic dog) x Canis lupus (wolf) are considered F1 generation wolf hybrids and are restricted (W).</span></p><p data-dcnode-id="4966"><span data-dcnode-id="4967" instrument_node="">i. No state permit is required to possess the progeny of F1 generation wolf hybrids, but cities and counties may prohibit possession or require a permit.</span></p><p data-dcnode-id="4964"><span data-dcnode-id="4965" instrument_node="">b. Domesticated dogs are not restricted.</span></p><p data-dcnode-id="4962"><span data-dcnode-id="4963" instrument_node="">3. Family Viverridae-All species (D).</span></p><p data-dcnode-id="4960"><span data-dcnode-id="4961" instrument_node="">4. Family Procyonidae-All species-(D), except:</span></p><p data-dcnode-id="4958"><span data-dcnode-id="4959" instrument_node="">a. Ailuris fulgens (Lesser panda)-(W).</span></p><p data-dcnode-id="4956"><span data-dcnode-id="4957" instrument_node="">b. Aiuropoda melanoleuca (Giant panda)-(W).</span></p><p data-dcnode-id="4954"><span data-dcnode-id="4955" instrument_node="">c. Bassariscus astutus (Ringtail or Ringtailed cat)-(W).</span></p><p data-dcnode-id="4952"><span data-dcnode-id="4953" instrument_node="">d. Jentinkia sumichrasti (Mexican and Central American cacomistle)-(W).</span></p><p data-dcnode-id="4950"><span data-dcnode-id="4951" instrument_node="">5. Family Mustelidae-All species (D), except:.</span></p><p data-dcnode-id="4948"><span data-dcnode-id="4949" instrument_node="">a. Ambloynx cinerea (Oriental small-clawed otter)-(W).</span></p><p data-dcnode-id="4946"><span data-dcnode-id="4947" instrument_node="">b. Aonyx capensis (African clawless otter)-(W).</span></p><p data-dcnode-id="4944"><span data-dcnode-id="4945" instrument_node="">c. Pteronura brasiliensis (Giant otter)-(W).</span></p><p data-dcnode-id="4942"><span data-dcnode-id="4943" instrument_node="">d. GenusLutra (River otters)-(W).</span></p><p data-dcnode-id="4940"><span data-dcnode-id="4941" instrument_node="">6. All other Families-(W).</span></p><p data-dcnode-id="4938"><span data-dcnode-id="4939" instrument_node="">(L) Order Tubulidentata-Aardvarks</span></p><p data-dcnode-id="4936"><span data-dcnode-id="4937" instrument_node="">All species-(W).</span></p><p data-dcnode-id="4934"><span data-dcnode-id="4935" instrument_node="">(M) Order Proboscidae-Elephants</span></p><p data-dcnode-id="4932"><span data-dcnode-id="4933" instrument_node="">All species-(W).</span></p><p data-dcnode-id="4930"><span data-dcnode-id="4931" instrument_node="">(N) Order Hyracoidae-Hyraxes</span></p><p data-dcnode-id="4928"><span data-dcnode-id="4929" instrument_node="">All species-(W).</span></p><p data-dcnode-id="4926"><span data-dcnode-id="4927" instrument_node="">(O) Order Sirenia-Dugongs, Manatees</span></p><p data-dcnode-id="4924"><span data-dcnode-id="4925" instrument_node="">All species-(W).</span></p><p data-dcnode-id="4922"><span data-dcnode-id="4923" instrument_node="">(P) Order Perissodactyla-Horses, Zebras, Tapirs, Rhinoceroses, etc.</span></p><p data-dcnode-id="4920"><span data-dcnode-id="4921" instrument_node="">All species (W), except Family Equidae are not restricted.</span></p><p data-dcnode-id="4918"><span data-dcnode-id="4919" instrument_node="">(Q) Order Artiodactyla-Swine, Peccaries, Camels, Deer, Elk, Moose, Antelopes, Cattle, Goats, Sheep, etc.</span></p><p data-dcnode-id="4916"><span data-dcnode-id="4917" instrument_node="">All species (D) except:</span></p><p data-dcnode-id="4914"><span data-dcnode-id="4915" instrument_node="">1. Bos taurus and Bos indicus (Domestic cattle); Bos grunniens (Yak); Bubalus bulalis (Asian water buffalo); Ovis aries Domestic sheep); Capra hircus (Domestic goat); Sus scrofa domestica (Domestic swine); Llama glama (Llama); Llama pacos (Alpaca); Llama guanicoe (Guanaco); Hybrids of llama, alpaca and guanacos; Camelus bactrianus and Camelus dromedarius (Camels); and Bison bison (American bison), are not restricted.</span></p><p data-dcnode-id="4912"><span data-dcnode-id="4913" instrument_node="">2. Permits may be issued for species of Elk (Genus Cervus) which are already maintained within California; and</span></p><p data-dcnode-id="4910"><span data-dcnode-id="4911" instrument_node="">3. Permits may be issued pursuant to Section 676 for importing, breeding, slaughter and sale of the meat and other parts of fallow deer (Dama dama) for commercial purposes.</span></p></blockquote><p data-dcnode-id="4907"><span data-dcnode-id="4908" instrument_node="">Citation:&nbsp;CALIFORNIA CODE REGS. Tit. 14, §671 and §671.1.</span></p><p data-dcnode-id="4905"><br data-dcnode-id="4906"></p><p data-dcnode-id="4901"><span data-dcnode-id="4904" instrument_node=""> </span><span class="wz-bold" data-dcnode-id="4902" style="color: rgb(22, 114, 219);"><span data-dcnode-id="4903" instrument_node="">COLORADO</span></span></p><p data-dcnode-id="4895"><span class="wz-bold" data-dcnode-id="4899"><span data-dcnode-id="4900" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="4897"><span data-dcnode-id="4898" instrument_node="">To put it simply</span></span><span data-dcnode-id="4896" instrument_node="">:&nbsp;no, foxes are not legal in Colorado.</span></p><p data-dcnode-id="4893"><span data-dcnode-id="4894" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="4760"><p data-dcnode-id="4891"><span data-dcnode-id="4892" instrument_node="">§406-8 - CHAPTER 11, WILDLIFE PARKS AND UNREGULATED WILDLIFE</span></p><p data-dcnode-id="4889"><span data-dcnode-id="4890" instrument_node="">Introduction to Chapter 11</span></p><p data-dcnode-id="4887"><span data-dcnode-id="4888" instrument_node="">In this introduction to chapter 11 we outline possession requirements for live wildlife as found in Colorado wildlife law. There is growing interest in the private possession of live wildlife. At the same time there is considerable confusion over the laws regarding such private possession. Colorado wildlife law generally prohibits the importation, live possession, sale, barter, trade, or purchase of any species of wildlife native to Colorado (33-6-113(1), C.R.S.). In addition, these same laws restrict or prohibit the importation and possession of exotic (non-native) wildlife (33-6-109(4), C.R.S.).</span></p><p data-dcnode-id="4885"><span data-dcnode-id="4886" instrument_node="">Live possession of Wildlife is permitted only under the exceptions noted below and as further detailed in Wildlife Commission regulations and Colorado statutes, See C.R.S. 33-1-106, 33-6-109, 33-6-113, 33-6-114, 18-9-202. The Wildlife Commission also maintains a ?prohibited species? list in Chapter 0. The possession of these species is severely restricted.</span></p><p data-dcnode-id="4883"><span data-dcnode-id="4884" instrument_node="">The Wildlife Commission establishes these regulations in an effort to balance its mandate to protect native species of wildlife in Colorado from the impacts which could be caused by the introduction of exotic (non-native) species with the public interest and demand for the private possession of live wildlife.</span></p><p data-dcnode-id="4881"><span data-dcnode-id="4882" instrument_node="">Reptiles and Amphibians - Chapter 10 of Wildlife Commission regulations provide that any person can possess up to six live native reptiles or native amphibians for personal use except for those species whose possession are specifically prohibited in chapter 0 or 10. These animals may not be sold, traded, or bartered.</span></p><p data-dcnode-id="4877"><span data-dcnode-id="4880" instrument_node="">Scientific Collection permit - Chapter 13 allows for the lawful possession of live wildlife under the authority of a scientific collection permit. Specific permit conditions and restrictions apply</span><a data-dcnode-id="4879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.umblr.com/redirect%3Fz%3Dhttp%253A%252F%252Fwww.bornfreeusa.org%252Fb4a2_exotic_animals_state.php%253Fs%253Dco%2523%26t%3DOTVmNDA1ZTI2MTYxMDJiZDNlZjEzYmE3MmE0YTIxNjFhMzg1YTRhNyxGMmFiWFFUbg%253D%253D" id="28D644B9-BC9B-44FD-90F1-D222E1672AD1"></a><span data-dcnode-id="4878" instrument_node="">&nbsp;and may vary from permit to permit based on the needs of the permittee as well as appropriate protection of wildlife resources.</span></p><p data-dcnode-id="4875"><span data-dcnode-id="4876" instrument_node="">Wildlife Rehabilitation - Chapter 14 allows for the lawful possession of live wildlife by licensed rehabilitators as a means to care for sick, injured or orphaned wildlife. With few exceptions, possession is allowed only long enough for the animal to recover or mature.</span></p><p data-dcnode-id="4873"><span data-dcnode-id="4874" instrument_node="">Falconry and Hawking - Chapter 6 allows for the possession of falcons, hawks, and eagles for falconry purposes. Persons possessing these birds must be properly licensed by both the U.S. Fish and Wildlife Service and the Division of Wildlife.</span></p><p data-dcnode-id="4869"><span data-dcnode-id="4872" instrument_node="">Aquaculture - Colorado statutory law</span><a data-dcnode-id="4871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.umblr.com/redirect%3Fz%3Dhttp%253A%252F%252Fwww.bornfreeusa.org%252Fb4a2_exotic_animals_state.php%253Fs%253Dco%2523%26t%3DOTVmNDA1ZTI2MTYxMDJiZDNlZjEzYmE3MmE0YTIxNjFhMzg1YTRhNyxGMmFiWFFUbg%253D%253D" id="3CD48B2C-1030-4D4D-BBC8-2681F68732B9"></a><span data-dcnode-id="4870" instrument_node="">&nbsp;recognizes that fish may be held and propagated under the authority of an aquaculture permit issued by the Department of Agriculture. In addition, chapter 12 authorizes the possession of fish for use in aquaria with some restrictions.</span></p><p data-dcnode-id="4867"><span data-dcnode-id="4868" instrument_node="">Bait dealers - Chapter 1, fishing, authorizes bait dealers and individuals to possess certain live fish as bait. Specific restrictions apply.</span></p><p data-dcnode-id="4865"><span data-dcnode-id="4866" instrument_node="">Snapping turtles - Chapter 0, General Provisions, authorizes the live possession of snapping turtles by any person.</span></p><p data-dcnode-id="4863"><span data-dcnode-id="4864" instrument_node="">Wildlife Park Licenses - Chapter 11 provides for lawful possession, propagation and sale of native and exotic wildlife via a mandatory licensing process. This includes possession of any live wildlife, other than those discussed above or listed as ?unregulated? wildlife. Examples include: Any live mammals (including furbearers), game birds, or other terrestrial wildlife not specifically listed on the unregulated wildlife list. Persons possessing live wildlife under a Commercial Wildlife Parks License are required to maintain their commercial status.</span></p><p data-dcnode-id="4861"><span data-dcnode-id="4862" instrument_node="">Unregulated Wildlife - No license is required for the private possession or purchase of animals which are included on the unregulated wildlife list or the domestic animal list. These animals may be sold, bartered, traded, exchanged, propagated or purchased by any person provided that importation requirements of the Department of Agriculture, health certifications, or any other federal, state or local requirements are met. There are no possession limits.</span></p><p data-dcnode-id="4859"><span data-dcnode-id="4860" instrument_node="">These are chapter 11 regulations clarify that it is unlawful to intentionally release any wildlife declared to be unregulated. The wildlife on these lists are typically sold, purchased, possessed and propagated as pets, maintained by hobbyists, or raised for food and fiber within Colorado?s alternative livestock industry. If an animal is not listed on either the unregulated wildlife or the domestic animal list it cannot be lawfully sold to an unlicensed person unless specifically authorized by Commission regulation.</span></p><p data-dcnode-id="4857"><span data-dcnode-id="4858" instrument_node="">?</span></p><p data-dcnode-id="4855"><span data-dcnode-id="4856" instrument_node="">#1103 - EXEMPTIONS FROM LICENSE REQUIREMENTS:</span></p><p data-dcnode-id="4853"><span data-dcnode-id="4854" instrument_node="">A. Domestic animals - The following animals are considered domestic and are exempted from the requirements of Wildlife Commission regulations:</span></p><ul class="style-circle" data-dcnode-id="4788"><li data-dcnode-id="4851"><span data-dcnode-id="4852" instrument_node="">Domestic dog (Canis familiaris) including hybrids with wild canids</span></li><li data-dcnode-id="4849"><span data-dcnode-id="4850" instrument_node="">Domestic cat (Felis catus) including hybrids with wild felines</span></li><li data-dcnode-id="4847"><span data-dcnode-id="4848" instrument_node="">Domestic horse (Equus caballus) including hybrids with Equus assinus</span></li><li data-dcnode-id="4845"><span data-dcnode-id="4846" instrument_node="">Domestic ass, burro, and donkey (Equus assinus)</span></li><li data-dcnode-id="4843"><span data-dcnode-id="4844" instrument_node="">Domestic cattle (Bos taurus and Bos indicus)</span></li><li data-dcnode-id="4841"><span data-dcnode-id="4842" instrument_node="">Domestic sheep (Ovis aries)</span></li><li data-dcnode-id="4839"><span data-dcnode-id="4840" instrument_node="">Domestic goat (Capra hircus)</span></li><li data-dcnode-id="4837"><span data-dcnode-id="4838" instrument_node="">Domestic swine (Sus scrofa domestica)</span></li><li data-dcnode-id="4835"><span data-dcnode-id="4836" instrument_node="">Domesticated races of hamsters (Mesocricetus spp.)</span></li><li data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">Domesticated races of mink (Mustela vison)</span></li><li data-dcnode-id="4831"><span data-dcnode-id="4832" instrument_node="">Domesticated races of guinea pigs (Cavia porcellus)</span></li><li data-dcnode-id="4829"><span data-dcnode-id="4830" instrument_node="">Domesticated races of gerbils (Meriones unquiculatus)</span></li><li data-dcnode-id="4827"><span data-dcnode-id="4828" instrument_node="">Domesticated races of chinchillas (Chinchilla laniger)</span></li><li data-dcnode-id="4825"><span data-dcnode-id="4826" instrument_node="">Domesticated races of rats (Rattus norvegicus and Rattus)</span></li><li data-dcnode-id="4823"><span data-dcnode-id="4824" instrument_node="">Domesticated races of mice (Mus musculus)</span></li><li data-dcnode-id="4821"><span data-dcnode-id="4822" instrument_node="">Domesticated races of European rabbit (Oryctolagus cuniculus)</span></li><li data-dcnode-id="4819"><span data-dcnode-id="4820" instrument_node="">Domesticated races of chickens (Gallus)</span></li><li data-dcnode-id="4817"><span data-dcnode-id="4818" instrument_node="">Domesticated races of turkey (Meleagria gallopavo) distinguished morphologically from wild birds</span></li><li data-dcnode-id="4815"><span data-dcnode-id="4816" instrument_node="">Domesticated races of ducks and geese (Anatidae) distinguishable morphologically from wild birds</span></li><li data-dcnode-id="4813"><span data-dcnode-id="4814" instrument_node="">Domesticated races of European ferret (Mustela putorius)</span></li><li data-dcnode-id="4811"><span data-dcnode-id="4812" instrument_node="">Domesticated races of pigeons (Columba domestica and Columba livia) and feral pigeons</span></li><li data-dcnode-id="4809"><span data-dcnode-id="4810" instrument_node="">Domesticated races of guinea fowl (Numida meleagris)</span></li><li data-dcnode-id="4807"><span data-dcnode-id="4808" instrument_node="">Domesticated races of peafowl (Pavo cristatus)</span></li><li data-dcnode-id="4805"><span data-dcnode-id="4806" instrument_node="">Bison (Bison) including hybrids with domestic cattle</span></li><li data-dcnode-id="4803"><span data-dcnode-id="4804" instrument_node="">Ostrich (Struthio spp.)</span></li><li data-dcnode-id="4801"><span data-dcnode-id="4802" instrument_node="">Llama (Lama qlama)</span></li><li data-dcnode-id="4799"><span data-dcnode-id="4800" instrument_node="">Rhea (Rhea spp.)</span></li><li data-dcnode-id="4797"><span data-dcnode-id="4798" instrument_node="">Emu (Dromiceius spp.)</span></li><li data-dcnode-id="4795"><span data-dcnode-id="4796" instrument_node="">Alpaca (Lama pacos)</span></li><li data-dcnode-id="4793"><span data-dcnode-id="4794" instrument_node="">Reindeer (Rangifer tarandus)</span></li><li data-dcnode-id="4791"><span data-dcnode-id="4792" instrument_node="">Yak (Bos grunniens)</span></li><li data-dcnode-id="4789"><span data-dcnode-id="4790" instrument_node="">Camels (Camelus bactrianus and Camelus dromedarius)</span></li></ul><p data-dcnode-id="4786"><span data-dcnode-id="4787" instrument_node="">B. Unregulated Wildlife - Prior to adoption of this regulation (#1103B), possession of the listed species was expressly prohibited by Section 33-6-109(4), C.R.S. The decision of the Wildlife Commission to authorize this possession as herein provided is based on the scientific evidence available to it at the time of adoption of the regulation. The Wildlife Commission retains the statutory authority and duty to amend these regulations and to impose requirements, restrictions, and/or prohibition on possession of any of the listed species if and when further evidence comes to the Wildlife Commission?s attention which makes such amendments appropriate.</span></p><p data-dcnode-id="4784"><span data-dcnode-id="4785" instrument_node="">Except for the provisions of section #007 regarding importation, #008 regarding the prohibited species list, #009 regarding release of live wildlife, and section #1114 regarding the addition of species to the unregulated wildlife list, the wildlife enumerated in this list are otherwise exempted from the requirements of Wildlife Commission regulations.</span></p><p data-dcnode-id="4782"><span data-dcnode-id="4783" instrument_node="">Unregulated wildlife may be imported, sold, bartered, traded, transferred, possessed, propagated and transported in Colorado provided that all importation, disease requirements and any other state, local or federal require
