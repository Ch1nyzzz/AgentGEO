de-id="3900"><li data-dcnode-id="3903"><span data-dcnode-id="3904" instrument_node="">While foxes are technically legal to possess in the state of Kentucky, they are also illegal to import into the state. And, unfortunately, there are no fox breeders in Kentucky, so owning a fox is impossible.</span></li><li data-dcnode-id="3901"><span data-dcnode-id="3902" instrument_node="">However, it may be possible to import and own a bat-eared fox (Otocyon megalotis).</span></li></ul><p data-dcnode-id="3898"><span data-dcnode-id="3899" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="3873"><p data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">Section 6. Prohibited Species. (1) Except as specified in Section 7 of this administrative regulation, a person shall not import, transport, or possess:</span></p><p data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">(a) Alligator snapping turtle (Macrochelys temminckii);</span></p><p data-dcnode-id="3892"><span data-dcnode-id="3893" instrument_node="">(b) Black bear (Ursus americanus);</span></p><p data-dcnode-id="3890"><span data-dcnode-id="3891" instrument_node="">© Copperbelly water snake (Nerodia erythrogaster neglecta);</span></p><p data-dcnode-id="3888"><span data-dcnode-id="3889" instrument_node="">(d) Cougar or mountain lion (Felis concolor);</span></p><p data-dcnode-id="3886"><span data-dcnode-id="3887" instrument_node="">(e) Wild turkey (Meleagris gallopavo); or</span></p><p data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">(f) Wolf (Canis lupus).</span></p><p data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">(2) The following species shall not be imported into or transported through Kentucky, except as specified in Section 7 of this administrative regulation:</span></p><p data-dcnode-id="3880"><span data-dcnode-id="3881" instrument_node="">(a) Coyotes (Canis latrans);</span></p><p data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">(b) Foxes (Vulpes spp.; Alopex lagopus; Urocyon cinereoargenteus);</span></p><p data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">© Raccoons (Procyon lotor); or</span></p><p data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">(d) Skunks (Mephitis spp.; Spilogale putorius; Conepatus leuconotus).</span></p></blockquote><p data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">Citation: 301 KAR 2:081, SECTION 6</span></p><p data-dcnode-id="3869"><br data-dcnode-id="3870"></p><p data-dcnode-id="3866"><span class="wz-bold" data-dcnode-id="3867" style="color: rgb(22, 114, 219);"><span data-dcnode-id="3868" instrument_node="">LOUISIANA</span></span></p><p data-dcnode-id="3860"><span class="wz-bold" data-dcnode-id="3864"><span data-dcnode-id="3865" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">To put it simply:</span></span><span data-dcnode-id="3861" instrument_node=""> no, all foxes are not legal in Louisiana.</span></p><p data-dcnode-id="3857"><span class="wz-bold" data-dcnode-id="3858"><span data-dcnode-id="3859" instrument_node="">Note:</span></span></p><ul class="style-circle" data-dcnode-id="3843"><li data-dcnode-id="3849"><span data-dcnode-id="3856" instrument_node="">Red foxes (</span><span class="wz-italic" data-dcnode-id="3854"><span data-dcnode-id="3855" instrument_node="">Vulpes vulpes</span></span><span data-dcnode-id="3853" instrument_node="">) and gray foxes (</span><span class="wz-italic" data-dcnode-id="3851"><span data-dcnode-id="3852" instrument_node="">Urocyon cinereoargenteus</span></span><span data-dcnode-id="3850" instrument_node="">) are defined as&nbsp;?nongame quadrupeds? in the state of Louisiana. While nongame quadrupeds can be&nbsp;?raised? by nongame quadruped exhibitors and nongame quadruped breeders, Louisiana defines&nbsp;?raising? as&nbsp;?production? (i.e. breeding for the purpose of fox/coyote hunting preserves, for chasing with hounds).</span></li><li data-dcnode-id="3844"><span data-dcnode-id="3848" instrument_node="">Louisiana prohibits the importation and exportation of any species of foxes or coyotes to or from Louisiana in an effort to prevent possible disease and parasite contamination of native wild canids.</span><ul class="style-circle" data-dcnode-id="3845"><li data-dcnode-id="3846"><span data-dcnode-id="3847" instrument_node="">While exotic, nonnative foxes are technically not regulated and therefore legal to own, they are not legal to import into the state, and there are no fox breeders in Louisiana, so owning a fox is impossible.&nbsp;</span></li></ul></li></ul><p data-dcnode-id="3840"><span class="wz-bold" data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">The legal jargon:</span></span></p><blockquote data-dcnode-id="3722"><p data-dcnode-id="3836"><span data-dcnode-id="3839" instrument_node="">TITLE 56</span><br data-dcnode-id="3838"><span data-dcnode-id="3837" instrument_node="">WILDLIFE AND FISHERIES</span></p><p data-dcnode-id="3834"><span data-dcnode-id="3835" instrument_node="">?</span></p><p data-dcnode-id="3831"><span data-dcnode-id="3833" instrument_node="">CHAPTER 1. GENERAL PROVISIONS FOR WILDLIFE AND FISHERIES PART I. WILDLIFE AND FISHERIES COMMISSION</span><br data-dcnode-id="3832"></p><p data-dcnode-id="3829"><span data-dcnode-id="3830" instrument_node="">?</span></p><p data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">§8. &nbsp;Definitions</span></p><p data-dcnode-id="3825"><span data-dcnode-id="3826" instrument_node="">?</span></p><p data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">(89) &nbsp;"Nongame quadruped" means alligators, beavers, bobcats, coyotes, gray foxes, minks, muskrats, nutrias, opossums, otters, raccoons, red foxes, skunks, and other wild quadrupeds valuable for their skins or furs.</span></p><p data-dcnode-id="3821"><span data-dcnode-id="3822" instrument_node="">?</span></p><p data-dcnode-id="3818"><span data-dcnode-id="3820" instrument_node="">PART V. TRAPPING FUR-BEARING ANIMALS OR ALLIGATORS SUBPART A. GENERAL PROVISIONS</span><br data-dcnode-id="3819"></p><p data-dcnode-id="3816"><span data-dcnode-id="3817" instrument_node="">?</span></p><p data-dcnode-id="3814"><span data-dcnode-id="3815" instrument_node="">§262. &nbsp;Nongame quadrupeds; breeding, propagation, and exhibition</span></p><p data-dcnode-id="3812"><span data-dcnode-id="3813" instrument_node="">A. &nbsp;Whoever desires to engage in the business of raising and/or exhibiting imported or native nongame quadrupeds shall apply to the department for a license to do so. &nbsp;If it appears that the application is made in good faith, upon a payment of ten dollars, a nongame quadruped exhibitor license may be issued permitting the applicant to breed and/or exhibit such animals provided he meets rules and regulations of the department. &nbsp;</span></p><p data-dcnode-id="3810"><span data-dcnode-id="3811" instrument_node="">B. &nbsp;Whoever desires to engage in the business of raising, exhibiting, and selling imported or native nongame quadrupeds or collecting and selling wild alligator eggs shall apply to the department for a license to do so. &nbsp;If it appears that the application is made in good faith, upon payment of twenty-five dollars, a nongame quadruped breeder license may be issued permitting the applicant to breed, propagate, exhibit, and sell such animals alive or sell their parts; and to kill and transport them and sell their pelts, skins, or carcasses as hereinafter provided in this Section. &nbsp;</span></p><p data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">C. &nbsp;Nongame quadruped breeder and exhibitor licenses shall expire on the thirty-first of December of each year. &nbsp;On or before the first of December of each year, every licensee shall apply for a renewal of his exhibitor or breeder license. &nbsp;In conjunction with this application, or without application if not renewing the license, the licensee shall provide a report including all information as specified by the department. &nbsp;</span></p><p data-dcnode-id="3806"><span data-dcnode-id="3807" instrument_node="">D. &nbsp;Nongame quadrupeds raised on such licensed breeding farms may be sold alive or taken for their pelts, skins, or for food according to rules and regulations of the commission. &nbsp;All skins shall be tagged according to rules and regulations of the commission. &nbsp;The severance tax as fixed by law shall be paid before the raw pelts or alligator skins are shipped out of state, or tanned within the state, and a written affidavit as to the number and kinds shipped or tanned shall be furnished to the department as specified. &nbsp;</span></p><p data-dcnode-id="3804"><span data-dcnode-id="3805" instrument_node="">E. &nbsp;All nongame quadruped carcasses or parts intended for sale shall be shipped, transported, sold, or offered for sale according to commission regulations. &nbsp;</span></p><p data-dcnode-id="3802"><span data-dcnode-id="3803" instrument_node="">F. &nbsp;The department may issue a permit to a duly licensed breeder to take such wild animals as needed for use as breeding stock. &nbsp;The licensed breeder shall apply in writing, stating where the animals are to be taken, at what time, and in what numbers. &nbsp;</span></p><p data-dcnode-id="3800"><span data-dcnode-id="3801" instrument_node="">G. &nbsp;Whoever under the authority of this Section has in his lawful possession any such animal or parts thereof on such posted or fenced breeding area shall have a property right therein and shall be the owner thereof. &nbsp;Whoever enters the nongame quadruped farm or catches, takes, or molests such animals when the area has been posted or fenced according to law shall be punished as though the animals were ordinary domestic animals and subject to the property rights of the state of Louisiana.</span></p><p data-dcnode-id="3798"><span data-dcnode-id="3799" instrument_node="">H. &nbsp;The department may revoke the license of any person violating the provisions of this Section. &nbsp;</span></p><p data-dcnode-id="3796"><span data-dcnode-id="3797" instrument_node="">I. &nbsp;All other rules and regulations pertaining to the breeding, propagation, and sale of nongame quadrupeds shall be determined solely by the commission. &nbsp;</span></p><p data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">J. &nbsp;Violation of this Section constitutes a class three violation.</span></p><p data-dcnode-id="3792"><span data-dcnode-id="3793" instrument_node="">?</span></p><p data-dcnode-id="3788"><span data-dcnode-id="3791" instrument_node="">TITLE 76</span><br data-dcnode-id="3790"><span data-dcnode-id="3789" instrument_node="">WILDLIFE AND FISHERIES</span></p><p data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">?</span></p><p data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">Part V. Wild Quadrupeds and Wild Birds</span></p><p data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node="">?</span></p><p data-dcnode-id="3780"><span data-dcnode-id="3781" instrument_node="">§113. Fox/Coyote Hunting Preserve, Purchase and Sale of Live Foxes and Coyotes, Permitting YearRound Coyote Trapping</span></p><p data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">A. Purpose. These regulations are to govern the purchasing, selling and holding in captivity of live foxes and coyotes for chasing with hounds. These regulations will prohibit the importation and exportation of any species of foxes or coyotes to or from Louisiana in an effort to prevent possible disease and parasite contamination of native wild canids. Humans are subject to infection with the liver being the most common site of larval growth. The infection is termed alveolar hydatid disease (AHD). The number of deaths per number of infected individuals has been 50-75 percent. These regulations are also enacted to allow the sport of fox/coyote hunting with dogs within enclosed areas. The regulations provide general rules including licensing, permits, fees, live trapping, sale and purchase of animals, holding cage requirements, enclosure requirements, acclimation requirements and report requirements.&nbsp;</span></p><p data-dcnode-id="3775"><span data-dcnode-id="3777" instrument_node="">B. Definitions</span><br data-dcnode-id="3776"></p><p data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">?</span></p><p data-dcnode-id="3770"><span data-dcnode-id="3772" instrument_node="">Raising?the production of red fox, grey fox, or coyotes in controlled environmental conditions or in outside facilities.</span><br data-dcnode-id="3771"></p><p data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">?</span></p><p data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">D. General Rules</span></p><p data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">1. No person shall take, possess, purchase or sell live foxes or coyotes, except as provided in these regulations and R.S. Title 56.</span></p><p data-dcnode-id="3762"><span data-dcnode-id="3763" instrument_node="">2. No person shall hold in captivity any live foxes or coyotes, except as provided in these regulations and R.S. Title 56.</span></p><p data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">3. Fox/coyote hunting preserves shall be of a type and construction such that it will insure the normal containment of foxes, coyotes and hounds.</span></p><p data-dcnode-id="3758"><span data-dcnode-id="3759" instrument_node="">4. Fox/coyote hunting preserves shall contain an adequate number of escape areas which are houndproof. These may be provided by maintaining thickets, brush piles, windrows, or where natural cover is insufficient, by providing manmade escapes such as culverts or houndproof feeding stations.</span></p><p data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">5. The owners of fox/coyote hunting preserves shall be required to make available to the game: a. food that is palatable, uncontaminated and nutritionally adequate to ensure normal growth and maintenance; b. water which is fresh, uncontaminated and available at all times.</span></p><p data-dcnode-id="3754"><span data-dcnode-id="3755" instrument_node="">6. No person shall transport, possess, purchase or sell any live foxes or coyotes taken outside the state of Louisiana. Live foxes and coyotes obtained from outside the state of Louisiana prior to the enacted date of these regulations and in possession of properly licensed persons shall be exempt.</span></p><p data-dcnode-id="3752"><span data-dcnode-id="3753" instrument_node="">7. No person shall transport from the state or offer for sale out of state any live foxes or coyotes.</span></p><p data-dcnode-id="3750"><span data-dcnode-id="3751" instrument_node="">8. Acclimation pens shall be constructed adjacent to or within an enclosure to insure the containment of foxes and coyotes and the exclusion of hounds. This requirement may be waived for ?training enclosures? or in enclosures where running is discontinued for a minimum of two weeks while foxes/coyotes adjust to the enclosure environment.</span></p><p data-dcnode-id="3748"><span data-dcnode-id="3749" instrument_node="">9. No person may engage in the business of raising or exhibiting or otherwise possessing fox or coyotes for the purpose of operating a fox/coyote hunting preserve unless he or she has acquired and possesses a valid nongame quadruped breeder or exhibitor license.</span></p><p data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">10. A licensed trapper may offer for sale such live animals to any licensed nongame quadruped breeder or exhibitor during the open trapping season. During any such transactions, a bill of sale must be provided by the trapper to the nongame breeder or exhibitor and retained for a period of one year. WILDLIFE AND FISHERIES Louisiana Administrative Code January 2016 50</span></p><p data-dcnode-id="3744"><span data-dcnode-id="3745" instrument_node="">11. Permittees (trapping coyotes during the closed trapping season) will be required to use only the ?soft catch? type trap not to exceed a size number 1 ½, or a box-type trap, or a snare with a relaxing lock.</span></p><p data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">12. Permittees trapping coyotes during the closed trapping season and licensed as a nongame quadruped breeder may offer for sale such coyotes. During any such transaction, a bill of sale must be provided by the seller to the purchaser and retained for a period of one year by the purchaser.</span></p><p data-dcnode-id="3740"><span data-dcnode-id="3741" instrument_node="">13. It shall be unlawful to trap coyotes during the closed trapping season without a permit issued by the department.</span></p><p data-dcnode-id="3738"><span data-dcnode-id="3739" instrument_node="">14. Permittees will be required to check traps daily.</span></p><p data-dcnode-id="3736"><span data-dcnode-id="3737" instrument_node="">15. Permittees will be required to have in possession written permission from the landowners or lessee where traps are set.</span></p><p data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">16. Permittees shall release all nontarget species in a manner so as to keep stress or injury minimal.</span></p><p data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">17. It shall be unlawful to sell native wild foxes or coyotes outside the state of Louisiana.</span></p><p data-dcnode-id="3730"><span data-dcnode-id="3731" instrument_node="">18. Trappers and permittees who hold game for more than one day for sale shall confine animals at a rate of no more than one fox per 9 square feet and one coyote per 17 square feet. The cage must be high enough for each animal to easily sit or stand. The cage must be escape-proof and offer protection from adverse weather.</span></p><p data-dcnode-id="3728"><span data-dcnode-id="3729" instrument_node="">19. Fox/coyote hunting preserves shall be exempt from the commission action which prohibits the running of coyotes during the open turkey season.</span></p><p data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">20. The Department of Wildlife and Fisheries has the authority to conduct disease investigations at any time and, pending the results of the disease investigations, has the authority to quarantine fox/coyote hunting preserves if deemed necessary. The department also has the authority to prohibit the release of animals that are diseased or have been exposed to diseased animals.</span></p><p data-dcnode-id="3723"><span data-dcnode-id="3725" instrument_node="">21. The owners of fox/coyote hunting preserves shall be required to immediately report to the department the occurrence of any disease contracted by captive fox or coyotes. These diseases include but are not limited to rabies, canine distemper, sarcoptic mange or Echinococcus infections.</span><br data-dcnode-id="3724"></p></blockquote><p data-dcnode-id="3718"><span class="wz-bold" data-dcnode-id="3720"><span data-dcnode-id="3721" instrument_node="">Citation:</span></span><span data-dcnode-id="3719" instrument_node="">&nbsp;LA RS 56:8 &amp; 56:262; LA AC 76:113</span></p><p data-dcnode-id="3716"><br data-dcnode-id="3717"></p><p data-dcnode-id="3713"><span class="wz-bold" data-dcnode-id="3714" style="color: rgb(22, 114, 219);"><span data-dcnode-id="3715" instrument_node="">MAINE</span></span></p><p data-dcnode-id="3707"><span class="wz-bold" data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">To put it simply:</span></span><span data-dcnode-id="3708" instrument_node=""> yes, foxes are legal in Maine.</span></p><p data-dcnode-id="3705"><span data-dcnode-id="3706" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="3654"><p data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">7.00 Permit Required</span></p><p data-dcnode-id="3701"><span data-dcnode-id="3702" instrument_node="">A permit is required to take alive, possess or import any native or exotic wildlife for the following purposes pursuant to Title 12 MRSA Section 12152: Wildlife Exhibit, including any commercial display of wildlife; General Wildlife Possession, including propagation or personal use of wildlife; Wildlife Rehabilitation. Wildlife Importation, pursuant to 12 MRSA Section 12155; and Scientific Collection pursuant to 12 MRSA Section 12704.</span></p><p data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node=""> A person may not import a wolf hybrid into the State without first obtaining a Wildlife Importation Permit from the Department. A person may not keep a wolf hybrid in the State unless that person holds a Wildlife Possession Permit issued by the Department under Title 12 Section 12152, or the animal is licensed according to Title 7, Section 3921-B §2. </span></p><p data-dcnode-id="3697"><span data-dcnode-id="3698" instrument_node="">Wolf Hybrid is defined as a mammal that is the off spring of a species of wild canid or wild canid hybrid. ?Wolf hybrid? includes a mammal that is represented by its owner or keeper to be a cross between a domestic dog (Canis familiaris) and a wild canid or wild canid hybrid, and includes without limitation, any mammal that is represented by its owner or keeper to be a wolf hybrid, coyote hybrid, coy dog or any other wild canid hybrid.</span></p><p data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">?</span></p><p data-dcnode-id="3693"><span data-dcnode-id="3694" instrument_node="">7.08 Conditions and Restrictions</span></p><p data-dcnode-id="3691"><span data-dcnode-id="3692" instrument_node="">1. Species with Special Needs or Considerations: The Commissioner may set special conditions on a permit to mitigate potential impacts on, or from, wildlife having special needs and to ensure the welfare of such wildlife. The Commissioner may seek the advise of experts on the species involved to provide for such special needs and to ensure the welfare of the wildlife.</span></p><p data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">2. Federal Permit Requirements: If applicable, proof must be furnished of a valid federal wildlife possession or importation permit, and compliance with the Convention on International Trade in Endangered Species (CITES).</span></p><p data-dcnode-id="3687"><span data-dcnode-id="3688" instrument_node="">3. Display of Permit: All permits issued for the possession of wildlife shall be made available for inspection by Department representatives and animal welfare agents.</span></p><p data-dcnode-id="3685"><span data-dcnode-id="3686" instrument_node="">4. Security and Shelter: Wildlife held in captivity must be contained, controlled, and sheltered in such a way as to protect it, and to protect property of others and the public health and safety.</span></p><p data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">5. Emergency Plan: A written Emergency Plan shall be submitted with the application for use in the event of occurrences such as: (1) severe damage to enclosures due to fire, wind, or floods; (2) animals attacking and /or injuring humans, other animals or property; and (3) the escape of any animal in captivity. The plan shall include an updated list of dangerous wildlife in captivity, the availability of capture equipment and weapons with specific instructions as to the precise circumstances under which dangerous wildlife are to be destroyed. Such plan shall be available and produced at the request of a law enforcement officer, firefighter, Department representative or Animal Control Officer. Local police or the local game warden shall be immediately notified of the escape of a dangerous animal.</span></p><p data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">6. Costs of recovery or handling. The permittee shall be responsible for all costs incurred by the State resulting from the escape or release of wildlife, or for the necessary confiscation of wildlife from the premises of the permittee, or as the result of the revocation of the possession permit. The Commissioner may require the posting of a bond or other financial security for this purpose.</span></p><p data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">7. Health and Comfort: (a) No animal shall be chained or otherwise tethered to a stake , post, tree, building or any other anchorage at any time except for training or other controlled activities, for medical treatment or grooming of such animals or as otherwise provided herein. (b) All animals held in outdoor enclosures shall be provided with adequate shelter from inclement weather and direct sunlight. Each cage or enclosure shall have shelter sufficient to simultaneously protect all animals contained therein. © All animals shall be provided with quarters that maintain a temperature meeting the biological needs of the animal. (d) Handling of animals shall be done as expeditiously and carefully as possible, in such a way as to avoid unnecessary discomfort, behavioral stress, or physical harm to the animal.. All wildlife shall be provided with appropriate veterinary care to include care for injuries and for the control of contagious, parasitic, and nutritional diseases.</span></p><p data-dcnode-id="3677"><span data-dcnode-id="3678" instrument_node="">8. Sanitation: All cages and enclosures shall be kept in a sanitary condition. Regular cleaning schedules shall be maintained. Trash, spilled food and fecal materials shall be removed at least once each day and more often if necessary. Cages may not be stacked in such a way that excrement may enter lower enclosures.</span></p><p data-dcnode-id="3675"><span data-dcnode-id="3676" instrument_node="">9. Food and Water: a.) An adequate supply of potable water shall be available in cages and enclosures for drinking, washing or other purposes necessary to the species being contained. b.) Regular feeding schedules shall be maintained; the rations supplied shall be adequate, nutritious, and so far as possible consistent with the food which is ordinarily eaten by such animals in the wild. Food shall be sufficient to maintain proper strength and healthy appearance. c.) Areas used for the preparation and storage of food shall be sufficiently clean to prevent contamination by pathogens or harmful substances. Meat, fish and fresh fruits and vegetables to be fed to animals shall be properly refrigerated to prevent spoilage. d.) Food for animals shall be stored in such a way as to prevent damage of food from weather, rodents, insects and animals.</span></p><p data-dcnode-id="3673"><span data-dcnode-id="3674" instrument_node="">10. Cage Requirements</span></p><p data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">a. The following are minimum caging requirements for animals kept in captivity. Any permittee possessing or wishing to obtain an animal not included below shall contact the Commissioner of the Department who will determine an appropriate cage size and holding requirements. The permittee shall comply with all such requirements set by the Commissioner. </span></p><p data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">b. All cages or enclosures shall be constructed in compliance with this Chapter.</span></p><p data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">?</span></p><p data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">Carnivores and certain omnivores with similar requirements</span></p><p data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">?</span></p><p data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">17. Foxes, jackals, and others of similar size and habits</span></p><p data-dcnode-id="3659"><span data-dcnode-id="3660" instrument_node="">a. Number or size - 1 pair.</span></p><p data-dcnode-id="3657"><span data-dcnode-id="3658" instrument_node="">b. Cage size - 8? long x 4? wide x 6? high.</span></p><p data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">c. Accessories - 1 shelf 18" wide x 3? high x 4? long is required. A den or nest box area is also required.</span></p></blockquote><p data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">Citation: 9-137 CMR CH. 7 § 7.00, 7.08</span></p><p data-dcnode-id="3650"><br data-dcnode-id="3651"></p><p data-dcnode-id="3647"><span class="wz-bold" data-dcnode-id="3648" style="color: rgb(22, 114, 219);"><span data-dcnode-id="3649" instrument_node="">MARYLAND</span></span></p><p data-dcnode-id="3641"><span class="wz-bold" data-dcnode-id="3645"><span data-dcnode-id="3646" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">To put it simply:</span></span><span data-dcnode-id="3642" instrument_node=""> no, foxes are not legal in Maryland.</span></p><p data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="3614"><p data-dcnode-id="3637"><span data-dcnode-id="3638" instrument_node="">§ 10-621. Import, offer, or transfer of dangerous animal</span></p><p data-dcnode-id="3635"><span data-dcnode-id="3636" instrument_node="">?</span></p><p data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">Prohibited</span></p><p data-dcnode-id="3631"><span data-dcnode-id="3632" instrument_node="">(b) A person may not import into the State, offer for sale, trade, barter, possess, breed, or exchange a live:</span></p><p data-dcnode-id="3629"><span data-dcnode-id="3630" instrument_node="">(1) fox, skunk, raccoon, or bear;</span></p><p data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">(2) caiman, alligator, or crocodile;</span></p><p data-dcnode-id="3625"><span data-dcnode-id="3626" instrument_node="">(3) member of the cat family other than the domestic cat;</span></p><p data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">(4) hybrid of a member of the cat family and a domestic cat if the hybrid weighs over 30 pounds;</span></p><p data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">(5) member of the dog family other than the domestic dog;</span></p><p data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">(6) hybrid of a member of the dog family and a domestic dog;</span></p><p data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">(7) nonhuman primate, including a lemur, monkey, chimpanzee, gorilla, orangutan, marmoset, loris, or tamarin; or</span></p><p data-dcnode-id="3615"><span data-dcnode-id="3616" instrument_node="">(8) poisonous snake in the family groups of Hydrophidae, Elapidae, Viperidae, or Crotolidae.</span></p></blockquote><p data-dcnode-id="3612"><span data-dcnode-id="3613" instrument_node="">Citation: MD CRIM LAW § 10-621</span></p><p data-dcnode-id="3610"><br data-dcnode-id="3611"></p><p data-dcnode-id="3607"><span class="wz-bold" data-dcnode-id="3608" style="color: rgb(22, 114, 219);"><span data-dcnode-id="3609" instrument_node="">MASSACHUSETTS</span></span></p><p data-dcnode-id="3601"><span class="wz-bold" data-dcnode-id="3605"><span data-dcnode-id="3606" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="3603"><span data-dcnode-id="3604" instrument_node="">To put it simply:</span></span><span data-dcnode-id="3602" instrument_node=""> no, foxes are not legal in Massachusetts.</span></p><p data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="3596"><li data-dcnode-id="3597"><span data-dcnode-id="3598" instrument_node="">Licenses are not issued to allow the keeping of wild animals as pets.</span></li></ul><p data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="3556"><p data-dcnode-id="3589"><span data-dcnode-id="3593" instrument_node="">(3) </span><span class="wz-underline" data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">Licenses.</span></span><span data-dcnode-id="3590" instrument_node=""> Unless otherwise provided by law, it is unlawful for any person to possess maintain, propagate or cultivate, sell or offer to sell any animal without having a valid license issued to them by the Director in one of five classes.</span></p><p data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">(a) A class 4 propagator?s license authorizes a person to possess, maintain, propagate, buy, sell or otherwise lawfully dispose of specified birds, mammals, reptiles or amphibians. A Class 4 license may, in addition and as a condition of the license, allow the liberation and recapture of bobwhite quail or ring-necked pheasant for the sole purpose of training dogs.</span></p><p data-dcnode-id="3585"><span data-dcnode-id="3586" instrument_node="">(b) A class 5 public stocking license (including a Class 5 special propagator?s license) authorizes any individual, club or association to possess, maintain and propagate birds or mammals for the sole purpose of liberation into covers open for public hunting. A Class 5 public stocking license may be issued as a Letter Permit in accordance with M.G.L. c. 131, § 4(2) and 321 CMR 2.02 but shall otherwise conform to the requirements of 321 CMR 2.12.</span></p><p data-dcnode-id="3583"><span data-dcnode-id="3584" instrument_node="">© A class 6 dealer?s license authorizes a person to possess or maintain for food purposes, and to purchase, sell, offer to sell, barter, offer to barter, or conduct commercial transactions of any nature, fish, birds, or mammals which have been lawfully imported into Massachusetts or lawfully propagated within Massachusetts, provided that dealing in fish shall be in accordance with 321 CMR 4.09. A class 6 dealer?s license issued for purposes other than human food shall be issued at the discretion of the director, and the director shall not issue such permit unless, in his discretion, such permit is in the public interest and is not detrimental to the fish and wildlife resources of Massachusetts or the populations of the fish and wildlife proposed for the license, wherever found. When a fish, bird, or mammal proposed for licensing closely resembles a fish, bird, or mammal not so proposed, or for which a license may not be issued, or which derives from a source not authorized pursuant to 321 CMR 2.12(16)(a), the director may consider such similarity of appearance as constituting an adverse or detrimental effect on such protected or non-licensed fish, birds, and mammals, or on the enforcement of laws relating to the conservation and management of the same, and may deny the license on such basis.</span></p><p data-dcnode-id="3581"><span data-dcnode-id="3582" instrument_node="">(d) A class 7 possessor?s license authorizes a person to possess and maintain, but not to propagate, sell or barter, a non-exempt bird or mammal in accordance with 321 CMR 2.12(10)(l); or a non-exempt mammal for the sole purpose of training dogs, when such mammal was lawfully possessed and held under a Class 7 license prior to December 31, 1994; or for the possession of a non-exempt reptile or amphibian. After December 31, 1994, no initial Class 7 license may be issued for the purpose of possessing a non-exempt mammal for the purpose of training dogs. A Class 7 license may be issued as a Letter Permit in accordance with M.G.L. c. 131, § 4(2) and 321 CMR 2.02 but shall otherwise conform to the requirements of 321 CMR 2.12.</span></p><p data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">(e) A dog training license (including a Class 8 quail license) authorizes a person to possess no more than 25 quail, six ring-necked pheasant, and two chukar partridge to liberate and recapture for the sole purpose of training dogs.</span></p><p data-dcnode-id="3577"><span data-dcnode-id="3578" instrument_node="">?</span></p><p data-dcnode-id="3572"><span data-dcnode-id="3576" instrument_node="">(9) </span><span class="wz-underline" data-dcnode-id="3574"><span data-dcnode-id="3575" instrument_node="">Denials.</span></span><span data-dcnode-id="3573" instrument_node=""> Applications for a license provided for in 321 CMR 2.12(3), including both initial applications and renewals, shall, unless otherwise provided, be denied when:</span></p><p data-dcnode-id="3570"><span data-dcnode-id="3571" instrument_node="">(a) the application is for a license to possess, maintain, propagate or cultivate animals as pets except as otherwise provided for in 321 CMR 2.12(10)(h) and (10)(i);</span></p><p data-dcnode-id="3568"><span data-dcnode-id="3569" instrument_node="">?</span></p><p data-dcnode-id="3563"><span data-dcnode-id="3567" instrument_node="">(10) </span><span class="wz-underline" data-dcnode-id="3565"><span data-dcnode-id="3566" instrument_node="">Issuance.</span></span><span data-dcnode-id="3564" instrument_node=""> A Class 4 license may be issued only to applicants who substantially document that the intended possession, maintenance or propagation is for:</span></p><p data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">?</span></p><p data-dcnode-id="3559"><span data-dcnode-id="3560" instrument_node="">(h) the aviculture of non-exempt birds, including federally threatened and endangered species as authorized by the United States Fish and Wildlife Service, that are documented to be the product of captive propagation or that were legally held prior to the approval of 321 CMR 2.12 and are members of the following taxonomic groups:Ciconiiformes (e.g., flamingo), Anseriformes (e.g., ducks, geese, swans), Galliformes (e.g., pheasant, quail, grouse),Gruiformes (e.g., cranes, coots), Columbiformes (e.g., pigeons, doves), Psittaciformes (e.g., parrots), Piciformes(e.g., toucans), Passeriformes (e.g., songbirds). The foregoing shall not include the Wild Turkey (Meleagris gallopavo) or the following potential pest species: Pink Starling (Sturnus roseus), Red-billed Dioch including the Black-fronted and Sudan Diochs (Quelea quelea), and Red-whiskered Bulbul (Pycnonotus jocosus).</span></p><p data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">(i) the propagation of non-exempt reptiles, including federally endangered and threatened species as authorized by the United States Fish and Wildlife Service, that are documented to be the product of captive propagation or that were lawfully held prior to the approval of 321 CMR 2.12 on May 8, 1986, and are members of the taxonomic groups which include turtles and lizards, except venomous lizards in the genus Heloderma; </span></p></blockquote><p data-dcnode-id="3554"><span data-dcnode-id="3555" instrument_node="">Citation: MASS. REGS. CODE&nbsp;tit. 321, §2.12</span></p><p data-dcnode-id="3552"><br data-dcnode-id="3553"></p><p data-dcnode-id="3549"><span class="wz-bold" data-dcnode-id="3550" style="color: rgb(22, 114, 219);"><span data-dcnode-id="3551" instrument_node="">MICHIGAN</span></span></p><p data-dcnode-id="3543"><span class="wz-bold" data-dcnode-id="3547"><span data-dcnode-id="3548" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">To put it simply: </span></span><span data-dcnode-id="3544" instrument_node="">yes, foxes are legal in Michigan</span></p><p data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="3525"><li data-dcnode-id="3539"><span data-dcnode-id="3540" instrument_node="">A permit to hold wildlife in captivity is now required for all red, silver and cross foxes (Vulpes vulpes), as well as any color phases that ?closely resemble? said colors.</span></li><li data-dcnode-id="3537"><span data-dcnode-id="3538" instrument_node="">?Closely resemble? most likely includes: pearl, pearl cross, calico, et cetera. The DNR should be contacted in regards to permits.</span></li><li data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node="">There is no grandfather, meaning anyone who owns a red, silver, cross or closely resembling color must apply for a permit.</span></li><li data-dcnode-id="3533"><span data-dcnode-id="3534" instrument_node="">Excluding red, silver and cross foxes (Vulpes vulpes), all other colors&nbsp;are considered non-native and are recognized as domestic animals.</span></li><li data-dcnode-id="3531"><span data-dcnode-id="3532" instrument_node="">The only other native fox that requires a permit to hold wildlife in captivity is the gray fox (Urocyon cinereoargenteus).</span></li><li data-dcnode-id="3526"><span data-dcnode-id="3530" instrument_node="">Foxes that are not native to the state are considered exotic and do not require a permit to hold wildlife in captivity. This includes arctic foxes (Vulpes lagopus), swift foxes (Vulpes velox), kit foxes (</span><span class="wz-italic" data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">Vulpes macrotis</span></span><span data-dcnode-id="3527" instrument_node="">), fennec foxes (Vulpes zerda), bat-eared foxes (Otocyon megalotis), et cetera.</span></li></ul><p data-dcnode-id="3523"><span data-dcnode-id="3524" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="3424"><p data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">THE CAPTIVE WILD ANIMAL ORDER</span></p><p data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">Under the authority of section 42710, Act 451 of the Public Acts of 1994, as amended, being section 324.42710 of the Michigan Compiled Laws, the Director of the Department of Natural Resources ordered that effective March 11, 2005, the following regulations shall read as follows:</span></p><p data-dcnode-id="3517"><span data-dcnode-id="3518" instrument_node="">20.1 Short title.</span></p><p data-dcnode-id="3515"><span data-dcnode-id="3516" instrument_node="">Sec. 20.1. This order shall be known and may be cited as ?the captive wild animal order.?</span></p><p data-dcnode-id="3513"><span data-dcnode-id="3514" instrument_node="">20.2 Meanings of words and phrases.</span></p><p data-dcnode-id="3511"><span data-dcnode-id="3512" instrument_node="">Sec. 20.2. For the purposes of this order, words and phrases defined in part 427, breeders and dealers, of the natural resources and environmental protection act, Act No. 451 of the Public Acts of 1994, being sections 324.42701 to 324.42714 of the Michigan Compiled Laws, shall have the meanings ascribed to them in those sections. When used in this order, ?permit to hold wildlife in captivity? or ?permit? shall mean a game breeders license.</span></p><p data-dcnode-id="3509"><span data-dcnode-id="3510" instrument_node="">20.3 Permits.</span></p><p data-dcnode-id="3507"><span data-dcnode-id="3508" instrument_node="">Sec. 20.3. (1) Except as provided by section 20.4, only a person who has submitted an application to the wildlife division permit specialist for a permit to hold wildlife in captivity, being form PR 1350, in accordance with the instructions on that form, and who possesses a valid permit to hold wildlife in captivity shall be considered, for the purposes of subsection 42709(2) of part 427, breeders and dealers, of the natural resources and environmental protection act, Act No. 451 of the Public Acts of 1994, being subsection 324.42709(2) of the Michigan Compiled Laws, ?persons holding permits authorizing the possession of the game? or ?licensed game breeders.? A person possessing or desiring to possess migratory birds, such as ducks or geese, shall comply with all federal regulations and permit rules in addition to state of Michigan regulations. This includes the physical marking of waterfowl by removal of the hind toe on the right foot of each bird before it reaches the age of 4 weeks or by other federally approved marking methods.</span></p><p data-dcnode-id="3505"><span data-dcnode-id="3506" instrument_node="">(2) A separate permit to hold wildlife in captivity is required for each separate premises although operated and owned by the same person or entity.</span></p><p data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">(3) Except as otherwise provided by this order, when a permittee secures additional numbers of animals for species already listed on the permit, the permittee shall report the additional animals on the next monthly inventory report, being form PR&nbsp;1350?2, and shall provide the minimum space requirements for the total number of animals of that species.</span></p><p data-dcnode-id="3501"><span data-dcnode-id="3502" instrument_node="">(4) If any information on an approved permit to hold wildlife in captivity is no longer current, an application to amend the permit must be submitted to the wildlife division permit specialist in accordance with the instructions on that form.</span></p><p data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">(5) A permit must specifically list each species held, or to be held. Before a permittee may possess a species not listed on their permit, the permittee must make application to the wildlife division permit specialist and obtain an approved amended permit to hold wildlife in captivity specifically listing the species to be acquired, except that a permittee shall be exempt from the requirement of specifically listing each species of duck held, or to be held, and from the requirement of amending a permit to include each species of duck to be acquired.</span></p><p data-dcnode-id="3497"><span data-dcnode-id="3498" instrument_node="">20.4 Permit requirement exemptions.</span></p><p data-dcnode-id="3495"><span data-dcnode-id="3496" instrument_node="">Sec. 20.4. (1) A person purchasing and removing the following live animals from a licensed premises may possess the animals without a permit provided the person does not propagate or sell the animals and provided the animals are properly identified as prescribed by section 20.9:</span></p><p data-dcnode-id="3493"><span data-dcnode-id="3494" instrument_node="">(a) Pheasants if they are 12 or fewer in number.</span></p><p data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">(b) Quail if they are 12 or fewer in number.</span></p><p data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">© Hungarian partridge if they are 12 or fewer in number.</span></p><p data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">(2) A permit to hold wildlife in captivity is not required for a person to possess pheasants, bobwhite quail, or Hungarian partridge legally acquired for the purpose of release to the wild or personal consumption, provided that a game bird release permit is obtained before, or at the same time as, the birds or their eggs are acquired, and the birds and their eggs are disposed of within 6 months of the date upon which the game bird release permit was issued.</span></p><p data-dcnode-id="3485"><span data-dcnode-id="3486" instrument_node="">(3) A permit to hold wildlife in captivity is not required for a person to possess game birds of the number and species authorized for release on a field dog trial permit issued by the department of natural resources.</span></p><p data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">(4) A permit to hold wildlife in captivity is not required for a person to possess game birds of the number and species authorized by a game bird hunting preserve license issued by the department of natural resources.</span></p><p data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">(5) A permit to hold wildlife in captivity is not required for a person receiving animals or eggs which are being shipped directly out of the state of Michigan.</span></p><p data-dcnode-id="3479"><span data-dcnode-id="3480" instrument_node="">(6) A permit to hold wildlife in captivity is not required for a person to possess raptors of the number and species authorized by a falconry permit issued by the department of natural resources and the United States fish and wildlife service.</span></p><p data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">(7) A permit to hold wildlife in captivity is not required for a person to possess cervidae species as defined by the privately owned cervidae producers marketing act, 2000 PA 190, being MCL 287.951 to 287.969.</span></p><p data-dcnode-id="3475"><span data-dcnode-id="3476" instrument_node="">20.5 Enclosures and sanitation; mute swan requirements.</span></p><p data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">Sec. 20.5. (1) Except as provided by subsection (2), animals held in captivity shall be confined to the licensed premises at all times. Animals shall not be chained or otherwise tethered to stakes, posts, trees, buildings, or other anchorage. Each animal shall be provided with an enclosure which meets the requirements of section 20.6, and shall be provided with rainproof dens, nest boxes, shelters, perches, and bedding as required for the comfort of the species held in captivity and to protect them against inclement weather or extreme heat. Animals in captivity shall be handled in a sanitary and humane manner and kept free as far as practicable from parasites, sickness, or disease. Permittees shall provide an enclosure of such strength and type of construction that it is impossible for the animals to escape, and shall keep all fences and enclosures properly repaired.</span></p><p data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">(2) A person may transport an animal held under permit in a temporary cage or other suitable means of confinement directly to and from a facility, for the following reasons only:</span></p><p data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">(a) Veterinary treatment of the animal.</span></p><p data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">(b) Sale, or transfer of ownership of the animal.</span></p><p data-dcnode-id="3465"><span data-dcnode-id="3466" instrument_node="">© Exhibition of mammals to the public, provided a United States department of agriculture exhibition license, specifically authorizing this activity, is possessed.</span></p><p data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">(d) Use of fox or raccoons in department authorized field dog trials, provided the fox or raccoons are not dragged, led on a leash, submerged in water, or allowed to come into contact with dogs.</span></p><p data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node="">(3) Mute swans possessed under permit and hatched on or after August 15, 1993, shall have 1 wing pinioned within 5 days of hatching.</span></p><p data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">(4) Mute swans possessed under permit and hatched prior to August 15, 1993, shall be marked with a numbered metal leg band supplied by the department. Records of band numbers, birds banded, birds sold or transferred to another party, and other information shall be submitted to the department according to instructions and on forms supplied by the department.</span></p><p data-dcnode-id="3457"><span data-dcnode-id="3458" instrument_node="">20.6 Enclosure size and amenities, requirements.</span></p><p data-dcnode-id="3455"><span data-dcnode-id="3456" instrument_node="">Sec. 20.6. The minimum enclosure size and required amenities for the species designated in this section shall be as follows, except that newborn mammals may remain with their parents until weaned:</span></p><p data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">Enclosure size; badger, bobcat, fox, and raccoon.</span></p><p data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">(1) Badger, bobcat, fox, or raccoon:</span></p><p data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node="">(a) Single animal: 8 feet long by 6 feet wide by 6 feet high.</span></p><p data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">(b) For each additional animal, increase horizontal cage size by 24 square feet.</span></p><p data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">© Clawing logs and a den site 2 feet by 2 feet by 2 feet high required for each animal.</span></p><p data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">(d) A climbing tree with 3 or more 4-inch diameter branches shall be available for each raccoon or bobcat. A 14-inch by 36-inch protected shelf area shall be provided for each animal. Bobcat or raccoon platforms shall be at least 3 feet above the floor; fox and badger platforms shall be 1 foot above the floor.</span></p><p data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">?</span></p><p data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">SPECIES COVERED</span></p><p data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">A Permit to Hold Wildlife in Captivity is required to possess, propagate, sell, transport, or make any other commercial or personal use of live animals defined as game or protected in Michigan. In addition, a Permit to Hold Wildlife in Captivity is&nbsp;required for the possession of live animals whichclosely resemble&nbsp;game or protected species and can reasonably be&nbsp;confused with game or protected species as determined by the Department.&nbsp;</span></p><p data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">A Permit to Hold Wildlife in Captivity is required for the possession of the following game and protected animals: badger, beaver, bobcat, bobwhite quail, brant, common moorhen, coot, coyote, crow, fisher, hare, Hungarian partridge, mink, muskrat, opossum, otter, rabbit, raccoon, skunk, snipe, sora rail, squirrel, weasel, wild turkey, woodchuck, woodcock, Virginia rail, and all other native wild species of birds not defined as game.</span></p><p data-dcnode-id="3433"><span data-dcnode-id="3434" instrument_node="">A Permit to Hold Wildlife in Captivity is also required for the possession of the species listed within the following groups: ducks (all North American species except properly marked mallards), fox (red, gray, and silver), geese (all North American species), Grouse (ruffed and sharp-tailed), pheasants (ring-necked, Sichuan, and look-a-likes from the genus Phasianus per&nbsp;Types of Pheasants Regulated), swans (mute and tundra).</span></p><p data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">?</span></p><p data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node="">324.43101 Foxes in captivity as domestic animals; protection; construction of part.</span></p><p data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">Sec. 43101.</span></p><p data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">Silver, silver-black, black, and cross foxes, which of their nature, in the absence of efforts for their domestication, were known as wild, which are brought into or born in captivity upon a farm or ranch for the purpose of cultivating or pelting their furs, together with their offspring and increase, are domestic animals for the purpose of any statute or law relating generally to domestic animals, other than dogs and cats or other pets, or relating to farming or to animal husbandry or to the encouragement of agriculture, unless any such statute or law is impossible to apply to such fur-bearing animals. Such fur-bearing animals, together with their offspring and increase, are the subjects of ownership, lien, and all other property rights, in the same manner as purely domestic animals, in whatever situation, location, or condition the fur-bearing animals may be, and regardless of whether they remain in or escape from captivity. Such fur-bearing animals shall receive the same protection of law as, and in the same way and to the same extent are the subject of trespass or larceny as, other personal property. This part shall not be construed to include silver, silver-black, black, and cross foxes within the definition of livestock, or give any person any right to recovery for damage or destruction of the animal under the dog law of 1919, Act No. 339 of the Public Acts of 1919, being sections 287.261 to 287.290 of the Michigan Compiled Laws.</span></p></blockquote><p data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">Additional:</span></p><blockquote data-dcnode-id="3377"><p data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">Dear Mr. Creagh,</span></p><p data-dcnode-id="3418"><span data-dcnode-id="3419" instrument_node="">About two and a half years ago, I emailed the DNR?s permit specialist, Casey Reitz, inquiring about nonnative foxes in the state. At the time, she told me that silver foxes were not native, and did not require a permit to hold wildlife in captivity. I have a copy of this email.</span></p><p data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">However, I just noticed that the permit to hold wildlife in captivity has been updated on 3/12/14, and it now included silver foxes.</span></p><p data-dcnode-id="3414"><span data-dcnode-id="3415" instrument_node="">And so, my question is this: are silver foxes that were purchased before 2013/2014/the updated circular exempt from this new change and grandfathered in? Because a permit was not required by law until now.</span></p><p data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">I?m emailing you about this matter instead of Casey Reitz, since you are the Director and I would prefer to have word from you.</span></p><p data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">Thank you,</span></p><p data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node="">J.P.</span></p><p data-dcnode-id="3406"><span data-dcnode-id="3407" instrument_node="">?</span></p><p data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">Hi J.P.,</span></p><p data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">Thank you for contacting the Michigan Department of Natural Resources Executive Division.&nbsp; Your email was sent to the Wildlife Division for a response.&nbsp; In the attached section of the Natural Resources and Environmental Protection Act 451 of 1994, it defines which animals are considered to be game species in Michigan.&nbsp; Regarding fox, the language simply says ?fox? and does not mention color phases. Statute does not specify which species of fox are regulated.&nbsp;&nbsp;If the fox looks like a native fox then it needs a permit. If it is a species that could be closely confused with a native species, then it needs a permit.</span></p><p data-dcnode-id="3400"><span data-dcnode-id="3401" instrument_node="">Silver fox is a naturally occurring color phase of the native red fox. Laws were enacted to prevent people from taking wildlife out of the wild to keep them in private ownership for varying reasons. Over time selective breeding has created, ?designer foxes.? Many of these new phases do not look like native foxes. What we are attempting to do now is to make practical sense out of this changing situation. Therefore, we are handling privately-owned foxes that look like their wild counterparts in accordance with the original intent of the law. Fox phases that do not look like wild foxes are not treated the same as phases that look wild because they do not occur naturally in the wild.</span></p><p data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">Even though silver fox are required to have a permit to hold wildlife in captivity if being kept as a pet they are however exempt by law from the requirement if they are used for fur farming.</span></p><p data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">Your specific question is&nbsp;?are silver foxes that were purchased before 2013/2014/the updated circular exempt from this new change and grandfathered in? Because a permit was not required by law until now.?&nbsp;Based on what I outlined above, you would not be exempt from the change and will need to apply for a permit. The application and related information is attached for your convenience.</span></p><p data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">We apologize for the confusion this may have caused.</span></p><p data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">&nbsp;Sincerely,&nbsp;</span></p><p data-dcnode-id="3390"><span data-dcnode-id="3391" instrument_node="">&nbsp;Shannon J. Hanna</span></p><p data-dcnode-id="3388"><span data-dcnode-id="3389" instrument_node="">Policy &amp; Regulations Unit Mgr</span></p><p data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">DNR, Wildlife Division</span></p><p data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">PO BOX 30444</span></p><p data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node="">Lansing, MI 48909-3744</span></p><p data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">517-284-6188</span></p><p data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">hannas@michigan.gov</span></p></blockquote><p data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">Citation:&nbsp;THE CAPTIVE WILD ANIMAL ORDER; PERMITS TO HOLD WILDLIFE IN CAPTIVITY; MI ST&nbsp;324.43101</span></p><p data-dcnode-id="3373"><br data-dcnode-id="3374"></p><p data-dcnode-id="3370"><span class="wz-bold" data-dcnode-id="3371" style="color: rgb(22, 114, 219);"><span data-dcnode-id="3372" instrument_node="">MINNESOTA</span></span></p><p data-dcnode-id="3364"><span class="wz-bold" data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node=""> T</span></span><span class="wz-bold" data-dcnode-id="3366"><span data-dcnode-id="3367" instrument_node="">o put it simply:</span></span><span data-dcnode-id="3365" instrument_node=""> no, foxes are not legal in Minnesota. Native foxes are illegal. Non-native foxes are legal, but as of January 2018, no one is known to have been issued a pet permit for a non-native fox.&nbsp;</span></p><p data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="3355"><li data-dcnode-id="3360"><span data-dcnode-id="3361" instrument_node="">Red foxes (Vulpes vulpes) and gray foxes (Urocyon cinereoargenteus) are protected wild animals in the state of Minnesota. Protected wild animals may not be possessed without a license, and there are no licenses for pet purposes, hobby purposes, or personal possession.</span></li><li data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">The only license offered by the DNR is the Game and Fur Farm license, which is a commercial license. With this license, the licensee must propagate the animals and make a profit/have a legitimate business. According to statutory law,&nbsp;the license will only be granted ?if the commissioner finds the application is made in good faith with intention to actually carry on the business described in the application??</span></li><li data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">However, it might be possible to own an exotic, nonnative fox, such as the arctic fox (Vulpes lagopus), swift fox (Vulpes velox) or fennec fox (Vulpes zerda).&nbsp;</span></li></ul><p data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="3320"><p data-dcnode-id="3351"><span data-dcnode-id="3352" instrument_node="">Chapter 97A. Game and Fish</span></p><p data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">?</span></p><p data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">97A.015 DEFINITIONS.</span></p><p data-dcnode-id="3345"><span data-dcnode-id="3346" instrument_node="">?</span></p><p data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">Subd. 37. Predator. ?Predator? means a wolf, coyote, fox, lynx, or bobcat.</span></p><p data-dcnode-id="3341"><span data-dcnode-id="3342" instrument_node="">?</span></p><p data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">Subd. 39. Protected wild animals. ?Protected wild animals? are the following wild animals: big game, small game, game fish, rough fish, minnows, leeches, alewives, ciscoes, chubs, and lake whitefish, and the subfamily Coregoninae, rainbow smelt, frogs, turtles, clams, mussels, gray wolf, mourning doves, and wild animals that are protected by a restriction in the time or manner of taking, other than a restrictionin the use of artificial lights, poison, or motor vehicles.</span></p><p data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">?</span></p><p data-dcnode-id="3335"><span data-dcnode-id="3336" instrument_node="">Subd. 45. Small game. ?Small game? means game birds, gray squirrel, fox squirrel, cottontail rabbit, snowshoe hare, jack rabbit, raccoon, lynx, bobcat, wolf, red fox and gray fox, fisher, pine marten, opossum, badger, cougar, wolverine, muskrat, mink, otter, and beaver.</span></p><p data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">?</span></p><p data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">97A.501 WILD ANIMALS: GENERAL RESTRICTIONS.</span></p><p data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">Subdivision 1. General restrictions. A person may not take, buy, sell, transport, or possess a protected wild animal unless allowed by the game and fish laws. The ownership of all wild animals is in the state, unless the wild animal has been lawfully acquired under the game and fish laws. The ownership of a wild animal that is lawfully acquired reverts to the state if a law relating to sale, transportation, or possession of the wild animal is violated.</span></p><p data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">Subd. 2. Endangered species. A person may not take, import, transport, or sell an endangered species of wild animal, or sell, or possess with intent to sell an article made from the parts of a wild animal, except as provided in section 84.0895.</span></p><p data-dcnode-id="3325"><span data-dcnode-id="3326" instrument_node="">Subd. 3. Contraceptive chemicals. (a) A person may not administer contraceptive chemicals to noncaptive wild animals without a permit issued by the commissioner. (b) The commissioner shall adopt rules establishing standards and guidelines for the administration of contraceptive chemicals to noncaptive wild animals. The rules may specify chemical delivery methods and devices and monitoring requirements.</span></p><p data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">?</span></p><p data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node="">97A.405 LICENSE REQUIREMENTS. Subdivision 1. Protected wild animals. Unless allowed under the game and fish laws, a person may not take, buy, sell, transport, or possess protected wild animals of this state without a license.</span></p></blockquote><p data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node="">Citation:&nbsp;MN ST&nbsp;97A.011-552</span></p></div><span data-dcnode-id="3316" instrument_node="">

</span><div class="webs-bin" data-dcnode-id="1553" id="webs-bin-5acf9fe4bb33950001d926d5"><span data-dcnode-id="3309" instrument_node="">
</span><div class="webs-bin-wrap" data-dcnode-id="1555"><span data-dcnode-id="3308" instrument_node="">
</span><div class="webs-container webs-module-text" data-dcnode-id="1557"><span data-dcnode-id="3307" instrument_node="">
</span><div class="webs-text" data-dcnode-id="1559"><div data-dcnode-id="3179" id="webs-bin-570715c70cf28c869daeba11"><div data-dcnode-id="3180"><div data-dcnode-id="3181"><p data-dcnode-id="3304"><span class="wz-bold" data-dcnode-id="3305" style="color: rgb(22, 114, 219);"><span data-dcnode-id="3306" instrument_node="">MISSISSIPPI</span></span></p><p data-dcnode-id="3298"><span class="wz-bold" data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node=""> </span></span><span class="wz-bold" data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">To put it simply: </span></span><span data-dcnode-id="3299" instrument_node="">yes, foxes are legal in Mississippi. However, depending on who you appeal to getting a permit may prove to be very difficult. They have been more strict lately about issuing permits, telling most people it is illegal. You almost definitely should have a USDA license. Some people reported officials state only Silvers, Fennecs, Pales, and Arctics are allowed.</span></p><p data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">Note:</span></p><ul class="style-circle" data-dcnode-id="3293"><li data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">An entry permit is required to import a fox into Mississippi.</span></li></ul><p data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">The legal jargon:</span></p><blockquote data-dcnode-id="3186"><p data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">§ 49-8-5. Classification of inherently dangerous animals</span></p><p data-dcnode-id="3287"><span data-dcnode-id="3288" instrument_node="">The following wild animals are classed as animals inherently dangerous to humans:</span></p><p data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">(a) Order Primates:</span></p><p data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">(i) Family Pongidae (gibbons, orangutan, chimpanzees, siamangs and gorillas) ? all species;</span></p><p data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">(ii) Family Cercopithecidae:</span></p><p data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">A. Genus Macaca (macaques) ? all species;</span></p><p data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">B. Genus Papio (mandrills, drills and baboons) ? all species;</span></p><p data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">C. Theropithecus Gelada (Gelada baboon);</span></p><p data-dcnode-id="3273"><span data-dcnode-id="3274" instrument_node="">(b) Order Carnivora:</span></p><p data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">(i) Family Canidae:</span></p><p data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node="">A. Genus Canis (wolves, jackals and dingos; all species, including crosses between wolves and domestic animals);</span></p><p data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">B. Chrysocyon brachyurus (maned wolf);</span></p><p data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">C. Cuon alpinus (red dog);</span></p><p data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">D. Lycaon pictus (African hunting dog);</span></p><p data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">(ii) Family Ursidae (bears) ? all species;</span></p><p data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">(iii) Family Mustelidae ? Gulo gulo (wolverine);</span></p><p data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">(iv) Family Hyaenidae (hyenas) ? all species;</span></p><p data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">(v) Family Felidae:</span></p><p data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">A. Genus Leo or Panthera or Neofelis (lions, tigers, jaguars and leopards) ? all species;</span></p><p data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">B. Unica unica (snow leopard);</span></p><p data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node="">C. Acinonyx jubatus (cheetah);</span></p><p data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">D. Felis concolor (cougar) ? all subspecies;</span></p><p data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">© Order Proboscidae: Family Elephantidae (elephants) ? all species;</span></p><p data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">(d) Order Perissodactyla: Family Rhinocerotidae (rhinoceroses) ? all species;</span></p><p data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">(e) Order Artiodactyla:</span></p><p data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">(ii) Family Hippopotamidae ? Hippopotamus amphibius (hippopotamus);</span></p><p data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">(ii) Family Bovidae: Syncerus caffer (African buffalo).</span></p><p data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">§ 49-8-7. Prohibited possession</span></p><p data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">(1)(a) It is unlawful for a person to import, transfer, sell, purchase or possess any wild animal classified inherently dangerous by law or regulation unless that person holds a permit under paragraph (b) or is exempted under paragraph ©.</span></p><p data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">(b)(i) Any person who possesses a wild animal on May 1, 1997, may receive a fee-exempt temporary permit for that animal if the person applies by July 1, 1997. The temporary permit shall be valid until such time as the department notifies the person of the adoption of the regulations for wild animals and of the date the person must apply for an annual permit. After notification, the person shall apply for an annual permit.</span></p><p data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">(ii) A person must obtain a permit before that person takes possession of a wild animal. The applicant must comply with all the requirements of this chapter and the regulations promulgated by the commission to obtain the permit. Prior to the issuance of a permit, the applicant must provide proof of liability insurance in the amount of One Hundred Thousand Dollars ($100,000.00) for each wild animal up to a maximum of One Million Dollars ($1,000,000.00). An applicant shall have the burden of proving that any wild animals subject to this chapter are or will be imported, transferred, sold, purchased or possessed in compliance with this chapter and regulations.</span></p><p data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">© Public zoos, university research facilities, governmental agencies, transient circuses and rehabilitation and sanctuary facilities may be exempted from having a permit if the exemption is approved by the commission.</span></p><p data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">(d) Any permit issued under this chapter shall be valid for one (1) year and only for the species specified. A permit is required for each wild animal possessed. A permit for a female wild animal shall cover her progeny only while her progeny are physically dependant upon her or until her progeny are three (3) months old, whichever period is longer.</span></p><p data-dcnode-id="3223"><span data-dcnode-id="3224" instrument_node="">(2)(a) It is unlawful for any person to sell, transfer, deliver or give a wild animal classified as inherently dangerous to any other person unless the other person holds a permit for the wild animal or is exempt from holding a permit.</span></p><p data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">(b) Owners of unpermitted wild animals who do not qualify for a permit to possess the wild animal shall dispose of the wild animal according to law or regulation within thirty (30) days of notification by the department. Each day of possession of the unpermitted wild animal after the thirty-day period constitutes a separate violation.</span></p><p data-dcnode-id="3219"><span data-dcnode-id="3220" instrument_node="">?</span></p><p data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">General</span></p><p data-dcnode-id="3215"><span data-dcnode-id="3216" instrument_node="">1. Health Certificate Requirements - Health Certificates are required on all animals except livestock consigned to Federal approved slaughter establishments.</span></p><p data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">2. Relation to Federal Requirements - Livestock imports are to meet Mississippi and Federal interstate requirements, a health certificate, permit and/or waybill shall accompany the shipment as stipulated. No animal, including poultry, exotic or pet birds, or any species affected with, or recently exposed to any infectious, contagious or communicable disease, or that originated from a quarantined herd or area, shall be shipped or in any manner transported or moved into the State of Mississippi, except those animals affected with such diseases which are approved for interstate shipment by United States Department of Agriculture, APHIS, Veterinary Services, except for immediate slaughter.</span></p><p data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">3. Permits - A. Requests for permits shall be directed to the Mississippi State Veterinarian.&nbsp;All international imports of animals require prior entry permit.&nbsp;The following information is required to secure the permit:</span></p><ol class="style-text" data-dcnode-id="3202"><li data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">Complete name and mailing addresses of consignor and consignee;</span></li><li data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">Number, breed and sex of animals;</span></li><li data-dcnode-id="3205"><span data
