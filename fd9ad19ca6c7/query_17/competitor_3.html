</span><p data-dcnode-id="3019"><span data-dcnode-id="3030" instrument_node="">Cents Per Mile Now</span><sup class="reference" data-dcnode-id="3027" id="cite_ref-53"><a data-dcnode-id="3028" href="#cite_note-53"><span data-dcnode-id="3029" instrument_node="">[53]</span></a></sup><span data-dcnode-id="3026" instrument_node=""> (1986) advocates classified odometer-mile rates, a type of </span><a data-dcnode-id="3024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Usage-based_insurance" title="Usage-based insurance"><span data-dcnode-id="3025" instrument_node="">usage-based insurance</span></a><span data-dcnode-id="3023" instrument_node="">. After the company's risk factors have been applied, and the customer has accepted the per-mile rate offered, then customers buy prepaid miles of insurance protection as needed, like buying gallons of gasoline (litres of petrol). Insurance automatically ends when the </span><a data-dcnode-id="3021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Odometer" title="Odometer"><span data-dcnode-id="3022" instrument_node="">odometer</span></a><span data-dcnode-id="3020" instrument_node=""> limit (recorded on the car's insurance ID card) is reached, unless more distance is bought. Customers keep track of miles on their own odometer to know when to buy more. The company does no after-the-fact billing of the customer, and the customer doesn't have to estimate a "future annual mileage" figure for the company to obtain a discount. In the event of a traffic stop, an officer could easily verify that the insurance is current, by comparing the figure on the insurance card to that on the odometer.
</span></p><p data-dcnode-id="3014"><span data-dcnode-id="3018" instrument_node="">Critics point out the possibility of cheating the system by </span><a data-dcnode-id="3016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Odometer_fraud" title="Odometer fraud"><span data-dcnode-id="3017" instrument_node="">odometer tampering</span></a><span data-dcnode-id="3015" instrument_node="">. Although the newer electronic odometers are difficult to roll back, they can still be defeated by disconnecting the odometer wires and reconnecting them later. However, as the Cents Per Mile Now website points out:
</span></p><span data-dcnode-id="3013" instrument_node="">
</span><blockquote data-dcnode-id="3008"><span data-dcnode-id="3012" instrument_node="">
</span><p data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">As a practical matter, resetting odometers requires equipment plus expertise that makes stealing insurance risky and uneconomical. For example, to steal 20,000 miles [32,200&nbsp;km] of continuous protection while paying for only the 2000 in the 35000 to 37000 range on the odometer, the resetting would have to be done at least nine times, to keep the odometer reading within the narrow 2,000-mile [3,200&nbsp;km] covered range. There are also powerful legal deterrents to this way of stealing insurance protection. Odometers have always served as the measuring device for resale value, rental and leasing charges, warranty limits, mechanical breakdown insurance, and cents-per-mile tax deductions or reimbursements for business or government travel. Odometer tampering, detected during claim processing, voids the insurance and, under decades-old state and federal law, is punishable by heavy fines and jail.
</span></p><span data-dcnode-id="3009" instrument_node="">
</span></blockquote><span data-dcnode-id="3007" instrument_node="">
</span><p data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">Under the cents-per-mile system, rewards for driving less are delivered automatically, without the need for administratively cumbersome and costly GPS technology. Uniform per-mile exposure measurement for the first time provides the basis for statistically valid rate classes. Insurer premium income automatically keeps pace with increases or decreases in driving activity, cutting back on resulting insurer demand for rate increases and preventing today's windfalls to insurers, when decreased driving activity lowers costs but not premiums.
</span></p><span data-dcnode-id="3004" instrument_node="">
</span><h4 data-dcnode-id="2994"><span class="mw-headline" data-dcnode-id="3002" id="GPS-based_system"><span data-dcnode-id="3003" instrument_node="">GPS-based system</span></span><span class="mw-editsection" data-dcnode-id="2995"><span class="mw-editsection-bracket" data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">[</span></span><a data-dcnode-id="2998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D45" title="Edit section: GPS-based system"><span data-dcnode-id="2999" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2993" instrument_node="">
</span><p data-dcnode-id="2955"><span data-dcnode-id="2992" instrument_node="">In 1998, the </span><a data-dcnode-id="2990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Progressive_Corporation" title="Progressive Corporation"><span data-dcnode-id="2991" instrument_node="">Progressive Insurance</span></a><span data-dcnode-id="2989" instrument_node=""> company started a pilot program in Texas, in which drivers received a discount for installing a </span><a data-dcnode-id="2987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_Positioning_System" title="Global Positioning System"><span data-dcnode-id="2988" instrument_node="">GPS</span></a><span data-dcnode-id="2986" instrument_node="">-based device that tracked their driving behavior and reported the results via cellular phone to the company.</span><sup class="reference" data-dcnode-id="2983" id="cite_ref-54"><a data-dcnode-id="2984" href="#cite_note-54"><span data-dcnode-id="2985" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2982" instrument_node="">  The program was discontinued in 2000. In following years many policies (including Progressive) have been trialed and successfully introduced worldwide into what are referred to as </span><a class="mw-redirect" data-dcnode-id="2980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telematic_Insurance" title="Telematic Insurance"><span data-dcnode-id="2981" instrument_node="">Telematic Insurance</span></a><span data-dcnode-id="2979" instrument_node="">. Such 'telematic' policies typically are based on </span><a class="new" data-dcnode-id="2977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBlack-box_insurance%26action%3Dedit%26redlink%3D1" title="Black-box insurance (page does not exist)"><span data-dcnode-id="2978" instrument_node="">black-box insurance</span></a><span data-dcnode-id="2976" instrument_node=""> technology, such devices derive from a stolen vehicle and fleet tracking but are used for insurance purposes. Since 2010 GPS-based and </span><a class="mw-redirect" data-dcnode-id="2974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telematic_Insurance" title="Telematic Insurance"><span data-dcnode-id="2975" instrument_node="">Telematic Insurance</span></a><span data-dcnode-id="2973" instrument_node=""> systems have become more mainstream in the auto insurance market not just aimed at specialised auto-fleet markets or high value vehicles (with an emphasis on stolen vehicle recovery). Modern GPS-based systems are branded as 'PAYD' </span><a class="mw-redirect" data-dcnode-id="2971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pay_As_You_Drive" title="Pay As You Drive"><span data-dcnode-id="2972" instrument_node="">Pay As You Drive</span></a><span data-dcnode-id="2970" instrument_node=""> insurance policies, 'PHYD' </span><a class="mw-redirect" data-dcnode-id="2968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pay_How_You_Drive" title="Pay How You Drive"><span data-dcnode-id="2969" instrument_node="">Pay How You Drive</span></a><span data-dcnode-id="2967" instrument_node=""> or since 2012 </span><a class="mw-redirect" data-dcnode-id="2965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Smartphone_auto_insurance_policies" title="Smartphone auto insurance policies"><span data-dcnode-id="2966" instrument_node="">Smartphone auto insurance policies</span></a><span data-dcnode-id="2964" instrument_node=""> which utilise smartphones as a GPS sensor, e.g.  
.</span><sup class="reference" data-dcnode-id="2961" id="cite_ref-55"><a data-dcnode-id="2962" href="#cite_note-55"><span data-dcnode-id="2963" instrument_node="">[55]</span></a></sup><span data-dcnode-id="2960" instrument_node=""> A detailed survey of the smartphone as measurement probe for insurance telematics is provided in </span><sup class="reference" data-dcnode-id="2957" id="cite_ref-56"><a data-dcnode-id="2958" href="#cite_note-56"><span data-dcnode-id="2959" instrument_node="">[56]</span></a></sup><span data-dcnode-id="2956" instrument_node="">
</span></p><span data-dcnode-id="2954" instrument_node="">
</span><h4 data-dcnode-id="2944"><span class="mw-headline" data-dcnode-id="2952" id="OBDII-based_system"><span data-dcnode-id="2953" instrument_node="">OBDII-based system</span></span><span class="mw-editsection" data-dcnode-id="2945"><span class="mw-editsection-bracket" data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">[</span></span><a data-dcnode-id="2948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D46" title="Edit section: OBDII-based system"><span data-dcnode-id="2949" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2943" instrument_node="">
</span><p data-dcnode-id="2928"><a class="mw-redirect" data-dcnode-id="2941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Progressive_Corporation" title="The Progressive Corporation"><span data-dcnode-id="2942" instrument_node="">The Progressive Corporation</span></a><span data-dcnode-id="2940" instrument_node=""> launched Snapshot to give drivers a customized insurance rate based on recording how, how much, and when their car is driven.</span><sup class="reference" data-dcnode-id="2937" id="cite_ref-SS_57-0"><a data-dcnode-id="2938" href="#cite_note-SS-57"><span data-dcnode-id="2939" instrument_node="">[57]</span></a></sup><span data-dcnode-id="2936" instrument_node=""> Snapshot is currently available in 46 states plus the District of Columbia. Because insurance is regulated at the state level, Snapshot is currently not available in Alaska, California, Hawaii, and North Carolina.</span><sup class="reference" data-dcnode-id="2933" id="cite_ref-SS_57-1"><a data-dcnode-id="2934" href="#cite_note-SS-57"><span data-dcnode-id="2935" instrument_node="">[57]</span></a></sup><span data-dcnode-id="2932" instrument_node=""> Driving data is transmitted to the company using an on-board telematic device. The device connects to a car's OnBoard Diagnostic (</span><a class="mw-redirect" data-dcnode-id="2930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/OBD-II" title="OBD-II"><span data-dcnode-id="2931" instrument_node="">OBD-II</span></a><span data-dcnode-id="2929" instrument_node="">) port (all petrol automobiles in the USA built after 1996 have an OBD-II.) and transmits speed, time of day and number of miles the car is driven. Cars that are driven less often, in less-risky ways, and at less-risky times of day, can receive large discounts. Progressive has received patents on its methods and systems of implementing usage-based insurance and has licensed these methods and systems to other companies.
</span></p><p data-dcnode-id="2916"><a data-dcnode-id="2926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metromile" title="Metromile"><span data-dcnode-id="2927" instrument_node="">Metromile</span></a><span data-dcnode-id="2925" instrument_node=""> also uses an OBDII-based system for their mileage-based insurance. They offer a true pay-per-mile insurance where behavior or driving style is not taken into account, and the user only pays a base rate along with a fixed rate per mile.</span><sup class="reference" data-dcnode-id="2922" id="cite_ref-58"><a data-dcnode-id="2923" href="#cite_note-58"><span data-dcnode-id="2924" instrument_node="">[58]</span></a></sup><span data-dcnode-id="2921" instrument_node=""> The OBD-II device measures mileage and then transmits mileage data to servers. This is supposed  to be an affordable car insurance policy for low-mileage drivers. Metromile is currently only offering personal car insurance policies and is available in California, Oregon, Washington, and Illinois.</span><sup class="reference" data-dcnode-id="2918" id="cite_ref-59"><a data-dcnode-id="2919" href="#cite_note-59"><span data-dcnode-id="2920" instrument_node="">[59]</span></a></sup><span data-dcnode-id="2917" instrument_node="">
</span></p><span data-dcnode-id="2915" instrument_node="">
</span><h3 data-dcnode-id="2905"><span class="mw-headline" data-dcnode-id="2913" id="Credit_ratings"><span data-dcnode-id="2914" instrument_node="">Credit ratings</span></span><span class="mw-editsection" data-dcnode-id="2906"><span class="mw-editsection-bracket" data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">[</span></span><a data-dcnode-id="2909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D47" title="Edit section: Credit ratings"><span data-dcnode-id="2910" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2904" instrument_node="">
</span><p data-dcnode-id="2894"><span data-dcnode-id="2903" instrument_node="">Insurance companies have started using credit ratings of their policyholders to determine risk. Drivers with good credit scores get lower insurance premiums, as it is believed that they are more financially stable, more responsible and have the financial means to better maintain their vehicles. Those with lower credit scores can have their premiums raised or insurance canceled outright.</span><sup class="reference" data-dcnode-id="2900" id="cite_ref-60"><a data-dcnode-id="2901" href="#cite_note-60"><span data-dcnode-id="2902" instrument_node="">[60]</span></a></sup><span data-dcnode-id="2899" instrument_node=""> It has been shown that good drivers with spotty credit records could be charged higher premiums than bad drivers with good credit records.</span><sup class="reference" data-dcnode-id="2896" id="cite_ref-61"><a data-dcnode-id="2897" href="#cite_note-61"><span data-dcnode-id="2898" instrument_node="">[61]</span></a></sup><span data-dcnode-id="2895" instrument_node="">
</span></p><span data-dcnode-id="2893" instrument_node="">
</span><h3 data-dcnode-id="2883"><span class="mw-headline" data-dcnode-id="2891" id="Behavior-based_insurance"><span data-dcnode-id="2892" instrument_node="">Behavior-based insurance</span></span><span class="mw-editsection" data-dcnode-id="2884"><span class="mw-editsection-bracket" data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">[</span></span><a data-dcnode-id="2887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D48" title="Edit section: Behavior-based insurance"><span data-dcnode-id="2888" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2882" instrument_node="">
</span><p data-dcnode-id="2849"><span data-dcnode-id="2881" instrument_node="">The use of </span><a class="mw-redirect" data-dcnode-id="2879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-intrusive_load_monitoring" title="Non-intrusive load monitoring"><span data-dcnode-id="2880" instrument_node="">non-intrusive load monitoring</span></a><span data-dcnode-id="2878" instrument_node=""> to detect </span><a data-dcnode-id="2876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drunk_driving" title="Drunk driving"><span data-dcnode-id="2877" instrument_node="">drunk driving</span></a><span data-dcnode-id="2875" instrument_node=""> and other risky behaviors has been proposed.</span><sup class="reference" data-dcnode-id="2872" id="cite_ref-62"><a data-dcnode-id="2873" href="#cite_note-62"><span data-dcnode-id="2874" instrument_node="">[62]</span></a></sup><span data-dcnode-id="2871" instrument_node=""> A US patent application combining this technology with a </span><a class="mw-redirect" data-dcnode-id="2869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Usage_based_insurance" title="Usage based insurance"><span data-dcnode-id="2870" instrument_node="">usage based insurance</span></a><span data-dcnode-id="2868" instrument_node=""> product to create a new type of behavior based auto insurance product is currently open for public comment on </span><a class="mw-redirect" data-dcnode-id="2866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peer_to_patent" title="Peer to patent"><span data-dcnode-id="2867" instrument_node="">peer to patent</span></a><span data-dcnode-id="2865" instrument_node="">.</span><sup class="reference" data-dcnode-id="2862" id="cite_ref-63"><a data-dcnode-id="2863" href="#cite_note-63"><span data-dcnode-id="2864" instrument_node="">[63]</span></a></sup><span data-dcnode-id="2861" instrument_node=""> </span><i data-dcnode-id="2857"><span data-dcnode-id="2860" instrument_node="">See </span><a data-dcnode-id="2858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Behavior-based_safety" title="Behavior-based safety"><span data-dcnode-id="2859" instrument_node="">Behavior-based safety</span></a></i><span data-dcnode-id="2856" instrument_node="">. Behaviour based Insurance focusing upon driving is often called </span><a data-dcnode-id="2854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telematics" title="Telematics"><span data-dcnode-id="2855" instrument_node="">Telematics</span></a><span data-dcnode-id="2853" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="2851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telematics2.0" title="Telematics2.0"><span data-dcnode-id="2852" instrument_node="">Telematics2.0</span></a><span data-dcnode-id="2850" instrument_node=""> in some cases monitoring focus upon behavioural analysis such as smooth driving.
</span></p><span data-dcnode-id="2848" instrument_node="">
</span><h2 data-dcnode-id="2838"><span class="mw-headline" data-dcnode-id="2846" id="Repair_insurance"><span data-dcnode-id="2847" instrument_node="">Repair insurance</span></span><span class="mw-editsection" data-dcnode-id="2839"><span class="mw-editsection-bracket" data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">[</span></span><a data-dcnode-id="2842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D49" title="Edit section: Repair insurance"><span data-dcnode-id="2843" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2837" instrument_node="">
</span><table class="box-Globalize plainlinks metadata ambox ambox-content ambox-globalize" data-dcnode-id="2800" role="presentation"><tbody data-dcnode-id="2801"><tr data-dcnode-id="2802"><td class="mbox-image" data-dcnode-id="2834"><div data-dcnode-id="2835" style="width:52px"><img alt="Globe icon." data-dcnode-id="2836" data-file-height="290" data-file-width="350" decoding="async" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_globe_content.svg/48px-Ambox_globe_content.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_globe_content.svg/73px-Ambox_globe_content.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_globe_content.svg/97px-Ambox_globe_content.svg.png 2x" width="48"></div></td><td class="mbox-text" data-dcnode-id="2803"><div class="mbox-text-span" data-dcnode-id="2804"><span data-dcnode-id="2833" instrument_node="">The examples and perspective in this section </span><b data-dcnode-id="2828"><span data-dcnode-id="2832" instrument_node="">deal primarily with the United States and do not represent a </span><a data-dcnode-id="2830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AWikiProject_Countering_systemic_bias" title="Wikipedia:WikiProject Countering systemic bias"><span data-dcnode-id="2831" instrument_node="">worldwide view</span></a><span data-dcnode-id="2829" instrument_node=""> of the subject</span></b><span data-dcnode-id="2827" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="2819"><span data-dcnode-id="2826" instrument_node=""> You may </span><a class="external text" data-dcnode-id="2824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit"><span data-dcnode-id="2825" instrument_node="">improve this section</span></a><span data-dcnode-id="2823" instrument_node="">, discuss the issue on the </span><a data-dcnode-id="2821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talk%3AVehicle_insurance" title="Talk:Vehicle insurance"><span data-dcnode-id="2822" instrument_node="">talk page</span></a><span data-dcnode-id="2820" instrument_node="">, or create a new section, as appropriate.</span></span><span data-dcnode-id="2818" instrument_node=""> </span><span class="date-container" data-dcnode-id="2812"><i data-dcnode-id="2813"><span data-dcnode-id="2817" instrument_node="">(</span><span class="date" data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">September 2012</span></span><span data-dcnode-id="2814" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="2805"><i data-dcnode-id="2806"><span data-dcnode-id="2811" instrument_node=""> (</span><small data-dcnode-id="2808"><a data-dcnode-id="2809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="2810" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="2807" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="2799" instrument_node="">
</span><p data-dcnode-id="2788"><b data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">Auto repair insurance</span></b><span data-dcnode-id="2796" instrument_node=""> is an extension of </span><a class="mw-redirect" data-dcnode-id="2794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Car_insurance" title="Car insurance"><span data-dcnode-id="2795" instrument_node="">car insurance</span></a><span data-dcnode-id="2793" instrument_node=""> available in all 50 of the United States that covers the natural wear and tear on a vehicle, independent of damages related to a car accident.</span><sup class="reference" data-dcnode-id="2790" id="cite_ref-fox_64-0"><a data-dcnode-id="2791" href="#cite_note-fox-64"><span data-dcnode-id="2792" instrument_node="">[64]</span></a></sup><span data-dcnode-id="2789" instrument_node="">
</span></p><p data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">Some drivers opt to buy the insurance as a means of protection against costly breakdowns unrelated to an accident. In contrast to more standard and basic coverages such as comprehensive and collision insurance, auto repair insurance does not cover a vehicle when it is damaged in a collision, during a natural disaster or at the hands of vandals.
</span></p><p data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">For many it is an attractive option for protection after the warranties on their cars expire.
</span></p><p data-dcnode-id="2772"><span data-dcnode-id="2783" instrument_node="">Providers can also offer sub-divisions of auto repair insurance. There is standard repair insurance which covers the wear and tear of vehicles, and naturally occurring breakdowns. Some companies will only offer mechanical breakdown insurance, which only covers repairs necessary when breakable parts need to be fixed or replaced. These parts include transmissions, oil pumps, </span><a data-dcnode-id="2781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Piston" title="Piston"><span data-dcnode-id="2782" instrument_node="">pistons</span></a><span data-dcnode-id="2780" instrument_node="">, timing gears, flywheels, </span><a class="mw-redirect" data-dcnode-id="2778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Valves" title="Valves"><span data-dcnode-id="2779" instrument_node="">valves</span></a><span data-dcnode-id="2777" instrument_node="">, axles and joints.
</span><sup class="reference" data-dcnode-id="2774" id="cite_ref-fox_64-1"><a data-dcnode-id="2775" href="#cite_note-fox-64"><span data-dcnode-id="2776" instrument_node="">[64]</span></a></sup><span data-dcnode-id="2773" instrument_node="">
</span></p><p data-dcnode-id="2766"><span data-dcnode-id="2771" instrument_node="">In several countries insurance companies offer direct repair programs (DRP) so that their customers have easy access to a recommended car body repair shop. Some also offer one-stop shopping where a damaged car can get dropped off and an adjuster handles the claim, the car is fixed and often a replacement rental car is provided. When repairing the vehicle the car body repair shop is obliged to follow the instructions regarding the choice of original equipment manufacturer (OEM), original equipment supplier parts (OES), Matching Quality spare parts (MQ) and generic replacement parts. Both DRPs and non OEM parts help to keep costs down and keep insurance prices competitive. AIRC (International Car body repair Association) General Secretary Karel Bukholczer made clear that DRP's have had big impact on car body repair shops.</span><sup class="reference" data-dcnode-id="2768" id="cite_ref-de_65-0"><a data-dcnode-id="2769" href="#cite_note-de-65"><span data-dcnode-id="2770" instrument_node="">[65]</span></a></sup><span data-dcnode-id="2767" instrument_node="">
</span></p><span data-dcnode-id="2765" instrument_node="">
