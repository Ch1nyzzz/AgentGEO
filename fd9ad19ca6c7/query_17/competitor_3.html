</span><p data-dcnode-id="5046"><b data-dcnode-id="5087"><span data-dcnode-id="5088" instrument_node="">Vehicle insurance</span></b><span data-dcnode-id="5086" instrument_node=""> (also known as </span><b data-dcnode-id="5084"><span data-dcnode-id="5085" instrument_node="">car insurance</span></b><span data-dcnode-id="5083" instrument_node="">, </span><b data-dcnode-id="5081"><span data-dcnode-id="5082" instrument_node="">motor insurance</span></b><span data-dcnode-id="5080" instrument_node="">, or </span><b data-dcnode-id="5078"><span data-dcnode-id="5079" instrument_node="">auto insurance</span></b><span data-dcnode-id="5077" instrument_node="">) is </span><a data-dcnode-id="5075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Insurance" title="Insurance"><span data-dcnode-id="5076" instrument_node="">insurance</span></a><span data-dcnode-id="5074" instrument_node=""> for </span><a class="mw-redirect" data-dcnode-id="5072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Automobile" title="Automobile"><span data-dcnode-id="5073" instrument_node="">cars</span></a><span data-dcnode-id="5071" instrument_node="">, </span><a data-dcnode-id="5069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Truck" title="Truck"><span data-dcnode-id="5070" instrument_node="">trucks</span></a><span data-dcnode-id="5068" instrument_node="">, </span><a data-dcnode-id="5066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Motorcycle" title="Motorcycle"><span data-dcnode-id="5067" instrument_node="">motorcycles</span></a><span data-dcnode-id="5065" instrument_node="">, and other road vehicles. Its primary use is to provide financial protection against physical damage or bodily injury resulting from </span><a data-dcnode-id="5063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Traffic_collision" title="Traffic collision"><span data-dcnode-id="5064" instrument_node="">traffic collisions</span></a><span data-dcnode-id="5062" instrument_node=""> and against </span><a data-dcnode-id="5060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Legal_liability" title="Legal liability"><span data-dcnode-id="5061" instrument_node="">liability</span></a><span data-dcnode-id="5059" instrument_node=""> that could also arise from incidents in a vehicle. Vehicle insurance may additionally offer financial protection against </span><a data-dcnode-id="5057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Motor_vehicle_theft" title="Motor vehicle theft"><span data-dcnode-id="5058" instrument_node="">theft</span></a><span data-dcnode-id="5056" instrument_node=""> of the vehicle, and against damage to the vehicle sustained from events other than traffic collisions, such as </span><a class="mw-redirect" data-dcnode-id="5054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Keying_%28vandalism%29" title="Keying (vandalism)"><span data-dcnode-id="5055" instrument_node="">keying</span></a><span data-dcnode-id="5053" instrument_node="">, weather or </span><a data-dcnode-id="5051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_disaster" title="Natural disaster"><span data-dcnode-id="5052" instrument_node="">natural disasters</span></a><span data-dcnode-id="5050" instrument_node="">, and damage sustained by colliding with stationary objects. The specific terms of vehicle insurance vary with legal </span><a data-dcnode-id="5048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Regulation" title="Regulation"><span data-dcnode-id="5049" instrument_node="">regulations</span></a><span data-dcnode-id="5047" instrument_node=""> in each region.

</span><h2 data-dcnode-id="4575"><span class="mw-headline" data-dcnode-id="4583" id="History"><span data-dcnode-id="4584" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="4576"><span class="mw-editsection-bracket" data-dcnode-id="4581"><span data-dcnode-id="4582" instrument_node="">[</span></span><a data-dcnode-id="4579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D1" title="Edit section: History"><span data-dcnode-id="4580" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4577"><span data-dcnode-id="4578" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4574" instrument_node="">
</span><p data-dcnode-id="4569"><span data-dcnode-id="4573" instrument_node="">Widespread use of the motor car began after the </span><a class="mw-redirect" data-dcnode-id="4571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_World_War" title="First World War"><span data-dcnode-id="4572" instrument_node="">First World War</span></a><span data-dcnode-id="4570" instrument_node=""> in urban areas. Cars were relatively fast and dangerous by that stage, yet there was still no compulsory form of car insurance anywhere in the world. This meant that injured victims would rarely get any compensation in an accident, and drivers often faced considerable costs for damage to their car and property.
</span></p><p data-dcnode-id="4550"><span data-dcnode-id="4568" instrument_node="">A compulsory car insurance scheme was first introduced in the </span><a data-dcnode-id="4566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="4567" instrument_node="">United Kingdom</span></a><span data-dcnode-id="4565" instrument_node=""> with the </span><a data-dcnode-id="4563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Road_Traffic_Act_1930" title="Road Traffic Act 1930"><span data-dcnode-id="4564" instrument_node="">Road Traffic Act 1930</span></a><span data-dcnode-id="4562" instrument_node="">. This ensured that all vehicle owners and drivers had to be insured for their liability for injury or death to third parties whilst their vehicle was being used on a public road.</span><sup class="reference" data-dcnode-id="4559" id="cite_ref-1"><a data-dcnode-id="4560" href="#cite_note-1"><span data-dcnode-id="4561" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4558" instrument_node=""> </span><a data-dcnode-id="4556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazi_Germany" title="Nazi Germany"><span data-dcnode-id="4557" instrument_node="">Germany</span></a><span data-dcnode-id="4555" instrument_node=""> enacted similar legislation in 1939 called the "Act on the Implementation of Compulsory Insurance for Motor Vehicle Owners."</span><sup class="reference" data-dcnode-id="4552" id="cite_ref-:0_2-0"><a data-dcnode-id="4553" href="#cite_note-:0-2"><span data-dcnode-id="4554" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4551" instrument_node="">
</span></p><span data-dcnode-id="4549" instrument_node="">
</span><h2 data-dcnode-id="4539"><span class="mw-headline" data-dcnode-id="4547" id="Public_policies"><span data-dcnode-id="4548" instrument_node="">Public policies</span></span><span class="mw-editsection" data-dcnode-id="4540"><span class="mw-editsection-bracket" data-dcnode-id="4545"><span data-dcnode-id="4546" instrument_node="">[</span></span><a data-dcnode-id="4543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D2" title="Edit section: Public policies"><span data-dcnode-id="4544" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4541"><span data-dcnode-id="4542" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4538" instrument_node="">
</span><p data-dcnode-id="4536"><span data-dcnode-id="4537" instrument_node="">In many jurisdictions, it is compulsory to have vehicle insurance before using or keeping a motor vehicle on public roads. Most jurisdictions relate insurance to both the car and the driver; however, the degree of each varies greatly.
</span></p><p data-dcnode-id="4530"><span data-dcnode-id="4535" instrument_node="">Several jurisdictions have experimented with a "pay-as-you-drive" insurance plan which utilizes either a tracking device in the vehicle or vehicle diagnostics. This would address issues of uninsured motorists by providing additional options and also charge based on the miles (kilometers) driven, which could theoretically increase the efficiency of the insurance, through streamlined collection.</span><sup class="reference" data-dcnode-id="4532" id="cite_ref-3"><a data-dcnode-id="4533" href="#cite_note-3"><span data-dcnode-id="4534" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4531" instrument_node="">
</span></p><span data-dcnode-id="4529" instrument_node="">
</span><h3 data-dcnode-id="4519"><span class="mw-headline" data-dcnode-id="4527" id="Australia"><span data-dcnode-id="4528" instrument_node="">Australia</span></span><span class="mw-editsection" data-dcnode-id="4520"><span class="mw-editsection-bracket" data-dcnode-id="4525"><span data-dcnode-id="4526" instrument_node="">[</span></span><a data-dcnode-id="4523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D3" title="Edit section: Australia"><span data-dcnode-id="4524" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4518" instrument_node="">
</span><p data-dcnode-id="4507"><span data-dcnode-id="4517" instrument_node="">In Australia, every state has its own </span><i data-dcnode-id="4515"><span data-dcnode-id="4516" instrument_node="">Compulsory Third-Party</span></i><span data-dcnode-id="4514" instrument_node=""> (CTP) insurance scheme. CTP covers only personal injury liability in a vehicle accident. </span><i data-dcnode-id="4512"><span data-dcnode-id="4513" instrument_node="">Comprehensive</span></i><span data-dcnode-id="4511" instrument_node=""> and </span><i data-dcnode-id="4509"><span data-dcnode-id="4510" instrument_node="">Third-Party Property Damage, with or without Fire and Theft</span></i><span data-dcnode-id="4508" instrument_node="">  insurance, are sold separately.  
</span></p><span data-dcnode-id="4506" instrument_node="">
</span><ul data-dcnode-id="4491"><li data-dcnode-id="4502"><i data-dcnode-id="4504"><span data-dcnode-id="4505" instrument_node="">Comprehensive</span></i><span data-dcnode-id="4503" instrument_node=""> insurance covers damages to third-party property and the insured vehicle and property.</span></li><span data-dcnode-id="4501" instrument_node="">
</span><li data-dcnode-id="4497"><i data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">Third-Party Property Damage</span></i><span data-dcnode-id="4498" instrument_node=""> insurance covers damage to third-party property and vehicles, but not the insured vehicle.</span></li><span data-dcnode-id="4496" instrument_node="">
</span><li data-dcnode-id="4492"><i data-dcnode-id="4494"><span data-dcnode-id="4495" instrument_node="">Third-Party Property Damage with Fire and Theft</span></i><span data-dcnode-id="4493" instrument_node=""> insurance covers the insured vehicle against fire and theft as well as third-party property and vehicles.</span></li></ul><span data-dcnode-id="4490" instrument_node="">
</span><h4 data-dcnode-id="4480"><span class="mw-headline" data-dcnode-id="4488" id="Compulsory_Third-Party_Insurance"><span data-dcnode-id="4489" instrument_node="">Compulsory Third-Party Insurance</span></span><span class="mw-editsection" data-dcnode-id="4481"><span class="mw-editsection-bracket" data-dcnode-id="4486"><span data-dcnode-id="4487" instrument_node="">[</span></span><a data-dcnode-id="4484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D4" title="Edit section: Compulsory Third-Party Insurance"><span data-dcnode-id="4485" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4482"><span data-dcnode-id="4483" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4479" instrument_node="">
</span><p data-dcnode-id="4477"><span data-dcnode-id="4478" instrument_node="">CTP insurance is compulsory in every state in Australia and is paid as part of vehicle registration. It covers the vehicle owner and any person who drives the vehicle against claims for liability for death or injury to people caused by the fault of the vehicle owner or driver. CTP may include any kind of physical harm, bodily injuries and may cover the cost of all reasonable medical treatment for injuries received in the accident, loss of wages, cost of care services and, in some cases, compensation for pain and suffering. Each state in Australia has a different scheme.
</span></p><p data-dcnode-id="4475"><span data-dcnode-id="4476" instrument_node="">Third-Party Property insurance or Comprehensive insurance covers the third party with the repairing cost of the vehicle, any property damage or medication expenses as a result of an accident by the insured. They are not to be confused with Compulsory Third-Party insurance, which is for injuries or death of someone in a motor accident.
</span></p><p data-dcnode-id="4466"><span data-dcnode-id="4474" instrument_node="">In </span><a data-dcnode-id="4472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_South_Wales" title="New South Wales"><span data-dcnode-id="4473" instrument_node="">New South Wales</span></a><span data-dcnode-id="4471" instrument_node="">, each vehicle must be insured before it can be registered. It is often called a 'greenslip,'</span><sup class="reference" data-dcnode-id="4468" id="cite_ref-4"><a data-dcnode-id="4469" href="#cite_note-4"><span data-dcnode-id="4470" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4467" instrument_node=""> because of its colour. There are five licensed CTP insurers in New South Wales. Suncorp holds licences for GIO and AAMI and Allianz holds one licence. The remaining two licences are held by QBE and NRMA Insurance (NRMA). APIA and Shannons and InsureMyRide insurance also supply CTP insurance licensed by GIO.
</span></p><p data-dcnode-id="4461"><span data-dcnode-id="4465" instrument_node="">A privately provided scheme also applies in the </span><a data-dcnode-id="4463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_Capital_Territory" title="Australian Capital Territory"><span data-dcnode-id="4464" instrument_node="">Australian Capital Territory</span></a><span data-dcnode-id="4462" instrument_node=""> through AAMI, APIA, GIO and NRMA. Vehicle owners pay for CTP as part of their vehicle registration.
</span></p><p data-dcnode-id="4452"><span data-dcnode-id="4460" instrument_node="">In </span><a data-dcnode-id="4458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Queensland" title="Queensland"><span data-dcnode-id="4459" instrument_node="">Queensland</span></a><span data-dcnode-id="4457" instrument_node="">, CTP is included in the registration fee for a vehicle. There is a choice of private insurer - Allianz, QBE, RACQ and Suncorp and price is government controlled.</span><sup class="reference" data-dcnode-id="4454" id="cite_ref-5"><a data-dcnode-id="4455" href="#cite_note-5"><span data-dcnode-id="4456" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4453" instrument_node="">
</span></p><p data-dcnode-id="4440"><span data-dcnode-id="4451" instrument_node="">In </span><a data-dcnode-id="4449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Australia" title="South Australia"><span data-dcnode-id="4450" instrument_node="">South Australia</span></a><span data-dcnode-id="4448" instrument_node="">, since July 2016, CTP is no longer provided by the </span><a class="new" data-dcnode-id="4446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMotor_Accident_Commission%26action%3Dedit%26redlink%3D1" title="Motor Accident Commission (page does not exist)"><span data-dcnode-id="4447" instrument_node="">Motor Accident Commission</span></a><span data-dcnode-id="4445" instrument_node="">. The government has now licensed four private insurers - AAMI, Allianz, QBE and SGIC, to offer CTP insurance SA. Since July 2019, vehicle owners can choose their own CTP insurer and new insurers may also enter the market.</span><sup class="reference" data-dcnode-id="4442" id="cite_ref-6"><a data-dcnode-id="4443" href="#cite_note-6"><span data-dcnode-id="4444" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4441" instrument_node="">
</span></p><p data-dcnode-id="4419"><span data-dcnode-id="4439" instrument_node="">There are three states and one territory that do not have a private CTP scheme. In </span><a data-dcnode-id="4437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victoria_%28Australia%29" title="Victoria (Australia)"><span data-dcnode-id="4438" instrument_node="">Victoria</span></a><span data-dcnode-id="4436" instrument_node="">, the </span><a data-dcnode-id="4434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transport_Accident_Commission" title="Transport Accident Commission"><span data-dcnode-id="4435" instrument_node="">Transport Accident Commission</span></a><span data-dcnode-id="4433" instrument_node=""> provides CTP through a levy in the vehicle registration fee, known as the TAC charge. A similar scheme exists in </span><a data-dcnode-id="4431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tasmania" title="Tasmania"><span data-dcnode-id="4432" instrument_node="">Tasmania</span></a><span data-dcnode-id="4430" instrument_node=""> through the </span><a class="new" data-dcnode-id="4428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMotor_Accidents_Insurance_Board%26action%3Dedit%26redlink%3D1" title="Motor Accidents Insurance Board (page does not exist)"><span data-dcnode-id="4429" instrument_node="">Motor Accidents Insurance Board</span></a><span data-dcnode-id="4427" instrument_node="">.</span><sup class="reference" data-dcnode-id="4424" id="cite_ref-7"><a data-dcnode-id="4425" href="#cite_note-7"><span data-dcnode-id="4426" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4423" instrument_node=""> A similar scheme applies in </span><a data-dcnode-id="4421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Australia" title="Western Australia"><span data-dcnode-id="4422" instrument_node="">Western Australia</span></a><span data-dcnode-id="4420" instrument_node="">, through the Insurance Commission of Western Australia (ICWA). The Northern Territory scheme is managed through Territory Insurance Office (TIO).
</span></p><span data-dcnode-id="4418" instrument_node="">
</span><h3 data-dcnode-id="4408"><span class="mw-headline" data-dcnode-id="4416" id="Bangladesh"><span data-dcnode-id="4417" instrument_node="">Bangladesh</span></span><span class="mw-editsection" data-dcnode-id="4409"><span class="mw-editsection-bracket" data-dcnode-id="4414"><span data-dcnode-id="4415" instrument_node="">[</span></span><a data-dcnode-id="4412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D5" title="Edit section: Bangladesh"><span data-dcnode-id="4413" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4410"><span data-dcnode-id="4411" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4407" instrument_node="">
</span><p data-dcnode-id="4386"><span data-dcnode-id="4406" instrument_node="">For all types of motor insurance policies in </span><a data-dcnode-id="4404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bangladesh" title="Bangladesh"><span data-dcnode-id="4405" instrument_node="">Bangladesh</span></a><span data-dcnode-id="4403" instrument_node="">, the limit of liability has been fixed by the law. Currently, the limits are too low to compensate the victims. In respect of Act Only Liability Motor Vehicle Insurance, the compensation for personal injuries and property damage to third parties is BDT 20,000 for death, BDT 10,000 for severe injury, BDT 5,000 for injury, and BDT 50,000 for property damage.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4396" style="white-space:nowrap;"><span data-dcnode-id="4402" instrument_node="">[</span><i data-dcnode-id="4398"><a data-dcnode-id="4399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4400" title="This claim needs references to reliable sources. (November 2018)"><span data-dcnode-id="4401" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4397" instrument_node="">]</span></sup><span data-dcnode-id="4395" instrument_node=""> The limits are under review by the governmental bodies.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4388" style="white-space:nowrap;"><span data-dcnode-id="4394" instrument_node="">[</span><i data-dcnode-id="4390"><a data-dcnode-id="4391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4392" title="This claim needs references to reliable sources. (November 2018)"><span data-dcnode-id="4393" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4389" instrument_node="">]</span></sup><span data-dcnode-id="4387" instrument_node="">
</span></p><span data-dcnode-id="4385" instrument_node="">
</span><h3 data-dcnode-id="4375"><span class="mw-headline" data-dcnode-id="4383" id="Canada"><span data-dcnode-id="4384" instrument_node="">Canada</span></span><span class="mw-editsection" data-dcnode-id="4376"><span class="mw-editsection-bracket" data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">[</span></span><a data-dcnode-id="4379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D6" title="Edit section: Canada"><span data-dcnode-id="4380" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4377"><span data-dcnode-id="4378" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4374" instrument_node="">
</span><p data-dcnode-id="4319"><span data-dcnode-id="4373" instrument_node="">Several Canadian provinces (</span><a data-dcnode-id="4371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Columbia" title="British Columbia"><span data-dcnode-id="4372" instrument_node="">British Columbia</span></a><span data-dcnode-id="4370" instrument_node="">, </span><a data-dcnode-id="4368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saskatchewan" title="Saskatchewan"><span data-dcnode-id="4369" instrument_node="">Saskatchewan</span></a><span data-dcnode-id="4367" instrument_node="">, </span><a data-dcnode-id="4365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manitoba" title="Manitoba"><span data-dcnode-id="4366" instrument_node="">Manitoba</span></a><span data-dcnode-id="4364" instrument_node=""> and </span><a data-dcnode-id="4362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quebec" title="Quebec"><span data-dcnode-id="4363" instrument_node="">Quebec</span></a><span data-dcnode-id="4361" instrument_node="">) provide a </span><a data-dcnode-id="4359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_auto_insurance" title="Public auto insurance"><span data-dcnode-id="4360" instrument_node="">public auto insurance</span></a><span data-dcnode-id="4358" instrument_node=""> system while in the rest of the country insurance is provided privately [third-party insurance is privatized in Quebec and is mandatory. The province covers everything but the vehicle(s)].</span><sup class="reference" data-dcnode-id="4355" id="cite_ref-8"><a data-dcnode-id="4356" href="#cite_note-8"><span data-dcnode-id="4357" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4354" instrument_node=""> Basic auto insurance is mandatory throughout Canada (except when it is not</span><sup class="reference" data-dcnode-id="4351" id="cite_ref-Forest2012_9-0"><a data-dcnode-id="4352" href="#cite_note-Forest2012-9"><span data-dcnode-id="4353" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4350" instrument_node="">) with each province's government determining which benefits are included as minimum required auto insurance coverage and which benefits are options available for those seeking additional coverage. Accident benefits coverage is mandatory everywhere except for </span><a data-dcnode-id="4348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newfoundland_and_Labrador" title="Newfoundland and Labrador"><span data-dcnode-id="4349" instrument_node="">Newfoundland and Labrador</span></a><span data-dcnode-id="4347" instrument_node="">.</span><sup class="reference" data-dcnode-id="4344" id="cite_ref-10"><a data-dcnode-id="4345" href="#cite_note-10"><span data-dcnode-id="4346" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4343" instrument_node=""> All provinces in Canada have some form of </span><a data-dcnode-id="4341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/No-fault_insurance" title="No-fault insurance"><span data-dcnode-id="4342" instrument_node="">no-fault insurance</span></a><span data-dcnode-id="4340" instrument_node=""> available to accident victims. The difference from province to province is the extent to which tort or no-fault is emphasized. International drivers entering Canada are permitted to drive any vehicle their licence allows for the 3-month period for which they are allowed to use their international licence. International laws provide visitors to the country with an International Insurance Bond (IIB) until this 3-month period is over in which the international driver must provide themselves with Canadian Insurance. The IIB is reinstated every time the international driver enters the country. Damage to the driver's own vehicle is optional – one notable exception to this is in </span><a data-dcnode-id="4338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saskatchewan" title="Saskatchewan"><span data-dcnode-id="4339" instrument_node="">Saskatchewan</span></a><span data-dcnode-id="4337" instrument_node="">, where </span><a data-dcnode-id="4335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saskatchewan_Government_Insurance" title="Saskatchewan Government Insurance"><span data-dcnode-id="4336" instrument_node="">SGI</span></a><span data-dcnode-id="4334" instrument_node=""> provides collision coverage (less than a $1000 </span><a data-dcnode-id="4332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deductible" title="Deductible"><span data-dcnode-id="4333" instrument_node="">deductible</span></a><span data-dcnode-id="4331" instrument_node="">, such as a </span><a class="mw-redirect" data-dcnode-id="4329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collision_damage_waiver" title="Collision damage waiver"><span data-dcnode-id="4330" instrument_node="">collision damage waiver</span></a><span data-dcnode-id="4328" instrument_node="">) as part of its basic insurance policy.</span><sup class="reference" data-dcnode-id="4325" id="cite_ref-11"><a data-dcnode-id="4326" href="#cite_note-11"><span data-dcnode-id="4327" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4324" instrument_node=""> In Saskatchewan, residents have the option to have their auto insurance through a tort system but less than 0.5% of the population have taken this option.</span><sup class="reference" data-dcnode-id="4321" id="cite_ref-ibc_12-0"><a data-dcnode-id="4322" href="#cite_note-ibc-12"><span data-dcnode-id="4323" instrument_node="">[12]</span></a></sup><span data-dcnode-id="4320" instrument_node="">
</span></p><span data-dcnode-id="4318" instrument_node="">
</span><h3 data-dcnode-id="4308"><span class="mw-headline" data-dcnode-id="4316" id="China"><span data-dcnode-id="4317" instrument_node="">China</span></span><span class="mw-editsection" data-dcnode-id="4309"><span class="mw-editsection-bracket" data-dcnode-id="4314"><span data-dcnode-id="4315" instrument_node="">[</span></span><a data-dcnode-id="4312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D7" title="Edit section: China"><span data-dcnode-id="4313" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4310"><span data-dcnode-id="4311" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4307" instrument_node="">
</span><p data-dcnode-id="4289"><span data-dcnode-id="4306" instrument_node="">Traffic Compulsory Insurance provides protection in the event of third party injuries, third party property losses, etc. The minimum liability cover is RMB180,000 for death and injury/per accident, RMB18,000 for medical expense, and RMB2,000 for physical loss.</span><sup class="reference" data-dcnode-id="4303" id="cite_ref-13"><a data-dcnode-id="4304" href="#cite_note-13"><span data-dcnode-id="4305" instrument_node="">[13]</span></a></sup><span data-dcnode-id="4302" instrument_node=""> Additional 3rd Party Liability Insurance  also known as Commercial Motor Insurance provides extra cover up to RMB10,000,000 excluding the driver and passengers.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4295" style="white-space:nowrap;"><span data-dcnode-id="4301" instrument_node="">[</span><i data-dcnode-id="4297"><a data-dcnode-id="4298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4299" title="This claim needs references to reliable sources. (October 2021)"><span data-dcnode-id="4300" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4296" instrument_node="">]</span></sup><span data-dcnode-id="4294" instrument_node=""> Driver and Passenger insurance covers the driver and passengers, whilst Vehicle Damage and Theft Insurance covers vehicle damage and the objects contained inside.</span><sup class="reference" data-dcnode-id="4291" id="cite_ref-14"><a data-dcnode-id="4292" href="#cite_note-14"><span data-dcnode-id="4293" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4290" instrument_node=""> Excess Waiver Insurance is an additional option that waives any deductibles.
</span></p><p data-dcnode-id="4287"><span data-dcnode-id="4288" instrument_node="">Some differences apply in different regions:
</span></p><span data-dcnode-id="4286" instrument_node="">
</span><h4 data-dcnode-id="4276"><span class="mw-headline" data-dcnode-id="4284" id="Hong_Kong"><span data-dcnode-id="4285" instrument_node="">Hong Kong</span></span><span class="mw-editsection" data-dcnode-id="4277"><span class="mw-editsection-bracket" data-dcnode-id="4282"><span data-dcnode-id="4283" instrument_node="">[</span></span><a data-dcnode-id="4280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D8" title="Edit section: Hong Kong"><span data-dcnode-id="4281" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4278"><span data-dcnode-id="4279" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4275" instrument_node="">
</span><p data-dcnode-id="4269"><span data-dcnode-id="4274" instrument_node="">According to section 4(1) of the Motor Vehicles Insurance (Third-Party Risks) Ordinance (Cap. 272 of the Laws of Hong Kong), all users of a car, include its permitted users, must have insurance or some other security with respect to third-party risks. Third party insurance protects the policyholder against liability of death or bodily injury to third party up to HK$100,000,000 and/or damage to third party property up to HK$2,000,000 as a result of accident arising out of the use of the insured vehicle.</span><sup class="reference" data-dcnode-id="4271" id="cite_ref-15"><a data-dcnode-id="4272" href="#cite_note-15"><span data-dcnode-id="4273" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4270" instrument_node=""> Comprehensive Motor Insurance is also available.
</span></p><span data-dcnode-id="4268" instrument_node="">
</span><h4 data-dcnode-id="4258"><span class="mw-headline" data-dcnode-id="4266" id="Macau"><span data-dcnode-id="4267" instrument_node="">Macau</span></span><span class="mw-editsection" data-dcnode-id="4259"><span class="mw-editsection-bracket" data-dcnode-id="4264"><span data-dcnode-id="4265" instrument_node="">[</span></span><a data-dcnode-id="4262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D9" title="Edit section: Macau"><span data-dcnode-id="4263" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4260"><span data-dcnode-id="4261" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4257" instrument_node="">
</span><p data-dcnode-id="4247"><span data-dcnode-id="4256" instrument_node="">The mandatory minimum legal requirement Third Party Liability (“TPL”) Cover is MOP1,500,000 per accident and MOP30,000,000 per year, protecting against the legal liability arising from a traffic accident causing loss and damages to any third party.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4249" style="white-space:nowrap;"><span data-dcnode-id="4255" instrument_node="">[</span><i data-dcnode-id="4251"><a data-dcnode-id="4252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4253" title="This claim needs references to reliable sources. (October 2021)"><span data-dcnode-id="4254" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4250" instrument_node="">]</span></sup><span data-dcnode-id="4248" instrument_node="">. Comprehensive Motor Insurance is also available.
</span></p><span data-dcnode-id="4246" instrument_node="">
</span><h3 data-dcnode-id="4236"><span class="mw-headline" data-dcnode-id="4244" id="European_Union"><span data-dcnode-id="4245" instrument_node="">European Union</span></span><span class="mw-editsection" data-dcnode-id="4237"><span class="mw-editsection-bracket" data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">[</span></span><a data-dcnode-id="4240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D10" title="Edit section: European Union"><span data-dcnode-id="4241" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4238"><span data-dcnode-id="4239" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4235" instrument_node="">
</span><p data-dcnode-id="4233"><span data-dcnode-id="4234" instrument_node="">In the European Union, the insurance is compulsory with minimum amounts:
</span></p><span data-dcnode-id="4232" instrument_node="">
</span><ul data-dcnode-id="4223"><li data-dcnode-id="4230"><span data-dcnode-id="4231" instrument_node="">in the case of personal injury, a minimum amount of cover of €1,000,000 per victim or €5,000,000 per claim, whatever the number of victims;</span></li><span data-dcnode-id="4229" instrument_node="">
</span><li data-dcnode-id="4224"><span data-dcnode-id="4228" instrument_node="">in the case of damage to property, €1,000,000 per claim, whatever the number of victims.</span><sup class="reference" data-dcnode-id="4225" id="cite_ref-16"><a data-dcnode-id="4226" href="#cite_note-16"><span data-dcnode-id="4227" instrument_node="">[16]</span></a></sup></li></ul><span data-dcnode-id="4222" instrument_node="">
</span><p data-dcnode-id="4204"><span data-dcnode-id="4221" instrument_node="">In some European languages, comprehensive insurance is known as </span><i data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">casco</span></i><span data-dcnode-id="4218" instrument_node="">.</span><sup class="reference" data-dcnode-id="4215" id="cite_ref-17"><a data-dcnode-id="4216" href="#cite_note-17"><span data-dcnode-id="4217" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="4212" id="cite_ref-18"><a data-dcnode-id="4213" href="#cite_note-18"><span data-dcnode-id="4214" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="4209" id="cite_ref-19"><a data-dcnode-id="4210" href="#cite_note-19"><span data-dcnode-id="4211" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="4206" id="cite_ref-20"><a data-dcnode-id="4207" href="#cite_note-20"><span data-dcnode-id="4208" instrument_node="">[20]</span></a></sup><span data-dcnode-id="4205" instrument_node="">
</span></p><span data-dcnode-id="4203" instrument_node="">
</span><h3 data-dcnode-id="4193"><span class="mw-headline" data-dcnode-id="4201" id="Germany"><span data-dcnode-id="4202" instrument_node="">Germany</span></span><span class="mw-editsection" data-dcnode-id="4194"><span class="mw-editsection-bracket" data-dcnode-id="4199"><span data-dcnode-id="4200" instrument_node="">[</span></span><a data-dcnode-id="4197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D11" title="Edit section: Germany"><span data-dcnode-id="4198" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4192" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4183"><div class="thumbinner" data-dcnode-id="4184" style="width:222px;"><a class="image" data-dcnode-id="4190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIVK.png"><img alt="" class="thumbimage" data-dcnode-id="4191" data-file-height="615" data-file-width="908" decoding="async" height="149" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0c/IVK.png/220px-IVK.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0c/IVK.png/330px-IVK.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/0c/IVK.png/440px-IVK.png 2x" width="220"></a><span data-dcnode-id="4189" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4185"><div class="magnify" data-dcnode-id="4187"><a class="internal" data-dcnode-id="4188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIVK.png" title="Enlarge"></a></div><span data-dcnode-id="4186" instrument_node="">International Motor Insurance Card (IVK)</span></div></div></div><span data-dcnode-id="4182" instrument_node="">
</span><p data-dcnode-id="4172"><span data-dcnode-id="4181" instrument_node="">Since 1939, it has been compulsory to have third-party personal insurance before keeping a motor vehicle in all federal states of Germany.</span><sup class="reference" data-dcnode-id="4178" id="cite_ref-:0_2-1"><a data-dcnode-id="4179" href="#cite_note-:0-2"><span data-dcnode-id="4180" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4177" instrument_node=""> In addition, every vehicle owner is free to take out a comprehensive insurance policy. All types of car insurance are provided by several private insurers. The amount of insurance contribution is determined by several criteria, like the region, the type of car or the personal way of driving.</span><sup class="reference" data-dcnode-id="4174" id="cite_ref-21"><a data-dcnode-id="4175" href="#cite_note-21"><span data-dcnode-id="4176" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4173" instrument_node="">
</span></p><p data-dcnode-id="4166"><span data-dcnode-id="4171" instrument_node="">The minimum coverage defined by German law for car liability insurance / third-party personal insurance is €7,500,000 for bodily injury (damage to people), €500,000 for property damage and €50,000 for financial/fortune loss which is in no direct or indirect coherence with bodily injury or property damage.</span><sup class="reference" data-dcnode-id="4168" id="cite_ref-22"><a data-dcnode-id="4169" href="#cite_note-22"><span data-dcnode-id="4170" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4167" instrument_node=""> Insurance companies usually offer all-in/combined single limit insurances of €50,000,000 or €100,000,000 (about €141,000,000) for bodily injury, property damage and other financial/fortune loss (usually with a bodily injury coverage limitation of €8-15,000,000 for each bodily injured person).
</span></p><span data-dcnode-id="4165" instrument_node="">
</span><h3 data-dcnode-id="4155"><span class="mw-headline" data-dcnode-id="4163" id="Hungary"><span data-dcnode-id="4164" instrument_node="">Hungary</span></span><span class="mw-editsection" data-dcnode-id="4156"><span class="mw-editsection-bracket" data-dcnode-id="4161"><span data-dcnode-id="4162" instrument_node="">[</span></span><a data-dcnode-id="4159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D12" title="Edit section: Hungary"><span data-dcnode-id="4160" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4157"><span data-dcnode-id="4158" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4154" instrument_node="">
</span><p data-dcnode-id="4138"><span data-dcnode-id="4153" instrument_node="">Third-party vehicle insurance is mandatory for all vehicles in Hungary. No exemption is possible by money deposit. The premium covers all damage up to </span><a data-dcnode-id="4151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hungarian_forint" title="Hungarian forint"><span data-dcnode-id="4152" instrument_node="">HUF</span></a><span data-dcnode-id="4150" instrument_node=""> 500M (about €1.8M) per accident without deductible. The coverage is extended to </span><a data-dcnode-id="4148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hungarian_forint" title="Hungarian forint"><span data-dcnode-id="4149" instrument_node="">HUF</span></a><span data-dcnode-id="4147" instrument_node=""> 1,250M (about €4.5M) in case of personal injuries. Vehicle insurance policies from all EU-countries and some non-EU countries are valid in Hungary based on bilateral or multilateral agreements. Visitors with vehicle insurance not covered by such agreements are required to buy a monthly, renewable policy at the border.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4140" style="white-space:nowrap;"><span data-dcnode-id="4146" instrument_node="">[</span><i data-dcnode-id="4142"><a data-dcnode-id="4143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4144" title="This claim needs references to reliable sources. (August 2019)"><span data-dcnode-id="4145" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4141" instrument_node="">]</span></sup><span data-dcnode-id="4139" instrument_node="">
</span></p><span data-dcnode-id="4137" instrument_node="">
</span><h3 data-dcnode-id="4127"><span class="mw-headline" data-dcnode-id="4135" id="Indonesia"><span data-dcnode-id="4136" instrument_node="">Indonesia</span></span><span class="mw-editsection" data-dcnode-id="4128"><span class="mw-editsection-bracket" data-dcnode-id="4133"><span data-dcnode-id="4134" instrument_node="">[</span></span><a data-dcnode-id="4131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D13" title="Edit section: Indonesia"><span data-dcnode-id="4132" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4126" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4104"><div class="thumbinner" data-dcnode-id="4105" style="width:222px;"><a class="image" data-dcnode-id="4124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APT_Jasa_Raharja_%28Persero%29.svg"><img alt="" class="thumbimage" data-dcnode-id="4125" data-file-height="100" data-file-width="512" decoding="async" height="43" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/8f/PT_Jasa_Raharja_%2528Persero%2529.svg/220px-PT_Jasa_Raharja_%2528Persero%2529.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/8f/PT_Jasa_Raharja_%28Persero%29.svg/330px-PT_Jasa_Raharja_%28Persero%29.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/8f/PT_Jasa_Raharja_%28Persero%29.svg/440px-PT_Jasa_Raharja_%28Persero%29.svg.png 2x" width="220"></a><span data-dcnode-id="4123" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4106"><div class="magnify" data-dcnode-id="4121"><a class="internal" data-dcnode-id="4122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APT_Jasa_Raharja_%28Persero%29.svg" title="Enlarge"></a></div><span data-dcnode-id="4120" instrument_node="">Logo of PT Jasa Raharja (Persero) since </span><span class="cleanup-needed-content" data-dcnode-id="4118" style="padding-left:0.1em; padding-right:0.1em; color:#595959; border:1px solid #DDD;"><span data-dcnode-id="4119" instrument_node="">1980</span></span><sup class="noprint Inline-Template" data-dcnode-id="4111" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="4117" instrument_node="">[</span><i data-dcnode-id="4113"><a data-dcnode-id="4114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APlease_clarify" title="Wikipedia:Please clarify"><span data-dcnode-id="4115" title="The text near this tag may need clarification or removal of jargon. (March 2020)"><span data-dcnode-id="4116" instrument_node="">clarification needed</span></span></a></i><span data-dcnode-id="4112" instrument_node="">]</span></sup><span data-dcnode-id="4110" instrument_node="">. This logo has since ubiquitously appeared in many </span><a class="mw-redirect" data-dcnode-id="4108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Traffic_cones" title="Traffic cones"><span data-dcnode-id="4109" instrument_node="">traffic cones</span></a><span data-dcnode-id="4107" instrument_node=""> and temporary barriers nationwide</span></div></div></div><span data-dcnode-id="4103" instrument_node="">
</span><p data-dcnode-id="4039"><span data-dcnode-id="4102" instrument_node="">Third-party vehicle insurance is a mandatory requirement in Indonesia and each individual car and motorcycle must be insured or the vehicle will not be considered legal; this compulsory auto insurance is legally called the </span><b data-dcnode-id="4100"><span data-dcnode-id="4101" instrument_node="">Road Traffic Accidents Compulsory Coverage Fund</span></b><span data-dcnode-id="4099" instrument_node=""> (</span><a data-dcnode-id="4097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indonesian_language" title="Indonesian language"><span data-dcnode-id="4098" instrument_node="">Indonesian</span></a><span data-dcnode-id="4096" instrument_node="">: </span><i data-dcnode-id="4094" lang="id"><span data-dcnode-id="4095" instrument_node="">Dana Pertanggungan Wajib Kecelakaan Lalu Lintas Jalan</span></i><span data-dcnode-id="4093" instrument_node="">, </span><b data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">DPWKLLJ</span></b><span data-dcnode-id="4090" instrument_node="">). Therefore, a motorist cannot drive the vehicle until it is insured. DPWKLLJ was introduced in 1964 and merely covers body injuries, and is operated by a </span><a data-dcnode-id="4088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State-owned_enterprises_of_Indonesia" title="State-owned enterprises of Indonesia"><span data-dcnode-id="4089" instrument_node="">SOE</span></a><span data-dcnode-id="4087" instrument_node=""> called </span><b data-dcnode-id="4079"><a class="new" data-dcnode-id="4085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPT_Jasa_Raharja_%28Persero%29%26action%3Dedit%26redlink%3D1" title="PT Jasa Raharja (Persero) (page does not exist)"><span data-dcnode-id="4086" instrument_node="">PT Jasa Raharja (Persero)</span></a><span class="noprint" data-dcnode-id="4080" style="font-size:85%; font-style: normal;"><span data-dcnode-id="4084" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="4082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//id.wikipedia.org/wiki/Jasa_Raharja" title="id:Jasa Raharja"><span data-dcnode-id="4083" instrument_node="">id</span></a><span data-dcnode-id="4081" instrument_node="">]</span></span></b><span data-dcnode-id="4078" instrument_node="">.</span><sup class="reference" data-dcnode-id="4075" id="cite_ref-23"><a data-dcnode-id="4076" href="#cite_note-23"><span data-dcnode-id="4077" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4074" instrument_node=""> DPWKLLJ is included, through an annual premium called the </span><i data-dcnode-id="4072"><span data-dcnode-id="4073" instrument_node="">Compulsory Donation to the Road Traffic Accident Fund</span></i><span data-dcnode-id="4071" instrument_node=""> (</span><a data-dcnode-id="4069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indonesian_language" title="Indonesian language"><span data-dcnode-id="4070" instrument_node="">Indonesian</span></a><span data-dcnode-id="4068" instrument_node="">: </span><i data-dcnode-id="4066" lang="id"><span data-dcnode-id="4067" instrument_node="">Sumbangan Wajib Dana Kecelakaan Lalu Lintas Jalan</span></i><span data-dcnode-id="4065" instrument_node="">, </span><i data-dcnode-id="4063"><span data-dcnode-id="4064" instrument_node="">SWDKLLJ</span></i><span data-dcnode-id="4062" instrument_node="">)</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4055" style="white-space:nowrap;"><span data-dcnode-id="4061" instrument_node="">[</span><i data-dcnode-id="4057"><a data-dcnode-id="4058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4059" title="This claim needs references to reliable sources. (August 2019)"><span data-dcnode-id="4060" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4056" instrument_node="">]</span></sup><span data-dcnode-id="4054" instrument_node="">, in the annual vehicle tax which is paid to the local </span><i data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">Samsat</span></i><span data-dcnode-id="4051" instrument_node=""> (</span><i data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node="">Sistem Administrasi Manunggal di bawah Satu Atap</span></i><span data-dcnode-id="4048" instrument_node="">), which is responsible for cars and roads.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4041" style="white-space:nowrap;"><span data-dcnode-id="4047" instrument_node="">[</span><i data-dcnode-id="4043"><a data-dcnode-id="4044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4045" title="This claim needs references to reliable sources. (August 2019)"><span data-dcnode-id="4046" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4042" instrument_node="">]</span></sup><span data-dcnode-id="4040" instrument_node="">
</span></p><span data-dcnode-id="4038" instrument_node="">
</span><h3 data-dcnode-id="4028"><span class="mw-headline" data-dcnode-id="4036" id="India"><span data-dcnode-id="4037" instrument_node="">India</span></span><span class="mw-editsection" data-dcnode-id="4029"><span class="mw-editsection-bracket" data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">[</span></span><a data-dcnode-id="4032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D14" title="Edit section: India"><span data-dcnode-id="4033" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4030"><span data-dcnode-id="4031" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4027" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4018"><div class="thumbinner" data-dcnode-id="4019" style="width:222px;"><a class="image" data-dcnode-id="4025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVehicle_Insurance_Certificate_in_India.pdf"><img alt="" class="thumbimage" data-dcnode-id="4026" data-file-height="1754" data-file-width="1239" decoding="async" height="311" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Vehicle_Insurance_Certificate_in_India.pdf/page1-220px-Vehicle_Insurance_Certificate_in_India.pdf.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Vehicle_Insurance_Certificate_in_India.pdf/page1-330px-Vehicle_Insurance_Certificate_in_India.pdf.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Vehicle_Insurance_Certificate_in_India.pdf/page1-440px-Vehicle_Insurance_Certificate_in_India.pdf.jpg 2x" width="220"></a><span data-dcnode-id="4024" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4020"><div class="magnify" data-dcnode-id="4022"><a class="internal" data-dcnode-id="4023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVehicle_Insurance_Certificate_in_India.pdf" title="Enlarge"></a></div><span data-dcnode-id="4021" instrument_node="">A Sample Vehicle Insurance Certificate in India</span></div></div></div><span data-dcnode-id="4017" instrument_node="">
</span><p data-dcnode-id="4009"><span data-dcnode-id="4016" instrument_node="">Auto insurance in India deals with the insurance covers for the loss or damage caused to the automobile or its parts due to natural and man-made calamities. It provides </span><i data-dcnode-id="4014"><span data-dcnode-id="4015" instrument_node="">accident cover for individual owners</span></i><span data-dcnode-id="4013" instrument_node=""> of the vehicle while driving and also for </span><i data-dcnode-id="4011"><span data-dcnode-id="4012" instrument_node="">passengers and third-party legal liability</span></i><span data-dcnode-id="4010" instrument_node="">. There are certain general insurance companies who also offer online insurance service for the vehicle.
</span></p><p data-dcnode-id="4007"><span data-dcnode-id="4008" instrument_node="">Auto insurance in India is a compulsory requirement for all new vehicles used whether for commercial or personal use. The insurance companies have tie-ups with leading automobile manufacturers. They offer their customers instant auto quotes. Auto premium is determined by a number of factors and the amount of premium increases with the rise in the price of the vehicle. The claims of the auto insurance in India can be accidental, theft claims or third-party claims. Certain documents are required for claiming auto insurance in India, like duly signed claim form, RC copy of the vehicle, driving license copy, FIR copy, original estimate and policy copy.
</span></p><p data-dcnode-id="4005"><span data-dcnode-id="4006" instrument_node="">There are different types of auto insurance in India:
</span></p><p data-dcnode-id="3999"><span data-dcnode-id="4004" instrument_node="">Private Car Insurance – Private Car Insurance is the fastest growing sector in India as it is compulsory for all the new cars. The amount of premium depends on the make and value of the car, state where the car is registered and the year of manufacture. This amount can be reduced by asking the insurer for No Claim Bonus (NCB) if no claim is made for insurance in previous year.</span><sup class="reference" data-dcnode-id="4001" id="cite_ref-24"><a data-dcnode-id="4002" href="#cite_note-24"><span data-dcnode-id="4003" instrument_node="">[24]</span></a></sup><span data-dcnode-id="4000" instrument_node="">
</span></p><p data-dcnode-id="3997"><span data-dcnode-id="3998" instrument_node="">Two Wheeler Insurance – The Two Wheeler Insurance in India covers accidental insurance for the drivers of the vehicle. The amount of premium depends on the current showroom price multiplied by the depreciation rate fixed by the Tariff Advisory Committee at the beginning of a policy period.
</span></p><p data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">Commercial Vehicle Insurance – Commercial Vehicle Insurance in India provides cover for all the vehicles which are not used for personal purposes like trucks and HMVs. The amount of premium depends on the showroom price of the vehicle at the commencement of the insurance period, make of the vehicle and the place of registration of the vehicle.
The auto insurance generally includes:
</span></p><span data-dcnode-id="3994" instrument_node="">
</span><ul data-dcnode-id="3985"><li data-dcnode-id="3992"><span data-dcnode-id="3993" instrument_node="">Loss or damage by accident, fire, lightning, self ignition, external explosion, burglary, housebreaking or theft, malicious act</span></li><span data-dcnode-id="3991" instrument_node="">
</span><li data-dcnode-id="3989"><span data-dcnode-id="3990" instrument_node="">Liability for third-party injury/death, third-party property and liability to paid driver</span></li><span data-dcnode-id="3988" instrument_node="">
</span><li data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">On payment of appropriate additional premium, loss/damage to electrical/electronic accessories</span></li></ul><span data-dcnode-id="3984" instrument_node="">
</span><p data-dcnode-id="3982"><span data-dcnode-id="3983" instrument_node="">The auto insurance does not include:
</span></p><span data-dcnode-id="3981" instrument_node="">
</span><ul data-dcnode-id="3972"><li data-dcnode-id="3979"><span data-dcnode-id="3980" instrument_node="">Consequential loss, depreciation, mechanical and electrical breakdown, failure or breakage</span></li><span data-dcnode-id="3978" instrument_node="">
</span><li data-dcnode-id="3976"><span data-dcnode-id="3977" instrument_node="">When vehicle is used outside the geographical area</span></li><span data-dcnode-id="3975" instrument_node="">
</span><li data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node="">War or nuclear perils and drunken driving</span></li></ul><span data-dcnode-id="3971" instrument_node="">
</span><h4 data-dcnode-id="3961"><span class="mw-headline" data-dcnode-id="3969" id="Third-party_insurance"><span data-dcnode-id="3970" instrument_node="">Third-party insurance</span></span><span class="mw-editsection" data-dcnode-id="3962"><span class="mw-editsection-bracket" data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">[</span></span><a data-dcnode-id="3965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D15" title="Edit section: Third-party insurance"><span data-dcnode-id="3966" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3960" instrument_node="">
</span><p data-dcnode-id="3950"><span data-dcnode-id="3959" instrument_node="">This cover is mandatory in India under the Motor Vehicles Act, 1988. This cover cannot be used for personal damages. This is offered at low premiums and allows for third-party claims under "no-fault liability". The premium is calculated through the rates provided by the Tariff Advisory Committee. This is a branch of the IRDA (Insurance Regulatory and Development Authority of India). It covers bodily injury/accidental death and property damage.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3952" style="white-space:nowrap;"><span data-dcnode-id="3958" instrument_node="">[</span><i data-dcnode-id="3954"><a data-dcnode-id="3955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3956" title="This claim needs references to reliable sources. (January 2019)"><span data-dcnode-id="3957" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3953" instrument_node="">]</span></sup><span data-dcnode-id="3951" instrument_node="">
</span></p><span data-dcnode-id="3949" instrument_node="">
</span><h3 data-dcnode-id="3939"><span class="mw-headline" data-dcnode-id="3947" id="Ireland"><span data-dcnode-id="3948" instrument_node="">Ireland</span></span><span class="mw-editsection" data-dcnode-id="3940"><span class="mw-editsection-bracket" data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">[</span></span><a data-dcnode-id="3943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D16" title="Edit section: Ireland"><span data-dcnode-id="3944" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3941"><span data-dcnode-id="3942" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3938" instrument_node="">
</span><p data-dcnode-id="3925"><span data-dcnode-id="3937" instrument_node="">The Road Traffic Act, 1933 requires all drivers of mechanically propelled vehicles in public places to have at least third-party insurance, or to have obtained exemption – generally by depositing a (large) sum of money to the High Court as a guarantee against claims. In 1933, this figure was set at </span><a data-dcnode-id="3935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Irish_pound" title="Irish pound"><span data-dcnode-id="3936" instrument_node="">£</span></a><span data-dcnode-id="3934" instrument_node="">15,000.</span><sup class="reference" data-dcnode-id="3931" id="cite_ref-25"><a data-dcnode-id="3932" href="#cite_note-25"><span data-dcnode-id="3933" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3930" instrument_node=""> The Road Traffic Act, 1961</span><sup class="reference" data-dcnode-id="3927" id="cite_ref-26"><a data-dcnode-id="3928" href="#cite_note-26"><span data-dcnode-id="3929" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3926" instrument_node=""> (which is currently in force) repealed the 1933 act but replaced these sections with functionally identical sections.
</span></p><p data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">From 1968, those making deposits require the consent of the Minister for Transport to do so, with the sum specified by the Minister.
</span></p><p data-dcnode-id="3907"><span data-dcnode-id="3922" instrument_node="">Those not exempted from obtaining insurance must obtain a certificate of insurance from their insurance provider, and display a portion of this (an </span><a class="new" data-dcnode-id="3920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DInsurance_disc%26action%3Dedit%26redlink%3D1" title="Insurance disc (page does not exist)"><span data-dcnode-id="3921" instrument_node="">insurance disc</span></a><span data-dcnode-id="3919" instrument_node="">) on their vehicles' windscreen (if fitted).</span><sup class="reference" data-dcnode-id="3916" id="cite_ref-27"><a data-dcnode-id="3917" href="#cite_note-27"><span data-dcnode-id="3918" instrument_node="">[27]</span></a></sup><span data-dcnode-id="3915" instrument_node=""> The certificate in full must be presented to a police station within ten days if requested by an officer. Proof of having insurance or an exemption must also be provided to pay for the </span><a class="mw-redirect" data-dcnode-id="3913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Motor_Tax_in_the_Republic_of_Ireland" title="Motor Tax in the Republic of Ireland"><span data-dcnode-id="3914" instrument_node="">motor tax</span></a><span data-dcnode-id="3912" instrument_node="">.</span><sup class="reference" data-dcnode-id="3909" id="cite_ref-28"><a data-dcnode-id="3910" href="#cite_note-28"><span data-dcnode-id="3911" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3908" instrument_node="">
</span></p><p data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">Those injured or suffering property damage/loss due to uninsured drivers can claim against the Motor Insurance Bureau of Ireland's uninsured drivers fund, as can those injured (but not those suffering damage or loss) from hit and run offences.
</span></p><span data-dcnode-id="3904" instrument_node="">
</span><h3 data-dcnode-id="3894"><span class="mw-headline" data-dcnode-id="3902" id="Italy"><span data-dcnode-id="3903" instrument_node="">Italy</span></span><span class="mw-editsection" data-dcnode-id="3895"><span class="mw-editsection-bracket" data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">[</span></span><a data-dcnode-id="3898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D17" title="Edit section: Italy"><span data-dcnode-id="3899" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3893" instrument_node="">
</span><p data-dcnode-id="3882"><span data-dcnode-id="3892" instrument_node="">The law 990/1969 requires that each motor vehicle or trailer standing or moving on a public road have third-party insurance (called RCA, </span><i data-dcnode-id="3890"><span data-dcnode-id="3891" instrument_node="">Responsabilità civile per gli autoveicoli</span></i><span data-dcnode-id="3889" instrument_node="">). Historically, a part of the certificate of insurance must be displayed on the windscreen of the vehicle. This latter requirement was revoked in 2015, when a national database of insured vehicles was built by the Insurance Company Association (ANIA, </span><i data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">Associazione Nazionale Imprese Assicuratrici</span></i><span data-dcnode-id="3886" instrument_node="">) and the National Transportation Authority (</span><i data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">Motorizzazione Civile</span></i><span data-dcnode-id="3883" instrument_node="">) to verify (by private citizens and public authorities) if a vehicle is insured. There is no exemption policy to this law disposition.
</span></p><p data-dcnode-id="3880"><span data-dcnode-id="3881" instrument_node="">Driving without the necessary insurance for that vehicle is an offence that can be prosecuted by the police and fines range from 841 to 3,287 euros. Police forces also have the power to seize a vehicle that does not have the necessary insurance in place, until the owner of the vehicle pays a fine and signs a new insurance policy. The same provision is applied when the vehicle is standing on a public road.
</span></p><p data-dcnode-id="3872"><span data-dcnode-id="3879" instrument_node="">Minimal insurance policies cover only third parties (including the insured person and third parties carried with the vehicle, but not the driver, if the two do not coincide). </span><i data-dcnode-id="3877"><span data-dcnode-id="3878" instrument_node="">Third parties, fire and theft</span></i><span data-dcnode-id="3876" instrument_node=""> is a common insurance policy, while the all-inclusive policies (</span><i data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">kasko</span></i><span data-dcnode-id="3873" instrument_node=""> policy) which include also damages of the vehicle causing the accident or the injuries. It is also common to include a renounce clause of the insurance company to compensate the damages against the insured person in some cases (usually in case of DUI or other infringement of the law by the driver).
</span></p><p data-dcnode-id="3867"><span data-dcnode-id="3871" instrument_node="">The victims of accidents caused by non-insured vehicles could be compensated by the Road's Victim Warranty Fund (</span><i data-dcnode-id="3869"><span data-dcnode-id="3870" instrument_node="">Fondo garanzia vittime della strada</span></i><span data-dcnode-id="3868" instrument_node="">), which is covered by a fixed amount (2.5%, as 2015) of each RCA insurance premium.
</span></p><span data-dcnode-id="3866" instrument_node="">
</span><h3 data-dcnode-id="3856"><span class="mw-headline" data-dcnode-id="3864" id="Netherlands"><span data-dcnode-id="3865" instrument_node="">Netherlands</span></span><span class="mw-editsection" data-dcnode-id="3857"><span class="mw-editsection-bracket" data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">[</span></span><a data-dcnode-id="3860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D18" title="Edit section: Netherlands"><span data-dcnode-id="3861" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3858"><span data-dcnode-id="3859" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3855" instrument_node="">
</span><p data-dcnode-id="3813"><span data-dcnode-id="3854" instrument_node="">Third-party vehicle insurance is a mandatory requirement for every vehicle in the Netherlands.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3847" style="white-space:nowrap;"><span data-dcnode-id="3853" instrument_node="">[</span><i data-dcnode-id="3849"><a data-dcnode-id="3850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3851" title="This claim needs references to reliable sources. (May 2020)"><span data-dcnode-id="3852" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3848" instrument_node="">]</span></sup><span data-dcnode-id="3846" instrument_node=""> This obligation is mandatory based on article 2 of the “Wet aansprakelijkheidsverzekering motorrijtuigen”.</span><sup class="reference" data-dcnode-id="3843" id="cite_ref-29"><a data-dcnode-id="3844" href="#cite_note-29"><span data-dcnode-id="3845" instrument_node="">[29]</span></a></sup><span data-dcnode-id="3842" instrument_node=""> When a vehicle is not insured the owner will receive a fine from the RDW ( </span><a class="new" data-dcnode-id="3840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNetherlands_Vehicle_Authority%26action%3Dedit%26redlink%3D1" title="Netherlands Vehicle Authority (page does not exist)"><span data-dcnode-id="3841" instrument_node="">Netherlands Vehicle Authority</span></a><span class="noprint" data-dcnode-id="3835" style="font-size:85%; font-style: normal;"><span data-dcnode-id="3839" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="3837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nl.wikipedia.org/wiki/RDW_%28Dienst_Wegverkeer%29" title="nl:RDW (Dienst Wegverkeer)"><span data-dcnode-id="3838" instrument_node="">nl</span></a><span data-dcnode-id="3836" instrument_node="">]</span></span><span data-dcnode-id="3834" instrument_node="">).</span><sup class="reference" data-dcnode-id="3831" id="cite_ref-30"><a data-dcnode-id="3832" href="#cite_note-30"><span data-dcnode-id="3833" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3830" instrument_node=""> The third-party vehicle insurance is called a “WA verzekering” where WA stands for “Wettelijke aansprakelijkheid” which means legal liability.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3823" style="white-space:nowrap;"><span data-dcnode-id="3829" instrument_node="">[</span><i data-dcnode-id="3825"><a data-dcnode-id="3826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3827" title="This claim needs references to reliable sources. (May 2020)"><span data-dcnode-id="3828" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3824" instrument_node="">]</span></sup><span data-dcnode-id="3822" instrument_node=""> In general there are three types of auto insurance in the Netherlands. The “WA verzekering”, “WA beperkt casco” limited frame coverage and the “WA vollledig casco” full frame coverage. The limited frame and the full frame coverage will provide more coverage against certain additional risks which are not covered by the mandatory legal third-party coverage. For example the limited frame coverage will provide coverage against damage caused by the weather such as storm and flooding. Also fire damage and theft of the car is covered. The full frame coverage will provide coverage against all risks mentioned plus damage to the own car caused by the driver himself.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3815" style="white-space:nowrap;"><span data-dcnode-id="3821" instrument_node="">[</span><i data-dcnode-id="3817"><a data-dcnode-id="3818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3819" title="This claim needs references to reliable sources. (May 2020)"><span data-dcnode-id="3820" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3816" instrument_node="">]</span></sup><span data-dcnode-id="3814" instrument_node="">
</span></p><span data-dcnode-id="3812" instrument_node="">
</span><h3 data-dcnode-id="3802"><span class="mw-headline" data-dcnode-id="3810" id="New_Zealand"><span data-dcnode-id="3811" instrument_node="">New Zealand</span></span><span class="mw-editsection" data-dcnode-id="3803"><span class="mw-editsection-bracket" data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">[</span></span><a data-dcnode-id="3806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D19" title="Edit section: New Zealand"><span data-dcnode-id="3807" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3804"><span data-dcnode-id="3805" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3801" instrument_node="">
</span><p data-dcnode-id="3788"><span data-dcnode-id="3800" instrument_node="">Within New Zealand, the </span><a data-dcnode-id="3798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Accident_Compensation_Corporation" title="Accident Compensation Corporation"><span data-dcnode-id="3799" instrument_node="">Accident Compensation Corporation</span></a><span data-dcnode-id="3797" instrument_node=""> (ACC) provides nationwide no-fault personal injury insurance.</span><sup class="reference" data-dcnode-id="3794" id="cite_ref-31"><a data-dcnode-id="3795" href="#cite_note-31"><span data-dcnode-id="3796" instrument_node="">[31]</span></a></sup><span data-dcnode-id="3793" instrument_node=""> Injuries involving motor vehicles operating on public roads are covered by the Motor Vehicle Account, for which premiums are collected through levies on petrol and through vehicle licensing fees.</span><sup class="reference" data-dcnode-id="3790" id="cite_ref-32"><a data-dcnode-id="3791" href="#cite_note-32"><span data-dcnode-id="3792" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3789" instrument_node="">
</span></p><span data-dcnode-id="3787" instrument_node="">
