</span><h3 data-dcnode-id="3777"><span class="mw-headline" data-dcnode-id="3785" id="Norway"><span data-dcnode-id="3786" instrument_node="">Norway</span></span><span class="mw-editsection" data-dcnode-id="3778"><span class="mw-editsection-bracket" data-dcnode-id="3783"><span data-dcnode-id="3784" instrument_node="">[</span></span><a data-dcnode-id="3781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D20" title="Edit section: Norway"><span data-dcnode-id="3782" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3776" instrument_node="">
</span><p data-dcnode-id="3774"><span data-dcnode-id="3775" instrument_node="">In Norway, the vehicle owner must provide the minimum of liability insurance for his/her vehicle(s) – of any kind. Otherwise, the vehicle is illegal to use. If a person drives a vehicle belonging to someone else, and has an accident, the insurance will cover for damage done. Note that the policy carrier can choose to limit the coverage to only apply for family members or person over a certain age.
</span></p><span data-dcnode-id="3773" instrument_node="">
</span><h3 data-dcnode-id="3763"><span class="mw-headline" data-dcnode-id="3771" id="Romania"><span data-dcnode-id="3772" instrument_node="">Romania</span></span><span class="mw-editsection" data-dcnode-id="3764"><span class="mw-editsection-bracket" data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node="">[</span></span><a data-dcnode-id="3767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D21" title="Edit section: Romania"><span data-dcnode-id="3768" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3765"><span data-dcnode-id="3766" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3762" instrument_node="">
</span><p data-dcnode-id="3753"><span data-dcnode-id="3761" instrument_node="">Romanian law mandates </span><a data-dcnode-id="3759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_Auto_Liability" title="Civil Auto Liability"><span data-dcnode-id="3760" instrument_node="">Răspundere Auto Civilă</span></a><span data-dcnode-id="3758" instrument_node="">, a motor-vehicle liability insurance for all vehicle owners to cover damages to third parties.</span><sup class="reference" data-dcnode-id="3755" id="cite_ref-33"><a data-dcnode-id="3756" href="#cite_note-33"><span data-dcnode-id="3757" instrument_node="">[33]</span></a></sup><span data-dcnode-id="3754" instrument_node="">
</span></p><span data-dcnode-id="3752" instrument_node="">
</span><h3 data-dcnode-id="3742"><span class="mw-headline" data-dcnode-id="3750" id="Russian_Federation"><span data-dcnode-id="3751" instrument_node="">Russian Federation</span></span><span class="mw-editsection" data-dcnode-id="3743"><span class="mw-editsection-bracket" data-dcnode-id="3748"><span data-dcnode-id="3749" instrument_node="">[</span></span><a data-dcnode-id="3746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D22" title="Edit section: Russian Federation"><span data-dcnode-id="3747" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3744"><span data-dcnode-id="3745" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3741" instrument_node="">
</span><p data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">Motor-vehicle liability insurance is mandatory for all owners according to Russian legislation. The insurance of the vehicle itself is technically voluntary, but may be mandated in some circumstances, e.g. car being leased.
</span></p><span data-dcnode-id="3738" instrument_node="">
</span><h3 data-dcnode-id="3728"><span class="mw-headline" data-dcnode-id="3736" id="South_Africa"><span data-dcnode-id="3737" instrument_node="">South Africa</span></span><span class="mw-editsection" data-dcnode-id="3729"><span class="mw-editsection-bracket" data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">[</span></span><a data-dcnode-id="3732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D23" title="Edit section: South Africa"><span data-dcnode-id="3733" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3730"><span data-dcnode-id="3731" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3727" instrument_node="">
</span><p data-dcnode-id="3715"><span data-dcnode-id="3726" instrument_node="">South Africa allocates a percentage of the money from fuel into the </span><a data-dcnode-id="3724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Road_Accident_Fund" title="Road Accident Fund"><span data-dcnode-id="3725" instrument_node="">Road Accident Fund</span></a><span data-dcnode-id="3723" instrument_node="">, which goes towards compensating third parties in accidents.</span><sup class="reference" data-dcnode-id="3720" id="cite_ref-34"><a data-dcnode-id="3721" href="#cite_note-34"><span data-dcnode-id="3722" instrument_node="">[34]</span></a></sup><sup class="reference" data-dcnode-id="3717" id="cite_ref-35"><a data-dcnode-id="3718" href="#cite_note-35"><span data-dcnode-id="3719" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3716" instrument_node="">
</span></p><span data-dcnode-id="3714" instrument_node="">
</span><h3 data-dcnode-id="3704"><span class="mw-headline" data-dcnode-id="3712" id="Spain"><span data-dcnode-id="3713" instrument_node="">Spain</span></span><span class="mw-editsection" data-dcnode-id="3705"><span class="mw-editsection-bracket" data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">[</span></span><a data-dcnode-id="3708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D24" title="Edit section: Spain"><span data-dcnode-id="3709" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3703" instrument_node="">
</span><p data-dcnode-id="3701"><span data-dcnode-id="3702" instrument_node="">Each motor vehicle on a public road to have a third-party insurance (called "Seguro de responsabilidad civil").
</span></p><p data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">Police forces have the power to seize vehicles that do not have the necessary insurance in place, until the owner of the vehicle pays the fine and signs a new insurance policy. Driving without the necessary insurance for that vehicle is an offence that will be prosecuted by the police and will receive penalty. Same provision is applied when the vehicle is standing on a public road.
</span></p><p data-dcnode-id="3694"><span data-dcnode-id="3698" instrument_node="">The minimal insurance policies cover only third parties (included the insured person and third parties carried with the vehicle, but not the driver, if the two do not coincide). </span><i data-dcnode-id="3696"><span data-dcnode-id="3697" instrument_node="">Third parties, fire and theft</span></i><span data-dcnode-id="3695" instrument_node=""> is a common insurance policy.
</span></p><p data-dcnode-id="3692"><span data-dcnode-id="3693" instrument_node="">The victims of accidents caused by non-insured vehicles could be compensated by a Warranty Fund, which is covered by a fixed amount of each insurance premium.
</span></p><p data-dcnode-id="3686"><span data-dcnode-id="3691" instrument_node="">Since 2013 it is possible to contract an insurance by days as is possible in countries such as Germany and the U.K.</span><sup class="reference" data-dcnode-id="3688" id="cite_ref-36"><a data-dcnode-id="3689" href="#cite_note-36"><span data-dcnode-id="3690" instrument_node="">[36]</span></a></sup><span data-dcnode-id="3687" instrument_node="">
</span></p><span data-dcnode-id="3685" instrument_node="">
</span><h3 data-dcnode-id="3675"><span class="mw-headline" data-dcnode-id="3683" id="United_Arab_Emirates"><span data-dcnode-id="3684" instrument_node="">United Arab Emirates</span></span><span class="mw-editsection" data-dcnode-id="3676"><span class="mw-editsection-bracket" data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">[</span></span><a data-dcnode-id="3679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D25" title="Edit section: United Arab Emirates"><span data-dcnode-id="3680" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3677"><span data-dcnode-id="3678" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3674" instrument_node="">
</span><p data-dcnode-id="3660"><span data-dcnode-id="3673" instrument_node="">When buying car insurance in the United Arab Emirates, the traffic department requires a 13-month insurance certificate each time a person registers or renews a vehicle registration. In Dubai, vehicle insurance is compulsory as per the UAE RTA law.</span><sup class="reference" data-dcnode-id="3670" id="cite_ref-37"><a data-dcnode-id="3671" href="#cite_note-37"><span data-dcnode-id="3672" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3669" instrument_node=""> There are two types of motor insurance policies in Dubai, Third-Party Liability Insurance and Comprehensive Motor Insurance.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3662" style="white-space:nowrap;"><span data-dcnode-id="3668" instrument_node="">[</span><i data-dcnode-id="3664"><a data-dcnode-id="3665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3666" title="This claim needs references to reliable sources. (July 2019)"><span data-dcnode-id="3667" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3663" instrument_node="">]</span></sup><span data-dcnode-id="3661" instrument_node="">
</span></p><p data-dcnode-id="3650"><span data-dcnode-id="3659" instrument_node="">It is mandatory to have third-party liability insurance for every individual vehicle owner in Dubai. This insurance policy is the most basic form of vehicle insurance Dubai as it covers the third-party property damage or bodily injuries caused by the insured vehicle.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3652" style="white-space:nowrap;"><span data-dcnode-id="3658" instrument_node="">[</span><i data-dcnode-id="3654"><a data-dcnode-id="3655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3656" title="This claim needs references to reliable sources. (July 2019)"><span data-dcnode-id="3657" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3653" instrument_node="">]</span></sup><span data-dcnode-id="3651" instrument_node="">
</span></p><p data-dcnode-id="3640"><span data-dcnode-id="3649" instrument_node="">Policyholder's own vehicle damage such as fire, theft, and accidental collision is not covered under the third-party liability insurance policy.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3642" style="white-space:nowrap;"><span data-dcnode-id="3648" instrument_node="">[</span><i data-dcnode-id="3644"><a data-dcnode-id="3645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3646" title="This claim needs references to reliable sources. (July 2019)"><span data-dcnode-id="3647" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3643" instrument_node="">]</span></sup><span data-dcnode-id="3641" instrument_node="">
</span></p><span data-dcnode-id="3639" instrument_node="">
</span><h3 data-dcnode-id="3629"><span class="mw-headline" data-dcnode-id="3637" id="United_Kingdom"><span data-dcnode-id="3638" instrument_node="">United Kingdom</span></span><span class="mw-editsection" data-dcnode-id="3630"><span class="mw-editsection-bracket" data-dcnode-id="3635"><span data-dcnode-id="3636" instrument_node="">[</span></span><a data-dcnode-id="3633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D26" title="Edit section: United Kingdom"><span data-dcnode-id="3634" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3631"><span data-dcnode-id="3632" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3628" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3616"><div class="thumbinner" data-dcnode-id="3617" style="width:222px;"><a class="image" data-dcnode-id="3626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUninsured_cars_seized_by_police_in_Liverpool.JPG"><img alt="" class="thumbimage" data-dcnode-id="3627" data-file-height="1536" data-file-width="2048" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/88/Uninsured_cars_seized_by_police_in_Liverpool.JPG/220px-Uninsured_cars_seized_by_police_in_Liverpool.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/88/Uninsured_cars_seized_by_police_in_Liverpool.JPG/330px-Uninsured_cars_seized_by_police_in_Liverpool.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/88/Uninsured_cars_seized_by_police_in_Liverpool.JPG/440px-Uninsured_cars_seized_by_police_in_Liverpool.JPG 2x" width="220"></a><span data-dcnode-id="3625" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3618"><div class="magnify" data-dcnode-id="3623"><a class="internal" data-dcnode-id="3624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUninsured_cars_seized_by_police_in_Liverpool.JPG" title="Enlarge"></a></div><span data-dcnode-id="3622" instrument_node="">Uninsured cars seized by </span><a data-dcnode-id="3620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merseyside_Police" title="Merseyside Police"><span data-dcnode-id="3621" instrument_node="">Merseyside Police</span></a><span data-dcnode-id="3619" instrument_node=""> on display outside the force's headquarters in 2006</span></div></div></div><span data-dcnode-id="3615" instrument_node="">
</span><p data-dcnode-id="3595"><span data-dcnode-id="3614" instrument_node="">In 1930, the UK Government introduced a law that required every person who used a vehicle on the road to have at least third-party personal injury insurance. Today, this law is defined by the </span><a data-dcnode-id="3612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Road_Traffic_Act_1988" title="Road Traffic Act 1988"><span data-dcnode-id="3613" instrument_node="">Road Traffic Act 1988</span></a><span data-dcnode-id="3611" instrument_node="">,</span><sup class="reference" data-dcnode-id="3608" id="cite_ref-38"><a data-dcnode-id="3609" href="#cite_note-38"><span data-dcnode-id="3610" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3607" instrument_node=""> (generally referred to as the RTA 1988 as amended) which was last modified in 1991</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3600" style="white-space:nowrap;"><span data-dcnode-id="3606" instrument_node="">[</span><i data-dcnode-id="3602"><a data-dcnode-id="3603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3604" title="This suggests last updated 2018 (January 2019)"><span data-dcnode-id="3605" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3601" instrument_node="">]</span></sup><span data-dcnode-id="3599" instrument_node="">. The Act requires that motorists either be insured, or have made a specified deposit (</span><a class="mw-redirect" data-dcnode-id="3597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GBP" title="GBP"><span data-dcnode-id="3598" instrument_node="">£</span></a><span data-dcnode-id="3596" instrument_node="">500,000 in 1991) and keeps the sum deposited with the Accountant General of the Supreme Court, against liability for injuries to others (including passengers) and for damage to other persons' property, resulting from use of a vehicle on a public road or in other public places.
</span></p><p data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">It is an offence to use a motor vehicle, or allow others to use it without insurance that satisfies the requirements of the Act. This requirement applies while any part of a vehicle (even if a greater part of it is on private land) is on the public highway. No such legislation applies on private land. However, private land to which the public have a reasonable right of access (for example, a supermarket car park during opening hours) is considered to be included within the requirements of the Act.
</span></p><p data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">Police have the power to seize vehicles that do not appear to have necessary insurance in place. A driver caught driving without insurance for the vehicle he/she is in charge of for the purposes of driving, is liable to be prosecuted by the police and, upon conviction, will receive either a fixed penalty or magistrate's courts penalty.
</span></p><p data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">The registration number of the vehicle shown on the insurance policy, along with other relevant information including the effective dates of cover are transmitted electronically to the UK's Motor Insurance Database (MID) which exists to help reduce incidents of uninsured driving in the territory. The Police are able to spot-check vehicles that pass within range of automated number plate recognition (ANPR) cameras, that can search the MID instantly. Proof of insurance lies entirely with the issue of a Certificate of Motor Insurance, or cover note, by an Authorised Insurer which, to be valid, must have been previously 'delivered' to the insured person in accordance with the Act, and be printed in black ink on white paper.
</span></p><p data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">The insurance certificate or cover note issued by the insurance company constitutes the only legal evidence that the policy to which the certificate relates satisfies the requirements of the relevant law applicable in Great Britain, Northern Ireland, the Isle of Man, the Island of Guernsey, the Island of Jersey and the Island of Alderney. The Act states that an authorised person, such as a police officer, may require a driver to produce an insurance certificate for inspection. If the driver cannot show the document immediately on request, and evidence of insurance cannot be found by other means such as the MID, then the Police are empowered to seize the vehicle instantly.
</span></p><p data-dcnode-id="3585"><span data-dcnode-id="3586" instrument_node="">The immediate impounding of an apparently uninsured vehicle replaces the former method of dealing with insurance spot-checks where drivers were issued with an HORT/1 (so-called because the order was form number 1 issued by the Home Office Road Traffic dept). This 'ticket' was an order requiring that within seven days, from midnight of the date of issue, the driver concerned was to take a valid insurance certificate (and usually other driving documents as well) to a police station of the driver's choice. Failure to produce an insurance certificate was, and still is, an offence. The HORT/1 was commonly known – even by the issuing authorities when dealing with the public – as a "Producer". As these are seldom issued now and the MID relied upon to indicate the presence of insurance or not, it is incumbent upon the insurance industry to accurately and swiftly update the MID with current policy details and insurers that fail to do so can be penalised by their regulating body.
</span></p><p data-dcnode-id="3579"><span data-dcnode-id="3584" instrument_node="">Vehicles kept in the UK must now be continuously insured unless a Statutory Off Road Notification (SORN) has been formally submitted. This requirement arose following a change in the law in June 2011 when a regulation known as Continuous Insurance Enforcement (CIE) came into force. The effect of this was that in the UK a vehicle that is not declared SORN, must have a valid insurance policy in force whether or not it is kept on public roads and whether or not it is driven.</span><sup class="reference" data-dcnode-id="3581" id="cite_ref-39"><a data-dcnode-id="3582" href="#cite_note-39"><span data-dcnode-id="3583" instrument_node="">[39]</span></a></sup><span data-dcnode-id="3580" instrument_node="">
</span></p><p data-dcnode-id="3563"><span data-dcnode-id="3578" instrument_node="">Insurer, and </span><a class="mw-redirect" data-dcnode-id="3576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_disc" title="Tax disc"><span data-dcnode-id="3577" instrument_node="">Vehicle Excise Duty (VED) / licence</span></a><span data-dcnode-id="3575" instrument_node=""> data, are shared by the relevant authorities including the police and this forms an integral part of the mechanism of CIE. All UK registered vehicles, including those that are exempt from VED (for example, Historic Vehicles and cars with low or zero emissions) are subject to the VED taxation application process. Part of this is a check on the vehicle's insurance. A physical receipt for the payment of VED was issued by way of a paper disc which, prior to 1 October 2014, meant that all motorists in the UK were required to prominently display the tax disc on their vehicle when it was kept or driven on public roads. This helped to ensure that most people had adequate insurance on their vehicles because insurance cover was required to purchase a disc, although the insurance must merely have been valid at the time of purchase and not necessarily for the life of the tax disc.</span><sup class="reference" data-dcnode-id="3572" id="cite_ref-40"><a data-dcnode-id="3573" href="#cite_note-40"><span data-dcnode-id="3574" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3571" instrument_node="">  To address the problems that arise where a vehicle's insurance was subsequently cancelled but the tax disc remained in force and displayed on the vehicle and the vehicle then used without insurance, the CIE regulations are now able to be applied as the Driver &amp; Vehicle Licence Authority (DVLA) and the MID databases are shared in real-time meaning that a taxed but uninsured vehicle is easily detectable by both authorities and Traffic Police. From 1 October 2014, it is no longer a legal requirement to display a </span><a class="mw-redirect" data-dcnode-id="3569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_disc" title="Tax disc"><span data-dcnode-id="3570" instrument_node="">vehicle excise licence</span></a><span data-dcnode-id="3568" instrument_node=""> (tax disc) on a vehicle.</span><sup class="reference" data-dcnode-id="3565" id="cite_ref-41"><a data-dcnode-id="3566" href="#cite_note-41"><span data-dcnode-id="3567" instrument_node="">[41]</span></a></sup><span data-dcnode-id="3564" instrument_node=""> This has come about because the whole VED process can now be administered electronically and alongside the MID, doing away with the expense, to the UK Government, of issuing paper discs.
</span></p><p data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">If a vehicle is to be "laid up" for whatever reason, a Statutory Off Road Notification (SORN) must be submitted to the DVLA to declare that the vehicle is off the public roads and will not return to them unless the SORN is cancelled by the vehicle's owner. Once a vehicle has been declared 'SORN' then the legal requirement to insure it ceases, although many vehicle owners may desire to maintain cover for loss of or damage to the vehicle while it is off the road. A vehicle that is then to be put back on the road must be subject to a new application for VED and be insured. Part of the VED application requires an electronic check of the MID, in this way the lawful presence of a vehicle on the road for both VED and insurance purposes is reinforced. It follows that the only circumstances in which a vehicle can have no insurance is if it has a valid SORN; was exempted from SORN (as untaxed on or before 31 October 1998 and has had no tax or SORN activity since); is recorded as 'stolen and not recovered' by the Police; is between registered keepers; or is scrapped.
</span></p><p data-dcnode-id="3550"><i data-dcnode-id="3558"><a data-dcnode-id="3559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/RTA_Insurer" title="RTA Insurer"><span data-dcnode-id="3560" instrument_node="">Road Traffic Act Only Insurance</span></a></i><span data-dcnode-id="3557" instrument_node=""> differs from </span><i data-dcnode-id="3555"><span data-dcnode-id="3556" instrument_node="">Third-Party-Only Insurance</span></i><span data-dcnode-id="3554" instrument_node=""> (detailed below) and is not often sold, unless to underpin, for example, a corporate body wishing to self-insure above the requirements of the Act. It provides the very minimum cover to satisfy the requirements of the Act. </span><i data-dcnode-id="3552"><span data-dcnode-id="3553" instrument_node="">Road Traffic Act Only Insurance</span></i><span data-dcnode-id="3551" instrument_node=""> has a limit of £1,000,000 for damage to third-party property, while third-party-only insurance typically has a greater limit for third-party property damage.
</span></p><p data-dcnode-id="3545"><span data-dcnode-id="3549" instrument_node="">Motor insurers in the UK place a limit on the amount that they are liable for in the event of a claim by third parties against a legitimate policy. This can be explained in part by the </span><a class="mw-redirect" data-dcnode-id="3547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Heck_Rail_Crash" title="Great Heck Rail Crash"><span data-dcnode-id="3548" instrument_node="">Great Heck Rail Crash</span></a><span data-dcnode-id="3546" instrument_node=""> that cost the insurers over £22,000,000 in compensation for the fatalities and damage to property caused by the actions of the insured driver of a motor vehicle that caused the disaster. No limit applies to claims from third parties for death or personal injury, however UK car insurance is now commonly limited to £20,000,000 for any claim or series of claims for loss of or damage to third-party property caused by or arising out of one incident.
</span></p><p data-dcnode-id="3537"><span data-dcnode-id="3544" instrument_node="">The minimum level of insurance cover generally available, and which satisfies the requirement of the Act, is called </span><i data-dcnode-id="3542"><span data-dcnode-id="3543" instrument_node="">third-party-only insurance</span></i><span data-dcnode-id="3541" instrument_node="">. The level of cover provided by </span><i data-dcnode-id="3539"><span data-dcnode-id="3540" instrument_node="">Third-party-only insurance</span></i><span data-dcnode-id="3538" instrument_node=""> is basic, but does exceed the requirements of the act. This insurance covers any liability to third parties, but does not cover any other risks.
</span></p><p data-dcnode-id="3532"><span data-dcnode-id="3536" instrument_node="">More commonly purchased is </span><i data-dcnode-id="3534"><span data-dcnode-id="3535" instrument_node="">third party, fire and theft</span></i><span data-dcnode-id="3533" instrument_node="">. This covers all third-party liabilities and also covers the vehicle owner against the destruction of the vehicle by fire (whether malicious or due to a vehicle fault) and theft of the insured vehicle. It may or may not cover vandalism. This kind of insurance and the two preceding types do not cover damage to the vehicle caused by the driver or other hazards.
</span></p><p data-dcnode-id="3527"><i data-dcnode-id="3529"><a data-dcnode-id="3530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Comprehensive_Cover" title="Comprehensive Cover"><span data-dcnode-id="3531" instrument_node="">Comprehensive insurance</span></a></i><span data-dcnode-id="3528" instrument_node=""> covers all of the above and damage to the vehicle caused by the driver themselves, as well as vandalism and other risks. This is usually the most expensive type of insurance. It is custom in the UK for insurance customers to refer to their Comprehensive Insurance as "Fully Comprehensive" or popularly, "Fully Comp". This is a tautology as the word 'Comprehensive' means full.  
</span></p><p data-dcnode-id="3525"><span data-dcnode-id="3526" instrument_node="">Some classes of vehicle ownership, or use, are "Crown Exempt" from the requirement to be covered under the Act including vehicles owned or operated by certain councils and local authorities, national park authorities, education authorities, police authorities, fire authorities, health service bodies, the security services and vehicles used to or from Shipping Salvage purposes. Although exempt from the requirement to insure, this provides no immunity against claims being made against them, so an otherwise Crown Exempt authority may choose to insure conventionally, preferring to incur the known expense of insurance premiums rather than accept the open-ended exposure of effectively, self-insuring under Crown Exemption.
</span></p><p data-dcnode-id="3517"><span data-dcnode-id="3524" instrument_node="">The </span><a data-dcnode-id="3522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Motor_Insurers%2527_Bureau" title="Motor Insurers' Bureau"><span data-dcnode-id="3523" instrument_node="">Motor Insurers' Bureau</span></a><span data-dcnode-id="3521" instrument_node=""> (MIB) compensates the victims of road accidents caused by uninsured and untraced motorists. It also operates the MID, which contain details of every insured vehicle in the country and acts as a means to share information between </span><a data-dcnode-id="3519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Insurance" title="Insurance"><span data-dcnode-id="3520" instrument_node="">Insurance Companies</span></a><span data-dcnode-id="3518" instrument_node="">.
</span></p><p data-dcnode-id="3515"><span data-dcnode-id="3516" instrument_node="">Soon after the introduction of the Road Traffic Act in 1930, unexpected issues arose when motorists needed to drive a vehicle other than their own in genuine emergency circumstances. Volunteering to move a vehicle, for example, where another motorist had been taken ill or been involved in an accident, could lead to the "assisting" driver being prosecuted for no insurance if the other car's insurance did not cover use by any driver. To alleviate this loophole, an extension to UK Car Insurances was introduced allowing a Policyholder to personally drive any other motor car not belonging to him/her and not hired to him/her under a hire purchase or leasing agreement. This extension of cover, known as "Driving Other Cars" (where it is granted) usually applies to the Policyholder only. The cover provided is for Third-Party Risks only and there is absolutely no cover for loss of, or damage to the vehicle being driven. This aspect of UK motor insurance is the only one that purports to cover the driving of a vehicle, not use.
</span></p><p data-dcnode-id="3509"><span data-dcnode-id="3514" instrument_node="">On 1 March 2011, the European Court of Justice in Luxembourg ruled that gender could no longer be used by insurers to set car insurance premiums. The new ruling came into action from December 2012.</span><sup class="reference" data-dcnode-id="3511" id="cite_ref-42"><a data-dcnode-id="3512" href="#cite_note-42"><span data-dcnode-id="3513" instrument_node="">[42]</span></a></sup><span data-dcnode-id="3510" instrument_node="">
</span></p><span data-dcnode-id="3508" instrument_node="">
</span><h4 data-dcnode-id="3497"><span data-dcnode-id="3507" id="Investigation_into_repair_costs_.26_fraudulent_claims"></span><span class="mw-headline" data-dcnode-id="3505" id="Investigation_into_repair_costs_&amp;_fraudulent_claims"><span data-dcnode-id="3506" instrument_node="">Investigation into repair costs &amp; fraudulent claims</span></span><span class="mw-editsection" data-dcnode-id="3498"><span class="mw-editsection-bracket" data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">[</span></span><a data-dcnode-id="3501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D27" title="Edit section: Investigation into repair costs &amp; fraudulent claims"><span data-dcnode-id="3502" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3496" instrument_node="">
</span><p data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">In September 2012, it was announced that the Competition Commission had launched an investigation into the UK system for credit repairs and credit hire of an alternative vehicle leading to claims from third parties following an accident. Where their client is considered to be not at fault, Accident Management Companies will take over the running of their client's claim and arrange everything for them, usually on a 'No Win - No Fee' basis. It was shown that the insurers of the at-fault vehicle, were unable to intervene in order to have control over the costs that were applied to the claim by means of repairs, storage, vehicle hire, referral fees and personal injury. The subsequent cost of some items submitted for consideration has been a cause for concern over recent years as this has caused an increase in the premium costs, contrary to the general duty of all involved to mitigate the cost of claims. Also, the recent craze of "Cash for crash" has substantially raised the cost of policies. This is where two parties arrange a collision between their vehicles and one driver making excessive claims for damage and non-existent injuries to themselves and the passengers that they had arranged to be "in the vehicle" at the time of the collision. Another recent development has seen crashes being caused deliberately by a driver "slamming" on their brakes so that the driver behind hits them, this is usually carried out at roundabouts, when the following driver is looking to the right for oncoming traffic and does not notice that the vehicle in front has suddenly stopped for no reason. The 'staging' of a motor collision on the Public Highway for the purpose of attempting an insurance fraud is considered by the Courts to be organised crime and upon conviction is dealt with as such.
</span></p><span data-dcnode-id="3493" instrument_node="">
</span><h3 data-dcnode-id="3483"><span class="mw-headline" data-dcnode-id="3491" id="United_States"><span data-dcnode-id="3492" instrument_node="">United States</span></span><span class="mw-editsection" data-dcnode-id="3484"><span class="mw-editsection-bracket" data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">[</span></span><a data-dcnode-id="3487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D28" title="Edit section: United States"><span data-dcnode-id="3488" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3485"><span data-dcnode-id="3486" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3482" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="3476" role="note"><span data-dcnode-id="3479" instrument_node="">Main article: </span><a data-dcnode-id="3477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vehicle_insurance_in_the_United_States" title="Vehicle insurance in the United States"><span data-dcnode-id="3478" instrument_node="">Vehicle insurance in the United States</span></a></div><span data-dcnode-id="3475" instrument_node="">
</span><p data-dcnode-id="3451"><span data-dcnode-id="3474" instrument_node="">The regulations for vehicle insurance differ with each of the </span><a data-dcnode-id="3472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._state" title="U.S. state"><span data-dcnode-id="3473" instrument_node="">50 US states</span></a><span data-dcnode-id="3471" instrument_node=""> and other territories, with each U.S. state having its own mandatory minimum coverage requirements (</span><i data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">see separate main article</span></i><span data-dcnode-id="3468" instrument_node="">). Each of the 50 U.S. states and the District of Columbia requires drivers to have insurance coverage for both bodily injury and property damage, except New Hampshire and Virginia,  but the minimum amount of coverage required by law varies by state. For example, minimum bodily injury liability coverage requirements range from $30,000 in </span><a data-dcnode-id="3466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arizona" title="Arizona"><span data-dcnode-id="3467" instrument_node="">Arizona</span></a><sup class="reference" data-dcnode-id="3463" id="cite_ref-43"><a data-dcnode-id="3464" href="#cite_note-43"><span data-dcnode-id="3465" instrument_node="">[43]</span></a></sup><span data-dcnode-id="3462" instrument_node=""> to $100,000 in </span><a data-dcnode-id="3460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alaska" title="Alaska"><span data-dcnode-id="3461" instrument_node="">Alaska</span></a><span data-dcnode-id="3459" instrument_node=""> and </span><a data-dcnode-id="3457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maine" title="Maine"><span data-dcnode-id="3458" instrument_node="">Maine</span></a><span data-dcnode-id="3456" instrument_node="">,</span><sup class="reference" data-dcnode-id="3453" id="cite_ref-44"><a data-dcnode-id="3454" href="#cite_note-44"><span data-dcnode-id="3455" instrument_node="">[44]</span></a></sup><span data-dcnode-id="3452" instrument_node=""> while minimum property damage liability requirements range from $5,000 to $25,000 in most states.
</span></p><span data-dcnode-id="3450" instrument_node="">
</span><h3 data-dcnode-id="3440"><span class="mw-headline" data-dcnode-id="3448" id="Malaysia"><span data-dcnode-id="3449" instrument_node="">Malaysia</span></span><span class="mw-editsection" data-dcnode-id="3441"><span class="mw-editsection-bracket" data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">[</span></span><a data-dcnode-id="3444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D29" title="Edit section: Malaysia"><span data-dcnode-id="3445" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3442"><span data-dcnode-id="3443" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3439" instrument_node="">
</span><p data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">In Malaysia, renewing car insurances is a very common thing. In general, there are four types of car insurance available for Malaysians:
</span></p><span data-dcnode-id="3436" instrument_node="">
</span><ul data-dcnode-id="3433"><li data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">Act cover</span></li></ul><span data-dcnode-id="3432" instrument_node="">
</span><p data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">This is the minimum cover corresponding to the terms of the Road Transport Act 1987. The insurance concerns the legal liability for death or physical injury to the third party (not include the passengers), so it is hardly ever written by insurers.
</span></p><span data-dcnode-id="3429" instrument_node="">
</span><ul data-dcnode-id="3426"><li data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">Third-party coverage</span></li></ul><span data-dcnode-id="3425" instrument_node="">
</span><p data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">This type is compulsory to buy for every vehicle so it is the most basic and common car insurance, which insures you against claims for the injury or damage to the third party or its property in an accident.
</span></p><span data-dcnode-id="3422" instrument_node="">
</span><ul data-dcnode-id="3419"><li data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">Third-party, fire, and theft coverage</span></li></ul><span data-dcnode-id="3418" instrument_node="">
</span><p data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">In addition to third-party coverage, this policy also provides insurance for your own vehicle due to  fire accident or theft.
</span></p><span data-dcnode-id="3415" instrument_node="">
</span><ul data-dcnode-id="3412"><li data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">Comprehensive coverage</span></li></ul><span data-dcnode-id="3411" instrument_node="">
</span><p data-dcnode-id="3409"><span data-dcnode-id="3410" instrument_node="">This policy provides the widest coverage, i.e. the third party's physical injury and death, third party's vehicle damage and your own vehicle's damage caused by fire, theft or an accident. This type of insurance is usually designed for luxury vehicles.
</span></p><span data-dcnode-id="3408" instrument_node="">
</span><h2 data-dcnode-id="3398"><span class="mw-headline" data-dcnode-id="3406" id="Coverage_levels"><span data-dcnode-id="3407" instrument_node="">Coverage levels</span></span><span class="mw-editsection" data-dcnode-id="3399"><span class="mw-editsection-bracket" data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">[</span></span><a data-dcnode-id="3402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D30" title="Edit section: Coverage levels"><span data-dcnode-id="3403" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3400"><span data-dcnode-id="3401" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3397" instrument_node="">
</span><p data-dcnode-id="3395"><span data-dcnode-id="3396" instrument_node="">Vehicle insurance can cover some or all of the following items:
</span></p><span data-dcnode-id="3394" instrument_node="">
</span><ul data-dcnode-id="3367"><li data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">The insured party (medical payments)</span></li><span data-dcnode-id="3391" instrument_node="">
</span><li data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">Property damage caused by the insured</span></li><span data-dcnode-id="3388" instrument_node="">
</span><li data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">The insured vehicle (physical damage)</span></li><span data-dcnode-id="3385" instrument_node="">
</span><li data-dcnode-id="3383"><span data-dcnode-id="3384" instrument_node="">Third parties (car and people, property damage and bodily injury)</span></li><span data-dcnode-id="3382" instrument_node="">
</span><li data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">Third party, fire and theft</span></li><span data-dcnode-id="3379" instrument_node="">
</span><li data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">In some jurisdictions coverage for injuries to persons riding in the insured vehicle is available without regard to fault in the auto accident (No Fault Auto Insurance)</span></li><span data-dcnode-id="3376" instrument_node="">
</span><li data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">The cost to rent a vehicle if yours is damaged.</span></li><span data-dcnode-id="3373" instrument_node="">
</span><li data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">The cost to tow your vehicle to a repair facility.</span></li><span data-dcnode-id="3370" instrument_node="">
</span><li data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">Accidents involving uninsured motorists.</span></li></ul><span data-dcnode-id="3366" instrument_node="">
</span><p data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">Different policies specify the circumstances under which each item is covered. For example, a vehicle can be insured against theft, fire damage, or accident damage independently.
</span></p><p data-dcnode-id="3356"><span data-dcnode-id="3363" instrument_node="">If a vehicle is declared a </span><a data-dcnode-id="3361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Total_loss" title="Total loss"><span data-dcnode-id="3362" instrument_node="">total loss</span></a><span data-dcnode-id="3360" instrument_node=""> and the vehicle's market value is less than the amount that is still owed to the bank that is financing the vehicle, </span><a data-dcnode-id="3358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GAP_insurance" title="GAP insurance"><span data-dcnode-id="3359" instrument_node="">GAP insurance</span></a><span data-dcnode-id="3357" instrument_node=""> may cover the difference.  Not all auto insurance policies include GAP insurance.  GAP insurance is often offered by the finance company at time the vehicle is purchased.
</span></p><span data-dcnode-id="3355" instrument_node="">
</span><h2 data-dcnode-id="3345"><span class="mw-headline" data-dcnode-id="3353" id="Excess"><span data-dcnode-id="3354" instrument_node="">Excess</span></span><span class="mw-editsection" data-dcnode-id="3346"><span class="mw-editsection-bracket" data-dcnode-id="3351"><span data-dcnode-id="3352" instrument_node="">[</span></span><a data-dcnode-id="3349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D31" title="Edit section: Excess"><span data-dcnode-id="3350" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3344" instrument_node="">
</span><p data-dcnode-id="3333"><span data-dcnode-id="3343" instrument_node="">An excess payment, also known as a </span><a data-dcnode-id="3341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deductible" title="Deductible"><span data-dcnode-id="3342" instrument_node="">deductible</span></a><span data-dcnode-id="3340" instrument_node="">, is a fixed contribution that must be paid each time a car is repaired with the charges billed to an automotive insurance policy. Normally this payment is made directly to the accident repair "garage" (the term "garage" refers to an establishment where vehicles are serviced and repaired) when the owner collects the car. If one's car is declared to be a "</span><a class="mw-redirect" data-dcnode-id="3338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Write_off" title="Write off"><span data-dcnode-id="3339" instrument_node="">write-off</span></a><span data-dcnode-id="3337" instrument_node="">" (or "</span><a class="mw-redirect" data-dcnode-id="3335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Totaled" title="Totaled"><span data-dcnode-id="3336" instrument_node="">totaled</span></a><span data-dcnode-id="3334" instrument_node="">"), then the insurance company will deduct the excess agreed on the policy from the settlement payment it makes to the owner.
</span></p><p data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">If the accident was the other driver's fault, and this fault is accepted by the third party's insurer, then the vehicle owner may be able to reclaim the excess payment from the other person's insurance company.
</span></p><p data-dcnode-id="3321"><span data-dcnode-id="3330" instrument_node="">The excess itself can also be protected by a motor excess insurance policy.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3323" style="white-space:nowrap;"><span data-dcnode-id="3329" instrument_node="">[</span><i data-dcnode-id="3325"><a data-dcnode-id="3326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3327" title="This claim needs references to reliable sources. (July 2016)"><span data-dcnode-id="3328" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3324" instrument_node="">]</span></sup><span data-dcnode-id="3322" instrument_node="">
</span></p><span data-dcnode-id="3320" instrument_node="">
</span><h3 data-dcnode-id="3310"><span class="mw-headline" data-dcnode-id="3318" id="Compulsory_excess"><span data-dcnode-id="3319" instrument_node="">Compulsory excess</span></span><span class="mw-editsection" data-dcnode-id="3311"><span class="mw-editsection-bracket" data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">[</span></span><a data-dcnode-id="3314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D32" title="Edit section: Compulsory excess"><span data-dcnode-id="3315" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3309" instrument_node="">
</span><p data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">A compulsory excess is the minimum excess payment the insurer will accept on the insurance policy. Minimum excesses vary according to the personal details, driving record and the insurance company. For example, young or inexperienced drivers and types of incident can incur additional compulsory excess charges.
</span></p><span data-dcnode-id="3306" instrument_node="">
</span><h3 data-dcnode-id="3296"><span class="mw-headline" data-dcnode-id="3304" id="Voluntary_excess"><span data-dcnode-id="3305" instrument_node="">Voluntary excess</span></span><span class="mw-editsection" data-dcnode-id="3297"><span class="mw-editsection-bracket" data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node="">[</span></span><a data-dcnode-id="3300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D33" title="Edit section: Voluntary excess"><span data-dcnode-id="3301" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3295" instrument_node="">
</span><p data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">To reduce the insurance premium, the insured party may offer to pay a higher excess (deductible) than the compulsory excess demanded by the insurance company. The voluntary excess is the extra amount, over and above the compulsory excess, that is agreed to be paid in the event of a claim on the policy. As a bigger excess reduces the financial risk carried by the insurer, the insurer is able to offer a significantly lower premium.
</span></p><span data-dcnode-id="3292" instrument_node="">
</span><h2 data-dcnode-id="3282"><span class="mw-headline" data-dcnode-id="3290" id="Basis_of_premium_charges"><span data-dcnode-id="3291" instrument_node="">Basis of premium charges</span></span><span class="mw-editsection" data-dcnode-id="3283"><span class="mw-editsection-bracket" data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">[</span></span><a data-dcnode-id="3286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D34" title="Edit section: Basis of premium charges"><span data-dcnode-id="3287" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3284"><span data-dcnode-id="3285" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3281" instrument_node="">
</span><link data-dcnode-id="3280" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3276" role="note"><span data-dcnode-id="3279" instrument_node="">Main article: </span><a data-dcnode-id="3277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Auto_insurance_risk_selection" title="Auto insurance risk selection"><span data-dcnode-id="3278" instrument_node="">auto insurance risk selection</span></a></div><span data-dcnode-id="3275" instrument_node="">
</span><p data-dcnode-id="3273"><span data-dcnode-id="3274" instrument_node="">Depending on the jurisdiction, the insurance premium can be either mandated by the government or determined by the insurance company, in accordance with a framework of regulations set by the government. Often, the insurer will have more freedom to set the price on physical damage coverages than on mandatory liability coverages.
</span></p><p data-dcnode-id="3248"><span data-dcnode-id="3272" instrument_node="">When the premium is not mandated by the government, it is usually derived from the calculations of an </span><a data-dcnode-id="3270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Actuary" title="Actuary"><span data-dcnode-id="3271" instrument_node="">actuary</span></a><span data-dcnode-id="3269" instrument_node="">, based on statistical data. The premium can vary depending on many factors that are believed to affect the expected cost of future </span><a class="mw-redirect" data-dcnode-id="3267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Insurance_claim" title="Insurance claim"><span data-dcnode-id="3268" instrument_node="">claims</span></a><span data-dcnode-id="3266" instrument_node="">.</span><sup class="reference" data-dcnode-id="3263" id="cite_ref-45"><a data-dcnode-id="3264" href="#cite_note-45"><span data-dcnode-id="3265" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3262" instrument_node=""> Those factors can include the car characteristics, the coverage selected (</span><a data-dcnode-id="3260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deductible" title="Deductible"><span data-dcnode-id="3261" instrument_node="">deductible</span></a><span data-dcnode-id="3259" instrument_node="">, limit, covered perils), the profile of the driver (</span><a data-dcnode-id="3257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ageing" title="Ageing"><span data-dcnode-id="3258" instrument_node="">age</span></a><span data-dcnode-id="3256" instrument_node="">, </span><a data-dcnode-id="3254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gender" title="Gender"><span data-dcnode-id="3255" instrument_node="">gender</span></a><span data-dcnode-id="3253" instrument_node="">, driving history) and the usage of the car (commute to work or not, predicted annual distance driven).</span><sup class="reference" data-dcnode-id="3250" id="cite_ref-46"><a data-dcnode-id="3251" href="#cite_note-46"><span data-dcnode-id="3252" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3249" instrument_node="">
</span></p><span data-dcnode-id="3247" instrument_node="">
</span><h3 data-dcnode-id="3237"><span class="mw-headline" data-dcnode-id="3245" id="Neighbourhood"><span data-dcnode-id="3246" instrument_node="">Neighbourhood</span></span><span class="mw-editsection" data-dcnode-id="3238"><span class="mw-editsection-bracket" data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">[</span></span><a data-dcnode-id="3241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D35" title="Edit section: Neighbourhood"><span data-dcnode-id="3242" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3236" instrument_node="">
</span><p data-dcnode-id="3227"><span data-dcnode-id="3235" instrument_node="">The address of the owner can affect the premiums. Areas with high crime rates generally lead to higher costs of insurance.</span><sup class="reference" data-dcnode-id="3232" id="cite_ref-IBCBAC_47-0"><a data-dcnode-id="3233" href="#cite_note-IBCBAC-47"><span data-dcnode-id="3234" instrument_node="">[47]</span></a></sup><sup class="reference" data-dcnode-id="3229" id="cite_ref-Auto_48-0"><a data-dcnode-id="3230" href="#cite_note-Auto-48"><span data-dcnode-id="3231" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3228" instrument_node="">
</span></p><span data-dcnode-id="3226" instrument_node="">
</span><h3 data-dcnode-id="3216"><span class="mw-headline" data-dcnode-id="3224" id="Gender"><span data-dcnode-id="3225" instrument_node="">Gender</span></span><span class="mw-editsection" data-dcnode-id="3217"><span class="mw-editsection-bracket" data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">[</span></span><a data-dcnode-id="3220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D36" title="Edit section: Gender"><span data-dcnode-id="3221" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3215" instrument_node="">
</span><p data-dcnode-id="3205"><span data-dcnode-id="3214" instrument_node="">Because male drivers, especially younger ones, are on average often regarded as tending to drive more aggressively, the premiums charged for policies on vehicles whose primary driver is male are often higher. This discrimination may be dropped if the driver is past a certain age.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3207" style="white-space:nowrap;"><span data-dcnode-id="3213" instrument_node="">[</span><i data-dcnode-id="3209"><a data-dcnode-id="3210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3211" title="This claim needs references to reliable sources. (October 2017)"><span data-dcnode-id="3212" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3208" instrument_node="">]</span></sup><span data-dcnode-id="3206" instrument_node="">
</span></p><p data-dcnode-id="3181"><span data-dcnode-id="3204" instrument_node="">On 1 March 2011, the </span><a data-dcnode-id="3202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Court_of_Justice" title="European Court of Justice"><span data-dcnode-id="3203" instrument_node="">European Court of Justice</span></a><span data-dcnode-id="3201" instrument_node=""> decided insurance companies who used gender as a risk factor when calculating insurance premiums were breaching EU equality laws.</span><sup class="reference" data-dcnode-id="3198" id="cite_ref-T409_49-0"><a data-dcnode-id="3199" href="#cite_note-T409-49"><span data-dcnode-id="3200" instrument_node="">[49]</span></a></sup><span data-dcnode-id="3197" instrument_node=""> The Court ruled that car-insurance companies were discriminating against men.</span><sup class="reference" data-dcnode-id="3194" id="cite_ref-T409_49-1"><a data-dcnode-id="3195" href="#cite_note-T409-49"><span data-dcnode-id="3196" instrument_node="">[49]</span></a></sup><span data-dcnode-id="3193" instrument_node=""> However, in some places, such as the UK, companies have used the standard practice of discrimination based on profession to still use gender as a factor, albeit indirectly. Professions which are more typically practised by men are deemed as being more risky even if they had not been prior to the Court's ruling while the converse is applied to professions predominant among women.</span><sup class="reference" data-dcnode-id="3190" id="cite_ref-Men_50-0"><a data-dcnode-id="3191" href="#cite_note-Men-50"><span data-dcnode-id="3192" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3189" instrument_node=""> Another effect of the ruling has been that, while the premiums for men have been lowered, they have been raised for women. This equalisation effect has also been seen in other types of insurance for individuals, such as </span><a data-dcnode-id="3187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Life_insurance" title="Life insurance"><span data-dcnode-id="3188" instrument_node="">life insurance</span></a><span data-dcnode-id="3186" instrument_node="">.</span><sup class="reference" data-dcnode-id="3183" id="cite_ref-51"><a data-dcnode-id="3184" href="#cite_note-51"><span data-dcnode-id="3185" instrument_node="">[51]</span></a></sup><span data-dcnode-id="3182" instrument_node="">
</span></p><span data-dcnode-id="3180" instrument_node="">
</span><h3 data-dcnode-id="3170"><span class="mw-headline" data-dcnode-id="3178" id="Age"><span data-dcnode-id="3179" instrument_node="">Age</span></span><span class="mw-editsection" data-dcnode-id="3171"><span class="mw-editsection-bracket" data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">[</span></span><a data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D37" title="Edit section: Age"><span data-dcnode-id="3175" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3169" instrument_node="">
</span><p data-dcnode-id="3156"><span data-dcnode-id="3168" instrument_node="">Teenage drivers who have no driving record will have higher car insurance premiums. However, young drivers are often offered discounts if they undertake further driver training on recognized courses, such as the </span><a data-dcnode-id="3166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pass_Plus" title="Pass Plus"><span data-dcnode-id="3167" instrument_node="">Pass Plus</span></a><span data-dcnode-id="3165" instrument_node=""> scheme in the UK. In the US many insurers offer a good-grade discount to students with a good academic record and resident-student discounts to those who live away from home. Generally insurance premiums tend to become lower at the age of 25. Some insurance companies offer "stand alone" car insurance policies specifically for teenagers with lower premiums. By placing restrictions on teenagers' driving (forbidding driving after dark, or giving rides to other teens, for example), these companies effectively reduce their risk.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3158" style="white-space:nowrap;"><span data-dcnode-id="3164" instrument_node="">[</span><i data-dcnode-id="3160"><a data-dcnode-id="3161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3162" title="This claim needs references to reliable sources. (August 2019)"><span data-dcnode-id="3163" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3159" instrument_node="">]</span></sup><span data-dcnode-id="3157" instrument_node="">
</span></p><p data-dcnode-id="3146"><span data-dcnode-id="3155" instrument_node="">Senior drivers are often eligible for retirement discounts, reflecting the lower average miles driven by this age group. However, rates may increase for senior drivers after age 65, due to increased risk associated with much older drivers. Typically, the increased risk for drivers over 65 years of age is associated with slower reflexes, reaction times, and being more injury-prone.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3148" style="white-space:nowrap;"><span data-dcnode-id="3154" instrument_node="">[</span><i data-dcnode-id="3150"><a data-dcnode-id="3151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3152" title="This claim needs references to reliable sources. (June 2011)"><span data-dcnode-id="3153" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3149" instrument_node="">]</span></sup><span data-dcnode-id="3147" instrument_node="">
</span></p><span data-dcnode-id="3145" instrument_node="">
</span><h3 data-dcnode-id="3135"><span class="mw-headline" data-dcnode-id="3143" id="U.S._driving_history"><span data-dcnode-id="3144" instrument_node="">U.S. driving history</span></span><span class="mw-editsection" data-dcnode-id="3136"><span class="mw-editsection-bracket" data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">[</span></span><a data-dcnode-id="3139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D38" title="Edit section: U.S. driving history"><span data-dcnode-id="3140" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3134" instrument_node="">
</span><p data-dcnode-id="3124"><span data-dcnode-id="3133" instrument_node="">In most U.S. states, moving violations, including running red lights and speeding, assess points on a driver's driving record. Since more points indicate an increased risk of future violations, insurance companies periodically review drivers' records, and may raise premiums accordingly. Rating practices, such as debit for a poor driving history, are not dictated by law. Many insurers allow one moving violation every three to five years before increasing premiums. Accidents affect insurance premiums similarly. Depending on the severity of the accident and the number of points assessed, rates can increase by as much as twenty to thirty percent.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3126" style="white-space:nowrap;"><span data-dcnode-id="3132" instrument_node="">[</span><i data-dcnode-id="3128"><a data-dcnode-id="3129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3130" title="This claim needs references to reliable sources. (August 2019)"><span data-dcnode-id="3131" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3127" instrument_node="">]</span></sup><span data-dcnode-id="3125" instrument_node=""> Any motoring convictions should be disclosed to insurers, as the driver is assessed by risk from prior experiences while driving on the road.
</span></p><span data-dcnode-id="3123" instrument_node="">
</span><h3 data-dcnode-id="3113"><span class="mw-headline" data-dcnode-id="3121" id="Marital_status"><span data-dcnode-id="3122" instrument_node="">Marital status</span></span><span class="mw-editsection" data-dcnode-id="3114"><span class="mw-editsection-bracket" data-dcnode-id="3119"><span data-dcnode-id="3120" instrument_node="">[</span></span><a data-dcnode-id="3117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D39" title="Edit section: Marital status"><span data-dcnode-id="3118" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3112" instrument_node="">
</span><p data-dcnode-id="3106"><span data-dcnode-id="3111" instrument_node="">Statistics show that married drivers average fewer accidents than the rest of the population so policy owners who are married often receive lower premiums than single persons.</span><sup class="reference" data-dcnode-id="3108" id="cite_ref-MillerStafford2009_52-0"><a data-dcnode-id="3109" href="#cite_note-MillerStafford2009-52"><span data-dcnode-id="3110" instrument_node="">[52]</span></a></sup><span data-dcnode-id="3107" instrument_node="">
</span></p><span data-dcnode-id="3105" instrument_node="">
</span><h3 data-dcnode-id="3095"><span class="mw-headline" data-dcnode-id="3103" id="Profession"><span data-dcnode-id="3104" instrument_node="">Profession</span></span><span class="mw-editsection" data-dcnode-id="3096"><span class="mw-editsection-bracket" data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">[</span></span><a data-dcnode-id="3099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D40" title="Edit section: Profession"><span data-dcnode-id="3100" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3094" instrument_node="">
</span><p data-dcnode-id="3088"><span data-dcnode-id="3093" instrument_node="">The profession of the driver may be used as a factor to determine premiums. Certain professions may be deemed more likely to result in damages if they regularly involve more travel or the carrying of expensive equipment or stock or if they are predominant either among women or among men.</span><sup class="reference" data-dcnode-id="3090" id="cite_ref-Men_50-1"><a data-dcnode-id="3091" href="#cite_note-Men-50"><span data-dcnode-id="3092" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3089" instrument_node="">
</span></p><span data-dcnode-id="3087" instrument_node="">
</span><h3 data-dcnode-id="3077"><span class="mw-headline" data-dcnode-id="3085" id="Vehicle_classification"><span data-dcnode-id="3086" instrument_node="">Vehicle classification</span></span><span class="mw-editsection" data-dcnode-id="3078"><span class="mw-editsection-bracket" data-dcnode-id="3083"><span data-dcnode-id="3084" instrument_node="">[</span></span><a data-dcnode-id="3081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D41" title="Edit section: Vehicle classification"><span data-dcnode-id="3082" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3076" instrument_node="">
</span><p data-dcnode-id="3074"><span data-dcnode-id="3075" instrument_node="">Two of the most important factors that go into determining the underwriting risk on motorized vehicles are: performance capability and retail cost. The most commonly available providers of auto insurance have underwriting restrictions against vehicles that are either designed to be capable of higher speeds and performance levels, or vehicles that retail above a certain dollar amount. Vehicles that are commonly considered luxury automobiles usually carry more expensive physical damage premiums because they are more expensive to replace. Vehicles that can be classified as high performance autos will carry higher premiums generally because there is greater opportunity for risky driving behavior. Motorcycle insurance may carry lower property-damage premiums because the risk of damage to other vehicles is minimal, yet have higher liability or personal-injury premiums, because motorcycle riders face different physical risks while on the road. Risk classification on automobiles also takes into account the statistical analysis of reported theft, accidents, and mechanical malfunction on every given year, make, and model of auto.
</span></p><span data-dcnode-id="3073" instrument_node="">
</span><h3 data-dcnode-id="3063"><span class="mw-headline" data-dcnode-id="3071" id="Distance"><span data-dcnode-id="3072" instrument_node="">Distance</span></span><span class="mw-editsection" data-dcnode-id="3064"><span class="mw-editsection-bracket" data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">[</span></span><a data-dcnode-id="3067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D42" title="Edit section: Distance"><span data-dcnode-id="3068" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3065"><span data-dcnode-id="3066" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3062" instrument_node="">
</span><p data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">Some car insurance plans do not differentiate in regard to how much the car is used. There are however low-mileage discounts offered by some insurance providers. Other methods of differentiation would include over-road distance between the ordinary residence of a subject and their ordinary, daily destinations.
</span></p><span data-dcnode-id="3059" instrument_node="">
</span><h4 data-dcnode-id="3049"><span class="mw-headline" data-dcnode-id="3057" id="Reasonable_distance_estimation"><span data-dcnode-id="3058" instrument_node="">Reasonable distance estimation</span></span><span class="mw-editsection" data-dcnode-id="3050"><span class="mw-editsection-bracket" data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">[</span></span><a data-dcnode-id="3053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D43" title="Edit section: Reasonable distance estimation"><span data-dcnode-id="3054" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3048" instrument_node="">
</span><p data-dcnode-id="3043"><span data-dcnode-id="3047" instrument_node="">Another important factor in determining car insurance premiums involves the annual mileage put on the vehicle, and for what reason. Driving to and from work every day at a specified distance, especially in urban areas where common traffic routes are known, presents different risks than how a retiree who does not work any longer may use their vehicle. Common practice has been that this information was provided solely by the insured person, but some insurance providers have started to collect regular </span><a data-dcnode-id="3045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Odometer" title="Odometer"><span data-dcnode-id="3046" instrument_node="">odometer</span></a><span data-dcnode-id="3044" instrument_node=""> readings to verify the risk.
</span></p><span data-dcnode-id="3042" instrument_node="">
</span><h4 data-dcnode-id="3032"><span class="mw-headline" data-dcnode-id="3040" id="Odometer-based_systems"><span data-dcnode-id="3041" instrument_node="">Odometer-based systems</span></span><span class="mw-editsection" data-dcnode-id="3033"><span class="mw-editsection-bracket" data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">[</span></span><a data-dcnode-id="3036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVehicle_insurance%26action%3Dedit%26section%3D44" title="Edit section: Odometer-based systems"><span data-dcnode-id="3037" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3031" instrument_node="">
