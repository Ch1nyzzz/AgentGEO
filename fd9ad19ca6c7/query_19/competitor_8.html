"6370" data-google-interstitial="false" data-open="CIT0054" href="javascript:;" reveal-id="CIT0054"><span data-dcnode-id="6371" instrument_node="">NRC 2011</span></a><span data-dcnode-id="6369" instrument_node=""> ) are important goals for field mammalogy. A cap on the number of animals collected is usually imposed by state and sometimes federal permitting agencies and, likewise, is expected by the IACUC. Underestimates of the number of animals needed for a study might invalidate results. Therefore, a sufficient number of animals (i.e., the number needed to meet research goals) must be clearly requested and justified. “Replacement” in mammals might be achieved by using cell lines, voucher materials from previous studies, or computer simulations where possible. Further, larger mammals are not usually collected in surveys or for genetic work. Rather, they can be subsampled by ear punches or hair combs, or tissues might be requested from mammalian research collections where this material is already be archived as specimens. Other alternatives include using carcasses of species of interest (especially larger carnivores or ungulates) that have been trapped or hunted for other purposes. However, investigators are reminded that such sources may introduce undesirable biases associated with age, sex, or size. Finally, an example of “Refinement” might include using behavioral responses as indicators of social dominance rather than outcomes of physical combat. </span></p><p class="chapter-para" data-dcnode-id="6366"><span data-dcnode-id="6367" instrument_node="">Most field investigators already embrace the ethical treatment of animals because of their respect for nature and their dedication to wild species. The guidelines provided here were developed to assist investigators in maintaining compliance and understanding the evolving suite of animal welfare regulations. How we view use of mammals in research does not differ much from that of Joseph Grinnell when he visited Yosemite Valley nearly 100 years ago. Knowledge of most aspects of mammalian biology has advanced, but we still struggle with a basic understanding of our place in nature. Mammalogists continue to explore the farthest reaches of the Earth. In contrast, the public and even some scientists in other fields have become sufficiently removed from what is wild that we must be prepared to answer the question “what good is it?” That is, we must be able to communicate to a broad audience the applied and theoretical values of research on wild mammals. Proactive consideration of humane treatment of our study animals will help prevent retroactive criticism of our ethics and our research. With this in mind, the ultimate design of research programs, including the methods and techniques to address research objectives, are the responsibility of the investigator. Guidelines can provide current information on ethical and regulatory standards, but they cannot replace individual judgment or the drive, ingenuity, and curiosity that lead investigators to generate new and insightful advances in science.</span></p><span data-dcnode-id="6365" instrument_node=""> </span><h2 class="backacknowledgements-title js-splitscreen-backacknowledgements-title" data-dcnode-id="6361" id="113547828" scrollto-destination="113547828"><span data-dcnode-id="6364" instrument_node="">A </span><span class="small-caps" data-dcnode-id="6362"><span data-dcnode-id="6363" instrument_node="">cknowledgments</span></span></h2><span data-dcnode-id="6360" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6358"><span data-dcnode-id="6359" instrument_node="">Many members of the ASM contributed to development of these guidelines, as have colleagues in the various organizations and agencies focused on ethical oversight of animal research. Valuable comments and insights have been provided by mammalogists, PIs, and IACUC members from diverse organizations. The Committee particularly thanks D. Reeder for her insights and advice regarding housing bats and J. Golcher-Benavides for preparing the Spanish abstract. E. Paul, Executive Director of the Ornithological Council, and E. Lacey, President of the American Society of Mammalogists, both provided particularly insightful comments on an earlier draft. The manuscript also benefitted from anonymous referees during the review process. Finally, all IACUC members, mostly volunteers, have a tremendous responsibility to assure both institutional and federal oversight agencies and the public that all investigators understand and maintain compliance and that studies that use animals do so with respect and knowledge of the principles of animal care. We are grateful for their dedication, their service, and their feedback on this document.</span></p><span data-dcnode-id="6357" instrument_node=""> </span><h2 class="backreferences-title js-splitscreen-backreferences-title" data-dcnode-id="6350" id="113547830" scrollto-destination="113547830"><span data-dcnode-id="6356" instrument_node="">L </span><span class="small-caps" data-dcnode-id="6354"><span data-dcnode-id="6355" instrument_node="">iterature</span></span><span data-dcnode-id="6353" instrument_node=""> C </span><span class="small-caps" data-dcnode-id="6351"><span data-dcnode-id="6352" instrument_node="">ited</span></span></h2><span data-dcnode-id="6349" instrument_node="">
