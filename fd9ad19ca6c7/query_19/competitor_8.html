</span><h2 class="abstract-title js-splitscreen-abstract-title" data-dcnode-id="9069" id="113547653" scrollto-destination="113547653"><span data-dcnode-id="9070" instrument_node="">Abstract</span></h2><span data-dcnode-id="9068" instrument_node="">
</span><section class="abstract" data-dcnode-id="9038"><p class="chapter-para" data-dcnode-id="9056"><span data-dcnode-id="9067" instrument_node=""> Guidelines for use of wild mammal species in research are updated from </span><span class="xrefLink" data-dcnode-id="9066" id="jumplink-CIT0070"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9064" data-google-interstitial="false" data-open="CIT0070" href="javascript:;" reveal-id="CIT0070"><span data-dcnode-id="9065" instrument_node="">Sikes et al. (2011)</span></a><span data-dcnode-id="9063" instrument_node=""> . These guidelines cover current professional techniques and regulations involving the use of mammals in research and teaching; they also incorporate new resources, procedural summaries, and reporting requirements. Included are details on capturing, marking, housing, and humanely killing wild mammals. It is recommended that Institutional Animal Care and Use Committees (IACUCs), regulatory agencies, and investigators use these guidelines as a resource for protocols involving wild mammals, whether studied in the field or in captivity. These guidelines were prepared and approved by the American Society of Mammalogists (ASM), in consultation with professional veterinarians experienced in wildlife research and IACUCs, whose collective expertise provides a broad and comprehensive understanding of the biology of nondomesticated mammals. The current version of these guidelines and any subsequent modifications are available online on the Animal Care and Use Committee page of the ASM website ( </span><a class="link link-uri" data-dcnode-id="9061" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mammalogy.org/uploads/committee_files/CurrentGuidelines.pdf"><span data-dcnode-id="9062" instrument_node="">http://mammalogy.org/uploads/committee_files/CurrentGuidelines.pdf</span></a><span data-dcnode-id="9060" instrument_node=""> ). Additional resources pertaining to the use of wild animals in research are available at: </span><a class="link link-uri" data-dcnode-id="9058" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mammalsociety.org/committees/animal-care-and-use%23tab3"><span data-dcnode-id="9059" instrument_node="">http://www.mammalsociety.org/committees/animal-care-and-use#tab3</span></a><span data-dcnode-id="9057" instrument_node=""> . </span></p><div class="sec" data-dcnode-id="9039"><div class="title" data-dcnode-id="9052"><span data-dcnode-id="9055" instrument_node=""> R </span><span class="small-caps" data-dcnode-id="9053"><span data-dcnode-id="9054" instrument_node="">esumen</span></span></div><p class="chapter-para" data-dcnode-id="9040"><span data-dcnode-id="9051" instrument_node=""> Los lineamientos para el uso de especies de mamíferos de vida silvestre en la investigación con base en </span><span class="xrefLink" data-dcnode-id="9050" id="jumplink-CIT0070"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="9048" data-google-interstitial="false" data-open="CIT0070" href="javascript:;" reveal-id="CIT0070"><span data-dcnode-id="9049" instrument_node="">Sikes et al. (2011)</span></a><span data-dcnode-id="9047" instrument_node=""> se actualizaron. Dichos lineamientos cubren técnicas y regulaciones profesionales actuales que involucran el uso de mamíferos en la investigación y enseñanza; también incorporan recursos nuevos, resúmenes de procedimientos y requisitos para reportes. Se incluyen detalles acerca de captura, marcaje, manutención en cautiverio y eutanasia de mamíferos de vida silvestre. Se recomienda que los comités institucionales de uso y cuidado animal (cifras en inglés: IACUCs), las agencias reguladoras y los investigadores se adhieran a dichos lineamientos como fuente base de protocolos que involucren mamíferos de vida silvestre, ya sea investigaciones de campo o en cautiverio. Dichos lineamientos fueron preparados y aprobados por la ASM, en consulta con profesionales veterinarios experimentados en investigaciones de vida silvestre y IACUCS, de quienes cuya experiencia colectiva provee un entendimiento amplio y exhaustivo de la biología de mamíferos no-domesticados. La presente versión de los lineamientos y modificaciones posteriores están disponibles en línea en la página web de la ASM, bajo Cuidado Animal y Comité de Uso: ( </span><a class="link link-uri" data-dcnode-id="9045" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mammalogy.org/uploads/committee_files/CurrentGuidelines.pdf"><span data-dcnode-id="9046" instrument_node="">http://mammalogy.org/uploads/committee_files/CurrentGuidelines.pdf</span></a><span data-dcnode-id="9044" instrument_node=""> ). Recursos adicionales relacionados con el uso de animales de vida silvestre para la investigación se encuentran disponibles en ( </span><a class="link link-uri" data-dcnode-id="9042" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mammalsociety.org/committees/animal-care-and-use%23tab3"><span data-dcnode-id="9043" instrument_node="">http://www.mammalsociety.org/committees/animal-care-and-use#tab3</span></a><span data-dcnode-id="9041" instrument_node=""> ). </span></p></div></section><span data-dcnode-id="9037" instrument_node=""> </span><div class="article-metadata-panel clearfix at-ArticleMetadata" data-dcnode-id="9004"><div class="kwd-group" data-dcnode-id="9013"><a class="kwd-part kwd-main" data-dcnode-id="9035" data-google-interstitial="false" data-keyword="&quot;animal capture&quot;" href="javascript:;"><span data-dcnode-id="9036" instrument_node="">animal capture</span></a><span data-dcnode-id="9034" instrument_node="">, </span><a class="kwd-part kwd-main" data-dcnode-id="9032" data-google-interstitial="false" data-keyword="&quot;animal care&quot;" href="javascript:;"><span data-dcnode-id="9033" instrument_node="">animal care</span></a><span data-dcnode-id="9031" instrument_node="">, </span><a class="kwd-part kwd-main" data-dcnode-id="9029" data-google-interstitial="false" data-keyword="&quot;animal housing&quot;" href="javascript:;"><span data-dcnode-id="9030" instrument_node="">animal housing</span></a><span data-dcnode-id="9028" instrument_node="">, </span><a class="kwd-part kwd-main" data-dcnode-id="9026" data-google-interstitial="false" data-keyword="&quot;animal marking&quot;" href="javascript:;"><span data-dcnode-id="9027" instrument_node="">animal marking</span></a><span data-dcnode-id="9025" instrument_node="">, </span><a class="kwd-part kwd-main" data-dcnode-id="9023" data-google-interstitial="false" data-keyword="&quot;animal use ethics&quot;" href="javascript:;"><span data-dcnode-id="9024" instrument_node="">animal use ethics</span></a><span data-dcnode-id="9022" instrument_node="">, </span><a class="kwd-part kwd-main" data-dcnode-id="9020" data-google-interstitial="false" data-keyword="&quot;federal regulation&quot;" href="javascript:;"><span data-dcnode-id="9021" instrument_node="">federal regulation</span></a><span data-dcnode-id="9019" instrument_node="">, </span><a class="kwd-part kwd-main" data-dcnode-id="9017" data-google-interstitial="false" data-keyword="&quot;Institutional Animal Care and Use Committee&quot;" href="javascript:;"><span data-dcnode-id="9018" instrument_node="">Institutional Animal Care and Use Committee</span></a><span data-dcnode-id="9016" instrument_node="">, </span><a class="kwd-part kwd-main" data-dcnode-id="9014" data-google-interstitial="false" data-keyword="trapping" href="javascript:;"><span data-dcnode-id="9015" instrument_node="">trapping</span></a></div><div class="article-metadata-tocSections" data-dcnode-id="9005"><span data-dcnode-id="9012" instrument_node="">

        </span></a></div></div></div><span data-dcnode-id="7737" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="7733" data-legacy-id="s1" id="113547656" scrollto-destination="113547656"><span data-dcnode-id="7736" instrument_node="">O </span><span class="small-caps" data-dcnode-id="7734"><span data-dcnode-id="7735" instrument_node="">verview</span></span></h2><span data-dcnode-id="7732" instrument_node="">
</span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="7730" data-legacy-id="s2" id="113547657" scrollto-destination="113547657"><span data-dcnode-id="7731" instrument_node="">Development of the American Society of Mammalogist guidelines</span></h3><span data-dcnode-id="7729" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="7723"><span data-dcnode-id="7728" instrument_node=""> Advances in the study of mammals—from exploring physiological functions to understanding evolutionary relationships and developing management strategies—are predicated on responsible use of animals in research. Founded in April 1919, the American Society of Mammalogists (ASM) is deeply concerned with the welfare of mammals and, in particular, the persistence of natural communities of organisms. In 1928, Joseph Grinnell—one of the founders of the ASM—instructed administrators of Yosemite National Park to maintain the Park as a natural mammalian community without unnecessary or destructive development. </span><span class="xrefLink" data-dcnode-id="7727" id="jumplink-CIT0029"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7725" data-google-interstitial="false" data-open="CIT0029" href="javascript:;" reveal-id="CIT0029"><span data-dcnode-id="7726" instrument_node="">Grinnell (1928</span></a><span data-dcnode-id="7724" instrument_node=""> :76) described various management tactics for Park managers to follow; in particular, he advised that to address an unwanted increase in the bear population, Park officials needed to “devise [some] means whereby troublesome individual bears could be discouraged from raiding food-stores, without doing them serious bodily harm. But I recommend that exceeding care be taken in such procedure, not to rouse, unnecessarily, adverse public opinion, and not to drive away the bears altogether, for they constitute a particularly valuable element in the native animal life of the valley.” Thus, Grinnell made informed management recommendations that advocated humane animal care and use with sensitivity toward public opinion. The same is true today as mammalogists work to understand and to protect the sentient organisms they study. </span></p><p class="chapter-para" data-dcnode-id="7685"><span data-dcnode-id="7722" instrument_node=""> The ASM publication </span><em data-dcnode-id="7720"><span data-dcnode-id="7721" instrument_node="">Guidelines for the Use of Animals in Research</span></em><span data-dcnode-id="7719" instrument_node=""> ( </span><span class="xrefLink" data-dcnode-id="7718" id="jumplink-CIT0002"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7716" data-google-interstitial="false" data-open="CIT0002" href="javascript:;" reveal-id="CIT0002"><span data-dcnode-id="7717" instrument_node="">ad hoc Committee for Animal Care Guidelines 1985</span></a><span data-dcnode-id="7715" instrument_node=""> ) was the 1st effort to codify the expertise and philosophy of experienced, professional mammalogists regarding the use of mammals in research. This single-page statement listed broad considerations, such as concern for numbers of animals used, and highlighted laws that regulated use of animals and available standards. It stated that the investigator should exercise good judgment and prudence when using animals in research. More complete guidance was published by the ASM in 1987 with </span><em data-dcnode-id="7713"><span data-dcnode-id="7714" instrument_node="">Acceptable Field Methods in Mammalogy: Preliminary Guidelines Approved by the American Society of Mammalogists</span></em><span data-dcnode-id="7712" instrument_node=""> ( </span><span class="xrefLink" data-dcnode-id="7711" id="jumplink-CIT0003"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7709" data-google-interstitial="false" data-open="CIT0003" href="javascript:;" reveal-id="CIT0003"><span data-dcnode-id="7710" instrument_node="">ad hoc Committee on Acceptable Field Methods in Mammalogy 1987</span></a><span data-dcnode-id="7708" instrument_node=""> , </span><a class="link link-uri" data-dcnode-id="7706" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mammalogy.org/uploads/committee_files/ACUC1987.pdf"><span data-dcnode-id="7707" instrument_node="">http://mammalogy.org/uploads/committee_files/ACUC1987.pdf</span></a><span data-dcnode-id="7705" instrument_node=""> ). The 1987 ASM guidelines, along with those for birds, reptiles and amphibians, and fishes (produced by the other taxon-based professional organizations) were developed at the request of the United States National Science Foundation (NSF) specifically because guidance relevant to wild vertebrates was not available in the 1985 version of the National Research Council’s (NRC) </span><em data-dcnode-id="7703"><span data-dcnode-id="7704" instrument_node="">Guide for the Care and Use of Laboratory Animals</span></em><span data-dcnode-id="7702" instrument_node=""> (hereinafter </span><em data-dcnode-id="7700"><span data-dcnode-id="7701" instrument_node="">Guide</span></em><span data-dcnode-id="7699" instrument_node=""> ) ( </span><span class="xrefLink" data-dcnode-id="7698" id="jumplink-CIT0055"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7696" data-google-interstitial="false" data-open="CIT0055" href="javascript:;" reveal-id="CIT0055"><span data-dcnode-id="7697" instrument_node="">Orlans 1988</span></a><span data-dcnode-id="7695" instrument_node=""> ). Conduct of animal care programs consistent with the </span><em data-dcnode-id="7693"><span data-dcnode-id="7694" instrument_node="">Guide</span></em><span data-dcnode-id="7692" instrument_node=""> became required for activities funded by the United States Public Health Services (PHS) under the Health Research Extension Act of 1985, but neither the 1985 version nor subsequent editions of the </span><em data-dcnode-id="7690"><span data-dcnode-id="7691" instrument_node="">Guide</span></em><span data-dcnode-id="7689" instrument_node=""> provided specific guidance for wild vertebrates. Even the most recent (2011:32) revision of the </span><em data-dcnode-id="7687"><span data-dcnode-id="7688" instrument_node="">Guide</span></em><span data-dcnode-id="7686" instrument_node=""> states that “[t]he Guide does not purport to be a compendium of all information regarding field biology and methods used in wildlife investigations, but the basic principles of humane care and use apply to animals living under natural conditions” and encourages readers to consult qualified wildlife researchers and taxon specialists for additional information. </span></p><p class="chapter-para" data-dcnode-id="7653"><span data-dcnode-id="7684" instrument_node=""> This and all recent editions of the ASM guidelines include information from the United States and other governments (e.g., </span><span class="xrefLink" data-dcnode-id="7683" id="jumplink-CIT0017"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7681" data-google-interstitial="false" data-open="CIT0017" href="javascript:;" reveal-id="CIT0017"><span data-dcnode-id="7682" instrument_node="">Canadian Council on Animal Care 1993</span></a><span data-dcnode-id="7680" instrument_node=""> ) as well as other professional sources where appropriate, such as the </span><span class="xrefLink" data-dcnode-id="7679" id="jumplink-CIT0073"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7677" data-google-interstitial="false" data-open="CIT0073" href="javascript:;" reveal-id="CIT0073"><span data-dcnode-id="7678" instrument_node="">Society for the Study of Animal Behaviour (2006)</span></a><span data-dcnode-id="7676" instrument_node=""> , the American Veterinary Medical Association ( </span><span class="xrefLink" data-dcnode-id="7675" id="jumplink-CIT0005"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7673" data-google-interstitial="false" data-open="CIT0005" href="javascript:;" reveal-id="CIT0005"><span data-dcnode-id="7674" instrument_node="">AVMA 2013a</span></a><span data-dcnode-id="7672" instrument_node=""> ) </span><em data-dcnode-id="7670"><span data-dcnode-id="7671" instrument_node="">Guidelines for the Euthanasia of Animals</span></em><span data-dcnode-id="7669" instrument_node=""> , and primary literature. The information contained herein is consistent with existing United States regulations regarding the care and use of vertebrate animals in research and education. </span><span class="xrefLink" data-dcnode-id="7668" id="jumplink-CIT0072"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7666" data-google-interstitial="false" data-open="CIT0072" href="javascript:;" reveal-id="CIT0072"><span data-dcnode-id="7667" instrument_node="">Sikes et al. (2012)</span></a><span data-dcnode-id="7665" instrument_node=""> , </span><span class="xrefLink" data-dcnode-id="7664" id="jumplink-CIT0069"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7662" data-google-interstitial="false" data-open="CIT0069" href="javascript:;" reveal-id="CIT0069"><span data-dcnode-id="7663" instrument_node="">Sikes and Bryan (2015)</span></a><span data-dcnode-id="7661" instrument_node=""> , and </span><span class="xrefLink" data-dcnode-id="7660" id="jumplink-CIT0085"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7658" data-google-interstitial="false" data-open="CIT0085" href="javascript:;" reveal-id="CIT0085"><span data-dcnode-id="7659" instrument_node="">Wingfield (2015)</span></a><span data-dcnode-id="7657" instrument_node=""> argue that the ethical and appropriate oversight of animal activities requires guidance tailored to the species and conditions involved, and that the appropriate standards for wildlife research are the taxon-specific guidelines prepared by the various taxon-oriented professional societies. The NSF agrees with this conclusion, as evidenced by recent (2013) changes to its Grant Proposal Guide ( </span><a class="link link-uri" data-dcnode-id="7655" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nsf.gov/pubs/policydocs/pappguide/nsf15001/gpg_print.pdf"><span data-dcnode-id="7656" instrument_node="">http://www.nsf.gov/pubs/policydocs/pappguide/nsf15001/gpg_print.pdf</span></a><span data-dcnode-id="7654" instrument_node=""> ) which states that: </span></p><blockquote data-dcnode-id="7647"><p class="chapter-para" data-dcnode-id="7648"><span data-dcnode-id="7652" instrument_node=""> In the case of research involving the study of wildlife in the field or in the lab, for the provision in the PHS Assurance for Institutional Commitment (Section II) that requires the organization to establish and maintain a program for activities involving animals in accordance with the </span><em data-dcnode-id="7650"><span data-dcnode-id="7651" instrument_node="">Guide for the Care and Use of Laboratory Animals</span></em><span data-dcnode-id="7649" instrument_node=""> (Guide), the organization has established and will maintain a program for activities involving animals according to the Guide. The organization will follow recommendations specified in the Guide for details involving laboratory animals, and taxon-specific guidelines approved by the American Society of Ichthyologists and Herpetologists, the American Society of Mammalogists, and the Ornithological Council, as is appropriate for the taxon to be studied. </span></p></blockquote><p class="chapter-para" data-dcnode-id="7645"><span data-dcnode-id="7646" instrument_node="">The acceptance of these guidelines is further evidenced by the fact that AAALAC International, an independent organization committed to peer-reviewed assessment and accreditation of animal care programs, adopted the previous (2011) version of the ASM guidelines as a reference document for use by accredited institutions.</span></p><p class="chapter-para" data-dcnode-id="7628"><span data-dcnode-id="7644" instrument_node=""> The revised guidelines herein are intended to provide investigators and those charged with evaluating animal use in research (e.g., Institutional Animal Care and Use Committees [IACUCs], reviewers and editors of research manuscripts, management agency personnel, graduate committees, and the public) with up-to-date guidance on ethical care and use issues as well as health, safety, and environmental concerns particular to nondomesticated mammals. These guidelines do not provide details concerning how IACUCs are to be constituted or operate, and thus are not intended to replace the </span><em data-dcnode-id="7642"><span data-dcnode-id="7643" instrument_node="">Guide</span></em><span data-dcnode-id="7641" instrument_node=""> on these matters. We underscore the fact that fundamental and profound differences exist between activities involving wild mammals, particularly in their natural habitat, and activities with traditional research and domesticated animals in laboratory settings. These differences are detailed elsewhere ( </span><span class="xrefLink" data-dcnode-id="7640" id="jumplink-CIT0072"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7638" data-google-interstitial="false" data-open="CIT0072" href="javascript:;" reveal-id="CIT0072"><span data-dcnode-id="7639" instrument_node="">Sikes et al. 2012</span></a><span data-dcnode-id="7637" instrument_node=""> ; </span><span class="xrefLink" data-dcnode-id="7636" id="jumplink-CIT0071"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7634" data-google-interstitial="false" data-open="CIT0071" href="javascript:;" reveal-id="CIT0071"><span data-dcnode-id="7635" instrument_node="">Sikes and Paul 2013</span></a><span data-dcnode-id="7633" instrument_node=""> ; </span><span class="xrefLink" data-dcnode-id="7632" id="jumplink-CIT0069"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7630" data-google-interstitial="false" data-open="CIT0069" href="javascript:;" reveal-id="CIT0069"><span data-dcnode-id="7631" instrument_node="">Sikes and Bryan 2015</span></a><span data-dcnode-id="7629" instrument_node=""> ) and include consideration of appropriate methods for euthanasia or humane killing, the potential for impacts on natural populations, differences in biology of the animals themselves, and differences in handling and husbandry requirements. </span></p><span data-dcnode-id="7627" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="7625" data-legacy-id="s3" id="113547664" scrollto-destination="113547664"><span data-dcnode-id="7626" instrument_node="">Role of the veterinarian</span></h3><span data-dcnode-id="7624" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="7618"><span data-dcnode-id="7623" instrument_node=""> Except in those projects in which investigators are themselves veterinarians or in which veterinarians accompany investigators during all field activities with wild animals, the role of veterinarians in wildlife research will differ substantially from their roles in laboratory research. Because the veterinarian seldom, if ever, accompanies investigators during their field activities, unless the animals can be transported to the veterinarian, the veterinarian could provide medical advice for a specific animal based only upon observations by field personnel. Such actions are not consistent with Section 5 of the model Veterinary Practices Act endorsed by the </span><span class="xrefLink" data-dcnode-id="7622" id="jumplink-CIT0006"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7620" data-google-interstitial="false" data-open="CIT0006" href="javascript:;" reveal-id="CIT0006"><span data-dcnode-id="7621" instrument_node="">AVMA (2013b)</span></a><span data-dcnode-id="7619" instrument_node=""> . Section 5 states that: </span></p><ol class="order" data-dcnode-id="7611"><li data-dcnode-id="7615"><p class="chapter-para" data-dcnode-id="7616"><span data-dcnode-id="7617" instrument_node="">No person may practice veterinary medicine in the State except within the context of a veterinarian–client–patient relationship [VCPR].</span></p></li><li data-dcnode-id="7612"><p class="chapter-para" data-dcnode-id="7613"><span data-dcnode-id="7614" instrument_node="">A veterinarian–client–patient relationship cannot be established solely by telephonic or other electronic means.</span></p></li></ol><p class="chapter-para" data-dcnode-id="7566"><span data-dcnode-id="7610" instrument_node=""> Commentary by the AVMA for this section emphasizes “…that because a VCPR requires the veterinarian to examine the patient, it cannot be adequately established by telephonic or other electronic means (i.e., via telemedicine) alone.” Thus, for most wildlife research, the veterinarian serves as a valued adviser and consultant during the planning stages or in response to challenges encountered during field activities that stimulate procedural refinements prior to additional activities. It must be stressed that the selection, dosages, and administration routes of pharmaceuticals are best accomplished in consultation with veterinarians having appropriate wildlife experience and expertise, and that this consultation must be prior to use of these compounds. Because the role of the veterinarian in field activities is not necessarily consistent with the expectations of the </span><em data-dcnode-id="7608"><span data-dcnode-id="7609" instrument_node="">Guide</span></em><span data-dcnode-id="7607" instrument_node=""> ( </span><span class="xrefLink" data-dcnode-id="7606" id="jumplink-CIT0054"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7604" data-google-interstitial="false" data-open="CIT0054" href="javascript:;" reveal-id="CIT0054"><span data-dcnode-id="7605" instrument_node="">NRC 2011</span></a><span data-dcnode-id="7603" instrument_node=""> ) and because the </span><em data-dcnode-id="7601"><span data-dcnode-id="7602" instrument_node="">Guide</span></em><span data-dcnode-id="7600" instrument_node=""> provides little or no information relevant to issues of primary concern in wildlife investigations ( </span><span class="xrefLink" data-dcnode-id="7599" id="jumplink-CIT0072"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7597" data-google-interstitial="false" data-open="CIT0072" href="javascript:;" reveal-id="CIT0072"><span data-dcnode-id="7598" instrument_node="">Sikes et al. 2012</span></a><span data-dcnode-id="7596" instrument_node=""> ; </span><span class="xrefLink" data-dcnode-id="7595" id="jumplink-CIT0060"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7593" data-google-interstitial="false" data-open="CIT0060" href="javascript:;" reveal-id="CIT0060"><span data-dcnode-id="7594" instrument_node="">Paul and Sikes 2013</span></a><span data-dcnode-id="7592" instrument_node=""> ; </span><span class="xrefLink" data-dcnode-id="7591" id="jumplink-CIT0071"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7589" data-google-interstitial="false" data-open="CIT0071" href="javascript:;" reveal-id="CIT0071"><span data-dcnode-id="7590" instrument_node="">Sikes and Paul 2013</span></a><span data-dcnode-id="7588" instrument_node=""> ; </span><span class="xrefLink" data-dcnode-id="7587" id="jumplink-CIT0061"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7585" data-google-interstitial="false" data-open="CIT0061" href="javascript:;" reveal-id="CIT0061"><span data-dcnode-id="7586" instrument_node="">Paul et al. 2015</span></a><span data-dcnode-id="7584" instrument_node=""> ; </span><span class="xrefLink" data-dcnode-id="7583" id="jumplink-CIT0069"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7581" data-google-interstitial="false" data-open="CIT0069" href="javascript:;" reveal-id="CIT0069"><span data-dcnode-id="7582" instrument_node="">Sikes and Bryan 2015</span></a><span data-dcnode-id="7580" instrument_node=""> ), IACUCs should consider whether these fundamental differences in and of themselves constitute justification for an IACUC-approved departure from the </span><em data-dcnode-id="7578"><span data-dcnode-id="7579" instrument_node="">Guide.</span></em><span data-dcnode-id="7577" instrument_node=""> PHS policy (see section below on “Regulation of animal activities”) specifies that “…the research project is consistent with the Guide unless acceptable justification for a departure is presented” ( </span><span class="xrefLink" data-dcnode-id="7576" id="jumplink-CIT0051"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7574" data-google-interstitial="false" data-open="CIT0051" href="javascript:;" reveal-id="CIT0051"><span data-dcnode-id="7575" instrument_node="">National Institutes of Health/Office of Laboratory Animal Welfare [NIH/OLAW] 2015</span></a><span data-dcnode-id="7573" instrument_node=""> ). The Model Wildlife Protocol endorsed by the ASM in 2016 (available at </span><a class="link link-uri" data-dcnode-id="7571" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mammalogy.org/uploads/committee_files/ModelWildlifeProtocol2016.docx"><span data-dcnode-id="7572" instrument_node="">http://mammalogy.org/uploads/committee_files/ModelWildlifeProtocol2016.docx</span></a><span data-dcnode-id="7570" instrument_node=""> ) provides 1 mechanism to facilitate presentation and approval of departures from the </span><em data-dcnode-id="7568"><span data-dcnode-id="7569" instrument_node="">Guide</span></em><span data-dcnode-id="7567" instrument_node=""> for wildlife activities. </span></p><p class="chapter-para" data-dcnode-id="7564"><span data-dcnode-id="7565" instrument_node="">These guidelines are designed to highlight the concerns one must address within the existing regulatory framework when conducting research and educational activities involving wild mammals. This document is not intended as an exhaustive list of acceptable procedures or issues in all circumstances or with all species. Our goal is to focus attention on the types of issues that should be considered when working with wild mammals and provide resources for addressing those concerns. We emphasize that these guidelines are not intended to constrain ingenuity in meeting research demands, but rather to bring relevant safety, regulatory, and ethical concerns regarding the use of wild mammals to the attention of investigators and oversight bodies. It is the responsibility of the principal investigator (PI) of a project to justify deviations from federal regulations or other applicable guidance during submission of a protocol to the cognizant IACUC.</span></p><span data-dcnode-id="7563" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="7561" data-legacy-id="s4" id="113547669" scrollto-destination="113547669"><span data-dcnode-id="7562" instrument_node="">Tailoring oversight to wildlife research</span></h3><span data-dcnode-id="7560" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="7558"><span data-dcnode-id="7559" instrument_node="">Oversight of animal use in research and education has almost universally developed from a biomedical perspective in which research was focused on human health and research questions were addressed using domesticated animal models in laboratory environments. Once regulations, guidelines, and expectations were established for oversight of these activities, they were often extended to apply to the study of wild animals in their native environments. This progression is not surprising given the importance and visibility of biomedical research and the number of animals used in such studies but, beyond the basic goals of ensuring humane treatment and minimizing pain or distress, guidelines and regulations designed for biomedical research have little relevance to research on wild animals, particularly in their natural environment. Indeed, using guidance not designed for wild animals will most likely result in ineffective or even inhumane treatment of these taxa. This disconnect occurs because of fundamental differences in the goals of biomedical and wildlife research, the role of animals in these respective research endeavors, and in particular because of fundamental differences between the domesticated animals most often used in biomedical work and the wild subjects used in field research. Consequently, unless guidance documents and expectations are modified extensively before they are applied to wild animals, their utility for biologically appropriate oversight of wild mammals is at best limited and at worst harmful to the animals they are intended to protect.</span></p><p class="chapter-para" data-dcnode-id="7553"><span class="xrefLink" data-dcnode-id="7557" id="jumplink-CIT0071"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7555" data-google-interstitial="false" data-open="CIT0071" href="javascript:;" reveal-id="CIT0071"><span data-dcnode-id="7556" instrument_node="">Sikes and Paul (2013)</span></a><span data-dcnode-id="7554" instrument_node=""> emphasized many of the obvious differences between biomedical and wildlife research. These include the fact that, rather than using animals as surrogates for humans in studies designed to benefit human health, studies of wildlife are often designed to benefit the study subjects. Individual animals are not so much “used” as they are the objects of study in projects designed to understand various aspects of their biology, including their behavior, ecology, and evolutionary diversification. A 2nd significant difference is that studies of wild animals, particularly those in their natural environments, have the potential for impacts beyond the study subjects because these individuals exist as part of a population and a community. A 3rd difference is that, whereas most biomedical research is conducted with only a few species of purpose-bred mammals, there are more than 5,400 species of wild mammals that are potential subjects of field studies. Closely related species can differ with regard to habitat, handling needs, or husbandry requirements and even wildlife veterinarians are unlikely to have experience with more than a small number of these taxa. </span></p><p class="chapter-para" data-dcnode-id="7512"><span data-dcnode-id="7552" instrument_node=""> Underlying the marked differences in focus and scope between biomedical and wildlife research are profound differences in virtually every aspect of the biology of domesticated animals versus wild taxa. The act of domestication produces animals that interact very differently with humans compared to wild strains. For example, rather than fearing and fleeing from humans, domesticated animals look to us for food, shelter, and often companionship. As </span><span class="xrefLink" data-dcnode-id="7551" id="jumplink-CIT0021"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7549" data-google-interstitial="false" data-open="CIT0021" href="javascript:;" reveal-id="CIT0021"><span data-dcnode-id="7550" instrument_node="">Darwin (1868)</span></a><span data-dcnode-id="7548" instrument_node=""> noted, captive propagation of wild taxa selects for behavioral and morphological traits favored by humans and relaxes selection for traits important for survival in the wild. His observations and our understanding of the genetic basis of these differences led to development of the domesticated strains of animals and plants that form the basis of modern agriculture. Thus, although pet dogs belong to the same species as the wolf, </span><em data-dcnode-id="7546"><span data-dcnode-id="7547" instrument_node="">Canis lupus</span></em><span data-dcnode-id="7545" instrument_node=""> ( </span><span class="xrefLink" data-dcnode-id="7544" id="jumplink-CIT0084"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7542" data-google-interstitial="false" data-open="CIT0084" href="javascript:;" reveal-id="CIT0084"><span data-dcnode-id="7543" instrument_node="">Wilson and Reeder 2005</span></a><span data-dcnode-id="7541" instrument_node=""> ), they clearly differ dramatically from wolves with regard to their interactions with humans. The changes in behavior, morphology, and genome diversity that are part of the domestication process may become evident after remarkably few generations. </span><span class="xrefLink" data-dcnode-id="7540" id="jumplink-CIT0045"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7538" data-google-interstitial="false" data-open="CIT0045" href="javascript:;" reveal-id="CIT0045"><span data-dcnode-id="7539" instrument_node="">Lacy et al. (2013)</span></a><span data-dcnode-id="7537" instrument_node=""> and </span><span class="xrefLink" data-dcnode-id="7536" id="jumplink-CIT0082"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7534" data-google-interstitial="false" data-open="CIT0082" href="javascript:;" reveal-id="CIT0082"><span data-dcnode-id="7535" instrument_node="">Willoughby et al. (2015)</span></a><span data-dcnode-id="7533" instrument_node=""> demonstrated behavioral and genetic changes among captive populations of wild rodents subjected to different breeding regimes after only 6–20 generations, even when breeding protocols were designed to limit evolution in captivity. Importantly, </span><span class="xrefLink" data-dcnode-id="7532" id="jumplink-CIT0045"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7530" data-google-interstitial="false" data-open="CIT0045" href="javascript:;" reveal-id="CIT0045"><span data-dcnode-id="7531" instrument_node="">Lacy et al. (2013)</span></a><span data-dcnode-id="7529" instrument_node=""> also found significant correlations among behavioral and life history parameters such as reproductive success. Other studies of the domestication process have demonstrated associated changes in interactions with humans ( </span><span class="xrefLink" data-dcnode-id="7528" id="jumplink-CIT0032"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7526" data-google-interstitial="false" data-open="CIT0032" href="javascript:;" reveal-id="CIT0032"><span data-dcnode-id="7527" instrument_node="">Hare et al. 2005</span></a><span data-dcnode-id="7525" instrument_node=""> ), hormonal profiles, and stress responses. Even seemingly subtle selection for “tameability” can have profound influences ( </span><span class="xrefLink" data-dcnode-id="7524" id="jumplink-CIT0076"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7522" data-google-interstitial="false" data-open="CIT0076" href="javascript:;" reveal-id="CIT0076"><span data-dcnode-id="7523" instrument_node="">Trut et al. 2009</span></a><span data-dcnode-id="7521" instrument_node=""> ), resulting in domestic ferrets that are more “dog-like” than “wild ferret-like” with respect to their social-affiliative behavior and responsiveness to humans ( </span><span class="xrefLink" data-dcnode-id="7520" id="jumplink-CIT0035"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7518" data-google-interstitial="false" data-open="CIT0035" href="javascript:;" reveal-id="CIT0035"><span data-dcnode-id="7519" instrument_node="">Hernádi et al. 2012</span></a><span data-dcnode-id="7517" instrument_node=""> ), and captive bred-foxes that display dog-like characteristics (e.g., eager to attract human interaction) after only a few generations ( </span><span class="xrefLink" data-dcnode-id="7516" id="jumplink-CIT0012"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7514" data-google-interstitial="false" data-open="CIT0012" href="javascript:;" reveal-id="CIT0012"><span data-dcnode-id="7515" instrument_node="">Belyaev and Trut 1964</span></a><span data-dcnode-id="7513" instrument_node=""> ). If such changes are evident after only a few generations or decades of captive breeding, how much stronger are the changes associated with extended selection, such as that experienced by traditional laboratory study subjects? Or, perhaps more relevant to work with wild animals, why would one expect wildlife species to respond to stimuli in the same manner as domesticated strains? </span></p><p class="chapter-para" data-dcnode-id="7510"><span data-dcnode-id="7511" instrument_node="">Institutions conducting wildlife research should ensure that the IACUC review process includes personnel with appropriate expertise. In many instances, this need is met by having one or more field researchers on the oversight committee. At institutions where field research accounts for a small proportion of protocols, outside consultation can be particularly useful. Even if the oversight body includes wildlife expertise, the diversity of species and research foci encompassed by such research will likely generate occasions when outside consultation is warranted. In these cases, the Animal Care and Use Committee (ACUC) of the ASM can assist in identifying individuals with relevant expertise.</span></p><span data-dcnode-id="7509" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="7507" data-legacy-id="s5" id="113547674" scrollto-destination="113547674"><span data-dcnode-id="7508" instrument_node="">Regulation of animal activities</span></h3><span data-dcnode-id="7506" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="7485"><span data-dcnode-id="7505" instrument_node=""> The use of vertebrate animals, particularly mammals, in research and education is regulated in many countries. In the United States, mammals other than rats of the genus </span><em data-dcnode-id="7503"><span data-dcnode-id="7504" instrument_node="">Rattus</span></em><span data-dcnode-id="7502" instrument_node=""> and mice of the genus </span><em data-dcnode-id="7500"><span data-dcnode-id="7501" instrument_node="">Mus</span></em><span data-dcnode-id="7499" instrument_node=""> that have been bred for research are regulated by the United States Department of Agriculture Animal and Plant Health Inspection Services (USDA/APHIS). The USDA recognizes exemptions, however, for those studies that meet the definition of a field study as defined by the Animal Welfare Act (AWA, see below). In addition to regulation by the USDA, activities funded by PHS must also comply with relevant provisions of the PHS policies on humane care and use of laboratory animals ( </span><span class="xrefLink" data-dcnode-id="7498" id="jumplink-CIT0051"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7496" data-google-interstitial="false" data-open="CIT0051" href="javascript:;" reveal-id="CIT0051"><span data-dcnode-id="7497" instrument_node="">NIH/OLAW 2015</span></a><span data-dcnode-id="7495" instrument_node=""> ). Institutions receiving PHS funding involving animal use or assured by the NIH/OLAW must maintain a PHS Assurance with the NIH/OLAW stating that, at a minimum, all PHS-funded activities will be conducted in a manner consistent with the </span><em data-dcnode-id="7493"><span data-dcnode-id="7494" instrument_node="">Guide</span></em><span data-dcnode-id="7492" instrument_node=""> and the AVMA </span><em data-dcnode-id="7490"><span data-dcnode-id="7491" instrument_node="">Guidelines for Euthanasia of Animals.</span></em><span data-dcnode-id="7489" instrument_node=""> If they choose, institutions may voluntarily extend their PHS Assurance so that it applies to all animal activities rather than only those funded by the PHS. The negative consequences of these latter cases is that all activities, regardless of the source of funding or intellectual focus, must be conducted in a manner consistent with the </span><em data-dcnode-id="7487"><span data-dcnode-id="7488" instrument_node="">Guide</span></em><span data-dcnode-id="7486" instrument_node=""> and the AVMA guidelines for euthanasia, both of which are often poorly suited for work with wild animals in the field. It is critical for oversight personnel and investigators to be familiar with the wording of their PHS Assurance to ensure continued compliance with the regulations and policies covering animal use. </span></p><p class="chapter-para" data-dcnode-id="7483"><span data-dcnode-id="7484" instrument_node="">Mammalogists conducting virtually any type of research involving wild mammals at an institution subject to federal oversight will be required to consult with their IACUCs to determine if their planned activities are subject to IACUC review and approval; in other words, whether the proposed activities meet the regulatory definition of a “field study” (see below). Investigators are also responsible for procuring all necessary permits from local and federal agencies before conducting any procedure involving live animals. These permit requirements apply whether the PI is working within the United States or elsewhere.</span></p><p class="chapter-para" data-dcnode-id="7481"><span data-dcnode-id="7482" instrument_node="">The AWA authorizes the USDA/APHIS to regulate vertebrates used (or intended for use) in research, testing, experimentation, exhibition, or as pets, regardless of whether animals are maintained in a laboratory, wild enclosure, or farm setting. However, the USDA/APHIS does not regulate animals used for food or fiber (or for improving quality of food or fiber), or for improvement of animal nutrition, breeding, management, or production efficiency. As noted above, there also is an exemption for activities that meet the regulatory definition of a field study. It is critical to note that the determination as to whether the proposed activities will meet the definition of a field study should be made by the IACUC rather than the researcher.</span></p><p class="chapter-para" data-dcnode-id="7479"><span data-dcnode-id="7480" instrument_node="">The United States Fish and Wildlife Service (USFWS) defines a mammal, in the context of “take,” “possession,” “transportation,” etc., as any member of the class Mammalia, including any part, product, egg, or offspring, or the dead body or parts thereof (excluding fossils), whether or not included in a manufactured product or in a processed food product (50 CFR 10.11). In the context of regulatory requirements, “permit” is any document designated as a “permit,” “license,” “certificate,” or any other document issued by the USFWS to authorize, limit, or describe an activity and signed by an authorized official of the USFWS. Although the focus of this section is on federal and state regulations in the United States, investigators, regardless of their nationality or location of their research, should understand that local, state–provincial, federal–national, or international laws or regulations likely exist that pertain to scientific collecting, transport, possession, sale, purchase, barter, exportation and importation of specimens or parts thereof, or other activities involving native or nonnative species of mammals. Therefore, each investigator must have knowledge of, and comply with, all relevant laws and regulations pertaining to field collection of mammals and the places where fieldwork is being conducted. Federal regulations exist in the United States that pertain to collection, import, export, and transport of scientific specimens of mammals (Endangered Species Act, CITES, and the Lacey Act). These regulations have provisions that allow for civil or criminal penalties and ineligibility for future permits. Researchers living in or conducting research in the United States must obtain permits issued by federal agencies to: import or export specimens of non-endangered species through a nondesignated port of entry; import or export endangered wildlife through any port; import injurious wildlife (those species listed under 50 CFR Part 16); import, export, transport interstate commercially, take, harass or possess endangered species listed under 50 CFR Part 17, or parts thereof, for research or propagation; take, harass, possess, or transport marine mammals (50 CFR Part 18); import or transfer etiological agents or vectors of human disease or living nonhuman primates; collect scientific specimens on national wildlife refuges; import ruminants and swine, including parts, products, and by-products; and import organisms or vectors, tissue cultures, cell lines, blood, and sera. Additional restrictions on importations of mammals, including fluids or tissues, may be imposed by the Centers for Disease Control and Prevention (CDC) or USDA/APHIS, so it is imperative that investigators consult current lists before attempting importation.</span></p><p class="chapter-para" data-dcnode-id="7477"><span data-dcnode-id="7478" instrument_node="">Importantly, investigators and IACUCs should be aware that the term “scientific collecting” is typically used by state game agencies in a very different context than by many researchers, who consider “scientific collecting” as removal of individuals from the population. In almost all cases, a state permit will be required for any work with wild vertebrates, whether the animals are removed from the population or not.</span></p><p class="chapter-para" data-dcnode-id="7466"><span data-dcnode-id="7476" instrument_node=""> When moving specimens of mammals into or out of the United States, researchers are required to file USFWS form 3–177—currently the electronic declaration form (e-Dec) available at </span><a class="link link-uri" data-dcnode-id="7474" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fws.gov/"><span data-dcnode-id="7475" instrument_node="">www.fws.gov</span></a><span data-dcnode-id="7473" instrument_node=""> is preferred and may be mandatory at the regional office or port of entry—and any necessary permits required by CITES if species are listed in CITES Appendices I–III, the Endangered Species Act, Lacey Act, or the Marine Mammal Protection Act. Note, however, that CITES-listed materials can move without permit between 2 registered institutions provided that they were first accessioned by the sending institution. Investigators should expect similar regulations in other countries and ensure compliance with all applicable regulations dealing with species of special concern. Investigators also must ascertain whether additional permits are needed when they review state–provincial and federal–national laws and regulations that relate to their planned field investigations. Further, investigators must be familiar with current lists of mammalian species deemed threatened or endangered by appropriate state–provincial or federal–national governments and comply with all laws and regulations pertaining to capture of these and other categories of protected mammals. A list of threatened or endangered species and subspecies under the United States Endangered Species Act is available from the Office of Endangered Species, Fish and Wildlife Service, United States Department of the Interior, Washington, D.C. 20240 ( </span><a class="link link-uri" data-dcnode-id="7471" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fws.gov/endangered/"><span data-dcnode-id="7472" instrument_node="">http://www.fws.gov/endangered/</span></a><span data-dcnode-id="7470" instrument_node=""> ). Regulations relevant to these taxa are published in the Code of Federal Regulations, 50 CFR Part 17; amendments to regulations under Title 50 also are published in the Federal Register. Investigators can search for CITES-listed species at </span><a class="link link-uri" data-dcnode-id="7468" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//checklist.cites.org/%23/en"><span data-dcnode-id="7469" instrument_node="">http://checklist.cites.org/#/en</span></a><span data-dcnode-id="7467" instrument_node=""> . </span></p><p class="chapter-para" data-dcnode-id="7464"><span data-dcnode-id="7465" instrument_node="">Most states and provinces require scientific collecting permits, and investigators must comply with these requirements and other regulations imposed by agencies in the states or provinces in which they conduct fieldwork in addition to all national and international regulations. States, national and state parks, or other organizations might have additional regulations regarding scientific uses of wildlife on lands under their jurisdiction. All public lands require permits except those lands controlled by the United States Bureau of Land Management, which still requires permission from a District Ranger. Compliance with these regulations and permit requirements is essential. With regard to privately owned land, investigators should obtain permission from the owner, operator, or manager before commencing fieldwork.</span></p><p class="chapter-para" data-dcnode-id="7462"><span data-dcnode-id="7463" instrument_node="">Many institutions, and state, provincial, and federal governments, have regulations or recommendations concerning handling and sampling of rodents or other mammals that might be carriers of zoonotic diseases. Investigators must ensure their own safety and that of employees or students by recognizing the disease-carrying potential of the mammals they study. Additionally, as part of their charge of reducing institutional liability, most IACUCs have adopted some form of occupational health screening for all persons involved with animal research. Health screening can range from completion of a simple check-off form inquiring about allergies or other health conditions of investigators, students, and employees, to completion of a much more detailed medical examination and health history.</span></p><p class="chapter-para" data-dcnode-id="7456"><span data-dcnode-id="7461" instrument_node=""> The variety and number of permits required for work with wild animals is extensive and has no parallel within the biomedical community. </span><span class="xrefLink" data-dcnode-id="7460" id="jumplink-CIT0060"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7458" data-google-interstitial="false" data-open="CIT0060" href="javascript:;" reveal-id="CIT0060"><span data-dcnode-id="7459" instrument_node="">Paul and Sikes (2013)</span></a><span data-dcnode-id="7457" instrument_node=""> review general permitting requirements, but no single document will cover all possible situations. The PI and the oversight body must be well versed regarding required permits. This raises the question of who is responsible for obtaining permits and keeping associated records. Where permits are required, work cannot be conducted legally until the necessary documents have been secured. Although some institutions require permits before an IACUC protocol can be approved or even reviewed, this approach typically increases the workload of both the PI and the IACUC because permit renewal dates rarely coincide with protocol dates. Further, permits are issued to the individual PI rather than to the institution. Thus, a prudent approach is to approve acceptable protocols but specify to the investigator in writing that work cannot commence until all required permits are in place. </span></p><p class="chapter-para" data-dcnode-id="7454"><span data-dcnode-id="7455" instrument_node="">Beyond meeting legal requirements, the issuance of permits can provide assurance to the IACUC that any impact of proposed activities on local populations is minimal or is scientifically justified. Whereas IACUCs seldom have the expertise or data necessary to make such judgments, permitting agencies are usually charged with safeguarding these natural resources and have personnel with the appropriate expertise to make informed decisions as part of permit application review and approval. Thus, attention to this major difference between biomedical and wildlife research can be accomplished without additional burden on the IACUC.</span></p><span data-dcnode-id="7453" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="7451" data-legacy-id="s6" id="113547685" scrollto-destination="113547685"><span data-dcnode-id="7452" instrument_node="">Categorization of animal use for USDA compliance</span></h3><span data-dcnode-id="7450" instrument_node="">
</span><blockquote data-dcnode-id="7447"><p class="chapter-para" data-dcnode-id="7448"><span data-dcnode-id="7449" instrument_node="">In 2010, the ASM, in conjunction with the Ornithological Council, reviewed guidance documents available to institutions and developed a joint position regarding categorization of animal use for USDA compliance. This text was first disseminated as a position statement and addendum to the 2007 version of these Guidelines in 2010. The portions of this joint position relevant to work with mammals are included herein.</span></p></blockquote><p class="chapter-para" data-dcnode-id="7445"><span data-dcnode-id="7446" instrument_node="">Two aspects of the terminology used to classify animal usage can cause confusion for activities involving wild animals: classification of the capture of free-ranging animals with regard to the USDA reporting categories for pain and distress and identification of field studies for the purpose of determining when IACUC protocol review, IACUC site inspection, and inclusion on USDA annual reports are required.</span></p><span data-dcnode-id="7444" instrument_node=""> </span><h4 class="section-title js-splitscreen-section-title" data-dcnode-id="7442" data-legacy-id="s7" id="113547688" scrollto-destination="113547688"><span data-dcnode-id="7443" instrument_node="">USDA reports: pain and distress categories.</span></h4><span data-dcnode-id="7441" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="7439"><span data-dcnode-id="7440" instrument_node="">The AWA [7 USC 2143(b) (3) (A)] and the implementing regulation (9 CFR 2.36) require that research facilities in the United States subject to these laws file an annual report with the USDA Animal Care Regional Office documenting their research and teaching activities that use live animals covered by the Act and its implementing regulations. A component of this report is classification of animal usage into categories intended to describe the absence, presence, or extent of pain or distress and the use or non-use of drugs to alleviate these conditions.</span></p><p class="chapter-para" data-dcnode-id="7437"><span data-dcnode-id="7438" instrument_node="">USDA descriptions for animal reporting categories as defined on the reporting form (APHIS Form 7023) are:</span></p><ul class="list-simple" data-dcnode-id="7427"><li data-dcnode-id="7434"><p class="chapter-para" data-dcnode-id="7435"><span data-dcnode-id="7436" instrument_node="">C—Animals upon which teaching, research, experiments or tests were conducted involving no pain, distress, or use of pain-relieving drugs.</span></p></li><li data-dcnode-id="7431"><p class="chapter-para" data-dcnode-id="7432"><span data-dcnode-id="7433" instrument_node="">D—Animals upon which experiments, teaching, research, surgery, or tests were conducted involving accompanying pain or distress to the animals and for which appropriate anesthetic, analgesic, or tranquilizing drugs were used.</span></p></li><li data-dcnode-id="7428"><p class="chapter-para" data-dcnode-id="7429"><span data-dcnode-id="7430" instrument_node="">E—Animals upon which teaching, experiments, research, surgery, or tests were conducted involving accompanying pain or distress to the animals and for which the use of appropriate anesthetic, analgesic, or tranquilizing drugs would have adversely affected the procedures, results, or interpretation of the teaching, research, or experiments, surgery, or tests. (An explanation of the procedures producing pain or distress on these animals and the reasons such drugs were not used must be attached to the report).</span></p></li></ul><p class="chapter-para" data-dcnode-id="7411"><span data-dcnode-id="7426" instrument_node=""> Guidance for classifying animal procedures is provided in Policy 11 of the </span><em data-dcnode-id="7424"><span data-dcnode-id="7425" instrument_node="">Animal Care Policy Manual</span></em><span data-dcnode-id="7423" instrument_node=""> ( </span><span class="xrefLink" data-dcnode-id="7422" id="jumplink-CIT0077"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7420" data-google-interstitial="false" data-open="CIT0077" href="javascript:;" reveal-id="CIT0077"><span data-dcnode-id="7421" instrument_node="">USDA 2015a</span></a><span data-dcnode-id="7419" instrument_node=""> ) published by the Animal Care program of the USDA/APHIS. However, this guidance and the examples therein pertain primarily to procedures conducted in a laboratory setting, usually in the context of biomedical research. Classification becomes especially problematic when institutions are faced with applying regulations intended primarily for laboratory settings and domesticated animals to the very different context of free-ranging wild animals. The 2 critical terms in these descriptions are “pain” and “distress.” According to the </span><em data-dcnode-id="7417"><span data-dcnode-id="7418" instrument_node="">Animal Care Policy Manual</span></em><span data-dcnode-id="7416" instrument_node=""> Policy 11 ( </span><span class="xrefLink" data-dcnode-id="7415" id="jumplink-CIT0077"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7413" data-google-interstitial="false" data-open="CIT0077" href="javascript:;" reveal-id="CIT0077"><span data-dcnode-id="7414" instrument_node="">USDA 2015a</span></a><span data-dcnode-id="7412" instrument_node=""> ), a painful procedure is defined as “any procedure that would reasonably be expected to cause more than slight or momentary pain or distress in a human being to which that procedure is applied, that is, pain in excess of that caused by injections or other minor procedures.” Distress is not defined in current policy except by example: “Food or water deprivation beyond that necessary for normal presurgical preparation, noxious electrical shock that is not immediately escapable, paralysis or immobility in a conscious animal.” Appropriate classification of activities is left to the IACUC. </span></p><span data-dcnode-id="7410" instrument_node=""> </span><h4 class="section-title js-splitscreen-section-title" data-dcnode-id="7408" data-legacy-id="s8" id="113547693" scrollto-destination="113547693"><span data-dcnode-id="7409" instrument_node="">USDA classifications as applied to animal capture and noninvasive field procedures.</span></h4><span data-dcnode-id="7407" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="7398"><span data-dcnode-id="7406" instrument_node=""> Mammal capture devices are designed either to hold the animal unharmed (live traps) or to kill the animal outright upon capture. Barring mechanical malfunctions, and with appropriate placement and trap monitoring, animals captured in live traps or nets are simply held without injury until removal. Appropriate training is essential for setting capture devices and for removing animals from those devices. Pain or distress as described in the USDA/APHIS </span><em data-dcnode-id="7404"><span data-dcnode-id="7405" instrument_node="">Animal Care Policy Manual</span></em><span data-dcnode-id="7403" instrument_node=""> ( </span><span class="xrefLink" data-dcnode-id="7402" id="jumplink-CIT0077"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7400" data-google-interstitial="false" data-open="CIT0077" href="javascript:;" reveal-id="CIT0077"><span data-dcnode-id="7401" instrument_node="">USDA 2015a</span></a><span data-dcnode-id="7399" instrument_node=""> ) is unlikely to result from the simple capture of free-ranging mammals in most live traps or capture devices. Thus, Category C is appropriate if these activities occur as part of a project that includes USDA-covered species. </span></p><p class="chapter-para" data-dcnode-id="7393"><span data-dcnode-id="7397" instrument_node=""> Most tissue sampling and marking techniques conducted in the field are also consistent with USDA Pain or Distress Category C provided that these procedures are not more invasive than peripheral blood sampling. Support for this classification is provided in the </span><em data-dcnode-id="7395"><span data-dcnode-id="7396" instrument_node="">Guidelines for Preparing USDA Annual Reports and Assigning USDA Pain and Distress Categories</span></em><span data-dcnode-id="7394" instrument_node=""> . This document is distributed by the NIH Office of Animal Care and Use, which is the oversight office for intramural research. This guidance expressly states that Category C includes most blood collection procedures and tissue collection procedures that involve no or only momentary or slight pain. Based on these same NIH Guidelines, USDA Category C is appropriate also in instances where procedures requiring peripheral tissue sampling or tagging and subsequent release of free-ranging animals necessitate chemical immobilization to conduct the procedures, provided that immobilization is performed only to facilitate the procedure and protect the animal and the researcher from injury rather than to alleviate pain or distress induced by the procedure. </span></p><p class="chapter-para" data-dcnode-id="7385"><span data-dcnode-id="7392" instrument_node=""> Capture of free-ranging mammals in properly functioning kill traps typically meets the USDA Category C. The same is true of those animals captured in live traps, even if they are subsequently euthanized as part of the research study. The method and quality of death is the criterion for classification. Any method recognized as an approved method of euthanasia by the AVMA is consistent with Category C. Because neither the AWA nor its implementing regulations reference the AVMA’s </span><em data-dcnode-id="7390"><span data-dcnode-id="7391" instrument_node="">Guidelines for the Euthanasia of Animals</span></em><span data-dcnode-id="7389" instrument_node=""> , for those methods not approved by the AVMA for euthanasia, the IACUC is the deciding body as to whether the method of death meets the regulatory definition of euthanasia as defined by the AWA. Additional information on kill traps and methods of death pertinent to USDA reporting is provided in the section of the AVMA guidelines entitled </span><em data-dcnode-id="7387"><span data-dcnode-id="7388" instrument_node="">Euthanasia and Humane Killing</span></em><span data-dcnode-id="7386" instrument_node=""> . </span></p><span data-dcnode-id="7384" instrument_node=""> </span><h4 class="section-title js-splitscreen-section-title" data-dcnode-id="7382" data-legacy-id="s9" id="113547697" scrollto-destination="113547697"><span data-dcnode-id="7383" instrument_node="">Euthanasia and humane killing.</span></h4><span data-dcnode-id="7381" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="7379"><span data-dcnode-id="7380" instrument_node="">Even for trapping methods that ordinarily are consistent with Category C, in the event of a problem in the field not associated with experimental manipulations that results in pain or suffering and necessitates pain alleviation, post hoc classification as Category D would be appropriate for that particular animal. For example, if either a live or a kill trap malfunctions, leaving an animal in pain or distress and the animal is either treated with appropriate pharmaceuticals or euthanized in a timely fashion, then Category D is the most appropriate category. In the case of euthanasia, this procedure (rather than treatment) is used to alleviate pain or distress. It is important to note that these cases can occasionally occur with wild animals despite the trapping techniques ordinarily being consistent with Category C. The foregoing is not meant to imply that a higher level of pain or distress should be expected in proposed activities, but simply that PIs and IACUCs should be cognizant of the need to reclassify animals on a post hoc basis should actual events warrant.</span></p><span data-dcnode-id="7378" instrument_node=""> </span><h4 class="section-title js-splitscreen-section-title" data-dcnode-id="7376" data-legacy-id="s10" id="113547699" scrollto-destination="113547699"><span data-dcnode-id="7377" instrument_node="">Field studies.</span></h4><span data-dcnode-id="7375" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="7363"><span data-dcnode-id="7374" instrument_node=""> Considerable misunderstanding has surrounded the application of the AWA to field research. Regulations promulgated by the USDA under the AWA exempt field studies from IACUC review [9 CFR 2.31(d)] in cases in which field study is defined as “any study conducted on free-living wild animals in their natural habitat that does not harm or materially alter the behavior of the animal under study” (9 CFR 1.1). None of these terms is defined in the regulation or in guidance documents issued by USDA/APHIS, which leaves the IACUC responsible for their interpretation. The same regulation exempts from the inspection requirement of 9 CFR 2.31 “animal areas containing free-living wild animals in their natural habitat.” How the definition of field study corresponds to the USDA reporting categories is unclear. In most instances, protocols involving only procedures classified as Category C are consistent with the regulatory definition of a field study, but whether these should be included on annual reports has been uncertain. The USDA provides relevant guidance in their 2015 revision of the </span><em data-dcnode-id="7372"><span data-dcnode-id="7373" instrument_node="">Animal Welfare Inspection Guide</span></em><span data-dcnode-id="7371" instrument_node=""> ( </span><span class="xrefLink" data-dcnode-id="7370" id="jumplink-CIT0078"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7368" data-google-interstitial="false" data-open="CIT0078" href="javascript:;" reveal-id="CIT0078"><span data-dcnode-id="7369" instrument_node="">USDA 2015b</span></a><span data-dcnode-id="7367" instrument_node=""> ) (the guidance document issued to Veterinary Medical Officers charged with inspecting registered institutions) by stating that “animals euthanized, killed, or trapped, and collected, such as for study or museum samples, from their natural habitat via humane euthanasia” should not be included on annual reports to the USDA. Unfortunately, the wording of this document, although not regulatory in the strict sense, could be construed to mean that animals captured, whether euthanized in the field or not, fall under the field studies exclusion and are therefore exempt from IACUC review. </span><em data-dcnode-id="7365"><span data-dcnode-id="7366" instrument_node="">The ASM states emphatically that any activity involving the capture of wild mammals should be subject to review by an IACUC to determine whether the activity meets the regulatory definition of a field study and, if not found to be exempt, to provide appropriate oversight for use of wild mammals in research</span></em><span data-dcnode-id="7364" instrument_node=""> . </span></p><p class="chapter-para" data-dcnode-id="7358"><span data-dcnode-id="7362" instrument_node=""> With regard to IACUC protocol review, the PHS Policy on Humane Care and Use of Laboratory Animals makes no distinction between laboratory and field studies. Guidance from the NIH/OLAW (FAQ A6) states, “[i]f the activities are PHS-supported and involve vertebrate animals, then the IACUC is responsible for oversight in accordance with PHS policy. IACUCs must know where field studies will be located, what procedures will be involved, and be sufficiently familiar with the nature of the habitat to assess the potential impact on the animal subjects. Studies with the potential to impact the health or safety of personnel or the animal’s environment may need IACUC oversight, even if described as purely observational or behavioral. When capture, handling, confinement, transportation, anesthesia, euthanasia, or invasive procedures are involved, the IACUC must ensure that proposed studies are in accord with the </span><em data-dcnode-id="7360"><span data-dcnode-id="7361" instrument_node="">Guide</span></em><span data-dcnode-id="7359" instrument_node=""> .” </span></p><span data-dcnode-id="7357" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="7355" data-legacy-id="s11" id="113547702" scrollto-destination="113547702"><span data-dcnode-id="7356" instrument_node="">Protocols and protocol forms for wildlife studies</span></h3><span data-dcnode-id="7354" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="7349"><span data-dcnode-id="7353" instrument_node=""> Even with standards and guidelines appropriate for wild animals, activities must be described in sufficient detail to permit critical review by oversight bodies. This can best be accomplished by use of protocol forms designed to address concerns relevant to the circumstances and specifics of field work with wild animals. For example, protocols for work with wildlife must describe how animals are captured for study, discuss the potential for capture and the subsequent disposition of nontarget species, and address the uncertainty that often exists regarding the number and sex of animals that might be taken in any trapping or capture event. Other differences include the fact that some wild mammals can be handled only after chemical immobilization and that veterinary care is seldom possible in the field for animals injured during capture or manipulation. These are among the multiple wildlife-specific concerns that must be considered by IACUCs for responsible oversight of activities involving wild animals, but, as noted above, protocol forms designed for biomedical research seldom address these issues. A wildlife-specific protocol form developed collaboratively by the ASM ACUC and the Ornithological Council was featured in a webinar sponsored by NIH/OLAW. A revision of this form is freely available on the ASM website ( </span><a class="link link-uri" data-dcnode-id="7351" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mammalogy.org/uploads/committee_files/ModelWildlifeProtocol2016.docx"><span data-dcnode-id="7352" instrument_node="">http://mammalogy.org/uploads/committee_files/ModelWildlifeProtocol2016.docx</span></a><span data-dcnode-id="7350" instrument_node=""> ). </span></p><span data-dcnode-id="7348" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="7346" data-legacy-id="s12" id="113547704" scrollto-destination="113547704"><span data-dcnode-id="7347" instrument_node="">Numbers and species (including endangered taxa)</span></h3><span data-dcnode-id="7345" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="7323"><span data-dcnode-id="7344" instrument_node=""> The </span><em data-dcnode-id="7342"><span data-dcnode-id="7343" instrument_node="">Guide</span></em><span data-dcnode-id="7341" instrument_node=""> ( </span><span class="xrefLink" data-dcnode-id="7340" id="jumplink-CIT0054"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7338" data-google-interstitial="false" data-open="CIT0054" href="javascript:;" reveal-id="CIT0054"><span data-dcnode-id="7339" instrument_node="">NRC 2011</span></a><span data-dcnode-id="7337" instrument_node=""> ) requires that protocols include details concerning the numbers of animals to be used. These details are relevant during IACUC discussions of the “3 Rs” outlined in the </span><em data-dcnode-id="7335"><span data-dcnode-id="7336" instrument_node="">Guide</span></em><span data-dcnode-id="7334" instrument_node=""> (Reduction, Refinement, and Replacement— </span><span class="xrefLink" data-dcnode-id="7333" id="jumplink-CIT0054"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7331" data-google-interstitial="false" data-open="CIT0054" href="javascript:;" reveal-id="CIT0054"><span data-dcnode-id="7332" instrument_node="">NRC 2011</span></a><span data-dcnode-id="7330" instrument_node=""> ) and direct IACUC members to determine if the fewest animals necessary to accomplish the stated research goals with statistical rigor are being used. Further, oversight agencies such as the USDA focus on appropriate association of animal numbers with procedures or research aims. Frequently, field researchers do not know how many individuals will be needed or sampled; this is particularly true for faunal surveys or other exploratory work common in mammalogy. While animal captures obviously vary with density and environmental conditions, statements in protocols such as, “it is unknown how many animals we will capture” are generally not well received by the IACUC. Although inclusion of statements like, “20 individuals from each species for each locality,” is one way to provide numerical limits, a stronger approach is to consider more acceptable generalized statements such as: “In this survey we expect to collect different species of </span><em data-dcnode-id="7328"><span data-dcnode-id="7329" instrument_node="">Oryzomys</span></em><span data-dcnode-id="7327" instrument_node=""> and will sample an estimated 25 localities. We will not exceed 20 specimens per species of </span><em data-dcnode-id="7325"><span data-dcnode-id="7326" instrument_node="">Oryzomys</span></em><span data-dcnode-id="7324" instrument_node=""> per locality. It is anticipated that the total number of specimens collected during this study will not exceed 500 individuals per year.” </span></p><p class="chapter-para" data-dcnode-id="7321"><span data-dcnode-id="7322" instrument_node="">The numbers of animals required in field studies will vary greatly depending on study design, species’ life history characteristics, and the research questions posed. Behavioral studies might involve capture of only a few animals in which the focus is a specific activity, or capture of an entire population in which all individuals must be marked. In the latter case, the investigator can provide a statement that “all animals in the population will be captured, marked, and released, and it is estimated that this will not exceed 200 individuals per year.” Genetic, taxonomic, ecological, and other studies typically require a minimum sample size for statistical analyses. Too few animals might not allow the investigator to address research questions with sufficient scientific rigor and, subsequently, will result in a waste of animals if the results do not provide a robust test of the relevant hypothesis. In these situations, a power analysis might be performed to estimate the number of animals required to obtain statistical significance for a given variance and a minimum expected difference be
