tween samples.</span></p><p class="chapter-para" data-dcnode-id="7309"><span data-dcnode-id="7320" instrument_node=""> IACUCs also are charged with approving the particular species of mammals involved in a project. Biomedical protocols typically use strains of animals that have been domesticated or, if not entirely domesticated, have been maintained in captivity for sufficient time to habituate to interactions with humans. The vast majority of biomedical research is accomplished with only 2 species of mammals—laboratory rats ( </span><em data-dcnode-id="7318"><span data-dcnode-id="7319" instrument_node="">Rattus norvegicus</span></em><span data-dcnode-id="7317" instrument_node=""> ) and mice ( </span><em data-dcnode-id="7315"><span data-dcnode-id="7316" instrument_node="">Mus musculus</span></em><span data-dcnode-id="7314" instrument_node=""> ). In addition to the wild counterparts of these 2 domesticated rodents, there exist more than 5,400 species of mammals that field investigators might study scientifically ( </span><span class="xrefLink" data-dcnode-id="7313" id="jumplink-CIT0084"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7311" data-google-interstitial="false" data-open="CIT0084" href="javascript:;" reveal-id="CIT0084"><span data-dcnode-id="7312" instrument_node="">Wilson and Reeder 2005</span></a><span data-dcnode-id="7310" instrument_node=""> ). For such research, the IACUC will require a protocol in which the investigator provides an adequate description of the study methods, experimental design, and expected results, as well as a summary of related, previous studies. The IACUC might query investigators about planned methods of euthanasia even if the proposed study involves only observation or capture and release of animals. “We are not killing any animals” is a frequent, but unsatisfactory, response to an IACUC because it indicates that the investigator has not considered methods of treatment or euthanasia in the event of an unexpected injury. Importantly, it is usually appropriate for field protocols to list a variety of euthanasia methods to suit the species and conditions encountered. </span></p><p class="chapter-para" data-dcnode-id="7307"><span data-dcnode-id="7308" instrument_node="">Because most capture methods for free-ranging mammals are not species specific, it is important for PIs to include, and IACUCs to accept, considerable latitude in the list of target and nontarget species that might be encountered. Species lists that are too narrow can place a PI out of compliance if unexpected captures are made. These unexpected captures often provide particularly important distributional records for species not known to occur in the study area and might even represent previously unidentified species. In some instances, it might be appropriate for species lists to include statements like “all small mammals occurring in the region.”</span></p><p class="chapter-para" data-dcnode-id="7305"><span data-dcnode-id="7306" instrument_node="">The investigator should provide assurance to the IACUC that all permits necessary for the proposed use of wild mammals have been issued or requested; copies of permits must be available if requested by the IACUC. Although most IACUCs usually do not focus on scientific merit, Principle II of the United States Government Principles for the Utilization and Care of Vertebrate Animals Used in Testing, Research, and Training states that “procedures involving animals should be designed and performed with due consideration of their relevance to human or animal health, the advancement of knowledge, or the good of society.” IACUCs that deal primarily with biomedical protocols sometimes have difficulty evaluating the merit of field study protocols. Peer review of scientific proposals, approval of project permits by state or federal agencies, and support from academic departmental chairs can provide assurance to the IACUC that the project is sound and the use of animals justified. Although rare, the IACUC might seek an outside assessment or request evidence of peer review to evaluate scientific merit.</span></p><p class="chapter-para" data-dcnode-id="7303"><span data-dcnode-id="7304" instrument_node="">In concluding this overview, we emphasize that this document is not intended to be an exhaustive catalog of procedures and requirements; we encourage investigators to consult with their IACUCs during protocol preparation to insure that all oversight concerns are addressed. We also emphasize that final approval of any protocol rests with the IACUC.</span></p><span data-dcnode-id="7302" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="7295" data-legacy-id="s13" id="113547711" scrollto-destination="113547711"><span data-dcnode-id="7301" instrument_node="">G </span><span class="small-caps" data-dcnode-id="7299"><span data-dcnode-id="7300" instrument_node="">eneral</span></span><span data-dcnode-id="7298" instrument_node=""> G </span><span class="small-caps" data-dcnode-id="7296"><span data-dcnode-id="7297" instrument_node="">uidelines</span></span></h2><span data-dcnode-id="7294" instrument_node="">
</span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="7292" data-legacy-id="s14" id="113547712" scrollto-destination="113547712"><span data-dcnode-id="7293" instrument_node="">Fieldwork with mammals</span></h3><span data-dcnode-id="7291" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="7289"><span data-dcnode-id="7290" instrument_node="">Fieldwork is arguably the most challenging form of research for IACUCs and others who typically evaluate use of animals in laboratory-based studies. Fieldwork in mammalogy involves designing and conducting research to address scientific questions while working with mammals in their natural habitats. This process might involve capturing an animal to obtain reproductive and other data and subsequently releasing it to obtain additional information on population dynamics, movements, and habitat relationships. In some cases, the investigator might bring a wild-caught animal into an animal facility for further study. These wild animals might require sedation or anesthesia to facilitate handling, but use of suitable pharmaceuticals is often under federal and state control, so investigators should consult with federal and state drug enforcement agencies and obtain appropriate licenses during the design stage of a study if their use is anticipated. Some drugs (e.g., narcotics) require strict inventory logs and storage in doubly locked areas to prevent unauthorized access, requirements that can be challenging to meet in the context of field work.</span></p><span data-dcnode-id="7288" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="7286" data-legacy-id="s15" id="113547714" scrollto-destination="113547714"><span data-dcnode-id="7287" instrument_node="">Training</span></h3><span data-dcnode-id="7285" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="7277"><span data-dcnode-id="7284" instrument_node=""> Training, especially in the rapidly changing area of research compliance, is extremely important for all individuals handling vertebrate animals. Online training is often required by the IACUC as part of protocol review and approval. Frequently, though, this training is general and oriented toward laboratory environments. The Collaborative Institutional Training Initiative ( </span><a class="link link-uri" data-dcnode-id="7282" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//citiprogram.org/"><span data-dcnode-id="7283" instrument_node="">CITIprogram.org</span></a><span data-dcnode-id="7281" instrument_node=""> ) used by many institutions includes an informative wildlife-specific course in addition to general training in animal use. NIH/OLAW sponsors freely available webinars on animal research topics and at least 1 of these has focused on oversight of wildlife research. These resources are available through the NIH/OLAW education portal at </span><a class="link link-uri" data-dcnode-id="7279" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//grants.nih.gov/grants/olaw/educational_resources.htm"><span data-dcnode-id="7280" instrument_node="">http://grants.nih.gov/grants/olaw/educational_resources.htm</span></a><span data-dcnode-id="7278" instrument_node=""> . Other wildlife-focused webinars or podcasts have been made available by Public Responsibility in Medicine and Research (PRIM&amp;R) and AAALAC International. </span></p><p class="chapter-para" data-dcnode-id="7275"><span data-dcnode-id="7276" instrument_node="">Still other training opportunities are organized by local IACUCs and tailored for their institutions. Procedural training can be provided by veterinarians or technicians experienced in research-oriented procedures. Specialized training can provide the investigator with experience in acceptable methods of restraining, marking, monitoring vital signs, administering injections, taking blood samples, and assessing stress or signs of pain or distress. The investigator is responsible for knowing how to perform procedures in the appropriate setting (field, laboratory, etc.) for which their protocol was approved.</span></p><p class="chapter-para" data-dcnode-id="7269"><span data-dcnode-id="7274" instrument_node=""> The IACUCs are urged to recognize the investigator as a collaborator who is sometimes well versed in the biology of the taxa studied. Wild vertebrates, particularly mammals, are vastly different in physiology and behavior from the usually highly inbred organisms used in biomedical research ( </span><span class="xrefLink" data-dcnode-id="7273" id="jumplink-CIT0069"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7271" data-google-interstitial="false" data-open="CIT0069" href="javascript:;" reveal-id="CIT0069"><span data-dcnode-id="7272" instrument_node="">Sikes and Bryan 2015</span></a><span data-dcnode-id="7270" instrument_node=""> ). Wild vertebrates do not inhabit antiseptic, stress-free environments with ad libitum food. With these differences in mind, investigators should serve as resources to their IACUCs and institutional veterinarians and all of these individuals should work together to insure the appropriate use of animals in research. </span></p><span data-dcnode-id="7268" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="7266" data-legacy-id="s16" id="113547718" scrollto-destination="113547718"><span data-dcnode-id="7267" instrument_node="">Oversight of field studies</span></h3><span data-dcnode-id="7265" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="7251"><span data-dcnode-id="7264" instrument_node=""> Although field studies as defined by the AWA (those conducted on free-living animals in their natural habitat that do not involve invasive procedures, harm, or materially alter behavior of an animal) are exempt from IACUC review [9 CFR 2.31 (d)], many institutions interpret the AWA in a broader sense and require IACUC review of all laboratory, classroom, and fieldwork involving vertebrates. For those studies that require review and approval by the IACUC, many references for common field procedures for mammals are available (e.g., </span><span class="xrefLink" data-dcnode-id="7263" id="jumplink-CIT0043"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7261" data-google-interstitial="false" data-open="CIT0043" href="javascript:;" reveal-id="CIT0043"><span data-dcnode-id="7262" instrument_node="">Kunz and Parsons 2009</span></a><span data-dcnode-id="7260" instrument_node=""> ; </span><span class="xrefLink" data-dcnode-id="7259" id="jumplink-CIT0049"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7257" data-google-interstitial="false" data-open="CIT0049" href="javascript:;" reveal-id="CIT0049"><span data-dcnode-id="7258" instrument_node="">Martin et al. 2011</span></a><span data-dcnode-id="7256" instrument_node=""> ; </span><span class="xrefLink" data-dcnode-id="7255" id="jumplink-CIT0066"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7253" data-google-interstitial="false" data-open="CIT0066" href="javascript:;" reveal-id="CIT0066"><span data-dcnode-id="7254" instrument_node="">Ryan 2011</span></a><span data-dcnode-id="7252" instrument_node=""> ); these sources should be consulted by the investigator during protocol preparation and referenced as needed. Further, some institutions may have standard procedure descriptions available for use by all investigators preparing protocols. </span></p><span data-dcnode-id="7250" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="7243" data-legacy-id="s17" id="113547720" scrollto-destination="113547720"><span data-dcnode-id="7249" instrument_node="">T </span><span class="small-caps" data-dcnode-id="7247"><span data-dcnode-id="7248" instrument_node="">rapping</span></span><span data-dcnode-id="7246" instrument_node=""> T </span><span class="small-caps" data-dcnode-id="7244"><span data-dcnode-id="7245" instrument_node="">echniques</span></span></h2><span data-dcnode-id="7242" instrument_node="">
</span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="7240" data-legacy-id="s18" id="113547721" scrollto-destination="113547721"><span data-dcnode-id="7241" instrument_node="">Considerations for capturing mammals</span></h3><span data-dcnode-id="7239" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="7233"><span data-dcnode-id="7238" instrument_node=""> Although capture of wild mammals is a common element of field studies, physical capture is not always necessary and investigators can sometimes use other procedures to monitor free-living animals. These include obtaining acoustic signatures (ultrasonic detectors), visual data (still or video cameras), or nondestructive tissue samples (sticky hair snares to remove hair) from free-ranging mammals without substantially altering the animals’ behavior. In general, these techniques are not of concern to IACUCs unless they involve capture (e.g., capturing bats in mist nets to identify species before animals are released and their vocalizations recorded as they retreat), harassment, or visiting nest sites during critical times in a species’ life cycle (e.g., bat nursery roost or seal pup nursery). Concerns may also exist that the investigator’s presence can alter animal behavior or place animals or personnel at risk for exposure to pathogens or other harm ( </span><span class="xrefLink" data-dcnode-id="7237" id="jumplink-CIT0040"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7235" data-google-interstitial="false" data-open="CIT0040" href="javascript:;" reveal-id="CIT0040"><span data-dcnode-id="7236" instrument_node="">Klailova et al. 2010</span></a><span data-dcnode-id="7234" instrument_node=""> ). Individual IACUCs and institutional policies vary widely regarding exemptions for observational studies and thus investigators should become familiar with their institutional policies before beginning any work with mammals. </span></p><p class="chapter-para" data-dcnode-id="7224"><span data-dcnode-id="7232" instrument_node=""> Common reasons to capture mammals include livetrapping to tag (with radiotransmitters, necklaces, ear tags, or passive integrated transponder [PIT] tags), mark (number, band, hair color, freeze brand, ear tag, or toe clip), or collect tissue. Regardless of approach, the potential for pain, distress, or suffering must be considered. A variety of methods and devices are available for trapping wild mammals. Techniques for capture of specific species of mammals are detailed in summary sources ( </span><span class="xrefLink" data-dcnode-id="7231" id="jumplink-CIT0083"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7229" data-google-interstitial="false" data-open="CIT0083" href="javascript:;" reveal-id="CIT0083"><span data-dcnode-id="7230" instrument_node="">Wilson et al. 1996</span></a><span data-dcnode-id="7228" instrument_node=""> ), internet sites devoted to specific subsets of mammals (e.g., </span><a class="link link-uri" data-dcnode-id="7226" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fishwildlife.org/index.php%3Fsection%3Dfurbearer_management%26activator%3D27"><span data-dcnode-id="7227" instrument_node="">http://www.fishwildlife.org/index.php?section=furbearer_management&amp;activator=27</span></a><span data-dcnode-id="7225" instrument_node=""> for furbearers), and especially in articles from the primary literature. Possibilities include live traps (e.g., Sherman, box, mist nets, snares, Tomahawk, Havahart, pitfall, nest box, and artificial burrow), kill traps (e.g., Museum Special, Conibear, and pitfalls), and other specialty traps for particular species or purposes. Shooting with a firearm might be necessary to obtain specimens of some species. We address each of these general categories of traps in greater detail below. </span></p><span data-dcnode-id="7223" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="7221" data-legacy-id="s19" id="113547724" scrollto-destination="113547724"><span data-dcnode-id="7222" instrument_node="">Live capture</span></h3><span data-dcnode-id="7220" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="7202"><span data-dcnode-id="7219" instrument_node=""> Investigators conducting research requiring live capture of mammals assume the responsibility for using humane methods that respect target and nontarget species. Methods for live capture include those designed for small mammals (Sherman, Tomahawk, and Havahart traps, pitfalls, artificial burrows, and nest boxes), medium-sized to large mammals (Tomahawk, Havahart, and foot-hold traps, snares, corrals, cannon nets, culvert traps, and darting), bats (mist nets, harp traps, and bags), and fossorial mammals ( </span><span class="xrefLink" data-dcnode-id="7218" id="jumplink-CIT0008"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7216" data-google-interstitial="false" data-open="CIT0008" href="javascript:;" reveal-id="CIT0008"><span data-dcnode-id="7217" instrument_node="">Baker and Williams 1972</span></a><span data-dcnode-id="7215" instrument_node=""> ; </span><span class="xrefLink" data-dcnode-id="7214" id="jumplink-CIT0033"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7212" data-google-interstitial="false" data-open="CIT0033" href="javascript:;" reveal-id="CIT0033"><span data-dcnode-id="7213" instrument_node="">Hart 1973</span></a><span data-dcnode-id="7211" instrument_node=""> ). Methods of live capture should not injure or cause excessive stress to the animal. Adequate measures should be taken to ensure that captured animals are protected from predation and temperature extremes and have food and water available, as needed, while restrained in traps. For permanent trapping grids or webs, the investigator might provide shelters over traps to protect captured animals from environmental conditions ( </span><span class="xrefLink" data-dcnode-id="7210" id="jumplink-CIT0038"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7208" data-google-interstitial="false" data-open="CIT0038" href="javascript:;" reveal-id="CIT0038"><span data-dcnode-id="7209" instrument_node="">Kaufman and Kaufman 1989</span></a><span data-dcnode-id="7207" instrument_node=""> ; </span><span class="xrefLink" data-dcnode-id="7206" id="jumplink-CIT0059"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7204" data-google-interstitial="false" data-open="CIT0059" href="javascript:;" reveal-id="CIT0059"><span data-dcnode-id="7205" instrument_node="">Parmenter et al. 2003</span></a><span data-dcnode-id="7203" instrument_node=""> ). </span></p><p class="chapter-para" data-dcnode-id="7189"><span data-dcnode-id="7201" instrument_node=""> Use of steel foot-hold traps for live capture of animals must be employed with caution due to the potential for injury or capture of nontarget species ( </span><span class="xrefLink" data-dcnode-id="7200" id="jumplink-CIT0042"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7198" data-google-interstitial="false" data-open="CIT0042" href="javascript:;" reveal-id="CIT0042"><span data-dcnode-id="7199" instrument_node="">Kuehn et al. 1986</span></a><span data-dcnode-id="7197" instrument_node=""> ). For some taxa, foot-hold traps, including leg snares, might present the only available or the most effective means of capture ( </span><span class="xrefLink" data-dcnode-id="7196" id="jumplink-CIT0067"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7194" data-google-interstitial="false" data-open="CIT0067" href="javascript:;" reveal-id="CIT0067"><span data-dcnode-id="7195" instrument_node="">Schmintz 2005</span></a><span data-dcnode-id="7193" instrument_node=""> ; see also </span><a class="link link-uri" data-dcnode-id="7191" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fishwildlife.org/index.php%3Fsection%3Dfurbearer_management%26activator%3D27"><span data-dcnode-id="7192" instrument_node="">http://www.fishwildlife.org/index.php?section=furbearer_management&amp;activator=27</span></a><span data-dcnode-id="7190" instrument_node=""> for specific techniques and trap recommendations). When their use is approved, investigators have an ethical obligation to use steel foot-hold traps of a sufficient size and strength to hold the animal firmly. Foot-hold traps, other than snares, with rubber-padded or offset jaws should be used to minimize potential damage to bone and soft tissue and associated discomfort for those cases in which animals will remain alive in these traps. Snares or spring foot-hold traps must be checked at suitable frequencies. These observations should be at least daily, but might be more frequent depending upon target species, the potential for capture of nontarget species, and environmental conditions. Captured animals must be assessed carefully for injury and euthanized when necessary. Nontarget species, if uninjured, should be released immediately although their release, as with target species, might require chemical immobilization to facilitate handling and prevent injury to the animal or researcher. </span></p><p class="chapter-para" data-dcnode-id="7176"><span data-dcnode-id="7188" instrument_node=""> The number of traps set at a particular time and location should not exceed the ability of the investigator(s) to monitor them at reasonable intervals. Because frequent checking of traps is the most effective means of minimizing mortality or injury to animals in live traps, the investigator should consider staking or visibly flagging a trap line (or otherwise devising some effective system) to ensure that all traps are recovered and removed reliably and efficiently. Regular monitoring ensures that target animals remain in good condition while in traps and allows prompt release of nontarget species with no ill effects due to capture. Monitoring intervals vary and are dependent on target species, type of trap, weather, season, terrain, and number and experience of investigators. Generally, live traps for nocturnal species are set before dusk and checked shortly after sunrise. Traps are then retrieved or closed during the day, where warranted, to prevent capture of diurnal, nontarget taxa. Live traps for very small mammals, particularly shrews, should be checked more frequently (e.g., every 1.5 h— </span><span class="xrefLink" data-dcnode-id="7187" id="jumplink-CIT0034"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7185" data-google-interstitial="false" data-open="CIT0034" href="javascript:;" reveal-id="CIT0034"><span data-dcnode-id="7186" instrument_node="">Hawes 1977</span></a><span data-dcnode-id="7184" instrument_node=""> ) to minimize mortality due to the higher metabolism of these taxa. Similarly, taxa of larger size but with particularly high metabolic rates (e.g., </span><em data-dcnode-id="7182"><span data-dcnode-id="7183" instrument_node="">Mustela</span></em><span data-dcnode-id="7181" instrument_node=""> ) might also require shorter intervals between observations. Live traps for diurnal species should be set in shaded areas or under trap shelters ( </span><span class="xrefLink" data-dcnode-id="7180" id="jumplink-CIT0038"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7178" data-google-interstitial="false" data-open="CIT0038" href="javascript:;" reveal-id="CIT0038"><span data-dcnode-id="7179" instrument_node="">Kaufman and Kaufman 1989</span></a><span data-dcnode-id="7177" instrument_node=""> ) and checked every few hours in warm weather. Traps should then be retrieved or closed at dusk, when appropriate, to prevent unintended capture of nocturnal taxa. </span></p><p class="chapter-para" data-dcnode-id="7170"><span data-dcnode-id="7175" instrument_node=""> Thermoregulatory demands, especially for small mammals, can induce stress even if the duration of captivity is short. Thermoregulatory stress can be minimized by providing food sources ( </span><span class="xrefLink" data-dcnode-id="7174" id="jumplink-CIT0024"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7172" data-google-interstitial="false" data-open="CIT0024" href="javascript:;" reveal-id="CIT0024"><span data-dcnode-id="7173" instrument_node="">Do et al. 2013</span></a><span data-dcnode-id="7171" instrument_node=""> ) and nesting material in the live trap. Because most live traps for small mammals are constructed of metal and conduct heat readily, it might be necessary to insulate traps to minimize hypo- or hyperthermia in captive animals. Insulation can be accomplished by using items such as cotton or synthetic fiber batting, leaves, or twigs to provide dead air space between the animal and conducting surface and to provide escape from the temperature extremes. Critical temperature tolerance limits vary with species and environmental conditions. Investigators must be responsive to changing weather conditions and modify trapping procedures as necessary to minimize thermal stress to trapped animals. </span></p><p class="chapter-para" data-dcnode-id="7160"><span data-dcnode-id="7169" instrument_node=""> If disturbance of live traps (removal of captured individual, trap damage) by larger carnivores, birds, or other animals is problematic, trap enclosures ( </span><span class="xrefLink" data-dcnode-id="7168" id="jumplink-CIT0027"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7166" data-google-interstitial="false" data-open="CIT0027" href="javascript:;" reveal-id="CIT0027"><span data-dcnode-id="7167" instrument_node="">Getz and Batzli 1974</span></a><span data-dcnode-id="7165" instrument_node=""> ; </span><span class="xrefLink" data-dcnode-id="7164" id="jumplink-CIT0046"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7162" data-google-interstitial="false" data-open="CIT0046" href="javascript:;" reveal-id="CIT0046"><span data-dcnode-id="7163" instrument_node="">Layne 1987</span></a><span data-dcnode-id="7161" instrument_node=""> ) or other methods to secure traps might be required. Pitfall traps can be fitted with raised covers to minimize capture of nontarget species, to provide cover from rain and sun, and to prevent predation by larger animals. Pitfall traps used for live capture may require small holes at the bottom of the containers to allow drainage in rainy weather, or enhancements such as small sections of polyvinyl chloride pipe to provide shelter from other captured animals. </span></p><p class="chapter-para" data-dcnode-id="7151"><span data-dcnode-id="7159" instrument_node=""> Captured small- and medium-sized mammals should be handled by methods that control body movements without restricting breathing. Covering an animal’s eyes may reduce struggle to escape. Restraint by a mesh or cloth bag allows the investigator to mark, measure, or otherwise sample an individual through mesh or the partially opened end of the bag (e.g., </span><em data-dcnode-id="7157"><span data-dcnode-id="7158" instrument_node="">Cynomys gunnisoni</span></em><span data-dcnode-id="7156" instrument_node=""> — </span><span class="xrefLink" data-dcnode-id="7155" id="jumplink-CIT0022"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7153" data-google-interstitial="false" data-open="CIT0022" href="javascript:;" reveal-id="CIT0022"><span data-dcnode-id="7154" instrument_node="">Davidson et al. 1999</span></a><span data-dcnode-id="7152" instrument_node=""> ). Some small mammals can be transferred directly from a trap to a heavy-duty plastic bag for handling or to a heavy cloth bag or cage for transport. The design of some traps (e.g., box-type traps such as Sherman or Tomahawk live traps) also allows them to be used as a temporary cage for easy and safe transport. </span></p><p class="chapter-para" data-dcnode-id="7142"><span data-dcnode-id="7150" instrument_node=""> Traps used for live capture of larger mammals include box traps, clover traps, and culvert traps. Some large mammals (e.g., ungulates and kangaroos) can be herded along fences into corrals or captured with cannon nets or drop nets projected from helicopters using net guns. These methods require extensive training of personnel and immediate attention to the animals to prevent injury while minimizing stress and distress in particularly sensitive species (e.g., </span><em data-dcnode-id="7148"><span data-dcnode-id="7149" instrument_node="">Antilocapra americana</span></em><span data-dcnode-id="7147" instrument_node=""> ). For such large-scale capture efforts, it may be useful to contract a veterinarian to assist with any injured or stressed animals. Depending on the nature of the activity, individuals captured using these techniques might need to be sedated, otherwise restrained, or have their eyes covered until the investigator’s work is completed ( </span><span class="xrefLink" data-dcnode-id="7146" id="jumplink-CIT0015"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7144" data-google-interstitial="false" data-open="CIT0015" href="javascript:;" reveal-id="CIT0015"><span data-dcnode-id="7145" instrument_node="">Braun 2005</span></a><span data-dcnode-id="7143" instrument_node=""> ). </span></p><p class="chapter-para" data-dcnode-id="7132"><span data-dcnode-id="7141" instrument_node=""> Large mammals also can be captured by delivering a sedative into the hip or shoulder musculature using a dart gun. Chemical immobilization, whether for capture or sedation, requires training by a wildlife veterinarian and thorough knowledge of proper dosage, antidote, and sedative effect. In many instances, having a reversal agent on hand is advisable. The location selected for dart placement can vary seasonally and with animal condition. Individuals familiar with the species should be consulted prior to employing this procedure. An excellent reference for chemical immobilization of mammals is </span><span class="xrefLink" data-dcnode-id="7140" id="jumplink-CIT0041"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7138" data-google-interstitial="false" data-open="CIT0041" href="javascript:;" reveal-id="CIT0041"><span data-dcnode-id="7139" instrument_node="">Kreeger and Arnemo (2012)</span></a><span data-dcnode-id="7137" instrument_node=""> . Location of the animal within the habitat should be considered in light of time necessary for sedation and recovery to avoid injury or mortality during recovery; sedated mammals must be monitored closely during procedures. Baits laced with tranquilizers have been described ( </span><span class="xrefLink" data-dcnode-id="7136" id="jumplink-CIT0015"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7134" data-google-interstitial="false" data-open="CIT0015" href="javascript:;" reveal-id="CIT0015"><span data-dcnode-id="7135" instrument_node="">Braun 2005</span></a><span data-dcnode-id="7133" instrument_node=""> ), but these should be used with caution to prevent sedating nontarget species. Finally, local, state, or federal regulations might restrict use of certain drugs (e.g., narcotics), which may impact their use in field settings. </span></p><p class="chapter-para" data-dcnode-id="7126"><span data-dcnode-id="7131" instrument_node=""> In procedures with domesticated species, sedated animals are always monitored until they recover. Similar monitoring of wild mammals might not be possible or appropriate. The presence of humans is a stressor for most wild animals and they will often attempt to flee before they are fully recovered. Depending upon the species and habitat, it may be advisable to place sedated animals in a safe location and then retreat, rather than remaining in close proximity to individuals as they recover ( </span><span class="xrefLink" data-dcnode-id="7130" id="jumplink-CIT0069"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7128" data-google-interstitial="false" data-open="CIT0069" href="javascript:;" reveal-id="CIT0069"><span data-dcnode-id="7129" instrument_node="">Sikes and Bryan 2015</span></a><span data-dcnode-id="7127" instrument_node=""> ). In no instance should sedated animals be left in close proximity to water or exposed to potential predators or aggressive conspecifics while under the influence of immobilizing drugs. </span></p><p class="chapter-para" data-dcnode-id="7124"><span data-dcnode-id="7125" instrument_node="">Net-gunning from helicopters is a method frequently used for capture of ungulates and at times for capture of other types of mammals. Depending upon the species and activities involved, animals captured in nets may be sedated or they may be handled without sedation.</span></p><p class="chapter-para" data-dcnode-id="7110"><span data-dcnode-id="7123" instrument_node=""> Bats can be captured effectively and humanely with mist nets, harp traps, bag traps, or by hand ( </span><span class="xrefLink" data-dcnode-id="7122" id="jumplink-CIT0043"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7120" data-google-interstitial="false" data-open="CIT0043" href="javascript:;" reveal-id="CIT0043"><span data-dcnode-id="7121" instrument_node="">Kunz and Parsons 2009</span></a><span data-dcnode-id="7119" instrument_node=""> ). Mist nets should not be left unattended for &gt; 15min when bats are active. Captured bats should be removed from nets immediately to minimize injury, drowning, strangulation, or stress. Proper and thorough training of assistants beforehand is essential so that bats are removed without injury to delicate wing bones and patagia. If a bat is badly tangled, it can be removed by cutting strands of the net; although costly, mist nets can be repaired or replaced. Nets should not be operated in high winds because these conditions can place undue stress on bats and further entangle them in nets. Mist nets should generally be operated only at night or during crepuscular periods and closed during the daytime to prevent capture of nontarget taxa (e.g., birds). The number of mist nets operated simultaneously should not exceed the ability of investigators to check and clear nets of bats. For example, mist nets should not be used where large numbers of bats might be captured simultaneously (e.g., at cave entrances) because numbers can quickly overwhelm the ability of investigators to remove individuals efficiently and safely. In these situations, harp traps or sweep nets are preferable ( </span><span class="xrefLink" data-dcnode-id="7118" id="jumplink-CIT0083"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7116" data-google-interstitial="false" data-open="CIT0083" href="javascript:;" reveal-id="CIT0083"><span data-dcnode-id="7117" instrument_node="">Wilson et al. 1996</span></a><span data-dcnode-id="7115" instrument_node=""> ). Although harp traps do not require constant attention, they should be checked regularly, especially when a large number of captures is expected within a short period of time. Investigators using harp traps should guard against predators entering the trap bag or biting captured bats, predation of 1 bat species on another, rabies transfer, or suffocation due to large numbers of bats caught in a short time ( </span><span class="xrefLink" data-dcnode-id="7114" id="jumplink-CIT0043"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7112" data-google-interstitial="false" data-open="CIT0043" href="javascript:;" reveal-id="CIT0043"><span data-dcnode-id="7113" instrument_node="">Kunz and Parsons 2009</span></a><span data-dcnode-id="7111" instrument_node=""> ). </span></p><p class="chapter-para" data-dcnode-id="7089"><span data-dcnode-id="7109" instrument_node=""> Roosting bats can sometimes be captured by hand. The use of suitable gloves should be considered as they provide protection from bites while allowing the investigator to feel the body and movements of the bat, thereby preventing injury to both the investigator and the study subject. Long, padded tissue forceps can be used to extract bats from crevices, but extreme care should be taken to avoid injury to delicate wing bones and membranes ( </span><span class="xrefLink" data-dcnode-id="7108" id="jumplink-CIT0043"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7106" data-google-interstitial="false" data-open="CIT0043" href="javascript:;" reveal-id="CIT0043"><span data-dcnode-id="7107" instrument_node="">Kunz and Parsons 2009</span></a><span data-dcnode-id="7105" instrument_node=""> ). Investigators should consider how the time of year when bats are studied might impact their survival. For example, large or repeated disturbance of maternity colonies can cause mortality of offspring and colony abandonment ( </span><span class="xrefLink" data-dcnode-id="7104" id="jumplink-CIT0056"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7102" data-google-interstitial="false" data-open="CIT0056" href="javascript:;" reveal-id="CIT0056"><span data-dcnode-id="7103" instrument_node="">O’Shea and Bogan 2003</span></a><span data-dcnode-id="7101" instrument_node=""> ). Repeated arousal of hibernating bats can lead to mortality because of depletion of critical fat stores ( </span><span class="xrefLink" data-dcnode-id="7100" id="jumplink-CIT0075"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7098" data-google-interstitial="false" data-open="CIT0075" href="javascript:;" reveal-id="CIT0075"><span data-dcnode-id="7099" instrument_node="">Thomas 1995</span></a><span data-dcnode-id="7097" instrument_node=""> ). Individuals working with bats should also follow the most current precautions to prevent spread of the fungus causing White Nose Syndrome ( </span><a class="link link-uri" data-dcnode-id="7095" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitenosesyndrome.org/resource/universal-precautions-management-bat-white-nose-syndrome-wns"><span data-dcnode-id="7096" instrument_node="">https://www.whitenosesyndrome.org/resource/universal-precautions-management-bat-white-nose-syndrome-wns</span></a><span data-dcnode-id="7094" instrument_node=""> ). </span><span class="xrefLink" data-dcnode-id="7093" id="jumplink-CIT0063"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7091" data-google-interstitial="false" data-open="CIT0063" href="javascript:;" reveal-id="CIT0063"><span data-dcnode-id="7092" instrument_node="">Reeder et al. (2015)</span></a><span data-dcnode-id="7090" instrument_node=""> is a particularly useful reference regarding the potential for spreading diseases while conducting research on at-risk populations. </span></p><span data-dcnode-id="7088" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="7086" data-legacy-id="s20" id="113547737" scrollto-destination="113547737"><span data-dcnode-id="7087" instrument_node="">Capture myopathy and injuries</span></h3><span data-dcnode-id="7085" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="7083"><span data-dcnode-id="7084" instrument_node="">Wild mammals typically will experience some level of stress during capture regardless of the capture technique employed. For those methods that involve pursuit of the target animal, personnel must be especially cognizant of the potential for exertional rhabdomyolysis (ER or capture myopathy). The potential for ER can be minimized by limiting pursuit times, restricting captures to periods when environmental conditions minimize the chance that an animal will overheat, carefully selecting drugs used for immobilization, and ensuring the expertise of the capture team. When pursuit is used for capture, the research team should monitor animal temperature and have materials on hand to quickly reduce core temperature if necessary.</span></p><p class="chapter-para" data-dcnode-id="7081"><span data-dcnode-id="7082" instrument_node="">Wild mammals usually struggle or attempt to flee when approached by humans and can injure themselves as a result. Excessive rates of injury warrant review of the animal handling procedures. Whereas minor injuries can often be treated by the field personnel, severely injured animals typically are humanely killed.</span></p><span data-dcnode-id="7080" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="7078" data-legacy-id="s21" id="113547740" scrollto-destination="113547740"><span data-dcnode-id="7079" instrument_node="">Kill traps and shooting</span></h3><span data-dcnode-id="7077" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="7071"><span data-dcnode-id="7076" instrument_node=""> Some studies require that free-living mammals intentionally be killed (e.g., collection of specimens for museum collections). In all cases, methods must provide an efficient and quick death that minimizes pain. In some cases, individuals may be livetrapped and then humanely killed. Where live traps are used, animals should be humanely killed as quickly as possible (see methods below) without damaging materials needed for research. The AVMA notes that “kill traps do not consistently meet the POE’s [Panel of Euthanasia] criteria for euthanasia, and may be best characterized as humane killing under some circumstances. At the same time, it is recognized they can be practical and effective for scientific animal collection or pest control when used in a manner that ensures selectivity, a swift kill, and no damage to body parts needed for field research” ( </span><span class="xrefLink" data-dcnode-id="7075" id="jumplink-CIT0005"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7073" data-google-interstitial="false" data-open="CIT0005" href="javascript:;" reveal-id="CIT0005"><span data-dcnode-id="7074" instrument_node="">AVMA 2013a</span></a><span data-dcnode-id="7072" instrument_node=""> :40). </span></p><p class="chapter-para" data-dcnode-id="7058"><span data-dcnode-id="7070" instrument_node=""> Traps suitable for kill trapping include snap traps (e.g., Victor and Museum Special) for rat- and mouse-sized mammals, kill traps (e.g., Macabee) designed for subterranean species, harpoon traps for moles, snares for carnivores and furbearers, and Conibear or similar body-grip traps for medium-sized mammals. Trapping techniques that use drowning as a means of killing have been described as inhumane or unethical by some (e.g., </span><span class="xrefLink" data-dcnode-id="7069" id="jumplink-CIT0062"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7067" data-google-interstitial="false" data-open="CIT0062" href="javascript:;" reveal-id="CIT0062"><span data-dcnode-id="7068" instrument_node="">Powell and Proulx 2003</span></a><span data-dcnode-id="7066" instrument_node=""> ; </span><span class="xrefLink" data-dcnode-id="7065" id="jumplink-CIT0005"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7063" data-google-interstitial="false" data-open="CIT0005" href="javascript:;" reveal-id="CIT0005"><span data-dcnode-id="7064" instrument_node="">AVMA 2013a</span></a><span data-dcnode-id="7062" instrument_node=""> ). However, submersion trapping systems can be effective and appropriate for furbearers found in or near waterways. Such systems rely on equipment (e.g., steel foot-hold traps with 1-way cable slides and locks) or techniques that cause the furbearer, upon capture, to quickly and irreversibly submerge until death ( </span><a class="link link-uri" data-dcnode-id="7060" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fishwildlife.org/index.php%3Fsection%3Dfurbearer_management%26activator%3D27"><span data-dcnode-id="7061" instrument_node="">http://www.fishwildlife.org/index.php?section=furbearer_management&amp;activator=27</span></a><span data-dcnode-id="7059" instrument_node=""> ). </span></p><p class="chapter-para" data-dcnode-id="7048"><span data-dcnode-id="7057" instrument_node=""> Pitfall kill traps can provide the best trapping option for some small mammals (e.g., rodents and shrews), many of which are much more effectively captured with pitfalls than by other means. These traps are particularly efficient where trapping must be continuous or cannot be accomplished using live traps or snap traps that need resetting between captures. Pitfalls used with drowning fluids add a measure of preservation that can be useful for scientific collections and detailed study of internal organs. Additional circumstances in which pitfalls are effective are outlined in </span><span class="xrefLink" data-dcnode-id="7056" id="jumplink-CIT0011"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7054" data-google-interstitial="false" data-open="CIT0011" href="javascript:;" reveal-id="CIT0011"><span data-dcnode-id="7055" instrument_node="">Beacham and Krebs (1980)</span></a><span data-dcnode-id="7053" instrument_node=""> and </span><span class="xrefLink" data-dcnode-id="7052" id="jumplink-CIT0026"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7050" data-google-interstitial="false" data-open="CIT0026" href="javascript:;" reveal-id="CIT0026"><span data-dcnode-id="7051" instrument_node="">Garsd and Howard (1981)</span></a><span data-dcnode-id="7049" instrument_node=""> . </span></p><p class="chapter-para" data-dcnode-id="7042"><span data-dcnode-id="7047" instrument_node=""> Ethical use of pitfall kill traps requires the minimization of pain or distress. The pitfall designed by </span><span class="xrefLink" data-dcnode-id="7046" id="jumplink-CIT0036"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7044" data-google-interstitial="false" data-open="CIT0036" href="javascript:;" reveal-id="CIT0036"><span data-dcnode-id="7045" instrument_node="">Howard and Brock (1961)</span></a><span data-dcnode-id="7043" instrument_node=""> does this by using 70% ethanol (or similar alcohol) as the main ingredient of the drowning fluid. Evaporation of alcohol is retarded by a thin layer of light mineral oil and hexane (2:1) added to the solution. Small mammals that fall into the trap (and hence the drowning fluid) lose buoyancy almost immediately due to the surfactant action of hexane and mineral oil and thus submergence and death occur rapidly. Alcohol then infuses the body and acts as a preservative. As long as the solution is deeper than the head-body length of the target animals, individuals cannot struggle or escape by standing on the bottom of the trap. Use of formalin or ethylene glycol in pit traps, however, is not approved by the ASM. Pitfalls used as kill traps should have covers or other means of excluding nontarget species. If the traps will not be operational for extended periods, they should be constructed such that the kill jar and its fluid can be removed to prevent unwanted captures. </span></p><span data-dcnode-id="7041" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="7039" data-legacy-id="s22" id="113547745" scrollto-destination="113547745"><span data-dcnode-id="7040" instrument_node="">Drowning in conjunction with other trapping methods</span></h3><span data-dcnode-id="7038" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="7024"><span data-dcnode-id="7037" instrument_node=""> Several of the methods described above include a primary capture device (trap) that induces death by drowning. While the </span><span class="xrefLink" data-dcnode-id="7036" id="jumplink-CIT0005"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7034" data-google-interstitial="false" data-open="CIT0005" href="javascript:;" reveal-id="CIT0005"><span data-dcnode-id="7035" instrument_node="">AVMA (2013a</span></a><span data-dcnode-id="7033" instrument_node=""> :102) does not consider drowning an acceptable form of euthanasia, it acknowledges that “the quickest and most humane means of terminating the life of free-ranging wildlife in a given situation may not always meet all criteria established for euthanasia (i.e., distinguishes between euthanasia and methods that are more accurately characterized as humane killing)” ( </span><span class="xrefLink" data-dcnode-id="7032" id="jumplink-CIT0005"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7030" data-google-interstitial="false" data-open="CIT0005" href="javascript:;" reveal-id="CIT0005"><span data-dcnode-id="7031" instrument_node="">AVMA 2013a</span></a><span data-dcnode-id="7029" instrument_node=""> , Section S7.6). Further, in a 2011 “Literature Review” regarding thoracic compression, the AVMA states that “when scientifically justified, the IACUC has and should employ the authority to approve killing techniques not listed as recognized forms of euthanasia” ( </span><span class="xrefLink" data-dcnode-id="7028" id="jumplink-CIT0004"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7026" data-google-interstitial="false" data-open="CIT0004" href="javascript:;" reveal-id="CIT0004"><span data-dcnode-id="7027" instrument_node="">AVMA 2011</span></a><span data-dcnode-id="7025" instrument_node=""> ). The ASM urges the use of other trapping and killing techniques whenever possible. However, wild mammals held in traps are unable to avoid predators or to forage, so in situations where other trapping options are not feasible and capture limits an animal’s ability to maintain itself (e.g., through continued foraging or defense against predators), the ASM considers death by drowning to be more humane than alternatives that cause prolonged distress or discomfort. </span></p><p class="chapter-para" data-dcnode-id="7018"><span data-dcnode-id="7023" instrument_node=""> In all cases, investigators should strive to use the trap that will inflict the least trauma and result in a clean, effective kill. Most traps should be checked at least once a day; in the event that a captured animal is still alive, it should be immediately dispatched according to methods approved by the IACUC. The AVMA offers these recommendations regarding kill traps: “Mechanical kill traps are used for the collection and killing of small, free-ranging mammals for commercial purposes (fur, skin, or meat), scientific purposes, to stop property damage, and to protect human safety. Their use remains controversial and kill traps do not always render a rapid or stress-free death consistent with the criteria established for euthanasia by the POE. For this reason, use of live traps followed by other methods of euthanasia is preferred. There are a few situations when that is not possible (e.g., pest control) or when it may actually be more stressful for the animals or dangerous for humans to use live traps” ( </span><span class="xrefLink" data-dcnode-id="7022" id="jumplink-CIT0005"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="7020" data-google-interstitial="false" data-open="CIT0005" href="javascript:;" reveal-id="CIT0005"><span data-dcnode-id="7021" instrument_node="">AVMA 2013a</span></a><span data-dcnode-id="7019" instrument_node=""> :40). </span></p><p class="chapter-para" data-dcnode-id="7016"><span data-dcnode-id="7017" instrument_node="">An effective way (sometimes the only way) to collect certain species of mammals is by use of a firearm. Investigators using this method must be experienced in safe handling of firearms and must adhere to laws and regulations related to their possession and use. The firearm and ammunition should be appropriate for the species of interest so that the animal is killed swiftly without excessive damage to the body (including the skull). A .17 or .22-caliber rifle chambered for an appropriate cartridge (.17 HMR, .22 Long Rifle, .22 Short, .223, etc.) and loaded with bullets or shotguns loaded with appropriate shot sizes are suitable for medium-sized mammals. Generally, small mammals (chipmunk size or smaller) can be taken with .22-caliber rifle or handgun loaded with #11 or #12 (dust) shot, whereas animals the size of rabbits can be taken with shotguns loaded with #4–#6 shot. Large mammals should be taken with a high-velocity rifle of a suitable caliber, where legal, or shotguns using appropriate ammunition (e.g., rifled slugs or larger shot). After the animal has been shot, it should be retrieved and processed promptly for the purpose for which it was collected. Additional information regarding killing via gunshot is provided in the section below on “Euthanasia and Humane Killing.”</span></p><span data-dcnode-id="7015" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="7013" data-legacy-id="s23" id="113547749" scrollto-destination="113547749"><span data-dcnode-id="7014" instrument_node="">Marine mammals</span></h3><span data-dcnode-id="7012" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="7001"><span data-dcnode-id="7011" instrument_node=""> All marine mammals in United States territorial waters are covered by the Marine Mammal Protection Act of 1972. Many species also are covered by the Endangered Species Act of 1973. The latest versions of both Acts can be found at the United States Marine Mammal Commission web site ( </span><a class="link link-uri" data-dcnode-id="7009" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mmc.gov/about-the-commission/our-mission/endangered-species-act-and-other-legislation-and-agreements/"><span data-dcnode-id="7010" instrument_node="">http://www.mmc.gov/about-the-commission/our-mission/endangered-species-act-and-other-legislation-and-agreements/</span></a><span data-dcnode-id="7008" instrument_node=""> ). These Acts prohibit any form of “take,” including terminal capture, live capture, or tagging of marine mammals without appropriate federal permits. Exceptions are made for certain aboriginal or traditional harvests of marine mammals and for commercial fisheries that might incidentally take marine mammals as part of normal fishing operations. Permit application forms and instructions can be found on the National Marine Fisheries Service web site ( </span><a class="link link-uri" data-dcnode-id="7006" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nmfs.noaa.gov/prot_res/overview/permits.html"><span data-dcnode-id="7007" instrument_node="">http://www.nmfs.noaa.gov/prot_res/overview/permits.html</span></a><span data-dcnode-id="7005" instrument_node=""> ) and at the USFWS web site ( </span><a class="link link-uri" data-dcnode-id="7003" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//permits.fws.gov/"><span data-dcnode-id="7004" instrument_node="">http://permits.fws.gov/</span></a><span data-dcnode-id="7002" instrument_node=""> ). </span></p><p class="chapter-para" data-dcnode-id="6968"><span data-dcnode-id="7000" instrument_node=""> Methods of live capture for marine mammals include nets (ranging from purse seines to small, handheld hoop nets) and mechanical clamps with lines that are placed over an animal’s peduncle while it rides the bow pressure wave of a vessel. Many live capture techniques for smaller cetaceans are reviewed by </span><span class="xrefLink" data-dcnode-id="6999" id="jumplink-CIT0007"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6997" data-google-interstitial="false" data-open="CIT0007" href="javascript:;" reveal-id="CIT0007"><span data-dcnode-id="6998" instrument_node="">Asper (1975)</span></a><span data-dcnode-id="6996" instrument_node=""> . Some dolphins or small whales (e.g., </span><em data-dcnode-id="6994"><span data-dcnode-id="6995" instrument_node="">Phocoena</span></em><span data-dcnode-id="6993" instrument_node=""> , </span><em data-dcnode-id="6991"><span data-dcnode-id="6992" instrument_node="">Delphinapterus</span></em><span data-dcnode-id="6990" instrument_node=""> ) can be captured by hand in shallow water ( </span><span class="xrefLink" data-dcnode-id="6989" id="jumplink-CIT0079"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6987" data-google-interstitial="false" data-open="CIT0079" href="javascript:;" reveal-id="CIT0079"><span data-dcnode-id="6988" instrument_node="">Walker 1975</span></a><span data-dcnode-id="6986" instrument_node=""> ). Although polar bears ( </span><em data-dcnode-id="6984"><span data-dcnode-id="6985" instrument_node="">Ursus maritimus</span></em><span data-dcnode-id="6983" instrument_node=""> ) and some species of pinnipeds (e.g., northern elephant seal, </span><em data-dcnode-id="6981"><span data-dcnode-id="6982" instrument_node="">Mirounga angustirostris</span></em><span data-dcnode-id="6980" instrument_node=""> ) can be captured using remotely injected chemicals, chemical immobilization of marine mammals is risky due to the possibility of losing animals by drowning or overdose ( </span><span class="xrefLink" data-dcnode-id="6979" id="jumplink-CIT0023"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6977" data-google-interstitial="false" data-open="CIT0023" href="javascript:;" reveal-id="CIT0023"><span data-dcnode-id="6978" instrument_node="">Dierauf and Gulland 2001</span></a><span data-dcnode-id="6976" instrument_node=""> ). The Society for Marine Mammalogy has developed detailed guidelines for the treatment of marine mammals in field research, which the ASM endorses. The most current version of these guidelines is available at. </span><a class="link link-uri" data-dcnode-id="6974" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.marinemammalscience.org/about-us/ethics/marine-mammal-treatment-guidelines"><span data-dcnode-id="6975" instrument_node="">www.marinemammalscience.org/about-us/ethics/marine-mammal-treatment-guidelines</span></a><span data-dcnode-id="6973" instrument_node=""> . Euthanasia for marine mammals was reviewed by </span><span class="xrefLink" data-dcnode-id="6972" id="jumplink-CIT0028"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6970" data-google-interstitial="false" data-open="CIT0028" href="javascript:;" reveal-id="CIT0028"><span data-dcnode-id="6971" instrument_node="">Greer et al. (2001)</span></a><span data-dcnode-id="6969" instrument_node=""> . </span></p><p class="chapter-para" data-dcnode-id="6966"><span data-dcnode-id="6967" instrument_node="">Holding of marine mammals in captivity is regulated by the Marine Mammal Protection Act, the Endangered Species Act, and the AWA; the latter administered by USDA/APHIS. The AWA regulations include species-specific criteria for pool and pen sizes, construction methods, water quality, food storage and handling, and routine healthcare. The most current AWA regulations can be found on the USDA/APHIS web site.</span></p><span data-dcnode-id="6965" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="6963" data-legacy-id="s24" id="113547753" scrollto-destination="113547753"><span data-dcnode-id="6964" instrument_node="">Use of domestic dogs in research</span></h3><span data-dcnode-id="6962" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6960"><span data-dcnode-id="6961" instrument_node="">Highly trained domestic dogs are increasingly being used in research to locate study animals or specimens. Because of their olfactory abilities, these service animals can make many types of collecting efforts more efficient and can allow types of field work that are otherwise not feasible. Dogs used in this manner should be considered part of the research team rather than study animals and should be accorded care as such. In cases in which dogs are owned by the institution, their veterinary care is equivalent to occupational health considerations for personnel.</span></p><p class="chapter-para" data-dcnode-id="6958"><span data-dcnode-id="6959" instrument_node="">When dogs are used to locate live animals, the potential stress or harm they might cause to target individuals should be considered. For animals that alert handlers to the presence of target animals, the stress caused by the dog may be equivalent to that caused by native predators or humans. When dogs are used to find samples (e.g., scats), there is less potential impact on target animals as they may no longer be in the vicinity, but nontarget animals may still be affected. Additionally, investigators and oversight personnel should take precautions to minimize the potential for exchange of pathogens between native populations and service dogs. As the use of dogs in field studies becomes more commonplace, more specific guidelines are sure to follow.</span></p><span data-dcnode-id="6957" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="6947" data-legacy-id="s25" id="113547756" scrollto-destination="113547756"><span data-dcnode-id="6956" instrument_node="">T </span><span class="small-caps" data-dcnode-id="6954"><span data-dcnode-id="6955" instrument_node="">issue</span></span><span data-dcnode-id="6953" instrument_node=""> S </span><span class="small-caps" data-dcnode-id="6951"><span data-dcnode-id="6952" instrument_node="">ampling and</span></span><span data-dcnode-id="6950" instrument_node=""> I </span><span class="small-caps" data-dcnode-id="6948"><span data-dcnode-id="6949" instrument_node="">dentification</span></span></h2><span data-dcnode-id="6946" instrument_node="">
</span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="6944" data-legacy-id="s26" id="113547757" scrollto-destination="113547757"><span data-dcnode-id="6945" instrument_node="">Tissue sampling</span></h3><span data-dcnode-id="6943" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6941"><span data-dcnode-id="6942" instrument_node="">The collection of small amounts of tissue from small wild mammals is routine and often required for studies involving DNA, proteins (e.g., hemoglobins, albumins, enzymes), or physiological assays (e.g., hormonal levels, antibody titers). Tissue samples can be obtained in conjunction with some marking procedures (e.g., toe clips, patagial, or ear biopsies). These techniques are treated below under “External Marks.” Even when these techniques are not required for identification, small external tissue samples are frequently taken from unsedated animals with little difficulty and are generally consistent with USDA Pain or Distress Category C (see above). When blood is required, many procedures do not require anesthesia and can be conducted in the field by appropriately trained personnel. After tissue collection and prior to release, individuals should be observed to ensure that no trauma or adverse reaction has occurred as a consequence of capture, handling, or tissue or blood collection.</span></p><p class="chapter-para" data-dcnode-id="6939"><span data-dcnode-id="6940" instrument_node="">Multiple factors must be considered when determining the most appropriate method for obtaining blood samples. Various morphological attributes of a species (e.g., size of the orbit, absence of tail or external pinnae, presence of cheek pouches) can limit potential sites of blood or tissue collection. The size of the animal also might restrict collection sites and limit the quantity of blood (≤ 1.5% of body mass) that can be removed. The training and experience of the individuals performing the procedure is important as unskilled personnel can cause significant trauma with some techniques. The procedures for blood collection and the qualifications of study personnel must be reviewed by the IACUC. More specialized procedures for blood collection from small mammals are as follows:</span></p><span data-dcnode-id="6938" instrument_node=""> </span><h4 class="section-title js-splitscreen-section-title" data-dcnode-id="6936" data-legacy-id="s27" id="113547760" scrollto-destination="113547760"><span data-dcnode-id="6937" instrument_node="">Obtaining blood from the facial vein.</span></h4><span data-dcnode-id="6935" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6924"><span data-dcnode-id="6934" instrument_node=""> This technique, which has been used on laboratory mice for many years, allows collection of 4–10 drops of blood with minimal discomfort to the animal (see USDA news release at </span><a class="link link-uri" data-dcnode-id="6932" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ars.usda.gov/is/pr/2005/050921.htm"><span data-dcnode-id="6933" instrument_node="">www.ars.usda.gov/is/pr/2005/050921.htm</span></a><span data-dcnode-id="6931" instrument_node=""> ). The procedure is described (including text, photos, and video) at </span><a class="link link-uri" data-dcnode-id="6929" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.medipoint.com/html/rat_video_demonstraton.html"><span data-dcnode-id="6930" instrument_node="">http://www.medipoint.com/html/rat_video_demonstraton.html</span></a><span data-dcnode-id="6928" instrument_node=""> ( </span><em data-dcnode-id="6926"><span data-dcnode-id="6927" instrument_node="">note:</span></em><span data-dcnode-id="6925" instrument_node=""> this citation is not intended to be an endorsement of this commercial product by the ASM). </span></p><span data-dcnode-id="6923" instrument_node=""> </span><h4 class="section-title js-splitscreen-section-title" data-dcnode-id="6921" data-legacy-id="s28" id="113547762" scrollto-destination="113547762"><span data-dcnode-id="6922" instrument_node="">Obtaining blood from the caudal vein.</span></h4><span data-dcnode-id="6920" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6918"><span data-dcnode-id="6919" instrument_node="">Extracting blood from the caudal vein is a relatively simple procedure that involves the use of a needle (more difficult in small rodents) or lancet to puncture the caudal vein. Alternatively, excising the distal 1–2mm of the tail can yield a small amount of blood; the tail tip can be used for DNA extraction.</span></p><span data-dcnode-id="6917" instrument_node=""> </span><h4 class="section-title js-splitscreen-section-title" data-dcnode-id="6915" data-legacy-id="s29" id="113547764" scrollto-destination="113547764"><span data-dcnode-id="6916" instrument_node="">Obtaining blood from the retro–orbital sinus.</span></h4><span data-dcnode-id="6914" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6912"><span data-dcnode-id="6913" instrument_node="">Retro–orbital bleeding should be used when less invasive blood collection methods have been determined to be unsuitable. To minimize the chances of damage to the eye, this technique should be performed by trained and experienced individuals. The use of very short-acting anesthesia (e.g., isoflurane or sevoflurane) in a plastic bag will immobilize rodents in 15–20s, thereby making the procedure safer for the rodent and the handler.</span></p><span data-dcnode-id="6911" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="6909" data-legacy-id="s30" id="113547766" scrollto-destination="113547766"><span data-dcnode-id="6910" instrument_node="">External marks</span></h3><span data-dcnode-id="6908" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6902"><span data-dcnode-id="6907" instrument_node=""> Individual identification of mammals is necessary for many types of studies, both in the laboratory and the field. Identification marks can be natural (stripe pattern, color, or mane patterns) or can be applied by the investigator. Of primary concern is the distance from which the animal must be identified and the time period over which the mark must endure. It is worth noting that marking techniques that do not permit identification at a distance or are not permanent might require repeat trapping and handling of animals for reapplication of marks. On large bodied species, natural variation in fur or whisker patterns ( </span><span class="xrefLink" data-dcnode-id="6906" id="jumplink-CIT0080"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6904" data-google-interstitial="false" data-open="CIT0080" href="javascript:;" reveal-id="CIT0080"><span data-dcnode-id="6905" instrument_node="">West and Packer 2002</span></a><span data-dcnode-id="6903" instrument_node=""> ) or marks left by previously sustained injuries (e.g., scars on wings, ears, or flukes) often suffice for permanent identification at a distance. </span></p><p class="chapter-para" data-dcnode-id="6896"><span data-dcnode-id="6901" instrument_node=""> When appropriate naturally occurring marks are not available, external dyes, freeze brands, or paint marks might provide the visibility and degree of longevity required. Identification marks can be made with nontoxic hair dyes or paint. Care should be taken to ensure that substances used for external marks are nontoxic and do not alter the behavior of animals or subject them to increased predation (e.g., by adversely affecting the animal’s natural camouflage or increasing its visual or olfactory detectability). Dye marks on juveniles or subadults are of more limited duration because of rapid molting and thus may require more frequent renewal. Freeze branding is an effective means of marking bats and other species, and marks might last several years ( </span><span class="xrefLink" data-dcnode-id="6900" id="jumplink-CIT0068"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6898" data-google-interstitial="false" data-open="CIT0068" href="javascript:;" reveal-id="CIT0068"><span data-dcnode-id="6899" instrument_node="">Sherwin et al. 2002</span></a><span data-dcnode-id="6897" instrument_node=""> ). Tattooing and ear punches provide a more persistent means of identification but require handling of animals for individual recognition and may not be permanent in some species. </span></p><p class="chapter-para" data-dcnode-id="6882"><span data-dcnode-id="6895" instrument_node=""> Metallic or plastic tags and bands or collars may be suitable for identification at appreciable distances on large terrestrial species. Tags typically are applied to the ears of terrestrial mammals and to flippers of seals and sea lions. Use of individually numbered tags on small mammals necessitates handling the animal each time an individual is to be identified. Although they frequently are used with a high degree of success, ear tags might inhibit grooming of ears and promote infection by parasites in some rodents ( </span><span class="xrefLink" data-dcnode-id="6894" id="jumplink-CIT0057"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6892" data-google-interstitial="false" data-open="CIT0057" href="javascript:;" reveal-id="CIT0057"><span data-dcnode-id="6893" instrument_node="">Ostfeld et al. 1996</span></a><span data-dcnode-id="6891" instrument_node=""> ), although potential for infection likely varies with species and environment. Further, unless carefully sized, tags might snag, either during grooming or when animals move through vegetation, resulting in loss of the tag ( </span><span class="xrefLink" data-dcnode-id="6890" id="jumplink-CIT0086"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6888" data-google-interstitial="false" data-open="CIT0086" href="javascript:;" reveal-id="CIT0086"><span data-dcnode-id="6889" instrument_node="">Wood and Slade 1990</span></a><span data-dcnode-id="6887" instrument_node=""> ). Eartags might also affect typical movements of the pinnae (e.g., Preyer reflex) in free-ranging animals. Many of the problems associated with ear tags are reduced in laboratory settings where such tags may be especially useful for long-term identification. Ear tags may not be an option for species with greatly reduced pinnae (e.g., many shrews). Wing bands for bats should be applied so that they slide freely along the forelimb, which may necessitate cutting a slit in the wing membrane in some cases. Another external marking option for bats is an appropriately sized bead-chain necklace ( </span><span class="xrefLink" data-dcnode-id="6886" id="jumplink-CIT0009"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6884" data-google-interstitial="false" data-open="CIT0009" href="javascript:;" reveal-id="CIT0009"><span data-dcnode-id="6885" instrument_node="">Barclay and Bell 1988</span></a><span data-dcnode-id="6883" instrument_node=""> ). </span></p><p class="chapter-para" data-dcnode-id="6880"><span data-dcnode-id="6881" instrument_node="">Individuals in some taxa can be identified by unique patterns of ear punches (where a small amount of tissue is removed from external pinnae using a surgical hole punch). Ear punches, however, may become unidentifiable over time in free-ranging individuals because of healing, subsequent injuries sustained in the field, or obscuration by hair. In some species, toe clips may be used. Toe clipping involves removal of 1 or more digits or terminal phalanges (generally only 1 per foot) and provides a permanent identifying mark. Both ear punches and toe clipping typically require recapture as neither is generally suitable for identification at a distance. Because both of these methods involve removal of a small amount of tissue, they might be especially appropriate in studies where tissue samples also are required.</span></p><p class="chapter-para" data-dcnode-id="6844"><span data-dcnode-id="6879" instrument_node=""> According to the </span><em data-dcnode-id="6877"><span data-dcnode-id="6878" instrument_node="">Guide</span></em><span data-dcnode-id="6876" instrument_node=""> ( </span><span class="xrefLink" data-dcnode-id="6875" id="jumplink-CIT0054"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6873" data-google-interstitial="false" data-open="CIT0054" href="javascript:;" reveal-id="CIT0054"><span data-dcnode-id="6874" instrument_node="">NRC 2011</span></a><span data-dcnode-id="6872" instrument_node=""> :75), toe clipping “should be used only when no other individual identification method is feasible.” Justification for toe clipping of wild mammals should include consideration of the natural history of the species, how the feet are used in the animal’s environment, and the size of the toe. Digits generally should not be removed from the forefeet of subterranean or fossorial taxa because they are used for digging, nor should primary digits be removed from arboreal or scansorial taxa because they are used for climbing. Toe clipping in species with fleshy digits should be avoided. Toe clipping might be especially suitable for permanent identification in small species (e.g., </span><em data-dcnode-id="6870"><span data-dcnode-id="6871" instrument_node="">Chaetodipus</span></em><span data-dcnode-id="6869" instrument_node=""> , </span><em data-dcnode-id="6867"><span data-dcnode-id="6868" instrument_node="">Perognathus</span></em><span data-dcnode-id="6866" instrument_node=""> , </span><em data-dcnode-id="6864"><span data-dcnode-id="6865" instrument_node="">Peromyscus</span></em><span data-dcnode-id="6863" instrument_node=""> , </span><em data-dcnode-id="6861"><span data-dcnode-id="6862" instrument_node="">Reithrodontomys</span></em><span data-dcnode-id="6860" instrument_node=""> , and </span><em data-dcnode-id="6858"><span data-dcnode-id="6859" instrument_node="">Sorex</span></em><span data-dcnode-id="6857" instrument_node=""> ) and in neonates of larger taxa. Toe clipping and ear punches should not be used for marking bats, which instead can be effectively marked with wing punches or freeze brands. Toe clips and ear punches should be performed with sharp, sterilized instruments. Anesthetics and analgesics generally are not recommended as prolonged restraint of small mammals to administer these substances and consumption of the analgesic substances (e.g., creams) via licking likely cause more stress and harm than conducting the procedure without their use. A recent study in laboratory mice showed that toe clipping as late as 17 days of age caused no microscopic reaction as late as 10 weeks of age and that the use of vapocoolant anesthetics caused more harmful effects than toe removal without anesthetics ( </span><span class="xrefLink" data-dcnode-id="6856" id="jumplink-CIT0058"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6854" data-google-interstitial="false" data-open="CIT0058" href="javascript:;" reveal-id="CIT0058"><span data-dcnode-id="6855" instrument_node="">Paluch et al. 2014</span></a><span data-dcnode-id="6853" instrument_node=""> ; but see </span><span class="xrefLink" data-dcnode-id="6852" id="jumplink-CIT0014"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6850" data-google-interstitial="false" data-open="CIT0014" href="javascript:;" reveal-id="CIT0014"><span data-dcnode-id="6851" instrument_node="">Braden et al. 2015</span></a><span data-dcnode-id="6849" instrument_node=""> regarding the use of vapocoolant anesthetics in general). The adverse effects of additional handling for application of anesthetics or analgesics with wild taxa are likely to be substantially greater than was observed by </span><span class="xrefLink
