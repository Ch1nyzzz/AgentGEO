" data-dcnode-id="6848" id="jumplink-CIT0058"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6846" data-google-interstitial="false" data-open="CIT0058" href="javascript:;" reveal-id="CIT0058"><span data-dcnode-id="6847" instrument_node="">Paluch et al. (2014)</span></a><span data-dcnode-id="6845" instrument_node=""> with laboratory mice. </span></p><p class="chapter-para" data-dcnode-id="6822"><span data-dcnode-id="6843" instrument_node=""> Radiotransmitters provide a mechanism to monitor movements and survival of animals and, therefore, also serve to identify individuals. Transmitters can be attached externally with surgical or skin glue or a collar, or implanted into the body cavity. External attachment often can be accomplished in the field ( </span><span class="xrefLink" data-dcnode-id="6842" id="jumplink-CIT0064"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6840" data-google-interstitial="false" data-open="CIT0064" href="javascript:;" reveal-id="CIT0064"><span data-dcnode-id="6841" instrument_node="">Rothmeyer et al. 2002</span></a><span data-dcnode-id="6839" instrument_node=""> ; </span><span class="xrefLink" data-dcnode-id="6838" id="jumplink-CIT0050"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6836" data-google-interstitial="false" data-open="CIT0050" href="javascript:;" reveal-id="CIT0050"><span data-dcnode-id="6837" instrument_node="">Munro et al. 2006</span></a><span data-dcnode-id="6835" instrument_node=""> ), whereas more invasive implantation might require transport to a laboratory where sterile conditions can be maintained during surgery. Investigators using collars should take into account the possibility that an animal will grow or undergo seasonal changes in neck circumference (e.g., male cervids); the devices used should be designed to accommodate such changes ( </span><span class="xrefLink" data-dcnode-id="6834" id="jumplink-CIT0074"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6832" data-google-interstitial="false" data-open="CIT0074" href="javascript:;" reveal-id="CIT0074"><span data-dcnode-id="6833" instrument_node="">Strathearn et al. 1984</span></a><span data-dcnode-id="6831" instrument_node=""> ). If external transmitters are attached using glue, members of some species will groom each other excessively to remove adhesive from their fur ( </span><span class="xrefLink" data-dcnode-id="6830" id="jumplink-CIT0081"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6828" data-google-interstitial="false" data-open="CIT0081" href="javascript:;" reveal-id="CIT0081"><span data-dcnode-id="6829" instrument_node="">Wilkinson and Bradbury 1988</span></a><span data-dcnode-id="6827" instrument_node=""> ). Surgical implantation and explantation and more invasive procedures, which should be performed by a veterinarian or individuals who have received specialized training, usually require a suitable recovery period before the animal can be released. Before using radiotransmitters, an investigator should consider the weight of the transmitter relative to the body mass of the target species or individual. Generally, the transmitter should represent &lt; 5–10% of the individual’s body weight ( </span><span class="xrefLink" data-dcnode-id="6826" id="jumplink-CIT0083"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6824" data-google-interstitial="false" data-open="CIT0083" href="javascript:;" reveal-id="CIT0083"><span data-dcnode-id="6825" instrument_node="">Wilson et al. 1996</span></a><span data-dcnode-id="6823" instrument_node=""> ). As an alternative to radiotransmitters, light-emitting diodes or similar markers might be fastened externally to some species for nocturnal observation. </span></p><span data-dcnode-id="6821" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="6819" data-legacy-id="s31" id="113547773" scrollto-destination="113547773"><span data-dcnode-id="6820" instrument_node="">Internal tags</span></h3><span data-dcnode-id="6818" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6807"><span data-dcnode-id="6817" instrument_node=""> PIT tags are electronic devices encased in glass or resin capsules. They do not emit constant signals but can be interpreted with a remote reader in much the same way that barcodes are scanned. PIT tags are becoming progressively smaller but can still be too large for some species or individuals; their use in very small individuals should be approached cautiously. Tags are injected subcutaneously using a modified large-bore hypodermic syringe and are suitable for many field and laboratory identification needs. Tags should be massaged away from the point of insertion subdermally to prevent loss and allow healing at the point of entry. Currently available PIT tag readers must be held in reasonably close proximity to the tag (~ 10cm) to function and thus their use with large, aggressive taxa (e.g., </span><em data-dcnode-id="6815"><span data-dcnode-id="6816" instrument_node="">Procyon</span></em><span data-dcnode-id="6814" instrument_node=""> and </span><em data-dcnode-id="6812"><span data-dcnode-id="6813" instrument_node="">Lynx</span></em><span data-dcnode-id="6811" instrument_node=""> ) will usually require anesthesia both for application and for subsequent reading of the tag to prevent injury to the animal and investigators. Because of the resultant stress for both subject and investigator, other methods of tagging large mammals, such as using radiotransmitters or naturally occurring markings, may be preferable. Ingestion of colored plastic particles or radioactive isotopes (such as P </span><sup data-dcnode-id="6809"><span data-dcnode-id="6810" instrument_node="">32</span></sup><span data-dcnode-id="6808" instrument_node=""> ) in bait can be used to mark feces for studies of movements of individuals or groups of individuals, although this method is of limited use for uniquely marking a large number of individuals. </span></p><span data-dcnode-id="6806" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="6804" data-legacy-id="s32" id="113547775" scrollto-destination="113547775"><span data-dcnode-id="6805" instrument_node="">Chemical immobilization for application of marks and tissue sampling</span></h3><span data-dcnode-id="6803" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6781"><span data-dcnode-id="6802" instrument_node=""> Depending on the biology of the target species, its body size, and the goals of the study, captured animals might require chemical immobilization for safe and effective handling. Investigators should consider that stress and restraint associated with immobilization might be greater than applying or reading a particular mark or taking noninvasive tissue samples without immobilization. Whether immobilization is required must be considered on a case-by-case basis. If pain is slight or momentary and the animal can be handled without unreasonable risk of self-injury or injury to personnel, anesthesia might be contraindicated so that the animal can be released immediately. Procedures that can cause more than momentary or slight pain or distress or species in which the struggling animal is a danger to itself or personnel should be performed with appropriate sedation, analgesia, or anesthesia ( </span><span class="xrefLink" data-dcnode-id="6801" id="jumplink-CIT0037"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6799" data-google-interstitial="false" data-open="CIT0037" href="javascript:;" reveal-id="CIT0037"><span data-dcnode-id="6800" instrument_node="">Interagency Research Animal Committee [IRAC] 1985</span></a><span data-dcnode-id="6798" instrument_node=""> :V). In these instances, field-portable anesthetic machines allow use of isoflurane and similar inhalants to provide a reliable anesthetic and rapid recovery after the animal is no longer exposed to the gas. Use of anesthesia for blood sampling will depend on collection procedure and species-specific considerations. Some anesthetics (e.g., ketamine) depress blood pressure and make blood collection lengthier and potentially dangerous. Anesthesia also might alter the blood component (e.g., cortisols) under investigation. Use of anesthesia should be weighed against risk of mortality because some species are very sensitive to anesthetics (e.g., felids— </span><span class="xrefLink" data-dcnode-id="6797" id="jumplink-CIT0016"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6795" data-google-interstitial="false" data-open="CIT0016" href="javascript:;" reveal-id="CIT0016"><span data-dcnode-id="6796" instrument_node="">Bush 1995</span></a><span data-dcnode-id="6794" instrument_node=""> ; </span><span class="xrefLink" data-dcnode-id="6793" id="jumplink-CIT0041"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6791" data-google-interstitial="false" data-open="CIT0041" href="javascript:;" reveal-id="CIT0041"><span data-dcnode-id="6792" instrument_node="">Kreeger and Arnemo 2012</span></a><span data-dcnode-id="6790" instrument_node=""> ). Selection of anesthetics and analgesics should be conducted in consultation with a specialist—such as a wildlife veterinarian—knowledgeable regarding the use of these substances in species of mammals other than standard laboratory or companion taxa. The investigator should conduct a literature review to search for alternatives as well as for anesthetics and analgesics used in closely related species ( </span><span class="xrefLink" data-dcnode-id="6789" id="jumplink-CIT0041"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6787" data-google-interstitial="false" data-open="CIT0041" href="javascript:;" reveal-id="CIT0041"><span data-dcnode-id="6788" instrument_node="">Kreeger and Arnemo 2012</span></a><span data-dcnode-id="6786" instrument_node=""> ). Physiological measurements required for experimental purposes also can affect the choice of anesthesia. Sedatives, anxiolytics, and neuromuscular blocking agents are not analgesic or anesthetic and hence do not relieve pain; these substances must be used in combination with a suitable anesthetic or analgesic ( </span><span class="xrefLink" data-dcnode-id="6785" id="jumplink-CIT0054"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6783" data-google-interstitial="false" data-open="CIT0054" href="javascript:;" reveal-id="CIT0054"><span data-dcnode-id="6784" instrument_node="">NRC 2011</span></a><span data-dcnode-id="6782" instrument_node=""> ). </span></p><span data-dcnode-id="6780" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="6764" data-legacy-id="s33" id="113547777" scrollto-destination="113547777"><span data-dcnode-id="6779" instrument_node="">M </span><span class="small-caps" data-dcnode-id="6777"><span data-dcnode-id="6778" instrument_node="">aintenance of</span></span><span data-dcnode-id="6776" instrument_node=""> W </span><span class="small-caps" data-dcnode-id="6774"><span data-dcnode-id="6775" instrument_node="">ild</span></span><span data-dcnode-id="6773" instrument_node=""> -C </span><span class="small-caps" data-dcnode-id="6771"><span data-dcnode-id="6772" instrument_node="">aught</span></span><span data-dcnode-id="6770" instrument_node=""> M </span><span class="small-caps" data-dcnode-id="6768"><span data-dcnode-id="6769" instrument_node="">ammals in</span></span><span data-dcnode-id="6767" instrument_node=""> C </span><span class="small-caps" data-dcnode-id="6765"><span data-dcnode-id="6766" instrument_node="">aptivity</span></span></h2><span data-dcnode-id="6763" instrument_node="">
</span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="6761" data-legacy-id="s34" id="113547778" scrollto-destination="113547778"><span data-dcnode-id="6762" instrument_node="">Procurement and holding conditions</span></h3><span data-dcnode-id="6760" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6754"><span data-dcnode-id="6759" instrument_node=""> When wild-caught individuals are to be held for an extended period or transported, the investigator must provide a secure means of containment, sufficient food and moisture, and appropriate ambient conditions and must consider the potential for transfer of parasites or pathogens, and the safety of the investigator(s) (see section on “Human Safety”). Cages must be constructed to minimize possibility of injury or escape, to provide adequate ventilation, to allow for protection from wastes; cages generally should be of sufficient size to permit the captive individual to make appropriate postural adjustments ( </span><span class="xrefLink" data-dcnode-id="6758" id="jumplink-CIT0054"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6756" data-google-interstitial="false" data-open="CIT0054" href="javascript:;" reveal-id="CIT0054"><span data-dcnode-id="6757" instrument_node="">NRC 2011</span></a><span data-dcnode-id="6755" instrument_node=""> , 9 CFR 3.125). Some types of live traps (e.g., Sherman traps and Tomahawk traps) can be used as holding or transport cages for short periods of time for appropriate species. </span></p><p class="chapter-para" data-dcnode-id="6752"><span data-dcnode-id="6753" instrument_node="">Captive mammals held for an extended period (&gt; 12h for USDA-regulated species, which includes all wild mammals in the United States) must be provided with suitable sources of food and moisture. Food can be provided at the time of capture. For many small mammals, especially rodents, fruits or vegetables (e.g., grapes, celery, cabbage, lettuce, or slices of apple or potato) with high moisture content will suffice during transport or short periods of captivity until more permanent housing, food, and water can be provided. Water bottles should generally be avoided during transport because they will leak and dampen bedding.</span></p><p class="chapter-para" data-dcnode-id="6750"><span data-dcnode-id="6751" instrument_node="">Care must be taken when transporting captive animals to prevent their exposure to temperature extremes or precipitation, to provide adequate ventilation, and to minimize stress. Regardless of cage construction, minimizing disturbance is best. This may include placing transport cages in cool, darkened settings and minimizing noise and movement. In some instances, these conditions can be achieved simply by placing a drape over the cage, provided air flow is sufficient and temperatures are not extreme.</span></p><p class="chapter-para" data-dcnode-id="6748"><span data-dcnode-id="6749" instrument_node="">Free-ranging mammals may carry diseases and almost certainly harbor ecto- and endoparasites. Some IACUCs require treatment for ectoparasites before transport, and most will require quarantine of newly captured individuals before entering an animal care facility. Even if these precautions are not required, the investigator should take appropriate steps to minimize potential impacts to other captive animals and to humans. Most ectoparasites can be controlled by dusting with commercial flea and tick powder. Treatments for endoparasites are more involved and generally should be pursued after consultation with a veterinarian. Investigators should contact the local institutional occupational health office for information on risks to humans from species of mammals under consideration before transport, housing, or maintenance.</span></p><span data-dcnode-id="6747" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="6745" data-legacy-id="s35" id="113547783" scrollto-destination="113547783"><span data-dcnode-id="6746" instrument_node="">Maintenance environments</span></h3><span data-dcnode-id="6744" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6714"><span data-dcnode-id="6743" instrument_node=""> When individuals of wild species are to be maintained in captivity for &gt; 12h, the caging or holding environment must be selected carefully to accommodate species-specific requirements and to minimize stress. Cages or pens of an appropriate size and construction must adequately contain animals for their health and safety and that of investigators and animal care personnel. Because of the great variety of mammalian species that might be maintained, no specific guidelines for cage materials or size are possible, but considerations should be given to all aspects of the ecology, physiology, and behavior of target species. Guidelines developed for husbandry of domesticated species, including the </span><em data-dcnode-id="6741"><span data-dcnode-id="6742" instrument_node="">Guide</span></em><span data-dcnode-id="6740" instrument_node=""> ( </span><span class="xrefLink" data-dcnode-id="6739" id="jumplink-CIT0054"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6737" data-google-interstitial="false" data-open="CIT0054" href="javascript:;" reveal-id="CIT0054"><span data-dcnode-id="6738" instrument_node="">NRC 2011</span></a><span data-dcnode-id="6736" instrument_node=""> ), are seldom appropriate for wild-caught individuals and may constitute inappropriate or even inhumane treatment. Because of their capture as free-ranging individuals, nondomesticated species may perform better in larger cages or pens than those used for similarly sized domesticated species ( </span><span class="xrefLink" data-dcnode-id="6735" id="jumplink-CIT0025"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6733" data-google-interstitial="false" data-open="CIT0025" href="javascript:;" reveal-id="CIT0025"><span data-dcnode-id="6734" instrument_node="">Fowler 1995</span></a><span data-dcnode-id="6732" instrument_node=""> ). Temperature, humidity, lighting, and noise levels also must be within appropriate limits. An excellent source of information on the specific needs of wild-caught species is the ASM’s </span><em data-dcnode-id="6730"><span data-dcnode-id="6731" instrument_node="">Mammalian Species</span></em><span data-dcnode-id="6729" instrument_node=""> series ( </span><a class="link link-uri" data-dcnode-id="6727" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mspecies.oxfordjournals.org/"><span data-dcnode-id="6728" instrument_node="">https://mspecies.oxfordjournals.org</span></a><span data-dcnode-id="6726" instrument_node=""> ). Additional valuable information usually can be obtained directly from investigators or animal care staff familiar with a particular species. Investigators proposing to maintain wild-caught mammals in captivity are encouraged to contact other researchers or institutions experienced with the taxa in question and to consult with the IACUC’s attending veterinarian before submitting a protocol. Investigators should realize that housing requirements often will represent departures from the </span><em data-dcnode-id="6724"><span data-dcnode-id="6725" instrument_node="">Guide</span></em><span data-dcnode-id="6723" instrument_node=""> ( </span><span class="xrefLink" data-dcnode-id="6722" id="jumplink-CIT0054"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6720" data-google-interstitial="false" data-open="CIT0054" href="javascript:;" reveal-id="CIT0054"><span data-dcnode-id="6721" instrument_node="">NRC 2011</span></a><span data-dcnode-id="6719" instrument_node=""> ) or the PHS policy on use of laboratory animals ( </span><span class="xrefLink" data-dcnode-id="6718" id="jumplink-CIT0051"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6716" data-google-interstitial="false" data-open="CIT0051" href="javascript:;" reveal-id="CIT0051"><span data-dcnode-id="6717" instrument_node="">NIH/OLAW 2015</span></a><span data-dcnode-id="6715" instrument_node=""> ), even if optimum for the proper maintenance of nondomesticated taxa; as a result, investigators should be prepared to justify proposed maintenance requirements to the IACUC and the IACUC approve departures. </span></p><p class="chapter-para" data-dcnode-id="6708"><span data-dcnode-id="6713" instrument_node=""> Careful selection of bedding materials and substrate is critical to meeting the needs of nondomesticated species. Materials used should simulate as closely as possible the animal’s natural environment and structure. Such materials might include sand or fine woodchips for desert species, soil and leaf litter for shrews and fossorial forms, and hay or straw for other species of rodents. The quantity of bedding also might be important if a dense covering (e.g., straw) allows establishment of refuges or runways that are components of the natural environment of the target species. More generally, some form of refuge should be provided in which captive individuals can remain concealed when possible because their availability influences behavior ( </span><span class="xrefLink" data-dcnode-id="6712" id="jumplink-CIT0065"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6710" data-google-interstitial="false" data-open="CIT0065" href="javascript:;" reveal-id="CIT0065"><span data-dcnode-id="6711" instrument_node="">Rusak and Zucker 1975</span></a><span data-dcnode-id="6709" instrument_node=""> ). </span></p><p class="chapter-para" data-dcnode-id="6700"><span data-dcnode-id="6707" instrument_node=""> Olfactory cues are a fundamental component of the natural environment of most mammals, and the design of husbandry practices should incorporate the maintenance of familiar scents to maximize animal comfort. Individuals frequently scent mark to establish territory boundaries and ownership. Frequent bedding changes and cage washing eliminates normal scent cues and places captive individuals in a novel and potentially stressful environment. Investigators can reduce stress that accompanies cleaning by changing bedding and cage equipment on a less frequent cycle than typically used for domesticated species (often 1 or 2 times weekly for laboratory rodents). Additionally, investigators can mix a small amount of old bedding with fresh bedding. Species adapted to arid conditions (e.g., </span><em data-dcnode-id="6705"><span data-dcnode-id="6706" instrument_node="">Onychomys</span></em><span data-dcnode-id="6704" instrument_node=""> ) will likely perform best when bedding changes occur every 10–14 days (or even less frequently), while others (e.g., </span><em data-dcnode-id="6702"><span data-dcnode-id="6703" instrument_node="">Sigmodon</span></em><span data-dcnode-id="6701" instrument_node=""> ) may require more frequent (e.g., weekly) changes. Because scent marks often are deposited on watering devices or cage lids, disturbance associated with being placed into a novel environment can be reduced by changing these devices on a different schedule from that used for caging and bedding so that individuals are not placed in an environment completely devoid of familiar scents. The importance of establishing and maintaining familiar surroundings, especially as identified by olfactory cues, cannot be overemphasized. </span></p><p class="chapter-para" data-dcnode-id="6684"><span data-dcnode-id="6699" instrument_node=""> All species of mammals require some form of moisture in captivity, although water sources and requirements vary widely among species. Most mammals are best maintained with liquid water provided in various containers or via lickable watering systems. However, some taxa, such as kangaroo rats ( </span><em data-dcnode-id="6697"><span data-dcnode-id="6698" instrument_node="">Dipodomys</span></em><span data-dcnode-id="6696" instrument_node=""> ) and pocket gophers ( </span><em data-dcnode-id="6694"><span data-dcnode-id="6695" instrument_node="">Thomomys</span></em><span data-dcnode-id="6693" instrument_node=""> ), do not consume free water in the wild because they obtain moisture directly from their food and/or retain metabolic water ( </span><span class="xrefLink" data-dcnode-id="6692" id="jumplink-CIT0013"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6690" data-google-interstitial="false" data-open="CIT0013" href="javascript:;" reveal-id="CIT0013"><span data-dcnode-id="6691" instrument_node="">Boice 1972</span></a><span data-dcnode-id="6689" instrument_node=""> ). These taxa can be maintained in captivity by periodically feeding small amounts of moisture-containing produce such as cabbage, lettuce, celery, or apple. The frequency of these supplemental feedings is dependent upon the ambient humidity in the environment and the water physiology of the species in question. If provided with ad libitum access to free water, xeric-adapted species can become dependent upon these sources ( </span><span class="xrefLink" data-dcnode-id="6688" id="jumplink-CIT0013"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6686" data-google-interstitial="false" data-open="CIT0013" href="javascript:;" reveal-id="CIT0013"><span data-dcnode-id="6687" instrument_node="">Boice 1972</span></a><span data-dcnode-id="6685" instrument_node=""> ), which can result in changes in physiological functions that may confound some studies. </span></p><span data-dcnode-id="6683" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="6681" data-legacy-id="s36" id="113547788" scrollto-destination="113547788"><span data-dcnode-id="6682" instrument_node="">Environmental enrichment</span></h3><span data-dcnode-id="6680" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6669"><span data-dcnode-id="6679" instrument_node=""> Because the lack of stimulation in a captive environment can result in development of stereotypic behaviors that confound research interests, environmental enrichment can be a critical component of husbandry for nondomesticated mammals. Enrichment might be as simple as increasing structural complexity in the cage or providing additional materials for manipulation. For example, the captive environment of woodrats ( </span><em data-dcnode-id="6677"><span data-dcnode-id="6678" instrument_node="">Neotoma</span></em><span data-dcnode-id="6676" instrument_node=""> ) kept in false-bottom cages can be improved by providing rodent chow directly in the cage rather than in a feeder attached to the cage front. This allows these natural hoarders to regularly rearrange food within their cage. Their environment can be further enhanced by providing strips of cardboard that will simulate the woody debris these animals use to construct nests in the wild. Other species of rodents also can benefit from inclusion of fibrous materials from which to construct nests. Chipmunks ( </span><em data-dcnode-id="6674"><span data-dcnode-id="6675" instrument_node="">Neotamias</span></em><span data-dcnode-id="6673" instrument_node=""> ) and red squirrels ( </span><em data-dcnode-id="6671"><span data-dcnode-id="6672" instrument_node="">Tamiasciurus</span></em><span data-dcnode-id="6670" instrument_node=""> ) are very active and can be difficult to maintain in captivity, but they can be housed successfully by using cages that incorporate 3-dimensional structures (e.g., hanging branches and perches) along with a cage floor sufficient for digging and caching food. For some species, hiding food in cardboard boxes allows the animal to “forage,” thereby providing an important form of enrichment. </span></p><p class="chapter-para" data-dcnode-id="6667"><span data-dcnode-id="6668" instrument_node="">The social structure of the target species also must be taken into account when housing captive mammals. Captive situations that permit an approximation of the natural social structure of the target species are likely to be most successful and minimize stress. Individuals of species that are social or gregarious should be housed with other individuals when possible, but care must be taken to ensure compatibility. Of course, investigators must be aware of seasonal changes in social structure and modify housing environments accordingly to minimize stress and control reproduction.</span></p><span data-dcnode-id="6666" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="6664" data-legacy-id="s37" id="113547791" scrollto-destination="113547791"><span data-dcnode-id="6665" instrument_node="">Captive housing of bats</span></h3><span data-dcnode-id="6663" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6653"><span data-dcnode-id="6662" instrument_node=""> Housing and caring for bats in captivity presents several particular challenges for investigators and IACUCs. Animal care programs should be designed in consultation with rehabilitation or zoo experts or other researchers experienced with the care of the type of bats to be held (e.g., husbandry of fruit bats versus insectivorous bats will differ substantially). To the extent possible, housing conditions should imitate wild conditions. For nonhibernating species or for hibernating species housed during the active season, a flight cage that allows for and encourages free-flight should be provided. Obstacles such has hanging chains or hanging dividers require maneuverability during flight (the appropriateness of which varies by bat species), which should maintain natural behaviors and help prevent obesity, a frequent occurrence in captive conditions. Multiple roosting pouches, as well as numerous food and water dishes are preferable, so as to minimize competition when individuals are housed together. A flight cage should have double-wired walls to prevent escape. The external wire should be sturdy, such as hardware cloth. The internal wire will vary by species (depending upon body size, including size of the claws on hind feet), but window screen is often selected. Excellent guidelines for the housing and care of bats under captive conditions, including dietary considerations, can be found in </span><span class="xrefLink" data-dcnode-id="6661" id="jumplink-CIT0010"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6659" data-google-interstitial="false" data-open="CIT0010" href="javascript:;" reveal-id="CIT0010"><span data-dcnode-id="6660" instrument_node="">Barnard (2011)</span></a><span data-dcnode-id="6658" instrument_node=""> and </span><span class="xrefLink" data-dcnode-id="6657" id="jumplink-CIT0047"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6655" data-google-interstitial="false" data-open="CIT0047" href="javascript:;" reveal-id="CIT0047"><span data-dcnode-id="6656" instrument_node="">Lollar and Schmidt-French (1988)</span></a><span data-dcnode-id="6654" instrument_node=""> . </span></p><p class="chapter-para" data-dcnode-id="6651"><span data-dcnode-id="6652" instrument_node="">For temperate, hibernating species, housing animals under hibernation conditions is often required by the study design or is otherwise desirable. Bats housed in modified refrigerators or in hibernation chambers require significantly less room than active-season bats (bats can be placed in small cages; e.g., wire mesh (reptile) cages in which bats will roost on the sides). Hibernating animals must be maintained at temperatures appropriate for the study species (determined by field data from natural hibernacula, which exist for many species) and require very high relative humidity (&gt; 95%). These conditions (housing of flying animals in small cages, housing at very cold temperatures, and housing at very high relative humidity) deviate from the “normal” limits for laboratory animals and may necessitate special approval from the IACUC. Animals captured in the late fall or early winter and having sufficient body fat will enter hibernation in response to low ambient temperatures. Hibernating bats must be provided with water using either small trays or other waterers (e.g., chick waterers, which may be filled from attached jars, with marbles placed into the bottom to prevent accidental drowning of torpid bats). Unless one is studying a species that routinely feeds during the winter, the provision of food is neither required nor desired. Hibernating bats can be housed successfully under these conditions for 5–6 months (their normal period of hibernation). We strongly recommend that researchers consult with other bat specialists who routinely house hibernating species, as the necessary environmental chambers are typically specially designed and/or modified for bats. When housing hibernating animals, including bats, disturbances must be kept to a minimum to prevent repeated arousal and the resultant exhaustion of energy reserves. Hibernating animals should be checked remotely (using equipment that does not cause disturbance, including sound at frequencies the animals can receive) or observed only infrequently, often at greater than 2-week intervals.</span></p><span data-dcnode-id="6650" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="6648" data-legacy-id="s38" id="113547794" scrollto-destination="113547794"><span data-dcnode-id="6649" instrument_node="">Observation intervals for captive wild mammals</span></h3><span data-dcnode-id="6647" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6639"><span data-dcnode-id="6646" instrument_node=""> Animals held in captivity will require routine care, which includes food, water, and bedding changes as appropriate for the species. Animal care guidelines and regulations also specify periodic observation to monitor the health and well-being of individual animals. The </span><em data-dcnode-id="6644"><span data-dcnode-id="6645" instrument_node="">Guide</span></em><span data-dcnode-id="6643" instrument_node=""> , for example, states (p. 112) that “[a]ll animals should be observed for signs of illness, injury, or abnormal behavior by a person trained to recognize such signs. As a rule, such observations should occur at least daily, but more frequent observations may be required, such as during postoperative recovery, when animals are ill or have a physical deficit, or when animals are approaching a study endpoint.” As with the remainder of the </span><em data-dcnode-id="6641"><span data-dcnode-id="6642" instrument_node="">Guide</span></em><span data-dcnode-id="6640" instrument_node=""> , these statements reflect standard husbandry practices for domesticated species and, in many instances, will not be appropriate for wild animals held in captivity. There are no domesticated hibernators, for example, and a daily disturbance of hibernating mammals would quickly lead to death as energy reserves are depleted by repeated arousal. Similarly, wild animals, particularly those recently brought into captivity, will be stressed by regular close contact with humans. In such instances, PIs and IACUCs must balance the disturbance associated with regular observations of nondomesticated animals against the information acquired from such monitoring. For animals hibernated in captivity or animals housed in naturalistic outdoor enclosures that permit foraging, observations may be conducted less frequently or may be accomplished using indirect signs such as disappearance of food and deposition of feces. </span></p><span data-dcnode-id="6638" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="6636" data-legacy-id="s39" id="113547796" scrollto-destination="113547796"><span data-dcnode-id="6637" instrument_node="">Separation of taxa and minimizing stress</span></h3><span data-dcnode-id="6635" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6633"><span data-dcnode-id="6634" instrument_node="">The Animal Welfare Regulations (9 CFR 3.133) state that animals housed in the same primary enclosure must be compatible. That is, prey species should not be maintained near carnivores and diverse taxa of carnivores generally should not be housed together. Closely related species of some rodents frequently co-occur in nature and often can be housed in the same room without difficulty.</span></p><p class="chapter-para" data-dcnode-id="6631"><span data-dcnode-id="6632" instrument_node="">The general principles for identifying captive mammals in pain or distress are abnormal appearance or behavior. Normal appearances and behavior are determined by species-specific characteristics and personal experience of the handlers. Because behavioral changes are the primary means for identifying pain or distress, all personnel working with animals should understand the normal behavioral patterns of the species they are housing. Thus, all animals should be monitored by trained staff.</span></p><p class="chapter-para" data-dcnode-id="6618"><span data-dcnode-id="6630" instrument_node=""> Pain is generally easy to identify if it is associated with an injury or physical abnormality, but stress or distress might not be due to pain and thus not immediately recognizable. IACUCs generally consider that procedures that cause pain or distress in humans likely also will cause pain or distress in other animals. Symptoms of pain in animals are species specific but may include anorexia, rapid or labored respiration, immobility, increased aggression, lack of grooming, periocular and nasal porphyrin discharge, and abnormal appearance or posture ( </span><span class="xrefLink" data-dcnode-id="6629" id="jumplink-CIT0052"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6627" data-google-interstitial="false" data-open="CIT0052" href="javascript:;" reveal-id="CIT0052"><span data-dcnode-id="6628" instrument_node="">NRC 2008</span></a><span data-dcnode-id="6626" instrument_node=""> , </span><span class="xrefLink" data-dcnode-id="6625" id="jumplink-CIT0053"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6623" data-google-interstitial="false" data-open="CIT0053" href="javascript:;" reveal-id="CIT0053"><span data-dcnode-id="6624" instrument_node="">2009</span></a><span data-dcnode-id="6622" instrument_node=""> ). An extensive list of indicators of pain for a variety of laboratory animals is available from Cornell University at </span><a class="link link-uri" data-dcnode-id="6620" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iacuc.cornell.edu/documents/IACUC009.01.pdf"><span data-dcnode-id="6621" instrument_node="">https://www.iacuc.cornell.edu/documents/IACUC009.01.pdf</span></a><span data-dcnode-id="6619" instrument_node=""> , but animal care personnel should be aware that wild mammals often will provide little or no sign of pain or distress until the condition is acute because overt signs of pain or distress would be strongly selected against in nature, where predators or competitors may cue in to such signs. </span></p><span data-dcnode-id="6617" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="6615" data-legacy-id="s40" id="113547800" scrollto-destination="113547800"><span data-dcnode-id="6616" instrument_node="">Release of captive mammals</span></h3><span data-dcnode-id="6614" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6612"><span data-dcnode-id="6613" instrument_node="">Release of wild-caught mammals that have been held in captivity might be justified in the case of 1) endangered or threatened species, 2) species of special concern due to population dynamics, management needs, or conservation initiatives, or 3) individuals held for only short periods of time. Research designs that require release of captive animals as part of an experimental manipulation must be planned to minimize both potential impacts on local population and stress to the released individuals.</span></p><p class="chapter-para" data-dcnode-id="6610"><span data-dcnode-id="6611" instrument_node="">Concerns regarding release of individuals held in captivity for more than short periods include:</span></p><ul class="bullet" data-dcnode-id="6582"><li data-dcnode-id="6607"><p class="chapter-para" data-dcnode-id="6608"><span data-dcnode-id="6609" instrument_node="">Introduction of individuals into an area without available refuge and resources (especially problematic with highly territorial species)</span></p></li><li data-dcnode-id="6604"><p class="chapter-para" data-dcnode-id="6605"><span data-dcnode-id="6606" instrument_node="">Alteration of population genetics</span></p></li><li data-dcnode-id="6601"><p class="chapter-para" data-dcnode-id="6602"><span data-dcnode-id="6603" instrument_node="">Introduction of individuals not acclimated to the local environment</span></p></li><li data-dcnode-id="6598"><p class="chapter-para" data-dcnode-id="6599"><span data-dcnode-id="6600" instrument_node="">Introduction of pathogens acquired in captivity to wild populations</span></p></li><li data-dcnode-id="6595"><p class="chapter-para" data-dcnode-id="6596"><span data-dcnode-id="6597" instrument_node="">Stress on local populations and released individuals</span></p></li><li data-dcnode-id="6592"><p class="chapter-para" data-dcnode-id="6593"><span data-dcnode-id="6594" instrument_node="">Excessive exposure to predation of released individuals due to inappropriate foraging cycles (entrained by captive light cycles or environments), extensive foraging due to not having caches built up for winter months, or lack of familiarity with local resources</span></p></li><li data-dcnode-id="6589"><p class="chapter-para" data-dcnode-id="6590"><span data-dcnode-id="6591" instrument_node="">Disruption of social systems</span></p></li><li data-dcnode-id="6586"><p class="chapter-para" data-dcnode-id="6587"><span data-dcnode-id="6588" instrument_node="">Lack of appropriate foraging skills (forgotten or never acquired)</span></p></li><li data-dcnode-id="6583"><p class="chapter-para" data-dcnode-id="6584"><span data-dcnode-id="6585" instrument_node="">Legality of reintroduction of captive animals (varies with state and country)</span></p></li></ul><p class="chapter-para" data-dcnode-id="6577"><span data-dcnode-id="6581" instrument_node=""> Decisions regarding release and permissible durations of captivity prior to release are often species- or project specific and must be made on a case-by-case basis. Holding members of a species for 1 or a few days to recover from surgical implantation of a transmitter or data logger is usually appropriate. In contrast, release of highly territorial animals held for even short periods into the same environment from which they were captured can be problematic because vacant territories can be usurped such that reintroduction of a former resident virtually guarantees a conflict that would not have occurred had the resident not been removed. For additional information regarding the potential release of marine mammals, investigators are referred to the best practices for these taxa developed by the National Marine Fisheries Service ( </span><a class="link link-uri" data-dcnode-id="6579" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nmfs.noaa.gov/pr/pdfs/health/release_guidelines.pdf"><span data-dcnode-id="6580" instrument_node="">http://www.nmfs.noaa.gov/pr/pdfs/health/release_guidelines.pdf</span></a><span data-dcnode-id="6578" instrument_node=""> ). Final disposition of captive animals is of concern, but the integrity of natural populations and humane treatment of released individuals must be the highest priorities in project design and IACUC deliberations. </span></p><span data-dcnode-id="6576" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="6566" data-legacy-id="s41" id="113547805" scrollto-destination="113547805"><span data-dcnode-id="6575" instrument_node="">E </span><span class="small-caps" data-dcnode-id="6573"><span data-dcnode-id="6574" instrument_node="">uthanasia and</span></span><span data-dcnode-id="6572" instrument_node=""> H </span><span class="small-caps" data-dcnode-id="6570"><span data-dcnode-id="6571" instrument_node="">umane</span></span><span data-dcnode-id="6569" instrument_node=""> K </span><span class="small-caps" data-dcnode-id="6567"><span data-dcnode-id="6568" instrument_node="">illing</span></span></h2><span data-dcnode-id="6565" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6556"><span data-dcnode-id="6564" instrument_node=""> The </span><em data-dcnode-id="6562"><span data-dcnode-id="6563" instrument_node="">Guide</span></em><span data-dcnode-id="6561" instrument_node=""> defines euthanasia as “the act of killing animals by methods that induce rapid unconsciousness and death without pain or distress” ( </span><span class="xrefLink" data-dcnode-id="6560" id="jumplink-CIT0054"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6558" data-google-interstitial="false" data-open="CIT0054" href="javascript:;" reveal-id="CIT0054"><span data-dcnode-id="6559" instrument_node="">NRC 2011</span></a><span data-dcnode-id="6557" instrument_node=""> :123). Euthanasia is often accomplished as a 2-step process that involves use of an agent to depress or eliminate central nervous function and a 2nd step to stop the heart. The 1st action causes the animal to become unconscious and insensitive to pain while the second is the actual cause of mortality. Although both of these goals can be accomplished with a single agent, the primary concern is alleviating pain immediately. Whatever the method, the objective is that the animal feels no or only momentary pain, distress, or anxiety. </span></p><p class="chapter-para" data-dcnode-id="6539"><span data-dcnode-id="6555" instrument_node=""> Euthanasia techniques are evaluated and approved by the IACUC during review of the animal protocol. Investigators should be aware that the </span><em data-dcnode-id="6553"><span data-dcnode-id="6554" instrument_node="">Guide</span></em><span data-dcnode-id="6552" instrument_node=""> ( </span><span class="xrefLink" data-dcnode-id="6551" id="jumplink-CIT0054"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6549" data-google-interstitial="false" data-open="CIT0054" href="javascript:;" reveal-id="CIT0054"><span data-dcnode-id="6550" instrument_node="">NRC 2011</span></a><span data-dcnode-id="6548" instrument_node=""> ) requires that methods of euthanasia be consistent with the AVMA Guidelines on Euthanasia ( </span><span class="xrefLink" data-dcnode-id="6547" id="jumplink-CIT0005"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6545" data-google-interstitial="false" data-open="CIT0005" href="javascript:;" reveal-id="CIT0005"><span data-dcnode-id="6546" instrument_node="">AVMA 2013a</span></a><span data-dcnode-id="6544" instrument_node=""> ) unless an exception is justified for scientific or medical reasons. The AVMA distinguishes between euthanasia and humane killing and notes that methods of killing other than those deemed “acceptable methods of euthanasia” might be justified in situations with free-ranging wild animals. In the section on wildlife, the AVMA writes “that the quickest and most humane means of terminating the life of free-ranging wildlife in a given situation may not always meet all criteria established for euthanasia (i.e., distinguishes between euthanasia and methods that are more accurately characterized as humane killing)” ( </span><span class="xrefLink" data-dcnode-id="6543" id="jumplink-CIT0005"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6541" data-google-interstitial="false" data-open="CIT0005" href="javascript:;" reveal-id="CIT0005"><span data-dcnode-id="6542" instrument_node="">AVMA 2013a</span></a><span data-dcnode-id="6540" instrument_node=""> , Section S7.6). </span></p><p class="chapter-para" data-dcnode-id="6526"><span data-dcnode-id="6538" instrument_node=""> Investigators and oversight personnel should realize that the AVMA guidelines for euthanasia are a poor fit for many, if not most, field settings, and thus often warrant IACUC-approved departures from the </span><em data-dcnode-id="6536"><span data-dcnode-id="6537" instrument_node="">Guide</span></em><span data-dcnode-id="6535" instrument_node=""> and the AVMA guidelines. The treatment of gunshot as a form of euthanasia or humane killing in the AVMA guidelines is one such example. The AVMA contends that the minimum energy recommended for euthanasia by gunshot of animals smaller than 180kg is 407 J ( </span><span class="xrefLink" data-dcnode-id="6534" id="jumplink-CIT0005"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6532" data-google-interstitial="false" data-open="CIT0005" href="javascript:;" reveal-id="CIT0005"><span data-dcnode-id="6533" instrument_node="">AVMA 2013a</span></a><span data-dcnode-id="6531" instrument_node=""> :37). Satisfying these conditions would require use of a handgun on the order of a .357 Magnum to achieve these energy levels with most readily available ammunition. This is clearly an inappropriate level of energy for most smaller species of mammals. It is also the position of the AVMA that gunshot cannot be considered euthanasia in wildlife unless “bullet placement is to the head (targeted to destroy the brain)” ( </span><span class="xrefLink" data-dcnode-id="6530" id="jumplink-CIT0005"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6528" data-google-interstitial="false" data-open="CIT0005" href="javascript:;" reveal-id="CIT0005"><span data-dcnode-id="6529" instrument_node="">AVMA 2013a</span></a><span data-dcnode-id="6527" instrument_node=""> :82). Such a procedure, particularly with cartridges of the muzzle energy specified by the AVMA, renders the skull and perhaps large parts of the animal carcass unusable and is thus inconsistent with most scientific collecting efforts that rely on obtaining high-quality specimens for research. Gunshot through the brain also risks aerosolizing brain tissue and thus may contribute to the spread of rabies viruses or prions if present in the target individual. Justification for deviations from approved AVMA euthanasia methods for studies of wildlife can include citation of published literature (such as these ASM guidelines) and incompatibility with study requirements. </span></p><p class="chapter-para" data-dcnode-id="6524"><span data-dcnode-id="6525" instrument_node="">Field methods for killing should be as quick and painless as possible, compatible with study design, and the size, behavior, and biology of the focal species. In case of injury resulting from capture or handling, and when nothing can be done to alleviate pain or distress or when recovery is not expected, euthanasia or humane killing is indicated. Except when specifically excluded by permit or law (e.g., with endangered/threatened species), protocols involving fieldwork should explicitly indicate the circumstances for and method of euthanasia for voucher and distressed or injured animals to accommodate unplanned injuries even when animal mortality is not an anticipated outcome. In the case of Endangered Species, investigators should request conditions on their permit that will allow them to terminate the lives of injured animals unlikely to survive in the wild unless treated, particularly where the animal is in pain or distress and veterinary care is not available. Importantly, investigators are advised to list, and oversight bodies to accept, a range of methods to achieve a humane death for target and nontarget species under the variable environmental conditions that may be encountered.</span></p><p class="chapter-para" data-dcnode-id="6518"><span data-dcnode-id="6523" instrument_node=""> Euthanasia or humane killing should be conducted by personnel properly trained in the procedure used. Proper technique includes a follow-up examination to confirm death. Standard evidence of death include dilated pupils and absence of heartbeat as well as failure to respond to a toe pinch or touch of the eye; cessation of breathing is not a sufficient criterion. Decapitation, cervical dislocation, or thoracotomy (i.e., open biopsy of lung, pleura, hilum, and mediastinum) may be conducted after administration of euthanizing drugs, as consistent with study requirements, to insure that animals do not revive ( </span><span class="xrefLink" data-dcnode-id="6522" id="jumplink-CIT0005"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6520" data-google-interstitial="false" data-open="CIT0005" href="javascript:;" reveal-id="CIT0005"><span data-dcnode-id="6521" instrument_node="">AVMA 2013a</span></a><span data-dcnode-id="6519" instrument_node=""> ). The AVMA considers decapitation and cervical dislocation, when properly performed by experienced and trained personnel, acceptable methods of euthanasia for some study designs and research needs, although justification for use of these methods should include details concerning intended use of the animals and the reasons why other euthanasia methods are unsuitable. Decapitation or cervical dislocation can be used as a method of euthanasia on animals that are first anesthetized or sedated, but investigators should be aware that administering sedatives or anesthesia before euthanasia might add distress or impose additional pain on the animal. For many small-bodied species, cervical dislocation can be accomplished efficiently in the field without sedation by experienced personnel. Investigators should be aware, however, that this procedure can alter body measurements and damage skulls of smaller species, so its use on individuals that will be archived as museum specimens should be carefully considered. </span></p><p class="chapter-para" data-dcnode-id="6512"><span data-dcnode-id="6517" instrument_node=""> Although euthanasia of small mammals in field settings can be accomplished using any of the techniques approved by the AVMA, use of injectable controlled substances or inhalants can be challenging due to risks to investigators and stress to the animals. Investigators and IACUCs are also reminded to verify the legal requirements for using controlled substances away from the premises listed on DEA registration and for administration by individuals other than licensed veterinarians if such will not be present at the site of administration. If the method of killing includes controlled substances, toxins, or lead projectiles, the PI and IACUC must consider the possibility of secondary toxicity if the carcass is left in the field and consumed by other animals. These concerns might be alleviated by removing or burying the carcass, but removal of carcasses, particularly of large animals, also deprives the biotic community of these valuable resources ( </span><span class="xrefLink" data-dcnode-id="6516" id="jumplink-CIT0069"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6514" data-google-interstitial="false" data-open="CIT0069" href="javascript:;" reveal-id="CIT0069"><span data-dcnode-id="6515" instrument_node="">Sikes and Bryan 2015</span></a><span data-dcnode-id="6513" instrument_node=""> ). Further, the use of controlled substances requires DEA registration and availability of the compounds themselves. Availability might be further compromised if the study involves foreign travel. </span></p><p class="chapter-para" data-dcnode-id="6506"><span data-dcnode-id="6511" instrument_node=""> PIs and IACUCs should be aware that the Veterinary Mobility Act of 2014 permits veterinarians, but not other DEA registrants, to transport and use controlled substances at sites other than their registered address. It is also important to note that most states require a VCPR that may or may not extend to wildlife and the use of controlled substances by someone other than the veterinarian. As noted previously in the section on the “Role of the veterinarian,” the language of Section 5 of the model Veterinary Practices Act endorsed by the AVMA in 2013 ( </span><span class="xrefLink" data-dcnode-id="6510" id="jumplink-CIT0006"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6508" data-google-interstitial="false" data-open="CIT0006" href="javascript:;" reveal-id="CIT0006"><span data-dcnode-id="6509" instrument_node="">AVMA 2013b</span></a><span data-dcnode-id="6507" instrument_node=""> ) precludes establishment of a VCPR exclusively by telephonic or other electronic means. Thus, to provide medical advice, including whether or not to euthanize an animal on the basis of its condition, it would presumably be necessary for a veterinarian to accompany the investigator on all field excursions. To insure compliance, investigators and IACUCs should consult the language of the regulations for the practice of veterinary medicine and the use of controlled substances in the state in which research activities are conducted. </span></p><p class="chapter-para" data-dcnode-id="6486"><span data-dcnode-id="6505" instrument_node=""> Thoracic compression offers an acceptable method of field euthanasia for some mammals and has been used effectively for decades by practicing mammalogists. Thoracic compression is not listed as an acceptable form of euthanasia in the 2013 edition of the AVMA </span><em data-dcnode-id="6503"><span data-dcnode-id="6504" instrument_node="">Guidelines for the Euthanasia of Animals</span></em><span data-dcnode-id="6502" instrument_node=""> , but, as noted above, procedures other than those considered acceptable as euthanasia can be used for humane killing and can be authorized by the IACUC. The </span><span class="xrefLink" data-dcnode-id="6501" id="jumplink-CIT0004"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6499" data-google-interstitial="false" data-open="CIT0004" href="javascript:;" reveal-id="CIT0004"><span data-dcnode-id="6500" instrument_node="">AVMA’s (2011)</span></a><span data-dcnode-id="6498" instrument_node=""> “Literature Review” on thoracic compression states that “when scientifically justified, the IACUC has and should employ the authority to approve killing techniques not listed as recognized forms of euthanasia. This might include approving thoracic compression where it represents the most humane option available or practicable, or approving the use of drugs with analgesic properties that may not be scheduled drugs.” The AVMA further states that “thoracic compression should not be prohibited where its use is necessary to minimize animal suffering or is scientifically justified (such as under the oversight of an Institutional Animal Care and Use Committee)” ( </span><span class="xrefLink" data-dcnode-id="6497" id="jumplink-CIT0004"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6495" data-google-interstitial="false" data-open="CIT0004" href="javascript:;" reveal-id="CIT0004"><span data-dcnode-id="6496" instrument_node="">AVMA 2011</span></a><span data-dcnode-id="6494" instrument_node=""> ). AAALAC International similarly considers thoracic compression acceptable in these situations. In their adoption of the AVMA </span><em data-dcnode-id="6492"><span data-dcnode-id="6493" instrument_node="">Guidelines</span></em><span data-dcnode-id="6491" instrument_node=""> as reference materials, AAALAC International made a single exception, which focused on the use of thoracic compression in wildlife studies ( </span><span class="xrefLink" data-dcnode-id="6490" id="jumplink-CIT0001"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6488" data-google-interstitial="false" data-open="CIT0001" href="javascript:;" reveal-id="CIT0001"><span data-dcnode-id="6489" instrument_node="">AAALAC International 2015</span></a><span data-dcnode-id="6487" instrument_node=""> ): </span></p><blockquote data-dcnode-id="6483"><p class="chapter-para" data-dcnode-id="6484"><span data-dcnode-id="6485" instrument_node="">Exception: Thoracic (cardiopulmonary, cardiac) compression is a method used to euthanize wild small mammals and birds, mainly under field conditions. According to the 2013 Guidelines, thoracic compression is an unacceptable means of euthanizing animals that are not deeply anesthetized or insentient due to other reasons P.41, M3.12 and P.83, S7.6.3.3. The Council on Accreditation recognizes the need for the use of thoracic compression in conscious wild small birds and mammals in situations where alternate techniques are not feasible or objectives of the protocol are such that the Institutional Animal Care and Use Committee (IACUC), and/or competent authority, grants approval for this method, training for the technique is provided, and its continued approval is re-evaluated as more scientifically-based data regarding its use becomes available.</span></p></blockquote><p class="chapter-para" data-dcnode-id="6481"><span data-dcnode-id="6482" instrument_node="">Thoracic compression has the advantage of requiring no additional equipment and thus can be used in any situation where appropriately sized animals can be brought to hand. It does not distort important body measurements, destroy needed tissues and skeletal elements, or alter hormonal profiles via the introduction of foreign substances. The ASM considers thoracic compression a humane method of killing when the investigator is skilled in this procedure and when the individuals to be killed are sufficiently small that the thoracic cavity can be collapsed to prevent inspiration.</span></p><p class="chapter-para" data-dcnode-id="6469"><span data-dcnode-id="6480" instrument_node=""> Methods of euthanasia acceptable to the AVMA—their advantages, disadvantages, and effectiveness—are reviewed in the AVMA </span><em data-dcnode-id="6478"><span data-dcnode-id="6479" instrument_node="">Guidelines for the Euthanasia of Animals</span></em><span data-dcnode-id="6477" instrument_node=""> ( </span><span class="xrefLink" data-dcnode-id="6476" id="jumplink-CIT0005"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6474" data-google-interstitial="false" data-open="CIT0005" href="javascript:;" reveal-id="CIT0005"><span data-dcnode-id="6475" instrument_node="">AVMA 2013a</span></a><span data-dcnode-id="6473" instrument_node=""> ). This report also provides information on inhalant agents, noninhalant pharmaceutical agents, and physical methods of euthanasia. The American College of Laboratory Animal Medicine (ACLAM) has also evaluated rodent euthanasia and identified 3 issues of concern: euthanasia of fetal and neonatal rodents, use of carbon dioxide for euthanasia, and impact of euthanasia techniques on data collection. Publications by ACLAM ( </span><a class="link link-uri" data-dcnode-id="6471" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aclam.org/Content/files/files/Public/Active/report_rodent_euth.pdf"><span data-dcnode-id="6472" instrument_node="">https://www.aclam.org/Content/files/files/Public/Active/report_rodent_euth.pdf</span></a><span data-dcnode-id="6470" instrument_node=""> ) provide appropriate directives on these topics. </span></p><p class="chapter-para" data-dcnode-id="6459"><span data-dcnode-id="6468" instrument_node=""> For collecting methods using kill traps, it is important to recall the AVMA position that, although kill traps do not always render a rapid or stress-free death consistent with their criteria for euthanasia, situations exist when live traps and subsequent euthanasia are not possible or when it might be more stressful to animals or dangerous to humans to use live traps as opposed to kill traps ( </span><span class="xrefLink" data-dcnode-id="6467" id="jumplink-CIT0005"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6465" data-google-interstitial="false" data-open="CIT0005" href="javascript:;" reveal-id="CIT0005"><span data-dcnode-id="6466" instrument_node="">AVMA 2013a</span></a><span data-dcnode-id="6464" instrument_node=""> ). Finally, whether the termination of life is considered euthanasia or humane killing, these acts must be performed with a conscious respect for their effect on other animals (including human observers). Fear in other animals (including conspecifics and in some cases heterospecifics) can be triggered by distress vocalizations, fearful behavior, and release of odors and pheromones by a frightened animal ( </span><span class="xrefLink" data-dcnode-id="6463" id="jumplink-CIT0005"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6461" data-google-interstitial="false" data-open="CIT0005" href="javascript:;" reveal-id="CIT0005"><span data-dcnode-id="6462" instrument_node="">AVMA 2013a</span></a><span data-dcnode-id="6460" instrument_node=""> ). Thus, killing should be done outside the perceptive range of other individuals whenever possible. Judgment should be exercised with regard to killing animals in view of the general public without providing them training or education about its necessity to avoid negative reactions to the procedures by observers. </span></p><span data-dcnode-id="6458" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="6445" data-legacy-id="s42" id="113547818" scrollto-destination="113547818"><span data-dcnode-id="6457" instrument_node="">V </span><span class="small-caps" data-dcnode-id="6455"><span data-dcnode-id="6456" instrument_node="">ouchering of</span></span><span data-dcnode-id="6454" instrument_node=""> S </span><span class="small-caps" data-dcnode-id="6452"><span data-dcnode-id="6453" instrument_node="">pecimens and</span></span><span data-dcnode-id="6451" instrument_node=""> A </span><span class="small-caps" data-dcnode-id="6449"><span data-dcnode-id="6450" instrument_node="">ncillary</span></span><span data-dcnode-id="6448" instrument_node=""> M </span><span class="small-caps" data-dcnode-id="6446"><span data-dcnode-id="6447" instrument_node="">aterials</span></span></h2><span data-dcnode-id="6444" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6435"><span data-dcnode-id="6443" instrument_node=""> Investigators must always plan for the disposition of animals from wild populations when a study is completed or when animals are procured unexpectedly during the study. The latter might result from incidental deaths when animals are found dead in traps, nets, or on roadways. All specimens and ancillary material generated from field studies should be deposited with relevant data into an accredited research collection when possible. The ASM Systematic Collection Committee has compiled a list of accredited collections in the Western Hemisphere ( </span><span class="xrefLink" data-dcnode-id="6442" id="jumplink-CIT0031"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6440" data-google-interstitial="false" data-open="CIT0031" href="javascript:;" reveal-id="CIT0031"><span data-dcnode-id="6441" instrument_node="">Hafner et al. 1997</span></a><span data-dcnode-id="6439" instrument_node=""> ). The information is available online at </span><a class="link link-uri" data-dcnode-id="6437" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mammalsociety.org/committees/systematic-collections"><span data-dcnode-id="6438" instrument_node="">http://www.mammalsociety.org/committees/systematic-collections</span></a><span data-dcnode-id="6436" instrument_node=""> . Deposition of specimens and ancillary materials in permanent collections maximizes benefits from each specimen generated, ensures access to valuable data by future investigators, and provides vouchers for individuals or species used in published research. Further, in some instances, archived specimens may be used in lieu of sacrificing additional individuals as part of future studies. The ASM recommends that when IACUCs approve field studies that include collection or otherwise might result in mortalities or the collection of potential surplus biological material from either target or nontarget taxa, PIs designate an ASM-approved systematic collection in which to deposit their specimens. The submission of materials, of course, should be commensurate with the needs and capacities of the systematic collection. Exceptions to this practice should be justified in the approved protocols. ASM recommends that investigators coordinate with these institutions at the earliest possible stages of project development in order to adequately budget for the expenses involved in voucher deposition and curation. </span></p><span data-dcnode-id="6434" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="6427" data-legacy-id="s43" id="113547820" scrollto-destination="113547820"><span data-dcnode-id="6433" instrument_node="">H </span><span class="small-caps" data-dcnode-id="6431"><span data-dcnode-id="6432" instrument_node="">uman</span></span><span data-dcnode-id="6430" instrument_node=""> S </span><span class="small-caps" data-dcnode-id="6428"><span data-dcnode-id="6429" instrument_node="">afety</span></span></h2><span data-dcnode-id="6426" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6416"><span data-dcnode-id="6425" instrument_node=""> Working with wild mammals, particularly in field situations, involves inherent risks, both biotic (e.g., bites, pathogens, parasites, and venomous plants and animals) and abiotic (e.g., lightning and temperature extremes). Fortunately, most of these risks can be minimized with basic training, planning, mentoring, and experience. Investigators have the responsibility to ensure that personnel handling, transporting, or maintaining wild-caught mammals are qualified and familiar with the associated hazards (e.g., bites and exposure to body fluids) as well as the requirements of the target species (e.g., bats— </span><span class="xrefLink" data-dcnode-id="6424" id="jumplink-CIT0020"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6422" data-google-interstitial="false" data-open="CIT0020" href="javascript:;" reveal-id="CIT0020"><span data-dcnode-id="6423" instrument_node="">Constantine 1988</span></a><span data-dcnode-id="6421" instrument_node=""> ). With appropriate preparation and training, investigators can adequately protect themselves and collaborators while conducting fieldwork with mammals ( </span><span class="xrefLink" data-dcnode-id="6420" id="jumplink-CIT0044"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6418" data-google-interstitial="false" data-open="CIT0044" href="javascript:;" reveal-id="CIT0044"><span data-dcnode-id="6419" instrument_node="">Kunz et al. 1997</span></a><span data-dcnode-id="6417" instrument_node=""> ). </span></p><p class="chapter-para" data-dcnode-id="6384"><span data-dcnode-id="6415" instrument_node=""> Many universities and other institutions offer field courses, workshops, and online programs designed to provide investigators and students with proper training in fieldwork and activities with wild-caught mammals. Occupational health programs also provide guidance for avoiding biological, chemical, and other hazards. Sources such as the </span><span class="xrefLink" data-dcnode-id="6414" id="jumplink-CIT0018"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6412" data-google-interstitial="false" data-open="CIT0018" href="javascript:;" reveal-id="CIT0018"><span data-dcnode-id="6413" instrument_node="">CDC (1998</span></a><span data-dcnode-id="6411" instrument_node=""> , </span><span class="xrefLink" data-dcnode-id="6410" id="jumplink-CIT0019"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6408" data-google-interstitial="false" data-open="CIT0019" href="javascript:;" reveal-id="CIT0019"><span data-dcnode-id="6409" instrument_node="">1999</span></a><span data-dcnode-id="6407" instrument_node=""> ; </span><a class="link link-uri" data-dcnode-id="6405" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cdc.gov/"><span data-dcnode-id="6406" instrument_node="">http://www.cdc.gov/</span></a><span data-dcnode-id="6404" instrument_node=""> ) or state health departments offer current information and precautions for personnel conducting epidemiological studies or working with populations suspected of posing specific health risks. Additionally, the ASM provides updated guidelines relative to hantavirus pulmonary syndrome for mammalogists and wildlife researchers working with rodents; these recommendations should be broadly applicable to field studies of other mammal taxa ( </span><span class="xrefLink" data-dcnode-id="6403" id="jumplink-CIT0039"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6401" data-google-interstitial="false" data-open="CIT0039" href="javascript:;" reveal-id="CIT0039"><span data-dcnode-id="6402" instrument_node="">Kelt et al. 2010</span></a><span data-dcnode-id="6400" instrument_node=""> ). The document by </span><span class="xrefLink" data-dcnode-id="6399" id="jumplink-CIT0039"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6397" data-google-interstitial="false" data-open="CIT0039" href="javascript:;" reveal-id="CIT0039"><span data-dcnode-id="6398" instrument_node="">Kelt et al. (2010)</span></a><span data-dcnode-id="6396" instrument_node=""> also makes the important clarification that earlier published guidelines by the </span><span class="xrefLink" data-dcnode-id="6395" id="jumplink-CIT0018"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6393" data-google-interstitial="false" data-open="CIT0018" href="javascript:;" reveal-id="CIT0018"><span data-dcnode-id="6394" instrument_node="">CDC (1998</span></a><span data-dcnode-id="6392" instrument_node=""> , </span><span class="xrefLink" data-dcnode-id="6391" id="jumplink-CIT0019"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6389" data-google-interstitial="false" data-open="CIT0019" href="javascript:;" reveal-id="CIT0019"><span data-dcnode-id="6390" instrument_node="">1999</span></a><span data-dcnode-id="6388" instrument_node=""> ) were never intended to apply to field investigators conducting nonviral-focused research on rodents. Special precautions (e.g., vaccinations) to ensure human safety might be necessary when transporting individuals known or suspected of carrying potentially lethal pathogens such as hantavirus or the rabies virus. In areas where zoonotics are known to occur, bagging traps with a gloved hand and bringing them to a central processing area that follows institutional biosafety recommendations might be sufficient, although additional precautions might be required at the time of final processing of the captured animal, depending on the data required. Although chloroform is considered highly hazardous to personnel due to attendant risks of cancer and liver toxicity ( </span><a class="link link-uri" data-dcnode-id="6386" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.osha.gov/dts/chemicalsampling/data/CH_227600.html"><span data-dcnode-id="6387" instrument_node="">https://www.osha.gov/dts/chemicalsampling/data/CH_227600.html</span></a><span data-dcnode-id="6385" instrument_node=""> ), use of this substance under open-air field conditions might be appropriate because it kills ectoparasites that can pose risks to the researcher through transmission of disease. </span></p><p class="chapter-para" data-dcnode-id="6382"><span data-dcnode-id="6383" instrument_node="">Many IACUCs will require the investigator to document in their protocols the potential risks to human health and safety while working with target species of wild-caught mammals. However, investigators and IACUC members should remain cognizant that risks from zoonoses vary depending on study species, local environmental conditions, personnel attributes, and the potential pathogens. Accordingly, the safety precautions employed should match potential risks.</span></p><span data-dcnode-id="6381" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="6377" data-legacy-id="s44" id="113547824" scrollto-destination="113547824"><span data-dcnode-id="6380" instrument_node="">S </span><span class="small-caps" data-dcnode-id="6378"><span data-dcnode-id="6379" instrument_node="">ummary</span></span></h2><span data-dcnode-id="6376" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6374"><span data-dcnode-id="6375" instrument_node="">These updated guidelines on the use of mammals, including wild species, emphasize that investigators are responsible for compliance with federal and state guidelines regulating care and use of animals in research, exhibition, and instruction. Investigators should work with IACUCs to develop research protocols that allow scientific research objectives to be completed successfully while complying with animal welfare regulations. A rational, well-justified protocol, written succinctly and completely, will facilitate a positive and productive dialog with the IACUC. The task of the IACUC is to provide assurance to federal regulatory agencies and the public that animal research is being accomplished in accordance with the regulations and intent of the AWA and to work with researchers and educators to develop appropriate protocols. IACUCs must be strong advocates for animal welfare and humane animal use in research and education, especially when investigators provide clear justification for animal use and expertise upon which the IACUC can rely. These interactions foster strong, positive, and professional relationships between the IACUC and the investigator.</span></p><p class="chapter-para" data-dcnode-id="6368"><span data-dcnode-id="6373" instrument_node=""> From initial design to completion of a study, investigators should exercise good judgment and prudence when using animals in research. IACUCs appreciate working with investigators who provide details of their research designs and goals. The “3 Rs” of Reducing the number of individuals without compromising statistical validity or biological significance, Replacing “higher” animals with “lower” ones, and Refinements of techniques and care to minimize pain or distress to animals ( </span><span class="xrefLink" data-dcnode-id="6372" id="jumplink-CIT0054"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id=
