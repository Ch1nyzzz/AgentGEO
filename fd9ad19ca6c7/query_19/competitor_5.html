</span><h2 class="wsite-content-title" data-dcnode-id="2217" style="text-align:left;"><span data-dcnode-id="2218" instrument_node="">Red Eared Slider Care&nbsp;</span></h2><span data-dcnode-id="2216" instrument_node="">
</span><div class="paragraph" data-dcnode-id="2212" style="text-align:left;"><span data-dcnode-id="2215" instrument_node="">Erica Mede, CVT</span><br data-dcnode-id="2214"><span data-dcnode-id="2213" instrument_node="">Photos and edited by Susan Horton, DVM</span></div><span data-dcnode-id="2211" instrument_node="">
</span><span class="imgPusher" data-dcnode-id="2210" style="float:left;height:0px"></span><span data-dcnode-id="2206" style="display: table;width:215px;position:relative;float:left;max-width:100%;;clear:left;margin-top:0px;*margin-top:0px"><a data-dcnode-id="2208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.exoticpetvet.com/uploads/8/3/6/8/8368644/red-ear-slider-3-small_orig.jpg" onclick="if (!lightboxLoaded) return false" rel="lightbox"><img alt="Picture" class="galleryImageBorder wsite-image" data-dcnode-id="2209" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.exoticpetvet.com/uploads/8/3/6/8/8368644/red-ear-slider-3-small.jpg%3F197&amp;raw" style="margin-top: 5px; margin-bottom: 10px; margin-left: 0px; margin-right: 10px; border-width:1px;padding:3px; max-width:100%"></a><span class="wsite-caption" data-dcnode-id="2207" style="display: table-caption; caption-side: bottom; font-size: 90%; margin-top: -10px; margin-bottom: 10px; text-align: center;"></span></span><span data-dcnode-id="2205" instrument_node="">
</span><div class="paragraph" data-dcnode-id="2170" style="text-align:left;display:block;"><span data-dcnode-id="2204" instrument_node="">The Red Eared Slider (also known as RES and Red Ears) is an extremely prolific and widespread chelonian accounting for 70-85% of the turtle population in the United States ! &nbsp;The slider family in general is the most prolific species of freshwater turtle in the world! &nbsp;Red Ears make wonderful pets being one of the hardiest chelonians available in the pet trade and at one point in time was exported in numbers as high as 10 million annually. &nbsp;Many owners remark that their Red Ear is not only "tame" but social and even seek human companionship especially if raised from a young age! &nbsp;Red Ears are well known for their bright red markings along the side of their necks which makes them an attractive pet and the availability of albino, pastel, and leucistic morphs make them a huge seller and a very common pet. &nbsp;With the latest production of two headed turtles from breeders, these turtles have settled nicely back in the ranks of popular reptiles!</span><br data-dcnode-id="2203"><br data-dcnode-id="2202"><strong data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">Natural History</span></strong><br data-dcnode-id="2199"><br data-dcnode-id="2198"><span data-dcnode-id="2197" instrument_node="">Throughout the Mississippi Valley (from Illinois to the Gulf of Mexico), these beautiful turtles are seen in the quiet rivers, streams, ponds, and creeks enjoying the sunshine from a log. &nbsp;In nature, these chelonians enjoy quiet fresh water with soft muddy bottoms and abundant aquatic vegetation. &nbsp;Logs jutting up from the water and rocks make wonderful basking sites. &nbsp;The Red Eared Sliders in the colder climates hibernate in the winter although this is a practice not commonly recommended or practiced in the home. &nbsp;Many new owners are concerned when their pet is found on the bottom of the aquarium unmoving or floating on the top of the surface. &nbsp;This does not necessarily indicate that the RES has died! &nbsp;This species is commonly in these positions while sleeping. &nbsp;If the turtle is easily roused when in this state it is safe to assume it is sleeping.</span><br data-dcnode-id="2196"><br data-dcnode-id="2195"><span data-dcnode-id="2194" instrument_node="">In 1975, the United States government banned the sale of any chelonian with a carapace (top shell) less than four inches long in hopes of preventing the spread of Salmonella and the destruction of native species in the wild. &nbsp;With the age of easily accessible information via the World Wide Web, private breeders have been successfully breeding and incubating Red Eared Sliders and now offer their domestically bred chelonians online. &nbsp;As to the legalities regarding this practice, that is for the government to decide. &nbsp;Domestically bred Red Ears are always recommended over their wild caught counterparts.</span><br data-dcnode-id="2193"><br data-dcnode-id="2192"><strong data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Description</span></strong><br data-dcnode-id="2189"><br data-dcnode-id="2188"><span data-dcnode-id="2187" instrument_node="">These chelonians are medium to large fresh water inhabitants with a distinct and very prominent red marking along the side of the head starting behind the eye will generally reach 9-11 inches long. &nbsp;The carapace (top shell) is oval in shape and the rim near the back legs (posterior rim) is slightly serrated (ridged). &nbsp;When Red Ears are hatchlings they exhibit bright green carapaces with bright yellow markings and plastrons (bottom shell). &nbsp;As juveniles and adults, the carapace turns to an olive or brown color with yellow markings and black blotches. &nbsp;Old males may have completely blackened carapaces but both genders will darken with age. &nbsp;The plastron of juveniles and adults is yellow with a single dark blotch on each scute. &nbsp;Aside from the characteristic red marking on the head, Red Eared Sliders have narrow yellow stripes running down their limbs. &nbsp;RES also have yellow chin stripes as well.</span><br data-dcnode-id="2186"><br data-dcnode-id="2185"><strong data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">Sexing and Reproduction</span></strong><br data-dcnode-id="2182"><br data-dcnode-id="2181"><span data-dcnode-id="2180" instrument_node="">Males are generally smaller than the females at maturity. &nbsp;Males also exhibit longer front claws which may curve slightly and longer, thicker tails. &nbsp;The elongated nails of the male are used to stroke the females face to entice her to mate during the spring and fall and should not be cut. &nbsp;The male will swim backwards facing the female and extending out the forearms to stroke her face. &nbsp;If the gesture is accepted, the two will sink to the bottom of the aquarium to mate with the male on top. &nbsp;Males that are much larger than the female must be watched so accidental drowning does not occur. &nbsp;Red Ears will typically lay 2-25 eggs) between April and July and will hatch 65-75 days later if properly incubated.</span><br data-dcnode-id="2179"><span data-dcnode-id="2178" instrument_node="">Females that are becoming restless and exhibiting nesting behavior (clawing at the basking spot, frantically searching, going off food, etc) should be removed from the enclosure and placed in a warm and dark box such as large plastic storage box with air holes. &nbsp;Sand or moistened top soil (free of manure and pesticides) should be provided in the "nest box" to facilitate nest building and a less stressful egg laying process. &nbsp;The female should be left overnight in the nest box and removed in the early morning for feeding (if eating) and swimming. &nbsp;This may need to be repeated several times before eggs are successfully laid. &nbsp;A female that feels insecure or does not have an appropriate nesting site will lay her eggs in the water or the basking site unceremoniously.</span><br data-dcnode-id="2177"><br data-dcnode-id="2176"><strong data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">Quarantine</span></strong><br data-dcnode-id="2173"><br data-dcnode-id="2172"><span data-dcnode-id="2171" instrument_node="">​It is recommended that all new turtles be quarantined away from the rest of the household chelonians for at least 60-90 days. &nbsp;In this time period the owner can access the animals' behavior and health status. &nbsp;Chicago Exotics strongly urges owners to bring these animals in during quarantine for a wellness exam and a fecal evaluation. &nbsp;Quarantine requires food, dishes, accessories, and cleaning of the chelonian to be done separately (typically after) from the other chelonians.</span></div><span data-dcnode-id="2169" instrument_node="">
</span><hr data-dcnode-id="2168" style="width:100%;clear:both;visibility:hidden;"><span data-dcnode-id="2167" instrument_node="">
</span><span class="imgPusher" data-dcnode-id="2166" style="float:right;height:0px"></span><span data-dcnode-id="2162" style="display: table;width:255px;position:relative;float:right;max-width:100%;;clear:right;margin-top:0px;*margin-top:0px"><a data-dcnode-id="2164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.exoticpetvet.com/uploads/8/3/6/8/8368644/red-ear-slider-2-small_orig.jpg" onclick="if (!lightboxLoaded) return false" rel="lightbox"><img alt="Picture" class="galleryImageBorder wsite-image" data-dcnode-id="2165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.exoticpetvet.com/uploads/8/3/6/8/8368644/red-ear-slider-2-small_orig.jpg&amp;raw" style="margin-top: 5px; margin-bottom: 10px; margin-left: 10px; margin-right: 0px; border-width:1px;padding:3px; max-width:100%"></a><span class="wsite-caption" data-dcnode-id="2163" style="display: table-caption; caption-side: bottom; font-size: 90%; margin-top: -10px; margin-bottom: 10px; text-align: center;"></span></span><span data-dcnode-id="2161" instrument_node="">
</span><div class="paragraph" data-dcnode-id="2057" style="text-align:left;display:block;"><strong data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">Enclosure</span></strong><br data-dcnode-id="2158"><br data-dcnode-id="2157"><span data-dcnode-id="2156" instrument_node="">The larger the enclosure for juveniles and adults the better! &nbsp;This species loves to swim, bask, and explore their enclosures. &nbsp;Many even enjoy items such as ping pong balls floating on the water surface as a toy! &nbsp;Young turtles can be kept in 20 gallon long aquariums but will quickly need to be relocated to a 40 gallon breeder aquarium when they reach the juvenile and sub adult stage. &nbsp;Most adults can be housed happily in a 100 gallon aquarium. &nbsp;Some owners opt to create custom enclosures for their pets as well. &nbsp;Generally speaking, there should be 6 inches of aquarium floor per every 1 inch of turtle. &nbsp;If the turtle has a carapace length of 9 inches, it will require 54 inches of aquarium floor space. &nbsp;Other enclosures to consider for multiple turtles include modified plastic tubs, outdoor ponds, and Koi tubs. &nbsp;With a bit of creativity, enclosure potential is endless!</span><br data-dcnode-id="2155"><span data-dcnode-id="2154" instrument_node="">With Red Eared Sliders, it is recommended to have a bare bottom tank, one without substrate. &nbsp;If substrate is desired for enrichment or aesthetic purposes, large gravel can be used. &nbsp;An under gravel filter is strongly recommended as well as weekly agitation and siphoning of debris. &nbsp;An under gravel filter is not enough filtration to maintain a clean environment and will need to be supplemented with other filtration devices. &nbsp;Every 2-4 weeks the rocks should be removed from the tank and scrubbed well with a toothbrush designated for the job and bleach diluted 1:20 with water.</span><br data-dcnode-id="2153"><span data-dcnode-id="2152" instrument_node="">The water for these turtles is important! &nbsp;These are fresh water turtles who enjoy swimming so the chlorine free water depth should be equal to the total length of the carapace multiplied twice. &nbsp;If the turtle is 9 inches long then the water needs to be 18 inches deep. &nbsp;Change a third of the water once a week to keep the water clean.</span><br data-dcnode-id="2151"><br data-dcnode-id="2150"><span data-dcnode-id="2149" instrument_node="">Typically, the water temperature should be maintained between 72 and 76 degrees Fahrenheit. &nbsp;A thermometer in the water is highly recommended at the location furthest away from any heat source and one near the heat source. &nbsp;Water temperature can be maintained using a submersible water heater or under tank heater on a thermostat. &nbsp;If a submersible water heater is used, it is recommended to place a piece of PVC pipe with several holes drilled into the sides of it over the heater to prevent accidental burns and biting. &nbsp;A general room of thumb is a 75 watt heater will work for a 40 gallon tank, a 55 watt heater for a 55 gallon tank, and a 200 watt heater for a 100 gallon aquarium.</span><br data-dcnode-id="2148"><br data-dcnode-id="2147"><span data-dcnode-id="2146" instrument_node="">Canister filters are recommended by Chicago Exotics for all chelonians as they offer mechanical and biofiltration. &nbsp;Canister filters are generally less stressful to aquatics as there is no mechanical vibration on the tank from the filter body itself. &nbsp;Fluval, Magnum, and Eheim make excellent filters and there are a few websites that illustrate how to create your own canister filter. &nbsp;External filtration helps to remove uneaten food and large waste particles as well as agitate surfaces and increase water oxygenation.</span><br data-dcnode-id="2145"><br data-dcnode-id="2144"><span data-dcnode-id="2143" instrument_node="">The basking light should be over a flat stone such as slate or log. &nbsp;Basking sites should be between 90 and 95 degrees Fahrenheit and easily accessible to the chelonian. &nbsp;Metal clamp lamps work well for these sites. &nbsp;The ambient temperature of the tank can be increased with under tank heaters and/or the basking lamp also. &nbsp;During the night, under tank heaters or ceramic heat emitters can be used to increase the ambient temperature as it will offer no light.</span><br data-dcnode-id="2142"><br data-dcnode-id="2141"><span data-dcnode-id="2140" instrument_node="">As with most reptiles, Red Eared Sliders do well on a light cycle that simulates 12 hours of daylight and 12 hours of darkness. &nbsp;A high quality UVB bulb such as a 5.0 ReptiSun bulb is recommended for adults and a 10.0 ReptiSun bulb is recommended for hatchlings and young turtles. &nbsp;These bulbs help the body convert vitamin D3 into calcium and helps</span><br data-dcnode-id="2139"><span data-dcnode-id="2138" instrument_node="">prevent the disfiguring and deadly metabolic bone disease which is generally caused by a lack of available calcium in the reptiles' body causing the body to absorb calcium from the bones.</span><br data-dcnode-id="2137"><br data-dcnode-id="2136"><strong data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">Feeding</span></strong><br data-dcnode-id="2133"><br data-dcnode-id="2132"><span data-dcnode-id="2131" instrument_node="">Hatchlings and juveniles are highly carnivorous (prefer meat) and become omnivorous (eating both vegetation and meat) as adults. &nbsp;The key to a healthy turtle is variety in their diet! &nbsp;Aquatic plants such as algae and duck weed are relished by these chelonians but most owners offer romaine lettuce, cantaloupe, banana, kale, mango, and strawberries as treats. &nbsp;Water hyacinth, water lettuce and water cress can easily be cultivated at home with some diligence and offer enrichment and nutrition. &nbsp;Small fish (not goldfish), insects (crickets, earthworms, red worms), and snails are offered for the meat portion of their diet.</span><br data-dcnode-id="2130"><br data-dcnode-id="2129"><span data-dcnode-id="2128" instrument_node="">Supplementation with commercially produced turtle pellets is recommended as well. &nbsp;Some people prefer to feed only commercially produced turtle pellets, in this case, Chicago Exotics recommends feeding multiple brands of turtle pellets.&nbsp;</span><br data-dcnode-id="2127"><br data-dcnode-id="2126"><span data-dcnode-id="2125" instrument_node="">In the wild, these chelonians embark on daily foraging expeditions throughout their habitat even stealing food from the mouth of other turtles! &nbsp;In captivity, feeding varies with age and the energy output of the turtle. &nbsp;Hatchlings are fed two times a day as much as they will eat in 10-15 minutes. Adults are fed once a day and as much as they can consume in 10-15 minutes. &nbsp;It is recommended to come up with a standard food amount for adult chelonians to be fed daily to monitor appetite changes. &nbsp;If the water is becoming fouled too quickly or the turtle is becoming obese then the food will need to be decreased. &nbsp;All food should be sprinkled with a multi-vitamin once a week and calcium supplement daily for hatchlings and three times a week for adults.</span><br data-dcnode-id="2124"><br data-dcnode-id="2123"><strong data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">Common Medical Concerns</span></strong><br data-dcnode-id="2120"><br data-dcnode-id="2119"><span data-dcnode-id="2118" instrument_node="">(Also see </span><a data-dcnode-id="2116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.exoticpetvet.com/common-health-problems.html"><span data-dcnode-id="2117" instrument_node="">Common Health Problems</span></a><span data-dcnode-id="2115" instrument_node="">)</span><br data-dcnode-id="2114"><br data-dcnode-id="2113"><strong data-dcnode-id="2110"><em data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">Injuries</span></em></strong><br data-dcnode-id="2109"><span data-dcnode-id="2108" instrument_node="">Very common in turtles who are housed together in small enclosures without adequate hiding spots. &nbsp;Injuries caused by cage mate aggression are usually located on the legs, head, and tail. &nbsp;Re-evaluation of the set-up is imperative and permanent separation may be the only solution. &nbsp;All injuries should be evaluated by a veterinarian.</span><br data-dcnode-id="2107"><br data-dcnode-id="2106"><strong data-dcnode-id="2103"><em data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">Shell Rot</span></em></strong><br data-dcnode-id="2102"><span data-dcnode-id="2101" instrument_node="">Commonly seen as pitting of the shell, sores on the shell, or damaged/lost scute coverings. &nbsp;This can be a life threatening as well as disfiguring illness and must be addressed by a veterinarian. &nbsp;If this is occurring, a re-evaluation of water quality and filtration is recommended.</span><br data-dcnode-id="2100"><br data-dcnode-id="2099"><em data-dcnode-id="2096"><strong data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">Abscess</span></strong></em><br data-dcnode-id="2095"><span data-dcnode-id="2094" instrument_node="">These swellings seen on one or both sides of the head are caused by poor water quality commonly. &nbsp;These will not resolve on their own and must be treated by a veterinarian.</span><br data-dcnode-id="2093"><br data-dcnode-id="2092"><em data-dcnode-id="2089"><strong data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">MBD</span></strong></em><br data-dcnode-id="2088"><span data-dcnode-id="2087" instrument_node="">Metabolic bone disease is a major cause of deformity and death in hatchlings. &nbsp;This is generally seen in turtles without access to UVB lighting, insufficient calcium supplementation, and those fed solely turtle pellets or dog/cat food. &nbsp;This disease IS treatable by a veterinarian! &nbsp;If the turtle is exhibiting a soft shell, limb deformities, or shell deformities, call for veterinary help as soon as possible.</span><br data-dcnode-id="2086"><br data-dcnode-id="2085"><strong data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">Sources and Recommended Readings</span></strong><br data-dcnode-id="2082"><br data-dcnode-id="2081"><span data-dcnode-id="2080" instrument_node="">Turtles of the World, </span><em data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">Carl H. Ernst and Roger W. Barbour</span></em><br data-dcnode-id="2077"><span data-dcnode-id="2076" instrument_node="">Turtles of the United States and Canada, </span><em data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Carl H. Ernst, Jeffery E. Lovich, Roger W. Barbour</span></em><br data-dcnode-id="2073"><span data-dcnode-id="2072" instrument_node="">Keeping and Breeding Freshwater Turtles, </span><em data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Russ Gurley</span></em><br data-dcnode-id="2069"><span data-dcnode-id="2068" instrument_node="">The General Care and Maintenance of Red Eared Sliders and Other Popular Freshwater Turtles, </span><em data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">P. de Vosjoli</span></em><br data-dcnode-id="2065"><span data-dcnode-id="2064" instrument_node="">Life History and Ecology of the Slider Turtle, </span><em data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">J. W. Gibbons</span></em><br data-dcnode-id="2061"><br data-dcnode-id="2060"><span data-dcnode-id="2058" style="color:rgb(64, 59, 52)"><span data-dcnode-id="2059" instrument_node="">​If you have any questions, please feel free to call us at 847-329-8709.</span></span></div><span data-dcnode-id="2056" instrument_node="">
