</span><h1 class="entry-title" data-dcnode-id="2500" itemprop="headline"><span data-dcnode-id="2501" instrument_node="">Russian Tortoise Care Sheet: Habitat, Enclosure, Diet, and More!</span></h1><span data-dcnode-id="2499" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="2484"><span data-dcnode-id="2498" instrument_node="">
</span><span class="posted-on" data-dcnode-id="2493"><time class="updated" data-dcnode-id="2496" datetime="2022-03-19T13:12:17-07:00" itemprop="dateModified"><span data-dcnode-id="2497" instrument_node="">March 19, 2022</span></time><time class="entry-date published" data-dcnode-id="2494" datetime="2020-07-29T23:59:47-07:00" itemprop="datePublished"><span data-dcnode-id="2495" instrument_node="">July 29, 2020</span></time></span><span data-dcnode-id="2492" instrument_node=""> </span><span class="byline" data-dcnode-id="2486"><span data-dcnode-id="2491" instrument_node="">by </span><span class="author vcard" data-dcnode-id="2487" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="url fn n" data-dcnode-id="2488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reptile.guide/author/1ncka/" itemprop="url" rel="author" title="View all posts by Stacey"><span class="author-name" data-dcnode-id="2489" itemprop="name"><span data-dcnode-id="2490" instrument_node="">Stacey</span></span></a></span></span><span data-dcnode-id="2485" instrument_node=""> </span></div><span data-dcnode-id="2483" instrument_node="">
</span></header><span data-dcnode-id="2481" instrument_node="">
</span><div class="entry-content" data-dcnode-id="930" itemprop="text"><span data-dcnode-id="2480" instrument_node="">
</span><p data-dcnode-id="2471"><span data-dcnode-id="2472" style="font-weight: 400;"><span data-dcnode-id="2479" instrument_node="">An adorable tiny tortoise, the Russian tortoise (opens in new tab) </span><strong data-dcnode-id="2474"><span data-dcnode-id="2478" instrument_node="">makes an </span><em data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">excellent</span></em><span data-dcnode-id="2475" instrument_node=""> pet for first-time exotic pet owners and well-seasoned pros alike.</span></strong><span data-dcnode-id="2473" instrument_node=""> </span></span></p><span data-dcnode-id="2470" instrument_node="">
</span><p data-dcnode-id="2461"><span data-dcnode-id="2462" style="font-weight: 400;"><span data-dcnode-id="2469" instrument_node="">These small tortoises </span><strong data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">may only grow to reach 5 to 10 inches in length</span></strong><span data-dcnode-id="2466" instrument_node="">, making them </span><em data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">much easier</span></em><span data-dcnode-id="2463" instrument_node=""> to care for than the giant Aldabra tortoise, which can weigh in at 550 pounds! </span></span></p><span data-dcnode-id="2460" instrument_node="">
</span><p data-dcnode-id="2455"><span data-dcnode-id="2456" style="color: #ff0000;"><em data-dcnode-id="2457"><strong data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">What You’ll Learn In This Russian Tortoise Care Sheet:</span></strong></em></span></p><span data-dcnode-id="2454" instrument_node="">
</span><ul data-dcnode-id="2428"><span data-dcnode-id="2453" instrument_node="">
</span><li data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">Background information on Russian tortoises</span></li><span data-dcnode-id="2450" instrument_node="">
</span><li data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">Where to buy a healthy Russian tortoise&nbsp;</span></li><span data-dcnode-id="2447" instrument_node="">
</span><li data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">Relative cost of a Russian tortoise</span></li><span data-dcnode-id="2444" instrument_node="">
</span><li data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">Proper diet for all ages</span></li><span data-dcnode-id="2441" instrument_node="">
</span><li data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">How to properly set up a Russian tortoise enclosure</span></li><span data-dcnode-id="2438" instrument_node="">
</span><li data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">Health concerns to be aware of (plus how to prevent them!)</span></li><span data-dcnode-id="2435" instrument_node="">
</span><li data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">Handling &amp; bonding tips</span></li><span data-dcnode-id="2432" instrument_node="">
</span><li data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">&amp; So much more!</span></li><span data-dcnode-id="2429" instrument_node="">
</span></ul><span data-dcnode-id="2427" instrument_node="">
</span><p data-dcnode-id="2424"><span data-dcnode-id="2425" style="font-weight: 400;"><span data-dcnode-id="2426" instrument_node="">A forgiving reptile, Russian tortoises simply retreat to their burrows to avoid inhospitable climates, waiting until the ideal temperature is reached before emerging. </span></span></p><span data-dcnode-id="2423" instrument_node="">
</span><p data-dcnode-id="2420"><span data-dcnode-id="2421" style="font-weight: 400;"><span data-dcnode-id="2422" instrument_node="">As such, if you don’t see your tortoise for an extended period, there’s a good chance the enclosure’s temperature needs adjusted.&nbsp;</span></span></p><span data-dcnode-id="2419" instrument_node="">
</span><blockquote data-dcnode-id="2410"><span data-dcnode-id="2418" instrument_node="">
</span><p data-dcnode-id="2412"><span data-dcnode-id="2413" style="font-weight: 400;"><span data-dcnode-id="2417" instrument_node="">If you’re interested in adding an adorable, pocket-sized tortoise to your family, brush up on your Russian tortoise knowledge </span><em data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">first</span></em><span data-dcnode-id="2414" instrument_node=""> to ensure you create the proper habitat for your new friend. </span></span></p><span data-dcnode-id="2411" instrument_node="">
</span></blockquote><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2403"><span data-dcnode-id="2404" style="font-weight: 400;"><span data-dcnode-id="2408" instrument_node="">Or, if you want to discover novel diet options for your creep of tortoises, this in-depth Russian Tortoise Care sheet has </span><em data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">plenty</span></em><span data-dcnode-id="2405" instrument_node=""> of tasty veggies to add to your pet’s diet. </span></span></p><span data-dcnode-id="2402" instrument_node="">
</span><p data-dcnode-id="2396"><span data-dcnode-id="2397" style="font-weight: 400;"><span data-dcnode-id="2401" instrument_node="">Read on to discover </span><em data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">everything</span></em><span data-dcnode-id="2398" instrument_node=""> you need to know to provide top-notch care for your Russian tortoise.</span></span></p><span data-dcnode-id="2395" instrument_node="">

ements"><span data-dcnode-id="2371" instrument_node="">Russian Tortoise Supplements</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2366"><a class="ez-toc-link ez-toc-heading-7" data-dcnode-id="2367" href="#Russian-Tortoise-Water-Needs" title="Russian Tortoise Water Needs"><span data-dcnode-id="2368" instrument_node="">Russian Tortoise Water Needs</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2363"><a class="ez-toc-link ez-toc-heading-8" data-dcnode-id="2364" href="#How-Often-to-Feed-Your-Russian-Tortoise" title="How Often to Feed Your Russian Tortoise"><span data-dcnode-id="2365" instrument_node="">How Often to Feed Your Russian Tortoise</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2336"><a class="ez-toc-link ez-toc-heading-9" data-dcnode-id="2359" href="#Russian-Tortoise-Habitat-and-Tank-Setup" title="Russian Tortoise Habitat and Tank Setup"><span data-dcnode-id="2360" instrument_node="">Russian Tortoise Habitat and Tank Setup</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="2337"><li class="ez-toc-heading-level-3" data-dcnode-id="2356"><a class="ez-toc-link ez-toc-heading-10" data-dcnode-id="2357" href="#Size-of-the-Enclosure" title="Size of the Enclosure"><span data-dcnode-id="2358" instrument_node="">Size of the Enclosure</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2353"><a class="ez-toc-link ez-toc-heading-11" data-dcnode-id="2354" href="#Type-of-Enclosures" title="Type of Enclosures&nbsp;"><span data-dcnode-id="2355" instrument_node="">Type of Enclosures&nbsp;</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2350"><a class="ez-toc-link ez-toc-heading-12" data-dcnode-id="2351" href="#Ideal-Temperature-Gradient" title="Ideal Temperature Gradient"><span data-dcnode-id="2352" instrument_node="">Ideal Temperature Gradient</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2347"><a class="ez-toc-link ez-toc-heading-13" data-dcnode-id="2348" href="#Lighting-Requirements" title="Lighting Requirements"><span data-dcnode-id="2349" instrument_node="">Lighting Requirements</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2344"><a class="ez-toc-link ez-toc-heading-14" data-dcnode-id="2345" href="#Ideal-Humidity-Levels" title="Ideal Humidity Levels"><span data-dcnode-id="2346" instrument_node="">Ideal Humidity Levels</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2341"><a class="ez-toc-link ez-toc-heading-15" data-dcnode-id="2342" href="#Substrate" title="Substrate&nbsp;"><span data-dcnode-id="2343" instrument_node="">Substrate&nbsp;</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2338"><a class="ez-toc-link ez-toc-heading-16" data-dcnode-id="2339" href="#Decor-and-Accessories" title="Decor and Accessories&nbsp;"><span data-dcnode-id="2340" instrument_node="">Decor and Accessories&nbsp;</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2320"><a class="ez-toc-link ez-toc-heading-17" data-dcnode-id="2334" href="#Russian-Tortoise-General-Health-Information" title="Russian Tortoise General Health Information&nbsp;"><span data-dcnode-id="2335" instrument_node="">Russian Tortoise General Health Information&nbsp;</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="2321"><li class="ez-toc-heading-level-3" data-dcnode-id="2331"><a class="ez-toc-link ez-toc-heading-18" data-dcnode-id="2332" href="#Hibernation" title="Hibernation"><span data-dcnode-id="2333" instrument_node="">Hibernation</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2328"><a class="ez-toc-link ez-toc-heading-19" data-dcnode-id="2329" href="#Pyramidal-Growth" title="Pyramidal Growth"><span data-dcnode-id="2330" instrument_node="">Pyramidal Growth</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2325"><a class="ez-toc-link ez-toc-heading-20" data-dcnode-id="2326" href="#Respiratory-Infections" title="Respiratory Infections"><span data-dcnode-id="2327" instrument_node="">Respiratory Infections</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2322"><a class="ez-toc-link ez-toc-heading-21" data-dcnode-id="2323" href="#Metabolic-Bone-Disease" title="Metabolic Bone Disease"><span data-dcnode-id="2324" instrument_node="">Metabolic Bone Disease</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2317"><a class="ez-toc-link ez-toc-heading-22" data-dcnode-id="2318" href="#Russian-Tortoise-Handling-Bonding-Tips" title="Russian Tortoise Handling &amp; Bonding Tips"><span data-dcnode-id="2319" instrument_node="">Russian Tortoise Handling &amp; Bonding Tips</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2314"><a class="ez-toc-link ez-toc-heading-23" data-dcnode-id="2315" href="#Is-a-Russian-Tortoise-Right-for-You" title="Is a Russian Tortoise Right for You?"><span data-dcnode-id="2316" instrument_node="">Is a Russian Tortoise Right for You?</span></a></li></ul></nav></div><span data-dcnode-id="2310" instrument_node="">
</span><h2 data-dcnode-id="2305"><span class="ez-toc-section" data-dcnode-id="2309" id="Russian-Tortoise-Background-Information"></span><b data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">Russian Tortoise Background Information</span></b><span class="ez-toc-section-end" data-dcnode-id="2306"></span></h2><span data-dcnode-id="2304" instrument_node="">
</span><figure aria-describedby="caption-attachment-5502" class="wp-caption aligncenter" data-dcnode-id="2298" id="attachment_5502" style="width: 565px"><img alt="Russian Tortoise Background Information" class="wp-image-5502 size-full" data-dcnode-id="2303" data-lazy-sizes="(max-width: 575px) 100vw, 575px" data-lazy-src="https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Background-Information.jpg" data-lazy-srcset="https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Background-Information.jpg 575w, https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Background-Information-300x184.jpg 300w" height="353" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20575%20353'%3E%3C/svg%3E" width="575"><noscript data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">&lt;img class="wp-image-5502 size-full" src="https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Background-Information.jpg" alt="Russian Tortoise Background Information" width="575" height="353" srcset="https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Background-Information.jpg 575w, https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Background-Information-300x184.jpg 300w" sizes="(max-width: 575px) 100vw, 575px" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="2299" id="caption-attachment-5502"><span data-dcnode-id="2300" instrument_node="">As avid diggers, you can expect your Russian tortoise to create burrows to hang out in during much of the day, especially when it’s hot. You’ll most likely see your tortoise come out and be active at dusk and dawn.</span></figcaption></figure><span data-dcnode-id="2297" instrument_node="">
</span><p data-dcnode-id="2291"><span data-dcnode-id="2292" style="font-weight: 400;"><span data-dcnode-id="2296" instrument_node="">Russian tortoises are common pet reptiles </span><strong data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">native to Central Asia, particularly Russia, China, Pakistan, and Iran</span></strong><span data-dcnode-id="2293" instrument_node="">. </span></span></p><span data-dcnode-id="2290" instrument_node="">
</span><blockquote data-dcnode-id="2279"><span data-dcnode-id="2289" instrument_node="">
</span><p data-dcnode-id="2281"><span data-dcnode-id="2284" style="font-weight: 400;"><span data-dcnode-id="2288" instrument_node="">Though numerous as pets and breeders around the world, Russian tortoises are actually </span><strong data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">nearing extinction in their native habitat.</span></strong><span data-dcnode-id="2285" instrument_node=""> </span></span><span data-dcnode-id="2282" style="font-weight: 400;"><span data-dcnode-id="2283" instrument_node="">Despite being such a common pet, they have not become an invasive species outside their native homeland, likely due to their specific habitat needs, which are difficult to find elsewhere. </span></span></p><span data-dcnode-id="2280" instrument_node="">
</span></blockquote><span data-dcnode-id="2278" instrument_node="">
</span><p data-dcnode-id="2275"><span data-dcnode-id="2276" style="font-weight: 400;"><span data-dcnode-id="2277" instrument_node="">Besides the moniker “Russian tortoise,” they have a number of other common names, including Afghan tortoise, steppe tortoise, Horsfield’s tortoise, and Central Asian tortoise.&nbsp;</span></span></p><span data-dcnode-id="2274" instrument_node="">
</span><p data-dcnode-id="2268"><span data-dcnode-id="2269" style="font-weight: 400;"><span data-dcnode-id="2273" instrument_node="">Thriving in barren, arid environments with low rainfall, </span><strong data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Russian tortoises are commonly found in steppes, deserts, hillsides, and grasslands</span></strong><span data-dcnode-id="2270" instrument_node="">. </span></span></p><span data-dcnode-id="2267" instrument_node="">
</span><p data-dcnode-id="2264"><span data-dcnode-id="2265" style="font-weight: 400;"><span data-dcnode-id="2266" instrument_node="">In these harsh, arid environments, the weather can range from one extreme to the other, forcing the tortoises to retreat to their burrows for months at a time.&nbsp;</span></span></p><span data-dcnode-id="2263" instrument_node="">
</span><p data-dcnode-id="2255"><span data-dcnode-id="2256" style="font-weight: 400;"><strong data-dcnode-id="2258"><span data-dcnode-id="2262" instrument_node="">These tiny tortoises measure in at a length of 5 to 10 inches, with the </span><em data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">females</span></em><span data-dcnode-id="2259" instrument_node=""> of the species reaching the larger side of the range.</span></strong><span data-dcnode-id="2257" instrument_node=""> This larger size allows the female to hold a batch of eggs inside her body; each clutch will consist of up to five eggs. </span></span></p><span data-dcnode-id="2254" instrument_node="">
</span><p data-dcnode-id="2248"><span data-dcnode-id="2249" style="font-weight: 400;"><span data-dcnode-id="2253" instrument_node="">With proper care, these small reptiles </span><strong data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">can live up to 40 years</span></strong><span data-dcnode-id="2250" instrument_node="">, making them a long-term, but delightful, commitment.</span></span></p><span data-dcnode-id="2247" instrument_node="">
</span><p data-dcnode-id="2238"><span data-dcnode-id="2244" style="font-weight: 400;"><br data-dcnode-id="2246"><span data-dcnode-id="2245" instrument_node="">
</span></span><span data-dcnode-id="2239" style="font-weight: 400;"><span data-dcnode-id="2243" instrument_node="">The shell of a Russian tortoise is </span><em data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">usually</span></em><span data-dcnode-id="2240" instrument_node=""> a ruddy brown or black color, which lightens to yellow in between the scutes. The body is a straw-yellow or brown color, depending on the subspecies. </span></span></p><span data-dcnode-id="2237" instrument_node="">
</span><blockquote data-dcnode-id="2228"><span data-dcnode-id="2236" instrument_node="">
</span><p data-dcnode-id="2230"><span data-dcnode-id="2234" style="font-weight: 400;"><span data-dcnode-id="2235" instrument_node="">Another identifiable feature of the Russian tortoise is that it has four claws on each foot that are used for climbing and digging. This is a feature not always seen in other tortoises, so it’s a great method of distinguishing this species from others.</span></span><span data-dcnode-id="2231" style="font-weight: 400;"><br data-dcnode-id="2233"><span data-dcnode-id="2232" instrument_node="">
</span></span></p><span data-dcnode-id="2229" instrument_node="">
</span></blockquote><span data-dcnode-id="2227" instrument_node="">
</span><p data-dcnode-id="2219"><span data-dcnode-id="2220" style="font-weight: 400;"><span data-dcnode-id="2226" instrument_node="">Armed with the knowledge that a Russian tortoise makes an</span><a data-dcnode-id="2222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reptile.guide/pet-tortoise-species/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2223" style="text-decoration: underline;"><strong data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node=""> ideal pet for a beginner</span></strong></span></a><span data-dcnode-id="2221" instrument_node=""> or a lifelong reptile lover, be sure to set aside some cash BEFORE rushing into a tortoise purchase. </span></span></p><span data-dcnode-id="2218" instrument_node="">
</span><p data-dcnode-id="2209"><span data-dcnode-id="2210" style="font-weight: 400;"><span data-dcnode-id="2217" instrument_node="">These tiny tortoises </span><strong data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">can range from $75 to $200</span></strong><span data-dcnode-id="2214" instrument_node="">, depending on size, age, and sex. Additionally, </span><strong data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">creating the perfect enclosure may cost another $200 or more.</span></strong><span data-dcnode-id="2211" instrument_node=""> </span></span></p><span data-dcnode-id="2208" instrument_node="">
</span><p data-dcnode-id="2202"><span data-dcnode-id="2203" style="font-weight: 400;"><span data-dcnode-id="2207" instrument_node="">Fortunately, </span><strong data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">food costs are relatively minimal</span></strong><span data-dcnode-id="2204" instrument_node="">. Also, if you are able to chose a healthy tortoise as a pet, veterinary costs should be under $100 for a new pet check-up and necessary deworming or care. </span></span></p><span data-dcnode-id="2201" instrument_node="">
</span><p data-dcnode-id="2197"><span data-dcnode-id="2198" style="text-decoration: underline;"><strong data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">All in all, look at spending roughly $500 on your new pet and habitat set-up.&nbsp;</span></strong></span></p><span data-dcnode-id="2196" instrument_node="">
</span><p data-dcnode-id="2193"><span data-dcnode-id="2194" style="font-weight: 400;"><span data-dcnode-id="2195" instrument_node="">Once you’ve got money saved for your charming new tortoise? Well, it’s time to go shopping (see next section)!</span></span></p><span data-dcnode-id="2192" instrument_node="">
</span><p data-dcnode-id="2176" style="background-color: #cfecec; margin-left: 20px; margin-right: 20px; padding: 8px;"><span data-dcnode-id="2177" style="color: #000000; font-size: 14pt;"><strong data-dcnode-id="2189"><img alt="🔑" class="emoji" data-dcnode-id="2191" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f511.svg&amp;raw"><span data-dcnode-id="2190" instrument_node=""> Russian Tortoise Background Key Takeaways: </span></strong><span data-dcnode-id="2178" style="font-size: 12pt;"><span data-dcnode-id="2188" instrument_node="">Russian tortoises are native to the arid environments in Central Asia and </span><strong data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">grow to be 5-1o inches long, with females tending to be larger than males. </span></strong><span data-dcnode-id="2185" instrument_node="">When it comes to lifespan, </span><strong data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">a well cared for Russian tortoise can live up to 40 years! </span></strong><span data-dcnode-id="2182" instrument_node="">When shopping for a Russian tortoise, </span><strong data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">expect to spend around $500 at least</span></strong><span data-dcnode-id="2179" instrument_node=""> on your tortoise and their tank setup.&nbsp;</span></span></span></p><span data-dcnode-id="2175" instrument_node="">
</span><h2 data-dcnode-id="2170"><span class="ez-toc-section" data-dcnode-id="2174" id="Where-to-Buy-a-Russian-Tortoise"></span><b data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">Where to Buy a Russian Tortoise</span></b><span class="ez-toc-section-end" data-dcnode-id="2171"></span></h2><span data-dcnode-id="2169" instrument_node="">
</span><figure aria-describedby="caption-attachment-5503" class="wp-caption aligncenter" data-dcnode-id="2163" id="attachment_5503" style="width: 565px"><img alt="Where to Buy Russian Tortoise" class="wp-image-5503 size-full" data-dcnode-id="2168" data-lazy-sizes="(max-width: 575px) 100vw, 575px" data-lazy-src="https://reptile.guide/wp-content/uploads/2020/07/Where-to-Buy-Russian-Tortoise.jpg" data-lazy-srcset="https://reptile.guide/wp-content/uploads/2020/07/Where-to-Buy-Russian-Tortoise.jpg 575w, https://reptile.guide/wp-content/uploads/2020/07/Where-to-Buy-Russian-Tortoise-300x186.jpg 300w" height="356" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20575%20356'%3E%3C/svg%3E" width="575"><noscript data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">&lt;img loading="lazy" class="wp-image-5503 size-full" src="https://reptile.guide/wp-content/uploads/2020/07/Where-to-Buy-Russian-Tortoise.jpg" alt="Where to Buy Russian Tortoise" width="575" height="356" srcset="https://reptile.guide/wp-content/uploads/2020/07/Where-to-Buy-Russian-Tortoise.jpg 575w, https://reptile.guide/wp-content/uploads/2020/07/Where-to-Buy-Russian-Tortoise-300x186.jpg 300w" sizes="(max-width: 575px) 100vw, 575px" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="2164" id="caption-attachment-5503"><span data-dcnode-id="2165" instrument_node="">Just as with other reptile species, your best bet at getting a healthy pet is to find a private breeder. Small mom and pop style pet stores are also good choices, but you’d be hard pressed to find one as knowledgable on the tortoises as a private breeder who can provide a wealth of knowledge and advice to first time owners.</span></figcaption></figure><span data-dcnode-id="2162" instrument_node="">
</span><p data-dcnode-id="2153"><span data-dcnode-id="2154" style="font-weight: 400;"><span data-dcnode-id="2161" instrument_node="">The </span><em data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">MOST common</span></em><span data-dcnode-id="2158" instrument_node=""> place to buy a Russian tortoise is at a pet shop; however, it may not be your </span><em data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">best</span></em><span data-dcnode-id="2155" instrument_node=""> choice. </span></span></p><span data-dcnode-id="2152" instrument_node="">
</span><p data-dcnode-id="2147"><span data-dcnode-id="2148" style="font-weight: 400;"><strong data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">When searching for a pet shop, don’t choose one simply because they carry Russian tortoises!</span></strong><span data-dcnode-id="2149" instrument_node=""> First, look around the entire store, taking a good whiff when you walk in the door. </span></span></p><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2141"><span data-dcnode-id="2142" style="font-weight: 400;"><em data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">Does it smell and look clean?</span></em><span data-dcnode-id="2143" instrument_node=""> </span></span></p><span data-dcnode-id="2140" instrument_node="">
</span><p data-dcnode-id="2134"><span data-dcnode-id="2135" style="font-weight: 400;"><span data-dcnode-id="2139" instrument_node="">Next, make a quick stop at the fish tanks. </span><em data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">Do the fish appear healthy, or are dead fish floating in the tanks?</span></em><span data-dcnode-id="2136" instrument_node=""> </span></span></p><span data-dcnode-id="2133" instrument_node="">
</span><p data-dcnode-id="2130"><strong data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">Peruse the exotic pet section, checking for cleanliness and the apparent health of the animals. Discuss the care and husbandry required of Russian tortoises with the pet store staff. </span></strong></p><span data-dcnode-id="2129" instrument_node="">
</span><blockquote data-dcnode-id="2123"><span data-dcnode-id="2128" instrument_node="">
</span><p data-dcnode-id="2125"><span data-dcnode-id="2126" style="font-weight: 400;"><span data-dcnode-id="2127" instrument_node="">While many pet stores, especially chain stores, are NOT the most knowledgeable about the creatures in their care, small, family-owned pet stores can be a wonderful resource for information and pet supplies in the future. These types of pet stores are the best sort from which to purchase your new tortoise.</span></span></p><span data-dcnode-id="2124" instrument_node="">
</span></blockquote><span data-dcnode-id="2122" instrument_node="">
</span><p data-dcnode-id="2114"><span data-dcnode-id="2115" style="font-weight: 400;"><strong data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">Another popular option for purchasing tortoises are reptile expos</span></strong><span data-dcnode-id="2119" instrument_node="">. Many large cities have monthly shows with a wide variety of vendors selling live animals and supplies. </span><em data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Unfortunately</span></em><span data-dcnode-id="2116" instrument_node="">, you may run into the same issue here that you might as pet stores…</span></span></p><span data-dcnode-id="2113" instrument_node="">
</span><p data-dcnode-id="2108"><span data-dcnode-id="2109" style="font-weight: 400;"><strong data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">Some vendors CLEARLY know their stuff, while others have little knowledge about their pets or supplies.</span></strong><span data-dcnode-id="2110" instrument_node=""> </span></span></p><span data-dcnode-id="2107" instrument_node="">
</span><p data-dcnode-id="2102"><span data-dcnode-id="2103" style="font-weight: 400;"><em data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">Another</span></em><span data-dcnode-id="2104" instrument_node=""> drawback to reptile expos are the close housing quarters with other species, which can lead to cross-contamination or health problems. </span></span></p><span data-dcnode-id="2101" instrument_node="">
</span><p data-dcnode-id="2089"><strong data-dcnode-id="2090"><span data-dcnode-id="2100" instrument_node="">If you’re a </span><em data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">first-time</span></em><span data-dcnode-id="2097" instrument_node=""> tortoise owner, a reptile expo </span><em data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">may not</span></em><span data-dcnode-id="2094" instrument_node=""> be the best place to purchase your new pet. However, it can be a </span><em data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">wonderful</span></em><span data-dcnode-id="2091" instrument_node=""> way to check out different breeders and see reptiles in person before making an online purchase.</span></strong></p><span data-dcnode-id="2088" instrument_node="">
</span><p data-dcnode-id="2083"><span data-dcnode-id="2084" style="font-weight: 400;"><strong data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">Some of the most knowledgeable breeders can be found online. </span></strong><span data-dcnode-id="2085" instrument_node="">Many of &nbsp;these reputable breeders will even offer a health guarantee when purchasing one of their animals. </span></span></p><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2076"><span data-dcnode-id="2077" style="font-weight: 400;"><span data-dcnode-id="2081" instrument_node="">The </span><em data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">only</span></em><span data-dcnode-id="2078" instrument_node=""> downside to purchasing a tortoise online is that you cannot see the animal in person first.&nbsp;</span></span></p><span data-dcnode-id="2075" instrument_node="">
</span><h3 data-dcnode-id="2070"><span class="ez-toc-section" data-dcnode-id="2074" id="How-to-Choose-a-Healthy-Russian-Tortoise"></span><strong data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">How to Choose a Healthy Russian Tortoise</span></strong><span class="ez-toc-section-end" data-dcnode-id="2071"></span></h3><span data-dcnode-id="2069" instrument_node="">
</span><p data-dcnode-id="2066"><span data-dcnode-id="2067" style="font-weight: 400;"><span data-dcnode-id="2068" instrument_node="">When picking out your new pet, keep a few factors in mind to ensure you purchase a healthy animal. </span></span></p><span data-dcnode-id="2065" instrument_node="">
</span><p data-dcnode-id="2060"><span data-dcnode-id="2061" style="color: #ff0000;"><em data-dcnode-id="2062"><strong data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">Check the following criteria when inspecting your potential new tortoise:</span></strong></em></span></p><span data-dcnode-id="2059" instrument_node="">
</span><ul data-dcnode-id="2021"><span data-dcnode-id="2058" instrument_node="">
</span><li data-dcnode-id="2055" style="font-weight: 400;"><span data-dcnode-id="2056" style="font-weight: 400;"><span data-dcnode-id="2057" instrument_node="">Is the tortoise active?</span></span></li><span data-dcnode-id="2054" instrument_node="">
</span><li data-dcnode-id="2051" style="font-weight: 400;"><span data-dcnode-id="2052" style="font-weight: 400;"><span data-dcnode-id="2053" instrument_node="">Does the tortoise feel like an empty shell when held?</span></span></li><span data-dcnode-id="2050" instrument_node="">
</span><li data-dcnode-id="2047" style="font-weight: 400;"><span data-dcnode-id="2048" style="font-weight: 400;"><span data-dcnode-id="2049" instrument_node="">Do you hear any raspy or gurgling sounds when listening to the tortoise breathe?</span></span></li><span data-dcnode-id="2046" instrument_node="">
</span><li data-dcnode-id="2043" style="font-weight: 400;"><span data-dcnode-id="2044" style="font-weight: 400;"><span data-dcnode-id="2045" instrument_node="">Is the shell relatively smooth or lumpy?</span></span></li><span data-dcnode-id="2042" instrument_node="">
</span><li data-dcnode-id="2039" style="font-weight: 400;"><span data-dcnode-id="2040" style="font-weight: 400;"><span data-dcnode-id="2041" instrument_node="">Does the shell have any white spots, soft areas, or spots with a foul odor?</span></span></li><span data-dcnode-id="2038" instrument_node="">
</span><li data-dcnode-id="2035" style="font-weight: 400;"><span data-dcnode-id="2036" style="font-weight: 400;"><span data-dcnode-id="2037" instrument_node="">Are the eyes a shiny, clear black? Or, are they dull, sunken, or full of mucus?</span></span></li><span data-dcnode-id="2034" instrument_node="">
</span><li data-dcnode-id="2031" style="font-weight: 400;"><span data-dcnode-id="2032" style="font-weight: 400;"><span data-dcnode-id="2033" instrument_node="">Is the nose dry and clean, or are there bubbles or a mucus plug?</span></span></li><span data-dcnode-id="2030" instrument_node="">
</span><li data-dcnode-id="2027" style="font-weight: 400;"><span data-dcnode-id="2028" style="font-weight: 400;"><span data-dcnode-id="2029" instrument_node="">Are the toenails overgrown?</span></span></li><span data-dcnode-id="2026" instrument_node="">
</span><li data-dcnode-id="2023" style="font-weight: 400;"><span data-dcnode-id="2024" style="font-weight: 400;"><span data-dcnode-id="2025" instrument_node="">Is the tail clean and dry, or caked with feces?</span></span></li><span data-dcnode-id="2022" instrument_node="">
</span></ul><span data-dcnode-id="2020" instrument_node="">
</span><p data-dcnode-id="2017"><strong data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">If you’re at all unsure about the health of a potential new pet, avoid jumping into an impulse purchase and wait to find a healthy animal instead.&nbsp;</span></strong></p><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="1997" style="background-color: #cfecec; margin-left: 20px; margin-right: 20px; padding: 8px;"><span data-dcnode-id="1998" style="color: #000000; font-size: 14pt;"><strong data-dcnode-id="2013"><img alt="🔑" class="emoji" data-dcnode-id="2015" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f511.svg&amp;raw"><span data-dcnode-id="2014" instrument_node=""> Russian Tortoise Purchasing Key Takeaways: </span></strong><span data-dcnode-id="1999" style="font-size: 12pt;"><span data-dcnode-id="2012" instrument_node="">When looking to purchase a Russian tortoise, you’ll essentially have 3 options: Chain pet store, private breeder, pet expo, or mom and pop pet shop. Don’t be afraid to </span><strong data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">be highly critical of chains and expos</span></strong><span data-dcnode-id="2009" instrument_node=""> alike. </span><strong data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">Ideally, you’d find a private breeder as they tend to raise the healthiest tortoises. </span></strong><span data-dcnode-id="2006" instrument_node="">When picking a tortoise out, be sure to</span><strong data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node=""> examine its shell, breathing, face, toenails, tail, and activity level </span></strong><span data-dcnode-id="2003" instrument_node="">to </span><em data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">BEST</span></em><span data-dcnode-id="2000" instrument_node=""> gage its overall health.&nbsp;</span></span></span></p><span data-dcnode-id="1996" instrument_node="">
</span><h2 data-dcnode-id="1991"><span class="ez-toc-section" data-dcnode-id="1995" id="Russian-Tortoise-Diet-and-Feeding-Guidelines"></span><b data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">Russian Tortoise Diet and Feeding Guidelines</span></b><span class="ez-toc-section-end" data-dcnode-id="1992"></span></h2><span data-dcnode-id="1990" instrument_node="">
</span><figure aria-describedby="caption-attachment-5504" class="wp-caption aligncenter" data-dcnode-id="1984" id="attachment_5504" style="width: 565px"><img alt="Russian Tortoise Diet and Feeding Guidelines" class="wp-image-5504 size-full" data-dcnode-id="1989" data-lazy-sizes="(max-width: 575px) 100vw, 575px" data-lazy-src="https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Diet-and-Feeding-Guidelines.jpg" data-lazy-srcset="https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Diet-and-Feeding-Guidelines.jpg 575w, https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Diet-and-Feeding-Guidelines-300x185.jpg 300w" height="354" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20575%20354'%3E%3C/svg%3E" width="575"><noscript data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">&lt;img loading="lazy" class="wp-image-5504 size-full" src="https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Diet-and-Feeding-Guidelines.jpg" alt="Russian Tortoise Diet and Feeding Guidelines" width="575" height="354" srcset="https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Diet-and-Feeding-Guidelines.jpg 575w, https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Diet-and-Feeding-Guidelines-300x185.jpg 300w" sizes="(max-width: 575px) 100vw, 575px" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="1985" id="caption-attachment-5504"><span data-dcnode-id="1986" instrument_node="">Although Russian tortoises love pretty much anything green, they can become picky eaters if offered the same thing day in and day out. As such, you’ll want to really mix up their diet frequently. Try to change the base of their food every couple of days. For instance, maybe for 2-3 days the base is predominantly spring mix with other veggies as toppings then it changes to mustard greens, and so on.</span></figcaption></figure><span data-dcnode-id="1983" instrument_node="">
</span><p data-dcnode-id="1978"><span data-dcnode-id="1979" style="font-weight: 400;"><strong data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">The Russian tortoise is a grazing animal</span></strong><span data-dcnode-id="1980" instrument_node="">, and they display these natural behaviors by eating large amounts of weeds, leaves, and flowers before returning to hibernation. </span></span></p><span data-dcnode-id="1977" instrument_node="">
</span><p data-dcnode-id="1974"><strong data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">This tortoise hibernates in the cold months and it may also aestivate because it is uncomfortable in high temperatures. </span></strong></p><span data-dcnode-id="1973" instrument_node="">
</span><p data-dcnode-id="1964"><span data-dcnode-id="1965" style="font-weight: 400;"><span data-dcnode-id="1972" instrument_node="">The term </span><em data-dcnode-id="1967"><a data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aestivation" onclick="javascript:window.open('https://en.wikipedia.org/wiki/Aestivation', '_blank', 'noopener'); return false;" rel="noopener noreferrer nofollow"><span data-dcnode-id="1969" style="text-decoration: underline;"><strong data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">aestivation</span></strong></span></a></em><span data-dcnode-id="1966" instrument_node=""> refers to a semi-conscious sleeping period during the summer, while the term hibernation refers to a semi-conscious sleeping period during the winter.</span></span></p><span data-dcnode-id="1963" instrument_node="">
</span><h3 data-dcnode-id="1958"><span class="ez-toc-section" data-dcnode-id="1962" id="What-Do-Russian-Tortoises-Eat"></span><b data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">What Do Russian Tortoises Eat?</span></b><span class="ez-toc-section-end" data-dcnode-id="1959"></span></h3><span data-dcnode-id="1957" instrument_node="">
</span><p data-dcnode-id="1951"><span data-dcnode-id="1952" style="font-weight: 400;"><span data-dcnode-id="1956" instrument_node="">As grazers, Russian tortoises enjoy broad-leaf plants, and dandelion is a favorite. </span><span data-dcnode-id="1953" style="text-decoration: underline;"><strong data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">When purchasing foods at the grocery store, all foods should ideally be organic and pesticide-free. </span></strong></span></span></p><span data-dcnode-id="1950" instrument_node="">
</span><p data-dcnode-id="1945"><span data-dcnode-id="1946" style="color: #ff0000;"><em data-dcnode-id="1947"><strong data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">Your tortoise may delight in munching on the following fresh foods:</span></strong></em></span></p><span data-dcnode-id="1944" instrument_node="">
</span><ul data-dcnode-id="1894"><span data-dcnode-id="1943" instrument_node="">
</span><li data-dcnode-id="1940" style="font-weight: 400;"><span data-dcnode-id="1941" style="font-weight: 400;"><span data-dcnode-id="1942" instrument_node="">Romaine lettuce (fed on occasion)</span></span></li><span data-dcnode-id="1939" instrument_node="">
</span><li data-dcnode-id="1936" style="font-weight: 400;"><span data-dcnode-id="1937" style="font-weight: 400;"><span data-dcnode-id="1938" instrument_node="">Red and green leaf lettuce (fed on occasion)</span></span></li><span data-dcnode-id="1935" instrument_node="">
</span><li data-dcnode-id="1932" style="font-weight: 400;"><span data-dcnode-id="1933" style="font-weight: 400;"><span data-dcnode-id="1934" instrument_node="">Endive</span></span></li><span data-dcnode-id="1931" instrument_node="">
</span><li data-dcnode-id="1928" style="font-weight: 400;"><span data-dcnode-id="1929" style="font-weight: 400;"><span data-dcnode-id="1930" instrument_node="">Escarole</span></span></li><span data-dcnode-id="1927" instrument_node="">
</span><li data-dcnode-id="1924" style="font-weight: 400;"><span data-dcnode-id="1925" style="font-weight: 400;"><span data-dcnode-id="1926" instrument_node="">Radicchio</span></span></li><span data-dcnode-id="1923" instrument_node="">
</span><li data-dcnode-id="1920" style="font-weight: 400;"><span data-dcnode-id="1921" style="font-weight: 400;"><span data-dcnode-id="1922" instrument_node="">Chicory</span></span></li><span data-dcnode-id="1919" instrument_node="">
</span><li data-dcnode-id="1916" style="font-weight: 400;"><span data-dcnode-id="1917" style="font-weight: 400;"><span data-dcnode-id="1918" instrument_node="">Turnip greens</span></span></li><span data-dcnode-id="1915" instrument_node="">
</span><li data-dcnode-id="1912" style="font-weight: 400;"><span data-dcnode-id="1913" style="font-weight: 400;"><span data-dcnode-id="1914" instrument_node="">Mustard greens</span></span></li><span data-dcnode-id="1911" instrument_node="">
</span><li data-dcnode-id="1908" style="font-weight: 400;"><span data-dcnode-id="1909" style="font-weight: 400;"><span data-dcnode-id="1910" instrument_node="">Kale</span></span></li><span data-dcnode-id="1907" instrument_node="">
</span><li data-dcnode-id="1904" style="font-weight: 400;"><span data-dcnode-id="1905" style="font-weight: 400;"><span data-dcnode-id="1906" instrument_node="">Collards</span></span></li><span data-dcnode-id="1903" instrument_node="">
</span><li data-dcnode-id="1900" style="font-weight: 400;"><span data-dcnode-id="1901" style="font-weight: 400;"><span data-dcnode-id="1902" instrument_node="">Spring Mix (mixed salad greens)</span></span></li><span data-dcnode-id="1899" instrument_node="">
</span><li data-dcnode-id="1896" style="font-weight: 400;"><span data-dcnode-id="1897" style="font-weight: 400;"><span data-dcnode-id="1898" instrument_node="">Cabbage (fed on occasion)</span></span></li><span data-dcnode-id="1895" instrument_node="">
</span></ul><span data-dcnode-id="1893" instrument_node="">
</span><p data-dcnode-id="1887"><span data-dcnode-id="1888" style="font-weight: 400;"><span data-dcnode-id="1892" instrument_node="">Using </span><em data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">several vegetables</span></em><span data-dcnode-id="1889" instrument_node=""> is IDEAL in a Russian tortoise diet to provide as many vitamins and nutrients as possible. </span></span></p><span data-dcnode-id="1886" instrument_node="">
</span><p data-dcnode-id="1881"><span data-dcnode-id="1882" style="color: #ff0000;"><em data-dcnode-id="1883"><strong data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">Form the basis of your pet’s diet with the above greens, and supplement it with the following flowers:</span></strong></em></span></p><span data-dcnode-id="1880" instrument_node="">
</span><ul data-dcnode-id="1822"><span data-dcnode-id="1879" instrument_node="">
</span><li data-dcnode-id="1876" style="font-weight: 400;"><span data-dcnode-id="1877" style="font-weight: 400;"><span data-dcnode-id="1878" instrument_node="">Hibiscus&nbsp;</span></span></li><span data-dcnode-id="1875" instrument_node="">
</span><li data-dcnode-id="1872" style="font-weight: 400;"><span data-dcnode-id="1873" style="font-weight: 400;"><span data-dcnode-id="1874" instrument_node="">Hosta</span></span></li><span data-dcnode-id="1871" instrument_node="">
</span><li data-dcnode-id="1868" style="font-weight: 400;"><span data-dcnode-id="1869" style="font-weight: 400;"><span data-dcnode-id="1870" instrument_node="">Sedum</span></span></li><span data-dcnode-id="1867" instrument_node="">
</span><li data-dcnode-id="1864" style="font-weight: 400;"><span data-dcnode-id="1865" style="font-weight: 400;"><span data-dcnode-id="1866" instrument_node="">Mulberry leaves</span></span></li><span data-dcnode-id="1863" instrument_node="">
</span><li data-dcnode-id="1860" style="font-weight: 400;"><span data-dcnode-id="1861" style="font-weight: 400;"><span data-dcnode-id="1862" instrument_node="">Hen and Chicks</span></span></li><span data-dcnode-id="1859" instrument_node="">
</span><li data-dcnode-id="1856" style="font-weight: 400;"><span data-dcnode-id="1857" style="font-weight: 400;"><span data-dcnode-id="1858" instrument_node="">Ice Plants</span></span></li><span data-dcnode-id="1855" instrument_node="">
</span><li data-dcnode-id="1852" style="font-weight: 400;"><span data-dcnode-id="1853" style="font-weight: 400;"><span data-dcnode-id="1854" instrument_node="">Prickly pear flowers, fruit and pads&nbsp;</span></span></li><span data-dcnode-id="1851" instrument_node="">
</span><li data-dcnode-id="1848" style="font-weight: 400;"><span data-dcnode-id="1849" style="font-weight: 400;"><span data-dcnode-id="1850" instrument_node="">Dandelion</span></span></li><span data-dcnode-id="1847" instrument_node="">
</span><li data-dcnode-id="1844" style="font-weight: 400;"><span data-dcnode-id="1845" style="font-weight: 400;"><span data-dcnode-id="1846" instrument_node="">Mallow</span></span></li><span data-dcnode-id="1843" instrument_node="">
</span><li data-dcnode-id="1840" style="font-weight: 400;"><span data-dcnode-id="1841" style="font-weight: 400;"><span data-dcnode-id="1842" instrument_node="">Henbit</span></span></li><span data-dcnode-id="1839" instrument_node="">
</span><li data-dcnode-id="1836" style="font-weight: 400;"><span data-dcnode-id="1837" style="font-weight: 400;"><span data-dcnode-id="1838" instrument_node="">Rose&nbsp;</span></span></li><span data-dcnode-id="1835" instrument_node="">
</span><li data-dcnode-id="1832" style="font-weight: 400;"><span data-dcnode-id="1833" style="font-weight: 400;"><span data-dcnode-id="1834" instrument_node="">Chrysanthemum flowers</span></span></li><span data-dcnode-id="1831" instrument_node="">
</span><li data-dcnode-id="1828" style="font-weight: 400;"><span data-dcnode-id="1829" style="font-weight: 400;"><span data-dcnode-id="1830" instrument_node="">Cornflowers&nbsp;</span></span></li><span data-dcnode-id="1827" instrument_node="">
</span><li data-dcnode-id="1824" style="font-weight: 400;"><span data-dcnode-id="1825" style="font-weight: 400;"><span data-dcnode-id="1826" instrument_node="">Forsythia&nbsp;</span></span></li><span data-dcnode-id="1823" instrument_node="">
</span></ul><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1817" style="font-weight: 400;"><strong data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">If your tortoise lives indoors, consider growing your own leafy greens.</span></strong><span data-dcnode-id="1818" instrument_node=""> This ensures you’ll have a fresh supply of pesticide-free food for your tortoise. </span></span></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1811"><span data-dcnode-id="1812" style="text-decoration: underline;"><strong data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">Avoid feeding your tortoise meat, grains, and nutrient-deficient foods, such as iceberg lettuce. Fruit is another item to leave off your tortoise’s menu, as consumption of fruit can cause parasite blooms.&nbsp;</span></strong></span></p><span data-dcnode-id="1810" instrument_node="">
</span><h3 data-dcnode-id="1805"><span class="ez-toc-section" data-dcnode-id="1809" id="Russian-Tortoise-Supplements"></span><strong data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">Russian Tortoise Supplements</span></strong><span class="ez-toc-section-end" data-dcnode-id="1806"></span></h3><span data-dcnode-id="1804" instrument_node="">
</span><p data-dcnode-id="1798"><span data-dcnode-id="1799" style="font-weight: 400;"><span data-dcnode-id="1803" instrument_node="">For tortoises who</span><em data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node=""> do not</span></em><span data-dcnode-id="1800" instrument_node=""> have continued exposure to the sun, be sure to dust the food daily with a calcium supplement. </span></span></p><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1794"><span data-dcnode-id="1795" style="font-weight: 400;"><span data-dcnode-id="1796" instrument_node="">When it comes to a multi-vitamin supplement, you’ll want to use one that contains vitamin D3. This should be sprinkled on the food once or twice weekly.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="1793" instrument_node="">
</span><h3 data-dcnode-id="1788"><span class="ez-toc-section" data-dcnode-id="1792" id="Russian-Tortoise-Water-Needs"></span><strong data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Russian Tortoise Water Needs</span></strong><span class="ez-toc-section-end" data-dcnode-id="1789"></span></h3><span data-dcnode-id="1787" instrument_node="">
</span><p data-dcnode-id="1775"><span data-dcnode-id="1776" style="font-weight: 400;"><span data-dcnode-id="1786" instrument_node="">Being an arid species, </span><strong data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">much of a Russian tortoise’s water can be extracted from their food.</span></strong><span data-dcnode-id="1783" instrument_node=""> </span><em data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">However</span></em><span data-dcnode-id="1780" instrument_node="">, they still </span><strong data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">require a large, shallow pan of water.</span></strong><span data-dcnode-id="1777" instrument_node=""> </span></span></p><span data-dcnode-id="1774" instrument_node="">
</span><p data-dcnode-id="1771"><span data-dcnode-id="1772" style="font-weight: 400;"><span data-dcnode-id="1773" instrument_node="">They often use bodies of water to keep their eyes and nose clean, and to regulate body temperature. </span></span></p><span data-dcnode-id="1770" instrument_node="">
</span><blockquote data-dcnode-id="1764"><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1766"><span data-dcnode-id="1767" style="font-weight: 400;"><span data-dcnode-id="1768" instrument_node="">To satisfy the needs of your tortoise, provide a shallow pan that’s large enough to fit your pet comfortably. A good rule of thumb to follow when filling your tortoise’s water dish is that the water shouldn’t be any higher than the point where the carapace and plastron meet. </span></span></p><span data-dcnode-id="1765" instrument_node="">
</span></blockquote><span data-dcnode-id="1763" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1752" style="font-weight: 400;"><span data-dcnode-id="1762" instrument_node="">Tortoises </span><em data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">generally</span></em><span data-dcnode-id="1759" instrument_node=""> defecate and urinate while soaking in their tub, so </span><strong data-dcnode-id="1754"><span data-dcnode-id="1758" instrument_node="">change the water </span><em data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">frequently</span></em><span data-dcnode-id="1755" instrument_node=""> to keep it clean</span></strong><span data-dcnode-id="1753" instrument_node="">. </span></span></p><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1747"><strong data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Adults typically require a good soak once per week, while hatchlings need a daily soak.</span></strong></p><span data-dcnode-id="1746" instrument_node="">
</span><h3 data-dcnode-id="1741"><span class="ez-toc-section" data-dcnode-id="1745" id="How-Often-to-Feed-Your-Russian-Tortoise"></span><b data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">How Often to Feed Your Russian Tortoise</span></b><span class="ez-toc-section-end" data-dcnode-id="1742"></span></h3><span data-dcnode-id="1740" instrument_node="">
</span><p data-dcnode-id="1734"><span data-dcnode-id="1735" style="font-weight: 400;"><span data-dcnode-id="1739" instrument_node="">When feeding your tortoise, </span><strong data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">offer as much food as your pet can eat in 20 minutes ONCE per day</span></strong><span data-dcnode-id="1736" instrument_node="">. Remove any uneaten food after the 20-minute mark to avoid spoilage. </span></span></p><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1725"><span data-dcnode-id="1726" style="font-weight: 400;"><strong data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Outdoors, they can graze free-range and be fed small amounts of supplemental food daily.</span></strong><span data-dcnode-id="1730" instrument_node=""> Fresh hay is an EXCELLENT grazing option, </span><em data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">especially</span></em><span data-dcnode-id="1727" instrument_node=""> if your enclosure does not contain much in the way of weeds or flowers. </span></span></p><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1721"><strong data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">Timothy, orchard, and Bermuda hays work well for Russian tortoises.</span></strong></p><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1702" style="background-color: #cfecec; margin-left: 20px; margin-right: 20px; padding: 8px;"><span data-dcnode-id="1703" style="color: #000000; font-size: 14pt;"><strong data-dcnode-id="1717"><img alt="🔑" class="emoji" data-dcnode-id="1719" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f511.svg&amp;raw"><span data-dcnode-id="1718" instrument_node=""> Russian Tortoise Diet &amp; Feeding Key Takeaways: </span></strong><span data-dcnode-id="1704" style="font-size: 12pt;"><span data-dcnode-id="1716" instrument_node="">When it comes to a well balanced diet, Russian tortoises </span><strong data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">do best with a variety of different greens</span></strong><span data-dcnode-id="1713" instrument_node="">, as well as a calcium supplement and multi-vitamin. They also </span><strong data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">require a large, shallow water dish</span></strong><span data-dcnode-id="1710" instrument_node="">. You’ll need to </span><strong data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">feed you adult and baby tortoise once a day,</span></strong><span data-dcnode-id="1707" instrument_node=""> </span><strong data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">offer them as much as they can eat within 20 minutes.&nbsp;</span></strong></span></span></p><span data-dcnode-id="1701" instrument_node="">
</span><h2 data-dcnode-id="1696"><span class="ez-toc-section" data-dcnode-id="1700" id="Russian-Tortoise-Habitat-and-Tank-Setup"></span><b data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Russian Tortoise Habitat and Tank Setup</span></b><span class="ez-toc-section-end" data-dcnode-id="1697"></span></h2><span data-dcnode-id="1695" instrument_node="">
</span><figure aria-describedby="caption-attachment-5505" class="wp-caption aligncenter" data-dcnode-id="1689" id="attachment_5505" style="width: 565px"><img alt="Russian Tortoise Habitat and Tank Setup" class="wp-image-5505 size-full" data-dcnode-id="1694" data-lazy-sizes="(max-width: 575px) 100vw, 575px" data-lazy-src="https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Habitat-and-Tank-Setup.jpg" data-lazy-srcset="https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Habitat-and-Tank-Setup.jpg 575w, https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Habitat-and-Tank-Setup-300x185.jpg 300w" height="354" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20575%20354'%3E%3C/svg%3E" width="575"><noscript data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">&lt;img loading="lazy" class="wp-image-5505 size-full" src="https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Habitat-and-Tank-Setup.jpg" alt="Russian Tortoise Habitat and Tank Setup" width="575" height="354" srcset="https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Habitat-and-Tank-Setup.jpg 575w, https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Habitat-and-Tank-Setup-300x185.jpg 300w" sizes="(max-width: 575px) 100vw, 575px" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="1690" id="caption-attachment-5505"><span data-dcnode-id="1691" instrument_node="">Don’t let their stocky little bodies fool you, Russian tortoises can dig holes up to TWO meters deep! As such, you’ll need to be prepared for some pretty crafty escape artist antics, especially since they’re expert climbers as well.</span></figcaption></figure><span data-dcnode-id="1688" instrument_node="">
</span><h3 data-dcnode-id="1683"><span class="ez-toc-section" data-dcnode-id="1687" id="Size-of-the-Enclosure"></span><b data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Size of the Enclosure</span></b><span class="ez-toc-section-end" data-dcnode-id="1684"></span></h3><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1675" style="font-weight: 400;"><strong data-dcnode-id="1677"><span data-dcnode-id="1681" instrument_node="">Provide tortoises with the </span><em data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">LARGEST</span></em><span data-dcnode-id="1678" instrument_node=""> habitat that space allows</span></strong><span data-dcnode-id="1676" instrument_node="">, since free-ranging tortoises in their natural habitat utilize ranges measured by square miles. </span></span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1664"><span data-dcnode-id="1665" style="font-weight: 400;"><span data-dcnode-id="1672" instrument_node="">Regardless of whether they’re indoors or outside, </span><strong data-dcnode-id="1667"><span data-dcnode-id="1671" instrument_node="">pens should measure </span><em data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">at least</span></em><span data-dcnode-id="1668" instrument_node=""> 12 square feet. </span></strong><span data-dcnode-id="1666" instrument_node="">You’ll also want to increase pen size to accommodate each additional tortoise.</span></span></p><span data-dcnode-id="1663" instrument_node="">
</span><p data-dcnode-id="1648"><span data-dcnode-id="1662" instrument_node="">If you have your heart set on owning a Russia n tortoise but simply </span><em data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">don’t</span></em><span data-dcnode-id="1659" instrument_node=""> have the space, you may want to consider </span><a data-dcnode-id="1655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reptile.guide/red-eared-slider-care/%23RedEared-Slider-Turtle-Habitat-Tank-Setup" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1656" style="text-decoration: underline;"><strong data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">adopting a Red-Eared Slider</span></strong></span></a><span data-dcnode-id="1654" instrument_node=""> instead. Red-Eared Sliders, while </span><a data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reptile.guide/turtles-vs-tortoises/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1651" style="text-decoration: underline;"><strong data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">turtles and NOT tortoises</span></strong></span></a><span data-dcnode-id="1649" instrument_node="">, are great, hardy pet turtles.</span></p><span data-dcnode-id="1647" instrument_node="">
</span><h3 data-dcnode-id="1642"><span class="ez-toc-section" data-dcnode-id="1646" id="Type-of-Enclosures"></span><b data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Type of Enclosures&nbsp;</span></b><span class="ez-toc-section-end" data-dcnode-id="1643"></span></h3><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1633"><span data-dcnode-id="1634" style="font-weight: 400;"><strong data-dcnode-id="1636"><span data-dcnode-id="1640" instrument_node="">Depending on your </span><em data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">average</span></em><span data-dcnode-id="1637" instrument_node=""> temperature, your Russian tortoise will do well in an outdoor enclosure.</span></strong><span data-dcnode-id="1635" instrument_node=""> This can be landscaped with edible plants, while the outdoor environment also allows your tortoise to bask in the sun if it is not too hot. </span></span></p><span data-dcnode-id="1632" instrument_node="">
</span><blockquote data-dcnode-id="1623"><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1626" style="font-weight: 400;"><span data-dcnode-id="1630" instrument_node="">Outdoor pens are the </span><em data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">best</span></em><span data-dcnode-id="1627" instrument_node=""> option to keep your pet happy and healthy, providing the temperatures don’t dip much below 25 degrees Fahrenheit and insulated hide spots are offered. Tortoises also aestivate and need a space where they can retreat from the heat of a summer’s day.</span></span></p><span data-dcnode-id="1624" instrument_node="">
</span></blockquote><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1617"><span data-dcnode-id="1618" style="color: #ff0000;"><em data-dcnode-id="1619"><strong data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">The most common types of enclosures pet owners choose for their reptiles include:</span></strong></em></span></p><span data-dcnode-id="1616" instrument_node="">
</span><h4 data-dcnode-id="1613"><b data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Aquariums&nbsp;</span></b></h4><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1601"><b data-dcnode-id="1602"><span data-dcnode-id="1603" style="font-weight: 400;"><span data-dcnode-id="1611" instrument_node="">Aquariums are often recommended by pet shop employees, since they </span><em data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">generally don’t</span></em><span data-dcnode-id="1608" instrument_node=""> have the best knowledge about Russian tortoises. Unfortunately, </span><span data-dcnode-id="1605" style="text-decoration: underline;"><strong data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">these glass enclosures are unsuitable for tortoises because the air circulation is so poor</span></strong></span><span data-dcnode-id="1604" instrument_node="">, leading to inadequate ventilation caused by the aquarium’s shape. </span></span></b></p><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1593"><b data-dcnode-id="1594"><span data-dcnode-id="1595" style="font-weight: 400;"><span data-dcnode-id="1599" instrument_node="">Besides poor ventilation, </span><strong data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">the clear glass sides are also stressful to tortoises</span></strong><span data-dcnode-id="1596" instrument_node="">. They will continually try to escape through the glass and potentially cause injury to themselves. </span></span></b></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1579"><b data-dcnode-id="1580"><span data-dcnode-id="1581" style="font-weight: 400;"><span data-dcnode-id="1591" instrument_node="">If you </span><em data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">MUST</span></em><span data-dcnode-id="1588" instrument_node=""> use an aquarium to house your tortoise, </span><span data-dcnode-id="1586" style="text-decoration: underline;"><span data-dcnode-id="1587" instrument_node="">it must be a minimum of 75 gallons</span></span><span data-dcnode-id="1585" instrument_node=""> AND </span><span data-dcnode-id="1583" style="text-decoration: underline;"><span data-dcnode-id="1584" instrument_node="">outfitted with a circulating fan and visual barrier</span></span><span data-dcnode-id="1582" instrument_node="">.</span></span></b></p><span data-dcnode-id="1578" instrument_node="">
</span><h4 data-dcnode-id="1575"><b data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Rubbermaid Storage Containers&nbsp;</span></b></h4><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1561"><b data-dcnode-id="1562"><span data-dcnode-id="1563" style="font-weight: 400;"><span data-dcnode-id="1573" instrument_node="">An inexpensive indoor option, Rubbermaid storage containers are </span><strong data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">an ideal alternative to glass aquariums.</span></strong><span data-dcnode-id="1570" instrument_node=""> The 50-gallon container is a great </span><em data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">starting point</span></em><span data-dcnode-id="1567" instrument_node=""> for one tortoise, plus </span><strong data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">it’s light and easy to clean</span></strong><span data-dcnode-id="1564" instrument_node="">. </span></span></b></p><span data-dcnode-id="1560" instrument_node="">
</span><p data-dcnode-id="1556"><b data-dcnode-id="1557"><span data-dcnode-id="1558" style="font-weight: 400;"><span data-dcnode-id="1559" instrument_node="">An added benefit for your tortoise is that the sides are blessedly opaque, so your pet will not come to harm by attempting to escape.&nbsp;</span></span></b></p><span data-dcnode-id="1555" instrument_node="">
</span><h4 data-dcnode-id="1552"><b data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">Outdoor Pens&nbsp;</span></b></h4><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1545"><b data-dcnode-id="1546"><span data-dcnode-id="1547" style="font-weight: 400;"><strong data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Outdoor pens are by far the BEST option for a happy, healthy, thriving Russian tortoise</span></strong><span data-dcnode-id="1548" instrument_node="">. They get the benefit of sunshine, which is vital for the synthesis of vitamin D3, plus they get more exercise in larger outdoor pens. </span></span></b></p><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1540"><b data-dcnode-id="1541"><span data-dcnode-id="1542" style="font-weight: 400;"><span data-dcnode-id="1543" instrument_node="">A pen can also be sown with a variety of plants, flowers, and leafy greens, providing edible landscaping. </span></span></b></p><span data-dcnode-id="1539" instrument_node="">
</span><blockquote data-dcnode-id="1527"><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1529"><b data-dcnode-id="1535"><span data-dcnode-id="1536" style="font-weight: 400;"><span data-dcnode-id="1537" instrument_node="">While designing your tortoise’s outdoor pen, </span></span></b><span data-dcnode-id="1533" style="font-weight: 400;"><span data-dcnode-id="1534" instrument_node="">keep in mind these creatures are incredibly active and are master escape artists</span></span><b data-dcnode-id="1530"><span data-dcnode-id="1531" style="font-weight: 400;"><span data-dcnode-id="1532" instrument_node="">. They will try to sneak out of their enclosure by climbing or digging, so the pen must be high enough to defeat their climbing skills, plus have a fence that has been dug into the ground at least 8 to 12 inches deep. </span></span></b></p><span data-dcnode-id="1528" instrument_node="">
</span></blockquote><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1517"><b data-dcnode-id="1518"><span data-dcnode-id="1519" style="font-weight: 400;"><strong data-dcnode-id="1521"><span data-dcnode-id="1525" instrument_node="">If the tortoise can see something of interest on the other side, they </span><em data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">will</span></em><span data-dcnode-id="1522" instrument_node=""> try to dig out.</span></strong><span data-dcnode-id="1520" instrument_node=""> For extra security, place some large rocks along the edges of the fence. </span></span></b></p><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1509"><b data-dcnode-id="1510"><span data-dcnode-id="1511" style="font-weight: 400;"><span data-dcnode-id="1515" instrument_node="">Be sure to keep your tortoise safe from predators as well. </span><span data-dcnode-id="1512" style="text-decoration: underline;"><strong data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Consider using a secure, screened cover to keep out dogs, foxes, raccoons, and birds.</span></strong></span></span></b></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1506" style="font-weight: 400;"><span data-dcnode-id="1507" instrument_node="">No matter what sort of enclosure you choose for your Russian tortoise, ensure it is large enough to provide room to exercise, plus guarantee it is escape-proof.</span></span></p><span data-dcnode-id="1504" instrument_node="">
</span><h3 data-dcnode-id="1499"><span class="ez-toc-section" data-dcnode-id="1503" id="Ideal-Temperature-Gradient"></span><b data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Ideal Temperature Gradient</span></b><span class="ez-toc-section-end" data-dcnode-id="1500"></span></h3><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1494"><img alt="russian tortoise temperature and humidity" class="aligncenter wp-image-5510" data-dcnode-id="1497" data-lazy-sizes="(max-width: 576px) 100vw, 576px" data-lazy-src="https://reptile.guide/wp-content/uploads/2020/07/russian-tortoise-temperature-and-humidity.jpg" data-lazy-srcset="https://reptile.guide/wp-content/uploads/2020/07/russian-tortoise-temperature-and-humidity.jpg 1197w, https://reptile.guide/wp-content/uploads/2020/07/russian-tortoise-temperature-and-humidity-300x183.jpg 300w, https://reptile.guide/wp-content/uploads/2020/07/russian-tortoise-temperature-and-humidity-1024x624.jpg 1024w, https://reptile.guide/wp-content/uploads/2020/07/russian-tortoise-temperature-and-humidity-768x468.jpg 768w" height="351" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20576%20351'%3E%3C/svg%3E" width="576"><noscript data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">&lt;img loading="lazy" class="aligncenter  wp-image-5510" src="https://reptile.guide/wp-content/uploads/2020/07/russian-tortoise-temperature-and-humidity.jpg" alt="russian tortoise temperature and humidity" width="576" height="351" srcset="https://reptile.guide/wp-content/uploads/2020/07/russian-tortoise-temperature-and-humidity.jpg 1197w, https://reptile.guide/wp-content/uploads/2020/07/russian-tortoise-temperature-and-humidity-300x183.jpg 300w, https://reptile.guide/wp-content/uploads/2020/07/russian-tortoise-temperature-and-humidity-1024x624.jpg 1024w, https://reptile.guide/wp-content/uploads/2020/07/russian-tortoise-temperature-and-humidity-768x468.jpg 768w" sizes="(max-width: 576px) 100vw, 576px" /&gt;</span></noscript></p><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1487"><span data-dcnode-id="1488" style="font-weight: 400;"><span data-dcnode-id="1492" instrument_node="">When it comes to the correct temperature, an indoor tortoise enclosure should be fitted with</span><strong data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node=""> a basking area in which the temperature is approximately 90 to 95 degrees. Fahrenheit.</span></strong><span data-dcnode-id="1489" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1482" style="font-weight: 400;"><strong data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">The ambient temperature can range from 75 to 85 degrees during the day, while nighttime temperatures can drop to 60 degrees.</span></strong><span data-dcnode-id="1483" instrument_node=""> </span></span></p><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1467"><span data-dcnode-id="1468" style="font-weight: 400;"><em data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">However</span></em><span data-dcnode-id="1477" instrument_node="">, if the temperature drops too much, your tortoise will </span><em data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">NOT</span></em><span data-dcnode-id="1474" instrument_node=""> be able to digest food. </span><strong data-dcnode-id="1469"><span data-dcnode-id="1473" instrument_node="">If your outdoor climate </span><em data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">cannot</span></em><span data-dcnode-id="1470" instrument_node=""> maintain an ideal temperature year-round, you will also have to use an indoor enclosure for your pet. </span></strong></span></p><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1463"><span data-dcnode-id="1464" style="font-weight: 400;"><span data-dcnode-id="1465" instrument_node="">If this proves to be necessary, stick to providing the same temperatures to allow for a toasty basking area and a cooler side to aid in thermoregulation. </span></span></p><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1459"><strong data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Ceramic heat emitters and under-tank heaters may be used as primary sources of heat for indoor enclosures.</span></strong></p><span data-dcnode-id="1458" instrument_node="">
</span><h3 data-dcnode-id="1453"><span class="ez-toc-section" data-dcnode-id="1457" id="Lighting-Requirements"></span><b data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Lighting Requirements</span></b><span class="ez-toc-section-end" data-dcnode-id="1454"></span></h3><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1448" style="font-weight: 400;"><strong data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">A Russian tortoise will thrive in an environment which has 12 hours of light and an equivalent 12 hours of dark.</span></strong><span data-dcnode-id="1449" instrument_node=""> </span></span><span data-dcnode-id="1443" style="font-weight: 400;"><span data-dcnode-id="1447" instrument_node="">These equivalent periods of light and dark will keep the tortoise in peak condition, whereas </span><em data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">too much</span></em><span data-dcnode-id="1444" instrument_node=""> light and heat may cause aestivation. </span></span></p><span data-dcnode-id="1441" instrument_node="">
