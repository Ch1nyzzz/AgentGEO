</span><p data-dcnode-id="1434"><span data-dcnode-id="1435" style="font-weight: 400;"><strong data-dcnode-id="1437"><span data-dcnode-id="1440" instrument_node="">A full-spectrum lighting system with UVB rays is a </span><em data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">NECESSITY</span></em></strong><span data-dcnode-id="1436" instrument_node="">, so pick up UVB light bulbs when purchasing standard lighting. </span></span></p><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1429" style="font-weight: 400;"><strong data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">Tortoises need exposure to UVB rays for about 10 hours per day to remain healthy</span></strong><span data-dcnode-id="1430" instrument_node="">. </span></span><span data-dcnode-id="1427" style="font-weight: 400;"><span data-dcnode-id="1428" instrument_node="">If your tortoise is kept exclusively outdoors, there is no need for any additional lighting setup.&nbsp;</span></span></p><span data-dcnode-id="1425" instrument_node="">
</span><h3 data-dcnode-id="1420"><span class="ez-toc-section" data-dcnode-id="1424" id="Ideal-Humidity-Levels"></span><b data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Ideal Humidity Levels</span></b><span class="ez-toc-section-end" data-dcnode-id="1421"></span></h3><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1410"><span data-dcnode-id="1411" style="font-weight: 400;"><span data-dcnode-id="1418" instrument_node="">Humidity levels for Russian tortoises must be kept </span><em data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">relatively low</span></em><span data-dcnode-id="1415" instrument_node="">. </span><strong data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">An ideal humidity level runs between 40% and 50%</span></strong><span data-dcnode-id="1412" instrument_node=""> to keep your tortoise in tip-top shape. </span></span></p><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1401" style="font-weight: 400;"><span data-dcnode-id="1408" instrument_node="">Whether your tortoise is in an indoor habitat or an outdoor enclosure,</span><strong data-dcnode-id="1403"><span data-dcnode-id="1407" instrument_node=""> keep a </span><em data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">close eye</span></em><span data-dcnode-id="1404" instrument_node=""> on humidity levels with the aid of a hygrometer</span></strong><span data-dcnode-id="1402" instrument_node="">. Incorrect humidity levels can lead to a variety of health issues.&nbsp;</span></span></p><span data-dcnode-id="1399" instrument_node="">
</span><h3 data-dcnode-id="1394"><span class="ez-toc-section" data-dcnode-id="1398" id="Substrate"></span><b data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Substrate&nbsp;</span></b><span class="ez-toc-section-end" data-dcnode-id="1395"></span></h3><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1382" style="font-weight: 400;"><span data-dcnode-id="1392" instrument_node="">To promote digging and burrowing, </span><strong data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">use a loose substrate in your Russian tortoise’s enclosure.</span></strong><span data-dcnode-id="1389" instrument_node=""> The </span><em data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">IDEAL</span></em><span data-dcnode-id="1386" instrument_node=""> substrate is considered to be a </span><strong data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">mix of sand and garden loam</span></strong><span data-dcnode-id="1383" instrument_node="">. </span></span></p><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1375"><span data-dcnode-id="1376" style="color: #ff0000;"><strong data-dcnode-id="1377"><em data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">However, if you would prefer not to use the above mixture, you can also use:</span></em></strong></span></p><span data-dcnode-id="1374" instrument_node="">
</span><ul data-dcnode-id="1356"><span data-dcnode-id="1373" instrument_node="">
</span><li data-dcnode-id="1370"><span data-dcnode-id="1371" style="font-weight: 400;"><span data-dcnode-id="1372" instrument_node="">Cypress mulch</span></span></li><span data-dcnode-id="1369" instrument_node="">
</span><li data-dcnode-id="1366"><span data-dcnode-id="1367" style="font-weight: 400;"><span data-dcnode-id="1368" instrument_node="">Coconut fiber</span></span></li><span data-dcnode-id="1365" instrument_node="">
</span><li data-dcnode-id="1362"><span data-dcnode-id="1363" style="font-weight: 400;"><span data-dcnode-id="1364" instrument_node="">Peat moss</span></span></li><span data-dcnode-id="1361" instrument_node="">
</span><li data-dcnode-id="1358"><span data-dcnode-id="1359" style="font-weight: 400;"><span data-dcnode-id="1360" instrument_node="">Shredded paper&nbsp;</span></span></li><span data-dcnode-id="1357" instrument_node="">
</span></ul><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1352"><span data-dcnode-id="1353" style="font-weight: 400;"><span data-dcnode-id="1354" instrument_node="">The substrate should be deep enough for your tortoise to burrow, so this depth can range from 10 inches to 3 feet.&nbsp;</span></span></p><span data-dcnode-id="1351" instrument_node="">
</span><h3 data-dcnode-id="1346"><span class="ez-toc-section" data-dcnode-id="1350" id="Decor-and-Accessories"></span><b data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Decor and Accessories&nbsp;</span></b><span class="ez-toc-section-end" data-dcnode-id="1347"></span></h3><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1337"><span data-dcnode-id="1338" style="font-weight: 400;"><strong data-dcnode-id="1340"><span data-dcnode-id="1344" instrument_node="">Russian tortoises do </span><em data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">best</span></em><span data-dcnode-id="1341" instrument_node=""> in outdoor environments with plenty of grasses and plants for grazing, such as Bermuda, rye, and fescue grass.</span></strong><span data-dcnode-id="1339" instrument_node=""> </span></span></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1330"><span data-dcnode-id="1331" style="font-weight: 400;"><span data-dcnode-id="1335" instrument_node="">Other plants are also a </span><em data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">GREAT</span></em><span data-dcnode-id="1332" instrument_node=""> addition to your tortoise’s pen. They provide some enrichment while also creating shade. </span></span></p><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" style="color: #ff0000;"><em data-dcnode-id="1326"><strong data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Some excellent choices for additional plants in your tortoises’s enclosure include:</span></strong></em></span></p><span data-dcnode-id="1323" instrument_node="">
</span><ul data-dcnode-id="1305"><span data-dcnode-id="1322" instrument_node="">
</span><li data-dcnode-id="1319"><span data-dcnode-id="1320" style="font-weight: 400;"><span data-dcnode-id="1321" instrument_node="">Prickly pears</span></span></li><span data-dcnode-id="1318" instrument_node="">
</span><li data-dcnode-id="1315"><span data-dcnode-id="1316" style="font-weight: 400;"><span data-dcnode-id="1317" instrument_node="">Bristle brushes</span></span></li><span data-dcnode-id="1314" instrument_node="">
</span><li data-dcnode-id="1311"><span data-dcnode-id="1312" style="font-weight: 400;"><span data-dcnode-id="1313" instrument_node="">Desert sage</span></span></li><span data-dcnode-id="1310" instrument_node="">
</span><li data-dcnode-id="1307"><span data-dcnode-id="1308" style="font-weight: 400;"><span data-dcnode-id="1309" instrument_node="">Large palo verde trees </span></span></li><span data-dcnode-id="1306" instrument_node="">
</span></ul><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1299" style="font-weight: 400;"><span data-dcnode-id="1303" instrument_node="">If you can’t find these plants, or they don’t grow well in your area, </span><strong data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">any non-toxic native plants will do</span></strong><span data-dcnode-id="1300" instrument_node="">.</span></span></p><span data-dcnode-id="1297" instrument_node="">
</span><blockquote data-dcnode-id="1282"><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1287" style="font-weight: 400;"><span data-dcnode-id="1295" instrument_node="">Hide boxes made of wood are </span><em data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">ALSO</span></em><span data-dcnode-id="1292" instrument_node=""> necessary for keeping your tortoise happy and healthy. </span><span data-dcnode-id="1289" style="text-decoration: underline;"><strong data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Offer several hide boxes, pointing in different directions in your outdoor tortoise enclosure.</span></strong></span><span data-dcnode-id="1288" instrument_node=""> </span></span><span data-dcnode-id="1285" style="font-weight: 400;"><span data-dcnode-id="1286" instrument_node="">Various directions allow your pet to either seek solace from the sun or conserve warmth as needed.&nbsp;</span></span></p><span data-dcnode-id="1283" instrument_node="">
</span></blockquote><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" style="font-weight: 400;"><span data-dcnode-id="1280" instrument_node="">To keep your tortoise entertained in the pen, add some flat rocks. Although you </span><em data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">wouldn’t</span></em><span data-dcnode-id="1277" instrument_node=""> think so, </span><strong data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Russian tortoises are skilled climbers and enjoy rambling over rock formations.</span></strong></span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1248" style="background-color: #cfecec; margin-left: 20px; margin-right: 20px; padding: 8px;"><span data-dcnode-id="1249" style="color: #000000; font-size: 14pt;"><strong data-dcnode-id="1269"><img alt="🔑" class="emoji" data-dcnode-id="1271" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f511.svg&amp;raw"><span data-dcnode-id="1270" instrument_node=""> Russian Tortoise Habitat &amp; Tank Setup Key Takeaways: </span></strong><span data-dcnode-id="1250" style="font-size: 12pt;"><strong data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">When it comes to enclosure size, bigger IS always better.</span></strong><span data-dcnode-id="1266" instrument_node=""> But if you’re short on space, </span><strong data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">aim to offer at minimum a pen that measures 12 square feet</span></strong><span data-dcnode-id="1263" instrument_node="">.</span><strong data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">&nbsp;Always offer multiple hide boxes, </span></strong><span data-dcnode-id="1260" instrument_node="">use a loose substrate, and ensure your tortoise has access to 10 hours of UVB. </span><strong data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Aim for a basking spot in the low 90s degrees Fahrenheit</span></strong><span data-dcnode-id="1257" instrument_node="">, with </span><strong data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">ambient temps around 80 </span></strong><span data-dcnode-id="1254" instrument_node="">and a </span><strong data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">humidity level no higher than 50%. </span></strong><span data-dcnode-id="1251" instrument_node="">Your tortoise can be housed outdoors year long unless the lows get below 60 degrees, in which case they should be brought inside.</span></span></span></p><span data-dcnode-id="1247" instrument_node="">
</span><h2 data-dcnode-id="1242"><span class="ez-toc-section" data-dcnode-id="1246" id="Russian-Tortoise-General-Health-Information"></span><b data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Russian Tortoise General Health Information&nbsp;</span></b><span class="ez-toc-section-end" data-dcnode-id="1243"></span></h2><span data-dcnode-id="1241" instrument_node="">
</span><figure aria-describedby="caption-attachment-5507" class="wp-caption aligncenter" data-dcnode-id="1235" id="attachment_5507" style="width: 565px"><img alt="Russian Tortoise Health Information" class="wp-image-5507 size-full" data-dcnode-id="1240" data-lazy-sizes="(max-width: 575px) 100vw, 575px" data-lazy-src="https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Health-Information.jpg" data-lazy-srcset="https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Health-Information.jpg 575w, https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Health-Information-300x186.jpg 300w" height="357" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20575%20357'%3E%3C/svg%3E" width="575"><noscript data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">&lt;img loading="lazy" class="wp-image-5507 size-full" src="https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Health-Information.jpg" alt="Russian Tortoise Health Information" width="575" height="357" srcset="https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Health-Information.jpg 575w, https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Health-Information-300x186.jpg 300w" sizes="(max-width: 575px) 100vw, 575px" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="1236" id="caption-attachment-5507"><span data-dcnode-id="1237" instrument_node="">Although most reptiles are masters at concealing any illness, if you are even somewhat familiar with your pet’s typical behavior, you should be able to notice the early warning signs. Typically, a lack of appetite and lethargy will indicate an illness, so be especially keen to those two symptoms.</span></figcaption></figure><span data-dcnode-id="1234" instrument_node="">
</span><h3 data-dcnode-id="1229"><span class="ez-toc-section" data-dcnode-id="1233" id="Hibernation"></span><strong data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Hibernation</span></strong><span class="ez-toc-section-end" data-dcnode-id="1230"></span></h3><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1224" style="font-weight: 400;"><span data-dcnode-id="1227" instrument_node="">The Russian tortoise both hibernates and aestivate. </span><strong data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">The hibernation period is during cold months, while a tortoise may aestivate if it’s too hot or if there is a lack of food or water. </span></strong></span></p><span data-dcnode-id="1222" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1211" style="font-weight: 400;"><span data-dcnode-id="1221" instrument_node="">A </span><a data-dcnode-id="1219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reptile.guide/pet-tortoise/"><span data-dcnode-id="1220" instrument_node="">pet tortoise</span></a><span data-dcnode-id="1218" instrument_node=""> </span><em data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">may not</span></em><span data-dcnode-id="1215" instrument_node=""> experience the same cues of temperature that motivate it to hibernate, </span><em data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">especially</span></em><span data-dcnode-id="1212" instrument_node=""> if kept indoors.&nbsp;</span></span></p><span data-dcnode-id="1209" instrument_node="">
</span><blockquote data-dcnode-id="1200"><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1202"><span data-dcnode-id="1203" style="font-weight: 400;"><span data-dcnode-id="1207" instrument_node="">If a pet tortoise does </span><em data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">NOT</span></em><span data-dcnode-id="1204" instrument_node=""> appear to be in good health, then it is better not to encourage hibernation. This is because poor health may not permit survival through the winter. </span></span></p><span data-dcnode-id="1201" instrument_node="">
</span></blockquote><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1196"><span data-dcnode-id="1197" style="font-weight: 400;"><span data-dcnode-id="1198" instrument_node="">A healthy tortoise may automatically slow down eating when it is ready to hibernate. Aestivation may not be necessary for pet tortoises, unless a heat wave has driven up the temperatures. </span></span></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1189"><strong data-dcnode-id="1190"><span data-dcnode-id="1194" instrument_node="">In the wild, Russian tortoises hibernate up to </span><em data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">NINE</span></em><span data-dcnode-id="1191" instrument_node=""> months of the year. In captivity, they appear to benefit from as little as eight weeks in hibernation. </span></strong></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1183" style="font-weight: 400;"><span data-dcnode-id="1187" instrument_node="">Discuss your tortoise’s personal needs for hibernation and aestivation with your veterinarian, since they can help you determine if your pet is healthy enough for hibernation </span><em data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">OR</span></em><span data-dcnode-id="1184" instrument_node=""> if you need to make adjustments to the habitat or diet.</span></span></p><span data-dcnode-id="1181" instrument_node="">
</span><h3 data-dcnode-id="1176"><span class="ez-toc-section" data-dcnode-id="1180" id="Pyramidal-Growth"></span><strong data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Pyramidal Growth</span></strong><span class="ez-toc-section-end" data-dcnode-id="1177"></span></h3><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1173" style="font-weight: 400;"><span data-dcnode-id="1174" instrument_node="">Pyramidal growth occurs when the scutes of a tortoise grow vertically instead of growing horizontally during size increases. </span></span></p><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1167" style="color: #ff0000;"><em data-dcnode-id="1168"><strong data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">This condition commonly happens when a tortoise…</span></strong></em></span></p><span data-dcnode-id="1165" instrument_node="">
</span><ul data-dcnode-id="1143"><span data-dcnode-id="1164" instrument_node="">
</span><li data-dcnode-id="1161"><span data-dcnode-id="1162" style="font-weight: 400;"><span data-dcnode-id="1163" instrument_node="">Receives too much protein </span></span></li><span data-dcnode-id="1160" instrument_node="">
</span><li data-dcnode-id="1157"><span data-dcnode-id="1158" style="font-weight: 400;"><span data-dcnode-id="1159" instrument_node="">Is overfed</span></span></li><span data-dcnode-id="1156" instrument_node="">
</span><li data-dcnode-id="1153"><span data-dcnode-id="1154" style="font-weight: 400;"><span data-dcnode-id="1155" instrument_node="">Has low enclosure humidity levels</span></span></li><span data-dcnode-id="1152" instrument_node="">
</span><li data-dcnode-id="1149"><span data-dcnode-id="1150" style="font-weight: 400;"><span data-dcnode-id="1151" instrument_node="">Receives inadequate hydration</span></span></li><span data-dcnode-id="1148" instrument_node="">
</span><li data-dcnode-id="1145"><span data-dcnode-id="1146" style="font-weight: 400;"><span data-dcnode-id="1147" instrument_node="">Has a calcium deficiency</span></span></li><span data-dcnode-id="1144" instrument_node="">
</span></ul><span data-dcnode-id="1142" instrument_node="">
</span><h3 data-dcnode-id="1137"><span class="ez-toc-section" data-dcnode-id="1141" id="Respiratory-Infections"></span><strong data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">Respiratory Infections</span></strong><span class="ez-toc-section-end" data-dcnode-id="1138"></span></h3><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1130"><span data-dcnode-id="1131" style="font-weight: 400;"><span data-dcnode-id="1135" instrument_node="">Commonly appearing when the humidity level is </span><em data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">too high,</span></em><span data-dcnode-id="1132" instrument_node=""> respiratory infections in Russian tortoises can create excessive mucoid discharge from the nose or mouth. </span></span></p><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1125" style="font-weight: 400;"><strong data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">You may also notice your tortoise wheezing or struggling to breathe if the infection becomes severe.</span></strong><span data-dcnode-id="1126" instrument_node=""> </span></span></p><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1118" style="font-weight: 400;"><span data-dcnode-id="1122" instrument_node="">If your tortoise develops a respiratory infection, they will </span><em data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">generally</span></em><span data-dcnode-id="1119" instrument_node=""> need antibiotics and supportive nursing care until they recover.&nbsp;</span></span></p><span data-dcnode-id="1116" instrument_node="">
</span><h3 data-dcnode-id="1111"><span class="ez-toc-section" data-dcnode-id="1115" id="Metabolic-Bone-Disease"></span><strong data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Metabolic Bone Disease</span></strong><span class="ez-toc-section-end" data-dcnode-id="1112"></span></h3><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1098"><span data-dcnode-id="1099" style="font-weight: 400;"><span data-dcnode-id="1109" instrument_node="">As with many other reptiles in captivity, metabolic bone disease is a </span><em data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">serious</span></em><span data-dcnode-id="1106" instrument_node=""> issue. </span><strong data-dcnode-id="1101"><span data-dcnode-id="1105" instrument_node="">Caused by a calcium deficiency, your tortoise </span><em data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">may</span></em><span data-dcnode-id="1102" instrument_node=""> experience a weak and brittle shell, along with skeletal issues.</span></strong><span data-dcnode-id="1100" instrument_node=""> </span></span></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1092" style="font-weight: 400;"><span data-dcnode-id="1096" instrument_node="">Provide plenty of calcium-rich dark, leafy greens, supplement with a calcium powder, and offer a UVB light source to help provide vitamin D3, which is </span><em data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">necessary</span></em><span data-dcnode-id="1093" instrument_node=""> for calcium metabolism.&nbsp;</span></span></p><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1077" style="background-color: #cfecec; margin-left: 20px; margin-right: 20px; padding: 8px;"><span data-dcnode-id="1078" style="color: #000000; font-size: 14pt;"><strong data-dcnode-id="1087"><img alt="🔑" class="emoji" data-dcnode-id="1089" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f511.svg&amp;raw"><span data-dcnode-id="1088" instrument_node=""> Russian Tortoise General Healthy Key Takeaways: </span></strong><span data-dcnode-id="1079" style="font-size: 12pt;"><span data-dcnode-id="1086" instrument_node="">Although generally hardy and healthy individuals, Russian tortoises do suffer from their fair share of health concerns. While minor health concerns such as </span><strong data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">long toe nails and minor scratches are to expected</span></strong><span data-dcnode-id="1083" instrument_node="">, you should be well ware of some of the more serious conditions, including </span><strong data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Respiratory Infections, Metabolic Bone Disease, and Pyramidal Growths.</span></strong><span data-dcnode-id="1080" instrument_node=""> By maintaining a healthy and varied diet with proper calcium, as well the right humidity levels, you can help prevent most of these issues.&nbsp;</span></span></span></p><span data-dcnode-id="1076" instrument_node="">
</span><h2 data-dcnode-id="1071"><span class="ez-toc-section" data-dcnode-id="1075" id="Russian-Tortoise-Handling-Bonding-Tips"></span><b data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Russian Tortoise Handling &amp; Bonding Tips</span></b><span class="ez-toc-section-end" data-dcnode-id="1072"></span></h2><span data-dcnode-id="1070" instrument_node="">
</span><figure aria-describedby="caption-attachment-5506" class="wp-caption aligncenter" data-dcnode-id="1064" id="attachment_5506" style="width: 565px"><img alt="Russian Tortoise Handling Bonding Tips" class="wp-image-5506 size-full" data-dcnode-id="1069" data-lazy-sizes="(max-width: 575px) 100vw, 575px" data-lazy-src="https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Handling-Bonding-Tips.jpg" data-lazy-srcset="https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Handling-Bonding-Tips.jpg 575w, https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Handling-Bonding-Tips-300x185.jpg 300w" height="355" loading="lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20575%20355'%3E%3C/svg%3E" width="575"><noscript data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">&lt;img loading="lazy" class="wp-image-5506 size-full" src="https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Handling-Bonding-Tips.jpg" alt="Russian Tortoise Handling Bonding Tips" width="575" height="355" srcset="https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Handling-Bonding-Tips.jpg 575w, https://reptile.guide/wp-content/uploads/2020/07/Russian-Tortoise-Handling-Bonding-Tips-300x185.jpg 300w" sizes="(max-width: 575px) 100vw, 575px" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="1065" id="caption-attachment-5506"><span data-dcnode-id="1066" instrument_node="">Although not the biggest fans of being handled, Russian tortoises are pretty docile and mild mannered, so don’t expect too much fight on their end. With that being said, you should limit picking them up as they are uncomfortable in the air.</span></figcaption></figure><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1055" style="font-weight: 400;"><span data-dcnode-id="1062" instrument_node="">When it comes to temperament, Russian tortoises are an easy-going reptile. </span><strong data-dcnode-id="1057"><span data-dcnode-id="1061" instrument_node="">They’re </span><em data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">non-aggressive</span></em><span data-dcnode-id="1058" instrument_node=""> and develop strong bonds with their owners.</span></strong><span data-dcnode-id="1056" instrument_node=""> </span></span></p><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" style="font-weight: 400;"><em data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">However</span></em><span data-dcnode-id="1050" instrument_node="">, they are </span><em data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">not the most</span></em><span data-dcnode-id="1047" instrument_node=""> cuddly of pets and prefer to interact from the stability of the ground. </span><strong data-dcnode-id="1042"><span data-dcnode-id="1046" instrument_node="">They will tolerate handling </span><em data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">if necessary</span></em><span data-dcnode-id="1043" instrument_node=""> for transportation, and generally will not bite when picked up. </span></strong></span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" style="font-weight: 400;"><span data-dcnode-id="1038" instrument_node="">If you bring your tortoise fresh-picked dandelions, you will soon see how </span><em data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">quickly</span></em><span data-dcnode-id="1035" instrument_node=""> these tiny creatures can move when motivated. Plus the gesture will go a long way toward building your relationship.</span></span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1028" style="font-weight: 400;"><strong data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Russian tortoises can live alone, in pairs, or in small groups.</span></strong><span data-dcnode-id="1029" instrument_node=""> You might witness some slight aggression between males, since they can get territorial and fight, leading to tip-overs and injuries. </span></span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1018" style="font-weight: 400;"><span data-dcnode-id="1023" style="text-decoration: underline;"><strong data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Do NOT house your Russian tortoise with any other tortoise species or other pets.</span></strong></span><span data-dcnode-id="1022" instrument_node=""> Also, keep a close eye out for any signs of aggression </span><em data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">OR</span></em><span data-dcnode-id="1019" instrument_node=""> fighting between your tortoises when confined to the same pen.</span></span></p><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1006" style="background-color: #cfecec; margin-left: 20px; margin-right: 20px; padding: 8px;"><span data-dcnode-id="1007" style="color: #000000; font-size: 14pt;"><strong data-dcnode-id="1013"><img alt="🔑" class="emoji" data-dcnode-id="1015" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f511.svg&amp;raw"><span data-dcnode-id="1014" instrument_node=""> Russian Tortoise Handling &amp; Bonding Key Takeaways: </span></strong><span data-dcnode-id="1008" style="font-size: 12pt;"><span data-dcnode-id="1012" instrument_node="">With the ability to develop strong bonds with their owners and a generally gentle disposition, </span><strong data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Russian tortoises make wonderful first time reptiles for people of all ages</span></strong><span data-dcnode-id="1009" instrument_node="">. Although they’ll never be cuddly or big fans of being held, you’d be surprised how happy a Russian tortoise can be to see its owner, especially if they have a treat in hand!</span></span></span></p><span data-dcnode-id="1005" instrument_node="">
</span><h2 data-dcnode-id="997"><span class="ez-toc-section" data-dcnode-id="1004" id="Is-a-Russian-Tortoise-Right-for-You"></span><b data-dcnode-id="999"><span data-dcnode-id="1003" instrument_node="">Is a Russian Tortoise Right for </span><em data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">You</span></em><span data-dcnode-id="1000" instrument_node="">?</span></b><span class="ez-toc-section-end" data-dcnode-id="998"></span></h2><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="994" style="font-weight: 400;"><span data-dcnode-id="995" instrument_node="">After learning all about this delightful reptile, we wouldn’t blame you for rushing out to purchase an adorable tiny Russian tortoise! </span></span></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="986"><span data-dcnode-id="987" style="font-weight: 400;"><span data-dcnode-id="991" instrument_node="">With their gentle demeanors, relatively simple upkeep, and no need for messy live-prey meals, </span><strong data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Russian tortoises make ideal pets for first-time reptile owners or more experienced pros alike.</span></strong><span data-dcnode-id="988" instrument_node=""> </span></span></p><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" style="font-weight: 400;"><span data-dcnode-id="984" instrument_node="">Be sure to create your tortoise’s perfect habitat </span><em data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">first</span></em><span data-dcnode-id="981" instrument_node=""> before purchasing your new pet, so it will be move-in ready after finding your new companion. </span></span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="976" style="font-weight: 400;"><span data-dcnode-id="977" instrument_node="">Consider planting grasses and plants for a fresh, pesticide-free food source as well before bringing home your tortoise. </span></span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="972" style="font-weight: 400;"><span data-dcnode-id="973" instrument_node="">With plenty of tasty bribes, you’ll soon have a friendly, active tortoise that will delight you for hours with their climbing and burrowing antics. </span></span></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="967"><span data-dcnode-id="968" style="font-weight: 400;"><span data-dcnode-id="969" instrument_node="">Here’s to many years of enjoying your new best friend!</span></span></p><span data-dcnode-id="966" instrument_node="">
