Across the globe, </span><a data-component="link" data-dcnode-id="1500" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/types-of-pet-foxes-1238711"><span data-dcnode-id="1501" instrument_node="">red foxes</span></a><span data-dcnode-id="1499" instrument_node=""> cover more geographic ground than any other animal in the order Carnivora—as we said before, they can be found on every continent except Antarctica.
</span></p><span data-dcnode-id="1497" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1492" id="mntl-sc-block_3-0-8"><span data-dcnode-id="1496" instrument_node="">
Red foxes naturally live in scrub and woodland, but their </span><a data-component="link" data-dcnode-id="1494" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesprucepets.com/pet-fox-diet-1238708"><span data-dcnode-id="1495" instrument_node="">flexible diets</span></a><span data-dcnode-id="1493" instrument_node=""> can help them adapt to a wide range of environments. If a red fox found herself in an urban setting, for example, she'd likely learn to survive on food scraps, pet food, and even garbage! Likewise, red foxes can survive solely on plant-based foods in areas where there isn't enough prey (think rabbits, rodents, birds, bird eggs, and amphibians) to sustain their carnivorous diets.
</span></p><span data-dcnode-id="1491" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1486" id="mntl-sc-block_3-0-9"><span data-dcnode-id="1490" instrument_node="">
Although red foxes are often brutally hunted for their fur, there is some good news in terms of red fox conservation: </span><a data-component="link" data-dcnode-id="1488" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iucn.org/" rel="noopener" target="_blank"><span data-dcnode-id="1489" instrument_node="">The International Union for Conservation of Nature</span></a><span data-dcnode-id="1487" instrument_node=""> categorizes red foxes as the "Least Concern for Extinction," and even includes them in the list of the world's 100 most invasive species. Go, red foxes, go!
</span></p><span data-dcnode-id="1485" instrument_node="">

</span></p><span data-dcnode-id="1315" instrument_node="">
</span><ul class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1306" id="mntl-sc-block_3-0-16"><span data-dcnode-id="1314" instrument_node="">
</span><li data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Like cats, red foxes are most active at night. Their vertical pupils enable them to see clearly in dark or dim light.&nbsp;</span></li><li data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Red foxes and cats share the same hunting style—both stalk and pounce on their prey.</span></li><li data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Foxes are the only member of the family Canidae that can climb trees, and like cats, sometimes sleep in trees' branches.&nbsp;</span></li><span data-dcnode-id="1307" instrument_node="">
</span></ul><span data-dcnode-id="1305" instrument_node="">

Grab your lab coats, folks. It's time for a little bit of biology.&nbsp;
</span></p><span data-dcnode-id="1223" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1215" id="mntl-sc-block_3-0-20"><span data-dcnode-id="1222" instrument_node="">
We all know foxes are extremely skilled hunters, but do you know </span><em data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">how </span></em><span data-dcnode-id="1219" instrument_node="">they hunt so efficiently? Scientists have discovered that foxes can&nbsp;</span><em data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">see&nbsp;</span></em><span data-dcnode-id="1216" instrument_node="">the earth's magnetic field—and utilize it to stalk and hunt their prey.&nbsp;
</span></p><span data-dcnode-id="1214" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1212" id="mntl-sc-block_3-0-21"><span data-dcnode-id="1213" instrument_node="">
Here's how it works: Foxes see the earth's magnetic field as a shadow in their field of vision. When that shadow aligns with the sounds of their prey, they pounce. Pretty amazing, right?
