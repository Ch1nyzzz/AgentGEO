</span><h2 data-dcnode-id="1286" style="text-align: center;"><strong data-dcnode-id="1287"><span data-dcnode-id="1288" style="color: #000000;"><span data-dcnode-id="1289" instrument_node="">See where we have flown over 60,000 pets to safety since 2012!</span></span></strong></h2><span data-dcnode-id="1285" instrument_node="">
</span><h3 data-dcnode-id="1281"><span data-dcnode-id="1284" instrument_node="">Adopt from our partner shelters listed below.</span><em data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">..</span></em></h3><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1276"><map data-dcnode-id="1278" id="ImageMapsCom-image-maps-2015-11-17-041546" name="image-maps-2015-11-17-041546"><span data-dcnode-id="1279" instrument_node=""> </span></map><span data-dcnode-id="1277" instrument_node="">
</span></p><span data-dcnode-id="1275" instrument_node="">
</span><div class="text" data-dcnode-id="1198"><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1267"><strong data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Donate</span></strong><span data-dcnode-id="1271" instrument_node=""> – Wings of Rescue flies large scale transports of at-risk shelter pets from disaster areas and overcrowded shelters to shelters where there is empty kennel space and where no local shelter pets are displaced by our flights. &nbsp; The average cost for us to fly a pet is $150 on our flights and that covers health checks, spay/neuter, vaccinations, microchips, flea treatments and heartworm testing. For the disaster relief flights the cost is much higher.&nbsp;&nbsp;&nbsp; We are a donor based charity and we need your help to stay in the air flying pets to safety.&nbsp; Please join our Wings of Rescue Flight Support Team by making a donation online by </span><a data-dcnode-id="1269" data-slimstat="5" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wingsofrescue.org/donate/" rel="noopener" target="_blank"><span data-dcnode-id="1270" instrument_node="">clicking here</span></a><span data-dcnode-id="1268" instrument_node="">.&nbsp; You can also donate through Paypal by using our donation address: donate@wingsofrescue.org</span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1263" style="text-align: center;"><strong data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">To mail a donation:</span></strong></p><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1260" style="text-align: center;"><span data-dcnode-id="1261" instrument_node="">Wings of Rescue</span></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1257" style="text-align: center;"><span data-dcnode-id="1258" instrument_node="">P.O. Box 602030</span></p><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; San Diego, California 92160</span></p><span data-dcnode-id="1253" instrument_node="">

</span><p data-dcnode-id="1243"><strong data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Social Media</span></strong><span data-dcnode-id="1247" instrument_node=""> – Join us on </span><a data-dcnode-id="1245" data-slimstat="5" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/WingsofRescue" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1246" instrument_node="">Facebook</span></a><span data-dcnode-id="1244" instrument_node="">, to keep up-to-date on all of our flights and to hear the success stories of the animals that have been flown to safety.</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1238"><strong data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Thank You!</span></strong><span data-dcnode-id="1239" instrument_node=""> – Thank you for taking the time to learn more about what we do to save thousands of animals each year from overcrowded shelters and catastrophic disasters where they often face the prospects of being euthanized for lack of kennel space.</span></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Wings of Rescue is the biggest air transporter of at-risk shelter pets in the world.&nbsp; We are unique in that in a matter of hours we are able to fly large number of dogs and cats on long distance flights to markets in need of adoptable pets.&nbsp; At Wings of Rescue all our pets are examined by licensed veterinarians and issued health certificates prior to their boarding our planes.&nbsp; Our precious cargo is treated with the utmost care, respect and safety and our pets arrive healthier and less stressed than those transported on land transports.&nbsp; Pets transported long distances by land are all too often not taken out of their kennels for potty breaks and arrive stressed and sick.&nbsp; The average length of stay for a pet transported by Wings of Rescue in his/her receiving shelter is 3 1/2 days before they are adopted into wonderful loving homes.</span></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1233"></p><span data-dcnode-id="1232" instrument_node="">
