</span><h4 data-dcnode-id="1117"><em data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Jade</span></em></h4><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">In June of 2013, Jade was picked up on a running trail in Anchorage by joggers who believed he was an orphan. Foxes are known to be very curious animals so it’s possible that Jade may have just been exploring his new surroundings when he was found. Because it is illegal to take a fox kit as a pet, Jade was brought to the AWCC where he has been given a permanent home. Jade has become a favorite animal at the AWCC and can be seen “wagging” his tail around curious visitors while enjoying the occasional raw egg.</span></p><span data-dcnode-id="1113" instrument_node="">
</span><h4 data-dcnode-id="1110"><em data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Storm</span></em></h4><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Known as a “marble fox” because of her coat, Storm was illegally bred for the purpose of being a pet. Storm lived with humans until she was discovered and rescued in 2015 and arrived at AWCC in 2016. The addition of Storm to AWCC’s educational programs presents the opportunity to provide a dynamic lesson in which the public can be informed about the importance and the plight of her wild counterparts and various sub-species around the world.</span></p><span data-dcnode-id="1106" instrument_node="">

</span><h2 data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Description</span></h2><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="607" instrument_node="">By adopting an animal at the Alaska Wildlife Conservation Center, you can enjoy animal parenthood without all the work! Our professional staff will provide a special diet, environment, and veterinary care that your animal requires. You’ll enjoy wonderful benefits with each adoption level, as well as the satisfaction of knowing that you are helping to provide a good home for your selected animal at the AWCC. </span><strong data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Adopted animals remain in the care of AWCC.</span></strong></p><span data-dcnode-id="603" instrument_node="">
</span><h2 data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Adoption Levels &amp; Benefits:</span></h2><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="595"><strong data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">“THE SKULK” (A group of foxes) $30</span></strong><br data-dcnode-id="597"><span data-dcnode-id="596" instrument_node="">
The Green option! It includes digital adoption certificate and the digital quarterly newsletter. (This option is digital and is available internationally. Shipping not available.) If purchasing as a gift, please include recipient’s emails in the “Order Notes” at checkout. Tax-deductible amount $25.</span></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="587"><strong data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">“THE CHAIN” (A group of lynx) $50</span></strong><br data-dcnode-id="591"><span data-dcnode-id="590" instrument_node="">
Adoption certificate, small animal plush toy*, animal trading card, and the digital quarterly newsletter.</span><br data-dcnode-id="589"><span data-dcnode-id="588" instrument_node="">
*Reindeer &amp; Muskox not available at this level. Tax-deductible amount $25.</span></p><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="581"><strong data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">“THE PRICKLE” (A group of porcupines) $100</span></strong><br data-dcnode-id="583"><span data-dcnode-id="582" instrument_node="">
Adoption certificate, large animal plush toy, animal trading card, and the digital quarterly newsletter. Tax-deductible amount $50.</span></p><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="575"><strong data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">“THE YOKE” (A group of muskoxen) $100</span></strong><br data-dcnode-id="577"><span data-dcnode-id="576" instrument_node="">
