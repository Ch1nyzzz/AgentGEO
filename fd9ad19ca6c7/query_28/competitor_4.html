</span><p class="text-block" data-dcnode-id="1874"><span data-dcnode-id="1883" instrument_node="">We are equipped to provide extraordinary veterinary care for dogs, cats, exotics and birds in the San Antonio area. We are proud to be both </span><strong class="“font-weight-bold”" data-dcnode-id="1880"><a data-dcnode-id="1881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.northernoaksvet.com/about-us/aaha-accredited" title="AAHA Accreditation"><span data-dcnode-id="1882" instrument_node="">AAHA Accredited</span></a></strong><span data-dcnode-id="1879" instrument_node=""> and a certified </span><strong class="font-weight-bold" data-dcnode-id="1876"><a data-dcnode-id="1877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.northernoaksvet.com/cat-friendly-practice" title="Cat Friendly"><span data-dcnode-id="1878" instrument_node="">Cat Friendly Practice</span></a></strong><span data-dcnode-id="1875" instrument_node="">. This requires our facility and team to meet a strict set of over 900 standards, which are re-evaluated periodically, to ensure we adhere to the highest standards for anesthetic safety, monitoring, sterility, pain control, and more. We are proud to be among only 15% of accredited veterinary hospitals in North America.</span></p><span data-dcnode-id="1873" instrument_node="">
