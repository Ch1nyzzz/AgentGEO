</span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="1247"><div class="field-items" data-dcnode-id="1248"><div class="field-item even" data-dcnode-id="1249" property="content:encoded"><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">As an American Animal Hospital Association (AAHA) accredited clinic since 1998, our team of veterinarians and support staff adheres to the highest standards of facility and pet care. Only 15% of all practices are AAHA certified (re-accreditation takes place every 3 years). However, our greatest source of pride is found in the praise of our clients and the satisfied purrs and wagging tails of our patients.</span></p><span data-dcnode-id="1276" instrument_node="">
</span><p class="toggler" data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Learn More</span></p><span data-dcnode-id="1273" instrument_node="">
</span><div data-dcnode-id="1251" style="display: none;"><span data-dcnode-id="1272" instrument_node="">
</span><h2 data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Get to know your veterinarian</span></h2><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">We have found the key to quality veterinary care is a combination of medical competence, empathy for pet owners and compassion for our animal companions. Our veterinarians will listen to your concerns, diagnose any medical conditions, help you understand your options and work with you to make the right decisions for you and your pet.</span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">At The Family Pet Hospital Laser and Wellness Center, our team is made up of a diverse group of veterinarians and support staff professionals who bring their love for animals to work with them everyday. Our veterinary team comes from all backgrounds, and they have joined The Family Pet Hospital Laser and Wellness Center because of their desire to make a difference in the lives of animals, as well as the people who love those animals.</span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1262" instrument_node="">To learn more about our dedicated veterinary team, please </span><a data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefamilypethospital.com/about-us/veterinarians"><span data-dcnode-id="1261" instrument_node="">click here.</span></a></p><span data-dcnode-id="1258" instrument_node="">
</span><h2 data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Our Animal Hospital Offers Cutting Edge, Affordable Care</span></h2><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">The Family Pet Hospital Laser and Wellness Center is an animal care facility equipped to handle all medical and surgical needs. From preventive health care services to advanced diagnostic and surgical services, our doctors and staff are trained to manage all of your pet's needs. We are continually updating our equipment and educating our team to the latest medical information. We know that everyone has a budget and we will work within the confines of your budget to get the best outcome for your pet. </span></p><span data-dcnode-id="1252" instrument_node="">
</span></div><span data-dcnode-id="1250" instrument_node="">

</span><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node=""> Our knowledgeable veterinarians and competent support staff guarantee your pet the personalized attention and accurate fast diagnosis, giving you the comfort and peace of mind that your pet is in the best hands.</span></p><span data-dcnode-id="1117" instrument_node="">
