</span><p data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">All Pets Vet Hospital not only provides general care and preventative wellness, we are also proud to offer additional services such as: grooming, boarding, daycare, canine rehabilitation and puppy training in house.</span></p><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Furthermore, our veterinarians and staff are trained for many different surgeries such as orthopedic, laser, soft tissue, routine (i.e. spay and neuter), laparoscopic, and cryosurgery.</span></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Thinking of breeding your dog? Come to All Pets Vet Hospital first! We are the leading practice in canine reproductive services in the state of New Jersey. Dr. Alsamadisi is the lead reproductive doctor at our partner facility, International Canine Semen Bank of New Jersey and is a member of the Theriogenology society. ICSBNJ utilizes state-of-the-art technology to collect, evaluate and store canine semen specimens specifically for the purpose of breeding. </span></p><span data-dcnode-id="1696" instrument_node="">
</span><a class="btn btn-warning" data-dcnode-id="1694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icsbnj.com/" rel="nofollow" target="_blank"><span data-dcnode-id="1695" instrument_node="">Learn more about ICSBNJ</span></a></div><span data-dcnode-id="1692" instrument_node="">
