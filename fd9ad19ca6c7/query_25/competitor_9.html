</span><div class="td-post-featured-image" data-dcnode-id="1099"><a class="td-modal-image" data-caption="" data-dcnode-id="1100" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//exopetguides.com/wp-content/uploads/2020/03/Arctic-Marble-Fox-as-Pets.jpg"><img alt="Arctic Marble Fox as Pets" class="entry-thumb entered lazyloaded" data-dcnode-id="1103" data-lazy-sizes="(max-width: 696px) 100vw, 696px" data-lazy-src="https://exopetguides.com/wp-content/uploads/2020/03/Arctic-Marble-Fox-as-Pets-696x463.jpg" data-lazy-srcset="https://exopetguides.com/wp-content/uploads/2020/03/Arctic-Marble-Fox-as-Pets-696x463.jpg 696w, https://exopetguides.com/wp-content/uploads/2020/03/Arctic-Marble-Fox-as-Pets-768x511.jpg 768w, https://exopetguides.com/wp-content/uploads/2020/03/Arctic-Marble-Fox-as-Pets-632x420.jpg 632w, https://exopetguides.com/wp-content/uploads/2020/03/Arctic-Marble-Fox-as-Pets-600x400.jpg 600w, https://exopetguides.com/wp-content/uploads/2020/03/Arctic-Marble-Fox-as-Pets.jpg 1000w" data-ll-status="loaded" height="463" sizes="(max-width: 696px) 100vw, 696px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//exopetguides.com/wp-content/uploads/2020/03/Arctic-Marble-Fox-as-Pets-696x463.jpg&amp;raw" srcset="https://exopetguides.com/wp-content/uploads/2020/03/Arctic-Marble-Fox-as-Pets-696x463.jpg 696w, https://exopetguides.com/wp-content/uploads/2020/03/Arctic-Marble-Fox-as-Pets-768x511.jpg 768w, https://exopetguides.com/wp-content/uploads/2020/03/Arctic-Marble-Fox-as-Pets-632x420.jpg 632w, https://exopetguides.com/wp-content/uploads/2020/03/Arctic-Marble-Fox-as-Pets-600x400.jpg 600w, https://exopetguides.com/wp-content/uploads/2020/03/Arctic-Marble-Fox-as-Pets.jpg 1000w" title="Arctic-Marble-Fox-as-Pets" width="696"><noscript data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">&lt;img width="696" height="463" class="entry-thumb td-modal-image" src="https://exopetguides.com/wp-content/uploads/2020/03/Arctic-Marble-Fox-as-Pets-696x463.jpg" srcset="https://exopetguides.com/wp-content/uploads/2020/03/Arctic-Marble-Fox-as-Pets-696x463.jpg 696w, https://exopetguides.com/wp-content/uploads/2020/03/Arctic-Marble-Fox-as-Pets-768x511.jpg 768w, https://exopetguides.com/wp-content/uploads/2020/03/Arctic-Marble-Fox-as-Pets-632x420.jpg 632w, https://exopetguides.com/wp-content/uploads/2020/03/Arctic-Marble-Fox-as-Pets-600x400.jpg 600w, https://exopetguides.com/wp-content/uploads/2020/03/Arctic-Marble-Fox-as-Pets.jpg 1000w" sizes="(max-width: 696px) 100vw, 696px" alt="Arctic Marble Fox as Pets" title="Arctic-Marble-Fox-as-Pets"/&gt;</span></noscript></a></div><span data-dcnode-id="1098" instrument_node="">
</span><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Much has been written about the Arctic marble fox, despite not much being known about it. Online commentators and glittery-eyed bloggers pine over its unique coloring, and debate about whether or not it is naturally occurring. (It isn’t.)</span></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1092" instrument_node="">It has been labeled a </span><strong data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">myth</span></strong><span data-dcnode-id="1089" instrument_node="">, likened to creatures from fantasy movies and discussed with that starry-eyed hopefulness that doesn’t really inform anyone of anything. </span><strong data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">What is a marble fox?</span></strong><span data-dcnode-id="1086" instrument_node=""> It is an Arctic fox with unusual coloration – mostly white with a bit of black, a bit like a marble cake!</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1080"><strong data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">What is a Canadian / Marble Arctic fox?</span></strong><span data-dcnode-id="1081" instrument_node=""> Despite much online hullabaloo about this near-virally popular bundle of foxy cuteness, the Marble Arctic fox is not actually a particular species. Nor is the Canadian Marble fox, or even a Canadian fox. In this context, ‘Canadian’ is a geographic signifier and ‘marble’ is a descriptor. So, the famed and fabled fox of this name is simply an Arctic fox. But that doesn’t make it any less spectacular!</span></p><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Arctic foxes have two primary morphs, white and blue. 99% of Arctic foxes are white, despite the blue morph being technically, genetically, dominant. Many Arctic foxes actually lose their whiteness during summer months, and turn into brownish-grey foxes. To me, these are in some ways even more mesmerizing than marble foxes.</span></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1075" instrument_node="">Arctic foxes with a </span><em data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">marble complexion</span></em><span data-dcnode-id="1072" instrument_node=""> are </span><strong data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">predominantly white, with dark markings accentuating the inside rim of their ears</span></strong><span data-dcnode-id="1069" instrument_node="">, and highlighting their eyebrows and eyes. Sometimes these markings spread a bit further to include the thin, or connect on the forehead. The word ‘marble’ is basically used to describe any Arctic fox which has attractive, symmetrical dark markings on its face, head and ears. And yes, they are adorable!</span></p><span data-dcnode-id="1067" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1066" instrument_node="">According to the Fur Commission USA, the first Arctic marble fox was reportedly born from a </span><em data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">silver</span></em><span data-dcnode-id="1063" instrument_node=""> fox litter in Norway in 1945, at the farm of a man named Sverre Omber. It was the result of a </span><strong data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">genetic mutation</span></strong><span data-dcnode-id="1060" instrument_node="">, or </span><em data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">color phase</span></em><span data-dcnode-id="1057" instrument_node="">, when breeding together a red fox and an Arctic fox. It is therefore regarded as a </span><strong data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">non-naturally occurring color morph</span></strong><span data-dcnode-id="1054" instrument_node="">.</span></p><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1048"><strong data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Where do marble foxes live?</span></strong><span data-dcnode-id="1049" instrument_node=""> As marble foxes are not naturally occurring, they live wherever they are artificially bred, or wherever they are raised thereafter. However, the Arctic fox from which they are bred are native to northern Canada and other land masses within the Arctic Circle. The Canadian fox is a geographical term to name (mostly) Arctic foxes which call Canada home.</span></p><span data-dcnode-id="1047" instrument_node="">
</span><h3 data-dcnode-id="1043"><span data-dcnode-id="1044" id="How-long-do-marble-foxes-live-as-pets"><strong data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">How long do marble foxes live as pets?</span></strong></span></h3><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Arctic marble foxes can easily live up to 10 years in captivity, or even as long as 15 years. This is much longer than they live in the wild – reportedly they only live up to 5 years in the ‘real world’.</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1038" instrument_node="">This may all sound rosy, but its increased longevity in captive environments does not mean it is necessarily a good idea to keep an Arctic marble fox as a pet! </span><strong data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Foxes are not easy pets to deal with</span></strong><span data-dcnode-id="1035" instrument_node="">. There are many factors to consider – it is a big commitment, even for a seasoned pet keeper. However, if you are determined (or just plain curious), then this guide will help you on your way to keeping an Arctic marble fox as a pet.</span></p><span data-dcnode-id="1033" instrument_node="">

Fox-scents-and-odors"><span data-dcnode-id="969" instrument_node="">#6: Fox scents and odors</span></a><ul data-dcnode-id="964"><li data-dcnode-id="965"><a data-dcnode-id="966" href="#The-removal-of-scent-glands-is-not-recommended"><span data-dcnode-id="967" instrument_node="">The removal of scent glands is not recommended.</span></a></li></ul></li><li data-dcnode-id="960"><a data-dcnode-id="961" href="#7-Marble-fox-de-fanging"><span data-dcnode-id="962" instrument_node="">#7: Marble fox de-fanging</span></a></li><li data-dcnode-id="953"><a data-dcnode-id="958" href="#8-Marble-fox-breeding"><span data-dcnode-id="959" instrument_node="">#8: Marble fox breeding</span></a><ul data-dcnode-id="954"><li data-dcnode-id="955"><a data-dcnode-id="956" href="#Spaying-and-neutering-foxes"><span data-dcnode-id="957" instrument_node="">Spaying and neutering foxes</span></a></li></ul></li><li data-dcnode-id="950"><a data-dcnode-id="951" href="#9-How-much-does-a-marble-fox-cost"><span data-dcnode-id="952" instrument_node="">#9: How much does a marble fox cost?</span></a></li><li data-dcnode-id="940"><a data-dcnode-id="948" href="#10-Reputable-fox-breeders"><span data-dcnode-id="949" instrument_node="">#10: Reputable fox breeders</span></a><ul data-dcnode-id="941"><li data-dcnode-id="945"><a data-dcnode-id="946" href="#Breeders-in-the-USA"><span data-dcnode-id="947" instrument_node="">Breeders in the USA:</span></a></li><li data-dcnode-id="942"><a data-dcnode-id="943" href="#Breeders-to-AVOID"><span data-dcnode-id="944" instrument_node="">Breeders to AVOID:</span></a></li></ul></li><li data-dcnode-id="933"><a data-dcnode-id="938" href="#Final-Thoughts"><span data-dcnode-id="939" instrument_node="">Final Thoughts</span></a><ul data-dcnode-id="934"><li data-dcnode-id="935"><a data-dcnode-id="936" href="#Are-marble-foxes-good-pets"><span data-dcnode-id="937" instrument_node="">Are marble foxes good pets?</span></a></li></ul></li></ul></div><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">This is your one-stop shop for all the information you need about keeping an Arctic marble fox. If you have any questions, pop them in the comments below, or look for an expert/breeder near you, who can answer any queries you may have!</span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">On with the show.</span></p><span data-dcnode-id="924" instrument_node="">
</span><h2 data-dcnode-id="921"><span data-dcnode-id="922" id="1-Marble-fox-legal-issues-Where-are-they-legalillegal"><span data-dcnode-id="923" instrument_node="">#1: Marble fox legal issues: Where are they legal/illegal?</span></span></h2><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="913"><strong data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Do your own research into this</span></strong><span data-dcnode-id="917" instrument_node="">; laws can change, and some are nebulous and difficult to interpret unless you speak to an official. Some states, such as </span><strong data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Arkansas, Alaska and Indiana</span></strong><span data-dcnode-id="914" instrument_node="">, may allow the keeping of marble foxes. Most states, however, have a comprehensive blanket ban on keeping exotic, or wild, animals, as pets.</span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="907"><span data-dcnode-id="911" instrument_node="">One of the issues facing lawmakers is that animals such as </span><strong data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">foxes often carry rabies</span></strong><span data-dcnode-id="908" instrument_node="">. Green-lighting the captive housing of such an animal would undoubtedly cause nasty repercussions among the legal bodies at work. Mostly, it is a case of state entities covering their own backs. No one wants a lawsuit!</span></p><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="905" instrument_node="">On top of this, you must </span><strong data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">consider the legal issues facing your chosen veterinarian</span></strong><span data-dcnode-id="902" instrument_node=""> – that is, if you can find one who is willing to commit to helping you look after your domesticated wild animal for the duration of its life.</span></p><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="899" instrument_node="">Many vets refuse to treat exotic animals, even if they are dying. </span><strong data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">There are complications</span></strong><span data-dcnode-id="896" instrument_node="">. Some are afraid the owner will sue them if it dies in their hands. Some are afraid of the legal repercussions if one of their assistants is harmed while treating it. Some may simply not have the facilities to hold it while it recovers from surgery.</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="890"><strong data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">NEVER spend more than $600 on a regular fox</span></strong><span data-dcnode-id="891" instrument_node=""> – if you do, you are being ripped off, and cannot trust the seller. Only buy from someone whom you know and trust. And make sure you fully understand the permissions afforded to you in your state (and possibly district/county – laws vary).</span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="888" instrument_node="">If you do manage to find a reputable breeder (check below for a list of examples), make sure you get a BILL OF SALE with the </span><strong data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">breeder’s USDA license</span></strong><span data-dcnode-id="885" instrument_node=""> on it. This is proof that the fox is legal in the state of purchase.</span></p><span data-dcnode-id="883" instrument_node="">
</span><h2 data-dcnode-id="880"><span data-dcnode-id="881" id="2-How-should-you-handle-a-marble-fox"><span data-dcnode-id="882" instrument_node="">#2: How should you handle a marble fox?</span></span></h2><span data-dcnode-id="879" instrument_node="">
</span><h3 data-dcnode-id="873"><span data-dcnode-id="874" id="Handling-fox-kit-youngling"><strong data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Handling f</span></strong><strong data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">ox kit (youngling)</span></strong></span></h3><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">It is best to handle baby foxes, or fox kits, frequently, so that they get used to contact with humans. Under six months of age, foxes are fearless, so this is the best time to interact as much possible.</span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Remember also to talk to your fox! It may feel silly at first, but this will show the fox that you are giving it your full attention. It will warm to you, and become familiar with the sound of your voice, as well as the way you look and smell.</span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Assuming you got your fox from a reputable and reliable breeder, it should already be properly bonded, or socialized. It should also have been bottle-fed. This is an integral part of the bonding process.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">If your fox is terrified of being touched by you, it has not received adequate care in its first weeks or months of life.</span></p><span data-dcnode-id="860" instrument_node="">
</span><h3 data-dcnode-id="856"><span data-dcnode-id="857" id="Handling-adult-foxes"><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Handling adult foxes</span></strong></span></h3><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">If you buy an adult fox and they are shy, or if you just want to cultivate a friendlier bond between you and your fox, here are a few ideas:</span></p><span data-dcnode-id="852" instrument_node="">
</span><ol data-dcnode-id="835"><span data-dcnode-id="851" instrument_node="">
</span><li data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Sit or lie down on the floor nearby your fox.</span></li><span data-dcnode-id="848" instrument_node="">
</span><li data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Talk to your fox with a gentle voice. Don’t worry, it will hear you – its giant ears will make sure of that!</span></li><span data-dcnode-id="845" instrument_node="">
</span><li data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Hold a treat in your hand which you know your fox particularly likes. Some like whole eggs – foxes are notorious for entering chicken coops and demolishing the entire egg crop, but maybe yours likes something different.</span></li><span data-dcnode-id="842" instrument_node="">
</span><li data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Extend your arm towards the fox and open up your hand. If it doesn’t take it, don’t worry. Depending on how comfortable your fox is with you, it may take several attempts at this, or even a few days.</span></li><span data-dcnode-id="839" instrument_node="">
</span><li data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Chances are, when your fox sees the treat, they will want it, but be afraid to take it straight away. Here’s the tricky part for you: you mustn’t give the fox the treat unless they take it from your hand! Remember, the purpose of this exercise is to show your fox that they can trust you – and be close to you.</span></li><span data-dcnode-id="836" instrument_node="">
</span></ol><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">If you’ve never done this before, the mere sight of you lying on the floor may perplex, or even scare, your fox. But don’t fret, just repeat. Be gentle, and patient.</span></p><span data-dcnode-id="831" instrument_node="">
</span><ol data-dcnode-id="817"><span data-dcnode-id="830" instrument_node="">
</span><li data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">When your fox finally takes the treat from your hand, stay with him or her. If the fox scarpers with the treat to eat it in privacy, it will probably still return for another – and another!</span></li><span data-dcnode-id="827" instrument_node="">
</span><li data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">The next step is to do the same but to also extend a finger out to pet its nose. Again, it may take a few attempts at this before your fox lets you touch its nose without running away.</span></li><span data-dcnode-id="824" instrument_node="">
</span><li data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Repeat this every day. It may take a while, but your fox should gradually become more trusting and friendly.</span></li><span data-dcnode-id="821" instrument_node="">
</span><li data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">You will be tickling the inside of your fox’s ears in no time!</span></li><span data-dcnode-id="818" instrument_node="">
</span></ol><span data-dcnode-id="816" instrument_node="">
</span><h2 data-dcnode-id="813"><span data-dcnode-id="814" id="3-How-to-settle-a-marble-fox-into-a-new-environment"><span data-dcnode-id="815" instrument_node="">#3: How to settle a marble fox into a new environment</span></span></h2><span data-dcnode-id="812" instrument_node="">
</span><h3 data-dcnode-id="808"><span data-dcnode-id="809" id="Housing-fox-kitsnbsp"><strong data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Housing fox kits&nbsp;</span></strong></span></h3><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="806" instrument_node="">Provide it with a large cage. </span><a class="ek-link" data-dcnode-id="804" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2J8BDNB" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="805" instrument_node="">Dog kennels like these</span></a><span data-dcnode-id="803" instrument_node=""> will do fine. Put a box inside where the fox can hide and something soft on the floor to cover a quarter of the enclosure. If possible, place the cage on top of a table, or something of similar height. This way, the fox will not feel so vulnerable.</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="800" instrument_node="">Place a </span><a class="ek-link" data-dcnode-id="798" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3bjkpsW" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="799" instrument_node="">puppy litter pan</span></a><span data-dcnode-id="797" instrument_node=""> near the door of the cage. A small cardboard box will do. If the fox uses it straight away, great! If not, give it time. Put a </span><a class="ek-link" data-dcnode-id="795" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2UcfDYs" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="796" instrument_node="">food and water dish</span></a><span data-dcnode-id="794" instrument_node=""> as close to the door as you can. Once your fox seems a bit more comfortable and settled, try the above steps to give it a treat from your hand.</span></p><span data-dcnode-id="792" instrument_node="">
</span><h3 data-dcnode-id="788"><span data-dcnode-id="789" id="Housing-adult-foxes"><strong data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Housing adult foxes</span></strong></span></h3><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="786" instrument_node="">Follow the above steps (under the </span><strong data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">adult fox</span></strong><span data-dcnode-id="783" instrument_node=""> section of ‘How should you handle a marble fox?’) to help your fox learn to trust you. Provide the same as for a fox kit: a large cage, litter box, food and water dishes close to the cage door, and so on.</span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="773"><span data-dcnode-id="780" instrument_node="">Talk to your fox and keep him or company, as much as possible. Foxes don’t like constant petting – let your fox make the choice, but give it the option. You can also introduce toys, such as a </span><a class="ek-link" data-dcnode-id="778" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3duXtZu" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="779" instrument_node="">tug-of-war rope</span></a><span data-dcnode-id="777" instrument_node="">, </span><a class="ek-link" data-dcnode-id="775" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2y7pqqh" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="776" instrument_node="">squeaky toys</span></a><span data-dcnode-id="774" instrument_node=""> or similar.</span></p><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">If your fox bites you, tell it sternly, NO BITE, and tap it on the nose. The key is with timing – if you are too late, the fox will not understand the connection between the transgression and the punishment/lesson.</span></p><span data-dcnode-id="769" instrument_node="">
</span><h3 data-dcnode-id="765"><span data-dcnode-id="766" id="Housing-aggressive-fox-kits"><strong data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Housing aggressive fox kits</span></strong></span></h3><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="763" instrument_node="">If you get a fox kit that is more than a few weeks old and is exhibiting aggressive behavior, be reassured that this is probably due to the </span><strong data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">change of environment</span></strong><span data-dcnode-id="760" instrument_node="">. Being around new people can be stressful for baby foxes.</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="757" instrument_node="">You must </span><strong data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">let the fox kit</span></strong><span data-dcnode-id="754" instrument_node=""> </span><strong data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">settle in its new home</span></strong><span data-dcnode-id="751" instrument_node="">. If a fox gets too scared, it may bite. Using your hand to play ‘bite’ with your fox is NOT ADVISED: foxes have very sharp teeth and surprisingly strong jaws. Use a stuffed animal instead. It may be cute and playful to have a fox kit bite your finger, but it will carry this habit into adulthood.</span></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="748" instrument_node="">Foxes can be </span><strong data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">triggered by certain</span></strong><span data-dcnode-id="745" instrument_node=""> </span><strong data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">noises or movements</span></strong><span data-dcnode-id="742" instrument_node="">, so be mindful of their temperaments. Some foxes also don’t like to be petted in an area where they can’t see your hand, so be aware of your fox’s line of sight when you are interacting.</span></p><span data-dcnode-id="740" instrument_node="">
</span><h3 data-dcnode-id="736"><span data-dcnode-id="737" id="If-your-fox-kit-is-behaving-aggressively-try-these-steps"><strong data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">If your fox kit is behaving aggressively, try these steps:</span></strong></span></h3><span data-dcnode-id="735" instrument_node="">
</span><ol data-dcnode-id="715"><span data-dcnode-id="734" instrument_node="">
</span><li data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Leave the fox for a while in a large cage. This gives the fox a domain in which it feels safe, but also means it has enough room to walk around.</span></li><span data-dcnode-id="731" instrument_node="">
</span><li data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Do NOT introduce it to new people – the more new faces it sees (and new voices, new smells, etc.), the more agitated it will become.</span></li><span data-dcnode-id="728" instrument_node="">
</span><li data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Do NOT attempt any type of training. Let it be.</span></li><span data-dcnode-id="725" instrument_node="">
</span><li data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Do NOT pick up your fox kit. It needs its own space. It will come to you eventually, but only in its own time.</span></li><span data-dcnode-id="722" instrument_node="">
</span><li data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">DO let him or her see you, and talk to your fox in a soft voice. The more familiar they become with you and your voice, the more likely they are to open up to your affections.</span></li><span data-dcnode-id="719" instrument_node="">
</span><li data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Once your fox is settled, offer them a treat from your hand.</span></li><span data-dcnode-id="716" instrument_node="">
</span></ol><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">It may take up to a few weeks for your fox kit to fully adjust, but adjust it will! Some people recommend leaving the TV set on low if you leave house, so that the silence doesn’t get overbearing.</span></p><span data-dcnode-id="711" instrument_node="">
</span><h2 data-dcnode-id="707"><span data-dcnode-id="708" id="4-How-do-you-care-for-a-Canadian-or-Arctic-marble-fox"><strong data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">#4: How do you care for a Canadian or Arctic marble fox?</span></strong></span></h2><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="703"><strong data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Enclosure requirements – indoor or outdoor?</span></strong></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Foxes love the outdoors – it’s where they belong. If you keep a fox in your house, expect it to mark your carpet, furniture, clothes and blankets. Urine left to fester smells terrible in no time at all. Tip: tile floors are easier to clean than carpets! The best thing is to provide a securely fenced outdoor area in which it can roam freely.</span></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">For the cage, a large dog-style kennel will be big enough.</span></p><span data-dcnode-id="696" instrument_node="">
</span><h3 data-dcnode-id="692"><span data-dcnode-id="693" id="How-big-will-a-marble-fox-get"><strong data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">How big will a marble fox get?</span></strong></span></h3><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Males range from 18 to 27 inches (46-68cm), while females average 20 inches (52cm). they weigh approximately 7-21 lbs and 3-8 lbs respectively.</span></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Overall, if your fox spends most of its time outdoors, it will be better for you. However, it is better to keep fox kits indoors for more time for effective bonding and better security. Once it is 6 months old, treat it like an adult.</span></p><span data-dcnode-id="685" instrument_node="">
</span><h3 data-dcnode-id="681"><span data-dcnode-id="682" id="Cleaning-How-to-remove-fox-odor-in-their-fox-pen"><strong data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Cleaning: How to remove fox odor in their fox pen?</span></strong></span></h3><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Clean the cage with vinegar, water and a little dish soap. The dish soap helps to deter flies. You can use this mixture to spray the bottom of their litter pans (before adding litter). Let it dry, add newspaper, followed by a thin layer of litter. Fly strips are also invaluable in catching and deterring flies.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Clean the cage twice at week at first, and adjust according to your fox’s (or foxes’) habits.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Baking soda can also effectively remove stubborn stains. Sprinkle baking soda, then pour a little vinegar over it. Let the foam build and sit for a minute until it is a thick crust, then use a knife to remove it.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="667"><strong data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Spaying or neutering </span></strong><span data-dcnode-id="668" instrument_node="">your fox should reduce the pungency of its markings, but don’t expect it to go away completely!</span></p><span data-dcnode-id="666" instrument_node="">
</span><h3 data-dcnode-id="662"><span data-dcnode-id="663" id="Marble-fox-diet-What-do-they-eat"><strong data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Marble fox diet: What do they eat?</span></strong></span></h3><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Foxes are not particularly fussy eaters. They will eat dry dog food, ground cooked chicken or turkey, gizzards, eggs, giblets, plus others meats. Some foxes happily chomp away on vegetables and fruit. Provide a variety of foods to ensure proper nutrition. Just remember:</span></p><span data-dcnode-id="658" instrument_node="">
</span><ul data-dcnode-id="641"><span data-dcnode-id="657" instrument_node="">
</span><li data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">&nbsp;If you feed your fox live prey, such as mice or rats, and allow it to hunt them, it may start to think all small animals are fair game.</span></li><span data-dcnode-id="654" instrument_node="">
</span><li data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">&nbsp;If you feed your fox raw food, he or she may require frequent worming.</span></li><span data-dcnode-id="651" instrument_node="">
</span><li data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Grain-free dog or cat food seems to encourage healthier skin and fur.</span></li><span data-dcnode-id="648" instrument_node="">
</span><li data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Coconut oil can be rubbed into their fur and skin to make it shinier and healthier.</span></li><span data-dcnode-id="645" instrument_node="">
</span><li data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Sweet foods, such as marshmallows, may be a tasty treat, but do not provide much nutrition. Limit these foods to once a week, at most.&nbsp;</span></li><span data-dcnode-id="642" instrument_node="">
</span></ul><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Feed your foxes twice daily, and adjust according to their tastes. If your fox marks in its food or water dish, place the dishes inside something, like a milk crate or sturdy cardboard box. This way, only their head can access the dish.</span></p><span data-dcnode-id="637" instrument_node="">
</span><h3 data-dcnode-id="633"><span data-dcnode-id="634" id="Marble-fox-accessoriesnbsp"><strong data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Marble fox accessories:&nbsp;</span></strong></span></h3><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">If you want to take your fox for a walk, a harness is advisable. Start using the harness at a young age. However, the general public’s inquisitiveness might be a hindrance, and cause your fox distress. The best way to avoid this is by just walking the fox on your own property.</span></p><span data-dcnode-id="629" instrument_node="">
</span><h3 data-dcnode-id="625"><span data-dcnode-id="626" id="How-to-bond-with-foxes"><strong data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">How to bond with foxes?</span></strong></span></h3><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">A bored fox is a destructive fox. What can you do to keep your fox entertained?</span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Foxes love squeaky toys. They are also thieves by nature, and will hide objects. For this reason, the more toys, the better! You should also ‘fox-proof’ your home, to avoid certain things going missing.</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Foxes love to play with each other, or with other animals. You can also re-arrange its pen once in a while. Small changes go a long way. Hiding places and climbing spots and space to explore will all keep your fox entertained, occupied, and mentally healthy.</span></p><span data-dcnode-id="615" instrument_node="">
</span><h2 data-dcnode-id="612"><span data-dcnode-id="613" id="5-Can-marble-foxes-live-with-other-pets"><span data-dcnode-id="614" instrument_node="">#5: Can marble foxes live with other pets?</span></span></h2><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Yes – foxes love to have playmates. They are social creatures and love to have companions with which to spend their time. They are energetic animals with playful temperaments, and also like to engage in grooming.</span></p><span data-dcnode-id="608" instrument_node="">
</span><h2 data-dcnode-id="605"><span data-dcnode-id="606" id="6-Fox-scents-and-odors"><span data-dcnode-id="607" instrument_node="">#6: Fox scents and odors</span></span></h2><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Foxes have scent glands that produce a skunk-like odor when the fox feels threatened. You can surgically remove this gland (though it is better just to make sure the fox feels safe, I think!), but it will not eliminate the urine odor.</span></p><span data-dcnode-id="601" instrument_node="">
</span><h3 data-dcnode-id="597"><span data-dcnode-id="598" id="The-removal-of-scent-glands-is-not-recommended"><strong data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">The removal of scent glands is not recommended.</span></strong></span></h3><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">It is a complex procedure – more so than a skunk’s scent gland – and can be unsafe or even deadly. Leave the glands as they are.</span></p><span data-dcnode-id="593" instrument_node="">
</span><h2 data-dcnode-id="590"><span data-dcnode-id="591" id="7-Marble-fox-de-fanging"><span data-dcnode-id="592" instrument_node="">#7: Marble fox de-fanging</span></span></h2><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="588" instrument_node="">Thankfully, this is definitely not recommended. </span><strong data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">NEVER even CONSIDER having a fox’s canine teeth removed</span></strong><span data-dcnode-id="585" instrument_node="">. This will not assist in taming your fox, and could result in breaking the fox’s jaw. It is CRUEL – do not do it.</span></p><span data-dcnode-id="583" instrument_node="">
</span><h2 data-dcnode-id="580"><span data-dcnode-id="581" id="8-Marble-fox-breeding"><span data-dcnode-id="582" instrument_node="">#8: Marble fox breeding</span></span></h2><span data-dcnode-id="579" instrument_node="">
</span><h3 data-dcnode-id="575"><span data-dcnode-id="576" id="Spaying-and-neutering-foxes"><strong data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Spaying and neutering foxes</span></strong></span></h3><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Unless you plan on breeding foxes, I recommend having him neutered, or her spayed. Ideally, this should be performed by 6 months of age, or by 12 months at the latest.</span></p><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Spaying and neutering should reduce the pungency of their markings, but not eliminate it entirely. It is imperative to find a vet who is familiar with this procedure, or at least willing to research prior the procedure!</span></p><span data-dcnode-id="568" instrument_node="">
</span><h2 data-dcnode-id="565"><span data-dcnode-id="566" id="9-How-much-does-a-marble-fox-cost"><span data-dcnode-id="567" instrument_node="">#9: How much does a marble fox cost?</span></span></h2><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Like I said earlier, if you spend more than $600 on a regular fox, you are being ripped off. Russian foxes, on the other hand, cost at least $8,000. As of the latest research, there is only one breeder of Russian foxes in the United States, and he is based in Florida. Fennec foxes typically sell for $2,500 to $3,000.&nbsp;</span></p><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">It is a difficult thing to put a price on a marble Arctic fox because people are attracted to different levels of marbling, and attractiveness is subjective. My advice is to thoroughly consider your options before making any kind of purchase, and seek the opinion of a veteran fox keeper!</span></p><span data-dcnode-id="558" instrument_node="">
</span><h2 data-dcnode-id="555"><span data-dcnode-id="556" id="10-Reputable-fox-breeders"><span data-dcnode-id="557" instrument_node="">#10: Reputable fox breeders</span></span></h2><span data-dcnode-id="554" instrument_node="">
</span><h3 data-dcnode-id="550"><span data-dcnode-id="551" id="Breeders-in-the-USA"><strong data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Breeders in the USA:</span></strong></span></h3><span data-dcnode-id="549" instrument_node="">
</span><ul data-dcnode-id="527"><span data-dcnode-id="548" instrument_node="">
</span><li data-dcnode-id="544"><a data-dcnode-id="546" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lostrivergamefarm.com/index.html" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="547" instrument_node="">Lost River Game Farm</span></a><span data-dcnode-id="545" instrument_node=""> (IN)</span></li><span data-dcnode-id="543" instrument_node="">
</span><li data-dcnode-id="539"><a data-dcnode-id="541" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tinytracksexoticanimals.com/" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="542" instrument_node="">Tiny Tracks</span></a><span data-dcnode-id="540" instrument_node=""> (IN)</span></li><span data-dcnode-id="538" instrument_node="">
</span><li data-dcnode-id="534"><a data-dcnode-id="536" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hillviewexotics.net/" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="537" instrument_node="">Hillview Exotics</span></a><span data-dcnode-id="535" instrument_node=""> (OH)</span></li><span data-dcnode-id="533" instrument_node="">
</span><li data-dcnode-id="529"><a data-dcnode-id="531" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.freewebs.com/wessexoticanimals/" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="532" instrument_node="">Wess Exotic Animals</span></a><span data-dcnode-id="530" instrument_node=""> (OH)</span></li><span data-dcnode-id="528" instrument_node="">
</span></ul><span data-dcnode-id="526" instrument_node="">
</span><h3 data-dcnode-id="522"><span data-dcnode-id="523" id="Breeders-to-AVOID"><strong data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Breeders to AVOID:</span></strong></span></h3><span data-dcnode-id="521" instrument_node="">
</span><ul data-dcnode-id="510"><span data-dcnode-id="520" instrument_node="">
</span><li data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">TAME THE WILD, from Quebec, Canada</span></li><span data-dcnode-id="517" instrument_node="">
</span><li data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">ANDREW KOZAK, also known as Krayan Koz or Ziggy Koz, from New Jersey</span></li><span data-dcnode-id="514" instrument_node="">
</span><li data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Wesley Kenyon, Florida</span></li><span data-dcnode-id="511" instrument_node="">
</span></ul><span data-dcnode-id="509" instrument_node="">
</span><h2 data-dcnode-id="506"><span data-dcnode-id="507" id="Final-Thoughts"><span data-dcnode-id="508" instrument_node="">Final Thoughts</span></span></h2><span data-dcnode-id="505" instrument_node="">
</span><h3 data-dcnode-id="501"><span data-dcnode-id="502" id="Are-marble-foxes-good-pets"><strong data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Are marble foxes good pets?</span></strong></span></h3><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="497"><strong data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">What do you think? They require:</span></strong></p><span data-dcnode-id="496" instrument_node="">
</span><ul data-dcnode-id="479"><span data-dcnode-id="495" instrument_node="">
</span><li data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">A lot of maintenance – feeding twice daily and regular cleaning.</span></li><span data-dcnode-id="492" instrument_node="">
</span><li data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Regular handling – especially when they are young.</span></li><span data-dcnode-id="489" instrument_node="">
</span><li data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">A hefty upfront of cost – of the animal itself, plus cage, fencing, toys, vaccinations, spaying/neutering – plus regular payments for jabs, worming, vet fees and food.</span></li><span data-dcnode-id="486" instrument_node="">
</span><li data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Permits</span></li><span data-dcnode-id="483" instrument_node="">
</span><li data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">A constant presence – you cannot simply take your fox into the kennels if you want to take a vacation, nor can you leave it in the charge of someone without a license.</span></li><span data-dcnode-id="480" instrument_node="">
</span></ul><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Marble foxes are great exotic pets but are not for everyone. If, after reading this, you are still thinking of going down this road, then prepare yourself mentally! It’s going to be a long and expensive journey, but hopefully a rewarding one!</span></p><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">As always, let us know your thoughts in the comments below, and share this article with anyone who you think might like to keep a fox as a pet!</span></p><span data-dcnode-id="472" instrument_node="">
