oads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-8eeb0b0ecdbc4a8ab67b1aec4c6f3680&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-0&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;0&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;0&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-8eeb0b0ecdbc4a8ab67b1aec4c6f3680&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="2131"></phoenix-ad></div></aside><p data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">Of course! As a general rule, it is achievable by private owners to keep most animals that zoos do (in fact, some zoo animals in unaccredited facilities are essentially pets), provided they do not have extremely expensive requirements, such as sea lions and king penguins, and are legal.</span></p><p data-dcnode-id="2122"><span data-dcnode-id="2126" instrument_node="">Yes, even </span><a data-dcnode-id="2124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pethelpful.com/exotic-pets/tigercare"><span data-dcnode-id="2125" instrument_node="">pet tigers </span></a><span data-dcnode-id="2123" instrument_node="">are doable if you have the space and know-how. Most of these animals, however, are not for people new to the care of animals with more ‘extreme’ characteristics. In other words, these species are not popular pets for a reason—they may have bad house manners, need large enclosures, and require an owner with the flexibility to adapt to unexpected behaviors.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-0" data-dcnode-id="2119"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-0" data-dcnode-id="2120" data-zone-count="22"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot asenji retain wolf-like traits that make them more independent or reserved with strangers.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-2" data-dcnode-id="1947"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-2" data-dcnode-id="1948" data-zone-count="22"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-0adcdd09a9ab4f1c87b7c866dedd5293&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-2&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;2&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot; </span><li data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">Assume that your wolf or wolfdog will require outdoor containment with very high fencing. Most wolves do not do well indoors and are difficult to house break.</span></li><span data-dcnode-id="1824" instrument_node="">
</span><li data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">While single wolves can hardly be considered dangerous, wolfdogs can have a high degree of unpredictability because they possess both domesticated dog and wolf traits.</span></li><span data-dcnode-id="1821" instrument_node="">
</span><li data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">They should be fed a nutritionally complete (meeting the standards of AAFCO), meat-based, high-energy extruded dry dog food; with possible supplementation of (also for enrichment) whole prey items (around 5-10% of the diet).</span></li><span data-dcnode-id="1818" instrument_node="">
</span><li data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Wolves are very social just like dogs, but these needs may be more challenging to meet with animals not as well adapted to life in a human household. It is recommended that they have other wolf/wolfdog or confident large dog companions.</span></li><span data-dcnode-id="1815" instrument_node="">

 instrument_node=""> in the video is compelling and shows one of the many benefits exotic pet ownership has for animals and people, as well as how </span><em data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">environment</span></em><span data-dcnode-id="1668" instrument_node=""> is important in shaping a pet over genetics.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-4" data-dcnode-id="1664"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-4" data-dcnode-id="1665" data-zone-count="22"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-84b9c5a8ee7540e2a3be6ac07df574c5&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-4&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;4&quot;,&quot;i et owners.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-6" data-dcnode-id="1650"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-6" data-dcnode-id="1651" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-d9eb314462194d119ba8f2b4a1e955ce&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-6&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;6&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;6&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-d9eb314462194d119ba8f2b4a1e955ce&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1652"></phoenix-ad></div></aside><p data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Wiley is now a great ambassador animal that changes the perceptions of coyotes. Still, these governing bodies are rarely rational about exotic or wild animals as pets and probably won't let anyone else have Hanestad's good fortune.</span></p><h3 data-dcnode-id="1646" id="coydogs"><span data-dcnode-id="1647" instrument_node="">Coydogs</span></h3><p data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">On the other hand, coydogs cannot be regulated as native wildlife because they are hybrids between domesticated dogs and coyotes, a nuisance animal often sought for removal from the ecosystem. They are likely technically illegal to own in most states, but most people probably can't tell for sure if it's actually a hybrid or not. It's possible some dog-owners don't know their pet is a coydog, and other owners incorrectly think they have a coydog (as are many people completely wrong in thinking they have a high content wolfdog). Such hybrids are rare and should be considered dogs until proven otherwise.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-5" data-dcnode-id="1641"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-5" data-dcnode-id="1642" data-zone-count="22"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" co ntent&quot;,&quot;index&quot;:&quot;7&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;7&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-b860d64d04fb437da82307e8f18c93de&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1578"></phoenix-ad></div></aside><h2 data-dcnode-id="1574" id="3-new-guinea-singing-dogs"><span data-dcnode-id="1575" instrument_node="">3.	New Guinea Singing Dogs</span></h2><p data-dcnode-id="1564"><span data-dcnode-id="1573" instrument_node="">They look like a typical dog, but it is said that they are actually a species of 'wild' dog. Taxonomists can't seem to agree on the origin or classification of this animal; do they originate from feral domesticated dogs (and if so, would that make them not an 'exotic' pet?), are they a hybrid between dogs and dingos? Are they a subspecies or a breed? Some have classified the singing dog as a distinct species with the scientific name </span><em data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Canis hallstromi, </span></em><span data-dcnode-id="1570" instrument_node="">but later they were grouped with the Australian Dingo as a feral wild subspecies of the domestic dog, (</span><em data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Canis familiaris dingo</span></em><span data-dcnode-id="1567" instrument_node="">), and this caused zoos to stop breeding them.</span><em data-dcnode-id="1565"><br data-dcnode-id="1566"></em></p><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Whatever the scientific description, these animals are unique and are called "evolutionary significant". Native to the densely foliated, high mountains of New Guinea, in the wild, singing dogs are extremely elusive and hard to find. In captivity, breeders can be found in exotic pet circles, and they can easily make good pets for people who understand the species, or breed.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-6" data-dcnode-id="1559"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-6" data-dcnode-id="1560" data-zone-count="22"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-219f802149a548929f22567ae7982005&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quo outube-nocookie.com/embed/mwxV1wbBrfU?start=0" style="position: absolute; display: block; top: 0; max-width: 1100px; width: 100%; bottom: 0;" webkitallowfullscreen="" width="598"></phoenix-iframe></figure></div><h3 data-dcnode-id="1545" id="information-about-new-guinea-singing-dogs"><span data-dcnode-id="1546" instrument_node="">Information About New Guinea Singing Dogs</span></h3><ul data-dcnode-id="1532"><li data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Their closest relative is the dingo, which they can resemble</span></li><span data-dcnode-id="1542" instrument_node="">
</span><li data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Physically, they differ from domesticated dogs. They exhibit increased flexibility, moving more fluidly, similar to a cat.</span></li><span data-dcnode-id="1539" instrument_node="">
</span><li data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Singers are shy and reserved with strangers, not extroverted like many domestic dog breeds. They are an independent breed that will take off, following the scent of an animal if allowed off leash.</span></li><span data-dcnode-id="1536" instrument_node="">
</span><li data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">Because whether or not this animal is conserved in a species survival program is dependent on their classification as a distinct species or sub-species, the exotic pet trade can be an important player in their conservation.</span></li><span data-dcnode-id="1533" instrument_node="">

</span><li data-dcnode-id="1444"><span data-dcnode-id="1448" instrument_node="">They </span><em data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">must</span></em><span data-dcnode-id="1445" instrument_node=""> be hand-raised at an early age (5-6 weeks of age) to be a tame pet</span></li><span data-dcnode-id="1443" instrument_node="">
</span><li data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">They do not have a dog-like psychological cooperation with humans and do not understand correction.</span></li><span data-dcnode-id="1440" instrument_node="">

</span></ul><div class="m-detail--body-item m-detail--body-item-inline" data-dcnode-id="1433"><figure class="m-video mm-video--landscape l-inline" data-dcnode-id="1434" style="--embed_height:300;"><phoenix-iframe allow="autoplay; encrypted-media" allowfullscreen="" block-on-gdpr-purpose-consent="content" block-on-gdpr-vendor-consent="youtube" class="m-custom-element" data-dcnode-id="1435" frameborder="0" height="336" iframe-class="m-video--frame" iframe-id="d1G2yZMUNUQ" lazy-load="" mozallowfullscreen="" scrolling="no" src="https://www.youtube-nocookie.com/embed/d1G2yZMUNUQ?start=0" style="position: absolute; display: block; top: 0; max-width: 1100px; width: 100%; bottom: 0;" webkitallowfullscreen="" width="598"></phoenix-iframe></figure></div><h3 data-dcnode-id="1431" id="russian-domesticated-foxes"><span data-dcnode-id="1432" instrument_node="">Russian Domesticated Foxes</span></h3><p data-dcnode-id="1426"><span data-dcnode-id="1430" instrument_node="">Do not fall for the </span><a data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.google.com/url%3Fsa%3Dt%26rct%3Dj%26q%3D%26esrc%3Ds%26source%3Dweb%26cd%3D16%26cad%3Drja%26uact%3D8%26ved%3D0CDAQFjAFOAo%26url%3Dhttp%253A%252F%252Fmelissaasmith.hubpages.com%252Fhub%252FUnderstanding-Domestication-The-Ethics-of-Wild-Animals-as-Pets-and-in-Zoos%26ei%3DGSMiVa68LYuesAX1nICQAw%26usg%3DAFQjCNFNbfyx4npFMlxPeBpoSlxb6wShrw%26sig2%3Dcn2qXzm6hUmGP-h4iknEeQ" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1429" instrument_node="">domestication myth</span></a><span data-dcnode-id="1427" instrument_node="">; the idea that these foxes are 'domesticated' is misleading. When most people hear the word domestication, they think of dogs, but do domesticated chickens behave like dogs? No, dogs are a domesticated wolf species, and domesticated foxes are still foxes, despite close relation to wolves taxonomically. Like cats, they don't differ from their progenitor as substantially as wolves and dogs. They are still relatively skittish.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-8" data-dcnode-id="1423"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-8" data-dcnode-id="1424" data-zone-count="22"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-7cb30d1eb199458abe6515b2a8c293d0&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-8&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;8&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid& </span><li data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Increased tameness and seeking of human socialization. Domesticated foxes have been selectively bred to reduce fear aggression.</span></li><span data-dcnode-id="1406" instrument_node="">
</span><li data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Decreased (or removed, it's hard to verify which) odor.</span></li><span data-dcnode-id="1403" instrument_node="">
</span></ul><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">But remember, they still aren't dogs, even though some of their behaviors may cross paths. This shows the uselessness of the term, given that these animals still qualify as domesticated even though they do not drift as dramatically from wild-type foxes behaviorally as do dogs. A big player in the behavior of all animals, domesticated or otherwise, is their environment, or how they're raised. Only get a domesticated fox (if you can find one) if you are prepared for a typical fox.</span></p><p data-dcnode-id="1393"><em data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Special Statement on Sibfox.com: </span></em><span data-dcnode-id="1397" instrument_node="">This used to be a website where people could get into contact with breeders of domesticated foxes from Siberia. It now appears to have been taken over by some idiot [entitled Tame Fox: Diseases, Child Attacks, Illegal in USA] that uses the most asinine lies to discourage people from getting foxes, such as citing incidences of </span><em data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">wild</span></em><span data-dcnode-id="1394" instrument_node=""> foxes, likely rabid, biting people. It isn't credible to say the least.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-9" data-dcnode-id="1390"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-9" data-dcnode-id="1391" data-zone-count="22"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot; </span><li data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">They are a smaller species compared to red foxes and have a more mellow disposition</span></li><span data-dcnode-id="1254" instrument_node="">
</span><li data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Obviously, they can tolerate colder temperatures and might overheat in high heat.</span></li><span data-dcnode-id="1251" instrument_node="">

</span><li data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Social for a fox</span></li><span data-dcnode-id="1213" instrument_node="">

{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-2e494e758f45448d88829f7bd9b2b1aa&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-11&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],[970,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;11&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;width&quot;:970,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;B&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;11&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;id&quot;:&quot;ad-2e494e758f45448d88829f7bd9b2b1aa&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1127"></phoenix-ad></div></aside><p data-dcnode-id="1120"><span data-dcnode-id="1124" instrument_node="">In my opinion, their size makes them very manageable, and unlike some of the other foxes, they have </span><em data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">little smell</span></em><span data-dcnode-id="1121" instrument_node="">, an enormously desirable trait. Being desert foxes, they conserve water and have dry droppings. Some people might let them free-roam, but it is recommended they have their own cage or room. Once again, these are still foxes and they still might make bad pets to people expecting the home adaptability of domesticated dogs.</span></p><h3 data-dcnode-id="1118" id="negatives-of-owning-a-fennec-fox"><span data-dcnode-id="1119" instrument_node="">Negatives of Owning a Fennec Fox</span></h3><ul data-dcnode-id="1102"><li data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">It might seem like a good idea at first, but it is very dangerous to take them outside even in tight-fitting jacket harnesses. If they escape, you will likely never see them again. There are many stories of fennecs and other exotics slipping out of seemingly secure harnesses.</span></li><span data-dcnode-id="1115" instrument_node="">
</span><li data-dcnode-id="1110"><span data-dcnode-id="1114" instrument_node="">Fennecs are extremely loud and hyper, as </span><a data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DSu3ovMsFXMg" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1113" instrument_node="">this video </span></a><span data-dcnode-id="1111" instrument_node="">presents effectively.</span></li><span data-dcnode-id="1109" instrument_node="">
</span><li data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Litter training is possible but probably won't be 100% consistent.</span></li><span data-dcnode-id="1106" instrument_node="">
</span><li data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">They can be temperamental and go through unexpected behavior shifts upon maturity, so despite the fact that this animal might be a good 'beginner species' into high-maintenance exotic pets, be prepared for the changes that dog and cat owners typically don't go through.</span></li><span data-dcnode-id="1103" instrument_node="">
</span></ul><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-12" data-dcnode-id="1099"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-12" data-dcnode-id="1100" data-zone-count="22"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-9b64b4663635457c8e19a9448f8cccbe&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-12&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;12&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;D&quot;],&quot;sl  qualified facilities for the following reasons:</span></p><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">.    Exotic pet owners can easily acquire a USDA exhibitor license to circumvent state laws</span></p><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">.    As has been confirmed by audits of the agency, the USDA is unable to effectively enforce the limited and inadequate standards of the Animal Welfare Act (AWA)</span></p><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">.    Licensees can (and often do) keep animals in inhumane and unsafe conditions, yet can still be in compliance with the AWA</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-21" data-dcnode-id="846"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-21" data-dcnode-id="847" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-af6b1af6f46d488c957a51207571609a&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adG -id="829"><span data-dcnode-id="830" instrument_node="">.    USDA licensees are often the biggest problem</span></p><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">In addition, the ZAA must not be confused with the highly respected Association of Zoos and Aquariums (AZA). The deceptively named ZAA is a fringe group with weak standards that endorses poorly run roadside zoos, traveling zoos, and private menageries, and promotes the private ownership of exotic pets as well as the commercialization of wildlife. Despite threats to public safety and animal welfare, ZAA standards allow public contact with dangerous wild animals. In 2012, when Michigan Governor Rick Snyder vetoed changes to Michigan's Large Carnivore Act he stated, "[Expanding permission to ZAA facilities to keep large carnivores in Michigan] could lead to gaps in public health protection and animal welfare."</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-22" data-dcnode-id="824"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-22" data-dcnode-id="825" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-d9e6c8f quot;index&quot;:&quot;24&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-0bd9ea10ef774bf9b13f4144ec28485b&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="761"></phoenix-ad></div></aside><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Under the legislation link, it says to post your address.  I'm currently living in Ohio but will be attending the University of North Carolina in the fall and moving there afterwords.  Should I just post UNC's zip code and my email address?  It'll be a few months before I'll be living in NC.</span></p><p data-dcnode-id="753"><strong data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Nicole</span></strong><span data-dcnode-id="754" instrument_node=""> on April 08, 2015:</span></p><p data-dcnode-id="749"><span data-dcnode-id="752" instrument_node="">Here's the bill link </span><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.usark.org/wp-content/uploads/2015/04/2015-NC-H554.pdf" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="751" instrument_node="">http://www.usark.org/wp-content/uploads/2015/04/20...</span></a></p><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">I looked under "exemptions" where it lists all of the statuses that would exempt animal owners.  Those include AZA institutions, circuses, research facilities, accredited sanctuaries, veterinarians, and wildlife organizations.  Truthfully I don't understand why it wouldn't list ZAA as well, but that is what the bill means, right?  I don't want to send something out  with the wrong information.  Thanks for the link!</span></p><p data-dcnode-id="743"><strong data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Melissa A Smith (author)</span></strong><span data-dcnode-id="744" instrument_node=""> from New York on April 08, 2015:</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-20" data-dcnode-id="740"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-20" data-dcnode-id="741" data-zone-count="22"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-41c530a9e7a0445d9b8359df5a34fe29&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-20&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;20&quot;,&quot;isOutstream&quot;:false, -a not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-6d93cc1ad59b41f88e9066c4ccf4b5f1&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-20&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],[970,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;20&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;width&quot;:970,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;B&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;20&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;id&quot;:&quot;ad-6d93cc1ad59b41f88e9066c4ccf4b5f1&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="736"></phoenix-ad></div></aside><p data-dcnode-id="729"><span data-dcnode-id="733" instrument_node="">Nicole, yes, I heard about that yesterday and sent emails to all the sponsors and I've received two responses. Please also do so, using this format: </span><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nea.org/home/19657.htm" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="732" instrument_node="">http://www.nea.org/home/19657.htm</span></a><span data-dcnode-id="730" instrument_node="">  Be very polite, and state you will be a resident of NC (as I will be, we've bought our land down there).</span></p><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">"but NO USDA exemptions: to own one of the listed animals, you must be specifically AZA certified, not even ZAA works."</span></p><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">How is that possible? NC has many respectable zoos with no AZA. This would shut down businesses. I highly doubt NC's mostly Republican representatives would push for that. I know that in my area, that would be the end of Tregembo Animal Park (admittedly it's crappy, but that's not the point. It's a major attraction that is advertised in travel booklets in hotels). Duke Lemur Center is highly respected and isn't accredited by the AZA, so that can't possibly be the case.</span></p><p data-dcnode-id="721"><strong data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Nicole</span></strong><span data-dcnode-id="722" instrument_node=""> on April 08, 2015:</span></p><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Hey Melissa, great article but this comment isn't about canids: North Carolina just introduced an exotics bill and I thought you should know. It's H554 and would only ban certain mammals and primates, including all felids (even servals and bobcats), gray/ red wolves, all primates, hyenas, and bears. There is a grandfather clause for existing owners, but NO USDA exemptions: to own one of the listed animals, you must be specifically AZA certified, not even ZAA works.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-21" data-dcnode-id="716"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-21" data-dcnode-id="717" data-zone-count="22"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-0a89ab1798db48 ativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;width&quot;:970,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;B&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;21&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;id&quot;:&quot;ad-e11b343f8cb5482da141affccb9274e2&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="712"></phoenix-ad></div></aside><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">This could potentially ruin all of my future plans as a future North Carolinian. Please help us fight it. :(</span></p><p data-dcnode-id="704"><strong data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Albert Kim</span></strong><span data-dcnode-id="705" instrument_node=""> from Nairobi Kenya on April 06, 2015:</span></p><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Its surprisingly odd but I have individuals who keep lions, leopards and the cheetah but these caged if domesticated when mature. Once domesticated when they are young and not exposed to the adults and the wild, they make good pets. Thanks for sharing.</span></p><p data-dcnode-id="698"><strong data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Melissa A Smith (author)</span></strong><span data-dcnode-id="699" instrument_node=""> from New York on April 06, 2015:</span></p><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Thanks Peggy, that is the right attitude to have.</span></p><p data-dcnode-id="692"><strong data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Peggy Woods</span></strong><span data-dcnode-id="693" instrument_node=""> from Houston, Texas on April 06, 2015:</span></p><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">It is interesting learning about all of these exotic animals but we will just stick with our cats and dog as far as household pets.  We do know a lady that owns a couple of tortoises and apparently her backyard will never be on a home tour for its beauty.  To each his or her own!  Hopefully people who wish to own exotic pets do it legally and responsibly.  Pinning this to my animals board.</span></p></div><div class="m-detail--sponsor" data-dcnode-id="688"></div><footer class="m-detail--footer" data-dcnode-id="671"><div class="m-detail--meta" data-dcnode-id="686"><div class="m-description--list" data-dcnode-id="687"></div></div><aside class="m-detail--author-box" data-dcnode-id="672"><div class="m-detail--author-content" data-dcnode-id="673"><div class="m-detail--author-byline" data-dcnode-id="680"><div class="m-detail--author-byline-label" data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">By</span></div><span data-dcnode-id="683" instrument_node=""> </span><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pethelpful.com/%40melissaasmith" onclick="return phoenixTrackClickEvent(this, event);" phx-track-id="Author Name" rel="author"><span data-dcnode-id="682" instrument_node="">Melissa A Smith</span></a></div><div class="m-detail--author-social is-minified" data-dcnode-id="674"><div class="m-description--list" data-dcnode-id="675"><a class="m-icon-button" data-dcnode-id="676" onclick="return phoenixTrackCl
