l" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cansumer.ca/author/dorathygass/" itemprop="url" rel="author noopener noreferrer" target="_self" title="View all posts by Dorathy Gass"><span class="author-name" data-dcnode-id="1076" itemprop="name"><span data-dcnode-id="1077" instrument_node="">Dorathy Gass</span></span></a></span><p class="post-last-modified" data-dcnode-id="1070"><span data-dcnode-id="1073" instrument_node="">Updated on </span><time class="post-last-modified-td" data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">November 25, 2021</span></time></p></div></div></div><div class="site grid-container container grid-parent" data-dcnode-id="174" id="page"><div class="site-content" data-dcnode-id="175" id="content"><div class="content-area grid-parent mobile-grid-100 grid-100 tablet-grid-100" data-dcnode-id="176" id="primary"><main class="site-main" data-dcnode-id="177" id="main"><article class="post-3031 post type-post status-publish format-standard has-post-thumbnail category-life tag-list infinite-scroll-item" data-dcnode-id="405" id="post-3031" itemscope="" itemtype="https://schema.org/CreativeWork"><div class="inside-article" data-dcnode-id="406"><div class="entry-content" data-dcnode-id="517" itemprop="text"><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">When most Canadians think about taking on the responsibility of owning a pet, getting a dog, cat, budgie, goldfish, hamster, or lizard typically comes to mind.</span></p><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Yet, there are a wide range of rarer and more unique animals that fall off the beaten path when it comes to pet ownership. Below is an overview of 10 exotic animals that can be legally owned as pets in Canada and links to rules for each province at the bottom.</span></p><p class="editorsnote has-white-background-color has-background" data-dcnode-id="1054"><strong data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Note:</span></strong><span data-dcnode-id="1060" instrument_node=""> While it should go without saying, just because it’s legal (or rather,</span><em data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node=""> not illegal</span></em><span data-dcnode-id="1057" instrument_node="">) to own an exotic pet, doesn’t mean its a good idea for you and the animal. Pets require you to commit time, energy and money to their health, well-being and the safety of both them and other people. For more, see </span><a data-dcnode-id="1055" data-id="#areyouready" data-type="internal" href="#areyouready"><span data-dcnode-id="1056" instrument_node="">are you ready to get an exotic pet?</span></a></p><div class="code-block code-block-1" data-dcnode-id="1046" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="1053" instrument_node=""> </span><span data-dcnode-id="1051" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-1467550080191354" data-ad-format="auto" data-ad-slot="5514910824" data-dcnode-id="1050" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1049" instrument_node=""> </span></div><div class="wp-container-1 wp-block-group TOCBlock" data-dcnode-id="1003"><div class="wp-block-group__inner-container" data-dcnode-id="1004"><h2 data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Contents</span></h2><div class="ez-toc-v2_0_17 counter-flat" data-dcnode-id="1005" id="ez-toc-container"><nav data-dcnode-id="1006"><ul class="ez-toc-list ez-toc-list-level-1" data-dcnode-id="1007"><li class="ez-toc-page-1" data-dcnode-id="1041"><a class="ez-toc-link ez-toc-heading-1" data-dcnode-id="1042" href="#1-potbellied-pigs" title="1. Potbellied pigs"><span data-dcnode-id="1043" instrument_node="">1. Potbellied pigs</span></a></li><li class="ez-toc-page-1" data-dcnode-id="1038"><a class="ez-toc-link ez-toc-heading-2" data-dcnode-id="1039" href="#2-capybara" title="2. Capybara"><span data-dcnode-id="1040" instrument_node="">2. Capybara</span></a></li><li class="ez-toc-page-1" data-dcnode-id="1035"><a class="ez-toc-link ez-toc-heading-3" data-dcnode-id="1036" href="#3-mini-donkey" title="3. Mini donkey"><span data-dcnode-id="1037" instrument_node="">3. Mini donkey</span></a></li><li class="ez-toc-page-1" data-dcnode-id="1032"><a class="ez-toc-link ez-toc-heading-4" data-dcnode-id="1033" href="#4-sugar-glider" title="4. Sugar glider"><span data-dcnode-id="1034" instrument_node="">4. Sugar glider</span></a></li><li class="ez-toc-page-1" data-dcnode-id="1029"><a class="ez-toc-link ez-toc-heading-5" data-dcnode-id="1030" href="#5-fennec-fox" title="5. Fennec fox"><span data-dcnode-id="1031" instrument_node="">5. Fennec fox</span></a></li><li class="ez-toc-page-1" data-dcnode-id="1026"><a class="ez-toc-link ez-toc-heading-6" data-dcnode-id="1027" href="#6-hedgehog" title="6. Hedgehog"><span data-dcnode-id="1028" instrument_node="">6. Hedgehog</span></a></li><li class="ez-toc-page-1" data-dcnode-id="1023"><a class="ez-toc-link ez-toc-heading-7" data-dcnode-id="1024" href="#7-hyacinth-macaw" title="7. Hyacinth macaw"><span data-dcnode-id="1025" instrument_node="">7. Hyacinth macaw</span></a></li><li class="ez-toc-page-1" data-dcnode-id="1020"><a class="ez-toc-link ez-toc-heading-8" data-dcnode-id="1021" href="#8-muntjac-deer" title="8. Muntjac deer"><span data-dcnode-id="1022" instrument_node="">8. Muntjac deer</span></a></li><li class="ez-toc-page-1" data-dcnode-id="1017"><a class="ez-toc-link ez-toc-heading-9" data-dcnode-id="1018" href="#9-pygmy-goat" title="9. Pygmy goat"><span data-dcnode-id="1019" instrument_node="">9. Pygmy goat</span></a></li><li class="ez-toc-page-1" data-dcnode-id="1014"><a class="ez-toc-link ez-toc-heading-10" data-dcnode-id="1015" href="#10-serval" title="10. Serval"><span data-dcnode-id="1016" instrument_node="">10. Serval</span></a></li><li class="ez-toc-page-1" data-dcnode-id="1011"><a class="ez-toc-link ez-toc-heading-11" data-dcnode-id="1012" href="#are-you-ready-to-get-an-exotic-pet" title="Are you ready to get an exotic pet?"><span data-dcnode-id="1013" instrument_node="">Are you ready to get an exotic pet?</span></a></li><li class="ez-toc-page-1" data-dcnode-id="1008"><a class="ez-toc-link ez-toc-heading-12" data-dcnode-id="1009" href="#exotic-pets-and-canadian-law" title="Exotic Pets and Canadian Law"><span data-dcnode-id="1010" instrument_node="">Exotic Pets and Canadian Law</span></a></li></ul></nav></div></div></div><h2 data-dcnode-id="999"><span class="ez-toc-section" data-dcnode-id="1002" id="1-potbellied-pigs"></span><span data-dcnode-id="1001" instrument_node="">1. Potbellied pigs</span><span class="ez-toc-section-end" data-dcnode-id="1000"></span></h2><div class="wp-block-image" data-dcnode-id="994"><figure class="aligncenter size-large" data-dcnode-id="995"><noscript data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">&lt;img width="960" height="640" src="https://cansumer.ca/wp-content/uploads/2020/02/Pot-Bellied-Pigs.png" alt="" class="wp-image-3077" srcset="https://cansumer.ca/wp-content/uploads/2020/02/Pot-Bellied-Pigs.png 960w, https://cansumer.ca/wp-content/uploads/2020/02/Pot-Bellied-Pigs-300x200.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Pot-Bellied-Pigs-768x512.png 768w, https://cansumer.ca/wp-content/uploads/2020/02/Pot-Bellied-Pigs-600x400.png 600w" sizes="(max-width: 960px) 100vw, 960px" /&gt;</span></noscript><img alt="" class="wp-image-3077 lazyloaded" data-dcnode-id="996" data-sizes="(max-width: 960px) 100vw, 960px" data-src="https://cansumer.ca/wp-content/uploads/2020/02/Pot-Bellied-Pigs.png" data-srcset="https://cansumer.ca/wp-content/uploads/2020/02/Pot-Bellied-Pigs.png 960w, https://cansumer.ca/wp-content/uploads/2020/02/Pot-Bellied-Pigs-300x200.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Pot-Bellied-Pigs-768x512.png 768w, https://cansumer.ca/wp-content/uploads/2020/02/Pot-Bellied-Pigs-600x400.png 600w" height="640" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cansumer.ca/wp-content/uploads/2020/02/Pot-Bellied-Pigs.png&amp;raw" srcset="https://cansumer.ca/wp-content/uploads/2020/02/Pot-Bellied-Pigs.png 960w, https://cansumer.ca/wp-content/uploads/2020/02/Pot-Bellied-Pigs-300x200.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Pot-Bellied-Pigs-768x512.png 768w, https://cansumer.ca/wp-content/uploads/2020/02/Pot-Bellied-Pigs-600x400.png 600w" width="960"></figure></div><ul data-dcnode-id="974"><li data-dcnode-id="990"><strong data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Average Lifespan: </span></strong><span data-dcnode-id="991" instrument_node="">12 to 18 years</span></li><li data-dcnode-id="983"><strong data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Average Height/Weight: </span></strong><span data-dcnode-id="987" instrument_node="">38 to 42 cm,</span><strong data-dcnode-id="985"><span data-dcnode-id="986" instrument_node=""> </span></strong><span data-dcnode-id="984" instrument_node="">35 to 60 lbs</span></li><li data-dcnode-id="979"><strong data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Best Aspect: </span></strong><span data-dcnode-id="980" instrument_node="">Intelligent and trainable</span></li><li data-dcnode-id="975"><strong data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Biggest Downside: </span></strong><span data-dcnode-id="976" instrument_node="">May be destructive when bored</span></li></ul><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">These adorable little guys (and gals) are quickly becoming the norm as a common household pet, thanks to their intelligence, and the fact that they can be trained to perform a variety tricks, just like a dog. It’s important to note, as cute and sweet as potbellied pigs are, they do require a lot of food, plenty of exercise, and can get destructive when they get bored (and this can happen pretty easily).</span></p><div class="wp-block-button aligncenter is-style-outline" data-dcnode-id="969"><a class="wp-block-button__link" data-dcnode-id="970" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spca.bc.ca/news/mini-pigs/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="971" instrument_node="">Pot-bellied pigs as pets</span></a></div><h2 data-dcnode-id="965"><span class="ez-toc-section" data-dcnode-id="968" id="2-capybara"></span><span data-dcnode-id="967" instrument_node="">2. Capybara</span><span class="ez-toc-section-end" data-dcnode-id="966"></span></h2><div class="wp-block-image" data-dcnode-id="960"><figure class="aligncenter size-large" data-dcnode-id="961"><noscript data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">&lt;img width="1024" height="683" src="https://cansumer.ca/wp-content/uploads/2020/02/Capybara-1024x683.png" alt="" class="wp-image-3086" srcset="https://cansumer.ca/wp-content/uploads/2020/02/Capybara-1024x683.png 1024w, https://cansumer.ca/wp-content/uploads/2020/02/Capybara-300x200.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Capybara-768x512.png 768w, https://cansumer.ca/wp-content/uploads/2020/02/Capybara-1536x1024.png 1536w, https://cansumer.ca/wp-content/uploads/2020/02/Capybara-600x400.png 600w, https://cansumer.ca/wp-content/uploads/2020/02/Capybara.png 1600w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><img alt="" class="wp-image-3086 lazyloaded" data-dcnode-id="962" data-sizes="(max-width: 1024px) 100vw, 1024px" data-src="https://cansumer.ca/wp-content/uploads/2020/02/Capybara-1024x683.png" data-srcset="https://cansumer.ca/wp-content/uploads/2020/02/Capybara-1024x683.png 1024w, https://cansumer.ca/wp-content/uploads/2020/02/Capybara-300x200.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Capybara-768x512.png 768w, https://cansumer.ca/wp-content/uploads/2020/02/Capybara-1536x1024.png 1536w, https://cansumer.ca/wp-content/uploads/2020/02/Capybara-600x400.png 600w, https://cansumer.ca/wp-content/uploads/2020/02/Capybara.png 1600w" height="683" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cansumer.ca/wp-content/uploads/2020/02/Capybara-1024x683.png&amp;raw" srcset="https://cansumer.ca/wp-content/uploads/2020/02/Capybara-1024x683.png 1024w, https://cansumer.ca/wp-content/uploads/2020/02/Capybara-300x200.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Capybara-768x512.png 768w, https://cansumer.ca/wp-content/uploads/2020/02/Capybara-1536x1024.png 1536w, https://cansumer.ca/wp-content/uploads/2020/02/Capybara-600x400.png 600w, https://cansumer.ca/wp-content/uploads/2020/02/Capybara.png 1600w" width="1024"></figure></div><ul data-dcnode-id="943"><li data-dcnode-id="956"><strong data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Average Lifespan: </span></strong><span data-dcnode-id="957" instrument_node="">8 to 10 years</span></li><li data-dcnode-id="952"><strong data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Average Height/Weight:</span></strong><span data-dcnode-id="953" instrument_node=""> 50 to 62 cm, 75 to 150 lb</span></li><li data-dcnode-id="948"><strong data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Best Aspect: </span></strong><span data-dcnode-id="949" instrument_node="">Very social</span></li><li data-dcnode-id="944"><strong data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Biggest Downside: </span></strong><span data-dcnode-id="945" instrument_node="">Need a lot of attention</span></li></ul><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Looking for a larger-than-life furry friend? Capybaras are basically over-sized hamsters! Stemming from South America, they can grow up to be as big as 170 pounds, larger than a mid-sized dog. While they could make a great Canadian pet, they do need a ton of attention, plus some specialty items to accommodate their needs. They require a pool for swimming, and non-toxic grass. If you have little ones, you may want to wait before adding this exotic animal to the family, as they can also get aggressive, and have sharp teeth.</span></p><div class="wp-block-button aligncenter is-style-outline" data-dcnode-id="938"><a class="wp-block-button__link" data-dcnode-id="939" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//petponder.com/is-it-wise-to-keep-capybara-as-pets" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="940" instrument_node="">Capybara as pets</span></a></div><h2 data-dcnode-id="934"><span class="ez-toc-section" data-dcnode-id="937" id="3-mini-donkey"></span><span data-dcnode-id="936" instrument_node="">3. Mini donkey</span><span class="ez-toc-section-end" data-dcnode-id="935"></span></h2><div class="wp-block-image" data-dcnode-id="929"><figure class="aligncenter size-large" data-dcnode-id="930"><noscript data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">&lt;img width="960" height="638" src="https://cansumer.ca/wp-content/uploads/2020/02/Mini-Donkey.png" alt="" class="wp-image-3085" srcset="https://cansumer.ca/wp-content/uploads/2020/02/Mini-Donkey.png 960w, https://cansumer.ca/wp-content/uploads/2020/02/Mini-Donkey-300x199.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Mini-Donkey-768x510.png 768w, https://cansumer.ca/wp-content/uploads/2020/02/Mini-Donkey-600x400.png 600w" sizes="(max-width: 960px) 100vw, 960px" /&gt;</span></noscript><img alt="" class="wp-image-3085 lazyloaded" data-dcnode-id="931" data-sizes="(max-width: 960px) 100vw, 960px" data-src="https://cansumer.ca/wp-content/uploads/2020/02/Mini-Donkey.png" data-srcset="https://cansumer.ca/wp-content/uploads/2020/02/Mini-Donkey.png 960w, https://cansumer.ca/wp-content/uploads/2020/02/Mini-Donkey-300x199.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Mini-Donkey-768x510.png 768w, https://cansumer.ca/wp-content/uploads/2020/02/Mini-Donkey-600x400.png 600w" height="638" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cansumer.ca/wp-content/uploads/2020/02/Mini-Donkey.png&amp;raw" srcset="https://cansumer.ca/wp-content/uploads/2020/02/Mini-Donkey.png 960w, https://cansumer.ca/wp-content/uploads/2020/02/Mini-Donkey-300x199.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Mini-Donkey-768x510.png 768w, https://cansumer.ca/wp-content/uploads/2020/02/Mini-Donkey-600x400.png 600w" width="960"></figure></div><ul data-dcnode-id="912"><li data-dcnode-id="925"><strong data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Average Lifespan: </span></strong><span data-dcnode-id="926" instrument_node="">28 to 32 years</span></li><li data-dcnode-id="921"><strong data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Average Height/Weight: </span></strong><span data-dcnode-id="922" instrument_node="">91 cm, 200 to 450 lb.</span></li><li data-dcnode-id="917"><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Best Aspect: </span></strong><span data-dcnode-id="918" instrument_node="">Affectionate</span></li><li data-dcnode-id="913"><strong data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Biggest Downside: </span></strong><span data-dcnode-id="914" instrument_node="">Stubborn</span></li></ul><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">If you live out in the country, or have a nice large backyard, consider adding a mini donkey to your family. These animals need an open field for grazing and exercising, as well as a salt lick and hay for maintenance. It’s also important to note that they can live for about&nbsp; 25-35 years, so deciding on this animal as a pet can truly be a lifelong commitment.</span></p><div class="wp-block-button aligncenter is-style-outline" data-dcnode-id="907"><a class="wp-block-button__link" data-dcnode-id="908" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bustle.com/p/6-reasons-you-need-a-miniature-donkey-as-a-pet-immediately-not-that-you-really-need-any-convincing-3544157" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="909" instrument_node="">Mini donkeys as pets</span></a></div><h2 data-dcnode-id="903"><span class="ez-toc-section" data-dcnode-id="906" id="4-sugar-glider"></span><span data-dcnode-id="905" instrument_node="">4. Sugar glider</span><span class="ez-toc-section-end" data-dcnode-id="904"></span></h2><div class="wp-block-image" data-dcnode-id="898"><figure class="aligncenter size-large" data-dcnode-id="899"><noscript data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">&lt;img width="800" height="450" src="https://cansumer.ca/wp-content/uploads/2020/02/Sugar-Glider.png" alt="" class="wp-image-3084" srcset="https://cansumer.ca/wp-content/uploads/2020/02/Sugar-Glider.png 800w, https://cansumer.ca/wp-content/uploads/2020/02/Sugar-Glider-300x169.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Sugar-Glider-768x432.png 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><img alt="" class="wp-image-3084 lazyloaded" data-dcnode-id="900" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://cansumer.ca/wp-content/uploads/2020/02/Sugar-Glider.png" data-srcset="https://cansumer.ca/wp-content/uploads/2020/02/Sugar-Glider.png 800w, https://cansumer.ca/wp-content/uploads/2020/02/Sugar-Glider-300x169.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Sugar-Glider-768x432.png 768w" height="450" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cansumer.ca/wp-content/uploads/2020/02/Sugar-Glider.png&amp;raw" srcset="https://cansumer.ca/wp-content/uploads/2020/02/Sugar-Glider.png 800w, https://cansumer.ca/wp-content/uploads/2020/02/Sugar-Glider-300x169.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Sugar-Glider-768x432.png 768w" width="800"></figure></div><ul data-dcnode-id="881"><li data-dcnode-id="894"><strong data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Average Lifespan:</span></strong><span data-dcnode-id="895" instrument_node=""> 8 to 10 years</span></li><li data-dcnode-id="890"><strong data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Average Height/Weight:</span></strong><span data-dcnode-id="891" instrument_node=""> 24 to 30 cm, 0.25 to 0.3 lb</span></li><li data-dcnode-id="886"><strong data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Best Aspect:</span></strong><span data-dcnode-id="887" instrument_node=""> Playful</span></li><li data-dcnode-id="882"><strong data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Biggest Downside:&nbsp;</span></strong><span data-dcnode-id="883" instrument_node="">Need a lot of attention</span></li></ul><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">They look just as sweet as they sound! Part of the marsupial family (along with koala bears and kangaroos), they get their “sugar glider” name thanks to a membrane they have that allows them to stretch from their wrists to ankles, which essentially has them gliding in the air. They’re pretty smart too, and can be trained much like a dog, remembering their name and performing tricks and such.</span></p><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Still, there is a catch with sugar gliders – they are colony animals – meaning, if you adopt one, you’ll have to adopt at least two more, as they prefer to live with other sugar gliders. Failing to do so can cause the animal to become depressed.</span></p><div class="wp-block-button aligncenter is-style-outline" data-dcnode-id="874"><a class="wp-block-button__link" data-dcnode-id="875" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.petmd.com/exotic/care/all-about-sugar-gliders" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="876" instrument_node="">Sugar gliders as pets</span></a></div><h2 data-dcnode-id="870"><span class="ez-toc-section" data-dcnode-id="873" id="5-fennec-fox"></span><span data-dcnode-id="872" instrument_node="">5. Fennec fox</span><span class="ez-toc-section-end" data-dcnode-id="871"></span></h2><div class="wp-block-image" data-dcnode-id="865"><figure class="aligncenter size-large" data-dcnode-id="866"><noscript data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">&lt;img width="960" height="540" src="https://cansumer.ca/wp-content/uploads/2020/02/Fennec-Fox.png" alt="" class="wp-image-3083" srcset="https://cansumer.ca/wp-content/uploads/2020/02/Fennec-Fox.png 960w, https://cansumer.ca/wp-content/uploads/2020/02/Fennec-Fox-300x169.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Fennec-Fox-768x432.png 768w" sizes="(max-width: 960px) 100vw, 960px" /&gt;</span></noscript><img alt="" class="wp-image-3083 lazyloaded" data-dcnode-id="867" data-sizes="(max-width: 960px) 100vw, 960px" data-src="https://cansumer.ca/wp-content/uploads/2020/02/Fennec-Fox.png" data-srcset="https://cansumer.ca/wp-content/uploads/2020/02/Fennec-Fox.png 960w, https://cansumer.ca/wp-content/uploads/2020/02/Fennec-Fox-300x169.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Fennec-Fox-768x432.png 768w" height="540" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cansumer.ca/wp-content/uploads/2020/02/Fennec-Fox.png&amp;raw" srcset="https://cansumer.ca/wp-content/uploads/2020/02/Fennec-Fox.png 960w, https://cansumer.ca/wp-content/uploads/2020/02/Fennec-Fox-300x169.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Fennec-Fox-768x432.png 768w" width="960"></figure></div><ul data-dcnode-id="848"><li data-dcnode-id="861"><strong data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Average Lifespan: </span></strong><span data-dcnode-id="862" instrument_node="">10 to 13 years</span></li><li data-dcnode-id="857"><strong data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Average Height/Weight: </span></strong><span data-dcnode-id="858" instrument_node="">20 cm, 1.5 to 3.5 lb</span></li><li data-dcnode-id="853"><strong data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Best Aspect: </span></strong><span data-dcnode-id="854" instrument_node="">Can learn to use litter box</span></li><li data-dcnode-id="849"><strong data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Biggest Downside:</span></strong><span data-dcnode-id="850" instrument_node=""> Barking</span></li></ul><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Hard to think of a fox as a pet, where in many areas of Canada, pet owners struggle to protect their cats and dogs from this animal; however, the truth is, they can be fairly friendly, with the energy of dog, and can be trained to use the litter box like a cat.</span></p><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">While they do spend a lot of time sleeping, owning this exotic pet can keep you busy between their feeding, playtime, and socialization. They also tend to bark quite a bit, so if you have neighbours who aren’t fans of loud animals noises, perhaps the fennec fox isn’t for you.</span></p><div class="wp-block-button aligncenter is-style-outline" data-dcnode-id="841"><a class="wp-block-button__link" data-dcnode-id="842" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//exopetguides.com/fennec-fox/fennec-fox-as-a-pet/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="843" instrument_node="">Fennec foxes as pets</span></a></div><h2 data-dcnode-id="837"><span class="ez-toc-section" data-dcnode-id="840" id="6-hedgehog"></span><span data-dcnode-id="839" instrument_node="">6. Hedgehog</span><span class="ez-toc-section-end" data-dcnode-id="838"></span></h2><div class="wp-block-image" data-dcnode-id="832"><figure class="aligncenter size-large" data-dcnode-id="833"><noscript data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">&lt;img width="960" height="637" src="https://cansumer.ca/wp-content/uploads/2020/02/Hedgehog.png" alt="" class="wp-image-3082" srcset="https://cansumer.ca/wp-content/uploads/2020/02/Hedgehog.png 960w, https://cansumer.ca/wp-content/uploads/2020/02/Hedgehog-300x199.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Hedgehog-768x510.png 768w" sizes="(max-width: 960px) 100vw, 960px" /&gt;</span></noscript><img alt="" class="wp-image-3082 lazyloaded" data-dcnode-id="834" data-sizes="(max-width: 960px) 100vw, 960px" data-src="https://cansumer.ca/wp-content/uploads/2020/02/Hedgehog.png" data-srcset="https://cansumer.ca/wp-content/uploads/2020/02/Hedgehog.png 960w, https://cansumer.ca/wp-content/uploads/2020/02/Hedgehog-300x199.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Hedgehog-768x510.png 768w" height="637" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cansumer.ca/wp-content/uploads/2020/02/Hedgehog.png&amp;raw" srcset="https://cansumer.ca/wp-content/uploads/2020/02/Hedgehog.png 960w, https://cansumer.ca/wp-content/uploads/2020/02/Hedgehog-300x199.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Hedgehog-768x510.png 768w" width="960"></figure></div><ul data-dcnode-id="815"><li data-dcnode-id="828"><strong data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Average Lifespan: </span></strong><span data-dcnode-id="829" instrument_node="">3 to 6 years</span></li><li data-dcnode-id="824"><strong data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Average Height/Weight: </span></strong><span data-dcnode-id="825" instrument_node="">8 to 12 cm long, 1 to 3 lb</span></li><li data-dcnode-id="820"><strong data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Best Aspect: </span></strong><span data-dcnode-id="821" instrument_node="">Low maintenance</span></li><li data-dcnode-id="816"><strong data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Biggest Downside: </span></strong><span data-dcnode-id="817" instrument_node="">Tough to hold</span></li></ul><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">If you are looking for an alternative to a hamster or guinea pig, a hedgehog may be the right exotic pet for you. They don’t require too much time on maintenance, just regular feedings and cage cleaning, and spend most of the day sleeping as they are nocturnal. While their outer skin is prickly, these animals are cute as heck, and a little shy too – so it’ll take time for them to warm up to you and their surroundings.</span></p><div class="wp-block-button aligncenter is-style-outline" data-dcnode-id="810"><a class="wp-block-button__link" data-dcnode-id="811" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.petmd.com/exotic/complete-guide-hedgehogs" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="812" instrument_node="">Hedgehogs as pets</span></a></div><h2 data-dcnode-id="806"><span class="ez-toc-section" data-dcnode-id="809" id="7-hyacinth-macaw"></span><span data-dcnode-id="808" instrument_node="">7. Hyacinth macaw</span><span class="ez-toc-section-end" data-dcnode-id="807"></span></h2><div class="wp-block-image" data-dcnode-id="801"><figure class="aligncenter size-large" data-dcnode-id="802"><noscript data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">&lt;img width="960" height="640" src="https://cansumer.ca/wp-content/uploads/2020/02/Hyacinth-Macaw.png" alt="" class="wp-image-3081" srcset="https://cansumer.ca/wp-content/uploads/2020/02/Hyacinth-Macaw.png 960w, https://cansumer.ca/wp-content/uploads/2020/02/Hyacinth-Macaw-300x200.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Hyacinth-Macaw-768x512.png 768w, https://cansumer.ca/wp-content/uploads/2020/02/Hyacinth-Macaw-600x400.png 600w" sizes="(max-width: 960px) 100vw, 960px" /&gt;</span></noscript><img alt="" class="wp-image-3081 lazyloaded" data-dcnode-id="803" data-sizes="(max-width: 960px) 100vw, 960px" data-src="https://cansumer.ca/wp-content/uploads/2020/02/Hyacinth-Macaw.png" data-srcset="https://cansumer.ca/wp-content/uploads/2020/02/Hyacinth-Macaw.png 960w, https://cansumer.ca/wp-content/uploads/2020/02/Hyacinth-Macaw-300x200.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Hyacinth-Macaw-768x512.png 768w, https://cansumer.ca/wp-content/uploads/2020/02/Hyacinth-Macaw-600x400.png 600w" height="640" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cansumer.ca/wp-content/uploads/2020/02/Hyacinth-Macaw.png&amp;raw" srcset="https://cansumer.ca/wp-content/uploads/2020/02/Hyacinth-Macaw.png 960w, https://cansumer.ca/wp-content/uploads/2020/02/Hyacinth-Macaw-300x200.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Hyacinth-Macaw-768x512.png 768w, https://cansumer.ca/wp-content/uploads/2020/02/Hyacinth-Macaw-600x400.png 600w" width="960"></figure></div><ul data-dcnode-id="784"><li data-dcnode-id="797"><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Average Lifespan:</span></strong><span data-dcnode-id="798" instrument_node=""> 50 to 60+ years</span></li><li data-dcnode-id="793"><strong data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Average Height/Weight:</span></strong><span data-dcnode-id="794" instrument_node=""> 100 cm, 3 to 4 lb</span></li><li data-dcnode-id="789"><strong data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Best Aspect:</span></strong><span data-dcnode-id="790" instrument_node=""> Can learn words and phrases</span></li><li data-dcnode-id="785"><strong data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Biggest Downside:</span></strong><span data-dcnode-id="786" instrument_node=""> Noisy</span></li></ul><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">If you are more inclined to a feathered friend, the hyacinth macaw is part of the parrot family, and can be a very sweet and smart pet. With that said, they are on the endangered species list, and can cost a pretty penny with a price tag of over $10,000 for each bird. They can also get aggressive and loud if not socialized properly, or given ample room to fly around and exercise.</span></p><div class="wp-block-button aligncenter is-style-outline" data-dcnode-id="779"><a class="wp-block-button__link" data-dcnode-id="780" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lafeber.com/pet-birds/species/hyacinth-macaw/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="781" instrument_node="">Hyacinth macaw as pets</span></a></div><h2 data-dcnode-id="775"><span class="ez-toc-section" data-dcnode-id="778" id="8-muntjac-deer"></span><span data-dcnode-id="777" instrument_node="">8. Muntjac deer</span><span class="ez-toc-section-end" data-dcnode-id="776"></span></h2><div class="wp-block-image" data-dcnode-id="770"><figure class="aligncenter size-large" data-dcnode-id="771"><noscript data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">&lt;img width="960" height="640" src="https://cansumer.ca/wp-content/uploads/2020/02/Muntjac-Deer.png" alt="" class="wp-image-3080" srcset="https://cansumer.ca/wp-content/uploads/2020/02/Muntjac-Deer.png 960w, https://cansumer.ca/wp-content/uploads/2020/02/Muntjac-Deer-300x200.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Muntjac-Deer-768x512.png 768w, https://cansumer.ca/wp-content/uploads/2020/02/Muntjac-Deer-600x400.png 600w" sizes="(max-width: 960px) 100vw, 960px" /&gt;</span></noscript><img alt="" class="wp-image-3080 lazyloaded" data-dcnode-id="772" data-sizes="(max-width: 960px) 100vw, 960px" data-src="https://cansumer.ca/wp-content/uploads/2020/02/Muntjac-Deer.png" data-srcset="https://cansumer.ca/wp-content/uploads/2020/02/Muntjac-Deer.png 960w, https://cansumer.ca/wp-content/uploads/2020/02/Muntjac-Deer-300x200.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Muntjac-Deer-768x512.png 768w, https://cansumer.ca/wp-content/uploads/2020/02/Muntjac-Deer-600x400.png 600w" height="640" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cansumer.ca/wp-content/uploads/2020/02/Muntjac-Deer.png&amp;raw" srcset="https://cansumer.ca/wp-content/uploads/2020/02/Muntjac-Deer.png 960w, https://cansumer.ca/wp-content/uploads/2020/02/Muntjac-Deer-300x200.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Muntjac-Deer-768x512.png 768w, https://cansumer.ca/wp-content/uploads/2020/02/Muntjac-Deer-600x400.png 600w" width="960"></figure></div><ul data-dcnode-id="753"><li data-dcnode-id="766"><strong data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Average Lifespan: </span></strong><span data-dcnode-id="767" instrument_node="">10 to 14 years</span></li><li data-dcnode-id="762"><strong data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Average Height/Weight: </span></strong><span data-dcnode-id="763" instrument_node="">45 to 52 cm, 20 to 25 lb</span></li><li data-dcnode-id="758"><strong data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Best Aspect: </span></strong><span data-dcnode-id="759" instrument_node="">Affectionate and love to play</span></li><li data-dcnode-id="754"><strong data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Biggest Downside: </span></strong><span data-dcnode-id="755" instrument_node="">Bark/scream</span></li></ul><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Hailing from Southeast Asia, the leaf muntjac is the smallest deer of the breed and can grow up to an average height of 20 inches, weighing a mere 10-20 pounds. They can be trained to respond to their own names, use a litter box (just like a cat), and can live both outdoors or indoors; however, those who own a muntjac deer must ensure to set up a safe fence around their home.</span></p><div class="wp-block-button aligncenter is-style-outline" data-dcnode-id="748"><a class="wp-block-button__link" data-dcnode-id="749" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//animal-world.com/encyclo/critters/MuntjacDeer/MuntjacDeer.php" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="750" instrument_node="">Muntjac deer as pets</span></a></div><h2 data-dcnode-id="744"><span class="ez-toc-section" data-dcnode-id="747" id="9-pygmy-goat"></span><span data-dcnode-id="746" instrument_node="">9. Pygmy goat</span><span class="ez-toc-section-end" data-dcnode-id="745"></span></h2><div class="wp-block-image" data-dcnode-id="739"><figure class="aligncenter size-large" data-dcnode-id="740"><noscript data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">&lt;img width="1024" height="604" src="https://cansumer.ca/wp-content/uploads/2020/02/Pygmy-Goat.png" alt="" class="wp-image-3079" srcset="https://cansumer.ca/wp-content/uploads/2020/02/Pygmy-Goat.png 1024w, https://cansumer.ca/wp-content/uploads/2020/02/Pygmy-Goat-300x177.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Pygmy-Goat-768x453.png 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><img alt="" class="lazyload wp-image-3079" data-dcnode-id="741" data-sizes="(max-width: 1024px) 100vw, 1024px" data-src="https://cansumer.ca/wp-content/uploads/2020/02/Pygmy-Goat.png" data-srcset="https://cansumer.ca/wp-content/uploads/2020/02/Pygmy-Goat.png 1024w, https://cansumer.ca/wp-content/uploads/2020/02/Pygmy-Goat-300x177.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Pygmy-Goat-768x453.png 768w" height="604" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%201024%20604%22%3E%3C/svg%3E" width="1024"></figure></div><ul data-dcnode-id="722"><li data-dcnode-id="735"><strong data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Average Lifespan:</span></strong><span data-dcnode-id="736" instrument_node=""> 10 to 12 years</span></li><li data-dcnode-id="731"><strong data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Average Height/Weight: </span></strong><span data-dcnode-id="732" instrument_node="">40 to 60cm, 75 lbs.</span></li><li data-dcnode-id="727"><strong data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Best Aspect: </span></strong><span data-dcnode-id="728" instrument_node="">Friendly</span></li><li data-dcnode-id="723"><strong data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Biggest Downside: </span></strong><span data-dcnode-id="724" instrument_node="">Noisy</span></li></ul><p data-dcnode-id="719"><span data-dcnode-id="721" instrument_node="">If you are looking for a high-energy pet, a pygmy goat may be a good option. They have a certain liveliness to them, and spend much of their day simply prancing around. In fact, they make great pets as they are easy to handle, friendly, and very social. They are fine to roam in an average-heighted backyard, but tend to get a little noisy at times, so this could cause an issue with neighbours.</span><br data-dcnode-id="720"></p><div class="wp-block-button aligncenter is-style-outline" data-dcnode-id="716"><a class="wp-block-button__link" data-dcnode-id="717" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fetchfind.com/blog/2017/02/10/can-you-keep-miniature-goats-as-pets" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="718" instrument_node="">Pygmy goats as pets</span></a></div><h2 data-dcnode-id="712"><span class="ez-toc-section" data-dcnode-id="715" id="10-serval"></span><span data-dcnode-id="714" instrument_node="">10. Serval</span><span class="ez-toc-section-end" data-dcnode-id="713"></span></h2><div class="wp-block-image" data-dcnode-id="707"><figure class="aligncenter size-large" data-dcnode-id="708"><noscript data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">&lt;img width="960" height="638" src="https://cansumer.ca/wp-content/uploads/2020/02/Serval.png" alt="" class="wp-image-3078" srcset="https://cansumer.ca/wp-content/uploads/2020/02/Serval.png 960w, https://cansumer.ca/wp-content/uploads/2020/02/Serval-300x199.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Serval-768x510.png 768w, https://cansumer.ca/wp-content/uploads/2020/02/Serval-600x400.png 600w" sizes="(max-width: 960px) 100vw, 960px" /&gt;</span></noscript><img alt="" class="lazyload wp-image-3078" data-dcnode-id="709" data-sizes="(max-width: 960px) 100vw, 960px" data-src="https://cansumer.ca/wp-content/uploads/2020/02/Serval.png" data-srcset="https://cansumer.ca/wp-content/uploads/2020/02/Serval.png 960w, https://cansumer.ca/wp-content/uploads/2020/02/Serval-300x199.png 300w, https://cansumer.ca/wp-content/uploads/2020/02/Serval-768x510.png 768w, https://cansumer.ca/wp-content/uploads/2020/02/Serval-600x400.png 600w" height="638" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20960%20638%22%3E%3C/svg%3E" width="960"></figure></div><ul data-dcnode-id="690"><li data-dcnode-id="703"><strong data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Average Lifespan: </span></strong><span data-dcnode-id="704" instrument_node="">20 years</span></li><li data-dcnode-id="699"><strong data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Average Height/Weight:</span></strong><span data-dcnode-id="700" instrument_node=""> 54 to 62 cm, 18 to 40 lb.</span></li><li data-dcnode-id="695"><strong data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Best Aspect: </span></strong><span data-dcnode-id="696" instrument_node="">High energy, playful</span></li><li data-dcnode-id="691"><strong data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Biggest Downside: </span></strong><span data-dcnode-id="692" instrument_node="">Difficult to contain</span></li></ul><p data-dcnode-id="685"><span data-dcnode-id="689" instrument_node="">Servals are part of the Savannah cat family and share a similar fur pattern to cheetahs. They can get up to 40 pounds when they mature, and tend to be more active at night, and sleepy during the day. With that said, these animals are allowed in most Canadian provinces, but restricted by generations. A fine example of this is that Alberta </span><a data-dcnode-id="687" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alberta.ca/wildlife-as-pets.aspx" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="688" instrument_node="">only allows F4 generations or lower (i.e. F5, F6, etc.)</span></a><span data-dcnode-id="686" instrument_node=""> of the serval within the province.</span></p><div class="wp-block-button aligncenter is-style-outline" data-dcnode-id="682"><a class="wp-block-button__link" data-dcnode-id="683" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spca.bc.ca/faqs/do-serval-cats-make-good-house-pets/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="684" instrument_node="">Servals as pets</span></a></div><h2 data-dcnode-id="678" id="areyouready"><span class="ez-toc-section" data-dcnode-id="681" id="are-you-ready-to-get-an-exotic-pet"></span><span data-dcnode-id="680" instrument_node="">Are you ready to get an exotic pet?</span><span class="ez-toc-section-end" data-dcnode-id="679"></span></h2><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">After “is it legal?”, ask yourself these questions:</span></p><ul data-dcnode-id="661"><li data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Is it safe for myself and others around me?</span></li><li data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Is it compatible with other pets? Humans?</span></li><li data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Do I have time for its routine requirements (feeding, walking, bathing, playing, etc.)?</span></li><li data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Do I have access to suitable veterinary care?</span></li><li data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Can I afford to feed, shelter and pay for its vet bills?</span></li><li data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Can I shelter it safely with enough space?</span></li><li data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Will the smell/noise/sight of it bother me or my neighbours?</span></li></ul><h2 data-dcnode-id="657"><span class="ez-toc-section" data-dcnode-id="660" id="exotic-pets-and-canadian-law"></span><span data-dcnode-id="659" instrument_node="">Exotic Pets and Canadian Law</span><span class="ez-toc-section-end" data-dcnode-id="658"></span></h2><p data-dcnode-id="652"><span data-dcnode-id="656" instrument_node="">Below is an overview of how each province and territory regulates exotic animals, if any needed applications/registrations/permits are needed, and whether or not they are overseen at either the provincial or municipal level. It’s important to note that regardless of what province someone resides in, a </span><a data-dcnode-id="654" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//travel.gc.ca/travelling/documents/cites-permits" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="655" instrument_node="">Convention on International Trade in Endangered Species of Wild Fauna and Flora (CITES)</span></a><span data-dcnode-id="653" instrument_node=""> permit might be needed.</span></p><h3 data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Alberta</span></h3><p data-dcnode-id="642"><span data-dcnode-id="649" instrument_node="">This province has some thorough regulations around exotic pet ownership, and in most cases, a permit is required for most of these types of animals. While no certain species are prohibited, </span><a data-dcnode-id="647" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alberta.ca/wildlife-import-export-permits-overview.aspx" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="648" instrument_node="">the province does have specific rules around specific animals</span></a><span data-dcnode-id="646" instrument_node="">, and there may also be municipal guidelines that are in affect when it comes to your pet. It is advised that before you fully decide to take on an exotic pet, contact the </span><a data-dcnode-id="644" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alberta.ca/fish-and-wildlife-contacts.aspx" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="645" instrument_node="">Fish and Wildlife Office</span></a><span data-dcnode-id="643" instrument_node=""> in your area to determine if a permit is needed, and the steps around this process.</span></p><h3 data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">British Columbia</span></h3><p data-dcnode-id="635"><span data-dcnode-id="639" instrument_node="">In BC, exotic animals are referred to as “controlled alien species”, and the province </span><a data-dcnode-id="637" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www2.gov.bc.ca/assets/gov/environment/plants-animals-and-ecosystems/controlled-alien-species/cas-common-all.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="638" instrument_node="">compiled a list of over 1,000 of these animals</span></a><span data-dcnode-id="636" instrument_node=""> in 2009 in an effort to regulate these species due to the potential threat they pose to property, wildlife and wildlife habitat, as well as people.</span></p><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">In some instances, individuals that live in BC may be allowed to possess controlled alien species, and in these cases, possession permits need to be applied for. There are more than 22 municipal governments in the province that have their own bylaws when it comes to these regulations around these types of animals, and these may be more restrictive than what the province has laid out.</span></p><h3 data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Manitoba</span></h3><p data-dcnode-id="626"><span data-dcnode-id="630" instrument_node="">Manitoba has a makeshift of province-wide laws when it comes to exotic pet ownership, with the Association of Manitoba Municipalities recently creating guidelines around possession. Those in this province should reach out to municipalities when it comes to what kind of animals are prohibited, and what permit requirements are needed. Individuals can also call or email</span><a data-dcnode-id="628" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.mb.ca/sd/fish_and_wildlife/index.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="629" instrument_node=""> Manitoba’s Sustainable Development</span></a><span data-dcnode-id="627" instrument_node=""> department for further direction.</span></p><h3 data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">New Brunswick</span></h3><p data-dcnode-id="616"><span data-dcnode-id="623" instrument_node="">Exotic pets require a permit, unless listed under Schedule A of the province’s </span><a data-dcnode-id="621" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www2.gnb.ca/content/gnb/en/contacts/dept_renderer.139.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="622" instrument_node="">Fish and Wildlife Act</span></a><span data-dcnode-id="620" instrument_node="">, which exempts just over 40 species. For more information, or if you have specific questions, contact New Brunswick’s </span><a data-dcnode-id="618" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//laws.gnb.ca/en/showdoc/cs/F-14.1" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="619" instrument_node="">Environment and Local Government department</span></a><span data-dcnode-id="617" instrument_node="">.</span></p><h3 data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">&nbsp;Newfoundland and Labrador</span></h3><p data-dcnode-id="606"><span data-dcnode-id="613" instrument_node="">The province offers an insight on all species that can enter without a permit via the </span><a data-dcnode-id="611" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.assembly.nl.ca/Legislation/sr/Regulations/rc961156.htm%23SchedB_" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="612" instrument_node="">Wildlife Act of Newfoundland</span></a><span data-dcnode-id="610" instrument_node="">. It’s important to note that all others require a permit, and it is the responsibility of the pet owner to do so. The province has also provided a clear outline around exotic pet ownership </span><a data-dcnode-id="608" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flr.gov.nl.ca/wildlife/biodiversity/invasive_alien_species/travel_possession_import_brochure.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="609" instrument_node="">via a recent brochure</span></a><span data-dcnode-id="607" instrument_node="">.</span></p><h3 data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Northwest Territories</span></h3><p data-dcnode-id="597"><a data-dcnode-id="602" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbc.ca/doczone/m_features/exotic-pets-laws-in-canada" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="603" instrument_node="">No specific species</span></a><span data-dcnode-id="601" instrument_node=""> are banned from entering this territory; however, permits are needed, as well as a health certificate from a veterinarian stating that the animal is free from disease and in good health. Once the application is submitted, an individual must wait on approval from the </span><a data-dcnode-id="599" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.nt.ca/en/contact-gnwt" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="600" instrument_node="">Deputy Minister</span></a><span data-dcnode-id="598" instrument_node=""> for a decision.</span></p><h3 data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Nova Scotia</span></h3><p data-dcnode-id="587"><span data-dcnode-id="594" instrument_node="">Nova Scotia offers a nice outline around animals that are </span><a data-dcnode-id="592" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//novascotia.ca/natr/wildlife/laws/captivewildlife.asp" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="593" instrument_node="">prohibited in the province</span></a><span data-dcnode-id="591" instrument_node="">, and those </span><em data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">not on this list</span></em><span data-dcnode-id="588" instrument_node=""> simply require a permit.</span></p><h3 data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Nunavut</span></h3><p data-dcnode-id="580"><span data-dcnode-id="584" instrument_node="">This Canadian territory has a lax view on exotic pets, with no specific laws around ownership. Their </span><a data-dcnode-id="582" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canlii.org/en/nu/laws/stat/snu-2003-c-26/latest/snu-2003-c-26.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="583" instrument_node="">Wildlife Act</span></a><span data-dcnode-id="581" instrument_node=""> deals mostly with native species that reside in the region.</span></p><h3 data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Ontario</span></h3><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Surprisingly, Ontario is currently the only province in Canada that lacks formal province-wide legislation as it relates to exotic animal ownership. The power around this was given to municipalities via the 2003 Ontario Municipal Act, therefore, exotic animal bylaws are not standardized, and can vary between cities and townships across the province. Ensure to check with local municipalities to confirm requirements and review animal by-laws in your area.</span></p><h3 data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Prince Edward Island</span></h3><p data-dcnode-id="569"><span data-dcnode-id="573" instrument_node="">PEI has a comprehensive list of animals that are </span><a data-dcnode-id="571" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.princeedwardisland.ca/en/information/communities-land-and-environment/prohibited-wildlife" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="572" instrument_node="">prohibited</span></a><span data-dcnode-id="570" instrument_node="">, and permits are not only required for ownership, but for selling or importing specific species as well. If your exotic pet escapes, owners are also responsible for recapturing them, as well as any costs linked with all this.</span></p><h3 data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Quebec</span></h3><p data-dcnode-id="562"><span data-dcnode-id="566" instrument_node="">Quebec is one of the few provinces that offers extensive </span><a data-dcnode-id="564" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//legisquebec.gouv.qc.ca/en/ShowDoc/cr/C-61.1%2C%2520r.%25205" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="565" instrument_node="">specifics</span></a><span data-dcnode-id="563" instrument_node=""> around which exotic animals don’t (and do) require permits for ownership.</span></p><h3 data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Saskatchewan</span></h3><p data-dcnode-id="552"><span data-dcnode-id="559" instrument_node="">Much like Quebec, Saskatchewan offers an outline of </span><a data-dcnode-id="557" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.qp.gov.sk.ca/documents/English/Statutes/Statutes/W13-12.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="558" instrument_node="">specific animals that do require permits for ownership in the province</span></a><span data-dcnode-id="556" instrument_node="">, and those that do not. While there aren’t animals that are outright banned from Saskatchewan, the government has not been issuing out permits for certain species for some time now. It’s also important to note, that municipal governments in the province also have bylaws when it comes to exotic pets, around </span><a data-dcnode-id="554" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.saskatoon.ca/content/bylaw-7860-animal-control-bylaw-1999" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="555" instrument_node="">control and regulation</span></a><span data-dcnode-id="553" instrument_node="">.</span></p><h3 data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Yukon</span></h3><p data-dcnode-id="545"><span data-dcnode-id="549" instrument_node="">Yukon’s </span><a data-dcnode-id="547" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gov.yk.ca/legislation/acts/wildlife.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="548" instrument_node="">Wildlife Act</span></a><span data-dcnode-id="546" instrument_node=""> currently has a ban on all animals that are “not indigenous to the Yukon and that in its natural habitat is usually found wild in nature”. Therefore, if you reside in this area of Canada, there’s no leeway when it comes to exotic pet ownership in this region.</span></p><h3 data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Local and municipal bylaws</span></h3><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">If your province doesn’t have any rules against keeping the animal you’re considering as a pet, that doesn’t necessarily mean you’re in the clear. Keeping farm and exotic animals within city limits is against the law in many municipalities, so check your local bylaws before proceeding.</span></p><h2 data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">What to read next</span></h2><ul data-dcnode-id="532"><li data-dcnode-id="536"><a data-dcnode-id="537" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cansumer.ca/animals-in-canada/" rel="noopener noreferrer" target="_self"><span data-dcnode-id="538" instrument_node="">23 Animals You Will Find in Canada</span></a></li><li data-dcnode-id="533"><a data-dcnode-id="534" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cansumer.ca/most-dangerous-animals-canada/" rel="noopener noreferrer" target="_self"><span data-dcnode-id="535" instrument_node="">10 Most Dangerous Animals in Canada</span></a></li></ul><h2 data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Sources</span></h2><ul data-dcnode-id="523"><li data-dcnode-id="527"><a data-dcnode-id="528" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alberta.ca/wildlife-as-pets.aspx" target="_blank"><span data-dcnode-id="529" instrument_node="">https://www.alberta.ca/wildlife-as-pets.aspx</span></a></li><li data-dcnode-id="524"><a data-dcnode-id="525" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.storybookmonkeys.org/canadian_laws.htm" target="_blank"><span data-dcnode-id="526" instrument_node="">https://www.storybookmonkeys.org/canadian_laws.htm</span></a></li></ul><h2 data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Over to you</span></h2><p data-dcnode-id="518"><span data-dcnode-id="520" instrument_node="">We’re interested to know – which one of these animals would you want most as a pet? Did we miss any that are allowed in Canada? Let us know by leaving a comment below!</span><br data-dcnode-id="519"></p></div><div class="author-box" data-dcnode-id="499"><h3 class="author-box-title" data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">About the author</span></h3><div class="author-card" data-dcnode-id="500"><div class="author-card-avatar" data-dcnode-id="509"><span data-dcnode-id="514" instrument_node=""> </span><a data-dcnode-id="510" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cansumer.ca/author/dorathygass/" rel="noopener noreferrer" target="_self" title="View all posts"><noscript data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">&lt;img data-del="avatar" sr
