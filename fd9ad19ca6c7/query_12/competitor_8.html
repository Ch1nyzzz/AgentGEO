quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-7c1b9e2e2a844e69b312f88bb6958f83&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-0&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;0&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;0&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-7c1b9e2e2a844e69b312f88bb6958f83&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="2383"></phoenix-ad></div></aside><p data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">They bear a strong resemblance to the domestic dog, begging the question: can they also be kept as pets? The short answer is: yes. Many animals one might only expect to find in a zoo can be privately owned and some even as house pets. The practice of keeping so-called exotic pets is controversial, but to anyone who approves of owning pet cats, the arguments against it don't always hold much water.</span></p><p data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">It's important to keep in mind, however, that owning a fox is unlike owning dogs and cats. Most exotic pets lack popularity, because the general public is unwilling to tolerate their traits and needs that pertain to activity level, house manners, and housing requirements. If you are adaptable and do not have unreasonable expectations for foxes to behave like calmer domesticated pets, perhaps a fox can be for you.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-0" data-dcnode-id="2374"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-0" data-dcnode-id="2375" data-zone-count="22"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quo abies.</span></p><p data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">This is a big part of why foxes that aren't exclusively house pets can be an extreme burden to owners, due to the complexity of the laws regarding their possession. You must determine with concrete certainty that foxes are legal in your state, county, and residential association.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-6" data-dcnode-id="1509"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-6" data-dcnode-id="1510" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-08299074f8214ed8bda6d0d4d58ed974&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-6&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;6&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;n node-id="1495"><figure class="m-video mm-video--landscape l-inline" data-dcnode-id="1496" style="--embed_height:300;"><phoenix-iframe allow="autoplay; encrypted-media" allowfullscreen="" block-on-gdpr-purpose-consent="content" block-on-gdpr-vendor-consent="youtube" class="m-custom-element" data-dcnode-id="1497" frameborder="0" height="336" iframe-class="m-video--frame" iframe-id="h4jNl7-uXjo" lazy-load="" mozallowfullscreen="" scrolling="no" src="https://www.youtube-nocookie.com/embed/h4jNl7-uXjo?start=0" style="position: absolute; display: block; top: 0; max-width: 1100px; width: 100%; bottom: 0;" webkitallowfullscreen="" width="598"></phoenix-iframe></figure></div><h2 data-dcnode-id="1493" id="what-about-domesticated-foxes"><span data-dcnode-id="1494" instrument_node="">What About Domesticated Foxes?</span></h2><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">You may have heard that Russian researchers once pioneered an experiment where they selectively bred red foxes for tameness and this resulted in animals that were significantly more "dog-like." This is indeed true. In 1959, the Russian geneticist Dmitry K. Belyaev began experimenting with breeding domesticated foxes. He did this largely for the purpose of studying why there appeared to be so many anatomical and physiological characteristics being passed down through the domestication of wolves and dogs—such as changes in body size and fur coloration, wavy or curly hair, and drooping ears—even when the domestication process was largely based on breeding for behavioral traits. This program continues at The Institute of Cytology and Genetics in Novosibirsk, Siberia.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-7" data-dcnode-id="1488"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-7" data-dcnode-id="1489" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-b9d930f202064da483002a3a12f08edb&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-9&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;9&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;9&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-b9d930f202064da483002a3a12f08edb&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1386"></phoenix-ad></div></aside><h3 data-dcnode-id="1381" id="pros-to-keeping-a-pet-fox"><strong data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Pros to Keeping a Pet Fox</span></strong></h3><p data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Foxes are undoubtedly a unique and interesting pet. There probably isn’t a better conversation starter. Like all uncommon exotic pets, their unique traits and behaviors will keep their owner interested and captivated. Having the opportunity to live and bond with an animal like a fox is an amazing experience. For such a positive experience to persist, however, you will need to overcome the drawbacks of fox ownership.</span></p><h3 data-dcnode-id="1376" id="cons-to-keeping-a-pet-fox"><strong data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node=""> Cons to Keeping a Pet Fox</span></strong></h3><ul data-dcnode-id="1344"><li data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Foxes can be very loud, especially if they are cooped up inside all day.</span></li><span data-dcnode-id="1373" instrument_node="">
</span><li data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Red foxes are notorious for their "skunky" urine, and most will scent mark. The smell is said by owners to be impossible to remove. If you are sensitive to the idea of your house having a permanent odor, an indoor red fox is not for you.</span></li><span data-dcnode-id="1370" instrument_node="">
</span><li data-dcnode-id="1366"><span data-dcnode-id="1369" instrument_node="">They are very high-energy animals that needs lots of opportunities to run, play, forage, and dig. Non-desert foxes will generally require an outdoor enclosure measuring around 10' x 10' at the very least (such as in the video below). The enclosure must have a double-door entrance and be triple-checked to be escape proof. </span><strong data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">If you don't have abundant outdoor space for a fox to run around in, then you probably shouldn't own one.</span></strong></li><span data-dcnode-id="1365" instrument_node="">
</span><li data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Their behaviors might frustrate a person expecting the adaptability of a socialized dog or cat. Foxes can be flighty. They may not want to cuddle with you very often!</span></li><span data-dcnode-id="1362" instrument_node="">
</span><li data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">They are also highly intelligent and extremely curious. They are quite likely to get into and potentially wreak havoc on anything within their vicinity, especially if left alone for long durations of time.</span></li><span data-dcnode-id="1359" instrument_node="">
</span><li data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">Foxes are individuals. Just because your friend's fox acts a certain way or was easy to litter train does not mean the same will happen with yours.</span></li><span data-dcnode-id="1356" instrument_node="">
</span><li data-dcnode-id="1352"><span data-dcnode-id="1355" instrument_node="">They are illegal to own in most states, and activists are eternally fighting to make it so in all states. </span><em data-dcnode-id="1353"><br data-dcnode-id="1354"></em></li><span data-dcnode-id="1351" instrument_node="">
</span><li data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">If a bite report from a fox (or other exotic mammal) is made, the animal will likely be confiscated to be killed and tested for rabies, unless the bite recipient volunteers for rabies treatment. Medical professionals are mandated to report such bites to the Centers for Disease Control and Prevention.</span></li><span data-dcnode-id="1348" instrument_node="">
</span><li data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Foxes are crepuscular and will tend to be awake in the evening and night. If they don't have an outdoor enclosure, an outlet for their energy, and a training-savvy owner, they may destroy furniture.</span></li><span data-dcnode-id="1345" instrument_node="">

am&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;10&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-b775838661344097b3a4fcda5f2f844c&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1334"></phoenix-ad></div></aside><h2 data-dcnode-id="1330" id="can-foxes-be-litter-trained"><span data-dcnode-id="1331" instrument_node="">Can Foxes Be Litter Trained?</span></h2><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Various success is reported with foxes using the litter box. For fennec foxes, the litter box is intermittently used. Though being desert foxes, urination is not excessive and the droppings are dry.</span></p><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Red and grey foxes may use the litter box with nearly a 100% success rate, but this does not include scent-marking behavior. Mammals often mark their territory with urine, and this cannot be trained out of them.</span></p><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Additionally, fox urine is extremely pungent and exceedingly difficult to remove from fabrics. It is said to smell much, much worse than cat or dog urine, and special enzymes will often be required just to break down the chemicals within it.</span></p zes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1307"></phoenix-ad></div></aside><p data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Choose a high-quality and nutritionally complete (AAFCO) commercial food as the base of the diet. Many websites will model their fox diets off of what the species consumes in the wild under the impression that "natural" is best. This is not always the best route for foxes (or even domesticated pets), because relying on raw foods likely will result in the diet being nutritionally incomplete. It can also have the unintended consequence of introducing unnecessary bacteria that can be harmful to the owner and, in some cases, even the animal.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-12" data-dcnode-id="1300"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-12" data-dcnode-id="1301" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;s culation.</span></p><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Another element to keep in mind is that pet foxes might also need to be stimulated through the feeding process and potentially even require opportunities to forage for their food. As a result, you might have to occasionally hide food for them to find or possibly even construct something that the fox will then need to rip apart in order to get their food.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-10" data-dcnode-id="1293"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-10" data-dcnode-id="1294" data-zone-count="22"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot; ng:</span></strong><span data-dcnode-id="1221" instrument_node=""> This is a recommended method for use with all warm-blooded animals. A good book that is recommended by beginners and zoological professionals alike for learning how to train all animals is </span><em data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Don't Shoot the Dog!: The New Art of Teaching and Training</span></em><span data-dcnode-id="1218" instrument_node=""> by Karen Pryor.</span></li><span data-dcnode-id="1216" instrument_node="">
</span><li data-dcnode-id="1212"><strong data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Harness Training</span></strong><span data-dcnode-id="1213" instrument_node="">: Condition your fox to accept the use of a harness by starting the training early in life. Many foxes have escaped from harnesses of all types (jackets, H-shaped), however, so use extreme caution when utilizing these.</span></li><span data-dcnode-id="1211" instrument_node="">

 In North Dakota, following an anonymous bite report, the silver pet fox was confiscated from the home of Eric and Tara Hiatt by animal control. During the confiscation, Vader unsurprisingly bit one of the officers that did not use the proper means to restrain the animal, despite repeated warnings from the owners that he could bite. Vader was taken to the pound, and the Hiatts received his collar the very next day, as he was euthanized immediately.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-12" data-dcnode-id="1119"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-12" data-dcnode-id="1120" data-zone-count="22"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&q uid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;B&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;12&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;id&quot;:&quot;ad-a89f44e7b6e44af1af06c5fccbd52c03&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1115"></phoenix-ad></div></aside><p data-dcnode-id="1108"><span data-dcnode-id="1112" instrument_node="">The incident sheds light on some serious issues with pet foxes and other exotics. First and most importantly, </span><strong data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">do not take your exotic pets out in public places—especially carnivores and primates</span></strong><span data-dcnode-id="1109" instrument_node="">.</span></p><h3 data-dcnode-id="1106" id="swiper-the-fox"><span data-dcnode-id="1107" instrument_node="">Swiper the Fox</span></h3><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">On Halloween in 2010, Alayna Sitterson set out to Reston Town Center in Virginia with her pet silver fox, Swiper, who was wearing a dog skeleton costume. The outdoor venture ended when Fairfax County animal control officers confiscated the animal and charged Sitterson with unlawful possession of wildlife. The traumatic event ended when the police returned Swiper after consulting with the Virginia Department of Game and Inland Fisheries. They determined the fox was legal due to his silver coloring, proving he was a "domesticated" fox, which is legal in Virginia.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-16" data-dcnode-id="1101"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-16" data-dcnode-id="1102" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-823930c2906e48cfb6f4d7f251e0a9e8&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-16&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;16&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;16&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-823930c2906e48cfb6f4d7f251e0a9e8&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1103"></phoenix-ad></div></aside><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Sitterson naively saw her pet fox as being good as any "normal" pet. In a perfect world, this might be the case. But despite Swiper's legal status, the knee-jerk reaction that the public will likely have to such a shocking sight can invite trouble.</span></p><aside class="m-pullquote l-inline is-aligned-center" data-dcnode-id="1090" tml-render-layout="inline"><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1095"><strong data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Even Just Having a Pet Fox Can Invite Trouble</span></strong></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Even if you are sure you're legally allowed to own a pet fox, you can still run into legal troubles defending that right—especially if a stranger reports you. So it's best to keep your fox's existence relatively quiet.</span></p><span data-dcnode-id="1091" instrument_node="">

:[[300,250],[728,90],[970,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;20&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;width&quot;:970,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;B&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;20&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;id&quot;:&quot;ad-fc5da4a4fb834e9d99f95ac78e2b6b77&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="725"></phoenix-ad></div></aside><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">The gray fox (together with the Channel Islands fox) is the most basal canid, meaning all other canines are more closely related to each other than to the gray fox.  However it's actually not kept all that often, and information on foxes seems to be mostly on the genus /Vulpes/.  It's likely that it doesn't have a skunky odor to its urine, and neither does the bat-eared fox (which is also not closely related to true foxes), however I have not been able to determine one way or another.</span></p><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">I've heard both that the gray fox is both the most "cat-like" and the most "dog-like" of foxes, but I've never talked to anyone who kept one firsthand.  I know nothing whatsoever of the bat fox, but it's also likely not particularly similar to true foxes personality-wise.</span></p><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">I've always liked gray foxes though.  If I lived somewhere where foxes were legal and had space, it's the only canid I could see myself plausibly keeping.</span></p><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Also, I'd rather not disabuse legislators of the idea that non-wild colors makes for a domesticated species.  It's fairly easy to get non-wild color forms in any animal after a few generations, and given how irrational people are about "domestic" animals, it would make keeping a lot of exotics a lot easier.   Massachusetts, for example, has a large number of animals that are considered domesticated based on color forms; some of them, like the mink, I don't think would be legal if MA legislators weren't deluded about what domestication is.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-21" data-dcnode-id="712"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-21" data-dcnode-id="713" data-zone-count="22"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot
