v></div></header><div class="m-detail--sponsor" data-dcnode-id="1517"></div><div class="m-detail--body" data-dcnode-id="13"><p data-dcnode-id="1513"><em data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Melissa cares for a variety of exotic animals and has completed a certificate in veterinary assisting and a bachelor's degree in biology.</span></em></p><p data-dcnode-id="1505"><span data-dcnode-id="1512" instrument_node="">Most exotic animals are regulated by the Department of Conservation (DEC). When it comes to exotic pets, "The Big 5" are defined as "wild animals" and are illegal as they are in many states. These animals include bears, primates, big cats, canids, venomous and large reptiles (crocodilians, large constrictor snakes, and large monitor lizards). A lot more animals are legal in New York </span><em data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">State</span></em><span data-dcnode-id="1509" instrument_node="">, as opposed to New York </span><em data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">City</span></em><span data-dcnode-id="1506" instrument_node="">, where most animals are illegal.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-0" data-dcnode-id="1502"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-0" data-dcnode-id="1503" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;
