" instrument_node="">Smooth Fox Terrier Pros and Cons </span></h2><div class="breed-advantages--title" data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Pros</span></div><div class="breed-advantages" data-dcnode-id="471"><ul data-dcnode-id="472"><li data-dcnode-id="516"><strong data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Trainability</span></strong><span data-dcnode-id="520" instrument_node="">: Smooth Fox Terriers are </span><strong data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">easy to train</span></strong><span data-dcnode-id="517" instrument_node="">.</span></li><li data-dcnode-id="509"><strong data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Grooming</span></strong><span data-dcnode-id="513" instrument_node="">: </span><strong data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Easy to groom:</span></strong><span data-dcnode-id="510" instrument_node=""> The Smooth Fox Terrier doesn't require a lot of grooming.</span></li><li data-dcnode-id="502"><strong data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Drooling Tendency</span></strong><span data-dcnode-id="506" instrument_node="">: The Smooth Fox Terrier is a perfect example of a </span><strong data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">very low drooling</span></strong><span data-dcnode-id="503" instrument_node=""> tendency.</span></li><li data-dcnode-id="495"><strong data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Weight Gain Potential / Prone to Obesity</span></strong><span data-dcnode-id="499" instrument_node="">: </span><strong data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Low to Average:</span></strong><span data-dcnode-id="496" instrument_node=""> The Smooth Fox Terrier has a low to the average risk for obesity.</span></li><li data-dcnode-id="488"><strong data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Adaptability</span></strong><span data-dcnode-id="492" instrument_node="">: Smooth Fox Terriers </span><strong data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">adapt very well</span></strong><span data-dcnode-id="489" instrument_node=""> to lifestyle changes and basically all living environments.</span></li><li data-dcnode-id="481"><strong data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Child Friendly</span></strong><span data-dcnode-id="485" instrument_node="">: Smooth Fox Terriers are </span><strong data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">very kid-friendly</span></strong><span data-dcnode-id="482" instrument_node=""> dogs.</span></li><li data-dcnode-id="477"><strong data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Senior Citizens Friendly</span></strong><span data-dcnode-id="478" instrument_node="">: Smooth Fox Terriers are one of the best breeds for elderly people.</span></li><li data-dcnode-id="473"><strong data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Good For First Time Owners</span></strong><span data-dcnode-id="474" instrument_node="">: Smooth Fox Terriers are good for novice owners, due to their easy-going personality.</span></li></ul></div><div class="breed-advantages--title" data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Cons</span></div><div class="breed-disadvantages" data-dcnode-id="427"><ul data-dcnode-id="428"><li data-dcnode-id="465"><strong data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Hypoallergenic</span></strong><span data-dcnode-id="466" instrument_node="">: Smooth Fox Terriers don't do well with allergy sufferers by causing allergic reaction.</span></li><li data-dcnode-id="458"><strong data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Mouthiness</span></strong><span data-dcnode-id="462" instrument_node="">: Smooth Fox Terriers have a </span><strong data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">strong tendency</span></strong><span data-dcnode-id="459" instrument_node=""> to nip, chew, play-bite, or herd people.</span></li><li data-dcnode-id="451"><strong data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Impulse to Wander or Roam</span></strong><span data-dcnode-id="455" instrument_node="">: Smooth Fox Terriers have </span><strong data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">high wanderlust potential</span></strong><span data-dcnode-id="452" instrument_node="">, which means that this breed has a strong desire for exploring the world.</span></li><li data-dcnode-id="447"><strong data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Tolerates Being Left Alone</span></strong><span data-dcnode-id="448" instrument_node="">: Smooth Fox Terriers tend to have separation anxiety when their owners left them alone at home because they bond very closely with them.</span></li><li data-dcnode-id="440"><strong data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Cat Friendly</span></strong><span data-dcnode-id="444" instrument_node="">: Smooth Fox Terriers are </span><strong data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">not cat-friendly</span></strong><span data-dcnode-id="441" instrument_node=""> dogs.</span></li><li data-dcnode-id="433"><strong data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Dog Friendly</span></strong><span data-dcnode-id="437" instrument_node="">: Smooth Fox Terriers are </span><strong data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">not the most dog-friendly</span></strong><span data-dcnode-id="434" instrument_node=""> dogs.</span></li><li data-dcnode-id="429"><strong data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Office Friendly</span></strong><span data-dcnode-id="430" instrument_node="">: Smooth Fox Terrier is not the best dog breed for office environment.</span></li></ul></div></div><h2 data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Smooth Fox Terrier History</span></h2><div class="breed-history" data-dcnode-id="393"><p data-dcnode-id="419"><span data-dcnode-id="423" instrument_node="">The Fox Terriers have a lot of history behind them. Today, there are two types of Fox Terrier breeds, the Smooth Fox Terrier and the </span><a alt="Wire Fox Terrier" data-dcnode-id="421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dogell.com/en/dog-breed/wire-fox-terrier"><span data-dcnode-id="422" instrument_node="">Wire Fox Terrier</span></a><span data-dcnode-id="420" instrument_node="">. For more than 100 years, the two were registered and showed in the US as one breed with two varieties distinct from each other by coat type and head shape, as the Smooth Fox Terrier’s head is more V-shaped than the Wire’s. Although both were originally classified as sporting dogs because of their excellent nose, sharp eyesight, and stamina in bolting foxes out of their holes. However, despite how similar the two breeds are, some experts believe that the two developed very differently, even from different ancestries. They claim that Wires are thought to have descended from the broken-coated and tan terries from Durham, Wales, and Derbyshire, while the original Smooth Fox Terriers were thought to be a mix of black and tan terriers with smooth coats, Beagles, Bull Terriers, and Greyhounds.</span></p><p data-dcnode-id="402"><span data-dcnode-id="418" instrument_node="">Furthermore, in the late 18th-century&nbsp;fox hunting became popular in England, both as a sport and as a necessity to protect farms. British hunters quickly discovered that they needed a dog that could enter the foxes’ dens and bolt the foxes out of their hiding places. The Smooth Terrier was developed and perfect for the job. While the breeders did not keep many records about how they developed the breed, we know from a portrait painted in 1790, by Sawrey Gilpin, of Colonel Thornton’s dog, that the breed we know today has changed very little from the 18</span><sup data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">th</span></sup><span data-dcnode-id="415" instrument_node=""> century Smooth Fox Terrier. Moreover, well-known Smooths of the 19</span><sup data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">th</span></sup><span data-dcnode-id="412" instrument_node=""> century also contributed to the breed’s development, such as Old Jock, born in 1859 at Grove Kennel in England, and by the late 19</span><sup data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">th</span></sup><span data-dcnode-id="409" instrument_node=""> century the uniform type has been established. At the end of the 19</span><sup data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">th</span></sup><span data-dcnode-id="406" instrument_node=""> century, the&nbsp; Smooth Fox Terriers also entered the show ring about 15-20 years earlier than </span><a alt="Wire Fox Terrier" data-dcnode-id="404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dogell.com/en/dog-breed/wire-fox-terrier"><span data-dcnode-id="405" instrument_node="">Wire Fox Terrier</span></a><span data-dcnode-id="403" instrument_node="">, and first, they were classified as sporting dogs. In 1876 England’s Fox Terrier Club was founded, with members drawing up a breed standard that stayed the same for decades only with the exception of reducing the weight of a male dog in show condition from 9kgs to 8kgs. A few years later in 1897, the breed was also imported into the US and the American Fox Terrier Club was founded in 1885. This club holds the distinction of being the first specialty club to become a member of the American Kennel Club. The first Fox Terrier to be registered by the AKC was Cricket in 1885. The AFTC adopted the English breed standard when it was formed and it wasn’t until a century later that they separated the two terriers as standard breeds. By the 1920s, the Smooth Fox Terrier became one of the most recognized purebred dogs in America when RCA used a picture of the breed in its logo, listening to a record machine with his head cocked in an endearing fashion. The film series called The Thin Man also contributed to the breed’s popularity as a Fox Terrier named Asta was regularly in the show.</span></p><p data-dcnode-id="394"><span data-dcnode-id="401" instrument_node="">In 1985, the American Kennel Club formally recognized the Smooth Fox Terrier and the </span><a alt="Wire Fox Terrier" data-dcnode-id="399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dogell.com/en/dog-breed/wire-fox-terrier"><span data-dcnode-id="400" instrument_node="">Wire Fox Terrier</span></a><span data-dcnode-id="398" instrument_node=""> as separate breeds, but the standards for both are still maintained by the American Fox Terrier Club.&nbsp; The Smooth Fox Terrier is still not a very common breed, ranking 102</span><sup data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">nd</span></sup><span data-dcnode-id="395" instrument_node=""> among the 155 breeds and varieties registered by the AKC, but they are still stars in the show ring. Overall they are very clever, energetic, and plucky little dogs who love to be around people and also bond quickly with their owners.</span></p></div><div class="categorie clear" data-dcnode-id="322"><div class="breed--link" data-dcnode-id="390"><a data-dcnode-id="391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dogell.com/en/compare-dog-breeds"><span data-dcnode-id="392" instrument_node="">
