</span><div class="post_meta_wrap" data-dcnode-id="641"><div class="mb-3" data-dcnode-id="659"><h2 class="singlepost_title mb-0 leading-tight" data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Geese as Pets</span></h2></div><ul class="post_meta mb-6 pb-6 uppercase border-b border-gray-300" data-dcnode-id="642"><li class="mr-2 pr-2" data-dcnode-id="654"><i class="fa fa-user mr-2" data-dcnode-id="658"></i><span data-dcnode-id="657" instrument_node="">by </span><a data-dcnode-id="655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peelridgestud.com/author/mickpeelicloud-com/" rel="author" title="Posts by PeelRidgeStud"><span data-dcnode-id="656" instrument_node="">PeelRidgeStud</span></a></li><li class="mr-2 pr-2" data-dcnode-id="651"><i class="fa fa-clock-o mr-2" data-dcnode-id="653"></i><span data-dcnode-id="652" instrument_node="">January 19, 2016</span></li><li class="mr-2 pr-2" data-dcnode-id="647"><i class="fa fa-bookmark mr-2" data-dcnode-id="650"></i><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peelridgestud.com/category/chickens-ducks-turkeys-geese-hobbyists/" title="View all posts in FOR HOBBYISTS"><span data-dcnode-id="649" instrument_node="">FOR HOBBYISTS</span></a></li><li class="comments_count" data-dcnode-id="643"><a data-dcnode-id="644" href="#respond"><i class="icon-message mr-2" data-dcnode-id="646"></i><span data-dcnode-id="645" instrument_node="">0</span></a></li></ul></div><span data-dcnode-id="640" instrument_node="">
</span></div><span data-dcnode-id="638" instrument_node="">
</span><div class="post-content content-body mb-10" data-dcnode-id="473"><span data-dcnode-id="637" instrument_node="">
</span><h1 data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Geese as Pets – Which breed is right for me?</span></h1><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Geese are amazingly intelligent animals. If raised the right way they will become friends for life. Hand raising sexed goslings is the best way to go if you want geese as pets. From a&nbsp;young age they bond with you and will follow you around like a puppy dog.</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Geese can however be very noisy. A gander has a shrill voice &amp; a goose has a more of a deeper horse cry, and for this reason may be better suited to areas where you don’t have close neighbours. Ganders are more defensive then geese but usually only when protecting eggs or young. Geese become excited and noisy when confronted by intruders or strange sounds. They respond by making a hissing sound, and for this reason make good “watch dogs”. The Chinese breed has been the most widely used for this purpose, though all breeds are suitable to some extent.</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Geese eat all manner of weeds and with a couple of birds in the backyard, you may never need to mow. Geese are not prolific egg produces, laying only 30-80 eggs a year and breed mostly in the spring.</span></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="622"><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Feeding</span></strong></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Geese are more like grazing animals then any other type of poultry. Their bill and tongue are particularly well-equipped for grazing. The bill has sharp interlocking serrated edges designed to easily cut &amp; divide grass and other plant tissue like a hacksaw. The tongue at the tip is covered with hard, hair-like projections, pointing towards the throat, which quickly convey the pieces of grass and other vegetable material into the throat. This rough covering on the point of the tongue enables geese to bite off plants even closer to the ground than sheep. Because of this,overstocking must be avoided or the ground will become bare. You can supplement the diet with a little bread, wheat or corn or poultry breeder rations from your local produce store. Favourite grass for geese is kikuyu, clover and lucerne.</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="615"><strong data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Housing</span></strong></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">An ideal home is a simple shelter housed within a netted pen, leading to a paddock with access to a pond or a small kids paddle pool. People say you can keep geese without a pond, but they love to preen and paddle. They need access to good shade and plenty of fresh water. A shed is not necessary unless you have a problem with dogs, crows or foxes &amp; you would therefore need to secure the birds at night. If you live in a secure, fenced backyard geese will make a nest under&nbsp; a shady secluded spot to lay their eggs. You could also use a dog kennel with shavings or dry grass clippings when the birds are laying. Unlike hens and some ducks, geese don’t lay eggs consistently. You might get 30 – 80 eggs a year, but goose eggs are much bigger. Their creamy flavor is excellent in quiches, flans and custards. A gander isn’t needed for your goose to produce eggs.</span></p><span data-dcnode-id="611" instrument_node="">
</span><h3 data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">WHITE TOULOUSE</span></h3><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">The Camden White Toulouse in Australia Michael Peel was responsible for their creation and having them accepted in to the Australian Poultry Standards.</span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Colour – Bill, legs and feet are orange, plumage is white, eyes are blue.</span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="601" instrument_node="">They are a flightless large heavy breed that were crossed with Embden and Grey Toulouse geese with a quiet temperament similar to the Grey Toulouse. Read more about the White Toulouse story by </span><a data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peelridgestud.com/creating-white-toulouse/"><span data-dcnode-id="600" instrument_node="">clicking here.</span></a></p><span data-dcnode-id="597" instrument_node="">
</span><h3 data-dcnode-id="594"><strong data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">GREY TOULOUSE GEESE</span></strong></h3><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">A heavy breed that originated from France.</span></p><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Colour – Bill, legs and feet are orange. Plumage various shades of grey, each feather laced with a white edging. Paunch &amp; tail are white.</span></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Grey toulouse geese are also a flightless large heavy breed of goose with a calm temperament.</span></p><span data-dcnode-id="584" instrument_node="">
</span><h3 data-dcnode-id="581"><strong data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">EMBDEN GEESE</span></strong></h3><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">A heavy breed that originated from Germany.</span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Colour&nbsp;–&nbsp;Bill, legs and feet are bright orange. Tight plumage is glossy white. Head is long and strait, bill is short and stout at the base. Body is broad, thick and well rounded.</span></p><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="573" instrument_node="">Embden geese are also a large robust flightless breed of goose with a slightly more feisty and active temperament.</span><br data-dcnode-id="572"><span data-dcnode-id="571" instrument_node="">
These geese are also more capable of handling themselves against predators and are always ready for a fight. While foxes are a danger to geese It would take a determined fox to bring down an Embden.</span></p><span data-dcnode-id="569" instrument_node="">
</span><h3 data-dcnode-id="566"><strong data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">SEBASTOPOL GEESE</span></strong></h3><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Medium size breed originating from Europe near the Danube River and the Black Sea.</span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Colour; Bill and legs are orange and their eyes bright blue. Sebastopol are known for their long white curly feathers which cover the whole body.</span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Sebastopol geese are a flightless light breed of goose that are quick on their feet. They are great natural breeders and while they are more energetic than the heavier breeds they still have a quiet nature if hand raised.</span></p><span data-dcnode-id="556" instrument_node="">
</span><h3 data-dcnode-id="553"><strong data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">BROWN CHINESE</span></strong></h3><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">A light breed that originated from China.</span></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Colour – Black bill and Hazel eyes, with orange legs, body feathers are brown and lighter on the underside of the bird.</span></p><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">The Brown Chinese geese are an ornamental goose due to their fine features. They are a very alert bird that are also able to fly if startled. Brown Chinese geese are the noisiest of the bunch, but are also great egg layers. Scrambled goose eggs anyone?!</span></p><span data-dcnode-id="543" instrument_node="">
</span><h3 data-dcnode-id="540"><strong data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">WHITE CHINESE GEESE</span></strong></h3><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">The Australian White Chinese are a light breed that were created &amp; developed by Michael Peel from Camden NSW.</span></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Colour – bright orange bill and legs. Blue eyes, pure white body feathers &amp; a long slender neck.</span></p><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="532" instrument_node="">The White Chinese geese are an ornamental goose due to their fine features. They are a very alert bird that are also able to fly if startled. White&nbsp;Chinese geese are great layers and are also noisy making them great guards of your property. Read more about how they were bred by </span><a data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peelridgestud.com/story-white-chinese-geese/"><span data-dcnode-id="531" instrument_node="">clicking here.</span></a></p><span data-dcnode-id="528" instrument_node="">
</span><h3 data-dcnode-id="525"><strong data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">PILGRIMS OR AUSTRALIAN SETTLERS</span></strong></h3><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Pilgrim geese are one of the oldest breeds of geese available.</span></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Colour – They are naturally sex linked with the ganders always being pure white and the geese light grey usually with a white head. Pilgrims are classed as a light breed with the females weighing around 5kgs and the males 6kg.</span></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Pilgrims are a popular beginners bird, because the male and female differ in colour making it easy to tell the sex. They are a light energetic breed that can fly if they need to. They have a quiet temperament, but not as good layers as the Chinese geese.</span></p><span data-dcnode-id="515" instrument_node="">
</span><h4 data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">EXTRA INFORMATION</span></h4><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">It only takes a goose twenty minutes to digest food and then excrete it, so be aware, they can be quite messy!</span></p><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Geese lay around 15 eggs in a clutch and can lay up to 30 eggs in a season.</span></p><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">They also prefer to mate on water and some say that once geese are mated they are paired&nbsp;&nbsp;for life but they will find another partner if they lose their mate (a bit like us).</span></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">The term goose applies to the birds in general, and the female in particular. The word gander is used for a male. Young birds, before fledging, are called goslings. A group of geese on the ground is called a gaggle and when flying in formation they are called a wedge or a skein.</span></p><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">&nbsp;</span></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">There are light and heavy breeds of geese.</span></p><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Light breeds are roughly 3 – 5kgs in weight and include Pilgrim &amp; Chinese breeds. Being smaller, they can make a better first time bird as they are not so daunting in size.</span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">They make excellent weeder geese &amp; due to their lighter weight they are less likely to compact the ground. Light breeds mature very quickly.</span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">The lighter breeds are more likely to master flying, so clipping of wings is recommended.</span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Sebastopol’s are a great backyard breed as they are unable to fly due to their evolved plumage.</span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Heavy breeds such as the Toulouse and the Embden do require a little more space. These birds take years to mature fully, but once there should weigh over 10kg. They&nbsp;&nbsp;are in general a quiet, gentle and slower moving due to their massive size.</span></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="475"><span data-dcnode-id="478" instrument_node="">*Original information from&nbsp;</span><a data-dcnode-id="476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//goosebreeders.petdirectory.com.au/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="477" instrument_node="">http://goosebreeders.petdirectory.com.au/</span></a></p><span data-dcnode-id="474" instrument_node="">
