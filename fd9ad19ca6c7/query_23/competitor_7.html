</span><p data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">If you have cats and are considering adding a dog to your family, it’s common to wonder which breeds are prone to chasing or attacking cats, so you can avoid them in your search. However, with more than 150 breeds to choose from, looking into each one can be extremely tedious.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2482" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2481" instrument_node="">
</span><p data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">We’ve gone through the list of all dog breeds for you and chosen 20 breeds that are most likely to chase your cat, so you can avoid them while you shop. For each entry, we’ve included a short description to tell you more about each one. We’ve also included an image so you can see what they look like.</span></p><span data-dcnode-id="2478" instrument_node="">

</span><p data-dcnode-id="2130"><a data-dcnode-id="2132" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//petkeen.com/bedlington-terrier/" rel="noopener" target="_blank"><span data-dcnode-id="2133" instrument_node="">Bedlington Terriers</span></a><span data-dcnode-id="2131" instrument_node=""> are an alert breed, which makes them excellent watchdogs. Unfortunately, this sharp eye over their domain rarely allows intruders like cats to roam free. They will usually chase these animals away even if they have no desire to injure them. This breed will also frequently bark and become aggressive toward other dogs of the same sex.</span></p><span data-dcnode-id="2129" instrument_node="">

</span><p data-dcnode-id="1990"><span data-dcnode-id="1994" instrument_node="">A former hunting dog, the </span><a data-dcnode-id="1992" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//petkeen.com/beagle/" rel="noopener" target="_blank"><span data-dcnode-id="1993" instrument_node="">Beagle</span></a><span data-dcnode-id="1991" instrument_node=""> is a small yet determined breed that may not be as fast as the Greyhound or the Weimaraner, but it can fit in much smaller places, and your cat will have a difficult time finding a hiding place. Once the Beagle has the cat trapped, it’s likely to keep it there and bark until someone comes to see it. This entrapment can put a lot of stress on a cat and send it into permanent hiding.</span></p><span data-dcnode-id="1989" instrument_node="">

</span><p data-dcnode-id="1920"><span data-dcnode-id="1924" instrument_node="">The </span><a data-dcnode-id="1922" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//petkeen.com/shih-tzu/" rel="noopener" target="_blank"><span data-dcnode-id="1923" instrument_node="">Shih Tzu</span></a><span data-dcnode-id="1921" instrument_node=""> is another small dog breed that can easily fit into many of the cats hiding places, causing it to be a larger threat than you might think. However, unlike the breeds we looked at so far, the motivating factor for aggression is jealousy. Shih Tzu dogs like a lot of attention and will not be happy about you petting a cat. It will likely try to chase it away as a result.</span></p><span data-dcnode-id="1919" instrument_node="">

</span><p data-dcnode-id="1098"><span data-dcnode-id="1102" instrument_node="">The </span><a data-dcnode-id="1100" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//petkeen.com/pharaoh-hound/" rel="noopener" target="_blank"><span data-dcnode-id="1101" instrument_node="">Pharaoh hound</span></a><span data-dcnode-id="1099" instrument_node=""> is a popular breed because of its dignified appearance and friendly temperament. However, it can also be stubborn and strong-willed. It often feels strongly about chasing small animals and will ignore your commands while in pursuit, even when it’s an adult. Its fast speed and large size can make it quite dangerous to cats and rabbits.</span></p><span data-dcnode-id="1097" instrument_node="">

</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">If you own cats, we highly recommend avoiding the above breeds even though many of them will get along with cats through early socialization. You never know when a basic instinct will kick in, and some of these dogs are so large they can cause injury without meaning to. Even with these 20 eliminated, you still have more than 150 breeds to pick from to locate your next pet.</span></p><span data-dcnode-id="1084" instrument_node="">
