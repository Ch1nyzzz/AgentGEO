</span><h3 class="post-title entry-title" data-dcnode-id="7199"><span data-dcnode-id="7203" instrument_node="">
</span><a data-dcnode-id="7201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sddialedin.com/2022/04/things-to-do-in-san-diego-wednesday_0783598512.html"><span data-dcnode-id="7202" instrument_node="">Things To Do In San Diego: Wednesday, April 27-Tuesday, May 3, 2022: Snail Mail | Lady Lamb | Blitzen Trapper | Interpol | Oberhofer | Parquet Courts | Adams Avenue Unplugged | ArtWalk | Old Town Cinco De Mayo | San Diego Book Crawl | </span></a><span data-dcnode-id="7200" instrument_node="">
</span></h3><span data-dcnode-id="7198" instrument_node="">
</span><div class="post-header" data-dcnode-id="7194"><span data-dcnode-id="7197" instrument_node="">
</span><div class="post-header-line-1" data-dcnode-id="7196"></div><span data-dcnode-id="7195" instrument_node="">
</span></div><span data-dcnode-id="7193" instrument_node="">
</span><div class="post-body entry-content" data-dcnode-id="7161" id="post-body-2225338582622091512"><span data-dcnode-id="7192" instrument_node="">
</span><table align="center" cellpadding="0" cellspacing="0" class="tr-caption-container" data-dcnode-id="7183" style="margin-left: auto; margin-right: auto;"><tbody data-dcnode-id="7184"><tr data-dcnode-id="7188"><td data-dcnode-id="7189" style="text-align: center;"><a data-dcnode-id="7190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhPVmHjGieAhMbNzn3hM6XNFs6pohpnjkrIoec8QLgk1-CiYkUoO62wHcDO_-GLgJmf4MHwnOYXxPm2Gi7tUmZCOePsTDsb2AaaCxQu-iK2wS5jbBlJKG8cQQ9YhPtAYdtTeUPZSNyapycu4r-gNyBM2RaFpe7yX16HUK2shJOvzWstyN8jmQ/s5184/IMG_4440.JPG" style="margin-left: auto; margin-right: auto;"><img border="0" data-dcnode-id="7191" data-original-height="3456" data-original-width="5184" height="426" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhPVmHjGieAhMbNzn3hM6XNFs6pohpnjkrIoec8QLgk1-CiYkUoO62wHcDO_-GLgJmf4MHwnOYXxPm2Gi7tUmZCOePsTDsb2AaaCxQu-iK2wS5jbBlJKG8cQQ9YhPtAYdtTeUPZSNyapycu4r-gNyBM2RaFpe7yX16HUK2shJOvzWstyN8jmQ/w640-h426/IMG_4440.JPG&amp;raw" width="640"></a></td></tr><tr data-dcnode-id="7185"><td class="tr-caption" data-dcnode-id="7186" style="text-align: center;"><span data-dcnode-id="7187" instrument_node="">Lindsey Jordan, aka Snail Mail (Taken 8.21.2019)</span></td></tr></tbody></table><br data-dcnode-id="7182"><span data-dcnode-id="7181" instrument_node="">There are some amazing shows this week. Like how did Snail Mail get booked on the same night as Lady Lamb? That is unfortunate. I won't be able to make either as I'm working for Jon Spencer and Quasi at the Casbah, a great show, too, but a much different type of show.&nbsp;</span><div data-dcnode-id="7179"><br data-dcnode-id="7180"></div><span data-dcnode-id="7178" instrument_node="">I'll also be at Interpol on Friday, and if it gets out early enough, checking out Oberhofer at Soda Bar. Sadly, this means I can't make it to The Airborne Toxic Event with Mondo Cozmo opening. Hopefully he'll quickly schedule a small club headlining tour for the summer of fall because he is an amazing performer.&nbsp;</span><div data-dcnode-id="7165"><br data-dcnode-id="7177"><div data-dcnode-id="7175"><span data-dcnode-id="7176" instrument_node="">The weekend is also packed with the San Diego Book Crawl, Adams Avenue Unplugged, Old Town Cinco De Mayo, a Tacos &amp; Tequila festival at Petco Park, Art Alive in Balboa Park, and the classic ArtWalk in Little Italy. Darren will be working at the Safari Park all weekend, so I'll probably drag the kid around town before I have to work on Saturday night for Sleaford Mods at the Casbah.&nbsp;</span></div><div data-dcnode-id="7173"><br data-dcnode-id="7174"></div><div data-dcnode-id="7171"><span data-dcnode-id="7172" instrument_node="">Speaking of, Nova turns 15 on Sunday and it is a very big deal around here but everyone is overscheduled so hopefully we can find a way to make her quinceañera special.&nbsp;</span></div><div data-dcnode-id="7169"><br data-dcnode-id="7170"></div><div data-dcnode-id="7166"><span data-dcnode-id="7168" instrument_node="">Stay safe out there.&nbsp;&nbsp;</span><span data-dcnode-id="7167"></span></div></div><span data-dcnode-id="7164" instrument_node="">
</span><div data-dcnode-id="7163" style="clear: both;"></div><span data-dcnode-id="7162" instrument_node="">
</span></div><span data-dcnode-id="7160" instrument_node="">

</span><p data-dcnode-id="7036"></p><div class="separator" data-dcnode-id="7018" style="clear: both; text-align: center;"><span data-dcnode-id="7035" instrument_node="">
</span><a data-dcnode-id="7033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh3.googleusercontent.com/-6Vtyd55Otlc/YmeKXLeNOXI/AAAAAAAAUq8/_NWGNm0sPOsQlQzirI1y5O8BDDcHMmqqACNcBGAsYHQ/s1600/1650952794741239-0.png"><span data-dcnode-id="7034" instrument_node="">
</span></a><table align="center" cellpadding="0" cellspacing="0" class="tr-caption-container" data-dcnode-id="7025" style="margin-left: auto; margin-right: auto;"><tbody data-dcnode-id="7026"><tr data-dcnode-id="7030"><td data-dcnode-id="7031" style="text-align: center;"><img border="0" data-dcnode-id="7032" height="310" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh3.googleusercontent.com/-J35zFkBuB5g/YmeKtm4ZPxI/AAAAAAAAUrE/aAjwxXGSMc8KXMO6e7un96a3Nzkt2IhRQCNcBGAsYHQ/w640-h310/1650952884907595-0.png&amp;raw" style="margin-left: auto; margin-right: auto;" width="640"></td></tr><tr data-dcnode-id="7027"><td class="tr-caption" data-dcnode-id="7028" style="text-align: center;"><span data-dcnode-id="7029" instrument_node="">Nova and Ficus at Fiesta Island (Taken 4.24.22)</span></td></tr></tbody></table><div class="separator" data-dcnode-id="7020" style="clear: both; text-align: center;"><span data-dcnode-id="7024" instrument_node="">
</span><a data-dcnode-id="7022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh3.googleusercontent.com/-J35zFkBuB5g/YmeKtm4ZPxI/AAAAAAAAUrE/aAjwxXGSMc8KXMO6e7un96a3Nzkt2IhRQCNcBGAsYHQ/s1600/1650952884907595-0.png" style="margin-left: 1em; margin-right: 1em;"><span data-dcnode-id="7023" instrument_node="">
</span></a><span data-dcnode-id="7021" instrument_node="">
</span></div><br data-dcnode-id="7019"></div><p data-dcnode-id="7017"></p><p data-dcnode-id="7015"><span data-dcnode-id="7016" instrument_node="">I didn't expect to be more exhausted after the weekend than I was after the week. On Friday, I thought I'd take advantage of Nova being at school and Darren working so after getting my work mostly done, I spent a couple hours at the San Diego Zoo, and then went to Sea World because they were open until 8. But while I was there making kissy face with Mitik the walrus, I got a text reminder about doing merch at Soda Bar. Turns out I was asked about the wrong night, but still rushed home to take the job. It was a pretty easy and short night, but after a night of hip-hop it's hard to just go to bed when you get home.&nbsp;&nbsp;</span></p><p data-dcnode-id="7013"><span data-dcnode-id="7014" instrument_node="">On Saturday, after Nova's derby, my sister reached out and took us to Record Store Day at Vinyl Junkies Record Shack for awhile before grabbing some grub, then heading home for a nap, because I'd been last minute hired to sell merch for Haliene at Music Box. Again, it was a pretty easy night but super long -- I was there more than 5 hours -- so on Sunday I was just wiped out, but we had to go help my dad twice...move him in the afternoon and then again before his bedtime. In between, Nova and I took Ficus to Fiesta Island, then dropped her off at home and then went back to the bay for Sea World, not realizing they closed at 7pm, not 8. Nova still got a couple rollercoaster rides in so it was all good.&nbsp;</span></p><p data-dcnode-id="7011"><span data-dcnode-id="7012" instrument_node="">With Darren working such long hours in the sun all day, he's been pretty wiped out when he gets home, so we're still getting used to all of this. The good thing is that Nova is turning 15 in less than a week, so she can handle being alone, feeding herself, connecting with friends, or navigating public transit to get to GHYC, and I've been making it regular practice to work in the mornings and get out of the house every afternoon. Things may shift up when her lacrosse season ends, but we'll cross that bridge when we get to it.&nbsp;</span></p><p data-dcnode-id="7009"><span data-dcnode-id="7010" instrument_node="">On Tuesday -- supposing I get adequate sleep -- I'll be tagging along with Darren to Safari Park again. This time I know where I can work (Zuest Woolshed or Sambutan Longhouse), where I can chill out and rest while charging my phone (Rest &amp; Relax Tent by the Watering Hole) and that the 2nd to last tram is actually the best one of the day. If not, I guess I can always take the office setup back to the Zoo.&nbsp;</span></p><p data-dcnode-id="7006"><span data-dcnode-id="7008" instrument_node="">Stay safe out there.&nbsp;</span><span data-dcnode-id="7007"></span></p><span data-dcnode-id="7005" instrument_node="">
</span><div data-dcnode-id="7004" style="clear: both;"></div><span data-dcnode-id="7003" instrument_node="">

</span><div class="date-posts" data-dcnode-id="6484"><span data-dcnode-id="6882" instrument_node="">

</span><div class="post hentry" data-dcnode-id="6488"><span data-dcnode-id="6880" instrument_node="">
</span><a data-dcnode-id="6879" name="8989397880288356393"></a><span data-dcnode-id="6878" instrument_node="">
</span><h3 class="post-title entry-title" data-dcnode-id="6873"><span data-dcnode-id="6877" instrument_node="">
</span><a data-dcnode-id="6875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sddialedin.com/2022/04/san-diego-surpasses-30k-covid.html"><span data-dcnode-id="6876" instrument_node="">San Diego Surpasses 30k COVID Hospitalizations Since Pandemic Start | Justice Department To Appeal Heinous Judge Ruling | Poisonous Plants For Pets | San Diego Zoo Readies More Changes | </span></a><span data-dcnode-id="6874" instrument_node="">
</span></h3><span data-dcnode-id="6872" instrument_node="">
</span><div class="post-header" data-dcnode-id="6868"><span data-dcnode-id="6871" instrument_node="">
</span><div class="post-header-line-1" data-dcnode-id="6870"></div><span data-dcnode-id="6869" instrument_node="">
</span></div><span data-dcnode-id="6867" instrument_node="">
</span><div class="post-body entry-content" data-dcnode-id="6587" id="post-body-8989397880288356393"><span data-dcnode-id="6866" instrument_node="">
</span><p data-dcnode-id="6864"><span data-dcnode-id="6865" instrument_node="">&nbsp;</span></p><table align="center" cellpadding="0" cellspacing="0" class="tr-caption-container" data-dcnode-id="6856" style="margin-left: auto; margin-right: auto;"><tbody data-dcnode-id="6857"><tr data-dcnode-id="6861"><td data-dcnode-id="6862" style="text-align: center;"><img border="0" data-dcnode-id="6863" height="360" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh3.googleusercontent.com/-NqPLtYHWplk/YmEB9GYNOvI/AAAAAAAAUqg/UkxBiwAIcWYvCHUIWnnhtRdsiusLVp47wCNcBGAsYHQ/w640-h360/1650524659211887-0.png&amp;raw" style="margin-left: auto; margin-right: auto;" width="640"></td></tr><tr data-dcnode-id="6858"><td class="tr-caption" data-dcnode-id="6859" style="text-align: center;"><span data-dcnode-id="6860" instrument_node="">Maza the Greater One Horned Rhino (Taken 4.13.22)</span></td></tr></tbody></table><div class="separator" data-dcnode-id="6851" style="clear: both; text-align: center;"><span data-dcnode-id="6855" instrument_node="">
</span><a data-dcnode-id="6853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh3.googleusercontent.com/-NqPLtYHWplk/YmEB9GYNOvI/AAAAAAAAUqg/UkxBiwAIcWYvCHUIWnnhtRdsiusLVp47wCNcBGAsYHQ/s1600/1650524659211887-0.png" style="margin-left: 1em; margin-right: 1em;"><span data-dcnode-id="6854" instrument_node="">
</span></a><span data-dcnode-id="6852" instrument_node="">
</span></div><p data-dcnode-id="6850"></p><p data-dcnode-id="6842"><span data-dcnode-id="6849" instrument_node="">I'm only doing a post today because Wednesday is when the County updates all their COVID-19 info. Even the State has cut back and is only updating on Tuesdays and Fridays, so I'm not feeling so bad about my infrequent updates. Nothing you don't already know...cases are rising in the County, testing is declining, as I said yesterday, follow the poop and do what you have to for your own safety and that of your family. My big gripe of the day is how every news story talking about the judge's ruling striking down the mask mandate on transit seems to only focus on planes...a mode of travel which is really still for the more privileged amongst us. While it is true that "2,900,000 passengers fly every day in and out of u.s. airports" </span><a data-dcnode-id="6847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.faa.gov/air_traffic/by_the_numbers/" target="_blank"><span data-dcnode-id="6848" instrument_node="">according to the FAA</span></a><span data-dcnode-id="6846" instrument_node="">, a more striking statistic is that "34 million times each weekday, people board public transportation," </span><a data-dcnode-id="6844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apta.com/news-publications/public-transportation-facts/" target="_blank"><span data-dcnode-id="6845" instrument_node="">according to American Public Transportation Association's 2019 data</span></a><span data-dcnode-id="6843" instrument_node="">. These 34 million are often the most vulnerable amongst us: seniors, people with disabilities, low-income, people of color, many of&nbsp;whom may not even have basic health care coverage or adequate information and resources about the pandemic. Buses, trains, subways, light rail and other modes of transit are not known for their ventilation in the first place, and dropping mask mandates in these spaces is absolutely appalling. We'll see where the Justice Department's appeal goes, but I don't have great confidence in the courts doing the right thing, so ideally the individual transit agencies will implement their own requirements to continue following CDC guidance.&nbsp;</span></p><p data-dcnode-id="6837"><span data-dcnode-id="6841" instrument_node="">Update: Just found this article from Time:&nbsp;</span><a data-dcnode-id="6839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/6168828/do-masks-work-planes-trains-buses/"><span data-dcnode-id="6840" instrument_node="">Should You Still Wear a Mask on Planes, Trains, and Buses? Here’s What the Science Says.</span></a><span data-dcnode-id="6838" instrument_node=""> - Time (4.20.22)</span></p><p data-dcnode-id="6835"><span data-dcnode-id="6836" instrument_node="">But what I really wanted to talk about was the hot goss that I got at the San Diego Zoo today. I was lingering by the giraffes and Maza, who I've been calling Henry for over a year,&nbsp; the Greater One-Horned Rhinoceros at the end of the day and came across a trainer and asked why Henry's crate was out. The conversation was kinda funny but in case he was sharing not-for-public information, I'll just summarize and say that the story for the moment is that Henry is moving to the San Diego Zoo Safari Park. When he leaves, there will be some upgrades made to his current San Diego Zoo habitat. Once that is done, Funani and Amahle, the hippos, will be relocated there for 6-7 months while their "Hippo Beach" habitat is upgraded and remodeled. From that you can imagine all kinds of possibilities, like maybe Amahle will be like Fiona in Cincinnati and be introduced to a young male partner after she's 3 next February? It will be a long process for visitors because the pool on the mesa is far inferior to the current hippo habitat, but if it's all for an upgrade, it will be worth it. I'll still be there as much as possible regardless of what happens.&nbsp;</span></p><p data-dcnode-id="6832"><span data-dcnode-id="6834" instrument_node="">Stay safe out there.&nbsp;</span><span data-dcnode-id="6833"></span></p><a data-dcnode-id="6831" name="more"></a><p data-dcnode-id="6830"></p><ul data-dcnode-id="6593" style="text-align: left;"><li data-dcnode-id="6828"><span data-dcnode-id="6829" instrument_node="">COVID-19:</span></li><ul data-dcnode-id="6809"><li data-dcnode-id="6824"><a data-dcnode-id="6826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kpbs.org/news/national/2022/04/20/majority-of-americans-want-masks-for-travelers-ap-norc-poll/" target="_blank"><span data-dcnode-id="6827" instrument_node="">Majority of Americans want masks for travelers: AP-NORC poll</span></a><span data-dcnode-id="6825" instrument_node=""> - kpbs/Associated Press (4.20.22)</span></li><li data-dcnode-id="6819"><span data-dcnode-id="6823" instrument_node="">San Diego&nbsp;</span><a data-dcnode-id="6821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.countynewscenter.com/county-surpasses-30000-covid-19-hospitalizations-since-start-of-pandemic/" target="_blank"><span data-dcnode-id="6822" instrument_node="">County Surpasses 30,000 COVID-19 Hospitalizations Since Start of Pandemic</span></a><span data-dcnode-id="6820" instrument_node=""> - County News Center (4.20.22)</span></li><li data-dcnode-id="6815"><a data-dcnode-id="6817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nbcnews.com/health/health-news/covid-immunocompromised-patients-how-to-lower-risk-rcna24837" target="_blank"><span data-dcnode-id="6818" instrument_node="">Vaccines, antibodies, antivirals: How some immunocompromised can cut Covid risk.</span></a><span data-dcnode-id="6816" instrument_node=""> Compared to last year, people with weakened immune systems now have several tools to protect themselves against Covid-19.- NBC News (4.20.22)</span></li><li da </span><div class="date-posts" data-dcnode-id="5738"><span data-dcnode-id="6476" instrument_node="">
</span><div class="post-outer" data-dcnode-id="5740"><span data-dcnode-id="6475" instrument_node="">
</span><div class="post hentry" data-dcnode-id="5742"><span data-dcnode-id="6474" instrument_node="">
</span><a data-dcnode-id="6473" name="4264204054936039021"></a><span data-dcnode-id="6472" instrument_node="">
</span><h3 class="post-title entry-title" data-dcnode-id="6467"><span data-dcnode-id="6471" instrument_node="">
</span><a data-dcnode-id="6469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sddialedin.com/2022/04/things-to-do-in-san-diego-wednesday_0401573817.html"><span data-dcnode-id="6470" instrument_node="">Things To Do In San Diego: Wednesday, April 20, 2022-Tuesday, April 26, 2022: Hasan Minhaj | Hot Chip | Spellling | Electric Six | Dent May | Earthfair | Orville Peck | Beabadoobee | </span></a><span data-dcnode-id="6468" instrument_node="">
</span></h3><span data-dcnode-id="6466" instrument_node="">
</span><div class="post-header" data-dcnode-id="6462"><span data-dcnode-id="6465" instrument_node="">
</span><div class="post-header-line-1" data-dcnode-id="6464"></div><span data-dcnode-id="6463" instrument_node="">
</span></div><span data-dcnode-id="6461" instrument_node="">
</span><div class="post-body entry-content" data-dcnode-id="5838" id="post-body-4264204054936039021"><span data-dcnode-id="6460" instrument_node="">
</span><table align="center" cellpadding="0" cellspacing="0" class="tr-caption-container" data-dcnode-id="6451" style="margin-left: auto; margin-right: auto;"><tbody data-dcnode-id="6452"><tr data-dcnode-id="6456"><td data-dcnode-id="6457" style="text-align: center;"><a data-dcnode-id="6458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhU508HIkMzoayDP7SVA6o2yw5QVmuuWUmD2mpCPX_vVMc-WYepGqOL_PEYNwFkC4llFIpQaFWbH4uzqf4MgKeEKcrSAVpBRnY6HZSvHDNuyeIneecQkkK2VsTiTLlhnLBMvB-uyNEDea697viXpa0GpVE4YqRfjjGP8OgP_6qpYfroHzTgwQ/s5184/IMG_5120.JPG" style="margin-left: auto; margin-right: auto;"><img border="0" data-dcnode-id="6459" data-original-height="3456" data-original-width="5184" height="426" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhU508HIkMzoayDP7SVA6o2yw5QVmuuWUmD2mpCPX_vVMc-WYepGqOL_PEYNwFkC4llFIpQaFWbH4uzqf4MgKeEKcrSAVpBRnY6HZSvHDNuyeIneecQkkK2VsTiTLlhnLBMvB-uyNEDea697viXpa0GpVE4YqRfjjGP8OgP_6qpYfroHzTgwQ/w640-h426/IMG_5120.JPG&amp;raw" width="640"></a></td></tr><tr data-dcnode-id="6453"><td class="tr-caption" data-dcnode-id="6454" style="text-align: center;"><span data-dcnode-id="6455" instrument_node="">Beabadoobee Appears At Humphrey's On Tuesday Night (Taken 10.18.2019)</span></td></tr></tbody></table><br data-dcnode-id="6450"><span data-dcnode-id="6449" instrument_node="">I was having a conversation with a friend about whether I'll ever get back to the pre-pandemic lifestyle of three or four or seven shows a week and I was quick to answer that it's just not in the cards for me anymore. For starters, I've given up rideshare apps entirely. After they poured millions into Prop 22 and since D quit driving, I'd just rather not support, which makes some shows logistically a little more challenging. I love public transit, but it is made for daytime commuters, not so much late night revelers. Nova is older, so it's not like we can just put her to bed and head out on the town, it has to be a little more planned when we're leaving, or for those all-ages shows she might like, if I can request and secure three tickets instead of just one or two, which publicists generally hate and decline. On top of all that, we're still helping my dad three or four times a week before his bedtime, which ends up taking an hour or so with the drive, right when a headliner would be coming on at most venues, so we just have to arrange too much with our schedules.&nbsp;</span><div data-dcnode-id="6447"><br data-dcnode-id="6448"></div><div data-dcnode-id="6445"><span data-dcnode-id="6446" instrument_node="">And I assure you, I'm not complaining, but after two years, life is different. I'm different. The risks assessment is different, where none existed before. So you might see me bopping around at shows even if that means fewer of them. And I'll work the shows I'm asked to. But I also may show up 5 minutes before a headliner and cut out halfway through the set just to get by. It's all different. But that doesn't mean that I don't thoroughly encourage massive enjoyment of the great shows coming to town. If this week was pre-pandemic, for example, you'd probably see me at Hasan Minhaj, Wallows, Hot Chip and then racing to catch Spellling afterward, Dent May, Earthfair, Pink Mountaintops, Orville Peck, and beabadoobee. In this life right now, I may actually make it to one or two of those, if I'm really ambitious. It doesn't mean I'm any less grateful that we have amazing options in this City. But I still think if you're inside you should be masking up.&nbsp;</span></div><div data-dcnode-id="6443"><br data-dcnode-id="6444"></div><div data-dcnode-id="5842"><span data-dcnode-id="6442" instrument_node="">Congratulations to all the SDMA nominees and winners. I hope it was a great night.&nbsp;</span><br data-dcnode-id="6441"><p data-dcnode-id="6438"><span data-dcnode-id="6440" instrument_node="">Stay safe out there.&nbsp;</span><span data-dcnode-id="6439"></span></p><a data-dcnode-id="6437" name="more"></a><p data-dcnode-id="6436"></p><p data-dcnode-id="6434"><span data-dcnode-id="6435" instrument_node="">Music News:</span></p><div data-dcnode-id="5843"><ul data-dcnode-id="6367" style="text-align: left;"><li data-dcnode-id="6429"><a data-dcnode-id="6432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pacificsandiego.com/latest/story/2022-04-19/belly-up-to-manage-new-del-mar-concert-venue-at-fairgrounds" target="_blank"><span data-dcnode-id="6433" instrument_node="">Belly Up to manage new Del Mar concert venue at fairgrounds</span></a><span data-dcnode-id="6431" instrument_node="">.&nbsp;Remodeled Surfside Race Place expected to open later this year - Pacific San Diego/San Diego Union-Tribune (4.19.22)</span><br data-dcnode-id="6430"></li><li data-dcnode-id="6425"><a data-dcnode-id="6427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sandiegomusicawards.com/" target="_blank"><span data-dcnode-id="6428" instrument_node="">31st Annual San Diego Music Awards 2022 Winners</span></a><span data-dcnode-id="6426" instrument_node="">&nbsp;</span></li><ul data-dcnode-id="6420"><li data-dcnode-id="6421"><a data-dcnode-id="6423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kpbs.org/news/local/2022/04/19/san-diego-music-awards-recognizes-local-artists" target="_blank"><span data-dcnode-id="6424" instrument_node="">San Diego Music Awards recognizes local artists Thee Sacred Souls, Sara Petite, Lords of the Satellite and more</span></a><span data-dcnode-id="6422" instrument_node=""> - kpbs (4.19.22)</span></li></ul><li data-dcnode-id="6416"><a data-dcnode-id="6418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.broam.org/" target="_blank"><span data-dcnode-id="6419" instrument_node="">The Switchfoot Bro-Am</span></a><span data-dcnode-id="6417" instr </span><div class="date-posts" data-dcnode-id="5570"><span data-dcnode-id="5730" instrument_node="">

</span><a data-dcnode-id="5727" name="1885037428763313388"></a><span data-dcnode-id="5726" instrument_node="">
</span><h3 class="post-title entry-title" data-dcnode-id="5721"><span data-dcnode-id="5725" instrument_node="">
</span><a data-dcnode-id="5723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sddialedin.com/2022/04/assholes-were-always-assholes-stop.html"><span data-dcnode-id="5724" instrument_node="">Assholes Were Always Assholes: Stop Blaming Mask Mandates | Council Approves Sale of Tailgate Park Setting Up For More Surplus Land Act Violations | Watch The Poop | </span></a><span data-dcnode-id="5722" instrument_node="">
</span></h3><span data-dcnode-id="5720" instrument_node="">
</span><div class="post-header" data-dcnode-id="5716"><span data-dcnode-id="5719" instrument_node="">
</span><div class="post-header-line-1" data-dcnode-id="5718"></div><span data-dcnode-id="5717" instrument_node="">
</span></div><span data-dcnode-id="5715" instrument_node="">
</span><div class="post-body entry-content" data-dcnode-id="5679" id="post-body-1885037428763313388"><span data-dcnode-id="5714" instrument_node="">
</span><p data-dcnode-id="5712"><span data-dcnode-id="5713" instrument_node="">&nbsp;</span></p><table align="center" cellpadding="0" cellspacing="0" class="tr-caption-container" data-dcnode-id="5703" style="margin-left: auto; margin-right: auto;"><tbody data-dcnode-id="5704"><tr data-dcnode-id="5708"><td data-dcnode-id="5709" style="text-align: center;"><a data-dcnode-id="5710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEghY8aXHBcgU9idaSTAektHwx0eJK1jNBUxDA8MP0o5-lgqayIMbXDEq3jMCXx375N_obkJgJF-HCqpp1gpGoharHwEGvffBdzdzWeprmENg0VUDDsPS9hdOhedr_rEyV0s0tlvB4aU_5kSINfnkGTjQfhnTzQHegATkDeMpRs_Rfiyik6QkQ/s6000/IMG_5677.JPG" style="margin-left: auto; margin-right: auto;"><img border="0" data-dcnode-id="5711" data-original-height="4000" data-original-width="6000" height="426" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEghY8aXHBcgU9idaSTAektHwx0eJK1jNBUxDA8MP0o5-lgqayIMbXDEq3jMCXx375N_obkJgJF-HCqpp1gpGoharHwEGvffBdzdzWeprmENg0VUDDsPS9hdOhedr_rEyV0s0tlvB4aU_5kSINfnkGTjQfhnTzQHegATkDeMpRs_Rfiyik6QkQ/w640-h426/IMG_5677.JPG&amp;raw" width="640"></a></td></tr><tr data-dcnode-id="5705"><td class="tr-caption" data-dcnode-id="5706" style="text-align: center;"><span data-dcnode-id="5707" instrument_node="">Meerkat at San Diego Zoo (Taken 4.19.22)</span></td></tr></tbody></table><br data-dcnode-id="5702"><p data-dcnode-id="5701"></p><p data-dcnode-id="5699"><span data-dcnode-id="5700" instrument_node="">It has been nice taking longer breaks between posts. It means I've actually been doing stuff, like making the San Diego Zoo a daily weekday habit - on Friday I even did San Diego Zoo and Sea World in the same day! - and also that I'm just not having such constant thrumming of stress and outrage at the news and instead can look more at the overarching newsy things, take time to process, share the critical stuff.&nbsp;</span></p><p data-dcnode-id="5697"><span data-dcnode-id="5698" instrument_node="">The weekend was great. Darren had 4 days off, so on Saturday after Nova's derby, she had piano in La Jolla so I got to hang out at La Jolla Cove for about an hour, then we met up with my sister who was camping at Sweetwater with some of her friends, which happened to include a girl married to one of my best high school friends so it was a nice little reunion. Nova stayed to camp with them, while I worked at Soda Bar and Darren worked at the Casbah. Without the kid around, Darren and I spent Easter preparing some food and enjoying some adult bevvies before spending the evening with the family. Could we have had better weather?</span></p><p data-dcnode-id="5695"><span data-dcnode-id="5696" instrument_node="">So some things I'm watching: obviously I think a Federal judge, rated "not qualified" by the ABA, making a ruling that affects public health is bullshit and am not happy with the removal of mask mandates on public transportation. It is reckless and tells an entire segment of the population that their lives don't matter -- from the same party in the Venn diagram who swore #alllivesmatter. I rode the bus today and was glad masks are still required as the stagnant air on there cannot be good for anyone, pandemic or not.&nbsp;</span></p><p data-dcnode-id="5690"><span data-dcnode-id="5694" instrument_node="">And it's true, cases are down in San Diego...but so is testing. Follow the poop. If you look at our </span><a data-dcnode-id="5692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//searchcovid.info/dashboards/wastewater-surveillance/" target="_blank"><span data-dcnode-id="5693" instrument_node="">wastewater data</span></a><span data-dcnode-id="5691" instrument_node="">, as of April 13, the viral load in our wastewater was 2,478,325. We were at 2,382,735 on December 3rd, right before the County&nbsp;shot up with the Omicron variant. And each sublineage detected appears to be in the 'not more deadly, just more transmissible' zone, but just read anecdotally some of the accounts of people catching it and you still really don't want it.&nbsp;</span></p><p data-dcnode-id="5688"><span data-dcnode-id="5689" instrument_node="">The last thing I saw was the story about the City Council approving the sale of Tailgate Park to the "real-estate arm" of the Padres. Forget that it already appears to violate the Surplus Land Act for not offering to a development with more low-income housing, but we've seen this before when the City kicked homes and businesses out of East Village with eminent domain, JMI was sold land at pennies on the dollar, developed projects, and then took the money and ran. Any public mitigations like parks and public amenities, like the current fight over who should run bathrooms at Fault Line Park, after it was supposed to be the developer but then they sold and split and left it a huge problem the City is still dealing with, need to be deeded out for a hundred years. And I don't know the details of this specific proposal, but NO new properties should be allowed to be used as short term rentals for I don't know - 20 years? 50 years? It is absolutely absurd that the City systemically allowed the demolition of low-cost SROs in the past 20 years and just keeps approving luxury housing, as if that is any solution to our City's real problems, now or into the next 10, 20, 50 years. Pure insanity.&nbsp;</span></p><p data-dcnode-id="5686"><span data-dcnode-id="5687" instrument_node="">Can you tell I'm stalling on doing listings?</span></p><p data-dcnode-id="5683"><span data-dcnode-id="5685" instrument_node="">Stay safe out there.&nbsp;</span><span data-dcnode-id="5684"></span></p><span data-dcnode-id="5682" instrument_node="">

</span><table align="center" cellpadding="0" cellspacing="0" class="tr-caption-container" data-dcnode-id="5537" style="margin-left: auto; margin-right: auto;"><tbody data-dcnode-id="5538"><tr data-dcnode-id="5542"><td data-dcnode-id="5543" style="text-align: center;"><a data-dcnode-id="5544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgJMqW7cU3gXLPAP_4r1RGP61-iByG-UlECaIS93gBHs9qOSqaNTWQacf3UY9toVKDTtFkFK1bPtnARS8ojtH6Supt7qVkAxuvC1OuXaTDsD1KzHznolX3Rt0yVyI1PU7OX7yLP_sDHDuWAqCcWyKjWYUJUvijrlBP3ssihKfQQniHoU8Z_JQ/s6000/IMG_4694.JPG" style="margin-left: auto; margin-right: auto;"><img border="0" data-dcnode-id="5545" data-original-height="4000" data-original-width="6000" height="426" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgJMqW7cU3gXLPAP_4r1RGP61-iByG-UlECaIS93gBHs9qOSqaNTWQacf3UY9toVKDTtFkFK1bPtnARS8ojtH6Supt7qVkAxuvC1OuXaTDsD1KzHznolX3Rt0yVyI1PU7OX7yLP_sDHDuWAqCcWyKjWYUJUvijrlBP3ssihKfQQniHoU8Z_JQ/w640-h426/IMG_4694.JPG&amp;raw" width="640"></a></td></tr><tr data-dcnode-id="5539"><td class="tr-caption" data-dcnode-id="5540" style="text-align: center;"><span data-dcnode-id="5541" instrument_node="">Golden Takin Kid Born March 19, 2022 (Taken 4.12.22)</span></td></tr></tbody></table><br data-dcnode-id="5536"><div data-dcnode-id="5534"><span data-dcnode-id="5535" instrument_node="">As I'm sure you can tell, I've backed off on the daily posts. With Darren working and Nova in school all day, I've been trying to reclaim my days. On Monday I tagged along with Darren to the Safari Park and just took my laptop with me, but haven't really found an optimum place for working. On Tuesday I had to knock off several tasks -- filed my taxes, deposited a check, did some shopping because I've finally worn out my favorite zoo shoes, stocked up on necessities at Costco, and then got a couple hours in at the zoo, before coming home and having a sushi dinner and being up all night to do my listings. That made for a more sluggish Wednesday for sure, but I still got my animal time in. The San Diego Zoo is a bit more crowded right now than normal because of varying spring breaks, but it's still easy to find spaces and places away from everyone else. Some days I'll just sit with the two mandrill juveniles, some days I'll hit the aviaries, others I'll ride the Skyfari and do the long slow walk around elephant odyssey to the hoofed mesa. I kinda freaked out yesterday because they've got a transport crate in with Henry, the greater one-horned rhino, but someone on staff said it is probably just for his semi-annual checkup and not a transfer. Henry is like a big puppy and comes when you call his name, and makes a 'moo' noise and wriggles his ears when he's excited.&nbsp;</span></div><div data-dcnode-id="5532"><br data-dcnode-id="5533"></div><div data-dcnode-id="5530"><span data-dcnode-id="5531" instrument_node="">There's obviously a ton of news this week, but mostly I'm just sticking to the highlights so I can get out of the house and get some Vitamin D before everyone comes home. I'm trying to figure out a regular posting cadence and still have a ton of actual show recaps and photos to post, but again, it will all have to wait or I'll go stir crazy on this couch.&nbsp;</span></div><div data-dcnode-id="5528"><br data-dcnode-id="5529"></div><div data-dcnode-id="5525"><span data-dcnode-id="5527" instrument_node="">Stay safe out there.&nbsp;&nbsp;</span><span data-dcnode-id="5526"></span></div><span data-dcnode-id="5524" instrument_node="">

</span><table align="center" cellpadding="0" cellspacing="0" class="tr-caption-container" data-dcnode-id="5235" style="margin-left: auto; margin-right: auto;"><tbody data-dcnode-id="5236"><tr data-dcnode-id="5240"><td data-dcnode-id="5241" style="text-align: center;"><a data-dcnode-id="5242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgYcsmrq7UpWw1xR4v1xV8me4RHN47MkV6H2-5xSsp97bxa5z0T17Je11rsEZZ33_pUJOEVI3wENXoHAhNc-VFL2djCM7uS8Ya32d6Wu5Si2YXI11O9Ckt6kFAfWQ36lOp6J7EToYSjZlsZEgMVo2iioOUsSNgQNToxSBt_zRv9e0j7THZxsg/s6000/IMG_0333.JPG" style="margin-left: auto; margin-right: auto;"><img border="0" data-dcnode-id="5243" data-original-height="4000" data-original-width="6000" height="426" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgYcsmrq7UpWw1xR4v1xV8me4RHN47MkV6H2-5xSsp97bxa5z0T17Je11rsEZZ33_pUJOEVI3wENXoHAhNc-VFL2djCM7uS8Ya32d6Wu5Si2YXI11O9Ckt6kFAfWQ36lOp6J7EToYSjZlsZEgMVo2iioOUsSNgQNToxSBt_zRv9e0j7THZxsg/w640-h426/IMG_0333.JPG&amp;raw" width="640"></a></td></tr><tr data-dcnode-id="5237"><td class="tr-caption" data-dcnode-id="5238" style="text-align: center;"><span data-dcnode-id="5239" instrument_node="">Lowland Gorilla at San Diego Zoo (Taken 3.2.22)</span></td></tr></tbody></table><p data-dcnode-id="5233"><span data-dcnode-id="5234" instrument_node="">I ended up getting a weekend merch gig for White Denim and Nick Perri so at the moment I find myself at Music Box and it's kind of an ideal show, both in capacity and ease of the merch setup...mostly just clearing out old random sizes of merch that James of WD found around his house. And I'm able to have cocktails since I'm riding the bus home...just hope I'm outta here in time to catch the Rapid at 12:09 or I have to wait an hour for the 1:09.&nbsp;</span></p><p data-dcnode-id="5231"><span data-dcnode-id="5232" instrument_node="">It has been a low-key weekend, in that I pretty much was up all night Friday and slept the day away. We are all just getting used to each others' new schedules and I'm just trying to sleep when it comes to me. It's the best I've got right now. No big Sunday plans but this show just ended so I gotta wrap it up.&nbsp;</span></p><p data-dcnode-id="5228"><span data-dcnode-id="5230" instrument_node="">Stay safe out there.&nbsp;</span><span data-dcnode-id="5229"></span></p><span data-dcnode-id="5227" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="5106"><span data-dcnode-id="5107"><span data-dcnode-id="5108" instrument_node="">Friday, April 08, 2022</span></span></h2><span data-dcnode-id="5105" instrument_node="">
</span><div class="date-posts" data-dcnode-id="4949"><span data-dcnode-id="5104" instrument_node="">

</span><h3 class="post-title entry-title" data-dcnode-id="5095"><span data-dcnode-id="5099" instrument_node="">
</span><a data-dcnode-id="5097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sddialedin.com/2022/04/congress-approves-future-scotus-justice.html"><span data-dcnode-id="5098" instrument_node="">Congress Approves Future SCOTUS Justice Ketanji Brown Jackson | Pelosi Tests Positive | San Diego Needs To Shove Bike Lanes Down Your Unsafe Driving Assholes' Throats |  </span></a><span data-dcnode-id="5096" instrument_node="">
</span></h3><span data-dcnode-id="5094" instrument_node="">
</span><div class="post-header" data-dcnode-id="5090"><span data-dcnode-id="5093" instrument_node="">
</span><div class="post-header-line-1" data-dcnode-id="5092"></div><span data-dcnode-id="5091" instrument_node="">
</span></div><span data-dcnode-id="5089" instrument_node="">
</span><div class="post-body entry-content" data-dcnode-id="5061" id="post-body-5541509344522287513"><span data-dcnode-id="5088" instrument_node="">
</span><p data-dcnode-id="5086"><span data-dcnode-id="5087" instrument_node="">&nbsp;</span></p><table align="center" cellpadding="0" cellspacing="0" class="tr-caption-container" data-dcnode-id="5077" style="margin-left: auto; margin-right: auto;"><tbody data-dcnode-id="5078"><tr data-dcnode-id="5082"><td data-dcnode-id="5083" style="text-align: center;"><a data-dcnode-id="5084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj-kZFHQn8Nd_60EcBGRXGUT6LGzIm7-7ZV82bwi-JL2OvUtsntYH_gqFgBrXZLKB_3yF60nfvLuofFRjRUGKNhFmAOTLzsi0UX94G_h2sTJfDF5IbvejnzDyQ30P4Kii1TmrJMa-t4puByud3YYHYYbNJeuF01KRFVSFDM0q2V-Curx5QRaw/s6000/IMG_2763.JPG" imageanchor="1" style="margin-left: auto; margin-right: auto;"><img border="0" data-dcnode-id="5085" data-original-height="4000" data-original-width="6000" height="426" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj-kZFHQn8Nd_60EcBGRXGUT6LGzIm7-7ZV82bwi-JL2OvUtsntYH_gqFgBrXZLKB_3yF60nfvLuofFRjRUGKNhFmAOTLzsi0UX94G_h2sTJfDF5IbvejnzDyQ30P4Kii1TmrJMa-t4puByud3YYHYYbNJeuF01KRFVSFDM0q2V-Curx5QRaw/w640-h426/IMG_2763.JPG&amp;raw" width="640"></a></td></tr><tr data-dcnode-id="5079"><td class="tr-caption" data-dcnode-id="5080" style="text-align: center;"><span data-dcnode-id="5081" instrument_node="">Today was that kind of day. Tiger at San Diego Zoo (Taken 4.7.22)</span></td></tr></tbody></table><br data-dcnode-id="5076"><span data-dcnode-id="5075" instrument_node="">I was gonna skip a Thursday post but then I started it and felt like I'd rather do it now than Friday, or bump until Saturday, and because today was so historic in the approval of Justice Ketanji Brown Jackson, the first black woman to sit on the Supreme Court. Of course, she was actually only approved and won't be confirmed until Justice Breyer retires, but the point remains that it was a big day and worth a post, though I got about 32 emails about it so now it already feels like old news and suddenly we're going to forget the misogynistic and racist attacks she had to endure to get here. I am not looking forward to the hellish depths that midterm elections are going to bring.&nbsp;</span><p data-dcnode-id="5074"></p><p data-dcnode-id="5072"><span data-dcnode-id="5073" instrument_node="">With Darren now happily working -- and loving his new job in spite of the commute -- I've had to go back to shuttle mom, so while I did get some time at the San Diego Zoo today, I had to leave to pick Nova up from the house, take her to her piano lesson, met up with Darren at Rite-Aid to swap baggage then sorted out that he would go home and pick-up tacos for dinner and I would pick up the kid and get home and we would all finally have a couple hours together before we were reminded it was our night to help Dad so we were off to Chula Vista and I was just feeling a little overwhelmed and tired and I don't know how people do this all the time, like my sister, shuttling her girls to soccer after working full days and my mom taking care of my dad all day long and I'm whining in my own head because it's hot and I justifying that I had to get outside time at the Zoo while trying to figure out how to wear earbuds, a mask, realizing hoops were a terrible idea, while trying to shoot photos and toting around a retro 32 oz drink in my hand all the while, knowing I had work to do, posts to post, emails just vying for my attention. At least I started the work newsletter early so I was done by the time we had to drive to Chula Vista. This post is really just for my own peace of mind as I know there is no demand for my hot takes on why people complaining about bicycle road-striping all need to STFU because if the news really reported how many pedestrian and bicycle deaths occur every week, how many hit-and-runs, and if cops didn't falsify reports all the time to benefit drivers when dead cyclists can't speak, perhaps we'd have a little more tolerance for any measures that slow our roadways down for ALL users. San Diego needs to push through, stick with the bike plan, and everyone will get over it. On my way to pick up Nova, I drove the length of Adams Avenue to 30th, and 30th down to Upas, and every restaurant was full to the brim. The streetscapes full of yes, cars, but also bikes, pedestrians, and patio diners. It is beautiful and isn't news. The rest of the roadways will be the same. (My high school English teacher's red pen is stroking through this whole paragraph of run-on sentences and non-sequiturs. Love you, Grace!!)</span></p><p data-dcnode-id="5070"><span data-dcnode-id="5071" instrument_node="">My problems are so dumb, and then I look at that little 'Spot On' app reminder and it all makes sense. So we got home from my parents', where I hijacked booze from a closet of booze they'd long forgotten about, had a few drinks with Darren, and will fully reset for Friday.&nbsp;</span></p><p data-dcnode-id="5068"><span data-dcnode-id="5069" instrument_node="">Whatever variant or recombinant is rolling through DC is super "catchy", and though it doesn't appear so prevalent here, it could be soon as tourists descend on our city because it is the best place to be. Always. Even when it's 95 degrees in April.&nbsp;</span></p><p data-dcnode-id="5065"><span data-dcnode-id="5067" instrument_node="">Stay safe out there.&nbsp;</span><span data-dcnode-id="5066"></span></p><span data-dcnode-id="5064" instrument_node="">

</span><h3 class="post-title entry-title" data-dcnode-id="4932"><span data-dcnode-id="4936" instrument_node="">
</span><a data-dcnode-id="4934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sddialedin.com/2022/04/san-diego-scales-back-covid-testing.html"><span data-dcnode-id="4935" instrument_node="">San Diego Scales Back COVID Testing | Southern California Under Heat Advisory | Biden Extends Pause on Student Loan Debt | Center For Hate Report: IG Doesn't Act On 90% Of Misogyny | Gas Prices Drop |</span></a><span data-dcnode-id="4933" instrument_node="">
</span></h3><span data-dcnode-id="4931" instrument_node="">
</span><div class="post-header" data-dcnode-id="4927"><span data-dcnode-id="4930" instrument_node="">
</span><div class="post-header-line-1" data-dcnode-id="4929"></div><span data-dcnode-id="4928" instrument_node="">
</span></div><span data-dcnode-id="4926" instrument_node="">
</span><div class="post-body entry-content" data-dcnode-id="4900" id="post-body-8508658312688587404"><span data-dcnode-id="4925" instrument_node="">
</span><p data-dcnode-id="4923"><span data-dcnode-id="4924" instrument_node="">&nbsp;</span></p><table align="center" cellpadding="0" cellspacing="0" class="tr-caption-container" data-dcnode-id="4914" style="margin-left: auto; margin-right: auto;"><tbody data-dcnode-id="4915"><tr data-dcnode-id="4919"><td data-dcnode-id="4920" style="text-align: center;"><a data-dcnode-id="4921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiwlXZPdZyMnoy84Ga2DL6iUUqm9Rdpe9_XKtI7IMsfO8_67CsyiYoXy6rqV7kj1ex9Eg3MD5BCJx8i21xDfAuHR4tMMmEin3g6M8fUKUdibVLa2Dmvb7iqAqa-lfTa0assg1kJ9-E68ir96ETSrykUHlqRoMtnFd_bGcczsRN0XwLvUop6ZA/s6000/IMG_1736.JPG" imageanchor="1" style="margin-left: auto; margin-right: auto;"><img border="0" data-dcnode-id="4922" data-original-height="4000" data-original-width="6000" height="426" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiwlXZPdZyMnoy84Ga2DL6iUUqm9Rdpe9_XKtI7IMsfO8_67CsyiYoXy6rqV7kj1ex9Eg3MD5BCJx8i21xDfAuHR4tMMmEin3g6M8fUKUdibVLa2Dmvb7iqAqa-lfTa0assg1kJ9-E68ir96ETSrykUHlqRoMtnFd_bGcczsRN0XwLvUop6ZA/w640-h426/IMG_1736.JPG&amp;raw" width="640"></a></td></tr><tr data-dcnode-id="4916"><td class="tr-caption" data-dcnode-id="4917" style="text-align: center;"><span data-dcnode-id="4918" instrument_node="">Red Panda at San Diego Zoo (Taken 4.5.22)</span></td></tr></tbody></table><br data-dcnode-id="4913"><span data-dcnode-id="4912" instrument_node="">I don't know if you happened to turn on your TV to the hearing with oil execs today, but it was a doozy. Seeing these thugs cry about their perceived losses (which only means "we didn't get as rich" in 2020) was absolutely disgusting. And of course the daily reminders of gas prices crawling up was on the news every day, but my gas today was 60 cents cheaper than just two weeks ago, and I don't see any reports thanking Biden while everyone was quick to blame him for the rises. Rockets and Feathers, they call it. I understand the whole market it way more complex than that, but it was nice to see an ease nonetheless. Meanwhile the latest outrage in San Diego is more bike striping -- which takes cars off the roads when people can safely use bikes -- and it is just hilarious to hear people getting their panties in a bunch about having to slow down on roads where they're "used to driving double the speed limit" according to one Point Loma man.&nbsp;</span><p data-dcnode-id="4911"></p><p data-dcnode-id="4909"><span data-dcnode-id="4910" instrument_node="">My day didn't really go according to plan. My up all night, sleep all day plan was foiled by three cats and a dog who just didn't want that to happen, and the incessant rolling in of emails and things to stir my brain. But I did finally get a nap, then spent the afternoon at Nova's lacrosse game, jammed home to get Darren, and we had a big family gathering with Jochi Filipino food to celebrate my parents' anniversary. We haven't all been together like that since Christmas, so it was brief but nice.&nbsp;</span></p><p data-dcnode-id="4907"><span data-dcnode-id="4908" instrument_node="">I've been thinking now that Darren is working I have to make better use of my days, so perhaps I'll get on that just as soon as I work off this sleep debt. In today's data, we learn that the County is modifying and scaling back testing, so make note if you need tests. We actually increased in cases week to week, so we're back to "substantial spread" and should all be taking appropriate precautions. Meanwhile, I've been thinking about how easy it was to sneak into hotel pools when Nova was smaller and now there's an app that charges and I wonder if a middle-aged woman can just show up with a laptop and appear to be a hotel guest. If anyone works at a hotel that wouldn't mind me sitting by the pool for a few hours with my laptop, please let me know.&nbsp; &nbsp;</span></p><p data-dcnode-id="4904"><span data-dcnode-id="4906" instrument_node="">Stay safe out there.&nbsp;</span><span data-dcnode-id="4905"></span></p><span data-dcnode-id="4903" instrument_node="">

</span><table align="center" cellpadding="0" cellspacing="0" class="tr-caption-container" data-dcnode-id="4764" style="margin-left: auto; margin-right: auto;"><tbody data-dcnode-id="4765"><tr data-dcnode-id="4769"><td data-dcnode-id="4770" style="text-align: center;"><a data-dcnode-id="4771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjbNdGNbLHFe5Ga2v21pre6rBjwvGRa9YWVhHNC-POzGCG1BbMlJZpPt-H8yCeu9BgKqAtMRc8cHi9J8rs1vn0QVD0HlCLhTqK_YQllcPK_0m2BHojCbyC9pEexLoAZ-ToEC1VUadd7nbJYugCjOWRQhI4pM3OnY1L32uvlQlZfIOCKBSu7Vw/s6000/IMG_2536.JPG" style="margin-left: auto; margin-right: auto;"><img border="0" data-dcnode-id="4772" data-original-height="4000" data-original-width="6000" height="426" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjbNdGNbLHFe5Ga2v21pre6rBjwvGRa9YWVhHNC-POzGCG1BbMlJZpPt-H8yCeu9BgKqAtMRc8cHi9J8rs1vn0QVD0HlCLhTqK_YQllcPK_0m2BHojCbyC9pEexLoAZ-ToEC1VUadd7nbJYugCjOWRQhI4pM3OnY1L32uvlQlZfIOCKBSu7Vw/w640-h426/IMG_2536.JPG&amp;raw" width="640"></a></td></tr><tr data-dcnode-id="4766"><td class="tr-caption" data-dcnode-id="4767" style="text-align: center;"><span data-dcnode-id="4768" instrument_node="">Pinegrove at Observatory (Taken 4.5.22)</span></td></tr></tbody></table><p data-dcnode-id="4762"><span data-dcnode-id="4763" instrument_node="">Since I hadn't planned on the Pinegrove show on Tuesday until the very last minute, I got a little warped with my schedule. But since Wednesday is gonna be kinda crazy trying to coordinate with getting my work done, maybe hitting the Zoo, getting to Nova's lacrosse, Darren coming home from work, and meeting up with my family to celebrate our parents' anniversary, I knew that putting off these listings was just not an option. I just knew I wouldn't have the time or the will on Wednesday to do them. Overnight working has fewer interruptions anyway-- fewer emails coming in, and just my dog wanting to go outside and me having to take stretch breaks to do Wordle, Quordle, Octordle, Sedecorle, and Worldle.&nbsp;</span></p><p data-dcnode-id="4760"><span data-dcnode-id="4761" instrument_node="">There are a lot of great shows this week, including several San Diego Music Award showcases at Pour House, Casbah, Navajo Live, and Humphrey's Backstage. If you're thinking about going to see Valerie June on Saturday at the Belly Up, there are only a handful of tickets left before it's sold out, so don't wait on that. I don't have any merch jobs or shows to shoot this week, though Bad Religion is always an amazing show so we'll see if I get the impulse to finagle that into the plans.&nbsp;</span></p><p data-dcnode-id="4758"><span data-dcnode-id="4759" instrument_node="">Beyond that, it is worth noting that even though some COVID protocols have changed, a lot of the clubs are keeping vax or testing requirements, so make sure you know before you go. And while masking isn't required either, you'll notice that a ton of bands and crew and staff are still donning them...if bands get sick and have to miss tour dates, they lose a shit ton of money for themselves and a lot of other people, so show some respect and mask up when you're not drinking, or especially when you're interacting with the band at the merch table or whatever. Can you imagine getting sick on tour and having to lose money while also quarantining alone in a hotel in a random city for 5-10 days? It would suck. Case numbers are certainly down, but so is testing and overall disease surveillance, so take precautions to keep yourself and the music community at large safe and on the road. A new wave of COVID would mean a wave of cancelations and we just can't keep bouncing back from those.&nbsp;</span></p><p data-dcnode-id="4756"><span data-dcnode-id="4757" instrument_node="">I'm off to my daytime slumber.&nbsp;</span></p><p data-dcnode-id="4753"><span data-dcnode-id="4755" instrument_node="">Stay safe out there.&nbsp;</span><span data-dcnode-id="4754"></span></p><span data-dcnode-id="4752" instrument_node="">
