er><div class="qa-story-body story-body gel-pica gel-10/12@m gel-7/8@l gs-u-ml0@l gs-u-pb++" data-dcnode-id="756" data-reactid=".200ewz0wb9c.0.0.0.1"><figure class="gs-u-mt0 gs-u-mb-alt+ story-body__media story-body__media--figure qa-story-body-media story-body__media--lead" data-dcnode-id="999" data-reactid=".200ewz0wb9c.0.0.0.1.$image-0"><span class="gs-u-display-block story-body__media" data-dcnode-id="1002" data-reactid=".200ewz0wb9c.0.0.0.1.$image-0.0"><span class="gs-u-display-block gs-o-responsive-image" data-dcnode-id="1003" data-reactid=".200ewz0wb9c.0.0.0.1.$image-0.0.0" style="padding-bottom:56.25%;"><img alt="Tottenham Hotspur Stadium general view" class="qa-srcset-image" data-dcnode-id="1004" data-reactid=".200ewz0wb9c.0.0.0.1.$image-0.0.0.0" sizes="(min-width: 1280px) 800px, (min-width: 900px) 624px, (min-width: 600px) 976px, (min-width: 400px) 624px, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/onesport/cps/624/cpsprodpb/3004/production/_122229221_gettyimages-1350233877.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/onesport/cps/400/cpsprodpb/3004/production/_122229221_gettyimages-1350233877.jpg 400w, https://ichef.bbci.co.uk/onesport/cps/624/cpsprodpb/3004/production/_122229221_gettyimages-1350233877.jpg 624w, https://ichef.bbci.co.uk/onesport/cps/800/cpsprodpb/3004/production/_122229221_gettyimages-1350233877.jpg 800w, https://ichef.bbci.co.uk/onesport/cps/976/cpsprodpb/3004/production/_122229221_gettyimages-1350233877.jpg 976w"></span></span><figcaption class="gel-brevier gs-u-ph+ gs-u-pv-alt story-body__media__caption story-body__media__caption--image" data-dcnode-id="1000" data-reactid=".200ewz0wb9c.0.0.0.1.$image-0.1"><span data-dcnode-id="1001" instrument_node="">Tottenham's match against Brighton was called off because of an outbreak at Spurs</span></figcaption></figure><p class="qa-introduction gel-pica-bold" data-dcnode-id="996" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-1" role="introduction"><span data-dcnode-id="997" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-1.0"><span data-dcnode-id="998" instrument_node="">Premier League players and club staff will need to take a lateral flow test every day to get into training grounds under new measures agreed on Tuesday to combat the coronavirus Omicron variant.</span></span></p><div data-dcnode-id="989" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-2"><p class="" data-dcnode-id="993" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-2.0"><span data-dcnode-id="994" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-2.0.0"><span data-dcnode-id="995" instrument_node="">The action is aimed at stemming the rising number of positive Covid cases. </span></span></p><div class="" data-dcnode-id="990" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-2.1"><div aria-hidden="true" class="bbccom_slot bbccom_standard_slot mpu_first_slot" data-dcnode-id="991" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-2.1.$body-0" id="bbccom_mpu_1_2_3"><div class="bbccom_advert" data-dcnode-id="992" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-2.1.$body-0.0"></div></div></div></div><p class="" data-dcnode-id="986" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-3"><span data-dcnode-id="987" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-3.0"><span data-dcnode-id="988" instrument_node="">The Premier League confirmed on Monday there had been a record 42 positives over the previous seven days.</span></span></p><p class="" data-dcnode-id="983" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-4"><span data-dcnode-id="984" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-4.0"><span data-dcnode-id="985" instrument_node="">It is the highest figure recorded since Covid testing began as part of Project Restart during the 2019-20 season.</span></span></p><p class="" data-dcnode-id="980" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-5"><span data-dcnode-id="981" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-5.0"><span data-dcnode-id="982" instrument_node="">Previously, the most positive tests returned in a week this season was 16 from 16-22 August, when there were 3,060 tests.</span></span></p><div class="bbccom_slot" data-dcnode-id="978" id="bbccom_mpu_mid_1_2_3_4"><div class="bbccom_advert" data-dcnode-id="979"></div></div><p class="" data-dcnode-id="970" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-6"><span data-dcnode-id="976" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-6.0"><span data-dcnode-id="977" instrument_node="">Outbreaks at Tottenham and </span></span><a class="story-body__internal-link" data-dcnode-id="973" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-6.$link-2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/sport/football/59646845" title=""><span data-dcnode-id="974" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-6.$link-2.0"><span data-dcnode-id="975" instrument_node="">Manchester United</span></span></a><span data-dcnode-id="971" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-6.3"><span data-dcnode-id="972" instrument_node=""> have caused the postponement of two league games within the space of three days, while Brighton, Leicester, Aston Villa and Norwich have all confirmed cases.</span></span></p><ul data-dcnode-id="965" data-reactid=".200ewz0wb9c.0.0.0.1.$list-7"><li class="" data-dcnode-id="966" data-reactid=".200ewz0wb9c.0.0.0.1.$list-7.$list-item-0"><a class="story-body__internal-link" data-dcnode-id="967" data-reactid=".200ewz0wb9c.0.0.0.1.$list-7.$list-item-0.$undefined-link-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/sport/football/59613384" title=""><span data-dcnode-id="968" data-reactid=".200ewz0wb9c.0.0.0.1.$list-7.$list-item-0.$undefined-link-1.0"><span data-dcnode-id="969" instrument_node="">When do I need a 'covid pass' to watch sport &amp; what are the rules for fans at Premier League games?</span></span></a></li></ul><p class="" data-dcnode-id="962" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-8"><span data-dcnode-id="963" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-8.0"><span data-dcnode-id="964" instrument_node="">The Premier League has turned down a number of other requests this week for games to be postponed.</span></span></p><p class="" data-dcnode-id="956" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-9"><span data-dcnode-id="960" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-9.0"><span data-dcnode-id="961" instrument_node="">Leicester failed in their attempt to have their home game against Tottenham on Thursday postponed, </span></span><a class="story-body__internal-link" data-dcnode-id="957" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-9.$link-2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/sport/football/59672603" title=""><span data-dcnode-id="958" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-9.$link-2.0"><span data-dcnode-id="959" instrument_node="">Foxes manager Brendan Rodgers said.</span></span></a></p><p class="" data-dcnode-id="953" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-10"><span data-dcnode-id="954" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-10.0"><span data-dcnode-id="955" instrument_node="">After losing four players to coronavirus concerns before a 2-0 loss to Aston Villa on Tuesday, Norwich manager Dean Smith said there should be a "magic number" for the threshold of cases in order for a fixture to be called off.</span></span></p><p class="" data-dcnode-id="950" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-11"><span data-dcnode-id="951" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-11.0"><span data-dcnode-id="952" instrument_node="">League rules say a match cannot be postponed if clubs have 14 or more players available.</span></span></p><p class="" data-dcnode-id="947" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-12"><span data-dcnode-id="948" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-12.0"><span data-dcnode-id="949" instrument_node="">However, each request will be considered on an individual basis with a number of factors - including whether the training ground has been forced to close and if the outbreak is controllable - also taken into account.</span></span></p><p class="" data-dcnode-id="944" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-13"><span data-dcnode-id="945" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-13.0"><span data-dcnode-id="946" instrument_node="">In addition to the daily tests to get into training grounds, players and staff will now have a PCR test at least twice a week, which was the case last season, before it was changed to lateral flow tests in the summer.</span></span></p><p class="" data-dcnode-id="941" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-14"><span data-dcnode-id="942" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-14.0"><span data-dcnode-id="943" instrument_node="">It is anticipated the measures will be implemented quickly in an attempt to stem the spread of the new Omicron variant. Additional mask wearing, limiting of time spent receiving physical treatment and social distancing are also being advised to reduce the risk of further cases.</span></span></p><p class="" data-dcnode-id="938" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-15"><span data-dcnode-id="939" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-15.0"><span data-dcnode-id="940" instrument_node="">With the season about to enter the busy festive programme, clubs will want to avoid postponements which could create a fixture backlog and potentially even leave the league open to demands for rebates from broadcast partners, which had to be paid when the 2019-20 season was suspended at the start of the pandemic.</span></span></p><p class="" data-dcnode-id="935" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-16"><span data-dcnode-id="936" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-16.0"><span data-dcnode-id="937" instrument_node="">However, West Ham manager David Moyes believes the schedule is "playing a part" in transmission, adding: "Players are getting very little time to recover and when you are run down, you are more likely to get the virus.</span></span></p><p class="" data-dcnode-id="932" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-17"><span data-dcnode-id="933" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-17.0"><span data-dcnode-id="934" instrument_node="">"What we are putting the players through at the moment... that is showing with the number of players who are catching the virus."</span></span></p><ul data-dcnode-id="927" data-reactid=".200ewz0wb9c.0.0.0.1.$list-18"><li class="" data-dcnode-id="928" data-reactid=".200ewz0wb9c.0.0.0.1.$list-18.$list-item-0"><a class="story-body__internal-link" data-dcnode-id="929" data-reactid=".200ewz0wb9c.0.0.0.1.$list-18.$list-item-0.$undefined-link-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/sport/football/59522039" title=""><span data-dcnode-id="930" data-reactid=".200ewz0wb9c.0.0.0.1.$list-18.$list-item-0.$undefined-link-1.0"><span data-dcnode-id="931" instrument_node="">Premier League festive fixture guide</span></span></a></li></ul><p class="" data-dcnode-id="919" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-19"><span data-dcnode-id="925" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-19.0"><span data-dcnode-id="926" instrument_node="">Last week, following the introduction of new coronavirus rules in England, the Premier League </span></span><a class="story-body__internal-link" data-dcnode-id="922" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-19.$link-2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/sport/football/59598424" title=""><span data-dcnode-id="923" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-19.$link-2.0"><span data-dcnode-id="924" instrument_node="">told clubs to return to emergency measures</span></span></a><span data-dcnode-id="920" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-19.3"><span data-dcnode-id="921" instrument_node="">, including social distancing and wearing masks.</span></span></p><p class="" data-dcnode-id="916" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-20"><span data-dcnode-id="917" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-20.0"><span data-dcnode-id="918" instrument_node="">Brighton chief executive Paul Barber told BBC Sport his club is "now moving to testing three times a week" for players and the staff that work "in the bubble" to try to limit the number of infections that are spread from one player to another.</span></span></p><p class="" data-dcnode-id="913" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-21"><span data-dcnode-id="914" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-21.0"><span data-dcnode-id="915" instrument_node="">And from Wednesday, fans will need to show proof of double vaccination or a negative test to attend sporting events with crowds of more than 10,000 people in England. This includes Premier League games.</span></span></p><p class="" data-dcnode-id="910" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-22"><span data-dcnode-id="911" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-22.0"><span data-dcnode-id="912" instrument_node="">Stadiums have been free to operate at full capacity since final Covid restrictions were lifted in July.</span></span></p><p class="" data-dcnode-id="907" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-23"><span data-dcnode-id="908" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-23.0"><span data-dcnode-id="909" instrument_node="">If further restrictions are imposed by the Government, the Premier League is hoping to show through data that its matches could continue to be staged safely.</span></span></p><figure class="gs-u-mt0 gs-u-mb-alt+ story-body__media story-body__media--figure qa-story-body-media" data-dcnode-id="901" data-reactid=".200ewz0wb9c.0.0.0.1.$image-24"><span class="gs-u-display-block story-body__media" data-dcnode-id="904" data-reactid=".200ewz0wb9c.0.0.0.1.$image-24.0"><span class="gs-u-display-block gs-o-responsive-image" data-dcnode-id="905" data-reactid=".200ewz0wb9c.0.0.0.1.$image-24.0.0" style="padding-bottom:56.25%;"><img alt="A fan walks past a board explaining ways to stay safe in a stadium" class="qa-srcset-image" data-dcnode-id="906" data-reactid=".200ewz0wb9c.0.0.0.1.$image-24.0.0.0" sizes="(min-width: 1280px) 800px, (min-width: 900px) 624px, (min-width: 600px) 976px, (min-width: 400px) 624px, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/onesport/cps/624/cpsprodpb/13D9C/production/_122080318_gettyimages-1344425404.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/onesport/cps/400/cpsprodpb/13D9C/production/_122080318_gettyimages-1344425404.jpg 400w, https://ichef.bbci.co.uk/onesport/cps/624/cpsprodpb/13D9C/production/_122080318_gettyimages-1344425404.jpg 624w, https://ichef.bbci.co.uk/onesport/cps/800/cpsprodpb/13D9C/production/_122080318_gettyimages-1344425404.jpg 800w, https://ichef.bbci.co.uk/onesport/cps/976/cpsprodpb/13D9C/production/_122080318_gettyimages-1344425404.jpg 976w"></span></span><figcaption class="gel-brevier gs-u-ph+ gs-u-pv-alt story-body__media__caption story-body__media__caption--image" data-dcnode-id="902" data-reactid=".200ewz0wb9c.0.0.0.1.$image-24.1"><span data-dcnode-id="903" instrument_node="">Fans will need a Covid pass to attend Premier League games from Wednesday</span></figcaption></figure><h3 class="story-body__crosshead" data-dcnode-id="899" data-reactid=".200ewz0wb9c.0.0.0.1.$crosshead-25"><span data-dcnode-id="900" instrument_node="">Which Premier League clubs have Covid-19 outbreaks?</span></h3><p class="" data-dcnode-id="894" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-26"><strong data-dcnode-id="897" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-26.$bold-0"><span data-dcnode-id="898" instrument_node="">Tottenham's </span></strong><span data-dcnode-id="895" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-26.1"><span data-dcnode-id="896" instrument_node="">Europa Conference League match against Rennes was called off on Thursday because of the outbreak that resulted in the Brighton postponement.</span></span></p><p class="" data-dcnode-id="887" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-27"><span data-dcnode-id="892" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-27.0"><span data-dcnode-id="893" instrument_node="">Also on Thursday, a number of </span></span><strong data-dcnode-id="890" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-27.$bold-1"><span data-dcnode-id="891" instrument_node="">Leicester</span></strong><span data-dcnode-id="888" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-27.2"><span data-dcnode-id="889" instrument_node=""> players did not travel to Italy for their Europa League group game against Napoli because of positive Covid-19 tests.</span></span></p><p class="" data-dcnode-id="880" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-28"><span data-dcnode-id="885" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-28.0"><span data-dcnode-id="886" instrument_node="">Late on Monday, the Premier League confirmed</span></span><strong data-dcnode-id="883" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-28.$bold-1"><span data-dcnode-id="884" instrument_node=""> Manchester United's </span></strong><span data-dcnode-id="881" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-28.2"><span data-dcnode-id="882" instrument_node="">game at Brentford had been postponed after the Old Trafford club expressed safety concerns following the closure of their training ground for 24 hours to reduce the risk of transmission.</span></span></p><p class="" data-dcnode-id="871" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-29"><strong data-dcnode-id="878" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-29.$bold-0"><span data-dcnode-id="879" instrument_node="">Aston Villa </span></strong><span data-dcnode-id="876" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-29.1"><span data-dcnode-id="877" instrument_node="">boss Steven Gerrard confirmed "a couple of staff members and a couple of players" have tested positive but insisted the "vast majority" were negative. Gerrard's team were able to play Tuesday's Premier League match at </span></span><strong data-dcnode-id="874" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-29.$bold-2"><span data-dcnode-id="875" instrument_node="">Norwich</span></strong><span data-dcnode-id="872" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-29.3"><span data-dcnode-id="873" instrument_node=""> who - as their manager Smith said above - were without four players because of Covid-related concerns.</span></span></p><p class="" data-dcnode-id="864" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-30"><span data-dcnode-id="869" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-30.0"><span data-dcnode-id="870" instrument_node="">At </span></span><strong data-dcnode-id="867" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-30.$bold-1"><span data-dcnode-id="868" instrument_node="">Brighton,</span></strong><span data-dcnode-id="865" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-30.2"><span data-dcnode-id="866" instrument_node=""> head coach Graham Potter says there are "three or four" positive cases.</span></span></p><p class="" data-dcnode-id="857" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-31"><span data-dcnode-id="862" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-31.0"><span data-dcnode-id="863" instrument_node="">In the Championship, </span></span><strong data-dcnode-id="860" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-31.$bold-1"><span data-dcnode-id="861" instrument_node="">QPR's </span></strong><span data-dcnode-id="858" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-31.2"><span data-dcnode-id="859" instrument_node="">second game in a week has been called off with "a number of positive Covid-19 cases" in their first-team squad. </span></span></p><p class="" data-dcnode-id="849" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-32"><span data-dcnode-id="855" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-32.0"><span data-dcnode-id="856" instrument_node="">Saturday's home game with Swansea is off, after </span></span><a class="story-body__internal-link" data-dcnode-id="852" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-32.$link-2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/sport/football/59630050" title=""><span data-dcnode-id="853" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-32.$link-2.0"><span data-dcnode-id="854" instrument_node="">Monday's trip to Sheffield United </span></span></a><span data-dcnode-id="850" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-32.3"><span data-dcnode-id="851" instrument_node="">was also postponed.</span></span></p><h3 class="story-body__crosshead" data-dcnode-id="847" data-reactid=".200ewz0wb9c.0.0.0.1.$crosshead-33"><span data-dcnode-id="848" instrument_node="">What are Premier League managers saying about Covid-19?</span></h3><p class="" data-dcnode-id="831" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-34"><span data-dcnode-id="845" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-34.0"><span data-dcnode-id="846" instrument_node="">Before the postponement, </span></span><strong data-dcnode-id="843" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-34.$bold-1"><span data-dcnode-id="844" instrument_node="">Brentford</span></strong><span data-dcnode-id="841" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-34.2"><span data-dcnode-id="842" instrument_node=""> boss Thomas Frank echoed </span></span><strong data-dcnode-id="839" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-34.$bold-3"><span data-dcnode-id="840" instrument_node="">Arsenal's</span></strong><span data-dcnode-id="837" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-34.4"><span data-dcnode-id="838" instrument_node=""> Mikel Arteta in </span></span><a class="story-body__internal-link" data-dcnode-id="834" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-34.$link-6" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/sport/football/59641491" title=""><span data-dcnode-id="835" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-34.$link-6.0"><span data-dcnode-id="836" instrument_node="">calling for greater clarity from the Premier League</span></span></a><span data-dcnode-id="832" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-34.7"><span data-dcnode-id="833" instrument_node=""> over fixture changes because of Covid-19.</span></span></p><p class="" data-dcnode-id="826" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-35"><strong data-dcnode-id="829" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-35.$bold-0"><span data-dcnode-id="830" instrument_node="">Manchester City</span></strong><span data-dcnode-id="827" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-35.1"><span data-dcnode-id="828" instrument_node=""> manager Pep Guardiola said he encourages his players to get a vaccine booster, adding: "We speak with the players every day to say be careful. Stay healthy, wear masks, social distance."</span></span></p><p class="" data-dcnode-id="821" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-36"><strong data-dcnode-id="824" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-36.$bold-0"><span data-dcnode-id="825" instrument_node="">Liverpool</span></strong><span data-dcnode-id="822" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-36.1"><span data-dcnode-id="823" instrument_node=""> manager Jurgen Klopp says the vaccination status of his squad is "good", adding those who are eligible have had the booster.</span></span></p><p class="" data-dcnode-id="818" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-37"><span data-dcnode-id="819" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-37.0"><span data-dcnode-id="820" instrument_node="">"The whole vaccination thing is a question of loyalty, solidarity and togetherness. Everyone working at the training ground is at least double-vaccinated and will get the booster as soon as possible," said the German, who confirmed there were no positive cases in his squad on Tuesday.</span></span></p><p class="" data-dcnode-id="811" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-38"><span data-dcnode-id="816" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-38.0"><span data-dcnode-id="817" instrument_node="">Conversely, </span></span><strong data-dcnode-id="814" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-38.$bold-1"><span data-dcnode-id="815" instrument_node="">Burnley </span></strong><span data-dcnode-id="812" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-38.2"><span data-dcnode-id="813" instrument_node="">manager Sean Dyche revealed that he does not "preach to the players" on vaccines, but Norwich's Smith described the Canaries as "highly vaccinated".</span></span></p><p class="" data-dcnode-id="808" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-39"><span data-dcnode-id="809" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-39.0"><span data-dcnode-id="810" instrument_node="">Dyche added: "We certainly have players who don't have the full vaccination. Everyone has a choice, personally I have all three as I think it's right to do so."</span></span></p><p class="" data-dcnode-id="805" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-40"><span data-dcnode-id="806" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-40.0"><span data-dcnode-id="807" instrument_node="">Sports minister Nigel Huddleston said he "appreciated" football players and staff "testing at large volumes" and said the current measures were "proportionate" and "right for now".</span></span></p><h3 class="story-body__crosshead" data-dcnode-id="803" data-reactid=".200ewz0wb9c.0.0.0.1.$crosshead-41"><span data-dcnode-id="804" instrument_node="">What about the EFL?</span></h3><p class="" data-dcnode-id="800" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-42"><span data-dcnode-id="801" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-42.0"><span data-dcnode-id="802" instrument_node="">In the 2020-21 season, the Professional Footballers' Association paid an estimated £5m bill for players to be tested across the English Football League. But up to this point in the 2021-22 season, there has been no mandatory requirement for clubs to test players.</span></span></p><p class="" data-dcnode-id="792" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-43"><span data-dcnode-id="798" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-43.0"><span data-dcnode-id="799" instrument_node="">The EFL had </span></span><a class="story-body__internal-link" data-dcnode-id="795" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-43.$link-2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/sport/football/58018981" title=""><span data-dcnode-id="796" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-43.$link-2.0"><span data-dcnode-id="797" instrument_node="">issued guidance in July</span></span></a><span data-dcnode-id="793" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-43.3"><span data-dcnode-id="794" instrument_node=""> around two 'green' and 'red' protocols. Clubs have been following 'green' protocols of daily screening for symptoms, with stricter 'red' protocols including testing only triggered by any local outbreaks, further restrictions imposed by the government - as has happened in recent days.</span></span></p><p class="" data-dcnode-id="789" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-44"><span data-dcnode-id="790" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-44.0"><span data-dcnode-id="791" instrument_node="">A decision to move to 'red' protocols would be made by the league in consultation with the clubs.</span></span></p><p class="" data-dcnode-id="786" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-45"><span data-dcnode-id="787" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-45.0"><span data-dcnode-id="788" instrument_node="">The EFL told BBC Sport on Tuesday that "conversations on Covid matters are ongoing".</span></span></p><p class="" data-dcnode-id="783" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-46"><span data-dcnode-id="784" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-46.0"><span data-dcnode-id="785" instrument_node="">In the meantime, fixtures are being affected in Championship, with QPR on Tuesday forced to postpone a second match in a matter of days amid a Covid outbreak at the club. </span></span></p><h3 class="story-body__crosshead" data-dcnode-id="781" data-reactid=".200ewz0wb9c.0.0.0.1.$crosshead-47"><span data-dcnode-id="782" instrument_node="">What about in Scotland?</span></h3><p class="" data-dcnode-id="778" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-48"><span data-dcnode-id="779" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-48.0"><span data-dcnode-id="780" instrument_node="">No new official guidelines have been put in place yet - beyond the ongoing use of lateral flow testing - albeit some clubs are taking their own extra precautions around testing. </span></span></p><p class="" data-dcnode-id="775" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-49"><span data-dcnode-id="776" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-49.0"><span data-dcnode-id="777" instrument_node="">New advice was given at the weekend around travel, with clubs told if anyone on a team bus tested positive, all passengers would have to self-isolate for 10 days.</span></span></p><p class="" data-dcnode-id="772" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-50"><span data-dcnode-id="773" data-reactid=".200ewz0wb9c.0.0.0.1.$paragraph-50.0"><span data-dcnode-id="774" instrument_node="">However, that was revised after clarification from the Scottish government. Now only household contacts or those not double-jabbed will not be able to be cleared by a negative test.</span></span></p><span class="gs-u-display-block story-body__media gs-u-mb-alt+ qa-story-body-media" data-dcnode-id="769" data-reactid=".200ewz0wb9c.0.0.0.1.$image-51"><span class="gs-u-display-block gs-o-responsive-image" data-dcnode-id="770" data-reactid=".200ewz0wb9c.0.0.0.1.$image-51.0" style="padding-bottom:11.875%;"><img alt="Everything you need to know about your
