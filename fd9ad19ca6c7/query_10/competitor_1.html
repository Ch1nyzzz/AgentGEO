The fennec fox (</span><em data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Vulpes zerda</span></em><span data-dcnode-id="1501" instrument_node="">) is known for its huge ears and diminutive size. It is the smallest member of the </span><a data-component="link" data-dcnode-id="1499" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/how-and-why-dogs-were-domesticated-170656"><span data-dcnode-id="1500" instrument_node="">canid</span></a><span data-dcnode-id="1498" instrument_node=""> (dog) family. Whether the fennec truly belongs in the </span><a data-component="link" data-dcnode-id="1494" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/red-fox-facts-4628382"><span data-dcnode-id="1497" instrument_node="">genus </span><em data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">Vulpes</span></em></a><span data-dcnode-id="1493" instrument_node=""> is debated because it has fewer </span><a data-component="link" data-dcnode-id="1491" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/chromosome-373462"><span data-dcnode-id="1492" instrument_node="">chromosome pairs</span></a><span data-dcnode-id="1490" instrument_node=""> than other fox species, lives in packs while other foxes are solitary, and has different scent glands. Sometimes fennec foxes are known by the </span><a data-component="link" data-dcnode-id="1488" data-ordinal="4" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/linnaean-classification-system-4126641"><span data-dcnode-id="1489" instrument_node="">scientific name</span></a><span data-dcnode-id="1487" instrument_node=""> </span><em data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Fennecus zerda</span></em><span data-dcnode-id="1484" instrument_node="">. Its common name comes from the Berber-Arabic word </span><em data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">fanak</span></em><span data-dcnode-id="1481" instrument_node="">, which means "fox."
</span></p><span data-dcnode-id="1479" instrument_node="">

The fennec fox's most distinctive feature is its large ears, which may measure 6 inches. The ears help the fox identify prey at night and dissipate heat during the day. The fox is small, with a body ranging from 9 to 16 inches in length, plus a bushy 7 to 12 inch tail. Adults weigh between 1.5 and 3.5 pounds.

</span><div class="rail-video__title" data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Smallest Porpoise In The World Nears Extinction</span></div><span data-dcnode-id="1132" instrument_node="">
</span></div><span data-dcnode-id="1130" instrument_node="">

</span></div></div><span data-dcnode-id="1125" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1123" id="mntl-sc-block_1-0-6"><span data-dcnode-id="1124" instrument_node="">
The fennec's thick coat is cream-colored with a black-tipped tail. The fluffy coat insulates the fox against temperatures that range from below freezing at night to over 100 F during the day. Fur covers their paws, protecting them from getting burned by hot sand and improving traction on shifting dunes. Fennec foxes lack musk glands found in other fox species, but have glands on their tail tips that produce a musky odor when the fox is startled.
</span></p><span data-dcnode-id="1122" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1111" id="mntl-sc-block_1-0-7"><div class="comp mntl-block" data-dcnode-id="1112" id="mntl-block_6-0"><span data-dcnode-id="1121" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1100" id="mntl-sc-block_1-0-9"><span data-dcnode-id="1101" instrument_node="">
Fennec foxes live in North Africa and Asia. They range from Morocco to Egypt, south to northern Niger, and east to Israel and Kuwait. The foxes are most at home in sand dunes, but they will live where soil is compacted, too.
</span></p><span data-dcnode-id="1099" instrument_node="">

Foxes are </span><a data-component="link" data-dcnode-id="1076" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/omnivore-definition-2291732"><span data-dcnode-id="1077" instrument_node="">omnivores</span></a><span data-dcnode-id="1075" instrument_node="">. Fennec foxes are nocturnal hunters that use their sensitive ears to detect the movement of small underground prey. They eat rodents, insects, birds and their eggs, and also fruit and other plants. Fennecs will drink free water, but don't require it. They get their water from food, plus digging in the ground causes dew formation that the animals can lick.
</span></p><span data-dcnode-id="1073" instrument_node="">

</span></p><span data-dcnode-id="1050" instrument_node="">

Other fox species are mostly solitary, but fennec foxes are highly social. The basic social unit is a mated pair and their offspring for the present and previous year. The group lives in elaborate dens dug into sand or compacted soil.

</span><span class="heading-toc" data-dcnode-id="993" id="toc-reproduction-and-offspring"></span><span data-dcnode-id="992" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="987" id="mntl-sc-block_1-0-20"><span data-dcnode-id="991" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="989"><span data-dcnode-id="990" instrument_node=""> Reproduction and Offspring </span></span><span data-dcnode-id="988" instrument_node=""> </span></h2><span data-dcnode-id="986" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="984" id="mntl-sc-block_1-0-21"><span data-dcnode-id="985" instrument_node="">
Fennec foxes mate once a year in January and February and give birth in March and April. Gestation typically lasts between 50 and 52 days. The female or vixen gives birth in the den to a litter of one to four kits. A birth, the kit's eyes are closed and its ears are folded over. Kits are weaned by 61 to 70 days of age. The male feeds the female while she is caring for the young. Fennec foxes reach sexual maturity around nine months of age and mate for life. They have an average life expectancy of 14 years in captivity and are believed to live about 10 years in the wild.
</span></p><span data-dcnode-id="983" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="972" id="mntl-sc-block_1-0-22"><div class="comp mntl-block" data-dcnode-id="973" id="mntl-block_10-0"><span data-dcnode-id="982" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="961" id="mntl-sc-block_1-0-24"><span data-dcnode-id="962" instrument_node="">
The IUCN classifies fennec fox conservation status as "least concern." The foxes are still abundant within most of their range, so the population may be stable. The species is listed under CITES Appendix II to help protect the foxes from international trade abuse.
</span></p><span data-dcnode-id="960" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="935" id="mntl-sc-block_1-0-27"><span data-dcnode-id="939" instrument_node="">
The fox's most significant natural predator is the eagle owl. Fennecs are hunted for fur and trapped for the pet trade. But, the most significant threat comes from human settlement and commercialization of the </span><a data-component="link" data-dcnode-id="937" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/sahara-desert-overview-1435189"><span data-dcnode-id="938" instrument_node="">Sahara</span></a><span data-dcnode-id="936" instrument_node="">. Many foxes are killed by vehicles, plus they may suffer habitat loss and degradation.
</span></p><span data-dcnode-id="934" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="933" id="mntl-sc-block_1-0-28"></div><span data-dcnode-id="932" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="892" id="toc-fennec-foxes-and-humans"></span><span data-dcnode-id="891" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="886" id="mntl-sc-block_1-0-30"><span data-dcnode-id="890" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="888"><span data-dcnode-id="889" instrument_node=""> Fennec Foxes and Humans </span></span><span data-dcnode-id="887" instrument_node=""> </span></h2><span data-dcnode-id="885" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="883" id="mntl-sc-block_1-0-31"><span data-dcnode-id="884" instrument_node="">
The fennec fox is the national animal of Algeria. In some places, it's legal to keep fennec foxes as pets. While not truly domesticated, they can be tamed. Like other foxes, they can dig under or climb over most enclosures. Most canine vaccinations are safe for fennecs. Although nocturnal by nature, fennec foxes (like cats) adapt to human schedules.
</span></p><span data-dcnode-id="882" instrument_node="">
