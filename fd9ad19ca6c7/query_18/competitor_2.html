_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="480" data-mm-id="_8kxdzswvl"><span data-dcnode-id="481" instrument_node="">1. Foxes are related to dogs.</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="472" data-mm-id="_2yhe8ekep"><span data-dcnode-id="479" instrument_node="">Foxes are members of the </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/animal/canine" target="_blank"><span data-dcnode-id="478" instrument_node="">Canidae family</span></a><span data-dcnode-id="476" instrument_node="">, which means they're related to wolves, jackals, and </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mentalfloss.com/article/564264/dogs-puppies-facts" target="_self"><span data-dcnode-id="475" instrument_node="">dogs</span></a><span data-dcnode-id="473" instrument_node="">. They're medium-sized, weighing anywhere between 2 and 24 pounds, with pointy faces, lithe frames, and bushy tails.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="470" data-mm-id="_em93i1b5s"><span data-dcnode-id="471" instrument_node="">2. Foxes are solitary.</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="465" data-mm-id="_cu67eid7i"><span data-dcnode-id="469" instrument_node="">Unlike their relatives, foxes are not pack animals. When raising their young, they live in small families—called a “leash of foxes” or a “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mentalfloss.com/article/551081/collective-nouns-groups-animals" target="_self"><span data-dcnode-id="468" instrument_node="">skulk of foxes</span></a><span data-dcnode-id="466" instrument_node="">”—in underground burrows. Otherwise, they hunt and sleep alone.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="463" data-mm-id="_foxifuwuf"><span data-dcnode-id="464" instrument_node="">3. Foxes have a lot in common with cats.</span></h2><div data-dcnode-id="450" data-mm-id="_oomknhy5d"><div class="style_1tb5rbs" data-dcnode-id="451"><figure class="base_1u373dh" data-dcnode-id="455" data-id="_oomknhy5d"><picture class="_1olj64kn" data-dcnode-id="458"><source data-dcnode-id="462" media="(max-width: 719px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-182306525-32739e3453948f942b62f4849a409d77.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-182306525-32739e3453948f942b62f4849a409d77.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-182306525-32739e3453948f942b62f4849a409d77.jpg 3x"><source data-dcnode-id="461" media="(max-width: 1079px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-182306525-32739e3453948f942b62f4849a409d77.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-182306525-32739e3453948f942b62f4849a409d77.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-182306525-32739e3453948f942b62f4849a409d77.jpg 3x"><source data-dcnode-id="460" media="(min-width: 1080px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-182306525-32739e3453948f942b62f4849a409d77.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-182306525-32739e3453948f942b62f4849a409d77.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-182306525-32739e3453948f942b62f4849a409d77.jpg 3x"><img alt="A gray fox in a tree." class="_1olj64kn" data-dcnode-id="459" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images2.minutemediacdn.com/image/upload/c_fill%2Cw_720%2Car_16%3A9%2Cf_auto%2Cq_auto%2Cg_auto/shape/cover/sport/59739-gettyimages-182306525-32739e3453948f942b62f4849a409d77.jpg&amp;raw" title="A gray fox in a tree."></picture><noscript data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-182306525-32739e3453948f942b62f4849a409d77.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-182306525-32739e3453948f942b62f4849a409d77.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-182306525-32739e3453948f942b62f4849a409d77.jpg 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-182306525-32739e3453948f942b62f4849a409d77.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-182306525-32739e3453948f942b62f4849a409d77.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-182306525-32739e3453948f942b62f4849a409d77.jpg 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-182306525-32739e3453948f942b62f4849a409d77.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-182306525-32739e3453948f942b62f4849a409d77.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-182306525-32739e3453948f942b62f4849a409d77.jpg 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/59739-gettyimages-182306525-32739e3453948f942b62f4849a409d77.jpg" alt="A gray fox in a tree." title="A gray fox in a tree."/&gt;&lt;/picture&gt;</span></noscript></figure><div class="wrapper_dyw7h8" data-dcnode-id="452"><figcaption class="tagStyle_1eoo5cn-o_O-text_1la93q1" data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">A gray fox in a tree. / wildmanaz/iStock via Getty Images</span></figcaption></div></div></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="442" data-mm-id="_bqcn2sw1c"><span data-dcnode-id="449" instrument_node="">Like a cat, the fox is most active after the sun goes down. It has vertically oriented pupils so it can see in dim light, and it hunts by stalking and pouncing on its prey. The fox also has </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//northamericannature.com/how-do-foxes-navigate/" target="_blank"><span data-dcnode-id="448" instrument_node="">sensitive cat-like whiskers</span></a><span data-dcnode-id="446" instrument_node=""> and spines on its tongue. It walks on its toes, which accounts for its elegant, feline-like tread. The gray fox even has semi-retractable claws, making it the only member of the dog family that </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Daa27i1dkS9w" target="_blank"><span data-dcnode-id="445" instrument_node="">climbs trees</span></a><span data-dcnode-id="443" instrument_node="">. It has been known to sleep in the branches—just like a cat.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="440" data-mm-id="_0klwx2v29"><span data-dcnode-id="441" instrument_node="">4. There are 12 true foxes—and many relatives.</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="426" data-mm-id="_dqj3b85tr"><span data-dcnode-id="439" instrument_node="">Although there are 37 animals called foxes, only 12 are considered “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldatlas.com/articles/the-twelve-species-of-true-foxes.html" target="_blank"><span data-dcnode-id="438" instrument_node="">true foxes</span></a><span data-dcnode-id="436" instrument_node="">,” meaning they're from the genus </span><em data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Vulpes</span></em><span data-dcnode-id="433" instrument_node="">. Some of these include the red, Arctic, fennec, and kit foxes. True foxes have flattened skulls, triangular snouts, and fluffy tails, but it's common to be confused when seeing one in real life. Research found that while nature lovers can identify most North American mammals, they </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//agrilifetoday.tamu.edu/2005/07/08/foxy-wildlife-confused-for-coyotes/" target="_blank"><span data-dcnode-id="432" instrument_node="">frequently mix foxes up</span></a><span data-dcnode-id="430" instrument_node=""> with other canids, like </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mentalfloss.com/article/597929/coyote-facts" target="_self"><span data-dcnode-id="429" instrument_node="">coyotes</span></a><span data-dcnode-id="427" instrument_node="">.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="424" data-mm-id="_4gozsbkkr"><span data-dcnode-id="425" instrument_node="">5. The red fox is the most common fox.</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="416" data-mm-id="_k8k0c8ch7"><span data-dcnode-id="423" instrument_node="">Geographically, the red fox has the </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iucnredlist.org/species/23062/193903628" target="_blank"><span data-dcnode-id="422" instrument_node="">widest range</span></a><span data-dcnode-id="420" instrument_node=""> of any of the 280 animals in the order Carnivora. While its natural habitat is a mixed landscape of scrub and woodland, its flexible diet allows it to adapt to many environments. As a result, its range is the entire Northern Hemisphere, from the Arctic Circle to North Africa to Central America to the Asiatic steppes. It's even in Australia, where it's considered </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.environment.gov.au/biodiversity/invasive-species/publications/factsheet-european-red-fox-vulpes-vulpes" target="_blank"><span data-dcnode-id="419" instrument_node="">an invasive species</span></a><span data-dcnode-id="417" instrument_node="">.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="414" data-mm-id="_oj0hz3o64"><span data-dcnode-id="415" instrument_node="">6. Foxes use the Earth’s magnetic field.</span></h2><div data-dcnode-id="401" data-mm-id="_b38lgrht3"><div class="style_1tb5rbs" data-dcnode-id="402"><figure class="base_1u373dh" data-dcnode-id="406" data-id="_b38lgrht3"><picture class="_1olj64kn" data-dcnode-id="409"><source data-dcnode-id="413" media="(max-width: 719px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1215785559-6329e997c8b1d616b3b81df27f7a6937.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1215785559-6329e997c8b1d616b3b81df27f7a6937.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1215785559-6329e997c8b1d616b3b81df27f7a6937.jpg 3x"><source data-dcnode-id="412" media="(max-width: 1079px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1215785559-6329e997c8b1d616b3b81df27f7a6937.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1215785559-6329e997c8b1d616b3b81df27f7a6937.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1215785559-6329e997c8b1d616b3b81df27f7a6937.jpg 3x"><source data-dcnode-id="411" media="(min-width: 1080px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1215785559-6329e997c8b1d616b3b81df27f7a6937.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1215785559-6329e997c8b1d616b3b81df27f7a6937.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1215785559-6329e997c8b1d616b3b81df27f7a6937.jpg 3x"><img alt="Foxes are adept hunters." class="_1olj64kn" data-dcnode-id="410" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images2.minutemediacdn.com/image/upload/c_fill%2Cw_720%2Car_16%3A9%2Cf_auto%2Cq_auto%2Cg_auto/shape/cover/sport/59739-gettyimages-1215785559-6329e997c8b1d616b3b81df27f7a6937.jpg&amp;raw" title="Foxes are adept hunters."></picture><noscript data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1215785559-6329e997c8b1d616b3b81df27f7a6937.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1215785559-6329e997c8b1d616b3b81df27f7a6937.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1215785559-6329e997c8b1d616b3b81df27f7a6937.jpg 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1215785559-6329e997c8b1d616b3b81df27f7a6937.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1215785559-6329e997c8b1d616b3b81df27f7a6937.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1215785559-6329e997c8b1d616b3b81df27f7a6937.jpg 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1215785559-6329e997c8b1d616b3b81df27f7a6937.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1215785559-6329e997c8b1d616b3b81df27f7a6937.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1215785559-6329e997c8b1d616b3b81df27f7a6937.jpg 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/59739-gettyimages-1215785559-6329e997c8b1d616b3b81df27f7a6937.jpg" alt="Foxes are adept hunters." title="Foxes are adept hunters."/&gt;&lt;/picture&gt;</span></noscript></figure><div class="wrapper_dyw7h8" data-dcnode-id="403"><figcaption class="tagStyle_1eoo5cn-o_O-text_1la93q1" data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Foxes are adept hunters. / Gerald Corsi/Getty Images</span></figcaption></div></div></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="399" data-mm-id="_hmpavwz7l"><span data-dcnode-id="400" instrument_node="">Like a guided missile, the fox harnesses the Earth's magnetic field to hunt. Other animals, like birds, sharks, and turtles, have this “magnetic sense,” but the fox is the first one we've discovered that uses it to catch prey.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="388" data-mm-id="_31bqu293o"><span data-dcnode-id="398" instrument_node="">According to </span><em data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">New Scientist</span></em><span data-dcnode-id="395" instrument_node="">, the fox can see the earth's magnetic field as a “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newscientist.com/article/dn19945-foxes-zero-in-on-prey-via-earths-magnetic-field/%3Fignored%3Dirrelevant%23.VE7HBVNBH0o" target="_blank"><span data-dcnode-id="394" instrument_node="">ring of shadow</span></a><span data-dcnode-id="392" instrument_node="">” on its eyes that darkens as it moves toward magnetic north. When the shadow and the sound of prey lines up, it's time to pounce. Check out </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DD2SoGHFM18I" target="_blank"><span data-dcnode-id="391" instrument_node="">this video</span></a><span data-dcnode-id="389" instrument_node=""> to see a fox in action.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="386" data-mm-id="_hdj0yuczt"><span data-dcnode-id="387" instrument_node="">7. Foxes are good parents.</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="378" data-mm-id="_555n3uql3"><span data-dcnode-id="385" instrument_node="">Fox pups are born blind and don't open their eyes until </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.esf.edu/aec/adks/mammals/red_fox.htm" target="_blank"><span data-dcnode-id="384" instrument_node="">nine days after birth</span></a><span data-dcnode-id="382" instrument_node="">. During that time, they stay with the vixen (female) in the den while the dog (male) brings them food. They live with their parents until they're 7 months old. Vixens sometimes go to great lengths to protect their pups—once, in England, a fox pup was caught in a wire trap for two weeks </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailymail.co.uk/news/article-1180392/Fox-cub-survives-weeks-trap-mother-brings-scraps-food-day.html" target="_blank"><span data-dcnode-id="381" instrument_node="">but survived</span></a><span data-dcnode-id="379" instrument_node=""> because its mother brought it food every day.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="376" data-mm-id="_vvpd6i1tw"><span data-dcnode-id="377" instrument_node="">8. Fox pup play can get violent.</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="368" data-mm-id="_lso0b4l3t"><span data-dcnode-id="375" instrument_node="">Foxes are known to play among themselves, as well as with other animals. But play also establishes social hierarchy, and it starts very young. Animal behaviorist </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pbs.org/wnet/nature/fox-tales-about/15471/" target="_blank"><span data-dcnode-id="374" instrument_node="">Sandra Alvarez-Betancourt</span></a><span data-dcnode-id="372" instrument_node=""> studied thousands of hours of footage taken with an infrared camera of pup activity in the den. She discovered that the struggle for dominance starts as soon as the pups can walk. The play can be brutal—and even fatal. One in five pups </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.discoverwildlife.com/animal-facts/mammals/understand-fox-behaviour/" target="_blank"><span data-dcnode-id="371" instrument_node="">never make it out</span></a><span data-dcnode-id="369" instrument_node=""> of the den.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="366" data-mm-id="_ge190pkni"><span data-dcnode-id="367" instrument_node="">9. The smallest fox weighs less than 3 pounds.</span></h2><div data-dcnode-id="353" data-mm-id="_16ai75uz6"><div class="style_1tb5rbs" data-dcnode-id="354"><figure class="base_1u373dh" data-dcnode-id="358" data-id="_16ai75uz6"><picture class="_1olj64kn" data-dcnode-id="361"><source data-dcnode-id="365" media="(max-width: 719px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-653852768-2ba72dbb8724004e1735b1819f7c3b58.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-653852768-2ba72dbb8724004e1735b1819f7c3b58.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-653852768-2ba72dbb8724004e1735b1819f7c3b58.jpg 3x"><source data-dcnode-id="364" media="(max-width: 1079px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-653852768-2ba72dbb8724004e1735b1819f7c3b58.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-653852768-2ba72dbb8724004e1735b1819f7c3b58.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-653852768-2ba72dbb8724004e1735b1819f7c3b58.jpg 3x"><source data-dcnode-id="363" media="(min-width: 1080px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-653852768-2ba72dbb8724004e1735b1819f7c3b58.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-653852768-2ba72dbb8724004e1735b1819f7c3b58.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-653852768-2ba72dbb8724004e1735b1819f7c3b58.jpg 3x"><img alt="The Fennec fox is a small but mighty predator." class="_1olj64kn" data-dcnode-id="362" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images2.minutemediacdn.com/image/upload/c_fill%2Cw_720%2Car_16%3A9%2Cf_auto%2Cq_auto%2Cg_auto/shape/cover/sport/59739-gettyimages-653852768-2ba72dbb8724004e1735b1819f7c3b58.jpg&amp;raw" title="The Fennec fox is a small but mighty predator."></picture><noscript data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-653852768-2ba72dbb8724004e1735b1819f7c3b58.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-653852768-2ba72dbb8724004e1735b1819f7c3b58.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-653852768-2ba72dbb8724004e1735b1819f7c3b58.jpg 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-653852768-2ba72dbb8724004e1735b1819f7c3b58.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-653852768-2ba72dbb8724004e1735b1819f7c3b58.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-653852768-2ba72dbb8724004e1735b1819f7c3b58.jpg 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-653852768-2ba72dbb8724004e1735b1819f7c3b58.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-653852768-2ba72dbb8724004e1735b1819f7c3b58.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-653852768-2ba72dbb8724004e1735b1819f7c3b58.jpg 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/59739-gettyimages-653852768-2ba72dbb8724004e1735b1819f7c3b58.jpg" alt="The Fennec fox is a small but mighty predator." title="The Fennec fox is a small but mighty predator."/&gt;&lt;/picture&gt;</span></noscript></figure><div class="wrapper_dyw7h8" data-dcnode-id="355"><figcaption class="tagStyle_1eoo5cn-o_O-text_1la93q1" data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">The Fennec fox is a small but mighty predator. / Gaschwald/iStock via Getty Images</span></figcaption></div></div></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="345" data-mm-id="_8nlnxf0mq"><span data-dcnode-id="352" instrument_node="">Roughly the </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/27168-foxes.html" target="_blank"><span data-dcnode-id="351" instrument_node="">size of a kitten</span></a><span data-dcnode-id="349" instrument_node="">, the fennec fox has elongated ears and a creamy coat. It lives in North African deserts, where it sleeps during the day to avoid the searing heat. The long ears not only allow it to hear prey, they also </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalgeographic.com/animals/mammals/facts/fennec-fox" target="_blank"><span data-dcnode-id="348" instrument_node="">radiate body heat</span></a><span data-dcnode-id="346" instrument_node=""> to keep the fox cool. Its paws are covered with fur so that the fox can walk on hot sand, like it's wearing snowshoes.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="343" data-mm-id="_7id2zxyvk"><span data-dcnode-id="344" instrument_node="">10. Foxes have long had a relationship with humans.</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="338" data-mm-id="_lbg3x9xke"><span data-dcnode-id="342" instrument_node="">Although foxes are usually wild, their relationship with people goes way back. In 2011, researchers </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/11713-prehistoric-cemetery-reveals-man-fox-pals.html" target="_blank"><span data-dcnode-id="341" instrument_node="">opened a grave</span></a><span data-dcnode-id="339" instrument_node=""> in a 16,500-year-old Jordan cemetery to find the remains of a man and his pet fox. This was 4000 years before the first-known human and domestic dog were buried together.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="336" data-mm-id="_9s952w4zi"><span data-dcnode-id="337" instrument_node="">11. The island fox is an evolutionary puzzle.</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="325" data-mm-id="_6ji4n0vba"><span data-dcnode-id="335" instrument_node="">This </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/chis/learn/nature/island-fox.htm" target="_blank"><span data-dcnode-id="334" instrument_node="">small fox</span></a><span data-dcnode-id="332" instrument_node=""> lives on the Channel Islands off the coast of Southern California. It's thought to be a descendant of gray foxes brought over by the people who settled the islands 13,000 years ago. Recent studies show that island foxes are genetically identical to each other. One group “set a record for the least genetic variation in a sexually reproducing species,” </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2016/04/26/science/channel-island-foxes-least-genetic-diversity.html" target="_blank"><span data-dcnode-id="331" instrument_node="">according to</span></a><span data-dcnode-id="329" instrument_node=""> </span><em data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">The New York Times</span></em><span data-dcnode-id="326" instrument_node="">. Normally that's bad news, since lack of genetic diversity leads to disease and deformity, but the island fox has proven resilient. While at one point they were critically endangered, they've responded to conservation efforts and have been upgraded in status to near threatened.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="323" data-mm-id="_dc70yg7s3"><span data-dcnode-id="324" instrument_node="">12. Fox fur comes in many colors.</span></h2><div data-dcnode-id="310" data-mm-id="_fmmr1fhxy"><div class="style_1tb5rbs" data-dcnode-id="311"><figure class="base_1u373dh" data-dcnode-id="315" data-id="_fmmr1fhxy"><picture class="_1olj64kn" data-dcnode-id="318"><source data-dcnode-id="322" media="(max-width: 719px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1178240107-9d7df3634d20fbad1aa0f1db5c013a6d.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1178240107-9d7df3634d20fbad1aa0f1db5c013a6d.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1178240107-9d7df3634d20fbad1aa0f1db5c013a6d.jpg 3x"><source data-dcnode-id="321" media="(max-width: 1079px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1178240107-9d7df3634d20fbad1aa0f1db5c013a6d.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1178240107-9d7df3634d20fbad1aa0f1db5c013a6d.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1178240107-9d7df3634d20fbad1aa0f1db5c013a6d.jpg 3x"><source data-dcnode-id="320" media="(min-width: 1080px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1178240107-9d7df3634d20fbad1aa0f1db5c013a6d.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1178240107-9d7df3634d20fbad1aa0f1db5c013a6d.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1178240107-9d7df3634d20fbad1aa0f1db5c013a6d.jpg 3x"><img alt="A cross fox." class="_1olj64kn" data-dcnode-id="319" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images2.minutemediacdn.com/image/upload/c_fill%2Cw_720%2Car_16%3A9%2Cf_auto%2Cq_auto%2Cg_auto/shape/cover/sport/59739-gettyimages-1178240107-9d7df3634d20fbad1aa0f1db5c013a6d.jpg&amp;raw" title="A cross fox."></picture><noscript data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1178240107-9d7df3634d20fbad1aa0f1db5c013a6d.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1178240107-9d7df3634d20fbad1aa0f1db5c013a6d.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1178240107-9d7df3634d20fbad1aa0f1db5c013a6d.jpg 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1178240107-9d7df3634d20fbad1aa0f1db5c013a6d.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1178240107-9d7df3634d20fbad1aa0f1db5c013a6d.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1178240107-9d7df3634d20fbad1aa0f1db5c013a6d.jpg 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1178240107-9d7df3634d20fbad1aa0f1db5c013a6d.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1178240107-9d7df3634d20fbad1aa0f1db5c013a6d.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1178240107-9d7df3634d20fbad1aa0f1db5c013a6d.jpg 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/59739-gettyimages-1178240107-9d7df3634d20fbad1aa0f1db5c013a6d.jpg" alt="A cross fox." title="A cross fox."/&gt;&lt;/picture&gt;</span></noscript></figure><div class="wrapper_dyw7h8" data-dcnode-id="312"><figcaption class="tagStyle_1eoo5cn-o_O-text_1la93q1" data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">A cross fox. / DCrane08/iStock via Getty Images</span></figcaption></div></div></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="308" data-mm-id="_xdcnf6rmo"><span data-dcnode-id="309" instrument_node="">For instance, the Arctic fox is either a blue morph or a white morph, which changes colors with the seasons. The white morph is brown or gray in summer and turns white when there's snow on the ground. The blue morph is dark gray or brown all year long.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="303" data-mm-id="_vxg7uz93c"><span data-dcnode-id="307" instrument_node="">The red fox also comes in many colors, including silver, black, orange, or a mix of all three. While color variations happen naturally, people have bred foxes for fur, leading to </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blackfoxes.co.uk/silver-fox-coat-colour-mutations.php" target="_blank"><span data-dcnode-id="306" instrument_node="">many different patterns</span></a><span data-dcnode-id="304" instrument_node="">. These include the marble fox, which is white with gray or black streaks; the cross fox, which is red with back patches; and the pink champagne fox, which has peachy-white fur and a pink nose.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="301" data-mm-id="_7q6vhf5um"><span data-dcnode-id="302" instrument_node="">13. The tamer foxes get, the more they’re like dogs.</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="293" data-mm-id="_gny4w08dl"><span data-dcnode-id="300" instrument_node="">In 1959, a Soviet geneticist named </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.com/books%3Fid%3D8ZUtDwAAQBAJ%26printsec%3Dfrontcover%26dq%3DDmitry%2BBelyaev%26hl%3Den%26sa%3DX%26ved%3D0ahUKEwjY2qu-_P7cAhVEmlkKHRrkDzAQ6AEIKTAA%23v%3Donepage%26q%3DDmitry%2520Belyaev%26f%3Dfalse" target="_blank"><span data-dcnode-id="299" instrument_node="">Dmitry Belyaev</span></a><span data-dcnode-id="297" instrument_node=""> conducted an experiment in domestication. He selectively bred silver foxes, picking only the ones that showed the least aggression toward humans. Within 10 generations, the foxes started seeking people out, licking hands, barking, and wagging their tails. White spots appeared on their coats and they developed floppy ears. It suggested genetic links between how domesticated animals look and act. While the experiment's methodology </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-scientist.com/news-opinion/famous-fox-domestication-experiment-challenged-66817" target="_blank"><span data-dcnode-id="296" instrument_node="">has been challenged</span></a><span data-dcnode-id="294" instrument_node="">, the study gave insight into how selective breeding affects domestication.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="291" data-mm-id="_x2benjfsd"><span data-dcnode-id="292" instrument_node="">14. Some people keep foxes as pets.</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="280" data-mm-id="_zw8frtq8r"><span data-dcnode-id="290" instrument_node="">Although wild animals should never be pets, thanks to Belyaev's experiment, </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbsnews.com/news/adopt-a-pet-fox-for-sciences-sake/" target="_blank"><span data-dcnode-id="289" instrument_node="">domesticated foxes do exist</span></a><span data-dcnode-id="287" instrument_node="">. Unlike a tame fox, which has learned to tolerate humans, a domesticated fox is bred to be docile from birth. Laws for and access to pet foxes vary by location. They're reportedly curious and sweet-tempered, but also high-energy and tend to </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.popsci.com/science/article/2012-10/fyi-domesticated-foxes/%23page-13" target="_blank"><span data-dcnode-id="286" instrument_node="">get into everything</span></a><span data-dcnode-id="284" instrument_node="">. Some liken it to living with a 2-year-old. (Note that unlike the foxes from the Siberian facility, foxes bred within the U.S. are </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.popsci.com/science/article/2012-10/fyi-domesticated-foxes/%23page-13" target="_blank"><span data-dcnode-id="283" instrument_node="">not actually domesticated</span></a><span data-dcnode-id="281" instrument_node=""> or tame).</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="278" data-mm-id="_uk8w0szra"><span data-dcnode-id="279" instrument_node="">15. Switzerland tricked foxes into vaccinating themselves.</span></h2><div data-dcnode-id="265" data-mm-id="_nl868nsea"><div class="style_1tb5rbs" data-dcnode-id="266"><figure class="base_1u373dh" data-dcnode-id="270" data-id="_nl868nsea"><picture class="_1olj64kn" data-dcnode-id="273"><source data-dcnode-id="277" media="(max-width: 719px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1161007148-412cdab945218a27fb33a038ab528ed8.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1161007148-412cdab945218a27fb33a038ab528ed8.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1161007148-412cdab945218a27fb33a038ab528ed8.jpg 3x"><source data-dcnode-id="276" media="(max-width: 1079px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1161007148-412cdab945218a27fb33a038ab528ed8.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1161007148-412cdab945218a27fb33a038ab528ed8.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1161007148-412cdab945218a27fb33a038ab528ed8.jpg 3x"><source data-dcnode-id="275" media="(min-width: 1080px)" srcset="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1161007148-412cdab945218a27fb33a038ab528ed8.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1161007148-412cdab945218a27fb33a038ab528ed8.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1161007148-412cdab945218a27fb33a038ab528ed8.jpg 3x"><img alt="Foxes can have a little rabies vaccine, as a treat." class="_1olj64kn" data-dcnode-id="274" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images2.minutemediacdn.com/image/upload/c_fill%2Cw_720%2Car_16%3A9%2Cf_auto%2Cq_auto%2Cg_auto/shape/cover/sport/59739-gettyimages-1161007148-412cdab945218a27fb33a038ab528ed8.jpg&amp;raw" title="Foxes can have a little rabies vaccine, as a treat."></picture><noscript data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1161007148-412cdab945218a27fb33a038ab528ed8.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1161007148-412cdab945218a27fb33a038ab528ed8.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1161007148-412cdab945218a27fb33a038ab528ed8.jpg 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1161007148-412cdab945218a27fb33a038ab528ed8.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1161007148-412cdab945218a27fb33a038ab528ed8.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1161007148-412cdab945218a27fb33a038ab528ed8.jpg 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1161007148-412cdab945218a27fb33a038ab528ed8.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1161007148-412cdab945218a27fb33a038ab528ed8.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-1161007148-412cdab945218a27fb33a038ab528ed8.jpg 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/59739-gettyimages-1161007148-412cdab945218a27fb33a038ab528ed8.jpg" alt="Foxes can have a little rabies vaccine, as a treat." title="Foxes can have a little rabies vaccine, as a treat."/&gt;&lt;/picture&gt;</span></noscript></figure><div class="wrapper_dyw7h8" data-dcnode-id="267"><figcaption class="tagStyle_1eoo5cn-o_O-text_1la93q1" data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Foxes can have a little rabies vaccine, as a treat. / JMrocek/iStock via Getty Images</span></figcaption></div></div></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="254" data-mm-id="_k05uvbwwp"><span data-dcnode-id="264" instrument_node="">In the 1960s, there was a </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mentalfloss.com/article/50625/8-historically-terrifying-viruses" target="_self"><span data-dcnode-id="263" instrument_node="">rabies epidemic</span></a><span data-dcnode-id="261" instrument_node=""> among foxes in Switzerland. Since rabies can be transferred to humans through an animal bite, and is often fatal, it was a public health crisis. The government wanted to vaccinate foxes against rabies, but administering the doses by hand proved difficult and expensive. Instead, they started dropping vaccinated chicken heads on the countryside for the foxes to eat—52,000 in all. “From 1979 to 1984, chicken heads would rain down on the countryside,” </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theatlantic.com/science/archive/2015/12/that-time-europe-air-dropped-vaccine-loaded-chicken-heads-to-bait-rabid-foxes/417951/" target="_blank"><span data-dcnode-id="260" instrument_node="">according to</span></a><span data-dcnode-id="258" instrument_node=""> </span><em data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">The Atlantic. </span></em><span data-dcnode-id="255" instrument_node="">It worked. Rabies disappeared, a testimony to the effectiveness of vaccines, and to the foxes' love of chicken.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="252" data-mm-id="_kj9xkfe01"><span data-dcnode-id="253" instrument_node="">16. Arctic foxes don’t shiver until -94°F (-70°C).</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="247" data-mm-id="_usemcdrt7"><span data-dcnode-id="251" instrument_node="">The Arctic fox, which lives in the northernmost parts of the hemisphere, can handle cold better than most animals on Earth. It doesn't shiver until -94° F (-70° C). Not only does the fox's thick fur hold in heat, it wraps its tail around its body like a blanket to keep warm. In autumn, the fox </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20141011195501/http%3A//www.arctic.noaa.gov/report12/arctic_fox.html" target="_blank"><span data-dcnode-id="250" instrument_node="">builds up fat</span></a><span data-dcnode-id="248" instrument_node="">, sometimes increasing its body weight by half. This adds insulation and helps the fox survive the coldest days of winter, when food is scarce.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="245" data-mm-id="_i5uuiogw1"><span data-dcnode-id="246" instrument_node="">17. Climate change is hurting Arctic foxes.</span></h2><div data-dcnode-id="231" data-mm-id="_ch0ujwxak"><div class="style_1tb5rbs" data-dcnode-id="232"><figure class="base_1u373dh" data-dcnode-id="236" data-id="_ch0ujwxak"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="244" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="239"><source data-dcnode-id="243"><source data-dcnode-id="242"><source data-dcnode-id="241"><img alt="An Arctic fox." class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="240" title="An Arctic fox."></picture><noscript data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-157305552-3572ce4fe3930ac5a03b3be281df4bf1.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-157305552-3572ce4fe3930ac5a03b3be281df4bf1.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-157305552-3572ce4fe3930ac5a03b3be281df4bf1.jpg 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-157305552-3572ce4fe3930ac5a03b3be281df4bf1.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-157305552-3572ce4fe3930ac5a03b3be281df4bf1.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-157305552-3572ce4fe3930ac5a03b3be281df4bf1.jpg 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-157305552-3572ce4fe3930ac5a03b3be281df4bf1.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-157305552-3572ce4fe3930ac5a03b3be281df4bf1.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-157305552-3572ce4fe3930ac5a03b3be281df4bf1.jpg 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/59739-gettyimages-157305552-3572ce4fe3930ac5a03b3be281df4bf1.jpg" alt="An Arctic fox." title="An Arctic fox."/&gt;&lt;/picture&gt;</span></noscript></figure><div class="wrapper_dyw7h8" data-dcnode-id="233"><figcaption class="tagStyle_1eoo5cn-o_O-text_1la93q1" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">An Arctic fox. / DmitryND/Getty Images</span></figcaption></div></div></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="223" data-mm-id="_5pqk4d13o"><span data-dcnode-id="230" instrument_node="">The number of Arctic foxes is declining, and the reason may be the red fox. As temperatures increase, the red fox is </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mentalfloss.com/article/643690/quest-for-the-north-pole-episode-9-podcast-transcript" target="_self"><span data-dcnode-id="229" instrument_node="">moving into the Arctic tundra</span></a><span data-dcnode-id="227" instrument_node=""> and competing for prey. Red foxes are superior hunters and, to make matters worse, they also eat Arctic foxes. None of this </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//alaskamagazine.com/authentic-alaska/wildlife-nature/is-this-the-end-of-the-arctic-fox/" target="_blank"><span data-dcnode-id="226" instrument_node="">bodes well</span></a><span data-dcnode-id="224" instrument_node=""> for the Arctic fox's future.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="221" data-mm-id="_ex9prgz7t"><span data-dcnode-id="222" instrument_node="">18. Fox hunts continue to be controversial.</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="213" data-mm-id="_utc4o3gab"><span data-dcnode-id="220" instrument_node="">Since the </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historic-uk.com/CultureUK/Fox-Hunting-in-Britain/" target="_blank"><span data-dcnode-id="219" instrument_node="">16th century</span></a><span data-dcnode-id="217" instrument_node="">, fox hunting has been a popular activity in Britain. In the 19th century, the upper classes turned fox hunting into a formalized sport, where a pack of hounds and men on horseback chase a fox until it's killed. Today, whether to ban fox hunting continues to be a controversial subject in the UK, where many people see foxes as pests. Currently, fox hunting </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/hunting/mammals" target="_blank"><span data-dcnode-id="216" instrument_node="">is allowed</span></a><span data-dcnode-id="214" instrument_node=""> with two dogs if the fox is damaging your property.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="211" data-mm-id="_2b8n00gim"><span data-dcnode-id="212" instrument_node="">19. Foxes are fast.</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="206" data-mm-id="_hvoe80u1h"><span data-dcnode-id="210" instrument_node="">Some foxes can run up to 42 mph, giving new meaning to the phrase “quick like a fox.” They're also agile. They can jump three feet in the air and climb fences and over roofs. They also have impressive endurance: One Arctic fox walked </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencealert.com/an-arctic-fox-walked-from-norway-all-the-way-to-canada" target="_blank"><span data-dcnode-id="209" instrument_node="">2700 miles</span></a><span data-dcnode-id="207" instrument_node="">, from Norway to Canada, in three months. That's over 30 miles a day.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="204" data-mm-id="_oarl81w12"><span data-dcnode-id="205" instrument_node="">20. Foxes appear throughout folklore.</span></h2><div data-dcnode-id="187" data-mm-id="_z3wiikzd5"><div class="style_1tb5rbs" data-dcnode-id="188"><figure class="base_1u373dh" data-dcnode-id="195" data-id="_z3wiikzd5"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="203" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="198"><source data-dcnode-id="202"><source data-dcnode-id="201"><source data-dcnode-id="200"><img alt="Reynard the Fox as depicted in an 1869 children's book." class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="199" title="Reynard the Fox as depicted in an 1869 children's book."></picture><noscript data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-wikimedia-commons-19549e167a6a366b598f194678673355.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-wikimedia-commons-19549e167a6a366b598f194678673355.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-wikimedia-commons-19549e167a6a366b598f194678673355.jpg 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-wikimedia-commons-19549e167a6a366b598f194678673355.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-wikimedia-commons-19549e167a6a366b598f194678673355.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-wikimedia-commons-19549e167a6a366b598f194678673355.jpg 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-wikimedia-commons-19549e167a6a366b598f194678673355.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-wikimedia-commons-19549e167a6a366b598f194678673355.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-wikimedia-commons-19549e167a6a366b598f194678673355.jpg 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/59739-wikimedia-commons-19549e167a6a366b598f194678673355.jpg" alt="Reynard the Fox as depicted in an 1869 children&amp;#x27;s book." title="Reynard the Fox as depicted in an 1869 children&amp;#x27;s book."/&gt;&lt;/picture&gt;</span></noscript></figure><div class="wrapper_dyw7h8" data-dcnode-id="189"><figcaption class="tagStyle_1eoo5cn-o_O-text_1la93q1" data-dcnode-id="190"><span data-dcnode-id="194" instrument_node="">Reynard the Fox as depicted in an 1869 children's book. / Ernest Henri Griset, </span><a class="style_1i5d9um" data-dcnode-id="192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reynard_the_Fox%23/media/File%3AReynard-the-fox.jpg" target="_blank"><span data-dcnode-id="193" instrument_node="">Wikimedia Commons </span></a><span data-dcnode-id="191" instrument_node="">// Public Domain</span></figcaption></div></div></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="179" data-mm-id="_5hv5ij8rx"><span data-dcnode-id="186" instrument_node="">Examples include the nine-tail fox from various Asian cultures; the Reynard tales from medieval Europe; the sly trickster fox from Native American lore; and Aesop's “</span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eastoftheweb.com/short-stories/UBooks/FoxCrow.shtml" target="_blank"><span data-dcnode-id="185" instrument_node="">The Fox and the Crow</span></a><span data-dcnode-id="183" instrument_node="">.” The Finnish believed a fox made the Northern Lights by running in the snow so that its tail swept sparks into the sky. From this, we get the phrase “fox fires” (though “Firefox,” like the Mozilla internet browser, refers to the </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mentalfloss.com/article/63578/12-furry-facts-about-red-pandas" target="_self"><span data-dcnode-id="182" instrument_node="">red panda</span></a><span data-dcnode-id="180" instrument_node="">).</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="177" data-mm-id="_jes43dztz"><span data-dcnode-id="178" instrument_node="">21. Foxes are associated with being sneaky.</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="169" data-mm-id="_axlpil1uv"><span data-dcnode-id="176" instrument_node="">In Western culture, foxes have long been called wily, clever, and cunning. This isn't a compliment, however, as these foxes were portrayed as </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ct.gov/kids/cwp/view.asp%3Fa%3D2577%26q%3D475862" target="_blank"><span data-dcnode-id="175" instrument_node="">deceptive tricksters</span></a><span data-dcnode-id="173" instrument_node=""> only out for themselves. This attitude may reflect the fox's adaptability, nocturnal habits, and tenacious ability to get into a hen house or evade hunting dogs. Certainly foxes still outwit humans on a regular basis. In one video, an Arctic fox </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DZq9HOBia7UY" target="_blank"><span data-dcnode-id="172" instrument_node="">appears to play dead</span></a><span data-dcnode-id="170" instrument_node=""> to escape Siberian fur trappers—proving itself to be one sly fox.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="167" data-mm-id="_l5i8kve3v"><span data-dcnode-id="168" instrument_node="">22. In London, foxes are domesticating themselves.</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="159" data-mm-id="_3s1zfctoq"><span data-dcnode-id="166" instrument_node="">A study looking at </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//royalsocietypublishing.org/doi/10.1098/rspb.2020.0763" target="_blank"><span data-dcnode-id="165" instrument_node="">urban foxes in London</span></a><span data-dcnode-id="163" instrument_node=""> revealed something surprising: They are starting to look more like domesticated dogs. Compared to their rural relatives, London foxes have shorter snouts and smaller brains. While it's unclear why this is, the strange part is that the foxes are doing this to themselves. As evolutionary biologist Kevin Parsons </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/uk-scotland-glasgow-west-52892194" target="_blank"><span data-dcnode-id="162" instrument_node="">explained to</span></a><span data-dcnode-id="160" instrument_node=""> the BBC, “This is the result of foxes that have decided to live near people, showing these traits that make them look more like domesticated animals.”</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="157" data-mm-id="_nedk5qmip"><span data-dcnode-id="158" instrument_node="">23. Bat-eared foxes listen for insects.</span></h2><div data-dcnode-id="143" data-mm-id="_gw01aajpj"><div class="style_1tb5rbs" data-dcnode-id="144"><figure class="base_1u373dh" data-dcnode-id="148" data-id="_gw01aajpj"><canvas class="style_1e28o3x-o_O-initial_9vayoh" data-dcnode-id="156" height="315" width="560"></canvas><picture class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="151"><source data-dcnode-id="155"><source data-dcnode-id="154"><source data-dcnode-id="153"><img alt="A bat-eared fox." class="base_1emrqjj-o_O-initial_fzbddc-o_O-style_1a1csmw" data-dcnode-id="152" title="A bat-eared fox."></picture><noscript data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">&lt;picture class="base_1emrqjj"&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_360,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-516814617-b6fe4aae076eef22d2fc42b0b65882b2.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-516814617-b6fe4aae076eef22d2fc42b0b65882b2.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1080,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-516814617-b6fe4aae076eef22d2fc42b0b65882b2.jpg 3x" media="(max-width: 719px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-516814617-b6fe4aae076eef22d2fc42b0b65882b2.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-516814617-b6fe4aae076eef22d2fc42b0b65882b2.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-516814617-b6fe4aae076eef22d2fc42b0b65882b2.jpg 3x" media="(max-width: 1079px)"/&gt;&lt;source srcSet="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-516814617-b6fe4aae076eef22d2fc42b0b65882b2.jpg 1x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-516814617-b6fe4aae076eef22d2fc42b0b65882b2.jpg 2x, https://images2.minutemediacdn.com/image/upload/c_fill,w_1440,ar_16:9,f_auto,q_auto,g_auto/shape%2Fcover%2Fsport%2F59739-gettyimages-516814617-b6fe4aae076eef22d2fc42b0b65882b2.jpg 3x" media="(min-width: 1080px)"/&gt;&lt;img class="base_1emrqjj" src="https://images2.minutemediacdn.com/image/upload/c_fill,w_720,ar_16:9,f_auto,q_auto,g_auto/shape/cover/sport/59739-gettyimages-516814617-b6fe4aae076eef22d2fc42b0b65882b2.jpg" alt="A bat-eared fox." title="A bat-eared fox."/&gt;&lt;/picture&gt;</span></noscript></figure><div class="wrapper_dyw7h8" data-dcnode-id="145"><figcaption class="tagStyle_1eoo5cn-o_O-text_1la93q1" data-dcnode-id="146"><span data-dcnode-id="147" instrument_node="">A bat-eared fox. / GNNick/iStock via Getty Images</span></figcaption></div></div></div><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="129" data-mm-id="_wb3szor7w"><span data-dcnode-id="142" instrument_node="">The bat-eared fox is aptly named, not just because of its 5-inch ears, but because of what it uses those ears for—like </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mentalfloss.com/article/648320/common-misconceptions-about-bats" target="_self"><span data-dcnode-id="141" instrument_node="">the bat</span></a><span data-dcnode-id="139" instrument_node="">, it </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pbs.org/wnet/nature/animal-guide-bat-eared-fox/3249/" target="_blank"><span data-dcnode-id="138" instrument_node="">listens for insects</span></a><span data-dcnode-id="136" instrument_node="">. On a typical night, it walks along the African savannah, listening for prey digging underground. Although the fox eats a variety of insects and lizards, most of its diet is made up of </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awf.org/wildlife-conservation/bat-eared-fox" target="_blank"><span data-dcnode-id="135" instrument_node="">termites</span></a><span data-dcnode-id="133" instrument_node="">. In fact, the bat-eared fox often </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//animals.sandiegozoo.org/animals/bat-eared-fox" target="_blank"><span data-dcnode-id="132" instrument_node="">makes its home</span></a><span data-dcnode-id="130" instrument_node=""> in termite mounds, which it usually cleans out of inhabitants before moving in.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="127" data-mm-id="_uk711ghqu"><span data-dcnode-id="128" instrument_node="">24. Charles Darwin discovered a fox species.</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="119" data-mm-id="_74s55mo8r"><span data-dcnode-id="126" instrument_node="">During his voyage on the Beagle, </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mentalfloss.com/biographies/scientists/610411-charles-darwin-biography-facts-theory-evolution-and-books" target="_self"><span data-dcnode-id="125" instrument_node="">Charles Darwin</span></a><span data-dcnode-id="123" instrument_node=""> discovered a small fox on Chiloé Island off the coast of Chile. The fox was sitting on a rocky cliff gazing curiously at the ship anchored offshore. </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medium.com/greener-together/darwin-knocked-a-fox-on-its-head-during-his-voyage-and-we-now-call-the-fox-darwins-fox-438074024fe7" target="_blank"><span data-dcnode-id="122" instrument_node="">Darwin wrote</span></a><span data-dcnode-id="120" instrument_node="">, “He was so intently absorbed in watching the work of the officers, that I was able, by quietly walking up behind, to knock him on the head with my geological hammer.”</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="114" data-mm-id="_ztbu2cbps"><span data-dcnode-id="118" instrument_node="">Today, this small gray fox is </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//animalia.bio/darwins-fox" target="_blank"><span data-dcnode-id="117" instrument_node="">critically endangered</span></a><span data-dcnode-id="115" instrument_node=""> and lives in two spots in the world: On the Island of Chiloé and the mainland of Chile near a national park. The fox's greatest threats are habitat loss and rabid dogs.</span></p><h2 class="tagStyle_1saq61g-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="112" data-mm-id="_20e8koffi"><span data-dcnode-id="113" instrument_node="">25. What does the fox say? A lot, actually.</span></h2><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="104" data-mm-id="_tdva546yd"><span data-dcnode-id="111" instrument_node="">Foxes make 40 different sounds, some of which you can listen to </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DJ6NuhlibHsM%26amp%3Bfeature%3Dyoutu.be" target="_blank"><span data-dcnode-id="110" instrument_node="">here</span></a><span data-dcnode-id="108" instrument_node="">. The most startling, though, might be </span><a class="tagStyle_18h2erd-o_O-style_1i5d9um" data-dcnode-id="106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dzk1mAd77Hr4" target="_blank"><span data-dcnode-id="107" instrument_node="">its scream</span></a><span data-dcnode-id="105" instrument_node="">.</span></p><p class="tagStyle_18h2erd-o_O-style_a7x3hw-o_O-style_48hmcm-o_O-style_1eq89f5" data-dcnode-id="101" data-mm-id="_dbglcatbc"><em data-dcnode-id="102"><span data-dcnode-id="103" instrument_node="">A version of this article was o
