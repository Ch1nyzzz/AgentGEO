strument_node=""> </span><a class="close" data-dcnode-id="1338" data-v-13907676="" href="#"><span data-dcnode-id="1339" instrument_node="">close</span></a></div><span data-dcnode-id="1336" instrument_node=""> </span><div class="video-container" data-dcnode-id="1329" data-v-13907676=""><div class="m video-player" data-dcnode-id="1330" data-v-13907676="" data-video-domain="foxnews" data-video-id="6289233225001" data-widget-type="embed"><a data-dcnode-id="1331" data-v-13907676="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//video.foxnews.com/v/6289233225001" style="width: 100%; height: 100%; position: absolute;"><img alt="Graham: GOP needs America-first agenda to stand a chance in 2022 midterms" data-dcnode-id="1335" data-v-13907676="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//a57.foxnews.com/cf-images.us-east-1.prod.boltdns.net/v1/static/694940094001/73ab92a8-800e-4d8e-8a2a-b67abef88ddb/3bd4f01d-556f-415d-bb80-064f0c1155fc/1280x720/match/931/524/image.jpg%3Fve%3D1%26tl%3D1&amp;raw"><span data-dcnode-id="1334" instrument_node=""> </span><span class="overlay" data-dcnode-id="1332" data-v-13907676=""><span data-dcnode-id="1333" instrument_node="">Video</span></span></a></div></div><span data-dcnode-id="1328" instrument_node=""> </span><div class="info" data-dcnode-id="1320" data-v-13907676=""><div class="caption" data-dcnode-id="1321" data-v-13907676=""><h4 class="title" data-dcnode-id="1325" data-v-13907676=""><a data-dcnode-id="1326" data-v-13907676="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//video.foxnews.com/v/6289233225001"><span data-dcnode-id="1327" instrument_node="">Graham: GOP needs America-first agenda to stand a chance in 2022 midterms</span></a></h4><span data-dcnode-id="1324" instrument_node=""> </span><p data-dcnode-id="1322" data-v-13907676=""><span data-dcnode-id="1323" instrument_node=""> Sen. Lindsey Graham said that Democrats have misplaced their hand and explained the GOP's path to power for the midterm elections in 2022 on 'Hannity.'</span></p></div></div></div></div><div class="speechkit-wrapper" data-dcnode-id="1313" id="speechkit-wrapper"><div class="info" data-dcnode-id="1314"><span class="label-bg" data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">NEW</span></span><span data-dcnode-id="1315" instrument_node="">You can now listen to Fox News articles!
  </span></div></div><p class="speakable" data-dcnode-id="661"><i data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">This is a rush transcript of "Hannity" on December 29, 2021. This copy may not be in its final form and may be updated.</span></i><br data-dcnode-id="1310"><br data-dcnode-id="1309"><span data-dcnode-id="1308" instrument_node="">PETE HEGSETH, GUEST HOST:All right. Welcome to this special edition of HANNITY. I'm Pete Hegseth, in for Sean.</span><br data-dcnode-id="1307"><br data-dcnode-id="1306"><span data-dcnode-id="1305" instrument_node="">And tonight, a brand new milestone, a grim one for the Biden White House. Yesterday, the United States recorded the most single day COVID cases ever.</span><br data-dcnode-id="1304"><br data-dcnode-id="1303"><span data-dcnode-id="1302" instrument_node="">Now, you'll remember Biden once vowed to shut down the virus, something that was never going to happen. He said it over and over again. It was his only election strategy, along with hiding in his basement, double masked, you know?</span><br data-dcnode-id="1301"><br data-dcnode-id="1300"><span data-dcnode-id="1299" instrument_node="">But now, for the very first time, the CDC is putting every state in the Union on red alert for high COVID transmission.</span><br data-dcnode-id="1298"><br data-dcnode-id="1297"><span data-dcnode-id="1296" instrument_node="">As the RNC points out, this is yet another humiliating failure, all of it caught on tape. Take a look.</span><br data-dcnode-id="1295"><br data-dcnode-id="1294"><span data-dcnode-id="1293" instrument_node="">(BEGIN VIDEO CLIPS)</span><br data-dcnode-id="1292"><br data-dcnode-id="1291"><span data-dcnode-id="1290" instrument_node="">JOE BIDEN, PRESIDENT OF THE UNITED STATES: I'm not going to shut down the economy. I'm not going to shut down the country, but I'm going to shut down the virus.</span><br data-dcnode-id="1289"><br data-dcnode-id="1288"><span data-dcnode-id="1287" instrument_node="">I'm going to shut down the virus.</span><br data-dcnode-id="1286"><br data-dcnode-id="1285"><span data-dcnode-id="1284" instrument_node="">I'm going to shut down the virus.</span><br data-dcnode-id="1283"><br data-dcnode-id="1282"><span data-dcnode-id="1281" instrument_node="">I will take care of this. I will end this. I will make sure we have a plan.</span><br data-dcnode-id="1280"><br data-dcnode-id="1279"><span data-dcnode-id="1278" instrument_node="">I'm going to shut down the virus. I'll shut down the virus. We're going to shut down the virus.</span><br data-dcnode-id="1277"><br data-dcnode-id="1276"><span data-dcnode-id="1275" instrument_node="">What I would say is I'm going to shut down the virus.</span><br data-dcnode-id="1274"><br data-dcnode-id="1273"><span data-dcnode-id="1272" instrument_node="">I'm going to shut down the virus.</span><br data-dcnode-id="1271"><br data-dcnode-id="1270"><span data-dcnode-id="1269" instrument_node="">Look, there is no federal solution. This gets solved at a state level.</span><br data-dcnode-id="1268"><br data-dcnode-id="1267"><span data-dcnode-id="1266" instrument_node="">(END VIDEO CLIPS)</span><br data-dcnode-id="1265"><br data-dcnode-id="1264"><span data-dcnode-id="1263" instrument_node="">HEGSETH: It's not aging well, not aging well at all. Like every other broken promise, Biden either doesn't remember or doesn't care.</span><br data-dcnode-id="1262"><br data-dcnode-id="1261"><span data-dcnode-id="1260" instrument_node="">Now, while COVID rages, he's enjoying some -- look at him out there frolicking -- rest in real action at the beach with his wife, Dr. First Lady Jill Biden, his new dog and his N95 surgical mask. Of course, I wonder if the dog gets a mask. You should look into that.</span><br data-dcnode-id="1259"><br data-dcnode-id="1258"><span data-dcnode-id="1257" instrument_node="">Meanwhile, back in Washington, Biden's chief of staff Ron Klain attempting to clean up Joe's mess. Watch this.</span><br data-dcnode-id="1256"><br data-dcnode-id="1255"><span data-dcnode-id="1254" instrument_node="">(BEGIN VIDEO CLIP)</span><br data-dcnode-id="1253"><br data-dcnode-id="1252"><span data-dcnode-id="1251" instrument_node="">RON KLAIN, WHITE HOUSE CHIEF OF STAFF: I think what the president was saying is this is an effort that the federal government's leading, in close partnerships with the states. The federal government provides the vaccines to the states. The federal government is massively expanding testing. We're obviously standing up federally funded testing centers all over the country, federally funded efforts to help hospitals.</span><br data-dcnode-id="1250"><br data-dcnode-id="1249"><span data-dcnode-id="1248" instrument_node="">So I think what you heard the president emphasizing yesterday in a conversation with Asa Hutchison, a conservative Republican governor from Arkansas who opposes our federal vaccine requirements, nonetheless who's worked very closely with this administration to try to make sure we're getting the help we need to the state.</span><br data-dcnode-id="1247"><br data-dcnode-id="1246"><span data-dcnode-id="1245" instrument_node="">So this is a joint federal state effort. It's led by the federal government. We have responsibility for the overall response. We're working closely with both Democratic and Republican governors without regard to partisan affiliation to help tackle the problems that this virus is spreading.</span><br data-dcnode-id="1244"><br data-dcnode-id="1243"><span data-dcnode-id="1242" instrument_node="">(END VIDEO CLIP)</span><br data-dcnode-id="1241"><br data-dcnode-id="1240"><span data-dcnode-id="1239" instrument_node="">HEGSETH: I'm reminded of former President Ronald Reagan when he said the nine most dangerous words in the English language, I'm from the government and I'm here to help. Yeah, we're all reassured by that Ron.</span><br data-dcnode-id="1238"><br data-dcnode-id="1237"><span data-dcnode-id="1236" instrument_node="">A partnership with the states he says unless that state is Florida apparently. According to the state's surgeon general in Florida, the Biden administration is actively preventing -- actively preventing the distribution of life-saving monoclonal antibodies in Florida, cutting its supply dramatically. Therapeutics, you know, the things that prevent you from dying or get getting more sick from COVID-19, they're preventing it.</span><br data-dcnode-id="1235"><br data-dcnode-id="1234"><span data-dcnode-id="1233" instrument_node="">Is this a politically motivated act or science? Time will tell.</span><br data-dcnode-id="1232"><br data-dcnode-id="1231"><span data-dcnode-id="1230" instrument_node="">But we do know that Florida is one of the several states challenging the Biden administration's unconstitutional vaccine mandates in court. South Dakota also suing the White House. Now the state's governor Kristi Noem is demanding that Biden rescind all federal mandates.</span><br data-dcnode-id="1229"><br data-dcnode-id="1228"><span data-dcnode-id="1227" instrument_node="">Governor Kristi Noem joins us now with more.</span><br data-dcnode-id="1226"><br data-dcnode-id="1225"><span data-dcnode-id="1224" instrument_node="">And we really appreciate you being here. Governor, thanks so much. Merry Christmas. Happy New Year. It's always great to see you.</span><br data-dcnode-id="1223"><br data-dcnode-id="1222"><span data-dcnode-id="1221" instrument_node="">GOV. KRISTI NOEM (R), SOUTH DAKOTA: Merry Christmas.</span><br data-dcnode-id="1220"><br data-dcnode-id="1219"><span data-dcnode-id="1218" instrument_node="">HEGSETH: But residents of your state -- I mean, we're going to get to this later on the show, Anthony Fauci said, you know, don't kiss, don't hug on New Year's. We'll -- we'll get to that.</span><br data-dcnode-id="1217"><br data-dcnode-id="1216"><span data-dcnode-id="1215" instrument_node="">NOEM: Uh-huh.</span><br data-dcnode-id="1214"><br data-dcnode-id="1213"><span data-dcnode-id="1212" instrument_node="">HEGSETH: But when it comes to these mandates that they've now acknowledged not effective federally and it's a state issue, what more can governors do? I mean, you've led the -- you've led the charge. How can people be reassured that their future isn't vaccine mandates and double masks?</span><br data-dcnode-id="1211"><br data-dcnode-id="1210"><span data-dcnode-id="1209" instrument_node="">NOEM: Well, I'm thrilled that President Biden is finally agreeing with me. We have asked him to back off of these mandates. We have told him and now we're suing him in court.</span><br data-dcnode-id="1208"><br data-dcnode-id="1207"><span data-dcnode-id="1206" instrument_node="">Frankly, the federal government doesn't have the authority to take these types of actions, by requiring people to get vaccinated for their job or to receive federal funding, or if they want to have a contract with the federal government, or even participate in Head Start contracts.</span><br data-dcnode-id="1205"><br data-dcnode-id="1204"><span data-dcnode-id="1203" instrument_node="">So we are suing him in court and those will be heard within a week in the Supreme Court. We're looking forward to those being heard because we'll win, and I think the president does know that he's under a shaky ground here.</span><br data-dcnode-id="1202"><br data-dcnode-id="1201"><span data-dcnode-id="1200" instrument_node="">It's interesting to me for him to say that the federal government isn't the answer, that the answer has to come from the states, when that's exactly what us as governors have been asking to let us do. Let us have the flexibility, let us use personal responsibility, trust our people to make the right decisions.</span><br data-dcnode-id="1199"><br data-dcnode-id="1198"><span data-dcnode-id="1197" instrument_node="">So, South Dakota has done that all along and we've proven that it works and I'm hopeful that President Biden will back off and start focusing on what his job actually is.</span><br data-dcnode-id="1196"><br data-dcnode-id="1195"><span data-dcnode-id="1194" instrument_node="">HEGSETH: Now that Joe Biden has acknowledged there's no federal solution, as a -- as a governor of a free state who's taken an approach of actually balancing science and freedom, what are your advice to governors like Governor Hochul in New York or Governor Murphy in New Jersey or Governor Newsom in California? How should they approach it in a way similar to what you've done so that residents of those states who are trapped can actually go about their lives, say, in 2022? What should those governors do differently?</span><br data-dcnode-id="1193"><br data-dcnode-id="1192"><span data-dcnode-id="1191" instrument_node="">NOEM: Well, first of all, they should visit with their general counsel. They should talk with constitutional attorneys, find out what authority they have and what authority they do not have. What is their job and then go do their job.</span><br data-dcnode-id="1190"><br data-dcnode-id="1189"><span data-dcnode-id="1188" instrument_node="">And number one, shut off the TV, stop picking up the phone and talking to the White House. Instead, go out and walk the streets talk to the people. Visit with the small business owners. Visit with the moms who just want their kids in school and life to go back to normal.</span><br data-dcnode-id="1187"><br data-dcnode-id="1186"><span data-dcnode-id="1185" instrument_node="">They will see the suffering all over their faces when they realize that these little kiddos haven't had the chance to learn like they should, that their businesses are closing and that women-owned businesses are being hurt at a larger number than many others, and that minority populations are struggling and we've got higher crime rates because of the frustration and the conflict that we are breeding in this country.</span><br data-dcnode-id="1184"><br data-dcnode-id="1183"><span data-dcnode-id="1182" instrument_node="">So, a lot of times they're losing perspective and I tell people consistently, take the emotion out of this discussion, start studying the science and the facts, and let's get back to the basics. Still, Pete, the number one thing that people can do to slow down the spread of a virus -- go wash your hands. Go wash your hands. I'm shocked by the amount of times that I have to go remind people of that.</span><br data-dcnode-id="1181"><br data-dcnode-id="1180"><span data-dcnode-id="1179" instrument_node="">And if you're sick stay home. And if you're scared, stay home. But let the people that need to go out and make a living and get their kids educated, let them go do that because that's really what needs to happen in this country is that we still need to continue to live.</span><br data-dcnode-id="1178"><br data-dcnode-id="1177"><span data-dcnode-id="1176" instrument_node="">HEGSETH: It's true. Wash your hands, that's a very good and important reminder for me, something I will take note of in 2022.</span><br data-dcnode-id="1175"><br data-dcnode-id="1174"><span data-dcnode-id="1173" instrument_node="">But you're right. It's simple stuff. It hasn't actually changed. We know who it affects.</span><br data-dcnode-id="1172"><br data-dcnode-id="1171"><span data-dcnode-id="1170" instrument_node="">We know it's not young kids. There's no reason to keep them locked out. There's no reason to have them in masks.</span><br data-dcnode-id="1169"><br data-dcnode-id="1168"><span data-dcnode-id="1167" instrument_node="">Your state is doing it and that's why we see a great migration from states with lockdowns to free states like yours in South Dakota.</span><br data-dcnode-id="1166"><br data-dcnode-id="1165"><span data-dcnode-id="1164" instrument_node="">Governor, thank you so much for joining us this evening. We appreciate it.</span><br data-dcnode-id="1163"><br data-dcnode-id="1162"><span data-dcnode-id="1161" instrument_node="">All right. Now, let's turn once again we referenced them for a second there. America's little king, Dr. Anthony Fauci. This week, a new personal best for Biden's top doctor in the span of hours.</span><br data-dcnode-id="1160"><br data-dcnode-id="1159"><span data-dcnode-id="1158" instrument_node="">He managed to flip-flop three times following the signs -- always remember he is science. He flip-flopped three times on vaccine mandates for domestic air travel, not international air travel, domestic. That means that they're considering -- and Dr. Fauci acknowledged this today, they're considering on their list potentially to require a COVID vaccine to fly from Detroit to New York or San Francisco to Dallas.</span><br data-dcnode-id="1157"><br data-dcnode-id="1156"><span data-dcnode-id="1155" instrument_node="">That's on their list and he walked it back a little bit but barely, and he's -- it's all about the science. Don't worry. Dr. Fauci has no other consideration. It also tonight brings me no joy to report that you the American people are paying Dr. Fauci over $430,000 each year for his stellar work.</span><br data-dcnode-id="1154"><br data-dcnode-id="1153"><span data-dcnode-id="1152" instrument_node="">I will note the president of the United States makes $400,000 a year. So it begs the question as we ask all the time, who is the real president? He's making 430. We're following the science, he is the science, why not pay him 430 grand?</span><br data-dcnode-id="1151"><br data-dcnode-id="1150"><span data-dcnode-id="1149" instrument_node="">And when Dr. Fauci finally retires, if ever, no one in Washington retires, they stay there forever, he'll earn an estimated 350 grand in his pension for the rest of his life. It's a pretty large sum for someone who has been an abject failure when it mattered the most, flip-flopping on everything. But, of course, not -- not coming through when you need them. That's classic government.</span><br data-dcnode-id="1148"><br data-dcnode-id="1147"><span data-dcnode-id="1146" instrument_node="">Under Fauci's ever evolving guidance, the government is now taking extreme measures against Americans they deem unfit for society. A couple of examples, as we speak, thousands of U.S. marines, some of which I'm in touch with right now, are now facing dismissal for refusing to get the shot. Several marines told FOXnews.com that what they are witnessing is a political purge. In fact, not one single religious exemption has been given to a single marine in our Marine Corps today. All of them denied.</span><br data-dcnode-id="1145"><br data-dcnode-id="1144"><span data-dcnode-id="1143" instrument_node="">Meanwhile in New York City, police forcibly removed an African-American family from a restaurant, including a mother and a small child because of the city's vaccine mandate. Now, we're ripping people out of seats.</span><br data-dcnode-id="1142"><br data-dcnode-id="1141"><span data-dcnode-id="1140" instrument_node="">It's no wonder Americans are now leaving blue states in droves. According to data from the U.S. Census and this is featured in "The Wall Street Journal" today, hundreds of thousands of Americans have fled New York, California and Illinois during COVID-19, while Texas and Florida, read freedom, gained over 500,000 new residents.</span><br data-dcnode-id="1139"><br data-dcnode-id="1138"><span data-dcnode-id="1137" instrument_node="">Joining us now for reaction are ranking member House -- of the House Judiciary Committee, Congressman Jim Jordan, former Massachusetts Senator Scott Brown, and FOX News medical contributor, Dr. Nicole Saphier.</span><br data-dcnode-id="1136"><br data-dcnode-id="1135"><span data-dcnode-id="1134" instrument_node="">Doctor, let me start with you since we invoked the other doctor in this particular case. He's been there a long time, he makes a lot of money and he's wrong a lot. Is that not a perfect example of Washington D.C.?</span><br data-dcnode-id="1133"><br data-dcnode-id="1132"><span data-dcnode-id="1131" instrument_node="">DR. NICOLE SAPHIER, FOX NEWS MEDICAL CONTRIBUTOR: Oh, well, Pete, I mean - - let's be honest, at this point, I think we haven't gotten anything right when it's come to COVID-19 coming out of the White House, the administration, Dr. Fauci, even the CDC. The CDC continues to flip-flop every single day it's like a center for disinformation these days.</span><br data-dcnode-id="1130"><br data-dcnode-id="1129"><span data-dcnode-id="1128" instrument_node="">But what I can tell you, you know, some of the verbiage that's coming out of Dr. Fauci recently, talking about vaccine mandates for domestic air travel, to shortening the isolation post-infection, I can tell you, first of all, I'm a big fan of shortening isolation as well as shortening the post-exposure quarantines. I think that was necessary. I think that was far overdue.</span><br data-dcnode-id="1127"><br data-dcnode-id="1126"><span data-dcnode-id="1125" instrument_node="">And this is what we had to be done because we have a man-made worker shortage because of the vaccine mandates and because of these asinine long isolation protocols which by the way the data didn't change just in the last week. The data has been there for the last six months. They should have shortened these much earlier, but now they found themselves in a crunch, so they had to catch up a little bit.</span><br data-dcnode-id="1124"><br data-dcnode-id="1123"><span data-dcnode-id="1122" instrument_node="">And I can tell you the vaccine mandates for domestic travel, they're going to work just about as good as those vaccine mandates on the cruise ships. You remember the cruise ships that are all out to sea right now --</span><br data-dcnode-id="1121"><br data-dcnode-id="1120"><span data-dcnode-id="1119" instrument_node="">HEGSETH: Uh-huh.</span><br data-dcnode-id="1118"><br data-dcnode-id="1117"><span data-dcnode-id="1116" instrument_node="">SAPHIER: -- because even though every single person had to be vaccinated on there, they have major outbreaks happening. So, we're -- the concept of other reflex?</span><br data-dcnode-id="1100"><br data-dcnode-id="1099"><span data-dcnode-id="1098" instrument_node="">SCOTT BROWN (R), FORMER U.S. SENATOR FOR MASSACHUSETTS: Well, listen, President Biden's efforts have been an abject failure and what will happen is he'll -- you know, do the same old thing. He'll roll out Fauci. He'll do all the Sunday morning shows and talk about doom and gloom and the sky is falling. Oh my goodness, you need to do this and that, and more and more and more mandates as evident in New York City. What's happening there is just uncontrollable.</span><br data-dcnode-id="1097"><br data-dcnode-id="1096"><span data-dcnode-id="1095" instrument_node="">Listen, this is a work in progress trying to address a virus that obviously started in China and is morphing into something new and different almost each and every week or month, and I understand that. But the lack of real communication, the lack of making sure that we're not misspeaking, over- speaking, creating mandates strictly for political reasons which I believe is happening right now under this administration, he's a tool of the teachers union. They're obviously keeping our kids at school. We're seeing more and more draconian measures in places like New York.</span><br data-dcnode-id="1094"><br data-dcnode-id="1093"><span data-dcnode-id="1092" instrument_node="">I mean, you obviously had the governor on now. There are other states who are allowing for personal freedoms, personal decisions. What about testing? What about mask, social distancing, washing your hands? Those are all in vogue before.</span><br data-dcnode-id="1091"><br data-dcnode-id="1090"><span data-dcnode-id="1089" instrument_node="">But now, you can't do it. You either have a card or you don't you're either in with the in liberal crowd or you're not, and it's got to stop. And I'm very thankful each and every day that President Trump worked hard to get Operation Warp Speed out, because guess and imagine where we'd be right nvaccinated, and Democrats now want them to vote.</span><br data-dcnode-id="1067"><br data-dcnode-id="1066"><span data-dcnode-id="1065" instrument_node="">But an American citizen, if you don't get vaxxed, you can't go buy a Big Mac or get on a plane, this is crazy the American people have had it. They're going to stand up and speak out loudly and clearly just like they did in Virginia two months ago, just like they did in Kenosha, Wisconsin, with those jurors.</span><br data-dcnode-id="1064"><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">They're going to do it again in November. You can feel it coming.</span><br data-dcnode-id="1061"><br data-dcnode-id="1060"><span data-dcnode-id="1059" instrument_node="">HEGSETH: Doctor, is there any chance they start to say, okay, therapeutics have been effective or is it just the new therapeutics? Or natural immunity would be worth adding to the idea of herd immunity? Or can they only double down on what they've done before?</span><br data-dcnode-id="1058"><br data-dcnode-id="1057"><span data-dcnode-id="1056" instrument_node="">SAPHIER; Well, you know, Pete, it's -- unfortunately, it's taking a little bit of time but you do see subtleties that they are starting to accept natural immunity. You even see on the CDC's website that they're mentioning that there may be some protection with natural immunity but then they continue to quote some of their very subpar studies that they have done themselves which are nothing compared to the more robust studies that are done by other institutions that shows the protectiveness of natural immunity, especially hybrid immunity when you're fully vaccinated and then have a breakthrough infection. I mean, then you are just a wall of immunity.</span><br data-dcnode-id="1055"><br data-dcnode-id="1054"><span data-dcnode-id="1053" instrument_node="">But at some point they are going to have to start acknowledging it and I'll tell you, if you really want to decrease the spread of this virus, rather than having these vaccine mandates of getting on airplanes or other, showing that proof of recent infection or a negative rapid antigen test, those are going to be your two means of lessening the spread mostly. It's not going to be that vaccine card showing that you had vaccinations earlier in the year because we know that you are still able to not only get infected as well as transmit it.</span><br data-dcnode-id="1052"><br data-dcnode-id="1051"><span data-dcnode-id="1050" instrument_node="">The goal of vaccinations and boosters at this point is not really to slow the spread. It is to keep people out of the hospital and is to protect the high risk. And moving forward, that's what it needs to be. You target the high risk populations and make sure that they have access to high quality masks, as well as treatments. We need to not only focus on the testing shortages but make sure that those treatments can get out there.</span><br data-dcnode-id="1049"><br data-dcnode-id="1048"><span data-dcnode-id="1047" instrument_node="">And one of the things we talked about one of the blunders of the CDC recently was that they overestimated how much omicron was there. Well, what did they do? They quickly pulled back on the supply of monoclonal antibodies. All of a sudden, they weren't sending it out to hospitals for the high-risk patients because they said it's not going to work against omicron. Well, whoopsy, delta is still much more prevalent and all of a sudden we don't have access to monoclonal antibodies for those patients.</span><br data-dcnode-id="1046"><br data-dcnode-id="1045"><span data-dcnode-id="1044" instrument_node="">So they need to stop this. They need to get their act together make sure they're transparent with their data and be clear with their data stop being behind the eight ball when it comes to everyone else across the world. That's what's costing lives.</span><br data-dcnode-id="1043"><br data-dcnode-id="1042"><span data-dcnode-id="1041" instrument_node="">HEGSETH: That's the government does.</span><br data-dcnode-id="1040"><br data-dcnode-id="1039"><span data-dcnode-id="1038" instrument_node="">Colonel -- I should say colonel of the marine corps, kicking people out for not getting vaxxed, what does it do to our readiness and what does it tell you about the institution?</span><br data-dcnode-id="1037"><br data-dcnode-id="1036"><span data-dcnode-id="1035" instrument_node="">BROWN: Well, listen, I served for 49 years. You have an amazing career and thank you for all you do for our veterans. There's no one I believe in our country more worthy of getting some type of situation to address their concerns and needs.</span><br data-dcnode-id="1034"><br data-dcnode-id="1033"><span data-dcnode-id="1032" instrument_node="">The Marines are really our fighting force that goes in first and they're there -- well, the lawyer's going first to make sure everything's all right but then they go in with them. And to think that we're not going to give them some consideration and we're going to terminate people who are highly classified and highly sophisticated MOS's. And are you kidding me, to put our country's safety and security at risk?</span><br data-dcnode-id="1031"><br data-dcnode-id="1030"><span data-dcnode-id="1029" instrument_node="">This cannot continue to be a political football. We have to find common sense solutions to keep our economy going, to keep our children's mental and physical health and well-being okay, as well as our families, addressing our national security as China and others are trying to affect us, approving the Russian pipeline while terminating ours.</span><br data-dcnode-id="1028"><br data-dcnode-id="1027"><span data-dcnode-id="1026" instrument_node="">You know, footsie foot around with China as they're eating our lunch all around the globe. We have to get our act together or we're going to have some very, very serious problems.</span><br data-dcnode-id="1025"><br data-dcnode-id="1024"><span data-dcnode-id="1023" instrument_node="">This is not political anymore. This is personal. It should be personnel for everybody. They got to get out and vote this time.</span><br data-dcnode-id="1022"><br data-dcnode-id="1021"><span data-dcnode-id="1020" instrument_node="">HEGSETH: Yes.</span><br data-dcnode-id="1019"><br data-dcnode-id="1018"><span data-dcnode-id="1017" instrument_node="">BROWN: And we're going to make -- we're going to put this genie back into the bottle.</span><br data-dcnode-id="1016"><br data-dcnode-id="1015"><span data-dcnode-id="1014" instrument_node="">HEGSETH: Man, I wish we could. I've heard from so many guys who are facing this choice, many of which are very experienced, multiple combat tours and they're saying, I'm ending my career of 17 years, 15 years, 19 years because I am forced to get a vaccination. It's incredible.</span><br data-dcnode-id="1013"><br data-dcnode-id="1012"><span data-dcnode-id="1011" instrument_node="">Congressman Jordan, last word?</span><br data-dcnode-id="1010"><br data-dcnode-id="1009"><span data-dcnode-id="1008" instrument_node="">JORDAN: Well, it's not just what it does to our military readiness, Pete. It's what it's doing to the First Amendment, the very first right we enjoy as Americans, in the First Amendment, in the Bill of Rights, is your right to practice your faith. And that is exactly what they're going to -- going after. So, this is -- this is fundamental and it's fundamentally wrong what they're doing.</span><br data-dcnode-id="1007"><br data-dcnode-id="1006"><span data-dcnode-id="1005" instrument_node="">HEGSETH: Three smart people. Congressman Jordan, Ambassador and Colonel Brown, Dr. Saphier, thank you all for being with us tonight on HANNITY.</span><br data-dcnode-id="1004"><br data-dcnode-id="1003"><span data-dcnode-id="1002" instrument_node="">Straight ahead with disasters looming in next year's midterms, more House Democrats have announced their requirement. Senator Lindsey Graham joins us to weigh in on the upcoming election when we return.</span><br data-dcnode-id="1001"><br data-dcnode-id="1000"><span data-dcnode-id="999" instrument_node="">(COMMERCIAL BREAK)</span><br data-dcnode-id="998"><br data-dcnode-id="997"><span data-dcnode-id="996" instrument_node="">HEGSETH: As we close out 2021, a wave of retirements from congressional Democrats ahead of the midterms is suggesting that far left lawmakers -- well, they see the writing on the wall that we all see and would rather retire than suffer a humiliating defeat in November.</span><br data-dcnode-id="995"><br data-dcnode-id="994"><span data-dcnode-id="993" instrument_node="">So far, at least 23 House Democrats, almost two dozen, say they will not run for re-election, as Speaker Pelosi and her party try to defend their razor thin and radical razor thin majority amid massive policy failures too many to list almost, I know the show lists them sometimes and you have to scroll it.</span><br data-dcnode-id="992"><br data-dcnode-id="991"><span data-dcnode-id="990" instrument_node="">Those failures go all the way from the White House to Capitol Hill. Remember, Republicans need to gain just five seats to reclaim the majority, an early sign suggests the real possibility of a massive red wave blowout, bigger than '94, bigger than 2010, as Americans reject the destructive and radical Democrat agenda.</span><br data-dcnode-id="989"><br data-dcnode-id="988"><span data-dcnode-id="987" instrument_node="">And I'll ask again tonight, have you ever seen one man, Joe Biden, fail so much so fast? Is there one thing Biden-Harris have done to actually improve the lives of everyday common sense Americans?</span><br data-dcnode-id="986"><br data-dcnode-id="985"><span data-dcnode-id="984" instrument_node="">Can you name just one thing? Play the game at home, see if you can.</span><br data-dcnode-id="983"><br data-dcnode-id="982"><span data-dcnode-id="981" instrument_node="">Here to unpack that and much more, South Carolina Senat </span><br data-dcnode-id="959"><br data-dcnode-id="958"><span data-dcnode-id="957" instrument_node="">But when you -- if you're putting your finger on the pulse of 2022, does this look as big or bigger than '94 or 2010? Not to get ahead of ourselves but the dissatisfaction is and incompetence is so high, Republicans have a golden opportunity here.</span><br data-dcnode-id="956"><br data-dcnode-id="955"><span data-dcnode-id="954" instrument_node="">GRAHAM: Right. If we don't blow it, think of the word "backlash". There's a backlash coming against the most radical domestic policy agenda in the history of the United States, with a 50-50 Senate and a five-seat majority. The Democrats have misplayed their hand. They think they have a mandate they don't have.</span><br data-dcnode-id="953"><br data-dcnode-id="952"><span data-dcnode-id="951" instrument_node="">So if the Republicans can remain disciplined, policy is our friend. Remember the Trump years on the border, ISIS, Afghanistan, energy independence. We should talk every day about the differences between our policies in terms of domestic policies and international policies every day.</span><br data-dcnode-id="950"><br data-dcnode-id="949"><span data-dcnode-id="948" instrument_node="">So, 1994, I came in with a class of `94. We had a Contract with America promising people we would do these 10 things if you put us in charge. We need an American first agenda to run on. They suck as part of the deal but we need to be for things.</span><br data-dcnode-id="947"><br data-dcnode-id="946"><span data-dcnode-id="945" instrument_node="">Secure the border, finish the wall, rebuild the military, you know, become energy independent again.</span><br data-dcnode-id="944"><br data-dcnode-id="943"><span data-dcnode-id="942" instrument_node="">So I'm looking for an American first agenda led by Donald Trump that we can run on as a team and point out the flaws of the Biden agenda and we will clean their clock. In 1994, we won 73 seats to take over the Congress, the House for the first time in 40 years. If we play our cards right, we will exceed that.</span><br data-dcnode-id="941"><br data-dcnode-id="940"><span data-dcnode-id="939" instrument_node="">HEGSETH: You mentioned Donald Trump, Senator. Is he the nominee in 2024 right now?</span><br data-dcnode-id="938"><br data-dcnode-id="937"><span data-dcnode-id="936" instrument_node="">GRAHAM: Yeah, if he wants it. Unless there's something coming out of left field I don't see coming. It's his nomination if he wants it.</span><br data-dcnode-id="935"><br data-dcnode-id="934"><span data-dcnode-id="933" instrument_node="">The Republican base appreciated him. We don't appreciate all the things he does sometimes, but from a policy point of view, he was the most successful president. From a conservative's point of view since Ronald Reagan, it is his nomination if he wants it and he will be in the White House in 2024 if he runs a discipline campaign.</span><br data-dcnode-id="932"><br data-dcnode-id="931"><span data-dcnode-id="930" instrument_node="">And what he should do in my humble opinion is remind people how he secured the border, how he took the fight to ISIS, destroyed the caliphate, how we were so much better off internationally, the Iran deal is a nightmare in the making for Israel, regain energy independence.</span><br data-dcnode-id="929"><br data-dcnode-id="928"><span data-dcnode-id="927" instrument_node="">So I think 2024 is President Trump's election to lose quite frankly. 2022 is a blowout year for the Republicans in the House and the Senate if we'll talk about policy.</span><br data-dcnode-id="926"><br data-dcnode-id="925"><span data-dcnode-id="924" instrument_node="">HEGSETH: Real quick. We've got about a minute left. You mentioned, you know, November 2022, we both did.</span><br data-dcnode-id="923"><br data-dcnode-id="922"><span data-dcnode-id="921" instrument_node="">GRAHAM: Yeah.</span><br data-dcnode-id="920"><br data-dcnode-id="919"><span data-dcnode-id="918" instrument_node="">HEGSETH: It's a long ways off. Our enemies are looking at us right now. Once the Beijing Olympics are open if we participate or not, once they're done, the world could look much different.</span><br data-dcnode-id="917"><br data-dcnode-id="916"><span data-dcnode-id="915" instrument_node="">What -- what is the national security reality we're facing right now?</span><br data-dcnode-id="914"><br data-dcnode-id="913"><span data-dcnode-id="912" instrument_node="">GRAHAM: That the Iran -- the Iranians are not going to go back to the table in good faith. They're going to try to break out and dash toward a bomb and Israel's going to be in a box. They're going to have to use military force.</span><br data-dcnode-id="911"><br data-dcnode-id="910"><span data-dcnode-id="909" instrument_node="">And the question for me, are there any red lines for America? We should come up with red lines regarding the Iranian nuclear program and tell the ayatollah, if you cross them, we're coming after you. Not just Israel.</span><br data-dcnode-id="908"><br data-dcnode-id="907"><span data-dcnode-id="906" instrument_node="">I worry about Putin and Ukraine, China and Taiwan, and all started with Afghanistan.</span><br data-dcnode-id="905"><br data-dcnode-id="904"><span data-dcnode-id="903" instrument_node="">Pete, thank you for all you have done to remind Americans of our obligation to help those left behind. Thank you for your service. Happy New Year but we're going into a dangerous time -- the most dangerous time I think since the 1930s.</span><br data-dcnode-id="902"><br data-dcnode-id="901"><span data-dcnode-id="900" instrument_node="">HEGSETH: Yeah, we sure are. Senator Graham, thank you so much.</span><br data-dcnode-id="899"><br data-dcnode-id="898"><span data-dcnode-id="897" instrument_node="">And by the way, no program has highlighted more the fact that we left people behind in Afghanistan and that abject disaster than HANNITY and Sean Hannity. So thank you to this program.</span><br data-dcnode-id="896"><br data-dcnode-id="895"><span data-dcnode-id="894" instrument_node="">Coming up, after days of deliberation, the jury in the Ghislaine Maxwell trial reached their verdict today. We'll bring you all the latest as Gregg Jarrett and Alan Dershowitz join us with reaction.</span><br data-dcnode-id="893"><br data-dcnode-id="892"><span data-dcnode-id="891" instrument_node="">(COMMERCIAL BREAK)</span><br data-dcnode-id="890"><br data-dcnode-id="889"><span data-dcnode-id="888" instrument_node="">HEGSETH: Welcome back.</span><br data-dcnode-id="887"><br data-dcnode-id="886"><span data-dcnode-id="885" instrument_node="">Today, Ghislaine Maxwell was found guilty on five of six counts in the high profile sex trafficking trial in New York City, where the Jeffrey Epstein confidante was convicted for her role in trafficking women as young as 14 years old to be sexually abused. As prosecutors laid out, Maxwell played a key role in participating and facilitating the recruitment of young women who were later victims of Epstein's abuse. The 60-year-old Maxwell faces decades behind bars.</span><br data-dcnode-id="884"><br data-dcnode-id="883"><span data-dcnode-id="882" instrument_node="">Here to break it all down for us tonight, FOX News legal analyst Gregg Jarrett, along with Harvard law professor Alan Dershowitz. Full disclosure, professor Dershowitz once represented Epstein and is currently being sued by Epstein accuser Virginia Giuffre for defamation.</span><br data-dcnode-id="881"><br data-dcnode-id="880"><span data-dcnode-id="879" instrument_node="">Professor, as you know -- you've denied all wrongdoing in previo -- in multiple previous appearances on this program and is counter-suing Giuffre.</span><br data-dcnode-id="878"><br data-dcnode-id="877"><span data-dcnode-id="876" instrument_node="">Professor, let me start with you as someone who has been caught up in this, when you look at this verdict, what's your -- what's your main takeaway?</span><br data-dcnode-id="875"><br data-dcnode-id="874"><span data-dcnode-id="873" instrument_node="">ALAN DERSHOWITZ, HARVARD LAW PROFESSOR: Well, my main takeaway is that the government was smart enough not to use Virginia Giuffre as a witness. This is the woman who's accused me, who's accused Prince Andrew, who's accused Senator Mitchell, who's accused Senator -- Ambassador Richardson, who's accused Ehud Barak, she accused anybody who she could find in Jeffrey Epstein's rolodex.</span><br data-dcnode-id="872"><br data-dcnode-id="871"><span data-dcnode-id="870" instrument_node="">And the government very smartly didn't use her as a witness. She would have been the key witness if she were credible but the government simply didn't believe her. So today was a good day for those people who are accused by her like Prince Andrew and the others who I mentioned.</span><br data-dcnode-id="869"><br data-dcnode-id="868"><span data-dcnode-id="867" instrument_node="">As far as Ghislaine Maxwell is concerned, the government put on witnesses - - the witnesses were believed. The jury did come to its conclusion. There will be an appeal. Appeals are always uphill, but there are some issues, there's a statute of limitations issue after all some of these things occurred almost 30 years ago, was back in 1994.</span><br data-dcnode-id="866"><br data-dcnode-id="865"><span data-dcnode-id="864" instrument_node="">So, there'll be concerns about the statute of limitations, some other issues. But right now, she faces a significant prison sentence.</span><br data-dcnode-id="863"><br data-dcnode-id="862"><span data-dcnode-id="861" instrument_node="">HEGSETH: Gregg, are you surprised at all by this verdict and what do you think -- you know, as Professor Dershowitz kind of alluded to, what happens next here?</span><br data-dcnode-id="860"><br data-dcnode-id="859"><span data-dcnode-id="858" instrument_node="">GREGG JARRETT, FOX NEWS LEGAL ANALYST: Well, I wasn't surprised by the verdict. Another was Ghislaine Maxwell, she was stoic, showed no visible reaction to the verdict because she knew what was coming. She sat there during the course of the trial. She saw that the prosecution's evidence against her was overwhelming and powerful.</span><br data-dcnode-id="857"><br data-dcnode-id="856"><span data-dcnode-id="855" instrument_node="">The four accusers who took the witness stand were competent. They were credible. They were persuasive, as they told this harrowing story of being recruited and groomed as underage girls and then sexually abused not just by Epstein but by Maxwell herself.</span><br data-dcnode-id="854"><br data-dcnode-id="853"><span data-dcnode-id="852" instrument_node="">And I must say it took an enormous amount of courage for them to come forward and testify and be subject to cross-examination. But there is a message there to other victims of sexual abuse that it is important and you can achieve some measure of justice in a court of law, but it takes a lot of backbone to do it. As for Maxwell, remaining silent, it would have been foolhardy for her to take the witness stand. She would have been eviscerated on cross-examination and she might have exposed herself to yet another trial for perjury, and it would have ruined any chance she might have to strike a deal now with a government to help them bring cases against others in exchange for leniency.</span><br data-dcnode-id="851"><br data-dcnode-id="850"><span data-dcnode-id="849" instrument_node="">It is altogether possible we don't know what more evidence prosecutors have they took away bins of videotape, file folders. And so, we don't know what other evidence they have. But Ghislaine Maxwell could prove to be key.</span><br data-dcnode-id="848"><br data-dcnode-id="847"><span data-dcnode-id="846" instrument_node="">(CROSSTALK)</span><br data-dcnode-id="845"><br data-dcnode-id="844"><span data-dcnode-id="843" instrument_node="">DERSHOWITZ: Well, I hope they have -- I hope they have --</span><br data-dcnode-id="842"><br data-dcnode-id="841"><span data-dcnode-id="840" instrument_node="">HEGSETH: Go ahead.</span><br data-dcnode-id="839"><br data-dcnode-id="838"><span data-dcnode-id="837" instrument_node="">DERSHOWITZ: And I hope they have tapes of everybody who was involved. The interesting thing is, the question is who else we prosecuted. The same woman Virginia Giuffre, one of the women testified, she was 14 or 15 years old. She was brought to Epstein for money by Virginia Giuffre who was well over the age of consent.</span><br data-dcnode-id="836"><br data-dcnode-id="835"><span data-dcnode-id="834" instrument_node="">Virginia Giuffre then according to the testimony at the trial got naked had sex with Jeffrey Epstein in order to facilitate her having sex with Epstein. So, Giuffre under the theory of the prosecution is guilty as well. So the question is who else will be prosecuted? And will Maxwell make a deal? Will she try to get her sentence reduced?</span><br data-dcnode-id="833"><br data-dcnode-id="832"><span data-dcnode-id="831" instrument_node="">This is not yet over. Yes, there are victims but there are also perpetrators and some of the people could be both victims and perpetrators. Giuffre could be a victim at one point, but then she became a perpetrator and a perjurer at another point. So we have to look at this case by case, person by person, and we shouldn't generalize.</span><br data-dcnode-id="830"><br data-dcnode-id="829"><span data-dcnode-id="828" instrument_node="">HEGSETH: Professor, with having more direct knowledge of -- you know, having represented Epstein before, do you have a sense that Maxwell could talk? Could talk to the media? Does she have an incentive to do that at this point facing this kind of sense?</span><br data-dcnode-id="827"><br data-dcnode-id="826"><span data-dcnode-id="825" instrument_node="">DERSHOWITZ: Well, what alternative does she have at this point? If she doesn't do anything and if the appeal doesn't work and appeals are uphill in most of these kinds of cases, she will probably want to tell her full story at some point and she may very well try to cooperate with government prosecutors. That happens there's nothing that opens people's mouths more than facing a long criminal sentence.</span><br data-dcnode-id="824"><br data-dcnode-id="823"><span data-dcnode-id="822" instrument_node="">So nobody knows. Nobody really can tell and I don't -- I only met delay Ghislaine Maxwell a handful of times with my wife, with my daughter. When we met her, she was just Jeffrey Epstein's, you know, girlfriend or former girlfriend. We had no idea that any of these things were going on.</span><br data-dcnode-id="821"><br data-dcnode-id="820"><span data-dcnode-id="819" instrument_node="">But you know, I feel -- I feel bad for everybody involved in this thing and uh and I hope it will discourage others from doing actions of this kind. Women -- young women have to be protected and the court and government has to go after people who are -- who are perpetrators. But they have to distinguish the true from the false.</span><br data-dcnode-id="818"><br data-dcnode-id="817"><span data-dcnode-id="816" instrument_node="">And that's what I think they may have tried to do -- why they didn't call Virginia Giuffre as a witness and that helped them. If they had called her as a witness, I think this case would very likely gone a different way because the jury would have doubted the credibility of the government's case.</span><br data-dcnode-id="815"><br data-dcnode-id="814"><span data-dcnode-id="813" instrument_node="">HEGSETH: Gregg, real quick, there were people that were willing -- go ahead, go ahead.</span><br data-dcnode-id="812"><br data-dcnode-id="811"><span data-dcnode-id="810" instrument_node="">JARRETT: I'm not going to weigh in on Giuffre, because I'm not that knowledgeable about her, but there were dozens and dozens of victims of Jeffrey Epstein and arguably Ghislaine Maxwell. And I think prosecutors made a strategic and smart decision to streamline the case, to pick four of their best witnesses. They took the stand and they won the day for justice and for the victims out there as well, because she's looking at years and years behind bars. She may never -- she's 60 years old, she may never get out from prison.</span><br data-dcnode-id="809"><br data-dcnode-id="808"><span data-dcnode-id="807" instrument_node="">HEGSETH: Yeah, right.</span><br data-dcnode-id="806"><br data-dcnode-id="805"><span data-dcnode-id="804" instrument_node="">Well, Gregg, Professor Dershowitz, thank you so much for joining us tonight. Really appreciate it.</span><br data-dcnode-id="803"><br data-dcnode-id="802"><span data-dcnode-id="801" instrument_node="">Straight ahead, as the left continues to push their radical agenda in our nation's classrooms, parents fighting back. Laura Trump and Ian Prior join us to explain when we return.</span><br data-dcnode-id="800"><br data-dcnode-id="799"><span data-dcnode-id="798" instrument_node="">(COMMERCIAL BREAK)</span><br data-dcnode-id="797"><br data-dcnode-id="796"><span data-dcnode-id="795" instrument_node="">HEGSETH: Now, despite widespread backlash, the left continues its attempts, which have been happening for a hundred years, to indoctrinate students in our nation's classrooms. This weekend, radical 1619 Project developer Nikole Hannah-Jones even doubled down on the claim that parents, you, should not have input into your children's education. Also admitting she's not a professional educator. Take a look.</span><br data-dcnode-id="794"><br data-dcnode-id="793"><span data-dcnode-id="792" instrument_node="">(BEGIN VIDEO CLIP)</span><br data-dcnode-id="791"><br data-dcnode-id="790"><span data-dcnode-id="789" instrument_node="">NIKOLE HANNAH-JONES, 1619 PROJECT FOUNDER: I don't really understand this idea that parents should decide what's being taught. I'm not a professional educator. I don't have a degree in social studies or science. We send our children to school because we want them to be taught by people who have expertise in the subject area, and that is not my job.</span><br data-dcnode-id="788"><br data-dcnode-id="787"><span data-dcnode-id="786" instrument_node="">When the -- when the governor or the candidate said that he didn't think parents should be deciding what's being taught in school, he was panned for that. But that's just the fact.</span><br data-dcnode-id="785"><br data-dcnode-id="784"><span data-dcnode-id="783" instrument_node="">(END VIDEO CLIP)</span><br data-dcnode-id="782"><br data-dcnode-id="781"><span data-dcnode-id="780" instrument_node="">HEGSETH: Okay, we'll unpack that in a moment.</span><br data-dcnode-id="779"><br data-dcnode-id="778"><span data-dcnode-id="777" instrument_node="">Meanwhile, "Politico" pushing its own far left education agenda. Of course, "Politico" is far left, accusing Republicans of engaging in, quote, education wars in the way in which they're engaging in school board races.</span><br data-dcnode-id="776"><br data-dcnode-id="775"><span data-dcnode-id="774" instrument_node="">Joining us now with reaction, FOX News contributor Lara Trump and executive director of Fight for Schools, Ian Prior.</span><br data-dcnode-id="773"><br data-dcnode-id="772"><span data-dcnode-id="771" instrument_node="">Thank you both for being here and for how much you care about the education of the next generation which is critical to actually preserving our republic.</span><br data-dcnode-id="770"><br data-dcnode-id="769"><span data-dcnode-id="768" instrument_node="">So if you look at what Nikole Hannah-Jones said, Lara, she said, I'm not a professional educator, therefore I shouldn't be in charge of what goes into the classrooms. Yet, "The New York Times" and Nikole Hannah-Jones are working hand in hand with teachers unions to make sure that 1619 Project curriculum is making its way into classrooms.</span><br data-dcnode-id="767"><br data-dcnode-id="766"><span data-dcnode-id="765" instrument_node="">Help me square that circle for a second.</span><br data-dcnode-id="764"><br data-dcnode-id="763"><span data-dcnode-id="762" instrument_node="">LARA TRUMP, FOX NEWS CONTRIBUTOR: Oh, gosh, Pete, I wish I could. I wish I could answer that. She may be admitted more than she wanted to there. I'm not totally sure about that.</span><br data-dcnode-id="761"><br data-dcnode-id="760"><span data-dcnode-id="759" instrument_node="">But her whole statement there, none of it made a whole lot of sense. Look, no one is trying to downplay the importance of teachers. I mean, outside of parents, teachers are probably the most influential people in the lives of our children. I know for myself, outside of my mom and dad, it was my teachers and coaches who had the most impact on my life growing up. So they are very important.</span><br data-dcnode-id="758"><br data-dcnode-id="757"><span data-dcnode-id="756" instrument_node="">But that is why we want to know as parents what is it exactly that they are teaching our kids and is it multi-linear statistics? Is it physics which obviously I as a parent am not going to be able to teach my child or are they indoctrinating our children with hateful rhetoric, with hateful ideologies such as critical race theory?</span><br data-dcnode-id="755"><br data-dcnode-id="754"><span data-dcnode-id="753" instrument_node="">That is what parents in Virginia spoke up resoundingly and pushed back against in the election that you just referenced there, the governor's race in Virginia and look we need to know as parents it is our job to know that what our children are being taught is something with which we agree. It is up to us to instill values in our children that we agree with.</span><br data-dcnode-id="752"><br data-dcnode-id="751"><span data-dcnode-id="750" instrument_node="">And so, her whole statement there I don't think made a whole lot of sense. No one is saying parents can fully replace teachers. We do have a responsibility to know they're being taught things that we agree with at the end of the day.</span><br data-dcnode-id="749"><br data-dcnode-id="748"><span data-dcnode-id="747" instrument_node="">HEGSETH: Absolutely.</span><br data-dcnode-id="746"><br data-dcnode-id="745"><span data-dcnode-id="744" instrument_node="">And, Ian, you know, it doesn't make a lot of sense what Nikole said. It really doesn't. I'm not an educator but I should educate your kids. But what she did say is what many on the left are finally revealing is their true intention, to parents, stay out of the classroom. Like we've got this thing fixed. We control the school boards, the unions, all the pipelines of who trains the teachers, the certifications, all of that.</span><br data-dcnode-id="743"><br data-dcnode-id="742"><span data-dcnode-id="741" instrument_node="">So stay out. They don't want us involved because the left controls it all.</span><br data-dcnode-id="740"><br data-dcnode-id="739"><span data-dcnode-id="738" instrument_node="">IAN PRIOR, EXECUTIVE DIRECTOR OF FIGHT FOR SCHOOLS: Oh, that's right and look, Lara was absolutely right. You look at the equation for preparing a child for the real world, you need your parents and you need teachers, and they need to work cohesively. Parents handle things like morals, religious values. Teachers handle things like math and science and reading and writing.</span><br data-dcnode-id="737"><br data-dcnode-id="736"><span data-dcnode-id="735" instrument_node="">The problems develop when you get people like Nikole Hannah-Jones injecting herself into that equation, when you get these high priced DEI consultants injecting themselves into that equation. And when you get Randi Weingarten and teachers unions injecting themselves into that equation. that is the problem here.</span><br data-dcnode-id="734"><br data-dcnode-id="733"><span data-dcnode-id="732" instrument_node="">Parents want to work with teachers. Nobody's opposed to teaching history, accurate history. What we are opposed to is teaching theories, is looking at everything through a lens of race, or you know discussing gender issues with five and six-year-olds. Those are things that have no place in the classroom and parents need to be aware of that.</span><br data-dcnode-id="731"><br data-dcnode-id="730"><span data-dcnode-id="729" instrument_node="">HEGSETH: For sure.</span><br data-dcnode-id="728"><br data-dcnode-id="727"><span data-dcnode-id="726" instrument_node="">Let me ask you both now about the second part of what we mentioned which is this "Politico" article about the fight for school boards. "Politico" is decrying the fact that in some states, they're considering the idea of a political affiliation on the ballot for school board candidates, because I don't know about both of you, but when I vote for the school board, I don't really know who the people are or what they believe because there's candidate statements are -- all of them are ambiguous and vague and it's really hard to determine which one would say I'm against CRT or for CRT.</span><br data-dcnode-id="725"><br data-dcnode-id="724"><span data-dcnode-id="723" instrument_node="">So, Lara, what do you think about the fact that we might just say, hey, I'm a Republican or I'm a conservative, and I want to put that on the ballot so voters can at least have some indication?</span><br data-dcnode-id="722"><br data-dcnode-id="721"><span data-dcnode-id="720" instrument_node="">L. TRUMP: Well, I think it's important to know the values of these people that are serving on the school boards. After all, they are the people that control what our children ultimately learn. They control who oftentimes the teachers are whether or not our kids are going to learn in the classroom or at home, whether or not they're going to wear masks. They control a lot of things.</span><br data-dcnode-id="719"><br data-dcnode-id="718"><span data-dcnode-id="717" instrument_node="">And what we found out is that many of these folks have a very left-leaning ideology. That's where they stand. And so, often times, it would be nice to know for whom you are voting and what their values are and whether or not that is something that you as a parent also agree with.</span><br data-dcnode-id="716"><br data-dcnode-id="715"><span data-dcnode-id="714" instrument_node="">So I don't see any problem with it. Obviously, "Politico" had a big made a big fuss about it, but I think at this point, maybe parents would like to know where people stand before they vote for them in obviously a very important position.</span><br data-dcnode-id="713"><br data-dcnode-id="712"><span data-dcnode-id="711" instrument_node="">HEGSETH: Absolutely.</span><br data-dcnode-id="710"><br data-dcnode-id="709"><span data-dcnode-id="708" instrument_node="">Ian, what do you think? You know, how else are you going to know in some general sense where they stand?</span><br data-dcnode-id="707"><br data-dcnode-id="706"><span data-dcnode-id="705" instrument_node="">PRIOR: Yeah, Pete, you were absolutely right when you said that you know teaching our children is one of the most important things preserving our constitutional republic. So these elections are extremely important. Ultimately, what do you get, right? You maybe get a flyer from a candidate saying, well, we want more recess. But in reality, we don't know what they stand for.</span><br data-dcnode-id="704"><br data-dcnode-id="703"><span data-dcnode-id="702" instrument_node="">That's why we started Fight for Schools, to be able to get that information to people and so that they understand when they're casting their vote for a school board member, they know exactly what that person is going to do and what they're going to stand for.</span><br data-dcnode-id="701"><br data-dcnode-id="700"><span data-dcnode-id="699" instrument_node="">HEGSETH: Lara, Ian, thanks for everything you do. Appreciate it.</span><br data-dcnode-id="698"><br data-dcnode-id="697"><span data-dcnode-id="696" instrument_node="">Straight ahead, you won't believe what one MSNBC host said about her hero, Dr. Fauci. We'll play the tape, next.</span><br data-dcnode-id="695"><br data-dcnode-id="694"><span data-dcnode-id="693" instrument_node="">(COMMERCIAL BREAK)</span><br data-dcnode-id="692"><br data-dcnode-id="691"><span data-dcnode-id="690" instrument_node="">HEGSETH: Welcome back to the special edition of HANNITY. It's no secret that the left is in love with King Dr. Fauci. But MSNBC's Nicolle Wallace took things to a whole new level on Monday. Watch this.</span><br data-dcnode-id="689"><br data-dcnode-id="688"><span data-dcnode-id="687" instrument_node="">(BEGIN VIDEO CLIP)</span><br data-dcnode-id="686"><br data-dcnode-id="685"><span data-dcnode-id="684" instrument_node="">NICOLLE WALLACE, MSNBC HOST: I am a Fauci groupie, thrice-vaccinated, mask adherent. I buy KN95 masks by the caseloads. They're in every pocket. I wear them everywhere except when I sit down, and I am certain that this is not a variant I can outrun.</span><br data-dcnode-id="683"><br data-dcnode-id="682"><span data-dcnode-id="681" instrument_node="">(END VIDEO CLIP)</span><br data-dcnode-id="680"><br data-dcnode-id="679"><span data-dcnode-id="678" instrument_node="">HEGSETH: Yikes. Sad and scared experience of life. Unfortunately, that is all the time we have for tonight. Thank you for watching it for joining us.</span><br data-dcnode-id="677"><br data-dcnode-id="676"><span data-dcnode-id="675" instrument_node="">Just a reminder, on Friday, I'll be co-hosting FOX's "All-American New Year's Eve" with Rachel Campos-Duffy and Will Cain, my co-hosts from "FOX &amp; Friends Weekend". And you can also catch us every Saturday and Sunday on "FOX &amp; Friends Weekend".</span><br data-dcnode-id="674"><br data-dcnode-id="673"><span data-dcnode-id="672" instrument_node="">Now, we turn it over to the very capable hands of Sean Duffy who's in for Laura Ingraham.</span><br data-dcnode-id="671"><br data-dcnode-id="670"><span data-dcnode-id="669" instrument_node="">Sean, it's all yours, brother.</span><br data-dcnode-id="668"><br data-dcnode-id="667"><br data-dcnode-id="666"><i data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Copy: Content and Programming Copyright 2021 Fox News Network, LLC. ALL RIGHTS RESERVED. Copyright 2021 VIQ Media Transcription, Inc. All materials herein are protected by United States copyright law and may not be reproduced, distributed, transmitted, displayed, published or broadcast without the prior written permission of VIQ Media Transcription, Inc. You may not alter or remove any trademark, copyright or other notice from copies of the content</span></i><br data-dcnode-id="663"><span data-dcnode-id="662" instrument_node="">&nbsp;</span></p><div class="ad-container mobile ad-h-50 ad-w-300" data-dcnode-id="659"><div class="ad gam" data-dcnode-id="660" data-iu="ban1"></div></div><div class="ad-container tablet ad-h-50 ad-w-300" data-dcnode-id="657"><div class="ad gam" data-dcnode-id="658" data-iu="lb2"></div></div><span data-dcnode-id="656" instrument_node=""> </span></div><span data-dcnode-id="653" instrument_node=""> </span><span data-dcnode-id="651" instrument_node=""> </span><footer class="article-footer" data-dcnode-id="600"><span data-dcnode-id="649" instrument_node=""> </span><span data-dcnode-id="647" instrument_node=""> </span><div class="vendor-unit tablet-desktop" data-dcnode-id="645" data-init-desktop="1" data-uid="ar-2"><div class="vendor-verizon" data-dcnode-id="646" id="verizon-widget-1"></div></div><span data-dcnode-id="644" instrument_node=""> </span><div class="vendor-unit tablet-desktop" data-dcnode-id="642" data-init-desktop="1" data-uid="ar-3" style="width:50%;display:inline-block;float:left;"><div class="vendor-verizon" data-dcnode-id="643" id="verizon-widget-2"></div></div><span data-dcnode-id="641" instrument_node=""> </span><div class="vendor-unit tablet-desktop" data-dcnode-id="625" data-uid="ar-16" style="width:50%;display:i
