</span><div class="entry-content" data-dcnode-id="371" itemprop="articleBody"><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Foxes have really varied diets. They are omnivorous and, as such, they eat plants as well as meat. Some of the animals they hunt include ducks, mice, and rats. </span></p><div data-dcnode-id="612" data-inserter-version="2" id="ezoic-pub-ad-placeholder-168"></div><div class="lwptoc lwptoc-autoWidth lwptoc-baseItems lwptoc-light lwptoc-notInherit" data-dcnode-id="548" data-lwptoc-initialized="1" data-smooth-scroll="1" data-smooth-scroll-offset="24"><div class="lwptoc_i" data-dcnode-id="549"><span data-dcnode-id="610" instrument_node=""> </span><div class="lwptoc_header" data-dcnode-id="599"><span data-dcnode-id="609" instrument_node="">

</span></div><div class="lwptoc_item" data-dcnode-id="553"><span data-dcnode-id="563" instrument_node=""> </span><a data-dcnode-id="555" href="#Conclusion"><span data-dcnode-id="562" instrument_node="">
</span><span class="lwptoc_item_number" data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">4</span></span><span data-dcnode-id="559" instrument_node="">
</span><span class="lwptoc_item_label" data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Conclusion</span></span><span data-dcnode-id="556" instrument_node="">
</span></a><span data-dcnode-id="554" instrument_node="">
</span></div></div></div><span data-dcnode-id="550" instrument_node="">
</span></div></div><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">But, do foxes eat possums? They are essentially meat after all, so it would only make sense that they’d feature on a fox’s menu choices.&nbsp;</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">But, in the case of foxes vs. possums, things aren’t quite as simple as you might think. In this ultimate guide, you’ll find everything you would ever need to know about this intriguing subject. </span></p><div data-dcnode-id="540" data-inserter-version="2" id="ezoic-pub-ad-placeholder-176"></div><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">We’ll look at the hows and the whys, and you’re guaranteed to learn something interesting along the way!</span></p><span data-dcnode-id="535" instrument_node="">
</span><h2 data-dcnode-id="531"><span data-dcnode-id="532" id="Do_Foxes_Eat_Possums"><strong data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Do Foxes Eat Possums?</span></strong></span></h2><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="529" instrument_node="">Let’s look at the main question, first of all. Yes, foxes do eat possums. Generally speaking, a fox will </span><a class="inlinks" data-dcnode-id="527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allthingsfoxes.com/what-do-foxes-eat/"><span data-dcnode-id="528" instrument_node="">eat almost anything that it can find</span></a><span data-dcnode-id="526" instrument_node="">. This is one of the reasons why urban foxes can often be found rummaging through garbage cans.&nbsp;</span></p><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">However, possums certainly don’t make up a large part of a fox’s diet. This is mostly because a fox would have a hard time hunting a possum. </span></p><div data-dcnode-id="520" data-inserter-version="2" id="ezoic-pub-ad-placeholder-177"></div><span data-dcnode-id="518" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="515"><figure class="aligncenter size-large" data-dcnode-id="516"><img alt="" class="wp-image-30552" data-dcnode-id="517" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allthingsfoxes.com/wp-content/uploads/2021/07/Do-Foxes-Eat-Possums.jpg&amp;raw" srcset="https://allthingsfoxes.com/wp-content/uploads/2021/07/Do-Foxes-Eat-Possums.jpg 1000w, https://allthingsfoxes.com/wp-content/uploads/2021/07/Do-Foxes-Eat-Possums-768x512.jpg 768w" width="1000"></figure></div><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Possums are feisty and have sharp teeth and claws, so they can put up a pretty good fight against a fox!</span></p><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">And, when there is much easier prey around such as mice, rats, ducks, and squirrels, hunting something that could cause a serious injury simply wouldn’t be worth the fox’s efforts.&nbsp;</span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">If you’ve ever seen a fox eating a possum, it’s more than likely that the possum was already dead when it found it. In this instance, it may have been killed by a larger predator (such as a wolf or an eagle), or it might have died from natural causes.</span></p><span data-dcnode-id="505" instrument_node="">
</span><h2 data-dcnode-id="501"><span data-dcnode-id="502" id="Why_Do_Foxes_Eat_Dead_Possums"><strong data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Why Do Foxes Eat Dead Possums?</span></strong></span></h2><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">While foxes are more than capable of hunting and killing certain animals, they are also opportunistic scavengers. The main reason for this is that it gives them the opportunity to feed more efficiently, conserving their energy reserves for more important things.&nbsp;</span></p><div data-dcnode-id="496" data-inserter-version="2" id="ezoic-pub-ad-placeholder-178"></div><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Feeding on carrion also gives a fox the opportunity to take in certain minerals from animals that they simply wouldn’t be able to prey on themselves. </span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Deer, for example, are really high in protein. However, it would almost be impossible for a fox to take down an adult deer by itself.&nbsp;</span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">The same theory applies to possums. Rather than risk getting injured during the hunt, they’ll let a bigger predator do the work and enjoy whatever meat is left behind afterward.&nbsp;</span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">This is undeniably clever and is likely one of the reasons why foxes got their reputation for being cunning. But just how would a fox be able to locate a dead possum or any other type of carrion?</span></p><div data-dcnode-id="481" data-inserter-version="2" id="ezoic-pub-ad-placeholder-179"></div><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Foxes have highly tuned senses that make it easy for them to find carrion. To begin with,&nbsp; they have thousands of nerve endings on their noses that connect directly to the smell-identifying part of their brains. </span></p><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">This helps them locate the decaying meat as its scent is carried through the air.&nbsp;</span></p><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">They also have high-definition night vision. This, paired with their incredible sense of smell, guides them straight to the dead possum. </span></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Their ability to see in the dark also allows them to see if the predator that caught the possum has vacated the area, making it safe for them to approach it and start eating.&nbsp;&nbsp;</span></p><div data-dcnode-id="466" data-inserter-version="2" id="ezoic-pub-ad-placeholder-180"></div><span data-dcnode-id="464" instrument_node="">
</span><h2 data-dcnode-id="460"><span data-dcnode-id="461" id="Could_A_Fox_Kill_A_Possum"><strong data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Could A Fox Kill A Possum?</span></strong></span></h2><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">A possum would put up a good fight against a fox but, in times of extreme hunger and desperation, it’s quite possible for a fox to kill a possum. This mostly comes down to a matter of size and strength.&nbsp;</span></p><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Foxes are bigger and stronger than possums so, with enough willpower and brute force, they are capable of delivering a fatal bite. </span></p><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">However, they are quite likely to suffer from some bites and scratches along the way, so they would definitely think twice before deciding to try and take on a possum.</span></p><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">One situation in which a fox might have a significant upper hand against a possum is if it was hunting it during the day. Just like foxes, possums are nocturnal. </span></p><div data-dcnode-id="446" data-inserter-version="2" id="ezoic-pub-ad-placeholder-181"></div><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">If a possum comes out of its shelter during the day, there is a chance that it’s not very well. In this weakened state, it would be easier for a fox to win the fight.&nbsp;</span></p><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">A fox would also have an advantage against a younger possum as it won’t have developed enough muscular strength yet to put up too much of a fight.&nbsp;</span></p><span data-dcnode-id="438" instrument_node="">
</span><h2 data-dcnode-id="434"><span data-dcnode-id="435" id="Conclusion"><strong data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Conclusion&nbsp;</span></strong></span></h2><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">The bottom line here is that, while foxes do eat possums, they won’t usually bother preying on them as they are simply too feisty to deal with! </span></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">There are much easier targets around that they can hunt successfully without getting injured in the process. However, if a fox comes across a possum that is already dead, it will waste no time in taking advantage of the free meal!</span></p><div data-dcnode-id="426" data-inserter-version="2" id="ezoic-pub-ad-placeholder-182"></div><span data-dcnode-id="424" instrument_node="">
