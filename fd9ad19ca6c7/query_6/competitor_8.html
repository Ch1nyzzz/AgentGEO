</span></a><span data-dcnode-id="734" instrument_node="">

</span><span class="lwptoc_item_number" data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">10.4</span></span><span data-dcnode-id="728" instrument_node="">
</span><span class="lwptoc_item_label" data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Will a fox attack you?</span></span><span data-dcnode-id="725" instrument_node="">
</span></a><span data-dcnode-id="723" instrument_node="">
</span></div></div></div></div></div><span data-dcnode-id="717" instrument_node="">
</span></div></div><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="708"><strong data-dcnode-id="709"><span data-dcnode-id="713" instrument_node="">Foxes will eat small cats. However, it is not that common. Foxes are wild animals, that are opportunistic, and could attack, or even </span><a class="inlinks" data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allthingsfoxes.com/what-do-foxes-eat/"><span data-dcnode-id="712" instrument_node="">eat a house cat</span></a><span data-dcnode-id="710" instrument_node="">. You should exercise caution when dealing with a wild fox at your home. Foxes can be friendly, but to be on the safe side, we suggest observing them from a distance.</span></strong></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="706" instrument_node="">The same goes for foxes you encounter out in nature. Foxes are not considered a danger to humans, but if you or your pet encounters a fox in the wild, you should still be cautious. Wild animals are unpredictable, and </span><strong data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">smaller pets, such as small cats and dogs, can be prey to a fox</span></strong><span data-dcnode-id="703" instrument_node="">.</span></p><div data-dcnode-id="700" data-inserter-version="2" id="ezoic-pub-ad-placeholder-176"></div><span data-dcnode-id="698" instrument_node="">
</span><h2 data-dcnode-id="695"><span data-dcnode-id="696" id="Do_Foxes_Eat_Cats"><span data-dcnode-id="697" instrument_node="">Do Foxes Eat Cats?</span></span></h2><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="691"><em data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Quick Answer: Foxes don’t eat adult cats but will eat small or cats or kittens. Most adult cats are the same size as a fox and can defend themselves. Smaller cats (less than five pounds) and kittens could be prey for a fox.</span></em></p><span data-dcnode-id="690" instrument_node="">
</span><h2 data-dcnode-id="686"><span data-dcnode-id="687" id="Do_Foxes_and_Cats_get_Along"><strong data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Do Foxes and Cats get Along?</span></strong></span></h2><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Foxes and cats have a lot in common. Adult foxes are almost the same size as adult cats and they have similar dietary needs. Foxes eat rodents and other small mammals, much like feral cats. It is a rare occasion for a fox to square up with a house cat, but it does happen.</span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="681" instrument_node="">In the case of pet foxes, or rescued foxes, they seem to get along with other animals in their home. If they are with other pets from a young age, they can form bonds with them. Pet foxes are only tamed, so they are still wild animals. So there is always </span><strong data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">a risk that their wild nature could kick in</span></strong><span data-dcnode-id="678" instrument_node=""> at any moment.</span></p><div data-dcnode-id="675" data-inserter-version="2" id="ezoic-pub-ad-placeholder-177"></div><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="672" instrument_node="">Wild animals can have diseases. Housepets and cats, even if they are outside cats, should be brought inside if there is a fox around. You would not want to risk exposure to a sick animal or the threat of </span><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.denvergov.org/content/dam/denvergov/Portals/747/documents/Natural_Areas/wildlife/fox-information.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="671" instrument_node="">danger</span></a><span data-dcnode-id="669" instrument_node="">.</span></p><span data-dcnode-id="667" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="665"><img alt="do-foxes-get-along-with-cats" class="wp-image-9705" data-dcnode-id="666" height="800" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allthingsfoxes.com/wp-content/uploads/2020/09/do-foxes-get-along-with-cats.jpg&amp;raw" srcset="https://allthingsfoxes.com/wp-content/uploads/2020/09/do-foxes-get-along-with-cats.jpg 1200w, https://allthingsfoxes.com/wp-content/uploads/2020/09/do-foxes-get-along-with-cats-768x512.jpg 768w, https://allthingsfoxes.com/wp-content/uploads/2020/09/do-foxes-get-along-with-cats-600x400.jpg 600w" width="1200"></figure><h2 data-dcnode-id="661"><span data-dcnode-id="662" id="Will_a_Fox_Kill_a_House_Cat"><strong data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Will a Fox Kill a House Cat?</span></strong></span></h2><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Foxes and housecats rarely come into contact. Wild foxes are very shy and do not make contact with other animals if they do not have to. Adult cats have very little to fear from a fox, however, small pets such as small cats, hedgehogs, and little dogs could be in danger.</span></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="656" instrument_node="">Small cats and pets, should always be looked after and monitored if they are going to be outside. In the case of outside cats, they will have to fend for themselves, but they are notorious at being able to defend themselves. </span><strong data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">You can help by securing your property</span></strong><span data-dcnode-id="653" instrument_node="">, mending fences, and adding additional fortification, if needed.</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="650" instrument_node="">There are some instances, where a fox may be curious, and wind up face to face with a house cat. Also, there is always a chance, even if it is slim, that a wild animal could pick a fight with your cat. This is why </span><strong data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">you should secure your pets</span></strong><span data-dcnode-id="647" instrument_node="">, by bringing them </span><a data-dcnode-id="645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//portal.ct.gov/DEEP/Wildlife/Fact-Sheets/Red-Fox" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="646" instrument_node="">inside</span></a><span data-dcnode-id="644" instrument_node="">, if you see a fox nearby.</span></p><div data-dcnode-id="641" data-inserter-version="2" id="ezoic-pub-ad-placeholder-178"></div><span data-dcnode-id="639" instrument_node="">
</span><h2 data-dcnode-id="635"><span data-dcnode-id="636" id="Do_Foxes_Hunt_Cats"><strong data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Do Foxes Hunt Cats?</span></strong></span></h2><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Foxes do not hunt cats, as a food source. Situations where a cat is eaten by a fox, are rare in the wild. Feral cats that are adults are the same size as foxes, and the two would most likely avoid each other. They both eat smaller mammals, such as rodents and small rabbits.</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="630" instrument_node="">Foxes are predators so there is always a chance that they will hunt what is available to them. They could also see an opportunity, if a cat is wounded, or is too young to defend itself. Even in urban settings, </span><strong data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">there is very little chance of your housepet getting attacked by a fox</span></strong><span data-dcnode-id="627" instrument_node="">.</span></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">The statistics for cats killed by foxes in neighborhoods show that only a very small percentage of cats are killed by foxes in urban settings. In some cases, foxes can be mistaken for other predators, such as coyotes and wild dogs. Most of the information available is reported by homeowners, in online forums.</span></p><span data-dcnode-id="622" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="620"><img alt="is-my-pet-at-risk-from-foxes" class="wp-image-9706" data-dcnode-id="621" height="800" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allthingsfoxes.com/wp-content/uploads/2020/09/is-my-pet-at-risk-from-foxes.jpg&amp;raw" srcset="https://allthingsfoxes.com/wp-content/uploads/2020/09/is-my-pet-at-risk-from-foxes.jpg 1200w, https://allthingsfoxes.com/wp-content/uploads/2020/09/is-my-pet-at-risk-from-foxes-768x512.jpg 768w, https://allthingsfoxes.com/wp-content/uploads/2020/09/is-my-pet-at-risk-from-foxes-600x400.jpg 600w" width="1200"></figure><h2 data-dcnode-id="616"><span data-dcnode-id="617" id="How_to_Keep_Your_Cat_Safe_From_Foxes"><strong data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">How to Keep Your Cat Safe From Foxes</span></strong></span></h2><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">If you are worried that a fox is getting into your yard, and that your cat is in danger, then there are a few things you can do to help keep them safe.</span></p><div data-dcnode-id="611" data-inserter-version="2" id="ezoic-pub-ad-placeholder-179"></div><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="605"><strong data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Keep your cats indoors.</span></strong><span data-dcnode-id="606" instrument_node=""> This is the most effective way to keep them safe from any wild animal. Even if they are outside cats, if you see a fox or wild animal, you should bring your pets inside, where it is safe.</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="600"><strong data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Fortify your yard.</span></strong><span data-dcnode-id="601" instrument_node=""> You can help keep wild animals and foxes out, by having a good fence. If your fence has any vulnerabilities, like holes, or boards that are broken, fix them. You can also put up a wire fence, into the ground, that keeps foxes from digging under the fence and getting in.</span></p><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="595"><strong data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Scream and yell at the fox</span></strong><span data-dcnode-id="596" instrument_node="">. Foxes get scared very easily. If you spot a fox in your yard and feel that you or your cat/pets are in danger, scream and wave your arms. This will help scare them away and may keep them from coming back.</span></p><span data-dcnode-id="594" instrument_node="">
</span><h2 data-dcnode-id="590"><span data-dcnode-id="591" id="What_Do_Urban_Foxes_Eat"><strong data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">What Do Urban Foxes Eat?</span></strong></span></h2><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Some people see urban foxes as pests or vermin. They are not legally classified as vermin, and they help get rid of pests such as rodents. The urban fox’s diet is made up of several sources, such as rodents, food from trash bins, food set out by people, and whatever else they can find.</span></p><div data-dcnode-id="585" data-inserter-version="2" id="ezoic-pub-ad-placeholder-180"></div><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="579"><strong data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">You should not feed wild animals,</span></strong><span data-dcnode-id="580" instrument_node=""> however, people do it anyway. In the case of urban foxes, they have adapted to living among us, and in some cases, are treated differently, despite them still being wild. It can be argued that feeding them is helping them since they have already made their homes among us, and started to adapt.</span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Our stance on the matter is not to feed any wild animal, even urban foxes. However, people will still choose to do so, so it is good to have information available, as to what is ok to feed them, and what is not ok.</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">If you are going to feed wild foxes or urban foxes, then try to stick to these types of food.</span></p><span data-dcnode-id="572" instrument_node="">
</span><ul data-dcnode-id="559"><li data-dcnode-id="569"><strong data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Grain-free kibble</span></strong></li><li data-dcnode-id="566"><strong data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Fruits like watermelon</span></strong></li><li data-dcnode-id="563"><strong data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Vegetables from the garden</span></strong></li><li data-dcnode-id="560"><strong data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Raw meat and cooked meat</span></strong></li></ul><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">There are also foods that you should avoid feeding foxes.</span></p><div data-dcnode-id="555" data-inserter-version="2" id="ezoic-pub-ad-placeholder-181"></div><span data-dcnode-id="553" instrument_node="">
</span><ul data-dcnode-id="540"><li data-dcnode-id="550"><strong data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">No chocolate</span></strong></li><li data-dcnode-id="547"><strong data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">No pits from cherries or peaches</span></strong></li><li data-dcnode-id="544"><strong data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">No grapes and raisins</span></strong></li><li data-dcnode-id="541"><strong data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">No onions or garlic</span></strong></li></ul><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Urban foxes mostly rely on rodents. This makes cats less of a target of being hunted but does put them in the same hunting territory as urban foxes.</span></p><span data-dcnode-id="537" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="535"><img alt="why-do-foxes-eat-cats" class="wp-image-9708" data-dcnode-id="536" height="800" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allthingsfoxes.com/wp-content/uploads/2020/09/why-do-foxes-eat-cats.jpg&amp;raw" srcset="https://allthingsfoxes.com/wp-content/uploads/2020/09/why-do-foxes-eat-cats.jpg 1200w, https://allthingsfoxes.com/wp-content/uploads/2020/09/why-do-foxes-eat-cats-768x512.jpg 768w, https://allthingsfoxes.com/wp-content/uploads/2020/09/why-do-foxes-eat-cats-600x400.jpg 600w" width="1200"></figure><h2 data-dcnode-id="531"><span data-dcnode-id="532" id="Do_Foxes_Eat_Cat_Food"><strong data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Do Foxes Eat Cat Food?</span></strong></span></h2><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="529" instrument_node="">Foxes have been known to eat cat food. There are many reports online, of foxes eating from cat dishes left outside. Foxes are opportunistic and will eat from gardens, food dishes, and whatever else they can find. You could probably watch hundreds of videos from people’s security cameras on youtube, of </span><strong data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">foxes raiding pet dishes.</span></strong></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Foxes do have a similar diet as cats do. Even more closely to feral cats. However, household cat foods are fattening for a fox. Some pet fox, and rescued fox owners, will feed their foxes certain brands of cat food that are less fattening.</span></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Some vets may even suggest a certain brand of cat food, for foxes. Exotic animal vets, usually have different opinions on the matter. There is is no handbook for raising foxes (That I know of.) I have seen some people argue over if this is the right thing to do, and in most cases, those who use cat foods, have healthy foxes. So the verdict is out.</span></p><div data-dcnode-id="518" data-inserter-version="2" id="ezoic-pub-ad-placeholder-182"></div><span data-dcnode-id="516" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="514"><img alt="do-foxes-eat-kittens" class="wp-image-9707" data-dcnode-id="515" height="800" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allthingsfoxes.com/wp-content/uploads/2020/09/do-foxes-eat-kittens.jpg&amp;raw" srcset="https://allthingsfoxes.com/wp-content/uploads/2020/09/do-foxes-eat-kittens.jpg 1200w, https://allthingsfoxes.com/wp-content/uploads/2020/09/do-foxes-eat-kittens-768x512.jpg 768w, https://allthingsfoxes.com/wp-content/uploads/2020/09/do-foxes-eat-kittens-600x400.jpg 600w" width="1200"></figure><h2 data-dcnode-id="510"><span data-dcnode-id="511" id="Do_Foxes_Eat_Kittens"><strong data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Do Foxes Eat Kittens?</span></strong></span></h2><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">In rare circumstances, a fox could eat kittens. While foxes will most likely not pick a fight with a full-grown cat, since they are the same size, they will seize on an opportunity to prey on the weak and young. This includes kittens, small pets, and older pets who are sick or wounded.</span></p><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">These types of situations are not all that common. It is more likely to happen in the wild, to feral kittens, than housecat kittens. In the wild anything is game. Foxes are opportunistic predators, that feed on what is available to them in their territories.</span></p><span data-dcnode-id="503" instrument_node="">
</span><h2 data-dcnode-id="499"><span data-dcnode-id="500" id="Foxes_are_Scavengers"><strong data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Foxes are Scavengers</span></strong></span></h2><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Will a fox eat a cat? They will if they see them as easy prey. Foxes are scavengers and will prey on any animal that is small enough, and weak enough. They will eat from trashcans, gardens, chicken coops, and anything else they can get to, without being seen.</span></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Foxes will eat dead cats and other dead carcasses, known as carrion. If a fox is eating a cat, there is a good chance the cat was already dead. Foxes will scavenge from roadkill, and carcasses left behind by other carnivorous predators.</span></p><div data-dcnode-id="491" data-inserter-version="2" id="ezoic-pub-ad-placeholder-183"></div><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="484"><strong data-dcnode-id="485"><span data-dcnode-id="488" instrument_node="">See more about </span><a data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allthingsfoxes.com/fox-behavior/"><span data-dcnode-id="487" instrument_node="">Fox Behavior.</span></a></strong></p><span data-dcnode-id="483" instrument_node="">

</span><p data-dcnode-id="463"></p><div data-dcnode-id="461" data-inserter-version="2" id="ezoic-pub-ad-placeholder-184"></div><span data-dcnode-id="459" instrument_node="">
</span><h2 data-dcnode-id="455"><span data-dcnode-id="456" id="Frequently_Asked_Questions"><strong data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Frequently Asked Questions</span></strong></span></h2><span data-dcnode-id="454" instrument_node="">
</span><h3 data-dcnode-id="450"><span data-dcnode-id="451" id="Do_foxes_eat_dogs"><strong data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Do foxes eat dogs?</span></strong></span></h3><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Foxes are opportunistic feeders and will feed on smaller mammals. This can include small dogs, or pups, that are too small to defend themselves. This would be uncommon but does happen. Small dogs and pets should be secured inside if there is a wild animal nearby.</span></p><span data-dcnode-id="446" instrument_node="">
</span><h3 data-dcnode-id="442"><span data-dcnode-id="443" id="Why_do_foxes_scream_at_cats"><strong data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Why do foxes scream at cats?</span></strong></span></h3><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Foxes have a wide vocal range, where they screech and scream. They do not sound like dogs or other canids. Foxes may seem like they are screaming at cats if they see a cat in the area where they hunt. These are fox calls. Some are warnings, but mostly they are foxes communicating with foxes.</span></p><span data-dcnode-id="438" instrument_node="">
</span><h3 data-dcnode-id="434"><span data-dcnode-id="435" id="What_animal_do_foxes_eat"><strong data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">What animal do foxes eat?</span></strong></span></h3><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Foxes eat rodents, rabbits, lemmings, and other small mammals. They rarely attack, or eat housepets. Wild foxes are omnivores and eat a variety of small game mammals, fruits, and vegetation.</span></p><span data-dcnode-id="430" instrument_node="">
</span><h3 data-dcnode-id="426"><span data-dcnode-id="427" id="Will_a_fox_attack_you"><strong data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Will a fox attack you?</span></strong></span></h3><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Foxes avoid humans and are not considered dangerous unless they are wounded, or sick. Foxes carry rabies and mange. Diseased foxes should be avoided, and wild foxes should be observed from a distance, and not interacted with.</span></p><span data-dcnode-id="422" instrument_node="">
