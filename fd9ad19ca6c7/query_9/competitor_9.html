</span><h1 class="entry-title" data-dcnode-id="4408"><span data-dcnode-id="4409" instrument_node="">Hollywood Places</span></h1><span data-dcnode-id="4407" instrument_node="">
</span><div class="entry-content" data-dcnode-id="675"><span data-dcnode-id="4406" instrument_node="">
</span><div class="mailmunch-forms-before-post" data-dcnode-id="4405" style="display: none !important;"></div><h1 data-dcnode-id="4401" style="text-align: center;"><span data-dcnode-id="4404" instrument_node="">&nbsp;</span><strong data-dcnode-id="4402"><span data-dcnode-id="4403" instrument_node="">~~ HOLLYWOOD PLACES – A to D ~~</span></strong></h1><span data-dcnode-id="4400" instrument_node="">
</span><h5 data-dcnode-id="4386"><span data-dcnode-id="4399" instrument_node="">In the course of researching the </span><em data-dcnode-id="4397"><span data-dcnode-id="4398" instrument_node="">Garden of Allah</span></em><span data-dcnode-id="4396" instrument_node=""> novels, I came across all sorts of places in and around Hollywood and the greater Los Angeles area and started to collect the information together into one location on my website. The references at the end of each entry refer to the page number of the book where I found the information. (So “2/15″ refers to page 2 of book 15 listed on my</span><strong data-dcnode-id="4392"><span data-dcnode-id="4395" instrument_node=""> </span><a data-dcnode-id="4393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.martinturnbull.com/%3Fpage_id%3D17" title="BIBLIOGRAPHY"><span data-dcnode-id="4394" instrument_node="">bibliography</span></a></strong><span data-dcnode-id="4391" instrument_node=""> page.) Readers of these pages will note the occasional inconstancy–that is due to conflicting sources from which this information was taken. This is my long-winded way of saying that I am </span><em data-dcnode-id="4388"><strong data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">not</span></strong></em><span data-dcnode-id="4387" instrument_node=""> presenting this information as professionally-researched, definitive, you-can-take-it-as-gospel. It ain’t. It’s just a huge pile of info I’ll pulled from a wide variety of books, websites, magazine articles. Take it, like it, lump it or leave it.</span></h5><span data-dcnode-id="4385" instrument_node="">
</span><p data-dcnode-id="4379"><span data-dcnode-id="4384" instrument_node="">See also: </span><a data-dcnode-id="4380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.martinturnbull.com/hollywood-places/the-garden-of-allah-companion-map-of-los-angeles-and-hollywood/" rel="noopener noreferrer" target="_blank" title="The Garden of Allah Novels companion map of Los Angeles and Hollywood"><strong data-dcnode-id="4381"><em data-dcnode-id="4382"><span data-dcnode-id="4383" instrument_node="">The Garden of Allah Novels companion map of Los Angeles and Hollywood</span></em></strong></a></p><span data-dcnode-id="4378" instrument_node="">
</span><h2 data-dcnode-id="4375" style="text-align: center;"><strong data-dcnode-id="4376"><span data-dcnode-id="4377" instrument_node="">~</span></strong></h2><span data-dcnode-id="4374" instrument_node="">
</span><h4 data-dcnode-id="4371"><em data-dcnode-id="4372"><span data-dcnode-id="4373" instrument_node="">Nightclubs customarily reaped their profits in the last wee hours of the morning, midnight to last call at 2am. (8/152)</span></em></h4><span data-dcnode-id="4370" instrument_node="">
</span><h2 data-dcnode-id="4367" style="text-align: center;"><strong data-dcnode-id="4368"><span data-dcnode-id="4369" instrument_node="">~</span></strong></h2><span data-dcnode-id="4366" instrument_node="">
</span><p data-dcnode-id="4363"><strong data-dcnode-id="4364"><span data-dcnode-id="4365" instrument_node="">335 N. LA BREA AVE</span></strong></p><span data-dcnode-id="4362" instrument_node="">
</span><p data-dcnode-id="4360"><span data-dcnode-id="4361" instrument_node="">335 N. La Brea Avenue, Los Angeles, has seen a number of different incarnations. This is what I’ve been able to piece together:</span></p><span data-dcnode-id="4359" instrument_node="">
</span><ul data-dcnode-id="4322"><span data-dcnode-id="4358" instrument_node="">
</span><li data-dcnode-id="4356"><span data-dcnode-id="4357" instrument_node="">MAY 1930 – Eads Castle</span></li><span data-dcnode-id="4355" instrument_node="">
</span><li data-dcnode-id="4353"><span data-dcnode-id="4354" instrument_node="">1932 – Casa Brea</span></li><span data-dcnode-id="4352" instrument_node="">
</span><li data-dcnode-id="4350"><span data-dcnode-id="4351" instrument_node="">1935 – Three Little Pigs Cafe</span></li><span data-dcnode-id="4349" instrument_node="">
</span><li data-dcnode-id="4347"><span data-dcnode-id="4348" instrument_node="">1936 – El Mirador Cafe</span></li><span data-dcnode-id="4346" instrument_node="">
</span><li data-dcnode-id="4344"><span data-dcnode-id="4345" instrument_node="">FEB 1937 – El Mirador Cafe owner arrested</span></li><span data-dcnode-id="4343" instrument_node="">
</span><li data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">June 1938 – opened as Sebastian’s Cubanola</span></li><span data-dcnode-id="4340" instrument_node="">
</span><li data-dcnode-id="4338"><span data-dcnode-id="4339" instrument_node="">08 OCT 1938 – opened as the Waikiki</span></li><span data-dcnode-id="4337" instrument_node="">
</span><li data-dcnode-id="4335"><span data-dcnode-id="4336" instrument_node="">1940 – Pirate’s Den</span></li><span data-dcnode-id="4334" instrument_node="">
</span><li data-dcnode-id="4332"><span data-dcnode-id="4333" instrument_node="">08 MAR 1946 – became Charley Foy’s Supper Club, before Foy moved to Ventura Blvd.</span></li><span data-dcnode-id="4331" instrument_node="">
</span><li data-dcnode-id="4330"></li><span data-dcnode-id="4329" instrument_node="">
</span><li data-dcnode-id="4324"><span data-dcnode-id="4328" instrument_node="">SEE ALSO: </span><strong data-dcnode-id="4325"><a data-dcnode-id="4326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.martinturnbull.com/2016/01/30/the-various-incarnations-of-335-n-la-brea-ave-los-angeles/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4327" instrument_node="">The various incarnations of 335 N. La Brea Ave, Los Angeles</span></a></strong></li><span data-dcnode-id="4323" instrument_node="">
</span></ul><span data-dcnode-id="4321" instrument_node="">
</span><p data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4318" instrument_node="">
</span><p data-dcnode-id="4315"><strong data-dcnode-id="4316"><span data-dcnode-id="4317" instrument_node="">9236 SUNSET BLVD:</span></strong></p><span data-dcnode-id="4314" instrument_node="">
</span><ul data-dcnode-id="4279"><span data-dcnode-id="4313" instrument_node="">
</span><li data-dcnode-id="4311"><span data-dcnode-id="4312" instrument_node="">The Willows (early 1930s)</span></li><span data-dcnode-id="4310" instrument_node="">
</span><li data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node="">Club Eugene (1935)</span></li><span data-dcnode-id="4307" instrument_node="">

</span><p data-dcnode-id="4264"><strong data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">Academy Award Theater</span></strong><span data-dcnode-id="4267" instrument_node=""> – “In 1946 the Academy purchased a twenty-five year old theater building, then called the Marquis Theater, from the Fox West Cost Theaters and renamed it the Academy Award Theater.”&nbsp; It was located at 9038 Melrose Avenue, just to the east of Doheny.&nbsp; Academy members viewed films in the theater during the year and especially at nominations time.&nbsp; All Academy operations were located in the building, including the library, and most remained there until the construction of the Academy’s&nbsp;headquarters at 8949 Wilshire Blvd.&nbsp;in 1975.&nbsp; That building currently houses a number of administrative offices, as well as the Samuel Goldwyn Theater and the 4th Floor Gallery.&nbsp; The library is now located in the Fairbanks Center for Motion Picture Study at 333 S. La Cienega Blvd. in Beverly Hills.&nbsp; The film archive, the Science and Technology Council, the Linwood Dunn Theater&nbsp;and the new museum operations are located at the 3rd Academy building–Pickford Center for Motion Picture Study–at 1313 Vine Street in Hollywood.” – Pierre Norman Sands in </span><em data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">A Historical Study of the Academy of Motion Picture Arts and Sciences.</span></em></p><span data-dcnode-id="4263" instrument_node="">
</span><p data-dcnode-id="4259"><b data-dcnode-id="4261"><span data-dcnode-id="4262" instrument_node="">Academy Theater – </span></b><span data-dcnode-id="4260" instrument_node="">3141 West Manchester Boulevard, Inglewood. Opened on November 7, 1939, it was originally designed to host the Academy Awards but never did. It served as a major suburban theater for the Fox West Coast Theaters chain, and showed movies until 1976, when it became a church.</span></p><span data-dcnode-id="4258" instrument_node="">
</span><p data-dcnode-id="4253"><a data-dcnode-id="4254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Academy-Theater-Inglewood.jpg"><img alt="Academy Theater - 3141 West Manchester Boulevard, Inglewood." class="wp-image-3540 aligncenter jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="3540" data-comments-opened="1" data-dcnode-id="4257" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;}" data-image-title="Academy-Theater-Inglewood" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Academy-Theater-Inglewood.jpg?fit=640%2C801&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Academy-Theater-Inglewood.jpg?fit=239%2C300&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Academy-Theater-Inglewood.jpg?fit=767%2C960&amp;ssl=1" data-orig-size="767,960" data-permalink="https://martinturnbull.com/hollywood-places/academy-theater-inglewood-3/" data-recalc-dims="1" height="570" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Academy-Theater-Inglewood.jpg%3Fresize%3D381%252C570&amp;raw" title="Academy Theater - 3141 West Manchester Boulevard, Inglewood." width="381"><noscript data-dcnode-id="4255"><span data-dcnode-id="4256" instrument_node="">&lt;img data-attachment-id="3540" data-permalink="https://martinturnbull.com/hollywood-places/academy-theater-inglewood-3/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Academy-Theater-Inglewood.jpg?fit=767%2C960&amp;amp;ssl=1" data-orig-size="767,960" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="Academy-Theater-Inglewood" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Academy-Theater-Inglewood.jpg?fit=239%2C300&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Academy-Theater-Inglewood.jpg?fit=640%2C801&amp;amp;ssl=1" class="wp-image-3540 aligncenter" title="Academy Theater - 3141 West Manchester Boulevard, Inglewood." src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Academy-Theater-Inglewood.jpg?resize=381%2C570" alt="Academy Theater - 3141 West Manchester Boulevard, Inglewood." width="381" height="570" data-recalc-dims="1" /&gt;</span></noscript></a></p><span data-dcnode-id="4252" instrument_node="">
</span><p data-dcnode-id="4245"><strong data-dcnode-id="4250"><span data-dcnode-id="4251" instrument_node="">Ace Cain’s</span></strong><span data-dcnode-id="4249" instrument_node=""> </span><strong data-dcnode-id="4247"><span data-dcnode-id="4248" instrument_node="">Cafe</span></strong><span data-dcnode-id="4246" instrument_node=""> – 1369 N Western Ave., Hollywood. Ace Cain played heavies and villains in B-grade Westerns. He quit the cowboy acting business after Prohibition was repealed and opened up Ace Cain’s Cafe, a “legal” watering hole on Western Avenue near Sunset Boulevard right across from the 20th Century Fox Studios. It was complete with live floor shows featuring scantily clad chorus girls, singing waiters, jugglers, acrobats, animal acts, and the works. His brother Jim operated a retail liquor store right next door. Ace Cain’s was one of the top nighteries in Hollywood during World War II and he and his chorus beauties were featured in some of the early “men’s” magazines. After the War, the nightclub business tapered off and Ace sold the property to the U.S. government, which placed a Post Office where the famous Ace Cain’s Cafe had once stood.</span></p><span data-dcnode-id="4244" instrument_node="">
</span><p data-dcnode-id="4240"><strong data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">Agua Caliente – </span></strong><span data-dcnode-id="4241" instrument_node="">3131 West Eighth St, Los Angeles. Phone Dunkirk 3-0664</span></p><span data-dcnode-id="4239" instrument_node="">

</span><p data-dcnode-id="4209"><strong data-dcnode-id="4217"><span data-dcnode-id="4218" instrument_node="">Al Levy’s Tavern</span></strong><span data-dcnode-id="4216" instrument_node=""> – 1627 North Vine Street. Opened Wednesday, December 17, 1930 at 7 pm across from the Brown Derby, next door to the Huntington Hartford Theater (Ricardo Montalban Theater, a.k.a. Vine St Theater.) (72/46) On July 1, 1941, a major fire swept through the tavern during the lunch hour, forcing 200 patrons to flee. On September 7, 1941 the place reopened as </span><strong data-dcnode-id="4214"><span data-dcnode-id="4215" instrument_node="">Mike Lymon’s Hollywood Grill</span></strong><span data-dcnode-id="4213" instrument_node="">. Also had </span><strong data-dcnode-id="4211"><span data-dcnode-id="4212" instrument_node="">Al Levy’s Grill</span></strong><span data-dcnode-id="4210" instrument_node=""> downtown at 617 South Spring Street (below) As listed in the ‘Los Angeles Guide, 1941’ : “One of the oldest restaurants in town. Noted for its sea food and steaks.” As listed in the ‘Los Angeles Guide, 1941’ : “1623 N. Vine St. A he standby for luncheon, dinner, late supper and cocktails. Steaks and roast beef are features.”</span></p><span data-dcnode-id="4208" instrument_node="">

</span><p data-dcnode-id="4162"><strong data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">Alexandria Hotel – </span></strong><span data-dcnode-id="4163" instrument_node="">501 South Spring Street, corner of Fifth. (25/139) Opened 1906. With its ornate lobby and thick rug (called the “Million Dollar carpet: because of the deals that transpired on it) It became the afternoon meeting place. The bar offered cocktails and free sandwiches so many out-of-work actors ended up there hoping to make contacts and free food. (40/8)</span></p><span data-dcnode-id="4161" instrument_node="">

</span><p data-dcnode-id="4140"><strong data-dcnode-id="4148"><span data-dcnode-id="4149" instrument_node="">Ambassador Hotel</span></strong><span data-dcnode-id="4147" instrument_node=""> – 3400 Wilshire Boulevard – Opened 01JAN21 (closed 1989) back when that stretch of Wilshire was considered “out of town”. 400 rooms and bungalows where home to zelda and F. Scott Fitzgerald, Pola Negri, Norma Talmadge. The </span><strong data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">Zinnia Grill</span></strong><span data-dcnode-id="4144" instrument_node=""> on the Casino level of the hotel, quickly became the nighttime meeting place of hotel guests and the visiting movie crowd. With walls of black satin, hand-painted with colorful zinnias, the club was dubbed the “Black Patent Leather Room” and dancers could rest in the adjoining </span><strong data-dcnode-id="4142"><span data-dcnode-id="4143" instrument_node="">Parrot Porch</span></strong><span data-dcnode-id="4141" instrument_node=""> amidst squawking canaries, parrots and blooming plants. (40/35)</span></p><span data-dcnode-id="4139" instrument_node="">
</span><p data-dcnode-id="4137"><span data-dcnode-id="4138" instrument_node="">The Ambassador was a deluxe resort complete with bridal paths and stables, a bowling alley, miniature golf course, Olympic-sized swimming pool, post office and furrier. The Zinnia Grill proved so popular that the hotel management converted the hotel’s ballroom into a bigger, better, 1000-seat club. … from the fake palm trees hung papier mâché coconuts and artificial monkeys with electrically lighted eyes. Stars twinkled overhead and 100s of little lamps flickered on tables around the dance floor. (49/13) the Cocoanut Grove quickly became an important meeting place – especially on Tuesday nights – for Hollywood royalty such as Charlie Chaplin, Carole Lombard, Claudette Colbert, Lionel Barrymore, James Cagney, Jack Benny and Dorothy Lamore, while performing on stage were the country’s biggest stars such as Fanny Brice, WC Fields, Eddie Cantor and later Nat King Cole, Tony Martin, Judy Garland, Eddie Fisher and Lena Horne.(48/14)</span></p><span data-dcnode-id="4136" instrument_node="">

</span><p data-dcnode-id="4131" style="text-align: left;"><span data-dcnode-id="4132" instrument_node="">78/42 – At the Ambassador, Gloria Swanson and Rod La Rocque trysted there, as did Valentino and Pola Negri. So did Roman Novarro (whose partners were pretty-boy extras he brought home from MGM.</span></p><span data-dcnode-id="4130" instrument_node="">

</span><p data-dcnode-id="4094"><a data-dcnode-id="4095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/andres-of-BH-matchbook.png"><img alt="Andre's of Beverly HIlls matchbook" class="size-full wp-image-5710 aligncenter jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="5710" data-comments-opened="1" data-dcnode-id="4098" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;}" data-image-title="Andre’s of Beverly HIlls matchbook" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/andres-of-BH-matchbook.png?fit=238%2C530&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/andres-of-BH-matchbook.png?fit=134%2C300&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/andres-of-BH-matchbook.png?fit=238%2C530&amp;ssl=1" data-orig-size="238,530" data-permalink="https://martinturnbull.com/hollywood-places/andres-of-bh-matchbook/" data-recalc-dims="1" height="530" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/andres-of-BH-matchbook.png%3Fresize%3D238%252C530&amp;raw" width="238"><noscript data-dcnode-id="4096"><span data-dcnode-id="4097" instrument_node="">&lt;img data-attachment-id="5710" data-permalink="https://martinturnbull.com/hollywood-places/andres-of-bh-matchbook/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/andres-of-BH-matchbook.png?fit=238%2C530&amp;amp;ssl=1" data-orig-size="238,530" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="Andre&amp;#8217;s of Beverly HIlls matchbook" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/andres-of-BH-matchbook.png?fit=134%2C300&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/andres-of-BH-matchbook.png?fit=238%2C530&amp;amp;ssl=1" loading="lazy" class="size-full wp-image-5710 aligncenter" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/andres-of-BH-matchbook.png?resize=238%2C530" alt="Andre's of Beverly HIlls matchbook" width="238" height="530" data-recalc-dims="1" /&gt;</span></noscript></a></p><span data-dcnode-id="4093" instrument_node="">
</span><p data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">From Mickey in Vermont:</span></p><span data-dcnode-id="4090" instrument_node="">
</span><p data-dcnode-id="4087"><em data-dcnode-id="4088"><span data-dcnode-id="4089" instrument_node="">Andre’s never once disappointed my family in the years we knew it. &nbsp;So these are the facts I recall.</span></em></p><span data-dcnode-id="4086" instrument_node="">
</span><p data-dcnode-id="4083"><em data-dcnode-id="4084"><span data-dcnode-id="4085" instrument_node="">Andre’s was the brain child of Domenic Andreone, a Cordon Bleu educated chef originally from Italy whose accent today is almost as thick as when he stepped off the boat the first time in the 1950’s, and Don Medica, long deceased, who humor made you ponder why he didn’t have his own late night television show. &nbsp;He was of the Johnny Carson school. &nbsp;</span></em></p><span data-dcnode-id="4082" instrument_node="">
</span><p data-dcnode-id="4079"><em data-dcnode-id="4080"><span data-dcnode-id="4081" instrument_node="">Andre’s of Beverly Hills commanded its sway over a particular clientele from 8635 Wilshire Blvd for about 25 years, including various manifestations. &nbsp;For years it was open for lunch and dinner, catering to a lunch crowd of drunken advertising executives from nearby west coast branches of NY advertising agencies. &nbsp;It was more like a “Mad Men” Day Care Center than a restaurant.</span></em></p><span data-dcnode-id="4078" instrument_node="">
</span><p data-dcnode-id="4075"><em data-dcnode-id="4076"><span data-dcnode-id="4077" instrument_node="">Sometime in the early 80’s, Andre’s opened a branch at the Wilshire Terrace apartments (condo?) which were chic and haute in their era, with Billy Wilder being among their most prominent tenants. &nbsp;Andre’s of Wilshire Terrace made Andre’s of Beverly Hills look like a soup kitchen. &nbsp;WT didn’t last too long, though the meals I had there, I recall, were sublime and very expensive. &nbsp;</span></em></p><span data-dcnode-id="4074" instrument_node="">
</span><p data-dcnode-id="4071"><em data-dcnode-id="4072"><span data-dcnode-id="4073" instrument_node="">Andre’s of Town and Country (Wilshire and Fairfax) was one of the first restaurants to commit to the Town and Country shopping center when it transgendered from a quaint village to the high tech for the time (but quickly seedy) mall it is today, and it is I believe the only one of the original stores still in existence. &nbsp;As far as I know, it still serves the same menu, you can still find the same incredible salad dressing and other delicacies, and occasionally, Domenic Andreone is still at the stove. &nbsp;His nephew, MIchael Gagliarducci, nephew of his late beloved wife, Angie Andreone, has managed the place since its beginning, and as it all is family, it all seems to work beautifully. &nbsp;(I dated Mike for exactly one date, so I don’t think that should influence my viewpoint.)</span></em></p><span data-dcnode-id="4070" instrument_node="">
</span><p data-dcnode-id="4067"><em data-dcnode-id="4068"><span data-dcnode-id="4069" instrument_node="">T + C seems to work because it caters to the Park LaBrea crowd. &nbsp;Andres of Beverly Hills faultered because, according to me, it was never expensive enough. &nbsp;It couldn’t accommodate the egos that drove the business in the area, on La Cienega. &nbsp;I know because I was often behind the desk on a Saturday night.</span></em></p><span data-dcnode-id="4066" instrument_node="">
</span><p data-dcnode-id="4063"><em data-dcnode-id="4064"><span data-dcnode-id="4065" instrument_node="">Suffice it to say, when I want to think of happy memories of incredible meals, Andre’s is at the top of my list. &nbsp;In fact, I still cook some of the recipes I squirelled away from the kitchen, and my antecdote toward any kind of depression or bad feeling is the warmth and generosity of the Andreone family. &nbsp;</span></em></p><span data-dcnode-id="4062" instrument_node="">
</span><p data-dcnode-id="4059"><em data-dcnode-id="4060"><span data-dcnode-id="4061" instrument_node="">One further thought: &nbsp;Jerry Caplowitz was the original bartender at Andre’s. &nbsp;When I went to Hawaii with my aunt in 1960, he created a drink, The Hawaiian Mickey. &nbsp;It was short lived, but my memory of Jerry and his spell over the clientele is as vivid as if this was still a Saturday night when I had to get on my fancy dress, and make my way over to Wilshire Blvd. &nbsp;</span></em></p><span data-dcnode-id="4058" instrument_node="">
</span><p data-dcnode-id="4052"><strong data-dcnode-id="4056"><span data-dcnode-id="4057" instrument_node="">Bill B</span></strong><span data-dcnode-id="4055" instrument_node=""> Suggests:&nbsp; When you get the inclination a couple more notable buildings you might check out and include sometime in the future: The Villa D’Este Apartments (maybe now condominiums) on North Laurel in Hollywood and The Andalusia Apartments on nearby North Havenhurst, both near Fountain/Sunset area where the Garden of Allah once stood near Crescent Heights. As you are probably aware, The Villa D’Este was built by Cecile B. DeMille for his daughters who resided there. I’m not certain what the history of the Andalusia is, but I almost rented a unit there that was fully furnished with the original furniture and accessories&nbsp;carefully preserved. The elderly eccentric architect who owned the building would not permit anyone to bring in any personal belongings other than their clothes, and I just could not live in such a museum, but I appreciated the thrilling experience of seeing it anyway. </span><a data-dcnode-id="4053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.latimemachines.com/new_page_20.htm"><span data-dcnode-id="4054" instrument_node="">http://www.latimemachines.com/new_page_20.htm</span></a></p><span data-dcnode-id="4051" instrument_node="">

007" data-permalink="https://martinturnbull.com/hollywood-places/s-6220-west-3rd-st-los-angeles/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Barracloughs-6220-West-3rd-St-Los-Angeles.jpg?fit=1261%2C760&amp;amp;ssl=1" data-orig-size="1261,760" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="&amp;#8216;s, 6220 West 3rd St, Los Angeles" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Barracloughs-6220-West-3rd-St-Los-Angeles.jpg?fit=300%2C181&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Barracloughs-6220-West-3rd-St-Los-Angeles.jpg?fit=640%2C386&amp;amp;ssl=1" loading="lazy" class="aligncenter wp-image-12007" src="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Barracloughs-6220-West-3rd-St-Los-Angeles.jpg?resize=564%2C670&amp;#038;ssl=1" alt="The Barraclough’s Restaurant - 6220 West 3rd Street. Near Farmer’s Market. Ph – WE 4-1188 " width="564" height="670" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="3939" instrument_node="">

</span><p data-dcnode-id="3891"><strong data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">B.B.B.’s Cellar</span></strong><span data-dcnode-id="3892" instrument_node=""> – 1651 Cosmo St, Hollywood – (40/62) By Sept 1932, the in crowd was flocking to this newly discovered hangout. Inside it was a tiny, dark, noisy, featured a postage-stamp sized dance floor, but had the wildest entertainment in town – 10 gorgeous female impersonators. All of the patrons were given little wooden hammers. Whenever a new guest arrived, it was the signal for the revelers to pound the tables with the tiny mallets. Among the surprise patrons who came back frequently were Ethel Barrymore, Talullah Bankhead, Billy Haines and Jean Harlow. Even Howard Hughes dropped in two nights in a row. (28/48)</span></p><span data-dcnode-id="3890" instrument_node="">
</span><p data-dcnode-id="3888"><span data-dcnode-id="3889" instrument_node="">Had a revue of 10 boys dressed as girls. The Hollywood Reporter caught Bankhead, Haines, Barrymore and Hughes there one night. The hammer thing caused much laughter, but also kept them on their toes about any possible raid.” … “…on Oct 1, 1932 it was raided and 9 men were arrested. Next they swooped on Jimmy’s Back Yard, cuffing five men and hauling them down to the station. Variety reported it was a “drive on the Nance and Lesbian amusement places in town.” Mann notes the days of the drag clubs were numbered. Raids and arrests continued over the next months, with bail sometimes set as high as $1500 (article)</span></p><span data-dcnode-id="3887" instrument_node="">
</span><p data-dcnode-id="3864"><span data-dcnode-id="3886" instrument_node="">The insouciance of performers like Bourbon made the pansy clubs huge hits. </span><em data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">Variety</span></em><span data-dcnode-id="3883" instrument_node=""> reported in September 1933 they were “paying off”, every one of them operating at a profit. By early 1933 there were several flourishing. </span><strong data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node="">B.B.B.’s Cellar</span></strong><span data-dcnode-id="3880" instrument_node=""> run by Bobby Burns Berman, had a revue of ten boys dressed as girls. The </span><em data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">Hollywood Reporter</span></em><span data-dcnode-id="3877" instrument_node=""> caught Tallulah Bankhead, William Haines, Ethel Barrymore, and Howard Hughes there one night, each guest with a hammer, instructed to pound the table every time a new guest arrived. It aroused much laughter, but also kept them on their toes about any possible raid. Bruz Fletcher ran his eponymous establishment on Sunset Boulevard later, he’d headline at </span><strong data-dcnode-id="3875"><span data-dcnode-id="3876" instrument_node="">Club Bali</span></strong><span data-dcnode-id="3874" instrument_node="">. There was also Karyl Norman, who performed under the guise of various Hollywood actresses at </span><strong data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">La Boheme</span></strong><span data-dcnode-id="3871" instrument_node="">, also on Sunset Boulevard. The </span><em data-dcnode-id="3869"><span data-dcnode-id="3870" instrument_node="">Hollywood Reporter</span></em><span data-dcnode-id="3868" instrument_node=""> spotted William Haines and Joan Crawford in the audience to see Norman’s takeoff on Crawford as Sade Thompson in late 1932. </span><em data-dcnode-id="3866"><span data-dcnode-id="3867" instrument_node="">Variety</span></em><span data-dcnode-id="3865" instrument_node=""> called Norman “a true artiste”, and singled out his backup performer, La Verde, who did “a mean rumba and is plenty of ‘hot cha’ when it comes to appearance.” (10/145)</span></p><span data-dcnode-id="3863" instrument_node="">
</span><p data-dcnode-id="3861"><span data-dcnode-id="3862" instrument_node="">Gays, straights, and the sexually flexible – such as Marlene Dietrich, William Haines, James Cagney, Fifi Dorsay, and Mae West – gathered together regularly in post-Prohibition nightclubs that featured gay entertainment. At B.B.B.’s Cellar the floorshow was called “Boys Will Be Girls” and Fred Monroe did impersonations of the female stars in his audience. … The L.A. police’s 1932 raid on the Cellar was described by Variety as part of “a drive on the Nance and Lesbian amusement places in town. (60/44)</span></p><span data-dcnode-id="3860" instrument_node="">

</span><p data-dcnode-id="3809"><strong data-dcnode-id="3811"><span data-dcnode-id="3812" instrument_node="">(Baron Long’s) Ship Café</span></strong><span data-dcnode-id="3810" instrument_node="">, Venice Beach. Built 1905 and fashioned after a Spanish galleon – the one owned by Spanish explorer Juan Cabrillo when he discovered California.</span></p><span data-dcnode-id="3808" instrument_node="">
</span><p data-dcnode-id="3806"><span data-dcnode-id="3807" instrument_node="">It &nbsp;featured high-priced cuisine and booze during Prohibition for those who could afford it. Reconstructed after a 1924 fire, renovated several times, had a name change (to the Showboat Café), and razed in OCT‘46. (16/74) (40/12)</span></p><span data-dcnode-id="3805" instrument_node="">
</span><p data-dcnode-id="3800"><span data-dcnode-id="3804" instrument_node="">From </span><a data-dcnode-id="3802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.virtualvenice.info/visual/cabrillo.htm"><span data-dcnode-id="3803" instrument_node="">http://www.virtualvenice.info/visual/cabrillo.htm</span></a><span data-dcnode-id="3801" instrument_node=""> (also has many photos) : Baron Long’s Ship Cafe, built in 1905 alongside the Abbot Kinney pier and originally run by Carlo Marchetti, was the “in” spot to find some of this “action.” Named the “Cabrillo,” the combination hotel-restaurant was fashioned after a Spanish galleon and served up high-priced cuisine in the main dining room, or in private salons on the second deck. The staff were uniformed like sixteenth-century naval officers, and, as in most places outside Los Angeles, hootch was available to any well-heeled customer who could afford it. &nbsp;The Ship was available for private functions, which many of Hollywood’s rising stars preferred, and the mayhem that attended New Year’s Eve made for headline copy.</span></p><span data-dcnode-id="3799" instrument_node="">
</span><p data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">Baron Long, who had started out in the Los Angeles area organizing boxing at the Vernon Fight Arena, then teamed up with Julius Rosenfield in 1917 to purchase the Ship Café, making it the most distinct and picturesque establishments in all of Los Angeles. By the mid 20s, Ward McFadden took control of the Ship Café and made it the Brown Derby of its day, the ‘in’ place where motion picture stars mingled with Los Angeles area politicians and wealthy businessmen. The dining was intimate, the food excellent, and Ward McFadden, Ralph Arnold, who was the proprietor in 1929, and Tommy Jacobs, a decade later, were the perfect hosts.</span></p><span data-dcnode-id="3796" instrument_node="">

</span><p data-dcnode-id="3467"><b data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">Billy Gray’s Band Box</span></b><span data-dcnode-id="3468" instrument_node=""> – a popular cabaret on North Fairfax (1930s) (115/p51)</span></p><span data-dcnode-id="3466" instrument_node="">
</span><p data-dcnode-id="3457"><strong data-dcnode-id="3464"><span data-dcnode-id="3465" instrument_node="">The Biltmore Bowl</span></strong><span data-dcnode-id="3463" instrument_node=""> at the Biltmore Hotel – opened 05 APR 34 – by Baron Long, fresh from Agua Caliente and who was also the one behind the Ship Café at Venice pier. (40/92)</span><br data-dcnode-id="3462"><span data-dcnode-id="3461" instrument_node="">
As listed in the ‘Los Angeles Guide, 1941’ : “</span><strong data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">Biltmore Bowl</span></strong><span data-dcnode-id="3458" instrument_node=""> – Biltmore Hotel, 515 S. Olive St. downtown L.A. Dinner from 7.30pm, no couvert. Orchestra; dancing. Two floor reviews nightly. Bar. Much frequented by “visiting fireman” and the football crowd during the season.”</span></p><span data-dcnode-id="3456" instrument_node="">
</span><p data-dcnode-id="3452"><strong data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">Biltmore Hotel</span></strong><span data-dcnode-id="3453" instrument_node=""> – the men’s bar…had been a cruising spot even before the war, uniformed soldiers would be “packed three-deep”… (60/73)</span></p><span data-dcnode-id="3451" instrument_node="">
</span><p data-dcnode-id="3442"><strong data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node="">Biltmore Theater</span></strong><span data-dcnode-id="3448" instrument_node=""> – 520 W. 5th St., Los Angeles, CA 90013. Opened</span><strong data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">:</span></strong><span data-dcnode-id="3445" instrument_node=""> March 3, 1924 with a Ziegfeld production of “Sally” starring Leon Errol, written by Jerome Kern, Clifford Grey and Guy Bolton. The theatre was under Erlanger circuit management. Will Rogers was the emcee and tickets were $10.00.&nbsp;&nbsp;</span><a data-dcnode-id="3443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.google.com/site/downtownlosangelestheatres/biltmore"><span data-dcnode-id="3444" instrument_node="">https://sites.google.com/site/downtownlosangelestheatres/biltmore</span></a></p><span data-dcnode-id="3441" instrument_node="">
</span><p data-dcnode-id="3437"><strong data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">Bimini Hot Springs Beach and Plunges</span></strong><span data-dcnode-id="3438" instrument_node=""> – Bimini place between Beverly and 3rd Street (LAiM)</span></p><span data-dcnode-id="3436" instrument_node="">
</span><p data-dcnode-id="3428"><span data-dcnode-id="3435" instrument_node="">In 1903, Dr. David Edwards opened the Bimini Baths, a spa and “plunge” (public swimming pool) built on a natural hot spring. The Daily Mirror posted the original 1902 </span><em data-dcnode-id="3433"><span data-dcnode-id="3434" instrument_node="">Times</span></em><span data-dcnode-id="3432" instrument_node=""> article on the grand opening </span><a data-dcnode-id="3430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//latimesblogs.latimes.com/thedailymirror/2008/01/bimini-baths.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3431" instrument_node="">here</span></a><span data-dcnode-id="3429" instrument_node="">. Spas &amp; bath-houses were popular in Los Angeles at the turn of the 20th Century, but much like amusement piers, they seemed to have a predilection for burning to the ground (how many of each did Abbott Kinney have to rebuild?!). The Bimini Baths were no exception, and the spa was reduced to briquettes by 1905; but Dr. Edwards promptly rebuilt a much grander facility. The Bimini Baths were located at 2nd St (coming off Vermont, behind the present-day Vons) and Bimini Place (coming South off 1st St and its LARY streetcar line). Across Bimini Place from the spa was a deluxe hotel, also developed by Dr. Edwards. This building still exists (as does Bimini Place), although now it is an apartment building dedicated to people in recovery. It is referred to in some articles as the “Bimini Inn”; however, the 1930’s-era photo above shows the rooftop sign identifying it as the Rayfield, which it is still called today:</span></p><span data-dcnode-id="3427" instrument_node="">
</span><p data-dcnode-id="3416"><span data-dcnode-id="3426" instrument_node="">I found an outstanding </span><em data-dcnode-id="3424"><span data-dcnode-id="3425" instrument_node="">Times</span></em><span data-dcnode-id="3423" instrument_node=""> article </span><a data-dcnode-id="3421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//urbansoil.net/wiki.cgi/Bimini_Baths_Article" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3422" instrument_node="">here</span></a><span data-dcnode-id="3420" instrument_node=""> (presumably scanned, hence the weird typos), which includes details about the history of Bimini Baths, and also mentions local features like Bimini Slough and the Palomar Ballroom. Amazingly, the Bimini Baths lasted until 1951, but it seems to have disappeared from the public consciousness even more so than other Ragtime-era attractions in Los Angeles. See also </span><strong data-dcnode-id="3417"><a data-dcnode-id="3418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.martinturnbull.com/2014/01/07/bimini-baths-spa-and-plunge-public-swimming-pool/" rel="bookmark" title="Permalink to Bimini Baths spa and plunge (public swimming pool)"><span data-dcnode-id="3419" instrument_node="">Bimini Baths spa and plunge</span></a></strong></p><span data-dcnode-id="3415" instrument_node="">
</span><p data-dcnode-id="3410" style="text-align: center;"><a data-dcnode-id="3411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/bimini-baths-5.jpg"><img alt="Bimini Hot Springs Beach and Plunges" class="aligncenter wp-image-4090 jetpack-lazy-image" data-attachment-id="4090" data-comments-opened="1" data-dcnode-id="3414" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;}" data-image-title="bimini-baths-5" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bimini-baths-5.jpg?fit=640%2C395&amp;ssl=1" data-lazy-src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/bimini-baths-5.jpg?resize=522%2C515&amp;is-pending-load=1" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bimini-baths-5.jpg?fit=300%2C185&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bimini-baths-5.jpg?fit=1024%2C632&amp;ssl=1" data-orig-size="1024,632" data-permalink="https://martinturnbull.com/hollywood-places/bimini-baths-5/" data-recalc-dims="1" height="515" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/bimini-baths-5.jpg%3Fresize%3D522%252C515&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="border: 1px solid black;" title="Bimini Hot Springs Beach and Plunges" width="522"><noscript data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">&lt;img data-attachment-id="4090" data-permalink="https://martinturnbull.com/hollywood-places/bimini-baths-5/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bimini-baths-5.jpg?fit=1024%2C632&amp;amp;ssl=1" data-orig-size="1024,632" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="bimini-baths-5" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bimini-baths-5.jpg?fit=300%2C185&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bimini-baths-5.jpg?fit=640%2C395&amp;amp;ssl=1" loading="lazy" class="aligncenter wp-image-4090" style="border: 1px solid black;" title="Bimini Hot Springs Beach and Plunges" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/bimini-baths-5.jpg?resize=522%2C515" alt="Bimini Hot Springs Beach and Plunges" width="522" height="515" data-recalc-dims="1" /&gt;</span></noscript></a></p><span data-dcnode-id="3409" instrument_node="">
</span><p data-dcnode-id="3393"><strong data-dcnode-id="3407"><span data-dcnode-id="3408" instrument_node="">Bird in the Basket</span></strong><span data-dcnode-id="3406" instrument_node=""> – By the MID-1940s, Central Ave had become </span><em data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">the</span></em><span data-dcnode-id="3403" instrument_node=""> jazz thoroughfare of the West…On Central itself there were dozens of legit nightclubs, including </span><strong data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node="">the Brown Bomber</span></strong><span data-dcnode-id="3400" instrument_node="">, </span><strong data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">Bird in the Basket</span></strong><span data-dcnode-id="3397" instrument_node="">, and the lounge at the </span><strong data-dcnode-id="3395"><span data-dcnode-id="3396" instrument_node="">Dunbar Hotel</span></strong><span data-dcnode-id="3394" instrument_node=""> where pianist/singer Nellie Lutcher held court. And there were the so-called breakfast clubs – after-hour places where you brought your own booze and danced past sunrise. (82/54)</span></p><span data-dcnode-id="3392" instrument_node="">
</span><p data-dcnode-id="3388"><strong data-dcnode-id="3390"><span data-dcnode-id="3391" instrument_node="">The Bistro </span></strong><span data-dcnode-id="3389" instrument_node="">– Canon Drive. Opened 1958. Run by the ex-maitre d’ from Romanoff’s, Kurt Nicklas. Backed by Jack Benny, Jack Warner and Otto Preminger. First of three. (49/54)</span></p><span data-dcnode-id="3387" instrument_node="">
</span><p data-dcnode-id="3381"><strong data-dcnode-id="3385"><span data-dcnode-id="3386" instrument_node="">Bit O’ Scotland </span></strong><span data-dcnode-id="3384" instrument_node="">— Over on Westwood Boulevard, between Olympic and Santa Monica Boulevard, you could once get the best fish and chips you ever had, served by cheery older women with (mostly) British accents.&nbsp; The entire menu was fish and chips, shrimp and chips, chicken and chips, some kind of ham and chips, plus various combination plates.&nbsp; I never had the ham but I think it was the only thing in the place that wasn’t fried, except maybe the clam chowder (red), salad, beverages and shortbread.&nbsp; This was all served in an old house someone had converted into a restaurant that was way too small for the crowd.&nbsp; On weekends, the wait to dine could run upwards of an hour and for some reason, every time I found myself waiting for a table, the party ahead of me included James Coco. After Bit O’ Scotland closed, the same family opened a restaurant over on Pico near Rancho Park.&nbsp; It’s called John O’ Groat’s and it’s open mainly for breakfast and lunch.&nbsp; But at lunchtime, you can order fish and chips made with the same wonderful recipe.&nbsp; Alas, they don’t have shrimp, scallops or cheery older women with British accents. </span><a data-dcnode-id="3382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.povonline.com/larestaurants/larestaurants01.htm"><span data-dcnode-id="3383" instrument_node="">http://www.povonline.com/larestaurants/larestaurants01.htm</span></a></p><span data-dcnode-id="3380" instrument_node="">
</span><p data-dcnode-id="3376"><strong data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">Bit of Sweden </span></strong><span data-dcnode-id="3377" instrument_node="">– 9051 Sunset Boulevard near Doheny. Opened in 1936, introducing the concept of the smorgasbord to Angelinos. (40/152)</span></p><span data-dcnode-id="3375" instrument_node="">
</span><p data-dcnode-id="3373"><span data-dcnode-id="3374" instrument_node="">As listed in the ‘Los Angeles Guide, 1941’ : “Smorgasbord with over 75 delicacies. The dinner is excellent; for dessert Swedish apple pie is featured.”</span></p><span data-dcnode-id="3372" instrument_node="">
</span><p data-dcnode-id="3368"><strong data-dcnode-id="3370"><span data-dcnode-id="3371" instrument_node="">The Black Bull</span></strong><span data-dcnode-id="3369" instrument_node="">– 1465 Vine St, Hollywood. Telephone: HOllywood 9243</span></p><span data-dcnode-id="3367" instrument_node="">

;lt;p&amp;gt;The Black Bull&amp;lt;/p&amp;gt;

</span><p data-dcnode-id="3354"><strong data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">The Black Cat</span></strong><span data-dcnode-id="3358" instrument_node=""> – By the late 1950s, despite continuing hostility and harassment of the LAPD, a number of gay establishments had sprung up: the </span><strong data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">House of Ivy, the Cherokee House, Maxwell’s, The Black Cat, the “356” </span></strong><span data-dcnode-id="3355" instrument_node="">bar downtown. Most gay bars had existed outside Los Angeles city limits where county sheriffs were traditionally far more tolerant. (10/346)</span></p><span data-dcnode-id="3353" instrument_node="">
</span><p data-dcnode-id="3349"><b data-dcnode-id="3351"><span data-dcnode-id="3352" instrument_node="">The Black Watch</span></b><span data-dcnode-id="3350" instrument_node=""> – downtown L.A. (lesbian bar, listed in the 1949 Gay Girl’s Guide)</span></p><span data-dcnode-id="3348" instrument_node="">
</span><p data-dcnode-id="3344"><strong data-dcnode-id="3346"><span data-dcnode-id="3347" instrument_node="">Blimp Landing Field</span></strong><span data-dcnode-id="3345" instrument_node=""> – where the Park La Brea housing complex is, north of Wilshire and east of Fairfax. (LAiM)</span></p><span data-dcnode-id="3343" instrument_node="">
</span><p data-dcnode-id="3339"><strong data-dcnode-id="3341"><span data-dcnode-id="3342" instrument_node="">The Blossom Room</span></strong><span data-dcnode-id="3340" instrument_node=""> – at the Roosevelt Hotel, opened 1927 and played host to the first Academy Awards dinner in 1928. (40/64)</span></p><span data-dcnode-id="3338" instrument_node="">
</span><p data-dcnode-id="3334"><strong data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node="">The Blue Dot</span></strong><span data-dcnode-id="3335" instrument_node="">, 1235 Vine St, Hollywood. Phone Holly 9423, late 1920s</span></p><span data-dcnode-id="3333" instrument_node="">

</span><p data-dcnode-id="3240"><img alt="Brooks clothing store advertisement in LA City Directory, 1942" class="aligncenter size-full wp-image-9823 jetpack-lazy-image" data-attachment-id="9823" data-comments-opened="1" data-dcnode-id="3243" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Brooks clothing store advertisement in LA City Directory, 1942" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brooks-clothing-store-advertisement-in-LA-City-Directory-1942.png?fit=640%2C213&amp;ssl=1" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Brooks-clothing-store-advertisement-in-LA-City-Directory-1942.png?resize=640%2C213&amp;is-pending-load=1" data-lazy-srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brooks-clothing-store-advertisement-in-LA-City-Directory-1942.png?w=800&amp;ssl=1 800w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brooks-clothing-store-advertisement-in-LA-City-Directory-1942.png?resize=300%2C100&amp;ssl=1 300w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brooks-clothing-store-advertisement-in-LA-City-Directory-1942.png?resize=768%2C255&amp;ssl=1 768w" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brooks-clothing-store-advertisement-in-LA-City-Directory-1942.png?fit=300%2C100&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brooks-clothing-store-advertisement-in-LA-City-Directory-1942.png?fit=800%2C266&amp;ssl=1" data-orig-size="800,266" data-permalink="https://martinturnbull.com/hollywood-places/brooks-clothing-store-advertisement-in-la-city-directory-1942/" data-recalc-dims="1" height="213" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Brooks-clothing-store-advertisement-in-LA-City-Directory-1942.png%3Fresize%3D640%252C213&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="640"><noscript data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">&lt;img data-attachment-id="9823" data-permalink="https://martinturnbull.com/hollywood-places/brooks-clothing-store-advertisement-in-la-city-directory-1942/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brooks-clothing-store-advertisement-in-LA-City-Directory-1942.png?fit=800%2C266&amp;amp;ssl=1" data-orig-size="800,266" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="Brooks clothing store advertisement in LA City Directory, 1942" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brooks-clothing-store-advertisement-in-LA-City-Directory-1942.png?fit=300%2C100&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brooks-clothing-store-advertisement-in-LA-City-Directory-1942.png?fit=640%2C213&amp;amp;ssl=1" loading="lazy" class="aligncenter size-full wp-image-9823" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Brooks-clothing-store-advertisement-in-LA-City-Directory-1942.png?resize=640%2C213" alt="Brooks clothing store advertisement in LA City Directory, 1942" width="640" height="213" srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brooks-clothing-store-advertisement-in-LA-City-Directory-1942.png?w=800&amp;amp;ssl=1 800w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brooks-clothing-store-advertisement-in-LA-City-Directory-1942.png?resize=300%2C100&amp;amp;ssl=1 300w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brooks-clothing-store-advertisement-in-LA-City-Directory-1942.png?resize=768%2C255&amp;amp;ssl=1 768w" sizes="(max-width: 640px) 100vw, 640px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="3239" instrument_node="">
</span><p data-dcnode-id="3211"><strong data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">Brothers – </span></strong><span data-dcnode-id="3236" instrument_node="">The </span><strong data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">House of Ivy </span></strong><span data-dcnode-id="3233" instrument_node="">on Cahuenga was very popular in the 50s and 60s…There was also the </span><strong data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">Lafayette</span></strong><span data-dcnode-id="3230" instrument_node="">, which was just across the way from it. And then there was the </span><strong data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">Open Door, </span></strong><span data-dcnode-id="3227" instrument_node="">which was on the corner of Selma and Ivar…I also remember the </span><strong data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">Cherokee House</span></strong><span data-dcnode-id="3224" instrument_node=""> in Hollywood…and </span><strong data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">Chee Chee’s </span></strong><span data-dcnode-id="3221" instrument_node="">on Figueroa…There were some others too like the </span><strong data-dcnode-id="3219"><span data-dcnode-id="3220" instrument_node="">Carousel</span></strong><span data-dcnode-id="3218" instrument_node="">, in Venice. That was one of the toughest….In the 30s and 40s it was considered quite chic to drop in at an after-hours “speakeasy” knows as </span><strong data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">Brothers</span></strong><span data-dcnode-id="3215" instrument_node="">, in the Central Ave area, near the </span><strong data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">Hotel Dunbar</span></strong><span data-dcnode-id="3212" instrument_node="">, where the city’s African-American nightlife flourished.&nbsp; (11/37) Several of our sources pointed us to Brothers, a South Central nightclub of the 1940s which clearly had a speakeasy mystique and outlaw charm. (60/4)</span></p><span data-dcnode-id="3210" instrument_node="">
</span><p data-dcnode-id="3193"><span data-dcnode-id="3209" instrument_node="">The</span><strong data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node=""> Brown Bomber</span></strong><span data-dcnode-id="3206" instrument_node=""> –&nbsp; By the MID-1940s, Central Ave had become </span><em data-dcnode-id="3204"><span data-dcnode-id="3205" instrument_node="">the</span></em><span data-dcnode-id="3203" instrument_node=""> jazz thoroughfare of the West…On Central itself there were dozens of legit nightclubs, including </span><strong data-dcnode-id="3201"><span data-dcnode-id="3202" instrument_node="">the Brown Bomber</span></strong><span data-dcnode-id="3200" instrument_node="">, </span><strong data-dcnode-id="3198"><span data-dcnode-id="3199" instrument_node="">Bird in the Basket</span></strong><span data-dcnode-id="3197" instrument_node="">, and the lounge at the </span><strong data-dcnode-id="3195"><span data-dcnode-id="3196" instrument_node="">Dunbar Hotel</span></strong><span data-dcnode-id="3194" instrument_node=""> where pianist/singer Nellie Lutcher held court. And there were the so-called breakfast clubs – after-hour places where you brought your own booze and danced past sunrise. (82/54)</span></p><span data-dcnode-id="3192" instrument_node="">

</span><p data-dcnode-id="3160"><img alt="Brown Derby restaurants advertisement" class="aligncenter size-full wp-image-10090 jetpack-lazy-image" data-attachment-id="10090" data-comments-opened="1" data-dcnode-id="3163" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Brown Derby restaurants advertisement" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-restaurants-advertisement.jpg?fit=313%2C175&amp;ssl=1" data-lazy-sizes="(max-width: 313px) 100vw, 313px" data-lazy-src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-restaurants-advertisement.jpg?resize=313%2C175&amp;is-pending-load=1" data-lazy-srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-restaurants-advertisement.jpg?w=313&amp;ssl=1 313w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-restaurants-advertisement.jpg?resize=300%2C168&amp;ssl=1 300w" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-restaurants-advertisement.jpg?fit=300%2C168&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-restaurants-advertisement.jpg?fit=313%2C175&amp;ssl=1" data-orig-size="313,175" data-permalink="https://martinturnbull.com/hollywood-places/brown-derby-restaurants-advertisement/" data-recalc-dims="1" height="175" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-restaurants-advertisement.jpg%3Fresize%3D313%252C175&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="313"><noscript data-dcnode-id="3161"><span data-dcnode-id="3162" instrument_node="">&lt;img data-attachment-id="10090" data-permalink="https://martinturnbull.com/hollywood-places/brown-derby-restaurants-advertisement/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-restaurants-advertisement.jpg?fit=313%2C175&amp;amp;ssl=1" data-orig-size="313,175" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"1"}" data-image-title="Brown Derby restaurants advertisement" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-restaurants-advertisement.jpg?fit=300%2C168&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-restaurants-advertisement.jpg?fit=313%2C175&amp;amp;ssl=1" loading="lazy" class="aligncenter size-full wp-image-10090" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-restaurants-advertisement.jpg?resize=313%2C175" alt="Brown Derby restaurants advertisement" width="313" height="175" srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-restaurants-advertisement.jpg?w=313&amp;amp;ssl=1 313w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-restaurants-advertisement.jpg?resize=300%2C168&amp;amp;ssl=1 300w" sizes="(max-width: 313px) 100vw, 313px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="3159" instrument_node="">
</span><p data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">In 1926, the first Brown Derby opened, facing due south at 3427 Wilshire between Mariposa &amp; Alexandria. It was designed by Ray J. Keiffer.</span></p><span data-dcnode-id="3156" instrument_node="">
</span><p data-dcnode-id="3154"><span data-dcnode-id="3155" instrument_node="">In 1931, a Brown Derby branch opened at 3927 Wilshire, as seen in the shot below, in the Bilicke Building (built 1930) at the corner of Wilshire &amp; Gramercy.</span></p><span data-dcnode-id="3153" instrument_node="">
</span><p data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">This Brown Derby replaced the short-lived Hi-Hat (apparently also owned by Herbert Somborn, aka Mr. Gloria Swanson) and only lasted a year or so.</span></p><span data-dcnode-id="3150" instrument_node="">
</span><p data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">In 1934, that restaurant became the first Perino’s.</span></p><span data-dcnode-id="3147" instrument_node="">
</span><p data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">In 1937, the hat-shaped Brown Derby moved half a block east of its original location, to 3377 Wilshire, oriented to the northeast corner of Alexandria. It was designed by Carl Jules Weyl.</span></p><span data-dcnode-id="3144" instrument_node="">
</span><p data-dcnode-id="3137"><strong data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">Original (hat-shaped) at 3427 Wilshire Boulevard, then later 3377 Wilshire Boulevard</span></strong><span data-dcnode-id="3141" instrument_node="">, across the street from the Ambassador Hotel. Opened 1926. Phone DUnkirk 4-4147. Stayed open until 4am and invented the Cobb Salad and the Shirley Temple. </span><a data-dcnode-id="3139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nfo.net/usa/niteclub.htm"><span data-dcnode-id="3140" instrument_node="">http://nfo.net/usa/niteclub.htm</span></a><span data-dcnode-id="3138" instrument_node=""> . See also 61/65-67 which says the Cobb Salad was invented at the Hollywood Brown Derby.</span></p><span data-dcnode-id="3136" instrument_node="">
</span><p data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">Opened by a group of East Coasters not happy with the standard of fare in Los Angeles. Led by ex-husband of Gloria Swanson: Herbert Somborn, Wilson Mizner and silent partner Jack Warner. The name was probably inspired by the favored headgear of Mizner’s heroes: Bat Masterson and Alfred E. Smith (New York governor in the 20s). Each booth featured a signature light fixture in the shape of a derby. Rivaled the Montmartre in late night popularity; was open until 4am. Instituted the custom of paging customers and bringing a telephone to the table, at the Vine Street Derby, the custom was raised to an art form. (40/44) It was featured in “What Price Hollywood?” in&nbsp; which Constance Bennett plays a waitress who is discovered while working at&nbsp; the original Brown Derby. (49/20) Somborn died in 1934 and it was taken over by Robert H. Cobb after whom the Cobb salad was named. The salad was popular with the Hollywood stars who were continually watching their waistlines. Equally popular at lunchtimes was the more caloric pan-fried corned beef hash. Also popular was the grapefruit cake. (49/20) On top of it was a sign that said “Eat in the hat”.</span></p><span data-dcnode-id="3133" instrument_node="">
</span><p data-dcnode-id="3128"><a data-dcnode-id="3129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/image011.jpg"><img alt="The Brown Derby - Vine Street" class="aligncenter wp-image-187 size-full jetpack-lazy-image" data-attachment-id="187" data-comments-opened="1" data-dcnode-id="3132" data-image-caption="<p>The Brown Derby – Vine Street</p>

="422,639" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="The Brown Derby &amp;#8211; Vine Street" data-image-description="" data-image-caption="&amp;lt;p&amp;gt;The Brown Derby &amp;#8211; Vine Street&amp;lt;/p&amp;gt;
" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image011.jpg?fit=198%2C300&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image011.jpg?fit=422%2C639&amp;amp;ssl=1" loading="lazy" class="aligncenter wp-image-187 size-full" title="The Brown Derby - Vine Street" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/image011.jpg?resize=422%2C639" alt="The Brown Derby - Vine Street" width="422" height="639" srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image011.jpg?w=422&amp;amp;ssl=1 422w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image011.jpg?resize=198%2C300&amp;amp;ssl=1 198w" sizes="(max-width: 422px) 100vw, 422px" data-recalc-dims="1" /&gt;</span></noscript></a></p><span data-dcnode-id="3127" instrument_node="">
</span><p data-dcnode-id="3123"><span data-dcnode-id="3126" instrument_node="">MENU: </span><a data-dcnode-id="3124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//beezone.homestead.com/insideFullBDmenu2_op_800x515.jpg"><span data-dcnode-id="3125" instrument_node="">http://beezone.homestead.com/insideFullBDmenu2_op_800x515.jpg</span></a></p><span data-dcnode-id="3122" instrument_node="">
</span><p data-dcnode-id="3112"><strong data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">1628 Vine St, Hollywood</span></strong><span data-dcnode-id="3119" instrument_node=""> opened Valentine’s Day 1929 and was the most popular one with the industry. Designed by Carl Jules Weyl who later, as Warner Bros art director, designed Rick’s Café in </span><em data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">Casablanca</span></em><span data-dcnode-id="3116" instrument_node="">. Louella Parson (a permanent fixture by 1928 (15/114)) sat at booth #2 and Hedda Hopper at booth #5. By 1929, Louella Parson’s informal gatherings of female newspaper reporters and fan magazine writers who covered Hollywood were now named the Hollywood Women’s Press Club and met each Wednesday at noon at the Vine Street Brown Derby. (15/114) During its heyday, </span><strong data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">Bill Chelios</span></strong><span data-dcnode-id="3113" instrument_node=""> (not Chilios as is widely reported) was the head waiter. (25/46) (40/49) says that Nick was the headwaiter.) Had an all-male staff policy who were inspected by Somborn. Featured low-sided booths for maximum visibility. Booths became the favored spots for stars to eat and the north wall reserved for the really big guns. The fame of the Vine St. Derby as spread by a public relations firm headed by Margaret Ettinger who was a relative of Parsons. This Derby became the embarkation point for Friday night fights at the Hollywood Legion Stadium, a block behind the Derby. At 8pm the Derby would empty out, the crowd filing through the parking lot and then returning after the bouts for late-night snacks. (40/49) &nbsp;The most prominent customers – Katherine Hepburn, Joan Bennett, Jean Harlow, William Powell and Joan Crawford – sat in booths on the desirable north side beneath caricatures of themselves. (49/19) In booth $54 Clark Gable proposed to Carole Lombard in 1939. See also 61/67</span></p><span data-dcnode-id="3111" instrument_node="">
</span><p data-dcnode-id="3107"><span data-dcnode-id="3110" instrument_node="">MENU: </span><a data-dcnode-id="3108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//beezone.homestead.com/insideFullBDmenu2_op_800x515.jpg"><span data-dcnode-id="3109" instrument_node="">http://beezone.homestead.com/insideFullBDmenu2_op_800x515.jpg</span></a></p><span data-dcnode-id="3106" instrument_node="">
</span><p data-dcnode-id="3103"><strong data-dcnode-id="3104"><span data-dcnode-id="3105" instrument_node="">3927 Wilshire Boulevard</span></strong></p><span data-dcnode-id="3102" instrument_node="">
</span><p data-dcnode-id="3098"><img alt="brown-derby-perinos1" class="aligncenter wp-image-5294 jetpack-lazy-image" data-attachment-id="5294" data-comments-opened="1" data-dcnode-id="3101" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;}" data-image-title="brown-derby-perinos1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2014/07/brown-derby-perinos1.jpg?fit=640%2C477&amp;ssl=1" data-lazy-src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2014/07/brown-derby-perinos1.jpg?resize=505%2C424&amp;is-pending-load=1" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2014/07/brown-derby-perinos1.jpg?fit=300%2C223&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2014/07/brown-derby-perinos1.jpg?fit=720%2C537&amp;ssl=1" data-orig-size="720,537" data-permalink="https://martinturnbull.com/2014/07/08/the-original-brown-derbys-original-location/brown-derby-perinos1/" data-recalc-dims="1" height="424" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2014/07/brown-derby-perinos1.jpg%3Fresize%3D505%252C424&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="505"><noscript data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">&lt;img data-attachment-id="5294" data-permalink="https://martinturnbull.com/2014/07/08/the-original-brown-derbys-original-location/brown-derby-perinos1/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2014/07/brown-derby-perinos1.jpg?fit=720%2C537&amp;amp;ssl=1" data-orig-size="720,537" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="brown-derby-perinos1" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2014/07/brown-derby-perinos1.jpg?fit=300%2C223&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2014/07/brown-derby-perinos1.jpg?fit=640%2C477&amp;amp;ssl=1" loading="lazy" class="aligncenter wp-image-5294" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2014/07/brown-derby-perinos1.jpg?resize=505%2C424" alt="brown-derby-perinos1" width="505" height="424" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="3097" instrument_node="">
</span><p data-dcnode-id="3093"><strong data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">Corner Wilshire and Rodeo Drive</span></strong><span data-dcnode-id="3094" instrument_node="">. Built 1931. More popular with the Beverly Hills crowd so it was busiest on Thursday nights which was the traditional “maid’s night off”. See also 61/66. According to Vanity Fair, March 2009, in 1958 Christmas dinner at the Beverly Hills Brown Derby was $3.85, or $30 in current dollars.</span></p><span data-dcnode-id="3092" instrument_node="">
</span><p data-dcnode-id="3088"><img alt="Brown Derby Rodeo Drive (cnr Rodeo &amp; Wilshire, 1960)" class="aligncenter wp-image-189 size-full jetpack-lazy-image" data-attachment-id="189" data-comments-opened="1" data-dcnode-id="3091" data-image-caption="<p>Brown Derby Rodeo Drive (cnr Rodeo &amp; Wilshire, 1960)</p>
