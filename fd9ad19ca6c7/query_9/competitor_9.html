</span><p data-dcnode-id="3080"><strong data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">&nbsp;4500 Los Feliz Boulevard</span></strong><span data-dcnode-id="3084" instrument_node="">. Open 1940s. (Formerly a W</span><strong data-dcnode-id="3082"><span data-dcnode-id="3083" instrument_node="">illard’s</span></strong><span data-dcnode-id="3081" instrument_node="">.) Also included a “drive-in” called the Car Café. See also 61/66</span></p><span data-dcnode-id="3079" instrument_node="">
</span><p data-dcnode-id="3074"><a data-dcnode-id="3075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-Car-Cafe-1941.jpg"><img alt="Brown Derby Car Cafe 1941" class="aligncenter wp-image-5424 jetpack-lazy-image" data-attachment-id="5424" data-comments-opened="1" data-dcnode-id="3078" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;}" data-image-title="Brown Derby Car Cafe 1941" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-Car-Cafe-1941.jpg?fit=640%2C506&amp;ssl=1" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-Car-Cafe-1941-300x237.jpg?resize=600%2C474&amp;is-pending-load=1" data-lazy-srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-Car-Cafe-1941.jpg?resize=300%2C237&amp;ssl=1 300w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-Car-Cafe-1941.jpg?w=850&amp;ssl=1 850w" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-Car-Cafe-1941.jpg?fit=300%2C237&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-Car-Cafe-1941.jpg?fit=850%2C672&amp;ssl=1" data-orig-size="850,672" data-permalink="https://martinturnbull.com/hollywood-places/brown-derby-car-cafe-1941-2/" data-recalc-dims="1" height="474" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-Car-Cafe-1941-300x237.jpg%3Fresize%3D600%252C474&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="600"><noscript data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">&lt;img data-attachment-id="5424" data-permalink="https://martinturnbull.com/hollywood-places/brown-derby-car-cafe-1941-2/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-Car-Cafe-1941.jpg?fit=850%2C672&amp;amp;ssl=1" data-orig-size="850,672" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="Brown Derby Car Cafe 1941" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-Car-Cafe-1941.jpg?fit=300%2C237&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-Car-Cafe-1941.jpg?fit=640%2C506&amp;amp;ssl=1" loading="lazy" class="aligncenter wp-image-5424" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-Car-Cafe-1941-300x237.jpg?resize=600%2C474" alt="Brown Derby Car Cafe 1941" width="600" height="474" srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-Car-Cafe-1941.jpg?resize=300%2C237&amp;amp;ssl=1 300w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Brown-Derby-Car-Cafe-1941.jpg?w=850&amp;amp;ssl=1 850w" sizes="(max-width: 600px) 100vw, 600px" data-recalc-dims="1" /&gt;</span></noscript></a></p><span data-dcnode-id="3073" instrument_node="">
</span><p data-dcnode-id="3069"><span data-dcnode-id="3072" instrument_node="">In 1933 artist Eddie Vitch asked owner Bob Cobb if he could complete some caricature drawings of the stars in the Derby that night in exchange for a meal. Cobb liked the results and a tradition was born. (16/81) </span><a data-dcnode-id="3070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nfo.net/usa/niteclub.htm"><span data-dcnode-id="3071" instrument_node="">http://nfo.net/usa/niteclub.htm</span></a></p><span data-dcnode-id="3068" instrument_node="">
</span><p data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">All the Brown Derbys – Beverly, Hollywood and downtown – served good food at reasonable prices. Writers, agents and reporters frequented them. In the winter of 1937, when F. Scott Fitzgerald and Sheilah Graham were I the Beverly Derby on a Saturday evening, we saw Hedy Lamarr dining there alone. “How typical of Hollywood,” said Scott, “The most beautiful girl in the world alone on a Saturday night. (31/78)</span></p><span data-dcnode-id="3065" instrument_node="">
</span><p data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">There were only two really good restaurants in the studios, at Warner Bros and Harry Cohn’s Columbia. Mr. Cohn hoped it would lure people from the nearby Hollywood Brown Derby. He had been insulted there, he said, which was why he built his own lunch place. (31/99)</span></p><span data-dcnode-id="3062" instrument_node="">
</span><p data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">The Fox commissary, called the Café de Paris was the setting of Shirley Temple’s yearly birthday (which consistently made her a year younger than her true age). Its head waiter, Nick, was the former headwaiter at the Vine St Brown Derby. (41/61)</span></p><span data-dcnode-id="3059" instrument_node="">
</span><p data-dcnode-id="3056"><a data-dcnode-id="3057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.povonline.com/larestaurants/larestaurants09.htm"><span data-dcnode-id="3058" instrument_node="">http://www.povonline.com/larestaurants/larestaurants09.htm</span></a></p><span data-dcnode-id="3055" instrument_node="">
</span><p data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">At one point, there were several of them in Los Angeles but only one (the one on Wilshire opposite the Ambassador Hotel) was constructed so that when you walked in the front door, it looked like you were walking into a giant hat.</span></p><span data-dcnode-id="3052" instrument_node="">
</span><p data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">That was the original Brown Derby, which opened on Valentine’s Day of either 1926 or 1929 (accounts differ) and moved one block away in 1937.&nbsp; The other main locations were (1) near Hollywood and Vine, (2) near Wilshire and Rodeo Drive in Beverly Hills, and (3) at Los Feliz Boulevard and Hillhurst in the Los Feliz area.&nbsp; There were also a few short-lived ones in other spots.&nbsp; All served mostly American fare in a semi-plush manner with very attentive service.|</span></p><span data-dcnode-id="3049" instrument_node="">
</span><p data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node="">Apart from the gimmick of the name and pretty good food, they had two things going for them.&nbsp; One was the Cobb Salad, which was invented at the Brown Derby, which was owned by the Cobb family.&nbsp; As the delicacy caught on in other eateries, there was much publicity as to where it had begun, and many people wanted to go and try the original.&nbsp; Many people also wanted to dine where the stars ate, and that was an even better reason to dine at the Derby.&nbsp; Like many restaurants where the big attraction is celebrity clientele, the proprietors advertised their famous patrons by covering the walls with their caricatures.</span></p><span data-dcnode-id="3046" instrument_node="">
</span><p data-dcnode-id="3035"><span data-dcnode-id="3045" instrument_node="">The Brown Derby near Hollywood and Vine was situated in area from which many network radio shows were broadcast, so stars were always eating there.&nbsp; It was not uncommon for the cast of a program to do a performance for the East Coast, then repair to The Derby for food and libation before returning to the studio for the West Coast transmission.&nbsp; This caused the Brown Derby to be mentioned often on their shows.&nbsp; When TV shows began to emanate from some of the same studios in the fifties, there were occasional live remotes from that Brown Derby.&nbsp; The Ralph Edwards show, </span><em data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">This is Your Life</span></em><span data-dcnode-id="3042" instrument_node="">, always began by surprising some celebrity, often in a location very close to the studio from which the program was telecast.&nbsp; During the years that </span><em data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">This is Your Life</span></em><span data-dcnode-id="3039" instrument_node=""> came from the Pantages Theater on Hollywood Boulevard, they often used the Derby, which was right around the corner.&nbsp; The night Edwards surprised Harold Lloyd there, Groucho Marx was in the next booth (on a break from filming </span><em data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">You Bet Your Life</span></em><span data-dcnode-id="3036" instrument_node=""> at NBC’s nearby Sunset and Vine studio) and Marx began heckling Edwards as the latter attempted to hustle Mr. Lloyd across Vine Street.&nbsp; Well, who wouldn’t want to eat in a place where that kind of thing happened?</span></p><span data-dcnode-id="3034" instrument_node="">
</span><p data-dcnode-id="3029"><span data-dcnode-id="3033" instrument_node="">The Sunset-Vine Brown Derby also had a lovely banquet room and courtyard so it was the scene of many wrap parties and show biz press gatherings.&nbsp; All that “in” spot mystique spilled over to the Beverly Hills location and gave it a similar rep.&nbsp; On </span><em data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">I Love Lucy</span></em><span data-dcnode-id="3030" instrument_node="">, when Lucy, Fred and Ethel arrived in Hollywood and wanted to go somewhere to see the stars, they went to the Brown Derby…where Lucy caused a plate of food to be dumped on the head of Brown Derby regular William Holden.&nbsp; That was probably good for another five years of tourists flocking to the place.</span></p><span data-dcnode-id="3028" instrument_node="">
</span><p data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">Eventually though, business declined and Brown Derbies began closing down.&nbsp; I was an occasional patron of the Hollywood/Vine one in its last years, largely because I was working on a TV show that taped at the Sunset-Gower Studio a few blocks away.&nbsp; I recall being impressed with the history but unimpressed with the food…and somewhat bothered by the obsequious service.&nbsp; The host and waiters fawned over everyone who walked in the door like they were royalty and it seemed awfully antiquated and phony, at least to me.&nbsp; In any case, it was no longer the kind of place where Groucho and Bill Holden might drop by for a bite, so its main attraction was gone.</span></p><span data-dcnode-id="3025" instrument_node="">
</span><p data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">That Derby closed in ’85, the same year the Los Feliz branch turned into a night club.&nbsp; In the last few decades, much effort has gone into preserving the giant hat from the Wilshire location as a historical landmark.&nbsp; The only remaining Brown Derby is located at the Disney-MGM Studio theme park in Florida.&nbsp; I don’t know why they don’t buy the big hat and just ship it on down there.</span></p><span data-dcnode-id="3022" instrument_node="">
</span><p data-dcnode-id="3018"><span data-dcnode-id="3021" instrument_node="">See also </span><a data-dcnode-id="3019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//laist.com/2008/12/06/laistory_the_brown_derby.php"><span data-dcnode-id="3020" instrument_node="">http://laist.com/2008/12/06/laistory_the_brown_derby.php</span></a></p><span data-dcnode-id="3017" instrument_node="">
</span><p data-dcnode-id="3011"><strong data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">The Broken Drum</span></strong><strong data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">,</span></strong><span data-dcnode-id="3012" instrument_node=""> 720 Wilshire Blvd, Santa Monica, “You can’t it – those famous hamburgers”</span></p><span data-dcnode-id="3010" instrument_node="">
</span><p data-dcnode-id="3006"><strong data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">Bryson Apartment Hotel</span></strong><span data-dcnode-id="3007" instrument_node=""> is an historic 110,000-square-foot 10-story apartment building on Wilshire Boulevard in the MacArthur Park section of Los Angeles. Built in 1913 in the Beaux Arts style, it was one of the most luxurious residential buildings in Los Angeles for many years. The building is also closely associated with the city’s film noir history, having been featured in Raymond Chandler’s works. The building’s stone lions and large rooftop “Bryson” sign have become Los Angeles landmarks. It was added to the National Register of Historic Places in 1983 and designated a Historic Cultural Monument (HCM #653) by the Los Angeles Cultural Heritage Commission in 1998.</span></p><span data-dcnode-id="3005" instrument_node="">
</span><p data-dcnode-id="2999"><b data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">Bruz Fletchers’</span></b><span data-dcnode-id="3002" instrument_node=""> – an early (mid-30s?) gay venue on the Sunset Strip. Bruz was a gay entertainer who sang “naughty songs.” He hoped his bar would attract a mixed crowd of gays and straights, and for a while it did but Fletcher didn’t see the success he hoped for. </span><a data-dcnode-id="3000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.queermusicheritage.us/may2010h.html"><span data-dcnode-id="3001" instrument_node="">http://www.queermusicheritage.us/may2010h.html</span></a></p><span data-dcnode-id="2998" instrument_node="">
</span><p data-dcnode-id="2991"><b data-dcnode-id="2997"></b><b data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">Bud Averill’s Airport – </span></b><span data-dcnode-id="2994" instrument_node="">674 S. Vermont, Los Angeles. Phone DRexell 0843. Also called </span><b data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">Bud Averill’s Paradise Cafe</span></b></p><span data-dcnode-id="2990" instrument_node="">

</span><p data-dcnode-id="2950"><strong data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">Bulldog Café – </span></strong><span data-dcnode-id="2980" instrument_node="">1153 West Washington Boulevard. Opened 1928. Not to be confused with</span><br data-dcnode-id="2979"><span data-dcnode-id="2978" instrument_node="">
</span><strong data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">The Pup</span></strong><span data-dcnode-id="2975" instrument_node=""> at 12728 Washington Blvd, Venice</span><br data-dcnode-id="2974"><span data-dcnode-id="2973" instrument_node="">
From Gary Helsinger:</span><br data-dcnode-id="2972"><span data-dcnode-id="2971" instrument_node="">
1929 – The Pup (also originally called the Bulldog) built by Joseph Maddox at 5406 West Adams Blvd</span><br data-dcnode-id="2970"><span data-dcnode-id="2969" instrument_node="">
1931 – The Bulldog Cafe (with the pipe) built by Joseph’s son, Everett Maddox, at 1153 E. Valley Blvd, Rosemead</span><br data-dcnode-id="2968"><span data-dcnode-id="2967" instrument_node="">
1933-4 – The Pup was moved to 12718 W. Washington Blvd, Culver City</span><br data-dcnode-id="2966"><span data-dcnode-id="2965" instrument_node="">
1939-1940 – The Pup Cafe is photographed by Ansel Adam</span><br data-dcnode-id="2964"><span data-dcnode-id="2963" instrument_node="">
1940-1944 – The Bulldog is moved from Rosemead to 638 East Garvey Avenue, Monterey Park</span><br data-dcnode-id="2962"><span data-dcnode-id="2961" instrument_node="">
1948-1949 – The Bulldog is either moved out of Monterey Park or demolished</span><br data-dcnode-id="2960"><span data-dcnode-id="2959" instrument_node="">
1969 – The Pup Cafe, now Ugly Dog Records, appears in </span><em data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">West Magazine</span></em><span data-dcnode-id="2956" instrument_node=""> of the </span><em data-dcnode-id="2952"><span data-dcnode-id="2955" instrument_node="">Los Angeles Times</span><br data-dcnode-id="2954"><span data-dcnode-id="2953" instrument_node="">
</span></em><span data-dcnode-id="2951" instrument_node="">1969-1971 – The Pup Cafe is demolished</span></p><span data-dcnode-id="2949" instrument_node="">

54"><noscript data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">&lt;img data-attachment-id="6907" data-permalink="https://martinturnbull.com/2015/03/10/bulldog-cafe-1153-west-washington-blvd-los-angeles-opened-1928/bulldog-cafe-1153-west-washington-blvd-opened-1928-2/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2015/03/Bulldog-Cafe-1153-West-Washington-Blvd-opened-1928-2.png?fit=721%2C426&amp;amp;ssl=1" data-orig-size="721,426" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="Bulldog Cafe 1153 West Washington Blvd opened 1928 (2)" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2015/03/Bulldog-Cafe-1153-West-Washington-Blvd-opened-1928-2.png?fit=300%2C177&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2015/03/Bulldog-Cafe-1153-West-Washington-Blvd-opened-1928-2.png?fit=640%2C378&amp;amp;ssl=1" loading="lazy" class="aligncenter wp-image-6907" src="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2015/03/Bulldog-Cafe-1153-West-Washington-Blvd-opened-1928-2.png?resize=554%2C369&amp;#038;ssl=1" alt="Bulldog Café, 1153 West Washington Blvd, opened 1928" width="554" height="369" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="2944" instrument_node="">
</span><p data-dcnode-id="2940"><strong data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">Bullock’s Wilshire Department Store</span></strong><span data-dcnode-id="2941" instrument_node=""> – 3050 Wilshire Boulevard</span></p><span data-dcnode-id="2939" instrument_node="">
</span><p data-dcnode-id="2935"><span data-dcnode-id="2938" instrument_node="">Luxury department store opened on September 26th, 1929 by John G. Bullock (owner of the more mainstream Bullock’s in downtown L.A.) Closed in 1993. </span><a data-dcnode-id="2936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Bullocks_Wilshire"><span data-dcnode-id="2937" instrument_node="">http://en.wikipedia.org/wiki/Bullocks_Wilshire</span></a></p><span data-dcnode-id="2934" instrument_node="">
</span><p data-dcnode-id="2928"><span data-dcnode-id="2933" instrument_node="">See also book: “</span><a data-dcnode-id="2930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Bullocks-Wilshire-Margaret-Leslie-Davis/dp/0964311941/ref%3Dsr_1_1%3Fie%3DUTF8%26qid%3D1310157786%26sr%3D8-1" rel="noopener noreferrer" target="_blank" title="&quot;Bullocks Wilshire&quot; by Margaret Leslie Davis"><strong data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">Bullocks Wilshire</span></strong></a><span data-dcnode-id="2929" instrument_node="">” by Margaret Leslie Davis</span></p><span data-dcnode-id="2927" instrument_node="">
</span><p data-dcnode-id="2921"><span data-dcnode-id="2926" instrument_node="">See also: </span><strong data-dcnode-id="2923"><a data-dcnode-id="2924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bigorangelandmarks.blogspot.com/2007/08/no-56-bullocks-wilshire-building.html" rel="noopener noreferrer" target="_blank" title="Big Orange Landmarks blog"><span data-dcnode-id="2925" instrument_node="">Big Orange Landmarks</span></a></strong><span data-dcnode-id="2922" instrument_node=""> blog</span></p><span data-dcnode-id="2920" instrument_node="">
</span><p data-dcnode-id="2916"><strong data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">Bullock’s Wilshire Tea Room</span></strong><span data-dcnode-id="2917" instrument_node="">– Opened 1929, closed 02 APR 1993 – Located on top of the department store…Clark Gable and Carole Lombard were frequent shoppers… The dining area originally included a Tea Lounge, Club Room, two private dining rooms, one semi-private dining room and a Tea Patio. By the late 40s, the area was modified into the Tea Room and remained in place for 40-plus years. From opening day, fluffy coconut cream pie, baked daily, was a teatime specialty. At lunch, women shoppers favored sandwiches and dainty fair, including the Bombay Salad (mainly shrimp and crabs with a poppy seed dressing). During the run, the maitre d’ Humberto Lara became an institution. Pompadoured and polite, the dark suited man was the Tea Room’s ultimate greeter and hand-kisser for more than 30 years (49/25)</span></p><span data-dcnode-id="2915" instrument_node="">
</span><p data-dcnode-id="2910"><a data-dcnode-id="2911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/bwbuilding.jpg"><img alt="Bullock's Wilshire building" class="aligncenter wp-image-193 size-full jetpack-lazy-image" data-attachment-id="193" data-comments-opened="1" data-dcnode-id="2914" data-image-caption="<p>Bullock’s Wilshire building</p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;}" data-image-title="Bullock’s Wilshire building" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bwbuilding.jpg?fit=500%2C375&amp;ssl=1" data-lazy-sizes="(max-width: 500px) 100vw, 500px" data-lazy-src="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bwbuilding.jpg?resize=500%2C375&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bwbuilding.jpg?w=500&amp;ssl=1 500w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bwbuilding.jpg?resize=300%2C225&amp;ssl=1 300w" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bwbuilding.jpg?fit=300%2C225&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bwbuilding.jpg?fit=500%2C375&amp;ssl=1" data-orig-size="500,375" data-permalink="https://martinturnbull.com/hollywood-places/bwbuilding/" data-recalc-dims="1" height="375" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bwbuilding.jpg%3Fresize%3D500%252C375%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Bullock's Wilshire building" width="500"><noscript data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">&lt;img data-attachment-id="193" data-permalink="https://martinturnbull.com/hollywood-places/bwbuilding/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bwbuilding.jpg?fit=500%2C375&amp;amp;ssl=1" data-orig-size="500,375" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="Bullock&amp;#8217;s Wilshire building" data-image-description="" data-image-caption="&amp;lt;p&amp;gt;Bullock&amp;#8217;s Wilshire building&amp;lt;/p&amp;gt;
" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bwbuilding.jpg?fit=300%2C225&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bwbuilding.jpg?fit=500%2C375&amp;amp;ssl=1" loading="lazy" class="aligncenter wp-image-193 size-full" title="Bullock's Wilshire building" src="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bwbuilding.jpg?resize=500%2C375&amp;#038;ssl=1" alt="Bullock's Wilshire building" width="500" height="375" srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bwbuilding.jpg?w=500&amp;amp;ssl=1 500w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bwbuilding.jpg?resize=300%2C225&amp;amp;ssl=1 300w" sizes="(max-width: 500px) 100vw, 500px" data-recalc-dims="1" /&gt;</span></noscript></a></p><span data-dcnode-id="2909" instrument_node="">
</span><p data-dcnode-id="2905"><span data-dcnode-id="2908" instrument_node="">The buffet luncheon was 85 cents (in the 30s) There was also a table d’hote luncheon and a diet special for about the same price. By the way, this tea room is something you must be sure to visit. The desert motif is so very restful and the copper cactus on the window grating sets the tempo, which is so well carried out that even the slats on the Venetian blinds are painted alternately in pink and green and ivory to keep the decor! &nbsp;Even the vegetable plate is well-planned and will restore the good humor of the most unwilling dieter; grilled tomatoes, mushrooms, string beans, peas, asparagus, squash and celery – all of them delicious and you can do your duty by your stomach and enjoy yourself. There are such things as stuffed zucchini, cream cheese ring with assorted fruit, fresh strawberry dressing, and always orange bread and date and nut bread and cheese bread (ambrosial!) and a list of desserts to make one’s mouth water. Tuesdays there is a fashion luncheon at $1.25, which is slightly more than the usual $I.00 affair, or a salad special at 85 cents or thereabouts. Out in the Desert Lounge, are cannily displayed the most decorative baskets of stuffed fruits, and the show case is always filled with delectable cookies; little fancy cookies which tempt the weak sisters anew, as well they may, with their enticing shapes and nutty goodness. The fruit cake is one of the house specialties at $1.25 the pound, and is very gay with its top dressing of candied fruits. At the moment, they are featuring agar-agar candy, again for the diet-conscious, which sells for $1.00 a pound and is simply extraordinary – ask them to let you taste it, and you’re as good as sold. </span><a data-dcnode-id="2906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.armchair.com/warp/la30b.html"><span data-dcnode-id="2907" instrument_node="">http://www.armchair.com/warp/la30b.html</span></a></p><span data-dcnode-id="2904" instrument_node="">
</span><p data-dcnode-id="2902"><span data-dcnode-id="2903" instrument_node="">Bullock’s Department store was at 639-657 S. Broadway from 1906 to 1907 – then at 401-423 S. Broadway from 1912 to 1914 – then at 630 S. Hill</span></p><span data-dcnode-id="2901" instrument_node="">
</span><p data-dcnode-id="2883"><strong data-dcnode-id="2897"><span data-dcnode-id="2900" instrument_node="">Burbank Airport</span><br data-dcnode-id="2899"><span data-dcnode-id="2898" instrument_node="">

Lockheed Air Terminal – 1940 to 1967</span><br data-dcnode-id="2891"><span data-dcnode-id="2890" instrument_node="">
Hollywood-Burbank Airport – 1967 to 1978</span><br data-dcnode-id="2889"><span data-dcnode-id="2888" instrument_node="">
Burbank-Glendale-Pasadena Airport – 1978 to 2003</span><br data-dcnode-id="2887"><span data-dcnode-id="2886" instrument_node="">
Bob Hope Airport – 2003 to 2016</span><br data-dcnode-id="2885"><span data-dcnode-id="2884" instrument_node="">
Hollywood Burbank Airport – 2016 to present</span></p><span data-dcnode-id="2882" instrument_node="">

-id="4001" data-permalink="https://martinturnbull.com/hollywood-places/bublichki1/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bublichki1.jpg?fit=450%2C299&amp;amp;ssl=1" data-orig-size="450,299" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="Bublichki Russian restaurant" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bublichki1.jpg?fit=300%2C199&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bublichki1.jpg?fit=450%2C299&amp;amp;ssl=1" loading="lazy" class="aligncenter size-full wp-image-4001" src="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bublichki1.jpg?resize=450%2C299&amp;#038;ssl=1" alt="Bublichki Russian restaurant" width="450" height="299" srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bublichki1.jpg?w=450&amp;amp;ssl=1 450w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/bublichki1.jpg?resize=300%2C199&amp;amp;ssl=1 300w" sizes="(max-width: 450px) 100vw, 450px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="2855" instrument_node="">

</span><p data-dcnode-id="2843"><b data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">Cabana Room, 737 S. La Brea Ave</span></b><span data-dcnode-id="2844" instrument_node="">, just below Wilshire Boulevard – Phone YOrk 5296</span></p><span data-dcnode-id="2842" instrument_node="">
</span><p data-dcnode-id="2838"><strong data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">Café Angeleno</span></strong><span data-dcnode-id="2839" instrument_node=""> – 1657 N. Western Ave, Hollywood – Phone HO-0778, GL-9773</span></p><span data-dcnode-id="2837" instrument_node="">
</span><p data-dcnode-id="2833"><strong data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">Club Bali / Bali Restaurant</span></strong><span data-dcnode-id="2834" instrument_node=""> – 8804 Sunset Blvd. At the Bali nightclub the composer and singer Bruz Fletcher, whom the newspapers described as a favorite of nightclub-hopping film stars, entertained the cognoscenti with gay double entendres in songs such as “Bring Me A Lei from Hawaii”, “Keep an eye on His Business”, and “The Simple Things.” (60/44)</span></p><span data-dcnode-id="2832" instrument_node="">
</span><p data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">This is the building Mickey Cohen controlled later, where his haberdashery was and where the gunman blew the head off Mick’s bodyguard Hooky Rothman. (PTTS)</span></p><span data-dcnode-id="2829" instrument_node="">
</span><p data-dcnode-id="2824"><span data-dcnode-id="2828" instrument_node="">As listed in the ‘Los Angeles Guide, 1941’ : “</span><strong data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">Bali Restaurant</span></strong><span data-dcnode-id="2825" instrument_node=""> 8804 Sunset Boulevard. Dinner, no couvert, no minimum. Atmosphere in keeping with the name. Light, risqué entertainment. East Indian curry a specialty.”</span></p><span data-dcnode-id="2823" instrument_node="">
</span><p data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">From John Ponder: “Singer-songwriter Bruz Fletcher performed his innuendo-laced lounge act at Club Bali on the Strip for an extended engagement in the late 1930s. Considered part of the “Pansy Craze,” Fletcher’s satirical style would later become known as “camp.” Stars like Ronald Reagan, Humphrey Bogart and Louise Brooks — all of whom lived on Strip — often attended the show.” The proprietor was Icky Outhwaite, who later ran the Biltmore Hotel in Santa Barbara.</span></p><span data-dcnode-id="2820" instrument_node="">
</span><p data-dcnode-id="2816"><strong data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">Cafe Casino</span></strong><span data-dcnode-id="2817" instrument_node=""> – 425 S. Main St. As listed in the ‘Los Angeles Guide, 1941’ : Prices reasonable. Very ripe entertainment. Old-time burlesque with semi-nude girls.”</span></p><span data-dcnode-id="2815" instrument_node="">
</span><p data-dcnode-id="2806"><strong data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">Cafe Caliente</span></strong><span data-dcnode-id="2812" instrument_node=""> – Olvera Street, downtown Los Angeles – three floor shows, no cover, Dinner $1.00</span><br data-dcnode-id="2811"><span data-dcnode-id="2810" instrument_node="">
The image below is for two separate places. </span><strong data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">Monkey Island</span></strong><span data-dcnode-id="2807" instrument_node=""> was at 3300 Cahuenga Blvd, “2 minutes from Hollywood Bowl – 1000 monkeys running loose – no bars, no cages, no danger.”</span></p><span data-dcnode-id="2805" instrument_node="">

</span><p data-dcnode-id="2776"><strong data-dcnode-id="2781"><a data-dcnode-id="2783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/cafe-de-paree.png"><img alt="cafe de paree" class="size-medium wp-image-6377 aligncenter jetpack-lazy-image" data-attachment-id="6377" data-comments-opened="1" data-dcnode-id="2786" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="cafe de paree" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-de-paree.png?fit=640%2C437&amp;ssl=1" data-lazy-sizes="(max-width: 300px) 100vw, 300px" data-lazy-src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/cafe-de-paree-300x205.png?resize=300%2C205&amp;is-pending-load=1" data-lazy-srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-de-paree.png?resize=300%2C205&amp;ssl=1 300w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-de-paree.png?w=753&amp;ssl=1 753w" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-de-paree.png?fit=300%2C205&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-de-paree.png?fit=753%2C514&amp;ssl=1" data-orig-size="753,514" data-permalink="https://martinturnbull.com/hollywood-places/cafe-de-paree/" data-recalc-dims="1" height="205" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/cafe-de-paree-300x205.png%3Fresize%3D300%252C205&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="300"><noscript data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">&lt;img data-attachment-id="6377" data-permalink="https://martinturnbull.com/hollywood-places/cafe-de-paree/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-de-paree.png?fit=753%2C514&amp;amp;ssl=1" data-orig-size="753,514" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="cafe de paree" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-de-paree.png?fit=300%2C205&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-de-paree.png?fit=640%2C437&amp;amp;ssl=1" loading="lazy" class="size-medium wp-image-6377 aligncenter" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/cafe-de-paree-300x205.png?resize=300%2C205" alt="cafe de paree" width="300" height="205" srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-de-paree.png?resize=300%2C205&amp;amp;ssl=1 300w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-de-paree.png?w=753&amp;amp;ssl=1 753w" sizes="(max-width: 300px) 100vw, 300px" data-recalc-dims="1" /&gt;</span></noscript></a><span data-dcnode-id="2782" instrument_node="">Café de Paree</span></strong><span data-dcnode-id="2780" instrument_node=""> – 2312 West 7</span><sup data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">th</span></sup><span data-dcnode-id="2777" instrument_node=""> St, Los Angeles. Dine and dance. Musical revues. Private banquet rooms.</span></p><span data-dcnode-id="2775" instrument_node="">
</span><p data-dcnode-id="2771"><strong data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">Café de Paris – </span></strong><span data-dcnode-id="2772" instrument_node="">Ocean Front – “opposite the bath house” – Venice, CA</span></p><span data-dcnode-id="2770" instrument_node="">
</span><p data-dcnode-id="2766"><strong data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">Café Gala </span></strong><span data-dcnode-id="2767" instrument_node="">– 8796 Sunset Boulevard -sat on the Sunset Strip where Spago stood until 2001, was opened in 1939 by Baroness Catherine d’ Erlinger, “a titled Englishwoman with bohemian tastes and the case to exercise them.” Like the “pansy clubs”, attracted the Hollywood’s smart set regardless of sexuality. It was treated no differently than other clubs by the gossip columnists. Café Gala, says Mann, “epitomizes both the social scene and the status of homosexuals within the industry of immediate post-Code Hollywood. With a veneer of ‘respectability’ – a façade that could not be overly identified as ‘queer’ or ‘deviant’ – both the Gala and the gays within the studio structure could thrive.”</span></p><span data-dcnode-id="2765" instrument_node="">
</span><p data-dcnode-id="2760"><span data-dcnode-id="2764" instrument_node="">That’s as apt a description if ever there was one of </span><strong data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">Café Gala</span></strong><span data-dcnode-id="2761" instrument_node="">, perhaps the most famous of the post-Code gay nightspots in Hollywood. “Not that it advertised itself as a gay bar or even had an exclusively gay patronage,” said David Hanna, “but a gay bar it essentially was.” (10/147) Located on Sunset on the site late occupied by Spago Café, Café Gala was opened in 1939 b the Baroness Catherine d’Erlanger. (10/148)</span></p><span data-dcnode-id="2759" instrument_node="">
</span><p data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">While the Gala’s bar area catered to gay men, a well-enforced dress code and other general rules of decorum engineered by John Walsh (the constant companion of Gala’s owner) – everyone had to face front, and physical contact beyond a handshake was verboten. (11/39)</span></p><span data-dcnode-id="2756" instrument_node="">
</span><p data-dcnode-id="2750"><a data-dcnode-id="2752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-matchbook.jpg"><img alt="cafe gala matchbook" class="size-full wp-image-5251 aligncenter jetpack-lazy-image" data-attachment-id="5251" data-comments-opened="1" data-dcnode-id="2755" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;}" data-image-title="cafe gala matchbook" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-matchbook.jpg?fit=223%2C640&amp;ssl=1" data-lazy-src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-matchbook.jpg?resize=223%2C640&amp;is-pending-load=1" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-matchbook.jpg?fit=104%2C300&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-matchbook.jpg?fit=223%2C640&amp;ssl=1" data-orig-size="223,640" data-permalink="https://martinturnbull.com/hollywood-places/cafe-gala-matchbook/" data-recalc-dims="1" height="640" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-matchbook.jpg%3Fresize%3D223%252C640&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="223"><noscript data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">&lt;img data-attachment-id="5251" data-permalink="https://martinturnbull.com/hollywood-places/cafe-gala-matchbook/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-matchbook.jpg?fit=223%2C640&amp;amp;ssl=1" data-orig-size="223,640" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="cafe gala matchbook" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-matchbook.jpg?fit=104%2C300&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-matchbook.jpg?fit=223%2C640&amp;amp;ssl=1" loading="lazy" class="size-full wp-image-5251 aligncenter" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-matchbook.jpg?resize=223%2C640" alt="cafe gala matchbook" width="223" height="640" data-recalc-dims="1" /&gt;</span></noscript></a><span data-dcnode-id="2751" instrument_node="">…the swankiest, gay-upholstered saloon on the Coast…a “very chic” bar with a “startling view of the city lights twinkling below” … It has the obvious touch of a décor called “early homosexual.” … Incidentally, three of the Hollywood columnists are not the marrying kind. (45/58)</span></p><span data-dcnode-id="2749" instrument_node="">
</span><p data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">The most popular of the late 1930s clubs was the Baroness Catherine d’Erlanger’s “Café Gala, which was also called, in the language of the Yiddish humor, the “Ca-fegaleh”. Beverly Alber, a singer at the Gala, remembers it as “a marvelous gay supper club where straights came to see the entertainment”. (60/47)</span></p><span data-dcnode-id="2746" instrument_node="">
</span><p data-dcnode-id="2741"><a data-dcnode-id="2742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-dorothy-dandridge.png"><img alt="cafe gala dorothy dandridge" class="size-medium wp-image-8092 aligncenter jetpack-lazy-image" data-attachment-id="8092" data-comments-opened="1" data-dcnode-id="2745" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="cafe gala dorothy dandridge" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-dorothy-dandridge.png?fit=390%2C530&amp;ssl=1" data-lazy-sizes="(max-width: 221px) 100vw, 221px" data-lazy-src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-dorothy-dandridge-221x300.png?resize=221%2C300&amp;is-pending-load=1" data-lazy-srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-dorothy-dandridge.png?resize=221%2C300&amp;ssl=1 221w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-dorothy-dandridge.png?w=390&amp;ssl=1 390w" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-dorothy-dandridge.png?fit=221%2C300&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-dorothy-dandridge.png?fit=390%2C530&amp;ssl=1" data-orig-size="390,530" data-permalink="https://martinturnbull.com/hollywood-places/cafe-gala-dorothy-dandridge/" data-recalc-dims="1" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-dorothy-dandridge-221x300.png%3Fresize%3D221%252C300&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="221"><noscript data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">&lt;img data-attachment-id="8092" data-permalink="https://martinturnbull.com/hollywood-places/cafe-gala-dorothy-dandridge/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-dorothy-dandridge.png?fit=390%2C530&amp;amp;ssl=1" data-orig-size="390,530" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="cafe gala dorothy dandridge" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-dorothy-dandridge.png?fit=221%2C300&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-dorothy-dandridge.png?fit=390%2C530&amp;amp;ssl=1" loading="lazy" class="size-medium wp-image-8092 aligncenter" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-dorothy-dandridge-221x300.png?resize=221%2C300" alt="cafe gala dorothy dandridge" width="221" height="300" srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-dorothy-dandridge.png?resize=221%2C300&amp;amp;ssl=1 221w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cafe-gala-dorothy-dandridge.png?w=390&amp;amp;ssl=1 390w" sizes="(max-width: 221px) 100vw, 221px" data-recalc-dims="1" /&gt;</span></noscript></a></p><span data-dcnode-id="2740" instrument_node="">
</span><p data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">When nutritionist Gaylord Hauser could talk Greta Garbo into a night on the town, the Café Gala was their favorite spot. .. In June of 1948 the Café Gala closed. (63/24-25)</span></p><span data-dcnode-id="2737" instrument_node="">
</span><p data-dcnode-id="2733"><span data-dcnode-id="2736" instrument_node="">Another significant bar of the 1940s was Café Gala on the Sunset Strip. Created outside the “pansy” model, it survived the frequent crackdowns to stand out large in the nightclub and cabaret history of Los Angeles. Owned by the Baroness Catherine d’Erlanger and featuring gay singer Johnny Walsh, the nightclub attracted gay and lesbian stars and other Hollywood notables, who could drop in without fear of being caught up in a raid. Cole Porter and Judy Garland were among its patrons. </span><a data-dcnode-id="2734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.glbtq.com/social-sciences/los_angeles%2C4.html"><span data-dcnode-id="2735" instrument_node="">http://www.glbtq.com/social-sciences/los_angeles,4.html</span></a></p><span data-dcnode-id="2732" instrument_node="">
</span><p data-dcnode-id="2728"><a data-dcnode-id="2730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wehostar.com/2008/12/29/january-1927-allah-nazimovas-grand-opening-party-for-the-garden-of-allah-hotel/"><span data-dcnode-id="2731" instrument_node="">http://www.wehostar.com/2008/12/29/january-1927-allah-nazimovas-grand-opening-party-for-the-garden-of-allah-hotel/</span></a><span data-dcnode-id="2729" instrument_node=""> says it was Judy Garland’s favorite gay bar.</span></p><span data-dcnode-id="2727" instrument_node="">
</span><p data-dcnode-id="2723"><span data-dcnode-id="2726" instrument_node="">See also a description of Café Gala and Johnny Walsh, the guy who ran it, in </span><a data-dcnode-id="2724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.queermusicheritage.us/may2010h.html"><span data-dcnode-id="2725" instrument_node="">http://www.queermusicheritage.us/may2010h.html </span></a></p><span data-dcnode-id="2722" instrument_node="">

</span><p data-dcnode-id="2683"><strong data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">Café La Maze</span></strong><span data-dcnode-id="2684" instrument_node=""> – 9039 Sunset Blvd. Opened 1938 by Marcel Lamaze. Was also a popular restaurant where once a week Jimmy Cagney, Spencer Tracy and Pat O’Brien dined together. (1/80) (40/161, 179)</span></p><span data-dcnode-id="2682" instrument_node="">
</span><p data-dcnode-id="2674"><span data-dcnode-id="2681" instrument_node="">It was later </span><strong data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">Sherry’s</span></strong><span data-dcnode-id="2678" instrument_node="">, where Mickey Cohen was ambushed. (Was also briefly the LA version of </span><strong data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">Dave’s Blue Room</span></strong><span data-dcnode-id="2675" instrument_node=""> — it was there that Shirley Temple met Mickey Cohen). Much later it was Gazzarri’s and then was red tagged in Northridge, demolished and the Key Club.</span></p><span data-dcnode-id="2673" instrument_node="">
</span><p data-dcnode-id="2668"><a data-dcnode-id="2669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Exterior-view-of-the-Cafe-Lamaze-restaurant-West-Hollywood-1937.png"><img alt="Exterior view of the Cafe Lamaze restaurant, West Hollywood, 1937" class="wp-image-4810 aligncenter jetpack-lazy-image" data-attachment-id="4810" data-comments-opened="1" data-dcnode-id="2672" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;}" data-image-title="Exterior view of the Cafe Lamaze restaurant, West Hollywood, 1937" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Exterior-view-of-the-Cafe-Lamaze-restaurant-West-Hollywood-1937.png?fit=640%2C407&amp;ssl=1" data-lazy-src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Exterior-view-of-the-Cafe-Lamaze-restaurant-West-Hollywood-1937.png?resize=479%2C343&amp;is-pending-load=1" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Exterior-view-of-the-Cafe-Lamaze-restaurant-West-Hollywood-1937.png?fit=300%2C190&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Exterior-view-of-the-Cafe-Lamaze-restaurant-West-Hollywood-1937.png?fit=721%2C458&amp;ssl=1" data-orig-size="721,458" data-permalink="https://martinturnbull.com/hollywood-places/exterior-view-of-the-cafe-lamaze-restaurant-west-hollywood-1937/" data-recalc-dims="1" height="343" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Exterior-view-of-the-Cafe-Lamaze-restaurant-West-Hollywood-1937.png%3Fresize%3D479%252C343&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="479"><noscript data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">&lt;img data-attachment-id="4810" data-permalink="https://martinturnbull.com/hollywood-places/exterior-view-of-the-cafe-lamaze-restaurant-west-hollywood-1937/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Exterior-view-of-the-Cafe-Lamaze-restaurant-West-Hollywood-1937.png?fit=721%2C458&amp;amp;ssl=1" data-orig-size="721,458" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="Exterior view of the Cafe Lamaze restaurant, West Hollywood, 1937" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Exterior-view-of-the-Cafe-Lamaze-restaurant-West-Hollywood-1937.png?fit=300%2C190&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Exterior-view-of-the-Cafe-Lamaze-restaurant-West-Hollywood-1937.png?fit=640%2C407&amp;amp;ssl=1" loading="lazy" class="wp-image-4810 aligncenter" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Exterior-view-of-the-Cafe-Lamaze-restaurant-West-Hollywood-1937.png?resize=479%2C343" alt="Exterior view of the Cafe Lamaze restaurant, West Hollywood, 1937" width="479" height="343" data-recalc-dims="1" /&gt;</span></noscript></a></p><span data-dcnode-id="2667" instrument_node="">
</span><p data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">Jon Ponder: LaMaze is a very interesting fella, and a major player on the Strip. He ran the Clover Club, Club Seville (the club in the building before it became Ciro’s). He was the maitre d’ at the Earl Carroll Theatre before Herman Hover stole him away to run Ciro’s. That relationship ended after the fire when LaMaze went back to the Earl Carroll. Also opened in Mexico later, I think. He lived on the Strip in the Hacienda Park Apts. next door to Ciro’s. PIazza del Sol now.</span></p><span data-dcnode-id="2664" instrument_node="">
</span><p data-dcnode-id="2659"><span data-dcnode-id="2663" instrument_node="">As listed in the ‘Los Angeles Guide, 1941’ : “</span><strong data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">Café LaMaze</span></strong><span data-dcnode-id="2660" instrument_node=""> 9039 Sunset Boulevard. Dinner. Dancing to name bands. Special entertainment. Separate bar.”</span></p><span data-dcnode-id="2658" instrument_node="">
