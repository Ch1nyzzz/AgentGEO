</span><p data-dcnode-id="2617"><strong data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">Cafe Mart – </span></strong><span data-dcnode-id="2621" instrument_node="">8670 Wilshire Blvd., Los Angeles. Phone BR-24994 (Was also </span><strong data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">Café Italia</span></strong><span data-dcnode-id="2618" instrument_node="">)</span></p><span data-dcnode-id="2616" instrument_node="">
</span><p data-dcnode-id="2612"><strong data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Cafe Martan</span></strong><span data-dcnode-id="2613" instrument_node="">, 214 W. 1st Street, downtown Los Angeles. French and Italian dinners.</span></p><span data-dcnode-id="2611" instrument_node="">
</span><p data-dcnode-id="2605"><strong data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">Café Nat Goodwin</span></strong><span data-dcnode-id="2608" instrument_node=""> – built on a private pier in Santa Monica. Popular during the silent movies era. (16/77) (40/16) Later became the Sunset Inn when Baron Long bought it with Paul Schenk. </span><a data-dcnode-id="2606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.latimemachines.com/new_page_23.htm"><span data-dcnode-id="2607" instrument_node="">http://www.latimemachines.com/new_page_23.htm</span></a></p><span data-dcnode-id="2604" instrument_node="">
</span><p data-dcnode-id="2599"><a data-dcnode-id="2600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/nat-goodwin-cafe-2.jpg"><img alt="Café Nat Goodwin – built on a private pier in Santa Monica" class="size-full wp-image-3437 aligncenter jetpack-lazy-image" data-attachment-id="3437" data-comments-opened="1" data-dcnode-id="2603" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;}" data-image-title="nat-goodwin-cafe-2" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/nat-goodwin-cafe-2.jpg?fit=640%2C394&amp;ssl=1" data-lazy-src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/nat-goodwin-cafe-2.jpg?resize=419%2C328&amp;is-pending-load=1" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/nat-goodwin-cafe-2.jpg?fit=300%2C184&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/nat-goodwin-cafe-2.jpg?fit=813%2C500&amp;ssl=1" data-orig-size="813,500" data-permalink="https://martinturnbull.com/hollywood-places/nat-goodwin-cafe-2/" data-recalc-dims="1" height="328" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/nat-goodwin-cafe-2.jpg%3Fresize%3D419%252C328&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="border: 1px solid black;" title="Café Nat Goodwin – built on a private pier in Santa Monica" width="419"><noscript data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">&lt;img data-attachment-id="3437" data-permalink="https://martinturnbull.com/hollywood-places/nat-goodwin-cafe-2/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/nat-goodwin-cafe-2.jpg?fit=813%2C500&amp;amp;ssl=1" data-orig-size="813,500" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="nat-goodwin-cafe-2" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/nat-goodwin-cafe-2.jpg?fit=300%2C184&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/nat-goodwin-cafe-2.jpg?fit=640%2C394&amp;amp;ssl=1" loading="lazy" class="size-full wp-image-3437 aligncenter" style="border: 1px solid black;" title="Café Nat Goodwin – built on a private pier in Santa Monica" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/nat-goodwin-cafe-2.jpg?resize=419%2C328" alt="Café Nat Goodwin – built on a private pier in Santa Monica" width="419" height="328" data-recalc-dims="1" /&gt;</span></noscript></a></p><span data-dcnode-id="2598" instrument_node="">
</span><p data-dcnode-id="2594"><strong data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">Café Oblath’s</span></strong><span data-dcnode-id="2595" instrument_node=""> – 723 N. Bronson Ave., Hollywood, opposite Paramount, served as sort of an off-lot commissary serving movie stars and moguls for half a century.</span></p><span data-dcnode-id="2593" instrument_node="">
</span><p data-dcnode-id="2588"><span data-dcnode-id="2592" instrument_node="">Susan M: “Oblaths was there for so long, it’s menu changed a little bit over time. I can remember either during or right after the war, they started to serve a few Mexican dishes, but they were pretty tame ones, like an enchilada plate. But then they had the old Spaghetti plate, Spaghetti size and a few things served with sides of Spaghetti – but neither were ‘real’ Mex or ‘real Italian. I seem to remember it having hot lunches that were popular with many like turkey, chopped veal, chicken fried steak, meatloaf and those kind of things. Can’t recall if those were more like a special of the day or not. At some point Oblath’s was calling itself </span><strong data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">Oblath’s Cafe. </span></strong><span data-dcnode-id="2589" instrument_node="">I think by the 50s, most folks just called it Oblath’s with no Cafe or Studio Cafe tacked onto it.”</span></p><span data-dcnode-id="2587" instrument_node="">
</span><p data-dcnode-id="2583"><strong data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">Café Swiss</span></strong><span data-dcnode-id="2584" instrument_node=""> 450 N. Rodeo Dr. Opened in 1950 (closed 1985) when Rodeo Drive was still a sleepy neighborhood shopping district. Beverly Hills’s only chalet, it became a lunchtime sanctuary for stars and execs of nearby MGM and 20th Century Fox. Gained a liquor license in 1955 (when the Swiss born owners became American citizens), and by the 60s it became a mecca for the town’s composers, lyricists and arrangers. Continental/American cuisine with some typical Swiss dishes.&nbsp;&nbsp;&nbsp; (49/65)</span></p><span data-dcnode-id="2582" instrument_node="">
</span><p data-dcnode-id="2575"><strong data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Café Trocadero</span></strong><span data-dcnode-id="2579" instrument_node=""> – 8610 Sunset Blvd. Opened 18SEP1934 by Billy Wilkerson, owner of </span><em data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">The Hollywood Reporter</span></em><span data-dcnode-id="2576" instrument_node="">, opened it in a renovated warehouse where he used to store his alcohol after the repeal of Prohibition. This was a black tie, French inspired nightclub. Sunday was audition night were unknowns could perform hoping to be discovered. A premiere party for GWTW was held here. (16/82)When Prohibition was repealed, Wilkerson began storing the wine and spirits he was importing in an abandoned building that had once been a speakeasy on the Sunset Strip. Eventually he hit on the idea of opening the place as a nightclub, borrowed some money, remodeled the place and named it the Trocadero at 8610 Sunset Boulevard which he opened in SEP’34. And then had the guts to claim it was sold out for the weeks until it became a hot destination.</span></p><span data-dcnode-id="2574" instrument_node="">
</span><p data-dcnode-id="2569"><a data-dcnode-id="2570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/trocadero.jpg"><img alt="Cafe Trocadero" class="aligncenter wp-image-195 size-full jetpack-lazy-image" data-attachment-id="195" data-comments-opened="1" data-dcnode-id="2573" data-image-caption="<p>Cafe Trocadero</p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;}" data-image-title="Cafe Trocadero" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/trocadero.jpg?fit=400%2C265&amp;ssl=1" data-lazy-sizes="(max-width: 400px) 100vw, 400px" data-lazy-src="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/trocadero.jpg?resize=400%2C265&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/trocadero.jpg?w=400&amp;ssl=1 400w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/trocadero.jpg?resize=300%2C198&amp;ssl=1 300w" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/trocadero.jpg?fit=300%2C198&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/trocadero.jpg?fit=400%2C265&amp;ssl=1" data-orig-size="400,265" data-permalink="https://martinturnbull.com/hollywood-places/trocadero/" data-recalc-dims="1" height="265" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/trocadero.jpg%3Fresize%3D400%252C265%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Cafe Trocadero" width="400"><noscript data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">&lt;img data-attachment-id="195" data-permalink="https://martinturnbull.com/hollywood-places/trocadero/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/trocadero.jpg?fit=400%2C265&amp;amp;ssl=1" data-orig-size="400,265" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="Cafe Trocadero" data-image-description="" data-image-caption="&amp;lt;p&amp;gt;Cafe Trocadero&amp;lt;/p&amp;gt;
" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/trocadero.jpg?fit=300%2C198&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/trocadero.jpg?fit=400%2C265&amp;amp;ssl=1" loading="lazy" class="aligncenter wp-image-195 size-full" title="Cafe Trocadero" src="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/trocadero.jpg?resize=400%2C265&amp;#038;ssl=1" alt="Cafe Trocadero" width="400" height="265" srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/trocadero.jpg?w=400&amp;amp;ssl=1 400w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/trocadero.jpg?resize=300%2C198&amp;amp;ssl=1 300w" sizes="(max-width: 400px) 100vw, 400px" data-recalc-dims="1" /&gt;</span></noscript></a></p><span data-dcnode-id="2568" instrument_node="">
</span><p data-dcnode-id="2563"><span data-dcnode-id="2567" instrument_node="">Designed by famed designer Harold Grieve, decorator to the stars. Opened with a private party for Myron Selznick but nobody came until Wilkerson put out a velvet rope and shut the doors creating an aura of desirability. Later he opened a downstairs bar and barred photographers and members of the press after a complaint by Normal Shearer bemoaned the fact that stars had nowhere to go which was private. The club intro’d al fresco dining to Los Angeles. It also innovated with Sunday Night Auditions where studio agents might view new talent. According to one report, Louis B. Mayer found 14yo Judy Garland there. Wilkerson sold the club in 1938 after which it was owned by gangsters Bugsy Siegel and Mickey Cohen. </span><a data-dcnode-id="2565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nfo.net/usa/niteclub.htm"><span data-dcnode-id="2566" instrument_node="">http://nfo.net/usa/niteclub.htm</span></a><span data-dcnode-id="2564" instrument_node="">&nbsp;&nbsp;&nbsp; Photo: 28/73, 40/99</span></p><span data-dcnode-id="2562" instrument_node="">
</span><p data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">…by the late 30s it was a popular place for dining and dancing. You could reckon on seeing at least half a dozen stars on any given night. The food was very expensive and not very good. (31/77)</span></p><span data-dcnode-id="2559" instrument_node="">
</span><p data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">The Trocadero thrived in 1936 &amp; 1937 (1/80) By 1937, the Troc had become THE place. (8/89) – not only for the array of talent but because of Los Angeles’s dated Blue Laws which prohibited dancing within the city limits on the Sabbath. (40/106)</span></p><span data-dcnode-id="2556" instrument_node="">
</span><p data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">Newcomers competed in the Troc’s Sunday night amateur hours; one winner was Jackie Gleason; another Judy Garland. (8/88)</span></p><span data-dcnode-id="2553" instrument_node="">
</span><p data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">Little Troc on Sunset where Mary Martin and Lena Horne appeared early in their careers.</span></p><span data-dcnode-id="2550" instrument_node="">
</span><p data-dcnode-id="2545"><span data-dcnode-id="2549" instrument_node="">Into this mix came, in 1930, one of Hollywood’s legendary entrepreneurs: </span><strong data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">Billy Wilkerson</span></strong><span data-dcnode-id="2546" instrument_node="">. Wilkerson was the founder of the first Hollywood-based trade paper, THE HOLLYWOOD REPORTER. By 1936, Wilkerson’s business was based at 6715 Sunset Boulevard. This building still stands, a monument to the Deco Moderne style of architecture, although the original tenant, THE HOLLYWOOD REPORTER, has moved its offices to Wilshire</span></p><span data-dcnode-id="2544" instrument_node="">
</span><p data-dcnode-id="2536"><span data-dcnode-id="2543" instrument_node="">Boulevard Wilkerson, like many others who imported themselves to California (in his case from Nashville, Tennessee) had certain insights about the movie business that the natives lacked, insights that only someone who had started out as audience could have. Wilkerson knew that the movie business lived on publicity, and that the best bid was planned by publicists and studio bosses. These people created many a “romance” that fans read about in the magazines and gossip columns, and where better to send the stars on these arranged dates than to a studio- friendly nightspot? Billy Wilkerson created nightclubs that were in a way extensions of the sets where the stars worked by day; here, they could take their studio-sponsored dates at night and know that the result would be great photos and only favorable mentions in the press.The </span><strong data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">Trocadero,</span></strong><span data-dcnode-id="2540" instrument_node=""> the first of Wilkerson’s clubs, opened in 1934 at 8610 Sunset, the south-east edge of Sunset Plaza. Its interior decor included hand-painted murals of the Paris skyline, and the club became an immediate hit with the Hollywood crowd. Because of Wilkerson’s relationships with many of Hollywood’s publicists, an evening at the Troc was a guarantee of a photo or a nice mention in the columns for any recognized film personality. Best of all, the Troc fast became a place where “audience” wanted to go for a night on the town. The Los Angeles social set and tourists from around the world could dine at the next table or bump up against their film favorites on the dance floor. These civilian patrons had no clue that the club had been established as a publicity mill, and they didn’t care. Then as now, getting THAT close to a movie star can provide a real thrill.The enterprising Mr. Wilkerson had something at the Troc for everyone in Hollywood. On Saturday nights, the back room was home to high stakes card games that should have had a sign on the door: ‘MOGULS ONLY’.Regulars at the game included </span><strong data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">Sam Goldwyn</span></strong><span data-dcnode-id="2537" instrument_node="">, Darryl Zanuck (20th Century Fox), Irving Thalberg (MGM) and Carl Laemmle (Universal Studios). Wilkerson himself was a heavy gambler; as well as the games at the Troc, he opened a casino and hotel (the Arrowhead Springs) at a popular mountain resort. The Trocadero remained popular for many years, although Billy Wilkerson sold it in 1937. The building was put to other uses, and stood until 1963.</span></p><span data-dcnode-id="2535" instrument_node="">
</span><p data-dcnode-id="2532"><a data-dcnode-id="2533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sunsetstrip.com/history/3.html"><span data-dcnode-id="2534" instrument_node="">http://www.sunsetstrip.com/history/3.html</span></a></p><span data-dcnode-id="2531" instrument_node="">
</span><p data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">Was built on the site of La Boheme. (40/62) (40/99) Formal dinner dance opening gala started at 8pm and cost a hefty $8.50 per person. (40/105) The Trocadero’s phone number was Hollywood 1666</span></p><span data-dcnode-id="2528" instrument_node="">
</span><p data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">According to 10/145, the house specialty drink was the Trocadero Cooler which was 75 cents (in 1936). The Trocadero is divided into two parts, the street floor, or café proper, and the Cellar. Swank hold forth upstairs, good fellowship down. Upstairs decorations feature plain cream walls with a touch of gold in the moldings and beautiful light fixtures. The Cellar…has walls paneled in stained oak and wooden ceiling with the graining set in oblique pattern. The bar itself is of gleaming, highly polished copper. Drinks run from 60 cents to $1.5</span></p><span data-dcnode-id="2525" instrument_node="">
</span><p data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">1938 – Wilkerson pulled out of the Trocadero but despite a facelift and new management and a reopening on 18MAY38 failed to rekindle the Wilkerson touch. (40/165)</span></p><div class="mailmunch-forms-in-post-middle" data-dcnode-id="2522" style="display: none !important;"></div><span data-dcnode-id="2521" instrument_node="">
</span><p data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">See also 61/69</span></p><span data-dcnode-id="2518" instrument_node="">
</span><p data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">By the MID-40s, the Trocadero was welcoming black acts, like the Nat King Cole Trio and Benny Carter’s orchestra. (82/57)</span></p><span data-dcnode-id="2515" instrument_node="">
</span><p data-dcnode-id="2511"><a data-dcnode-id="2513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.filmsofthegoldenage.com/foga/1996/winter/hollywoodhotspots.shtml"><span data-dcnode-id="2514" instrument_node="">http://www.filmsofthegoldenage.com/foga/1996/winter/hollywoodhotspots.shtml</span></a><span data-dcnode-id="2512" instrument_node=""> says Back in the days when the Sunset Strip was still a dirt road, this was the site of the La Boheme Cafe. It was run by a flamboyant drag queen named Karyl Norman, who delighted his patrons with his impressions of the top female stars of the day. The hit number in his repertoire was a wicked rendition of Joan Crawford playing Sadie Thompson — it always brought down the house and even floored Crawford herself. La Boheme was a favorite destination for Hollywood “slumming” parties until it was shut down for liquor violations in 1932.</span></p><span data-dcnode-id="2510" instrument_node="">
</span><p data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">Enter Billy Wilkerson, whose first restaurant, the Vendome, was already a popular lunch spot. He bought La Boheme and hired famed designer Harold Grieve to turn the folksy Colonial-style building into an elegant French cafe. The result, the Trocadero, became the crown jewel of ’30s’ nightspots.</span></p><span data-dcnode-id="2507" instrument_node="">
</span><p data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">The Troc was inaugurated on September 17, 1934, with a luxurious private party for agent Myron Selznick, and throughout the decade it had the loudest jazz, the best food and drink, and the juiciest gossip to be found in Tinseltown. Since an appearance at the Troc was bound to be written up in Wilkerson’s trade sheet, the Hollywood Reporter, all the brightest stars came here to see and be seen. Photographers had a field day as celebrities regaled themselves in the exquisite cream and gold dining room or lounged on the rear balcony, which afforded a dazzling view of the city lights below. Those wishing to unwind away from the spotlight could repair to the downstairs bar, which was supposed to be barred to the press. The wily Wilkerson, however, always had a spy there to catch whatever tidbits fell from booze-loosened tongues.</span></p><span data-dcnode-id="2504" instrument_node="">
</span><p data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">Originally open only for dinner, the Troc later took on the lunch crowd with its Sidewalk Cafe, which introduced the now-ubiquitous concept of al fresco dining to Los Angeles. Another innovation was the club’s Sunday Night Auditions, which the studios used to showcase up-and-coming talent. It was at one of these auditions that Louis B. Mayer realized he had a find in 14-year-old Judy Garland, and Deanna Durbin, Rita Hayworth, Nat King Cole, Jackie Gleason, Martha Raye, Phil Silvers, and Mary Martin all got valuable exposure in this manner. For a glimpse of what the Troc was like during those heady times, check out the 1937 version of A Star Is Born, which was partially shot here. The film’s director, William Wellman, must have had mixed feelings about the location. While drinking at the Troc some months earlier, he made a disparaging remark about Loretta Young and was promptly flattened by her pal, Spencer Tracy.</span></p><span data-dcnode-id="2501" instrument_node="">
</span><p data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">The Troc lost a lot of its luster after Wilkerson sold it in 1938. Underworld figures like Bugsy Siegel and Mickey Cohen began to populate the place, and in 1940 it was raided twice for hosting illegal gambling. The famous didn’t need that kind of publicity and moved on to other nightspots. In 1944, the club produced the low-budget musical Trocadero in an attempt to restore its image; watching this dreary film today, one imagines it didn’t help. After another change of ownership, the Troc closed in 1946.</span></p><span data-dcnode-id="2498" instrument_node="">
</span><p data-dcnode-id="2494"><span data-dcnode-id="2497" instrument_node="">From </span><a data-dcnode-id="2495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hollywoodphotographs.com/category/114-1/trocadero-cafe/"><span data-dcnode-id="2496" instrument_node="">http://www.hollywoodphotographs.com/category/114-1/trocadero-cafe/</span></a></p><span data-dcnode-id="2493" instrument_node="">
</span><p data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">In late 1936, Cafe Trocadero was completely remodeled to the delight of its many patrons. Apparently, for some reason, Wilkerson wanted to sell the Troc but as of August 1937, there were no buyers. In late 1937 or early 1938, Wilkerson, whose Hollywood Reporter offices were just west of the new entertainment area, pulled out stakes from the Trocadero. Felix Young, at some point, became involved with the Trocadero, either as a manager or part owner (probably the later). Shortly thereafter, Wilkerson began work on developing a new nightclub, down the street, which he opened in January, 1940 as Ciro’s.</span></p><span data-dcnode-id="2490" instrument_node="">
</span><p data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">The Trocadero began to lose the dominance it had held on the Sunset Strip virtually since opening. Felix Young was the sole owner and continued to run the famous nightclub. Beginning in mid-1939, Young began discussions with the landlord, Chateau Sunset Corp., to renegotiate the lease. When negotiations broke down, Young closed the nightclub on the morning of Saturday, October 7, 1939 and ordered the secretaries to telephone his decision to 400 persons who had reservations for that evening. Young said, “Until my contract is clarified to my satisfaction, The Troc will remain dark.” Three days later, The Trocadero was thrown into involuntary bankruptcy by three creditors. In mid-May, 1940, the Cafe Trocadero’s furniture and fittings were auctioned off to satisfy the creditors’ claims. Even the name “Cafe Trocadero, was for sale.</span></p><span data-dcnode-id="2487" instrument_node="">
</span><p data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">Several months later the nightclub was reopened, under new management, who renamed the simply “Trocadero”. Over the course of the next few years, the nightclub had some degree of success but was now competing with such nightclubs as Ciro’s. During the mid-1940, the club’s liquor license was suspended a couple of times, due to various violations. Finally, in 1947, the Trocadero closed its doors, for good.</span></p><span data-dcnode-id="2484" instrument_node="">

/carls-drive-in1.png%3Fresize%3D640%252C461&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="border: 1px solid black;" title="Carl’s Drive-in, at the corner of Flower and Figueroa, downtown L.A." width="640"><noscript data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">&lt;img data-attachment-id="4031" data-permalink="https://martinturnbull.com/hollywood-places/carls-drive-in-2/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/carls-drive-in1.png?fit=729%2C525&amp;amp;ssl=1" data-orig-size="729,525" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="carls drive in" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/carls-drive-in1.png?fit=300%2C216&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/carls-drive-in1.png?fit=640%2C461&amp;amp;ssl=1" loading="lazy" class="aligncenter wp-image-4031" style="border: 1px solid black;" title="Carl’s Drive-in, at the corner of Flower and Figueroa, downtown L.A." src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/carls-drive-in1.png?resize=640%2C461" alt="Carl’s Drive-in, at the corner of Flower and Figueroa, downtown L.A." width="640" height="461" srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/carls-drive-in1.png?w=729&amp;amp;ssl=1 729w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/carls-drive-in1.png?resize=300%2C216&amp;amp;ssl=1 300w" sizes="(max-width: 640px) 100vw, 640px" data-recalc-dims="1" /&gt;</span></noscript></a></p><span data-dcnode-id="2333" instrument_node="">
</span><p data-dcnode-id="2324"><strong data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Harry Carpenter’s Drive In Restaurant</span></strong><span data-dcnode-id="2330" instrument_node=""> – 6290 W Sunset Boulevard…cnr Sunset &amp; Vine – 2</span><sup data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">nd</span></sup><span data-dcnode-id="2327" instrument_node="">location – opened early 1930s – The drive-in restaurant where Dick Powell’s character works in the 1937 movie “Hollywood Hotel” is called “Callahans” in the film. The actual coffee shop in Hollywood was called “Carpenter’s” and was located at the southeast corner of Sunset and Vine Streets. It was one of the earliest “drive-in” restaurants in the U.S. The uniform worn is based on the actual uniforms the mostly male waiters wore. They were based on the uniforms that service station attendants wore. The reason for this new type of restaurant was to cater to the new younger movie star who wanted to be seen in their expensive automobiles. The restaurant was open all night. </span><a data-dcnode-id="2325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.imdb.com/title/tt0029010/trivia"><span data-dcnode-id="2326" instrument_node="">http://www.imdb.com/title/tt0029010/trivia</span></a></p><span data-dcnode-id="2323" instrument_node="">

=1" data-orig-size="555,336" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="Catalina Island Casino " data-image-description="" data-image-caption="&amp;lt;p&amp;gt;Catalina Island Casino &amp;lt;/p&amp;gt;

</span><p data-dcnode-id="2253"><strong data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">Catalina Island Casino </span></strong><span data-dcnode-id="2254" instrument_node="">– Finished construction on May 29, 1929 under the direction of Mr. Wrigley and David M. Renton at a cost of 2 million dollars. Its design, done by Sumner A. Spaulding and Walter Weber was the first to be designed specifically for movies with sound. Steel structure of the old Sugarloaf Casino can still be found in Avalon’s abandoned bird park. The bird park was conceived by Mrs. Wrigley, and, at the time, was one of the largest aviaries in the world.</span></p><span data-dcnode-id="2252" instrument_node="">
</span><p data-dcnode-id="2248"><strong data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Catalina John’s Restaurant – </span></strong><span data-dcnode-id="2249" instrument_node="">Phone: Whitney 4501 – “The Miracle Mile’s finest restaurant” – “Open 24 hours a day”</span></p><span data-dcnode-id="2247" instrument_node="">
</span><p data-dcnode-id="2244"><strong data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">Casanova Club / Club Casanova – 8118 Sunset Blvd &amp; 8383 Sunset Blvd </span></strong></p><span data-dcnode-id="2243" instrument_node="">
</span><p data-dcnode-id="2236"><span data-dcnode-id="2242" instrument_node="">from </span><strong data-dcnode-id="2238"><em data-dcnode-id="2239"><a data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.playgroundtothestars.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2241" instrument_node="">Playground to the Stars</span></a></em></strong><span data-dcnode-id="2237" instrument_node="">:</span></p><span data-dcnode-id="2235" instrument_node="">
</span><p data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">1932: Seer who operates out of 8118 Sunset is arrested in a suicide extortion plot.</span></p><span data-dcnode-id="2232" instrument_node="">
</span><p data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">1933: LAT: Sep. 7, 1933: 1933: Actress Ruth Hall, 21, announces plans to marry Lee D.Garmes, 31, director at Fox, who resides at 8118 Sunset Blvd. He was the first person awarded the Oscar for photography in “Shanghai Express.”</span></p><span data-dcnode-id="2229" instrument_node="">
</span><p data-dcnode-id="2224"><span data-dcnode-id="2228" instrument_node="">1935: The building at 8383 Sunset is constructed, first club is there is </span><strong data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">Cafe Clement</span></strong><span data-dcnode-id="2225" instrument_node="">.</span></p><span data-dcnode-id="2223" instrument_node="">
</span><p data-dcnode-id="2218"><span data-dcnode-id="2222" instrument_node="">1936: August: </span><strong data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">Club Casanova</span></strong><span data-dcnode-id="2219" instrument_node=""> opens in the building at 8383 Sunset, but is in business there for no more than 16 months.</span></p><span data-dcnode-id="2217" instrument_node="">
</span><p data-dcnode-id="2212"><span data-dcnode-id="2216" instrument_node="">1937: December 31: </span><strong data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">U-Gene’s Bagdad Cafe</span></strong><span data-dcnode-id="2213" instrument_node=""> opens at 8383 Sunset.</span></p><span data-dcnode-id="2211" instrument_node="">
</span><p data-dcnode-id="2206"><span data-dcnode-id="2210" instrument_node="">1939: July: </span><strong data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">Bow’s Inn</span></strong><span data-dcnode-id="2207" instrument_node=""> opens in the space at 8383 Sunset.</span></p><span data-dcnode-id="2205" instrument_node="">
</span><p data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">1940: Census lists tenants at 8118 Sunset as Albert Beck, his wife Charley and Charley’s mother. Occupation for all three is given as tailors. March 26: The building at 8383 Sunset is now a real estate office operated by Bob Coyne. He reports a burglary in which some saddles were stolen. He is interesting because he was part of the CIVIC anti-vice crusade — UNTIL he was charged with extortion, pleaded guilty and went to jail for 90 days in 1937. Previous to the burglary, Coyne had publicly accused Capt. Contreras of the Sheriff’s Dept. vice unit of being involved in gambling rackets.</span></p><span data-dcnode-id="2202" instrument_node="">
</span><p data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">1941: January: There’s a raid at Casanova Inc., a private club at 8118 Sunset that has about 350 members. But this is not a nightclub, not open to the public, apparently it’s a private drinking club. Whether this is an offshoot of Club Casanova, which closed in 1937, or a completely new club that appropriated the name is unknown. It wasn’t there long, apparently.</span></p><span data-dcnode-id="2199" instrument_node="">
</span><p data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">1942: According to the City Directory, 8118 Sunset was a dance studio for Anthony Capps, who was apparently something of a big deal. I don’t know how long the Capps studio was at the address but by 1955, Capps and his wife were living in Beverly Hills.</span></p><span data-dcnode-id="2196" instrument_node="">
</span><p data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">… Nothing much in the record about 8118 until …</span></p><span data-dcnode-id="2193" instrument_node="">
</span><p data-dcnode-id="2188"><span data-dcnode-id="2192" instrument_node="">1958: March: </span><strong data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Pandora’s Coffee House</span></strong><span data-dcnode-id="2189" instrument_node="">, 8118 Sunset Blvd., will display paintings and sculpture by Albert Wein for its first exhibit, Tuesday thorugh March 31. April: Private detectives Mike Lane and James Adams were booked after a citizen’s arrest by Allen H. Adrian, 27, owner of a restaurant at 8118 Sunset. Allen told police the two told him they had acquired controlling interest in the restaurant and had ordered him to leave. When he refused, Adrian said, the men started twisting his arm. Adrian broke away and called the police.</span></p><span data-dcnode-id="2187" instrument_node="">
</span><p data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">July: [This is from the page on Noirish] “In July 1958 Tom Elwell applied for a “Cafe Entertainment” license. In September and October he had hearings before a Hearing Examiner. This worthy, after receiving testimony from vice-squad members, and neighbors, denied the application. Elwell then appealed to the Police Commission in January 1959, but the Commission agreed with the hearing officer. The Hearing Examiner had determined Pandora’s was no more or less noisy than other nearby clubs. But he decided Mr. Elwell was “unfit” for his license due his associations with three criminals: prostitute Shirley Paulos, narcotic suspect McKinley Sims, and “Homo” [sic] Don Arden (the “Busby Berkeley of Las Vegas,” creator of “Jubilee!”)</span></p><span data-dcnode-id="2184" instrument_node="">
</span><p data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">So it never got a liquor license and was a coffee house at the time of the riots, which meant kids under drinking age could go there. The riots started when the city announced plans to demolish it in order to create better traffic flow, which is what we have now.</span></p><span data-dcnode-id="2181" instrument_node="">
</span><p data-dcnode-id="2174"><b data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Cave des Roys</span></b><span data-dcnode-id="2178" instrument_node="">, 8054 Beverly Place, on the La Cienega’s restaurant row</span><i data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">. </span></i><span data-dcnode-id="2175" instrument_node="">This private club (you needed a gold key to enter) opened in 1959. Among the founders were Conrad Hilton, Paul Newman, Desi Arnaz, Danny Thomas, Anthony Quinn and Tony Curtis.</span></p><span data-dcnode-id="2173" instrument_node="">
</span><p data-dcnode-id="2169"><strong data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">CBS Television City </span></strong><span data-dcnode-id="2170" instrument_node="">– Fairfax Ave. Built in 1952. (61/24)</span></p><span data-dcnode-id="2168" instrument_node="">
</span><p data-dcnode-id="2161"><strong data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">C.C. Brown’s Ice Cream</span></strong><span data-dcnode-id="2165" instrument_node="">. 7007 Hollywood Boulevard; 464-9726. Birthplace of the hot fudge sundae and workplace of a young Judy Garland. </span><a data-dcnode-id="2163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//findarticles.com/p/articles/mi_m1216/is_n5_v192/ai_15413257/pg_2" title="http://findarticles.com/p/articles/mi_m1216/is_n5_v192/ai_15413257/pg_2"><span data-dcnode-id="2164" instrument_node="">http://findarticles.com/p/articles/mi_m1216/is_n5_v192/ai_15413257/pg_2</span></a><span data-dcnode-id="2162" instrument_node="">63/22 says that “When a young Judy Garland used to go an a sweets binge, Brown’s was where she did it.</span></p><span data-dcnode-id="2160" instrument_node="">
</span><p data-dcnode-id="2156"><span data-dcnode-id="2159" instrument_node="">C.C. Brown’s began in 1906 in downtown Los Angeles where Clarence Clifton Brown invented the Hot Fudge Sauce. In 1929 he moved the business to Hollywood, where it existed in its original form until the summer of 1996. C.C. Brown’s moved to its long-term location at 7007 Hollywood Boulevard at a time when two major landmarks –Grauman’s Chinese Theatre and the Hollywood Roosevelt Hotel — had not long been built. </span><a data-dcnode-id="2157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.foodingredientsonline.com/storefronts/ccbrown.html"><span data-dcnode-id="2158" instrument_node="">http://www.foodingredientsonline.com/storefronts/ccbrown.html</span></a></p><span data-dcnode-id="2155" instrument_node="">
</span><p data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">CC Brown arrived in the early 20s, opening an ice cream parlor on La Brea before moving to Hollywood Boulevard, west of Orange in 1928. CC Brown invented the hot fudge sundae. With horsehair-upholstered booths, metal dishes to keep the ice-cream cold, and a secret formula fudge sauce served in ceramic pitchers, the business brought stars and everyone else. Judy Garland, James Cagney, Elvis, Clark Gable and Ronald Reagan were regulars. It closed its doors in 1996. (p166/113)</span></p><span data-dcnode-id="2152" instrument_node="">
</span><p data-dcnode-id="2147"><a data-dcnode-id="2148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/image028.jpg"><img alt="C.C. Brown's Ice Cream" class="aligncenter wp-image-199 size-full jetpack-lazy-image" data-attachment-id="199" data-comments-opened="1" data-dcnode-id="2151" data-image-caption="<p>C.C. Brown’s Ice Cream</p>

e-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="C.C. Brown&amp;#8217;s Ice Cream" data-image-description="" data-image-caption="&amp;lt;p&amp;gt;C.C. Brown&amp;#8217;s Ice Cream&amp;lt;/p&amp;gt;

</span><p data-dcnode-id="2133"><strong data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">The Cellar</span></strong><span data-dcnode-id="2143" instrument_node=""> – And if you looked at the downtown bars like the </span><strong data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Waldorf</span></strong><span data-dcnode-id="2140" instrument_node="">, the </span><strong data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">Cellar</span></strong><span data-dcnode-id="2137" instrument_node="">, the </span><strong data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">326</span></strong><span data-dcnode-id="2134" instrument_node=""> – it was so goddamned open. (11/36)</span></p><span data-dcnode-id="2132" instrument_node="">
</span><p data-dcnode-id="2128"><strong data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">Centaur Café</span></strong><span data-dcnode-id="2129" instrument_node="">, Sunset Boulevard, Los Angeles. The photo below is dated 1930</span></p><span data-dcnode-id="2127" instrument_node="">

</span><p data-dcnode-id="2120"><strong data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Cesar Romero’s Cappuccino Ristorante</span></strong><span data-dcnode-id="2121" instrument_node="">, 848 N. La Cienega Blvd, just south of Santa Monica Blvd. Ph 655-7722</span></p><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2083"><strong data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Central Avenue</span></strong><span data-dcnode-id="2116" instrument_node=""> – </span><a data-dcnode-id="2114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Central_Avenue%2C_Los_Angeles%2C_California"><span data-dcnode-id="2115" instrument_node="">http://en.wikipedia.org/wiki/Central_Avenue,_Los_Angeles,_California</span></a><span data-dcnode-id="2113" instrument_node=""> – was the Harlem of 30s Los Angeles. (40/154) The biggest of the clubs, which billed itself as “California’s largest Harlem nightclub” was the </span><strong data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">Plantation</span></strong><span data-dcnode-id="2110" instrument_node=""> at 108</span><sup data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">th</span></sup><span data-dcnode-id="2107" instrument_node=""> Street which attracted all the top black talent visiting town. (40/1207) Other places included </span><strong data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">Club Alabam</span></strong><span data-dcnode-id="2104" instrument_node=""> and the </span><strong data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">Dunbar Hotel</span></strong><span data-dcnode-id="2101" instrument_node="">. “</span><em data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">Because racial covenants prevented “persons not of the Caucasian race</span></em><em data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">”</span></em><em data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node=""> from buying or renting houses in certain areas of the city, African Americans migrating to Los Angeles in the 1940s lived along Central Avenue. Stretching south for seven miles from downtown to Watts, the Central Avenue district became home to black residents, businesses, churches, and night clubs. Angelenos </span></em><em data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">– </span></em><em data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">rich and poor, black and white </span></em><em data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">– </span></em><em data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node=""> crowded into places like Club Alabam, the Dunbar Hotel, and the Plantation to listen to jazz, blues, and other music.</span></em><span data-dcnode-id="2086" instrument_node="">” </span><a data-dcnode-id="2084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//jazzinamerica.org/student.asp%3FLPOrder%3D6%26Grade%3D8"><span data-dcnode-id="2085" instrument_node="">http://jazzinamerica.org/student.asp?LPOrder=6&amp;Grade=8</span></a></p><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2078"><span data-dcnode-id="2081" instrument_node="">1942: The Plantation Club opens on 108th and Central. 1947: The Plantation Club closes.&nbsp;&nbsp; </span><a data-dcnode-id="2079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.los-angeles-music-week.com/Chronology.html"><span data-dcnode-id="2080" instrument_node="">http://www.los-angeles-music-week.com/Chronology.html</span></a></p><span data-dcnode-id="2077" instrument_node="">
</span><p data-dcnode-id="2059"><b data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">&nbsp;</span></b><b data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">The Dunbar Hotel</span></b><span data-dcnode-id="2072" instrument_node=""> – 4225 South Central Avenue in Los Angeles. By the MID-1940s, Central Ave had become </span><i data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">the</span></i><span data-dcnode-id="2069" instrument_node=""> jazz thoroughfare of the West…On Central itself there were dozens of legit nightclubs, including </span><b data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">the Brown Bomber</span></b><span data-dcnode-id="2066" instrument_node="">, </span><b data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">Bird in the Basket</span></b><span data-dcnode-id="2063" instrument_node="">, and the lounge at the </span><b data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">Dunbar Hotel</span></b><span data-dcnode-id="2060" instrument_node=""> where pianist/singer Nellie Lutcher held court. And there were the so-called breakfast clubs – after-hour places where you brought your own booze and danced past sunrise. (82/54) See also “Central Avenue”.</span></p><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2053"><span data-dcnode-id="2057" instrument_node="">Dunbar Hotel was known as the </span><b data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">Hotel Somerville</span></b><span data-dcnode-id="2054" instrument_node=""> in its first year of existence (1928.)</span></p><span data-dcnode-id="2052" instrument_node="">
</span><p data-dcnode-id="2048"><span data-dcnode-id="2051" instrument_node="">See also: </span><a data-dcnode-id="2049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//forum.skyscraperpage.com/showthread.php%3Ft%3D170279%26page%3D321"><span data-dcnode-id="2050" instrument_node="">http://forum.skyscraperpage.com/showthread.php?t=170279&amp;page=321</span></a></p><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2043"><strong data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">Club Alabam </span></strong><span data-dcnode-id="2044" instrument_node="">at Central and 23rd (?) was the place for big band performances, including Duke Ellington’s band; countless jazz and blues bars like Babe Rickey’s at 5259 Central (recently moved to Leimert Park) lined the avenue; when Fats Waller, Lena Horne, Nat “King” Cole, Fats Domino, BB King, Dizzy Gillespie frequently “rocked the house”</span></p><span data-dcnode-id="2042" instrument_node="">
</span><p data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">Central Avenue, back in the day, was the Black mecca of jazz. Central Avenue was one of the few areas of Los Angeles where Black were allowed to move, purchase property, live. Central Avenue emerged as the heart of the black community and played host to one of the first jazz scenes in the western U.S., with trombonist Kid Ory a prominent resident.</span></p><span data-dcnode-id="2039" instrument_node="">
</span><p data-dcnode-id="2035"><span data-dcnode-id="2038" instrument_node="">Central Avenue was the place to be between 1920 and 1955. Central was the heart of the African-American community in Los Angeles, with active Rhythm and Blues and Jazz music scenes. </span><a data-dcnode-id="2036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//femmenoir.blogspot.com/2006/07/central-avenue.html"><span data-dcnode-id="2037" instrument_node="">http://femmenoir.blogspot.com/2006/07/central-avenue.html</span></a></p><span data-dcnode-id="2034" instrument_node="">
</span><p data-dcnode-id="2026"><span data-dcnode-id="2033" instrument_node="">(Photo at the LAPL documenting a 1945 ball at the </span><strong data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Club Alabam</span></strong><span data-dcnode-id="2030" instrument_node=""> which was in the heart of the black district, on 42</span><sup data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">nd</span></sup><span data-dcnode-id="2027" instrument_node=""> St at Central Ave. Gorden Dexter and Charles Mingus played in the Club Alabam’s house band, and aMae West, William Randolph Hearst, and Orson Welles listened to jazz there together with Duke Ellington, Jackie Robinson and Joe Louis. The 1945 photograph, however, shows 2 dozen young men, African American and white wearing cocktail gowns, stoles and Joan Crawford style lipstick.</span></p><span data-dcnode-id="2025" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2024" instrument_node="">By the MID-1940s, Central Ave had become </span><em data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">the</span></em><span data-dcnode-id="2021" instrument_node=""> jazz thoroughfare of the West…On Central itself there were dozens of legit nightclubs, including </span><strong data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">the Brown Bomber</span></strong><span data-dcnode-id="2018" instrument_node="">, </span><strong data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Bird in the Basket</span></strong><span data-dcnode-id="2015" instrument_node="">, and the lounge at the </span><strong data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Dunbar Hotel</span></strong><span data-dcnode-id="2012" instrument_node="">where pianist/singer Nellie Lutcher held court. And there were the so-called breakfast clubs – after-hour places where you brought your own booze and danced past sunrise. (82/54)</span></p><span data-dcnode-id="2010" instrument_node="">
</span><p data-dcnode-id="2003"><strong data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">Charley Foy’s Supper Club</span></strong><span data-dcnode-id="2007" instrument_node="">, 12915 Ventura Boulevard, Sherman Oaks, at Coldwater Canyon, Phone Sunset 1-1482. One of the most popular groups in American vaudeville was an act called The Seven Little Foys. As adults,two of these children, Charlie and his sister Mary owned and operated a supper club in Sherman Oaks called Charley Foy’s Supper Club.&nbsp; The club, located at 12915 Ventura Boulevard at Coldwater Canyon, featured blockbuster entertainers such as: Jackie Gleason, Dan Rowan and Phil Silvers. </span><a data-dcnode-id="2005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//museumsanfernandovalley.blogspot.com/2011/07/charlie-foys-supper-club-in-sherman.html"><span data-dcnode-id="2006" instrument_node="">http://museumsanfernandovalley.blogspot.com/2011/07/charlie-foys-supper-club-in-sherman.html</span></a><span data-dcnode-id="2004" instrument_node="">&nbsp; (192/111)</span></p><span data-dcnode-id="2002" instrument_node="">
