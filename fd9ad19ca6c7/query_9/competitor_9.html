</span><p data-dcnode-id="1223"><strong data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Cocoanut Grove</span></strong><span data-dcnode-id="1227" instrument_node=""> – opened 21APR1921. The Ambassador Hotel’s nightclub – The Cocoanut Grove – begins its ascendancy to fame when the club’s host – Johnny Manos – heard from his friend, Valentino, that a number of the fake palm trees used in </span><em data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">The Sheik </span></em><span data-dcnode-id="1224" instrument_node="">were available for under $500. They were brought in and used until a more lavish scheme of Moorish design could be instituted. The first floorshow wasn’t introduced until a year after the opening.Tuesday nights were the big nights at Cocoanut Grove and the usual evening for special events like Charleston dance contests or Greenwich Village night (when everyone came dressed as an artist, writer or poet. (6/184) in the 1930s and 1940s big band radio performances with such greats as Freddy “Mr. Cocoanut Grove”</span></p><span data-dcnode-id="1222" instrument_node="">
</span><p data-dcnode-id="1217"><a data-dcnode-id="1218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/image039.jpg"><img alt="Cocoanut Grove " class="size-medium wp-image-204 aligncenter jetpack-lazy-image" data-attachment-id="204" data-comments-opened="1" data-dcnode-id="1221" data-image-caption="<p>Cocoanut Grove </p>

ata-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="Cocoanut Grove " data-image-description="" data-image-caption="&amp;lt;p&amp;gt;Cocoanut Grove &amp;lt;/p&amp;gt;
" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image039.jpg?fit=300%2C192&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image039.jpg?fit=640%2C411&amp;amp;ssl=1" loading="lazy" class="size-medium wp-image-204 aligncenter" title="Cocoanut Grove " src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/image039-300x192.jpg?resize=436%2C279" alt="Cocoanut Grove " width="436" height="279" srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image039.jpg?resize=300%2C192&amp;amp;ssl=1 300w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image039.jpg?w=720&amp;amp;ssl=1 720w" sizes="(max-width: 436px) 100vw, 436px" data-recalc-dims="1" /&gt;</span></noscript></a></p><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Martin, Merv Griffin, Sinatra, Bing Crosby, Guy Lombardo, Rudy Vallee were broadcast from there.According to 40/145, a full meal there in 1936 cost $14.50 for two, which included cover, appetizer, soup, filet mignon, wine, tax and tip. And access to the dancefloor.The Oscars were presented 6 times between 1930 and 1936 (which was the last time a banquet was held for the ceremony. (16/85) (40/37, 147)Adjacent to the Grove was The Ambassador Lounge and the Fiesta Room, decorated in gold and cerulean (deep sky blue), its entrance surmounted by a statue of Bacchus.</span></p><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1209"><a data-dcnode-id="1211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.theambassadorhotel.com/"><span data-dcnode-id="1212" instrument_node="">http://www.theambassadorhotel.com/ </span></a><span data-dcnode-id="1210" instrument_node="">All the big acts played there, appearing among the fake palms trees with fake monkeys hanging from them. (47/328)Bing Crosby had his first big success crooning with Paul Whiteman’s orchestra. (late 20s? Early 1930s?)</span></p><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">As listed in the ‘Los Angeles Guide, 1941’ : “Dinner from 7pm.; couvert charge. Orchestra dancing. Floor show 11pm. Bar. Very popular; consistently good entertainment.</span></p><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1204" instrument_node="">Menu: </span><a data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dbase1.lapl.org/images/menus/fullsize/f/rb04382-01.jpg"><span data-dcnode-id="1203" instrument_node="">http://dbase1.lapl.org/images/menus/fullsize/f/rb04382-01.jpg</span></a></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1196"><strong data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Coffee Dan’s </span></strong><span data-dcnode-id="1197" instrument_node="">– on or near cnr Hollywood &amp; Vine that catered exclusively to homosexuals, especially underage gays who lacked the proper ID to get into bars. A similar place was the Marlin Inn. (60/149) Its neon sign is generally visible in all of the great night pictures of Vine street in the 40s.</span></p><span data-dcnode-id="1195" instrument_node="">

</span><p data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">There also seems to have been a Colony Club in Culver City – an in-spot in the early 30s where behind-the-door gambling was extremely popular. (28/74) (40/78, 82) eventually left (forced out of) Culver City and moved to a 26 room mansion on Alta Loma just south of the Strip. (40/92)</span></p><span data-dcnode-id="1161" instrument_node="">

-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="Colony Club" data-image-description="" data-image-caption="&amp;lt;p&amp;gt;Colony Club&amp;lt;/p&amp;gt;

</span><p data-dcnode-id="1151"><b data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Continental Café</span></b><span data-dcnode-id="1152" instrument_node=""> – 7823 Santa Monica Boulevard in the 1940s and 50s. Café owned by Mickey Cohen where Johnny Stompanato worked for a while. In May 1951, Cohen sold it to help pay off debts. (115/p159 &amp; p166)</span></p><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1146"><b data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Coty Paris Salon</span></b><span data-dcnode-id="1147" instrument_node="">, 3150 Wilshire (late 1930s)</span></p><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1138"><strong data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Coulter’s Deptartment Store</span></strong><span data-dcnode-id="1142" instrument_node=""> – 5600 Wilshire Boulevard</span><strong data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">. </span></strong><span data-dcnode-id="1139" instrument_node="">Built in 1938</span></p><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1133"><strong data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Cottage Dance – </span></strong><span data-dcnode-id="1134" instrument_node="">215½ Street, Los Angeles, Dancing nightly, from 8pm to 2am. “We furnish the partners. Girls galore at Cottage Dance.”</span></p><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1115"><strong data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">The Cotton Club</span></strong><span data-dcnode-id="1129" instrument_node=""> – cnr National and Washington, Culver City. One of several venues run by Frank Sebastian. No relation to, but inspired by, the one in Harlem. Was previously </span><strong data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">The Green Mill</span></strong><span data-dcnode-id="1126" instrument_node=""> build in 1923 as one of the Southland’s largest entertainment emporium then in 1926 became the Cotton Club and L.A.’s premier Prohibition nightspot. Also, it was the first to feature exclusively “colored” orchestras. And if you lasted all night, he served an eggs-and-ham breakfast. Later it became the </span><strong data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Casa Manana</span></strong><span data-dcnode-id="1123" instrument_node=""> (which became a major dance venue after OCT38’s burning down of the Palomar) and later </span><strong data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Meadowbrook Gardens</span></strong><span data-dcnode-id="1120" instrument_node="">. Burned to the ground in 1948. (40/24) Frank Sebastian also owned the successful Sebastian’s Café on Windward Ave, Venice. The popular cafe, sometimes referred to as “Venice Cafe” and/or “Frank Sebastian’s Venice Cafe” was located on Winward Ave., Venice, and specialized in vaudeville and jazz. By 1926, Sebastian would open the Frank Sebastian’s Cotton Club in Culver City and close the Venice club. (</span><a data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.martinturnbull.com/2014/05/23/frank-sebastians-cotton-club-corner-national-and-washington-culver-city/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">More photos</span></strong></a><span data-dcnode-id="1116" instrument_node="">)</span></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1113" instrument_node="">Creole chorines danced to Louis Armstrong’s band at </span><strong data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Frank Sebastian’s Cotton Club</span></strong><span data-dcnode-id="1110" instrument_node="">, one of the few places that allowed black entertainers to perform, though it enforced the whites-only admission policy common at the time. </span><strong data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Fatty Arbuckle’s Plantation Club</span></strong><span data-dcnode-id="1107" instrument_node="">, just down the road, invited clubgoers to share the dance floor with their favorite stars at special evenings orchestrated by a host movie studio, a tactic copied by other Los Angeles-area clubs. (from </span><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//articles.latimes.com/2006/may/21/entertainment/ca-125nightlife21"><span data-dcnode-id="1106" instrument_node="">http://articles.latimes.com/2006/may/21/entertainment/ca-125nightlife21</span></a><span data-dcnode-id="1104" instrument_node="">)</span></p><span data-dcnode-id="1102" instrument_node="">

turnbull.com/wp-content/uploads/2011/07/new-cotton-club-2.jpg%3Fresize%3D500%252C305&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="500"><noscript data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">&lt;img data-attachment-id="5012" data-permalink="https://martinturnbull.com/hollywood-places/new-cotton-club-2-2/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/new-cotton-club-2.jpg?fit=500%2C305&amp;amp;ssl=1" data-orig-size="500,305" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="Frank Sebastian&amp;#8217;s New Cotton Club, Culver City" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/new-cotton-club-2.jpg?fit=300%2C183&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/new-cotton-club-2.jpg?fit=500%2C305&amp;amp;ssl=1" loading="lazy" class="aligncenter size-full wp-image-5012" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/new-cotton-club-2.jpg?resize=500%2C305" alt="Frank Sebastian's New Cotton Club, Culver City" width="500" height="305" srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/new-cotton-club-2.jpg?w=500&amp;amp;ssl=1 500w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/new-cotton-club-2.jpg?resize=300%2C183&amp;amp;ssl=1 300w" sizes="(max-width: 500px) 100vw, 500px" data-recalc-dims="1" /&gt;</span></noscript></a></strong><strong data-dcnode-id="1094"><br data-dcnode-id="1096"><span data-dcnode-id="1095" instrument_node="">
Cooper’s Doughnuts</span></strong><span data-dcnode-id="1093" instrument_node=""> – downtown coffee shop on a seedy stretch of Main St between two of L.A.’s gay bars, the Waldorf and Harold’s. (60/1)</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1087"><strong data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Cork Room </span></strong><span data-dcnode-id="1088" instrument_node="">– lesbian venue (60/89 &amp; 97)</span></p><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1082"><strong data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Crescendo </span></strong><span data-dcnode-id="1083" instrument_node="">– Sunset Strip 1950s nightclub (17/95) – The Crescendo Club, also on the Sunset Strip was one of the more popular nightclubs at the time, along with Ciro’s and the Mocambo. (8/223) The Mocambo was adjacent to the Crescendo. (8/226)</span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1077"><img alt="Crescendo Club, Sunset Blvd, Los Angeles" class="aligncenter size-full wp-image-11483 jetpack-lazy-image" data-attachment-id="11483" data-comments-opened="1" data-dcnode-id="1080" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Crescendo Club, Sunset Blvd, Los Angeles" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Crescendo-Club-Sunset-Blvd-Los-Angeles.jpg?fit=640%2C791&amp;ssl=1" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Crescendo-Club-Sunset-Blvd-Los-Angeles.jpg?resize=640%2C791&amp;is-pending-load=1" data-lazy-srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Crescendo-Club-Sunset-Blvd-Los-Angeles.jpg?w=720&amp;ssl=1 720w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Crescendo-Club-Sunset-Blvd-Los-Angeles.jpg?resize=243%2C300&amp;ssl=1 243w" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Crescendo-Club-Sunset-Blvd-Los-Angeles.jpg?fit=243%2C300&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Crescendo-Club-Sunset-Blvd-Los-Angeles.jpg?fit=720%2C890&amp;ssl=1" data-orig-size="720,890" data-permalink="https://martinturnbull.com/hollywood-places/crescendo-club-sunset-blvd-los-angeles/" data-recalc-dims="1" height="791" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Crescendo-Club-Sunset-Blvd-Los-Angeles.jpg%3Fresize%3D640%252C791&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="640"><noscript data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">&lt;img data-attachment-id="11483" data-permalink="https://martinturnbull.com/hollywood-places/crescendo-club-sunset-blvd-los-angeles/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Crescendo-Club-Sunset-Blvd-Los-Angeles.jpg?fit=720%2C890&amp;amp;ssl=1" data-orig-size="720,890" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"1"}" data-image-title="Crescendo Club, Sunset Blvd, Los Angeles" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Crescendo-Club-Sunset-Blvd-Los-Angeles.jpg?fit=243%2C300&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Crescendo-Club-Sunset-Blvd-Los-Angeles.jpg?fit=640%2C791&amp;amp;ssl=1" loading="lazy" class="aligncenter size-full wp-image-11483" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Crescendo-Club-Sunset-Blvd-Los-Angeles.jpg?resize=640%2C791" alt="Crescendo Club, Sunset Blvd, Los Angeles" width="640" height="791" srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Crescendo-Club-Sunset-Blvd-Los-Angeles.jpg?w=720&amp;amp;ssl=1 720w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Crescendo-Club-Sunset-Blvd-Los-Angeles.jpg?resize=243%2C300&amp;amp;ssl=1 243w" sizes="(max-width: 640px) 100vw, 640px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1070"><strong data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">(Fox) Criterion Theater</span></strong><span data-dcnode-id="1073" instrument_node=""> – 642 S. Grand Avenue, downtown Los Angeles. 1800-seat theater opened as the Kinema in 1917 and was later renamed the Criterion (and still later, the Fox Criterion). Located at 7th and Grand — about four blocks away from the hustle and bustle of Broadway. It was razed in 1941 and replaced by an office building. </span><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cinematreasures.org/theater/1967/"><span data-dcnode-id="1072" instrument_node="">http://cinematreasures.org/theater/1967/</span></a></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1065"><strong data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">The Crown Jewel</span></strong><span data-dcnode-id="1066" instrument_node="">, on South Hill Street, was “discreet and elegant”, according to Fred Frisbie, an early gay activist who lives in Hollywood at the time. A driver’s license was needed to enter, “There was a code of conduct in such bars that normally prohibited any same-sex touching,” Frisbie remembered, “making it difficult at times to tell a gay bar from a straight one.” (10/147) The Crown Jewel – downtown gay bar owned by Harry Weiss, the proprietor of two other gay bars and a lawyer since 1941. (60/84)</span></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1058"><strong data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Crossroads of the World</span></strong><span data-dcnode-id="1061" instrument_node=""> – 6671 Sunset Boulevard, east of Las Palmas Ave. Opened 29OCT1936 featuring Italian, Turkish, French, Moorish and Spanish architecture. (2/2) (14/178) (61/31) (66/311) </span><a data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//laist.com/2009/01/10/laistory_cross_roads_of_the_world.php"><span data-dcnode-id="1060" instrument_node="">http://laist.com/2009/01/10/laistory_cross_roads_of_the_world.php</span></a></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1053"><strong data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Crush Bar</span></strong><span data-dcnode-id="1054" instrument_node=""> – 1743 N. Cahenga, just north of Hollywood Boulevard located at one of the better Fred Harvey Restaurants. (61/72)</span></p><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1048"><strong data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Culver City Recreation – </span></strong><span data-dcnode-id="1049" instrument_node="">9524 W. Washington Boulevard, Culver City, Phone – Texas 0-3220 &amp; Vermont 8-2158. “Bowling and Billiards, Cocktails, coffee shop, Free parking”</span></p><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1043"><strong data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Currie’s Ice Cream Parlor</span></strong><span data-dcnode-id="1044" instrument_node="">– located on the northeast corner of Sunset Boulevard and Highland Ave, the Curries store was one of a California chain. This Curries was in a perfect location, across the street from Hollywood High School. The signature roof billboard advertised “Mile High Cones,” only five cents. (108/127) The one in Beverly Hills opened around 1936. (p24/117)</span></p><span data-dcnode-id="1042" instrument_node="">

urnbull.com/wp-content/uploads/2011/07/denels-music-shop-6634-HWB.png%3Fresize%3D461%252C352&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="border: 1px solid black;" title="Denels Music Shop 6634 Hollywood Blvd." width="461"><noscript data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">&lt;img data-attachment-id="4025" data-permalink="https://martinturnbull.com/hollywood-places/denels-music-shop-6634-hwb/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/denels-music-shop-6634-HWB.png?fit=769%2C587&amp;amp;ssl=1" data-orig-size="769,587" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="denels music shop 6634 HWB" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/denels-music-shop-6634-HWB.png?fit=300%2C228&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/denels-music-shop-6634-HWB.png?fit=640%2C489&amp;amp;ssl=1" loading="lazy" class="wp-image-4025 aligncenter" style="border: 1px solid black;" title="Denels Music Shop 6634 Hollywood Blvd." src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/denels-music-shop-6634-HWB.png?resize=461%2C352" alt="Denels Music Shop 6634 Hollywood Blvd." width="461" height="352" srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/denels-music-shop-6634-HWB.png?w=769&amp;amp;ssl=1 769w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/denels-music-shop-6634-HWB.png?resize=300%2C228&amp;amp;ssl=1 300w" sizes="(max-width: 461px) 100vw, 461px" data-recalc-dims="1" /&gt;</span></noscript></a></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="989"><strong data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Desilu Cahuenga Studios</span></strong><span data-dcnode-id="990" instrument_node=""> – 1035 Cahuenga Boulevard. Built in 1946 as the Equity Studios, then became Motion Picture Center Studios rental lot in 1947. Stanley Kramer make it his base in 1949 for ‘Home Of The Brave’ with Kirk Douglas and part of ‘High Noon’ in 1952. Desilu started leasing space on the lot in 1953, using it for some early episodes of ‘I Love Lucy’, ‘Our Miss Brooks’, and the Danny Thomas and Jack Benny shows. Desilu bought control of the studios in 1955 and the remaining 49% in 1957, shooting ‘The Honeymooners’, ‘The Dick Van Dyke Show’, ‘Make Room For Daddy’, and ‘The Real McCoys’ on the lot and renaming it the Desilu Cahuenga Studios. When Desilu sold out to Paramount, the studio went along as part of the deal… (67/67)</span></p><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="982"><strong data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Desmond’s</span></strong><span data-dcnode-id="985" instrument_node=""> – Hat shop in Beverly Hills (65/308). 616 S. Broadway (was on Spring St., then Main St, then Broadway. Started out as a men’s hat store then grew to become a purveyor of finer men’s clothing. </span><a data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.csulb.edu/~odinthor/socal7.html"><span data-dcnode-id="984" instrument_node="">http://www.csulb.edu/~odinthor/socal7.html</span></a></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="977"><strong data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Dincara Stock Yards – Casino</span></strong><span data-dcnode-id="978" instrument_node=""> run by Mickey Cohen on a farm located at 806 S Mariposa St, Burbank in the late 1940s/early 1950s.</span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="970"><strong data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Dino’s Lodge – 8524 Sunset Boulevard – </span></strong><span data-dcnode-id="973" instrument_node="">From 1958 to 1964, Dino’s Lodge, then owned by Dean Martin, was used as a location for the tv series 77 Sunset Strip. Martin opened the restaurant around the time of his split with Jerry Lewis, and it became a choice watering hole for Rat Pack members Frank Sinatra, Sammy Davis, Jr., and Peter Lawford. The handsome Tudor-style building was razed in 1989. </span><a data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.filmsofthegoldenage.com/foga/1996/winter/hollywoodhotspots.shtml"><span data-dcnode-id="972" instrument_node="">http://www.filmsofthegoldenage.com/foga/1996/winter/hollywoodhotspots.shtml</span></a></p><span data-dcnode-id="969" instrument_node="">

much more interesting (and she’s only 4 1/2 years my senior.) Her crowd liked Delores’ Drive-in, affectionately known as “DL’s”, one of those classic drive-ins of the fifties, where you pulled up to the spot with a mike by the window, and the carhop brought your food on a tray which attached to the partially rolled-down window. They cruised The Strip (Sunset, of course) on weekends, had burgers and fries at Tiny Naylor’s (another drive-in) and it was all terribly American Graffiti-ish.” </span><a data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//community.cookinglight.com/showthread.php%3Ft%3D23157"><span data-dcnode-id="915" instrument_node="">http://community.cookinglight.com/showthread.php?t=23157</span></a><span data-dcnode-id="913" instrument_node="">Vanity Fair, March 2009 put it at the corner of Wilshire and La Cienega</span></p><span data-dcnode-id="911" instrument_node="">

</span><p data-dcnode-id="885"><strong data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Don the Beachcomber</span></strong><span data-dcnode-id="897" instrument_node="">– 1727 North McCadden Place, Hollywood in 1933 after the repeal of Prohibition. Owner Ernest Raymond Beaumont-Gantt’s original location was in a Hollywood hotel but he and his girlfriend Cora Irene Sund got the money together to move it to McCadden in 1937. They divorced in 1940 but continued to work together until they sold it in 1958 to Joe Drown owner of the Bel-Air Hotel. The original Don’s was demolished in 1987Invented the Mai Tai and the Zombie.</span><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nfo.net/usa/niteclub.htm"><span data-dcnode-id="896" instrument_node="">http://nfo.net/usa/niteclub.htm</span></a><span data-dcnode-id="894" instrument_node=""> f</span><a data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.answers.com/topic/don-the-beachcomber"><span data-dcnode-id="893" instrument_node="">http://www.answers.com/topic/don-the-beachcomber</span></a><span data-dcnode-id="891" instrument_node=""> </span><a data-dcnode-id="889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Don_the_Beachcomber"><span data-dcnode-id="890" instrument_node="">http://en.wikipedia.org/wiki/Don_the_Beachcomber</span></a><span data-dcnode-id="888" instrument_node="">See also 40/111, and 41/31All through the 1930s and ’40s, Sunset Strip was Ground Zero for night time excitement. The Strip, a 1.5 mile stretch of Sunset Boulevard between Laurel Canyon Boulevard and Doheny Drive, came to symbolize the Glamour and Glitz of Hollywood. The Clubs usually had a ‘tropical’ theme; among which were the ‘Zamboanga South Seas Club’ (3828 W. Slauson), ‘Don’s Beachcomber’, and Don Dickerman’s ‘The Pirates Den’. These places were populated by press agents, newspaper and magazine reporters, Power brokers, Stars and Starlets, and those who got a vicarious thrill by associating with the famous. </span><a data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nfo.net/usa/niteclub.htm"><span data-dcnode-id="887" instrument_node="">http://nfo.net/usa/niteclub.htm</span></a></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="878"><a data-dcnode-id="880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/image047.jpg"><img alt="Don the Beachcomber in the 1950s" class="aligncenter wp-image-210 size-full jetpack-lazy-image" data-attachment-id="210" data-comments-opened="1" data-dcnode-id="883" data-image-caption="<p>Don the Beachcomber in the 1950s</p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;}" data-image-title="Don the Beachcomber in the 1950s" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image047.jpg?fit=490%2C303&amp;ssl=1" data-lazy-sizes="(max-width: 490px) 100vw, 490px" data-lazy-src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/image047.jpg?resize=490%2C303&amp;is-pending-load=1" data-lazy-srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image047.jpg?w=490&amp;ssl=1 490w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image047.jpg?resize=300%2C185&amp;ssl=1 300w" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image047.jpg?fit=300%2C185&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image047.jpg?fit=490%2C303&amp;ssl=1" data-orig-size="490,303" data-permalink="https://martinturnbull.com/hollywood-places/image047/" data-recalc-dims="1" height="303" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/image047.jpg%3Fresize%3D490%252C303&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Don the Beachcomber in the 1950s" width="490"><noscript data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">&lt;img data-attachment-id="210" data-permalink="https://martinturnbull.com/hollywood-places/image047/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image047.jpg?fit=490%2C303&amp;amp;ssl=1" data-orig-size="490,303" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="Don the Beachcomber in the 1950s" data-image-description="" data-image-caption="&amp;lt;p&amp;gt;Don the Beachcomber in the 1950s&amp;lt;/p&amp;gt;
" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image047.jpg?fit=300%2C185&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image047.jpg?fit=490%2C303&amp;amp;ssl=1" loading="lazy" class="aligncenter wp-image-210 size-full" title="Don the Beachcomber in the 1950s" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/image047.jpg?resize=490%2C303" alt="Don the Beachcomber in the 1950s" width="490" height="303" srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image047.jpg?w=490&amp;amp;ssl=1 490w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image047.jpg?resize=300%2C185&amp;amp;ssl=1 300w" sizes="(max-width: 490px) 100vw, 490px" data-recalc-dims="1" /&gt;</span></noscript></a><span data-dcnode-id="879" instrument_node="">Hollywood’s first tropical restaurant…came complete with artificial rainstorms designed to romantically pitter patter down on the corrugated iron roof. … from the outside the place was surrounded in a forest of bamboo, save for a small sign that was intentionally made difficult to read – the underlying message being that if you didn’t know where it was, you didn’t belong. Small dining rooms, which bore names like “The Black Hole of Calcutta”, and “The Cannibal Room” were decorated with palm trees, bananas, coconuts, sea shells, shields, shark’s jaws, headdresses and carved wooden gods.</span></p><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">At one point the restaurant included a Chinese grocery store, run shop, gift shop, and lei shop. The island-shaped dining tables were made of varnished wood, and more than a few glamorous creatures received proposals of one sort or another in the provocative, candle-illuminated rooms. Certainly helping things along were Don’s intoxicating rum drinks: Missionary’s Downfall, Vicious Virgin, Cobra’s Fang and the notorious Zombie. The food was largely Chinese oriented. (49/41)</span></p><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Special ivory chopsticks with names hand etched on them were made for special customers. (p23/120)</span></p><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="866"><span data-dcnode-id="870" instrument_node="">As listed in the ‘Los Angeles Guide, 1941’ : “</span><strong data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Beachcomber Cafe,</span></strong><span data-dcnode-id="867" instrument_node=""> 1727 N. McCadden Pl. Prices are slightly stiff. Specializes in Oriental food and drinks. Frequented by the many lesser Hollywood actors.”</span></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="859"><strong data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Don Dickerman’s The Pirate Den </span></strong><span data-dcnode-id="862" instrument_node="">– </span><a data-dcnode-id="860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nfo.net/usa/niteclub.htm"><span data-dcnode-id="861" instrument_node="">http://nfo.net/usa/niteclub.htm</span></a></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="852"><strong data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Don Lee Mutual Broadcasting Building</span></strong><span data-dcnode-id="855" instrument_node="">, 1313 North Vine Street, Hollywood. An 118,000 square-foot building that was officially dedicated on August 18, 1948 as a state-of-the-art broadcast facility for radio and television. It was the culmination of a broadcasting dynasty begun by Don Lee, who held the franchises for California and Nevada Cadillac dealerships, fostered Los Angeles radio, and was a leading pioneer of television on the West Coast. For a more detail history of the building, see </span><a data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hollywoodheritage.org/newsarchive/summer01/Lee.html"><span data-dcnode-id="854" instrument_node="">http://www.hollywoodheritage.org/newsarchive/summer01/Lee.html</span></a></p><span data-dcnode-id="851" instrument_node="">

</span><p data-dcnode-id="827" style="text-align: center;"><b data-dcnode-id="828"><a data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/dreamland-roller-skating-rink.jpg"><img alt="Dreamland roller skating rink" class="wp-image-4564 aligncenter jetpack-lazy-image" data-attachment-id="4564" data-comments-opened="1" data-dcnode-id="832" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;}" data-image-title="dreamland roller skating rink" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/dreamland-roller-skating-rink.jpg?fit=640%2C389&amp;ssl=1" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/dreamland-roller-skating-rink.jpg?resize=640%2C389&amp;is-pending-load=1" data-lazy-srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/dreamland-roller-skating-rink.jpg?w=789&amp;ssl=1 789w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/dreamland-roller-skating-rink.jpg?resize=300%2C182&amp;ssl=1 300w" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/dreamland-roller-skating-rink.jpg?fit=300%2C182&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/dreamland-roller-skating-rink.jpg?fit=789%2C480&amp;ssl=1" data-orig-size="789,480" data-permalink="https://martinturnbull.com/hollywood-places/dreamland-roller-skating-rink/" data-recalc-dims="1" height="389" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/dreamland-roller-skating-rink.jpg%3Fresize%3D640%252C389&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="border: 1px solid black;" title="Dreamland roller skating rink" width="640"><noscript data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">&lt;img data-attachment-id="4564" data-permalink="https://martinturnbull.com/hollywood-places/dreamland-roller-skating-rink/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/dreamland-roller-skating-rink.jpg?fit=789%2C480&amp;amp;ssl=1" data-orig-size="789,480" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="dreamland roller skating rink" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/dreamland-roller-skating-rink.jpg?fit=300%2C182&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/dreamland-roller-skating-rink.jpg?fit=640%2C389&amp;amp;ssl=1" loading="lazy" class="wp-image-4564 aligncenter" style="border: 1px solid black;" title="Dreamland roller skating rink" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/dreamland-roller-skating-rink.jpg?resize=640%2C389" alt="Dreamland roller skating rink" width="640" height="389" srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/dreamland-roller-skating-rink.jpg?w=789&amp;amp;ssl=1 789w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/dreamland-roller-skating-rink.jpg?resize=300%2C182&amp;amp;ssl=1 300w" sizes="(max-width: 640px) 100vw, 640px" data-recalc-dims="1" /&gt;</span></noscript></a></b></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="820"><strong data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Dresden Room</span></strong><span data-dcnode-id="823" instrument_node=""> – 1760 North Vermont Avenue. Phone: NOrmandy 4-5170. </span><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blackdahlia1946.blogspot.com/2007/01/hollywood-19591963_22.html"><span data-dcnode-id="822" instrument_node="">http://blackdahlia1946.blogspot.com/2007/01/hollywood-19591963_22.html</span></a></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="818" instrument_node="">Was the</span><strong data-dcnode-id="816"><span data-dcnode-id="817" instrument_node=""> Pucci Café</span></strong><span data-dcnode-id="815" instrument_node=""> before that, which opened in 1937 and in the 1950s became the Dresden Room. </span><a data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.latimemachines.com/new_page_5.htm"><span data-dcnode-id="814" instrument_node="">http://www.latimemachines.com/new_page_5.htm</span></a></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="801"><strong data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Drucker’s Barber Shop&nbsp;</span></strong><span data-dcnode-id="808" instrument_node="">founded by Harry Drucker in 1936,&nbsp;when&nbsp;Billy Wilkerson urged Drucker to move from NY to LA. Original location on Beverly Drive, and became known for creating the “invisible hair&nbsp;cut.” Drucker’s client list were Tyrone Power, Danny Kaye, Spencer Tracy, Orson Welles, George Raft, Lew Wasserman, Clark Gable, Spencer Tracy, Frank Sinatra, Bugsy Siegel, and&nbsp;Ronald Reagan. In 1959, moved to&nbsp;9740 Wilshire Boulevard at Linden Dr, Beverly Hills.&nbsp;William Gornik owned the legendary barbershop, </span><strong data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Rothchild’s</span></strong><span data-dcnode-id="805" instrument_node="">, taking over in the late 1970’s. Rothchild’s clients were equally as impressive, from Danny Thomas, Tony Curtis, Peter Lawford, and Mickey Cohen. They combined the two shops in 1989 ending a long term rivalry to start </span><strong data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Gornik and Drucker</span></strong><span data-dcnode-id="802" instrument_node="">. In 2009, the store moved into the Montage Beverly Hills Hotel.</span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="796"><strong data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Dublin’s Irish Pub</span></strong><span data-dcnode-id="797" instrument_node=""> – 8240 Sunset Boulevard on the Sunset Strip</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="791"><img alt="Dublin’s Irish Pub – 8240 Sunset Boulevard on the Sunset Strip " class="aligncenter size-large wp-image-11220 jetpack-lazy-image" data-attachment-id="11220" data-comments-opened="1" data-dcnode-id="794" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Dublin’s Irish Pub – 8240 Sunset Boulevard on the Sunset Strip" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Dublins-8240-Sunset-Blvd.jpg?fit=640%2C457&amp;ssl=1" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Dublins-8240-Sunset-Blvd-1024x731.jpg?resize=640%2C457&amp;is-pending-load=1" data-lazy-srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Dublins-8240-Sunset-Blvd.jpg?w=1024&amp;ssl=1 1024w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Dublins-8240-Sunset-Blvd.jpg?resize=300%2C214&amp;ssl=1 300w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Dublins-8240-Sunset-Blvd.jpg?resize=768%2C548&amp;ssl=1 768w" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Dublins-8240-Sunset-Blvd.jpg?fit=300%2C214&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Dublins-8240-Sunset-Blvd.jpg?fit=1024%2C731&amp;ssl=1" data-orig-size="1024,731" data-permalink="https://martinturnbull.com/hollywood-places/dublins-8240-sunset-blvd/" data-recalc-dims="1" height="457" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Dublins-8240-Sunset-Blvd-1024x731.jpg%3Fresize%3D640%252C457&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="640"><noscript data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">&lt;img data-attachment-id="11220" data-permalink="https://martinturnbull.com/hollywood-places/dublins-8240-sunset-blvd/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Dublins-8240-Sunset-Blvd.jpg?fit=1024%2C731&amp;amp;ssl=1" data-orig-size="1024,731" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"1"}" data-image-title="Dublin’s Irish Pub – 8240 Sunset Boulevard on the Sunset Strip" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Dublins-8240-Sunset-Blvd.jpg?fit=300%2C214&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Dublins-8240-Sunset-Blvd.jpg?fit=640%2C457&amp;amp;ssl=1" loading="lazy" class="aligncenter size-large wp-image-11220" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/Dublins-8240-Sunset-Blvd-1024x731.jpg?resize=640%2C457" alt="Dublin’s Irish Pub – 8240 Sunset Boulevard on the Sunset Strip " width="640" height="457" srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Dublins-8240-Sunset-Blvd.jpg?w=1024&amp;amp;ssl=1 1024w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Dublins-8240-Sunset-Blvd.jpg?resize=300%2C214&amp;amp;ssl=1 300w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/Dublins-8240-Sunset-Blvd.jpg?resize=768%2C548&amp;amp;ssl=1 768w" sizes="(max-width: 640px) 100vw, 640px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="790" instrument_node="">

</span><p data-dcnode-id="783"><strong data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Duke’s</span></strong><span data-dcnode-id="784" instrument_node="">, 10369 Santa Monica Blvd, Century City</span></p><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="781" instrument_node="">The</span><strong data-dcnode-id="779"><span data-dcnode-id="780" instrument_node=""> Dunbar Hotel</span></strong><span data-dcnode-id="778" instrument_node=""> – By the MID-1940s, Central Ave had become </span><em data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">the</span></em><span data-dcnode-id="775" instrument_node=""> jazz thoroughfare of the West…On Central itself there were dozens of legit nightclubs, including </span><strong data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">the Brown Bomber</span></strong><span data-dcnode-id="772" instrument_node="">, </span><strong data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Bird in the Basket</span></strong><span data-dcnode-id="769" instrument_node="">, and the lounge at the </span><strong data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Dunbar Hotel</span></strong><span data-dcnode-id="766" instrument_node=""> where pianist/singer Nellie Lutcher held court. And there were the so-called breakfast clubs – after-hour places where you brought your own booze and danced past sunrise. (82/54) —see also “Central Avenue”</span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="752"><strong data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Dyas-Carlton Café, </span></strong><span data-dcnode-id="761" instrument_node="">northwest corner of Wilshire and La Brea. “Built in 1925, the Dyas-Carlton Cafe was located on the northwest corner of Wilshire and La Brea. Designed in a Spanish architectural style by architects and builders Gable and Wyant, the restaurant seated 250 people.” </span><a data-dcnode-id="757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//miraclemilela.com/the-miracle-mile/historical-photos/dyas-cafe/"><span data-dcnode-id="760" instrument_node="">https://miraclemilela.com/the-miracle-mile/historical-photos/dyas-cafe/</span><br data-dcnode-id="759"><span data-dcnode-id="758" instrument_node="">
