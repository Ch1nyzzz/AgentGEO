0","shutter_speed":"0","title":""}" data-image-title="Chapman&amp;#8217;s Fancy Ice Cream" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/LAChapmansCD.jpg?fit=300%2C201&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/LAChapmansCD.jpg?fit=640%2C430&amp;amp;ssl=1" loading="lazy" class="aligncenter wp-image-5229" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/LAChapmansCD.jpg?resize=452%2C318" alt="Chapman's Fancy Ice Cream" width="452" height="318" data-recalc-dims="1" /&gt;</span></noscript></a></td></tr></tbody></table><span data-dcnode-id="1976" instrument_node="">
</span><p data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1973" instrument_node="">
</span><p data-dcnode-id="1966"><strong data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">Chapman Park Hotel and Bungalows</span></strong><span data-dcnode-id="1970" instrument_node=""> – 3401 Wilshire Boulevard – Built in 1936 and torn down in the late 60s. Their cocktail lounge was called </span><strong data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Zephyr Room</span></strong><span data-dcnode-id="1967" instrument_node="">.</span></p><span data-dcnode-id="1965" instrument_node="">
</span><p data-dcnode-id="1959"><span data-dcnode-id="1964" instrument_node="">See also: </span><a data-dcnode-id="1960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.martinturnbull.com/2014/04/22/the-chapman-park-hotel-bungalows-3401-wilshire-boulevard-los-angeles/" rel="noopener noreferrer" target="_blank" title="The Chapman Park Hotel &amp; Bungalows, 3401 Wilshire Boulevard, Los Angeles"><strong data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">https://www.martinturnbull.com/2014/04/22/the-chapman-park-hotel-bungalows-3401-wilshire-boulevard-los-angeles/</span></strong><span data-dcnode-id="1961" instrument_node=""> </span></a></p><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">When first opened in June 1929, the Chapman Park Market had a three-day celebration where thousands gathered to shop in the 28 “marts,” use the post office, or watch the Russian Dancers and orchestra. Besides the markets and post office, the Chapman Plaza included the Chapman Park Hotel that has now been demolished and replaced with the Equitable Plaza office building. Like Bullocks Wilshire, the Chapman Park Market was one of the first business places built with the car in mind. The Market had a 500-car parking lot and a drive through entrance to the main square. Additionally, at it’s opening, the fact that refrigerated rooms are available to every store in the Market was considered to be one of the highest conveniences available to those in the food business.</span></p><span data-dcnode-id="1955" instrument_node="">
</span><p data-dcnode-id="1951"><strong data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">Chatterbox Café – </span></strong><span data-dcnode-id="1952" instrument_node="">4009 W. Olympic Blvd, Los Angeles, Phone: WE 6-9680</span></p><span data-dcnode-id="1950" instrument_node="">
</span><p data-dcnode-id="1945"><a data-dcnode-id="1946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/chansens1940color.jpg"><img alt="Chansen's, 1940" class="aligncenter wp-image-584 size-full jetpack-lazy-image" data-attachment-id="584" data-comments-opened="1" data-dcnode-id="1949" data-image-caption="<p>Chansen’s, 1940</p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;}" data-image-title="Chansen’s, 1940" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/chansens1940color.jpg?fit=300%2C221&amp;ssl=1" data-lazy-src="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/chansens1940color.jpg?resize=300%2C221&amp;is-pending-load=1#038;ssl=1" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/chansens1940color.jpg?fit=300%2C221&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/chansens1940color.jpg?fit=300%2C221&amp;ssl=1" data-orig-size="300,221" data-permalink="https://martinturnbull.com/hollywood-places/chansens1940color/" data-recalc-dims="1" height="221" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/chansens1940color.jpg%3Fresize%3D300%252C221%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Chansen's, 1940" width="300"><noscript data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">&lt;img data-attachment-id="584" data-permalink="https://martinturnbull.com/hollywood-places/chansens1940color/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/chansens1940color.jpg?fit=300%2C221&amp;amp;ssl=1" data-orig-size="300,221" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="Chansen&amp;#8217;s, 1940" data-image-description="" data-image-caption="&amp;lt;p&amp;gt;Chansen&amp;#8217;s, 1940&amp;lt;/p&amp;gt;
" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/chansens1940color.jpg?fit=300%2C221&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/chansens1940color.jpg?fit=300%2C221&amp;amp;ssl=1" loading="lazy" class="aligncenter wp-image-584 size-full" title="Chansen's, 1940" src="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/chansens1940color.jpg?resize=300%2C221&amp;#038;ssl=1" alt="Chansen's, 1940" width="300" height="221" data-recalc-dims="1" /&gt;</span></noscript></a></p><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1937"><strong data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">Chasen’s</span></strong><span data-dcnode-id="1941" instrument_node=""> – 9039 Beverly Boulevard. Opened 13DEC1936 as Chasen’s Southern Barbecue Pit. (27/128) </span><a data-dcnode-id="1939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.seeing-stars.com/Dine2/Chasens.shtml"><span data-dcnode-id="1940" instrument_node="">http://www.seeing-stars.com/Dine2/Chasens.shtml</span></a><span data-dcnode-id="1938" instrument_node=""> by Dave Chasen and his partner Joe Cook who had been advanced $3000 by New Yorker editor Harold Ross. It had 6 tables, an8-stool counter and a 6-stool bar and dispensed chili at 25 cents a bowl and a couple of BBQ ribs for 35 cents. Regulars included WC Fields, Nunnally Johnson, Frank Capra, Buddy Ebsen, Gene Fowler, Jimmy Cagney and Pat O’Brien. Within a year the place evolved from chili parlor to full-fledged restaurant with 35 items with waiters in black and white. Inventor of the Shirley Temple after an incident when Shirley was there and got upset because she wanted a drink just like her parents. In later years it was expended to add a sauna and a barber in the back. (40/151)</span></p><span data-dcnode-id="1936" instrument_node="">
</span><p data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">Chasen’shad good steaks and garlic bread. Bill Grady – director of casting at MGM had his own table, as did Ronald Colman, Leslie Howard &amp; Cary Grant. One of L.A.’s top three waiters – Bruno – worked there. (1/81)</span></p><span data-dcnode-id="1933" instrument_node="">
</span><p data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">Also: 41/318</span></p><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">From “Chasen’s” Where Hollywood lives” by Betty Goodwin (book #48)</span></p><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Frank Capra came up with the name —the original structure was barely big enough to hold 6 tables, an 8-stool counter and tiny kitchen. P6</span></p><span data-dcnode-id="1924" instrument_node="">
</span><p data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">The bean field where Dave’s glorious stucco shack stood proved an inspired choice. P6</span></p><span data-dcnode-id="1921" instrument_node="">
</span><p data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">At first the menu consisted of BBQd spareribs (35c), chili (25c) and booze (35c). By comparison, drinks ran from 60c to $1.50 at the posh Trocadero. P7</span></p><span data-dcnode-id="1918" instrument_node="">
</span><p data-dcnode-id="1913"><span data-dcnode-id="1917" instrument_node="">As business improved, East Coaster exiles such as Nunnally Johnson, Charles MacArthur, James Thurber, Robert Benchley, Russel Crouse and Alexander Woollcott became regulars, no doubt at the urging of Harold Ross (</span><em data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">New Yorker</span></em><span data-dcnode-id="1914" instrument_node=""> editor). Dorothy Parker should get one free drink a night, Ross directed Dave.) p7</span></p><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Within a few months, Dave enlarged the room and his menu, since patrons had begun to tire of a steady diet of chili and ribs. P7</span></p><span data-dcnode-id="1909" instrument_node="">
</span><p data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">The menu increased to 35 items. P9</span></p><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">At around the same time, Harold Ross suggested a name change and it was, to just “Chasen’s”. p9</span></p><span data-dcnode-id="1903" instrument_node="">
</span><p data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">By the war years Chasen’s had attained such a reputation as a Hollywood hot spot that it was difficult to get a table. The biggest stars of the day felt welcome there, including Charlie Chaplin, William Powell,, Robert Taylor, Joan Blondell, Dick Powell, James Cagney, Joan Bennett, Joe DiMaggio, J. Edgar Hoover. P11</span></p><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">Tommy Gallagher joined Chasen’s in 1947 as a waiter and become one of the captains of the prestigious front room. P12</span></p><span data-dcnode-id="1897" instrument_node="">
</span><p data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">In the early 1940s urbane actor Paul Henreid arrived in Hollywood and proclaimed the food awful except for 3 places: Perino’s, Romanoff’s and Chasen’s. p12…</span></p><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Dave virtually lived and breathed the restaurant. He had small quarters there (his only residence) and started his days at 4am at the produce and meat markets. P14…</span></p><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">When the doors opened for dinner, he greeted guests in his trademark horn-rimmed glasses, bow tie and suit lined in red silk, a luxury he promised himself after admiring the red silk in a Chinese dance act. P14</span></p><span data-dcnode-id="1888" instrument_node="">
</span><p data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Another acquaintance from Dave’s acting days, Billy Grady Jnr, a former Broadway agent, become one of Chasen’s most devoted customers, as head of casting at MGM, Grady was one of the most powerful figures in Hollywood and, for decades, he had a six-days-a-week standing reservation (Chasen’s was closed on Mondays, except for private parties). To make sure he got the table he wanted, Grady enlisted studio carpenters to build his own booth along the wall outside one of the entrances to the front room. Grady thought of it as his own private office. “I did more business there, and I signed more actors there than anywhere else,” Grady said. On the rare night he dined elsewhere, Grady made sure he patrons occupying his booth knew how fortunate they were. He hung his photograph there, along with a plaque reading: “You are using this booth through the courtesy of Billy (Square Deal) Grady. P.S. But strictly on your own.” Grady’s dinner companions naturally included stars like Clark Gable and Mickey Rooney. But about 4 nights a week, his eating partner was Jimmy Stewart, whom Grady first brought out to Hollywood. Stewart wooed his future wife Gloria there, his 1949 bachelor party there which was attended by Spencer Tracy, David Niven, Jack Benny, Lew Wasserman and others. His favorite meal was the thinly sliced Calf’s Liver and the Hobo Steak. P14… (also 68/79)</span></p><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Bob Hope rode through the front door on horseback, probably to promote his western farce “The Paleface” (1948)</span></p><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">In 1939 soon after he arrived in Hollywood from England to direct “Rebecca”, Hitchcock was introduced to Chasen’s by Clark Gable and Carole Lombard. Hitchcock and his wife were so taken with Chasen’s that their Thursday night dinners, always at booth #2 beneath a photo of their daughter Patricia, became a 40 year ritual. P21</span></p><span data-dcnode-id="1879" instrument_node="">
</span><p data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Of all of Chasen’s regulars, Orson Welles was the biggest – he ordered double orders of everything. Sinatra was the smallest – he ordered half orders. Howard Hughes was the simplest – typically dined on tomato juice, butterflied steak and salad. P21</span></p><span data-dcnode-id="1876" instrument_node="">
</span><p data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">Chasen’s grew dining room by dining room, at various times in included a barber shop, a TV room, a steam room and shower so those arriving from the east could come directly from the train station or airport, refresh themselves, have a good meal and then go home. P25</span></p><span data-dcnode-id="1873" instrument_node="">
</span><p data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">Dave Chasen married Maude in Las Vegas on 13SEP1942 p27</span></p><span data-dcnode-id="1870" instrument_node="">
</span><p data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">It was Elizabeth Taylor while filming Cleopatra in Rome who made Chasen’s chili famous when she ordered it shipped to Rome, and was willing to pay $100 (around $700 in today’s money) for the shipping. P30</span></p><span data-dcnode-id="1867" instrument_node="">
</span><p data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">In 1942 Chasen took over the running of Saks Fifth Avenue’s rooftop restaurant on top of their Wilshire Boulevard store, changing the name from “Terrace Snack Bar” to “Chasen’s Atop Saks Fifth Avenue.” Following that he started concessions at the Agua Caliente race track in Tijuana and El Capitan Theater in Hollywood. P35</span></p><span data-dcnode-id="1864" instrument_node="">
</span><p data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">In 1939, when Howard Hughes bought Transcontinental and Western Air (the precursor to TWA) he asked Dave to make it the first airline to serve passengers hot food – on good china and linens – instead of the usual boxed sandwiches.</span></p><span data-dcnode-id="1861" instrument_node="">
</span><p data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">14FEB1946 – Howard Hughes pilots the first TWA Constellation flight from NYC to LAX. Aboard are Cary Grant, Lana Turner, Alfred Hitchcock, Bugsy Seigel, Edward G. Robinson and Paulette Goddard. (21/182)) Also William Powell and his wife Diana (aka “Mousie”), Burgess Meredith. Also aboard was Dave Chasen. About 10 minutes before landing, the plane dropped 20,000 feet because of inclement weather and flailing winds. When Hughes asked for a drink, his passengers grew even more alarmed because Hughes was a teetotaler. Dave brought out an 85yo bottle of vodka. To Dave’s horror, Hughes poured the entire bottle on a piece of cloth and used it to wipe the condensation from the windshield. (48/36)</span></p><span data-dcnode-id="1858" instrument_node="">
</span><p data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">Hughes selected Chasen’s to cater the party for the launch of the Spruce Goose for its one and only flight on 02NOV1947. p37</span></p><span data-dcnode-id="1855" instrument_node="">
</span><p data-dcnode-id="1851"><a data-dcnode-id="1853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.filmsofthegoldenage.com/foga/1996/winter/hollywoodhotspots.shtml"><span data-dcnode-id="1854" instrument_node="">http://www.filmsofthegoldenage.com/foga/1996/winter/hollywoodhotspots.shtml</span></a><span data-dcnode-id="1852" instrument_node=""> says &nbsp;In classic Hollywood fashion, Chasen’s rose from humble beginnings to become the quintessential Beverly Hills restaurant.&nbsp;In 1936, ex-vaudevillian Dave Chasen borrowed $3500 from Harold Ross, editor of the New Yorker, and opened a little barbecue shack called The Southern Pit on Beverly Boulevard. It didn’t take long for the locals to discover his legendary chili and Hobo Steak, and within a few years The Southern pit had metamorphosed into Chasen’s, an imposing two-story complex with a recreation room, a steam bath, and a vastly upscaled menu.</span></p><span data-dcnode-id="1850" instrument_node="">
</span><p data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Chasen took good care of his regulars. When a pregnant Lana Turner had trouble squeezing into a booth, he had part of the table sawed off to accommodate her. He also had a special booth built for MGM casting director Billy Grady, who lorded over his harem of hopefuls there every night. Since Chasen’s was off-limits&nbsp;to autograph hounds and the press, the stars felt they could let their hair down, and the ensuing carnival&nbsp;atmosphere contrasted sharply with the restaurant’s conservative trappings. Rubber-legged Ray Bolger would dance around the dining room, James Cagney would sing Yiddish dialect songs, Jimmy Durante would perform some impromptu schtick, and Frank Morgan, The Wizard of Oz himself, would climb up on the bar and do a striptease. W. C. Fields and Gregory La Cava could usually be found in the back, playing ping pong and needling each other. The privileged were allowed to hang out there as long as they wanted. A poker game involving screenwriters Nunnally Johnson, Charles MacArthur, and Joel Sayre once went on until 4 AM. When a weary Chasen announced he was closing up for the night, the group tossed him out into the rain and locked the door.</span></p><span data-dcnode-id="1847" instrument_node="">
</span><p data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">Chasen’s habitue Orson Welles staged more than a few scenes here. In a notorious 1939 blowout, he hurled a flaming&nbsp;serving dish at soon-to-be-ex-associate John Houseman, missing his target but nearly burning the place down. On another night Welles was accosted here by Ward Bond, who was so sick of the hype surrounding Citizen Kane that he snipped off Welles’ tie with a pair of scissors. This time Welles was discreet enough to invite his nemesis into the parking lot.</span></p><span data-dcnode-id="1844" instrument_node="">
</span><p data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">When Chasen was drafted during WWII, he temporarily handed the reins over to his wife, Maude. She became a permanent fixture at the restaurant, running the place successfully long after Dave Chasen’s death in 1973. In the ’90s it seemed like the last bastion of Old Hollywood, bringing in such legends as Jimmy Stewart, Gregory Peck, Frank Sinatra, Elizabeth Taylor, Buddy Rogers, Fay Wray, Margaret O’Brien, Rod Steiger, and Ronald Reagan. (The former Prez has a soft spot for this place; it was here in 1952 that he proposed to actress Nancy Davis). When pressure from the inevitable developers forced Chasen’s to close on April 1, 1995, many of them turned out to bid the landmark a fond farewell.</span></p><span data-dcnode-id="1841" instrument_node="">
</span><p data-dcnode-id="1837"><strong data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">Chateau Elycee</span></strong><span data-dcnode-id="1838" instrument_node=""> – 5930 Franklin Ave. Opening in 1927 and built by Eleanor Ince, the widow of film pioneer Thomas Ince. Operated like a hotel with daily maid service and three meals were provided. Clark Gable and Carole Lombard, Humphrey Bogart, Errol Flynn and Ginger Rogers lived here while Mrs. Ince owned it. (61/81)</span></p><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1829"><strong data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">Chateau Marmont</span></strong><span data-dcnode-id="1833" instrument_node=""> – 8221 Sunset Boulevard. </span><strong data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">Tel. OL. 6-1010. </span></strong><span data-dcnode-id="1830" instrument_node="">Opened 01FEB1929, then sold in 1931 for $750,000 to Albert E. Smith, the co-founder of Vitaphone who was very Hollywood conscious. (61/81)</span></p><span data-dcnode-id="1828" instrument_node="">
</span><p data-dcnode-id="1803"><strong data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">Chee-Chee’s – </span></strong><span data-dcnode-id="1825" instrument_node="">The </span><strong data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">House of Ivy </span></strong><span data-dcnode-id="1822" instrument_node="">on Cahuenga was very popular in the 50s and 60s…There was also the </span><strong data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Lafayette</span></strong><span data-dcnode-id="1819" instrument_node="">, which was just across the way from it. And then there was the </span><strong data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Open Door, </span></strong><span data-dcnode-id="1816" instrument_node="">which was on the corner of Selma and Ivar…I also remember the </span><strong data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">Cherokee House</span></strong><span data-dcnode-id="1813" instrument_node=""> in Hollywood…and </span><strong data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">Chee Chee’s </span></strong><span data-dcnode-id="1810" instrument_node="">on Figueroa…There were some others too like the </span><strong data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">Carousel</span></strong><span data-dcnode-id="1807" instrument_node="">, in Venice. That was one of the toughest….In the 30s and 40s it was considered quite chic to drop in at an after-hours “speakeasy” knows as </span><strong data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">Brothers</span></strong><span data-dcnode-id="1804" instrument_node="">, in the Central Ave area, near the Hotel Dunbar, where the city’s African-American nightlife flourished.&nbsp; (11/37)</span></p><span data-dcnode-id="1802" instrument_node="">
</span><p data-dcnode-id="1795"><strong data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Cherokee House – </span></strong><span data-dcnode-id="1799" instrument_node="">By the late 1950s, despite continuing hostility and harassment of the LAPD, a number of gay establishments had sprung up: the </span><strong data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">House of Ivy, the Cherokee House, Maxwell’s, The Black Cat, the “356” </span></strong><span data-dcnode-id="1796" instrument_node="">bar downtown. Most gay bars had existed outside Los Angeles city limits where county sheriffs were traditionally far more tolerant. (10/346)</span></p><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1771"><span data-dcnode-id="1793" instrument_node="">The </span><strong data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">House of Ivy </span></strong><span data-dcnode-id="1790" instrument_node="">on Cahuenga was very popular in the 50s and 60s…There was also the </span><strong data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">Lafayette</span></strong><span data-dcnode-id="1787" instrument_node="">, which was just across the way from it. And then there was the </span><strong data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Open Door, </span></strong><span data-dcnode-id="1784" instrument_node="">which was on the corner of Selma and Ivar…I also remember the </span><strong data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Cherokee House</span></strong><span data-dcnode-id="1781" instrument_node=""> in Hollywood…and </span><strong data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">Chee Chee’s </span></strong><span data-dcnode-id="1778" instrument_node="">on Figueroa…There were some others too like the </span><strong data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">Carousel</span></strong><span data-dcnode-id="1775" instrument_node="">, in Venice. That was one of the toughest….In the 30s and 40s it was considered quite chic to drop in at an after-hours “speakeasy” knows as </span><strong data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">Brothers</span></strong><span data-dcnode-id="1772" instrument_node="">, in the Central Ave area, near the Hotel Dunbar, where the city’s African-American nightlife flourished.&nbsp; (11/37)</span></p><span data-dcnode-id="1770" instrument_node="">
</span><p data-dcnode-id="1760"><b data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">Chi-Chi</span></b><span data-dcnode-id="1767" instrument_node=""> was in the old </span><b data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Sardi’s</span></b><span data-dcnode-id="1764" instrument_node=""> building at 6315 Hollywood Boulevard, from probably the mid-1940s. Later known as </span><strong data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">Eddie’s</span></strong><span data-dcnode-id="1761" instrument_node=""> which featured Dixieland jazz.</span></p><span data-dcnode-id="1759" instrument_node="">

</span><p data-dcnode-id="1727"><strong data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">Christie Hotel </span></strong><span data-dcnode-id="1728" instrument_node="">– 6724 Hollywood Boulevard (at the corner of McCadden, now owned by the Church of Scientology.) Built in 1922 to provide a luxurious inn for movie folk. Owned by the same Christies who owned the Nestor movie studios, it was the very first hotel in the community to offer rooms that each came with a private bath, an innovation that was a tremendous luxury at the time. (66/35)(108/61)</span></p><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1716"><span data-dcnode-id="1725" instrument_node="">Used to be the </span><strong data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Glidden Hotel</span></strong><span data-dcnode-id="1722" instrument_node="">. In 1945, became th</span><strong data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">e Drake Hotel</span></strong><span data-dcnode-id="1719" instrument_node="">. Later still, it became the</span><strong data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Hollywood Inn.</span></strong></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1710"><a data-dcnode-id="1711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/glidden-hotel.jpg"><img alt="Glidden Hotel, Hollywood Blvd (later, Christie Hotel)" class="size-full wp-image-3763 aligncenter jetpack-lazy-image" data-attachment-id="3763" data-comments-opened="1" data-dcnode-id="1714" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;}" data-image-title="glidden-hotel" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/glidden-hotel.jpg?fit=640%2C568&amp;ssl=1" data-lazy-src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/glidden-hotel.jpg?resize=405%2C537&amp;is-pending-load=1" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/glidden-hotel.jpg?fit=300%2C266&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/glidden-hotel.jpg?fit=960%2C852&amp;ssl=1" data-orig-size="960,852" data-permalink="https://martinturnbull.com/hollywood-places/glidden-hotel/" data-recalc-dims="1" height="537" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/glidden-hotel.jpg%3Fresize%3D405%252C537&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="border: 1px solid black;" title="Glidden Hotel, Hollywood Blvd (later, Christie Hotel)" width="405"><noscript data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">&lt;img data-attachment-id="3763" data-permalink="https://martinturnbull.com/hollywood-places/glidden-hotel/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/glidden-hotel.jpg?fit=960%2C852&amp;amp;ssl=1" data-orig-size="960,852" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="glidden-hotel" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/glidden-hotel.jpg?fit=300%2C266&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/glidden-hotel.jpg?fit=640%2C568&amp;amp;ssl=1" loading="lazy" class="size-full wp-image-3763 aligncenter" style="border: 1px solid black;" title="Glidden Hotel, Hollywood Blvd (later, Christie Hotel)" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/glidden-hotel.jpg?resize=405%2C537" alt="Glidden Hotel, Hollywood Blvd (later, Christie Hotel)" width="405" height="537" data-recalc-dims="1" /&gt;</span></noscript></a></p><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1705"><strong data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">The Chillis Club – </span></strong><span data-dcnode-id="1706" instrument_node="">620 1/2 W. 6th St, Los Angeles. Phone TR 7946</span></p><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1700"><strong data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Ching How Restaurant, </span></strong><span data-dcnode-id="1701" instrument_node="">11386 Ventura Blvd, North Hollywood. Phone Sunset 2-8606. James Wong Howe, Hollywood’s Ace Cameraman. Jimmy serves you with the country’s most delicious Chinese food. Tropical and Chinese drinks. Five minutes from Hollywood.</span></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1692"><strong data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Chit Chat Cocktail Lounge – </span></strong><span data-dcnode-id="1696" instrument_node="">2619 West 6</span><sup data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">th</span></sup><span data-dcnode-id="1693" instrument_node=""> St, Downtown L.A. Phone Dunkirk 2-9432</span></p><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1687"><strong data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Cinderella Roof </span></strong><span data-dcnode-id="1688" instrument_node="">at 6th St and Olive St, downtown LA.</span></p><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1682"><strong data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Cinema Café – </span></strong><span data-dcnode-id="1683" instrument_node="">5925 Santa Monica Blvd (1940s)</span></p><span data-dcnode-id="1681" instrument_node="">
</span><p data-dcnode-id="1674"><strong data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Circle Bar (possibly aka ‘The Nest’)</span></strong><span data-dcnode-id="1678" instrument_node=""> – on Hollywood Boulevard, across the street from the Egyptian Theater. “At 12 o’clock, when everything had to be closed and emptied, everybody spilled out onto the street, that’s when we got the clue.” (66/193) </span><strong data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Circle Bar</span></strong><span data-dcnode-id="1675" instrument_node=""> – Gay bar on Hollywood Boulevard later bought by the owner of the Pickwick Bookstore. (66/260)</span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1667"><strong data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Circus Café</span></strong><span data-dcnode-id="1670" instrument_node=""> – 6656 Hollywood Boulevard, below the Screen Actors Guild offices. Opened MID 30s (?) (40/133)&nbsp; Now a church. </span><a data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.latimemachines.com/new_page_39.htm"><span data-dcnode-id="1669" instrument_node="">http://www.latimemachines.com/new_page_39.htm</span></a></p><span data-dcnode-id="1666" instrument_node="">
</span><p data-dcnode-id="1662"><strong data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Cinnabar</span></strong><span data-dcnode-id="1663" instrument_node=""> – opened in DEC’36 at the Hollywood Plaza Hotel on Vine St to compete with the Cine-Grill at the Hollywood Roosevelt. (40/150) Later became Clara Bow’s It Café&nbsp; (40/157)</span></p><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1656" style="text-align: center;"><a data-dcnode-id="1657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/cinnabar.jpg"><img alt="Cinnabar at the Hollywood Plaza Hotel on Vine St, Hollywood" class="aligncenter wp-image-4019 jetpack-lazy-image" data-attachment-id="4019" data-comments-opened="1" data-dcnode-id="1660" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;}" data-image-title="cinnabar" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cinnabar.jpg?fit=640%2C446&amp;ssl=1" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/cinnabar.jpg?resize=640%2C446&amp;is-pending-load=1" data-lazy-srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cinnabar.jpg?w=720&amp;ssl=1 720w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cinnabar.jpg?resize=300%2C209&amp;ssl=1 300w" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cinnabar.jpg?fit=300%2C209&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cinnabar.jpg?fit=720%2C502&amp;ssl=1" data-orig-size="720,502" data-permalink="https://martinturnbull.com/hollywood-places/cinnabar/" data-recalc-dims="1" height="446" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/cinnabar.jpg%3Fresize%3D640%252C446&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="border: 1px solid black;" title="Cinnabar at the Hollywood Plaza Hotel on Vine St, Hollywood" width="640"><noscript data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">&lt;img data-attachment-id="4019" data-permalink="https://martinturnbull.com/hollywood-places/cinnabar/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cinnabar.jpg?fit=720%2C502&amp;amp;ssl=1" data-orig-size="720,502" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":""}" data-image-title="cinnabar" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cinnabar.jpg?fit=300%2C209&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cinnabar.jpg?fit=640%2C446&amp;amp;ssl=1" loading="lazy" class="aligncenter wp-image-4019" style="border: 1px solid black;" title="Cinnabar at the Hollywood Plaza Hotel on Vine St, Hollywood" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/cinnabar.jpg?resize=640%2C446" alt="Cinnabar at the Hollywood Plaza Hotel on Vine St, Hollywood" width="640" height="446" srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cinnabar.jpg?w=720&amp;amp;ssl=1 720w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/cinnabar.jpg?resize=300%2C209&amp;amp;ssl=1 300w" sizes="(max-width: 640px) 100vw, 640px" data-recalc-dims="1" /&gt;</span></noscript></a></p><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1643"><b data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">Ciro’s</span></b><span data-dcnode-id="1652" instrument_node=""> – Opened 30JAN1940 by Billy Wilkerson (who also owned the Troc) on the site of the old </span><b data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Club Saville at 8433 Sunset Boulevard</span></b><span data-dcnode-id="1649" instrument_node="">, on the Sunset Strip.1942 to 1957 owned by Herman Hoover. Closed 1957. Opened in 1983 as the Comedy Store. (2/34) (16/83) Ciro’s opened up a Pompeii Room featuring a Vesuvius cocktail. (22/366) George Dolenz, a rather dashing sort of chap, was a maitre d’ at Ciro’s night club some years ago when he caught the eye of Howard Hughes and made him a movie star in the swashbuckling type roles. Then when the recession hit Hollywood, Dolenz reverted to his former calling. “Even actors have to eat,” he said. He took over a well-known Hollywood restaurant, the Marquis, and could be seen nightly at the door greeting movie profiles and producers including, at times, even Howard Hughes. (22/374) Was raided when stripper Lili St Cyr’s routine became too lewd. </span><a data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nfo.net/usa/niteclub.htm"><span data-dcnode-id="1648" instrument_node="">http://nfo.net/usa/niteclub.htm</span></a><strong data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">Ciro’s </span></strong><span data-dcnode-id="1644" instrument_node="">was run by Herman Hover. It was 10 minutes walk away from Garden of Allah. Jerry Lewis &amp; Dean Martin, Sophie Tucker, Josephine Baker performed there. (1/81)Bugsy Seigel heir Mickey Cohen was shot in the shoulder right outside Ciro’s in 1949 by a rival gangster, who killed one of Cohen’s lieutenants and wounded the US attorney general’s agent who was guarding Cohen after he’d “flipped” to the feds’ side in a mob prosecution. (8/214)</span></p><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1636"><a data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/image031.jpg"><img alt="Ciro's Nightclub, 1941" class="size-medium wp-image-202 aligncenter jetpack-lazy-image" data-attachment-id="202" data-comments-opened="1" data-dcnode-id="1641" data-image-caption="<p>Ciro’s Nightclub, 1941</p>
" data-image-description="<p>Ciro’s, a nightclub, in 1941.</p>
" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;Bruce Torrence Hollywood Historical Collection&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;Ciro's, a nightclub, in 1941.&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;PRC Publishing Limited, 2003&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;1941, Ciro's Nightclub&quot;}" data-image-title="Ciro’s Nightclub, 1941" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image031.jpg?fit=640%2C253&amp;ssl=1" data-lazy-sizes="(max-width: 489px) 100vw, 489px" data-lazy-src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/image031-300x118.jpg?resize=489%2C192&amp;is-pending-load=1" data-lazy-srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image031.jpg?resize=300%2C118&amp;ssl=1 300w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image031.jpg?resize=1024%2C404&amp;ssl=1 1024w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image031.jpg?w=1200&amp;ssl=1 1200w" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image031.jpg?fit=300%2C118&amp;ssl=1" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image031.jpg?fit=1200%2C474&amp;ssl=1" data-orig-size="1200,474" data-permalink="https://martinturnbull.com/hollywood-places/1941-ciros-nightclub/" data-recalc-dims="1" height="192" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/image031-300x118.jpg%3Fresize%3D489%252C192&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="border: 1px solid black;" title="Ciro's Nightclub, 1941" width="489"><noscript data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">&lt;img data-attachment-id="202" data-permalink="https://martinturnbull.com/hollywood-places/1941-ciros-nightclub/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image031.jpg?fit=1200%2C474&amp;amp;ssl=1" data-orig-size="1200,474" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"Bruce Torrence Hollywood Historical Collection","camera":"","caption":"Ciro&amp;#039;s, a nightclub, in 1941.","created_timestamp":"0","copyright":"PRC Publishing Limited, 2003","focal_length":"0","iso":"0","shutter_speed":"0","title":"1941, Ciro&amp;#039;s Nightclub"}" data-image-title="Ciro&amp;#8217;s Nightclub, 1941" data-image-description="&amp;lt;p&amp;gt;Ciro&amp;#8217;s, a nightclub, in 1941.&amp;lt;/p&amp;gt;
" data-image-caption="&amp;lt;p&amp;gt;Ciro&amp;#8217;s Nightclub, 1941&amp;lt;/p&amp;gt;
" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image031.jpg?fit=300%2C118&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image031.jpg?fit=640%2C253&amp;amp;ssl=1" loading="lazy" class="size-medium wp-image-202 aligncenter" style="border: 1px solid black;" title="Ciro's Nightclub, 1941" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/image031-300x118.jpg?resize=489%2C192" alt="Ciro's Nightclub, 1941" width="489" height="192" srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image031.jpg?resize=300%2C118&amp;amp;ssl=1 300w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image031.jpg?resize=1024%2C404&amp;amp;ssl=1 1024w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/image031.jpg?w=1200&amp;amp;ssl=1 1200w" sizes="(max-width: 489px) 100vw, 489px" data-recalc-dims="1" /&gt;</span></noscript></a><span data-dcnode-id="1637" instrument_node="">‘Proxy patrons’ were sometimes presentable members of the Hover family who would hold tables for celebrities so that in case a star like Gable or Hepburn came in, there would be a table for them. (8/214)</span></p><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1628"><span data-dcnode-id="1634" instrument_node="">In 1940, the intrepid Mr. Wilkerson opened another club, </span><strong data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Ciro’s</span></strong><span data-dcnode-id="1631" instrument_node=""> at 8433 Sunset, now the home of the Comedy Store. Much like the Trocadero, Ciro’s really put itself out for its film business clientele; publicists arranging photo op dates could count on a good table and just the right light. Like the other smart clubs on the Strip (and the speakeasies and gambling parlors before Them, Ciro’s attracted the local gangster crowd, star gangsters like Tony Cornero, who owned the gambling ships anchored off of Santa Monica beach, Bugsy Siegel and Mickey Cohen. Ciro’s has had the longest run of any of the old clubs; its original life plus another 20 or more years as the Comedy Store. It’s not all laughs at the Store, though. According to a number of people who worked at the Store in the late 1980’s and early 1990’s, parts of the building are home to some rather unusual guys. Employees at the club have reported seeing a group of ghosts in the backstage areas. These ghosts are all men, dressed in the height of 1940’s high new-money style: wide lapels, loud ties, French-cuffed shirts and shiny wingtips. They hover in the back rooms in the early hours of the morning, after the club has closed. There are rumors that a local ‘banger, allegedly Mickey Cohen, arranged a hit on some rivals after- hours at Ciro’s. If this is true, then the shades of ‘bangers past are still very much at home. </span><a data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sunsetstrip.com/history/3.html%2520See%2520CirosText1%2520and%2520CirosText2"><span data-dcnode-id="1630" instrument_node="">http://www.sunsetstrip.com/history/3.html See CirosText1 and CirosText2</span></a></p><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Ciro’s followed in 1940, where the old Club Seville had been located earlier. (47/328)</span></p><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1623" instrument_node="">“We stay less than half an hour. I wonder why we can in the first place. I learn later that Ciro’s after a preview is </span><em data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">de rigeur</span></em><span data-dcnode-id="1620" instrument_node="">.” (52/308)</span></p><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">See also 61/69</span></p><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">63/31 – Janis Paige had Sammy Davis Jnr as her opening act…And there was always one of the Ciro’s girls. Barbara Eden was one… It’s where Johnny Weissmuller tipped a table filled with food onto Lupe Velez…When Daryl F. Zanuck gave a party for his daughter at Ciro’s the production chief of 20th Century Fox swung over the heads of 400 guests on a trapeze. Sonja Henie was a regular. So was Howard Hughes…Hover always insisted that gentlemen wear coats and ties.</span></p><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">63/102 – In 1951 Lili St Cyr was arrested for lewdness during her engagement at Ciro’s. Jerry Geisler charged her $2000 to turn the charges into a joke in the courtroom.</span></p><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1604"><span data-dcnode-id="1608" instrument_node="">In the 1940’s &amp; 1950’s, things were a little different at the beginning of Hollywood’s Sunset Strip. During that time, there was no hotter nightclub on the planet than Hollywood’s Ciro</span><strong data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">‘s. </span></strong><span data-dcnode-id="1605" instrument_node="">Owned and operated by Billy Wilkenson, It was the party destination for the Hollywood elite (Bogie &amp; Bacall, George Raft &amp; Betty Grable, you name it…). The luxurious nightclub provided the finest showgirls of the era with entertainment to match. The only problem for Wilkenson was to be able to sustain that high level of entertainment nightly for the wealthy celebrities that patronized the club. When the jungle-themed Mocambo opened its highly publicized zebra-striped doors, right across the street, Ciro’s customers were defecting in droves to the newest, trendy night spot.</span></p><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1602" instrument_node="">Wilkenson conceded &nbsp;Ciro</span><strong data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">‘s</span></strong><span data-dcnode-id="1599" instrument_node=""> #1 position to the jungle-themed upstart, and It was then that Herman Hoover took over management of the club (1942). Hoover would retain the position until Ciro’s closed its doors, ‘for good’, in 1959. Hoover returned the fading club to its previous glory, and it remained the place to see, as well as the place to be seen. for over a decade. The club would remain at that esteemed level, establishing itself as the standard for what a truly “class” establishment should be, one that Entrepreneurs would attempt to emulate in New York City, Las Vegas, and throughout the rest of the ‘civilized’ world.</span></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Renowned as Hollywood’s finest nightclub, Ciro’s would spawn the careers of some of the biggest names in Hollywood Entertainment. This highly coveted reputation was really initiated around 1950, when an Italian crooner took the Ciro’s stage for the first time, alongside a skinny Jewish comedian, and the Pair would go on to surpass the fame of America’s greatest comedy duo, Laurel &amp; Hardy.</span></p><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">Dean Martin &amp; Jerry Lewis would remain America’s top comedy act, starring in a succession of hit movies, Radio &amp; TV shows, &amp; live performances.</span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1586"><span data-dcnode-id="1590" instrument_node="">In 1951, an opening act for Janis Page -the Will Mastin Trio- tore the house down thanks, in large part, to the presence of arguably the most versatile entertainer in history, </span><strong data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Sammy Davis, Jr</span></strong><span data-dcnode-id="1587" instrument_node="">. It was also the site of Sammy’s return to the stage following the car accident in which he lost his right eye. Even when giants of our culture weren’t being created on their stage, Ciro’s hosted a profusion of top entertainers</span></p><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">-Joe E. Lewis, Andy Williams, Xavier Cugat, Nat King Cole and on and on.</span></p><span data-dcnode-id="1582" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">As Las Vegas grew, Sunset suffered. By the mid 50s, The glitzy lounges, fine restaurants, and nite clubs along Sunset had closed their doors for good. Because Ciro’s had been the Sunset Strip’s Landmark club, Herman Hoover struggled to stay afloat to the end. That end came when the IRS caught up with him, demanding hundreds of thousands of dollars which he owed in unpaid taxes. Ciro’s closed its doors in 1957. Hoover filed for bankruptcy in 1959, and the club at 8433 Sunset Blvd. was sold at public auction for $350,000. The sale represented the end of an era in Los Angeles. Though Sunset Boulevard remained a vital commercial artery, it would never regain the glamorous reputation it enjoyed in its glory years.</span></p><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1575"><a data-dcnode-id="1577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.filmsofthegoldenage.com/foga/1996/winter/hollywoodhotspots.shtml"><span data-dcnode-id="1578" instrument_node="">http://www.filmsofthegoldenage.com/foga/1996/winter/hollywoodhotspots.shtml</span></a><span data-dcnode-id="1576" instrument_node=""> says Ads announcing this latest addition to the club scene proclaimed, “Everybody that’s ANYBODY wll be at Ciro’s,” and you can bet that everybody in Hollywood WAS there for the Grand Opening on January 30, 1940. A Wilkerson establishment spelled publicity with a capital P, and Ciro’s was a virtual fishbowl for Tinseltown’s finest during the war years. The club went on to even greater glory after it was acquired by a man named Herman Hover, who began spending megabucks to lure the hottest acts onto its stage. Among those who performed here were Frank Sinatra, Nat King Cole, Marlene Dietrich, Billie Holiday, Lena Horne, Martin and Lewis, Edith Piaf, and Mae West with her musclemen. Some of the acts were TOO hot: stripper Lili St. Cyr’s routine nearly caused a riot and was shut down for lewdness.</span></p><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Such incidents were par for the course at Ciro’s; there was something about the place that just made people want to misbehave. One salacious story had a loaded Paulette Goddard crawling under a table to express her affection for director Anatole Litvak; then there was the time that Darryl Zanuck hrew a party at Ciro’s with a circus theme. After one belt too many, the aging Fox mogul stripped down to the waist and attempted to chin himself from a trapeze that was part of the stage show. Fights broke out here so often that Hover facetiously considered replacing the dance floor with a boxing ring, and he finally had to impose a three-brawl-per-customer limit. Violators were permanently “eighty-sixed.”</span></p><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">On a loftier note, this was where Sammy Davis, Jr. staged his comeback after his near-fatal 1954 auto accident. Producer George Schlatter described the scene: “After Sammy came back from his eye injury, the whole town came out to see his first gig. Cooper was there. Gable and Bogart were there. Frank and Dean were playing cards at the stageside.” Confounding rumors that his career was finished, Davis danced and sang for two hours before grabbing — and playing — every instrument in the band for an encore. The star-studded audience gave him a half-hour standing ovation.</span></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1567" instrument_node="">As listed in the ‘Los Angeles Guide, 1941’ : “</span><strong data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Ciro’s</span></strong><span data-dcnode-id="1564" instrument_node="">, 8444 Sunset Boulevard. Dinner 7pm to 10pm; couvert charge. Orchestra. Dancing to 2am. A favorite spot with movie folks. Patrons are requested to dress formally on Saturday nights. Somewhat expensive.”</span></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">Ciro’s closed in 1957.</span></p><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1549"><strong data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Clifton’s Pacific Seas Cafeteria</span></strong><span data-dcnode-id="1556" instrument_node=""> – Broadway, downtown LA. Opened 1931.</span><br data-dcnode-id="1555"><span data-dcnode-id="1554" instrument_node="">
For more information, see: </span><a data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.martinturnbull.com/hollywood-places/spotlight-on-cliftons-cafeteria/" rel="noopener noreferrer" target="_blank" title="Spotlight on…Clifton’s Cafeteria"><em data-dcnode-id="1551"><strong data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Spotlight on…Clifton’s Cafeteria</span></strong></em></a></p><span data-dcnode-id="1548" instrument_node="">

</span><p data-dcnode-id="1533"><strong data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">The Club Car – </span></strong><span data-dcnode-id="1534" instrument_node="">At Wilshire Blvd and Vermont. “24 hour service at extremely popular prices” – “Cocktails at the Autograph Bar” – “Alice Fare and “Sugie” invite you”</span></p><span data-dcnode-id="1532" instrument_node="">

//yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="500"><noscript data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">&lt;img data-attachment-id="11223" data-permalink="https://martinturnbull.com/hollywood-places/new-club-alabam/" data-orig-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/New-Club-Alabam.jpg?fit=500%2C386&amp;amp;ssl=1" data-orig-size="500,386" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"1"}" data-image-title="New Club Alabam – Corner of 42nd Street and Central Ave, Los Angeles" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/New-Club-Alabam.jpg?fit=300%2C232&amp;amp;ssl=1" data-large-file="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/New-Club-Alabam.jpg?fit=500%2C386&amp;amp;ssl=1" loading="lazy" class="aligncenter size-full wp-image-11223" src="https://i0.wp.com/www.martinturnbull.com/wp-content/uploads/2011/07/New-Club-Alabam.jpg?resize=500%2C386" alt="New Club Alabam – Corner of 42nd Street and Central Ave, Los Angeles " width="500" height="386" srcset="https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/New-Club-Alabam.jpg?w=500&amp;amp;ssl=1 500w, https://i0.wp.com/martinturnbull.com/wp-content/uploads/2011/07/New-Club-Alabam.jpg?resize=300%2C232&amp;amp;ssl=1 300w" sizes="(max-width: 500px) 100vw, 500px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1499"><strong data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Club Continental</span></strong><span data-dcnode-id="1500" instrument_node=""> – Sonora Ave, Glendale, Phone Kenwd-1886. Opened in 1935. Became one of the biggest and most successful (illegal gambling) casinos in the Los Angeles area during the pre-Vegas era under the guidance of (Mr.) Nola Hahn, who ran Billy Wilkerson’s gambling operations, and who later decamped to a tiny town in Nevada called Las Vegas. During WWII, it served as officers’ barracks and the building was demolished in 1966.</span></p><span data-dcnode-id="1498" instrument_node="">

</span><p data-dcnode-id="1485"><strong data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Club Envoy</span></strong><span data-dcnode-id="1489" instrument_node=""> – 9103 Sunset Boulevard. Opened Dec. 21, 1935. Later known as </span><strong data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">Maxine’s</span></strong><span data-dcnode-id="1486" instrument_node=""> from the very late 1950s.</span></p><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1478"><b data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Club Flamingo</span></b><span data-dcnode-id="1481" instrument_node=""> – 1027 N. La Brea. Drag club operated in the 1940s. </span><a data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.queermusicheritage.us/fem-flamingo.html"><span data-dcnode-id="1480" instrument_node="">http://www.queermusicheritage.us/fem-flamingo.html</span></a></p><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1470"><b data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Club Internationale </span></b><span data-dcnode-id="1474" instrument_node="">– 8711 Sunset Boulevard, late 1930s/early 1940s. Run by “Tess the International Mess” but owned by her husband, Elmer Wheeler, a WWI vet. The Internationale lost its liquor license in 1942 after the Navy made it and another club on the Strip, Chez Boheme—where Rae Bourbon was performing his cross dressing show nightly—off limits. Six months after his club lost its license, Elmer died. In a previous incarnation, this place was called </span><b data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">Mamma Louise’s</span></b><span data-dcnode-id="1471" instrument_node=""> and was owned by Phil Selznick.</span></p><span data-dcnode-id="1469" instrument_node="">
</span><p data-dcnode-id="1465"><strong data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Club Largo</span></strong><span data-dcnode-id="1466" instrument_node=""> on Sunset Boulevard</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1460"><strong data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Club LaRue</span></strong><span data-dcnode-id="1461" instrument_node=""> – Club LaRue was on Highway 91 in Las Vegas. Opened by Billy Wilkerson in the summer 1950 and was closed by October. In 1952 was transformed by Wayne McAllister into the Sands Hotel.</span></p><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1452"><b data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Club Marcel</span></b><span data-dcnode-id="1456" instrument_node=""> – 8730 Sunset Blvd. Opened some time in the early 1940s. A high-end club that attracted an upscale clientele. Had previously been </span><b data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">Jane Jones’ Little Club</span></b><span data-dcnode-id="1453" instrument_node="">, a popular lesbian hangout.</span></p><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1447"><strong data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Club Nite Life</span></strong><span data-dcnode-id="1448" instrument_node="">, at 38th Street and Western Ave, Los Angeles</span></p><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1442"><strong data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Club Morocco, </span></strong><span data-dcnode-id="1443" instrument_node="">1551 N. Vine St, Hollywood. Phone HO-0791</span></p><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1434"><strong data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Club Saville</span></strong><span data-dcnode-id="1438" instrument_node=""> – &nbsp; </span><a data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.filmsofthegoldenage.com/foga/1996/winter/hollywoodhotspots.shtml"><span data-dcnode-id="1437" instrument_node="">http://www.filmsofthegoldenage.com/foga/1996/winter/hollywoodhotspots.shtml</span></a><span data-dcnode-id="1435" instrument_node=""> says: Few places on The Strip can boast of a more colorful past. During the Depression this was known as the Clover Club, a veritable smorgasbord of illegal gambling and drinking; high stakes addicts like David O. Selznick and Harry Cohn lost their shirts here before the vice squad crashed the party in 1938.</span></p><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">The Clover’s successor, the Club Seville, fared even worse. It featured a unique glass dance floor laid over a pool filled with live carp, but women objected to having fish eyes peering up their skirts, and everyone was afraid the floor would shatter. Within a year the Seville was out of business. The enterprising Billy Wilkerson took over the building, giving it a lavish makeover and a name that would soon be world famous: Ciro’s.</span></p><span data-dcnode-id="1430" instrument_node="">
</span><p data-dcnode-id="1423"><strong data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">(Eddie Nealis’s) Clover Club</span></strong><span data-dcnode-id="1427" instrument_node=""> – 8477 Sunset Boulevard where La Cienega ends at Sunset. – directly across the street from the Troc. Opened 14OCT1937 </span><a data-dcnode-id="1425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nfo.net/usa/niteclub.htm"><span data-dcnode-id="1426" instrument_node="">http://nfo.net/usa/niteclub.htm</span></a><span data-dcnode-id="1424" instrument_node=""> One of the more infamous gambling joints in Hollywood (late 30s) (39/30) (40/81) The club thrived until the 1938 crack down on gambling. (39/68)</span></p><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1418"><a data-dcnode-id="1420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wehostar.com/2009/01/06/clover-club/"><span data-dcnode-id="1421" instrument_node="">http://www.wehostar.com/2009/01/06/clover-club/</span></a><span data-dcnode-id="1419" instrument_node=""> says that it opened in 1931: Many of the toniest nightclubs on the Strip offered high-stakes poker and even craps and roulette wheels in their VIP rooms, but the Clover Club was a bona fide casino that operated illegally in plain sight starting in 1931. Guy McAfee, a former cop, who is credited with coining the names Sunset Strip and, later, Las Vegas Strip. He designed the Clover Club to withstand trouble from both the law and the underworld. It was situated at the end of a long driveway, which gave the staff extra time to hide illegal activities when raiding parties arrived……… A wave of reform swept the city in 1938, and McAfee moved to Las Vegas where operated a series of casinos quite legally. The Clover remained open, presumably under new management, until at least 1944. Afterwards it became the Army and Navy Officers Club, which burned to the ground on Jan. 28, 1952. Los Angeles Times, Jan. 29, 1952: Old Clover Club Building, Strip Landmark, Burns</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1413"><a data-dcnode-id="1415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.filmsofthegoldenage.com/foga/1996/winter/hollywoodhotspots.shtml"><span data-dcnode-id="1416" instrument_node="">http://www.filmsofthegoldenage.com/foga/1996/winter/hollywoodhotspots.shtml</span></a><span data-dcnode-id="1414" instrument_node=""> says: Few places on The Strip can boast of a more colorful past. During the Depression this was known as the Clover Club, a veritable smorgasbord of illegal gambling and drinking; high stakes addicts like David O. Selznick and Harry Cohn lost their shirts here before the vice squad crashed the party in 1938.</span></p><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">The Clover’s successor, the Club Seville, fared even worse. It featured a unique glass dance floor laid over a pool filled with live carp, but women objected to having fish eyes peering up their skirts, and everyone was afraid the floor would shatter. Within a year the Seville was out of business. The enterprising Billy Wilkerson took over the building, giving it a lavish makeover and a name that would soon be world famous: Ciro’s.</span></p><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Starting in the mid 1930s and operating in the county territory of the sparsely developed Sunset Strip, the Clover Club was their height of exclusivity. Small and blood red, the dry-martini-and-diamond operation was unlike other Hollywood establishments, photographers were never allowed past the armed bouncers. Beyond the celebrity-packed supper club and dance floor, and behind the crimson-lacquered doors, secret panels, and one-way mirrors, was the heart of the operation: the illegal casino. &nbsp;At the crowded backroom gaming tables, gambling-addicted movie tycoons like David O. Selznick, and B.p. Schulberg lost immense fortunes nightly. (115/p47)</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1401"><span data-dcnode-id="1405" instrument_node="">The “</span><strong data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Bacon Club</span></strong><span data-dcnode-id="1402" instrument_node="">” were the gambling rooms secreted within the Clover Club premises</span></p><span data-dcnode-id="1400" instrument_node="">
</span><ul data-dcnode-id="1347"><span data-dcnode-id="1399" instrument_node="">
</span><li data-dcnode-id="1391"><span data-dcnode-id="1398" instrument_node="">By </span><strong data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">February 1930</span></strong><span data-dcnode-id="1395" instrument_node=""> it was called the </span><strong data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">Sphinx Club</span></strong><span data-dcnode-id="1392" instrument_node="">.</span></li><span data-dcnode-id="1390" instrument_node="">
</span><li data-dcnode-id="1382"><span data-dcnode-id="1389" instrument_node="">As of </span><strong data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">March 1933</span></strong><span data-dcnode-id="1386" instrument_node=""> it was operating as </span><strong data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Club Sokoloeff</span></strong><span data-dcnode-id="1383" instrument_node="">.</span></li><span data-dcnode-id="1381" instrument_node="">
</span><li data-dcnode-id="1373"><span data-dcnode-id="1380" instrument_node="">In </span><strong data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">August 1933</span></strong><span data-dcnode-id="1377" instrument_node="">, it was the </span><strong data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Hahn Club </span></strong><span data-dcnode-id="1374" instrument_node="">according to a permit to make some alterations to the building, Nola Hahn being another gambler associated with 8477. Soon after it adopted the name by which this address is most famously associated: the Clover Club.</span></li><span data-dcnode-id="1372" instrument_node="">
</span><li data-dcnode-id="1358"><span data-dcnode-id="1371" instrument_node="">In </span><strong data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">January 1945</span></strong><span data-dcnode-id="1368" instrument_node=""> the Clover Club’s lease, stock &amp; liquor license were sold by alleged owner Ivan Staufer to restaurateurs Nathan Sherry and Paul Kalmanoviz. </span><strong data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">On April 3, 1945</span></strong><span data-dcnode-id="1365" instrument_node="">, they opened 8477 Sunset as </span><strong data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Jerry’s Joynt Hollywood</span></strong><span data-dcnode-id="1362" instrument_node=""> but by summer had reverted to the famous </span><strong data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Clover Club</span></strong><span data-dcnode-id="1359" instrument_node=""> name once again.</span></li><span data-dcnode-id="1357" instrument_node="">
</span><li data-dcnode-id="1349"><span data-dcnode-id="1356" instrument_node="">As of </span><strong data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">March 1947</span></strong><span data-dcnode-id="1353" instrument_node="">, the new Hollywood Friars Club had taken it over for their first clubhouse. It was operating as the (non-military) Army &amp; Navy Officer’s Club when it burned down, </span><strong data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">January 28, 1952</span></strong><span data-dcnode-id="1350" instrument_node="">.</span></li><span data-dcnode-id="1348" instrument_node="">
</span></ul><span data-dcnode-id="1346" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1345" instrument_node="">See also </span><a data-dcnode-id="1343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhgraham.com/2016/06/16/8477-sunset-blvd/"><span data-dcnode-id="1344" instrument_node="">https://jhgraham.com/2016/06/16/8477-sunset-blvd/</span></a></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1321"><span data-dcnode-id="1340" instrument_node="">In 1943 Sherry and Kalmanoviz owned an interest in the members-only </span><strong data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Swing Club</span></strong><span data-dcnode-id="1337" instrument_node=""> at 1710 N. Las Palmas. As of late 1944, their café interests included the </span><strong data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Jerry’s Joynt Wilshire </span></strong><span data-dcnode-id="1334" instrument_node="">restaurant at 6594 San Vicente near Wilshire Blvd., The </span><strong data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Jade Café</span></strong><span data-dcnode-id="1331" instrument_node=""> at 6617 Hollywood Blvd, and the </span><strong data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Radio Room</span></strong><span data-dcnode-id="1328" instrument_node=""> at 1539 N. Vine. In 1945 Sherry also bought the popular Hollywood restaurant </span><strong data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Lucey’</span></strong><span data-dcnode-id="1325" instrument_node="">s at 5444 Melrose Ave. and in 1948-49 was co-owner of his namesake </span><strong data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Sherry’s</span></strong><span data-dcnode-id="1322" instrument_node=""> at 9039 Sunset Blvd.</span></p><span data-dcnode-id="1320" instrument_node="">

</span><p data-dcnode-id="1295"><strong data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Club New Yorker </span></strong><span data-dcnode-id="1296" instrument_node="">– attached to the Christie Hotel on Hollywood Boulevard (cnr McCadden Place.) Formerly the Greenwich Village Café) (40/62) Actor Jean Malin opened his Club New Yorker on the former site of the Greenwich Village Café. The club was situated in a basement of a building adjacent to the Christie Hotel, with access from the street by a steep staircase. Malin had come from New York where he’s gained a very popular following as an MC. Marlene Dietrich and her husband Joe Seiber dined here, and Gloria Swanson was a frequent visitor.</span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1290"><strong data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Club Seville</span></strong><span data-dcnode-id="1291" instrument_node=""> – Its location was later Ciro’s. (47/328)</span></p><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1285"><strong data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Cock’n Bull</span></strong><span data-dcnode-id="1286" instrument_node=""> – 9170 Sunset Boulevard. Opened 1937, closed 1987. A small cozy English pub. In the 1940s a cocktail invented there called the Moscow Mule became their signature: “The Drink with the Velvet Kick.” (Vodka, ginger beer and lime juice.) Errol Flynn, F. Scott Fitzgerald, Sinclair Lewis and Somerset Maugham would sit for hours at the bar which was always populated with an assortment of Hollywood agents and deal makers. A big American buffet was also an attraction, also included roast beef and Yorkshire pudding, and Welshman’s Rabbit. (49/45)</span></p><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1280"><strong data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">The Cockpit – </span></strong><span data-dcnode-id="1281" instrument_node="">Cocktail lounge in the courtyard of the Grand Central Air Terminal. 1310 Air Way, Glendale</span></p><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1275"><strong data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">CoCo Tree Café </span></strong><span data-dcnode-id="1276" instrument_node="">– 1932 to 1940. Located in the Laemmle Building at Hollywood &amp; Vine St. In 1940 restaurateur Sidney Hoedemaker of the Pig ‘n’ Whistle – Melody Lane chain leased the northwest corner Hollywood and Vine transformed it into a Melody Lane restaurantIn 1969, Sidney Hoedemaker passed away, and the Laemmle building was then leased to Howard Johnson’s which it remained to 1986.</span></p><span data-dcnode-id="1274" instrument_node="">
