t-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4193" instrument_node="">NOT </span></span><span data-dcnode-id="4190" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4191" instrument_node="">getting a raccoon. As someone who lives in the country where they're from, I can tell you that as cute as the little guys can be, they are also very aggressive and make horrible pets.</span></span></p><span data-dcnode-id="4188" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4185" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4186" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4187" instrument_node="">They need lots of room, and easily get bored as they are very intelligent pets. This isn't an animal you can cage. They either have to have free run of the house or an extremely large enclosure to meet their needs. They are also escape artists and will destroy your property thoroughly.</span></span></p><span data-dcnode-id="4184" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4181" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4182" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4183" instrument_node="">They are very aggressive. Their sharp teeth and claws can guarantee a lot of damage. If that happens, raccoon would have to be euthanized in order to test for rabies. A disease that is commonly found in raccoons.</span></span></p><span data-dcnode-id="4180" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4177" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4178" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4179" instrument_node="">It should also be noted that with wild animals kept as pets, the longer they are bred in captivity, the more docile they become. This is not true of raccoons. Even after 20 generations of captive breeding, they are still as aggressive as the ones taken out of the wild.</span></span></p><span data-dcnode-id="4176" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4169" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4174" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4175" instrument_node="">You </span></span><span data-dcnode-id="4172" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4173" instrument_node="">DO NOT </span></span><span data-dcnode-id="4170" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4171" instrument_node="">want in your household.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4092" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4093" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4094" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4108" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4135" style="box-sizing: border-box; display: inline-flex;"><div class="q-i were babies and once they matured they were released in appropriate wild places, after getting suitable vaccines. Although I am British I no longer know if it is even legal to keep wild animals as pets. In Quebec it was illegal, as it should be everywhere. It is selfish to keep a wild creature in captivity for your own amusement; they are meant to be wild, living in the wild. As we see in zoos, some animals live much longer lives in captivity than they would in the wild, but it is a question of quality of life. Further, raccoons are not native to the UK, and we see all over the world the damage done when humans introduce foreign wildlife into a country where they don’t belong. Rabbits in Australia, possums in New Zealand and various birds in North America were imported for deranged aristocracy to enjoy shooting and eventually overran their new homes. Don’t mess with mother nature.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3827" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3828" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3829" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3843" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3870" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3871" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3881" style="box-sizing: border-box; pointer-events: all;"><div class="q-rela class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2794" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2795" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2796" instrument_node="">We had a pet raccoon at a wildlife rehabilitation center. She came to us from a man who obtained her as an infant. He brought her to us for two reasons: she had been accidentally injured when her tail was closed in a car door and he was moving and couldn't take her with him.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="2791" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="2792" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="2793" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-33890a1f485d07e699ebacaa30d6a39e-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2788" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2789" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2790" instrument_node="">Nicky was by no means completely tame, but she was unusually well-mannered for an adult raccoon. She had been spayed and was current on all vaccinations.</span></span></p><span data-dcnode-id="2787" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2784" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2785" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2786" instrument_node="">This was shortly before the State enacted regulations prohibiting anyone, including licensed rehabbers, from keeping raccoons, so we said we'd take her in temporarily until</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2772" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2773" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2774" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2775" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2776" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="2781" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="2782" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="2783" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="2777" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2778"><svg data-dcnode-id="2779" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2780" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2716" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2717" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2718"><span class="q-box qu-userSelect--text" data-dcnode-id="2719" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2764" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2765" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2766" instrument_node="">We had a pet raccoon at a wildlife rehabilitation center. She came to us from a man who obtained her as an infant. He brought her to us for two reasons: she had been accidentally injured when her tail was closed in a car door and he was moving and couldn't take her with him.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="2761" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="2762" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="2763" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-33890a1f485d07e699ebacaa30d6a39e-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2758" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2759" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2760" instrument_node="">Nicky was by no means completely tame, but she was unusually well-mannered for an adult raccoon. She had been spayed and was current on all vaccinations.</span></span></p><span data-dcnode-id="2757" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2754" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2755" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2756" instrument_node="">This was shortly before the State enacted regulations prohibiting anyone, including licensed rehabbers, from keeping raccoons, so we said we'd take her in temporarily until a permanent arrangement could be found. We set her up in an outdoor enclosure with beams to climb on, toys to play with and a small kiddie pool of water.</span></span></p><span data-dcnode-id="2753" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2750" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2751" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2752" instrument_node="">Raccoons love shiny things — coins, candy wrappers, jewelry, keys; anything that glistened was irresistible to her. She knew people kept all kinds of interesting things in their pockets and she loved digging through them and pulling out whatever she could find.</span></span></p><span data-dcnode-id="2749" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2746" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2747" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2748" instrument_node="">Whenever I went into her enclosure to play with her, I put treats in the pockets of my jeans and she would climb up my leg, reach in and turn the pockets inside out. She kept a collection of coins, rocks and anything else she could get her paws on.</span></span></p><span data-dcnode-id="2745" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2742" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2743" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2744" instrument_node="">She was trained to walk with a harness and leash and loved walking through the grounds. She'd stop to sniff everything and sometimes climb the trees. Getting her down from a tree wasn’t easy -- you either had to lure her down with a treat or more often just stand there and wait until her curiosity was satisfied.</span></span></p><span data-dcnode-id="2741" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2738" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2739" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2740" instrument_node="">Nicky was great fun to have around as long as she was kept contained and under control. The man who raised her did a wonderful job and obviously put in the time necessary to train and acclimate her to living in captivity.</span></span></p><span data-dcnode-id="2737" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2734" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2735" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2736" instrument_node="">Our experience was not typical of keeping a pet raccoon. We had a staff of people able to interact with her, reinforce boundaries, reward good behavior and keep her enclosure clean. This would require a huge commitment of time and a lot of patience for one individual to manage.</span></span></p><span data-dcnode-id="2733" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2730" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2731" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2732" instrument_node="">A raccoon is a clever and curious animal with little regard for the rules and boundaries set by their owner. This is especially true once they reach the age of sexual maturity. There’s an enormous difference in behavior between an immature raccoon and an adult and the once cute and cuddly pet can quickly become aggressive and destructive. Many people find they can no longer care for or tolerate an animal that has a mind of its own and raccoons most definitely do. Unfortunately, these animals often end up being euthanized or released into the wild unless a wildlife rehabilitator can be found to accept them.</span></span></p><span data-dcnode-id="2729" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2726" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2727" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2728" instrument_node="">Keeping a raccoon as a pet is illegal in many states due to their status as a rabies vector species. Before you obtain a raccoon, check with your local wildlife authorities.</span></span></p><span data-dcnode-id="2725" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2720" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2723" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2724" instrument_node="">There's more detailed information on what to expect if you’re contemplating keeping a raccoon as a pet here: </span></span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/How-can-I-domesticate-this-wild-baby-raccoon-that-Ive-found-and-captured-in-my-backyard-without-calling-animal-control-and-to-a-point-where-it-will-do-my-bidding-It-could-steal-the-neighbor-woodpeckers-nuts-scare-the-annoying-squirrels-etc/answers/6770813" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_top" title="www.quora.com"><span data-dcnode-id="2722" instrument_node="">How can I domesticate this wild baby raccoon that I've found/captured in my backyard?</span></a></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2638" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2639" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2640" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2654" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="2686" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="2687" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="2697" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="2698" style="box-sizing: border-box; position: relative;"><button aria-label="153 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="26
