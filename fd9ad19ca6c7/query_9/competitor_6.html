 tail. What’s not to like? I will admit they are really cute. But let’s have a look at their lives in the wild.</span></span></p><span data-dcnode-id="4170" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4167" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4168" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4169" instrument_node="">Fennec Foxes are the smallest of all Canids, weighing up to 1600 grams and standing about 20cm tall(8 inches) They also have the largest ears for their body of a</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="4155" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="4156" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="4157" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="4158" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="4159" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="4164" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="4165" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="4166" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="4160" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="4161"><svg data-dcnode-id="4162" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="4163" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="4083" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="4084" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4085"><span class="q-box qu-userSelect--text" data-dcnode-id="4086" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4147" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4148" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4149" instrument_node="">I personally work with Fennec Foxes at an Exotic Animal Sanctuary. A Male and a female were surrendered after someone bought them as a breeding pair and quickly realised they couldn’t care for them. They were still under a year old.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4143" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4144"><div class="q-box unzoomed" data-dcnode-id="4145" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-c8786767395e9ca3f848b9269ab07e20-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4140" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4141" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4142" instrument_node="">They are RIDICULOUSLY cute. Next level adorable. Large fluffy ears, cute little faces, big bushy tail. What’s not to like? I will admit they are really cute. But let’s have a look at their lives in the wild.</span></span></p><span data-dcnode-id="4139" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4136" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4137" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4138" instrument_node="">Fennec Foxes are the smallest of all Canids, weighing up to 1600 grams and standing about 20cm tall(8 inches) They also have the largest ears for their body of any foxes. Their large ears allow them to hear prey under the sand. They are equipped with large hairy feet so they don’t burn their paws on the sand. Their characteristically fluffy fur is designed to reflect heat but also stay warm on cool desert nights. Their kidneys are incredibly efficient as most of their water comes only from their food.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4132" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4133"><div class="q-box unzoomed" data-dcnode-id="4134" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-1edd9c21bbbe8326b03a88b077eae61f-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4129" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4130" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4131" instrument_node="">Doesn’t resemble my house that much.</span></span></p><span data-dcnode-id="4128" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4125" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4126" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4127" instrument_node="">They naturally live across North Africa including the the Sahara and Arabian Desert. They inhabit large burrows under the hard rock and sand in dens up to 120 square meters ( 1,292 square feet) with their extended family as they are the only social fox species. This is probably to stay safe from large predators such as Jackals and even birds of prey such as Eagle Owls.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4121" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4122"><div class="q-box unzoomed" data-dcnode-id="4123" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4124" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-206298d89659a7db5d355cf9a5d9be47-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4118" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4119" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4120" instrument_node="">Will not hesitate to take down a fox.</span></span></p><span data-dcnode-id="4117" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4114" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4115" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4116" instrument_node="">They also make lots of barking and grunting noises to communicate. Males can get quite aggressive when females are in heat or ‘oestrus’. They will scent mark with urine and waste. They will never be fully trained out of this.</span></span></p><span data-dcnode-id="4113" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4110" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4111" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4112" instrument_node="">I went off on a tangent here so I apologise. Fennec Foxes will need:</span></span></p><ul class="q-box" data-dcnode-id="4094" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="4107" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4108" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4109" instrument_node="">To be ideally kept in a group as they are social and no amount of human contact will replace a friend. You cannot spend all night awake with them and groom and communicate with them as much as you want to. Because they will be awake when you are asleep and can slightly adapt to sleeping partially at night but will always remain mostly nocturnal.</span></span></li><li class="q-relative" data-dcnode-id="4104" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4105" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4106" instrument_node="">It would be best if they had a large heated, dry and draught proof enclosure with access to a fully secure outdoor area. They will be very active and this will be disruptive to you trying to sleep. Also they will need to run around and dig and scent mark. Something your carpet will never forget.</span></span></li><li class="q-relative" data-dcnode-id="4101" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4102" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4103" instrument_node="">Lots of digging substrate will be needed otherwise they will rub their noses on the ground or corners until they bleed.</span></span></li><li class="q-relative" data-dcnode-id="4098" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4099" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4100" instrument_node="">These are wild animals. It is vital to remember that. Ideally you will have experience with Foxes as they will not react the same as a dog or a cat. If scared they may freak out and bite you. And it will be a very nasty bite. However are closer to wild cats in terms of personality. They are incredibly agile and elusive, many only will come to you for food and then run away to hide it for later. Speaking of food.</span></span></li><li class="q-relative" data-dcnode-id="4095" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="4096" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4097" instrument_node="">They will need a whole food diet consisting of lots of insects such as crickets, locusts, snails and worms. As well as whole day old de-yolked chicks and mice which will have to be specially bought and kept in the freezer. They will need lots of variety as well as some root vegetables such as sweet potato occasionally.</span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4091" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4092" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4093" instrument_node="">So even with my hands on experience I don’t think I would. They are wild and should remain so. They are very costly to buy and should live for up to 14 years in captivity. That is a long term and very expensive commitment, they will also not rehome as easily as dogs.</span></span></p><span data-dcnode-id="4090" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4087" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4088" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4089" instrument_node="">&gt; I ranted a lot here I apologise but in conclusion. No don’t get one it’s not a good idea.&lt;</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4005" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4006" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4007" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4021" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4053" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="4054" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="4064" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="4065" style="box-sizing: border-box; position: relati 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2047" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="2052" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="2053" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="2054" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="2048" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2049"><svg data-dcnode-id="2050" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2051" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2003" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2004" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2005"><span class="q-box qu-userSelect--text" data-dcnode-id="2006" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2035" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2036" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2037" instrument_node="">Do Fennecs make good pets?</span></span></p><span data-dcnode-id="2034" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2031" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2032" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2033" instrument_node="">Many fennecs are a wonderful exotic pet. They are very friendly and can be enjoyed by the whole family–especially if you have a lot of energy! Do remember that they are exotic animals and can’t be treated the same as any domestic animal. Please do your research and get to know others who own fennecs before making your decision.</span></span></p><span data-dcnode-id="2030" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2027" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2028" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2029" instrument_node="">Are they like a dog or cat?</span></span></p><span data-dcnode-id="2026" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2023" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2024" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2025" instrument_node="">Though fennecs really cannot be compared to domestic animals, they are in some ways like a combination of a cat and a dog. They are about the size of a cat, and sometimes they have the aloofness of a cat, but their energy and playfulness is that of a very active dog, unless they are sleeping. Some say that they are more cat like in personality–independent when they want to be and cuddly when they want to be. Also,their agility and the height they can jump is more akin to a cat.</span></span></p><span data-dcnode-id="2022" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2019" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2020" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2021" instrument_node="">What kind of personalities and habits do they have?</span></span></p><span data-dcnode-id="2018" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2015" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2016" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2017" instrument_node="">Fennecs are a ball of energy 15% of the time, snuggly 20% of the time, and sound asleep the rest. They do not calm down with age! They do indulge in mutual grooming, or non-aggressive nibbling. It’s similar to what a dog does, with the front teeth and not meant to break skin. In fact, this is what they do with each other in the wild. It strengthens social bonds. Horses do this as well. It is sometimes uncomfortable, and they may nibble your knuckles while you scratch them, but it’s actually a good thing. It means you’re accepted.</span></span></p><span data-dcnode-id="2014" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2011" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2012" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2013" instrument_node="">Is a male or female better? Does it make a difference if they are spayed/neutered?</span></span></p><span data-dcnode-id="2010" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2007" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2008" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2009" instrument_node="">Some owners say that neutered males are calmer than females and tend to cuddle more. The females seem to be little more skittish and fast, but males tend to be much more docile, less territorial, and more cuddly when neutered. Neutering also helps to diminish the odor of their urine. Spaying the females doesn’t seem to make any difference in their personalities.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1935" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1936" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1937" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1951" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1973" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1974" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-dis  foxes sold from Russia have been selectively bred from generations of wild foxes as part of an experiment and proponents claim they are similar to dogs, but you're still talking only some 20 years of domestication versus thousands.</span></span></p><span data-dcnode-id="1837" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1834" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1835" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1836" instrument_node="">Owning an animal like this is not something to undertake on a whim, and handled poorly the result can</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="1822" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="1823" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="1824" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="1825" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="1826" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="1831" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="1832" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="1833" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="1827" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="1828"><svg data-dcnode-id="1829" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1830" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1770" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1771" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1772"><span class="q-box qu-userSelect--text" data-dcnode-id="1773" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1814" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1815" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1816" instrument_node="">Legally owning a fox in the USA will cost about $8000 and in most states requires an exotic animals permit and compliance with regulations regarding their care and housing - it's not for the faint of heart. </span></span></p><span data-dcnode-id="1813" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1810" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1811" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1812" instrument_node="">And bear in mind, a fox is a wild animal. The "domesticated" foxes sold from Russia have been selectively bred from generations of wild foxes as part of an experiment and proponents claim they are similar to dogs, but you're still talking only some 20 years of domestication versus thousands.</span></span></p><span data-dcnode-id="1809" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1806" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1807" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1808" instrument_node="">Owning an animal like this is not something to undertake on a whim, and handled poorly the result can be a miserable and damaged animal, a torn up household, serious legal trouble, or physical harm to the pet or owner.</span></span></p><span data-dcnode-id="1805" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1802" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1803" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1804" instrument_node="">Owning a fox which has not been "domesticated" is worse, now you are talking about a wild animal which belongs in a zoo (or, ideally, their natural habitat), which can, and likely will, seriously hurt you. </span></span></p><span data-dcnode-id="1801" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1798" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1799" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1800" instrument_node="">Beware of the distinction between "tame" and "domesticated." When talking about wild species, a tame animal is one which simply hasn't yet been in a situation where their instinct has caused anyone to be badly bitten. </span></span></p><span data-dcnode-id="1797" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1794" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1795" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1796" instrument_node="">There are a lot of truly unscrupulous people who deal with exotic animals for profit in the US, who will appeal to vanity and sell people with a line about "tame" animals. After they get their money they will be gone and the owner will soon discover why you can't buy these animals in pet stores. Bad for the owner, worse for the animal, but they got their money. Often their businesses skirt the law or are outright illegal, but they know how to get away with it, and you will be the one arrested only to learn they used a false name and are long gone. This happens too often.</span></span></p><span data-dcnode-id="1793" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1790" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1791" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1792" instrument_node="">Even with the (highly publicized) so-called domesticated russian foxes, expect for this reason close interest from state and local wildlife officers. By close I mean expect to know the officers name after multiple visits. They will check to make sure you are not breeding and selling the animals, or temporarily housing animals for those who do.</span></span></p><span data-dcnode-id="1789" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1786" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1787" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1788" instrument_node="">Legal issues can become a major concern, expect to navigate a maze of regulations which can, if handled badly, get you landed in jail. Start up a good relationship with a lawyer. In my experience even a great relationship with law enforcement and recognized status in wildlife rehabilitation isn't enough, some people will sue you the instant they know an exotic animal is privately owned anywhere within miles of their home. Expect this.</span></span></p><span data-dcnode-id="1785" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1782" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1783" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1784" instrument_node="">I would urge anyone who does not have previous experience with exotics, who is not prepared to spend roughly ten thousand dollars yearly, and who is also not prepared to make owning that animal one of their life's central priorities to reconsider owning a fox as a pet.</span></span></p><span data-dcnode-id="1781" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1778" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1779" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1780" instrument_node="">How enjoyable is it? Very, but its a full-time kind of enjoyment. There are many people who own exotic animals legally, and are great caretakers, but it takes a lot of time, space, money and commitment. </span></span></p><span data-dcnode-id="1777" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1774" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1775" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1776" instrument_node="">This is not from my experience with foxes (I've never owned one personally) but from (legally) owning and caring for 18 wolves, as well as having assisted in care of foxes, big cats, and a host of other species.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1697" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1698" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--ce 0-0 ejgusd" data-dcnode-id="1429" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="1430" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="1431" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="1432" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="1433" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1446" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1447" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1448" instrument_node="">Fennec foxes can be kept as pets, but have different needs as far as a cat or dog. First thing to do is make sure they are legal in your state. While still in the canine family it's not a domesticated animal. It is a time consuming commitment as are most exotic pets. Careful and specific socialization is essential at an early age and needs to continue throughout their life. They can be very snuggly and tend to sleep a good amount of time, but you need to make sure you have A LOT of time for play as they can be extremely active, if it's play needs aren't met that energy will come out in other u</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="1434" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="1435" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="1436" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="1437" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="1438" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="1443" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="1444" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="1445" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="1439" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="1440"><svg data-dcnode-id="1441" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1442" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1422" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1423" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1424"><span class="q-box qu-userSelect--text" data-dcnode-id="1425" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1426" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1427" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1428" instrument_node="">Fennec foxes can be kept as pets, but have different needs as far as a cat or dog. First thing to do is make sure they are legal in your state. While still in the canine family it's not a domesticated animal. It is a time consuming commitment as are most exotic pets. Careful and specific socialization is essential at an early age and needs to continue throughout their life. They can be very snuggly and tend to sleep a good amount of time, but you need to make sure you have A LOT of time for play as they can be extremely active, if it's play needs aren't met that energy will come out in other undersireable ways. Chewing and ripping into things in the house and digging up carpet aren't just possibilities but probabilities. They'll get into everything. They also like to dig in general so be prepared for that. You need to keep a very close eye on them if you take them outside. I wouldn't recommend letting them run loose. and even in a fenced yard extra precautions must be taken as they can and will easily dig their way under a fence to escape. A specially designed enclosure where your fox can run around dig and just be a fox is ideal. They have a different diet than a dog. Eating everything from vegetables to small rodents. you can supplement its diet with a combination of dog/cat food and fruits and vegetables but consult with the breeder or your vet. there are also kibble kinds of food specifically for foxes like you'd find in a zoo. Make sure there is a vet who treats exotic animals in your area. With any pet, exotic or not. Regular routine vet checks shouldn't be ignored, especially with exotic animals. If you don't intend on taking your fennec fox to a vet regularly for check ups, you shouldn't own one. The same is true for dogs and cats. Exotics can hide injury and illnesses very well. Being on the smaller side fennec foxes are still prey animals and see the world in eat or be eaten. They won't make it clear there is something wrong to avoid becoming prey for a larger animal. Many times by the time you notice something is wrong, it could be too late to do anything. It's important to observe and be familiar with your fox's usual personality and behaviors. If something seems off make an appointment. Overall they can be fun and affectionate pets. As long as you have the time, energy and money to take care of them properly</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1349" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1350" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1351" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1365" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-  own one in countries like Austria, Holland, Poland and Switzerland.</span></span></p><span data-dcnode-id="1053" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1050" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1051" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1052" instrument_node="">The following website can give you further information on legalities of owning one in various countries:</span></span></p><span data-dcnode-id="1049" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1041" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="1042" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//livingwithfoxes.weebly.com/legality.html" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="livingwithfoxes.weebly.com"><span data-dcnode-id="1048" instrument_node="">Legality</span></a><span class="q-inlineBlock" data-dcnode-id="1043" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1044"><svg data-dcnode-id="1045" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcno rection: ltr;"><span data-dcnode-id="489" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="490" instrument_node="">N.Y. ENVTL. CONSERV. §11-0512 - Envtl. Conserv. Possession, sale, barter, transfer, exchange and import of wild animals as pets prohibited</span></span></p><span data-dcnode-id="487" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="484" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="485" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="486" instrument_node="">1. No person shall knowingly possess, harbor, sell, barter, transfer, exchange or import any wild animal for use as a pet in New York state, except as provided in subdivision three of this section.</span></span></p><span data-dcnode-id="483" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="480" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="481" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="482" instrument_node="">Wild animal includes, and is limited to, any or all of the following orders and families:</span></span></p><span data-dcnode-id="479" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="476" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="477" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="478" instrument_node="">(3) Canidae (with the exception of domesticated dogs and fennec foxes (vulpes zerda)),</span></span></p><span data-dcnode-id="475" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="472" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="473" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="474" instrument_node="">REMEMBER, I am not a lawyer, so don’t quote me on this!</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="405" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="406" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="407" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="421" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="443" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="444" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="454" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="455" style="box-sizing: border-box; position: relative;"><button aria-label="Upvote" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none"
