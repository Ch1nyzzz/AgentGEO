<p data-dcnode-id="1437"><span data-dcnode-id="1441" instrument_node="">Contrary to popular belief, foxes are </span><em data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">not </span></em><span data-dcnode-id="1438" instrument_node="">"cat-dogs." They have many species-specific behaviors and vocalizations. If you want something that behaves like a cat, get a cat. Expecting a fox to act like an entirely different species is illogical and will only cause a lot of problems.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-0" data-dcnode-id="1434"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-0" data-dcnode-id="1435" data-zone-count="10"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-0a0985b54a494b608a159824d56a22e9&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-0&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes </span><li data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">The floor should be dig-proof: line it with chain link. Foxes are proficient diggers.</span></li><span data-dcnode-id="1290" instrument_node="">
</span><li data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">The top should be completely enclosed.</span></li><span data-dcnode-id="1287" instrument_node="">
</span><li data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Chain link, if used, should be no more than 14 gauge, to avoid being chewed through, and have welded wire.</span></li><span data-dcnode-id="1284" instrument_node="">

t;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1080"></phoenix-ad></div></aside><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-4" data-dcnode-id="1075"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-4" data-dcnode-id="1076" data-zone-count="12"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-21e31dab3e7145cdb7db7e959aba5f39&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-4&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;4&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;4&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-21e31dab3e7145cdb7db7e959aba5f39&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1077"></phoenix-ad></div></aside><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Foxes will cache their food. They will also mark it with their feces or urine. Therefore, it is important that you keep your feeding areas clean and ensure that leftover perishable food is not being cached.</span></p><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">A way to prevent your fox from marking its food if this becomes an issue:</span></p><blockquote class="m-blockquote l-inline" data-dcnode-id="1066" tml-render-layout="inline"><p data-dcnode-id="1067"><span data-dcnode-id="1070" instrument_node="">"...put their food and water dish in some type of enclosure, so the fox can only reach his/her head in the enclosure. A covered milk crate, a sturdy cardboard box, a wooded box would be good too." —Pat, </span><a data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sybilsden.com/" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1069" instrument_node="">Sybils Den</span></a></p></blockquote><h2 data-dcnode-id="1064" id="behavior-and-vocalizations"><span data-dcnode-id="1065" instrument_node="">Behavior and Vocalizations</span></h2><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Foxes have a variety of behaviors, some similar to other canines. Here's a quick list of some of the more common behaviors and vocalizations.</span></p><h3 data-dcnode-id="1059" id="behavior"><strong data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Behavior</span></strong></h3><ul data-dcnode-id="1022"><li data-dcnode-id="1055"><strong data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Whiskers:</span></strong><span data-dcnode-id="1056" instrument_node=""> The position of a fox's whiskers can indicate interest (if perked forward), or fear and anger (if bristled). Calm foxes have relaxed whiskers.</span></li><span data-dcnode-id="1054" instrument_node="">
</span><li data-dcnode-id="1047"><strong data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Body language:</span></strong><span data-dcnode-id="1051" instrument_node=""> Like most canines, foxes are very expressive, so I won't go too in-depth. Foxes have very typical </span><a data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pets.webmd.com/dogs/dog-body-language" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1050" instrument_node="">canine body language</span></a><span data-dcnode-id="1048" instrument_node="">, although they do not snarl. Foxes will perform body slams when being defensive and will pin high-value items underneath them if they feel threatened.</span></li><span data-dcnode-id="1046" instrument_node="">
</span><li data-dcnode-id="1042"><strong data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Scent:</span></strong><span data-dcnode-id="1043" instrument_node=""> Foxes will rarely utilize their supracaudal gland, or violet gland, to release a powerful, foul-smelling odor. This is done when your fox is extremely fearful or upset, if you stepped on its' tail, for example.</span></li><span data-dcnode-id="1041" instrument_node="">
</span><li data-dcnode-id="1034"><strong data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Resource guarding:</span></strong><span data-dcnode-id="1038" instrument_node=""> Foxes are prone to resource guarding food, toys, and high-value items. If you need to take something from your fox, do </span><em data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">not</span></em><span data-dcnode-id="1035" instrument_node=""> simply walk up and try to take it! Instead, try trading for another high-value item.</span></li><span data-dcnode-id="1033" instrument_node="">
</span><li data-dcnode-id="1029"><strong data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Territorial marking:</span></strong><span data-dcnode-id="1030" instrument_node=""> Foxes mark their territory with their feces and urine. Their urine smells especially pungent, almost like a skunk's. They will also mark their food and caches.</span></li><span data-dcnode-id="1028" instrument_node="">
</span><li data-dcnode-id="1024"><strong data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">The October crazies:</span></strong><span data-dcnode-id="1025" instrument_node=""> A term coined by fox owners. This refers to the first autumn of a fox's life when wild foxes are chased off by their parents to become independent. Your fox will exhibit extreme, drastically different behaviors, often becoming aggressive and highly vocal. For first-time, uneducated fox owners, this is misperceived as their fox "going wild." These changes are luckily temporary- think of it as puberty for foxes.</span></li><span data-dcnode-id="1023" instrument_node="">

yourself</span></em><span data-dcnode-id="905" instrument_node="">.</span></p><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">To check your local laws, first, you must contact your local Fish &amp; Wildlife Services (or the equivalent of what your state has, often they are named differently state-by-state). Call them, and inquire about whether or not it is legal to privately own a fox, and be sure to state what species.</span></p><p data-dcnode-id="897"><span data-dcnode-id="901" instrument_node="">It also helps to write down the name of who you have talked to, so you can quickly contact them again if needed. Emails are fine too, but I have had less luck getting</span><em data-dcnode-id="899"><span data-dcnode-id="900" instrument_node=""> correct</span></em><span data-dcnode-id="898" instrument_node=""> replies that way.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-8" data-dcnode-id="894"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-8" data-dcnode-id="895" data-zone-count="12"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-abd7f7250dd147f1874ebdd6e3ae356c&quot;,&quot;visClasses&q
