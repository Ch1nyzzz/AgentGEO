ters Legal as Pets?</span></h2><p data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">There are many different laws and regulations regarding "exotic" animals as pets and they vary from state to state, so the answer depends on where you live. I can only make educated guesses as to where they might be legal due to researching what isn't legal. The only way to know for sure would be to contact your state's Department of Agriculture/Fish and Game, and even they sometimes don't know.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-0" data-dcnode-id="2356"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-0" data-dcnode-id="2357" data-zone-count="23"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-aa70ae287971402bb3c40ee9651f395f&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-0&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&qu &quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-5&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;5&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;5&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-1e3db5cd456f49b785607c4a1ff0043f&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1511"></phoenix-ad></div></aside><blockquote class="m-blockquote l-inline" data-dcnode-id="1501" tml-render-layout="inline"><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">I cannot recommend any otter species as a personal "pet," although a few have maintained a strong bond with their handler their entire life.</span></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">— Ken's Exotics</span></p><span data-dcnode-id="1502" instrument_node="">
</span></blockquote><h2 data-dcnode-id="1499" id="how-to-care-for-otters-as-pets"><span data-dcnode-id="1500" instrument_node="">How to Care for Otters as Pets</span></h2><p data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">If you have managed to acquire an otter, please make sure you know how to care for it properly and that you are committed to keeping it for the entirety of its lifetime. Below is a basic care guide.</span></p><h3 data-dcnode-id="1494" id="caging"><strong data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">Caging</span></strong></h3><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Captive otters require caging. No, you don’t need to have a massive zoo enclosure with a natural lake (although it wouldn’t hurt), but housing Asian small-clawed otters will still present a challenge for the average person or even an advanced exotic pet keeper. The cage should have a decent size that allows the animal adequate room to exercise and forge. Instead of citing specific sizes, I would recommend simply imagining what you would deem an acceptable length and width for a very energetic and playful carnivore that will spend most, if not all, of its life in the enclosure. In such a case, the average dog run won't cut it.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-4" data-dcnode-id="1489"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-4" data-dcnode-id="1490" data-zone-count="23"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],& &quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-998050a75b0446f08ab2035e24118f05&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-6&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;6&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;6&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-998050a75b0446f08ab2035e24118f05&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1482"></phoenix-ad></div></aside><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">The fact that these otters require a tropical climate may be why they tend to be kept mostly by zoo professionals. You will need to provide a heated area for them when temperatures drop below 50°F. The ideal temperature for their pool is 75-85°F, but they also need a dry area because if they are wet all the time, they can develop health issues. Depending on the size, the cage should provide at least 30% water. Otters do climb, adding to the complexity of the habitat, so a top is required. Fencing needs to extend in-ground because they can also dig out.</span></p><p data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">In summary:</span></p><ul data-dcnode-id="1454"><li data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Cage should be outdoors.</span></li><span data-dcnode-id="1473" instrument_node="">
</span><li data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Cage should have a top and fencing needs to extend in-ground.</span></li><span data-dcnode-id="1470" instrument_node="">
</span><li data-dcnode-id="1465"><span data-dcnode-id="1469" instrument_node="">If you do not live in a warm climate, supplementary heat is necessary for land </span><em data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">and</span></em><span data-dcnode-id="1466" instrument_node=""> water.</span></li><span data-dcnode-id="1464" instrument_node="">
</span><li data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Pool should make up about 30% of the enclosure.</span></li><span data-dcnode-id="1461" instrument_node="">
</span><li data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">There should be a dry area.</span></li><span data-dcnode-id="1458" instrument_node="">
</span><li data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">There should be hollowed out logs, aptly placed shrubs and trees, and various cage furniture that will make the space more interesting.</span></li><span data-dcnode-id="1455" instrument_node="">
</span></ul><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-7" data-dcnode-id="1451"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-7" data-dcnode-id="1452" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-660be890ae774d85997b8a073154cf28&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-7&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;7&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;7&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-660be890ae774d85997b8a073154cf28&quot;,&quot;adUnitPath&quot;:&quot;/88059007/pethelpful.com/exotic-pets&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1453"></phoenix-ad></div></aside><h3 data-dcnode-id="1448" id="diet"><strong data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Diet</span></strong></h3><ul data-dcnode-id="1432"><li data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">An otter’s diet can vary in captivity. They are carnivores with a high metabolic rate, requiring them to consume 20% of their body weight per day.</span></li><span data-dcnode-id="1445" instrument_node="">
</span><li data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">The base can consist of nutritionally-complete cat food.</span></li><span data-dcnode-id="1442" instrument_node="">
</span><li data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">70-80% of the diet can be meat-based and can consist of day-old chicks, chicken, venison, rabbit, etc.</span></li><span data-dcnode-id="1439" instrument_node="">
</span><li data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">20-30% should be fish.</span></li><span data-dcnode-id="1436" instrument_node="">
</span><li data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Vegetables, insects, crayfish, monkey nuts, soft-boiled eggs, etc. can also be offered to supplement the diet. This can be fed irregularly with a "scatter" method to ward off stereotypic behavior — something that occurs when certain animals are fed at specific times.</span></li><span data-dcnode-id="1433" instrument_node="">

:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1414"></phoenix-ad></div></aside><h2 data-dcnode-id="1410" id="what-is-a-pet-otter-like-do-they-make-good-pets"><span data-dcnode-id="1411" instrument_node="">What Is a Pet Otter Like? Do They Make Good Pets?</span></h2><p data-dcnode-id="1407"><strong data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">Odor</span></strong></p><p data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Otters are usually kept outdoors because they emit an odor. They smear their droppings, which they produce constantly to mark their territory.</span></p><p data-dcnode-id="1402"><strong data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Personality</span></strong></p><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Otters and most exotic pets may not like to be restrained, especially with strangers. People who like to physically interact with their pets will be disappointed. When you see cute baby otters interacting with their keepers — such as those in the videos here — remember that these are often socialized babies that have not yet undergone maturation.</span></p><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Nevertheless, otters are personable, entertaining little creatures, as you would expect from their reputation. You can discover many popular videos of them interacting with their caretakers in ways other than direct contact.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-6" data-dcnode-id="1395"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-6" data-dcnode-id="1396" data-zone-count="23"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&q  all must be retarded... I got a kick out of the one that said... I'm leaving school and need to know where to move to own one... okay kids... you really need to go move to where you can own a bear and just let it live with you in your house... just do us all a favor and go get mauled... people are really dumb holy shit lmfao.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-13" data-dcnode-id="1057"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-13" data-dcnode-id="1058" data-zone-count="23"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-f0ac19043f474df2b033a61fd24034e1&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-13&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;13&quot;,&quot;isOutstream e. Asian small clawed otters may be kept with a permit. That being said there are no breeders , otters are poached from the wild. These are wild animals who suffer greatly being kept in our houses. Even you own a river it’s not enough! They swim 17km everyday , live in large groups of 20 individuals espérantes in multiple families. Otters aren’t happy to be one or two with a child pool and a bathtub ! All those things you find cute on IG are them showing their distress ! Swimming in circles , chanting, running around like crazy is them showing they suffer!  As a vet you shouldn’t explain people what to do if they still wanna keep a wild pet!  They’re very intelligent and need so much stimulation , just like an African parrot but maybe 10 times more. They’re not for us to publish to get likes ! They’re not for us to put them in cute hats ! This craze of having exotic pets like fennec and foxes (in Russia its popular ), beautiful exotic reptiles and so much more is so wrong ! On the 4 Asian species 3 are under protection because they’re getting extinct ! Before they used to be chased by humans for destroying rice cultures but now the parents are killed at first sight to get the youngs to make money! Don’t encourage this craziness! They bite and they have glands to produce a vile smell , people get those removed , it’s cruel. Even with the best intentions we can’t give them enough , enough playtimes, enough nutrition.l enough everything. I know a lady who owns an otter , she displays her on insta with her other exotic pets that rescued and even doing so much for her baby she still sees signs of distress! Don’t get an otter just because it’s adorable , you probably will not be able to care for her . They’re destructive and will hurt you or your kids and they will get depressed ! Please be better than that and get a pet that we breed for generations. Don’t get a pet to show off get a pet because you have heart !</span></p><aside class="m-in-content-ad-row l-inline not-si -id="696"><strong data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Melissa A Smith (author)</span></strong><span data-dcnode-id="697" instrument_node=""> from New York on December 21, 2016:</span></p><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">People in Japan are notorious for doing whatever they want and making it work. They would come to the nano-reef forums posting spotless 10 gallon tanks loaded with fish including tangs. They have exotic pet stores with meerkats in rabbit cages. I don't approve but it amazes me the animals aren't showing obvious signs of distress.</span></p><p data-dcnode-id="690"><strong data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">ManNewt</span></strong><span data-dcnode-id="691" instrument_node=""> on December 20, 2016:</span></p><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Well I did come come across an instragram account of a pet otter in Japan, and I never saw a outdoor cage in the account. Would it require witchcraft for an otter to stay alive like that? Also They really have an annoying squeal.</span></p></div><div class="m-detail--sponsor" data-dcnode-id="686"></div><footer class="m-detail--footer" data-dcnode-id="669"><div class="m-detail--meta" data-dcnode-id="684"><div class="m-description--list" data-dcnode-id="685"></div></div><aside class="m-detail--author-box" data-dcnode-id="670"><div class="m-detail--author-content" data-dcnode-id="671"><div class="m-detail--author-byline" data-dcnode-id="678"><div class="m-detail--author-byline-label" data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">By</span></div><span data-dcnode-id="681" instrument_node=""> </span><a data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/%40melissaasmith" onclick="return phoenixTrackClickEvent(this, event);" phx-track-id="Author Name" rel="author"><span data-dcnode-id="680" instrumen
