</span><section class="post-content typography" data-dcnode-id="810" data-post-type="post" data-track-content=""><span data-dcnode-id="1694" instrument_node="">
</span><div data-dcnode-id="812" data-piano-inline-content-wrapper="" id="piano-inline-content-wrapper"><span data-dcnode-id="1693" instrument_node="">
</span><div data-component-type="content-lock" data-dcnode-id="817" data-load-strategy="exclude"><span data-dcnode-id="1692" instrument_node="">
</span><div class="content-lock-content" data-dcnode-id="819"><span data-dcnode-id="1691" instrument_node="">
</span><ul class="summary-list" data-dcnode-id="1675"><span data-dcnode-id="1690" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">You can tame a fox in "Minecraft" by breeding two wild foxes.</span></li><span data-dcnode-id="1687" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">The baby fox they spawn will automatically be tamed, but will follow its parents until you lead it away.</span></li><span data-dcnode-id="1684" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">To breed wild foxes in "Minecraft," you'll need to enclose them in a pen and then feed them sweet berries.</span></li><span data-dcnode-id="1681" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1677"><a data-analytics-module="summary_bullets" data-analytics-post-depth="0" data-dcnode-id="1679" data-uri="4c86c1c3a45644bf07d168dc4c802e5e" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/tech-reference" rel="noopener" target="_blank"><span data-dcnode-id="1680" instrument_node="">Visit Insider's Tech Reference library for more stories</span></a><span data-dcnode-id="1678" instrument_node="">.</span></li><span data-dcnode-id="1676" instrument_node="">
</span></ul><span data-dcnode-id="1674" instrument_node="">
</span><span data-dcnode-id="1673" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="1670"><span data-dcnode-id="1672" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="business/tech-reference/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="emma-witman" data-bi-ad="" data-dcnode-id="1671" data-force="" data-not-lazy="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="tech-reference,reference-gaming,reference-software-apps" data-subvertical="tech-reference" data-tag="tech-how-to,minecraft,foxes,minecraft-items,mojang,microsoft,gaming,bi-freelancer,reference-gaming" data-tile-order="tile-1" data-type="ad" data-url="/how-to-tame-a-fox-in-minecraft" id="gpt-post-sai-desktop_in_post_ad-desktop-1"></div></div><p data-dcnode-id="1665"><span data-dcnode-id="1669" instrument_node="">Foxes have been part of </span><a data-analytics-module="body_link" data-analytics-post-depth="20" data-dcnode-id="1667" data-uri="9f571e45dbfd5579593d0f4294300ceb" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/category/minecraft" rel="noopener" target="_blank"><span data-dcnode-id="1668" instrument_node="">Minecraft</span></a><span data-dcnode-id="1666" instrument_node=""> since 2018, and it's one of the game's cutest "mobs" — the game's term for its NPCs.</span></p><p data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">Like most animal mobs, foxes can be tamed so they'll follow and obey you. However, unlike those other animals, you can't simply convince any random fox to like you. Instead, you'll need to breed a new fox into existence.</span></p><p data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Here's how to tame foxes in "Minecraft," whether playing in Survival mode or Creative mode.</span></p><span data-dcnode-id="1660" instrument_node="">

0 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1151" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1149" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=EJKsoM0QEIk" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></div><p data-dcnode-id="1129"></p><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">To tame a fox, you'll need to make two wild foxes have a child. Here's how to do it.</span></p><span data-dcnode-id="1126" instrument_node="">
</span><span data-dcnode-id="1125" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="1122"><span data-dcnode-id="1124" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="business/tech-reference/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="emma-witman" data-bi-ad="" data-dcnode-id="1123" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="tech-reference,reference-gaming,reference-software-apps" data-subvertical="tech-reference" data-tag="tech-how-to,minecraft,foxes,minecraft-items,mojang,microsoft,gaming,bi-freelancer,reference-gaming" data-tile-order="tile-3" data-type="ad" data-url="/how-to-tame-a-fox-in-minecraft" id="gpt-post-sai-desktop_in_post_ad-desktop-3"></div></div><h3 data-dcnode-id="1119"><strong data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Find and capture two foxes</span></strong></h3><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">First you'll need to find your wild foxes.&nbsp;</span></p><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Foxes can be found in the taiga biome and taiga biome only, with the small caveat that they might wander to adjacent biomes. The taiga biome is characterized by its tall, green spruce trees. There's a few variations of the taiga biome, including snowy taigas that feature white foxes.</span></p><p data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">An untamed fox is a fickle, skittish creature. You'll want to search for them during the day, when most of them will be asleep.</span></p><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">The moment you see a curled up, conked-out fox, make sure you start crouching right away. You'll use the shift key to crouch on a computer, or your controller-specific crouch button if playing on a console.</span></p><span data-dcnode-id="1110" instrument_node="">
</span><figure class="figure image-figure-image" data-dcnode-id="1088" data-e2e-name="image-figure-image" data-media-container="image" data-type="img"><span data-dcnode-id="1109" instrument_node="">
</span><a class="image-click-enlarge" data-analytics-module="body_link" data-analytics-post-depth="40" data-click-enlarge="" data-component-type="click-to-enlarge" data-credit-href="" data-dcnode-id="1099" data-uri="e5aceb41ebde7a6262ff461616b23339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.insider.com/6079f27974da0300181e23d4"><span data-dcnode-id="1108" instrument_node="">
</span><div class="lazy-holder" data-dcnode-id="1101" style="padding-top: calc(100% * 800 / 1280)"><span data-dcnode-id="1107" instrument_node="">
</span><img alt="3   How to tame a fox in Minecraft" class="lazy-image js-queued js-rendered" data-content-type="image/png" data-dcnode-id="1106" data-srcs="{&quot;https://i.insider.com/6079f27974da0300181e23d4&quot;:{&quot;contentType&quot;:&quot;image/png&quot;,&quot;aspectRatioW&quot;:8,&quot;aspectRatioH&quot;:5}}" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.insider.com/6079f27974da0300181e23d4%3Fwidth%3D600%26format%3Djpeg%26auto%3Dwebp&amp;raw"><span data-dcnode-id="1105" instrument_node="">
</span><noscript data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">
                              &lt;img src="https://i.insider.com/6079f27974da0300181e23d4?width=600&amp;format=jpeg&amp;auto=webp" /&gt;
                          </span></noscript><span data-dcnode-id="1102" instrument_node="">
</span></div><span data-dcnode-id="1100" instrument_node=""> </span></a><span data-dcnode-id="1098" instrument_node="">
</span><span class="image-source-caption" data-dcnode-id="1090"><span data-dcnode-id="1097" instrument_node="">
</span><figcaption class="image-caption headline-bold" data-dcnode-id="1095" data-e2e-name="image-caption"><span data-dcnode-id="1096" instrument_node="">
                              Foxes sleep during the day, and hunt at night.
                            </span></figcaption><span data-dcnode-id="1094" instrument_node="">
</span><span class="image-source headline-regular" data-dcnode-id="1092" data-e2e-name="image-source"><span data-dcnode-id="1093" instrument_node="">
                                Emma Witman/Insider
                              </span></span><span data-dcnode-id="1091" instrument_node="">
</span></span><span data-dcnode-id="1089" instrument_node="">
</span></figure><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Now, still crouching, build a pen around the fox to trap it. You can use any block to make your pen, but you'll want to make the walls tall — at least three blocks. This will make sure it can't escape. You can't stop crouching until the fox is cordoned in its pen. The moment you uncrouch, a fight-or-flight switch flips in the foxes and they'll run away.</span></p><p data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">If you see two foxes near each other, that's even better — trap them both in the same pen.</span></p><span data-dcnode-id="1083" instrument_node="">
</span><figure class="figure image-figure-image" data-dcnode-id="1061" data-e2e-name="image-figure-image" data-media-container="image" data-type="img"><span data-dcnode-id="1082" instrument_node="">
</span><a class="image-click-enlarge" data-analytics-module="body_link" data-analytics-post-depth="40" data-click-enlarge="" data-component-type="click-to-enlarge" data-credit-href="" data-dcnode-id="1072" data-uri="4e526a69fe7b7646af36896a463ebded" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.insider.com/6079f32a74da0300181e23e3"><span data-dcnode-id="1081" instrument_node="">
</span><div class="lazy-holder" data-dcnode-id="1074" style="padding-top: calc(100% * 800 / 1280)"><span data-dcnode-id="1080" instrument_node="">
</span><img alt="4   How to tame a fox in Minecraft" class="lazy-image js-queued js-rendered" data-content-type="image/png" data-dcnode-id="1079" data-srcs="{&quot;https://i.insider.com/6079f32a74da0300181e23e3&quot;:{&quot;contentType&quot;:&quot;image/png&quot;,&quot;aspectRatioW&quot;:8,&quot;aspectRatioH&quot;:5}}" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.insider.com/6079f32a74da0300181e23e3%3Fwidth%3D600%26format%3Djpeg%26auto%3Dwebp&amp;raw"><span data-dcnode-id="1078" instrument_node="">
</span><noscript data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">
                              &lt;img src="https://i.insider.com/6079f32a74da0300181e23e3?width=600&amp;format=jpeg&amp;auto=webp" /&gt;
                          </span></noscript><span data-dcnode-id="1075" instrument_node="">
</span></div><span data-dcnode-id="1073" instrument_node=""> </span></a><span data-dcnode-id="1071" instrument_node="">
</span><span class="image-source-caption" data-dcnode-id="1063"><span data-dcnode-id="1070" instrument_node="">
</span><figcaption class="image-caption headline-bold" data-dcnode-id="1068" data-e2e-name="image-caption"><span data-dcnode-id="1069" instrument_node="">
                              Trap both foxes with fences or blocks.
                            </span></figcaption><span data-dcnode-id="1067" instrument_node="">
</span><span class="image-source headline-regular" data-dcnode-id="1065" data-e2e-name="image-source"><span data-dcnode-id="1066" instrument_node="">
                                Emma Witman/Insider
                              </span></span><span data-dcnode-id="1064" instrument_node="">
</span></span><span data-dcnode-id="1062" instrument_node="">
</span></figure><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">This is rare, though, so you'll probably need to find and trap the foxes separately. Once you've done this, you'll need to connect the two traps with a wall of blocks.</span></p><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">However, if the foxes you find are pretty far apart, and you don't want to take on a large construction gig, you can use a boat. Place a boat in front of a fox, and when it walks into it, it'll be trapped inside. You can then row the boat (even across land) to the other fox, and pen them both in.</span></p><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Regardless which option you choose, you ultimately want to end up with a fairly tight enclosure to hold the two foxes.</span></p><span data-dcnode-id="1054" instrument_node="">
</span><figure class="figure image-figure-image" data-dcnode-id="1032" data-e2e-name="image-figure-image" data-media-container="image" data-type="img"><span data-dcnode-id="1053" instrument_node="">
</span><a class="image-click-enlarge" data-analytics-module="body_link" data-analytics-post-depth="60" data-click-enlarge="" data-component-type="click-to-enlarge" data-credit-href="" data-dcnode-id="1043" data-uri="45339477a827b0cf9423e067df5d437e" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.insider.com/6079f37a44f454001920738e"><span data-dcnode-id="1052" instrument_node="">
</span><div class="lazy-holder" data-dcnode-id="1045" style="padding-top: calc(100% * 800 / 1280)"><span data-dcnode-id="1051" instrument_node="">

</span><noscript data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">
                              &lt;img src="https://i.insider.com/6079f37a44f454001920738e?width=600&amp;format=jpeg&amp;auto=webp" /&gt;
                          </span></noscript><span data-dcnode-id="1046" instrument_node="">
</span></div><span data-dcnode-id="1044" instrument_node=""> </span></a><span data-dcnode-id="1042" instrument_node="">
</span><span class="image-source-caption" data-dcnode-id="1034"><span data-dcnode-id="1041" instrument_node="">
</span><figcaption class="image-caption headline-bold" data-dcnode-id="1039" data-e2e-name="image-caption"><span data-dcnode-id="1040" instrument_node="">
                              Get the foxes near each other.
                            </span></figcaption><span data-dcnode-id="1038" instrument_node="">
</span><span class="image-source headline-regular" data-dcnode-id="1036" data-e2e-name="image-source"><span data-dcnode-id="1037" instrument_node="">

</span></span><span data-dcnode-id="1033" instrument_node="">
</span></figure><aside class="quick-tip headline-regular" data-dcnode-id="1004"><p data-dcnode-id="1028"><strong data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Quick tip:</span></strong><span data-dcnode-id="1029" instrument_node=""> If you're playing in Creative mode — or can change your gamemode to Creative — you can spawn an infinite amount of foxes at any time. Just find the Fox Spawn Egg item in your infinite inventory and use it on any free space. You'll still need to trap at least two of them, though.</span></p><span data-dcnode-id="1027" instrument_node="">
</span><figure class="figure image-figure-image" data-dcnode-id="1005" data-e2e-name="image-figure-image" data-media-container="image" data-type="img"><span data-dcnode-id="1026" instrument_node="">
</span><a class="image-click-enlarge" data-analytics-module="body_link" data-analytics-post-depth="60" data-click-enlarge="" data-component-type="click-to-enlarge" data-credit-href="" data-dcnode-id="1016" data-uri="eaf3ce14a6cdfdefdd2434a4ea751436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.insider.com/6079f39874da0300181e23e5"><span data-dcnode-id="1025" instrument_node="">
</span><div class="lazy-holder" data-dcnode-id="1018" style="padding-top: calc(100% * 800 / 1280)"><span data-dcnode-id="1024" instrument_node="">

</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="business/tech-reference/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="emma-witman" data-bi-ad="" data-dcnode-id="1000" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="tech-reference,reference-gaming,reference-software-apps" data-subvertical="tech-reference" data-tag="tech-how-to,minecraft,foxes,minecraft-items,mojang,microsoft,gaming,bi-freelancer,reference-gaming" data-tile-order="tile-4" data-type="ad" data-url="/how-to-tame-a-fox-in-minecraft" id="gpt-post-sai-desktop_in_post_ad-desktop-4"></div></div><h3 data-dcnode-id="996"><strong data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Feed the foxes sweet berries</span></strong></h3><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Whether you've spent the last hour wrangling foxes, or simply threw down a few Fox Spawn Eggs, you should now have two adult foxes penned in. If you caught a baby fox, wait for it to age up.</span></p><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Get close to the two adult foxes, and equip a sweet berry. These come from the green-and-red bushes you occasionally see which slow and hurt you when you walk through them. They're fairly commonplace in the taiga, if you haven't gathered any already.</span></p><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Feed berries to both foxes by using it on them. If you're struggling to get near enough to feed the foxes, make sure you're crouching.&nbsp;</span></p><span data-dcnode-id="989" instrument_node="">
</span><figure class="figure image-figure-image" data-dcnode-id="967" data-e2e-name="image-figure-image" data-media-container="image" data-type="img"><span data-dcnode-id="988" instrument_node="">

</span><figcaption class="image-caption headline-bold" data-dcnode-id="974" data-e2e-name="image-caption"><span data-dcnode-id="975" instrument_node="">

</span></span><span data-dcnode-id="968" instrument_node="">
</span></figure><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Equip the sweet berries in your hotbar, and then approach the fox and use the berries on it to feed it a berry. If you're struggling to get near enough to feed the foxes, make sure you're crouching.&nbsp;</span></p><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Upon feeding sweet berries to both foxes, they'll immediately breed a baby fox.&nbsp;</span></p><p data-dcnode-id="958"><span data-dcnode-id="962" instrument_node="">This baby fox is your golden egg: They'll be sweet and docile, unlike their parents, who will still go berserk when you release the crouch key. </span><strong data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">This is your tamed fox</span></strong><span data-dcnode-id="959" instrument_node="">.</span></p><span data-dcnode-id="957" instrument_node="">

</span><figure class="figure image-figure-image" data-dcnode-id="898" data-e2e-name="image-figure-image" data-media-container="image" data-type="img"><span data-dcnode-id="919" instrument_node="">
