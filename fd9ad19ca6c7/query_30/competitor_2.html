</span><span class="cat-links" data-dcnode-id="3914" itemprop="about"><a data-dcnode-id="3915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecapecoop.com/category/chickens/" rel="category tag"><span data-dcnode-id="3916" instrument_node="">Chickens</span></a></span><h1 class="entry-title" data-dcnode-id="3912" itemprop="headline"><span data-dcnode-id="3913" instrument_node="">Best Chicken Breeds for Pets</span></h1><div class="entry-meta" data-dcnode-id="3893"><span class="byline" data-dcnode-id="3908" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="3911" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="3909" itemprop="name"><a class="url fn n" data-dcnode-id="3910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecapecoop.com/author/lizmartin1221msn-com/"></a></span></span><span class="posted-on" data-dcnode-id="3902"><span class="text-on" data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">updated on </span></span><a data-dcnode-id="3903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecapecoop.com/best-chicken-breeds-for-pets/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="3905" datetime="" itemprop="dateModified"></time><time class="updated" data-dcnode-id="3904" datetime="" itemprop="datePublished"></time></a></span><span class="comments" data-dcnode-id="3894"><svg aria-hidden="true" class="svg-inline--fa fa-comment fa-w-16" data-dcnode-id="3900" data-fa-i2svg="" data-icon="comment" data-prefix="fa" role="img" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M256 32C114.6 32 0 125.1 0 240c0 49.6 21.4 95 57 130.7C44.5 421.1 2.7 466 2.2 466.5c-2.2 2.3-2.8 5.7-1.5 8.7S4.8 480 8 480c66.3 0 116-31.8 140.6-51.4 32.7 12.3 69 19.4 107.4 19.4 141.4 0 256-93.1 256-208S397.4 32 256 32z" data-dcnode-id="3901" fill="currentColor"></path></svg><a data-dcnode-id="3895" href="#comments"><span data-dcnode-id="3898" instrument_node="">44 Comments</span><span class="screen-reader-text" data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node=""> on Best Chicken Breeds for Pets</span></span></a></span></div><span data-dcnode-id="3891" instrument_node=""> </span></header><span data-dcnode-id="3888" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3684" itemprop="text"><span data-dcnode-id="3887" instrument_node="">
</span><div class="text" data-dcnode-id="3686"><div class="code-block code-block-1" data-dcnode-id="3881" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="3886" instrument_node="">
</span><i data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">*This post may contain affiliate links, which means as an Amazon Associate I may receive a small percentage from qualifying purchases if you make a purchase using the links, at no additional cost*</span></i><br data-dcnode-id="3883"><span data-dcnode-id="3882" instrument_node="">
---------------------------------------------------------</span></div><span data-dcnode-id="3880" instrument_node="">
</span><p data-dcnode-id="3875" style="text-align: justify;"><a data-dcnode-id="3876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapecoop.com/wp-content/uploads/2017/06/ChickenBreeds.jpg"><img alt="" class="alignnone wp-image-3848 lazyloaded" data-dcnode-id="3879" data-sizes="(max-width: 383px) 100vw, 383px" data-src="https://www.thecapecoop.com/wp-content/uploads/2017/06/ChickenBreeds.jpg" data-srcset="https://thecapecoop.com/wp-content/uploads/2017/06/ChickenBreeds.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/ChickenBreeds-225x300.jpg 225w, https://thecapecoop.com/wp-content/uploads/2017/06/ChickenBreeds-150x200.jpg 150w" height="511" sizes="(max-width: 383px) 100vw, 383px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapecoop.com/wp-content/uploads/2017/06/ChickenBreeds.jpg&amp;raw" srcset="https://thecapecoop.com/wp-content/uploads/2017/06/ChickenBreeds.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/ChickenBreeds-225x300.jpg 225w, https://thecapecoop.com/wp-content/uploads/2017/06/ChickenBreeds-150x200.jpg 150w" width="383"><noscript data-dcnode-id="3877"><span data-dcnode-id="3878" instrument_node="">&lt;img class="alignnone wp-image-3848" src="https://www.thecapecoop.com/wp-content/uploads/2017/06/ChickenBreeds.jpg" alt="" width="383" height="511" srcset="https://thecapecoop.com/wp-content/uploads/2017/06/ChickenBreeds.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/ChickenBreeds-225x300.jpg 225w, https://thecapecoop.com/wp-content/uploads/2017/06/ChickenBreeds-150x200.jpg 150w" sizes="(max-width: 383px) 100vw, 383px" /&gt;</span></noscript></a></p><span data-dcnode-id="3874" instrument_node="">
</span><p data-dcnode-id="3872" style="text-align: justify;"><span data-dcnode-id="3873" instrument_node="">For the past couple decades, chickens have been growing in popularity as people become more interested in knowing where their food comes from, and desire to live a more natural lifestyle. &nbsp;But they are so much more than just egg factories!</span></p><span data-dcnode-id="3871" instrument_node="">
</span><p data-dcnode-id="3864" style="text-align: justify;"><span data-dcnode-id="3870" instrument_node="">Watching chickens scratch about the yard is relaxing and de-stressing after a long day at work. &nbsp;Many pet chickens are extremely tame and will eat out of your hand and sit on your lap. &nbsp;They even “purr” when happy! &nbsp;They are very smart and can be trained to come when called or to do tricks (</span><a data-dcnode-id="3868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapecoop.com/how-to-train-your-chicken/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3869" instrument_node="">click here to read about training your chickens</span></a><span data-dcnode-id="3867" instrument_node="">). &nbsp; Need more convincing that chickens are awesome? &nbsp;</span><a data-dcnode-id="3865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapecoop.com/the-benefits-of-keeping-chickens/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3866" instrument_node="">Check out my post on the benefits of keeping chickens.</span></a></p><span data-dcnode-id="3863" instrument_node="">
</span><p data-dcnode-id="3861" style="text-align: justify;"><span data-dcnode-id="3862" instrument_node="">Chickens are an easy pet to incorporate into nearly any family – they don’t bark at your neighbors, they don’t need to be walked, you can leave them over a long weekend without worrying while you go out of town – and of course they give you all the fresh eggs you can eat!</span></p><span data-dcnode-id="3860" instrument_node="">
</span><p data-dcnode-id="3855" style="text-align: justify;"><a data-dcnode-id="3856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapecoop.com/wp-content/uploads/2017/06/DSC_2330.jpg"><img alt="" class="alignnone wp-image-3843 lazyloaded" data-dcnode-id="3859" data-sizes="(max-width: 495px) 100vw, 495px" data-src="https://www.thecapecoop.com/wp-content/uploads/2017/06/DSC_2330.jpg" data-srcset="https://thecapecoop.com/wp-content/uploads/2017/06/DSC_2330.jpg 800w, https://thecapecoop.com/wp-content/uploads/2017/06/DSC_2330-600x481.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/DSC_2330-300x240.jpg 300w, https://thecapecoop.com/wp-content/uploads/2017/06/DSC_2330-768x615.jpg 768w, https://thecapecoop.com/wp-content/uploads/2017/06/DSC_2330-150x120.jpg 150w" height="397" sizes="(max-width: 495px) 100vw, 495px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapecoop.com/wp-content/uploads/2017/06/DSC_2330.jpg&amp;raw" srcset="https://thecapecoop.com/wp-content/uploads/2017/06/DSC_2330.jpg 800w, https://thecapecoop.com/wp-content/uploads/2017/06/DSC_2330-600x481.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/DSC_2330-300x240.jpg 300w, https://thecapecoop.com/wp-content/uploads/2017/06/DSC_2330-768x615.jpg 768w, https://thecapecoop.com/wp-content/uploads/2017/06/DSC_2330-150x120.jpg 150w" width="495"><noscript data-dcnode-id="3857"><span data-dcnode-id="3858" instrument_node="">&lt;img class="alignnone wp-image-3843" src="https://www.thecapecoop.com/wp-content/uploads/2017/06/DSC_2330.jpg" alt="" width="495" height="397" srcset="https://thecapecoop.com/wp-content/uploads/2017/06/DSC_2330.jpg 800w, https://thecapecoop.com/wp-content/uploads/2017/06/DSC_2330-600x481.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/DSC_2330-300x240.jpg 300w, https://thecapecoop.com/wp-content/uploads/2017/06/DSC_2330-768x615.jpg 768w, https://thecapecoop.com/wp-content/uploads/2017/06/DSC_2330-150x120.jpg 150w" sizes="(max-width: 495px) 100vw, 495px" /&gt;</span></noscript></a></p><span data-dcnode-id="3854" instrument_node="">
</span><p data-dcnode-id="3852" style="text-align: justify;"><span data-dcnode-id="3853" instrument_node="">There are hundreds of breeds of chickens, so how do you decide which ones make the best pets? &nbsp;Well just like different dog breeds have their own sets of traits, different chicken breeds have their own traits too.</span></p><span data-dcnode-id="3851" instrument_node="">
</span><p data-dcnode-id="3849" style="text-align: justify;"><span data-dcnode-id="3850" instrument_node="">I will separate my top picks into excellent egg layers and poor/moderate layers. &nbsp;When you are keeping chickens as pets and high egg production isn’t the main goal, you can add in a few of the gorgeous, ornamental breeds! &nbsp;These exotic birds are beautiful, but aren’t usually the most reliable egg layers.</span></p><span data-dcnode-id="3848" instrument_node="">
</span><p data-dcnode-id="3846" style="text-align: justify;"><span data-dcnode-id="3847" instrument_node="">Sometimes having a flock of high production breeds can be overwhelming for backyard chicken pet owners. &nbsp;Excellent layers can give you 5-6 eggs per week. &nbsp;Even with a relatively small flock of 6 chickens you are talking about 3 dozen weekly eggs. &nbsp;Every. Single. Week. For at least half of the year.</span></p><span data-dcnode-id="3845" instrument_node="">
</span><p data-dcnode-id="3843" style="text-align: justify;"><span data-dcnode-id="3844" instrument_node="">For the first few months it’s amazing to eat so many fresh eggs – but when you go to your refrigerator and find 11 dozen backed up eggs, you might find yourself wishing you had mixed in some lower production breeds!&nbsp; Every bird is an individual, but in general, these are the breeds I would recommend for starting your own flock of pet chickens!</span></p><span data-dcnode-id="3842" instrument_node="">
</span><h3 data-dcnode-id="3840" style="text-align: justify;"><span data-dcnode-id="3841" instrument_node="">Moderate/Poor Egg Layers</span></h3><span data-dcnode-id="3839" instrument_node="">
</span><p data-dcnode-id="3835" style="text-align: justify;"><strong data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">Silkies</span></strong><span data-dcnode-id="3836" instrument_node=""> – Silkies are bantam, mini chickens that have fluffy, fur like feathers, making them feel more like a cat than a chicken. &nbsp;They have feathered feet, feathered crests, they often just look like a round puff ball! &nbsp;Silkies are also very calm and friendly. &nbsp;Well known for their mothering abilities, they will spend a lot of time being broody which can cut down on their laying, but they will hatch and mother pretty much any kind of egg you give them. &nbsp;When they are laying, you can expect 3-4 small eggs per week. &nbsp;Silkies come in a large variety of colors including white, buff, black, blue, brown Partridge, &amp; mixes. &nbsp;A great choice for families with kids, children always love these friendly, tiny, fluffy birds!</span></p><span data-dcnode-id="3834" instrument_node="">
</span><p data-dcnode-id="3829" style="text-align: justify;"><a data-dcnode-id="3830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapecoop.com/wp-content/uploads/2017/06/IMG_3019.jpg"><img alt="" class="alignnone wp-image-3845 lazyloaded" data-dcnode-id="3833" data-sizes="(max-width: 495px) 100vw, 495px" data-src="https://www.thecapecoop.com/wp-content/uploads/2017/06/IMG_3019.jpg" data-srcset="https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3019.jpg 800w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3019-500x500.jpg 500w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3019-300x300.jpg 300w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3019-600x600.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3019-150x150.jpg 150w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3019-768x768.jpg 768w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3019-210x210.jpg 210w" height="495" sizes="(max-width: 495px) 100vw, 495px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapecoop.com/wp-content/uploads/2017/06/IMG_3019.jpg&amp;raw" srcset="https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3019.jpg 800w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3019-500x500.jpg 500w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3019-300x300.jpg 300w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3019-600x600.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3019-150x150.jpg 150w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3019-768x768.jpg 768w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3019-210x210.jpg 210w" width="495"><noscript data-dcnode-id="3831"><span data-dcnode-id="3832" instrument_node="">&lt;img class="alignnone wp-image-3845" src="https://www.thecapecoop.com/wp-content/uploads/2017/06/IMG_3019.jpg" alt="" width="495" height="495" srcset="https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3019.jpg 800w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3019-500x500.jpg 500w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3019-300x300.jpg 300w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3019-600x600.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3019-150x150.jpg 150w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3019-768x768.jpg 768w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3019-210x210.jpg 210w" sizes="(max-width: 495px) 100vw, 495px" /&gt;</span></noscript></a></p><span data-dcnode-id="3828" instrument_node="">
</span><p data-dcnode-id="3824" style="text-align: justify;"><strong data-dcnode-id="3826"><span data-dcnode-id="3827" instrument_node="">Polish</span></strong><span data-dcnode-id="3825" instrument_node=""> – probably one of the most unusual looking chicken breeds, everyone loves the looks of these guys! &nbsp;Polish chickens have huge poofs of feathers on their head and many have beards as well. &nbsp;Polish are friendly and quiet. &nbsp;They will almost always be at the bottom of the pecking order due to their docile nature, which makes them great pets, but keep an eye on them to make sure your other chickens aren’t picking on them. &nbsp;Their feather head poofs can get in the way of their vision, making them a little skiddish if you approach them from their blind spots. &nbsp;A couple times per year, we trim the feathers in their field of vision and that helps calm them down a bit. &nbsp;My Polish girls are some of the first to greet me and remind me of my cat because they always seem to be under my feet, weaving between my legs lol. &nbsp;They are not great egg layers, but will lay 2-3 smallish-medium size white eggs.</span></p><span data-dcnode-id="3823" instrument_node="">
</span><p data-dcnode-id="3818" style="text-align: justify;"><a data-dcnode-id="3819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapecoop.com/wp-content/uploads/2017/06/IMG_1982.jpg"><img alt="" class="alignnone wp-image-3840 lazyloaded" data-dcnode-id="3822" data-sizes="(max-width: 317px) 100vw, 317px" data-src="https://www.thecapecoop.com/wp-content/uploads/2017/06/IMG_1982.jpg" data-srcset="https://thecapecoop.com/wp-content/uploads/2017/06/IMG_1982.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_1982-225x300.jpg 225w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_1982-150x200.jpg 150w" height="423" sizes="(max-width: 317px) 100vw, 317px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapecoop.com/wp-content/uploads/2017/06/IMG_1982.jpg&amp;raw" srcset="https://thecapecoop.com/wp-content/uploads/2017/06/IMG_1982.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_1982-225x300.jpg 225w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_1982-150x200.jpg 150w" width="317"><noscript data-dcnode-id="3820"><span data-dcnode-id="3821" instrument_node="">&lt;img class="alignnone wp-image-3840" src="https://www.thecapecoop.com/wp-content/uploads/2017/06/IMG_1982.jpg" alt="" width="317" height="423" srcset="https://thecapecoop.com/wp-content/uploads/2017/06/IMG_1982.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_1982-225x300.jpg 225w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_1982-150x200.jpg 150w" sizes="(max-width: 317px) 100vw, 317px" /&gt;</span></noscript></a></p><span data-dcnode-id="3817" instrument_node="">
</span><p data-dcnode-id="3813" style="text-align: justify;"><strong data-dcnode-id="3815"><span data-dcnode-id="3816" instrument_node="">Cochin&nbsp;</span></strong><span data-dcnode-id="3814" instrument_node="">– Cochins are adorable, round, and fluffy. &nbsp;They have fluffy feet and a round, fluff ball tail. &nbsp;They have sweet, calm personalities and are very friendly. &nbsp;Cochins come in both large standard &amp; small bantam size. &nbsp;One of our cochins is a bantam mottled Cochin, as soon as one of us sits down in the chairs in the backyard, she RUNS (and sometimes flies) straight at us to come sit on our lap. &nbsp;She likes to perch on the chair arm, or settle into our lap, or sometimes climb up to our shoulder. &nbsp;Cochins do tend to go broody a lot and make excellent mothers. &nbsp;When they are not broody, you can expect 3-5 medium light brown eggs per week.</span></p><span data-dcnode-id="3812" instrument_node="">
</span><p data-dcnode-id="3807" style="text-align: justify;"><a data-dcnode-id="3808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapecoop.com/wp-content/uploads/2017/06/18622565_10154339335496755_3822840455764363455_n.jpg"><img alt="" class="alignnone wp-image-3841 lazyloaded" data-dcnode-id="3811" data-sizes="(max-width: 540px) 100vw, 540px" data-src="https://www.thecapecoop.com/wp-content/uploads/2017/06/18622565_10154339335496755_3822840455764363455_n.jpg" data-srcset="https://thecapecoop.com/wp-content/uploads/2017/06/18622565_10154339335496755_3822840455764363455_n.jpg 800w, https://thecapecoop.com/wp-content/uploads/2017/06/18622565_10154339335496755_3822840455764363455_n-600x450.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/18622565_10154339335496755_3822840455764363455_n-300x225.jpg 300w, https://thecapecoop.com/wp-content/uploads/2017/06/18622565_10154339335496755_3822840455764363455_n-768x576.jpg 768w, https://thecapecoop.com/wp-content/uploads/2017/06/18622565_10154339335496755_3822840455764363455_n-150x113.jpg 150w" height="405" sizes="(max-width: 540px) 100vw, 540px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapecoop.com/wp-content/uploads/2017/06/18622565_10154339335496755_3822840455764363455_n.jpg&amp;raw" srcset="https://thecapecoop.com/wp-content/uploads/2017/06/18622565_10154339335496755_3822840455764363455_n.jpg 800w, https://thecapecoop.com/wp-content/uploads/2017/06/18622565_10154339335496755_3822840455764363455_n-600x450.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/18622565_10154339335496755_3822840455764363455_n-300x225.jpg 300w, https://thecapecoop.com/wp-content/uploads/2017/06/18622565_10154339335496755_3822840455764363455_n-768x576.jpg 768w, https://thecapecoop.com/wp-content/uploads/2017/06/18622565_10154339335496755_3822840455764363455_n-150x113.jpg 150w" width="540"><noscript data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">&lt;img class="alignnone wp-image-3841" src="https://www.thecapecoop.com/wp-content/uploads/2017/06/18622565_10154339335496755_3822840455764363455_n.jpg" alt="" width="540" height="405" srcset="https://thecapecoop.com/wp-content/uploads/2017/06/18622565_10154339335496755_3822840455764363455_n.jpg 800w, https://thecapecoop.com/wp-content/uploads/2017/06/18622565_10154339335496755_3822840455764363455_n-600x450.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/18622565_10154339335496755_3822840455764363455_n-300x225.jpg 300w, https://thecapecoop.com/wp-content/uploads/2017/06/18622565_10154339335496755_3822840455764363455_n-768x576.jpg 768w, https://thecapecoop.com/wp-content/uploads/2017/06/18622565_10154339335496755_3822840455764363455_n-150x113.jpg 150w" sizes="(max-width: 540px) 100vw, 540px" /&gt;</span></noscript></a></p><span data-dcnode-id="3806" instrument_node="">
</span><h3 data-dcnode-id="3804" style="text-align: justify;"><span data-dcnode-id="3805" instrument_node="">Excellent Layers</span></h3><span data-dcnode-id="3803" instrument_node="">
</span><p data-dcnode-id="3799" style="text-align: justify;"><strong data-dcnode-id="3801"><span data-dcnode-id="3802" instrument_node="">Brahma</span></strong><span data-dcnode-id="3800" instrument_node=""> – Brahmas are huge sweethearts! &nbsp;Truly gentle giants, Brahmas are big birds with calm, loving personalities. &nbsp;In addition to their large size, they have profuse feathers and feathered feet. &nbsp;They have small pea combs so are less prone to frostbite and coupled with their large size, make them a great choice for northern chicken keepers. &nbsp;They come in three color varieties: light (white with black around neck, tail and wing tips), dark (grey/brown feathers with lovely black penciled outlines) and buff (a warm, golden color with black around neck, tail &amp; wings). &nbsp;In addition to their beautiful appearance and sweet personality, they are great layers! &nbsp;You can expect 5-6 large brown eggs per week.</span></p><span data-dcnode-id="3798" instrument_node="">
</span><p data-dcnode-id="3793" style="text-align: justify;"><a data-dcnode-id="3794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapecoop.com/wp-content/uploads/2017/06/IMG_2007.jpg"><img alt="" class="alignnone wp-image-3846 lazyloaded" data-dcnode-id="3797" data-sizes="(max-width: 453px) 100vw, 453px" data-src="https://www.thecapecoop.com/wp-content/uploads/2017/06/IMG_2007.jpg" data-srcset="https://thecapecoop.com/wp-content/uploads/2017/06/IMG_2007.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_2007-225x300.jpg 225w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_2007-150x200.jpg 150w" height="604" sizes="(max-width: 453px) 100vw, 453px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapecoop.com/wp-content/uploads/2017/06/IMG_2007.jpg&amp;raw" srcset="https://thecapecoop.com/wp-content/uploads/2017/06/IMG_2007.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_2007-225x300.jpg 225w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_2007-150x200.jpg 150w" width="453"><noscript data-dcnode-id="3795"><span data-dcnode-id="3796" instrument_node="">&lt;img class="alignnone wp-image-3846" src="https://www.thecapecoop.com/wp-content/uploads/2017/06/IMG_2007.jpg" alt="" width="453" height="604" srcset="https://thecapecoop.com/wp-content/uploads/2017/06/IMG_2007.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_2007-225x300.jpg 225w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_2007-150x200.jpg 150w" sizes="(max-width: 453px) 100vw, 453px" /&gt;</span></noscript></a></p><span data-dcnode-id="3792" instrument_node="">
</span><p data-dcnode-id="3788" style="text-align: justify;"><strong data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">Barred Plymouth Rock&nbsp;</span></strong><span data-dcnode-id="3789" instrument_node="">– One of the most popular chicken breeds in America for small scale farmers, for good reason. &nbsp;Gorgeous black &amp; white striping on their feathers and a large, round body make them a stunning bird. &nbsp;Their personality is equally stunning – very sweet, friendly, gentle and curious. &nbsp;They are excellent natural foragers and will happily spend the day ridding your yard of insects. &nbsp;They are very hardy New England birds and excellent layers, 5-6 large brown eggs per week. &nbsp;Our first Plymouth Rock lived over 7 years and still laid occasionally even at her very advanced age!</span></p><span data-dcnode-id="3787" instrument_node="">
</span><p data-dcnode-id="3782" style="text-align: justify;"><a data-dcnode-id="3783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapecoop.com/wp-content/uploads/2017/06/IMG_1183.jpg"><img alt="" class="alignnone wp-image-3842 lazyloaded" data-dcnode-id="3786" data-sizes="(max-width: 484px) 100vw, 484px" data-src="https://www.thecapecoop.com/wp-content/uploads/2017/06/IMG_1183.jpg" data-srcset="https://thecapecoop.com/wp-content/uploads/2017/06/IMG_1183.jpg 751w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_1183-600x750.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_1183-240x300.jpg 240w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_1183-150x188.jpg 150w" height="605" sizes="(max-width: 484px) 100vw, 484px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapecoop.com/wp-content/uploads/2017/06/IMG_1183.jpg&amp;raw" srcset="https://thecapecoop.com/wp-content/uploads/2017/06/IMG_1183.jpg 751w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_1183-600x750.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_1183-240x300.jpg 240w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_1183-150x188.jpg 150w" width="484"><noscript data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">&lt;img class="alignnone wp-image-3842" src="https://www.thecapecoop.com/wp-content/uploads/2017/06/IMG_1183.jpg" alt="" width="484" height="605" srcset="https://thecapecoop.com/wp-content/uploads/2017/06/IMG_1183.jpg 751w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_1183-600x750.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_1183-240x300.jpg 240w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_1183-150x188.jpg 150w" sizes="(max-width: 484px) 100vw, 484px" /&gt;</span></noscript></a></p><span data-dcnode-id="3781" instrument_node="">
</span><p data-dcnode-id="3777" style="text-align: justify;"><strong data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">Buff Opringtons&nbsp;</span></strong><span data-dcnode-id="3778" instrument_node="">– Buff Orpingtons are often referred to as the “Golden Retriever” of chickens. &nbsp;Large, friendly, quiet, loyal, and docile, Buffs make excellent pet chickens. &nbsp;They have a lovely golden buff color and lots of soft under-feathers giving them a puffy shape. &nbsp;They are very hardy birds, well suited to colder climates. &nbsp;Buff is the most popular color choice, but the original Orpington color varieties include&nbsp;black, white, buff, blue. &nbsp;In addition to the traditional colors, breeders are developing many more varieties and even bantam Orpingtons.</span></p><span data-dcnode-id="3776" instrument_node="">
</span><p data-dcnode-id="3774" style="text-align: justify;"><span data-dcnode-id="3775" instrument_node="">Buffs make excellent mothers but are not overly broody like Silkies and Cochins. &nbsp;You can expect 5-6 large, light brown eggs per week. &nbsp;We let our Buff hatch out several clutches of chicks and she was an amazing mother – she was also really patient with the human children who were fascinated with the whole hatching/chick raising process. &nbsp;Many mother hens are fiercely protective of their nest and will peck at you when you go near them, but our Buff was always very sweet and gentle.</span></p><span data-dcnode-id="3773" instrument_node="">
</span><p data-dcnode-id="3768" style="text-align: justify;"><a data-dcnode-id="3769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapecoop.com/wp-content/uploads/2017/06/13177080_701710566635436_7261389424494494782_n.jpg"><img alt="" class="alignnone wp-image-3847 lazyloaded" data-dcnode-id="3772" data-sizes="(max-width: 393px) 100vw, 393px" data-src="https://www.thecapecoop.com/wp-content/uploads/2017/06/13177080_701710566635436_7261389424494494782_n.jpg" data-srcset="https://thecapecoop.com/wp-content/uploads/2017/06/13177080_701710566635436_7261389424494494782_n.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/13177080_701710566635436_7261389424494494782_n-225x300.jpg 225w, https://thecapecoop.com/wp-content/uploads/2017/06/13177080_701710566635436_7261389424494494782_n-150x200.jpg 150w" height="524" sizes="(max-width: 393px) 100vw, 393px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapecoop.com/wp-content/uploads/2017/06/13177080_701710566635436_7261389424494494782_n.jpg&amp;raw" srcset="https://thecapecoop.com/wp-content/uploads/2017/06/13177080_701710566635436_7261389424494494782_n.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/13177080_701710566635436_7261389424494494782_n-225x300.jpg 225w, https://thecapecoop.com/wp-content/uploads/2017/06/13177080_701710566635436_7261389424494494782_n-150x200.jpg 150w" width="393"><noscript data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node="">&lt;img class="alignnone wp-image-3847" src="https://www.thecapecoop.com/wp-content/uploads/2017/06/13177080_701710566635436_7261389424494494782_n.jpg" alt="" width="393" height="524" srcset="https://thecapecoop.com/wp-content/uploads/2017/06/13177080_701710566635436_7261389424494494782_n.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/13177080_701710566635436_7261389424494494782_n-225x300.jpg 225w, https://thecapecoop.com/wp-content/uploads/2017/06/13177080_701710566635436_7261389424494494782_n-150x200.jpg 150w" sizes="(max-width: 393px) 100vw, 393px" /&gt;</span></noscript></a></p><span data-dcnode-id="3767" instrument_node="">
</span><p data-dcnode-id="3763" style="text-align: justify;"><strong data-dcnode-id="3765"><span data-dcnode-id="3766" instrument_node="">Easter Eggers</span></strong><span data-dcnode-id="3764" instrument_node=""> – These are not technically a breed, but are a type of chicken that has the blue egg laying gene. &nbsp;They don’t conform to any prescribed breed standards, so they can come in a huge variety of colors and feather patterns. &nbsp;Most Easter Eggers have muffs (a bushy beard) and ear tuffs (the only time ear hair is cute!).&nbsp; &nbsp;Most Easter Eggers are docile, friendly and quiet so they are a pleasure to have around, and as a bonus they will lay 4-6 beautiful, large, eggs per week in shades of brown, pink, blue, or green (each chicken will lay her own color egg every time depending on how dominant her blue egg gene is, she won’t lay a different color egg every day). &nbsp;We have had several Easter Eggers, laying lovely pale blue eggs, greenish-blue eggs, and light turquoise eggs.</span></p><span data-dcnode-id="3762" instrument_node="">
</span><p data-dcnode-id="3757" style="text-align: justify;"><a data-dcnode-id="3758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapecoop.com/wp-content/uploads/2017/06/IMG_3196.jpg"><img alt="" class="alignnone wp-image-3844 lazyload" data-dcnode-id="3761" data-sizes="(max-width: 520px) 100vw, 520px" data-src="https://www.thecapecoop.com/wp-content/uploads/2017/06/IMG_3196.jpg" data-srcset="https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3196.jpg 800w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3196-500x500.jpg 500w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3196-300x300.jpg 300w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3196-600x600.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3196-150x150.jpg 150w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3196-768x768.jpg 768w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3196-210x210.jpg 210w" height="520" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="520"><noscript data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">&lt;img class="alignnone wp-image-3844" src="https://www.thecapecoop.com/wp-content/uploads/2017/06/IMG_3196.jpg" alt="" width="520" height="520" srcset="https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3196.jpg 800w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3196-500x500.jpg 500w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3196-300x300.jpg 300w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3196-600x600.jpg 600w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3196-150x150.jpg 150w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3196-768x768.jpg 768w, https://thecapecoop.com/wp-content/uploads/2017/06/IMG_3196-210x210.jpg 210w" sizes="(max-width: 520px) 100vw, 520px" /&gt;</span></noscript></a></p><span data-dcnode-id="3756" instrument_node="">

</span><div class="comment-content" data-dcnode-id="3510" itemprop="commentText"><p data-dcnode-id="3512"><span data-dcnode-id="3513" instrument_node="">My Easter Egger, Lovey, is the most chatty of my five hens. I always laugh when I read how quiet they’re supposed to be. Lovely is always making some type of coo, squeal, click, or murmur. The two barred rocks, Heckle and Jeckle, rarely make noises, and are somewhat friendly, while my Buff Orphington, Rue, is the sweetest and friendly. Roxie, my oldest, is a Red Sex Link (and the last from the original flock of three) is my dominant hen and is 100% motivated by food. I’m sure Roxie influences the dynamics of the rest, as well as the personality traits they exhibit.</span></p><span data-dcnode-id="3511" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2986" itemprop="commentText"><p data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">It is hard to say. I’ve had several Cochins and while most were very friendly (one would hop on our shoulders anytime we sat down!), I did have one frizzled Cochin that was very skittish. She wasn’t mean she just didn’t like to be touched.  That one was hatched out with a broody hen. I have found the chicks I raise inside in a brooder are much friendlier because you can spend more time with them. The ones I get as adults or that are raised by mother hens tend to be more stand-off ish </span></p><span data-dcnode-id="2987" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2455" itemprop="commentText"><p data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">I’m sorry to sound so ignorant but I have lots of questions and few answers.  We live on top of a mountain in Pennsylvania, where it is windy and can get to zero and rarely below during the winter.  We have a massive tick infestation and I would love to get some birds who are excellent at controlling them.  I would love different colors of eggs but the quantity and size is irrelevant.  I love the looks of the Polish but wouldn’t want to keep a bird I would get very attached to and then keep cutting the feathers off around her eyes!  Mostly, I want chickens who are super-sweet and would be comfortable being more like pets.  We can build them any kind of coop they would want or need so that is not a factor either.  Help!</span></p><span data-dcnode-id="2456" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2397" itemprop="commentText"><p data-dcnode-id="2399"><span data-dcnode-id="2403" instrument_node="">Almost any breed of chicken will be great at eating ticks, they love to forage through the woods all day gobbling them all up.  Heritage breed chickens are generally thought to be better at foraging, but honestly I have not noticed any difference with my girls. (you can read more about heritage breeds here </span><a data-dcnode-id="2401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecapecoop.com/heritage-breed-chickens/" rel="nofollow"><span data-dcnode-id="2402" instrument_node="">https://thecapecoop.com/heritage-breed-chickens/</span></a><span data-dcnode-id="2400" instrument_node="">)  They are all great at bug hunting!  I would suggest you stick with large breed birds, first because the bigger the bird the bigger her bug appetite, and second because bigger birds will have more fat to weather a chilly, windy winter.  Polish are really cute and hilarious to watch but they are smaller birds (that said if you want one definitely get one, if you have a decent size flock, not everyone needs to be a hard worker!).  You can’t go wrong with Plymouth Rocks, Brahmas (they come in three colors), Wyandottes (also three colors), add in some Easter Eggs for blue/green eggs, and a Maran or Welsummer for dark brown eggs and you’ve got some great flock options!</span></p><span data-dcnode-id="2398" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2343" itemprop="commentText"><p data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">Holy Smokes, the Brahmas are HUGE!  I think they would dwarf anything else I had, which might not be the best for the “little guys”… the Wyandottes are beautiful and get high reviews but, again, are they predator wary?  I wanted a Maran but was told they might be too slow on the run and too timid to keep themselves safe- I’m not sure if that applies to the Welsummer or not.  I would love a Polish but was told they would never survive the winter up here, plus the other birds would pick on them.  You can see the new list I came up with in my comments to Kristi but I have now added your suggestions as possibilities.  Yes, the Easter Eggers were a given- I simply couldn’t help myself!   lol</span></p><span data-dcnode-id="2344" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2288" itemprop="commentText"><p data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">Don’t let some of those crazy Giant Brahmas fool you – I have seen videos circulating of certain lines of Brahmas and they are like knee high lol.  I’ve had a couple Brahmas and they were never that large.  They are big, fat birds but not a whole lot bigger than my Orpingtons.  Wyandottes are a good choice, they are very pretty but have a reputation for being stand offish (and my two definitely are).  But they are good free rangers.  I have had a couple Polish, the biggest downside is with all the feathers around their face they can’t see well so with lots of predators it’s probably not the best choice</span></p><span data-dcnode-id="2289" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2157" itemprop="commentText"><p data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">As we have continued to flesh this out, the list has changed somewhat.  I learned I’m colder than most, I have volumes of predators, and I need some really tick-hungry chickens.  Plus, too much egg production might not be the best for us since we only eat/use a dozen a week.  We are currently on Barred Plymouth Rock’s (another plus, I understand any errant rooster addition might be friendlier than average), Cream Legbars, Sex-link Easter Eggers, sex linked Golden Buff, Black Copper Marans (although they might be too docile and slow for this environment- opinions have varied), Favaucana or Ameraucana, and some type of unknown game bird (iffy).  I have seen an Orpington that looks adaptable to this environment but the same concerns arise and I don’t know how savvy they would be about avoiding predators.  Any and all opinions you have on this would be most appreciated!</span></p><span data-dcnode-id="2158" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2102" itemprop="commentText"><p data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">Those are all great options.  Barred Plymouth Rocks are pretty indestructible, and a bonus they are calm and friendly.  As far as Marans go, I only have one and she is really skittish, she just sticks real close to the rooster, but her eggs are gorgeous if that matters to you.  Orpingtons are a great choice, I think they would be fine in that environment, they are a real big, heavy breed.  And if you are looking to ever hatch babies, they are amazing mothers</span></p><span data-dcnode-id="2103" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1993" itemprop="commentText"><p data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">I wouldn’t choose one over the other, they are both good choices.  The bigger the chicken’s combs, they more prone to frostbite they are.  They both have a “single comb”, Maran hen’s combs are slightly larger than Welsummer hen combs, but really not by that much.  Birds with pea or rose combs (like Brahma or Wyandottes) have the smallest combs and are least likely to get frostbite</span></p><span data-dcnode-id="1994" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1919" itemprop="commentText"><p data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">Okay, drum roll… after all this poultry intelligence being shared so generously, I have no forced myself to just order them and hope everything works out well.  For those who might be interested, I ended up with Black Copper Marans, Jubilee Orpington, Gold Lace Wyandotte, Cream Legbar, Barred Plymouth Rock, Pheasant Olive Egger, and Super Blue Egg Layer.  Best of all, I got Naked Necks- what else for someone who has a bald dog?  lol  I’m sure a rooster or two will sneak in but I’ve got until June 10 to get everything ready.  Thank you, thank you- you guys have been very helpful.  ?</span></p><span data-dcnode-id="1920" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1802" itemprop="commentText"><p data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">First timer! My son has been raising 8 wonderful Orpington chickens. He was very attached. They would eat out of his hand. Seven were killed we are assuming by a fox. We bought 10 baby chicks. Our solo lucky chicken seems so sad and traumatized. I want to try to introduce her to the baby chicks but everything I read says to wait 8 weeks. We are keeping Lucky in a kennel at night next to the baby chicks in another kennel. We let Lucky out in her coop during the day. We are still in the process of adding more protection to the coop to prevent this from happening again. Do you think I should try or can the chicken kill a baby chick quickly?</span></p><span data-dcnode-id="1803" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1747" itemprop="commentText"><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Awww that is so sad Erica!  Some adult chickens are totally fine with babies, but some can and will peck a chick to death.  You are doing it right letting them live side by side to get used to each other.  Lucky might be sad and lonely enough though that she will gladly adopt the new babies as her new flock.  Orpingtons in particular are very motherly and docile, so she might surprise you.  After a week or so of living separate but side by side I would try introducing them and see how it goes.  Keep a close eye on her though and make sure she is behaving and not bullying any of the babies</span></p><span data-dcnode-id="1748" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1573" itemprop="commentText"><p data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">I would certainly suggest you do some research on the demand for chicks in your area first.  It could be exotic breeds are high in demand or it could be meat birds or high production layers.  You don’t need to use incubators at first, you could just hatch them with the broody mother hen.  But for hatching large amounts of chicks with higher hatch rates you will probably want to invest in an incubator at some point.  I would recommend you check out the book “Making Money with Chickens” by Lisa Murano.  She has lots of great ideas!</span></p><span data-dcnode-id="1574" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1508" itemprop="commentText"><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Hi Liz! I’ve been thinking about getting some backyard chickens, and I think I’m ready to dive in. I was wondering… I am interested in a friendly chicken that is also a good egg layer. I have a few options I’ve added to my list based on several blogs I’ve read, and I would be pleased as pie to have some of each breed. How well do you think  Plymouth Rock (any color), Orpingtons (any color), and Wyandottes (also any color) would do together? Maybe 1-2 of each.  </span></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">There are sooooo many others I would have to have just clucking around my yard, and maybe I dont need to worry about how many eggs they lay a week, if I am going to have at least 3 chickens. So maybe there is a different combination of chickens you might suggest?</span></p><span data-dcnode-id="1509" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1453" itemprop="commentText"><p data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Congratulations!!  They are definitely addictive, there are so many cool breeds out there, it is so hard to narrow it down!  Plymouth Rock, Orpingtons &amp; Wyandottes are three of my favorite breeds so I think that is an amazing combination.  Chickens don’t really discriminate against chickens of other breeds so really all breeds will get along.  But the three that you selected are perfect for beginners because they are all generally friendly, hardy breeds and all excellent egg layers.  But I have a hunch in a couple years you will have more than just 3 birds lol</span></p><span data-dcnode-id="1454" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1393" itemprop="commentText"><p data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Oh it was incredibly hard to narrow it down to only 3 breeds. I ended up changing it just a bit after posting my question, replacing the Plymouth Rock with 2 Easter-Eggers (and keeping the Wyandotte and Orpington. So I am getting 4 chickens total. </span></p><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">I WANT a million. I have always loved chickens, I’ve just always lived in apartments and didnt have the space available. But now that I have a yard, I thought, why the heck not? Im nervous, because I don’t want to do anything to make them miserable. The eggs are a bonus for my family, but I just want them as pets, personally. But since I’m so new, figured I better start with just a few for now. I have no doubt my chicken population will increase quite a bit over the next few years.</span></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Thanks for providing such a detailed blog. While I’m totally nervous about this, I’m also really excited to have a place to go for easy access (and thorough) help!</span></p><span data-dcnode-id="1394" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1209" itemprop="commentText"><p data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">That is awesome!  Those are some great breeds.  Silkies should do fine, I’ve had Silkies here in MA where the winters can get pretty bad and they’ve done fine.  It’s important to give them somewhere to get out of the wind/rain though.  Their feathers don’t provide the same level of protection as normal chickens.  We set up an area underneath our coop with wood boards as a wind block.  This way when it was yucky out but they still want to be outdoors they had somewhere to go</span></p><span data-dcnode-id="1210" instrument_node="">
