</span><p data-dcnode-id="2781"><span data-dcnode-id="2785" instrument_node="">Everybody should know how to tame a fox in Minecraft, because... well, why wouldn't you? They're cute, cubic little critters that roam the biomes of Minecraft and might have something to offer to the average adventurer, planted right between all the other animals you've tamed along the way. In fact, you can even learn how to breed foxes after you've tamed them, giving you a whole batch of furry forest dwellers to follow you around. If you're interested in learning how to tame a fox in </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gamesradar.com/minecraft-guide/"><span data-dcnode-id="2784" instrument_node="">Minecraft</span></a><span data-dcnode-id="2782" instrument_node="">, read on to find out.</span></p><div class="ad-unit" data-dcnode-id="2780" id="ad-unit-1"></div><p data-dcnode-id="2688"><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gamesradar.com/minecraft-the-wild-update-119-release-date/"><u data-dcnode-id="2777"><strong data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">Minecraft The Wild update</span></strong></u></a><strong data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node=""> | </span></strong><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gamesradar.com/minecraft-enchanting/"><strong data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">Minecraft enchanting</span></strong></a><strong data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node=""> | </span></strong><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2766" href="https://chatnoir-webcontent.chatnoir.eu/?in -id="2628"></div></div></div></div></div></div><div class="in-article ad-unit" data-dcnode-id="2621" id="mobile-in-article"><div data-dcnode-id="2622" id="mobile-taboola-mid-article"></div></div><aside class="hawk-nest hawk-processed" data-dcnode-id="2620" data-feat-ref="hawk-id-0" data-render-type="fte" data-result="missing" data-skip="dealsy" data-widget-id="7763398383679703000" data-widget-type="seasonal"></aside><p data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">Foxes can be found in taiga biomes at night, usually because they like nesting in leafy forests. You can find foxes in the following taiga biomes: taiga, giant tree taiga, and snow taiga biomes. You can also find them in taiga villages if those are kicking around your world. There’s a small chance for foxes to spawn as cubs, and if you’re in a snow taiga biome, then the foxes will be white instead of the classic russet with white tails.&nbsp;</span></p><h2 data-dcnode-id="2616" id="how-to-tame-a-fox-in-minecraft"><span data-dcnode-id="2617" instrument_node="">How to tame a fox in Minecraft</span></h2><div class="bordeaux-slot" data-dcnode-id="2615" data-feat-ref="bordeaux-feat-id-75" id="bordeaux-static-slot-6" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="2614" data-feat-ref="bordeaux-feat-id-78" id="bordeaux-static-slot-9" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure" data-bordeaux-image-check="" data-dcnode-id="2603"><div class="image-full-width-wrapper" data-dcnode-id="2607"><div class="image-widthsetter" data-dcnode-id="2608" style="max-width:1920px;"><p class="vanilla-image-block" data-dcnode-id="2609" style="padding-top:50.83%;"><picture data-dcnode-id="2610"><source alt="How to Tame a Fox in Minecraft" class="lazy-image-van optional-image" data-dcnode-id="2613" data-normal="https://vanilla.futurecdn.net/gamesradar/media/img/missing-image.svg" data-original-mos " data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/gamesradar/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/U9z6WiRMXD5zZWLXU77PBZ.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/U9z6WiRMXD5zZWLXU77PBZ.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/U9z6WiRMXD5zZWLXU77PBZ-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/U9z6WiRMXD5zZWLXU77PBZ-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/U9z6WiRMXD5zZWLXU77PBZ-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/gamesradar/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/U9z6WiRMXD5zZWLXU77PBZ-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/U9z6WiRMXD5zZWLXU77PBZ-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/U9z6WiRMXD5zZWLXU77PBZ-970-80.jpg 970w"></picture></p></div></div><figcaption class="" data-dcnode-id="2604" itemprop="caption description"><span class="credit" data-dcnode-id="2605" itemprop="copyrightHolder"><span data-dcnode-id="2606" instrument_node="">(Image credit: Mojang)</span></span></figcaption></figure><p data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">So, night has fallen and you’ve found a fox but they keep scampering away from you. Like other skittish creatures in Minecraft, foxes are a little shy so you have to sneak to approach them. However, an easy way to bridge the gap between humankind and foxkind is to have some Sweet Berry on hand. They love this stuff, so make sure you’ve got a handful before sneaking up to them and interacting with the fox. Little hearts blooming overhead will indicate that they’ve received your gift.&nbsp;</span></p><div class="ad-unit" data-dcnode-id="2600" id="ad-unit-2"></div><p data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">Once you’ve been able to do this enough times - we found that four or so helpings of Sweet Berry did the trick - the happy critter will be tamed and will be your friend. If you feed two foxes in the same vicinity as each other Sweet Berries and tame them both, they have a chance to procreate! Foxes that trust you will also occasionally bring you things that they pick up in their mouths, and though we mostly received feathers, we’re sure that there are other cool items that they can fetch if given the chance.&nbsp;</span></p><h2 data-dcnode-id="2596" id="bred-foxes-in-minecraft-are-automatically-tame"><span data-dcnode-id="2597" instrument_node="">Bred foxes in Minecraft are automatically tame</span></h2><div class="bordeaux-slot" data-dcnode-id="2595" data-feat-ref="bordeaux-feat-id-76" id="bordeaux-static-slot-7" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="2594" data-feat-ref="bordeaux-feat-id-79" id="bordeaux-static-slot-10" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure" data-bordeaux-image-check="" data-dcnode-id="2583"><div class="image-full-width-wrapper" data-dcnode-id="2587"><div class="image-widthsetter" data-dcnode-id="2588" style="max-width:1920px;"><p class="vanilla-image-block" data-dcnode-id="2589" style="padding-top:51.20%;"><picture data-dcnode-id="2590"><source alt="How to Tame a Fox in Minecraft" class="lazy-image-van optional-image" data-dcnode-id="2593" data-normal="https://vanilla.futurecdn.net/gamesradar/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" srcset="https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY-970-80.jpg.webp 970w" type="image/webp"><source alt="How to Tame a Fox in Minecraft" class="lazy-image-van optional-image" data-dcnode-id="2592" data-normal="https://vanilla.futurecdn.net/gamesradar/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" srcset="https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY-970-80.jpg 970w" type="image/jpeg"><img alt="How to Tame a Fox in Minecraft" class="lazy-image-van optional-image loaded" data-dcnode-id="2591" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/gamesradar/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/gamesradar/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/5ZHpsvtwyDSgEK9snsZTyY-970-80.jpg 970w"></picture></p></div></div><figcaption class="" data-dcnode-id="2584" itemprop="caption description"><span class="credit" data-dcnode-id="2585" itemprop="copyrightHolder"><span data-dcnode-id="2586" instrument_node="">(Image credit: Mojang)</span></span></figcaption></figure><p data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">Wanting to tame an army of foxes in Minecraft would probably be a bit like chucking Sweet Berries into an animal-shaped vacuum if not for one simple save: any fox cub that’s the product of two tamed foxes will automatically be born tame. That’s right.&nbsp;</span></p><p data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">You only really have to use those Sweet Berries on the original breeding pair of foxes and once that’s done, their offspring will be automatically tame and warm up to you. We noticed that they were quick to scamper off once the sun rose, so you’re going to want to fence them in if keeping a large fox pack is something that you want to do. Fox cubs will stick close to their parents instead of following the player around, so you don’t have to worry about having a hanger-on while you’re knee-deep in bashing enemies. Foxes that are trusting enough will harm enemies who are harming you, though we would want to leave cubs out of it for now.&nbsp;</span></p><p data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">Now that you’ve got a better idea of how to tame a fox in Minecraft, all that’s left is to venture forth into the biomes of your choice and to pick up some loyal pets for yourself. Just arm yourself with Sweet Berries, patience, and supplies for some night-time scouting until you find these furry, soon-to-be friends.&nbsp;</span></p><div class="jwplayer__widthsetter" data-dcnode-id="2561"><div class="jwplayer__wrapper" data-dcnode-id="2562"><div class="future__jwplayer" data-dcnode-id="2563" id="futr_botr_AjQQhhy5_96GpIwdA_div"><div class="jw-error jw-reset" data-dcnode-id="2564" id="botr_AjQQhhy5_96GpIwdA_div" style="width: 100%; height: 260px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="2565"><div class="jw-icon jw-reset" data-dcnode-id="2571"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="2572" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="2573"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="2566"><div class="jw-error-text jw-reset-text" data-dcnode-id="2567" data-nosnippet="" dir="auto"><span data-dcnode-id="2570" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="2569"></span><span data-dcnode-id="2568" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><span data-dcnode-id="2560" instrument_node="">

</span><span class="bio" data-dcnode-id="2500"><p data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">GamesRadar+ was first founded in 1999, and since then has been dedicated to delivering video game-related news, reviews, previews, features, and more. Since late 2014, the website has been the online home of Total Film, SFX, Edge, and PLAY magazines, with comics site Newsarama joining the fold in 2020. Our aim as the global GamesRadar Staff team is to take you closer to the games, movies, TV shows, and comics that you love. We want to upgrade your downtime, and help you make the most of your time, money, and skills. We always aim to entertain, inform, and inspire through our mix of content - which includes news, reviews, features, tips, buying guides, and videos.</span></p></span><span data-dcnode-id="2499" instrument_node="">
