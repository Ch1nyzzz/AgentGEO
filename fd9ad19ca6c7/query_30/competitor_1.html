</span><h2 data-dcnode-id="182" style=" text-align: left; "><span data-dcnode-id="183" instrument_node="">IC&amp;G Now</span></h2><span data-dcnode-id="181" instrument_node="">
</span><span class="imgPusher" data-dcnode-id="180" style="float:left;height:0px"></span><span data-dcnode-id="176" style=" float: left; position: relative; z-index: 10; ;clear:left;margin-top:0px;*margin-top:0px"><a data-dcnode-id="178"><img alt="Picture" class="galleryImageBorder" data-dcnode-id="179" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//domesticatedsilverfox.weebly.com/uploads/6/9/0/4/6904388/2595585.jpg&amp;raw" style="margin-top: 5px; margin-bottom: 10px; margin-left: 0px; margin-right: 10px; border-width:1px;padding:3px;"></a><div data-dcnode-id="177" style="display: block; font-size: 90%; margin-top: -10px; margin-bottom: 10px; text-align: center;"></div></span><span data-dcnode-id="175" instrument_node="">
</span><div class="paragraph editable-text" data-dcnode-id="160" style=" text-align: left; display: block; "><span data-dcnode-id="174" instrument_node="">The research of domestication still continues today, led by Lyudmila Trut, who was working as an intern&nbsp;for Belyaev when the project was first started. Anna Kukekova now helps Trut, and the institute has suffered many funding cuts from the Russian Government.</span><br data-dcnode-id="173"><span data-dcnode-id="172"></span><span data-dcnode-id="171" instrument_node="">In 1999, IC&amp;G had no choice but to cut down their standing fox population from 700 to 100, in order to keep the foxes fed, and their researchers paid. </span><br data-dcnode-id="170"><span data-dcnode-id="169"></span><br data-dcnode-id="168"><span data-dcnode-id="167"></span><em data-dcnode-id="165"><span data-dcnode-id="166" instrument_node="">Left</span></em><span data-dcnode-id="164" instrument_node="">: </span><em data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">Six researchers at IC&amp;G, Lyudmila Trut in center, wearing black</span></em><span data-dcnode-id="161" instrument_node="">.</span></div><span data-dcnode-id="159" instrument_node="">
</span><hr data-dcnode-id="158" style=" clear: both; width: 100%; visibility: hidden; "><span data-dcnode-id="157" instrument_node="">
</span><div data-dcnode-id="151"><div data-dcnode-id="156" style="height: 20px; overflow: hidden; width: 100%;"></div><span data-dcnode-id="155" instrument_node="">
</span><hr class="styled-hr" data-dcnode-id="154" style="width:100%;"><span data-dcnode-id="153" instrument_node="">
</span><div data-dcnode-id="152" style="height: 20px; overflow: hidden; width: 100%;"></div></div><span data-dcnode-id="150" instrument_node="">
</span><h2 data-dcnode-id="148" style=" text-align: left; "><span data-dcnode-id="149" instrument_node="">SibFox</span></h2><span data-dcnode-id="147" instrument_node="">
</span><span class="imgPusher" data-dcnode-id="146" style="float:left;height:0px"></span><span data-dcnode-id="142" style=" z-index: 10; position: relative; float: left; ;clear:left;margin-top:0px;*margin-top:0px"><a data-dcnode-id="144"><img alt="Picture" class="galleryImageBorder" data-dcnode-id="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//domesticatedsilverfox.weebly.com/uploads/6/9/0/4/6904388/8387125.jpg&amp;raw" style="margin-top: 5px; margin-bottom: 10px; margin-left: 0px; margin-right: 10px; border-width:1px;padding:3px;"></a><div data-dcnode-id="143" style="display: block; font-size: 90%; margin-top: -10px; margin-bottom: 10px; text-align: center;"></div></span><span data-dcnode-id="141" instrument_node="">
</span><div class="paragraph editable-text" data-dcnode-id="125" style=" text-align: left; display: block; "><span data-dcnode-id="140" instrument_node="">Because only the top 5% of tame foxes are allowed to breed, the other 95%, (who are perfectly friendly, just not the best) are either sold to fur farms, or distributed as pets. Each fox costs about $7,000 to be shipped to your doorstep (If you live in the US). An organization located in San Francisco, CA, known as SibFox, help distribute these foxes to pet-owners. </span><br data-dcnode-id="139"><span data-dcnode-id="138"></span><span data-dcnode-id="137" instrument_node="">The steep price covers the fox's shipment from Siberia to America, and all immunizations are given to the fox before it leaves the farm. Also, the fox is neutured, so unlicenced genetacists won't breed their own line of domesticated foxes in their backyard illegally. If you are interested in aquiring a tame fox (get me one too, while you're at it) visit </span><a data-dcnode-id="135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sibfox.com/" title=""><span data-dcnode-id="136" instrument_node="">www.sibfox.com</span></a><span data-dcnode-id="134" instrument_node="">.</span><br data-dcnode-id="133"><span data-dcnode-id="132"></span><br data-dcnode-id="131"><span data-dcnode-id="130"></span><span data-dcnode-id="129" instrument_node="">All profits go to the Institute of Cytology and Genetics, so they can continue their research on domestication and molecular genetics. "Our foxes are as loyal as dogs, and as independant as cats," Lyudmila Trut says in an article she wrote for the </span><em data-dcnode-id="127"><span data-dcnode-id="128" instrument_node="">American Scientist</span></em><span data-dcnode-id="126" instrument_node=""> Magazine in 1999.</span></div><span data-dcnode-id="124" instrument_node="">
</span><hr data-dcnode-id="123" style=" visibility: hidden; clear: both; width: 100%; "><span data-dcnode-id="122" instrument_node="">
</span><div data-dcnode-id="116"><div data-dcnode-id="121" style="height: 20px; overflow: hidden; width: 100%;"></div><span data-dcnode-id="120" instrument_node="">
</span><hr class="styled-hr" data-dcnode-id="119" style="width:100%;"><span data-dcnode-id="118" instrument_node="">
</span><div data-dcnode-id="117" style="height: 20px; overflow: hidden; width: 100%;"></div></div><span data-dcnode-id="115" instrument_node="">
</span><div class="paragraph editable-text" data-dcnode-id="105" style=" text-align: left; "><span data-dcnode-id="114" instrument_node="">Only about five people in the USA currently own a domesticated Siberian fox, and one owner posted pictures and a paragraph&nbsp;of her foxes here. </span><br data-dcnode-id="113"><span data-dcnode-id="112"></span><a data-dcnode-id="110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.furaffinity.net/user/tossie-sd"><span data-dcnode-id="111" instrument_node="">http://www.furaffinity.net/user/tossie-sd</span></a><span data-dcnode-id="109" instrument_node="">&nbsp;</span><br data-dcnode-id="108"><span data-dcnode-id="107"></span><span data-dcnode-id="106" instrument_node="">(However, this owner lives in the Netherlands, but the foxes are still the same.) </span></div><span data-dcnode-id="104" instrument_node="">
</span><div data-dcnode-id="98"><div data-dcnode-id="99" style="text-align: center;"><a data-dcnode-id="102"><img alt="Picture" class="galleryImageBorder" data-dcnode-id="103" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//domesticatedsilverfox.weebly.com/uploads/6/9/0/4/6904388/862285.jpg&amp;raw" style="margin-top: 10px; margin-bottom: 10px; margin-left: 10px; margin-right: 10px; border-width:1px;padding:3px;"></a><div data-dcnode-id="100" style="display: block; font-size: 90%; margin-top: -10px; margin-bottom: 10px;"><span data-dcnode-id="101" instrument_node="">Manya the vixen (female fox)</span></div></div></div><span data-dcnode-id="97" instrument_node="">
