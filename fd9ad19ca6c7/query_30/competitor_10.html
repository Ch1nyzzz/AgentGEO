mentFont__details--bold elementFont__transformUppercase" data-dcnode-id="2334" id="entity-full-colors-label-"><span data-dcnode-id="2335" instrument_node="">colors</span></td><td class="value-list-gridcell" data-dcnode-id="2319"><span data-dcnode-id="2332" instrument_node=""> </span><ul aria-labelledby="entity-full-colors-label-" class="value-list elementFont__details elementFont__details--linkWithin elementFont__resetList colors" data-dcnode-id="2321"><span data-dcnode-id="2331" instrument_node=""> </span><li class="value" data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">white</span></li><span data-dcnode-id="2328" instrument_node=""> </span><li class="value" data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">black</span></li><span data-dcnode-id="2325" instrument_node=""> </span><li class="value" data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">fawn</span></li><span data-dcnode-id="2322" instrument_node=""> </span></ul><span data-dcnode-id="2320" instrument_node=""> </span></td></tr></tbody><tbody class="field-row" data-dcnode-id="2297"><tr class="field-value field-tracking-patterns patterns" data-dcnode-id="2299"><td class="label elementFont__details--bold elementFont__transformUppercase" data-dcnode-id="2310" id="entity-full-patterns-label-"><span data-dcnode-id="2311" instrument_node="">patterns</span></td><td class="value-list-gridcell" data-dcnode-id="2301"><span data-dcnode-id="2308" instrument_node=""> </span><ul aria-labelledby="entity-full-patterns-label-" class="value-list elementFont__details elementFont__details--linkWithin elementFont__resetList patterns" data-dcnode-id="2303"><span data-dcnode-id="2307" instrument_node=""> </span><li class="value" data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">bicolor</span></li><span data-dcnode-id="2304" instrument_node=""> </span></ul><span data-dcnode-id="2302" instrument_node=""> </span></td></tr></tbody><tbody class="field-row" data-dcnode-id="2273"><tr class="field-value field-tracking-other-traits traits full-row" data-dcnode-id="2275"><td class="label elementFont__details--bold elementFont__transformUppercase" data-dcnode-id="2292" id="entity-full-traits-label-"><span data-dcnode-id="2293" instrument_node="">other traits</span></td><td class="value-list-gridcell" data-dcnode-id="2277"><span data-dcnode-id="2290" instrument_node=""> </span><ul aria-labelledby="entity-full-traits-label-" class="value-list elementFont__details elementFont__details--linkWithin elementFont__resetList traits" data-dcnode-id="2279"><span data-dcnode-id="2289" instrument_node=""> </span><li class="value" data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">high prey drive</span></li><span data-dcnode-id="2286" instrument_node=""> </span><li class="value" data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">apartment-friendly</span></li><span data-dcnode-id="2283" instrument_node=""> </span><li class="value" data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">strong loyalty tendencies</span></li><span data-dcnode-id="2280" instrument_node=""> </span></ul><span data-dcnode-id="2278" instrument_node=""> </span></td></tr></tbody></table><span data-dcnode-id="2270" instrument_node=""> </span></div><span data-dcnode-id="2268" instrument_node=""> </span></div><span data-dcnode-id="2266" instrument_node=""> </span></div><span data-dcnode-id="2264" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="2243"><span data-dcnode-id="2263" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2245"><p data-dcnode-id="2246"><span data-dcnode-id="2262" instrument_node="">Smooth fox terriers are independent, lively, and loving dogs, making them a versatile breed for owners with all types of interests. Originally bred as British fox-hunting companions, they are less common than other </span><a data-dcnode-id="2260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/dog-breeds/finder%3Fbreed_group%3Dterrier"><span data-dcnode-id="2261" instrument_node="">terrier breeds</span></a><span data-dcnode-id="2259" instrument_node=""> like the intelligent </span><a data-dcnode-id="2257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/dog-breeds/russell-terrier"><span data-dcnode-id="2258" instrument_node="">Russell terrier</span></a><span data-dcnode-id="2256" instrument_node=""> and scrappy </span><a data-dcnode-id="2254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/dog-breeds/norwich-terrier"><span data-dcnode-id="2255" instrument_node="">Norwich terrier</span></a><span data-dcnode-id="2253" instrument_node="">. But those who adopt a smooth fox terrier will be rewarded with a smart, easy-to-train, and loyal companion. While they are high-energy dogs that require </span><a data-dcnode-id="2251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/dog-exercise-play"><span data-dcnode-id="2252" instrument_node="">regular, daily exercise</span></a><span data-dcnode-id="2250" instrument_node="">, their </span><a data-dcnode-id="2248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/living-with-pets/pet-compatibility/small-dog-breeds"><span data-dcnode-id="2249" instrument_node="">small size</span></a><span data-dcnode-id="2247" instrument_node=""> makes them suitable for living in both large homes and apartments.</span></p></div><span data-dcnode-id="2244" instrument_node=""> </span></div><span data-dcnode-id="2242" instrument_node=""> </span><div class="longformContent__container longformContent__container--ad" data-dcnode-id="2238"><span data-dcnode-id="2241" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="2240" data-tier="1" id="div-gpt-mob-square-flex-1" role="complementary" tabindex="-1"></div><span data-dcnode-id="2239" instrument_node=""> </span></div><span data-dcnode-id="2237" instrument_node=""> </span><div class="longformContent__container longformContent__container--ad" data-dcnode-id="2233"><span data-dcnode-id="2236" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-101x1;970x90;970x66;970x250;728x90 desktop-ad tablet-ad instream-ad karma-ad" data-dcnode-id="2235" data-tier="2" id="div-gpt-leaderboard-flex-2" role="complementary" tabindex="-1"></div><span data-dcnode-id="2234" instrument_node=""> </span></div><span data-dcnode-id="2232" instrument_node=""> </span><div class="longformContent__container longformContent__container--heading" data-dcnode-id="2227"><span data-dcnode-id="2231" instrument_node=""> </span><h2 data-dcnode-id="2229" id="section-119d892c-1380-4f88-aa15-8f12c2941f17"><span data-dcnode-id="2230" instrument_node="">Appearance </span></h2><span data-dcnode-id="2228" instrument_node=""> </span></div><span data-dcnode-id="2226" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="2214"><span data-dcnode-id="2225" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2216"><p data-dcnode-id="2217"><span data-dcnode-id="2224" instrument_node="">Although smooth fox terriers tend to have a more V-shaped head, they are very similar to their close relative, the </span><a data-dcnode-id="2222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/dog-breeds/wire-fox-terrier"><span data-dcnode-id="2223" instrument_node="">wire fox terrier</span></a><span data-dcnode-id="2221" instrument_node="">. Petite in stature, smooth fox terriers stand between 14–15 inches tall and weigh between 15–18 pounds. They have small, V-shape ears and their deep-set, circular eyes are dark and known for looking lively and alert, according to the </span><a aria-describedby="external-disclaimer" class="external-link" data-dcnode-id="2219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aftc.org/smooth-fox-terrier" target="_blank" title="(opens new window)"><span data-dcnode-id="2220" instrument_node="">American Fox Terrier Club</span></a><span data-dcnode-id="2218" instrument_node="">.&nbsp;</span></p></div><span data-dcnode-id="2215" instrument_node=""> </span></div><span data-dcnode-id="2213" instrument_node=""> </span><div class="longformContent__container longformContent__container--image default" data-dcnode-id="2175"><span data-dcnode-id="2212" instrument_node=""> </span><div class="component inline image margin-32-tb align-img align-default" data-dcnode-id="2177"><span data-dcnode-id="2211" instrument_node=""> </span><div class="component lazy-image lazy-image-udf image-wrapper aspect_1x1 cache-only align-default rendered image-loaded" data-alt="smooth fox terrier wearing a collar standing in a park" data-crop-percentage="100" data-dcnode-id="2178" data-focal-point-x="850" data-focal-point-y="447" data-high-density="true" data-orientation="default" data-original-height="1244" data-original-width="1518" data-shop-image="false" data-special-crop="" data-src="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fstatic.onecms.io%2Fwp-content%2Fuploads%2Fsites%2F47%2F2021%2F11%2F09%2Fsmooth-fox-terrier-standing-in-park-371253264.jpg" data-title="Smooth Fox Terrier Dog with Collar" data-tracking-zone="image" data-use-imagesvc-to-cache="true"><span data-dcnode-id="2210" instrument_node=""> </span><noscript data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">&lt;img src="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fstatic.onecms.io%2Fwp-content%2Fuploads%2Fsites%2F47%2F2021%2F11%2F09%2Fsmooth nding-in-park-371253264.jpg" data-title="Smooth Fox Terrier Dog with Collar" data-tracking-do-not-track="1"><svg data-dcnode-id="2191" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M2.667 21.333h8v2.667h-10.667v-10.667h2.667v8zM21.333 0h2.667v10.667h-2.667v-8h-8v-2.667h8z" data-dcnode-id="2192"></path></svg><span data-dcnode-id="2190" instrument_node=""> </span></button><span data-dcnode-id="2188" instrument_node=""> </span></div><div class="lazy-image__loadingPlaceholder" data-dcnode-id="2185"><img alt="" class="loadingPlaceholder" data-dcnode-id="2186" height="1244" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3C/svg%3E" width="1518"></div><div class="image-wrap-container clearfix" data-dcnode-id="2179"><div class="credit body-caption padding-8-top elementFont__fine--caption" data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">Because of his history as a hunter, always keep your smooth fox terrier on a leash or safe inside a fenced-in yard. A passing squirrel just might be too tempting to resist running after!</span></div><span data-dcnode-id="2182" instrument_node=""> </span><div class="credit body-credit padding-8-top padding-8-bottom elementFont__fine--credit" data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">| Credit: slowmotiongli / Adobe Stock</span></div></div></div></div><span data-dcnode-id="2176" instrument_node=""> </span></div><span data-dcnode-id="2174" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="2162"><span data-dcnode-id="2173" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2164"><p data-dcnode-id="2165"><span data-dcnode-id="2172" instrument_node="">The breed's eponymous coats are flat, yet dense and abundant, and they are predominantly white with black, tan, or black-and-tan markings. Smooth fox terriers are </span><a data-dcnode-id="2170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/dog-grooming/dog-shedding"><span data-dcnode-id="2171" instrument_node="">prone to light shedding</span></a><span data-dcnode-id="2169" instrument_node=""> but their coats can be easily maintained by </span><a data-dcnode-id="2167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/gear-apparel/dog-supplies/dog-grooming-supplies/best-dog-brushes"><span data-dcnode-id="2168" instrument_node="">daily or weekly home grooming</span></a><span data-dcnode-id="2166" instrument_node=""> with a brush or glove to keep their sleek bodies shiny and healthy. They are wiry and muscular in build; and like a lot of other dog breeds, the males tend to be larger than females.&nbsp;</span></p></div><span data-dcnode-id="2163" instrument_node=""> </span></div><span data-dcnode-id="2161" instrument_node=""> </span><div class="longformContent__container longformContent__container--nativeAd" data-dcnode-id="2157"><span data-dcnode-id="2160" instrument_node=""> </span><div class="div-sm-inContent" data-dcnode-id="2159"></div><span data-dcnode-id="2158" instrument_node=""> </span></div><span data-dcnode-id="2156" instrument_node=""> </span><div class="longformContent__container longformContent__container--heading" data-dcnode-id="2151"><span data-dcnode-id="2155" instrument_node=""> </span><h2 data-dcnode-id="2153" id="section-5918f13e-5c62-47b2-ba04-6352c7610f8b"><span data-dcnode-id="2154" instrument_node="">Temperament </span></h2><span data-dcnode-id="2152" instrument_node=""> </span></div><span data-dcnode-id="2150" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="2138"><span data-dcnode-id="2149" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2140"><p data-dcnode-id="2141"><span data-dcnode-id="2148" instrument_node="">Smooth fox terriers are high-energy dogs that are known to be cheeky, playful, and affectionate with those they are familiar with, making them </span><a data-dcnode-id="2146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/living-with-pets/pet-compatibility/best-family-dogs"><span data-dcnode-id="2147" instrument_node="">great family pets</span></a><span data-dcnode-id="2145" instrument_node="">. Although they tend to </span><a data-dcnode-id="2143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/living-with-pets/pet-compatibility/best-dog-breeds-for-kids"><span data-dcnode-id="2144" instrument_node="">get along well with children</span></a><span data-dcnode-id="2142" instrument_node="">, they&nbsp;aren't always the best companions for cats and other small pets because of their history as hunters.&nbsp;</span></p></div><span data-dcnode-id="2139" instrument_node=""> </span></div><span data-dcnode-id="2137" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="2128"><span data-dcnode-id="2136" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2130"><p data-dcnode-id="2131"><span data-dcnode-id="2135" instrument_node="">"However, if brought up around cats and socialized well from a young age, cohabitation is possible," says Linda Simon, MVB, MRCVS, consulting veterinarian at </span><a aria-describedby="external-disclaimer" class="external-link" data-dcnode-id="2133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fivebarks.com/" target="_blank" title="(opens new window)"><span data-dcnode-id="2134" instrument_node="">FiveBarks</span></a><span data-dcnode-id="2132" instrument_node="">.&nbsp;</span></p></div><span data-dcnode-id="2129" instrument_node=""> </span></div><span data-dcnode-id="2127" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="2118"><span data-dcnode-id="2126" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2120"><p data-dcnode-id="2121"><strong data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">RELATED: </span></strong><a data-dcnode-id="2122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/living-with-pets/pet-owner-relationship/family-changes/how-to-introduce-dog-to-cat"><span data-dcnode-id="2123" instrument_node="">How to Introduce a Dog to a Cat</span></a></p></div><span data-dcnode-id="2119" instrument_node=""> </span></div><span data-dcnode-id="2117" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="2108"><span data-dcnode-id="2116" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2110"><p data-dcnode-id="2111"><span data-dcnode-id="2115" instrument_node="">Smooth fox terriers are also vocal and watchful over their home. They will </span><a data-dcnode-id="2113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/behavior/common-dog-behaviors/how-to-stop-a-dog-from-barking"><span data-dcnode-id="2114" instrument_node="">alert you with barks</span></a><span data-dcnode-id="2112" instrument_node=""> when strangers are around or if there's a potential threat, like an intruder (or a rabbit!) in the yard. "They make excellent watch dogs and will yap at any new arrival," Simon says.&nbsp;</span></p></div><span data-dcnode-id="2109" instrument_node=""> </span></div><span data-dcnode-id="2107" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="2098"><span data-dcnode-id="2106" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2100"><p data-dcnode-id="2101"><span data-dcnode-id="2105" instrument_node="">While dogs of this breed </span><a data-dcnode-id="2103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/living-with-pets/pet-compatibility/active-dog-breeds"><span data-dcnode-id="2104" instrument_node="">are very active</span></a><span data-dcnode-id="2102" instrument_node="">, they are loving and cuddly with their owners, though they prefer activities in the outdoors more than lounging on the couch. Smooth fox terriers treasure playtime with family members, including children, and form strong bonds with them over time.</span></p></div><span data-dcnode-id="2099" instrument_node=""> </span></div><span data-dcnode-id="2097" instrument_node=""> </span><div class="longformContent__container longformContent__container--contentCallout" data-dcnode-id="2047"><span data-dcnode-id="2096" instrument_node=""> </span><div class="component content-callout contentCallout contentCallout--background margin-16-bottom" data-dcnode-id="2049" style="background-color: #ebc36e;"><span data-dcnode-id="2095" instrument_node=""> </span><div class="contentCallout__inner" data-dcnode-id="2051"><span data-dcnode-id="2094" instrument_node=""> </span><div class="contentCallout__group contentCallout__group--groupOne contentCallout__group--imageContainer" data-dcnode-id="2062" data-tracking-zone="content-callout"><span data-dcnode-id="2093" instrument_node=""> </span><div class="component inline image margin-32-tb align-img align-default" data-dcnode-id="2064"><span data-dcnode-id="2092" instrument_node=""> </span><div class="component lazy-image lazy-image-udf image-wrapper aspect_3x2 cache-only align-default rendered image-loaded" data-alt="smooth fox terrier standing in grass with its head turned" data-crop-percentage="67" data-dcnode-id="2065" data-focal-point-x="840" data-focal-point-y="306" data-high-density="true" data-orientation="default" data-original-height="1333" data-original-width="2000" data-shop-image="false" data-special-crop="" data-src="https://imagesvc.meredithcorp.io/v3/m -id="2074" instrument_node=""> </span><button aria-label="Make image larger smooth-fox-terrier-standing-in-grass-head-turned-433819778" class="icon icon-image-zoom elementButton__defaultFocus" data-alt="smooth fox terrier standing in grass with its head turned" data-caption="" data-dcnode-id="2070" data-image="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fstatic.onecms.io%2Fwp-content%2Fuploads%2Fsites%2F47%2F2021%2F11%2F09%2Fsmooth-fox-terrier-standing-in-grass-head-turned-433819778-2000.jpg" data-title="smooth-fox-terrier-standing-in-grass-head-turned-433819778" data-tracking-do-not-track="1"><svg data-dcnode-id="2072" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M2.667 21.333h8v2.667h-10.667v-10.667h2.667v8zM21.333 0h2.667v10.667h-2.667v-8h-8v-2.667h8z" data-dcnode-id="2073"></path></svg><span data-dcnode-id="2071" instrument_node=""> </span></button><span data-dcnode-id="2069" instrument_node=""> </span></div><div class="lazy-image__loadingPlaceholder" data-dcnode-id="2066"><img alt="" class="loadingPlaceholder" data-dcnode-id="2067" height="1333" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%2067'%3E%3C/svg%3E" width="2000"></div></div></div><span data-dcnode-id="2063" instrument_node=""> </span></div><span data-dcnode-id="2061" instrument_node=""> </span><div class="contentCallout__group contentCallout__group--groupTwo contentCallout__group--textContainer" data-dcnode-id="2053" data-tracking-zone="content-callout"><span data-dcnode-id="2060" instrument_node=""> </span><figure class="pullquote quote-icon" data-dcnode-id="2055" role="presentation"><blockquote class="pullquote-content callout elementFont__leader--within" data-dcnode-id="2056"><p data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">Smooth fox terriers are high-energy dogs that are known to be cheeky, playful, and affectionate with those they are familiar with, making them great family pets.</span></p><span data-dcnode-id="2057" instrument_node=""> </span></blockquote></figure><span data-dcnode-id="2054" instrument_node=""> </span></div><span data-dcnode-id="2052" instrument_node=""> </span></div><span data-dcnode-id="2050" instrument_node=""> </span></div><span data-dcnode-id="2048" instrument_node=""> </span></div><span data-dcnode-id="2046" instrument_node=""> </span><div class="caption-container clearfix imageCount--1" data-dcnode-id="2038"><span data-dcnode-id="2045" instrument_node=""> </span><div class="credit body-caption elementFont__fine--caption" data-dcnode-id="2040"><span data-dcnode-id="2044" instrument_node=""> </span><span class="photo-by elementFont__fine--credit" data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node=""> Credit: olmax1975 / Adobe Stock</span></span><span data-dcnode-id="2041" instrument_node=""> </span></div><span data-dcnode-id="2039" instrument_node=""> </span></div><span data-dcnode-id="2037" instrument_node=""> </span><div class="longformContent__container longformContent__container--heading" data-dcnode-id="2032"><span data-dcnode-id="2036" instrument_node=""> </span><h2 data-dcnode-id="2034" id="section-def306ce-fc51-408c-ba38-99729835161d"><span data-dcnode-id="2035" instrument_node="">Living Needs </span></h2><span data-dcnode-id="2033" instrument_node=""> </span></div><span data-dcnode-id="2031" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="2010"><span data-dcnode-id="2030" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2012"><p data-dcnode-id="2013"><span data-dcnode-id="2029" instrument_node="">Because smooth fox terriers thrive in the outdoors, they do best in a home with a </span><a data-dcnode-id="2027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/living-with-pets/pet-friendly-home/dog-fence"><span data-dcnode-id="2028" instrument_node="">large, fenced yard</span></a><span data-dcnode-id="2026" instrument_node="">. But they can </span><a data-dcnode-id="2024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/living-with-pets/pet-compatibility/best-apartment-dogs"><span data-dcnode-id="2025" instrument_node="">live happily in apartments</span></a><span data-dcnode-id="2023" instrument_node=""> with owners who are committed to giving them proper daily exercise. If you love </span><a data-dcnode-id="2021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/dog-exercise-play/how-to-hike-with-your-dog"><span data-dcnode-id="2022" instrument_node="">hiking</span></a><span data-dcnode-id="2020" instrument_node="">, </span><a data-dcnode-id="2018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/syndication/dos-donts-running-with-dog"><span data-dcnode-id="2019" instrument_node="">running</span></a><span data-dcnode-id="2017" instrument_node="">, or enjoying </span><a data-dcnode-id="2015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/training/basic/how-to-teach-a-puppy-to-walk-on-leash"><span data-dcnode-id="2016" instrument_node="">long walks around the city</span></a><span data-dcnode-id="2014" instrument_node="">, a smooth fox terrier will be your BFF.</span></p></div><span data-dcnode-id="2011" instrument_node=""> </span></div><span data-dcnode-id="2009" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="2003"><span data-dcnode-id="2008" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2005"><p data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Smooth fox terriers' hunting-dog instincts mean they're likely to scamper after small animals like squirrels and rabbits. It's best to always keep them on a leash outdoors, especially in unfenced areas. </span></p></div><span data-dcnode-id="2004" instrument_node=""> </span></div><span data-dcnode-id="2002" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="1990"><span data-dcnode-id="2001" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1992"><p data-dcnode-id="1993"><span data-dcnode-id="2000" instrument_node="">While smooth fox terriers can cohabit well with other dogs in the home, each pup is different and owners should take the proper steps when </span><a data-dcnode-id="1998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/pet-owner-relationship/family-changes/how-to-introduce-dogs"><span data-dcnode-id="1999" instrument_node="">introducing any new canine family members</span></a><span data-dcnode-id="1997" instrument_node="">.&nbsp;The smooth fox terriers' independent personality means they don't mind being left alone at home for short periods of time, but be sure to keep an eye out for </span><a data-dcnode-id="1995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/syndication/separation-anxiety-in-dogs"><span data-dcnode-id="1996" instrument_node="">signs of separation anxiety</span></a><span data-dcnode-id="1994" instrument_node="">.&nbsp;</span></p></div><span data-dcnode-id="1991" instrument_node=""> </span></div><span data-dcnode-id="1989" instrument_node=""> </span><div class="longformContent__container longformContent__container--heading" data-dcnode-id="1984"><span data-dcnode-id="1988" instrument_node=""> </span><h2 data-dcnode-id="1986" id="section-80665e4d-16eb-4cad-9063-d440a7202ed6"><span data-dcnode-id="1987" instrument_node="">Care </span></h2><span data-dcnode-id="1985" instrument_node=""> </span></div><span data-dcnode-id="1983" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="1974"><span data-dcnode-id="1982" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1976"><p data-dcnode-id="1977"><span data-dcnode-id="1981" instrument_node="">Like most terriers, this breed is athletic and energetic, making smooth fox terriers a great breed for active individuals. They adore long strolls and </span><a data-dcnode-id="1979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/training/basic/how-to-teach-dog-fetch"><span data-dcnode-id="1980" instrument_node="">playing fetch</span></a><span data-dcnode-id="1978" instrument_node=""> in sprawling (but fenced!) areas with their owners.&nbsp;</span></p></div><span data-dcnode-id="1975" instrument_node=""> </span></div><span data-dcnode-id="1973" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="1961"><span data-dcnode-id="1972" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1963"><p data-dcnode-id="1964"><span data-dcnode-id="1971" instrument_node="">"Daily walks will be needed to adhere to their muscular structure," says Dace Lace, dog and cat behaviorist and co-founder of </span><a aria-describedby="external-disclaimer" class="external-link" data-dcnode-id="1969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.petfoodsite.com/" target="_blank" title="(opens new window)"><span data-dcnode-id="1970" instrument_node="">Pet Food Site</span></a><span data-dcnode-id="1968" instrument_node="">. "It takes about 30–45-minute hard exercise to tire this dog out, but after a short pause and </span><a data-dcnode-id="1966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/gear-apparel/dog-supplies/dog-feeders/best-dog-water-bottles"><span data-dcnode-id="1967" instrument_node="">water break</span></a><span data-dcnode-id="1965" instrument_node="">, they are ready for more."</span></p></div><span data-dcnode-id="1962" instrument_node=""> </span></div><span data-dcnode-id="1960" instrument_node=""> </span><div class="longformContent__container longformContent__container--image default" data-dcnode-id="1922"><span data-dcnode-id="1959" instrument_node=""> </span><div class="component inline image margin-32-tb align-img align-default" data-dcnode-id="1924"><span data-dcnode-id="1958" instrument_node=""> </span><div class="component lazy-image lazy-image-udf image-wrapper aspect_3x2 cache-only align-default rendered image-loaded" data-alt="smooth fox terrier running in sand" data-crop-percentage="67" data-dcnode-id="1925" data-focal-point-x="1480" data-focal-point-y="386" data-high-density="true" data-orientation="default" data-original-height="1333" data-original-width="2000" data-shop-image="false" data-special-crop="" data-src="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fstatic.onecms.io%2Fwp-content%2Fuploads%2Fsites%2F47%2F2021%2F11%2F09%2Fsmooth-fox-terrier-running-in-sand-234293481-2000.jpg" data-title="smooth-fox-terrier-running-in-sand-234293481" data-tracking-zone="image" data-use-imagesvc-to-cache="true"><span data-dcnode-id="1957" instrument_node=""> </span><noscript data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">&lt;img src="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fstatic.onecms.io%2Fwp-content%2Fuploads%2Fsites%2F47%2F2021%2F11%2F09%2Fsmooth-fox-terrier-running-in-sand-234293481-2000.jpg" alt="smooth fox terrier running in sand"&gt;</span></noscript><span data-dcnode-id="1954" instrument_node=""> </span><div class="inner-container js-inner-container image-overlay" data-dcnode-id="1934"><img alt="smooth fox terrier running in sand" data-dcnode-id="1953" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imagesvc.meredithcorp.io/v3/mm/image%3Furl%3Dhttps%253A%252F%252Fstatic.onecms.io%252Fwp-content%252Fuploads%252Fsites%252 -.084-.09-.145-.083-.599-.128-1.2-.108-1.803.026-.788.123-1.058 1.139-5.327a.295.295 0 0 0-.024-.178c-.244-.656-.291-1.32-.079-1.995.459-1.456 2.11-1.567 2.398-.366.178.743-.292 1.716-.653 3.152-.299 1.186 1.097 2.03 2.29 1.163 1.1-.798 1.527-2.71 1.446-4.067-.16-2.703-3.125-3.287-5.005-2.417-2.157.997-2.647 3.67-1.673 4.891.123.156.219.25.177.408-.062.245-.117.49-.185.734-.05.182-.202.247-.385.173a2.212 2.212 0 0 1-.9-.675c-.827-1.024-1.064-3.049.03-4.763 1.21-1.9 3.463-2.668 5.52-2.435 2.457.28 4.01 1.958 4.3 3.863.133.867.038 3.006-1.18 4.518-1.402 1.737-3.672 1.852-4.72.786-.08-.082-.145-.178-.224-.275" data-dcnode-id="1946" fill="#FFF"></path></g></svg><span data-dcnode-id="1943" instrument_node=""> </span></a></span><span data-dcnode-id="1940" instrument_node=""> </span><button aria-label="Make image larger smooth-fox-terrier-running-in-sand-234293481" class="icon icon-image-zoom elementButton__defaultFocus" data-alt="smooth fox terrier running in sand" data-caption="Smooth fox terriers have a go-go-go attitude and need at least 30 minutes of fast-paced, heart-pumping exercise every day." data-credit="Credit: Мария Старосельцева / Adobe Stock" data-dcnode-id="1936" data-image="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fstatic.onecms.io%2Fwp-content%2Fuploads%2Fsites%2F47%2F2021%2F11%2F09%2Fsmooth-fox-terrier-running-in-sand-234293481-2000.jpg" data-title="smooth-fox-terrier-running-in-sand-234293481" data-tracking-do-not-track="1"><svg data-dcnode-id="1938" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M2.667 21.333h8v2.667h-10.667v-10.667h2.667v8zM21.333 0h2.667v10.667h-2.667v-8h-8v-2.667h8z" data-dcnode-id="1939"></path></svg><span data-dcnode-id="1937" instrument_node=""> </span></button><span data-dcnode-id="1935" instrument_node=""> </span></div><div class="lazy-image__loadingPlaceholder" data-dcnode-id="1932"><img alt="" class="loadingPlaceholder" data-dcnode-id="1933" height="1333" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%2067'%3E%3C/svg%3E" width="2000"></div><div class="image-wrap-container clearfix" data-dcnode-id="1926"><div class="credit body-caption padding-8-top elementFont__fine--caption" data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">Smooth fox terriers have a go-go-go attitude and need at least 30 minutes of fast-paced, heart-pumping exercise every day.</span></div><span data-dcnode-id="1929" instrument_node=""> </span><div class="credit body-credit padding-8-top padding-8-bottom elementFont__fine--credit" data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">| Credit: Мария Старосельцева / Adobe Stock</span></div></div></div></div><span data-dcnode-id="1923" instrument_node=""> </span></div><span data-dcnode-id="1921" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="1912"><span data-dcnode-id="1920" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1914"><p data-dcnode-id="1915"><span data-dcnode-id="1919" instrument_node="">Since they were originally bred in England as fox-hunting dogs, these dogs have a </span><a data-dcnode-id="1917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/behavior/dog-psychology/what-does-it-mean-when-a-dog-has-strong-prey-drive"><span data-dcnode-id="1918" instrument_node="">high prey drive</span></a><span data-dcnode-id="1916" instrument_node=""> and shouldn't be walked or left in open spaces off-leash.&nbsp;</span></p></div><span data-dcnode-id="1913" instrument_node=""> </span></div><span data-dcnode-id="1911" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="1905"><span data-dcnode-id="1910" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1907"><p data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">"It is crucial to have them on a leash where wild animals like foxes, rabbits, or small rodents can be spotted," Lace says. "My adopted dog, Dora, is a smooth fox terrier mix, and I will not get her back if she has zipped off to trace a rabbit trail."</span></p></div><span data-dcnode-id="1906" instrument_node=""> </span></div><span data-dcnode-id="1904" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="1887"><span data-dcnode-id="1903" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1889"><p data-dcnode-id="1890"><a data-dcnode-id="1901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/training/basic/dog-training"><span data-dcnode-id="1902" instrument_node="">Proper training</span></a><span data-dcnode-id="1900" instrument_node=""> will tame a smooth fox terrier's free-spirited nature. Lace recommends using </span><a data-dcnode-id="1898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/dog-training/basic/positive-reinforcement-dog-training"><span data-dcnode-id="1899" instrument_node="">positive reinforcement methods</span></a><span data-dcnode-id="1897" instrument_node=""> and having </span><a data-dcnode-id="1895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/dog-exercise-play/interactive-toys-that-keep-pets-happy-stress-free"><span data-dcnode-id="1896" instrument_node="">different toys</span></a><span data-dcnode-id="1894" instrument_node=""> and </span><a data-dcnode-id="1892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/training/basic/training-dog-with-treats"><span data-dcnode-id="1893" instrument_node="">treats</span></a><span data-dcnode-id="1891" instrument_node=""> to keep your pup engaged (smooth fox terriers often lose interest easily). Pup parents can also choose to recruit the expertise of a trainer who specializes in terriers and understands the breed's behavior.</span></p></div><span data-dcnode-id="1888" instrument_node=""> </span></div><span data-dcnode-id="1886" instrument_node=""> </span><div class="longformContent__container longformContent__container--pageBreak" data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node=""> </span></div><span data-dcnode-id="1883" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="1874"><span data-dcnode-id="1882" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1876"><p data-dcnode-id="1877"><span data-dcnode-id="1881" instrument_node="">To perform at their best and live healthy lives, smooth fox terriers require the proper amount of </span><a data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/dog-nutrition"><span data-dcnode-id="1880" instrument_node="">high-quality dog food</span></a><span data-dcnode-id="1878" instrument_node=""> that's best for their age (puppy, adult, or senior) and size. Ask your veterinarian on how much to feed your smooth fox terrier; the amount will depend on the individual dog's size, weight, age, exercise levels, and other factors. Dogs should also always have access to clean, fresh water to ensure they can stay hydrated.</span></p></div><span data-dcnode-id="1875" instrument_node=""> </span></div><span data-dcnode-id="1873" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="1861"><span data-dcnode-id="1872" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1863"><p data-dcnode-id="1864"><span data-dcnode-id="1871" instrument_node="">Although the smooth fox terrier's </span><a data-dcnode-id="1869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/living-with-pets/pet-compatibility/short-haired-dog-breeds"><span data-dcnode-id="1870" instrument_node="">coat is short</span></a><span data-dcnode-id="1868" instrument_node="">, its dense nature makes daily or weekly brushing essential. Owners should also keep the pup's nails properly trimmed, bathe them if necessary, and </span><a data-dcnode-id="1866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/dog-grooming/how-to-clean-a-dogs-ears"><span data-dcnode-id="1867" instrument_node="">keep an eye on the ears</span></a><span data-dcnode-id="1865" instrument_node=""> to prevent infection. "Since smooth fox terriers love to explore in bushy and grassy areas, brushing will give the owner a chance to get rid of anything stuck in the coat," says Lace. "Check their ears regularly for dust or twigs."&nbsp;</span></p></div><span data-dcnode-id="1862" instrument_node=""> </span></div><span data-dcnode-id="1860" instrument_node=""> </span><div class="longformContent__container longformContent__container--heading" data-dcnode-id="1855"><span data-dcnode-id="1859" instrument_node=""> </span><h2 data-dcnode-id="1857" id="section-1f1960db-db1b-4385-aecc-28613eb2ce9c"><span data-dcnode-id="1858" instrument_node="">Health </span></h2><span data-dcnode-id="1856" instrument_node=""> </span></div><span data-dcnode-id="1854" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="1836"><span data-dcnode-id="1853" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1838"><p data-dcnode-id="1839"><span data-dcnode-id="1852" instrument_node="">Smooth fox terriers have a lifespan of between 12–15 years, but they are prone to certain health issues, including </span><a data-dcnode-id="1850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/health-care/dog-conditions/luxating-patella"><span data-dcnode-id="1851" instrument_node="">patellar luxation</span></a><span data-dcnode-id="1849" instrument_node="">, a knee cap that pops in and out of place; </span><a aria-describedby="external-disclaimer" class="external-link" data-dcnode-id="1847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vcahospitals.com/know-your-pet/legg-calve-perthes-disease-in-dogs" target="_blank" title="(opens new window)"><span data-dcnode-id="1848" instrument_node="">Legg-Calve-Perthes disease</span></a><span data-dcnode-id="1846" instrument_node="">, a painful condition affecting the hips of younger dogs; and </span><a aria-describedby="external-disclaimer" class="external-link" data-dcnode-id="1844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ofa.org/diseases/dna-tested-diseases/primary-lens-luxation" target="_blank" title="(opens new window)"><span data-dcnode-id="1845" instrument_node="">primary lens luxation</span></a><span data-dcnode-id="1843" instrument_node="">, a condition affecting the eyes that can </span><a data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/health-care/dog-conditions/how-to-tell-if-your-dog-is-going-blind"><span data-dcnode-id="1842" instrument_node="">cause glaucoma and even blindness</span></a><span data-dcnode-id="1840" instrument_node="">. To prevent these conditions, Simon says it's important that smooth fox terrier breeders screen their dogs and only mate those not affected.&nbsp;</span></p></div><span data-dcnode-id="1837" instrument_node=""> </span></div><span data-dcnode-id="1835" instrument_node=""> </span><div class="longformContent__container longformContent__container--image default" data-dcnode-id="1798"><span data-dcnode-id="1834" instrument_node=""> </span><div class="component inline image margin-32-tb align-img align-default" data-dcnode-id="1800"><span %253A%252F%252Fwww.dailypaws.com%252Fdogs-puppies%252Fdog-breeds%252Fsmooth-fox-terrier%253Futm_source%253Dpinterest.com%2526utm_medium%253Dsocial%2526utm_campaign%253Dsocial-share-longform%2526utm_content%253D20220425%2526utm_term%253Dundefined%26media%3Dhttps%253A%252F%252Fimagesvc.meredithcorp.io%252Fv3%252Fmm%252Fimage%253Furl%253Dhttps%25253A%25252F%25252Fstatic.onecms.io%25252Fwp-content%25252Fuploads%25252Fsites%25252F47%25252F2021%25252F11%25252F09%25252Fsmooth-fox-terrier-lying-on-sofa-145151491-2000.jpg%26description%3DSmooth%2520Fox%2520Terrier" target="_blank" title="(opens new window)"><span data-dcnode-id="1824" instrument_node=""> </span><svg aria-hidden="true" data-dcnode-id="1820" height="32" viewBox="0 0 32 32" width="32" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="1821" fill="none" fill-rule="evenodd"><path d="M32 16c0 8.837-7.163 16-16 16S0 24.837 0 16 7.163 0 16 0s16 7.163 16 16" data-dcnode-id="1823" fill="#E54A59"></path><path d="M15.164 18.532c-.011.039-.022.072-.03.106-.503 1.97-.56 2.408-1.076 3.322-.246.436-.524.847-.832 1.242-.034.044-.067.102-.136.088-.076-.016-.082-.084-.09-.145-.083-.599-.128-1.2-.108-1.803.026-.788.123-1.058 1.139-5.327a.295.295 0 0 0-.024-.178c-.244-.656-.291-1.32-.079-1.995.459-1.456 2.11-1.567 2.398-.366.178.743-.292 1.716-.653 3.152-.299 1.186 1.097 2.03 2.29 1.163 1.1-.798 1.527-2.71 1.446-4.067-.16-2.703-3.125-3.287-5.005-2.417-2.157.997-2.647 3.67-1.673 4.891.123.156.219.25.177.408-.062.245-.117.49-.185.734-.05.182-.202.247-.385.173a2.212 2.212 0 0 1-.9-.675c-.827-1.024-1.064-3.049.03-4.763 1.21-1.9 3.463-2.668 5.52-2.435 2.457.28 4.01 1.958 4.3 3.863.133.867.038 3.006-1.18 4.518-1.402 1.737-3.672 1.852-4.72.786-.08-.082-.145-.178-.224-.275" data-dcnode-id="1822" fill="#FFF"></path></g></svg><span data-dcnode-id="1819" instrument_node=""> </span></a></span><span data-dcnode-id="1816" instrument_node=""> </span><button aria-label="Make image larger smooth-fox-terrier-lying-on-sofa-145151491" class="icon icon-image-zoom elementButton__defaultFocus" data-alt="smooth fox terrier lying on sofa" data-caption="Smooth fox terriers are happiest when they're running around outdoors. But once they get a good workout, they'll happily snuggle up on the couch." data-credit="Credit: Mashanezemnush / Adobe Stock" data-dcnode-id="1812" data-image="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fstatic.onecms.io%2Fwp-content%2Fuploads%2Fsites%2F47%2F2021%2F11%2F09%2Fsmooth-fox-terrier-lying-on-sofa-145151491-2000.jpg" data-title="smooth-fox-terrier-lying-on-sofa-145151491" data-tracking-do-not-track="1"><svg data-dcnode-id="1814" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M2.667 21.333h8v2.667h-10.667v-10.667h2.667v8zM21.333 0h2.667v10.667h-2.667v-8h-8v-2.667h8z" data-dcnode-id="1815"></path></svg><span data-dcnode-id="1813" instrument_node=""> </span></button><span data-dcnode-id="1811" instrument_node=""> </span></div><div class="lazy-image__loadingPlaceholder" data-dcnode-id="1808"><img alt="" class="loadingPlaceholder" data-dcnode-id="1809" height="1333" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%2067'%3E%3C/svg%3E" width="2000"></div><div class="image-wrap-container clearfix" data-dcnode-id="1802"><div class="credit body-caption padding-8-top elementFont__fine--caption" data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">Smooth fox terriers are happiest when they're running around outdoors. But once they get a good workout, they'll happily snuggle up on the couch.</span></div><span data-dcnode-id="1805" instrument_node=""> </span><div class="credit body-credit padding-8-top padding-8-bottom elementFont__fine--credit" data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">| Credit: Mashanezemnush / Adobe Stock</span></div></div></div></div><span data-dcnode-id="1799" instrument_node=""> </span></div><span data-dcnode-id="1797" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="1785"><span data-dcnode-id="1796" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1787"><p data-dcnode-id="1788"><span data-dcnode-id="1795" instrument_node="">"It is also sensible to ensure your smooth fox terrier receives regular exercise, </span><a data-dcnode-id="1793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/dog-nutrition/dog-weight-management/obesity-in-dogs"><span data-dcnode-id="1794" instrument_node="">is not overweight</span></a><span data-dcnode-id="1792" instrument_node="">, and takes </span><a data-dcnode-id="1790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/health-care/senior-dog-health/joint-supplements-for-dogs"><span data-dcnode-id="1791" instrument_node="">daily joint supplements</span></a><span data-dcnode-id="1789" instrument_node=""> from a young age," she says.</span></p></div><span data-dcnode-id="1786" instrument_node=""> </span></div><span data-dcnode-id="1784" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="1766"><span data-dcnode-id="1783" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1768"><p data-dcnode-id="1769"><span data-dcnode-id="1782" instrument_node="">Due to their small jaw size, smooth fox terriers are also prone to </span><a data-dcnode-id="1780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/health-care/dog-conditions/periodontal-gum-disease-in-dogs"><span data-dcnode-id="1781" instrument_node="">dental disease</span></a><span data-dcnode-id="1779" instrument_node="">. Common issues include gingivitis, calculus build up, and retained deciduous teeth. Owners can help prevent dental issues by </span><a data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/dog-grooming/how-to-brush-dogs-teeth"><span data-dcnode-id="1778" instrument_node="">brushing their pup's teeth</span></a><span data-dcnode-id="1776" instrument_node=""> each day, feeding them dry kibble rather than canned food, and giving their terrier </span><a data-dcnode-id="1774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/health-care/dog-preventative-care/best-dog-dental-chews-according-to-veterinarians-pet-pros"><span data-dcnode-id="1775" instrument_node="">dental chews</span></a><span data-dcnode-id="1773" instrument_node="">. A large proportion of pups will also need a </span><a data-dcnode-id="1771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/living-with-pets/pet-costs/dog-teeth-cleaning-cost"><span data-dcnode-id="1772" instrument_node="">veterinary dental cleaning</span></a><span data-dcnode-id="1770" instrument_node=""> at least once or twice in their lifetime.</span></p></div><span data-dcnode-id="1767" instrument_node=""> </span></div><span data-dcnode-id="1765" instrument_node=""> </span><div class="longformContent__container longformContent__container--heading" data-dcnode-id="1760"><span data-dcnode-id="1764" instrument_node=""> </span><h2 data-dcnode-id="1762" id="section-20f6b386-da3b-4733-bb89-d3aa1d8aebf5"><span data-dcnode-id="1763" instrument_node="">History </span></h2><span data-dcnode-id="1761" instrument_node=""> </span></div><span data-dcnode-id="1759" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="1741"><span data-dcnode-id="1758" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1743"><p data-dcnode-id="1744"><span data-dcnode-id="1757" instrument_node="">The smooth fox terrier was developed in the late 18th century, when hunters were seeking a dog that could enter foxes' dens and drive them out of their hiding places. While early breeders didn't keep records regarding the development of the breed, it's rumored that the first smooth fox terriers were a blend of smooth coat black and tan terriers (now extinct), </span><a data-dcnode-id="1755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/dog-breeds/bull-terrier"><span data-dcnode-id="1756" instrument_node="">bull terriers</span></a><span data-dcnode-id="1754" instrument_node="">, </span><a data-dcnode-id="1752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/dog-breeds/greyhound"><span data-dcnode-id="1753" instrument_node="">greyhounds</span></a><span data-dcnode-id="1751" instrument_node="">, and </span><a data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/dog-breeds/beagle"><span data-dcnode-id="1750" instrument_node="">beagles</span></a><span data-dcnode-id="1748" instrument_node="">, </span><a aria-describedby="external-disclaimer" class="external-link" data-dcnode-id="1746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aftc.org/breed-history" target="_blank" title="(opens new window)"><span data-dcnode-id="1747" instrument_node="">according to the breed club</span></a><span data-dcnode-id="1745" instrument_node="">.&nbsp;</span></p></div><span data-dcnode-id="1742" instrument_node=""> </span></div><span data-dcnode-id="1740" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="1731"><span data-dcnode-id="1739" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1733"><p data-dcnode-id="1734"><span data-dcnode-id="1738" instrument_node="">After smooth fox terrier enthusiasts began showing their pups, the </span><a aria-describedby="external-disclaimer" class="external-link" data-dcnode-id="1736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefoxterrierclub.co.uk/" target="_blank" title="(opens new window)"><span data-dcnode-id="1737" instrument_node="">English Fox Terrier Club</span></a><span data-dcnode-id="1735" instrument_node=""> was established in 1876—the second oldest breed club in the United Kingdom. The first records of smooth fox terriers being imported to the U.S. date back to 1876, and the American Fox Terrier Club formed in 1885, the same year the breed received American Kennel Club recognition.&nbsp;</span></p></div><span data-dcnode-id="1732" instrument_node=""> </span></div><span data-dcnode-id="1730" instrument_node=""> </span><div class="longformContent__container longformContent__container--heading" data-dcnode-id="1725"><span data-dcnode-id="1729" instrument_node=""> </span><h2 data-dcnode-id="1727" id="section-0777862c-a911-4889-9946-c080777f5d8b"><span data-dcnode-id="1728" instrument_node="">Fun Facts </span></h2><span data-dcnode-id="1726" instrument_node=""> </span></div><span data-dcnode-id="1724" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="1711"><span data-dcnode-id="1723" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1713"><ul data-dcnode-id="1714"><li data-dcnode-id="1715"><span data-dcnode-id="1722" instrument_node="">While smooth fox terriers aren't common house dogs, they are popular in the </span><a aria-label="dog show" data-dcnode-id="1720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/pet-news-entertainment/dog-shows"><span data-dcnode-id="1721" instrument_node="">dog show</span></a><span data-dcnode-id="1719" instrument_node=""> ring. The most awarded smooth fox terrier in the </span><a aria-describedby="external-disclaimer" class="external-link" data-dcnode-id="1717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.westminsterkennelclub.org/" target="_blank" title="(opens new window)"><span data-dcnode-id="1718" instrument_node="">Westminster Kennel Club'</span></a><span data-dcnode-id="1716" instrument_node="">s lauded Dog Show was Ch. Warren Remedy, who won Best in Show three years in a row from 1907 to 1909.</span></li></ul></div><span data-dcnode-id="1712" instrument_node=""> </span></div><span data-dcnode-id="1710" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="1703"><span data-dcnode-id="1709" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1705"><ul data-dcnode-id="1706"><li data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">According to the American Fox Terrier Club, smooth fox terriers and wire fox terriers were considered the same breed for decades—the AKC only recognized the two as different breeds in 1985. The two dogs are identical, except for their coat texture.&nbsp;</span></li></ul></div><span data-dcnode-id="1704" instrument_node=""> </span></div><span data-dcnode-id="1702" instrument_node=""> </span><div class="longformContent__container longformContent__container--paragraph" data-dcnode-id="1686"><span data-dcnode-id="1701" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1688"><ul data-dcnode-id="1689"><li data-dcnode-id="1690"><span data-dcnode-id="1700" instrument_node="">There are also </span><a data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/dog-breeds/toy-fox-terrier"><span data-dcnode-id="1699" instrument_node="">toy fox terriers</span></a><span data-dcnode-id="1697" instrument_node="">, which look like mini smooth fox terriers. These petite pups only weigh up to 7 pounds and were created by crossing small smooth fox terriers with </span><a data-dcnode-id="1695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/dog-breeds/chihuahua"><span data-dcnode-id="1696" instrument_node="">Chihuahuas</span></a><span data-dcnode-id="1694" instrument_node=""> and </span><a data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailypaws.com/dogs-puppies/dog-breeds/italian-greyhound"><span data-dcnode-id="1693" instrument_node="">Italian greyhounds</span></a><span data-dcnode-id="1691" instrument_node="">. The American Kennel Club officially recognized this mini version in 2003.&nbsp;&nbsp;</span></li></ul></div><span data-dcnode-id="1687" instrument_node=""> </span></div><span data-dcnode-id="1685" instrument_node=""> </span></div><span data-dcnode-id="1683" instrument_node=""> </span><div class="recirculation-wrapper" data-dcnode-id="297"><span data-dcnode-id="1682" instrument_node=""> </span><div class="component recirculation recirculation__cards elementLoader--centerIt initialized enabled" data-content-graph-id="cms/onecms_posts_dailypaws_7830772" data-dcnode-id="299" data-endpoint="/element-api/content-proxy/recommendations" data-recirc="closed" data-recommendations-request-data="%7B%22provider%22%3A%22cms%22%2C%22brand%22%3A%22dailypaws%22%2C%22id%22%3A%227830772%22%2C%22matchFactor%22%3A%22recent%22%2C%22contentType%22%3A%22longform%22%2C%22parent%22%3A%22cms%2Fonecms_terms_dailypaws_22%22%2C%22entity%22%3A%22cms%2Fonecms_terms_dailypaws_25%22%2C%22category%22%3A%22Dog%20Breeds%22%2C%22content_graph_id%22%3A%22cms%2Fonecms_posts_dailypaws_7830772%22%7D" data-request-data="%7B%22docTypeFilter%22%3A%22content-type-article%2Ccontent-type-gallery%2Ccontent-type-recipe%22%2C%22page%22%3A1%2C%22pagesize%22%3A20%2C%22orderBy%22%3A%22Recent%22%2C%22id%22%3A%22cms%2Fonecms_posts_dailypaws_7830772%22%2C%22sourceFilter%22%3A%22dailypaws%22%2C%22muid%22%3A%2283a00877-521c-4aca-947d-09fce0c838e6%22%2C%22hashid%22%3A%220d651033e012a2ed5e4ea667765183e65a78b4b2
