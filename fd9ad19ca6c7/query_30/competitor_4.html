</span><h2 class="wsite-content-title" data-dcnode-id="404" style="text-align:center;"><font color="#3e5319" data-dcnode-id="406" size="6"><u data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Caring for Foxes as Pets</span></u></font><span data-dcnode-id="405" instrument_node=""> </span></h2><span data-dcnode-id="403" instrument_node="">
</span><div data-dcnode-id="393"><div class="wsite-image wsite-image-border-medium" data-dcnode-id="394" style="padding-top:10px;padding-bottom:10px;margin-left:0;margin-right:0;text-align:center"><span data-dcnode-id="402" instrument_node="">
</span><a data-dcnode-id="398"><span data-dcnode-id="401" instrument_node="">
</span><img alt="Picture" data-dcnode-id="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foxrescue.weebly.com/uploads/2/4/5/2/24526270/1383513551.jpg&amp;raw" style="width:auto;max-width:100%"><span data-dcnode-id="399" instrument_node="">
</span></a><span data-dcnode-id="397" instrument_node="">
</span><div data-dcnode-id="396" style="display:block;font-size:90%"></div><span data-dcnode-id="395" instrument_node="">
</span></div></div><span data-dcnode-id="392" instrument_node="">
</span><div class="paragraph" data-dcnode-id="384" style="text-align:center;"><font color="#806c48" data-dcnode-id="386" size="3"><span data-dcnode-id="391" instrument_node="">So, you want a pet fox? Here's what you need to know.</span><br data-dcnode-id="390"><span data-dcnode-id="389" instrument_node="">Foxes raised to be pets are what is referred to as tame. They are not domesticated animals like a dog or cat. The difference is that domestic dogs have been living with and adapting to people for around 30,000 years while your fox's ancestors may have only been kept as pets for something like 30 or 50 years. Responsible breeders raising foxes for pets have selectively bred only the most tame foxes in controlled environments for many generations and hand raised and socialized the kits (babies). This makes them tame but they still retain many of their wild instincts. These natural instincts in foxes can potentially lead to some very destructive and undesirable behavior. They chew, climb, jump, dig, steal, and many species have a strong odor which they use to mark their territory. To sum it up, if you choose to get a fox as a pet he is unlikely to adapt to your lifestyle. You will have to adapt to his.</span><br data-dcnode-id="388"><span data-dcnode-id="387" instrument_node="">The following information is about general fox care. Be sure to also check out the species specific links on this page because requirements vary greatly with an animal that can range from a 3 pound fennec to a 15 pound red fox.</span></font><br data-dcnode-id="385"></div><span data-dcnode-id="383" instrument_node="">
</span><div data-dcnode-id="377"><div data-dcnode-id="382" style="height: 0px; overflow: hidden; width: 100%;"></div><span data-dcnode-id="381" instrument_node="">
</span><hr class="styled-hr" data-dcnode-id="380" style="width:100%;"><span data-dcnode-id="379" instrument_node="">
</span><div data-dcnode-id="378" style="height: 20px; overflow: hidden; width: 100%;"></div></div><span data-dcnode-id="376" instrument_node="">
</span><span class="imgPusher" data-dcnode-id="375" style="float:left;height:0px"></span><span data-dcnode-id="371" style="display: table;width:auto;position:relative;float:left;max-width:100%;;clear:left;margin-top:0px;*margin-top:0px"><a data-dcnode-id="373"><img alt="Picture" class="galleryImageBorder wsite-image" data-dcnode-id="374" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foxrescue.weebly.com/uploads/2/4/5/2/24526270/6721590.jpg&amp;raw" style="margin-top: 5px; margin-bottom: 10px; margin-left: 0px; margin-right: 10px; border-width:1px;padding:3px; max-width:100%"></a><span class="wsite-caption" data-dcnode-id="372" style="display: table-caption; caption-side: bottom; font-size: 90%; margin-top: -10px; margin-bottom: 10px; text-align: center;"></span></span><span data-dcnode-id="370" instrument_node="">
</span><div class="paragraph" data-dcnode-id="359" style="text-align:left;display:block;"><font color="#422a08" data-dcnode-id="366" size="5"><strong data-dcnode-id="367"><u data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">housing</span></u></strong></font><font data-dcnode-id="360" size="3"><span data-dcnode-id="365" instrument_node="">&nbsp; Very young kits should always be kept in an indoor enclosure when not closely supervised. Most species are small enough at this point to squeeze through the holes in many types of fencing. The general rule of thumb is if the animal can fit its head through, assume it can squeeze its body through. Also, being outdoors alone can be scary for a tiny fox cub and you would miss out on critical bonding opportunities. The indoor kennel should have some type of bed or box for him to hide in. A litter box is also a good idea. </span><br data-dcnode-id="364"><span data-dcnode-id="363" instrument_node="">When loose indoors, you must make sure your fox is watched very closely. Put breakables and anything valuable (including your car keys) away, keep electrical cords out of reach, and consider using child locks or rubber bands on cabinet doors. If keeping your fox indoors through adulthood you should crate train, limit access to a specific fox-safe room, or ideally have an outdoor pen (secured with a top and bottom) to keep your fox in when you are unable to watch him or her. Foxes love to be outdoors and should have that opportunity often. Provide different smells and textures outdoors, such as&nbsp;wood, sand, dirt, rocks, gravel, and hay. They don't have to all be in the pen at the same time. Introducing new items periodically will help keep your fox entertained. Try to keep their outdoor enclosure similar to what their natural habitat would be in the wild.</span><br data-dcnode-id="362"><span data-dcnode-id="361" instrument_node="">Housebreaking is best accomplished by using a litter box. The size and type of box will depend on the species you have. Use a very thin layer of litter; I prefer Critter Care small animal bedding or a similar product. You could also use non-clumping cat litter, dog litter, or newspaper pellets. Foxes don't bury their waste, so there's no need to use too much litter. You could even simply line the box with old newspaper, but that doesn't do much for reducing odor. Some foxes are much more difficult to housebreak than others. Some never do learn completely. When dealing with a stubborn fox or very young kit you may try putting several litter boxes throughout the areas of the house he's allowed to roam to increase your chance for success. Be sure to check the species links below for outdoor housing and enclosure&nbsp; information for your specific fox.</span></font></div><span data-dcnode-id="358" instrument_node="">
</span><hr data-dcnode-id="357" style="width:100%;clear:both;visibility:hidden;"><span data-dcnode-id="356" instrument_node="">
</span><span class="imgPusher" data-dcnode-id="355" style="float:right;height:0px"></span><span data-dcnode-id="351" style="display: table;width:auto;position:relative;float:right;max-width:100%;;clear:right;margin-top:0px;*margin-top:0px"><a data-dcnode-id="353"><img alt="Picture" class="galleryImageBorder wsite-image" data-dcnode-id="354" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foxrescue.weebly.com/uploads/2/4/5/2/24526270/6237910.jpg&amp;raw" style="margin-top: 5px; margin-bottom: 10px; margin-left: 10px; margin-right: 0px; border-width:1px;padding:3px; max-width:100%"></a><span class="wsite-caption" data-dcnode-id="352" style="display: table-caption; caption-side: bottom; font-size: 90%; margin-top: -10px; margin-bottom: 10px; text-align: center;"></span></span><span data-dcnode-id="350" instrument_node="">
</span><div class="paragraph" data-dcnode-id="330" style="text-align:left;display:block;"><font color="#45321e" data-dcnode-id="345"><u data-dcnode-id="346"><strong data-dcnode-id="347"><font data-dcnode-id="348" size="5"><span data-dcnode-id="349" instrument_node="">feeding</span></font></strong></u></font><span data-dcnode-id="344" instrument_node=""> </span><font data-dcnode-id="339" size="3"><span data-dcnode-id="343" instrument_node="">Feeding your fox is relatively easy. The primary source of his food should be a good quality dog food (meat should be the first ingredient). Kits should be started on puppy food. As he or she reaches around a year of age, you can slowly switch to adult dog food, leave it on puppy, or a feed a combination of the two depending on activity level. If your fox starts getting chunky, gradually reduce the amount of puppy food and increase the amount of adult food. Or to keep things simple, I feed a formula of food intended for all life stages to all my foxes. </span><br data-dcnode-id="342"><span data-dcnode-id="341" instrument_node="">Some people have discussed using cat or kitten food, but as foxes are omnivores like dogs, the protein ratio in cat food can be too much for foxes as their main diet. But for an occasional treat it does just fine. There are commercially prepared canid foods available but these can be quite expensive, especially for larger foxes. Instead, you should supplement your fox's food a few times a week with a variety of veggies, eggs, meat*, and fruit (don't overfeed fruit because of the sugar content). Different species as well as individuals will prefer different foods. Cooking the meat is ideal and seems to cut down some on foxy odor. Some people choose to give raw meat to their foxes for a more natural diet. This does carry an increased risk of your fox getting sick from tainted food, so use caution if you choose to feed raw.</span><br data-dcnode-id="340"></font><br data-dcnode-id="338"><span data-dcnode-id="337"></span><font data-dcnode-id="331" size="3"><span data-dcnode-id="336" instrument_node=""> *I mean real meat such as chicken, turkey, fish, and once in awhile red meats like venison or beef; not bologna or other overly processed mystery meat. Do not give foxes pork or pork based products or treats.</span><br data-dcnode-id="335"><span data-dcnode-id="334" instrument_node="">In addition to pork, chocolate, raisins, grapes, onions, avocados, caffeine, and alcohol are also off limits. If in doubt as to whether a food is safe for your pet, don't feed it. If it is not safe for dogs, don't feed it to foxes. It's also not a good idea to feed road kill or mice due to the diseases they can carry. </span><br data-dcnode-id="333"><span data-dcnode-id="332" instrument_node="">All foxes love treats! Especially sugary treats. Many strangely go crazy for marshmallows and coffee so keep these out of their reach. If you choose to give a rare marshmallow treat, make sure you brush his teeth because sugar will decay a fox's teeth just like it does ours. Please don't feed caffeine. Occasional treats of carrot pieces are beneficial in aiding digestion. </span></font></div><span data-dcnode-id="329" instrument_node="">
</span><hr data-dcnode-id="328" style="width:100%;clear:both;visibility:hidden;"><span data-dcnode-id="327" instrument_node="">
</span><span class="imgPusher" data-dcnode-id="326" style="float:left;height:0px"></span><span data-dcnode-id="322" style="display: table;width:auto;position:relative;float:left;max-width:100%;;clear:left;margin-top:0px;*margin-top:0px"><a data-dcnode-id="324"><img alt="Picture" class="galleryImageBorder wsite-image" data-dcnode-id="325" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foxrescue.weebly.com/uploads/2/4/5/2/24526270/7130396.jpg&amp;raw" style="margin-top: 5px; margin-bottom: 10px; margin-left: 0px; margin-right: 10px; border-width:1px;padding:3px; max-width:100%"></a><span class="wsite-caption" data-dcnode-id="323" style="display: table-caption; caption-side: bottom; font-size: 90%; margin-top: -10px; margin-bottom: 10px; text-align: center;"></span></span><span data-dcnode-id="321" instrument_node="">
</span><div class="paragraph" data-dcnode-id="309" style="text-align:left;display:block;"><strong data-dcnode-id="316"><font color="#382202" data-dcnode-id="318" size="5"><u data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">behavior/handling</span></u></font><span data-dcnode-id="317" instrument_node=""> </span></strong><font data-dcnode-id="310" size="3"><span data-dcnode-id="315" instrument_node="">The first 6 months of your fox's life are the most important for socialization. Pick up and handle your kit as much as possible, even if just for a few minutes at a time. Get him or her used to a safety/breakaway collar (if desired), harness, leash, and grooming (bathing, nail clipping, and brushing fur and teeth) as early as possible. A microchip is a great idea and has helped fox owners I've known in the past. I also like collars with tags for instant identification purposes and so if the fox ever escapes, people will realize it's a pet. </span><br data-dcnode-id="314"><span data-dcnode-id="313" instrument_node="">If you choose to take your fox for walks, you must get it used to this when it's a baby. Don't attempt to start taking an adult on walks for the first time. It is way too stressful and they can injure themselves. A harness is much more safe and secure than a collar for walks. Some people keep a collar on all the time, then put on the harness and remove the collar for comfort when walking. I keep an ID tag on both and the rabies tag on the harness since that is what is used in public. Please be aware that many dogs have a powerful instinct to attack foxes, so always use caution if walking your fox anywhere dogs might be. Never walk your fox off its leash no matter how well-trained. Foxes are not dogs and might run away without warning if scared or enticed by something. Walk your fox often! Foxes must be continually re-exposed to situations like this, otherwise they have a tendency to become fearful of it in a very short time.&nbsp;&nbsp;</span><br data-dcnode-id="312"><span data-dcnode-id="311" instrument_node=""> Your fox will love having toys to play with. Plushies, ropes, squeaky toys, baby rattles, dangling and spring cat toys, and similar things will give your fox something to do besides digging in the couch cushions and stealing your shoes. Just make sure to supervise play. To teach which items are acceptable to play with, you can smear a small amount of peanut butter on the toys and give praise for playing with them. Take away any items your fox is not supposed to have, but never hit or yell at him. I've had great success using a gentle spritz of water from a spray bottle when teaching the word "no" to foxes having a tough time with the concept. As a kit reaches its "teenage" years, around 6 months or so, it will go through a rebellious phase which can be difficult to handle. This will pass but you need to be patient and never hit or yell at him. Foxes are not dogs and they do not inherently trust people. With a fox trust can be hard to gain but it's easy to lose.</span></font></div><span data-dcnode-id="308" instrument_node="">
</span><hr data-dcnode-id="307" style="width:100%;clear:both;visibility:hidden;"><span data-dcnode-id="306" instrument_node="">
</span><span class="imgPusher" data-dcnode-id="305" style="float:right;height:0px"></span><span data-dcnode-id="301" style="display: table;width:auto;position:relative;float:right;max-width:100%;;clear:right;margin-top:0px;*margin-top:0px"><a data-dcnode-id="303"><img alt="Picture" class="galleryImageBorder wsite-image" data-dcnode-id="304" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foxrescue.weebly.com/uploads/2/4/5/2/24526270/122731.jpg&amp;raw" style="margin-top: 5px; margin-bottom: 10px; margin-left: 10px; margin-right: 0px; border-width:1px;padding:3px; max-width:100%"></a><span class="wsite-caption" data-dcnode-id="302" style="display: table-caption; caption-side: bottom; font-size: 90%; margin-top: -10px; margin-bottom: 10px; text-align: center;"></span></span><span data-dcnode-id="300" instrument_node="">
</span><div class="paragraph" data-dcnode-id="283" style="text-align:left;display:block;"><font data-dcnode-id="284" size="3"><strong data-dcnode-id="296"><font color="#3b1701" data-dcnode-id="297" size="5"><u data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">medical care</span></u></font></strong><span data-dcnode-id="295" instrument_node="">&nbsp; I can't stress enough how important it is to find a vet who is not only willing to treat your fox but is&nbsp;also knowledgeable. At the very least make sure your vet has connections with another vet that has had experience with foxes (such as a zoo veterinarian). This will usually work for basic care, but any major issues may see you driving a long ways to get treatment. Make all of your connections before getting your fox and take him to visit his vet for hugs and treats fairly often so he'll remain familiar with them and not fearful.&nbsp;&nbsp;</span><br data-dcnode-id="294"><span data-dcnode-id="293" instrument_node=""> Foxes can also get heartworms. Use a monthly ivermectin based heartworm prevention year round to prevent infection. Do not start preventative treatment without your vet's permission.</span><br data-dcnode-id="292"><span data-dcnode-id="291" instrument_node="">When vaccinating only use dead or modified live viruses. Some vaccines used for dogs can actually give your fox the virus it's meant to protect against. I prefer only giving a rabies vaccination and limiting physical contact with </span><br data-dcnode-id="290"><span data-dcnode-id="289" instrument_node=""> unknown dogs or places like pet stores and parks where infected dogs might have been. Some areas require you to have additional vaccinations by law. Other vaccines, such as distemper, may be given so long as the virus is killed or at least modified. This is one&nbsp;example of why&nbsp;a knowledgeable veterinarian is so important. </span><br data-dcnode-id="288"><span data-dcnode-id="287" instrument_node="">Be aware that in many states, if your fox bites a person for any reason, they can legally euthanize and test for rabies whether its vaccinations are current or not. So please be careful and watchful if you allow your fox around other people. Keeping the vaccinations current and properly recorded with your vet will give you a better chance to fight for your fox's life if you should find yourself in that situation. </span><br data-dcnode-id="286"><span data-dcnode-id="285" instrument_node="">It's highly recommended to spay or neuter your fox. This can lead to a healthier life, help cut down on undesirable behavior, and lessen their smell. Never keep two or more unaltered foxes together regardless of gender unless intending to breed them. Breeding is a remarkable amount of work which is why I didn't include that information here. If you are serious about investing the time and money into breeding foxes, contact me and I can discuss with you how to go about it.</span></font></div><span data-dcnode-id="282" instrument_node="">
</span><hr data-dcnode-id="281" style="width:100%;clear:both;visibility:hidden;"><span data-dcnode-id="280" instrument_node="">
</span><span class="imgPusher" data-dcnode-id="279" style="float:left;height:0px"></span><span data-dcnode-id="275" style="display: table;width:auto;position:relative;float:left;max-width:100%;;clear:left;margin-top:0px;*margin-top:0px"><a data-dcnode-id="277"><img alt="Picture" class="galleryImageBorder wsite-image" data-dcnode-id="278" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foxrescue.weebly.com/uploads/2/4/5/2/24526270/9274834.jpg%3F255&amp;raw" style="margin-top: 5px; margin-bottom: 10px; margin-left: 0px; margin-right: 10px; border-width:1px;padding:3px; max-width:100%"></a><span class="wsite-caption" data-dcnode-id="276" style="display: table-caption; caption-side: bottom; font-size: 90%; margin-top: -10px; margin-bottom: 10px; text-align: center;"></span></span><span data-dcnode-id="274" instrument_node="">
</span><div class="paragraph" data-dcnode-id="260" style="text-align:left;display:block;"><strong data-dcnode-id="270"><font color="#3d2704" data-dcnode-id="271" size="5"><u data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">additional notes</span></u></font></strong><span data-dcnode-id="269" instrument_node=""> </span><font data-dcnode-id="261" size="3"><span data-dcnode-id="268" instrument_node="">Use caution when having an adult fox in your home with other pets. Foxes, like any animal, can be unpredictable. They are opportunistic feeders and might eat smaller pets such as birds, fish, rodents, kittens, and small breed puppies. Never leave a fox </span><br data-dcnode-id="267"><span data-dcnode-id="266" instrument_node=""> unattended with these kinds of animals. You should also be careful introducing any new pet into a house with an adult fox. It's not uncommon for some foxes to dislike another animal for no apparent reason. </span><br data-dcnode-id="265"><span data-dcnode-id="264" instrument_node="">Foxes bond with each other for life. A mated pair is most common, but sometimes siblings, same-gender, and even another species of animal can cause a fox to form a very strong attachment. Removing one of them can lead to severe depression in your fox and he or she may even refuse to eat. You must earn a fox's affection and trust through patience, kindness, time, and consistency. You have to find a way to bond with them. Talk to them, mimic their sounds when they talk to you, and if safe to do so, handle them often. Not all foxes like to be petted or held no matter what you try. I know it's frustrating, but respect their personality and let them come to you. Don't force yourself on them.</span><br data-dcnode-id="263"><span data-dcnode-id="262" instrument_node="">Remember, when you choose to bring a pet into your home it is a responsibility for the rest of that animal's life. This is even more important to think about with foxes. They will often bond with one person very strongly. Severing the bond can cause a fox to become very depressed and sometimes aggressive. For this reason it's often impossible to rehome a pet fox. If you no longer want your fox, he also cannot be released into the wild. It's illegal, he will not survive and also might be carrying illness that could drastically impact wild populations. So be sure you are ready to dedicate the time, money, and patience required before you decide to get a fox.</span></font></div><span data-dcnode-id="259" instrument_node="">
</span><hr data-dcnode-id="258" style="width:100%;clear:both;visibility:hidden;"><span data-dcnode-id="257" instrument_node="">

</span><div class="paragraph" data-dcnode-id="239" style="text-align:center;"><font color="#2c1b02" data-dcnode-id="246" size="5"><u data-dcnode-id="247"><strong data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">Species Specific Information</span></strong></u></font><br data-dcnode-id="245"><br data-dcnode-id="244"><span data-dcnode-id="243"></span><span data-dcnode-id="242" instrument_node="">&nbsp;</span><font data-dcnode-id="240" size="3"><span data-dcnode-id="241" instrument_node="">Every species of fox has unique requirements in addition to general fox care. Please review the link below relating to the individual species you are considering.</span></font></div><span data-dcnode-id="238" instrument_node="">
</span><span class="imgPusher" data-dcnode-id="237" style="float:left;height:0px"></span><span data-dcnode-id="233" style="display: table;width:auto;position:relative;float:left;max-width:100%;;clear:left;margin-top:0px;*margin-top:0px"><a data-dcnode-id="235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foxrescue.weebly.com/red-foxes.html"><img alt="Picture" class="galleryImageBorder wsite-image" data-dcnode-id="236" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foxrescue.weebly.com/uploads/2/4/5/2/24526270/9679825.jpg&amp;raw" style="margin-top: 5px; margin-bottom: 10px; margin-left: 0px; margin-right: 10px; border-width:1px;padding:3px; max-width:100%"></a><span class="wsite-caption" data-dcnode-id="234" style="display: table-caption; caption-side: bottom; font-size: 90%; margin-top: -10px; margin-bottom: 10px; text-align: center;"></span></span><span data-dcnode-id="232" instrument_node="">
</span><div class="paragraph" data-dcnode-id="221" style="text-align:left;display:block;"><font data-dcnode-id="222" size="3"><strong data-dcnode-id="225"><font color="#2f0404" data-dcnode-id="226"><br data-dcnode-id="231"><span data-dcnode-id="230"></span><a data-dcnode-id="227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foxrescue.weebly.com/red-foxes.html" title=""><font data-dcnode-id="228" size="4"><span data-dcnode-id="229" instrument_node="">Red Fox</span></font></a></font></strong><span data-dcnode-id="224" instrument_node="">&nbsp; includes all color variations such as white, marble, "arctic-marble", silver, etc. Most often if you have a pet fox other than a fennec, it falls into this category.</span><br data-dcnode-id="223"></font></div><span data-dcnode-id="220" instrument_node="">
</span><hr data-dcnode-id="219" style="width:100%;clear:both;visibility:hidden;"><span data-dcnode-id="218" instrument_node="">
</span><span class="imgPusher" data-dcnode-id="217" style="float:left;height:0px"></span><span data-dcnode-id="213" style="display: table;width:auto;position:relative;float:left;max-width:100%;;clear:left;margin-top:0px;*margin-top:0px"><a data-dcnode-id="215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foxrescue.weebly.com/gray-foxes1.html"><img alt="Picture" class="galleryImageBorder wsite-image" data-dcnode-id="216" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foxrescue.weebly.com/uploads/2/4/5/2/24526270/3715998.jpg&amp;raw" style="margin-top: 5px; margin-bottom: 10px; margin-left: 0px; margin-right: 10px; border-width:1px;padding:3px; max-width:100%"></a><span class="wsite-caption" data-dcnode-id="214" style="display: table-caption; caption-side: bottom; font-size: 90%; margin-top: -10px; margin-bottom: 10px; text-align: center;"></span></span><span data-dcnode-id="212" instrument_node="">
</span><div class="paragraph" data-dcnode-id="200" style="text-align:left;display:block;"><font data-dcnode-id="205" size="3"><a data-dcnode-id="206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foxrescue.weebly.com/gray-foxes1.html" title=""><br data-dcnode-id="211"><span data-dcnode-id="210"></span><strong data-dcnode-id="207"><font data-dcnode-id="208" size="4"><span data-dcnode-id="209" instrument_node="">Gray Fox</span></font></strong></a></font><font data-dcnode-id="203" size="3"><span data-dcnode-id="204" instrument_node="">&nbsp; this unique species is characterized by primarily salt and pepper hair.&nbsp;Most have&nbsp;red and white accents and a black stripe down the tail often ending in a black tip.</span></font><span data-dcnode-id="202" instrument_node=""> </span><br data-dcnode-id="201"></div><span data-dcnode-id="199" instrument_node="">
</span><hr data-dcnode-id="198" style="width:100%;clear:both;visibility:hidden;"><span data-dcnode-id="197" instrument_node="">
</span><span class="imgPusher" data-dcnode-id="196" style="float:left;height:0px"></span><span data-dcnode-id="192" style="display: table;width:auto;position:relative;float:left;max-width:100%;;clear:left;margin-top:0px;*margin-top:0px"><a data-dcnode-id="194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foxrescue.weebly.com/arctic-foxes1.html"><img alt="Picture" class="galleryImageBorder wsite-image" data-dcnode-id="195" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foxrescue.weebly.com/uploads/2/4/5/2/24526270/8826325.jpg&amp;raw" style="margin-top: 5px; margin-bottom: 10px; margin-left: 0px; margin-right: 10px; border-width:1px;padding:3px; max-width:100%"></a><span class="wsite-caption" data-dcnode-id="193" style="display: table-caption; caption-side: bottom; font-size: 90%; margin-top: -10px; margin-bottom: 10px; text-align: center;"></span></span><span data-dcnode-id="191" instrument_node="">
</span><div class="paragraph" data-dcnode-id="180" style="text-align:left;display:block;"><font data-dcnode-id="181" size="3"><strong data-dcnode-id="185"><font data-dcnode-id="186" size="4"><a data-dcnode-id="187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foxrescue.weebly.com/arctic-foxes1.html" title=""><br data-dcnode-id="190"><span data-dcnode-id="189"></span><span data-dcnode-id="188" instrument_node="">Arctic Fox</span></a></font></strong><span data-dcnode-id="184" instrument_node="">&nbsp; an uncommon species to find in the North American pet trade. white red foxes are often mistaken for, or </span><br data-dcnode-id="183"><span data-dcnode-id="182" instrument_node=""> misrepresented as, these stockier, small-eared cousins.&nbsp; </span></font></div><span data-dcnode-id="179" instrument_node="">
</span><hr data-dcnode-id="178" style="width:100%;clear:both;visibility:hidden;"><span data-dcnode-id="177" instrument_node="">
</span><span class="imgPusher" data-dcnode-id="176" style="float:left;height:0px"></span><span data-dcnode-id="172" style="display: table;width:auto;position:relative;float:left;max-width:100%;;clear:left;margin-top:0px;*margin-top:0px"><a data-dcnode-id="174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foxrescue.weebly.com/fennec-foxes.html"><img alt="Picture" class="galleryImageBorder wsite-image" data-dcnode-id="175" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foxrescue.weebly.com/uploads/2/4/5/2/24526270/409178.jpg&amp;raw" style="margin-top: 5px; margin-bottom: 10px; margin-left: 0px; margin-right: 10px; border-width:1px;padding:3px; max-width:100%"></a><span class="wsite-caption" data-dcnode-id="173" style="display: table-caption; caption-side: bottom; font-size: 90%; margin-top: -10px; margin-bottom: 10px; text-align: center;"></span></span><span data-dcnode-id="171" instrument_node="">
</span><div class="paragraph" data-dcnode-id="159" style="text-align:left;display:block;"><font data-dcnode-id="164" size="3"><strong data-dcnode-id="165"><a data-dcnode-id="166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foxrescue.weebly.com/fennec-foxes.html" title=""><br data-dcnode-id="170"><span data-dcnode-id="169"></span><font data-dcnode-id="167" size="4"><span data-dcnode-id="168" instrument_node="">Fennec Fox</span></font></a></strong></font><span data-dcnode-id="163" instrument_node="">&nbsp; </span><font data-dcnode-id="160" size="3"><span data-dcnode-id="162" instrument_node="">originally from Africa, the fennec is the tiniest of all fox species, featuring a beautiful golden coat and proportionately giant ears.</span><br data-dcnode-id="161"></font></div><span data-dcnode-id="158" instrument_node="">

</span><div class="paragraph" data-dcnode-id="140" style="text-align:left;display:block;"><strong data-dcnode-id="144"><font data-dcnode-id="145" size="4"><br data-dcnode-id="149"><span data-dcnode-id="148"></span><a data-dcnode-id="146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foxrescue.weebly.com/other-species.html"><span data-dcnode-id="147" instrument_node="">Miscellaneous Foxes</span></a></font></strong><span data-dcnode-id="143" instrument_node="">&nbsp; </span><font data-dcnode-id="141" size="3"><span data-dcnode-id="142" instrument_node="">species not listed above that occasionally appear in the pet trade such as swifts, bat-eared, hybrid species, and Russian tame foxes.</span></font></div><span data-dcnode-id="139" instrument_node="">

</span><div class="paragraph" data-dcnode-id="126" style="text-align:center;"><strong data-dcnode-id="127"><font color="#321603" data-dcnode-id="128" size="5"><span data-dcnode-id="129" instrument_node="">Do you still want a pet fox?</span></font></strong></div><span data-dcnode-id="125" instrument_node="">
</span><span class="imgPusher" data-dcnode-id="124" style="float:left;height:0px"></span><span data-dcnode-id="120" style="display: table;width:auto;position:relative;float:left;max-width:100%;;clear:left;margin-top:0px;*margin-top:0px"><a data-dcnode-id="122"><img alt="Picture" class="galleryImageBorder wsite-image" data-dcnode-id="123" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foxrescue.weebly.com/uploads/2/4/5/2/24526270/5902535.jpg&amp;raw" style="margin-top: 5px; margin-bottom: 10px; margin-left: 0px; margin-right: 10px; border-width:1px;padding:3px; max-width:100%"></a><span class="wsite-caption" data-dcnode-id="121" style="display: table-caption; caption-side: bottom; font-size: 90%; margin-top: -10px; margin-bottom: 10px; text-align: center;"></span></span><span data-dcnode-id="119" instrument_node="">
</span><div class="paragraph" data-dcnode-id="102" style="text-align:left;display:block;"><font data-dcnode-id="104" size="3"><span data-dcnode-id="118" instrument_node="">So, you've done lots of research on care and temperament and are still considering a fox for a pet? Then the first step is to&nbsp;find out about the&nbsp;legality&nbsp;of keeping the particular species you want&nbsp;in the state, county, </span><strong data-dcnode-id="116"><span data-dcnode-id="117" instrument_node="">and</span></strong><span data-dcnode-id="115" instrument_node=""> town/city you live in. Some places require a permit or license, others don't, and in some areas&nbsp;pet&nbsp;foxes are illegal completely. The website </span><a data-dcnode-id="113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bornfreeusa.org/b4a2_exotic_animals_summary.php" target="_blank"><span data-dcnode-id="114" instrument_node="">Born Free USA</span></a><span data-dcnode-id="112" instrument_node="">&nbsp;has good information on state laws. You will also have to check your local (county and city) regulations because sometimes&nbsp;exotic pets, like foxes,&nbsp;are legal in your state and/or county but not the city. The next step is to make sure you can find a vet willing and able to treat a fox </span><em data-dcnode-id="110"><span data-dcnode-id="111" instrument_node="">before</span></em><span data-dcnode-id="109" instrument_node=""> you get one.</span><br data-dcnode-id="108"><span data-dcnode-id="107" instrument_node="">If everything is legal and you have found a vet, you must decide on the species you want and locate a reputable breeder. For help with that, please check out </span><a data-dcnode-id="105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foxrescue.weebly.com/links-and-resources.html"><span data-dcnode-id="106" instrument_node="">Links and Resources</span></a></font><br data-dcnode-id="103"></div><span data-dcnode-id="101" instrument_node="">
</span><hr data-dcnode-id="100" style="width:100%;clear:both;visibility:hidden;"><span data-dcnode-id="99" instrument_node="">
