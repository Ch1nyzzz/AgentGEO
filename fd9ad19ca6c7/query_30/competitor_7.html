</span><p data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">A Minecraft axolotl is one of the cutest creatures in the game, a little pink amphibian found plaintively pottering about the game's caves and caverns alike. They're dependant on water - keep them away from it for too long and you risk drying them out - but learn their nuances and you'll have your own axolotl mob to catch, tame and breed. We'll show you where to find them and how to tame your own Minecraft axolotl in our comprehensive guide below.</span></p><div class="ad-unit" data-dcnode-id="2235" id="ad-unit-1"></div><h2 data-dcnode-id="2233" id="where-to-find-the-minecraft-1-17-axolotl-mob-xa0"><span data-dcnode-id="2234" instrument_node="">Where to find the Minecraft 1.17 axolotl mob&nbsp;</span></h2><div class="bordeaux-slot" data-dcnode-id="2232" data-feat-ref="bordeaux-feat-id-78" id="bordeaux-static-slot-5" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="2231" data-feat-ref="bordeaux-feat-id-82" id="bordeaux-static-slot-9" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure" data-bordeaux-image-check="" data-dcnode-id="2220"><div class="image-full-width-wrapper" data-dcnode-id="2224"><div class="image-widthsetter" data-dcnode-id="2225" style="max-width:1920px;"><p class="vanilla-image-block" data-dcnode-id="2226" style="padding-top:56.25%;"><picture data-dcnode-id="2227"><source alt="Where to find the Minecraft 1.17 axolotl mob" class="lazy-image-van optional-image" data-dcnode-id="2230" data-normal="https://vanilla.futurecdn.net/gamesradar/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/5AA6NfizBSH659Y9mSmHJJ.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/5AA6NfizBSH659Y9mSmHJJ.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/5AA6NfizBSH659Y9mSmHJJ-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/5AA6NfizBSH659Y9mSmHJJ-6 pg" data-srcset="https://cdn.mos.cms.futurecdn.net/5AA6NfizBSH659Y9mSmHJJ-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/5AA6NfizBSH659Y9mSmHJJ-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/5AA6NfizBSH659Y9mSmHJJ-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/gamesradar/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/5AA6NfizBSH659Y9mSmHJJ-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/5AA6NfizBSH659Y9mSmHJJ-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/5AA6NfizBSH659Y9mSmHJJ-970-80.jpg 970w"></picture></p></div></div><figcaption class="" data-dcnode-id="2221" itemprop="caption description"><span class="credit" data-dcnode-id="2222" itemprop="copyrightHolder"><span data-dcnode-id="2223" instrument_node="">(Image credit: Mojang)</span></span></figcaption></figure><p data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">Unfortunately, finding a Minecraft axolotl is easier said than done. The axolotl is an aquatic cave animal, which means that they only spawn in total darkness (light level 0). Naturally, there must also be blocks roofing over their habitat.&nbsp;</span></p><aside class="hawk-nest hawk-processed" data-dcnode-id="2217" data-feat-ref="hawk-id-1" data-render-type="fte" data-result="missing" data-skip="dealsy" data-widget-id="1114016983908127600" data-widget-type="seasonal"></aside><p data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">On the plus side, a Minecraft axolotl cave lake doesn’t have to be deep (there must be a solid block no more than five blocks below the axolotl spawn point). You don’t necessarily have to dig deep either, as the axolotl can spawn below y: 63. That means around sea level or lower.</span></p><div class="in-article ad-unit" data-dcnode-id="2167" id="desktop-in-article"><div class="trc_related_container trc_spotlight_widget trc_elastic trc_elastic_thumbnails-a-mid" data-dcnode-id="2168" data-placement-name="Mid Article" id="desktop-taboola-mid-article" observeid="tbl-observe-0 tbl-observe-2"><div class="trc_rbox_container" data-dcnode-id="2169"><div data-dcnode-id="2170"><div class="trc_rbox thumbnails-a-mid trc-content-sponsored" data-dcnode-id="2171" id="trc_wrapper_32318" style="overflow: hidden; display: block;"><div class="trc_rbox_header trc_rbox_border_elm" data-dcnode-id="2198" id="trc_header_32318"><div class="trc_header_ext" data-dcnode-id="2200"><div class="logoDiv link-disclosure attribution-disclosure-link-sponsored" data-dcnode-id="2208"><a class="trc_desktop_disclosure_link trc_attribution_position_top" data-dcnode-id="2212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//popup.taboola.com/en/%3Ftemplate%3Dcolorbox%26utm_source%3Dfutureplc-gamesradar%26utm_medium%3Dreferral%26utm_content%3Dthumbnails-a-mid%3AMid%2520Article%3A" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">Sponsored Links</span></span></a><a class="trc_mobile_disclosure_link trc_attribution_position_top" data-dcnode-id="2209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//popup.taboola.com/en/%3Ftemplate%3Dcolorbox%26utm_source%3Dfutureplc-gamesradar%26utm_medium%3Dreferral%26utm_content%3Dthumbnails-a-mid%3AMid%2520Article%3A" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Sponsored Links</span></span></a></div><div class="logoDiv link-disclosure attribution-disclosure-link-hybrid" data-dcnode-id="2201"><a class="trc_desktop_disclosure_link trc_attribution_position_top" data-dcnode-id="2205" href="https://chatnoir-webcontent.chatnoir.eu/? pan data-dcnode-id="2147" instrument_node="">With such an adorable look, it’s only natural that Minecraft players want to tame their own axolotl pet. Unfortunately, you can’t tame an axolotl like a cat or a wolf. However, they are passive animals and can easily be captured and transported. So yes, you can breed axolotl and make your own axolotl zoo in Minecraft 1.17!</span></p><div class="ad-unit" data-dcnode-id="2145" id="ad-unit-2"></div><p data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">The easiest way to transport an axolotl is by using a Bucket on them. You can then take the axolotl bucket with you wherever you go. Alternatively, you can lure them with a bucket of tropical fish, or use a lead. Be careful where you drop your axolotl though; they will die after spending more than five minutes out of water.&nbsp;</span></p><h2 data-dcnode-id="2141" id="how-to-breed-axolotls-in-minecraft-1-17"><span data-dcnode-id="2142" instrument_node="">How to breed axolotls in Minecraft 1.17</span></h2><div class="bordeaux-slot" data-dcnode-id="2140" data-feat-ref="bordeaux-feat-id-80" id="bordeaux-static-slot-7" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="2139" data-feat-ref="bordeaux-feat-id-84" id="bordeaux-static-slot-11" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure" data-bordeaux-image-check="" data-dcnode-id="2128"><div class="image-full-width-wrapper" data-dcnode-id="2132"><div class="image-widthsetter" data-dcnode-id="2133" style="max-width:1920px;"><p class="vanilla-image-block" data-dcnode-id="2134" style="padding-top:56.25%;"><picture data-dcnode-id="2135"><source alt="Minecraft 1.17 Axolotl" class="lazy-image-van optional-image" data-dcnode-id="2138" data-normal="https://vanilla.futurecdn.net/gamesradar/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/s3U9z8838WQoSAtsiMb5BJ.jpg" data-pin-media="
