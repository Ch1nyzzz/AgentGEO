d="2030" tabindex="-1"></div><div aria-hidden="true" data-dcnode-id="2024" tabindex="-1"><b aria-hidden="true" data-dcnode-id="2027" tabindex="-1"><span data-dcnode-id="2028" instrument_node="">TCIN</span></b><span data-dcnode-id="2026" instrument_node="">: 82148946</span><hr aria-hidden="true" data-dcnode-id="2025" tabindex="-1"></div><div aria-hidden="true" data-dcnode-id="2019" tabindex="-1"><b aria-hidden="true" data-dcnode-id="2022" tabindex="-1"><span data-dcnode-id="2023" instrument_node="">UPC</span></b><span data-dcnode-id="2021" instrument_node="">: 778988407530</span><hr aria-hidden="true" data-dcnode-id="2020" tabindex="-1"></div><div aria-hidden="true" data-dcnode-id="2014" tabindex="-1"><b aria-hidden="true" data-dcnode-id="2017" tabindex="-1"><span data-dcnode-id="2018" instrument_node="">Item Number (DPCI)</span></b><span data-dcnode-id="2016" instrument_node="">: 086-08-2201</span><hr aria-hidden="true" data-dcnode-id="2015" tabindex="-1"></div><div aria-hidden="true" data-dcnode-id="2009" tabindex="-1"><b aria-hidden="true" data-dcnode-id="2012" tabindex="-1"><span data-dcnode-id="2013" instrument_node="">Origin</span></b><span data-dcnode-id="2011" instrument_node="">: Imported</span><hr aria-hidden="true" data-dcnode-id="2010" tabindex="-1"></div></div><div aria-hidden="true" class="styles__StyledCol-sc-ct8kx6-0 jOZqCG h-padding-l-default" data-dcnode-id="2000" tabindex="-1"><h3 aria-hidden="true" class="h-text-bs h-margin-b-tight" data-dcnode-id="2006" tabindex="-1"><span data-dcnode-id="2007" instrument_node="">Description</span></h3><div aria-hidden="true" class="h-margin-v-default" data-dcnode-id="2001" data-test="item-details-description" tabindex="-1"><span data-dcnode-id="2005" instrument_node="">Bring your look to life with Purse Pets! These fabulous interactive pets are packed with purse-onality. They respond to your touch, really blink, and have over 25 exciting sounds and reactions unique to each Purse Pet’s style! The Fierce Fox Purse Pet features blue and teal pebbled faux leather, pop art-inspired eyes, an adjustable strap and real metal hardware. While you’re out and on-the-go, your Fierce Fox Purse Pet will blink and make sassy sounds as she interacts with you. Touch her forehead to make her happily coo and purr! Snap a selfie, then pet and hold her forehead and she’ll close her eyes, open them, and playfully blow you a kiss!  Then, check out the stylish metallic insignia on the front of your fox purse – it’s a secret button that unlocks more ways to play! In magic mode, you can play games and music together. Want to know if your Fierce Fox Purse Pet likes your outfit? Find out your fashion fortune and ask your Purse Pet what she thinks. Touch her forehead, ask your question and she’ll respond with cute sounds and a yes or no answer! Ask her more questions, then rock your runway look! Press and hold your Purse Pet’s forehead to enter runway ready mode. Your Fierce Fox Purse Pet will play cool fashion show-inspired music – tap her forehead for camera shutter sound effects and hold it for applause. It’s so much fun! With Purse Pets, friendship meets fashion! Take your super cute purse with you everywhere you go. Measuring approximately 4.25 in. (H) x 6.25 in. (W) x 2.5 in. (D), each Purse Pet is the perfect size to fit all your essentials. Purse Pets are great gifts for girls and include 3 AAA Duracell batteries. Collect them all (each sold separately) and express your style with your Purse Pets fashion bestie! Bring home The Fierce Fox Purse Pet and serve up fierce fashion looks with your trendy interactive pet!</span><br aria-hidden="true" data-dcnode-id="2004" tabindex="-1"><br aria-hidden="true" data-dcnode-id="2003" tabindex="-1"><span data-dcnode-id="2002" instrument_node="">• Includes: 1 Purse Pets Purse, 1 Instruction Sheet</span></div></div></div><div aria-hidden="true" class="styles__StyledRow-sc-1nuqtm0-0 cuJjmE h-margin-a-tight h-display-block" data-dcnode-id="1994" tabindex="-1">< "h-margin-t-tiny" data-dcnode-id="703" data-test="review-card--syndicated-badge"><div class="h-text-grayDark h-text-sm h-margin-b-tiny" data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">originally posted on spinmaster.com/uk</span></div><img alt="" class="SyndicatedBadge__BrandLogo-sc-1j452wt-0 cXcHUw" data-dcnode-id="704" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photos-us.bazaarvoice.com/photo/2/cGhvdG86YXR0cmlidXRpb25sb2dvMg/b60df518-8a20-46c4-9d59-4523db2db76c&amp;raw"></div><div class="h-margin-t-default" data-dcnode-id="701" data-test="review-card--text"><span data-dcnode-id="702" instrument_node="">[This review was collected as part of a promotion.] Got this for my daughter as I was so intrigued when I saw this new out. She loves to fill a bag with toys and take them out with us so I thought this would be the perfect toy. It's cute and so pretty the leopard design is cool and cute we love the eyes on it and the fact they blink aswell shocked us for my child it was like there bag was alive she used it every day since and its much more easier to fill that with toys and carry it herself it makes noises and talks interactive which is brilliant for a child a talking animal bag that makes noises and interactive with you when putting stuff in the bag we love the other animal designs aswell we would highly recommend this to anyone especially for a Christmas present its different and lots of fun and can take it out with them aswell it's got enough room inside it aswell for whatever your child puts in there bag you won't be disappointed with this purchase can see it being a best seller during the Christmas period</span></div></div><div class="ReviewCard__FixedWidthDiv-sc-1hvj2iv-3 fJLqqq secondary-rating-with-feedback h-display-flex h-flex-direction-col" data-dcnode-id="687"><div class="ReviewCard__GrowDiv-sc-1hvj2iv-2 dBMhum" data-dcnode-id="699"></div><div data-dcnode-id="688"><div class="h-text-sm h-margin-v-tight h- ollected as part of a promotion.] My 4 year old hasn't put the purse down since she received it. Very eye catching, unique and funky. By a simple press of a button located on the front of the purse "my pet" (as my daughter referrers to it) it interacts by making sounds and blinking. The quality is excellent. Not much room inside the purse however we've not found this much of an issue for my 4 year old.</span></div></div><div class="ReviewCard__FixedWidthDiv-sc-1hvj2iv-3 fJLqqq secondary-rating-with-feedback h-display-flex h-flex-direction-col" data-dcnode-id="617"><div class="ReviewCard__GrowDiv-sc-1hvj2iv-2 dBMhum" data-dcnode-id="629"></div><div data-dcnode-id="618"><div class="h-text-sm h-margin-v-tight h-text-grayDark" data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">3 guests found this review helpful. Did you?</span></div><div class="h-display-flex h-flex-wrap" data-dcnode-id="619"><button class="Button-sc-bwu3xu-0 FeedbackButton-sc-xhp8c8-0 dYdoYK jfMfGH" data-dcnode-id="625" data-test="review-card--helpful-button" type="button"><span data-dcnode-id="626" instrument_node="">Helpful</span></button><button class="Button-sc-bwu3xu-0 FeedbackButton-sc-xhp8c8-0 dYdoYK jfMfGH" data-dcnode-id="623" data-test="review-card--not-helpful-button" type="button"><span data-dcnode-id="624" instrument_node="">Not helpful</span></button><span class="ReportLink-sc-175xh7e-0 gvmmfD h-padding-r-tiny" data-dcnode-id="620" tabindex="-1"><a class="Link-sc-1khjl8b-0 hjUBLN" data-dcnode-id="621" data-test="review-card--report-button" href="#"><span data-dcnode-id="622" instrument_node="">Report review</span></a></span></div></div></div></div></div></div></div></div><div class="ReviewCard-sc-1hvj2iv-6 cwMKgM h-margin-v-default h-display-flex h-flex-direction-row h-padding-a-wide" data-dcnode-id="541"><div class="Row-sc-uds8za-0 ReviewCard__ReviewRow-sc-1hvj2iv-4 dDtkvD hDKPVW" data-dcnode-id="542"><div class="Col-sc-favj32-0 ReviewCard__ReviewCol-sc-1hvj2iv-5 XAxMr ib d--reviewTime"><span data-dcnode-id="568" instrument_node="">6 months ago</span></span></div><div class="h-margin-t-tiny" data-dcnode-id="562" data-test="review-card--syndicated-badge"><div class="h-text-grayDark h-text-sm h-margin-b-tiny" data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">originally posted on spinmaster.com/uk</span></div><img alt="" class="SyndicatedBadge__BrandLogo-sc-1j452wt-0 cXcHUw" data-dcnode-id="563" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photos-us.bazaarvoice.com/photo/2/cGhvdG86YXR0cmlidXRpb25sb2dvMg/b60df518-8a20-46c4-9d59-4523db2db76c&amp;raw"></div><div class="h-margin-t-default" data-dcnode-id="560" data-test="review-card--text"><span data-dcnode-id="561" instrument_node="">[This review was collected as part of a promotion.] My 7 year old daughter has been using Purse Pets Leopard over the past few weeks she absolutely adores it, it's soft and interactive you just push the button on the front and the eyes move and it makes sounds. There is a downside with all the interactive part of the bag it makes the inside of the bag smaller but my daughter doesn't overload it with things. I liked the different designs that was available they are stylish. It is my daughters favourite bag it goes everywhere with us and she has had many compliments about it. The material as well as being soft seems strong and durable to last.</span></div></div><div class="ReviewCard__FixedWidthDiv-sc-1hvj2iv-3 fJLqqq secondary-rating-with-feedback h-display-flex h-flex-direction-col" data-dcnode-id="546"><div class="ReviewCard__GrowDiv-sc-1hvj2iv-2 dBMhum" data-dcnode-id="558"></div><div data-dcnode-id="547"><div class="h-text-sm h-margin-v-tight h-text-grayDark" data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">1 guest found this review helpful. Did you?</span></div><div class="h-display-flex h-flex-wrap" data-dcnode-id="548"><button class="Button-sc-bwu3xu-0 FeedbackButton-sc-xhp8c8-0 dYdoYK jfMf
