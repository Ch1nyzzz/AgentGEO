</span><h1 class="title entry-title" data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Wainwrights</span></h1><span data-dcnode-id="1469" instrument_node="">
</span></header><span data-dcnode-id="1467" instrument_node="">
</span><div class="post-content box mark-links entry-content" data-dcnode-id="646"><span data-dcnode-id="1466" instrument_node="">
</span><h2 data-dcnode-id="1464" style="text-align: center;"><span data-dcnode-id="1465" instrument_node="">Wainwrights Information</span></h2><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1460"><span data-dcnode-id="1461" data-preserver-spaces="true"><span data-dcnode-id="1462" instrument_node="">Wainwrights is a large UK-based pet food brand that, according to our research, has been available to pet owners since at least 2006.</span></span></p><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1456"><span data-dcnode-id="1457" data-preserver-spaces="true"><span data-dcnode-id="1458" instrument_node="">Wainwrights is sold exclusively by Pets At Home, which has a large retail and online presence in the UK pet market and is well known to UK consumers nationwide.</span></span></p><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1447"><span data-dcnode-id="1453" data-preserver-spaces="true"><span data-dcnode-id="1454" instrument_node="">Being a Pets At Home brand makes Wainwrights the sister brand of some other popular UK pet food brands like&nbsp;</span></span><a class="editor-rtfLink" data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//petfoodreviewer.com/reviews/ava/" rel="noopener" target="_blank"><span data-dcnode-id="1451" data-preserver-spaces="true"><span data-dcnode-id="1452" instrument_node="">Ava</span></span></a><span data-dcnode-id="1448" data-preserver-spaces="true"><span data-dcnode-id="1449" instrument_node="">.</span></span></p><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1444"><img alt="Pets At Home Logo" class="aligncenter size-medium wp-image-52756" data-dcnode-id="1445" height="300" sizes="(max-width: 300px) 100vw, 300px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" srcset="https://petfoodreviewer.com/wp-content/uploads/2020/10/pets-at-home-logo-300x300.jpg 300w, https://petfoodreviewer.com/wp-content/uploads/2020/10/pets-at-home-logo-150x150.jpg 150w, https://petfoodreviewer.com/wp-content/uploads/2020/10/pets-at-home-logo-115x115.jpg 115w, https://petfoodreviewer.com/wp-content/uploads/2020/10/pets-at-home-logo.jpg 316w" width="300"></p><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1441" data-preserver-spaces="true"><span data-dcnode-id="1442" instrument_node="">Because Wainwrights is an exclusive store brand, it is not available from other large online pet food websites like Zooplus or Amazon.</span></span></p><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1437" data-preserver-spaces="true"><span data-dcnode-id="1438" instrument_node="">It appears that some of Wainwrights’ products are developed and manufactured in the UK, and they proudly state this on their packaging and their website.</span></span></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1432"><span data-dcnode-id="1434" instrument_node="">You can see an example of this below where it shows the recipe is “UK made”.</span><img alt="Wainwrights UK made" class="aligncenter size-full wp-image-58741" data-dcnode-id="1433" height="401" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//petfoodreviewer.b-cdn.net/wp-content/uploads/2021/10/wainwrights-uk-made.jpg&amp;raw" width="397"></p><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1428"><span data-dcnode-id="1429" data-preserver-spaces="true"><span data-dcnode-id="1430" instrument_node="">However, it also appears that some other Wainwright products are not produced in the UK and do not include the same visible packaging.</span></span></p><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1424"><span data-dcnode-id="1425" data-preserver-spaces="true"><span data-dcnode-id="1426" instrument_node="">While we aren’t sure where these recipes are produced instead of the UK, we believe they may be from a country in the European Union.</span></span></p><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1421" data-preserver-spaces="true"><span data-dcnode-id="1422" instrument_node="">In addition to their manufacturing locations being somewhat unclear, it is not clear whether all of their ingredients are sourced from within the UK, the EU, or if some are sourced from further afield, such as outside the EU.</span></span></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" data-preserver-spaces="true"><span data-dcnode-id="1418" instrument_node="">Many consumers avoid or are seriously concerned about ingredients sourced from countries like China and believe they may be unsafe.</span></span></p><span data-dcnode-id="1415" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1413" data-preserver-spaces="true"><span data-dcnode-id="1414" instrument_node="">It is also worth noting that Wainwrights was originally a grain-inclusive brand until 2011, which is when they first released their grain-free range.</span></span></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1408"><span data-dcnode-id="1409" data-preserver-spaces="true"><span data-dcnode-id="1410" instrument_node="">The timing of this grain-free product release follows the trend of most other large pet food brands as consumer taste shifted.</span></span></p><span data-dcnode-id="1407" instrument_node="">
</span><h2 data-dcnode-id="1405" style="text-align: center;"><span data-dcnode-id="1406" instrument_node="">Wainwrights Product Range</span></h2><span data-dcnode-id="1404" instrument_node="">
</span><h3 data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Dog Food</span></h3><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Wainwrights is one of the biggest players for dog food in the UK and, as a consequence, has a huge product range of dry dog food products.</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">This range includes recipes that are grain-free or grain-inclusive to appeal to both sides of the argument. Also, there are specialty recipes available for different age ranges and niches, such as puppies, large breed dogs, and senior dogs.</span></p><span data-dcnode-id="1395" instrument_node="">
</span><p data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">However, Wainwrights doesn’t just produce dry dog food and also has a massive range of wet/canned dog food products.</span></p><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">This wet food range also includes many specialized recipes such as grain-inclusive recipes, grain-free recipes, recipes for puppies and senior dogs, and some niche recipes for those dogs with health issues like Joint and Mobility problems.</span></p><span data-dcnode-id="1389" instrument_node="">
</span><h3 data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Cat Food</span></h3><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">While Wainwright’s cat food range is also large when compared to other cat food brands, it is nowhere near as large as the dog food range, which is massive.</span></p><span data-dcnode-id="1383" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">The range consists of the typical mix of dry cat food and wet/canned cat food recipes with a variety of meat and fish ingredients at their core.</span></p><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">This range includes a mix of grain-free recipes, grain-inclusive recipes, and some age-specific formulas such as those for kittens and senior cats.</span></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">However, Wainwright’s cat food range does have fewer specialty recipes than the dog food range, but this is fairly typical.</span></p><span data-dcnode-id="1374" instrument_node="">
</span><h2 data-dcnode-id="1372" style="text-align: center;"><span data-dcnode-id="1373" instrument_node="">Wainwrights Nutrition</span></h2><span data-dcnode-id="1371" instrument_node="">
</span><h3 data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Dog Food</span></h3><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">The nutrition provided by Wainwright’s dog food is varied but is generally average to above average when compared to comparable brands.</span></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Unfortunately, many of Wainwright’s recipes have considerably large portions of carbohydrates rather than generous portions of protein and fat.</span></p><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">However, a considerable portion of carbohydrates is not terrible and is suitable for most dogs, especially those that are not very active.</span></p><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">Below is an example of the nutrition provided by a Wainwrights grain-free dry dog food recipe.</span></p><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1354"><img alt="Wainwrights Example Nutrition" class="aligncenter wp-image-49216 size-full" data-dcnode-id="1355" height="299" sizes="(max-width: 520px) 100vw, 520px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" srcset="https://petfoodreviewer.com/wp-content/uploads/2020/01/wainwrights-example-nutrition.png 520w, https://petfoodreviewer.com/wp-content/uploads/2020/01/wainwrights-example-nutrition-300x173.png 300w" width="520"></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1350"><span data-dcnode-id="1351" data-preserver-spaces="true"><span data-dcnode-id="1352" instrument_node="">As you can see, the protein and fat proportion make up over half of the overall nutrition; however, the carbohydrate content is still significant at 47%.</span></span></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1347" data-preserver-spaces="true"><span data-dcnode-id="1348" instrument_node="">If you are interested in learning more about canine nutrition, we highly recommend checking out our&nbsp;</span></span><a class="editor-rtfLink" data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//petfoodreviewer.com/dog-food/" rel="noopener" target="_blank"><span data-dcnode-id="1345" data-preserver-spaces="true"><span data-dcnode-id="1346" instrument_node="">Dog Food Guide</span></span></a><span data-dcnode-id="1342" data-preserver-spaces="true"><span data-dcnode-id="1343" instrument_node="">. In this guide, we go in-depth on many topics, including nutrition, dog food types, and how dog food recalls work.</span></span></p><span data-dcnode-id="1340" instrument_node="">
</span><h3 data-dcnode-id="1338" style="text-align: left;"><span data-dcnode-id="1339" instrument_node="">Cat Food</span></h3><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">The nutrition offered by Wainwright’s cat food is similar to its dog food range and varies significantly. Some recipes provide below-average nutrition compared to the industry average, while others provide nutrition that could be perceived as above-average.</span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">It goes without saying that the wet/canned recipes from Wainwrights tend to offer more favorable nutrition, higher in protein and fat, which is an industry-wide trait.</span></p><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Below is an example of the nutrition provided by a Wainwrights wet cat food recipe.</span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1326"><img alt="Wainwrights Example Cat Food Nutrition" class="aligncenter size-full wp-image-58736" data-dcnode-id="1327" height="307" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//petfoodreviewer.b-cdn.net/wp-content/uploads/2021/10/wainwrights-example-cat-nutrition.jpg&amp;raw" width="522"></p><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1322"><span data-dcnode-id="1323" data-preserver-spaces="true"><span data-dcnode-id="1324" instrument_node="">As you can see, the protein and fat proportion makes up 95% of the recipe’s nutritional value, with carbohydrates being just 5%.</span></span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1318"><span data-dcnode-id="1319" data-preserver-spaces="true"><span data-dcnode-id="1320" instrument_node="">It is incredibly important that cats consume a diet that focuses strongly on meat and fish ingredients. This focus is as cats are obligate carnivores and do not thrive or cope well on a diet high in plant-based ingredients.</span></span></p><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1315" data-preserver-spaces="true"><span data-dcnode-id="1316" instrument_node="">You can learn more about what obligate carnivore means and about the topic of feline nutrition in our&nbsp;</span></span><a class="editor-rtfLink" data-dcnode-id="1312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//petfoodreviewer.com/cat-food/" rel="noopener" target="_blank"><span data-dcnode-id="1313" data-preserver-spaces="true"><span data-dcnode-id="1314" instrument_node="">Cat Food Guide</span></span></a><span data-dcnode-id="1310" data-preserver-spaces="true"><span data-dcnode-id="1311" instrument_node="">.</span></span></p><span data-dcnode-id="1308" instrument_node="">
</span><h2 data-dcnode-id="1306" style="text-align: center;"><span data-dcnode-id="1307" instrument_node="">Wainwrights Ingredients</span></h2><span data-dcnode-id="1305" instrument_node="">
</span><h3 data-dcnode-id="1302"><span data-dcnode-id="1303" style="color: #008000;"><span data-dcnode-id="1304" instrument_node="">High-Quality Meat &amp; Fish Ingredients</span></span></h3><span data-dcnode-id="1301" instrument_node="">
</span><ul data-dcnode-id="1281"><span data-dcnode-id="1300" instrument_node="">
</span><li data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Chicken</span></li><span data-dcnode-id="1297" instrument_node="">
</span><li data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Turkey</span></li><span data-dcnode-id="1294" instrument_node="">
</span><li data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Duck</span></li><span data-dcnode-id="1291" instrument_node="">
</span><li data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Salmon</span></li><span data-dcnode-id="1288" instrument_node="">
</span><li data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Whitefish</span></li><span data-dcnode-id="1285" instrument_node="">
</span><li data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Lamb</span></li><span data-dcnode-id="1282" instrument_node="">
</span></ul><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Wainwrights use a small selection of high-quality meat and fish ingredients in its recipes compared to some other brands.</span></p><span data-dcnode-id="1277" instrument_node="">
</span><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">However, all of these are ideal inclusions in a dog or cat’s diet and can provide high-quality protein and fat to fuel growth, repair, and activity.</span></p><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Most of these ingredients are industry favorites and are used by hundreds of brands because of their low cost and easy availability.</span></p><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">However, while Wainwrights is typical for using ingredients like Chicken and Turkey, they are quite unusual because they do not use some of the other most common meat ingredients, such as Beef.</span></p><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Why they choose not to use these ingredients in their recipes is not known at this time, but it is notable.</span></p><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1263"><img alt="Roast Chicken" class="aligncenter wp-image-2786" data-dcnode-id="1264" height="430" sizes="(max-width: 650px) 100vw, 650px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" srcset="https://petfoodreviewer.com/wp-content/uploads/2018/02/roast-chicken-1024x678.jpeg 1024w, https://petfoodreviewer.com/wp-content/uploads/2018/02/roast-chicken-300x199.jpeg 300w, https://petfoodreviewer.com/wp-content/uploads/2018/02/roast-chicken-768x508.jpeg 768w, https://petfoodreviewer.com/wp-content/uploads/2018/02/roast-chicken.jpeg 1280w" width="650"></p><span data-dcnode-id="1262" instrument_node="">
</span><h3 data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">Other Notable Ingredients</span></h3><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1257" data-preserver-spaces="true"><span data-dcnode-id="1258" instrument_node="">Wainwrights use a few grain ingredients in their recipes, including&nbsp;</span></span><strong data-dcnode-id="1254"><span data-dcnode-id="1255" data-preserver-spaces="true"><span data-dcnode-id="1256" instrument_node="">Brown Rice</span></span></strong><span data-dcnode-id="1252" data-preserver-spaces="true"><span data-dcnode-id="1253" instrument_node="">&nbsp;and&nbsp;</span></span><strong data-dcnode-id="1249"><span data-dcnode-id="1250" data-preserver-spaces="true"><span data-dcnode-id="1251" instrument_node="">Barley</span></span></strong><span data-dcnode-id="1247" data-preserver-spaces="true"><span data-dcnode-id="1248" instrument_node="">. Grains can be extremely controversial additions to dog food recipes which is one of the reasons that grain-free food has seen so much growth.</span></span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1243" data-preserver-spaces="true"><span data-dcnode-id="1244" instrument_node="">While many dog owners refuse to buy dog food with grains, the&nbsp;</span></span><a class="editor-rtfLink" data-dcnode-id="1240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//petfoodreviewer.com/best-dog-foods-without-peas/" rel="noopener" target="_blank"><span data-dcnode-id="1241" data-preserver-spaces="true"><span data-dcnode-id="1242" instrument_node="">recent links between high levels of legumes in dog food and an increased rate of canine heart disease</span></span></a><span data-dcnode-id="1238" data-preserver-spaces="true"><span data-dcnode-id="1239" instrument_node="">&nbsp;has caused the popularity of grains to undergo some resurgence.</span></span></p><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1234" data-preserver-spaces="true"><span data-dcnode-id="1235" instrument_node="">Brown Rice is considered by many to be one of the best grain ingredients used in dog food as it can provide significant nutritional content outside of its carbohydrate portion such as fiber, vitamins, and minerals.</span></span></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1230" data-preserver-spaces="true"><span data-dcnode-id="1231" instrument_node="">If you are interested in learning more about Barley, you can check out our article&nbsp;</span></span><a class="editor-rtfLink" data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//petfoodreviewer.com/barley-in-dog-food/" rel="noopener" target="_blank"><span data-dcnode-id="1228" data-preserver-spaces="true"><span data-dcnode-id="1229" instrument_node="">Barley In Dog Food</span></span></a><span data-dcnode-id="1225" data-preserver-spaces="true"><span data-dcnode-id="1226" instrument_node="">, where we discuss the ingredient in much more depth.</span></span></p><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1221"><img alt="Mixed Rice Grains" class="aligncenter wp-image-45504" data-dcnode-id="1222" data-layzr="https://petfoodreviewer.b-cdn.net/wp-content/uploads/2019/03/mixed-rice-grains.jpg" data-layzr-srcset="https://petfoodreviewer.com/wp-content/uploads/2019/03/mixed-rice-grains.jpg 900w, https://petfoodreviewer.com/wp-content/uploads/2019/03/mixed-rice-grains-300x169.jpg 300w, https://petfoodreviewer.com/wp-content/uploads/2019/03/mixed-rice-grains-768x432.jpg 768w" height="365" sizes="(max-width: 650px) 100vw, 650px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="650"></p><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1219" instrument_node="">Sadly, some Wainwrights recipes make use of vegetable by-products such as </span><strong data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Pea Protein</span></strong><span data-dcnode-id="1216" instrument_node=""> and </span><strong data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Potato Protein</span></strong><span data-dcnode-id="1213" instrument_node="">.</span></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">These ingredients are not considered to be high-quality additions to pet food recipes and are often used to inflate the overall protein proportion in a dog food recipe without shelling out additional meat content.</span></p><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">While the protein found in these ingredients is still valuable, it is not as nutritionally complete as protein from animal sources.</span></p><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1200"><span data-dcnode-id="1204" instrument_node="">If you would like to learn more about the technique of inflating overall protein proportions or the use of vegetable by-products, we’d highly encourage you to read our article – </span><a data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//petfoodreviewer.com/ingredient-splitting-pet-food-exposed/"><span data-dcnode-id="1203" instrument_node="">Ingredient Splitting in Pet Food – Exposed</span></a><span data-dcnode-id="1201" instrument_node="">.</span></p><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1197"><img alt="Peas In A Pod" class="aligncenter wp-image-45807" data-dcnode-id="1198" data-layzr="https://petfoodreviewer.b-cdn.net/wp-content/uploads/2018/03/peas-in-pod.jpeg" data-layzr-srcset="https://petfoodreviewer.com/wp-content/uploads/2018/03/peas-in-pod.jpeg 900w, https://petfoodreviewer.com/wp-content/uploads/2018/03/peas-in-pod-300x203.jpeg 300w, https://petfoodreviewer.com/wp-content/uploads/2018/03/peas-in-pod-768x520.jpeg 768w" height="440" sizes="(max-width: 650px) 100vw, 650px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="650"></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1185"><strong data-dcnode-id="1193"><span data-dcnode-id="1194" data-preserver-spaces="true"><span data-dcnode-id="1195" instrument_node="">Sweet Potatoes</span></span></strong><span data-dcnode-id="1191" data-preserver-spaces="true"><span data-dcnode-id="1192" instrument_node="">&nbsp;and&nbsp;</span></span><strong data-dcnode-id="1188"><span data-dcnode-id="1189" data-preserver-spaces="true"><span data-dcnode-id="1190" instrument_node="">Potatoes</span></span></strong><span data-dcnode-id="1186" data-preserver-spaces="true"><span data-dcnode-id="1187" instrument_node="">&nbsp;are two starch ingredients that both feature in select Wainwrights recipes. Starch ingredients like these are incredibly dense sources of carbohydrates but also contain some other minor nutrition like fiber.</span></span></p><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1182" data-preserver-spaces="true"><span data-dcnode-id="1183" instrument_node="">Due to them being such a dense source of carbohydrates, it means that their portion size must be controlled to ensure that the overall proportion of carbohydrates is not overwhelming.</span></span></p><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1174"><strong data-dcnode-id="1177"><span data-dcnode-id="1178" data-preserver-spaces="true"><span data-dcnode-id="1179" instrument_node="">Alfalfa</span></span></strong><span data-dcnode-id="1175" data-preserver-spaces="true"><span data-dcnode-id="1176" instrument_node="">&nbsp;is another common addition to dog food that is relatively unknown by many dog owners. It is also known as lucerne in the UK and is added to recipes to provide minor nutrition like vitamins and minerals.</span></span></p><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1171" data-preserver-spaces="true"><span data-dcnode-id="1172" instrument_node="">As well as this nutritional content, some believe Alfalfa can provide other health benefits to dogs and cats, although this is far from proven.</span></span></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1161"><span data-dcnode-id="1167" data-preserver-spaces="true"><span data-dcnode-id="1168" instrument_node="">If you’d like to learn more about Alfalfa, we discuss the ingredient in more depth in our article&nbsp;</span></span><a class="editor-rtfLink" data-dcnode-id="1164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//petfoodreviewer.com/alfalfa-dog-food/" rel="noopener" target="_blank"><span data-dcnode-id="1165" data-preserver-spaces="true"><span data-dcnode-id="1166" instrument_node="">Alfalfa In Dog Food</span></span></a><span data-dcnode-id="1162" data-preserver-spaces="true"><span data-dcnode-id="1163" instrument_node="">.</span></span></p><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1158"><img alt="Alfalfa" class="aligncenter wp-image-7283" data-dcnode-id="1159" data-layzr="https://petfoodreviewer.b-cdn.net/wp-content/uploads/2018/11/alfalfa-1024x682.jpg" data-layzr-srcset="https://petfoodreviewer.com/wp-content/uploads/2018/11/alfalfa-1024x682.jpg 1024w, https://petfoodreviewer.com/wp-content/uploads/2018/11/alfalfa-300x200.jpg 300w, https://petfoodreviewer.com/wp-content/uploads/2018/11/alfalfa-768x512.jpg 768w, https://petfoodreviewer.com/wp-content/uploads/2018/11/alfalfa.jpg 1280w" height="433" sizes="(max-width: 650px) 100vw, 650px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="650"></p><span data-dcnode-id="1157" instrument_node="">
</span><p data-dcnode-id="1153"><strong data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Beet Pulp</span></strong><span data-dcnode-id="1154" instrument_node=""> is a feature of many dog food recipes, although most consumers do not realize this.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">It is added to these recipes to provide soluble fiber to dog food which can be critical to many dogs and ensures they keep regular digestion and stools.</span></p><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Beyond its fiber content, Beet Pulp provides very little nutrition (no protein or fat) and certainly does not contain sugar, despite what the name may suggest.</span></p><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1145" instrument_node="">You can learn more about Beet Pulp, including how its made, in our article </span><a data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//petfoodreviewer.com/dried-beet-pulp-in-dog-food/"><span data-dcnode-id="1144" instrument_node="">Dried Beet Pulp In Dog Food</span></a><span data-dcnode-id="1142" instrument_node="">.</span></p><span data-dcnode-id="1140" instrument_node="">
</span><h2 data-dcnode-id="1138" style="text-align: center;"><span data-dcnode-id="1139" instrument_node="">Wainwrights Animal Testing</span></h2><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">We have very limited information on whether Wainwrights participates in animal testing or feeding trials. Because of this, we can not be certain that they do not participate at this time.</span></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Many pet food brands, especially smaller ones, avoid disclosing information related to animal testing because of the fear of customer backlash.</span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">However, on the flip side, many experts in the space are concerned that some brands are not doing sufficient testing for their recipes, and they may not be suitable for long-term consumption.</span></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">We strongly believe that invasive or laboratory-style testing on animals is a cruel and outdated practice and one which we hope will see a significant decline or elimination.</span></p><span data-dcnode-id="1125" instrument_node="">
</span><h2 data-dcnode-id="1123" style="text-align: center;"><span data-dcnode-id="1124" instrument_node="">Wainwrights Recalls</span></h2><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1120" data-preserver-spaces="true"><span data-dcnode-id="1121" instrument_node="">Based on our research (</span></span><a class="editor-rtfLink" data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fda.gov/animal-veterinary/safety-health/recalls-withdrawals" rel="noopener" target="_blank"><span data-dcnode-id="1118" data-preserver-spaces="true"><span data-dcnode-id="1119" instrument_node="">FDA</span></span></a><span data-dcnode-id="1115" data-preserver-spaces="true"><span data-dcnode-id="1116" instrument_node="">,&nbsp;</span></span><a class="editor-rtfLink" data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.avma.org/News/Issues/recalls-alerts/Pages/pet-food-safety-recalls-alerts-fullyear.aspx" rel="noopener" target="_blank"><span data-dcnode-id="1113" data-preserver-spaces="true"><span data-dcnode-id="1114" instrument_node="">AVMA</span></span></a><span data-dcnode-id="1110" data-preserver-spaces="true"><span data-dcnode-id="1111" instrument_node="">,&nbsp;</span></span><a class="editor-rtfLink" data-dcnode-id="1107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dogfoodadvisor.com/dog-food-recalls/dog-food-recalls-by-brand/" rel="noopener" target="_blank"><span data-dcnode-id="1108" data-preserver-spaces="true"><span data-dcnode-id="1109" instrument_node="">DogFoodAdvisor</span></span></a><span data-dcnode-id="1105" data-preserver-spaces="true"><span data-dcnode-id="1106" instrument_node="">), Wainwrights has never issued any recalls within the UK for its products and is, therefore, a recall-free brand pet food brand.</span></span></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1101" data-preserver-spaces="true"><span data-dcnode-id="1102" instrument_node="">Given that Wainwrights is a longstanding pet food brand in the UK, having been launched in 2006, this is a positive indicator of its safety and quality procedures.</span></span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1097" data-preserver-spaces="true"><span data-dcnode-id="1098" instrument_node="">We strongly hope that Wainwrights can continue this recall-free record in the years to come by upholding its safety standards and continually improving its processes.</span></span></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" data-preserver-spaces="true"><span data-dcnode-id="1094" instrument_node="">Despite this recall-free record, we always recommend all pet owners are vigilant of any future recalls of any pet food brand to ensure their pet remains healthy and safe.</span></span></p><span data-dcnode-id="1091" instrument_node="">
</span><h2 data-dcnode-id="1089" style="text-align: center;"><span data-dcnode-id="1090" instrument_node="">Best of Wainwrights</span></h2><span data-dcnode-id="1088" instrument_node="">
</span><h3 data-dcnode-id="1086" style="text-align: center;"><span data-dcnode-id="1087" instrument_node="">Complete Grain Free Adult Dry Dog Food Turkey Review</span></h3><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1083"><img alt="Wainwrights Grain Free Adult Turkey" class="aligncenter size-full wp-image-52768" data-dcnode-id="1084" data-layzr="https://petfoodreviewer.b-cdn.net/wp-content/uploads/2020/10/wainwrights-grain-free-adult-turkey.jpg" data-layzr-srcset="https://petfoodreviewer.com/wp-content/uploads/2020/10/wainwrights-grain-free-adult-turkey.jpg 300w, https://petfoodreviewer.com/wp-content/uploads/2020/10/wainwrights-grain-free-adult-turkey-150x150.jpg 150w, https://petfoodreviewer.com/wp-content/uploads/2020/10/wainwrights-grain-free-adult-turkey-115x115.jpg 115w" height="300" sizes="(max-width: 300px) 100vw, 300px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="300"></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">While they utilize different meat and fish ingredients, Wainwright’s dry dog food recipes tend to be extremely similar in their use of plant-based ingredients, and the overall nutrition offered, and the above recipe is no different.</span></p><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">The recipe focuses on a single meat ingredient in Turkey, and it is an excellent choice for the job. Turkey is a staple of the pet food industry and can provide ample high-quality protein and fat to fuel a dog’s activity, growth, and maintenance.</span></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">The recipe then includes a portion of Sweet Potatoes and Potatoes as its core plant-based ingredients. These starch ingredients act as a dense source of carbohydrates and fiber, but thankfully the portion size used is reasonable.</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Lastly, the recipe also uses some other minor ingredients like Beet Pulp, Linseed, and Alfalfa. These minor ingredients are used by many pet food brands and can help boost the levels of fiber, as well as several beneficial vitamins and minerals.</span></p><span data-dcnode-id="1070" instrument_node="">
</span><h3 data-dcnode-id="1068" style="text-align: center;"><span data-dcnode-id="1069" instrument_node="">Complete Grain Free Adult Wet Dog Food Lamb And Vegetables Review</span></h3><span data-dcnode-id="1067" instrument_node="">
</span><p data-dcnode-id="1065"><img alt="Wainwrights Grain Free Adult Lamb And Vegetables Wet" class="aligncenter size-full wp-image-52770" data-dcnode-id="1066" data-layzr="https://petfoodreviewer.b-cdn.net/wp-content/uploads/2020/10/wainwrights-grain-free-adult-lamb-wet.jpg" data-layzr-srcset="https://petfoodreviewer.com/wp-content/uploads/2020/10/wainwrights-grain-free-adult-lamb-wet.jpg 300w, https://petfoodreviewer.com/wp-content/uploads/2020/10/wainwrights-grain-free-adult-lamb-wet-150x150.jpg 150w, https://petfoodreviewer.com/wp-content/uploads/2020/10/wainwrights-grain-free-adult-lamb-wet-115x115.jpg 115w" height="300" sizes="(max-width: 300px) 100vw, 300px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="300"></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Wet dog food is an excellent treat to provide to dogs who usually consume a diet of only dry dog food. The above Lamb-focused wet dog food recipe from Wainwrights could be an option if you wish to do this.</span></p><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">It contains 72% Lamb which is an impressive proportion and ensures that the recipe provides an excellent proportion of protein and fat, which is far above average when compared to most other wet dog food recipes.</span></p><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Lamb is often more flavorsome than some other meats used in dog food like Chicken and Turkey, which could make it extremely appealing and enticing.</span></p><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">The recipe then uses small portions of vegetable ingredients like Sweet Potatoes, Peas, and Carrots.</span></p><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">These plant-based ingredients are industry regulars and provide a modest proportion of carbohydrates as well as helping to hold the Lamb together in a consistent texture and appearance.</span></p><span data-dcnode-id="1049" instrument_node="">
</span><h3 data-dcnode-id="1047" style="text-align: center;"><span data-dcnode-id="1048" instrument_node="">Complete Grain Free Adult Dry Cat Food Salmon Review</span></h3><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1044"><img alt="Wainwrights Grain Free Adult Salmon Cat" class="aligncenter size-full wp-image-52773" data-dcnode-id="1045" data-layzr="https://petfoodreviewer.b-cdn.net/wp-content/uploads/2020/10/wainwrights-grain-free-adult-salmon-cat.jpg" data-layzr-srcset="https://petfoodreviewer.com/wp-content/uploads/2020/10/wainwrights-grain-free-adult-salmon-cat.jpg 300w, https://petfoodreviewer.com/wp-content/uploads/2020/10/wainwrights-grain-free-adult-salmon-cat-150x150.jpg 150w, https://petfoodreviewer.com/wp-content/uploads/2020/10/wainwrights-grain-free-adult-salmon-cat-115x115.jpg 115w" height="300" sizes="(max-width: 300px) 100vw, 300px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="300"></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">While there isn’t as much variety in Wainwright’s dry cat food range as their dry dog food range, there are some appealing recipes that should be considered.</span></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">The above recipe is one of these, and it uses Salmon as its core ingredient, with over 50% of the recipe being Salmon-based ingredients.</span></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">We are big fans of Salmon and its use in dog food recipes and believe it to be a high-quality fish ingredient. It is one of the best sources of the Omega 3 Fatty Acids, which many believe can provide several health benefits to cats, including an improvement in the condition of their fur.</span></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">The recipe then uses a mix of starch ingredients like Potatoes and Sweet Potato, which provide a modest portion of carbohydrates.</span></p><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">While this proportion of carbohydrates could be lower (to align with a cat’s natural obligate carnivore diet), it is not as large as many other comparable brands and should not be the cause of too much concern.</span></p><span data-dcnode-id="1028" instrument_node="">
</span><h3 data-dcnode-id="1026" style="text-align: center;"><span data-dcnode-id="1027" instrument_node="">Complete Adult Wet Cat Food Chicken And Tuna Mixed Review</span></h3><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1023"><img alt="Wainwrights Adult Chicken And Tuna Wet Cat Food" class="aligncenter size-full wp-image-52776" data-dcnode-id="1024" data-layzr="https://petfoodreviewer.b-cdn.net/wp-content/uploads/2020/10/wainwrights-adult-chicken-tuna-wet-cat.jpg" data-layzr-srcset="https://petfoodreviewer.com/wp-content/uploads/2020/10/wainwrights-adult-chicken-tuna-wet-cat.jpg 300w, https://petfoodreviewer.com/wp-content/uploads/2020/10/wainwrights-adult-chicken-tuna-wet-cat-150x150.jpg 150w, https://petfoodreviewer.com/wp-content/uploads/2020/10/wainwrights-adult-chicken-tuna-wet-cat-115x115.jpg 115w" height="300" sizes="(max-width: 300px) 100vw, 300px" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="300"></p><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">The above box from Wainwrights provides cats a mix of different wet recipes, including Chicken and Tuna recipes. This is extremely appealing to many cats as it provides them with much-needed variety in their diet as well as a consistent supply.</span></p><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">The recipes in this box have a reasonably large portion of their core ingredient present (Chicken or Tuna). This considerable portion ensures that the recipes contain an appropriate portion of protein and fat to align with cats’ obligate carnivore diet.</span></p><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">The recipes then use a tiny portion of select vegetable ingredients such as Peas and Carrots to provide carbohydrates and bind the food together in a consistent texture and shape.</span></p><span data-dcnode-id="1013" instrument_node="">

</span><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">I have used wainwrights for over 12 years completely trouble free. After lockdown when pets at home started to get stock back in I bought 3 bags of wainwrights working dog as I have 4 dogs. On opening it , it looked visibly different, smaller, different colour and lots of dust type crumb as if it had been crushed, so bad I had to sieve it. I used the first bag thought it was a 1 off , 2nd bag was the same, and my 4 dogs had upset stomachs, still didnt twig it was the food, I start the 3rd bag my dogs all have diarrhoea and the youngest  is passing blood, the vet asked had I changed their food? Then it clicked the food seemed different, I rang pets at home not interested, went in store not interested, emailed customer services , asking had they changed how they made it, was it a dodgy batch, I was asked for a receipt which after weeks I hadnt got then was basically told tough luck we cant do anything. Ive used pets at home for years and never complained, I am shocked they have no interest in food that is causing my dogs to be ill, I basically was treated like dirt and dismissed. I had spent over £100 on the food as I always do, sent photos, to be dismissed and told we cant do anything!</span></p><span data-dcnode-id="574" instrument_node="">

</span><p data-dcnode-id="509"><span data-dcnode-id="516" instrument_node="">I bought 2x 1.5kg bags of Wainwright’s grain free duck with vegetables from Pets at Home 8 days ago. I noticed straight away whilst decanting the new bag into a container that the kibble looked different – each piece was bigger, thinner and paler in colour.  The following day I fed my dog only the new kibble and he was very sick from early evening and through the night.</span><br data-dcnode-id="515"><span data-dcnode-id="514" instrument_node="">
Despite the change in appearance,  Pets at Home via Messenger told me that there’s been no recent change in ingredients (I didn’t clarify what they meant by recent)</span><br data-dcnode-id="513"><span data-dcnode-id="512" instrument_node="">
Anyway, needless to say I returned the new bags to the store. This has left me in quite a predicament, as my dog has a plethora of allergies meaning he needs to be on grain free and can only have duck, rabbit or pork. Thus vastly reducing the available options! Ive had to put him on a wet food (duck) until i can find something suitable,  but the sudden change has caused him to have diarrhoea. I will be recontacting PAH regarding the apparent change in ingredients/formula and will not be letting this go!</span><br data-dcnode-id="511"><span data-dcnode-id="510" instrument_node="">
There’s an online thread with many comments from dog owners saying their dogs became very unwell in recent months from Wainwright’s.</span></p><span data-dcnode-id="508" instrument_node="">
