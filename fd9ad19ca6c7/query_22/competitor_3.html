</span><figure aria-describedby="caption-attachment-163225" class="wp-caption aligncenter" data-dcnode-id="1695" id="attachment_163225" style="width: 668px"><img alt="Moldy Corn Containing Potential Aflatoxin" class="size-large wp-image-163225" data-dcnode-id="1698" height="375" sizes="(max-width: 668px) 100vw, 668px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dogfoodadvisor.com/wp-content/uploads/2020/10/Corn-with-Mold-and-Mold-Toxins-668x375.jpg&amp;raw" srcset="https://www.dogfoodadvisor.com/wp-content/uploads/2020/10/Corn-with-Mold-and-Mold-Toxins-668x375.jpg 668w, https://www.dogfoodadvisor.com/wp-content/uploads/2020/10/Corn-with-Mold-and-Mold-Toxins-200x112.jpg 200w, https://www.dogfoodadvisor.com/wp-content/uploads/2020/10/Corn-with-Mold-and-Mold-Toxins-150x84.jpg 150w, https://www.dogfoodadvisor.com/wp-content/uploads/2020/10/Corn-with-Mold-and-Mold-Toxins-768x432.jpg 768w, https://www.dogfoodadvisor.com/wp-content/uploads/2020/10/Corn-with-Mold-and-Mold-Toxins-343x193.jpg 343w, https://www.dogfoodadvisor.com/wp-content/uploads/2020/10/Corn-with-Mold-and-Mold-Toxins-300x169.jpg 300w, https://www.dogfoodadvisor.com/wp-content/uploads/2020/10/Corn-with-Mold-and-Mold-Toxins-390x219.jpg 390w, https://www.dogfoodadvisor.com/wp-content/uploads/2020/10/Corn-with-Mold-and-Mold-Toxins.jpg 1000w" width="668"><figcaption class="wp-caption-text" data-dcnode-id="1696" id="caption-attachment-163225"><span data-dcnode-id="1697" instrument_node="">Moldy Corn Containing Aflatoxin</span></figcaption></figure><span data-dcnode-id="1694" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1693" instrument_node="">October 8, 2020 — Sunshine Mills, Inc. is </span><a data-dcnode-id="1691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fda.gov/safety/recalls-market-withdrawals-safety-alerts/sunshine-mills-inc-expands-previously-announced-voluntary-recall-certain-pet-food-products-due" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1692" instrument_node="">expanding its recall</span></a><span data-dcnode-id="1690" instrument_node=""> of </span><strong data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">15 brands</span></strong><span data-dcnode-id="1687" instrument_node=""> of pet food that were made with corn that contained </span><strong data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">high levels</span></strong><span data-dcnode-id="1684" instrument_node=""> of </span><strong data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">aflatoxin</span></strong><span data-dcnode-id="1681" instrument_node="">.</span></p><span data-dcnode-id="1679" instrument_node="">
</span><h2 data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">What’s Recalled?</span></h2><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1675" instrument_node="">The following brands and products are </span><strong data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">affected by this recall</span></strong><span data-dcnode-id="1672" instrument_node="">:</span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1668"><img alt="Sunshine Mills Dog Food Recall Expands" class="aligncenter size-full wp-image-163214" data-dcnode-id="1669" height="2164" loading="lazy" sizes="(max-width: 1083px) 100vw, 1083px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dogfoodadvisor.com/wp-content/uploads/2020/10/Sunshine-Mills-Dog-Food-Recall-Expands.jpg&amp;raw" srcset="https://www.dogfoodadvisor.com/wp-content/uploads/2020/10/Sunshine-Mills-Dog-Food-Recall-Expands.jpg 1083w, https://www.dogfoodadvisor.com/wp-content/uploads/2020/10/Sunshine-Mills-Dog-Food-Recall-Expands-200x400.jpg 200w, https://www.dogfoodadvisor.com/wp-content/uploads/2020/10/Sunshine-Mills-Dog-Food-Recall-Expands-400x800.jpg 400w, https://www.dogfoodadvisor.com/wp-content/uploads/2020/10/Sunshine-Mills-Dog-Food-Recall-Expands-150x300.jpg 150w, https://www.dogfoodadvisor.com/wp-content/uploads/2020/10/Sunshine-Mills-Dog-Food-Recall-Expands-768x1535.jpg 768w, https://www.dogfoodadvisor.com/wp-content/uploads/2020/10/Sunshine-Mills-Dog-Food-Recall-Expands-769x1536.jpg 769w, https://www.dogfoodadvisor.com/wp-content/uploads/2020/10/Sunshine-Mills-Dog-Food-Recall-Expands-1025x2048.jpg 1025w, https://www.dogfoodadvisor.com/wp-content/uploads/2020/10/Sunshine-Mills-Dog-Food-Recall-Expands-250x500.jpg 250w, https://www.dogfoodadvisor.com/wp-content/uploads/2020/10/Sunshine-Mills-Dog-Food-Recall-Expands-300x599.jpg 300w, https://www.dogfoodadvisor.com/wp-content/uploads/2020/10/Sunshine-Mills-Dog-Food-Recall-Expands-390x779.jpg 390w" width="1083"></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1661"><span class="highlight" data-dcnode-id="1662"><span data-dcnode-id="1666" instrument_node="">The </span><strong data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">lot codes</span></strong><span data-dcnode-id="1663" instrument_node=""> can be located on the back of each bag.</span></span></p><span data-dcnode-id="1660" instrument_node="">
</span><h2 data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">About the Expanded Recall</span></h2><span data-dcnode-id="1657" instrument_node="">
</span><p data-dcnode-id="1646"><span data-dcnode-id="1656" instrument_node="">This is an expansion of the </span><a data-dcnode-id="1654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dogfoodadvisor.com/dog-food-recall/sunshine-mills/"><span data-dcnode-id="1655" instrument_node="">recall initiated September 2, 2020</span></a><span data-dcnode-id="1653" instrument_node="">, after an investigation along with the U.S. Food and Drug Administration determined that additional </span><strong data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">corn-based</span></strong><span data-dcnode-id="1650" instrument_node=""> pet foods produced between April 3 and April 5, 2020 may contain corn from a single load of corn with </span><strong data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">elevated levels of aflatoxin</span></strong><span data-dcnode-id="1647" instrument_node="">. </span></p><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">No illnesses have been reported in association with these products to date, and no other Sunshine Mills, Inc. pet food products are affected by this announcement.</span></p><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Sunshine Mills, Inc. has chosen to expand its voluntary recall to include these additional products as a precautionary measure in furtherance of its commitment to the safety and quality of its products.</span></p><span data-dcnode-id="1639" instrument_node="">
</span><h2 data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">About Aflatoxin</span></h2><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1631"><span data-dcnode-id="1635" instrument_node="">Aflatoxin is a naturally occurring mold by-product from the growth of Aspergillus flavus and can be </span><strong data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">harmful to pets</span></strong><span data-dcnode-id="1632" instrument_node=""> if consumed in significant quantities. </span></p><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">Pets with aflatoxin toxicity (aflatoxicosis) may show symptoms of illness including sluggishness or lethargy combined with a reluctance to eat, vomiting, yellowish tint to the eyes or gums, diarrhea, and in some cases, death. </span></p><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Pets experiencing any of these symptoms after consuming the recalled products should be seen by a veterinarian.</span></p><span data-dcnode-id="1624" instrument_node="">
</span><h2 data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Where Were the Products Sold?</span></h2><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1620" instrument_node="">The affected brands were distributed in retail stores </span><strong data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">within the United States</span></strong><span data-dcnode-id="1617" instrument_node="">. </span></p><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Principle Super Premium Natural Dog Food is exported exclusively to a distributor in Japan. Sortsman’s Pride Maintenance Adult Formula Dog Food is also exported to a distributor in Japan and Colombia. </span></p><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">Retailers who received the recalled lots have been contacted and asked to pull any remaining inventory of these lots from their shelves. </span></p><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">There are no other Champ®, Field Trial®, Good Dog, Hunter’s Special®, Old Glory®, Paws Happy Life®, Pet Expert, Principle, Retriever®, River Bend, Sportsman’s Pride®, Sprout®, Thrifty®, Top Runner® or Whiskers &amp; Tails products or other lot codes of these products affected by this voluntary recall. </span></p><span data-dcnode-id="1606" instrument_node="">
</span><h2 data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">What to Do?</span></h2><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1602" instrument_node="">Consumers who have purchased the recalled products should </span><strong data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">discontinue use</span></strong><span data-dcnode-id="1599" instrument_node=""> of the product and may </span><strong data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">return</span></strong><span data-dcnode-id="1596" instrument_node=""> the unused portion to the place of purchase for a </span><strong data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">full refund</span></strong><span data-dcnode-id="1593" instrument_node="">. </span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Consumers may contact Sunshine Mills, Inc. customer service at (800) 705-2111 from 7AM to 4PM Central Time, Monday through Friday.</span></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1584"><span data-dcnode-id="1587" instrument_node="">Or by email at </span><span data-dcnode-id="1586" instrument_node="">customer.service@sunshinemills.com</span><span data-dcnode-id="1585" instrument_node=""> for additional information.</span></p><span data-dcnode-id="1583" instrument_node="">
</span><p data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">The expansion of this voluntary recall is being conducted with the knowledge of the U.S. Food and Drug Administration.</span></p><span data-dcnode-id="1580" instrument_node="">

</span><div data-dcnode-id="1098" id="postCompatContainer"><div class="comment__wrapper" data-dcnode-id="1417"><div class="comment__name clearfix" data-dcnode-id="1421"><img class="comment__avatar" data-dcnode-id="1426" height="32" src="https://c.disquscdn.com/uploads/users/10353/2122/avatar92.jpg?1647397569" width="32"/><strong data-dcnode-id="1423"><a data-dcnode-id="1424" href=""><span data-dcnode-id="1425" instrument_node="">Bobbie Irish</span></a></strong><span data-dcnode-id="1422" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1418"><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">My dogs will eat food with ground corn in it, and have zero problems.  But it's not something I want to see as #1-#4 on the ingredients!  And any and ALL allergies I've had (which have been few, thank goodness, the past 54 years!), have been corn related.  Take dog off food containing corn, within a week or so, they clear up.  It definitely is something ALL these companies should be keeping track of!  I don't know if any dogs died from food within this recall ,or actually got sick, or if they found it because they WERE monitoring the food!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1407"><div class="comment__name clearfix" data-dcnode-id="1411"><img class="comment__avatar" data-dcnode-id="1416" height="32" src="https://c.disquscdn.com/uploads/users/11670/563/avatar92.jpg?1640557364" width="32"/><strong data-dcnode-id="1413"><a data-dcnode-id="1414" href=""><span data-dcnode-id="1415" instrument_node="">Elizabeth A. Getting-Mullens</span></a></strong><span data-dcnode-id="1412" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1408"><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Never even heard of this junk. Feed your dog quality food. Do your research!! Dogs dont eat corn! Its garbage! It's a filler crap like science diet will eventually kill your dog. Vets sell it for the kickback they get for putting it on the shelves! The crap in the food store 10 bucks for 30 pound bag I always feel sorry for that poor dog getting that crap. Many people dont even REALIZE that's why their dog has skin and allergy issues. If ya cant feed quality food dont own pets you dont eat garbage neither should they. The Wolf their ancestors did not eat corn!! And giving that garbage the dog is always hungry a better quality food like Annamaet expensive but worth it or Zigniture less expensive but still quality you can actually give little less of the food because their are no fillers. People do your research if you love your pets and care what they are eating.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1397"><div class="comment__name clearfix" data-dcnode-id="1401"><img class="comment__avatar" data-dcnode-id="1406" height="32" src="https://c.disquscdn.com/uploads/users/15967/9228/avatar92.jpg?1616713296" width="32"/><strong data-dcnode-id="1403"><a data-dcnode-id="1404" href=""><span data-dcnode-id="1405" instrument_node="">CoolSpring Labradors</span></a></strong><span data-dcnode-id="1402" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1398"><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Boy some people post some pretty mean $hit here. I am sure sunshine mills is petrified. No pun intended. Some owners buy what they can afford. You won't  have many Vets even ask their clients what is the dog or cat being fed. It all depends on the corn in the ingrediants panel. Mostly carbs or not. Food allergy, possible. Most allergies are protein related. Last time we had a China gluten ingrediant death sentence it was in some pretty significant brands. This particular mold is not uncommon and is regularly screened. In this case the source and testing failed miserably. Maybe these companies can lower their pricing across the board for premium foods to their distributors and thus lower the pricing for the consumer. Sell volume. Not maximizing profits. As an example, you buy from Chewy? This is Petsmart ...same company. Your shipping is rolled into the pricing. Meaning you are paying for shipping! The people that buy this particular food would switch to Pedigree as that's what they can afford. Sunshine Mills will need to test the ingredients before, after and then sample bags that are shelved for that purpose for possible future testing and any intervention.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1387"><div class="comment__name clearfix" data-dcnode-id="1391"><img class="comment__avatar" data-dcnode-id="1396" height="32" src="https://c.disquscdn.com/uploads/users/24649/8872/avatar92.jpg?1640501167" width="32"/><strong data-dcnode-id="1393"><a data-dcnode-id="1394" href=""><span data-dcnode-id="1395" instrument_node="">Jae Girl Sweet as Candy</span></a></strong><span data-dcnode-id="1392" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1388"><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">They certainly are but it goes to show what type of pet owners they are or could be, IF they even have pets!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1377"><div class="comment__name clearfix" data-dcnode-id="1381"><img class="comment__avatar" data-dcnode-id="1386" height="32" src="https://c.disquscdn.com/uploads/users/4658/2762/avatar92.jpg?1364315148" width="32"/><strong data-dcnode-id="1383"><a data-dcnode-id="1384" href=""><span data-dcnode-id="1385" instrument_node="">Sparkley12</span></a></strong><span data-dcnode-id="1382" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1378"><p data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Who even feeds this junk to their dogs? If they do then they probably shouldnt have a dog cause all it takes is a bit of researching the ingredients...whats even more sick is that irresponsible owners dont bother to read the ingredients and their pets suffer or die</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1367"><div class="comment__name clearfix" data-dcnode-id="1371"><img class="comment__avatar" data-dcnode-id="1376" height="32" src="https://c.disquscdn.com/uploads/users/11670/563/avatar92.jpg?1640557364" width="32"/><strong data-dcnode-id="1373"><a data-dcnode-id="1374" href=""><span data-dcnode-id="1375" instrument_node="">Elizabeth A. Getting-Mullens</span></a></strong><span data-dcnode-id="1372" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1368"><p data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Agree!!!  Dogs dont eat corn. Smh!! Buy a quality food for your pets!!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1357"><div class="comment__name clearfix" data-dcnode-id="1361"><img class="comment__avatar" data-dcnode-id="1366" height="32" src="https://c.disquscdn.com/uploads/users/24649/8872/avatar92.jpg?1640501167" width="32"/><strong data-dcnode-id="1363"><a data-dcnode-id="1364" href=""><span data-dcnode-id="1365" instrument_node="">Jae Girl Sweet as Candy</span></a></strong><span data-dcnode-id="1362" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1358"><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Do tell.  What is the best ingredients.  I don’t research pet foods and don’t buy expensive hyped up dog food because they say it’s best.  Every company has the same claim.  So, what should I be looking for for my 100 Lb Pitt that has never gotten sick from Pedigree dog food.  I tried blue buffalo...made him sick, Rachel rays dog food, for the rich and famous with small dogs or you will go broke trying to feed your big dog enough to fill it up.  Merrick Grain Free Texas Beef + Sweet Potato Recipe, very expensive for a 22 lb bag, which by the way, my dog can consume in two weeks.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1347"><div class="comment__name clearfix" data-dcnode-id="1351"><img class="comment__avatar" data-dcnode-id="1356" height="32" src="https://c.disquscdn.com/uploads/users/4658/2762/avatar92.jpg?1364315148" width="32"/><strong data-dcnode-id="1353"><a data-dcnode-id="1354" href=""><span data-dcnode-id="1355" instrument_node="">Sparkley12</span></a></strong><span data-dcnode-id="1352" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1348"><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">You just have to find a protein option that doesent make your dog sick....my dog pukes alot to...Ive tried those brand and because they have such a high protein and more then one protein it caused her upset stomach...there are many options for single proteins...fish, duck, turkey,rabbit and chicken(I only feed her cooked chicken) or maybe think abour going freeze dried raw and maybe you might want to think about adding a probiotic to your dogs diet as it helps with digestion...I use carna4 or get a plain probiotic yogurt...but what your feeding your dog now...pedigree? That isnt even recommended to feed to dogs!! And in the long run it could cause more damage in the long run as there is nothing in that crap but sprays and corn and cancer causing agents...I feed my dog a single protein stella and chewys raw coated duck with carna4 sprouted seeds a probiotic and she does well on it and so far hasnt barfed on it yet...one of my freinds gives her dogs farmina single protein with pumpkin(included in the dogfood) which is good for dogs stomachs...or canidae a single protein grain free which is not an expensive dogfood in the least</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1337"><div class="comment__name clearfix" data-dcnode-id="1341"><img class="comment__avatar" data-dcnode-id="1346" height="32" src="https://c.disquscdn.com/uploads/users/24649/8872/avatar92.jpg?1640501167" width="32"/><strong data-dcnode-id="1343"><a data-dcnode-id="1344" href=""><span data-dcnode-id="1345" instrument_node="">Jae Girl Sweet as Candy</span></a></strong><span data-dcnode-id="1342" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1338"><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">So far it works and he doesn’t get sick but I will Keep your suggestions under advisement as other options, if he does.  Thank you for the info.   Fed it to prior animals and non got sick or got cancer.  Keeping my fingers crossed. 🤞🏼</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1327"><div class="comment__name clearfix" data-dcnode-id="1331"><img class="comment__avatar" data-dcnode-id="1336" height="32" src="https://c.disquscdn.com/uploads/users/28046/198/avatar92.jpg?1604521368" width="32"/><strong data-dcnode-id="1333"><a data-dcnode-id="1334" href=""><span data-dcnode-id="1335" instrument_node="">Rebecca Cleopatra Bennett</span></a></strong><span data-dcnode-id="1332" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1328"><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">My daughter had two Rottweiler's die a painful death resulting investigations found tumors in the throat caused from "consumption of dog food -Pedigree" their whole life.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1315"><div class="comment__name clearfix" data-dcnode-id="1321"><img class="comment__avatar" data-dcnode-id="1326" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="1323"><a data-dcnode-id="1324" href=""><span data-dcnode-id="1325" instrument_node="">Milk Manson</span></a></strong><span data-dcnode-id="1322" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1316"><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Wait, are you saying a necropsy was performed and the results listed the cause of death as a certain brand of food?</span></p><p data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Do you know how insane that is?</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1305"><div class="comment__name clearfix" data-dcnode-id="1309"><img class="comment__avatar" data-dcnode-id="1314" height="32" src="https://c.disquscdn.com/uploads/users/28046/198/avatar92.jpg?1604521368" width="32"/><strong data-dcnode-id="1311"><a data-dcnode-id="1312" href=""><span data-dcnode-id="1313" instrument_node="">Rebecca Cleopatra Bennett</span></a></strong><span data-dcnode-id="1310" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1306"><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">They were able to point at Pedigree because that was the only brand he ate.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1295"><div class="comment__name clearfix" data-dcnode-id="1299"><img class="comment__avatar" data-dcnode-id="1304" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="1301"><a data-dcnode-id="1302" href=""><span data-dcnode-id="1303" instrument_node="">Milk Manson</span></a></strong><span data-dcnode-id="1300" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1296"><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">A vet wouldn't even say that if it were true.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1285"><div class="comment__name clearfix" data-dcnode-id="1289"><img class="comment__avatar" data-dcnode-id="1294" height="32" src="https://c.disquscdn.com/uploads/users/24649/8872/avatar92.jpg?1640501167" width="32"/><strong data-dcnode-id="1291"><a data-dcnode-id="1292" href=""><span data-dcnode-id="1293" instrument_node="">Jae Girl Sweet as Candy</span></a></strong><span data-dcnode-id="1290" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1286"><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">So sorry to hear that.  Wonder how the vet came up with pedigree causing tumors from eating Pedigree dog food.  I have given all my large dogs that brand and never had that problem.  I had a Cane Corso, close to 200 lbs. for over 15 years and he never displayed any problems nor does my Pitt bull...but the Pitt bull is still young.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1275"><div class="comment__name clearfix" data-dcnode-id="1279"><img class="comment__avatar" data-dcnode-id="1284" height="32" src="https://c.disquscdn.com/uploads/users/24064/1804/avatar92.jpg?1487306148" width="32"/><strong data-dcnode-id="1281"><a data-dcnode-id="1282" href=""><span data-dcnode-id="1283" instrument_node="">iluvmyshihtzu</span></a></strong><span data-dcnode-id="1280" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1276"><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Why buy dogfood with ANY corn in it? It’s dried &amp; ground as a filler. I read the ingredients on Rx Kidney Care canned food @ $50 case. It has Corn Syrup! When have you seen a wolf (our loves le pets’ ancestors) eating dried corn, corn syrup or ANY plant except a few berries? Wolves eat the whole carcass of its prey getting all the nutrients it needs. If dog food manufacturers would use all meat &amp; internal organs of an animal (healthy ones), there would be no need to add all the vitamins, supplements, additives, etc. Adding a few blueberries yourself &amp; assuming you use wet food, adding 1/4t psyllium husk powder for fiber is ALL that would be needed. I make our 2 small dogs’ food from human grade protein (90% +) &amp; veggies like carrots, green beans, etc. they LOVE, are low calorie but make them feel fuller if you’re watching calorie intake. BTW, Chickpeas are a  plant protein &amp; NOT a complete protein our canines need. Dog food manufacturers use chickpeas to raise the protein content on the label but combined animal &amp; plant protein. You don’t know how much you’re getting of each!  I fed my toy dog the homemade food I make &amp; her creatinine &amp; BUN were normal again. As vet recommended, I fed her Rx kidney Diet dog food &amp; labs were done again. Creatinine &amp; BUN were BETTER after eating homemade food than expensive gross, unnecessary ingredient Rx kidney diet food. It only takes a little research!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1265"><div class="comment__name clearfix" data-dcnode-id="1269"><img class="comment__avatar" data-dcnode-id="1274" height="32" src="https://c.disquscdn.com/uploads/users/10353/2122/avatar92.jpg?1647397569" width="32"/><strong data-dcnode-id="1271"><a data-dcnode-id="1272" href=""><span data-dcnode-id="1273" instrument_node="">Bobbie Irish</span></a></strong><span data-dcnode-id="1270" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1266"><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">I don't know about wolves.  But in fact, Coyotes and Fox will eat Corn!  They love corn on the cob, in the field, especially sweet corn, but also feed corn, before it gets into the hard kernel.  It is NOT their main food source, but they eat it!  I've seen them do so for years on my ranch!  We had 40 acres of feed corn this year, and 2 acres of sweet corn.  See coyote a couple times a month (different ones most likely) chowing on corn cobs!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1251"><div class="comment__name clearfix" data-dcnode-id="1259"><img class="comment__avatar" data-dcnode-id="1264" height="32" src="https://c.disquscdn.com/uploads/users/36052/9672/avatar92.jpg?1606855198" width="32"/><strong data-dcnode-id="1261"><a data-dcnode-id="1262" href=""><span data-dcnode-id="1263" instrument_node="">GemmaLeeJones</span></a></strong><span data-dcnode-id="1260" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1252"><p data-dcnode-id="1253"><span data-dcnode-id="1258" instrument_node="">Just an FYI - our house in CT has a huge cornfield behind it &amp; we have a huge population of CoyWolves - more than often seen over there from our picture window.  Whether or not theyre eating corn is debatable, bc the 1 fact of what they're eating, is the incredible amt of FIELD MICE that are there definitely eating the corn!  I've spied a few of the younger CoyWolves doing the classic jump &amp; pounce - whether they're playing with their field mice/food is beyond me... but there are an abundance of the little rodents up there, once their fields are harvested.  </span><br data-dcnode-id="1257"/><span data-dcnode-id="1256" instrument_node="">Just another take on what you may be actually seeing from afar...</span><br data-dcnode-id="1255"/><span data-dcnode-id="1254" instrument_node="">&amp; the CoyWolves in the East are far bigger than the Coyotes we have here in the west - so are capable if taking down the deer also over there...  BUT field mice, rabbits, raccons &amp; the like are far easier &amp; plentiful to snack on while they eat the corn, over expending the effort to take down a big white tail deer....</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1241"><div class="comment__name clearfix" data-dcnode-id="1245"><img class="comment__avatar" data-dcnode-id="1250" height="32" src="https://c.disquscdn.com/uploads/users/10353/2122/avatar92.jpg?1647397569" width="32"/><strong data-dcnode-id="1247"><a data-dcnode-id="1248" href=""><span data-dcnode-id="1249" instrument_node="">Bobbie Irish</span></a></strong><span data-dcnode-id="1246" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1242"><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Yeah. Right "CoyWolves".  And who bred those, as there are no real wolves anywhere near Connecticut? What some people come up with,  Is it YOUR cornfield behind your house?  What brand do you plant?  Is it feed corn, or silage corn?  Very sad somebody let captured Wolves loose in CT, so they could breed with Coyotes.  You should notify the authorities immediately, as this is very dangerous.  By the way, Wolves rarely eat mice unless they are starving.  They definitely prefer dogs and cats, and rabbits to mice.  Especially loose dogs!  Maybe your "CoyWolves" will get rid of the stray cat and dog problem in your area!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1231"><div class="comment__name clearfix" data-dcnode-id="1235"><img class="comment__avatar" data-dcnode-id="1240" height="32" src="https://c.disquscdn.com/uploads/users/5169/6107/avatar92.jpg?1650840434" width="32"/><strong data-dcnode-id="1237"><a data-dcnode-id="1238" href=""><span data-dcnode-id="1239" instrument_node="">aimee</span></a></strong><span data-dcnode-id="1236" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1232"><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Thanks for your first hand knowledge!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1221"><div class="comment__name clearfix" data-dcnode-id="1225"><img class="comment__avatar" data-dcnode-id="1230" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="1227"><a data-dcnode-id="1228" href=""><span data-dcnode-id="1229" instrument_node="">Milk Manson</span></a></strong><span data-dcnode-id="1226" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1222"><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">When have you seen a wolf, period?</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1211"><div class="comment__name clearfix" data-dcnode-id="1215"><img class="comment__avatar" data-dcnode-id="1220" height="32" src="https://c.disquscdn.com/uploads/users/36052/9672/avatar92.jpg?1606855198" width="32"/><strong data-dcnode-id="1217"><a data-dcnode-id="1218" href=""><span data-dcnode-id="1219" instrument_node="">GemmaLeeJones</span></a></strong><span data-dcnode-id="1216" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1212"><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Wolves were unfortunately just taken off the Endangered Species List, so there are plenty of them - esp in the West &amp; those spilling over into the Midwest, from that population &amp; even coming down frm Canada looking for new territory.  On the East Coast, Red wolves are making a comeback &amp; a huge population of Coyote/ Wolf hybrids down from Canada are taking over fast.  So there are a LOT of wolves &amp; wolf hybrids around... that doesn't include the wolf/dog hybrids many ppl unfortunately own or the ones very unfortunately released into the wild in those States that made them illegal to own.  I, myself, rescue &amp; own many of the latter - which irresponsible ppl get &amp; then learn they're too much to handle once they mature...   bc they're not just like owning a domestic dog</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1201"><div class="comment__name clearfix" data-dcnode-id="1205"><img class="comment__avatar" data-dcnode-id="1210" height="32" src="https://c.disquscdn.com/uploads/users/11670/563/avatar92.jpg?1640557364" width="32"/><strong data-dcnode-id="1207"><a data-dcnode-id="1208" href=""><span data-dcnode-id="1209" instrument_node="">Elizabeth A. Getting-Mullens</span></a></strong><span data-dcnode-id="1206" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1202"><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">That wasnt the point. I had a dog 50 percent Wolf btw.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1191"><div class="comment__name clearfix" data-dcnode-id="1195"><img class="comment__avatar" data-dcnode-id="1200" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="1197"><a data-dcnode-id="1198" href=""><span data-dcnode-id="1199" instrument_node="">Tumbleweed7</span></a></strong><span data-dcnode-id="1196" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1192"><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">I'd like to thank the publishers and contributors to "Dog Food Advisor" for this service.    Fortunately none of the brands mentioned in this advisory are sold in this area but other brands which are available locally have appeared in previous warnings.     It's nice to know that someone (other than manufacturers) is keeping an eye on pet food products.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1171"><div class="comment__name clearfix" data-dcnode-id="1185"><img class="comment__avatar" data-dcnode-id="1190" height="32" src="https://c.disquscdn.com/uploads/users/14/8119/avatar92.jpg?1649179849" width="32"/><strong data-dcnode-id="1187"><a data-dcnode-id="1188" href=""><span data-dcnode-id="1189" instrument_node="">Gail Gardner</span></a></strong><span data-dcnode-id="1186" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1172"><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Please read the ingredients before you buy dog food. Even if it weren't higher in aflatoxin than permitted, foods using corn products always have some aflatoxin in them.</span></p><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">This is because if some corn tests too high, they simply mix it with enough better corn to get just under the legal level.</span></p><p data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Also, do NOT buy Retriever Bites &amp; Bones even when it isn't recalled. The #1 ingredient is corn and it has 3 different dyes in it.</span></p><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">My neighbor bought it for their dog I take care of when they are on the road working. And it makes her throw up. I keep telling them to not buy this specific kind and they keep forgetting.</span></p><p data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Also, for anyone in deer country, note that "deer corn" is corn that has too much aflatoxin in it to sell as feed corn.</span></p><p data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">So if you put out "deer corn" you are poisoning your deer.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1161"><div class="comment__name clearfix" data-dcnode-id="1165"><img class="comment__avatar" data-dcnode-id="1170" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="1167"><a data-dcnode-id="1168" href=""><span data-dcnode-id="1169" instrument_node="">Webb Baker</span></a></strong><span data-dcnode-id="1166" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1162"><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">I'm grateful for Dog Food Advisor's watchful eyes and ears. I particularly enjoy the Featured Pages summaries. Thank you for keeping all our companions safe!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1151"><div class="comment__name clearfix" data-dcnode-id="1155"><img class="comment__avatar" data-dcnode-id="1160" height="32" src="https://c.disquscdn.com/uploads/users/24649/8872/avatar92.jpg?1640501167" width="32"/><strong data-dcnode-id="1157"><a data-dcnode-id="1158" href=""><span data-dcnode-id="1159" instrument_node="">Jae Girl Sweet as Candy</span></a></strong><span data-dcnode-id="1156" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1152"><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Yes, as am I.  Otherwise, who would connect some of these pet foods with pets allergies, or illnesses.  Usually, when the owner does detect the problem, it’s too late.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1139"><div class="comment__name clearfix" data-dcnode-id="1145"><img class="comment__avatar" data-dcnode-id="1150" height="32" src="https://c.disquscdn.com/uploads/users/6596/5426/avatar92.jpg?1624524559" width="32"/><strong data-dcnode-id="1147"><a data-dcnode-id="1148" href=""><span data-dcnode-id="1149" instrument_node="">a canadian</span></a></strong><span data-dcnode-id="1146" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1140"><p data-dcnode-id="1141"><span data-dcnode-id="1144" instrument_node="">why dont these manufactures use human grade for products.. ?? all abt $$ again..</span><br data-dcnode-id="1143"/><span data-dcnode-id="1142" instrument_node="">my doggy is vegan like me .. he is a 15 yr old JR healthy and vibrant. we walk a lot together.. my cats get some kibble from Evolution or Ami but mostly ''Evolution Diet Canned Vegan Cat Food''..they are 15 also ..i hope they all die of natural causes and not poisoned by some unscrupulous manufacturer..yes its more expensive but no vet bills....a little extra goes a long way.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1129"><div class="comment__name clearfix" data-dcnode-id="1133"><img class="comment__avatar" data-dcnode-id="1138" height="32" src="https://c.disquscdn.com/uploads/users/10112/5224/avatar92.jpg?1650113044" width="32"/><strong data-dcnode-id="1135"><a data-dcnode-id="1136" href=""><span data-dcnode-id="1137" instrument_node="">Monika Solomon</span></a></strong><span data-dcnode-id="1134" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1130"><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">DOGS ARE MEANT TO EAT MEAT!!!! Put yourself on whatever crazy diet you want but stop subjecting your dog to that BULLSPIT TORTURE!!!!!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1119"><div class="comment__name clearfix" data-dcnode-id="1123"><img class="comment__avatar" data-dcnode-id="1128" height="32" src="https://c.disquscdn.com/uploads/users/28960/6922/avatar92.jpg?1616545871" width="32"/><strong data-dcnode-id="1125"><a data-dcnode-id="1126" href=""><span data-dcnode-id="1127" instrument_node="">Margie Roe Kowalski</span></a></strong><span data-dcnode-id="1124" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1120"><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Dogs do eat veges to get all the nutrients they need. Not just meat.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1109"><div class="comment__name clearfix" data-dcnode-id="1113"><img class="comment__avatar" data-dcnode-id="1118" height="32" src="https://c.disquscdn.com/uploads/users/24649/8872/avatar92.jpg?1640501167" width="32"/><strong data-dcnode-id="1115"><a data-dcnode-id="1116" href=""><span data-dcnode-id="1117" instrument_node="">Jae Girl Sweet as Candy</span></a></strong><span data-dcnode-id="1114" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1110"><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Undomesticated animals are meat eaters.  They need the protein to keep them active so they can survive in the wild.  Domesticated animals eat a variety of foods and NOT just meat which, like humans, can be hard on the digestive system since they aren’t hunting for their survival.  Plus, I think you’re obnoxious!  Do your research before you call others out.  APPARENTLY, it has worked for his animals to survive that long.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1099"><div class="comment__name clearfix" data-dcnode-id="1103"><img class="comment__avatar" data-dcnode-id="1108" height="32" src="https://c.disquscdn.com/uploads/users/23129/4653/avatar92.jpg?1602351770" width="32"/><strong data-dcnode-id="1105"><a data-dcnode-id="1106" href=""><span data-dcnode-id="1107" instrument_node="">Francie Garneau</span></a></strong><span data-dcnode-id="1104" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1100"><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Dogs and cats are carnivores, plain and simple. Corn is a vegetable so your beasties may not be immune to some bacteria in their food. I live in the lettuce capital of the world, which is boarded by 2 mountain ranges. We grow a variety of veggies in our fertile valley and have had bacterial problems in our crops.  Why? Because of the wild animals living in the hills that sometimes think we planted all this food for them. I'm thankful that your babies are well and you are truly a pet lover to go what you believe in.</span></p></div></div></div><span data-dcnode-id="1097" instrument_node="">
