</span><p data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">Is this the secret behind this premium dog food brand’s growing success?</span></p><span data-dcnode-id="1794" instrument_node="">

</span><p data-dcnode-id="1759"><strong data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Why review Taste of the Wild?</span></strong></p><span data-dcnode-id="1758" instrument_node="">

et="https://www.dognutrition.com/wp-content/uploads/2018/04/taste-of-the-wild-dog-food-trending-since-inception-1024x298.jpg 1024w, https://www.dognutrition.com/wp-content/uploads/2018/04/taste-of-the-wild-dog-food-trending-since-inception-300x87.jpg 300w, https://www.dognutrition.com/wp-content/uploads/2018/04/taste-of-the-wild-dog-food-trending-since-inception-768x224.jpg 768w, https://www.dognutrition.com/wp-content/uploads/2018/04/taste-of-the-wild-dog-food-trending-since-inception-364x106.jpg 364w, https://www.dognutrition.com/wp-content/uploads/2018/04/taste-of-the-wild-dog-food-trending-since-inception-758x221.jpg 758w, https://www.dognutrition.com/wp-content/uploads/2018/04/taste-of-the-wild-dog-food-trending-since-inception-608x177.jpg 608w, https://www.dognutrition.com/wp-content/uploads/2018/04/taste-of-the-wild-dog-food-trending-since-inception-1152x336.jpg 1152w, https://www.dognutrition.com/wp-content/uploads/2018/04/taste-of-the-wild-dog-food-trending-since-inception-165x48.jpg 165w, https://www.dognutrition.com/wp-content/uploads/2018/04/taste-of-the-wild-dog-food-trending-since-inception-329x96.jpg 329w, https://www.dognutrition.com/wp-content/uploads/2018/04/taste-of-the-wild-dog-food-trending-since-inception.jpg 1153w" width="662"><p class="wp-caption-text" data-dcnode-id="1744" id="caption-attachment-3946"><span data-dcnode-id="1745" instrument_node="">Source: trends.google.com</span></p></div><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1738"><strong data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">Now</span></strong><span data-dcnode-id="1739" instrument_node="">: Anytime we see such an industry trend, we find it necessary to do exactly what our furry friends would, if they wanted to retrieve a toy or a bone . . . a little digging!</span></p><span data-dcnode-id="1737" instrument_node="">
</span><p data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">Only in our case it doesn’t just benefit us, but the entire dog loving community. So, let’s see what Taste of the Wild is all about.</span></p><span data-dcnode-id="1734" instrument_node="">
</span><h2 data-dcnode-id="1730" id="dog2"><span class="ez-toc-section" data-dcnode-id="1733" id="Examined-Taste-of-the-Wild"></span><span data-dcnode-id="1732" instrument_node="">Examined: Taste of the Wild</span><span class="ez-toc-section-end" data-dcnode-id="1731"></span></h2><span data-dcnode-id="1729" instrument_node="">
</span><hr data-dcnode-id="1728"><span data-dcnode-id="1727" instrument_node="">
</span><p data-dcnode-id="1722"><span data-dcnode-id="1726" instrument_node="">Whoever came up with the name for the company deserves all the credit in the world, because it’s catchy as it is relevant, in terms of their marketing strategy. </span><strong data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Which is:</span></strong><span data-dcnode-id="1723" instrument_node=""> No one knows what dogs should eat, better than nature; i.e. their own DNA.</span></p><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1717"><strong data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Packaging:</span></strong><span data-dcnode-id="1718" instrument_node=""> You can see it, and feel it, in their packaging. A bear catching salmon in a furious pacific stream, with wolves around watching. Or the wolves themselves eyeing a herd of buffalo, a fox watching two deer lock horns. This brand really does bring the wild sensation to your dogs food bowl.</span></p><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1712"><strong data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">So:</span></strong><span data-dcnode-id="1713" instrument_node=""> They took on the challenge of creating a dog food as nature intended, but did they succeed?</span></p><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1707"><strong data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Ahead:</span></strong><span data-dcnode-id="1708" instrument_node=""> We’ll review Taste of the Wild’s history, manufacturing practices, safety and quality controls, where and how it’s made, how it’s rated, recalls issued, and more.</span></p><span data-dcnode-id="1706" instrument_node="">
</span><h3 data-dcnode-id="1702" id="dog3"><span class="ez-toc-section" data-dcnode-id="1705" id="Is-Taste-of-the-Wild-Dog-Food-Safe"></span><span data-dcnode-id="1704" instrument_node="">Is Taste of the Wild Dog Food Safe?</span><span class="ez-toc-section-end" data-dcnode-id="1703"></span></h3><span data-dcnode-id="1701" instrument_node="">
</span></div><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Each of the formulas produced by this brand is designed by their nutritionists and veterinarians to fulfill specific nutritional needs for dogs; while adhering to stringent safety and quality standards.</span></p><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1693"><strong data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Things Taste of the Wild does to ensure quality and safety:</span></strong></p><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1687"><span data-dcnode-id="1691" instrument_node="">“</span><em data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Safety first. Quality always.</span></em><span data-dcnode-id="1688" instrument_node="">” This is the motto Taste of the Wild follows when making dog food. They are of the belief that you have high standards for the food your dog eats, and they in turn have equally as high standards for how it’s made.</span></p><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">In order to ensure the safety and quality of the kibbles that your dog ultimately ends up chewing, the company continuously monitors:</span></p><span data-dcnode-id="1683" instrument_node="">
</span><ul data-dcnode-id="1669"><span data-dcnode-id="1682" instrument_node="">
</span><li data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">ingredients used</span></li><span data-dcnode-id="1679" instrument_node="">
</span><li data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">production processes as a whole</span></li><span data-dcnode-id="1676" instrument_node="">
</span><li data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">production environment</span></li><span data-dcnode-id="1673" instrument_node="">
</span><li data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">and the finished products.</span></li><span data-dcnode-id="1670" instrument_node="">
</span></ul><span data-dcnode-id="1668" instrument_node="">
</span><p data-dcnode-id="1664"><strong data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">Resulting in:</span></strong><span data-dcnode-id="1665" instrument_node=""> The manufacturing company doing the following weekly/monthly safety and quality protocols:</span></p><span data-dcnode-id="1663" instrument_node="">
</span><ul data-dcnode-id="1646"><span data-dcnode-id="1662" instrument_node="">
</span><li data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">45,000+ monthly finished product nutritional tests</span></li><span data-dcnode-id="1659" instrument_node="">
</span><li data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">180 monthly oxidative stability tests on fats and oils</span></li><span data-dcnode-id="1656" instrument_node="">
</span><li data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">1,300+ weekly microbiological tests</span></li><span data-dcnode-id="1653" instrument_node="">
</span><li data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">6,000+ monthly ingredient nutritional tests</span></li><span data-dcnode-id="1650" instrument_node="">
</span><li data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">1,075 weekly mycotoxin tests</span></li><span data-dcnode-id="1647" instrument_node="">
</span></ul><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1632"><strong data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Bottom line on safety: </span></strong><span data-dcnode-id="1642" instrument_node="">Taste of the Wild is a safe dog food brand as far as we can tell from all the information available to us. </span><strong data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Worth mentioning:</span></strong><span data-dcnode-id="1639" instrument_node=""> It was involved in a recall back in 2012 issued by it’s manufacturing company (D</span><em data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">iamond Pet Co.</span></em><span data-dcnode-id="1636" instrument_node="">) that you can read more about in our&nbsp;</span><a data-dcnode-id="1634" href="#recalls"><span data-dcnode-id="1635" instrument_node="">recalls section</span></a><span data-dcnode-id="1633" instrument_node=""> below.</span></p><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1627"><strong data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Rumors:</span></strong><span data-dcnode-id="1628" instrument_node=""> We’ve seen an uptick in complaints involving Taste of the Wild on the internet by dissatisfied consumers making various claims.</span></p><span data-dcnode-id="1626" instrument_node="">
</span><p data-dcnode-id="1622"><strong data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">But:</span></strong><span data-dcnode-id="1623" instrument_node=""> As far as we can tell, nothing has happened since 2012 to suggest that safety standards have been lowered. No recall has officially been announced by Taste of the Wild since. In fact, quite the opposite may be true, as the manufacturing company strengthened it’s commitment to food safety.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><div class="cctor_coupon_content cctor-coupon-content default cctor-clear" data-dcnode-id="1486"><span data-dcnode-id="1620" instrument_node="">

</span><p data-dcnode-id="1391"><strong data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">The short answer:</span></strong><span data-dcnode-id="1392" instrument_node=""> Taste of the Wild is manufactured utilizing global suppliers, as well as domestic.</span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1386"><strong data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Examples:</span></strong><span data-dcnode-id="1387" instrument_node=""> Potato protein from Germany, select nutrients from China, lamb from New Zealand, and chicory from Belgium.</span></p><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1381"><strong data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Why?</span></strong><span data-dcnode-id="1382" instrument_node=""> Because the global supply chain is complex, and most companies use global suppliers. Because sometimes, the highest quality ingredients come from global suppliers.</span></p><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1376"><strong data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Proprietary probiotics:</span></strong><span data-dcnode-id="1377" instrument_node=""> Probiotics are beneficial in maintaining digestive health and a healthy immune system; they do so by keeping bad bacteria at bay and maintaining a healthy balance.</span></p><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1367"><span data-dcnode-id="1374" instrument_node="">Each Taste of the Wild formulas is enhanced with their proprietary K9 Strain Probiotics which promises: </span><strong data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">species-specific strains, guranteed viability, and stringent purification</span></strong><span data-dcnode-id="1371" instrument_node=""> (</span><em data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">free of contamination</span></em><span data-dcnode-id="1368" instrument_node="">).</span></p><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1362"><strong data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Close relationships with trusted suppliers:</span></strong><span data-dcnode-id="1363" instrument_node="">&nbsp;Be they local or global, Taste of the Wild’s priority is to source the absolute best ingredients available. By forming close relationships with ingredient suppliers and vetting them via a stringent process, Taste of the Wild ensures quality in it’s ingredients.</span></p><span data-dcnode-id="1361" instrument_node="">

</span><p data-dcnode-id="1352"><strong data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">Sustainable and humane ingredients:</span></strong><span data-dcnode-id="1353" instrument_node=""> Taste of the Wild goes out of their way to ensure the ingredients they source are good for the environment and the animals were treated well.</span></p><span data-dcnode-id="1351" instrument_node="">

</span><p data-dcnode-id="861"><strong data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Recalls related to Taste of the Wild:</span></strong></p><span data-dcnode-id="860" instrument_node="">

</span><p data-dcnode-id="809"><strong data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Result of the 2012 recall:&nbsp;</span></strong><span data-dcnode-id="812" instrument_node="">The result of the above, which itself was part of a much bigger recall issued by the parent company&nbsp;Schell &amp; Kampeter Inc. doing business as Diamond Pet Foods, was a </span><strong data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">class action lawsuit.</span></strong></p><span data-dcnode-id="808" instrument_node="">

</span><p data-dcnode-id="797"><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Who was affected:</span></strong><span data-dcnode-id="798" instrument_node="">&nbsp;Customers who bought certain Diamond manufactured pet food products in 2011 and 2012. The claim form deadline ended on&nbsp;7/11/2014.</span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="784"><strong data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Allegations:</span></strong><span data-dcnode-id="793" instrument_node=""> The class action lawsuit alleged that the company “</span><em data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">manufactured and distributed certain pet food products that led to illness and death of some animals that consumed them.</span></em><span data-dcnode-id="790" instrument_node="">“</span><sup data-dcnode-id="785"><span data-dcnode-id="789" instrument_node="">[</span><a data-dcnode-id="787" href="#source6"><span data-dcnode-id="788" instrument_node="">6</span></a><span data-dcnode-id="786" instrument_node="">]</span></sup></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="779"><strong data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">The outcome:</span></strong><span data-dcnode-id="780" instrument_node=""> The class action was settled in 2014, with Diamond Pet Food providing monetary compensation to owners of animals who fell ill or died as a result of the contamination.</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="774"><strong data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Worth mentioning:</span></strong><span data-dcnode-id="775" instrument_node=""> No recalls since 2012 have involved Taste of the Wild, and there is nothing that scientifically suggests that one recall in the past will lead to another in the future. Recalls happen, especially when a company becomes as colossal as Diamond Pet Foods. We can only hope that companies that experience them, end up gaining a priceless lesson as a result.</span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="769"><strong data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">So:</span></strong><span data-dcnode-id="770" instrument_node=""> From the track record Taste of the Wild has had since, we’re glad to see that this may be the case.</span></p><span data-dcnode-id="768" instrument_node="">
</span><h2 data-dcnode-id="764"><span class="ez-toc-section" data-dcnode-id="767" id="The-Bottom-Line"></span><span data-dcnode-id="766" instrument_node="">The Bottom Line</span><span class="ez-toc-section-end" data-dcnode-id="765"></span></h2><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><img alt="all dogs crave a taste of the wild poster" class="lazyload size-large wp-image-3961 aligncenter" data-dcnode-id="762" data-expand="600" data-sizes="(max-width: 662px) 100vw, 662px" data-src="https://dognutrition.com/wp-content/uploads/2018/04/all-dogs-crave-a-taste-of-the-wild-poster-1024x1024.jpg" data-srcset="https://www.dognutrition.com/wp-content/uploads/2018/04/all-dogs-crave-a-taste-of-the-wild-poster-1024x1024.jpg 1024w, https://www.dognutrition.com/wp-content/uploads/2018/04/all-dogs-crave-a-taste-of-the-wild-poster-150x150.jpg 150w, https://www.dognutrition.com/wp-content/uploads/2018/04/all-dogs-crave-a-taste-of-the-wild-poster-300x300.jpg 300w, https://www.dognutrition.com/wp-content/uploads/2018/04/all-dogs-crave-a-taste-of-the-wild-poster-768x768.jpg 768w, https://www.dognutrition.com/wp-content/uploads/2018/04/all-dogs-crave-a-taste-of-the-wild-poster-192x192.jpg 192w, https://www.dognutrition.com/wp-content/uploads/2018/04/all-dogs-crave-a-taste-of-the-wild-poster-384x384.jpg 384w, https://www.dognutrition.com/wp-content/uploads/2018/04/all-dogs-crave-a-taste-of-the-wild-poster-110x110.jpg 110w, https://www.dognutrition.com/wp-content/uploads/2018/04/all-dogs-crave-a-taste-of-the-wild-poster-220x220.jpg 220w, https://www.dognutrition.com/wp-content/uploads/2018/04/all-dogs-crave-a-taste-of-the-wild-poster-364x364.jpg 364w, https://www.dognutrition.com/wp-content/uploads/2018/04/all-dogs-crave-a-taste-of-the-wild-poster-758x758.jpg 758w, https://www.dognutrition.com/wp-content/uploads/2018/04/all-dogs-crave-a-taste-of-the-wild-poster-608x608.jpg 608w, https://www.dognutrition.com/wp-content/uploads/2018/04/all-dogs-crave-a-taste-of-the-wild-poster-1152x1152.jpg 1152w, https://www.dognutrition.com/wp-content/uploads/2018/04/all-dogs-crave-a-taste-of-the-wild-poster-48x48.jpg 48w, https://www.dognutrition.com/wp-content/uploads/2018/04/all-dogs-crave-a-taste-of-the-wild-poster-96x96.jpg 96w, https://www.dognutrition.com/wp-content/uploads/2018/04/all-dogs-crave-a-taste-of-the-wild-poster.jpg 1500w" height="662" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dognutrition.com/wp-content/plugins/media-ace/includes/lazy-load/images/blank.png&amp;raw" width="662"></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">From what we were able to gather in this brand review of Taste of the Wild, there is good reason behind the fact that they’re one of the fastest growing dog food brands. Such as the following.</span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="754"><strong data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Ingredients</span></strong></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Their grain-free product line is an excellent choice for caring dog owners looking to minimize possible allergens and fillers. Most of their ingredients are of high-quality, and though some are sourced globally, a good majority seems to come from the USA land. The unique choice of rare protein sources may be a gift from the doggy heavens for dogs allergic to common protein sources.</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="747"><b data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Diversity</span></b></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Taste of the Wild offers a diverse line of formulas, suited for all types of dogs, including:</span></p><span data-dcnode-id="743" instrument_node="">
</span><ul data-dcnode-id="708"><span data-dcnode-id="742" instrument_node="">
</span><li data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">small breeds</span></li><span data-dcnode-id="739" instrument_node="">
</span><li data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">large breeds</span></li><span data-dcnode-id="736" instrument_node="">
</span><li data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">senior dogs</span></li><span data-dcnode-id="733" instrument_node="">
</span><li data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">puppies</span></li><span data-dcnode-id="730" instrument_node="">
</span><li data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">adolescents</span></li><span data-dcnode-id="727" instrument_node="">
</span><li data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">active dogs</span></li><span data-dcnode-id="724" instrument_node="">
</span><li data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">adult dogs</span></li><span data-dcnode-id="721" instrument_node="">
</span><li data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">pregnant or lactating dogs</span></li><span data-dcnode-id="718" instrument_node="">
</span><li data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">dogs with allergies</span></li><span data-dcnode-id="715" instrument_node="">
</span><li data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">athletic dogs</span></li><span data-dcnode-id="712" instrument_node="">
</span><li data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">working dogs</span></li><span data-dcnode-id="709" instrument_node="">
</span></ul><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="704"><strong data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Proper quality assurance protocols</span></strong></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="702" instrument_node="">We tend to be overly concerned, and curious, with compliance and safety measures the manufacturer behind the brand has in place. When it comes to Taste of the Wild we’re impressed by their stated “</span><em data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">safety first, quality always motto,</span></em><span data-dcnode-id="699" instrument_node="">” manifested in: </span><strong data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">commitment to food safety, on-site product testing, mycotoxin control, microbial testing, water &amp; air quality controls, test and hold program.</span></strong></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="692"><strong data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Philosophy behind the product</span></strong></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="690" instrument_node="">Premium pet food at an affordable price. The belief that every pet, no matter the household or shelter, deserves the best possible nutrition. Staying a private company and looking beyond the short-term quarterly-profit driven business model most public companies must adhere to.</span><sup data-dcnode-id="685"><span data-dcnode-id="689" instrument_node="">[</span><a data-dcnode-id="687" href="#source7"><span data-dcnode-id="688" instrument_node="">7</span></a><span data-dcnode-id="686" instrument_node="">]</span></sup></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="676"><strong data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">What we’d like to see: </span></strong><span data-dcnode-id="680" instrument_node="">The brand continue with it’s current philosophy when it comes to formulating quality dog food and not “</span><em data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">sell out</span></em><span data-dcnode-id="677" instrument_node="">” and stop caring about nurturing it’s well established long-term vendor partnerships; which enable them to source premium ingredients at an affordable price.</span></p><span data-dcnode-id="675" instrument_node="">
