</span><h3 data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Privacy Collection Statement</span></h3><span data-dcnode-id="487" instrument_node="">
</span><div data-dcnode-id="338"><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="481"><span data-dcnode-id="485" instrument_node="">At&nbsp;</span><span data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Global Retail Brands Australia Pty Ltd&nbsp;</span></span><span data-dcnode-id="482" instrument_node=""> ACN 006 348 205 your privacy is important to us. We are committed to protecting your privacy when managing your personal information. We have policies and procedures to ensure that all personal information is handled carefully and securely in accordance with the Australian Privacy Principles&nbsp;(APPs)&nbsp;contained in the Privacy Act 1988 (Cth).</span></p><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="477"><strong data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">1. Collection of information</span></strong></p><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">The type of personal information collected will be directly related to the specified purpose it has been collected for. How much of your personal information that you choose to disclose to us is completely up to you. However, failure to provide certain information may result in House being unable to provide you with the relevant product or service.</span></p><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">For example:</span></p><span data-dcnode-id="470" instrument_node="">
</span><ul data-dcnode-id="448"><span data-dcnode-id="469" instrument_node="">
</span><li data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">If you request products or services from us, we may collect information such as your name and contact details (ie billing and/or postal address, phone number(s) or email address), and/or credit card details.</span></li><span data-dcnode-id="466" instrument_node="">
</span><li data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">If you sign up to use a particular service such as our newsletter(s) and e-newslettters, mail outs (about product updates and developments, special events or promotions), loyalty or rewards program(s) or enter into a competition operated by us, we may collect information such as your date of birth and your interests and any other information required to provide that service to you (in addition to your name and contact details).</span></li><span data-dcnode-id="463" instrument_node="">
</span><li data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">If you participate in any surveys we, or a third party service provider acting on our behalf, may conduct from time to time on our website, personal information relating to your survey responses.</span></li><span data-dcnode-id="460" instrument_node="">
</span><li data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">If you make an inquiry, provide feedback or make a complaint to us, we may collect your name and contact details.</span></li><span data-dcnode-id="457" instrument_node="">
</span><li data-dcnode-id="453"><span data-dcnode-id="456" instrument_node="">If you are applying for employment with us, we may collect any information that is relevant to such employment including: </span><br data-dcnode-id="455"><span data-dcnode-id="454" instrument_node=""> &gt; your name and contact details (ie residential address, phone number(s) and/or email address)</span></li><span data-dcnode-id="452" instrument_node="">
</span><li data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">any other information relevant to the recruitment process (including any information contained in the application form and your resume).If you are applying to become a House franchisee, we may collect information such as your name, postal address, telephone number, email address, education details, residency status, employment history, financial capacity and other information relating to your qualifications and experience.</span></li><span data-dcnode-id="449" instrument_node="">
</span></ul><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">You acknowledge that the personal information we collect from you is your own information or information which you have been authorized to provide us.</span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="441"><strong data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">2. Use of information</span></strong></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Global Retail Brands Australia Pty Ltd&nbsp;</span></span><span data-dcnode-id="437" instrument_node="">will use the personal information you have chosen to provide us for the purpose for which you provided it or a related secondary purpose which you would reasonably expect.&nbsp;Global Retail Brands Australia Pty Ltd will not use it for any other purpose without your consent, unless permitted or required by law.</span></p><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Generally, we will use your personal information for the following purposes:</span></p><span data-dcnode-id="432" instrument_node="">
</span><ul data-dcnode-id="388"><span data-dcnode-id="431" instrument_node="">
</span><li data-dcnode-id="411"><span data-dcnode-id="430" instrument_node="">providing the products and/or services you have requested from House including for example:
</span><ul data-dcnode-id="413"><span data-dcnode-id="429" instrument_node="">
</span><li data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">&gt; to process sales transactions (whether in store or online);</span></li><span data-dcnode-id="426" instrument_node="">
</span><li data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">&gt; to deliver the products or services to you;</span></li><span data-dcnode-id="423" instrument_node="">
</span><li data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">&gt; to register you for a service requested by you, such as our newsletter(s) and e-newslettters, mail outs, rewards program(s) or competitions and administering such services;</span></li><span data-dcnode-id="420" instrument_node="">
</span><li data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">&gt; to manage warranty claims; and</span></li><span data-dcnode-id="417" instrument_node="">
</span><li data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">&gt; to respond to any inquiries, feedback or complaints made by you;</span></li><span data-dcnode-id="414" instrument_node="">

</span></li><span data-dcnode-id="410" instrument_node="">
</span><li data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">direct marketing of products and services which we believe may interest you, including product updates and developments, special events or promotions;</span></li><span data-dcnode-id="407" instrument_node="">
</span><li data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">assisting us to improve our products and services and making them more relevant to you;</span></li><span data-dcnode-id="404" instrument_node="">
</span><li data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">assisting us to improve our website(s) or Facebook page;</span></li><span data-dcnode-id="401" instrument_node="">

</span><p data-dcnode-id="375"><span data-dcnode-id="382" instrument_node="">There will be occasions where it will be necessary for&nbsp;</span><span data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Global Retail Brands Australia Pty Ltd&nbsp;</span></span><span data-dcnode-id="379" instrument_node=""> to disclose your personal information to third parties.&nbsp;</span><span data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Global Retail Brands Australia Pty Ltd&nbsp;</span></span><span data-dcnode-id="376" instrument_node="">may disclose your personal information to:</span></p><span data-dcnode-id="374" instrument_node="">
</span><ul data-dcnode-id="360"><span data-dcnode-id="373" instrument_node="">
</span><li data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">contractors and third party service providers on a confidential basis that we use in the ordinary course of our business to assist with the delivery of our products or services. This includes organisations such as marketing agencies, data processing companies, printing and mailing houses, delivery companies, data storage companies (which may use cloud computing storage systems which have the potential to make your personal information accessible by overseas entities) or finance agencies or debt collection agencies;</span></li><span data-dcnode-id="370" instrument_node="">
</span><li data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">other members of House’s corporate group for marketing purposes (subject to obtaining your prior consent);</span></li><span data-dcnode-id="367" instrument_node="">
</span><li data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">government authorities or other third parties as required by law; or</span></li><span data-dcnode-id="364" instrument_node="">
</span><li data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">any other purpose that you have consented to.</span></li><span data-dcnode-id="361" instrument_node="">
&nbsp;</span></ul><span data-dcnode-id="359" instrument_node="">
