</span><h2 data-dcnode-id="9157"><span class="mw-headline" data-dcnode-id="9165" id="Biography"><span data-dcnode-id="9166" instrument_node="">Biography</span></span><span class="mw-editsection" data-dcnode-id="9158"><span class="mw-editsection-bracket" data-dcnode-id="9163"><span data-dcnode-id="9164" instrument_node="">[</span></span><a data-dcnode-id="9161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRodney_Fox%26action%3Dedit%26section%3D1%26editintro%3DTemplate%3ABLP_editintro" title="Edit section: Biography"><span data-dcnode-id="9162" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9159"><span data-dcnode-id="9160" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9156" instrument_node="">
</span><p data-dcnode-id="9148"><span data-dcnode-id="9155" instrument_node="">Rodney Fox was born on 9 November 1940 in </span><a data-dcnode-id="9153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adelaide" title="Adelaide"><span data-dcnode-id="9154" instrument_node="">Adelaide</span></a><span data-dcnode-id="9152" instrument_node="">, </span><a data-dcnode-id="9150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Australia" title="South Australia"><span data-dcnode-id="9151" instrument_node="">South Australia</span></a><span data-dcnode-id="9149" instrument_node="">.
</span></p><span data-dcnode-id="9147" instrument_node="">
</span><h2 data-dcnode-id="9137"><span class="mw-headline" data-dcnode-id="9145" id="Shark_attack"><span data-dcnode-id="9146" instrument_node="">Shark attack</span></span><span class="mw-editsection" data-dcnode-id="9138"><span class="mw-editsection-bracket" data-dcnode-id="9143"><span data-dcnode-id="9144" instrument_node="">[</span></span><a data-dcnode-id="9141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRodney_Fox%26action%3Dedit%26section%3D2%26editintro%3DTemplate%3ABLP_editintro" title="Edit section: Shark attack"><span data-dcnode-id="9142" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9139"><span data-dcnode-id="9140" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9136" instrument_node="">
</span><p data-dcnode-id="9127"><span data-dcnode-id="9135" instrument_node="">On 8 December 1963, whilst participating in the 1963 South Australia Spearfishing Championship at </span><a data-dcnode-id="9133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aldinga_Beach%2C_South_Australia" title="Aldinga Beach, South Australia"><span data-dcnode-id="9134" instrument_node="">Aldinga Beach</span></a><span data-dcnode-id="9132" instrument_node="">, Fox was attacked by a great white shark, and badly bitten around the chest and arm. His story of the attack and escape has been published many times. He is regarded as a miracle survivor of one of the world's worst non-fatal shark attacks.</span><sup class="reference" data-dcnode-id="9129" id="cite_ref-4"><a data-dcnode-id="9130" href="#cite_note-4"><span data-dcnode-id="9131" instrument_node="">[4]</span></a></sup><span data-dcnode-id="9128" instrument_node="">
</span></p><p data-dcnode-id="9098"><span data-dcnode-id="9126" instrument_node="">In the attack, Fox's </span><a class="mw-redirect" data-dcnode-id="9124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_abdomen" title="Human abdomen"><span data-dcnode-id="9125" instrument_node="">abdomen</span></a><span data-dcnode-id="9123" instrument_node=""> was fully exposed and all his </span><a data-dcnode-id="9121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rib" title="Rib"><span data-dcnode-id="9122" instrument_node="">ribs</span></a><span data-dcnode-id="9120" instrument_node=""> were broken on his left hand side. His </span><a class="mw-redirect" data-dcnode-id="9118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diaphragm_%28anatomy%29" title="Diaphragm (anatomy)"><span data-dcnode-id="9119" instrument_node="">diaphragm</span></a><span data-dcnode-id="9117" instrument_node=""> was punctured, his </span><a data-dcnode-id="9115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lung" title="Lung"><span data-dcnode-id="9116" instrument_node="">lung</span></a><span data-dcnode-id="9114" instrument_node=""> was ripped open, his </span><a data-dcnode-id="9112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scapula" title="Scapula"><span data-dcnode-id="9113" instrument_node="">scapula</span></a><span data-dcnode-id="9111" instrument_node=""> was pierced, his </span><a data-dcnode-id="9109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spleen" title="Spleen"><span data-dcnode-id="9110" instrument_node="">spleen</span></a><span data-dcnode-id="9108" instrument_node=""> was uncovered, his </span><a data-dcnode-id="9106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aorta" title="Aorta"><span data-dcnode-id="9107" instrument_node="">artery</span></a><span data-dcnode-id="9105" instrument_node=""> was exposed, and he was minutes away from his </span><a data-dcnode-id="9103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vein" title="Vein"><span data-dcnode-id="9104" instrument_node="">veins</span></a><span data-dcnode-id="9102" instrument_node=""> collapsing due to the loss of large amounts of blood. The </span><a data-dcnode-id="9100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tendon" title="Tendon"><span data-dcnode-id="9101" instrument_node="">tendons</span></a><span data-dcnode-id="9099" instrument_node="">, fingers, and thumb in his right hand were all cut and to this day he has part of a shark tooth embedded in his wrist. His wounds required 462 stitches after the attack.
</span></p><span data-dcnode-id="9097" instrument_node="">
</span><h2 data-dcnode-id="9087"><span class="mw-headline" data-dcnode-id="9095" id="Later_life"><span data-dcnode-id="9096" instrument_node="">Later life</span></span><span class="mw-editsection" data-dcnode-id="9088"><span class="mw-editsection-bracket" data-dcnode-id="9093"><span data-dcnode-id="9094" instrument_node="">[</span></span><a data-dcnode-id="9091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRodney_Fox%26action%3Dedit%26section%3D3%26editintro%3DTemplate%3ABLP_editintro" title="Edit section: Later life"><span data-dcnode-id="9092" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9089"><span data-dcnode-id="9090" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9086" instrument_node="">
</span><p data-dcnode-id="9080"><span data-dcnode-id="9085" instrument_node="">Fox went on to design and build the first underwater observation cage to dive with the great white shark, and for over 40 years has led major expeditions to film and study his attacker.</span><sup class="reference" data-dcnode-id="9082" id="cite_ref-5"><a data-dcnode-id="9083" href="#cite_note-5"><span data-dcnode-id="9084" instrument_node="">[5]</span></a></sup><span data-dcnode-id="9081" instrument_node=""> He arranged and hosted the very first great white shark expedition to welcome sport divers, and has run hundreds of expeditions in the thirty years since.
</span></p><p data-dcnode-id="9063"><span data-dcnode-id="9079" instrument_node="">Fox is regarded as a world authority on the great white shark and has a great reputation as an expedition leader and producer of shark documentaries. He has been involved in some way with most great white shark films made in the 20th century. He has hosted expeditions for over 100 major feature and documentary films with film makers and shark researchers from 16 different countries. </span><a class="mw-redirect" data-dcnode-id="9077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walt_Disney_Motion_Pictures_Group" title="Walt Disney Motion Pictures Group"><span data-dcnode-id="9078" instrument_node="">Disney</span></a><span data-dcnode-id="9076" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="9074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_Studios" title="Universal Studios"><span data-dcnode-id="9075" instrument_node="">Universal</span></a><span data-dcnode-id="9073" instrument_node="">, </span><a data-dcnode-id="9071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/IMAX" title="IMAX"><span data-dcnode-id="9072" instrument_node="">IMAX</span></a><span data-dcnode-id="9070" instrument_node="">, </span><a data-dcnode-id="9068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacques_Cousteau" title="Jacques Cousteau"><span data-dcnode-id="9069" instrument_node="">Cousteau Society</span></a><span data-dcnode-id="9067" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="9065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Geographic_Channel" title="National Geographic Channel"><span data-dcnode-id="9066" instrument_node="">National Geographic</span></a><span data-dcnode-id="9064" instrument_node=""> have enlisted his help and have filmed and studied the great white shark from his cages.
</span></p><p data-dcnode-id="9058"><span data-dcnode-id="9062" instrument_node="">Fox's life since the attack has involved consulting and co-ordinating film crews and arranging and guiding </span><a data-dcnode-id="9060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecotourism" title="Ecotourism"><span data-dcnode-id="9061" instrument_node="">ecotourism</span></a><span data-dcnode-id="9059" instrument_node=""> adventure trips and expeditions specialising in great white sharks and other marine creatures. He also travels the world giving talks to people about his experiences with sharks and the need for conservation efforts to continue. His talks and films on the great white shark have educated swimmers and divers to the realistic potential of a shark attack. He delivers a firm message that "sharks are not all that bad, we have very few confrontations with them and we should look after all our fishes especially the great white". He positions it as an important "keystone predator" directly controlling the diversity and abundance of other species in the great web of life.
</span></p><p data-dcnode-id="9040"><span data-dcnode-id="9057" instrument_node="">Fox has a large private collection of displays and items from 40 years film making on the ocean which are on tour around Australia and the world. They feature great white shark models, </span><a class="mw-redirect" data-dcnode-id="9055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shark_proof_cage" title="Shark proof cage"><span data-dcnode-id="9056" instrument_node="">shark proof cages</span></a><span data-dcnode-id="9054" instrument_node=""> from the film </span><i data-dcnode-id="9051"><a data-dcnode-id="9052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jaws_%28film%29" title="Jaws (film)"><span data-dcnode-id="9053" instrument_node="">Jaws</span></a></i><span data-dcnode-id="9050" instrument_node=""> (which he was one of the consultants for along with </span><a data-dcnode-id="9048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ron_Taylor_%28diver%29" title="Ron Taylor (diver)"><span data-dcnode-id="9049" instrument_node="">Ron Taylor</span></a><span data-dcnode-id="9047" instrument_node=""> and </span><a data-dcnode-id="9045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Valerie_Taylor_%28diver%29" title="Valerie Taylor (diver)"><span data-dcnode-id="9046" instrument_node="">Valerie Taylor</span></a><span data-dcnode-id="9044" instrument_node="">), giant and ancient </span><a data-dcnode-id="9042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fossil" title="Fossil"><span data-dcnode-id="9043" instrument_node="">fossil</span></a><span data-dcnode-id="9041" instrument_node=""> shark teeth, plus photos and video highlights from many films that he has been involved in.
</span></p><p data-dcnode-id="9038"><span data-dcnode-id="9039" instrument_node="">Fox, along with his son, Andrew, after more than 40 years, still continue to run Rodney Fox Great White Shark Expeditions, a shark cage diving operation to view great white sharks in the wild off Southern Australia. This operation also acts as a platform for much needed further research of great white sharks as well as encouraging quality natural history documentaries on the species.
</span></p><p data-dcnode-id="9036"><span data-dcnode-id="9037" instrument_node="">Fox and Andrew, along with shark researcher Dr. Rachel Robbins, founded the Fox Shark Research Foundation (FSRF) which is devoted to the study and conservation of the great white shark.
</span></p><p data-dcnode-id="9034"><span data-dcnode-id="9035" instrument_node="">The great white shark is listed by the IUCN as a vulnerable species. The Fox Shark Research Foundation is endeavouring to expand our understanding of great white sharks, using the latest technologies and methods of research and working in collaboration with other scientific institutions.
</span></p><p data-dcnode-id="9032"><span data-dcnode-id="9033" instrument_node="">Fox currently strives to further raise public awareness of the plight of all shark species through his dive operation and research foundation, via publications, public speaking, and the films his operations facilitate. 
</span></p><p data-dcnode-id="9027"><span data-dcnode-id="9031" instrument_node="">In 2009, Fox was nominated for the 2010 </span><a data-dcnode-id="9029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indianapolis_Prize" title="Indianapolis Prize"><span data-dcnode-id="9030" instrument_node="">Indianapolis Prize</span></a><span data-dcnode-id="9028" instrument_node="">, the world's largest individual monetary award for animal species conservation.
</span></p><span data-dcnode-id="9026" instrument_node="">
