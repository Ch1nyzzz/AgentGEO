</span><p data-dcnode-id="8771"><i data-dcnode-id="8785"><b data-dcnode-id="8786"><span data-dcnode-id="8787" instrument_node="">AS-34</span></b></i><span data-dcnode-id="8784" instrument_node=""> is a Russian </span><a data-dcnode-id="8780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Priz-class_deep-submergence_rescue_vehicle" title="Priz-class deep-submergence rescue vehicle"><i data-dcnode-id="8782"><span data-dcnode-id="8783" instrument_node=""> Priz</span></i><span data-dcnode-id="8781" instrument_node="">-class</span></a><span data-dcnode-id="8779" instrument_node=""> </span><a data-dcnode-id="8777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deep-submergence_rescue_vehicle" title="Deep-submergence rescue vehicle"><span data-dcnode-id="8778" instrument_node="">deep-submergence rescue vehicle</span></a><span data-dcnode-id="8776" instrument_node="">, or rescue mini-submarine, which went into service in 1989.</span><sup class="reference" data-dcnode-id="8773" id="cite_ref-1"><a data-dcnode-id="8774" href="#cite_note-1"><span data-dcnode-id="8775" instrument_node="">[1]</span></a></sup><span data-dcnode-id="8772" instrument_node="">
</span></p><span data-dcnode-id="8770" instrument_node="">

</span><p data-dcnode-id="8743"><span data-dcnode-id="8758" instrument_node="">In 2000, </span><i data-dcnode-id="8756"><span data-dcnode-id="8757" instrument_node="">AS-34</span></i><span data-dcnode-id="8755" instrument_node=""> was stationed aboard the rescue ship </span><i data-dcnode-id="8752"><a class="new" data-dcnode-id="8753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRudnetsky%26action%3Dedit%26redlink%3D1" title="Rudnetsky (page does not exist)"><span data-dcnode-id="8754" instrument_node="">Rudnetsky</span></a></i><span data-dcnode-id="8751" instrument_node=""> and participated in operations to attempt a rescue of personnel from the sunken submarine </span><a class="mw-redirect" data-dcnode-id="8748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_submarine_K-141_Kursk" title="Russian submarine K-141 Kursk"><i data-dcnode-id="8749"><span data-dcnode-id="8750" instrument_node="">Kursk</span></i></a><span data-dcnode-id="8747" instrument_node="">. The submarine managed to reach </span><i data-dcnode-id="8745"><span data-dcnode-id="8746" instrument_node="">Kursk</span></i><span data-dcnode-id="8744" instrument_node=""> but was unable to establish a seal to fully dock on the ninth compartment and effect rescue.
