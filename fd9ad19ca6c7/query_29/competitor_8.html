</span><div class="thumb tright" data-dcnode-id="10368"><div class="thumbinner" data-dcnode-id="10369" style="width:222px;"><a class="image" data-dcnode-id="10377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25D0%259F%25D0%25BE%25D1%2580%25D1%2582%25D1%2580%25D0%25B5%25D1%2582_%25D0%2592._%25D0%259B%25D0%25B5%25D0%25BE%25D0%25BD%25D0%25BE%25D0%25B2%25D0%25B0.jpg"><img alt="" class="thumbimage" data-dcnode-id="10378" data-file-height="1500" data-file-width="1494" decoding="async" height="221" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b8/%25D0%259F%25D0%25BE%25D1%2580%25D1%2582%25D1%2580%25D0%25B5%25D1%2582_%25D0%2592._%25D0%259B%25D0%25B5%25D0%25BE%25D0%25BD%25D0%25BE%25D0%25B2%25D0%25B0.jpg/220px-%25D0%259F%25D0%25BE%25D1%2580%25D1%2582%25D1%2580%25D0%25B5%25D1%2582_%25D0%2592._%25D0%259B%25D0%25B5%25D0%25BE%25D0%25BD%25D0%25BE%25D0%25B2%25D0%25B0.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b8/%D0%9F%D0%BE%D1%80%D1%82%D1%80%D0%B5%D1%82_%D0%92._%D0%9B%D0%B5%D0%BE%D0%BD%D0%BE%D0%B2%D0%B0.jpg/330px-%D0%9F%D0%BE%D1%80%D1%82%D1%80%D0%B5%D1%82_%D0%92._%D0%9B%D0%B5%D0%BE%D0%BD%D0%BE%D0%B2%D0%B0.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b8/%D0%9F%D0%BE%D1%80%D1%82%D1%80%D0%B5%D1%82_%D0%92._%D0%9B%D0%B5%D0%BE%D0%BD%D0%BE%D0%B2%D0%B0.jpg/440px-%D0%9F%D0%BE%D1%80%D1%82%D1%80%D0%B5%D1%82_%D0%92._%D0%9B%D0%B5%D0%BE%D0%BD%D0%BE%D0%B2%D0%B0.jpg 2x" width="220"></a><span data-dcnode-id="10376" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="10370"><div class="magnify" data-dcnode-id="10374"><a class="internal" data-dcnode-id="10375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25D0%259F%25D0%25BE%25D1%2580%25D1%2582%25D1%2580%25D0%25B5%25D1%2582_%25D0%2592._%25D0%259B%25D0%25B5%25D0%25BE%25D0%25BD%25D0%25BE%25D0%25B2%25D0%25B0.jpg" title="Enlarge"></a></div><a data-dcnode-id="10372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Viktor_Leonov" title="Viktor Leonov"><span data-dcnode-id="10373" instrument_node="">Viktor Leonov</span></a><span data-dcnode-id="10371" instrument_node=""> helped lay the foundation of modern day naval operations for Soviet Union and Russia.</span></div></div></div><span data-dcnode-id="10367" instrument_node="">
</span><p data-dcnode-id="10361"><span data-dcnode-id="10366" instrument_node="">Soviet combat divers were quite successful during World War Two. They performed a variety of missions numbering well over 200 operations.</span><sup class="reference" data-dcnode-id="10363" id="cite_ref-Borovikov35_5-1"><a data-dcnode-id="10364" href="#cite_note-Borovikov35-5"><span data-dcnode-id="10365" instrument_node="">[5]</span></a></sup><span data-dcnode-id="10362" instrument_node=""> Some of the operations were:
</span></p><span data-dcnode-id="10360" instrument_node="">
</span><ul data-dcnode-id="10111"><li data-dcnode-id="10349"><span data-dcnode-id="10359" instrument_node="">1940–1941 Soviet female diver </span><a class="new" data-dcnode-id="10357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDina_Guseva%26action%3Dedit%26redlink%3D1" title="Dina Guseva (page does not exist)"><span data-dcnode-id="10358" instrument_node="">Dina Guseva</span></a><span data-dcnode-id="10356" instrument_node=""> performed rescue missions in the </span><a class="mw-redirect" data-dcnode-id="10354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Volga_river" title="Volga river"><span data-dcnode-id="10355" instrument_node="">Volga river</span></a><span data-dcnode-id="10353" instrument_node=""> near Bakalda.</span><sup class="reference" data-dcnode-id="10350" id="cite_ref-13"><a data-dcnode-id="10351" href="#cite_note-13"><span data-dcnode-id="10352" instrument_node="">[13]</span></a></sup></li><span data-dcnode-id="10348" instrument_node="">
</span><li data-dcnode-id="10334"><span data-dcnode-id="10347" instrument_node="">11 August 1941: RON (рота особого назначения, </span><i data-dcnode-id="10345"><span data-dcnode-id="10346" instrument_node="">Rota Osobogo Naznacheniya</span></i><span data-dcnode-id="10344" instrument_node="">; Company of Special Designation), a Soviet combat frogman unit, was set up on Goloday Island (which is now called </span><a data-dcnode-id="10342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dekabristov_Island" title="Dekabristov Island"><span data-dcnode-id="10343" instrument_node="">Dekabristov Island</span></a><span data-dcnode-id="10341" instrument_node="">), near Leningrad. Its commander was </span><a class="new" data-dcnode-id="10339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DIvan_Vasilyevich_Prokhvatilov%26action%3Dedit%26redlink%3D1" title="Ivan Vasilyevich Prokhvatilov (page does not exist)"><span data-dcnode-id="10340" instrument_node="">Ivan Vasilyevich Prokhvatilov</span></a><span data-dcnode-id="10338" instrument_node="">.</span><sup class="reference" data-dcnode-id="10335" id="cite_ref-14"><a data-dcnode-id="10336" href="#cite_note-14"><span data-dcnode-id="10337" instrument_node="">[14]</span></a></sup></li><span data-dcnode-id="10333" instrument_node="">
</span><li data-dcnode-id="10325"><span data-dcnode-id="10332" instrument_node="">August 1941: Two RON frogmen towing a sea mine, demolished a bridge over the river </span><a data-dcnode-id="10330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Narva" title="Narva"><span data-dcnode-id="10331" instrument_node="">Narva</span></a><span data-dcnode-id="10329" instrument_node=""> which German forces had reached.</span><sup class="reference" data-dcnode-id="10326" id="cite_ref-15"><a data-dcnode-id="10327" href="#cite_note-15"><span data-dcnode-id="10328" instrument_node="">[15]</span></a></sup></li><span data-dcnode-id="10324" instrument_node="">
</span><li data-dcnode-id="10316"><span data-dcnode-id="10323" instrument_node="">September 1941: During the Finnish army's invasion of the area around </span><a data-dcnode-id="10321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lake_Ladoga" title="Lake Ladoga"><span data-dcnode-id="10322" instrument_node="">Lake Ladoga</span></a><span data-dcnode-id="10320" instrument_node="">, Finnish forces took an island south of </span><a data-dcnode-id="10318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vyborg" title="Vyborg"><span data-dcnode-id="10319" instrument_node="">Vyborg</span></a><span data-dcnode-id="10317" instrument_node="">, isolating 23 Soviet units who were in Vyborg port. Two RON frogmen swam to the island, laying a guide cable as they went. 50 RON frogmen followed this cable, landed and found that the Finns had removed parts from their guns and abandoned the island, perhaps because they had seen the Soviet preparations.</span></li><span data-dcnode-id="10315" instrument_node="">
</span><li data-dcnode-id="10310"><span data-dcnode-id="10314" instrument_node="">In those early days RON made its own equipment, including adapting army breathing sets for underwater use; they did not use '</span><a data-dcnode-id="10312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Swimfin" title="Swimfin"><span data-dcnode-id="10313" instrument_node="">fins</span></a><span data-dcnode-id="10311" instrument_node="">' until the end of the 1950s.</span></li><span data-dcnode-id="10309" instrument_node="">
</span><li data-dcnode-id="10298"><span data-dcnode-id="10308" instrument_node="">23 September 1941: 270 German aircraft attacked the Soviet naval base at </span><a data-dcnode-id="10306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kronstadt" title="Kronstadt"><span data-dcnode-id="10307" instrument_node="">Kronstadt</span></a><span data-dcnode-id="10305" instrument_node=""> near Leningrad. The Soviet frogmen sank the transport vessel "</span><i data-dcnode-id="10303"><span data-dcnode-id="10304" instrument_node="">Barta</span></i><span data-dcnode-id="10302" instrument_node="">" opposite the </span><a data-dcnode-id="10300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petergof" title="Petergof"><span data-dcnode-id="10301" instrument_node="">Peterhof</span></a><span data-dcnode-id="10299" instrument_node="">. The ship sat on the seabed but remained partly out of the water.</span></li><span data-dcnode-id="10297" instrument_node="">
</span><li data-dcnode-id="10289"><span data-dcnode-id="10296" instrument_node="">September 1941: Prokhvatilov decided to use the "</span><i data-dcnode-id="10294"><span data-dcnode-id="10295" instrument_node="">Barta</span></i><span data-dcnode-id="10293" instrument_node="">" wreck as an observation post. They saw that the Germans had built a pier at </span><a class="new" data-dcnode-id="10291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStaraya_Peterhof%26action%3Dedit%26redlink%3D1" title="Staraya Peterhof (page does not exist)"><span data-dcnode-id="10292" instrument_node="">Staraya Peterhof</span></a><span data-dcnode-id="10290" instrument_node="">, and stacked piles of naval mines by it. RON frogmen towed two naval mines to the pier and destroyed it. The Germans did not rebuild it.</span></li><span data-dcnode-id="10288" instrument_node="">
</span><li data-dcnode-id="10286"><span data-dcnode-id="10287" instrument_node="">Early October 1941: start of frogman training in the Soviet Pacific Fleet.</span></li><span data-dcnode-id="10285" instrument_node="">
</span><li data-dcnode-id="10280"><span data-dcnode-id="10284" instrument_node="">1941–1943, winters: RON men patrol the supply road over the ice of frozen </span><a data-dcnode-id="10282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lake_Ladoga" title="Lake Ladoga"><span data-dcnode-id="10283" instrument_node="">Lake Ladoga</span></a><span data-dcnode-id="10281" instrument_node="">.</span></li><span data-dcnode-id="10279" instrument_node="">
</span><li data-dcnode-id="10263"><span data-dcnode-id="10278" instrument_node="">September 1941: Soviet frogmen conducted crossing operations at </span><a class="new" data-dcnode-id="10276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNevskaya_Dubrovka%26action%3Dedit%26redlink%3D1" title="Nevskaya Dubrovka (page does not exist)"><span data-dcnode-id="10277" instrument_node="">Nevskaya Dubrovka</span></a><span data-dcnode-id="10275" instrument_node="">.</span><sup class="reference" data-dcnode-id="10272" id="cite_ref-16"><a data-dcnode-id="10273" href="#cite_note-16"><span data-dcnode-id="10274" instrument_node="">[16]</span></a></sup><span data-dcnode-id="10271" instrument_node=""> These crossings involved equipment, weapons, ammunition, and food.</span><sup class="reference" data-dcnode-id="10268" id="cite_ref-Borovikov68_17-0"><a data-dcnode-id="10269" href="#cite_note-Borovikov68-17"><span data-dcnode-id="10270" instrument_node="">[17]</span></a></sup><span data-dcnode-id="10267" instrument_node=""> People crossed from the right bank to the bridgehead as well.</span><sup class="reference" data-dcnode-id="10264" id="cite_ref-Borovikov68_17-1"><a data-dcnode-id="10265" href="#cite_note-Borovikov68-17"><span data-dcnode-id="10266" instrument_node="">[17]</span></a></sup></li><span data-dcnode-id="10262" instrument_node="">
</span><li data-dcnode-id="10254"><span data-dcnode-id="10261" instrument_node="">August 1942: Nine Soviet divers conducted an operation unloading a large barge sunk by the Germans with 10,000 machine pistols on board in a little more than a week in the Volga river around </span><a data-dcnode-id="10259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Volgograd" title="Volgograd"><span data-dcnode-id="10260" instrument_node="">Stalingrad</span></a><span data-dcnode-id="10258" instrument_node="">.</span><sup class="reference" data-dcnode-id="10255" id="cite_ref-Borokivov74_18-0"><a data-dcnode-id="10256" href="#cite_note-Borokivov74-18"><span data-dcnode-id="10257" instrument_node="">[18]</span></a></sup></li><span data-dcnode-id="10253" instrument_node="">
</span><li data-dcnode-id="10241"><span data-dcnode-id="10252" instrument_node="">1942: Soviet frogmen clashed with German frogmen at a Tsemes Bay seaport at </span><a data-dcnode-id="10250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Novorossiysk" title="Novorossiysk"><span data-dcnode-id="10251" instrument_node="">Novorossiysk</span></a><span data-dcnode-id="10249" instrument_node="">.</span><sup class="reference" data-dcnode-id="10246" id="cite_ref-19"><a data-dcnode-id="10247" href="#cite_note-19"><span data-dcnode-id="10248" instrument_node="">[19]</span></a></sup><span data-dcnode-id="10245" instrument_node=""> The skirmish resulted in some knife battles underwater.</span><sup class="reference" data-dcnode-id="10242" id="cite_ref-20"><a data-dcnode-id="10243" href="#cite_note-20"><span data-dcnode-id="10244" instrument_node="">[20]</span></a></sup></li><span data-dcnode-id="10240" instrument_node="">
</span><li data-dcnode-id="10228"><span data-dcnode-id="10239" instrument_node="">1942: Approximately 37 Soviet frogmen destroyed a German military outpost on the western shore of the </span><a class="mw-redirect" data-dcnode-id="10237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Don_River_%28Russia%29" title="Don River (Russia)"><span data-dcnode-id="10238" instrument_node="">Don river</span></a><span data-dcnode-id="10236" instrument_node="">.</span><sup class="reference" data-dcnode-id="10233" id="cite_ref-Borovikov32_21-0"><a data-dcnode-id="10234" href="#cite_note-Borovikov32-21"><span data-dcnode-id="10235" instrument_node="">[21]</span></a></sup><span data-dcnode-id="10232" instrument_node=""> The outpost numbered as much as a reinforced platoon.</span><sup class="reference" data-dcnode-id="10229" id="cite_ref-Borovikov32_21-1"><a data-dcnode-id="10230" href="#cite_note-Borovikov32-21"><span data-dcnode-id="10231" instrument_node="">[21]</span></a></sup></li><span data-dcnode-id="10227" instrument_node="">
</span><li data-dcnode-id="10218"><span data-dcnode-id="10226" instrument_node="">August–September 1942: Soviet divers conducted operations to extract sunken materials from the bottom of the Don river.</span><sup class="reference" data-dcnode-id="10223" id="cite_ref-Borovikov80_22-0"><a data-dcnode-id="10224" href="#cite_note-Borovikov80-22"><span data-dcnode-id="10225" instrument_node="">[22]</span></a></sup><span data-dcnode-id="10222" instrument_node=""> Some of these materials included three half pontoon floats, several motor vehicles and their loads, twelve boxes of ammunition, and one vehicle with aircraft bombs.</span><sup class="reference" data-dcnode-id="10219" id="cite_ref-Borovikov80_22-1"><a data-dcnode-id="10220" href="#cite_note-Borovikov80-22"><span data-dcnode-id="10221" instrument_node="">[22]</span></a></sup></li><span data-dcnode-id="10217" instrument_node="">
</span><li data-dcnode-id="10209"><span data-dcnode-id="10216" instrument_node="">1943: During the liberation of </span><a data-dcnode-id="10214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taman_Peninsula" title="Taman Peninsula"><span data-dcnode-id="10215" instrument_node="">Taman</span></a><span data-dcnode-id="10213" instrument_node=""> Soviet frogmen conducted operations on the Crimean shore.</span><sup class="reference" data-dcnode-id="10210" id="cite_ref-Borovikov81_23-0"><a data-dcnode-id="10211" href="#cite_note-Borovikov81-23"><span data-dcnode-id="10212" instrument_node="">[23]</span></a></sup></li><span data-dcnode-id="10208" instrument_node="">
</span><li data-dcnode-id="10193"><span data-dcnode-id="10207" instrument_node="">1943: Soviet frogmen participated in landings at </span><a data-dcnode-id="10205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malaya_Zemlya" title="Malaya Zemlya"><span data-dcnode-id="10206" instrument_node="">Malaya Zemlya</span></a><span data-dcnode-id="10204" instrument_node=""> and at </span><a class="mw-redirect" data-dcnode-id="10202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Myskhako" title="Myskhako"><span data-dcnode-id="10203" instrument_node="">Myskhako</span></a><span data-dcnode-id="10201" instrument_node="">.</span><sup class="reference" data-dcnode-id="10198" id="cite_ref-Borovikov81_23-1"><a data-dcnode-id="10199" href="#cite_note-Borovikov81-23"><span data-dcnode-id="10200" instrument_node="">[23]</span></a></sup><span data-dcnode-id="10197" instrument_node=""> At Malaya Zemlya the frogmen constructed moorages for a tank crossing while under enemy machine gun fire and bombardment.</span><sup class="reference" data-dcnode-id="10194" id="cite_ref-Borovikov81_23-2"><a data-dcnode-id="10195" href="#cite_note-Borovikov81-23"><span data-dcnode-id="10196" instrument_node="">[23]</span></a></sup></li><span data-dcnode-id="10192" instrument_node="">
</span><li data-dcnode-id="10184"><span data-dcnode-id="10191" instrument_node="">1943: Soviet divers conducted operations constructing moorages for land craft at </span><a data-dcnode-id="10189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kerch_Bay" title="Kerch Bay"><span data-dcnode-id="10190" instrument_node="">Kerch Bay</span></a><span data-dcnode-id="10188" instrument_node=""> while under attack from enemy aircraft.</span><sup class="reference" data-dcnode-id="10185" id="cite_ref-Borovikov81_23-3"><a data-dcnode-id="10186" href="#cite_note-Borovikov81-23"><span data-dcnode-id="10187" instrument_node="">[23]</span></a></sup></li><span data-dcnode-id="10183" instrument_node="">
</span><li data-dcnode-id="10172"><span data-dcnode-id="10182" instrument_node="">1943: Soviet frogmen, led by Viktor Khokhlov, blew up a railroad bridge across the </span><a class="mw-redirect" data-dcnode-id="10180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dnieper_River" title="Dnieper River"><span data-dcnode-id="10181" instrument_node="">Dnieper River</span></a><span data-dcnode-id="10179" instrument_node=""> that the Germans were actively using to concentrate their forces toward the front line at the </span><a data-dcnode-id="10177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Kursk" title="Battle of Kursk"><span data-dcnode-id="10178" instrument_node="">Battle of Kursk</span></a><span data-dcnode-id="10176" instrument_node="">.</span><sup class="reference" data-dcnode-id="10173" id="cite_ref-24"><a data-dcnode-id="10174" href="#cite_note-24"><span data-dcnode-id="10175" instrument_node="">[24]</span></a></sup></li><span data-dcnode-id="10171" instrument_node="">
</span><li data-dcnode-id="10160"><span data-dcnode-id="10170" instrument_node="">September 1943: During the </span><a data-dcnode-id="10168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Siege_of_Leningrad" title="Siege of Leningrad"><span data-dcnode-id="10169" instrument_node="">siege of Leningrad</span></a><span data-dcnode-id="10167" instrument_node="">, a group of combat swimmers of a RON unit entered the German naval base at </span><a data-dcnode-id="10165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Strelna" title="Strelna"><span data-dcnode-id="10166" instrument_node="">Strelna</span></a><span data-dcnode-id="10164" instrument_node=""> and destroyed Italian combat boats of the </span><a data-dcnode-id="10162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decima_Flottiglia_MAS" title="Decima Flottiglia MAS"><span data-dcnode-id="10163" instrument_node="">Decima Flottiglia MAS</span></a><span data-dcnode-id="10161" instrument_node="">.</span></li><span data-dcnode-id="10159" instrument_node="">
</span><li data-dcnode-id="10148"><span data-dcnode-id="10158" instrument_node="">Soviet EPRON Diver K.D. Zolotovskiy claims his Soviet frogman team had underwater skirmishes with </span><a data-dcnode-id="10156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kommando_Spezialkr%25C3%25A4fte_Marine" title="Kommando Spezialkräfte Marine"><span data-dcnode-id="10157" instrument_node="">German frogmen</span></a><span data-dcnode-id="10155" instrument_node=""> in the </span><a class="mw-redirect" data-dcnode-id="10153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Svir_River" title="Svir River"><span data-dcnode-id="10154" instrument_node="">Svir river</span></a><span data-dcnode-id="10152" instrument_node="">.</span><sup class="reference" data-dcnode-id="10149" id="cite_ref-25"><a data-dcnode-id="10150" href="#cite_note-25"><span data-dcnode-id="10151" instrument_node="">[25]</span></a></sup></li><span data-dcnode-id="10147" instrument_node="">
</span><li data-dcnode-id="10145"><span data-dcnode-id="10146" instrument_node="">April 1944: ROON (a unit like RON), was formed in the Soviet Black Sea fleet.</span></li><span data-dcnode-id="10144" instrument_node="">
</span><li data-dcnode-id="10121"><span data-dcnode-id="10143" instrument_node="">July 1944: Combat swimmers of RON completed underwater work on board the German submarine </span><a class="mw-redirect" data-dcnode-id="10141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U-250" title="U-250"><span data-dcnode-id="10142" instrument_node="">U-250</span></a><span data-dcnode-id="10140" instrument_node="">, which had been sunk by the Soviet anti-submarine ship </span><i data-dcnode-id="10138"><span data-dcnode-id="10139" instrument_node="">MO-103</span></i><span data-dcnode-id="10137" instrument_node="">. Some secret documents and a new type of </span><a data-dcnode-id="10135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acoustic_torpedo" title="Acoustic torpedo"><span data-dcnode-id="10136" instrument_node="">acoustic torpedo</span></a><span data-dcnode-id="10134" instrument_node=""> were found. Some key components of this T-5 </span><a data-dcnode-id="10132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/G7es_torpedo" title="G7es torpedo"><span data-dcnode-id="10133" instrument_node="">G7es torpedo</span></a><span data-dcnode-id="10131" instrument_node=""> were subsequently given to British naval specialists by the Soviet forces. German aircraft and </span><a data-dcnode-id="10129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torpedo_boat" title="Torpedo boat"><span data-dcnode-id="10130" instrument_node="">torpedo boats</span></a><span data-dcnode-id="10128" instrument_node=""> tried to interrupt the diving operation. Negotiations between the Soviet and British sides over the T-5 acoustic torpedo are depicted in the book "The Way to Victory" written by Soviet admiral </span><a class="mw-redirect" data-dcnode-id="10126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/N.G._Kuznetsov" title="N.G. Kuznetsov"><span data-dcnode-id="10127" instrument_node="">N.G. Kuznetsov</span></a><span data-dcnode-id="10125" instrument_node="">.</span><sup class="reference" data-dcnode-id="10122" id="cite_ref-26"><a data-dcnode-id="10123" href="#cite_note-26"><span data-dcnode-id="10124" instrument_node="">[26]</span></a></sup></li><span data-dcnode-id="10120" instrument_node="">
</span><li data-dcnode-id="10112"><span data-dcnode-id="10119" instrument_node="">July 1944: Soviet frogmen conducted a commando landing on </span><a data-dcnode-id="10117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ruhnu" title="Ruhnu"><span data-dcnode-id="10118" instrument_node="">Rukhnu island</span></a><span data-dcnode-id="10116" instrument_node="">.</span><sup class="reference" data-dcnode-id="10113" id="cite_ref-Borovikov35_5-2"><a data-dcnode-id="10114" href="#cite_note-Borovikov35-5"><span data-dcnode-id="10115" instrument_node="">[5]</span></a></sup></li></ul><span data-dcnode-id="10110" instrument_node="">
</span><h3 data-dcnode-id="10100"><span class="mw-headline" data-dcnode-id="10108" id="Cold_War"><span data-dcnode-id="10109" instrument_node="">Cold War</span></span><span class="mw-editsection" data-dcnode-id="10101"><span class="mw-editsection-bracket" data-dcnode-id="10106"><span data-dcnode-id="10107" instrument_node="">[</span></span><a data-dcnode-id="10104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRussian_commando_frogmen%26action%3Dedit%26section%3D11" title="Edit section: Cold War"><span data-dcnode-id="10105" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="10102"><span data-dcnode-id="10103" instrument_node="">]</span></span></span></h3><span data-dcnode-id="10099" instrument_node="">
</span><ul data-dcnode-id="9946"><li data-dcnode-id="10097"><span data-dcnode-id="10098" instrument_node="">October 1945: RON and ROON and all similar organizations were officially disbanded.</span></li><span data-dcnode-id="10096" instrument_node="">
</span><li data-dcnode-id="10094"><span data-dcnode-id="10095" instrument_node="">July 1946 to the beginning of 1950; and 29 May 1952: discussions in the USSR about the need for combat frogmen.</span></li><span data-dcnode-id="10093" instrument_node="">
</span><li data-dcnode-id="10091"><span data-dcnode-id="10092" instrument_node="">24 January 1953: A conference in the USSR confirmed that combat frogmen were needed.</span></li><span data-dcnode-id="10090" instrument_node="">
</span><li data-dcnode-id="10085"><span data-dcnode-id="10089" instrument_node="">1953: The first naval combat divers' unit, the 6th OMRP, was established in the Black Sea fleet.</span><sup class="reference" data-dcnode-id="10086" id="cite_ref-shadowspear_2009_2-3"><a data-dcnode-id="10087" href="#cite_note-shadowspear_2009-2"><span data-dcnode-id="10088" instrument_node="">[2]</span></a></sup></li><span data-dcnode-id="10084" instrument_node="">
</span><li data-dcnode-id="10073"><span data-dcnode-id="10083" instrument_node="">1954: </span><a class="mw-redirect" data-dcnode-id="10081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scuba_diver" title="Scuba diver"><span data-dcnode-id="10082" instrument_node="">Scuba divers</span></a><span data-dcnode-id="10080" instrument_node="">' or frogmen's footprints were found on a beach near a </span><a data-dcnode-id="10078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sanatorium" title="Sanatorium"><span data-dcnode-id="10079" instrument_node="">sanatorium</span></a><span data-dcnode-id="10077" instrument_node=""> used by the Soviet state party elite. This caused a security alarm, motivating the USSR to form a combat frogman unit.</span><sup class="reference" data-dcnode-id="10074" id="cite_ref-shadowspear_2009_2-4"><a data-dcnode-id="10075" href="#cite_note-shadowspear_2009-2"><span data-dcnode-id="10076" instrument_node="">[2]</span></a></sup></li><span data-dcnode-id="10072" instrument_node="">
</span><li data-dcnode-id="10070"><span data-dcnode-id="10071" instrument_node="">15 October 1954: The naval combat divers' unit, the 561st OMRP, was established in the Baltic Sea.</span></li><span data-dcnode-id="10069" instrument_node="">
</span><li data-dcnode-id="10060"><span data-dcnode-id="10068" instrument_node="">April 1956: The </span><a data-dcnode-id="10066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lionel_Crabb" title="Lionel Crabb"><span data-dcnode-id="10067" instrument_node="">Lionel Crabb</span></a><span data-dcnode-id="10065" instrument_node=""> underwater spying incident and the Soviet warship </span><i data-dcnode-id="10062"><a class="mw-redirect" data-dcnode-id="10063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sverdlov_class_cruiser" title="Sverdlov class cruiser"><span data-dcnode-id="10064" instrument_node="">Ordzhonikidze</span></a></i><span data-dcnode-id="10061" instrument_node=""> caused a security alarm and pushed the USSR towards forming a combat frogman unit.</span></li><span data-dcnode-id="10059" instrument_node="">
</span><li data-dcnode-id="10051"><span data-dcnode-id="10058" instrument_node="">According to </span><a class="external text" data-dcnode-id="10056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.therebreathersite.nl/" rel="nofollow"><span data-dcnode-id="10057" instrument_node="">Jan Willem Bech's site</span></a><span data-dcnode-id="10055" instrument_node="">, Soviet oxygen rebreathers, whose manufacturing codes end in two digits, of-which the lowest such number is 51, (the IDA-51). The characteristic metal backpack-box (like the one the IDA-71 has), seems to be first definitely known is the LVI-57. The LVI-57 shown on Jan Willem Bech's site was made in 1964. Sometimes with Soviet products (as with the </span><a data-dcnode-id="10053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/AK-47" title="AK-47"><span data-dcnode-id="10054" instrument_node="">AK-47</span></a><span data-dcnode-id="10052" instrument_node=""> rifle) these numbers indicate when that make came into production, e.g. the IDA-71 in 1971.</span></li><span data-dcnode-id="10050" instrument_node="">
</span><li data-dcnode-id="10039"><span data-dcnode-id="10049" instrument_node="">June 1967: When the </span><a data-dcnode-id="10047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Six-Day_War" title="Six-Day War"><span data-dcnode-id="10048" instrument_node="">Six-Day War</span></a><span data-dcnode-id="10046" instrument_node=""> between Israel and Arab nations took place, some Soviet ships were in </span><a data-dcnode-id="10044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Port_Said" title="Port Said"><span data-dcnode-id="10045" instrument_node="">Port Said</span></a><span data-dcnode-id="10043" instrument_node="">. This showed naval commanders that their ships in the Eastern Mediterranean were well protected from air attack, but were not properly protected from frogman attacks. As a result, Soviet naval commanders decided to form the </span><a class="mw-redirect" data-dcnode-id="10041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PDSS" title="PDSS"><span data-dcnode-id="10042" instrument_node="">PDSS</span></a><span data-dcnode-id="10040" instrument_node="">.</span></li><span data-dcnode-id="10038" instrument_node="">
</span><li data-dcnode-id="10030"><span data-dcnode-id="10037" instrument_node="">1967: PDSS (Anti-diversionary forces and means), began development in the Soviet Black Sea Fleet. PDSS is a complex of special measures developed by the Soviet Navy to counter possible attacks by frogmen. PDSS includes specially trained units (teams) of the Soviet Navy, frogman and </span><a class="mw-redirect" data-dcnode-id="10035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-frogman_techniques" title="Anti-frogman techniques"><span data-dcnode-id="10036" instrument_node="">anti-frogman</span></a><span data-dcnode-id="10034" instrument_node=""> training and special weapons and tactics. According to some historians, Soviet Naval Commanders decided to form PDSS after the Lionel Crabb incident.</span><sup class="reference" data-dcnode-id="10031" id="cite_ref-shadowspear_2009_2-5"><a data-dcnode-id="10032" href="#cite_note-shadowspear_2009-2"><span data-dcnode-id="10033" instrument_node="">[2]</span></a></sup></li><span data-dcnode-id="10029" instrument_node="">
</span><li data-dcnode-id="10024"><span data-dcnode-id="10028" instrument_node="">1968: The 6th OMRP was transformed into the 17th Detached Brigade for Special Purposes.</span><sup class="reference" data-dcnode-id="10025" id="cite_ref-shadowspear_2009_2-6"><a data-dcnode-id="10026" href="#cite_note-shadowspear_2009-2"><span data-dcnode-id="10027" instrument_node="">[2]</span></a></sup></li><span data-dcnode-id="10023" instrument_node="">
</span><li data-dcnode-id="10018"><span data-dcnode-id="10022" instrument_node="">1969: PDSS Frogman units were formed in the Soviet Pacific, Baltic and Northern fleets.</span><sup class="reference" data-dcnode-id="10019" id="cite_ref-shadowspear_2009_2-7"><a data-dcnode-id="10020" href="#cite_note-shadowspear_2009-2"><span data-dcnode-id="10021" instrument_node="">[2]</span></a></sup></li><span data-dcnode-id="10017" instrument_node="">
</span><li data-dcnode-id="9997"><span data-dcnode-id="10016" instrument_node="">1970 and after: frogmen from the OB PDSS operated in </span><a data-dcnode-id="10014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angola" title="Angola"><span data-dcnode-id="10015" instrument_node="">Angola</span></a><span data-dcnode-id="10013" instrument_node="">, </span><a data-dcnode-id="10011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam" title="Vietnam"><span data-dcnode-id="10012" instrument_node="">Vietnam</span></a><span data-dcnode-id="10010" instrument_node="">, </span><a data-dcnode-id="10008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Egypt" title="Egypt"><span data-dcnode-id="10009" instrument_node="">Egypt</span></a><span data-dcnode-id="10007" instrument_node="">, </span><a data-dcnode-id="10005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mozambique" title="Mozambique"><span data-dcnode-id="10006" instrument_node="">Mozambique</span></a><span data-dcnode-id="10004" instrument_node="">, </span><a data-dcnode-id="10002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nicaragua" title="Nicaragua"><span data-dcnode-id="10003" instrument_node="">Nicaragua</span></a><span data-dcnode-id="10001" instrument_node="">, </span><a data-dcnode-id="9999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethiopia" title="Ethiopia"><span data-dcnode-id="10000" instrument_node="">Ethiopia</span></a><span data-dcnode-id="9998" instrument_node=""> and other places, often at the request of the nation that they operated in. They went to Angola and Nicaragua to protect Soviet ships and to consult local armed forces.</span></li><span data-dcnode-id="9996" instrument_node="">
</span><li data-dcnode-id="9988"><span data-dcnode-id="9995" instrument_node="">Soviet frogmen protected a USSR trade commission who were visiting a place on the coast of Africa. They saw, fought against and drove off a group of six or eight </span><a data-dcnode-id="9993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Africa" title="South Africa"><span data-dcnode-id="9994" instrument_node="">South Africa</span></a><span data-dcnode-id="9992" instrument_node=""> combat frogmen in an underwater battle. There were no deaths.</span><sup class="reference" data-dcnode-id="9989" id="cite_ref-shadowspear_2009_2-8"><a data-dcnode-id="9990" href="#cite_note-shadowspear_2009-2"><span data-dcnode-id="9991" instrument_node="">[2]</span></a></sup></li><span data-dcnode-id="9987" instrument_node="">
</span><li data-dcnode-id="9979"><span data-dcnode-id="9986" instrument_node="">Soviet frogmen killed some trained anti-frogman dolphins in an incident off </span><a data-dcnode-id="9984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nicaragua" title="Nicaragua"><span data-dcnode-id="9985" instrument_node="">Nicaragua</span></a><span data-dcnode-id="9983" instrument_node="">.</span><sup class="reference" data-dcnode-id="9980" id="cite_ref-shadowspear_2009_2-9"><a data-dcnode-id="9981" href="#cite_note-shadowspear_2009-2"><span data-dcnode-id="9982" instrument_node="">[2]</span></a></sup></li><span data-dcnode-id="9978" instrument_node="">
</span><li data-dcnode-id="9963"><span data-dcnode-id="9977" instrument_node="">1986–1987 Russian small boat teams attempted to steal U.S. guidance systems at the </span><a class="mw-redirect" data-dcnode-id="9975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kwajalein_Missile_Range" title="Kwajalein Missile Range"><span data-dcnode-id="9976" instrument_node="">Kwajalein Missile Range</span></a><span data-dcnode-id="9974" instrument_node="">.</span><sup class="reference" data-dcnode-id="9971" id="cite_ref-billywaugh.net_27-0"><a data-dcnode-id="9972" href="#cite_note-billywaugh.net-27"><span data-dcnode-id="9973" instrument_node="">[27]</span></a></sup><span data-dcnode-id="9970" instrument_node=""> CIA Operative </span><a data-dcnode-id="9968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Billy_Waugh" title="Billy Waugh"><span data-dcnode-id="9969" instrument_node="">Billy Waugh</span></a><span data-dcnode-id="9967" instrument_node=""> was assigned to investigate the situation.</span><sup class="reference" data-dcnode-id="9964" id="cite_ref-billywaugh.net_27-1"><a data-dcnode-id="9965" href="#cite_note-billywaugh.net-27"><span data-dcnode-id="9966" instrument_node="">[27]</span></a></sup></li><span data-dcnode-id="9962" instrument_node="">
</span><li data-dcnode-id="9950"><span data-dcnode-id="9961" instrument_node="">1989: </span><a data-dcnode-id="9959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Gorbachev" title="Mikhail Gorbachev"><span data-dcnode-id="9960" instrument_node="">Mikhail Gorbachev</span></a><span data-dcnode-id="9958" instrument_node=""> and </span><a data-dcnode-id="9956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_H._W._Bush" title="George H. W. Bush"><span data-dcnode-id="9957" instrument_node="">George H. W. Bush</span></a><span data-dcnode-id="9955" instrument_node=""> met on board the Soviet ship </span><i data-dcnode-id="9952"><a data-dcnode-id="9953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/TS_Maxim_Gorkiy" title="TS Maxim Gorkiy"><span data-dcnode-id="9954" instrument_node="">Maksim Gorkiy</span></a></i><span data-dcnode-id="9951" instrument_node=""> near the coast of Malta. For three days, frogmen from the Baltic Fleet, including Spetsnaz men from the 561 OMRP and Osnaz, protected the ship.</span></li><span data-dcnode-id="9949" instrument_node="">
</span><li data-dcnode-id="9947"><span data-dcnode-id="9948" instrument_node="">1990: The 17th OBrSpN was transformed into the 1464th OMRP.</span></li></ul><span data-dcnode-id="9945" instrument_node="">
</span><h3 data-dcnode-id="9935"><span class="mw-headline" data-dcnode-id="9943" id="Russian_Federation"><span data-dcnode-id="9944" instrument_node="">Russian Federation</span></span><span class="mw-editsection" data-dcnode-id="9936"><span class="mw-editsection-bracket" data-dcnode-id="9941"><span data-dcnode-id="9942" instrument_node="">[</span></span><a data-dcnode-id="9939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRussian_commando_frogmen%26action%3Dedit%26section%3D12" title="Edit section: Russian Federation"><span data-dcnode-id="9940" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9937"><span data-dcnode-id="9938" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9934" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9925"><div class="thumbinner" data-dcnode-id="9926" style="width:222px;"><a class="image" data-dcnode-id="9932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARussian_commando_frogman_from_a_special_detachment_for_combating_underwater_sabotage_forces_and_means_%28PDSS%29_of_the_Caspian_flotilla_during_exercises.jpg"><img alt="" class="thumbimage" data-dcnode-id="9933" data-file-height="390" data-file-width="550" decoding="async" height="156" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Russian_commando_frogman_from_a_special_detachment_for_combating_underwater_sabotage_forces_and_means_%2528PDSS%2529_of_the_Caspian_flotilla_during_exercises.jpg/220px-Russian_commando_frogman_from_a_special_detachment_for_combating_underwater_sabotage_forces_and_means_%2528PDSS%2529_of_the_Caspian_flotilla_during_exercises.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Russian_commando_frogman_from_a_special_detachment_for_combating_underwater_sabotage_forces_and_means_%28PDSS%29_of_the_Caspian_flotilla_during_exercises.jpg/330px-Russian_commando_frogman_from_a_special_detachment_for_combating_underwater_sabotage_forces_and_means_%28PDSS%29_of_the_Caspian_flotilla_during_exercises.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Russian_commando_frogman_from_a_special_detachment_for_combating_underwater_sabotage_forces_and_means_%28PDSS%29_of_the_Caspian_flotilla_during_exercises.jpg/440px-Russian_commando_frogman_from_a_special_detachment_for_combating_underwater_sabotage_forces_and_means_%28PDSS%29_of_the_Caspian_flotilla_during_exercises.jpg 2x" width="220"></a><span data-dcnode-id="9931" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9927"><div class="magnify" data-dcnode-id="9929"><a class="internal" data-dcnode-id="9930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARussian_commando_frogman_from_a_special_detachment_for_combating_underwater_sabotage_forces_and_means_%28PDSS%29_of_the_Caspian_flotilla_during_exercises.jpg" title="Enlarge"></a></div><span data-dcnode-id="9928" instrument_node="">Russian commando frogman from a special detachment for combating underwater sabotage forces and means (PDSS) of the Caspian flotilla during exercises</span></div></div></div><span data-dcnode-id="9924" instrument_node="">
</span><ul data-dcnode-id="9861"><li data-dcnode-id="9916"><span data-dcnode-id="9923" instrument_node="">January–May 1995: Several seamen, midshipmen, warrant officers and officers from different OMRPs took part in the </span><a data-dcnode-id="9921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Chechen_War" title="First Chechen War"><span data-dcnode-id="9922" instrument_node="">First Chechen War</span></a><span data-dcnode-id="9920" instrument_node=""> as volunteers. They were included in naval infantry units and operated as conventional </span><a class="mw-redirect" data-dcnode-id="9918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marines_%28military%29" title="Marines (military)"><span data-dcnode-id="9919" instrument_node="">marines</span></a><span data-dcnode-id="9917" instrument_node=""> in reconnaissance units, not as a separate Spetsnaz unit.</span></li><span data-dcnode-id="9915" instrument_node="">
</span><li data-dcnode-id="9898"><span data-dcnode-id="9914" instrument_node="">2004: The Russian state-controlled </span><a class="mw-redirect" data-dcnode-id="9912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Channel_One_%28Russia%29" title="Channel One (Russia)"><span data-dcnode-id="9913" instrument_node="">Channel One</span></a><span data-dcnode-id="9911" instrument_node=""> showed a documentary film dedicated to some Spetsnaz operations which were not known to the general public. The film is called </span><i data-dcnode-id="9909"><span data-dcnode-id="9910" instrument_node="">Spetsnaz: the Operations</span></i><span data-dcnode-id="9908" instrument_node="">. Among other stories, the film depicted an episode about the tactics of Russian combat swimmers from a PDSS unit. The episode was based on a real incident that occurred a few years earlier in a Russian naval base. Agents of a Russian PDSS team had detected activity of foreign frogmen. According to the film's narrator, these frogmen were well-trained professionals who planned to accomplish a </span><a data-dcnode-id="9906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terrorism" title="Terrorism"><span data-dcnode-id="9907" instrument_node="">terrorist</span></a><span data-dcnode-id="9905" instrument_node=""> act inside the base as a Russian </span><a data-dcnode-id="9903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warship" title="Warship"><span data-dcnode-id="9904" instrument_node="">warship</span></a><span data-dcnode-id="9902" instrument_node=""> was arriving in harbour. The intruders had recruited a local man as a source of information. They planned to destroy a </span><a data-dcnode-id="9900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pier" title="Pier"><span data-dcnode-id="9901" instrument_node="">pier</span></a><span data-dcnode-id="9899" instrument_node="">, together with the relatives of naval officers and sailors, by the remote detonation of a special mine. During fast and bloody combat, all the foreign frogmen were killed; their weaponry, explosive devices and diving equipment were captured by the PDSS team.</span></li><span data-dcnode-id="9897" instrument_node="">
</span><li data-dcnode-id="9889"><span data-dcnode-id="9896" instrument_node="">12 August 2008: During the </span><a data-dcnode-id="9894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russo-Georgian_War" title="Russo-Georgian War"><span data-dcnode-id="9895" instrument_node="">Russo-Georgian War</span></a><span data-dcnode-id="9893" instrument_node="">, combat swimmers of the Russian Black Sea Fleet </span><a data-dcnode-id="9891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Occupation_of_Poti" title="Occupation of Poti"><span data-dcnode-id="9892" instrument_node="">successfully demolished Georgian torpedo boats and missile boats inside Poti harbour</span></a><span data-dcnode-id="9890" instrument_node="">.</span></li><span data-dcnode-id="9888" instrument_node="">
</span><li data-dcnode-id="9874"><span data-dcnode-id="9887" instrument_node="">February–March 2014: During the </span><a class="mw-redirect" data-dcnode-id="9885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2014_Crimean_crisis" title="2014 Crimean crisis"><span data-dcnode-id="9886" instrument_node="">Crimean crisis</span></a><span data-dcnode-id="9884" instrument_node="">, combat swimmers of the Russian Black Sea Fleet stationed at </span><a data-dcnode-id="9882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sevastopol" title="Sevastopol"><span data-dcnode-id="9883" instrument_node="">Sevastopol</span></a><span data-dcnode-id="9881" instrument_node=""> were activated and told to prepare for any planned operations, respond to any immediate naval threats from </span><a data-dcnode-id="9879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Armed_Forces_of_Ukraine" title="Armed Forces of Ukraine"><span data-dcnode-id="9880" instrument_node="">Ukrainian forces</span></a><span data-dcnode-id="9878" instrument_node=""> and to fully secure the </span><a data-dcnode-id="9876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crimea" title="Crimea"><span data-dcnode-id="9877" instrument_node="">peninsula</span></a><span data-dcnode-id="9875" instrument_node=""> from attacks.</span></li><span data-dcnode-id="9873" instrument_node="">
</span><li data-dcnode-id="9862"><span data-dcnode-id="9872" instrument_node="">September 2015–November 2016: For a period during the early stages of the </span><a class="mw-redirect" data-dcnode-id="9870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_military_intervention_in_the_Syrian_Civil_War" title="Russian military intervention in the Syrian Civil War"><span data-dcnode-id="9871" instrument_node="">Russian military operation in Syria</span></a><span data-dcnode-id="9869" instrument_node="">, PDSS combat swimmers of the naval infantry from various fleets of the navy were deployed as part of the contingent of Russian troops </span><a data-dcnode-id="9867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_deployment" title="Military deployment"><span data-dcnode-id="9868" instrument_node="">deployed</span></a><span data-dcnode-id="9866" instrument_node=""> in Syria. They participated in many combat missions alongside the </span><a data-dcnode-id="9864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Syrian_Army" title="Syrian Army"><span data-dcnode-id="9865" instrument_node="">Syrian Army</span></a><span data-dcnode-id="9863" instrument_node="">.</span></li></ul><span data-dcnode-id="9860" instrument_node="">
</span><h2 data-dcnode-id="9850"><span class="mw-headline" data-dcnode-id="9858" id="Cinema"><span data-dcnode-id="9859" instrument_node="">Cinema</span></span><span class="mw-editsection" data-dcnode-id="9851"><span class="mw-editsection-bracket" data-dcnode-id="9856"><span data-dcnode-id="9857" instrument_node="">[</span></span><a data-dcnode-id="9854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRussian_commando_frogmen%26action%3Dedit%26section%3D13" title="Edit section: Cinema"><span data-dcnode-id="9855" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9852"><span data-dcnode-id="9853" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9849" instrument_node="">
</span><ul data-dcnode-id="9843"><li data-dcnode-id="9844"><span data-dcnode-id="9848" instrument_node="">In the 1945 World War Two film </span><a data-dcnode-id="9846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Counter-Attack" title="Counter-Attack"><span data-dcnode-id="9847" instrument_node="">Counter-Attack</span></a><span data-dcnode-id="9845" instrument_node="">, Soviet divers are seen constructing an underwater bridge to be utilized for a major Soviet offensive against German forces.</span></li></ul><span data-dcnode-id="9842" instrument_node="">
