169"><a class="mw-redirect" data-dcnode-id="11170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Syrian_Civil_War" title="Syrian Civil War"><span data-dcnode-id="11171" instrument_node="">Syrian Civil War</span></a></li></ul></div></td></tr><tr data-dcnode-id="11162"><th class="infobox-header" colspan="2" data-dcnode-id="11163" style="background-color:#C3D6EF;text-align:center;vertical-align:middle;font-size:110%;"><span data-dcnode-id="11164" instrument_node="">Commanders</span></th></tr><tr data-dcnode-id="11154"><th class="infobox-label" data-dcnode-id="11158" scope="row" style="padding-right: 1em;"><span data-dcnode-id="11161" instrument_node="">Notable</span><br data-dcnode-id="11160"><span data-dcnode-id="11159" instrument_node="">commanders</span></th><td class="infobox-data" data-dcnode-id="11155"><a data-dcnode-id="11156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Viktor_Leonov" title="Viktor Leonov"><span data-dcnode-id="11157" instrument_node="">Viktor Leonov</span></a></td></tr></tbody></table><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="11150" style="display:none"><span data-dcnode-id="11151" instrument_node="">Military unit</span></div><span data-dcnode-id="11149" instrument_node="">
</span><p data-dcnode-id="11096"><span data-dcnode-id="11148" instrument_node="">The </span><b data-dcnode-id="11146"><span data-dcnode-id="11147" instrument_node="">Russian commando frogmen</span></b><span data-dcnode-id="11145" instrument_node=""> (</span><a data-dcnode-id="11143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_language" title="Russian language"><span data-dcnode-id="11144" instrument_node="">Russian</span></a><span data-dcnode-id="11142" instrument_node="">: </span><span data-dcnode-id="11140" lang="ru"><span data-dcnode-id="11141" instrument_node="">Морской спецназ</span></span><span data-dcnode-id="11139" instrument_node="">, </span><small data-dcnode-id="11135"><a data-dcnode-id="11137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romanization_of_Russian" title="Romanization of Russian"><span data-dcnode-id="11138" instrument_node="">romanized</span></a><span data-dcnode-id="11136" instrument_node="">:&nbsp;</span></small><span data-dcnode-id="11132" title="Russian-language romanization"><i data-dcnode-id="11133" lang="ru-Latn"><span data-dcnode-id="11134" instrument_node="">Morskoy spetsnaz</span></i></span><span data-dcnode-id="11131" instrument_node="">), informally called "</span><a data-dcnode-id="11129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frogman" title="Frogman"><span data-dcnode-id="11130" instrument_node="">frogmen</span></a><span data-dcnode-id="11128" instrument_node="">" in civilian media, are a Russian Naval </span><a data-dcnode-id="11126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spetsnaz" title="Spetsnaz"><span data-dcnode-id="11127" instrument_node="">Spetsnaz</span></a><span data-dcnode-id="11125" instrument_node=""> unit under operational subordination to the </span><a class="mw-redirect" data-dcnode-id="11123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GRU_%28G.U.%29" title="GRU (G.U.)"><span data-dcnode-id="11124" instrument_node="">Main Intelligence Directorate (GRU)</span></a><span data-dcnode-id="11122" instrument_node="">. It is the </span><a data-dcnode-id="11120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Special_forces" title="Special forces"><span data-dcnode-id="11121" instrument_node="">special forces</span></a><span data-dcnode-id="11119" instrument_node=""> unit of the </span><a data-dcnode-id="11117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Naval_Infantry" title="Russian Naval Infantry"><span data-dcnode-id="11118" instrument_node="">Russian Naval Infantry</span></a><span data-dcnode-id="11116" instrument_node=""> and is composed of highly trained and elite marines within the Naval Infantry. By virtue of belonging to the Russian Naval Infantry, frogmen fall under the </span><a data-dcnode-id="11114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coastal_Troops_of_the_Russian_Navy" title="Coastal Troops of the Russian Navy"><span data-dcnode-id="11115" instrument_node="">Coastal Troops of the Russian Navy</span></a><span data-dcnode-id="11113" instrument_node=""> service arm. The </span><a data-dcnode-id="11111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Navy" title="Russian Navy"><span data-dcnode-id="11112" instrument_node="">Russian Navy</span></a><span data-dcnode-id="11110" instrument_node=""> proper does not field any special forces or special operations units. Russian </span><a data-dcnode-id="11108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_Security_Service" title="Federal Security Service"><span data-dcnode-id="11109" instrument_node="">FSB</span></a><span data-dcnode-id="11107" instrument_node=""> special forces </span><a data-dcnode-id="11105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alpha_Group" title="Alpha Group"><span data-dcnode-id="11106" instrument_node="">Alpha Group</span></a><span data-dcnode-id="11104" instrument_node=""> and </span><a data-dcnode-id="11102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vympel" title="Vympel"><span data-dcnode-id="11103" instrument_node="">Vympel</span></a><span data-dcnode-id="11101" instrument_node=""> also have frogman units in their respective naval components.</span><sup class="reference" data-dcnode-id="11098" id="cite_ref-shadowspear_2009_2-0"><a data-dcnode-id="11099" href="#cite_note-shadowspear_2009-2"><span data-dcnode-id="11100" instrument_node="">[2]</span></a></sup><span data-dcnode-id="11097" instrument_node="">

</span><h2 data-dcnode-id="10921"><span class="mw-headline" data-dcnode-id="10929" id="History"><span data-dcnode-id="10930" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="10922"><span class="mw-editsection-bracket" data-dcnode-id="10927"><span data-dcnode-id="10928" instrument_node="">[</span></span><a data-dcnode-id="10925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRussian_commando_frogmen%26action%3Dedit%26section%3D1" title="Edit section: History"><span data-dcnode-id="10926" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="10923"><span data-dcnode-id="10924" instrument_node="">]</span></span></span></h2><span data-dcnode-id="10920" instrument_node="">
</span><h3 data-dcnode-id="10910"><span class="mw-headline" data-dcnode-id="10918" id="Pre_war_and_WWII"><span data-dcnode-id="10919" instrument_node="">Pre war and WWII</span></span><span class="mw-editsection" data-dcnode-id="10911"><span class="mw-editsection-bracket" data-dcnode-id="10916"><span data-dcnode-id="10917" instrument_node="">[</span></span><a data-dcnode-id="10914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRussian_commando_frogmen%26action%3Dedit%26section%3D2" title="Edit section: Pre war and WWII"><span data-dcnode-id="10915" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="10912"><span data-dcnode-id="10913" instrument_node="">]</span></span></span></h3><span data-dcnode-id="10909" instrument_node="">
</span><p data-dcnode-id="10882"><span data-dcnode-id="10908" instrument_node="">On 22 October 1938, during </span><a class="mw-redirect" data-dcnode-id="10906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wargaming" title="Wargaming"><span data-dcnode-id="10907" instrument_node="">wargaming</span></a><span data-dcnode-id="10905" instrument_node=""> between units of the Russian Pacific Fleet in </span><a data-dcnode-id="10903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladivostok" title="Vladivostok"><span data-dcnode-id="10904" instrument_node="">Vladivostok</span></a><span data-dcnode-id="10902" instrument_node="">, a group of Soviet military divers exited a </span><a class="new" data-dcnode-id="10900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DShch-112%26action%3Dedit%26redlink%3D1" title="Shch-112 (page does not exist)"><span data-dcnode-id="10901" instrument_node="">Shch-112</span></a><span data-dcnode-id="10899" instrument_node=""> submarine through a torpedo tube, entered the </span><a data-dcnode-id="10897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Naval_base" title="Naval base"><span data-dcnode-id="10898" instrument_node="">naval base</span></a><span data-dcnode-id="10896" instrument_node=""> and completed certain acts of sabotage. These combat divers were equipped with oxygen rebreathers, </span><a data-dcnode-id="10894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dry_suit" title="Dry suit"><span data-dcnode-id="10895" instrument_node="">dry suits</span></a><span data-dcnode-id="10893" instrument_node="">, </span><a data-dcnode-id="10891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Handgun" title="Handgun"><span data-dcnode-id="10892" instrument_node="">handguns</span></a><span data-dcnode-id="10890" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="10888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hand_grenade" title="Hand grenade"><span data-dcnode-id="10889" instrument_node="">grenades</span></a><span data-dcnode-id="10887" instrument_node="">. This did not lead to a permanent combat diver unit being set up, but it was the beginning of the history of combat divers.</span><sup class="reference" data-dcnode-id="10884" id="cite_ref-3"><a data-dcnode-id="10885" href="#cite_note-3"><span data-dcnode-id="10886" instrument_node="">[3]</span></a></sup><span data-dcnode-id="10883" instrument_node="">
</span></p><p data-dcnode-id="10834"><span data-dcnode-id="10881" instrument_node="">The Soviet Union started frogman operations during World War II. The first unit of combat divers (or RON team), was formed in </span><a data-dcnode-id="10879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saint_Petersburg" title="Saint Petersburg"><span data-dcnode-id="10880" instrument_node="">Leningrad</span></a><span data-dcnode-id="10878" instrument_node=""> in 1941. The most prominent of the new recruits was </span><a data-dcnode-id="10876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Viktor_Leonov" title="Viktor Leonov"><span data-dcnode-id="10877" instrument_node="">Viktor Leonov</span></a><span data-dcnode-id="10875" instrument_node="">, who joined the </span><a data-dcnode-id="10873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Navy" title="Soviet Navy"><span data-dcnode-id="10874" instrument_node="">Soviet Navy</span></a><span data-dcnode-id="10872" instrument_node=""> in 1937. He was assigned to a submarine training detachment and then transferred to a repair station in the Northern Fleet at </span><a data-dcnode-id="10870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polyarny%2C_Murmansk_Oblast" title="Polyarny, Murmansk Oblast"><span data-dcnode-id="10871" instrument_node="">Polyarnyy</span></a><span data-dcnode-id="10869" instrument_node="">.</span><sup class="reference" data-dcnode-id="10866" id="cite_ref-Leonov_4-0"><a data-dcnode-id="10867" href="#cite_note-Leonov-4"><span data-dcnode-id="10868" instrument_node="">[4]</span></a></sup><span data-dcnode-id="10865" instrument_node=""> Leonov had trained as a </span><a class="mw-redirect" data-dcnode-id="10863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scuba_diver" title="Scuba diver"><span data-dcnode-id="10864" instrument_node="">scuba diver</span></a><span data-dcnode-id="10862" instrument_node="">, after which he joined 4th Special Volunteer Detachment, where he proved his daring and leadership skills conducting numerous clandestine operations and twice being awarded the title of </span><a data-dcnode-id="10860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hero_of_the_Soviet_Union" title="Hero of the Soviet Union"><span data-dcnode-id="10861" instrument_node="">Hero of the Soviet Union</span></a><span data-dcnode-id="10859" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="10852" style="white-space:nowrap;"><span data-dcnode-id="10858" instrument_node="">[</span><i data-dcnode-id="10854"><a data-dcnode-id="10855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="10856" title="This claim needs references to reliable sources. (October 2019)"><span data-dcnode-id="10857" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="10853" instrument_node="">]</span></sup><span data-dcnode-id="10851" instrument_node=""> Soviet combat divers were quite successful during World War Two. They performed a variety of missions numbering well over 200 operations.</span><sup class="reference" data-dcnode-id="10848" id="cite_ref-Borovikov35_5-0"><a data-dcnode-id="10849" href="#cite_note-Borovikov35-5"><span data-dcnode-id="10850" instrument_node="">[5]</span></a></sup><span data-dcnode-id="10847" instrument_node=""> These operations consisted of more than just combat operations and demolitions. There were many rescue missions which also included female divers recovering weapons and other military equipment from sunken cargo ships.</span><sup class="reference" data-dcnode-id="10844" id="cite_ref-Borovikov75_6-0"><a data-dcnode-id="10845" href="#cite_note-Borovikov75-6"><span data-dcnode-id="10846" instrument_node="">[6]</span></a></sup><span data-dcnode-id="10843" instrument_node=""> Other operations also included making minor repairs of ships that were afloat and clearing approaches to wharf facilities at the sites of fords across the Volga river.</span><sup class="reference" data-dcnode-id="10840" id="cite_ref-Borovikov75_6-1"><a data-dcnode-id="10841" href="#cite_note-Borovikov75-6"><span data-dcnode-id="10842" instrument_node="">[6]</span></a></sup><span data-dcnode-id="10839" instrument_node=""> There were also operations which involved recovering the dead that were present on sunken ships or in the Volga river.</span><sup class="reference" data-dcnode-id="10836" id="cite_ref-7"><a data-dcnode-id="10837" href="#cite_note-7"><span data-dcnode-id="10838" instrument_node="">[7]</span></a></sup><span data-dcnode-id="10835" instrument_node="">
</span></p><p data-dcnode-id="10828"><span data-dcnode-id="10833" instrument_node="">In 1953, according to directives of the Main Headquarters of the Naval Forces of the USSR, they started to establish completely secret Detached Naval Reconnaissance Points (OMRPs). In the beginning they were named Naval Reconnaissance Divisions of the Special Intelligence, purposed for high risk special operations.</span><sup class="reference" data-dcnode-id="10830" id="cite_ref-8"><a data-dcnode-id="10831" href="#cite_note-8"><span data-dcnode-id="10832" instrument_node="">[8]</span></a></sup><span data-dcnode-id="10829" instrument_node="">
</span></p><p data-dcnode-id="10816"><span data-dcnode-id="10827" instrument_node="">The mission of the Naval SPETSNAZ was to conduct what the Soviets call Special Reconnaissance (Spetsialnaya Razvedka). During the </span><a data-dcnode-id="10825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="10826" instrument_node="">Cold War</span></a><span data-dcnode-id="10824" instrument_node="">, each Soviet fleet would have a brigade of "naval assault pioneers" with a wartime strength of up to 1,300 men and capable of deploying about 100 teams. Naval special forces were organized into spetsnaz brigades consisting of five spetsnaz detachments (battalions), a signal company, support units, and a headquarters company containing highly skilled professional soldiers and </span><a class="mw-redirect" data-dcnode-id="10822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frogmen" title="Frogmen"><span data-dcnode-id="10823" instrument_node="">frogmen</span></a><span data-dcnode-id="10821" instrument_node=""> responsible for carrying out reconnaissance, assassinations, kidnappings, rescue missions and contact with agents behind enemy lines. The organization of a naval special purpose brigade reflects its emphasis on sea infiltration, with up to three frogman battalions, one parachute battalion, and a minisubmarine battalion, as well as the signal company, headquarters company, and support elements.</span><sup class="reference" data-dcnode-id="10818" id="cite_ref-globalsecurity.org_9-0"><a data-dcnode-id="10819" href="#cite_note-globalsecurity.org-9"><span data-dcnode-id="10820" instrument_node="">[9]</span></a></sup><span data-dcnode-id="10817" instrument_node="">
</span></p><p data-dcnode-id="10807"><span data-dcnode-id="10815" instrument_node="">In 1967, the Anti-diversionary forces and means, or 'PDSS', began development in the Soviet Black Sea Fleet. PDSS is a complex of special measures developed by the Soviet Navy to counter possible attacks by frogmen. PDSS includes specially trained units (teams) of the Soviet Navy, frogman and </span><a class="mw-redirect" data-dcnode-id="10813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-frogman_techniques" title="Anti-frogman techniques"><span data-dcnode-id="10814" instrument_node="">anti-frogman</span></a><span data-dcnode-id="10812" instrument_node=""> training and special weapons and tactics. According to some historians, Soviet Naval Commanders decided to form PDSS after the Lionel Crabb incident.</span><sup class="reference" data-dcnode-id="10809" id="cite_ref-shadowspear_2009_2-1"><a data-dcnode-id="10810" href="#cite_note-shadowspear_2009-2"><span data-dcnode-id="10811" instrument_node="">[2]</span></a></sup><span data-dcnode-id="10808" instrument_node="">
</span></p><span data-dcnode-id="10806" instrument_node="">
</span><h3 data-dcnode-id="10796"><span class="mw-headline" data-dcnode-id="10804" id="Post_breakup_of_the_USSR"><span data-dcnode-id="10805" instrument_node="">Post breakup of the USSR</span></span><span class="mw-editsection" data-dcnode-id="10797"><span class="mw-editsection-bracket" data-dcnode-id="10802"><span data-dcnode-id="10803" instrument_node="">[</span></span><a data-dcnode-id="10800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRussian_commando_frogmen%26action%3Dedit%26section%3D3" title="Edit section: Post breakup of the USSR"><span data-dcnode-id="10801" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="10798"><span data-dcnode-id="10799" instrument_node="">]</span></span></span></h3><span data-dcnode-id="10795" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="10786"><div class="thumbinner" data-dcnode-id="10787" style="width:222px;"><a class="image" data-dcnode-id="10793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFrogmenExercise2017-08.jpg"><img alt="" class="thumbimage" data-dcnode-id="10794" data-file-height="800" data-file-width="1200" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b3/FrogmenExercise2017-08.jpg/220px-FrogmenExercise2017-08.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b3/FrogmenExercise2017-08.jpg/330px-FrogmenExercise2017-08.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b3/FrogmenExercise2017-08.jpg/440px-FrogmenExercise2017-08.jpg 2x" width="220"></a><span data-dcnode-id="10792" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="10788"><div class="magnify" data-dcnode-id="10790"><a class="internal" data-dcnode-id="10791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFrogmenExercise2017-08.jpg" title="Enlarge"></a></div><span data-dcnode-id="10789" instrument_node="">Naval Spetsnaz frogman</span></div></div></div><span data-dcnode-id="10785" instrument_node="">
</span><p data-dcnode-id="10773"><span data-dcnode-id="10784" instrument_node="">Most Soviet Naval spetsnaz units were transferred to the newly formed </span><a data-dcnode-id="10782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Navy" title="Russian Navy"><span data-dcnode-id="10783" instrument_node="">Russian Navy</span></a><span data-dcnode-id="10781" instrument_node=""> and subsequently downsized. At least one unit, the 17th Naval Special Purpose Brigade, was transferred to the </span><a data-dcnode-id="10779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukrainian_Navy" title="Ukrainian Navy"><span data-dcnode-id="10780" instrument_node="">Ukrainian Navy</span></a><span data-dcnode-id="10778" instrument_node=""> and was reorganized as the 1464th Marine Reconnaissance point. Shortly after, the 1464th MRP was again reorganized as the 7th Special Purpose Brigade of the Ukrainian Navy, after about two-thirds of the unit's personnel swore an oath to Ukraine. In 2003, the unit became the 73rd Naval Center of Special Operations.</span><sup class="reference" data-dcnode-id="10775" id="cite_ref-10"><a data-dcnode-id="10776" href="#cite_note-10"><span data-dcnode-id="10777" instrument_node="">[10]</span></a></sup><span data-dcnode-id="10774" instrument_node="">
</span></p><p data-dcnode-id="10752"><span data-dcnode-id="10772" instrument_node="">Russian naval spetsnaz, have been less visible in the wake of the USSR's dissolution. By the end of the 1990s there was only one full-strength naval spetsnaz brigade, at Ocharkov on the </span><a data-dcnode-id="10770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_Sea" title="Black Sea"><span data-dcnode-id="10771" instrument_node="">Black Sea</span></a><span data-dcnode-id="10769" instrument_node="">. However, in 1998 the Russian Navy's commander in chief, Admiral </span><a data-dcnode-id="10767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Kuroyedov" title="Vladimir Kuroyedov"><span data-dcnode-id="10768" instrument_node="">Vladimir Kuroyedov</span></a><span data-dcnode-id="10766" instrument_node="">, reaffirmed that naval special-operations units remain assigned to the Russian Baltic, Northern, Pacific, and Black Sea fleets. Although the admiral provided few specifics on the size and capabilities of the units, he did indicate that they were elite, that they were equipped with special weapons (including small submarines), and that they were comparable to </span><a data-dcnode-id="10764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Navy_SEALs" title="United States Navy SEALs"><span data-dcnode-id="10765" instrument_node="">U.S. Navy SEALS</span></a><span data-dcnode-id="10763" instrument_node=""> or the </span><a data-dcnode-id="10761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israeli_Navy" title="Israeli Navy"><span data-dcnode-id="10762" instrument_node="">Israeli Navy</span></a><span data-dcnode-id="10760" instrument_node="">'s </span><a data-dcnode-id="10758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shayetet_13" title="Shayetet 13"><span data-dcnode-id="10759" instrument_node="">Shayetet 13</span></a><span data-dcnode-id="10757" instrument_node=""> counterparts, stating that these units have no special name beyond their "combat swimmer" or "naval spetsnaz" designations.</span><sup class="reference" data-dcnode-id="10754" id="cite_ref-globalsecurity.org_9-1"><a data-dcnode-id="10755" href="#cite_note-globalsecurity.org-9"><span data-dcnode-id="10756" instrument_node="">[9]</span></a></sup><span data-dcnode-id="10753" instrument_node="">
</span></p><span data-dcnode-id="10751" instrument_node="">
</span><h2 data-dcnode-id="10741"><span class="mw-headline" data-dcnode-id="10749" id="Units_and_structure"><span data-dcnode-id="10750" instrument_node="">Units and structure</span></span><span class="mw-editsection" data-dcnode-id="10742"><span class="mw-editsection-bracket" data-dcnode-id="10747"><span data-dcnode-id="10748" instrument_node="">[</span></span><a data-dcnode-id="10745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRussian_commando_frogmen%26action%3Dedit%26section%3D4" title="Edit section: Units and structure"><span data-dcnode-id="10746" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="10743"><span data-dcnode-id="10744" instrument_node="">]</span></span></span></h2><span data-dcnode-id="10740" instrument_node="">
</span><h3 data-dcnode-id="10729"><span data-dcnode-id="10739" id="Naval_Special_Reconnaissance_.28OMRP.29"></span><span class="mw-headline" data-dcnode-id="10737" id="Naval_Special_Reconnaissance_(OMRP)"><span data-dcnode-id="10738" instrument_node="">Naval Special Reconnaissance (OMRP)</span></span><span class="mw-editsection" data-dcnode-id="10730"><span class="mw-editsection-bracket" data-dcnode-id="10735"><span data-dcnode-id="10736" instrument_node="">[</span></span><a data-dcnode-id="10733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRussian_commando_frogmen%26action%3Dedit%26section%3D5" title="Edit section: Naval Special Reconnaissance (OMRP)"><span data-dcnode-id="10734" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="10731"><span data-dcnode-id="10732" instrument_node="">]</span></span></span></h3><span data-dcnode-id="10728" instrument_node="">
</span><p data-dcnode-id="10722"><span data-dcnode-id="10727" instrument_node="">The first Naval Special Reconnaissance unit, the 42nd OMRP is composed of reconnaissance divers that fall under operational subordination to the Main Intelligence Directorate (GRU). There are currently four OMRPs in Russia, one for each fleet: Northern Fleet, Baltic Fleet, Black Sea Fleet and Pacific Fleet with each consisting of approximately 120–200 personnel.</span><sup class="reference" data-dcnode-id="10724" id="cite_ref-shadowspear_2009_2-2"><a data-dcnode-id="10725" href="#cite_note-shadowspear_2009-2"><span data-dcnode-id="10726" instrument_node="">[2]</span></a></sup><span data-dcnode-id="10723" instrument_node="">
</span></p><span data-dcnode-id="10721" instrument_node="">
</span><ul data-dcnode-id="10690"><li data-dcnode-id="10691"><span data-dcnode-id="10720" instrument_node="">Naval Special Reconnaissance (OMRP)</span><sup class="reference" data-dcnode-id="10717" id="cite_ref-11"><a data-dcnode-id="10718" href="#cite_note-11"><span data-dcnode-id="10719" instrument_node="">[11]</span></a></sup><span data-dcnode-id="10716" instrument_node="">
</span><ul data-dcnode-id="10692"><li data-dcnode-id="10711"><span data-dcnode-id="10715" instrument_node="">42nd Naval Reconnaissance Station (</span><a data-dcnode-id="10713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pacific_Fleet_%28Russia%29" title="Pacific Fleet (Russia)"><span data-dcnode-id="10714" instrument_node="">Pacific Fleet</span></a><span data-dcnode-id="10712" instrument_node="">)</span></li><span data-dcnode-id="10710" instrument_node="">

</span><p data-dcnode-id="10660"><span data-dcnode-id="10676" instrument_node="">PDSS are special purpose (spetsnaz) unit of the </span><a data-dcnode-id="10674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Naval_Infantry" title="Russian Naval Infantry"><span data-dcnode-id="10675" instrument_node="">Russian Naval Infantry</span></a><span data-dcnode-id="10673" instrument_node="">, trained to conduct land and sea operations behind enemy lines, and to </span><a class="mw-redirect" data-dcnode-id="10671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-frogman_techniques" title="Anti-frogman techniques"><span data-dcnode-id="10672" instrument_node="">conduct underwater combat</span></a><span data-dcnode-id="10670" instrument_node="">, </span><a data-dcnode-id="10668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Naval_mine" title="Naval mine"><span data-dcnode-id="10669" instrument_node="">mining</span></a><span data-dcnode-id="10667" instrument_node=""> and </span><a data-dcnode-id="10665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clearance_diver" title="Clearance diver"><span data-dcnode-id="10666" instrument_node="">clearance diving</span></a><span data-dcnode-id="10664" instrument_node="">. These units include </span><a class="mw-redirect" data-dcnode-id="10662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Combat_swimmers" title="Combat swimmers"><span data-dcnode-id="10663" instrument_node="">combat swimmers</span></a><span data-dcnode-id="10661" instrument_node=""> tasked to protect ships and other fleet assets from enemy frogmen and foreign special forces. The precise composition, activities and location of the unit are strictly classified.
</span></p><span data-dcnode-id="10659" instrument_node="">
