</span><div class="indent" data-dcnode-id="1487"><strong data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Dale:</span></strong><span data-dcnode-id="1504" instrument_node=""> I was at the gun club, playing Russian Roulette. </span><br data-dcnode-id="1503"><strong data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Nancy:</span></strong><span data-dcnode-id="1500" instrument_node=""> Did you win? </span><br data-dcnode-id="1499"><strong data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Dale:</span></strong><span data-dcnode-id="1496" instrument_node=""> You're not really familiar with the game, are you? </span><br data-dcnode-id="1495"><strong data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Nancy:</span></strong><span data-dcnode-id="1492" instrument_node=""> No. </span><br data-dcnode-id="1491"><strong data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Dale:</span></strong><span data-dcnode-id="1488" instrument_node=""> Yes, yes I won.
</span></div></li><li data-dcnode-id="1458"><span data-dcnode-id="1485" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/LooneyTunes" title="/pmwiki/pmwiki.php/WesternAnimation/LooneyTunes"><span data-dcnode-id="1484" instrument_node="">Looney Tunes</span></a><span data-dcnode-id="1482" instrument_node="">:
</span><ul data-dcnode-id="1459"><li data-dcnode-id="1469"><span data-dcnode-id="1481" instrument_node=""> </span><em data-dcnode-id="1478"><a class="twikilink" data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/BallotBoxBunny" title="/pmwiki/pmwiki.php/WesternAnimation/BallotBoxBunny"><span data-dcnode-id="1480" instrument_node="">Ballot Box Bunny</span></a></em><span data-dcnode-id="1477" instrument_node=""> ends with </span><a class="twikilink" data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/BugsBunny" title="/pmwiki/pmwiki.php/WesternAnimation/BugsBunny"><span data-dcnode-id="1476" instrument_node="">Bugs Bunny</span></a><span data-dcnode-id="1474" instrument_node=""> proposing </span><a class="urllink" data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Ds_mr9zU99oU"><span data-dcnode-id="1473" instrument_node="">a game of Russian roulette</span><img data-dcnode-id="1472" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1470" instrument_node=""> to Yosemite Sam after both of them lose a local election. Sam goes first, then Bugs, who puts the gun to his head as the picture irises out; a shot is then heard, after which the picture irises in again to reveal that Bugs shot Sam instead (Sam: "Ah hate that rabbit.") Perhaps unsurprisingly, this ending is rarely if ever included when the short is aired on TV.
</span></li><li data-dcnode-id="1460"><span data-dcnode-id="1468" instrument_node=""> In </span><em data-dcnode-id="1465"><a class="twikilink" data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/BarbaryCoastBunny" title="/pmwiki/pmwiki.php/WesternAnimation/BarbaryCoastBunny"><span data-dcnode-id="1467" instrument_node="">Barbary Coast Bunny</span></a></em><span data-dcnode-id="1464" instrument_node="">, Bugs is running Nasty Canasta's casino out of business by winning at </span><em data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">everything</span></em><span data-dcnode-id="1461" instrument_node="">. A fed up Canasta pulls a revolver and suggests Russian Roulette, only for Bugs to spin the barrel and somehow cause coins to spill from the gun.
</span></li></ul></li><li data-dcnode-id="1452"><span data-dcnode-id="1457" instrument_node=""> In </span><em data-dcnode-id="1454"><a class="twikilink" data-dcnode-id="1455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/TheOblongs" title="/pmwiki/pmwiki.php/WesternAnimation/TheOblongs"><span data-dcnode-id="1456" instrument_node="">The Oblongs</span></a></em><span data-dcnode-id="1453" instrument_node="">, when Pickles became addicted to performing crazy stunts, Milo enticed her with a game of Russian Roulette with bullets in all the chambers in order to get her to an intervention.
</span></li><li data-dcnode-id="1442"><span data-dcnode-id="1451" instrument_node=""> </span><em data-dcnode-id="1448"><a class="twikilink" data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/Squidbillies" title="/pmwiki/pmwiki.php/WesternAnimation/Squidbillies"><span data-dcnode-id="1450" instrument_node="">Squidbillies</span></a></em><span data-dcnode-id="1447" instrument_node="">: To earn some extra booze money, Early Cuyler plays solo Russian Roulette with a 6-shooter and has spectators bet against him. He presses his luck a little too far:
</span><div class="indent" data-dcnode-id="1443"><strong data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Early:</span></strong><span data-dcnode-id="1444" instrument_node=""> All right! Who wants to bet I can't do it a sixth time in a row!
</span></div></li></ul></div><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1438"></p><div class="folderlabel" data-dcnode-id="1436" onclick="togglefolder('folder23');"><span data-dcnode-id="1437" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Real Life&nbsp;</span></div><div class="folder" data-dcnode-id="1239" id="folder23" isfolder="true" style="display:block;"><span data-dcnode-id="1435" instrument_node="">
</span><ul data-dcnode-id="1240"><li data-dcnode-id="1426"><span data-dcnode-id="1434" instrument_node=""> According to Cecil Adams, the </span><a class="urllink" data-dcnode-id="1431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.straightdope.com/columns/read/1353/did-the-russians-ever-play-russian-roulette"><span data-dcnode-id="1433" instrument_node="">original version</span><img data-dcnode-id="1432" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1430" instrument_node=""> of Russian Roulette might have been completely made up by an American in 1937; the original version may also have been one </span><em data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">empty chamber</span></em><span data-dcnode-id="1427" instrument_node="">, rather than one bullet.
</span></li><li data-dcnode-id="1403"><span data-dcnode-id="1425" instrument_node=""> </span><a class="urllink" data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.darwinawards.com/darwin/darwin2000-04.html"><span data-dcnode-id="1424" instrument_node="">One Darwin Award winner</span><img data-dcnode-id="1423" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1421" instrument_node=""> lost a game of Russian Roulette, while playing with a </span><em data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">semiautomatic pistol</span></em><span data-dcnode-id="1418" instrument_node="">. Those </span><a class="twikilink" data-dcnode-id="1416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Unwinnable" title="/pmwiki/pmwiki.php/Main/Unwinnable"><span data-dcnode-id="1417" instrument_node="">only have one chamber</span></a><span data-dcnode-id="1415" instrument_node="">, and are loaded with a magazine.
</span><ul data-dcnode-id="1404"><li data-dcnode-id="1410"><span data-dcnode-id="1414" instrument_node=""> The French call this version "</span><a class="twikilink" data-dcnode-id="1412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AcceptableTargets" title="/pmwiki/pmwiki.php/Main/AcceptableTargets"><span data-dcnode-id="1413" instrument_node="">Belgian</span></a><span data-dcnode-id="1411" instrument_node=""> roulette."
</span></li><li data-dcnode-id="1405"><span data-dcnode-id="1409" instrument_node=""> There's also Landmine Roulette: take a drink, stomp on the landmine. Next guy drinks, stomps on the land mine. Next guy... </span><a class="twikilink" data-dcnode-id="1407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StuffBlowingUp" title="/pmwiki/pmwiki.php/Main/StuffBlowingUp"><span data-dcnode-id="1408" instrument_node="">yeah</span></a><span data-dcnode-id="1406" instrument_node="">.
</span></li></ul></li><li data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node=""> During his days as a criminal, Malcolm X placed one bullet in a revolver, put it to his head, and pulled the trigger three times to prove to his partners that he wasn't afraid to die. He'd secretly palmed the bullet while pretending to load the gun.
</span></li><li data-dcnode-id="1392"><span data-dcnode-id="1400" instrument_node=""> A husband </span><a class="urllink" data-dcnode-id="1397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dailytelegraph.com.au/news/sydney-news/court-hears-of-womans-russian-roulette-ordeal/story-e6freuzi-1225979015190"><span data-dcnode-id="1399" instrument_node="">forced his wife into this,</span><img data-dcnode-id="1398" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1396" instrument_node=""> except when it was his turn, he merely </span><a class="twikilink" data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KickTheDog" title="/pmwiki/pmwiki.php/Main/KickTheDog"><span data-dcnode-id="1395" instrument_node="">shot in the air</span></a><span data-dcnode-id="1393" instrument_node="">. Luck was on the woman's side, though, as she survived three misses and later escaped.
</span></li><li data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node=""> There's also the drinking game version of this, where the bartender sets six glasses on the bar — one has vodka, the rest are water. Which result constitutes "winning" depends entirely on your perspective. Another version has 6 shots of vodka, but one of them is hot chili flavoured. At some bars, you can forgo the shots of water in favor of a toy gun that will "fire" at the loser by lighting up and making a snapping sound. What that person has to drink is up to the players.
</span></li><li data-dcnode-id="1378"><span data-dcnode-id="1389" instrument_node=""> The drinking game known as "</span><a class="twikilink" data-dcnode-id="1387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShoutOut" title="/pmwiki/pmwiki.php/Main/ShoutOut"><span data-dcnode-id="1388" instrument_node="">The Beer Hunter</span></a><span data-dcnode-id="1386" instrument_node="">". Start with a six-pack, with one can shaken. Take turns opening a can under your nose or by your head. If it doesn't blow up, chug. If it does, you have to chug the rest of the pack. The book this came out of rated this the highest possible on the "you will toss your cookies" scale. </span><em data-dcnode-id="1383"><a class="twikilink" data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/JamesMaysManLab" title="/pmwiki/pmwiki.php/Series/JamesMaysManLab"><span data-dcnode-id="1385" instrument_node="">James May's Man Lab</span></a></em><span data-dcnode-id="1382" instrument_node=""> later utilized a variant of it to test the </span><a class="twikilink" data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MontyHallProblem" title="/pmwiki/pmwiki.php/Main/MontyHallProblem"><span data-dcnode-id="1381" instrument_node="">Monty Hall Problem</span></a><span data-dcnode-id="1379" instrument_node="">.
</span></li><li data-dcnode-id="1367"><span data-dcnode-id="1377" instrument_node=""> Mentalist </span><a class="twikilink" data-dcnode-id="1375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/DerrenBrown" title="/pmwiki/pmwiki.php/Creator/DerrenBrown"><span data-dcnode-id="1376" instrument_node="">Derren Brown</span></a><span data-dcnode-id="1374" instrument_node=""> (no, </span><a class="twikilink" data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/DanBrown" title="/pmwiki/pmwiki.php/Creator/DanBrown"><span data-dcnode-id="1373" instrument_node="">not Dan</span></a><span data-dcnode-id="1371" instrument_node="">, Derren) famously played a game of Russian Roulette on live TV. Derren has since publicly confirmed that the gun was holding a blank round. He has also pointed out that by pressing the barrel right against his temple and firing point blank, he WAS still in danger of being extremely badly hurt or killed by the discharge — that was </span><em data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">exactly</span></em><span data-dcnode-id="1368" instrument_node=""> how actor Jon-Erik Hexum died, for example.
</span></li><li data-dcnode-id="1350"><span data-dcnode-id="1366" instrument_node=""> There are many less deadly variations. The most known is the "spike trick", which has caused injury to many magicians when they failed to pull it off (DON'T type "</span><a class="twikilink" data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SchmuckBait" title="/pmwiki/pmwiki.php/Main/SchmuckBait"><span data-dcnode-id="1365" instrument_node="">spike magic trick failed</span></a><span data-dcnode-id="1363" instrument_node="">" in Google!).</span><span class="notelabel" data-dcnode-id="1360" onclick="togglenote('note5byhi');" style="cursor: pointer;"><sup data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1352" id="note5byhi" isnote="true" onclick="togglenote('note5byhi');" style="display: none; cursor: pointer;"><span data-dcnode-id="1359" instrument_node="">It is a variation on the "shell game" trick with a pea hidden under one of three nutshells. This one uses a </span><em data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">metal spike</span></em><span data-dcnode-id="1356" instrument_node=""> hidden under one of several disposable plastic/Styrofoam cups, and instead of lifting the chosen cup, the magician </span><em data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">crushes it with his hand</span></em><span data-dcnode-id="1353" instrument_node="">!</span></span><span data-dcnode-id="1351" instrument_node="">
</span></li><li data-dcnode-id="1337"><span data-dcnode-id="1349" instrument_node=""> </span><a class="urllink" data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.firebox.com/product/6137/Instant-Regret-Chocolate-Roulette"><span data-dcnode-id="1348" instrument_node="">Chocolate Russian Roulette!</span><img data-dcnode-id="1347" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1345" instrument_node=""> Eleven chocolate bullets - and one chocolate-coated chili pepper. A later iteration titled the </span><a class="urllink" data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//whiskying.com/2014/09/russian-roulette-back-instant-regret-chocolate-roulette/"><span data-dcnode-id="1344" instrument_node="">"Instant Regret Chocolate Roulette"</span><img data-dcnode-id="1343" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1341" instrument_node=""> has eleven bullets, with one being laced with chili pepper </span><em data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">extract</span></em><span data-dcnode-id="1338" instrument_node="">, so you can't tell if you bit the wrong one until it hits you.
</span></li><li data-dcnode-id="1325"><span data-dcnode-id="1336" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Tsundere" title="/pmwiki/pmwiki.php/Main/Tsundere"><span data-dcnode-id="1335" instrument_node="">Tsundere</span></a><span data-dcnode-id="1333" instrument_node=""> </span><a class="urllink" data-dcnode-id="1330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//irregularbloggers.wordpress.com/2009/10/07/tsundere-cookies-more-tsun-than-dere/"><span data-dcnode-id="1332" instrument_node="">cookies.</span><img data-dcnode-id="1331" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1329" instrument_node=""> Twelve cookies, and an entire </span><em data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">ten</span></em><span data-dcnode-id="1326" instrument_node=""> laced with chili powder.
</span></li><li data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node=""> Jelly Belly's "Beanboozled" game has a similar concept. You start with a set of normal-flavored jelly beans in several colors, mixed with a second set of beans in the same colors but with disgusting flavors. Spin a wheel, pick a bean of the color it lands on, and eat it. A brown one, for example, might be chocolate or dog food — and you won't know which until you put it in your mouth.
</span></li><li data-dcnode-id="1317"><span data-dcnode-id="1322" instrument_node=""> In 1954 R&amp;B singer </span><a class="urllink" data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//raresoul.com/archives/723"><span data-dcnode-id="1321" instrument_node="">Johnny Ace</span><img data-dcnode-id="1320" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1318" instrument_node=""> shot himself playing Russian Roulette backstage between sets of a Christmas Eve show in Houston. He died in the hospital on Christmas Day.
</span></li><li data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node=""> The reverse of the Russian Roulette is the Josephus Permutation, according to legend, the Jewish historian Josephus found himself with 40 other Jewish rebels at the Seige of Yodfat. Right before their position was about to be overrun by the Romans, they decided to kill themselves via a elaborate suicide pact: everyone stood in a circle, and every third person gets killed (suicide is considered immoral in Judaism). This goes on until everyone's dead. The idea is to position yourself such that you are the last person left.
</span></li><li data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node=""> In the Roman Army, mutinous or cowardly soldiers were rounded up and executed by "decimation", in which every tenth soldier was killed by his comrades, determined by drawing straws. Roman roulette?
</span></li><li data-dcnode-id="1305"><span data-dcnode-id="1312" instrument_node=""> A New Zealand pizza chain called </span><em data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Hell's Pizza</span></em><span data-dcnode-id="1309" instrument_node=""> has "Pizza Roulette". It's a free add-on that laces one slice on your pizza of choice with two drops of "the hottest chili on the planet". Which one? Nobody knows until the poor sap bites into it. Their site even lists a </span><em data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">disclaimer</span></em><span data-dcnode-id="1306" instrument_node=""> when choosing to order it. "It doesn't cost, but someone pays", indeed.
</span></li><li data-dcnode-id="1300"><span data-dcnode-id="1304" instrument_node=""> According to </span><a class="twikilink" data-dcnode-id="1302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wiki/Wikipedia" title="/pmwiki/pmwiki.php/Wiki/Wikipedia"><span data-dcnode-id="1303" instrument_node="">Wikipedia</span></a><span data-dcnode-id="1301" instrument_node="">, a Finnish magician called Aimo Leikas died doing this in front of a crowd, when a magic trick he'd been practicing all went wrong.
</span></li><li data-dcnode-id="1291"><span data-dcnode-id="1299" instrument_node=""> One of the Space Shuttle's abort modes was so risky that it was described as one in the </span><a class="urllink" data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Space_Shuttle_abort_modes"><span data-dcnode-id="1298" instrument_node="">Space Shuttle Abort Modes page</span><img data-dcnode-id="1297" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1295" instrument_node=""> by one of the pilots of STS-1 as stated by </span><a class="twikilink" data-dcnode-id="1293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wiki/Wikipedia" title="/pmwiki/pmwiki.php/Wiki/Wikipedia"><span data-dcnode-id="1294" instrument_node="">Wikipedia</span></a><span data-dcnode-id="1292" instrument_node="">
</span></li><li data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node=""> Korean school children occasionally play a game with a local brand of bubblegum. All are lemon flavored, but one pack in each box super sour.
</span></li><li data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node=""> There was a phone app that let you play this game. You could fill up the gun with as many bullets as you want, spin it, and then pass the phone around to see who has the worst luck.
</span></li><li data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node=""> McDonald's workers in Australia have their own version (called Macca's Roulette), played during slow work days. Refill an empty sauce-gun (newly-filled ones take a few clicks before the sauce shoots through) and take turns shooting it at yourself. Whoever gets hit with a stream of sauce to the face first loses. Variations of the game where you can attempt to shoot another player also exist.
</span></li><li data-dcnode-id="1277"><span data-dcnode-id="1284" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="1282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Toys/NerfBrand" title="/pmwiki/pmwiki.php/Toys/NerfBrand"><span data-dcnode-id="1283" instrument_node="">Nerf</span></a><span data-dcnode-id="1281" instrument_node=""> Maverick, which provides the page image for </span><a class="twikilink" data-dcnode-id="1279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Nerf" title="/pmwiki/pmwiki.php/Main/Nerf"><span data-dcnode-id="1280" instrument_node="">Nerf</span></a><span data-dcnode-id="1278" instrument_node=""> on this very wiki, is styled after a revolver and as such allows one to safely play Russian Roulette without all that messy "potentially killing yourself" business. It appears, however, that Hasbro has cottoned on to this, as all revolver-style Nerf blasters made nowadays feature drums that very plainly let one see if the chambers are loaded.
</span></li><li data-dcnode-id="1271"><span data-dcnode-id="1276" instrument_node=""> A possibly-apocryphal German example involved sausages. Otto von Bismark once challenged </span><a class="urllink" data-dcnode-id="1273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Rudolf_Virchow%23The_Sausage_Duel"><span data-dcnode-id="1275" instrument_node="">Rudolf Virchow</span><img data-dcnode-id="1274" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1272" instrument_node=""> to a duel over a political dispute. Allegedly, Virchow chose sausages as his weapon: One was infected with deadly botulism, one was not. The Chancellor decided that he didn't want to risk eating a toxic sausage and withdrew the challenge.
</span></li><li data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node=""> Another version involves eggs, all of which except one have been boiled and left in their shells. The players take turns smashing the eggs against their foreheads; whoever gets a face-full of raw egg loses.
</span></li><li data-dcnode-id="1257"><span data-dcnode-id="1268" instrument_node=""> Australian criminal '</span><a class="twikilink" data-dcnode-id="1266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Chopper" title="/pmwiki/pmwiki.php/Film/Chopper"><span data-dcnode-id="1267" instrument_node="">Chopper</span></a><span data-dcnode-id="1265" instrument_node="">' Reid did this during an interview with female television journalist Renee Brack, including putting the gun to her head and </span><a class="twikilink" data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItWorksBetterWithBullets" title="/pmwiki/pmwiki.php/Main/ItWorksBetterWithBullets"><span data-dcnode-id="1264" instrument_node="">pulling the trigger</span></a><span data-dcnode-id="1262" instrument_node="">. Thankfully, both survived </span><a class="urllink" data-dcnode-id="1259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DilWYUBjD6po"><span data-dcnode-id="1261" instrument_node="">[1]</span><img data-dcnode-id="1260" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1258" instrument_node="">.
</span></li><li data-dcnode-id="1248"><span data-dcnode-id="1256" instrument_node=""> A 2019 shooting in St. Louis, Missouri involving three cops (two played while the third chastised them for </span><a class="twikilink" data-dcnode-id="1254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JugglingLoadedGuns" title="/pmwiki/pmwiki.php/Main/JugglingLoadedGuns"><span data-dcnode-id="1255" instrument_node="">Juggling Loaded Guns</span></a><span data-dcnode-id="1253" instrument_node=""> like that) </span><a class="urllink" data-dcnode-id="1250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usatoday.com/story/news/nation/2019/01/28/st-louis-police-shooting-katlyn-alix-nathaniel-hendren-russian-roulette/2703352002/"><span data-dcnode-id="1252" instrument_node="">resulted in the death of one officer</span><img data-dcnode-id="1251" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1249" instrument_node="">, with this cited as to why the shooting occurred to begin with. The method they used involved pointing the gun at the other person, rather than their own head.
</span></li><li data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node=""> There exists a story (an urban legend, perhaps?) about a gay variant of the game: ten guys show up to an orgy; one is HIV-positive.
</span></li><li data-dcnode-id="1241"><span data-dcnode-id="1245" instrument_node=""> There's a real-life inversion of sorts, in that all-natural contraception is colloquially known in some traditionally Catholic regions as </span><a class="twikilink" data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/Vatican" title="/pmwiki/pmwiki.php/UsefulNotes/Vatican"><span data-dcnode-id="1244" instrument_node="">"the Vaticanese Roulette"</span></a><span data-dcnode-id="1242" instrument_node="">. See, the joke is that all-natural contraception, while not as bad as you'd expect if you do everything by the book, is still not as good as all the less natural methods which are considered sinful by the Catholic Church...
</span></li></ul></div><span data-dcnode-id="1238" instrument_node="">
