</span></li><li data-dcnode-id="3077"><span data-dcnode-id="3097" instrument_node=""> The climax of the 90s film </span><em data-dcnode-id="3094"><a class="createlink" data-dcnode-id="3095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/OneEightSeven" title="/pmwiki/pmwiki.php/Film/OneEightSeven"><span data-dcnode-id="3096" instrument_node="">187</span></a></em><span data-dcnode-id="3093" instrument_node=""> featured this. In the film, </span><a class="twikilink" data-dcnode-id="3091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/SamuelLJackson" title="/pmwiki/pmwiki.php/Creator/SamuelLJackson"><span data-dcnode-id="3092" instrument_node="">Samuel L. Jackson</span></a><span data-dcnode-id="3090" instrument_node=""> is a substitute teacher at an </span><a class="twikilink" data-dcnode-id="3088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InnerCitySchool" title="/pmwiki/pmwiki.php/Main/InnerCitySchool"><span data-dcnode-id="3089" instrument_node="">Inner City School</span></a><span data-dcnode-id="3087" instrument_node=""> who gets into a dangerous feud with a gang leader. At their final confrontation the gang forces him to play a game of Russian Roulette, referencing the famous </span><em data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">Deer Hunter</span></em><span data-dcnode-id="3084" instrument_node=""> scene. They're unnerved when Jackson begins taking multiple turns without flinching, even giving them a </span><a class="twikilink" data-dcnode-id="3082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech" title="/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech"><span data-dcnode-id="3083" instrument_node="">"The Reason You Suck" Speech</span></a><span data-dcnode-id="3081" instrument_node=""> as he does. At one point the gang leader begins cracking under the weight of the speech and hesitates to pick up the gun when it's his turn, so Jackson's character volunteers to take the gangster's turn... and promptly blows his head off. Since Jackson took his turn and the bullet that would have killed him, the gang leader decides he </span><em data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">has</span></em><span data-dcnode-id="3078" instrument_node=""> to take one more turn now... and promptly blows his head off.
</span></li><li data-dcnode-id="3068"><span data-dcnode-id="3076" instrument_node=""> The R in </span><em data-dcnode-id="3073"><a class="twikilink" data-dcnode-id="3074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/ABCsOfDeath2" title="/pmwiki/pmwiki.php/Film/ABCsOfDeath2"><span data-dcnode-id="3075" instrument_node="">ABCs of Death 2</span></a></em><span data-dcnode-id="3072" instrument_node=""> stands for Roulette, and we see three people partake in a game of it in a basement. When one of them realizes he's the loser, he </span><span class="spoiler" data-dcnode-id="3070" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3071" instrument_node="">shoots his wife instead, to spare her from an apparent worse fate</span></span><span data-dcnode-id="3069" instrument_node="">.
</span></li><li data-dcnode-id="3055"><span data-dcnode-id="3067" instrument_node=""> The Spanish comedy film </span><em data-dcnode-id="3064"><a class="createlink" data-dcnode-id="3065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Airbag" title="/pmwiki/pmwiki.php/Film/Airbag"><span data-dcnode-id="3066" instrument_node="">Airbag</span></a></em><span data-dcnode-id="3063" instrument_node=""> has </span><a class="urllink" data-dcnode-id="3060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DP0Bj-N_3xfY"><span data-dcnode-id="3062" instrument_node="">a scene</span><img data-dcnode-id="3061" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3059" instrument_node=""> with a Russian </span><em data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">omelette</span></em><span data-dcnode-id="3056" instrument_node="">. Five people bringing 15 million pesetas each, five omelettes, four of them made with poison mushrooms, one of them with regular ones. The one left alive walks away with all the money, except the small percentage given to the organisers. (It was a scam, though. The organisers thought nobody would be as stupid as to actually follow with that setup.)
</span></li><li data-dcnode-id="3049"><span data-dcnode-id="3054" instrument_node=""> </span><em data-dcnode-id="3051"><a class="twikilink" data-dcnode-id="3052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/ArizonaDream" title="/pmwiki/pmwiki.php/Film/ArizonaDream"><span data-dcnode-id="3053" instrument_node="">Arizona Dream</span></a></em><span data-dcnode-id="3050" instrument_node="">: Axel has entered Grace's room with a gun, with the apparent intention to shoot her in the head. Not only does Grace dare him to go through with it and mock him for losing his nerve, but she turns it around on him by challenging him to a game, after setting up the bullet in the chamber. And not only does he go through with it, but they both survive and then end up kissing and rolling on the floor. Weirdest seduction ever.
</span></li><li data-dcnode-id="3031"><span data-dcnode-id="3048" instrument_node=""> The climactic scene of the 1988 movie </span><em data-dcnode-id="3045"><a class="createlink" data-dcnode-id="3046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/LaBocaDelLobo" title="/pmwiki/pmwiki.php/Film/LaBocaDelLobo"><span data-dcnode-id="3047" instrument_node="">La Boca del Lobo</span></a></em><span data-dcnode-id="3044" instrument_node=""> (</span><em data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">The Mouth of the Wolf</span></em><span data-dcnode-id="3041" instrument_node="">). The protagonist challenges his army superior, who'd been </span><a class="twikilink" data-dcnode-id="3039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReassignedToAntarctica" title="/pmwiki/pmwiki.php/Main/ReassignedToAntarctica"><span data-dcnode-id="3040" instrument_node="">sent to their remote Peruvian village</span></a><span data-dcnode-id="3038" instrument_node=""> after he killed a fellow officer in a game of Russian Roulette over a woman. In the end they're down to the last chamber, which they </span><em data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">know</span></em><span data-dcnode-id="3035" instrument_node=""> contains the bullet — the man holding the gun has to either back down in disgrace or blow his brains out. </span><span class="spoiler" data-dcnode-id="3033" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3034" instrument_node="">He is unable to pull the trigger.</span></span><span data-dcnode-id="3032" instrument_node="">
</span></li><li data-dcnode-id="3022"><span data-dcnode-id="3030" instrument_node=""> In </span><em data-dcnode-id="3027"><a class="twikilink" data-dcnode-id="3028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheBoondockSaintsIIAllSaintsDay" title="/pmwiki/pmwiki.php/Film/TheBoondockSaintsIIAllSaintsDay"><span data-dcnode-id="3029" instrument_node="">The Boondock Saints II: All Saints Day</span></a></em><span data-dcnode-id="3026" instrument_node="">, Il Duce combines this with </span><a class="twikilink" data-dcnode-id="3024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MexicanStandoff" title="/pmwiki/pmwiki.php/Main/MexicanStandoff"><span data-dcnode-id="3025" instrument_node="">Mexican Standoff</span></a><span data-dcnode-id="3023" instrument_node=""> and uses it as an interrogation technique. Earlier, the MacManus brothers use this to determine whether or not to let a bad guy go.
</span></li><li data-dcnode-id="3010"><span data-dcnode-id="3021" instrument_node=""> At the start of the Russian film </span><em data-dcnode-id="3018"><a class="twikilink" data-dcnode-id="3019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/BurntByTheSun" title="/pmwiki/pmwiki.php/Film/BurntByTheSun"><span data-dcnode-id="3020" instrument_node="">Burnt by the Sun</span></a></em><span data-dcnode-id="3017" instrument_node=""> the protagonist (a secret policemen who's been ordered to arrest a Soviet military hero and his wife — a former </span><a class="twikilink" data-dcnode-id="3015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LoveInterests" title="/pmwiki/pmwiki.php/Main/LoveInterests"><span data-dcnode-id="3016" instrument_node="">Love Interest</span></a><span data-dcnode-id="3014" instrument_node="">) does this with a seven-shot Nagant revolver. He survives, and so carries out his order, killing himself at the end of the movie via the more reliable method of </span><a class="twikilink" data-dcnode-id="3012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BathSuicide" title="/pmwiki/pmwiki.php/Main/BathSuicide"><span data-dcnode-id="3013" instrument_node="">slitting his wrists while in the bathtub</span></a><span data-dcnode-id="3011" instrument_node="">.
</span></li><li data-dcnode-id="2997"><span data-dcnode-id="3009" instrument_node=""> In </span><em data-dcnode-id="3005"><a class="twikilink" data-dcnode-id="3007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/DakotaHarris" title="/pmwiki/pmwiki.php/Film/DakotaHarris"><span data-dcnode-id="3008" instrument_node="">Dakota Harris</span></a><span data-dcnode-id="3006" instrument_node="">,</span></em><span data-dcnode-id="3004" instrument_node=""> the </span><a class="twikilink" data-dcnode-id="3002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AwesomeAussie" title="/pmwiki/pmwiki.php/Main/AwesomeAussie"><span data-dcnode-id="3003" instrument_node="">Awesome Aussie</span></a><span data-dcnode-id="3001" instrument_node=""> protagonist is forced to play Russian Roulette by the patrons of the </span><a class="twikilink" data-dcnode-id="2999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadGuyBar" title="/pmwiki/pmwiki.php/Main/BadGuyBar"><span data-dcnode-id="3000" instrument_node="">Bad-Guy Bar</span></a><span data-dcnode-id="2998" instrument_node="">.
</span></li><li data-dcnode-id="2981"><span data-dcnode-id="2996" instrument_node=""> </span><em data-dcnode-id="2993"><a class="twikilink" data-dcnode-id="2994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheDeerHunter" title="/pmwiki/pmwiki.php/Film/TheDeerHunter"><span data-dcnode-id="2995" instrument_node="">The Deer Hunter</span></a></em><span data-dcnode-id="2992" instrument_node=""> has perhaps the most famous example. Some American soldiers in the Vietnam war are captured and forced to play Russian Roulette at gunpoint for their captors' amusement and to bet on the outcome. Steven panics and turns his gun away from himself, which saves his life as the gun goes off, only to be brutalized by their captors. When Mike and Nick keep surviving, their captors add more bullets to their guns, until the two have enough to suddenly shoot all their captors and escape. </span><span class="spoiler" data-dcnode-id="2987" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2991" instrument_node="">Nick </span><a class="twikilink" data-dcnode-id="2989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShellShockedVeteran" title="/pmwiki/pmwiki.php/Main/ShellShockedVeteran"><span data-dcnode-id="2990" instrument_node="">becomes traumatized by his experiences in the war</span></a><span data-dcnode-id="2988" instrument_node=""> and begins playing Russian Roulette in seedy places for money. It eventually gets him killed</span></span><span data-dcnode-id="2986" instrument_node="">. Scenes in other films featuring Russian Roulette being played by men wearing red headbands are parodies of this film, such as </span><em data-dcnode-id="2983"><a class="twikilink" data-dcnode-id="2984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/MeetTheFeebles" title="/pmwiki/pmwiki.php/Film/MeetTheFeebles"><span data-dcnode-id="2985" instrument_node="">Meet the Feebles</span></a></em><span data-dcnode-id="2982" instrument_node="">, and is the obvious inspiration for the page image.
</span></li><li data-dcnode-id="2968"><span data-dcnode-id="2980" instrument_node=""> Bollywood movie </span><em data-dcnode-id="2976"><a class="twikilink" data-dcnode-id="2978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Dhoom" title="/pmwiki/pmwiki.php/Film/Dhoom"><span data-dcnode-id="2979" instrument_node="">Dhoom</span></a><span data-dcnode-id="2977" instrument_node=""> 2</span></em><span data-dcnode-id="2975" instrument_node=""> has a sexually charged one where Mr A (Hrithik Roshan) forces Sunheri (Aishwarya Rai) to play after </span><span class="spoiler" data-dcnode-id="2970" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2974" instrument_node="">finding out that she had betrayed him. Only it turned out to be </span><a class="twikilink" data-dcnode-id="2972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FalseRoulette" title="/pmwiki/pmwiki.php/Main/FalseRoulette"><span data-dcnode-id="2973" instrument_node="">False Roulette</span></a><span data-dcnode-id="2971" instrument_node=""> and ended in one hell of a kiss. </span></span><span data-dcnode-id="2969" instrument_node="">
</span></li><li data-dcnode-id="2956"><span data-dcnode-id="2967" instrument_node=""> An alternate ending to </span><em data-dcnode-id="2964"><a class="twikilink" data-dcnode-id="2965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/DieHardWithAVengeance" title="/pmwiki/pmwiki.php/Film/DieHardWithAVengeance"><span data-dcnode-id="2966" instrument_node="">Die Hard with a Vengeance</span></a></em><span data-dcnode-id="2963" instrument_node=""> includes John McClane playing a variant of Russian roulette with </span><a class="twikilink" data-dcnode-id="2961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="2962" instrument_node="">Simon Gruber</span></a><span data-dcnode-id="2960" instrument_node=""> using a Chinese rocket launcher without the sights (so no way of telling which end is the muzzle). He asks Simon a series of questions (with them turning the launcher to face the other each time) and eventually asks a question that Simon gets wrong. </span><span class="spoiler" data-dcnode-id="2958" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2959" instrument_node="">Turns out that the answer to the question is that he forgot to bring a flak jacket, which is what McClane is wearing and this would have protected Simon from the blast of the rocket, and the rocket fires on Simon, killing him instantly.</span></span><span data-dcnode-id="2957" instrument_node="">
</span></li><li data-dcnode-id="2950"><span data-dcnode-id="2955" instrument_node=""> In </span><em data-dcnode-id="2952"><a class="twikilink" data-dcnode-id="2953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/DrOttoAndTheRiddleOfTheGloomBeam" title="/pmwiki/pmwiki.php/Film/DrOttoAndTheRiddleOfTheGloomBeam"><span data-dcnode-id="2954" instrument_node="">Dr Otto And The Riddle Of The Gloom Beam</span></a></em><span data-dcnode-id="2951" instrument_node="">, Hardtack has a Russian roulette game. After watching the first click, Lance demands to be the second to play saying that the woman always goes first. He clicks the weapon five times and looks oddly at the pistol to imply that the weapon is empty... then fires to the ceiling causing a panic.
</span></li><li data-dcnode-id="2941"><span data-dcnode-id="2949" instrument_node=""> </span><em data-dcnode-id="2946"><a class="twikilink" data-dcnode-id="2947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/EasternCondors" title="/pmwiki/pmwiki.php/Film/EasternCondors"><span data-dcnode-id="2948" instrument_node="">Eastern Condors</span></a></em><span data-dcnode-id="2945" instrument_node="">: While imprisoned in the </span><a class="twikilink" data-dcnode-id="2943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/POWCamp" title="/pmwiki/pmwiki.php/Main/POWCamp"><span data-dcnode-id="2944" instrument_node="">P.O.W. Camp</span></a><span data-dcnode-id="2942" instrument_node="">, the squad are forced to play Russian roulette by their captors.
</span></li><li data-dcnode-id="2932"><span data-dcnode-id="2940" instrument_node=""> </span><em data-dcnode-id="2937"><a class="twikilink" data-dcnode-id="2938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/EvenLambsHaveTeeth" title="/pmwiki/pmwiki.php/Film/EvenLambsHaveTeeth"><span data-dcnode-id="2939" instrument_node="">Even Lambs Have Teeth</span></a></em><span data-dcnode-id="2936" instrument_node="">: Katie and Sloan inflict a sadistic version of Russian roulette on Sheriff Andrews. Forcing him to pick a hand to see how many bullets go in the gun (he ends up with one), and then pick another hand to see how many shots are fired (he gets five). The girls then take turns pointing the gun at his head and pulling the trigger. </span><span class="spoiler" data-dcnode-id="2934" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2935" instrument_node="">He survives all five shots. They then shoot him anyway.</span></span><span data-dcnode-id="2933" instrument_node="">
</span></li><li data-dcnode-id="2926"><span data-dcnode-id="2931" instrument_node=""> The movie </span><em data-dcnode-id="2928"><a class="createlink" data-dcnode-id="2929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Intacto" title="/pmwiki/pmwiki.php/Film/Intacto"><span data-dcnode-id="2930" instrument_node="">Intacto</span></a></em><span data-dcnode-id="2927" instrument_node="">, which has a premise of luck as a real and transferable property, has two very lucky people playing a form of Russian Roulette. They play with one chamber empty.
</span></li><li data-dcnode-id="2920"><span data-dcnode-id="2925" instrument_node=""> In </span><em data-dcnode-id="2922"><a class="twikilink" data-dcnode-id="2923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/JudasKiss" title="/pmwiki/pmwiki.php/Film/JudasKiss"><span data-dcnode-id="2924" instrument_node="">Judas Kiss</span></a></em><span data-dcnode-id="2921" instrument_node="">, Ruben plays Russian roulette to alleviate his boredom. And because he's not right in the head.
</span></li><li data-dcnode-id="2911"><span data-dcnode-id="2919" instrument_node=""> </span><em data-dcnode-id="2916"><a class="twikilink" data-dcnode-id="2917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/KissKissBangBang" title="/pmwiki/pmwiki.php/Film/KissKissBangBang"><span data-dcnode-id="2918" instrument_node="">Kiss Kiss Bang Bang</span></a></em><span data-dcnode-id="2915" instrument_node=""> has Harry use the game to intimidate a perp into talking. Unfortunately, </span><span class="spoiler" data-dcnode-id="2913" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2914" instrument_node="">Harry rashly decides to chance it and pull the trigger to frighten the perp even more, trusting in probability that it will be an empty chamber. He kills the perp. Oops</span></span><span data-dcnode-id="2912" instrument_node="">.
</span></li><li data-dcnode-id="2905"><span data-dcnode-id="2910" instrument_node=""> </span><em data-dcnode-id="2907"><a class="twikilink" data-dcnode-id="2908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/LAConfidential" title="/pmwiki/pmwiki.php/Film/LAConfidential"><span data-dcnode-id="2909" instrument_node="">L.A. Confidential</span></a></em><span data-dcnode-id="2906" instrument_node=""> has the game used to intimidate a perp into talking.
</span></li><li data-dcnode-id="2896"><span data-dcnode-id="2904" instrument_node=""> </span><em data-dcnode-id="2901"><a class="twikilink" data-dcnode-id="2902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/LifeOfTheParty" title="/pmwiki/pmwiki.php/Film/LifeOfTheParty"><span data-dcnode-id="2903" instrument_node="">Life of the Party</span></a></em><span data-dcnode-id="2900" instrument_node=""> has Michael tossing away five of the bullets and then pulling the trigger of the gun while it's pointed at his friends and himself. The sixth pull has the gun up against his head... </span><span class="spoiler" data-dcnode-id="2898" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2899" instrument_node="">and there's a click, and he reveals that he never loaded the sixth bullet.</span></span><span data-dcnode-id="2897" instrument_node="">
</span></li><li data-dcnode-id="2887"><span data-dcnode-id="2895" instrument_node=""> </span><em data-dcnode-id="2892"><a class="createlink" data-dcnode-id="2893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Live" title="/pmwiki/pmwiki.php/Film/Live"><span data-dcnode-id="2894" instrument_node="">Live</span></a></em><span data-dcnode-id="2891" instrument_node=""> parodies </span><a class="twikilink" data-dcnode-id="2889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RealityTV" title="/pmwiki/pmwiki.php/Main/RealityTV"><span data-dcnode-id="2890" instrument_node="">Reality TV</span></a><span data-dcnode-id="2888" instrument_node=""> by having an American TV executive use this as part of the ultimate ratings winning game show where ordinary people literally gamble their lives for a huge cash prize.
</span></li><li data-dcnode-id="2878"><span data-dcnode-id="2886" instrument_node=""> </span><em data-dcnode-id="2883"><a class="twikilink" data-dcnode-id="2884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/MalcolmX" title="/pmwiki/pmwiki.php/Film/MalcolmX"><span data-dcnode-id="2885" instrument_node="">Malcolm X</span></a></em><span data-dcnode-id="2882" instrument_node=""> features Malcolm playing it with a couple of other hoodlums to determine who would be the leader of their group. In a later scene he admits to a friend that he </span><a class="twikilink" data-dcnode-id="2880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FalseRoulette" title="/pmwiki/pmwiki.php/Main/FalseRoulette"><span data-dcnode-id="2881" instrument_node="">palmed the bullet</span></a><span data-dcnode-id="2879" instrument_node=""> so the gun was unloaded.
</span></li><li data-dcnode-id="2869"><span data-dcnode-id="2877" instrument_node=""> There's a variation in </span><em data-dcnode-id="2874"><a class="twikilink" data-dcnode-id="2875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheMasqueOfTheRedDeath" title="/pmwiki/pmwiki.php/Film/TheMasqueOfTheRedDeath"><span data-dcnode-id="2876" instrument_node="">The Masque of the Red Death</span></a></em><span data-dcnode-id="2873" instrument_node=""> involving daggers: Prince Prospero sets out five daggers on a table, one of which is covered in a poison that will kill in seconds. Francesca's father and boyfriend are forced to take turns cutting themselves with each dagger until one of them dies. </span><span class="spoiler" data-dcnode-id="2871" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2872" instrument_node=""> Francesca's father tries stabbing the prince with the last dagger, but Prospero kills him with a sword before he can make contact. The boyfriend, meanwhile, is forced back into the village where the Red Death is.</span></span><span data-dcnode-id="2870" instrument_node="">
</span></li><li data-dcnode-id="2851"><span data-dcnode-id="2868" instrument_node=""> </span><em data-dcnode-id="2865"><a class="twikilink" data-dcnode-id="2866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Radio/OurMissBrooks" title="/pmwiki/pmwiki.php/Radio/OurMissBrooks"><span data-dcnode-id="2867" instrument_node="">Our Miss Brooks</span></a></em><span data-dcnode-id="2864" instrument_node="">: At the crisis point of </span><a class="twikilink" data-dcnode-id="2862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheMovie" title="/pmwiki/pmwiki.php/Main/TheMovie"><span data-dcnode-id="2863" instrument_node="">The Movie</span></a><span data-dcnode-id="2861" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GrandFinale" title="/pmwiki/pmwiki.php/Main/GrandFinale"><span data-dcnode-id="2860" instrument_node="">Grand Finale</span></a><span data-dcnode-id="2858" instrument_node="">, a depressed Miss Brooks jokingly suggests to Mrs. Davis that they play Russian Roulette when she returns home from school. </span><span class="spoiler" data-dcnode-id="2853" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2857" instrument_node="">Miss Brooks had jumped to the conclusion that Mr. Boynton had bought the house across the street preparatory to giving her a proposal of marriage. Instead, Mr. Boynton had bought the house so his lonely mother could live with him and wasn't proposing marriage. Fortunately, Mrs. Davis fixes matters behind scenes, inviting the elder Mrs. Boynton to be her new boarder. Mrs. Boynton gives her approval to Miss Brooks, leaving a happy Miss Brooks to rush to the zoo to meet Mr. Boynton. There, after eight years of radio, four years on television, and one theatrical grand finale (not to mention a comic book adaption thereof), Mr. Boynton proposes. Mr. Boynton and Mrs. Connie Boynton nee Brooks live </span><a class="twikilink" data-dcnode-id="2855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HappilyEverAfter" title="/pmwiki/pmwiki.php/Main/HappilyEverAfter"><span data-dcnode-id="2856" instrument_node="">Happily Ever After</span></a><span data-dcnode-id="2854" instrument_node="">.</span></span><span data-dcnode-id="2852" instrument_node="">
</span></li><li data-dcnode-id="2842"><span data-dcnode-id="2850" instrument_node=""> </span><em data-dcnode-id="2847"><a class="twikilink" data-dcnode-id="2848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/PiratesOfTheCaribbeanOnStrangerTides" title="/pmwiki/pmwiki.php/Film/PiratesOfTheCaribbeanOnStrangerTides"><span data-dcnode-id="2849" instrument_node="">Pirates of the Caribbean: On Stranger Tides</span></a></em><span data-dcnode-id="2846" instrument_node=""> has a variant; six pistols, four unloaded, two loaded and Jack is ordered to shoot his love interest with them. He argues with Blackbeard over whether the game is </span><a class="twikilink" data-dcnode-id="2844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FalseRoulette" title="/pmwiki/pmwiki.php/Main/FalseRoulette"><span data-dcnode-id="2845" instrument_node="">False Roulette</span></a><span data-dcnode-id="2843" instrument_node="">. When he's convinced that it's real, he takes another other option and jumps off a nearby cliff.
</span></li><li data-dcnode-id="2830"><span data-dcnode-id="2841" instrument_node=""> </span><em data-dcnode-id="2838"><a class="twikilink" data-dcnode-id="2839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheProfessional" title="/pmwiki/pmwiki.php/Film/TheProfessional"><span data-dcnode-id="2840" instrument_node="">The Professional</span></a></em><span data-dcnode-id="2837" instrument_node="">. </span><a class="twikilink" data-dcnode-id="2835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LittleMissBadass" title="/pmwiki/pmwiki.php/Main/LittleMissBadass"><span data-dcnode-id="2836" instrument_node="">Mathilda</span></a><span data-dcnode-id="2834" instrument_node=""> does this to show </span><a class="twikilink" data-dcnode-id="2832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProfessionalKiller" title="/pmwiki/pmwiki.php/Main/ProfessionalKiller"><span data-dcnode-id="2833" instrument_node="">Léon</span></a><span data-dcnode-id="2831" instrument_node=""> she's ready to become a killer and does this with a half-loaded revolver. Léon informs her that the chamber is loaded (he can hear the difference), then knocks her hand away at the last second, which is just as well because the revolver really goes off.
</span></li><li data-dcnode-id="2821"><span data-dcnode-id="2829" instrument_node=""> In </span><em data-dcnode-id="2826"><a class="twikilink" data-dcnode-id="2827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Sholay" title="/pmwiki/pmwiki.php/Film/Sholay"><span data-dcnode-id="2828" instrument_node="">Sholay</span></a></em><span data-dcnode-id="2825" instrument_node="">, Gabbar punishes three subordinates who fail to claim "tribute" from a village by forcing them to play a version of this. He takes a revolver, fires three shots in the air, and then spins the chamber. He aims and pulls the trigger once at each of the three. Each time, it clicks empty. Gabbar starts laughing, </span><span class="spoiler" data-dcnode-id="2823" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2824" instrument_node="">and then shoots all three of the men in quick succession.</span></span><span data-dcnode-id="2822" instrument_node="">
</span></li><li data-dcnode-id="2812"><span data-dcnode-id="2820" instrument_node=""> </span><em data-dcnode-id="2817"><a class="createlink" data-dcnode-id="2818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/SilencoEnLaNieve" title="/pmwiki/pmwiki.php/Film/SilencoEnLaNieve"><span data-dcnode-id="2819" instrument_node="">Silenco En La Nieve</span></a></em><span data-dcnode-id="2816" instrument_node=""> (aka </span><em data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">Frozen Silence</span></em><span data-dcnode-id="2813" instrument_node="">). On the Russian front during WW2, the protagonist discovers a group of Axis soldiers playing roulette and betting on the outcome. One soldier is unable to pull the trigger and flees the scene while booed by the others, even though it was revealed his chamber was loaded.
</span></li><li data-dcnode-id="2794"><span data-dcnode-id="2811" instrument_node=""> In </span><a class="twikilink" data-dcnode-id="2809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/IngmarBergman" title="/pmwiki/pmwiki.php/Creator/IngmarBergman"><span data-dcnode-id="2810" instrument_node="">Ingmar Bergman</span></a><span data-dcnode-id="2808" instrument_node="">'s </span><em data-dcnode-id="2805"><a class="twikilink" data-dcnode-id="2806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/SmilesOfASummerNight" title="/pmwiki/pmwiki.php/Film/SmilesOfASummerNight"><span data-dcnode-id="2807" instrument_node="">Smiles of a Summer Night</span></a></em><span data-dcnode-id="2804" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheNeidermeyer" title="/pmwiki/pmwiki.php/Main/TheNeidermeyer"><span data-dcnode-id="2803" instrument_node="">Count Malcolm</span></a><span data-dcnode-id="2801" instrument_node=""> challenges </span><a class="twikilink" data-dcnode-id="2799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ButtMonkey" title="/pmwiki/pmwiki.php/Main/ButtMonkey"><span data-dcnode-id="2800" instrument_node="">Fredrik</span></a><span data-dcnode-id="2798" instrument_node=""> to one of these, arguing that it's the only form of lethal combat where Fredrik would stand a chance against him. </span><span class="spoiler" data-dcnode-id="2796" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2797" instrument_node="">The gun is only loaded with soot.</span></span><span data-dcnode-id="2795" instrument_node="">
</span></li><li data-dcnode-id="2785"><span data-dcnode-id="2793" instrument_node=""> In </span><em data-dcnode-id="2790"><a class="twikilink" data-dcnode-id="2791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Sonatine" title="/pmwiki/pmwiki.php/Film/Sonatine"><span data-dcnode-id="2792" instrument_node="">Sonatine</span></a></em><span data-dcnode-id="2789" instrument_node="">, Murakawa plays a forced game with two reluctant Yakuza underlings. When it comes to Murakawa's turn on the final chamber, he just smiles and begins to pull the trigger. </span><span class="spoiler" data-dcnode-id="2787" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2788" instrument_node="">It turns out to be empty.</span></span><span data-dcnode-id="2786" instrument_node="">
</span></li><li data-dcnode-id="2776"><span data-dcnode-id="2784" instrument_node=""> </span><em data-dcnode-id="2781"><a class="twikilink" data-dcnode-id="2782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TruthOrDare2012" title="/pmwiki/pmwiki.php/Film/TruthOrDare2012"><span data-dcnode-id="2783" instrument_node="">Truth or Dare (2012)</span></a></em><span data-dcnode-id="2780" instrument_node="">: After catching Jonesy spying, Justin plans to shoot him. When Luke begs for his life, Justin twists the cylinder on his revolver and hands it to Luke. He tells Luke that there are three live and three spent shells in the cylinder: giving Jonesy a 50/50 chance. Luke is to fire and Jonesy, and if the gun does not go off, Jonesy gets to live. Or Luke could could fire at him, but if the gun does not go off, he will not get a second shot. </span><span class="spoiler" data-dcnode-id="2778" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2779" instrument_node="">Luke fires at Jonsey, and Jonsey dies.</span></span><span data-dcnode-id="2777" instrument_node="">
</span></li><li data-dcnode-id="2770"><span data-dcnode-id="2775" instrument_node=""> </span><em data-dcnode-id="2772"><a class="twikilink" data-dcnode-id="2773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TruthOrDare2017" title="/pmwiki/pmwiki.php/Film/TruthOrDare2017"><span data-dcnode-id="2774" instrument_node="">Truth or Dare (2017)</span></a></em><span data-dcnode-id="2771" instrument_node=""> has this played as one of the dares. Predictably, the last time is a live bullet.
</span></li><li data-dcnode-id="2744"><span data-dcnode-id="2769" instrument_node=""> Parodied in the original </span><em data-dcnode-id="2766"><a class="twikilink" data-dcnode-id="2767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/UnfaithfullyYours" title="/pmwiki/pmwiki.php/Film/UnfaithfullyYours"><span data-dcnode-id="2768" instrument_node="">Unfaithfully Yours</span></a></em><span data-dcnode-id="2765" instrument_node="">.
</span><div class="indent" data-dcnode-id="2745"><strong data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">Alfred:</span></strong><span data-dcnode-id="2762" instrument_node=""> Have you ever heard of Russian Roulette? </span><br data-dcnode-id="2761"><strong data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">Daphne De Carter:</span></strong><span data-dcnode-id="2758" instrument_node=""> Why, certainly. I used to play it all the time with my father. </span><br data-dcnode-id="2757"><strong data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">Alfred:</span></strong><span data-dcnode-id="2754" instrument_node=""> I doubt that you played Russian Roulette all the time with your father! </span><br data-dcnode-id="2753"><strong data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">Daphne De Carter:</span></strong><span data-dcnode-id="2750" instrument_node=""> Oh, I most certainly did. You play it with two decks of cards, and... </span><br data-dcnode-id="2749"><strong data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">Alfred:</span></strong><span data-dcnode-id="2746" instrument_node=""> That's Russian Bank. Russian Roulette's a very different amusement which I can only wish your father had played continuously before he had you!
</span></div></li><li data-dcnode-id="2738"><span data-dcnode-id="2743" instrument_node=""> In </span><em data-dcnode-id="2740"><a class="twikilink" data-dcnode-id="2741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheWayOfTheGun" title="/pmwiki/pmwiki.php/Film/TheWayOfTheGun"><span data-dcnode-id="2742" instrument_node="">The Way of the Gun</span></a></em><span data-dcnode-id="2739" instrument_node="">, Abner plays a version of this as a way of possibly committing suicide. He's filled a pillowcase with revolvers and randomly selects one to use in the game, but he gets interrupted before firing.
</span></li></ul></div><span data-dcnode-id="2735" instrument_node="">
</span><p data-dcnode-id="2734"></p><div class="folderlabel" data-dcnode-id="2732" onclick="togglefolder('folder8');"><span data-dcnode-id="2733" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Gamebooks&nbsp;</span></div><div class="folder" data-dcnode-id="2704" id="folder8" isfolder="true" style="display:block;"><span data-dcnode-id="2731" instrument_node="">
</span><ul data-dcnode-id="2705"><li data-dcnode-id="2706"><span data-dcnode-id="2730" instrument_node=""> </span><em data-dcnode-id="2727"><a class="twikilink" data-dcnode-id="2728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/FightingFantasy" title="/pmwiki/pmwiki.php/Literature/FightingFantasy"><span data-dcnode-id="2729" instrument_node="">Fighting Fantasy</span></a></em><span data-dcnode-id="2726" instrument_node="">:
</span><ul data-dcnode-id="2707"><li data-dcnode-id="2714"><span data-dcnode-id="2725" instrument_node=""> In the book </span><em data-dcnode-id="2722"><a class="twikilink" data-dcnode-id="2723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheCitadelOfChaos" title="/pmwiki/pmwiki.php/Literature/TheCitadelOfChaos"><span data-dcnode-id="2724" instrument_node="">The Citadel of Chaos</span></a></em><span data-dcnode-id="2721" instrument_node="">, the player can at one point play Russian Roulette </span><em data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">with daggers</span></em><span data-dcnode-id="2718" instrument_node="">: the player stabs himself with a dagger picked at random from a set of six, with 5 being "trick daggers" whose blade retracts into the hilt and a real dagger. And the prize is an item that is virtually required to finish the book. According to the </span><a class="twikilink" data-dcnode-id="2716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UniverseCompendium" title="/pmwiki/pmwiki.php/Main/UniverseCompendium"><span data-dcnode-id="2717" instrument_node="">Universe Compendium</span></a><span data-dcnode-id="2715" instrument_node="">, this game is known as Kharean Roulette or Knifey-Knifey.
</span></li><li data-dcnode-id="2708"><span data-dcnode-id="2713" instrument_node=""> </span><em data-dcnode-id="2710"><a class="twikilink" data-dcnode-id="2711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/CityOfThieves1983" title="/pmwiki/pmwiki.php/Literature/CityOfThieves1983"><span data-dcnode-id="2712" instrument_node="">City of Thieves</span></a></em><span data-dcnode-id="2709" instrument_node=""> features another version, with pills: five harmless, one poisonous. The reward is simply a respectable amount of gold.
</span></li></ul></li></ul></div><span data-dcnode-id="2703" instrument_node="">
</span><p data-dcnode-id="2702"></p><div class="folderlabel" data-dcnode-id="2700" onclick="togglefolder('folder9');"><span data-dcnode-id="2701" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Jokes&nbsp;</span></div><div class="folder" data-dcnode-id="2692" id="folder9" isfolder="true" style="display:block;"><span data-dcnode-id="2699" instrument_node="">
</span><ul data-dcnode-id="2693"><li data-dcnode-id="2694"><span data-dcnode-id="2698" instrument_node=""> There's a joke about an explorer in </span><a class="twikilink" data-dcnode-id="2696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkestAfrica" title="/pmwiki/pmwiki.php/Main/DarkestAfrica"><span data-dcnode-id="2697" instrument_node="">Darkest Africa</span></a><span data-dcnode-id="2695" instrument_node=""> who explains the game to a local chieftain. The chieftain tells him they have a similar game: you're presented with six beautiful women to spend the night with... and one's a cannibal.
</span></li></ul></div><span data-dcnode-id="2691" instrument_node="">
</span><p data-dcnode-id="2690"></p><div class="folderlabel" data-dcnode-id="2688" onclick="togglefolder('folder10');"><span data-dcnode-id="2689" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Literature&nbsp;</span></div><div class="folder" data-dcnode-id="2547" id="folder10" isfolder="true" style="display:block;"><span data-dcnode-id="2687" instrument_node="">
</span><ul data-dcnode-id="2548"><li data-dcnode-id="2678"><span data-dcnode-id="2686" instrument_node=""> As the title would suggest, the game appears twice in </span><em data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">Russian Roulette</span></em><span data-dcnode-id="2683" instrument_node="">, the prequel to the </span><em data-dcnode-id="2680"><a class="twikilink" data-dcnode-id="2681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/AlexRider" title="/pmwiki/pmwiki.php/Literature/AlexRider"><span data-dcnode-id="2682" instrument_node="">Alex Rider</span></a></em><span data-dcnode-id="2679" instrument_node=""> series that tells the life story of Yassen Gregorovich. Yassen plays the game twice in Vladimir Sharkovsky's office: once with one bullet, the second time with one empty chamber. Not really a spoiler - he survives both.
</span></li><li data-dcnode-id="2660"><span data-dcnode-id="2677" instrument_node=""> In </span><a class="twikilink" data-dcnode-id="2675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/KimNewman" title="/pmwiki/pmwiki.php/Creator/KimNewman"><span data-dcnode-id="2676" instrument_node="">Kim Newman</span></a><span data-dcnode-id="2674" instrument_node="">'s </span><em data-dcnode-id="2671"><a class="twikilink" data-dcnode-id="2672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/DarkFuture" title="/pmwiki/pmwiki.php/Literature/DarkFuture"><span data-dcnode-id="2673" instrument_node="">Dark Future</span></a></em><span data-dcnode-id="2670" instrument_node=""> novel </span><em data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">Krokodil Tears</span></em><span data-dcnode-id="2667" instrument_node="">, the </span><a class="twikilink" data-dcnode-id="2665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrokenBird" title="/pmwiki/pmwiki.php/Main/BrokenBird"><span data-dcnode-id="2666" instrument_node="">main character</span></a><span data-dcnode-id="2664" instrument_node=""> plays Russian Roulette with a cowboy, with two bullets in the gun instead of the usual one. It clicks empty four times, meaning on her turn it's guaranteed to be loaded. She takes her turn anyway... </span><a class="twikilink" data-dcnode-id="2662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MadeOfIron" title="/pmwiki/pmwiki.php/Main/MadeOfIron"><span data-dcnode-id="2663" instrument_node="">and the bullet is stopped by her skull.</span></a><span data-dcnode-id="2661" instrument_node=""> Turns out she was testing her recently-implanted cyborg armor. She then hands the gun back to the other guy to take his turn.
</span></li><li data-dcnode-id="2648"><span data-dcnode-id="2659" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ErastFandorin" title="/pmwiki/pmwiki.php/Literature/ErastFandorin"><span data-dcnode-id="2658" instrument_node="">Erast Fandorin</span></a><span data-dcnode-id="2656" instrument_node=""> plays different variations of it throughout the novels and always wins (obviously), because he is just </span><a class="twikilink" data-dcnode-id="2654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BornLucky" title="/pmwiki/pmwiki.php/Main/BornLucky"><span data-dcnode-id="2655" instrument_node="">Born Lucky</span></a><span data-dcnode-id="2653" instrument_node="">. Notably, the game is referred to as "American Roulette" in the first novel, </span><em data-dcnode-id="2650"><a class="twikilink" data-dcnode-id="2651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheWinterQueen" title="/pmwiki/pmwiki.php/Literature/TheWinterQueen"><span data-dcnode-id="2652" instrument_node="">The Winter Queen</span></a></em><span data-dcnode-id="2649" instrument_node="">. One prominent player even tells his opponent "I'm telling you, because of me and you they will rename it 'Russian Roulette'."
</span></li><li data-dcnode-id="2642"><span data-dcnode-id="2647" instrument_node=""> As noted in the Straight Dope article linked to above, the 19th century Russian novel </span><em data-dcnode-id="2644"><a class="twikilink" data-dcnode-id="2645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/AHeroOfOurTime" title="/pmwiki/pmwiki.php/Literature/AHeroOfOurTime"><span data-dcnode-id="2646" instrument_node="">A Hero of Our Time</span></a></em><span data-dcnode-id="2643" instrument_node=""> has a proto-example of this. A fatalistic Russian officer makes a bet to prove his philosophy, which he does by putting a single-shot pistol to his head and pulling the trigger, and it proceeds to click harmlessly. He then points it to the wall and again pulls the trigger, and this time, it fires.
</span></li><li data-dcnode-id="2615"><span data-dcnode-id="2641" instrument_node=""> One </span><em data-dcnode-id="2638"><a class="twikilink" data-dcnode-id="2639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/JackReacher" title="/pmwiki/pmwiki.php/Literature/JackReacher"><span data-dcnode-id="2640" instrument_node="">Jack Reacher</span></a></em><span data-dcnode-id="2637" instrument_node=""> novel has the </span><a class="twikilink" data-dcnode-id="2635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="2636" instrument_node="">Big Bad</span></a><span data-dcnode-id="2634" instrument_node=""> and Reacher in the same room with a prepped gun. For complicated reasons, Reacher needs to get the </span><a class="twikilink" data-dcnode-id="2632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="2633" instrument_node="">Big Bad</span></a><span data-dcnode-id="2631" instrument_node=""> to trust him. So he exploits the abovementioned 'flaw' in order to win and fires at his own head </span><em data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">five times</span></em><span data-dcnode-id="2628" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GambitRoulette" title="/pmwiki/pmwiki.php/Main/GambitRoulette"><span data-dcnode-id="2627" instrument_node="">betting that the weight of the bullet would have the chamber settle at the bottom.</span></a><span data-dcnode-id="2625" instrument_node=""> Then it was </span><a class="twikilink" data-dcnode-id="2623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SubvertedTrope" title="/pmwiki/pmwiki.php/Main/SubvertedTrope"><span data-dcnode-id="2624" instrument_node="">Subverted</span></a><span data-dcnode-id="2622" instrument_node=""> - </span><span class="spoiler" data-dcnode-id="2617" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2621" instrument_node="">Reacher actually thought the gun </span><a class="twikilink" data-dcnode-id="2619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FalseRoulette" title="/pmwiki/pmwiki.php/Main/FalseRoulette"><span data-dcnode-id="2620" instrument_node="">wasn't loaded</span></a><span data-dcnode-id="2618" instrument_node="">. He still doesn't seem all that bothered to find out that is was.</span></span><span data-dcnode-id="2616" instrument_node="">
</span></li><li data-dcnode-id="2607"><span data-dcnode-id="2614" instrument_node=""> Ed McBain's short story "The Last Spin" has two </span><a class="twikilink" data-dcnode-id="2612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GangBangers" title="/pmwiki/pmwiki.php/Main/GangBangers"><span data-dcnode-id="2613" instrument_node="">Gangbangers</span></a><span data-dcnode-id="2611" instrument_node=""> playing Russian Roulette to the death as a minimum-casualty solution to avert a war. They realise they're similar just before </span><a class="twikilink" data-dcnode-id="2609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownerEnding" title="/pmwiki/pmwiki.php/Main/DownerEnding"><span data-dcnode-id="2610" instrument_node="">one loses</span></a><span data-dcnode-id="2608" instrument_node="">.
</span></li><li data-dcnode-id="2577"><span data-dcnode-id="2606" instrument_node=""> </span><em data-dcnode-id="2603"><a class="twikilink" data-dcnode-id="2604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/MonsterHunterInternational" title="/pmwiki/pmwiki.php/Literature/MonsterHunterInternational"><span data-dcnode-id="2605" instrument_node="">Monster Hunter Alpha</span></a></em><span data-dcnode-id="2602" instrument_node=""> has Earl Harbinger, wanting to test the trustworthiness of his old </span><a class="twikilink" data-dcnode-id="2600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurWerewolvesAreDifferent" title="/pmwiki/pmwiki.php/Main/OurWerewolvesAreDifferent"><span data-dcnode-id="2601" instrument_node="">Werewolf</span></a><span data-dcnode-id="2599" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArchEnemy" title="/pmwiki/pmwiki.php/Main/ArchEnemy"><span data-dcnode-id="2598" instrument_node="">Arch-Enemy</span></a><span data-dcnode-id="2596" instrument_node=""> Nikolai Petrov in him saying </span><a class="twikilink" data-dcnode-id="2594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathSeeker" title="/pmwiki/pmwiki.php/Main/DeathSeeker"><span data-dcnode-id="2595" instrument_node="">he has nothing worth living for anymore</span></a><span data-dcnode-id="2593" instrument_node="">, loading a revolver with one round and give it to Nikolai, telling him that they're gonna play an old favorite of Nikolai's people. Earl then proceeds to have Nikolai put the gun to his head ask Nikolai questions from their past in Vietnam (such as how did Nikolai find Harbinger's base, how he killed a friend of Earl's) and having Nikolai pull the trigger if he gives an answer Earl doesn't like (with Earl holding a fully-loaded Tommy gun not so subtly in Nikolai's direction to make it clear he will cut him in half with a hail of silver bullets if he tries anything funny). Nikolai gets through three pulls while mentally calculating the probabilities of biting the bullet, growing more concerned with each save before Harbinger asks him the last question of </span><a class="twikilink" data-dcnode-id="2591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArmorPiercingQuestion" title="/pmwiki/pmwiki.php/Main/ArmorPiercingQuestion"><span data-dcnode-id="2592" instrument_node="">what does he regret</span></a><span data-dcnode-id="2590" instrument_node="">. Nikolai admits that he regrets having met his dead wife, stating </span><a class="twikilink" data-dcnode-id="2588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TooGoodForThisSinfulEarth" title="/pmwiki/pmwiki.php/Main/TooGoodForThisSinfulEarth"><span data-dcnode-id="2589" instrument_node="">she deserved far better than to love a monster</span></a><span data-dcnode-id="2587" instrument_node=""> and that he was the one who should have died instead before pulling the trigger himself without Harbinger's input and blowing his brains out. </span><span class="spoiler" data-dcnode-id="2579" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2586" instrument_node="">Of course, it turns out </span><a class="twikilink" data-dcnode-id="2584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FalseRoulette" title="/pmwiki/pmwiki.php/Main/FalseRoulette"><span data-dcnode-id="2585" instrument_node="">it was a ''lead'' bullet instead of a silver one</span></a><span data-dcnode-id="2583" instrument_node="">, thus allowing Nikolai to regenerate. It was a </span><a class="twikilink" data-dcnode-id="2581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SecretTestOfCharacter" title="/pmwiki/pmwiki.php/Main/SecretTestOfCharacter"><span data-dcnode-id="2582" instrument_node="">Secret Test of Character</span></a><span data-dcnode-id="2580" instrument_node=""> on Harbinger's part that he passed</span></span><span data-dcnode-id="2578" instrument_node="">.
</span></li><li data-dcnode-id="2557"><span data-dcnode-id="2576" instrument_node=""> </span><em data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">Quiller Balalaika</span></em><span data-dcnode-id="2573" instrument_node=""> by </span><a class="twikilink" data-dcnode-id="2571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/EllestonTrevor" title="/pmwiki/pmwiki.php/Creator/EllestonTrevor"><span data-dcnode-id="2572" instrument_node="">Adam Hall</span></a><span data-dcnode-id="2570" instrument_node="">. A </span><a class="twikilink" data-dcnode-id="2568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheMafiya" title="/pmwiki/pmwiki.php/Main/TheMafiya"><span data-dcnode-id="2569" instrument_node="">Russian Mafia</span></a><span data-dcnode-id="2567" instrument_node=""> boss forces </span><a class="twikilink" data-dcnode-id="2565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Quiller" title="/pmwiki/pmwiki.php/Literature/Quiller"><span data-dcnode-id="2566" instrument_node="">Quiller</span></a><span data-dcnode-id="2564" instrument_node=""> to play this game (after he's already witnessed </span><a class="twikilink" data-dcnode-id="2562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadBoss" title="/pmwiki/pmwiki.php/Main/BadBoss"><span data-dcnode-id="2563" instrument_node="">one of his mooks get killed</span></a><span data-dcnode-id="2561" instrument_node=""> this way) with one bullet and six spins of the chamber. The boss is stunned when Quiller actually survives, and so he orders Quiller to be </span><a class="twikilink" data-dcnode-id="2559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouSaidYouWouldLetThemGo" title="/pmwiki/pmwiki.php/Main/YouSaidYouWouldLetThemGo"><span data-dcnode-id="2560" instrument_node="">taken to the forest and shot the traditional way</span></a><span data-dcnode-id="2558" instrument_node="">.
</span></li><li data-dcnode-id="2549"><span data-dcnode-id="2556" instrument_node=""> There's a short story by </span><a class="twikilink" data-dcnode-id="2554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/Saki" title="/pmwiki/pmwiki.php/Creator/Saki"><span data-dcnode-id="2555" instrument_node="">Saki</span></a><span data-dcnode-id="2553" instrument_node=""> where a man plays Russian Roulette hundreds of times without shooting himself. The man then decides that this must be because he's special and takes up another high risk pastime: hunting vicious animals. </span><span class="spoiler" data-dcnode-id="2551" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2552" instrument_node="">He's fatally mauled, and the narrator reveals that his success in the game was due to the revolver being well-balanced and well-oiled.</span></span><span data-dcnode-id="2550" instrument_node="">
</span></li></ul></div><span data-dcnode-id="2546" instrument_node="">
</span><p data-dcnode-id="2545"></p><div class="folderlabel" data-dcnode-id="2543" onclick="togglefolder('folder11');"><span data-dcnode-id="2544" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Live-Action TV&nbsp;</span></div><div class="folder" data-dcnode-id="2219" id="folder11" isfolder="true" style="display:block;"><span data-dcnode-id="2542" instrument_node="">
</span><ul data-dcnode-id="2220"><li data-dcnode-id="2530"><span data-dcnode-id="2541" instrument_node=""> One segment on </span><em data-dcnode-id="2538"><a class="twikilink" data-dcnode-id="2539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/OneThousandWaysToDie" title="/pmwiki/pmwiki.php/Series/OneThousandWaysToDie"><span data-dcnode-id="2540" instrument_node="">1000 Ways to Die</span></a></em><span data-dcnode-id="2537" instrument_node=""> had three bozos playing a game of Russian Roulette. </span><span class="spoiler" data-dcnode-id="2532" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2536" instrument_node="">Every time one survived a round, they all stomped victoriously, </span><a class="twikilink" data-dcnode-id="2534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BaitAndSwitch" title="/pmwiki/pmwiki.php/Main/BaitAndSwitch"><span data-dcnode-id="2535" instrument_node="">which eventually set off an ages-old landmine their shack happened to be built on</span></a><span data-dcnode-id="2533" instrument_node="">.</span></span><span data-dcnode-id="2531" instrument_node="">
</span></li><li data-dcnode-id="2514"><span data-dcnode-id="2529" instrument_node=""> </span><em data-dcnode-id="2526"><a class="twikilink" data-dcnode-id="2527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TwentyFour" title="/pmwiki/pmwiki.php/Series/TwentyFour"><span data-dcnode-id="2528" instrument_node="">24</span></a></em><span data-dcnode-id="2525" instrument_node="">: Jack Bauer was once captured by some criminals while breaking into a prison. The criminals made Jack and his accomplice, a drug lord Bauer was breaking out of jail play Russian Roulette at gunpoint. Jack </span><em data-dcnode-id="2522"><a class="twikilink" data-dcnode-id="2523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GambitRoulette" title="/pmwiki/pmwiki.php/Main/GambitRoulette"><span data-dcnode-id="2524" instrument_node="">successfully</span></a></em><span data-dcnode-id="2521" instrument_node=""> guesses which chamber contains the bullet, and shoots one of his captors rather than put the gun to his head.
</span><ul data-dcnode-id="2515"><li data-dcnode-id="2516"><span data-dcnode-id="2520" instrument_node=""> Minutes before the Jack and Salazar example above, Jack is forced to play Russian Roulette with one of the prison guards. The guard, who gets the first shot, is crying and scared to pick up the gun until Jack convinces him to play along, at which point the guard picks up the gun, points it at his own head and pulls the trigger. </span><span class="spoiler" data-dcnode-id="2518" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2519" instrument_node="">He dies.</span></span><span data-dcnode-id="2517" instrument_node="">
</span></li></ul></li><li data-dcnode-id="2490"><span data-dcnode-id="2513" instrument_node=""> </span><em data-dcnode-id="2510"><a class="twikilink" data-dcnode-id="2511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Airwolf" title="/pmwiki/pmwiki.php/Series/Airwolf"><span data-dcnode-id="2512" instrument_node="">Airwolf</span></a></em><span data-dcnode-id="2509" instrument_node="">. Played with by </span><a class="twikilink" data-dcnode-id="2507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MadScientist" title="/pmwiki/pmwiki.php/Main/MadScientist"><span data-dcnode-id="2508" instrument_node="">Dr Moffet</span></a><span data-dcnode-id="2506" instrument_node="">, who steals Airwolf in the premiere and flies it to Libya. At one point he does this as </span><a class="twikilink" data-dcnode-id="2504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Exposition" title="/pmwiki/pmwiki.php/Main/Exposition"><span data-dcnode-id="2505" instrument_node="">exposition</span></a><span data-dcnode-id="2503" instrument_node=""> to show Airwolf's </span><a class="twikilink" data-dcnode-id="2501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AchillesHeel" title="/pmwiki/pmwiki.php/Main/AchillesHeel"><span data-dcnode-id="2502" instrument_node="">Achilles' Heel</span></a><span data-dcnode-id="2500" instrument_node=""> — a bullet in the mid-air refueling tube will destroy Airwolf; Moffet pulls the trigger but the chamber is empty (moments later when he pulls the trigger again while </span><a class="twikilink" data-dcnode-id="2498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RemonstratingWithAGun" title="/pmwiki/pmwiki.php/Main/RemonstratingWithAGun"><span data-dcnode-id="2499" instrument_node="">Remonstrating with a Gun</span></a><span data-dcnode-id="2497" instrument_node="">, it goes off). When confronted by Airwolf flown by Stringfellow Hawke at the end of the episode, </span><a class="twikilink" data-dcnode-id="2495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DefiantToTheEnd" title="/pmwiki/pmwiki.php/Main/DefiantToTheEnd"><span data-dcnode-id="2496" instrument_node="">Moffet calmly aims at the tube</span></a><span data-dcnode-id="2494" instrument_node=""> and pulls the trigger. Again the chamber is empty and Stringfellow responds by showing that </span><a class="twikilink" data-dcnode-id="2492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThereIsNoKillLikeOverkill" title="/pmwiki/pmwiki.php/Main/ThereIsNoKillLikeOverkill"><span data-dcnode-id="2493" instrument_node="">There Is No Kill Like Overkill</span></a><span data-dcnode-id="2491" instrument_node="">.
</span></li><li data-dcnode-id="2484"><span data-dcnode-id="2489" instrument_node=""> </span><em data-dcnode-id="2486"><a class="twikilink" data-dcnode-id="2487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/AlienNation" title="/pmwiki/pmwiki.php/Series/AlienNation"><span data-dcnode-id="2488" instrument_node="">Alien Nation</span></a></em><span data-dcnode-id="2485" instrument_node="">. In episode 10, a Russian Roulette-style game with salt water once played on the slave ship resurfaces and plagues the Newcomer society, forcing George to confront his past.
</span></li><li data-dcnode-id="2472"><span data-dcnode-id="2483" instrument_node=""> In </span><em data-dcnode-id="2480"><a class="twikilink" data-dcnode-id="2481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheAndyGriffithShow" title="/pmwiki/pmwiki.php/Series/TheAndyGriffithShow"><span data-dcnode-id="2482" instrument_node="">The Andy Griffith Show</span></a></em><span data-dcnode-id="2479" instrument_node="">, there was was a strange variation of Russian Roulette where neither participant realized they were playing. Sheriff Andy does not allow deputy Barney to hold a loaded gun because Barney </span><a class="twikilink" data-dcnode-id="2477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JugglingLoadedGuns" title="/pmwiki/pmwiki.php/Main/JugglingLoadedGuns"><span data-dcnode-id="2478" instrument_node="">constantly accidentally fires his revolver</span></a><span data-dcnode-id="2476" instrument_node="">. Barney is allowed to keep one bullet in his pocket for emergencies. In one episode, Andy and Barney have a clever criminal locked up in their cell. Barney is the only one left to guard the prisoner and decides to load the one bullet into his revolver. The criminal managed to get Barney's gun, assuming it was fully loaded. Andy returned to the prisoner, and the criminal threatened Andy with it. Andy saw it was Barney's revolver and assumed the gun was empty and tells the criminal to just drop it. The criminal points the gun at Andy and pulls the trigger five times. The revolver doesn't fire, and the criminal gives up. Andy later takes the gun, and shows everyone else how he wasn't in danger by firing the "empty" revolver into the ceiling. </span><a class="twikilink" data-dcnode-id="2474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OhCrap" title="/pmwiki/pmwiki.php/Main/OhCrap"><span data-dcnode-id="2475" instrument_node="">The gun fired and destroyed a lamp.</span></a><span data-dcnode-id="2473" instrument_node="">
</span></li><li data-dcnode-id="2466"><span data-dcnode-id="2471" instrument_node=""> </span><em data-dcnode-id="2468"><a class="twikilink" data-dcnode-id="2469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Banzai" title="/pmwiki/pmwiki.php/Series/Banzai"><span data-dcnode-id="2470" instrument_node="">Banzai</span></a></em><span data-dcnode-id="2467" instrument_node=""> featured variations of this in a couple of gambles that feature the "Wheel of Misfortune" (i.e. Beer Cans, Umbrellas, 5 hard boiled eggs with one real egg, and Hair Mousse).
</span></li><li data-dcnode-id="2454"><span data-dcnode-id="2465" instrument_node=""> </span><em data-dcnode-id="2462"><a class="twikilink" data-dcnode-id="2463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Carnivale" title="/pmwiki/pmwiki.php/Series/Carnivale"><span data-dcnode-id="2464" instrument_node="">Carnivàle</span></a></em><span data-dcnode-id="2461" instrument_node="">. When one of their own is murdered, the carnies tell the killer to pick a number between one and six. When he cautiously picks "3", three bullets are loaded into a revolver, with three pulls of the trigger. </span><span class="spoiler" data-dcnode-id="2456" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2460" instrument_node="">He survives, incredibly enough, and Samson orders the others to let him go despite their protests. Samson does </span><a class="twikilink" data-dcnode-id="2458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShootTheDog" title="/pmwiki/pmwiki.php/Main/ShootTheDog"><span data-dcnode-id="2459" instrument_node="">kill him later</span></a><span data-dcnode-id="2457" instrument_node=""> though.</span></span><span data-dcnode-id="2455" instrument_node="">
</span></li><li data-dcnode-id="2445"><span data-dcnode-id="2453" instrument_node=""> </span><em data-dcnode-id="2450"><a class="twikilink" data-dcnode-id="2451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Castle" title="/pmwiki/pmwiki.php/Series/Castle"><span data-dcnode-id="2452" instrument_node="">Castle</span></a></em><span data-dcnode-id="2449" instrument_node="">: played with in the episode "Hedge Fund Homeboys", in which a group of drunk high schoolers liked </span><em data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">pretending</span></em><span data-dcnode-id="2446" instrument_node=""> to play this, with a real revolver that didn't have any bullets loaded. Except one of them snuck a bullet into the right chamber, to kill another one and make it look like a tragic accident.
</span></li><li data-dcnode-id="2439"><span data-dcnode-id="2444" instrument_node=""> </span><em data-dcnode-id="2441"><a class="twikilink" data-dcnode-id="2442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheCityHunter" title="/pmwiki/pmwiki.php/Series/TheCityHunter"><span data-dcnode-id="2443" instrument_node="">The City Hunter</span></a></em><span data-dcnode-id="2440" instrument_node="">: Jin-pyo uses this as an interrogation method, pulling the trigger each time the subject gives an answer that annoys him (and using up five turns before he gets a real answer).
</span></li><li data-dcnode-id="2433"><span data-dcnode-id="2438" instrument_node=""> </span><em data-dcnode-id="2435"><a class="createlink" data-dcnode-id="2436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Cowards" title="/pmwiki/pmwiki.php/Series/Cowards"><span data-dcnode-id="2437" instrument_node="">Cowards</span></a></em><span data-dcnode-id="2434" instrument_node="">, a rather dark BBC comedy show, featured a sketch that had a group of people playing this at a dinner party. The first five survive but the sixth claims that they have been playing it wrong and they should have spun the chambers before each trigger pull. He is argued down, with hilarious consequences...
</span></li><li data-dcnode-id="2427"><span data-dcnode-id="2432" instrument_node=""> </span><em data-dcnode-id="2429"><a class="twikilink" data-dcnode-id="2430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/CowboyBebop2021" title="/pmwiki/pmwiki.php/Series/CowboyBebop2021"><span data-dcnode-id="2431" instrument_node="">Cowboy Bebop (2021)</span></a></em><span data-dcnode-id="2428" instrument_node="">. In the Season One finale, Julia talks of the terror she felt for years married to Vicious, waking up and wondering if today was the day he was going to kill her. At the end of the episode she has Vicious chained up in the basement. Julia loads a bullet into a revolver, aims it at Vicious and fires...only the gun just clicks and Julia says she'll be back tomorrow to try again.
</span></li><li data-dcnode-id="2421"><span data-dcnode-id="2426" instrument_node=""> </span><em data-dcnode-id="2423"><a class="twikilink" data-dcnode-id="2424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/CriminalMinds" title="/pmwiki/pmwiki.php/Series/CriminalMinds"><span data-dcnode-id="2425" instrument_node="">Criminal Minds</span></a></em><span data-dcnode-id="2422" instrument_node="">: in the episode 'Revelations', an unsub - well, one of the three personalities of an unsub suffering from Dissociative Identity Disorder - kidnaps FBI Special Agent Spencer Reid and tortures him, then adds to the torture with a game of Russian Roulette. Three times, Reid lucks out. The fourth time, as he's standing knee-deep in the grave he's just been forced to dig for himself, he gets the gun away from Hankel and shoots him, without checking to see if the bullet is chambered first. It is.
</span></li><li data-dcnode-id="2412"><span data-dcnode-id="2420" instrument_node=""> </span><em data-dcnode-id="2417"><a class="twikilink" data-dcnode-id="2418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/CSINY" title="/pmwiki/pmwiki.php/Series/CSINY"><span data-dcnode-id="2419" instrument_node="">CSI: NY</span></a></em><span data-dcnode-id="2416" instrument_node=""> has Mac Taylor, our hero, using Russian Roulette as an interrogation technique on a crook who kidnapped his girlfriend. He gets through three chambers before the guy talks. </span><span class="spoiler" data-dcnode-id="2414" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2415" instrument_node="">Turns out he had palmed the last bullet and the gun was empty.</span></span><span data-dcnode-id="2413" instrument_node="">
</span></li><li data-dcnode-id="2403"><span data-dcnode-id="2411" instrument_node=""> </span><em data-dcnode-id="2408"><a class="twikilink" data-dcnode-id="2409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Farscape" title="/pmwiki/pmwiki.php/Series/Farscape"><span data-dcnode-id="2410" instrument_node="">Farscape</span></a></em><span data-dcnode-id="2407" instrument_node=""> episode "Taking The Stone" featured a tribe of thrillseeking kids that play Russian Roulette... with </span><em data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">fungi!</span></em><span data-dcnode-id="2404" instrument_node=""> The mushroom in question grows in clusters of four: three of them get you high, one of them will kill you, and there's no real way to tell which one.
</span></li><li data-dcnode-id="2397"><span data-dcnode-id="2402" instrument_node=""> In an episode of </span><em data-dcnode-id="2399"><a class="twikilink" data-dcnode-id="2400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/FridayThe13thTheSeries" title="/pmwiki/pmwiki.php/Series/FridayThe13thTheSeries"><span data-dcnode-id="2401" instrument_node="">Friday the 13th: The Series</span></a></em><span data-dcnode-id="2398" instrument_node=""> the killer of the week was using the cursed item to win playing Russian Roulette in high-stakes illegal gambling (it created a snake that slowly traveled up the sacrificial victim until killing them), eventually targeting a loved one for his last bout. Unfortunately for him they stop the snake just as he's getting ready to confidently pull the trigger on a revolver now fully loaded (each round they added another bullet) providing some karmic justice.
