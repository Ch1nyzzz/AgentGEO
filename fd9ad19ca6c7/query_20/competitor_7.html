</span></li><li data-dcnode-id="2382"><span data-dcnode-id="2396" instrument_node=""> In </span><em data-dcnode-id="2393"><a class="twikilink" data-dcnode-id="2394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Heroes" title="/pmwiki/pmwiki.php/Series/Heroes"><span data-dcnode-id="2395" instrument_node="">Heroes</span></a></em><span data-dcnode-id="2392" instrument_node="">, Doyle uses his </span><a class="twikilink" data-dcnode-id="2390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PeoplePuppets" title="/pmwiki/pmwiki.php/Main/PeoplePuppets"><span data-dcnode-id="2391" instrument_node="">People Puppets</span></a><span data-dcnode-id="2389" instrument_node=""> power to force Claire, her birth mother Meredith, and her adoptive mother Sandra to play a variation of this, crossed with </span><a class="twikilink" data-dcnode-id="2387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpinTheBottle" title="/pmwiki/pmwiki.php/Main/SpinTheBottle"><span data-dcnode-id="2388" instrument_node="">Spin the Bottle</span></a><span data-dcnode-id="2386" instrument_node="">: he places the gun on the center of the table and spins it. The first time, it points at Claire, so she has to choose which mommy to fire at. She refuses to choose, so he makes her shoot at Meredith - and gets one of the empty chambers. The second time, he spins it twice - once to decide who will fire it, the second one to decide who it's fired at. This leads to Sandra pointing the gun at Claire, which is what really makes the scene unique: she takes this opportunity to try to fire it until she gets the bullet, which </span><a class="twikilink" data-dcnode-id="2384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoodThingYouCanHeal" title="/pmwiki/pmwiki.php/Main/GoodThingYouCanHeal"><span data-dcnode-id="2385" instrument_node="">kills Claire</span></a><span data-dcnode-id="2383" instrument_node="">, freeing her from Doyle's control and allowing her to take him out.
</span></li><li data-dcnode-id="2373"><span data-dcnode-id="2381" instrument_node=""> </span><em data-dcnode-id="2378"><a class="twikilink" data-dcnode-id="2379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/ItsAlwaysSunnyInPhiladelphia" title="/pmwiki/pmwiki.php/Series/ItsAlwaysSunnyInPhiladelphia"><span data-dcnode-id="2380" instrument_node="">It's Always Sunny in Philadelphia</span></a></em><span data-dcnode-id="2377" instrument_node=""> features a scene parodying </span><em data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">The Deer Hunter</span></em><span data-dcnode-id="2374" instrument_node=""> example, where Frank begins hosting matches for gamblers to take part in.
</span></li><li data-dcnode-id="2353"><span data-dcnode-id="2372" instrument_node=""> </span><em data-dcnode-id="2369"><a class="twikilink" data-dcnode-id="2370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/LawAndOrderSVU" title="/pmwiki/pmwiki.php/Series/LawAndOrderSVU"><span data-dcnode-id="2371" instrument_node="">Law &amp; Order: SVU</span></a></em><span data-dcnode-id="2368" instrument_node="">:
</span><ul data-dcnode-id="2362"><li data-dcnode-id="2363"><span data-dcnode-id="2367" instrument_node=""> When Benson and Stabler confront a murderer (who happens to be Russian) in the "Russian Love Poem" episode, he takes the five bullets from his revolver and points it at his chest, punctuating his </span><a class="twikilink" data-dcnode-id="2365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MotiveRant" title="/pmwiki/pmwiki.php/Main/MotiveRant"><span data-dcnode-id="2366" instrument_node="">Motive Rant</span></a><span data-dcnode-id="2364" instrument_node=""> with pulls of the trigger. He gets two clicks before:
</span></li></ul><div class="indent" data-dcnode-id="2357"><span data-dcnode-id="2361" instrument_node="">Nothing hurts me, not even this gun! See how lucky I am? (</span><strong data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">BANG</span></strong><span data-dcnode-id="2358" instrument_node="">)
</span></div><ul data-dcnode-id="2354"><li data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node=""> Michael Lewis, a rapist and murderer, takes Olivia Benson and a girl hostage. Threatening the girl, he forces Olivia to play the game with him.

</span></li><li data-dcnode-id="2329"><span data-dcnode-id="2343" instrument_node=""> </span><em data-dcnode-id="2340"><a class="twikilink" data-dcnode-id="2341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Luther" title="/pmwiki/pmwiki.php/Series/Luther"><span data-dcnode-id="2342" instrument_node="">Luther</span></a></em><span data-dcnode-id="2339" instrument_node=""> forces a </span><a class="twikilink" data-dcnode-id="2337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VillainousBreakdown" title="/pmwiki/pmwiki.php/Main/VillainousBreakdown"><span data-dcnode-id="2338" instrument_node="">Villainous Breakdown</span></a><span data-dcnode-id="2336" instrument_node=""> from a former special forces soldier who is killing police officers, but then has an </span><a class="twikilink" data-dcnode-id="2334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OhCrap" title="/pmwiki/pmwiki.php/Main/OhCrap"><span data-dcnode-id="2335" instrument_node="">Oh, Crap!</span></a><span data-dcnode-id="2333" instrument_node=""> moment when the man empties all but one bullet from his snubnose revolver and starts putting it to their heads and pulling the trigger. </span><span class="spoiler" data-dcnode-id="2331" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2332" instrument_node="">Eventually the killer is down to the last chamber and it's his turn — Luther decks him when he puts the gun to his head to commit suicide.</span></span><span data-dcnode-id="2330" instrument_node="">
</span></li><li data-dcnode-id="2320"><span data-dcnode-id="2328" instrument_node=""> </span><em data-dcnode-id="2325"><a class="twikilink" data-dcnode-id="2326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Numb3rs" title="/pmwiki/pmwiki.php/Series/Numb3rs"><span data-dcnode-id="2327" instrument_node="">NUMB3RS</span></a></em><span data-dcnode-id="2324" instrument_node=""> featured an episode involving a group of gamblers holding a live webcast that featured a tournament of Russian Roulette and people online can bet on who wins. </span><span class="spoiler" data-dcnode-id="2322" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2323" instrument_node="">Turns out that the game had been rigged.</span></span><span data-dcnode-id="2321" instrument_node="">
</span></li><li data-dcnode-id="2305"><span data-dcnode-id="2319" instrument_node=""> </span><em data-dcnode-id="2316"><a class="twikilink" data-dcnode-id="2317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/PersonOfInterest" title="/pmwiki/pmwiki.php/Series/PersonOfInterest"><span data-dcnode-id="2318" instrument_node="">Person of Interest</span></a></em><span data-dcnode-id="2315" instrument_node="">. In "All In" a casino boss captures Team Machine and the POI of the week, a </span><a class="twikilink" data-dcnode-id="2313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CardSharp" title="/pmwiki/pmwiki.php/Main/CardSharp"><span data-dcnode-id="2314" instrument_node="">Card Sharp</span></a><span data-dcnode-id="2312" instrument_node=""> whom he forces to carry out this trope </span><span class="spoiler" data-dcnode-id="2307" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2311" instrument_node="">pointing the revolver at John Reese, Leon Tao and Harold Finch in turn before Reese is able to break free. The casino boss points the revolver at Reese and clicks off every chamber to no effect, as the </span><a class="twikilink" data-dcnode-id="2309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CardSharp" title="/pmwiki/pmwiki.php/Main/CardSharp"><span data-dcnode-id="2310" instrument_node="">Card Sharp</span></a><span data-dcnode-id="2308" instrument_node=""> palmed the bullet</span></span><span data-dcnode-id="2306" instrument_node="">.
</span></li><li data-dcnode-id="2296"><span data-dcnode-id="2304" instrument_node=""> In the </span><em data-dcnode-id="2301"><a class="twikilink" data-dcnode-id="2302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/RedDwarf" title="/pmwiki/pmwiki.php/Series/RedDwarf"><span data-dcnode-id="2303" instrument_node="">Red Dwarf</span></a></em><span data-dcnode-id="2300" instrument_node=""> episode "Cassandra", when the main characters are told (by a computer that sees the future) that Rimmer will die but the rest will survive, Kryten tests their </span><a class="twikilink" data-dcnode-id="2298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlotArmor" title="/pmwiki/pmwiki.php/Main/PlotArmor"><span data-dcnode-id="2299" instrument_node="">Plot Armor</span></a><span data-dcnode-id="2297" instrument_node=""> by loading a gun with one bullet and pointing it at each of them in turn. It clicks empty on each of them... until he reaches Rimmer and shouts, "Duck, sir!" Rimmer ducks as the gun fires.
</span></li><li data-dcnode-id="2290"><span data-dcnode-id="2295" instrument_node=""> On </span><em data-dcnode-id="2292"><a class="twikilink" data-dcnode-id="2293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheRiches" title="/pmwiki/pmwiki.php/Series/TheRiches"><span data-dcnode-id="2294" instrument_node="">The Riches</span></a></em><span data-dcnode-id="2291" instrument_node="">, Wayne/Doug loads one round in a revolver, spins the cylinder, and pulls the trigger on Hugh Panetta, freaking out the man in the process. Doug then reveals he'd actually palmed the bullet to illustrate his point that it's the mark's perception of reality, rather than reality itself, that is necessary for the sell.
</span></li><li data-dcnode-id="2281"><span data-dcnode-id="2289" instrument_node=""> As the name implies, the game show </span><em data-dcnode-id="2286"><a class="twikilink" data-dcnode-id="2287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/RussianRoulette" title="/pmwiki/pmwiki.php/Series/RussianRoulette"><span data-dcnode-id="2288" instrument_node="">Russian Roulette</span></a></em><span data-dcnode-id="2285" instrument_node=""> is loosely styled after the spinning-revolver game. Instead of a revolver, contestants stand on a circle of six trapdoors, and anyone who answers their trivia question wrong must "spin" to see whether they get eliminated. Each question adds a "loaded" drop zone until there are five total, and the last contestant standing plays the </span><a class="twikilink" data-dcnode-id="2283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BonusRound" title="/pmwiki/pmwiki.php/Main/BonusRound"><span data-dcnode-id="2284" instrument_node="">Bonus Round</span></a><span data-dcnode-id="2282" instrument_node=""> — if they answer all the questions correctly, they win $10,000, and can take one last spin (with a number of "loaded" circles correlated with how fast they answered all the questions) to either multiply that to $100,000 or lose it all.
</span></li><li data-dcnode-id="2266"><span data-dcnode-id="2280" instrument_node=""> </span><em data-dcnode-id="2277"><a class="twikilink" data-dcnode-id="2278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Scrubs" title="/pmwiki/pmwiki.php/Series/Scrubs"><span data-dcnode-id="2279" instrument_node="">Scrubs</span></a></em><span data-dcnode-id="2276" instrument_node=""> has </span><a class="twikilink" data-dcnode-id="2274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DrJerk" title="/pmwiki/pmwiki.php/Main/DrJerk"><span data-dcnode-id="2275" instrument_node="">Dr. Cox</span></a><span data-dcnode-id="2273" instrument_node=""> sarcastically suggest it as a suitable activity </span><a class="twikilink" data-dcnode-id="2271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RefugeInAudacity" title="/pmwiki/pmwiki.php/Main/RefugeInAudacity"><span data-dcnode-id="2272" instrument_node="">at a child's birthday party</span></a><span data-dcnode-id="2270" instrument_node="">. Then he advises putting bullets in </span><em data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">all</span></em><span data-dcnode-id="2267" instrument_node=""> the chambers because that way "everybody wins".
</span></li><li data-dcnode-id="2260"><span data-dcnode-id="2265" instrument_node=""> </span><em data-dcnode-id="2262"><a class="twikilink" data-dcnode-id="2263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/ShadesOfBlue" title="/pmwiki/pmwiki.php/Series/ShadesOfBlue"><span data-dcnode-id="2264" instrument_node="">Shades of Blue</span></a></em><span data-dcnode-id="2261" instrument_node="">: Tufo instigates one on Loman in order to intimidate him by giving him a seemingly unloaded revolver. It didn't work since Loman refused to use it.
</span></li><li data-dcnode-id="2251"><span data-dcnode-id="2259" instrument_node=""> In the </span><em data-dcnode-id="2256"><a class="twikilink" data-dcnode-id="2257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TalesFromTheCrypt" title="/pmwiki/pmwiki.php/Series/TalesFromTheCrypt"><span data-dcnode-id="2258" instrument_node="">Tales from the Crypt</span></a></em><span data-dcnode-id="2255" instrument_node=""> episode "</span><a class="twikilink" data-dcnode-id="2253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Recap/TalesFromTheCryptS2E3CuttingCards" title="/pmwiki/pmwiki.php/Recap/TalesFromTheCryptS2E3CuttingCards"><span data-dcnode-id="2254" instrument_node="">Cutting Cards</span></a><span data-dcnode-id="2252" instrument_node="">", two gamblers loathe each other so much that they're willing to play a game of Russian Roulette just for the possibility of the other person dying. They both survive because the round turns out to be a dud.
</span></li><li data-dcnode-id="2245"><span data-dcnode-id="2250" instrument_node=""> In </span><em data-dcnode-id="2247"><a class="twikilink" data-dcnode-id="2248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/ThatMitchellAndWebbLook" title="/pmwiki/pmwiki.php/Series/ThatMitchellAndWebbLook"><span data-dcnode-id="2249" instrument_node="">That Mitchell and Webb Look</span></a></em><span data-dcnode-id="2246" instrument_node="">, two men are shown playing Russian Roulette when the board rotates in "Wordwang." A gunshot sounds just as they disappear from view.
</span></li><li data-dcnode-id="2233"><span data-dcnode-id="2244" instrument_node=""> </span><em data-dcnode-id="2241"><a class="twikilink" data-dcnode-id="2242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Wiseguy" title="/pmwiki/pmwiki.php/Series/Wiseguy"><span data-dcnode-id="2243" instrument_node="">Wiseguy</span></a></em><span data-dcnode-id="2240" instrument_node="">. Mad arms dealer Mel Profitt does this with undercover agent Vinnie Terranova when he finds out Vinnie is sleeping with his sister (whom Mel has his own </span><a class="twikilink" data-dcnode-id="2238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrotherSisterIncest" title="/pmwiki/pmwiki.php/Main/BrotherSisterIncest"><span data-dcnode-id="2239" instrument_node="">incestuous relationship</span></a><span data-dcnode-id="2237" instrument_node=""> with). The gun turns out to be empty. Vinnie pulls out his own revolver which has an </span><a class="twikilink" data-dcnode-id="2235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReliablyUnreliableGuns" title="/pmwiki/pmwiki.php/Main/ReliablyUnreliableGuns"><span data-dcnode-id="2236" instrument_node="">empty chamber under the hammer</span></a><span data-dcnode-id="2234" instrument_node=""> and challenges Mel to his own version, with only a one-in-six chance to live. Mel calls his bluff and Vinnie has to shoot the bullet into the wall.
</span></li><li data-dcnode-id="2221"><span data-dcnode-id="2232" instrument_node=""> </span><em data-dcnode-id="2229"><a class="twikilink" data-dcnode-id="2230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheXFiles" title="/pmwiki/pmwiki.php/Series/TheXFiles"><span data-dcnode-id="2231" instrument_node="">The X-Files</span></a></em><span data-dcnode-id="2228" instrument_node="">. At the climax of "Pusher" a criminal with mind control powers forces Fox Mulder to join him in a game. Mulder is made to "shoot" the criminal, then himself, then is about to shoot Scully when she </span><a class="twikilink" data-dcnode-id="2226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JustForPun" title="/pmwiki/pmwiki.php/Main/JustForPun"><span data-dcnode-id="2227" instrument_node="">triggers</span></a><span data-dcnode-id="2225" instrument_node=""> the fire alarm, distracting the criminal so Mulder can turn the gun on him instead. It turns out </span><em data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">that</span></em><span data-dcnode-id="2222" instrument_node=""> chamber was loaded.
</span></li></ul></div><span data-dcnode-id="2218" instrument_node="">
</span><p data-dcnode-id="2217"></p><div class="folderlabel" data-dcnode-id="2215" onclick="togglefolder('folder12');"><span data-dcnode-id="2216" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Music&nbsp;</span></div><div class="folder" data-dcnode-id="2130" id="folder12" isfolder="true" style="display:block;"><span data-dcnode-id="2214" instrument_node="">
</span><ul data-dcnode-id="2131"><li data-dcnode-id="2206"><span data-dcnode-id="2213" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/Accept" title="/pmwiki/pmwiki.php/Music/Accept"><span data-dcnode-id="2212" instrument_node="">Accept</span></a><span data-dcnode-id="2210" instrument_node="">'s 1985 album was titled </span><em data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">Russian Roulette</span></em><span data-dcnode-id="2207" instrument_node="">. The cover photo showed the band dressed in Russian army uniforms sitting around a table with a pistol lying on it.
</span></li><li data-dcnode-id="2201"><span data-dcnode-id="2205" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/MitchBenn" title="/pmwiki/pmwiki.php/Music/MitchBenn"><span data-dcnode-id="2204" instrument_node="">Mitch Benn</span></a><span data-dcnode-id="2202" instrument_node="">'s song "I'm Still Here" is about a rock star who is trying to die a rock star death, but nothing seems to kill him. One of the things he does is "played Russian Roulette with a fully loaded gun".
</span></li><li data-dcnode-id="2183"><span data-dcnode-id="2200" instrument_node=""> Two rounds of Russian Roulette are played between the </span><a class="twikilink" data-dcnode-id="2198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathSeeker" title="/pmwiki/pmwiki.php/Main/DeathSeeker"><span data-dcnode-id="2199" instrument_node="">Death Seekers</span></a><span data-dcnode-id="2197" instrument_node=""> in the </span><a class="urllink" data-dcnode-id="2194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DSDZC4KQ5i0U"><span data-dcnode-id="2196" instrument_node="">music video (NSFW)</span><img data-dcnode-id="2195" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2193" instrument_node=""> for the </span><em data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">Cyberpunkers</span></em><span data-dcnode-id="2190" instrument_node=""> track, </span><em data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">Fuck the System</span></em><span data-dcnode-id="2187" instrument_node="">. Notably, the "loser" of the second round (who was the "winner" of the first) has a </span><a class="twikilink" data-dcnode-id="2185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DyingSmirk" title="/pmwiki/pmwiki.php/Main/DyingSmirk"><span data-dcnode-id="2186" instrument_node="">shit-eating grin</span></a><span data-dcnode-id="2184" instrument_node=""> when he pulls the trigger that kills him.
</span></li><li data-dcnode-id="2159"><span data-dcnode-id="2182" instrument_node=""> A variation occurs in </span><a class="twikilink" data-dcnode-id="2180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/DMX" title="/pmwiki/pmwiki.php/Music/DMX"><span data-dcnode-id="2181" instrument_node="">DMX</span></a><span data-dcnode-id="2179" instrument_node="">'s "Here We Go Again":
</span><div class="indent" data-dcnode-id="2160"><span data-dcnode-id="2178" instrument_node="">"Wasn't hard for me to get him where I wanted him, confronted him </span><br data-dcnode-id="2177"><span data-dcnode-id="2176" instrument_node="">* bzzzt, click* There is a bullet in one of 'em </span><br data-dcnode-id="2175"><span data-dcnode-id="2174" instrument_node="">Feelin' lucky? *click* Looks like you are </span><br data-dcnode-id="2173"><span data-dcnode-id="2172" instrument_node="">* click-click-click*...Luck ain't goin' too far </span><br data-dcnode-id="2171"><span data-dcnode-id="2170" instrument_node="">What you did was put on another pair of shoes and they just happened to be too big </span><br data-dcnode-id="2169"><span data-dcnode-id="2168" instrument_node="">What you did was stupid, </span><strong data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">real fuckin' stupid</span></strong><span data-dcnode-id="2165" instrument_node=""> </span><br data-dcnode-id="2164"><span data-dcnode-id="2163" instrument_node="">Well, shorty, I gave you a chance, and what'd you do? </span><br data-dcnode-id="2162"><span data-dcnode-id="2161" instrument_node="">Threw it back in my fuckin' face, so fuck you too! *BANG*"
</span></div></li><li data-dcnode-id="2154"><span data-dcnode-id="2158" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/TheGazette" title="/pmwiki/pmwiki.php/Music/TheGazette"><span data-dcnode-id="2157" instrument_node="">The Gazette</span></a><span data-dcnode-id="2155" instrument_node="">'s second album "NIL" has an opening track called "The End," in which the five members can be heard passing a gun around while muttering in English and Japanese. The barrel is spun and a click is heard for each member, and at the end of the song the guitar feedback is cut short with the sound of a shot.
</span></li><li data-dcnode-id="2143"><span data-dcnode-id="2153" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="2151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/KaizersOrchestra" title="/pmwiki/pmwiki.php/Music/KaizersOrchestra"><span data-dcnode-id="2152" instrument_node="">Kaizers Orchestra</span></a><span data-dcnode-id="2150" instrument_node=""> song "Bak Et Halleluja" is the singer confessing to a priest about a game of Russian Roulette he played with a friend. </span><span class="spoiler" data-dcnode-id="2148" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2149" instrument_node="">The friend lost.</span></span><span data-dcnode-id="2147" instrument_node="">
</span><ul data-dcnode-id="2144"><li data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node=""> In addition, their song "Resistansen" mentions Russian Roulette.
</span></li></ul></li><li data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node=""> Jazz pianist David Kikoski has an instrumental called "Russian Roulette".
</span></li><li data-dcnode-id="2132"><span data-dcnode-id="2140" instrument_node=""> "Russian Roulette", </span><a class="twikilink" data-dcnode-id="2138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/Rihanna" title="/pmwiki/pmwiki.php/Music/Rihanna"><span data-dcnode-id="2139" instrument_node="">Rihanna</span></a><span data-dcnode-id="2137" instrument_node="">'s first single from </span><em data-dcnode-id="2134"><a class="twikilink" data-dcnode-id="2135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Music/RatedRRihannaAlbum" title="/pmwiki/pmwiki.php/Music/RatedRRihannaAlbum"><span data-dcnode-id="2136" instrument_node="">Rated R</span></a></em><span data-dcnode-id="2133" instrument_node="">, is from the POV of someone playing for the first time. It even starts and ends with the sound effect of the barrel spinning.

</span><ul data-dcnode-id="2084"><li data-dcnode-id="2097"><span data-dcnode-id="2108" instrument_node=""> </span><a class="urllink" data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.escape-suspense.com/2007/06/the_game.html"><span data-dcnode-id="2107" instrument_node="">"The Game,"</span><img data-dcnode-id="2106" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2104" instrument_node=""> which first aired on </span><em data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">Escape</span></em><span data-dcnode-id="2101" instrument_node=""> and then on </span><em data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">Suspense</span></em><span data-dcnode-id="2098" instrument_node="">, centers around two bored teenage boys who get drunk and decide to play this.
</span></li><li data-dcnode-id="2085"><span data-dcnode-id="2096" instrument_node=""> It was a round on one episode of </span><em data-dcnode-id="2093"><a class="twikilink" data-dcnode-id="2094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Radio/ImSorryIHaventAClue" title="/pmwiki/pmwiki.php/Radio/ImSorryIHaventAClue"><span data-dcnode-id="2095" instrument_node="">I'm Sorry I Haven't a Clue</span></a></em><span data-dcnode-id="2092" instrument_node="">. Including Tim trying five shots and being lucky every time, Barry firing over his shoulder and </span><a class="twikilink" data-dcnode-id="2090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ButtMonkey" title="/pmwiki/pmwiki.php/Main/ButtMonkey"><span data-dcnode-id="2091" instrument_node="">winging Colin Sell</span></a><span data-dcnode-id="2089" instrument_node=""> and Andy Hamilton hitting </span><a class="twikilink" data-dcnode-id="2087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThatPoorCat" title="/pmwiki/pmwiki.php/Main/ThatPoorCat"><span data-dcnode-id="2088" instrument_node="">That Poor Cat</span></a><span data-dcnode-id="2086" instrument_node="">.
</span></li></ul></div><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2081"></p><div class="folderlabel" data-dcnode-id="2079" onclick="togglefolder('folder15');"><span data-dcnode-id="2080" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Tabletop Games&nbsp;</span></div><div class="folder" data-dcnode-id="2039" id="folder15" isfolder="true" style="display:block;"><span data-dcnode-id="2078" instrument_node="">
</span><ul data-dcnode-id="2040"><li data-dcnode-id="2071"><span data-dcnode-id="2077" instrument_node=""> </span><em data-dcnode-id="2073"><a class="urllink" data-dcnode-id="2074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Crocodile_Dentist"><span data-dcnode-id="2076" instrument_node="">Crocodile Dentist</span><img data-dcnode-id="2075" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></em><span data-dcnode-id="2072" instrument_node=""> in which children take turns extracting teeth from a crocodile until they hit the one sore tooth that will cause the croc to get fed up and chomp on your fingers. Teaching children that life is cruel and arbitrary since 1993! (Unless you cheat and test which tooth gives the most resistance, of course.)
</span></li><li data-dcnode-id="2061"><span data-dcnode-id="2070" instrument_node=""> </span><a class="urllink" data-dcnode-id="2067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//boardgamegeek.com/boardgame/7563/jaws"><span data-dcnode-id="2069" instrument_node="">A game</span><img data-dcnode-id="2068" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2066" instrument_node=""> using this mechanism was released in 1975 as a marketing tie-in for a </span><em data-dcnode-id="2063"><a class="twikilink" data-dcnode-id="2064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Jaws" title="/pmwiki/pmwiki.php/Film/Jaws"><span data-dcnode-id="2065" instrument_node="">Jaws</span></a></em><span data-dcnode-id="2062" instrument_node="">. Age 5 and up.
</span></li><li data-dcnode-id="2050"><span data-dcnode-id="2060" instrument_node=""> </span><em data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">Kaba Kick</span></em><span data-dcnode-id="2057" instrument_node=""> features a colorful hippo-shaped gun that releases a foot to kick the losing player in the head.
</span><div class="indent" data-dcnode-id="2051"><span data-dcnode-id="2056" instrument_node=""> </span><a class="urllink" data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.i-mockery.com/shorts/stupid-toys3/"><span data-dcnode-id="2055" instrument_node="">It's Russian Roulette for kids!</span><img data-dcnode-id="2054" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2052" instrument_node="">
</span></div></li><li data-dcnode-id="2041"><span data-dcnode-id="2049" instrument_node=""> </span><em data-dcnode-id="2046"><a class="twikilink" data-dcnode-id="2047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/UnknownArmies" title="/pmwiki/pmwiki.php/TabletopGame/UnknownArmies"><span data-dcnode-id="2048" instrument_node="">Unknown Armies</span></a></em><span data-dcnode-id="2045" instrument_node="">: This is a quick and "easy" way for an Entropomancer to pick up a significant charge. It has to be a legit game, however - if the gun isn't actually loaded, you don't get a charge, even if you played </span><em data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">thinking</span></em><span data-dcnode-id="2042" instrument_node=""> it was loaded.
</span></li></ul></div><span data-dcnode-id="2038" instrument_node="">
</span><p data-dcnode-id="2037"></p><div class="folderlabel" data-dcnode-id="2035" onclick="togglefolder('folder16');"><span data-dcnode-id="2036" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Theatre&nbsp;</span></div><div class="folder" data-dcnode-id="2026" id="folder16" isfolder="true" style="display:block;"><span data-dcnode-id="2034" instrument_node="">
</span><ul data-dcnode-id="2027"><li data-dcnode-id="2028"><span data-dcnode-id="2033" instrument_node=""> Played by Fredrik and Carl-Magnus in </span><em data-dcnode-id="2030"><a class="twikilink" data-dcnode-id="2031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Theatre/ALittleNightMusic" title="/pmwiki/pmwiki.php/Theatre/ALittleNightMusic"><span data-dcnode-id="2032" instrument_node="">A Little Night Music</span></a></em><span data-dcnode-id="2029" instrument_node="">. Fredrik ends up taking a bullet which merely grazes his head, which to Carl-Magnus is just not sporting.
</span></li></ul></div><span data-dcnode-id="2025" instrument_node="">
</span><p data-dcnode-id="2024"></p><div class="folderlabel" data-dcnode-id="2022" onclick="togglefolder('folder17');"><span data-dcnode-id="2023" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Video Games&nbsp;</span></div><div class="folder" data-dcnode-id="1719" id="folder17" isfolder="true" style="display:block;"><span data-dcnode-id="2021" instrument_node="">
</span><ul data-dcnode-id="1720"><li data-dcnode-id="1993"><span data-dcnode-id="2020" instrument_node=""> The one-round, five-chamber variant of the game is played in </span><em data-dcnode-id="2017"><a class="twikilink" data-dcnode-id="2018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/CallOfDutyBlackOps" title="/pmwiki/pmwiki.php/VideoGame/CallOfDutyBlackOps"><span data-dcnode-id="2019" instrument_node="">Call of Duty: Black Ops</span></a></em><span data-dcnode-id="2016" instrument_node="">, between </span><a class="twikilink" data-dcnode-id="2014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheProtagonist" title="/pmwiki/pmwiki.php/Main/TheProtagonist"><span data-dcnode-id="2015" instrument_node="">player character</span></a><span data-dcnode-id="2013" instrument_node=""> Alex Mason, and his friend Sgt. Frank Woods. Forced to play at gunpoint by their Vietcong captors </span><span class="notelabel" data-dcnode-id="2010" onclick="togglenote('note23f90');" style="cursor: pointer;"><sup data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="2005" id="note23f90" isnote="true" onclick="togglenote('note23f90');" style="display: none; cursor: pointer;"><span data-dcnode-id="2009" instrument_node="">in an almost shot by shot recreation of the aforementioned scene in </span><em data-dcnode-id="2006"><a class="twikilink" data-dcnode-id="2007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheDeerHunter" title="/pmwiki/pmwiki.php/Film/TheDeerHunter"><span data-dcnode-id="2008" instrument_node="">The Deer Hunter</span></a></em></span><span data-dcnode-id="2004" instrument_node="">, Woods successfully manages to survive one round (complete with a </span><a class="twikilink" data-dcnode-id="2002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AtomicFBomb" title="/pmwiki/pmwiki.php/Main/AtomicFBomb"><span data-dcnode-id="2003" instrument_node="">loud exclamation of "FUCK!"</span></a><span data-dcnode-id="2001" instrument_node=""> before pulling the trigger), before passing the gun to Mason while telling him "one chance". Mason takes the gun, raises it, and promptly </span><span class="spoiler" data-dcnode-id="1995" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="1999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeAThirdOption" title="/pmwiki/pmwiki.php/Main/TakeAThirdOption"><span data-dcnode-id="2000" instrument_node="">shoots the guard forcing them to play, takes his pistol, and shoots the other guards,</span></a><span data-dcnode-id="1998" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/SugarWiki/MomentOfAwesome" title="/pmwiki/pmwiki.php/SugarWiki/MomentOfAwesome"><span data-dcnode-id="1997" instrument_node="">all in one swift move</span></a></span><span data-dcnode-id="1994" instrument_node="">.
</span></li><li data-dcnode-id="1984"><span data-dcnode-id="1992" instrument_node=""> Lieutenant Hank Anderson from </span><em data-dcnode-id="1989"><a class="twikilink" data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DetroitBecomeHuman" title="/pmwiki/pmwiki.php/VideoGame/DetroitBecomeHuman"><span data-dcnode-id="1991" instrument_node="">Detroit: Become Human</span></a></em><span data-dcnode-id="1988" instrument_node=""> has suicidal tendencies which drive him to drink heavily and, on occasion, play Russian Roulette. At one point, Connor meets with him after he's played a few rounds, and discovers that he coincidentally blacked out from intoxication just before pulling the trigger on the loaded chamber. </span><span class="spoiler" data-dcnode-id="1986" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1987" instrument_node="">In the Kamski ending and the path where he's hostile to Connor, Hank is seen playing once again, and it ultimately leads to his death.</span></span><span data-dcnode-id="1985" instrument_node="">
</span></li><li data-dcnode-id="1968"><span data-dcnode-id="1983" instrument_node=""> In </span><em data-dcnode-id="1980"><a class="twikilink" data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyX2" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyX2"><span data-dcnode-id="1982" instrument_node="">Final Fantasy X-2</span></a></em><span data-dcnode-id="1979" instrument_node="">, the revolver-toting henchman of LeBlanc will instead play this with status effects, and it's always pointed at his enemy. The name of the attack is "Russian Roulette", but the attack is a spun barrel, then shot at one of the people he is facing, giving a random status effect.
</span><ul data-dcnode-id="1969"><li data-dcnode-id="1970"><span data-dcnode-id="1978" instrument_node=""> </span><em data-dcnode-id="1975"><a class="twikilink" data-dcnode-id="1976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/FinalFantasy" title="/pmwiki/pmwiki.php/Franchise/FinalFantasy"><span data-dcnode-id="1977" instrument_node="">Final Fantasy</span></a></em><span data-dcnode-id="1974" instrument_node=""> in general has a recurring Blue Magic "Roulette", which is based on Russian Roulette: a random target is chosen on the battlefield from both friends and foes, and Instant Death is cast on that target. While </span><a class="twikilink" data-dcnode-id="1972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HoistByHisOwnPetard" title="/pmwiki/pmwiki.php/Main/HoistByHisOwnPetard"><span data-dcnode-id="1973" instrument_node="">it can and often does hit the user or one of their allies</span></a><span data-dcnode-id="1971" instrument_node="">, many monsters and bosses are either immune to or healed by it.
</span></li></ul></li><li data-dcnode-id="1962"><span data-dcnode-id="1967" instrument_node=""> </span><em data-dcnode-id="1964"><a class="twikilink" data-dcnode-id="1965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/GodsWillBeWatching" title="/pmwiki/pmwiki.php/VideoGame/GodsWillBeWatching"><span data-dcnode-id="1966" instrument_node="">Gods Will Be Watching</span></a></em><span data-dcnode-id="1963" instrument_node=""> has this used as an interrogation technique during the torture session. Irving holds a gun to Burden's head with one bullet in it, then starts asking questions. "For one in seven chances out of BOOM, what's the answer to my question?"
</span></li><li data-dcnode-id="1953"><span data-dcnode-id="1961" instrument_node=""> The protagonist of </span><em data-dcnode-id="1958"><a class="twikilink" data-dcnode-id="1959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/IllusionOfGaia" title="/pmwiki/pmwiki.php/VideoGame/IllusionOfGaia"><span data-dcnode-id="1960" instrument_node="">Illusion of Gaia</span></a></em><span data-dcnode-id="1957" instrument_node=""> has to play a game similar to Russian Roulette with a set of wine glasses, one of which is poisoned, in order to get the necessary funds to buy desert transportation. Played with, since the protagonist has </span><a class="twikilink" data-dcnode-id="1955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PsychicPowers" title="/pmwiki/pmwiki.php/Main/PsychicPowers"><span data-dcnode-id="1956" instrument_node="">Psychic Powers</span></a><span data-dcnode-id="1954" instrument_node="">, and the other player was suicidal.
</span></li><li data-dcnode-id="1914"><span data-dcnode-id="1952" instrument_node=""> </span><em data-dcnode-id="1949"><a class="twikilink" data-dcnode-id="1950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Killer7" title="/pmwiki/pmwiki.php/VideoGame/Killer7"><span data-dcnode-id="1951" instrument_node="">Killer7</span></a></em><span data-dcnode-id="1948" instrument_node=""> has a climactic game of Russian Roulette between school principal Benjamin Keane and badass assassin Garcian Smith. It doubles as Garcian's </span><a class="twikilink" data-dcnode-id="1946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/SugarWiki/MomentOfAwesome" title="/pmwiki/pmwiki.php/SugarWiki/MomentOfAwesome"><span data-dcnode-id="1947" instrument_node="">Moment of Awesome</span></a><span data-dcnode-id="1945" instrument_node="">, as well: </span><span class="spoiler" data-dcnode-id="1943" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1944" instrument_node="">the gun is passed back and forth between Keane and Garcian, Keane growing constantly more frantic and Garcian remaining calm as ever, until 5 chambers have come up empty; it's the 6th chamber, and Garcian's turn. As Keane starts laughing, Garcian calmly puts the gun to his head, and pulls the trigger... and nothing happens.</span></span><span data-dcnode-id="1942" instrument_node="">
</span><div class="indent" data-dcnode-id="1932"><span data-dcnode-id="1941" instrument_node=""> </span><span class="spoiler" data-dcnode-id="1934" title="you can set spoilers visible by default on your profile"><strong data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">Garcian</span></strong><span data-dcnode-id="1938" instrument_node="">: This gun holds </span><em data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">seven</span></em><span data-dcnode-id="1935" instrument_node=""> bullets. I'm a professional. You can't fool me, old man.</span></span><span data-dcnode-id="1933" instrument_node="">
</span></div><ul data-dcnode-id="1915"><li data-dcnode-id="1916"><span data-dcnode-id="1931" instrument_node=""> It has a rather weird beginning though. Keane promises if Garcian wins, Keane will tell him his secret to picking up any woman in the world. If he loses, Garcian has to kill the President. Think about that for a minute. Keep in mind, though, that in Killer7, dead people seem to have a habit of not staying dead. </span><span class="spoiler" data-dcnode-id="1926" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1930" instrument_node="">Also, Keane </span><em data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">does</span></em><span data-dcnode-id="1927" instrument_node=""> say the secret. It's just that... well...</span></span><span data-dcnode-id="1925" instrument_node="">
</span><dl data-dcnode-id="1917"><dd data-dcnode-id="1918"><div class="indent" data-dcnode-id="1919"><span class="spoiler" data-dcnode-id="1921" title="you can set spoilers visible by default on your profile"><strong data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">Keane:</span></strong><span data-dcnode-id="1922" instrument_node=""> Oh, and by the way, women are all the same! *Bang*</span></span><span data-dcnode-id="1920" instrument_node="">
</span></div></dd></dl></li></ul></li><li data-dcnode-id="1898"><span data-dcnode-id="1913" instrument_node=""> </span><em data-dcnode-id="1909"><a class="twikilink" data-dcnode-id="1911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Lisa" title="/pmwiki/pmwiki.php/VideoGame/Lisa"><span data-dcnode-id="1912" instrument_node="">LISA</span></a><span data-dcnode-id="1910" instrument_node="">: The Painful RPG</span></em><span data-dcnode-id="1908" instrument_node=""> makes this into a </span><a class="twikilink" data-dcnode-id="1906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MiniGame" title="/pmwiki/pmwiki.php/Main/MiniGame"><span data-dcnode-id="1907" instrument_node="">Mini-Game</span></a><span data-dcnode-id="1905" instrument_node="">. Both players have their own gun, and take turns pulling the trigger until one of them finds their bullet first. Can be a good source of </span><a class="twikilink" data-dcnode-id="1903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WeirdCurrency" title="/pmwiki/pmwiki.php/Main/WeirdCurrency"><span data-dcnode-id="1904" instrument_node="">mags</span></a><span data-dcnode-id="1902" instrument_node="">, and you get a decent party member if you survive long enough, but naturally it also means you're gambling with the lives of your party members. It's worth noting that party members killed during this minigame </span><a class="twikilink" data-dcnode-id="1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PermaDeath" title="/pmwiki/pmwiki.php/Main/PermaDeath"><span data-dcnode-id="1901" instrument_node="">leave your party permanently.</span></a><span data-dcnode-id="1899" instrument_node="">
</span></li><li data-dcnode-id="1888"><span data-dcnode-id="1897" instrument_node=""> More than a few </span><em data-dcnode-id="1894"><a class="twikilink" data-dcnode-id="1895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/MarioParty" title="/pmwiki/pmwiki.php/VideoGame/MarioParty"><span data-dcnode-id="1896" instrument_node="">Mario Party</span></a></em><span data-dcnode-id="1893" instrument_node=""> minigames are just non-lethal Russian Roulette setups, typically with ten "chambers" and three "bullets". </span><a class="urllink" data-dcnode-id="1890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mariowiki.com/Pier_Pressure"><span data-dcnode-id="1892" instrument_node="">For example: ten fishing poles, three of which have painful sea urchins attached.</span><img data-dcnode-id="1891" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1889" instrument_node="">
</span></li><li data-dcnode-id="1869"><span data-dcnode-id="1887" instrument_node=""> Revolver Ocelot plays Russian Roulette with three guns juggled simultaneously a few times in </span><em data-dcnode-id="1884"><a class="twikilink" data-dcnode-id="1885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/MetalGearSolid3SnakeEater" title="/pmwiki/pmwiki.php/VideoGame/MetalGearSolid3SnakeEater"><span data-dcnode-id="1886" instrument_node="">Metal Gear Solid 3: Snake Eater</span></a></em><span data-dcnode-id="1883" instrument_node="">. A variation with only two guns, and someone else (namely, Naked Snake) holding the second one, shows up in the final gameplay section before the ending. </span><span class="spoiler" data-dcnode-id="1881" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1882" instrument_node="">That time it turns out the loaded round is a blank.</span></span><span data-dcnode-id="1880" instrument_node="">
</span><ul data-dcnode-id="1870"><li data-dcnode-id="1871"><span data-dcnode-id="1879" instrument_node=""> Also, Ocelot's Russian Roulette shows up in </span><em data-dcnode-id="1876"><a class="twikilink" data-dcnode-id="1877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/TheLastDaysOfFoxhound" title="/pmwiki/pmwiki.php/Webcomic/TheLastDaysOfFoxhound"><span data-dcnode-id="1878" instrument_node="">The Last Days of FOXHOUND</span></a></em><span data-dcnode-id="1875" instrument_node=""> when the characters revisit his memories of the scene from the game. Later, he demonstrates the technique to Psycho Mantis, who is frustrated at not being able to figure out which chamber has the bullet — understandably so, because </span><span class="spoiler" data-dcnode-id="1873" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1874" instrument_node="">The Boss</span></span><span data-dcnode-id="1872" instrument_node=""> chose correctly during the events of MGS3.
</span></li></ul></li><li data-dcnode-id="1861"><span data-dcnode-id="1868" instrument_node=""> The Flash game </span><em data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">Orange Roulette</span></em><span data-dcnode-id="1865" instrument_node=""> is a parody of </span><em data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">The Deer Hunter</span></em><span data-dcnode-id="1862" instrument_node=""> (in movies) involving men with oranges for heads playing against each other. You can choose to try to shoot the opponent on your turn, but if you fail to kill them, you have to take a shot - and you're one pull closer to the bullet. You can also spin the chamber again once a game.
</span></li><li data-dcnode-id="1855"><span data-dcnode-id="1860" instrument_node=""> In </span><em data-dcnode-id="1857"><a class="twikilink" data-dcnode-id="1858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Persona5" title="/pmwiki/pmwiki.php/VideoGame/Persona5"><span data-dcnode-id="1859" instrument_node="">Persona 5</span></a></em><span data-dcnode-id="1856" instrument_node="">, a variant happens at the cultural festival, with a set of takoyaki that has one brightly colored red one that is extremely spicy. Goro ends up eating it in spite of Haru's attempts to warn him.
</span></li><li data-dcnode-id="1834"><span data-dcnode-id="1854" instrument_node=""> The Flash game </span><a class="urllink" data-dcnode-id="1851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.newgrounds.com/portal/view/310598"><span data-dcnode-id="1853" instrument_node="">"Pico vs. Uberkids"</span><img data-dcnode-id="1852" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1850" instrument_node=""> on </span><a class="twikilink" data-dcnode-id="1848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Website/Newgrounds" title="/pmwiki/pmwiki.php/Website/Newgrounds"><span data-dcnode-id="1849" instrument_node="">Newgrounds</span></a><span data-dcnode-id="1847" instrument_node=""> has </span><a class="twikilink" data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Pico" title="/pmwiki/pmwiki.php/VideoGame/Pico"><span data-dcnode-id="1846" instrument_node="">Pico</span></a><span data-dcnode-id="1844" instrument_node=""> suggesting a game of "Rock Paper Scissors Roulette" to compete against the titular Uberkids, reasoning that if their opponents are superior in every way, then a contest of luck is the only way to level the playing field. As you might expect, it combines </span><a class="twikilink" data-dcnode-id="1842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RockPaperScissors" title="/pmwiki/pmwiki.php/Main/RockPaperScissors"><span data-dcnode-id="1843" instrument_node="">Rock–Paper–Scissors</span></a><span data-dcnode-id="1841" instrument_node=""> with Russian Roulette, with the loser of the Rock Paper Scissors match having to try their luck with the revolver. The chamber is not re-spun between turns, so the chance of getting the fatal bullet increases as the game goes on, and if five chambers come up empty during a given round, </span><a class="twikilink" data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheGrimReaper" title="/pmwiki/pmwiki.php/Main/TheGrimReaper"><span data-dcnode-id="1840" instrument_node="">The Grim Reaper</span></a><span data-dcnode-id="1838" instrument_node=""> appears over the loser of the next Rock Paper Scissors match. If Pico loses a Rock Paper Scissors match, he pulls the trigger </span><em data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">twice</span></em><span data-dcnode-id="1835" instrument_node="">, because Pico is crazy.
</span></li><li data-dcnode-id="1823"><span data-dcnode-id="1833" instrument_node=""> </span><em data-dcnode-id="1829"><a class="urllink" data-dcnode-id="1830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gamejolt.com/games/russian-roulette-tournament/219536"><span data-dcnode-id="1832" instrument_node="">Russian Roulette Tournament</span><img data-dcnode-id="1831" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></em><span data-dcnode-id="1828" instrument_node=""> by Virtual Insanity Studio has the player participate in a Russian Roulette tournament. Each match is a 1-V-1. One participant spins the cylinder, then both participants take turns pulling the trigger until one of them dies or folds, with each trigger pull increasing their stress. If a contestant folds, then the next contestant gets to spin the cylinder and the process is repeated. The matches last until one person either dies, folds twice in a row, or their stress meter maxes out, causing them to have a breakdown and lose automatically. The goal is to survive each round (while winning every match isn't required, the player will have to win most of them in order to get enough prize money to advance to the next tier) until the final opponent, with a bonus match at the end against none other than </span><span class="spoiler" data-dcnode-id="1825" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="1826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/ChuckNorris" title="/pmwiki/pmwiki.php/Creator/ChuckNorris"><span data-dcnode-id="1827" instrument_node="">Chuck Norris</span></a></span><span data-dcnode-id="1824" instrument_node="">.
</span></li><li data-dcnode-id="1803"><span data-dcnode-id="1822" instrument_node=""> An indie game on </span><a class="twikilink" data-dcnode-id="1820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/Steam" title="/pmwiki/pmwiki.php/UsefulNotes/Steam"><span data-dcnode-id="1821" instrument_node="">Steam</span></a><span data-dcnode-id="1819" instrument_node=""> entitled "Russian Roulette: One Life" simulates playing the game against a virtual opponent, with the twist that </span><a class="twikilink" data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllDeathsFinal" title="/pmwiki/pmwiki.php/Main/AllDeathsFinal"><span data-dcnode-id="1818" instrument_node="">All Deaths Final</span></a><span data-dcnode-id="1816" instrument_node=""> is taken very seriously: if you die, the game records your score on a gravestone and you can </span><em data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">never play it again</span></em><span data-dcnode-id="1813" instrument_node="">! As in the real-life game, you only get one death and it's for keeps.</span><span class="notelabel" data-dcnode-id="1810" onclick="togglenote('note3ixur');" style="cursor: pointer;"><sup data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1805" id="note3ixur" isnote="true" onclick="togglenote('note3ixur');" style="display: none; cursor: pointer;"><span data-dcnode-id="1809" instrument_node="">There was a </span><a class="twikilink" data-dcnode-id="1807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DownloadableContent" title="/pmwiki/pmwiki.php/Main/DownloadableContent"><span data-dcnode-id="1808" instrument_node="">Downloadable Content</span></a><span data-dcnode-id="1806" instrument_node=""> option available that allowed players to attempt the game again for $5— but only as a ghost, with their scores on a separate leaderboard from the main game.</span></span><span data-dcnode-id="1804" instrument_node="">
</span></li><li data-dcnode-id="1782"><span data-dcnode-id="1802" instrument_node=""> A rather bizarre variation of this crops up in </span><em data-dcnode-id="1799"><a class="twikilink" data-dcnode-id="1800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheSecretWorld" title="/pmwiki/pmwiki.php/VideoGame/TheSecretWorld"><span data-dcnode-id="1801" instrument_node="">The Secret World</span></a></em><span data-dcnode-id="1798" instrument_node="">: Daimon Kiyota challenges his treacherous lieutenant to a game of </span><em data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Fugu roulette,</span></em><span data-dcnode-id="1795" instrument_node=""> with a plate of cooked pufferfish standing in for the revolver; some portions are properly cooked and safe to eat, others are highly toxic. If Daimon wins, he gets the traitor's phone and list of contacts; if the lieutenant wins, he becomes the new head of the Korinto-Kai - and Daimon </span><a class="twikilink" data-dcnode-id="1793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CloudCuckooLander" title="/pmwiki/pmwiki.php/Main/CloudCuckooLander"><span data-dcnode-id="1794" instrument_node="">will come back from the dead and take him out for ice cream</span></a><span data-dcnode-id="1792" instrument_node="">. In the end, the lieutenant can't go through with it even after Daimon takes a headstart of three bites, and is left to slink away in shame - with a warning that the next traitorous act will result in the lieutenant's entire family being treated to a feast. </span><span class="spoiler" data-dcnode-id="1784" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1791" instrument_node="">Once the lieutenant leaves, Kiyota finishes the meal without any ill effects. </span><a class="twikilink" data-dcnode-id="1789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FalseRoulette" title="/pmwiki/pmwiki.php/Main/FalseRoulette"><span data-dcnode-id="1790" instrument_node="">False Roulette</span></a><span data-dcnode-id="1788" instrument_node=""> or </span><a class="twikilink" data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AcquiredPoisonImmunity" title="/pmwiki/pmwiki.php/Main/AcquiredPoisonImmunity"><span data-dcnode-id="1787" instrument_node="">Acquired Poison Immunity</span></a><span data-dcnode-id="1785" instrument_node="">? You decide.</span></span><span data-dcnode-id="1783" instrument_node="">
</span></li><li data-dcnode-id="1776"><span data-dcnode-id="1781" instrument_node=""> In </span><em data-dcnode-id="1778"><a class="twikilink" data-dcnode-id="1779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/SkulTheHeroSlayer" title="/pmwiki/pmwiki.php/VideoGame/SkulTheHeroSlayer"><span data-dcnode-id="1780" instrument_node="">Skul: The Hero Slayer</span></a></em><span data-dcnode-id="1777" instrument_node=""> you can find the Gambler skull with the ability Russian Roulette, when used you fire a gun at your head but because your a skeleton the bullet goes right through your skull and hits enemies on the other side
</span></li><li data-dcnode-id="1770"><span data-dcnode-id="1775" instrument_node=""> In </span><em data-dcnode-id="1772"><a class="twikilink" data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/SpaceQuestVTheNextMutation" title="/pmwiki/pmwiki.php/VideoGame/SpaceQuestVTheNextMutation"><span data-dcnode-id="1774" instrument_node="">Space Quest V</span></a></em><span data-dcnode-id="1771" instrument_node="">, someone suggests Roger Wilco should "go play Romulan Roulette with a hand phaser or something".
</span></li><li data-dcnode-id="1761"><span data-dcnode-id="1769" instrument_node=""> Mentioned in </span><em data-dcnode-id="1766"><a class="twikilink" data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/SplinterCellPandoraTomorrow" title="/pmwiki/pmwiki.php/VideoGame/SplinterCellPandoraTomorrow"><span data-dcnode-id="1768" instrument_node="">Splinter Cell: Pandora Tomorrow</span></a></em><span data-dcnode-id="1765" instrument_node="">, when Sam acquires an aerosol canister of what turns out to be a deadly virus and Lambert tells him they need to bring it to a specialist who can find out what's inside. Sam notes he could just open the canister there and see for himself, and Lambert chastises him by claiming he could also </span><a class="twikilink" data-dcnode-id="1763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TooDumbToLive" title="/pmwiki/pmwiki.php/Main/TooDumbToLive"><span data-dcnode-id="1764" instrument_node="">play Russian roulette with a semi-automatic pistol</span></a><span data-dcnode-id="1762" instrument_node="">.
</span></li><li data-dcnode-id="1748"><span data-dcnode-id="1760" instrument_node=""> </span><em data-dcnode-id="1756"><a class="urllink" data-dcnode-id="1757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kickstarter.com/projects/batslyadams/super-russian-roulette-a-new-party-game-for-the-ne"><span data-dcnode-id="1759" instrument_node="">Super Russian Roulette</span><img data-dcnode-id="1758" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></em><span data-dcnode-id="1755" instrument_node=""> is a Kickstarter-funded </span><a class="twikilink" data-dcnode-id="1753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/NintendoEntertainmentSystem" title="/pmwiki/pmwiki.php/UsefulNotes/NintendoEntertainmentSystem"><span data-dcnode-id="1754" instrument_node="">NES game</span></a><span data-dcnode-id="1752" instrument_node=""> that is basically Russian Roulette played with </span><a class="twikilink" data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LightGunGame" title="/pmwiki/pmwiki.php/Main/LightGunGame"><span data-dcnode-id="1751" instrument_node="">an NES Zapper</span></a><span data-dcnode-id="1749" instrument_node="">.
</span></li><li data-dcnode-id="1742"><span data-dcnode-id="1747" instrument_node=""> </span><em data-dcnode-id="1744"><a class="twikilink" data-dcnode-id="1745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TalesOfPhantasia" title="/pmwiki/pmwiki.php/VideoGame/TalesOfPhantasia"><span data-dcnode-id="1746" instrument_node="">Tales of Phantasia</span></a></em><span data-dcnode-id="1743" instrument_node=""> has Cless engage in a variation of this game. There are two cups, one of which has been poisoned at random. Each person picks a glass, and they drink it. One of them will die.
</span></li><li data-dcnode-id="1733"><span data-dcnode-id="1741" instrument_node=""> In a strange version, in </span><em data-dcnode-id="1738"><a class="twikilink" data-dcnode-id="1739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TalesOfVesperia" title="/pmwiki/pmwiki.php/VideoGame/TalesOfVesperia"><span data-dcnode-id="1740" instrument_node="">Tales of Vesperia</span></a></em><span data-dcnode-id="1737" instrument_node="">, this is done through Flynn's </span><em data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">cooking</span></em><span data-dcnode-id="1734" instrument_node="">. Due to a lack of good taste, he can either create an incredible dish or pure garbage that looks pristine in presentation either way. One skit reveals that he likes to deviate from cooking recipes by sometimes adding too much of one ingredient, explaining why his dishes have a Russian Roulette effect.
</span></li><li data-dcnode-id="1721"><span data-dcnode-id="1732" instrument_node=""> Only mentioned in </span><em data-dcnode-id="1729"><a class="twikilink" data-dcnode-id="1730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheWorldEndsWithYou" title="/pmwiki/pmwiki.php/VideoGame/TheWorldEndsWithYou"><span data-dcnode-id="1731" instrument_node="">The World Ends with You</span></a></em><span data-dcnode-id="1728" instrument_node="">, but it's the first of at least four Reaper Sports</span><span class="notelabel" data-dcnode-id="1725" onclick="togglenote('note4fm34');" style="cursor: pointer;"><sup data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1723" id="note4fm34" isnote="true" onclick="togglenote('note4fm34');" style="display: none; cursor: pointer;"><span data-dcnode-id="1724" instrument_node="">The other three mentioned, all played onscreen, are Hide-and-Seek, Player Hunt, and Tag.</span></span><span data-dcnode-id="1722" instrument_node="">, played by the undead staff running the Reaper's Game when simply earning points loses its shine.
</span></li></ul></div><span data-dcnode-id="1718" instrument_node="">

</span><ul data-dcnode-id="1681"><li data-dcnode-id="1696"><span data-dcnode-id="1713" instrument_node=""> In </span><em data-dcnode-id="1710"><a class="twikilink" data-dcnode-id="1711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VisualNovel/Danganronpa2GoodbyeDespair" title="/pmwiki/pmwiki.php/VisualNovel/Danganronpa2GoodbyeDespair"><span data-dcnode-id="1712" instrument_node="">Danganronpa 2: Goodbye Despair</span></a></em><span data-dcnode-id="1709" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BornLucky" title="/pmwiki/pmwiki.php/Main/BornLucky"><span data-dcnode-id="1708" instrument_node="">Born Lucky</span></a><span data-dcnode-id="1706" instrument_node=""> Nagito Komaeda ends up playing a game of Russian Roulette with himself in order to solve a puzzle. He intentionally makes the game more challenging for himself by leaving one chamber </span><em data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">empty</span></em><span data-dcnode-id="1703" instrument_node=""> instead of one chamber full. </span><span class="spoiler" data-dcnode-id="1698" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1702" instrument_node="">He </span><em data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">still</span></em><span data-dcnode-id="1699" instrument_node=""> wins, and as a reward for winning on the "highest difficulty", he gets a file full of confidential information about his classmates in addition to the standard reward (access to a secret room with weapons and a hidden passage) that the culprit in that chapter got by winning the game with only one bullet loaded.</span></span><span data-dcnode-id="1697" instrument_node="">

</span></li><li data-dcnode-id="1607"><span data-dcnode-id="1618" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Website/Cracked" title="/pmwiki/pmwiki.php/Website/Cracked"><span data-dcnode-id="1617" instrument_node="">Cracked</span></a><span data-dcnode-id="1615" instrument_node=""> </span><a class="urllink" data-dcnode-id="1612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cracked.com/video_18385_worlds-dumbest-movie-villain.html"><span data-dcnode-id="1614" instrument_node="">shows you how to play</span><img data-dcnode-id="1613" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1611" instrument_node=""> if you're </span><a class="twikilink" data-dcnode-id="1609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TooDumbToLive" title="/pmwiki/pmwiki.php/Main/TooDumbToLive"><span data-dcnode-id="1610" instrument_node="">Too Dumb to Live</span></a><span data-dcnode-id="1608" instrument_node="">.

</span></li><li data-dcnode-id="1555"><span data-dcnode-id="1565" instrument_node=""> There is a story circulating on French </span><a class="twikilink" data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TabletopGames" title="/pmwiki/pmwiki.php/Main/TabletopGames"><span data-dcnode-id="1564" instrument_node="">Tabletop Games</span></a><span data-dcnode-id="1562" instrument_node=""> forums about a group of PCs who got captured by slavers. The PC proposed a game of Russian roulette with a semi auto pistol with the slavers' leader stipulating that if the PC won, the party would be freed. The slaver appreciated the joke, and stipulated that the PC had to play first. It turned out the player was </span><a class="twikilink" data-dcnode-id="1560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BornLucky" title="/pmwiki/pmwiki.php/Main/BornLucky"><span data-dcnode-id="1561" instrument_node="">Born Lucky</span></a><span data-dcnode-id="1559" instrument_node="">, and when he attempted to fire, he rolled a failure that resulted in the </span><a class="twikilink" data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReliablyUnreliableGuns" title="/pmwiki/pmwiki.php/Main/ReliablyUnreliableGuns"><span data-dcnode-id="1558" instrument_node="">gun jamming</span></a><span data-dcnode-id="1556" instrument_node="">. Then the PC gave the pistol to the slaver, who checked and double checked that the gun was indeed jammed. The dice were rolled, and the result was "jam cleared, shot fired". The slaver leader's brains were splattered all across the room.
