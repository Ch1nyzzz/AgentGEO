</span><div class="article-content retro-folders" data-dcnode-id="1235" id="main-article"><span data-dcnode-id="3857" instrument_node="">
</span><p data-dcnode-id="3836"><span data-dcnode-id="3855" instrument_node="">
</span><span data-dcnode-id="3853" instrument_node="">
</span><span data-dcnode-id="3851" instrument_node="">
</span><span data-dcnode-id="3849" instrument_node="">
</span><span data-dcnode-id="3847" instrument_node="">
</span><span data-dcnode-id="3845" instrument_node="">
</span><span data-dcnode-id="3843" instrument_node="">
</span><span data-dcnode-id="3841" instrument_node="">
</span><span data-dcnode-id="3839" instrument_node="">
</span><span data-dcnode-id="3837" instrument_node="">
</span></p><div class="quoteright" data-dcnode-id="3833" style="width:350px;"><div class="lazy_load_img_box" data-dcnode-id="3834" style="padding-top:80%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/dogs_playing_russian_roulette.png" border="0" class="embeddedimage" data-dcnode-id="3835" height="280" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/dogs_playing_russian_roulette.png&amp;raw" width="350"></div></div><span data-dcnode-id="3832" instrument_node="">
</span><div class="acaptionright" data-dcnode-id="3830" style="width:350px;"><span data-dcnode-id="3831" instrument_node="">"Six chambers. One bullet. You like those odds?"</span></div><span data-dcnode-id="3829" instrument_node="">
</span><span data-dcnode-id="3827" instrument_node="">
</span><span data-dcnode-id="3825" instrument_node="">
</span><span data-dcnode-id="3823" instrument_node="">
</span><span data-dcnode-id="3821" instrument_node="">
</span><p data-dcnode-id="3820"></p><div class="indent" data-dcnode-id="3807"><em data-dcnode-id="3818"><span data-dcnode-id="3819" instrument_node="">"My father was a judge. That surprises you. He used to make my mother and me watch people being hanged. One day, he said there was too much bad in this world. He took a bullet, put it in his gun, and spun the chamber. Then he took it in turns, clicking it at each of us, until he blew the back of his head off with the final click. Understand this: There is nothing on this Earth that frightens me now. Nothing."</span></em><span data-dcnode-id="3817" instrument_node="">
</span><div class="indent" data-dcnode-id="3808"><span data-dcnode-id="3816" instrument_node="">— </span><strong data-dcnode-id="3814"><span data-dcnode-id="3815" instrument_node="">Herod</span></strong><span data-dcnode-id="3813" instrument_node="">, </span><em data-dcnode-id="3810"><a class="twikilink" data-dcnode-id="3811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheQuickAndTheDead" title="/pmwiki/pmwiki.php/Film/TheQuickAndTheDead"><span data-dcnode-id="3812" instrument_node="">The Quick and the Dead</span></a></em><span data-dcnode-id="3809" instrument_node="">
</span></div></div><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="3801"><span class="ad-caption" data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">Advertisement:</span></span><div data-dcnode-id="3802" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="3799"><span data-dcnode-id="3800" instrument_node="">Russian Roulette: A lethal game of chance for one to six players.
</span></p><p data-dcnode-id="3795"><strong data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">Equipment:</span></strong><span data-dcnode-id="3796" instrument_node="">
</span></p><ul data-dcnode-id="3784"><li data-dcnode-id="3787"><span data-dcnode-id="3794" instrument_node=""> 1 revolver </span><span class="notelabel" data-dcnode-id="3791" onclick="togglenote('note0eytr');" style="cursor: pointer;"><sup data-dcnode-id="3792"><span data-dcnode-id="3793" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="3789" id="note0eytr" isnote="true" onclick="togglenote('note0eytr');" style="display: none; cursor: pointer;"><span data-dcnode-id="3790" instrument_node="">Almost always a six round revolver, but a few revolvers exist that carry more or fewer rounds.</span></span><span data-dcnode-id="3788" instrument_node="">
</span></li><li data-dcnode-id="3785"><span data-dcnode-id="3786" instrument_node=""> 1 round of ammunition
</span></li></ul><p data-dcnode-id="3780"><strong data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node="">Setup:</span></strong><span data-dcnode-id="3781" instrument_node="">
</span></p><ol data-dcnode-id="3769"><li data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node=""> Load one chamber.
</span></li><li data-dcnode-id="3776"><span data-dcnode-id="3777" instrument_node=""> Half-cock the hammer to free the cylinder.
</span></li><li data-dcnode-id="3774"><span data-dcnode-id="3775" instrument_node=""> Spin it.
</span></li><li data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node=""> Fully cock the hammer to stop it.
</span></li><li data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node=""> (Alternative for double-action revolvers) With the cylinder swung out to the side, spin it and slap it back into the frame.
</span></li></ol><p data-dcnode-id="3765"><strong data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node="">Rules:</span></strong><span data-dcnode-id="3766" instrument_node="">
</span></p><ul data-dcnode-id="3758"><li data-dcnode-id="3763"><span data-dcnode-id="3764" instrument_node=""> Each player, in turn, puts the gun to his head and pulls the trigger.
</span></li><li data-dcnode-id="3761"><span data-dcnode-id="3762" instrument_node=""> First player to die loses.
</span></li><li data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node=""> Portrayals of the game differ as to whether the cylinder is spun after each trigger pull. If it is, the game can continue indefinitely with a 1 in 6 chance of hitting the loaded chamber each time. If not, there are a maximum of 5 chances to not die, the odds increasing by one with every pull of the trigger, assuming the cylinder has 6 chambers and the ammunition round isn't a dud.
</span></li></ul><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="3752"><span class="ad-caption" data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">Advertisement:</span></span><div data-dcnode-id="3753" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="3743"><strong data-dcnode-id="3750"><span data-dcnode-id="3751" instrument_node="">History:</span></strong><span data-dcnode-id="3749" instrument_node=""> </span><br data-dcnode-id="3748"><span data-dcnode-id="3747" instrument_node="">The game was allegedly invented by the Russians either during </span><a class="twikilink" data-dcnode-id="3745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/WorldWarI" title="/pmwiki/pmwiki.php/UsefulNotes/WorldWarI"><span data-dcnode-id="3746" instrument_node="">World War I</span></a><span data-dcnode-id="3744" instrument_node=""> or by those assigned to Siberia. If the latter, to deal with the extreme boredom, as their assignment was often referred to as 'counting trees', while the former was to try and get out of the extremely bloody and inglorious war. There is no indication, however, that this is true (as such outlandish behaviour would have most likely been recorded as suicides, and duels were usually described in length), as the first mention of this game (as well as the name 'Russian roulette' itself) appears in a 1937 short story of the same title by Georges Sundez, a Frenchman. Also, the most common revolver issued by the Russian army at the time had a cylinder that could not be freely spun (and also had seven chambers, but that's not really important).
</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="3737"><span class="ad-caption" data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">Advertisement:</span></span><div data-dcnode-id="3738" id="proper-ad-tvtropes_mobile_ad_3"></div></div><p data-dcnode-id="3726"><span data-dcnode-id="3736" instrument_node="">Today, it's seen as the one of the </span><a class="twikilink" data-dcnode-id="3734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RatedMForManly" title="/pmwiki/pmwiki.php/Main/RatedMForManly"><span data-dcnode-id="3735" instrument_node="">more manly stunts available</span></a><span data-dcnode-id="3733" instrument_node=""> because of the risks involved, reduced somewhat by the common one-round-six-chambers setup. Perfect for proving you're not afraid to (</span><a class="twikilink" data-dcnode-id="3731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathSeeker" title="/pmwiki/pmwiki.php/Main/DeathSeeker"><span data-dcnode-id="3732" instrument_node="">or want to</span></a><span data-dcnode-id="3730" instrument_node="">) die, you're a real man, or you're just </span><a class="twikilink" data-dcnode-id="3728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TooDumbToLive" title="/pmwiki/pmwiki.php/Main/TooDumbToLive"><span data-dcnode-id="3729" instrument_node="">Too Dumb to Live</span></a><span data-dcnode-id="3727" instrument_node="">.
</span></p><p data-dcnode-id="3721"><span data-dcnode-id="3725" instrument_node="">Some claim that if the original game existed, it could be a largely harmless entertainment — if there is a single round and a gun is well-oiled, the full chamber will end at the bottom. Be that as it may, it remains an obvious case of </span><a class="twikilink" data-dcnode-id="3723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RecklessGunUsage" title="/pmwiki/pmwiki.php/Main/RecklessGunUsage"><span data-dcnode-id="3724" instrument_node="">Reckless Gun Usage</span></a><span data-dcnode-id="3722" instrument_node="">.
</span></p><p data-dcnode-id="3716"><span data-dcnode-id="3720" instrument_node="">It can also be used to </span><a class="twikilink" data-dcnode-id="3718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PerpSweating" title="/pmwiki/pmwiki.php/Main/PerpSweating"><span data-dcnode-id="3719" instrument_node="">scare information out of prisoners</span></a><span data-dcnode-id="3717" instrument_node="">, as a form of psychological torture.
</span></p><p data-dcnode-id="3703"><span data-dcnode-id="3715" instrument_node="">Need we say it: </span><a class="twikilink" data-dcnode-id="3713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DontTryThisAtHome" title="/pmwiki/pmwiki.php/Main/DontTryThisAtHome"><span data-dcnode-id="3714" instrument_node="">Don't Try This at Home</span></a><span data-dcnode-id="3712" instrument_node="">. Besides the obvious risk to your life if you lose, if you play with others, you can be charged with murder if someone dies (at least in </span><a class="twikilink" data-dcnode-id="3710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/TheCommonLaw" title="/pmwiki/pmwiki.php/UsefulNotes/TheCommonLaw"><span data-dcnode-id="3711" instrument_node="">common-law jurisdictions</span></a><span data-dcnode-id="3709" instrument_node="">, under the theory of depraved-heart/grossly reckless murder — see for instance the Pennsylvania case </span><em data-dcnode-id="3705"><a class="urllink" data-dcnode-id="3706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Commonwealth_v._Malone"><span data-dcnode-id="3708" instrument_node="">Commonwealth v. Malone</span><img data-dcnode-id="3707" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></em><span data-dcnode-id="3704" instrument_node="">), and in some jurisdictions, you can be tried for attempted murder even if everyone lives. One notable case in 1984 was American actor Jon-Erik Hexum, who died as a result of a Russian roulette stunt, despite only loading the revolver with blanks. Despite Hexum's belief that this made it harmless, the overpressure wave from the discharge of the blank propelled the round's wadding into his temple, shattering his skull and causing brain trauma. Six days later, he was declared brain dead and was taken off life support.
</span></p><p data-dcnode-id="3682"><span data-dcnode-id="3702" instrument_node="">See also </span><a class="twikilink" data-dcnode-id="3700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FalseRoulette" title="/pmwiki/pmwiki.php/Main/FalseRoulette"><span data-dcnode-id="3701" instrument_node="">False Roulette</span></a><span data-dcnode-id="3699" instrument_node="">. A form of </span><a class="twikilink" data-dcnode-id="3697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameOfChicken" title="/pmwiki/pmwiki.php/Main/GameOfChicken"><span data-dcnode-id="3698" instrument_node="">Game of Chicken</span></a><span data-dcnode-id="3696" instrument_node="">. For the wider trope of lethal "games" that don't involve handguns, see </span><a class="twikilink" data-dcnode-id="3694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbsurdlyHighStakesGame" title="/pmwiki/pmwiki.php/Main/AbsurdlyHighStakesGame"><span data-dcnode-id="3695" instrument_node="">Absurdly High-Stakes Game</span></a><span data-dcnode-id="3693" instrument_node="">. </span><a class="twikilink" data-dcnode-id="3691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wiki/Wikipedia" title="/pmwiki/pmwiki.php/Wiki/Wikipedia"><span data-dcnode-id="3692" instrument_node="">Wikipedia</span></a><span data-dcnode-id="3690" instrument_node=""> also </span><a class="urllink" data-dcnode-id="3687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Russian_roulette_in_popular_culture"><span data-dcnode-id="3689" instrument_node="">has an article</span><img data-dcnode-id="3688" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3686" instrument_node="">. One of the reasons why </span><a class="twikilink" data-dcnode-id="3684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RevolversAreJustBetter" title="/pmwiki/pmwiki.php/Main/RevolversAreJustBetter"><span data-dcnode-id="3685" instrument_node="">Revolvers Are Just Better</span></a><span data-dcnode-id="3683" instrument_node="">.
</span></p><p data-dcnode-id="3681"></p><hr data-dcnode-id="3680"><h2 data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">Examples:</span></h2><span data-dcnode-id="3677" instrument_node="">
</span><p data-dcnode-id="3676"></p><div class="folderlabel toggle-all-folders-button" data-dcnode-id="3674" onclick="toggleAllFolders();"><span data-dcnode-id="3675" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;open/close all folders&nbsp; </span></div><span data-dcnode-id="3673" instrument_node="">
</span><p data-dcnode-id="3672"></p><div class="folderlabel" data-dcnode-id="3670" onclick="togglefolder('folder0');"><span data-dcnode-id="3671" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Advertising&nbsp;</span></div><div class="folder" data-dcnode-id="3634" id="folder0" isfolder="true" style="display:block;"><span data-dcnode-id="3669" instrument_node="">
</span><ul data-dcnode-id="3635"><li data-dcnode-id="3656"><span data-dcnode-id="3668" instrument_node=""> This trope is often invoked for the British chocolate Revels. Each packet has a mix of flavors, and you can't tell which one is which. An </span><a class="urllink" data-dcnode-id="3665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D7XIa3C4a2Lw"><span data-dcnode-id="3667" instrument_node="">advert parodied</span><img data-dcnode-id="3666" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3664" instrument_node=""> </span><em data-dcnode-id="3661"><a class="twikilink" data-dcnode-id="3662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheDeerHunter" title="/pmwiki/pmwiki.php/Film/TheDeerHunter"><span data-dcnode-id="3663" instrument_node="">The Deer Hunter</span></a></em><span data-dcnode-id="3660" instrument_node=""> by having a guy face off against a Vietnamese opponent Russian Roulette-style. He gets orange flavor, to the joy of his opponents, but it is revealed that he "likes orange" and smiles as his opponent screams in agony as he gets a coffee sweet.
</span><ul data-dcnode-id="3657"><li data-dcnode-id="3658"><span data-dcnode-id="3659" instrument_node=""> Possibly inspired by the stand-up comic Jasper Carrott, who had a line in his routine about how the other kids at school made him play a very similar version of this game after they found out he was allergic to peanuts. (He was probably making it up. I hope.)
</span></li></ul></li><li data-dcnode-id="3647"><span data-dcnode-id="3655" instrument_node=""> </span><a class="urllink" data-dcnode-id="3652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DCSBbRkZKOd0"><span data-dcnode-id="3654" instrument_node="">This</span><img data-dcnode-id="3653" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3651" instrument_node=""> old British </span><a class="twikilink" data-dcnode-id="3649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PublicServiceAnnouncement" title="/pmwiki/pmwiki.php/Main/PublicServiceAnnouncement"><span data-dcnode-id="3650" instrument_node="">Public Service Announcement</span></a><span data-dcnode-id="3648" instrument_node=""> uses it as a metaphor for driving without a seatbelt.
</span></li><li data-dcnode-id="3636"><span data-dcnode-id="3646" instrument_node=""> Parodied in one commercial about gambling etiquette. A large guy is sitting by a kitchen table, and he puts the gun against his head with 1 in 6 bullets, and wins. He's combined it with </span><a class="twikilink" data-dcnode-id="3644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StripPoker" title="/pmwiki/pmwiki.php/Main/StripPoker"><span data-dcnode-id="3645" instrument_node="">Strip Poker</span></a><span data-dcnode-id="3643" instrument_node="">, as an attractive woman then takes off a piece of her clothing. He keeps making bigger gambles, eventually winning even with 5 in 6 bullets. The woman insinuates that she'll sleep with him if he keeps on gambling, and he </span><a class="twikilink" data-dcnode-id="3641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TooDumbToLive" title="/pmwiki/pmwiki.php/Main/TooDumbToLive"><span data-dcnode-id="3642" instrument_node="">puts in the last bullet and prepares to shoot as he says he's "feeling lucky"</span></a><span data-dcnode-id="3640" instrument_node="">. The screen cuts to black as the caption says that good poker players </span><a class="twikilink" data-dcnode-id="3638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KnowWhenToFoldEm" title="/pmwiki/pmwiki.php/Main/KnowWhenToFoldEm"><span data-dcnode-id="3639" instrument_node="">should know when to fold</span></a><span data-dcnode-id="3637" instrument_node="">.
</span></li></ul></div><span data-dcnode-id="3633" instrument_node="">
</span><p data-dcnode-id="3632"></p><div class="folderlabel" data-dcnode-id="3630" onclick="togglefolder('folder1');"><span data-dcnode-id="3631" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Anime &amp; Manga&nbsp;</span></div><div class="folder" data-dcnode-id="3358" id="folder1" isfolder="true" style="display:block;"><span data-dcnode-id="3629" instrument_node="">
</span><ul data-dcnode-id="3359"><li data-dcnode-id="3623"><span data-dcnode-id="3628" instrument_node=""> </span><em data-dcnode-id="3625"><a class="twikilink" data-dcnode-id="3626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/Akagi" title="/pmwiki/pmwiki.php/Manga/Akagi"><span data-dcnode-id="3627" instrument_node="">Akagi</span></a></em><span data-dcnode-id="3624" instrument_node=""> and Ichikawa play a single round of Russian roulette pre-match (as in, they only pulled the trigger once each) as a way of gauging each other's personalities. Ichikawa could hear which chamber the bullet was in by the noise made as it passed the barrel and predicted which chamber the bullet was in before the trigger was pulled. Since it was more than two triggers away, Akagi wasn't very worried either. As it turns out Ichikawa was completely correct and they both walk away with slightly greater respect for each other.
</span></li><li data-dcnode-id="3617"><span data-dcnode-id="3622" instrument_node=""> Kodaira-Sensei suggests this as an alternative to a life-size dice game in episode 3 of </span><em data-dcnode-id="3619"><a class="twikilink" data-dcnode-id="3620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/AnneHappy" title="/pmwiki/pmwiki.php/Manga/AnneHappy"><span data-dcnode-id="3621" instrument_node="">Anne Happy</span></a></em><span data-dcnode-id="3618" instrument_node="">.
</span></li><li data-dcnode-id="3605"><span data-dcnode-id="3616" instrument_node=""> </span><em data-dcnode-id="3613"><a class="twikilink" data-dcnode-id="3614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/AssassinationClassroom" title="/pmwiki/pmwiki.php/Manga/AssassinationClassroom"><span data-dcnode-id="3615" instrument_node="">Assassination Classroom</span></a></em><span data-dcnode-id="3612" instrument_node="">: </span><span class="spoiler" data-dcnode-id="3607" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3611" instrument_node="">After Chairman Asano's </span><a class="twikilink" data-dcnode-id="3609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VillainousBreakdown" title="/pmwiki/pmwiki.php/Main/VillainousBreakdown"><span data-dcnode-id="3610" instrument_node="">Villainous Breakdown</span></a><span data-dcnode-id="3608" instrument_node="">, he challenges Koro-sensei to a variation on the trope involving handbooks and grenades, with Koro-sensei's place in the school being at stake.</span></span><span data-dcnode-id="3606" instrument_node="">
</span></li><li data-dcnode-id="3595"><span data-dcnode-id="3604" instrument_node=""> A </span><a class="twikilink" data-dcnode-id="3602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MonsterClown" title="/pmwiki/pmwiki.php/Main/MonsterClown"><span data-dcnode-id="3603" instrument_node="">Monster Clown</span></a><span data-dcnode-id="3601" instrument_node=""> challenges Elf and Zwolf to a game of Russian Roulette in </span><em data-dcnode-id="3597"><a class="twikilink" data-dcnode-id="3599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/BattleAngelAlita" title="/pmwiki/pmwiki.php/Manga/BattleAngelAlita"><span data-dcnode-id="3600" instrument_node="">Battle Angel Alita</span></a><span data-dcnode-id="3598" instrument_node="">: Last Order</span></em><span data-dcnode-id="3596" instrument_node="">. He cheats by swapping the gun for a fully loaded one.
</span></li><li data-dcnode-id="3586"><span data-dcnode-id="3594" instrument_node=""> In the </span><em data-dcnode-id="3591"><a class="twikilink" data-dcnode-id="3592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/BlackCat" title="/pmwiki/pmwiki.php/Manga/BlackCat"><span data-dcnode-id="3593" instrument_node="">Black Cat</span></a></em><span data-dcnode-id="3590" instrument_node=""> manga vol. 1, Train dares Sven (who just recently got a free </span><a class="twikilink" data-dcnode-id="3588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OnlyAFleshWound" title="/pmwiki/pmwiki.php/Main/OnlyAFleshWound"><span data-dcnode-id="3589" instrument_node="">chest carving</span></a><span data-dcnode-id="3587" instrument_node=""> from Eve) to shoot him in the hand to see if he's still daring enough to go out in his condition. Sven picks the right bullet, but Train doesn't feel any pain, since he "tampered" with the bullet before loading it.
</span></li><li data-dcnode-id="3577"><span data-dcnode-id="3585" instrument_node=""> </span><em data-dcnode-id="3582"><a class="twikilink" data-dcnode-id="3583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/BlackLagoon" title="/pmwiki/pmwiki.php/Anime/BlackLagoon"><span data-dcnode-id="3584" instrument_node="">Black Lagoon</span></a></em><span data-dcnode-id="3581" instrument_node="">. In "Roberta's Blood Trail", Rock is sent to deliver a message to a bar where two people are playing this game. By now he's </span><a class="twikilink" data-dcnode-id="3579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SeenItAll" title="/pmwiki/pmwiki.php/Main/SeenItAll"><span data-dcnode-id="3580" instrument_node="">Seen It All</span></a><span data-dcnode-id="3578" instrument_node="">, so doesn't react when one of them blows his brains out in the middle of their conversation.
</span></li><li data-dcnode-id="3571"><span data-dcnode-id="3576" instrument_node=""> Ashley Ashura of </span><em data-dcnode-id="3573"><a class="twikilink" data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/CodeGeassAkitoTheExiled" title="/pmwiki/pmwiki.php/Anime/CodeGeassAkitoTheExiled"><span data-dcnode-id="3575" instrument_node="">Code Geass: Akito the Exiled</span></a></em><span data-dcnode-id="3572" instrument_node=""> is rather obsessed. He believes that luck is what makes him win battles, and he likes to test his luck. Then, after losing his close friend and subordinate, Johannes...
</span></li><li data-dcnode-id="3565"><span data-dcnode-id="3570" instrument_node=""> In one chapter of </span><em data-dcnode-id="3567"><a class="twikilink" data-dcnode-id="3568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/DanceInTheVampireBund" title="/pmwiki/pmwiki.php/Manga/DanceInTheVampireBund"><span data-dcnode-id="3569" instrument_node="">Dance in the Vampire Bund</span></a></em><span data-dcnode-id="3566" instrument_node="">, Akira runs across some vampires playing Russian Roulette, although the losers generally heal from the injuries they suffer. When pressed into a game, Akira (taking a page from Rally above) spins the chambers, puts the barrel to his heart (a part that generally wouldn't grow back on a vampire) and pulls the trigger five times, then presents the pistol to his opponent.
</span></li><li data-dcnode-id="3556"><span data-dcnode-id="3564" instrument_node=""> "Russian Roulette" was the opening theme for the </span><em data-dcnode-id="3561"><a class="twikilink" data-dcnode-id="3562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LightNovel/DirtyPair" title="/pmwiki/pmwiki.php/LightNovel/DirtyPair"><span data-dcnode-id="3563" instrument_node="">Dirty Pair</span></a></em><span data-dcnode-id="3560" instrument_node=""> TV series. Oddly appropriate that (</span><a class="twikilink" data-dcnode-id="3558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroInsurance" title="/pmwiki/pmwiki.php/Main/HeroInsurance"><span data-dcnode-id="3559" instrument_node="">Hero Insurance</span></a><span data-dcnode-id="3557" instrument_node="">), you MIGHT get to keep your planet.
</span></li><li data-dcnode-id="3546"><span data-dcnode-id="3555" instrument_node=""> One of the Snake Princess's servants in </span><em data-dcnode-id="3552"><a class="twikilink" data-dcnode-id="3553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/DragonBallZ" title="/pmwiki/pmwiki.php/Anime/DragonBallZ"><span data-dcnode-id="3554" instrument_node="">Dragon Ball Z</span></a></em><span data-dcnode-id="3551" instrument_node=""> plays this for fun, as she shows Goku. She promptly loses.
</span><div class="indent" data-dcnode-id="3547"><strong data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">Goku:</span></strong><span data-dcnode-id="3548" instrument_node=""> Personally, if I was given a choice, I think I'd rather play checkers.
</span></div></li><li data-dcnode-id="3528"><span data-dcnode-id="3545" instrument_node=""> </span><span class="spoiler" data-dcnode-id="3543" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3544" instrument_node="">Kuruso</span></span><span data-dcnode-id="3542" instrument_node=""> does this to Yukiteru in </span><em data-dcnode-id="3539"><a class="twikilink" data-dcnode-id="3540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/FutureDiary" title="/pmwiki/pmwiki.php/Manga/FutureDiary"><span data-dcnode-id="3541" instrument_node="">Future Diary</span></a></em><span data-dcnode-id="3538" instrument_node="">, in order to </span><a class="twikilink" data-dcnode-id="3536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BatmanGambit" title="/pmwiki/pmwiki.php/Main/BatmanGambit"><span data-dcnode-id="3537" instrument_node="">provoke</span></a><span data-dcnode-id="3535" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ViolentlyProtectiveGirlfriend" title="/pmwiki/pmwiki.php/Main/ViolentlyProtectiveGirlfriend"><span data-dcnode-id="3534" instrument_node="">Yuno</span></a><span data-dcnode-id="3532" instrument_node=""> to attack him. </span><span class="spoiler" data-dcnode-id="3530" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3531" instrument_node="">It works</span></span><span data-dcnode-id="3529" instrument_node="">.
</span></li><li data-dcnode-id="3515"><span data-dcnode-id="3527" instrument_node=""> In </span><em data-dcnode-id="3524"><a class="twikilink" data-dcnode-id="3525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/GambleFish" title="/pmwiki/pmwiki.php/Manga/GambleFish"><span data-dcnode-id="3526" instrument_node="">Gamble Fish</span></a></em><span data-dcnode-id="3523" instrument_node="">, a combination of Poker and Russian Roulette plays a big role in a match between story's primary antagonist Abadini and a blatant Expy to a certain American President </span><a class="urllink" data-dcnode-id="3520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/BarackObama"><span data-dcnode-id="3522" instrument_node="">Ohama.</span><img data-dcnode-id="3521" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3519" instrument_node=""> </span><span class="spoiler" data-dcnode-id="3517" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3518" instrument_node="">Abadini even manages to survive a discharge of a fully loaded Revolver to the forehead, under some extremely specific circumstances.</span></span><span data-dcnode-id="3516" instrument_node="">
</span></li><li data-dcnode-id="3506"><span data-dcnode-id="3514" instrument_node=""> </span><em data-dcnode-id="3511"><a class="twikilink" data-dcnode-id="3512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/GhostInTheShellArise" title="/pmwiki/pmwiki.php/Anime/GhostInTheShellArise"><span data-dcnode-id="3513" instrument_node="">Ghost in the Shell: Arise</span></a></em><span data-dcnode-id="3510" instrument_node="">. Pazu is shown playing virtual reality Russian roulette — it's not clear if </span><a class="twikilink" data-dcnode-id="3508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YourMindMakesItReal" title="/pmwiki/pmwiki.php/Main/YourMindMakesItReal"><span data-dcnode-id="3509" instrument_node="">Your Mind Makes It Real</span></a><span data-dcnode-id="3507" instrument_node="">, as his opponent loses.
</span></li><li data-dcnode-id="3494"><span data-dcnode-id="3505" instrument_node=""> In </span><em data-dcnode-id="3502"><a class="twikilink" data-dcnode-id="3503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/Gintama" title="/pmwiki/pmwiki.php/Manga/Gintama"><span data-dcnode-id="3504" instrument_node="">Gintama</span></a></em><span data-dcnode-id="3501" instrument_node="">, Seita does his Picture Diary and explained on it with the Yorozuya on what he did during the Summer. Coming across a mysterious "Shaggy" man he doesn't remember who mooched off his money saved for the festival in pachinko, gambling in horse races, and even have Seita joined in </span><em data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">this trope</span></em><span data-dcnode-id="3498" instrument_node="">. While Shinpachi and Kagura complain about how horrible this "Shaggy" is, Gintoki remains utterly silent with a big </span><a class="twikilink" data-dcnode-id="3496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OhCrap" title="/pmwiki/pmwiki.php/Main/OhCrap"><span data-dcnode-id="3497" instrument_node="">Oh, Crap!</span></a><span data-dcnode-id="3495" instrument_node=""> expression on his face. Unfortunately for him, they knew.
</span></li><li data-dcnode-id="3479"><span data-dcnode-id="3493" instrument_node=""> In </span><em data-dcnode-id="3490"><a class="twikilink" data-dcnode-id="3491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/GunsmithCats" title="/pmwiki/pmwiki.php/Manga/GunsmithCats"><span data-dcnode-id="3492" instrument_node="">Gunsmith Cats</span></a></em><span data-dcnode-id="3489" instrument_node="">, Rally Vincent uses an extreme version to intimidate a captive: she sticks the gun in the poor schmuck's face and pulls the trigger not once, but </span><em data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">five times</span></em><span data-dcnode-id="3486" instrument_node=""> — </span><strong data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">fast</span></strong><span data-dcnode-id="3483" instrument_node="">. She explains that she can time the spin so it stops </span><em data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">just</span></em><span data-dcnode-id="3480" instrument_node=""> as the loaded chamber passes the hammer. Her record is twelve straight spins. Wanna help her break it? KLIK-KLIK-KLIK-KLIK-KLIK!
</span></li><li data-dcnode-id="3473"><span data-dcnode-id="3478" instrument_node=""> In </span><em data-dcnode-id="3475"><a class="twikilink" data-dcnode-id="3476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/GunXSword" title="/pmwiki/pmwiki.php/Anime/GunXSword"><span data-dcnode-id="3477" instrument_node="">GUN×SWORD</span></a></em><span data-dcnode-id="3474" instrument_node="">, the first villain uses this to show off his incredible luck, by playing with two pistols at once and surviving five pulls.
</span></li><li data-dcnode-id="3461"><span data-dcnode-id="3472" instrument_node=""> In </span><em data-dcnode-id="3469"><a class="twikilink" data-dcnode-id="3470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/Kakegurui" title="/pmwiki/pmwiki.php/Manga/Kakegurui"><span data-dcnode-id="3471" instrument_node="">Kakegurui</span></a></em><span data-dcnode-id="3468" instrument_node="">, Jun </span><a class="twikilink" data-dcnode-id="3466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AttemptedRape" title="/pmwiki/pmwiki.php/Main/AttemptedRape"><span data-dcnode-id="3467" instrument_node="">tries to force Yumeko to strip in an alley and then threatens to rape her</span></a><span data-dcnode-id="3465" instrument_node="">. The psychotic Midari shows up and pulls a gun on him, then says to make this interesting, there is only one bullet in the chamber. If the gun fires, he dies, if it doesn't, she'll submit to him as well. When Jun gets scared, she </span><em data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">hands him the gun</span></em><span data-dcnode-id="3462" instrument_node=""> and dares him to pull the trigger on her. Instead, he hands it back and leaves. In fact, she tends to play the game against herself. Eventually, she and Yumeko have a game of ESP Russian Roulette where they must have the most matching cards put out, with the winner getting to fire. The match comes to a draw with Yumeko forcing one when she realizes Midari is rigging the game so she LOSES, wanting Yumeko to kill her.
</span></li><li data-dcnode-id="3452"><span data-dcnode-id="3460" instrument_node=""> </span><em data-dcnode-id="3457"><a class="twikilink" data-dcnode-id="3458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/LiarGame" title="/pmwiki/pmwiki.php/Manga/LiarGame"><span data-dcnode-id="3459" instrument_node="">Liar Game</span></a></em><span data-dcnode-id="3456" instrument_node=""> has a less-fatal variant with "24-Shot Russian Roulette", where the gun is loaded with six caps (out of 24) and if you shoot yourself, you lose several million yen. This being </span><em data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">Liar Game</span></em><span data-dcnode-id="3453" instrument_node="">, the heroes figure out how to fix it in their favour.
</span></li><li data-dcnode-id="3446"><span data-dcnode-id="3451" instrument_node=""> In an early chapter of </span><em data-dcnode-id="3448"><a class="twikilink" data-dcnode-id="3449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/Reborn2004" title="/pmwiki/pmwiki.php/Manga/Reborn2004"><span data-dcnode-id="3450" instrument_node="">Reborn! (2004)</span></a></em><span data-dcnode-id="3447" instrument_node="">, Reborn suggests Tsuna and Kyoko play Russian Roulette with a party bullet. He then switches it out with a Dying Will Bullet, and Kyoko gets hit.
</span></li><li data-dcnode-id="3434"><span data-dcnode-id="3445" instrument_node=""> An episode of the second </span><em data-dcnode-id="3442"><a class="twikilink" data-dcnode-id="3443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/SakuraWars" title="/pmwiki/pmwiki.php/VideoGame/SakuraWars"><span data-dcnode-id="3444" instrument_node="">Sakura Wars</span></a></em><span data-dcnode-id="3441" instrument_node=""> OAV has Maria, having gotten an enemy at her mercy, </span><span class="spoiler" data-dcnode-id="3439" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3440" instrument_node="">pretend to</span></span><span data-dcnode-id="3438" instrument_node=""> put one bullet in her gun </span><span class="spoiler" data-dcnode-id="3436" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3437" instrument_node="">while actually leaving it unloaded</span></span><span data-dcnode-id="3435" instrument_node="">, spin the chambers, and essentially ask the guy if he's feeling lucky (he isn't). Not quite how the game is normally played, but close enough that one can practically hear the writers saying "It's like Russian Roulette! Because she's Russian, get it?"
</span></li><li data-dcnode-id="3360"><span data-dcnode-id="3433" instrument_node=""> </span><em data-dcnode-id="3430"><a class="twikilink" data-dcnode-id="3431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/YuGiOh" title="/pmwiki/pmwiki.php/Franchise/YuGiOh"><span data-dcnode-id="3432" instrument_node="">Yu-Gi-Oh!</span></a></em><span data-dcnode-id="3429" instrument_node="">:
</span><ul data-dcnode-id="3361"><li data-dcnode-id="3414"><span data-dcnode-id="3428" instrument_node=""> In the </span><a class="twikilink" data-dcnode-id="3426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/YuGiOh" title="/pmwiki/pmwiki.php/Manga/YuGiOh"><span data-dcnode-id="3427" instrument_node="">original Manga</span></a><span data-dcnode-id="3425" instrument_node="">, we are shown that after his humiliating loss to Pegasus, "Bandit" Keith's life went straight down the toilet, and he fell to gambling to survive. One panel shows him playing Russian Roulette with an utterly insane look on his face. In addition to that, his flagship monster, Revolver Dragon, attacks by playing Russian roulette... pointed at the enemy monsters, of course. (With the monster, however, the gun's </span><em data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">two</span></em><span data-dcnode-id="3422" instrument_node=""> chambers have </span><em data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">five</span></em><span data-dcnode-id="3419" instrument_node=""> bullets apiece, and any shot he makes reloads every turn. His chance of missing is rather slim. The </span><a class="urllink" data-dcnode-id="3416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//yugioh.wikia.com/wiki/Barrel_Dragon"><span data-dcnode-id="3418" instrument_node="">real version of the card</span><img data-dcnode-id="3417" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3415" instrument_node=""> is more balanced.)
</span></li><li data-dcnode-id="3409"><span data-dcnode-id="3413" instrument_node=""> And in the manga, he dies by it when he attacks Pegasus, and he falls victim to </span><a class="twikilink" data-dcnode-id="3411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YourMindMakesItReal" title="/pmwiki/pmwiki.php/Main/YourMindMakesItReal"><span data-dcnode-id="3412" instrument_node="">Your Mind Makes It Real</span></a><span data-dcnode-id="3410" instrument_node="">.
</span></li><li data-dcnode-id="3407"><span data-dcnode-id="3408" instrument_node=""> Earlier, at the very beginning of the "Death T" arc, Mokuba plays "Russian Roulette Buffet" with Yugi and Joey. A spinning table, and six plates of food, two of which have poison; to which only Mokuba has the antidote. It is, of course, rigged by Mokuba, and Joey gets poison on his first plate. Yugi beats Mokuba by attaching the Puzzle to the spinning table, causing Mokuba to break the syrup bottle which was the secret control for the table; and then the final spin gives Mokuba the poison. (Mokuba gave himself away; the fact that the syrup bottle was empty combined with the fact that he didn't seem worried at all about being poisoned made Yugi realize he was using that to control where it landed.)
</span></li><li data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node=""> Dartz has Twin Bow Centaur (not a real card), which would randomly fire an arrow at either your monster or your opponent's monster.
</span></li><li data-dcnode-id="3392"><span data-dcnode-id="3404" instrument_node=""> Kiryu has </span><a class="urllink" data-dcnode-id="3401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//yugioh.wikia.com/wiki/Infernity_Reloader"><span data-dcnode-id="3403" instrument_node="">Infernity Reloader</span><img data-dcnode-id="3402" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3400" instrument_node=""> (called Infernity Randomizer in the dub), which fires 500 damage at either you or your opponent. His Infernity Death Gunman is a straight up </span><a class="twikilink" data-dcnode-id="3398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShoutOut" title="/pmwiki/pmwiki.php/Main/ShoutOut"><span data-dcnode-id="3399" instrument_node="">Shout-Out</span></a><span data-dcnode-id="3397" instrument_node=""> to </span><em data-dcnode-id="3394"><a class="twikilink" data-dcnode-id="3395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/DirtyHarry" title="/pmwiki/pmwiki.php/Film/DirtyHarry"><span data-dcnode-id="3396" instrument_node="">Dirty Harry</span></a></em><span data-dcnode-id="3393" instrument_node="">.
</span></li><li data-dcnode-id="3386"><span data-dcnode-id="3391" instrument_node=""> Yusei has a cowboy-like monster called Quickdraw Synchron, which is a subversion. While the anime makes it look like the effect is having it play Russian Roulette with Yusei's other Tuners, </span><a class="urllink" data-dcnode-id="3388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//yugioh.wikia.com/wiki/Quickdraw_Synchron"><span data-dcnode-id="3390" instrument_node="">its true effect</span><img data-dcnode-id="3389" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3387" instrument_node=""> is not random at all.
</span></li><li data-dcnode-id="3374"><span data-dcnode-id="3385" instrument_node=""> Joey has the </span><a class="urllink" data-dcnode-id="3382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//yugioh.wikia.com/wiki/Time_Wizard"><span data-dcnode-id="3384" instrument_node="">Time Wizard,</span><img data-dcnode-id="3383" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3381" instrument_node=""> which had a "Time Roulette" effect. If it lands on one of the two time machine symbols, it ages everything on the field by 1000 years. </span><span class="notelabel" data-dcnode-id="3378" onclick="togglenote('note1rwnu');" style="cursor: pointer;"><sup data-dcnode-id="3379"><span data-dcnode-id="3380" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="3376" id="note1rwnu" isnote="true" onclick="togglenote('note1rwnu');" style="display: none; cursor: pointer;"><span data-dcnode-id="3377" instrument_node="">This can also be a test of luck, since the desired effect is to leave the opponent's monsters old and withered while Joey's Baby Dragon ages into the mighty Thousands Dragon, but some others also get a positive effect from 1000 years' time, such as Yugi's Dark Magician becoming the Dark Sage.</span></span><span data-dcnode-id="3375" instrument_node=""> If lands on one of the four skull symbols, it detonates Joey's side of the field, which can take a lot out of his Life Points.
</span></li><li data-dcnode-id="3362"><span data-dcnode-id="3373" instrument_node=""> Joey also had a Spell Card called </span><a class="urllink" data-dcnode-id="3370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//yugioh.wikia.com/wiki/Roulette_Spider"><span data-dcnode-id="3372" instrument_node="">Roulette Spider</span><img data-dcnode-id="3371" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3369" instrument_node=""> which he used against Espa Roba, and called "the riskiest move in Duel Monsters". By paying half his life points, the "spider" blindfolded the strongest monster on the field (in this case, Jinzo) and made it spin like a roulette wheel. When Roba called for it to stop, it would do so and make an attack against whoever or whatever it was aiming at, which could be either player, directly, or any other monster on the field. (Joey </span><em data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">really</span></em><span data-dcnode-id="3366" instrument_node=""> lucked out here. It ended up aiming at Roba's Reflect Bounder, who had an effect that destroyed </span><em data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">both</span></em><span data-dcnode-id="3363" instrument_node=""> monsters and wiped out Roba's remaining life points, winning Joey the duel.) The real version of this card applies one of 6 effects (dependent on a dice roll) to an opponent's attacking monster.
</span></li></ul></li></ul></div><span data-dcnode-id="3357" instrument_node="">
</span><p data-dcnode-id="3356"></p><div class="folderlabel" data-dcnode-id="3354" onclick="togglefolder('folder2');"><span data-dcnode-id="3355" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Comedy&nbsp;</span></div><div class="folder" data-dcnode-id="3336" id="folder2" isfolder="true" style="display:block;"><span data-dcnode-id="3353" instrument_node="">
</span><ul data-dcnode-id="3337"><li data-dcnode-id="3346"><span data-dcnode-id="3352" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/MiltonJones" title="/pmwiki/pmwiki.php/Creator/MiltonJones"><span data-dcnode-id="3351" instrument_node="">Milton Jones</span></a><span data-dcnode-id="3349" instrument_node="">:
</span><div class="indent" data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node=""> When the boys in the playground discovered that I had a potentially lethal allergy to peanuts, they held me against a wall and made me play Russian Roulette with a bag of Revels....
</span></div></li><li data-dcnode-id="3338"><span data-dcnode-id="3345" instrument_node=""> One of the skits on Bob Prescott's 1961 comedy/sound effects album </span><em data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">Cartoons in Stereo</span></em><span data-dcnode-id="3342" instrument_node=""> has a Russian guy and an American guy play the game to settle an argument. After a few rounds, the American fires the bullet and the Russian exclaims "Ha ha! You lose!" </span><span class="spoiler" data-dcnode-id="3340" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3341" instrument_node="">...then we hear the gun slide across the table and the American asks "Erm, what do you say we make it two out of three?"</span></span><span data-dcnode-id="3339" instrument_node="">
</span></li></ul></div><span data-dcnode-id="3335" instrument_node="">
</span><p data-dcnode-id="3334"></p><div class="folderlabel" data-dcnode-id="3332" onclick="togglefolder('folder3');"><span data-dcnode-id="3333" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Comic Books&nbsp;</span></div><div class="folder" data-dcnode-id="3199" id="folder3" isfolder="true" style="display:block;"><span data-dcnode-id="3331" instrument_node="">
</span><ul data-dcnode-id="3200"><li data-dcnode-id="3313"><span data-dcnode-id="3330" instrument_node=""> </span><em data-dcnode-id="3327"><a class="twikilink" data-dcnode-id="3328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Batman" title="/pmwiki/pmwiki.php/Franchise/Batman"><span data-dcnode-id="3329" instrument_node="">Batman</span></a></em><span data-dcnode-id="3326" instrument_node="">:
</span><ul data-dcnode-id="3314"><li data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node=""> Batman once hunted a villain who was using a rigged gun. The villain would challenge rich men to Russian roulette, after both men playing had made out a will leaving everything to the victor. The gun had an extra safety that wasn't visible when playing, so the villain could never lose. Batman won despite the gun being full. (This particular game of Russian Roulette involved adding a bullet to the gun each time the two men lived.)
</span></li><li data-dcnode-id="3315"><span data-dcnode-id="3323" instrument_node=""> Two-Face, in the storyline that reveals his revised origin in </span><em data-dcnode-id="3320"><a class="twikilink" data-dcnode-id="3321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/TheNew52" title="/pmwiki/pmwiki.php/ComicBook/TheNew52"><span data-dcnode-id="3322" instrument_node="">The New 52</span></a></em><span data-dcnode-id="3319" instrument_node="">, plays this once every so often, the decision to do so spurred by his coin landing good side up. </span><span class="spoiler" data-dcnode-id="3317" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3318" instrument_node="">He seemingly kills himself this way at the end of the story. It's later revealed that he survived (of course) but the bullet is lodged in his brain, making him even more erratic.</span></span><span data-dcnode-id="3316" instrument_node="">
</span></li></ul></li><li data-dcnode-id="3295"><span data-dcnode-id="3312" instrument_node=""> </span><em data-dcnode-id="3309"><a class="twikilink" data-dcnode-id="3310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/Daredevil" title="/pmwiki/pmwiki.php/ComicBook/Daredevil"><span data-dcnode-id="3311" instrument_node="">Daredevil</span></a></em><span data-dcnode-id="3308" instrument_node=""> #191, "Roulette," takes place in </span><a class="twikilink" data-dcnode-id="3306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PsychoForHire" title="/pmwiki/pmwiki.php/Main/PsychoForHire"><span data-dcnode-id="3307" instrument_node="">Bullseye's</span></a><span data-dcnode-id="3305" instrument_node=""> hospital room, with Daredevil performing the Roulette for both of them while he tells Bullseye about a kid who admired him, </span><a class="twikilink" data-dcnode-id="3303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrokenPedestal" title="/pmwiki/pmwiki.php/Main/BrokenPedestal"><span data-dcnode-id="3304" instrument_node="">saw him at his darkest</span></a><span data-dcnode-id="3302" instrument_node="">, and then </span><a class="twikilink" data-dcnode-id="3300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JumpingOffTheSlipperySlope" title="/pmwiki/pmwiki.php/Main/JumpingOffTheSlipperySlope"><span data-dcnode-id="3301" instrument_node="">jumped the slope</span></a><span data-dcnode-id="3299" instrument_node="">. The best bit? </span><a class="twikilink" data-dcnode-id="3297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThouShaltNotKill" title="/pmwiki/pmwiki.php/Main/ThouShaltNotKill"><span data-dcnode-id="3298" instrument_node="">The gun isn't loaded</span></a><span data-dcnode-id="3296" instrument_node="">.
</span></li><li data-dcnode-id="3286"><span data-dcnode-id="3294" instrument_node=""> The </span><em data-dcnode-id="3291"><a class="twikilink" data-dcnode-id="3292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Comicbook/DoctorWhoTitan" title="/pmwiki/pmwiki.php/Comicbook/DoctorWhoTitan"><span data-dcnode-id="3293" instrument_node="">Doctor Who (Titan)</span></a></em><span data-dcnode-id="3290" instrument_node=""> comic introduces the game of Rassilon's Roulette, which is exactly the same, only played with a "time gun". Every time you pull the trigger you have one chance in six of not just being killed, but </span><a class="twikilink" data-dcnode-id="3288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RetGone" title="/pmwiki/pmwiki.php/Main/RetGone"><span data-dcnode-id="3289" instrument_node="">Ret-Gone</span></a><span data-dcnode-id="3287" instrument_node="">.
</span></li><li data-dcnode-id="3267"><span data-dcnode-id="3285" instrument_node=""> Subverted in </span><em data-dcnode-id="3282"><a class="twikilink" data-dcnode-id="3283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/TheFurtherAdventuresOfIndianaJones" title="/pmwiki/pmwiki.php/ComicBook/TheFurtherAdventuresOfIndianaJones"><span data-dcnode-id="3284" instrument_node="">The Further Adventures of Indiana Jones</span></a></em><span data-dcnode-id="3281" instrument_node=""> #16. </span><a class="twikilink" data-dcnode-id="3279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PirateGirl" title="/pmwiki/pmwiki.php/Main/PirateGirl"><span data-dcnode-id="3280" instrument_node="">Pirate Girl</span></a><span data-dcnode-id="3278" instrument_node=""> Esmeralda Vasquez punishes one of her crew who was caught stealing by holding up her revolver and telling him there is one cartridge in the cylinder. She will spin the cylinder, then give him the gun to aim at his head and pull the trigger. If the hammer falls on an empty chamber, he can go free. She does this, and he blows his brains out. She then breaks open the revolver and empties </span><a class="twikilink" data-dcnode-id="3276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ILied" title="/pmwiki/pmwiki.php/Main/ILied"><span data-dcnode-id="3277" instrument_node="">six shells on to the deck</span></a><span data-dcnode-id="3275" instrument_node="">.
</span><div class="indent" data-dcnode-id="3268"><strong data-dcnode-id="3273"><span data-dcnode-id="3274" instrument_node="">Esmeralda:</span></strong><span data-dcnode-id="3272" instrument_node=""> The lesson is this! </span><em data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node="">No one</span></em><span data-dcnode-id="3269" instrument_node=""> steals from Esmeralda!
</span></div></li><li data-dcnode-id="3261"><span data-dcnode-id="3266" instrument_node=""> </span><em data-dcnode-id="3263"><a class="twikilink" data-dcnode-id="3264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/IronMan" title="/pmwiki/pmwiki.php/ComicBook/IronMan"><span data-dcnode-id="3265" instrument_node="">Iron Man</span></a></em><span data-dcnode-id="3262" instrument_node=""> #198 has Obadiah Stane revealing his backstory, where as a young child he witnessed his father "win" a game of Russian Roulette. The trauma of watching his father's suicide caused him to lose his hair before his eighth birthday.
</span></li><li data-dcnode-id="3255"><span data-dcnode-id="3260" instrument_node=""> </span><em data-dcnode-id="3257"><a class="twikilink" data-dcnode-id="3258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/JudgeDredd" title="/pmwiki/pmwiki.php/ComicBook/JudgeDredd"><span data-dcnode-id="3259" instrument_node="">Judge Dredd</span></a></em><span data-dcnode-id="3256" instrument_node="">: War Marshal Kazan decides to punish one of his subordinates who cost him victory in the Apocalypse War by forcing him to play a daily game of Russian Roulette until he dies.
</span></li><li data-dcnode-id="3240"><span data-dcnode-id="3254" instrument_node=""> </span><em data-dcnode-id="3251"><a class="twikilink" data-dcnode-id="3252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/LuckyLuke" title="/pmwiki/pmwiki.php/ComicBook/LuckyLuke"><span data-dcnode-id="3253" instrument_node="">Lucky Luke</span></a></em><span data-dcnode-id="3250" instrument_node="">:
</span><ul data-dcnode-id="3241"><li data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node=""> In one comic, a Russian archduke on visit to the wild west challenges a gambler into a game of Russian roulette, and the gambler bails out when the gun is fired. Later, the duke challenges a Cavalry captain, and the gun goes off on him. The round is a blank, and he shouts "failed" in Russian, a running gag during the story, as a Russian assassin says the word every time his plans fail, but it isn't translated.
</span></li><li data-dcnode-id="3242"><span data-dcnode-id="3247" instrument_node=""> In another story, Luke is being held in jail and suggests to his jailer, a compulsive gambler, that they play Russian roulette to pass time (the only other guy who'd play with him having met his predictable end). The jailer plays first, gets lucky, then gives his gun to Luke, who, of course, points it at him and orders him to let him out.
</span><div class="indent" data-dcnode-id="3243"><strong data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">Jailer:</span></strong><span data-dcnode-id="3244" instrument_node=""> And here I thought it was impossible to cheat at this game!
</span></div></li></ul></li><li data-dcnode-id="3234"><span data-dcnode-id="3239" instrument_node=""> There's an old </span><em data-dcnode-id="3236"><a class="twikilink" data-dcnode-id="3237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Magazine/MAD" title="/pmwiki/pmwiki.php/Magazine/MAD"><span data-dcnode-id="3238" instrument_node="">MAD</span></a></em><span data-dcnode-id="3235" instrument_node=""> comic of a line of six people passing the gun to each other. When the man sixth in line gets it, he shoots the gun, and the bullet goes through the heads of all the others.
</span></li><li data-dcnode-id="3225"><span data-dcnode-id="3233" instrument_node=""> </span><em data-dcnode-id="3230"><a class="twikilink" data-dcnode-id="3231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/NikolaiDante" title="/pmwiki/pmwiki.php/ComicBook/NikolaiDante"><span data-dcnode-id="3232" instrument_node="">Nikolai Dante</span></a></em><span data-dcnode-id="3229" instrument_node=""> ends with a game between Nikolai and Vladimir. </span><span class="spoiler" data-dcnode-id="3227" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3228" instrument_node="">Vlad loses</span></span><span data-dcnode-id="3226" instrument_node="">.
</span></li><li data-dcnode-id="3216"><span data-dcnode-id="3224" instrument_node=""> </span><em data-dcnode-id="3221"><a class="twikilink" data-dcnode-id="3222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/RedEars" title="/pmwiki/pmwiki.php/ComicBook/RedEars"><span data-dcnode-id="3223" instrument_node="">Red Ears</span></a></em><span data-dcnode-id="3220" instrument_node="">: One gag features a variation on this after the standard use. A European explorer challenges an African chief to play a game of Russian Roulette with him. The Chief agrees, but then dares the explorer to a local variant: the explorer must pick one out of a row of six native girls to give him a blowjob. When the explorer notes that this doesn't seem like much of a challenge, the Chief informs him that one of the girls </span><a class="twikilink" data-dcnode-id="3218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GroinAttack" title="/pmwiki/pmwiki.php/Main/GroinAttack"><span data-dcnode-id="3219" instrument_node="">is a cannibal</span></a><span data-dcnode-id="3217" instrument_node="">.
</span></li><li data-dcnode-id="3210"><span data-dcnode-id="3215" instrument_node=""> A suicidally depressed Twitch does this with a temporarily de-powered </span><em data-dcnode-id="3212"><a class="twikilink" data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/Spawn" title="/pmwiki/pmwiki.php/ComicBook/Spawn"><span data-dcnode-id="3214" instrument_node="">Spawn</span></a></em><span data-dcnode-id="3211" instrument_node=""> after his son is lost to vampires. Al decides he's had enough and throws Twitch off the building, but not before getting a bullet in the shoulder.
</span></li><li data-dcnode-id="3201"><span data-dcnode-id="3209" instrument_node=""> Guy Smith, Mister Sensitive / The Orphan from </span><em data-dcnode-id="3206"><a class="twikilink" data-dcnode-id="3207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/XForce" title="/pmwiki/pmwiki.php/ComicBook/XForce"><span data-dcnode-id="3208" instrument_node="">X-Force</span></a></em><span data-dcnode-id="3205" instrument_node=""> played it alone on the regular (that is, </span><em data-dcnode-id="3203"><span data-dcnode-id="3204" instrument_node="">every day</span></em><span data-dcnode-id="3202" instrument_node="">) because of depression stemming from the fact that his parents never wanted him. Every day for three years, he kept getting lucky. Someone tried to kill him once by filling the other chambers, but because of his powers, he could feel the extra 5 bullets in the gun.
</span></li></ul></div><span data-dcnode-id="3198" instrument_node="">
</span><p data-dcnode-id="3197"></p><div class="folderlabel" data-dcnode-id="3195" onclick="togglefolder('folder4');"><span data-dcnode-id="3196" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Comic Strips&nbsp;</span></div><div class="folder" data-dcnode-id="3183" id="folder4" isfolder="true" style="display:block;"><span data-dcnode-id="3194" instrument_node="">
</span><ul data-dcnode-id="3184"><li data-dcnode-id="3185"><span data-dcnode-id="3193" instrument_node=""> A </span><em data-dcnode-id="3190"><a class="twikilink" data-dcnode-id="3191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicStrip/Pogo" title="/pmwiki/pmwiki.php/ComicStrip/Pogo"><span data-dcnode-id="3192" instrument_node="">Pogo</span></a></em><span data-dcnode-id="3189" instrument_node=""> comic book-style story, probably created as supplementary material for a book collection, features the cast as Russian scientists working for the Soviet space program. In the opening scene they are playing Russian Roulette. Churchy gets the bullet, but survives because he "missed". (A case of </span><a class="twikilink" data-dcnode-id="3187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TooDumbToLive" title="/pmwiki/pmwiki.php/Main/TooDumbToLive"><span data-dcnode-id="3188" instrument_node="">Too Dumb to Die</span></a><span data-dcnode-id="3186" instrument_node="">, perhaps?)
</span></li></ul></div><span data-dcnode-id="3182" instrument_node="">
</span><p data-dcnode-id="3181"></p><div class="folderlabel" data-dcnode-id="3179" onclick="togglefolder('folder5');"><span data-dcnode-id="3180" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Fan Works&nbsp;</span></div><div class="folder" data-dcnode-id="3135" id="folder5" isfolder="true" style="display:block;"><span data-dcnode-id="3178" instrument_node="">
</span><ul data-dcnode-id="3136"><li data-dcnode-id="3172"><span data-dcnode-id="3177" instrument_node=""> In </span><em data-dcnode-id="3174"><a class="twikilink" data-dcnode-id="3175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/FrozenTurtles" title="/pmwiki/pmwiki.php/Fanfic/FrozenTurtles"><span data-dcnode-id="3176" instrument_node="">Frozen Turtles</span></a></em><span data-dcnode-id="3173" instrument_node="">, when Raphael is interrogating an assassin who just tried to kill Elsa, he gets the man to talk by threatening to play a variation of this after another member of the assassin's order is killed and Raphael retrieves the other assassin's poisons, taunting his prisoner with the idea that he can't predict if he's giving the other man something that will just knock him out for a few minutes or something that will kill him painfully over the next few hours.
</span></li><li data-dcnode-id="3163"><span data-dcnode-id="3171" instrument_node=""> A much safer and slightly more humiliating version is played in the second </span><em data-dcnode-id="3168"><a class="twikilink" data-dcnode-id="3169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/HalloweenUnspectacular" title="/pmwiki/pmwiki.php/Fanfic/HalloweenUnspectacular"><span data-dcnode-id="3170" instrument_node="">Halloween Unspectacular</span></a></em><span data-dcnode-id="3167" instrument_node=""> with five potions and a bottle of dyed water. </span><a class="twikilink" data-dcnode-id="3165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HilarityEnsues" title="/pmwiki/pmwiki.php/Main/HilarityEnsues"><span data-dcnode-id="3166" instrument_node="">Hilarity Ensues</span></a><span data-dcnode-id="3164" instrument_node="">.
</span></li><li data-dcnode-id="3137"><span data-dcnode-id="3162" instrument_node=""> </span><em data-dcnode-id="3159"><a class="twikilink" data-dcnode-id="3160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/WhereTalentGoesToDie" title="/pmwiki/pmwiki.php/Fanfic/WhereTalentGoesToDie"><span data-dcnode-id="3161" instrument_node="">Where Talent Goes to Die</span></a></em><span data-dcnode-id="3158" instrument_node="">:
</span><ul data-dcnode-id="3138"><li data-dcnode-id="3147"><span data-dcnode-id="3157" instrument_node=""> This is how </span><a class="twikilink" data-dcnode-id="3155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheProtagonist" title="/pmwiki/pmwiki.php/Main/TheProtagonist"><span data-dcnode-id="3156" instrument_node="">Kaori Miura</span></a><span data-dcnode-id="3154" instrument_node=""> is executed in the </span><a class="twikilink" data-dcnode-id="3152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AprilFoolsDay" title="/pmwiki/pmwiki.php/Main/AprilFoolsDay"><span data-dcnode-id="3153" instrument_node="">April Fools' Day</span></a><span data-dcnode-id="3151" instrument_node=""> omake. She's forced to play Russian Roulette, and barely survives due to the gun jamming on the sixth pull of the trigger. At that point, </span><a class="twikilink" data-dcnode-id="3149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MoreDakka" title="/pmwiki/pmwiki.php/Main/MoreDakka"><span data-dcnode-id="3150" instrument_node="">several Gatling guns</span></a><span data-dcnode-id="3148" instrument_node=""> open fire on Miura, killing her.
</span></li><li data-dcnode-id="3139"><span data-dcnode-id="3146" instrument_node=""> In the fourth Chapter, Monokuma's "motive" is a virtual reality video game called "Final Dead Room: VR Edition." Like in the second game, the final puzzle is a game of Russian Roulette, and while the difficulty is the same as when Nagito attempted it, failure simply results in a game over- the player can't try again for 24 hours and no one else can try again for two hours. Miura, </span><span class="spoiler" data-dcnode-id="3144" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3145" instrument_node="">as well as Fukuda</span></span><span data-dcnode-id="3143" instrument_node="">, exploits a loophole in the game, </span><span class="spoiler" data-dcnode-id="3141" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3142" instrument_node="">by not pointing the gun at her head</span></span><span data-dcnode-id="3140" instrument_node="">.
</span></li></ul></li></ul></div><span data-dcnode-id="3134" instrument_node="">
</span><p data-dcnode-id="3133"></p><div class="folderlabel" data-dcnode-id="3131" onclick="togglefolder('folder6');"><span data-dcnode-id="3132" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Films — Animation&nbsp;</span></div><div class="folder" data-dcnode-id="3115" id="folder6" isfolder="true" style="display:block;"><span data-dcnode-id="3130" instrument_node="">
</span><ul data-dcnode-id="3116"><li data-dcnode-id="3117"><span data-dcnode-id="3129" instrument_node=""> In the animated </span><em data-dcnode-id="3126"><a class="twikilink" data-dcnode-id="3127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/LuckyLuke" title="/pmwiki/pmwiki.php/ComicBook/LuckyLuke"><span data-dcnode-id="3128" instrument_node="">Lucky Luke</span></a></em><span data-dcnode-id="3125" instrument_node=""> movie </span><em data-dcnode-id="3122"><a class="twikilink" data-dcnode-id="3123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/LaBalladeDesDalton" title="/pmwiki/pmwiki.php/WesternAnimation/LaBalladeDesDalton"><span data-dcnode-id="3124" instrument_node="">La Ballade des Dalton</span></a></em><span data-dcnode-id="3121" instrument_node="">, a retired poker cheater who has become a preacher is on the Dalton's killing list. He insists on ending his life with a last game, which turns to be the Russian roulette, and shoots himself in the head. </span><span class="spoiler" data-dcnode-id="3119" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3120" instrument_node="">Of course, being a compulsive cheater, he loaded the gun with a blank</span></span><span data-dcnode-id="3118" instrument_node="">.
</span></li></ul></div><span data-dcnode-id="3114" instrument_node="">
</span><p data-dcnode-id="3113"></p><div class="folderlabel" data-dcnode-id="3111" onclick="togglefolder('folder7');"><span data-dcnode-id="3112" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Films — Live-Action&nbsp;</span></div><div class="folder" data-dcnode-id="2736" id="folder7" isfolder="true" style="display:block;"><span data-dcnode-id="3110" instrument_node="">
</span><ul data-dcnode-id="2737"><li data-dcnode-id="3098"><span data-dcnode-id="3109" instrument_node=""> </span><em data-dcnode-id="3106"><a class="twikilink" data-dcnode-id="3107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/ThirteenTzameti" title="/pmwiki/pmwiki.php/Film/ThirteenTzameti"><span data-dcnode-id="3108" instrument_node="">13 Tzameti</span></a></em><span data-dcnode-id="3105" instrument_node=""> features an underground game in which desperate men are recruited to play a modified version of Russian Roulette while rich gangsters bet on who survives, like a horse race. The players arrange themselves in a circle and hold their revolvers up to the head of the man in front of them. When a light bulb turns on, they all fire. There was a 2010 </span><a class="twikilink" data-dcnode-id="3103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ForeignRemake" title="/pmwiki/pmwiki.php/Main/ForeignRemake"><span data-dcnode-id="3104" instrument_node="">American remake</span></a><span data-dcnode-id="3102" instrument_node=""> called </span><em data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">13</span></em><span data-dcnode-id="3099" instrument_node="">.
