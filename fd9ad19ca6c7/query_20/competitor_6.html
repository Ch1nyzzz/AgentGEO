</span><h2 class="panel-heading" data-dcnode-id="1408"><span data-dcnode-id="1411" instrument_node="">Audience Reviews for </span><em data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Toys</span></em></h2><span data-dcnode-id="1407" instrument_node="">
</span><div aria-live="polite" class="sr-only js-clamp-live-region" data-dcnode-id="1406"></div><span data-dcnode-id="1405" instrument_node="">
</span><ul class="mop-audience-reviews__reviews-wrap clearfix" data-dcnode-id="1223"><span data-dcnode-id="1404" instrument_node="">
</span><li class="mop-audience-reviews__review-item pull-left cl" data-dcnode-id="1360" data-qa="quote-bubble"><span data-dcnode-id="1403" instrument_node="">

</span><span class="star-display" data-dcnode-id="1395" data-qa="star-display"><span class="star-display__filled" data-dcnode-id="1400"></span><span class="star-display__half" data-dcnode-id="1399"></span><span class="star-display__empty" data-dcnode-id="1398"></span><span class="star-display__empty" data-dcnode-id="1397"></span><span class="star-display__empty" data-dcnode-id="1396"></span></span><span data-dcnode-id="1394" instrument_node="">
</span><span class="mop-audience-reviews__review--duration" data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Jul 28, 2012</span></span><span data-dcnode-id="1391" instrument_node="">
</span></div><span data-dcnode-id="1389" instrument_node="">
</span><div class="mop-audience-reviews__review--comment clamp clamp-4 js-clamp" data-clamp="true" data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Getting down to the nitty gritty of the plot this is basically a blend of imagination taken from 'Willy Wonka', 'War Games' and strangely enough a few Charles Band movies I reckon. Maybe even some 'Pinocchio' and classic children's fairytales.

All it involves is a surreal toy company run by some surreal people that make charming little toys (the kind of endearing little handmade stocking fillers) which is overtaken by the former owners brother and promptly used to make war toys.

Its almost like a fairytale really, the nice old toy maker dies and leaves his company to his war obsessed naughty brother who abuses the gift. I'm sure as you all know by now this film is certainly not short on visual fantasy elements. The creativity in the film is really quite stunning and deserves much credit for design and construction.

Some gorgeous sets with unusually fantastic colour schemes and backdrops. The toy factory is made to be as bizarre and wondrous as possible which leads to my comparison with 'Willy Wonka' and his marvellous chocolate factory. The later sequences in the plot remind you of 'War Games' in the fact all the toys end up going to computer controlled war with each other much like Charles Band and his dolls/puppets battling each other (visually). This is where the film gets too ridiculous and truly loses its suspension of disbelief.

Until that point its a quirky fun pleasant ride with Williams up to his usual zany antics. Williams and Cusack fit this Dali-ish world perfectly really, that's not to say their performances are exactly great, more annoying to be honest, but could you see anyone else doing this craziness?. Gambon actually does well as the war crazed brother with a stiff upper lip. Drunk with power over the company and his war toys his fall is surprisingly fun to watch, silly but the fact he's a great British actor makes it worth while. LL Cool J...epic miscast.

Everything about this film is plain weird right down to the location for the toy factory. Its a little uncomfortable in places really, unsure if that was done on purpose or not. There are nice ideas here and it could of been a really good children's bedtime story type fable but its overly long with not much going on. Its lavish but rather dull, plus its a bit jumbled and gets carried away with the surrealism.</span></div><div class="clamp-toggle__container" data-dcnode-id="1384"><button class="button--link js-clamp-toggle clamp-toggle__show-more clamp-toggle__show-more--bold" data-dcnode-id="1385" data-qa="more-btn" type="button"><span data-dcnode-id="1386" instrument_node="">Show More</span></button></div><span data-dcnode-id="1383" instrument_node="">

</span><span class="star-display" data-dcnode-id="1350" data-qa="star-display"><span class="star-display__filled" data-dcnode-id="1355"></span><span class="star-display__filled" data-dcnode-id="1354"></span><span class="star-display__filled" data-dcnode-id="1353"></span><span class="star-display__empty" data-dcnode-id="1352"></span><span class="star-display__empty" data-dcnode-id="1351"></span></span><span data-dcnode-id="1349" instrument_node="">
</span><span class="mop-audience-reviews__review--duration" data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Jul 03, 2011</span></span><span data-dcnode-id="1346" instrument_node="">
</span></div><span data-dcnode-id="1344" instrument_node="">
</span><div class="mop-audience-reviews__review--comment clamp clamp-4 js-clamp" data-clamp="true" data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Toys was a colorful, strange, peculiarly done movie. I sort of liked it. It's a seemingly simple story involving a toy company taken over by a weapons manufacturer. It's not really that simple because the family involved with the toy company includes two people who've never known anything other than toy land. Robin Williams' character is naive, but quick to figure things out when evidence of deception is blatant enough. 

The cast was phenomenal. Robin Williams, Joan Cusack, Robin Wright Penn, LL Cool J and Michael Gambon were all great. 

It's a fun film that is worth watching. If you don't like the first 15 minutes, change the channel. It won't become any more appealing.</span></div><div class="clamp-toggle__container" data-dcnode-id="1339"><button class="button--link js-clamp-toggle clamp-toggle__show-more clamp-toggle__show-more--bold" data-dcnode-id="1340" data-qa="more-btn" type="button"><span data-dcnode-id="1341" instrument_node="">Show More</span></button></div><span data-dcnode-id="1338" instrument_node="">
