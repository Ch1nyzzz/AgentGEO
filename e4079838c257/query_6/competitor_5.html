</span><p data-dcnode-id="7437"><b data-dcnode-id="7438"><span data-dcnode-id="7439" instrument_node="">Recent Developments&nbsp;</span></b></p><span data-dcnode-id="7436" instrument_node="">
</span><p data-dcnode-id="7427"><b data-dcnode-id="7428"><em data-dcnode-id="7434" style="font-style:italic"><span data-dcnode-id="7435" instrument_node="">For CFR's full coverage of Ukraine, please visit our </span></em><a data-dcnode-id="7431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/europe-and-eurasia/ukraine"><em data-dcnode-id="7432" style="font-style:italic"><span data-dcnode-id="7433" instrument_node="">topic page</span></em></a><em data-dcnode-id="7429" style="font-style:italic"><span data-dcnode-id="7430" instrument_node="">.</span></em></b></p><span data-dcnode-id="7426" instrument_node="">
</span><p data-dcnode-id="7412"><span data-dcnode-id="7425" instrument_node="">Since Russia launched a full-scale military </span><a data-dcnode-id="7423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/live/2022/02/24/world/russia-ukraine-putin"><span data-dcnode-id="7424" instrument_node="">invasion </span></a><span data-dcnode-id="7422" instrument_node="">into Ukraine on February 24, 2022, fighting has caused over nine hundred civilian </span><a data-dcnode-id="7420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2022/03/02/world/europe/ukraine-civilian-casualties.html" title="https://reliefweb.int/report/ukraine/ukraine-civilian-casualties-2400-20-march-2022-enruuk"><span data-dcnode-id="7421" instrument_node="">deaths </span></a><span data-dcnode-id="7419" instrument_node="">and pushed </span><a data-dcnode-id="7417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data2.unhcr.org/en/situations/ukraine"><span data-dcnode-id="7418" instrument_node="">millions </span></a><span data-dcnode-id="7416" instrument_node="">of Ukrainians to flee to neighboring countries—the majority of whom have arrived in Poland, a NATO country where U.S. troops are </span><a data-dcnode-id="7414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2022/02/24/world/europe/us-troops-poland-ukraine-russia.html"><span data-dcnode-id="7415" instrument_node="">preparing </span></a><span data-dcnode-id="7413" instrument_node="">to offer assistance to refugees.</span></p><span data-dcnode-id="7411" instrument_node="">
</span><p data-dcnode-id="7373"><span data-dcnode-id="7410" instrument_node="">In October 2021, Russia began </span><a data-dcnode-id="7408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/world/russian-troop-movements-near-ukraine-border-prompt-concern-in-us-europe/2021/10/30/c122e57c-3983-11ec-9662-399cfa75efee_story.html"><span data-dcnode-id="7409" instrument_node="">moving</span></a><span data-dcnode-id="7407" instrument_node=""> troops and military equipment near its border with Ukraine, reigniting concerns over a potential invasion. Commercial satellite </span><a data-dcnode-id="7405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.com/news/2021/11/01/satellite-russia-ukraine-military-518337"><span data-dcnode-id="7406" instrument_node="">imagery</span></a><span data-dcnode-id="7404" instrument_node="">, social media posts, and publicly released </span><a data-dcnode-id="7402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2022/02/24/world/europe/intelligence-putin-biden-ukraine-leverage.html"><span data-dcnode-id="7403" instrument_node="">intelligence </span></a><span data-dcnode-id="7401" instrument_node="">from </span><a data-dcnode-id="7399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.com/news/2021/11/01/satellite-russia-ukraine-military-518337"><span data-dcnode-id="7400" instrument_node="">November</span></a><span data-dcnode-id="7398" instrument_node=""> and </span><a data-dcnode-id="7396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.com/news/2021/12/23/russia-buildup-ukraine-satellite-images-526109"><span data-dcnode-id="7397" instrument_node="">December</span></a><span data-dcnode-id="7395" instrument_node=""> 2021 showed armor, </span><a data-dcnode-id="7393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/2021/dec/12/russia-closer-to-war-ukraine-border-putin-buk-missiles"><span data-dcnode-id="7394" instrument_node="">missiles</span></a><span data-dcnode-id="7392" instrument_node="">, and other heavy weaponry moving toward Ukraine with no official explanation. By December, more than one hundred thousand Russian troops were in place near the Russia-Ukraine </span><a data-dcnode-id="7390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/interactive/2022/01/07/world/europe/ukraine-maps.html"><span data-dcnode-id="7391" instrument_node="">border</span></a><span data-dcnode-id="7389" instrument_node=""> and U.S. intelligence officials </span><a data-dcnode-id="7387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/national-security/russia-ukraine-invasion/2021/12/03/98a3760e-546b-11ec-8769-2f4ecdf7a2ad_story.html"><span data-dcnode-id="7388" instrument_node="">warned</span></a><span data-dcnode-id="7386" instrument_node=""> that Russia may be planning an invasion for early 2022. In mid-December 2021, Russia’s foreign ministry issued a </span><a data-dcnode-id="7384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2021/12/17/world/europe/russia-nato-security-deal.html"><span data-dcnode-id="7385" instrument_node="">set of demands</span></a><span data-dcnode-id="7383" instrument_node=""> calling for the United States and the North Atlantic Treaty Organization (NATO) to cease any military activity in Eastern Europe and Central Asia, to commit against further NATO expansion toward Russia, and to prevent Ukraine from joining NATO in the future.&nbsp; The United States and other NATO allies rejected these demands and warned Russia they would impose severe economic </span><a data-dcnode-id="7381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/us/biden-warn-putin-economic-consequences-ukraine-invasion-says-official-2021-12-06/"><span data-dcnode-id="7382" instrument_node="">sanctions</span></a><span data-dcnode-id="7380" instrument_node=""> if Russia invaded Ukraine. The United States sent additional military assistance to Ukraine, including ammunition, </span><a data-dcnode-id="7378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/2021/12/08/politics/us-ukraine-security-assistance-military-training/index.html"><span data-dcnode-id="7379" instrument_node="">small arms</span></a><span data-dcnode-id="7377" instrument_node="">, and other </span><a data-dcnode-id="7375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/uk-60033012"><span data-dcnode-id="7376" instrument_node="">defensive weaponry</span></a><span data-dcnode-id="7374" instrument_node="">.</span></p><span data-dcnode-id="7372" instrument_node="">
</span><p data-dcnode-id="7349"><span data-dcnode-id="7371" instrument_node="">In early February 2022, U.S. President Joe Biden </span><a data-dcnode-id="7369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/europe/kremlin-mocks-britains-utterly-confused-johnson-before-putin-talks-2022-02-02/"><span data-dcnode-id="7370" instrument_node="">ordered </span></a><span data-dcnode-id="7368" instrument_node="">around three thousand U.S. troops to deploy to Poland and Romania—NATO countries that border Ukraine—to counter Russian troops stationed near its border with Ukraine and reassure NATO allies. Satellite imagery </span><a data-dcnode-id="7366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/satellite-images-show-troop-deployment-belarus-border-with-ukraine-ahead-russian-2022-02-06/"><span data-dcnode-id="7367" instrument_node="">showed</span></a><span data-dcnode-id="7365" instrument_node=""> the largest deployment of Russian troops to its border with Belarus since the end of the Cold War. Negotiations between the </span><a data-dcnode-id="7363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.com/news/2022/01/21/blinken-us-russia-talks-ukraine-527569"><span data-dcnode-id="7364" instrument_node="">United States</span></a><span data-dcnode-id="7362" instrument_node="">, Russia, and European powers—including </span><a data-dcnode-id="7360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.eu/article/macron-wants-new-euro-russian-security-negotiation/"><span data-dcnode-id="7361" instrument_node="">France </span></a><span data-dcnode-id="7359" instrument_node="">and </span><a data-dcnode-id="7357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/live/2022/02/08/world/ukraine-russia-news"><span data-dcnode-id="7358" instrument_node="">Germany</span></a><span data-dcnode-id="7356" instrument_node="">—did not result in a resolution. While Russia released a </span><a data-dcnode-id="7354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnbc.com/2022/02/15/ukraine-concerns-ease-on-report-of-partial-pullback-by-russian-troops.html"><span data-dcnode-id="7355" instrument_node="">statement </span></a><span data-dcnode-id="7353" instrument_node="">claiming to draw down a certain number of troops, </span><a data-dcnode-id="7351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2022/02/16/1081276661/russian-troops-ukraine-natohttps%3A//www.npr.org/2022/02/16/1081276661/russian-troops-ukraine-nato"><span data-dcnode-id="7352" instrument_node="">reports </span></a><span data-dcnode-id="7350" instrument_node="">emerged of an increasing Russian troop presence at the border with Ukraine.&nbsp;&nbsp;</span></p><span data-dcnode-id="7348" instrument_node="">
</span><p data-dcnode-id="7319"><span data-dcnode-id="7347" instrument_node="">In late February 2022, the United States warned that Russia intended to invade Ukraine, citing Russia’s </span><a data-dcnode-id="7345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/europe/russian-pullout-meets-uk-scepticism-ukraine-defence-website-still-hacked-2022-02-16/%3Futm_source%3Ddailybrief%26utm_medium%3Demail%26utm_campaign%3DDailyBrief2022Feb16%26utm_term%3DDailyNewsBrief"><span data-dcnode-id="7346" instrument_node="">growing </span></a><span data-dcnode-id="7344" instrument_node="">military presence at the Russia-Ukraine border. Russian President Vladimir Putin then </span><a data-dcnode-id="7342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.france24.com/en/europe/20220222-defying-west-putin-sends-troops-to-breakaway-regions-in-eastern-ukraine"><span data-dcnode-id="7343" instrument_node="">ordered </span></a><span data-dcnode-id="7341" instrument_node="">troops to Luhansk and Donetsk, separatist regions in Eastern Ukraine partly controlled by Russian-backed separatists, </span><a data-dcnode-id="7339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/europe/putin-orders-russian-peacekeepers-eastern-ukraines-two-breakaway-regions-2022-02-21/"><span data-dcnode-id="7340" instrument_node="">claiming </span></a><span data-dcnode-id="7338" instrument_node="">the troops served a “peacekeeping” function. The United States responded by imposing sanctions on the Luhansk and Donetsk </span><a data-dcnode-id="7336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//home.treasury.gov/news/press-releases/jy0602"><span data-dcnode-id="7337" instrument_node="">regions</span></a><span data-dcnode-id="7335" instrument_node=""> and the </span><a data-dcnode-id="7333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/briefing-room/statements-releases/2022/02/23/statement-by-president-biden-on-nord-stream-2/"><span data-dcnode-id="7334" instrument_node="">Nord Stream 2 gas pipeline </span></a><span data-dcnode-id="7332" instrument_node="">a few days later. On February 24, during a United Nations Security Council </span><a data-dcnode-id="7330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.un.org/en/asset/k1j/k1j8unn1me"><span data-dcnode-id="7331" instrument_node="">meeting</span></a><span data-dcnode-id="7329" instrument_node=""> to dissuade Russia from attacking Ukraine, Putin </span><a data-dcnode-id="7327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/6150679/russia-ukraine-war/"><span data-dcnode-id="7328" instrument_node="">announced</span></a><span data-dcnode-id="7326" instrument_node=""> the beginning of a full-scale land, sea, and air invasion of Ukraine targeting Ukrainian military assets and cities across the country. Biden </span><a data-dcnode-id="7324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/briefing-room/speeches-remarks/2022/02/24/remarks-by-president-biden-on-russias-unprovoked-and-unjustified-attack-on-ukraine/"><span data-dcnode-id="7325" instrument_node="">declared </span></a><span data-dcnode-id="7323" instrument_node="">this attack “unprovoked and unjustified” and has since issued severe sanctions in coordination with European allies </span><a data-dcnode-id="7321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/europe/biden-unveil-new-sanctions-russia-after-it-invades-ukraine-2022-02-24/"><span data-dcnode-id="7322" instrument_node="">targeting </span></a><span data-dcnode-id="7320" instrument_node="">four of Russia’s largest banks, its oil and gas industry, and U.S. technology exports to the country.</span></p><span data-dcnode-id="7318" instrument_node="">
</span><p data-dcnode-id="7295"><span data-dcnode-id="7317" instrument_node="">The United Nations, G7, EU, and other countries </span><a data-dcnode-id="7315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aljazeera.com/news/2022/2/24/world-reaction-putin-orders-military-operation-in-ukraine"><span data-dcnode-id="7316" instrument_node="">continue </span></a><span data-dcnode-id="7314" instrument_node="">to condemn Russian actions and support Ukrainian forces. In an </span><a data-dcnode-id="7312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/2022/mar/02/united-nations-russia-ukraine-vote"><span data-dcnode-id="7313" instrument_node="">emergency</span></a><span data-dcnode-id="7311" instrument_node=""> United Nations session, 141 of 193 member states voted to condemn Russia’s invasion of Ukraine and demanded that Russia immediately cease its use of force in Ukraine. The United States has issued escalating sanctions on the </span><a data-dcnode-id="7309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2022/02/25/us/politics/sanctions-on-russia-putin.html"><span data-dcnode-id="7310" instrument_node="">financial assets</span></a><span data-dcnode-id="7308" instrument_node=""> of Putin and Sergey Lavrov, Russia’s foreign minister, </span><a data-dcnode-id="7306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2022/02/26/us/politics/eu-us-swift-russia.html"><span data-dcnode-id="7307" instrument_node="">removing </span></a><span data-dcnode-id="7305" instrument_node="">Russian banks from the global SWIFT financial messaging system, and </span><a data-dcnode-id="7303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2022/03/08/world/europe/biden-bans-russian-oil.html"><span data-dcnode-id="7304" instrument_node="">banning </span></a><span data-dcnode-id="7302" instrument_node="">U.S. imports of Russian oil and natural gas. The U.S. continues to </span><a data-dcnode-id="7300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2022/03/16/us/politics/biden-military-aid-ukraine.html"><span data-dcnode-id="7301" instrument_node="">commit </span></a><span data-dcnode-id="7299" instrument_node="">military assistance to Ukraine; following Ukrainian President Volodymyr Zelenskyy’s address to Congress on March 16, Biden announced an additional $800 million in military assistance. Just after Russia’s invasion, Biden also </span><a data-dcnode-id="7297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//insidedefense.com/insider/biden-orders-7000-additional-us-troops-germany"><span data-dcnode-id="7298" instrument_node="">ordered</span></a><span data-dcnode-id="7296" instrument_node=""> 7,000 U.S. troops deployed to Germany.</span></p><span data-dcnode-id="7294" instrument_node="">
</span><p data-dcnode-id="7274"><span data-dcnode-id="7293" instrument_node="">Direct negotiations between Russia and Ukraine have continued with Russia announcing in late March 2022 that it would “</span><a data-dcnode-id="7291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/live/2022/03/29/world/ukraine-russia-war%3Faction%3Dclick%26pgtype%3DLegacyCollection%26state%3Ddefault%26module%3Dstyln-russia-ukraine%26variant%3Dshow%26region%3Dhub%26block%3Dstoryline_levelup_swipe_recirc%23here-are-the-latest-developments-from-ukraine"><span data-dcnode-id="7292" instrument_node="">reduce military activity</span></a><span data-dcnode-id="7290" instrument_node="">” near Kyiv and Chernihiv. Meanwhile, Russian forces continue to combat the Ukrainian counteroffensive in and around major Ukrainian cities, although the initial Russian invasion has appeared to slow.. Several Russian </span><a data-dcnode-id="7288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2022/03/20/world/europe/its-offensive-slowed-russia-uses-long-range-missiles-to-devastating-effect.html"><span data-dcnode-id="7289" instrument_node="">long-range missile strikes</span></a><span data-dcnode-id="7287" instrument_node=""> have caused significant damage to Ukrainian military assets, urban residential areas, and communication and transportation infrastructure. </span><a data-dcnode-id="7285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/world/2022/03/12/ukraine-hospital-attacks-video/"><span data-dcnode-id="7286" instrument_node="">Hospitals</span></a><span data-dcnode-id="7284" instrument_node=""> and </span><a data-dcnode-id="7282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apnews.com/article/russia-ukraine-vladimir-putin-kyiv-europe-1f3dc134dc6f8c5214cfc723d37fd56a"><span data-dcnode-id="7283" instrument_node="">residential</span></a><span data-dcnode-id="7281" instrument_node=""> complexes have also sustained shelling and bombing attacks. Civilians in Mariupol–a port city in southeastern Ukraine–have been facing an ongoing humanitarian crisis with </span><a data-dcnode-id="7279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.cfr.org/click/27095743.1062/aHR0cHM6Ly93d3cuZnQuY29tL2NvbnRlbnQvYWY3OTk2YTktOGMxNi00NDIxLWE1YjMtMzkwMzE1ZDNjN2RjP3V0bV9zb3VyY2U9ZGFpbHlicmllZg/5deac6f2fc942d4a17c938b7Bd3f14b0a"><span data-dcnode-id="7280" instrument_node="">acute shortages of food, water, and heat</span></a><span data-dcnode-id="7278" instrument_node="">. Russian forces have surrounded the city for weeks with aerial bombardments that have </span><a data-dcnode-id="7276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/world-europe-60772331"><span data-dcnode-id="7277" instrument_node="">killed </span></a><span data-dcnode-id="7275" instrument_node="">hundreds of civilians.</span></p><span data-dcnode-id="7273" instrument_node="">
</span><p data-dcnode-id="7270"><b data-dcnode-id="7271"><span data-dcnode-id="7272" instrument_node="">Background&nbsp;</span></b></p><span data-dcnode-id="7269" instrument_node="">
</span><p data-dcnode-id="7264"><span data-dcnode-id="7268" instrument_node="">Armed conflict in eastern Ukraine erupted in early 2014 following Russia’s annexation of Crimea. The previous year, protests in Ukraine’s capital Kyiv against Ukrainian President Viktor Yanukovych’s decision to reject a deal for greater economic integration with the European Union (EU) were met with a&nbsp; violent crackdown by state security forces. The protests widened, escalating the conflict, and President Yanukovych </span><a data-dcnode-id="7266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/sections/thetwo-way/2014/02/22/281083380/unkrainian-protesters-uneasy-president-reportedly-leaves-kiev"><span data-dcnode-id="7267" instrument_node="">fled</span></a><span data-dcnode-id="7265" instrument_node=""> the country in February 2014.&nbsp;</span></p><span data-dcnode-id="7263" instrument_node="">
</span><p data-dcnode-id="7255"><span data-dcnode-id="7262" instrument_node="">One month later, in March 2014, Russian troops took control of Ukraine’s Crimea region. Russian President Vladimir Putin </span><a data-dcnode-id="7260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/world/transcript-putin-says-russia-will-protect-the-rights-of-russians-abroad/2014/03/18/432a1e60-ae99-11e3-a49e-76adc9210f19_story.html%3Futm_term%3D.b766ae6445fd"><span data-dcnode-id="7261" instrument_node="">cited</span></a><span data-dcnode-id="7259" instrument_node=""> the need to protect the rights of Russian citizens and Russian speakers in Crimea and southeast Ukraine. Russia then formally annexed the peninsula after Crimeans voted to join the Russian Federation in a disputed local </span><a data-dcnode-id="7257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2014/03/17/world/europe/crimea-ukraine-secession-vote-referendum.html"><span data-dcnode-id="7258" instrument_node="">referendum</span></a><span data-dcnode-id="7256" instrument_node="">. The crisis heightened ethnic divisions, and two months later pro-Russian separatists in the Donetsk and Luhansk regions of eastern Ukraine held a referendum to declare independence from Ukraine.</span></p><span data-dcnode-id="7254" instrument_node="">
</span><p data-dcnode-id="7246"><span data-dcnode-id="7253" instrument_node="">Armed conflict in the region quickly broke out between Russian-backed forces and the Ukrainian military. Moscow denied military involvement, though both Ukraine and NATO </span><a data-dcnode-id="7251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usnews.com/news/world/articles/2017-11-24/russia-has-deployed-thousands-of-tanks-troops-to-ukraine-top-official-says"><span data-dcnode-id="7252" instrument_node="">reported </span></a><span data-dcnode-id="7250" instrument_node="">the buildup of Russian troops and military equipment near Donetsk and Russian cross-border shelling immediately after Russia annexed Crimea. The conflict transitioned to an active stalemate, with regular </span><a data-dcnode-id="7248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/world/national-security/us-releases-images-it-says-show-russia-has-fired-artillery-over-border-into-ukraine/2014/07/27/f9190158-159d-11e4-9e3b-7f2f110c6265_story.html%3Futm_term%3D.bafeb332533e"><span data-dcnode-id="7249" instrument_node="">shelling </span></a><span data-dcnode-id="7247" instrument_node="">and skirmishes occurring along the front line that separated Russian- and Ukrainian-controlled border regions in the east.</span></p><span data-dcnode-id="7245" instrument_node="">
</span><p data-dcnode-id="7240"><span data-dcnode-id="7244" instrument_node="">Beginning in February 2015, France, Germany, Russia, and Ukraine attempted to kickstart negotiations and broker a cessation in violence through the </span><a data-dcnode-id="7242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/world-europe-31436513"><span data-dcnode-id="7243" instrument_node="">Minsk Accords</span></a><span data-dcnode-id="7241" instrument_node="">. The agreement framework included provisions for a cease-fire, withdrawal of heavy weaponry, and full Ukrainian government control throughout the conflict zone. However, efforts to reach a diplomatic settlement and satisfactory resolution were largely unsuccessful.&nbsp;</span></p><span data-dcnode-id="7239" instrument_node="">
</span><p data-dcnode-id="7231"><span data-dcnode-id="7238" instrument_node="">In April 2016, NATO </span><a data-dcnode-id="7236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.military.com/daily-news/2016/07/08/four-nato-battalions-go-eastern-europe-deter-russia.html"><span data-dcnode-id="7237" instrument_node="">announced</span></a><span data-dcnode-id="7235" instrument_node=""> that the alliance would deploy four battalions to Eastern Europe, rotating troops through Estonia, Latvia, Lithuania, and Poland to deter possible future Russian aggression elsewhere in Europe, particularly in the Baltics. In September 2017, the United States also </span><a data-dcnode-id="7233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newsweek.com/us-army-sends-two-tank-brigades-europe-amid-russia-tensions-664258"><span data-dcnode-id="7234" instrument_node="">deployed</span></a><span data-dcnode-id="7232" instrument_node=""> two U.S. Army tank brigades to Poland to further bolster NATO’s presence in the region.&nbsp;</span></p><span data-dcnode-id="7230" instrument_node="">
</span><p data-dcnode-id="7216"><span data-dcnode-id="7229" instrument_node="">In January 2018, the United States imposed new </span><a data-dcnode-id="7227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rferl.org/a/russia-new-u-s-sanctions-ukraine/29000684.html"><span data-dcnode-id="7228" instrument_node="">sanctions</span></a><span data-dcnode-id="7226" instrument_node=""> on twenty-one individuals–including a number of Russian officials–and nine companies linked to the conflict in eastern Ukraine. In March 2018, the State Department </span><a data-dcnode-id="7224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.voanews.com/a/us-announces-sale-of-lethal-aid-to-ukraine/4277150.html"><span data-dcnode-id="7225" instrument_node="">approved</span></a><span data-dcnode-id="7223" instrument_node=""> the sale of anti-tank weapons to Ukraine, the first sale of lethal weaponry since the conflict began. In October 2018, Ukraine joined the United States and seven other NATO countries in a series of large-scale air </span><a data-dcnode-id="7221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rferl.org/a/ukraine-launches-air-exercises-with-nato-countries/29532389.html"><span data-dcnode-id="7222" instrument_node="">exercises</span></a><span data-dcnode-id="7220" instrument_node=""> in western Ukraine. The exercises came after Russia held its annual military </span><a data-dcnode-id="7218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/news/monkey-cage/wp/2018/09/13/5-things-to-know-about-russias-vostok-2018-military-exercises/%3Futm_term%3D.5685ed26db90"><span data-dcnode-id="7219" instrument_node="">exercises</span></a><span data-dcnode-id="7217" instrument_node=""> in September 2018, the largest since the fall of the Soviet Union.</span></p><span data-dcnode-id="7215" instrument_node="">
</span><p data-dcnode-id="7189"><span data-dcnode-id="7214" instrument_node="">Ukraine has been the target of </span><a data-dcnode-id="7212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/us-ukraine-crisis-cyber/ukraine-hit-by-6500-hack-attacks-sees-russian-cyberwar-idUSKBN14I1QC"><span data-dcnode-id="7213" instrument_node="">thousands </span></a><span data-dcnode-id="7211" instrument_node="">of </span><a data-dcnode-id="7209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/interactive/cyber-operations"><span data-dcnode-id="7210" instrument_node="">cyberattacks.</span></a><span data-dcnode-id="7208" instrument_node=""> In December 2015, more than 225,000 people lost power across Ukraine in an </span><a data-dcnode-id="7206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/technology-35667989"><span data-dcnode-id="7207" instrument_node="">attack</span></a><span data-dcnode-id="7205" instrument_node=""> on power generation firms, and in December 2016 parts of Kyiv experienced another power </span><a data-dcnode-id="7203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/us-ukraine-cyber-attack-energy/ukraines-power-outage-was-a-cyber-attack-ukrenergo-idUSKBN1521BA"><span data-dcnode-id="7204" instrument_node="">blackout</span></a><span data-dcnode-id="7202" instrument_node=""> following a similar attack targeting a Ukrainian utility company. In June 2017, government and business computer systems in Ukraine were hit by the </span><a data-dcnode-id="7200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wired.com/story/notpetya-cyberattack-ukraine-russia-code-crashed-the-world/"><span data-dcnode-id="7201" instrument_node="">NotPetya cyberattack</span></a><span data-dcnode-id="7199" instrument_node="">, which was </span><a data-dcnode-id="7197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2018/02/15/us/politics/russia-cyberattack.html"><span data-dcnode-id="7198" instrument_node="">attributed</span></a><span data-dcnode-id="7196" instrument_node=""> to Russia; the attack spread to computer systems worldwide and caused billions of dollars in damages. In February 2022, Ukrainian government websites, including the defense and interior ministries, banking sites, and other affiliated organizations were </span><a data-dcnode-id="7194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apnews.com/article/russia-ukraine-technology-business-europe-russia-9e9f9e9b52eaf53cf9d8ade0588b661b"><span data-dcnode-id="7195" instrument_node="">targeted </span></a><span data-dcnode-id="7193" instrument_node="">by distributed-denial-of-service </span><a data-dcnode-id="7191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.eu/article/minister-ukraine-websites-down-in-another-massive-online-attack/"><span data-dcnode-id="7192" instrument_node="">attacks </span></a><span data-dcnode-id="7190" instrument_node="">alongside the Russian invasion.</span></p><span data-dcnode-id="7188" instrument_node="">
</span><p data-dcnode-id="7185"><b data-dcnode-id="7186"><span data-dcnode-id="7187" instrument_node="">Concerns</span></b></p><span data-dcnode-id="7184" instrument_node="">
</span><p data-dcnode-id="7182"><span data-dcnode-id="7183" instrument_node="">The current conflict has severely strained U.S.-Russia relations and increased the risk of a wider European conflict. Tensions are likely to increase between Russia and neighboring NATO member countries that would likely involve the United States, due to alliance security commitments. Additionally, the conflict in Ukraine will have broader ramifications for future cooperation on critical issues like arms control, cybersecurity, nuclear nonproliferation, energy security, counter-terrorism, and political solutions in Syria, Libya, and elsewhere.</span></p><span data-dcnode-id="7181" instrument_node="">
</span></div><span data-dcnode-id="7179" instrument_node="">
