li></ul></div></div></div><div class="post-tags" data-dcnode-id="2791"><h3 data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">Filed under:</span></h3><p data-dcnode-id="2792"><a data-dcnode-id="2820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justsecurity.org/tag/biden-administration/" rel="tag"><span data-dcnode-id="2821" instrument_node="">Biden administration</span></a><span data-dcnode-id="2819" instrument_node="">, </span><a data-dcnode-id="2817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justsecurity.org/tag/blinken/" rel="tag"><span data-dcnode-id="2818" instrument_node="">blinken</span></a><span data-dcnode-id="2816" instrument_node="">, </span><a data-dcnode-id="2814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justsecurity.org/tag/diplomacy/" rel="tag"><span data-dcnode-id="2815" instrument_node="">Diplomacy</span></a><span data-dcnode-id="2813" instrument_node="">, </span><a data-dcnode-id="2811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justsecurity.org/tag/russia/" rel="tag"><span data-dcnode-id="2812" instrument_node="">Russia</span></a><span data-dcnode-id="2810" instrument_node="">, </span><a data-dcnode-id="2808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justsecurity.org/tag/russia-ukraine-war/" rel="tag"><span data-dcnode-id="2809" instrument_node="">Russia-Ukraine War</span></a><span data-dcnode-id="2807" instrument_node="">, </span><a data-dcnode-id="2805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justsecurity.org/tag/sanctions/" rel="tag"><span data-dcnode-id="2806" instrument_node="">sanctions</span></a><span data-dcnode-id="2804" instrument_node="">, </span><a data-dcnode-id="2802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justsecurity.org/tag/ukraine/" rel="tag"><span data-dcnode-id="2803" instrument_node="">Ukraine</span></a><span data-dcnode-id="2801" instrument_node="">, </span><a data-dcnode-id="2799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justsecurity.org/tag/vladimir-putin/" rel="tag"><span data-dcnode-id="2800" instrument_node="">Vladimir Putin</span></a><span data-dcnode-id="2798" instrument_node="">, </span><a data-dcnode-id="2796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justsecurity.org/tag/volodymyr-zelenskyy/" rel="tag"><span data-dcnode-id="2797" instrument_node="">Volodymyr Zelenskyy</span></a><span data-dcnode-id="2795" instrument_node="">, </span><a data-dcnode-id="2793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justsecurity.org/tag/war/" rel="tag"><span data-dcnode-id="2794" instrument_node="">war</span></a></p></div></div><main class="content-body clearfix" data-dcnode-id="2388" id="primary" role="main" tabindex="-1"><article class="client-ui clearfix" data-dcnode-id="2625"><div class="print-authors" data-dcnode-id="2783"><p class="authors" data-dcnode-id="2786"><span data-dcnode-id="2789" instrument_node="">by </span><a class="author url fn" data-dcnode-id="2787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justsecurity.org/author/grahamjrthomas/" rel="author" title="Profile and articles by Ambassador Thomas Graham Jr."><span data-dcnode-id="2788" instrument_node="">Ambassador Thomas Graham Jr.</span></a></p><p class="date" data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">December 6, 2021</span></p></div><p data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">In the aftermath of Russia’s illegal 2014 seizure of Crimea and invasion of eastern Ukraine, I had a chance opportunity to ask a senior Russian official what President Vladimir Putin’s objectives were in Ukraine. The response was one word, and memorable: “Kiev.”</span></p><span data-dcnode-id="2780" instrument_node="">
</span><p data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">Putin had taken the opportunity to annex Crimea at a time when conditions made it relatively easy. The Putin-backed president of independent Ukraine, Viktor Yanukovych, had fled to Russia as months of street protests in the Ukrainian capital Kyiv (the Ukrainian transliteration vs. the Russian-language Kiev) reached a crescendo. The protestors had been outraged at Yanukovych’s decision to reject a potential association with the European Union and turn to Moscow instead, so the demonstrations signaled not only a political realignment but also a cultural shift to the West that likely further spurred Putin’s ire. There was chaos and confusion. And Putin probably was confident of public approval at home for a seizure of Crimea, an approval that he in fact received. Even some Westerners made arguments along the lines of, “Well you have to understand, Crimea is part of the essence of Russia.”</span></p><span data-dcnode-id="2777" instrument_node="">
</span><p data-dcnode-id="2772"><span data-dcnode-id="2776" instrument_node="">The United States and the EU were caught off guard, and only months later began to muster some weapons and intelligence support for the Ukrainians in the war in the east. But the U.S. and its allies never seriously entertained applying their own military force in a conflict that has </span><a data-dcnode-id="2774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apnews.com/article/europe-russia-ukraine-crimea-158c3406821bb207c07a279c5d48fadf"><span data-dcnode-id="2775" instrument_node="">killed more than 14,000 people</span></a><span data-dcnode-id="2773" instrument_node="">.</span></p><span data-dcnode-id="2771" instrument_node="">
</span><p data-dcnode-id="2766"><span data-dcnode-id="2770" instrument_node="">In that regard, today seems similar: a direct Western military response isn’t seen as likely, despite U.S. and EU sanctions rattling. President Joe Biden is preparing for a virtual meeting with Putin tomorrow and </span><a data-dcnode-id="2768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/national-security/russia-ukraine-invasion/2021/12/03/98a3760e-546b-11ec-8769-2f4ecdf7a2ad_story.html"><span data-dcnode-id="2769" instrument_node="">said on Dec. 3</span></a><span data-dcnode-id="2767" instrument_node=""> that he is preparing what “will be the most comprehensive and meaningful set of initiatives to make it very, very difficult for Mr. Putin to do what people are worried he may do,”</span></p><span data-dcnode-id="2765" instrument_node="">
</span><p data-dcnode-id="2757"><span data-dcnode-id="2764" instrument_node="">But Biden’s predecessor, Donald Trump, had helped Russia on Ukraine by stirring uncertainty with his threat to withhold U.S. military aid that had finally become more robust. Biden has withdrawn U.S. forces from Afghanistan, ceding control to the Taliban, and has signaled a distinct disinterest in military ventures abroad, though Congress has allotted </span><a data-dcnode-id="2762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/secretary-antony-j-blinken-and-ukrainian-foreign-minister-dmytro-kuleba/"><span data-dcnode-id="2763" instrument_node="">$400 million this fiscal year for military aid to Ukrainian forces</span></a><span data-dcnode-id="2761" instrument_node="">. Furthermore, Biden’s Democratic majority in Congress is highly vulnerable to a resurgence of Trump’s Republicans in the 2022 midterms. And that’s not to mention a potential return to the campaign trail for Trump himself for the 2024 presidential elections. Biden is nearing Trump’s lows in public approval ratings, according to an </span><a data-dcnode-id="2759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//projects.fivethirtyeight.com/biden-approval-rating/"><span data-dcnode-id="2760" instrument_node="">analysis</span></a><span data-dcnode-id="2758" instrument_node=""> by FiveThirtyEight of multiple poll results as of Dec. 3. So Putin would appear to have little to fear in terms of military consequences.</span></p><span data-dcnode-id="2756" instrument_node="">
</span><p data-dcnode-id="2745"><span data-dcnode-id="2755" instrument_node="">The Russian official’s description to me of Putin’s goal was echoed recently by the </span><em data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">Washington Post</span></em><span data-dcnode-id="2752" instrument_node="">’s David Ignatius in a </span><a data-dcnode-id="2750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/opinions/2021/11/18/us-is-warning-russia-ukraine-so-far-message-isnt-getting-through/"><span data-dcnode-id="2751" instrument_node="">Nov. 18 column</span></a><span data-dcnode-id="2749" instrument_node="">: “Putin’s goal seems to be restoration of Moscow’s Soviet-era hegemony over Kiev.” Hegemony over Kiev – and possibly a large chunk of Ukraine more broadly – could come to Russia in one of two ways, by invasion or via a coup that topples Ukrainian President Volodymyr Zelenskyy and establishes a puppet regime. Zelenskyy recently cited </span><a data-dcnode-id="2747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/2021/11/26/europe/ukraine-president-volodymyr-zelensky-coup-intl/index.html"><span data-dcnode-id="2748" instrument_node="">signs of such coup planning</span></a><span data-dcnode-id="2746" instrument_node="">, but such signs also might stem from Russian dezinformatze to distract the West from a focus on a direct military threat.</span></p><span data-dcnode-id="2744" instrument_node="">
</span><p data-dcnode-id="2741"><strong data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">Complicated Scenarios</span></strong></p><span data-dcnode-id="2740" instrument_node="">
</span><p data-dcnode-id="2732"><span data-dcnode-id="2739" instrument_node="">One might think the Western response to an invasion might be stronger and less controversial than responding to a coup. But that may not be the case – both scenarios are complicated. U.S. and European diplomats have been warning Putin for some time to pull back what looks like an invasion force – now said to be </span><a data-dcnode-id="2737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/national-security/russia-ukraine-invasion/2021/12/03/98a3760e-546b-11ec-8769-2f4ecdf7a2ad_story.html"><span data-dcnode-id="2738" instrument_node="">plans and movements</span></a><span data-dcnode-id="2736" instrument_node=""> geared for launching an all-out attack on Ukraine as soon as early next year, with 175,000 troops backed by armor and artillery units. The U.S. and European diplomats threaten “harsh consequences from a U.S.-led coalition,” as Ignatius put it. This sounds reasonably strong, and Secretary of State Antony Blinken seemed to suggest a firm response on Nov. 10 in a </span><a data-dcnode-id="2734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/secretary-antony-j-blinken-and-ukrainian-foreign-minister-dmytro-kuleba/"><span data-dcnode-id="2735" instrument_node="">joint press conference</span></a><span data-dcnode-id="2733" instrument_node=""> with Ukrainian Foreign Minister Dmytro Kuleba. Saying he was speaking for Biden, Blinken declared, “Our commitment to Ukraine’s sovereignty, to its independence, to its territorial integrity is ironclad.”</span></p><span data-dcnode-id="2731" instrument_node="">
</span><p data-dcnode-id="2726"><span data-dcnode-id="2730" instrument_node="">CIA Director William J. Burns also had paid a visit to Moscow earlier in November to meet with senior Russian officials, and warned them that a Russian invasion of Ukraine would prompt the United States to impose serious economic measures and eliminate any hope of better relations with the West. Blinken then </span><a data-dcnode-id="2728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.yahoo.com/blinken-says-russia-could-move-164226598.html"><span data-dcnode-id="2729" instrument_node="">reiterated</span></a><span data-dcnode-id="2727" instrument_node=""> the threat of “high-impact economic measures” during meetings of NATO foreign ministers in Riga, Latvia, earlier this month, though he gave no details. The reference might signal the possibility of ejecting Russia from the SWIFT banking system, which manages international transactions in dollars. This indeed would be a severe penalty, one that the West considered but declined to impose on Russia in 2014. And Germany might balk this time, too, if Russia proclaims in turn that it would be unable to provide its usual gas supplies.</span></p><span data-dcnode-id="2725" instrument_node="">
</span><p data-dcnode-id="2717"><span data-dcnode-id="2724" instrument_node="">Yet, it could be that more economic sanctions, even the prospect of expulsion from SWIFT, would not deter Putin from attempting to win back Ukraine, which Russian nationalists consider their jewel in the crown. Putin once </span><a data-dcnode-id="2722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nbcnews.com/id/wbna7632057"><span data-dcnode-id="2723" instrument_node="">declared</span></a><span data-dcnode-id="2721" instrument_node=""> that the collapse of the Soviet Union was the “greatest geo-strategic catastrophe of the 20</span><sup data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">th</span></sup><span data-dcnode-id="2718" instrument_node=""> Century.” And he might think that U.S. and EU political conditions are ripe for a weak response.</span></p><span data-dcnode-id="2716" instrument_node="">
</span><p data-dcnode-id="2711"><span data-dcnode-id="2715" instrument_node="">In addition to the above-mentioned factors constraining Biden, the U.S. president appears to want to continue holding high-level talks with Russia to improve relations overall and to revive the arms control process. For his part, Putin has floated a variety of security assurances that he suggests might ameliorate his supposed sense of threat from NATO. Some, such as a formal agreement that NATO would forego any further expansion and that Ukraine will never join NATO, are nonstarters because they would amount to a Russian veto over NATO and Ukrainian decisions in the future and because it is exceedingly difficult for one U.S. administration to bind future administrations on such issues. Some </span><a data-dcnode-id="2713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/steven_pifer/status/1467535350465589250%3Fs%3D20"><span data-dcnode-id="2714" instrument_node="">analysts also have</span></a><span data-dcnode-id="2712" instrument_node=""> noted that Ukraine in the 1990s gave up its nuclear arsenal, the third-largest in the world, after the breakup of the Soviet Union in return for assurances from Russia, the United States, and the United Kingdom in what was known as the Budapest Memorandum, a pledge that Putin reneged on when he invaded Ukraine just 20 years later in 2014.</span></p><span data-dcnode-id="2710" instrument_node="">
</span><p data-dcnode-id="2699"><span data-dcnode-id="2709" instrument_node="">Further evidence that Putin has an even larger invasion in mind includes a </span><a data-dcnode-id="2707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.kremlin.ru/events/president/news/66181"><span data-dcnode-id="2708" instrument_node="">long article he published</span></a><span data-dcnode-id="2706" instrument_node=""> on the Kremlin’s website in July, in which he expounded that Russians and Ukrainians are “one people — a single whole.” He argued that “true sovereignty of Ukraine is possible only in partnership with Russia.” This, of course, would come as a surprise to Ukrainians, considering Russians never considered them to be anything more than an inferior people in either the former Russian Empire or the Soviet Union. And as far as sovereignty </span><em data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">with</span></em><span data-dcnode-id="2703" instrument_node=""> Russia, Ukraine would recall the terrible purge of Ukrainians under the leadership of Nikita Khrushchev on Stalin’s orders in the late 1930s. The fact is that Russians have never treated Ukrainians equally since the fall of the Kievan Rus and its incorporation into Russia in the 17</span><sup data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">th</span></sup><span data-dcnode-id="2700" instrument_node=""> Century.</span></p><span data-dcnode-id="2698" instrument_node="">
</span><p data-dcnode-id="2695"><strong data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">Putin Talks About Ukraine Like China’s President Xi on Taiwan</span></strong></p><span data-dcnode-id="2694" instrument_node="">
</span><p data-dcnode-id="2689"><span data-dcnode-id="2693" instrument_node="">It is notable that Putin speaks of Ukraine in much the same way as Chinese President Xi Jinping does of Taiwan when demanding reunification. To add to Putin’s ominous exposition, former Russian President and Prime Minister Dmitry Medvedev, a Putin tool, published an article in the Russian news outlet Kommersant in October excoriating Ukraine as a “vassal” state and its president, Zelenskyy, as “`weak,’ `ignorant’ and `unreliable’,” according to the </span><a data-dcnode-id="2691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.themoscowtimes.com/2021/10/11/russia-shouldnt-negotiate-with-vassal-ukraine-ex-president-medvedev-says-a75263"><span data-dcnode-id="2692" instrument_node="">Moscow Times</span></a><span data-dcnode-id="2690" instrument_node="">.</span></p><span data-dcnode-id="2688" instrument_node="">
</span><p data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">And now Belarus is in the picture. The highly unpopular longtime dictator who has been in office since 1994 and consolidated his own power just a few years later, Alexander Lukashenko, played Putin off against the West for decades until succumbing to Putin’s influence entirely in desperation last year, when his rule appeared threatened by months-long protests in the wake of another rigged election. Taking lessons or direction – it’s hard to tell which — Lukashenko has since waged an unprecedentedly violent crackdown on his opponents, even going so far as to intercept a Ryanair passenger plane mid-flight last spring, forcing it to land in Belarus so his goons could abduct an opposition journalist who was living in exile in Lithuania.</span></p><span data-dcnode-id="2685" instrument_node="">
</span><p data-dcnode-id="2680"><span data-dcnode-id="2684" instrument_node="">Now Lukashenko has </span><a data-dcnode-id="2682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.telegraph.co.uk/world-news/2021/11/29/belarus-will-back-russia-war-breaks-ukraine-says-lukashenko/"><span data-dcnode-id="2683" instrument_node="">expressed support</span></a><span data-dcnode-id="2681" instrument_node=""> for Putin’s invasion of Ukraine, signaling that he could deploy Belarusian forces to his own border with Ukraine to help out. If Putin incorporates both Ukraine and Belarus along the way, his mission to reestablish the Russian Empire might begin to look vaguely practical. In any case, forces coming from Belarus as well as Russia could complicate things further for the West.</span></p><span data-dcnode-id="2679" instrument_node="">
</span><p data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">If new Russian troops do cross the Ukrainian border and start moving toward Kiev and Odessa and if troops start coming from the north – Belarus — as well, NATO will need to make important decisions very quickly. The United States and NATO are talking as if they are foreclosing any direct military action and instead plan to rely on economic sanctions alone. This could set a bad precedent for other adventures that Putin and Xi might have in store for Europe and Asia, including Taiwan.</span></p><span data-dcnode-id="2676" instrument_node="">
</span><p data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">In the worst-case scenario of a new Russian invasion of Ukraine that reaches the Dnieper River and Kyiv, the U.S. could consider not only imposing severe sanctions but also sending a contingent of special operations forces to Western Ukraine and announcing that it would not cross the Dnieper River but would stay in Western Ukraine until Putin is prepared to make a deal. Putin seems to care little about Western Ukraine, perhaps largely because it wasn’t under Russian influence before it was pulled into the Soviet Union with the Molotov-Ribbentrop Pact of 1939. That also might provide a safe haven for the legitimate government of Ukraine, should it be forced out of Kyiv.</span></p><span data-dcnode-id="2673" instrument_node="">
</span><p data-dcnode-id="2666"><span data-dcnode-id="2672" instrument_node="">But the United States should never let Russia seize Ukraine or successfully overthrow the government from within. As the </span><a data-dcnode-id="2668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/opinions/2021/12/02/forecast-ukraine-winter-storm-gathering-russian-front/"><em data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">Washington Post</span></em><span data-dcnode-id="2669" instrument_node="">’s editorial board</span></a><span data-dcnode-id="2667" instrument_node=""> says, American diplomacy will succeed only if it is “backed up with political, economic and military strength” The United States will have many such challenges in the years ahead, primarily from Russia and China — they are not going to change into peaceful partners. So the U.S. and its partners will have to learn how to suppress moves like the one Putin apparently is contemplating.</span></p><span data-dcnode-id="2665" instrument_node="">
</span><h6 data-dcnode-id="2662"><em data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">IMAGE: Russia’s President Vladimir Putin is shown at a desk, attending a meeting of the Supreme State Council of the Union State of Russia and Belarus on Unity Day, via teleconference call, in Sevastopol, Crimea, on November 4, 2021.&nbsp; (Photo by MIKHAIL METZEL/SPUTNIK/AFP via Getty Images)</span></em></h6><span data-dcnode-id="2661" instrument_node="">
