tps://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apnews.com/article/business-europe-russia-ukraine-moscow-6f0b3cf18eba2bfa8ec4ee6d209eee74/gallery/d6cc178aa6ed487baa2b509cd1f60721"><div class="placeholder-0-2-57 undefined" data-dcnode-id="319" data-key="media-placeholder"><img alt="FILE - In this photo released by the Russian Defense Ministry Press Service, a view of the joint strategic exercise of the armed forces of the Russian Federation and the Republic of Belarus Zapad-2021 at the Mulino training ground in the Nizhny Novgorod region, Russia, Saturday, Sept. 11, 2021. A Russian troop buildup near Ukraine has fueled Ukrainian and Western fears of an invasion, but Moscow has denied planning such an attack. (Vadim Savitskiy/Russian Defense Ministry Press Service via AP, File)" class="image-0-2-58" data-dcnode-id="320" height="1300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//storage.googleapis.com/afs-prod/media/d6cc178aa6ed487baa2b509cd1f60721/1000.jpeg&amp;raw" style="opacity: 1;" width="2000"></div><svg class="SvgSprite gallery-arrow Component-galleryArrow-0-2-54" data-dcnode-id="311"><use data-dcnode-id="312" xlink:href="/dist/spritemap.svg#sprite-gallery-arrow"><svg data-dcnode-id="313" id="sprite-gallery-arrow" viewBox="0 0 72 72"><title data-dcnode-id="317">gallery-arrow</title><path d="M36 69.55A33.55 33.55 0 1169.55 36 33.59 33.59 0 0136 69.55z" data-dcnode-id="316" opacity=".25"></path><path class="cls-2" d="M36 3.89A32.11 32.11 0 113.89 36 32.14 32.14 0 0136 3.89M36 1a35 35 0 1035 35A35 35 0 0036 1z" data-dcnode-id="315" fill="var(--colour, #FFFFFF)"></path><path d="M32.37 47.12L43.49 36 32.37 24.88" data-dcnode-id="314" fill="none" stroke="var(--colour, #FFFFFF)" stroke-miterlimit="10" stroke-width="3"></path></svg></use></svg><div class="count-caption Component-countCaption-0-2-50" data-dcnode-id="296"><div class="ImageGalleryCount" data-dcnode-id="300"><svg class="SvgSprite" data-dcnode-id="303"><use data-dcnode-id="304" xlink:href="/dist/spritemap.svg#sprite-gallery-count"><svg data-dcnode-id="305" id="sprite-gallery-count" viewBox="0 0 72 72"><title data-dcnode-id="309">apnews-gallery</title><path class="cls-1" d="M6 16.13h59.39v39.54H6z" data-dcnode-id="308" fill="none" stroke="var(--colour, #787878)" stroke-miterlimit="10" stroke-width="5"></path><path class="cls-1" d="M14.62 55.87l15.13-16.34L36 46.39l16.69-17.96L66 42.96" data-dcnode-id="307" fill="none" stroke="var(--colour, #787878)" stroke-miterlimit="10" stroke-width="5"></path><circle class="cls-2" cx="18.55" cy="29.34" data-dcnode-id="306" fill="var(--colour, #787878)" r="5.55"></circle></svg></use></svg><span data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">1 of 7</span></span></div><div class="Component-imageCaption-0-2-56" data-dcnode-id="297"><div class="embed-caption Component-root-0-2-59 Component-embedCaption-0-2-53" data-dcnode-id="298" data-key="embed-caption"><span data-dcnode-id="299" instrument_node="">FILE - In this photo released by the Russian Defense Ministry Press Service, a view of the joint strategic exercise of the armed forces of the Russian Federation and the Republic of Belarus Zapad-2021 at the Mulino training ground in the Nizhny Novgorod region, Russia, Saturday, Sept. 11, 2021. A Russian troop buildup near Ukraine has fueled Ukrainian and Western fears of an invasion, but Moscow has denied planning such an attack. (Vadim Savitskiy/Russian Defense Ministry Press Service via AP, File)</span></div></div></div></a><div class="Article" data-dcnode-id="185" data-key="article"><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">MOSCOW (AP) — Russia on Friday published draft security demands that NATO deny membership to Ukraine and other former Soviet countries and roll back the alliance’s military deployments in Central and Eastern Europe — bold ultimatums that are almost certain to be rejected by the U.S. and its allies.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">The proposals, which were submitted to the U.S. and its allies earlier this week, also call for a ban on sending U.S. and Russian warships and aircraft to areas from where they can strike each other’s territory, along with a halt to NATO military drills near Russia.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">The demand for a written guarantee that Ukraine won’t be offered membership already has been rejected by the West, which said Moscow doesn’t have a say in NATO’s enlargement.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">NATO’s secretary-general emphasized Friday that any security talks with Moscow would need to take into account NATO concerns and involve Ukraine and other partners. The White House similarly said it’s discussing the proposals with U.S. allies and partners, but noted that all countries have the right to determine their future without outside interference.</span></p><div class="Component-dfp-0-2-64" data-dcnode-id="281"><div class="Component-adTitle-0-2-22" data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">ADVERTISEMENT</span></div><div class="Component-placeholderWrapper-0-2-25" data-dcnode-id="282"><div class="Component-visualPlaceholder-0-2-23" data-dcnode-id="284"></div><div class="DFPSlot Component-ad-0-2-21" data-dcnode-id="283" data-key="ad-placeholder" id="div-gpt-ad_site_article_midarticle1"></div></div></div><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">The publication of the demands — contained in a proposed Russia-U.S. security treaty and a security agreement between Moscow and NATO — comes amid soaring tensions over a Russian troop buildup near Ukraine that has raised fears of an invasion. Moscow has denied it has plans to attack its neighbor but wants legal guarantees precluding NATO expansion and deploying weapons there.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Deputy Foreign Minister Sergei Ryabkov said Russia’s relations with the U.S. and NATO have approached a “dangerous point,” noting that alliance deployments and drills near Russia have raised “unacceptable” threats to its security.</span></p><div class="Component-hubPeekEmbed-0-2-68 HubPeek noBorderBottom-0-2-70 compressedEmbed-0-2-71" data-dcnode-id="240"><div class="hubPeekContainerWide-0-2-73" data-dcnode-id="241" data-key="feed-card-hub-peak"><div class="title-0-2-74" data-dcnode-id="273"><a class="blueTitle-0-2-75 blueTitle-7-0-2-126 overrideArticle" data-dcnode-id="274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apnews.com/hub/ap-top-news"><h3 class="title-0-2-74" data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Top stories</span></h3></a></div><div class="columnLayout-0-2-79" data-dcnode-id="242"><li class="listItem-0-2-93" data-dcnode-id="266"><a class="wireStoryContainer-0-2-84 noImage-0-2-85" data-dcnode-id="267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apnews.com/article/russia-ukraine-zelenskyy-kyiv-business-lloyd-austin-b070518fe13dc3286620d4864dc4cd0c"><div class="imageContainer-0-2-86" data-dcnode-id="272"></div><div class="titleContainer-0-2-87" data-dcnode-id="268"><div class="title-0-2-88 overrideArticle" data-dcnode-id="269"><h4 class="headline-0-2-91" data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">Zelenskyy meets top-level US delegation, gets aid promises</span></h4></div></div></a></li><li class="listItem-0-2-93" data-dcnode-id="259"><a class="wireStoryContainer-0-2-84 noImage-0-2-85" data-dcnode-id="260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apnews.com/article/russia-ukraine-biden-kyiv-lloyd-austin-europe-3a8441a7b10c5786fe5fd7f841332697"><div class="imageContainer-0-2-86" data-dcnode-id="265"></div><div class="titleContainer-0-2-87" data-dcnode-id="261"><div class="title-0-2-88 overrideArticle" data-dcnode-id="262"><h4 class="headline-0-2-91" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">In Kyiv, Blinken and Austin announce aid, diplomatic surge</span></h4></div></div></a></li><div class="divider-0-2-77" data-dcnode-id="258"></div><div class="divider-0-2-77" data-dcnode-id="257"></div><li class="listItem-0-2-93" data-dcnode-id="250"><a class="wireStoryContainer-0-2-84 noImage-0-2-85" data-dcnode-id="251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apnews.com/article/immigration-religion-france-elections-presidential-a63b8815ce42892308ed5df0315f6def"><div class="imageContainer-0-2-86" data-dcnode-id="256"></div><div class="titleContainer-0-2-87" data-dcnode-id="252"><div class="title-0-2-88 overrideArticle" data-dcnode-id="253"><h4 class="headline-0-2-91" data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Analysis: Loss is victory for far-right in France's election</span></h4></div></div></a></li><li class="listItem-0-2-93" data-dcnode-id="243"><a class="wireStoryContainer-0-2-84 noImage-0-2-85" data-dcnode-id="244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apnews.com/article/2022-french-election-voting-results-f5b549e3b99930ee05bed17a9d3870b6"><div class="imageContainer-0-2-86" data-dcnode-id="249"></div><div class="titleContainer-0-2-87" data-dcnode-id="245"><div class="title-0-2-88 overrideArticle" data-dcnode-id="246"><h4 class="headline-0-2-91" data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">To Europe's relief, France's Macron wins but far-right gains</span></h4></div></div></a></li></div></div></div><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Moscow wants the U.S. to start talks immediately on the proposals in Geneva, he told reporters.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">NATO Secretary-General Jens Stoltenberg said the alliance had received the Russian documents, and noted that any dialogue with Moscow “would also need to address NATO’s concerns about Russia’s actions, be based on core principles and documents of European security, and take place in consultation with NATO’s European partners, such as Ukraine.”</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">He added that the 30 NATO countries “have made clear that should Russia take concrete steps to reduce tensions, we are prepared to work on strengthening confidence building measures.”</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">White House national security adviser Jake Sullivan said the administration is ready to discuss Moscow’s concerns about NATO in talks with Russian officials, but emphasized that Washington is committed to the “principle of nothing about you without you” in shaping policy that impacts European allies.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">“We’re approaching the broader question of diplomacy with Russia from the point of view that ... meaningful progress at the negotiating table, of course, will have to take place in a context of de-escalation rather than escalation,” Sullivan said at the event hosted by the Council on Foreign Relations. He added “that it’s very difficult to see agreements getting consummated if we’re continuing to see an escalatory cycle.”</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">While U.S. intelligence has determined that Russian President Vladimir Putin has made plans for a potential further invasion of Ukraine in early 2022, Sullivan said the U.S. still does not know whether he has decided to move forward.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">White House press secretary Jen Psaki noted that strategic security talks with Moscow go back decades, saying that “there’s no reason we can’t do that moving forward to reduce instability, but we’re going to do that in partnership and coordination with our European allies and partners.”</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">”We will not compromise the key principles on which European security is built, including that all countries have the right to decide their own future and foreign policy free from the outside interference,” Psaki said.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">Moscow’s draft also calls for efforts to reduce the risk of incidents involving Russia and NATO warships and aircraft, primarily in the Baltic and the Black seas, increase the transparency of military drills and other confidence-building measures.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">A senior U.S. official said some of the Russian proposals are part of an arms control agenda between Moscow and Washington, while some other issues, such as transparency and deconfliction, concern all 57 members of the Organization for Security and Cooperation in Europe, including Ukraine and Georgia.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">The official, who briefed reporters on the condition of anonymity in order to talk about the proposals, said the U.S. is looking at how to engage every country whose interests are affected in prospective talks on European security issues and will respond to Moscow sometime next week with concrete proposals after consulting with the allies.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">President Vladimir Putin raised the demand for security guarantees in last week’s video call with U.S. President Joe Biden. During the conversation, Biden voiced concern about a buildup of Russian troops near Ukraine and warned him that Russia would face “severe consequences” if Moscow attacked its neighbor.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Russia annexed Ukraine’s Crimean Peninsula in 2014 and shortly after cast its support behind a separatist rebellion in the country’s east. More than seven years of fighting has killed over 14,000 people and devastated Ukraine’s industrial heartland, known as the Donbas.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">The Russian demands would oblige Washington and its allies to pledge to halt NATO’s eastward expansion to include other ex-Soviet republics and rescind a 2008 promise of membership to Ukraine and Georgia. The alliance already has firmly rejected that demand from Moscow. </span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">Moscow’s documents also would preclude the U.S. and other NATO allies from conducting any military activities in Ukraine, other countries of Eastern Europe and ex-Soviet republics in the Caucasus and in Central Asia.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">The Ukrainian Foreign Ministry commented on Moscow’s proposals by emphasizing that it’s up to the alliance and Ukraine to discuss NATO membership prospects and its military cooperation with other countries.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">“The Russian aggression and the current Russian escalation along the Ukrainian border and on the occupied territories is now the main problem for the Euro-Atlantic security,” said its spokesman Oleg Nikolenko.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">The Russian proposal also ups the ante by putting a new demand to roll back NATO military deployments in Central and Eastern Europe, stating that the parties agree not to send any troops to areas where they hadn’t been present in 1997 — before NATO’s eastward expansion started — except for exceptional situations of mutual consent.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">Poland, Hungary and the Czech Republic joined NATO in 1999, followed in 2004 by Bulgaria, Romania, Slovakia, Slovenia and the former Soviet republics of Estonia, Latvia and Lithuania. In the following years, Albania, Croatia, Montenegro and North Macedonia also became members, bringing NATO membership to 30 nations.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">The draft proposals contain a ban on the deployment of U.S. and Russian warships and aircraft to “areas where they can strike targets on the territory of the other party.” </span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">Moscow has long complained about patrol flights by U.S. strategic bombers near Russia’s borders and the deployment of U.S. and NATO warships to the Black Sea, describing them as destabilizing and provocative.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">Russia’s draft envisages a pledge not to station intermediate-range missiles in areas where they can strike the other party’s territory, a clause that follows the U.S. and Russian withdrawal from a Cold War-era pact banning such weapons.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">The Russian draft also calls for a ban on the deployment of U.S. and Russian nuclear weapons on the territory of other countries — a repeat of Moscow’s longtime push for the U.S. to withdraw its nuclear weapons from Europe. </span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">Dmitri Trenin, the director of the Carnegie Moscow Center, noted that the publication of the Russian demands signals that the Kremlin considers their acceptance by the West unlikely.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">“This logically means that Russia will have to assure its security single-handedly” using military-technical means, he said on Twitter.</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">___</span></p><p class="Component-root-0-2-69 Component-p-0-2-60" data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">Cook reported from Brussels. Darlene Superville, Ellen Knickmeyer and Aamer Madhani in Washington and Yuras Karmanau in Kyiv, Ukraine, contributed.</span></p></div><div class="bellow-article" data-dcnode-id="176"><div class="ntv-below-article" data-dcn
