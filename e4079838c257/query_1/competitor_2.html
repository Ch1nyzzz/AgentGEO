80%D1%8B_05.jpg/440px-%D0%A0%D0%BE%D1%81%D1%81%D0%B8%D0%B9%D1%81%D0%BA%D0%BE-%D1%81%D0%B5%D1%80%D0%B1%D1%81%D0%BA%D0%B8%D0%B5_%D0%BF%D0%B5%D1%80%D0%B5%D0%B3%D0%BE%D0%B2%D0%BE%D1%80%D1%8B_05.jpg 2x" width="220"></a><span data-dcnode-id="5480" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5467"><div class="magnify" data-dcnode-id="5478"><a class="internal" data-dcnode-id="5479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25D0%25A0%25D0%25BE%25D1%2581%25D1%2581%25D0%25B8%25D0%25B9%25D1%2581%25D0%25BA%25D0%25BE-%25D1%2581%25D0%25B5%25D1%2580%25D0%25B1%25D1%2581%25D0%25BA%25D0%25B8%25D0%25B5_%25D0%25BF%25D0%25B5%25D1%2580%25D0%25B5%25D0%25B3%25D0%25BE%25D0%25B2%25D0%25BE%25D1%2580%25D1%258B_05.jpg" title="Enlarge"></a></div><span data-dcnode-id="5477" instrument_node="">Vučić meeting </span><a data-dcnode-id="5475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_Russia" title="President of Russia"><span data-dcnode-id="5476" instrument_node="">President of Russia</span></a><span data-dcnode-id="5474" instrument_node=""> </span><a data-dcnode-id="5472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Putin" title="Vladimir Putin"><span data-dcnode-id="5473" instrument_node="">Vladimir Putin</span></a><span data-dcnode-id="5471" instrument_node=""> in </span><a data-dcnode-id="5469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belgrade" title="Belgrade"><span data-dcnode-id="5470" instrument_node="">Belgrade</span></a><span data-dcnode-id="5468" instrument_node=""> (2019)</span></div></div></div><span data-dcnode-id="5464" instrument_node="">
</span><p data-dcnode-id="5444"><span data-dcnode-id="5463" instrument_node="">After </span><a data-dcnode-id="5461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Putin" title="Vladimir Putin"><span data-dcnode-id="5462" instrument_node="">Vladimir Putin</span></a><span data-dcnode-id="5460" instrument_node=""> became the </span><a data-dcnode-id="5458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_Russia" title="President of Russia"><span data-dcnode-id="5459" instrument_node="">President of Russia</span></a><span data-dcnode-id="5457" instrument_node=""> with the start of year 2000, months after the </span><a data-dcnode-id="5455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO_bombing_of_Yugoslavia" title="NATO bombing of Yugoslavia"><span data-dcnode-id="5456" instrument_node="">NATO bombing of Yugoslavia</span></a><span data-dcnode-id="5454" instrument_node="">, relations between the countries began to gain momentum. Following the </span><a data-dcnode-id="5452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Overthrow_of_Slobodan_Milo%25C5%25A1evi%25C4%2587" title="Overthrow of Slobodan Milošević"><span data-dcnode-id="5453" instrument_node="">overthrow of Slobodan Milošević</span></a><span data-dcnode-id="5451" instrument_node="">, the new </span><a data-dcnode-id="5449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_Serbia_and_Montenegro" title="President of Serbia and Montenegro"><span data-dcnode-id="5450" instrument_node="">President of Yugoslavia</span></a><span data-dcnode-id="5448" instrument_node=""> </span><a data-dcnode-id="5446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vojislav_Ko%25C5%25A1tunica" title="Vojislav Koštunica"><span data-dcnode-id="5447" instrument_node="">Vojislav Koštunica</span></a><span data-dcnode-id="5445" instrument_node=""> paid a visit to Putin in October 2000.
</span></p><p data-dcnode-id="5423"><span data-dcnode-id="5443" instrument_node="">In January 2008, a major deal was struck between Moscow and Belgrade that by the end of the year transferred 51 percent of Serbia's </span><a data-dcnode-id="5441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_oil_exploration_and_production_companies" title="List of oil exploration and production companies"><span data-dcnode-id="5442" instrument_node="">oil and gas company</span></a><span data-dcnode-id="5440" instrument_node=""> </span><a data-dcnode-id="5438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Naftna_Industrija_Srbije" title="Naftna Industrija Srbije"><span data-dcnode-id="5439" instrument_node="">Naftna Industrija Srbije</span></a><span data-dcnode-id="5437" instrument_node=""> (NIS) to Russia's </span><a data-dcnode-id="5435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gazprom_Neft" title="Gazprom Neft"><span data-dcnode-id="5436" instrument_node="">Gazprom Neft</span></a><span data-dcnode-id="5434" instrument_node=""> (a subsidiary of </span><a data-dcnode-id="5432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gazprom" title="Gazprom"><span data-dcnode-id="5433" instrument_node="">Gazprom</span></a><span data-dcnode-id="5431" instrument_node="">) in exchange for 400 million Euros and 550 mln Euros of investments; later Gazprom increased its stake in NIS to 56,5 percent.</span><sup class="reference" data-dcnode-id="5428" id="cite_ref-60"><a data-dcnode-id="5429" href="#cite_note-60"><span data-dcnode-id="5430" instrument_node="">[60]</span></a></sup><sup class="reference" data-dcnode-id="5425" id="cite_ref-carnegieillus_61-0"><a data-dcnode-id="5426" href="#cite_note-carnegieillus-61"><span data-dcnode-id="5427" instrument_node="">[61]</span></a></sup><span data-dcnode-id="5424" instrument_node="">
</span></p><p data-dcnode-id="5363"><span data-dcnode-id="5422" instrument_node="">In April 2012, </span><a data-dcnode-id="5420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ivica_Da%25C4%258Di%25C4%2587" title="Ivica Dačić"><span data-dcnode-id="5421" instrument_node="">Ivica Dačić</span></a><span data-dcnode-id="5419" instrument_node="">, then </span><a data-dcnode-id="5417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deputy_Prime_Minister_of_Serbia" title="Deputy Prime Minister of Serbia"><span data-dcnode-id="5418" instrument_node="">Deputy Prime Minister of Serbia</span></a><span data-dcnode-id="5416" instrument_node=""> and the </span><a data-dcnode-id="5414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Internal_Affairs_%28Serbia%29" title="Ministry of Internal Affairs (Serbia)"><span data-dcnode-id="5415" instrument_node="">Minister of Internal Affairs of Serbia</span></a><span data-dcnode-id="5413" instrument_node="">, and </span><a data-dcnode-id="5411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Puchkov" title="Vladimir Puchkov"><span data-dcnode-id="5412" instrument_node="">Vladimir Puchkov</span></a><span data-dcnode-id="5410" instrument_node="">, </span><a data-dcnode-id="5408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Emergency_Situations_%28Russia%29" title="Ministry of Emergency Situations (Russia)"><span data-dcnode-id="5409" instrument_node="">Deputy Minister of Emergency Situations of Russia</span></a><span data-dcnode-id="5407" instrument_node="">, opened the </span><a data-dcnode-id="5405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian-Serbian_Humanitarian_Center" title="Russian-Serbian Humanitarian Center"><span data-dcnode-id="5406" instrument_node="">Russian-Serbian Humanitarian Center</span></a><span data-dcnode-id="5404" instrument_node=""> in </span><a data-dcnode-id="5402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ni%25C5%25A1" title="Niš"><span data-dcnode-id="5403" instrument_node="">Niš</span></a><span data-dcnode-id="5401" instrument_node="">, an </span><a data-dcnode-id="5399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intergovernmental_organization" title="Intergovernmental organization"><span data-dcnode-id="5400" instrument_node="">intergovernmental</span></a><span data-dcnode-id="5398" instrument_node=""> </span><a data-dcnode-id="5396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nonprofit_organization" title="Nonprofit organization"><span data-dcnode-id="5397" instrument_node="">nonprofit organization</span></a><span data-dcnode-id="5395" instrument_node="">.</span><sup class="reference" data-dcnode-id="5392" id="cite_ref-62"><a data-dcnode-id="5393" href="#cite_note-62"><span data-dcnode-id="5394" instrument_node="">[62]</span></a></sup><span data-dcnode-id="5391" instrument_node=""> While Serbia has intensive military cooperation with </span><a data-dcnode-id="5389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="5390" instrument_node="">NATO</span></a><span data-dcnode-id="5388" instrument_node=""> (Serbia's military-to-military cooperation with the U.S. being much bigger than with Russia</span><sup class="reference" data-dcnode-id="5385" id="cite_ref-reutersedges_63-0"><a data-dcnode-id="5386" href="#cite_note-reutersedges-63"><span data-dcnode-id="5387" instrument_node="">[63]</span></a></sup><sup class="reference" data-dcnode-id="5382" id="cite_ref-politikaradaru_64-0"><a data-dcnode-id="5383" href="#cite_note-politikaradaru-64"><span data-dcnode-id="5384" instrument_node="">[64]</span></a></sup><span data-dcnode-id="5381" instrument_node="">) and in early 2016 the Serbian parliament ratified an agreement that granted NATO staff freedom of movement in the Serbian territory and diplomatic immunity,</span><sup class="reference" data-dcnode-id="5378" id="cite_ref-65"><a data-dcnode-id="5379" href="#cite_note-65"><span data-dcnode-id="5380" instrument_node="">[65]</span></a></sup><sup class="reference" data-dcnode-id="5375" id="cite_ref-66"><a data-dcnode-id="5376" href="#cite_note-66"><span data-dcnode-id="5377" instrument_node="">[66]</span></a></sup><span data-dcnode-id="5374" instrument_node=""> the Serbian government has refused to grant similar status to the Russian-Serbian Humanitarian Center in Niš.</span><sup class="reference" data-dcnode-id="5371" id="cite_ref-67"><a data-dcnode-id="5372" href="#cite_note-67"><span data-dcnode-id="5373" instrument_node="">[67]</span></a></sup><sup class="reference" data-dcnode-id="5368" id="cite_ref-carnegieillus_61-1"><a data-dcnode-id="5369" href="#cite_note-carnegieillus-61"><span data-dcnode-id="5370" instrument_node="">[61]</span></a></sup><sup class="reference" data-dcnode-id="5365" id="cite_ref-68"><a data-dcnode-id="5366" href="#cite_note-68"><span data-dcnode-id="5367" instrument_node="">[68]</span></a></sup><span data-dcnode-id="5364" instrument_node="">
</span></p><span data-dcnode-id="5362" instrument_node="">

pedia.org/wiki/Dmitry_Medvedev" title="Dmitry Medvedev"><span data-dcnode-id="5350" instrument_node="">Dmitry Medvedev</span></a><span data-dcnode-id="5348" instrument_node="">, President of Russia, in Belgrade, 2009.</span></div></div></div><span data-dcnode-id="5344" instrument_node="">

32"><div class="magnify" data-dcnode-id="5339"><a class="internal" data-dcnode-id="5340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25D0%2592%25D1%2581%25D1%2582%25D1%2580%25D0%25B5%25D1%2587%25D0%25B0_%25D1%2581_%25D0%259F%25D1%2580%25D0%25B5%25D0%25B4%25D1%2581%25D0%25B5%25D0%25B4%25D0%25B0%25D1%2582%25D0%25B5%25D0%25BB%25D0%25B5%25D0%25BC_%25D0%259F%25D1%2580%25D0%25B0%25D0%25B2%25D0%25B8%25D1%2582%25D0%25B5%25D0%25BB%25D1%258C%25D1%2581%25D1%2582%25D0%25B2%25D0%25B0_%25D0%25A1%25D0%25B5%25D1%2580%25D0%25B1%25D0%25B8%25D0%25B8_%25D0%2590%25D0%25BB%25D0%25B5%25D0%25BA%25D1%2581%25D0%25B0%25D0%25BD%25D0%25B4%25D1%2580%25D0%25BE%25D0%25BC_%25D0%2592%25D1%2583%25D1%2587%25D0%25B8%25D1%2587%25D0%25B5%25D0%25BC.jpeg" title="Enlarge"></a></div><a data-dcnode-id="5337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aleksandar_Vu%25C4%258Di%25C4%2587" title="Aleksandar Vučić"><span data-dcnode-id="5338" instrument_node="">Aleksandar Vučić</span></a><span data-dcnode-id="5336" instrument_node="">, </span><a data-dcnode-id="5334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prime_Minister_of_Serbia" title="Prime Minister of Serbia"><span data-dcnode-id="5335" instrument_node="">Prime Minister of Serbia</span></a><span data-dcnode-id="5333" instrument_node="">, and Vladimir Putin, President of Russia, in Moscow, 2014.</span></div></div></div><span data-dcnode-id="5329" instrument_node="">
</span><p data-dcnode-id="5312"><span data-dcnode-id="5328" instrument_node="">The visit to Russia by Serbia's president </span><a data-dcnode-id="5326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aleksandar_Vu%25C4%258Di%25C4%2587" title="Aleksandar Vučić"><span data-dcnode-id="5327" instrument_node="">Aleksandar Vučić</span></a><span data-dcnode-id="5325" instrument_node=""> in December 2017 was hailed by </span><i data-dcnode-id="5322"><a data-dcnode-id="5323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Politika" title="Politika"><span data-dcnode-id="5324" instrument_node="">Politika</span></a></i><span data-dcnode-id="5321" instrument_node=""> as a symbolic ending of ″decades of stagnation in relations″.</span><sup class="reference" data-dcnode-id="5318" id="cite_ref-politikaneche_69-0"><a data-dcnode-id="5319" href="#cite_note-politikaneche-69"><span data-dcnode-id="5320" instrument_node="">[69]</span></a></sup><span data-dcnode-id="5317" instrument_node=""> In November 2019 Serbian security services revealed activities of Russian intelligence operatives who were meeting and passing money to Serbian army officials.</span><sup class="reference" data-dcnode-id="5314" id="cite_ref-70"><a data-dcnode-id="5315" href="#cite_note-70"><span data-dcnode-id="5316" instrument_node="">[70]</span></a></sup><span data-dcnode-id="5313" instrument_node="">
</span></p><p data-dcnode-id="5306"><span data-dcnode-id="5311" instrument_node="">Serbia did not impose sanctions on Russia following the crisis in Ukraine and the annexation of Crimea in 2014.</span><sup class="reference" data-dcnode-id="5308" id="cite_ref-71"><a data-dcnode-id="5309" href="#cite_note-71"><span data-dcnode-id="5310" instrument_node="">[71]</span></a></sup><span data-dcnode-id="5307" instrument_node="">
</span></p><p data-dcnode-id="5258"><span data-dcnode-id="5305" instrument_node="">On 25 February 2022, in response to the </span><a data-dcnode-id="5303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2022_Russian_invasion_of_Ukraine" title="2022 Russian invasion of Ukraine"><span data-dcnode-id="5304" instrument_node="">Russian invasion of Ukraine</span></a><span data-dcnode-id="5302" instrument_node="">, Vučić stated that while Serbia felt it was wrong to violate the territorial integrity of Ukraine, it also felt that it was not in Serbia's interest to impose sanctions against Russia.</span><sup class="reference" data-dcnode-id="5299" id="cite_ref-B92.net_2022_72-0"><a data-dcnode-id="5300" href="#cite_note-B92.net_2022-72"><span data-dcnode-id="5301" instrument_node="">[72]</span></a></sup><sup class="reference" data-dcnode-id="5296" id="cite_ref-73"><a data-dcnode-id="5297" href="#cite_note-73"><span data-dcnode-id="5298" instrument_node="">[73]</span></a></sup><sup class="reference" data-dcnode-id="5293" id="cite_ref-74"><a data-dcnode-id="5294" href="#cite_note-74"><span data-dcnode-id="5295" instrument_node="">[74]</span></a></sup><span data-dcnode-id="5292" instrument_node=""> In March 2022, a Serbian </span><a data-dcnode-id="5290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Far-right_politics" title="Far-right politics"><span data-dcnode-id="5291" instrument_node="">far-right</span></a><span data-dcnode-id="5289" instrument_node=""> </span><a data-dcnode-id="5287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vigilantism" title="Vigilantism"><span data-dcnode-id="5288" instrument_node="">vigilante</span></a><span data-dcnode-id="5286" instrument_node=""> group held a rally in support of Russia in </span><a data-dcnode-id="5284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belgrade" title="Belgrade"><span data-dcnode-id="5285" instrument_node="">Belgrade</span></a><span data-dcnode-id="5283" instrument_node="">, attended by thousands of pro-Russia Serbs,</span><sup class="reference" data-dcnode-id="5280" id="cite_ref-Press_2022_75-0"><a data-dcnode-id="5281" href="#cite_note-Press_2022-75"><span data-dcnode-id="5282" instrument_node="">[75]</span></a></sup><sup class="reference" data-dcnode-id="5277" id="cite_ref-Far-right_Serbians_hold_pro-Russia_rally_amid_Ukraine_crisis_2022_76-0"><a data-dcnode-id="5278" href="#cite_note-Far-right_Serbians_hold_pro-Russia_rally_amid_Ukraine_crisis_2022-76"><span data-dcnode-id="5279" instrument_node="">[76]</span></a></sup><sup class="reference" data-dcnode-id="5274" id="cite_ref-77"><a data-dcnode-id="5275" href="#cite_note-77"><span data-dcnode-id="5276" instrument_node="">[77]</span></a></sup><span data-dcnode-id="5273" instrument_node=""> a few days later, on 21 March, a protest against Russia’s war on Ukraine took place in the capital of Serbia, it was the second reported pro-Ukraine demonstration since the start of the war, with the first one organised by peace activists and Russians living in Serbia.</span><sup class="reference" data-dcnode-id="5270" id="cite_ref-euronews_2022_78-0"><a data-dcnode-id="5271" href="#cite_note-euronews_2022-78"><span data-dcnode-id="5272" instrument_node="">[78]</span></a></sup><sup class="reference" data-dcnode-id="5267" id="cite_ref-N1_2022_79-0"><a data-dcnode-id="5268" href="#cite_note-N1_2022-79"><span data-dcnode-id="5269" instrument_node="">[79]</span></a></sup><sup class="reference" data-dcnode-id="5264" id="cite_ref-Girotto_2022_80-0"><a data-dcnode-id="5265" href="#cite_note-Girotto_2022-80"><span data-dcnode-id="5266" instrument_node="">[80]</span></a></sup><span data-dcnode-id="5263" instrument_node=""> In the next month more demonstrations in support of Ukraine were held.</span><sup class="reference" data-dcnode-id="5260" id="cite_ref-81"><a data-dcnode-id="5261" href="#cite_note-81"><span data-dcnode-id="5262" instrument_node="">[81]</span></a></sup><span data-dcnode-id="5259" instrument_node="">
</span></p><p data-dcnode-id="5242"><span data-dcnode-id="5257" instrument_node="">In March Serbia voted in favour of the UN’s resolution condemning Russian attack on Ukraine.</span><sup class="reference" data-dcnode-id="5254" id="cite_ref-Balkan_Insight_2022_82-0"><a data-dcnode-id="5255" href="#cite_note-Balkan_Insight_2022-82"><span data-dcnode-id="5256" instrument_node="">[82]</span></a></sup><span data-dcnode-id="5253" instrument_node=""> In April 2022 Serbia voted in favour of expelling Russia from the </span><a data-dcnode-id="5251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Human_Rights_Council" title="United Nations Human Rights Council"><span data-dcnode-id="5252" instrument_node="">United Nations Human Rights Council</span></a><span data-dcnode-id="5250" instrument_node="">.</span><sup class="reference" data-dcnode-id="5247" id="cite_ref-83"><a data-dcnode-id="5248" href="#cite_note-83"><span data-dcnode-id="5249" instrument_node="">[83]</span></a></sup><sup class="reference" data-dcnode-id="5244" id="cite_ref-84"><a data-dcnode-id="5245" href="#cite_note-84"><span data-dcnode-id="5246" instrument_node="">[84]</span></a></sup><span data-dcnode-id="5243" instrument_node="">
</span></p><span data-dcnode-id="5241" instrument_node="">
</span><h2 data-dcnode-id="5231"><span class="mw-headline" data-dcnode-id="5239" id="Kosovo_issue"><span data-dcnode-id="5240" instrument_node="">Kosovo issue</span></span><span class="mw-editsection" data-dcnode-id="5232"><span class="mw-editsection-bracket" data-dcnode-id="5237"><span data-dcnode-id="5238" instrument_node="">[</span></span><a data-dcnode-id="5235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRussia%25E2%2580%2593Serbia_relations%26action%3Dedit%26section%3D11" title="Edit section: Kosovo issue"><span data-dcnode-id="5236" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5233"><span data-dcnode-id="5234" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5230" instrument_node="">
</span><p data-dcnode-id="5204"><span data-dcnode-id="5229" instrument_node="">Russia has backed Serbia's position regarding </span><a data-dcnode-id="5227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kosovo" title="Kosovo"><span data-dcnode-id="5228" instrument_node="">Kosovo</span></a><span data-dcnode-id="5226" instrument_node="">. </span><a data-dcnode-id="5224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Putin" title="Vladimir Putin"><span data-dcnode-id="5225" instrument_node="">Vladimir Putin</span></a><span data-dcnode-id="5223" instrument_node=""> said that any support for Kosovo's unilateral declaration is immoral and
illegal.</span><sup class="reference" data-dcnode-id="5220" id="cite_ref-85"><a data-dcnode-id="5221" href="#cite_note-85"><span data-dcnode-id="5222" instrument_node="">[85]</span></a></sup><span data-dcnode-id="5219" instrument_node=""> He described the recognition of Kosovo's unilaterally declared independence by several major world powers as "a terrible </span><a class="mw-redirect" data-dcnode-id="5217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kosovo_precedent" title="Kosovo precedent"><span data-dcnode-id="5218" instrument_node="">precedent</span></a><span data-dcnode-id="5216" instrument_node="">" that "breaks up the entire system of international relations" that have taken "centuries to evolve", and "undoubtedly, it may entail a whole chain of unpredictable consequences to other regions in the world" that will come back to hit the West "in the face".</span><sup class="reference" data-dcnode-id="5213" id="cite_ref-86"><a data-dcnode-id="5214" href="#cite_note-86"><span data-dcnode-id="5215" instrument_node="">[86]</span></a></sup><span data-dcnode-id="5212" instrument_node=""> During an official state visit to Serbia following the declaration, Russian President-elect </span><a data-dcnode-id="5210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dmitry_Medvedev" title="Dmitry Medvedev"><span data-dcnode-id="5211" instrument_node="">Dmitry Medvedev</span></a><span data-dcnode-id="5209" instrument_node=""> reiterated support for Serbia and its stance on Kosovo.</span><sup class="reference" data-dcnode-id="5206" id="cite_ref-87"><a data-dcnode-id="5207" href="#cite_note-87"><span data-dcnode-id="5208" instrument_node="">[87]</span></a></sup><span data-dcnode-id="5205" instrument_node="">
</span></p><p data-dcnode-id="5189"><span data-dcnode-id="5203" instrument_node="">Russia has also said that the </span><a class="mw-redirect" data-dcnode-id="5201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2008_unrest_in_Tibet" title="2008 unrest in Tibet"><span data-dcnode-id="5202" instrument_node="">March 2008 riots</span></a><span data-dcnode-id="5200" instrument_node=""> in Tibet were linked with the recognition by some states of the independence of Serbia's breakaway province, Kosovo. Foreign Minister </span><a data-dcnode-id="5198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sergey_Lavrov" title="Sergey Lavrov"><span data-dcnode-id="5199" instrument_node="">Sergey Lavrov</span></a><span data-dcnode-id="5197" instrument_node="">, in an interview with a Russian newspaper, also linked the demands for greater autonomy by ethnic Albanians in Macedonia (Today </span><a data-dcnode-id="5195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Macedonia" title="North Macedonia"><span data-dcnode-id="5196" instrument_node="">North Macedonia</span></a><span data-dcnode-id="5194" instrument_node="">) with the Kosovo issue. Lavrov said, "There are grounds to presume that this is not occurring by chance. You can see what is happening in Tibet, how the separatists there are acting. The Albanians in Macedonia are already demanding a level of autonomy that is a clear step toward independence. Furthermore, events in other areas of the world give us grounds to assume that we are only at the beginning of a very precarious process".</span><sup class="reference" data-dcnode-id="5191" id="cite_ref-88"><a data-dcnode-id="5192" href="#cite_note-88"><span data-dcnode-id="5193" instrument_node="">[88]</span></a></sup><span data-dcnode-id="5190" instrument_node="">
</span></p><p data-dcnode-id="5176"><span data-dcnode-id="5188" instrument_node="">On 23 March 2008 Vladimir Putin ordered urgent humanitarian aid for </span><a class="mw-redirect" data-dcnode-id="5186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kosovo_Serb_enclaves" title="Kosovo Serb enclaves"><span data-dcnode-id="5187" instrument_node="">Kosovo Serb enclaves</span></a><span data-dcnode-id="5185" instrument_node="">.</span><sup class="reference" data-dcnode-id="5182" id="cite_ref-89"><a data-dcnode-id="5183" href="#cite_note-89"><span data-dcnode-id="5184" instrument_node="">[89]</span></a></sup><span data-dcnode-id="5181" instrument_node=""> Prime Minister of Kosovo, Hashim Thaci, opposed the Russian plan for sending aid to Kosovo Serbs. He stated that Russia could only send aid if it was agreed and coordinated with Government in Pristina.</span><sup class="reference" data-dcnode-id="5178" id="cite_ref-90"><a data-dcnode-id="5179" href="#cite_note-90"><span data-dcnode-id="5180" instrument_node="">[90]</span></a></sup><span data-dcnode-id="5177" instrument_node="">
</span></p><p data-dcnode-id="5164"><span data-dcnode-id="5175" instrument_node="">On July 15, President </span><a data-dcnode-id="5173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dmitry_Medvedev" title="Dmitry Medvedev"><span data-dcnode-id="5174" instrument_node="">Dmitry Medvedev</span></a><span data-dcnode-id="5172" instrument_node=""> stated in a major foreign policy speech "For the EU, Kosovo is almost what </span><a data-dcnode-id="5170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iraq" title="Iraq"><span data-dcnode-id="5171" instrument_node="">Iraq</span></a><span data-dcnode-id="5169" instrument_node=""> is to the United States.... This is the latest example of the undermining of international law".</span><sup class="reference" data-dcnode-id="5166" id="cite_ref-91"><a data-dcnode-id="5167" href="#cite_note-91"><span data-dcnode-id="5168" instrument_node="">[91]</span></a></sup><span data-dcnode-id="5165" instrument_node="">
</span></p><p data-dcnode-id="5158"><span data-dcnode-id="5163" instrument_node="">On 29 May 2009, President Dmitry Medvedev described Serbia as a "key partner" for Russia in Southeast Europe and announced "We intend to continue to coordinate our foreign police moves in future, including the ones related to the solving of the issue with Kosovo".</span><sup class="reference" data-dcnode-id="5160" id="cite_ref-92"><a data-dcnode-id="5161" href="#cite_note-92"><span data-dcnode-id="5162" instrument_node="">[92]</span></a></sup><span data-dcnode-id="5159" instrument_node="">
</span></p><p data-dcnode-id="5152"><span data-dcnode-id="5157" instrument_node="">Russian ambassador to Serbia Aleksandr Konuzin told a Belgrade daily in June 2009 that "Russia's stand is rather simple&nbsp;— we are ready to back whatever position Serbia takes (with regards to Kosovo)."</span><sup class="reference" data-dcnode-id="5154" id="cite_ref-93"><a data-dcnode-id="5155" href="#cite_note-93"><span data-dcnode-id="5156" instrument_node="">[93]</span></a></sup><span data-dcnode-id="5153" instrument_node="">
</span></p><p data-dcnode-id="5140"><span data-dcnode-id="5151" instrument_node="">Although Russia is antagonistic to Kosovo's independence, nonetheless Russia has supported </span><a data-dcnode-id="5149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Trump" title="Donald Trump"><span data-dcnode-id="5150" instrument_node="">Donald Trump</span></a><span data-dcnode-id="5148" instrument_node="">-brokered </span><a class="mw-redirect" data-dcnode-id="5146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kosovo_and_Serbia_economic_normalization_agreements_%282020%29" title="Kosovo and Serbia economic normalization agreements (2020)"><span data-dcnode-id="5147" instrument_node="">normalization agreements</span></a><span data-dcnode-id="5145" instrument_node=""> between Kosovo and Serbia in 2020.</span><sup class="reference" data-dcnode-id="5142" id="cite_ref-94"><a data-dcnode-id="5143" href="#cite_note-94"><span data-dcnode-id="5144" instrument_node="">[94]</span></a></sup><span data-dcnode-id="5141" instrument_node="">
</span></p><span data-dcnode-id="5139" instrument_node="">
</span><h2 data-dcnode-id="5129"><span class="mw-headline" data-dcnode-id="5137" id="Economic_relations"><span data-dcnode-id="5138" instrument_node="">Economic relations</span></span><span class="mw-editsection" data-dcnode-id="5130"><span class="mw-editsection-bracket" data-dcnode-id="5135"><span data-dcnode-id="5136" instrument_node="">[</span></span><a data-dcnode-id="5133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRussia%25E2%2580%2593Serbia_relations%26action%3Dedit%26section%3D12" title="Edit section: Economic relations"><span data-dcnode-id="5134" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5131"><span data-dcnode-id="5132" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5128" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5113"><div class="thumbinner" data-dcnode-id="5114" style="width:222px;"><a class="image" data-dcnode-id="5126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARed_Star_Belgrade_stadium_Marakana_%2824.06.2012%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="5127" data-file-height="1536" data-file-width="2048" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Red_Star_Belgrade_stadium_Marakana_%252824.06.2012%2529.jpg/220px-Red_Star_Belgrade_stadium_Marakana_%252824.06.2012%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Red_Star_Belgrade_stadium_Marakana_%2824.06.2012%29.jpg/330px-Red_Star_Belgrade_stadium_Marakana_%2824.06.2012%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Red_Star_Belgrade_stadium_Marakana_%2824.06.2012%29.jpg/440px-Red_Star_Belgrade_stadium_Marakana_%2824.06.2012%29.jpg 2x" width="220"></a><span data-dcnode-id="5125" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5115"><div class="magnify" data-dcnode-id="5123"><a class="internal" data-dcnode-id="5124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARed_Star_Belgrade_stadium_Marakana_%2824.06.2012%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="5122" instrument_node="">The </span><a data-dcnode-id="5120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gazprom" title="Gazprom"><span data-dcnode-id="5121" instrument_node="">Gazprom</span></a><span data-dcnode-id="5119" instrument_node=""> sign at the </span><a data-dcnode-id="5117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Star_Stadium" title="Red Star Stadium"><span data-dcnode-id="5118" instrument_node="">Red Star Stadium</span></a><span data-dcnode-id="5116" instrument_node=""> in Belgrade</span></div></div></div><span data-dcnode-id="5112" instrument_node="">
</span><h3 data-dcnode-id="5102"><span class="mw-headline" data-dcnode-id="5110" id="Trade"><span data-dcnode-id="5111" instrument_node="">Trade</span></span><span class="mw-editsection" data-dcnode-id="5103"><span class="mw-editsection-bracket" data-dcnode-id="5108"><span data-dcnode-id="5109" instrument_node="">[</span></span><a data-dcnode-id="5106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRussia%25E2%2580%2593Serbia_relations%26action%3Dedit%26section%3D13" title="Edit section: Trade"><span data-dcnode-id="5107" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5104"><span data-dcnode-id="5105" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5101" instrument_node="">
</span><p data-dcnode-id="5095"><span data-dcnode-id="5100" instrument_node="">In 2016, trade between Russia and Serbia totalled $1.657 bn, having grown by 1,32 percent against 2015; Russia's export to Serbia totalled $770.2 mln, a decrease by 9.34 percent; Russia's import from Serbia was at $886.8 mln, an increase by 12.84 percent.</span><sup class="reference" data-dcnode-id="5097" id="cite_ref-95"><a data-dcnode-id="5098" href="#cite_note-95"><span data-dcnode-id="5099" instrument_node="">[95]</span></a></sup><span data-dcnode-id="5096" instrument_node="">
</span></p><p data-dcnode-id="5082"><span data-dcnode-id="5094" instrument_node="">In 2017, 70 percent of Russia's export to Serbia was said to be </span><a data-dcnode-id="5092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hydrocarbon" title="Hydrocarbon"><span data-dcnode-id="5093" instrument_node="">hydrocarbons</span></a><span data-dcnode-id="5091" instrument_node="">, natural gas being the primary export item; from 2013 to 2016 exports of Russian gas to Serbia dropped from 2 bn to 1.7 billion cubic meters.</span><sup class="reference" data-dcnode-id="5088" id="cite_ref-carnegieillus_61-2"><a data-dcnode-id="5089" href="#cite_note-carnegieillus-61"><span data-dcnode-id="5090" instrument_node="">[61]</span></a></sup><span data-dcnode-id="5087" instrument_node=""> In 2013, Gazprom offered a 13 percent discount on its gas export price for Serbia, to be effective until 2021.</span><sup class="reference" data-dcnode-id="5084" id="cite_ref-96"><a data-dcnode-id="5085" href="#cite_note-96"><span data-dcnode-id="5086" instrument_node="">[96]</span></a></sup><span data-dcnode-id="5083" instrument_node="">
</span></p><p data-dcnode-id="5073"><span data-dcnode-id="5081" instrument_node="">In December 2017, Russia cancelled the requirement for Serbia to consume its gas only on the domestic market, thus allowing Serbia to re-export the fuel; a Russian government document published on 18 December amended the 2012 contract for gas supplies until 2021 for the volume of 5 billion cubic meters per year.</span><sup class="reference" data-dcnode-id="5078" id="cite_ref-97"><a data-dcnode-id="5079" href="#cite_note-97"><span data-dcnode-id="5080" instrument_node="">[97]</span></a></sup><sup class="reference" data-dcnode-id="5075" id="cite_ref-98"><a data-dcnode-id="5076" href="#cite_note-98"><span data-dcnode-id="5077" instrument_node="">[98]</span></a></sup><span data-dcnode-id="5074" instrument_node="">
</span></p><span data-dcnode-id="5072" instrument_node="">
</span><h3 data-dcnode-id="5062"><span class="mw-headline" data-dcnode-id="5070" id="Companies"><span data-dcnode-id="5071" instrument_node="">Companies</span></span><span class="mw-editsection" data-dcnode-id="5063"><span class="mw-editsection-bracket" data-dcnode-id="5068"><span data-dcnode-id="5069" instrument_node="">[</span></span><a data-dcnode-id="5066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRussia%25E2%2580%2593Serbia_relations%26action%3Dedit%26section%3D14" title="Edit section: Companies"><span data-dcnode-id="5067" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5064"><span data-dcnode-id="5065" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5061" instrument_node="">
</span><p data-dcnode-id="5047"><a data-dcnode-id="5059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Naftna_Industrija_Srbije" title="Naftna Industrija Srbije"><span data-dcnode-id="5060" instrument_node="">Naftna Industrija Srbije</span></a><span data-dcnode-id="5058" instrument_node="">, the best performing company of Serbia,</span><sup class="reference" data-dcnode-id="5055" id="cite_ref-99"><a data-dcnode-id="5056" href="#cite_note-99"><span data-dcnode-id="5057" instrument_node="">[99]</span></a></sup><span data-dcnode-id="5054" instrument_node=""> is majority owned by the Russian company </span><a data-dcnode-id="5052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gazprom_Neft" title="Gazprom Neft"><span data-dcnode-id="5053" instrument_node="">Gazprom Neft</span></a><span data-dcnode-id="5051" instrument_node="">, a subsidiary of the government-controlled </span><a data-dcnode-id="5049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gazprom" title="Gazprom"><span data-dcnode-id="5050" instrument_node="">Gazprom</span></a><span data-dcnode-id="5048" instrument_node="">.

</span><p data-dcnode-id="4983"><span data-dcnode-id="5000" instrument_node="">The </span><a data-dcnode-id="4998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serbian_Armed_Forces" title="Serbian Armed Forces"><span data-dcnode-id="4999" instrument_node="">Serbian Armed Forces</span></a><span data-dcnode-id="4997" instrument_node=""> and </span><a data-dcnode-id="4995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Defense_industry_of_Serbia" title="Defense industry of Serbia"><span data-dcnode-id="4996" instrument_node="">its arms industry</span></a><span data-dcnode-id="4994" instrument_node=""> have since the Soviet-</span><a data-dcnode-id="4992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_Federal_Republic_of_Yugoslavia" title="Socialist Federal Republic of Yugoslavia"><span data-dcnode-id="4993" instrument_node="">Yugoslavia</span></a><span data-dcnode-id="4991" instrument_node=""> period been dependent on </span><a data-dcnode-id="4989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Defense_industry_of_Russia" title="Defense industry of Russia"><span data-dcnode-id="4990" instrument_node="">Soviet/Russian technology</span></a><span data-dcnode-id="4988" instrument_node="">.</span><sup class="reference" data-dcnode-id="4985" id="cite_ref-reutersedges_63-1"><a data-dcnode-id="4986" href="#cite_note-reutersedges-63"><span data-dcnode-id="4987" instrument_node="">[63]</span></a></sup><span data-dcnode-id="4984" instrument_node="">
</span></p><p data-dcnode-id="4971"><span data-dcnode-id="4982" instrument_node="">In June 2016, Serbia received two Russian </span><a data-dcnode-id="4980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mil_Mi-17" title="Mil Mi-17"><span data-dcnode-id="4981" instrument_node="">Mi17 utility helicopters</span></a><span data-dcnode-id="4979" instrument_node=""> that it purchased for 25 million euros.</span><sup class="reference" data-dcnode-id="4976" id="cite_ref-reutersedges_63-2"><a data-dcnode-id="4977" href="#cite_note-reutersedges-63"><span data-dcnode-id="4978" instrument_node="">[63]</span></a></sup><sup class="reference" data-dcnode-id="4973" id="cite_ref-100"><a data-dcnode-id="4974" href="#cite_note-100"><span data-dcnode-id="4975" instrument_node="">[100]</span></a></sup><span data-dcnode-id="4972" instrument_node="">
</span></p><p data-dcnode-id="4942"><span data-dcnode-id="4970" instrument_node="">In December 2016, the two countries signed a military-technical assistance agreement that allowed Serbia to receive as a gift: six </span><a data-dcnode-id="4968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikoyan_MiG-29" title="Mikoyan MiG-29"><span data-dcnode-id="4969" instrument_node="">Mikoyan MiG-29</span></a><span data-dcnode-id="4967" instrument_node=""> fighters, 30 modernized </span><a data-dcnode-id="4965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/T-72" title="T-72"><span data-dcnode-id="4966" instrument_node="">T-72</span></a><span data-dcnode-id="4964" instrument_node=""> main battle tanks and 30 </span><a data-dcnode-id="4962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/BRDM-2" title="BRDM-2"><span data-dcnode-id="4963" instrument_node="">BRDM-2</span></a><span data-dcnode-id="4961" instrument_node=""> armored vehicles.</span><sup class="reference" data-dcnode-id="4958" id="cite_ref-101"><a data-dcnode-id="4959" href="#cite_note-101"><span data-dcnode-id="4960" instrument_node="">[101]</span></a></sup><sup class="reference" data-dcnode-id="4955" id="cite_ref-inserbarms_102-0"><a data-dcnode-id="4956" href="#cite_note-inserbarms-102"><span data-dcnode-id="4957" instrument_node="">[102]</span></a></sup><span data-dcnode-id="4954" instrument_node=""> The fighters were delivered in October 2017,</span><sup class="reference" data-dcnode-id="4951" id="cite_ref-103"><a data-dcnode-id="4952" href="#cite_note-103"><span data-dcnode-id="4953" instrument_node="">[103]</span></a></sup><span data-dcnode-id="4950" instrument_node=""> the armored vehicles are expected to be delivered in 2018.</span><sup class="reference" data-dcnode-id="4947" id="cite_ref-inserbarms_102-1"><a data-dcnode-id="4948" href="#cite_note-inserbarms-102"><span data-dcnode-id="4949" instrument_node="">[102]</span></a></sup><sup class="reference" data-dcnode-id="4944" id="cite_ref-104"><a data-dcnode-id="4945" href="#cite_note-104"><span data-dcnode-id="4946" instrument_node="">[104]</span></a></sup><span data-dcnode-id="4943" instrument_node="">
</span></p><p data-dcnode-id="4933"><span data-dcnode-id="4941" instrument_node="">Russia supplies three-kilogram radio-electronic counter gun Pishchal (also being supplied to the Russian law enforcement agencies) and fixed radio-electronic complexes Taran to Serbia and South Ossetia in 2018.</span><sup class="reference" data-dcnode-id="4938" id="cite_ref-105"><a data-dcnode-id="4939" href="#cite_note-105"><span data-dcnode-id="4940" instrument_node="">[105]</span></a></sup><sup class="reference" data-dcnode-id="4935" id="cite_ref-106"><a data-dcnode-id="4936" href="#cite_note-106"><span data-dcnode-id="4937" instrument_node="">[106]</span></a></sup><span data-dcnode-id="4934" instrument_node="">
</span></p><p data-dcnode-id="4920"><span data-dcnode-id="4932" instrument_node="">Serbia takes part in Russo-Belarus-Serbian military war games called 'Slavic Brotherhood' and is also being supplied with Chaborz M-3 combat buggies.</span><sup class="reference" data-dcnode-id="4929" id="cite_ref-107"><a data-dcnode-id="4930" href="#cite_note-107"><span data-dcnode-id="4931" instrument_node="">[107]</span></a></sup><sup class="reference" data-dcnode-id="4926" id="cite_ref-108"><a data-dcnode-id="4927" href="#cite_note-108"><span data-dcnode-id="4928" instrument_node="">[108]</span></a></sup><span data-dcnode-id="4925" instrument_node=""> 3 weapons contracts were signed in early 2019.</span><sup class="reference" data-dcnode-id="4922" id="cite_ref-109"><a data-dcnode-id="4923" href="#cite_note-109"><span data-dcnode-id="4924" instrument_node="">[109]</span></a></sup><span data-dcnode-id="4921" instrument_node="">
</span></p><p data-dcnode-id="4908"><span data-dcnode-id="4919" instrument_node="">In recent years, the military cooperation between Serbia and Russia has grown stronger. Since the beginning of 2022, Serbia has purchased multiple pieces of Russian military hardware, such as the </span><a class="mw-redirect" data-dcnode-id="4917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pantsir-S1" title="Pantsir-S1"><span data-dcnode-id="4918" instrument_node="">Pantsir-S1</span></a><span data-dcnode-id="4916" instrument_node=""> air defense system and </span><a data-dcnode-id="4914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/9M133_Kornet" title="9M133 Kornet"><span data-dcnode-id="4915" instrument_node="">9M133 Kornet</span></a><span data-dcnode-id="4913" instrument_node=""> anti-tank missiles, despite the threat of US sanctions.</span><sup class="reference" data-dcnode-id="4910" id="cite_ref-110"><a data-dcnode-id="4911" href="#cite_note-110"><span data-dcnode-id="4912" instrument_node="">[110]</span></a></sup><span data-dcnode-id="4909" instrument_node="">
</span></p><span data-dcnode-id="4907" instrument_node="">
</span><h2 data-dcnode-id="4897"><span class="mw-headline" data-dcnode-id="4905" id="Education"><span data-dcnode-id="4906" instrument_node="">Education</span></span><span class="mw-editsection" data-dcnode-id="4898"><span class="mw-editsection-bracket" data-dcnode-id="4903"><span data-dcnode-id="4904" instrument_node="">[</span></span><a data-dcnode-id="4901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRussia%25E2%2580%2593Serbia_relations%26action%3Dedit%26section%3D17" title="Edit section: Education"><span data-dcnode-id="4902" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4899"><span data-dcnode-id="4900" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4896" instrument_node="">
</span><p data-dcnode-id="4890"><span data-dcnode-id="4895" instrument_node="">Yugoslavia and the Russian Federation signed the Agreement on cooperation in the Fields of Culture, Education, Science and Sports on July 19, 1995. Based on this, the Program of Cooperation in the Areas of Education, Science and Culture was signed in December 2001 for the period 2002–04. The Days of Culture of the Russian Federation were held in Serbia and Montenegro in 2002 and those of Serbia and Montenegro in the Russian Federation in 2003.</span><sup class="reference" data-dcnode-id="4892" id="cite_ref-111"><a data-dcnode-id="4893" href="#cite_note-111"><span data-dcnode-id="4894" instrument_node="">[111]</span></a></sup><span data-dcnode-id="4891" instrument_node="">
</span></p><p data-dcnode-id="4881"><span data-dcnode-id="4889" instrument_node="">The Russian Centre for Science and Culture in Belgrade opened on April 9, 1933. Popular name of the centre is </span><i data-dcnode-id="4887"><span data-dcnode-id="4888" instrument_node="">Russian Home</span></i><span data-dcnode-id="4886" instrument_node="">.</span><sup class="reference" data-dcnode-id="4883" id="cite_ref-112"><a data-dcnode-id="4884" href="#cite_note-112"><span data-dcnode-id="4885" instrument_node="">[112]</span></a></sup><span data-dcnode-id="4882" instrument_node="">

</span><link data-dcnode-id="4868" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4861" role="note"><span data-dcnode-id="4867" instrument_node="">Main articles: </span><a data-dcnode-id="4865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russians_in_Serbia" title="Russians in Serbia"><span data-dcnode-id="4866" instrument_node="">Russians in Serbia</span></a><span data-dcnode-id="4864" instrument_node=""> and </span><a data-dcnode-id="4862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serbs_in_Russia" title="Serbs in Russia"><span data-dcnode-id="4863" instrument_node="">Serbs in Russia</span></a></div><span data-dcnode-id="4860" instrument_node="">
</span><p data-dcnode-id="4826"><span data-dcnode-id="4859" instrument_node="">According to censuses there were 3,247 </span><a data-dcnode-id="4857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russians" title="Russians"><span data-dcnode-id="4858" instrument_node="">Russians</span></a><span data-dcnode-id="4856" instrument_node=""> living in Serbia (2011)</span><sup class="reference" data-dcnode-id="4853" id="cite_ref-113"><a data-dcnode-id="4854" href="#cite_note-113"><span data-dcnode-id="4855" instrument_node="">[113]</span></a></sup><span data-dcnode-id="4852" instrument_node=""> and 3,510 </span><a data-dcnode-id="4850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serbs" title="Serbs"><span data-dcnode-id="4851" instrument_node="">Serbs</span></a><span data-dcnode-id="4849" instrument_node=""> living in Russia (2010).</span><sup class="reference" data-dcnode-id="4846" id="cite_ref-popis2010_114-0"><a data-dcnode-id="4847" href="#cite_note-popis2010-114"><span data-dcnode-id="4848" instrument_node="">[114]</span></a></sup><span data-dcnode-id="4845" instrument_node=""> There were 11,043 speakers of Serbian language in Russia, out of which 3,330 were native speakers and 3,179 native speakers of Russian in Serbia.</span><sup class="reference" data-dcnode-id="4842" id="cite_ref-115"><a data-dcnode-id="4843" href="#cite_note-115"><span data-dcnode-id="4844" instrument_node="">[115]</span></a></sup><sup class="reference" data-dcnode-id="4839" id="cite_ref-116"><a data-dcnode-id="4840" href="#cite_note-116"><span data-dcnode-id="4841" instrument_node="">[116]</span></a></sup><sup class="reference" data-dcnode-id="4836" id="cite_ref-117"><a data-dcnode-id="4837" href="#cite_note-117"><span data-dcnode-id="4838" instrument_node="">[117]</span></a></sup><span data-dcnode-id="4835" instrument_node=""> According to 2015 data there were 29,499 Serbian citizens in Russia.</span><sup class="reference" data-dcnode-id="4832" id="cite_ref-118"><a data-dcnode-id="4833" href="#cite_note-118"><span data-dcnode-id="4834" instrument_node="">[118]</span></a></sup><span data-dcnode-id="4831" instrument_node=""> According to 2013 data there were 3,290 Russian citizens in Serbia.</span><sup class="reference" data-dcnode-id="4828" id="cite_ref-119"><a data-dcnode-id="4829" href="#cite_note-119"><span data-dcnode-id="4830" instrument_node="">[119]</span></a></sup><span data-dcnode-id="4827" instrument_node="">
