span><a class="mw-redirect" data-dcnode-id="7134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_relations" title="Foreign relations"><span data-dcnode-id="7135" instrument_node="">foreign relations</span></a><span data-dcnode-id="7133" instrument_node=""> between </span><a data-dcnode-id="7131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russia" title="Russia"><span data-dcnode-id="7132" instrument_node="">Russia</span></a><span data-dcnode-id="7130" instrument_node=""> and </span><a data-dcnode-id="7128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serbia" title="Serbia"><span data-dcnode-id="7129" instrument_node="">Serbia</span></a><span data-dcnode-id="7127" instrument_node="">. 
The countries established official diplomatic relations as </span><a data-dcnode-id="7125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Empire" title="Russian Empire"><span data-dcnode-id="7126" instrument_node="">Russian Empire</span></a><span data-dcnode-id="7124" instrument_node=""> and </span><a data-dcnode-id="7122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Principality_of_Serbia" title="Principality of Serbia"><span data-dcnode-id="7123" instrument_node="">Principality of Serbia</span></a><span data-dcnode-id="7121" instrument_node=""> in 1816. Russia has an honorary consulate in </span><a data-dcnode-id="7119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belgrade" title="Belgrade"><span data-dcnode-id="7120" instrument_node="">Belgrade</span></a><span data-dcnode-id="7118" instrument_node="">, an </span><a class="mw-redirect" data-dcnode-id="7116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Embassy_of_Russia_in_Belgrade" title="Embassy of Russia in Belgrade"><span data-dcnode-id="7117" instrument_node="">embassy in Belgrade</span></a><span data-dcnode-id="7115" instrument_node="">, and a liaison office to </span><a class="mw-redirect" data-dcnode-id="7113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UNMIK" title="UNMIK"><span data-dcnode-id="7114" instrument_node="">UNMIK</span></a><span data-dcnode-id="7112" instrument_node=""> in </span><a data-dcnode-id="7110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pristina" title="Pristina"><span data-dcnode-id="7111" instrument_node="">Pristina</span></a><span data-dcnode-id="7109" instrument_node=""> as </span><a class="mw-redirect" data-dcnode-id="7107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kosovo_and_Metohija" title="Kosovo and Metohija"><span data-dcnode-id="7108" instrument_node="">Serbian province of Kosovo and Metohija</span></a><span data-dcnode-id="7106" instrument_node="">. Serbia has an </span><a class="mw-redirect" data-dcnode-id="7104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Embassy_of_Serbia_in_Moscow" title="Embassy of Serbia in Moscow"><span data-dcnode-id="7105" instrument_node="">embassy in Moscow</span></a><span data-dcnode-id="7103" instrument_node="">, an honorary consulate in </span><a class="mw-redirect" data-dcnode-id="7101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St._Petersburg" title="St. Petersburg"><span data-dcnode-id="7102" instrument_node="">St. Petersburg</span></a><span data-dcnode-id="7100" instrument_node="">, and has announced to open a consulate-general in </span><a data-dcnode-id="7098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yekaterinburg" title="Yekaterinburg"><span data-dcnode-id="7099" instrument_node="">Yekaterinburg</span></a><span data-dcnode-id="7097" instrument_node="">.
</span></p><p data-dcnode-id="7079"><span data-dcnode-id="7095" instrument_node="">While geographically not close, Serbia and Russia are both </span><a data-dcnode-id="7093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slavs" title="Slavs"><span data-dcnode-id="7094" instrument_node="">Slavic</span></a><span data-dcnode-id="7092" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="7090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Orthodox_Christian" title="Eastern Orthodox Christian"><span data-dcnode-id="7091" instrument_node="">Eastern Orthodox Christian</span></a><span data-dcnode-id="7089" instrument_node=""> countries and thus share distant and notable </span><a data-dcnode-id="7087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_heritage" title="Cultural heritage"><span data-dcnode-id="7088" instrument_node="">cultural heritage</span></a><span data-dcnode-id="7086" instrument_node="">. Both countries were full members of the </span><a data-dcnode-id="7084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Council_of_Europe" title="Council of Europe"><span data-dcnode-id="7085" instrument_node="">Council of Europe</span></a><span data-dcnode-id="7083" instrument_node=""> (until Russia's expulsion in 2022) and the </span><a data-dcnode-id="7081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organization_for_Security_and_Co-operation_in_Europe" title="Organization for Security and Co-operation in Europe"><span data-dcnode-id="7082" instrument_node="">Organization for Security and Co-operation in Europe</span></a><span data-dcnode-id="7080" instrument_node="">.
</span></p><p data-dcnode-id="7068"><span data-dcnode-id="7078" instrument_node="">After the </span><a class="mw-redirect" data-dcnode-id="7076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_USSR" title="Dissolution of the USSR"><span data-dcnode-id="7077" instrument_node="">dissolution of the USSR</span></a><span data-dcnode-id="7075" instrument_node="">, the </span><a data-dcnode-id="7073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_Federal_Republic_of_Yugoslavia" title="Socialist Federal Republic of Yugoslavia"><span data-dcnode-id="7074" instrument_node="">Socialist Federal Republic of Yugoslavia</span></a><span data-dcnode-id="7072" instrument_node=""> recognized Russia in December 1991 by the Decision of the Presidency on the recognition of the former republics of the </span><a class="mw-redirect" data-dcnode-id="7070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/USSR" title="USSR"><span data-dcnode-id="7071" instrument_node="">USSR</span></a><span data-dcnode-id="7069" instrument_node="">.
</span></p><p data-dcnode-id="7059"><span data-dcnode-id="7067" instrument_node="">Diplomatic relations between the </span><a data-dcnode-id="7065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Yugoslavia" title="Kingdom of Yugoslavia"><span data-dcnode-id="7066" instrument_node="">Kingdom of Yugoslavia</span></a><span data-dcnode-id="7064" instrument_node=""> and the USSR were established on 24 June 1940, and Serbia and the Russian Federation recognize the continuity of all inter-State documents signed between the two countries. There are about 70 bilateral treaties, agreements and protocols signed in the past. Serbia and the Russian Federation have signed and ratified 43 bilateral agreements and treaties in diverse areas of mutual cooperation so far.</span><sup class="reference" data-dcnode-id="7061" id="cite_ref-2"><a data-dcnode-id="7062" href="#cite_note-2"><span data-dcnode-id="7063" instrument_node="">[2]</span></a></sup><span data-dcnode-id="7060" instrument_node="">
</span></p><span data-dcnode-id="7058" instrument_node="">
</span><div class="timeline-wrapper" data-dcnode-id="7047"><map data-dcnode-id="7049" name="timeline_3kr4j3wqztixsnj7c2yoyyzaw6d0f3o"><area alt="Vladimir Putin" coords="70,34,134,55" data-dcnode-id="7057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Putin" shape="rect" title="Vladimir Putin"><area alt="Dmitry Medvedev" coords="192,34,272,55" data-dcnode-id="7056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dmitry_Medvedev" shape="rect" title="Dmitry Medvedev"><area alt="Vladimir Putin" coords="480,34,544,55" data-dcnode-id="7055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Putin" shape="rect" title="Vladimir Putin"><area alt="Boris Tadić" coords="157,7,227,27" data-dcnode-id="7054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boris_Tadi%25C4%2587" shape="rect" title="Boris Tadić"><area alt="Tomislav Nikolić" coords="393,7,474,27" data-dcnode-id="7053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tomislav_Nikoli%25C4%2587" shape="rect" title="Tomislav Nikolić"><area alt="Aleksandar Vučić" coords="586,7,661,27" data-dcnode-id="7052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aleksandar_Vu%25C4%258Di%25C4%2587" shape="rect" title="Aleksandar Vučić"><area alt="Russia" coords="0,53,65,43" data-dcnode-id="7051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russia" shape="rect" title="Russia"><area alt="Serbia" coords="0,25,65,15" data-dcnode-id="7050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serbia" shape="rect" title="Serbia"></map><img data-dcnode-id="7048" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/timeline/3kr4j3wqztixsnj7c2yoyyzaw6d0f3o.png&amp;raw" usemap="#timeline_3kr4j3wqztixsnj7c2yoyyzaw6d0f3o"></div><span data-dcnode-id="7046" instrument_node="">
</span><p data-dcnode-id="7041"><span data-dcnode-id="7045" instrument_node="">According to censuses, there were 3,247 ethnic Russians living in Serbia (2011) and 3,510 </span><a class="mw-redirect" data-dcnode-id="7043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serbian_Russians" title="Serbian Russians"><span data-dcnode-id="7044" instrument_node="">Serbs with Russian citizenship</span></a><span data-dcnode-id="7042" instrument_node=""> (2010).
</span></p><p data-dcnode-id="7029"><span data-dcnode-id="7040" instrument_node="">Russia and Serbia are both predominantly </span><a data-dcnode-id="7038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slavs" title="Slavs"><span data-dcnode-id="7039" instrument_node="">Slavic</span></a><span data-dcnode-id="7037" instrument_node=""> and </span><a data-dcnode-id="7035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Orthodox_Church" title="Eastern Orthodox Church"><span data-dcnode-id="7036" instrument_node="">Eastern Orthodox</span></a><span data-dcnode-id="7034" instrument_node=""> countries, which share a strong mutual cultural affinity. The countries have been close allies for centuries; and the friendship between them has been strongly maintained despite Serbia's recent attempt to maintain closer relations with the West.</span><sup class="reference" data-dcnode-id="7031" id="cite_ref-3"><a data-dcnode-id="7032" href="#cite_note-3"><span data-dcnode-id="7033" instrument_node="">[3]</span></a></sup><span data-dcnode-id="7030" instrument_node="">
</span></p><span data-dcnode-id="7028" instrument_node="">

bcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Kosovo" title="Battle of Kosovo"><span data-dcnode-id="6784" instrument_node="">Battle of Kosovo</span></a><span data-dcnode-id="6782" instrument_node=""> (1389), the </span><i data-dcnode-id="6779"><a data-dcnode-id="6780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Illustrated_Chronicle_of_Ivan_the_Terrible" title="Illustrated Chronicle of Ivan the Terrible"><span data-dcnode-id="6781" instrument_node="">Illustrated Chronicle of Ivan the Terrible</span></a></i><span data-dcnode-id="6778" instrument_node=""> (1567)</span></div></div></div><span data-dcnode-id="6774" instrument_node="">
</span><p data-dcnode-id="6735"><span data-dcnode-id="6773" instrument_node="">After the </span><a class="mw-redirect" data-dcnode-id="6771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_Serbian%25E2%2580%2593Turkish_conflicts" title="List of Serbian–Turkish conflicts"><span data-dcnode-id="6772" instrument_node="">Ottoman invasion</span></a><span data-dcnode-id="6770" instrument_node=""> of Serbia in the 14th century, Serbian refugees found refuge in Russia.</span><sup class="reference" data-dcnode-id="6767" id="cite_ref-Kijuk1999_4-0"><a data-dcnode-id="6768" href="#cite_note-Kijuk1999-4"><span data-dcnode-id="6769" instrument_node="">[4]</span></a></sup><span data-dcnode-id="6766" instrument_node=""> </span><a data-dcnode-id="6764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lazar_the_Serb" title="Lazar the Serb"><span data-dcnode-id="6765" instrument_node="">Lazar the Serb</span></a><span data-dcnode-id="6763" instrument_node=""> (built the first mechanical public clock in Russia) and </span><a data-dcnode-id="6761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pachomius_the_Serb" title="Pachomius the Serb"><span data-dcnode-id="6762" instrument_node="">Pachomius the Serb</span></a><span data-dcnode-id="6760" instrument_node=""> (hagiographer and translator) were some of the notable Serbs in Russian medieval history.</span><sup class="reference" data-dcnode-id="6757" id="cite_ref-Davidovic_5-0"><a data-dcnode-id="6758" href="#cite_note-Davidovic-5"><span data-dcnode-id="6759" instrument_node="">[5]</span></a></sup><span data-dcnode-id="6756" instrument_node=""> </span><a data-dcnode-id="6754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elena_Glinskaya" title="Elena Glinskaya"><span data-dcnode-id="6755" instrument_node="">Elena Glinskaya</span></a><span data-dcnode-id="6753" instrument_node=""> (1510–1538), the mother of Russian emperor </span><a data-dcnode-id="6751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ivan_the_Terrible" title="Ivan the Terrible"><span data-dcnode-id="6752" instrument_node="">Ivan the Terrible</span></a><span data-dcnode-id="6750" instrument_node=""> (r. 1547–84), was maternally </span><a class="mw-redirect" data-dcnode-id="6748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serb" title="Serb"><span data-dcnode-id="6749" instrument_node="">Serbian</span></a><span data-dcnode-id="6747" instrument_node="">.</span><sup class="reference" data-dcnode-id="6744" id="cite_ref-6"><a data-dcnode-id="6745" href="#cite_note-6"><span data-dcnode-id="6746" instrument_node="">[6]</span></a></sup><span data-dcnode-id="6743" instrument_node=""> The Orthodox worship of </span><a data-dcnode-id="6741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saint_Sava" title="Saint Sava"><span data-dcnode-id="6742" instrument_node="">Saint Sava</span></a><span data-dcnode-id="6740" instrument_node=""> was established in Russia in the 16th century.</span><sup class="reference" data-dcnode-id="6737" id="cite_ref-Kijuk1999_4-1"><a data-dcnode-id="6738" href="#cite_note-Kijuk1999-4"><span data-dcnode-id="6739" instrument_node="">[4]</span></a></sup><span data-dcnode-id="6736" instrument_node="">

</span><p data-dcnode-id="6675"><span data-dcnode-id="6709" instrument_node="">In the 1750s, in a re-settlement initiated by </span><a data-dcnode-id="6707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Habsburg_monarchy" title="Habsburg monarchy"><span data-dcnode-id="6708" instrument_node="">Austrian</span></a><span data-dcnode-id="6706" instrument_node=""> Colonel </span><a class="extiw" data-dcnode-id="6704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ru.wikipedia.org/wiki/%25D0%25A5%25D0%25BE%25D1%2580%25D0%25B2%25D0%25B0%25D1%2582%2C_%25D0%2598%25D0%25B2%25D0%25B0%25D0%25BD_%25D0%25A1%25D0%25B0%25D0%25BC%25D0%25BE%25D0%25B9%25D0%25BB%25D0%25BE%25D0%25B2%25D0%25B8%25D1%2587" title="ru:Хорват, Иван Самойлович"><span data-dcnode-id="6705" instrument_node="">Ivan Horvat</span></a><span data-dcnode-id="6703" instrument_node="">, a vast number of Orthodox Serbs, mostly from territories controlled by the </span><a data-dcnode-id="6701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Habsburg_monarchy" title="Habsburg monarchy"><span data-dcnode-id="6702" instrument_node="">Habsburg monarchy</span></a><span data-dcnode-id="6700" instrument_node=""> (the Serbian </span><a data-dcnode-id="6698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grenz_infantry" title="Grenz infantry"><span data-dcnode-id="6699" instrument_node="">Grenzers</span></a><span data-dcnode-id="6697" instrument_node="">), settled in Russia's military frontier region of </span><a data-dcnode-id="6695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Serbia_%28historical_province%29" title="New Serbia (historical province)"><span data-dcnode-id="6696" instrument_node="">New Serbia</span></a><span data-dcnode-id="6694" instrument_node=""> (with the centre in </span><a data-dcnode-id="6692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Novomyrhorod" title="Novomyrhorod"><span data-dcnode-id="6693" instrument_node="">Novomirgorod</span></a><span data-dcnode-id="6691" instrument_node="">, mainly in the territory of present-day </span><a data-dcnode-id="6689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kirovohrad_Oblast" title="Kirovohrad Oblast"><span data-dcnode-id="6690" instrument_node="">Kirovohrad Oblast</span></a><span data-dcnode-id="6688" instrument_node=""> of </span><a data-dcnode-id="6686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukraine" title="Ukraine"><span data-dcnode-id="6687" instrument_node="">Ukraine</span></a><span data-dcnode-id="6685" instrument_node="">), as well as in </span><a data-dcnode-id="6683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slavo-Serbia" title="Slavo-Serbia"><span data-dcnode-id="6684" instrument_node="">Slavo-Serbia</span></a><span data-dcnode-id="6682" instrument_node=""> (now mainly the territory of the </span><a data-dcnode-id="6680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Luhansk_Oblast" title="Luhansk Oblast"><span data-dcnode-id="6681" instrument_node="">Luhansk Oblast</span></a><span data-dcnode-id="6679" instrument_node=""> of Ukraine). In 1764, both territorial entities were incorporated in Russia's </span><a data-dcnode-id="6677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Novorossiya_Governorate" title="Novorossiya Governorate"><span data-dcnode-id="6678" instrument_node="">Novorossiya Governorate</span></a><span data-dcnode-id="6676" instrument_node="">.

</span><h3 data-dcnode-id="6663"><span data-dcnode-id="6673" id="19th_century.E2.80.931900s"></span><span class="mw-headline" data-dcnode-id="6671" id="19th_century–1900s"><span data-dcnode-id="6672" instrument_node="">19th century–1900s</span></span><span class="mw-editsection" data-dcnode-id="6664"><span class="mw-editsection-bracket" data-dcnode-id="6669"><span data-dcnode-id="6670" instrument_node="">[</span></span><a data-dcnode-id="6667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRussia%25E2%2580%2593Serbia_relations%26action%3Dedit%26section%3D4" title="Edit section: 19th century–1900s"><span data-dcnode-id="6668" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6665"><span data-dcnode-id="6666" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6662" instrument_node="">
</span><p data-dcnode-id="6593"><span data-dcnode-id="6661" instrument_node="">After the </span><a data-dcnode-id="6659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottoman_Empire" title="Ottoman Empire"><span data-dcnode-id="6660" instrument_node="">Ottoman Empire</span></a><span data-dcnode-id="6658" instrument_node=""> had allied itself with </span><a data-dcnode-id="6656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Napoleon" title="Napoleon"><span data-dcnode-id="6657" instrument_node="">Napoleon</span></a><span data-dcnode-id="6655" instrument_node=""> in late 1806, and was </span><a data-dcnode-id="6653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russo-Turkish_War_%281806%25E2%2580%25931812%29" title="Russo-Turkish War (1806–1812)"><span data-dcnode-id="6654" instrument_node="">attacked by Russia</span></a><span data-dcnode-id="6652" instrument_node=""> and Britain, it sought to meet the demands of the </span><a data-dcnode-id="6650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Serbian_Uprising" title="First Serbian Uprising"><span data-dcnode-id="6651" instrument_node="">Serbian rebels</span></a><span data-dcnode-id="6649" instrument_node=""> under </span><a data-dcnode-id="6647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kara%25C4%2591or%25C4%2591e" title="Karađorđe"><span data-dcnode-id="6648" instrument_node="">Karađorđe</span></a><span data-dcnode-id="6646" instrument_node="">. Russian diplomat and agent </span><a data-dcnode-id="6644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Konstantin_Rodofinikin" title="Konstantin Rodofinikin"><span data-dcnode-id="6645" instrument_node="">Konstantin Rodofinikin</span></a><span data-dcnode-id="6643" instrument_node=""> initially proposed that Serbia becomes a protectorate of the Russian Empire and that Russian garrisons be stationed in Serbia as well as a high representative which would oversee the affairs in the country. Karađorđe refused the proposition claiming that it would turn Serbia into a Russian province.</span><sup class="reference" data-dcnode-id="6640" id="cite_ref-7"><a data-dcnode-id="6641" href="#cite_note-7"><span data-dcnode-id="6642" instrument_node="">[7]</span></a></sup><span data-dcnode-id="6639" instrument_node=""> At the same time, the Russians offered the Serbs aid and cooperation. The Serbs accepted the Russians′ offer over autonomy under the Ottomans (as set by the "</span><a data-dcnode-id="6637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/I%25C4%258Dko%27s_Peace" title="Ičko's Peace"><span data-dcnode-id="6638" instrument_node="">Ičko's Peace</span></a><span data-dcnode-id="6636" instrument_node="">") and signed an </span><a class="mw-redirect" data-dcnode-id="6634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian%25E2%2580%2593Serbian_Alliance_of_1807" title="Russian–Serbian Alliance of 1807"><span data-dcnode-id="6635" instrument_node="">alliance</span></a><span data-dcnode-id="6633" instrument_node=""> with the </span><a data-dcnode-id="6631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Empire" title="Russian Empire"><span data-dcnode-id="6632" instrument_node="">Russian Empire</span></a><span data-dcnode-id="6630" instrument_node=""> in July 1807: Karađorđe was to receive arms, and military and medical missions; nevertheless the terms of </span><a data-dcnode-id="6628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Bucharest_%281812%29" title="Treaty of Bucharest (1812)"><span data-dcnode-id="6629" instrument_node="">Russo-Turkish settlement</span></a><span data-dcnode-id="6627" instrument_node=""> agreed in May 1812 effectively provided for Turkish re-occupation of Serbia, and the </span><a data-dcnode-id="6625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Serbian_Uprising" title="First Serbian Uprising"><span data-dcnode-id="6626" instrument_node="">First Serbian Uprising</span></a><span data-dcnode-id="6624" instrument_node=""> was definitively suppressed in October 1813. The </span><a data-dcnode-id="6622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Serbian_Uprising" title="Second Serbian Uprising"><span data-dcnode-id="6623" instrument_node="">Second Serbian Uprising</span></a><span data-dcnode-id="6621" instrument_node=""> (April 1815 – July 1817) achieved </span><a data-dcnode-id="6619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Principality_of_Serbia" title="Principality of Serbia"><span data-dcnode-id="6620" instrument_node="">Serbian autonomy</span></a><span data-dcnode-id="6618" instrument_node=""> within the Ottoman Empire, which was internationally recognised through the Russo-Turkish </span><a data-dcnode-id="6616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Akkerman_Convention" title="Akkerman Convention"><span data-dcnode-id="6617" instrument_node="">Akkerman Convention</span></a><span data-dcnode-id="6615" instrument_node=""> (October 1826, solemnly announced in the cathedral in </span><a data-dcnode-id="6613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kragujevac" title="Kragujevac"><span data-dcnode-id="6614" instrument_node="">Kragujevac</span></a><span data-dcnode-id="6612" instrument_node=""> in the presence of Prince </span><a class="mw-redirect" data-dcnode-id="6610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milo%25C5%25A1_Obrenovi%25C4%2587" title="Miloš Obrenović"><span data-dcnode-id="6611" instrument_node="">Miloš Obrenović</span></a><sup class="reference" data-dcnode-id="6607" id="cite_ref-FOOTNOTEEnciklopedija_Jugoslavije1968447_8-0"><a data-dcnode-id="6608" href="#cite_note-FOOTNOTEEnciklopedija_Jugoslavije1968447-8"><span data-dcnode-id="6609" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6606" instrument_node="">) and the </span><a data-dcnode-id="6604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Adrianople_%281829%29" title="Treaty of Adrianople (1829)"><span data-dcnode-id="6605" instrument_node="">Treaty of Adrianople</span></a><span data-dcnode-id="6603" instrument_node=""> (September 1829). Serbia was thus put under Russian protection, although Russia was unable to exert control as it did in </span><a data-dcnode-id="6601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wallachia" title="Wallachia"><span data-dcnode-id="6602" instrument_node="">Wallachia</span></a><span data-dcnode-id="6600" instrument_node=""> and </span><a data-dcnode-id="6598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moldavia" title="Moldavia"><span data-dcnode-id="6599" instrument_node="">Moldavia</span></a><span data-dcnode-id="6597" instrument_node="">, territories also dealt with in the Akkerman Convention. Serbian autonomy was briefly abolished by the Ottoman sultan in 1828, then re-granted in 1829. Russian protection was recognized until abolition thereof in 1856, after the Russian defeat in the </span><a data-dcnode-id="6595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crimean_War" title="Crimean War"><span data-dcnode-id="6596" instrument_node="">Crimean War</span></a><span data-dcnode-id="6594" instrument_node="">.
</span></p><span data-dcnode-id="6592" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="6575"><div class="thumbinner" data-dcnode-id="6576" style="width:182px;"><a class="image" data-dcnode-id="6590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APrince_Ioann_Konstantinovich_and_his_wife_Princess_Elena_Petrovna_%28daughter_of_King_Peter_I_of_Serbia%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="6591" data-file-height="672" data-file-width="414" decoding="async" height="292" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/00/Prince_Ioann_Konstantinovich_and_his_wife_Princess_Elena_Petrovna_%2528daughter_of_King_Peter_I_of_Serbia%2529.jpg/180px-Prince_Ioann_Konstantinovich_and_his_wife_Princess_Elena_Petrovna_%2528daughter_of_King_Peter_I_of_Serbia%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/00/Prince_Ioann_Konstantinovich_and_his_wife_Princess_Elena_Petrovna_%28daughter_of_King_Peter_I_of_Serbia%29.jpg/270px-Prince_Ioann_Konstantinovich_and_his_wife_Princess_Elena_Petrovna_%28daughter_of_King_Peter_I_of_Serbia%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/00/Prince_Ioann_Konstantinovich_and_his_wife_Princess_Elena_Petrovna_%28daughter_of_King_Peter_I_of_Serbia%29.jpg/360px-Prince_Ioann_Konstantinovich_and_his_wife_Princess_Elena_Petrovna_%28daughter_of_King_Peter_I_of_Serbia%29.jpg 2x" width="180"></a><span data-dcnode-id="6589" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6577"><div class="magnify" data-dcnode-id="6587"><a class="internal" data-dcnode-id="6588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APrince_Ioann_Konstantinovich_and_his_wife_Princess_Elena_Petrovna_%28daughter_of_King_Peter_I_of_Serbia%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="6586" instrument_node="">Princess </span><a data-dcnode-id="6584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Princess_Helen_of_Serbia" title="Princess Helen of Serbia"><span data-dcnode-id="6585" instrument_node="">Elena Petrovna</span></a><span data-dcnode-id="6583" instrument_node=""> (from </span><a data-dcnode-id="6581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kara%25C4%2591or%25C4%2591evi%25C4%2587_dynasty" title="Karađorđević dynasty"><span data-dcnode-id="6582" instrument_node="">House of Karađorđević</span></a><span data-dcnode-id="6580" instrument_node="">) and Prince </span><a data-dcnode-id="6578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prince_John_Konstantinovich_of_Russia" title="Prince John Konstantinovich of Russia"><span data-dcnode-id="6579" instrument_node="">John Konstantinovich</span></a></div></div></div><span data-dcnode-id="6574" instrument_node="">
</span><p data-dcnode-id="6562"><span data-dcnode-id="6573" instrument_node="">In February 1838, in his residence in </span><a data-dcnode-id="6571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kragujevac" title="Kragujevac"><span data-dcnode-id="6572" instrument_node="">Kragujevac</span></a><span data-dcnode-id="6570" instrument_node=""> Prince Miloš Obrenović received the first Russian consul, Gerasim Vashchenko.</span><sup class="reference" data-dcnode-id="6567" id="cite_ref-9"><a data-dcnode-id="6568" href="#cite_note-9"><span data-dcnode-id="6569" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="6564" id="cite_ref-10"><a data-dcnode-id="6565" href="#cite_note-10"><span data-dcnode-id="6566" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6563" instrument_node="">
</span></p><p data-dcnode-id="6484"><span data-dcnode-id="6561" instrument_node="">In June 1876, Serbia, along with the </span><a data-dcnode-id="6559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Principality_of_Montenegro" title="Principality of Montenegro"><span data-dcnode-id="6560" instrument_node="">Principality of Montenegro</span></a><span data-dcnode-id="6558" instrument_node="">, declared independence and </span><a class="mw-redirect" data-dcnode-id="6556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serbian%25E2%2580%2593Ottoman_War_%281876%25E2%2580%25931878%29" title="Serbian–Ottoman War (1876–1878)"><span data-dcnode-id="6557" instrument_node="">war on the Ottoman Empire</span></a><span data-dcnode-id="6555" instrument_node="">. The war eventually ended with Serbian victory in March 1878, while Russia had been involved in its own </span><a class="mw-redirect" data-dcnode-id="6553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russo%25E2%2580%2593Turkish_War_%281877%25E2%2580%25931878%29" title="Russo–Turkish War (1877–1878)"><span data-dcnode-id="6554" instrument_node="">war with Turkey</span></a><span data-dcnode-id="6552" instrument_node=""> (April 1877 – March 1878), with the final settlement of both wars decided by the great powers at the </span><a data-dcnode-id="6550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Congress_of_Berlin" title="Congress of Berlin"><span data-dcnode-id="6551" instrument_node="">Congress of Berlin</span></a><span data-dcnode-id="6549" instrument_node=""> (1878). The </span><a data-dcnode-id="6547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Berlin_%281878%29" title="Treaty of Berlin (1878)"><span data-dcnode-id="6548" instrument_node="">Treaty of Berlin</span></a><span data-dcnode-id="6546" instrument_node=""> (July 1878), whose deliberations and decisions were greatly influenced by </span><a data-dcnode-id="6544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austria-Hungary" title="Austria-Hungary"><span data-dcnode-id="6545" instrument_node="">Austria-Hungary</span></a><span data-dcnode-id="6543" instrument_node="">′s </span><a data-dcnode-id="6541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gyula_Andr%25C3%25A1ssy" title="Gyula Andrássy"><span data-dcnode-id="6542" instrument_node="">Gyula Andrássy</span></a><span data-dcnode-id="6540" instrument_node="">, recognised Serbia's independence, yet left Serbia's ruling class disgruntled at Russia, who was seen as favouring the newly established </span><a data-dcnode-id="6538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Principality_of_Bulgaria" title="Principality of Bulgaria"><span data-dcnode-id="6539" instrument_node="">Principality of Bulgaria</span></a><span data-dcnode-id="6537" instrument_node=""> at the expense of Serbia.</span><sup class="reference" data-dcnode-id="6534" id="cite_ref-FOOTNOTEEnciklopedija_Jugoslavije1968455_11-0"><a data-dcnode-id="6535" href="#cite_note-FOOTNOTEEnciklopedija_Jugoslavije1968455-11"><span data-dcnode-id="6536" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6533" instrument_node=""> In line with Andrássy's idea that Vienna, in order to neutralise inimical </span><a data-dcnode-id="6531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Irredentism" title="Irredentism"><span data-dcnode-id="6532" instrument_node="">irredentist</span></a><span data-dcnode-id="6530" instrument_node=""> tendencies, should establish close legally binding ties with all her neighbours with whom she had ethnic connections, Austria-Hungary, which bordered Serbia to the north (modern </span><a data-dcnode-id="6528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vojvodina" title="Vojvodina"><span data-dcnode-id="6529" instrument_node="">Vojvodina</span></a><span data-dcnode-id="6527" instrument_node="">), and the west (</span><a data-dcnode-id="6525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austro-Hungarian_rule_in_Bosnia_and_Herzegovina" title="Austro-Hungarian rule in Bosnia and Herzegovina"><span data-dcnode-id="6526" instrument_node="">Bosnia and Herzegovina</span></a><span data-dcnode-id="6524" instrument_node="">), sought to integrate Serbia economically by concluding a series of trade conventions with her and pressured </span><a data-dcnode-id="6522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milan_I_of_Serbia" title="Milan I of Serbia"><span data-dcnode-id="6523" instrument_node="">Milan Obrenović</span></a><span data-dcnode-id="6521" instrument_node=""> to enter into a comprehensive bilateral political treaty.</span><sup class="reference" data-dcnode-id="6518" id="cite_ref-hrvenc_12-0"><a data-dcnode-id="6519" href="#cite_note-hrvenc-12"><span data-dcnode-id="6520" instrument_node="">[12]</span></a></sup><span data-dcnode-id="6517" instrument_node=""> In June 1881, Serbian Prince </span><a data-dcnode-id="6515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milan_I_of_Serbia" title="Milan I of Serbia"><span data-dcnode-id="6516" instrument_node="">Milan Obrenović</span></a><span data-dcnode-id="6514" instrument_node=""> and Austria-Hungary concluded a </span><a data-dcnode-id="6512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austro%25E2%2580%2593Serbian_Alliance_of_1881" title="Austro–Serbian Alliance of 1881"><span data-dcnode-id="6513" instrument_node="">secret convention</span></a><span data-dcnode-id="6511" instrument_node=""> that effectively turned Serbia into </span><a data-dcnode-id="6509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vienna" title="Vienna"><span data-dcnode-id="6510" instrument_node="">Vienna</span></a><span data-dcnode-id="6508" instrument_node="">′s </span><a data-dcnode-id="6506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Client_state" title="Client state"><span data-dcnode-id="6507" instrument_node="">client state</span></a><span data-dcnode-id="6505" instrument_node="">.</span><sup class="reference" data-dcnode-id="6502" id="cite_ref-FOOTNOTEEnciklopedija_Jugoslavije1968456_13-0"><a data-dcnode-id="6503" href="#cite_note-FOOTNOTEEnciklopedija_Jugoslavije1968456-13"><span data-dcnode-id="6504" instrument_node="">[13]</span></a></sup><span data-dcnode-id="6501" instrument_node=""> In turn, Russia in the 1880s intensified her courtship of Montenegro.</span><sup class="reference" data-dcnode-id="6498" id="cite_ref-FOOTNOTEEnciklopedija_Jugoslavije1968456_13-1"><a data-dcnode-id="6499" href="#cite_note-FOOTNOTEEnciklopedija_Jugoslavije1968456-13"><span data-dcnode-id="6500" instrument_node="">[13]</span></a></sup><span data-dcnode-id="6497" instrument_node=""> Prince </span><a class="mw-redirect" data-dcnode-id="6495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikola_I_Petrovi%25C4%2587-Njego%25C5%25A1" title="Nikola I Petrović-Njegoš"><span data-dcnode-id="6496" instrument_node="">Nikola I</span></a><span data-dcnode-id="6494" instrument_node=""> of Montenegro was a regular visitor to </span><a data-dcnode-id="6492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saint_Petersburg" title="Saint Petersburg"><span data-dcnode-id="6493" instrument_node="">Saint Petersburg</span></a><span data-dcnode-id="6491" instrument_node=""> and was awarded the Russian Empire's </span><a data-dcnode-id="6489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Order_of_St._Andrew" title="Order of St. Andrew"><span data-dcnode-id="6490" instrument_node="">highest decoration</span></a><span data-dcnode-id="6488" instrument_node=""> by </span><a data-dcnode-id="6486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_III_of_Russia" title="Alexander III of Russia"><span data-dcnode-id="6487" instrument_node="">Alexander III</span></a><span data-dcnode-id="6485" instrument_node=""> in 1889.
</span></p><span data-dcnode-id="6483" instrument_node="">
</span><div class="thumb tmulti tright" data-dcnode-id="6446"><div class="thumbinner" data-dcnode-id="6447" style="width:258px;max-width:258px"><div class="trow" data-dcnode-id="6472"><div class="tsingle" data-dcnode-id="6477" style="width:132px;max-width:132px"><div class="thumbimage" data-dcnode-id="6478"><a class="image" data-dcnode-id="6479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATchaikovsky.jpg"><img alt="" data-dcnode-id="6480" data-file-height="270" data-file-width="200" decoding="async" height="176" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/74/Tchaikovsky.jpg/130px-Tchaikovsky.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/74/Tchaikovsky.jpg/195px-Tchaikovsky.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/7/74/Tchaikovsky.jpg 2x" width="130"></a></div></div><div class="tsingle" data-dcnode-id="6473" style="width:122px;max-width:122px"><div class="thumbimage" data-dcnode-id="6474"><a class="image" data-dcnode-id="6475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARimsky-korsakov.jpg"><img alt="" data-dcnode-id="6476" data-file-height="879" data-file-width="563" decoding="async" height="187" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/84/Rimsky-korsakov.jpg/120px-Rimsky-korsakov.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/84/Rimsky-korsakov.jpg/180px-Rimsky-korsakov.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/84/Rimsky-korsakov.jpg/240px-Rimsky-korsakov.jpg 2x" width="120"></a></div></div></div><div class="trow" data-dcnode-id="6448" style="display:flex"><div class="thumbcaption" data-dcnode-id="6449"><b data-dcnode-id="6470"><span data-dcnode-id="6471" instrument_node="">Left:</span></b><span data-dcnode-id="6469" instrument_node=""> </span><a data-dcnode-id="6467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pyotr_Ilyich_Tchaikovsky" title="Pyotr Ilyich Tchaikovsky"><span data-dcnode-id="6468" instrument_node="">Pyotr Ilyich Tchaikovsky</span></a><span data-dcnode-id="6466" instrument_node=""> composed the </span><i data-dcnode-id="6463"><a data-dcnode-id="6464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marche_slave" title="Marche slave"><span data-dcnode-id="6465" instrument_node="">Serbo-Russian March</span></a></i><span data-dcnode-id="6462" instrument_node=""> (1876)</span><br data-dcnode-id="6461"><b data-dcnode-id="6459"><span data-dcnode-id="6460" instrument_node="">Right:</span></b><span data-dcnode-id="6458" instrument_node=""> </span><a data-dcnode-id="6456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikolai_Rimsky-Korsakov" title="Nikolai Rimsky-Korsakov"><span data-dcnode-id="6457" instrument_node="">Nikolai Rimsky-Korsakov</span></a><span data-dcnode-id="6455" instrument_node=""> composed the</span><i data-dcnode-id="6451"><span data-dcnode-id="6454" instrument_node=""> </span><a data-dcnode-id="6452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fantasy_on_Serbian_Themes" title="Fantasy on Serbian Themes"><span data-dcnode-id="6453" instrument_node="">Fantasy on Serbian Themes</span></a></i><span data-dcnode-id="6450" instrument_node=""> (1867)</span></div></div></div></div><span data-dcnode-id="6445" instrument_node="">
</span><p data-dcnode-id="6396"><span data-dcnode-id="6444" instrument_node="">Serbia's </span><a data-dcnode-id="6442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_Radical_Party" title="People's Radical Party"><span data-dcnode-id="6443" instrument_node="">People's Radical Party</span></a><span data-dcnode-id="6441" instrument_node="">, which was founded by reputed </span><a data-dcnode-id="6439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russophilia" title="Russophilia"><span data-dcnode-id="6440" instrument_node="">Russophile</span></a><span data-dcnode-id="6438" instrument_node=""> </span><a data-dcnode-id="6436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikola_Pa%25C5%25A1i%25C4%2587" title="Nikola Pašić"><span data-dcnode-id="6437" instrument_node="">Nikola Pašić</span></a><span data-dcnode-id="6435" instrument_node=""> in 1881 and gained parliament majority by 1891, sought to free the country of Austro-Hungarian dependence. Serbia was defeated in the </span><a data-dcnode-id="6433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serbo-Bulgarian_War" title="Serbo-Bulgarian War"><span data-dcnode-id="6434" instrument_node="">war with Bulgaria</span></a><span data-dcnode-id="6432" instrument_node=""> in 1885, and the </span><a data-dcnode-id="6430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bulgarian_unification" title="Bulgarian unification"><span data-dcnode-id="6431" instrument_node="">Bulgarian unification</span></a><span data-dcnode-id="6429" instrument_node=""> was internationally recognized. Meanwhile, tensions between Serbia and Austria-Hungary grew. Serbian pretensions in creating a South Slavic state (</span><a data-dcnode-id="6427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yugoslavism" title="Yugoslavism"><span data-dcnode-id="6428" instrument_node="">Yugoslavism</span></a><span data-dcnode-id="6426" instrument_node=""> as opposed to </span><a data-dcnode-id="6424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austro-Slavism" title="Austro-Slavism"><span data-dcnode-id="6425" instrument_node="">Austro-Slavism</span></a><span data-dcnode-id="6423" instrument_node="">) put fear in Austria-Hungary of potential devastation of the Austro-Hungarian empire. On the other hand, Russia became increasingly disappointed in Bulgaria, where the rulers of the German dynasties, </span><a data-dcnode-id="6421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_of_Battenberg" title="Alexander of Battenberg"><span data-dcnode-id="6422" instrument_node="">Alexander of Battenberg</span></a><span data-dcnode-id="6420" instrument_node=""> and from 1887 </span><a data-dcnode-id="6418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ferdinand_I_of_Bulgaria" title="Ferdinand I of Bulgaria"><span data-dcnode-id="6419" instrument_node="">Ferdinand I</span></a><span data-dcnode-id="6417" instrument_node="">, pursued policies that Russia opposed. The visit to Saint Petersburg of Austrian Emperor </span><a data-dcnode-id="6415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franz_Joseph_I_of_Austria" title="Franz Joseph I of Austria"><span data-dcnode-id="6416" instrument_node="">Franz Joseph</span></a><span data-dcnode-id="6414" instrument_node=""> and his conference with </span><a data-dcnode-id="6412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nicholas_II_of_Russia" title="Nicholas II of Russia"><span data-dcnode-id="6413" instrument_node="">Nicholas II</span></a><span data-dcnode-id="6411" instrument_node=""> of Russia in 1897 heralded a secret agreement between the two empires to honour and seek to maintain the </span><i data-dcnode-id="6408"><a data-dcnode-id="6409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Status_quo" title="Status quo"><span data-dcnode-id="6410" instrument_node="">status quo</span></a></i><span data-dcnode-id="6407" instrument_node=""> in the Balkans, which was in line with Vienna's attempts to forestall an emergence of a large Slavic state in the region.</span><sup class="reference" data-dcnode-id="6404" id="cite_ref-FOOTNOTEEnciklopedija_Jugoslavije1968456_13-2"><a data-dcnode-id="6405" href="#cite_note-FOOTNOTEEnciklopedija_Jugoslavije1968456-13"><span data-dcnode-id="6406" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="6401" id="cite_ref-14"><a data-dcnode-id="6402" href="#cite_note-14"><span data-dcnode-id="6403" instrument_node="">[14]</span></a></sup><span data-dcnode-id="6400" instrument_node=""> The </span><a data-dcnode-id="6398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1901_massacres_of_Serbs" title="1901 massacres of Serbs"><span data-dcnode-id="6399" instrument_node="">1901 massacres of Serbs</span></a><span data-dcnode-id="6397" instrument_node=""> in Kosovo was instrumental in causing a diplomatic conflict between Austria-Hungary, which supported the Albanians, and Serbia, which was supported by Russia.
</span></p><p data-dcnode-id="6362"><span data-dcnode-id="6395" instrument_node="">Serbian King </span><a data-dcnode-id="6393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_I_of_Serbia" title="Alexander I of Serbia"><span data-dcnode-id="6394" instrument_node="">Alexander I</span></a><span data-dcnode-id="6392" instrument_node=""> was </span><a data-dcnode-id="6390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/May_Coup_%28Serbia%29" title="May Coup (Serbia)"><span data-dcnode-id="6391" instrument_node="">assassinated in a coup d'état</span></a><span data-dcnode-id="6389" instrument_node=""> in 1903, which ushered in the extinction of </span><a data-dcnode-id="6387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Obrenovi%25C4%2587_dynasty" title="Obrenović dynasty"><span data-dcnode-id="6388" instrument_node="">Obrenović dynasty</span></a><span data-dcnode-id="6386" instrument_node=""> and return of the Russophile </span><a data-dcnode-id="6384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kara%25C4%2591or%25C4%2591evi%25C4%2587_dynasty" title="Karađorđević dynasty"><span data-dcnode-id="6385" instrument_node="">Karađorđević dynasty</span></a><span data-dcnode-id="6383" instrument_node="">: the new political regime of prime minister </span><a data-dcnode-id="6381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikola_Pa%25C5%25A1i%25C4%2587" title="Nikola Pašić"><span data-dcnode-id="6382" instrument_node="">Nikola Pašić</span></a><span data-dcnode-id="6380" instrument_node=""> under King </span><a data-dcnode-id="6378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_I_of_Serbia" title="Peter I of Serbia"><span data-dcnode-id="6379" instrument_node="">Peter I Karađorđević</span></a><span data-dcnode-id="6377" instrument_node=""> re-orientated Serbia towards Russia.</span><sup class="reference" data-dcnode-id="6374" id="cite_ref-FOOTNOTEEnciklopedija_Jugoslavije1968456–457_15-0"><a data-dcnode-id="6375" href="#cite_note-FOOTNOTEEnciklopedija_Jugoslavije1968456%E2%80%93457-15"><span data-dcnode-id="6376" instrument_node="">[15]</span></a></sup><span data-dcnode-id="6373" instrument_node=""> Serbia was supported by Russia in the economic </span><a class="mw-redirect" data-dcnode-id="6371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pig_War_%281906%25E2%2580%259308%29" title="Pig War (1906–08)"><span data-dcnode-id="6372" instrument_node="">Pig War (1906–08)</span></a><span data-dcnode-id="6370" instrument_node=""> with Austria-Hungary. Austria-Hungary annexed Bosnia and Herzegovina in 1908; Russia did not interfere in the </span><a class="mw-redirect" data-dcnode-id="6368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bosnian_crisis" title="Bosnian crisis"><span data-dcnode-id="6369" instrument_node="">Bosnian crisis</span></a><span data-dcnode-id="6367" instrument_node="">. The "National Defence" (</span><i data-dcnode-id="6364"><a data-dcnode-id="6365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Narodna_Odbrana" title="Narodna Odbrana"><span data-dcnode-id="6366" instrument_node="">Narodna Odbrana</span></a></i><span data-dcnode-id="6363" instrument_node="">) organization was founded following the annexation, and sought to liberate Serb territories from Austro-Hungarian rule.
</span></p><span data-dcnode-id="6361" instrument_node="">
</span><h3 data-dcnode-id="6351"><span class="mw-headline" data-dcnode-id="6359" id="World_War_I"><span data-dcnode-id="6360" instrument_node="">World War I</span></span><span class="mw-editsection" data-dcnode-id="6352"><span class="mw-editsection-bracket" data-dcnode-id="6357"><span data-dcnode-id="6358" instrument_node="">[</span></span><a data-dcnode-id="6355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRussia%25E2%2580%2593Serbia_relations%26action%3Dedit%26section%3D5" title="Edit section: World War I"><span data-dcnode-id="6356" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6353"><span data-dcnode-id="6354" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6350" instrument_node="">
</span><link data-dcnode-id="6349" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6345" role="note"><span data-dcnode-id="6348" instrument_node="">See also: </span><a data-dcnode-id="6346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Causes_of_World_War_I" title="Causes of World War I"><span data-dcnode-id="6347" instrument_node="">Causes of World War I</span></a></div><span data-dcnode-id="6344" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6335"><div class="thumbinner" data-dcnode-id="6336" style="width:222px;"><a class="image" data-dcnode-id="6342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChain_of_Friendship_cartoon.jpg"><img alt="" class="thumbimage" data-dcnode-id="6343" data-file-height="3612" data-file-width="4797" decoding="async" height="166" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/34/Chain_of_Friendship_cartoon.jpg/220px-Chain_of_Friendship_cartoon.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/34/Chain_of_Friendship_cartoon.jpg/330px-Chain_of_Friendship_cartoon.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/34/Chain_of_Friendship_cartoon.jpg/440px-Chain_of_Friendship_cartoon.jpg 2x" width="220"></a><span data-dcnode-id="6341" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6337"><div class="magnify" data-dcnode-id="6339"><a class="internal" data-dcnode-id="6340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChain_of_Friendship_cartoon.jpg" title="Enlarge"></a></div><span data-dcnode-id="6338" instrument_node="">"A Threatening Situation", an American comic from July 1914: "If Austria attacks Serbia, Russia will fall upon Austria, Germany upon Russia, and France and England upon Germany."</span></div></div></div><span data-dcnode-id="6334" instrument_node="">
</span><p data-dcnode-id="6281"><span data-dcnode-id="6333" instrument_node="">One of the factors that led to the beginning of </span><a data-dcnode-id="6331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_I" title="World War I"><span data-dcnode-id="6332" instrument_node="">World War I</span></a><span data-dcnode-id="6330" instrument_node=""> was close bilateral relations between the </span><a data-dcnode-id="6328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Serbia" title="Kingdom of Serbia"><span data-dcnode-id="6329" instrument_node="">Kingdom of Serbia</span></a><span data-dcnode-id="6327" instrument_node=""> and the </span><a data-dcnode-id="6325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Empire" title="Russian Empire"><span data-dcnode-id="6326" instrument_node="">Russian Empire</span></a><span data-dcnode-id="6324" instrument_node="">. While Russia and Serbia were not formally allied, Russia openly sought political and religious influence in Serbia.</span><sup class="reference" data-dcnode-id="6321" id="cite_ref-FOOTNOTEJelavich200410_16-0"><a data-dcnode-id="6322" href="#cite_note-FOOTNOTEJelavich200410-16"><span data-dcnode-id="6323" instrument_node="">[16]</span></a></sup><span data-dcnode-id="6320" instrument_node=""> In May 1914, Serbian politics were polarized between two factions, one headed by the Prime Minister </span><a data-dcnode-id="6318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikola_Pa%25C5%25A1i%25C4%2587" title="Nikola Pašić"><span data-dcnode-id="6319" instrument_node="">Nikola Pašić</span></a><span data-dcnode-id="6317" instrument_node="">, and the other by the radical nationalist chief of Military Intelligence, Colonel </span><a data-dcnode-id="6315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dragutin_Dimitrijevi%25C4%2587" title="Dragutin Dimitrijević"><span data-dcnode-id="6316" instrument_node="">Dragutin Dimitrijević</span></a><span data-dcnode-id="6314" instrument_node="">, known by his codename Apis.</span><sup class="reference" data-dcnode-id="6311" id="cite_ref-Fromkin124-25_17-0"><a data-dcnode-id="6312" href="#cite_note-Fromkin124-25-17"><span data-dcnode-id="6313" instrument_node="">[17]</span></a></sup><span data-dcnode-id="6310" instrument_node=""> In that month, due to Colonel Dimitrijević's intrigues, King </span><a class="mw-redirect" data-dcnode-id="6308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_I_of_Yugoslavia" title="Peter I of Yugoslavia"><span data-dcnode-id="6309" instrument_node="">Peter</span></a><span data-dcnode-id="6307" instrument_node=""> dismissed Pašić's government,</span><sup class="reference" data-dcnode-id="6304" id="cite_ref-Fromkin124-25_17-1"><a data-dcnode-id="6305" href="#cite_note-Fromkin124-25-17"><span data-dcnode-id="6306" instrument_node="">[17]</span></a></sup><span data-dcnode-id="6303" instrument_node="">  but the Russian Minister in Belgrade intervened to have Pašić's government restored.</span><sup class="reference" data-dcnode-id="6300" id="cite_ref-Fromkin124-25_17-2"><a data-dcnode-id="6301" href="#cite_note-Fromkin124-25-17"><span data-dcnode-id="6302" instrument_node="">[17]</span></a></sup><span data-dcnode-id="6299" instrument_node=""> Pašić, though he often talked in public, knew that Serbia was near-bankrupt and, having suffered heavy casualties in the Balkan Wars and in the suppression of an Albanian revolt in Kosovo, needed peace.</span><sup class="reference" data-dcnode-id="6296" id="cite_ref-Fromkin124-25_17-3"><a data-dcnode-id="6297" href="#cite_note-Fromkin124-25-17"><span data-dcnode-id="6298" instrument_node="">[17]</span></a></sup><span data-dcnode-id="6295" instrument_node=""> Since Russia also favoured peace in the Balkans, from the Russian viewpoint it was desirable to keep Pašić in power.</span><sup class="reference" data-dcnode-id="6292" id="cite_ref-Fromkin124-25_17-4"><a data-dcnode-id="6293" href="#cite_note-Fromkin124-25-17"><span data-dcnode-id="6294" instrument_node="">[17]</span></a></sup><span data-dcnode-id="6291" instrument_node=""> However, the </span><a data-dcnode-id="6289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assassination_of_Archduke_Franz_Ferdinand" title="Assassination of Archduke Franz Ferdinand"><span data-dcnode-id="6290" instrument_node="">Assassination of Archduke Franz Ferdinand</span></a><span data-dcnode-id="6288" instrument_node=""> led </span><a data-dcnode-id="6286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austria-Hungary" title="Austria-Hungary"><span data-dcnode-id="6287" instrument_node="">Austria-Hungary</span></a><span data-dcnode-id="6285" instrument_node=""> to declare war on Serbia during the </span><a data-dcnode-id="6283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/July_Crisis" title="July Crisis"><span data-dcnode-id="6284" instrument_node="">July Crisis</span></a><span data-dcnode-id="6282" instrument_node="">.  Russia mobilised its armed forces in late July ostensibly to defend Serbia, but also to maintain status as a Great Power, gain influence in the Balkans and deter Austria-Hungary and Germany.  This led Germany to declare war on Russia on 1 August, ultimately expanding the local conflict into a world war.
</span></p><span data-dcnode-id="6280" instrument_node="">
