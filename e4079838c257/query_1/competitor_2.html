a-dcnode-id="6234"><div class="magnify" data-dcnode-id="6248"><a class="internal" data-dcnode-id="6249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25D0%2592%25D1%2580%25D0%25B0%25D0%25BD%25D0%25B3%25D0%25B5%25D0%25BB%25D1%258C_%25D0%25B8_%25D0%2590%25D0%25BD%25D1%2582%25D0%25BE%25D0%25BD%25D0%25B8%25D0%25B9_%28%25D0%25A5%25D1%2580%25D0%25B0%25D0%25BF%25D0%25BE%25D0%25B2%25D0%25B8%25D1%2586%25D0%25BA%25D0%25B8%25D0%25B9%29_%25D0%25B2_%25D0%25AE%25D0%25B3%25D0%25BE%25D1%2581%25D0%25BB%25D0%25B0%25D0%25B2%25D0%25B8%25D0%25B8.jpg" title="Enlarge"></a></div><span data-dcnode-id="6247" instrument_node="">General </span><a data-dcnode-id="6245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pyotr_Wrangel" title="Pyotr Wrangel"><span data-dcnode-id="6246" instrument_node="">Pyotr Wrangel</span></a><span data-dcnode-id="6244" instrument_node="">, chairman of the </span><a data-dcnode-id="6242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_All-Military_Union" title="Russian All-Military Union"><span data-dcnode-id="6243" instrument_node="">Russian All-Military Union</span></a><span data-dcnode-id="6241" instrument_node=""> (second left), and Metropolitan </span><a data-dcnode-id="6239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antony_%28Khrapovitsky%29" title="Antony (Khrapovitsky)"><span data-dcnode-id="6240" instrument_node="">Anthony Khrapovitsky</span></a><span data-dcnode-id="6238" instrument_node=""> (third left) in </span><a data-dcnode-id="6236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dedinje" title="Dedinje"><span data-dcnode-id="6237" instrument_node="">Dedinje</span></a><span data-dcnode-id="6235" instrument_node="">, Belgrade, on Easter, April 1927</span></div></div></div><span data-dcnode-id="6231" instrument_node="">
</span><p data-dcnode-id="6197"><span data-dcnode-id="6230" instrument_node="">A few months after the </span><a data-dcnode-id="6228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Revolution" title="Russian Revolution"><span data-dcnode-id="6229" instrument_node="">Russian Revolution</span></a><span data-dcnode-id="6227" instrument_node=""> in November 1917, the </span><a data-dcnode-id="6225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Civil_War" title="Russian Civil War"><span data-dcnode-id="6226" instrument_node="">Russian Civil War</span></a><span data-dcnode-id="6224" instrument_node=""> ensued, in which a small number of mercenaries from </span><a data-dcnode-id="6222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yugoslavia" title="Yugoslavia"><span data-dcnode-id="6223" instrument_node="">Yugoslavia</span></a><span data-dcnode-id="6221" instrument_node=""> fought for both the </span><a data-dcnode-id="6219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_movement" title="White movement"><span data-dcnode-id="6220" instrument_node="">Russian Whites</span></a><span data-dcnode-id="6218" instrument_node=""> and the </span><a data-dcnode-id="6216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bolsheviks" title="Bolsheviks"><span data-dcnode-id="6217" instrument_node="">Bolsheviks</span></a><span data-dcnode-id="6215" instrument_node="">. After the Civil War ended in 1922 in a Bolshevik victory, relations between the </span><a data-dcnode-id="6213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Yugoslavia" title="Kingdom of Yugoslavia"><span data-dcnode-id="6214" instrument_node="">Kingdom of Yugoslavia</span></a><span data-dcnode-id="6212" instrument_node=""> and the </span><a data-dcnode-id="6210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="6211" instrument_node="">Soviet Union</span></a><span data-dcnode-id="6209" instrument_node=""> remained frosty. It was not until June 1940 that the Kingdom of Yugoslavia formally recognised the </span><a class="mw-redirect" data-dcnode-id="6207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/USSR" title="USSR"><span data-dcnode-id="6208" instrument_node="">USSR</span></a><span data-dcnode-id="6206" instrument_node=""> and established diplomatic relations,</span><sup class="reference" data-dcnode-id="6203" id="cite_ref-FOOTNOTEŠkiljan201418_18-0"><a data-dcnode-id="6204" href="#cite_note-FOOTNOTE%C5%A0kiljan201418-18"><span data-dcnode-id="6205" instrument_node="">[18]</span></a></sup><span data-dcnode-id="6202" instrument_node=""> one of the last European countries to do so.</span><sup class="reference" data-dcnode-id="6199" id="cite_ref-Petranović2_19-0"><a data-dcnode-id="6200" href="#cite_note-Petranovi%C4%872-19"><span data-dcnode-id="6201" instrument_node="">[19]</span></a></sup><span data-dcnode-id="6198" instrument_node="">
</span></p><p data-dcnode-id="6128"><span data-dcnode-id="6196" instrument_node="">Since 1920, the government of the </span><a data-dcnode-id="6194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Yugoslavia" title="Kingdom of Yugoslavia"><span data-dcnode-id="6195" instrument_node="">Kingdom of SHS</span></a><span data-dcnode-id="6193" instrument_node=""> welcomed tens of thousands of anti-Bolshevik Russian refugees,</span><sup class="reference" data-dcnode-id="6190" id="cite_ref-Petranović2_19-1"><a data-dcnode-id="6191" href="#cite_note-Petranovi%C4%872-19"><span data-dcnode-id="6192" instrument_node="">[19]</span></a></sup><span data-dcnode-id="6189" instrument_node=""> mainly those who fled after the final defeat of the Russian Army under General </span><a data-dcnode-id="6187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pyotr_Wrangel" title="Pyotr Wrangel"><span data-dcnode-id="6188" instrument_node="">Pyotr Wrangel</span></a><span data-dcnode-id="6186" instrument_node=""> in Crimea in November 1920, explaining its hospitality by presenting it as paying back the debt Serbia owed Russia for the latter's intervention on the side of Serbia at the outbreak of WWI.</span><sup class="reference" data-dcnode-id="6183" id="cite_ref-FOOTNOTEŠkiljan201410_20-0"><a data-dcnode-id="6184" href="#cite_note-FOOTNOTE%C5%A0kiljan201410-20"><span data-dcnode-id="6185" instrument_node="">[20]</span></a></sup><span data-dcnode-id="6182" instrument_node=""> The Kingdom of SHS became home for 40.000 exiles from the Russian Empire.</span><sup class="reference" data-dcnode-id="6179" id="cite_ref-21"><a data-dcnode-id="6180" href="#cite_note-21"><span data-dcnode-id="6181" instrument_node="">[21]</span></a></sup><span data-dcnode-id="6178" instrument_node=""> In 1921, at the invitation of the Serbian Patriarch </span><a data-dcnode-id="6176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dimitrije%2C_Serbian_Patriarch" title="Dimitrije, Serbian Patriarch"><span data-dcnode-id="6177" instrument_node="">Dimitrije</span></a><span data-dcnode-id="6175" instrument_node="">, the leadership of the </span><a class="mw-redirect" data-dcnode-id="6173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Orthodox_church" title="Russian Orthodox church"><span data-dcnode-id="6174" instrument_node="">Russian Church</span></a><span data-dcnode-id="6172" instrument_node=""> in exile moved from </span><a data-dcnode-id="6170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Istanbul" title="Istanbul"><span data-dcnode-id="6171" instrument_node="">Constantinople</span></a><span data-dcnode-id="6169" instrument_node=""> to Serbia and in September 1922 in </span><a data-dcnode-id="6167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sremski_Karlovci" title="Sremski Karlovci"><span data-dcnode-id="6168" instrument_node="">Karlovci</span></a><span data-dcnode-id="6166" instrument_node=""> (until 1920, the seat of the abolished </span><a data-dcnode-id="6164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Patriarchate_of_Karlovci" title="Patriarchate of Karlovci"><span data-dcnode-id="6165" instrument_node="">Patriarchate of Karlovci</span></a><span data-dcnode-id="6163" instrument_node="">) established a de facto independent ecclesiastical administration that a few years later was instituted as the </span><a class="mw-redirect" data-dcnode-id="6161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Orthodox_Church_Outside_Russia" title="Russian Orthodox Church Outside Russia"><span data-dcnode-id="6162" instrument_node="">Russian Orthodox Church Outside Russia</span></a><span data-dcnode-id="6160" instrument_node=""> (ROCOR). The exiled Russian clergy's devotion and dedication to the Church was held up as an example by the churchpeople in Serbia.</span><sup class="reference" data-dcnode-id="6157" id="cite_ref-politikaprihv_22-0"><a data-dcnode-id="6158" href="#cite_note-politikaprihv-22"><span data-dcnode-id="6159" instrument_node="">[22]</span></a></sup><span data-dcnode-id="6156" instrument_node=""> The ROCOR's Head Metropolitan </span><a data-dcnode-id="6154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antony_%28Khrapovitsky%29" title="Antony (Khrapovitsky)"><span data-dcnode-id="6155" instrument_node="">Anthony Khrapovitsky</span></a><span data-dcnode-id="6153" instrument_node=""> was widely viewed as a spiritual leader of all the </span><a data-dcnode-id="6151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_%25C3%25A9migr%25C3%25A9" title="White émigré"><span data-dcnode-id="6152" instrument_node="">Russian émigrés</span></a><span data-dcnode-id="6150" instrument_node=""> until his death in 1936.</span><sup class="reference" data-dcnode-id="6147" id="cite_ref-23"><a data-dcnode-id="6148" href="#cite_note-23"><span data-dcnode-id="6149" instrument_node="">[23]</span></a></sup><span data-dcnode-id="6146" instrument_node="">  Patriarch </span><a data-dcnode-id="6144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Varnava%2C_Serbian_Patriarch" title="Varnava, Serbian Patriarch"><span data-dcnode-id="6145" instrument_node="">Varnava</span></a><span data-dcnode-id="6143" instrument_node=""> of Serbia (1930–1937) came to be a staunch defender and advocate of the Russian exiles in Yugoslavia and exerted constant pressure on the Royal Court and government to forestall any </span><a data-dcnode-id="6141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rapprochement" title="Rapprochement"><span data-dcnode-id="6142" instrument_node="">rapprochement</span></a><span data-dcnode-id="6140" instrument_node=""> and establishment of diplomatic relations between Yugoslavia and the USSR.</span><sup class="reference" data-dcnode-id="6137" id="cite_ref-politikauliga_24-0"><a data-dcnode-id="6138" href="#cite_note-politikauliga-24"><span data-dcnode-id="6139" instrument_node="">[24]</span></a></sup><span data-dcnode-id="6136" instrument_node=""> The Russian community in the Kingdom of Yugoslavia was effectively in a privileged position in a number of ways, as it enjoyed support and protection on the part of the </span><a data-dcnode-id="6134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kara%25C4%2591or%25C4%2591evi%25C4%2587_dynasty" title="Karađorđević dynasty"><span data-dcnode-id="6135" instrument_node="">Karađorđević dynasty</span></a><span data-dcnode-id="6133" instrument_node="">.</span><sup class="reference" data-dcnode-id="6130" id="cite_ref-25"><a data-dcnode-id="6131" href="#cite_note-25"><span data-dcnode-id="6132" instrument_node="">[25]</span></a></sup><span data-dcnode-id="6129" instrument_node="">
</span></p><p data-dcnode-id="6109"><span data-dcnode-id="6127" instrument_node="">The Russian military servicemen under the command of Gen </span><a data-dcnode-id="6125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pyotr_Wrangel" title="Pyotr Wrangel"><span data-dcnode-id="6126" instrument_node="">Pyotr Wrangel</span></a><span data-dcnode-id="6124" instrument_node=""> were partly enlisted into Yugoslavia's border guard troops and deployed on the country's south-eastern and later north-western border.</span><sup class="reference" data-dcnode-id="6121" id="cite_ref-politikaborder_26-0"><a data-dcnode-id="6122" href="#cite_note-politikaborder-26"><span data-dcnode-id="6123" instrument_node="">[26]</span></a></sup><span data-dcnode-id="6120" instrument_node=""> This service was terminated by a law passed in April 1922 that abolished the border guard troops; in 1923–1924 Wrangel's men were engaged in a contract to build a road between </span><a data-dcnode-id="6118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kraljevo" title="Kraljevo"><span data-dcnode-id="6119" instrument_node="">Kraljevo</span></a><span data-dcnode-id="6117" instrument_node=""> and </span><a data-dcnode-id="6115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ra%25C5%25A1ka%2C_Serbia" title="Raška, Serbia"><span data-dcnode-id="6116" instrument_node="">Raška</span></a><span data-dcnode-id="6114" instrument_node="">.</span><sup class="reference" data-dcnode-id="6111" id="cite_ref-politikaborder_26-1"><a data-dcnode-id="6112" href="#cite_note-politikaborder-26"><span data-dcnode-id="6113" instrument_node="">[26]</span></a></sup><span data-dcnode-id="6110" instrument_node="">
</span></p><span data-dcnode-id="6108" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6097"><div class="thumbinner" data-dcnode-id="6098" style="width:222px;"><a class="image" data-dcnode-id="6106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25D0%25A0%25D1%2583%25D1%2581%25D0%25BA%25D0%25B8_%25D0%25B4%25D0%25BE%25D0%25BC.JPG"><img alt="" class="thumbimage" data-dcnode-id="6107" data-file-height="2448" data-file-width="3264" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/78/%25D0%25A0%25D1%2583%25D1%2581%25D0%25BA%25D0%25B8_%25D0%25B4%25D0%25BE%25D0%25BC.JPG/220px-%25D0%25A0%25D1%2583%25D1%2581%25D0%25BA%25D0%25B8_%25D0%25B4%25D0%25BE%25D0%25BC.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/78/%D0%A0%D1%83%D1%81%D0%BA%D0%B8_%D0%B4%D0%BE%D0%BC.JPG/330px-%D0%A0%D1%83%D1%81%D0%BA%D0%B8_%D0%B4%D0%BE%D0%BC.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/78/%D0%A0%D1%83%D1%81%D0%BA%D0%B8_%D0%B4%D0%BE%D0%BC.JPG/440px-%D0%A0%D1%83%D1%81%D0%BA%D0%B8_%D0%B4%D0%BE%D0%BC.JPG 2x" width="220"></a><span data-dcnode-id="6105" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6099"><div class="magnify" data-dcnode-id="6103"><a class="internal" data-dcnode-id="6104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25D0%25A0%25D1%2583%25D1%2581%25D0%25BA%25D0%25B8_%25D0%25B4%25D0%25BE%25D0%25BC.JPG" title="Enlarge"></a></div><a data-dcnode-id="6101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Center_of_Science_and_Culture%2C_Belgrade" title="Russian Center of Science and Culture, Belgrade"><span data-dcnode-id="6102" instrument_node="">The Russian House</span></a><span data-dcnode-id="6100" instrument_node=""> was opened in Belgrade in 1933</span></div></div></div><span data-dcnode-id="6096" instrument_node="">
</span><p data-dcnode-id="6020"><span data-dcnode-id="6095" instrument_node="">At the </span><a data-dcnode-id="6093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genoa_Conference_%281922%29" title="Genoa Conference (1922)"><span data-dcnode-id="6094" instrument_node="">Genoa Conference</span></a><span data-dcnode-id="6092" instrument_node=""> in spring of 1922, there occurred a spat between Soviet Russia's delegation and that of the Kingdom of SHS over the absence of a delegation from Montenegro; a meeting between  </span><a data-dcnode-id="6090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georgy_Chicherin" title="Georgy Chicherin"><span data-dcnode-id="6091" instrument_node="">Georgy Chicherin</span></a><span data-dcnode-id="6089" instrument_node=""> and </span><a data-dcnode-id="6087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mom%25C4%258Dilo_Nin%25C4%258Di%25C4%2587" title="Momčilo Ninčić"><span data-dcnode-id="6088" instrument_node="">Momčilo Ninčić</span></a><span data-dcnode-id="6086" instrument_node=""> took place on the sidelines of the conference: the sides arrived at a pro forma agreement that the government of the Kingdom would prevent further activities of Russian émigrés in its territory.</span><sup class="reference" data-dcnode-id="6083" id="cite_ref-FOOTNOTEŠkiljan201418_18-1"><a data-dcnode-id="6084" href="#cite_note-FOOTNOTE%C5%A0kiljan201418-18"><span data-dcnode-id="6085" instrument_node="">[18]</span></a></sup><span data-dcnode-id="6082" instrument_node=""> Nevertheless, Russian émigré activity continued apace: multiple Russian military officers′ associations were set up in Yugoslavia, which in 1924 were united under an umbrella council headed by the seniormost Russian generals </span><a class="extiw" data-dcnode-id="6080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ru.wikipedia.org/wiki/%25D0%25AD%25D0%25BA%25D0%25BA%2C_%25D0%25AD%25D0%25B4%25D1%2583%25D0%25B0%25D1%2580%25D0%25B4_%25D0%2592%25D0%25BB%25D0%25B0%25D0%25B4%25D0%25B8%25D0%25BC%25D0%25B8%25D1%2580%25D0%25BE%25D0%25B2%25D0%25B8%25D1%2587" title="ru:Экк, Эдуард Владимирович"><span data-dcnode-id="6081" instrument_node="">Eduard Ekk</span></a><span data-dcnode-id="6079" instrument_node=""> and Georgiy Rozalion-Soshalsky.</span><sup class="reference" data-dcnode-id="6076" id="cite_ref-politikatajne_27-0"><a data-dcnode-id="6077" href="#cite_note-politikatajne-27"><span data-dcnode-id="6078" instrument_node="">[27]</span></a></sup><span data-dcnode-id="6075" instrument_node=""> In 1924, a cavalry brigade staffed completely by Wrangel's men was formed under the command of Russian Gen </span><a data-dcnode-id="6073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sergei_Ulagay" title="Sergei Ulagay"><span data-dcnode-id="6074" instrument_node="">Sergei Ulagay</span></a><span data-dcnode-id="6072" instrument_node=""> in order to overthrow </span><a data-dcnode-id="6070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Principality_of_Albania" title="Principality of Albania"><span data-dcnode-id="6071" instrument_node="">Albania</span></a><span data-dcnode-id="6069" instrument_node="">′s pro-Soviet Orthodox leader </span><a class="mw-redirect" data-dcnode-id="6067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fan_S._Noli" title="Fan S. Noli"><span data-dcnode-id="6068" instrument_node="">Fan Noli</span></a><span data-dcnode-id="6066" instrument_node="">, who had </span><a class="mw-redirect" data-dcnode-id="6064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/June_Revolution" title="June Revolution"><span data-dcnode-id="6065" instrument_node="">seized power</span></a><span data-dcnode-id="6063" instrument_node=""> in June that year, and re-install Muslim </span><a data-dcnode-id="6061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zog_I_of_Albania" title="Zog I of Albania"><span data-dcnode-id="6062" instrument_node="">Ahmet Zogu</span></a><span data-dcnode-id="6060" instrument_node="">, which was carried out in December that year.</span><sup class="reference" data-dcnode-id="6057" id="cite_ref-politikaborder_26-2"><a data-dcnode-id="6058" href="#cite_note-politikaborder-26"><span data-dcnode-id="6059" instrument_node="">[26]</span></a></sup><span data-dcnode-id="6056" instrument_node=""> On 1 September 1924, Gen </span><a data-dcnode-id="6054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pyotr_Wrangel" title="Pyotr Wrangel"><span data-dcnode-id="6055" instrument_node="">Pyotr Wrangel</span></a><span data-dcnode-id="6053" instrument_node=""> founded the </span><a data-dcnode-id="6051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_All-Military_Union" title="Russian All-Military Union"><span data-dcnode-id="6052" instrument_node="">Russian All-Military Union</span></a><span data-dcnode-id="6050" instrument_node=""> (ROVS), until 1927 headquartered in </span><a data-dcnode-id="6048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sremski_Karlovci" title="Sremski Karlovci"><span data-dcnode-id="6049" instrument_node="">Karlovci</span></a><span data-dcnode-id="6047" instrument_node="">, a global organisation designed to unite all Russian military officers outside Russia.</span><sup class="reference" data-dcnode-id="6044" id="cite_ref-politikarovs_28-0"><a data-dcnode-id="6045" href="#cite_note-politikarovs-28"><span data-dcnode-id="6046" instrument_node="">[28]</span></a></sup><span data-dcnode-id="6043" instrument_node=""> According to the data contained in the declassified </span><a class="mw-redirect" data-dcnode-id="6041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_Security_Administration" title="State Security Administration"><span data-dcnode-id="6042" instrument_node="">UDBA</span></a><span data-dcnode-id="6040" instrument_node=""> study compiled in 1955,</span><sup class="reference" data-dcnode-id="6037" id="cite_ref-29"><a data-dcnode-id="6038" href="#cite_note-29"><span data-dcnode-id="6039" instrument_node="">[29]</span></a></sup><span data-dcnode-id="6036" instrument_node=""> in 1934 ROVS's  membership in Yugoslavia totaled 25.000 people.</span><sup class="reference" data-dcnode-id="6033" id="cite_ref-politikaavtorit_30-0"><a data-dcnode-id="6034" href="#cite_note-politikaavtorit-30"><span data-dcnode-id="6035" instrument_node="">[30]</span></a></sup><span data-dcnode-id="6032" instrument_node=""> Department IV of ROVS (Yugoslavia) was established with headquarters in Belgrade, Gen Eduard Ekk heading it until 1933.</span><sup class="reference" data-dcnode-id="6029" id="cite_ref-politikarovsimao_31-0"><a data-dcnode-id="6030" href="#cite_note-politikarovsimao-31"><span data-dcnode-id="6031" instrument_node="">[31]</span></a></sup><span data-dcnode-id="6028" instrument_node=""> Department IV was in constant liaison with Yugoslavia's </span><a data-dcnode-id="6026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Defence_%28Yugoslavia%29" title="Ministry of Defence (Yugoslavia)"><span data-dcnode-id="6027" instrument_node="">Ministry of the Army and Navy</span></a><span data-dcnode-id="6025" instrument_node="">.</span><sup class="reference" data-dcnode-id="6022" id="cite_ref-politikarovsimao_31-1"><a data-dcnode-id="6023" href="#cite_note-politikarovsimao-31"><span data-dcnode-id="6024" instrument_node="">[31]</span></a></sup><span data-dcnode-id="6021" instrument_node="">
</span></p><p data-dcnode-id="6011"><span data-dcnode-id="6019" instrument_node="">The USSR's intelligence agencies were undertaking efforts to recruit agents in Yugoslavia from the early 1930s, including from among the White emigres such as </span><a class="extiw" data-dcnode-id="6017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ru.wikipedia.org/wiki/%25D0%259B%25D0%25B8%25D0%25BD%25D0%25B8%25D1%2586%25D0%25BA%25D0%25B8%25D0%25B9%2C_%25D0%259B%25D0%25B5%25D0%25BE%25D0%25BD%25D0%25B8%25D0%25B4_%25D0%259B%25D0%25B5%25D0%25BE%25D0%25BD%25D0%25B8%25D0%25B4%25D0%25BE%25D0%25B2%25D0%25B8%25D1%2587" title="ru:Линицкий, Леонид Леонидович"><span data-dcnode-id="6018" instrument_node="">Leonid Linitsky</span></a><span data-dcnode-id="6016" instrument_node="">, who was exposed and arrested by the Yugoslavian police in 1935.</span><sup class="reference" data-dcnode-id="6013" id="cite_ref-timofeev18_32-0"><a data-dcnode-id="6014" href="#cite_note-timofeev18-32"><span data-dcnode-id="6015" instrument_node="">[32]</span></a></sup><span data-dcnode-id="6012" instrument_node="">
</span></p><p data-dcnode-id="5981"><span data-dcnode-id="6010" instrument_node="">In 1938, the Soviet government sponsored a planned </span><a data-dcnode-id="6008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coup_d%27%25C3%25A9tat" title="Coup d'état"><span data-dcnode-id="6009" instrument_node="">coup d'état</span></a><span data-dcnode-id="6007" instrument_node=""> designed to remove the </span><a data-dcnode-id="6005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milan_Stojadinovi%25C4%2587" title="Milan Stojadinović"><span data-dcnode-id="6006" instrument_node="">Stojadinović</span></a><span data-dcnode-id="6004" instrument_node=""> government, which was resented by </span><a data-dcnode-id="6002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edvard_Bene%25C5%25A1" title="Edvard Beneš"><span data-dcnode-id="6003" instrument_node="">Edvard Beneš</span></a><span data-dcnode-id="6001" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="5999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_Presidents_of_Czechoslovakia" title="List of Presidents of Czechoslovakia"><span data-dcnode-id="6000" instrument_node="">president</span></a><span data-dcnode-id="5998" instrument_node=""> of </span><a data-dcnode-id="5996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Czechoslovakia" title="Czechoslovakia"><span data-dcnode-id="5997" instrument_node="">Czechoslovakia</span></a><span data-dcnode-id="5995" instrument_node="">, and establish an anti-German military regime: Soviet intelligence officer </span><a class="extiw" data-dcnode-id="5993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ru.wikipedia.org/wiki/%25D0%2597%25D1%2583%25D0%25B1%25D0%25BE%25D0%25B2%2C_%25D0%259F%25D1%2591%25D1%2582%25D1%2580_%25D0%25AF%25D0%25BA%25D0%25BE%25D0%25B2%25D0%25BB%25D0%25B5%25D0%25B2%25D0%25B8%25D1%2587" title="ru:Зубов, Пётр Яковлевич"><span data-dcnode-id="5994" instrument_node="">Pyotr Zubov</span></a><span data-dcnode-id="5992" instrument_node=""> was given $200,000 in cash meant for the Serbian military officers selected by Czechs to execute the coup; the plan failed, as Zubov, after judging the Serbian officers to be unfit for the mission, refused to make advance payment.</span><sup class="reference" data-dcnode-id="5989" id="cite_ref-FOOTNOTESudoplatov199463_33-0"><a data-dcnode-id="5990" href="#cite_note-FOOTNOTESudoplatov199463-33"><span data-dcnode-id="5991" instrument_node="">[33]</span></a></sup><sup class="reference" data-dcnode-id="5986" id="cite_ref-34"><a data-dcnode-id="5987" href="#cite_note-34"><span data-dcnode-id="5988" instrument_node="">[34]</span></a></sup><sup class="reference" data-dcnode-id="5983" id="cite_ref-35"><a data-dcnode-id="5984" href="#cite_note-35"><span data-dcnode-id="5985" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5982" instrument_node="">
</span></p><span data-dcnode-id="5980" instrument_node="">
</span><h3 data-dcnode-id="5969"><span data-dcnode-id="5979" id="Soviet_influence.2C_World_War_II"></span><span class="mw-headline" data-dcnode-id="5977" id="Soviet_influence,_World_War_II"><span data-dcnode-id="5978" instrument_node="">Soviet influence, World War II</span></span><span class="mw-editsection" data-dcnode-id="5970"><span class="mw-editsection-bracket" data-dcnode-id="5975"><span data-dcnode-id="5976" instrument_node="">[</span></span><a data-dcnode-id="5973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRussia%25E2%2580%2593Serbia_relations%26action%3Dedit%26section%3D7" title="Edit section: Soviet influence, World War II"><span data-dcnode-id="5974" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5971"><span data-dcnode-id="5972" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5968" instrument_node="">
</span><link data-dcnode-id="5967" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5954" role="note"><span data-dcnode-id="5966" instrument_node="">See also: </span><a data-dcnode-id="5964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yugoslav_coup_d%27%25C3%25A9tat" title="Yugoslav coup d'état"><span data-dcnode-id="5965" instrument_node="">Yugoslav coup d'état</span></a><span data-dcnode-id="5963" instrument_node="">, </span><a data-dcnode-id="5961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yugoslav_accession_to_the_Tripartite_Pact" title="Yugoslav accession to the Tripartite Pact"><span data-dcnode-id="5962" instrument_node="">Yugoslav accession to the Tripartite Pact</span></a><span data-dcnode-id="5960" instrument_node="">, </span><a data-dcnode-id="5958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Protective_Corps" title="Russian Protective Corps"><span data-dcnode-id="5959" instrument_node="">Russian Protective Corps</span></a><span data-dcnode-id="5957" instrument_node="">, and </span><a data-dcnode-id="5955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II_in_Yugoslavia" title="World War II in Yugoslavia"><span data-dcnode-id="5956" instrument_node="">World War II in Yugoslavia</span></a></div><span data-dcnode-id="5953" instrument_node="">
</span><p data-dcnode-id="5920"><span data-dcnode-id="5952" instrument_node="">While Yugoslavia remained a monarchy, </span><a class="mw-redirect" data-dcnode-id="5950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist" title="Communist"><span data-dcnode-id="5951" instrument_node="">Communist</span></a><span data-dcnode-id="5949" instrument_node=""> elements in Yugoslavia retained some influence in the </span><a class="mw-redirect" data-dcnode-id="5947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yugoslav_Parliament" title="Yugoslav Parliament"><span data-dcnode-id="5948" instrument_node="">National Assembly</span></a><span data-dcnode-id="5946" instrument_node=""> (in December 1920, the government </span><a class="extiw" data-dcnode-id="5944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sh.wikipedia.org/wiki/Obznana" title="sh:Obznana"><span data-dcnode-id="5945" instrument_node="">prohibited</span></a><span data-dcnode-id="5943" instrument_node=""> all </span><a data-dcnode-id="5941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/League_of_Communists_of_Yugoslavia" title="League of Communists of Yugoslavia"><span data-dcnode-id="5942" instrument_node="">Communist</span></a><span data-dcnode-id="5940" instrument_node=""> activities). Relations between Yugoslavian Communists and the officials of the </span><a data-dcnode-id="5938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="5939" instrument_node="">Soviet Union</span></a><span data-dcnode-id="5937" instrument_node=""> were developed. Initial relations, however, remained tense. In 1937, for example, Stalin had the Secretary-General of the </span><a data-dcnode-id="5935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/League_of_Communists_of_Yugoslavia" title="League of Communists of Yugoslavia"><span data-dcnode-id="5936" instrument_node="">League of Communists of Yugoslavia</span></a><span data-dcnode-id="5934" instrument_node="">, </span><a data-dcnode-id="5932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milan_Gorki%25C4%2587" title="Milan Gorkić"><span data-dcnode-id="5933" instrument_node="">Milan Gorkić</span></a><span data-dcnode-id="5931" instrument_node="">, murdered in </span><a data-dcnode-id="5929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moscow" title="Moscow"><span data-dcnode-id="5930" instrument_node="">Moscow</span></a><span data-dcnode-id="5928" instrument_node=""> during the </span><a data-dcnode-id="5926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Purge" title="Great Purge"><span data-dcnode-id="5927" instrument_node="">Great Purge</span></a><span data-dcnode-id="5925" instrument_node="">.</span><sup class="reference" data-dcnode-id="5922" id="cite_ref-36"><a data-dcnode-id="5923" href="#cite_note-36"><span data-dcnode-id="5924" instrument_node="">[36]</span></a></sup><span data-dcnode-id="5921" instrument_node="">
</span></p><span data-dcnode-id="5919" instrument_node="">

-dcnode-id="5911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/3rd_Ukrainian_Front" title="3rd Ukrainian Front"><span data-dcnode-id="5912" instrument_node="">3rd Ukrainian Front</span></a><span data-dcnode-id="5910" instrument_node=""> (</span><a data-dcnode-id="5908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Army" title="Red Army"><span data-dcnode-id="5909" instrument_node="">Red Army</span></a><span data-dcnode-id="5907" instrument_node="">) during the </span><a class="mw-redirect" data-dcnode-id="5905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belgrade_Offensive" title="Belgrade Offensive"><span data-dcnode-id="5906" instrument_node="">Belgrade Offensive</span></a><span data-dcnode-id="5904" instrument_node=""> (1944)</span></div></div></div><span data-dcnode-id="5900" instrument_node="">
</span><p data-dcnode-id="5891"><span data-dcnode-id="5899" instrument_node="">At the end of June 1940, the first Soviet ambassador (″polpred″, i.e. plenipotentiary representative) to Yugoslavia, </span><a class="extiw" data-dcnode-id="5897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ru.wikipedia.org/wiki/%25D0%259F%25D0%25BB%25D0%25BE%25D1%2582%25D0%25BD%25D0%25B8%25D0%25BA%25D0%25BE%25D0%25B2%2C_%25D0%2592%25D0%25B8%25D0%25BA%25D1%2582%25D0%25BE%25D1%2580_%25D0%2590%25D0%25BD%25D0%25B4%25D1%2580%25D0%25B5%25D0%25B5%25D0%25B2%25D0%25B8%25D1%2587" title="ru:Плотников, Виктор Андреевич"><span data-dcnode-id="5898" instrument_node="">Viktor Plotnikov</span></a><span data-dcnode-id="5896" instrument_node="">, was appointed.</span><sup class="reference" data-dcnode-id="5893" id="cite_ref-37"><a data-dcnode-id="5894" href="#cite_note-37"><span data-dcnode-id="5895" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5892" instrument_node="">
</span></p><p data-dcnode-id="5853"><span data-dcnode-id="5890" instrument_node="">The </span><a data-dcnode-id="5888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yugoslav_coup_d%27%25C3%25A9tat" title="Yugoslav coup d'état"><span data-dcnode-id="5889" instrument_node="">March 1941 coup d'état</span></a><span data-dcnode-id="5887" instrument_node=""> against the pro-German government of Yugoslavia, while primarily backed by the UK government, was also actively supported by Soviet intelligence agencies, </span><a data-dcnode-id="5885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GRU" title="GRU"><span data-dcnode-id="5886" instrument_node="">GRU</span></a><span data-dcnode-id="5884" instrument_node=""> and </span><a data-dcnode-id="5882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NKVD" title="NKVD"><span data-dcnode-id="5883" instrument_node="">NKVD</span></a><span data-dcnode-id="5881" instrument_node="">, following </span><a class="mw-redirect" data-dcnode-id="5879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stalin" title="Stalin"><span data-dcnode-id="5880" instrument_node="">Stalin</span></a><span data-dcnode-id="5878" instrument_node="">′s instructions, with a view to strengthening the USSR's strategic position in the Balkans.</span><sup class="reference" data-dcnode-id="5875" id="cite_ref-FOOTNOTESudoplatov1994118–119_38-0"><a data-dcnode-id="5876" href="#cite_note-FOOTNOTESudoplatov1994118%E2%80%93119-38"><span data-dcnode-id="5877" instrument_node="">[38]</span></a></sup><span data-dcnode-id="5874" instrument_node=""> On 5 April 1941, the new government of Yugoslavia and the USSR signed the </span><a class="new" data-dcnode-id="5872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet%25E2%2580%2593Yugoslav_Non-Aggression_Pact%26action%3Dedit%26redlink%3D1" title="Soviet–Yugoslav Non-Aggression Pact (page does not exist)"><span data-dcnode-id="5873" instrument_node="">Treaty of Friendship and Non-Aggression</span></a><span data-dcnode-id="5871" instrument_node="">,</span><sup class="reference" data-dcnode-id="5868" id="cite_ref-39"><a data-dcnode-id="5869" href="#cite_note-39"><span data-dcnode-id="5870" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5867" instrument_node=""> which did not commit the parties to military assistance in case of aggression.</span><sup class="reference" data-dcnode-id="5864" id="cite_ref-40"><a data-dcnode-id="5865" href="#cite_note-40"><span data-dcnode-id="5866" instrument_node="">[40]</span></a></sup><sup class="reference" data-dcnode-id="5861" id="cite_ref-41"><a data-dcnode-id="5862" href="#cite_note-41"><span data-dcnode-id="5863" instrument_node="">[41]</span></a></sup><sup class="reference" data-dcnode-id="5858" id="cite_ref-42"><a data-dcnode-id="5859" href="#cite_note-42"><span data-dcnode-id="5860" instrument_node="">[42]</span></a></sup><sup class="reference" data-dcnode-id="5855" id="cite_ref-43"><a data-dcnode-id="5856" href="#cite_note-43"><span data-dcnode-id="5857" instrument_node="">[43]</span></a></sup><span data-dcnode-id="5854" instrument_node="">
</span></p><p data-dcnode-id="5841"><span data-dcnode-id="5852" instrument_node="">According to Soviet General </span><a data-dcnode-id="5850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pavel_Sudoplatov" title="Pavel Sudoplatov"><span data-dcnode-id="5851" instrument_node="">Pavel Sudoplatov</span></a><span data-dcnode-id="5849" instrument_node="">, the Soviet leadership was shocked by an instant defeat of Yugoslavia in April 1941, after Hitler </span><a data-dcnode-id="5847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Invasion_of_Yugoslavia" title="Invasion of Yugoslavia"><span data-dcnode-id="5848" instrument_node="">reacted</span></a><span data-dcnode-id="5846" instrument_node=""> to the coup ″promptly and effectively″.</span><sup class="reference" data-dcnode-id="5843" id="cite_ref-FOOTNOTESudoplatov1994119_44-0"><a data-dcnode-id="5844" href="#cite_note-FOOTNOTESudoplatov1994119-44"><span data-dcnode-id="5845" instrument_node="">[44]</span></a></sup><span data-dcnode-id="5842" instrument_node="">
</span></p><p data-dcnode-id="5835"><span data-dcnode-id="5840" instrument_node="">The USSR formally severed relations with Yugoslavia on 8 May 1941, but in practice yet before that.</span><sup class="reference" data-dcnode-id="5837" id="cite_ref-timofeev18_32-1"><a data-dcnode-id="5838" href="#cite_note-timofeev18-32"><span data-dcnode-id="5839" instrument_node="">[32]</span></a></sup><span data-dcnode-id="5836" instrument_node="">
</span></p><p data-dcnode-id="5821"><span data-dcnode-id="5834" instrument_node="">After Germany </span><a data-dcnode-id="5832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Barbarossa" title="Operation Barbarossa"><span data-dcnode-id="5833" instrument_node="">attacked</span></a><span data-dcnode-id="5831" instrument_node=""> the Soviet Union on 22 June 1941, the USSR began to assist the military campaign of </span><a data-dcnode-id="5829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yugoslav_Partisans" title="Yugoslav Partisans"><span data-dcnode-id="5830" instrument_node="">Communist partisans</span></a><span data-dcnode-id="5828" instrument_node=""> led by </span><a data-dcnode-id="5826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Josip_Broz_Tito" title="Josip Broz Tito"><span data-dcnode-id="5827" instrument_node="">Tito</span></a><span data-dcnode-id="5825" instrument_node="">; and from the autumn of 1944 regular Red Army troops directly participated in battles in cooperation with the Partisans, especially in the territories of present-day Serbia. The most notable of these battles in which Soviet soldiers fought in Serbian territories was the </span><a class="mw-redirect" data-dcnode-id="5823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belgrade_Offensive" title="Belgrade Offensive"><span data-dcnode-id="5824" instrument_node="">Belgrade Offensive</span></a><span data-dcnode-id="5822" instrument_node="">.
</span></p><p data-dcnode-id="5803"><span data-dcnode-id="5820" instrument_node="">The ROVS′ Department IV (Yugoslavia) was the only regional branch of the </span><a data-dcnode-id="5818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_All-Military_Union" title="Russian All-Military Union"><span data-dcnode-id="5819" instrument_node="">Russian All-Military Union</span></a><span data-dcnode-id="5817" instrument_node=""> that made a decision to side with Germany against the USSR and ROVS participated in forming the </span><a data-dcnode-id="5815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Protective_Corps" title="Russian Protective Corps"><span data-dcnode-id="5816" instrument_node="">Russian Protective Corps</span></a><span data-dcnode-id="5814" instrument_node=""> (</span><a data-dcnode-id="5812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_language" title="German language"><span data-dcnode-id="5813" instrument_node="">German</span></a><span data-dcnode-id="5811" instrument_node="">: </span><i data-dcnode-id="5809" lang="de"><span data-dcnode-id="5810" instrument_node="">Russisches Schutzkorps Serbien</span></i><span data-dcnode-id="5808" instrument_node="">) that was established in Serbia in September 1941.</span><sup class="reference" data-dcnode-id="5805" id="cite_ref-politikatainih_45-0"><a data-dcnode-id="5806" href="#cite_note-politikatainih-45"><span data-dcnode-id="5807" instrument_node="">[45]</span></a></sup><span data-dcnode-id="5804" instrument_node=""> The Russian Corps was engaged in guarding important sites and also combating the Communist partisans led by Tito.
</span></p><span data-dcnode-id="5802" instrument_node="">
</span><h3 data-dcnode-id="5792"><span class="mw-headline" data-dcnode-id="5800" id="Socialist_Yugoslavia_and_USSR"><span data-dcnode-id="5801" instrument_node="">Socialist Yugoslavia and USSR</span></span><span class="mw-editsection" data-dcnode-id="5793"><span class="mw-editsection-bracket" data-dcnode-id="5798"><span data-dcnode-id="5799" instrument_node="">[</span></span><a data-dcnode-id="5796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRussia%25E2%2580%2593Serbia_relations%26action%3Dedit%26section%3D8" title="Edit section: Socialist Yugoslavia and USSR"><span data-dcnode-id="5797" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5794"><span data-dcnode-id="5795" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5791" instrument_node="">
</span><link data-dcnode-id="5790" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5780" role="note"><span data-dcnode-id="5789" instrument_node="">Main articles: </span><a data-dcnode-id="5787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Informbiro_period" title="Informbiro period"><span data-dcnode-id="5788" instrument_node="">Informbiro period</span></a><span data-dcnode-id="5786" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tito%25E2%2580%2593Stalin_Split" title="Tito–Stalin Split"><span data-dcnode-id="5785" instrument_node="">Tito–Stalin Split</span></a><span data-dcnode-id="5783" instrument_node="">, and </span><a data-dcnode-id="5781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union%25E2%2580%2593Yugoslavia_relations" title="Soviet Union–Yugoslavia relations"><span data-dcnode-id="5782" instrument_node="">Soviet Union–Yugoslavia relations</span></a></div><span data-dcnode-id="5779" instrument_node="">

</span><p data-dcnode-id="5766"><a data-dcnode-id="5768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="5769" instrument_node="">USSR</span></a><span data-dcnode-id="5767" instrument_node=""> (1922–1991)

</span><p data-dcnode-id="5714"><span data-dcnode-id="5743" instrument_node="">After the war ended in May 1945, King </span><a data-dcnode-id="5741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_II_of_Yugoslavia" title="Peter II of Yugoslavia"><span data-dcnode-id="5742" instrument_node="">Peter II</span></a><span data-dcnode-id="5740" instrument_node=""> was not allowed to return to Yugoslavia; in November 1945 he was formally deposed by Yugoslavia's Communist </span><a class="mw-redirect" data-dcnode-id="5738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constituent_Assembly" title="Constituent Assembly"><span data-dcnode-id="5739" instrument_node="">Constituent Assembly</span></a><span data-dcnode-id="5737" instrument_node=""> with the state reorganised as a republic and renamed </span><i data-dcnode-id="5734"><a data-dcnode-id="5735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_Federal_Republic_of_Yugoslavia" title="Socialist Federal Republic of Yugoslavia"><span data-dcnode-id="5736" instrument_node="">Federal People's Republic of Yugoslavia</span></a></i><span data-dcnode-id="5733" instrument_node=""> (FPR Yugoslavia or FPRY; from 1963 </span><i data-dcnode-id="5731"><span data-dcnode-id="5732" instrument_node="">Socialist Federal Republic of Yugoslavia</span></i><span data-dcnode-id="5730" instrument_node="">, or SFRY). Initially, Yugoslavia's Communist regime under </span><a data-dcnode-id="5728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Josip_Broz_Tito" title="Josip Broz Tito"><span data-dcnode-id="5729" instrument_node="">Josip Broz Tito</span></a><span data-dcnode-id="5727" instrument_node=""> was loyal to </span><a data-dcnode-id="5725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Stalin" title="Joseph Stalin"><span data-dcnode-id="5726" instrument_node="">Joseph Stalin</span></a><span data-dcnode-id="5724" instrument_node="">′s Kremlin. The latter wanted Yugoslavia to become a member of the USSR-led block of Communist countries. However, Tito eventually rejected Stalin's pressure and in 1950s became one of the founders of the </span><a data-dcnode-id="5722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-Aligned_Movement" title="Non-Aligned Movement"><span data-dcnode-id="5723" instrument_node="">Non-Aligned Movement</span></a><span data-dcnode-id="5721" instrument_node="">, which was regarded as the third way, neither adhering to the U.S.-led </span><a data-dcnode-id="5719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="5720" instrument_node="">NATO</span></a><span data-dcnode-id="5718" instrument_node="">, nor joining the Moscow-dominated </span><a data-dcnode-id="5716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw_Pact" title="Warsaw Pact"><span data-dcnode-id="5717" instrument_node="">Warsaw Pact</span></a><span data-dcnode-id="5715" instrument_node="">.
</span></p><p data-dcnode-id="5708"><span data-dcnode-id="5713" instrument_node="">As early as on 11 April 1945, the USSR concluded a friendship treaty with Josip Tito, who put signature on behalf of the Regent Council of Yugoslavia.</span><sup class="reference" data-dcnode-id="5710" id="cite_ref-46"><a data-dcnode-id="5711" href="#cite_note-46"><span data-dcnode-id="5712" instrument_node="">[46]</span></a></sup><span data-dcnode-id="5709" instrument_node="">
</span></p><span data-dcnode-id="5707" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5685"><div class="thumbinner" data-dcnode-id="5686" style="width:222px;"><a class="image" data-dcnode-id="5705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APolitika_30_jun_1948.JPG"><img alt="" class="thumbimage" data-dcnode-id="5706" data-file-height="2048" data-file-width="1536" decoding="async" height="293" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f9/Politika_30_jun_1948.JPG/220px-Politika_30_jun_1948.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f9/Politika_30_jun_1948.JPG/330px-Politika_30_jun_1948.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f9/Politika_30_jun_1948.JPG/440px-Politika_30_jun_1948.JPG 2x" width="220"></a><span data-dcnode-id="5704" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5687"><div class="magnify" data-dcnode-id="5702"><a class="internal" data-dcnode-id="5703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APolitika_30_jun_1948.JPG" title="Enlarge"></a></div><span data-dcnode-id="5701" instrument_node="">The </span><a data-dcnode-id="5699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/League_of_Communists_of_Yugoslavia" title="League of Communists of Yugoslavia"><span data-dcnode-id="5700" instrument_node="">Yugoslav Communist Party</span></a><span data-dcnode-id="5698" instrument_node="">'s response in the </span><i data-dcnode-id="5695"><a data-dcnode-id="5696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Politika" title="Politika"><span data-dcnode-id="5697" instrument_node="">Politika</span></a></i><span data-dcnode-id="5694" instrument_node=""> to the </span><a data-dcnode-id="5692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tito%25E2%2580%2593Stalin_split" title="Tito–Stalin split"><span data-dcnode-id="5693" instrument_node="">SFR Yugoslavia's expulsion</span></a><span data-dcnode-id="5691" instrument_node=""> from the </span><a data-dcnode-id="5689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cominform" title="Cominform"><span data-dcnode-id="5690" instrument_node="">Cominform</span></a><span data-dcnode-id="5688" instrument_node=""> (1948)</span></div></div></div><span data-dcnode-id="5684" instrument_node="">
</span><p data-dcnode-id="5643"><span data-dcnode-id="5683" instrument_node="">In the first two years following the war, relations between FPRY and the Soviet leadership, which during that period sought to accommodate the USSR's Western </span><a data-dcnode-id="5681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allies_of_World_War_II" title="Allies of World War II"><span data-dcnode-id="5682" instrument_node="">allies</span></a><span data-dcnode-id="5680" instrument_node=""> demands in Europe, were not entirely free of disagreements on a number of issues, such as Yugoslavia's territorial claims to Italy's </span><a data-dcnode-id="5678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_Territory_of_Trieste" title="Free Territory of Trieste"><span data-dcnode-id="5679" instrument_node="">Free Territory of Trieste</span></a><span data-dcnode-id="5677" instrument_node=""> and the part of Austria's </span><a data-dcnode-id="5675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carinthia" title="Carinthia"><span data-dcnode-id="5676" instrument_node="">Carinthia</span></a><span data-dcnode-id="5674" instrument_node=""> populated by </span><a data-dcnode-id="5672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carinthian_Slovenes" title="Carinthian Slovenes"><span data-dcnode-id="5673" instrument_node="">Carinthian Slovenes</span></a><span data-dcnode-id="5671" instrument_node="">, Tito's efforts to play a leading role in the entire Balkans region, as well as over Stalin's reluctance to decisively support the </span><a data-dcnode-id="5669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Party_of_Greece" title="Communist Party of Greece"><span data-dcnode-id="5670" instrument_node="">Greek Communists</span></a><span data-dcnode-id="5668" instrument_node=""> in the </span><a data-dcnode-id="5666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greek_Civil_War" title="Greek Civil War"><span data-dcnode-id="5667" instrument_node="">Greek Civil War</span></a><span data-dcnode-id="5665" instrument_node="">, who were actively supported by Yugoslavia, Bulgaria, and Albania.</span><sup class="reference" data-dcnode-id="5662" id="cite_ref-47"><a data-dcnode-id="5663" href="#cite_note-47"><span data-dcnode-id="5664" instrument_node="">[47]</span></a></sup><sup class="reference" data-dcnode-id="5659" id="cite_ref-48"><a data-dcnode-id="5660" href="#cite_note-48"><span data-dcnode-id="5661" instrument_node="">[48]</span></a></sup><span data-dcnode-id="5658" instrument_node=""> Drastic deterioration in relations occurred in early 1948. In June 1948, Tito did not attend the second conference of the </span><a data-dcnode-id="5656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cominform" title="Cominform"><span data-dcnode-id="5657" instrument_node="">Cominform</span></a><span data-dcnode-id="5655" instrument_node="">, which was established on the initiative of the USSR in September 1947 as a coordinating body for Communist parties in the USSR, Bulgaria, Hungary, Poland, Italy, France, Czechoslovakia, Romania, and Yugoslavia. The conference, on the motion of the VKP(B), was mostly dedicated to the discussion of the situation in the Communist Party of Yugoslavia. On 28 June 1948, the other member countries adopted a resolution that noted that ″recently the leadership of the Communist Party of Yugoslavia had pursued an incorrect line on the main questions of home and foreign policy, a line which represents a departure from </span><a class="mw-redirect" data-dcnode-id="5653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxism-Leninism" title="Marxism-Leninism"><span data-dcnode-id="5654" instrument_node="">Marxism-Leninism</span></a><span data-dcnode-id="5652" instrument_node="">″; the resolution concluded by stating, ″the Central Committee of the Communist Party of Yugoslavia has placed itself and the Yugoslav Party outside the family of the fraternal Communist Parties, outside the united Communist front and consequently outside the ranks of the Information Bureau.″</span><sup class="reference" data-dcnode-id="5649" id="cite_ref-49"><a data-dcnode-id="5650" href="#cite_note-49"><span data-dcnode-id="5651" instrument_node="">[49]</span></a></sup><span data-dcnode-id="5648" instrument_node=""> The assumption in Moscow was that once it was known that he had lost Soviet approval, Tito would collapse. The expulsion effectively banished Yugoslavia from the international association of socialist states, while other socialist states of Eastern Europe subsequently underwent purges of alleged "Titoists". Stalin took the matter personally and attempted, unsuccessfully, to assassinate Tito on several occasions.</span><sup class="reference" data-dcnode-id="5645" id="cite_ref-50"><a data-dcnode-id="5646" href="#cite_note-50"><span data-dcnode-id="5647" instrument_node="">[50]</span></a></sup><span data-dcnode-id="5644" instrument_node="">
</span></p><p data-dcnode-id="5619"><span data-dcnode-id="5642" instrument_node="">The following year, the crisis nearly escalated into an armed conflict, as Hungarian and Soviet forces were massing on the northern Yugoslav frontier.</span><sup class="reference" data-dcnode-id="5639" id="cite_ref-51"><a data-dcnode-id="5640" href="#cite_note-51"><span data-dcnode-id="5641" instrument_node="">[51]</span></a></sup><span data-dcnode-id="5638" instrument_node=""> In May 1949, the Ministry of foreign affairs of Yugoslavia formally protested against the support rendered by the USSR to a group of Yugoslav citizens who had formed a committee in Moscow in early April to promote ″unfriendly activity against the FPRY" (the ministry's </span><a class="mw-redirect" data-dcnode-id="5636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Note_verbale" title="Note verbale"><span data-dcnode-id="5637" instrument_node="">note</span></a><span data-dcnode-id="5635" instrument_node=""> of 23 May 1949).</span><sup class="reference" data-dcnode-id="5632" id="cite_ref-FOOTNOTEDedijer1980171–172_52-0"><a data-dcnode-id="5633" href="#cite_note-FOOTNOTEDedijer1980171%E2%80%93172-52"><span data-dcnode-id="5634" instrument_node="">[52]</span></a></sup><span data-dcnode-id="5631" instrument_node=""> The Soviet response dated 31 May 1949 asserted the USSR's right to offer asylum to "Yugoslav revolutionary emigrants″ and stated that Yugoslavia′s government ″had forfeited the right to expect a friendly attitude″ from the USSR, as it had established an ″anti-Communist and anti-democratic terrorist regime″ in Yugoslavia and was fighting against the Soviet Union.</span><sup class="reference" data-dcnode-id="5628" id="cite_ref-FOOTNOTEDedijer1980175_53-0"><a data-dcnode-id="5629" href="#cite_note-FOOTNOTEDedijer1980175-53"><span data-dcnode-id="5630" instrument_node="">[53]</span></a></sup><span data-dcnode-id="5627" instrument_node=""> On 19 November 1949, the Kominform adopted another resolution on the Communist Party of Yugoslavia, which stated that the CPY had been hijacked by a group of ″murderers and spies" and declared that fighting against the "Tito gang" was a duty of all communist and workers′ parties.</span><sup class="reference" data-dcnode-id="5624" id="cite_ref-FOOTNOTEEnciklopedija_Jugoslavije1968487_54-0"><a data-dcnode-id="5625" href="#cite_note-FOOTNOTEEnciklopedija_Jugoslavije1968487-54"><span data-dcnode-id="5626" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="5621" id="cite_ref-55"><a data-dcnode-id="5622" href="#cite_note-55"><span data-dcnode-id="5623" instrument_node="">[55]</span></a></sup><span data-dcnode-id="5620" instrument_node="">
</span></p><p data-dcnode-id="5604"><span data-dcnode-id="5618" instrument_node="">After Stalin's death, relations underwent normalisation heralded by the signing of the </span><a data-dcnode-id="5616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belgrade_declaration" title="Belgrade declaration"><span data-dcnode-id="5617" instrument_node="">Belgrade declaration</span></a><span data-dcnode-id="5615" instrument_node=""> in June 1955, which expressly rescinded Stalin's policies towards Yugoslavia. Nevertheless, the SFRY never joined the USSR-led political and military block of socialist countries and remained one of the leading members of the </span><a data-dcnode-id="5613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-Aligned_Movement" title="Non-Aligned Movement"><span data-dcnode-id="5614" instrument_node="">Non-Aligned Movement</span></a><span data-dcnode-id="5612" instrument_node="">, a grouping of countries that sought to be neutral in the </span><a data-dcnode-id="5610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="5611" instrument_node="">Cold War</span></a><span data-dcnode-id="5609" instrument_node="">. However, Yugoslav government's permission to Soviet Air Force to fly over the country, allowed Soviet Union to send advisors, weapons and troops to Egypt between Six-Day War and Yom Kippur War.</span><sup class="reference" data-dcnode-id="5606" id="cite_ref-56"><a data-dcnode-id="5607" href="#cite_note-56"><span data-dcnode-id="5608" instrument_node="">[56]</span></a></sup><span data-dcnode-id="5605" instrument_node=""> Economic and cultural ties between the USSR and SFRY developed successfully until the late 1980s.
</span></p><span data-dcnode-id="5603" instrument_node="">
</span><h3 data-dcnode-id="5592"><span data-dcnode-id="5602" id="1991.E2.80.932000"></span><span class="mw-headline" data-dcnode-id="5600" id="1991–2000"><span data-dcnode-id="5601" instrument_node="">1991–2000</span></span><span class="mw-editsection" data-dcnode-id="5593"><span class="mw-editsection-bracket" data-dcnode-id="5598"><span data-dcnode-id="5599" instrument_node="">[</span></span><a data-dcnode-id="5596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRussia%25E2%2580%2593Serbia_relations%26action%3Dedit%26section%3D9" title="Edit section: 1991–2000"><span data-dcnode-id="5597" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5594"><span data-dcnode-id="5595" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5591" instrument_node="">
</span><p data-dcnode-id="5577"><span data-dcnode-id="5590" instrument_node="">The </span><a data-dcnode-id="5588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Breakup_of_Yugoslavia" title="Breakup of Yugoslavia"><span data-dcnode-id="5589" instrument_node="">breakup of Yugoslavia</span></a><span data-dcnode-id="5587" instrument_node=""> and the </span><a data-dcnode-id="5585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_Soviet_Union" title="Dissolution of the Soviet Union"><span data-dcnode-id="5586" instrument_node="">dissolution of the Soviet Union</span></a><span data-dcnode-id="5584" instrument_node=""> occurred nearly concurrently. Throughout the 1990s, </span><a data-dcnode-id="5582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serbia_and_Montenegro" title="Serbia and Montenegro"><span data-dcnode-id="5583" instrument_node="">FR Yugoslavia</span></a><span data-dcnode-id="5581" instrument_node=""> was hard hit with sanctions from the western world; meanwhile Russia was undergoing painful structural reforms that were accompanied by a </span><a class="extiw" data-dcnode-id="5579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ru.wikipedia.org/wiki/%25D0%25AD%25D0%25BA%25D0%25BE%25D0%25BD%25D0%25BE%25D0%25BC%25D0%25B8%25D0%25BA%25D0%25B0_%25D0%25A0%25D0%25BE%25D1%2581%25D1%2581%25D0%25B8%25D0%25B8_%25D0%25B2_1990-%25D0%25B5_%25D0%25B3%25D0%25BE%25D0%25B4%25D1%258B" title="ru:Экономика России в 1990-е годы"><span data-dcnode-id="5580" instrument_node="">steady economic decline</span></a><span data-dcnode-id="5578" instrument_node=""> in production until 1999. Relations between the countries were largely neglected until the spring 1999.
</span></p><p data-dcnode-id="5523"><span data-dcnode-id="5576" instrument_node="">In 1998, the </span><a data-dcnode-id="5574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kosovo_War" title="Kosovo War"><span data-dcnode-id="5575" instrument_node="">Kosovo War</span></a><span data-dcnode-id="5573" instrument_node=""> began, followed by break-up of relations between Yugoslavia and the West and to the </span><a data-dcnode-id="5571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO_bombing_of_Yugoslavia" title="NATO bombing of Yugoslavia"><span data-dcnode-id="5572" instrument_node="">NATO bombing of Yugoslavia</span></a><span data-dcnode-id="5570" instrument_node="">, which Russia strongly condemned. In March 1999, Russian president </span><a data-dcnode-id="5568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boris_Yeltsin" title="Boris Yeltsin"><span data-dcnode-id="5569" instrument_node="">Boris Yeltsin</span></a><span data-dcnode-id="5567" instrument_node=""> described NATO's military action against sovereign Yugoslavia as an ″open aggression″.</span><sup class="reference" data-dcnode-id="5564" id="cite_ref-bbcruscondemn_57-0"><a data-dcnode-id="5565" href="#cite_note-bbcruscondemn-57"><span data-dcnode-id="5566" instrument_node="">[57]</span></a></sup><span data-dcnode-id="5563" instrument_node=""> Russia condemned </span><a data-dcnode-id="5561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="5562" instrument_node="">NATO</span></a><span data-dcnode-id="5560" instrument_node=""> at the </span><a data-dcnode-id="5558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="5559" instrument_node="">United Nations</span></a><span data-dcnode-id="5557" instrument_node=""> and supported the statement that NATO air strikes on Serbia were an illegal military action.</span><sup class="reference" data-dcnode-id="5554" id="cite_ref-bbcruscondemn_57-1"><a data-dcnode-id="5555" href="#cite_note-bbcruscondemn-57"><span data-dcnode-id="5556" instrument_node="">[57]</span></a></sup><span data-dcnode-id="5553" instrument_node=""> Volunteers and mercenaries from Russia were cited to have gone to Kosovo in large numbers to fight the </span><a data-dcnode-id="5551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kosovo_Liberation_Army" title="Kosovo Liberation Army"><span data-dcnode-id="5552" instrument_node="">KLA</span></a><span data-dcnode-id="5550" instrument_node="">, and to resist and complicate </span><a data-dcnode-id="5548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="5549" instrument_node="">NATO</span></a><span data-dcnode-id="5547" instrument_node=""> operations.</span><sup class="reference" data-dcnode-id="5544" id="cite_ref-58"><a data-dcnode-id="5545" href="#cite_note-58"><span data-dcnode-id="5546" instrument_node="">[58]</span></a></sup><span data-dcnode-id="5543" instrument_node=""> Around the time of the bombing, a Russia-friendly rhetoric developed in the Serbian political team as </span><a data-dcnode-id="5541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Borislav_Milo%25C5%25A1evi%25C4%2587" title="Borislav Milošević"><span data-dcnode-id="5542" instrument_node="">Borislav Milošević</span></a><span data-dcnode-id="5540" instrument_node="">, the brother of </span><a data-dcnode-id="5538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slobodan_Milo%25C5%25A1evi%25C4%2587" title="Slobodan Milošević"><span data-dcnode-id="5539" instrument_node="">Slobodan Milošević</span></a><span data-dcnode-id="5537" instrument_node=""> and the Yugoslav ambassador to </span><a data-dcnode-id="5535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moscow" title="Moscow"><span data-dcnode-id="5536" instrument_node="">Moscow</span></a><span data-dcnode-id="5534" instrument_node=""> at the time, proposed that the Federal Republic of Yugoslavia could join the </span><a data-dcnode-id="5532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Union_State" title="Union State"><span data-dcnode-id="5533" instrument_node="">Union State</span></a><span data-dcnode-id="5531" instrument_node=""> which is composed by </span><a data-dcnode-id="5529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belarus" title="Belarus"><span data-dcnode-id="5530" instrument_node="">Belarus</span></a><span data-dcnode-id="5528" instrument_node=""> and Russia.</span><sup class="reference" data-dcnode-id="5525" id="cite_ref-59"><a data-dcnode-id="5526" href="#cite_note-59"><span data-dcnode-id="5527" instrument_node="">[59]</span></a></sup><span data-dcnode-id="5524" instrument_node="">
</span></p><span data-dcnode-id="5522" instrument_node="">
</span><h3 data-dcnode-id="5511"><span data-dcnode-id="5521" id="2000.E2.80.93present"></span><span class="mw-headline" data-dcnode-id="5519" id="2000–present"><span data-dcnode-id="5520" instrument_node="">2000–present</span></span><span class="mw-editsection" data-dcnode-id="5512"><span class="mw-editsection-bracket" data-dcnode-id="5517"><span data-dcnode-id="5518" instrument_node="">[</span></span><a data-dcnode-id="5515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRussia%25E2%2580%2593Serbia_relations%26action%3Dedit%26section%3D10" title="Edit section: 2000–present"><span data-dcnode-id="5516" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5513"><span data-dcnode-id="5514" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5510" instrument_node="">
</span><link data-dcnode-id="5509" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5505" role="note"><span data-dcnode-id="5508" instrument_node="">See also: </span><a data-dcnode-id="5506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Accession_of_Serbia_to_the_European_Union" title="Accession of Serbia to the European Union"><span data-dcnode-id="5507" instrument_node="">Accession of Serbia to the European Union</span></a></div><span data-dcnode-id="5504" instrument_node="">
