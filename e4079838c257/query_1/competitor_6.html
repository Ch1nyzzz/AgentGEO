</span><ul class="txt" data-dcnode-id="2091"><li data-dcnode-id="2125"><a data-dcnode-id="2126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/children-families-and-communities.html" title="RAND research addresses child health and how families and neighborhoods affect child well-being. Other family-focused research covers topics such as immigration, caregiving, and household finances. Through studies on families as well as community resilience, RAND develops solutions to public policy challenges to help make communities throughout the world safer and more secure, healthier and more prosperous."><span data-dcnode-id="2127" instrument_node="">Children, Families, and Communities</span></a></li><li data-dcnode-id="2122"><a data-dcnode-id="2123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/cyber-and-data-sciences.html" title="RAND was at the forefront of early computing and data science. In the 1950s, we built computers to improve researchers' analytic and modeling capabilities. We also developed data communications technologies that were forerunners of the internet. Today, RAND experts recommend policies and best practices to support safe and secure technological innovation and adoption."><span data-dcnode-id="2124" instrument_node="">Cyber and Data Sciences</span></a></li><li data-dcnode-id="2119"><a data-dcnode-id="2120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/education-and-literacy.html" title="RAND research on early childhood, K-12, and higher education covers issues such as assessment and accountability, choice-based and standards-based reform, school leadership, teacher effectiveness, technology, and vocational training. RAND also explores life skills, such as media, health, and financial literacy, as well as how time spent outside the classroom impacts student outcomes."><span data-dcnode-id="2121" instrument_node="">Education and Literacy</span></a></li><li data-dcnode-id="2116"><a data-dcnode-id="2117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/energy-and-environment.html" title="RAND energy and environmental analyses examine the implications of existing and proposed energy policies on the environment. Building on a long history of policy research, RAND helps balance the need for environmental protections and economic development."><span data-dcnode-id="2118" instrument_node="">Energy and Environment</span></a></li><li data-dcnode-id="2113"><a data-dcnode-id="2114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/health-health-care-and-aging.html" title="RAND advances understanding of health and health behaviors, and examines how the organization and financing of care affect costs, quality, and access. Our body of research includes innovative studies of health insurance, health care reform, and health information technology, as well as obesity, substance abuse, and PTSD. RAND findings also help inform policies that aim to improve the health of seniors and the care they receive."><span data-dcnode-id="2115" instrument_node="">Health, Health Care, and Aging</span></a></li><li data-dcnode-id="2110"><a data-dcnode-id="2111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/homeland-security-and-public-safety.html" title="RAND conducts analyses and makes recommendations to strengthen the U.S. Department of Homeland Security across its full set of missions to prevent terrorism and enhance security, secure and manage America's borders, enforce and administer immigration laws, safeguard and secure cyberspace, and strengthen preparedness and resilience. In the area of public safety, RAND research addresses drug policy, crime, prison reform, and prisoner reentry, and other topics."><span data-dcnode-id="2112" instrument_node="">Homeland Security and Public Safety</span></a></li><li data-dcnode-id="2107"><a data-dcnode-id="2108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/infrastructure-and-transportation.html" title="RAND research addresses the challenges of developing, managing, and protecting energy, transportation, water, communications, and other critical infrastructure throughout the world."><span data-dcnode-id="2109" instrument_node="">Infrastructure and Transportation</span></a></li><li data-dcnode-id="2104"><a data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/international-affairs.html" title="RAND's international affairs research comprises a range of cross-cutting issues, including global economies and trade, space and maritime security, diplomacy, global health and education, nation building, and regional security and stability. RAND also analyzes the policies and effectiveness of international organizations such as the UN, NATO, European Union, and ASEAN."><span data-dcnode-id="2106" instrument_node="">International Affairs</span></a></li><li data-dcnode-id="2101"><a data-dcnode-id="2102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/law-and-business.html" title="RAND work in law, business, and regulation includes analyses of alternative dispute resolution, asbestos litigation, workers' compensation, insurance, and other civil justice matters. This research often has implications for the private sector, such as entrepreneurs facing legal and regulatory hurdles, or multinational corporations dealing with corporate ethics and governance issues."><span data-dcnode-id="2103" instrument_node="">Law and Business</span></a></li><li data-dcnode-id="2098"><a data-dcnode-id="2099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/national-security-and-terrorism.html" title="RAND conducts a broad array of national security research for the U.S. Department of Defense and allied ministries of defense. Our federally funded research and development centers (FFRDCs) explore threat assessment, military acquisition, technology, recruitment and personnel management, counterinsurgency, intelligence, and readiness. RAND is a world leader in terrorism research. Studies address such topics as terrorism financing and strategies to undermine violent extremism."><span data-dcnode-id="2100" instrument_node="">National Security and Terrorism</span></a></li><li data-dcnode-id="2095"><a data-dcnode-id="2096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/science-and-technology.html" title="RAND experts have often been among the pioneers of key scientific research, including computer analysis, satellite development, military technology, and the foundations of the Internet. RAND's research has also resulted in the development of new methodologies and ways of analyzing policy issues, from the Delphi method to Robust Decision Making."><span data-dcnode-id="2097" instrument_node="">Science and Technology</span></a></li><li data-dcnode-id="2092"><a data-dcnode-id="2093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/workers-and-the-workplace.html" title="Demand for educated, versatile workers who can interpret complex information and adapt to innovation is higher than ever. RAND pursues research that helps people, organizations, and governments understand how workers can remain engaged and productive in a changing global economy. Studies address workforce development, gender equity in the workplace, working conditions, and workplace wellness programs."><span data-dcnode-id="2094" instrument_node="">Workers and the Workplace</span></a></li></ul><span data-dcnode-id="2090" instrument_node="">

</span><div class="print-abstract" data-dcnode-id="1355"><p class="short-abstract" data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Russia's 2014 annexation of Crimea has challenged the integrity of Europe's territorial borders and had a broader negative impact on the European security environment. This report analyzes how Europeans perceive the Russian threat — whether European states regard Russia's policy in eastern and northern Europe as a security priority, how they have responded to Russian behavior, and how officials see the future of Russo-European relations.</span></p></div><span data-dcnode-id="1354" instrument_node="">

</span><div class="product-main" data-dcnode-id="813"><span data-dcnode-id="997" instrument_node="">
</span><div class="research-questions" data-dcnode-id="982"><span data-dcnode-id="996" instrument_node="">
</span><h2 data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Research Questions</span></h2><span data-dcnode-id="993" instrument_node="">
</span><ol class="num-list" data-dcnode-id="984"><span data-dcnode-id="992" instrument_node="">
</span><li data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Do European states see Russia as a major security threat, and, if so, what is it that Russia might threaten?</span></li><li data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">How have European states responded to date — either individually, through the European Union (EU), or through the North Atlantic Treaty Organization (NATO)?</span></li><li data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">How might these policies change if Russia takes even more aggressive steps in the future?</span></li><span data-dcnode-id="985" instrument_node="">
</span></ol><span data-dcnode-id="983" instrument_node="">
</span></div><span data-dcnode-id="981" instrument_node="">
</span><div class="abstract product-page-abstract" data-dcnode-id="977"><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Russia's illegal annexation and occupation of Crimea in March 2014 has challenged the integrity of Europe's territorial borders and confirmed after the Georgia war in 2008 that Russia could react violently to perceived challenges to what it regards as its sphere of influence. This report first examines how European states perceive Russia's behavior in eastern and northern Europe, and whether they regard Russian policy and behavior in these regions as an important security priority. We identify a number of fault lines within Europe with regard to threat perceptions and further analyze whether these divides extend to perceptions of NATO and the United States. NATO members closer geographically to Russia appear to be most concerned by Russia's aggressive behavior, and are concerned that the Alliance is ill equipped to respond to the current crisis. Second, the report analyzes how European states have responded to Russian behavior. While European states generally agree that a firm response is required, they are also eager to maintain open channels of communication with Russia. Finally, the report examines how European states intend to shape their relationship with Russia in the future; what existing measures they intend to keep in place; what new measures they might implement; and prospects for NATO and EU expansion. This future relationship is based on a general understanding that relations with Russia have changed irremediably; tensions are unlikely to recede anytime soon; and future actions toward Russia will depend on Russian behavior.</span></p></div><span data-dcnode-id="976" instrument_node="">
</span><h2 data-dcnode-id="974" id="key-findings-"><span data-dcnode-id="975" instrument_node="">Key Findings</span></h2><span data-dcnode-id="973" instrument_node="">
</span><div class="key-findings" data-dcnode-id="934"><span data-dcnode-id="972" instrument_node="">
</span><h3 data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Perceptions of Russia as a Military Threat Differ Sharply Across Europe and Appear to be Heavily Influenced by Geographical Proximity to Russia</span></h3><ul data-dcnode-id="963"><li data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Some of Russia's neighbors see Russia as capable of and potentially willing to carry out a conventional attack against them but do not necessarily see such an attack as likely.</span></li><span data-dcnode-id="967" instrument_node="">
</span><li data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Some European countries, particularly eastern NATO members, are concerned that the Alliance is ill equipped to respond to the current crisis with Russia.</span></li><span data-dcnode-id="964" instrument_node="">
</span></ul><h3 data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">European Countries Have Adopted a Broad Range of Measures in Response to the Ukrainian Crisis</span></h3><ul data-dcnode-id="948"><li data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">That Russia's behavior requires a strong response is widely accepted by most European countries.</span></li><span data-dcnode-id="958" instrument_node="">
</span><li data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">NATO has begun its adaptation to the new threat environment.</span></li><span data-dcnode-id="955" instrument_node="">
</span><li data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Responses to Russia's strategic communication efforts and internal destabilization efforts have been limited.</span></li><span data-dcnode-id="952" instrument_node="">
</span><li data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">While agreeing on a firm response to Russia's aggressive moves, most European countries have also made sure to pursue dialogue with Russia on Ukraine-related issues as well as other matters of mutual interest.</span></li><span data-dcnode-id="949" instrument_node="">
</span></ul><h3 data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">European Officials Interviewed Generally Agreed on Three Key Elements that Shape Their Current Relations with Russia and Likely Will Continue to Do So in the Near Future</span></h3><ul data-dcnode-id="936"><li data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Relations with Russia have changed irremediably.</span></li><span data-dcnode-id="943" instrument_node="">
</span><li data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Tensions are unlikely to recede anytime soon.</span></li><span data-dcnode-id="940" instrument_node="">
</span><li data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Future actions toward Russia depend on Russian behavior.</span></li><span data-dcnode-id="937" instrument_node="">
</span></ul><span data-dcnode-id="935" instrument_node="">
</span></div><span data-dcnode-id="933" instrument_node="">
</span><h2 data-dcnode-id="931" id="recommendations-"><span data-dcnode-id="932" instrument_node="">Recommendations</span></h2><span data-dcnode-id="930" instrument_node="">
</span><div class="recommendations" data-dcnode-id="917"><span data-dcnode-id="929" instrument_node="">
</span><ul data-dcnode-id="919"><li data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">The Department of Defense should take a serious look at Russian capabilities to politically subvert a Baltic state, including the seizure of a border enclave and/or fomenting internal unrest. DoD could use political-military games to understand the potential Alliance difficulties in reaching consensus, the options open to NATO, and the time required. More-detailed assessment of the Baltic internal security forces and their ability to deal with potential subversion contingencies also would be valuable.</span></li><span data-dcnode-id="926" instrument_node="">
</span><li data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">DoD should seek a better understanding of the Russian ability to prevent reinforcement to the Baltic States; DoD could subject some of the "unusual" scenarios, like the seizure of Gotland, to modeling and simulation. Similarly, for sustained air operations over the Baltic States, how important does access to Swedish (and possibly Finnish) airspace become?</span></li><span data-dcnode-id="923" instrument_node="">
</span><li data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">DoD should seek a clear view of the role that Kaliningrad might play, with its strong antiair defenses; how would NATO neutralize them?</span></li><span data-dcnode-id="920" instrument_node="">
</span></ul><span data-dcnode-id="918" instrument_node="">
</span></div><span data-dcnode-id="916" instrument_node="">
