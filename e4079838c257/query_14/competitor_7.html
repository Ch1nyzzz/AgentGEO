</span><h1 class="fs-huge" data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">Relations with the European Union </span></h1><span data-dcnode-id="1851" instrument_node="">
</span><ul class="list-meta" data-dcnode-id="1841"><span data-dcnode-id="1850" instrument_node="">
</span><li data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Last updated: 04 Mar. 2022 15:32</span></li><span data-dcnode-id="1847" instrument_node="">

</span><ul class="list-i18n" data-dcnode-id="1817"><span data-dcnode-id="1839" instrument_node="">
</span><li data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">English</span></li><span data-dcnode-id="1836" instrument_node="">
</span><li data-dcnode-id="1831"><span data-dcnode-id="1835" instrument_node="">
</span><a data-dcnode-id="1833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/topics_49217.htm%3FselectedLocale%3Dfr"><span data-dcnode-id="1834" instrument_node="">French</span></a><span data-dcnode-id="1832" instrument_node="">

</span><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/topics_49217.htm%3FselectedLocale%3Dru"><span data-dcnode-id="1828" instrument_node="">Russian</span></a><span data-dcnode-id="1826" instrument_node="">
</span></li><span data-dcnode-id="1824" instrument_node="">
</span><li data-dcnode-id="1819"><span data-dcnode-id="1823" instrument_node="">
</span><a data-dcnode-id="1821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/topics_49217.htm%3FselectedLocale%3Duk"><span data-dcnode-id="1822" instrument_node="">Ukrainian</span></a><span data-dcnode-id="1820" instrument_node="">
</span></li><span data-dcnode-id="1818" instrument_node="">
</span></ul><span data-dcnode-id="1816" instrument_node="">
</span><div class="socialbar" data-dcnode-id="1806"><span data-dcnode-id="1815" instrument_node="">
</span><span data-dcnode-id="1813" instrument_node="">
</span><a class="icon icon-facebook" data-dcnode-id="1812" data-utm-medium="smcweb" data-utm-source="facebook" href="#"></a><span data-dcnode-id="1811" instrument_node="">
</span><a class="icon icon-twitter" data-dcnode-id="1810" data-utm-medium="smcweb" data-utm-source="twitter" href="#"></a><span data-dcnode-id="1809" instrument_node="">
</span><a class="icon icon-linkedin" data-dcnode-id="1808" data-utm-medium="smcweb" data-utm-source="linkedin" href="#"></a><span data-dcnode-id="1807" instrument_node="">
</span></div><span data-dcnode-id="1805" instrument_node=""> </span><span data-dcnode-id="1803" instrument_node="">
</span><section class="content cf" data-dcnode-id="1064"><span data-dcnode-id="1802" instrument_node="">
</span><p class="introtxt" data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Sharing strategic interests and facing the same challenges, NATO and the European Union (EU) cooperate on issues of common interest and are working side by side in crisis management, capability development and political consultations, as well as providing support to their common partners in the east and south. The EU is a unique and essential partner for NATO. The two organisations share a majority of members, have common values and face similar threats and challenges.</span></p><span data-dcnode-id="1799" instrument_node="">
</span><div class="box box-media box-media--stretched" data-dcnode-id="1793"><span data-dcnode-id="1798" instrument_node="">
</span><span data-dcnode-id="1796" instrument_node="">
</span><img alt="NATO Secretary General Jens Stoltenberg hosted a working dinner for Charles Michel, President of the European Council, Ursula von der Leyen, President of the European Commission and Josep Borrell, High Representative of the European Union for Foreign Affairs and Security Policy, Vice President of the European Commission on Thursday 2 July 2020." data-dcnode-id="1795" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/nato_static_fl2014/assets/pictures/images_mfu/2020/7/stock/200702-SG_EU_rdax_775x440s.jpg&amp;raw"><span data-dcnode-id="1794" instrument_node="">
</span></div><span data-dcnode-id="1792" instrument_node="">
</span><div data-dcnode-id="1746"><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1788" instrument_node="">
</span><div class="box--highlight" data-dcnode-id="1748"><span data-dcnode-id="1787" instrument_node="">
</span><ul data-dcnode-id="1750"><span data-dcnode-id="1786" instrument_node="">
</span><li data-dcnode-id="1781"><span data-dcnode-id="1785" instrument_node="">Relations between NATO and the EU were institutionalised in the early 2000s, building on steps taken during the 1990s to promote greater European responsibility in defence matters (NATO-Western European Union cooperation</span><sup data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">1</span></sup><span data-dcnode-id="1782" instrument_node="">).</span></li><span data-dcnode-id="1780" instrument_node="">
</span><li data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">The 2002 NATO-EU Declaration on a European Security and Defence Policy (ESDP) reaffirmed EU assured access to NATO's planning capabilities for the EU's own military operations.</span></li><span data-dcnode-id="1777" instrument_node="">
</span><li data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">In 2003, the so-called "Berlin Plus" arrangements set the basis for the Alliance to support EU-led operations in which NATO as a whole is not engaged.</span></li><span data-dcnode-id="1774" instrument_node="">
</span><li data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">At the 2010 Lisbon Summit, the Allies underlined their determination to improve the NATO-EU strategic partnership. The 2010 Strategic Concept committed the Alliance to working more closely with other international organisations to prevent crises, manage conflicts and stabilise post-conflict situations.</span></li><span data-dcnode-id="1771" instrument_node="">
</span><li data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">In Warsaw in July 2016, the two organisations outlined areas for strengthened cooperation in light of common challenges to the east and south, including countering hybrid threats, enhancing resilience, defence capacity building, cyber defence, maritime security and exercises. As a follow-up, in December 2016, NATO foreign ministers endorsed a statement to which were annexed 42 common measures to advance NATO-EU cooperation. A further 32 measures were agreed in December 2017.</span></li><span data-dcnode-id="1768" instrument_node="">
</span><li data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">On 10 July 2018, in a joint declaration, the two organisations agreed to focus on swift progress in the areas of military mobility, counter-terrorism and strengthening resilience to chemical, biological, radiological and nuclear-related risks as well as promoting the women, peace and security agenda.</span></li><span data-dcnode-id="1765" instrument_node="">
</span><li data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Allied leaders welcomed this joint declaration at the Brussels Summit in July 2018 and tangible results achieved since 2016. The development of European defence capabilities, while ensuring coherence and complementarity and avoiding unnecessary duplication, is key in joint efforts to make the Euro-Atlantic area safer and contributes to transatlantic burden-sharing.</span></li><span data-dcnode-id="1762" instrument_node="">
</span><li data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Close cooperation between NATO and the EU is an important element in the development of an international "comprehensive approach" to crisis management and operations, which requires the effective application of both military and civilian means.</span></li><span data-dcnode-id="1759" instrument_node="">
</span><li data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">NATO and the EU stand united in condemning Russia’s unprovoked invasion of Ukraine, and in supporting Ukraine’s sovereignty, territorial integrity, and right to self-defence.</span></li><span data-dcnode-id="1756" instrument_node="">
</span><li data-dcnode-id="1752"><span data-dcnode-id="1755" instrument_node="">NATO and the EU currently have 21&nbsp;member countries in common.</span><sup data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">2</span></sup></li><span data-dcnode-id="1751" instrument_node="">
</span></ul><span data-dcnode-id="1749" instrument_node="">
</span></div><span data-dcnode-id="1747" instrument_node="">
</span></div><span data-dcnode-id="1745" instrument_node="">
</span><div class="accordion-wrapper" data-dcnode-id="1637"><span data-dcnode-id="1744" instrument_node="">
</span><ul class="accordion" data-dcnode-id="1639"><span data-dcnode-id="1743" instrument_node="">
</span><li data-dcnode-id="1641"><span data-dcnode-id="1742" instrument_node="">
</span><h2 data-dcnode-id="1738"><a data-dcnode-id="1739" href="#"><span class="icon icon-arrow_accordion" data-dcnode-id="1741"></span><span data-dcnode-id="1740" instrument_node="">Towards a more strategic partnership</span></a></h2><span data-dcnode-id="1737" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="1644"><span data-dcnode-id="1736" instrument_node="">
</span><div class="inner-content" data-dcnode-id="1646"><p data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Strengthening the NATO-EU strategic partnership is particularly important in the current security environment, in which both organisations and their members are facing the same challenges to the east and south.</span></p><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">In Warsaw in July 2016, Allied leaders underlined that the EU remains a unique and essential partner for NATO. Enhanced consultations at all levels and practical cooperation in operations and capability development have brought concrete results. The security challenges in the two organisations' shared eastern and southern neighbourhoods make it more important than ever to reinforce the strategic partnership.</span></p><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">Allied leaders welcomed the joint declaration issued in Warsaw by the NATO Secretary General, the President of the European Council and the President of the European Commission, which outlines a series of actions the two organisations intend to take together in concrete areas, including countering hybrid threats, enhancing resilience, defence capacity building, cyber defence, maritime security, and exercises.</span></p><span data-dcnode-id="1727" instrument_node="">
</span><p data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">As a follow-up, in December 2016, NATO foreign ministers endorsed 42 measures to advance how NATO and the EU work together, including:</span></p><span data-dcnode-id="1724" instrument_node="">
</span><ul data-dcnode-id="1704"><span data-dcnode-id="1723" instrument_node="">
</span><li data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">measures to bolster resilience to hybrid threats, ranging from disinformation campaigns to acute crises;</span></li><span data-dcnode-id="1720" instrument_node="">
</span><li data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">cooperation between NATO's Operation Sea Guardian and the EUNAVFOR Operation Sophia in the Mediterranean;</span></li><span data-dcnode-id="1717" instrument_node="">
</span><li data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">exchange of information on cyber threats and the sharing of best practices on cyber security;</span></li><span data-dcnode-id="1714" instrument_node="">
</span><li data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">ensuring the coherence and complementarity of each other's defence planning processes;</span></li><span data-dcnode-id="1711" instrument_node="">
</span><li data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">parallel and coordinated exercises;</span></li><span data-dcnode-id="1708" instrument_node="">
</span><li data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">efforts to support the local capacities of partner countries in the sectors of security and defence.</span></li><span data-dcnode-id="1705" instrument_node="">
</span></ul><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">In December 2017, further steps were taken to boost NATO-EU cooperation through the addition of 32 new measures including in three new areas:</span></p><span data-dcnode-id="1700" instrument_node="">
</span><ul data-dcnode-id="1689"><span data-dcnode-id="1699" instrument_node="">
</span><li data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">military mobility to ensure that forces and equipment can move quickly across Europe if needed, which requires procedures for rapid border crossing, sufficient transport assets and robust infrastructure (roads, railways, ports and airports);</span></li><span data-dcnode-id="1696" instrument_node="">
</span><li data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">information-sharing in the fight against terrorism and strengthening coordination of counter-terrorism support for partner countries;</span></li><span data-dcnode-id="1693" instrument_node="">
</span><li data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">promoting women's role in peace and security.</span></li><span data-dcnode-id="1690" instrument_node="">
</span></ul><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">On 10 July 2018, just ahead of the NATO Summit in Brussels, the two organisations underlined the essential nature of continued cooperation to address multiple and evolving security challenges. They agreed to focus on swift progress in the areas of military mobility, counter-terrorism and strengthening resilience to chemical, biological, radiological and nuclear-related risks as well as promoting the women, peace and security agenda. They also welcomed the complementary and mutually reinforcing efforts of the EU and NATO to strengthen capabilities in defence and security.</span></p><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">At the July 2018 Brussels Summit, Allied leaders welcomed the joint declaration and the tangible results achieved in a range of areas, underlining their determination to develop and deepen cooperation by fully implementing the common set of 74 proposals. They recognised that the development of coherent, complementary and interoperable defence capabilities, avoiding duplication, is key to joint efforts to make the Euro-Atlantic area safer. Such efforts will lead to a stronger NATO, help enhance common security, contribute to transatlantic burden sharing, help deliver needed capabilities, and support an overall increase in defence spending.</span></p><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Allied leaders also welcomed the call for deeper NATO-EU cooperation by the European Council in June 2018. They noted that the fullest participation of non-EU Allies in the EU’s efforts to strengthen its capacities to address common security challenges is essential for the strengthened strategic partnership between NATO and the EU.</span></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">The importance of the unique and essential partnership was emphasised during the 2021 Brussels Summit, where Allied leaders highlighted tangible results of the common cooperation on countering hybrid and cyber threats, strategic communications, operational cooperation including maritime issues, military mobility, defence capabilities, defence industry and research, exercises, counter-terrorism and defence and security capacity building. The development of coherent, complementary and interoperable defence capabilities remained key in the two organisations’ joint efforts to make the Euro-Atlantic area safer.</span></p><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">They underlined further deepening of this cooperation through the full implementation of the common set of 74 proposals. These will contribute to coherence and complementarity and also look at evolving security challenges, such as strengthening resilience, emerging and disruptive technologies, the security implications of climate change, disinformation and the growing geostrategic competition.&nbsp;</span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Allied leaders also recognised that the ongoing distinct strategic processes within NATO and the EU offer an opportunity for further intensification of consultations and cooperation between the two organisations.&nbsp;</span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">The NATO Secretary General and the EU High Representative regularly report to NATO Allies and EU member states on progress in cooperation. (See progress reports in right-hand column under Official Texts.)</span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Non-EU European Allies make a significant contribution to these efforts. For the strategic partnership between NATO and the EU, their fullest involvement in these efforts is essential.</span></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">NATO and the EU can and should play complementary and mutually reinforcing roles in supporting international peace and security. The Allies are determined to make their contribution to create more favourable circumstances, through which they will:</span></p><span data-dcnode-id="1661" instrument_node="">
</span><ul data-dcnode-id="1647"><span data-dcnode-id="1660" instrument_node="">
</span><li data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">fully strengthen the strategic partnership with the EU, in the spirit of full mutual openness, transparency, complementarity and respect for the autonomy and institutional integrity of both organisations;</span></li><span data-dcnode-id="1657" instrument_node="">
</span><li data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">enhance practical cooperation in operations throughout the crisis spectrum, from coordinated planning to mutual support in the field;</span></li><span data-dcnode-id="1654" instrument_node="">
</span><li data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">broaden political consultations to include all issues of common concern, in order to share assessments and perspectives;</span></li><span data-dcnode-id="1651" instrument_node="">
</span><li data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">cooperate more fully in capability development, to minimise duplication and maximise cost effectiveness.</span></li><span data-dcnode-id="1648" instrument_node="">
</span></ul></div><span data-dcnode-id="1645" instrument_node="">
</span></div><span data-dcnode-id="1642" instrument_node="">
</span></li><span data-dcnode-id="1640" instrument_node="">
</span></ul><span data-dcnode-id="1638" instrument_node="">
</span></div><span data-dcnode-id="1636" instrument_node="">
</span><div class="accordion-wrapper" data-dcnode-id="1549"><span data-dcnode-id="1635" instrument_node="">
</span><ul class="accordion" data-dcnode-id="1551"><span data-dcnode-id="1634" instrument_node="">
</span><li data-dcnode-id="1553"><span data-dcnode-id="1633" instrument_node="">
</span><h2 data-dcnode-id="1629"><a data-dcnode-id="1630" href="#"><span class="icon icon-arrow_accordion" data-dcnode-id="1632"></span><span data-dcnode-id="1631" instrument_node="">Cooperation in the field</span></a></h2><span data-dcnode-id="1628" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="1556"><span data-dcnode-id="1627" instrument_node="">
</span><div class="inner-content" data-dcnode-id="1558"><p data-dcnode-id="1624"><strong data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Combating illegal trafficking in humans in the Aegean and the Central Mediterranean</span></strong></p><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">NATO defence ministers decided on 11 February 2016 to deploy ships to the Aegean Sea to support Greece and Turkey, as well as the European Union's border agency Frontex in their efforts to tackle the refugee and migrant crisis. Standing NATO Maritime Group 2 (SNMG2) is conducting reconnaissance, monitoring and surveillance in the territorial waters of Greece and Turkey, as well as in international waters. The deployment in the Aegean Sea aims to support international efforts to cut the lines of human trafficking and illegal migration. NATO ships are providing real-time information to the coastguards and relevant national authorities of Greece and Turkey, as well as to Frontex, helping them in their efforts to tackle this crisis.</span></p><span data-dcnode-id="1620" instrument_node="">
</span><p data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">In October 2016, ministers extended NATO's deployment in the Aegean Sea and decided that NATO's new Operation Sea Guardian would support the EU's Operation Sophia in the Central Mediterranean with NATO ships and planes, help increase the EU's situational awareness and provide logistical support. (Operation Sophia ended on 31 March 2020.)</span></p><span data-dcnode-id="1617" instrument_node="">
</span><p data-dcnode-id="1614"><strong data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">The Western Balkans</span></strong></p><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">In July 2003, the EU and NATO published a ″Concerted Approach for the Western Balkans″. Jointly drafted, it outlines core areas of cooperation and emphasises the common vision and determination both organisations share to bring stability to the region.</span></p><span data-dcnode-id="1610" instrument_node="">
</span><ul data-dcnode-id="1590"><span data-dcnode-id="1609" instrument_node="">
</span><li data-dcnode-id="1604"><em data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">The Republic of North Macedonia</span></em><br data-dcnode-id="1606"><span data-dcnode-id="1605" instrument_node="">
	On 31 March 2003, the EU-led Operation Concordia took over the responsibilities of the NATO-led mission, Operation Allied Harmony, in the country at the time known as the former Yugoslav Republic of Macedonia. This mission, which ended in December 2003, was the first "Berlin Plus" operation in which NATO assets were made available to the EU.</span></li><span data-dcnode-id="1603" instrument_node="">
</span><li data-dcnode-id="1598"><em data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Bosnia and Herzegovina</span></em><br data-dcnode-id="1600"><span data-dcnode-id="1599" instrument_node="">
	Building on the results of Concordia and following the conclusion of the NATO-led Stabilisation Force (SFOR) in Bosnia and Herzegovina, the EU deployed a new mission called Operation Althea on 2 December 2004. The EU Force (EUFOR) operates under the "Berlin Plus" arrangements, drawing on NATO planning expertise and on other Alliance's assets and capabilities.&nbsp;The Vice-Chief of Staff SHAPE is the Commander of Operation Althea. The EU Operation Headquarters (OHQ) is located at SHAPE.</span></li><span data-dcnode-id="1597" instrument_node="">
</span><li data-dcnode-id="1592"><em data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Kosovo</span></em><br data-dcnode-id="1594"><span data-dcnode-id="1593" instrument_node="">
	NATO has been leading a peacekeeping force in Kosovo (KFOR) since 1999. The EU has contributed civil assets to the UN Mission in Kosovo (UNMIK) for years and agreed to take over the police component of the UN Mission. The European Union Rule of Law Mission (EULEX) in Kosovo, which deployed in December 2008, is the largest civilian mission ever launched under the Common Security and Defence Policy (CSDP). The central aim is to assist and support the Kosovo authorities in the rule of law area, specifically in the police, judiciary and customs areas. EULEX works closely with KFOR in the field.</span></li><span data-dcnode-id="1591" instrument_node="">
</span></ul><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1586"><strong data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Cooperation in other regions</span></strong></p><span data-dcnode-id="1585" instrument_node="">
</span><ul data-dcnode-id="1559"><span data-dcnode-id="1584" instrument_node="">
</span><li data-dcnode-id="1579"><em data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Afghanistan</span></em><br data-dcnode-id="1581"><span data-dcnode-id="1580" instrument_node="">
	Over the past decade, NATO and the EU have played key roles in bringing peace and stability to Afghanistan, as part of the international community's broader efforts to implement a comprehensive approach to assist the country. The NATO-led International Security Assistance Force (ISAF) helped create a stable and secure environment in which the Afghan government as well as other international actors could build democratic institutions, extend the rule of law and reconstruct the country. Both ISAF and its successor Resolute Support Mission cooperated with the EU's Rule of Law Mission (EUPOL), which operated in Afghanistan from June 2007 to December 2016. EUPOL Advisers at the Afghan Ministry of Interior and the Afghan National Police supported the reform of the ministry and the development of civilian policing. The EU also initiated a programme for justice reform and helped to fund civilian projects in NATO-run Provincial Reconstruction Teams that were led by an EU member country.</span></li><span data-dcnode-id="1578" instrument_node="">
</span><li data-dcnode-id="1573"><em data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Darfur</span></em><br data-dcnode-id="1575"><span data-dcnode-id="1574" instrument_node="">
	Both NATO and the EU supported the African Union's mission in Darfur, Sudan in particular with regard to airlift rotations.</span></li><span data-dcnode-id="1572" instrument_node="">
</span><li data-dcnode-id="1567"><em data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Piracy</span></em><br data-dcnode-id="1569"><span data-dcnode-id="1568" instrument_node="">
	For several years NATO’s naval forces deployed under Operation Ocean Shield (2008-2016) and EU naval forces (Operation Atalanta) worked&nbsp;side by side with other actors, off the coast of Somalia for anti-piracy missions.</span></li><span data-dcnode-id="1566" instrument_node="">
</span><li data-dcnode-id="1561"><em data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Iraq </span></em><br data-dcnode-id="1563"><span data-dcnode-id="1562" instrument_node="">
	Both NATO and the EU are increasing their presence in Iraq. The EU is focusing on the civilian security sector. NATO is helping build the capacities of the Iraqi defence and security structures, and is scaling up these efforts with a non-combat training mission launched at the Brussels Summit in July 2018, at the request of the Government of Iraq. NATO Mission Iraq will complement the ongoing efforts of the Coalition to Defeat ISIS/Daesh and other international actors.</span></li><span data-dcnode-id="1560" instrument_node="">
</span></ul></div><span data-dcnode-id="1557" instrument_node="">
</span></div><span data-dcnode-id="1554" instrument_node="">
</span></li><span data-dcnode-id="1552" instrument_node="">
</span></ul><span data-dcnode-id="1550" instrument_node="">
</span></div><span data-dcnode-id="1548" instrument_node="">
</span><div class="accordion-wrapper" data-dcnode-id="1493"><span data-dcnode-id="1547" instrument_node="">
</span><ul class="accordion" data-dcnode-id="1495"><span data-dcnode-id="1546" instrument_node="">
</span><li data-dcnode-id="1497"><span data-dcnode-id="1545" instrument_node="">
</span><h2 data-dcnode-id="1541"><a data-dcnode-id="1542" href="#"><span class="icon icon-arrow_accordion" data-dcnode-id="1544"></span><span data-dcnode-id="1543" instrument_node="">Other areas of cooperation</span></a></h2><span data-dcnode-id="1540" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="1500"><span data-dcnode-id="1539" instrument_node="">
</span><div class="inner-content" data-dcnode-id="1502"><p data-dcnode-id="1536"><strong data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Political consultation</span></strong></p><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">The range of subjects discussed between NATO and the EU has expanded considerably over the past several years. Political dialogue covers the full spectrum of issues relevant to both organisations, including the geopolitical implications of COVID-19, cyber and hybrid threats, Russia, China, the Western Balkans, the Middle East and Afghanistan. Since the start of the crisis in Ukraine, both organisations have worked to make sure that their actions complement each other, especially with regard to Russia.</span></p><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1529"><strong data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Capabilities</span></strong></p><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Together with operations, capability development is an area where cooperation is essential and where there is potential for further growth. The NATO-EU Capability Group was established in May 2003 to ensure the coherence and mutual reinforcement of NATO and EU capability development efforts.</span></p><span data-dcnode-id="1525" instrument_node="">
</span><p data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Following the creation, in July 2004, of the European Defence Agency (EDA) to coordinate work within the EU on the development of defence capabilities, armaments cooperation, acquisition and research, EDA experts contribute to the work of the Capability Group.</span></p><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Among other issues, the Capability Group has addressed common capability shortfalls in areas such as countering improvised explosive devices and medical support. The Group is also playing an important role in ensuring transparency and complementarity between NATO’s work on Smart Defence and the EU’s Pooling and Sharing initiative.</span></p><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1516"><strong data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Terrorism and WMD proliferation</span></strong></p><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Both NATO and the EU are committed to combating terrorism and the proliferation of weapons of mass destruction (WMD). They have exchanged information on their activities in the field of protection of civilian populations against chemical, biological, radiological and nuclear attacks.</span></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1509"><strong data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Civil preparedness and resilience</span></strong></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">The current unpredictable security environment has led to a renewed focus on civil preparedness and resilience. Modern societies are highly complex with integrated and interdependent sectors and vital services. They rely on supporting critical infrastructure, such as power or internet-based communication, to function. While such a high level of interconnectedness is more efficient and allows for economies of scale, greater interdependencies also increase the risk of cascading effects in the event of a disruption. This makes critical infrastructure attractive targets for hybrid tactics.</span></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">NATO-EU cooperation has been stepped up to address vulnerabilities in critical infrastructure as well as to improve transport, and regulatory aspects of military mobility, with a focus on coordinated border-crossing legislation, regulations and procedures, including for the transportation of dangerous goods.</span></p></div><span data-dcnode-id="1501" instrument_node="">
</span></div><span data-dcnode-id="1498" instrument_node="">
</span></li><span data-dcnode-id="1496" instrument_node="">
</span></ul><span data-dcnode-id="1494" instrument_node="">
</span></div><span data-dcnode-id="1492" instrument_node="">
</span><div class="accordion-wrapper" data-dcnode-id="1468"><span data-dcnode-id="1491" instrument_node="">
</span><ul class="accordion" data-dcnode-id="1470"><span data-dcnode-id="1490" instrument_node="">
</span><li data-dcnode-id="1472"><span data-dcnode-id="1489" instrument_node="">
</span><h2 data-dcnode-id="1485"><a data-dcnode-id="1486" href="#"><span class="icon icon-arrow_accordion" data-dcnode-id="1488"></span><span data-dcnode-id="1487" instrument_node="">Participation </span></a></h2><span data-dcnode-id="1484" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="1475"><span data-dcnode-id="1483" instrument_node="">
</span><div class="inner-content" data-dcnode-id="1477"><p data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">With the enlargement of both organisations in 2004, followed by the accession of Bulgaria, Romania and Croatia to the EU, the two organisations have 21 member countries in common. Albania, Canada, Iceland, Montenegro, North Macedonia, Norway, Turkey, the United Kingdom and the United States, which are members of NATO but not of the EU, participate in all NATO-EU meetings. So do Austria, Finland, Ireland, Sweden, and since 2008, Malta, which are members of the EU and of NATO’s Partnership for Peace (PfP) programme.</span></p><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Cyprus, which is not a PfP member and does not have a security agreement with NATO on the exchange of classified documents, does however participate in official NATO-EU meetings. This is a consequence of decisions taken by NATO in December 2002.</span></p></div><span data-dcnode-id="1476" instrument_node="">
</span></div><span data-dcnode-id="1473" instrument_node="">
</span></li><span data-dcnode-id="1471" instrument_node="">
</span></ul><span data-dcnode-id="1469" instrument_node="">
</span></div><span data-dcnode-id="1467" instrument_node="">
</span><div class="accordion-wrapper" data-dcnode-id="1430"><span data-dcnode-id="1466" instrument_node="">
</span><ul class="accordion" data-dcnode-id="1432"><span data-dcnode-id="1465" instrument_node="">
</span><li data-dcnode-id="1434"><span data-dcnode-id="1464" instrument_node="">
</span><h2 data-dcnode-id="1460"><a data-dcnode-id="1461" href="#"><span class="icon icon-arrow_accordion" data-dcnode-id="1463"></span><span data-dcnode-id="1462" instrument_node="">Framework for cooperation</span></a></h2><span data-dcnode-id="1459" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="1437"><span data-dcnode-id="1458" instrument_node="">
</span><div class="inner-content" data-dcnode-id="1439"><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">An exchange of letters between the NATO Secretary General and the EU Presidency in January 2001 defined the scope of cooperation and modalities of consultation on security issues between the two organisations. Cooperation further developed with the signing of the NATO-EU Declaration on ESDP in December 2002 and the agreement, in March 2003, of a framework for cooperation.</span></p><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1451"><b data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">NATO-EU Declaration on ESDP:&nbsp;</span></b><span data-dcnode-id="1452" instrument_node="">The NATO-EU Declaration on ESDP, agreed on 16 December 2002, reaffirmed the EU assured access to NATO’s planning capabilities for its own military operations and reiterated the political principles of the strategic partnership: effective mutual consultation; equality and due regard for the decision-making autonomy of the EU and NATO; respect for the interests of EU and NATO member states; respect for the principles of the Charter of the United Nations; and coherent, transparent and mutually reinforcing development of the military capability requirements common to the two organisations.</span></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1446"><b data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">The “Berlin Plus” arrangements</span></b><span data-dcnode-id="1447" instrument_node="">: As part of the framework for cooperation adopted on 17 March 2003, the so-called “Berlin Plus” arrangements provide the basis for NATO-EU cooperation in crisis management in the context of EU-led operations that make use of NATO's collective assets and capabilities, including command arrangements and assistance in operational planning. In effect, they allow the Alliance to support EU-led operations in which NATO as a whole is not engaged.</span></p><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">NATO and the EU meet on a regular basis to discuss issues of common interest. Meetings take place at different levels including at the level of foreign ministers, ambassadors, military representatives and defence advisors. There are regular staff-to-staff talks at all levels between NATO’s International Staff and International Military Staff, and their respective EU interlocutors (the European External Action Service, the European Defence Agency, the European Commission and the European Parliament).</span></p><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Permanent military liaison arrangements have been established to facilitate cooperation at the operational level. A NATO Permanent Liaison Team has been operating at the EU Military Staff since November 2005 and an EU Cell was set up at SHAPE (NATO’s strategic command for operations in Mons, Belgium) in March 2006.</span></p></div><span data-dcnode-id="1438" instrument_node="">
</span></div><span data-dcnode-id="1435" instrument_node="">
</span></li><span data-dcnode-id="1433" instrument_node="">
</span></ul><span data-dcnode-id="1431" instrument_node="">
</span></div><span data-dcnode-id="1429" instrument_node="">
</span><div class="accordion-wrapper" data-dcnode-id="1084"><span data-dcnode-id="1428" instrument_node="">
</span><ul class="accordion" data-dcnode-id="1086"><span data-dcnode-id="1427" instrument_node="">
</span><li data-dcnode-id="1088"><span data-dcnode-id="1426" instrument_node="">
</span><h2 data-dcnode-id="1422"><a data-dcnode-id="1423" href="#"><span class="icon icon-arrow_accordion" data-dcnode-id="1425"></span><span data-dcnode-id="1424" instrument_node="">Milestones</span></a></h2><span data-dcnode-id="1421" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="1091"><span data-dcnode-id="1420" instrument_node="">
</span><div class="inner-content" data-dcnode-id="1093"><p data-dcnode-id="1416"><strong data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">February 1992:</span></strong><span data-dcnode-id="1417" instrument_node="">&nbsp; The EU adopts the Maastricht Treaty, which envisages an intergovernmental Common Foreign and Security Policy (CFSP) and the eventual framing of a common defence policy (ESDP) with the WEU as the EU's defence component.</span></p><span data-dcnode-id="1415" instrument_node="">
</span><p data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Close cooperation is established between NATO and the WEU.</span></p><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1408"><strong data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">June 1992:</span></strong><span data-dcnode-id="1409" instrument_node="">&nbsp; In Oslo, NATO foreign ministers support the objective of developing the WEU as a means of strengthening the European pillar of the Alliance and as the defence component of the EU, that would also cover the “Petersberg tasks” (humanitarian search and rescue tasks, peacekeeping tasks, crisis-management tasks including peace enforcement and environmental protection).</span></p><span data-dcnode-id="1407" instrument_node="">
</span><p data-dcnode-id="1403"><strong data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">January 1994:</span></strong><span data-dcnode-id="1404" instrument_node="">&nbsp; Allied leaders agree to make collective assets of the Alliance available, on the basis of consultations in the North Atlantic Council, for WEU operations undertaken by the European Allies in pursuit of their CFSP. NATO endorses the concept of Combined Joint Task Forces, which provides for “separable but not separate” deployable headquarters that could be used for European-led operations and is the conceptual basis for future operations involving NATO and other non-NATO countries.</span></p><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1398"><strong data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">June 1996:&nbsp;</span></strong><span data-dcnode-id="1399" instrument_node="">In Berlin, NATO foreign ministers agree for the first time to build up a European Security and Defence Identity (ESDI) within NATO, with the aim of rebalancing roles and responsibilities between Europe and North America. An essential part of this initiative was to improve European capabilities. They also decide to make Alliance assets available for WEU-led crisis-management operations. These decisions lead to the introduction of the term "Berlin Plus".</span></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1393"><strong data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">December 1998:</span></strong><span data-dcnode-id="1394" instrument_node="">&nbsp; At a summit in St Malo, France and the United Kingdom make a joint statement affirming the EU's determination to establish a European Security and Defence Policy (ESDP).</span></p><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1388"><strong data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">April 1999</span></strong><span data-dcnode-id="1389" instrument_node="">:&nbsp; At the Washington Summit, Heads of State and Government decide to develop the “Berlin Plus” arrangements.</span></p><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1380"><strong data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">June 1999</span></strong><span data-dcnode-id="1384" instrument_node="">:&nbsp; A European Council meeting in Cologne, Germany decides "</span><em data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">to give the European Union the necessary means and capabilities to assume its responsibilities regarding a common European policy on security and defence</span></em><span data-dcnode-id="1381" instrument_node="">".</span></p><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1375"><strong data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">December 1999</span></strong><span data-dcnode-id="1376" instrument_node="">: At the Helsinki Council meeting, EU members establish military "headline goals" to allow the EU to deploy up to 60,000 troops by 2003 for ‘Petersberg tasks'. EU members also create political and military structures including a Political and Security Committee, a Military Committee and a Military Staff. The crisis-management role of the WEU is transferred to the EU. The WEU retains residual tasks.</span></p><span data-dcnode-id="1374" instrument_node="">
</span><p data-dcnode-id="1370"><strong data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">September 2000:</span></strong><span data-dcnode-id="1371" instrument_node="">&nbsp; The North Atlantic Council and the EU’s interim Political and Security Committee meet for the first time to take stock of progress in NATO-EU relations.</span></p><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1365"><strong data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">December 2000:</span></strong><span data-dcnode-id="1366" instrument_node="">&nbsp;Signature of the EU's Treaty of Nice containing amendments reflecting the operative developments of the ESDP as an independent EU policy (entry into force February 2003).</span></p><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1360"><strong data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">January 2001:</span></strong><span data-dcnode-id="1361" instrument_node="">&nbsp; Beginning of institutionalised relations between NATO and the EU with the establishment of joint meetings, including at the level of foreign ministers and ambassadors. Exchange of letters between the NATO Secretary General and the EU Presidency on the scope of cooperation and modalities for consultation.</span></p><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1355"><strong data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">May 2001</span></strong><span data-dcnode-id="1356" instrument_node="">: First formal NATO-EU meeting at the level of foreign ministers in Budapest. The NATO Secretary General and the EU Presidency issue a joint statement on the Western Balkans.</span></p><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1350"><strong data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">November 2002:</span></strong><span data-dcnode-id="1351" instrument_node="">&nbsp; At the Prague Summit, NATO members declare their readiness to give the EU access to NATO assets and capabilities for operations in which the Alliance is not engaged militarily.</span></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1345"><strong data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">December 2002:</span></strong><span data-dcnode-id="1346" instrument_node="">&nbsp;EU-NATO Declaration on ESDP.</span></p><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1340"><strong data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">March 2003:</span></strong><span data-dcnode-id="1341" instrument_node="">&nbsp; Agreement on the framework for cooperation. Entry into force of a NATO-EU security of information agreement. Transition from the NATO-led Operation Allied Harmony to the EU-led Operation Concordia in the Republic of North Macedonia (then known as the former Yugoslav Republic of Macedonia).</span></p><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1335"><strong data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">May 2003:</span></strong><span data-dcnode-id="1336" instrument_node="">&nbsp; First meeting of the NATO-EU Capability Group.</span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1330"><strong data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">July 2003:</span></strong><span data-dcnode-id="1331" instrument_node="">&nbsp;&nbsp; Development of a common strategy for the Western Balkans.</span></p><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1325"><strong data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">November 2003:</span></strong><span data-dcnode-id="1326" instrument_node="">&nbsp; First joint NATO-EU crisis-management exercise.</span></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1320"><strong data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">February 2004:</span></strong><span data-dcnode-id="1321" instrument_node="">&nbsp; France, Germany and the United Kingdom launch the idea of EU rapid-reaction units composed of joint battle groups.</span></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1315"><strong data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">December 2004:</span></strong><span data-dcnode-id="1316" instrument_node="">&nbsp;&nbsp; Beginning of the EU-led Operation Althea in Bosnia and Herzegovina.</span></p><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1310"><strong data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">September 2005:</span></strong><span data-dcnode-id="1311" instrument_node="">&nbsp;Transatlantic informal NATO-EU ministerial dinner, New York.</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1305"><strong data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">October 2005:</span></strong><span data-dcnode-id="1306" instrument_node="">&nbsp; Agreement on Military Permanent Arrangements establishing a NATO Permanent Liaison Team at the EU Military Staff and an EU cell at SHAPE.</span></p><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1300"><strong data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">November 2005:</span></strong><span data-dcnode-id="1301" instrument_node="">&nbsp; NATO Permanent Liaison Team set up at the EU Military Staff.</span></p><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1295"><strong data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">March 2006:</span></strong><span data-dcnode-id="1296" instrument_node="">&nbsp; EU cell set up at SHAPE.</span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1290"><strong data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">April 2006:</span></strong><span data-dcnode-id="1291" instrument_node="">&nbsp; Transatlantic informal NATO-EU ministerial dinner, Sofia.</span></p><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1285"><strong data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">2006 - 2010:</span></strong><span data-dcnode-id="1286" instrument_node="">&nbsp; Transatlantic informal NATO-EU ministerial dinners are held in New York (Sep. 2006); Brussels (Jan. 2007); Oslo (April 2007); New York (Sep. 2007); Brussels (Dec. 2007); New York (Sep. 2008); Brussels (Dec. 2008); Brussels (March 2009); and New York (Sep. 2010).</span></p><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1280"><strong data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">November 2010:</span></strong><span data-dcnode-id="1281" instrument_node="">&nbsp; At the Lisbon Summit, the Allies underline their determination to improve the NATO-EU strategic partnership and welcome recent initiatives from several Allies and ideas proposed by the Secretary General in this regard.</span></p><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1275"><strong data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">September 2011:&nbsp;</span></strong><span data-dcnode-id="1276" instrument_node="">&nbsp;Transatlantic informal NATO-EU ministerial dinner, New York.</span></p><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1270"><strong data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">September 2012:</span></strong><span data-dcnode-id="1271" instrument_node="">&nbsp; Transatlantic informal NATO-EU ministerial dinner, New York.</span></p><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1265"><strong data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">11 February 2013:</span></strong><span data-dcnode-id="1266" instrument_node="">&nbsp; President of the European Commission José Manuel Barroso visits NATO Headquarters.</span></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1260"><strong data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">May 2013:</span></strong><span data-dcnode-id="1261" instrument_node="">&nbsp;The NATO Secretary General addresses the European Parliament’s Committee on Foreign Affairs and Subcommittee on Security and Defence.</span></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1255"><strong data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">June 2013:</span></strong><span data-dcnode-id="1256" instrument_node="">&nbsp; The NATO Secretary General participates in an informal meeting of EU foreign ministers.</span></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1250"><strong data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">December 2013:</span></strong><span data-dcnode-id="1251" instrument_node="">&nbsp; The NATO Secretary General addresses the European Council in Brussels.</span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1245"><strong data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">5 March 2014:</span></strong><span data-dcnode-id="1246" instrument_node="">&nbsp;NATO and EU Political and Security Committee (PSC) ambassadors hold informal talks on Ukraine.</span></p><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1240"><strong data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">10 June 2014:</span></strong><span data-dcnode-id="1241" instrument_node="">&nbsp; NATO and EU PSC ambassadors hold more informal talks on Ukraine.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1235"><strong data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">10 February 2016:</span></strong><span data-dcnode-id="1236" instrument_node="">&nbsp; A Technical Arrangement on Cyber Defence was concluded between the NATO Computer Incident Response Capability (NCIRC) and the Computer Emergency Response Team of the European Union (CERT-EU), providing a framework for exchanging information and sharing best practices between emergency response teams.</span></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1230"><strong data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">11 February 2016:</span></strong><span data-dcnode-id="1231" instrument_node="">&nbsp; At the request of Germany, Greece and Turkey, NATO defence ministers agree that the Alliance should join international efforts to stem illegal trafficking and illegal migration in the Aegean Sea, cooperating with the European Union's border management agency, Frontex.</span></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1225"><strong data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">10 March 2016:</span></strong><span data-dcnode-id="1226" instrument_node="">&nbsp;Visiting the European Commission to meet Commission President Jean-Claude Juncker, NATO Secretary General Jens Stoltenberg stresses the vital importance of the NATO-EU relationship and welcomes the organisations’ deepening ties.</span></p><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1220"><strong data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">12-13 May 2016:&nbsp;</span></strong><span data-dcnode-id="1221" instrument_node="">&nbsp;An informal EU-NATO Directors General Conference takes place at NATO Headquarters to enhance staff-to-staff interaction between the organisations’ respective military staffs on topics of current relevance and common interest related to security and defence.</span></p><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1215"><strong data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">20 May 2016:</span></strong><span data-dcnode-id="1216" instrument_node="">&nbsp;High Representative Federica Mogherini visits NATO Headquarters for a meeting with NATO foreign ministers to discuss areas for expanded NATO-EU cooperation ahead of upcoming EU and NATO summit meetings.</span></p><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1210"><strong data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">24 June 2016:</span></strong><span data-dcnode-id="1211" instrument_node="">&nbsp;In a statement on the outcome of the British referendum on membership of the EU, the NATO Secretary General underlines his confidence that the United Kingdom's position in NATO will remain unchanged and that the country – a strong and committed NATO Ally – will continue to play its leading role in the Alliance.</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1205"><strong data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">July 2016:</span></strong><span data-dcnode-id="1206" instrument_node="">&nbsp;In Warsaw, a joint declaration expresses the determination to give new impetus and new substance to the NATO-EU strategic partnership in light of common challenges. Areas for strengthened cooperation include: countering hybrid threats; operational cooperation including at sea; cyber security and defence; defence capabilities; defence industrial cooperation; exercises; and building the defence capabilities of partners to the East and South.</span></p><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1200"><strong data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">27 October 2016:</span></strong><span data-dcnode-id="1201" instrument_node="">&nbsp;NATO defence ministers meet with EU High Representative Federica Mogherini and the defence ministers of Finland and Sweden to discuss ways to deepen NATO-EU cooperation in the areas of countering hybrid threats, cyber defence, coordinated exercises and supporting partners. Ministers agree to extend NATO’s deployment in the Aegean Sea in support of the efforts of Greece, Turkey and the EU’s border agency Frontex to break the lines of human trafficking. They also decide that NATO’s new Operation Sea Guardian will support the EU’s Operation Sophia in the Central Mediterranean with NATO ships and planes, ready to help increase the EU’s situational awareness and provide logistical support.</span></p><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1195"><strong data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">15 November 2016:</span></strong><span data-dcnode-id="1196" instrument_node="">&nbsp;NATO Secretary General Jens Stoltenberg meets with EU defence ministers for talks on European defence and closer NATO-EU cooperation. He stresses that efforts to strengthen European defence can contribute to a stronger NATO, through better defence capabilities and higher defence spending in Europe.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1190"><strong data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">25 November 2016:</span></strong><span data-dcnode-id="1191" instrument_node="">&nbsp;Senior officials from NATO and the EU meet to discuss the next practical steps in NATO-EU cooperation on cyber defence.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1185"><strong data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">30 November 2016:</span></strong><span data-dcnode-id="1186" instrument_node="">&nbsp;The Director General of the NATO International Military Staff and the Director General of the European Union Military Staff co-chair a conference at the EUMS Headquarters focused on increasing informal dialogue and cooperation, and supporting implementation of the NATO-EU Joint Declaration signed on the margins of the NATO Summit in Warsaw.</span></p><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1180"><strong data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">7 December 2016:</span></strong><span data-dcnode-id="1181" instrument_node="">&nbsp;NATO foreign ministers approve a series of more than 40 measures to advance how NATO and the EU work together including on countering hybrid threats, cyber defence, and making their common neighbourhood more stable and secure.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1175"><strong data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">15 December 2016:</span></strong><span data-dcnode-id="1176" instrument_node="">&nbsp;NATO Secretary General Jens Stoltenberg meets with EU leaders for talks on European defence and closer NATO-EU cooperation. He stresses that closer cooperation between NATO and the EU is important today because of new security threats, efforts to strengthen European defence and to build the partnership between Europe and North America.</span></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1170"><strong data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">10 February 2017:</span></strong><span data-dcnode-id="1171" instrument_node="">&nbsp;NATO convenes an informal workshop on how to reinforce security dialogue in the Euro-Atlantic region, focusing on the importance of NATO, the European Union and the Organization for Security and Co-operation in Europe (OSCE) supporting each other to improve existing arms control mechanisms.</span></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1165"><strong data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">24 March 2017:</span></strong><span data-dcnode-id="1166" instrument_node="">&nbsp;The North Atlantic Council and the EU’s Political and Security Committee meet to discuss NATO-EU cooperation, in particular the implementation of the joint declaration signed in Warsaw in July 2016, which led to a common set of proposals endorsed by the respective Councils of both organisations in December 2016.</span></p><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1157"><strong data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">19 June 2017:</span></strong><span data-dcnode-id="1161" instrument_node="">&nbsp;A&nbsp;</span><a data-dcnode-id="1159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/nato_static_fl2014/assets/pdf/pdf_2017_06/20170619_170614-Joint-progress-report-EU-NATO-EN.pdf"><span data-dcnode-id="1160" instrument_node="">first progress report</span></a><span data-dcnode-id="1158" instrument_node="">&nbsp;on NATO-EU Cooperation – authored jointly by NATO Secretary General Jens Stoltenberg and EU High Representative / Vice-President of the European Commission Federica Mogherini – concludes that the two organisations are making substantial progress in complementing each other’s work since the agreement in Warsaw in July 2016 to work more closely together in areas ranging from resilience to hybrid threats, through greater coherence on capability development to helping build the defence capacities of partner countries.</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1149"><strong data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">5&nbsp;December 2017:</span></strong><span data-dcnode-id="1153" instrument_node="">&nbsp;In a meeting with EU High Representative Federica Mogherini, NATO foreign ministers agree to step up NATO’s cooperation with the European Union through an additional common set of 32 new proposals on the implementation of the Joint Declaration signed by the President of the European Council, the President of the European Commission and the Secretary General of NATO. Joint work will include three new areas: military mobility, information- sharing in the fight against terrorism, and promoting women’s role in peace and security. A&nbsp;</span><a data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/nato_static_fl2014/assets/pdf/pdf_2017_11/171129-2nd-Joint-progress-report-EU-NATO-eng.pdf"><span data-dcnode-id="1152" instrument_node="">second progress report</span></a><span data-dcnode-id="1150" instrument_node="">&nbsp;&nbsp;on NATO-EU Cooperation is issued.</span></p><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1141"><strong data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">8 June 2018:</span></strong><span data-dcnode-id="1145" instrument_node="">&nbsp;A&nbsp;</span><a data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/nato_static_fl2014/assets/pdf/pdf_2018_06/20180608_180608-3rd-Joint-progress-report-EU-NATO-eng.pdf"><span data-dcnode-id="1144" instrument_node="">third progress report</span></a><span data-dcnode-id="1142" instrument_node="">&nbsp;on NATO-EU Cooperation is released to the public and highlights the qualitative and quantitative increase in cooperation between NATO and the EU.</span></p><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1133"><strong data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">10 July 2018:</span></strong><span data-dcnode-id="1137" instrument_node="">&nbsp;In a&nbsp;</span><a data-dcnode-id="1135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/official_texts_156626.htm"><span data-dcnode-id="1136" instrument_node="">joint declaration</span></a><span data-dcnode-id="1134" instrument_node="">, the President of the European Council, the President of the European Commission and the NATO Secretary General underline the importance of continued EU-NATO cooperation to address multiple and evolving security challenges as well as steps being taken by both organisations to strengthen capabilities in defence and security.</span></p><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1128"><strong data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">11 July 2018:</span></strong><span data-dcnode-id="1129" instrument_node=""> At the Brussels Summit, Allied leaders underline that the European Union remains a unique and essential partner for NATO. They welcome tangible progress made in a range of areas as well as the recent joint declaration about taking further steps to implement the common set of 74 proposals, emphasising the importance of the commitment to improve military mobility.</span></p><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1120"><strong data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">17 June 2019</span></strong><span data-dcnode-id="1124" instrument_node="">: A </span><a data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/nato_static_fl2014/assets/pdf/pdf_2019_06/190617-4th-Joint-progress-report-EU-NATO-eng.pdf"><span data-dcnode-id="1123" instrument_node="">fourth progress report</span></a><span data-dcnode-id="1121" instrument_node=""> on NATO-EU Cooperation is published.</span></p><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1112"><strong data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">16 June 2020</span></strong><span data-dcnode-id="1116" instrument_node="">: A </span><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consilium.europa.eu/media/44451/200616-progress-report-nr5-eu-nato-eng.pdf"><span data-dcnode-id="1115" instrument_node="">fifth progress report</span></a><span data-dcnode-id="1113" instrument_node=""> on NATO-EU Cooperation is published.</span></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1104"><strong data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">3 June 2021</span></strong><span data-dcnode-id="1108" instrument_node="">: A </span><a data-dcnode-id="1106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/nato_static_fl2014/assets/pdf/2021/6/pdf/210603-progress-report-nr6-EU-NATO-eng.pdf"><span data-dcnode-id="1107" instrument_node="">sixth progress report</span></a><span data-dcnode-id="1105" instrument_node=""> on NATO-EU Cooperation is published.</span></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1099"><strong data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">14 June 2021</span></strong><span data-dcnode-id="1100" instrument_node="">: At the Brussels Summit, Allied leaders emphasise unprecedented levels of NATO-EU strategic cooperation that includes addressing challenges such as resilience issues, emerging and disruptive technologies, the security implications of climate change, disinformation and the growing geostrategic competition. They reaffirm their commitment to the full implementation of the common set of 74 proposals and highlight the importance of the development of coherent, complementary and interoperable defence capabilities.</span></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1094"><strong data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">24-25 February 2022:</span></strong><span data-dcnode-id="1095" instrument_node=""> Secretary General Jens Stoltenberg meets with the President of the European Commission, Ursula von der Leyen, and the President of the European Council, Charles Michel, to discuss Russia’s unprovoked invasion of Ukraine. NATO and the EU stand united in condemning Russia’s actions, and in supporting Ukraine’s sovereignty, territorial integrity and right to self-defence. On 25 February, the EU Council President Michel and EU Commission President von der Leyen take part in an extraordinary virtual summit of Heads of State and Government of NATO Allies, plus Finland and Sweden.</span></p></div><span data-dcnode-id="1092" instrument_node="">
</span></div><span data-dcnode-id="1089" instrument_node="">
</span></li><span data-dcnode-id="1087" instrument_node="">
</span></ul><span data-dcnode-id="1085" instrument_node="">
</span></div><span data-dcnode-id="1083" instrument_node="">
</span><div class="purehtml" data-dcnode-id="1079"><div data-dcnode-id="1080"><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">&nbsp;</span></p></div></div><span data-dcnode-id="1078" instrument_node="">
</span><div class="purehtml" data-dcnode-id="1066"><div class="footnote" data-dcnode-id="1067"><span data-dcnode-id="1077" instrument_node="">
