</span><h4 data-dcnode-id="9468"><span data-dcnode-id="9469" instrument_node="">FP Live: The China Challenge</span></h4><span data-dcnode-id="9467" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="9020"><span data-dcnode-id="9466" instrument_node="">
</span><div class="past-call" data-dcnode-id="9408"><span data-dcnode-id="9465" instrument_node="">
</span><p data-dcnode-id="9454"><span data-dcnode-id="9464" instrument_node="">As the West comes together to sanction Russia over its invasion of Ukraine, China’s role is increasingly under the scanner. What are Beijing’s motives? How do recent events change U.S. policy on China? How will rising COVID-19 cases impact President Xi Jinping’s bid for a third term?
On Friday, April 15,&nbsp;</span><i data-dcnode-id="9462"><span data-dcnode-id="9463" instrument_node="">Foreign Policy</span></i><span data-dcnode-id="9461" instrument_node="">&nbsp;will launch its Spring 2022 print issue, focused on America’s China challenge. Join FP editor in chief&nbsp;</span><b data-dcnode-id="9459"><span data-dcnode-id="9460" instrument_node="">Ravi Agrawal</span></b><span data-dcnode-id="9458" instrument_node="">&nbsp;for a live discussion with two of the issue’s contributors: Hal Brands, the Henry A. Kissinger distinguished professor of global affairs at Johns Hopkins University, and Melinda Liu,&nbsp;</span><i data-dcnode-id="9456"><span data-dcnode-id="9457" instrument_node="">Newsweek</span></i><span data-dcnode-id="9455" instrument_node="">’s Beijing bureau chief.

</span><h4 data-dcnode-id="9007"><span data-dcnode-id="9008" instrument_node="">FP Live: Would Putin Use Nuclear Weapons</span></h4><span data-dcnode-id="9006" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="8553"><span data-dcnode-id="9005" instrument_node="">
</span><div class="past-call" data-dcnode-id="8941"><span data-dcnode-id="9004" instrument_node="">
</span><p data-dcnode-id="8987"><span data-dcnode-id="9003" instrument_node="">Following Russia’s unprovoked invasion of Ukraine, for the first time since the Cold War, President Vladimir Putin placed Russian nuclear forces on alert.
How likely is Russia to use nuclear weapons against a NATO country or Ukraine?







As a renewed risk of nuclear war between Russia and the West looms, join FP deputy editor&nbsp;</span><b data-dcnode-id="9001"><span data-dcnode-id="9002" instrument_node="">Sasha Polakow-Suransky</span></b><span data-dcnode-id="9000" instrument_node="">&nbsp;for a live discussion with&nbsp;</span><i data-dcnode-id="8998"><span data-dcnode-id="8999" instrument_node="">Foreign Policy</span></i><span data-dcnode-id="8997" instrument_node="">’s “It’s Debatable” columnists&nbsp;</span><b data-dcnode-id="8995"><span data-dcnode-id="8996" instrument_node="">Emma Ashford</span></b><span data-dcnode-id="8994" instrument_node="">, a senior fellow at the Atlantic Council’s Scowcroft Center for Strategy and Security, and&nbsp;</span><b data-dcnode-id="8992"><span data-dcnode-id="8993" instrument_node="">Matthew Kroenig</span></b><span data-dcnode-id="8991" instrument_node="">, the deputy director of the Scowcroft Center.</span><span class="c-message__edited_label" data-dcnode-id="8989"><span data-dcnode-id="8990" instrument_node="">&nbsp;</span></span><span data-dcnode-id="8988" instrument_node="">

</span></div><span data-dcnode-id="8542" instrument_node="">
</span><h4 data-dcnode-id="8540"><span data-dcnode-id="8541" instrument_node="">FP Live: India's Response to Putin's War</span></h4><span data-dcnode-id="8539" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="8089"><span data-dcnode-id="8538" instrument_node="">
</span><div class="past-call" data-dcnode-id="8477"><span data-dcnode-id="8537" instrument_node="">
</span><p data-dcnode-id="8523"><span data-dcnode-id="8536" instrument_node="">Why has India been reluctant to join the West in censuring Russia's invasion of Ukraine? As the White House tries to align democracies against autocracies, why is the world’s biggest democracy sitting on the fence?
Part of New Delhi’s rationale is that it has a historic reliance on Moscow for military equipment. But India also stands to gain from the current moment as it snaps up Russian oil at heavy discounts. How are India's choices impacting the world order? What will they mean for America’s broader strategy in the Asia-Pacific?
For answers, join FP editor in chief </span><b data-dcnode-id="8534"><span data-dcnode-id="8535" instrument_node="">Ravi Agrawal</span></b><span data-dcnode-id="8533" instrument_node="">&nbsp;for a live discussion with&nbsp;</span><b data-dcnode-id="8531"><span data-dcnode-id="8532" instrument_node="">Shivshankar Menon</span></b><span data-dcnode-id="8530" instrument_node="">, India's former foreign secretary and national security advisor, and&nbsp;</span><b data-dcnode-id="8528"><span data-dcnode-id="8529" instrument_node="">Suhasini Haidar</span></b><span data-dcnode-id="8527" instrument_node="">, the diplomatic affairs editor of&nbsp;</span><i data-dcnode-id="8525"><span data-dcnode-id="8526" instrument_node="">The Hindu.</span></i><span data-dcnode-id="8524" instrument_node="">
</span></p><span data-dcnode-id="8522" instrument_node="">

</span></div><span data-dcnode-id="8078" instrument_node="">
</span><h4 data-dcnode-id="8076"><span data-dcnode-id="8077" instrument_node="">FP Live: Ukraine's Humanitarian Crisis</span></h4><span data-dcnode-id="8075" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="7631"><span data-dcnode-id="8074" instrument_node="">
</span><div class="past-call" data-dcnode-id="8019"><span data-dcnode-id="8073" instrument_node="">
</span><p data-dcnode-id="8065"><span data-dcnode-id="8072" instrument_node="">Over a month into Vladimir Putin’s invasion of Ukraine, 10 million people have fled their homes and the lives they knew, in what has become the largest and fastest refugee crisis since World War II.
How will the current refugee crisis shape the future of Europe? What can be done to help Ukrainian refugees? How has racism played a role in the recent crisis?
Join FP’s editor in chief, </span><strong data-dcnode-id="8070"><span data-dcnode-id="8071" instrument_node="">Ravi Agrawal</span></strong><span data-dcnode-id="8069" instrument_node=""> for a live discussion with </span><strong data-dcnode-id="8067"><span data-dcnode-id="8068" instrument_node="">David Miliband</span></strong><span data-dcnode-id="8066" instrument_node="">, President and CEO of the International Rescue Committee as they discuss the humanitarian consequences of the war, the speed and scale of the current refugee crisis, global ramifications and more.
</span></p><span data-dcnode-id="8064" instrument_node="">

</span><p class="department-name" data-dcnode-id="7623"><b data-dcnode-id="7624"><span data-dcnode-id="7625" instrument_node="">March 28, 2022</span></b></p><span data-dcnode-id="7622" instrument_node="">
</span></div><span data-dcnode-id="7620" instrument_node="">
</span><h4 data-dcnode-id="7618"><span data-dcnode-id="7619" instrument_node="">FP Live: Women in War</span></h4><span data-dcnode-id="7617" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="7170"><span data-dcnode-id="7616" instrument_node="">
</span><div class="past-call" data-dcnode-id="7558"><span data-dcnode-id="7615" instrument_node="">
</span><p data-dcnode-id="7604"><span data-dcnode-id="7614" instrument_node="">Does Western media coverage of the war in Ukraine reinforce traditional gender roles? Why do women pay such a high price during crises?
Join FP's Executive Editor, </span><strong data-dcnode-id="7612"><span data-dcnode-id="7613" instrument_node="">Amelia Lester</span></strong><span data-dcnode-id="7611" instrument_node="">, for a live and interactive conversation with </span><strong data-dcnode-id="7609"><span data-dcnode-id="7610" instrument_node="">Roya Rahmani</span></strong><span data-dcnode-id="7608" instrument_node="">, former Afghan Ambassador to the U.S. and </span><strong data-dcnode-id="7606"><span data-dcnode-id="7607" instrument_node="">Dr. Xanthe Scharff</span></strong><span data-dcnode-id="7605" instrument_node=""> of The Fuller Project, as they explore the role of women in war, how women are disproportionately impacted by crises, and the main challenges ahead when it comes to gender equity.
</span></p><span data-dcnode-id="7603" instrument_node="">
</span><div class="fp-insider no-border" data-dcnode-id="7581"><span data-dcnode-id="7602" instrument_node="">

</span><div class="past-call" data-dcnode-id="7094"><span data-dcnode-id="7154" instrument_node="">
</span><p data-dcnode-id="7140"><span data-dcnode-id="7153" instrument_node="">Join FP Editor-in-Chief </span><strong data-dcnode-id="7151"><span data-dcnode-id="7152" instrument_node="">Ravi Agrawal</span></strong><span data-dcnode-id="7150" instrument_node=""> for a live and interactive discussion with the IMF's two top leaders: Managing Director </span><strong data-dcnode-id="7148"><span data-dcnode-id="7149" instrument_node="">Kristalina Georgieva</span></strong><span data-dcnode-id="7147" instrument_node=""> and First Deputy Managing Director </span><strong data-dcnode-id="7145"><span data-dcnode-id="7146" instrument_node="">Gita Gopinath</span></strong><span data-dcnode-id="7144" instrument_node="">. Topics will include a discussion around the global economic outlook, how the war in Ukraine is fueling inflation, the world's post-pandemic recovery, and much more.
FP Live is </span><em data-dcnode-id="7142"><span data-dcnode-id="7143" instrument_node="">Foreign Policy</span></em><span data-dcnode-id="7141" instrument_node="">’s forum for live journalism, bringing in-depth discussions with leading foreign-policy experts and thinkers exclusively to FP’s subscribers. The March 22 FP Live will be live-streamed to the public.

</span><h4 data-dcnode-id="6693"><span data-dcnode-id="6694" instrument_node="">FP Live: The Road Ahead for Ukraine</span></h4><span data-dcnode-id="6692" instrument_node="">

</span><p data-dcnode-id="6682"><span data-dcnode-id="6689" instrument_node="">As Russian President Vladimir Putin's war in Ukraine rages into a fourth week, join Foreign Policy Editor-in-Chief </span><strong data-dcnode-id="6687"><span data-dcnode-id="6688" instrument_node="">Ravi Agrawal</span></strong><span data-dcnode-id="6686" instrument_node=""> for a live and interactive discussion with </span><strong data-dcnode-id="6684"><span data-dcnode-id="6685" instrument_node="">Ian Bremmer</span></strong><span data-dcnode-id="6683" instrument_node="">, president and founder of Eurasia Group and GZERO Media. The two will discuss the European and U.S. response to the war in Ukraine, China’s role in the conflict, and the geopolitical and global ripple effects from a historic last few weeks.

</span><h4 data-dcnode-id="6235"><span data-dcnode-id="6236" instrument_node="">FP Live: How to End Putin's War in Ukraine</span></h4><span data-dcnode-id="6234" instrument_node="">

</span><p data-dcnode-id="6224"><span data-dcnode-id="6231" instrument_node="">As Russia escalates its war on Ukraine, the humanitarian crisis in the country deepens, and calls for Western assistance to defend the country grow. Should the West be playing a larger role? What steps should be taken to avoid any nuclear consequences? How far will Russian President Vladimir Putin go?

</span><h4 data-dcnode-id="5777"><span data-dcnode-id="5778" instrument_node="">FP Live: What is Next for Ukraine?</span></h4><span data-dcnode-id="5776" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="5323"><span data-dcnode-id="5775" instrument_node="">
</span><div class="past-call" data-dcnode-id="5711"><span data-dcnode-id="5774" instrument_node="">
</span><p data-dcnode-id="5757"><span data-dcnode-id="5773" instrument_node="">


As Russian armed forces invade Ukraine from several directions, and the West responds with sanctions, how far will Russian President Vladimir Putin go? What options remain on the table to stop him? And what happens to Ukraine’s population and its economy? Join FP Editor-in-Chief </span><b data-dcnode-id="5771"><span data-dcnode-id="5772" instrument_node="">Ravi Agrawal</span></b><span data-dcnode-id="5770" instrument_node="">&nbsp;for a live conversation with three foreign-policy experts:&nbsp;</span><b data-dcnode-id="5768"><span data-dcnode-id="5769" instrument_node="">Anne-Marie Slaughter</span></b><span data-dcnode-id="5767" instrument_node="">, the CEO of New America and a former Director of Policy Planning at the State Department,&nbsp;</span><b data-dcnode-id="5765"><span data-dcnode-id="5766" instrument_node="">Angela Stent</span></b><span data-dcnode-id="5764" instrument_node="">, a former U.S. intelligence officer on Russia and the author of&nbsp;</span><i data-dcnode-id="5762"><span data-dcnode-id="5763" instrument_node="">Putin’s World: Russia Against the West and With the Rest</span></i><span data-dcnode-id="5761" instrument_node="">, and&nbsp;</span><b data-dcnode-id="5759"><span data-dcnode-id="5760" instrument_node="">David Miliband</span></b><span data-dcnode-id="5758" instrument_node="">, President and CEO of the International Rescue Committee and the UK’s former foreign secretary.



</span></p><span data-dcnode-id="5756" instrument_node="">

</span><h4 data-dcnode-id="4847"><span data-dcnode-id="4848" instrument_node="">FP Live: How Europe Can Manage Russia</span></h4><span data-dcnode-id="4846" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="4408"><span data-dcnode-id="4845" instrument_node="">
</span><div class="past-call" data-dcnode-id="4796"><span data-dcnode-id="4844" instrument_node="">
</span><p data-dcnode-id="4842"><span data-dcnode-id="4843" instrument_node="">The threat of a Russian invasion of Ukraine continues to hang over global politics. Europe’s leaders are trying to find diplomatic solutions to the crisis while also preparing for the worst by bolstering Kyiv’s defenses and racing to explore alternatives to Russian energy sources. But within Europe, there is a variety of opinions on how best to respond, which Russian President Vladimir Putin may seek to exploit. What are Europe’s options? How can it come together to make war too costly to countenance? And how can the United States help?

</span><div class="past-call" data-dcnode-id="4338"><span data-dcnode-id="4392" instrument_node="">
</span><p data-dcnode-id="4384"><span data-dcnode-id="4391" instrument_node="">War looms in Ukraine. The pandemic continues its deadly spread. Tensions with China escalate. And Washington seems more dysfunctional than ever. U.S. President Joe Biden has had crises thrown his way from Kabul to Kyiv. Amid the chaos, has a coherent foreign policy emerged?</span><strong data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node=""> Jack Detsch</span></strong><span data-dcnode-id="4388" instrument_node=""> and </span><strong data-dcnode-id="4386"><span data-dcnode-id="4387" instrument_node="">Robbie Gramer</span></strong><span data-dcnode-id="4385" instrument_node=""> give their report card on Biden’s first year, drawing on interviews with dozens of foreign dignitaries and experts.

</span><h4 data-dcnode-id="4301"><span data-dcnode-id="4302" instrument_node="">FP Live: Is Russia Going to War in Ukraine (Again)?</span></h4><span data-dcnode-id="4300" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="3853"><span data-dcnode-id="4299" instrument_node="">
</span><div class="past-call" data-dcnode-id="4241"><span data-dcnode-id="4298" instrument_node="">
</span><p data-dcnode-id="4287"><span data-dcnode-id="4297" instrument_node="">High-level talks between the United States and Russia this week haven’t altered Washington’s perception that Moscow may invade Ukraine. But what are the calculations behind Russian President Vladimir Putin’s ultimate decision? What could stop him? What cards do Washington, Kyiv, and Brussels still have to play? Join FP editor in chief </span><b data-dcnode-id="4295"><span data-dcnode-id="4296" instrument_node="">Ravi Agrawal</span></b><span data-dcnode-id="4294" instrument_node="">&nbsp;for a discussion with&nbsp;</span><b data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">Amy Mackinnon&nbsp;</span></b><span data-dcnode-id="4291" instrument_node="">and former U.S. Ambassador to Russia&nbsp;</span><b data-dcnode-id="4289"><span data-dcnode-id="4290" instrument_node="">Michael McFaul</span></b><span data-dcnode-id="4288" instrument_node="">.
</span></p><span data-dcnode-id="4286" instrument_node="">

</span><h4 data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">FP Live: UNGA 2021</span></h4><span data-dcnode-id="3661" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="3586"><span data-dcnode-id="3660" instrument_node="">
</span><div class="past-call" data-dcnode-id="3605"><span data-dcnode-id="3659" instrument_node="">
</span><p data-dcnode-id="3651"><span data-dcnode-id="3658" instrument_node="">It's like the Superbowl for diplomats. Hundreds of world leaders, top diplomats, and business executives are convening for the United Nations' annual General Assembly in September, partly in person and partly virtually amid pandemic concerns. Join FP reporters&nbsp;</span><b data-dcnode-id="3656"><span data-dcnode-id="3657" instrument_node="">Colum Lynch</span></b><span data-dcnode-id="3655" instrument_node="">&nbsp;and&nbsp;</span><b data-dcnode-id="3653"><span data-dcnode-id="3654" instrument_node="">Robbie Gramer</span></b><span data-dcnode-id="3652" instrument_node="">&nbsp;as they provide a sneak peek on the biggest diplomatic event of the year. From Biden's agenda to U.N. campaigns on climate change and refugees, they'll open up their reporter's notebooks to take you inside the planning and priorities for the 76th annual U.N. General Assembly.
</span></p><span data-dcnode-id="3650" instrument_node="">
</span><div class="fp-insider no-border" data-dcnode-id="3628"><span data-dcnode-id="3649" instrument_node="">

</span><h4 data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">FP Live: What’s Next for Afghanistan?</span></h4><span data-dcnode-id="3572" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="3491"><span data-dcnode-id="3571" instrument_node="">
</span><div class="past-call" data-dcnode-id="3510"><span data-dcnode-id="3570" instrument_node="">
</span><p data-dcnode-id="3556"><span data-dcnode-id="3569" instrument_node="">Now that the Taliban have taken over Kabul, what does the future of Afghanistan look like? What role can the United States still play? What about China, India, Iran, and Pakistan? Join FP editor in chief </span><b data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">Ravi Agrawal</span></b><span data-dcnode-id="3566" instrument_node=""> for a conversation with correspondent </span><strong data-dcnode-id="3564"><span data-dcnode-id="3565" instrument_node="">Lynne O’Donnell</span></strong><span data-dcnode-id="3563" instrument_node="">, who left Kabul right after the city fell (and after filing&nbsp;</span><a data-dcnode-id="3561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foreignpolicy.com/2021/08/15/kabul-falls-taliban-ghani-flees-afghanistan/"><span data-dcnode-id="3562" instrument_node="">this dispatch</span></a><span data-dcnode-id="3560" instrument_node=""> for FP), and </span><strong data-dcnode-id="3558"><span data-dcnode-id="3559" instrument_node="">Ashley Jackson</span></strong><span data-dcnode-id="3557" instrument_node="">, co-director of the Centre for the Study of Armed Groups at the Overseas Development Institute.

</span><h4 data-dcnode-id="3478"><span data-dcnode-id="3479" instrument_node="">SitRep Live: Can Europe Make Nice With a Post-Trump America?</span></h4><span data-dcnode-id="3477" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="3399"><span data-dcnode-id="3476" instrument_node="">
</span><div class="past-call" data-dcnode-id="3418"><span data-dcnode-id="3475" instrument_node="">
</span><p data-dcnode-id="3464"><span data-dcnode-id="3474" instrument_node="">U.S. President Joe Biden has been getting a warm reception from European leaders since he took office, but with differences emerging between the United States and European Union on major foreign-policy issues, how long is the honeymoon going to last? SitRep’s&nbsp;</span><b data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">Jack Detsch</span></b><span data-dcnode-id="3471" instrument_node="">&nbsp;and&nbsp;</span><b data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">Robbie Gramer</span></b><span data-dcnode-id="3468" instrument_node="">&nbsp;are back, in conversation with FP's executive editor&nbsp;</span><b data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">Amelia Lester,</span></b><span data-dcnode-id="3465" instrument_node=""> to give subscribers the inside scoop about the key sticking points dividing the White House and European capitals. And, as always, they’ll also have new nuggets and stories to share from their reporters’ notebooks.
</span></p><span data-dcnode-id="3463" instrument_node="">
</span><div class="fp-insider no-border" data-dcnode-id="3441"><span data-dcnode-id="3462" instrument_node="">

</span><div class="date-time" data-dcnode-id="3389"><span data-dcnode-id="3394" instrument_node="">
</span><p class="department-name" data-dcnode-id="3391"><b data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">July 15, 2021</span></b></p><span data-dcnode-id="3390" instrument_node="">
</span></div><span data-dcnode-id="3388" instrument_node="">
</span><h4 data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">FP Live: The New Economics Playbook</span></h4><span data-dcnode-id="3385" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="3304"><span data-dcnode-id="3384" instrument_node="">
</span><div class="past-call" data-dcnode-id="3323"><span data-dcnode-id="3383" instrument_node="">
</span><p data-dcnode-id="3369"><span data-dcnode-id="3382" instrument_node="">After the financial crisis and COVID-19, decades of economic orthodoxy are being thrown out as the world rearranges itself. For our summer issue, and to help us think about what comes next, FP asked leading economists and thinkers to describe the new,&nbsp;post-pandemic era. We also asked them to give it a name. FP Senior Advisor&nbsp;</span><b data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">Antoine Van Agtmael,&nbsp;</span></b><span data-dcnode-id="3379" instrument_node="">who coined the term "emerging markets," has done it again with his pithy summation of the West's conviction that it can spend itself out of trouble: Fuzzynomics. As governments try out novel ways to contain the pressures of inflation,&nbsp;</span><b data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">Professor Stephanie Kelton&nbsp;</span></b><span data-dcnode-id="3376" instrument_node="">dubs&nbsp;this The Experimental Economy. And FP Senior Correspondent&nbsp;</span><b data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">Mike Hirsh</span></b><span data-dcnode-id="3373" instrument_node=""> offers up Bidenomics, a new form of economic nationalism. Don't miss these guests in conversation with FP’s editor in chief </span><b data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">Ravi&nbsp;Agrawal&nbsp;</span></b><span data-dcnode-id="3370" instrument_node="">on how to define these unprecedented times.
</span></p><span data-dcnode-id="3368" instrument_node="">
</span><div class="fp-insider no-border" data-dcnode-id="3346"><span data-dcnode-id="3367" instrument_node="">

</span><h4 data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">SitRep Live: The U.S. Just Can’t Quit Afghanistan</span></h4><span data-dcnode-id="3290" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="3212"><span data-dcnode-id="3289" instrument_node="">
</span><div class="past-call" data-dcnode-id="3231"><span data-dcnode-id="3288" instrument_node="">
</span><p data-dcnode-id="3277"><span data-dcnode-id="3287" instrument_node="">The clock is ticking on the Biden administration’s withdrawal of U.S. troops from Afghanistan—and its counterterrorism game plan.&nbsp;</span><span class="il" data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">SitRep</span></span><span data-dcnode-id="3284" instrument_node="">’s </span><strong data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">Jack Detsch</span></strong><span data-dcnode-id="3281" instrument_node=""> and </span><strong data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">Robbie Gramer</span></strong><span data-dcnode-id="3278" instrument_node=""> are back for another call to fill subscribers in on the key debates at the White House, in the Pentagon, and on Capitol Hill as America’s longest war comes to an end. They’ll also take your questions on all things national security and diplomacy, and share some juicy tidbits from their notebooks.

</span><h4 data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">FP Live: Iran Votes</span></h4><span data-dcnode-id="3198" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="3109"><span data-dcnode-id="3197" instrument_node="">
</span><div class="past-call" data-dcnode-id="3128"><span data-dcnode-id="3196" instrument_node="">
</span><p data-dcnode-id="3174"><span data-dcnode-id="3194" style="font-weight: 400"><span data-dcnode-id="3195" instrument_node="">Voters in the Islamic Republic of Iran head to the polls on Friday, June 18. Experts say the winner is all but pre-determined: Ebrahim Raisi, a favorite of Supreme Leader Ayatollah Ali Khamanei. But what will new leadership in Iran mean for the country’s politics? What will it mean for regional dynamics? And what implications will there be for negotiations over a nuclear deal with the United States and Europe? </span></span><span data-dcnode-id="3192" style="font-weight: 400"><span data-dcnode-id="3193" instrument_node="">Listen to FP’s editor in chief </span></span><b data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">Ravi Agrawal's </span></b><span data-dcnode-id="3188" style="font-weight: 400"><span data-dcnode-id="3189" instrument_node="">conversation with Iran experts </span></span><b data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">Dina Esfandiary</span></b><span data-dcnode-id="3184" style="font-weight: 400"><span data-dcnode-id="3185" instrument_node=""> and </span></span><b data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">Karim Sadjadpour</span></b><span data-dcnode-id="3180" style="font-weight: 400"><span data-dcnode-id="3181" instrument_node=""> that happened on</span></span><b data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node=""> June 17 at 11 a.m. EDT</span></b><span data-dcnode-id="3176" style="font-weight: 400"><span data-dcnode-id="3177" instrument_node=""> to find out.&nbsp;</span></span><span data-dcnode-id="3175" instrument_node="">
</span></p><span data-dcnode-id="3173" instrument_node="">

</span><h4 data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">FP Conference Call: The Elections Shaping Latin America in 2021</span></h4><span data-dcnode-id="3003" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="2928"><span data-dcnode-id="3002" instrument_node="">
</span><div class="past-call" data-dcnode-id="2947"><span data-dcnode-id="3001" instrument_node="">
</span><p data-dcnode-id="2993"><span data-dcnode-id="3000" instrument_node="">This year, nine countries in Latin America will hold elections, many including a presidential vote. With elections happening this month in Ecuador, Peru, and Bolivia, FP invites you to join us to explore the potential ramifications of this year’s voting in Latin America.
How has COVID-19 impacted voters? What can these elections tell us about the direction of politics in Latin America?
Join FP’s executive editor </span><strong data-dcnode-id="2998"><span data-dcnode-id="2999" instrument_node="">Amelia Lester</span></strong><span data-dcnode-id="2997" instrument_node=""> and Latin America Brief author </span><strong data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">Catherine Osborn</span></strong><span data-dcnode-id="2994" instrument_node=""> on Wednesday, April 14th for immediate reactions to recent elections and a look ahead to those later this year.

</span><h4 data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">The Navalny Protests: Will Unrest Weaken Putin's Grip on Power?</span></h4><span data-dcnode-id="2742" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="2655"><span data-dcnode-id="2741" instrument_node="">
</span><div class="past-call" data-dcnode-id="2674"><span data-dcnode-id="2740" instrument_node="">
</span><p data-dcnode-id="2720"><span data-dcnode-id="2738" style="font-weight: 400"><span data-dcnode-id="2739" instrument_node="">Russian opposition leader Alexei Navalny was sentenced to two years and eight months in a penal colony on Tuesday, but tens of thousands of people took to the streets to protest his treatment by authorities.&nbsp;</span></span><span data-dcnode-id="2737" instrument_node="">
</span><span data-dcnode-id="2735" style="font-weight: 400"><span data-dcnode-id="2736" instrument_node="">Join</span></span><i data-dcnode-id="2732"><span data-dcnode-id="2733" style="font-weight: 400"><span data-dcnode-id="2734" instrument_node=""> Foreign Policy</span></span></i><span data-dcnode-id="2722" style="font-weight: 400"><span data-dcnode-id="2731" instrument_node=""> as we explore what this vast opposition movement means for Putin and his grip on power in a discussion with executive editor </span><strong data-dcnode-id="2728"><a data-dcnode-id="2729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foreignpolicy.com/author/amelia-lester/"><span data-dcnode-id="2730" instrument_node="">Amelia Lester</span></a></strong><span data-dcnode-id="2727" instrument_node=""> and national security and intelligence writer </span><strong data-dcnode-id="2724"><a data-dcnode-id="2725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foreignpolicy.com/author/amy-mackinnon/"><span data-dcnode-id="2726" instrument_node="">Amy Mackinnon</span></a></strong><span data-dcnode-id="2723" instrument_node="">, who has reported extensively in the region.</span></span><span data-dcnode-id="2721" instrument_node="">

</span><h4 data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">A New Chapter: Biden’s First Foreign-Policy Speech, Decoded</span></h4><span data-dcnode-id="2641" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="2555"><span data-dcnode-id="2640" instrument_node="">
</span><div class="past-call" data-dcnode-id="2574"><span data-dcnode-id="2639" instrument_node="">
</span><p data-dcnode-id="2620"><span data-dcnode-id="2622" style="font-weight: 400"><span data-dcnode-id="2638" instrument_node="">President Joe Biden will deliver his first major address on foreign policy in a visit to the State Department this week. Following his remarks, join </span><em data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">Foreign Policy</span></em><span data-dcnode-id="2635" instrument_node=""> as we explore what was—and wasn't—said, and what his speech can tell us about his priorities abroad. FP's editor in chief </span><a data-dcnode-id="2632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foreignpolicy.com/author/ravi-agrawal/"><strong data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">Ravi Agrawal</span></strong></a><span data-dcnode-id="2631" instrument_node=""> will moderate a conversation with </span><a data-dcnode-id="2628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foreignpolicy.com/author/michael-hirsh/"><strong data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">Michael Hirsh</span></strong></a><span data-dcnode-id="2627" instrument_node="">, FP's senior correspondent, and </span><a data-dcnode-id="2624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foreignpolicy.com/author/elise-labott/"><strong data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">Elise Labott</span></strong></a><span data-dcnode-id="2623" instrument_node="">, a journalist and adjunct professor at American University.</span></span><span data-dcnode-id="2621" instrument_node="">
</span></p><span data-dcnode-id="2619" instrument_node="">
</span><div class="fp-insider no-border" data-dcnode-id="2597"><span data-dcnode-id="2618" instrument_node="">

</span><p data-dcnode-id="2439"><span data-dcnode-id="2443" instrument_node="">This year marks the 50th anniversary of </span><em data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">Foreign Policy</span></em><span data-dcnode-id="2440" instrument_node=""> magazine. To celebrate its half-century as one of the world's most influential publications on international affairs, FP's editor-at-large Jonathan Tepperman will join FP contributors Daniel Drezner of Tufts University and Charli Carpenter of the University of Massachusetts-Amherst in a look back at some of FP's best—and worst—ideas over the years, and a look forward toward what's to come for FP and U.S. foreign policy.

</span><h4 data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">Race for the Arctic</span></h4><span data-dcnode-id="2360" instrument_node="">

</span><p data-dcnode-id="2346"><span data-dcnode-id="2357" instrument_node="">Changes in the Arctic are enabling access to a range of highly valuable resources across the region. With new players, commercial relationships, and extensive military buildup emerging, there has been an increase in international tensions surrounding the Arctic. Join </span><em data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">Foreign Policy</span></em><span data-dcnode-id="2354" instrument_node=""> and FP Analytics as they host a discussion with experts on the region in this exclusive </span><strong data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">FP Insider Briefing</span></strong><span data-dcnode-id="2351" instrument_node="">. This call will feature key findings and takeaways from the </span><em data-dcnode-id="2348"><a data-dcnode-id="2349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foreignpolicy.com/2020/10/13/arctic-competition-resources-governance-critical-minerals-shipping-climate-change-power-map/"><span data-dcnode-id="2350" instrument_node="">Arctic Competition Power Map</span></a></em><span data-dcnode-id="2347" instrument_node="">.

</span><p data-dcnode-id="2150"><span data-dcnode-id="2166" instrument_node="">The 2020 U.S. presidential election was, in many ways, a global one. What are the foreign-policy implications of Joe Biden's victory, and what will it mean for key countries around the world? </span><em data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">Foreign Policy</span></em><span data-dcnode-id="2163" instrument_node=""> editor in chief </span><strong data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">Jonathan Tepperman</span></strong><span data-dcnode-id="2160" instrument_node=""> was joined by </span><strong data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">Edward Luce</span></strong><span data-dcnode-id="2157" instrument_node="">, U.S. national editor and columnist at the </span><em data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Financial Times</span></em><span data-dcnode-id="2154" instrument_node="">, and </span><strong data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Kori Schake</span></strong><span data-dcnode-id="2151" instrument_node="">, director of foreign and defense policy studies at the American Enterprise Institute.

</span><p data-dcnode-id="1858"><em data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Foreign Policy</span></em><span data-dcnode-id="1874" instrument_node=""> and FP Analytics hosted a special </span><strong data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">Insider Briefing</span></strong><span data-dcnode-id="1871" instrument_node=""> on the </span><a data-dcnode-id="1868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//globalresponseindex.foreignpolicy.com/"><em data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">COVID-19 Global Response Index</span></em></a><span data-dcnode-id="1867" instrument_node="">, a first-of-its-kind assessment of national leaders’ responses to the coronavirus crisis in key policy areas.

</span><p data-dcnode-id="1746"><span data-dcnode-id="1775" style="font-weight: 400"><span data-dcnode-id="1776" instrument_node="">Though we're far from the end of the COVID crisis, experts and leaders around the world are beginning to ponder how to use the pandemic to press for deep, sweeping political, economic, and social reforms that can't muster the necessary support during normal times. </span></span><i data-dcnode-id="1772"><span data-dcnode-id="1773" style="font-weight: 400"><span data-dcnode-id="1774" instrument_node="">Foreign Policy</span></span></i><span data-dcnode-id="1770" style="font-weight: 400"><span data-dcnode-id="1771" instrument_node=""> editor in chief </span></span><b data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">Jonathan Tepperman</span></b><span data-dcnode-id="1766" style="font-weight: 400"><span data-dcnode-id="1767" instrument_node=""> spoke with two authors from our summer print issue: </span></span><b data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Sheri Berman</span></b><span data-dcnode-id="1762" style="font-weight: 400"><span data-dcnode-id="1763" instrument_node="">, who wrote on </span></span><a data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foreignpolicy.com/2020/07/04/coronavirus-crisis-turning-point-change/"><span data-dcnode-id="1760" style="font-weight: 400"><span data-dcnode-id="1761" instrument_node="">when crises actually produce positive change</span></span></a><span data-dcnode-id="1757" style="font-weight: 400"><span data-dcnode-id="1758" instrument_node="">—and when they don't, and why. And Yale’s </span></span><b data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Oona Hathaway</span></b><span data-dcnode-id="1753" style="font-weight: 400"><span data-dcnode-id="1754" instrument_node=""> takes on the question of </span></span><a data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foreignpolicy.com/2020/07/04/after-hegemony/"><span data-dcnode-id="1751" style="font-weight: 400"><span data-dcnode-id="1752" instrument_node="">how the world can fill the leadership gap</span></span></a><span data-dcnode-id="1748" style="font-weight: 400"><span data-dcnode-id="1749" instrument_node=""> now that Washington has abandoned its traditional role.</span></span><span data-dcnode-id="1747" instrument_node="">
</span></p><span data-dcnode-id="1745" instrument_node="">

</span></div><span data-dcnode-id="1670" instrument_node="">
</span><h4 data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">The Coronavirus Crisis: What the Rest of 2020 Will Look Like</span></h4><span data-dcnode-id="1667" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="1583"><span data-dcnode-id="1666" instrument_node="">
</span><div class="past-call" data-dcnode-id="1602"><span data-dcnode-id="1665" instrument_node="">
</span><p data-dcnode-id="1648"><span data-dcnode-id="1664" instrument_node="">The United States continues to set daily records for coronavirus infections. India, the world’s biggest democracy, now has the third-most confirmed cases in the world. But European countries, which set the early pace, seem to have flattened their initial curves.
What explains the relative success and failure of countries in dealing with COVID-19? What is the road ahead? And how will it impact the United States and other major countries in the coming months?
</span><em data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Foreign Policy</span></em><span data-dcnode-id="1661" instrument_node=""> managing editor </span><strong data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Ravi Agrawal</span></strong><span data-dcnode-id="1658" instrument_node=""> interviewed </span><strong data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">Ashish Jha</span></strong><span data-dcnode-id="1655" instrument_node="">, faculty director of the Harvard Global Health Institute, in this special FP Insider virtual event. </span><strong data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">Allison Carlson</span></strong><span data-dcnode-id="1652" instrument_node="">, managing director of FP Analytics, also offered a preview of her team's forthcoming </span><em data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">COVID Global Response Index</span></em><span data-dcnode-id="1649" instrument_node="">, a new special report assessing countries’ responsiveness to the coronavirus.
</span></p><span data-dcnode-id="1647" instrument_node="">

</span><h4 data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">The Coronavirus and U.S. National Security</span></h4><span data-dcnode-id="1569" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="1488"><span data-dcnode-id="1568" instrument_node="">
</span><div class="past-call" data-dcnode-id="1507"><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1553"><span data-dcnode-id="1566" instrument_node="">What impact have the recent nationwide protests and the global pandemic had on America's security and its interests around the globe? How has it affected the strategic balance and Washington's rivalries with Beijing, Moscow, Tehran, and others?
Hear </span><em data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Foreign Policy</span></em><span data-dcnode-id="1563" instrument_node=""> editor in chief </span><strong data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Jonathan Tepperman</span></strong><span data-dcnode-id="1560" instrument_node=""> in conversation with </span><strong data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Jake Sullivan</span></strong><span data-dcnode-id="1557" instrument_node="">, a senior foreign-policy advisor to Democratic presidential candidate Joe Biden, and </span><strong data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Kori Schake</span></strong><span data-dcnode-id="1554" instrument_node="">, the director of foreign and defense policy studies at American Enterprise Institute, to find out.
</span></p><span data-dcnode-id="1552" instrument_node="">

</span><p class="department-name" data-dcnode-id="1480"><b data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">May 15, 2020</span></b></p><span data-dcnode-id="1479" instrument_node="">
</span></div><span data-dcnode-id="1477" instrument_node="">
</span><h4 data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Emerging Markets and the Coronavirus</span></h4><span data-dcnode-id="1474" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="1396"><span data-dcnode-id="1473" instrument_node="">
</span><div class="past-call" data-dcnode-id="1415"><span data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1471" instrument_node="">While the coronavirus has so far been deadliest in the United States and Western Europe, emerging markets across Asia, Latin America, and Africa are bracing not only for a health care crisis but also for capital outflows, fiscal crises, and even government defaults. How bad will things get? What steps can governments take to safeguard their economies? How will their private sectors cope?
Managing editor </span><strong data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Ravi Agrawal</span></strong><span data-dcnode-id="1468" instrument_node=""> was joined in conversation by </span><strong data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Ruchir Sharma</span></strong><span data-dcnode-id="1465" instrument_node="">, Morgan Stanley's head of emerging markets and chief global strategist, and </span><strong data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Dambisa Moyo</span></strong><span data-dcnode-id="1462" instrument_node="">, an economist and author.
</span></p><span data-dcnode-id="1460" instrument_node="">

</span><p class="department-name" data-dcnode-id="1388"><b data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">May 8, 2020</span></b></p><span data-dcnode-id="1387" instrument_node="">

</span><h4 data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Supply Chains in a Deglobalized World</span></h4><span data-dcnode-id="1382" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="1304"><span data-dcnode-id="1381" instrument_node="">
</span><div class="past-call" data-dcnode-id="1323"><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1369"><span data-dcnode-id="1379" instrument_node="">Even before the novel coronavirus hit, rising protectionism and trade tensions were weakening globalization. Now the pandemic is shattering international supply chains that took decades to build. What impact will these changes have on the economy and on international relations more broadly? And what can be done to restore or replace supply chains once the crisis is over? Editor in chief </span><strong data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Jonathan Tepperman</span></strong><span data-dcnode-id="1376" instrument_node=""> spoke with </span><strong data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Elisabeth Braw</span></strong><span data-dcnode-id="1373" instrument_node="">, FP columnist and the director of the Modern Deterrence project at the Royal United Services Institute, and </span><strong data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Shannon K. O’Neil</span></strong><span data-dcnode-id="1370" instrument_node="">, the Nelson and David Rockefeller senior fellow for Latin America studies at the Council on Foreign Relations.
</span></p><span data-dcnode-id="1368" instrument_node="">

</span><h4 data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">How Cities Are Leading the Fight Against the Coronavirus</span></h4><span data-dcnode-id="1290" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="1209"><span data-dcnode-id="1289" instrument_node="">
</span><div class="past-call" data-dcnode-id="1228"><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1287" instrument_node="">All around the world, city governments are leading the battle against the coronavirus pandemic — serving as policy laboratories and, in many cases, their citizens' first and last line of defense.&nbsp;</span><em data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Foreign Policy</span></em><span data-dcnode-id="1284" instrument_node=""> editor in chief </span><strong data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Jonathan Tepperman</span></strong><span data-dcnode-id="1281" instrument_node=""> spoke with two guests &nbsp;on the front lines of combatting crises in New York and Singapore: </span><strong data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Dan Doctoroff,</span></strong><span data-dcnode-id="1278" instrument_node=""> a former deputy mayor for New York City and chairman and chief executive of Sidewalk Labs, and</span><strong data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node=""> K. Shanmugam,</span></strong><span data-dcnode-id="1275" instrument_node=""> Singapore’s minister for law and home affairs.
</span></p><span data-dcnode-id="1273" instrument_node="">
</span><div class="fp-insider no-border" data-dcnode-id="1251"><span data-dcnode-id="1272" instrument_node="">

</span><h4 data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">How Will the Coronavirus Affect Great-Power Competition?</span></h4><span data-dcnode-id="1195" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="1117"><span data-dcnode-id="1194" instrument_node="">
</span><div class="past-call" data-dcnode-id="1136"><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1192" instrument_node="">he pandemic is already rewriting international relations, as nations turn their focus inward and struggle to save their citizens and their economies. But what will this mean for great-power competition and national security? FP editor in chief </span><strong data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Jonathan Tepperman</span></strong><span data-dcnode-id="1189" instrument_node=""> was joined in conversation with </span><strong data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Fiona Hill</span></strong><span data-dcnode-id="1186" instrument_node="">, senior fellow in the Center on the United States and Europe in the Foreign Policy program at the Brookings Institution, and </span><strong data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Kurt Campbell</span></strong><span data-dcnode-id="1183" instrument_node="">, chairman and chief executive officer of the Asia Group.

</span><h4 data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">How is the Pandemic Affecting Oil Markets?</span></h4><span data-dcnode-id="1103" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="1025"><span data-dcnode-id="1102" instrument_node="">
</span><div class="past-call" data-dcnode-id="1044"><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1100" instrument_node="">Global oil prices are plummeting because of the coronavirus crisis and a destabilizing price war between Saudi Arabia and Russia, two of the world's largest producers. As the White House sends mixed messages and economic disruptions spread, FP explores these recent developments and their impact on oil markets. FP editor in chief </span><b data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Jonathan Tepperman</span></b><span data-dcnode-id="1097" instrument_node=""> was joined in conversation with </span><b data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Jason Bordoff</span></b><span data-dcnode-id="1094" instrument_node="">, founding director of the Center on Global Energy Policy at Columbia University and a former special assistant to President Barack Obama and senior director on the staff of the National Security Council, and </span><b data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Helima Croft</span></b><span data-dcnode-id="1091" instrument_node="">, managing director and global head of commodity strategy at RBC Capital Markets.

</span><h4 data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Coronavirus and the Global Economy</span></h4><span data-dcnode-id="1011" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="933"><span data-dcnode-id="1010" instrument_node="">
</span><div class="past-call" data-dcnode-id="952"><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="1008" instrument_node="">Amid the rapid spread of the coronavirus, countries around the world have sealed their borders, shut businesses, and asked their citizens to stay indoors. The global economy has been forced to a halt. What happens next? </span><b data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Raghuram Rajan</span></b><span data-dcnode-id="1005" instrument_node="">, former chief economist of the International Monetary Fund and former Governor of India’s central bank, </span><b data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Adam Posen</span></b><span data-dcnode-id="1002" instrument_node="">, president of Peterson Institute for International Economics, and </span><b data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Ravi Agrawal</span></b><span data-dcnode-id="999" instrument_node="">, FP managing editor, explore the measures governments can put in place to limit long-term economic fallout, and what options central banks have left in their toolkits.
</span></p><span data-dcnode-id="997" instrument_node="">

</span><h4 data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Understanding the Afghan Peace Deal</span></h4><span data-dcnode-id="919" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="838"><span data-dcnode-id="918" instrument_node="">
</span><div class="past-call" data-dcnode-id="857"><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="916" instrument_node="">Violence has returned in Afghanistan — just days after the United States and the Taliban agreed to a peace deal. What happens now? And what does it mean for the future of the region? </span><i data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Foreign Policy</span></i><span data-dcnode-id="913" instrument_node=""> editor in chief </span><b data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Jonathan Tepperman</span></b><span data-dcnode-id="910" instrument_node=""> and experts </span><b data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Peter Bergen</span></b><span data-dcnode-id="907" instrument_node="">, a national security analyst and vice president at New America, and </span><b data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Husain Haqqani</span></b><span data-dcnode-id="904" instrument_node="">, senior fellow and director for South and Central Asia at Hudson Institute, take your questions.

</span><h4 data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Coronavirus: The Global Impacts, How to Stop It, and How to Stay Safe</span></h4><span data-dcnode-id="824" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="743"><span data-dcnode-id="823" instrument_node="">
</span><div class="past-call" data-dcnode-id="762"><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="821" instrument_node="">As the new coronavirus spreads worldwide despite drastic measures taken by the Chinese government, what can be done to stop the epidemic? What are the business and political impacts? And how can regular people stay safe? Join </span><i data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Foreign Policy</span></i><span data-dcnode-id="818" instrument_node=""> managing editor </span><b data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Ravi Agrawal</span></b><span data-dcnode-id="815" instrument_node=""> in conversation with two expert guests for answers: Pulitzer Prize-winning FP science columnist </span><b data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Laurie Garrett</span></b><span data-dcnode-id="812" instrument_node="">, who spent several months covering the SARS crisis nearly two decades ago, and FP senior editor and China Brief newsletter author </span><b data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">James Palmer</span></b><span data-dcnode-id="809" instrument_node="">.

</span><p class="department-name" data-dcnode-id="735"><b data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">January 13, 2020</span></b></p><span data-dcnode-id="734" instrument_node="">
</span></div><span data-dcnode-id="732" instrument_node="">
</span><h4 data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Socialism: Why It's Back and What It Means</span></h4><span data-dcnode-id="729" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="651"><span data-dcnode-id="728" instrument_node="">
</span><div class="past-call" data-dcnode-id="670"><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="726" instrument_node="">Socialism has returned as a popular force in the United States and throughout the West, especially among young people. Why? And what do we mean when we talk about socialism today? Join </span><i data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Foreign Policy</span></i><span data-dcnode-id="723" instrument_node=""> editor in chief </span><b data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Jonathan Tepperman</span></b><span data-dcnode-id="720" instrument_node=""> and special guest </span><b data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Sheri Berman</span></b><span data-dcnode-id="717" instrument_node="">, professor of political science at Barnard College, for a deep dive into the conditions and causes of the movement's rebirth. Their conversation previews the cover story from the Winter 2020 print issue of FP magazine, out later this month.
</span></p><span data-dcnode-id="715" instrument_node="">
</span><div class="fp-insider no-border" data-dcnode-id="693"><span data-dcnode-id="714" instrument_node="">

</span><div class="date-time" data-dcnode-id="641"><span data-dcnode-id="646" instrument_node="">
</span><p class="department-name" data-dcnode-id="643"><b data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">January 3, 2020</span></b></p><span data-dcnode-id="642" instrument_node="">
</span></div><span data-dcnode-id="640" instrument_node="">
</span><h4 data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Understanding the Implications of Suleimani’s Assassination</span></h4><span data-dcnode-id="637" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="556"><span data-dcnode-id="636" instrument_node="">
</span><div class="past-call" data-dcnode-id="575"><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="634" instrument_node="">The U.S. killing of Iranian General Qassem Suleimani could mark the most dangerous escalation of tensions in the Middle East since the 2003 invasion of Iraq. Join </span><i data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Foreign Policy</span></i><span data-dcnode-id="631" instrument_node=""> editor in chief </span><b data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Jonathan Tepperman</span></b><span data-dcnode-id="628" instrument_node="">, along with </span><b data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Phil Gordon</span></b><span data-dcnode-id="625" instrument_node="">, a former White House point man on the Middle East, and Brookings' </span><b data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Suzanne Maloney</span></b><span data-dcnode-id="622" instrument_node="">, for a discussion of what happened, why, and what's likely to come next.
</span></p><span data-dcnode-id="620" instrument_node="">

</span><h4 data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">A World on Fire: Understanding the Global Youth Protests</span></h4><span data-dcnode-id="542" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="467"><span data-dcnode-id="541" instrument_node="">
</span><div class="past-call" data-dcnode-id="486"><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="539" instrument_node="">Youth protests are flaring across the world, from Hong Kong to the Middle East to the Americas. But what links these movements, and what kind of impact will they have? Join </span><i data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Foreign Policy</span></i><span data-dcnode-id="536" instrument_node="">’s editor in chief </span><b data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Jonathan Tepperman</span></b><span data-dcnode-id="533" instrument_node="">, along with a panel of notable specialists, for a discussion of the motivations and implications of the rising wave of street demonstrations.

</span><h4 data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">What to Watch at This Year’s UNGA</span></h4><span data-dcnode-id="453" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="375"><span data-dcnode-id="452" instrument_node="">
</span><div class="past-call" data-dcnode-id="394"><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="440"><span data-dcnode-id="450" instrument_node="">Diplomats and world leaders will convene in New York next week for the 74th Session of the United Nations General Assembly. Top of the complex agenda is a high-level—and high-stakes—dialogue on the most pressing global issues, including climate change, global health and world security. Join </span><i data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Foreign Policy</span></i><span data-dcnode-id="447" instrument_node=""> editor in chief </span><b data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Jonathan Tepperman</span></b><span data-dcnode-id="444" instrument_node=""> and senior U.N. correspondent </span><b data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Colum Lynch</span></b><span data-dcnode-id="441" instrument_node=""> for an exclusive conversation on what they’ll be watching for at UNGA.
</span></p><span data-dcnode-id="439" instrument_node="">

</span><h4 data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">D.C. Diplomacy in the Age of Trump</span></h4><span data-dcnode-id="361" instrument_node="">
</span><div class="grid--flex grid__half" data-dcnode-id="283"><span data-dcnode-id="360" instrument_node="">
</span><div class="past-call" data-dcnode-id="302"><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="348"><span data-dcnode-id="358" instrument_node="">As underscored by the controversy following the leak of critical comments by Kim Darroch, the U.K. ambassador to the United States, conducting diplomacy in Washington has never been more difficult. Join FP's editor in chief, </span><b data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Jonathan Tepperman</span></b><span data-dcnode-id="355" instrument_node="">, as he discusses the challenges with former French Ambassador to the U.S. </span><b data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Gérard Araud</span></b><span data-dcnode-id="352" instrument_node=""> and former Mexican Ambassador to the U.S. </span><b data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Arturo Sarukhan</span></b><span data-dcnode-id="349" instrument_node="">.

</span><p data-dcnode-id="250"><span data-dcnode-id="266" instrument_node="">The world’s biggest election is over and Narendra Modi’s BJP has won. Find out what this means for the region with </span><b data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Jonathan Tepperman</span></b><span data-dcnode-id="263" instrument_node="">, </span><i data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Foreign Policy</span></i><span data-dcnode-id="260" instrument_node="">’s editor in chief; </span><b data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Ravi Agrawal</span></b><span data-dcnode-id="257" instrument_node="">, </span><i data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Foreign Policy</span></i><span data-dcnode-id="254" instrument_node="">’s managing editor; and </span><b data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Milan Vaishnav</span></b><span data-dcnode-id="251" instrument_node="">, director and senior fellow at Carnegie Endowment for International Peace.
