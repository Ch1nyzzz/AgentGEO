Rt Hon Tobias Ellwood MP</span></p><p class="date" data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">March 3, 2020</span></p></div></div><div class="grid-12 single-article-image" data-dcnode-id="424"><span data-dcnode-id="428" instrument_node="">
</span><img alt="The strategic challenges facing the UK" class="attachment-full size-full wp-post-image entered litespeed-loaded" data-dcnode-id="427" data-lazyloaded="1" data-ll-status="loaded" data-sizes="(max-width: 1920px) 100vw, 1920px" data-src="https://fpc.org.uk/wp-content/uploads/2020/02/Strategic-challenges.jpg" data-srcset="https://fpc.org.uk/wp-content/uploads/2020/02/Strategic-challenges.jpg 1920w, https://fpc.org.uk/wp-content/uploads/2020/02/Strategic-challenges-300x178.jpg 300w, https://fpc.org.uk/wp-content/uploads/2020/02/Strategic-challenges-1024x608.jpg 1024w, https://fpc.org.uk/wp-content/uploads/2020/02/Strategic-challenges-768x456.jpg 768w, https://fpc.org.uk/wp-content/uploads/2020/02/Strategic-challenges-1536x912.jpg 1536w, https://fpc.org.uk/wp-content/uploads/2020/02/Strategic-challenges-1200x713.jpg 1200w" height="1140" sizes="(max-width: 1920px) 100vw, 1920px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fpc.org.uk/wp-content/uploads/2020/02/Strategic-challenges.jpg&amp;raw" srcset="https://fpc.org.uk/wp-content/uploads/2020/02/Strategic-challenges.jpg 1920w, https://fpc.org.uk/wp-content/uploads/2020/02/Strategic-challenges-300x178.jpg 300w, https://fpc.org.uk/wp-content/uploads/2020/02/Strategic-challenges-1024x608.jpg 1024w, https://fpc.org.uk/wp-content/uploads/2020/02/Strategic-challenges-768x456.jpg 768w, https://fpc.org.uk/wp-content/uploads/2020/02/Strategic-challenges-1536x912.jpg 1536w, https://fpc.org.uk/wp-content/uploads/2020/02/Strategic-challenges-1200x713.jpg 1200w" title="The strategic challenges facing the UK" width="1920"><noscript data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">&lt;img width="1920" height="1140" src="https://fpc.org.uk/wp-content/uploads/2020/02/Strategic-challenges.jpg" class="attachment-full size-full wp-post-image" alt="The strategic challenges facing the UK" title="The strategic challenges facing the UK" srcset="https://fpc.org.uk/wp-content/uploads/2020/02/Strategic-challenges.jpg 1920w, https://fpc.org.uk/wp-content/uploads/2020/02/Strategic-challenges-300x178.jpg 300w, https://fpc.org.uk/wp-content/uploads/2020/02/Strategic-challenges-1024x608.jpg 1024w, https://fpc.org.uk/wp-content/uploads/2020/02/Strategic-challenges-768x456.jpg 768w, https://fpc.org.uk/wp-content/uploads/2020/02/Strategic-challenges-1536x912.jpg 1536w, https://fpc.org.uk/wp-content/uploads/2020/02/Strategic-challenges-1200x713.jpg 1200w" sizes="(max-width: 1920px) 100vw, 1920px" /&gt;</span></noscript></div><div class="grid-12 article-push entry-content" data-dcnode-id="212"><div class="crestaStickButtons" data-dcnode-id="423"></div><p data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">The United Kingdom emerges from a decisive election victory with a Prime Minister enjoying the rarest of political phenomena: a Brexit-fatigued nation – wanting clarity about where Britain now goes – and a fresh, energised Government armed with a significant Parliamentary majority, providing the time and space to potentially define a decade of centre-right politics.</span></p><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Whilst a feeling of cautious optimism may have returned to the UK, security-wise the next decade will be no walk in the park. We raise our head up after three years of Brexit distraction to find a world getting more wickedly dangerous than at any time since the Cold War. Only two months into the New Year, we have had worrying demonstrations of the so-called great power competition that on current trajectory will&nbsp;characterise the next ten years: near-conflict with Iran, terrorist attacks in London, international discord over Libya’s future, climate change consequences in Australia, the Five Eyes row over Huawei, China’s secrecy over the coronavirus, and Putin’s attempt to illegitimately&nbsp;extend his presidency.</span></p><p data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">This progressive demise of our international security is often summed up as the erosion of our international rules-based order, blamed crudely on China, Russia and Iran writing their own rules, the continued threat of jihadi extremism, and the proliferating consequences to stability from climate change. In establishing what our own strategic security response is to these and other regional and thematic challenges, we must first ask the fundamental yet awkward question as to how international standards that have served us relatively well since the end of the Second World War are increasingly becoming obsolete.</span></p><p data-dcnode-id="412"><span data-dcnode-id="416" instrument_node="">This was the focus at the recent Munich Security Conference, which debated the ‘decay of the Western project’ – a loss of common understanding as to what it means to be part of the West and the need to redefine our purpose and resolve in defending what we stand for.</span><a data-dcnode-id="414" href="#_ftn1" name="_ftnref1"><span data-dcnode-id="415" instrument_node="">[1]</span></a><span data-dcnode-id="413" instrument_node=""> Far from being a geographic collection of states,&nbsp;this has developed&nbsp;into a collective commitment to liberal democracy and human rights, and to a transparent, accountable, market-based liberal economy with a wider commitment to collective responsibility. Since WWII&nbsp;and the advancement of an international economy, there has been a hopeful but often naïve assumption that Western values would take root and mature across the globe, with Russia, China and Middle Eastern states developing into responsible stakeholders in a Western-led liberal world order.</span></p><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Today the opposite is happening. The Western world has not only reached its limits in shaping events; it is under attack and on the retreat. Not only is the world becoming less Western – the West is too.</span></p><p data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">From the strategic issues – such as what next for the Joint Comprehensive Plan of Action (JCPOA) addressing the Iran nuclear issue, Russian sanctions, honouring the Paris Climate change accord, and the potential dangers of Chinese tech companies such as Huawei – to the more tactical problems such as protection of international shipping in the Straits of Hormuz or allowing the UK continued participation in the Galileo GPS project, there are deep divisions as to how the West should or could&nbsp;speak with one voice.</span></p><p data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Several factors are at play here.</span></p><p data-dcnode-id="401"><span data-dcnode-id="405" instrument_node="">Firstly, global institutions, once the core pillar of international order, have been neutered. United Nations Security Council resolutions are constantly vetoed by China and Russia, and the United States is blocking confirmation of the World Trade Organization’s appointments, hampering its ability to arbitrate in trade disputes. NATO is failing to deal with a member state procuring air defence systems from Russia, and the European Union is coming to terms with losing a key member.</span><a data-dcnode-id="403" href="#_ftn2" name="_ftnref2"><span data-dcnode-id="404" instrument_node="">[2]</span></a><span data-dcnode-id="402" instrument_node=""> In addition, there is&nbsp;disagreement between Germany and France over where this consensus-driven institution goes next. The abject failure to modernise these critical but dated international organisations has left&nbsp;the West without any club rules. And this has fuelled the rise in populist and isolationist national policies, illustrated most strikingly by the US.</span></p><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Secondly, poorly administered military interventions such as those in Iraq and Afghanistan continue to haunt Western contributors to this day. The cost in allied lives and resources has been staggering and both countries are far from stable. Western parliaments are understandably hesitant to repeat the same mistakes. Consequently, the pendulum has swung the other way – against any major military intervention. But the obvious reluctance of the West to step forward does not make conflicts or disharmony disappear. It does, however, leave a vacuum for other states to step forward and pursue very different agendas, as seen with Russia in Syria.</span></p><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Thirdly, there is the changing character of war. Advancement in the digital world continues to complicate the battlefield as our increasing reliance on technologies in how we live, work, travel and communicate makes our economy ever more vulnerable to cyber interference. Another illustration of how our international institutions have failed to keep up with a fast-moving world is that there are no rules or Geneva Conventions on how we fairly administer the cyber world across borders. The same applies to space, where there are even fewer rules. Space is now seen as the ultimate high ground and its weaponisation continues.</span></p><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Given the demise of the Western project, it is easier to&nbsp;appreciate the latitude that has been granted to the ‘non-West’ to pursue its own agenda. Both Russia, China and to some extent Iran have upgraded their own military might and&nbsp;are now too big to punish. As illustrated by China’s advancement in the South China Sea, Russia’s incursion into Crimea and eastern Ukraine and Iran’s proxy involvement across the Middle East, the West has become too risk-averse. Fear of escalation prohibits both sides from wanting direct action. President Trump’s climbdown after the Iranian retaliation to the Soleimani drone strike is a case in point. We have moved from the Cold War scenario, where the threat of retaliation for errant behaviour was very real, to attempting to deny our competitors the ability to occupy the space (digitally or physically) in the first place. Thus, we place NATO troops in Latvia and Estonia to stop Russia and ban or limit Huawei in building our 5G infrastructure networks.</span></p><p data-dcnode-id="391"><span data-dcnode-id="394" instrument_node="">Whilst the West now punches below its weight, Russia is certainly punching&nbsp;above and is our most immediate and blunt challenge. However,&nbsp;growing discontent with its failing economy means there could be internal challenges for Russia ahead.</span><a data-dcnode-id="392" href="#_ftn3" name="_ftnref3"><span data-dcnode-id="393" instrument_node="">[3]</span></a></p><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">The major strategic challenges worth expanding upon are climate change and the rise of China.</span></p><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Efforts to cap the global temperature increase to 1.5°C above pre-industrial levels have failed. With no prospect of this being reversed we will soon reach the point of no return, where the damage done to our sensitive ecosystem will lead to rising sea levels, extreme weather changes, failed crop production, mass migration and increased conflict over sparser resources – bringing untold misery to millions around the globe.</span></p><p data-dcnode-id="377"><span data-dcnode-id="386" instrument_node="">China’s phenomenal growth over the last decade has allowed the Communist party to quietly invest vast sums of money into its military, technology and economy. It has the largest army in the world, its navy grows by the size of the UK’s every year and its air force is now developing fifth generation fast jets.</span><a data-dcnode-id="384" href="#_ftn4" name="_ftnref4"><span data-dcnode-id="385" instrument_node="">[4]</span></a><span data-dcnode-id="383" instrument_node=""> The display of armaments wheeled across Tiananmen Square for the 70</span><sup data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">th</span></sup><span data-dcnode-id="380" instrument_node=""> anniversary of the founding of the People’s Republic of China was jaw-dropping. Its Belt and Road initiative has lured dozens of countries, mainly in Asia and Africa, into long-term debt, having signed up for infrastructure projects they cannot afford.</span><a data-dcnode-id="378" href="#_ftn5" name="_ftnref5"><span data-dcnode-id="379" instrument_node="">[5]</span></a></p><p data-dcnode-id="372"><span data-dcnode-id="376" instrument_node="">The current coronavirus problems aside, China is on course to overtake the US both economically and militarily.</span><a data-dcnode-id="374" href="#_ftn6" name="_ftnref6"><span data-dcnode-id="375" instrument_node="">[6]</span></a><span data-dcnode-id="373" instrument_node=""> And if that is not worrying enough, both Iran and Russia could soon&nbsp;be fully under its economic and technological spell.</span></p><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Returning to where we started, the Prime Minister’s inbox is increasingly dominated by the now familiar list of non-Western complex threats and what the West should do about them. In promoting ‘Global Britain’, he is aware our international voice will sound hollow without firstly advancing our own defence posture. Given our historical reputation as a nation which steps forward, when others hesitate, to defend our standards and way of life, we must ask ourselves what role we aspire to play as we contemplate the state of the West, the fundamental shifts in power&nbsp;bases and the advancement of technologies all altering the character of conflict.</span></p><p data-dcnode-id="365"><span data-dcnode-id="369" instrument_node="">The Government’s review into defence, security and foreign policy has much to consider. Three fundamental questions must be answered, beginning by asking honestly what our current hard power capabilities are. We arguably retain the most professional armed forces in the world. But for some years, successive Governments have perpetuated the perception that we are able to defend our interests well beyond our shores. The reality is a little different. For example, we boast impressive new aircraft carriers, but without a sizeable budget increase the rest of the surface fleet has been impacted. Likewise, the introduction of the Typhoon and F35 jets shows we have impressive and world-beating kit, but our fast jet capability has shrunk from 36 during the Gulf War to six today.</span><a data-dcnode-id="367" href="#_ftn7" name="_ftnref7"><span data-dcnode-id="368" instrument_node="">[7]</span></a><span data-dcnode-id="366" instrument_node=""> Both our main battle tank and Warrior armoured personnel carrier are over 20 years old and, like so much of our kit, are pending upgrades. The new dimensions of warfare such as cyber and space security demand urgent and significant investment.</span></p><p data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Secondly, what repair, upgrade and advancements should be made to our international institutions that would invigorate confidence in a modern, relevant and enforceable rules-based order? Failure to modernise will see the world gradually fragment into a loose conglomeration of Western nations challenged by the ‘non-West’ – led by China, promoting a far more authoritarian outlook.</span></p><p data-dcnode-id="358"><span data-dcnode-id="362" instrument_node="">Thirdly, a sober assessment of the short-, medium- and long-term threats that we are likely to face is needed. The first line of the Strategic Defence and Security Review (SDSR) 2015 reminds us that our economic security – our prosperity – is ever dependent upon our national security.</span><a data-dcnode-id="360" href="#_ftn8" name="_ftnref8"><span data-dcnode-id="361" instrument_node="">[8]</span></a><span data-dcnode-id="359" instrument_node=""> As the world moves faster and becomes more dangerous, there is a tragic collective naivety about the durability of peace. Our country, our economy and our values are vulnerable to these growing dangers that have no respect for borders.</span></p><p data-dcnode-id="353"><span data-dcnode-id="357" instrument_node="">Finally, we must determine what leadership role Britain aspires to play. The recent absence of any senior UK Government or military figures at the world’s largest security conference in Munich is not a good omen.</span><a data-dcnode-id="355" href="#_ftn9" name="_ftnref9"><span data-dcnode-id="356" instrument_node="">[9]</span></a><span data-dcnode-id="354" instrument_node=""> If we choose, Britain can provide the thought leadership, soft power and occasional hard power that can inspire other nations to work with us. It can help to revive what it means to be part of&nbsp;the ‘Western Project’, as the Munich Conference termed it.</span></p><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">We face a pivotal moment. What sort of nation do we want to be? Do we aspire to influence the world as a force for good, or are we happy to withdraw to a more reactive footing, with all the negative consequences that may entail – not only for our security but our economy too? I choose the former. It has always been in our nation’s DNA to step forward when other nations might hesitate. To do so now will require investment, but the long-term security and economic benefits mean this is a price the nation would deem worth paying.</span></p><p data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">&nbsp;</span></p><p data-dcnode-id="346"><em data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Tobias Ellwood was elected as Member of Parliament for Bournemouth East in May 2005, and subsequently re-elected in 2010, 2015, 2017 and most recently in December 2019. He was Parliamentary Under Secretary of State at the FCO with special responsibility for the Middle East and Africa from July 2014, and served as Parliamentary Under Secretary of State in the Ministry of Defence from 2017–2019. He is currently the Chair of the House of Commons Defence Select Committee. Tobias was Parliamentary Advisor to the Prime Minister for the 2014 NATO Summit and a member of the Parliamentary Delegation to the NATO Assembly 2014. Before becoming a MP, he spent six years in the Regular Army with The Royal Green Jackets, headquartered in Winchester, and served in Northern Ireland, Cyprus, Kuwait, Germany, Gibraltar and Bosnia. On leaving the army, Tobias worked as a researcher for the former Defence Secretary, the Rt Hon Tom King MP (now Lord King) in Westminster, and also in his constituency of Bridgwater. Since being elected as an MP, Tobias has pioneered the concept of ‘social action’ within the Party and the first ever Conservative social action project took place in Springbourne, Bournemouth. The concept of raising funds and rallying MPs and volunteers around an identified community project is now well established and Tobias regularly leads projects both in the UK and abroad, previously joining projects in countries including Bosnia and Bangladesh.</span></em></p><p data-dcnode-id="337"><a data-dcnode-id="344" href="#_ftnref1" name="_ftn1"><span data-dcnode-id="345" instrument_node="">[1]</span></a><span data-dcnode-id="343" instrument_node=""> Elif İlhamoğlu, </span><em data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">As the 56 Munich Security Conference ends, the Western alliance is at the brink of collapse</span></em><span data-dcnode-id="340" instrument_node="">, United World, February 2020, </span><a data-dcnode-id="338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uwidata.com/8093-as-the-56-munich-security-conference-ends-the-western-alliance-is-at-the-brink-of-collapse/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="339" instrument_node="">https://uwidata.com/8093-as-the-56-munich-security-conference-ends-the-western-alliance-is-at-the-brink-of-collapse/</span></a></p><p data-dcnode-id="325"><a data-dcnode-id="335" href="#_ftnref2" name="_ftn2"><span data-dcnode-id="336" instrument_node="">[2]</span></a><span data-dcnode-id="334" instrument_node=""> Amie Ferris-Rotman and Kareem Fahim, </span><em data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Russia readies S-400 missiles for Turkey amid warnings of US sanctions on NATO ally</span></em><span data-dcnode-id="331" instrument_node="">, </span><em data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">The Washington Post</span></em><span data-dcnode-id="328" instrument_node="">, July 2019, </span><a data-dcnode-id="326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/world/europe/russia-confirms-plans-to-send-s-400-antiaircraft-system-to-nato-member-turkey/2019/07/05/1f89ec0a-9f1c-11e9-83e3-45fded8e8d2e_story.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="327" instrument_node="">https://www.washingtonpost.com/world/europe/russia-confirms-plans-to-send-s-400-antiaircraft-system-to-nato-member-turkey/2019/07/05/1f89ec0a-9f1c-11e9-83e3-45fded8e8d2e_story.html</span></a></p><p data-dcnode-id="313"><a data-dcnode-id="323" href="#_ftnref3" name="_ftn3"><span data-dcnode-id="324" instrument_node="">[3]</span></a><span data-dcnode-id="322" instrument_node=""> Max Seddon, </span><em data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Vladimir Putin admits to Russian’s anger over faltering economy</span></em><span data-dcnode-id="319" instrument_node="">, </span><em data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Financial Times</span></em><span data-dcnode-id="316" instrument_node="">, June 2019, </span><a data-dcnode-id="314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/32ce653c-9361-11e9-aea1-2b1d33ac3271" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="315" instrument_node="">https://www.ft.com/content/32ce653c-9361-11e9-aea1-2b1d33ac3271</span></a></p><p data-dcnode-id="304"><a data-dcnode-id="311" href="#_ftnref4" name="_ftn4"><span data-dcnode-id="312" instrument_node="">[4]</span></a><span data-dcnode-id="310" instrument_node=""> Lindsay Maizland, </span><em data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">China’s Modernizing Military</span></em><span data-dcnode-id="307" instrument_node="">, Council on Foreign Relations, February 2020, </span><a data-dcnode-id="305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/backgrounder/chinas-modernizing-military" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="306" instrument_node="">https://www.cfr.org/backgrounder/chinas-modernizing-military</span></a></p><p data-dcnode-id="295"><a data-dcnode-id="302" href="#_ftnref5" name="_ftn5"><span data-dcnode-id="303" instrument_node="">[5]</span></a><span data-dcnode-id="301" instrument_node=""> Public Policy, </span><em data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">China’s Belt and Road Initiative: Why the Price Is Too High</span></em><span data-dcnode-id="298" instrument_node="">, Knowledge@Wharton, April 2019, </span><a data-dcnode-id="296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//knowledge.wharton.upenn.edu/article/chinas-belt-and-road-initiative-why-the-price-is-too-high/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="297" instrument_node="">https://knowledge.wharton.upenn.edu/article/chinas-belt-and-road-initiative-why-the-price-is-too-high/</span></a></p><p data-dcnode-id="283"><a data-dcnode-id="293" href="#_ftnref6" name="_ftn6"><span data-dcnode-id="294" instrument_node="">[6]</span></a><span data-dcnode-id="292" instrument_node=""> Evan Osnos, T</span><em data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">he Future of America’s Contest with China</span></em><span data-dcnode-id="289" instrument_node="">, </span><em data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">The New Yorker</span></em><span data-dcnode-id="286" instrument_node="">, January 2020, </span><a data-dcnode-id="284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/magazine/2020/01/13/the-future-of-americas-contest-with-china" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="285" instrument_node="">https://www.newyorker.com/magazine/2020/01/13/the-future-of-americas-contest-with-china</span></a></p><p data-dcnode-id="271"><a data-dcnode-id="281" href="#_ftnref7" name="_ftn7"><span data-dcnode-id="282" instrument_node="">[7]</span></a><span data-dcnode-id="280" instrument_node=""> Tobias Ellwood MP, </span><em data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">The UK must prepare for a dangerous decade and seek a more influential role</span></em><span data-dcnode-id="277" instrument_node="">, </span><em data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">The House Magazine</span></em><span data-dcnode-id="274" instrument_node="">, Politics Home, January 2020, </span><a data-dcnode-id="272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicshome.com/news/uk/defence/house/house-magazine/109309/tobias-ellwood-mp-uk-must-prepare-dangerous-decade-and" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="273" instrument_node="">https://www.politicshome.com/news/uk/defence/house/house-magazine/109309/tobias-ellwood-mp-uk-must-prepare-dangerous-decade-and</span></a></p><p data-dcnode-id="262"><a data-dcnode-id="269" href="#_ftnref8" name="_ftn8"><span data-dcnode-id="270" instrument_node="">[8]</span></a><span data-dcnode-id="268" instrument_node=""> HM Government, </span><em data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">National Security Strategy and Strategic Defence and Security Review 2015: A Secure and Prosperous United Kingdom</span></em><span data-dcnode-id="265" instrument_node="">, November 2015, </span><a data-dcnode-id="263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/555607/2015_Strategic_Defence_and_Security_Review.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="264" instrument_node="">https://assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/555607/2015_Strategic_Defence_and_Security_Review.pdf</span></a></p><p data-dcnode-id="250"><a data-dcnode-id="260" href="#_ftnref9" name="_ftn9"><span data-dcnode-id="261" instrument_node="">[9]</span></a><span data-dcnode-id="259" instrument_node=""> Helen Warrell, Guy Chazan and Michael Peel, </span><em data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">‘Global Britain’ goes missing at Munich security summit</span></em><span data-dcnode-id="256" instrument_node="">, </span><em data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Financial Times</span></em><span data-dcnode-id="253" instrument_node="">, February 2020, </span><a data-dcnode-id="251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/852e15bc-50de-11ea-90ad-25e377c0ee1f" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="252" instrument_node="">https://www.ft.com/content/852e15bc-50de-11ea-90ad-25e377c0ee1f</span></a></p><p data-dcnode-id="243"><span data-dcnode-id="249" instrument_node="">Photo credit: Image by </span><a data-dcnode-id="247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/users/ItNeverEnds-6669706/%3Futm_source%3Dlink-attribution%26utm_medium%3Dreferral%26utm_campaign%3Dimage%26utm_content%3D2930704" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="248" instrument_node="">ItNeverEnds</span></a><span data-dcnode-id="246" instrument_node=""> from </span><a data-dcnode-id="244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/%3Futm_source%3Dlink-attribution%26utm_medium%3Dreferral%26utm_campaign%3Dimage%26utm_content%3D2930704" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="245" instrument_node="">Pixabay</span></a></p><div class="cresta-share-icon mini first_style" data-dcnode-id="229" id="crestashareiconincontent"><div class="sbutton facebook-cresta-share cresta-float-shadow" data-dcnode-id="240" id="facebook-cresta-c"><a data-dcnode-id="241" data-name="Share to Facebook" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%253A%252F%252Ffpc.org.uk%252Fthe-strategic-challenges-facing-the-uk%252F%26t%3DThe%2Bstrategic%2Bchallenges%2Bfacing%2Bthe%2BUK" onclick="window.open(this.href,'targetWindow','toolbar=no,location=no,status=no,menubar=no,scrollbars=yes,resizable=yes,width=700,height=450');return false;" rel="nofollow"><i class="cs c-icon-cresta-facebook" data-dcnode-id="242"></i></a></div><div class="sbutton twitter-cresta-share noCount cresta-float-shadow" data-dcnode-id="237" id="twitter-cresta-c"><a data-dcnode-id="238" data-name="Share to Twitter" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DThe%2Bstrategic%2Bchallenges%2Bfacing%2Bthe%2BUK%26url%3Dhttps%253A%252F%252Ffpc.org.uk%252Fthe-strategic-challenges-facing-the-uk%252F" onclick="window.open(this.href,'targetWindow','toolbar=no,location=no,status=no,menubar=no,scrollbars=yes,resizable=yes,width=700,height=450');return false;" rel="nofollow"><i class="cs c-icon-cresta-twitter" data-dcnode-id="239"></i></a></div><div class="sbutton linkedin-cresta-share cre
