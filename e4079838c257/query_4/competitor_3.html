ta-dcnode-id="615" instrument_node="">Undertake to participate fully in the Alliance consultation and decision-making process on political and security issues of concern to the Alliance;</span></li><li data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Establish a permanent representation at NATO HQ;</span></li><li data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Establish an appropriate national military representation at SHAPE/SACLANT;</span></li><li data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Be prepared to nominate qualified candidates to serve on the International Staff and in NATO agencies;</span></li><li data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Provide qualified personnel to serve on the International Military Staff and in the Integrated Military Structure if and as appropriate;</span></li><li data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Contribute to Alliance budgets, based on budget shares to be agreed;</span></li><li data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Participate, as appropriate, in the exchange of Allied intelligence, which is based entirely on national contributions;</span></li><li data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Apply NATO security rules and procedures;</span></li><li data-dcnode-id="596"><span data-dcnode-id="599" instrument_node="">Accept the Documents which provide the basis for the existing policies of the Alliance. </span><super data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">1</span></super></li></ul></li><li data-dcnode-id="589"><span data-dcnode-id="593" instrument_node="">The Alliance expects new members not to </span><em data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">"close the door"</span></em><span data-dcnode-id="590" instrument_node=""> to the accession of one or more later candidate members, as referred to also in paragraph 30 of Chapter 2.</span></li></ol><blockquote data-dcnode-id="584" dir="ltr" style="MARGIN-RIGHT: 0px"><p data-dcnode-id="585"><span class="BodySubTitle" data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">B. What Prospective New Members will need to do Politically to Prepare Themselves for Membership</span></span></p></blockquote><ol data-dcnode-id="572" start="72"><li data-dcnode-id="573"><span data-dcnode-id="583" instrument_node="">Prospective members will have to have: </span><ul data-dcnode-id="574" type="disc"><li data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Demonstrated a commitment to and respect for OSCE norms and principles, including the resolution of ethnic disputes, external territorial disputes including irredentist claims or internal jurisdictional disputes by peaceful means, as referred to also in paragraph 6 of Chapter 1;</span></li><li data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Shown a commitment to promoting stability and well-being by economic liberty, social justice and environmental responsibility;</span></li><li data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Established appropriate democratic and civilian control of their defence force;</span></li><li data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Undertaken a commitment to ensure that adequate resources are devoted to achieving the obligations described in section A and C.</span></li></ul></li></ol><blockquote data-dcnode-id="568" dir="ltr" style="MARGIN-RIGHT: 0px"><p data-dcnode-id="569"><span class="BodySubTitle2" data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">C. What Will Be Expected Militarily of New Members</span></span></p></blockquote><ol data-dcnode-id="563" start="73"><li data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">New members of the Alliance must be prepared to share the roles, risks, responsibilities, benefits, and burdens of common security and collective defence. They should be expected to subscribe to Alliance strategy as set out in the Strategic Concept and refined in subsequent Ministerial statements.</span></li><li data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">An important element in new members' military contribution will be a commitment in good faith to pursue the objectives of standardization which are essential to Alliance strategy and operational effectiveness. New members should concentrate, in the first instance, on interoperability. As a minimum, they should accept NATO doctrine and policies relating to standardization and in addition aim at achieving a sufficient level of training and equipment to operate effectively with NATO forces. PfP cooperation, including the Planning and Review Process, can help to improve the interoperability of Partners' forces with those of NATO Allies and aspiring new members should be expected to participate actively in PfP activities; but these are limited in scope to forces made available by Partners for cooperation in peacekeeping, humanitarian and SAR missions, and related training and exercises.</span></li></ol><blockquote data-dcnode-id="559" dir="ltr" style="MARGIN-RIGHT: 0px"><p data-dcnode-id="560"><span class="BodySubTitle2" data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">D. What Prospective New Members Will Need to do Militarily to Prepare Themselves for Membership</span></span></p></blockquote><ol data-dcnode-id="550" start="75"><li data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">The ability of prospective members to contribute militarily to collective defence and to the Alliance's new missions will be a factor in deciding whether to invite them to join the Alliance.</span></li><li data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">New members will need to adapt themselves to the fact that NATO's strategy and force structure are designed to exploit multinationality and flexibility to provide effective defence at minimum cost. NATO policy is therefore heavily dependent on standardization, particularly in the areas of operations, administration and material. Current NATO standardization priorities include commonality of doctrines and procedures, interoperability of command, control and communications and major weapon systems, and interchangeability of ammunition and primary combat supplies.</span></li><li data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">There are at present over 1200 agreements and publications that new members should undertake to comply with. Compliance should be an evolutionary and controlled process to enhance Alliance operational effectiveness. Although national participation in standardization is optional, there are a number of areas, such as communication and information systems and measures to facilitate reinforcements where military necessity requires participation. One way of achieving improved interoperability might be for new members to select units that can act as cornerstone units around which the rest of their forces can be developed with priority being given to maximizing these units' interoperability with existing NATO units. To determine the minimum requirements necessary for operational effectiveness, a review of the STANAGs and Allied Publications is already under way. A country-by-country assessment of prospective new members' standardization will also be required, based on levels of standardization displayed during the full range of PfP military and defence activities. A proposal should be developed by the Alliance in consultation with the prospective new member so that it will understand what will be expected of it. In addition, NATO schools and training will need to be developed so that the forces of new members can achieve interoperability with NATO in a reasonable time, and new members can adapt to NATO doctrine across a broad spectrum of activities.</span></li><li data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Although the funding of new members' enhanced interoperability is their responsibility, it poses important challenges for the Alliance as a whole. There is a military imperative to achieve the minimum level of interoperability required for military effectiveness as quickly as possible. There is also a political imperative to demonstrate intra-Alliance cohesion, to ensure that new members feel that they are participating fully in the Alliance and to enable them to make an equitable contribution to collective defence at an early stage. In principle, both objectives should be achieved within the existing arrangements for funding Allies' development, procurement, infrastructure and other costs (i.e. using national resources and the Security Investment Programme as appropriate).</span></li></ol><strong data-dcnode-id="545"><span class="BodySubTitle" data-dcnode-id="546"><span data-dcnode-id="549" instrument_node="">Chapter 6: </span><em data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Modalities according to which the enlargement process should proceed</span></em></span></strong><span data-dcnode-id="544" instrument_node=""> </span><ol data-dcnode-id="514" start="79" type="1"><li data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">The modalities for enlargement flow from Article 10 of the Washington Treaty. Previous accessions in accordance with Article 10 need not be considered precise models for future accessions, since the general political and security context of future accessions will be different as well as the number, individual circumstances and characteristics of new acceding members. In this context, a process which is predictable and transparent with respect to new accessions may be required to provide reassurance to public and legislative opinion in existing member states. The modalities for future accession should avoid any suggestion of different classes of membership.</span></li><li data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">While each invitation to join the Alliance will be decided on its own merits, case by case, the timing of future accessions could be sequential or in one or more simultaneous sets. In any case, it will be important to make clear that the Alliance remains open to further accessions by countries not among the earliest to be invited to join. A declaration at the time of the first invitation(s) being issued which clearly stated this would both reassure those countries that would not be among the first to be invited and reduce the likelihood of some of those countries submitting unsolicited applications to join the Alliance.</span></li><li data-dcnode-id="519"><span data-dcnode-id="539" instrument_node="">The precise timing, sequence and content of the accession process need to be considered carefully, particularly with respect to talks and negotiations with countries to be invited to join. Detailed briefings to provide necessary information to such countries will be needed at an early stage of the accession process, prior to formal negotiations. The NAC will decide on beginning any necessary exploratory contacts, after which the following steps would be required for any future accession to the Washington Treaty : </span><ul data-dcnode-id="522" type="disc"><li data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">a decision by the NAC (at an appropriate level) to authorize the Secretary General to inform a country/countries that the Allies are favourably disposed to its/their accession, and to enter into talks with it/them;</span></li><li data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">a formal notification from the country/countries to the Secretary General of its/their firm commitment, in accordance with domestic legal requirements, to join the Alliance;</span></li><li data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">detailed consultations with the country/countries concerned about the protocol of accession;</span></li><li data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">formulation by the Allies of the protocol of accession;</span></li><li data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">approval and signature of the accession protocol by the NAC;</span></li><li data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">ratification, acceptance or approval of the accession protocol by the Allies and entry into force;</span></li><li data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">formal invitation to the country/countries to accede to the North Atlantic Treaty;</span></li><li data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">deposition by the country/countries of its/their instrument(s) of accession with the U.S. Government.</span></li></ul><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">It may not be feasible for countries invited to join to provide assurances that all domestic requirements for it/them to do so have been met together with formal notification of its/their desire to join. Precision may therefore be required on this point. It will be important, however, to avoid legislative ratification procedures for new accessions going forward in existing Allied countries without assurance that the country concerned wants to and will accede.</span></p></li><li data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">It will need to be decided to what extent preparations for membership by countries can be undertaken before formal accession or whether many of these can be left until after formal accession. When to deal with budgetary and administrative issues will need to be decided. Consultations regarding accession with any country concerned should not delay those with any other, i.e. the pace of movement towards accession by a number of invited countries should not be dictated by that of the slowest.</span></li><li data-dcnode-id="515" style="LIST-STYLE-TYPE: none"><a data-dcnode-id="516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nato.int/docu/basictxt/enl-9506.htm%231" id="FN1" name="FN1"></a></li></ol><span data-dcnode-id="513" instrument_node=""> </span><ol data-dcnode-id="496"><li data-dcnode-id="497"><span data-dcnode-id="512" instrument_node="">These include, in particular: </span><ul data-dcnode-id="507"><li data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">The Agreement on the Status of the North Atlantic Treaty Organization, National Representatives and International Staff (Ottawa Convention, 1951); The NATO Agreement on the Mutual Safeguarding of Secrecy of Inventions relating to Defence, and for which applications for Patents have been made (Paris, 1960); The Agreement between the Parties to the North Atlantic Treaty regarding the Status on their Forces (London, 1951);</span></li><li data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">The NATO Agreement on the Communication of Technical Information for defence Purposes Brussels, 1970);</span></li></ul><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">as well as</span></p><ol data-dcnode-id="498"><li data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">The Strategic Concept;</span></li><li data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Summit Declarations and NAC decisions in Ministerial and permanent session as reflect in NAC Communiques, including those issued in Oslo in June 1992 and Brussels in December 1992 in which the Alliance undertook to support, on a case-by-case basis in accordance with its own procedures, peacekeeping activities under the responsibility of the OSCE and peacekeeping operations under the authority of the UN Security Council, including by making available Alliance resources and expertise;</span></li><li data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Documents on cooperation between NATO and any partner state already agreed with new member(s) join the Alliance, recognizing that Alliance polices evolve over time and in the light of new circumstances.</span></li></ol></li></ol><span data-dcnode-id="495" instrument_node="">
</span></div><span data-dcnode-id="493" instrument_node="">
