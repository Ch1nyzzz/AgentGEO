</span><h1 class="fs-huge" data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Study on NATO Enlargement</span></h1><span data-dcnode-id="1065" instrument_node="">
</span><ul class="list-meta" data-dcnode-id="1049"><span data-dcnode-id="1064" instrument_node="">

</span><section class="content cf" data-dcnode-id="492"><span data-dcnode-id="1022" instrument_node="">
</span><p class="introtxt" data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node=""> </span></p><span data-dcnode-id="1019" instrument_node="">
</span><div class="box box-media box-media--stretched" data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">
</span></div><span data-dcnode-id="1016" instrument_node="">
</span><div data-dcnode-id="494"><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1012"><span class="BodySubTitle" data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Chapter 1 : Purposes and Principles of Enlargement</span></span></p><blockquote data-dcnode-id="1008"><p data-dcnode-id="1009"><span class="BodySubTitle2" data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">A. Purposes of Enlargement</span></span></p></blockquote><ol data-dcnode-id="986"><li data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">With the end of the Cold War, there is a unique opportunity to build an improved security architecture in the whole of the Euro-Atlantic area. The aim of an improved security architecture is to provide increased stability and security for all in the Euro-Atlantic area, without recreating dividing lines. NATO views security as a broad concept embracing political and economic, as well as defence, components. Such a broad concept of security should be the basis for the new security architecture which must be built through a gradual process of integration and cooperation brought about by an interplay of existing multilateral institutions in Europe, such as the EU, WEU and OSCE, each of which would have a role to play in accordance with its respective responsibilities and purposes in implementing this broad security concept. In this process, which is already well under way, the Alliance has played and will play a strong, active and essential role as one of the cornerstones of stability and security in Europe. NATO remains a purely defensive Alliance whose fundamental purpose is to preserve peace in the Euro-Atlantic area and to provide security for its members.</span></li><li data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">When NATO invites other European countries to become Allies, as foreseen in Article 10 of the Washington Treaty and reaffirmed at the January 1994 Brussels Summit, this will be a further step towards the Alliance's basic goal of enhancing security and stability throughout the Euro-Atlantic area, within the context of a broad European security architecture. NATO enlargement will extend to new members the benefits of common defence and integration into European and Euro-Atlantic institutions. The benefits of common defence and such integration are important to protecting the further democratic development of new members. By integrating more countries into the existing community of values and institutions, consistent with the objectives of the Washington Treaty and the London Declaration, NATO enlargement will safeguard the freedom and security of all its members in accordance with the principles of the UN Charter. Meeting NATO's fundamental security goals and supporting the integration of new members into European and Euro-Atlantic institutions are thus complementary goals of the enlargement process, consistent with the Alliance's strategic concept.</span></li><li data-dcnode-id="987"><span data-dcnode-id="1003" instrument_node="">Therefore, enlargement will contribute to enhanced stability and security for all countries in the Euro-Atlantic area by : </span><ul data-dcnode-id="988" type="disc"><li data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Encouraging and supporting democratic reforms, including civilian and democratic control over the military;</span></li><li data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Fostering in new members of the Alliance the patterns and habits of cooperation, consultation and consensus building which characterize relations among current Allies;</span></li><li data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Promoting good-neighbourly relations, which would benefit all countries in the Euro-Atlantic area, both members and non-members of NATO;</span></li><li data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Emphasizing common defence and extending its benefits and increasing transparency in defence planning and military budgets, thereby reducing the likelihood of instability that might be engendered by an exclusively national approach to defence policies;</span></li><li data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Reinforcing the tendency toward integration and cooperation in Europe based on shared democratic values and thereby curbing the countervailing tendency towards disintegration along ethnic and territorial lines;</span></li><li data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Strengthening the Alliance's ability to contribute to European and international security, including through peacekeeping activities under the responsibility of the OSCE and peacekeeping operations under the authority of the UN Security Council as well as other new missions;</span></li><li data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Strengthening and broadening the Trans-Atlantic partnership.</span></li></ul></li></ol><blockquote data-dcnode-id="982"><p data-dcnode-id="983"><span class="BodySubTitle2" data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">B. Principles of enlargement</span></span></p></blockquote><ol data-dcnode-id="946" start="4"><li data-dcnode-id="962"><span data-dcnode-id="981" instrument_node="">Enlargement of the Alliance will be through accession of new member states to the Washington Treaty. Enlargement should : </span><ul data-dcnode-id="963" type="disc"><li data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Accord with, and help to promote, the purposes and principles of the Charter of the United Nations, and the safeguarding of the freedom, common heritage and civilisation of all Alliance members and their people, founded on the principles of democracy, individual liberty and the rule of law. New members will need to conform to these basic principles;</span></li><li data-dcnode-id="974"><span data-dcnode-id="978" instrument_node="">Accord strictly with Article 10 of the Washington Treaty which states that </span><em data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">"the parties may, by unanimous agreement, invite any other European state in a position to further the principles of this Treaty and to contribute to the security of the North Atlantic area to accede to this Treaty ..."</span></em><span data-dcnode-id="975" instrument_node="">;</span></li><li data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Be on the basis that new members will enjoy all the rights and assume all obligations of membership under the Washington Treaty; and accept and conform with the principles, policies and procedures adopted by all members of the Alliance at the time that new members join;</span></li><li data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Strengthen the Alliance's effectiveness and cohesion; and preserve the Alliance's political and military capability to perform its core functions of common defence as well as to undertake peacekeeping and other new missions;</span></li><li data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Be part of a broad European security architecture based on true cooperation throughout the whole of Europe. It would threaten no-one; and enhance stability and security for all of Europe;</span></li><li data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Take account of the continuing important role of PfP, which will both help prepare interested partners, through their participation in PfP activities, for the benefits and responsibilities of eventual membership and serve as a means to strengthen relations with partner countries which may be unlikely to join the Alliance early or at all. Active participation in the Partnership for Peace will play an important role in the evolutionary process of the enlargement of NATO;</span></li><li data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Complement the enlargement of the European Union, a parallel process which also, for its part, contributes significantly to extending security and stability to the new democracies in the East.</span></li></ul></li><li data-dcnode-id="953"><span data-dcnode-id="961" instrument_node="">New members, at the time that they join, must commit themselves, as all current Allies do on the basis of the Washington Treaty, to: </span><ul data-dcnode-id="954" type="disc"><li data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">unite their efforts for collective defence and for the preservation of peace and security; settle any international disputes in which they may be involved by peaceful means in such a manner that international peace and security and justice are not endangered, and refrain in their international relations from the threat or use of force in any manner inconsistent with the purposes of the United Nations;</span></li><li data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">contribute to the development of peaceful and friendly international relations by strengthening their free institutions, by bringing about a better understanding of the principles upon which these institutions are founded, and by promoting conditions of stability and well-being;</span></li><li data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">maintain the effectiveness of the Alliance by sharing roles, risks, responsibilities, costs and benefits of assuring common security goals and objectives.</span></li></ul></li><li data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">States which have ethnic disputes or external territorial disputes, including irredentist claims, or internal jurisdictional disputes must settle those disputes by peaceful means in accordance with OSCE principles. Resolution of such disputes would be a factor in determining whether to invite a state to join the Alliance.</span></li><li data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Decisions on enlargement will be for NATO itself. Enlargement will occur through a gradual, deliberate, and transparent process, encompassing dialogue with all interested parties. There is no fixed or rigid list of criteria for inviting new member states to join the Alliance. Enlargement will be decided on a case-by-case basis and some nations may attain membership before others. New members should not be admitted or excluded on the basis of belonging to some group or category. Ultimately, Allies will decide by consensus whether to invite each new member to join according to their judgment of whether doing so will contribute to security and stability in the North Atlantic area at the time such a decision is to be made. NATO enlargement would proceed in accordance with the provisions of the various OSCE documents which confirm the sovereign right of each state to freely seek its own security arrangements, to belong or not to belong to international organisations, including treaties of alliance. No country outside the Alliance should be given a veto or droit de regard over the process and decisions.</span></li><li data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">NATO's collective defence arrangements, as described in paragraphs 47 and 48, are a concrete expression of Allies' commitment to maintain and develop their individual and collective capacity to resist armed attack. Against the background of existing arrangements for contributing to collective defence, Allies will want to know how possible new members intend to contribute to NATO's collective defence and will explore all aspects of this question in detail through bilateral dialogue prior to accession negotiations.</span></li></ol><p data-dcnode-id="940"><strong data-dcnode-id="941"><span class="BodySubTitle" data-dcnode-id="942"><span data-dcnode-id="945" instrument_node="">Chapter 2: </span><em data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">How to ensure that enlargement contributes to the stability and security of the entire Euro-Atlantic area, as part of a broad European security architecture, and supports the objective of an undivided Europe</span></em></span></strong></p><blockquote data-dcnode-id="936"><p data-dcnode-id="937"><span class="BodySubTitle2" data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">A. Introduction - NATO Enlargement in its Broad Context</span></span></p></blockquote><ol data-dcnode-id="914" start="9" type="1"><li data-dcnode-id="931"><span data-dcnode-id="935" instrument_node="">NATO plays an essential role within the developing European Security Architecture. NATO's membership of like-minded Allies dedicated to working together has, over the course of its forty-five year existence, helped fundamentally improve the nature of relations between member states. Moreover, the commitment by all Allies to defend one another's territory has proven its value, over more than four decades, as an anchor of stability and confidence in Europe. This commitment has helped Allied countries develop powerful and flexible military capabilities, firmly under political control. NATO's reliance on collective defence has ensured that no single Ally is forced to rely upon its own national efforts alone in dealing with basic security challenges. Sharing these benefits with new members can help extend security and stability in Europe. NATO's enlargement will occur as one element of the broader evolution of European cooperation and security currently underway. NATO's enlargement must be understood as only one important element of a broad European security architecture that transcends and renders obsolete the idea of </span><em data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">"dividing lines"</span></em><span data-dcnode-id="932" instrument_node=""> in Europe.</span></li><li data-dcnode-id="926"><span data-dcnode-id="930" instrument_node="">The current discussion on enlargement is taking place in very different circumstances than those which prevailed during the Cold War. In this context, the decision to admit new members must reflect the fact that the security challenges and risks which NATO faces now are different in nature from those faced in the past. In 1991, the Strategic Concept stated, </span><em data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">"The threat of a simultaneous, full-scale attack on all of NATO's European fronts has effectively been removed ...."</span></em><span data-dcnode-id="927" instrument_node="">. Since then, the risk of a re-emergent large-scale military threat has further declined. Nevertheless, risks to European security remain, which are multi-faceted and multi-directional and thus hard to predict and assess. NATO must be capable of responding to such risks and new challenges as they develop if stability in Europe and the security of its members, old and new, are to be preserved. For their part, numerous countries aspire to NATO membership in the wider context of becoming part of existing European and Euro-Atlantic structures and strengthening their security and stability.</span></li><li data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Stability and security in Europe will be strengthened through an evolutionary process, taking into account political and security developments in the whole of Europe. NATO enlargement will be part of that process, threaten no-one and contribute to a developing broad European security architecture based on true cooperation throughout the whole of Europe, enhancing stability and security for all.</span></li><li data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">The architecture of European security is composed of European institutions (such as the European Union (EU) and the Western European Union (WEU)) and transatlantic institutions (NATO). It also includes the OSCE, whose membership comprises all European as well as North American countries and is thus the most inclusive European security institution, in whose framework agreements of particular importance for European security (the CFE Treaty and the Pact on Stability) have been concluded. For its part, NATO has developed cooperation arrangements: the NACC and PfP. NACC/PfP cooperation will continue to play an important role in the European security architecture both in enlarging the Alliance and in strengthening Alliance relations with partner countries which may not join the Alliance early or at all. This is addressed in Chapter 3.</span></li><li data-dcnode-id="915"><span data-dcnode-id="921" instrument_node="">Enlargement will have implications for all European nations, including states which do not join NATO early or at all. It will be important to maintain active, cooperative relations with countries which do not join the Alliance, in order to avoid divisions or uncertainties in Europe and to ensure broad, inclusive approaches to cooperative security. The Alliance should underline that there can be no question of </span><em data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">"spheres of influence"</span></em><span data-dcnode-id="918" instrument_node=""> in the contemporary Europe. NATO's relations with other European states, whether cooperation partners or not, are important factors to consider in taking any decision to proceed with the enlargement process as is building security for states which may not be prospective NATO members. Any such decision will have a significant impact on the European security environment and its timing, therefore, will require careful consideration. </span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Implementation of Russia's Individual Partnership Programme under the PfP and of our dialogue and cooperation with Russia beyond PfP will together renew and extend cooperation between the Alliance and Russia which we believe will enhance stability and security in Europe, as part of our broad approach to developing a cooperative security architecture in Europe. Equally, we want to develop further our relations with all newly independent states, whose independence and democracy constitute an important factor of security and stability for Europe. In this context, we attach particular importance to our relations with Ukraine which we will further develop, especially through enhanced cooperation within the PfP.</span></p></li></ol><blockquote data-dcnode-id="910"><p data-dcnode-id="911"><span class="BodySubTitle2" data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">B. NATO Enlargement and Other European Security Institutions, in particular the OSCE, EU and WEU</span></span></p></blockquote><ol data-dcnode-id="889" start="14"><li data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">There are several institutions with a critical role to play in the emerging European security architecture. It is important to assess NATO's enlargement in terms of how it can contribute to stability and security in conjunction with these other institutions.</span></li><li data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">As the most inclusive institution in the European security architecture, the OSCE has a key role to play in maintaining security and transcending divisions in Europe and should continue to be strengthened independently of enlargement of NATO. A strengthened OSCE will help to provide reassurance to states which may not join NATO either early or at all. The OSCE has developed unique capabilities in its 20-year history to contribute to security and stability in such areas as early warning, conflict prevention and crisis management, confidence and security-building measures, economic cooperation and the advancement of democracy and human rights.</span></li><li data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">The activities of the OSCE and of NATO are complementary and mutually reinforcing. NATO provides an important forum for political consultations among like-minded Allies as well as unique military capabilities to respond to security challenges. NATO's commitments to support, on a case-by-case basis and in accordance with Alliance procedures, peacekeeping activities under the responsibility of the OSCE and peacekeeping operations under the authority of the UN Security Council, will remain valid after enlargement. An enlarged Alliance would have greater capacity to support such peacekeeping activities and operations. OSCE discussions on a European security model for the 21st century should reflect the process of NATO enlargement but not delay it. A strengthened OSCE, an enlarged NATO, an active NACC and PfP would, together with other fora, form complementary parts of a broad, inclusive European security architecture, supporting the objective of an undivided Europe.</span></li><li data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">The Pact on Stability in Europe, which was entrusted to the OSCE and comprises numerous bilateral agreements and treaties between European countries, is a fundamental underpinning for security and stability in the whole of Europe. The Pact on Stability is aimed at developing good neighbourly relations, advancing respect for the human rights, including those of persons belonging to national minorities, and resolving disputes between European states. As noted in Chapter 1, the resolution of such disputes would be a factor in determining whether to invite a state to join the Alliance. Implementation of the Pact on Stability as well as of other international agreements already concluded can contribute to creating the conditions necessary for enlargement of NATO. In turn, enlargement of NATO's membership will also facilitate the implementation of existing agreements and full compliance with the obligations they contain.</span></li><li data-dcnode-id="898"><span data-dcnode-id="901" instrument_node="">Enlargement of the Alliance is aimed at extending stability in the Euro-Atlantic area and enhancing long-term security for all NATO member countries and others as well. The enlargement of NATO is a parallel process with and will complement that of the European Union. Both NATO and the EU share common strategic interests as well as a broad approach to stability and security encompassing political, economic, social and environmental aspects, along with the defence dimension. Both enlargement processes will contribute significantly to extending security, stability and prosperity enjoyed by their members to other, like-minded, democratic European states. Through the conclusion of Euro-agreements, the EU has given a number of European states a perspective of eventual EU membership and integration into EU structures. </span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">The enlargement of the two organizations will proceed autonomously according to their respective internal dynamics and processes. This means they are unlikely to proceed at precisely the same pace. But the Alliance views its own enlargement and that of the EU as mutually supportive and parallel processes which together will make a significant contribution to strengthening Europe's security structure. Thus, each organization should ensure that their respective processes are in fact mutually supportive of the goal of enhancing European stability and security. While no rigid parallelism is foreseen, each organization will need to consider developments in the other.</span></p></li><li data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">European Union members are committed to a Common Foreign and Security Policy which shall include all questions related to the security of the Union, including the eventual framing of a common defence policy, which might in time lead to a common defence compatible with that of the Atlantic Alliance. The WEU is an integral part of the development of the Union. In its dual role as defence component of the EU and European pillar of the Atlantic Alliance, the WEU brings an important additional dimension to European security. Acknowledging this dual role, and wishing to contribute to its further development, NATO Heads of State and Government, in January 1994, expressed their readiness to make collective assets of the Alliance available, on the basis of consultations in the North Atlantic Council, for WEU operations undertaken by the European Allies in pursuit of their Common Foreign and Security Policy.</span></li><li data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">All full members of the WEU are also members of NATO. Because of the cumulative effect of the security safeguards of Article V of the modified Brussels Treaty and of Article 5 of the Washington Treaty, the maintenance of this linkage is essential. Both enlargement processes should, therefore, be compatible and mutually supportive. At the same time, the WEU is being developed as the defence component of the European Union, which strengthens the relationship between the two organisations. An eventual broad congruence of European membership in NATO, EU and WEU would have positive effects on European security. The Alliance should at an appropriate time give particular consideration to countries with a perspective of EU membership, and which have shown an interest in joining NATO, in order to consider, on the basis indicated in this study, how they can contribute to transatlantic security within the Washington Treaty and to determine whether to invite them to join NATO.</span></li><li data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">All CFE States Parties acknowledge the Treaty's continued fundamental role in building and maintaining European stability and security. This is also shared by all other OSCE participating states. NATO Allies consider the CFE Treaty as the cornerstone of European security. Therefore, it is of fundamental importance to preserve the Treaty's integrity and to ensure its full and timely implementation. NATO as such is not a signatory of the CFE Treaty, nor of any other arms control agreement. Therefore, from a legal point of view, NATO's enlargement per se has no impact on the Treaty. In any case, possible implications of NATO's enlargement for the CFE Treaty can only be assessed when the actual enlargement is taking place. Since there is no decision as yet on the timing and the scope of NATO's enlargement, it would be premature to draw any conclusions at this stage.</span></li><li data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">The existing confidence-building, disarmament and arms control agreements are fundamental underpinnings for security and stability in the whole of Europe. NATO must contribute to their continuing validity and relevance in the course of its enlargement process. Enlargement could strengthen the Alliance's ability to promote further arms control and disarmament measures and ways to control proliferation of WMD.</span></li></ol><blockquote data-dcnode-id="885"><p data-dcnode-id="886"><span class="BodySubTitle2" data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">C. Relations with Russia</span></span></p></blockquote><ol data-dcnode-id="869" start="23"><li data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Russia has an important contribution to make to European stability and security. We have agreed that constructive, cooperative relations of mutual respect, benefit and friendship between the Alliance and Russia are a key element for security and stability in Europe. In June 1994, we agreed that such relations should be developed in a way that reflects common objectives and complements and reinforces relations with all other states, is transparent and is not directed against the interests of third countries. Cooperative NATO-Russia relations are in the interest not only of NATO and Russia, but of all other states in the OSCE area.</span></li><li data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">NATO and Russia have agreed to pursue a broad, enhanced dialogue and cooperation in areas where Russia has unique and important contributions to make, commensurate with its weight and responsibility as a major European, international and nuclear power.</span></li><li data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">In June 1994, NATO and Russia agreed to set in train the development of a far-reaching, cooperative NATO-Russia relationship aimed at enhancing mutual confidence and openness. At that time Russia signed the PfP Framework Document. By December, agreement had been reached on Russia's Individual Partnership Programme and areas for pursuance of a broad, enhanced NATO-Russia dialogue and cooperation beyond PfP, which were formally accepted by Russia on 31 May 1995.</span></li><li data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">The Alliance considers that it is desirable to develop the NATO-Russia relationship even further as part of our broad approach to developing a cooperative security architecture in Europe. NATO and Russia have initiated a dialogue, to be pursued in our newly established relationship beyond the PfP, on the future direction our relationship should take, with the aim of achieving by the end of this year a political framework for NATO-Russia relationselaborating basic principles for security cooperation as well as for the development of mutual political consultations. A stronger NATO-Russia relationship should form another cornerstone of a new, inclusive and comprehensive security structure in Europe. NATO-Russia cooperation can help to overcome any lingering distrust from the Cold War period, and help ensure that Europe is never again divided into opposing camps. This further development of the NATO-Russia relationship, and its possible eventual formalization, should take place in rough parallel with NATO's own enlargement, with the goal of further strengthening stability and security in Europe. The substance and form of this enhanced relationship will be developed through a NATO-Russia dialogue.</span></li><li data-dcnode-id="872"><span data-dcnode-id="876" instrument_node="">NATO-Russia relations should reflect Russia's significance in European security and be based on reciprocity, mutual respect and confidence, no </span><em data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">"surprise"</span></em><span data-dcnode-id="873" instrument_node=""> decisions by either side which could affect the interests of the other. This relationship can only flourish if it is rooted in strict compliance with international commitments and obligations, such as those under the UN Charter, the OSCE, including the Code of Conduct and the CFE Treaty, and full respect for the sovereignty of other independent states. NATO decisions, however, cannot be subject to any veto or droit de regard by a non-member state, nor can the Alliance be subordinated to another European security institution.</span></li><li data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Russia has raised concerns with respect to the enlargement process of the Alliance. The Alliance is addressing these concerns in developing its wider relationship with Russia and the Alliance has made it clear that the enlargement process including the associated military arrangements will threaten no-one and contribute to a developing broad European security architecture based on true cooperation throughout the whole of Europe, enhancing security and stability for all.</span></li></ol><blockquote data-dcnode-id="865"><p data-dcnode-id="866"><span class="BodySubTitle2" data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">D. Effects of the decision-making process on European security and stability</span></span></p></blockquote><ol data-dcnode-id="855" start="29"><li data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">The decision-making process on enlargement will be in accordance with the Washington Treaty. Each invitation will be decided on its own merits, case by case, and in accordance with the principles identified in this study, taking into account political and security related developments in the whole of Europe. It will be important, particularly in the meantime, not to foreclose the possibility of eventual Alliance membership for any European state in accordance with Article 10 of the Washington Treaty.</span></li><li data-dcnode-id="856"><span data-dcnode-id="862" instrument_node="">Countries could be invited to join sequentially or several countries could be simultaneously invited to join, bearing in mind that all Allies will decide by consensus on each invitation, i.e. new Allies must join consensus for subsequent invitations. There could be two or more sets of simultaneous invitations. Sequential accession could reduce the implication that others might be excluded and make it easier to begin with one or more countries but could also risk extending the calendar of accessions and thereby diverting attention from other important Alliance business. Simultaneous accessions would avoid the possibility of veto by new members on others joining at the same time; any decision on simultaneous accession should take into account relations among the prospective new members concerned and the impact on other states, including their relationship with NATO. Legislative/ratification considerations in Allied countries related to the accession of new member(s) to the Washington Treaty should also be taken into account. </span><p data-dcnode-id="857"><span data-dcnode-id="861" instrument_node="">Concerns have already been expressed in the context of the discussion of the enlargement of NATO that a new member might </span><em data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">"close the door"</span></em><span data-dcnode-id="858" instrument_node=""> behind it to new admissions in the future of other countries which may also aspire to NATO membership. Such a situation must be avoided; the Alliance rests upon commonality of views and a commitment to work for consensus; part of the evaluation of the qualifications of a possible new member will be its demonstrated commitment to that process and those values. We will invite prospective new members to confirm that they understand and accept this and act in good faith accordingly. The Alliance may require, if appropriate, specific political commitments in the course of accession negotiations.</span></p></li></ol><strong data-dcnode-id="850"><span class="BodySubTitle" data-dcnode-id="851"><span data-dcnode-id="854" instrument_node="">Chapter 3: </span><em data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">How NACC and PfP can contribute concretely to the enlargement process</span></em></span></strong><span data-dcnode-id="849" instrument_node=""> </span><blockquote data-dcnode-id="845"><p data-dcnode-id="846"><span class="BodySubTitle2" data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">A. Introduction</span></span></p></blockquote><ol data-dcnode-id="838" start="31" type="1"><li data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">The PfP and NACC can help to ensure that, in accepting new members, the Alliance will contribute to enhanced security and stability in an undivided Europe, fundamental goals of the Alliance, as discussed in Chapter II. As the enlargement process proceeds, NACC/PfP will continue to provide the fundamental framework for developing relations with partner countries. Dynamic NACC/PfP cooperation is an integral part of the European security architecture, deepening interaction and extending security and stability throughout Europe, and as a means to strengthen relations with partner countries, whether possible new members or not. In the context of enlargement, this will require particular attention and effort by the Alliance.</span></li><li data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">PfP will play an important role both to help prepare possible new members, through their participation in PfP activities, for the benefits and responsibilities of eventual membership and as a means to strengthen relations with partner countries which may be unlikely to join the Alliance early or at all. There will be a need to ensure that appropriate human and financial resources are directed to support those activities in accordance with PfP funding policy.</span></li><li data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">NACC will continue, as it has since its inception in 1991, to play a significant role in building confidence and drawing NATO Allies and cooperation partners closer together. In the context of enlargement, the importance of NACC will be enhanced, in particular, as a common forum encompassing NATO Allies and NACC/PfP partners for dialogue and consultation on political and security-related issues and for cooperation among its members to strengthen security.</span></li></ol><blockquote data-dcnode-id="834"><p data-dcnode-id="835"><span class="BodySubTitle2" data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">B. The Continuing Role of the NACC and the PfP in Strengthening European Security</span></span></p></blockquote><ol data-dcnode-id="814" start="34"><li data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">The Partnership for Peace is a key element in NATO's political and military cooperation programmes with non-member OSCE countries which deepens interaction, cooperation and stability in Europe and contributes to the overall goal of transparency. PfP is only at the beginning of its development; its full potential has not yet been achieved; and its continuing importance will not be affected by enlargement.</span></li><li data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Within the broader PfP framework, a critical aspect is that partners reaffirmed their commitment to the principles of the UN and the OSCE and their readiness to develop cooperative military relations with NATO to strengthen their ability to undertake peacekeeping and other missions under the authority of the UN and/or the responsibility of the OSCE. The Alliance should ensure that PfP gets all due attention and credit in this regard.</span></li><li data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">For countries that do not become members, NACC/PfP must constitute: a continuing vehicle for active cooperation with NATO; concrete evidence of NATO's continuing support and concern for their security; and their primary link to the Alliance, as a key Euro-Atlantic security institution, including for consultation with NATO in the event an active partner perceives a direct threat to its territorial integrity, political independence or security. The Alliance will maintain the importance, vitality and credibility of NACC/PfP as enlargement evolves to retain their value for countries which may be unlikely to join the Alliance early or at all. Maintaining the vitality of NACC/PfP may require new approaches and mechanisms to be devised in parallel to the Alliance's enlargement process. In this context, Ministers have instructed the Council to explore the scope for integrating the existing cooperative structures and procedures for NACC and the Partnership for Peace.</span></li><li data-dcnode-id="815"><span data-dcnode-id="827" instrument_node="">PfP cooperation should be further developed in order to: </span><ul data-dcnode-id="816" type="disc"><li data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">help partners to further develop democratic control of their armed forces and transparency in defence planning and budgeting processes, although this will largely depend on these countries' own efforts;</span></li><li data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">enhance the network of military and defence-related cooperation to provide effective support to partners in adapting their defence arrangements to the new security environment;</span></li><li data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">develop the cooperative features of PfP, e.g., through enhancing partners' involvement in developing, planning and implementing PfP activities, in particular by increasing their capability/readiness to contribute with others to peacekeeping, humanitarian, search and rescue and other activities to be agreed;</span></li><li data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">strengthen the confidence-building and transparent character of defence-related and military cooperation, both with Allies and among partners;</span></li><li data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">complement the development of interoperable forces by adequate mechanisms to duly involve partners in planning and carrying out joint peacekeeping operations.</span></li></ul></li></ol><blockquote data-dcnode-id="810"><p data-dcnode-id="811"><span class="BodySubTitle2" data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">C. The Role of PfP in Preparing for Membership</span></span></p></blockquote><ol data-dcnode-id="799" start="38"><li data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">PfP activities and programmes are open to all partners, who themselves decide which opportunities to pursue and how intensively to work with the Alliance through the Partnership. This varying degree of participation is a key element of the self-differentiation process. Active participation in PfP will play an important role in possible new members' preparation to join the Alliance, although it will not guarantee Alliance membership. Active participation in NACC/PfP will provide the framework for possible new members to establish patterns of political and military cooperation with the Alliance to facilitate a transition to membership. Through PfP planning, joint exercises and other PfP activities, including seminars, workshops and day-to-day representation in Brussels and at Mons, possible new members will increasingly become acquainted with the functioning of the Alliance, including with respect to policy-making, peacekeeping and crisis management. Possible new members' commitment to the shared principles and values of the Alliance will be indicated by their international behaviour and adherence to relevant OSCE commitments; however, their participation in PfP will provide a further important means to demonstrate such commitment as well as their ability to contribute to common defence.</span></li><li data-dcnode-id="804"><span data-dcnode-id="807" instrument_node="">For possible new members, PfP will contribute to their preparation both politically and militarily, to familiarise them with Alliance structures and procedures and to deepen their understanding of the obligations and rights that membership will entail. </span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">PfP will help partners undertake necessary defence management reforms as they establish the processes and mechanisms necessary to run a democratically controlled military organisation, in areas such as transparent national defence planning, resource allocation and budgeting, appropriate legislation and parliamentary and public accountability. PfP will assist possible new members to develop well-established democratic accountability and practices and to demonstrate their commitment to internationally-accepted norms of behaviour. Within the scope of the Framework Document, PfP also provides a means to promote and develop interoperability with Alliance forces by familiarising possible new members with important elements for interoperability.</span></p></li><li data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">The PfP Planning and Review Process and PfP exercises will introduce partners to collective defence planning and pave the way for more detailed operational planning. A biennial PfP Planning and Review Process has been offered to all Partners on an optional basis and provides a means of self-differentiation. Participation in the process will be the most effective way to develop, in the longer term, Partner forces that are better able to operate with those of the NATO Allies. Cooperation between Partners and the Alliance in the process will be broadened and deepened over time as appropriate. Results of this process should be incorporated in Partner defence plans and reflected in PfP IPPs and the Partnership Work Programme as appropriate. While new members will not be required to achieve full interoperability with NATO before joining the Alliance, they will need to meet certain minimum standards essential to a functioning and credible Alliance. These standards will continue to be developed by NATO and will be based in part on conclusions reached through the Planning and Review Process. Partners' own efforts will largely determine how quickly they progress in preparing for possible NATO membership, although outside assistance may facilitate progress.</span></li><li data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">The preparation of possible new members interested in joining NATO can be facilitated by an appropriate reinforcement and deepening of their Individual Partnership Programmes. Such a reinforcement and deepening is a key to self-differentiation. Among other things, it would allow partners to distinguish themselves by demonstrating their capabilities and their commitment with a view to possible NATO membership and to contribute to Alliance missions. Concerning the process of preparing for membership, the premature development of measures outside PfP for possible new members should be avoided. A clear distinction should be maintained between participation in PfP and an eventual invitation to join the Alliance. There will come a point, after a country has been invited to join the Alliance, when specific measures for preparing the accession of that country will have to be devised.</span></li></ol><p data-dcnode-id="793"><strong data-dcnode-id="794"><span class="BodySubTitle" data-dcnode-id="795"><span data-dcnode-id="798" instrument_node="">Chapter 4: </span><em data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">How to ensure that enlargement strengthens the effectiveness of the Alliance, preserves its ability to perform its core functions of common defence as well as to undertake peacekeeping and other new missions, and upholds the principles and objectives of the Washington Treaty</span></em></span></strong></p><blockquote data-dcnode-id="789"><p data-dcnode-id="790"><span class="BodySubTitle2" data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">A. Maintaining the Effectiveness of the Alliance to Perform its Core Functions and New Missions</span></span></p></blockquote><ol data-dcnode-id="737" start="42" type="1"><li data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">In enlarging its membership, the Alliance will want to ensure that it maintains its ability to take important decisions quickly on the basis of consensus and that enlargement results in an Alliance fully able to carry out both its core functions and its new missions. In addition to being fundamentally important in its own right, the Alliance's ability to act quickly, decisively and effectively is crucial to its role in the European security architecture and to its ability to integrate new members into it.</span></li><li data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">On joining the Alliance, new members must accept the full obligations of the Washington Treaty. This includes participation in the consultation process within the Alliance and the principle of decision-making by consensus, which requires a commitment to build consensus within the Alliance on all issues of concern to it. New members must also be prepared to contribute to collective defence under Article 5, to the Alliance's new evolving missions and to Alliance budgets. This may include appropriate contributions to the Alliance's military force and command structures and infrastructure. New members must accept and conform with the principles, policies and procedures adopted by all members of the Alliance at the time that new members join. In this respect, new members deciding to participate in the integrated military structure must accept the applicable policies and procedures.</span></li><li data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">NATO must ensure that all Alliance military obligations, particularly those under Article 5, will be met in an enlarged Alliance. This will require a case-by-case assessment of the military factors, including preparation time for NATO to take on new Article 5 commitments, for each prospective new member, taking into account the strategic environment, possible risks faced by potential new members, the capabilities and interoperability of their forces, their approach and that of the allies to the stationing of foreign forces on their territory, and the relevant reinforcement capabilities of Alliance forces, including strategic mobility. The Alliance will also have to ensure the accessibility of its forces to new members' territory for reinforcement, exercises, crisis management and, if applicable, stationing. This issue will need to be considered in the context of deciding individual new members' accession.</span></li><li data-dcnode-id="740"><span data-dcnode-id="782" instrument_node="">The Alliance will have to take a number of elements into account to ensure that NATO maintains its military credibility when it enlarges. Many of these elements may require further analysis and development by the Alliance in the course of the enlargement process. The Alliance bears the responsibility for determining the measures taken to maintain military credibility within each of these elements. These elements, which are developed further in later sections of this chapter and in chapter 5, fall into the following categories : </span><dl data-dcnode-id="741"><dt data-dcnode-id="779"><strong data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Collective Defence</span></strong></dt><dd data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">A key principle of the enlargement process is that new members will be expected not only to benefit from, but also to contribute to, the Alliance's collective defence. They should also be prepared to contribute to other Alliance missions;</span></dd><dt data-dcnode-id="774"><strong data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Command Structure</span></strong></dt><dd data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">All new members should participate in an appropriate way in the command structure of the Alliance. New members joining the integrated structure will need to be integrated into existing NATO headquarters. The Alliance will have to consider whether a limited number of new headquarters may be needed and any need for existing headquarters to cover new Areas of Responsibility. NATO operations will be controlled by existing or new NATO headquarters or, as appropriate, future CJTF headquarters;</span></dd><dt data-dcnode-id="769"><strong data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Conventional Forces</span></strong></dt><dd data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Training and Exercises New members will need to participate in NATO exercises, including those designed to ensure the common defence. Exercises should be held regularly on new members' territory;</span></dd><dt data-dcnode-id="764"><strong data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Nuclear Forces</span></strong></dt><dd data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">The supreme guarantee of the security of the Allies is provided by the strategic nuclear forces of the Alliance. New members will share the benefits and responsibilities from this in the same way as all other Allies in accordance with the Strategic Concept. New members will be expected to support the concept of deterrence and the essential role nuclear weapons play in the Alliance's strategy of war prevention as set forth in the Strategic Concept;</span></dd><dt data-dcnode-id="759"><strong data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Force Structure</span></strong></dt><dd data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">It is important for NATO's force structure that other Allies' forces can be deployed, when and if appropriate, on the territory of new members. The Alliance has no a priori requirement for the stationing of Alliance troops on the territory of new members. New members should participate in the Alliance's force structure. How this will be achieved may require additional considerations to include: whether new members should develop specially-trained units capable of reinforcing NATO forces and of being reinforced by NATO units; the prepositioning of materiel in critical areas; how to ensure that infrastructure is adequate to meet planned missions; and whether there is a need to increase strategic and intra-theatre mobility;</span></dd><dt data-dcnode-id="754"><strong data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Intelligence</span></strong></dt><dd data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">New members will have the opportunity to participate to the fullest extent possible in the NATO intelligence processes;</span></dd><dt data-dcnode-id="749"><strong data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Finance</span></strong></dt><dd data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">New members will be expected to contribute their share to NATO's commonly funded programmes. They should also be aware that they face substantial financial obligations when joining the Alliance;</span></dd><dt data-dcnode-id="744"><strong data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Interoperability</span></strong></dt><dd data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">All new members will be expected to make every effort to meet NATO interoperability standards, in particular for command, control and communication equipment. New members will have to incorporate NATO standard operational procedures in selected areas, including for their national headquarters.</span></dd></dl></li><li data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">A smooth and effective decision-making process in an enlarged Alliance will be key to preserving its effectiveness. Maintenance of the consensus principle will be essential in the political, military and defence areas. All Allies must therefore be willing to work constructively towards this. To this end, it will be important that prospective new members become familiar with the Alliance decision-making process, and the modalities and traditions of consensus and compromise, before joining. The highest priority should be given to a new member's involvement in the appropriate elements of the decision-making processes and military commands.</span></li></ol><blockquote data-dcnode-id="733"><p data-dcnode-id="734"><span class="BodySubTitle2" data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">B. The Military and Defence Implications of Enlargement</span></span></p></blockquote><ol data-dcnode-id="721" start="47"><li data-dcnode-id="727" style="LIST-STYLE-TYPE: none"><blockquote data-dcnode-id="728"><p data-dcnode-id="729"><strong data-dcnode-id="730"><em data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">(I) Collective Defence</span></em></strong></p></blockquote></li><li data-dcnode-id="722"><span data-dcnode-id="726" instrument_node="">As stated in paragraph 38 of the Strategic Concept, </span><em data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">"the collective nature of Alliance defence is embodied in practical arrangements that enable the Allies to enjoy the crucial political, military and resource advantages of collective defence, and prevent the renationalisation of defence policies, without depriving the Allies of their sovereignty. These arrangements are based on an integrated military structure as well as on cooperation and coordination agreements. Key features include collective force planning; common operational planning; multinational formations; the stationing of forces outside home territory, where appropriate on a mutual basis; crisis management and reinforcement arrangements; procedures for consultation; common standards and procedures of equipment, training and logistics; joint and combined exercises; and infrastructure, armaments and logistics cooperation"</span></em><span data-dcnode-id="723" instrument_node="">.</span></li></ol><ol data-dcnode-id="661" start="47"><li data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">There are currently three forms under which Allies contribute to NATO collective defence: full participation in the integrated military structure and the collective defence planning process; non-membership of the integrated military structure but full participation in the collective defence planning process together with a series of coordination agreements providing for cooperation with the integrated military structure in certain defined areas; and non-participation in the integrated military structure and collective defence planning but cooperation with the integrated military structure in more limited defined areas under agreements between the Chief of Defence and the Major NATO Commanders (MNCs). As a general principle, we should avoid new forms of contribution to NATO collective defence which would complicate unnecessarily practical cooperation among Allies and the Alliance's decision-making process.</span></li><li data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Against the background of existing arrangements for contributing to collective defence, Allies will want to know how possible new members intend to contribute to NATO's collective defence and will explore all aspects of this question in detail through bilateral dialogue prior to accession negotiations. In this context, the ability to contribute and the manner in which a possible new member intends to contribute to collective defence will be important criteria for Allies in deciding whether such a potential new member is capable and willing to contribute to security and stability in the trans-Atlantic area within the meaning of Article 10 of the Washington Treaty.</span></li><li data-dcnode-id="710"><span data-dcnode-id="716" instrument_node="">The Alliance will adopt a flexible approach to assimilating new members into its defence and military structures and its planning processes. The approach taken will ensure that an enlarged NATO maintains a credible military posture. </span><blockquote data-dcnode-id="711"><p data-dcnode-id="712"><strong data-dcnode-id="713"><em data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">(ii) Command Structure</span></em></strong></p></blockquote></li><li data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">NATO's command structure must be prepared for the probability that new members will want to join the integrated military structure. If enlargement takes place consecutively, considerable military flexibility will be required with regard to the establishment of new areas of responsibility and the related command structure. A broad plan will therefore be needed to ensure the maximum effectiveness and flexibility of the command structure following the accession of new members, bearing in mind the potential effect of the CJTF concept and of any structural adjustments.</span></li><li data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">NATO headquarters may be required on the territory of new members to cover the revised tasks and AORs resulting from their accession. Although it may be possible to upgrade new members' existing headquarters if necessary to meet an as yet undefined NATO requirement, existing command, control and communications equipment and infrastructure is unlikely to meet minimum NATO standards. The establishment of headquarters on the territory of new members may also have implications for NATO's existing command structure. The building of new headquarters and/or the upgrading of existing headquarters to NATO standards would involve significant costs although progress on the development of the CJTF concept may have a bearing on Alliance headquarters requirements. A country-specific review of the requirements and costs should be undertaken prior to a new member joining the integrated military structure.</span></li><li data-dcnode-id="699"><span data-dcnode-id="705" instrument_node="">Multinationality remains a key feature of Alliance policy. Any new NATO headquarters on the territory of a new member would therefore require multinational representation; this should reflect operational needs. New members will also have to be represented as appropriate at major headquarters (MSC and above), support elements, commonly-funded NATO Agencies, and on the International Military Staff. Enlargement would therefore probably require a review of the size of staffs at most NATO headquarters and national representation. This process would inevitably be complicated if new members join consecutively. </span><blockquote data-dcnode-id="700"><p data-dcnode-id="701"><em data-dcnode-id="702"><strong data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">(iii) Conventional Forces - Training and Exercises</span></strong></em></p></blockquote></li><li data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">The presence of Allied Forces on the territory of other members contributes to strengthening the Alliance's ability to perform its fundamental security tasks, fostering Alliance cohesion and expressing solidarity and confidence. This presence could take various forms. The stationing of Allied forces offers specific military advantages in relation to collective defence. It allows a threat or an attack to be countered earlier, and provides more time to prepare and deploy reinforcements, enabling the most effective use to be made of mobility. Moreover, military forces operate more effectively when they are familiar with the terrain and conditions. However, the redeployment of existing Allied forces from their current locations or the prepositioning of equipment would be expensive. There also is a risk that it could give a misleading impression of Alliance concerns. The regular and frequent presence of Allied forces on exercise or when other situations demand is another way to demonstrate NATO's commitment to collective defence. This option may not be adequate in all cases. It would in any event require effective rapid reaction and reinforcement capabilities and planning, and adequate warning time to allow for political decision making and the deployment of forces in time of crisis. Other options might include dual basing of air assets, or the prepositioning of equipment and ammunition (e.g., increased prepositioned materiel in key areas and increased storage sites for such materiel in key geographical areas).</span></li><li data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Individual Allies' policy on the stationing of other Allies' forces on their territory in peacetime varies considerably, taking into account a range of national and broader factors. For new members, the peacetime stationing of other Allies' forces on their territory should neither be a condition of membership nor foreclosed as an option. Decisions on the stationing of Allies' conventional forces on the territory of new members will have to be taken by the Alliance in the light of the benefits both to the Alliance as a whole and to particular new members, the military advantages of such a presence, the Alliance's military capacity for rapid and effective reinforcement, the views of the new members concerned, the cost of possible military options, and the wider political and strategic impact. All Allies must of course be prepared in times of crisis or war to allow other Allies' forces to enter and operate on their territory, and to provide essential host nation support as mutually agreed, to enable NATO to provide effective common defence.</span></li><li data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Individual Allies' policy on stationing their forces outside their borders in peacetime also varies considerably. Some Allies are, for example, legally constrained from doing so. For new members the peacetime stationing of forces on other Allies' territory should neither be a condition of membership nor foreclosed as an option. All Allies are, however, prepared in principle to deploy their forces outside their territory in the Treaty area as part of their contribution to NATO collective defence, taking into account factors such as operational capabilities and geographic limitations. New members should be expected to be similarly prepared.</span></li><li data-dcnode-id="684"><span data-dcnode-id="692" instrument_node="">Multinational training and exercises on the territory of new members will contribute significantly to maintaining Alliance military capability and effectiveness and enhance the ability of the Alliance to fulfil its full range of missions. </span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Such exercising and training would help familiarise the forces involved with the terrain and operating conditions, and would contribute directly to supporting Article 5 commitments. Reinforcement should also be exercised from time to time. The terms on which such activities currently take place vary between Allies and have to take account of national factors. However, as a general principle, new members should be ready to host multinational training and exercises relating to all Alliance missions.</span></p><blockquote data-dcnode-id="685"><p data-dcnode-id="686"><em data-dcnode-id="687"><strong data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">(iv) Nuclear Forces</span></strong></em></p></blockquote></li><li data-dcnode-id="677"><span data-dcnode-id="683" instrument_node="">The coverage provided by Article 5, including its nuclear component, will apply to new members. There is no a priori requirement for the stationing of nuclear weapons on the territory of new members. In light of both the current international environment and the potential threats facing the Alliance, NATO's current nuclear posture will, for the foreseeable future, continue to meet the requirements of an enlarged Alliance. There is, therefore, no need now to change or modify any aspect of NATO's nuclear posture or policy, but the longer term implications of enlargement for both will continue to be evaluated. NATO should retain its existing nuclear capabilities along with its right to modify its nuclear posture as circumstances warrant. New members will, as do current members, contribute to the development and implementation of NATO's strategy, including its nuclear components; new members should be eligible to join the Nuclear Planning Group and its subordinate bodies and to participate in nuclear consultation during exercises and crisis. Decisions on the modalities and specifics of this contribution will be based on consultations, and agreements among Allies. </span><blockquote data-dcnode-id="678"><p data-dcnode-id="679"><em data-dcnode-id="680"><strong data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">(v) Force Structures</span></strong></em></p></blockquote></li><li data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">The Alliance's military strength and cohesion depends on its multinational forces and structures, and the fair sharing of risks, responsibilities, costs and benefits. Current force structures are based primarily on the requirements of collective defence, but Alliance involvement in non-Article 5 operations will continue to influence future capabilities. All Alliance nations have a high degree of ability to operate together, although there is room for further improvement.</span></li><li data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Subject to any changes in the security environment, the main characteristics of current NATO force structures will remain valid in an enlarged Alliance. However, the Alliance will need to pay special attention to the requirements of inter-regional reinforcement, and their potential impact on the various force categories. To ensure continued Alliance military effectiveness, current and prospective new members must be committed to developing, manning and supporting NATO's new force structures. New members' forces would be expected to take part in the full spectrum of Alliance missions to the extent appropriate to their capabilities, and taking into account the need for case by case consideration of non-Article 5 missions. The further development of Alliance military structures, including force levels and readiness, should facilitate such involvement across the spectrum of potential Alliance missions.</span></li><li data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Multinational forces have an increased political and military importance. Thus the increasing need for mobility, flexibility and inter-service and multinational interoperability in undertaking both defence and new missions means that current Alliance policy on multinationality should apply when new members' forces join NATO force structure, consistent with the need to maintain military effectiveness.</span></li><li data-dcnode-id="664"><span data-dcnode-id="670" instrument_node="">There is a continuing need to address current limitations in reaction force capabilities, which have to be taken into account to ensure that there is no reduction in military effectiveness. The principle of multinationality should also apply in integrating new members' forces into main defence forces. No change of current policy towards augmentation forces would seem to be necessary as a result of enlargement. There will, however, be a substantial impact, the extent of which has yet to be determined, on contingency and reinforcement planning including force requirements and host nation support arrangements. Prepositioning of equipment, and both intra-theatre and inter-theatre lift, can contribute to flexibility and military effectiveness. Further examination of these elements will be required when enlargement occurs. </span><blockquote data-dcnode-id="665"><p data-dcnode-id="666"><em data-dcnode-id="667"><strong data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">(vi) Intelligence Sharing</span></strong></em></p></blockquote></li><li data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Sharing of intelligence among Allies contributes to the effectiveness of the Alliance. New members will bring to the Alliance both increased requirements and capabilities in the intelligence field. Intelligence sharing is based on mutual trust and co-operation. New members must be able tosafeguard NATO information according to Alliance standards.</span></li></ol><blockquote data-dcnode-id="657"><p data-dcnode-id="658"><span class="BodySubTitle2" data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">C. Security Investment Programme (SIP)</span></span></p></blockquote><ol data-dcnode-id="649" start="64"><li data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">The NATO Security Investment Programme should be used to accelerate the assimilation process of new members. The scope of this will depend upon the terms under which new members will participate. Procedurally and organisationally, the incorporation of new members into the Programme will not present problems although the process may take time. The renewed prioritisation and resource allocation mechanisms are well suited to deal with new requirements resulting from enlargement.</span></li><li data-dcnode-id="650"><span data-dcnode-id="654" instrument_node="">Financially, new members would be expected to contribute their share, as from the start, to all new programme activities, with a contribution level based, in a general way, on </span><em data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">"ability to pay"</span></em><span data-dcnode-id="651" instrument_node="">. Because of the time needed in an investment programme to bring activities to implementation, and because of the limited absorption capacity of new members, financial implications will be limited in the early years. Enlarged participation in the programme should therefore be possible without impact on the implementation of existing commitments and programmes. It is important, however, to get prospective new members involved in the planning and preparatory processes as soon as possible and to ensure that they are fully aware of their prospective liabilities.</span></li></ol><blockquote data-dcnode-id="645"><p data-dcnode-id="646"><span class="BodySubTitle2" data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">D. Administration and Budgets</span></span></p></blockquote><ol data-dcnode-id="640" start="66"><li data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Without knowing the number of prospective new members it is only possible to address management issues in a general manner. Enlargement will lead to new activities and a need for increased resources. Additional office space will be needed at NATO HQ to accommodate new members and possible increases to the staffs of the IS and IMS. Operating and capital costs in the Civil Budget will grow. New members will be expected to contribute. Cost shares must be calculated and decisions taken concerning their obligations. Enlargement will also mean increases in the Military Budget, but the actual budgetary consequences will depend in large part on the new members' level of participation.</span></li><li data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">It will be important to ensure that potential new members are fully aware that they face considerable financial obligations when joining the Alliance.</span></li></ol><strong data-dcnode-id="635"><span class="BodySubTitle" data-dcnode-id="636"><span data-dcnode-id="639" instrument_node="">Chapter 5: </span><em data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">What are the implications of membership for new members, including their rights and obligations, and what do they need to do to prepare for membership?</span></em></span></strong><span data-dcnode-id="634" instrument_node=""> </span><ol data-dcnode-id="631" start="68" type="1"><li data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">New members will be full members of the Alliance, enjoying all the rights and assuming all the obligations under the Washington Treaty. There must be no "second tier" security guarantees or members within the Alliance and no modifications of the Washington Treaty for those who join. Possible new members should prepare themselves on this basis. Although this Chapter describes the principal rights and obligations of new member states, some more specific rights and obligations are covered elsewhere, in Chapters 2, 3 and 4.</span></li></ol><blockquote data-dcnode-id="627" dir="ltr" style="MARGIN-RIGHT: 0px"><p data-dcnode-id="628"><span class="BodySubTitle" data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">A. What will be Expected Politically of New Members</span></span></p></blockquote><ol data-dcnode-id="588" start="69"><li data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Commitments entered into by new member states should be the same as for present Allies, including acceptance of the principles, policies and procedures already adopted by all members of the Alliance at the time that new members join. Willingness and ability to meet such commitments, not only on paper but in practice, would be a critical factor in any decision to invite a country to join.</span></li><li data-dcnode-id="594"><span data-dcnode-id="624" instrument_node="">Bearing in mind that there is no fixed or rigid list of criteria for inviting new members to join the Alliance, possible new member states will, nevertheless, be expected to : </span><ul data-dcnode-id="595" type="disc"><li data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Conform to basic principles embodied in the Washington Treaty: democracy, individual liberty and the rule of law;</span></li><li data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Accept NATO as a community of like-minded nations joined together for collective defence and the preservation of peace and security, with each nation contributing to the security and defence from which all member nations benefit;</span></li><li data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Be firmly committed to principles, objectives and undertakings included in the Partnership for Peace Framework Document;</span></li><li data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Commit themselves to good faith efforts to build consensus within the Alliance on all issues, since consensus is the basis of Alliance cohesion and decision-making;</span></li><li data-dcnode-id="614"><span da
