</span><p data-dcnode-id="1810"><strong data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">CyberBerkut</span></strong><span data-dcnode-id="1825" instrument_node=""> is another GRU-related hacktivist-style group, which has been active since the beginning of Russia’s conflict with Ukraine. The group appropriated former Ukrainian President Viktor Yanukovych’s special police force’s name (the Ukrainian word </span><em data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">berkut </span></em><span data-dcnode-id="1822" instrument_node="">referring to a golden eagle) and logo, and aligns itself with Russia’s influence efforts in Ukraine. However, its identity as a Ukrainian internal opposition group is largely questioned,</span><a data-dcnode-id="1820" href="#_ftn66" name="_ftnref66" title=""><span data-dcnode-id="1821" instrument_node="">[66]</span></a><span data-dcnode-id="1819" instrument_node=""> and more recent investigations indicate that the group coordinates its actions with the GRU’s APT28.</span><a data-dcnode-id="1817" href="#_ftn67" name="_ftnref67" title=""><span data-dcnode-id="1818" instrument_node="">[67]</span></a><span data-dcnode-id="1816" instrument_node=""> The group uses both technical and psychological attacks, and has been involved in cyber-espionage, information operations, and disruptive computer network intrusions, including DDoS (Distributed denial of service) against Ukraine, NATO and German government websites.</span><a data-dcnode-id="1814" href="#_ftn68" name="_ftnref68" title=""><span data-dcnode-id="1815" instrument_node="">[68]</span></a><span data-dcnode-id="1813" instrument_node=""> Focused mainly on attempts to discredit the Ukrainian government, the group was involved in the attempted sabotage of Ukraine’s presidential election in 2014.</span><a data-dcnode-id="1811" href="#_ftn69" name="_ftnref69" title=""><span data-dcnode-id="1812" instrument_node="">[69]</span></a></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1756"><strong data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">Unit 74455</span></strong><span data-dcnode-id="1806" instrument_node=""> is suspected to be behind the activities of Sandworm group (also known as </span><em data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">Telebots, Voodoo Bear</span></em><span data-dcnode-id="1803" instrument_node=""> and </span><em data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Iron Viking</span></em><span data-dcnode-id="1800" instrument_node="">). The group has been identified by the cyber security industry as responsible for some of the most destructive cyberattacks.</span><a data-dcnode-id="1798" href="#_ftn70" name="_ftnref70" title=""><span data-dcnode-id="1799" instrument_node="">[70]</span></a><span data-dcnode-id="1797" instrument_node=""> In the US indictment from 19 October 2020, GRU hackers were charged with computer attacks that “used some of the world’s most destructive malware to date, including: </span><em data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">KillDisk </span></em><span data-dcnode-id="1794" instrument_node="">and </span><em data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">Industroyer</span></em><span data-dcnode-id="1791" instrument_node="">, which each caused blackouts in Ukraine (in 2015 and 2016); </span><em data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">NotPetya</span></em><span data-dcnode-id="1788" instrument_node="">, which caused nearly $1 billion in losses to the three victims identified in the indictment alone; and</span><em data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node=""> Olympic Destroyer</span></em><span data-dcnode-id="1785" instrument_node="">, which disrupted thousands of computers used to support the 2018 PyeongChang Winter Olympics.”</span><a data-dcnode-id="1783" href="#_ftn71" name="_ftnref71" title=""><span data-dcnode-id="1784" instrument_node="">[71]</span></a><strong data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">SVR </span></strong><span data-dcnode-id="1780" instrument_node="">(Foreign Intelligence Service) is one of two external intelligence agencies (GRU is the other), and its main tasks are human and strategic intelligence activities. In contrast to the GRU, which uses cyberspace not only for espionage but also for sabotage and information operations, SVR mostly steals information for traditional espionage purposes, seeking secrets that might help the Kremlin understand the plans and motives of politicians and policymakers</span><a data-dcnode-id="1778" href="#_ftn72" name="_ftnref72" title=""><span data-dcnode-id="1779" instrument_node="">[72]</span></a><span data-dcnode-id="1777" instrument_node="">. The security community has connected SVR to </span><strong data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">APT29 </span></strong><span data-dcnode-id="1774" instrument_node="">(</span><em data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Cozy Bear/The Dukes</span></em><span data-dcnode-id="1771" instrument_node="">) activities</span><a data-dcnode-id="1769" href="#_ftn73" name="_ftnref73" title=""><span data-dcnode-id="1770" instrument_node="">[73]</span></a><span data-dcnode-id="1768" instrument_node="">. It is a highly-sophisticated hacker group with constantly evolving tools and highly capable operators. The group’s attack infrastructure is complex and expensive.&nbsp;The group tends to exploit legitimate online services for its actions, making them less detectable due to their false benign cover.</span><a data-dcnode-id="1766" href="#_ftn74" name="_ftnref74" title=""><span data-dcnode-id="1767" instrument_node="">[74]</span></a><span data-dcnode-id="1765" instrument_node=""> APT29 has been linked to interference in the 2016 US elections, espionage operations against US state agencies, think thanks and NGOs, Dutch and Norwegian government institutions in 2017, as we all as anti-COVID vaccine data in the US, UK and Canada. APT29 may also be behind one of the largest cyber-espionage campaigns targeted against US federal government, security services and critical infrastructure in 2020, dubbed as the ‘SolarWinds hack’ (named after the company from which software was compromised), </span><a data-dcnode-id="1763" href="#_ftn75" name="_ftnref75" title=""><span data-dcnode-id="1764" instrument_node="">[75]</span></a><span data-dcnode-id="1762" instrument_node=""> while other experts have noticed similarities to the codes used by </span><em data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Turla </span></em><span data-dcnode-id="1759" instrument_node="">APT.</span><a data-dcnode-id="1757" href="#_ftn76" name="_ftnref76" title=""><span data-dcnode-id="1758" instrument_node="">[76]</span></a></p><span data-dcnode-id="1755" instrument_node="">
</span><p data-dcnode-id="1742"><span data-dcnode-id="1754" instrument_node="">Until recent years, the information confrontation was considered a function of intelligence services, which is why the armed forces’ actions were limited to areas of overlap between cyber operations and electronic warfare. However, there have been media reports about creation of ‘information troops’ in the Russian armed forces aimed at conducting information operations.</span><a data-dcnode-id="1752" href="#_ftn77" name="_ftnref77" title=""><span data-dcnode-id="1753" instrument_node="">[77]</span></a><span data-dcnode-id="1751" instrument_node=""> In 2013, the Kremlin also announced the creation of a cyber-unit within the military,</span><a data-dcnode-id="1749" href="#_ftn78" name="_ftnref78" title=""><span data-dcnode-id="1750" instrument_node="">[78]</span></a><span data-dcnode-id="1748" instrument_node=""> which includes a wide variety of specialists including programmers, mathematicians, cryptographers, and electronic warfare and communications experts</span><a data-dcnode-id="1746" name="_Hlk15393629"><span data-dcnode-id="1747" instrument_node="">.</span></a><a data-dcnode-id="1744" href="#_ftn79" name="_ftnref79" title=""><span data-dcnode-id="1745" instrument_node="">[79]</span></a><span data-dcnode-id="1743" instrument_node=""> However, publicly available information on the status of cyber capabilities within the Russian armed forces is limited.</span></p><span data-dcnode-id="1741" instrument_node="">
</span><p data-dcnode-id="1737"><span data-dcnode-id="1740" instrument_node="">Covert actors affiliated with the state or so called “proxies” encompass oligarchs, businesses, non-profit organizations, the Russian orthodox church, the media, civilians, gangs, government-organized nongovernmental organizations and criminal organizations. Many actors operate in an independent manner despite receiving financial support and guidance from the Presidential Administration.</span><a data-dcnode-id="1738" href="#_ftn80" name="_ftnref80" title=""><span data-dcnode-id="1739" instrument_node="">[80]</span></a></p><span data-dcnode-id="1736" instrument_node="">
</span><p data-dcnode-id="1729"><span data-dcnode-id="1735" instrument_node="">An important actor is ‘</span><strong data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">patriotic hackers</span></strong><span data-dcnode-id="1732" instrument_node="">’&nbsp;which refers to people who are not officially part of the state machinery, but who might act based on their attachment to the state either independently or be given direction by the state. Individuals with a background in computer sciences and mathematics are targeted and lured into hacking activities.</span><a data-dcnode-id="1730" href="#_ftn81" name="_ftnref81" title=""><span data-dcnode-id="1731" instrument_node="">[81]</span></a></p><span data-dcnode-id="1728" instrument_node="">
</span><p data-dcnode-id="1718"><span data-dcnode-id="1727" instrument_node="">In addition to these groups are </span><strong data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">cyber criminals</span></strong><span data-dcnode-id="1724" instrument_node="">, who are either paid by intelligence services or, if willing to put their skills to the service of the state, will have their prison sentences significantly reduced.</span><a data-dcnode-id="1722" href="#_ftn82" name="_ftnref82" title=""><span data-dcnode-id="1723" instrument_node="">[82]</span></a><span data-dcnode-id="1721" instrument_node=""> An example of Russia’s intelligence services’ use of criminal hackers is the Yahoo hack. The FSB used criminals (whose actions led to the losses of hundreds of millions of euros for Western companies and financial institutions) to break into Yahoo, committing one of the most significant data breaches in history.</span><a data-dcnode-id="1719" href="#_ftn83" name="_ftnref83" title=""><span data-dcnode-id="1720" instrument_node="">[83]</span></a></p><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1716" instrument_node="">The reason for the use of cyber criminals might be two-fold: it provides </span><strong data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">plausible deniability</span></strong><span data-dcnode-id="1713" instrument_node=""> as their link to the government is unclear, and it is </span><strong data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">cost-effective</span></strong><span data-dcnode-id="1710" instrument_node=""> as hackers can be summoned to unleash attacks only when needed, and patriotic hackers will also often work for free.</span></p><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1695"><strong data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">Internet Research Agency</span></strong><span data-dcnode-id="1705" instrument_node=""> (IRA), also known as the troll factory of St. Petersburg, is a private organization that operates at the whim of the Kremlin. Its employees, divided into substance-specific departments, contribute to article discussions, comment on social media based on instructions, and create their own infographics and live videos for popular blogging services in order to facilitate Kremlin’s narratives or attack its opponents.</span><a data-dcnode-id="1703" href="#_ftn84" name="_ftnref84" title=""><span data-dcnode-id="1704" instrument_node="">[84]</span></a><span data-dcnode-id="1702" instrument_node=""> The activities of &nbsp;the IRA have been attributable since late 2013 (as the Ukrainian conflict escalated), and they have been active in promoting pro-Kremlin narratives and attacking its opponents in Russia and abroad, as well working to increase polarization through social media in the wake of US presidential elections both in 2016 and 2020. Although the IRA took an active role in manipulating audiences and exacerbating societal tensions in the US, its role and effectiveness should not be overestimated. According to Thomas Rid, the US elections have proven the well-established division of labour between IRA and hackers of Russia’s intelligence services. Russian intelligence services are conducting their hack and leak operations, while outsourcing the ‘noisy and cheap business of driving wedges through social media’ to third-party service providers. The IRA ‘worked more like a spammy call center than a tight intelligence agency, with limited operational security, very limited presence on the ground of target area and no known operational coordination with Russian intelligence’.</span><a data-dcnode-id="1700" href="#_ftn85" name="_ftnref85" title=""><span data-dcnode-id="1701" instrument_node="">[85]</span></a><span data-dcnode-id="1699" instrument_node=""> The IRA might not be the only company that is working in support of Russia’s security interests, as there are several private companies in the market that offer similar services of social media manipulation</span><a data-dcnode-id="1697" href="#_ftn86" name="_ftnref86" title=""><span data-dcnode-id="1698" instrument_node="">[86]</span></a><span data-dcnode-id="1696" instrument_node="">.</span></p><span data-dcnode-id="1694" instrument_node="">
</span><p data-dcnode-id="1692"><img alt="" data-dcnode-id="1693" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratcomcoe.org/uploads/_F47AF8D6_D26C_494B_8A2A_D4A0569.png.jpg&amp;raw"></p><span data-dcnode-id="1691" instrument_node="">
</span></div><span data-dcnode-id="1689" instrument_node="">
</span></div><span data-dcnode-id="1687" instrument_node="">
</span></div><span data-dcnode-id="1685" instrument_node="">
</span></div><span data-dcnode-id="1683" instrument_node="">
</span><div class="accordion p-0" data-dcnode-id="1287"><span data-dcnode-id="1682" instrument_node="">
</span><div class="collapse-heading" data-dcnode-id="1679"><a aria-expanded="false" class="accordion-title collapsed" data-dcnode-id="1680" data-toggle="collapse" href="#acco_acco_1623422062463"><span data-dcnode-id="1681" instrument_node="">ACTIVITIES IN CYBERSPACE</span></a></div><span data-dcnode-id="1678" instrument_node="">
</span><div class="collapse col_me" data-dcnode-id="1289" data-parent=".accordion" id="acco_acco_1623422062463"><span data-dcnode-id="1677" instrument_node="">
</span><div class="accordion-body" data-dcnode-id="1291"><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1671"><em data-dcnode-id="1672"><span data-dcnode-id="1675" instrument_node="">“No country has weaponized its cyber capabilities as maliciously or irresponsibly as Russia, wantonly causing unprecedented damage to pursue small tactical advantages and to satisfy fits of spite,”</span><a data-dcnode-id="1673" href="#_ftn87" name="_ftnref87" title=""><span data-dcnode-id="1674" instrument_node="">[87]</span></a></em></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1666" instrument_node="">Russia holds an array of tools for actions in cyberspace, which are both </span><strong data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">information-technical </span></strong><span data-dcnode-id="1663" instrument_node="">and </span><strong data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">information-psychological </span></strong><span data-dcnode-id="1660" instrument_node="">and involve state actors as well as proxies. Each tool, nevertheless, suits best a different purpose, which varies from information gathering to influence on decision-making to complementing kinetic operations. It is also important to distinguish between actions aimed at domestic audiences and those targeting foreign countries and various groups therein.</span></p><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1650"><span data-dcnode-id="1657" instrument_node="">Russia is unique among contemporary cyber powers in its conceptualisation of the indivisibility of technical and psychological computer network operations, which range from offensive cyber operations on critical infrastructure, to using false social media personas to disseminate messaging that supports Russia’s foreign policy or military objectives.</span><a data-dcnode-id="1655" href="#_ftn88" name="_ftnref88" title=""><span data-dcnode-id="1656" instrument_node="">[88]</span></a><span data-dcnode-id="1654" instrument_node=""> More than any other country, Russia attempts to achieve cognitive effects when conducting cyber operations.</span><a data-dcnode-id="1652" href="#_ftn89" name="_ftnref89" title=""><span data-dcnode-id="1653" instrument_node="">[89]</span></a><span data-dcnode-id="1651" instrument_node=""> Most tactics are intended to affect the ‘information confrontation’ that is happening in the grey zone between war and peace.&nbsp; This section will analyse how this approach is put into practice by exploring cases of Russia’s offensive cyber operations.</span></p><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1644"><br data-dcnode-id="1648"><span data-dcnode-id="1647" instrument_node="">
</span><strong data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">Ukraine</span></strong></p><span data-dcnode-id="1643" instrument_node="">
</span><p data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">To date, the conflict in Ukraine remains the most complex example of information confrontation, offering a showcase of Russian means and methods. Ukraine has been in military conflict with Russia since the Maidan revolution of 2013. This was swiftly followed by the annexation of Crimea by Russia in 2014 and warfighting in the Eastern part of Ukraine. In the framework of this ongoing conflict, Ukraine has served as an essential testing ground for many of Russia’s cyber capabilities.</span></p><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1633"><span data-dcnode-id="1639" instrument_node="">During Russia’s operation in Crimea, coordination between EW, cyber operations and information operations was used in support of kinetic activities. For example, in 2014, Ukrainian telephone provider UKRTelecom claimed that Russian troops in Crimea had tampered with critical fiber optic cables and severed the connection (landline, mobile and Internet services) between the peninsula and the mainland.</span><a data-dcnode-id="1637" href="#_ftn90" name="_ftnref90" title=""><span data-dcnode-id="1638" instrument_node="">[90]</span></a><span data-dcnode-id="1636" instrument_node=""> The cell phones of Ukrainian parliament members were interfered with, and the Ukraine government website was knocked offline. On March 8, DDoS attacks hit the National Security and Defence Council of Ukraine and the Ukrainian state-run news agency Ukrinform. On March 16, the day of the referendum for Crimea’s annexation, NATO websites were attacked by the GRU-linked hacktivist group ‘CyberBerkut’.</span><a data-dcnode-id="1634" href="#_ftn91" name="_ftnref91" title=""><span data-dcnode-id="1635" instrument_node="">[91]</span></a></p><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1627"><span data-dcnode-id="1631" instrument_node="">A significant example which combined technical and psychological means of ‘information confrontation’ was the targeting of Ukraine’s presidential election in May 2014. The elections happened in the wake of the ongoing conflict with Russia and were aimed at discrediting the new Ukrainian government, which was established after pro-Russian President Viktor Yanukovich resigned and fled the country. Three days before the presidential election in May 2014, an attack was launched on the Central Electoral Committee’s (CEC) network. The attack disabled real-time display of vote count, and culminated with attackers posting a statement on the CEC website claiming a presidential election win for a far-right candidate. The display of the actual vote count was restored 40 minutes before the final announcement on Ukrainian television, yet the doctored CEC image claiming a false-victory was immediately shown across Russian TV channels, suggesting coordination between Russian hackers and Russian media.</span><a data-dcnode-id="1629" href="#_ftn92" name="_ftnref92" title=""><span data-dcnode-id="1630" instrument_node="">[92]</span></a><span data-dcnode-id="1628" instrument_node=""> While this attack did not have long-lasting effects, it is an example of how many Russian operations are aimed simply at disruption and sowing instability and fear.</span></p><span data-dcnode-id="1626" instrument_node="">
</span><p data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1623" instrument_node="">
</span><span data-dcnode-id="1622" instrument_node="">
</span><span data-dcnode-id="1621" instrument_node="">
</span><span data-dcnode-id="1620" instrument_node="">
</span><span data-dcnode-id="1585" instrument_node="">
</span><span data-dcnode-id="1583" instrument_node="">
</span><span data-dcnode-id="1581" instrument_node="">
</span><table border="1" cellpadding="1" cellspacing="1" data-dcnode-id="1580"><tbody data-dcnode-id="1582"><tr data-dcnode-id="1584"><td data-dcnode-id="1586"><span data-dcnode-id="1619" instrument_node="">
</span><div data-dcnode-id="1588" style="background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;"><strong data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Disruption of Ukrainian Power Grid and Infrastructure</span></strong><br data-dcnode-id="1616"><span data-dcnode-id="1615" instrument_node="">
</span><br data-dcnode-id="1614"><span data-dcnode-id="1613" instrument_node="">
			Ukraine has also been a victim of disruptive cyber-attacks against its power infrastructure, which caused blackouts for large parts of the population in 2015 and 2016. According to security researchers, those were the first instances in history when cyber attackers caused a major electricity cut; they have also ‘used some of the world’s most destructive malware to date.’</span><a data-dcnode-id="1611" href="#_ftn93" name="_ftnref93" title=""><span data-dcnode-id="1612" instrument_node="">[93]</span></a><span data-dcnode-id="1610" instrument_node=""> In December 2015, regional electric grids were attacked resulting in a blackout for two to six hours affecting 200,000-230,000 people.</span><a data-dcnode-id="1608" href="#_ftn94" name="_ftnref94" title=""><span data-dcnode-id="1609" instrument_node="">[94]</span></a><span data-dcnode-id="1607" instrument_node=""> A similar incident took place in 2016</span><a data-dcnode-id="1605" href="#_ftn95" name="_ftnref95" title=""><span data-dcnode-id="1606" instrument_node="">[95]</span></a><span data-dcnode-id="1604" instrument_node="">, whereby attackers briefly cut power to one fifth of Kiev’s residents, and the railway systems were affected as well. Both incidents involved several phases, beginning with spear phishing and credential harvesting, network mapping, the creation of tools for the exfiltration data, the remote seizure of control systems, and finally the installation of malware.</span><a data-dcnode-id="1602" href="#_ftn96" name="_ftnref96" title=""><span data-dcnode-id="1603" instrument_node="">[96]</span></a><span data-dcnode-id="1601" instrument_node=""> Similar attacks against energy infrastructure have also been registered in the Baltics, intensifying during Russia’s military exercises close to the countries’ borders.</span><a data-dcnode-id="1599" href="#_ftn97" name="_ftnref97" title=""><span data-dcnode-id="1600" instrument_node="">[97]</span></a><br data-dcnode-id="1598"><span data-dcnode-id="1597" instrument_node="">
</span><br data-dcnode-id="1596"><span data-dcnode-id="1595" instrument_node="">
			Another devastating attack on Ukraine’s infrastructure is linked to NotPetya ransomware, which began the eve of Ukraine’s Constitution Day on 27 June 2017. The attack sought to disrupt the Ukrainian financial system, wiped data from the computers of banks, energy firms, senior government officials and airports.</span><a data-dcnode-id="1593" href="#_ftn98" name="_ftnref98" title=""><span data-dcnode-id="1594" instrument_node="">[98]</span></a><span data-dcnode-id="1592" instrument_node="">Additionally, the radiation monitoring system at the Chernobyl nuclear power plant went offline. Experts believe that the main target of the attack was Ukraine, but NotPetya ultimately spread to the rest of the world including logistic companies, hospitals, and pharmaceutical companies, causing around one billion USD in losses. As US Homeland security expert Tom Bossert stated: ‘It was the equivalent of using a nuclear bomb to achieve a small tactical victory.”</span><a data-dcnode-id="1590" href="#_ftn99" name="_ftnref99" title=""><span data-dcnode-id="1591" instrument_node="">[99]</span></a><span data-dcnode-id="1589" instrument_node="">Attacks on Ukraine’s power grid, as well as the NotPetya attack, have been attributed to the Sandworm group of GRU’s Unit 74455.</span></div><span data-dcnode-id="1587" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1576" instrument_node="">
</span><p data-dcnode-id="1573"><strong data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Georgia</span></strong></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1568"><span data-dcnode-id="1571" instrument_node="">Russia has a long history of conflict with Georgia, most notably the war of August 2008 after which Georgia lost control of approximately one fifth of its territory. Georgia is one of the first examples where military operations and cyber/information attacks were used in tandem.</span><a data-dcnode-id="1569" href="#_ftn100" name="_ftnref100" title=""><span data-dcnode-id="1570" instrument_node="">[100]</span></a></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1564" instrument_node="">
</span><span data-dcnode-id="1563" instrument_node="">
</span><span data-dcnode-id="1562" instrument_node="">
</span><span data-dcnode-id="1561" instrument_node="">
</span><span data-dcnode-id="1541" instrument_node="">
</span><span data-dcnode-id="1539" instrument_node="">
</span><span data-dcnode-id="1537" instrument_node="">
</span><table border="1" cellpadding="1" cellspacing="1" data-dcnode-id="1536"><tbody data-dcnode-id="1538"><tr data-dcnode-id="1540"><td data-dcnode-id="1542"><span data-dcnode-id="1560" instrument_node="">
</span><div data-dcnode-id="1544" style="background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;"><strong data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Cyber-attacks during the Russo – Georgian war of 2008</span></strong><br data-dcnode-id="1557"><span data-dcnode-id="1556" instrument_node="">
</span><br data-dcnode-id="1555"><span data-dcnode-id="1554" instrument_node="">
			On August 7th, 2008, the Georgian military entered the South Ossetian capital, Tskhinvali, claiming to be responding to bombardments by South Ossetian soldiers. The next day Russian tanks, artillery, and reconnaissance forces entered Tskhinvali, and aircraft conducted airstrikes on Georgian positions in the port city Poti. Russian ground forces moved into Georgia, drawing close to the capital, Tbilisi.</span><br data-dcnode-id="1553"><span data-dcnode-id="1552" instrument_node="">
</span><br data-dcnode-id="1551"><span data-dcnode-id="1550" instrument_node="">
			At the end of July, hackers took down the website of Georgian President Mikhail Saakashvili and before Russian troops engaged in direct conflict, many governmental websites went down. Hackers knocked the country’s largest commercial bank and media outlets offline and defaced the websites of the Georgian President and Ministry of Foreign Affairs. The attacks were coordinated on public forums that distributed instructions on how to flood websites and provided a list of targets.&nbsp;The website </span><a data-dcnode-id="1548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//stopgeorgia.ru/"><span data-dcnode-id="1549" instrument_node="">StopGeorgia.ru</span></a><span data-dcnode-id="1547" instrument_node="">&nbsp;went up with a full target list only a few hours after Russian troops crossed the border. This would have taken preparation and suggests that the site’s organizers had been tipped off on the timing of the military operations.</span><a data-dcnode-id="1545" href="#_ftn101" name="_ftnref101" title=""><span data-dcnode-id="1546" instrument_node="">[101]</span></a></div><span data-dcnode-id="1543" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1532" instrument_node="">
</span><span data-dcnode-id="1531" instrument_node="">
</span><span data-dcnode-id="1530" instrument_node="">
</span><span data-dcnode-id="1529" instrument_node="">
</span><span data-dcnode-id="1507" instrument_node="">
</span><span data-dcnode-id="1505" instrument_node="">
</span><span data-dcnode-id="1503" instrument_node="">
</span><table border="1" cellpadding="1" cellspacing="1" data-dcnode-id="1502"><tbody data-dcnode-id="1504"><tr data-dcnode-id="1506"><td data-dcnode-id="1508"><span data-dcnode-id="1528" instrument_node="">
</span><div data-dcnode-id="1510" style="background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;"><strong data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Cyber-attack against Georgia 2019</span></strong><br data-dcnode-id="1525"><span data-dcnode-id="1524" instrument_node="">
</span><br data-dcnode-id="1523"><span data-dcnode-id="1522" instrument_node="">
			A more recent example is the massive cyber-attack against Georgia in October 2019, which exemplifies the sophistication and inseparability of technical and psychological elements in Russia’s approach to target its opponents. The attack damaged servers within the Georgian president’s office, judicial system, government municipalities, and non-governmental organizations, defaced websites and disrupted broadcast of TV stations. On October 28th, 2019, more than 2000 state (including President Administration), private, and public media websites were defaced alluding to the former president Mikhail Saakashvili (attackers posted Saakashvili’s image with the text “I’ll be back”). Furthermore, the broadcast of two private television stations - Imedi and Maestro – were disrupted.</span><a data-dcnode-id="1520" href="#_ftn102" name="_ftnref102" title=""><span data-dcnode-id="1521" instrument_node="">[102]</span></a><span data-dcnode-id="1519" instrument_node=""> UK and US authorities attributed the attack to the GRU’s unit 74455, also known as Sandworm.</span><a data-dcnode-id="1517" href="#_ftn103" name="_ftnref103" title=""><span data-dcnode-id="1518" instrument_node="">[103]</span></a><br data-dcnode-id="1516"><span data-dcnode-id="1515" instrument_node="">
</span><br data-dcnode-id="1514"><span data-dcnode-id="1513" instrument_node="">
			Georgia’s pro-Western president Mikhail Saakashvili played a major role in the 2008 military conflict and has consistently been the target of the Kremlin’s smear campaigns. In the 2013 election, Saakashvili was defeated by the opposition candidate from Dream of Georgia, and he left the country. Since then, Saakashvili is wanted in Georgia on criminal charges, which he claims are politically motivated.</span><a data-dcnode-id="1511" href="#_ftn104" name="_ftnref104" title=""><span data-dcnode-id="1512" instrument_node="">[104]</span></a></div><span data-dcnode-id="1509" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1495"><strong data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Election Interference</span></strong></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">As stated above, one of the strategic goals of information confrontation is to gain superiority over the perceived adversary by targeting its political decision-making, as well as the population’s sentiments. Elections are particularly vulnerable, as they provide the opportunity for external actors not only to support a favourable candidate, but also to sow doubt that elections have been fair and free, raise questions about the stability of the country, and erode the trust in democratic process in general.</span></p><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1490" instrument_node="">Russian interference has been identified in elections in several countries. Interference in the 2016 US presidential election is the most documented case which shows Russia’s modus operandi in using both info-technical and info-psychological tools. This interference involved attacks on US election infrastructure, acquiring, and subsequently leaking, the Democratic Congressional Campaign Committee’s (DCCC) and Democratic National Committee’s (DNC) data, including party’s candidate Hillary Clinton’s emails, alongside extensive information campaign conducted by IRA and Russia’s affiliated media</span><a data-dcnode-id="1488" href="#_ftn105" name="_ftnref105" title=""><span data-dcnode-id="1489" instrument_node="">[105]</span></a><span data-dcnode-id="1487" instrument_node=""> However, targeted information and cyber operations related to elections have been observed in Ukraine, France, Sweden, European Parliament and other countries. They are characterized by spear phishing campaigns to access data, hack and leak operations, disruptive attacks on election infrastructure, use of online environment for manipulation and spreading of disinformation.</span></p><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1482" instrument_node="">
</span><span data-dcnode-id="1481" instrument_node="">
</span><span data-dcnode-id="1480" instrument_node="">
</span><span data-dcnode-id="1479" instrument_node="">
</span><span data-dcnode-id="1436" instrument_node="">
</span><span data-dcnode-id="1434" instrument_node="">
</span><span data-dcnode-id="1432" instrument_node="">
</span><table border="1" cellpadding="1" cellspacing="1" data-dcnode-id="1431"><tbody data-dcnode-id="1433"><tr data-dcnode-id="1435"><td data-dcnode-id="1437"><span data-dcnode-id="1478" instrument_node="">
</span><div data-dcnode-id="1439" style="background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;"><strong data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Interference in French presidential elections: ‘Macron leaks’ in 2017</span></strong><br data-dcnode-id="1475"><span data-dcnode-id="1474" instrument_node="">
</span><br data-dcnode-id="1473"><span data-dcnode-id="1472" instrument_node="">
			Interference in the 2017 French presidential election was a coordinated attempt to undermine Emmanuel Macron’s candidacy, with extensive disinformation campaign, and a hack and leak operation against Macron’s campaign staff - the so called ‘Macron leaks’.</span><br data-dcnode-id="1471"><span data-dcnode-id="1470" instrument_node="">
</span><br data-dcnode-id="1469"><span data-dcnode-id="1468" instrument_node="">
			Emmanuel Macron (with the newly established political movement ‘En Marche’) and Marine LePen (the leader of the far-right ‘Front National’) were the main candidates for the presidential post.</span><br data-dcnode-id="1467"><span data-dcnode-id="1466" instrument_node="">
</span><br data-dcnode-id="1465"><span data-dcnode-id="1464" instrument_node="">
			The campaign against Macron started with rumours and personal attacks which intensified from January – February 2017, which coincided with the time when Macron became a front-runner in the polls due to his most serious rival François Fillon was weakened by scandal.&nbsp; On February 3rd, the Russian-affiliated news agency Sputnik France claimed that Macron was a US agent backed by a very wealthy gay lobby. Information attacks by Russian media, LePen’s supporters, and American alt-right trolls were both political (an aristocrat who despises the common man, a rich banker, a globalist puppet, a supporter of Islamism and an advocate of uncontrolled immigration), and personal (age difference between Macron and his wife, rumours of him having an affair with his step-daughter, and speculation about Macron being gay).</span><br data-dcnode-id="1463"><span data-dcnode-id="1462" instrument_node="">
</span><br data-dcnode-id="1461"><span data-dcnode-id="1460" instrument_node="">
			Meanwhile, phishing attacks had been targeted against Macron’s campaign staff since December 2016. Asa result, the email accounts of at least five of Macron’s close collaborators were hacked, and attackers stole 15 gigabytes (GB) of data, including 21,075 emails, and released them on May 5th — just two days before the second and final round of the election.</span><br data-dcnode-id="1459"><span data-dcnode-id="1458" instrument_node="">
</span><br data-dcnode-id="1457"><span data-dcnode-id="1456" instrument_node="">
			On May 3rd, 2017, the so called ‘#MacronGate’ rumour spread two hours before the final televised debate between both presidential candidates. A user with a Latvian IP address posted two fake documents on the forum 4chan, suggesting that Macron had a secret offshore account. During the live televised debate, Le Pen herself alluded to it. The rumour was quickly debunked and several media sources proved these documents to be fabricated.</span><br data-dcnode-id="1455"><span data-dcnode-id="1454" instrument_node="">
</span><br data-dcnode-id="1453"><span data-dcnode-id="1452" instrument_node="">
			On May 5th, 2017, only one hour before official campaigning stopped for the period of ‘election silence’ (a 44-hour political media blackout ahead of the closing of the polls), the hacked files were posted on Archive.org, then on PasteBin and 4chan. Pro-Trump accounts were the first to share the link on Twitter, with the hashtag #MacronLeaks, quickly followed by WikiLeaks. The leak was promoted by trolls and fake accounts (bots) appearing in almost half a million tweets in twenty-four hours. Other fake documents spread on Twitter included emails that were not in the dump were from or to people who did not exist.</span><a data-dcnode-id="1450" href="#_ftn106" name="_ftnref106" title=""><span data-dcnode-id="1451" instrument_node="">[106]</span></a><br data-dcnode-id="1449"><span data-dcnode-id="1448" instrument_node="">
</span><br data-dcnode-id="1447"><span data-dcnode-id="1446" instrument_node="">
			The attackers did not reach their intended objectives for several reasons, including the structure of the French political system and environment, their own mistakes, as well as a swift reaction by Macron’s campaign team, the government, and the media. In the end, Emanuel Macron won the election. However, similarly to 2016 US presidential election, Russia’s information efforts did not end with the election day. After the elections, Russia’s affiliated media and social media channels continued to spread disinformation about potential election fraud, such as information about low voter turnout, damaged and stolen ballots – &nbsp;all actions aimed at decreasing trust in the election outcome and democratic institutions in general.</span><a data-dcnode-id="1444" href="#_ftn107" name="_ftnref107" title=""><span data-dcnode-id="1445" instrument_node="">[107]</span></a><br data-dcnode-id="1443"><span data-dcnode-id="1442" instrument_node="">
</span><br data-dcnode-id="1441"><span data-dcnode-id="1440" instrument_node="">
			Although France did not officially attribute this operation to Russia’s operatives, several cybersecurity firms have attributed it to APT 28, the same group has involved in DNC hacking operation during US presidential election a year before.</span></div><span data-dcnode-id="1438" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="1430" instrument_node="">
</span><p data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1424"><strong data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Targeting Montenegro’s Accession to NATO</span></strong></p><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1422" instrument_node="">Cyber operations have been used as part of larger campaigns to hinder the NATO enlargement process, which is perceived as aggressive and threatening by the Kremlin. This was the case of Montenegro as it underwent its final phase of accession negotiations with NATO in late 2016. Russia undertook several forms of attack: Montenegro experience an information campaign by Russian media, threats of embargoes on wine production and other products, an attempted coup d’état during the parliamentary election in October 2016, as well as cyber-attacks which can be attributed to Russian special services (ATP28 or Fancy Bear). During this period, Montenegro recorded a sharp rise in the number of cyber-attacks (however not all can be attributed to Russia), mostly targeting state institutions and media outlets. From only 22 such incidents in 2013, almost 400 were recorded in only nine months in 2017.</span><a data-dcnode-id="1420" href="#_ftn108" name="_ftnref108" title=""><span data-dcnode-id="1421" instrument_node="">[108]</span></a></p><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1415" instrument_node="">
</span><span data-dcnode-id="1414" instrument_node="">
</span><span data-dcnode-id="1413" instrument_node="">
</span><span data-dcnode-id="1412" instrument_node="">
</span><span data-dcnode-id="1390" instrument_node="">
</span><span data-dcnode-id="1388" instrument_node="">
</span><span data-dcnode-id="1386" instrument_node="">
</span><table border="1" cellpadding="1" cellspacing="1" data-dcnode-id="1385"><tbody data-dcnode-id="1387"><tr data-dcnode-id="1389"><td data-dcnode-id="1391"><span data-dcnode-id="1411" instrument_node="">
</span><div data-dcnode-id="1393" style="background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;"><strong data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Attacks against Montenegro (2016 – 2017)</span></strong><br data-dcnode-id="1408"><span data-dcnode-id="1407" instrument_node="">
</span><br data-dcnode-id="1406"><span data-dcnode-id="1405" instrument_node="">
			On parliamentary election day on October 16th, 2016, large-scale DDoS attacks targeted state webpages and digital infrastructure, as well as the websites of pro-NATO and pro-EU political parties, civil society webpages and electoral monitors.</span><a data-dcnode-id="1403" href="#_ftn109" name="_ftnref109" title=""><span data-dcnode-id="1404" instrument_node="">[109]</span></a><span data-dcnode-id="1402" instrument_node=""> The same day, Montenegrin authorities discovered an attempted coup d’etat against Montenegro’s government assisted by Russia’s intelligence services. On October 20th, another phishing attack was launched against the parliament of Montenegro, however it did not affect any sensitive information. </span><a data-dcnode-id="1400" href="#_ftn110" name="_ftnref110" title=""><span data-dcnode-id="1401" instrument_node="">[110]</span></a><br data-dcnode-id="1399"><span data-dcnode-id="1398" instrument_node="">
</span><br data-dcnode-id="1397"><span data-dcnode-id="1396" instrument_node="">
			A DDos attack larger than the ones targeting elections started on February 15th, 2017, compromising the websites of government and state institutions, as well as some pro-government media. The Montenegrin Ministry of Defence also reported being the target of spear phishing attacks. E-mails that appeared to come from the EU and NATO had attachments that enabled hackers to upload a malware called Gamefish, which has been a signature method used by APT28. Montenegrin officials stated that ‘the scope and diversity of the attacks, and the fact that they were being undertaken on a professional level, indicates that this was a synchronised action’. Similar attacks continued in June 2017, after Montenegro officially joined NATO. &nbsp;Cybersecurity firms – FireEye, Trend Micro and ESET – attributed these attacks to APT28. </span><a data-dcnode-id="1394" href="#_ftn111" name="_ftnref111" title=""><span data-dcnode-id="1395" instrument_node="">[111]</span></a></div><span data-dcnode-id="1392" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1378"><strong data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Influence Campaigns: ‘Ghostwriter’ and ‘Secondary Infektion’</span></strong></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1373"><span data-dcnode-id="1376" instrument_node="">A group called ‘Ghostwriter’ has been focused on amplifying anti-Western narratives in Poland, Latvia and Lithuania since March 2017. Several separate incidents have been identified in relation to their campaign. They have used fabricated official documents, impersonated government and diplomatic correspondence, spread false narratives and leveraged news sites to spread articles that appear to be legitimate. At least 14 inauthentic personas posing as locals, journalists, and analysts have created or amplified the falsified content.</span><a data-dcnode-id="1374" href="#_ftn112" name="_ftnref112" title=""><span data-dcnode-id="1375" instrument_node="">[112]</span></a></p><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1367"><span data-dcnode-id="1371" instrument_node="">The timing of ‘Ghostwriter’ coincides with the arrival of NATO troops in the Baltics and Poland as part of its Enhanced Forward Presence (eFP). The incoming troops were targeted by intense disinformation campaigns in Russian media and on social media.</span><a data-dcnode-id="1369" href="#_ftn113" name="_ftnref113" title=""><span data-dcnode-id="1370" instrument_node="">[113]</span></a><span data-dcnode-id="1368" instrument_node=""> The activities of ‘Ghostwriter’ were not limited to the creation of fake online personas/bots/media to amplify messages online (a method mostly used by operatives of Internet Research Agency), these activities included technical means, such as compromising webpages and spoofing official e-mails.</span></p><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1365" instrument_node="">Security firms have not attributed ‘Ghostwriter’ activities to any actor, however they indicated that they serve Russia’s security interests, ‘primarily seeking to foment distrust of U.S. and NATO troops in Europe by portraying their presence as aggressive and dangerous to local populations, and to undermine military relations between NATO members’</span><a data-dcnode-id="1363" href="#_ftn114" name="_ftnref114" title=""><span data-dcnode-id="1364" instrument_node="">[114]</span></a><span data-dcnode-id="1362" instrument_node="">.</span></p><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1354"><span data-dcnode-id="1359" instrument_node="">Although no connection or coordination has been proven among both operations, similar methods of manipulation (forged documents, impersonation, amplification of information by bots/fake personas on social and online media) have been identified in a multi-target campaign dubbed ‘Secondary Infektion’. Graphica’s analysis discovered a 6-year information operation which targeted countries across Europe and North America with fake stories and forged documents. The analysis discovered at least 2500 pieces of content in seven languages across 300 online platforms wielded against Kremlin critics and presidential candidates in the US, France, Germany, Sweden and beyond. The information attacks focused on Ukraine, however they have been active in the US (2016) and French (2017) elections, and against the WADA (World Anti-Doping Agency).</span><a data-dcnode-id="1357" href="#_ftn115" name="_ftnref115" title=""><span data-dcnode-id="1358" instrument_node="">[115]</span></a><br data-dcnode-id="1356"><span data-dcnode-id="1355" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="1353" instrument_node="">
</span><span data-dcnode-id="1352" instrument_node="">
</span><span data-dcnode-id="1351" instrument_node="">
</span><span data-dcnode-id="1350" instrument_node="">
</span><span data-dcnode-id="1329" instrument_node="">
</span><span data-dcnode-id="1327" instrument_node="">
</span><span data-dcnode-id="1325" instrument_node="">
</span><table border="1" cellpadding="1" cellspacing="1" data-dcnode-id="1324" style="width: 800px;"><tbody data-dcnode-id="1326"><tr data-dcnode-id="1328"><td data-dcnode-id="1330"><span data-dcnode-id="1349" instrument_node="">
</span><div data-dcnode-id="1332" style="background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;"><strong data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Operation ‘Ghostwriter’: NATO will leave the Baltics due to COVID-19</span></strong><br data-dcnode-id="1346"><span data-dcnode-id="1345" instrument_node="">
</span><br data-dcnode-id="1344"><span data-dcnode-id="1343" instrument_node="">
			On April 21st, 2020, a fake news article on the blog of a well-known Lithuanian journalist (15min.lt) and fact-checker Vilius Petkauskas was published. The piece, titled ‘NATO withdraws troops from Lithuania,’ was immediately distributed on the marginal websites TheDuran and OpEdNews (which have previously spread anti – NATO narratives using anonymous online personas with Latvian and Lithuanian-sounding names), as well as via BlogSpot and Youtube channels created in the name of Petkauskas. Around the same time, a fabricated letter in the name of NATO Secretary General Jens Stoltenberg was sent from spoofed e-mails to the Lithuanian Ministry of Defence, NATO HQ in Brussels, and Lithuanian media and government institutions. The letter stated&nbsp;that NATO was withdrawing its troops from Lithuania due to COVID-19. The letter was immediately debunked as forged by the LTU MoD.</span><br data-dcnode-id="1342"><span data-dcnode-id="1341" instrument_node="">
</span><br data-dcnode-id="1340"><span data-dcnode-id="1339" instrument_node="">
			On April 22nd, a one-off Youtube account called ‘Nikolas Ratas’ published the video ‘Is it the end of NATO?’ with the forged letter. On April 23rd, another opinion piece on the website The Baltic Word was posted by Jonas Dringelis (anonymous online persona), which replicated the official LTU MoD position, but also speculated that the news about the withdrawal might be true. On April 24th, the German media outlet Die Welt published the article ‘How COVID-19 is destabilizing NATO’s Eastern flank’, mentioning the forged letter and Russia’s disinformation attempts. The Kremlin-funded media outlet RT translated it to Russian, but never mentioned that Stoltenberg’s letter was forged.</span><a data-dcnode-id="1337" href="#_ftn116" name="_ftnref116" title=""><span data-dcnode-id="1338" instrument_node="">[116]</span></a><br data-dcnode-id="1336"><span data-dcnode-id="1335" instrument_node="">
</span><br data-dcnode-id="1334"><span data-dcnode-id="1333" instrument_node="">
			Although the disinformation campaign was quickly debunked and did not spread in mainstream channels in Lithuania, such activities demonstrate efforts to combined ‘technical’ and ‘information’ aspects of influence operations in cyberspace.</span></div><span data-dcnode-id="1331" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1318"><br data-dcnode-id="1322"><span data-dcnode-id="1321" instrument_node="">
</span><strong data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">IMPLICATIONS AND OBJECTIVES</span></strong></p><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1312"><span data-dcnode-id="1316" instrument_node="">Russia does not apply one uniform cyber-attack strategy across all targets, but has grown to adapt and exploit opportunities as they emerge.</span><a data-dcnode-id="1314" href="#_ftn117" name="_ftnref117" title=""><span data-dcnode-id="1315" instrument_node="">[117]</span></a><span data-dcnode-id="1313" instrument_node=""> The incidents shown above suggest that cyber operations have been used both to support both military action (as in case of Georgia and Ukraine) against traditional opponents and targets of influence activities (as in case of US, NATO, Baltic countries, Montenegro etc.), as well as in cases when an opportunity arises to sow instability and fear. Examples are the case of CyberCaliphate actions in France or interference in the democratic processes of European countries. Furthermore, Russia’s operatives are not afraid of being discovered and do not hesitate to attack the same target again after being identified (as, for example, the case of WADA), likely due to the lack of consequences suffered for such activities thus far.</span></p><span data-dcnode-id="1311" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1310" instrument_node="">Russia has avoided overt escalation in limiting its cyber activities to generating effects currently considered below the threshold of triggering a conventional armed response,</span><a data-dcnode-id="1308" href="#_ftn118" name="_ftnref118" title=""><span data-dcnode-id="1309" instrument_node="">[118]</span></a><span data-dcnode-id="1307" instrument_node=""> at least in the case of currently identified operations. This style of attack is partially enabled by (although this has recently been changing) the Western paradigm of focusing on destructive offensive cyber operations on critical infrastructure, the theoretical peak of which has oftentimes been referred to as a ‘cyber Pearl Harbor’.</span><a data-dcnode-id="1305" href="#_ftn119" name="_ftnref119" title=""><span data-dcnode-id="1306" instrument_node="">[119]</span></a><span data-dcnode-id="1304" instrument_node=""> However, two factors might alter Russia’s strategic calculus with cyber operations. The first concerns its strategic deterrence concept, whereby Russia would decide to intensify the use of informational means together with other tools in an attempt at de-escalating a geopolitical confrontation, or at terminating an outright war on terms acceptable to Russia.</span><a data-dcnode-id="1302" href="#_ftn120" name="_ftnref120" title=""><span data-dcnode-id="1303" instrument_node="">[120]</span></a><span data-dcnode-id="1301" instrument_node=""> The second factor is the state of Russian internet sovereignty, which, if successful, would significantly decrease Russia’s outward-facing attack surface, thereby enabling it to engage in escalatory measures with less risk of facing effective retaliatory action.</span><a data-dcnode-id="1299" href="#_ftn121" name="_ftnref121" title=""><span data-dcnode-id="1300" instrument_node="">[121]</span></a></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1296" instrument_node="">A development that affects NATO’s ability to respond to cyber threats is the problem of attribution. Russian hackers have been using false flags when posing as the ISIS-related CyberCaliphate group to attack French TV and US military and media, as well as using the code of North Korean hackers during the attack on 2018 Winter Olympics in South Korea. False flags operations have been taken to a new level, with reports that Russian hackers are hijacking the infrastructure of other countries to spy on targets and deliver malware. In October 2019, the Russian hacking group Turla infiltrated the servers of OilRig, a prominent Iranian hacking group, using their systems to surveil 35 different countries. It has been argued that the purpose of such false flags is not only to create confusion and deniability, but to sow the narrative that attribution is not possible, undermining the credibility of intelligence agencies when attributing cyber-attacks to Kremlin, and undermine any retaliatory action.</span><a data-dcnode-id="1294" href="#_ftn122" name="_ftnref122" title=""><span data-dcnode-id="1295" instrument_node="">[122]</span></a></p><span data-dcnode-id="1292" instrument_node="">
</span></div><span data-dcnode-id="1290" instrument_node="">
</span></div><span data-dcnode-id="1288" instrument_node="">
</span></div><span data-dcnode-id="1286" instrument_node="">
</span><div class="accordion p-0" data-dcnode-id="1208"><span data-dcnode-id="1285" instrument_node="">
</span><div data-dcnode-id="1210"><span data-dcnode-id="1284" instrument_node="">
</span><div class="collapse-heading" data-dcnode-id="1281"><a aria-expanded="false" class="accordion-title collapsed" data-dcnode-id="1282" data-toggle="collapse" href="#acco_acco_1623422099727"><span data-dcnode-id="1283" instrument_node="">CONCLUSION AND RECOMMENDATIONS</span></a></div><span data-dcnode-id="1280" instrument_node="">
</span><div class="collapse col_me" data-dcnode-id="1212" data-parent=".accordion" id="acco_acco_1623422099727"><span data-dcnode-id="1279" instrument_node="">
</span><div class="accordion-body" data-dcnode-id="1214"><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">From the Russian perspective, the ‘information confrontation’ is constant, with the tools used to conduct it including all possible means at its disposal. The front-line of Russia’s defensive efforts is its domestic information space, which is tightly controlled by data surveillance and a restrictive legal system aimed at the Kremlin’s opponents. The Kremlin wields information-psychological and information-technical weapons with the goal of achieving strategic victory without the use of conventional force and without tripping any escalatory wires in the target country. Securing the domestic information space allows not only the protection of society’s psychological cohesion from foreign interference, but also protects domestic scientific and technological developments from foreign competition.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Convinced that the West is constantly waging information war against Russia, offensive actions are justified by responses that are supposedly needed to prevent further escalation in this confrontation. NATO’s free and open information environment and often dichotomous understanding of ‘war-time’ vs. ‘peacetime’ have been exploited by the Kremlin, making the Alliance and its members long overdue for an updated understanding of what constitutes ‘cyberspace’ and its relationship with the information environment.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1265"><span data-dcnode-id="1271" instrument_node="">NATO’s focus should be on building resilience to address the full spectrum of threats, including ones below the threshold of an armed conflict given that for Russia, information confrontation is constant and is unrestrained by the distinction between peacetime and wartime. There is a growing understanding by Western countries that cyberspace is an environment of permanent confrontation. This has led to policy and doctrine change, and to the adoption of the ‘persistent engagement’ strategy by the U.S Cyber Command, as well as a similar approach by the French Ministry of Armed Forces.</span><a data-dcnode-id="1269" href="#_ftn123" name="_ftnref123" title=""><span data-dcnode-id="1270" instrument_node="">[123]</span></a><span data-dcnode-id="1268" instrument_node=""> Although significant, these efforts only tackle the technical aspects of information confrontation. This deficit is being tackled by the British Armed Forces’ introduction of a special cyber operations unit that has both an offensive and defensive remit to the information-psychological dimension, but more needs to be done Alliance-wide.</span><a data-dcnode-id="1266" href="#_ftn124" name="_ftnref124" title=""><span data-dcnode-id="1267" instrument_node="">[124]</span></a></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1263" instrument_node="">There have not been significant alterations or contradictions in Russia’s official doctrinal and conceptual publications regarding ‘information confrontation’ since the beginning of Vladimir Putin’s presidency in 1999. Instead, doctrinal thinking has been built and added on previous ones, inheriting some of the concepts and methods even from the Soviet times.</span><a data-dcnode-id="1261" href="#_ftn125" name="_ftnref125" title=""><span data-dcnode-id="1262" instrument_node="">[125]</span></a><span data-dcnode-id="1260" instrument_node=""> Nevertheless, as Russia’s capabilities and methods to engage in ‘information confrontation’ are under constant development, it means that responses should be adaptive and forward-leaning.</span></p><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">This paper recommends several measures the Alliance and its member nations could undertake to enhance their defence capabilities, starting with recognizing the validity of the Russian understanding of cyber as a tool within a broadly defined information sphere encompassing both technical and psychological aspects:</span></p><span data-dcnode-id="1255" instrument_node="">
</span><ul data-dcnode-id="1216"><span data-dcnode-id="1254" instrument_node="">
</span><li data-dcnode-id="1250"><strong data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Integrating StratCom functions, with an emphasis on cyber operations</span></strong><span data-dcnode-id="1251" instrument_node="">: Creating synergy and even fully integrating functions such as psychological operations, public affairs, cyber operations, electronic warfare and some legal aspects would facilitate significant adaptability with the aim of expanding capabilities during peacetime. Allies may consider the creation of rapid reaction communications teams, a comprehensive approach that could be established as an independent resource that can be rapidly deployed to hostile information environments during operations.</span></li><span data-dcnode-id="1249" instrument_node="">
</span><li data-dcnode-id="1245"><strong data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Increasing risk analysis of information environment </span></strong><span data-dcnode-id="1246" instrument_node="">by identifying which populations and infrastructure are the most vulnerable to cyber and information attacks. NATO analysts should be tasked with more pre-emptive research and planning. They should be identifying what hostile messaging populations are the most susceptible to and identify the root problems leading to those vulnerabilities. This will help allies to design policies that protect their populations from foreign influence and promote resilience and unity during cyber-attacks.</span></li><span data-dcnode-id="1244" instrument_node="">
</span><li data-dcnode-id="1240"><strong data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Enhancing interoperability by increasing cyber-attack crisis management exercises that include other functions of strategic communications:</span></strong><span data-dcnode-id="1241" instrument_node=""> This element is key to modernizing NATO’s mind set in the sense that it encourages the recognition of information attacks and understand how they are yielded in tandem with cyber operations.</span></li><span data-dcnode-id="1239" instrument_node="">
</span><li data-dcnode-id="1235"><strong data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Support EU and national governments in enhancing digital security, such as through advocating better data privacy and social media regulation</span></strong><span data-dcnode-id="1236" instrument_node="">: NATO can play a significant role in supporting national governments and the EU in securing digital environment among allies and partners. This effort should not be about asserting control over the information space, but about building protection mechanisms to assure that private data and the digital footprints of citizens do not fall into hostile hands, at the same time safeguarding core democratic values such as freedom of speech.</span></li><span data-dcnode-id="1234" instrument_node="">
</span><li data-dcnode-id="1228"><strong data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Bolster deterrence including through attribution and working with partners such as the EU and the private sector:</span></strong><span data-dcnode-id="1231" instrument_node=""> Beyond the vulnerabilities of an open information environment, the information confrontation lacks a significant strategic deterrent as is provided by nuclear parity in the conventional sense. A lack of inaction in the West after several high-level incidences of interference and cyberattacks has created a perception of low-cost/high reward among adversaries. Therefore, creating a credible deterrent in the realms of the information confrontation is essential. Another way to contribute to deterrence is by taking stronger political measures in response to cyber and information attacks through increasing political consequences. At the political level, increasing attribution and effectively communicating such attacks to the public will assist in improving societal resilience. The EU is an excellent partner for NATO in this regard, having adopted a new sanctions-regime specifically for cyber-attacks.</span><a data-dcnode-id="1229" href="#_ftn126" name="_ftnref126" title=""><span data-dcnode-id="1230" instrument_node="">[126]</span></a></li><span data-dcnode-id="1227" instrument_node="">
</span><li data-dcnode-id="1223"><strong data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Foster a whole-of-government approach and the involvement of wider society</span></strong><span data-dcnode-id="1224" instrument_node="">. The complex nature of the information environment requires many actors beyond NATO to effectively protect it. Private businesses and civil society must be closely engaged on building resilience against hybrid threats. Protecting the integrity of NATO member states is a whole of society effort, as every person and idea can be exploited, with adversaries aiming to influence the attitudes and behaviours of target populations. Therefore, beyond these recommendations, the importance of an informed and critical population that is immune to disinformation and will have reason to trust its political leaders with the protection of society in the event of cyber and informational attacks cannot be understated.</span></li><span data-dcnode-id="1222" instrument_node="">
</span><li data-dcnode-id="1218"><strong data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Impressing on Russia the futility of creating a closed information space:</span></strong><span data-dcnode-id="1219" instrument_node=""> Although Russia has undergone immense effort to create an insulated and disconnected information space, this might not be an all-encompassing solution to their strategic and tactical deficits. NATO allies and partners should resist Russia’s portrayal of a closed information space as invulnerable, a remnant of Soviet-era thinking. The West’s open information space may at times be vulnerable, but the freedoms provided by it inherently contribute to stability and foster adaptable societies that progress to meet the needs of the 21st century. Control of the information space might provide short-term gains, but history shows that a country’s survival in the long-term is questionable when information is repressed and manipulated. Russia’s efforts to disconnect its information space from the rest of the world will not prevent its citizens from pursuing information – it is a double edged-sword that may sow more instability than security.</span></li><span data-dcnode-id="1217" instrument_node="">
</span></ul><span data-dcnode-id="1215" instrument_node="">
</span></div><span data-dcnode-id="1213" instrument_node="">
