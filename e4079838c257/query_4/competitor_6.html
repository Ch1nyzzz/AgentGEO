</span><div data-dcnode-id="2602" style="background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;"><span data-dcnode-id="2603" instrument_node="">This publication is developed in the framework of the joint cooperation project of the NATO StratCom COE and NATO Cooperative Cyber Defence COE.&nbsp;</span></div><span data-dcnode-id="2601" instrument_node="">
</span><div data-dcnode-id="2599" style="background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;"><span data-dcnode-id="2600" instrument_node="">We would also like to thank Dr Juha Kukkola, Dr Ieva Bērziņa, Varis Teivāns and Mark Laity for advice and review of the publication.</span></div><span data-dcnode-id="2598" instrument_node="">

</span><div data-dcnode-id="2573"><span data-dcnode-id="2596" instrument_node="">
</span><div class="collapse-heading" data-dcnode-id="2593"><a aria-expanded="false" class="accordion-title collapsed" data-dcnode-id="2594" data-toggle="collapse" href="#acco_acco_1623422062486"><span data-dcnode-id="2595" instrument_node="">INTRODUCTION</span></a></div><span data-dcnode-id="2592" instrument_node="">
</span><div class="collapse col_me" data-dcnode-id="2575" data-parent=".accordion" id="acco_acco_1623422062486"><span data-dcnode-id="2591" instrument_node="">
</span><div class="accordion-body" data-dcnode-id="2577"><span data-dcnode-id="2590" instrument_node="">
</span><p data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">Headlines connecting Russia to the vague notion of ‘cyber’ have become daily bread for Western publics and decision makers alike. From the damage done by NotPetya or attacks against Ukraine and Georgia, to Russia’s hacking and leaking operations in US and European elections, Russia’s offensive operations are consistent threat. An increasingly important tool in what Russia views as the ongoing “information confrontation,” Russia utilizes cyber operations alongside other military and non-military means to pursue strategic objectives.</span></p><span data-dcnode-id="2587" instrument_node="">
</span><p data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">On the other hand, recent years have seen Russia’s attempts to close and secure its own digital information space. By using a combination of legal and technical means, the Kremlin tries to impose control both over digital infrastructure and content, efforts which are aimed at ensuring independence from the global Internet network and thus enhancing their information security.</span></p><span data-dcnode-id="2584" instrument_node="">
</span><p data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node="">Russia sees activities in cyberspace as a subset to the all-encompassing framework of ‘information confrontation,’ which is derived from the Russian understanding of relations between states and, more specifically, a subset of the struggle between great powers for influence in the world. According to Russian thinkers, the information confrontation is constant and ongoing, and any means can be used to gain superiority in this confrontation. &nbsp;Activities in cyberspace are one of several tools of warfare in the information environment, including psychological operations, electronic warfare (EW), and kinetic action. In practice, cyberspace can be used both for physical attacks on infrastructure, and cognitive attacks such as disinformation. However, the center of gravity in the ‘information confrontation’ lies in peoples’ minds and perception of events, both domestically and internationally. &nbsp;</span></p><span data-dcnode-id="2581" instrument_node="">
</span><p data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">This report seeks to clarify the role of cyberspace in Russian strategic thinking. It will analyse cyber operations as a subset of Russia’s ‘information confrontation’ and explore how this philosophy is put into practice. The report will examine both offensive measures, such as participation in the information war, and defensive measures, such as Russia’s efforts to secure its own information space from foreign influence. Finally, it will conclude with several policy recommendations for NATO strategic communications in addressing Russia’s offensive activities in cyberspace.</span></p><span data-dcnode-id="2578" instrument_node="">
</span></div><span data-dcnode-id="2576" instrument_node="">
</span></div><span data-dcnode-id="2574" instrument_node="">
</span></div><span data-dcnode-id="2572" instrument_node="">

</span><div class="accordion p-0" data-dcnode-id="2407"><span data-dcnode-id="2569" instrument_node="">
</span><div data-dcnode-id="2409"><span data-dcnode-id="2568" instrument_node="">
</span><div class="collapse-heading" data-dcnode-id="2565"><a aria-expanded="false" class="accordion-title collapsed" data-dcnode-id="2566" data-toggle="collapse" href="#acco_acco_1623422062485"><span data-dcnode-id="2567" instrument_node="">RUSSIA’S “INFORMATION CONFRONTATION”</span></a></div><span data-dcnode-id="2564" instrument_node="">
</span><div class="collapse col_me" data-dcnode-id="2411" data-parent=".accordion" id="acco_acco_1623422062485"><span data-dcnode-id="2563" instrument_node="">
</span><div class="accordion-body" data-dcnode-id="2413"><span data-dcnode-id="2562" instrument_node="">
</span><p data-dcnode-id="2559"><strong data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">Russian Conceptions of ‘Cyber’</span></strong></p><span data-dcnode-id="2558" instrument_node="">
</span><p data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">Russia’s conceptualization of ‘information confrontation’ and the role of cyberspace within it is outlined in strategic policy documents, such as National Security Strategy (2015), Foreign Policy Concept (2016), Information Security Doctrine (2016), Military doctrine (2014), Conceptual Views on the Activity of the Armed Forces in the Information Space (2016), as well as works and publications by Russian military thinkers.</span></p><span data-dcnode-id="2555" instrument_node="">
</span><p data-dcnode-id="2529"><span data-dcnode-id="2554" instrument_node="">From the Russian perspective, cyber warfare or the Russian equivalent ‘information-technological warfare,’</span><a data-dcnode-id="2552" href="#_ftn1" name="_ftnref1" title=""><span data-dcnode-id="2553" instrument_node="">[1]</span></a><span data-dcnode-id="2551" instrument_node=""> is only a part of the overarching concept of “</span><strong data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">information confrontation</span></strong><span data-dcnode-id="2548" instrument_node="">” (</span><em data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">informatsionnoe protivoborstvo</span></em><span data-dcnode-id="2545" instrument_node="">). The Russian Ministry of Defence describes the information confrontation as the clash of national interests and ideas, where superiority is sought by targeting the adversary’s information infrastructure while protecting its own objects from similar influence.</span><a data-dcnode-id="2543" href="#_ftn2" name="_ftnref2" title=""><span data-dcnode-id="2544" instrument_node="">[2]</span></a><span data-dcnode-id="2542" instrument_node=""> The translation of the term informatsionnoe protivoborstvo into English has proven difficult, and has often incorrectly been translated as ‘information warfare’</span><a data-dcnode-id="2540" href="#_ftn3" name="_ftnref3" title=""><span data-dcnode-id="2541" instrument_node="">[3]</span></a><span data-dcnode-id="2539" instrument_node=""> (‘</span><em data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">informacionnaja vojna</span></em><span data-dcnode-id="2536" instrument_node="">’), despite the fact that </span><em data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">protivoborstvo </span></em><span data-dcnode-id="2533" instrument_node="">refers to ‘counter-struggle’, ‘countermeasure’ or ‘counteraction’ rather than ‘warfare’.</span><a data-dcnode-id="2531" href="#_ftn4" name="_ftnref4" title=""><span data-dcnode-id="2532" instrument_node="">[4]</span></a><span data-dcnode-id="2530" instrument_node=""> This paper uses the term ‘information confrontation’ due to its established status in discussions regarding hostile Russian informational activities.</span></p><span data-dcnode-id="2528" instrument_node="">
</span><p data-dcnode-id="2521"><span data-dcnode-id="2527" instrument_node="">The confrontation includes a significant psychological remit, whereby an actor attempts to affect informational resources (documents in information systems) as well as the minds of the adversary’s military personnel and population at large.</span><a data-dcnode-id="2525" href="#_ftn5" name="_ftnref5" title=""><span data-dcnode-id="2526" instrument_node="">[5]</span></a><span data-dcnode-id="2524" instrument_node=""> Ultimately, cyber operations (or information-technical means) are one of many methods used to gain superiority in the information confrontation. Russia, and particularly Russian President Putin’s regime, sees the information confrontation as a constant geopolitical zero-sum competition between great powers, political and economic systems, and civilizations.</span><a data-dcnode-id="2522" href="#_ftn6" name="_ftnref6" title=""><span data-dcnode-id="2523" instrument_node="">[6]</span></a></p><span data-dcnode-id="2520" instrument_node="">
</span><p data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2517" instrument_node="">
</span><p data-dcnode-id="2514"><strong data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">Protecting ‘Information’: Cognitive and Technical</span></strong></p><span data-dcnode-id="2513" instrument_node="">
</span><p data-dcnode-id="2502"><span data-dcnode-id="2512" instrument_node="">Publicly available Russian doctrines and policy documents do not explicitly reference cyber operations. Furthermore, Russian documents do not use the term ‘cybersecurity’, but refer instead to ‘information security.’ This term differs from the Western notion of ‘information security’ (or in short: infosec) in that it encompasses not only the protection of critical digital networks, but society’s cognitive integrity as well.</span><a data-dcnode-id="2510" href="#_ftn7" name="_ftnref7" title=""><span data-dcnode-id="2511" instrument_node="">[7]</span></a><span data-dcnode-id="2509" instrument_node=""> There are several reasons why Russian military thinkers apply the term ‘cyber’ when talking about Western threats and activities, but are reluctant to link the term to Russia’s own capabilities and actions. Some authors argue that this deliberate choice is related to negative connotations around Soviet-era ‘cybernetics,’ as well as the importance the term ‘i</span><strong data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">nformation security</span></strong><span data-dcnode-id="2506" instrument_node="">’ holds for Russia’s own domestic politics</span><a data-dcnode-id="2504" href="#_ftn8" name="_ftnref8" title=""><span data-dcnode-id="2505" instrument_node="">[8]</span></a><span data-dcnode-id="2503" instrument_node="">.</span></p><span data-dcnode-id="2501" instrument_node="">
</span><p data-dcnode-id="2484"><span data-dcnode-id="2500" instrument_node="">When discussing the operational environment, Russia uses the term ‘</span><strong data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">information space</span></strong><span data-dcnode-id="2497" instrument_node="">’ (</span><em data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">informatsionnoe prostranstvo</span></em><span data-dcnode-id="2494" instrument_node="">), or ‘</span><strong data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">information sphere</span></strong><span data-dcnode-id="2491" instrument_node="">’ (</span><em data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">informatsionnaya sfera</span></em><span data-dcnode-id="2488" instrument_node="">), which again is more comprehensive than the Western concept of ‘cyberspace’ or ‘cyber domain.’ The 2016 Russian Doctrine of Information Security defines the </span><strong data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">information sphere</span></strong><span data-dcnode-id="2485" instrument_node=""> as:</span></p><span data-dcnode-id="2483" instrument_node="">
</span><p data-dcnode-id="2479"><span data-dcnode-id="2482" instrument_node="">“a combination of information, informatization objects, information systems and websites within the information and telecommunications network of the Internet […], communications networks, information technologies, entities involved in generating and processing information, developing and using the above technologies, and ensuring information security, as well as a set of mechanisms regulating social relations in the sphere”.</span><a data-dcnode-id="2480" href="#_ftn9" name="_ftnref9" title=""><span data-dcnode-id="2481" instrument_node="">[9]</span></a></p><span data-dcnode-id="2478" instrument_node="">
</span><p data-dcnode-id="2468"><span data-dcnode-id="2477" instrument_node="">The </span><strong data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">information space</span></strong><span data-dcnode-id="2474" instrument_node=""> refers to activities to form, transform, and store information, as well as ‘</span><em data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">influencing individual and public consciousness, information infrastructure and information itself.</span></em><span data-dcnode-id="2471" instrument_node="">’</span><a data-dcnode-id="2469" href="#_ftn10" name="_ftnref10" title=""><span data-dcnode-id="2470" instrument_node="">[10]</span></a></p><span data-dcnode-id="2467" instrument_node="">
</span><p data-dcnode-id="2448"><span data-dcnode-id="2466" instrument_node="">According to Ofer Fridman, Russia conceptualizes cyberspace as the intersection between hardware, software, infrastructure, and content</span><a data-dcnode-id="2464" href="#_ftn11" name="_ftnref11" title=""><span data-dcnode-id="2465" instrument_node="">[11]</span></a><span data-dcnode-id="2463" instrument_node="">. In this framework, the </span><strong data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">information-technological</span></strong><span data-dcnode-id="2460" instrument_node=""> layer includes hardware, software and infrastructure, while the </span><strong data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">information- psychological l</span></strong><span data-dcnode-id="2457" instrument_node="">ayer includes hardware, software and content.’ Irrespective of the means used – technological (for example, destroying digital infrastructure) or psychological (manipulating a message on social media) – activities in cyberspace are understood in terms of their effect in the information space</span><a data-dcnode-id="2455" href="#_ftn12" name="_ftnref12" title=""><span data-dcnode-id="2456" instrument_node="">[12]</span></a><span data-dcnode-id="2454" instrument_node="">&nbsp;Importantly, Russia percieves&nbsp;perceives the information space in very geopolitical terms, with their domestic information space representing a</span><strong data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node=""> continuation of territorial state borders</span></strong><span data-dcnode-id="2451" instrument_node="">, which they view as constantly being violated by foreign intrusions.&nbsp;</span><a data-dcnode-id="2449" href="#_ftn13" name="_ftnref13" title=""><span data-dcnode-id="2450" instrument_node="">[13]</span></a></p><span data-dcnode-id="2447" instrument_node="">
</span><p data-dcnode-id="2439"><span data-dcnode-id="2446" instrument_node="">NATO doctrine understands cyberspace as an operational domain and considers it as part of the </span><strong data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">information environment</span></strong><span data-dcnode-id="2443" instrument_node="">. This environment is ‘</span><em data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">[…] comprised of the information itself, the individuals, organizations and systems that receive, process and convey the information’</span></em><span data-dcnode-id="2440" instrument_node="">. The information processed through this environment provides the base for cognitive processes that affect individual decision-making and subsequently, behaviour. Those processes happen in three dimensions – physical, virtual and cognitive – and cyberspace involves all three of them. In this respect, NATO’s concept of the information environment is not that different from Russia’s understanding of ‘information space’ and the role of cyberspace within it.</span></p><span data-dcnode-id="2438" instrument_node="">
</span><p data-dcnode-id="2424"><span data-dcnode-id="2437" instrument_node="">Similarly, the Russian concept of ‘</span><strong data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">information weapons</span></strong><span data-dcnode-id="2434" instrument_node="">’ (practically absent in Western parlance) includes more than just digital measures.</span><a data-dcnode-id="2432" href="#_ftn14" name="_ftnref14" title=""><span data-dcnode-id="2433" instrument_node="">[14]</span></a><span data-dcnode-id="2431" instrument_node=""> Although the Russian Armed Forces vaguely defines them as “</span><em data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">information technologies, means and methods used for the purposes of waging information war</span></em><span data-dcnode-id="2428" instrument_node="">,” in practice the concept covers a wide array of activities (often with an emphasis on affecting the human mind); this includes the spreading of disinformation, electronic warfare, the degradation of navigation support, psychological pressure, and the destruction of adversary computer capabilities.</span><a data-dcnode-id="2426" href="#_ftn15" name="_ftnref15" title=""><span data-dcnode-id="2427" instrument_node="">[15]</span></a><span data-dcnode-id="2425" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2423" instrument_node="">
</span><p data-dcnode-id="2415"><span data-dcnode-id="2422" instrument_node="">Contrary to the Western view of interstate conflict that is based on the international legal order outlined in international treaty and customary law (specifically the UN Charter and the Geneva Conventions) that makes a clear distinction between war and peace, Russia’s ‘information confrontation’ is constant and ongoing. This view is exploited by Russia to undertake activities beneath the threshold of armed conflict, allowing it to remain unpredictable and pursue strategic objectives short of causing kinetic conflict.</span><a data-dcnode-id="2420" href="#_ftn16" name="_ftnref16" title=""><span data-dcnode-id="2421" instrument_node="">[16]</span></a><span data-dcnode-id="2419" instrument_node=""> A key goal of Western democracies is to maintain a free, stable and open Internet, where fundamental rights and freedoms are ensured. In this regard, ‘information security’ is perceived as the protection of data and systems, but not imposing control over the attitudes and beliefs that the users of those systems are expressing. At the same time, the principles of openness and freedom of speech upheld in Western democracies might be exploited by information and cyberattacks. &nbsp;Russia seeks to exploit this openness to gain ‘</span><strong data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">information superiority</span></strong><span data-dcnode-id="2416" instrument_node="">,’ notwithstanding whether it is in a conventional conflict with its opponents or not.</span></p><span data-dcnode-id="2414" instrument_node="">
</span></div><span data-dcnode-id="2412" instrument_node="">
</span></div><span data-dcnode-id="2410" instrument_node="">
</span></div><span data-dcnode-id="2408" instrument_node="">
</span></div><span data-dcnode-id="2406" instrument_node="">
</span><div class="accordion p-0" data-dcnode-id="2213"><span data-dcnode-id="2405" instrument_node="">
</span><div data-dcnode-id="2215"><span data-dcnode-id="2404" instrument_node="">
</span><div class="collapse-heading" data-dcnode-id="2401"><a aria-expanded="false" class="accordion-title collapsed" data-dcnode-id="2402" data-toggle="collapse" href="#acco_acco_1623422062481"><span data-dcnode-id="2403" instrument_node="">NATIONAL SECURITY INTERESTS AND STRATEGIC OBJECTIVES</span></a></div><span data-dcnode-id="2400" instrument_node="">
</span><div class="collapse col_me" data-dcnode-id="2217" data-parent=".accordion" id="acco_acco_1623422062481"><span data-dcnode-id="2399" instrument_node="">
</span><div class="accordion-body" data-dcnode-id="2219"><span data-dcnode-id="2398" instrument_node="">
</span><span data-dcnode-id="2397" instrument_node="">
</span><span data-dcnode-id="2396" instrument_node="">
</span><span data-dcnode-id="2395" instrument_node="">
</span><span data-dcnode-id="2373" instrument_node="">
</span><span data-dcnode-id="2371" instrument_node="">
</span><span data-dcnode-id="2369" instrument_node="">
</span><table border="1" cellpadding="1" cellspacing="1" data-dcnode-id="2368" style="background-color:#e6e6fa;border-style:hidden;"><tbody data-dcnode-id="2370"><tr data-dcnode-id="2372"><td data-dcnode-id="2374"><span data-dcnode-id="2394" instrument_node="">
</span><div data-dcnode-id="2391" style="background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;"><strong data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">Events that sparked capability development</span></strong></div><span data-dcnode-id="2390" instrument_node="">
</span><div data-dcnode-id="2376" style="background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;"><span data-dcnode-id="2389" instrument_node="">Russian thinking and capabilities regarding information confrontation have been developed by learning from mistakes both at home and abroad. In the 1980s, the Soviet Union began to draw attention to a so called ‘Revolution in Military Affairs’ that affected warfare via informatization. Calls for revolution were however disregarded,&nbsp; which is why the Soviets were utterly shocked by the coalition’s success in the 1991 Gulf War.&nbsp; Consequently the importance of information technologies was eventually internalized.&nbsp;</span><br data-dcnode-id="2388"><span data-dcnode-id="2387" instrument_node="">
</span><br data-dcnode-id="2386"><span data-dcnode-id="2385" instrument_node="">
			In the Second Chechen War of 1999, the Russians managed to dominate the traditional media environment, but were unable to overcome the global perception of a heroic Chechen independence struggle due to the rebels’ use of the Internet. Russian security services thus sought to harness the Internet to impact audiences. Disinformation campaigns were conducted domestically in a coordinated fashion, while Chechen information campaigning was targeted through cyber means.&nbsp;</span><br data-dcnode-id="2384"><span data-dcnode-id="2383" instrument_node="">
</span><br data-dcnode-id="2382"><span data-dcnode-id="2381" instrument_node="">
			In the Russo - Georgian War of 2008, the Georgians gained the upper hand in the information space by drowning out Russian news coverage abroad by reporting on Russian air raids on civilian targets.&nbsp; Eventually this led to discussions on the creation of ‘Information Troops’ within the military to engage in a direct dialogue with the target audiences.</span><br data-dcnode-id="2380"><span data-dcnode-id="2379" instrument_node="">
</span><br data-dcnode-id="2378"><span data-dcnode-id="2377" instrument_node="">
			A few years later, the 2011-2013 Moscow protests about unfair elections and the Putin-Medvedev role swap demonstrated how social media could be used to generate public unrest. Already the Arab uprisings had demonstrated the effectiveness of social media in regime change, which contributed significantly to the Kremlin’s anxiousness of the same being repeated in Russia. Russian officials understood that automatically-generated social media content was not enough to affect the conversation, which led to substantial investments in human capabilities to impact online debates by recruiting people with knowledge of foreign languages. This capability is exemplified in the Internet Research Agency, a state-affiliated troll farm dedicated to influencing audiences at home and abroad. These events helped Russia develop the information campaign capabilities that facilitated the annexation of Crimea in 2014.</span></div><span data-dcnode-id="2375" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="2367" instrument_node="">
</span><p data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2364" instrument_node="">
</span><p data-dcnode-id="2361"><strong data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">Russia’s Threat Perception</span></strong></p><span data-dcnode-id="2360" instrument_node="">
</span><p data-dcnode-id="2355"><span data-dcnode-id="2359" instrument_node="">As a vast country with significant natural resources but few natural borders, Russia has repeatedly had to mobilize its society to counter foreign aggressions. This has contributed to a profound sense of insecurity whereby the security of Russia can best be guaranteed by exerting control beyond its borders, in its perceived “sphere of influence.”</span><a data-dcnode-id="2357" href="#_ftn17" name="_ftnref17" title=""><span data-dcnode-id="2358" instrument_node="">[17]</span></a><span data-dcnode-id="2356" instrument_node=""> Russia has thus tended to define its security in a zero-sum way that embodies the classic security dilemma, whereby they are secure when their adversaries feel insecure. After the fall of the Soviet Union, many Westerners believed relations with Russia would restart. However, Russian skepticism of the West festered in the 1990s, due largely to the serious economic shock felt in the ill-handled transition to a market economy, and the lack of a new unifying national identity after the break-up of Soviet Union.</span></p><span data-dcnode-id="2354" instrument_node="">
</span><p data-dcnode-id="2343"><span data-dcnode-id="2353" instrument_node="">This mistrust of the West is further exemplified in Russia’s view that NATO’s enlargement to former Soviet states represents aggression towards its claimed “sphere of influence.” Russia also accuses the West of foreign interference, for allegedly inciting Color Revolutions.</span><a data-dcnode-id="2351" href="#_ftn18" name="_ftnref18" title=""><span data-dcnode-id="2352" instrument_node="">[18]</span></a><span data-dcnode-id="2350" instrument_node=""> Former KGB officer Igor Panarin has argued that the West’s use of informational tools during the 20th century led the Russians to destroy their own country, first with the fall of the Russian tsars in 1917, and later with the collapse of the Soviet Union in 1991.</span><a data-dcnode-id="2348" href="#_ftn19" name="_ftnref19" title=""><span data-dcnode-id="2349" instrument_node="">[19]</span></a><span data-dcnode-id="2347" instrument_node=""> Additionally, the 2011 Arab Spring revolutions sweeping the Middle-East and North Africa fit into the Russian narrative of consistent Western attempts at ousting hostile regimes, primarily through informational tools.</span><a data-dcnode-id="2345" href="#_ftn20" name="_ftnref20" title=""><span data-dcnode-id="2346" instrument_node="">[20]</span></a><span data-dcnode-id="2344" instrument_node=""> This threat perception has been highlighted in the 2016 Information Security Doctrine, which states that:</span></p><span data-dcnode-id="2342" instrument_node="">
</span><p data-dcnode-id="2337"><em data-dcnode-id="2338"><span data-dcnode-id="2341" instrument_node="">“Intelligence services of certain States are increasingly using information and psychological tools with a view of destabilizing the internal political and social situation in various regions across the world, undermining sovereignty and violating the territorial integrity of other States. Religious, ethnic, human rights organizations and other organizations, as well as separate groups of people, are involved in these activities and information technologies are extensively used towards this end”.</span><a data-dcnode-id="2339" href="#_ftn21" name="_ftnref21" title=""><span data-dcnode-id="2340" instrument_node="">[21]</span></a></em></p><span data-dcnode-id="2336" instrument_node="">
</span><p data-dcnode-id="2326"><span data-dcnode-id="2335" instrument_node="">The Kremlin’s ongoing offensive stance assumes that there is a systemic, continuous struggle between great powers, and therefore it must defend itself from consistent influence operations by the West. This approach was outlined in the 2000 National Security Concept, which states that to prevent wars and armed conflicts, Russia should give preference to non-military means and to engage in “</span><em data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">counteraction against the threat of rivalry in the information sphere</span></em><span data-dcnode-id="2332" instrument_node="">”.</span><a data-dcnode-id="2330" href="#_ftn22" name="_ftnref22" title=""><span data-dcnode-id="2331" instrument_node="">[22]</span></a><span data-dcnode-id="2329" instrument_node=""> What is important in their perception is that Russia’s own actions are perceived as defensive, the aim being to prevent potential conflicts and retaliation, and to control their escalation by staying below the West’s threshold for armed conflict.</span><a data-dcnode-id="2327" href="#_ftn23" name="_ftnref23" title=""><span data-dcnode-id="2328" instrument_node="">[23]</span></a></p><span data-dcnode-id="2325" instrument_node="">
</span><p data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2322" instrument_node="">
</span><p data-dcnode-id="2319"><strong data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">Strategic Deterrence &nbsp;</span></strong></p><span data-dcnode-id="2318" instrument_node="">
</span><p data-dcnode-id="2302"><span data-dcnode-id="2317" instrument_node="">The importance of information technology in the information confrontation is derived from Russia’s ‘</span><strong data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">strategic deterrence</span></strong><span data-dcnode-id="2314" instrument_node="">’ concept. It is based on the understanding that nuclear weapons do not sufficiently deter the whole spectrum of modern security threats,</span><a data-dcnode-id="2312" href="#_ftn24" name="_ftnref24" title=""><span data-dcnode-id="2313" instrument_node="">[24]</span></a><span data-dcnode-id="2311" instrument_node=""> which is why strategic deterrence includes not only nuclear and conventional military power, but also an array of non-military tools, such as ideological, political, diplomatic, economic, and – centrally – informational and digital measures.</span><a data-dcnode-id="2309" href="#_ftn25" name="_ftnref25" title=""><span data-dcnode-id="2310" instrument_node="">[25]</span></a><span data-dcnode-id="2308" instrument_node=""> &nbsp;It is therefore important to understand that, in spite of its name, strategic deterrence is not only about deterrence in the Western understanding of the term, but rather a comprehensive approach to achieving strategic goals.</span><a data-dcnode-id="2306" href="#_ftn26" name="_ftnref26" title=""><span data-dcnode-id="2307" instrument_node="">[26]</span></a><span data-dcnode-id="2305" instrument_node=""> Russia has recognized that aspiring for military parity with the US is costly and must be avoided given the fate of the Soviet Union and the economic stagnation of modern-day Russia.</span><a data-dcnode-id="2303" href="#_ftn27" name="_ftnref27" title=""><span data-dcnode-id="2304" instrument_node="">[27]</span></a></p><span data-dcnode-id="2301" instrument_node="">
</span><p data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">Therefore, the Kremlin is eager to exploit the vulnerabilities of strategic challengers even in peacetime. More recent efforts such as the annexation of Crimea, or interference in the 2016 US election, have reaffirmed for Russia the effectiveness of information weapons to achieve strategic objectives without triggering red lines of military confrontation. This may be a key reason why cyber-attacks aimed at physically impacting infrastructure are wielded more sparingly, as they may trigger a more dramatic response, making escalation harder to control.</span></p><span data-dcnode-id="2298" instrument_node="">
</span><p data-dcnode-id="2290"><span data-dcnode-id="2297" instrument_node="">The overall goal of the information confrontation is to achieve </span><strong data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">strategic effects and gain superiority over opponents</span></strong><span data-dcnode-id="2294" instrument_node="">, whether it is done by military or non-military means.&nbsp;To this end, cyber operations can play an essential role in compensating for conventional force, as disabling critical civil infrastructure such as energy, transport, and C2 (Command and Control) capabilities can dramatically disable an adversary’s war-fighting capabilities. Information tools may work in tandem, as Russian military thinkers posit that by targeting not only the leadership and military, but the entire mass consciousness of the population, strategic effects may be achieved.</span><a data-dcnode-id="2292" href="#_ftn28" name="_ftnref28" title=""><span data-dcnode-id="2293" instrument_node="">[28]</span></a><span data-dcnode-id="2291" instrument_node=""> This Russian strategic thinking operationalises the protection of their own information space though an extensive web of code, legal controls, and surveillance measures which will be explored in the following section.</span></p><span data-dcnode-id="2289" instrument_node="">
</span><p data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2286" instrument_node="">
</span><span data-dcnode-id="2285" instrument_node="">
</span><span data-dcnode-id="2284" instrument_node="">
</span><span data-dcnode-id="2283" instrument_node="">
</span><span data-dcnode-id="2229" instrument_node="">
</span><span data-dcnode-id="2227" instrument_node="">
</span><span data-dcnode-id="2225" instrument_node="">
</span><table border="1" cellpadding="1" cellspacing="1" data-dcnode-id="2224"><tbody data-dcnode-id="2226"><tr data-dcnode-id="2228"><td data-dcnode-id="2230"><span data-dcnode-id="2282" instrument_node="">
</span><div data-dcnode-id="2279" style="background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;"><strong data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">Principles of Russia’s ‘information confrontation’ playbook</span></strong></div><span data-dcnode-id="2278" instrument_node="">
</span><div data-dcnode-id="2232" style="background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;"><span data-dcnode-id="2277" instrument_node="">The Russian perception of information as a means to galvanize its domestic population and to win over global public opinion by misdirection has its roots in Soviet practices.</span><a data-dcnode-id="2275" href="#_ftn29" name="_ftnref29" title=""><span data-dcnode-id="2276" instrument_node="">[29]</span></a><span data-dcnode-id="2274" instrument_node=""> Current tactics resemble concepts from Soviet-era theories and such as ‘reflexive control’, ‘active measures’ and ‘maskirovka’. However, in many ways Russia’s approach to ‘information confrontation’ is unique to today, as Russia is constantly adapting to new circumstances and technology.</span><br data-dcnode-id="2273"><span data-dcnode-id="2272" instrument_node="">
</span><br data-dcnode-id="2271"><span data-dcnode-id="2270" instrument_node="">
			‘</span><strong data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">Active measures</span></strong><span data-dcnode-id="2267" instrument_node="">’ (</span><em data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">aktivnyye meropriyatiya</span></em><span data-dcnode-id="2264" instrument_node="">) refers to operations aiming at affecting other nations’ policies. This however should not to be mistaken with public diplomacy, in which practically all states continuously engage. The difference between the two is that whereas the aims and sources of public diplomacy activities are open, active measures tend to be undertaken secretly, violate laws and involve blackmail, bribes, disinformation, and the exploitation of a target nation’s individuals and political influence.</span><a data-dcnode-id="2262" href="#_ftn30" name="_ftnref30" title=""><span data-dcnode-id="2263" instrument_node="">[30]</span></a><span data-dcnode-id="2261" instrument_node="">The theory of reflexive control seeks to lead the target to unknowingly act in a predefined manner, often against their own interest.</span><a data-dcnode-id="2259" href="#_ftn31" name="_ftnref31" title=""><span data-dcnode-id="2260" instrument_node="">[31]</span></a><span data-dcnode-id="2258" instrument_node=""> This could be done by influencing the adversary’s channels of information and sending them messages which shift the flow of information in Russia’s favor. The adversary, acting on a manipulated information space, makes a decision that has at its core been incited by Moscow.</span><a data-dcnode-id="2257" name="_Hlk17977777"></a><a data-dcnode-id="2255" href="#_ftn32" name="_ftnref32" title=""><span data-dcnode-id="2256" instrument_node="">[32]</span></a><span data-dcnode-id="2254" instrument_node=""> A country’s susceptibility to reflexive control largely emanates from unchecked access to its information space by all actors, where false or misleading information is often not attributable and control measures are limited. Democratic information spaces are especially vulnerable to such efforts.</span><br data-dcnode-id="2253"><span data-dcnode-id="2252" instrument_node="">
</span><br data-dcnode-id="2251"><span data-dcnode-id="2250" instrument_node="">
			Another method of information confrontation inherited from the Soviet-era is known as </span><strong data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">maskirovka</span></strong><span data-dcnode-id="2247" instrument_node="">, which includes concealment and deception.&nbsp;Used primarily as a military term, the aim of </span><em data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">maskirovka </span></em><span data-dcnode-id="2244" instrument_node="">is to convince the adversary of the presence of objectives or units in places where they are not.&nbsp;The idea behind such actions is to lead the target into error, force them to take measures not corresponding to reality, and to disrupt their C2 and undermine their troops’ morale.</span><a data-dcnode-id="2242" href="#_ftn33" name="_ftnref33" title=""><span data-dcnode-id="2243" instrument_node="">[33]</span></a><span data-dcnode-id="2241" instrument_node=""> Traditionally, it was the GRU (the Main Intelligence Directorate) that was responsible for </span><em data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">maskirovka</span></em><span data-dcnode-id="2238" instrument_node="">, but military operations in Ukraine indicate that various state and non-state actors have been involved in such actions, including the FSB (the Federal Security Service) and the Night Wolves. Moreover, </span><em data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">maskirovka </span></em><span data-dcnode-id="2235" instrument_node="">is not solely limited to military targets anymore, but also includes the civilian population.</span><a data-dcnode-id="2233" href="#_ftn34" name="_ftnref34" title=""><span data-dcnode-id="2234" instrument_node="">[34]</span></a></div><span data-dcnode-id="2231" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="2223" instrument_node="">
</span><p data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2220" instrument_node="">
</span></div><span data-dcnode-id="2218" instrument_node="">
</span></div><span data-dcnode-id="2216" instrument_node="">
</span></div><span data-dcnode-id="2214" instrument_node="">
</span></div><span data-dcnode-id="2212" instrument_node="">
</span><div class="accordion p-0" data-dcnode-id="2079"><span data-dcnode-id="2211" instrument_node="">
</span><div data-dcnode-id="2081"><span data-dcnode-id="2210" instrument_node="">
</span><div class="collapse-heading" data-dcnode-id="2207"><a aria-expanded="false" class="accordion-title collapsed" data-dcnode-id="2208" data-toggle="collapse" href="#acco_acco_1623422062475"><span data-dcnode-id="2209" instrument_node="">SECURING THE INFORMATION SPACE - ‘DIGITAL SOVEREIGNTY’</span></a></div><span data-dcnode-id="2206" instrument_node="">
</span><div class="collapse col_me" data-dcnode-id="2083" data-parent=".accordion" id="acco_acco_1623422062475"><span data-dcnode-id="2205" instrument_node="">
</span><div class="accordion-body" data-dcnode-id="2085"><span data-dcnode-id="2204" instrument_node="">
</span><p data-dcnode-id="2165"><span data-dcnode-id="2203" instrument_node="">In October 2019, ‘Russia’s sovereign internet’ law came into force, effectively allowing the government to disconnect from the global Internet at their discretion. To this end, the Kremlin aims to have only 10% of Russian Internet traffic routed through foreign servers by 2024.</span><a data-dcnode-id="2201" href="#_ftn35" name="_ftnref35" title=""><span data-dcnode-id="2202" instrument_node="">[35]</span></a><span data-dcnode-id="2200" instrument_node=""> The Kremlin views control over its domestic information space as essential to their security – a threat to the information space might be perceived as a threat to state sovereignty</span><a data-dcnode-id="2199" name="_Hlk15232651"></a><a data-dcnode-id="2197" name="_Hlk15285744"><span data-dcnode-id="2198" instrument_node="">.</span></a><span data-dcnode-id="2196" instrument_node=""> This section will explore the implementation of ‘digital sovereignty’ concept through exploring the measures that are taken to secure Russia’s domestic information space.</span><strong data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">Digital sovereignty</span></strong><span data-dcnode-id="2193" instrument_node=""> (</span><em data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">tsifrovoi suverenitet</span></em><span data-dcnode-id="2190" instrument_node="">) is in this context used primarily as a political term, and can be understood as the right and capability of a government to determine its fate within its own information space.</span><a data-dcnode-id="2188" href="#_ftn36" name="_ftnref36" title=""><span data-dcnode-id="2189" instrument_node="">[36]</span></a><span data-dcnode-id="2187" instrument_node=""> Russian information technology expert, Igor Ashmanov, divides digital sovereignty in two: </span><strong data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">electronic sovereignty</span></strong><span data-dcnode-id="2184" instrument_node="">, which encompasses robust Internet infrastructure protected from malware and malicious cyber actors; and </span><strong data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">information sovereignty</span></strong><span data-dcnode-id="2181" instrument_node="">, the self-sufficient control of information and resistance to information attacks. Thus, the ideal state of affairs would consist of autonomous hard- and software, Internet infrastructure, subordinated mass media, a unifying ideology, and a strong legal system.</span><a data-dcnode-id="2179" href="#_ftn37" name="_ftnref37" title=""><span data-dcnode-id="2180" instrument_node="">[37]</span></a><span data-dcnode-id="2178" instrument_node=""> An essential component of digital sovereignty is the </span><strong data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Russian Internet</span></strong><span data-dcnode-id="2175" instrument_node=""> (RuNet) – a Russian language-based,&nbsp;relatively&nbsp;closed segment of the Internet consisting of popular research engines and social media sites such as Yandex, Vkontakte and Odnoklassniki. Although seemingly harmless, this system has enabled Russia to reach out to and influence Russian-speaking minorities in neighbouring countries, extending Russia’s sphere of influence in the digital environment.</span><a data-dcnode-id="2173" href="#_ftn38" name="_ftnref38" title=""><span data-dcnode-id="2174" instrument_node="">[38]</span></a><span data-dcnode-id="2172" instrument_node=""> </span><a data-dcnode-id="2171" name="_Hlk17882593"></a><a data-dcnode-id="2170" name="_Hlk14876134"></a><span data-dcnode-id="2169" instrument_node="">In recent years, RuNet has begun to transform from an alternative online environment into a space where the Kremlin actively suppresses undesired information – an aspiration which is outlined in the 2016 Information Security Doctrine.</span><a data-dcnode-id="2167" href="#_ftn39" name="_ftnref39" title=""><span data-dcnode-id="2168" instrument_node="">[39]</span></a><span data-dcnode-id="2166" instrument_node=""> Interestingly, Russia’s growing interest in detaching the Russian Internet may negate some benefits of RuNet, as it will limit their ability to impose control outside their borders through these platforms.</span></p><span data-dcnode-id="2164" instrument_node="">
</span><p data-dcnode-id="2159"><span data-dcnode-id="2163" instrument_node="">Russian defence and security elites acknowledged the significance of the Internet as a security threat after 2012, when political opposition used it extensively to mobilize, first against the fraudulent Duma election and then against Putin’s re-election.</span><a data-dcnode-id="2161" href="#_ftn40" name="_ftnref40" title=""><span data-dcnode-id="2162" instrument_node="">[40]</span></a><span data-dcnode-id="2160" instrument_node=""> Several steps were taken to implement the concept of ‘digital sovereignty,’ namely to create Russia’s own national Internet segment that would make it self-sufficient and independent from developments outside its borders, thus ensuring protection from both internal and external threats.</span></p><span data-dcnode-id="2158" instrument_node="">
</span><p data-dcnode-id="2151"><span data-dcnode-id="2157" instrument_node="">A closed network would provide Russia with considerable advantages in different phases of information confrontation. Russia would gain in terms of its societal resilience and recovery, integrity of command, and overall performance in times of mobilization.&nbsp;The system would also create a deterrence-by-denial effect that would discourage the adversary from taking hostile actions due to their expected futility.&nbsp;</span><a data-dcnode-id="2155" href="#_ftn41" name="_ftnref41" title=""><span data-dcnode-id="2156" instrument_node="">[41]</span></a><span data-dcnode-id="2154" instrument_node=""> Conflict in the information space between Russia and her adversaries would thus gain a very asymmetric character, as the states operating within open networks would face a considerably constrained operating environment, whereas Russia, as a closed-network nation, would be able to operate with comparative freedom.&nbsp;</span><a data-dcnode-id="2152" href="#_ftn42" name="_ftnref42" title=""><span data-dcnode-id="2153" instrument_node="">42]</span></a></p><span data-dcnode-id="2150" instrument_node="">
</span><p data-dcnode-id="2146"><span data-dcnode-id="2149" instrument_node="">Juha Kukkola outlines several sets of measures (or sub-systems) that help Russia ‘nationalize’ their domestic information infrastructure, such as:</span><a data-dcnode-id="2147" href="#_ftn43" name="_ftnref43" title=""><span data-dcnode-id="2148" instrument_node="">[43]</span></a></p><span data-dcnode-id="2145" instrument_node="">
</span><ol data-dcnode-id="2108"><span data-dcnode-id="2144" instrument_node="">
</span><li data-dcnode-id="2140"><strong data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">Scientific – industrial bases</span></strong><span data-dcnode-id="2141" instrument_node="">: the development of Russian-produced hardware and software, and provision to security services and military.</span></li><span data-dcnode-id="2139" instrument_node="">
</span><li data-dcnode-id="2135"><strong data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">State authentication and encryption</span></strong><span data-dcnode-id="2136" instrument_node="">: efforts to make data traffic within Russia accessible to security services and military, and to protect data from foreign exploitation.</span></li><span data-dcnode-id="2134" instrument_node="">
</span><li data-dcnode-id="2130"><strong data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Blacklisting and content management:</span></strong><span data-dcnode-id="2131" instrument_node=""> the removal and restriction of websites.</span></li><span data-dcnode-id="2129" instrument_node="">
</span><li data-dcnode-id="2125"><strong data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">Targeted surveillance systems and massive data traffic localisation and retention:</span></strong><span data-dcnode-id="2126" instrument_node=""> carried out by Internet Service Providers, as ordered by the state. It is highly centralised and the objectives are counterintelligence, law enforcement and political control.</span></li><span data-dcnode-id="2124" instrument_node="">
</span><li data-dcnode-id="2120"><strong data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Efforts to protect Critical Information Infrastructure (CII) through extensive legal regime:</span></strong><span data-dcnode-id="2121" instrument_node=""> &nbsp;based on state ownership or control of CII and legal obligations on private actors to protect it. This includes backups of top-level domain name servers (DNS), routing registers, and Internet Exchange Points (IXP). It allows for the functioning of the national segment and its disconnection from the global network.</span></li><span data-dcnode-id="2119" instrument_node="">
</span><li data-dcnode-id="2115"><strong data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Information-technological and information-psychological countermeasures</span></strong><span data-dcnode-id="2116" instrument_node="">: managed by state-controlled or affiliated news services, and educational, patriotic and religious institutions, as well as through the cyber capability of security services and the military. It controls the domestic information environment and conducts external overt and covert espionage, and influence and cyber operations abroad to prevent possible threats from emerging.</span></li><span data-dcnode-id="2114" instrument_node="">
</span><li data-dcnode-id="2110"><strong data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Feedback, monitoring, control and management</span></strong><span data-dcnode-id="2111" instrument_node="">: a subsystem which provides real-time analysis and reactions to all information threats.</span></li><span data-dcnode-id="2109" instrument_node="">
</span></ol><span data-dcnode-id="2107" instrument_node="">
</span><p data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">Domestic information security is supported by systems such as SORM and GosSOPKA, as well as a system for the centralized management of the public telecommunications network (currently under development).</span></p><span data-dcnode-id="2104" instrument_node="">
</span><p data-dcnode-id="2094"><strong data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">SORM (System of Operative-Search Measures)</span></strong><span data-dcnode-id="2101" instrument_node=""> is a Soviet-era surveillance technology which the government began adapting to the emerging digital domain in 1998.</span><a data-dcnode-id="2099" href="#_ftn44" name="_ftnref44" title=""><span data-dcnode-id="2100" instrument_node="">[44]</span></a><span data-dcnode-id="2098" instrument_node=""> The SORM enables the tracking of telephone and internet traffic, not only at a metadata level, but also contents and data traffic. Internet and other telecommunication service providers are obligated to install probes in their networks connecting them to the Federal Security Service (FSB). The most recent generation of the system (SORM-3) includes deep packet inspection capabilities.</span><a data-dcnode-id="2096" href="#_ftn45" name="_ftnref45" title=""><span data-dcnode-id="2097" instrument_node="">[45]</span></a><span data-dcnode-id="2095" instrument_node=""> Other Russian security services can request access to SORM. While there is no direct evidence of the use of SORM abroad except for some former Soviet countries, it naturally affects foreign nationals travelling to Russia.</span></p><span data-dcnode-id="2093" instrument_node="">
</span><p data-dcnode-id="2087"><strong data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">System for the centralized management of the public telecommunications network </span></strong><span data-dcnode-id="2090" instrument_node="">is currently under development and will be controlled from the Centre of Monitoring and Managing of the Public Communication Networks (TsMUSSOP) by the Radio Frequency Service. It foresees that Internet Service Providers (ISPs) are required to install certain equipment into their networks which can monitor and filter traffic, and if needed completely block it. This would, in theory, disconnect the Russian segment of Internet from the global network.</span><a data-dcnode-id="2088" href="#_ftn46" name="_ftnref46" title=""><span data-dcnode-id="2089" instrument_node="">[46]</span></a></p><span data-dcnode-id="2086" instrument_node="">
</span></div><span data-dcnode-id="2084" instrument_node="">
</span></div><span data-dcnode-id="2082" instrument_node="">
</span></div><span data-dcnode-id="2080" instrument_node="">
</span></div><span data-dcnode-id="2078" instrument_node="">
</span><div class="accordion p-0" data-dcnode-id="1920"><span data-dcnode-id="2077" instrument_node="">
</span><div data-dcnode-id="1922"><span data-dcnode-id="2076" instrument_node="">
</span><div class="collapse-heading" data-dcnode-id="2073"><a aria-expanded="false" class="accordion-title collapsed" data-dcnode-id="2074" data-toggle="collapse" href="#acco_acco_1623422062471"><span data-dcnode-id="2075" instrument_node="">LAWS REGULATING INFORMATION SPACE AND CII&nbsp;</span></a></div><span data-dcnode-id="2072" instrument_node="">
</span><div class="collapse col_me" data-dcnode-id="1924" data-parent=".accordion" id="acco_acco_1623422062471"><span data-dcnode-id="2071" instrument_node="">
</span><div class="accordion-body" data-dcnode-id="1926"><span data-dcnode-id="2070" instrument_node="">
</span><p data-dcnode-id="2065"><span data-dcnode-id="2069" instrument_node="">These technical measures are accompanied by a heavy-handed </span><strong data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">legal regime</span></strong><span data-dcnode-id="2066" instrument_node="">. This regime is two-fold, combining both laws that nationalize the protection of critical information infrastructure, and those which are directed at controlling content and data flow in the Internet.</span></p><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2060"><span data-dcnode-id="2063" instrument_node="">To assert complete control over the information space, the Russian government has passed a network of laws that effectively nationalize the protection of CII. These regulations grew out of previous regulations on emergencies governing energy and transportation.</span><a data-dcnode-id="2061" href="#_ftn47" name="_ftnref47" title=""><span data-dcnode-id="2062" instrument_node="">[47]</span></a></p><span data-dcnode-id="2059" instrument_node="">
</span><p data-dcnode-id="2049"><span data-dcnode-id="2058" instrument_node="">A 2012 policy</span><a data-dcnode-id="2056" href="#_ftn48" name="_ftnref48" title=""><span data-dcnode-id="2057" instrument_node="">[48]</span></a><span data-dcnode-id="2055" instrument_node=""> firmly defined CII and introduced the national cyber security system </span><strong data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">GosSOPKA </span></strong><span data-dcnode-id="2052" instrument_node="">(Government System for Detecting, Preventing and Eliminating Effects of Computer Attacks). GosSOPKA is designed to “shield” all government information resources under the hood of a single system with a constantly monitored perimeter. This shield would extend to all resources and critical infrastructure, so they all share information about cyberattacks with a central office, which would determine how an attack was mounted and distribute security recommendations to the rest of the system.</span><a data-dcnode-id="2050" href="#_ftn49" name="_ftnref49" title=""><span data-dcnode-id="2051" instrument_node="">[49]</span></a></p><span data-dcnode-id="2048" instrument_node="">
</span><p data-dcnode-id="2041"><span data-dcnode-id="2047" instrument_node="">In 2017, the Law on the Critical Infrastructure was adopted, specifying FSB control over the system and affirming the final conceptual form of GosSOPKA and requiring all components in this network to share data with it.</span><a data-dcnode-id="2045" href="#_ftn50" name="_ftnref50" title=""><span data-dcnode-id="2046" instrument_node="">[50]</span></a><span data-dcnode-id="2044" instrument_node=""> In sum, “to protect its ‘significant objects’ a vertical, hierarchical, and centralized system is being built which has the possibility to connect all strategic sectors of the nation to a system of cyber security operated by the FSB.”</span><a data-dcnode-id="2042" href="#_ftn51" name="_ftnref51" title=""><span data-dcnode-id="2043" instrument_node="">[51]</span></a></p><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2033"><span data-dcnode-id="2039" instrument_node="">Several important laws that are aimed at regulating domestic information space and imposing censorship have been passed since 2012. Of note is what is known as the Yarovaya Law, a package of laws passed in 2016 which, under the guise of fighting terrorism, requires ISPs to provide the Kremlin with access to the personal data of their users</span><a data-dcnode-id="2037" href="#_ftn52" name="_ftnref52" title=""><span data-dcnode-id="2038" instrument_node="">[52]</span></a><span data-dcnode-id="2036" instrument_node="">. The law also increases punishments for hate speech, extremism, and notably criminalizes participation in riots. Other key laws, as compiled from the Swedish Center for Russian Studies, are outlined below.</span><a data-dcnode-id="2034" href="#_ftn53" name="_ftnref53" title=""><span data-dcnode-id="2035" instrument_node="">[53]</span></a></p><span data-dcnode-id="2032" instrument_node="">
</span><p data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2029" instrument_node="">
</span><div data-dcnode-id="2012" style="background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;"><strong data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">2012</span></strong><br data-dcnode-id="2026"><span data-dcnode-id="2025" instrument_node="">
</span><br data-dcnode-id="2024"><span data-dcnode-id="2023" instrument_node="">
</span><strong data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">Internet Blacklist, 139-FZ / 2012-07-28</span></strong><span data-dcnode-id="2020" instrument_node="">: This law launched a central blacklist monitored by Rozkomnadzor (the Federal Service for Supervision in the Sphere of Telecommunications, Information Technologies and Mass Communications) that can be enforced without a court order. The list now holds 100,000 IP-addresses.</span><br data-dcnode-id="2019"><span data-dcnode-id="2018" instrument_node="">
</span><br data-dcnode-id="2017"><span data-dcnode-id="2016" instrument_node="">
</span><strong data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">Foreign Agents Law, 190-FX / 2012-11-21</span></strong><span data-dcnode-id="2013" instrument_node="">: NGOs that receive funding from outside Russia and are engaged in “political activities” are required to register as foreign agents, increasing the government’s powers to investigate them.</span></div><span data-dcnode-id="2011" instrument_node="">
</span><div data-dcnode-id="2001" style="background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;"><strong data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">2013</span></strong><br data-dcnode-id="2008"><span data-dcnode-id="2007" instrument_node="">
</span><br data-dcnode-id="2006"><span data-dcnode-id="2005" instrument_node="">
</span><strong data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">Prosecutorial Internet blockage, 398-FZ / 2013-12-28</span></strong><span data-dcnode-id="2002" instrument_node="">: Gives the Prosecutor General’s office authority to block websites it deems in contradiction to legislation without a trial.</span></div><span data-dcnode-id="2000" instrument_node="">
</span><div data-dcnode-id="1962" style="background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;"><strong data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">2014</span></strong><br data-dcnode-id="1997"><span data-dcnode-id="1996" instrument_node="">
</span><br data-dcnode-id="1995"><span data-dcnode-id="1994" instrument_node="">
</span><strong data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">Dissemination of Historical Narratives, 128-FZ / 2014-05-05</span></strong><span data-dcnode-id="1991" instrument_node="">: Legislates prison sentences of up to five years for “false information” about the USSR’s role in WWII. National television networks use these narratives to mobilize the population in support of the Kremlin’s foreign policy objectives. In 2016, a Russian citizen paid a 200,000 ruble fine for posting that the USSR collaborated with the Nazis to invade Poland in 1939.</span><br data-dcnode-id="1990"><span data-dcnode-id="1989" instrument_node="">
</span><br data-dcnode-id="1988"><span data-dcnode-id="1987" instrument_node="">
</span><strong data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">Law on Bloggers, 97-FZ / 2014-05-05</span></strong><span data-dcnode-id="1984" instrument_node="">: Bloggers with over 3000 daily site visitors must register with authorities and are held responsible for any comments by third parties on their content.</span><br data-dcnode-id="1983"><span data-dcnode-id="1982" instrument_node="">
</span><br data-dcnode-id="1981"><span data-dcnode-id="1980" instrument_node="">
</span><strong data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Law on data localization, 242-FZ / 2014-07-2</span></strong><span data-dcnode-id="1977" instrument_node="">1: Requires the localization of data collected on Russian citizens to be localized to the Russian Federation by 2020 and authorities informed of their whereabouts.</span><br data-dcnode-id="1976"><span data-dcnode-id="1975" instrument_node="">
</span><br data-dcnode-id="1974"><span data-dcnode-id="1973" instrument_node="">
</span><strong data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">Law on phone number provision for Wi-Fi, government decree no. 758 / 2014-07-31</span></strong><span data-dcnode-id="1970" instrument_node="">: Users of public Wi-Fi must provide their phone number. As buying a sim card requires a passport, this law makes it virtually impossible to browse the internet anonymously.</span><br data-dcnode-id="1969"><span data-dcnode-id="1968" instrument_node="">
</span><br data-dcnode-id="1967"><span data-dcnode-id="1966" instrument_node="">
</span><strong data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Foreign ownership of media companies, 305-FZ / 2014-05-02</span></strong><span data-dcnode-id="1963" instrument_node="">: Prohibits foreign investors from owning more than 20% of a media company operating in Russia.</span></div><span data-dcnode-id="1961" instrument_node="">
</span><div data-dcnode-id="1953" style="background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;"><strong data-dcnode-id="1955"><span data-dcnode-id="1960" instrument_node="">2016</span><br data-dcnode-id="1959"><span data-dcnode-id="1958" instrument_node="">
</span><br data-dcnode-id="1957"><span data-dcnode-id="1956" instrument_node="">
‘Yarovaya’ package of laws, 374-FZ and 375-FZ / 2016-07-06</span></strong><span data-dcnode-id="1954" instrument_node="">: requires ITC providers to store content and related metadata, and disclose them to authorities without court order; online services (f.e. messaging, e-mail, social networks) that use encrypted data can be accessed by FSB.</span></div><span data-dcnode-id="1952" instrument_node="">
</span><div data-dcnode-id="1937" style="background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;"><strong data-dcnode-id="1946"><span data-dcnode-id="1951" instrument_node="">2017</span><br data-dcnode-id="1950"><span data-dcnode-id="1949" instrument_node="">
</span><br data-dcnode-id="1948"><span data-dcnode-id="1947" instrument_node="">
Legislation regulating messenger services, 241-FZ / 2017-07-29</span></strong><span data-dcnode-id="1945" instrument_node="">: requires ISPs with messenger services including WhatsApp to save messages and pictures for six months and give authorities decryption keys.</span><br data-dcnode-id="1944"><span data-dcnode-id="1943" instrument_node="">
</span><br data-dcnode-id="1942"><span data-dcnode-id="1941" instrument_node="">
</span><strong data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">Law outlawing VPN, 276-FZ / 2017-07-29</span></strong><span data-dcnode-id="1938" instrument_node="">: bans proxy-services and VPNs.</span></div><span data-dcnode-id="1936" instrument_node="">
</span><div data-dcnode-id="1928" style="background:#eeeeee;border:1px solid #cccccc;padding:5px 10px;"><strong data-dcnode-id="1930"><span data-dcnode-id="1935" instrument_node="">2019</span><br data-dcnode-id="1934"><span data-dcnode-id="1933" instrument_node="">
</span><br data-dcnode-id="1932"><span data-dcnode-id="1931" instrument_node="">
Sovereign Internet law, 90-FZ / 05-01-2019</span></strong><span data-dcnode-id="1929" instrument_node="">: requires the installation of software that can filter, reroute and track online traffic and allow Rozkomnadzor to cut Russia off from the global Internet “in case of an emergency.” The law came into force on 1 November 2019.</span></div><span data-dcnode-id="1927" instrument_node="">
</span></div><span data-dcnode-id="1925" instrument_node="">
</span></div><span data-dcnode-id="1923" instrument_node="">
</span></div><span data-dcnode-id="1921" instrument_node="">
</span></div><span data-dcnode-id="1919" instrument_node="">
</span><div class="accordion p-0" data-dcnode-id="1684"><span data-dcnode-id="1918" instrument_node="">
</span><div data-dcnode-id="1686"><span data-dcnode-id="1917" instrument_node="">
</span><div class="collapse-heading" data-dcnode-id="1914"><a aria-expanded="false" class="accordion-title collapsed" data-dcnode-id="1915" data-toggle="collapse" href="#acco_acco_1623422062468"><span data-dcnode-id="1916" instrument_node="">STATE ACTORS AND PROXIES</span></a></div><span data-dcnode-id="1913" instrument_node="">
</span><div class="collapse col_me" data-dcnode-id="1688" data-parent=".accordion" id="acco_acco_1623422062468"><span data-dcnode-id="1912" instrument_node="">
</span><div class="accordion-body" data-dcnode-id="1690"><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1910" instrument_node="">The actors that support Russia’s activities in the information confrontation include both state, with a significant role reserved for Russia’s intelligence agencies, and proxies</span><a data-dcnode-id="1908" href="#_ftn54" name="_ftnref54" title=""><span data-dcnode-id="1909" instrument_node="">[54]</span></a><span data-dcnode-id="1907" instrument_node="">. Publicly available information does not provide details on the organization and decision-making process in Russia’s power structures. However, some Western researchers claim that contrary to the hierarchical vertical of power during the Soviet times, it is more decentralized today. The Kremlin tends to set a broad framework for goals to be achieved, expecting subordinates to elaborate and realize the policy. Thus, subordinates are empowered to achieve stated objectives based on the leadership’s intent, conditions on the ground, and the actor’s consequent judgment.</span><a data-dcnode-id="1905" href="#_ftn55" name="_ftnref55" title=""><span data-dcnode-id="1906" instrument_node="">[55]</span></a><span data-dcnode-id="1904" instrument_node=""> This section will explore the actors and their functions for the Kremlin’s activities in cyberspace.</span></p><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1895"><span data-dcnode-id="1901" instrument_node="">Russian intelligence agencies have three key characteristics. Firstly, their top priority is securing the regime – through preventive action at&nbsp;home and abroad. Secondly, they engage in c</span><strong data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">ompetitive intelligence</span></strong><span data-dcnode-id="1898" instrument_node="">, fighting for resources and the Kremlin's favour. Thirdly, they view themselves not merely as tools of decision making, but also of direct action.&nbsp;</span><a data-dcnode-id="1896" href="#_ftn56" name="_ftnref56" title=""><span data-dcnode-id="1897" instrument_node="">[56]</span></a></p><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1885"><strong data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">FSB </span></strong><span data-dcnode-id="1891" instrument_node="">(the Federal Security Service) is considered the most powerful special service, largely viewed as the successor to the KGB (Committee for State Security in the Soviet Union). Notwithstanding its originally domestic focus, its actions are increasingly being conducted abroad. The service is responsible for counter-intelligence and intelligence collection, including in cyberspace. The FSB is also important actor in securing Russia’s domestic information space, and it works in cooperation with federal agencies, such as Roskomnadzor (Federal Service for Supervision of Communications, Information Technology and Mass media), Minsifri (Ministry of Digital Development, Communications and Mass Communications of Russian Federation) and others.</span><a data-dcnode-id="1889" href="#_ftn57" name="_ftnref57" title=""><span data-dcnode-id="1890" instrument_node="">[57]</span></a><span data-dcnode-id="1888" instrument_node=""> For example, FSB has the authority to conduct wiretapping and oversee Russian data traffic via a monitoring system &nbsp;in which all Internet service providers in Russia are obliged to take part.</span><a data-dcnode-id="1886" href="#_ftn58" name="_ftnref58" title=""><span data-dcnode-id="1887" instrument_node="">[58]</span></a></p><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1862"><span data-dcnode-id="1883" instrument_node="">Western intelligence communities have linked the FSB with </span><strong data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">Turla APT</span></strong><span data-dcnode-id="1880" instrument_node=""> (advanced persistent threat), also known as </span><em data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">Snake</span></em><span data-dcnode-id="1877" instrument_node="">, </span><em data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Uroburos</span></em><span data-dcnode-id="1874" instrument_node="">, and </span><em data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">Venomous Bear</span></em><span data-dcnode-id="1871" instrument_node="">, espionage activities. Its quality of programming is significantly more sophisticated and its infrastructure more complex than other attackers with alleged ties to Russia, and its targets are more carefully selected and of more long-term value.</span><a data-dcnode-id="1869" href="#_ftn59" name="_ftnref59" title=""><span data-dcnode-id="1870" instrument_node="">[59]</span></a><span data-dcnode-id="1868" instrument_node=""> </span><em data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">Turla </span></em><span data-dcnode-id="1865" instrument_node="">is believed to be one of the longest-known cyber espionage groups, from the Agent.btz worm that was discovered inside US military networks in 2008, to more recent espionage campaigns that hijacked satellite internet connections to hide its command and control servers, and silently commandeered Iranian hackers' servers to piggyback on their spying.</span><a data-dcnode-id="1863" href="#_ftn60" name="_ftnref60" title=""><span data-dcnode-id="1864" instrument_node="">[60]</span></a></p><span data-dcnode-id="1861" instrument_node="">
</span><p data-dcnode-id="1854"><strong data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">GRU or GU</span></strong><span data-dcnode-id="1858" instrument_node=""> (Main Directorate of the General Staff of the Armed Forces of the Russian Federation) is a military external intelligence agency. Perceived as a ‘back-seater’ to the FSB in earlier cyber operations against Estonia in 2007 and Georgia in 2008, the GRU has become more visible in offensive cyber operations. Western intelligence agencies have attributed most recent significant attacks to this agency.</span><a data-dcnode-id="1856" href="#_ftn61" name="_ftnref61" title=""><span data-dcnode-id="1857" instrument_node="">[61]</span></a><span data-dcnode-id="1855" instrument_node=""> While it is difficult to assess whether the GRU has taken a leading role among other special services in conducting operations in cyberspace, their activities have been more widely discovered and described in detail in publicly available information.</span></p><span data-dcnode-id="1853" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1852" instrument_node="">The GRU possess capabilities that can be effectively used for both information-technical and information-psychological dimensions of the information confrontation. The 85th Special Service Centre (Unit 26165), which has been traditionally responsible for signal intelligence and cryptography, and the Main Centre for Special Technologies (Unit 74455), have been responsible for computer-based operations. Unit 74455 is known for hack and leak operations during the 2016 US Presidential election, the creation of </span><em data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">NotPetya</span></em><span data-dcnode-id="1849" instrument_node=""> and other malware used for attacking Ukraine’s infrastructure, and represents the technical dimension. The 72nd Special Service Centre (Unit 54777), a nucleus of the GRU’s psychological warfare apparatus, has been working closely with ‘technical’ units since at least 2014 and complementing cyberattacks with digital information operations through proxies and front organisations.</span><a data-dcnode-id="1847" href="#_ftn62" name="_ftnref62" title=""><span data-dcnode-id="1848" instrument_node="">[62]</span></a></p><span data-dcnode-id="1845" instrument_node="">
</span><p data-dcnode-id="1829"><strong data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Unit 26165</span></strong><span data-dcnode-id="1842" instrument_node=""> is suspected to be behind the activities of APT28 (also known as </span><em data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Fancy Bear, Pawn Storm, Sofacy, Strontium</span></em><span data-dcnode-id="1839" instrument_node="">). It has been one of the most active APT groups that has used highly sophisticated tools for its operations worldwide, particularly targeting the Kremlin’s opponents. Although the group’s activities have been identified by security companies since 2004, these attacks have only been publicly attributed since 2014.</span><a data-dcnode-id="1837" href="#_ftn63" name="_ftnref63" title=""><span data-dcnode-id="1838" instrument_node="">[63]</span></a><span data-dcnode-id="1836" instrument_node=""> It has been discovered that the group is responsible for interference in the 2014 Ukraine and 2016 US elections, attacks on the German parliament (Bundestag) in 2015, an attack on French television TV5Monde (masking as Cyber Caliphate hackers group initially associated with Islamic State), the attempted attack on the Organisation for the Prohibition of Chemical Weapons (OPCW), the 2018 PyeongChang Winter Olympics and more. Both US special counsel Mueller’s indictments</span><a data-dcnode-id="1834" href="#_ftn64" name="_ftnref64" title=""><span data-dcnode-id="1835" instrument_node="">[64]</span></a><span data-dcnode-id="1833" instrument_node=""> and EU officials</span><a data-dcnode-id="1831" href="#_ftn65" name="_ftnref65" title=""><span data-dcnode-id="1832" instrument_node="">[65]</span></a><span data-dcnode-id="1830" instrument_node=""> identify APT28 as GRU’s Unit 26165.</span></p><span data-dcnode-id="1828" instrument_node="">
