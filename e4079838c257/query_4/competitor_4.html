</span><li data-dcnode-id="1936"><a data-dcnode-id="1938" href="#intro"><span data-dcnode-id="1939" instrument_node="">Introduction</span></a><span data-dcnode-id="1937" instrument_node=""> </span></li><span data-dcnode-id="1935" instrument_node="">
</span><li data-dcnode-id="1931"><a data-dcnode-id="1933" href="#p1"><span data-dcnode-id="1934" instrument_node="">Part One: Summary of Findings</span></a><span data-dcnode-id="1932" instrument_node=""> </span></li><span data-dcnode-id="1930" instrument_node="">
</span><li data-dcnode-id="1926"><a data-dcnode-id="1928" href="#p2"><span data-dcnode-id="1929" instrument_node="">Part Two: Further Analysis and Recommendations</span></a><span data-dcnode-id="1927" instrument_node=""> </span></li><span data-dcnode-id="1925" instrument_node="">
</span><li data-dcnode-id="1921"><a data-dcnode-id="1923" href="#members"><span data-dcnode-id="1924" instrument_node="">Members of the NATO Group of Experts</span></a><span data-dcnode-id="1922" instrument_node=""> </span></li><span data-dcnode-id="1920" instrument_node="">
</span><li data-dcnode-id="1916"><a data-dcnode-id="1918" href="#adv"><span data-dcnode-id="1919" instrument_node="">Advisers to the Group of Experts</span></a><span data-dcnode-id="1917" instrument_node=""> </span></li><span data-dcnode-id="1915" instrument_node="">
</span><li data-dcnode-id="1911"><a data-dcnode-id="1913" href="#military"><span data-dcnode-id="1914" instrument_node="">Military Advice</span></a><span data-dcnode-id="1912" instrument_node=""> </span></li><span data-dcnode-id="1910" instrument_node="">
</span><li data-dcnode-id="1907"><a data-dcnode-id="1908" href="#chronology"><span data-dcnode-id="1909" instrument_node="">Chronology</span></a></li></ul></div><span data-dcnode-id="1904" instrument_node="">
</span><h4 data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">Introduction </span></h4><span data-dcnode-id="1901" instrument_node="">
</span><p data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">At their Summit in Strasbourg/Kehl in April, 2009, Alliance leaders directed Secretary General Anders Fogh Rasmussen to convene a broadly-based group of qualified experts to prepare the ground for a new NATO Strategic Concept. The Group of Experts, led by its chair Madeleine K. Albright (United States) and vice-chair Jeroen van der Veer (The Netherlands), began work in September 2009. In line with its mandate to encourage an open discussion of NATO’s organisation and purpose, the Group engaged in an extensive series of seminars and consultations with scholars and officials, civilian and military alike, from within and outside the Alliance. The Group, which submitted an interim statement to NATO’s governing body (the North Atlantic Council) on November 24, 2009, presents now its final report. The document includes a summary of findings (Part One) and a more detailed discussion of leading issues (Part Two). The analysis and recommendations are intended to assist the Secretary General in drafting a new Strategic Concept for submission to NATO heads of government at the November 2010 summit in Lisbon.</span></p><span data-dcnode-id="1898" instrument_node="">
</span><p data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">The Group of Experts is grateful to the hundreds of men and women who assisted in its work, including Secretary General Rasmussen and his planning staff (headed by Dr. Jamie Shea), the governments of the Alliance and its partners, seminar hosts and participants, military and civilian advisers, and all who contributed their ideas and thoughts.</span></p><span data-dcnode-id="1895" instrument_node="">
</span><h4 data-dcnode-id="1892"><a data-dcnode-id="1894" id="p1" name="p1"></a><span data-dcnode-id="1893" instrument_node="">Part One: Summary of Findings</span></h4><span data-dcnode-id="1891" instrument_node="">
</span><h5 data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">New Perils, New Resolve</span></h5><span data-dcnode-id="1888" instrument_node="">
</span><p data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">The North Atlantic Treaty Organisation (NATO) enters the second decade of the twenty-first century as an essential source of stability in an uncertain and unpredictable world. Looking ahead, the Alliance has ample grounds for confidence. The democratic principles that initially brought it together remain valid. The Cold War rivalry that once stirred fears of nuclear Armageddon has long since disappeared. NATO’s role in maintaining the unity, security and freedom of the Euro-Atlantic region is ongoing. Its status as the globe’s most successful political-military Alliance is unchallenged. Yet NATO’s past accomplishments provide no guarantee for the future. Between now and 2020, it will be tested by the emergence of new dangers, the many-sided demands of complex operations, and the challenge of organising itself efficiently in an era where rapid responses are vital, versatility critical, and resources tight. </span></p><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">NATO needs a new Strategic Concept because the world has changed significantly since 1999, when the current concept was adopted. Most dramatically, the 9/11 and subsequent attacks demonstrated the deadly connection between technology and terror, triggering a response that has drawn NATO troops far from home, illuminated the need for timely intelligence-sharing, and complicated planning for defence. Further, the global nuclear non-proliferation regime is under increasing stress; incidents of instability along Europe’s periphery have revived historic tensions; innovative modes of gathering, sending and storing information have brought with them new vulnerabilities; the security implications of piracy, energy supply risks and environmental neglect have become more evident; and a worldwide economic crisis has spawned widespread budgetary concerns. Meanwhile, the Alliance has grown to twenty-eight, enlarging both NATO’s capabilities and its commitments. Clearly, the time is right to take a fresh look at the Alliance’s missions, procedures and plans.</span></p><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">The development of a new Strategic Concept provides an opportunity to introduce NATO to populations who know little about it and who may be sceptical about the organisation’s relevance to their lives. Although NATO is busier than it has ever been, its value is less obvious to many than in the past. Alliance leaders must use this opening to highlight NATO’s many contributions to international stability and peace. Otherwise, the organisation could fail to retain the public backing and financial support it must have to perform critical tasks well.</span></p><span data-dcnode-id="1879" instrument_node="">
</span><p data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">The new Strategic Concept must also serve as an invocation of political will or -- to put it another way -- a renewal of vows, on the part of each member. Threats to the interests of the Alliance come from the outside, but the organisation’s vigour could as easily be sapped from within. The increasing complexity of the global political environment has the potential to gnaw away at Alliance cohesion; economic headaches can distract attention from security needs; old rivalries could resurface; and the possibility is real of a damaging imbalance between the military contributions of some members and that of others. NATO states cannot allow twenty-first century dangers to do what past perils could not: divide their leaders and weaken their collective resolve. Thus, the new Strategic Concept must clarify both what NATO should be doing for each Ally and what each Ally should be doing for NATO.</span></p><span data-dcnode-id="1876" instrument_node="">
</span><h5 data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">NATO’s Legacy of Success</span></h5><span data-dcnode-id="1873" instrument_node="">
</span><p data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">The Alliance began work in 1949 when the Cold War was just underway, sharply dividing the democratic West from a communist East. NATO’s purpose, set out in the North Atlantic Treaty, was to protect the freedom and safety of its members. In Article 4, Allies pledged “to consult together whenever, in the opinion of any of them, the territorial integrity, political independence or security of any of the Parties is threatened.” In Article 5, members agreed “that an armed attack against one or more of them in Europe or North America shall be considered an attack against them all.”</span></p><span data-dcnode-id="1870" instrument_node="">
</span><p data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">Until 1989, when the Berlin Wall fell, NATO ensured the unity of the West by defending against possible attack from the communist bloc and by supporting democratic principles against totalitarian ideologies. NATO’s resolve helped to keep the continent at peace and ultimately to facilitate the reunification of Germany and a new beginning for millions of people in Central and Eastern Europe.</span></p><span data-dcnode-id="1867" instrument_node="">
</span><p data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">In the 1990s, NATO’s primary goal (in association with the European Union (EU)) was to consolidate a Europe whole and free. For the first time, it engaged in military action, putting a halt to ethnic cleansing in the Balkans. The Cold War’s end enabled the Alliance to establish partnerships with former adversaries, including Russia, and to admit new members who embraced democratic values and who could contribute to NATO’s collective security. The result was a Europe more democratic, united, and peaceful than it had ever been.</span></p><span data-dcnode-id="1864" instrument_node="">
</span><p data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">The turn of the century brought with it new and varied challenges for the Alliance. In earlier decades, NATO’s defence preparations emphasised the massing of troops to deter or repel a cross-border attack. Today, Alliance members remain concerned about the possibility that regional disputes or efforts at political intimidation could undermine security along its borders. However, NATO must also cope with hazards of a more volatile and less predictable nature -- including acts of terrorism, the proliferation of nuclear and other advanced weapons technologies, cyber attacks directed against modern communications systems, the sabotage of energy pipelines, and the disruption of critical maritime supply routes. Often, an effective defence against these unconventional security threats must begin well beyond the territory of the Alliance. </span></p><span data-dcnode-id="1861" instrument_node="">
</span><p data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">Already, NATO has responded to this new reality by assisting the government of Afghanistan in its fight against violent extremism, combating piracy in the Gulf of Aden, contributing to seaborne security in the Mediterranean, training and equipping Iraqi defence forces, and helping to construct more stable societies in Bosnia-Herzegovina and Kosovo. As this list indicates, shifting defence imperatives bring with them new needs -- for a transformation in military capabilities, a more sophisticated approach to NATO partnerships, more extensive security consultations, and a more streamlined and efficient Alliance structure.</span></p><span data-dcnode-id="1858" instrument_node="">
</span><p data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">A new Strategic Concept must recognise the urgency of further change while remaining true to the founding ideals that bind the Alliance together and that have earned for it a positive international reputation. This calls for a blend of reaffirmation and renovation aimed at creating the optimum mix of old and new.</span></p><span data-dcnode-id="1855" instrument_node="">
</span><h5 data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">An Enduring Foundation</span></h5><span data-dcnode-id="1852" instrument_node="">
</span><p data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">In 1967, a team comparable to today’s Group of Experts was assembled under the leadership of Belgian Foreign Minister Pierre Harmel. The Harmel report observed that “The North Atlantic Treaty area cannot be treated in isolation from the rest of the world.” It also described NATO as an Alliance that is “constantly adapting itself to changing conditions” and that had two core functions: the first to maintain the strength and solidarity required to deter aggression and the second to pursue a more stable long term political environment. Forty-three years later, this description still fits. NATO is an ever-evolving part of an also-evolving international security framework; its mission of self defence has always hinged, in part, on events beyond its borders. The fact that NATO troops are now deployed in distant locations is not a departure from NATO’s fundamental purpose.</span></p><span data-dcnode-id="1849" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">The Strategic Concept adopted in 1999 conformed to the security needs that had arisen during the first decade of the post-Cold War era. The document set forth a host of ideas that ring as true today and that should be reaffirmed in the 2010 Concept. These core building blocks include, but are not limited to, the following:</span></p><span data-dcnode-id="1846" instrument_node="">
</span><ul data-dcnode-id="1821"><span data-dcnode-id="1845" instrument_node="">
</span><li data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">NATO’s central purpose is to safeguard -- by political and military means -- the freedom and security of all its members. </span></li><span data-dcnode-id="1842" instrument_node="">
</span><li data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">The Alliance embodies the transatlantic link by which the security of North America is permanently tied to the security of Europe. </span></li><span data-dcnode-id="1839" instrument_node="">
</span><li data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">the security of all Allies is indivisible: an attack on one is an attack on all. </span></li><span data-dcnode-id="1836" instrument_node="">
</span><li data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">The combined military forces of the Alliance must be able to 1) deter any potential aggression against it and 2) ensure the political independence and territorial integrity of its members. </span></li><span data-dcnode-id="1833" instrument_node="">
</span><li data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">Alliance success depends on the equitable sharing among members of roles, risks and responsibilities, as well as benefits. </span></li><span data-dcnode-id="1830" instrument_node="">
</span><li data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">NATO will make full use of its links to other countries and organisations to help prevent and mitigate crises. </span></li><span data-dcnode-id="1827" instrument_node="">
</span><li data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">The stability, transparency, predictability, lower levels of armaments, and verification which can be provided by arms control and non-proliferation agreements support NATO’s political and military efforts to achieve its strategic objectives. </span></li><span data-dcnode-id="1824" instrument_node="">
</span><li data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">In fulfilling its purpose and fundamental security tasks, the Alliance will continue to respect the legitimate security interests of others, and seek the peaceful resolution of disputes as set out in the Charter of the United Nations.</span></li></ul><span data-dcnode-id="1820" instrument_node="">
</span><p data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">As these assertions signify, the Alliance needs a new Strategic Concept, but it does not require wholesale change. NATO’s fundamental identity, as the organisation that lends muscle and spine to democratic ideals, is constant. However, the NATO of 2020 will not be the same as the NATO of 1950, 1990, or even 2010. As the Alliance matures, it must prepare itself to confront an array of fresh perils. </span></p><span data-dcnode-id="1817" instrument_node="">
</span><h5 data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">Moving Toward NATO 2020</span></h5><span data-dcnode-id="1814" instrument_node="">
</span><p data-dcnode-id="1810"><strong data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Reaffirming NATO’s Core Commitment: Collective Defence.</span></strong><span data-dcnode-id="1811" instrument_node=""> NATO’s core commitment -- embodied in Article 5 of the North Atlantic Treaty -- is unchanged, but the requirements for fulfilling that commitment have shifted in shape. To remain credible, this pledge to shield member states from armed aggression must be backed up not only by basic military capabilities but also by the contingency planning, focused exercises, force readiness, and sound logistics required to preserve the confidence of Allies while minimizing the likelihood of miscalculation on the part of potential adversaries.</span></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1805"><strong data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">Protecting Against Unconventional Threats.</span></strong><span data-dcnode-id="1806" instrument_node=""> Provided NATO stays vigilant, the prospect of direct military attack across the borders of the Alliance is slight, at least for the foreseeable future. We have learned, however, that in our era less conventional threats to the Alliance could arise from afar and still affect security at home. These dangers include attacks involving weapons of mass destruction, terrorist strikes, and efforts to harm society through cyber assaults or the unlawful disruption of critical supply lines. To guard against these threats, which may or may not reach the level of an Article 5 attack, NATO must update its approach to the defence of Alliance territory while also enhancing its ability to prevail in military operations and broader security missions beyond its borders. </span></p><span data-dcnode-id="1804" instrument_node="">
</span><p data-dcnode-id="1800"><strong data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">Establishing Guidelines for Operations Outside Alliance Borders.</span></strong><span data-dcnode-id="1801" instrument_node=""> For all its assets, NATO is by no means the sole answer to every problem affecting international security. NATO is a regional, not a global organisation; its authority and resources are limited and it has no desire to take on missions that other institutions and countries can handle successfully. Accordingly, the new Strategic Concept should prescribe guidelines for NATO as it makes decisions about when and where to apply its resources outside Alliance borders. </span></p><span data-dcnode-id="1799" instrument_node="">
</span><p data-dcnode-id="1795"><strong data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">Creating the Conditions for Success in Afghanistan.</span></strong><span data-dcnode-id="1796" instrument_node=""> NATO’s mission in Afghanistan is the largest ever attempted by the Alliance. Every Ally is contributing to this operation and many have recently increased their participation. NATO countries are also donating generously to the economic and political development of the country. The Alliance is committed to the creation of an Afghanistan that is stable and that does not serve as a platform for international terrorist activity; it should continue working with its partners to achieve this strategically important objective. Looking to the future, the Allied experience in Afghanistan is a rich source of lessons to be learned. Many of the principles that should be featured in the new Strategic Concept are in evidence. These include the requirement for Alliance cohesion, the desirability of unified command, the value of effective planning and public diplomacy, the aptness of a comprehensive civilian/military approach, and the need to deploy forces at a strategic distance for an extended period of time.</span></p><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1790"><strong data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">Consultations to Prevent or Manage Crises.</span></strong><span data-dcnode-id="1791" instrument_node=""> Given the changing character and growing variety of dangers to the security of member states, the Allies should make more creative and regular use of the consultations authorized by Article 4. These consultations, which highlight the Alliance’s function as a political community, can be important both for preventing and managing crises and need not await an imminent Article 5 threat. Indeed, consultations are singularly well-suited to the review of unconventional dangers and to situations that might require an emergency international response. Article 4 provides an opportunity to share information, promote a convergence of views, avoid unpleasant surprises, and clear a path for successful action -- whether that action is of a diplomatic, precautionary, remedial, or coercive nature. </span></p><span data-dcnode-id="1789" instrument_node="">
</span><p data-dcnode-id="1785"><strong data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">A New Era of Partnerships.</span></strong><span data-dcnode-id="1786" instrument_node=""> The new Strategic Concept must recognize that, as NATO moves toward 2020, it will generally not operate alone. Partnerships, in all their diversity, will occupy a central place in the daily work of the Alliance. To make the most of this reality, NATO must strive to clarify and deepen relations with key partners, to establish new relationships where appropriate, to expand the range of partnership activities, and to understand that each partner and partnership must be dealt with on its own terms. </span></p><span data-dcnode-id="1784" instrument_node="">
</span><p data-dcnode-id="1780"><strong data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Participating in a Comprehensive Approach to Complex Problems.</span></strong><span data-dcnode-id="1781" instrument_node=""> Healthy partnerships provide an opening for NATO to pursue solutions to complex problems that affect its security; in most instances, the preferred method will be a comprehensive approach that combines military and civilian elements. NATO is strong and versatile but it is by no means well-suited to every task. Other organisations, national governments and nongovernmental entities can lead the way toward such vital goals as economic reconstruction, political reconciliation, improved governance, and the strengthening of civil society. Depending on the needs in any particular case, NATO may serve as the principal organiser of a collaborative effort, or as a source of specialized assistance, or in some other complementary role. </span></p><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1775"><strong data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">Engaging with Russia.</span></strong><span data-dcnode-id="1776" instrument_node=""> The NATO-Russia partnership was conceived as a means for fostering security in the Euro-Atlantic region; the Alliance remains dedicated to that goal. The principal forum for communication through the Alliance has been the NATO-Russia Council (NRC). This venue -- which has not always been adequately employed -- was designed to provide the means for preventing crises, analyzing events, broaching ideas, and agreeing on joint actions to deal with mutual concerns. Although the Alliance neither poses a military threat to Russia, nor considers Russia a military threat to the Alliance, doubts persist on both sides about the intentions and policies of the other. </span></p><span data-dcnode-id="1774" instrument_node="">
</span><p data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Consistent with the NATO-Russia Founding Act, the new Strategic Concept should reaffirm NATO’s desire to help build a cooperative Euro-Atlantic security order which includes security cooperation with Russia. Bearing this principle in mind, NATO should pursue a policy of engagement with Russia while reassuring all Allies that their security and interests will be defended. To this end, the Alliance should demonstrate its commitment to the NRC (and invite Russia to do the same) by focusing on opportunities for pragmatic collaboration in pursuit of such shared interests as nuclear non-proliferation, arms control, counter-terrorism, missile defence, effective crisis management, peace operations, maritime security, and the fight against trafficking in illegal drugs. </span></p><span data-dcnode-id="1771" instrument_node="">
</span><p data-dcnode-id="1767"><strong data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">Maintaining the Open Door.</span></strong><span data-dcnode-id="1768" instrument_node=""> Since the end of the Cold War, NATO’s membership has expanded from sixteen members to twenty-eight. This open door policy has been an engine of progress towards a Europe whole and free and has contributed much to the collective security of Alliance members. Further enlargement has been under consideration in the western Balkans and with respect to Georgia and Ukraine. Consistent with Article 10 of the North Atlantic Treaty and the principles for enlargement, the process for states that have expressed their desire for membership should move forward as each state fulfils the requirements for membership. It should go without saying that NATO is an entirely voluntary organisation.</span></p><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1762"><strong data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">New Capabilities for a New Era (Military Transformation and Reform).</span></strong><span data-dcnode-id="1763" instrument_node=""> NATO’s military and political commitments will mean little unless matched by capabilities. The Strategic Concept should include a clear statement of defence priorities and be accompanied by an agreed set of essential new or improved capabilities and reforms. NATO forces must have the capacity to defend Alliance territory, undertake demanding missions at strategic distance, contribute to a more secure international environment, and respond to unpredictable contingencies when and where that is required. Thus, there is a continuing need to transform NATO forces from the powerful but static posture of the Cold War into a posture that is more flexible, mobile, and versatile. With resources stretched thin in almost every NATO capital, the Alliance must also make a firm commitment to smarter spending through a variety of efficiency and reform measures. </span></p><span data-dcnode-id="1761" instrument_node="">
</span><p data-dcnode-id="1757"><strong data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Nuclear Weapons Policy: Solidarity in Pursuit of Peace.</span></strong><span data-dcnode-id="1758" instrument_node=""> As long as nuclear weapons exist, NATO should continue to maintain secure and reliable nuclear forces, with widely shared responsibility for deployment and operational support, at the minimum level required by the prevailing security environment. Any change in this policy, including in the geographic distribution of NATO nuclear deployments in Europe, should be made, as with other major decisions, by the Alliance as a whole. </span></p><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">The Strategic Concept should also affirm NATO’s full support for efforts to prevent the proliferation of nuclear weapons, ensure that nuclear materials are handled in a safe and secure manner, and make progress towards a world free from the fear of nuclear war. In this spirit, the Alliance has dramatically curtailed the types and numbers of sub-strategic nuclear forces in Europe and should welcome consultations with Russia in pursuit of increased transparency and further mutual reductions. </span></p><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1749"><strong data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">The New Mission of Missile Defence.</span></strong><span data-dcnode-id="1750" instrument_node=""> Defending against the threat of a possible ballistic missile attack from Iran has given birth to what has become, for NATO, an essential military mission. President Obama’s decision to deploy a phased adaptive missile defence will provide more effective, rapid and reliable coverage than earlier proposals. It also puts missile defence fully within a NATO context, with participation open to all Allies and all Allies to be protected. Missile defence is most effective when it is a joint enterprise and so cooperation throughout the Alliance and between NATO and its partners (especially Russia) is highly desirable. </span></p><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1744"><strong data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">Responding to the Rising Danger of Cyber Attacks.</span></strong><span data-dcnode-id="1745" instrument_node=""> NATO must accelerate efforts to respond to the danger of cyber attacks by protecting its own communications and command systems, helping Allies to improve their ability to prevent and recover from attacks, and developing an array of cyber defence capabilities aimed at effective detection and deterrence.</span></p><span data-dcnode-id="1743" instrument_node="">
</span><p data-dcnode-id="1739"><strong data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Implementing Reforms to Create a More Agile Alliance.</span></strong><span data-dcnode-id="1740" instrument_node=""> The Strategic Concept should authorize and encourage the Secretary General to move ahead with a farreaching agenda of administrative and other reforms aimed at producing an Alliance that is leaner, better able to make timely decisions, and more efficient and cost-effective.</span></p><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1734"><strong data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Telling NATO’s Story.</span></strong><span data-dcnode-id="1735" instrument_node=""> As Allies prepare a new Strategic Concept, they should bear in mind how such a document will be read not only within the Euro-Atlantic community but in every region. NATO populations should be reminded that the Alliance serves their interests through the security it provides; people outside NATO should know that the organisation and its partners are working each day to build a safer world.</span></p><span data-dcnode-id="1733" instrument_node="">
</span><h5 data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Vision and Purpose</span></h5><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">Compared to its first decades, NATO between 2010 and 2020 is likely to appear less often on the centre stage of global affairs. Instead, it will be cast in a variety of roles, sometimes as a leader, at other times in a supporting capacity sharing the spotlight with partners and friends. All the while, it will need to keep a wary eye on dangers that could arise close to home, while maintaining a farsighted focus on how to respond to perils that might emerge at distant locations. For the Alliance of the 1960’s, defence and détente were two sides of the same coin. For NATO 2020, the twin imperative is assured security for all its members and dynamic engagement beyond the treaty area to minimize threats.</span></p><span data-dcnode-id="1727" instrument_node="">
</span><p data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">To succeed, NATO must have the sustained commitment and united effort of its members. A seat at NATO’s table is not an entitlement but an ongoing responsibility that each Ally must meet. Together, the Alliance must summon the resources needed to back its obligations with capabilities so that the full range of threats to its security are not only contained but also defeated or deterred. </span></p><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">Looking to the future, we know that global and regional risks must naturally command NATO’s attention, but that these impermanent worries must never be allowed to define the organisation. In 1949, NATO members came together not because of the forces they feared, but because of their faith in each other and in the democratic values they embraced. In the years since, Allied leaders have learned that their Alliance must constantly adapt to the demands of political and technological change, but they have also learned what must not change. NATO’s Strategic Concept must begin and end with NATO’s founding ideals.</span></p><span data-dcnode-id="1721" instrument_node="">
</span><h4 data-dcnode-id="1718"><a data-dcnode-id="1720" id="p2" name="p2"></a><span data-dcnode-id="1719" instrument_node="">Part Two: Further Analysis and Recommendations</span></h4><span data-dcnode-id="1717" instrument_node="">
</span><h5 data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Chapter 1: The Security Environment</span></h5><span data-dcnode-id="1714" instrument_node="">
</span><h5 data-dcnode-id="1711"><em data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Background</span></em></h5><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Through its policies and actions, NATO has helped to forge for itself a zone of security, peace, and relative prosperity in a world that is more tumultuous and uncertain than when, in 1999, the previous Strategic Concept was adopted. The Alliance remains a cornerstone of stability in the Euro-Atlantic region thanks to its political cohesion, commitment to mutual defence, and wide-ranging capabilities. Over the past two decades, it has successfully integrated twelve new members from Central and Eastern Europe, developed vital new partnerships, and taken on a number of missions that contribute daily to its own security and to that of the world. </span></p><span data-dcnode-id="1707" instrument_node="">
</span><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">It is difficult to offer detailed predictions about the next ten years. This should not be surprising. Even during the relatively rigid conditions of the Cold War, unforeseen events of major geopolitical import took place. In the current day, uncertainty is magnified by such factors as:</span></p><span data-dcnode-id="1704" instrument_node="">
</span><ul data-dcnode-id="1682"><span data-dcnode-id="1703" instrument_node="">
</span><li data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">The proliferation of nuclear and other weapons of mass destruction; </span></li><span data-dcnode-id="1700" instrument_node="">
</span><li data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">The ambitions of international terrorist groups; </span></li><span data-dcnode-id="1697" instrument_node="">
</span><li data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">The persistence of corrosive regional, national, ethnic, and religious rivalries; </span></li><span data-dcnode-id="1694" instrument_node="">
</span><li data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">The world’s increased reliance on potentially vulnerable information systems; </span></li><span data-dcnode-id="1691" instrument_node="">
</span><li data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">The competition for petroleum and other strategic resources (thereby highlighting the importance of maritime security); </span></li><span data-dcnode-id="1688" instrument_node="">
</span><li data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Demographic changes that could aggravate such global problems as poverty, hunger, illegal immigration, and pandemic disease; and </span></li><span data-dcnode-id="1685" instrument_node="">
</span><li data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">The accumulating consequences of environmental degradation, including climate change.</span></li></ul><span data-dcnode-id="1681" instrument_node="">
</span><h5 data-dcnode-id="1678"><em data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Analysis</span></em></h5><span data-dcnode-id="1677" instrument_node="">
</span><p data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Despite the hectic pace and fluidity of modern life, sources of stability do exist. NATO, of course, is one such source but so is the vast network of economic and political connections that link the major world powers. Some of the global institutions that were established in previous decades may be showing signs of age, but they still provide the means for resolving international disputes in harmony with the rule of law. Although the spread of nuclear weapons is a growing worry, prominent international leaders profess their determination to confront it. Emerging global powers such as China, India and Brazil are asserting their rising influence in a peaceful manner. As NATO plans for the hazards of a new decade, it can do so with knowledge that its desire to live in concord with others is widely (if not universally) shared. There should be no question that our future is filled with dangers both known and unknown, but we should neither sell short nor take lightly the foundation for further progress that our predecessors have created.</span></p><span data-dcnode-id="1674" instrument_node="">
</span><p data-dcnode-id="1670"><strong data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Global Trends.</span></strong><span data-dcnode-id="1671" instrument_node=""> Between now and 2020, the international security environment will change in ways both predictable and unforeseen. Certainly, the forces that come under the general heading of globalization can be counted upon to intensify. This will result in a rapid, if uneven, growth in cross-border flows of goods, services, people, technology, ideas, customs, crime, and weapons. This deepening interdependence will bring the world ever closer but not necessarily make populations more inclined to live in peace. Globalization has shown a tendency to empower some while marginalizing others, and has at times heightened the combustible tension between individual and group identity. Although it contributes to a steady rise in shared economic interests between and among countries, globalization provides no sure remedy for international suspicions and rivalry. </span></p><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">From a security standpoint, the most salient aspect of our era is that events in one part of the world are far more likely than in the past to have repercussions elsewhere. Anarchy in one country can create an opportunity for terrorists to find a safe haven from which to operate across any border. A nation that evades global norms and gets away with it creates a precedent that others might follow. A cyber attack that leads to chaos in one city may inspire copy-cat criminals in another. Due to the reach of modern media, even terrorist groups and pirate bands now have public relations specialists and NATO, when and wherever it acts (or fails to act), will do so with a global audience.</span></p><span data-dcnode-id="1666" instrument_node="">
</span><p data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">With the Cold War long since ended, NATO must find its place within a less centralized and more complicated international order. Its new role will be influenced by the emergence of specific threats from a diverse spectrum of possibilities. Such threats may be directed at the territory of Allies or at their citizens, economic lifelines, infrastructure, troops, and even their values. These dangers could come in the form of conventional attacks or provocative statements intended to serve as a means of political blackmail. They could arrive in forms with which we are familiar, or in hybrid variations that combine, for example, the stealth of a terrorist group with the power normally associated with a nation-state -- including purchased or purloined weapons of mass destruction.</span></p><span data-dcnode-id="1663" instrument_node="">
</span><p data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Because of its visibility and power, NATO may well be called upon to respond to challenges that do not directly affect its security but that still matter to its citizens and that will contribute to the Alliance’s international standing. These challenges could include the humanitarian consequences of a failed state, the devastation caused by a natural disaster, or the dangers posed by genocide or other massive violations of human rights.</span></p><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">Less predictable is the possibility that research breakthroughs will transform the technological battlefield. Allies and partners should be alert for potentially disruptive developments in such dynamic areas as information and communications technology, cognitive and biological sciences, robotics, and nanotechnology. The most destructive periods of history tend to be those when the means of aggression have gained the upper hand in the art of waging war.</span></p><span data-dcnode-id="1657" instrument_node="">
</span><p data-dcnode-id="1653"><strong data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Regional Trends.</span></strong><span data-dcnode-id="1654" instrument_node=""> NATO and the EU remain the central pillars of stability and cooperation in the Euro-Atlantic region. This area of the world is hardly free of problems, but the likelihood of military conflict -- whether international or civil -- is relatively low. Lingering grievances do persist in the Caucasus and Balkans, however, and these will demand sustained international attention. Cooperation within the region will also be essential to deal with transnational aggravations that include trafficking in arms, drugs, and humans. Leaders are reminded, as well, of the potential for any part of the world to produce its share of home-grown terrorists.</span></p><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Because of Russia’s size and stature, it will inevitably play a prominent role in shaping the Euro-Atlantic security environment. On the positive side, Russia has shown an increased willingness to support the air and land transport of supplies to NATO forces in Afghanistan, has engaged in productive strategic arms control negotiations with the United States, and has expressed strong opposition to terrorism, piracy, and the further proliferation of nuclear weapons states. Experience teaches, however, that Russian and NATO leaders do not always view the same set of facts in the same way. Leaders in Moscow have expressed concerns about past and prospective NATO enlargement, while Allies have voiced concerns about possible attempts by Russia to engage in acts of political or economic intimidation. This combination of shared interests and strained feelings argues for a policy of active and constructive engagement both on NATO’s part and Russia’s. </span></p><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">The Strategic Concept can be instrumental in unifying the Allies’ views on Russia, clarifying NATO’s intentions towards Moscow, and laying the groundwork for more substantive cooperation. Because Russia’s future policies toward NATO remain difficult to predict, the Allies must pursue the goal of cooperation while also guarding against the possibility that Russia could decide to move in a more adversarial direction.</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Several Central Asian governments have welcomed and supported NATO’s engagement in Afghanistan as a contributor to regional stability. Obviously, the sustained insurgency in that country has implications far beyond its borders, beginning with neighbouring Pakistan -- which faces a serious and possibly growing terrorist threat of its own. The future direction of these two countries will do much to determine whether the danger posed by al-Qa’ida and its allies wanes over time. The evidence to date is that popular support for these terrorist organisations is low but that so, too, is public confidence in governments within the region. Thus, political reform and improved governance could be major contributors to a healthier security climate throughout Central Asia. If these changes do not materialize, the region will pose severe dangers both for those who live in it and for those who do not.</span></p><span data-dcnode-id="1643" instrument_node="">
</span><p data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">In the Middle East, three significant and interrelated trends will continue to affect Alliance security: 1) ongoing extremist violence; 2) simmering Arab-Israeli tensions; and 3) the policies of the government of Iran, including its unwillingness to comply with UN Security Council resolutions related to its nuclear programme. Iran’s efforts to enrich nuclear fuel, develop nuclear weapons designs, and stockpile long-range ballistic missiles could create a major Article 5 threat to the Alliance in this decade. In addition, Iran’s conventional weapons programmes, especially its anti-ship cruise missiles, raise concerns about the security of critical maritime trading routes. Given the abundant international diplomatic activity focused on Iran and the obscurity of Teheran’s intentions, it is unclear whether the difficulties posed by Iran will multiply or diminish in the years ahead. NATO should do all it can to encourage the latter possibility, while preparing itself for the former.</span></p><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">In the Asia-Pacific, the major powers, which include Japan, the Republic of Korea, China, India, and Australia, all view regional stability as in their interests and are generally supportive of international norms. The two primary sources of instability are longstanding -- the rivalry between India and Pakistan, and the dangerous government of the People’s Republic of North Korea (DPRK). The DPRK’s nuclear weapons programme warrants particular attention.</span></p><span data-dcnode-id="1637" instrument_node="">
</span><p data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Africa has made important economic gains in recent years accompanied by considerable progress in dealing with chronic plagues of civil strife, disease, and ineffective government. A number of serious trouble spots remain, however, including most prominently the Democratic Republic of the Congo, Somalia and Sudan. Although leaders in the region are determined to cope with their own problems through the African Union, Allies may receive requests for assistance with respect to peacekeeping missions, counter-terrorism activities, and military training.</span></p><span data-dcnode-id="1634" instrument_node="">
</span><p data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">The area of Latin America and the Caribbean, like North America, has its share of challenges with crime being among the more prominent. The Organization of American States is the principal regional body for both continents. Thus, with the possible exception of a humanitarian emergency, it is hard to foresee direct NATO involvement in this region.</span></p><span data-dcnode-id="1631" instrument_node="">
</span><h5 data-dcnode-id="1628"><em data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Conclusions:</span></em></h5><span data-dcnode-id="1627" instrument_node="">
</span><ul data-dcnode-id="1617"><span data-dcnode-id="1626" instrument_node="">
</span><li data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Conventional military aggression against the Alliance or its members is unlikely but the possibility cannot be ignored. </span></li><span data-dcnode-id="1623" instrument_node="">
</span><li data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">The most probable threats to Allies in the coming decade are unconventional. Three in particular stand out: 1) an attack by ballistic missile (whether or not nuclear-armed); 2) strikes by international terrorist groups; and 3) cyber assaults of varying degrees of severity. A host of other threats also pose a risk, including disruptions to energy and maritime supply lines, the harmful consequences of global climate change, and financial crisis. </span></li><span data-dcnode-id="1620" instrument_node="">
</span><li data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">The danger posed by unconventional threats has obvious implications for NATO preparedness, including its definition of security, its conception of what constitutes an Article 5 attack, its strategy for deterrence, its need for military transformation, its ability to make decisions rapidly, and its reliance for help on countries and organisations from outside the Alliance.</span></li></ul><span data-dcnode-id="1616" instrument_node="">
</span><h5 data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Chapter 2: Core Tasks</span></h5><span data-dcnode-id="1613" instrument_node="">
</span><h5 data-dcnode-id="1610"><em data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">Background</span></em></h5><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">NATO’s overriding purpose, set out in the North Atlantic Treaty, is “to safeguard the freedom, common heritage, and civilisation” of its members. The treaty signatories proposed to achieve this objective by uniting “their efforts for collective defence and for the preservation of peace and security.” These actions have always required that the Alliance perform certain core tasks the nature of which has evolved in keeping with alterations in the international security landscape. In the past two decades, as threats to the Euro-Atlantic region have grown more mobile and diverse, NATO has assumed new and broader missions that could hardly have been foreseen in 1949. However, these missions are fully consistent with the original objective of safeguarding the freedom of Alliance members.</span></p><span data-dcnode-id="1606" instrument_node="">
</span><h5 data-dcnode-id="1603"><em data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Analysis and Recommendations</span></em></h5><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">It is vital that Allies agree on what their core tasks are and on the need to maintain the capabilities required to fulfil them. NATO today is more active than at any previous time, yet its role in providing security is less obvious to many than it was during the Cold War. The new Strategic Concept offers an opportunity for reconciling differences of perspective and for dealing with novel situations. To this end, a fresh iteration of the core tasks of the Alliance is a necessary first step.</span></p><span data-dcnode-id="1599" instrument_node="">
</span><p data-dcnode-id="1596"><strong data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Recommendation:</span></strong></p><span data-dcnode-id="1595" instrument_node="">
</span><ol data-dcnode-id="1591"><span data-dcnode-id="1594" instrument_node="">
</span><li data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">The Group of Experts recommends that the 2010 Strategic Concept should highlight the following quartet of core tasks:</span></li></ol><span data-dcnode-id="1590" instrument_node="">
</span><p data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">First, the Alliance must maintain the ability to deter and defend member states against any threat of aggression. This commitment, embodied in Article 5 of the North Atlantic Treaty, should be reaffirmed in unmistakable terms. At the same time, NATO planners must recognize that the potential sources of Article 5 threats have broadened and now include dangers that could arise either inside or outside the Euro-Atlantic region. NATO must be prepared to defend against (and deter) such threats regardless of their point of origin.</span></p><span data-dcnode-id="1587" instrument_node="">
</span><p data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">There is, of course, nothing ambiguous about a cross border military assault by the combined armed forces of a hostile country. However, there may well be doubts about whether an unconventional danger -- such as a cyber attack or evidence that terrorists are planning a strike -- triggers the collective defence mechanisms of Article 5. In the event, this will have to be determined by the NAC based on the nature, source, scope, and other aspects of the particular security challenge. For the purposes of planning, NATO should assume that serious threats will in fact materialize; preparations for detection, deterrence and response should be calibrated accordingly. These preparations, which should encompass adequate military capabilities, appropriate training exercises, information gathering, and strategic assessments, must correspond to the full range of potential Article 5 threats.</span></p><span data-dcnode-id="1584" instrument_node="">
</span><p data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">NATO’s second core task should be to contribute to the broader security of the entire Euro-Atlantic region. Just as a homeowner has an interest in the safety of his or her neighbourhood, so NATO has reason to be concerned about stability throughout the region of which it is a part. Four decades ago, NATO’s Harmel Report determined that “the ultimate political purpose of the Alliance is to achieve a just and lasting peaceful order in Europe accompanied by appropriate security guarantees.” After the lifting of the Iron Curtain, NATO embraced the goal of building a Europe whole, free, and at peace. Over the past twenty years, leaders from both within and outside the Alliance have made extensive progress towards that objective. The kind of security that Western Europe has enjoyed for the past half century has been extended to Central and Eastern Europe. However, the job of constructing a fully stable order within Europe is not yet complete.</span></p><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">NATO operates as an important pillar of Euro-Atlantic security. In so doing, it functions neither in isolation from other organisations nor as a dominating force. The new Strategic Concept must identify NATO’s appropriate role as a defender of its own interests and as a contributor to peace in every part of the region. The Alliance’s close cooperation in the Balkans with the EU, the UN and the Organisation for Security and Co-operation in Europe (OSCE) is a prime example of how NATO can collaborate with other institutions in order to advance the wellbeing of people throughout the continent.</span></p><span data-dcnode-id="1578" instrument_node="">
</span><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">A number of elements come together in the performance of this core task, including NATO’s partnerships with countries and organisations, and its support for -- and adherence to -- the principles that provide a framework for how governments in the region should act toward one another and toward their own citizens. These principles, which can be traced back to the Helsinki Accords (1975), find their present form in the Charter for European Security signed in Istanbul (1999). NATO also contributes to stability through its open door policy, which has provided important incentives within Europe for democracy, the peaceful settlement of disputes, and respect for human rights. In addition, NATO’s diplomatic efforts with Russia, Ukraine, Georgia and the other countries of the Caucasus, and other nonmember states show that nations do not have to be part of the Alliance to join with NATO on projects that benefit all.</span></p><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">NATO’s third core task is to serve as a transatlantic means for security consultations and crisis management along the entire continuum of issues facing the Alliance. As the only contractual link between North America and Europe, NATO remains the essential venue for these functions and for fulfilling the common security and defence commitments of its members. This task reflects both the political and military dimensions of the Alliance and merits more attention in light of the diversity of today’s security threats and the wide-ranging perspective of the organisation’s current membership. After all, when the last Strategic Concept was written, the Alliance had far fewer members with shorelines on the Adriatic, Black and Baltic Seas.</span></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">The Alliance has an interest in protecting global lifelines that sustain modern societies and in promoting security and stability well beyond its immediate borders. That mission will in all likelihood be carried out in cooperation with its partners. Even though NATO’s military tools are not always perfectly suited to address such challenges, Article 4 can provide a vital mechanism for identifying areas of common concern, devising an appropriate response, and coordinating NATO actions with partner organisations and states. To this end, the Alliance must further improve its crisis management capabilities, including the capacity to identify and to assess emerging risks, reassure member states, and undertake crisis response operations within, along, or beyond its borders.</span></p><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Finally, as will become evident in the next chapter, the Group of Experts believes that enhancing the scope and management of partnerships has grown sufficiently important that it should be categorized as NATO’s fourth core task, even though it represents less an end in itself than the means by which vital goals may be accomplished.</span></p><span data-dcnode-id="1566" instrument_node="">
</span><h5 data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Chapter 3: Partnerships</span></h5><span data-dcnode-id="1563" instrument_node="">
</span><h5 data-dcnode-id="1560"><em data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Background</span></em></h5><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">The passing years have created the need for a NATO of greater flexibility and reach, causing the Alliance to turn more often to partners for help in responding to threats and in making the most effective use of its resources. Productive relationships with other countries and organisations enable NATO to be more vigilant, better prepared, and smarter in what it does. Although NATO’s formal partnership arrangements began in Europe, they have since spread to encompass the Mediterranean and Middle East. In addition, some countries participate in NATO missions but do not fall within a formal partnership structure; these are categorized as operational partners.</span></p><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">In future missions, as now in Afghanistan, the Alliance may well function as one part of a broad network of security providers in which various international actors combine to take a comprehensive approach to the solution of a particular problem. This conception of teamwork should not be misunderstood. Some have interpreted the reference to “comprehensive” as a desire on NATO’s part to assert a dominant global position or to put civilian organisations under military control. This is not the case: the comprehensive approach is not about hierarchy but about recognising that security has military, political, economic and social dimensions. It follows, therefore, that building security will often require working with an effective mix of partners to piece together the diverse elements of a single shared strategy. Depending on the specific circumstances, NATO will play either a leading or a complementary role. (Chapter five includes recommendations for improving NATO’s capacity to contribute to a comprehensive approach.)</span></p><span data-dcnode-id="1553" instrument_node="">
</span><h5 data-dcnode-id="1550"><em data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Analysis and Recommendations</span></em></h5><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">NATO’s first round of partnerships was aimed primarily at facilitating the entry of new members into the Alliance. A dozen new Allies later, that function has begun to diminish as other purposes have increased. A second generation of partnerships focused on adding capabilities for missions in such places as the Balkans and Afghanistan. A shift in thinking is needed now to obtain the maximum value from NATO’s increasingly diverse and vital array of ties to organisations and governments. In this context, the NAC’s recent decision to establish a single committee to manage all partnerships is a welcome one. The new Strategic Concept can help to guide that panel by recognizing that Alliance partnerships have diverse origins, serve varied purposes, and respond to different expectations. Each must be dealt with on its own terms; however, all have the potential to increase in value through continued adaptation and appropriate change.</span></p><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1543"><strong data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">Recommendation:</span></strong></p><span data-dcnode-id="1542" instrument_node="">
</span><ol data-dcnode-id="1522"><span data-dcnode-id="1541" instrument_node="">
</span><li data-dcnode-id="1523"><span data-dcnode-id="1540" instrument_node="">While strengthening organisational partnerships, NATO should examine whether its arrangements with countries and groups of countries can be improved by one or more of the following means: 
</span><ul data-dcnode-id="1524"><span data-dcnode-id="1539" instrument_node="">
</span><li data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Drafting a new or revised overall partnership agreement; </span></li><span data-dcnode-id="1536" instrument_node="">
</span><li data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">Expanding the list of partnership activities; </span></li><span data-dcnode-id="1533" instrument_node="">
</span><li data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">Allowing for greater differentiation among partners in their relationships with NATO; </span></li><span data-dcnode-id="1530" instrument_node="">
</span><li data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Introducing new agenda items, especially those that might lead to operational or diplomatic cooperation on specific projects; and </span></li><span data-dcnode-id="1527" instrument_node="">
</span><li data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Modifying procedures in order to encourage the freest possible exchange of ideas</span></li></ul></li></ol><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Before recommending such measures, NATO should consult closely with all of the partners involved. </span></p><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1514"><strong data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">The Partnership for Peace (PfP) and the Euro-Atlantic Partnership Council (EAPC).</span></strong><span data-dcnode-id="1515" instrument_node=""> The PfP and the EAPC provide the framework for NATO’s cooperation with partners in Europe and Eurasia. The former, established in 1994, has been the principal means for forging security links, while the EAPC was created several years later to provide a parallel political dialogue. Although the PfP is widely judged a success, the EAPC has not been used to its fullest potential. The Council was designed to enable NATO to conduct consultations with partner countries on political and security issues, but many participants complain that EAPC discussions are overly stilted and formal. </span></p><span data-dcnode-id="1513" instrument_node="">
</span><p data-dcnode-id="1510"><strong data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Recommendation:</span></strong></p><span data-dcnode-id="1509" instrument_node="">
</span><ol data-dcnode-id="1505"><span data-dcnode-id="1508" instrument_node="">
</span><li data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">NATO should strengthen routine and crisis consultations with EAPC partners as provided for under Paragraph 8 of the PfP framework document.</span></li></ol><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1500"><strong data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Partnership with the EU.</span></strong><span data-dcnode-id="1501" instrument_node=""> The EU is a unique and essential partner to NATO. The two institutions have a largely overlapping membership, and these common member states have only one set of forces and one set of taxpayers. Although NATO and the EU have devised detailed mechanisms for cooperation, these have not always worked as well as hoped. Still, expertise and capabilities that countries develop for the EU are frequently employed in NATO missions and vice versa. By definition, the 24 members have shared interests and so work side-by-side in virtually every theatre in which NATO operates. Looking to the past, the two institutions have learned many of the same lessons; looking to the future, they see a common set of problems.</span></p><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Full complementarity between NATO and the EU will be essential if the Allies are to forge a comprehensive and cost-effective approach to security when both are involved in a stabilisation mission. Better cooperation can also be helpful in addressing unconventional threats such as terrorism, cyber-attacks, and energy vulnerabilities. The EU will often have more relevant expertise than NATO in countering the non-military aspects of such dangers, even though the line between military and non-military threats is becoming blurred. It should be noted, however, that full complementarity is only possible if non-EU NATO members and non-NATO EU members are accorded the same degree of transparency and involvement when joint activities are conducted.</span></p><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1493"><strong data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Recommendations:</span></strong></p><span data-dcnode-id="1492" instrument_node="">
</span><ol data-dcnode-id="1482"><span data-dcnode-id="1491" instrument_node="">
</span><li data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">The new Strategic Concept should recognise that the EU’s Treaty of Lisbon is designed, among other purposes, to strengthen Europe’s military capabilities and command structures. Allies should welcome this development and use the Strategic Concept to affirm NATO’s desire for a truly comprehensive partnership with the EU, one that is cost-effective, that is based on the principle of reciprocity and that encompasses the entire range of the institutions’ mutual activities. </span></li><span data-dcnode-id="1488" instrument_node="">
</span><li data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">In its contacts with the EU, NATO leaders should avoid the trap of categorising all threats and responsibilities as distinctly “military” or “non-military.” Instead, they should nurture the habit of thinking of these issues as developing along a continuum. Many situations will require a response that includes both forceful and non-coercive elements; NATO, the EU, and others should bring to bear the capabilities that add the most value in finding a solution. Accordingly, NATO should seek to agree with EU leaders on a plan for regular joint participation in meetings, fuller communications between military staffs, and more extensive coordination with respect to crisis management, threat assessments, and sharing assets. </span></li><span data-dcnode-id="1485" instrument_node="">
</span><li data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">NATO and EU leaders should do everything possible to prevent disagreements from interfering with effective cooperation between the two organisations.</span></li></ol><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1477"><strong data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Partnership with the UN.</span></strong><span data-dcnode-id="1478" instrument_node=""> NATO’s partnership with the UN is also a central one due to the role played by that body within the world system and by the Allies’ pledge of faith (invoked in the preamble to the North Atlantic Treaty) “in the purposes and principles of the Charter of the United Nations.” The Security Council’s mandate -- to safeguard international security and peace -- meshes well with the commitment of NATO members to “unite their efforts for collective defence and for the preservation of peace and security.” It is clearly in NATO’s interests to support the UN and to help strengthen its capacity to perform the many missions assigned to it by the global community.</span></p><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">NATO and the UN have worked together in a number of conflict zones, with the Alliance providing operational support and security so that the UN can move ahead on reconstruction, development, and governance-building. Although their partnership dates back more than a decade -- and while NATO and the UN signed a framework agreement in 2008 which has improved practical cooperation in some cases -- problems remain. UN personnel have been disappointed, on occasion, with the level of security and support that NATO provides. NATO tends to wait until a mission begins before starting to coordinate with the UN. When in theatre, the two institutions sometimes engage in disputes over their respective responsibilities.</span></p><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1470"><strong data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Recommendations:</span></strong></p><span data-dcnode-id="1469" instrument_node="">
</span><ol data-dcnode-id="1453"><span data-dcnode-id="1468" instrument_node="">
</span><li data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">In a world of global threats, security depends increasingly on a rule-based international order. One of NATO’s priorities, therefore, should be to strengthen the ability of the United Nations to fulfil its responsibilities. </span></li><span data-dcnode-id="1465" instrument_node="">
</span><li data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">When NATO and the UN are both operating in an area, the Alliance should do its best, if requested, to provide security for UN civilian personnel. Without a minimum level of security, the UN (and other NATO partners) will be unable to operate; without partners, NATO is often unable to meet its objectives. The earlier the need for coordination is identified, the quicker joint planning can be done and the more likely it is that a mutually satisfactory security arrangement can be established. </span></li><span data-dcnode-id="1462" instrument_node="">
</span><li data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">NATO and the UN should improve their institutional links. A NATO liaison office at the UN would allow Alliance leaders to engage more easily with the Secretariat and with UN members. Additional forms of cooperation should be explored including participation in each other’s training and exercise activities. </span></li><span data-dcnode-id="1459" instrument_node="">
</span><li data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Coordination between the UN and NATO can prove crucial in the event of genocide, other massive violations of human rights, or humanitarian emergency. The Strategic Concept should make clear that NATO is willing to consider requests from the UN to take appropriate action in such circumstances (possibly in support of other regional organisations), provided the NAC agrees to the mission and resources are available to carry it out. </span></li><span data-dcnode-id="1456" instrument_node="">
</span><li data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">NATO should work with the UN to respond positively to Security Council Resolution 1325, concerning the role of women in security and peace.</span></li></ol><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1448"><strong data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Partnership with the OSCE.</span></strong><span data-dcnode-id="1449" instrument_node=""> NATO’s relationship with the OSCE is different and more intimate than it is with most other international organisations. NATO was a co-founder of the original Helsinki Process and played a significant role in lending substance to the OSCE’s politico-military dimension. The OSCE, in turn, is busy building democratic institutions in countries that do or may aspire to NATO membership, thus reinforcing NATO’s own desire to encourage political stability and good governance in every corner of Europe. </span></p><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1444"><strong data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Recommendations:</span></strong></p><span data-dcnode-id="1443" instrument_node="">
</span><ol data-dcnode-id="1433"><span data-dcnode-id="1442" instrument_node="">
</span><li data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">NATO should make full use of the OSCE’s toolbox of training resources and expert advice in “soft security;” these are areas that can complement NATO’s “hard security” tools. </span></li><span data-dcnode-id="1439" instrument_node="">
</span><li data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">The Alliance should actively pursue, under the framework of the OSCE, the negotiation of conventional arms control and confidence-building measures. </span></li><span data-dcnode-id="1436" instrument_node="">
</span><li data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">The Allies should also reflect on how the OSCE, a community rooted in democratic values and freely accepted commitments, can complement NATO’s own partnerships in building understanding of and support for the Alliance’s activities.</span></li></ol><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1428"><strong data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Partnership with Russia. </span></strong><span data-dcnode-id="1429" instrument_node="">On the list of NATO partners, Russia is in its own category. The framework for partnership was spelled out in the 1997 Founding Act and the 2002 Declaration signed in Rome. Both documents express a commitment to identify and to pursue opportunities for joint action based on mutual interests and the understanding that security in the Euro-Atlantic region is indivisible. Cooperation is pledged in, among other areas, counter-terrorism, crisis management, arms control and non-proliferation, theatre missile defence, and responding to new threats. The NATO-Russia Council (NRC) provides the forum for consultation, transparency, consensus-building, and making and implementing decisions. </span></p><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">NATO members, when asked, may vary in their descriptions of Russia while still seeing eye to eye on their prescriptions for engagement with that country. For reasons of history, geography, and recent events, some countries are more sceptical than others about the Russian government’s commitment to a positive relationship. The fact that the NRC was not used to prevent the 2008 crisis in Georgia is unsettling, as is Moscow’s oft-expressed wariness about NATO’s intentions. Russia has sent conflicting signals about its openness to further cooperation with NATO, and its proposals for an alternative security order in Europe seem designed in part to constrain NATO’s activities.</span></p><span data-dcnode-id="1424" instrument_node="">
