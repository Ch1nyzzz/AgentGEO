</span><p data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Although NATO members view Russia from diverse perspectives, the Alliance is united in its desire to engage with the leaders of that country in order to prevent harmful misunderstandings and to identify and to pursue shared goals. The Alliance does not consider any country to be its enemy; however, no one should doubt NATO’s resolve if the security of any of its member states were to be threatened.</span></p><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">The fact that NATO is a defensive Alliance and that Russia’s 2010 military doctrine is characterized by its authors as “strictly defensive” in nature provides a good starting point for cooperation. So, too, does the NATO-Russia joint commitment, expressed in the Founding Act, to create “in Europe a common space of security and stability, without dividing lines and spheres of influence limiting the sovereignty of any state.”</span></p><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1415"><strong data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Recommendations:</span></strong></p><span data-dcnode-id="1414" instrument_node="">
</span><ol data-dcnode-id="1404"><span data-dcnode-id="1413" instrument_node="">
</span><li data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">The new Strategic Concept should endorse a policy that combines reassurance for all Alliance members and constructive re-engagement with Russia. </span></li><span data-dcnode-id="1410" instrument_node="">
</span><li data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">The Strategic Concept should underscore NATO’s desire for a qualitatively better relationship with Russia based on shared interests, mutual confidence, transparency and predictability. From the Alliance’s perspective, the door to cooperation at all levels is and will remain open. </span></li><span data-dcnode-id="1407" instrument_node="">
</span><li data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">The Allies should work with Russia to ensure an agenda for the NRC that responds in a frank and forward-looking way to the security concerns of both sides, and that identifies specific areas for joint action. The currently ongoing assessment of common threats and challenges is a helpful step. The two sides should also strive to enhance cooperation under the 2008 NRC Action Plan on Terrorism and to coordinate with other regional organisations.</span></li></ol><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1399"><strong data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Partnership with Georgia and Ukraine.</span></strong><span data-dcnode-id="1400" instrument_node=""> Georgia and Ukraine have tailored partnership structures in the form of the NATO-Ukraine and NATO-Georgia Commissions. Channels of communication are excellent and both countries have contributed as partners to NATO missions. For geographic reasons, the two are touched by issues of longstanding regional concern including ethnic disputes and energy insecurity. One of the major failures of NATO’s partnership structure was the 2008 conflict between Russia and Georgia, in which two Alliance partners engaged in hostilities over issues that remain unresolved.</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1395"><strong data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Recommendations:</span></strong></p><span data-dcnode-id="1394" instrument_node="">
</span><ol data-dcnode-id="1387"><span data-dcnode-id="1393" instrument_node="">
</span><li data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">The Allies should make regular use of the NATO-Ukraine and NATO-Georgia commissions to discuss mutual security concerns and to foster practical cooperation, including on defence reforms. The clearer NATO articulates its position to the partners and the more accurately it can assess their perceptions, the more adept the Allies will be at defusing crises and building trust. </span></li><span data-dcnode-id="1390" instrument_node="">
</span><li data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">The Allies should also employ NATO’s crisis management mechanisms, in association with the partnership commissions, to assess and monitor security developments affecting these two countries.</span></li></ol><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1382"><strong data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">NATO’s Partnerships in the Mediterranean and Middle East.</span></strong><span data-dcnode-id="1383" instrument_node=""> The area encompassing North Africa and the Middle East has long been among the globe’s most strategically important regions. Its future development will affect NATO’s interests in nuclear non-proliferation, counter-terrorism, energy security and a peaceful international order. In light of these interests, the Alliance is engaged in this vast and varied region through the Mediterranean Dialogue (MD) and the more recent Istanbul Cooperation Initiative (ICI). </span></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1377"><em data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Mediterranean Dialogue.</span></em><span data-dcnode-id="1378" instrument_node=""> Begun in 1994, the MD includes seven nations from the Mediterranean region. The Dialogue provides a framework for confidence building, transparency and cooperation. Although it is the only functioning region-wide security initiative, its accomplishments to date are modest. The Dialogue lacks a founding document of the type developed for other NATO partnerships. Potential areas of common interest include weapons proliferation and missile defence. The present MD formula remains workable, but should be flexible enough to allow any country that desires to deepen its partnership with NATO to do so. </span></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">NATO is strongly supportive of efforts to negotiate a just and lasting peace between Israelis and Palestinians, but does not play an active diplomatic role. The Alliance has, however, expressed a willingness to assist in implementing an agreement should one be reached, provided that is requested by the parties and authorized by the UN Security Council.</span></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1369"><em data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Istanbul Cooperation Initiative.</span></em><span data-dcnode-id="1370" instrument_node=""> The ICI, launched in 2004, aims to contribute to long term global and regional security by offering countries in the broader Middle East bilateral security cooperation with NATO. The initiative is open to all countries in the region who support its goals, including the fight against terrorism and the proliferation of weapons of mass destruction. Although potentially valuable, the ICI has been held back by a lack of common strategic vision and by rivalries among the partners and some Allies. Nonetheless, like the MD, the ICI is helping to build needed security relationships and to open channels for regular dialogue. Each partnership is also an instrument for changing perceptions, which is helpful because populations in the region are not always fully or fairly informed about either NATO or the West more generally.</span></p><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1365"><strong data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">Recommendations:</span></strong></p><span data-dcnode-id="1364" instrument_node="">
</span><ol data-dcnode-id="1354"><span data-dcnode-id="1363" instrument_node="">
</span><li data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">NATO should approach its relations with countries in the Mediterranean and Middle East with strategic patience. The MD and ICI are still relatively new and the political discussion and practical cooperation they provide can enhancemutual understanding, contribute to stability, and improve NATO’s image in the region. One way to increase the mutual value of the MD and ICI to the Alliance might be to pursue an agreed statement of shared interests based on new and broader concepts of security, taking into account conventional and unconventional dangers, as well as political, economic, social and cultural issues. </span></li><span data-dcnode-id="1360" instrument_node="">
</span><li data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">The Allies should be open to transparent consultations with its MD and ICI partners on the implications of a possible nuclear breakout by Iran. </span></li><span data-dcnode-id="1357" instrument_node="">
</span><li data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">NATO should be ready to assist in implementing a peace agreement between Israel and the Palestinians consistent with the conditions that have been established</span></li></ol><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1349"><strong data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Partners Across the Globe.</span></strong><span data-dcnode-id="1350" instrument_node=""> NATO now has important operational partners from outside the Euro-Atlantic area, some of whom have been key contributors to Allied missions. Australia, in fact, contributes more troops to Afghanistan than half the NATO Allies, New Zealand is also a significant contributor, the Republic of Korea has pledged to deploy a sizable contingent, and Japan has committed billions of dollars to the reconstruction efforts there. These democracies are not only partners of need, but also partners of values -- even though they do not participate within a formal framework for dialogue such as that provided by the EAPC. Afghanistan and Pakistan, whose cooperation is crucial to the success of the International Security Assistance Force (ISAF) are also outside any formal structure for dialogue with NATO.</span></p><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">NATO does not necessarily require a formal partnership in order to maintain a productive working dialogue with other countries and organisations. It does need to maintain an active diplomatic presence in order to take advantage of opportunities for collaboration when they arise. For example, the People’s Republic of China has participated alongside units from Allied countries in the course of UN peace operations and in anti-piracy patrols around the Gulf of Aden. Countries in Central and South Asia have a major stake in maintaining stability in their region. Members of the Collective Security Treaty Organisation and the Shanghai Cooperation Organisation have shown an interest in working cooperatively with other multinational entities. India, Indonesia, and the leading democracies of Africa and Latin America share with NATO a commitment to global peace and the rule of law</span></p><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1342"><strong data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Recommendations:</span></strong></p><span data-dcnode-id="1341" instrument_node="">
</span><ol data-dcnode-id="1331"><span data-dcnode-id="1340" instrument_node="">
</span><li data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">NATO should do more to deepen its partnerships with countries outside the Euro-Atlantic region by expanding the list of shared activities while preserving the ability of individual partners to form tailored co-operative relationships with the Alliance. </span></li><span data-dcnode-id="1337" instrument_node="">
</span><li data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">The Allies agreed in Istanbul in 2004 to expand the access of operational partners to information and planning and has since made some progress in this regard. The Strategic Concept should go further and outline ways to give NATO’s operational partners a regular and meaningful voice in shaping strategy and decisions on missions to which they contribute. </span></li><span data-dcnode-id="1334" instrument_node="">
</span><li data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">NATO should explore the possibility of new regional subgroups if there is interest among countries in doing so. Another, and perhaps preferable, alternative is for NATO to forge more formal ties to such bodies as the African Union, the Organization of American States, the Gulf Cooperation Council, the Shanghai Cooperation Organisation, or the Collective Security Treaty Organisation. Any such relationship should be based on the principles of equality, mutual trust, and mutual benefit.</span></li></ol><span data-dcnode-id="1330" instrument_node="">
</span><h5 data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Chapter 4: Political and Organisational Issues</span></h5><span data-dcnode-id="1327" instrument_node="">
</span><h5 data-dcnode-id="1324"><em data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">Background</span></em></h5><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Since 1999, the Alliance has almost doubled in size, confronted a number of new dangers, engaged in operations more distant and complex than any previously attempted, lived through a severe international economic crisis, and established political dialogues and partnerships that extend far beyond the Euro-Atlantic region. Not surprisingly, these rapid changes have been accompanied by considerable internal strain. The new Strategic Concept allows the Alliance to take stock of recent events and to search for a fresh consensus on issues that are central to the future management and direction of the organisation. These issues include:</span></p><span data-dcnode-id="1320" instrument_node="">
</span><ul data-dcnode-id="1301"><span data-dcnode-id="1319" instrument_node="">
</span><li data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Lessons of Afghanistan </span></li><span data-dcnode-id="1316" instrument_node="">
</span><li data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Guidelines for missions outside Alliance borders </span></li><span data-dcnode-id="1313" instrument_node="">
</span><li data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Administrative reforms </span></li><span data-dcnode-id="1310" instrument_node="">
</span><li data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Decision-making procedures </span></li><span data-dcnode-id="1307" instrument_node="">
</span><li data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Open Door Policy </span></li><span data-dcnode-id="1304" instrument_node="">
</span><li data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">NATO’s role in conventional arms control</span></li></ul><span data-dcnode-id="1300" instrument_node="">
</span><h5 data-dcnode-id="1297"><em data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Analysis and Recommendations</span></em></h5><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1292"><strong data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">Lessons of Afghanistan.</span></strong><span data-dcnode-id="1293" instrument_node=""> NATO assumed leadership of ISAF in August 2003. Since then, the operation has grown from 5000 to roughly 100,000 troops, coming from forty-six countries, including all NATO members. Its mission is to assist the Afghan Government in exercising and extending its authority for the purpose of stabilizing the country and fostering peaceful reconstruction and development. To these ends, it carries out military operations and helps to train and assist the Afghan National Army and Police. Although ISAF has achieved much, its experience has led to concerns within the Alliance about unity of command, restrictions (or caveats) placed on the troops contributed by some Allies, and questions about tactics and goals. The mission has also suffered setbacks due to incidents involving civilian casualties, which NATO commanders have pledged to minimize.</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">ISAF is, because of its size and duration, an extraordinary operation. It was also unanticipated. In light of the complex and unpredictable security climate likely to prevail through the coming decade, it is not possible to rule out NATO’s future participation in similar (although hopefully less extended) stabilisation missions. The experience in Afghanistan thus provides for NATO a valuable list of lessons learned. Many of the principles that should be included in the new Strategic Concept are present. Most obvious is the importance of being able to deploy military units tailored to specific and sustained operations at a distance from Alliance borders. Other lessons include:</span></p><span data-dcnode-id="1288" instrument_node="">
</span><ul data-dcnode-id="1272"><span data-dcnode-id="1287" instrument_node="">
</span><li data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">To the maximum feasible extent, NATO’s military forces should operate under a unified chain of command. </span></li><span data-dcnode-id="1284" instrument_node="">
</span><li data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Allies should minimize the national caveats that they attach when contributing troops to Alliance operations; any caveats that are imposed should be clearly and explicitly stated and their impact carefully evaluated during force generation and operational planning. </span></li><span data-dcnode-id="1281" instrument_node="">
</span><li data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">NATO’s mission in Afghanistan has been damaged in the past by its failure to communicate its intentions clearly and by incidents and accidents involving civilian casualties. Recent restrictions on close air support and artillery fire implemented by the ISAF Commander are helping to reduce this problem, but the need to shield civilians must continue to be stressed in training and in the field. </span></li><span data-dcnode-id="1278" instrument_node="">
</span><li data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Prisoners and detainees should be treated in accordance with the principles of international law. Any other policy leads to unfavourable political consequences, loss of moral credibility, harm to Alliance cohesion, and increased danger to NATO forces. </span></li><span data-dcnode-id="1275" instrument_node="">
</span><li data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Stability in Afghanistan will not come through military means alone. As in other counter-insurgency situations, a primary objective is to create a comprehensive civilian-military approach that enables the local governing structure to earn the trust and loyalty of the local population. For NATO, this requires the ability to work closely with partner organisations to align priorities and to make the best possible use of available resources. It also places a premium on helping host nation security forces to improve their own ability to maintain order and to protect non-combatants from harm.</span></li></ul><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1267"><strong data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Guidelines for Missions Outside Alliance Borders.</span></strong><span data-dcnode-id="1268" instrument_node=""> For all its assets, NATO is by no means the sole answer to every problem affecting international security. NATO is a regional, not a global organisation; its financial resources are limited and subject to other priorities; and it has no desire to take on missions that other institutions and countries can be counted upon to handle. Accordingly, the new Strategic Concept should prescribe guidelines for the Alliance as it makes decisions about when and where to apply resources beyond its borders. Because every situation is unique, NATO decision-making can only be made on a case-by-case basis. However, deliberations within the NAC should give weight to such factors as:</span></p><span data-dcnode-id="1266" instrument_node="">
</span><ul data-dcnode-id="1241"><span data-dcnode-id="1265" instrument_node="">
</span><li data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">the extent and imminence of danger to Alliance members; </span></li><span data-dcnode-id="1262" instrument_node="">
</span><li data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">the exhaustion or apparent ineffectiveness of alternative steps; </span></li><span data-dcnode-id="1259" instrument_node="">
</span><li data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">the ability and willingness of NATO members to provide the means required for success; </span></li><span data-dcnode-id="1256" instrument_node="">
</span><li data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">the involvement of partners in helping to ensure an effective and timely remedy to the problem at hand; </span></li><span data-dcnode-id="1253" instrument_node="">
</span><li data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">the collateral impact on other NATO missions and needs; </span></li><span data-dcnode-id="1250" instrument_node="">
</span><li data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">the degree of domestic and international public support; </span></li><span data-dcnode-id="1247" instrument_node="">
</span><li data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">conformity with international law; and </span></li><span data-dcnode-id="1244" instrument_node="">
</span><li data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">the foreseeable consequences of inaction.</span></li></ul><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">In the future as in the past, NATO leaders should bear in mind two cautions: NATO’s commitments should never exceed what the Alliance can do; but what NATO can do should never be outpaced by NATO’s security needs. The Alliance cannot be so ambitious that it takes on jobs that it is unprepared to perform, but neither can it be so lethargic that it fails to prepare itself for necessary tasks.</span></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Accordingly, the Strategic Concept should include a clear statement of defence priorities. These begin with the ability to defend Alliance territory, but include the capacity to undertake demanding missions at strategic distance, help shape the international security landscape, and respond to unpredictable contingencies when and where that is required. NATO’s official Level of Ambition was set out in 2006; there is no need to modify those benchmarks, although the definition of mission could be broadened to include new requirements for homeland security, including cyber security.</span></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">It is a truism that NATO cannot succeed without the support of its members. Similarly, NATO missions will not go well for long unless they are understood and embraced by the populations of NATO countries. Such backing cannot be taken for granted. The more open NATO leaders are in their deliberations, and the more clearly they explain the specific goals and rationale for NATO participation in any operation, the more likely it is that the Alliance will be able to attract the level of popular and parliamentary support it must have to fulfil its missions.</span></p><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1228"><strong data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Recommendations:</span></strong></p><span data-dcnode-id="1227" instrument_node="">
</span><ol data-dcnode-id="1217"><span data-dcnode-id="1226" instrument_node="">
</span><li data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">The Strategic Concept should include a set of guidelines for informing NATO decision-making with respect to undertaking new missions or responsibilities. </span></li><span data-dcnode-id="1223" instrument_node="">
</span><li data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">NATO should maintain a level of preparedness and operational tempo that responds to the security needs of its members, thus avoiding the danger of over-reach on one extreme and complacency on the other. </span></li><span data-dcnode-id="1220" instrument_node="">
</span><li data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Through transparency and effective public communications, the Alliance must strive to attract and maintain public and legislative backing for its operations.</span></li></ol><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1212"><strong data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Administrative Reforms. </span></strong><span data-dcnode-id="1213" instrument_node="">As NATO has grown, so has its structure, including the number of its committees, the size of its staff, and the cost of doing routine business. The Secretary General has identified internal reform as a priority and Allies have given him a clear mandate to act.</span></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1208"><strong data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Recommendations:</span></strong></p><span data-dcnode-id="1207" instrument_node="">
</span><ol data-dcnode-id="1197"><span data-dcnode-id="1206" instrument_node="">
</span><li data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">The Strategic Concept should endorse a far-reaching agenda of reforms. This agenda should include -- but not be restricted to -- streamlining the international Secretariat, reviewing financial rules, reducing headquarters operating costs, and shrinking the number of committees and agencies.</span></li><span data-dcnode-id="1203" instrument_node="">
</span><li data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">The Secretary General should have added authority to implement his reform agenda.</span></li><span data-dcnode-id="1200" instrument_node="">
</span><li data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">The Allies should establish quantitative targets for savings in various categories of administrative costs and should ensure that savings realized through the reform process are reinvested in NATO’s readiness and operational capabilities.</span></li></ol><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1192"><strong data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Decision-making procedures.</span></strong><span data-dcnode-id="1193" instrument_node=""> There is an inherent tension between a multimember organisation that works by consensus and a military/political Alliance operating in a fluid and fast-paced security environment. This tension has not been diminished by NATO’s larger membership or by the proliferation of its committees. In 2009, the Secretary General put forward some initial ideas for streamlining the decision-making process. The challenge for Alliance leaders will be to identify further steps that do not, in themselves, become a source of division. The consensus rule has always been a fundamental principle in NATO and Allies are strongly attached to its preservation. However, the need to achieve agreement among twenty-eight states (and more in the future) can prove arduous, sometimes leading to delays that serve no constructive purpose. In addition, the Alliance needs to prepare for situations where rapid (indeed almost instantaneous) decision-making may be required.</span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1188"><strong data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Recommendations:</span></strong></p><span data-dcnode-id="1187" instrument_node="">
</span><ol data-dcnode-id="1180"><span data-dcnode-id="1186" instrument_node="">
</span><li data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">In his proposals for administrative reform, the Secretary General is encouraged to include further proposals for streamlining the decision-making process. These proposals should: 1) recognize that any departure from the consensus principle must be approved by the NAC; 2) preserve the consensus rule for the most important decisions such as those involving Article 5 commitments, budgets, new missions, or new members; 3) identify means on less vital questions for Allies to register concerns short of a veto; and 4) establish the principle that the implementation of decisions arrived at by consensus should not be delayed by efforts to review those decisions at lower levels before they are carried out. </span></li><span data-dcnode-id="1183" instrument_node="">
</span><li data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">The Alliance should consider giving the Secretary General or NATO military leaders certain pre-delegated authorities, based on agreed rules of engagement, to respond in an emergency situation such as a missile or cyber attack.</span></li></ol><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1175"><strong data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Open Door Policy.</span></strong><span data-dcnode-id="1176" instrument_node=""> Since its founding in 1949, NATO has increased in size from a dozen members to twenty-eight. This open door policy was authorized by Article 10 of the North Atlantic Treaty which provides that the “Parties may, by unanimous agreement, invite any other European State in a position to further the principles of this Treaty and to contribute to the security of the North Atlantic area to accede” to membership in the Alliance. Since 1995, the process of enlargement has been guided by certain principles, including the following:</span></p><span data-dcnode-id="1174" instrument_node="">
</span><ul data-dcnode-id="1155"><span data-dcnode-id="1173" instrument_node="">
</span><li data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Democratic values and full support for NATO’s political vision within the candidate country; </span></li><span data-dcnode-id="1170" instrument_node="">
</span><li data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">The implementation of any necessary military reforms in order to achieve NATO standards with respect to professionalism and to ensure civilian control over the armed forces; </span></li><span data-dcnode-id="1167" instrument_node="">
</span><li data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">The fair treatment of minority populations; </span></li><span data-dcnode-id="1164" instrument_node="">
</span><li data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">The peaceful resolution of domestic and international disputes; </span></li><span data-dcnode-id="1161" instrument_node="">
</span><li data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Domestic political support for NATO membership; and </span></li><span data-dcnode-id="1158" instrument_node="">
</span><li data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">The overall ability of the candidate to contribute to the security of the Alliance and the Euro-Atlantic region.</span></li></ul><span data-dcnode-id="1154" instrument_node="">
</span><p data-dcnode-id="1151"><strong data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Recommendation:</span></strong></p><span data-dcnode-id="1150" instrument_node="">
</span><ol data-dcnode-id="1146"><span data-dcnode-id="1149" instrument_node="">
</span><li data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">The new Strategic Concept should reaffirm NATO’s open door policy, including the principles listed above.</span></li></ol><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1141"><strong data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">NATO’s role in conventional arms control policy.</span></strong><span data-dcnode-id="1142" instrument_node=""> NATO members have a major stake in arms control, but the Alliance as an entity has only a limited formal role. In the past, it has debated developments with a particular impact on European security, such as the Intermediate-Range Nuclear Forces Treaty of 1987 (even though actual negotiations were conducted bilaterally between the United States and the Soviet Union). More significantly, the Allies were directly involved in negotiating and signing the 1990 Treaty on Conventional Armed Forces in Europe (CFE). </span></p><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">In recent years, the CFE process has stalled and is now in danger of crumbling. This is regrettable because the CFE has led in the past to the destruction of tens of thousands of tanks, armoured vehicles, and artillery pieces, while increasing predictability and transparency throughout the region. </span></p><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1134"><strong data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Recommendation:</span></strong></p><span data-dcnode-id="1133" instrument_node="">
</span><ol data-dcnode-id="1129"><span data-dcnode-id="1132" instrument_node="">
</span><li data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">The Strategic Concept should underline NATO’s commitment to a robust and stabilizing conventional arms control regime in Europe, based on the principles of mutual transparency, restraint, and host-nation consent for the stationing of foreign forces. With this goal in mind, the Alliance should support the revival of the CFE process and express a willingness to engage in constructive dialogue with all CFE states. </span></li></ol><span data-dcnode-id="1128" instrument_node="">
</span><h5 data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Chapter 5: Alliance Forces and Capabilities</span></h5><span data-dcnode-id="1125" instrument_node="">
</span><h5 data-dcnode-id="1122"><em data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Background</span></em></h5><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">NATO’s 1999 Strategic Concept included a section on “Guidelines for the Alliance’s Forces” which established goals for transforming capabilities to meet the challenges of a new century. The document called for a well-trained and equipped force and command structure able to provide collective defence, respond rapidly to emergencies, and engage in complex joint operations beyond Allied territory. At the same summit in Washington, leaders approved a separate Defence Capabilities Initiative (DCI) to address five broad NATO force needs: 1) Mobility and Deployability, 2) Sustainability and Logistics, 3) Effective Engagement, 4) Survivability, and 5) Interoperable Communications. Although necessary and timely, the DCI also proved to be too broad in focus. Over the next decade, subsequent capabilities initiatives and summit declarations provided additional guidance to NATO members and defence planners.</span></p><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1114"><strong data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">Guidance in the past decade.</span></strong><span data-dcnode-id="1115" instrument_node=""> At its 2002 summit in Prague, Allies began to adapt to the changed security situation generated by the 9/11 attacks and to the prospect of helping to restore stability to Afghanistan. The Alliance approved a plan to augment the DCI by developing improved capabilities in eight defence categories, established Allied Command Transformation (ACT) to steer the development of those capabilities, and created a NATO Response Force (NRF) to “move [forces] quickly to wherever needed.”</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">At the Riga summit in 2006, Alliance leaders adopted the Comprehensive Political Guidance (CPG), which set out the framework and priorities for all Alliance capability issues, planning disciplines, and intelligence for the foreseeable future. Among its requirements was that NATO members develop national land forces that were at least 40 percent deployable and 8 percent deployable on a sustainable basis. (These targets were later raised to 50 percent and 10 percent.)</span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">In 2009, at the Strasbourg-Kehl summit, NATO agreed to a “Declaration of Alliance Security,” which emphasised implementation of the CPG and envisioned a multinational headquarters for special operations forces.</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1103"><strong data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Military transformation: a work in progress.</span></strong><span data-dcnode-id="1104" instrument_node=""> The results of these initiatives and summit directives have been mixed. Due in the main to limited resources, NATO’s military forces have moved only slowly to pursue agreed guidelines. Thus, a significant distance still separates potential missions and available capabilities. Much of the progress that has taken place towards military transformation has been driven by operational requirements in Kosovo and Afghanistan. ISAF operations in particular have underlined the need for forces that are deployable and sustainable, for common approaches to counter-insurgency operations, and for interoperable command, control, communications, computers, intelligence, surveillance and reconnaissance (C4ISR) capabilities.</span></p><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">The primary limiting factor hindering military transformation has been the lack of European defence spending and investment. Today, only six of twenty-six European Allies spend 2 percent or more of GDP on these purposes; only about a dozen have met goals for making military forces deployable and sustainable. The Alliance benchmark of 20 percent of military spending allocated to investment has been achieved by less than half of NATO nations (though the trend is slowly improving). The gap is especially large between U.S. capabilities and the rest of NATO, an imbalance that if left unchecked could undermine Alliance cohesion. Contributing to the problem is the fact that, in the past twenty years, European defence spending has been consumed disproportionately by personnel and operational costs. As a result, European national forces generally do not have nearly enough transformed forces.</span></p><span data-dcnode-id="1099" instrument_node="">
</span><h5 data-dcnode-id="1096"><em data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Analysis and Recommendations</span></em></h5><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">The new Strategic Concept should provide direction for the further transformation of NATO’s defence capabilities. Given the nature of the modern security environment and constraints on fiscal resources, NATO will need a flexible, deployable, networked, and sustainable military force posture that can meet the full range of Alliance responsibilities at an affordable cost. These responsibilities include the deterrence of aggression, the defence of Alliance territory, undertaking demanding missions at strategic distance, and preparing for a wide range of lesser contingencies. The new Strategic Concept should update the guidelines established in the 1999 Concept and be accompanied by an agreed set of priority capabilities and military reforms to be endorsed by Alliance leaders at the Lisbon Summit. </span></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1088"><strong data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">NATO’s Military Missions.</span></strong><span data-dcnode-id="1089" instrument_node=""> In the coming decade, NATO will have four central interrelated military missions; these missions will complement the core tasks outlined in Chapter Two. They are:</span></p><span data-dcnode-id="1087" instrument_node="">
</span><ul data-dcnode-id="1074"><span data-dcnode-id="1086" instrument_node="">
</span><li data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Deter, prevent and defend against any threat of aggression in order to ensure the political independence and territorial integrity of every NATO member in accordance with Article 5 of the North Atlantic Treaty. </span></li><span data-dcnode-id="1083" instrument_node="">
</span><li data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Cooperate with partners and civilian institutions to protect the treaty area against a full range of unconventional security challenges. </span></li><span data-dcnode-id="1080" instrument_node="">
</span><li data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Deploy and sustain expeditionary capabilities for military operations beyond the treaty area when required to prevent an attack on the treaty area or to protect the legal rights and other vital interests of Alliance members. </span></li><span data-dcnode-id="1077" instrument_node="">
</span><li data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Help to shape a more stable and peaceful international security environment by enhancing partner interoperability, providing military and police training, coordinating military assistance, and cooperating with the governments of key countries. </span></li></ul><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1069"><strong data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Conventional Defence Capabilities.</span></strong><span data-dcnode-id="1070" instrument_node=""> If NATO is to fulfil these four missions successfully, it must halt the precipitous decline in national defence spending, implement new reforms and efficiencies, and set priorities for future capabilities. Important steps need to be taken at the Lisbon summit on all three counts. The Secretary General has already undertaken significant reform efforts; these are well worthy of encouragement and support. In addition, prior to Lisbon, clear priorities for capabilities requirements need to be prepared for approval by Alliance leaders. Defence priorities include those related to Article 5 needs and to the goal of military transformation. </span></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1065"><strong data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Recommendation:</span></strong></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">1. The new Strategic Concept should address, in addition to other priorities, the following conventional defence needs:</span></p><span data-dcnode-id="1061" instrument_node="">
</span><ul data-dcnode-id="1015"><span data-dcnode-id="1060" instrument_node="">
</span><li data-dcnode-id="1056"><em data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Provide reassurance on Article 5 commitment.</span></em><span data-dcnode-id="1057" instrument_node=""> Assuring Allies with regard to Article 5 requires refreshing and maintaining essential skills and capabilities. The Alliance has developed adequate military readiness criteria to meet Article 5 commitments but it should do more to guarantee its readiness in practice. This will require better contingency planning, preparations for crisis management, equipment assessments, and appropriate military exercises. Such exercises should not be provocative, should be announced in advance, and should be open to observers from neighbouring countries. </span></li><span data-dcnode-id="1055" instrument_node="">
</span><li data-dcnode-id="1051"><em data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Achieve deployability and sustainability goals.</span></em><span data-dcnode-id="1052" instrument_node=""> Forces offered to NATO by members or partners for any mission within or beyond NATO territory should be both deployable and sustainable. To this end, Allies should restructure more of their forces away from traditional fixed territorial defence missions. Deployability also requires strategic lift, which is in short supply, although the C-17 consortium is a step in the right direction. Creating a NATO Deployment Agency is an idea that has merit and should be explored. Such an agency could take responsibility for consolidating all aspects of Alliance preparations for rapid deployment. </span></li><span data-dcnode-id="1050" instrument_node="">
</span><li data-dcnode-id="1046"><em data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Broaden the role of the NATO Response Force.</span></em><span data-dcnode-id="1047" instrument_node=""> The NRF should be prepared to undertake Article 5 as well as non-Article 5 missions and should be a central participant when Article 5 exercises are conducted. </span></li><span data-dcnode-id="1045" instrument_node="">
</span><li data-dcnode-id="1041"><em data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Capitalize on commonality between Article 5 and expeditionary missions.</span></em><span data-dcnode-id="1042" instrument_node=""> NATO needs to be prepared for both Article 5 and non-Article 5 missions. To achieve both goals efficiently, it should review the two mission sets -- which are neither entirely identical nor wholly different -- for areas of commonality. The core similarity is that both missions require well-prepared forces and support assets. The core difference is that a major combat operation in Europe against a serious adversary is inherently different from involvement by an expeditionary force in a stabilisation operation in a distant state. To be ready for both, NATO must take full advantage of overlaps between the two. </span></li><span data-dcnode-id="1040" instrument_node="">
</span><li data-dcnode-id="1036"><em data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Understand C4ISR as NATO’s operational glue.</span></em><span data-dcnode-id="1037" instrument_node=""> C4ISR capabilities provide the operational sinew binding NATO and national forces together into an interoperable, agile, and cohesive whole. They should be a high priority for future investment by members as well as by NATO itself. Allies should invest first in compliance with the latest NATO CIS architectures and ISR platform standards. Likewise, NATO should ensure the same architectural standards are met and maintained across its command structure. Allies and partners should emphasise investment in national systems at the tactical and operational levels that will tie into NATO’s strategic-operational networks. </span></li><span data-dcnode-id="1035" instrument_node="">
</span><li data-dcnode-id="1031"><em data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Strengthen Special Operations Forces (SOF) capabilities.</span></em><span data-dcnode-id="1032" instrument_node=""> Much has already been done to bring together the SOF capabilities of members and partners, including the establishment of the NATO Special Operations Headquarters. This body is developing common training and doctrine as well as enhancing intelligence sharing. More can be done to sharpen NATO’s ability to make use of these expeditionary capabilities. In keeping with the Strasbourg-Kehl Summit Declaration, the NAC should consider designating NATO Special Operations Headquarters as a full component command. </span></li><span data-dcnode-id="1030" instrument_node="">
</span><li data-dcnode-id="1026"><em data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Upgrade Allied Command Transformation. </span></em><span data-dcnode-id="1027" instrument_node="">ACT needs a bolder mandate, greater authorities, and more resources. It should champion the development of both transformational capabilities and new efficiency measures. It should also take full charge of NATO lessons learned, doctrine, training and education programmes. </span></li><span data-dcnode-id="1025" instrument_node="">
</span><li data-dcnode-id="1021"><em data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Transform NATO Education and Training.</span></em><span data-dcnode-id="1022" instrument_node=""> Led by ACT, NATO should exploit the information revolution by establishing a process of continual learning for military and civilian personnel. People are NATO’s foremost asset and up-to-date knowledge is an essential attribute for its people. Modern educational tools, including distance learning, exchanges, and emergency simulations can burnish operational and strategic skills. To the extent possible, these programmes should include personnel from partner countries and organisations. </span></li><span data-dcnode-id="1020" instrument_node="">
</span><li data-dcnode-id="1016"><em data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Enhance maritime situational awareness.</span></em><span data-dcnode-id="1017" instrument_node=""> A new level of secure maritime situational awareness is called for by changing risks around the periphery of NATO and in the High North, Gulf, Indian Ocean and other areas. NATO should harmonize investments in such surveillance platforms as unmanned aerial vehicles, maritime patrol aircraft, land-based radars, surface and subsurface vessels, and robotic systems. NATO should also agree on specific surveillance mission areas that underpin Article 5, such as those related to illegal attacks on shipping, WMD proliferation and terrorist activities.</span></li></ul><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1010"><strong data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Reforms and efficiencies.</span></strong><span data-dcnode-id="1011" instrument_node=""> If NATO is to keep pace with evolving threats, it must improve its capabilities more rapidly than it has. The challenge of catching up is aggravated by a less than favourable economic climate. The best and most realistic way to close the gap is through a commitment to efficiency measures and other reforms. The economic and military logic behind such reforms is clear, yet nations may still be reluctant to undertake them. Leadership is required.</span></p><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1006"><strong data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Recommendation:</span></strong></p><span data-dcnode-id="1005" instrument_node="">
</span><ol data-dcnode-id="973"><span data-dcnode-id="1004" instrument_node="">
</span><li data-dcnode-id="974"><span data-dcnode-id="1003" instrument_node="">A balanced package of reform and efficiency proposals should be developed by the Secretary General in time for presentation to the heads of government at the Lisbon summit. As part of this package, NATO should encourage: 
</span><ul data-dcnode-id="975"><span data-dcnode-id="1002" instrument_node="">
</span><li data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">new, truly multinational formations with unified command and control, interdependent logistics and integrated civilian-military components; </span></li><span data-dcnode-id="999" instrument_node="">
</span><li data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">new informal pooling arrangements, especially for lift; </span></li><span data-dcnode-id="996" instrument_node="">
</span><li data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">increased NATO common funding and interoperability for C4ISR; </span></li><span data-dcnode-id="993" instrument_node="">
</span><li data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">common approaches to logistics; </span></li><span data-dcnode-id="990" instrument_node="">
</span><li data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">the further evolution and coordination of national specialisation and niche capabilities; </span></li><span data-dcnode-id="987" instrument_node="">
</span><li data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">exploration of opportunities for additional multinational procurement programs; </span></li><span data-dcnode-id="984" instrument_node="">
</span><li data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">development of a NATO/EU defence capabilities agency; </span></li><span data-dcnode-id="981" instrument_node="">
</span><li data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">using common funds for costs related to selected deployments, including an annual exercise of the NRF; and </span></li><span data-dcnode-id="978" instrument_node="">
</span><li data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">a further review of NATO’s command structure for the purpose of reducing costs and enhancing force flexibility and deployability.</span></li></ul></li></ol><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="968"><strong data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Comprehensive approach. </span></strong><span data-dcnode-id="969" instrument_node="">Several years after the concept of a comprehensive approach was widely accepted as the best means for responding to complex security challenges, NATO efforts to operate with civilian partners remain disjointed. As noted earlier, such an approach often requires NATO to act in partnership with other organisations, whether in a leading or a supportive role. The Alliance’s 2006 CPG describes NATO’s approach to conflicts as “the coherent and comprehensive application of the various instruments of the Alliance to create overall effects that will achieve the desired outcome.” The CPG also states that NATO has “no requirement to develop capabilities strictly for civilian purposes,” relying instead on its partners. Although true in theory, this logic has not always proven out in practice. Effective military-civilian relationships require a good deal of hard work. Military and civilian personnel tend to plan differently, set different priorities, establish different standards of accountability, recruit and deploy personnel differently, and often even speak the same language in ways that one has trouble understanding the other. In fact, NATO today does not work as well as it should -- indeed, as it must -- with civilian organisations. The Strategic Concept must address this shortcoming, while also encouraging each Ally to improve the ability of its military to work with civilian partners.</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="964"><strong data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Recommendations:</span></strong></p><span data-dcnode-id="963" instrument_node="">
</span><ol data-dcnode-id="947"><span data-dcnode-id="962" instrument_node="">
</span><li data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">NATO at all levels should prepare to be part of integrated civilian-military missions. This requires establishing a small civilian planning unit within NATO to maintain points of contact, share information, and engage in joint planning with partner countries and organisations. </span></li><span data-dcnode-id="959" instrument_node="">
</span><li data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">NATO should maintain up-to-date memoranda of understanding with such key institutions as the UN, the EU and the OSCE, as well as other national and regional bodies and major NGOs. </span></li><span data-dcnode-id="956" instrument_node="">
</span><li data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">NATO’s Defence Planning Process should identify civilian capabilities -- whether NATO or non-NATO -- to be deployed along with initial combat forces for immediate post-conflict stability operations. </span></li><span data-dcnode-id="953" instrument_node="">
</span><li data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">NATO should ask member states to identify a cadre of civilian specialists with experience in complex operations who would be available for rapid deployment for selected missions if qualified personnel from partner countries or institutions are not. These civilian reservists should be prepared through NATO training to move into an area in the wake of conflict and to work with local authorities and combat forces for a limited period of time in order to provide security and other public services. </span></li><span data-dcnode-id="950" instrument_node="">
</span><li data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">NATO should strive on a systematic basis to help potential partners improve their ability to contain and respond to crisis situations; this can be done through -- among other means -- training, material assistance, and strategic assessments aimed at early warning and prevention.</span></li></ol><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="942"><strong data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Nuclear Weapons and Arms Control.</span></strong><span data-dcnode-id="943" instrument_node=""> NATO relies upon a mixture of conventional and nuclear weapons for the purpose of deterring an armed attack. Changes in threats to the Alliance have broadened the concept of deterrence and allowed NATO to dramatically reduce the types, numbers and roles of its nuclear forces. At the same time, global leaders -- including many from Allied nations -- have expressed a desire to move toward a world free from the threat posed by nuclear arms. Looking ahead, the Alliance should be prepared for in-depth consultations on the future role of nuclear weapons in its deterrence strategy. Some parameters for those consultations, which will take place against the backdrop of the larger global nuclear debate, are suggested below:</span></p><span data-dcnode-id="941" instrument_node="">
</span><ul data-dcnode-id="916"><span data-dcnode-id="940" instrument_node="">
</span><li data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">As long as nuclear weapons remain a reality in international relations, the Alliance should retain a nuclear component to its deterrent strategy -- at the minimum level required by the prevailing security environment. </span></li><span data-dcnode-id="937" instrument_node="">
</span><li data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Under current security conditions, the retention of some U.S. forward-deployed systems on European soil reinforces the principle of extended nuclear deterrence and collective defence. </span></li><span data-dcnode-id="934" instrument_node="">
</span><li data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Broad participation of the non-nuclear Allies is an essential sign of transatlantic solidarity and risk sharing. Participation by the non-nuclear states can take place in the form of nuclear deployments on their territory or by non-nuclear support measures. </span></li><span data-dcnode-id="931" instrument_node="">
</span><li data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">NATO should continue to ensure the absolute physical security of nuclear weapons stored on European soil. </span></li><span data-dcnode-id="928" instrument_node="">
</span><li data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">There should be an ongoing NATO dialogue with Russia on nuclear perceptions, concepts, doctrines, and transparency. These talks should help set the stage for the further reduction and possible eventual elimination of the entire class of sub-strategic nuclear weapons. </span></li><span data-dcnode-id="925" instrument_node="">
</span><li data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">NATO should re-establish the Special Consultative Group on Arms Control for the purpose of facilitating its own internal dialogue about the whole range of issues related to nuclear doctrine, new arms control initiatives, and proliferation. </span></li><span data-dcnode-id="922" instrument_node="">
</span><li data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">NATO should make clear its full support for efforts to prevent the proliferation of nuclear weapons, to reduce further the prominence of nuclear arms in the defence doctrines of any country, and to ensure that nuclear materials are handled in a safe and secure manner. </span></li><span data-dcnode-id="919" instrument_node="">
</span><li data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">NATO should endorse a policy of not using or threatening to use nuclear weapons against non-nuclear states that are party to the Nuclear Non- Proliferation Treaty and in compliance with their nuclear non-proliferation obligations. </span></li></ul><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="912"><strong data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Recommendation:</span></strong></p><span data-dcnode-id="911" instrument_node="">
</span><ol data-dcnode-id="904"><span data-dcnode-id="910" instrument_node="">
</span><li data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">As long as nuclear weapons exist, NATO should continue to maintain secure and reliable nuclear forces, with widely shared responsibility for deployment and operational support, at the minimum level required by the prevailing security environment. Any change in this policy, including in the geographic distribution of NATO nuclear deployments in Europe, should be made, as with other major decisions, by the Alliance as a whole. </span></li><span data-dcnode-id="907" instrument_node="">
</span><li data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">NATO should invite an ongoing dialogue with Russia on nuclear perceptions, concepts, doctrines, and transparency, and should convene a Special Consultative Group in order to inform and coordinate its internal dialogue about nuclear-related issues.</span></li></ol><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="899"><strong data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Ballistic missile defence.</span></strong><span data-dcnode-id="900" instrument_node=""> The Alliance should have a fuller role in dealing with the emerging ballistic missile threat. The new U.S. phased, adaptive approach to ballistic missile defence provides an opportunity for the development of an effective NATOwide strategy that would add to the defence of populations as well as forces. The U.S. systems to be deployed will be much more effective against the ballistic missile threat to Europe from the Gulf than those previously envisioned. They are not directed against Russia, nor would they threaten Russia’s nuclear deterrent. A NATO missile defence system would enhance deterrence and transatlantic sharing of responsibility, reinforce the principle that security is indivisible, and allow for concrete security cooperation with Russia. </span></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="895"><strong data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Recommendation:</span></strong></p><span data-dcnode-id="894" instrument_node="">
</span><ol data-dcnode-id="890"><span data-dcnode-id="893" instrument_node="">
</span><li data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">NATO should recognize territorial missile defence as an essential mission of the Alliance. To that end, NATO should agree to expand its Active Layered Theatre Ballistic Missile Defence System to provide the core command and control capability of a NATO territorial missile defence system.</span></li></ol><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="885"><strong data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Responding to Unconventional Dangers.</span></strong><span data-dcnode-id="886" instrument_node=""> Throughout the Group’s investigation, NATO’s response to terrorism, cyber vulnerabilities, energy security, and climate change was discussed. Some new capabilities may be needed.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="880"><em data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Strengthening NATO’s role in fighting terrorism.</span></em><span data-dcnode-id="881" instrument_node=""> NATO’s military forces are playing a vital role in the fight against violent extremism in Afghanistan. Within the treaty area, however, counter-terrorism is primarily the responsibility of police and other domestic agencies. Nonetheless, the Alliance can play a supporting part through the protection of vital military facilities, sharing intelligence, and providing assistance, when asked, in consequence management. It is worth recalling, for example, that NATO aircraft flew AWACS patrols over the United States for seven months following the 9/11 attacks. In 2004, the Alliance established a Defence Against Terrorism Programme that was designed to develop new technologies to protect troops and civilians against such dangers as improvised explosive devices, suicide bombs and anti-aircraft rocket strikes.</span></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="876"><strong data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Recommendation:</span></strong></p><span data-dcnode-id="875" instrument_node="">
</span><ol data-dcnode-id="871"><span data-dcnode-id="874" instrument_node="">
</span><li data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">NATO’s Defence Against Terrorism Programme should expand from its current focus on ten areas of technology-related work to include, among other subjects, collaborative research on investigative techniques, deterrence, and social networking.</span></li></ol><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="866"><em data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Cyber defence capabilities. </span></em><span data-dcnode-id="867" instrument_node="">The next significant attack on the Alliance may well come down a fibre optic cable. Already, cyber attacks against NATO systems occur frequently, but most often below the threshold of political concern. However, the risk of a large-scale attack on NATO’s command and control systems or energy grids could readily warrant consultations under Article 4 and could possibly lead to collective defence measures under Article 5. Effective cyber defence requires the means to prevent, detect, respond to, and recover from attacks. NATO has taken steps to develop these capabilities through creation of a Cyber Defence Management Authority, a Cooperative Cyber Defence Centre of Excellence, and a Computer Incident Response Capability. Nonetheless, there persist serious gaps in NATO’s cyber defence capabilities. The Strategic Concept should place a high priority on addressing these vulnerabilities, which are both unacceptable and increasingly dangerous.</span></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="862"><strong data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Recommendation:</span></strong></p><span data-dcnode-id="861" instrument_node="">
</span><ol data-dcnode-id="841"><span data-dcnode-id="860" instrument_node="">
</span><li data-dcnode-id="842"><span data-dcnode-id="859" instrument_node="">NATO should recognize that cyber attacks are a growing threat to the security of the Alliance and its members. Accordingly: 
</span><ul data-dcnode-id="843"><span data-dcnode-id="858" instrument_node="">
</span><li data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">A major effort should be undertaken to increase the monitoring of NATO’s critical network and to assess and furnish remedies to any vulnerabilities that are identified. </span></li><span data-dcnode-id="855" instrument_node="">
</span><li data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">The Centre of Excellence should do more, through training, to help members improve their cyber defence programmes. </span></li><span data-dcnode-id="852" instrument_node="">
</span><li data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Allies should expand early warning capabilities in the form of a NATO-wide network of monitoring nodes and sensors. </span></li><span data-dcnode-id="849" instrument_node="">
</span><li data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">The Alliance should be prepared to send an expert team to any member experiencing or threatened by a major cyber attack. </span></li><span data-dcnode-id="846" instrument_node="">
</span><li data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Over time, NATO should plan to mount a fully adequate array of cyber defence capabilities, including passive and active elements.</span></li></ul></li></ol><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="836"><em data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Energy security.</span></em><span data-dcnode-id="837" instrument_node=""> Access to sufficient supplies of energy is a requirement for any modern state. However, most countries are dependent, to one degree or another, on external energy sources and on the means for delivering needed supplies via pipelines or shipping. Any substantial or sudden interruption of supplies to an Ally would be of concern, especially if the interruption were caused by the sabotage of energy infrastructure or by unlawful interference with maritime commerce. Such an occurrence, if prolonged, could lead to consultations under Article 4 of the North Atlantic Treaty and to a determination by the Allies of an appropriate response.</span></p><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">As a general matter, energy policy is a domestic issue, with the EU and the International Energy Agency offering services at the multinational level related to potential energy supply disruptions. NATO, however, has an obligation to protect its own energy reserves in order to ensure the capability of its forces. Also, in 2008 the Alliance agreed at the Bucharest Summit to take a number of additional steps pertaining to energy security, including the sharing of intelligence, support for the protection of critical infrastructure, and support for an expanded dialogue with energy supplier countries.</span></p><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="829"><strong data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Recommendation:</span></strong></p><span data-dcnode-id="828" instrument_node="">
</span><ol data-dcnode-id="824"><span data-dcnode-id="827" instrument_node="">
</span><li data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">The potential for major energy supply disruptions should figure prominently in NATO’s strategic assessment and contingency planning activities. Thought should be given in advance to how the Alliance might work with partners in an emergency situation to mitigate harm to its members and to find alternative sources of supply.</span></li></ol><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="819"><em data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Climate change.</span></em><span data-dcnode-id="820" instrument_node=""> As an Alliance, NATO does not have a formal role in regulating the greenhouse gas emissions that experts believe lead to global warming. NATO could, however, be called upon to help cope with security challenges stemming from such consequences of climate change as a melting polar ice cap or an increase in catastrophic storms and other natural disasters. The Alliance should keep this possibility in mind when preparing for future contingencies.</span></p><span data-dcnode-id="818" instrument_node="">
</span><h5 data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Chapter 6: Conclusion</span></h5><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">The process of developing a new Strategic Concept should provide a timely reminder to all that NATO serves unique and indispensable functions. Without NATO during the Cold War, the Euro-Atlantic region would have entered the twenty-first century deprived of freedom in its East and with no common strategy in its West; the world would still be hostage to a superpower rivalry, with nuclear annihilation a single miscalculation away.</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Without NATO in the 1990s, the newly-freed states of Central and East Europe would have lacked a powerful incentive to embrace democracy internally and to mend fences with external rivals. Meanwhile, the Balkans would have remained a cauldron of ethnic bitterness, ruled by the sword, and split asunder by the memory of past conflicts.</span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">If NATO did not exist today, Afghanistan might once again be ruled by the Taliban, providing a safe haven for al-Qa’ida, allowing terrorists to train and to plan their attacks systematically and without fear. Euro-Atlantic states would lack an effective community forum for responding to traditional threats and emerging perils. </span></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Without NATO in the future, the prospects for international stability and peace would be far more uncertain than they are. The Alliance is not alone in its commitment to these objectives, but its combination of military capability and political solidarity make it both singularly valuable and irreplaceable. </span></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">NATO thrives as a source of hope because, from the very beginning, its members have described their common agenda in a positive fashion: to enhance international security, safeguard liberty, and promote the rule of law. These objectives are neither tied to any calendar nor diminished by any advance in technology. They do not depend on any particular adversary. They are enduring needs and will survive as long as NATO has the courage to defend them through the unity of its members, the bravery of its citizens, and the free expression of its collective will.</span></p><span data-dcnode-id="800" instrument_node="">
</span><h4 data-dcnode-id="797"><a data-dcnode-id="799" id="members" name="members"></a><span data-dcnode-id="798" instrument_node="">Members of the NATO Group of Experts</span></h4><span data-dcnode-id="796" instrument_node="">

</span><h4 data-dcnode-id="688"><a data-dcnode-id="690" id="military" name="military"></a><span data-dcnode-id="689" instrument_node="">Military Advice</span></h4><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Throughout the course of its work, the Group of Experts has benefited from regular meetings with the NATO Military Authorities. The Group of Experts wishes to thank Admiral Giampaolo Di Paola, Chairman of the Military Committee; Admiral James G. Stavridis, Supreme Allied Commander Europe; and General Stéphane Abrial, Supreme Allied Commander Transformation; for their invaluable advice and counsel.</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">The Group of Experts also invited several former senior NATO commanders to participate in Strategic Concept seminars or to offer informal military advice. The Group appreciates the insights provided by General George A. Joulwan, former Supreme Allied Commander, Europe; General Klaus Naumann, former Chairman of the Military Committee; Admiral John R. Anderson, former Chief of Defence Staff, Canada; General Bantz Craddock, Former Supreme Allied Commander, Europe; General Raymond Henault, former Chairman of the Military Committee; Admiral Willy Herteleer, former Chief of Defense Staff, Belgium; General Sergiu Medar, former Director of Military Intelligence, Romania; Lt.Gen. Yilmaz Oğuz, former Military Representative to NATO, Turkey; General Sir John Reith, Former Deputy Supreme Allied Commander, Europe; and General Sir Rupert Smith, former Deputy Supreme Allied Commander, Europe.</span></p><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">The Group wishes to take special note of the contribution to their work made by the late General Franciszek Gągor, Chief of the General Staff of the Polish Armed Forces, who died in the tragic crash of President Lech Kaczynski’s aircraft near Smolensk Russia on 10 April 2010. </span></p><span data-dcnode-id="678" instrument_node="">
