</span><h1 class="fs-huge" data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Enlargement</span></h1><span data-dcnode-id="1400" instrument_node="">
</span><ul class="list-meta" data-dcnode-id="1390"><span data-dcnode-id="1399" instrument_node="">
</span><li data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Last updated: 05 May. 2020 15:30</span></li><span data-dcnode-id="1396" instrument_node="">
</span><li class="last" data-dcnode-id="1392"><span data-dcnode-id="1395" instrument_node="">

</span></ul><span data-dcnode-id="1389" instrument_node="">
</span><ul class="list-i18n" data-dcnode-id="1366"><span data-dcnode-id="1388" instrument_node="">
</span><li data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">English</span></li><span data-dcnode-id="1385" instrument_node="">
</span><li data-dcnode-id="1380"><span data-dcnode-id="1384" instrument_node="">
</span><a data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/topics_49212.htm%3FselectedLocale%3Dfr"><span data-dcnode-id="1383" instrument_node="">French</span></a><span data-dcnode-id="1381" instrument_node="">

</span><li data-dcnode-id="1374"><span data-dcnode-id="1378" instrument_node="">
</span><a data-dcnode-id="1376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/topics_49212.htm%3FselectedLocale%3Dru"><span data-dcnode-id="1377" instrument_node="">Russian</span></a><span data-dcnode-id="1375" instrument_node="">

</span><li data-dcnode-id="1368"><span data-dcnode-id="1372" instrument_node="">
</span><a data-dcnode-id="1370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/topics_49212.htm%3FselectedLocale%3Duk"><span data-dcnode-id="1371" instrument_node="">Ukrainian</span></a><span data-dcnode-id="1369" instrument_node="">
</span></li><span data-dcnode-id="1367" instrument_node="">
</span></ul><span data-dcnode-id="1365" instrument_node="">
</span><div class="socialbar" data-dcnode-id="1355"><span data-dcnode-id="1364" instrument_node="">
</span><span data-dcnode-id="1362" instrument_node="">
</span><a class="icon icon-facebook" data-dcnode-id="1361" data-utm-medium="smcweb" data-utm-source="facebook" href="#"></a><span data-dcnode-id="1360" instrument_node="">
</span><a class="icon icon-twitter" data-dcnode-id="1359" data-utm-medium="smcweb" data-utm-source="twitter" href="#"></a><span data-dcnode-id="1358" instrument_node="">
</span><a class="icon icon-linkedin" data-dcnode-id="1357" data-utm-medium="smcweb" data-utm-source="linkedin" href="#"></a><span data-dcnode-id="1356" instrument_node="">
</span></div><span data-dcnode-id="1354" instrument_node=""> </span><span data-dcnode-id="1352" instrument_node="">
</span><section class="content cf" data-dcnode-id="921"><span data-dcnode-id="1351" instrument_node="">
</span><p class="introtxt" data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">NATO’s door remains open to any European country in a position to undertake the commitments and obligations of membership, and contribute to security in the Euro-Atlantic area. Since 1949, NATO’s membership has increased from 12 to 30 countries through eight rounds of enlargement. Currently, three partner countries have declared their aspirations to NATO membership: Bosnia and Herzegovina, Georgia and Ukraine. The Republic of North Macedonia became the latest country to join the Alliance on 27 March 2020.</span></p><span data-dcnode-id="1348" instrument_node="">
</span><div class="box box-media box-media--stretched" data-dcnode-id="1339"><span data-dcnode-id="1347" instrument_node="">
</span><span data-dcnode-id="1345" instrument_node="">
</span><img alt="Flag raising ceremony to mark the accession of North Macedonia to NATO with remarks by NATO Secretary General Jens Stoltenberg and the Chargé d’Affaires of the Delegation of North Macedonia to NATO, Zoran Todorov" data-dcnode-id="1344" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/nato_static_fl2014/assets/pictures/images_mfu/2020/3/30a-accession-nom/200330a-006_rdax_775x440s.jpg&amp;raw"><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">The Republic of North Macedonia became the latest country to join the Alliance on 27 March 2020</span></p><span data-dcnode-id="1340" instrument_node="">
</span></div><span data-dcnode-id="1338" instrument_node="">
</span><div data-dcnode-id="1315"><span data-dcnode-id="1337" instrument_node="">
</span><div class="box--highlight" data-dcnode-id="1317"><span data-dcnode-id="1336" instrument_node="">
</span><ul data-dcnode-id="1319"><span data-dcnode-id="1335" instrument_node="">
</span><li data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">NATO’s “open door policy” is based on Article 10 of its founding treaty. Any decision to invite a country to join the Alliance is taken by the North Atlantic Council on the basis of consensus among all Allies. No third country has a say in such deliberations.</span></li><span data-dcnode-id="1332" instrument_node="">
</span><li data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">NATO’s ongoing enlargement process poses no threat to any country. It is aimed at promoting stability and cooperation, at building a Europe whole and free, united in peace, democracy and common values.</span></li><span data-dcnode-id="1329" instrument_node="">
</span><li data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Having been invited to start accession talks to join the Alliance in July 2018, following the historic agreement between Athens and Skopje on the solution of the name issue, the Republic of North Macedonia became the newest member of NATO on 27 March 2020.</span></li><span data-dcnode-id="1326" instrument_node="">
</span><li data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Bosnia and Herzegovina was invited to join the Membership Action Plan (MAP) in April 2010.</span></li><span data-dcnode-id="1323" instrument_node="">
</span><li data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">At the 2008 Bucharest Summit, the Allies agreed that Georgia and Ukraine will become members of NATO in future.</span></li><span data-dcnode-id="1320" instrument_node="">
</span></ul><span data-dcnode-id="1318" instrument_node="">
</span></div><span data-dcnode-id="1316" instrument_node="">
</span></div><span data-dcnode-id="1314" instrument_node="">
</span><div class="purehtml" data-dcnode-id="1312"><br data-dcnode-id="1313"></div><span data-dcnode-id="1311" instrument_node="">
</span><div class="accordion-wrapper" data-dcnode-id="1284"><span data-dcnode-id="1310" instrument_node="">
</span><ul class="accordion" data-dcnode-id="1286"><span data-dcnode-id="1309" instrument_node="">
</span><li data-dcnode-id="1288"><span data-dcnode-id="1308" instrument_node="">
</span><h2 data-dcnode-id="1304"><a data-dcnode-id="1305" href="#"><span class="icon icon-arrow_accordion" data-dcnode-id="1307"></span><span data-dcnode-id="1306" instrument_node="">Aspirant countries</span></a></h2><span data-dcnode-id="1303" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="1291"><span data-dcnode-id="1302" instrument_node="">
</span><div class="inner-content" data-dcnode-id="1293"><p data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Countries that have declared an interest in joining the Alliance are initially invited to engage in an Intensified Dialogue with NATO about their membership aspirations and related reforms.</span></p><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Aspirant countries may then be invited to participate in the MAP to prepare for potential membership and demonstrate their ability to meet the obligations and commitments of possible future membership. Participation in the MAP does not guarantee membership, but it constitutes a key preparation mechanism.</span></p><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">Countries aspiring to join NATO have to demonstrate that they are in a position to further the principles of the 1949 Washington Treaty and contribute to security in the Euro-Atlantic area. They are also expected to meet certain political, economic and military criteria, which are laid out in the 1995 Study on NATO Enlargement.</span></p></div><span data-dcnode-id="1292" instrument_node="">
</span></div><span data-dcnode-id="1289" instrument_node="">
</span></li><span data-dcnode-id="1287" instrument_node="">
</span></ul><span data-dcnode-id="1285" instrument_node="">
</span></div><span data-dcnode-id="1283" instrument_node="">
</span><div class="accordion-wrapper" data-dcnode-id="1235"><span data-dcnode-id="1282" instrument_node="">
</span><ul class="accordion" data-dcnode-id="1237"><span data-dcnode-id="1281" instrument_node="">
</span><li data-dcnode-id="1239"><span data-dcnode-id="1280" instrument_node="">
</span><h2 data-dcnode-id="1276"><a data-dcnode-id="1277" href="#"><span class="icon icon-arrow_accordion" data-dcnode-id="1279"></span><span data-dcnode-id="1278" instrument_node="">1995 Study on Enlargement</span></a></h2><span data-dcnode-id="1275" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="1242"><span data-dcnode-id="1274" instrument_node="">
</span><div class="inner-content" data-dcnode-id="1244"><p data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">In  1995, the Alliance published the results of a Study on NATO Enlargement that  considered the merits of admitting new members and how they should be brought in.  It concluded that the end of the Cold War provided a unique opportunity to  build improved security in the entire Euro-Atlantic area and that NATO  enlargement would contribute to enhanced stability and security for all. It  would do so, the Study further concluded, by encouraging and supporting  democratic reforms, including the establishment of civilian and democratic  control over military forces; fostering patterns and habits of cooperation,  consultation and consensus-building characteristic of relations among members  of the Alliance; and promoting good-neighbourly relations.</span></p><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">It  would increase transparency in defence planning and military budgets, thereby  reinforcing confidence among states, and would reinforce the overall tendency  toward closer integration and cooperation in Europe. The Study also concluded  that enlargement would strengthen the Alliance’s ability to contribute to  European and international security and strengthen and broaden the  transatlantic partnership.</span></p><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">According  to the Study, countries seeking NATO membership would have to be able to  demonstrate that they have fulfilled certain requirements. These include:</span></p><span data-dcnode-id="1265" instrument_node="">
</span><ul data-dcnode-id="1248" style="list-style-type: square;"><span data-dcnode-id="1264" instrument_node="">
</span><li data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">a functioning democratic political system         based on a market economy;</span></li><span data-dcnode-id="1261" instrument_node="">
</span><li data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">the fair treatment of minority populations;</span></li><span data-dcnode-id="1258" instrument_node="">
</span><li data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">a commitment to the peaceful resolution of         conflicts;</span></li><span data-dcnode-id="1255" instrument_node="">
</span><li data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">the ability and willingness to make a         military contribution to NATO operations; and</span></li><span data-dcnode-id="1252" instrument_node="">
</span><li data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">a commitment to democratic civil-military         relations and institutional structures.</span></li><span data-dcnode-id="1249" instrument_node="">
</span></ul><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Once  admitted, new members would enjoy all the rights and assume all the obligations  of membership. This would include acceptance at the time that they join of all  the principles, policies and procedures previously adopted by Alliance members.</span></p></div><span data-dcnode-id="1243" instrument_node="">
</span></div><span data-dcnode-id="1240" instrument_node="">
</span></li><span data-dcnode-id="1238" instrument_node="">
</span></ul><span data-dcnode-id="1236" instrument_node="">
</span></div><span data-dcnode-id="1234" instrument_node="">
</span><div class="accordion-wrapper" data-dcnode-id="1160"><span data-dcnode-id="1233" instrument_node="">
</span><ul class="accordion" data-dcnode-id="1162"><span data-dcnode-id="1232" instrument_node="">
</span><li data-dcnode-id="1164"><span data-dcnode-id="1231" instrument_node="">
</span><h2 data-dcnode-id="1227"><a data-dcnode-id="1228" href="#"><span class="icon icon-arrow_accordion" data-dcnode-id="1230"></span><span data-dcnode-id="1229" instrument_node="">Accession process</span></a></h2><span data-dcnode-id="1226" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="1167"><span data-dcnode-id="1225" instrument_node="">
</span><div class="inner-content" data-dcnode-id="1169"><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Once  the Allies have decided to invite a country to become a member of NATO, they  officially invite the country to begin accession talks with the Alliance. This  is the first step in the accession process on the way to formal membership. The  major steps in the process are:</span></p><span data-dcnode-id="1222" instrument_node="">
</span><p data-dcnode-id="1219"><strong data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">1.  Accession talks with a NATO team</span></strong></p><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">These  talks take place at NATO Headquarters in Brussels and bring together teams of  NATO experts and representatives of the individual invitees. Their aim is to  obtain formal confirmation from the invitees of their willingness and ability  to meet the political, legal and military obligations and commitments of NATO  membership, as laid out in the Washington Treaty and in the Study on NATO  Enlargement.</span></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">The  talks take place in two sessions with each invitee. In the first session,  political and defence or military issues are discussed, essentially providing  the opportunity to establish that the preconditions for membership have been  met. The second session is more technical and includes discussion of resources,  security, and legal issues as well as the contribution of each new member  country to NATO’s common budget. This is determined on a proportional basis,  according to the size of their economies in relation to those of other Alliance  member countries.</span></p><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Invitees  are also required to implement measures to ensure the protection of NATO  classified information, and prepare their security and intelligence services to  work with the NATO Office of Security.</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">The  end product of these discussions is a timetable to be submitted by each invitee  for the completion of necessary reforms, which may continue even after these  countries have become NATO members.</span></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1203"><strong data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">2.  Invitees send letters of intent to NATO, along with timetables for completion  of reforms</span></strong></p><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">In  the second step of the accession process, each invitee country provides  confirmation of its acceptance of the obligations and commitments of membership  in the form of a letter of intent from each foreign minister addressed to the  NATO Secretary General. Together with this letter they also formally submit  their individual reform timetables.</span></p><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1196"><strong data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">3.  Accession protocols are signed by NATO countries</span></strong></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">NATO  then prepares Accession Protocols to the Washington Treaty for each invitee.  These protocols are in effect amendments or additions to the Treaty, which once  signed and ratified by Allies, become an integral part of the Treaty itself and  permit the invited countries to become parties to the Treaty.</span></p><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1189"><strong data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">4.  Accession protocols are ratified by NATO countries</span></strong></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">The  governments of NATO member states ratify the protocols, according to their  national requirements and procedures. The ratification procedure varies from  country to country. For example, the United States requires a two-thirds  majority to pass the required legislation in the Senate. Elsewhere, for example  in the United Kingdom, no formal parliamentary vote is required.</span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1182"><strong data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">5.  The Secretary General invites the potential new members to accede to the North  Atlantic Treaty</span></strong></p><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Once  all NATO member countries notify the Government of the United States of  America, the depository of the Washington Treaty, of their acceptance of the  protocols to the North Atlantic Treaty on the accession of the potential new  members, the Secretary General invites the new countries to accede to the Treaty.</span></p><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1175"><strong data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">6.  Invitees accede to the North Atlantic Treaty in accordance with their national  procedures</span></strong></p><span data-dcnode-id="1174" instrument_node="">
</span><strong data-dcnode-id="1170"><span data-dcnode-id="1173" instrument_node="">7.  Upon depositing their instruments of accession with the US State Department,  invitees formally become NATO members</span><br data-dcnode-id="1172"><span data-dcnode-id="1171" instrument_node="">
</span></strong></div><span data-dcnode-id="1168" instrument_node="">
</span></div><span data-dcnode-id="1165" instrument_node="">
</span></li><span data-dcnode-id="1163" instrument_node="">
</span></ul><span data-dcnode-id="1161" instrument_node="">
</span></div><span data-dcnode-id="1159" instrument_node="">
</span><div class="accordion-wrapper" data-dcnode-id="1097"><span data-dcnode-id="1158" instrument_node="">
</span><ul class="accordion" data-dcnode-id="1099"><span data-dcnode-id="1157" instrument_node="">
</span><li data-dcnode-id="1101"><span data-dcnode-id="1156" instrument_node="">
</span><h2 data-dcnode-id="1152"><a data-dcnode-id="1153" href="#"><span class="icon icon-arrow_accordion" data-dcnode-id="1155"></span><span data-dcnode-id="1154" instrument_node="">Evolution of NATO’s “open door policy”</span></a></h2><span data-dcnode-id="1151" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="1104"><span data-dcnode-id="1150" instrument_node="">
</span><div class="inner-content" data-dcnode-id="1106"><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">NATO’s “open door policy” is based upon Article 10 of the Washington Treaty, which states that membership is open to any “European State in a position to further the principles of this Treaty and to contribute to the security of the North Atlantic area”.</span></p><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">The enlargement of the Alliance is an ongoing and dynamic process.&nbsp; Since the Alliance was created in 1949, its membership has grown from the 12 founding members to today’s 30 members through eight rounds of enlargement in 1952, 1955, 1982, 1999, 2004, 2009, 2017 and 2020.</span></p><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">The first three rounds of enlargement – which brought in Greece and Turkey (1952), West Germany (1955) and Spain (1982) – took place during the Cold War, when strategic considerations were at the forefront of decision-making.</span></p><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">The fall of the Berlin Wall in November 1989 signalled the end of the Cold War and was followed by the dissolution of the Warsaw Pact and the breakup of the Soviet Union. The reunification of Germany in October 1990 brought the territory of the former East Germany into the Alliance. The new democracies of Central and Eastern Europe were eager to guarantee their freedom by becoming integrated into Euro-Atlantic institutions.</span></p><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">NATO enlargement was the subject of lively debate in the early 1990s. Many political analysts were unsure of the benefits that enlargement would bring. Some were concerned about the possible impact on Alliance cohesion and solidarity, as well as on relations with other states, notably Russia. It is in this context that the Alliance carried out a Study on NATO Enlargement in 1995 (see above).</span></p><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1132"><strong data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Post-Cold War enlargement</span></strong></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Based on the findings of the Study on Enlargement, the Alliance invited the Czech Republic, Hungary and Poland to begin accession talks at the Alliance’s Madrid Summit in 1997. These three countries became the first former members of the Warsaw Pact to join NATO in 1999.</span></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">At the 1999 Washington Summit, the Membership Action Plan was launched to help other aspirant countries prepare for possible membership.</span></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Bulgaria, Estonia, Latvia, Lithuania, Romania, Slovakia and Slovenia were invited to begin accession talks at the Alliance’s Prague Summit in 2002 and joined NATO in 2004. All seven countries had participated in the MAP.</span></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">At the Bucharest Summit in April 2008, Allied leaders took a number of steps related to the future enlargement of the Alliance. Several decisions concerned countries in the Western Balkans (see Milestones below). The Allies see the closer integration of Western Balkan countries into Euro-Atlantic institutions as essential to ensuring long-term self-sustaining stability in this region, where NATO has been heavily engaged in peace-support operations since the where NATO has been heavily engaged in peace-support operations since the mid-1990s. Albania and Croatia joined the Alliance in April 2009; Montenegro in June 2017; and the Republic of North Macedonia in March 2020.</span></p><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1107"><span data-dcnode-id="1118" instrument_node="">Allied leaders also agreed at Bucharest that Georgia and Ukraine, which were already engaged in Intensified Dialogues with NATO, will one day become members. In December 2008, Allied foreign ministers decided to enhance opportunities for assisting the two countries in efforts to meet membership requirements by making use of the framework of the existing NATO-Ukraine Commission and NATO-Georgia Commission – without prejudice to further decisions which may be taken about their applications to join the MAP. </span><em data-dcnode-id="1114"><span data-dcnode-id="1117" instrument_node="">(For further information on NATO’s cooperation with Georgia and Ukraine see pages on </span><a data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natolive/topics_38988.htm"><span data-dcnode-id="1116" instrument_node="">Relations with Georgia</span></a></em><em data-dcnode-id="1110"><span data-dcnode-id="1113" instrument_node=""> and </span><a data-dcnode-id="1111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natolive/topics_37750.htm"><span data-dcnode-id="1112" instrument_node="">Relations with Ukraine</span></a></em><em data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">.)</span></em></p></div><span data-dcnode-id="1105" instrument_node="">
</span></div><span data-dcnode-id="1102" instrument_node="">
</span></li><span data-dcnode-id="1100" instrument_node="">
</span></ul><span data-dcnode-id="1098" instrument_node="">
</span></div><span data-dcnode-id="1096" instrument_node="">
</span><div class="accordion-wrapper" data-dcnode-id="923"><span data-dcnode-id="1095" instrument_node="">
</span><ul class="accordion" data-dcnode-id="925"><span data-dcnode-id="1094" instrument_node="">
</span><li data-dcnode-id="927"><span data-dcnode-id="1093" instrument_node="">
</span><h2 data-dcnode-id="1089"><a data-dcnode-id="1090" href="#"><span class="icon icon-arrow_accordion" data-dcnode-id="1092"></span><span data-dcnode-id="1091" instrument_node="">Milestones</span></a></h2><span data-dcnode-id="1088" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="930"><span data-dcnode-id="1087" instrument_node="">
</span><div class="inner-content" data-dcnode-id="932"><p data-dcnode-id="1083"><strong data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">4 April 1949:</span></strong><span data-dcnode-id="1084" instrument_node="">&nbsp; Signature of the North Atlantic Treaty by 12 founding members: Belgium, Canada, Denmark, France, Iceland, Italy, Luxembourg, the Netherlands, Norway, Portugal, the United Kingdom and the United States. Article 10 of the Treaty provides the basis for NATO’s “open door policy”.</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1078"><strong data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">18 February 1952:</span></strong><span data-dcnode-id="1079" instrument_node="">&nbsp; Accession of Greece and Turkey.</span></p><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1073"><strong data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">6 May 1955:</span></strong><span data-dcnode-id="1074" instrument_node="">&nbsp; Accession of the Federal Republic of Germany.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1068"><strong data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">30 May 1982:</span></strong><span data-dcnode-id="1069" instrument_node="">&nbsp; Spain joins the Alliance (and the integrated military structure in 1998).</span></p><span data-dcnode-id="1067" instrument_node="">
</span><p data-dcnode-id="1063"><strong data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">October 1990:</span></strong><span data-dcnode-id="1064" instrument_node="">&nbsp; With the reunification of Germany, the new German Länder in the East become part of NATO.</span></p><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1058"><strong data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">January 1994:</span></strong><span data-dcnode-id="1059" instrument_node="">&nbsp; At the Brussels Summit, Allied leaders reaffirm that NATO remains open to the membership of other European countries.</span></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1053"><strong data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">28 September 1995</span></strong><span data-dcnode-id="1054" instrument_node="">:&nbsp; Publication of NATO Study on Enlargement.</span></p><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1048"><strong data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">8-9 July 1997:</span></strong><span data-dcnode-id="1049" instrument_node="">&nbsp; At the Madrid Summit, three partner countries – the Czech Republic, Hungary and Poland – are invited to start accession talks.</span></p><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1043"><strong data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">12 March 1999:</span></strong><span data-dcnode-id="1044" instrument_node="">&nbsp; Accession of the Czech Republic, Hungary and Poland, bringing the Alliance to 19 members.</span></p><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1038"><strong data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">23-25 April 1999:</span></strong><span data-dcnode-id="1039" instrument_node="">&nbsp; Launch of the Membership Action Plan (MAP) at the Washington Summit. (Bulgaria, Estonia, Latvia, Lithuania, Romania, Slovakia and Slovenia join the MAP.)</span></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1033"><strong data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">14 May 2002:</span></strong><span data-dcnode-id="1034" instrument_node="">&nbsp; NATO foreign ministers officially announce the participation of Croatia in the MAP at their meeting in Reykjavik, Iceland.</span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1028"><strong data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">May 2002:</span></strong><span data-dcnode-id="1029" instrument_node="">&nbsp; President Leonid Kuchma announces Ukraine’s goal of eventual NATO membership.</span></p><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1023"><strong data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">21-22 November 2002:</span></strong><span data-dcnode-id="1024" instrument_node="">&nbsp; At the Prague Summit, seven partner countries – Bulgaria, Estonia, Latvia, Lithuania, Romania, Slovakia and Slovenia – are invited to start accession talks.</span></p><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1018"><strong data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">26 March 2003:</span></strong><span data-dcnode-id="1019" instrument_node="">&nbsp; Signing ceremony of the Accession Protocols of the seven invitees.</span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1013"><strong data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">29 March 2004:</span></strong><span data-dcnode-id="1014" instrument_node="">&nbsp; Accession of Bulgaria, Estonia, Latvia, Lithuania, Romania, Slovakia and Slovenia.</span></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1008"><strong data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">21 April 2005:</span></strong><span data-dcnode-id="1009" instrument_node="">&nbsp; Launch of the Intensified Dialogue on Ukraine’s aspirations to NATO membership and related reforms, at an informal meeting of foreign ministers in Vilnius, Lithuania.</span></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1003"><strong data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">21 September 2006:</span></strong><span data-dcnode-id="1004" instrument_node="">&nbsp; NATO foreign ministers in New York announce the decision to offer an Intensified Dialogue to Georgia.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="998"><strong data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">28-29 November 2006:</span></strong><span data-dcnode-id="999" instrument_node="">&nbsp; At the Riga Summit, Allied leaders state that invitations will be extended to MAP countries that fulfil certain conditions.</span></p><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="993"><strong data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">2-4 April 2008:</span></strong><span data-dcnode-id="994" instrument_node="">&nbsp; At the Bucharest Summit, Allied leaders invite Albania and Croatia to start accession talks; assure the country known at the time as the former Yugoslav Republic of Macedonia that it will be invited once a solution to the issue of the country’s name has been reached with Greece; invite Bosnia and Herzegovina and Montenegro to start Intensified Dialogues; and agree that Georgia and Ukraine will become members in future.</span></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="988"><strong data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">9 July 2008:</span></strong><span data-dcnode-id="989" instrument_node="">&nbsp; Accession Protocols for Albania and Croatia are signed. Allied foreign ministers agree that Georgia should develop an Annual National Programme under the auspices of the NATO-Georgia Commission.</span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="983"><strong data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">1 April 2009:</span></strong><span data-dcnode-id="984" instrument_node="">&nbsp; Accession of Albania and Croatia.</span></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="978"><strong data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">4 December 2009:</span></strong><span data-dcnode-id="979" instrument_node="">&nbsp; NATO foreign ministers invite Montenegro to join the MAP.</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="973"><strong data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">22 April 2010:</span></strong><span data-dcnode-id="974" instrument_node="">&nbsp; NATO foreign ministers invite Bosnia and Herzegovina to join the MAP, authorising the North Atlantic Council to accept the country’s first Annual National Programme only when the immovable property issue has been resolved.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="968"><strong data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">2 December 2015:</span></strong><span data-dcnode-id="969" instrument_node="">&nbsp;NATO foreign ministers meeting in Brussels invite Montenegro to start accession talks to join the Alliance, while encouraging further progress on reforms, especially in the area of rule of law. In a statement on NATO’s “open door” policy, ministers encourage Bosnia and Herzegovina to undertake the reforms necessary for the country to realise its Euro-Atlantic aspirations and to activate its participation in MAP. Ministers also reiterate their decisions at Bucharest and subsequent decisions concerning Georgia, welcoming the progress the country has made in coming closer to the Alliance and expressing their determination to intensify support for Georgia.</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="963"><strong data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">19 May 2016:</span></strong><span data-dcnode-id="964" instrument_node="">&nbsp;Allied ministers sign the Accession Protocol, following which Montenegro has ‘Invitee’ status and starts attending North Atlantic Council and other NATO meetings.</span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="958"><strong data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">5 June 2017:</span></strong><span data-dcnode-id="959" instrument_node="">&nbsp;Accession of Montenegro</span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="953"><strong data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">11 July 2018:&nbsp;</span></strong><span data-dcnode-id="954" instrument_node="">At the Brussels Summit, following the historic agreement between Athens and Skopje on the solution of the name issue, Allied leaders invite the government in Skopje to begin accession talks to join NATO. Full implementation of the agreement on the solution of the name issue is a condition for a successful conclusion of the accession process.</span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="948"><strong data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">5 December 2018:</span></strong><span data-dcnode-id="949" instrument_node=""> Allied foreign ministers decide that NATO is ready to accept the submission of Bosnia and Herzegovina’s first Annual National Programme under the MAP.&nbsp; The registration of immovable defence property to the state remains essential.</span></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="943"><strong data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">6 February 2019:</span></strong><span data-dcnode-id="944" instrument_node="">&nbsp;The Allies sign the Accession Protocol of the Republic of North Macedonia, following which the country takes part in NATO activities as an invitee.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="938"><strong data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">15 February 2019:</span></strong><span data-dcnode-id="939" instrument_node="">&nbsp;The Republic of North Macedonia is officially recognised by its constitutional name, following the full implementation of the agreement between Athens and Skopje.</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="933"><strong data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">27 March&nbsp;2020:</span></strong><span data-dcnode-id="934" instrument_node=""> Accession of the Republic of North Macedonia</span></p></div><span data-dcnode-id="931" instrument_node="">
</span></div><span data-dcnode-id="928" instrument_node="">
</span></li><span data-dcnode-id="926" instrument_node="">
</span></ul><span data-dcnode-id="924" instrument_node="">
</span></div><span data-dcnode-id="922" instrument_node="">
</span></section><span data-dcnode-id="919" instrument_node="">

</span><h1 data-dcnode-id="865"><span data-dcnode-id="868" instrument_node="">
</span><span class="icon icon-text" data-dcnode-id="867"></span><span data-dcnode-id="866" instrument_node="">
      Topics
    </span></h1><span data-dcnode-id="864" instrument_node="">
