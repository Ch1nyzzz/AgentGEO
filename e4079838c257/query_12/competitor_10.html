</span><span data-dcnode-id="1785" id="freeTextContainer16414434560176883016"><span data-dcnode-id="1786" instrument_node="">This is a solid investigative journalism book about the connection between Donald Trump and various Russian interests - both governmental and non-governmental. I would recommend it to anyone interested in the current controversy surrounding the President, as to the degree of cooperation between Russian intelligence and the Trump campaign, and how much money was poured into US right wing political organizations and campaigns by the government of Russia to ensure that an authoritarian-friendly Pre</span></span><span data-dcnode-id="1784" instrument_node="">
</span><span data-dcnode-id="1569" id="freeText16414434560176883016" style="display:none"><span data-dcnode-id="1783" instrument_node="">This is a solid investigative journalism book about the connection between Donald Trump and various Russian interests - both governmental and non-governmental. I would recommend it to anyone interested in the current controversy surrounding the President, as to the degree of cooperation between Russian intelligence and the Trump campaign, and how much money was poured into US right wing political organizations and campaigns by the government of Russia to ensure that an authoritarian-friendly President was elected, who would be more favorably disposed toward Russia. </span><br data-dcnode-id="1782"><br data-dcnode-id="1781"><span data-dcnode-id="1780" instrument_node="">Quotes from the book:</span><br data-dcnode-id="1779"><br data-dcnode-id="1778"><span data-dcnode-id="1777" instrument_node="">From the Introduction "It's a shakedown."</span><br data-dcnode-id="1776"><br data-dcnode-id="1775"><span data-dcnode-id="1774" instrument_node="">"For years Trump had pursued business deals in Russia, continuing to do so even through the first months of his presidential campaign--and this colored how he would engage with ...Vladimir Putin."</span><br data-dcnode-id="1773"><br data-dcnode-id="1772"><span data-dcnode-id="1771" instrument_node="">From Chapter 1 - "Mr. Putin would like to meet Mr. Trump."</span><br data-dcnode-id="1770"><br data-dcnode-id="1769"><span data-dcnode-id="1768" instrument_node="">"[Trump] would be close to branding the Moscow skyline with his world-famous name and enhancing his own status as a sort of global oligarch." </span><br data-dcnode-id="1767"><br data-dcnode-id="1766"><span data-dcnode-id="1765" instrument_node="">"...what motivated Trump the most: the opportunity to build more monuments to himself and to make more money." </span><br data-dcnode-id="1764"><br data-dcnode-id="1763"><span data-dcnode-id="1762" instrument_node="">From Chapter 2 - "We did not recognize the degree it would tick Putin off." </span><br data-dcnode-id="1761"><br data-dcnode-id="1760"><span data-dcnode-id="1759" instrument_node="">"A few weeks before Litvinenko was poisoned [with radioactive polonium-210], Anna Politkovskaya, one of Russia's most prominent journalists, was shot to death outside her Moscow apartment." </span><br data-dcnode-id="1758"><br data-dcnode-id="1757"><span data-dcnode-id="1756" instrument_node="">"[Christopher Steele:] "Here was a member of the United Nations Security Council that had just committed an act of nuclear terrorism."</span><br data-dcnode-id="1755"><br data-dcnode-id="1754"><span data-dcnode-id="1753" instrument_node="">"...Garry Kasparov, the one-time world chess champion... had become a well-known Russian opposition leader and passionate foe of Putin." </span><br data-dcnode-id="1752"><br data-dcnode-id="1751"><span data-dcnode-id="1750" instrument_node="">"In August 2008, Russia invaded Georgia in support of pro-Russia separatists." </span><br data-dcnode-id="1749"><br data-dcnode-id="1748"><span data-dcnode-id="1747" instrument_node="">"...[In March 2009 Russian Foreign Minister Sergei] Lavrov wanted [then Secretary of State Hillary] Clinton to help [billionaire Russian oligarch/suspected Russian organized crime associate Oleg] Deripaska obtain a visa." </span><br data-dcnode-id="1746"><br data-dcnode-id="1745"><span data-dcnode-id="1744" instrument_node="">"The determination of Russia's spy service to infiltrate American political and government circles had not waned [despite the end of the Cold War]." </span><br data-dcnode-id="1743"><br data-dcnode-id="1742"><span data-dcnode-id="1741" instrument_node="">"Around the time of the Uranium One [since 2013 a wholly owned subsidiary of the Russian state-owned nuclear corporation Rosatom] deal, the company chairman's family foundation donated about $2.35 million to Clinton Foundation programs." </span><br data-dcnode-id="1740"><br data-dcnode-id="1739"><span data-dcnode-id="1738" instrument_node="">"Putin had once called the collapse of the Soviet Union the "Greatest geopolitical catastrophe of the century.""</span><br data-dcnode-id="1737"><br data-dcnode-id="1736"><span data-dcnode-id="1735" instrument_node="">From Chapter 3 - "Are we here because Clinton texted us?"</span><br data-dcnode-id="1734"><br data-dcnode-id="1733"><span data-dcnode-id="1732" instrument_node="">"At the APEC [Asia-Pacific Economic Cooperation] dinner [in September 2012, Putin] ... told Clinton [that during the war] his father, a soldier, came home [to Leningrad] from the front lines for a short break. Near the apartment he shared with his wife, he saw bodies stacked on the street. Men were loading them on to a truck. In the pile, he spotted a leg with a shoe he recognized. It was his wife's shoe. He demanded her body. The men first refused but then relented. He picked up the body and realized his wife was not dead. He carried her to their apartment. She recuperated. Eight years later, she gave birth to Vladimir Putin." </span><br data-dcnode-id="1731"><br data-dcnode-id="1730"><span data-dcnode-id="1729" instrument_node="">"Obama wanted to promote human rights causes --so long as they did not interfere with other foreign policy objectives." </span><br data-dcnode-id="1728"><br data-dcnode-id="1727"><span data-dcnode-id="1726" instrument_node="">From Chapter 4 - "You don't know me, but I'm working on a troll farm."</span><br data-dcnode-id="1725"><br data-dcnode-id="1724"><span data-dcnode-id="1723" instrument_node="">"This is my backyard," Putin told British Prime Minister David Cameron in a phone call to discuss the crisis [in February 2014, referring to the ouster of pro-Russian Ukrainian President Yanukovych following the Maidan revolution]. "The West has repeatedly humiliated me, over Libya, over Syria, etc., for the last ten years." </span><br data-dcnode-id="1722"><br data-dcnode-id="1721"><span data-dcnode-id="1720" instrument_node="">"In response to Putin's [March 2014] actions in Ukraine [including the annexation of Crimea]... At a fundraiser, Clinton, now preparing for her not-yet-announced presidential run, compared Putin's moves in Ukraine to "what Hitler did back in he 30s."" </span><br data-dcnode-id="1719"><br data-dcnode-id="1718"><span data-dcnode-id="1717" instrument_node="">"[The secret Kremlin] ...source claimed that Putin was increasingly being influenced by [an] ...ultra-nationalist Orthodox Russian monk, Father Tikhon Shevkunov, whose principal message was that Putin had a divine mission to save Russia from its demise and to defend Christian values against the liberal secular West." </span><br data-dcnode-id="1716"><br data-dcnode-id="1715"><span data-dcnode-id="1714" instrument_node="">"[The Kremlin secret source also indicated that] ... Putin and his inner circle had nothing but utter contempt for Obama and his administration--much of it cast in racist terms." </span><br data-dcnode-id="1713"><br data-dcnode-id="1712"><span data-dcnode-id="1711" instrument_node="">"The Russian [secret] source...told his American contact that the Kremlin was planning a wide-ranging, multifaceted campaign to attack Western institutions and undermine Western democracies." </span><br data-dcnode-id="1710"><br data-dcnode-id="1709"><span data-dcnode-id="1708" instrument_node="">"The [secret] source also reported there was a burgeoning relationship between Russian agents and France's right-wing National Front led by Marine Le Pen." </span><br data-dcnode-id="1707"><br data-dcnode-id="1706"><span data-dcnode-id="1705" instrument_node="">"...the [secret] source explained...Putin's larger strategic vision: "to destroy NATO, destroy the European Union, and seriously harm the United States."" </span><br data-dcnode-id="1704"><br data-dcnode-id="1703"><span data-dcnode-id="1702" instrument_node="">"In early 2014, as the Ukrainian crisis raged....Trump, still enamored with Putin after the [November 2013 Moscow] Miss Universe contest, couldn't seem to work out a coherent response to Putin's aggression in Ukraine." </span><br data-dcnode-id="1701"><br data-dcnode-id="1700"><span data-dcnode-id="1699" instrument_node="">"...Trump continued to express admiration for Putin." </span><br data-dcnode-id="1698"><br data-dcnode-id="1697"><span data-dcnode-id="1696" instrument_node="">"Trump appeared to be venerating Putin for assaulting Ukraine and violating international norms." </span><br data-dcnode-id="1695"><br data-dcnode-id="1694"><span data-dcnode-id="1693" instrument_node="">"Trump would not criticize the man whose permission he would need to to build a Trump Tower in Moscow." </span><br data-dcnode-id="1692"><br data-dcnode-id="1691"><span data-dcnode-id="1690" instrument_node="">"...the Internet Research Agency: Located in a nondescript but heavily guarded office building [in St. Petersburg] ...it employed hundreds of Russians who created fake internet identities and planted stories on social media platforms..." </span><br data-dcnode-id="1689"><br data-dcnode-id="1688"><span data-dcnode-id="1687" instrument_node="">"For [Russian internet activist and troll farm infiltrator Lyudmila] Savchuk, the final straw came after opposition leader Boris Nemtsov was gunned down and murdered crossing a bridge one block from the Kremlin in February 2015." </span><br data-dcnode-id="1686"><br data-dcnode-id="1685"><span data-dcnode-id="1684" instrument_node="">"After the [June 2015] article [in the Russian newspaper Moi Raion revealing the existence of the Internet Research Agency] was published, an anti-government Russian hacking group, Anonymous International, cracked into the Internet Research Agency's computers and discovered that payments to the trolls were being made through a holding company owned by Yevgeny Prigozhin, a Russian oligarch and restaurateur close to the Russian president and known as "Putin's chef.""</span><br data-dcnode-id="1683"><br data-dcnode-id="1682"><span data-dcnode-id="1681" instrument_node="">"Throughout the Cold War, Soviet intelligence agencies had sought to sow dissension in the West and stir up anti-American sentiment through false narratives, phony documents, and concocted news stories." </span><br data-dcnode-id="1680"><br data-dcnode-id="1679"><span data-dcnode-id="1678" instrument_node="">"There was little doubt what had provoked the new aggressiveness: the Ukraine-related sanctions."</span><br data-dcnode-id="1677"><br data-dcnode-id="1676"><span data-dcnode-id="1675" instrument_node="">From Chapter 6 - "Felix Sater, boy, I have to even think about it."</span><br data-dcnode-id="1674"><br data-dcnode-id="1673"><span data-dcnode-id="1672" instrument_node="">"[Trump] drew large numbers of fans to rallies where he angrily decried the political establishment, flogged the media, mocked his rivals, touted his success, and promised that Trump--he tended to refer to himself in the third person--would do great things for America." </span><br data-dcnode-id="1671"><br data-dcnode-id="1670"><span data-dcnode-id="1669" instrument_node="">"...here was a potentially serious conflict of interest: A candidate was seeking the White House and simultaneously pursuing a business venture that could proceed only if the government of a foreign adversary give it the green light." </span><br data-dcnode-id="1668"><br data-dcnode-id="1667"><span data-dcnode-id="1666" instrument_node="">"In ... [an] email to [Michael] Cohen, [onetime felon turned FBI informant Felix] Sater noted, "Buddy our boy can become president of the USA and we can engineer it. I will get all of Putins team to buy in on this, I will manage this process."" </span><br data-dcnode-id="1665"><br data-dcnode-id="1664"><span data-dcnode-id="1663" instrument_node="">"In 2010, Sater joined the Trump Organization as a consultant, seeking out deals." </span><br data-dcnode-id="1662"><br data-dcnode-id="1661"><span data-dcnode-id="1660" instrument_node="">"In 2017, golf writer James Dodson recounted a 2014 conversation with Eric Trump, Trump's second oldest son, in which this Trump said his father's business did not rely on U.S. banks for financing its various golf resort projects and explained, "We have all the funding we need out of Russia.""</span><br data-dcnode-id="1659"><br data-dcnode-id="1658"><span data-dcnode-id="1657" instrument_node="">"A 2017 Reuters review of real estate records found that at least sixty-three individuals with Russian passports or addresses bought at least $98 million worth of property in seven Trump-branded luxury towers in southern Florida. The identify of hundreds of other owners was masked by shell companies and could not be determined."</span><br data-dcnode-id="1656"><br data-dcnode-id="1655"><span data-dcnode-id="1654" instrument_node="">From Chapter 7 - "He's been a Russian stooge for fifteen years."</span><br data-dcnode-id="1653"><br data-dcnode-id="1652"><span data-dcnode-id="1651" instrument_node="">"[Viktor] Yanukovych was a sour, heavyset man with a checkered past. As a teenager, he had spent time in prison for robbery and assault." </span><br data-dcnode-id="1650"><br data-dcnode-id="1649"><span data-dcnode-id="1648" instrument_node="">"Manafort figured out which hot-button issues to use to enhance Yanukovych's and the Party of Region's popularity, focusing on the rights of Russian-speaking Ukrainians and opposition to Ukraine entering the NATO alliance." </span><br data-dcnode-id="1647"><br data-dcnode-id="1646"><span data-dcnode-id="1645" instrument_node="">"In 2011, Yulia Tymoshenko - the Ukrainian politician whom Yanukovych had defeated in the 2010 presidential election --had filed a civil lawsuit in federal court in New York that accused her political opponents of having operated a U.s.-based racketeering enterprise. The suit alleged that Manafort had colluded with Dmitry Firtash, a Putin-connected Ukrainian natural gas magnate and a Yanukovych ally, to launder hundreds of millions of dollars in ill-gotten gains from Ukrainian gas interests through a "labyrinth" of companies in Panama, Cyprus, and Europe -and into real estate ventures in New York City." </span><br data-dcnode-id="1644"><br data-dcnode-id="1643"><span data-dcnode-id="1642" instrument_node="">"...[Manafort] ... was exploring how to exploit his Trump connection for personal gain." </span><br data-dcnode-id="1641"><br data-dcnode-id="1640"><span data-dcnode-id="1639" instrument_node="">From Chapter 8 - "How the fuck did he get on the list?"</span><br data-dcnode-id="1638"><br data-dcnode-id="1637"><span data-dcnode-id="1636" instrument_node="">"As the FBI would come to suspect, [Carter] Page and [George] Papadopoulos were being cultivated by cutouts for Russian intelligence, as part of a sophisticated operation to infiltrate and influence the Trump campaign." </span><br data-dcnode-id="1635"><br data-dcnode-id="1634"><span data-dcnode-id="1633" instrument_node="">"...one of those [Russian] efforts [to forge a relationship with the Trump campaign] came through a broader Russian initiative to gain influence within the American conservative movement." </span><br data-dcnode-id="1632"><br data-dcnode-id="1631"><span data-dcnode-id="1630" instrument_node="">"In December 2015, [Michael] Flynn was invited to speak in Moscow at a celebration of the tenth anniversary of RT, the Russian government propaganda outlet." </span><br data-dcnode-id="1629"><br data-dcnode-id="1628"><span data-dcnode-id="1627" instrument_node="">"...the GRU, the Russian military intelligence service...this [Russian military intelligence] officer said, was preparing to cause chaos in the U.S. election." </span><br data-dcnode-id="1626"><br data-dcnode-id="1625"><span data-dcnode-id="1624" instrument_node="">From Chapter 9 - "If it's what you say I love it."</span><br data-dcnode-id="1623"><br data-dcnode-id="1622"><span data-dcnode-id="1621" instrument_node="">"In 2015, Trump welcomed [Rob Goldstone and Emin Agalarov] ... into his office... They came bearing a secret message: The Putin regime wanted to help Trump win the White House." </span><br data-dcnode-id="1620"><br data-dcnode-id="1619"><span data-dcnode-id="1618" instrument_node="">"...Papadopoulos had been told that the Russians had "dirt" on [Hillary] that included "thousands of emails."" </span><br data-dcnode-id="1617"><br data-dcnode-id="1616"><span data-dcnode-id="1615" instrument_node="">"At the time of the Trump Tower meeting, Veselnitskaya was ... representing the Katsyv family. This time the client was Katsyv's son, Denis Katsyv, whose Cyprus -based company, Prevezon Holdings, had been charged by U.S. attorney Preet Bharara's office with laundering proceeds from the $230 million Russian tax fraud exposed by Sergei Magnitsky and funneling this money into purchases of New York real estate. The case was political dynamite for Putin; it grew out of the allegations that had led to the Magnitsky Act--the sanctions law..." </span><br data-dcnode-id="1614"><br data-dcnode-id="1613"><span data-dcnode-id="1612" instrument_node="">"...Trump's senior advisers now had ... reason to believe that Putin's regime wanted Trump to win and was willing to act clandestinely to boost his chances." </span><br data-dcnode-id="1611"><br data-dcnode-id="1610"><span data-dcnode-id="1609" instrument_node="">"One proposal [by the State Department] was to cut U.S. government contracts with Kaspersky Lab, a Russian cyber security firm whose founder, Eugene Kaspersky, had graduated from a KGB academy."</span><br data-dcnode-id="1608"><br data-dcnode-id="1607"><span data-dcnode-id="1606" instrument_node="">From Chapter 10 - " Wikileaks has a very big year ahead."</span><br data-dcnode-id="1605"><br data-dcnode-id="1604"><span data-dcnode-id="1603" instrument_node="">"[According to a 6/16/16 CrowdStrike report </span><a data-dcnode-id="1601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.crowdstrike.com/blog/bears-midst-intrusion-democratic-national-committee/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1602" instrument_node="">https://www.crowdstrike.com/blog/bear...</span></a><span data-dcnode-id="1600" instrument_node="">] In June 2014, [Russian state hackers Fancy Bear] ... had penetrated the Ukrainian Central Election Commission's network, destroying data and posting fake election results on its website." </span><br data-dcnode-id="1599"><br data-dcnode-id="1598"><span data-dcnode-id="1597" instrument_node="">"...the Trump camp [refused] ... to acknowledge the Russians were intervening in the U.S. presidential election. Trump's senior advisers revealed nothing indicting they had recently been told the Kremlin secretly wanted to help Trump become president." </span><br data-dcnode-id="1596"><br data-dcnode-id="1595"><span data-dcnode-id="1594" instrument_node="">From Chapter 11 - "I have to report this to headquarters."</span><br data-dcnode-id="1593"><br data-dcnode-id="1592"><span data-dcnode-id="1591" instrument_node="">"[Steele's] ... collector, relaying what he had been told by his contacts, informed Steele that the Russians had been targeting and cultivating Trump for years and had even gathered kompromat on him, specifically tales of weird sexual indiscretions that the collector said "were an open secret" in Moscow." </span><br data-dcnode-id="1590"><br data-dcnode-id="1589"><span data-dcnode-id="1588" instrument_node="">"[Steele memo:] "Russian regime has been cultivating, supporting and assisting TRUMP for at least 5 years. Aim, endorsed by PUTIN, has been to encourage splits and divisions in western alliance."" </span><br data-dcnode-id="1587"><br data-dcnode-id="1586"><span data-dcnode-id="1585" instrument_node="">"[Steele memo:] "...[Trump] and his inner circle have accepted a regular flow of intelligence from the Kremlin, including on his Democratic and other political rivals."" </span><br data-dcnode-id="1584"><br data-dcnode-id="1583"><span data-dcnode-id="1582" instrument_node="">"[Steele memo:] "Former top Russian intelligence officers claims FSB has compromised TRUMP thorough his activities in MOSCOW sufficiently to be able to blackmail him. According to several knowledgeable sources, his conduct in Moscow has included perverted sexual acts which have been arranged/monitored by the FSB."" </span><br data-dcnode-id="1581"><br data-dcnode-id="1580"><span data-dcnode-id="1579" instrument_node="">"[Two sources within the government of Russia]...told...the collector--that Moscow had been running an operation for years to cultivate and co-opt Trump and this project was "supported and directed" by Putin." </span><br data-dcnode-id="1578"><br data-dcnode-id="1577"><span data-dcnode-id="1576" instrument_node="">"According to Source C, a senior Russian financial officials, the Trump operation was part of Putin's overall plan to sow disunity within the United States and the trans-Atlantic alliance. This source reported having heard Putin express his desire to return to the nineteenth-century style of "Great Power" politics in which nations would pursue their own interests rather than an ideals-based international order." </span><br data-dcnode-id="1575"><br data-dcnode-id="1574"><span data-dcnode-id="1573" instrument_node="">"Steele had forwarded [the report to Clinton campaign chief undercover oppo research man &amp; Fusion GPS owner Glenn Simpson] on a thumb drive with a pass-code via Federal Express." </span><br data-dcnode-id="1572"><br data-dcnode-id="1571"><span data-dcnode-id="1570" instrument_node="">"Much later, Steele would say that he believed 70 to 90 percent of the broad assertions of his reporting--that Russia had mounted a campaign to cultivate Trump and had colluded with the Trump campaign--was true."</span></span><span data-dcnode-id="1568" instrument_node="">

</span><span data-dcnode-id="1466" id="freeTextContainer11012958015212535085"><b data-dcnode-id="1468"><span data-dcnode-id="1470" instrument_node="">For What It's Worth :</span><br data-dcnode-id="1469"></b><span data-dcnode-id="1467" instrument_node="">Let's start off with a quick confession. I've been a politics junkie of late, and nothing is more fascinating in this era than the Trump-Russia probe. An adventure that's got everything-- white-knuckle moments of confrontation and accusation, intriguing coldwar-reprise spycraft &amp; deception, and near-shakespearean levels of hubris and ominously flawed self-regard. A tale of a doomed, reverse Excalibur, where he (insert your guess here) who dares grasp the sword is fated to li</span></span><span data-dcnode-id="1465" instrument_node="">
</span><span data-dcnode-id="1382" id="freeText11012958015212535085" style="display:none"><b data-dcnode-id="1462"><span data-dcnode-id="1464" instrument_node="">For What It's Worth :</span><br data-dcnode-id="1463"></b><span data-dcnode-id="1461" instrument_node="">Let's start off with a quick confession. I've been a politics junkie of late, and nothing is more fascinating in this era than the Trump-Russia probe. An adventure that's got everything-- white-knuckle moments of confrontation and accusation, intriguing coldwar-reprise spycraft &amp; deception, and near-shakespearean levels of hubris and ominously flawed self-regard. A tale of a doomed, reverse Excalibur, where he (insert your guess here) who dares grasp the sword is fated to live forever in the dumpster of history. And everyone who will be his accomplice --is splattered and stained with the same shame.</span><br data-dcnode-id="1460"><br data-dcnode-id="1459"><b data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">For The General Reader :</span></b><br data-dcnode-id="1456"><span data-dcnode-id="1455" instrument_node="">Those who want to be updated on just how we got here might do a lot worse than the Isikoff / Corn account. I can't rate its accessibility for the average reader, because I came to it having read hundreds, maybe thousands of pages about this already. So a daunting cast of characters was, for myself anyway, almost entirely comprised of persons I knew something about already. I can say, though, this doesn't try for being a completist sort of account, either. It struck me that it seemed well-paced and concise, though probably best suited to a general readership with some familiarity with the material. </span><br data-dcnode-id="1454"><br data-dcnode-id="1453"><span data-dcnode-id="1452" instrument_node="">Several thoughts came to mind in reading through this. In no particular order: </span><br data-dcnode-id="1451"><br data-dcnode-id="1450"><b data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">For The Record :</span></b><br data-dcnode-id="1447"><span data-dcnode-id="1446" instrument_node="">Trump is definitely a Russian asset. That’s not even up for debate. Anyone who’s read spy fiction or non-fiction knows --there are an infinite array of levels of asset, from the deeply embedded government mole who passes nuke schematics to the enemy-- all the way down the line to the hat-check girl at the after-hours club, who can tell tales on important somebodies. Or perhaps as importantly, </span><i data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">even just the nights they were out late</span></i><span data-dcnode-id="1443" instrument_node="">. So Trump is somewhere on the spectrum, even if not very consciously so, and even if we go only by his own public admissions. </span><br data-dcnode-id="1442"><br data-dcnode-id="1441"><span data-dcnode-id="1440" instrument_node="">One of the things I’m realizing as I read the Russian Roulette book--- is that the Dnc hack and then the WikiLeaks / Guccifer leaks of same-- </span><i data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">did not really matter in the election</span></i><span data-dcnode-id="1437" instrument_node="">. Think back. What did we find out from those leaks (which were emails from HRC, Podesta, Mook, Abedin, Wasserman-Shultz, etc etc)…? Net value: nyet. We learned crap-level gossip, like the Dnc was favoring HRC and was mean to Bernie Sanders. That Donna Brazile had handed off one of the debate questions to the Clinton people. Junk level anecdotes. Barely a news item there in any of it. </span><br data-dcnode-id="1436"><br data-dcnode-id="1435"><span data-dcnode-id="1434" instrument_node="">But the media narrative says the Dnc hacks were the foundation of the whole Russiagate thing, and the right wing points to it as being standard election dirty tricks, that there was no actual criminal activity, that Mueller is on a witch hunt, etc etc. </span><br data-dcnode-id="1433"><br data-dcnode-id="1432"><span data-dcnode-id="1431" instrument_node="">Thing is, the CozyBear / FancyBear actions in the matter overall-- that is, the active measures from Russian intelligence-- are what count. Not the effectiveness of the data they dropped. But rather in the sense that all of it, the thousands of pages, the death by a million cuts, swelled the disinformation being filtered into the American electorate. That overall, Clinton was untrustworthy because of emails or something, and Trump was coarse but just the antidote to that smirking liberal elitism which despises real Americans--yes, but the bigger picture. </span><br data-dcnode-id="1430"><br data-dcnode-id="1429"><span data-dcnode-id="1428" instrument_node="">Because the Dnc thing is like number 137 on a list of Trump-Russian-Intelligence interactions, starting long long ago with the Russian funny-money buying his properties in the 8os. Once you concede that Putin’s Russia is a mafia state, it’s clearer than clear that his intel services and financial entities--- are mafia mechanisms. That ensnared silly, grabby, tabloid-trashy Trump. It isn’t a political story, or a spy story. It’s a Russian Mafia story. </span><br data-dcnode-id="1427"><span data-dcnode-id="1426" instrument_node=""> </span><br data-dcnode-id="1425"><span data-dcnode-id="1424" instrument_node="">So to even discuss Trump as “an asset” is wrong. Because that kind of implies agent, actor, some independence but aligned with a foreign minder, on certain accounts. Because that hat-check girl can actually cut off her arrangement, steer clear, but Trump can't. When you go with the more likely Russian Mafia overlay-- he’s a front-man, an owned employee, a low-level somebody who fronts for the made men-- you understand what he is. Simply described, Trump is a puppet. And his every move is furtive, guilty, a default denial before the accusation even arises … </span><br data-dcnode-id="1423"><br data-dcnode-id="1422"><b data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">For The Trainspotters :</span></b><br data-dcnode-id="1419"><span data-dcnode-id="1418" instrument_node="">Some fun factoids emerge in Russian Roulette, notably a few that aren't quite common knowledge: </span><blockquote data-dcnode-id="1399"><span data-dcnode-id="1417" instrument_node=""> * The HRC campaign nearly did a little spy catching themselves, but thought better of it: Clinton campaign manager Rob Mook, armed with warnings from the Fbi, </span><i data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">"... wondered if the campaign could mount what he called a "honeypot" operation. The Clinton team would plant phony information about Clinton or the campaign within the Dnc computer system and wait to see if the Trump campaign or its allies later made public use of it. If they did, it would prove that the Trump camp was in league with the Russians."</span></i><span data-dcnode-id="1414" instrument_node=""> The idea was voted down as being too melodramatic. Probably a good call. But they could have done it anyway, kept it quiet, and tucked it up their sleeve for insurance. Hindsight.</span><br data-dcnode-id="1413"><span data-dcnode-id="1412" instrument_node=""> </span><br data-dcnode-id="1411"><span data-dcnode-id="1410" instrument_node=""> * From one of the Steele memos that comprise the dossier, a miniscule notation, an accusation, that the Trump camp was </span><i data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">"using moles within the Dnc and hackers in the U.S.-- to provide intelligence to Russia."</span></i><span data-dcnode-id="1407" instrument_node=""> Small thing, but no Dnc 'mole' has ever surfaced or been identified, anyone working for Trump within the Dnc at cross-purposes to the campaign. Interesting because almost all of the Steele Dossier material has been borne out so far, and if this is the case, that person is in a position to know a lot of things. The mere existence of such a person would be direct evidence of collusion, full stop.</span><br data-dcnode-id="1406"><span data-dcnode-id="1405" instrument_node=""> </span><br data-dcnode-id="1404"><span data-dcnode-id="1403" instrument_node=""> * This one is an Analysis sort of point, but valid nonetheless: it was judged within the Obama security apparatus and cabinet that returning fire, in cyber terms, for what they were watching coming in from Russia would put the U.S. at a disadvantage. </span><i data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">"In one of the meetings, Director of National Intelligence Clapper said that he was worried that Russia might respond with cyberattacks against America's critical infrastructure--and possibly shut down the electrical grid."</span></i><span data-dcnode-id="1400" instrument_node=""> Validating the inherent superiority, in asymmetrical war conditions, of the party that has less to lose (than a tech-driven superpower like the U.S.)</span></blockquote><br data-dcnode-id="1398"><span data-dcnode-id="1397" instrument_node=""> </span><br data-dcnode-id="1396"><b data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">For Fuck's Sake : </span></b><span data-dcnode-id="1393" instrument_node=""> </span><br data-dcnode-id="1392"><span data-dcnode-id="1391" instrument_node="">All this isn't about some zany "dirty tricks" from a bygone election. Asymmetrical war isn't cold war, with its brinksmanship and balance-of-power nuances. It is direct confrontation via other means, actual hot war, with the lesser party intending to inflict Pearl Harbor or 9-11 type physical damages on the stronger party, with surprise as the defining element.</span><br data-dcnode-id="1390"><span data-dcnode-id="1389" instrument_node=""> </span><br data-dcnode-id="1388"><i data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">It was two days before the election, and Clint Watts was still trying to warn America. The former FBI analyst and two colleagues published a report noting that they had monitored more than seven thousand media accounts in the previous thirty months and had discerned a "small army of social media operatives" with the goal of "moving misinformation and disinformation from primarily Russian-influenced circles into the general social media population." They saw an integrated and coordinated Russian attack.</span></i><br data-dcnode-id="1385"><br data-dcnode-id="1384"><span data-dcnode-id="1383" instrument_node="">There are two prongs to the Trump Russia story, as I see it. First is the long and dire history of citizen Trump, his failed loans, marriages, businesses, careers, his later bankruptcies and finally, self-reinvention. Which came with the aid of his money-laundering escapades involving secret, dirty Russian money. The Second is the closely related campaign from the New Russia, the mafia state, the entity that regrets its failed status since the Wall came down and the country went gangster. This is the asymmetrical-war-plan of disinformation and disruption, using financial and cyber means mainly-- though in a last resort, military, as in Ukraine-- to reassert itself into what it considers its rightful superpower status.</span></span><span data-dcnode-id="1381" instrument_node="">

</span><span data-dcnode-id="1300" id="freeTextContainer8547679990882330552"><span data-dcnode-id="1301" instrument_node="">Unless you've experienced sensory deprivation for the last year and a half, you know that Russians influenced the 2016 election. Overwhelming evidence has come to light and dribbled out through hundreds of news stories and books. Not to mention the indictments that have already come down through Robert Mueller's investigation of the Trump campaign's multiple links to the Kremlin. Much less well known outside the confines of the American intelligence establishment are the facts about exactly what</span></span><span data-dcnode-id="1299" instrument_node="">
</span><span data-dcnode-id="1270" id="freeText8547679990882330552" style="display:none"><span data-dcnode-id="1298" instrument_node="">Unless you've experienced sensory deprivation for the last year and a half, you know that Russians influenced the 2016 election. Overwhelming evidence has come to light and dribbled out through hundreds of news stories and books. Not to mention the indictments that have already come down through Robert Mueller's investigation of the Trump campaign's multiple links to the Kremlin. Much less well known outside the confines of the American intelligence establishment are the facts about exactly what steps the Russian government took to destabilize US society and help Donald Trump win the White House. Now come veteran investigative reporters Michael Isikoff and David Corn with Russian Roulette. The book's subtitle is the key: The Inside Story of Putin's War on America and the Election of Donald Trump.&nbsp;</span><br data-dcnode-id="1297"><br data-dcnode-id="1296"><span data-dcnode-id="1295" instrument_node="">If you've closely followed the unfolding story about the multiple connections between Donald Trump's associates and top Kremlin officials, the so-called oligarchs, and the Russian mafia, you're unlikely to find much in Russian Roulette that will surprise you. The book contains abundant detail, fleshing out the often-sketchy stories that have surfaced in the press; seemingly, every individual name that has come to light over the past eighteen months in the reporting of this unfolding scandal figures in the authors' account. There are few startling revelations in this story, which has been extensively covered by the New York Times, the Washington Post, MSNBC, CNN, The New Yorker, and other American news outlets.</span><br data-dcnode-id="1294"><br data-dcnode-id="1293"><span data-dcnode-id="1292" instrument_node="">The true value in Russian Roulette lies elsewhere. Isikoff and Corn's book excels in its detailed description of the massive effort mounted by Russian intelligence to deepen the divisions and distrust within American society, destroy Hillary Clinton's reputation, and help Donald Trump win the presidency. In Russian Roulette, you'll meet the players central to the massive Russian campaign, including the St. Petersburg-based Internet Research Agency and the two large hacker groups dubbed Cozy Bear and Fancy Bear by US intelligence. At a minimum, two hundred Russians were engaged in the Kremlin-driven effort over at least two years. Only in recent months has the full extent of this campaign come to the attention of the US public.</span><br data-dcnode-id="1291"><br data-dcnode-id="1290"><span data-dcnode-id="1289" instrument_node="">Vladimir Putin and the 2016 election</span><br data-dcnode-id="1288"><span data-dcnode-id="1287" instrument_node="">Despite the repeated denials from the White House and Trump loyalists in Congress and on Fox News, there can be no doubt whatsoever that the Russian influence campaign was real. Early in January 2017, two weeks before Donald Trump's inauguration as President, the heads of the four top US intelligence agencies issued a joint statement. "With 'high confidence,' the assessment stated, 'Russian President Vladimir Putin ordered an influence campaign in 2016 aimed at the US presidential election. Russia's goals were to undermine faith in the US democratic process, denigrate Secretary Hillary Clinton, and harm her electability and potential presidency. We further assess Putin and the Russian Government developed a clear preference for President-elect Trump.'" The statement was signed by&nbsp;James Clapper&nbsp;(Director of National Intelligence), John Brennan&nbsp;(CIA), Michael Rogers&nbsp;(NSA), and James Comey (FBI), the four most senior intelligence officials in the US government under President Barack Obama. Given the rivalry within the intelligence community—and the time it took them to reach agreement on the wording—this assessment is remarkable.</span><br data-dcnode-id="1286"><br data-dcnode-id="1285"><span data-dcnode-id="1284" instrument_node="">Did the Russians help Donald Trump win?</span><br data-dcnode-id="1283"><span data-dcnode-id="1282" instrument_node="">More than 130 million votes were cast in the 2016 presidential election. Innumerable factors contributed to Trump's victory, including strategic errors by Hillary Clinton and her staff, Trump's demagogic skills, successful years-long Republican efforts to suppress minority voting, the failure of the Obama White House to highlight and respond to the Russian influence campaign, and James Comey's misleading announcement eleven days before the election that the FBI was investigating a fresh collection of Hillary Clinton emails. If a mere 70,000 votes had changed hands in the three swing states of Pennsylvania, Ohio, and Wisconsin, Clinton would have won the Electoral College as well as the popular vote.</span><br data-dcnode-id="1281"><br data-dcnode-id="1280"><span data-dcnode-id="1279" instrument_node="">Given these facts, it's impossible to determine whether the Russian campaign was decisive. And the joint statement by the intelligence community insisted that "'We did not make an assessment of the impact that Russian activities had on the outcome of the 2016 election.'" Yet, reading between the lines, it appears the the authors have drawn their own conclusion—that Putin's gambit did in fact play a significant role in Trump's election.&nbsp;Isikoff and Corn drive this point home with a colorful detail: "the Russian Duma burst into applause when informed Trump was the victor. Putin's operation—which had fueled divisions within the United States and influenced an American presidential election—had succeeded."</span><br data-dcnode-id="1278"><br data-dcnode-id="1277"><span data-dcnode-id="1276" instrument_node="">About the authors</span><br data-dcnode-id="1275"><span data-dcnode-id="1274" instrument_node="">Michael Isikoff&nbsp;is currently the Chief Investigative Correspondent for Yahoo! News. He previously served in senior roles at Newsweek and NBC News. Russian Roulette is his third book.</span><br data-dcnode-id="1273"><br data-dcnode-id="1272"><span data-dcnode-id="1271" instrument_node="">David Corn&nbsp;is chief of the Washington bureau for Mother Jones.&nbsp;Previously, he was The Nation's Washington correspondent. He won the prestigious George Polk Award for his reporting in 2013. Corn&nbsp;has written six books, including one novel and four other nonfiction works as well as&nbsp;Russian Roulette.</span></span><span data-dcnode-id="1269" instrument_node="">

</span><span data-dcnode-id="1182" id="freeTextContainer8658996828450820955"><span data-dcnode-id="1189" instrument_node="">Please don’t read this review if you plan on arguing politics. </span><br data-dcnode-id="1188"><br data-dcnode-id="1187"><span data-dcnode-id="1186" instrument_node="">My interest in history is more investigative. Why did that happen? What if y happened instead of x? How did we get to here? Where does this end?</span><br data-dcnode-id="1185"><br data-dcnode-id="1184"><span data-dcnode-id="1183" instrument_node="">So this book answers a lot for me. I have been following and researching the Russian interest in the election since the “Russia, if you're listening...” declaration in the debates. I read Bannon’s essays on overthrowing the Vatican and the Constitution. I read the bios of the Cabinet members </span></span><span data-dcnode-id="1181" instrument_node="">
</span><span data-dcnode-id="1167" id="freeText8658996828450820955" style="display:none"><span data-dcnode-id="1180" instrument_node="">Please don’t read this review if you plan on arguing politics. </span><br data-dcnode-id="1179"><br data-dcnode-id="1178"><span data-dcnode-id="1177" instrument_node="">My interest in history is more investigative. Why did that happen? What if y happened instead of x? How did we get to here? Where does this end?</span><br data-dcnode-id="1176"><br data-dcnode-id="1175"><span data-dcnode-id="1174" instrument_node="">So this book answers a lot for me. I have been following and researching the Russian interest in the election since the “Russia, if you're listening...” declaration in the debates. I read Bannon’s essays on overthrowing the Vatican and the Constitution. I read the bios of the Cabinet members and saw how they fit into his plan to appoint members who would self destruct each position. I looked for sources of Facebook posts before the election and discovered no valid source and proof to discredit many of the posts. I’ve been fortunate to travel since retiring so talked macropolitics with Europeans and listened as they matter of factly discussed the Russian interference in Brexit. Several even told me that Europeans had proof of all of this years ago. </span><br data-dcnode-id="1173"><br data-dcnode-id="1172"><span data-dcnode-id="1171" instrument_node="">So I was going to read the book regardless. The authors are both credible and had been unbiased in their previous works. It was easier to understand than I expected. The chronological series of events form a connect the proven and documented dots so well that you have to ask why the media chose to waste time on superfluous events instead. </span><br data-dcnode-id="1170"><br data-dcnode-id="1169"><span data-dcnode-id="1168" instrument_node="">Since it is impolite to talk politics in the US, I tried to contain my opinions as much as possible. (Ok, some know I wasn’t always able to do so.) But I’m asking others to read and research any questions as they do. And this is a big request, to view the ongoing investigation in the same manner. Let the facts emerge before deciding the verdict.</span></span><span data-dcnode-id="1166" instrument_node="">

</span><span class="readable" data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">“One day in September 2015, FBI agent Adrian Hawkins placed a call to the Democratic National Committee headquarters in Washington, D.C., and asked to speak to the person in charge of technology. He was routed to the DNC help desk, which transferred the call to Yared Tamene, a young IT specialist with The MIS Department, a consulting firm hired by the DNC. After identifying himself, Hawkins told Tamene that he had reason to believe that at least one computer on the DNC’s network was compromised. He asked if the DNC was aware of this and what it was doing. Tamene had nothing to do with cybersecurity and knew little about the subject. He was a mid-level network administrator; his basic IT duties for the DNC were to set up computer accounts for employees and be on call to deal with any problems. When he got the call, Tamene was wary. Was this a joke or, worse, a dirty trick? He asked Hawkins if he could prove he was an FBI agent, and, as Tamene later wrote in a memo, “he did not provide me with an adequate response.… At this point, I had no way of differentiating the call I received from a prank call.” Hawkins, though, was real. He was a well-regarded agent in the FBI’s cyber squad. And he was following a legitimate lead in a case that would come to affect a presidential election. Earlier in the year, U.S. cyber warriors intercepted a target list of about thirty U.S. government agencies, think tanks, and several political organizations designated for cyberattacks by a group of hackers known as APT 29. APT stood for Advanced Persistent Threat—technojargon for a sophisticated set of actors who penetrate networks, insert viruses, and extract data over prolonged periods of time.”</span></span><span data-dcnode-id="234" instrument_node="">
