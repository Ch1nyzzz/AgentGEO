</span><span data-dcnode-id="5122" id="freeTextContainer4196881711975398868"><span data-dcnode-id="5128" instrument_node="">The incredible, harrowing account of how American democracy was hacked by Moscow as part of a covert operation to influence the U.S. election and help Donald Trump gain the presidency.</span><br data-dcnode-id="5127"><br data-dcnode-id="5126"><i data-dcnode-id="5124"><span data-dcnode-id="5125" instrument_node="">Russian Roulette</span></i><span data-dcnode-id="5123" instrument_node=""> is a story of political skullduggery unprecedented in American history. It weaves together tales of international intrigue, cyber espionage, and superpower rivalry. After U.S</span></span><span data-dcnode-id="5121" instrument_node="">
</span><span data-dcnode-id="5106" id="freeText4196881711975398868" style="display:none"><span data-dcnode-id="5120" instrument_node="">The incredible, harrowing account of how American democracy was hacked by Moscow as part of a covert operation to influence the U.S. election and help Donald Trump gain the presidency.</span><br data-dcnode-id="5119"><br data-dcnode-id="5118"><i data-dcnode-id="5116"><span data-dcnode-id="5117" instrument_node="">Russian Roulette</span></i><span data-dcnode-id="5115" instrument_node=""> is a story of political skullduggery unprecedented in American history. It weaves together tales of international intrigue, cyber espionage, and superpower rivalry. After U.S.-Russia relations soured, as Vladimir Putin moved to reassert Russian strength on the global stage, Moscow trained its best hackers and trolls on U.S. political targets and exploited WikiLeaks to disseminate information that could affect the 2016 election.</span><br data-dcnode-id="5114"><br data-dcnode-id="5113"><span data-dcnode-id="5112" instrument_node="">The Russians were wildly successful and the great break-in of 2016 was no "third-rate burglary." It was far more sophisticated and sinister — a brazen act of political espionage designed to interfere with American democracy. At the end of the day, Trump, the candidate who pursued business deals in Russia, won. And millions of Americans were left wondering, what the hell happened? This story of high-tech spying and multiple political feuds is told against the backdrop of Trump's strange relationship with Putin and the curious ties between members of his inner circle — including Paul Manafort and Michael Flynn — and Russia.</span><br data-dcnode-id="5111"><br data-dcnode-id="5110"><i data-dcnode-id="5108"><span data-dcnode-id="5109" instrument_node="">Russian Roulette</span></i><span data-dcnode-id="5107" instrument_node=""> chronicles and explores this bizarre scandal, explains the stakes, and answers one of the biggest questions in American politics: How and why did a foreign government infiltrate the country's political process and gain influence in Washington?</span></span><span data-dcnode-id="5105" instrument_node="">

</span><span data-dcnode-id="4382" id="freeTextContainer10715358740065023290"><br data-dcnode-id="4399"><span data-dcnode-id="4398" instrument_node="">Can there be such a thing as a </span><i data-dcnode-id="4396"><span data-dcnode-id="4397" instrument_node="">definitive</span></i><span data-dcnode-id="4395" instrument_node=""> account of a complex, evolving political scandal? Perhaps not, but </span><i data-dcnode-id="4393"><span data-dcnode-id="4394" instrument_node="">if</span></i><span data-dcnode-id="4392" instrument_node=""> such a thing were possible, </span><i data-dcnode-id="4390"><span data-dcnode-id="4391" instrument_node="">Russian Roulette</span></i><span data-dcnode-id="4389" instrument_node=""> would be that book.</span><br data-dcnode-id="4388"><br data-dcnode-id="4387"><span data-dcnode-id="4386" instrument_node="">There is a professionalism and solidity to Michael Isikoff and David Corn’s reporting that insures </span><i data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">Russian Roulette</span></i><span data-dcnode-id="4383" instrument_node="">'s continuing relevance, despite the changing landscape of scandal, the revolving carousel of malefactors. Isikoff and Corn are good, old-fashioned journalists, with a brisk, economic reportorial style (their </span></span><span data-dcnode-id="4381" instrument_node="">
</span><span data-dcnode-id="4348" id="freeText10715358740065023290" style="display:none"><br data-dcnode-id="4380"><span data-dcnode-id="4379" instrument_node="">Can there be such a thing as a </span><i data-dcnode-id="4377"><span data-dcnode-id="4378" instrument_node="">definitive</span></i><span data-dcnode-id="4376" instrument_node=""> account of a complex, evolving political scandal? Perhaps not, but </span><i data-dcnode-id="4374"><span data-dcnode-id="4375" instrument_node="">if</span></i><span data-dcnode-id="4373" instrument_node=""> such a thing were possible, </span><i data-dcnode-id="4371"><span data-dcnode-id="4372" instrument_node="">Russian Roulette</span></i><span data-dcnode-id="4370" instrument_node=""> would be that book.</span><br data-dcnode-id="4369"><br data-dcnode-id="4368"><span data-dcnode-id="4367" instrument_node="">There is a professionalism and solidity to Michael Isikoff and David Corn’s reporting that insures </span><i data-dcnode-id="4365"><span data-dcnode-id="4366" instrument_node="">Russian Roulette</span></i><span data-dcnode-id="4364" instrument_node="">'s continuing relevance, despite the changing landscape of scandal, the revolving carousel of malefactors. Isikoff and Corn are good, old-fashioned journalists, with a brisk, economic reportorial style (their two voices are indistinguishable), and a knack for choosing just the right facts and presenting them in just the right order to illuminate the murky depths of a complex situation. They exhibited those qualities in </span><i data-dcnode-id="4362"><span data-dcnode-id="4363" instrument_node="">Hubris</span></i><span data-dcnode-id="4361" instrument_node="">, that useful book on the “selling of the Iraq War,” and they exhibit those qualities here too.</span><br data-dcnode-id="4360"><br data-dcnode-id="4359"><span data-dcnode-id="4358" instrument_node="">Since I have read a good deal about Trump, his attendant rogues and their crimes, I found much familiar material here, but, even when Corn and Isikoff were telling me things I already knew, the writers always made the timeline clearer, and clarified the important distinction between what is known, what can be surmised, what is mere speculation. I also found the book particularly helpful in its historical background: Putin’s rise, the KGB roots of current Russian intelligence, Clinton’s tenure as Secretary of State, the wide-ranging Clinton foundation, and—perhaps most important of all—Trump’s quest for the “holy grail” of a great Russian hotel and a personal relationship with his favorite autocrat. In every case, </span><i data-dcnode-id="4356"><span data-dcnode-id="4357" instrument_node="">Russian Roulette</span></i><span data-dcnode-id="4355" instrument_node=""> told me just enough to prepare me for the rest of the story, without ever overtaxing my intellect or exhausting my patience. (This is true even of the IT and hacking aspects of the tale, and that is saying something.)</span><br data-dcnode-id="4354"><br data-dcnode-id="4353"><span data-dcnode-id="4352" instrument_node="">Perhaps, though, the saddest and most informative part of the book is its account of the Obama administration in the days immediately before the election, how everything—including Obama’s overweening humility and McConnell’s unrelenting partisanship—conspired to prevent America from learning the truth about Russia. It is an account of lost possibilities and failures of courage—lapses that the American people are still paying for, and will continue to pay for throughout the years to come.</span><br data-dcnode-id="4351"><br data-dcnode-id="4350"><span data-dcnode-id="4349" instrument_node="">Finally, for those who like a brief take-away, here it is. Is there a “pee-pee tape”? I doubt it. Is there criminal collusion in the White House? I'd be willing to bet on it. (But I'd only bet if the stakes aren't too high. I refuse to play Russian Roulette.)</span></span><span data-dcnode-id="4347" instrument_node="">

</span><span data-dcnode-id="4229" id="freeTextContainer15356839161257649109"><b data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">”Putin had once called the collapse of the Soviet Union the ‘greatest geopolitical catastrophe of the century.’ He was a Russian nationalist to his core. He wanted to extend Russian power, restoring its spheres of influence. He was an autocrat in the long tradition of Russian strongmen.”</span></b><br data-dcnode-id="4241"><br data-dcnode-id="4240"><a data-dcnode-id="4236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s1183.photobucket.com/user/jkeeten/media/Putin203_zpslir23l3p.jpg.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="4239" instrument_node="">
</span><img alt=" photo Putin203_zpslir23l3p.jpg" class="gr-hostedUserImg" data-dcnode-id="4238" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1536933566i/26301425.jpg&amp;raw"><span data-dcnode-id="4237" instrument_node="">
</span></a><br data-dcnode-id="4235"><b data-dcnode-id="4233"><span data-dcnode-id="4234" instrument_node="">Thank you! America!</span></b><br data-dcnode-id="4232"><br data-dcnode-id="4231"><span data-dcnode-id="4230" instrument_node="">To me, the biggest threat to the continued security of the world is Vladimir Putin. He wants to build through creating chaos. I grew up under the auspicious umbrella of the Cold War. We wer</span></span><span data-dcnode-id="4228" instrument_node="">
</span><span data-dcnode-id="4099" id="freeText15356839161257649109" style="display:none"><b data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">”Putin had once called the collapse of the Soviet Union the ‘greatest geopolitical catastrophe of the century.’ He was a Russian nationalist to his core. He wanted to extend Russian power, restoring its spheres of influence. He was an autocrat in the long tradition of Russian strongmen.”</span></b><br data-dcnode-id="4225"><br data-dcnode-id="4224"><a data-dcnode-id="4220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s1183.photobucket.com/user/jkeeten/media/Putin203_zpslir23l3p.jpg.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="4223" instrument_node="">
</span><img alt=" photo Putin203_zpslir23l3p.jpg" class="gr-hostedUserImg" data-dcnode-id="4222" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1536933566i/26301425.jpg&amp;raw"><span data-dcnode-id="4221" instrument_node="">
</span></a><br data-dcnode-id="4219"><b data-dcnode-id="4217"><span data-dcnode-id="4218" instrument_node="">Thank you! America!</span></b><br data-dcnode-id="4216"><br data-dcnode-id="4215"><span data-dcnode-id="4214" instrument_node="">To me, the biggest threat to the continued security of the world is Vladimir Putin. He wants to build through creating chaos. I grew up under the auspicious umbrella of the Cold War. We were replacing war with spycraft, much the same way American football has replaced gladiator combat. Not that there weren’t bobbles. The Cuban Missile Crisis was too real, too close. The possibility of something going wrong during that jostling of superpowers that would light the tinder of WW3 certainly raised the blood pressure and anxiety of everyone in the United States and the Soviet Union, not to mention all the European countries who resided in-between. The spectre of nuclear holocaust had escaped the celluloid images of movies and become tangible in the bright light of day. </span><br data-dcnode-id="4213"><br data-dcnode-id="4212"><span data-dcnode-id="4211" instrument_node="">During the October 22nd, 2012, Presidential debate between Barack Obama and Mitt Romney, there was an exchange about Russia that I found personally very uncomfortable. Romney, in his book, had stated that Russia was our greatest geopolitical enemy. In the debate, Obama was able to pounce on this concept with what would be the zinger of the debate season. </span><b data-dcnode-id="4209"><span data-dcnode-id="4210" instrument_node="">“The 1980s are now calling to ask for their foreign policy back because the Cold War’s been over for 20 years.”</span></b><span data-dcnode-id="4208" instrument_node=""> The right answer, of course, for this debate season was all about stopping al-Qaeda not Russia. </span><br data-dcnode-id="4207"><br data-dcnode-id="4206"><span data-dcnode-id="4205" instrument_node="">Obama scored points with his base and independent voters with that response. We do like to be entertained by witty remarks. Obama had made Romney sound out of touch with what were the most important threats to national security. It was brilliant. The problem is that I personally still saw not so much the Russian people, but Vladimir Putin as the biggest threat to national security. 9/11 was still fresh in everyone’s mind, and fanatical Islamic terrorists were the prefered villains in American minds. </span><br data-dcnode-id="4204"><br data-dcnode-id="4203"><span data-dcnode-id="4202" instrument_node="">When Obama’s plan to RESET with Russia came out, I was hopeful, but cynical, about what would come of it. Since I truly believe that Putin’s most important goal is to assemble the old Soviet Union, how exactly would RESET really work? I felt that Obama and his team were naive. Our embassy people in Russia were being harassed with vandalism, break-ins, aggressive abuse in the street, and being followed everywhere they went. </span><br data-dcnode-id="4201"><br data-dcnode-id="4200"><span data-dcnode-id="4199" instrument_node="">Let’s flash forward to 2016.</span><br data-dcnode-id="4198"><br data-dcnode-id="4197"><b data-dcnode-id="4192"><span data-dcnode-id="4196" instrument_node="">
</span><i data-dcnode-id="4194"><span data-dcnode-id="4195" instrument_node="">”Putin, proud and vain, hated to be challenged and ridiculed. And Clinton, as he saw it, was behind all this (protests against Putin in Russia). For him, this grudge would smolder for years—with consequences no one in the U.S. government could foresee.”</span></i><span data-dcnode-id="4193" instrument_node="">
</span></b><br data-dcnode-id="4191"><br data-dcnode-id="4190"><span data-dcnode-id="4189" instrument_node="">If Hillary Clinton became the Democratic nominee for President in 2016, it was clear that Putin was going to do everything he could to destroy her. At what point did Putin believe that Donald J. Trump would emerge out of a crowded field as the Republican nominee for President? Was it before he had even declared he was running? </span><br data-dcnode-id="4188"><br data-dcnode-id="4187"><span data-dcnode-id="4186" instrument_node="">The relationship between Putin and Trump is a slippery slope of half known truths. This book outlines the contacts that Trump and his team had with Russia prior to the election. Trump has had a long term desire to build a Trump Tower in Moscow. He had two deals almost come together, but each time they fell apart due to circumstances beyond his control. </span><br data-dcnode-id="4185"><br data-dcnode-id="4184"><span data-dcnode-id="4183" instrument_node="">I do wonder if it is possible to separate Trump’s personal ambitions from his political aspirations. </span><br data-dcnode-id="4182"><br data-dcnode-id="4181"><span data-dcnode-id="4180" instrument_node="">I about fell out of my chair when I heard Trump asked Russia to hack Clinton’s emails, implying a shared alliance with the Russian hackers and his team. It was very reckless rhetoric, a signature of Trump’s personality.</span><br data-dcnode-id="4179"><br data-dcnode-id="4178"><span data-dcnode-id="4177" instrument_node="">So yes, there are rolling black clouds of smoke surrounding the Trump team and their involvement with the Russians. Were they just naive of the law? This is not really an excuse I care to embrace because ignorance of the law has never worked for me in my own life. Or was there a true sinister attempt to collude or conspire to win the election? </span><br data-dcnode-id="4176"><br data-dcnode-id="4175"><a data-dcnode-id="4171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s1183.photobucket.com/user/jkeeten/media/All20the20Presidents20Men_zpsqnd5uvuc.jpg.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="4174" instrument_node="">
</span><img alt=" photo All20the20Presidents20Men_zpsqnd5uvuc.jpg" class="gr-hostedUserImg" data-dcnode-id="4173" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1536933566i/26301424.jpg&amp;raw"><span data-dcnode-id="4172" instrument_node="">
</span></a><br data-dcnode-id="4170"><b data-dcnode-id="4168"><span data-dcnode-id="4169" instrument_node="">All the President’s Men! How many of these men will be wearing orange jumpsuits within the next six months?</span></b><br data-dcnode-id="4167"><br data-dcnode-id="4166"><span data-dcnode-id="4165" instrument_node="">As I see the accusations unfold and the Mueller probe continue to convict Trump people of crimes that are very real crimes, but not tied to Russian collusion, I do wonder if there is going to be a big pay off, or are we going to just send a bunch of shady, rich guys to prison? I applaud that and wish we could send a lot more of them to jail. I do think it says something about Trump’s character, the type of people with whom he associates. </span><br data-dcnode-id="4164"><br data-dcnode-id="4163"><span data-dcnode-id="4162" instrument_node="">And this too. </span><br data-dcnode-id="4161"><br data-dcnode-id="4160"><b data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">”Clinton had ripped into Trump for praising ‘dictators like Vladimir Putin.’ She added, ‘I’ll leave it to the psychiatrists to explain his affection for tyrants.’”</span></b><br data-dcnode-id="4157"><br data-dcnode-id="4156"><span data-dcnode-id="4155" instrument_node=""> Not just Putin, but the Fat Baby from North Korea, as well. </span><br data-dcnode-id="4154"><br data-dcnode-id="4153"><span data-dcnode-id="4152" instrument_node="">It is about the economy right? I have had numerous Trump voters tell me, don’t worry about the Fake News or the Tweets or even what Trump says; just enjoy the robust economy. Probably the more baffling comments I get are the dismissive ones about Russia. They don’t see them as a threat, or they think that Trump can handle them. </span><br data-dcnode-id="4151"><br data-dcnode-id="4150"><span data-dcnode-id="4149" instrument_node="">Did Helsinki make anyone think that Trump can handle Putin?</span><br data-dcnode-id="4148"><br data-dcnode-id="4147"><span data-dcnode-id="4146" instrument_node="">All part of the plan right? Trump has him right where he wants him. *sigh* </span><br data-dcnode-id="4145"><br data-dcnode-id="4144"><span data-dcnode-id="4143" instrument_node="">How about this? Does this bother anyone?</span><br data-dcnode-id="4142"><br data-dcnode-id="4141"><b data-dcnode-id="4139"><span data-dcnode-id="4140" instrument_node="">”’Trump! Trump! Trump!’ The crowd at the bar roared, as the election results came in. There was a large, life-sized photo of Trump in one corner, where Trump fans could take selfies. And a photo of Putin. The bar was in downtown Moscow.”</span></b><br data-dcnode-id="4138"><br data-dcnode-id="4137"><span data-dcnode-id="4136" instrument_node="">I’ve never heard of Russia being so excited about the election of an American president. I would rather they were groaning at our election results.</span><br data-dcnode-id="4135"><br data-dcnode-id="4134"><span data-dcnode-id="4133" instrument_node=""> The hackers of Russia were bold under Obama and continue to be bold under Trump. </span><i data-dcnode-id="4131"><span data-dcnode-id="4132" instrument_node="">” At the White House, Daniel, too, was struck by the Russians’ new aggressiveness—and their noisiness. ‘It was almost like they double-dared us,’ he recalled. ‘They became even more brazen. They didn’t care that we could see them.’”</span></i><br data-dcnode-id="4130"><br data-dcnode-id="4129"><span data-dcnode-id="4128" instrument_node="">We know the hacking is being orchestrated by the Russian government and the Chinese government as well. A new form of Cold War has begun although it feels pretty warm. To me having foreign powers attempting to hack vital secrets or launching insidious attacks on our elections are acts of war, and we need to hit them back hard with more sanctions or hacking attacks of our own. Putin does not understand anything but power and pain. Make him feel the pain for his actions. Make him reluctant to condone hacking attacks on any nation. We must keep our elections safe, and social media needs to keep Fake News from permeating our society. </span><br data-dcnode-id="4127"><br data-dcnode-id="4126"><span data-dcnode-id="4125" instrument_node="">All news is fake according to Trump. It is a brazenly good strategy. If his supporters won’t believe the real news, then they won’t believe the criticisms of his administration either. If Mueller does prove collusion between Trump or members of Trump’s team or both with Russia to influence an American election, will it matter to his supporters or to Congress? Will a Democratic Congress do anything about it, or do they wait for 2020 and let the election box decide? The problems run deep on all these matters I’ve discussed. I decided to read this book because I wanted to review all the known information that is of concern regarding the Trump relationship with Russia to be prepared for what Mueller will reveal after the November elections. </span><br data-dcnode-id="4124"><br data-dcnode-id="4123"><span data-dcnode-id="4122" instrument_node="">I do believe that Putin does have something on Trump. </span><br data-dcnode-id="4121"><br data-dcnode-id="4120"><b data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node="">”FSB has compromised TRUMP through his activities in MOSCOW sufficiently to be able to blackmail him. According to several knowledgeable sources, his conduct in Moscow has included perverted sexual acts which have been arranged/monitored by the FSB.”</span></b><br data-dcnode-id="4117"><br data-dcnode-id="4116"><span data-dcnode-id="4115" instrument_node="">I believe that Trump knows Putin has something on him as well. It seems that Trump gets off on watching Russian hookers pee. Can you imagine if something like that had been revealed about Obama? The Right would have crucified him, not to mention the sanctimonious liberals in his own party. I guess for the Right to be upset about any criticism or any untoward behavior from Trump they would have to believe it first. </span><br data-dcnode-id="4114"><br data-dcnode-id="4113"><span data-dcnode-id="4112" instrument_node="">Putin may not be in as good of a position as he thinks. </span><br data-dcnode-id="4111"><br data-dcnode-id="4110"><span data-dcnode-id="4109" instrument_node="">As much as we want to make Russia all about Trump, and sometimes it even seems like Trump takes malicious glee in making Russia about him as well, Trump will go away. The problem that will remain will be Putin. The question isn’t, can the world survive Trump. The question is, can the world survive Putin? </span><br data-dcnode-id="4108"><br data-dcnode-id="4107"><span data-dcnode-id="4106" instrument_node="">If you wish to see more of my most recent book and movie reviews, visit </span><a data-dcnode-id="4104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jeffreykeeten.com/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="4105" instrument_node="">http://www.jeffreykeeten.com</span></a><br data-dcnode-id="4103"><span data-dcnode-id="4102" instrument_node="">I also have a Facebook blogger page at:</span><a data-dcnode-id="4100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/JeffreyKeeten" rel="noopener nofollow" target="_blank"><span data-dcnode-id="4101" instrument_node="">https://www.facebook.com/JeffreyKeeten</span></a></span><span data-dcnode-id="4098" instrument_node="">

</span><span data-dcnode-id="3990" id="freeText808991239856031216" style="display:none"><span data-dcnode-id="3991" instrument_node="">This was really a great piece of journalism but so incredibly soul-crushing. The multiple errors of the HRC campaign and the Obama administration in not exposing the Russian hacks, Comey’s treacherous (sorry, but it was totally partisan on his part) re-opening of the bogus Clinton email investigation after the disgusting Access Hollywood tape was forgotten and the Podesta email dump had stolen the headlines. It makes me cringe and want to scream that we have Blotus in Washington undermining democracy and dragging the US towards kleptocratic theocracy every day thanks to the ingenious planning of Putin and the FSB. And, no, this is not a book about a conspiracy theory - this is well-researched and fully, publicly documented. Depressing.</span></span><span data-dcnode-id="3989" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="3814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/5903843-matt%3Fshelf%3Daudiobook"><span data-dcnode-id="3815" instrument_node="">audiobook</span></a><span data-dcnode-id="3813" instrument_node="">

</span><span data-dcnode-id="3802" id="freeTextContainer16495536723356885065"><span data-dcnode-id="3806" instrument_node="">I assert my right to call this a #realreview</span><br data-dcnode-id="3805"><br data-dcnode-id="3804"><span data-dcnode-id="3803" instrument_node="">In possession of three somewhat inter-related books on the 45th POTUS, I thought that I would craft what I am calling my Trump Trifecta, which fits nicely into this non-fiction binge whose time is waning. Some may dispute the ‘non-fiction’ nature of these books, but that is for the reviewer (myself included) to decide in analysis while weighing the information presented. After reading about some of the wonky goings-on during the first year in the Trump</span></span><span data-dcnode-id="3801" instrument_node="">
</span><span data-dcnode-id="3779" id="freeText16495536723356885065" style="display:none"><span data-dcnode-id="3800" instrument_node="">I assert my right to call this a #realreview</span><br data-dcnode-id="3799"><br data-dcnode-id="3798"><span data-dcnode-id="3797" instrument_node="">In possession of three somewhat inter-related books on the 45th POTUS, I thought that I would craft what I am calling my Trump Trifecta, which fits nicely into this non-fiction binge whose time is waning. Some may dispute the ‘non-fiction’ nature of these books, but that is for the reviewer (myself included) to decide in analysis while weighing the information presented. After reading about some of the wonky goings-on during the first year in the Trump White House in the opening book (check reviews should you want to know more), this second piece explores how Trump made it from long-shot candidate to winner of the 2016 US Presidential Election. Michael Isikoff and David Corn—both journalists who covered the recent presidential election—explore numerous players in the 2016 campaign and how they are interconnected in their divergent efforts to shape events. There were three significant issues that served to define the campaign and led to a number of noteworthy outcomes: Trump’s disinterest in distancing himself from Russia, significant hacks into the Democratic National Committee (DNC), and the Clinton email server discovery/repercussions. In the early portion of the book, the authors lay some of the significant groundwork used to shape these overall arguments. Trump’s connection to Russia and Putin can be traced back to his desire to have a Trump Tower in the Russian capital, paired with his apparent strong desire to create a relationship with Russian President Vladimir Putin proved essential aspects to the future GOP candidates ongoing connection to the country. This was further solidified during the 2013 Miss Universe Pageant in Russia, where the authors depict Trump as trying to curry favour with the Russian leader and have him attend. This connection, alongside some leaked potential blackmail that Russian Intelligence captured during the aforementioned pageant stay, helped to strengthen Trump’s apparent desire to speak fondly of Putin and the larger Russian Government system, turning away from any criticisms or smears at any point. Moving to the year of the campaign, Isikoff and Corn discuss oddities that were found within the DNC’s email servers, cyber-footprints that could only be described as hackers having infiltrated the system and collected large portions of documentation, which included email chains that told of strongly worded opinions on a variety of sources. Some of these included the presumptive Democratic candidate, Hillary Clinton, while many others were from senior members of the DNC slandering Trump or Bernie Sanders. These emails were eventually released through WikiLeaks and tweeted by a number of sources that were eventually traced back to Russia, though it was only the DNC that received this rough treatment, leaving Trump and his team to stand on the side and use the documents to fuel their ongoing attacks. This hacking led to many questions about what else Russia might be able to do and how far their reach might go. Tied to the DNC hacking has to be the dark cloud that hung over its candidate and the personal server that Clinton used. While she stated that she did nothing illegal and only followed those who went before her, Clinton was not able to dodge this bullet, particularly when the FBI opened an investigation and sifted through many of the emails, finding crumbs of things that might have remnants of national security concerns. All this worked to gather negative momentum and helped Trump (and the hackers) to create a strong negative persona of the Democratic candidate. What followed was a mixture of these three issues and a number of other characters who, when added to the mix, created the most controversial and dramatic lead-ups to a presidential election in recent memory. Those who enjoy peeling back some of the layers that led to this tumultuous campaign will likely enjoy this piece, which pulls no punches and explores items from numerous perspectives. Isikoff and Corn do a masterful job of adding hype and intrigue to this, only helping to further stoke fires that have not yet dissipated. This book has all the elements of a political thriller, but with all the ties to publicly revealed information, I know it has elements of substantiated fact. Well worth the time for those who can stomach the drama.</span><br data-dcnode-id="3796"><br data-dcnode-id="3795"><span data-dcnode-id="3794" instrument_node="">I admit outrightly that I am not a fan of the current POTUS, but I do love a good election story that shows the drama of events as they unfold. The authors have tried as best they can to depict both sides of the race, but particularly the intrusion by Russia and the seeming inability of the US Government to stop the meddling and potential voter influence of the 2016 Presidential Election. Some within the Obama Administration were too timid to act with an iron fist, concerned that it would come across as partisan, while others did not want to appear to place a thumb on the scale and tip things in any direction. Within all of this, the FBI was trying to run two significant investigations: Clinton’s email scandal and the Russian hacking, taking no side while garnering a pile of information on which they could act. The book is surely full of salacious details, particularly directed at the GOP candidate, though much of this hit the airwaves and was not disputed at the time by Trump, even though his campaign wanted to nullify it from the get-go. Some will call the book a smear campaign, putting Trump in bed with the Russians or even trying to draw parallels between hacker and troll actions with his own campaign. While I choose not to dive in wholeheartedly, the evidence is quite strong and I would challenge anyone who can explain it away to do so, rather than try to toss mud and deflect on the accusations at hand (see my review of the first book in the trifecta to see how I feel about those who do nothing but whinge and try to bang pots because they cannot defend their position). It’s damning, but so are some of the concerns raised within the Clinton email scandal and the information released, albeit illegally. With Russian hackers, a candidate seen to be colluding with them, another embroiled in an email scandal, where do we turn? Who can shed some light on all of this while trying to take the high road? Let’s go to the FBI and its director, who was in the middle of this mess. That’s where this trifecta ought to close out its analysis. But, we could not have made it there without the help of Isikoff and Corn, who paved the way and left me itching with questions and shaking my head.</span><br data-dcnode-id="3793"><br data-dcnode-id="3792"><span data-dcnode-id="3791" instrument_node="">Kudos, Messrs. Isikoff and Corn, for a great piece of journalistic analysis. I can see the trolls (Russian and others) trying to pull down the foundations of your arguments, though you seem to have embedded them in a sturdy foundation. I look forward to seeing how it all plays out. </span><br data-dcnode-id="3790"><br data-dcnode-id="3789"><span data-dcnode-id="3788" instrument_node="">Love/hate the review? An ever-growing collection of others appears at: </span><br data-dcnode-id="3787"><a data-dcnode-id="3785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pecheyponderings.wordpress.com/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3786" instrument_node="">http://pecheyponderings.wordpress.com/</span></a><br data-dcnode-id="3784"><br data-dcnode-id="3783"><span data-dcnode-id="3782" instrument_node="">A Book for All Seasons, a different sort of Book Challenge: </span><a data-dcnode-id="3780" href="https://chatnoir-w </span><span data-dcnode-id="3672" id="freeText5537051555523744276" style="display:none"><span data-dcnode-id="3686" instrument_node="">Isikoff and Corn trace Trump’s and his associates’ contacts with Russian businessmen and officials beginning with the Miss Universe contest in 2013 in Moscow and ending when he becomes president. They give a blow by blow of the 2016 presidential election with respect to Russian disinformation campaigns, Russian hacking of the Democrats, Wikileaks, the Clinton email controversy and the Steele dossier. They report the involvement and responses of Trump, Clinton, Obama and other key people to these events. For those who follow U.S. political news there is nothing new here. If you need a refresher, this is a straightforward presentation that reads quickly. It was interesting to view the flow of events in a condensed format. In retrospect the number of surprising twists and turns were surreal. A few items that caught my attention follow.</span><br data-dcnode-id="3685"><br data-dcnode-id="3684"><span data-dcnode-id="3683" instrument_node="">The authors depict Trump eager to get approval for a Trump Tower Moscow in 2013. At the Miss Universe event Trump did everything he could to meet Putin which didn’t happen. After his return to the U.S. Putin sent him a present with a letter inside, the contents of which have not been revealed. Trump did however consort with Emin and Aras Agalarov who provided the venue in Moscow for the pageant. Aras, an influential oligarch, was known as “Putin’s builder.” Prior to the pageant Trump had entertained them in Las Vegas taking them to a nightclub called “The Act” which featured half nude girls simulating urinating on other actors. The authors speculate on whether this was transformed by the rumor mill ending up in the Steele dossier as the “golden showers” incident.</span><br data-dcnode-id="3682"><br data-dcnode-id="3681"><span data-dcnode-id="3680" instrument_node="">The authors show that a primary reason for Russian interference favoring Trump in the 2016 election was Putin’s animosity for Hilary Clinton. They highlight Secretary of State Clinton’s public statements questioning the legitimacy of the 2011 Russian legislature elections which preceded Putin’s return to the presidency in 2012. Putin and his party were confronted with widespread street protests. Putin was unnerved and blamed Clinton saying she “set the tone for certain actors inside the country. She gave the signal.” He blamed the anti-Putin protests on her and large sums of foreign money. Putin saw at as interference in Russia’s election, even though he controlled the process and could not lose regardless of how people voted.</span><br data-dcnode-id="3679"><br data-dcnode-id="3678"><span data-dcnode-id="3677" instrument_node="">After the 2016 election when FBI Director Comey presented Trump with a synopsis of the Steele dossier to inform him about the rumors circulating, Trump was sure it was a shakedown. His initial thought was that Comey wanted to use it as blackmail and he immediately distrusted Comey. Thus, Trump’s singling him out asking for personal loyalty and firing Comey for not complying, does not seem surprising. Trump’s first thought of blackmail does not seem surprising either given the ruthless world he operated in. For example, Trump worked on deals with Felix Sater who had been convicted of racketeering defrauding investors and helping the Mafia launder money. Sater had Russian connections and in 2015 Sater convinced Trump he could help get the Trump Tower Moscow project approved. Trump eager as ever bought in but it never materialized. However Trump kept Sater as an advisor and did a robust business with Russians buying his properties.</span><br data-dcnode-id="3676"><br data-dcnode-id="3675"><span data-dcnode-id="3674" instrument_node="">In short, the book is a workmanlike product that details events chronologically. It relies on information that has already been reported and doesn’t break any new ground. Still it could be useful for someone who didn’t follow or wants to revisit Trump’s Russia connections and the 2016 campaign. </span><br data-dcnode-id="3673"></span><span data-dcnode-id="3671" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="3594" title="it was amazing"><span class="staticStar p10" data-dcnode-id="3599" size="15x15"><span data-dcnode-id="3600" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="3598" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3597" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3596" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3595" size="15x15"></span></span><span data-dcnode-id="3593" instrument_node="">

</span><span data-dcnode-id="3587" id="freeTextContainer16146736378371302879"><span data-dcnode-id="3588" instrument_node="">Each day it seems there is a new revelation related to Russian actions during the 2016 presidential election. Today for example, the New York Times reported that Special Prosecutor Robert Mueller has subpoenaed records of the Trump Organization to examine its relationship with Russia. As the information keeps flowing in newspapers and cable TV, and having read COLLUSION: SECRET MEETINGS, DIRTY MONEY, AND HOW RUSSIA HELPED DONALD TRUMP WIN by Luke Harding, and FIRE AND FURY by Michael Wolff my he</span></span><span data-dcnode-id="3586" instrument_node="">
</span><span data-dcnode-id="3555" id="freeText16146736378371302879" style="display:none"><span data-dcnode-id="3585" instrument_node="">Each day it seems there is a new revelation related to Russian actions during the 2016 presidential election. Today for example, the New York Times reported that Special Prosecutor Robert Mueller has subpoenaed records of the Trump Organization to examine its relationship with Russia. As the information keeps flowing in newspapers and cable TV, and having read COLLUSION: SECRET MEETINGS, DIRTY MONEY, AND HOW RUSSIA HELPED DONALD TRUMP WIN by Luke Harding, and FIRE AND FURY by Michael Wolff my head is spinning. How does one connect all the dots to see if there was collusion between the Trump campaign and Russia, and whether Trump is guilty of obstruction of justice? David Corn and Michael Isikoff may have gone a long way in doing so in their just released book, RUSSIAN ROULETTE: THE INSIDE STORY OF PUTIN’S WAR ON AMERICA AND THE ELECTION OF DONALD TRUMP. Both authors are investigative journalists and this is there second joint effort, the first being there well received, HUBRIS: THE INSIDE STORY OF SPIN, SCANDAL, and AND THE SELLING OF THE IRAQ WAR.</span><br data-dcnode-id="3584"><br data-dcnode-id="3583"><span data-dcnode-id="3582" instrument_node="">The arguments presented by Corn and Isikoff mirror those of others that have investigated Trump’s relationship with the Russians, simply put, “follow the money.” According to the authors Trump has been obsessed with building a Trump Tower in Moscow for decades. It seems it is the missing piece to his real estate empire and a segment of his ego, as he wanted to be known as a “global oligarch.” Most recently the obsession manifested itself in 2013 at the Miss Universe Pageant that took place in Moscow. For Trump to achieve his tower in Moscow he needed affirmation from Russian President Vladimir Putin. During the beauty contest it seemed that Trump was on pins and needles as to whether the Russian leader would make an appearance. The authors point to a number of Russian oligarchs and close Putin companions in showing who Trump tried partner with to build the tower, and others he had been involved with in the past. A number of oligarchs emerge, one of which was Aras Agalarov, known as “Putin’s builder” who was Trump’s partner in the Miss Universe Pageant; in fact a letter of intent was signed between Agalarov and Trump to finance the tower but eventually fell through. </span><br data-dcnode-id="3581"><br data-dcnode-id="3580"><span data-dcnode-id="3579" instrument_node="">Another interesting character is Felix Sater, a Russian born, and one time felon with links to the Mafia and Russian organized crime who in the 2000s was a New York real estate developer who partnered with Trump with the Trump SoHo Hotel in lower Manhattan. Further in 2010 he became a Trump advisor for a short period of time though during the presidential election campaign Trump denied knowing him or even what he looked like. In effect, Sater was a go between Trump and the oligarchs. By October, 2015 Trump signed a letter of Intent with I.C. Expert Investment to move forward with the Trump Tower venture. Discussions about financing linked I.C. Expert Investment Company with Russian banks under US economic sanctions, including Sberbank, which cosponsored the 2013 beauty pageant in Moscow. According to Sater another source for investment was VTB Bank, an institution partly owned by the Kremlin and also under US sanctions. The result was that the Trump Organization was putting together a deal that could well depend on Russian financing from blacklisted banks linked to Putin’s regime. In fact, Sater emailed Michael Cohen, Trump’s lawyer and “pit bull,” “I will get Putin on this program and will get Donald elected….Buddy our boy can become president of the USA and we can engineer it. I will get all of Putin’s team to buy in on this. I will manage the process.” (81) At the same time Trump was cozying up to Putin on MSNBC’s Morning Joe declaring Putin as a more effective leader than Obama, who had accomplished much more than the American president. In 2008, Donald Trump, Jr. remarked; “Russians make up a pretty disproportionate cross-section of a lot of our assets….certainly with our project in SoHo and anywhere in New York…We see a lot of money pouring in from Russia.” In 2014, Eric Trump, Trump’s second oldest son said, “his father’s business did not rely on US banks for financing golf resort projects….We have all the funding we need out of Russia.” (89) Corn and Isikoff effectively delve into Trump’s Russian connections dating back years, and the only conclusion that can be drawn is that he was financially involved with Russian oligarchs and other unseeingly characters to the point that he still needed their assets to finance his projects. The problem was that he needed Putin’s approval. </span><br data-dcnode-id="3578"><br data-dcnode-id="3577"><span data-dcnode-id="3576" instrument_node="">Corn and Isikoff lay out Putin’s worldview, in particular his attitude toward President Obama and Secretary of State Hillary Clinton. The authors weave a fascinating portrait that links a number of important characters. For example, when the Obama administration tried for a “reset” in Russian relations, Foreign Minister Lavrov requested that the US provide a visa for Oleg Deripaska, a Russian billionaire close to Putin, and a business partner of Paul Manafort, who had been engaged in all kinds of duplicitous economic and political shenanigans in the Ukraine that resulted millions for his businesses. Putin himself was a Russian nationalist who wanted to restore Russia to its rightful place in the world. He strongly resented US “unipolar power” particularly as practiced by overthrowing autocracy in Iraq and Libya. Domestically, Putin felt that President Medvedev was too soft in dealing with Obama and announced in 2010 that he would run for President. Russia headed for a political crisis in 2011 and Putin blamed Clinton for the pro-democracy demonstrations against his election, along with domestic criticism. Putin’s resentment of Clinton would smolder for years, particularly as the State Department complained about the assassinations of Putin critics like Sergei Magnitsky which led to the Magnitsky Act in Congress geared against those who were responsible for his death. Putin would accuse the US of destabilizing the Ukraine and would seize the Crimea forcing Obama into further economic sanctions. By 2014, Putin would send troops into Ukraine.</span><br data-dcnode-id="3575"><br data-dcnode-id="3574"><span data-dcnode-id="3573" instrument_node="">Corn and Isikoff spend a great deal of time explaining how the American election was compromised by Russian interference in 2016. They take a step by step approach which reads like a legal brief. In 2013, General Valery Gerasimov, Chief of the General Staff of Russian Armed Forces wrote an article that argued that information warfare could be used to weaponize political divisions within another nation. Instead of conventional warfare of the past, hackers and skilled propagandists trained to exploit existing rifts within the ranks of the adversary would be employed. A US informant explained that these networks were extremely extensive “in Europe-Germany, Italy, France and the UK-and in the US….Russia has penetrated media organizations, lobbying firms, political parties, governments, and militaries in all these places.” (52) The Obama administration decided not to do anything about it as it needed Putin’s support over the Iranian nuclear situation and events in Syria.</span><br data-dcnode-id="3572"><br data-dcnode-id="3571"><span data-dcnode-id="3570" instrument_node="">Corn and Isikoff’s information dealing with Russian Troll Farms is very concerning. Company’s like the Russian Internet Research Agency employed hundreds of people who troll Facebook, Twitter, and Instagram stealing identities, creating false individuals and news praising Putin, denouncing Obama, and attacking the European Union. Payments to these trolls was made by Yevgeny Prigozhin, a restaurateur oligarch known as Putin’s chef. By 2015 there were repeated attacks against the Democratic National Committee (DNC), the State Department, and the White House. Again, Obama believing he needed Putin on Iran and Syria, did nothing. Interestingly, a Russian hacker named “Cozybear” had been inside the DNC network since July, 2015 and among the information stolen was their entire opposition research file on Donald Trump. Cybersecurity experts surmised that APT 28, a Russian hacker tied to the GRU, Russian military intelligence had launched 19,000 separate attacks against the US between March 2015 and May 2016.</span><br data-dcnode-id="3569"><br data-dcnode-id="3568"><span data-dcnode-id="3567" instrument_node="">The FBI and US intelligence aware of these breaches kept warning the DNC and Clinton’s campaign as to the Russian penetration of their systems. At first they could not find the breach, but finally when it was located they had difficulty closing it. Their cyber assault would snare the top official in the Clinton campaign, John Podesta, and no one in the campaign had a clue. Corn and Isikoff do an admirable job providing the links in the chain dealing with the hacking of the DNC and Clinton campaign, as well as their links to Russian intelligence. They point to WikiLeaks and the attitude of Julian Assange toward Hillary Clinton and the US in general, and the numerous contacts between the Trump people and Russian intelligence. The preliminaries to the June 9, 2016 meeting between Trump, yr. Manafort, Kushner, Goldstone and the Russian lawyer, Natalia Veselnitskaya, her translator, a Agalarov executive implicated in Russian money laundering, and Rinat Akmetshin, a former Russian intelligence officer and lobbyist in Washington is carefully explored with the now infamous comment by Trump. Jr. before the meeting in response to possible information on Clinton, “If it’s what you say, I love it.”</span><br data-dcnode-id="3566"><br data-dcnode-id="3565"><span data-dcnode-id="3564" instrument_node="">It is clear that George Papadopoulos, a Trump foreign policy advisor, who produced the comment by Steve Bannon, “how the fuck did he get on the list” of possible advisors, was fully engaged in trying to bring about a Trump-Putin meeting. Papadopoulos’ “big mouth” in a bar as he bragged about his work to an Australian diplomat led eventually to his indictment by Robert Mueller. Further, the buffoonish Carter Page went to Moscow to express his pro-Putin views with the permission of Trump campaign manager Cory Lewandowski – seen by Moscow as a signal from the Trump campaign. It is clear that what motivated Putin in this game of political intelligence, and hacking, was to end the American sanctions imposed by the Obama administration. For the Russian president it was simple, elect Trump who had hinted strongly he would be favorable, and as a secondary benefit gain his revenge against Hillary Clinton. The question is why was Trump so favorable? What did Putin have on Trump, and/or what promises were made if an acceptable outcome was reached?</span><br data-dcnode-id="3563"><br data-dcnode-id="3562"><span data-dcnode-id="3561" instrument_node="">The answer to these questions becomes clearer when the authors discuss the Russian concept of kompromat, a strategy to obtain compromising material on people they want to manipulate employing blackmail and threats to achieve their goals. A Russian tactic that dates back to the Cold War it is a major theme put forth by Corn and Isikoff who argue it probably applies to Trump dating back at least to 2013 and the Miss Universe Contest which is laid out in Christopher Steele’s “dossier,” which contained the salacious information pertaining to Trump’s possible sexual escapades. The authors explain how it was employed and it goes a long way to explain why Trump is so obsessed with the Mueller investigation as one can only wonder what Putin has on Trump.</span><br data-dcnode-id="3560"><span data-dcnode-id="3559" instrument_node="">Corn and Isikoff review details of the actual presidential campaign following their respective party conventions. All the information that the public was bombarded with for months is present including the role of social media, particularly important today with the digital relationship between Facebook and Cambridge Analytica making news headlines and its relationship to the Trump campaign. The authors analyze events to determine their impact on the election. From Wikipedia’s 64,000 email dump, including John Podesta designed to protect Trump and hurt Clinton, i.e., the email release following the Access Hollywood tape etc. The presidential debates are covered as was the ongoing indecision on the part of the Obama administration to educate the public that they had proof of Russian interference in the election and that an FBI investigation of Russian influence during the campaign was ongoing. After a careful examination of the campaign the authors conclude that Julian Assange and Wikileaks were acting in concert with the Russians. There were too many coincidents ranging from Roger Stone’s public comments to actual events to conclude otherwise.</span><br data-dcnode-id="3558"><br data-dcnode-id="3557"><span data-dcnode-id="3556" instrument_node="">The evidence produced by a wonder of investigative reporting makes RUSSIAN ROULETTE the most important book to emerge from the morass of the 2016 election to date. If you are confused with the daily bombardment of information, Corn and Isikoff have done a service in putting it all together in a succinct and easy to read format. What is scary is that I assume Mueller knows exactly what’s in this book, the characters, the disingenuous deals and behavior, the lies, and the mistakes, by those who should have known better. It is no wonder that Trump engaged in the “Friday night massacre” a few days ago.</span></span><span data-dcnode-id="3554" instrument_node="">

</span><span data-dcnode-id="3425" id="freeText1157070471734805827" style="display:none"><span data-dcnode-id="3447" instrument_node="">The Russian government is an asshole government. SURPRISE!</span><br data-dcnode-id="3446"><br data-dcnode-id="3445"><span data-dcnode-id="3444" instrument_node="">The FSB (formerly the KGB) were harassing our diplomats prior to the Obama administration. They were beating them up, threatening them and their loved ones, and even killing their pets while they were out. Assholes.</span><br data-dcnode-id="3443"><br data-dcnode-id="3442"><span data-dcnode-id="3441" instrument_node="">I am not one that would say positive things about Mitt Romney, mostly I’d just make fun of him; but do you recall during one of the debates, that he had with president Obama, when the question asked was “What is the biggest threat facing the United States today?” Mitt answered “Russia” and goddamn it he was right! President Obama laughed and replied (I’m paraphrasing) “What is this this, the 1980’s?” I love President Obama...... I miss him every minute of everyday, but he was a bit naive when it came to Russia. Just like he handled the Republicans, he was too optimistic about believing in their humanity. Silly Obama.</span><br data-dcnode-id="3440"><br data-dcnode-id="3439"><span data-dcnode-id="3438" instrument_node="">Former Secretary of State, and winner of the 2016 presidential election by 4 million votes but yet is not the president of the U.S. because of a bunch of BS in the constitution (that must changed), Hillary Clinton called Putin out on cheating in his election at the time. This made Putin mad, and you don’t make sociopaths with short man syndrome mad. So, when Hillary ran for president, he was going to do everything in his power (of which he has a lot of) to disrupt our election. Check.</span><br data-dcnode-id="3437"><br data-dcnode-id="3436"><span data-dcnode-id="3435" instrument_node="">When it came to light that Russia had definitely hacked the DNC (as well as the RNC.... oh the kompromat they must have on those slimy weasels), the Clinton campaign begged president Obama to come out strong about what was clearly happening and to come down hard against the Russian invasion and the Tump campaign’s collusion with it. The president (just like almost everyone else at that time..... remember?) thought that Clinton would win and didn’t want to appear to be playing partisan politics in an effort to sway the election. Oh silly Obama, why must you be such a nice guy?</span><br data-dcnode-id="3434"><br data-dcnode-id="3433"><span data-dcnode-id="3432" instrument_node="">*sigh*</span><br data-dcnode-id="3431"><br data-dcnode-id="3430"><span data-dcnode-id="3429" instrument_node="">Of course there is much more depressing information to be had in this book, which is quite good. The more you know the more prepared you are for whatever the future holds.</span><br data-dcnode-id="3428"><br data-dcnode-id="3427"><span data-dcnode-id="3426" instrument_node="">We are on a precipice.</span></span><span data-dcnode-id="3424" instrument_node="">

</span><span data-dcnode-id="3228" id="freeTextContainer11645714990890270736"><span data-dcnode-id="3232" instrument_node="">It is difficult for a journalistic book written on current unfolding events to be a great one. There is simply not enough historical distance between the events of 2016 and earlier and today and the news keeps unfolding like the Cambridge Analytica and Facebook targeted political ad news.</span><br data-dcnode-id="3231"><br data-dcnode-id="3230"><span data-dcnode-id="3229" instrument_node="">Russian Roulette does fill in a large number of holes in the Trump/Russia conspiracy. Russia has been actively cultivating Trump for more than a decade. The book alleges numerous bribes that Trump paid to Russia</span></span><span data-dcnode-id="3227" instrument_node="">
</span><span data-dcnode-id="3219" id="freeText11645714990890270736" style="display:none"><span data-dcnode-id="3226" instrument_node="">It is difficult for a journalistic book written on current unfolding events to be a great one. There is simply not enough historical distance between the events of 2016 and earlier and today and the news keeps unfolding like the Cambridge Analytica and Facebook targeted political ad news.</span><br data-dcnode-id="3225"><br data-dcnode-id="3224"><span data-dcnode-id="3223" instrument_node="">Russian Roulette does fill in a large number of holes in the Trump/Russia conspiracy. Russia has been actively cultivating Trump for more than a decade. The book alleges numerous bribes that Trump paid to Russia for licensing and potential real estate deals and the book also alleges numerous prostitution compromat, not just the most salacious claim. If any of the above items are true, it goes a long way to explain Trump’s disturbing behavior with Putin. His whole business empire is at risk. </span><br data-dcnode-id="3222"><br data-dcnode-id="3221"><span data-dcnode-id="3220" instrument_node="">Good book, not particularly dramatic. About 75% of the content is known to those who follow the news but the other 25% is new and pretty damning.</span></span><span data-dcnode-id="3218" instrument_node="">

</span><span data-dcnode-id="3039" id="freeText16036839900747541945" style="display:none"><span data-dcnode-id="3043" instrument_node="">This book marshals some interesting facts and figures, but I'm giving it a less-than-stellar rating because it seeks to blame one President -- in this case, Barack Obama -- for America's cyber-incompetence. The fact is, this or any other nation's ability to be hacked by outsiders has been around ever since there has been easy access to the Internet, and possibly even before, when the predecessor of today's 'net existed only in large universities and research facilities. Messing with the American electoral process is the most obvious insult to our wired civilization, but "hacking" has been around a long time. </span><br data-dcnode-id="3042"><br data-dcnode-id="3041"><span data-dcnode-id="3040" instrument_node="">Is it possible that the 20th Century was America's century because we excelled in physical and electro-mechanical things: buildings motors, tying that to mass production, introducing commercial television and large, mainframe computers, and stringing up the Internet largely on existing telephone lines? If so, then the 21st Century is not the century of the electro-mechanical but the purely digital, and we are losing it. Probably every President from Clinton on deserves part of the blame, since preserving our country from foreign attack is the province of the federal government, in particular our Commander-in-Chief, and next to nothing has been done to repel such attacks on the American cyber-front.</span></span><span data-dcnode-id="3038" instrument_node="">

node-id="2810"><br data-dcnode-id="2809"><img class="gr-hostedUserImg" data-dcnode-id="2808" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/books/1518568008s/36222733.jpg&amp;raw"><span data-dcnode-id="2807" instrument_node="">This will be the book that is studied in the history classes in future times as it lays out the core of the jigsaw in unambiguous and easy to understand terms. </span><br data-dcnode-id="2806"><br data-dcnode-id="2805"><img class="gr-hostedUserImg" data-dcnode-id="2804" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1521552157i/25245131.jpg&amp;raw"><br data-dcnode-id="2803"><br data-dcnode-id="2802"></span><span data-dcnode-id="2800" instrument_node="">

</span><span data-dcnode-id="2695" id="freeText7520887982312183711" style="display:none"><span data-dcnode-id="2699" instrument_node=""> </span><i data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">Russian Roulette: The Inside Story of Putin's War on America and the Election of Donald Trump</span></i><span data-dcnode-id="2696" instrument_node=""> is a well-researched book by veteran journalists and investigative reporters Michael Isikoff and David Corn, one of international espionage and political intrigue set in motion to interfere with the 2016 presidential election. However, if you have been paying attention to the daily news, there is not any new or groundbreaking information disclosed in this book. It is impossible to stay ahead of the daily, and often hourly, breaking news pertaining to the Trump administration. However, one of the biggest strengths of this book is that all of the information pertaining to Donald Trump's involvement with Russia and Vladimir Putin is now in one place and set forth chronologically in a riveting manner with the identification of all of the players in a clear timeline. It is a "who's who" of the Russian oligarchy and how they interfaced with Donald Trump and his family as well as many of those previously associated with the Trump campaign. It becomes quite clear that Robert Mueller and his investigators have done a remarkable job in working their way through this morass of data, and no doubt, have many of the answers before the questions are being asked. What happens remains to be seen but this book lays a great foundation.</span></span><span data-dcnode-id="2694" instrument_node="">

</span><span data-dcnode-id="2299" id="freeText8897415948365803140" style="display:none"><span data-dcnode-id="2300" instrument_node="">This would have been more fun to read - if I hadn't already watched Rachel Maddow every night for this past year of Trumpian horror. Nevertheless, even though there was virtually NOTHING new in the book, it was still interesting to read it through Isikoff's and Korn's eyes. They put everything in order and took a few of the characters (and what a plethora of WEIRD characters there are) and added some details. How did Trump find these dudes? One of the best lines (and a chapter heading) comes from Steve Bannon when he hears that (now-indicted) George Papadopoulos is publicly listed as a "foreign policy adviser": "How the fuck did he get on the list?" The same could have been asked, of course, about Carter Page and the rest of the list. In fact.....if all is said and done....the same could be asked about Trump himself.</span></span><span data-dcnode-id="2298" instrument_node="">
