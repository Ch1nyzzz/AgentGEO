</span></div></div></div></div><div class="zone-1" data-dcnode-id="370"><div class="main-gutters mobile-zero" data-dcnode-id="371"><div class="table-of-contents gutter-bottom hide-mobile floating gutter-left" data-dcnode-id="1661"><h5 class="heading" data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Table of Contents</span></h5><ol class="link-list list-spaced__less" data-dcnode-id="1662"><li data-dcnode-id="1683"><p class="selectionShareable" data-dcnode-id="1684"><a class="toc-show-links" data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//carnegieendowment.org/2018/03/28/preventing-escalation-in-baltics-introduction-pub-75879"><span data-dcnode-id="1686" instrument_node="">Preventing Escalation in the Baltics: Introduction</span></a></p></li><li data-dcnode-id="1679"><p class="selectionShareable" data-dcnode-id="1680"><a class="toc-show-links" data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//carnegieendowment.org/2018/03/28/russian-interests-and-strategy-pub-75880"><span data-dcnode-id="1682" instrument_node="">Russian Interests and Strategy</span></a></p></li><li class="selected-chapter" data-dcnode-id="1675"><p class="selectionShareable" data-dcnode-id="1676"><a class="toc-show-links" data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//carnegieendowment.org/2018/03/28/consequences-for-nato-pub-75881"><span data-dcnode-id="1678" instrument_node="">Consequences for NATO</span></a></p></li><li data-dcnode-id="1671"><p class="selectionShareable" data-dcnode-id="1672"><a class="toc-show-links" data-dcnode-id="1673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//carnegieendowment.org/2018/03/28/three-escalation-scenarios-pub-75882"><span data-dcnode-id="1674" instrument_node="">Three Escalation Scenarios</span></a></p></li><li data-dcnode-id="1667"><p class="selectionShareable" data-dcnode-id="1668"><a class="toc-show-links" data-dcnode-id="1669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//carnegieendowment.org/2018/03/28/nato-s-options-pub-75883"><span data-dcnode-id="1670" instrument_node="">NATO’s Options</span></a></p></li><li data-dcnode-id="1663"><p class="selectionShareable" data-dcnode-id="1664"><a class="toc-show-links" data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//carnegieendowment.org/2018/03/28/forming-comprehensive-nato-strategy-pub-75884"><span data-dcnode-id="1666" instrument_node="">Forming a Comprehensive NATO Strategy</span></a></p></li></ol></div><div class="article-body" data-dcnode-id="409"><p class="center mobile-only selectionShareable" data-dcnode-id="1658"><a class="button-big" data-dcnode-id="1659" href="#tableContents"><span data-dcnode-id="1660" instrument_node="">Table of Contents</span></a></p><p class="selectionShareable" data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">Since the end of the Cold War, NATO has taken a threefold approach of collective defense, enlargement, and cooperative security to respond to the dramatic changes Europe has undergone since the fall of the Berlin Wall in 1989. How to prioritize these different elements has been and still is disputed among the alliance’s twenty-nine members, all of which have their own, sometimes divergent, interests. At the heart of the alliance, however, lies the collective defense commitment to assist each other in the event of an armed attack.</span></p><span data-dcnode-id="1655" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1648"><span data-dcnode-id="1654" instrument_node="">For the past twenty years, as NATO has mostly pursued an open door policy toward Central and Eastern Europe, the alliance has grown by integrating former members of the Warsaw Pact, nonmembers who were previously friendly with the Soviet Union, and three former Soviet republics (the three Baltic states). The principles underlying enlargement are that new member states must choose freely to join NATO, that they fulfill a number of political and military criteria (such as having settled any ethnic or external territorial disputes, as well as being able to contribute militarily and financially to collective defense), and that their accession strengthens the alliance.</span><sup data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">1</span></sup><span data-dcnode-id="1651" instrument_node=""> In addition, NATO has fostered close cooperative ties with all other former Soviet republics and continues to champion their political independence. At the same time, NATO has engaged Russia to try to alleviate Moscow’s concerns about NATO enlargement and to pursue cooperation in areas of common security interest, such as mutual military risk reduction and counterterrorism. NATO insists that it does not seek conflict with Russia.</span><sup data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">2</span></sup></p><span data-dcnode-id="1647" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1643"><span data-dcnode-id="1646" instrument_node="">NATO members have sometimes disagreed about which elements of this approach to prioritize; at times, fractures between different national positions have become very visible. For example, at NATO’s 2008 Bucharest Summit, the United States and some other allies pushed for Georgia and Ukraine to become members, directly challenging a core Russian interest. But France and Germany blocked this proposed accession, partly because they were concerned about Russia’s likely negative reaction and partly because they questioned the fitness of these states to join NATO and their potential to strengthen the alliance.</span><sup data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">3</span></sup></p><span data-dcnode-id="1642" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1634"><span data-dcnode-id="1641" instrument_node="">Russia’s occupation of Crimea and subsequent deterioration in relations with NATO has again pushed the task of collective defense to the fore.</span><sup data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">4</span></sup><span data-dcnode-id="1638" instrument_node=""> At its 2016 Warsaw Summit, NATO allies underscored that Moscow is now considered to be a “challenge [to] the Alliance” and “a source of regional instability.”</span><sup data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">5</span></sup><span data-dcnode-id="1635" instrument_node=""> To meet this challenge, NATO agreed first and foremost to assure its easternmost allies and to enhance its means of deterring and defending against Russia. But allies also recognized the need to increase the resilience of all members and to seek dialogue with Russia.</span></p><span data-dcnode-id="1633" instrument_node="">
</span><h3 data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">General Uncertainty</span></h3><span data-dcnode-id="1630" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1625"><span data-dcnode-id="1629" instrument_node="">For NATO, the Russian challenge presents multiple uncertainties, which exacerbate the potential for disagreement. For starters, NATO members have different views of Moscow’s intentions in the post-Soviet space and toward the alliance. Some officials from certain members—including the three Baltic states, Poland, and the United States—have repeatedly claimed that the Kremlin is “revanchist,” in the sense that it purportedly wants to redraw the map of Europe.</span><sup data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">6</span></sup><span data-dcnode-id="1626" instrument_node=""> They argue that Russia’s aggressive actions in Ukraineemonstrate Moscow’s willingness to use force in the former Soviet republics. They fear that Moscow could even use military force against the alliance, particularly the Baltic states. At a minimum, they see Russia as a challenger of the status quo—a view diametrically opposed to Moscow’s view of itself.</span></p><span data-dcnode-id="1624" instrument_node="">
</span><blockquote data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">For NATO, the Russian challenge presents multiple uncertainties, which exacerbate the potential for disagreement.</span></blockquote><span data-dcnode-id="1621" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1616"><span data-dcnode-id="1620" instrument_node="">In addition, the states that see Russia as revanchist are mindful of Russian domestic politics and how these forces interact with the tensions with NATO. According to a popular—and probably correct—theory, Putin, confronted with an ailing Russian economy, to some extent may need the friction with NATO, and particularly with Washington, to hold on to power.</span><sup data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">7</span></sup><span data-dcnode-id="1617" instrument_node=""> According to this theory, Putin’s efforts to foster nationalistic support to divert attention from Russia’s deep-seated domestic problems could even force him to militarily test the alliance one day.</span></p><span data-dcnode-id="1615" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1608"><span data-dcnode-id="1614" instrument_node="">Other NATO members—such as France, Germany, and Italy—seem rather skeptical that Moscow presents an immediate military threat to NATO and question the plausibility of Russia waging war against the world’s most powerful military alliance.</span><sup data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">8</span></sup><span data-dcnode-id="1611" instrument_node=""> Some former officials and analysts from these countries agree with the Kremlin’s view that NATO has moved too far east and understand how Russia could perceive NATO enlargement as a threat.</span><sup data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">9</span></sup></p><span data-dcnode-id="1607" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">This general disagreement about current and projected Russian intentions and interests is important because it exacerbates the potential for escalation for two quite different reasons. First, if NATO underestimates the threat from Russia, that may give Moscow reason to test the alliance’s resolve—maybe even by escalating to the use of military force against NATO’s weakest link, the Baltic states. In this case, an incorrect threat assessment by NATO could invite Moscow to deliberately escalate the already simmering general tensions with NATO and go a significant step further, perhaps by invading one of the Baltic states. Second, and conversely, if NATO overestimates the threat from Russia, its well-intentioned defensive measures may reinforce legitimate, as well as imagined, Russian security concerns. In this case, misreading the threat could lead NATO to create additional pressure on Moscow to up the ante, which could lead to both arms races and increased tensions—making escalation more likely. These two potential risks—of NATO doing too little and doing too much—create very specific escalation risks in the Baltic region, in both the conventional and nuclear realms.</span></p><span data-dcnode-id="1604" instrument_node="">
</span><blockquote data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">If NATO underestimates the threat from Russia, that may give Moscow reason to test the alliance’s resolve— maybe even with military force against NATO’s weakest link, the Baltic states.</span></blockquote><span data-dcnode-id="1601" instrument_node="">
</span><h3 data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">The Risks of Conventional Escalation</span></h3><span data-dcnode-id="1598" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">The regional imbalance between NATO’s and Russia’s conventional forces, NATO’s own deterrence loopholes, and the geography of the Baltics all make both deliberate and inadvertent escalation possible. Although NATO as a whole has much greater conventional military capabilities than Russia, Moscow enjoys a significant margin of conventional superiority in the wider Baltic region (see map). Russia has been heavily funding and modernizing its aging armed forces over the last decade, making them a credible force again. In addition, Moscow continues to expand its arsenal of long-range cruise missiles and other precision-guided munitions.</span></p><span data-dcnode-id="1595" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1591"><span class="contentImg wide" data-dcnode-id="1592"><a data-dcnode-id="1593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//carnegieendowment.org/images/article_images/der-spiegel-new-fronts-map_2017_May_24.jpg" target="_blank"><img border="0" data-dcnode-id="1594" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//carnegieendowment.org/images/article_images//der-spiegel-new-fronts-map_2017_May_24_605.jpg&amp;raw"></a></span></p><span data-dcnode-id="1590" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1583"><span data-dcnode-id="1589" instrument_node="">To be fair, Russian modernization efforts continue to experience serious setbacks, as a result of widespread corruption and mismanagement, for instance. The Kremlin’s goal of equipping 70 percent of its forces with the latest military equipment by 2020 is generally considered largely aspirational.</span><sup data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">10</span></sup><span data-dcnode-id="1586" instrument_node=""> Nevertheless, Western analysts assume that in case of an open military attack on one or more of the Baltic states, Russian forces would most likely overrun Baltic defenses within only a few days, presenting NATO with a military fait accompli.</span><sup data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">11</span></sup></p><span data-dcnode-id="1582" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Recognizing these weaknesses, the NATO allies agreed at the 2016 Warsaw Summit to deploy four multinational battalions—a so-called Enhanced Forward Presence (EFP)—to the three Baltic states and Poland. NATO also agreed to increase the intensity and scope of its exercises in the region to deter Russian aggression and assure its eastern members. Separately, the United States has sent additional forces and military equipment under a U.S. national program known as the European Deterrence Initiative. (See Box 1 for a description of the forces deployed under the EFP and the European Deterrence Initiative.)</span></p><span data-dcnode-id="1579" instrument_node="">
</span><div class="text-box" data-dcnode-id="1566"><h3 data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Box 1: NATO’s Enhanced Forward Presence and the U.S. European Deterrence Initiative</span></h3><span data-dcnode-id="1576" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1571"><span data-dcnode-id="1575" instrument_node="">NATO’s Enhanced Forward Presence (EFP) consists of four battalion-sized battlegroups (totaling about 4,500 personnel) deployed in Estonia, Latvia, Lithuania, and Poland. Each battalion is led by a framework nation—the United Kingdom in Estonia, Canada in Latvia, Germany in Lithuania, and the United States in Poland. These framework nations contribute the majority of forces to each battalion. In addition to the framework nations, twelve other NATO allies participate in the EFP. NATO is also establishing eight small headquarters—the so-called NATO force integration units (NFIUs). One NFIU is located in each country in the region; these units are designed to serve as reinforcement hubs and to link NATO forces to their national hosts. The four EFP battlegroups are assigned to NATO’s Supreme Allied Commander Europe (SACEUR), but effectively have three lines of command: (1) NATO’s command structure; (2) national lines of command from contributing nations; and (3) the command line from the respective host nation. The EFP’s contributing nations and the four host states are in the process of determining common rules of engagement, specific to the regional deployments.</span><sup data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">12</span></sup><span data-dcnode-id="1572" instrument_node=""> In the event of a conflict, NATO’s Graduated Response Plan (known as Eagle Defender) would come into play; this plan contains its own detailed rules of engagement. In any case, even in the event of a conflict, SACEUR can only move forces in a very limited fashion—and not beyond borders without a North Atlantic Council executive directive.</span></p><span data-dcnode-id="1570" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Under the European Deterrence Initiative, the United States deployed a range of forces including an armored brigade combat team (of about 3,500 personnel) that continuously rotates through NATO’s easternmost member states. This deployment also includes a combat aviation brigade (of about 2,200 personnel), headquartered in Germany; a combat sustainment support battalion (of about 750 personnel), based in Poland with a logistics hub in Romania; and a support team in Lithuania. These steps have increased the overall number of U.S. combat brigades in Europe to three, while also pre-positioning stocks of military equipment for a fourth brigade.</span></p><span data-dcnode-id="1567" instrument_node="">
</span></div><span data-dcnode-id="1565" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">NATO force deployments to Eastern Europe—the EFP in particular—are intended to increase pressure on NATO members to respond more forcefully in the event of combat. The logic behind this strategy is that involving NATO forces from a variety of nations in a conflict against Russia—and hence giving them a direct stake in the outcome—would help minimize pressure within the alliance to simply cede to Russia any territory it may take, thus strengthening deterrence and preventing deliberate Russian escalation.</span></p><span data-dcnode-id="1562" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1549"><span data-dcnode-id="1561" instrument_node="">However, the benefits of this multinational approach might be significantly overstated. As some Western analysts have pointed out, a limited, targeted Russian attack could implicate only a small subset of the nations that contribute to the EFP.</span><sup data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">13</span></sup><span data-dcnode-id="1558" instrument_node=""> If Russia were to solely attack, say, Latvia (which has about 5,300 active national personnel), its forces would face about 1,100 additional soldiers from Albania, Canada, Italy, Poland, Slovenia, and Spain—but Russia would not face British, French, German, or U.S. forces.</span><sup data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">14</span></sup><span data-dcnode-id="1555" instrument_node=""> In fact, given that the EFP base in Latvia is located in Ādaži, more than 200 kilometers from the Latvian-Russian border, even the Latvian EFP battlegroup would not necessarily be involved in the initial stages of combat if Russia were to attack and rapidly seize only a small part of eastern Latvia. Moreover, Russia has repeatedly shown that it can muster a force of up to 100,000 personnel in its Western Military District on relatively short notice.</span><sup data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">15</span></sup><span data-dcnode-id="1552" instrument_node=""> The small EFP force that would line up against them would essentially constitute a trip wire that could neither halt nor push back a serious Russian intervention. The main purpose of the EFP personnel would be to ensure that as many NATO allies as possible would be involved in combat, or to put it more bluntly, would die.</span><sup data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">16</span></sup></p><span data-dcnode-id="1548" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1544"><span data-dcnode-id="1547" instrument_node="">The grim logic of this arrangement is that once the trip wire is pulled, NATO would be forced to retake the Baltic states if it were to not accept (temporary) defeat at Russia’s hands. In the event of a crisis or combat, the EFP could, according to current plans, receive two waves of reinforcements. The first to arrive would be NATO’s Very High Readiness Joint Task Force (VJTF)—also known as the Spearhead Force—which consists of, at most, 13,000 personnel. The Spearhead is the most rapidly deployable part of the Enhanced NATO Response Force (eNRF) the rest of which would follow later. At most, the complete eNRF consists of 40,000 personnel (including the Spearhead).</span><sup data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">17</span></sup></p><span data-dcnode-id="1543" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1527"><span data-dcnode-id="1542" instrument_node="">Assembling, moving, and deploying those forces would take time. NATO estimates that it would take less than seven days to deploy the Spearhead.</span><sup data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">18</span></sup><span data-dcnode-id="1539" instrument_node=""> Little is known publicly about the readiness of the rest of the eNRF.</span><sup data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">19</span></sup><span data-dcnode-id="1536" instrument_node=""> Some experts believe that “between 30 and 45 days” would be needed “from notice to movement”—a timeline that does not include actual deployment.</span><sup data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">20</span></sup><span data-dcnode-id="1533" instrument_node=""> How long it would take European allies to muster additional credible forces for a potential third wave, given the atrophied state of some European allies’ forces, is even less clear.</span><sup data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">21</span></sup><span data-dcnode-id="1530" instrument_node=""> One study concluded that even British, French, or German forces would have a hard time providing a combat-ready heavy brigade at short notice.</span><sup data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">22</span></sup></p><span data-dcnode-id="1526" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1519"><span data-dcnode-id="1525" instrument_node="">Of course, in the event of a crisis, it would be possible for individual NATO states, most notably the United States, to bypass NATO’s political command structure and intervene independently ahead of a NATO decision.</span><sup data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">23</span></sup><span data-dcnode-id="1522" instrument_node=""> However, doing so would come at the political price of rendering NATO’s collective decisionmaking in the North Atlantic Council (NAC) obsolete. Moreover, given the current U.S. administration’s ambiguous commitment to Article V, Washington’s willingness to intervene independently is questionable. In any case, all military crisis planning ultimately depends on NATO allies politically agreeing to use force to counter a potential Russian attack. While the decision to enter war with Russia would certainly not be an easy one, it would require a unanimous vote by the twenty-nine members of the NAC.</span><sup data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">24</span></sup></p><span data-dcnode-id="1518" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1513"><span data-dcnode-id="1517" instrument_node="">NATO’s long reaction times create another problem—the risk of inadvertent escalation. In the event that Russia threatened a conventional attack, NATO decisionmakers would be under potentially enormous pressure to ready the Spearhead and perhaps also the eNRF as early as possible to prevent deliberate escalation. But Moscow could misinterpret these actions as an imminent threat, leading Russia to rapidly escalate in response.</span><sup data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">25</span></sup><span data-dcnode-id="1514" instrument_node=""> NATO could try to communicate the purposes behind its actions to Russia, but doing so persuasively could be difficult.</span></p><span data-dcnode-id="1512" instrument_node="">
</span><blockquote data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">The current configuration has loopholes that might provide Russia with the opportunity for a military fait accompli, effectively taking a small part of Latvia. This increases the risk of deliberate escalation.</span></blockquote><span data-dcnode-id="1509" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1504"><span data-dcnode-id="1508" instrument_node="">To make matters worse, the geography of the Baltics would not be conducive to NATO operations. Russia enjoys considerable strategic depth in its vast Western Military District and has a well-integrated railroad system to reinforce troops quickly in the event of a conflict. By contrast, NATO allies would have to fly or ship in reinforcements of personnel and military equipment—a much slower process.</span><sup data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">26</span></sup><span data-dcnode-id="1505" instrument_node=""> NATO has decided against pre-positioning equipment in the Baltic states; much U.S. equipment is, for example, based 1,500 kilometers away in Germany. Reinforcing by land would entail multiple challenges, ranging from NATO’s atrophied logistics or missing railway links in Eastern Europe to Russia’s abilities to hold NATO’s transportation nodes at risk.</span></p><span data-dcnode-id="1503" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1498"><span data-dcnode-id="1502" instrument_node="">Particularly the latter represents a serious problem for NATO. The flow of NATO’s reinforcements—by air, sea, and land routes—could be disrupted by Russia’s substantial modern anti-access and area denial (A2/AD) capabilities, which are centered in the Kaliningrad exclave and around Saint Petersburg. These capabilities include conventional and dual-capable guided missiles, anti-ship weapons, air defense systems, and several layers of modern radar.</span><sup data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">27</span></sup><span data-dcnode-id="1499" instrument_node=""> If accusations that Russia has violated the INF Treaty are correct, then Moscow might well also possess dual-capable intermediate-range missiles that could be used to target key transport nodes and pre-positioned equipment deep in Western Europe.</span></p><span data-dcnode-id="1497" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">Taken together, the current EFP configuration has loopholes that might provide Russia with the opportunity for a military fait accompli, effectively taking a small part of Latvia. This increases the risk of deliberate escalation. Without the EFP directly involved in early combat, NATO members might find it hard to agree on immediate military counteractions. If Russia were to only threaten a conventional attack, the risk of inadvertent escalation might increase once NATO decides to deploy additional forces to the Baltics. Russia might simply misread NATO’s defensive move as offensive. Last but not least, in any crisis or open conflict with Russia, NATO would face serious but not insurmountable obstacles reinforcing its troops.</span></p><span data-dcnode-id="1494" instrument_node="">
</span><h4 data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Doing Too Little vs. Doing Too Much</span></h4><span data-dcnode-id="1491" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1481"><span data-dcnode-id="1490" instrument_node="">Some Western analysts have criticized NATO’s deterrence and assurance measures for not doing enough to meaningfully mitigate the risk of deliberate Russian escalation. They worry that NATO’s current policy may still leave Moscow tempted to test the alliance with its superior conventional forces unless NATO follows up with a strategy for overcoming Russian A2/AD capabilities and enabling swift reinforcement.</span><sup data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">28</span></sup><span data-dcnode-id="1487" instrument_node=""> Others have argued for the additional deployment of large-scale, mainly U.S. troops to the region to help bypass the reinforcement problem.</span><sup data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">29</span></sup><span data-dcnode-id="1484" instrument_node=""> According to war games conducted by the RAND Corporation, NATO would probably need seven heavily armed brigades (of about 35,000 personnel) permanently deployed in the region to prevent a Russian fait accompli and an additional nine to fourteen maneuver brigades (of up to about 70,000 personnel) as reinforcements to drive Russian forces back.</span><sup data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">30</span></sup></p><span data-dcnode-id="1480" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1476"><span data-dcnode-id="1479" instrument_node="">Officials from the region have echoed some of these concerns. Baltic officials, in particular, argue in private conversations for additional deployments—particularly of U.S. forces—to their countries, though on a much more limited scale than proposed in the RAND study. They express an expectation that current deterrence and assurance measures are only the starting point for a larger effort aimed at modernizing and streamlining NATO’s overall command structure, and they maintain that the next steps must include efforts to permanently secure reinforcement routes, to have reinforcement personnel ready at all times, and to provide indigenous Baltic forces with advanced equipment, such as air defense systems, needed to win time in any war with Russia.</span><sup data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">31</span></sup></p><span data-dcnode-id="1475" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1465"><span data-dcnode-id="1474" instrument_node="">These views are at odds with those of other NATO allies who have warned the alliance of unnecessarily increasing tensions with Russia by going beyond current deployments. Germany and France, in particular, seem to believe that the EFP is sufficient and that further military deployments are not an urgent matter.</span><sup data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">32</span></sup><span data-dcnode-id="1471" instrument_node=""> Conscious of cost considerations, they point to allies’ combined military and economic superiority and see the Russian conventional edge in the Baltics as only one side of the equation. After all, on the other hand, NATO states currently have 3.2 million personnel in their collective militaries, compared to 830,000 active Russian servicemen; moreover, the United States maintains, by far, the world’s largest and most powerful armed forces. In the words of the former head of Poland’s National Security Bureau, Army General Stanisław Koziej, “NATO is the most powerful military alliance in the world and has the largest military potential at its disposal, the deterrence power of which discourages any potential adversary from confrontation.”</span><sup data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">33</span></sup><span data-dcnode-id="1468" instrument_node=""> The allies that take this position receive support from NATO’s Southern European members, who would instead like to see greater attention focused on North Africa and the Middle East to counter threats such as mass migration and international terrorism.</span><sup data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">34</span></sup></p><span data-dcnode-id="1464" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1454"><span data-dcnode-id="1463" instrument_node="">Further arguments against a more muscular NATO policy in Eastern Europe include recognition of Russia’s legitimate interest in securing Kaliningrad (which might be hard for Moscow to defend in a war with NATO</span><sup data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">35</span></sup><span data-dcnode-id="1460" instrument_node="">) and NATO’s ability to hold Russian A2/AD assets at risk, using assets that include dozens of advanced stealthy air-launched cruise missiles recently acquired by Poland.</span><sup data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">36</span></sup><span data-dcnode-id="1457" instrument_node=""> According to the U.S. chief of naval operations, Admiral John Richardson, “The reality is that we can fight from within these defended [A2/AD] areas and if needed, we will.”</span><sup data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">37</span></sup></p><span data-dcnode-id="1453" instrument_node="">
</span><blockquote data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Proponents of a more cautious approach worry that NATO and Russia are entering a self-reinforcing cycle of mutual insecurity.</span></blockquote><span data-dcnode-id="1450" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1440"><span data-dcnode-id="1449" instrument_node="">Proponents of a more cautious approach worry that NATO and Russia are entering a self-reinforcing cycle of mutual insecurity, with each side (mis)interpreting the actions of the other as potentially offensive in nature. They argue that the instability of an uncontrolled arms race, driven by a desire for more security, further increases general tensions with Russia and could ultimately lead to escalation.</span><sup data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">38</span></sup><span data-dcnode-id="1446" instrument_node=""> Germany, in particular, has spearheaded calls for NATO-Russian talks on confidence- and security-building measures (CSBMs) and arms control, building on NATO’s consensus decision at the 2014 Wales Summit to renew dialogue with Russia over the long term.</span><sup data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">39</span></sup><span data-dcnode-id="1443" instrument_node=""> Berlin argues that NATO should not forget that goal. Germany sees arms control measures for the wider Baltic region—such as mutual force limitations in the region and more transparency regarding large as well as snap Russian exercises—as useful tools for enhancing crisis stability and avoiding a renewed arms race.</span><sup data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">40</span></sup></p><span data-dcnode-id="1439" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1432"><span data-dcnode-id="1438" instrument_node="">While recognizing Moscow’s aggressive policies over the last few years, proponents of arms control want to see an ongoing NATO commitment to hold on to the last remaining vestiges of the cooperative security regime with Russia. They fear that going beyond NATO’s current deterrence and assurance measures in the Baltic states and Poland could overload the NATO-Russia Founding Act of 1997, in which NATO pledged not to permanently station additional “substantial combat forces” on the territories of those states.</span><sup data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">41</span></sup><span data-dcnode-id="1435" instrument_node=""> NATO reiterated this pledge at the Warsaw Summit.</span><sup data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">42</span></sup></p><span data-dcnode-id="1431" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">For the time being, NATO seems focused on maintaining the delicate balance of assuring its easternmost allies, considering calls for caution, and signaling resolve as well as non-offensive intentions to Russia. The size of the EFP, in particular, is a concession to NATO’s more cautious allies to maintain alliance unity and to signal restraint toward Russia. At the same time, as a result of this concession, NATO has accepted the military and political hardship that would come with retaking the Baltics in the event of a potential Russian attack.</span></p><span data-dcnode-id="1428" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">This consensus is, however, not necessarily set in stone. Any significant and permanent buildup of Russian forces close to Baltic territories, which has not occurred so far, or another Russian intervention in the post-Soviet space—in Belarus, for example—would strengthen arguments in favor of more NATO boots on the ground. Meanwhile, the longer that the status quo and its multiple escalation risks persists without further Russian military aggression, the stronger the voices within the alliance will grow to add a significant détente component to NATO’s current approach.</span></p><span data-dcnode-id="1425" instrument_node="">
</span><h3 data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">The Risks of Nuclear Escalation</span></h3><span data-dcnode-id="1422" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1417"><span data-dcnode-id="1421" instrument_node="">Beyond the aforementioned risks of conventional escalation, additional escalation pathways extend to the nuclear realm of the NATO-Russia relationship. In its official documents, NATO is upfront and states that the alliance reserves the right to use nuclear weapons. At the same time, it concedes that “the circumstances in which any use of nuclear weapons might have to be contemplated are extremely remote.”</span><sup data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">43</span></sup><span data-dcnode-id="1418" instrument_node=""> However, that does not necessarily imply that the alliance would be unwilling to use nuclear weapons in the event of a crisis.</span></p><span data-dcnode-id="1416" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1409"><span data-dcnode-id="1415" instrument_node="">But words are only one part of the equation. The other is that NATO has put much less emphasis on its nuclear deterrent in Europe since the end of the Cold War. The alliance has forward-deployed an estimated 150 U.S. B-61 gravity bombs in Belgium, Germany, Italy, the Netherlands, and Turkey.</span><sup data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">44</span></sup><span data-dcnode-id="1412" instrument_node=""> The gravity bombs deployed in Turkey are not operational as long as nuclear-capable aircraft are not stationed at the İncirlik Air Base. As noted before, Russia has an estimated 2,000 tactical nuclear arms, many of which are assumed to be stored in depots in the western (European) part of the country, and Moscow regularly conducts exercises to simulate the transition from conventional to nuclear warfare. That said, even though Russia now relies heavily on the threat of nuclear use, and even though NATO has reduced its reliance on nuclear arms, the alliance still threatens nuclear use to try and deter a Russian attack against the Baltics.</span><sup data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">45</span></sup></p><span data-dcnode-id="1408" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1403"><span data-dcnode-id="1407" instrument_node="">There are, nonetheless, a range of views within NATO on its nuclear posture. To begin with, nuclear weapons are generally very unpopular in all of the five NATO states that host U.S. B-61 bombs; politicians in Belgium, Germany, and the Netherlands have regularly responded to this domestic sentiment by seeking to remove these U.S. weapons.</span><sup data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">46</span></sup><span data-dcnode-id="1404" instrument_node=""> Moreover, some alliance members do not see an immediate need to take steps to bolster NATO’s nuclear posture in the wake of Russia’s annexation of Crimea. As a result, in recent years, member states have shied away from an open debate about NATO’s nuclear deterrent, and NATO’s nuclear policy has not been updated.</span></p><span data-dcnode-id="1402" instrument_node="">
</span><blockquote data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">In fact, like Russia’s nuclear doctrine, NATO’s current nuclear policy contains quite an element of ambiguity as well. Would NATO be ready to use nuclear weapons in a conflict with Russia?</span></blockquote><span data-dcnode-id="1399" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">In fact, like Russia’s nuclear doctrine, NATO’s current nuclear policy contains quite an element of ambiguity as well. Would NATO be ready to use nuclear weapons in a conflict with Russia? The answer is far from obvious given the contradictions between the alliance’s official declaratory policy and members’ divergent views on nuclear arms. The resulting inadvertent ambiguity could in fact prevent escalation, for Russia might shy away from testing NATO’s nuclear resolve. On the other hand, this ambiguity could also invite deliberate nuclear escalation if Russia misreads it.</span></p><span data-dcnode-id="1396" instrument_node="">
</span><h4 data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Doing Too Little vs. Doing Too Much</span></h4><span data-dcnode-id="1393" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1382"><span data-dcnode-id="1392" instrument_node="">The intra-alliance debate over nuclear weapons is similar to the one over conventional forces. Critics who worry that NATO is doing too little perceive Russia as having more, and more readily available, capabilities, as well as, perhaps, greater resolve to escalate to nuclear use. They worry that NATO’s resolve to use nuclear weapons is undermined by powerful domestic opposition to nuclear arms in key member states and by the fact that NATO’s combined conventional forces are still superior to Russia’s (which is to say there might be no actual need for NATO to use its nuclear weapons).</span><sup data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">47</span></sup><span data-dcnode-id="1389" instrument_node=""> Some allies also criticize NATO for not making meaningful attempts to explain to their publics why nuclear arms continue to matter.</span><sup data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">48</span></sup><span data-dcnode-id="1386" instrument_node=""> The result of this lack of public discussion, they claim, is that NATO’s forward-deployed nuclear weapons are typically kept in such a way that they are weeks away from being ready to use.</span><sup data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">49</span></sup><span data-dcnode-id="1383" instrument_node=""> As a result, critics charge NATO with being unprepared for nuclear use.</span></p><span data-dcnode-id="1381" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1370"><span data-dcnode-id="1380" instrument_node="">Other points of criticism abound as well. For instance, NATO exercises do not practice the transition from conventional to nuclear warfare, as Russian exercises do. Another issue is that a minority of experts also views NATO’s numerical nuclear inferiority in Europe as problematic and is concerned that the existing imbalance will be further tipped in Russia’s favor if Moscow really is producing and deploying weapons in violation of the INF Treaty.</span><sup data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">50</span></sup><span data-dcnode-id="1377" instrument_node=""> Polish experts, in particular, have expressed additional concerns about the possibility of Russia secretly moving nuclear warheads for short-range missiles into Kaliningrad.</span><sup data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">51</span></sup><span data-dcnode-id="1374" instrument_node=""> Especially in light of Moscow’s alleged doctrine of escalate-to-deescalate, these critics believe that NATO would be left without an appropriate response if Russia were to escalate to nuclear use or even if it just threatened nuclear use following an attack on NATO territory.</span><sup data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">52</span></sup><span data-dcnode-id="1371" instrument_node=""> As a result, they worry that NATO’s nuclear deterrent might not be sufficiently credible to prevent deliberate Russian escalation.</span></p><span data-dcnode-id="1369" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1359"><span data-dcnode-id="1368" instrument_node="">Against this backdrop, the new 2018 U.S. Nuclear Posture Review (NPR) argues that to “credibly deter Russian nuclear or non-nuclear strategic attacks . . . the President must have a range of limited and graduated options, including a variety of delivery systems and explosive yields.”</span><sup data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">53</span></sup><span data-dcnode-id="1365" instrument_node=""> Such capabilities, the drafters of the NPR argue, would “pose insurmountable difficulties to any Russian strategy of aggression against the United States, its allies, or partners and ensure the credible prospect of unacceptably dire costs to the Russian leadership if it were to choose aggression.”</span><sup data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">54</span></sup><span data-dcnode-id="1362" instrument_node=""> In concrete terms, the NPR recommends new sea-based nuclear options, including low-yield nuclear warheads, designed to introduce additional tailored nuclear responses. Those proposals are most likely welcome in Eastern Europe, and particularly in Poland, where some analysts and officials have debated the option of making Polish F-16 fighter jets nuclear-capable to support NATO’s nuclear missions.</span><sup data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">55</span></sup></p><span data-dcnode-id="1358" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1354"><span data-dcnode-id="1357" instrument_node="">Those who oppose efforts to strengthen NATO’s nuclear profile make a strong case that doing so would risk serious disunity because of the strong public opposition to nuclear weapons in many European NATO states. In response to the criticism that NATO lacks the capabilities necessary for deterrence, they point out that NATO is already tailoring its deterrent capability. In particular, the U.S. B-61s have a so-called dial-a-yield functionality that reportedly permits them to produce a yield as low as 0.3 kilotons or as high as 170 kilotons.</span><sup data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">56</span></sup></p><span data-dcnode-id="1353" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1343"><span data-dcnode-id="1352" instrument_node="">Moreover, prior to the new NPR, Washington was already in the process of enhancing NATO’s nuclear deterrence capabilities. Starting in 2022, Washington will field a modernized version of the B-61 with improved accuracy and (again) adjustable yields.</span><sup data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">57</span></sup><span data-dcnode-id="1349" instrument_node=""> In addition, the new U.S. administration is proceeding with plans to acquire between 1,000 and 1,100 new air-launched nuclear-armed cruise missiles that, in the event of a crisis, could be deployed to Europe along with the necessary U.S. aircraft.</span><sup data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">58</span></sup><span data-dcnode-id="1346" instrument_node=""> Washington has also begun to reinsert a nuclear presence into some NATO exercises since the annexation of Crimea—including two exercises in the Baltic region—with the participation of nuclear-capable U.S. B-52 bombers.</span><sup data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">59</span></sup></p><span data-dcnode-id="1342" instrument_node="">
</span><blockquote data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Those who oppose efforts to strengthen NATO’s nuclear profile claim doing so would risk disunity because of the public opposition to nuclear weapons in many European NATO states.</span></blockquote><span data-dcnode-id="1339" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1328"><span data-dcnode-id="1338" instrument_node="">Moreover, critics underline the grave dangers that a U.S. doctrine based on limited nuclear use might pose to the general stability promised by nuclear deterrence.</span><sup data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">60</span></sup><span data-dcnode-id="1335" instrument_node=""> They argue that the introduction of smaller yield warheads might cause Russia to conclude that the United States is enhancing its ability to conduct a disarming first strike against Russia with minimal civilian casualties.</span><sup data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">61</span></sup><span data-dcnode-id="1332" instrument_node=""> Referring to Russia’s alleged doctrine of escalate-to-deescalate, then U.S. deputy defense secretary Robert Work and Admiral James Winnefeld stated in 2015: “Anyone who thinks they can control escalation through the use of nuclear weapons is literally playing with fire. Escalation is escalation, and nuclear use would be the ultimate escalation.”</span><sup data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">62</span></sup><span data-dcnode-id="1329" instrument_node=""> If Work’s and Winnefeld’s assumption is true, and if it applies to the United States and NATO as well, changing NATO’s nuclear posture to include further options for managing nuclear escalation might well outweigh the perceived benefits. Finally, proponents of a more cautious nuclear approach want to prevent allies from unnecessarily entering a new nuclear arms race with Russia, which could raise tensions and, hence, risk escalation and the unity of the alliance.</span></p><span data-dcnode-id="1327" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">For the time being, NATO’s nuclear policy continues to follow this more cautious approach. But the NPR’s recommendation of introducing additional low-yield nuclear options to the U.S. arsenal might well trigger a debate among allies about possible adjustments of NATO’s nuclear doctrine. Current events, particularly the ongoing crisis over the INF Treaty, could lend additional credence to those urging NATO to take a fresh look at its approach to nuclear deterrence.</span></p><span data-dcnode-id="1324" instrument_node="">
</span><h3 data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">The Challenges Associated with Nonkinetic Operations</span></h3><span data-dcnode-id="1321" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1316"><span data-dcnode-id="1320" instrument_node="">Moscow’s NGW strategy also forces NATO to look beyond, or more precisely, </span><em data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">below</span></em><span data-dcnode-id="1317" instrument_node="">, the nuclear and conventional rungs of the escalation ladder to the problems caused by Russia’s nonkinetic operations. Deterrence and assurance are not necessarily an effective remedy against these operations as many of them take place in the civilian realm and cannot be countered by classical military means. It is, therefore, necessary for NATO to embrace a holistic strategy that doubles down on resilience measures, aimed at mitigating nonkinetic escalation risks. Moscow’s nonkinetic operations against NATO member states have essentially two goals: (1) avoiding a large-scale military conflict with the alliance while, at the same time, (2) gradually undermining member states’ internal cohesion by puzzling and exhausting them, the ultimate aim being to coerce allies into accepting unfavorable political outcomes, such as giving up on promoting the independence of the other former Soviet republics.</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">The diverse range of Russia’s nonkinetic toolbox makes it challenging for NATO states to identify one single action, such as Russian sponsorship of anti-government groups, as sufficiently serious to demand a strong response and, then, for member states to decide what that strong response should be. Nevertheless, this form of low-level attacks in nonmilitary domains and by non-attributable or low-visibility actions can further exacerbate general tensions between NATO and Russia and could potentially create the conditions for a crisis. This problem is particularly apparent in the three Baltic states.</span></p><span data-dcnode-id="1312" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1302"><span data-dcnode-id="1311" instrument_node="">Moscow’s disruptive propaganda and disinformation campaigns targeting the three Baltic states have been in operation for more than a decade.</span><sup data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">63</span></sup><span data-dcnode-id="1308" instrument_node=""> All three of these states are home to ethnic Russian minorities, which constituted 25 percent of Estonia’s population, 26.9 percent of Latvia’s, and about 5.8 percent of Lithuania’s in 2011 respectively.</span><sup data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">64</span></sup><span data-dcnode-id="1305" instrument_node=""> Most of these groups are fairly well integrated, and problems generally do not arise in daily life. But they continue to value their Russian roots, language, and family or business ties. Moreover, their relationship to the Baltic majorities is often fraught because of mutual historical grievances about the Soviet occupation of the Baltic states and the breakup of the Soviet Union. Almost all of these Baltic Russian minorities receive their daily information entirely through Russian state-sponsored media, which incorrectly describes the three countries as “failing states” with huge economic and political problems that are unfit to serve as proper homes for the Russians living there, not least because their Baltic majorities purportedly have stark anti-Russian feelings.</span><sup data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">65</span></sup></p><span data-dcnode-id="1301" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1296"><span data-dcnode-id="1300" instrument_node="">Since 2014, these efforts to negatively manipulate Russian minorities in the Baltics, which sometimes border on outright hate speech, have accelerated. With the arrival of the first units of the EFP, Russian propaganda increased. For example, in February 2017, a source, believed to be Russian, reported the alleged rape of a Lithuanian teenager by a group of German soldiers.</span><sup data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">66</span></sup><span data-dcnode-id="1297" instrument_node=""> Even though the Lithuanian authorities quickly rebutted this untrue story, potential mistrust between the Baltic populations and the multinational NATO forces might undermine the former’s general acceptance of the latter and thus impede their defensive value for the Baltic states.</span></p><span data-dcnode-id="1295" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">The danger of nonkinetic Russian operations in the information space stems from their deliberate as well as inadvertent effects and the difficulty of defending against them. The deliberate effect is to prevent reconciliation efforts between the many ethnic groups populating the Baltic states and to present authorities with manifold internal problems, such as fighting a constant uphill battle against hardening mutual prejudices. But the inadvertent effects could go much further, since the constant seeping of propaganda and disinformation into the collective consciousness of Russian minorities could at some point lead to a domestic crisis, perhaps sparked by a totally mundane event, such as local rivalries between different groups of youth turning into violent protests. In the wake of such an incident, the Kremlin could face mounting domestic pressure to intervene if Russian minorities were involved.</span></p><span data-dcnode-id="1292" instrument_node="">
</span><blockquote data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">The danger of nonkinetic Russian operations in the information space stems from their deliberate as well as inadvertent effects and the difficulty of defending against them.</span></blockquote><span data-dcnode-id="1289" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1284"><span data-dcnode-id="1288" instrument_node="">Baltic officials and experts have a range of views about the likelihood of such a scenario. The majority describe Russia’s leverage as rather limited, particularly in comparison to how much it held over Georgia and Ukraine prior to its interventions in those countries. There are experts, however, who warn against underestimating the Kremlin’s destabilization efforts because the consequences of these efforts being successful could be quite dire.</span><sup data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">67</span></sup><span data-dcnode-id="1285" instrument_node=""> Either way, Russia’s employment of nonkinetic operations, even though deliberately aimed at avoiding large-scale escalation, could inadvertently lead to that exact outcome.</span></p><span data-dcnode-id="1283" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1278"><span data-dcnode-id="1282" instrument_node="">The big challenge for NATO is that deterring these operations with classical military means is almost impossible, particularly since Russia relies on a wide range of nonkinetic operations across multiple nonmilitary domains—such as cyberattacks, criminal activities like fostering corruption, and intelligence operations aimed at probing border security measures.</span><sup data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">68</span></sup><span data-dcnode-id="1279" instrument_node=""> Responding with conventional—let alone nuclear—deterrence threats is not credible because such traditional military defense measures are highly disproportionate. A related risk is that because Russian nonkinetic operations can fly under the radar, NATO members might pay too much attention to nuclear or conventional escalation scenarios and fail to give adequate attention to Russian nonkinetic operations.</span></p><span data-dcnode-id="1277" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1270"><span data-dcnode-id="1276" instrument_node="">One of NATO’s responses so far has been to focus on strengthening the resilience of its members to nonkinetic operations. Resilience aims to lessen the impact of a future shock by preparing states to manage a crisis such as a sudden, sustained nationwide electricity outage.</span><sup data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">69</span></sup><span data-dcnode-id="1273" instrument_node=""> Societies can prepare for large-scale evacuations by regularly practicing this contingency and by storing supplies in case an emergency occurs. In concrete terms, Lithuania has started to raise public awareness about the possibility that Russia may stage a military attack and has widely disseminated small handbooks to its people on how to act in such an event.</span><sup data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">70</span></sup></p><span data-dcnode-id="1269" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1262"><span data-dcnode-id="1268" instrument_node="">Like deterrence, resilience is preventive, but the latter operates without making a threat. In the words of Patrick Turner, NATO’s assistant secretary general for operations, “we can only confront today’s security challenges effectively if we strengthen our civil preparedness alongside our military preparedness.”</span><sup data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">71</span></sup><span data-dcnode-id="1265" instrument_node=""> But although NATO’s resilience efforts include securing critical civilian infrastructure, such as electrical grids and power stations, against cyberattacks or sabotage as well as defending against cyber intrusions that might hurt local economies, the alliance’s primary concern still centers around preventing the disruption of military deployments to ensure effective deterrence and defense.</span><sup data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">72</span></sup></p><span data-dcnode-id="1261" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1245"><span data-dcnode-id="1260" instrument_node="">What remains open to debate is how to tailor resilience measures in the Baltics to reduce the vulnerability of Russian minorities against Russian propaganda and disinformation. So far, allies have viewed resilience as a primarily national responsibility that NATO can support by, for instance, cooperating with the European Union.</span><sup data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">73</span></sup><span data-dcnode-id="1257" instrument_node=""> Some allies are concerned that concentrating too much on resilience might run the risk of losing sight of NATO’s traditional core missions of deterrence and defense.</span><sup data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">74</span></sup><span data-dcnode-id="1254" instrument_node=""> A report authorized by the Latvian National Defense Academy exemplifies such sentiment, concluding that “Russia’s influence in Latvia is limited.”</span><sup data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">75</span></sup><span data-dcnode-id="1251" instrument_node=""> Some experts, meanwhile, view Russian nonkinetic operations as a mere repetition of “Soviet-style” propaganda that has already been shown to fail.</span><sup data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">76</span></sup><span data-dcnode-id="1248" instrument_node=""> Still others argue that in an increasingly interconnected world, it would be extremely difficult to comprehensively defend against the NGW’s inherently boundless approach, and so they advocate good governance and appropriate minority rights.</span><sup data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">77</span></sup></p><span data-dcnode-id="1244" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1240"><span data-dcnode-id="1243" instrument_node="">All in all, even though NATO’s approach to resilience is much less controversial within the alliance than its deterrence and assurance policies, the alliance shies away from playing a larger role in seeking to foster civilian resilience in the three Baltic states, including efforts to address the potential vulnerability of the Russian minorities there. To be clear, the alliance could be tested in the future. For example, EFP forces could become a high-priority target of Russian nonkinetic operations, such as protests in front of military barracks, sabotage, or terrorist activities. Such operations could be aimed at undermining public acceptance of the EFP, both in the countries that provide the forces and in their host countries.</span><sup data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">78</span></sup></p><span data-dcnode-id="1239" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Having said that, so far none of the allies in the Baltics have experienced any concerted or sustained large-scale, nonkinetic, Russian attack across multiple domains that could seriously test the effectiveness of existing national resilience measures. In the absence of such a reality check, NATO allies face the challenge of identifying all the domains that could lend themselves to escalatory Russian actions so as to keep up with Moscow’s creativity in conducting nonkinetic operations, while avoiding the over-securitization of almost all parts of everyday life.</span></p><span data-dcnode-id="1236" instrument_node="">
</span><h3 data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">The Risk of Accidental Escalation</span></h3><span data-dcnode-id="1233" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Russia has stepped up military brinkmanship vis-à-vis NATO members and other nonmember states in Europe since the annexation of Crimea in 2014. Brinkmanship, as a tactic aimed at intimidating the opponent, entails the risk of accidental escalation, if (for instance) adversarial forces operate in close proximity. Like Russia’s nonkinetic operations, the risk of accidental escalation cannot be addressed by deterrence. Instead, managing accidental escalation requires NATO allies to more actively pursue good communications and risk-reduction measures.</span></p><span data-dcnode-id="1230" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1222"><span data-dcnode-id="1229" instrument_node="">In the past few years, Moscow has repeatedly violated the national airspaces of countries in Northern Europe, such as the Baltic states, as well as those of non-NATO members like Finland and Sweden.</span><sup data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">79</span></sup><span data-dcnode-id="1226" instrument_node=""> In response, national or NATO aircraft usually approach the offending Russian jets and drive or escort them back. The immediate tactical aim of the Russian pilots conducting such maneuvers is to test the readiness of national air defenses. Close military encounters involving Russian forces also happen in international airspace and over international waters. In these environments as well, Russian pilots have exhibited risky behavior, by getting very close to surveillance planes or ships, for instance. Especially early on in the Ukraine crisis, there were even cases in which civilian aircraft were endangered.</span><sup data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">80</span></sup><span data-dcnode-id="1223" instrument_node=""> Ultimately, the strategic goal behind these dangerous tactics is to intimidate Russia’s neighbors and remind them that Moscow is a capable military power.</span></p><span data-dcnode-id="1221" instrument_node="">
</span><blockquote data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Like Russia’s nonkinetic operations, the risk of accidental escalation cannot be addressed by deterrence.</span></blockquote><span data-dcnode-id="1218" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1210"><span data-dcnode-id="1217" instrument_node="">Quite often, these tactics create the risk of accidental escalation. For example, a Russian fighter aircraft deliberately came extremely close to a U.S. destroyer over the Baltic Sea in 2016.</span><sup data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">81</span></sup><span data-dcnode-id="1214" instrument_node=""> Even though Russia maintains a highly professional air force, a technical glitch or human error in such situations could lead to an unintended accident causing the deaths of multiple NATO military personnel. Hasty overreactions can lead to fatalities as well. In 2015, the Turkish military shot down a Russian jet after issuing multiple warnings for Russian aircraft not to continue violating Turkish national airspace. In the wake of that incident, tensions between Moscow and Ankara ran high, as each side accused the other of misbehavior.</span><sup data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">82</span></sup><span data-dcnode-id="1211" instrument_node=""> The larger risk behind such dangerous maneuvers and incidents is that they could happen in an already tense political environment. Akin to the proverbial straw that broke the camel’s back, an accidental military incident with fatalities could lead to domestic calls for retaliation that could, in turn, spark a larger military crisis that neither side might be able to contain.</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Preventing accidental escalation calls, first and foremost, for responsible behavior. But absent the political willingness to show such behavior, improved communication can help. Before an accidental crisis, good communication can help prevent one from occurring in the first place. During an accidental crisis, reliable communication channels can help the parties involved deescalate the situation and perhaps contain the immediate political fallout. In addition, commonly agreed-upon rules of the road, such as a mutual expectation to switch on aircraft transponders at all times, perhaps embodied in bilateral and multilateral CSBMs, could help mitigate the risks of accidental escalation.</span></p><span data-dcnode-id="1206" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1201"><span data-dcnode-id="1205" instrument_node="">NATO allies have sought to pursue talks with Russia on risk-reduction measures and general responsible airmanship, but these efforts have stalled as the two sides have not been able to agree on the best way forward.</span><sup data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">83</span></sup><span data-dcnode-id="1202" instrument_node=""> NATO has suggested that Russia first change its behavior, after which the two sides could institute a political process for updating risk-reduction procedures under Chapter III of the Vienna Document, an agreement on CSBMs under the auspices of the multinational Organization for Security and Cooperation in Europe (OSCE). Because NATO suspended practical cooperation with Russia in 2014 in reaction to the annexation of Crimea, alliance members would prefer the OSCE as a forum, so as to avoid a dedicated military-to-military dialogue with Moscow. Contrary to this preference, Moscow has started to demand direct and exclusive consultations with NATO. Further complicating matters, the Ukraine crisis has interrupted continuous NATO-Russian military-to-military channels of communication at the working level.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><blockquote data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Even though the number of incidents has gone down in recent months, NATO is aware that current conditions still create the risk of accidental escalation.</span></blockquote><span data-dcnode-id="1197" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1184"><span data-dcnode-id="1196" instrument_node="">Some experts have suggested dusting off, inter alia, two bilateral U.S.-Soviet agreements from the Cold War: the Agreement on the Prevention of Incidents On and Over the High Seas (INCSEA) and the Agreement on the Prevention of Dangerous Military Activities (DMA). Both agreements were designed to regulate military forces operating in close proximity so as to reduce the risk of accidents and miscalculations by, for instance, avoiding mock attacks simulating the use of weapons against aircraft or ships.</span><sup data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">84</span></sup><span data-dcnode-id="1193" instrument_node=""> These agreements also contain important military-to-military communications channels, such as annual review meetings, joint military commissions, and the continuous maintenance of open communications channels based on agreed-upon call signs and radio frequencies.</span><sup data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">85</span></sup><span data-dcnode-id="1190" instrument_node=""> While the DMA is largely underused—the U.S.-Russian consultation commission has met only twice since the agreement was concluded in 1989—U.S.-Russian INCSEA meetings are taking place.</span><sup data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">86</span></sup><span data-dcnode-id="1187" instrument_node=""> In addition, eleven other NATO members have INCSEA-like arrangements with Russia in place. The problem is that in the wider Baltic region, neither Poland nor the three Baltic states have INCSEA arrangements with Russia.</span><sup data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">87</span></sup></p><span data-dcnode-id="1183" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1178"><span data-dcnode-id="1182" instrument_node="">Even though the number of incidents has gone down in recent months, NATO is aware that current conditions still create the risk of accidental escalation. Officially, risk-reduction efforts are considered a priority for NATO—under the headline of general engagement with Russia—as stated in the 2016 Warsaw Summit declaration.</span><sup data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">88</span></sup><span data-dcnode-id="1179" instrument_node=""> However, there seems to be disagreement within the alliance about the terms of engagement with Moscow and the nature of potential deliverables. These disagreements and a general lack of Russian cooperation create the risk of putting off efforts to address the problem of accidental escalation.</span></p><span data-dcnode-id="1177" instrument_node="">
</span><h3 data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Notes</span></h3><span data-dcnode-id="1174" instrument_node="">
