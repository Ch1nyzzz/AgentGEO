</span><h1 class="hed" data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Putin’s Empire of the Mind</span></h1><span data-dcnode-id="1260" instrument_node="">
</span></span><span data-dcnode-id="1258" instrument_node="">
</span><h2 class="dek-heading" data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">How Russia's president morphed from realist to ideologue -- and what he'll do next.
</span></h2><span data-dcnode-id="1255" instrument_node="">
</span><div class="author-bio" data-dcnode-id="1240"><span data-dcnode-id="1254" instrument_node="">
</span><div data-dcnode-id="1242"><span data-dcnode-id="1253" instrument_node="">

</span><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node=""> A specter is haunting Europe, the specter of Russian imperialism.  </span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1208" instrument_node=""> When Vladimir Putin first came to power in 1999, he talked ideologically but acted rationally. He listened to a range of opinions, from liberal economist Alexei Kudrin to political fixer Vladislav Surkov -- people willing to tell him hard truths and question groupthink. He may have regarded the collapse of the Soviet Union as the </span><a data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//news.bbc.co.uk/2/hi/4480745.stm"><span data-dcnode-id="1207" instrument_node="">greatest geopolitical disaster</span></a><span data-dcnode-id="1205" instrument_node=""> of the 20th century, but he knew he couldn't re-create it. Perhaps the best metaphor is that while he brought back the Soviet national anthem, it had new words. There was no thought of returning Russia to the failed Soviet model of the planned economy. And as a self-professed believer who always wears his baptismal cross, Putin encouraged the once-suppressed Russian Orthodox Church. </span></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node=""> He was a Russian patriot, but he also was willing to cooperate with the West when it suited his interests. One of the first leaders to offer his condolences after the 9/11 attacks, Putin shared Russian intelligence on al Qaeda with the United States. He did not hesitate to protect Russia's interests against the West -- in 2008 Putin undercut any thought of NATO expansion into Georgia by launching a war against its vehemently pro-Western president, Mikheil Saakashvili -- but Putin's challenges were carefully calibrated to minimize repercussions while maximizing gains. He shut off gas to Ukraine, unleashed hackers on Estonia, and, yes, sent troops into Georgia, but he made sure that the costs of asserting regional hegemony were limited, bearable, and short term.  </span></p><span data-dcnode-id="1200" instrument_node=""> </span></div><span data-dcnode-id="1198" instrument_node="">
</span><div class="content-gated" data-dcnode-id="1066"><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node=""> A specter is haunting Europe, the specter of Russian imperialism.  </span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1193" instrument_node=""> When Vladimir Putin first came to power in 1999, he talked ideologically but acted rationally. He listened to a range of opinions, from liberal economist Alexei Kudrin to political fixer Vladislav Surkov — people willing to tell him hard truths and question groupthink. He may have regarded the collapse of the Soviet Union as the </span><a data-dcnode-id="1191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//news.bbc.co.uk/2/hi/4480745.stm" target="_blank"><span data-dcnode-id="1192" instrument_node="">greatest geopolitical disaster</span></a><span data-dcnode-id="1190" instrument_node=""> of the 20th century, but he knew he couldn’t re-create it. Perhaps the best metaphor is that while he brought back the Soviet national anthem, it had new words. There was no thought of returning Russia to the failed Soviet model of the planned economy. And as a self-professed believer who always wears his baptismal cross, Putin encouraged the once-suppressed Russian Orthodox Church. </span></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node=""> He was a Russian patriot, but he also was willing to cooperate with the West when it suited his interests. One of the first leaders to offer his condolences after the 9/11 attacks, Putin shared Russian intelligence on al Qaeda with the United States. He did not hesitate to protect Russia’s interests against the West — in 2008 Putin undercut any thought of NATO expansion into Georgia by launching a war against its vehemently pro-Western president, Mikheil Saakashvili — but Putin’s challenges were carefully calibrated to minimize repercussions while maximizing gains. He shut off gas to Ukraine, unleashed hackers on Estonia, and, yes, sent troops into Georgia, but he made sure that the costs of asserting regional hegemony were limited, bearable, and short term.  </span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node=""> But that was the old Putin. Today, the West faces a rather different Russian leader.  </span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node=""> After all, the annexation of Crimea, by any rational calculation, did not make sense. Russia already had immense influence on the peninsula, but without the need to subsidize it, as Ukraine had. (Russia has already pledged $1.5 billion to support Crimea.) The Russian Black Sea Fleet’s position in the Crimean seaport of Sevastopol was secure until 2042. Any invasion would anger the West and force it to support whatever government took the place of Viktor Yanukovych’s administration in Kiev, regardless of its composition or constitutionality.  </span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node=""> In Putin’s actions at home as well, the Russian president is eschewing the pragmatism that marked his first administration. Instead of being the arbiter, brokering a consensus among various clans and interests, today’s Putin is increasingly autocratic. His circle of allies and advisors has shrunk to those who only share his exact ideas. Sober technocrats such as Foreign Minister Sergei Lavrov and Defense Minister Sergei Shoigu played seemingly no role in the decision-making over Crimea and were expected simply to execute the orders from the top.  </span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1175" instrument_node=""> This has become one of the new themes of Russian politics: the conflation of loyalty to the Kremlin with patriotism. It says much that dissidents at home, from journalists failing to toe the official line to protesters on the streets, are castigated either as outright "foreign agents" (every movement, charity, or organization accepting foreign money must register itself as such) or else as unknowing victims and vectors of external contamination — contamination, that is, from the West, whose cosmopolitanism and immorality Putin has come to see as an increasing threat to Russia’s identity. As a result, Putin’s relationship with Russia’s elite — now often foreign-educated, usually well-traveled, and always interested in economic prospects abroad — has become tortuous. Having provided members of the elite with opportunities during his first presidency, Putin not only mistrusts the elite now, but sees it as unpatriotic. Some $420 billion has flowed out of Russia since 2008, and in 2013, Putin </span><a data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eng.news.kremlin.ru/news/6007/print" target="_blank"><span data-dcnode-id="1174" instrument_node="">decried</span></a><span data-dcnode-id="1172" instrument_node=""> those who were "determined to steal and remove capital and who did not link their future to that of the country, the place where they earned their money." In response, he launched a program of "de-offshorization" that has prompted major Russian telecom, metals, and truck-manufacturing companies to announce their return to&nbsp;Russia. And Alexander Bastrykin, the powerful head of the Investigative Committee and one of Putin’s closest acolytes, promised a crackdown on schemes designed to transfer money out of the country. </span></p><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node=""> These efforts are representative of a broader reconsolidation that requires the West to stay out of Russia’s politics and that prevents its ideas and values from perverting Putin’s country. In this context, Yanukovych’s ouster from the Ukrainian presidency was the inevitable catalyst for a decisive expression of a new imperialism. From the Kremlin’s perspective, a Western-influenced and -supported opposition movement in Kiev rose up and toppled a legitimate leader who preferred Russia over the European Union, in the process threatening the liberties and prospects of the ethnic Russian population in Ukraine’s east.  </span></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1162"><span data-dcnode-id="1166" instrument_node=""> Perhaps the world should have paid more attention when </span><a data-dcnode-id="1164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eng.kremlin.ru/news/6402" target="_blank"><span data-dcnode-id="1165" instrument_node="">Putin made</span></a><span data-dcnode-id="1163" instrument_node=""> 2014 Russia’s "Year of Culture." This was to be when the country celebrated its unique identity — a year of "emphasis on our cultural roots, patriotism, values, and ethics." It was nothing less than a recipe for a new Russian exceptionalism, one that Putin himself would craft and impose. Seen in those terms, the turmoil in Ukraine did not merely allow him to step in — it demanded it.  </span></p><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1160" instrument_node=""> </span><span class="pull-quote" data-dcnode-id="1155"><span data-dcnode-id="1159" instrument_node="">The imperialism that has sprung</span><b data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node=""> </span></b><span data-dcnode-id="1156" instrument_node="">from Putin’s revived emphasis on Russian identity cannot neatly be compared with either its tsarist or its Soviet forebears. </span></span><span data-dcnode-id="1154" instrument_node="">The tsarist empire was driven by an expansionist logic that would gladly push Russia’s boundaries as far as they could stretch. Although multiethnic, there was no question that ethnic Russians were the imperial race and that others — with a few exceptions, such as the Baltic German aristocrats on whom Tsar Nicholas I relied — were second-class subjects. This was </span><i data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Russkii</span></i><span data-dcnode-id="1151" instrument_node="">, ethnic Russian, not </span><i data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Rossiiskii</span></i><span data-dcnode-id="1148" instrument_node="">, Russian by citizenship. By contrast, Soviet imperialism embodied, at least in theory, a political ideology greater than any one people or culture and a rhetoric of internationalism and evangelism. </span></p><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node=""> Putin has spent considerable effort in forging a new Rossiiskii state nationalism. Absent is the visceral anti-Semitism of the Russian Empire, and the widespread racism and hostility visible within much of Russian society is not reflected in government policy. Nor does the president seem interested in expanding direct Russian rule (as opposed to political authority) or in exporting any particular political philosophy to non-Russians. At the same time, Putin thinks that "the [ethnic] Russian people are, without a doubt, the backbone, the fundament, the cement of the multinational Russian people." In other words, though ethnic Russians do not rule the state, they do provide the foundations for the "Russian civilization" on which it is based.  </span></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1138"><span data-dcnode-id="1142" instrument_node=""> Putin’s reference to Russia as a "civilization" signals itself a return to the time-honored belief that there is something unique about Russia rooted not only in ethnic identity but in culture and history — a belief that began when the country became the chief stronghold of Eastern Orthodoxy after the fall of Constantinople. As he put it in his </span><a data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eng.kremlin.ru/transcripts/4739" target="_blank"><span data-dcnode-id="1141" instrument_node="">2012 state-of-the-federation address</span></a><span data-dcnode-id="1139" instrument_node="">: "In order to revive national consciousness, we need to link historical eras and get back to understanding the simple truth that Russia did not begin in 1917, or even in 1991, but, rather, that we have a common, continuous history spanning over 1,000 years and we must rely on it to find inner strength and purpose in our national development." </span></p><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node=""> &lt;
span class="pull-quote"&gt;Putin’s conception of what it means to be Russian combines the stern-jawed heroics of the Soviet defenders of Stalingrad with the exuberant loyalty of the tsar’s own Cossacks, while excluding the humanism of Andrei Sakharov and the ascetic moralism of Leo Tolstoy. It is a version of Russian history and philosophy cherry-picked to support Putin’s notion of national exceptionalism. In fact, he recently assigned regional governors homework, writings by three prominent 19th- and 20th-century intellectuals: Nikolai Berdyaev, Vladimir Solovyov, and Ivan Ilyin. These three, whom Putin often cites, exemplify and justify his belief in Russia’s singular place in history. They romanticize the necessity of obedience to the strong ruler — whether managing the boyars or defending the people from cultural corruption — and the role of the Orthodox Church in defending the Russian soul and ideal.  </span></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1133" instrument_node=""> In this, Putin is directly drawing on a classic Russian dichotomy between autocracy and anarchy, as well as on the country’s experiences during the 1990s, when there was no strong, consistent central rule and the country was beset by rebellion, gangsterism, poverty, and geopolitical irrelevance. In his </span><a data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eng.kremlin.ru/news/6402" target="_blank"><span data-dcnode-id="1132" instrument_node="">2013 state-of-the-federation speech</span></a><span data-dcnode-id="1130" instrument_node="">, Putin made the connection between authoritarianism and social order, admitting, "Of course, this is a conservative position. But speaking in the words of Nikolai Berdyaev, the point of conservatism is not that it prevents movement forward and upward, but that it prevents movement backward and downward, into chaotic darkness and a return to a primitive state." </span></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1127" instrument_node=""> </span><b data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">THIS IS THE CENTER OF PUTIN’S IMPERIAL VISION:</span></b><span data-dcnode-id="1124" instrument_node=""> The pragmatic political fixer of the 2000s now genuinely believes that Russian culture is both exceptional and threatened and that he is the man to save it. He does not see himself as aggressively expanding an empire so much as defending a civilization against the "chaotic darkness" that will ensue if he allows Russia to be politically encircled abroad and culturally colonized by Western values at home.  </span></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node=""> This notion of an empire built on the basis of a civilization is crucial to understanding Putin. There are neighboring countries, such as those in the South Caucasus, that he believes ought to recognize that they are part of Russia’s sphere of influence, its defensive perimeter, and its economic hinterland. But, he stops short of wanting forcefully to bring them under direct dominion because they are not ethnically Russian. Even when Moscow separated the regions of Abkhazia and South Ossetia from Georgia in 2008, for example, it set them up as independent puppet states; it did not annex them into the Russian Federation.  </span></p><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1118" instrument_node=""> Putin does insist, however, that Moscow is the protector of Russians worldwide. Where there are Russians and Russian-speakers and where Russian culture and the Russian Orthodox faith hold or held sway, these are </span><i data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">nash</span></i><span data-dcnode-id="1115" instrument_node=""> — "ours." Despite his mission to "gather the Russian lands" like the 15th-century’s Prince Ivan the Great, this does not necessarily mean occupying Crimea today, Donetsk in eastern Ukraine tomorrow, and Russian-settled northern Kazakhstan the day after, but it helps define what he thinks is Russia’s birthright. In his defense of the annexation of Crimea, </span><a data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.washingtonpost.com/world/transcript-putin-says-russia-will-protect-the-rights-of-russians-abroad/2014/03/18/432a1e60-ae99-11e3-a49e-76adc9210f19_story.html" target="_blank"><span data-dcnode-id="1114" instrument_node="">he said</span></a><span data-dcnode-id="1112" instrument_node=""> that the Soviet Union’s collapse left "the Russian nation … one of the biggest, if not </span><i data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">the</span></i><span data-dcnode-id="1109" instrument_node=""> biggest, ethnic group in the world to be divided by borders." </span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node=""> Crimea, after all, is historically, ethnically, and culturally Russian, which is why, after its residents voted in favor of annexation, Putin approvingly noted that "after a long, difficult, exhausting voyage, Crimea and Sevastopol are returning to their native harbor, to their native shores, to their port of permanent registration — to Russia." By contrast, the case to reach out to Transnistria in Moldova, for example, or even eastern Ukraine, is less clear. The Transnistrian Russians are relatively new colonists, arriving after World War II, and eastern Ukraine has Russian cities, but also a Catholic, Ukrainian countryside.  </span></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1103" instrument_node=""> Putin is putting as much effort into defending his vision of "Russian civilization" at home as abroad, and he has drawn a direct connection between the two. In the past, he was a patriot, a Russian Orthodox believer, and a social conservative, but he saw the difference between his own views and state policy and was little interested in enforcing a social agenda. Indeed, </span><a data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//books.google.com/books%3Fid%3DOx99AgAAQBAJ%26lpg%3DPA322%26ots%3D6J3o2cAv5a%26dq%3D%2522practically%2520no%2520room%2520for%2520intellectual%2520and%2520spiritual%2520freedom%252C%2520ideological%2520pluralism%252C%2520and%2520freedom%2520of%2520the%2520press%2522%26pg%3DPA322%23v%3Donepage%26q%3D%2522practically%2520no%2520room%2520for%2520intellectual%2520and%2520spiritual%2520freedom%2C%2520ideological%2520pluralism%2C%2520and%2520freedom%2520of%2520the%2520press%2522%26f%3Dfalse" target="_blank"><span data-dcnode-id="1102" instrument_node="">he warned</span></a><span data-dcnode-id="1100" instrument_node=""> in 1999 that "a state ideology blessed and supported by the state … [means] practically no room for intellectual and spiritual freedom, ideological pluralism, and freedom of the press — that is, for political freedom."  </span></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1097" instrument_node=""> But what he once merely frowned upon, Putin now wants to ban. The conservative backlash, with laws against gay "propaganda," the heavy-handed prosecution of members of punk band Pussy Riot after their "blasphemous" performance in a church, and renewed state control of the media, all speak to a new moral agenda — a nationalist and culturally isolationist one. Just as Putin has been trying to "de-offshorize" the Russian elite, he is now launching what could be called a "moral de-offshorization." His more recent pronouncements have been full of warnings about the "</span><a data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eng.kremlin.ru/news/6402" target="_blank"><span data-dcnode-id="1096" instrument_node="">destruction of traditional values</span></a><span data-dcnode-id="1094" instrument_node="">," threatening the moral degradation of Russian society. </span></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1091" instrument_node=""> The Russian Orthodox Church thus comes increasingly to the fore as a symbol and bastion of these traditional values and all that they mean for the new imperialism. Russian Orthodoxy was never an especially evangelical faith, concentrating on survival and purity over expansion, and much the same could be said of Putin’s worldview. In Putin’s previous presidency, the church was supportive, but just one of many of his allies. Now, though, from the pulpit to television news programs, the church is one of the most consistent and visible supporters of Putin’s state-building project. When interviewed on the subject of Crimea, Archpriest Vsevolod Chaplin, one of Putin’s cassocked cheerleaders, </span><a data-dcnode-id="1089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//kprf.ru/international/ussr/128848.html" target="_blank"><span data-dcnode-id="1090" instrument_node="">asserted</span></a><span data-dcnode-id="1088" instrument_node=""> that the church has long believed that "the Russian people are a divided nation on its historical territory, which has the right to be reunited in a single public body." </span></p><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1085" instrument_node=""> </span><b data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">IN 1999, SOON BEFORE HE BECAME ACTING PRESIDENT,</span></b><span data-dcnode-id="1082" instrument_node=""> Putin released a </span><a data-dcnode-id="1080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pages.uoregon.edu/kimball/Putin.htm" target="_blank"><span data-dcnode-id="1081" instrument_node="">personal manifesto</span></a><span data-dcnode-id="1079" instrument_node=""> in which he admitted that Soviet communism was "a road to a blind alley, which is far away from the mainstream of civilization." Now, he is looking for exit ramps from that mainstream. Speaking in 2013 at the Valdai International Discussion Club, </span><a data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//valdaiclub.com/politics/62880.html" target="_blank"><span data-dcnode-id="1078" instrument_node="">he warned</span></a><span data-dcnode-id="1076" instrument_node=""> against "mechanically copying other countries’ experiences" because "the question of finding and strengthening national identity really is fundamental for Russia." It is a quest that he has taken upon himself in the name of personal and national greatness: A people with a destiny cannot be allowed to let him, themselves, their country, and their mission d</span><br data-dcnode-id="1075"><span data-dcnode-id="1074" instrument_node="">
own.  </span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node=""> All this helps explain the difficulty that Western governments have in understanding and dealing with him, especially this most aggressively cerebral U.S. administration. It seems that much is lost in translation between the Kremlin and the White House. Putin is not a lunatic or even a fanatic. Instead, just as there are believers who become pragmatists in office, he has made the unusual reverse journey. Putin has come to see his role and Russia’s destiny as great, unique, and inextricably connected. Even if this is merely an empire of, and in, his mind — with hazy boundaries and dubious intellectual underpinnings — this is the construct with which the rest of the world will have to deal, so long as Putin remains in the Kremlin.  </span></p><span data-dcnode-id="1069" instrument_node="">
</span><div data-dcnode-id="1068" data-fp-lazy-load-image=""></div><span data-dcnode-id="1067" instrument_node=""> </span></div><span data-dcnode-id="1065" instrument_node="">
</span><div class="article-end content-gated" data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">
</span></div><span data-dcnode-id="1062" instrument_node="">
