</span></div><span data-dcnode-id="909" instrument_node="">
</span></div><span data-dcnode-id="907" instrument_node="">
</span></section><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Meanwhile, rearmament has been slow, and much of the military’s equipment remains decades old. The once formidable Soviet navy is now little more than a coastal protection force. All of the navy’s large vessels, including its sole aircraft carrier, the non-nuclear Kuznetsov, are holdovers from the Cold War. (By comparison, the United States has ten nuclear carriers and builds several new warships each year.) While Russia plans to reestablish its "blue-water navy," analysts say it won’t be able to produce a new fleet of large warships for at least a decade. The navy’s immediate focus is building nuclear submarines and smaller surface vessels for coastal defense and sea lane protection.</span></p><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="901" instrument_node="">The Russian air force remains the second-largest in the world, with approximately 2,500 aircraft in service, but most date from the 1980s. New variations of the Sukhoi Flanker, a multi-role fighter, are expected to serve as Russia’s main combat aircraft for at least the next the decade. Meanwhile, Sukhoi is developing several more advanced warplanes, including a fifth-generation "stealth" fighter, the T-50. Russia does not yet operate </span><a data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thediplomat.com/2014/06/russias-coming-combat-drones/" target="_blank" title="armed drones"><span data-dcnode-id="900" instrument_node="">armed drones</span></a><span data-dcnode-id="898" instrument_node="">, but military leaders say that research is underway. The current fleet of strategic bombers, which resumed regular patrols in 2007, is expected to fly for at least another twenty years, allowing designers ample time to develop replacements.</span></p><section class="more-on mobile-only" data-dcnode-id="874"><span data-dcnode-id="896" instrument_node="">
</span><p class="more-on__title" data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">More on:</span></p><span data-dcnode-id="893" instrument_node="">
</span><p class="more-on__content" data-dcnode-id="888"><span data-dcnode-id="892" instrument_node="">
</span><a class="more-on__link" data-dcnode-id="890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/europe-and-eurasia/russia"><span data-dcnode-id="891" instrument_node="">Russia</span></a><span data-dcnode-id="889" instrument_node="">
</span></p><span data-dcnode-id="887" instrument_node="">
</span><p class="more-on__content" data-dcnode-id="882"><span data-dcnode-id="886" instrument_node="">
</span><a class="more-on__link" data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/defense-and-security/military-operations"><span data-dcnode-id="885" instrument_node="">Military Operations</span></a><span data-dcnode-id="883" instrument_node="">
</span></p><span data-dcnode-id="881" instrument_node="">
</span><p class="more-on__content" data-dcnode-id="876"><span data-dcnode-id="880" instrument_node="">
</span><a class="more-on__link" data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/defense-and-security"><span data-dcnode-id="879" instrument_node="">Defense and Security</span></a><span data-dcnode-id="877" instrument_node="">
</span></p><span data-dcnode-id="875" instrument_node="">
</span></section><span data-dcnode-id="873" instrument_node="">
</span><h2 data-dcnode-id="871" id="chapter-title-0-3"><span data-dcnode-id="872" instrument_node="">What are Russian nuclear capabilities and doctrine?</span></h2><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="865"><span data-dcnode-id="869" instrument_node="">Russia’s vast nuclear arsenal remains on par with the United States and is the country’s only residual great power feature, according to military analysts. Moscow keeps about 1,500 strategic warheads on deployed intercontinental ballistic missiles (ICBMs), submarines, and heavy bombers. These numbers comply with the so-called </span><a data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cfr.org/arms-control-disarmament-and-nonproliferation/new-start-treaty/p21851" target="_blank" title="New START treaty"><span data-dcnode-id="868" instrument_node="">New START treaty</span></a><span data-dcnode-id="866" instrument_node="">, which came into force February 2011. Russia is also believed to have a few thousand nonstrategic nuclear weapons, which are lower-yield munitions that can be deployed and used on the battlefield.</span></p><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="863" instrument_node="">Russia leaned on its nuclear deterrent as its conventional force languished in the years after the Soviet collapse. In 2000, Moscow lowered its </span><a data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.armscontrol.org/act/2000_05/dc3ma00" target="_blank" title="nuclear threshold"><span data-dcnode-id="862" instrument_node="">nuclear threshold</span></a><span data-dcnode-id="860" instrument_node="">, permitting the use of atomic weapons in response to conventional attacks that pose an existential threat. (By comparison, Soviet doctrine had reserved nuclear weapons for use only in retaliation for a nuclear attack.) The most recent </span><a data-dcnode-id="858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//carnegie.ru/eurasiaoutlook/%3Ffa%3D57607" target="_blank" title="military doctrine"><span data-dcnode-id="859" instrument_node="">military doctrine</span></a><span data-dcnode-id="857" instrument_node="">, approved in December 2014, reaffirmed the post-2000 policy.</span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Much of the Russian nuclear deterrent is being modernized: A new class of ballistic missile submarine is coming into service; some strategic bombers are being upgraded; and there are plans to replace all Soviet-era ICBMs over the next decade or so.</span></p><span data-dcnode-id="852" instrument_node="">
</span><h2 data-dcnode-id="850" id="chapter-title-0-4"><span data-dcnode-id="851" instrument_node="">What is the Russian military budget?</span></h2><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="848" instrument_node="">At close to $90 billion for 2013, the Russian military budget has more than doubled over the last decade, trailing only behind the United States ($640 billion) and China ($188 billion), according to the </span><a data-dcnode-id="846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//books.sipri.org/files/FS/SIPRIFS1403.pdf" target="_blank" title="Stockholm International Peace Research Institute"><span data-dcnode-id="847" instrument_node="">Stockholm International Peace Research Institute</span></a><span data-dcnode-id="845" instrument_node="">. (Data includes funding for armed services, paramilitary forces, military space activities, foreign military aid, and military R&amp;D.)</span></p><span data-dcnode-id="843" instrument_node="">
</span><div data-dcnode-id="841" id="Military Expenditures"><img alt="" class="lazyloaded" data-dcnode-id="842" data-src="//cdn.cfr.org/sites/default/files/image/2020/12/Military_Expenditure_Graph_.JPG" height="365" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.cfr.org/sites/default/files/image/2020/12/Military_Expenditure_Graph_.JPG&amp;raw" style="line-height: 15.6px;" width="581"></div><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">&nbsp;</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">But analysts say recent spending remains well below Soviet levels. Second, Russia still spends a fraction of what the United States and many of its allies spend per soldier. And third, high inflation rates in the defense industry as well as endemic corruption consume a large portion of newly allocated resources.</span></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="833" instrument_node="">In 2015, Russia was about halfway through a ten-year $700 billion weapons modernization program, with priorities given to strategic nuclear weapons, fighter aircraft, ships and submarines, air defenses, communications, and intelligence. But defense spending is closely tied to global energy prices, which can fluctuate significantly. (Oil and gas account for more than half of Russia’s federal revenues, according to the </span><a data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.eia.gov/countries/cab.cfm%3Ffips%3Drs" target="_blank" title="U.S. Energy Information Administration"><span data-dcnode-id="832" instrument_node="">U.S. Energy Information Administration</span></a><span data-dcnode-id="830" instrument_node="">.) A roughly 50 percent plunge in oil prices from mid-2014 to early-2015, coupled with the rising costs of international sanctions, has forced Russia to consider major budget cuts, however Putin has thus far </span><a data-dcnode-id="828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.reuters.com/article/2015/01/15/russia-crisis-budget-idUSL6N0US25520150115" target="_blank" title="exempted defense spending"><span data-dcnode-id="829" instrument_node="">exempted defense spending</span></a><span data-dcnode-id="827" instrument_node="">. &nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="825" instrument_node="">
</span><h2 data-dcnode-id="823" id="chapter-title-0-5"><span data-dcnode-id="824" instrument_node="">What prompted the reforms?</span></h2><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">The five-day conflict with Georgia in August 2008 exposed major deficiencies, particularly in command-and-control systems, hardware, weaponry, and intelligence. Though ultimately successful, the operation confirmed that Russia’s mass-mobilization military, where millions of conscripts could marshal to protect the motherland, remained outdated.</span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">In the weeks after the conflict, Defense Minister Anatoliy Serdyukov, a powerful reformer appointed by Putin, recommitted the military to a lengthy overhaul involving massive personnel cuts, rearmament, and reorganization into a professional force capable of responding quickly to acute crises.</span></p><span data-dcnode-id="816" instrument_node="">
</span><h2 data-dcnode-id="814" id="chapter-title-0-6"><span data-dcnode-id="815" instrument_node="">What does Russia consider threats?</span></h2><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="812" instrument_node="">Russian leaders acknowledge that there is now little threat of a large-scale </span><a data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cfr.org/nato/north-atlantic-treaty-organization-nato/p28287" target="_blank" title="NATO"><span data-dcnode-id="811" instrument_node="">NATO</span></a><span data-dcnode-id="809" instrument_node=""> land invasion—a top concern during the Cold War—but they repeatedly condemn the bloc’s eastward expansion, including its plans to roll out a </span><a data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cfr.org/missile-defense/ballistic-missile-defense/p30607" target="_blank" title="ballistic missile defense shield"><span data-dcnode-id="808" instrument_node="">ballistic missile defense shield</span></a><span data-dcnode-id="806" instrument_node=""> across Europe. The United States, which developed the system, says it is only designed to guard against limited missile attacks from "rogue" states like Iran, but Moscow believes the technology could be updated and may tip the strategic nuclear balance in favor of the United States. Furthermore, Putin and his military leaders frequently express concern with conventional precision weapons being developed by rivals.</span></p><span data-dcnode-id="804" instrument_node="">
</span><div data-dcnode-id="802" id="NATO’s Expanding Membership Map"><img alt="NATO’s Expanding Membership Map" class="lazyloaded" data-dcnode-id="803" data-src="//cdn.cfr.org/sites/default/files/image/2020/12/NATO_Map_FINAL.jpg" height="467" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.cfr.org/sites/default/files/image/2020/12/NATO_Map_FINAL.jpg&amp;raw" style="line-height: 15.6px;" width="729"></div><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="800" instrument_node="">Moscow also fears that Western powers are working covertly to undermine its interests in the region. Russian leaders believe the United States and its allies orchestrated the so-called color revolutions—a series of popular uprisings in former Soviet satellites in the early 2000s. "Russian foreign policy appears to be based on a combination of fears of popular protest and opposition to U.S. world hegemony, both of which are seen as threatening the Putin regime," writes </span><a data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ponarseurasia.org/sites/default/files/policy-memos-pdf/Pepm342_Gorenburg_Sept2014.pdf" target="_blank" title="Dmitry Gorenburg"><span data-dcnode-id="799" instrument_node="">Dmitry Gorenburg</span></a><span data-dcnode-id="797" instrument_node="">, an expert on the Russian military at CNA Corporation, a Virginia-based research institution.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="794" instrument_node="">Many Western and Russian analysts say Moscow’s concerns with NATO divert attention away from more practical threats like those looming on Russia’s southern periphery, including </span><a data-dcnode-id="792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cfr.org/russian-federation/instability-russias-north-caucasus-region/p9021" target="_blank" title="ethnic insurgencies in the North Caucasus region"><span data-dcnode-id="793" instrument_node="">ethnic insurgencies in the North Caucasus region</span></a><span data-dcnode-id="791" instrument_node="">, weapons proliferation, and a potential resurgence of the </span><a data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cfr.org/afghanistan/taliban-afghanistan/p10551" target="_blank" title="Taliban in Afghanistan"><span data-dcnode-id="790" instrument_node="">Taliban in Afghanistan</span></a><span data-dcnode-id="788" instrument_node="">.</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="785" instrument_node="">Russia has for years provided diplomatic and military support to Syrian President Bashar al-Assad’s embattled regime. In 2015, Moscow expanded its military outreach to the wartorn country, sending combat aircraft, battle tanks, and other advanced equipment to regime strongholds in the west. Russia also inked an agreement with Syria and the Shia-led governments of Iran and Iraq to share intelligence in fighting the </span><a data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cfr.org/iraq/islamic-state/p14811" target="_blank" title="self-proclaimed Islamic State"><span data-dcnode-id="784" instrument_node="">self-proclaimed Islamic State</span></a><span data-dcnode-id="782" instrument_node="">.</span><strong data-dcnode-id="780"><span data-dcnode-id="781" instrument_node=""> </span></strong></p><span data-dcnode-id="778" instrument_node="">
</span><h2 data-dcnode-id="776" id="chapter-title-0-7"><span data-dcnode-id="777" instrument_node="">What are Russia’s objectives in the region?</span></h2><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Military modernization will enable the world’s largest country by far (and one of the most sparsely populated) to better defend its vast territory and national interests. But the conflicts in Ukraine and Georgia have aroused concerns about Putin’s willingness to use military force to preserve Russia’s traditional sphere of influence.</span></p><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="771" instrument_node="">Shortly before annexing Crimea in March 2014, Putin said he would defend the rights of Russians abroad, and in April he referred to a large swath of Ukrainian territory as Novorossiya or New Russia, a term used by the Russian tsars. Some believe one of Putin’s main objectives is to establish control over the entire northern coast of the Black Sea, connecting Russia in the east to Moldova in the west. "Mr. Putin may seek to create Novorossiya one slender slice at a time, thereby reducing his chances of massive confrontation with the West. An intermediate goal would be to connect Crimea by land to Russia," wrote regional specialists </span><a data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/2015/03/16/opinion/putin-and-the-mariupol-test.html" target="_blank" title="Hans Binnendijk and John E. Herbst in the New York Times"><span data-dcnode-id="770" instrument_node="">Hans Binnendijk and John E. Herbst in the </span><em data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">New York Times</span></em></a><span data-dcnode-id="766" instrument_node="">.</span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Moscow has provided ethnic Russian insurgencies in eastern Ukraine with training, personnel, and heavy weapons. In November 2014, Russia acknowledged rebel elections in the breakaway regions of Donetsk and Luhansk, a move that echoed its unilateral recognition of separatist governments in Abkhazia and South Ossetia after its conflict with Georgia in 2008. (Moscow provoked further international censure in late 2014 and early 2015, signing treaties to formally integrate the two breakaway Georgian regions with Russia.)</span></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="760" instrument_node="">But Putin’s assertiveness has come with a cost. The </span><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cfr.org/international-organizations-and-alliances/group-seven-g7/p32957" target="_blank" title="Group of Eight (now G7)"><span data-dcnode-id="759" instrument_node="">Group of Eight (now G7)</span></a><span data-dcnode-id="757" instrument_node=""> cut Moscow out of its elite club in March 2014, and top Russian officials, banks, and businesses face an array of </span><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cfr.org/sanctions/economic-sanctions/p36259" target="_blank" title="Western sanctions"><span data-dcnode-id="756" instrument_node="">Western sanctions</span></a><span data-dcnode-id="754" instrument_node=""> that may, along with slumping energy prices, push the economy into recession. The Russian military has also suffered: France canceled the sale of two advanced warships to the Russian navy; and Ukraine has moved to end its extensive defense-industrial cooperation with Moscow.</span></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="751" instrument_node="">Looking ahead, states that border Russia are chiefly concerned with its "hybrid warfare" capabilities, which by many accounts were deployed successfully in Crimea and to a lesser extent in Eastern Ukraine. The </span><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iiss.org/en/publications/military-s-balance" target="_blank" title="International Institute for Strategic Studies"><span data-dcnode-id="750" instrument_node="">International Institute for Strategic Studies</span></a><span data-dcnode-id="748" instrument_node=""> describes hybrid warfare as "the use of military and non-military tools in an integrated campaign designed to achieve surprise, seize the initiative and gain psychological as well as physical advantages utilizing diplomatic means; sophisticated and rapid information, electronic and cyber operations; covert and occasionally overt military and intelligence action; and economic pressure."</span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="745" instrument_node="">In an ominous move, Russia withdrew in March 2015 from the Joint Consultative Group on the </span><a data-dcnode-id="743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.state.gov/www/global/arms/treaties/cfe.html" target="_blank" title="Treaty on Conventional Armed Forces in Europe"><span data-dcnode-id="744" instrument_node="">Treaty on Conventional Armed Forces in Europe</span></a><span data-dcnode-id="742" instrument_node="">. The forum, which set national limits for the deployment of major weapons systems and heavy military equipment, was seen as a cornerstone of the post-Cold War security system.</span></p><span data-dcnode-id="740" instrument_node="">
</span><h2 data-dcnode-id="738" id="chapter-title-0-8"><span data-dcnode-id="739" instrument_node="">What is NATO’s strategy toward Russia?</span></h2><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="736" instrument_node="">NATO is fundamentally </span><a data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cfr.org/nato/north-atlantic-treaty-organization-nato/p28287" target="_blank" title="reassessing its defenses in Europe"><span data-dcnode-id="735" instrument_node="">reassessing its defenses in Europe</span></a><span data-dcnode-id="733" instrument_node="">, particularly in the East. In early 2015, allies agreed to establish new command centers in Bulgaria, Estonia, Latvia, Lithuania, Poland, and Romania. The outposts, which are expected to open in 2016, will support a new rapid reaction force of about five thousand troops. In a major crisis, military leaders say that up to two more brigades, for a total NATO force of about thirty thousand, could be marshalled. "This will be the biggest reinforcement of our collective defense since the end of the Cold War," Secretary-General Jens Stoltenberg said in January.</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">The United States has shored up NATO’s air presence over Poland and the Baltic states, and other allies, including the UK, Germany, and Denmark, are providing reinforcements as well. In 2014, allied jets intercepted Russian warplanes more than four hundred times without altercation.</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="727" instrument_node="">NATO members are also bolstering security collaboration with Ukraine, an alliance partner since 1994. But as a non-member, Ukraine remains outside of NATO’s defense perimeter, and there are clear limits on how far it can be brought into institutional structures. The United States plans to send an </span><a data-dcnode-id="725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.military.com/daily-news/2015/03/17/us-army-puts-off-ukraine-training-in-effort-to-preserve.html" target="_blank" title="armored brigade"><span data-dcnode-id="726" instrument_node="">armored brigade</span></a><span data-dcnode-id="724" instrument_node=""> to train troops in western Ukraine on route clearance, counter-battery fire, and electronic warfare. Meanwhile, President Barack Obama’s administration is considering providing Kiev with lethal, defensive weapons, but some Western European leaders worry this may escalate the conflict.</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="721" instrument_node="">U.S. General Philip Breedlove, NATO’s top commander, has stressed that military force alone will not shift the battle’s momentum. "We don’t want a war of grand proportions in Ukraine. We must find a diplomatic and political solution," he </span><a data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.washingtonpost.com/world/national-security/nato-commander-warns-about-deteriorating-situation-in-ukraine/2015/02/25/6520e2ae-bd2c-11e4-8668-4e7ba8439ca6_story.html%3Ftid%3DhpModule_9d3add6c-8a79-11e2-98d9-3012c1cd8d1e" target="_blank" title="told Congress in February 2015"><span data-dcnode-id="720" instrument_node="">told Congress in February 2015</span></a><span data-dcnode-id="718" instrument_node="">. "What is clear is that this is not getting better. It is getting worse every day."</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="715" instrument_node="">In the longer term, some defense analysts believe the alliance should consider advancing membership to </span><a data-dcnode-id="713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.foreignaffairs.com/articles/141377/jan-joel-andersson/nordic-nato" target="_blank" title="Finland and Sweden"><span data-dcnode-id="714" instrument_node="">Finland and Sweden</span></a><span data-dcnode-id="712" instrument_node="">, two Partnership for Peace countries with a history of avoiding military alignment. (Nordic peers Denmark, Iceland, and Norway are charter NATO members.)</span></p></div><span data-dcnode-id="709" instrument_node="">
</span></div><span data-dcnode-id="707" instrument_node="">

</span></h3><span data-dcnode-id="610" instrument_node="">
</span></div><span data-dcnode-id="608" instrument_node="">
</span><div class="supplemental-content__container supplemental-content__body-content" data-dcnode-id="576"><span data-dcnode-id="607" instrument_node="">
</span><p class="NoSpace" data-dcnode-id="596"><span data-dcnode-id="606" instrument_node="">In a series of blog posts, CNA's Dmitry Gorenburg examines Russian </span><a class="supplemental-content__external-link" data-dcnode-id="604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//russiamil.wordpress.com/2015/01/27/russian-air-force-capabilities-and-procurement-plans/"><span data-dcnode-id="605" instrument_node="">air</span></a><span data-dcnode-id="603" instrument_node="">, </span><a class="supplemental-content__external-link" data-dcnode-id="601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//russiamil.wordpress.com/2015/01/14/russian-naval-capabilities-and-procurement-plans/"><span data-dcnode-id="602" instrument_node="">naval</span></a><span data-dcnode-id="600" instrument_node="">, and </span><a class="supplemental-content__external-link" data-dcnode-id="598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//russiamil.wordpress.com/2015/01/05/capabilities-of-the-russian-ground-forces/"><span data-dcnode-id="599" instrument_node="">ground force</span></a><span data-dcnode-id="597" instrument_node=""> capabilities.</span></p><span data-dcnode-id="595" instrument_node="">
</span><p class="NoSpace" data-dcnode-id="590"><span data-dcnode-id="594" instrument_node="">This report from the Congressional Research Service discusses the role of </span><a class="supplemental-content__external-link" data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fas.org/sgp/crs/nuke/RL32572.pdf"><span data-dcnode-id="593" instrument_node="">nonstrategic nuclear weapons</span></a><span data-dcnode-id="591" instrument_node=""> in U.S. and Russian military strategy.</span></p><span data-dcnode-id="589" instrument_node="">
</span><p class="NoSpace" data-dcnode-id="584"><span data-dcnode-id="588" instrument_node="">This CFR backgrounder provides an in-depth look at the </span><a data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cfr.org/nato/north-atlantic-treaty-organization-nato/p28287"><span data-dcnode-id="587" instrument_node="">North Atlantic Treaty Organization</span></a><span data-dcnode-id="585" instrument_node=""> and its transformation in the wake of the Cold War.</span></p><span data-dcnode-id="583" instrument_node="">
</span><p class="NoSpace" data-dcnode-id="578"><span data-dcnode-id="582" instrument_node="">This CFR backgrounder reviews the development of </span><a data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cfr.org/missile-defense/ballistic-missile-defense/p30607%23p4"><span data-dcnode-id="581" instrument_node="">U.S. ballistic missile defense systems</span></a><span data-dcnode-id="579" instrument_node="">, assessing emerging threats from North Korea and Iran, as well as ongoing tensions with Russia.</span></p><span data-dcnode-id="577" instrument_node="">
</span></div><span data-dcnode-id="575" instrument_node="">
</span></div><span data-dcnode-id="573" instrument_node="">
</span><div data-dcnode-id="410" id="block-globalexploremore"><span data-dcnode-id="572" instrument_node="">
