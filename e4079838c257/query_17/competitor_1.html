</span><p data-dcnode-id="6844"><span data-dcnode-id="6864" instrument_node="">During the election, Trump said he might stop sending aid to anti-Assad rebels in </span><a data-dcnode-id="6862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Syria" title="Syria"><span data-dcnode-id="6863" instrument_node="">Syria</span></a><span data-dcnode-id="6861" instrument_node=""> as part of a U.S.-Russia peace process.</span><sup class="reference" data-dcnode-id="6858" id="cite_ref-144"><a data-dcnode-id="6859" href="#cite_note-144"><span data-dcnode-id="6860" instrument_node="">[143]</span></a></sup><span data-dcnode-id="6857" instrument_node=""> Six months after taking office, the program ended, largely due to its failure to achieve the desired result of toppling the Syrian government.</span><sup class="reference" data-dcnode-id="6854" id="cite_ref-145"><a data-dcnode-id="6855" href="#cite_note-145"><span data-dcnode-id="6856" instrument_node="">[144]</span></a></sup><span data-dcnode-id="6853" instrument_node=""> Trump is even talking about reducing the power of American intelligence agencies specifically because they have information about Russia that Russia says is false.</span><sup class="reference" data-dcnode-id="6850" id="cite_ref-146"><a data-dcnode-id="6851" href="#cite_note-146"><span data-dcnode-id="6852" instrument_node="">[145]</span></a></sup><span data-dcnode-id="6849" instrument_node=""> He's already trashed the FBI's credibility and valued apolitical position.</span><sup class="reference" data-dcnode-id="6846" id="cite_ref-147"><a data-dcnode-id="6847" href="#cite_note-147"><span data-dcnode-id="6848" instrument_node="">[146]</span></a></sup><span data-dcnode-id="6845" instrument_node="">
</span></p><p data-dcnode-id="6838"><span data-dcnode-id="6843" instrument_node="">What's really fascinating is that the ruble is one of the worst performers post-election, yet the Russian government is barely able to contain its joy over Trump winning. This also ties into the massive deficit Russia is facing. (They're in a deficit of over 3%. That's absolutely terrible.) So you can see why their government is so heavily supportive of Trump if it means sanctions lifting; it would be a giant weight lifted off the Russian economy.</span><sup class="reference" data-dcnode-id="6840" id="cite_ref-148"><a data-dcnode-id="6841" href="#cite_note-148"><span data-dcnode-id="6842" instrument_node="">[147]</span></a></sup><span data-dcnode-id="6839" instrument_node="">
</span></p><span data-dcnode-id="6837" instrument_node="">
</span><h3 data-dcnode-id="6827"><span class="mw-headline" data-dcnode-id="6835" id="Buyers.27_Remorse"><span data-dcnode-id="6836" instrument_node="">Buyers' Remorse</span></span><span class="mw-editsection" data-dcnode-id="6828"><span class="mw-editsection-bracket" data-dcnode-id="6833"><span data-dcnode-id="6834" instrument_node="">[</span></span><a data-dcnode-id="6831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D17" title="Edit section: Buyers' Remorse"><span data-dcnode-id="6832" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6829"><span data-dcnode-id="6830" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6826" instrument_node="">
</span><p data-dcnode-id="6820"><span data-dcnode-id="6825" instrument_node="">Despite preferring Trump to Clinton, the Kremlin grew increasingly frustrated with Donald Trump as President. The American leader said, in a tweet, that Crimea was taken by Russia, and his White House issued a statement on Valentine's Day declaring that sanctions would only be removed if Crimea is returned to Ukraine. Immediately thereafter, coverage of Trump, which exceeded coverage of Putin, was dramatically scaled back, and more criticism of Trump was allowed as disillusionment, bewilderment, and frustration grew within the Kremlin. So much for that. Let this be a lesson to all of Russia: you just joined the long list of investors screwed by Donald Trump.</span><sup class="reference" data-dcnode-id="6822" id="cite_ref-149"><a data-dcnode-id="6823" href="#cite_note-149"><span data-dcnode-id="6824" instrument_node="">[148]</span></a></sup><span data-dcnode-id="6821" instrument_node="">
</span></p><span data-dcnode-id="6819" instrument_node="">
</span><h3 data-dcnode-id="6809"><span class="mw-headline" data-dcnode-id="6817" id="You_like_me.2C_you_really_like_me"><span data-dcnode-id="6818" instrument_node="">You like me, you really like me</span></span><span class="mw-editsection" data-dcnode-id="6810"><span class="mw-editsection-bracket" data-dcnode-id="6815"><span data-dcnode-id="6816" instrument_node="">[</span></span><a data-dcnode-id="6813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D18" title="Edit section: You like me, you really like me"><span data-dcnode-id="6814" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6811"><span data-dcnode-id="6812" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6808" instrument_node="">
</span><span data-dcnode-id="6807" instrument_node="">
</span><span data-dcnode-id="6806" instrument_node="">
</span><span data-dcnode-id="6793" instrument_node="">
</span><span data-dcnode-id="6792" instrument_node="">
</span><table class="cquote" data-dcnode-id="6779" style="margin: auto; border-collapse:collapse; border-style:none; background-color:transparent;"><tbody data-dcnode-id="6780"><tr data-dcnode-id="6794"><td data-dcnode-id="6795"><div data-dcnode-id="6797" style="padding:4px 50px;position:relative;"><span data-dcnode-id="6804" style="position:absolute;left:10px;top:-6px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="6805" instrument_node="">“</span></span><span data-dcnode-id="6802" style="position:absolute;right:10px;bottom:-20px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="6803" instrument_node="">”</span></span><span data-dcnode-id="6801" instrument_node="">In the new war of beliefs, Putin is saying, it is Russia that is on God’s side. The West is </span><a class="mw-redirect" data-dcnode-id="6799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Gomorrah" title="Gomorrah"><span data-dcnode-id="6800" instrument_node="">Gomorrah</span></a><span data-dcnode-id="6798" instrument_node="">.</span></div><span data-dcnode-id="6796" instrument_node="">
</span></td></tr><tr data-dcnode-id="6781"><td data-dcnode-id="6782" style="padding:4px 10px 8px;font-size:smaller;line-height:1.6em;text-align:right;"><span data-dcnode-id="6791" instrument_node=""> </span><cite data-dcnode-id="6784" style="font-style:normal;position:relative;z-index:2"><span data-dcnode-id="6790" instrument_node="">—</span><a data-dcnode-id="6788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Pat_Buchanan" title="Pat Buchanan"><span data-dcnode-id="6789" instrument_node="">Pat Buchanan</span></a><sup class="reference" data-dcnode-id="6785" id="cite_ref-150"><a data-dcnode-id="6786" href="#cite_note-150"><span data-dcnode-id="6787" instrument_node="">[149]</span></a></sup></cite><span data-dcnode-id="6783" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="6778" instrument_node="">
</span><p data-dcnode-id="6750"><span data-dcnode-id="6777" instrument_node="">In a stroke of </span><a data-dcnode-id="6775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Irony" title="Irony"><span data-dcnode-id="6776" instrument_node="">irony</span></a><span data-dcnode-id="6774" instrument_node="">, Putin was shortlisted as the </span><a data-dcnode-id="6772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Conservapedia" title="Conservapedia"><span data-dcnode-id="6773" instrument_node="">Conservapedia</span></a><span data-dcnode-id="6771" instrument_node=""> 2013 Conservative of the Year, showing that </span><a class="mw-redirect" data-dcnode-id="6769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Authoritarian" title="Authoritarian"><span data-dcnode-id="6770" instrument_node="">authoritarians</span></a><span data-dcnode-id="6768" instrument_node=""> around the world tend to stick together.</span><sup class="reference" data-dcnode-id="6765" id="cite_ref-151"><a data-dcnode-id="6766" href="#cite_note-151"><span data-dcnode-id="6767" instrument_node="">[150]</span></a></sup><span data-dcnode-id="6764" instrument_node=""> It's not just them; </span><a class="mw-redirect" data-dcnode-id="6762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Patrick_Buchanan" title="Patrick Buchanan"><span data-dcnode-id="6763" instrument_node="">Patrick Buchanan</span></a><span data-dcnode-id="6761" instrument_node=""> and </span><a data-dcnode-id="6759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Fox_News" title="Fox News"><span data-dcnode-id="6760" instrument_node="">Fox News</span></a><span data-dcnode-id="6758" instrument_node=""> talking heads have also expressed an odd admiration for his style of leadership.</span><sup class="reference" data-dcnode-id="6755" id="cite_ref-152"><a data-dcnode-id="6756" href="#cite_note-152"><span data-dcnode-id="6757" instrument_node="">[151]</span></a></sup><sup class="reference" data-dcnode-id="6752" id="cite_ref-153"><a data-dcnode-id="6753" href="#cite_note-153"><span data-dcnode-id="6754" instrument_node="">[152]</span></a></sup><span data-dcnode-id="6751" instrument_node="">
</span></p><span data-dcnode-id="6749" instrument_node="">
</span><h2 data-dcnode-id="6739"><span class="mw-headline" data-dcnode-id="6747" id="And_now_for_something_completely_different"><span data-dcnode-id="6748" instrument_node="">And now for something completely different</span></span><span class="mw-editsection" data-dcnode-id="6740"><span class="mw-editsection-bracket" data-dcnode-id="6745"><span data-dcnode-id="6746" instrument_node="">[</span></span><a data-dcnode-id="6743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D19" title="Edit section: And now for something completely different"><span data-dcnode-id="6744" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6741"><span data-dcnode-id="6742" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6738" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6729"><div class="thumbinner" data-dcnode-id="6730" style="width:227px;"><a class="image" data-dcnode-id="6736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3APutin_with_rifle.jpeg"><img alt="" class="thumbimage" data-dcnode-id="6737" height="169" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/images/thumb/d/de/Putin_with_rifle.jpeg/225px-Putin_with_rifle.jpeg&amp;raw" srcset="/w/images/thumb/d/de/Putin_with_rifle.jpeg/338px-Putin_with_rifle.jpeg 1.5x, /w/images/thumb/d/de/Putin_with_rifle.jpeg/450px-Putin_with_rifle.jpeg 2x" width="225"></a><span data-dcnode-id="6735" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6731"><div class="magnify" data-dcnode-id="6733"><a class="internal" data-dcnode-id="6734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3APutin_with_rifle.jpeg" title="Enlarge"></a></div><span data-dcnode-id="6732" instrument_node="">No shirt? No problem!</span></div></div></div><span data-dcnode-id="6728" instrument_node="">
</span><p data-dcnode-id="6693"><span data-dcnode-id="6727" instrument_node="">Known for an alarmingly higher-pitched voice than his face indicates,</span><sup class="reference" data-dcnode-id="6724" id="cite_ref-154"><a data-dcnode-id="6725" href="#cite_note-154"><span data-dcnode-id="6726" instrument_node="">[153]</span></a></sup><span data-dcnode-id="6723" instrument_node=""> Putin likes to remind his countrymen (and the world) what a </span><a class="mw-redirect" data-dcnode-id="6721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Machismo" title="Machismo"><span data-dcnode-id="6722" instrument_node="">macho</span></a><span data-dcnode-id="6720" instrument_node=""> guy he is. He knows </span><a data-dcnode-id="6716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Martial_arts" title="Martial arts"><s data-dcnode-id="6718"><span data-dcnode-id="6719" instrument_node="">kung fu</span></s><span data-dcnode-id="6717" instrument_node=""> judo</span></a><span data-dcnode-id="6715" instrument_node="">. He "captured"</span><sup class="reference" data-dcnode-id="6712" id="cite_ref-155"><a data-dcnode-id="6713" href="#cite_note-155"><span data-dcnode-id="6714" instrument_node="">[154]</span></a></sup><span data-dcnode-id="6711" instrument_node=""> and "tamed" (or "raised") a fully-grown tiger </span><small data-dcnode-id="6709"><span data-dcnode-id="6710" instrument_node="">cub</span></small><span data-dcnode-id="6708" instrument_node=""> that he </span><small data-dcnode-id="6706"><span data-dcnode-id="6707" instrument_node="">was given and</span></small><span data-dcnode-id="6705" instrument_node=""> kept as a pet.</span><sup class="reference" data-dcnode-id="6702" id="cite_ref-156"><a data-dcnode-id="6703" href="#cite_note-156"><span data-dcnode-id="6704" instrument_node="">[155]</span></a></sup><span data-dcnode-id="6701" instrument_node=""> He likes to go </span><a data-dcnode-id="6699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Fish" title="Fish"><span data-dcnode-id="6700" instrument_node="">fishing</span></a><span data-dcnode-id="6698" instrument_node=""> without a shirt.</span><sup class="reference" data-dcnode-id="6695" id="cite_ref-157"><a data-dcnode-id="6696" href="#cite_note-157"><span data-dcnode-id="6697" instrument_node="">[156]</span></a></sup><span data-dcnode-id="6694" instrument_node=""> As far as public health campaigns go, "shirtless Putin" was very successful.
</span></p><p data-dcnode-id="6673"><span data-dcnode-id="6692" instrument_node="">He brings his </span><a class="mw-redirect" data-dcnode-id="6690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Dog" title="Dog"><span data-dcnode-id="6691" instrument_node="">dog</span></a><span data-dcnode-id="6689" instrument_node=""> to staff meetings. In fact he made a point of bringing the dog when he met with </span><a data-dcnode-id="6687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Angela_Merkel" title="Angela Merkel"><span data-dcnode-id="6688" instrument_node="">Angela Merkel</span></a><span data-dcnode-id="6686" instrument_node="">, even though (or more likely </span><i data-dcnode-id="6684"><span data-dcnode-id="6685" instrument_node="">because</span></i><span data-dcnode-id="6683" instrument_node="">) he knew Merkel was uncomfortable around dogs. 
Putin loved his </span><a class="extiw" data-dcnode-id="6680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dmitry_Medvedev" rel="nofollow" title="wp:Dmitry Medvedev"><span data-dcnode-id="6681" style="color:#477979 !important;" title="Wikipedia: Dmitry Medvedev"><span data-dcnode-id="6682" instrument_node="">pet Chihuahua</span></span></a><sup data-dcnode-id="6678"><img alt="Wikipedia" data-dcnode-id="6679" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%2527s_W.svg/12px-Wikipedia%2527s_W.svg.png&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/18px-Wikipedia%27s_W.svg.png 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/24px-Wikipedia%27s_W.svg.png 2x" width="12"></sup><span data-dcnode-id="6677" instrument_node=""> so much he let it sit in his presidential chair from 2008 to 2012 and </span><a data-dcnode-id="6675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Sockpuppet" title="Sockpuppet"><span data-dcnode-id="6676" instrument_node="">even pretended that little Dima was actually in charge</span></a><span data-dcnode-id="6674" instrument_node="">. 
</span></p><p data-dcnode-id="6664"><span data-dcnode-id="6672" instrument_node="">In recent years, he has been partly credited (alongside Russian optics firm LOMO) for saving </span><a class="mw-redirect" data-dcnode-id="6670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Film" title="Film"><span data-dcnode-id="6671" instrument_node="">film</span></a><span data-dcnode-id="6669" instrument_node="">-based photography from extinction, given the surge in popularity of "Lomography."</span><sup class="reference" data-dcnode-id="6666" id="cite_ref-158"><a data-dcnode-id="6667" href="#cite_note-158"><span data-dcnode-id="6668" instrument_node="">[157]</span></a></sup><span data-dcnode-id="6665" instrument_node="">
</span></p><p data-dcnode-id="6655"><span data-dcnode-id="6663" instrument_node="">If his career in Russian politics were to end, he would be the perfect Bond villain. We could then see the fruition of Putin and his defense minister's plans for development of futuristic weapons, including </span><a data-dcnode-id="6661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Parapsychology" title="Parapsychology"><span data-dcnode-id="6662" instrument_node="">psychotronic</span></a><span data-dcnode-id="6660" instrument_node=""> weapons. Well... kinda. It's weird.</span><sup class="reference" data-dcnode-id="6657" id="cite_ref-159"><a data-dcnode-id="6658" href="#cite_note-159"><span data-dcnode-id="6659" instrument_node="">[158]</span></a></sup><span data-dcnode-id="6656" instrument_node="">
</span></p><p data-dcnode-id="6642"><span data-dcnode-id="6654" instrument_node="">Putin also holds the Guinness World Record for holding the most expensive (and weirdest) Olympic Games ever.</span><sup class="reference" data-dcnode-id="6651" id="cite_ref-160"><a data-dcnode-id="6652" href="#cite_note-160"><span data-dcnode-id="6653" instrument_node="">[159]</span></a></sup><sup class="reference" data-dcnode-id="6648" id="cite_ref-161"><a data-dcnode-id="6649" href="#cite_note-161"><span data-dcnode-id="6650" instrument_node="">[160]</span></a></sup><span data-dcnode-id="6647" instrument_node=""> They were also perhaps the most dopingest in a long time. Or at least that's what we know thanks to Russian whistleblower Grigory Rodchenkov and American documentary film-maker and amateur doping enthusiast Bryan Fogel</span><sup class="reference" data-dcnode-id="6644" id="cite_ref-162"><a data-dcnode-id="6645" href="#cite_note-162"><span data-dcnode-id="6646" instrument_node="">[161]</span></a></sup><span data-dcnode-id="6643" instrument_node="">
</span></p><p data-dcnode-id="6640"><span data-dcnode-id="6641" instrument_node="">He has said that he is a devout communist and joined the Communist Party of the Soviet Union by choice, comparing communism to Christianity and Lenin to a saint. But in another interview saying that Lenin didn't go far enough with implementing communism. However, he has said that he doesn't want to revive the old Soviet Union but regrets its collapse, preferring to think to the future.
</span></p><span data-dcnode-id="6639" instrument_node="">
</span><h2 data-dcnode-id="6629"><span class="mw-headline" data-dcnode-id="6637" id="War_in_Ukraine"><span data-dcnode-id="6638" instrument_node="">War in Ukraine</span></span><span class="mw-editsection" data-dcnode-id="6630"><span class="mw-editsection-bracket" data-dcnode-id="6635"><span data-dcnode-id="6636" instrument_node="">[</span></span><a data-dcnode-id="6633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D20" title="Edit section: War in Ukraine"><span data-dcnode-id="6634" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6631"><span data-dcnode-id="6632" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6628" instrument_node="">
</span><h3 data-dcnode-id="6618"><span class="mw-headline" data-dcnode-id="6626" id="Euromaidan.2C_Annexation_of_Crimea.2C_and_War_in_Donbas"><span data-dcnode-id="6627" instrument_node="">Euromaidan, Annexation of Crimea, and War in Donbas</span></span><span class="mw-editsection" data-dcnode-id="6619"><span class="mw-editsection-bracket" data-dcnode-id="6624"><span data-dcnode-id="6625" instrument_node="">[</span></span><a data-dcnode-id="6622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D21" title="Edit section: Euromaidan, Annexation of Crimea, and War in Donbas"><span data-dcnode-id="6623" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6620"><span data-dcnode-id="6621" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6617" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6608"><div class="thumbinner" data-dcnode-id="6609" style="width:227px;"><a class="image" data-dcnode-id="6615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3AUkraine_Waters.png"><img alt="" class="thumbimage" data-dcnode-id="6616" height="314" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/images/thumb/3/3d/Ukraine_Waters.png/225px-Ukraine_Waters.png&amp;raw" srcset="/w/images/thumb/3/3d/Ukraine_Waters.png/338px-Ukraine_Waters.png 1.5x, /w/images/thumb/3/3d/Ukraine_Waters.png/450px-Ukraine_Waters.png 2x" width="225"></a><span data-dcnode-id="6614" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6610"><div class="magnify" data-dcnode-id="6612"><a class="internal" data-dcnode-id="6613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3AUkraine_Waters.png" title="Enlarge"></a></div><span data-dcnode-id="6611" instrument_node="">The Black Sea's waters after Russia took Crimea.</span></div></div></div><span data-dcnode-id="6607" instrument_node="">
</span><p data-dcnode-id="6571"><span data-dcnode-id="6606" instrument_node="">Since 2013, </span><a data-dcnode-id="6604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Ukraine" title="Ukraine"><span data-dcnode-id="6605" instrument_node="">Ukraine</span></a><span data-dcnode-id="6603" instrument_node=""> has become a global flashpoint between Russia and the </span><a data-dcnode-id="6601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/United_States" title="United States"><span data-dcnode-id="6602" instrument_node="">United States</span></a><span data-dcnode-id="6600" instrument_node="">. To put a long story short, Leonid Kravchuk and Leonid Kuchma, the first two presidents of Ukraine, maintained good relations with Russia, but their ties to both oligarchs and </span><a data-dcnode-id="6598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Organized_crime" title="Organized crime"><span data-dcnode-id="6599" instrument_node="">organized crime</span></a><span data-dcnode-id="6597" instrument_node="">, especially mafia types, made it easier for a reformist named Viktor Yushchenko to try to take power. Yushchenko was far more critical of Russia due to its own issues with corruption, oligarchy, and </span><a data-dcnode-id="6595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Capitalism" title="Capitalism"><span data-dcnode-id="6596" instrument_node="">capitalism</span></a><span data-dcnode-id="6594" instrument_node="">. When he was prime minister, Yushchenko lost a vote of no confidence because he was hated by centrists aligned with oligarchs.</span><sup class="reference" data-dcnode-id="6591" id="cite_ref-163"><a data-dcnode-id="6592" href="#cite_note-163"><span data-dcnode-id="6593" instrument_node="">[162]</span></a></sup><span data-dcnode-id="6590" instrument_node=""> When he ran for president, against a man named Viktor Yanukovych, Yushchenko was poisoned, although he survived and made a full recovery, before going on to become president.</span><sup class="reference" data-dcnode-id="6587" id="cite_ref-164"><a data-dcnode-id="6588" href="#cite_note-164"><span data-dcnode-id="6589" instrument_node="">[163]</span></a></sup><sup class="reference" data-dcnode-id="6584" id="cite_ref-165"><a data-dcnode-id="6585" href="#cite_note-165"><span data-dcnode-id="6586" instrument_node="">[164]</span></a></sup><span data-dcnode-id="6583" instrument_node=""> Yanukovych, who was himself running as an anti-corruption candidate, beat Yushchenko, became president, and initially took a neutralist stance between NATO and Russia. Eventually, Yanukovych abandoned all European deals and went with an economic deal from Russia, which pissed off Ukrainians so much, they not only protested, but actually threw him out of the country after he ordered snipers to kill 100 protesters. Without Yanukovych, Putin used that as pretext to send the Russian military, which he called "little green men",</span><sup class="reference" data-dcnode-id="6580" id="cite_ref-167"><a data-dcnode-id="6581" href="#cite_note-167"><span data-dcnode-id="6582" instrument_node="">[note 2]</span></a></sup><sup class="reference" data-dcnode-id="6577" id="cite_ref-shevchenko_166-1"><a data-dcnode-id="6578" href="#cite_note-shevchenko-166"><span data-dcnode-id="6579" instrument_node="">[165]</span></a></sup><span data-dcnode-id="6576" instrument_node=""> to annex Russian-majority Crimea and Sevastopol, while supporting pro-Russian separatists in Luhansk and Donetsk, two Russian language-majority cities in the Donbas region of Eastern Ukraine.</span><sup class="reference" data-dcnode-id="6573" id="cite_ref-168"><a data-dcnode-id="6574" href="#cite_note-168"><span data-dcnode-id="6575" instrument_node="">[166]</span></a></sup><span data-dcnode-id="6572" instrument_node="">
</span></p><span data-dcnode-id="6570" instrument_node="">
</span><h3 data-dcnode-id="6560"><span class="mw-headline" data-dcnode-id="6568" id="Putin.27s_imperial_insanity"><span data-dcnode-id="6569" instrument_node="">Putin's imperial insanity</span></span><span class="mw-editsection" data-dcnode-id="6561"><span class="mw-editsection-bracket" data-dcnode-id="6566"><span data-dcnode-id="6567" instrument_node="">[</span></span><a data-dcnode-id="6564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D22" title="Edit section: Putin's imperial insanity"><span data-dcnode-id="6565" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6562"><span data-dcnode-id="6563" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6559" instrument_node="">
</span><div class="hatnote" data-dcnode-id="6555" role="note"><span data-dcnode-id="6558" instrument_node="">See the main article on this topic: </span><a data-dcnode-id="6556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Imperialism" title="Imperialism"><span data-dcnode-id="6557" instrument_node="">Imperialism</span></a></div><span data-dcnode-id="6554" instrument_node="">
</span><p data-dcnode-id="6536"><span data-dcnode-id="6553" instrument_node="">On July 2021, Putin wrote an article detailing his views on Ukraine, which shares its origin story with Russia and Belarus through Kievan Rus (879–1240 CE), the original Russo-Ukrainian nation-state. In the article, titled "On the Historical Unity of Russians and Ukrainians",</span><sup class="reference" data-dcnode-id="6550" id="cite_ref-169"><a data-dcnode-id="6551" href="#cite_note-169"><span data-dcnode-id="6552" instrument_node="">[167]</span></a></sup><span data-dcnode-id="6549" instrument_node=""> Putin starts off fairly sentimental, downright emotional, and uncharacteristically generous in his views of Russians, Ukrainians, and Belarussians, saying they are one people, one nation, with one destiny. He details Ukraine and Russia's shared history, along with Belarus, but there's a catch: he thinks Ukraine is a fake country, he thinks Ukraine's history is fake, he thinks Ukraine's sovereignty is fake, he thinks Ukraine's independence was pushed by Western powers, and he complains that the West turned Ukraine into a proxy against Russia. He even explicitly blames the USSR for pandering to nationalists, splitting up Russian territory, and giving each Soviet republic the right to secede in the constitution, even though Ukraine cited the U.N. Charter, not Lenin's constitution, was what they cited for their own self-determination. To repeat: he was pissed that historically non-Russian nations were allowed to identify as non-Russian.</span><sup class="reference" data-dcnode-id="6546" id="cite_ref-170"><a data-dcnode-id="6547" href="#cite_note-170"><span data-dcnode-id="6548" instrument_node="">[168]</span></a></sup><span data-dcnode-id="6545" instrument_node=""> </span><sup class="reference" data-dcnode-id="6542" id="cite_ref-171"><a data-dcnode-id="6543" href="#cite_note-171"><span data-dcnode-id="6544" instrument_node="">[169]</span></a></sup><span data-dcnode-id="6541" instrument_node=""> Many critics argued this was absolutely bugfuck irrational.</span><sup class="reference" data-dcnode-id="6538" id="cite_ref-172"><a data-dcnode-id="6539" href="#cite_note-172"><span data-dcnode-id="6540" instrument_node="">[170]</span></a></sup><span data-dcnode-id="6537" instrument_node="">
</span></p><p data-dcnode-id="6501"><span data-dcnode-id="6535" instrument_node="">On 22 February, 2022, he made a now-infamous hour-long speech basically reiterating and refurbishing his views from the article the year prior, where he recognized the Donetsk and Luhansk as independent republics and publicly humiliated his top spy chief for slightly moving against his decision.</span><sup class="reference" data-dcnode-id="6532" id="cite_ref-173"><a data-dcnode-id="6533" href="#cite_note-173"><span data-dcnode-id="6534" instrument_node="">[171]</span></a></sup><span data-dcnode-id="6531" instrument_node=""> During the speech, Putin in fact </span><i data-dcnode-id="6529"><span data-dcnode-id="6530" instrument_node="">denies</span></i><span data-dcnode-id="6528" instrument_node=""> the existence of Ukraine as an independent nation,</span><sup class="reference" data-dcnode-id="6525" id="cite_ref-unfreedom_20-18"><a data-dcnode-id="6526" href="#cite_note-unfreedom-20"><span data-dcnode-id="6527" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="6523" style="white-space:nowrap;"><span data-dcnode-id="6524" instrument_node="">:61-66</span></sup><span data-dcnode-id="6522" instrument_node=""> angrily calling it "a colony with a puppet regime" and with no historical right to exist.</span><sup class="reference" data-dcnode-id="6519" id="cite_ref-174"><a data-dcnode-id="6520" href="#cite_note-174"><span data-dcnode-id="6521" instrument_node="">[172]</span></a></sup><span data-dcnode-id="6518" instrument_node=""> Noting the large number of ethnic Russians in Ukraine, Putin compares "the formation of an ethnically pure Ukrainian state, aggressive towards Russia" to a use of </span><a data-dcnode-id="6516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Weapons_of_mass_destruction" title="Weapons of mass destruction"><span data-dcnode-id="6517" instrument_node="">weapons of mass destruction</span></a><span data-dcnode-id="6515" instrument_node=""> against Russians. This </span><a class="mw-redirect" data-dcnode-id="6513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Revisionist_history" title="Revisionist history"><span data-dcnode-id="6514" instrument_node="">revisionist history</span></a><span data-dcnode-id="6512" instrument_node=""> has been called revanchist, imperialist, and neo-</span><a data-dcnode-id="6510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Tsar" title="Tsar"><span data-dcnode-id="6511" instrument_node="">Tsarist</span></a><span data-dcnode-id="6509" instrument_node="">.</span><sup class="reference" data-dcnode-id="6506" id="cite_ref-175"><a data-dcnode-id="6507" href="#cite_note-175"><span data-dcnode-id="6508" instrument_node="">[173]</span></a></sup><sup class="reference" data-dcnode-id="6503" id="cite_ref-176"><a data-dcnode-id="6504" href="#cite_note-176"><span data-dcnode-id="6505" instrument_node="">[174]</span></a></sup><span data-dcnode-id="6502" instrument_node="">
</span></p><p data-dcnode-id="6492"><span data-dcnode-id="6500" instrument_node="">Putin vociferously argued that Ukraine should never join NATO, because he sees NATO as a fundamental enemy of Russia, due to NATO not disbanding when the </span><a data-dcnode-id="6498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Eastern_Bloc" title="Eastern Bloc"><span data-dcnode-id="6499" instrument_node="">Eastern Bloc</span></a><span data-dcnode-id="6497" instrument_node=""> disbanded. However, NATO has a very specific rule: countries with territorial disputes (meaning nations at war over contested land) are not eligible even to apply for NATO membership, let alone actual membership. This happened to Georgia; carving out Abkhazia and South Ossetia meant Tbilisi was no longer even capable of applying for NATO membership. That means Ukraine also can't join NATO solely because of Crimea and Donbas. Ukrainian president Volodymyr Zelenskyy himself said Ukraine joining NATO is but a "dream," and not a realistic possibility at all. And yet Putin invaded Ukraine anyway, making it clear that it was actually never about NATO. It was always about power, craved by a paranoid old rich man, who is desperate for a legacy but allergic to criticism and incapable of changing his ways, at great human cost.</span><sup class="reference" data-dcnode-id="6494" id="cite_ref-177"><a data-dcnode-id="6495" href="#cite_note-177"><span data-dcnode-id="6496" instrument_node="">[175]</span></a></sup><span data-dcnode-id="6493" instrument_node="">
</span></p><span data-dcnode-id="6491" instrument_node="">
</span><h3 data-dcnode-id="6481"><span class="mw-headline" data-dcnode-id="6489" id="Invasion_of_Ukraine"><span data-dcnode-id="6490" instrument_node="">Invasion of Ukraine</span></span><span class="mw-editsection" data-dcnode-id="6482"><span class="mw-editsection-bracket" data-dcnode-id="6487"><span data-dcnode-id="6488" instrument_node="">[</span></span><a data-dcnode-id="6485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D23" title="Edit section: Invasion of Ukraine"><span data-dcnode-id="6486" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6483"><span data-dcnode-id="6484" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6480" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6471"><div class="thumbinner" data-dcnode-id="6472" style="width:327px;"><a class="image" data-dcnode-id="6478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3ADestroyed_Russian_Tank.jpeg"><img alt="" class="thumbimage" data-dcnode-id="6479" height="244" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/images/thumb/1/1d/Destroyed_Russian_Tank.jpeg/325px-Destroyed_Russian_Tank.jpeg&amp;raw" srcset="/w/images/thumb/1/1d/Destroyed_Russian_Tank.jpeg/488px-Destroyed_Russian_Tank.jpeg 1.5x, /w/images/thumb/1/1d/Destroyed_Russian_Tank.jpeg/650px-Destroyed_Russian_Tank.jpeg 2x" width="325"></a><span data-dcnode-id="6477" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6473"><div class="magnify" data-dcnode-id="6475"><a class="internal" data-dcnode-id="6476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3ADestroyed_Russian_Tank.jpeg" title="Enlarge"></a></div><span data-dcnode-id="6474" instrument_node="">Russian tank destroyed by Ukrainians during the invasion.</span></div></div></div><span data-dcnode-id="6470" instrument_node="">
</span><p data-dcnode-id="6461"><span data-dcnode-id="6469" instrument_node="">This followed a </span><i data-dcnode-id="6467"><span data-dcnode-id="6468" instrument_node="">massive</span></i><span data-dcnode-id="6466" instrument_node=""> military build-up along the border with Ukraine, with nearly 200,000 Russian soldiers at the ready, including putting troops in Belarus for military exercises, although Russia repeatedly denied any intention to escalate the war in Donbas or invade Kyiv.</span><sup class="reference" data-dcnode-id="6463" id="cite_ref-178"><a data-dcnode-id="6464" href="#cite_note-178"><span data-dcnode-id="6465" instrument_node="">[176]</span></a></sup><span data-dcnode-id="6462" instrument_node=""> This caused much consternation, but most people, including many within Russia itself, genuinely didn't believe Putin actually intended to invade.
</span></p><p data-dcnode-id="6449"><span data-dcnode-id="6460" instrument_node="">On 21 February 2022, Russia officially recognized the Donetsk People's Republic and the Luhansk People's Republic, two self-proclaimed states in the Donbas region of eastern Ukraine. The following day, on 22 February, Putin ordered Russian troops to "perform peacekeeping functions" in Donbas, and the Russian Federation Council unanimously authorized Putin to use military force outside Russia's borders.</span><sup class="reference" data-dcnode-id="6457" id="cite_ref-179"><a data-dcnode-id="6458" href="#cite_note-179"><span data-dcnode-id="6459" instrument_node="">[177]</span></a></sup><sup class="reference" data-dcnode-id="6454" id="cite_ref-180"><a data-dcnode-id="6455" href="#cite_note-180"><span data-dcnode-id="6456" instrument_node="">[178]</span></a></sup><sup class="reference" data-dcnode-id="6451" id="cite_ref-181"><a data-dcnode-id="6452" href="#cite_note-181"><span data-dcnode-id="6453" instrument_node="">[179]</span></a></sup><span data-dcnode-id="6450" instrument_node="">
</span></p><p data-dcnode-id="6437"><span data-dcnode-id="6448" instrument_node="">On 24 February 2022, Putin announced a "special military operation" in eastern Ukraine: minutes later, missiles began to hit locations across Ukraine, including the capital, Kyiv. The Ukrainian Border Service said that its border posts with Russia and Belarus were attacked. It was an all-out assault, an unprovoked series of attacks on military and civilian targets. Two hours later, Russian ground forces entered the country from Crimea, Belarus, Donbas, and the Black Sea. Ukrainian President Volodymyr Zelenskyy responded by enacting </span><a data-dcnode-id="6446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Martial_law" title="Martial law"><span data-dcnode-id="6447" instrument_node="">martial law</span></a><span data-dcnode-id="6445" instrument_node="">, severing diplomatic ties with Russia, and ordering general mobilization. This war of aggression shocked everyone, except the United States; President </span><a data-dcnode-id="6443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Joe_Biden" title="Joe Biden"><span data-dcnode-id="6444" instrument_node="">Joe Biden</span></a><span data-dcnode-id="6442" instrument_node=""> and his administration repeatedly warned that Putin would attack Kyiv, but no one believed the White House until it was too late.</span><sup class="reference" data-dcnode-id="6439" id="cite_ref-182"><a data-dcnode-id="6440" href="#cite_note-182"><span data-dcnode-id="6441" instrument_node="">[180]</span></a></sup><span data-dcnode-id="6438" instrument_node="">
</span></p><p data-dcnode-id="6415"><span data-dcnode-id="6436" instrument_node="">Thousands of Russians protested the war, and found themselves arrested by police. Many Russians feel a kinship with Ukrainians, and even hawkish Russians who supported Crimea or Donbas found it utterly incomprehensible and absolutely indefensible to attack and invade Kyiv.</span><sup class="reference" data-dcnode-id="6433" id="cite_ref-183"><a data-dcnode-id="6434" href="#cite_note-183"><span data-dcnode-id="6435" instrument_node="">[181]</span></a></sup><sup class="reference" data-dcnode-id="6430" id="cite_ref-184"><a data-dcnode-id="6431" href="#cite_note-184"><span data-dcnode-id="6432" instrument_node="">[182]</span></a></sup><span data-dcnode-id="6429" instrument_node=""> Putin cited his plans to "demilitarize and </span><a data-dcnode-id="6427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Nazi_analogies%23Schizofascism" title="Nazi analogies"><span data-dcnode-id="6428" instrument_node="">de-Nazify</span></a><span data-dcnode-id="6426" instrument_node="">" Ukraine, ignoring that Ukraine's president, Zelenskyy, is </span><a class="mw-redirect" data-dcnode-id="6424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Jewish" title="Jewish"><span data-dcnode-id="6425" instrument_node="">Jewish</span></a><span data-dcnode-id="6423" instrument_node="">, which earned him rounds of mocking worldwide.</span><sup class="reference" data-dcnode-id="6420" id="cite_ref-185"><a data-dcnode-id="6421" href="#cite_note-185"><span data-dcnode-id="6422" instrument_node="">[183]</span></a></sup><span data-dcnode-id="6419" instrument_node=""> This also ignores how Putin himself emboldened the rise of, say, </span><a data-dcnode-id="6417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Azov_Battalion" title="Azov Battalion"><span data-dcnode-id="6418" instrument_node="">Azov Battalion</span></a><span data-dcnode-id="6416" instrument_node=""> precisely because he attacked the country. It's a problem he made worse.
</span></p><p data-dcnode-id="6400"><span data-dcnode-id="6414" instrument_node="">Putin is a </span><a class="mw-redirect" data-dcnode-id="6412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/War_criminal" title="War criminal"><span data-dcnode-id="6413" instrument_node="">war criminal</span></a><span data-dcnode-id="6411" instrument_node=""> because he ordered the invasion of the sovereign state of Ukraine, which has been widely recognized as a war of aggression.</span><sup class="reference" data-dcnode-id="6408" id="cite_ref-186"><a data-dcnode-id="6409" href="#cite_note-186"><span data-dcnode-id="6410" instrument_node="">[184]</span></a></sup><sup class="reference" data-dcnode-id="6405" id="cite_ref-187"><a data-dcnode-id="6406" href="#cite_note-187"><span data-dcnode-id="6407" instrument_node="">[185]</span></a></sup><sup class="reference" data-dcnode-id="6402" id="cite_ref-188"><a data-dcnode-id="6403" href="#cite_note-188"><span data-dcnode-id="6404" instrument_node="">[186]</span></a></sup><span data-dcnode-id="6401" instrument_node="">
</span></p><span data-dcnode-id="6399" instrument_node="">
</span><h3 data-dcnode-id="6389"><span class="mw-headline" data-dcnode-id="6397" id="Pariah_state"><span data-dcnode-id="6398" instrument_node="">Pariah state</span></span><span class="mw-editsection" data-dcnode-id="6390"><span class="mw-editsection-bracket" data-dcnode-id="6395"><span data-dcnode-id="6396" instrument_node="">[</span></span><a data-dcnode-id="6393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D24" title="Edit section: Pariah state"><span data-dcnode-id="6394" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6391"><span data-dcnode-id="6392" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6388" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6379"><div class="thumbinner" data-dcnode-id="6380" style="width:327px;"><a class="image" data-dcnode-id="6386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3AAll_Alone.jpeg"><img alt="" class="thumbimage" data-dcnode-id="6387" height="207" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/images/thumb/2/26/All_Alone.jpeg/325px-All_Alone.jpeg&amp;raw" srcset="/w/images/thumb/2/26/All_Alone.jpeg/488px-All_Alone.jpeg 1.5x, /w/images/thumb/2/26/All_Alone.jpeg/650px-All_Alone.jpeg 2x" width="325"></a><span data-dcnode-id="6385" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6381"><div class="magnify" data-dcnode-id="6383"><a class="internal" data-dcnode-id="6384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3AAll_Alone.jpeg" title="Enlarge"></a></div><span data-dcnode-id="6382" instrument_node="">A bully has no friends.</span></div></div></div><span data-dcnode-id="6378" instrument_node="">
</span><p data-dcnode-id="6355"><span data-dcnode-id="6377" instrument_node="">This led to near-unanimous condemnation all over the world. </span><a data-dcnode-id="6375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Kazakhstan" title="Kazakhstan"><span data-dcnode-id="6376" instrument_node="">Kazakhstan</span></a><span data-dcnode-id="6374" instrument_node="">, a close ally and neighbor of Russia, who sent troops to quell anti-government protests to support them, </span><i data-dcnode-id="6372"><span data-dcnode-id="6373" instrument_node="">refused</span></i><span data-dcnode-id="6371" instrument_node=""> to send weapons or troops, and even </span><i data-dcnode-id="6369"><span data-dcnode-id="6370" instrument_node="">rejected</span></i><span data-dcnode-id="6368" instrument_node=""> Russian calls to recognize Luhansk and Donetsk; a humiliating loss for Putin.</span><sup class="reference" data-dcnode-id="6365" id="cite_ref-189"><a data-dcnode-id="6366" href="#cite_note-189"><span data-dcnode-id="6367" instrument_node="">[187]</span></a></sup><span data-dcnode-id="6364" instrument_node=""> NATO and the U.S. authorized weapons, ammunition, equipment, and other supplies, including anti-armor and anti-aircraft weapons to Ukraine against Russia.</span><sup class="reference" data-dcnode-id="6361" id="cite_ref-190"><a data-dcnode-id="6362" href="#cite_note-190"><span data-dcnode-id="6363" instrument_node="">[188]</span></a></sup><span data-dcnode-id="6360" instrument_node=""> The European Union not only agreed as an organization to purchase hundreds of millions of Euros' worth of lethal aid, but agreed to shut down their airspace to all Russian airlines, isolating Russia.</span><sup class="reference" data-dcnode-id="6357" id="cite_ref-191"><a data-dcnode-id="6358" href="#cite_note-191"><span data-dcnode-id="6359" instrument_node="">[189]</span></a></sup><span data-dcnode-id="6356" instrument_node="">
</span></p><span data-dcnode-id="6354" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6340"><div class="thumbinner" data-dcnode-id="6341" style="width:327px;"><a class="image" data-dcnode-id="6352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3AAnti-Putin_graffiti_in_Luhansk%2C_May_2014.jpg"><img alt="" class="thumbimage" data-dcnode-id="6353" height="209" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/46/Anti-Putin_graffiti_in_Luhansk%252C_May_2014.jpg/325px-Anti-Putin_graffiti_in_Luhansk%252C_May_2014.jpg&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/4/46/Anti-Putin_graffiti_in_Luhansk%2C_May_2014.jpg/488px-Anti-Putin_graffiti_in_Luhansk%2C_May_2014.jpg 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/4/46/Anti-Putin_graffiti_in_Luhansk%2C_May_2014.jpg/650px-Anti-Putin_graffiti_in_Luhansk%2C_May_2014.jpg 2x" width="325"></a><span data-dcnode-id="6351" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6342"><div class="magnify" data-dcnode-id="6349"><a class="internal" data-dcnode-id="6350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3AAnti-Putin_graffiti_in_Luhansk%2C_May_2014.jpg" title="Enlarge"></a></div><a class="extiw" data-dcnode-id="6346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Putin_khuylo%21" rel="nofollow" title="wp:Putin khuylo!"><span data-dcnode-id="6347" style="color:#477979 !important;" title="Wikipedia: Putin khuylo!"><span data-dcnode-id="6348" instrument_node="">Putin is a dickhead</span></span></a><sup data-dcnode-id="6344"><img alt="Wikipedia" data-dcnode-id="6345" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%2527s_W.svg/12px-Wikipedia%2527s_W.svg.png&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/18px-Wikipedia%27s_W.svg.png 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/24px-Wikipedia%27s_W.svg.png 2x" width="12"></sup><span data-dcnode-id="6343" instrument_node=""> (Путин хуйло)</span></div></div></div><span data-dcnode-id="6339" instrument_node="">
</span><p data-dcnode-id="6317"><span data-dcnode-id="6338" instrument_node="">Putin began to show signs of frustration-induced instability. A day after </span><a data-dcnode-id="6336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Finland" title="Finland"><span data-dcnode-id="6337" instrument_node="">Finland</span></a><span data-dcnode-id="6335" instrument_node=""> and </span><a data-dcnode-id="6333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Sweden" title="Sweden"><span data-dcnode-id="6334" instrument_node="">Sweden</span></a><span data-dcnode-id="6332" instrument_node=""> said that they would not join NATO, Putin threatened to invade Finland and Sweden anyway.</span><sup class="reference" data-dcnode-id="6329" id="cite_ref-192"><a data-dcnode-id="6330" href="#cite_note-192"><span data-dcnode-id="6331" instrument_node="">[190]</span></a></sup><span data-dcnode-id="6328" instrument_node=""> This provoked Sweden to </span><b data-dcnode-id="6326"><span data-dcnode-id="6327" instrument_node="">break with their neutrality</span></b><span data-dcnode-id="6325" instrument_node=""> and arm Ukraine against Russia, an unprecedented sign of the times.</span><sup class="reference" data-dcnode-id="6322" id="cite_ref-193"><a data-dcnode-id="6323" href="#cite_note-193"><span data-dcnode-id="6324" instrument_node="">[191]</span></a></sup><sup class="reference" data-dcnode-id="6319" id="cite_ref-194"><a data-dcnode-id="6320" href="#cite_note-194"><span data-dcnode-id="6321" instrument_node="">[192]</span></a></sup><span data-dcnode-id="6318" instrument_node="">
</span></p><p data-dcnode-id="6287"><span data-dcnode-id="6316" instrument_node="">Russian propaganda sites, like </span><a data-dcnode-id="6314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/RT" title="RT"><span data-dcnode-id="6315" instrument_node="">RT</span></a><span data-dcnode-id="6313" instrument_node=""> and Sputnik, were banned by the </span><a data-dcnode-id="6311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/European_Union" title="European Union"><span data-dcnode-id="6312" instrument_node="">European Union</span></a><span data-dcnode-id="6310" instrument_node=""> for peddling disinformation and dehumanizing </span><a data-dcnode-id="6308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Rhetoric" title="Rhetoric"><span data-dcnode-id="6309" instrument_node="">rhetoric</span></a><span data-dcnode-id="6307" instrument_node=""> against Putin's enemies. Multiple internet media sites, such as </span><a data-dcnode-id="6305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Google" title="Google"><span data-dcnode-id="6306" instrument_node="">Google</span></a><span data-dcnode-id="6304" instrument_node="">, banned downloads of all Russian news media apps, kicked Russian TV off the airwaves, and state-backed media channels were thrown off the grid because of their support of the war in Ukraine.</span><sup class="reference" data-dcnode-id="6301" id="cite_ref-195"><a data-dcnode-id="6302" href="#cite_note-195"><span data-dcnode-id="6303" instrument_node="">[193]</span></a></sup><sup class="reference" data-dcnode-id="6298" id="cite_ref-196"><a data-dcnode-id="6299" href="#cite_note-196"><span data-dcnode-id="6300" instrument_node="">[194]</span></a></sup><sup class="reference" data-dcnode-id="6295" id="cite_ref-197"><a data-dcnode-id="6296" href="#cite_note-197"><span data-dcnode-id="6297" instrument_node="">[195]</span></a></sup><sup class="reference" data-dcnode-id="6292" id="cite_ref-198"><a data-dcnode-id="6293" href="#cite_note-198"><span data-dcnode-id="6294" instrument_node="">[196]</span></a></sup><sup class="reference" data-dcnode-id="6289" id="cite_ref-199"><a data-dcnode-id="6290" href="#cite_note-199"><span data-dcnode-id="6291" instrument_node="">[197]</span></a></sup><span data-dcnode-id="6288" instrument_node="">
</span></p><span data-dcnode-id="6286" instrument_node="">
</span><h4 data-dcnode-id="6276"><span class="mw-headline" data-dcnode-id="6284" id="International_sanctions"><span data-dcnode-id="6285" instrument_node="">International sanctions</span></span><span class="mw-editsection" data-dcnode-id="6277"><span class="mw-editsection-bracket" data-dcnode-id="6282"><span data-dcnode-id="6283" instrument_node="">[</span></span><a data-dcnode-id="6280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D25" title="Edit section: International sanctions"><span data-dcnode-id="6281" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6278"><span data-dcnode-id="6279" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6275" instrument_node="">
</span><span data-dcnode-id="6274" instrument_node="">
</span><span data-dcnode-id="6273" instrument_node="">
</span><span data-dcnode-id="6263" instrument_node="">
</span><span data-dcnode-id="6262" instrument_node="">
</span><table class="cquote" data-dcnode-id="6249" style="margin: auto; border-collapse:collapse; border-style:none; background-color:transparent;"><tbody data-dcnode-id="6250"><tr data-dcnode-id="6264"><td data-dcnode-id="6265"><div data-dcnode-id="6267" style="padding:4px 50px;position:relative;"><span data-dcnode-id="6271" style="position:absolute;left:10px;top:-6px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="6272" instrument_node="">“</span></span><span data-dcnode-id="6269" style="position:absolute;right:10px;bottom:-20px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="6270" instrument_node="">”</span></span><span data-dcnode-id="6268" instrument_node="">I’ll say that if they are not waging ‘war’ in Ukraine according to Putin’s definition, then we are also not putting economic sanctions on them. It is simply a ‘financial operation.’</span></div><span data-dcnode-id="6266" instrument_node="">
</span></td></tr><tr data-dcnode-id="6251"><td data-dcnode-id="6252" style="padding:4px 10px 8px;font-size:smaller;line-height:1.6em;text-align:right;"><span data-dcnode-id="6261" instrument_node=""> </span><cite data-dcnode-id="6254" style="font-style:normal;position:relative;z-index:2"><span data-dcnode-id="6260" instrument_node="">—Artis Pabriks, defense minister of </span><a data-dcnode-id="6258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Latvia" title="Latvia"><span data-dcnode-id="6259" instrument_node="">Latvia</span></a><sup class="reference" data-dcnode-id="6255" id="cite_ref-200"><a data-dcnode-id="6256" href="#cite_note-200"><span data-dcnode-id="6257" instrument_node="">[198]</span></a></sup></cite><span data-dcnode-id="6253" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="6248" instrument_node="">
</span><p data-dcnode-id="6204"><span data-dcnode-id="6247" instrument_node="">International sanctions were issued against Russian </span><a class="mw-redirect" data-dcnode-id="6245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Elite" title="Elite"><span data-dcnode-id="6246" instrument_node="">elites</span></a><span data-dcnode-id="6244" instrument_node="">, oligarchs, lawmakers, government officials, and Putin himself.</span><sup class="reference" data-dcnode-id="6241" id="cite_ref-201"><a data-dcnode-id="6242" href="#cite_note-201"><span data-dcnode-id="6243" instrument_node="">[199]</span></a></sup><span data-dcnode-id="6240" instrument_node=""> While many European countries were reluctant to sanction their biggest trading partner when it came to oil and gas, Germany, </span><a data-dcnode-id="6238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Italy" title="Italy"><span data-dcnode-id="6239" instrument_node="">Italy</span></a><span data-dcnode-id="6237" instrument_node="">, </span><a data-dcnode-id="6235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Hungary" title="Hungary"><span data-dcnode-id="6236" instrument_node="">Hungary</span></a><span data-dcnode-id="6234" instrument_node="">, and others eventually relented the longer the war in Ukraine waged. This included banning several Russian banks from SWIFT, the international bank-to-bank transfer system, which meant that Russia lost access to an international payment system and thus Russians cannot use their money outside their country.</span><sup class="reference" data-dcnode-id="6231" id="cite_ref-202"><a data-dcnode-id="6232" href="#cite_note-202"><span data-dcnode-id="6233" instrument_node="">[200]</span></a></sup><span data-dcnode-id="6230" instrument_node=""> Even </span><b data-dcnode-id="6228"><span data-dcnode-id="6229" instrument_node="">China</span></b><span data-dcnode-id="6227" instrument_node=""> began restricting Russian bank financing.</span><sup class="reference" data-dcnode-id="6224" id="cite_ref-203"><a data-dcnode-id="6225" href="#cite_note-203"><span data-dcnode-id="6226" instrument_node="">[201]</span></a></sup><sup class="reference" data-dcnode-id="6221" id="cite_ref-204"><a data-dcnode-id="6222" href="#cite_note-204"><span data-dcnode-id="6223" instrument_node="">[202]</span></a></sup><span data-dcnode-id="6220" instrument_node=""> Losing hundreds of billions of dollars' worth of financing means they can't properly finance the invasion of Ukraine.</span><sup class="reference" data-dcnode-id="6217" id="cite_ref-205"><a data-dcnode-id="6218" href="#cite_note-205"><span data-dcnode-id="6219" instrument_node="">[203]</span></a></sup><span data-dcnode-id="6216" instrument_node=""> Even the Russian Central Bank was sanctioned, which directly hurts the pockets of not only everyday Russians but also Russian elites.</span><sup class="reference" data-dcnode-id="6213" id="cite_ref-206"><a data-dcnode-id="6214" href="#cite_note-206"><span data-dcnode-id="6215" instrument_node="">[204]</span></a></sup><sup class="reference" data-dcnode-id="6210" id="cite_ref-207"><a data-dcnode-id="6211" href="#cite_note-207"><span data-dcnode-id="6212" instrument_node="">[205]</span></a></sup><span data-dcnode-id="6209" instrument_node=""> By February 27, 2022, the ruble plunged to a record low as a result of all the sanctions, having dropped a full 50% against the dollar.</span><sup class="reference" data-dcnode-id="6206" id="cite_ref-208"><a data-dcnode-id="6207" href="#cite_note-208"><span data-dcnode-id="6208" instrument_node="">[206]</span></a></sup><span data-dcnode-id="6205" instrument_node="">
</span></p><span data-dcnode-id="6203" instrument_node="">
</span><h4 data-dcnode-id="6193"><span class="mw-headline" data-dcnode-id="6201" id="Western_businesses_leave_Russia"><span data-dcnode-id="6202" instrument_node="">Western businesses leave Russia</span></span><span class="mw-editsection" data-dcnode-id="6194"><span class="mw-editsection-bracket" data-dcnode-id="6199"><span data-dcnode-id="6200" instrument_node="">[</span></span><a data-dcnode-id="6197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D26" title="Edit section: Western businesses leave Russia"><span data-dcnode-id="6198" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6195"><span data-dcnode-id="6196" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6192" instrument_node="">
</span><p data-dcnode-id="6174"><span data-dcnode-id="6191" instrument_node="">Following the invasion and early sanctions in response to it, major Western businesses and monopolies have decided to either greatly limit activity or services in Russia, or to pull out of the country altogether. Such businesses include Ikea, Spotify, Netflix, Disney, Warner Bros., Adidas, General Motors, Harley Davidson, ExxonMobile, Boeing, Mercedes-Benz, Toyota, Volkswagen, Airbnb, the H&amp;M fast food chain, BP, Dell, Google, Facebook (parent company now called Meta), Shell, Apple, Nike, TikTok,</span><sup class="reference" data-dcnode-id="6188" id="cite_ref-209"><a data-dcnode-id="6189" href="#cite_note-209"><span data-dcnode-id="6190" instrument_node="">[note 3]</span></a></sup><span data-dcnode-id="6187" instrument_node=""> Paypal, MasterCard, and Visa, thereby depriving ordinary Russians of much of their livelihoods and money.</span><sup class="reference" data-dcnode-id="6184" id="cite_ref-210"><a data-dcnode-id="6185" href="#cite_note-210"><span data-dcnode-id="6186" instrument_node="">[207]</span></a></sup><span data-dcnode-id="6183" instrument_node=""> </span><sup class="reference" data-dcnode-id="6180" id="cite_ref-211"><a data-dcnode-id="6181" href="#cite_note-211"><span data-dcnode-id="6182" instrument_node="">[208]</span></a></sup><span data-dcnode-id="6179" instrument_node=""> </span><sup class="reference" data-dcnode-id="6176" id="cite_ref-212"><a data-dcnode-id="6177" href="#cite_note-212"><span data-dcnode-id="6178" instrument_node="">[209]</span></a></sup><span data-dcnode-id="6175" instrument_node="">
</span></p><p data-dcnode-id="6168"><span data-dcnode-id="6173" instrument_node="">Reasons for suspending business or services may vary, and in the case of media companies, the draconian law imposed by Russia to enforce its propaganda about the war, with the threat of up to 15 years in prison for contradicting it, brought a greater pressure to leave Russia. It was cited by Chinese-owned TikTok, which wanted to keep employees and users safe.</span><sup class="reference" data-dcnode-id="6170" id="cite_ref-213"><a data-dcnode-id="6171" href="#cite_note-213"><span data-dcnode-id="6172" instrument_node="">[210]</span></a></sup><span data-dcnode-id="6169" instrument_node="">
</span></p><span data-dcnode-id="6167" instrument_node="">
</span><h3 data-dcnode-id="6157"><span class="mw-headline" data-dcnode-id="6165" id="Raising_the_specter_of_Nuclear_War"><span data-dcnode-id="6166" instrument_node="">Raising the specter of Nuclear War</span></span><span class="mw-editsection" data-dcnode-id="6158"><span class="mw-editsection-bracket" data-dcnode-id="6163"><span data-dcnode-id="6164" instrument_node="">[</span></span><a data-dcnode-id="6161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D27" title="Edit section: Raising the specter of Nuclear War"><span data-dcnode-id="6162" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6159"><span data-dcnode-id="6160" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6156" instrument_node="">
</span><p data-dcnode-id="6141"><span data-dcnode-id="6155" instrument_node="">Citing “aggressive statements” by NATO and tough financial sanctions, Putin issued a directive to increase the readiness of Russia’s nuclear weapons, raising fears that the invasion of Ukraine could lead to </span><a data-dcnode-id="6153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Nuclear_war" title="Nuclear war"><span data-dcnode-id="6154" instrument_node="">nuclear war</span></a><span data-dcnode-id="6152" instrument_node="">, whether by design or mistake. In practice, this changed very little, just putting a few more soliders on duty at missile silos; however, the fact that Putin put this nuclear dead cat onto the table has pushed an already tense international situation into overdrive.</span><sup class="reference" data-dcnode-id="6149" id="cite_ref-214"><a data-dcnode-id="6150" href="#cite_note-214"><span data-dcnode-id="6151" instrument_node="">[211]</span></a></sup><sup class="reference" data-dcnode-id="6146" id="cite_ref-215"><a data-dcnode-id="6147" href="#cite_note-215"><span data-dcnode-id="6148" instrument_node="">[212]</span></a></sup><sup class="reference" data-dcnode-id="6143" id="cite_ref-216"><a data-dcnode-id="6144" href="#cite_note-216"><span data-dcnode-id="6145" instrument_node="">[213]</span></a></sup><span data-dcnode-id="6142" instrument_node="">
</span></p><span data-dcnode-id="6140" instrument_node="">
</span><h3 data-dcnode-id="6130"><span class="mw-headline" data-dcnode-id="6138" id="Anti-war_sentiment_in_Russia"><span data-dcnode-id="6139" instrument_node="">Anti-war sentiment in Russia</span></span><span class="mw-editsection" data-dcnode-id="6131"><span class="mw-editsection-bracket" data-dcnode-id="6136"><span data-dcnode-id="6137" instrument_node="">[</span></span><a data-dcnode-id="6134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D28" title="Edit section: Anti-war sentiment in Russia"><span data-dcnode-id="6135" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6132"><span data-dcnode-id="6133" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6129" instrument_node="">
</span><div class="hatnote" data-dcnode-id="6125" role="note"><span data-dcnode-id="6128" instrument_node="">See the main article on this topic: </span><a data-dcnode-id="6126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Pacifism" title="Pacifism"><span data-dcnode-id="6127" instrument_node="">Pacifism</span></a></div><span data-dcnode-id="6124" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6115"><div class="thumbinner" data-dcnode-id="6116" style="width:227px;"><a class="image" data-dcnode-id="6122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3ANo_War_Protester_Arrested.jpeg"><img alt="" class="thumbimage" data-dcnode-id="6123" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/images/thumb/e/e6/No_War_Protester_Arrested.jpeg/225px-No_War_Protester_Arrested.jpeg&amp;raw" srcset="/w/images/thumb/e/e6/No_War_Protester_Arrested.jpeg/338px-No_War_Protester_Arrested.jpeg 1.5x, /w/images/thumb/e/e6/No_War_Protester_Arrested.jpeg/450px-No_War_Protester_Arrested.jpeg 2x" width="225"></a><span data-dcnode-id="6121" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6117"><div class="magnify" data-dcnode-id="6119"><a class="internal" data-dcnode-id="6120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3ANo_War_Protester_Arrested.jpeg" title="Enlarge"></a></div><span data-dcnode-id="6118" instrument_node="">A protester holding a "No War" sign.</span></div></div></div><span data-dcnode-id="6114" instrument_node="">
</span><p data-dcnode-id="6099"><span data-dcnode-id="6113" instrument_node="">Despite the iron grip Putin has on the press and the police, Russians publicly spoke out against the war, including Russian athletes, Russian children of government ministers, and even Russian capitalists and oligarchs who made their wealth in the finance and energy sectors that were sanctioned. Thousands of anti-war protesters were arrested throughout the first week of the war. Open letters condemning Russia's invasion of Ukraine kept pouring, too. More than 6,000 medical workers put their names under one on February 26; over 3,400 architects and engineers endorsed another while 500 teachers signed a third one. Similar letters by journalists, municipal council members, cultural figures and other professional groups have been making the rounds since Thursday. Statements decrying the invasion even came from some parliament members, who earlier this week voted to recognize the independence of two separatist regions in eastern Ukraine, a move that preceded the Russian assault. Two lawmakers from the Communist Party, which usually toes the Kremlin's line, spoke out against the hostilities on social media.</span><sup class="reference" data-dcnode-id="6110" id="cite_ref-217"><a data-dcnode-id="6111" href="#cite_note-217"><span data-dcnode-id="6112" instrument_node="">[214]</span></a></sup><sup class="reference" data-dcnode-id="6107" id="cite_ref-218"><a data-dcnode-id="6108" href="#cite_note-218"><span data-dcnode-id="6109" instrument_node="">[215]</span></a></sup><sup class="reference" data-dcnode-id="6104" id="cite_ref-219"><a data-dcnode-id="6105" href="#cite_note-219"><span data-dcnode-id="6106" instrument_node="">[216]</span></a></sup><sup class="reference" data-dcnode-id="6101" id="cite_ref-220"><a data-dcnode-id="6102" href="#cite_note-220"><span data-dcnode-id="6103" instrument_node="">[217]</span></a></sup><span data-dcnode-id="6100" instrument_node="">
</span></p><p data-dcnode-id="6089"><span data-dcnode-id="6098" instrument_node="">An entire delegation of Russian lawmakers in a Gagarinsky municipal district wrote an appeal to Putin, saying not only that the invasion was "a disaster", but that the invasion is "a path to the degradation and impoverishment of the country. No other actions could cause more damage to the Russian economy."</span><sup class="reference" data-dcnode-id="6095" id="cite_ref-221"><a data-dcnode-id="6096" href="#cite_note-221"><span data-dcnode-id="6097" instrument_node="">[218]</span></a></sup><span data-dcnode-id="6094" instrument_node=""> Marina Ovsyannikova, an employee of Russia's state-run Channel 1, ran into the studio mid-live broadcast of the network's most-watched news show on March 14, yelling "Stop the war!" and holding up a sign that said "They’re lying to you here." </span><sup class="reference" data-dcnode-id="6091" id="cite_ref-222"><a data-dcnode-id="6092" href="#cite_note-222"><span data-dcnode-id="6093" instrument_node="">[219]</span></a></sup><span data-dcnode-id="6090" instrument_node="">
</span></p><p data-dcnode-id="6083"><span data-dcnode-id="6088" instrument_node="">Anti-war protests and rallies spread all the way to the heart of Moscow, and one very specific phrase has taken hold among Russian protesters: "Net voine," meaning "No War." These two words are enough cause for Kremlin police to arrest protesters. </span><sup class="reference" data-dcnode-id="6085" id="cite_ref-223"><a data-dcnode-id="6086" href="#cite_note-223"><span data-dcnode-id="6087" instrument_node="">[220]</span></a></sup><span data-dcnode-id="6084" instrument_node="">
</span></p><span data-dcnode-id="6082" instrument_node="">
</span><h3 data-dcnode-id="6072"><span class="mw-headline" data-dcnode-id="6080" id="Losing_the_propaganda_war"><span data-dcnode-id="6081" instrument_node="">Losing the propaganda war</span></span><span class="mw-editsection" data-dcnode-id="6073"><span class="mw-editsection-bracket" data-dcnode-id="6078"><span data-dcnode-id="6079" instrument_node="">[</span></span><a data-dcnode-id="6076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D29" title="Edit section: Losing the propaganda war"><span data-dcnode-id="6077" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6074"><span data-dcnode-id="6075" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6071" instrument_node="">
</span><p data-dcnode-id="6042"><span data-dcnode-id="6070" instrument_node="">When he was in the KGB, he learned how to manipulate language to Orwellian levels, and used that to perfection as President of Russia, leading to a massive propaganda network of "alternative" media peddling half-truths and falsehoods to maintain plausible deniability. He gained a reputation for being a skilled spin doctor, a leading propagandist, and a master at information warfare, weaponizing social media via troll farms and bot swarms, aggressively promoting fake narratives, and laundering misinformation not necessarily to change minds but to confuse and disorient people, essentially a mix of </span><a data-dcnode-id="6068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Richard_Nixon" title="Richard Nixon"><span data-dcnode-id="6069" instrument_node="">Madman theory</span></a><span data-dcnode-id="6067" instrument_node="">, </span><a data-dcnode-id="6065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Moral_equivalence" title="Moral equivalence"><span data-dcnode-id="6066" instrument_node="">Moral equivalence</span></a><span data-dcnode-id="6064" instrument_node="">, and </span><a data-dcnode-id="6062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Whataboutism" title="Whataboutism"><span data-dcnode-id="6063" instrument_node="">Whataboutism</span></a><span data-dcnode-id="6061" instrument_node="">. But when he invaded Ukraine unprovoked, Putin shot himself in the foot. Many experts and analysts even within Russia itself have found that Putin </span><i data-dcnode-id="6059"><span data-dcnode-id="6060" instrument_node="">lost</span></i><span data-dcnode-id="6058" instrument_node=""> the information war in Ukraine, precisely because his propaganda network was literally built on lies. His lies were so brazen and ridiculous, so against reality, that literally </span><i data-dcnode-id="6056"><span data-dcnode-id="6057" instrument_node="">everybody</span></i><span data-dcnode-id="6055" instrument_node=""> saw just how much a paper tiger his propaganda network really was. A house of cards built on lies can only last so long, as Ukrainian counter-information efforts helped seize the war narrative away from Putin, who refused to call the war a war and instead just a "special military operation." His Orwellian style may work in times of peace, but fell apart spectacularly in times of war. </span><sup class="reference" data-dcnode-id="6052" id="cite_ref-224"><a data-dcnode-id="6053" href="#cite_note-224"><span data-dcnode-id="6054" instrument_node="">[221]</span></a></sup><span data-dcnode-id="6051" instrument_node=""> </span><sup class="reference" data-dcnode-id="6048" id="cite_ref-225"><a data-dcnode-id="6049" href="#cite_note-225"><span data-dcnode-id="6050" instrument_node="">[222]</span></a></sup><span data-dcnode-id="6047" instrument_node=""> </span><sup class="reference" data-dcnode-id="6044" id="cite_ref-226"><a data-dcnode-id="6045" href="#cite_note-226"><span data-dcnode-id="6046" instrument_node="">[223]</span></a></sup><span data-dcnode-id="6043" instrument_node="">
