</span></p><p data-dcnode-id="6016"><span data-dcnode-id="6041" instrument_node="">This is partly due to the </span><a data-dcnode-id="6039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/European_Union" title="European Union"><span data-dcnode-id="6040" instrument_node="">European Union</span></a><span data-dcnode-id="6038" instrument_node=""> and </span><a data-dcnode-id="6036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/United_States" title="United States"><span data-dcnode-id="6037" instrument_node="">United States</span></a><span data-dcnode-id="6035" instrument_node=""> banning and/or demonetizing Russian propaganda outlets like </span><a data-dcnode-id="6033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/RT" title="RT"><span data-dcnode-id="6034" instrument_node="">RT</span></a><span data-dcnode-id="6032" instrument_node="">, depriving Putin of a huge chunk of his misinformation empire.</span><sup class="reference" data-dcnode-id="6029" id="cite_ref-227"><a data-dcnode-id="6030" href="#cite_note-227"><span data-dcnode-id="6031" instrument_node="">[224]</span></a></sup><span data-dcnode-id="6028" instrument_node=""> Another reason is due to Klitschko, the mayor of Kyiv, and Zelenskyy, the president of Ukraine, both being media savvy men who started, not as politicians, but as athletes (Klitschko) and comedians (Zelenksyy) who became popular partly due to their own decades-long careers navigating and controlling media narratives for themselves in their respective fields. They knew exactly how to counter Putin's propaganda. </span><sup class="reference" data-dcnode-id="6025" id="cite_ref-228"><a data-dcnode-id="6026" href="#cite_note-228"><span data-dcnode-id="6027" instrument_node="">[225]</span></a></sup><span data-dcnode-id="6024" instrument_node=""> The other reason is Putin's war on truth became so brazen, it was hard not to notice anymore, as he was not even bothering to seem credible anymore, changing lies on a dime, and shifting to an even poorer man's </span><a data-dcnode-id="6022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Gish_Gallop" title="Gish Gallop"><span data-dcnode-id="6023" instrument_node="">Gish Gallop</span></a><span data-dcnode-id="6021" instrument_node=""> by accusing America and the West of stuff that is literally impossible to do in reality. </span><sup class="reference" data-dcnode-id="6018" id="cite_ref-229"><a data-dcnode-id="6019" href="#cite_note-229"><span data-dcnode-id="6020" instrument_node="">[226]</span></a></sup><span data-dcnode-id="6017" instrument_node="">  People simply didn't buy his bullshit, and once you lose the narrative early, it's almost impossible to win it back.
</span></p><p data-dcnode-id="6002"><span data-dcnode-id="6015" instrument_node="">Largely due to pressure from the Ukrainian government and other foreign leaders, tech giants and cable providers took action against “state-sponsored disinformation campaigns” from Russia, and outside Russia, Putin's propaganda machine was rendered all but extinct.</span><sup class="reference" data-dcnode-id="6012" id="cite_ref-230"><a data-dcnode-id="6013" href="#cite_note-230"><span data-dcnode-id="6014" instrument_node="">[227]</span></a></sup><span data-dcnode-id="6011" instrument_node=""> And while he has "intensified his domination of state-run media" and "strangulation of independent media," Putin is reportedly "struggling to fully control the narrative at home." Many Russians know how to circumvent censorship due to decades of soft-touch censorship within Russia since Putin took over. </span><sup class="reference" data-dcnode-id="6008" id="cite_ref-231"><a data-dcnode-id="6009" href="#cite_note-231"><span data-dcnode-id="6010" instrument_node="">[228]</span></a></sup><span data-dcnode-id="6007" instrument_node=""> Even at home, Putin can only do so much to stop people from learning of his war crimes. </span><sup class="reference" data-dcnode-id="6004" id="cite_ref-232"><a data-dcnode-id="6005" href="#cite_note-232"><span data-dcnode-id="6006" instrument_node="">[229]</span></a></sup><span data-dcnode-id="6003" instrument_node="">
</span></p><span data-dcnode-id="6001" instrument_node="">
</span><h3 data-dcnode-id="5991"><span class="mw-headline" data-dcnode-id="5999" id="Descent_into_paranoia.2C_fascism.2C_and_totalitarianism"><span data-dcnode-id="6000" instrument_node="">Descent into paranoia, fascism, and totalitarianism</span></span><span class="mw-editsection" data-dcnode-id="5992"><span class="mw-editsection-bracket" data-dcnode-id="5997"><span data-dcnode-id="5998" instrument_node="">[</span></span><a data-dcnode-id="5995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D30" title="Edit section: Descent into paranoia, fascism, and totalitarianism"><span data-dcnode-id="5996" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5993"><span data-dcnode-id="5994" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5990" instrument_node="">
</span><span data-dcnode-id="5989" instrument_node="">
</span><span data-dcnode-id="5988" instrument_node="">
</span><span data-dcnode-id="5975" instrument_node="">
</span><span data-dcnode-id="5974" instrument_node="">
</span><table class="cquote" data-dcnode-id="5963" style="margin: auto; border-collapse:collapse; border-style:none; background-color:transparent;"><tbody data-dcnode-id="5964"><tr data-dcnode-id="5976"><td data-dcnode-id="5977"><div data-dcnode-id="5979" style="padding:4px 50px;position:relative;"><span data-dcnode-id="5986" style="position:absolute;left:10px;top:-6px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="5987" instrument_node="">“</span></span><span data-dcnode-id="5984" style="position:absolute;right:10px;bottom:-20px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="5985" instrument_node="">”</span></span><span data-dcnode-id="5983" instrument_node="">[Russians] will always be able to distinguish </span><a class="mw-redirect" data-dcnode-id="5981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/True_scotsman" title="True scotsman"><span data-dcnode-id="5982" instrument_node="">true patriots</span></a><span data-dcnode-id="5980" instrument_node=""> from scum and traitors and will simply spit them out like a gnat that accidentally flew into their mouths. I am convinced that such a natural and necessary self-purification of society will only strengthen our country.</span></div><span data-dcnode-id="5978" instrument_node="">
</span></td></tr><tr data-dcnode-id="5965"><td data-dcnode-id="5966" style="padding:4px 10px 8px;font-size:smaller;line-height:1.6em;text-align:right;"><span data-dcnode-id="5973" instrument_node=""> </span><cite data-dcnode-id="5968" style="font-style:normal;position:relative;z-index:2"><span data-dcnode-id="5972" instrument_node="">—Putin unironically talking like a fascist while ranting about anti-war protesters.</span><sup class="reference" data-dcnode-id="5969" id="cite_ref-233"><a data-dcnode-id="5970" href="#cite_note-233"><span data-dcnode-id="5971" instrument_node="">[230]</span></a></sup></cite><span data-dcnode-id="5967" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="5962" instrument_node="">
</span><p data-dcnode-id="5944"><span data-dcnode-id="5961" instrument_node="">With a severe economic crisis, near-total isolation from the western half of the world, and western companies leaving the country in droves, Putin is reportedly "disconnected from reality," isolated from any criticism or differing opinions of any kind, and surrounded by yes-men who either owe their careers to him or are too afraid to challenge an increasingly angry Russian autocrat. </span><sup class="reference" data-dcnode-id="5958" id="cite_ref-234"><a data-dcnode-id="5959" href="#cite_note-234"><span data-dcnode-id="5960" instrument_node="">[231]</span></a></sup><span data-dcnode-id="5957" instrument_node=""> </span><sup class="reference" data-dcnode-id="5954" id="cite_ref-235"><a data-dcnode-id="5955" href="#cite_note-235"><span data-dcnode-id="5956" instrument_node="">[232]</span></a></sup><span data-dcnode-id="5953" instrument_node=""> American and European intelligence both report that Putin appears "isolated" and "reliant on a small coterie of advisers" who have "not told him the truth about how difficult and costly conquering Ukraine is turning out to be." Putin seriously underestimated the west, and analysts see a leader on edge, at risk of lashing out when he feels cornered.</span><sup class="reference" data-dcnode-id="5950" id="cite_ref-236"><a data-dcnode-id="5951" href="#cite_note-236"><span data-dcnode-id="5952" instrument_node="">[233]</span></a></sup><span data-dcnode-id="5949" instrument_node=""> Putin has also blocked access to both Western media and independent news sites in the country, and Russia's lower house of parliament passed a bill that criminalizes journalism critical of the war, including journalists who use the word “war” to describe Russia’s assault. </span><sup class="reference" data-dcnode-id="5946" id="cite_ref-237"><a data-dcnode-id="5947" href="#cite_note-237"><span data-dcnode-id="5948" instrument_node="">[234]</span></a></sup><span data-dcnode-id="5945" instrument_node="">
</span></p><p data-dcnode-id="5915"><span data-dcnode-id="5943" instrument_node="">In a televised speech from the Kremlin, Putin went on an unhinged rant complaining about a Western-aligned "fifth column" of "traitors" in Russia who want the "destruction of Russia." He then unironically said Russia should undergo a "self-cleansing of society" to rid itself of all undesirables who are toxic to the state,</span><sup class="reference" data-dcnode-id="5940" id="cite_ref-238"><a data-dcnode-id="5941" href="#cite_note-238"><span data-dcnode-id="5942" instrument_node="">[235]</span></a></sup><span data-dcnode-id="5939" instrument_node=""> which are literal </span><a class="mw-redirect" data-dcnode-id="5937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Fascist" title="Fascist"><span data-dcnode-id="5938" instrument_node="">fascist</span></a><span data-dcnode-id="5936" instrument_node=""> talking points. </span><sup class="reference" data-dcnode-id="5933" id="cite_ref-239"><a data-dcnode-id="5934" href="#cite_note-239"><span data-dcnode-id="5935" instrument_node="">[236]</span></a></sup><span data-dcnode-id="5932" instrument_node=""> </span><sup class="reference" data-dcnode-id="5929" id="cite_ref-240"><a data-dcnode-id="5930" href="#cite_note-240"><span data-dcnode-id="5931" instrument_node="">[237]</span></a></sup><span data-dcnode-id="5928" instrument_node=""> </span><sup class="reference" data-dcnode-id="5925" id="cite_ref-241"><a data-dcnode-id="5926" href="#cite_note-241"><span data-dcnode-id="5927" instrument_node="">[238]</span></a></sup><span data-dcnode-id="5924" instrument_node=""> </span><sup class="reference" data-dcnode-id="5921" id="cite_ref-242"><a data-dcnode-id="5922" href="#cite_note-242"><span data-dcnode-id="5923" instrument_node="">[239]</span></a></sup><span data-dcnode-id="5920" instrument_node=""> Graffiti warnings were later sprayed over journalists' and activists' doors of their homes from apparent pro-Putin supporters who accused them of treason.</span><sup class="reference" data-dcnode-id="5917" id="cite_ref-243"><a data-dcnode-id="5918" href="#cite_note-243"><span data-dcnode-id="5919" instrument_node="">[240]</span></a></sup><span data-dcnode-id="5916" instrument_node="">
</span></p><p data-dcnode-id="5881"><span data-dcnode-id="5914" instrument_node="">Putin has grown increasingly paranoid over the decades of him being in power, and that paranoia turned him into an outright control freak by the Ukraine invasion. Since he couldn't control the narrative globally, he intensified his control of information at home by censoring the Russian internet, restricting social media (like TikTok) in Russia,</span><sup class="reference" data-dcnode-id="5911" id="cite_ref-244"><a data-dcnode-id="5912" href="#cite_note-244"><span data-dcnode-id="5913" instrument_node="">[241]</span></a></sup><span data-dcnode-id="5910" instrument_node=""> blocking Instagram and Twitter, </span><sup class="reference" data-dcnode-id="5907" id="cite_ref-245"><a data-dcnode-id="5908" href="#cite_note-245"><span data-dcnode-id="5909" instrument_node="">[242]</span></a></sup><span data-dcnode-id="5906" instrument_node=""> </span><sup class="reference" data-dcnode-id="5903" id="cite_ref-246"><a data-dcnode-id="5904" href="#cite_note-246"><span data-dcnode-id="5905" instrument_node="">[243]</span></a></sup><span data-dcnode-id="5902" instrument_node=""> and designating Facebook an "extremist" website. All of these sites have been used by Russians to voice their discontent with the government, and without it, a culture of fear has overcome the Russian population, who are terrified of Putin's police using violence against them and Putin's legal bureaucracy ruining their chances at future careers. </span><sup class="reference" data-dcnode-id="5899" id="cite_ref-247"><a data-dcnode-id="5900" href="#cite_note-247"><span data-dcnode-id="5901" instrument_node="">[244]</span></a></sup><span data-dcnode-id="5898" instrument_node=""> </span><sup class="reference" data-dcnode-id="5895" id="cite_ref-248"><a data-dcnode-id="5896" href="#cite_note-248"><span data-dcnode-id="5897" instrument_node="">[245]</span></a></sup><span data-dcnode-id="5894" instrument_node=""> </span><sup class="reference" data-dcnode-id="5891" id="cite_ref-249"><a data-dcnode-id="5892" href="#cite_note-249"><span data-dcnode-id="5893" instrument_node="">[246]</span></a></sup><span data-dcnode-id="5890" instrument_node=""> </span><sup class="reference" data-dcnode-id="5887" id="cite_ref-250"><a data-dcnode-id="5888" href="#cite_note-250"><span data-dcnode-id="5889" instrument_node="">[247]</span></a></sup><span data-dcnode-id="5886" instrument_node=""> </span><sup class="reference" data-dcnode-id="5883" id="cite_ref-251"><a data-dcnode-id="5884" href="#cite_note-251"><span data-dcnode-id="5885" instrument_node="">[248]</span></a></sup><span data-dcnode-id="5882" instrument_node="">
</span></p><p data-dcnode-id="5872"><span data-dcnode-id="5880" instrument_node="">Putin has turned Russia into a de facto </span><a class="mw-redirect" data-dcnode-id="5878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Totalitarian" title="Totalitarian"><span data-dcnode-id="5879" instrument_node="">totalitarian</span></a><span data-dcnode-id="5877" instrument_node=""> state due to his stubborn refusal to even allow Russians to simply voice their opinions, even when they're supportive of him. Analysts say Putin wants to control how people think and what they say because he's desperate to hold onto power, because he is paradoxically at his weakest and most vulnerable in his entire career.</span><sup class="reference" data-dcnode-id="5874" id="cite_ref-252"><a data-dcnode-id="5875" href="#cite_note-252"><span data-dcnode-id="5876" instrument_node="">[249]</span></a></sup><span data-dcnode-id="5873" instrument_node="">
</span></p><p data-dcnode-id="5833"><span data-dcnode-id="5871" instrument_node="">Here are a few examples of Putin's totalitarianism. Putin banned foreign correspondents from reporting on Russia during his war in Ukraine, which prevents the average Russian from seeing his war crimes taking place against their friends and families in Ukraine.</span><sup class="reference" data-dcnode-id="5868" id="cite_ref-253"><a data-dcnode-id="5869" href="#cite_note-253"><span data-dcnode-id="5870" instrument_node="">[250]</span></a></sup><span data-dcnode-id="5867" instrument_node=""> Gestures of solidarity with Ukraine were </span><i data-dcnode-id="5865"><span data-dcnode-id="5866" instrument_node="">de facto</span></i><span data-dcnode-id="5864" instrument_node=""> criminalized. Accounts of schoolchildren and their parents detained in police cells after laying flowers at the Ukrainian embassy suggest escalation to totalitarian levels of repression. Under these circumstances, demonstrations against the war are acts of tremendous courage. Russians who are outraged are increasingly finding themselves behind bars or out of the country entirely as </span><i data-dcnode-id="5862"><span data-dcnode-id="5863" instrument_node="">de facto</span></i><span data-dcnode-id="5861" instrument_node=""> exiles. </span><sup class="reference" data-dcnode-id="5858" id="cite_ref-254"><a data-dcnode-id="5859" href="#cite_note-254"><span data-dcnode-id="5860" instrument_node="">[251]</span></a></sup><span data-dcnode-id="5857" instrument_node=""> Russian twitter user was recording a Russian female protester, who held up an anti-war sign and immediately got arrested by Russian police. A second woman walked into frame, and right before she could even voice her opinion, police arrested her too.</span><sup class="reference" data-dcnode-id="5854" id="cite_ref-255"><a data-dcnode-id="5855" href="#cite_note-255"><span data-dcnode-id="5856" instrument_node="">[252]</span></a></sup><span data-dcnode-id="5853" instrument_node=""> </span><sup class="reference" data-dcnode-id="5850" id="cite_ref-256"><a data-dcnode-id="5851" href="#cite_note-256"><span data-dcnode-id="5852" instrument_node="">[253]</span></a></sup><span data-dcnode-id="5849" instrument_node=""> One Russian woman even said she supported Putin's invasion of Ukraine, and she was </span><i data-dcnode-id="5847"><span data-dcnode-id="5848" instrument_node="">still arrested</span></i><span data-dcnode-id="5846" instrument_node=""> by the police. </span><sup class="reference" data-dcnode-id="5843" id="cite_ref-257"><a data-dcnode-id="5844" href="#cite_note-257"><span data-dcnode-id="5845" instrument_node="">[254]</span></a></sup><span data-dcnode-id="5842" instrument_node=""> On YouTube, there is a Russia-based channel called 1420 that asks everyday Russians random questions for western audiences to gauge a bit on how normal Russians think about the world, and after the invasion of Ukraine, when asked how they felt about Putin, many of the Russians asked were visibly shaken and fearful of answering. </span><sup class="reference" data-dcnode-id="5839" id="cite_ref-258"><a data-dcnode-id="5840" href="#cite_note-258"><span data-dcnode-id="5841" instrument_node="">[255]</span></a></sup><span data-dcnode-id="5838" instrument_node=""> When that same channel and interviewer asked if they blamed the US, while some said yes, most preferred not to answer at all, showing that a climate of fear has overtaken the Russian population. </span><sup class="reference" data-dcnode-id="5835" id="cite_ref-259"><a data-dcnode-id="5836" href="#cite_note-259"><span data-dcnode-id="5837" instrument_node="">[256]</span></a></sup><span data-dcnode-id="5834" instrument_node="">
</span></p><p data-dcnode-id="5827"><span data-dcnode-id="5832" instrument_node="">Russian lawmakers passed a bill that officially charges anti-war protesters with up to 15 years of imprisonment. The bill claims to be targeting "fake news," which is literally anybody who opposes the government's views. One of the first to be charged was a food blogger named Veronika Belotserkovskaya, who joked that she was “officially declared a decent person” for opposing the war. Belotserkovskaya is friends with Ksenia Sobchak, the daughter of Putin’s political mentor Anatoly Sobchak.</span><sup class="reference" data-dcnode-id="5829" id="cite_ref-260"><a data-dcnode-id="5830" href="#cite_note-260"><span data-dcnode-id="5831" instrument_node="">[257]</span></a></sup><span data-dcnode-id="5828" instrument_node="">
</span></p><p data-dcnode-id="5821"><span data-dcnode-id="5826" instrument_node="">Despite all the speculation of his inevitable fall from power, realistically speaking, the chances of Putin being ousted in a coup or popular uprising are small precisely because Putin structured the Russian state to preempt any threats to his power. By arresting or killing leading dissidents, jailing oligarchs who oppose him, and ramping up repression at home against anti-war sentiment, Putin has instilled fear in the general public and made the country’s leadership class "dependent on his goodwill" for their continued prosperity. But as the Ukraine war drags on, and losses begin to mount, and peace talks continue to go nowhere, in the face of a near-economic depression from the war and the sanctions, it is no longer impossible to imagine Putin losing power before his death.</span><sup class="reference" data-dcnode-id="5823" id="cite_ref-261"><a data-dcnode-id="5824" href="#cite_note-261"><span data-dcnode-id="5825" instrument_node="">[258]</span></a></sup><span data-dcnode-id="5822" instrument_node="">
</span></p><p data-dcnode-id="5812"><span data-dcnode-id="5820" instrument_node="">Case in point, by mid-March 2022, </span><b data-dcnode-id="5818"><span data-dcnode-id="5819" instrument_node="">15,000</span></b><span data-dcnode-id="5817" instrument_node=""> protesters were arrested in Moscow and Saint Petersburg. </span><sup class="reference" data-dcnode-id="5814" id="cite_ref-262"><a data-dcnode-id="5815" href="#cite_note-262"><span data-dcnode-id="5816" instrument_node="">[259]</span></a></sup><span data-dcnode-id="5813" instrument_node="">
</span></p><span data-dcnode-id="5811" instrument_node="">
</span><h4 data-dcnode-id="5801"><span class="mw-headline" data-dcnode-id="5809" id="Scapegoating_his_officers"><span data-dcnode-id="5810" instrument_node="">Scapegoating his officers</span></span><span class="mw-editsection" data-dcnode-id="5802"><span class="mw-editsection-bracket" data-dcnode-id="5807"><span data-dcnode-id="5808" instrument_node="">[</span></span><a data-dcnode-id="5805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D31" title="Edit section: Scapegoating his officers"><span data-dcnode-id="5806" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5803"><span data-dcnode-id="5804" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5800" instrument_node="">
</span><p data-dcnode-id="5788"><span data-dcnode-id="5799" instrument_node="">Russia is a country essentially ruled by its </span><i data-dcnode-id="5797"><span data-dcnode-id="5798" instrument_node="">siloviki</span></i><span data-dcnode-id="5796" instrument_node="">, its security/military/intelligence cadres, particularly FSB officers and former KGB agents (like Putin himself). But by April 2022, over a month since he invaded Ukraine, Putin was so furious over the poor state of the military that he dismissed 150 FSB officers from their posts, and the head of the FSB department responsible for Ukraine was arrested and sent to prison. All of those ousted were employees of the Fifth Service, a division set up in 1998, when Putin was director of the FSB, to carry out operations in the countries of the former Soviet Union with the aim of keeping them within Russia’s orbit. Sergei Beseda, a former FSB chief, was arrested on "embezzlement," but in truth, Russian-based reporters believe Beseda was arrested for the botched invasion, which has been blamed on poor intelligence concerning the political situation in Ukraine. Putin sent Beseda to Lefortovo, a </span><i data-dcnode-id="5794"><span data-dcnode-id="5795" instrument_node="">Siberian</span></i><span data-dcnode-id="5793" instrument_node=""> jail, as a "very strong message" to Russian elites and Kremlin operatives.</span><sup class="reference" data-dcnode-id="5790" id="cite_ref-263"><a data-dcnode-id="5791" href="#cite_note-263"><span data-dcnode-id="5792" instrument_node="">[260]</span></a></sup><span data-dcnode-id="5789" instrument_node=""> But it must be made known: the only reason Russia invaded Ukraine was because Putin wanted it. Blaming other people for carrying out your orders is called "blaming others for your fuckups."
</span></p><span data-dcnode-id="5787" instrument_node="">
</span><h3 data-dcnode-id="5777"><span class="mw-headline" data-dcnode-id="5785" id="Quagmire:_A_mix_of_Iraq_and_Vietnam"><span data-dcnode-id="5786" instrument_node="">Quagmire: A mix of Iraq and Vietnam</span></span><span class="mw-editsection" data-dcnode-id="5778"><span class="mw-editsection-bracket" data-dcnode-id="5783"><span data-dcnode-id="5784" instrument_node="">[</span></span><a data-dcnode-id="5781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D32" title="Edit section: Quagmire: A mix of Iraq and Vietnam"><span data-dcnode-id="5782" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5779"><span data-dcnode-id="5780" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5776" instrument_node="">
</span><div class="hatnote" data-dcnode-id="5769" role="note"><span data-dcnode-id="5775" instrument_node="">See the main articles on this topic: </span><a data-dcnode-id="5773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Iraq_War" title="Iraq War"><span data-dcnode-id="5774" instrument_node="">Iraq War</span></a><span data-dcnode-id="5772" instrument_node="">&nbsp;and&nbsp;</span><a data-dcnode-id="5770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Vietnam_War" title="Vietnam War"><span data-dcnode-id="5771" instrument_node="">Vietnam War</span></a></div><span data-dcnode-id="5768" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5759"><div class="thumbinner" data-dcnode-id="5760" style="width:207px;"><a class="image" data-dcnode-id="5766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3AVictim_of_a_Russian_attack_in_Mariupol.jpg"><img alt="" class="thumbimage" data-dcnode-id="5767" height="273" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/47/Victim_of_a_Russian_attack_in_Mariupol.jpg/205px-Victim_of_a_Russian_attack_in_Mariupol.jpg&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/Victim_of_a_Russian_attack_in_Mariupol.jpg/308px-Victim_of_a_Russian_attack_in_Mariupol.jpg 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/Victim_of_a_Russian_attack_in_Mariupol.jpg/410px-Victim_of_a_Russian_attack_in_Mariupol.jpg 2x" width="205"></a><span data-dcnode-id="5765" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5761"><div class="magnify" data-dcnode-id="5763"><a class="internal" data-dcnode-id="5764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3AVictim_of_a_Russian_attack_in_Mariupol.jpg" title="Enlarge"></a></div><span data-dcnode-id="5762" instrument_node="">Dead victim of a Russian attack in Mariupol, Ukraine.</span></div></div></div><span data-dcnode-id="5758" instrument_node="">
</span><p data-dcnode-id="5735"><span data-dcnode-id="5757" instrument_node="">According to experts, Russia's plan was to do a decapitation strike on Ukraine's capitol, establish air dominance, destroy Ukrainian military communication, cut off Ukraine's eastern army, encircle Kyiv, kill President Zelenskyy, and prop up a pro-Kremlin </span><a class="mw-redirect" data-dcnode-id="5755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Puppet_state" title="Puppet state"><span data-dcnode-id="5756" instrument_node="">puppet government</span></a><span data-dcnode-id="5754" instrument_node="">, all of which Putin apparently expected to accomplish in less than </span><i data-dcnode-id="5752"><span data-dcnode-id="5753" instrument_node="">three days</span></i><span data-dcnode-id="5751" instrument_node="">, which he failed spectacularly to do.</span><sup class="reference" data-dcnode-id="5748" id="cite_ref-264"><a data-dcnode-id="5749" href="#cite_note-264"><span data-dcnode-id="5750" instrument_node="">[261]</span></a></sup><span data-dcnode-id="5747" instrument_node=""> This plan was confirmed as highly feasible by Putin's team of highly-skilled yes-men operating in a tightly-sealed </span><a data-dcnode-id="5745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Echo_chamber" title="Echo chamber"><span data-dcnode-id="5746" instrument_node="">echo chamber</span></a><span data-dcnode-id="5744" instrument_node="">.</span><sup class="reference" data-dcnode-id="5741" id="cite_ref-265"><a data-dcnode-id="5742" href="#cite_note-265"><span data-dcnode-id="5743" instrument_node="">[262]</span></a></sup><span data-dcnode-id="5740" instrument_node=""> He has done the very thing he never wanted to see: revitalizing Western unity, justifying NATO's existence, proving US intelligence right about his motives, and provoking Europe to militarize way beyond they ever wanted in response to his imperialism.</span><sup class="reference" data-dcnode-id="5737" id="cite_ref-266"><a data-dcnode-id="5738" href="#cite_note-266"><span data-dcnode-id="5739" instrument_node="">[263]</span></a></sup><span data-dcnode-id="5736" instrument_node="">
</span></p><p data-dcnode-id="5720"><span data-dcnode-id="5734" instrument_node="">Many military experts, journalists, political observers, and long-time analysts compared Russia's conduct in Ukraine to that of America in Iraq and Vietnam: a small country with both a conventional military and irregular military inflicting heavy losses against an overconfident, under-equipped, far-larger invading force. Russians were shocked at the strong and widespread resistance and defense by Ukrainians, who inflicted heavy losses on the Russians. By the fourth day of the invasion, Russia lost several thousand troops, many of whom were young conscripts still in their teens used as cannon fodder, and hundreds of Russian tanks and dozens of helicopters, fighters, armored personnel carriers, fuel tankers, and combat vehicles. By the fourth day, Russia kept getting repulsed from Kyiv, Kharkiv, and other such Ukrainian cities, although Russian advances in the south were far more successful. However, the overall picture is very disappointing for Russia, because they still could claim air superiority in Ukraine, and losing at least one thousand troops is a massive blow to Russian troop morale. Many captured Russian troops admitted they don't support the war either, don't understand why they're fighting Ukraine, or never knew they were about to invade until literally hours before the invasion began, with some even confessing that their superiors simply threw them into war without regard for the troops' own safety.</span><sup class="reference" data-dcnode-id="5731" id="cite_ref-267"><a data-dcnode-id="5732" href="#cite_note-267"><span data-dcnode-id="5733" instrument_node="">[264]</span></a></sup><sup class="reference" data-dcnode-id="5728" id="cite_ref-268"><a data-dcnode-id="5729" href="#cite_note-268"><span data-dcnode-id="5730" instrument_node="">[265]</span></a></sup><sup class="reference" data-dcnode-id="5725" id="cite_ref-269"><a data-dcnode-id="5726" href="#cite_note-269"><span data-dcnode-id="5727" instrument_node="">[266]</span></a></sup><sup class="reference" data-dcnode-id="5722" id="cite_ref-270"><a data-dcnode-id="5723" href="#cite_note-270"><span data-dcnode-id="5724" instrument_node="">[267]</span></a></sup><span data-dcnode-id="5721" instrument_node="">
</span></p><p data-dcnode-id="5714"><span data-dcnode-id="5719" instrument_node="">According to Sergey Markov, a longtime Kremlin propagandist and a frequent face on Kremlin state TV, Putin expected "30 to 50 percent of the Ukrainian Armed Forces would switch over to Russia's side," and conceded "No one is switching over." Demonstrably angry by all this, Putin has stepped up repression at home, refusing to even allow everyday Russians to see, with their own two eyes, exactly how horribly he's managed the war.</span><sup class="reference" data-dcnode-id="5716" id="cite_ref-271"><a data-dcnode-id="5717" href="#cite_note-271"><span data-dcnode-id="5718" instrument_node="">[268]</span></a></sup><span data-dcnode-id="5715" instrument_node="">
</span></p><p data-dcnode-id="5708"><span data-dcnode-id="5713" instrument_node="">Michael Kofman, director of Russia Studies at CNA and Senior Adjunct Fellow of CNAS, is a longtime Russian military analyst. Kofman's assessment of Russia's progress in Ukraine through the first week was that Moscow "badly miscalculated". He went on to say that Putin and the Kremlin more generally planned to reach Kyiv and force a surrender within a few days, so they tried to win "quickly and cheaply", expected a quick surrender by Ukraine, and thereby avoid their usual scorched-earth tactics because of political considerations and an unrealistic view of military logistics. While Kofman cautioned that the Russian military's greater manpower and firepower do portend success in the future, the Ukrainian resistance has been far stronger than Moscow expected, and many Russian soldiers simply do not support the war even as they wage it.</span><sup class="reference" data-dcnode-id="5710" id="cite_ref-272"><a data-dcnode-id="5711" href="#cite_note-272"><span data-dcnode-id="5712" instrument_node="">[269]</span></a></sup><span data-dcnode-id="5709" instrument_node="">
</span></p><p data-dcnode-id="5692"><span data-dcnode-id="5707" instrument_node="">Nicholas Laidlaw, a former US marine and military analyst, noted multiple Russian POW testimonies confirming that Russians are </span><i data-dcnode-id="5705"><span data-dcnode-id="5706" instrument_node="">not</span></i><span data-dcnode-id="5704" instrument_node=""> using digital communication, that's how bad their logistics were during the first week of the invasion. </span><sup class="reference" data-dcnode-id="5701" id="cite_ref-273"><a data-dcnode-id="5702" href="#cite_note-273"><span data-dcnode-id="5703" instrument_node="">[270]</span></a></sup><span data-dcnode-id="5700" instrument_node=""> This was backed up by Jack Detsch, a national security reporter with deep </span><a class="mw-redirect" data-dcnode-id="5698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Pentagon" title="Pentagon"><span data-dcnode-id="5699" instrument_node="">Pentagon</span></a><span data-dcnode-id="5697" instrument_node=""> ties and contacts, confirming that Russia has severe logistical problems, saying that Russian soldiers are "not only running out of fuel, they are running out of food."</span><sup class="reference" data-dcnode-id="5694" id="cite_ref-274"><a data-dcnode-id="5695" href="#cite_note-274"><span data-dcnode-id="5696" instrument_node="">[271]</span></a></sup><span data-dcnode-id="5693" instrument_node="">
</span></p><p data-dcnode-id="5676"><span data-dcnode-id="5691" instrument_node="">By the third week of the invasion, US intelligence and observers found </span><i data-dcnode-id="5689"><span data-dcnode-id="5690" instrument_node="">7000 Russian soldiers</span></i><span data-dcnode-id="5688" instrument_node=""> killed by Ukraine in </span><i data-dcnode-id="5686"><span data-dcnode-id="5687" instrument_node="">less than a month</span></i><span data-dcnode-id="5685" instrument_node="">, which is more than all of America's losses in the previous twenty years in the Middle East. US intelligence even says that's an under-count. </span><sup class="reference" data-dcnode-id="5682" id="cite_ref-275"><a data-dcnode-id="5683" href="#cite_note-275"><span data-dcnode-id="5684" instrument_node="">[272]</span></a></sup><span data-dcnode-id="5681" instrument_node=""> For reference, Americans only lost around 4000 soldiers in all of the Iraq War. </span><sup class="reference" data-dcnode-id="5678" id="cite_ref-276"><a data-dcnode-id="5679" href="#cite_note-276"><span data-dcnode-id="5680" instrument_node="">[273]</span></a></sup><span data-dcnode-id="5677" instrument_node="">
</span></p><span data-dcnode-id="5675" instrument_node="">
</span><h4 data-dcnode-id="5665"><span class="mw-headline" data-dcnode-id="5673" id=".22Everything_is_fucked.22"><span data-dcnode-id="5674" instrument_node="">"Everything is fucked"</span></span><span class="mw-editsection" data-dcnode-id="5666"><span class="mw-editsection-bracket" data-dcnode-id="5671"><span data-dcnode-id="5672" instrument_node="">[</span></span><a data-dcnode-id="5669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D33" title="Edit section: &quot;Everything is fucked&quot;"><span data-dcnode-id="5670" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5667"><span data-dcnode-id="5668" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5664" instrument_node="">
</span><p data-dcnode-id="5658"><span data-dcnode-id="5663" instrument_node="">According to an independent investigative Russian media outlet, Kremlin officials were reportedly "shocked" that Putin would invade Ukraine all the way up to Kyiv, and were in utter disbelief when news of the assault occurred. According to the independent outlet, Agency, the Kremlin was completely unprepared for just how harsh and punishing the sanctions were, specifically naming its ousting from SWIFT, the freezing of Russian foreign reserves, including by the US, and the exit of a string of Western companies from Russia, with an anonymous Kremlin source even saying "Everything is fucked." Another anonymous source to Agency said Kremlin officials cannot resign from their posts because it would be seen as a betrayal and Putin would throw them in jail.</span><sup class="reference" data-dcnode-id="5660" id="cite_ref-277"><a data-dcnode-id="5661" href="#cite_note-277"><span data-dcnode-id="5662" instrument_node="">[274]</span></a></sup><span data-dcnode-id="5659" instrument_node="">
</span></p><p data-dcnode-id="5645"><span data-dcnode-id="5657" instrument_node="">Putin was reportedly "furious" at the sanctions, and many within intelligence communities feared that Putin would lash out by ordering civilian deaths in Ukraine.</span><sup class="reference" data-dcnode-id="5654" id="cite_ref-278"><a data-dcnode-id="5655" href="#cite_note-278"><span data-dcnode-id="5656" instrument_node="">[275]</span></a></sup><span data-dcnode-id="5653" instrument_node=""> By March 1</span><sup data-dcnode-id="5651"><span data-dcnode-id="5652" instrument_node="">st</span></sup><span data-dcnode-id="5650" instrument_node="">, Putin in fact switched strategies, preferring "more brutal, tactless, unrestricted warfare," which will "lead to many more civilian casualties and bloodier battle," as shown in a massive convoy of Russian tanks and other combat vehicles amassed near Kyiv.</span><sup class="reference" data-dcnode-id="5647" id="cite_ref-279"><a data-dcnode-id="5648" href="#cite_note-279"><span data-dcnode-id="5649" instrument_node="">[276]</span></a></sup><span data-dcnode-id="5646" instrument_node="">
</span></p><p data-dcnode-id="5639"><span data-dcnode-id="5644" instrument_node="">A grand total of three Russian commanders were killed by Ukrainians by March 2022, which is unusual because that means Russian officers are on the front lines getting killed, which has led to a drop in morale for their troops in their respective columns.</span><sup class="reference" data-dcnode-id="5641" id="cite_ref-280"><a data-dcnode-id="5642" href="#cite_note-280"><span data-dcnode-id="5643" instrument_node="">[277]</span></a></sup><span data-dcnode-id="5640" instrument_node="">
</span></p><p data-dcnode-id="5629"><span data-dcnode-id="5638" instrument_node="">Putin has reportedly conducted a "purge" of his military and intelligence officers, putting several top security commanders under house arrest "due to their failures in Ukraine." This includes the FSB's foreign intelligence branch, Sergey Beseda, and his deputy Anatoly Bolyukh, for "unreliable, incomplete and partially false information about the political situation in Ukraine.” At least eight generals were also replaced by Putin in response to the growing debacle in Ukraine. </span><sup class="reference" data-dcnode-id="5635" id="cite_ref-281"><a data-dcnode-id="5636" href="#cite_note-281"><span data-dcnode-id="5637" instrument_node="">[278]</span></a></sup><span data-dcnode-id="5634" instrument_node=""> </span><sup class="reference" data-dcnode-id="5631" id="cite_ref-282"><a data-dcnode-id="5632" href="#cite_note-282"><span data-dcnode-id="5633" instrument_node="">[279]</span></a></sup><span data-dcnode-id="5630" instrument_node="">
</span></p><span data-dcnode-id="5628" instrument_node="">
</span><h4 data-dcnode-id="5618"><span class="mw-headline" data-dcnode-id="5626" id="War_crimes.2C_civilian_deaths.2C_and_unreasonable_ceasefire_demands"><span data-dcnode-id="5627" instrument_node="">War crimes, civilian deaths, and unreasonable ceasefire demands</span></span><span class="mw-editsection" data-dcnode-id="5619"><span class="mw-editsection-bracket" data-dcnode-id="5624"><span data-dcnode-id="5625" instrument_node="">[</span></span><a data-dcnode-id="5622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D34" title="Edit section: War crimes, civilian deaths, and unreasonable ceasefire demands"><span data-dcnode-id="5623" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5620"><span data-dcnode-id="5621" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5617" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5608"><div class="thumbinner" data-dcnode-id="5609" style="width:227px;"><a class="image" data-dcnode-id="5615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3AShelled_City.jpeg"><img alt="" class="thumbimage" data-dcnode-id="5616" height="127" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/images/thumb/1/1f/Shelled_City.jpeg/225px-Shelled_City.jpeg&amp;raw" srcset="/w/images/thumb/1/1f/Shelled_City.jpeg/338px-Shelled_City.jpeg 1.5x, /w/images/thumb/1/1f/Shelled_City.jpeg/450px-Shelled_City.jpeg 2x" width="225"></a><span data-dcnode-id="5614" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5610"><div class="magnify" data-dcnode-id="5612"><a class="internal" data-dcnode-id="5613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3AShelled_City.jpeg" title="Enlarge"></a></div><span data-dcnode-id="5611" instrument_node="">Ruined Ukrainian city shelled by the Russian military.</span></div></div></div><span data-dcnode-id="5607" instrument_node="">
</span><p data-dcnode-id="5601"><span data-dcnode-id="5606" instrument_node="">According to ABC News' Moscow reporter, Patrick Reevell, Putin's demands for ending the war are hilariously bonkers: Ukraine must change its constitution to ensure it never joins NATO or the EU, must recognize Crimea as part of Russia, and must recognize Donbas as independent breakaway republics. </span><sup class="reference" data-dcnode-id="5603" id="cite_ref-283"><a data-dcnode-id="5604" href="#cite_note-283"><span data-dcnode-id="5605" instrument_node="">[280]</span></a></sup><span data-dcnode-id="5602" instrument_node=""> This comes as Putin stubbornly refuses to budge from his intent to "invade, occupy and make Ukraine part of Russia, and erase the name Ukraine and replace it with Russia." Russian forces, nearly two weeks into the invasion, made significant advances in southern Ukraine and along the coast, but "many of its efforts have become stalled, including an immense military convoy that has been almost motionless for days north of Kyiv." 
</span></p><p data-dcnode-id="5591"><span data-dcnode-id="5600" instrument_node="">Russia's military, though superior, has been dogged by logistical challenges, including food and fuel shortages, and a "lack of cohesion and discipline." As predicted, once logistics became a real problem for the Kremlin's military, Russian forces began shelling civilian areas within multiple cities, including Kyiv and Kharkiv, while cutting off whole cities' populations from food, water, and electricity, a siege tactic already tried in both Aleppo, Syria and Grozny, Chechnya. Numerous attempts at ceasefires for humanitarian corridors were violated by Russia shelling families trying to flee the violence. With all of that, Putin still has the gall to demand that the invasion could end "only if Kyiv ceases hostilities." </span><sup class="reference" data-dcnode-id="5597" id="cite_ref-284"><a data-dcnode-id="5598" href="#cite_note-284"><span data-dcnode-id="5599" instrument_node="">[281]</span></a></sup><span data-dcnode-id="5596" instrument_node=""> </span><sup class="reference" data-dcnode-id="5593" id="cite_ref-285"><a data-dcnode-id="5594" href="#cite_note-285"><span data-dcnode-id="5595" instrument_node="">[282]</span></a></sup><span data-dcnode-id="5592" instrument_node="">
</span></p><p data-dcnode-id="5553"><span data-dcnode-id="5590" instrument_node="">Ukrainian mayor of Melitopol, Ivan Fedorov, was kidnapped by Russian soldiers who put a bag over his head and rushed him out of a building, which was caught on camera. </span><sup class="reference" data-dcnode-id="5587" id="cite_ref-286"><a data-dcnode-id="5588" href="#cite_note-286"><span data-dcnode-id="5589" instrument_node="">[283]</span></a></sup><span data-dcnode-id="5586" instrument_node=""> </span><sup class="reference" data-dcnode-id="5583" id="cite_ref-287"><a data-dcnode-id="5584" href="#cite_note-287"><span data-dcnode-id="5585" instrument_node="">[284]</span></a></sup><span data-dcnode-id="5582" instrument_node=""> </span><sup class="reference" data-dcnode-id="5579" id="cite_ref-288"><a data-dcnode-id="5580" href="#cite_note-288"><span data-dcnode-id="5581" instrument_node="">[285]</span></a></sup><span data-dcnode-id="5578" instrument_node=""> Disturbingly, as Fedorov was kidnapped, Galina Danilchenko, a former city council member, was installed as the pro-Russian mayor of Melitopol, and she called on Ukrainians in her city to "adapt" to the occupation, trying to keep them from resisting. </span><sup class="reference" data-dcnode-id="5575" id="cite_ref-289"><a data-dcnode-id="5576" href="#cite_note-289"><span data-dcnode-id="5577" instrument_node="">[286]</span></a></sup><span data-dcnode-id="5574" instrument_node=""> Fedorov, a 33-year old politician, urged Ukrainians to "defy" the Russian "occupiers," completely blindsiding the Russians who expected to be greeted as liberators. His disappearance only served to inspire more civil disobedience against the Russians. </span><sup class="reference" data-dcnode-id="5571" id="cite_ref-290"><a data-dcnode-id="5572" href="#cite_note-290"><span data-dcnode-id="5573" instrument_node="">[287]</span></a></sup><span data-dcnode-id="5570" instrument_node=""> Thankfully, Zelenskyy announced that an operation to rescue Fedorov succeeded, and in exchanging for releasing nearly a dozen Russian POWs,</span><sup class="reference" data-dcnode-id="5567" id="cite_ref-291"><a data-dcnode-id="5568" href="#cite_note-291"><span data-dcnode-id="5569" instrument_node="">[288]</span></a></sup><span data-dcnode-id="5566" instrument_node=""> Fedorov would return to his duties as mayor of Melitopol. </span><sup class="reference" data-dcnode-id="5563" id="cite_ref-292"><a data-dcnode-id="5564" href="#cite_note-292"><span data-dcnode-id="5565" instrument_node="">[289]</span></a></sup><span data-dcnode-id="5562" instrument_node=""> </span><sup class="reference" data-dcnode-id="5559" id="cite_ref-293"><a data-dcnode-id="5560" href="#cite_note-293"><span data-dcnode-id="5561" instrument_node="">[290]</span></a></sup><span data-dcnode-id="5558" instrument_node=""> </span><sup class="reference" data-dcnode-id="5555" id="cite_ref-294"><a data-dcnode-id="5556" href="#cite_note-294"><span data-dcnode-id="5557" instrument_node="">[291]</span></a></sup><span data-dcnode-id="5554" instrument_node="">
</span></p><p data-dcnode-id="5547"><span data-dcnode-id="5552" instrument_node="">The Kremlin, to nobody's surprise, claims they have not committed war crimes and they only strike military targets. Vitaly Klitschko, mayor of Kyiv, said "Bullshit," pointed to a ruined residential building, and asked "Where is the military target? Is this building a military target?" </span><sup class="reference" data-dcnode-id="5549" id="cite_ref-295"><a data-dcnode-id="5550" href="#cite_note-295"><span data-dcnode-id="5551" instrument_node="">[292]</span></a></sup><span data-dcnode-id="5548" instrument_node="">
</span></p><span data-dcnode-id="5546" instrument_node="">
</span><h4 data-dcnode-id="5536"><span class="mw-headline" data-dcnode-id="5544" id="Bucha_massacre.2C_animal_cruelty.2C_and_allegations_of_genocide"><span data-dcnode-id="5545" instrument_node="">Bucha massacre, animal cruelty, and allegations of genocide</span></span><span class="mw-editsection" data-dcnode-id="5537"><span class="mw-editsection-bracket" data-dcnode-id="5542"><span data-dcnode-id="5543" instrument_node="">[</span></span><a data-dcnode-id="5540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D35" title="Edit section: Bucha massacre, animal cruelty, and allegations of genocide"><span data-dcnode-id="5541" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5538"><span data-dcnode-id="5539" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5535" instrument_node="">
</span><p data-dcnode-id="5506"><span data-dcnode-id="5534" instrument_node="">After Ukrainian soldiers won the Battle of Kyiv and pushed the Russians out of Kyiv Oblast, they discovered a sight so grisly, it looked like something out of a 20th century documentary. Civilians had their hands tied behind their backs and holes in their heads, execution-style. Dead Ukrainians were put in makeshift mass graves underneath snow. Some were even thrown inside a sewer. Several naked women, who were also tied up, had their dead bodies found in a highway. Bodies were left uncovered in full public view. Some had their bodies mangled so badly, they were likely run over by Russian tanks. Some had the types of wounds you'd expect from people who were tortured to death. President Zelenskyy claimed these killings were </span><a data-dcnode-id="5532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Genocide" title="Genocide"><span data-dcnode-id="5533" instrument_node="">genocidal</span></a><span data-dcnode-id="5531" instrument_node="">. Multiple volunteers were killed for trying to feed starving animals. Russian soldiers also allegedly put Ukrainian children on their tanks as human shields. According to Ukrainian officials, around 300 people were killed in these ways.But the Kremlin refuses to acknowledge Russian involvement in the massacre, with Lavrov even claiming it was a "fake attack" and a "provocation." The New York Times published satellite imagery showing evidence that the dead bodies were there for weeks, when the Russians occupied Bucha, which directly proves Lavrov wrong. </span><sup class="reference" data-dcnode-id="5528" id="cite_ref-296"><a data-dcnode-id="5529" href="#cite_note-296"><span data-dcnode-id="5530" instrument_node="">[293]</span></a></sup><span data-dcnode-id="5527" instrument_node=""> </span><sup class="reference" data-dcnode-id="5524" id="cite_ref-297"><a data-dcnode-id="5525" href="#cite_note-297"><span data-dcnode-id="5526" instrument_node="">[294]</span></a></sup><span data-dcnode-id="5523" instrument_node=""> </span><sup class="reference" data-dcnode-id="5520" id="cite_ref-298"><a data-dcnode-id="5521" href="#cite_note-298"><span data-dcnode-id="5522" instrument_node="">[295]</span></a></sup><span data-dcnode-id="5519" instrument_node=""> </span><sup class="reference" data-dcnode-id="5516" id="cite_ref-299"><a data-dcnode-id="5517" href="#cite_note-299"><span data-dcnode-id="5518" instrument_node="">[296]</span></a></sup><span data-dcnode-id="5515" instrument_node=""> </span><sup class="reference" data-dcnode-id="5512" id="cite_ref-300"><a data-dcnode-id="5513" href="#cite_note-300"><span data-dcnode-id="5514" instrument_node="">[297]</span></a></sup><span data-dcnode-id="5511" instrument_node=""> </span><sup class="reference" data-dcnode-id="5508" id="cite_ref-301"><a data-dcnode-id="5509" href="#cite_note-301"><span data-dcnode-id="5510" instrument_node="">[298]</span></a></sup><span data-dcnode-id="5507" instrument_node="">
</span></p><p data-dcnode-id="5490"><span data-dcnode-id="5505" instrument_node="">The charges of </span><a data-dcnode-id="5503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Genocide" title="Genocide"><span data-dcnode-id="5504" instrument_node="">genocide</span></a><span data-dcnode-id="5502" instrument_node="">, while extraordinary, gained steam after a Russian state propaganda outlet, RIA Novosti, published an article titled "What Russia Must Do With Ukraine." For context, RIA stands for "Russian Information Agency," or "Rossiyskoye Informatsionnoye Agentstvo" in Russian, and </span><a data-dcnode-id="5500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/RT" title="RT"><span data-dcnode-id="5501" instrument_node="">RT</span></a><span data-dcnode-id="5499" instrument_node=""> is one of its subsidiaries. RIA Novosti is the most important modern-day Russian state propaganda network. The writer of the article explains what they think Russia "must" do to Ukraine, which is that their "elite" class must be "liquidated, they cannot be re-educated" because "Ukraine must pay for its guilt towards Russia." The RIA Novosti article says Ukraine "must be treated as an enemy, and therefore may develop only in dependency to Russia." That means, as explicitly stated by RIA Novosti, Ukraine must not have a "Marshall Plan" or neutrality in any way, either ideologically or practically. RIA Novosti's article claims that any time Ukraine becomes independent, it inevitably becomes an enemy of Russia, and so RIA Novosti asserts that "Ukraine may not exist as a national state" because "any attempt to create it leads to Nazism." It agrees with Putin's assertion that "Ukraine is an artificial anti-Russian construct," saying "De-Nazification is not enough" unless it includes the complete destruction of the Ukrainian nation, which they call "De-Ukrainization." </span><sup class="reference" data-dcnode-id="5496" id="cite_ref-302"><a data-dcnode-id="5497" href="#cite_note-302"><span data-dcnode-id="5498" instrument_node="">[299]</span></a></sup><span data-dcnode-id="5495" instrument_node=""> </span><sup class="reference" data-dcnode-id="5492" id="cite_ref-303"><a data-dcnode-id="5493" href="#cite_note-303"><span data-dcnode-id="5494" instrument_node="">[300]</span></a></sup><span data-dcnode-id="5491" instrument_node="">
</span></p><p data-dcnode-id="5484"><span data-dcnode-id="5489" instrument_node="">It doesn't stop there either. The utterly batshit RIA Novosti article lays out, in detail, the Kremlin's plans for Ukraine, and in a word, it's annihilation. It says Russia should establish an "exclusion line" where "the haters of Russia will go" to "forcibly neutral and demilitarized Ukraine will remain." It plans to divide the country between eastern and western lines, where the east will be occupied by Russian forces for at least a generation, outright saying "permanent De-Nazification institutions" will be there "for a period of 25 years." Any armed formations arrayed against Russia in Ukraine, including the Armed Forces of Ukraine must face "elimination, as well as "the military, informational, and educational infrastructure that ensures their activity." It says all "liberated" territories must establish "people’s self-government institutions and militia (defense and law enforcement)" to protect ethnic Russians from anyone the Kremlin calls a Nazi. It advocates for the seizure of "educational materials" and the "prohibition of educational programs at all levels that contain Nazi ideological guidelines," meaning anything even approaching Ukrainian nationalism, resistance, and independence, or liberation rhetoric against the occupation, is now a threat to the Kremlin. Mass investigations aimed to "establish personal responsibility for war crimes, crimes against humanity, the spread of Nazi ideology, and support for the Nazi regime" would be established as show trials against anyone who dared to resist the Russian invasion. The article even says outright that "making the names of accomplices" of the Kyiv government should be made public, and as a punishment, they would be put in "forced labor" to "restore the destroyed infrastructure as punishment for Nazi activities (from among those who have not become subject to the death penalty or imprisonment)." It also says that, "under the supervision of Russia," there will be a "ban on all types and forms of the revival of Nazi ideology," which again means Ukrainian nationalism as a whole, not merely its far-right excesses. This level of "De-Ukrainization" will require Russia to "finally part with pro-European and pro-Western illusions" so they can "free" Ukraine from "intoxication, temptation, and dependence of the so-called European choice." </span><sup class="reference" data-dcnode-id="5486" id="cite_ref-304"><a data-dcnode-id="5487" href="#cite_note-304"><span data-dcnode-id="5488" instrument_node="">[301]</span></a></sup><span data-dcnode-id="5485" instrument_node="">
</span></p><p data-dcnode-id="5474"><span data-dcnode-id="5483" instrument_node="">This is not helped by reports of Russian soldiers deliberately destroying libraries and books on history of Ukraine, Ukrainian independence, and on Ukrainian national resistance. All Ukrainian-language books have been hunted, burned, torn apart, or otherwise stolen in the Chernihiv, Sumy, Donetsk and Luhansk regions. </span><sup class="reference" data-dcnode-id="5480" id="cite_ref-305"><a data-dcnode-id="5481" href="#cite_note-305"><span data-dcnode-id="5482" instrument_node="">[302]</span></a></sup><span data-dcnode-id="5479" instrument_node=""> There was even eyewitness videos taken by Ukrainians showing people's dead dogs put in piles. You don't systematically kill people's pets unless you want to systematically kill the people.</span><sup class="reference" data-dcnode-id="5476" id="cite_ref-306"><a data-dcnode-id="5477" href="#cite_note-306"><span data-dcnode-id="5478" instrument_node="">[303]</span></a></sup><span data-dcnode-id="5475" instrument_node="">
</span></p><p data-dcnode-id="5468"><span data-dcnode-id="5473" instrument_node="">Animal cruelty has been weaponized by the Kremlin against Ukraine. It is now a method of terror and yet another act of wanton brutality. In Chernihiv, to the east of Kyiv, Russian soldiers "executed dozens of cows and calves, shooting them in their throats and eyes at point-blank range and even beheading some, leaving the heads in a pile. Residents described the killings as violence for its own sake." </span><sup class="reference" data-dcnode-id="5470" id="cite_ref-307"><a data-dcnode-id="5471" href="#cite_note-307"><span data-dcnode-id="5472" instrument_node="">[304]</span></a></sup><span data-dcnode-id="5469" instrument_node="">
</span></p><p data-dcnode-id="5459"><span data-dcnode-id="5467" instrument_node="">The soldiers accused of carrying out the Bucha massacre are reportedly the 64th Separate Guards Motor Rifle Brigade. Putin signed a letter </span><i data-dcnode-id="5465"><span data-dcnode-id="5466" instrument_node="">congratulating</span></i><span data-dcnode-id="5464" instrument_node=""> the unit for “protecting Russia's sovereignty," saying these soldiers acted with “great heroism and courage” in murdering unarmed civilians. He even bestowed them with an honorary title, calling the unit "a role model in fulfilling its military duty, valour, dedication and professionalism."</span><sup class="reference" data-dcnode-id="5461" id="cite_ref-308"><a data-dcnode-id="5462" href="#cite_note-308"><span data-dcnode-id="5463" instrument_node="">[305]</span></a></sup><span data-dcnode-id="5460" instrument_node="">
</span></p><span data-dcnode-id="5458" instrument_node="">
</span><h3 data-dcnode-id="5448"><span class="mw-headline" data-dcnode-id="5456" id="Oil_and_Gas"><span data-dcnode-id="5457" instrument_node="">Oil and Gas</span></span><span class="mw-editsection" data-dcnode-id="5449"><span class="mw-editsection-bracket" data-dcnode-id="5454"><span data-dcnode-id="5455" instrument_node="">[</span></span><a data-dcnode-id="5452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D36" title="Edit section: Oil and Gas"><span data-dcnode-id="5453" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5450"><span data-dcnode-id="5451" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5447" instrument_node="">
</span><div class="floatright" data-dcnode-id="5444"><a class="image" data-dcnode-id="5445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3ABlack_Sea_Oil_and_Gas.png" title="The Black Sea's oil and gas fields."><img alt="The Black Sea's oil and gas fields." data-dcnode-id="5446" height="227" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/images/thumb/9/9c/Black_Sea_Oil_and_Gas.png/325px-Black_Sea_Oil_and_Gas.png&amp;raw" srcset="/w/images/thumb/9/9c/Black_Sea_Oil_and_Gas.png/488px-Black_Sea_Oil_and_Gas.png 1.5x, /w/images/thumb/9/9c/Black_Sea_Oil_and_Gas.png/650px-Black_Sea_Oil_and_Gas.png 2x" width="325"></a></div><span data-dcnode-id="5443" instrument_node="">
</span><p data-dcnode-id="5427"><span data-dcnode-id="5442" instrument_node="">In 2012, it was discovered that Ukraine’s deep territorial waters may contain "more than 2 trillion cubic meters of gas", which is about 40% of all Ukrainian energy resources. This would have turned Ukraine into a major gas and oil trading power, rivaling that of Russia. Once Ukraine kicked out their pro-Russian president, Viktor Yanukovych, Russia sent troops to seize and annex Crimea in 2014, giving Russia control of 80% of Ukraine's offshore oil and gas deposits in the Black Sea. Most of Ukraine's territorial waters came under Russian control with Crimea's annexation, which meant two-thirds of all that untapped natural gas is now under the Kremlin's management.</span><sup class="reference" data-dcnode-id="5439" id="cite_ref-309"><a data-dcnode-id="5440" href="#cite_note-309"><span data-dcnode-id="5441" instrument_node="">[306]</span></a></sup><sup class="reference" data-dcnode-id="5436" id="cite_ref-310"><a data-dcnode-id="5437" href="#cite_note-310"><span data-dcnode-id="5438" instrument_node="">[307]</span></a></sup><span data-dcnode-id="5435" instrument_node=""> There was talk of Crimea nationalizing oil and gas assets within its borders belonging to Ukraine, and selling them off to Russia. By May 2014, Putin was keenly interested in "acquiring rights to underwater resources potentially worth trillions of dollars", but both Ukraine and Russia have found it difficult to tap into all that untouched natural gas.</span><sup class="reference" data-dcnode-id="5432" id="cite_ref-311"><a data-dcnode-id="5433" href="#cite_note-311"><span data-dcnode-id="5434" instrument_node="">[308]</span></a></sup><sup class="reference" data-dcnode-id="5429" id="cite_ref-312"><a data-dcnode-id="5430" href="#cite_note-312"><span data-dcnode-id="5431" instrument_node="">[309]</span></a></sup><span data-dcnode-id="5428" instrument_node="">
</span></p><p data-dcnode-id="5414"><span data-dcnode-id="5426" instrument_node="">Europe's dependence on Russian oil and gas caused America to try to redirect energy supplies to Europe in light of the Ukraine invasion. As a leading producer of </span><a class="mw-redirect" data-dcnode-id="5424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Fossil_fuels" title="Fossil fuels"><span data-dcnode-id="5425" instrument_node="">fossil fuels</span></a><span data-dcnode-id="5423" instrument_node="">, Russia used energy revenue to accumulate some $630 billion in foreign exchange reserves. Russia used to rely on Ukraine to transport oil and gas through Europe, and network of Soviet-era pipelines crisscrossing Ukraine and other Eastern European countries. Moscow has sought to build new pipelines, including the controversial NordStream 1 and 2 through the Baltic Sea to Germany, to bypass its older networks and curb its reliance on Ukraine. It has also approved a new gas pipeline to China, though its sales there would still be a fraction of its European sales. Russia supplies about one-third of European natural gas consumption, used for winter heating as well as electricity generation and industrial production. The European Union also turns to Russia for more than one-quarter of its crude oil imports, the bloc’s largest single energy source.</span><sup class="reference" data-dcnode-id="5420" id="cite_ref-313"><a data-dcnode-id="5421" href="#cite_note-313"><span data-dcnode-id="5422" instrument_node="">[310]</span></a></sup><span data-dcnode-id="5419" instrument_node=""> The energy angle is very important, because if it still had control of the Black Sea, Ukraine would have challenged and potentially surpassed Russia's money pot from fossil fuels. Crimean annexation explicitly ended that possibility for the foreseeable future.</span><sup class="reference" data-dcnode-id="5416" id="cite_ref-314"><a data-dcnode-id="5417" href="#cite_note-314"><span data-dcnode-id="5418" instrument_node="">[311]</span></a></sup><span data-dcnode-id="5415" instrument_node="">
</span></p><span data-dcnode-id="5413" instrument_node="">
</span><h2 data-dcnode-id="5403"><span class="mw-headline" data-dcnode-id="5411" id="See_also"><span data-dcnode-id="5412" instrument_node="">See also</span></span><span class="mw-editsection" data-dcnode-id="5404"><span class="mw-editsection-bracket" data-dcnode-id="5409"><span data-dcnode-id="5410" instrument_node="">[</span></span><a data-dcnode-id="5407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D37" title="Edit section: See also"><span data-dcnode-id="5408" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5405"><span data-dcnode-id="5406" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5402" instrument_node="">
</span><ul data-dcnode-id="5265"><li data-dcnode-id="5398"><a data-dcnode-id="5400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/South_Ossetia" title="South Ossetia"><span data-dcnode-id="5401" instrument_node="">South Ossetia</span></a><span data-dcnode-id="5399" instrument_node=""> - A puppet state carved out by Russia in the early day's of Georgia's independence. Like Russia, they have a poor human rights record.</span></li><span data-dcnode-id="5397" instrument_node="">
</span><li data-dcnode-id="5393"><a data-dcnode-id="5395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Ukraine" title="Ukraine"><span data-dcnode-id="5396" instrument_node="">Ukraine</span></a><span data-dcnode-id="5394" instrument_node="">, which he invaded twice, first to annex Crimea in 2014, then to attack the entire country in 2022.</span></li><span data-dcnode-id="5392" instrument_node="">
</span><li data-dcnode-id="5388"><a data-dcnode-id="5390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Georgia_%28country%29" title="Georgia (country)"><span data-dcnode-id="5391" instrument_node="">Georgia (country)</span></a><span data-dcnode-id="5389" instrument_node="">, which he also invaded back in 2008, recognizing the separatist Abkhazia and South Ossetia regions as breakaway puppet states against Georgian president Mikheil Saakashvili. </span></li><span data-dcnode-id="5387" instrument_node="">
</span><li data-dcnode-id="5380"><a class="mw-redirect" data-dcnode-id="5385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Chechnya" title="Chechnya"><span data-dcnode-id="5386" instrument_node="">Chechnya</span></a><span data-dcnode-id="5384" instrument_node=""> - Winning the Second Chechen War is how Putin even came to power to begin with, as </span><a data-dcnode-id="5382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Boris_Yeltsin" title="Boris Yeltsin"><span data-dcnode-id="5383" instrument_node="">Boris Yeltsin</span></a><span data-dcnode-id="5381" instrument_node="">'s failures in the First Chechen War contributed to a feeling of national humiliation felt by the Russian people in the 1990s. </span></li><span data-dcnode-id="5379" instrument_node="">
</span><li data-dcnode-id="5375"><a data-dcnode-id="5377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Boris_Yeltsin" title="Boris Yeltsin"><span data-dcnode-id="5378" instrument_node="">Boris Yeltsin</span></a><span data-dcnode-id="5376" instrument_node=""> - Putin's predecessor, and the man who chose him to be Prime Minister, second in line to the presidency. When Yeltsin resigned a day before the turn of the millennium, Putin became Acting President in the midst of the Chechen crisis, he took a hard line against the Chechens, won the 2000 election, and the rest is history. So in many ways, you can legit blame Yeltsin for even allowing Putin to rise to power to begin with.</span></li><span data-dcnode-id="5374" instrument_node="">
</span><li data-dcnode-id="5370"><a data-dcnode-id="5372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Ramzan_Kadyrov" title="Ramzan Kadyrov"><span data-dcnode-id="5373" instrument_node="">Ramzan Kadyrov</span></a><span data-dcnode-id="5371" instrument_node=""> - The dictator of Chechnya, who in many ways is Putin on steroids. He keeps things stable in Chechnya, and no matter how brutal he is, Putin and the Kremlin can't afford to upset him because he can easily ignite a Third Chechen War at any time.</span></li><span data-dcnode-id="5369" instrument_node="">
</span><li data-dcnode-id="5362"><a data-dcnode-id="5367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Bashar_al-Assad" title="Bashar al-Assad"><span data-dcnode-id="5368" instrument_node="">Bashar al-Assad</span></a><span data-dcnode-id="5366" instrument_node=""> - His </span><s data-dcnode-id="5364"><span data-dcnode-id="5365" instrument_node="">little lapdog</span></s><span data-dcnode-id="5363" instrument_node=""> close ally in the Middle East</span></li><span data-dcnode-id="5361" instrument_node="">
</span><li data-dcnode-id="5354"><a data-dcnode-id="5359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Recep_Tayyip_Erdo%25C4%259Fan" title="Recep Tayyip Erdoğan"><span data-dcnode-id="5360" instrument_node="">Recep Tayyip Erdoğan</span></a><span data-dcnode-id="5358" instrument_node=""> — Take all of the above and ram it up to eleven, and you got yourself a constitutionally-enshrined dictator, not just an autocrat with authoritarian leanings like his colleagues. Along with Putin and </span><a data-dcnode-id="5356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Viktor_Orb%25C3%25A1n" title="Viktor Orbán"><span data-dcnode-id="5357" instrument_node="">Orbán</span></a><span data-dcnode-id="5355" instrument_node="">, these three are the most dangerous men in Europe; Erdoğan for his rivalry with the Kurds, Orbán for his denial of refugees during the migrant crisis, and Putin for his Ukraine escapades. But unlike Putin, Erdogan and Orbán just don't have the ability to do anything but put their countries in rewind mode.</span></li><span data-dcnode-id="5353" instrument_node="">
</span><li data-dcnode-id="5349"><a data-dcnode-id="5351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Viktor_Orb%25C3%25A1n" title="Viktor Orbán"><span data-dcnode-id="5352" instrument_node="">Viktor Orbán</span></a><span data-dcnode-id="5350" instrument_node=""> - Another reactionary who took over the media, twisted electoral law into his favor to stay in power (even changing the constitution to that end), uses anti-liberal and anti-democratic language to drum up intense populist fervor, and rages against the west as a bogeyman while inflaming ethnic tensions whenever politically convenient.</span></li><span data-dcnode-id="5348" instrument_node="">
</span><li data-dcnode-id="5317"><a data-dcnode-id="5346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/RT" title="RT"><span data-dcnode-id="5347" instrument_node="">RT</span></a><span data-dcnode-id="5345" instrument_node=""> — If you're looking for op-eds, RT isn't all bad. They've got </span><a class="mw-redirect" data-dcnode-id="5343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Ed_Schultz" title="Ed Schultz"><span data-dcnode-id="5344" instrument_node="">Ed Schultz</span></a><span data-dcnode-id="5342" instrument_node="">, </span><a data-dcnode-id="5340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Thom_Hartmann" title="Thom Hartmann"><span data-dcnode-id="5341" instrument_node="">Thom Hartmann</span></a><span data-dcnode-id="5339" instrument_node="">, Chris Hedges, anarcho-syndicalist </span><a data-dcnode-id="5337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Noam_Chomsky" title="Noam Chomsky"><span data-dcnode-id="5338" instrument_node="">Noam Chomsky</span></a><span data-dcnode-id="5336" instrument_node="">, Patrick Cockburn, </span><a data-dcnode-id="5334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Alex_Salmond" title="Alex Salmond"><span data-dcnode-id="5335" instrument_node="">Alex Salmond</span></a><span data-dcnode-id="5333" instrument_node="">, and </span><a data-dcnode-id="5331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Julian_Assange" title="Julian Assange"><span data-dcnode-id="5332" instrument_node="">Julian Assange</span></a><span data-dcnode-id="5330" instrument_node="">, nearly all of whom supported </span><a data-dcnode-id="5328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Hillary_Clinton" title="Hillary Clinton"><span data-dcnode-id="5329" instrument_node="">Hillary Clinton</span></a><span data-dcnode-id="5327" instrument_node=""> and </span><a data-dcnode-id="5325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Bernie_Sanders" title="Bernie Sanders"><span data-dcnode-id="5326" instrument_node="">Bernie Sanders</span></a><span data-dcnode-id="5324" instrument_node=""> over </span><a data-dcnode-id="5322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Donald_Trump" title="Donald Trump"><span data-dcnode-id="5323" instrument_node="">Donald Trump</span></a><span data-dcnode-id="5321" instrument_node="">. (And, uhh, conspiracy theorist </span><a data-dcnode-id="5319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Alex_Jones" title="Alex Jones"><span data-dcnode-id="5320" instrument_node="">Alex Jones</span></a><span data-dcnode-id="5318" instrument_node="">... for balance, we guess?) But that doesn't make it Russia's PBS. </span></li><span data-dcnode-id="5316" instrument_node="">
