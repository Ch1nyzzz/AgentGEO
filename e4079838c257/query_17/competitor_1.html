</span><p data-dcnode-id="8894"><b data-dcnode-id="8944"><span data-dcnode-id="8945" instrument_node="">Vladimir Vladimirovich Putin</span></b><span data-dcnode-id="8943" instrument_node=""> (Владимир Владимирович Путин; born 1952), a.k.a. "Pootie-Poot",</span><sup class="reference" data-dcnode-id="8940" id="cite_ref-5"><a data-dcnode-id="8941" href="#cite_note-5"><span data-dcnode-id="8942" instrument_node="">[5]</span></a></sup><span data-dcnode-id="8939" instrument_node=""> is a </span><s data-dcnode-id="8937"><span data-dcnode-id="8938" instrument_node="">shirtless, bear-riding man who hunts journalists</span></s><span data-dcnode-id="8936" instrument_node=""> "former" </span><a class="mw-redirect" data-dcnode-id="8934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/KGB" title="KGB"><span data-dcnode-id="8935" instrument_node="">KGB</span></a><span data-dcnode-id="8933" instrument_node=""> agent</span><sup class="reference" data-dcnode-id="8930" id="cite_ref-6"><a data-dcnode-id="8931" href="#cite_note-6"><span data-dcnode-id="8932" instrument_node="">[6]</span></a></sup><span data-dcnode-id="8929" instrument_node=""> (by which we mean "boring desk job")</span><sup class="reference" data-dcnode-id="8926" id="cite_ref-7"><a data-dcnode-id="8927" href="#cite_note-7"><span data-dcnode-id="8928" instrument_node="">[7]</span></a></sup><span data-dcnode-id="8925" instrument_node="">, war criminal</span><sup class="reference" data-dcnode-id="8922" id="cite_ref-8"><a data-dcnode-id="8923" href="#cite_note-8"><span data-dcnode-id="8924" instrument_node="">[8]</span></a></sup><span data-dcnode-id="8921" instrument_node="">, and </span><a data-dcnode-id="8919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Dictator" title="Dictator"><span data-dcnode-id="8920" instrument_node="">dictator</span></a><span data-dcnode-id="8918" instrument_node=""> of </span><a data-dcnode-id="8916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Russia" title="Russia"><span data-dcnode-id="8917" instrument_node="">Russia</span></a><span data-dcnode-id="8915" instrument_node="">. The longest-running Russian leader since </span><a data-dcnode-id="8913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Joseph_Stalin" title="Joseph Stalin"><span data-dcnode-id="8914" instrument_node="">Josef Stalin</span></a><span data-dcnode-id="8912" instrument_node="">, he alternates between President (2000-2008, 2012-onward) and Prime Minister (1999-2000, 2008-2012) whenever convenient. In 2008, the Russian government extended the Presidential term of office from four to six years.</span><sup class="reference" data-dcnode-id="8909" id="cite_ref-9"><a data-dcnode-id="8910" href="#cite_note-9"><span data-dcnode-id="8911" instrument_node="">[9]</span></a></sup><span data-dcnode-id="8908" instrument_node=""> In a 2020 referendum, </span><del data-dcnode-id="8906"><span data-dcnode-id="8907" instrument_node="">the Russian people voted overwhelmingly</span></del><span data-dcnode-id="8905" instrument_node=""> the government </span><a data-dcnode-id="8903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Voter_fraud" title="Voter fraud"><span data-dcnode-id="8904" instrument_node="">pulled numbers out of thin air to show overwhelming support</span></a><span data-dcnode-id="8902" instrument_node=""> for constitutional changes, which will allow Putin to serve two more six-year terms, meaning Putin can legally serve as president until 2036.</span><sup class="reference" data-dcnode-id="8899" id="cite_ref-10"><a data-dcnode-id="8900" href="#cite_note-10"><span data-dcnode-id="8901" instrument_node="">[10]</span></a></sup><span data-dcnode-id="8898" instrument_node=""> He presides over a nominally democratic nation that features a lot of backdoor deals with </span><a class="mw-redirect" data-dcnode-id="8896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Mafia" title="Mafia"><span data-dcnode-id="8897" instrument_node="">criminal syndicates</span></a><span data-dcnode-id="8895" instrument_node="">.
</span></p><p data-dcnode-id="8866"><span data-dcnode-id="8893" instrument_node="">His </span><a data-dcnode-id="8891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Rhetoric" title="Rhetoric"><span data-dcnode-id="8892" instrument_node="">rhetoric</span></a><span data-dcnode-id="8890" instrument_node=""> and governing style have earned him a neologism: </span><a class="extiw" data-dcnode-id="8887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Putinism" rel="nofollow" title="wp:Putinism"><span data-dcnode-id="8888" style="color:#477979 !important;" title="Wikipedia: Putinism"><span data-dcnode-id="8889" instrument_node="">Putinism</span></span></a><span data-dcnode-id="8886" instrument_node="">.</span><sup data-dcnode-id="8884"><img alt="Wikipedia" data-dcnode-id="8885" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%2527s_W.svg/12px-Wikipedia%2527s_W.svg.png&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/18px-Wikipedia%27s_W.svg.png 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/24px-Wikipedia%27s_W.svg.png 2x" width="12"></sup><span data-dcnode-id="8883" instrument_node=""> After the turmoil of the </span><a data-dcnode-id="8881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Boris_Yeltsin" title="Boris Yeltsin"><span data-dcnode-id="8882" instrument_node="">Yeltsin</span></a><span data-dcnode-id="8880" instrument_node=""> years, Putinism harkens back to something more similar to the </span><a class="extiw" data-dcnode-id="8877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leonid_Brezhnev" rel="nofollow" title="wp:Leonid Brezhnev"><span data-dcnode-id="8878" style="color:#477979 !important;" title="Wikipedia: Leonid Brezhnev"><span data-dcnode-id="8879" instrument_node="">Brezhnev</span></span></a><sup data-dcnode-id="8875"><img alt="Wikipedia" data-dcnode-id="8876" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%2527s_W.svg/12px-Wikipedia%2527s_W.svg.png&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/18px-Wikipedia%27s_W.svg.png 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/24px-Wikipedia%27s_W.svg.png 2x" width="12"></sup><span data-dcnode-id="8874" instrument_node=""> days, when Russia did what was best for Russia and flipped the bird at </span><a class="mw-redirect" data-dcnode-id="8872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/The_West" title="The West"><span data-dcnode-id="8873" instrument_node="">the West</span></a><span data-dcnode-id="8871" instrument_node=""> while doing so. For Russians who endured the emasculation of the 1990s, this return to strength (even if it's just macho posturing) is popular. It's quite a departure from what actually seems to be a depressing personal life.</span><sup class="reference" data-dcnode-id="8868" id="cite_ref-11"><a data-dcnode-id="8869" href="#cite_note-11"><span data-dcnode-id="8870" instrument_node="">[11]</span></a></sup><span data-dcnode-id="8867" instrument_node="">
</span></p><p data-dcnode-id="8846"><span data-dcnode-id="8865" instrument_node="">The thing is, Putin has done a very successful job of getting rid of any viable opposition, meaning the only people left are more insane than he is (his main opposition is </span><a data-dcnode-id="8863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Communist_Party_of_the_Russian_Federation" title="Communist Party of the Russian Federation"><span data-dcnode-id="8864" instrument_node="">a bunch of tankies</span></a><span data-dcnode-id="8862" instrument_node="">).</span><sup class="reference" data-dcnode-id="8859" id="cite_ref-12"><a data-dcnode-id="8860" href="#cite_note-12"><span data-dcnode-id="8861" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="8856" id="cite_ref-13"><a data-dcnode-id="8857" href="#cite_note-13"><span data-dcnode-id="8858" instrument_node="">[13]</span></a></sup><span data-dcnode-id="8855" instrument_node=""> The only possible exception to this rule is Alexei Navalny, who is currently rotting in prison</span><sup class="reference" data-dcnode-id="8852" id="cite_ref-14"><a data-dcnode-id="8853" href="#cite_note-14"><span data-dcnode-id="8854" instrument_node="">[14]</span></a></sup><span data-dcnode-id="8851" instrument_node=""> for the heinous crime of "not dying from Novichok poisoning" (a severe offense in Russia, apparently).</span><sup class="reference" data-dcnode-id="8848" id="cite_ref-15"><a data-dcnode-id="8849" href="#cite_note-15"><span data-dcnode-id="8850" instrument_node="">[15]</span></a></sup><span data-dcnode-id="8847" instrument_node="">
</span></p><p data-dcnode-id="8818"><span data-dcnode-id="8845" instrument_node="">On February 24</span><sup data-dcnode-id="8843"><span data-dcnode-id="8844" instrument_node="">th</span></sup><span data-dcnode-id="8842" instrument_node="">, 2022, Putin launched an invasion of </span><a data-dcnode-id="8840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Ukraine" title="Ukraine"><span data-dcnode-id="8841" instrument_node="">Ukraine</span></a><span data-dcnode-id="8839" instrument_node="">, igniting the largest conventional warfare operation in </span><a data-dcnode-id="8837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Europe" title="Europe"><span data-dcnode-id="8838" instrument_node="">Europe</span></a><span data-dcnode-id="8836" instrument_node=""> since </span><a data-dcnode-id="8834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="8835" instrument_node="">World War II</span></a><span data-dcnode-id="8833" instrument_node="">.</span><sup class="reference" data-dcnode-id="8830" id="cite_ref-16"><a data-dcnode-id="8831" href="#cite_note-16"><span data-dcnode-id="8832" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="8827" id="cite_ref-17"><a data-dcnode-id="8828" href="#cite_note-17"><span data-dcnode-id="8829" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8826" instrument_node=""> The attack also caused Europe's largest refugee crisis since World War II, with over a million refugees in the first week.</span><sup class="reference" data-dcnode-id="8823" id="cite_ref-18"><a data-dcnode-id="8824" href="#cite_note-18"><span data-dcnode-id="8825" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="8820" id="cite_ref-19"><a data-dcnode-id="8821" href="#cite_note-19"><span data-dcnode-id="8822" instrument_node="">[19]</span></a></sup><span data-dcnode-id="8819" instrument_node="">

</span><h2 data-dcnode-id="8441"><span class="mw-headline" data-dcnode-id="8449" id="Rise_to_power"><span data-dcnode-id="8450" instrument_node="">Rise to power</span></span><span class="mw-editsection" data-dcnode-id="8442"><span class="mw-editsection-bracket" data-dcnode-id="8447"><span data-dcnode-id="8448" instrument_node="">[</span></span><a data-dcnode-id="8445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D1" title="Edit section: Rise to power"><span data-dcnode-id="8446" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8443"><span data-dcnode-id="8444" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8440" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8431"><div class="thumbinner" data-dcnode-id="8432" style="width:302px;"><a class="image" data-dcnode-id="8438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3APutin-Stasi-Ausweis.png"><img alt="" class="thumbimage" data-dcnode-id="8439" height="208" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Putin-Stasi-Ausweis.png/300px-Putin-Stasi-Ausweis.png&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Putin-Stasi-Ausweis.png/450px-Putin-Stasi-Ausweis.png 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Putin-Stasi-Ausweis.png/600px-Putin-Stasi-Ausweis.png 2x" width="300"></a><span data-dcnode-id="8437" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8433"><div class="magnify" data-dcnode-id="8435"><a class="internal" data-dcnode-id="8436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3APutin-Stasi-Ausweis.png" title="Enlarge"></a></div><span data-dcnode-id="8434" instrument_node="">The KGB's spook #1 in East Germany</span></div></div></div><span data-dcnode-id="8430" instrument_node="">
</span><p data-dcnode-id="8335"><span data-dcnode-id="8429" instrument_node="">Back in Soviet times, Putin held a minor KGB post in </span><a data-dcnode-id="8427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/East_Germany" title="East Germany"><span data-dcnode-id="8428" instrument_node="">East Germany</span></a><sup class="reference" data-dcnode-id="8424" id="cite_ref-unfreedom_20-0"><a data-dcnode-id="8425" href="#cite_note-unfreedom-20"><span data-dcnode-id="8426" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="8422" style="white-space:nowrap;"><span data-dcnode-id="8423" instrument_node="">:44</span></sup><span data-dcnode-id="8421" instrument_node=""> from 1985 to 1990. As President Yeltsin's health declined in the 1990s, his entourage tried to find a successor by first taking a popular opinion-poll of fictional heroes; the poll winner was Max Otto von Stierlitz of the 1973 TV serial </span><i data-dcnode-id="8419"><span data-dcnode-id="8420" instrument_node="">Seventeen Moments in Spring</span></i><span data-dcnode-id="8418" instrument_node="">.</span><sup class="reference" data-dcnode-id="8415" id="cite_ref-unfreedom_20-1"><a data-dcnode-id="8416" href="#cite_note-unfreedom-20"><span data-dcnode-id="8417" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="8413" style="white-space:nowrap;"><span data-dcnode-id="8414" instrument_node="">:44</span></sup><sup class="reference" data-dcnode-id="8410" id="cite_ref-21"><a data-dcnode-id="8411" href="#cite_note-21"><span data-dcnode-id="8412" instrument_node="">[21]</span></a></sup><span data-dcnode-id="8409" instrument_node=""> Stierlitz was portrayed as a KGB agent in Germany during the final year of </span><a data-dcnode-id="8407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="8408" instrument_node="">World War II</span></a><span data-dcnode-id="8406" instrument_node="">,</span><sup class="reference" data-dcnode-id="8403" id="cite_ref-22"><a data-dcnode-id="8404" href="#cite_note-22"><span data-dcnode-id="8405" instrument_node="">[22]</span></a></sup><span data-dcnode-id="8402" instrument_node=""> and Putin was seen as the closest match.</span><sup class="reference" data-dcnode-id="8399" id="cite_ref-unfreedom_20-2"><a data-dcnode-id="8400" href="#cite_note-unfreedom-20"><span data-dcnode-id="8401" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="8397" style="white-space:nowrap;"><span data-dcnode-id="8398" instrument_node="">:44</span></sup><span data-dcnode-id="8396" instrument_node=""> Yeltsin subsequently appointed Putin as Prime Minister of Russia in August 1999; Putin was then generally unknown to the Russian public, having an approval rating of 2%.</span><sup class="reference" data-dcnode-id="8393" id="cite_ref-unfreedom_20-3"><a data-dcnode-id="8394" href="#cite_note-unfreedom-20"><span data-dcnode-id="8395" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="8391" style="white-space:nowrap;"><span data-dcnode-id="8392" instrument_node="">:45</span></sup><span data-dcnode-id="8390" instrument_node=""> In September 1999 a series of bombs exploded in Russian cities, killing 307 people.</span><sup class="reference" data-dcnode-id="8387" id="cite_ref-unfreedom_20-4"><a data-dcnode-id="8388" href="#cite_note-unfreedom-20"><span data-dcnode-id="8389" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="8385" style="white-space:nowrap;"><span data-dcnode-id="8386" instrument_node="">:45</span></sup><sup class="reference" data-dcnode-id="8382" id="cite_ref-23"><a data-dcnode-id="8383" href="#cite_note-23"><span data-dcnode-id="8384" instrument_node="">[23]</span></a></sup><span data-dcnode-id="8381" instrument_node=""> The bombings were blamed on </span><a class="mw-redirect" data-dcnode-id="8379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Chechnya" title="Chechnya"><span data-dcnode-id="8380" instrument_node=""> Chechen</span></a><span data-dcnode-id="8378" instrument_node=""> separatists, resulting in the widening of the </span><a class="extiw" data-dcnode-id="8375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Chechen_War" rel="nofollow" title="wp:Second Chechen War"><span data-dcnode-id="8376" style="color:#477979 !important;" title="Wikipedia: Second Chechen War"><span data-dcnode-id="8377" instrument_node="">Second Chechen War</span></span></a><span data-dcnode-id="8374" instrument_node="">.</span><sup data-dcnode-id="8372"><img alt="Wikipedia" data-dcnode-id="8373" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%2527s_W.svg/12px-Wikipedia%2527s_W.svg.png&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/18px-Wikipedia%27s_W.svg.png 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/24px-Wikipedia%27s_W.svg.png 2x" width="12"></sup><span data-dcnode-id="8371" instrument_node=""> Conspiracy-theorists portray the "apartment bombings" as a </span><a class="mw-redirect" data-dcnode-id="8369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/False_flag" title="False flag"><span data-dcnode-id="8370" instrument_node=""> false-flag</span></a><span data-dcnode-id="8368" instrument_node=""> operation to improve Putin's image before Yeltsin's imminent political demise;</span><sup class="reference" data-dcnode-id="8365" id="cite_ref-unfreedom_20-5"><a data-dcnode-id="8366" href="#cite_note-unfreedom-20"><span data-dcnode-id="8367" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="8362" id="cite_ref-24"><a data-dcnode-id="8363" href="#cite_note-24"><span data-dcnode-id="8364" instrument_node="">[24]</span></a></sup><span data-dcnode-id="8361" instrument_node=""> for example, three FSB agents who had planted bombs were arrested by Ryazan local police.</span><sup class="reference" data-dcnode-id="8358" id="cite_ref-25"><a data-dcnode-id="8359" href="#cite_note-25"><span data-dcnode-id="8360" instrument_node="">[25]</span></a></sup><span data-dcnode-id="8357" instrument_node="">
Putin's first presidential election in March 2000 set the stage for electoral fraud both within Russia and as an item for export, using a combination of unequal </span><a data-dcnode-id="8355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Media" title="Media"><span data-dcnode-id="8356" instrument_node="">media</span></a><span data-dcnode-id="8354" instrument_node=""> coverage, vote-tally manipulation, and exploitation of </span><a data-dcnode-id="8352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/War" title="War"><span data-dcnode-id="8353" instrument_node="">war</span></a><span data-dcnode-id="8351" instrument_node=""> </span><a data-dcnode-id="8349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Propaganda" title="Propaganda"><span data-dcnode-id="8350" instrument_node="">propaganda</span></a><span data-dcnode-id="8348" instrument_node="">.</span><sup class="reference" data-dcnode-id="8345" id="cite_ref-unfreedom_20-6"><a data-dcnode-id="8346" href="#cite_note-unfreedom-20"><span data-dcnode-id="8347" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="8343" style="white-space:nowrap;"><span data-dcnode-id="8344" instrument_node="">:45</span></sup><span data-dcnode-id="8342" instrument_node=""> Putin has never won a fair election, but only the appearance of winning matters to him.</span><sup class="reference" data-dcnode-id="8339" id="cite_ref-unfreedom_20-7"><a data-dcnode-id="8340" href="#cite_note-unfreedom-20"><span data-dcnode-id="8341" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="8337" style="white-space:nowrap;"><span data-dcnode-id="8338" instrument_node="">:45-51</span></sup><span data-dcnode-id="8336" instrument_node="">
</span></p><span data-dcnode-id="8334" instrument_node="">
</span><h2 data-dcnode-id="8324"><span class="mw-headline" data-dcnode-id="8332" id="Political_affiliations"><span data-dcnode-id="8333" instrument_node="">Political affiliations</span></span><span class="mw-editsection" data-dcnode-id="8325"><span class="mw-editsection-bracket" data-dcnode-id="8330"><span data-dcnode-id="8331" instrument_node="">[</span></span><a data-dcnode-id="8328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D2" title="Edit section: Political affiliations"><span data-dcnode-id="8329" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8326"><span data-dcnode-id="8327" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8323" instrument_node="">
</span><p data-dcnode-id="8291"><span data-dcnode-id="8322" instrument_node="">Arguably, Putin has no political views other than </span><a data-dcnode-id="8320" href="#If_I_Were_A_Rich_Man"><span data-dcnode-id="8321" instrument_node="">consolidating money</span></a><span data-dcnode-id="8319" instrument_node=""> and power because he has held seemingly-contradictory views over his lifetime: Christianity, </span><a data-dcnode-id="8317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Communism" title="Communism"><span data-dcnode-id="8318" instrument_node="">communism</span></a><span data-dcnode-id="8316" instrument_node="">, and </span><a data-dcnode-id="8314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Fascism" title="Fascism"><span data-dcnode-id="8315" instrument_node="">fascism</span></a><span data-dcnode-id="8313" instrument_node="">. He is a poster child for </span><a data-dcnode-id="8311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Horseshoe_theory" title="Horseshoe theory"><span data-dcnode-id="8312" instrument_node="">horseshoe theory</span></a><span data-dcnode-id="8310" instrument_node="">, or perhaps </span><a data-dcnode-id="8308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Utilitarianism" title="Utilitarianism"><span data-dcnode-id="8309" instrument_node="">utilitarianism</span></a><span data-dcnode-id="8307" instrument_node="">. He also has staked out a position similar to </span><a data-dcnode-id="8305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/National_Bolshevism" title="National Bolshevism"><span data-dcnode-id="8306" instrument_node="">National Bolshevism</span></a><span data-dcnode-id="8304" instrument_node="">, "He wanted a reconciliation of what he called the tradition of Red and White, communist and Orthodox, </span><a data-dcnode-id="8302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Terrorism" title="Terrorism"><span data-dcnode-id="8303" instrument_node="">terror</span></a><span data-dcnode-id="8301" instrument_node=""> and </span><a data-dcnode-id="8299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/God" title="God"><span data-dcnode-id="8300" instrument_node="">God</span></a><span data-dcnode-id="8298" instrument_node="">."</span><sup class="reference" data-dcnode-id="8295" id="cite_ref-unfreedom_20-8"><a data-dcnode-id="8296" href="#cite_note-unfreedom-20"><span data-dcnode-id="8297" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="8293" style="white-space:nowrap;"><span data-dcnode-id="8294" instrument_node="">:58</span></sup><span data-dcnode-id="8292" instrument_node="">
</span></p><p data-dcnode-id="8261"><span data-dcnode-id="8290" instrument_node="">Putin most likely joined the Communist Party of the Soviet Union between 1970 and 1975 when he was attending law school at Leningrad State University. The university was a recruiting ground for KGB agents, and the KGB targeted him for recruitment before 1975,</span><sup class="reference" data-dcnode-id="8287" id="cite_ref-hoffman_26-0"><a data-dcnode-id="8288" href="#cite_note-hoffman-26"><span data-dcnode-id="8289" instrument_node="">[26]</span></a></sup><span data-dcnode-id="8286" instrument_node=""> and becoming an agent required party membership. Putin claimed to have been eager for recruitment;</span><sup class="reference" data-dcnode-id="8283" id="cite_ref-hoffman_26-1"><a data-dcnode-id="8284" href="#cite_note-hoffman-26"><span data-dcnode-id="8285" instrument_node="">[26]</span></a></sup><span data-dcnode-id="8282" instrument_node=""> regarding party membership, Putin stated, "I wasn't a party member through necessity. I can't say I was totally an </span><a data-dcnode-id="8280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Ideology" title="Ideology"><span data-dcnode-id="8281" instrument_node="">ideological</span></a><span data-dcnode-id="8279" instrument_node=""> Communist but I did really treasure it [having a Communist Party card]."</span><sup class="reference" data-dcnode-id="8276" id="cite_ref-27"><a data-dcnode-id="8277" href="#cite_note-27"><span data-dcnode-id="8278" instrument_node="">[27]</span></a></sup><span data-dcnode-id="8275" instrument_node=""> Putin remained in the party until its dissolution in 1991.</span><sup class="reference" data-dcnode-id="8272" id="cite_ref-28"><a data-dcnode-id="8273" href="#cite_note-28"><span data-dcnode-id="8274" instrument_node="">[28]</span></a></sup><span data-dcnode-id="8271" instrument_node=""> Regardless of his alleged lack of ideological fervor, he eagerly did the Communist Party's bidding in the KGB from at least 1977-1991, working on international espionage and eventually rising to the rank of lieutenant colonel.</span><sup class="reference" data-dcnode-id="8268" id="cite_ref-hoffman_26-2"><a data-dcnode-id="8269" href="#cite_note-hoffman-26"><span data-dcnode-id="8270" instrument_node="">[26]</span></a></sup><sup class="reference" data-dcnode-id="8265" id="cite_ref-29"><a data-dcnode-id="8266" href="#cite_note-29"><span data-dcnode-id="8267" instrument_node="">[29]</span></a></sup><sup class="reference" data-dcnode-id="8263" style="white-space:nowrap;"><span data-dcnode-id="8264" instrument_node="">:9-10</span></sup><span data-dcnode-id="8262" instrument_node="">
</span></p><p data-dcnode-id="8213"><span data-dcnode-id="8260" instrument_node="">Close to the beginning of Putin's autocratic rule in 2005,</span><sup class="reference" data-dcnode-id="8257" id="cite_ref-30"><a data-dcnode-id="8258" href="#cite_note-30"><span data-dcnode-id="8259" instrument_node="">[30]</span></a></sup><span data-dcnode-id="8256" instrument_node=""> Putin had fascist </span><a class="mw-redirect" data-dcnode-id="8254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Philosopher" title="Philosopher"><span data-dcnode-id="8255" instrument_node="">philosopher</span></a><span data-dcnode-id="8253" instrument_node=""> </span><a class="extiw" data-dcnode-id="8250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ivan_Ilyin" rel="nofollow" title="wp:Ivan Ilyin"><span data-dcnode-id="8251" style="color:#477979 !important;" title="Wikipedia: Ivan Ilyin"><span data-dcnode-id="8252" instrument_node="">Ivan Ilyin's</span></span></a><sup data-dcnode-id="8248"><img alt="Wikipedia" data-dcnode-id="8249" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%2527s_W.svg/12px-Wikipedia%2527s_W.svg.png&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/18px-Wikipedia%27s_W.svg.png 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/24px-Wikipedia%27s_W.svg.png 2x" width="12"></sup><span data-dcnode-id="8247" instrument_node=""> remains transferred from Switzerland and reburied in Moscow, where he later personally consecrated them.</span><sup class="reference" data-dcnode-id="8244" id="cite_ref-unfreedom_20-9"><a data-dcnode-id="8245" href="#cite_note-unfreedom-20"><span data-dcnode-id="8246" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="8242" style="white-space:nowrap;"><span data-dcnode-id="8243" instrument_node="">:17</span></sup><sup class="reference" data-dcnode-id="8239" id="cite_ref-31"><a data-dcnode-id="8240" href="#cite_note-31"><span data-dcnode-id="8241" instrument_node="">[31]</span></a></sup><span data-dcnode-id="8238" instrument_node=""> In 2006, Putin sent an emissary to Michigan State University to claim Ilyin's personal papers.</span><sup class="reference" data-dcnode-id="8235" id="cite_ref-unfreedom_20-10"><a data-dcnode-id="8236" href="#cite_note-unfreedom-20"><span data-dcnode-id="8237" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="8233" style="white-space:nowrap;"><span data-dcnode-id="8234" instrument_node="">:17-18</span></sup><span data-dcnode-id="8232" instrument_node=""> Putin had by then been citing Ilyin in presidential addresses to the Russian legislature.</span><sup class="reference" data-dcnode-id="8229" id="cite_ref-unfreedom_20-11"><a data-dcnode-id="8230" href="#cite_note-unfreedom-20"><span data-dcnode-id="8231" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="8227" style="white-space:nowrap;"><span data-dcnode-id="8228" instrument_node="">:18</span></sup><span data-dcnode-id="8226" instrument_node=""> By the 2010s, Putin used Ilyin to undermine the </span><a data-dcnode-id="8224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/European_Union" title="European Union"><span data-dcnode-id="8225" instrument_node="">European Union</span></a><span data-dcnode-id="8223" instrument_node=""> and justify invading </span><a data-dcnode-id="8221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Ukraine" title="Ukraine"><span data-dcnode-id="8222" instrument_node="">Ukraine</span></a><span data-dcnode-id="8220" instrument_node="">.</span><sup class="reference" data-dcnode-id="8217" id="cite_ref-unfreedom_20-12"><a data-dcnode-id="8218" href="#cite_note-unfreedom-20"><span data-dcnode-id="8219" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="8215" style="white-space:nowrap;"><span data-dcnode-id="8216" instrument_node="">:18</span></sup><span data-dcnode-id="8214" instrument_node="">
</span></p><p data-dcnode-id="8192"><span data-dcnode-id="8212" instrument_node="">Based on Ilyin's writings and a mythic, ahistorical view of </span><a class="extiw" data-dcnode-id="8209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_the_Great" rel="nofollow" title="wp:Vladimir the Great"><span data-dcnode-id="8210" style="color:#477979 !important;" title="Wikipedia: Vladimir the Great"><span data-dcnode-id="8211" instrument_node="">Vladimir the Great</span></span></a><span data-dcnode-id="8208" instrument_node="">,</span><sup data-dcnode-id="8206"><img alt="Wikipedia" data-dcnode-id="8207" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%2527s_W.svg/12px-Wikipedia%2527s_W.svg.png&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/18px-Wikipedia%27s_W.svg.png 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/24px-Wikipedia%27s_W.svg.png 2x" width="12"></sup><span data-dcnode-id="8205" instrument_node=""> Putin has made </span><a data-dcnode-id="8203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Irredentism" title="Irredentism"><span data-dcnode-id="8204" instrument_node="">irredentist</span></a><span data-dcnode-id="8202" instrument_node=""> arguments that Ukrainians and </span><a data-dcnode-id="8200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Belarus" title="Belarus"><span data-dcnode-id="8201" instrument_node="">Belarusians</span></a><span data-dcnode-id="8199" instrument_node=""> did not exist as peoples separate from Russians. These arguments set the stage for the annexation of Crimea and the Russian-sponsored war in eastern Ukraine.</span><sup class="reference" data-dcnode-id="8196" id="cite_ref-unfreedom_20-13"><a data-dcnode-id="8197" href="#cite_note-unfreedom-20"><span data-dcnode-id="8198" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="8194" style="white-space:nowrap;"><span data-dcnode-id="8195" instrument_node="">:61-66</span></sup><span data-dcnode-id="8193" instrument_node="">
</span></p><span data-dcnode-id="8191" instrument_node="">
</span><h2 data-dcnode-id="8181"><span class="mw-headline" data-dcnode-id="8189" id="Reality-defying_good_stuff.3F"><span data-dcnode-id="8190" instrument_node="">Reality-defying good stuff?</span></span><span class="mw-editsection" data-dcnode-id="8182"><span class="mw-editsection-bracket" data-dcnode-id="8187"><span data-dcnode-id="8188" instrument_node="">[</span></span><a data-dcnode-id="8185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D3" title="Edit section: Reality-defying good stuff?"><span data-dcnode-id="8186" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8183"><span data-dcnode-id="8184" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8180" instrument_node="">
</span><div class="hatnote" data-dcnode-id="8176" role="note"><span data-dcnode-id="8179" instrument_node="">See the main article on this topic: </span><a data-dcnode-id="8177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Stopped_clock" title="Stopped clock"><span data-dcnode-id="8178" instrument_node="">Stopped clock</span></a></div><span data-dcnode-id="8175" instrument_node="">
</span><span data-dcnode-id="8174" instrument_node="">
</span><span data-dcnode-id="8173" instrument_node="">
</span><span data-dcnode-id="8163" instrument_node="">
</span><span data-dcnode-id="8162" instrument_node="">
</span><table class="cquote" data-dcnode-id="8151" style="margin: auto; border-collapse:collapse; border-style:none; background-color:transparent;"><tbody data-dcnode-id="8152"><tr data-dcnode-id="8164"><td data-dcnode-id="8165"><div data-dcnode-id="8167" style="padding:4px 50px;position:relative;"><span data-dcnode-id="8171" style="position:absolute;left:10px;top:-6px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="8172" instrument_node="">“</span></span><span data-dcnode-id="8169" style="position:absolute;right:10px;bottom:-20px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="8170" instrument_node="">”</span></span><span data-dcnode-id="8168" instrument_node="">You can be a three-headed tyrant as long as everyone has jobs and is working.</span></div><span data-dcnode-id="8166" instrument_node="">
</span></td></tr><tr data-dcnode-id="8153"><td data-dcnode-id="8154" style="padding:4px 10px 8px;font-size:smaller;line-height:1.6em;text-align:right;"><span data-dcnode-id="8161" instrument_node=""> </span><cite data-dcnode-id="8156" style="font-style:normal;position:relative;z-index:2"><span data-dcnode-id="8160" instrument_node="">—Jack Ablin</span><sup class="reference" data-dcnode-id="8157" id="cite_ref-32"><a data-dcnode-id="8158" href="#cite_note-32"><span data-dcnode-id="8159" instrument_node="">[32]</span></a></sup></cite><span data-dcnode-id="8155" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="8150" instrument_node="">
</span><p data-dcnode-id="8129"><span data-dcnode-id="8149" instrument_node="">Putin got the job of heading up one of the KGB's most prestigious programs for a reason. You can't deny that the guy is very competent and has presided over an </span><a class="mw-redirect" data-dcnode-id="8147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Economic" title="Economic"><span data-dcnode-id="8148" instrument_node="">economic</span></a><span data-dcnode-id="8146" instrument_node=""> and political backwater elbowing itself back into the geopolitical vortex. There was unexpectedly high economic growth during his first term as president: he </span><s data-dcnode-id="8144"><span data-dcnode-id="8145" instrument_node="">balanced the budget</span></s><span data-dcnode-id="8143" instrument_node=""> wait, he </span><i data-dcnode-id="8141"><span data-dcnode-id="8142" instrument_node="">reduced the national debt by 90%?</span></i><sup class="reference" data-dcnode-id="8138" id="cite_ref-33"><a data-dcnode-id="8139" href="#cite_note-33"><span data-dcnode-id="8140" instrument_node="">[33]</span></a></sup><span data-dcnode-id="8137" instrument_node=""> Russia achieved this primarily by boosting </span><a class="mw-redirect" data-dcnode-id="8135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/GDP" title="GDP"><span data-dcnode-id="8136" instrument_node="">GDP</span></a><span data-dcnode-id="8134" instrument_node="">, making the national debt a smaller fraction of a larger GDP.</span><sup class="reference" data-dcnode-id="8131" id="cite_ref-34"><a data-dcnode-id="8132" href="#cite_note-34"><span data-dcnode-id="8133" instrument_node="">[34]</span></a></sup><span data-dcnode-id="8130" instrument_node="">
</span></p><p data-dcnode-id="8118"><span data-dcnode-id="8128" instrument_node="">The Russian economy grew for eight straight years, seeing GDP increase by 72% in PPP (sixfold in nominal). Wages tripled, incomes increased, unemployment and </span><a data-dcnode-id="8126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Poverty" title="Poverty"><span data-dcnode-id="8127" instrument_node="">poverty</span></a><span data-dcnode-id="8125" instrument_node=""> more than halved, and Russia's self-assessed </span><a data-dcnode-id="8123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Life" title="Life"><span data-dcnode-id="8124" instrument_node="">life</span></a><span data-dcnode-id="8122" instrument_node=""> satisfaction rose significantly, if only because Russians had </span><a data-dcnode-id="8120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Money" title="Money"><span data-dcnode-id="8121" instrument_node="">money</span></a><span data-dcnode-id="8119" instrument_node=""> in their pockets for once. The ideal model is "corrupt but somewhat-competent", we guess.
</span></p><p data-dcnode-id="8084"><span data-dcnode-id="8117" instrument_node="">Most of Russian exports are </span><a data-dcnode-id="8115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Oil" title="Oil"><span data-dcnode-id="8116" instrument_node="">oil</span></a><span data-dcnode-id="8114" instrument_node=""> and </span><a data-dcnode-id="8112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Natural_gas" title="Natural gas"><span data-dcnode-id="8113" instrument_node="">gas</span></a><span data-dcnode-id="8111" instrument_node="">,</span><sup class="reference" data-dcnode-id="8108" id="cite_ref-35"><a data-dcnode-id="8109" href="#cite_note-35"><span data-dcnode-id="8110" instrument_node="">[35]</span></a></sup><sup class="reference" data-dcnode-id="8105" id="cite_ref-36"><a data-dcnode-id="8106" href="#cite_note-36"><span data-dcnode-id="8107" instrument_node="">[36]</span></a></sup><span data-dcnode-id="8104" instrument_node="">
which are integral to the Russian economy. </span><a class="external text" data-dcnode-id="8101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.washingtonpost.com/blogs/wonkblog/wp/2014/12/15/russias-economy-is-doomed-its-that-simple/" rel="nofollow"><i data-dcnode-id="8102"><span data-dcnode-id="8103" instrument_node="">*cough*</span></i></a><span data-dcnode-id="8100" instrument_node=""> To make sure Russia stays on the map for decades to come, Putin's energy policy made Russia into a </span><a class="mw-redirect" data-dcnode-id="8098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Nuke" title="Nuke"><span data-dcnode-id="8099" instrument_node="">nuclear</span></a><span data-dcnode-id="8097" instrument_node=""> power (again). The </span><a class="mw-redirect" data-dcnode-id="8095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Police" title="Police"><span data-dcnode-id="8096" instrument_node="">police</span></a><span data-dcnode-id="8094" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="8092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/MIC" title="MIC"><span data-dcnode-id="8093" instrument_node="">military</span></a><span data-dcnode-id="8091" instrument_node=""> have been "</span><a data-dcnode-id="8089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Police_state" title="Police state"><span data-dcnode-id="8090" instrument_node="">reformed</span></a><span data-dcnode-id="8088" instrument_node="">", the </span><a class="mw-redirect" data-dcnode-id="8086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Car" title="Car"><span data-dcnode-id="8087" instrument_node="">automotive</span></a><span data-dcnode-id="8085" instrument_node=""> industry boomed, and the general land-laws underwent modernization. 
</span></p><p data-dcnode-id="8049"><span data-dcnode-id="8083" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="8081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Serbian" title="Serbian"><span data-dcnode-id="8082" instrument_node=""> Serbs</span></a><span data-dcnode-id="8080" instrument_node=""> have historically been pro-Russian because of Brother Russia's image as a protector of </span><a class="mw-redirect" data-dcnode-id="8078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Ottoman_Empire" title="Ottoman Empire"><span data-dcnode-id="8079" instrument_node=""> Ottoman</span></a><span data-dcnode-id="8077" instrument_node=""> </span><a class="extiw" data-dcnode-id="8074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slavs" rel="nofollow" title="wp:Slavs"><span data-dcnode-id="8075" style="color:#477979 !important;" title="Wikipedia: Slavs"><span data-dcnode-id="8076" instrument_node="">Slavs</span></span></a><sup data-dcnode-id="8072"><img alt="Wikipedia" data-dcnode-id="8073" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%2527s_W.svg/12px-Wikipedia%2527s_W.svg.png&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/18px-Wikipedia%27s_W.svg.png 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/24px-Wikipedia%27s_W.svg.png 2x" width="12"></sup><span data-dcnode-id="8071" instrument_node=""> and of </span><a data-dcnode-id="8069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Eastern_Orthodox_Church" title="Eastern Orthodox Church"><span data-dcnode-id="8070" instrument_node=""> Orthodox Christianity</span></a><span data-dcnode-id="8068" instrument_node=""> in general. Putin is very popular in </span><a data-dcnode-id="8066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Serbia" title="Serbia"><span data-dcnode-id="8067" instrument_node="">Serbia</span></a><span data-dcnode-id="8065" instrument_node=""> because he brought up Russia from the ashes, restored national pride, and struck a pro-Serbian stance on the </span><a data-dcnode-id="8063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Kosovo" title="Kosovo"><span data-dcnode-id="8064" instrument_node="">Kosovo</span></a><span data-dcnode-id="8062" instrument_node=""> issue, calling the Europeans hypocrites (though they're not all that similar since Kosovo isn't the </span><a class="extiw" data-dcnode-id="8059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/51st_state" rel="nofollow" title="wp:51st state"><span data-dcnode-id="8060" style="color:#477979 !important;" title="Wikipedia: 51st state"><span data-dcnode-id="8061" instrument_node="">51st state</span></span></a><sup data-dcnode-id="8057"><img alt="Wikipedia" data-dcnode-id="8058" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%2527s_W.svg/12px-Wikipedia%2527s_W.svg.png&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/18px-Wikipedia%27s_W.svg.png 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/24px-Wikipedia%27s_W.svg.png 2x" width="12"></sup><span data-dcnode-id="8056" instrument_node="">). It's a popular saying in Serbia that if Putin stood as a candidate for president there, he would come away with 100% of the vote. May explain why 97% of </span><a class="extiw" data-dcnode-id="8053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crimean_status_referendum%2C_2014" rel="nofollow" title="wp:Crimean status referendum, 2014"><span data-dcnode-id="8054" style="color:#477979 !important;" title="Wikipedia: Crimean status referendum, 2014"><span data-dcnode-id="8055" instrument_node="">Crimean voters favored reuniting</span></span></a><sup data-dcnode-id="8051"><img alt="Wikipedia" data-dcnode-id="8052" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%2527s_W.svg/12px-Wikipedia%2527s_W.svg.png&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/18px-Wikipedia%27s_W.svg.png 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/24px-Wikipedia%27s_W.svg.png 2x" width="12"></sup><span data-dcnode-id="8050" instrument_node=""> with Russia.
</span></p><p data-dcnode-id="8035"><span data-dcnode-id="8048" instrument_node="">Putin signed the </span><a data-dcnode-id="8046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Kyoto_Protocol" title="Kyoto Protocol"><span data-dcnode-id="8047" instrument_node="">Kyoto Protocol</span></a><span data-dcnode-id="8045" instrument_node=""> (though the terms were easy for Russia), something the </span><a data-dcnode-id="8043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/United_States" title="United States"><span data-dcnode-id="8044" instrument_node="">United States</span></a><span data-dcnode-id="8042" instrument_node=""> never did. Speaking of the US, he granted asylum to American whistleblower </span><a data-dcnode-id="8040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Edward_Snowden" title="Edward Snowden"><span data-dcnode-id="8041" instrument_node="">Edward Snowden</span></a><span data-dcnode-id="8039" instrument_node=""> in 2013, if for no other reason than to stick it to </span><a class="mw-redirect" data-dcnode-id="8037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Washington_DC" title="Washington DC"><span data-dcnode-id="8038" instrument_node="">Washington</span></a><span data-dcnode-id="8036" instrument_node="">.
</span></p><p data-dcnode-id="8018"><span data-dcnode-id="8034" instrument_node="">As brutal as Putin was to the Chechens, they've not been angels to Russian civilians either. Between creating hostage situations in theatres</span><sup class="reference" data-dcnode-id="8031" id="cite_ref-37"><a data-dcnode-id="8032" href="#cite_note-37"><span data-dcnode-id="8033" instrument_node="">[37]</span></a></sup><span data-dcnode-id="8030" instrument_node=""> and elementary schools,</span><sup class="reference" data-dcnode-id="8027" id="cite_ref-38"><a data-dcnode-id="8028" href="#cite_note-38"><span data-dcnode-id="8029" instrument_node="">[38]</span></a></sup><span data-dcnode-id="8026" instrument_node=""> and suicide bombings,</span><sup class="reference" data-dcnode-id="8023" id="cite_ref-39"><a data-dcnode-id="8024" href="#cite_note-39"><span data-dcnode-id="8025" instrument_node="">[39]</span></a></sup><span data-dcnode-id="8022" instrument_node=""> there was a period where Chechen separatists posed a real threat to safety in Russia. The installation of strongman </span><a data-dcnode-id="8020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Ramzan_Kadyrov" title="Ramzan Kadyrov"><span data-dcnode-id="8021" instrument_node="">Ramzan Kadyrov</span></a><span data-dcnode-id="8019" instrument_node=""> in Chechnya, while creating numerous issues, has at least ended these.
</span></p><p data-dcnode-id="8013"><span data-dcnode-id="8017" instrument_node="">Putin accrues another bonus simply by not being </span><a data-dcnode-id="8015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Boris_Yeltsin" title="Boris Yeltsin"><span data-dcnode-id="8016" instrument_node="">Boris Yeltsin</span></a><span data-dcnode-id="8014" instrument_node="">. After the disastrous 1990s, many Russians are pretty happy with a leader who is at least sober as opposed to a vomit- and vodka-soaked lunatic. However, this success and his predecessor's failure also made most Russians enormously disappointed with a democratic government.
</span></p><span data-dcnode-id="8012" instrument_node="">
</span><h2 data-dcnode-id="8002"><span class="mw-headline" data-dcnode-id="8010" id="And_the_reality-returning_bad_stuff"><span data-dcnode-id="8011" instrument_node="">And the reality-returning bad stuff</span></span><span class="mw-editsection" data-dcnode-id="8003"><span class="mw-editsection-bracket" data-dcnode-id="8008"><span data-dcnode-id="8009" instrument_node="">[</span></span><a data-dcnode-id="8006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D4" title="Edit section: And the reality-returning bad stuff"><span data-dcnode-id="8007" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8004"><span data-dcnode-id="8005" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8001" instrument_node="">
</span><span data-dcnode-id="8000" instrument_node="">
</span><span data-dcnode-id="7999" instrument_node="">
</span><span data-dcnode-id="7989" instrument_node="">
</span><span data-dcnode-id="7988" instrument_node="">
</span><table class="cquote" data-dcnode-id="7966" style="margin: auto; border-collapse:collapse; border-style:none; background-color:transparent;"><tbody data-dcnode-id="7967"><tr data-dcnode-id="7990"><td data-dcnode-id="7991"><div data-dcnode-id="7993" style="padding:4px 50px;position:relative;"><span data-dcnode-id="7997" style="position:absolute;left:10px;top:-6px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="7998" instrument_node="">“</span></span><span data-dcnode-id="7995" style="position:absolute;right:10px;bottom:-20px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="7996" instrument_node="">”</span></span><span data-dcnode-id="7994" instrument_node="">The Genialissimo is simultaneously the general secretary of our party, holds the military rank of generalissimo, and, moreover, stands apart from everyone.</span></div><span data-dcnode-id="7992" instrument_node="">
</span></td></tr><tr data-dcnode-id="7968"><td data-dcnode-id="7969" style="padding:4px 10px 8px;font-size:smaller;line-height:1.6em;text-align:right;"><span data-dcnode-id="7987" instrument_node=""> </span><cite data-dcnode-id="7971" style="font-style:normal;position:relative;z-index:2"><span data-dcnode-id="7986" instrument_node="">—</span><i data-dcnode-id="7984"><span data-dcnode-id="7985" instrument_node="">Moscow 2042</span></i><span data-dcnode-id="7983" instrument_node="">, a </span><a class="mw-redirect" data-dcnode-id="7981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Dystopian" title="Dystopian"><span data-dcnode-id="7982" instrument_node="">dystopian</span></a><span data-dcnode-id="7980" instrument_node=""> novel fortelling the rise of Putin.</span><sup class="reference" data-dcnode-id="7977" id="cite_ref-40"><a data-dcnode-id="7978" href="#cite_note-40"><span data-dcnode-id="7979" instrument_node="">[40]</span></a></sup><sup class="reference" data-dcnode-id="7974" id="cite_ref-41"><a data-dcnode-id="7975" href="#cite_note-41"><span data-dcnode-id="7976" instrument_node="">[41]</span></a></sup><sup class="reference" data-dcnode-id="7972" style="white-space:nowrap;"><span data-dcnode-id="7973" instrument_node="">:125</span></sup></cite><span data-dcnode-id="7970" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="7965" instrument_node="">
</span><h3 data-dcnode-id="7955"><span class="mw-headline" data-dcnode-id="7963" id="Resource_economy"><span data-dcnode-id="7964" instrument_node="">Resource economy</span></span><span class="mw-editsection" data-dcnode-id="7956"><span class="mw-editsection-bracket" data-dcnode-id="7961"><span data-dcnode-id="7962" instrument_node="">[</span></span><a data-dcnode-id="7959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D5" title="Edit section: Resource economy"><span data-dcnode-id="7960" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7957"><span data-dcnode-id="7958" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7954" instrument_node="">
</span><p data-dcnode-id="7928"><span data-dcnode-id="7953" instrument_node="">Russia has been in a recession since 2014.</span><sup class="reference" data-dcnode-id="7950" id="cite_ref-42"><a data-dcnode-id="7951" href="#cite_note-42"><span data-dcnode-id="7952" instrument_node="">[42]</span></a></sup><span data-dcnode-id="7949" instrument_node=""> Their economy is still too dependent upon oil:</span><sup class="reference" data-dcnode-id="7946" id="cite_ref-43"><a data-dcnode-id="7947" href="#cite_note-43"><span data-dcnode-id="7948" instrument_node="">[43]</span></a></sup><span data-dcnode-id="7945" instrument_node=""> The oil price is projected to remain at or below $75 through 2020. As a result, growth in Russia is going to stagnate for many years.</span><sup class="reference" data-dcnode-id="7942" id="cite_ref-44"><a data-dcnode-id="7943" href="#cite_note-44"><span data-dcnode-id="7944" instrument_node="">[44]</span></a></sup><span data-dcnode-id="7941" instrument_node=""> But he's definitely "eating Obama's lunch."</span><sup class="reference" data-dcnode-id="7938" id="cite_ref-45"><a data-dcnode-id="7939" href="#cite_note-45"><span data-dcnode-id="7940" instrument_node="">[45]</span></a></sup><span data-dcnode-id="7937" instrument_node=""> He also once speculated that warming by “two or three degrees” could be a good thing for the economy since they'll spend less on fur coats.</span><sup class="reference" data-dcnode-id="7934" id="cite_ref-46"><a data-dcnode-id="7935" href="#cite_note-46"><span data-dcnode-id="7936" instrument_node="">[46]</span></a></sup><span data-dcnode-id="7933" instrument_node=""> By fur coats, he means all that arctic oil that will be open for exploration by the state enterprises he and his friends control.</span><sup class="reference" data-dcnode-id="7930" id="cite_ref-47"><a data-dcnode-id="7931" href="#cite_note-47"><span data-dcnode-id="7932" instrument_node="">[47]</span></a></sup><span data-dcnode-id="7929" instrument_node="">
</span></p><p data-dcnode-id="7885"><span data-dcnode-id="7927" instrument_node="">Russia has been decimated by heatwaves, wildfires, and crop losses over the past decade, so climate change hasn't entirely been a bowl of cherries for the country.</span><sup class="reference" data-dcnode-id="7924" id="cite_ref-48"><a data-dcnode-id="7925" href="#cite_note-48"><span data-dcnode-id="7926" instrument_node="">[48]</span></a></sup><sup class="reference" data-dcnode-id="7921" id="cite_ref-49"><a data-dcnode-id="7922" href="#cite_note-49"><span data-dcnode-id="7923" instrument_node="">[49]</span></a></sup><sup class="reference" data-dcnode-id="7918" id="cite_ref-50"><a data-dcnode-id="7919" href="#cite_note-50"><span data-dcnode-id="7920" instrument_node="">[50]</span></a></sup><span data-dcnode-id="7917" instrument_node=""> And considering Russia is mainly a landlocked country, there's a considerable risk of severe droughts. But, as </span><a data-dcnode-id="7915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/George_W._Bush" title="George W. Bush"><span data-dcnode-id="7916" instrument_node="">Bush's</span></a><span data-dcnode-id="7914" instrument_node=""> anti-environmental cohort has said, </span><s data-dcnode-id="7912"><span data-dcnode-id="7913" instrument_node="">There is still debate on climate change</span></s><sup class="reference" data-dcnode-id="7909" id="cite_ref-51"><a data-dcnode-id="7910" href="#cite_note-51"><span data-dcnode-id="7911" instrument_node="">[51]</span></a></sup><span data-dcnode-id="7908" instrument_node=""> </span><s data-dcnode-id="7906"><span data-dcnode-id="7907" instrument_node="">There is no climate change</span></s><sup class="reference" data-dcnode-id="7903" id="cite_ref-52"><a data-dcnode-id="7904" href="#cite_note-52"><span data-dcnode-id="7905" instrument_node="">[52]</span></a></sup><span data-dcnode-id="7902" instrument_node=""> it will be good for some regions.</span><sup class="reference" data-dcnode-id="7899" id="cite_ref-53"><a data-dcnode-id="7900" href="#cite_note-53"><span data-dcnode-id="7901" instrument_node="">[53]</span></a></sup><span data-dcnode-id="7898" instrument_node=""> Soon we'll feed everyone with food grown in the temperate and hospitable Siberia. The problem is that Siberia has no groundwater</span><sup class="reference" data-dcnode-id="7895" id="cite_ref-54"><a data-dcnode-id="7896" href="#cite_note-54"><span data-dcnode-id="7897" instrument_node="">[54]</span></a></sup><span data-dcnode-id="7894" instrument_node=""> and is far too arid to support agriculture on a relevant scale.</span><sup class="reference" data-dcnode-id="7891" id="cite_ref-55"><a data-dcnode-id="7892" href="#cite_note-55"><span data-dcnode-id="7893" instrument_node="">[55]</span></a></sup><span data-dcnode-id="7890" instrument_node=""> Turn the crank and see which excuse comes out next. As a result (or just given life in rural Russia), Russia's birthrate is falling off a cliff, as the enormous drunken underclass historically press-ganged into a bullying, ill-equipped army and used as cannon fodder is fading away. As Russia has always used its numbers (and some scorched earth policies) to win wars, this must count as a big hole in their historic 'defense' plans.</span><sup class="reference" data-dcnode-id="7887" id="cite_ref-56"><a data-dcnode-id="7888" href="#cite_note-56"><span data-dcnode-id="7889" instrument_node="">[56]</span></a></sup><span data-dcnode-id="7886" instrument_node="">
</span></p><p data-dcnode-id="7873"><span data-dcnode-id="7884" instrument_node="">In 2021, Russia was the sole member to veto a </span><a data-dcnode-id="7882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="7883" instrument_node="">United Nations</span></a><span data-dcnode-id="7881" instrument_node=""> Security Council resolution to recognize climate change as a global security threat.</span><sup class="reference" data-dcnode-id="7878" id="cite_ref-pannett_57-0"><a data-dcnode-id="7879" href="#cite_note-pannett-57"><span data-dcnode-id="7880" instrument_node="">[57]</span></a></sup><sup class="reference" data-dcnode-id="7875" id="cite_ref-58"><a data-dcnode-id="7876" href="#cite_note-58"><span data-dcnode-id="7877" instrument_node="">[note 1]</span></a></sup><span data-dcnode-id="7874" instrument_node="">
</span></p><span data-dcnode-id="7872" instrument_node="">
</span><h3 data-dcnode-id="7862"><span class="mw-headline" data-dcnode-id="7870" id="Human_rights_violations"><span data-dcnode-id="7871" instrument_node="">Human rights violations</span></span><span class="mw-editsection" data-dcnode-id="7863"><span class="mw-editsection-bracket" data-dcnode-id="7868"><span data-dcnode-id="7869" instrument_node="">[</span></span><a data-dcnode-id="7866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D6" title="Edit section: Human rights violations"><span data-dcnode-id="7867" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7864"><span data-dcnode-id="7865" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7861" instrument_node="">
</span><p data-dcnode-id="7817"><span data-dcnode-id="7860" instrument_node="">His record on </span><a data-dcnode-id="7858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Human_rights" title="Human rights"><span data-dcnode-id="7859" instrument_node="">human rights</span></a><span data-dcnode-id="7857" instrument_node=""> has been marked by the flattening of </span><a class="mw-redirect" data-dcnode-id="7855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Chechnya" title="Chechnya"><span data-dcnode-id="7856" instrument_node="">Chechnya</span></a><span data-dcnode-id="7854" instrument_node="">, the demolition of Georgia, the crackdown of all media, especially independently-owned media that has been critical of the Kremlin such as NTV,</span><sup class="reference" data-dcnode-id="7851" id="cite_ref-59"><a data-dcnode-id="7852" href="#cite_note-59"><span data-dcnode-id="7853" instrument_node="">[58]</span></a></sup><span data-dcnode-id="7850" instrument_node=""> the instigation of an armed conflict in eastern Ukraine that culminated in </span><a class="mw-redirect" data-dcnode-id="7848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/MH17" title="MH17"><span data-dcnode-id="7849" instrument_node="">the accidental downing of a civilian aircraft</span></a><span data-dcnode-id="7847" instrument_node="">,</span><sup class="reference" data-dcnode-id="7844" id="cite_ref-60"><a data-dcnode-id="7845" href="#cite_note-60"><span data-dcnode-id="7846" instrument_node="">[59]</span></a></sup><span data-dcnode-id="7843" instrument_node=""> the bombing of aid convoys,</span><sup class="reference" data-dcnode-id="7840" id="cite_ref-61"><a data-dcnode-id="7841" href="#cite_note-61"><span data-dcnode-id="7842" instrument_node="">[60]</span></a></sup><span data-dcnode-id="7839" instrument_node=""> the slew of Kremlin opponents dropping dead from </span><a data-dcnode-id="7837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Polonium" title="Polonium"><span data-dcnode-id="7838" instrument_node="">polonium</span></a><span data-dcnode-id="7836" instrument_node=""> poisoning,</span><sup class="reference" data-dcnode-id="7833" id="cite_ref-62"><a data-dcnode-id="7834" href="#cite_note-62"><span data-dcnode-id="7835" instrument_node="">[61]</span></a></sup><sup class="reference" data-dcnode-id="7830" id="cite_ref-63"><a data-dcnode-id="7831" href="#cite_note-63"><span data-dcnode-id="7832" instrument_node="">[62]</span></a></sup><span data-dcnode-id="7829" instrument_node=""> Russian soldiers taking long "vacations",</span><sup class="reference" data-dcnode-id="7826" id="cite_ref-64"><a data-dcnode-id="7827" href="#cite_note-64"><span data-dcnode-id="7828" instrument_node="">[63]</span></a></sup><span data-dcnode-id="7825" instrument_node=""> and the suppression and abuse of protestors.</span><sup class="reference" data-dcnode-id="7822" id="cite_ref-65"><a data-dcnode-id="7823" href="#cite_note-65"><span data-dcnode-id="7824" instrument_node="">[64]</span></a></sup><sup class="reference" data-dcnode-id="7819" id="cite_ref-66"><a data-dcnode-id="7820" href="#cite_note-66"><span data-dcnode-id="7821" instrument_node="">[65]</span></a></sup><span data-dcnode-id="7818" instrument_node=""> Only in 2017 could you be arrested for protesting a ban on protests.
</span></p><span data-dcnode-id="7816" instrument_node="">
</span><h3 data-dcnode-id="7806"><span class="mw-headline" data-dcnode-id="7814" id=".22And_Russia_has_no_gay_people..22"><span data-dcnode-id="7815" instrument_node="">"And Russia has no gay people."</span></span><span class="mw-editsection" data-dcnode-id="7807"><span class="mw-editsection-bracket" data-dcnode-id="7812"><span data-dcnode-id="7813" instrument_node="">[</span></span><a data-dcnode-id="7810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D7" title="Edit section: &quot;And Russia has no gay people.&quot;"><span data-dcnode-id="7811" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7808"><span data-dcnode-id="7809" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7805" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7789"><div class="thumbinner" data-dcnode-id="7790" style="width:167px;"><a class="image" data-dcnode-id="7803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3APutin-gay-clown.jpeg"><img alt="" class="thumbimage" data-dcnode-id="7804" height="93" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/images/thumb/2/2a/Putin-gay-clown.jpeg/165px-Putin-gay-clown.jpeg&amp;raw" srcset="/w/images/thumb/2/2a/Putin-gay-clown.jpeg/248px-Putin-gay-clown.jpeg 1.5x, /w/images/thumb/2/2a/Putin-gay-clown.jpeg/330px-Putin-gay-clown.jpeg 2x" width="165"></a><span data-dcnode-id="7802" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7791"><div class="magnify" data-dcnode-id="7800"><a class="internal" data-dcnode-id="7801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3APutin-gay-clown.jpeg" title="Enlarge"></a></div><span data-dcnode-id="7799" instrument_node="">This image is banned in Russia</span><sup class="reference" data-dcnode-id="7796" id="cite_ref-67"><a data-dcnode-id="7797" href="#cite_note-67"><span data-dcnode-id="7798" instrument_node="">[66]</span></a></sup><span data-dcnode-id="7795" instrument_node=""> because gay clown Putin is </span><i data-dcnode-id="7793"><span data-dcnode-id="7794" instrument_node="">weak</span></i><span data-dcnode-id="7792" instrument_node="">!</span></div></div></div><span data-dcnode-id="7788" instrument_node="">
</span><p data-dcnode-id="7752"><span data-dcnode-id="7787" instrument_node="">In 2012, he banned </span><a data-dcnode-id="7785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/LGBT" title="LGBT"><span data-dcnode-id="7786" instrument_node="">gay</span></a><span data-dcnode-id="7784" instrument_node=""> pride parades and protests in Moscow for 100 years,</span><sup class="reference" data-dcnode-id="7781" id="cite_ref-68"><a data-dcnode-id="7782" href="#cite_note-68"><span data-dcnode-id="7783" instrument_node="">[67]</span></a></sup><span data-dcnode-id="7780" instrument_node=""> along with a variety of other draconic restrictions on homosexual rights, doubtlessly as a way to court the </span><a class="mw-redirect" data-dcnode-id="7778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Fundamentalist" title="Fundamentalist"><span data-dcnode-id="7779" instrument_node="">fundamentalist</span></a><span data-dcnode-id="7777" instrument_node=""> vote.</span><sup class="reference" data-dcnode-id="7774" id="cite_ref-69"><a data-dcnode-id="7775" href="#cite_note-69"><span data-dcnode-id="7776" instrument_node="">[68]</span></a></sup><span data-dcnode-id="7773" instrument_node=""> Shortly after, he continued to uphold the </span><a data-dcnode-id="7771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Family_values%23The_.22traditional.22_family" title="Family values"><span data-dcnode-id="7772" instrument_node="">traditional family</span></a><span data-dcnode-id="7770" instrument_node=""> by getting </span><a data-dcnode-id="7768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Divorce" title="Divorce"><span data-dcnode-id="7769" instrument_node="">divorced</span></a><span data-dcnode-id="7767" instrument_node="">.</span><sup class="reference" data-dcnode-id="7764" id="cite_ref-70"><a data-dcnode-id="7765" href="#cite_note-70"><span data-dcnode-id="7766" instrument_node="">[69]</span></a></sup><span data-dcnode-id="7763" instrument_node=""> His support relies primarily on a "diminishing political base of older, rural, less educated citizens, blue-collar workers, and persons with a strongly </span><a class="mw-redirect" data-dcnode-id="7761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Nationalist" title="Nationalist"><span data-dcnode-id="7762" instrument_node="">nationalist</span></a><span data-dcnode-id="7760" instrument_node=""> bent" — oh wait, </span><a data-dcnode-id="7758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Donald_Trump" title="Donald Trump"><span data-dcnode-id="7759" instrument_node="">wrong politician</span></a><span data-dcnode-id="7757" instrument_node="">.</span><sup class="reference" data-dcnode-id="7754" id="cite_ref-71"><a data-dcnode-id="7755" href="#cite_note-71"><span data-dcnode-id="7756" instrument_node="">[70]</span></a></sup><span data-dcnode-id="7753" instrument_node="">
</span></p><p data-dcnode-id="7718"><span data-dcnode-id="7751" instrument_node="">Putin's hyper-masculine posturing (bareback on a horse, etc.</span><sup class="reference" data-dcnode-id="7748" id="cite_ref-72"><a data-dcnode-id="7749" href="#cite_note-72"><span data-dcnode-id="7750" instrument_node="">[71]</span></a></sup><span data-dcnode-id="7747" instrument_node="">) and his state-sanctioned </span><a data-dcnode-id="7745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Homophobia" title="Homophobia"><span data-dcnode-id="7746" instrument_node="">homophobia</span></a><span data-dcnode-id="7744" instrument_node=""> are part of a calculated plan of both domestic and foreign policy. It doesn't matter that being hyper-masculine and being gay are not mutually exclusive in the real world.</span><sup class="reference" data-dcnode-id="7741" id="cite_ref-73"><a data-dcnode-id="7742" href="#cite_note-73"><span data-dcnode-id="7743" instrument_node="">[72]</span></a></sup><sup class="reference" data-dcnode-id="7738" id="cite_ref-74"><a data-dcnode-id="7739" href="#cite_note-74"><span data-dcnode-id="7740" instrument_node="">[73]</span></a></sup><span data-dcnode-id="7737" instrument_node=""> Russian targets of homophobia have included Ukrainian politicians, the European Union, and the </span><a data-dcnode-id="7735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Western_world" title="Western world"><span data-dcnode-id="7736" instrument_node="">West</span></a><span data-dcnode-id="7734" instrument_node="">.</span><sup class="reference" data-dcnode-id="7731" id="cite_ref-unfreedom_20-14"><a data-dcnode-id="7732" href="#cite_note-unfreedom-20"><span data-dcnode-id="7733" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="7729" style="white-space:nowrap;"><span data-dcnode-id="7730" instrument_node="">:51-53,133</span></sup><span data-dcnode-id="7728" instrument_node=""> For the Russian state, attempting to smear with assertions of homosexuality is usually couched in that age-old Soviet fallacy of </span><a data-dcnode-id="7726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Whataboutism" title="Whataboutism"><span data-dcnode-id="7727" instrument_node="">whataboutism</span></a><span data-dcnode-id="7725" instrument_node=""> ("when the subject is inequality, change it to sexuality").</span><sup class="reference" data-dcnode-id="7722" id="cite_ref-unfreedom_20-15"><a data-dcnode-id="7723" href="#cite_note-unfreedom-20"><span data-dcnode-id="7724" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="7720" style="white-space:nowrap;"><span data-dcnode-id="7721" instrument_node="">:100</span></sup><span data-dcnode-id="7719" instrument_node="">
</span></p><span data-dcnode-id="7717" instrument_node="">
</span><h3 data-dcnode-id="7707"><span class="mw-headline" data-dcnode-id="7715" id="Gimmie_a_.22K.22.2C_gimmie_a_.22G.22..."><span data-dcnode-id="7716" instrument_node="">Gimmie a "K", gimmie a "G"...</span></span><span class="mw-editsection" data-dcnode-id="7708"><span class="mw-editsection-bracket" data-dcnode-id="7713"><span data-dcnode-id="7714" instrument_node="">[</span></span><a data-dcnode-id="7711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D8" title="Edit section: Gimmie a &quot;K&quot;, gimmie a &quot;G&quot;..."><span data-dcnode-id="7712" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7709"><span data-dcnode-id="7710" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7706" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7697"><div class="thumbinner" data-dcnode-id="7698" style="width:167px;"><a class="image" data-dcnode-id="7704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3ARIAN_archive_140276_Removing_rubble_at_site_of_damaged_apartment_house_on_Kashira_Highway.jpg"><img alt="" class="thumbimage" data-dcnode-id="7705" height="109" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f3/RIAN_archive_140276_Removing_rubble_at_site_of_damaged_apartment_house_on_Kashira_Highway.jpg/165px-RIAN_archive_140276_Removing_rubble_at_site_of_damaged_apartment_house_on_Kashira_Highway.jpg&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/RIAN_archive_140276_Removing_rubble_at_site_of_damaged_apartment_house_on_Kashira_Highway.jpg/248px-RIAN_archive_140276_Removing_rubble_at_site_of_damaged_apartment_house_on_Kashira_Highway.jpg 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/RIAN_archive_140276_Removing_rubble_at_site_of_damaged_apartment_house_on_Kashira_Highway.jpg/330px-RIAN_archive_140276_Removing_rubble_at_site_of_damaged_apartment_house_on_Kashira_Highway.jpg 2x" width="165"></a><span data-dcnode-id="7703" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7699"><div class="magnify" data-dcnode-id="7701"><a class="internal" data-dcnode-id="7702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3ARIAN_archive_140276_Removing_rubble_at_site_of_damaged_apartment_house_on_Kashira_Highway.jpg" title="Enlarge"></a></div><span data-dcnode-id="7700" instrument_node="">Putin's rise to power required the downfall of Russian apartment buildings</span></div></div></div><span data-dcnode-id="7696" instrument_node="">
</span><span data-dcnode-id="7695" instrument_node="">
</span><span data-dcnode-id="7694" instrument_node="">
</span><span data-dcnode-id="7675" instrument_node="">
</span><span data-dcnode-id="7674" instrument_node="">
