</span><table class="cquote" data-dcnode-id="7663" style="margin: auto; border-collapse:collapse; border-style:none; background-color:transparent;"><tbody data-dcnode-id="7664"><tr data-dcnode-id="7676"><td data-dcnode-id="7677"><div data-dcnode-id="7679" style="padding:4px 50px;position:relative;"><span data-dcnode-id="7692" style="position:absolute;left:10px;top:-6px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="7693" instrument_node="">“</span></span><span data-dcnode-id="7690" style="position:absolute;right:10px;bottom:-20px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="7691" instrument_node="">”</span></span><span data-dcnode-id="7689" instrument_node="">He has said it to the President, to Secretary </span><a data-dcnode-id="7687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/John_Kerry" title="John Kerry"><span data-dcnode-id="7688" instrument_node="">Kerry</span></a><span data-dcnode-id="7686" instrument_node="">. He even believes we sparked the </span><a data-dcnode-id="7684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Arab_Spring" title="Arab Spring"><span data-dcnode-id="7685" instrument_node="">Arab Spring</span></a><span data-dcnode-id="7683" instrument_node=""> as a </span><a data-dcnode-id="7681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/CIA" title="CIA"><span data-dcnode-id="7682" instrument_node="">C.I.A.</span></a><span data-dcnode-id="7680" instrument_node=""> operation.... He really does kind of superimpose the way his system works onto the way he thinks our system works. He grossly exaggerates the role of the C.I.A. in the making of our foreign policy.</span></div><span data-dcnode-id="7678" instrument_node="">
</span></td></tr><tr data-dcnode-id="7665"><td data-dcnode-id="7666" style="padding:4px 10px 8px;font-size:smaller;line-height:1.6em;text-align:right;"><span data-dcnode-id="7673" instrument_node=""> </span><cite data-dcnode-id="7668" style="font-style:normal;position:relative;z-index:2"><span data-dcnode-id="7672" instrument_node="">—Michael McFaul, diplomat</span><sup class="reference" data-dcnode-id="7669" id="cite_ref-75"><a data-dcnode-id="7670" href="#cite_note-75"><span data-dcnode-id="7671" instrument_node="">[74]</span></a></sup></cite><span data-dcnode-id="7667" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="7662" instrument_node="">
</span><p data-dcnode-id="7637"><span data-dcnode-id="7661" instrument_node="">In 1999, there was a disgusting terror attack in which the FSB bombed buildings (with people sleeping in them) to provide a </span><a class="mw-redirect" data-dcnode-id="7659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/False_flag" title="False flag"><span data-dcnode-id="7660" instrument_node="">pretext</span></a><span data-dcnode-id="7658" instrument_node=""> for another war with Chechnya.</span><sup class="reference" data-dcnode-id="7655" id="cite_ref-unfreedom_20-16"><a data-dcnode-id="7656" href="#cite_note-unfreedom-20"><span data-dcnode-id="7657" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="7653" style="white-space:nowrap;"><span data-dcnode-id="7654" instrument_node="">:45</span></sup><span data-dcnode-id="7652" instrument_node=""> The attacks boosted Putin's popularity and delivered him the presidency.</span><sup class="reference" data-dcnode-id="7649" id="cite_ref-76"><a data-dcnode-id="7650" href="#cite_note-76"><span data-dcnode-id="7651" instrument_node="">[75]</span></a></sup><span data-dcnode-id="7648" instrument_node=""> That case is still open, but activists, investigators, lawyers, politicians, and </span><a class="mw-redirect" data-dcnode-id="7646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Journalist" title="Journalist"><span data-dcnode-id="7647" instrument_node="">journalists</span></a><span data-dcnode-id="7645" instrument_node=""> have been dropping like flies around him for years, and no one ever bats an eye, it seems.</span><sup class="reference" data-dcnode-id="7642" id="cite_ref-77"><a data-dcnode-id="7643" href="#cite_note-77"><span data-dcnode-id="7644" instrument_node="">[76]</span></a></sup><sup class="reference" data-dcnode-id="7639" id="cite_ref-78"><a data-dcnode-id="7640" href="#cite_note-78"><span data-dcnode-id="7641" instrument_node="">[77]</span></a></sup><span data-dcnode-id="7638" instrument_node="">
</span></p><p data-dcnode-id="7615"><span data-dcnode-id="7636" instrument_node="">Remember the anti-gay propaganda bill from above? That was sponsored and proposed by extremist Irina Yarovaya, the Russian equivalent of </span><a data-dcnode-id="7634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Ted_Cruz" title="Ted Cruz"><span data-dcnode-id="7635" instrument_node="">Ted Cruz</span></a><span data-dcnode-id="7633" instrument_node="">. Why bring her up? Putin signed another Yarovaya bill into law, allowing for NSA-style surveillance of Russian citizens and explicitly bans door-to-door missionary work, which affects many of the same social conservatives </span><i data-dcnode-id="7631"><span data-dcnode-id="7632" instrument_node="">who helped ban gay propaganda</span></i><span data-dcnode-id="7630" instrument_node=""> - except the Orthodox Church, of course. </span><a data-dcnode-id="7628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Edward_Snowden" title="Edward Snowden"><span data-dcnode-id="7629" instrument_node="">Edward Snowden</span></a><span data-dcnode-id="7627" instrument_node=""> called it the "Big Brother law"; critics say it's basically the Russian version of the </span><a class="mw-redirect" data-dcnode-id="7625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/PATRIOT_Act" title="PATRIOT Act"><span data-dcnode-id="7626" instrument_node="">PATRIOT Act</span></a><span data-dcnode-id="7624" instrument_node="">.</span><sup class="reference" data-dcnode-id="7621" id="cite_ref-79"><a data-dcnode-id="7622" href="#cite_note-79"><span data-dcnode-id="7623" instrument_node="">[78]</span></a></sup><span data-dcnode-id="7620" instrument_node=""> The new measures include massive restrictions on privacy, speech, freedom of conscience, and religious expression.</span><sup class="reference" data-dcnode-id="7617" id="cite_ref-80"><a data-dcnode-id="7618" href="#cite_note-80"><span data-dcnode-id="7619" instrument_node="">[79]</span></a></sup><span data-dcnode-id="7616" instrument_node=""> Even then, some parts of it are just unenforceable - it demands that phone and internet providers keep all data for 3 years, and every major Russian telecom company has declared that impossible.
</span></p><span data-dcnode-id="7614" instrument_node="">
</span><h3 data-dcnode-id="7604"><span class="mw-headline" data-dcnode-id="7612" id="What_happens_after_him.3F"><span data-dcnode-id="7613" instrument_node="">What happens after him?</span></span><span class="mw-editsection" data-dcnode-id="7605"><span class="mw-editsection-bracket" data-dcnode-id="7610"><span data-dcnode-id="7611" instrument_node="">[</span></span><a data-dcnode-id="7608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D9" title="Edit section: What happens after him?"><span data-dcnode-id="7609" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7606"><span data-dcnode-id="7607" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7603" instrument_node="">
</span><span data-dcnode-id="7602" instrument_node="">
</span><span data-dcnode-id="7601" instrument_node="">
</span><span data-dcnode-id="7588" instrument_node="">
</span><span data-dcnode-id="7587" instrument_node="">
</span><table class="cquote" data-dcnode-id="7574" style="margin: auto; border-collapse:collapse; border-style:none; background-color:transparent;"><tbody data-dcnode-id="7575"><tr data-dcnode-id="7589"><td data-dcnode-id="7590"><div data-dcnode-id="7592" style="padding:4px 50px;position:relative;"><span data-dcnode-id="7599" style="position:absolute;left:10px;top:-6px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="7600" instrument_node="">“</span></span><span data-dcnode-id="7597" style="position:absolute;right:10px;bottom:-20px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="7598" instrument_node="">”</span></span><span data-dcnode-id="7596" instrument_node="">The very dread of what comes next generates a sense of threat that can be projected upon others as foreign policy. </span><a data-dcnode-id="7594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Totalitarianism" title="Totalitarianism"><span data-dcnode-id="7595" instrument_node="">Totalitarianism</span></a><span data-dcnode-id="7593" instrument_node=""> is its own worst enemy, and that is the secret it keeps from itself by attacking others.</span></div><span data-dcnode-id="7591" instrument_node="">
</span></td></tr><tr data-dcnode-id="7576"><td data-dcnode-id="7577" style="padding:4px 10px 8px;font-size:smaller;line-height:1.6em;text-align:right;"><span data-dcnode-id="7586" instrument_node=""> </span><cite data-dcnode-id="7579" style="font-style:normal;position:relative;z-index:2"><span data-dcnode-id="7585" instrument_node="">—Timothy Snyder</span><sup class="reference" data-dcnode-id="7582" id="cite_ref-unfreedom_20-17"><a data-dcnode-id="7583" href="#cite_note-unfreedom-20"><span data-dcnode-id="7584" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="7580" style="white-space:nowrap;"><span data-dcnode-id="7581" instrument_node="">:29</span></sup></cite><span data-dcnode-id="7578" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="7573" instrument_node="">
</span><p data-dcnode-id="7561"><span data-dcnode-id="7572" instrument_node="">Although the constitution grants enormous powers to the President, you don't think of "power" when you look at Dmitry Medvedev. If Medvedev held the cards, Putin owned the deck, and life after Putin is the great unknown for Russia. He brought the country back from a disorganized, hyper-capitalist, brutally anarchic hell and re-centralized federal authority behind a strongman whom the country adores, the typical standard of living for most of Russia's existence. But it comes with a price. </span><s data-dcnode-id="7570"><span data-dcnode-id="7571" instrument_node="">With</span></s><span data-dcnode-id="7569" instrument_node=""> without the towering figure of Putin, Russia faces a failing economy, the threat of secession (see Chechnya), a bloated bureaucracy, and an ever-present oligarchy and military-security establishment unwilling to give up their power. There is no ruling class, the oligarchs are paper tigers in the face of a strongman, the mafia is so powerful even the Kremlin has to work out deals with them, and their puppet oligarchs, the siloviki (military-security types), are basically a junta riding the coattails of the President. The actual government (from the Federal Assembly to the Prime Minister) is not popular. This Putin-centered status quo will likely not last without the man himself, and there will be jockeying for power once he finally kicks the bucket.</span><sup class="reference" data-dcnode-id="7566" id="cite_ref-81"><a data-dcnode-id="7567" href="#cite_note-81"><span data-dcnode-id="7568" instrument_node="">[80]</span></a></sup><sup class="reference" data-dcnode-id="7563" id="cite_ref-82"><a data-dcnode-id="7564" href="#cite_note-82"><span data-dcnode-id="7565" instrument_node="">[81]</span></a></sup><span data-dcnode-id="7562" instrument_node=""> Expect some murders.
</span></p><span data-dcnode-id="7560" instrument_node="">
</span><h3 data-dcnode-id="7550"><span class="mw-headline" data-dcnode-id="7558" id="Back_to_the_Purges"><span data-dcnode-id="7559" instrument_node="">Back to the Purges</span></span><span class="mw-editsection" data-dcnode-id="7551"><span class="mw-editsection-bracket" data-dcnode-id="7556"><span data-dcnode-id="7557" instrument_node="">[</span></span><a data-dcnode-id="7554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D10" title="Edit section: Back to the Purges"><span data-dcnode-id="7555" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7552"><span data-dcnode-id="7553" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7549" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7540"><div class="thumbinner" data-dcnode-id="7541" style="width:302px;"><a class="image" data-dcnode-id="7547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3AApotheosis.jpg"><img alt="" class="thumbimage" data-dcnode-id="7548" height="191" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/18/Apotheosis.jpg/300px-Apotheosis.jpg&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/Apotheosis.jpg/450px-Apotheosis.jpg 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/Apotheosis.jpg/600px-Apotheosis.jpg 2x" width="300"></a><span data-dcnode-id="7546" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7542"><div class="magnify" data-dcnode-id="7544"><a class="internal" data-dcnode-id="7545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3AApotheosis.jpg" title="Enlarge"></a></div><span data-dcnode-id="7543" instrument_node="">The Apotheosis of War: illegal to display in Russia since March 2022</span></div></div></div><span data-dcnode-id="7539" instrument_node="">
</span><span data-dcnode-id="7538" instrument_node="">
</span><span data-dcnode-id="7537" instrument_node="">
</span><span data-dcnode-id="7521" instrument_node="">
</span><span data-dcnode-id="7520" instrument_node="">
</span><table class="cquote" data-dcnode-id="7509" style="margin: auto; border-collapse:collapse; border-style:none; background-color:transparent;"><tbody data-dcnode-id="7510"><tr data-dcnode-id="7522"><td data-dcnode-id="7523"><div data-dcnode-id="7525" style="padding:4px 50px;position:relative;"><span data-dcnode-id="7535" style="position:absolute;left:10px;top:-6px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="7536" instrument_node="">“</span></span><span data-dcnode-id="7533" style="position:absolute;right:10px;bottom:-20px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="7534" instrument_node="">”</span></span><span data-dcnode-id="7532" instrument_node="">What does this mean? In sum: a rooting out of anyone accused of being 'un-Russian' in thinking or culture — a </span><a class="mw-redirect" data-dcnode-id="7530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Racist" title="Racist"><span data-dcnode-id="7531" instrument_node="">racist</span></a><span data-dcnode-id="7529" instrument_node=""> and political purge; carte blanche to build a new empire all over the old USSR; and a full embrace of a new </span><a data-dcnode-id="7527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/State_religion" title="State religion"><span data-dcnode-id="7528" instrument_node="">state religion</span></a><span data-dcnode-id="7526" instrument_node="">.</span></div><span data-dcnode-id="7524" instrument_node="">
</span></td></tr><tr data-dcnode-id="7511"><td data-dcnode-id="7512" style="padding:4px 10px 8px;font-size:smaller;line-height:1.6em;text-align:right;"><span data-dcnode-id="7519" instrument_node=""> </span><cite data-dcnode-id="7514" style="font-style:normal;position:relative;z-index:2"><span data-dcnode-id="7518" instrument_node="">—Ian Garner</span><sup class="reference" data-dcnode-id="7515" id="cite_ref-83"><a data-dcnode-id="7516" href="#cite_note-83"><span data-dcnode-id="7517" instrument_node="">[82]</span></a></sup></cite><span data-dcnode-id="7513" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="7508" instrument_node="">
</span><p data-dcnode-id="7496"><span data-dcnode-id="7507" instrument_node="">In 2016, Putin enacted a purge against some of the titans of the country. Many of these men were friends, business partners, members of the Saint Petersburg establishment, or fellow colleagues in the KGB. Their removals were sudden and unexpected. Their replacements consisted of sycophants like Anton Vaino (Kremlin Chief of Staff), who grew up only knowing Putin as the head of the country. The purged names include Vladimir Yakunin, CEO of the Russian Railways; former Chief of Staff Sergey Ivanov, his longtime ally and one-time rival to Medvedev for the Presidency; Yevgeny Murov, former head of the Federal Protection Service; Viktor Ivanov, former head of the Federal Narcotics Service; Konstantin Romodanovsky, former head of the Migration Service; Andrei Belianinov, former head of the Customs Service; and Sergey Naryshkin, former Chairman of the State Duma.</span><sup class="reference" data-dcnode-id="7504" id="cite_ref-84"><a data-dcnode-id="7505" href="#cite_note-84"><span data-dcnode-id="7506" instrument_node="">[83]</span></a></sup><sup class="reference" data-dcnode-id="7501" id="cite_ref-85"><a data-dcnode-id="7502" href="#cite_note-85"><span data-dcnode-id="7503" instrument_node="">[84]</span></a></sup><sup class="reference" data-dcnode-id="7498" id="cite_ref-86"><a data-dcnode-id="7499" href="#cite_note-86"><span data-dcnode-id="7500" instrument_node="">[85]</span></a></sup><span data-dcnode-id="7497" instrument_node="">
</span></p><p data-dcnode-id="7475"><span data-dcnode-id="7495" instrument_node="">Leading up to and during the full-scale Russian invasion of Ukraine in 2022, Russia began purging all dissent from the country. The purges have resulted in large-scale arrests of public protesters,</span><sup class="reference" data-dcnode-id="7492" id="cite_ref-87"><a data-dcnode-id="7493" href="#cite_note-87"><span data-dcnode-id="7494" instrument_node="">[86]</span></a></sup><sup class="reference" data-dcnode-id="7489" id="cite_ref-88"><a data-dcnode-id="7490" href="#cite_note-88"><span data-dcnode-id="7491" instrument_node="">[87]</span></a></sup><span data-dcnode-id="7488" instrument_node=""> and the shutting down of nearly all independent media within Russia.</span><sup class="reference" data-dcnode-id="7485" id="cite_ref-89"><a data-dcnode-id="7486" href="#cite_note-89"><span data-dcnode-id="7487" instrument_node="">[88]</span></a></sup><span data-dcnode-id="7484" instrument_node=""> It is now so bad that people have been arrested for holding blank placards in public or for displaying the 1871 painting by Russian Vasily Vereshchagin, "The Apotheosis of War".</span><sup class="reference" data-dcnode-id="7481" id="cite_ref-dixon_90-0"><a data-dcnode-id="7482" href="#cite_note-dixon-90"><span data-dcnode-id="7483" instrument_node="">[89]</span></a></sup><span data-dcnode-id="7480" instrument_node=""> People are being encouraged to denounce each other.</span><sup class="reference" data-dcnode-id="7477" id="cite_ref-dixon_90-1"><a data-dcnode-id="7478" href="#cite_note-dixon-90"><span data-dcnode-id="7479" instrument_node="">[89]</span></a></sup><span data-dcnode-id="7476" instrument_node="">
</span></p><span data-dcnode-id="7474" instrument_node="">
</span><h3 data-dcnode-id="7464"><span class="mw-headline" data-dcnode-id="7472" id="USSR_cover_band"><span data-dcnode-id="7473" instrument_node="">USSR cover band</span></span><span class="mw-editsection" data-dcnode-id="7465"><span class="mw-editsection-bracket" data-dcnode-id="7470"><span data-dcnode-id="7471" instrument_node="">[</span></span><a data-dcnode-id="7468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D11" title="Edit section: USSR cover band"><span data-dcnode-id="7469" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7466"><span data-dcnode-id="7467" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7463" instrument_node="">
</span><span data-dcnode-id="7462" instrument_node="">
</span><span data-dcnode-id="7461" instrument_node="">
</span><span data-dcnode-id="7451" instrument_node="">
</span><span data-dcnode-id="7450" instrument_node="">
</span><table class="cquote" data-dcnode-id="7439" style="margin: auto; border-collapse:collapse; border-style:none; background-color:transparent;"><tbody data-dcnode-id="7440"><tr data-dcnode-id="7452"><td data-dcnode-id="7453"><div data-dcnode-id="7455" style="padding:4px 50px;position:relative;"><span data-dcnode-id="7459" style="position:absolute;left:10px;top:-6px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="7460" instrument_node="">“</span></span><span data-dcnode-id="7457" style="position:absolute;right:10px;bottom:-20px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="7458" instrument_node="">”</span></span><span data-dcnode-id="7456" instrument_node="">People in Russia say that those who do not regret the collapse of the Soviet Union have no heart, and those that do regret it have no brain.</span></div><span data-dcnode-id="7454" instrument_node="">
</span></td></tr><tr data-dcnode-id="7441"><td data-dcnode-id="7442" style="padding:4px 10px 8px;font-size:smaller;line-height:1.6em;text-align:right;"><span data-dcnode-id="7449" instrument_node=""> </span><cite data-dcnode-id="7444" style="font-style:normal;position:relative;z-index:2"><span data-dcnode-id="7448" instrument_node="">—Vladimir Putin Mk. MMV, before losing his brain nine years later</span><sup class="reference" data-dcnode-id="7445" id="cite_ref-91"><a data-dcnode-id="7446" href="#cite_note-91"><span data-dcnode-id="7447" instrument_node="">[90]</span></a></sup></cite><span data-dcnode-id="7443" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="7438" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7427"><div class="thumbinner" data-dcnode-id="7428" style="width:252px;"><a class="image" data-dcnode-id="7436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3AObamaPutin1.JPG"><img alt="" class="thumbimage" data-dcnode-id="7437" height="141" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/images/thumb/a/ae/ObamaPutin1.JPG/250px-ObamaPutin1.JPG&amp;raw" srcset="/w/images/a/ae/ObamaPutin1.JPG 1.5x, /w/images/a/ae/ObamaPutin1.JPG 2x" width="250"></a><span data-dcnode-id="7435" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7429"><div class="magnify" data-dcnode-id="7433"><a class="internal" data-dcnode-id="7434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3AObamaPutin1.JPG" title="Enlarge"></a></div><span data-dcnode-id="7432" instrument_node="">He's not exactly fun to be around. </span><a class="external text" data-dcnode-id="7430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archive.is/27PDQ" rel="nofollow"><span data-dcnode-id="7431" instrument_node="">But...</span></a></div></div></div><span data-dcnode-id="7426" instrument_node="">
</span><p data-dcnode-id="7396"><span data-dcnode-id="7425" instrument_node="">Russia continues to back separatists in </span><a data-dcnode-id="7423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/South_Ossetia" title="South Ossetia"><span data-dcnode-id="7424" instrument_node="">South Ossetia</span></a><span data-dcnode-id="7422" instrument_node="">, Abkhazia, </span><a data-dcnode-id="7420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Transnistria" title="Transnistria"><span data-dcnode-id="7421" instrument_node="">Transnistria</span></a><span data-dcnode-id="7419" instrument_node="">, </span><a data-dcnode-id="7417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Georgia_%28country%29" title="Georgia (country)"><span data-dcnode-id="7418" instrument_node="">Georgia</span></a><span data-dcnode-id="7416" instrument_node="">, </span><a data-dcnode-id="7414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Azerbaijan" title="Azerbaijan"><span data-dcnode-id="7415" instrument_node="">Azerbaijan</span></a><span data-dcnode-id="7413" instrument_node="">, </span><a data-dcnode-id="7411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Armenia" title="Armenia"><span data-dcnode-id="7412" instrument_node="">Armenia</span></a><span data-dcnode-id="7410" instrument_node="">, </span><a data-dcnode-id="7408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Moldova" title="Moldova"><span data-dcnode-id="7409" instrument_node="">Moldova</span></a><span data-dcnode-id="7407" instrument_node="">, and, er...</span><a class="mw-redirect" data-dcnode-id="7405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Texas" title="Texas"><span data-dcnode-id="7406" instrument_node="">Texas</span></a><span data-dcnode-id="7404" instrument_node="">?</span><sup class="reference" data-dcnode-id="7401" id="cite_ref-92"><a data-dcnode-id="7402" href="#cite_note-92"><span data-dcnode-id="7403" instrument_node="">[91]</span></a></sup><sup class="reference" data-dcnode-id="7398" id="cite_ref-93"><a data-dcnode-id="7399" href="#cite_note-93"><span data-dcnode-id="7400" instrument_node="">[92]</span></a></sup><span data-dcnode-id="7397" instrument_node="">
</span></p><p data-dcnode-id="7357"><span data-dcnode-id="7395" instrument_node="">Putin has said that </span><a class="mw-redirect" data-dcnode-id="7393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Stalin" title="Stalin"><span data-dcnode-id="7394" instrument_node="">Stalin</span></a><span data-dcnode-id="7392" instrument_node="">'s legacy </span><a data-dcnode-id="7390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Not_even_wrong" title="Not even wrong"><span data-dcnode-id="7391" instrument_node="">can't be judged in black and white</span></a><span data-dcnode-id="7389" instrument_node="">.</span><sup class="reference" data-dcnode-id="7386" id="cite_ref-94"><a data-dcnode-id="7387" href="#cite_note-94"><span data-dcnode-id="7388" instrument_node="">[93]</span></a></sup><span data-dcnode-id="7385" instrument_node=""> Putin's policies have been likened to the </span><a class="mw-redirect" data-dcnode-id="7383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Soviet" title="Soviet"><span data-dcnode-id="7384" instrument_node="">Soviet</span></a><span data-dcnode-id="7382" instrument_node=""> era, which has received a lukewarm response from </span><a data-dcnode-id="7380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Communist_Party_of_the_Russian_Federation" title="Communist Party of the Russian Federation"><span data-dcnode-id="7381" instrument_node="">Russian Communist</span></a><span data-dcnode-id="7379" instrument_node=""> leader Gennady Zyuganov.</span><sup class="reference" data-dcnode-id="7376" id="cite_ref-95"><a data-dcnode-id="7377" href="#cite_note-95"><span data-dcnode-id="7378" instrument_node="">[94]</span></a></sup><sup class="reference" data-dcnode-id="7373" id="cite_ref-96"><a data-dcnode-id="7374" href="#cite_note-96"><span data-dcnode-id="7375" instrument_node="">[95]</span></a></sup><span data-dcnode-id="7372" instrument_node=""> 
Within days of wrapping up an international celebration of peace and cooperation through sport, he </span><a data-dcnode-id="7370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Ukraine%23Euromaidan.2C_Crimean_crisis_and_further_dickery" title="Ukraine"><span data-dcnode-id="7371" instrument_node="">annexed parts of Ukraine</span></a><span data-dcnode-id="7369" instrument_node=""> after they kicked out their pro-Putin president. It was a significant PR blunder,</span><sup class="reference" data-dcnode-id="7366" id="cite_ref-97"><a data-dcnode-id="7367" href="#cite_note-97"><span data-dcnode-id="7368" instrument_node="">[96]</span></a></sup><sup class="reference" data-dcnode-id="7363" id="cite_ref-98"><a data-dcnode-id="7364" href="#cite_note-98"><span data-dcnode-id="7365" instrument_node="">[97]</span></a></sup><span data-dcnode-id="7362" instrument_node=""> leading some commentators to wonder if Putin had finally lost his marbles.</span><sup class="reference" data-dcnode-id="7359" id="cite_ref-99"><a data-dcnode-id="7360" href="#cite_note-99"><span data-dcnode-id="7361" instrument_node="">[98]</span></a></sup><span data-dcnode-id="7358" instrument_node="">
</span></p><p data-dcnode-id="7344"><span data-dcnode-id="7356" instrument_node="">Russia has basically been waging economic war on the EU for years. That's a significant reason they invaded Ukraine: it was getting too close to the EU, e.g., major gas pipelines.</span><sup class="reference" data-dcnode-id="7353" id="cite_ref-100"><a data-dcnode-id="7354" href="#cite_note-100"><span data-dcnode-id="7355" instrument_node="">[99]</span></a></sup><span data-dcnode-id="7352" instrument_node=""> (More importantly, Ukraine was making noises about joining </span><a data-dcnode-id="7350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/NATO" title="NATO"><span data-dcnode-id="7351" instrument_node="">NATO</span></a><span data-dcnode-id="7349" instrument_node="">.</span><sup class="reference" data-dcnode-id="7346" id="cite_ref-101"><a data-dcnode-id="7347" href="#cite_note-101"><span data-dcnode-id="7348" instrument_node="">[100]</span></a></sup><span data-dcnode-id="7345" instrument_node=""> Putin went in before they could.)
</span></p><p data-dcnode-id="7313"><span data-dcnode-id="7343" instrument_node="">Contrary to a popular opinion, Putin most likely doesn't want the EU to disintegrate (Russia has very strong economic ties to the European Union, and if the EU ceased to exist, it would be a disaster for the Russian economy);</span><sup class="reference" data-dcnode-id="7340" id="cite_ref-102"><a data-dcnode-id="7341" href="#cite_note-102"><span data-dcnode-id="7342" instrument_node="">[101]</span></a></sup><span data-dcnode-id="7339" instrument_node=""> however, he certainly wouldn't mind it becoming somewhat less united and more amenable, and </span><a data-dcnode-id="7337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/RT" title="RT"><span data-dcnode-id="7338" instrument_node="">RT</span></a><span data-dcnode-id="7336" instrument_node=""> is producing propaganda to that end. The </span><a class="mw-redirect" data-dcnode-id="7334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Eurozone_crisis" title="Eurozone crisis"><span data-dcnode-id="7335" instrument_node="">Eurozone crisis</span></a><span data-dcnode-id="7333" instrument_node=""> significantly weakened the EU when Russia was pushing itself forward. Brussels can't speak with a single voice for Europe. It is absolutely in Putin's character to try to control the narrative in areas previously part of the Soviet </span><a class="extiw" data-dcnode-id="7330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/sphere_of_influence" rel="nofollow" title="wp:sphere of influence"><span data-dcnode-id="7331" style="color:#477979 !important;" title="Wikipedia: sphere of influence"><span data-dcnode-id="7332" instrument_node="">sphere of influence</span></span></a><sup data-dcnode-id="7328"><img alt="Wikipedia" data-dcnode-id="7329" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%2527s_W.svg/12px-Wikipedia%2527s_W.svg.png&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/18px-Wikipedia%27s_W.svg.png 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/24px-Wikipedia%27s_W.svg.png 2x" width="12"></sup><span data-dcnode-id="7327" instrument_node="">. This would include some non-NATO countries, like </span><a data-dcnode-id="7325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Georgia" title="Georgia"><span data-dcnode-id="7326" instrument_node="">Georgia</span></a><span data-dcnode-id="7324" instrument_node=""> and Ukraine; judging by Putin's more interesting adventures, the goal seems to be preventing them from </span><i data-dcnode-id="7322"><span data-dcnode-id="7323" instrument_node="">ever</span></i><span data-dcnode-id="7321" instrument_node=""> joining NATO. It won't be surprising if a few countries have more pro-Russian agitators than in years past.</span><sup class="reference" data-dcnode-id="7318" id="cite_ref-103"><a data-dcnode-id="7319" href="#cite_note-103"><span data-dcnode-id="7320" instrument_node="">[102]</span></a></sup><sup class="reference" data-dcnode-id="7315" id="cite_ref-104"><a data-dcnode-id="7316" href="#cite_note-104"><span data-dcnode-id="7317" instrument_node="">[103]</span></a></sup><span data-dcnode-id="7314" instrument_node="">
</span></p><span data-dcnode-id="7312" instrument_node="">
</span><h3 data-dcnode-id="7302"><span class="mw-headline" data-dcnode-id="7310" id="If_I_Were_A_Rich_Man"><span data-dcnode-id="7311" instrument_node="">If I Were A Rich Man</span></span><span class="mw-editsection" data-dcnode-id="7303"><span class="mw-editsection-bracket" data-dcnode-id="7308"><span data-dcnode-id="7309" instrument_node="">[</span></span><a data-dcnode-id="7306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D12" title="Edit section: If I Were A Rich Man"><span data-dcnode-id="7307" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7304"><span data-dcnode-id="7305" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7301" instrument_node="">
</span><p data-dcnode-id="7292"><span data-dcnode-id="7300" instrument_node="">Bill Browder, a former fund manager in Russia, estimated that Putin has amassed US$200 billion, but officially he is worth only about $200,000.00 (!). He spent most of it on </span><a class="external text" data-dcnode-id="7298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//carolynyeager.net/sites/default/files/styles/large/public/vladimir_putin_and_botox.jpg%3Fw%3D240" rel="nofollow"><span data-dcnode-id="7299" instrument_node="">fillers</span></a><span data-dcnode-id="7297" instrument_node="">, though.</span><sup class="reference" data-dcnode-id="7294" id="cite_ref-105"><a data-dcnode-id="7295" href="#cite_note-105"><span data-dcnode-id="7296" instrument_node="">[104]</span></a></sup><span data-dcnode-id="7293" instrument_node="">
</span></p><p data-dcnode-id="7273"><span data-dcnode-id="7291" instrument_node="">For comparison, as of late 2017, the "official" richest person in the world (the person who verifiably has the most wealth in their own name) is Jeff Bezos, the founder of Amazon, whose net worth is around $100 billion (though fluctuating wildly). Second is </span><a data-dcnode-id="7289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Microsoft" title="Microsoft"><span data-dcnode-id="7290" instrument_node="">Microsoft</span></a><span data-dcnode-id="7288" instrument_node=""> co-founder </span><a data-dcnode-id="7286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Bill_Gates" title="Bill Gates"><span data-dcnode-id="7287" instrument_node="">Bill Gates</span></a><span data-dcnode-id="7285" instrument_node="">, at around $90 billion. According to Browder, Putin doesn't really need any wealth because he has absolute power and there is just an illusion of </span><a class="mw-redirect" data-dcnode-id="7283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Oligarchy" title="Oligarchy"><span data-dcnode-id="7284" instrument_node="">oligarchy</span></a><span data-dcnode-id="7282" instrument_node="">.</span><sup class="reference" data-dcnode-id="7279" id="cite_ref-106"><a data-dcnode-id="7280" href="#cite_note-106"><span data-dcnode-id="7281" instrument_node="">[105]</span></a></sup><span data-dcnode-id="7278" instrument_node=""> The lack of a real oligarchy became apparent when Mikhail Khodorkovsky was imprisoned and later exiled for annoying the boss.</span><sup class="reference" data-dcnode-id="7275" id="cite_ref-107"><a data-dcnode-id="7276" href="#cite_note-107"><span data-dcnode-id="7277" instrument_node="">[106]</span></a></sup><span data-dcnode-id="7274" instrument_node="">
</span></p><p data-dcnode-id="7261"><span data-dcnode-id="7272" instrument_node="">According to </span><a class="extiw" data-dcnode-id="7269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexei_Navalny" rel="nofollow" title="wp:Alexei Navalny"><span data-dcnode-id="7270" style="color:#477979 !important;" title="Wikipedia: Alexei Navalny"><span data-dcnode-id="7271" instrument_node="">Alexei Navalny</span></span></a><sup data-dcnode-id="7267"><img alt="Wikipedia" data-dcnode-id="7268" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%2527s_W.svg/12px-Wikipedia%2527s_W.svg.png&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/18px-Wikipedia%27s_W.svg.png 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/24px-Wikipedia%27s_W.svg.png 2x" width="12"></sup><span data-dcnode-id="7266" instrument_node="">, Russia's opposition leader and anti-corruption activist, Putin owns a massive residence totally worth more than billion dollars.</span><sup class="reference" data-dcnode-id="7263" id="cite_ref-108"><a data-dcnode-id="7264" href="#cite_note-108"><span data-dcnode-id="7265" instrument_node="">[107]</span></a></sup><span data-dcnode-id="7262" instrument_node="">
</span></p><span data-dcnode-id="7260" instrument_node="">
</span><h3 data-dcnode-id="7250"><span class="mw-headline" data-dcnode-id="7258" id="Science_and_technology"><span data-dcnode-id="7259" instrument_node="">Science and technology</span></span><span class="mw-editsection" data-dcnode-id="7251"><span class="mw-editsection-bracket" data-dcnode-id="7256"><span data-dcnode-id="7257" instrument_node="">[</span></span><a data-dcnode-id="7254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D13" title="Edit section: Science and technology"><span data-dcnode-id="7255" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7252"><span data-dcnode-id="7253" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7249" instrument_node="">
</span><p data-dcnode-id="7244"><span data-dcnode-id="7248" instrument_node="">Putin has expressed </span><a class="mw-redirect" data-dcnode-id="7246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Doublethink" title="Doublethink"><span data-dcnode-id="7247" instrument_node="">contradictory views</span></a><span data-dcnode-id="7245" instrument_node=""> on new technologies: 
</span></p><span data-dcnode-id="7243" instrument_node="">
</span><blockquote class="letter" data-dcnode-id="7234" style="width:auto; background:#f8f8ff; border:1px solid #C9C9CF;"><span data-dcnode-id="7242" instrument_node="">
</span><p data-dcnode-id="7236"><span data-dcnode-id="7241" instrument_node="">I believe that [new] business models are not a threat to existing ones.
[...]
But, objectively, they do represent a threat.</span><sup class="reference" data-dcnode-id="7238" id="cite_ref-109"><a data-dcnode-id="7239" href="#cite_note-109"><span data-dcnode-id="7240" instrument_node="">[108]</span></a></sup><span data-dcnode-id="7237" instrument_node="">
</span></p><span data-dcnode-id="7235" instrument_node="">
</span></blockquote><span data-dcnode-id="7233" instrument_node="">
</span><p data-dcnode-id="7209"><span data-dcnode-id="7232" instrument_node="">Putin has given official state support for innovation and has said Russia can build a vibrant and diversified economy through technical and scientific prowess.</span><sup class="reference" data-dcnode-id="7229" id="cite_ref-NyTimes_Aug_2017_110-0"><a data-dcnode-id="7230" href="#cite_note-NyTimes_Aug_2017-110"><span data-dcnode-id="7231" instrument_node="">[109]</span></a></sup><span data-dcnode-id="7228" instrument_node=""> However, the Russian state often stifles growth and undermines this goal through widespread corruption, the increasing power of Russian security services, as well as insufficient democratic checks and balances.</span><sup class="reference" data-dcnode-id="7225" id="cite_ref-NyTimes_Aug_2017_110-1"><a data-dcnode-id="7226" href="#cite_note-NyTimes_Aug_2017-110"><span data-dcnode-id="7227" instrument_node="">[109]</span></a></sup><span data-dcnode-id="7224" instrument_node=""> The controversial arrest of physicist Dmitri Trubitsyn caused outrage among scientists in Russia, who viewed it as contradictory to Russia's stated economic aims.</span><sup class="reference" data-dcnode-id="7221" id="cite_ref-NyTimes_Aug_2017_110-2"><a data-dcnode-id="7222" href="#cite_note-NyTimes_Aug_2017-110"><span data-dcnode-id="7223" instrument_node="">[109]</span></a></sup><span data-dcnode-id="7220" instrument_node=""> According to Russian writer </span><a class="extiw" data-dcnode-id="7217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alfred_Koch" rel="nofollow" title="wp:Alfred Koch"><span data-dcnode-id="7218" style="color:#477979 !important;" title="Wikipedia: Alfred Koch"><span data-dcnode-id="7219" instrument_node="">Alfred Koch</span></span></a><sup data-dcnode-id="7215"><img alt="Wikipedia" data-dcnode-id="7216" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%2527s_W.svg/12px-Wikipedia%2527s_W.svg.png&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/18px-Wikipedia%27s_W.svg.png 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/24px-Wikipedia%27s_W.svg.png 2x" width="12"></sup><span data-dcnode-id="7214" instrument_node="">, Putin has taken steps to destroy higher education and cut the financing of science because he considers the thinking and educated to be a threat to his regime.</span><sup class="reference" data-dcnode-id="7211" id="cite_ref-111"><a data-dcnode-id="7212" href="#cite_note-111"><span data-dcnode-id="7213" instrument_node="">[110]</span></a></sup><span data-dcnode-id="7210" instrument_node="">
</span></p><p data-dcnode-id="7189"><span data-dcnode-id="7208" instrument_node="">Putin has been described as a luddite since he does not have a smartphone, doesn't use email and doesn't have any social network accounts.</span><sup class="reference" data-dcnode-id="7205" id="cite_ref-112"><a data-dcnode-id="7206" href="#cite_note-112"><span data-dcnode-id="7207" instrument_node="">[111]</span></a></sup><span data-dcnode-id="7204" instrument_node=""> He has also described the internet as a "CIA project".</span><sup class="reference" data-dcnode-id="7201" id="cite_ref-113"><a data-dcnode-id="7202" href="#cite_note-113"><span data-dcnode-id="7203" instrument_node="">[112]</span></a></sup><span data-dcnode-id="7200" instrument_node=""> According to </span><i data-dcnode-id="7198"><span data-dcnode-id="7199" instrument_node="">Time</span></i><span data-dcnode-id="7197" instrument_node="">, Putin's apparent </span><a class="new" data-dcnode-id="7195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DTechnophobia%26action%3Dedit%26redlink%3D1" title="Technophobia (page does not exist)"><span data-dcnode-id="7196" instrument_node="">technophobia</span></a><span data-dcnode-id="7194" instrument_node=""> is due to his knowledge of KGB eavesdropping practices and he wants to make it as easy as possible to keep his conversations private.</span><sup class="reference" data-dcnode-id="7191" id="cite_ref-114"><a data-dcnode-id="7192" href="#cite_note-114"><span data-dcnode-id="7193" instrument_node="">[113]</span></a></sup><span data-dcnode-id="7190" instrument_node="">
</span></p><p data-dcnode-id="7180"><span data-dcnode-id="7188" instrument_node="">Recently, he has condemned </span><a data-dcnode-id="7186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Bitcoin" title="Bitcoin"><span data-dcnode-id="7187" instrument_node="">Bitcoin</span></a><span data-dcnode-id="7185" instrument_node=""> and called for Russia to impose a ban on digital currencies.</span><sup class="reference" data-dcnode-id="7182" id="cite_ref-115"><a data-dcnode-id="7183" href="#cite_note-115"><span data-dcnode-id="7184" instrument_node="">[114]</span></a></sup><span data-dcnode-id="7181" instrument_node="">
</span></p><span data-dcnode-id="7179" instrument_node="">
</span><h3 data-dcnode-id="7169"><span class="mw-headline" data-dcnode-id="7177" id="Pussy_Riot"><span data-dcnode-id="7178" instrument_node="">Pussy Riot</span></span><span class="mw-editsection" data-dcnode-id="7170"><span class="mw-editsection-bracket" data-dcnode-id="7175"><span data-dcnode-id="7176" instrument_node="">[</span></span><a data-dcnode-id="7173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D14" title="Edit section: Pussy Riot"><span data-dcnode-id="7174" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7171"><span data-dcnode-id="7172" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7168" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7159"><div class="thumbinner" data-dcnode-id="7160" style="width:252px;"><a class="image" data-dcnode-id="7166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3APussy_Riot_by_Igor_Mukhin.jpg"><img alt="" class="thumbimage" data-dcnode-id="7167" height="169" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Pussy_Riot_by_Igor_Mukhin.jpg/250px-Pussy_Riot_by_Igor_Mukhin.jpg&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Pussy_Riot_by_Igor_Mukhin.jpg/375px-Pussy_Riot_by_Igor_Mukhin.jpg 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Pussy_Riot_by_Igor_Mukhin.jpg/500px-Pussy_Riot_by_Igor_Mukhin.jpg 2x" width="250"></a><span data-dcnode-id="7165" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7161"><div class="magnify" data-dcnode-id="7163"><a class="internal" data-dcnode-id="7164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3APussy_Riot_by_Igor_Mukhin.jpg" title="Enlarge"></a></div><span data-dcnode-id="7162" instrument_node="">Some of the grrls.</span></div></div></div><span data-dcnode-id="7158" instrument_node="">
</span><p data-dcnode-id="7145"><a class="extiw" data-dcnode-id="7155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pussy_Riot" rel="nofollow" title="wp:Pussy Riot"><span data-dcnode-id="7156" style="color:#477979 !important;" title="Wikipedia: Pussy Riot"><span data-dcnode-id="7157" instrument_node="">Pussy Riot</span></span></a><sup data-dcnode-id="7153"><img alt="Wikipedia" data-dcnode-id="7154" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%2527s_W.svg/12px-Wikipedia%2527s_W.svg.png&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/18px-Wikipedia%27s_W.svg.png 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/24px-Wikipedia%27s_W.svg.png 2x" width="12"></sup><span data-dcnode-id="7152" instrument_node=""> is a feminist Russian all-female </span><a data-dcnode-id="7150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Punk" title="Punk"><span data-dcnode-id="7151" instrument_node="">punk</span></a><span data-dcnode-id="7149" instrument_node=""> band. They attracted international attention after staging an unauthorised concert in Moscow's Cathedral of Christ the Saviour in February 2012 - performing songs which denounced Vladimir Putin — and three of them were arrested for 'hooliganism'. One reason that the cathedral was selected for the protest is the support for Putin given by </span><a data-dcnode-id="7147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Eastern_Orthodox_Church" title="Eastern Orthodox Church"><span data-dcnode-id="7148" instrument_node="">Russian Orthodox Church</span></a><span data-dcnode-id="7146" instrument_node=""> leader, Patriarch Kirill.
</span></p><p data-dcnode-id="7137"><span data-dcnode-id="7144" instrument_node="">Their case has aroused widespread concern after claims of harsh treatment while in custody, and a harsh sentence for what is seen by many as an issue of </span><a data-dcnode-id="7142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Freedom_of_speech" title="Freedom of speech"><span data-dcnode-id="7143" instrument_node="">free speech</span></a><span data-dcnode-id="7141" instrument_node="">. The federal prosecutor's demand for a custodial sentence is seen as a return to hard-line </span><a data-dcnode-id="7139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="7140" instrument_node="">Soviet era</span></a><span data-dcnode-id="7138" instrument_node=""> quashing of dissent by Putin.
</span></p><p data-dcnode-id="7114"><span data-dcnode-id="7136" instrument_node="">In August 2012, three members of Pussy Riot were sentenced to two years' imprisonment for their role in the Cathedral of Christ concert.</span><sup class="reference" data-dcnode-id="7133" id="cite_ref-116"><a data-dcnode-id="7134" href="#cite_note-116"><span data-dcnode-id="7135" instrument_node="">[115]</span></a></sup><span data-dcnode-id="7132" instrument_node=""> According to reports, one member was hospitalised because of illnesses she contracted as a result of prison work.</span><sup class="reference" data-dcnode-id="7129" id="cite_ref-117"><a data-dcnode-id="7130" href="#cite_note-117"><span data-dcnode-id="7131" instrument_node="">[116]</span></a></sup><span data-dcnode-id="7128" instrument_node=""> One member, Yekaterina Samutsevich, was released in 2012. The remaining pair, Maria Alyokhina and Nadezhda Tolokonnikova, were released from prison in the lead-up to the 2014 Winter Olympics, and (according to an anonymous statement on behalf of some of the band's members) booted from the band because they </span><s data-dcnode-id="7124"><span data-dcnode-id="7127" instrument_node="">joined the </span><a data-dcnode-id="7125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Life_of_Brian" title="Life of Brian"><span data-dcnode-id="7126" instrument_node="">Judean People's Front</span></a></s><span data-dcnode-id="7123" instrument_node=""> abandoned the group's original political values.</span><sup class="reference" data-dcnode-id="7120" id="cite_ref-118"><a data-dcnode-id="7121" href="#cite_note-118"><span data-dcnode-id="7122" instrument_node="">[117]</span></a></sup><span data-dcnode-id="7119" instrument_node=""> This is, however, called into a little bit of doubt by the fact that both were in the band's performance at the Olympics, where they were attacked with whips and pepper spray by security.</span><sup class="reference" data-dcnode-id="7116" id="cite_ref-119"><a data-dcnode-id="7117" href="#cite_note-119"><span data-dcnode-id="7118" instrument_node="">[118]</span></a></sup><span data-dcnode-id="7115" instrument_node="">
</span></p><span data-dcnode-id="7113" instrument_node="">
</span><h2 data-dcnode-id="7103"><span class="mw-headline" data-dcnode-id="7111" id="International_support"><span data-dcnode-id="7112" instrument_node="">International support</span></span><span class="mw-editsection" data-dcnode-id="7104"><span class="mw-editsection-bracket" data-dcnode-id="7109"><span data-dcnode-id="7110" instrument_node="">[</span></span><a data-dcnode-id="7107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D15" title="Edit section: International support"><span data-dcnode-id="7108" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7105"><span data-dcnode-id="7106" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7102" instrument_node="">
</span><div class="hatnote" data-dcnode-id="7098" role="note"><span data-dcnode-id="7101" instrument_node="">See the main article on this topic: </span><a data-dcnode-id="7099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Horseshoe_theory" title="Horseshoe theory"><span data-dcnode-id="7100" instrument_node="">Horseshoe theory</span></a></div><span data-dcnode-id="7097" instrument_node="">
</span><span data-dcnode-id="7096" instrument_node="">
</span><span data-dcnode-id="7095" instrument_node="">
</span><span data-dcnode-id="7073" instrument_node="">
</span><span data-dcnode-id="7072" instrument_node="">
</span><table class="cquote" data-dcnode-id="7061" style="margin: auto; border-collapse:collapse; border-style:none; background-color:transparent;"><tbody data-dcnode-id="7062"><tr data-dcnode-id="7074"><td data-dcnode-id="7075"><div data-dcnode-id="7077" style="padding:4px 50px;position:relative;"><span data-dcnode-id="7093" style="position:absolute;left:10px;top:-6px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="7094" instrument_node="">“</span></span><span data-dcnode-id="7091" style="position:absolute;right:10px;bottom:-20px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="7092" instrument_node="">”</span></span><span data-dcnode-id="7090" instrument_node="">Putinism, it appears, has something for everyone. No ideological glue binds the Putin fan club together. For </span><a class="mw-redirect" data-dcnode-id="7088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Paleoconservative" title="Paleoconservative"><span data-dcnode-id="7089" instrument_node="">paleoconservatives</span></a><span data-dcnode-id="7087" instrument_node=""> unnerved by the spread of progressive cultural values and willing to empower the state to stem the tide, Putinism clothes the naked public square. For liberals who see unrestrained capitalism as a form of anarchic looting, Putinism puts the state back where it belongs: in control [...] In reality, Putinism is a violent, </span><a class="mw-redirect" data-dcnode-id="7085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Paranoid" title="Paranoid"><span data-dcnode-id="7086" instrument_node="">paranoid</span></a><span data-dcnode-id="7084" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="7082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Kleptocracy" title="Kleptocracy"><span data-dcnode-id="7083" instrument_node="">kleptocracy</span></a><span data-dcnode-id="7081" instrument_node=""> with no </span><a class="mw-redirect" data-dcnode-id="7079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Moral" title="Moral"><span data-dcnode-id="7080" instrument_node="">moral</span></a><span data-dcnode-id="7078" instrument_node=""> force, and those who make common cause with it, or seek to excuse it away, have surrendered any claim to moral probity.</span></div><span data-dcnode-id="7076" instrument_node="">
</span></td></tr><tr data-dcnode-id="7063"><td data-dcnode-id="7064" style="padding:4px 10px 8px;font-size:smaller;line-height:1.6em;text-align:right;"><span data-dcnode-id="7071" instrument_node=""> </span><cite data-dcnode-id="7066" style="font-style:normal;position:relative;z-index:2"><span data-dcnode-id="7070" instrument_node="">—Seth Mandel</span><sup class="reference" data-dcnode-id="7067" id="cite_ref-120"><a data-dcnode-id="7068" href="#cite_note-120"><span data-dcnode-id="7069" instrument_node="">[119]</span></a></sup></cite><span data-dcnode-id="7065" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="7060" instrument_node="">
</span><p data-dcnode-id="7030"><span data-dcnode-id="7059" instrument_node="">Putin is popular with certain elements of the left,</span><sup class="reference" data-dcnode-id="7056" id="cite_ref-121"><a data-dcnode-id="7057" href="#cite_note-121"><span data-dcnode-id="7058" instrument_node="">[120]</span></a></sup><span data-dcnode-id="7055" instrument_node=""> particularly people who oppose </span><a class="extiw" data-dcnode-id="7052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atlanticism" rel="nofollow" title="wp:Atlanticism"><span data-dcnode-id="7053" style="color:#477979 !important;" title="Wikipedia: Atlanticism"><span data-dcnode-id="7054" instrument_node="">Atlanticism</span></span></a><span data-dcnode-id="7051" instrument_node="">,</span><sup data-dcnode-id="7049"><img alt="Wikipedia" data-dcnode-id="7050" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%2527s_W.svg/12px-Wikipedia%2527s_W.svg.png&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/18px-Wikipedia%27s_W.svg.png 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/24px-Wikipedia%27s_W.svg.png 2x" width="12"></sup><span data-dcnode-id="7048" instrument_node=""> </span><a data-dcnode-id="7046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Globalization" title="Globalization"><span data-dcnode-id="7047" instrument_node="">globalization</span></a><span data-dcnode-id="7045" instrument_node="">, or US foreign policy. This "anti-imperialism" line was a staple of Soviet apologetics. The apparatchiks justified practically any move with </span><a data-dcnode-id="7043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Whataboutism" title="Whataboutism"><span data-dcnode-id="7044" instrument_node="">"defense against Western Imperialism"</span></a><span data-dcnode-id="7042" instrument_node="">. And while the Soviets are dead and buried now, with their rhetoric, you can play the Russian public, the left and right wings like claviatures.</span><sup class="reference" data-dcnode-id="7039" id="cite_ref-122"><a data-dcnode-id="7040" href="#cite_note-122"><span data-dcnode-id="7041" instrument_node="">[121]</span></a></sup><sup class="reference" data-dcnode-id="7036" id="cite_ref-123"><a data-dcnode-id="7037" href="#cite_note-123"><span data-dcnode-id="7038" instrument_node="">[122]</span></a></sup><span data-dcnode-id="7035" instrument_node=""> Putin, a literal Judo master (or perhaps not</span><sup class="reference" data-dcnode-id="7032" id="cite_ref-124"><a data-dcnode-id="7033" href="#cite_note-124"><span data-dcnode-id="7034" instrument_node="">[123]</span></a></sup><span data-dcnode-id="7031" instrument_node="">), invokes this "political judo" stuff all the time.
</span></p><p data-dcnode-id="6998"><span data-dcnode-id="7029" instrument_node="">Right wing support for Russia isn't new. The support really started to grow in 2013, after the signing of the gay propaganda law. Those of the </span><a data-dcnode-id="7027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Alt-right" title="Alt-right"><span data-dcnode-id="7028" instrument_node="">alt-right</span></a><span data-dcnode-id="7026" instrument_node=""> persuasion have been warming up to Russia for several years now, especially in light of Middle East unrest, the Saudi pipeline efforts in </span><a data-dcnode-id="7024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Syria" title="Syria"><span data-dcnode-id="7025" instrument_node="">Syria</span></a><span data-dcnode-id="7023" instrument_node="">, and the flood of Muslims into Europe. But even before Syria, Russia was known as having a very right-wing, ultra-orthodox government and politics. Their government is also active in promoting far-right politics outside of Russia and the U.S.: The </span><i data-dcnode-id="7021"><span data-dcnode-id="7022" instrument_node="">Tagesanzeiger</span></i><span data-dcnode-id="7020" instrument_node=""> published an article about a meeting of various far-right parties with representatives of like-minded Russian parties; far-left parties attended similar events. It suggests a network connecting European right-wingers (such as </span><a data-dcnode-id="7018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Marine_Le_Pen" title="Marine Le Pen"><span data-dcnode-id="7019" instrument_node="">Le Pen</span></a><span data-dcnode-id="7017" instrument_node="">, </span><a data-dcnode-id="7015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Golden_Dawn" title="Golden Dawn"><span data-dcnode-id="7016" instrument_node="">Michaloliakos</span></a><span data-dcnode-id="7014" instrument_node="">,</span><sup class="reference" data-dcnode-id="7011" id="cite_ref-125"><a data-dcnode-id="7012" href="#cite_note-125"><span data-dcnode-id="7013" instrument_node="">[124]</span></a></sup><span data-dcnode-id="7010" instrument_node=""> </span><a data-dcnode-id="7008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Nigel_Farage" title="Nigel Farage"><span data-dcnode-id="7009" instrument_node="">Farage</span></a><span data-dcnode-id="7007" instrument_node="">,</span><sup class="reference" data-dcnode-id="7004" id="cite_ref-126"><a data-dcnode-id="7005" href="#cite_note-126"><span data-dcnode-id="7006" instrument_node="">[125]</span></a></sup><span data-dcnode-id="7003" instrument_node=""> or Strache) and left-wingers (like Alexis Tsipras, Bernd Riexinger, George Galloway and Katja Kipping) to persons close to the Russian government.</span><sup class="reference" data-dcnode-id="7000" id="cite_ref-127"><a data-dcnode-id="7001" href="#cite_note-127"><span data-dcnode-id="7002" instrument_node="">[126]</span></a></sup><span data-dcnode-id="6999" instrument_node="">
</span></p><span data-dcnode-id="6997" instrument_node="">
</span><h3 data-dcnode-id="6987"><span class="mw-headline" data-dcnode-id="6995" id="2016_US_election_interference"><span data-dcnode-id="6996" instrument_node="">2016 US election interference</span></span><span class="mw-editsection" data-dcnode-id="6988"><span class="mw-editsection-bracket" data-dcnode-id="6993"><span data-dcnode-id="6994" instrument_node="">[</span></span><a data-dcnode-id="6991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DVladimir_Putin%26action%3Dedit%26section%3D16" title="Edit section: 2016 US election interference"><span data-dcnode-id="6992" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6989"><span data-dcnode-id="6990" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6986" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6977"><div class="thumbinner" data-dcnode-id="6978" style="width:252px;"><a class="image" data-dcnode-id="6984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3AVladimir_Putin_and_Donald_Trump_at_the_2017_G-20_Hamburg_Summit_%284%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="6985" height="154" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Vladimir_Putin_and_Donald_Trump_at_the_2017_G-20_Hamburg_Summit_%25284%2529.jpg/250px-Vladimir_Putin_and_Donald_Trump_at_the_2017_G-20_Hamburg_Summit_%25284%2529.jpg&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Vladimir_Putin_and_Donald_Trump_at_the_2017_G-20_Hamburg_Summit_%284%29.jpg/375px-Vladimir_Putin_and_Donald_Trump_at_the_2017_G-20_Hamburg_Summit_%284%29.jpg 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Vladimir_Putin_and_Donald_Trump_at_the_2017_G-20_Hamburg_Summit_%284%29.jpg/500px-Vladimir_Putin_and_Donald_Trump_at_the_2017_G-20_Hamburg_Summit_%284%29.jpg 2x" width="250"></a><span data-dcnode-id="6983" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6979"><div class="magnify" data-dcnode-id="6981"><a class="internal" data-dcnode-id="6982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3AVladimir_Putin_and_Donald_Trump_at_the_2017_G-20_Hamburg_Summit_%284%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="6980" instrument_node="">Putin with his pal.</span></div></div></div><span data-dcnode-id="6976" instrument_node="">

</span><table class="cquote" data-dcnode-id="6952" style="margin: auto; border-collapse:collapse; border-style:none; background-color:transparent;"><tbody data-dcnode-id="6953"><tr data-dcnode-id="6965"><td data-dcnode-id="6966"><div data-dcnode-id="6968" style="padding:4px 50px;position:relative;"><span data-dcnode-id="6972" style="position:absolute;left:10px;top:-6px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="6973" instrument_node="">“</span></span><span data-dcnode-id="6970" style="position:absolute;right:10px;bottom:-20px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="6971" instrument_node="">”</span></span><span data-dcnode-id="6969" instrument_node="">Congratulations, US media! You've just covered your first press conference of an authoritarian leader with a massive ego and a deep disdain for your trade and everything you hold dear. We, in Russia, have been doing it for 12 years now— with a short hiatus when our leader wasn’t technically our leader — so quite a few things during Donald Trump's press conference rang my bells.</span></div><span data-dcnode-id="6967" instrument_node="">
</span></td></tr><tr data-dcnode-id="6954"><td data-dcnode-id="6955" style="padding:4px 10px 8px;font-size:smaller;line-height:1.6em;text-align:right;"><span data-dcnode-id="6962" instrument_node=""> </span><cite data-dcnode-id="6957" style="font-style:normal;position:relative;z-index:2"><span data-dcnode-id="6961" instrument_node="">—Alexey Kovalev</span><sup class="reference" data-dcnode-id="6958" id="cite_ref-128"><a data-dcnode-id="6959" href="#cite_note-128"><span data-dcnode-id="6960" instrument_node="">[127]</span></a></sup></cite><span data-dcnode-id="6956" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="6951" instrument_node="">
</span><p data-dcnode-id="6876"><a data-dcnode-id="6949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Donald_Trump" title="Donald Trump"><span data-dcnode-id="6950" instrument_node="">Donald Trump</span></a><span data-dcnode-id="6948" instrument_node=""> worked closely with the Kremlin throughout his </span><s data-dcnode-id="6946"><span data-dcnode-id="6947" instrument_node="">Richard M. Nixon comeback tour</span></s><span data-dcnode-id="6945" instrument_node=""> Presidential campaign, namely by picking </span><a data-dcnode-id="6943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Paul_Manafort" title="Paul Manafort"><span data-dcnode-id="6944" instrument_node="">Paul "Agent to the Czars" Manafort</span></a><span data-dcnode-id="6942" instrument_node=""> as his campaign chief.</span><sup class="reference" data-dcnode-id="6939" id="cite_ref-129"><a data-dcnode-id="6940" href="#cite_note-129"><span data-dcnode-id="6941" instrument_node="">[128]</span></a></sup><sup class="reference" data-dcnode-id="6936" id="cite_ref-130"><a data-dcnode-id="6937" href="#cite_note-130"><span data-dcnode-id="6938" instrument_node="">[129]</span></a></sup><sup class="reference" data-dcnode-id="6933" id="cite_ref-131"><a data-dcnode-id="6934" href="#cite_note-131"><span data-dcnode-id="6935" instrument_node="">[130]</span></a></sup><span data-dcnode-id="6932" instrument_node=""> Trump publicly ordered Russia to deliver the goods on Clinton, which they did.</span><sup class="reference" data-dcnode-id="6929" id="cite_ref-132"><a data-dcnode-id="6930" href="#cite_note-132"><span data-dcnode-id="6931" instrument_node="">[131]</span></a></sup><span data-dcnode-id="6928" instrument_node=""> He continues to praise Russia and belittle his own nation to the news media.</span><sup class="reference" data-dcnode-id="6925" id="cite_ref-133"><a data-dcnode-id="6926" href="#cite_note-133"><span data-dcnode-id="6927" instrument_node="">[132]</span></a></sup><span data-dcnode-id="6924" instrument_node=""> He has stacked his cabinet and staff with Kremlin sympathizers. When you find out the CEO of Exxon has ties to Russia and you nominate him as Secretary of State, that's not draining the swamp. That's drinking it. (Trump voters are suckers of the first order.)</span><sup class="reference" data-dcnode-id="6921" id="cite_ref-134"><a data-dcnode-id="6922" href="#cite_note-134"><span data-dcnode-id="6923" instrument_node="">[133]</span></a></sup><span data-dcnode-id="6920" instrument_node=""> Now it appears he was not only coordinating with the Kremlin through his network and violating the Logan Act,</span><sup class="reference" data-dcnode-id="6917" id="cite_ref-135"><a data-dcnode-id="6918" href="#cite_note-135"><span data-dcnode-id="6919" instrument_node="">[134]</span></a></sup><span data-dcnode-id="6916" instrument_node=""> but the consensus in the U.S intelligence community is that Russia was behind the </span><a data-dcnode-id="6914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/WikiLeaks%23DNC_hack" title="WikiLeaks"><span data-dcnode-id="6915" instrument_node="">Guccifer 2.0</span></a><span data-dcnode-id="6913" instrument_node=""> email hack which helped scuttle Clinton's campaign—though we may never know the extent of their involvement, nor will we ever truly understand just how much it actually affected the campaign at all.</span><sup class="reference" data-dcnode-id="6910" id="cite_ref-136"><a data-dcnode-id="6911" href="#cite_note-136"><span data-dcnode-id="6912" instrument_node="">[135]</span></a></sup><sup class="reference" data-dcnode-id="6907" id="cite_ref-137"><a data-dcnode-id="6908" href="#cite_note-137"><span data-dcnode-id="6909" instrument_node="">[136]</span></a></sup><sup class="reference" data-dcnode-id="6904" id="cite_ref-138"><a data-dcnode-id="6905" href="#cite_note-138"><span data-dcnode-id="6906" instrument_node="">[137]</span></a></sup><sup class="reference" data-dcnode-id="6901" id="cite_ref-139"><a data-dcnode-id="6902" href="#cite_note-139"><span data-dcnode-id="6903" instrument_node="">[138]</span></a></sup><sup class="reference" data-dcnode-id="6898" id="cite_ref-140"><a data-dcnode-id="6899" href="#cite_note-140"><span data-dcnode-id="6900" instrument_node="">[139]</span></a></sup><span data-dcnode-id="6897" instrument_node=""> However, the lack of publicly available evidence and suspicious parallels with </span><a data-dcnode-id="6895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Iraq_War" title="Iraq War"><span data-dcnode-id="6896" instrument_node="">the notorious 2002 intelligence reports on Iraqi "weapons of mass destruction"</span></a><span data-dcnode-id="6894" instrument_node=""> led some analysts to question the whole "Russian hack" narrative.</span><sup class="reference" data-dcnode-id="6891" id="cite_ref-141"><a data-dcnode-id="6892" href="#cite_note-141"><span data-dcnode-id="6893" instrument_node="">[140]</span></a></sup><sup class="reference" data-dcnode-id="6888" id="cite_ref-142"><a data-dcnode-id="6889" href="#cite_note-142"><span data-dcnode-id="6890" instrument_node="">[141]</span></a></sup><span data-dcnode-id="6887" instrument_node=""> The strangest detail is the clumsiness of the "Guccifer 2.0" persona, with his Google-translated Romanian and blatant Russian language clues in the metadata; as </span><a class="extiw" data-dcnode-id="6884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Bamford" rel="nofollow" title="wp:James Bamford"><span data-dcnode-id="6885" style="color:#477979 !important;" title="Wikipedia: James Bamford"><span data-dcnode-id="6886" instrument_node="">James Bamford</span></span></a><sup data-dcnode-id="6882"><img alt="Wikipedia" data-dcnode-id="6883" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%2527s_W.svg/12px-Wikipedia%2527s_W.svg.png&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/18px-Wikipedia%27s_W.svg.png 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/24px-Wikipedia%27s_W.svg.png 2x" width="12"></sup><span data-dcnode-id="6881" instrument_node=""> put it, "the sloppy, Inspector Clouseau-like nature of the Guccifer 2.0 operation... smacked more of either an amateur operation or a deliberate deception".</span><sup class="reference" data-dcnode-id="6878" id="cite_ref-143"><a data-dcnode-id="6879" href="#cite_note-143"><span data-dcnode-id="6880" instrument_node="">[142]</span></a></sup><span data-dcnode-id="6877" instrument_node="">
</span></p><span data-dcnode-id="6875" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6866"><div class="thumbinner" data-dcnode-id="6867" style="width:302px;"><a class="image" data-dcnode-id="6873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3APreventing_Putin_election_interference.png"><img alt="" class="thumbimage" data-dcnode-id="6874" height="176" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/images/thumb/d/dc/Preventing_Putin_election_interference.png/300px-Preventing_Putin_election_interference.png&amp;raw" srcset="/w/images/thumb/d/dc/Preventing_Putin_election_interference.png/450px-Preventing_Putin_election_interference.png 1.5x, /w/images/d/dc/Preventing_Putin_election_interference.png 2x" width="300"></a><span data-dcnode-id="6872" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6868"><div class="magnify" data-dcnode-id="6870"><a class="internal" data-dcnode-id="6871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3APreventing_Putin_election_interference.png" title="Enlarge"></a></div><span data-dcnode-id="6869" instrument_node="">The United States has sent its best people to prevent further election interference.</span></div></div></div><span data-dcnode-id="6865" instrument_node="">
