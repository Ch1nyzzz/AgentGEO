</span><article class="post-6843 post type-post status-publish format-standard hentry category-uncategorized tag-evelyn-farkas tag-misperception tag-russia tag-united-states" data-dcnode-id="5375" id="post-6843"><span data-dcnode-id="5655" instrument_node="">
</span><header class="entry-header" data-dcnode-id="5625"><span data-dcnode-id="5654" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="5648"><span data-dcnode-id="5653" instrument_node="">
</span><span class="cat-links" data-dcnode-id="5650"><a data-dcnode-id="5651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//irrussianality.wordpress.com/category/uncategorized/" rel="category tag"><span data-dcnode-id="5652" instrument_node="">Uncategorized</span></a></span><span data-dcnode-id="5649" instrument_node="">
</span></div><span data-dcnode-id="5647" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="5645"><span data-dcnode-id="5646" instrument_node="">Why Russia  Fears NATO</span></h1><span data-dcnode-id="5644" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="5628"><span data-dcnode-id="5643" instrument_node="">
</span><span class="entry-date" data-dcnode-id="5639"><a data-dcnode-id="5640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//irrussianality.wordpress.com/2022/01/12/why-russia-fears-nato/" rel="bookmark"><time class="entry-date" data-dcnode-id="5641" datetime="2022-01-12T12:11:35-04:00"><span data-dcnode-id="5642" instrument_node="">January 12, 2022</span></time></a></span><span data-dcnode-id="5638" instrument_node=""> </span><span class="byline" data-dcnode-id="5634"><span class="author vcard" data-dcnode-id="5635"><a class="url fn n" data-dcnode-id="5636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//irrussianality.wordpress.com/author/paulfrobinson/" rel="author"><span data-dcnode-id="5637" instrument_node="">PaulR</span></a></span></span><span data-dcnode-id="5633" instrument_node=""> </span><span class="comments-link" data-dcnode-id="5630"><a data-dcnode-id="5631" href="#comments"><span data-dcnode-id="5632" instrument_node="">66 Comments</span></a></span><span data-dcnode-id="5629" instrument_node="">
</span></div><span data-dcnode-id="5626" instrument_node="">
</span></header><span data-dcnode-id="5623" instrument_node="">
</span><div class="entry-content" data-dcnode-id="5388"><span data-dcnode-id="5622" instrument_node="">
</span><p data-dcnode-id="5620"><span data-dcnode-id="5621" instrument_node="">One of the most self-defeating concepts I’ve run into in the past 20 years is the idea that if somebody else is wrong about something, then one doesn’t have to pay any attention to their opinion. “Wrong” could mean either factually or morally/legally incorrect, or both. Regardless, the theory is that if I am right and you are wrong, then what you think shouldn’t affect my behaviour. I should do what I believe it is right to do regardless of your opinion. Wrongness can’t defeat rightness.</span></p><span data-dcnode-id="5619" instrument_node="">
</span><p data-dcnode-id="5614"><span data-dcnode-id="5618" instrument_node="">An example of this popped up this week in a </span><a data-dcnode-id="5616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/carlbildt/status/1480456425650409473"><span data-dcnode-id="5617" instrument_node="">post</span></a><span data-dcnode-id="5615" instrument_node=""> on Twitter by former Swedish foreign minister Carl Bildt, a man well-known for his hawkish position vis-à-vis the Russian government. With reference to the current tensions between Russia and NATO , Bildt comments that</span></p><span data-dcnode-id="5613" instrument_node="">
</span><p data-dcnode-id="5610"><em data-dcnode-id="5611"><span data-dcnode-id="5612" instrument_node="">“I see that Russia complains that the West has a ‘lack of understanding’ of the Kremlin’s security demands. That’s entirely correct. Virtually everything they’ve said in the last few weeks about NATO or Ukraine suddenly becoming a threat to Russia is pure invention. Factually wrong.”</span></em></p><span data-dcnode-id="5609" instrument_node="">
</span><p data-dcnode-id="5607"><span data-dcnode-id="5608" instrument_node="">You get the logic, I’m sure. In Bildt’s eyes, it is a verifiable truth that NATO does not threaten Russia. Any claims to the contrary from Russia are “factually wrong”. Therefore, NATO should not make any concessions to Russia.</span></p><span data-dcnode-id="5606" instrument_node="">
</span><p data-dcnode-id="5604"><span data-dcnode-id="5605" instrument_node="">I’ve come across this sort of argument many times in different variations. Before the invasion of Iraq, for instance, I was told that one could not oppose the invasion on the grounds that it would incite terrorism, because “We can’t let the terrorists dictate our policy.” Terrorists are wrong, you see, whereas we are right. So their wrongheadedness is irrelevant.</span></p><span data-dcnode-id="5603" instrument_node="">
</span><p data-dcnode-id="5601"><span data-dcnode-id="5602" instrument_node="">This is, of course, a silly approach. It doesn’t matter whether other people’s beliefs are right or wrong; what matters is that they believe them and that this affects their behaviour. Maybe, just maybe – for the sake of argument – in invading Iraq you are, in some objective sense, liberating people from an evil dictator. But if the locals think that you are there to occupy them and grab their oil, and therefore take up arms against you, it doesn’t matter what the objective truth is. You’d be better off if you had taken the Iraqis’ incorrect opinion into account.</span></p><span data-dcnode-id="5600" instrument_node="">
</span><p data-dcnode-id="5598"><span data-dcnode-id="5599" instrument_node="">Likewise, maybe Russia is indeed “wrong” in its assessment of NATO, but that incorrect assessment is driving what it does, with serious consequences. Ignoring it because it’s wrong is simply stupid. Instead, you need to be thinking about why others think the way they do, wondering if it’s perhaps because you’ve done something that’s given them the wrong impression, and then doing something about it. Charging forward all guns blazing simply reinforces the incorrect assessment, causing a reaction that in the end hurts you.</span></p><span data-dcnode-id="5597" instrument_node="">
</span><p data-dcnode-id="5595"><span data-dcnode-id="5596" instrument_node="">In short, ignoring other people’s alleged wrongness harms one’s own interests as much as theirs.</span></p><span data-dcnode-id="5594" instrument_node="">
</span><p data-dcnode-id="5592"><span data-dcnode-id="5593" instrument_node="">All this assumes that the others actually are “wrong.” What if they’re not? Or what if, though wrong, there are good reasons for them to believe what they believe given the circumstances in which they find themselves? In short, what if the reason they misperceive you is because you’ve done and said things that lend themselves to misperception? In that case, ignoring the misperception is a huge mistake – instead, you need to address your own behaviour.</span></p><span data-dcnode-id="5591" instrument_node="">
</span><p data-dcnode-id="5589"><span data-dcnode-id="5590" instrument_node="">So is it “wrong” for Russia to believe that NATO threatens it? I can see in some abstract, objective way, you might say yes, in that I don’t believe that NATO has any intention of ever attacking Russia. Minus intention there is no threat.</span></p><span data-dcnode-id="5588" instrument_node="">
</span><p data-dcnode-id="5586"><span data-dcnode-id="5587" instrument_node="">However, from Russia’s own subjective position, things look differently. NATO’s claims that it is a purely defensive alliance ring hollow after its attacks on Yugoslavia and Libya. NATO has a proven track record of attacking weak states it doesn’t like. Russians might well conclude that maintaining a strong military is the only guarantee they have of not meeting the same fate.</span></p><span data-dcnode-id="5585" instrument_node="">
</span><p data-dcnode-id="5583"><span data-dcnode-id="5584" instrument_node="">Beyond that, the rhetoric coming out of the West, and particularly the United States, is extremely belligerent. NATO might have no intention of attacking Russia, but if you read the American press, as I’m sure the Russian government does, you might not be so sure.</span></p><span data-dcnode-id="5582" instrument_node="">
</span><p data-dcnode-id="5577"><span data-dcnode-id="5581" instrument_node="">Take, for instance, a </span><a data-dcnode-id="5579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.defenseone.com/ideas/2022/01/us-must-prepare-war-against-russia-over-ukraine/360639/"><span data-dcnode-id="5580" instrument_node="">piece </span></a><span data-dcnode-id="5578" instrument_node="">published yesterday by Evelyn Farkas, who served as US Deputy Assistant Secretary of Defense for Russia, Ukraine, and Eurasia under Barack Obama. Entitled “The US Must Prepare for War Against Russia Over Ukraine,” the article is, to say the least, a little frightening. Its basic logic is that in order to stop a Russia that is hell-bent on destroying the entire international order, America must threaten it with war, and if it doesn’t surrender, launch that war – for war now is better than war later.</span></p><span data-dcnode-id="5576" instrument_node="">
</span><p data-dcnode-id="5574"><span data-dcnode-id="5575" instrument_node="">Nuts.</span></p><span data-dcnode-id="5573" instrument_node="">
</span><p data-dcnode-id="5571"><span data-dcnode-id="5572" instrument_node="">But sadly I kid not.</span></p><span data-dcnode-id="5570" instrument_node="">
</span><p data-dcnode-id="5568"><span data-dcnode-id="5569" instrument_node="">Farkas argues that if America makes concessions to Russia over Ukraine, it “will spell the beginning of the end of the international order. … Any appeasement will only beget future land grabs not only from Putin, but also from China in Taiwan and elsewhere. … the rules-based international order will collapse.” She concludes:</span></p><span data-dcnode-id="5567" instrument_node="">
</span><p data-dcnode-id="5564"><em data-dcnode-id="5565"><span data-dcnode-id="5566" instrument_node="">“The only way to reassert the primacy of international law and sanctity of international borders, and contain Russia, may be to issue our own ultimatum. We must not only condemn Russia’s illegal occupations of Ukraine and Georgia, but we must demand a withdrawal from both countries by a certain date and organize coalition forces willing to take action to enforce it. … The horrible possibility exists that Americans, with our European allies, must use our military to roll back Russians – even at the risk of direct combat. But if we don’t now, Putin will force us to fight another day, likely to defend our Baltic or other East European allies.”</span></em></p><span data-dcnode-id="5563" instrument_node="">
</span><p data-dcnode-id="5561"><span data-dcnode-id="5562" instrument_node="">So, for the sake of Ukraine and Georgia, the United States should threaten Russia with World War Three, and if it doesn’t concede, should carry through with the threat.</span></p><span data-dcnode-id="5560" instrument_node="">
</span><p data-dcnode-id="5558"><span data-dcnode-id="5559" instrument_node="">Now imagine that you are sitting in Moscow reading this. What are you going to think? You might dismiss it as the mad rantings of some nobody on the internet, but this is a former Assistant Secretary of Defense – and a Democratic one, to boot. If this is what the supposedly moderate Democrats of the Obama era think like, what’s going on in the minds of the current bunch, let alone the Republicans? Reading this, you’re not necessarily going to assume that this is actual government policy, but you’re certainly going to have some doubts about the sanity of the US security establishment. Claims that you are “wrong” to think that NATO threatens you aren’t going to have much of an impact. Can you take the chance when senior ex-officials are saying this sort of thing?</span></p><span data-dcnode-id="5557" instrument_node="">
</span><p data-dcnode-id="5555"><span data-dcnode-id="5556" instrument_node="">Regardless of whether the Russian leadership is “wrong” or “right” to think as it does about NATO, its beliefs make sense from where it is standing, and those beliefs don’t come out of nowhere, but are to some degree a product of what the US and its NATO allies have done and said, and continue to do and say. Telling the Russians that they are “wrong” and therefore have to shut up and put up with it will achieve nothing other than convince them that they are indeed right.</span></p><span data-dcnode-id="5554" instrument_node="">
</span><p data-dcnode-id="5552"><span data-dcnode-id="5553" instrument_node="">Of course, we have the right to decide that annoying the Russians is a price we are willing to pay in order to pursue more valuable objectives. To date, that’s been our policy. In essence, Russia’s problem has been that we simply don’t care enough about it to feel that we need to take its concerns into consideration. Russia is now trying to convince us that we need to do so. I don’t see much sign that they’re succeeding.</span></p><span data-dcnode-id="5551" instrument_node="">
</span><div data-dcnode-id="5550" id="atatags-26942-6268c547b7b10"></div><span data-dcnode-id="5549" instrument_node="">

</span><p data-dcnode-id="4720"><span data-dcnode-id="4721" instrument_node="">I, frankly, don’t understand why this should be all about NATO. </span></p><span data-dcnode-id="4719" instrument_node="">
</span><p data-dcnode-id="4717"><span data-dcnode-id="4718" instrument_node="">The US is, by far, the strongest military power in the world. It doesn’t need Macedonia, Montenegro, and Estonia to be stronger. The US has military bases all over the world. Many in Europe, in NATO countries, but a lot outside Europe too. I imagine the US would be able to build its military installations in Poland and Romania without NATO; just by signing bilateral agreements. Oh, and as far as military command-control, I imagine the NATO bureaucracy makes it less efficient than if it was run directly by the US military.</span></p><span data-dcnode-id="4716" instrument_node="">
</span><p data-dcnode-id="4714"><span data-dcnode-id="4715" instrument_node="">So, why is it all about NATO? Yes, weaker NATO countries become, in effect, politically subservient to the US; they lose their independence. And that’s extremely unpleasant for the RF when these countries are Ukraine, Moldova, Georgia. Just as Cuba being a Soviet client was extremely unpleasant for the US. Note that Cuba never was a member of the Warsaw pact.                                                                        </span></p><span data-dcnode-id="4713" instrument_node="">
</span><p data-dcnode-id="4705"><span data-dcnode-id="4712" instrument_node="">I guess my point is that the anti-NATO crusade doesn’t necessarily make a lot of sense from the </span><i data-dcnode-id="4710"><span data-dcnode-id="4711" instrument_node="">security</span></i><span data-dcnode-id="4709" instrument_node=""> point of view. It does make sense from the </span><i data-dcnode-id="4707"><span data-dcnode-id="4708" instrument_node="">multipolarity</span></i><span data-dcnode-id="4706" instrument_node=""> point of view, though. Defining spheres of influence.</span></p><span data-dcnode-id="4704" instrument_node="">
</span><p class="comment-likes comment-not-liked" data-dcnode-id="4696" data-liked="comment-not-liked" id="comment-like-44400"><a class="comment-like-link needs-login" data-blog="74156786" data-dcnode-id="4701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//irrussianality.wordpress.com/2022/01/12/why-russia-fears-nato/%3Flike_comment%3D44400%26_wpnonce%3Dae5b520fd8" rel="nofollow"><span data-dcnode-id="4702"><span data-dcnode-id="4703" instrument_node="">Like</span></span></a><span class="comment-like-feedback" data-dcnode-id="4697" id="comment-like-count-44400"><span data-dcnode-id="4700" instrument_node="">Liked by </span><a class="view-likers" data-dcnode-id="4698" data-like-count="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.wp.com/likes/index.html%3Fver%3D20220105"><span data-dcnode-id="4699" instrument_node="">1 person</span></a></span></p><span data-dcnode-id="4695" instrument_node="">

</span><p data-dcnode-id="4655"><span data-dcnode-id="4656" instrument_node="">I don’t see an anti-NATO crusade by Russia. The Russians correctly understand that there is only one sovereign member in NATO, which is the US. In that sense, NATO and the US are interchangeable. The Russians are negotiating with the US, nobody else. The US’ NATO satraps will then get their marching orders from Washington. The Europeans also know that they are non-entities, but they prefer the pretense of being included. Hence their loud whinging about being sidelined in the current talks. But the Russians are correct. You only need to deal with the Don, i.e. Uncle Sam.</span></p><span data-dcnode-id="4654" instrument_node="">
</span><p data-dcnode-id="4652"><span data-dcnode-id="4653" instrument_node="">Evelyn Farkas (farkas meaning wolf in Hungarian) is an unhinged American of Hungarian descent. His father is a 1956 Hungarian emigrant, and they both still seem to be fighting the invading Soviets. A US/NATO War against Russia in Ukraine or Georgia means nuclear war. Which would be the end of human civilization as we know it. I am sure the US military understands this. So Evelyn’s foaming at the mouth doesn’t matter.</span></p><span data-dcnode-id="4651" instrument_node="">
</span><p data-dcnode-id="4649"><span data-dcnode-id="4650" instrument_node="">There is a petition circulating among the members of AGU (the American Geophysical Union), calling mainly on the US to deescalate and introduce steps to reduce the risk of nuclear war. These include the US renouncing the first use of nukes, removing warheads from missiles, POTUS not being allowed to issue launch orders alone, etc.</span></p><span data-dcnode-id="4648" instrument_node="">
</span><p data-dcnode-id="4646"><span data-dcnode-id="4647" instrument_node="">It was members of my professional community, Alan Robock of the US and Gera Stenchikov of the USSR/Russia, who did the first atmospheric modeling studies on nuclear winter. Sadly, their current petition is as relevant as ever.</span></p><span data-dcnode-id="4645" instrument_node="">
</span><p data-dcnode-id="4643"><span data-dcnode-id="4644" instrument_node="">The Western world has to decide whom they listen to. Rational scientists or unhinged lunatics like Farkas or the equally deranged Russophobes of the German fake green party (Baerbock and Habeck).</span></p><span data-dcnode-id="4642" instrument_node="">

</span><p data-dcnode-id="4538"><span data-dcnode-id="4539" instrument_node="">The post is written like that: “Why Russia Fears NATO”, and that’s what I responded to. It probably makes sense for Russia to be concerned about the possibility of a ‘preemptive nuclear strike’. But that wouldn’t be decided or ordered by NATO. In fact, any possible military confrontation with the West wouldn’t be decided or ordered by NATO. </span></p><span data-dcnode-id="4537" instrument_node="">

</span><p data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">The anti-Russian stances from NATO are crystal clear. Recall that Russia inquired about NATO membership before all of the other now former Communist states. </span></p><span data-dcnode-id="4172" instrument_node="">
</span><p data-dcnode-id="4170"><span data-dcnode-id="4171" instrument_node="">This Russian inquiry as met with astonished bemusement. Shortly thereafter, the NATO inquiries from Poland and some others were taken seriously, along with Russia hating propaganda, including the notion that Russia is an inherent threat.</span></p><span data-dcnode-id="4169" instrument_node="">
</span><p data-dcnode-id="4167"><span data-dcnode-id="4168" instrument_node="">Germany fought two world wars against the West. The Brits fought two wars against the US and sympathized with the Confederacy. </span></p><span data-dcnode-id="4166" instrument_node="">
</span><p data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">NATO was biased against historic Russian ally Serbia in the 1990s, when the latter constituted much of Yugoslavia. </span></p><span data-dcnode-id="4163" instrument_node="">
</span><p data-dcnode-id="4161"><span data-dcnode-id="4162" instrument_node="">The US outspends the next 11 countries in defense combined. Russia is ranked fourth in that category. The other aforementioned 11 include NATO members UK, France, Germany and Italy.</span></p><span data-dcnode-id="4160" instrument_node="">
</span><p data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">The current NATO head Jens Stoltenberg is blatantly anti-Russian, as is one of his predecessors Anders Fogh Rasmussen. Ditto numerous NATO connected others including ex-US Commander Ben Hodges.</span></p><span data-dcnode-id="4157" instrument_node="">

</span><p data-dcnode-id="3902"><span data-dcnode-id="3903" instrument_node="">Perhaps this phenomenon can be best explained in terms of local interactionism. Two particles become entangled because they are the same kind of particle. Sure, one has a left hand spin and the other – right, but that’s a function of their entanglement. A human cannot interact with a chimpanzee the same as another chimpanzee can; the converse is also true. So with sovereign entities. The yanks cannot force the whole word to think and behave the way that they do. This is not so much because the yanks are wrong as because if they did such a thing they would deprive themselves of the “other” and as a consequence would cease to exist. So Russia functions as the yankee (brit etc.) other. Every time the yanks say “right”, Russia says “left”. It’s a function of their relationship. Vive la différence!</span></p><span data-dcnode-id="3901" instrument_node="">

</span><p data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">Paul Robinson has outlined an important theme.  </span></p><span data-dcnode-id="3274" instrument_node="">
</span><p data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">During the 2016 U.S. presidential election, 99% of my friends and neighbors favored Hillary Clinton.  Several months later, after Donald Trump had been elected, a close friend asked me what I thought about the election.  I replied, “Well, in light of the results I was expecting to witness some self-refection on the part of Democrats.  I’m surprised that Democrats are not re-evaluating their positions or tone of voice. After all, half the electorate voted against them.”   </span></p><span data-dcnode-id="3271" instrument_node="">
</span><p data-dcnode-id="3267"><span data-dcnode-id="3270" instrument_node="">My friend then told me that curiosity about those voters was pointless because Trump voters were stupid, and lazy.  (She cited a book.)  I asked, “Are you are saying that roughly 1/2 of all voters in the U.S. are stupid-and-lazy? That seems like a big fraction to dismiss.  Surely there is value in wondering why they voted the way they did?”</span><br data-dcnode-id="3269"><span data-dcnode-id="3268" instrument_node="">
My friend didn’t budge.</span></p><span data-dcnode-id="3266" instrument_node="">
</span><p class="comment-likes comment-not-liked" data-dcnode-id="3260" data-liked="comment-not-liked" id="comment-like-44417"><a class="comment-like-link needs-login" data-blog="74156786" data-dcnode-id="3263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//irrussianality.wordpress.com/2022/01/12/why-russia-fears-nato/%3Flike_comment%3D44417%26_wpnonce%3D810c0e8fa1" rel="nofollow"><span data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">Like</span></span></a><span class="comment-like-feedback" data-dcnode-id="3261" id="comment-like-count-44417"><span data-dcnode-id="3262" instrument_node="">Like</span></span></p><span data-dcnode-id="3259" instrument_node="">

</span><a data-dcnode-id="3227" href="#comment-44418"><time data-dcnode-id="3228" datetime="2022-01-12T18:23:11-04:00"><span data-dcnode-id="3229" instrument_node="">January 12, 2022 at 6:23 pm</span></time></a><span data-dcnode-id="3226" instrument_node=""> </span></div><span data-dcnode-id="3223" instrument_node="">

</span><div class="comment-content" data-dcnode-id="3202"><span data-dcnode-id="3219" instrument_node="">
</span><p data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">The U.S., EU et al have settled into a mindset where they dish stuff out but don’t have to take much in return. Endless sasnctions, threats, provocations gush forth and from Russia and China come mostly just verbal objections. The US/EU see that have successfully bullied and intimidated Russia+China and so are ever encouraged to ramp up their actions. </span></p><span data-dcnode-id="3216" instrument_node="">
</span><p data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">But Russia+China are playing the long game, comes the response, building up their resources waiting for their opponents to trip up or fall out. The problem is that by failing to resist with demonstrable power both regimes look weak. And this impels their own population and that of the US/EU to lose respect. And that subjective state is one of enormous power.</span></p><span data-dcnode-id="3213" instrument_node="">
</span><p data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">So, Russia and China have to get kinetic very sharply and quickly. And to hell with mere ‘sanctions’. Just think what anything much at all would do to western markets and debt bubbles.</span></p><span data-dcnode-id="3210" instrument_node="">
</span><p class="comment-likes comment-not-liked" data-dcnode-id="3204" data-liked="comment-not-liked" id="comment-like-44418"><a class="comment-like-link needs-login" data-blog="74156786" data-dcnode-id="3207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//irrussianality.wordpress.com/2022/01/12/why-russia-fears-nato/%3Flike_comment%3D44418%26_wpnonce%3Dd5fd6363a6" rel="nofollow"><span data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">Like</span></span></a><span class="comment-like-feedback" data-dcnode-id="3205" id="comment-like-count-44418"><span data-dcnode-id="3206" instrument_node="">Like</span></span></p><span data-dcnode-id="3203" instrument_node="">

</span><p data-dcnode-id="3149"><span data-dcnode-id="3162" instrument_node="">It’s also amusing how in the Western press the actual arguments from Russia are almost never actually quoted. Recall the whole argument about the counter-missile bases in Eastern Europe: Russia’s one of the main complaints was that the US could just simply replace the interceptors with nuclear-armed missiles and use those for the first-strike capability — that’s a non-trivial thing to do from the technical point of view, but Russian missile systems allow for that, and Russians don’t think the US are technically inferior to them so…</span><br data-dcnode-id="3161"><span data-dcnode-id="3160" instrument_node="">
And then, the planned silos are replaced with Aegis Ahore which is quite an astonishing way to evade IRNFT without technically breaking it in itself: the naval-based systems were explicitly left out of the Treaty… and the previous argument still stood: Aegis </span><i data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">can</span></i><span data-dcnode-id="3157" instrument_node=""> launch both interceptor missiles and nuclear-armed cruise missiles, and with ease; the US actually had claimed that much and did precisely such training during one of their maneuvers.</span><br data-dcnode-id="3156"><span data-dcnode-id="3155" instrument_node="">
But, of course, that counter-missile defense is targeted agains Iran and North Korea, obviously. What’s that? The radars in Poland and Romania can’t realistically detect missile launches from Iran and N. Korea in timely manner, but Russians now offer to jointly operate a Soviet-time radar in Armenia that actually </span><i data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">can</span></i><span data-dcnode-id="3152" instrument_node=""> detect such launches very quickly? Nope, absolutely not interested in that, and no, that doesn’t contradict our statement about the intent of our missile defense systems. How it doesn’t contradict? Just so: we say it doesn’t, so it doesn’t, and if you don’t understand our impeccable Western logic, you’re an uncivilized primate not worthy to be talked with. Any other questions?</span><br data-dcnode-id="3151"><span data-dcnode-id="3150" instrument_node="">
So yeah, Russia looks at the actions, the (covering) rhetorics, probes the sincerity of that rhetorics, sees from the reactions that the rhetorics appears to be bogus and concludes, well, what it concludes. Un-European barbarians, what else to say, eh?</span></p><span data-dcnode-id="3148" instrument_node="">

</span><p data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">It’s also dysfunctional, deceptive, two-faced and fork-tongued. I had a business partner like that once who was all of the above except dysfunctional. You fear their ability to harm your economic, political and physical assets until you adequately distance yourself from them and gain a parity in doing equal damage. That tends to cool their jets until you’re at a safe distance to go on with your affairs. Most of the fear I think comes from a fear of lowering yourself to their level to achieve that parity. It’s a soul-piercing experience.</span></p><span data-dcnode-id="3090" instrument_node="">
</span><p data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">People, Tribes, Teams, Nations, Corporations – we all react in similar fashion. All I know from experience  is if you don’t stand your ground, expect to be rolled over.</span></p><span data-dcnode-id="3087" instrument_node="">

</span><p data-dcnode-id="2423"><span data-dcnode-id="2426" instrument_node="">Lola, I saw that sculpture too, in the museum, it’s amazing!</span><br data-dcnode-id="2425"><span data-dcnode-id="2424" instrument_node="">
Trojan Priest Laocoön and his sons were in fact attacked by a sea monster, but it was the kind of monster which had many tentacles, which could appear as snakes.  Was probably a giant squid.</span></p><span data-dcnode-id="2422" instrument_node="">
</span><p data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">There are many different versions of the story, and the reason why this priest was attacked like that.  According to Virgil’s Aeneid this attack was organized by that section of the gods who supported the Greeks in the war.  Laocoön like Cassandra tried to warn his fellow Trojans not to take the wooden horse inside the gates.  I don’t remember which God in particular was behind this punishment.  I think it was Poseidon, who commanded all sea creatures.  But later (things get confusing) Poseidon turned against the victorious Greeks and kept hounding them so much it took them years and years to sail home.  (It took Odysseus 10 years to get home, a trip that should have only taken a couple of weeks at most.)</span></p><span data-dcnode-id="2419" instrument_node="">
</span><p data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">Even Captain Idomeneus was punished by Poseidon.  He was a Cretan, but he was still a good man and virtuous soldier who did nothing wrong.  He was one of the brave volunteers who hid inside the horse and led the horse squad in the attack against Troy.  While other Greek commanders were war criminals, Idomeneus maintained his good morals and didn’t rape or slaughter anyone.  In fact, he tried to save the lives of several Trojan captives, including Priam’s daughter Ilia (and possibly Cassandra herself).  Unfortunately, Poseidon still decided to punish him for whatever reason, and it took him forever to get back to Crete, including braving a horrific storm at sea.  In a moment of despair, just as his ship was about to sink, Idomeneus  offered an oath, that if the gods were to spare his sailors, he would sacrifice the first living creature that he encountered, once arriving back on the beach.  The gods agreed, and everybody was spared.  So, the ship finally arrived back on the beach, and you’ll never guess who was the first person he encountered?  His own beloved teenage son, Idamantes!  Mozart tells the story in his wonderful opera “Idomeneo”.</span></p><span data-dcnode-id="2416" instrument_node="">
