</span><h1 class="fs-huge" data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">Press conference</span></h1><span data-dcnode-id="2317" instrument_node="">
</span><h2 data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">by NATO Secretary General Jens Stoltenberg following the meeting of the NATO-Russia Council</span></h2><span data-dcnode-id="2314" instrument_node="">
</span><ul class="list-meta" data-dcnode-id="2298"><span data-dcnode-id="2313" instrument_node="">
</span><li data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">
            12 Jan. 2022 - 
          </span></li><span data-dcnode-id="2310" instrument_node="">
</span><li data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node=""> | </span></li><span data-dcnode-id="2307" instrument_node="">

</span><section class="content cf" data-dcnode-id="1880"><span data-dcnode-id="2265" instrument_node="">
</span><p class="introtxt" data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node=""> (As delivered) </span></p><span data-dcnode-id="2262" instrument_node="">
</span><span data-dcnode-id="2260" instrument_node="">
</span><div class="box box-media box-media--stretched" data-dcnode-id="2254"><span data-dcnode-id="2259" instrument_node="">
</span><span data-dcnode-id="2257" instrument_node="">
</span><img alt="" class="lazy" data-dcnode-id="2256" data-original="/nato_static_fl2014/assets/pictures/images_mfu/2022/1/stock/220112-pc-sg_rdax_775x440s.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/nato_static_fl2014/assets/pictures/images_mfu/2022/1/stock/220112-pc-sg_rdax_775x440s.jpg&amp;raw" style="display: block;"><span data-dcnode-id="2255" instrument_node="">
</span></div><span data-dcnode-id="2253" instrument_node="">
</span><div data-dcnode-id="1882"><span data-dcnode-id="2252" instrument_node="">
</span><p data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Good afternoon.</span></p><span data-dcnode-id="2249" instrument_node="">
</span><p data-dcnode-id="2245"><span data-dcnode-id="2248" instrument_node="">I have just chaired a meeting of the NATO-Russia Council.</span><br data-dcnode-id="2247"><span data-dcnode-id="2246" instrument_node="">
At a defining moment for European security.</span></p><span data-dcnode-id="2244" instrument_node="">
</span><p data-dcnode-id="2240"><span data-dcnode-id="2243" instrument_node="">This was not an easy discussion.</span><br data-dcnode-id="2242"><span data-dcnode-id="2241" instrument_node="">
But that is exactly why this meeting was so important.</span></p><span data-dcnode-id="2239" instrument_node="">
</span><p data-dcnode-id="2235"><span data-dcnode-id="2238" instrument_node="">We had a very serious and direct exchange on the situation in and around Ukraine.</span><br data-dcnode-id="2237"><span data-dcnode-id="2236" instrument_node="">
And the implications for European security.</span></p><span data-dcnode-id="2234" instrument_node="">
</span><p data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">There are significant differences between NATO Allies and Russia on these issues.</span></p><span data-dcnode-id="2231" instrument_node="">
</span><p data-dcnode-id="2223"><span data-dcnode-id="2230" instrument_node="">Our differences will not be easy to bridge.</span><br data-dcnode-id="2229"><span data-dcnode-id="2228" instrument_node="">
But it is a positive sign that all NATO Allies and Russia sat down around the same table,</span><br data-dcnode-id="2227"><span data-dcnode-id="2226" instrument_node="">
and engaged on substantive topics.</span><br data-dcnode-id="2225"><span data-dcnode-id="2224" instrument_node="">
After two years where such meetings were not possible to convene.</span></p><span data-dcnode-id="2222" instrument_node="">
</span><p data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">Today Russia raised the proposals that they published in December, aimed at addressing their security concerns.</span></p><span data-dcnode-id="2219" instrument_node="">
</span><p data-dcnode-id="2215"><span data-dcnode-id="2218" instrument_node="">These include demands to stop admitting any new members to NATO.</span><br data-dcnode-id="2217"><span data-dcnode-id="2216" instrument_node="">
And to withdraw forces from eastern Allies.</span></p><span data-dcnode-id="2214" instrument_node="">
</span><p data-dcnode-id="2210"><span data-dcnode-id="2213" instrument_node="">Allies on their side reaffirmed NATO’s Open Door policy.</span><br data-dcnode-id="2212"><span data-dcnode-id="2211" instrument_node="">
And the right for each nation to choose its own security arrangements.</span></p><span data-dcnode-id="2209" instrument_node="">
</span><p data-dcnode-id="2205"><span data-dcnode-id="2208" instrument_node="">Allies made clear that they will not renounce their ability to protect and defend each other.</span><br data-dcnode-id="2207"><span data-dcnode-id="2206" instrument_node="">
Including with presence of troops in the eastern part of the Alliance.</span></p><span data-dcnode-id="2204" instrument_node="">
</span><p data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">At the same time, both Russia and NATO allies expressed the need to resume dialogue and to explore a schedule of future meetings.</span></p><span data-dcnode-id="2201" instrument_node="">
</span><p data-dcnode-id="2195"><span data-dcnode-id="2200" instrument_node="">NATO Allies are ready to meet again with Russia to have discussions in greater detail,</span><br data-dcnode-id="2199"><span data-dcnode-id="2198" instrument_node="">
to put concrete proposals on the table,</span><br data-dcnode-id="2197"><span data-dcnode-id="2196" instrument_node="">
and to seek constructive outcomes.</span></p><span data-dcnode-id="2194" instrument_node="">
</span><p data-dcnode-id="2188"><span data-dcnode-id="2193" instrument_node="">In particular, Allies would like to discuss concrete ways to increase the transparency of military exercises,</span><br data-dcnode-id="2192"><span data-dcnode-id="2191" instrument_node="">
to prevent dangerous military incidents,</span><br data-dcnode-id="2190"><span data-dcnode-id="2189" instrument_node="">
and reduce space and cyber threats.</span></p><span data-dcnode-id="2187" instrument_node="">
</span><p data-dcnode-id="2183"><span data-dcnode-id="2186" instrument_node="">Allies have also offered to look at arms control, disarmament and non-proliferation. Including to address reciprocal limitations on missiles,</span><br data-dcnode-id="2185"><span data-dcnode-id="2184" instrument_node="">
and to address nuclear policies.&nbsp;&nbsp;</span></p><span data-dcnode-id="2182" instrument_node="">
</span><p data-dcnode-id="2178"><span data-dcnode-id="2181" instrument_node="">On lines of communications, NATO Allies are interested in looking at ways to improve civil and military communications channels,</span><br data-dcnode-id="2180"><span data-dcnode-id="2179" instrument_node="">
and the possibility of re-establishing our respective offices in Moscow and Brussels.</span></p><span data-dcnode-id="2177" instrument_node="">
</span><p data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">NATO Allies are clear-eyed about the prospects for progress in these talks.</span></p><span data-dcnode-id="2174" instrument_node="">
</span><p data-dcnode-id="2168"><span data-dcnode-id="2173" instrument_node="">They expressed serious concern about the Russian military build-up in and around Ukraine.</span><br data-dcnode-id="2172"><span data-dcnode-id="2171" instrument_node="">
And called on Russia to immediately de-escalate the situation,</span><br data-dcnode-id="2170"><span data-dcnode-id="2169" instrument_node="">
And to respect the sovereignty and territorial integrity of its neighbours.</span></p><span data-dcnode-id="2167" instrument_node="">
</span><p data-dcnode-id="2163"><span data-dcnode-id="2166" instrument_node="">They also called on Russia to refrain from aggressive force posturing and malign activities directed against Allies,</span><br data-dcnode-id="2165"><span data-dcnode-id="2164" instrument_node="">
And abide by all its international obligations and commitments.</span></p><span data-dcnode-id="2162" instrument_node="">
</span><p data-dcnode-id="2158"><span data-dcnode-id="2161" instrument_node="">All this means that our dialogue is difficult, but even more necessary.</span><br data-dcnode-id="2160"><span data-dcnode-id="2159" instrument_node="">
NATO Allies stressed that they will make every effort to find a political way forward.</span></p><span data-dcnode-id="2157" instrument_node="">
</span><p data-dcnode-id="2153"><span data-dcnode-id="2156" instrument_node="">I also welcome the bilateral consultations between the United States and Russia.</span><br data-dcnode-id="2155"><span data-dcnode-id="2154" instrument_node="">
And tomorrow’s meeting of the OSCE.</span></p><span data-dcnode-id="2152" instrument_node="">
</span><p data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">These are opportunities for constructive engagement which should not be missed, in the interest of security in Europe.&nbsp;&nbsp;</span></p><span data-dcnode-id="2149" instrument_node="">
</span><p data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">With that, I am ready to take your questions.</span></p><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2142"><strong data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">NATO Spokesperson Oana Lungescu: </span></strong><span data-dcnode-id="2143" instrument_node="">Ok, we’ll go to CNN, in the third row, center.</span></p><span data-dcnode-id="2141" instrument_node="">
</span><p data-dcnode-id="2137"><strong data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">Alex Marquardt (CNN)</span></strong><span data-dcnode-id="2138" instrument_node="">: These talks did go a little bit longer today. Could you tell us what specific issues prolonged these talks? And NATO Allies have repeatedly rejected Russia's demand that Ukraine never join NATO, but do you acknowledge that there are divisions among the Allies over Ukraine's accession to NATO and that Ukraine likely will never… likely will not join NATO anytime soon? Thank you.</span></p><span data-dcnode-id="2136" instrument_node="">
</span><p data-dcnode-id="2132"><strong data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">NATO Secretary General Jens Stoltenberg</span></strong><span data-dcnode-id="2133" instrument_node="">: We had a frank and open discussion on a wide range of issues, of course, focusing on the tensions, the difficulties in and around Ukraine. And Allies also of course again expressed a deep concern about the continued Russian military build-up along the borders of Ukraine. And combined with threatening rhetoric from the Russian side, and a Russian track record of willingness to use force against neighbours, of course, Allies are concerned. And we are clear-eyed about the challenges we face when we now sit down with Russia and try to find a political way forward. But the meeting was useful. And I think that, especially when tensions are high, it is even more important that we meet, and that all Allies and Russia meet and sit around the same table and address the issues that are of concern.</span></p><span data-dcnode-id="2131" instrument_node="">
</span><p data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">On membership and the NATO's open door all Allies are united on the core principle that each and every nation has the right to choose his own path. This is enshrined in a lot of fundamental documents, many different documents, which are the foundation for European security. And, therefore, also Allies totally agree that it is only Ukraine and 30 Allies that can decide when Ukraine is ready to become a NATO member. No one else has anything to say and of course Russia doesn't have a veto on whether Ukraine can become a NATO member. Allies are ready to support Ukraine on this path towards membership, helping to implement reforms, modernise the armed forces to meet NATO standards. And then, at the end of the day, it has to be NATO Allies and Ukraine that decides on membership.</span></p><span data-dcnode-id="2128" instrument_node="">
</span><p data-dcnode-id="2124"><strong data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">NATO Spokesperson</span></strong><span data-dcnode-id="2125" instrument_node="">: We will go to TASS, second row.</span></p><span data-dcnode-id="2123" instrument_node="">
</span><p data-dcnode-id="2119"><strong data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">Denis Dubrovin (TASS News Agency)</span></strong><span data-dcnode-id="2120" instrument_node="">: Mr. Secretary General, it seems you have at least a slight progress on the issue of risk reduction. Do you consider that after this talks it may be feasible in the future to move towards new treaty limiting the use of missiles in Europe - offensive missile system.</span></p><span data-dcnode-id="2118" instrument_node="">
</span><p data-dcnode-id="2114"><strong data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">NATO Secretary General</span></strong><span data-dcnode-id="2115" instrument_node="">: NATO Allies made it clear in the meeting that we are ready to schedule a series of meetings addressing a wide range of different topics, including missiles and reciprocal, verifiable limits on missiles in Europe.</span></p><span data-dcnode-id="2113" instrument_node="">
</span><p data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">From the Russian side, they made it clear that they are not ready, they were not ready today to agree on such a schedule of meetings. I think you should ask them to explore or to explain their position more in detail. But at least I welcome that there is a general willingness and support of the idea of dialogue. And NATO Allies have also made it clear that we are ready to put concrete proposals on the table and to discuss risk reduction, transparency but also arms control, including reciprocal, verifiable limits on missiles.</span></p><span data-dcnode-id="2110" instrument_node="">
</span><p data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">But let me add that we are in this situation because Russia violated the INF Treaty. We had the treaty banning all intermediate range weapons, dual capable, conventional and nuclear. And it was really a cornerstone of arms control. And then Russia started to deploy missiles in Europe in violation of that treaty. So the reason why we are where we are, is that the treaty that banned missiles - all intermediate range missiles, convention and nuclear - that treaty has collapsed. We have seen the demise because of extensive Russian violations, deployments of missiles in violation of the treaty. So we are ready to sit down. We support arms control. I know it's possible to reach agreements but then of course we need verifiable and balanced limitations, both on conventional and on nuclear forces.</span></p><span data-dcnode-id="2107" instrument_node="">
</span><p data-dcnode-id="2098"><strong data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">NATO Spokesperson: </span></strong><span data-dcnode-id="2104" instrument_node="">Ok, we will go here to the National News Agency of Ukraine.</span><strong data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node=""> </span></strong><span data-dcnode-id="2101" instrument_node="">In the back. </span><strong data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="2097" instrument_node="">
</span><p data-dcnode-id="2093"><strong data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">Dmytro Shkurko (National News Agency of Ukraine)</span></strong><span data-dcnode-id="2094" instrument_node="">: It looks like that the one of the aims of the new Russian threats for European security is to divert the attention from already existing violations of international law, including occupation of Crimea, including occupation of certain areas of Donbass, unauthorized presence also in Moldova, military presence in Moldova and Georgia. So my question is, if Allies preserve unity in that circumstances around those issues and are they going to continue to solve it? And one short follow up, if I may. Russia demands some kind of guarantees from NATO and USA, but what kind of guarantees NATO would like to see from the side of Russia in terms of security? Thank you.</span></p><span data-dcnode-id="2092" instrument_node="">
</span><p data-dcnode-id="2088"><strong data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">NATO Secretary General:</span></strong><span data-dcnode-id="2089" instrument_node=""> Russia has military forces in Georgia, in Ukraine, in Crimea, and also in Moldova. And these forces are there without the consent of the governments of these countries, they are uninvited and not welcomed. And NATO Allies also in the meeting today, called on Russia to withdraw those forces and to respect the territorial integrity and sovereignty of Georgia, of Ukraine, of Moldova.</span></p><span data-dcnode-id="2087" instrument_node="">
</span><p data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">And, again, these are fundamental principles to respect the borders of all countries for peace and security in Europe. And NATO Allies are ready to engage in dialogue with Russia, but we will not compromise on core principles. We will not compromise on the sovereignty and territorial integrity of every nation in Europe, and we will not compromise on the right for all countries to do, to choose their own path, including what kind of security arrangements they want to be part of, and will not compromise on the right for Allies to protect and defend each other.</span></p><span data-dcnode-id="2084" instrument_node="">
</span><p data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">Then, what Allies raised with Russia today was actually a wide range of different issues. The focus was on Ukraine and the implications for European security. But of course, it is of concern that, well, the military build-up we see in and around Ukraine, and that military build-up continues. And that is part of a pattern where Russia has used force against different countries, and where Russia has also used cyber against NATO Allies. We have seen the use of chemical weapons on European territory and we also see that Russia is also oppressive against democratic opposition at home.</span></p><span data-dcnode-id="2081" instrument_node="">
</span><p data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">So NATO engages in these talks, the dialogue, in good faith. We are ready to sit down and discuss substance. We are ready to put proposals on the table, concrete proposals. And then, at the same time we have to be prepared for that -- that Russia once again chooses confrontation. And therefore we also made it very clear that any use of force against Ukraine will be a severe and serious strategic mistake by Russia. And it will have severe consequences and Russia will have to pay a high price.</span></p><span data-dcnode-id="2078" instrument_node="">
</span><p data-dcnode-id="2075"><strong data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">NATO Spokesperson: We’ll go to POLITICO.</span></strong></p><span data-dcnode-id="2074" instrument_node="">
</span><p data-dcnode-id="2070"><strong data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">David Herszenhorn (POLITICO)</span></strong><span data-dcnode-id="2071" instrument_node="">: I wonder if you can tell us if you or Allies responded to Russia's historic grievances about NATO's role, for example, in Yugoslavia or in Libya? And if you're able to reassure them that NATO in fact, is not a threat, given Russia's view that there are countries where leaders were removed from power, even killed, or that don't exist anymore, partly because of NATO's intervention.</span></p><span data-dcnode-id="2069" instrument_node="">
</span><p data-dcnode-id="2065"><strong data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">NATO Secretary General: </span></strong><span data-dcnode-id="2066" instrument_node="">NATO is a defensive alliance. We have never forced or coerced any nation into our Alliance. So this idea that, for instance, NATO enlargement is aggressive, is absolutely not true. NATO enlargement has been a cornerstone for the spread of democracy and freedom across Europe. Because countries that were formerly part of the Warsaw Pact of the Soviet Union, they have actually freely, through independent democratic processes, chosen to join NATO, and many of those Allies were in the room today, and stated exactly that. They went into NATO because they wanted to be part of a defensive military alliance that provides security.</span></p><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">Second, several countries which are part of former Yugoslavia stated very clearly that -- you know, Yugoslavia broke down, not because of NATO. There were internal reasons why Yugoslavia broke down. NATO came in much later, based on the UN mandate, to stop atrocities in Bosnia and Herzegovina. So the whole idea that NATO used military force to change borders on the Balkans is wrong. The borders in former Yugoslavia changed because of internal reasons in former Yugoslavia. And actually we had several people from these countries, Montenegro, Croatia, Slovenia, at the table telling that story, and they know that it was not NATO, but actually the internal conflicts within Yugoslavia that led to the demise of Yugoslavia. Yes, NATO went in but that was to stop atrocities, to protect people and to stop, for instance, what we saw taking place in Srebrenica.</span></p><span data-dcnode-id="2061" instrument_node="">
</span><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">Then on Libya. Well, it was a clear UN mandate. And let me also remind you that in the beginning, that was not... First it was a European initiative. And then, after some time, European Allies asked for help from NATO, and then NATO went in and supported European Allies in their efforts in Libya. But it was based on a UN mandate.</span></p><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2054"><strong data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">NATO Spokesperson: </span></strong><span data-dcnode-id="2055" instrument_node="">We’ll go to Frankfurter Allgemeine Zeitung.</span></p><span data-dcnode-id="2053" instrument_node="">
</span><p data-dcnode-id="2049"><strong data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">Thomas Gutschker (Frankfurter Allgemeine Zeitung): </span></strong><span data-dcnode-id="2050" instrument_node="">Secretary General, two questions both interrelated. First one, you said that today Russia did not agree on a schedule of… for further meetings. But did you get a commitment in principles that talks within this framework, the NATO-Russia Council, will be continued? Question number one. And question number two, to move from discussions and talks, as you have described today's meetings, to negotiations, would Russia have to de-escalate as a precondition from the perspective of the Allies - so draw back troops before real negotiations could begin? Thank you.</span></p><span data-dcnode-id="2048" instrument_node="">
</span><p data-dcnode-id="2044"><strong data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">NATO Secretary General</span></strong><span data-dcnode-id="2045" instrument_node="">: I proposed, Allies supported, the idea of agreeing a series of meetings addressing a wide range of issues including arms control, reciprocal briefing, limitations on missiles and many other things.</span></p><span data-dcnode-id="2043" instrument_node="">
</span><p data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">Russia was not in a position to agree on that proposal. They didn't rejected it either. But the Russian representatives made it clear that they needed some time to come back to NATO with an answer. And of course, then we are ready to sit down. We are ready to sit down. And of course we hope that Russia is ready to meet us in a series of meetings addressing these issues. And I hope that the response from Russia will be positive because dialogue, talks is what we need in different formats. We welcomed bilateral talks between the United States and Russia on strategic issues. We welcome the meetings that will take place in the OSCE tomorrow and the NATO-Russia Council is also an important platform.</span></p><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Let me also highlight that we are very grateful for the very close consultation and coordination we see among Allies, and especially the fact that the United States consulted with Allies both before the bilateral talks with Russia in Geneva, but also afterwards, and that Deputy Secretary Wendy Sherman has spent so much time with NATO Allies consulting closely. And that demonstrates that NATO is a unique platform to bring European Allies and North America together to address common security concerns. We are ready to sit down but of course to make any serious progress and to reach an agreement that really makes a difference we need to see de-escalation. But we have made it clear that it’d be better sit down now. We met today and we are ready to meet in the near future to continue and to address more specific and more in detail the different issues we have put on the table.</span></p><span data-dcnode-id="2037" instrument_node="">
</span><p data-dcnode-id="2033"><strong data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">NATO Spokesperson: </span></strong><span data-dcnode-id="2034" instrument_node="">We will go to Rossiya 1, lady in red.</span></p><span data-dcnode-id="2032" instrument_node="">
</span><p data-dcnode-id="2028"><strong data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">Anastasia Popova (Rossiya 1)</span></strong><span data-dcnode-id="2029" instrument_node="">: You spoke about de-escalation and about Russian troops on the Russian territory. Do you really believe that new military exercises and sending weapons into Ukraine, which is foreign to the NATO Ally, Allies, for now, territory…do you really believe that this helps the de-escalation?</span></p><span data-dcnode-id="2027" instrument_node="">
</span><p data-dcnode-id="2021"><strong data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">NATO Secretary General: </span></strong><span data-dcnode-id="2024" instrument_node="">Ukraine is a sovereign nation. Ukraine has the right to self-defence. Ukraine is not a threat to Russia. Russia has the biggest land power in Europe. They are one of two major nuclear powers. They have invested heavily in new, modern capabilities over the last years. But not only that, Russia has used military force against Ukraine before. In 2014, they occupied and took a part of Ukraine, Crimea. And they continue to illegally occupy Crimea and they control through the separatists in eastern Ukraine, Donbass. So the whole idea that, in a way, Ukraine threatens Russia is absolutely to put the whole thing upside down. It is Russia that is the aggressor. It is Russia that has used force and continues to use force against Ukraine. And then, they are building up, with around 100,000 troops, artillery, armour, drones, tens of thousands of combat-ready troops and threatening rhetoric. So of course, that's the problem. This crisis is a making of Russia. And therefore it is important that they de-escalate. Ukraine has the right to self-defence. That's enshrined in the UN founding charter, and of course, some NATO Allies, NATO Allies and NATO help them to uphold that right to self-defence.</span><strong data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node=""> </span></strong></p><span data-dcnode-id="2020" instrument_node="">
</span><p data-dcnode-id="2016"><strong data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">NATO Spokesperson</span></strong><span data-dcnode-id="2017" instrument_node="">: New York Times.</span></p><span data-dcnode-id="2015" instrument_node="">
</span><p data-dcnode-id="2011"><strong data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Steven Erlanger (The New York Times)</span></strong><span data-dcnode-id="2012" instrument_node="">: Thank you Oana. Mr. Secretary General, question on the suggestion that at this point, NATO has prepared to reinforce Allied troops bordering Russia, whether Russia goes into Ukraine or not. Could you describe whether this came up in the meeting perhaps as a warning to the Russian delegation? And secondly, my memory may be failing, but I believe NATO went into Kosovo without a UN resolution but went in after the war with a UN resolution. Thank you.</span></p><span data-dcnode-id="2010" instrument_node="">
</span><p data-dcnode-id="2006"><strong data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">NATO Secretary General</span></strong><span data-dcnode-id="2007" instrument_node="">: First of all, the whole idea that the breakdown of Yugoslavia was caused by NATO is wrong. You can study the history of Yugoslavia and it's obvious that there are no NATO soldiers there, before after many years. And then we went in to stop atrocities. That was the case, and end bloody wars. That was the case in Bosnia-Herzegovina, and also in Kosovo after years of failed attempts to find a negotiated solution. Then there was a need to go in - broad support to go in - and to stop atrocities, also in Kosovo.</span></p><span data-dcnode-id="2005" instrument_node="">
</span><p data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">But at that stage, Yugoslavia had already broken down. And the first question was about… Well, we will always do what is necessary to protect and defend all Allies. And we are constantly assessing the need to adjust our presence in different parts of the Alliance. After Russia's illegal annexation of Crimea in 2014, and continued destabilisation of eastern Ukraine, Donbass, we have implemented the biggest reinforcement of our collective defence in a generation, with battle groups in the eastern part of the Alliance, with high readiness of our forces, and with tripling the size for instance of the NATO Response Force, air policing, more naval presence. We do so to prevent any misunderstanding and not allow any room for miscalculation that NATO is there to protect and defend all Allies. And this is deterrence. This is defensive. And the purpose is to preserve peace. It's not to provoke conflict, but to preserve peace, prevent conflict. And in this way, and of course, we will…and if Russia once again uses force against Ukraine and further invades Ukraine then we have to seriously look into the need to further increase our presence in the eastern part of the Alliance.</span></p><span data-dcnode-id="2002" instrument_node="">
</span><p data-dcnode-id="1998"><strong data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">NATO Spokesperson</span></strong><span data-dcnode-id="1999" instrument_node="">: Okay, we'll go to NRK. Higher up, higher up. Thank you.</span></p><span data-dcnode-id="1997" instrument_node="">
</span><p data-dcnode-id="1993"><strong data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">Simen Ekern (NRK): </span></strong><span data-dcnode-id="1994" instrument_node="">Mr. Secretary General, I was wondering yesterday at the briefing, the American ambassador repeated what you said now that NATO's open door policy is not up for negotiation. Is your sense, after the meeting today, that a possible avoiding an escalation is more or less probable, without assessing that question? After today's talks, is it at all possible to get any further?</span></p><span data-dcnode-id="1992" instrument_node="">
</span><p data-dcnode-id="1986"><strong data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">NATO Secretary General: </span></strong><span data-dcnode-id="1989" instrument_node="">It is possible to get further and to reduce tensions if Russia is willing to engage, and if Russia is willing to find a political way forward. And we are open to addressing and discussing a wide range of issues, including balanced arms control – conventional and nuclear, measures for risk reduction, more transparency, confidence building measures. And we have seen that these mechanisms have worked before. But we are not willing to compromise on the core principle, or one of the core principles of European security: that all countries have the right to choose their own path. And for me, it's interesting to note that, for instance, countries like Finland and Sweden, who have not applied for membership in NATO, they are very clear about this. Because they understand that as soon as you start to impose that kind of restrictions, that the right to choose your own path applies for some countries, but not for all countries, then you start to introduce some kind of first class and second class countries. Some have the right, because they are big or because of historical reasons are part of a military Alliance as NATO, to do what they want to choose their own path, but others don't have that right. And this whole idea that in a way you are close to me, so you cannot do what you want, is to re-introduce the thinking of spheres of influence. And especially those who are also coming from small countries, neighbouring Russia, should understand that that's a very dangerous path. And that's also the reason why, for instance, the Finish president, in a country that is not applying for membership, used this New Year's speech to underline the importance of that principle. And we have to distinguish between the principal, the international rule of law, and the concrete issue of whether Ukraine should join or not in the near future. That's an other thing. So well, if that was… I don't know exactly what the question was. But if the question was whether we're willing to compromise on core principles, the answer is no. If the question was whether NATO is willing to sit down in good faith, discuss arms control, confidence building measures, transparency, listen to the Russian concerns, the answer is yes.</span><span data-dcnode-id="1987" style="line-height:115%"><span data-dcnode-id="1988" instrument_node=""> </span></span></p><span data-dcnode-id="1985" instrument_node="">
</span><p data-dcnode-id="1981"><strong data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">NATO Spokesperson</span></strong><span data-dcnode-id="1982" instrument_node="">: Okay, we'll try to take one question online from Washington Post. Perry Stein.</span></p><span data-dcnode-id="1980" instrument_node="">
</span><p data-dcnode-id="1973"><strong data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Perry Stein (The Washington Post): </span></strong><span data-dcnode-id="1977" instrument_node="">Thank you so much.</span><strong data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node=""> </span></strong><span data-dcnode-id="1974" instrument_node="">With no country seeming to come, you know, with…it’s continued to be… [inaudible] it seems, with some of these main arguments…with neither side budging, how do you kind of avoid this spiral of continuing crisis’ of this nature in the future? I mean, do you see an end to these discussions?</span></p><span data-dcnode-id="1972" instrument_node="">
</span><p data-dcnode-id="1968"><strong data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">NATO Secretary General: </span></strong><span data-dcnode-id="1969" instrument_node="">Yes, I see an end to these discussions. And that the easiest and the fastest way to get out of this crisis is for Russia to de-escalate. The reasons why we are here, the reason why we have the crisis now, is that we have seen a significant military build-up in and around Ukraine, combined with threatening rhetoric, saying that if you don't do this, and this, you will face severe consequences, and what they refer to as military-technical measures. So that's the easiest way to dissolve or to diffuse the tensions we are faced with now.</span></p><span data-dcnode-id="1967" instrument_node="">
</span><p data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">More in general, I strongly believe in NATO's approach to Russia, which is what we call the dual-track approach. We need to be firm, we need to be strong, we need to be united, and we are that as Allies. But at the same time, we are always willing to engage in a meaningful dialogue with Russia. Russia is our neighbour and we need to sit down and address common security concerns together. And we have done that before. It's possible. We have agreed arms control agreements after the end of the Cold War, we actually made a lot of progress together. And of course, that's possible. That's another path. And we really call on Russia to choose that path of cooperation, of dialogue, of de-escalation instead of confrontation.</span></p><span data-dcnode-id="1964" instrument_node="">
</span><p data-dcnode-id="1960"><strong data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">NATO Spokesperson</span></strong><span data-dcnode-id="1961" instrument_node="">: We'll go to RIA.</span></p><span data-dcnode-id="1959" instrument_node="">
</span><p data-dcnode-id="1955"><strong data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">Nadim Zuaui (RIA Novosti): </span></strong><span data-dcnode-id="1956" instrument_node="">I have a question about, when do you expect any progress in restoring of the Russian Mission here in the headquarters of NATO? And do you have any precondition for this?</span></p><span data-dcnode-id="1954" instrument_node="">
</span><p data-dcnode-id="1950"><strong data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">NATO Secretary General: </span></strong><span data-dcnode-id="1951" instrument_node="">No, we have no precondition for that. So we regret that Russia closed the diplomatic mission to NATO, and we also regret that they closed down the NATO office in Moscow. But we have made it clear also in the meeting today that we [would like to] actually reopen, re-establish, both the NATO office in Moscow and also the Russia mission to NATO because we believe in dialogue. And we believe that these offices, these diplomatic personnel, they are part of the infrastructure we need to have a meaningful dialogue. What we have made clear is that regardless of whether these offices are reopened or not, we strongly believe that if Russia is willing to sit down in a series of meetings, addressing a wide range of issues, then we are of course ready to prepare those meetings with staff-to-staff civil and military interactions, preparations, to make these really substantive meetings. That will be easier if we have a Russian delegation to NATO and a NATO office in Moscow, but of course we can do that even without those offices.</span></p><span data-dcnode-id="1949" instrument_node="">
</span><p data-dcnode-id="1945"><strong data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">NATO Spokesperson: </span></strong><span data-dcnode-id="1946" instrument_node="">Ok, we will go to FOX.</span></p><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1933"><strong data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">Greg Palkot (FOX News)</span></strong><span data-dcnode-id="1941" instrument_node="">: Secretary General; Greg Talcott, FOX News. You have said, and I quote: “if these talks fail, NATO would be ready for a new armed conflict”. You have been in the room with the Russians now for several hours. What is your feeling? What is your gut? How close are we to a new armed conflict?</span><br data-dcnode-id="1940"><span data-dcnode-id="1939" instrument_node="">
</span><br data-dcnode-id="1938"><span data-dcnode-id="1937" instrument_node="">
</span><strong data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">NATO Secretary General</span></strong><span data-dcnode-id="1934" instrument_node="">: There is a real risk for a new armed conflict in Europe. But that's exactly why the meeting today, and the other meetings that take place this week, are so important. Because we will do what we can to prevent the new armed conflict. And that's the reason why we are so clearly, clear in our message to Russia that we are ready to sit down, list a long range of issues: arms control, reciprocal limits on missiles and many other issues to prevent a new armed conflict.</span></p><span data-dcnode-id="1932" instrument_node="">
</span><p data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">At the same time, we are clear-eyed. So we also convey a message to Russia that if they use military force, there will be severe consequences. Economic sanctions, political sanctions. We provide support, practical support to Ukraine to strengthen their ability to defend themselves. Allies do that in different ways.</span></p><span data-dcnode-id="1929" instrument_node="">
</span><p data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Then, I think is important, in a way, to also understand that Ukraine is a partner. We provide them support: political, practical support, in many different ways. But Ukraine is not a NATO member. The security guarantees, what we call Article 5, “one for all and all for one” - that applies for NATO members. And that's also reason why we have so clearly stated that we will do what it takes to defend all NATO Allies. And attacking one Ally will trigger the response from the whole Alliance. And that is clearly conveyed.&nbsp;</span></p><span data-dcnode-id="1926" instrument_node="">
</span><p data-dcnode-id="1922"><span data-dcnode-id="1925" instrument_node="">Follow-up question: [inaudible]… more dangerous or less dangerous?</span><strong data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node=""> </span></strong></p><span data-dcnode-id="1921" instrument_node="">
</span><p data-dcnode-id="1917"><strong data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">NATO Secretary General</span></strong><span data-dcnode-id="1918" instrument_node="">: I think it's very dangerous to start to speculate too much about that. This is a real risk. And we relate to that possibility partly by engaging in dialogue in good faith, but also partly being clear-eyed about the risk for a breakdown all these talks.</span></p><span data-dcnode-id="1916" instrument_node="">
</span><p data-dcnode-id="1884"><strong data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">NATO Spokesperson: </span></strong><span data-dcnode-id="1913" instrument_node="">I know that there are many questions. We'll end with The Associated Press.</span><br data-dcnode-id="1912"><span data-dcnode-id="1911" instrument_node="">
</span><br data-dcnode-id="1910"><span data-dcnode-id="1909" instrument_node="">
</span><strong data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Lorne Cook (The Associated Press):</span></strong><span data-dcnode-id="1906" instrument_node=""> Secretary General, President Putin had an agreement, draft agreement that he wanted to discuss with NATO. Did the Russian delegation put that agreement on the table today? And you've rejected the core principles of that. So is it off the table completely now? Thank you.</span><br data-dcnode-id="1905"><span data-dcnode-id="1904" instrument_node="">
</span><br data-dcnode-id="1903"><span data-dcnode-id="1902" instrument_node="">
</span><strong data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">NATO Secretary General</span></strong><span data-dcnode-id="1899" instrument_node="">: So Russia have put that, has put that proposal, that treaty on the table and sent it to the United States and to NATO. And of course, also went through those proposal, presented those proposals in the meeting today and argued in favour of these proposals. NATO Allies made it clear that, of course, we are open for dialogue, we can discuss many issues but we cannot discuss some core principles. Like, for instance, the freedom to choose your own path, including what kind of security arrangements each and every country in Europe wants to be part of, and our right to defend all Allies, including eastern Allies. But again, it's possible to agree on verifiable, reciprocal arms control, something that is balanced on conventional, nuclear missiles and other areas, and we stated that very clearly, too.</span><br data-dcnode-id="1898"><span data-dcnode-id="1897" instrument_node="">
</span><br data-dcnode-id="1896"><span data-dcnode-id="1895" instrument_node="">
</span><strong data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">NATO Spokesperson</span></strong><span data-dcnode-id="1892" instrument_node="">: Thank you very much. This concludes this press conference.</span><br data-dcnode-id="1891"><span data-dcnode-id="1890" instrument_node="">
</span><br data-dcnode-id="1889"><span data-dcnode-id="1888" instrument_node="">
</span><strong data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">NATO Secretary General</span></strong><span data-dcnode-id="1885" instrument_node="">: Thank you so much.</span></p><span data-dcnode-id="1883" instrument_node="">
</span></div><span data-dcnode-id="1881" instrument_node="">
