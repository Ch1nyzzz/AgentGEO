pan></span></div><div class="caas-attr-time-style" data-dcnode-id="961"><time class="caas-attr-meta-time" data-dcnode-id="966" datetime="2021-12-17T09:46:41.000Z"><span data-dcnode-id="967" instrument_node="">December 17, 2021, 1:46 AM</span></time><span class="caas-attr-meta-separator" data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">·</span></span><span data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">7 min read</span></span></div></div></div><div class="caas-content-contain-share" data-dcnode-id="955"><div class="caas-attr-separator" data-dcnode-id="956"><div class="separator" data-dcnode-id="958"></div><div class="separator-ext" data-dcnode-id="957"></div></div></div></div><div class="caas-body" data-dcnode-id="882"><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">MOSCOW (AP) — Russia on Friday published draft security demands that NATO deny membership to Ukraine and other former Soviet countries and roll back the alliance's military deployments in Central and Eastern Europe — bold ultimatums that are almost certain to be rejected by the U.S. and its allies.</span></p><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">The proposals, which were submitted to the U.S. and its allies earlier this week, also call for a ban on sending U.S. and Russian warships and aircraft to areas from where they can strike each other’s territory, along with a halt to NATO military drills near Russia.</span></p><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">The demand for a written guarantee that Ukraine won't be offered membership already has been rejected by the West, which said Moscow doesn't have a say in NATO's enlargement.</span></p><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">NATO’s secretary-general emphasized Friday that any security talks with Moscow would need to take into account NATO concerns and involve Ukraine and other partners. The White House similarly said it’s discussing the proposals with U.S. allies and partners, but noted that all countries have the right to determine their future without outside interference.</span></p><div class="caas-da" data-dcnode-id="944"><div data-dcnode-id="945" id="sda-INARTICLE"></div></div><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">The publication of the demands — contained in a proposed Russia-U.S. security treaty and a security agreement between Moscow and NATO — comes amid soaring tensions over a Russian troop buildup near Ukraine that has raised fears of an invasion. Moscow has denied it has plans to attack its neighbor but wants legal guarantees precluding NATO expansion and deploying weapons there.</span></p><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Deputy Foreign Minister Sergei Ryabkov said Russia’s relations with the U.S. and NATO have approached a “dangerous point,” noting that alliance deployments and drills near Russia have raised “unacceptable” threats to its security.</span></p><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Moscow wants the U.S. to start talks immediately on the proposals in Geneva, he told reporters.</span></p><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">NATO Secretary-General Jens Stoltenberg said the alliance had received the Russian documents, and noted that any dialogue with Moscow “would also need to address NATO’s concerns about Russia’s actions, be based on core principles and documents of European security, and take place in consultation with NATO’s European partners, such as Ukraine.”</span></p><div class="caas-readmore caas-readmore-collapse" data-dcnode-id="933"><button aria-label="" class="link caas-button collapse-button" data-dcnode-id="934" data-ylk="elm:readmore;slk:Story continues" title=""><span data-dcnode-id="935" instrument_node="">Story continues</span></button></div><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">He added that the 30 NATO countries “have made clear that should Russia take concrete steps to reduce tensions, we are prepared to work on strengthening confidence building measures.”</span></p><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">White House national security adviser Jake Sullivan said the administration is ready to discuss Moscow’s concerns about NATO in talks with Russian officials, but emphasized that Washington is committed to the “principle of nothing about you without you” in shaping policy that impacts European allies.</span></p><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">“We’re approaching the broader question of diplomacy with Russia from the point of view that ... meaningful progress at the negotiating table, of course, will have to take place in a context of de-escalation rather than escalation,” Sullivan said at the event hosted by the Council on Foreign Relations. He added “that it’s very difficult to see agreements getting consummated if we’re continuing to see an escalatory cycle.”</span></p><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">While U.S. intelligence has determined that Russian President Vladimir Putin has made plans for a potential further invasion of Ukraine in early 2022, Sullivan said the U.S. still does not know whether he has decided to move forward.</span></p><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">White House press secretary Jen Psaki noted that strategic security talks with Moscow go back decades, saying that “there’s no reason we can’t do that moving forward to reduce instability, but we’re going to do that in partnership and coordination with our European allies and partners.”</span></p><p data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">”We will not compromise the key principles on which European security is built, including that all countries have the right to decide their own future and foreign policy free from the outside interference," Psaki said.</span></p><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Moscow’s draft also calls for efforts to reduce the risk of incidents involving Russia and NATO warships and aircraft, primarily in the Baltic and the Black seas, increase the transparency of military drills and other confidence-building measures.</span></p><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">A senior U.S. official said some of the Russian proposals are part of an arms control agenda between Moscow and Washington, while some other issues, such as transparency and deconfliction, concern all 57 members of the Organization for Security and Cooperation in Europe, including Ukraine and Georgia.</span></p><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">The official, who briefed reporters on the condition of anonymity in order to talk about the proposals, said the U.S. is looking at how to engage every country whose interests are affected in prospective talks on European security issues and will respond to Moscow sometime next week with concrete proposals after consulting with the allies.</span></p><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">President Vladimir Putin raised the demand for security guarantees in last week’s video call with U.S. President Joe Biden. During the conversation, Biden voiced concern about a buildup of Russian troops near Ukraine and warned him that Russia would face “severe consequences” if Moscow attacked its neighbor.</span></p><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Russia annexed Ukraine's Crimean Peninsula in 2014 and shortly after cast its support behind a separatist rebellion in the country's east. More than seven years of fighting has killed over 14,000 people and devastated Ukraine’s industrial heartland, known as the Donbas.</span></p><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">The Russian demands would oblige Washington and its allies to pledge to halt NATO's eastward expansion to include other ex-Soviet republics and rescind a 2008 promise of membership to Ukraine and Georgia. The alliance already has firmly rejected that demand from Moscow.</span></p><p data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Moscow's documents also would preclude the U.S. and other NATO allies from conducting any military activities in Ukraine, other countries of Eastern Europe and ex-Soviet republics in the Caucasus and in Central Asia.</span></p><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">The Ukrainian Foreign Ministry commented on Moscow’s proposals by emphasizing that it’s up to the alliance and Ukraine to discuss NATO membership prospects and its military cooperation with other countries.</span></p><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">“The Russian aggression and the current Russian escalation along the Ukrainian border and on the occupied territories is now the main problem for the Euro-Atlantic security,” said its spokesman Oleg Nikolenko.</span></p><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">The Russian proposal also ups the ante by putting a new demand to roll back NATO military deployments in Central and Eastern Europe, stating that the parties agree not to send any troops to areas where they hadn't been present in 1997 — before NATO's eastward expansion started — except for exceptional situations of mutual consent.</span></p><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Poland, Hungary and the Czech Republic joined NATO in 1999, followed in 2004 by Bulgaria, Romania, Slovakia, Slovenia and the former Soviet republics of Estonia, Latvia and Lithuania. In the following years, Albania, Croatia, Montenegro and North Macedonia also became members, bringing NATO membership to 30 nations.</span></p><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">The draft proposals contain a ban on the deployment of U.S. and Russian warships and aircraft to “areas where they can strike targets on the territory of the other party.”</span></p><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Moscow has long complained about patrol flights by U.S. strategic bombers near Russia's borders and the deployment of U.S. and NATO warships to the Black Sea, describing them as destabilizing and provocative.</span></p><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Russia's draft envisages a pledge not to station intermediate-range missiles in areas where they can strike the other party’s territory, a clause that follows the U.S. and Russian withdrawal from a Cold War-era pact banning such weapons.</span></p><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">The Russian draft also calls for a ban on the deployment of U.S. and Russian nuclear weapons on the territory of other countries — a repeat of Moscow's longtime push for the U.S. to withdraw its nuclear weapons from Europe.</span></p><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Dmitri Trenin, the director of the Carnegie Moscow Center, noted that the publication of the Russian demands signals that the Kremlin considers their acceptance by the West unlikely.</span></p><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">“This logically means that Russia will have to assure its security single-handedly" using military-technical means, he said on Twitter.</span></p><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">___</span></p><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Cook reported from Brussels. Darlene Superville, Ellen Knickmeyer and Aamer Madhani in Washington and Yuras Karmanau in Kyiv, Ukraine, contributed.</span></p></div></div></div></div></div></div></div></article></div></div></div></div></div><div class="Pos(r) Pend(10%) Mb($gridMargin) Mt(-20px) Pstart(106px)" data-dcnode-id="865" id="postArticle"></div><div class="wafer-rapid-module Pos(r) Mb(40px)" data-dcnode-id="854" id="module-spotIm"><section data-dcnode-id="857" id="spot-im-comments"><div class="C(#828c93) Lh(20px) Fz(14px) Fw(500) BdT Bdtc(#222) Bdtw(2px) Mt(20px) Pt(24px) Py(24px)" data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Our goal is to create a safe and engaging place for users to connect over interests and passions. In order to improve our community experience, we are temporarily suspending article commenting</span></div><div data-dcnode-id="858" id="spotIm-conversations-module-wrapper"></div></section></div><div class="Ta(c) Mb($articleAdMargin) LDRB2-status-error" data-dcnode-id="850" id="sda-LDRB2"><div data-dcnode-id="851" id="sda-LDRB2-iframe"><noscript data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">&lt;!-- SpaceID=0 robot --&gt;
