</span><h2 data-dcnode-id="3719"><span class="mw-headline" data-dcnode-id="3727" id="Background"><span data-dcnode-id="3728" instrument_node="">Background</span></span><span class="mw-editsection" data-dcnode-id="3720"><span class="mw-editsection-bracket" data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">[</span></span><a data-dcnode-id="3723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDomestic_policy_of_Vladimir_Putin%26action%3Dedit%26section%3D1" title="Edit section: Background"><span data-dcnode-id="3724" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3721"><span data-dcnode-id="3722" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3718" instrument_node="">
</span><p data-dcnode-id="3707"><span data-dcnode-id="3717" instrument_node="">Putin's domestic policies, especially early in his first presidency, were aimed at creating a strict "vertical of power". On 13 May 2000, he issued a decree dividing the 89 </span><a data-dcnode-id="3715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_subjects_of_Russia" title="Federal subjects of Russia"><span data-dcnode-id="3716" instrument_node="">federal subjects of Russia</span></a><span data-dcnode-id="3714" instrument_node=""> between 7 </span><a data-dcnode-id="3712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_districts_of_Russia" title="Federal districts of Russia"><span data-dcnode-id="3713" instrument_node="">federal districts</span></a><span data-dcnode-id="3711" instrument_node=""> overseen by representatives named by himself to facilitate federal administration. Putin also pursued a policy of enlargement of federal subjects: their number was reduced from 89 in 2000 to the present 83 after the </span><a data-dcnode-id="3709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autonomous_okrugs_of_Russia" title="Autonomous okrugs of Russia"><span data-dcnode-id="3710" instrument_node="">autonomous okrugs of Russia</span></a><span data-dcnode-id="3708" instrument_node=""> were merged with their parent subjects.
</span></p><span data-dcnode-id="3706" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3694"><div class="thumbinner" data-dcnode-id="3695" style="width:352px;"><a class="image" data-dcnode-id="3704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMap_of_Russian_districts%2C_2010-01-19.svg"><img alt="" class="thumbimage" data-dcnode-id="3705" data-file-height="630" data-file-width="1092" decoding="async" height="202" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/77/Map_of_Russian_districts%252C_2010-01-19.svg/350px-Map_of_Russian_districts%252C_2010-01-19.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/77/Map_of_Russian_districts%2C_2010-01-19.svg/525px-Map_of_Russian_districts%2C_2010-01-19.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/77/Map_of_Russian_districts%2C_2010-01-19.svg/700px-Map_of_Russian_districts%2C_2010-01-19.svg.png 2x" width="350"></a><span data-dcnode-id="3703" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3696"><div class="magnify" data-dcnode-id="3701"><a class="internal" data-dcnode-id="3702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMap_of_Russian_districts%2C_2010-01-19.svg" title="Enlarge"></a></div><span data-dcnode-id="3700" instrument_node="">On 13 May 2000, Putin divided Russia into 7 </span><a data-dcnode-id="3698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_districts_of_Russia" title="Federal districts of Russia"><span data-dcnode-id="3699" instrument_node="">federal districts</span></a><span data-dcnode-id="3697" instrument_node="">. On 19 January 2010, the new 8th North Caucasian Federal District (shown here in purple) was split from Southern Federal District.</span></div></div></div><span data-dcnode-id="3693" instrument_node="">
</span><p data-dcnode-id="3670"><span data-dcnode-id="3692" instrument_node="">According to Stephen White, Russia under the presidency of Putin made it clear that it had no intention of establishing a "second edition" of the American or British political system, but rather a system that was closer to Russia's own traditions and circumstances.</span><sup class="reference" data-dcnode-id="3689" id="cite_ref-1"><a data-dcnode-id="3690" href="#cite_note-1"><span data-dcnode-id="3691" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3688" instrument_node=""> Putin's administration has often been described as a "</span><a data-dcnode-id="3686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sovereign_democracy" title="Sovereign democracy"><span data-dcnode-id="3687" instrument_node="">sovereign democracy</span></a><span data-dcnode-id="3685" instrument_node="">".</span><sup class="reference" data-dcnode-id="3682" id="cite_ref-2"><a data-dcnode-id="3683" href="#cite_note-2"><span data-dcnode-id="3684" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3681" instrument_node=""> First proposed by </span><a data-dcnode-id="3679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladislav_Surkov" title="Vladislav Surkov"><span data-dcnode-id="3680" instrument_node="">Vladislav Surkov</span></a><span data-dcnode-id="3678" instrument_node=""> in February 2006, the term quickly gained currency within Russia and arguably unified various political elites around it. According to its proponents, the government's actions and policies ought above all to enjoy popular support within Russia itself and not be determined from outside the country.</span><sup class="reference" data-dcnode-id="3675" id="cite_ref-3"><a data-dcnode-id="3676" href="#cite_note-3"><span data-dcnode-id="3677" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="3672" id="cite_ref-4"><a data-dcnode-id="3673" href="#cite_note-4"><span data-dcnode-id="3674" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3671" instrument_node="">
</span></p><p data-dcnode-id="3646"><span data-dcnode-id="3669" instrument_node="">In July 2000, according to a law proposed by him and approved by the </span><a class="mw-redirect" data-dcnode-id="3667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_Assembly_of_Russia" title="Federal Assembly of Russia"><span data-dcnode-id="3668" instrument_node="">Federal Assembly of Russia</span></a><span data-dcnode-id="3666" instrument_node="">, Putin gained the right to dismiss heads of the federal subjects. In 2004, the direct election of governors by popular vote was ended. This was seen by Putin as a necessary move to stop separatist tendencies and get rid of those governors who were connected with organised crime.</span><sup class="reference" data-dcnode-id="3663" id="cite_ref-5"><a data-dcnode-id="3664" href="#cite_note-5"><span data-dcnode-id="3665" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3662" instrument_node=""> The measure proved to be temporary: in 2012, as proposed by Putin's successor Dmitry Medvedev, the direct election of governors was re-introduced.</span><sup class="reference" data-dcnode-id="3659" id="cite_ref-liberal-reforms_6-0"><a data-dcnode-id="3660" href="#cite_note-liberal-reforms-6"><span data-dcnode-id="3661" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3658" instrument_node=""> Along with the return of elected governors, Medvedev's reforms also simplified the registration of political parties and reduced the number of signatures required by non-parliamentary parties and independent candidates to participate in elections,</span><sup class="reference" data-dcnode-id="3655" id="cite_ref-liberal-reforms_6-1"><a data-dcnode-id="3656" href="#cite_note-liberal-reforms-6"><span data-dcnode-id="3657" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3654" instrument_node=""> thus reverting or further loosening the restrictions imposed by previous Putin-endorsed legislation. Notably, the tough electoral legislation has been among the government actions effected under Putin's presidency that have been criticised by many independent Russian media outlets and Western commentators as anti-democratic.</span><sup class="reference" data-dcnode-id="3651" id="cite_ref-7"><a data-dcnode-id="3652" href="#cite_note-7"><span data-dcnode-id="3653" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="3648" id="cite_ref-8"><a data-dcnode-id="3649" href="#cite_note-8"><span data-dcnode-id="3650" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3647" instrument_node="">
</span></p><p data-dcnode-id="3624"><span data-dcnode-id="3645" instrument_node="">During his first term in office, Putin moved to curb the political ambitions of some of the Yeltsin-era </span><a class="mw-redirect" data-dcnode-id="3643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Business_oligarchs" title="Business oligarchs"><span data-dcnode-id="3644" instrument_node="">oligarchs</span></a><span data-dcnode-id="3642" instrument_node="">, resulting in the exile or imprisonment of such people as </span><a data-dcnode-id="3640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boris_Berezovsky_%28businessman%29" title="Boris Berezovsky (businessman)"><span data-dcnode-id="3641" instrument_node="">Boris Berezovsky</span></a><span data-dcnode-id="3639" instrument_node="">, </span><a data-dcnode-id="3637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Gusinsky" title="Vladimir Gusinsky"><span data-dcnode-id="3638" instrument_node="">Vladimir Gusinsky</span></a><span data-dcnode-id="3636" instrument_node="">, </span><a data-dcnode-id="3634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Khodorkovsky" title="Mikhail Khodorkovsky"><span data-dcnode-id="3635" instrument_node="">Mikhail Khodorkovsky</span></a><span data-dcnode-id="3633" instrument_node="">; other oligarchs soon joined Putin's camp.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3626" style="white-space:nowrap;"><span data-dcnode-id="3632" instrument_node="">[</span><i data-dcnode-id="3628"><a data-dcnode-id="3629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3630" title="This claim needs references to reliable sources. (March 2012)"><span data-dcnode-id="3631" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3627" instrument_node="">]</span></sup><span data-dcnode-id="3625" instrument_node="">
</span></p><p data-dcnode-id="3608"><span data-dcnode-id="3623" instrument_node="">Putin presided over an intensified fight with </span><a data-dcnode-id="3621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crime_in_Russia" title="Crime in Russia"><span data-dcnode-id="3622" instrument_node="">organised crime</span></a><span data-dcnode-id="3620" instrument_node=""> and </span><a data-dcnode-id="3618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terrorism" title="Terrorism"><span data-dcnode-id="3619" instrument_node="">terrorism</span></a><span data-dcnode-id="3617" instrument_node=""> that resulted in two times lower murder rates by 2011,</span><sup class="reference" data-dcnode-id="3614" id="cite_ref-9"><a data-dcnode-id="3615" href="#cite_note-9"><span data-dcnode-id="3616" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3613" instrument_node=""> as well as significant reduction in the numbers of terrorist acts by the late 2000s.</span><sup class="reference" data-dcnode-id="3610" id="cite_ref-10"><a data-dcnode-id="3611" href="#cite_note-10"><span data-dcnode-id="3612" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3609" instrument_node="">
</span></p><p data-dcnode-id="3596"><span data-dcnode-id="3607" instrument_node="">Putin succeeded in codifying land law and tax law and promulgated new codes on labour, administrative, criminal, commercial and civil procedural law.</span><sup class="reference" data-dcnode-id="3604" id="cite_ref-sharlet_11-0"><a data-dcnode-id="3605" href="#cite_note-sharlet-11"><span data-dcnode-id="3606" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3603" instrument_node=""> Under Medvedev's presidency, Putin's government implemented some key reforms in the area of state security, the </span><a data-dcnode-id="3601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_police_reform" title="Russian police reform"><span data-dcnode-id="3602" instrument_node="">Russian police reform</span></a><span data-dcnode-id="3600" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="3598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_military_reform" title="Russian military reform"><span data-dcnode-id="3599" instrument_node="">Russian military reform</span></a><span data-dcnode-id="3597" instrument_node="">.
</span></p><span data-dcnode-id="3595" instrument_node="">
</span><h2 data-dcnode-id="3584"><span data-dcnode-id="3594" id="Economic.2C_industrial.2C_and_energy_policies"></span><span class="mw-headline" data-dcnode-id="3592" id="Economic,_industrial,_and_energy_policies"><span data-dcnode-id="3593" instrument_node="">Economic, industrial, and energy policies</span></span><span class="mw-editsection" data-dcnode-id="3585"><span class="mw-editsection-bracket" data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">[</span></span><a data-dcnode-id="3588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDomestic_policy_of_Vladimir_Putin%26action%3Dedit%26section%3D2" title="Edit section: Economic, industrial, and energy policies"><span data-dcnode-id="3589" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3586"><span data-dcnode-id="3587" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3583" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="3574" role="note"><span data-dcnode-id="3580" instrument_node="">See also: </span><a data-dcnode-id="3578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economy_of_Russia" title="Economy of Russia"><span data-dcnode-id="3579" instrument_node="">Economy of Russia</span></a><span data-dcnode-id="3577" instrument_node=""> and </span><a data-dcnode-id="3575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Energy_policy_of_Russia" title="Energy policy of Russia"><span data-dcnode-id="3576" instrument_node="">Energy policy of Russia</span></a></div><span data-dcnode-id="3573" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3558"><div class="thumbinner" data-dcnode-id="3559" style="width:352px;"><a class="image" data-dcnode-id="3571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGDP_of_Russia_since_1989.svg"><img alt="" class="thumbimage" data-dcnode-id="3572" data-file-height="402" data-file-width="700" decoding="async" height="201" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/04/GDP_of_Russia_since_1989.svg/350px-GDP_of_Russia_since_1989.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/04/GDP_of_Russia_since_1989.svg/525px-GDP_of_Russia_since_1989.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/04/GDP_of_Russia_since_1989.svg/700px-GDP_of_Russia_since_1989.svg.png 2x" width="350"></a><span data-dcnode-id="3570" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3560"><div class="magnify" data-dcnode-id="3568"><a class="internal" data-dcnode-id="3569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGDP_of_Russia_since_1989.svg" title="Enlarge"></a></div><span data-dcnode-id="3567" instrument_node="">Russian GDP since the end of the </span><a data-dcnode-id="3565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="3566" instrument_node="">Soviet Union</span></a><span data-dcnode-id="3564" instrument_node="">. The Russian term for GDP is </span><i data-dcnode-id="3562"><span data-dcnode-id="3563" instrument_node="">ВВП</span></i><span data-dcnode-id="3561" instrument_node=""> (VVP) which coincides with the initials of Vladimir Vladimirovich Putin and is often used as a shortcut when writing or speaking about him. (from 2014 are forecasts)</span></div></div></div><span data-dcnode-id="3557" instrument_node="">
</span><p data-dcnode-id="3532"><span data-dcnode-id="3556" instrument_node="">Under the first Putin administration the economy made </span><a class="mw-redirect" data-dcnode-id="3554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_countries_by_GDP_%28real%29_growth_rate" title="List of countries by GDP (real) growth rate"><span data-dcnode-id="3555" instrument_node="">real gains</span></a><span data-dcnode-id="3553" instrument_node=""> of an average 7% per year (2000: 10%, 2001: 5.1%, 2002: 4.7%, 2003: 7.3%, 2004: 7.2%, 2005: 6.4%, 2006: 8.2%, 2007: 8.5%),</span><sup class="reference" data-dcnode-id="3550" id="cite_ref-12"><a data-dcnode-id="3551" href="#cite_note-12"><span data-dcnode-id="3552" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3549" instrument_node=""> making it the 7th largest economy in the world in </span><a data-dcnode-id="3547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_countries_by_GDP_%28PPP%29" title="List of countries by GDP (PPP)"><span data-dcnode-id="3548" instrument_node="">purchasing power</span></a><span data-dcnode-id="3546" instrument_node="">. Russia's </span><a data-dcnode-id="3544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_countries_by_GDP_%28nominal%29" title="List of countries by GDP (nominal)"><span data-dcnode-id="3545" instrument_node="">nominal</span></a><span data-dcnode-id="3543" instrument_node=""> Gross Domestic Product (GDP) increased 6-fold, climbing from 22nd to 10th largest in the world. In 2007, Russia's GDP exceeded that of </span><a class="mw-redirect" data-dcnode-id="3541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_SFSR" title="Russian SFSR"><span data-dcnode-id="3542" instrument_node="">Russian SFSR</span></a><span data-dcnode-id="3540" instrument_node=""> in 1990, meaning it has overcome the devastating consequences of the </span><a data-dcnode-id="3538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1998_Russian_financial_crisis" title="1998 Russian financial crisis"><span data-dcnode-id="3539" instrument_node="">1998 financial crisis</span></a><span data-dcnode-id="3537" instrument_node=""> and preceding recession in the 1990s.</span><sup class="reference" data-dcnode-id="3534" id="cite_ref-stats_13-0"><a data-dcnode-id="3535" href="#cite_note-stats-13"><span data-dcnode-id="3536" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3533" instrument_node="">
</span></p><p data-dcnode-id="3505"><span data-dcnode-id="3531" instrument_node="">During Putin's first term of eight years in office, industry grew by 76%, investments increased by 125%,</span><sup class="reference" data-dcnode-id="3528" id="cite_ref-stats_13-1"><a data-dcnode-id="3529" href="#cite_note-stats-13"><span data-dcnode-id="3530" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3527" instrument_node=""> and agricultural production and construction increased as well. Real incomes more than doubled and the average monthly salary increased sevenfold from $80 to $640.</span><sup class="reference" data-dcnode-id="3524" id="cite_ref-nbc_14-0"><a data-dcnode-id="3525" href="#cite_note-nbc-14"><span data-dcnode-id="3526" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="3521" id="cite_ref-russiaprofile_15-0"><a data-dcnode-id="3522" href="#cite_note-russiaprofile-15"><span data-dcnode-id="3523" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3520" instrument_node=""> From 2000 to 2006 the volume of consumer credit increased 45 times</span><sup class="reference" data-dcnode-id="3517" id="cite_ref-vtbmagazine_16-0"><a data-dcnode-id="3518" href="#cite_note-vtbmagazine-16"><span data-dcnode-id="3519" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="3514" id="cite_ref-samaratoday_17-0"><a data-dcnode-id="3515" href="#cite_note-samaratoday-17"><span data-dcnode-id="3516" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3513" instrument_node=""> and the middle class grew from 8 million to 55&nbsp;million. The number of people living below the poverty line decreased from 30% in 2000 to 14% in 2008.</span><sup class="reference" data-dcnode-id="3510" id="cite_ref-stats_13-2"><a data-dcnode-id="3511" href="#cite_note-stats-13"><span data-dcnode-id="3512" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="3507" id="cite_ref-gks_18-0"><a data-dcnode-id="3508" href="#cite_note-gks-18"><span data-dcnode-id="3509" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3506" instrument_node="">
</span></p><p data-dcnode-id="3481"><span data-dcnode-id="3504" instrument_node="">In 2001, Putin, who has advocated liberal economic policies, introduced a </span><a data-dcnode-id="3502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flat_tax" title="Flat tax"><span data-dcnode-id="3503" instrument_node="">flat tax</span></a><span data-dcnode-id="3501" instrument_node=""> rate of 13%;</span><sup class="reference" data-dcnode-id="3498" id="cite_ref-heritage_19-0"><a data-dcnode-id="3499" href="#cite_note-heritage-19"><span data-dcnode-id="3500" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="3495" id="cite_ref-20"><a data-dcnode-id="3496" href="#cite_note-20"><span data-dcnode-id="3497" instrument_node="">[20]</span></a></sup><span data-dcnode-id="3494" instrument_node=""> the corporate rate of tax was also reduced from 35 percent to 24 percent;</span><sup class="reference" data-dcnode-id="3491" id="cite_ref-heritage_19-1"><a data-dcnode-id="3492" href="#cite_note-heritage-19"><span data-dcnode-id="3493" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3490" instrument_node=""> Small businesses also get better treatment. The old system with high tax rates has been replaced by a new system where companies can choose either a 6-percent tax on gross revenue or a 15-percent tax on profits.</span><sup class="reference" data-dcnode-id="3487" id="cite_ref-heritage_19-2"><a data-dcnode-id="3488" href="#cite_note-heritage-19"><span data-dcnode-id="3489" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3486" instrument_node=""> The overall tax burden is lower in Russia than in most European countries.</span><sup class="reference" data-dcnode-id="3483" id="cite_ref-taxcompare_21-0"><a data-dcnode-id="3484" href="#cite_note-taxcompare-21"><span data-dcnode-id="3485" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3482" instrument_node="">
</span></p><p data-dcnode-id="3463"><span data-dcnode-id="3480" instrument_node="">A central concept in Putin's economic thinking was the creation of so-called </span><a data-dcnode-id="3478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_champions" title="National champions"><span data-dcnode-id="3479" instrument_node="">National champions</span></a><span data-dcnode-id="3477" instrument_node="">, vertically integrated companies in strategic sectors that are expected not only to seek profit, but also to "advance the interests of the nation". Examples of such companies include </span><a data-dcnode-id="3475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gazprom" title="Gazprom"><span data-dcnode-id="3476" instrument_node="">Gazprom</span></a><span data-dcnode-id="3474" instrument_node="">, </span><a data-dcnode-id="3472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rosneft" title="Rosneft"><span data-dcnode-id="3473" instrument_node="">Rosneft</span></a><span data-dcnode-id="3471" instrument_node=""> and </span><a data-dcnode-id="3469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Aircraft_Corporation" title="United Aircraft Corporation"><span data-dcnode-id="3470" instrument_node="">United Aircraft Corporation</span></a><span data-dcnode-id="3468" instrument_node="">.</span><sup class="reference" data-dcnode-id="3465" id="cite_ref-marshall_22-0"><a data-dcnode-id="3466" href="#cite_note-marshall-22"><span data-dcnode-id="3467" instrument_node="">[22]</span></a></sup><span data-dcnode-id="3464" instrument_node="">
</span></p><p data-dcnode-id="3457"><span data-dcnode-id="3462" instrument_node="">Before the Putin era, in 1998, over 60% of industrial turnover in Russia was based on barter and various monetary surrogates. The use of such alternatives to money has now fallen out of favour, boosting economic productivity significantly. Besides raising wages and consumption, Putin's government has received broad praise also for eliminating this problem.</span><sup class="reference" data-dcnode-id="3459" id="cite_ref-challenges_of_medv_era_23-0"><a data-dcnode-id="3460" href="#cite_note-challenges_of_medv_era-23"><span data-dcnode-id="3461" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3458" instrument_node="">
</span></p><p data-dcnode-id="3448"><span data-dcnode-id="3456" instrument_node="">Some oil revenue went to the </span><a data-dcnode-id="3454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stabilization_Fund_of_the_Russian_Federation" title="Stabilization Fund of the Russian Federation"><span data-dcnode-id="3455" instrument_node="">stabilization fund</span></a><span data-dcnode-id="3453" instrument_node=""> established in 2004. The fund accumulated oil revenue, allowing Russia to repay all of the Soviet Union's debts by 2005. In early 2008, it was split into the Reserve Fund (designed to protect Russia from possible global financial shocks) and the National Welfare Fund, whose revenues will be used for a pension reform.</span><sup class="reference" data-dcnode-id="3450" id="cite_ref-stats_13-3"><a data-dcnode-id="3451" href="#cite_note-stats-13"><span data-dcnode-id="3452" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3449" instrument_node="">
</span></p><p data-dcnode-id="3434"><span data-dcnode-id="3447" instrument_node="">Inflation remained a problem however, as between 1999 and 2007 it was kept at the forecast ceiling only twice, and in 2007 the inflation exceeded that of 2006, continuing an upward trend at the beginning of 2008.</span><sup class="reference" data-dcnode-id="3444" id="cite_ref-stats_13-4"><a data-dcnode-id="3445" href="#cite_note-stats-13"><span data-dcnode-id="3446" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3443" instrument_node=""> The Russian economy is still commodity-driven despite its growth. Payments from the fuel and energy sector in the form of customs duties and taxes accounted for nearly half of the federal budget's revenues. The large majority of Russia's exports are made up of raw materials and fertilizers,</span><sup class="reference" data-dcnode-id="3440" id="cite_ref-stats_13-5"><a data-dcnode-id="3441" href="#cite_note-stats-13"><span data-dcnode-id="3442" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3439" instrument_node=""> although exports as a whole accounted for only 8.7% of the GDP in 2007, compared to 20% in 2000.</span><sup class="reference" data-dcnode-id="3436" id="cite_ref-24"><a data-dcnode-id="3437" href="#cite_note-24"><span data-dcnode-id="3438" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3435" instrument_node="">
</span></p><p data-dcnode-id="3429"><span data-dcnode-id="3433" instrument_node="">In December 2011, after 15 years of negotiations, Russia finally joined the </span><a data-dcnode-id="3431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Trade_Organization" title="World Trade Organization"><span data-dcnode-id="3432" instrument_node="">World Trade Organization</span></a><span data-dcnode-id="3430" instrument_node="">. The accession to WTO was expected to be ratified by Russian Parliament in the spring of 2012.
</span></p><span data-dcnode-id="3428" instrument_node="">
</span><div data-dcnode-id="3427" style="clear:both;"></div><span data-dcnode-id="3426" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3411"><div class="thumbinner" data-dcnode-id="3412" style="width:222px;"><a class="image" data-dcnode-id="3424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APutin_drives_a_yellow_Lada_through_the_Amur_Highway_1.jpeg"><img alt="" class="thumbimage" data-dcnode-id="3425" data-file-height="3264" data-file-width="4896" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f0/Putin_drives_a_yellow_Lada_through_the_Amur_Highway_1.jpeg/220px-Putin_drives_a_yellow_Lada_through_the_Amur_Highway_1.jpeg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f0/Putin_drives_a_yellow_Lada_through_the_Amur_Highway_1.jpeg/330px-Putin_drives_a_yellow_Lada_through_the_Amur_Highway_1.jpeg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f0/Putin_drives_a_yellow_Lada_through_the_Amur_Highway_1.jpeg/440px-Putin_drives_a_yellow_Lada_through_the_Amur_Highway_1.jpeg 2x" width="220"></a><span data-dcnode-id="3423" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3413"><div class="magnify" data-dcnode-id="3421"><a class="internal" data-dcnode-id="3422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APutin_drives_a_yellow_Lada_through_the_Amur_Highway_1.jpeg" title="Enlarge"></a></div><span data-dcnode-id="3420" instrument_node="">Putin promotes the </span><a data-dcnode-id="3418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lada_Kalina" title="Lada Kalina"><span data-dcnode-id="3419" instrument_node="">Lada Kalina</span></a><span data-dcnode-id="3417" instrument_node=""> brand driving through the recently opened </span><a class="mw-redirect" data-dcnode-id="3415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amur_Highway" title="Amur Highway"><span data-dcnode-id="3416" instrument_node="">Amur Highway</span></a><span data-dcnode-id="3414" instrument_node=""> in 2010.</span></div></div></div><span data-dcnode-id="3410" instrument_node="">
</span><p data-dcnode-id="3359"><span data-dcnode-id="3409" instrument_node="">To boost the market share of locally produced vehicles and support the </span><a data-dcnode-id="3407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Automotive_industry_in_Russia" title="Automotive industry in Russia"><span data-dcnode-id="3408" instrument_node="">Russia's automotive industry</span></a><span data-dcnode-id="3406" instrument_node="">, the government under Putin implemented several protectionist measures and launched programs to attract foreign producers into the country. In late 2005, the government enacted legislation to create </span><a data-dcnode-id="3404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Special_economic_zone" title="Special economic zone"><span data-dcnode-id="3405" instrument_node="">special economic zones</span></a><span data-dcnode-id="3403" instrument_node=""> (SEZ) with the aim of encouraging investments by foreign automotive companies. The benefits of operating in the special economic zones include tax allowances, abolishment of asset and land taxes and protection against changes in the tax regime. Some regions also provide extensive support for large investors (over $100&nbsp;million.) These include </span><a data-dcnode-id="3401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saint_Petersburg" title="Saint Petersburg"><span data-dcnode-id="3402" instrument_node="">Saint Petersburg</span></a><span data-dcnode-id="3400" instrument_node="">/</span><a data-dcnode-id="3398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leningrad_Oblast" title="Leningrad Oblast"><span data-dcnode-id="3399" instrument_node="">Leningrad Oblast</span></a><span data-dcnode-id="3397" instrument_node="">, </span><a data-dcnode-id="3395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kaluga_Oblast" title="Kaluga Oblast"><span data-dcnode-id="3396" instrument_node="">Kaluga Oblast</span></a><span data-dcnode-id="3394" instrument_node=""> and </span><a data-dcnode-id="3392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kaliningrad_Oblast" title="Kaliningrad Oblast"><span data-dcnode-id="3393" instrument_node="">Kaliningrad Oblast</span></a><span data-dcnode-id="3391" instrument_node="">.</span><sup class="reference" data-dcnode-id="3388" id="cite_ref-eurobank_25-0"><a data-dcnode-id="3389" href="#cite_note-eurobank-25"><span data-dcnode-id="3390" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3387" instrument_node=""> Under Putin as president and Premier, most of the world's largest automotive companies opened plants in Russia, including </span><a data-dcnode-id="3385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ford_Motor_Company" title="Ford Motor Company"><span data-dcnode-id="3386" instrument_node="">Ford Motor Company</span></a><span data-dcnode-id="3384" instrument_node="">, </span><a data-dcnode-id="3382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Toyota" title="Toyota"><span data-dcnode-id="3383" instrument_node="">Toyota</span></a><span data-dcnode-id="3381" instrument_node="">, </span><a data-dcnode-id="3379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_Motors" title="General Motors"><span data-dcnode-id="3380" instrument_node="">General Motors</span></a><span data-dcnode-id="3378" instrument_node="">, </span><a data-dcnode-id="3376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nissan" title="Nissan"><span data-dcnode-id="3377" instrument_node="">Nissan</span></a><span data-dcnode-id="3375" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hyundai_Motor" title="Hyundai Motor"><span data-dcnode-id="3374" instrument_node="">Hyundai Motor</span></a><span data-dcnode-id="3372" instrument_node="">, </span><a data-dcnode-id="3370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suzuki" title="Suzuki"><span data-dcnode-id="3371" instrument_node="">Suzuki</span></a><span data-dcnode-id="3369" instrument_node="">, </span><a data-dcnode-id="3367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magna_International" title="Magna International"><span data-dcnode-id="3368" instrument_node="">Magna International</span></a><span data-dcnode-id="3366" instrument_node="">, </span><a data-dcnode-id="3364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scania_AB" title="Scania AB"><span data-dcnode-id="3365" instrument_node="">Scania</span></a><span data-dcnode-id="3363" instrument_node=""> and </span><a data-dcnode-id="3361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MAN_SE" title="MAN SE"><span data-dcnode-id="3362" instrument_node="">MAN SE</span></a><span data-dcnode-id="3360" instrument_node="">.
</span></p><p data-dcnode-id="3350"><span data-dcnode-id="3358" instrument_node="">In 2005, Putin initiated an industry consolidation programme to bring the main aircraft producing companies under a single umbrella organization, the </span><a data-dcnode-id="3356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Aircraft_Corporation" title="United Aircraft Corporation"><span data-dcnode-id="3357" instrument_node="">United Aircraft Corporation</span></a><span data-dcnode-id="3355" instrument_node=""> (UAC). The aim was optimize production lines and minimise losses. The programme was divided in three parts: reorganization and crisis management (2007–2010), evolution of existing projects (2010–2015) and further progress within the newly created structure (2015–2025).</span><sup class="reference" data-dcnode-id="3352" id="cite_ref-ato1_26-0"><a data-dcnode-id="3353" href="#cite_note-ato1-26"><span data-dcnode-id="3354" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3351" instrument_node="">
</span></p><p data-dcnode-id="3326"><span data-dcnode-id="3349" instrument_node="">The UAC, one of the so-called </span><a data-dcnode-id="3347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_champions" title="National champions"><span data-dcnode-id="3348" instrument_node="">national champions</span></a><span data-dcnode-id="3346" instrument_node=""> and comparable to </span><a class="mw-redirect" data-dcnode-id="3344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/EADS" title="EADS"><span data-dcnode-id="3345" instrument_node="">EADS</span></a><span data-dcnode-id="3343" instrument_node=""> in Europe, enjoyed considerable financial support from the Russian government, and injected money to the companies it had acquired to improve their financial standing. The deliveries of civilian aircraft increased to 6 in 2005, and in 2009 the industry delivered 15 civilian aircraft, worth 12.5&nbsp;billion roubles, mostly to domestic customers.</span><sup class="reference" data-dcnode-id="3340" id="cite_ref-UAC2009_27-0"><a data-dcnode-id="3341" href="#cite_note-UAC2009-27"><span data-dcnode-id="3342" instrument_node="">[27]</span></a></sup><span data-dcnode-id="3339" instrument_node=""> Since then Russia has successfully tested the </span><a class="mw-redirect" data-dcnode-id="3337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fifth_generation_jet_fighter" title="Fifth generation jet fighter"><span data-dcnode-id="3338" instrument_node="">fifth generation jet fighter</span></a><span data-dcnode-id="3336" instrument_node="">, </span><a data-dcnode-id="3334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sukhoi_Su-57" title="Sukhoi Su-57"><span data-dcnode-id="3335" instrument_node="">Sukhoi Su-57</span></a><span data-dcnode-id="3333" instrument_node="">, and started the commercial production of the </span><a data-dcnode-id="3331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Regional_airliner" title="Regional airliner"><span data-dcnode-id="3332" instrument_node="">regional airliner</span></a><span data-dcnode-id="3330" instrument_node=""> </span><a data-dcnode-id="3328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sukhoi_Superjet_100" title="Sukhoi Superjet 100"><span data-dcnode-id="3329" instrument_node="">Sukhoi Superjet 100</span></a><span data-dcnode-id="3327" instrument_node="">, as well as started developing a number of other major projects.
</span></p><p data-dcnode-id="3274"><span data-dcnode-id="3325" instrument_node="">In a similar fashion, Putin created the </span><a data-dcnode-id="3323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Shipbuilding_Corporation" title="United Shipbuilding Corporation"><span data-dcnode-id="3324" instrument_node="">United Shipbuilding Corporation</span></a><span data-dcnode-id="3322" instrument_node=""> in 2007, which led to the recovery</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3315" style="white-space:nowrap;"><span data-dcnode-id="3321" instrument_node="">[</span><i data-dcnode-id="3317"><a data-dcnode-id="3318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3319" title="This claim needs references to reliable sources. (February 2012)"><span data-dcnode-id="3320" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3316" instrument_node="">]</span></sup><span data-dcnode-id="3314" instrument_node=""> of </span><a data-dcnode-id="3312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shipbuilding_in_Russia" title="Shipbuilding in Russia"><span data-dcnode-id="3313" instrument_node="">shipbuilding in Russia</span></a><span data-dcnode-id="3311" instrument_node="">. Since 2006, much effort was put into consolidation and development of the </span><a class="mw-redirect" data-dcnode-id="3309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rosatom_Nuclear_Energy_State_Corporation" title="Rosatom Nuclear Energy State Corporation"><span data-dcnode-id="3310" instrument_node="">Rosatom Nuclear Energy State Corporation</span></a><span data-dcnode-id="3308" instrument_node="">, which led to the renewed construction of </span><a class="mw-redirect" data-dcnode-id="3306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_power_plants_in_Russia" title="Nuclear power plants in Russia"><span data-dcnode-id="3307" instrument_node="">nuclear power plants in Russia</span></a><span data-dcnode-id="3305" instrument_node=""> as well as a vast activity of Rosatom abroad, buying huge shares in world's leading </span><a data-dcnode-id="3303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uranium" title="Uranium"><span data-dcnode-id="3304" instrument_node="">uranium</span></a><span data-dcnode-id="3302" instrument_node=""> production companies and building nuclear power plants in many countries, including </span><a data-dcnode-id="3300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran" title="Iran"><span data-dcnode-id="3301" instrument_node="">Iran</span></a><span data-dcnode-id="3299" instrument_node="">, China, </span><a data-dcnode-id="3297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam" title="Vietnam"><span data-dcnode-id="3298" instrument_node="">Vietnam</span></a><span data-dcnode-id="3296" instrument_node=""> and </span><a data-dcnode-id="3294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belarus" title="Belarus"><span data-dcnode-id="3295" instrument_node="">Belarus</span></a><span data-dcnode-id="3293" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3286" style="white-space:nowrap;"><span data-dcnode-id="3292" instrument_node="">[</span><i data-dcnode-id="3288"><a data-dcnode-id="3289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3290" title="This claim needs references to reliable sources. (February 2012)"><span data-dcnode-id="3291" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3287" instrument_node="">]</span></sup><span data-dcnode-id="3285" instrument_node=""> In 2007, the </span><a class="mw-redirect" data-dcnode-id="3283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Nanotechnology_Corporation" title="Russian Nanotechnology Corporation"><span data-dcnode-id="3284" instrument_node="">Russian Nanotechnology Corporation</span></a><span data-dcnode-id="3282" instrument_node=""> was established, aimed to boost the </span><a data-dcnode-id="3280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Science_and_technology_in_Russia" title="Science and technology in Russia"><span data-dcnode-id="3281" instrument_node="">science and technology</span></a><span data-dcnode-id="3279" instrument_node=""> and high-tech industry in Russia.</span><sup class="reference" data-dcnode-id="3276" id="cite_ref-28"><a data-dcnode-id="3277" href="#cite_note-28"><span data-dcnode-id="3278" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3275" instrument_node="">
</span></p><span data-dcnode-id="3273" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3258"><div class="thumbinner" data-dcnode-id="3259" style="width:302px;"><a class="image" data-dcnode-id="3271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARF_NG_pipestoEU.gif"><img alt="" class="thumbimage" data-dcnode-id="3272" data-file-height="757" data-file-width="590" decoding="async" height="385" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4c/RF_NG_pipestoEU.gif/300px-RF_NG_pipestoEU.gif&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4c/RF_NG_pipestoEU.gif/450px-RF_NG_pipestoEU.gif 1.5x, //upload.wikimedia.org/wikipedia/commons/4/4c/RF_NG_pipestoEU.gif 2x" width="300"></a><span data-dcnode-id="3270" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3260"><div class="magnify" data-dcnode-id="3268"><a class="internal" data-dcnode-id="3269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARF_NG_pipestoEU.gif" title="Enlarge"></a></div><span data-dcnode-id="3267" instrument_node="">Under Putin, Russia strengthened its position as a key </span><a data-dcnode-id="3265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petroleum" title="Petroleum"><span data-dcnode-id="3266" instrument_node="">oil</span></a><span data-dcnode-id="3264" instrument_node=""> and </span><a data-dcnode-id="3262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_gas" title="Natural gas"><span data-dcnode-id="3263" instrument_node="">gas</span></a><span data-dcnode-id="3261" instrument_node=""> supplier to much of Europe.</span></div></div></div><span data-dcnode-id="3257" instrument_node="">
</span><p data-dcnode-id="3242"><span data-dcnode-id="3256" instrument_node="">In the decade following 2000, </span><a data-dcnode-id="3254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Energy_in_Russia" title="Energy in Russia"><span data-dcnode-id="3255" instrument_node="">energy in Russia</span></a><span data-dcnode-id="3253" instrument_node=""> helped transform the country, especially oil and gas energy.  This transformation promoted Russia's well-being and international influence, and the country was frequently described in the media as an </span><a data-dcnode-id="3251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Energy_superpower" title="Energy superpower"><span data-dcnode-id="3252" instrument_node="">energy superpower</span></a><span data-dcnode-id="3250" instrument_node="">.</span><sup class="reference" data-dcnode-id="3247" id="cite_ref-online.wsj.com_29-0"><a data-dcnode-id="3248" href="#cite_note-online.wsj.com-29"><span data-dcnode-id="3249" instrument_node="">[29]</span></a></sup><span data-dcnode-id="3246" instrument_node=""> Putin oversaw growing taxation of oil and gas exports which helped finance the budget, while the </span><a class="mw-redirect" data-dcnode-id="3244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oil_industry_of_Russia" title="Oil industry of Russia"><span data-dcnode-id="3245" instrument_node="">oil industry of Russia</span></a><span data-dcnode-id="3243" instrument_node="">, production, and exports all significantly grew.
</span></p><p data-dcnode-id="3204"><span data-dcnode-id="3241" instrument_node="">Putin sought to increase </span><a data-dcnode-id="3239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russia_in_the_European_energy_sector" title="Russia in the European energy sector"><span data-dcnode-id="3240" instrument_node="">Russia's share of the European energy market</span></a><span data-dcnode-id="3238" instrument_node=""> by building submerged gas pipelines bypassing </span><a data-dcnode-id="3236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukraine" title="Ukraine"><span data-dcnode-id="3237" instrument_node="">Ukraine</span></a><span data-dcnode-id="3235" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="3233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Europe_%28political_expression%29" title="New Europe (political expression)"><span data-dcnode-id="3234" instrument_node="">New Europe</span></a><span data-dcnode-id="3232" instrument_node=""> (the countries which were often seen as non-reliable transit partners by Russia, especially following </span><a class="mw-redirect" data-dcnode-id="3230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russia-Ukraine_gas_disputes" title="Russia-Ukraine gas disputes"><span data-dcnode-id="3231" instrument_node="">Russia-Ukraine gas disputes</span></a><span data-dcnode-id="3229" instrument_node=""> of the late 2000s (decade)). The pipeline projects backed by Putin include the </span><a data-dcnode-id="3227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blue_Stream" title="Blue Stream"><span data-dcnode-id="3228" instrument_node="">Blue Stream</span></a><span data-dcnode-id="3226" instrument_node=""> from Russia to </span><a data-dcnode-id="3224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkey" title="Turkey"><span data-dcnode-id="3225" instrument_node="">Turkey</span></a><span data-dcnode-id="3223" instrument_node=""> (build on the </span><a data-dcnode-id="3221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_Sea" title="Black Sea"><span data-dcnode-id="3222" instrument_node="">Black Sea</span></a><span data-dcnode-id="3220" instrument_node=""> bed), </span><a data-dcnode-id="3218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nord_Stream" title="Nord Stream"><span data-dcnode-id="3219" instrument_node="">Nord Stream</span></a><span data-dcnode-id="3217" instrument_node=""> from Russia to Germany (the longest sub-sea pipeline in the world, built through the </span><a data-dcnode-id="3215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baltic_Sea" title="Baltic Sea"><span data-dcnode-id="3216" instrument_node="">Baltic Sea</span></a><span data-dcnode-id="3214" instrument_node="">) and the planned </span><a data-dcnode-id="3212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Stream" title="South Stream"><span data-dcnode-id="3213" instrument_node="">South Stream</span></a><span data-dcnode-id="3211" instrument_node=""> from Russia to the </span><a data-dcnode-id="3209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Balkans" title="Balkans"><span data-dcnode-id="3210" instrument_node="">Balkans</span></a><span data-dcnode-id="3208" instrument_node=""> and Italy (via the Black Sea). Russia also undermined the rival pipeline project </span><a data-dcnode-id="3206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nabucco_pipeline" title="Nabucco pipeline"><span data-dcnode-id="3207" instrument_node="">Nabucco</span></a><span data-dcnode-id="3205" instrument_node=""> by buying the Turkmen gas and redirecting it into Russian pipelines.
</span></p><p data-dcnode-id="3163"><span data-dcnode-id="3203" instrument_node="">On the other hand, Russia diversified its export markets by building the </span><a class="mw-redirect" data-dcnode-id="3201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trans-Siberian_oil_pipeline" title="Trans-Siberian oil pipeline"><span data-dcnode-id="3202" instrument_node="">Trans-Siberian oil pipeline</span></a><span data-dcnode-id="3200" instrument_node=""> to the markets of China, Japan and </span><a data-dcnode-id="3198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Korea" title="Korea"><span data-dcnode-id="3199" instrument_node="">Korea</span></a><span data-dcnode-id="3197" instrument_node="">, as well as the </span><a class="mw-redirect" data-dcnode-id="3195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sakhalin%25E2%2580%2593Khabarovsk%25E2%2580%2593Vladivostok_gas_pipeline" title="Sakhalin–Khabarovsk–Vladivostok gas pipeline"><span data-dcnode-id="3196" instrument_node="">Sakhalin–Khabarovsk–Vladivostok gas pipeline</span></a><span data-dcnode-id="3194" instrument_node=""> in the </span><a data-dcnode-id="3192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Far_East" title="Russian Far East"><span data-dcnode-id="3193" instrument_node="">Russian Far East</span></a><span data-dcnode-id="3191" instrument_node="">. Russia has built </span><a class="mw-redirect" data-dcnode-id="3189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/LNG" title="LNG"><span data-dcnode-id="3190" instrument_node="">LNG</span></a><span data-dcnode-id="3188" instrument_node=""> plant on </span><a data-dcnode-id="3186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sakhalin" title="Sakhalin"><span data-dcnode-id="3187" instrument_node="">Sakhalin</span></a><span data-dcnode-id="3185" instrument_node=""> and is building another one in </span><a class="mw-redirect" data-dcnode-id="3183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Primorye" title="Primorye"><span data-dcnode-id="3184" instrument_node="">Primorye</span></a><span data-dcnode-id="3182" instrument_node="">, aiming to increase the overseas gas exports. Meanwhile, in the </span><a data-dcnode-id="3180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gulf_of_Finland" title="Gulf of Finland"><span data-dcnode-id="3181" instrument_node="">Gulf of Finland</span></a><span data-dcnode-id="3179" instrument_node=""> Russia has built a major </span><a data-dcnode-id="3177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ust-Luga" title="Ust-Luga"><span data-dcnode-id="3178" instrument_node="">Ust-Luga</span></a><span data-dcnode-id="3176" instrument_node=""> port connected to the </span><a data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baltic_Pipeline_System-II" title="Baltic Pipeline System-II"><span data-dcnode-id="3175" instrument_node="">Baltic Pipeline System-II</span></a><span data-dcnode-id="3173" instrument_node="">, which allowed the export of oil without transit through the ports of the </span><a data-dcnode-id="3171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baltic_states" title="Baltic states"><span data-dcnode-id="3172" instrument_node="">Baltic states</span></a><span data-dcnode-id="3170" instrument_node="">. The share of processed oil slowly grows with major </span><a class="mw-redirect" data-dcnode-id="3168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oil_refineries" title="Oil refineries"><span data-dcnode-id="3169" instrument_node="">oil refineries</span></a><span data-dcnode-id="3167" instrument_node=""> being built in </span><a data-dcnode-id="3165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tatarstan" title="Tatarstan"><span data-dcnode-id="3166" instrument_node="">Tatarstan</span></a><span data-dcnode-id="3164" instrument_node=""> and other regions of Russia.
</span></p><p data-dcnode-id="3145"><span data-dcnode-id="3162" instrument_node="">Putin also presided over resuming the construction of major hydropower plants, such as the </span><a data-dcnode-id="3160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bureya_Dam" title="Bureya Dam"><span data-dcnode-id="3161" instrument_node="">Bureya Dam</span></a><span data-dcnode-id="3159" instrument_node=""> and the </span><a data-dcnode-id="3157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boguchany_Dam" title="Boguchany Dam"><span data-dcnode-id="3158" instrument_node="">Boguchany Dam</span></a><span data-dcnode-id="3156" instrument_node="">, as well as the restoration of the </span><a data-dcnode-id="3154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_power_in_Russia" title="Nuclear power in Russia"><span data-dcnode-id="3155" instrument_node="">nuclear industry of Russia</span></a><span data-dcnode-id="3153" instrument_node="">, with some 1&nbsp;trillion rubles ($42.7&nbsp;billion) allocated from the federal budget to nuclear power and industry development before 2015.</span><sup class="reference" data-dcnode-id="3150" id="cite_ref-30"><a data-dcnode-id="3151" href="#cite_note-30"><span data-dcnode-id="3152" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3149" instrument_node=""> A large number of nuclear power stations and units are currently being constructed by the state corporation </span><a data-dcnode-id="3147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rosatom" title="Rosatom"><span data-dcnode-id="3148" instrument_node="">Rosatom</span></a><span data-dcnode-id="3146" instrument_node=""> in Russia and abroad.
</span></p><span data-dcnode-id="3144" instrument_node="">
</span><h2 data-dcnode-id="3134"><span class="mw-headline" data-dcnode-id="3142" id="Arctic_policy"><span data-dcnode-id="3143" instrument_node="">Arctic policy</span></span><span class="mw-editsection" data-dcnode-id="3135"><span class="mw-editsection-bracket" data-dcnode-id="3140"><span data-dcnode-id="3141" instrument_node="">[</span></span><a data-dcnode-id="3138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDomestic_policy_of_Vladimir_Putin%26action%3Dedit%26section%3D3" title="Edit section: Arctic policy"><span data-dcnode-id="3139" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3133" instrument_node="">
</span><link data-dcnode-id="3132" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3128" role="note"><span data-dcnode-id="3131" instrument_node="">Main article: </span><a data-dcnode-id="3129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arctic_policy_of_Russia" title="Arctic policy of Russia"><span data-dcnode-id="3130" instrument_node="">Arctic policy of Russia</span></a></div><span data-dcnode-id="3127" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3108"><div class="thumbinner" data-dcnode-id="3109" style="width:222px;"><a class="image" data-dcnode-id="3125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APyotr_Velikiy_battlecruiser_4.jpg"><img alt="" class="thumbimage" data-dcnode-id="3126" data-file-height="334" data-file-width="500" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f4/Pyotr_Velikiy_battlecruiser_4.jpg/220px-Pyotr_Velikiy_battlecruiser_4.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f4/Pyotr_Velikiy_battlecruiser_4.jpg/330px-Pyotr_Velikiy_battlecruiser_4.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f4/Pyotr_Velikiy_battlecruiser_4.jpg/440px-Pyotr_Velikiy_battlecruiser_4.jpg 2x" width="220"></a><span data-dcnode-id="3124" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3110"><div class="magnify" data-dcnode-id="3122"><a class="internal" data-dcnode-id="3123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APyotr_Velikiy_battlecruiser_4.jpg" title="Enlarge"></a></div><span data-dcnode-id="3121" instrument_node="">Putin aboard the battlecruiser </span><i data-dcnode-id="3118"><a data-dcnode-id="3119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_battlecruiser_Pyotr_Velikiy" title="Russian battlecruiser Pyotr Velikiy"><span data-dcnode-id="3120" instrument_node="">Pyotr Velikiy</span></a></i><span data-dcnode-id="3117" instrument_node=""> during the </span><a data-dcnode-id="3115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Northern_Fleet" title="Northern Fleet"><span data-dcnode-id="3116" instrument_node="">Northern Fleet</span></a><span data-dcnode-id="3114" instrument_node=""> manoeuvres in the </span><a data-dcnode-id="3112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barents_Sea" title="Barents Sea"><span data-dcnode-id="3113" instrument_node="">Barents Sea</span></a><span data-dcnode-id="3111" instrument_node="">, 2005.</span></div></div></div><span data-dcnode-id="3107" instrument_node="">
</span><p data-dcnode-id="3075"><span data-dcnode-id="3106" instrument_node="">Putin has sought to increase Russian military and economic presence in the Arctic. In August 2007, a Russian expedition named </span><a data-dcnode-id="3104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arktika_2007" title="Arktika 2007"><span data-dcnode-id="3105" instrument_node="">Arktika 2007</span></a><span data-dcnode-id="3103" instrument_node="">, led by </span><a data-dcnode-id="3101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Artur_Chilingarov" title="Artur Chilingarov"><span data-dcnode-id="3102" instrument_node="">Artur Chilingarov</span></a><span data-dcnode-id="3100" instrument_node="">, planted a Russian flag on the seabed below the North Pole to underline </span><a data-dcnode-id="3098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Continental_shelf_of_Russia" title="Continental shelf of Russia"><span data-dcnode-id="3099" instrument_node="">Russia's 2001 claim submission</span></a><span data-dcnode-id="3097" instrument_node="">.</span><sup class="reference" data-dcnode-id="3094" id="cite_ref-pole_flag_31-0"><a data-dcnode-id="3095" href="#cite_note-pole_flag-31"><span data-dcnode-id="3096" instrument_node="">[31]</span></a></sup><span data-dcnode-id="3093" instrument_node=""> In June 2008 General </span><a data-dcnode-id="3091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Shamanov" title="Vladimir Shamanov"><span data-dcnode-id="3092" instrument_node="">Vladimir Shamanov</span></a><span data-dcnode-id="3090" instrument_node=""> announced that Russia would increase the operational radius of its </span><a data-dcnode-id="3088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Northern_Fleet" title="Northern Fleet"><span data-dcnode-id="3089" instrument_node="">Northern Fleet</span></a><span data-dcnode-id="3087" instrument_node=""> submarines.</span><sup class="reference" data-dcnode-id="3084" id="cite_ref-Military_buildup1_32-0"><a data-dcnode-id="3085" href="#cite_note-Military_buildup1-32"><span data-dcnode-id="3086" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3083" instrument_node=""> and in July 2011, Defense Minister </span><a data-dcnode-id="3081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anatoly_Serdyukov" title="Anatoly Serdyukov"><span data-dcnode-id="3082" instrument_node="">Anatoly Serdyukov</span></a><span data-dcnode-id="3080" instrument_node=""> announced plans for two brigades to be stationed in the Arctic.</span><sup class="reference" data-dcnode-id="3077" id="cite_ref-Military_buildup2_33-0"><a data-dcnode-id="3078" href="#cite_note-Military_buildup2-33"><span data-dcnode-id="3079" instrument_node="">[33]</span></a></sup><span data-dcnode-id="3076" instrument_node="">
</span></p><p data-dcnode-id="3040"><span data-dcnode-id="3074" instrument_node="">A construction program of </span><a data-dcnode-id="3072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_floating_nuclear_power_station" title="Russian floating nuclear power station"><span data-dcnode-id="3073" instrument_node="">floating nuclear power plants</span></a><span data-dcnode-id="3071" instrument_node=""> will provide power to Russian Arctic coastal cities and </span><a class="mw-redirect" data-dcnode-id="3069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gas_rig" title="Gas rig"><span data-dcnode-id="3070" instrument_node="">gas rigs</span></a><span data-dcnode-id="3068" instrument_node="">. A 21,500-ton barge with twin 35-megawatt reactors, the </span><i data-dcnode-id="3065"><a data-dcnode-id="3066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Akademik_Lomonosov" title="Akademik Lomonosov"><span data-dcnode-id="3067" instrument_node="">Akademik Lomonosov</span></a></i><span data-dcnode-id="3064" instrument_node="">, will go into operation in 2012.</span><sup class="reference" data-dcnode-id="3061" id="cite_ref-Floating_nuclear_plant1_34-0"><a data-dcnode-id="3062" href="#cite_note-Floating_nuclear_plant1-34"><span data-dcnode-id="3063" instrument_node="">[34]</span></a></sup><sup class="reference" data-dcnode-id="3058" id="cite_ref-Floating_nuclear_plant2_35-0"><a data-dcnode-id="3059" href="#cite_note-Floating_nuclear_plant2-35"><span data-dcnode-id="3060" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3057" instrument_node=""> The </span><a data-dcnode-id="3055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prirazlomnoye_field" title="Prirazlomnoye field"><span data-dcnode-id="3056" instrument_node="">Prirazlomnoye field</span></a><span data-dcnode-id="3054" instrument_node="">, an offshore oilfield in the </span><a data-dcnode-id="3052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pechora_Sea" title="Pechora Sea"><span data-dcnode-id="3053" instrument_node="">Pechora Sea</span></a><span data-dcnode-id="3051" instrument_node=""> that will include up to 40 wells, is currently under construction and drilling is expected to start in early 2012. It will have the world's first ice-resistant </span><a data-dcnode-id="3049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oil_platform" title="Oil platform"><span data-dcnode-id="3050" instrument_node="">oil platform</span></a><span data-dcnode-id="3048" instrument_node=""> and will also be the first offshore Arctic platform.</span><sup class="reference" data-dcnode-id="3045" id="cite_ref-Gazprom_Prirazlomnoye_36-0"><a data-dcnode-id="3046" href="#cite_note-Gazprom_Prirazlomnoye-36"><span data-dcnode-id="3047" instrument_node="">[36]</span></a></sup><sup class="reference" data-dcnode-id="3042" id="cite_ref-Prirazlomnoye_TASS_37-0"><a data-dcnode-id="3043" href="#cite_note-Prirazlomnoye_TASS-37"><span data-dcnode-id="3044" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3041" instrument_node="">
</span></p><p data-dcnode-id="3013"><span data-dcnode-id="3039" instrument_node="">In August 2011 </span><a data-dcnode-id="3037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rosneft" title="Rosneft"><span data-dcnode-id="3038" instrument_node="">Rosneft</span></a><span data-dcnode-id="3036" instrument_node="">, a Russian government-operated oil company, signed a deal with </span><a data-dcnode-id="3034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ExxonMobil" title="ExxonMobil"><span data-dcnode-id="3035" instrument_node="">ExxonMobil</span></a><span data-dcnode-id="3033" instrument_node=""> to receive oil assets in exchange for the joint development of Russian Arctic resources by both companies.</span><sup class="reference" data-dcnode-id="3030" id="cite_ref-Exxon-Rosneft_38-0"><a data-dcnode-id="3031" href="#cite_note-Exxon-Rosneft-38"><span data-dcnode-id="3032" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3029" instrument_node=""> The agreement includes a $3.2&nbsp;billion </span><a data-dcnode-id="3027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hydrocarbon_exploration" title="Hydrocarbon exploration"><span data-dcnode-id="3028" instrument_node="">hydrocarbon exploration</span></a><span data-dcnode-id="3026" instrument_node=""> of the Kara and Black seas,</span><sup class="reference" data-dcnode-id="3023" id="cite_ref-Exxon_joint_exploration_39-0"><a data-dcnode-id="3024" href="#cite_note-Exxon_joint_exploration-39"><span data-dcnode-id="3025" instrument_node="">[39]</span></a></sup><span data-dcnode-id="3022" instrument_node=""> as well as joint development of ice-resistant drilling platforms and other Arctic technologies.</span><sup class="reference" data-dcnode-id="3019" id="cite_ref-Guardian-deal-research_40-0"><a data-dcnode-id="3020" href="#cite_note-Guardian-deal-research-40"><span data-dcnode-id="3021" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3018" instrument_node=""> "The scale of the investment is very large. It's scary to utter such huge figures" said Putin on signing the deal.</span><sup class="reference" data-dcnode-id="3015" id="cite_ref-Exxon-Rosneft_38-1"><a data-dcnode-id="3016" href="#cite_note-Exxon-Rosneft-38"><span data-dcnode-id="3017" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3014" instrument_node="">
</span></p><span data-dcnode-id="3012" instrument_node="">

</span><p data-dcnode-id="2957"><span data-dcnode-id="2969" instrument_node="">In 2004, President Putin signed the </span><a data-dcnode-id="2967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kyoto_Protocol" title="Kyoto Protocol"><span data-dcnode-id="2968" instrument_node="">Kyoto Protocol</span></a><span data-dcnode-id="2966" instrument_node=""> treaty designed to reduce greenhouse gases.</span><sup class="reference" data-dcnode-id="2963" id="cite_ref-41"><a data-dcnode-id="2964" href="#cite_note-41"><span data-dcnode-id="2965" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2962" instrument_node=""> However, Russia did not face mandatory cuts because the Kyoto Protocol limits emissions to a percentage increase or decrease from 1990 levels and Russia's greenhouse-gas emissions fell well below the 1990 baseline due to a drop in economic output after the breakup of the Soviet Union.</span><sup class="reference" data-dcnode-id="2959" id="cite_ref-42"><a data-dcnode-id="2960" href="#cite_note-42"><span data-dcnode-id="2961" instrument_node="">[42]</span></a></sup><span data-dcnode-id="2958" instrument_node="">
