</span><p data-dcnode-id="2871"><a class="mw-redirect" data-dcnode-id="2894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Orthodox_Christianity" title="Orthodox Christianity"><span data-dcnode-id="2895" instrument_node="">Orthodox Christianity</span></a><span data-dcnode-id="2893" instrument_node="">, </span><a data-dcnode-id="2891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islam" title="Islam"><span data-dcnode-id="2892" instrument_node="">Islam</span></a><span data-dcnode-id="2890" instrument_node="">, </span><a data-dcnode-id="2888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buddhism" title="Buddhism"><span data-dcnode-id="2889" instrument_node="">Buddhism</span></a><span data-dcnode-id="2887" instrument_node=""> and Judaism, defined by law as Russia's traditional religions and a part of Russia's "historical heritage"</span><sup class="reference" data-dcnode-id="2884" id="cite_ref-47"><a data-dcnode-id="2885" href="#cite_note-47"><span data-dcnode-id="2886" instrument_node="">[47]</span></a></sup><span data-dcnode-id="2883" instrument_node=""> enjoyed limited state support in the Putin era. The vast construction and restoration of churches, started in 1990s, continued under Putin, and the state allowed the teaching of religion in schools (parents are provided with a choice for their children to learn the basics of one of the traditional religions or secular ethics). His approach to religious policy has been characterised as one of support for religious freedoms, but also the attempt to unify different religions under the authority of the state.</span><sup class="reference" data-dcnode-id="2880" id="cite_ref-48"><a data-dcnode-id="2881" href="#cite_note-48"><span data-dcnode-id="2882" instrument_node="">[48]</span></a></sup><span data-dcnode-id="2879" instrument_node=""> In 2012, Putin was honored in </span><a data-dcnode-id="2877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bethlehem" title="Bethlehem"><span data-dcnode-id="2878" instrument_node="">Bethlehem</span></a><span data-dcnode-id="2876" instrument_node=""> and a street was named after him.</span><sup class="reference" data-dcnode-id="2873" id="cite_ref-49"><a data-dcnode-id="2874" href="#cite_note-49"><span data-dcnode-id="2875" instrument_node="">[49]</span></a></sup><span data-dcnode-id="2872" instrument_node="">
</span></p><span data-dcnode-id="2870" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="2861"><div class="thumbinner" data-dcnode-id="2862" style="width:222px;"><a class="image" data-dcnode-id="2868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVladimir_Putin_21_February_2001-2.jpg"><img alt="" class="thumbimage" data-dcnode-id="2869" data-file-height="334" data-file-width="500" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/14/Vladimir_Putin_21_February_2001-2.jpg/220px-Vladimir_Putin_21_February_2001-2.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/14/Vladimir_Putin_21_February_2001-2.jpg/330px-Vladimir_Putin_21_February_2001-2.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/14/Vladimir_Putin_21_February_2001-2.jpg/440px-Vladimir_Putin_21_February_2001-2.jpg 2x" width="220"></a><span data-dcnode-id="2867" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2863"><div class="magnify" data-dcnode-id="2865"><a class="internal" data-dcnode-id="2866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVladimir_Putin_21_February_2001-2.jpg" title="Enlarge"></a></div><span data-dcnode-id="2864" instrument_node="">Putin meeting with religious leaders of Russia in 2001</span></div></div></div><span data-dcnode-id="2860" instrument_node="">
</span><p data-dcnode-id="2833"><span data-dcnode-id="2859" instrument_node="">Putin regularly attends the most important services of the </span><a data-dcnode-id="2857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Orthodox_Church" title="Russian Orthodox Church"><span data-dcnode-id="2858" instrument_node="">Russian Orthodox Church</span></a><span data-dcnode-id="2856" instrument_node=""> on the main Orthodox Christian holidays. He established a good relationship with </span><a class="mw-redirect" data-dcnode-id="2854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Patriarchs_of_Moscow" title="Patriarchs of Moscow"><span data-dcnode-id="2855" instrument_node="">Patriarchs</span></a><span data-dcnode-id="2853" instrument_node=""> of the Russian Church, the late </span><a class="mw-redirect" data-dcnode-id="2851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexy_II_of_Moscow" title="Alexy II of Moscow"><span data-dcnode-id="2852" instrument_node="">Alexy II of Moscow</span></a><span data-dcnode-id="2850" instrument_node=""> and the current </span><a class="mw-redirect" data-dcnode-id="2848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kirill_of_Moscow" title="Kirill of Moscow"><span data-dcnode-id="2849" instrument_node="">Kirill of Moscow</span></a><span data-dcnode-id="2847" instrument_node="">. As President, he took an active personal part in promoting the </span><a data-dcnode-id="2845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Act_of_Canonical_Communion_with_the_Moscow_Patriarchate" title="Act of Canonical Communion with the Moscow Patriarchate"><span data-dcnode-id="2846" instrument_node="">Act of Canonical Communion with the Moscow Patriarchate</span></a><span data-dcnode-id="2844" instrument_node="">, signed 17 May 2007 that restored relations between the Moscow-based </span><a data-dcnode-id="2842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Orthodox_Church" title="Russian Orthodox Church"><span data-dcnode-id="2843" instrument_node="">Russian Orthodox Church</span></a><span data-dcnode-id="2841" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="2839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Orthodox_Church_Outside_Russia" title="Russian Orthodox Church Outside Russia"><span data-dcnode-id="2840" instrument_node="">Russian Orthodox Church Outside Russia</span></a><span data-dcnode-id="2838" instrument_node=""> after the 80-year schism.</span><sup class="reference" data-dcnode-id="2835" id="cite_ref-50"><a data-dcnode-id="2836" href="#cite_note-50"><span data-dcnode-id="2837" instrument_node="">[50]</span></a></sup><span data-dcnode-id="2834" instrument_node="">
</span></p><p data-dcnode-id="2819"><span data-dcnode-id="2832" instrument_node="">Putin and </span><a data-dcnode-id="2830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Russia" title="United Russia"><span data-dcnode-id="2831" instrument_node="">United Russia</span></a><span data-dcnode-id="2829" instrument_node=""> enjoy high electoral support in the national </span><a data-dcnode-id="2827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republics_of_Russia" title="Republics of Russia"><span data-dcnode-id="2828" instrument_node="">republics of Russia</span></a><span data-dcnode-id="2826" instrument_node="">, in particular in the Muslim-majority republics of </span><a class="mw-redirect" data-dcnode-id="2824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Povolzhye" title="Povolzhye"><span data-dcnode-id="2825" instrument_node="">Povolzhye</span></a><span data-dcnode-id="2823" instrument_node=""> and the </span><a data-dcnode-id="2821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Caucasus" title="North Caucasus"><span data-dcnode-id="2822" instrument_node="">North Caucasus</span></a><span data-dcnode-id="2820" instrument_node="">.
</span></p><p data-dcnode-id="2785"><span data-dcnode-id="2818" instrument_node="">Under Putin, the </span><a class="mw-redirect" data-dcnode-id="2816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hasidic" title="Hasidic"><span data-dcnode-id="2817" instrument_node="">Hasidic</span></a><span data-dcnode-id="2815" instrument_node=""> </span><a data-dcnode-id="2813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federation_of_Jewish_Communities_of_Russia" title="Federation of Jewish Communities of Russia"><span data-dcnode-id="2814" instrument_node="">FJCR</span></a><span data-dcnode-id="2812" instrument_node=""> became increasingly influential within the Jewish community, partly due to the influence of Federation-supporting businessmen mediated through their alliances with Putin, notably </span><a data-dcnode-id="2810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lev_Avnerovich_Leviev" title="Lev Avnerovich Leviev"><span data-dcnode-id="2811" instrument_node="">Lev Leviev</span></a><span data-dcnode-id="2809" instrument_node=""> and </span><a data-dcnode-id="2807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roman_Abramovich" title="Roman Abramovich"><span data-dcnode-id="2808" instrument_node="">Roman Abramovich</span></a><span data-dcnode-id="2806" instrument_node="">.</span><sup class="reference" data-dcnode-id="2803" id="cite_ref-Russia_51-0"><a data-dcnode-id="2804" href="#cite_note-Russia-51"><span data-dcnode-id="2805" instrument_node="">[51]</span></a></sup><sup class="reference" data-dcnode-id="2800" id="cite_ref-52"><a data-dcnode-id="2801" href="#cite_note-52"><span data-dcnode-id="2802" instrument_node="">[52]</span></a></sup><span data-dcnode-id="2799" instrument_node=""> According to the </span><a data-dcnode-id="2797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jewish_Telegraphic_Agency" title="Jewish Telegraphic Agency"><span data-dcnode-id="2798" instrument_node="">JTA</span></a><span data-dcnode-id="2796" instrument_node="">, Putin is popular amongst the </span><a class="mw-redirect" data-dcnode-id="2794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Jewish" title="Russian Jewish"><span data-dcnode-id="2795" instrument_node="">Russian Jewish</span></a><span data-dcnode-id="2793" instrument_node=""> community, who see him as a force for stability. Russia's chief rabbi, </span><a data-dcnode-id="2791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chief_Rabbi_of_Russia" title="Chief Rabbi of Russia"><span data-dcnode-id="2792" instrument_node="">Berel Lazar</span></a><span data-dcnode-id="2790" instrument_node="">, said Putin "paid great attention to the needs of our community and related to us with a deep respect."</span><sup class="reference" data-dcnode-id="2787" id="cite_ref-53"><a data-dcnode-id="2788" href="#cite_note-53"><span data-dcnode-id="2789" instrument_node="">[53]</span></a></sup><span data-dcnode-id="2786" instrument_node="">
</span></p><span data-dcnode-id="2784" instrument_node="">
</span><h2 data-dcnode-id="2774"><span class="mw-headline" data-dcnode-id="2782" id="Military_development"><span data-dcnode-id="2783" instrument_node="">Military development</span></span><span class="mw-editsection" data-dcnode-id="2775"><span class="mw-editsection-bracket" data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">[</span></span><a data-dcnode-id="2778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDomestic_policy_of_Vladimir_Putin%26action%3Dedit%26section%3D6" title="Edit section: Military development"><span data-dcnode-id="2779" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2773" instrument_node="">
</span><link data-dcnode-id="2772" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2768" role="note"><span data-dcnode-id="2771" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="2769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_military_reform" title="Russian military reform"><span data-dcnode-id="2770" instrument_node="">Russian military reform</span></a></div><span data-dcnode-id="2767" instrument_node="">
</span><p data-dcnode-id="2747"><span data-dcnode-id="2766" instrument_node="">The resumption of long-distance flights of Russia's </span><a data-dcnode-id="2764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Strategic_bomber" title="Strategic bomber"><span data-dcnode-id="2765" instrument_node="">strategic bombers</span></a><span data-dcnode-id="2763" instrument_node=""> was followed by the announcement by Russian Defense Minister </span><a class="mw-redirect" data-dcnode-id="2761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anatoliy_Serdyukov" title="Anatoliy Serdyukov"><span data-dcnode-id="2762" instrument_node="">Anatoliy Serdyukov</span></a><span data-dcnode-id="2760" instrument_node=""> during his meeting with Putin on 5 December 2007, that 11 ships, including the aircraft carrier </span><i data-dcnode-id="2757"><a data-dcnode-id="2758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_aircraft_carrier_Admiral_Kuznetsov" title="Russian aircraft carrier Admiral Kuznetsov"><span data-dcnode-id="2759" instrument_node="">Kuznetsov</span></a></i><span data-dcnode-id="2756" instrument_node="">, would take part in the first major navy sortie into the Mediterranean since Soviet times.</span><sup class="reference" data-dcnode-id="2753" id="cite_ref-54"><a data-dcnode-id="2754" href="#cite_note-54"><span data-dcnode-id="2755" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2752" instrument_node=""> The sortie was to be backed up by 47&nbsp;aircraft, including strategic bombers.</span><sup class="reference" data-dcnode-id="2749" id="cite_ref-55"><a data-dcnode-id="2750" href="#cite_note-55"><span data-dcnode-id="2751" instrument_node="">[55]</span></a></sup><span data-dcnode-id="2748" instrument_node="">
</span></p><span data-dcnode-id="2746" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="2731"><div class="thumbinner" data-dcnode-id="2732" style="width:222px;"><a class="image" data-dcnode-id="2744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVladimir_Putin_Cockpit_TU-160_Bomber.jpg"><img alt="" class="thumbimage" data-dcnode-id="2745" data-file-height="1531" data-file-width="2200" decoding="async" height="153" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/39/Vladimir_Putin_Cockpit_TU-160_Bomber.jpg/220px-Vladimir_Putin_Cockpit_TU-160_Bomber.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/39/Vladimir_Putin_Cockpit_TU-160_Bomber.jpg/330px-Vladimir_Putin_Cockpit_TU-160_Bomber.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/39/Vladimir_Putin_Cockpit_TU-160_Bomber.jpg/440px-Vladimir_Putin_Cockpit_TU-160_Bomber.jpg 2x" width="220"></a><span data-dcnode-id="2743" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2733"><div class="magnify" data-dcnode-id="2741"><a class="internal" data-dcnode-id="2742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVladimir_Putin_Cockpit_TU-160_Bomber.jpg" title="Enlarge"></a></div><span data-dcnode-id="2740" instrument_node="">Putin in the cockpit of a </span><a data-dcnode-id="2738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tupolev_Tu-160" title="Tupolev Tu-160"><span data-dcnode-id="2739" instrument_node="">Tupolev Tu-160</span></a><span data-dcnode-id="2737" instrument_node=""> </span><a data-dcnode-id="2735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Strategic_bomber" title="Strategic bomber"><span data-dcnode-id="2736" instrument_node="">strategic bomber</span></a><span data-dcnode-id="2734" instrument_node=""> before the flight, August 2005.</span></div></div></div><span data-dcnode-id="2730" instrument_node="">
</span><p data-dcnode-id="2722"><span data-dcnode-id="2729" instrument_node="">While from the early 2000s (decade) Russia started pumping more money into its military and defence industry, it was only in 2008 that the full-scale </span><a class="mw-redirect" data-dcnode-id="2727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_military_reform" title="Russian military reform"><span data-dcnode-id="2728" instrument_node="">Russian military reform</span></a><span data-dcnode-id="2726" instrument_node=""> began, aimed to modernize Russian Armed Forces and made them significantly more effective. The reform was largely carried by Defense Minister </span><a data-dcnode-id="2724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anatoly_Serdyukov" title="Anatoly Serdyukov"><span data-dcnode-id="2725" instrument_node="">Anatoly Serdyukov</span></a><span data-dcnode-id="2723" instrument_node=""> during Medvedev's presidency, under supervision of both Putin, as the Head of Government, and Medvedev, as the Commander-in-Chief of the Russian Armed Forces.
</span></p><p data-dcnode-id="2713"><span data-dcnode-id="2721" instrument_node="">Key elements of the reform included reducing the armed forces to a strength of one million; reducing the number of officers; centralising officer training from 65 military schools into 10 'systemic' military training centres; creating a professional </span><a data-dcnode-id="2719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-commissioned_officer" title="Non-commissioned officer"><span data-dcnode-id="2720" instrument_node="">NCO</span></a><span data-dcnode-id="2718" instrument_node=""> corps; reducing the size of the central command; introducing more civilian logistics and auxiliary staff; elimination of cadre-strength formations; reorganising the reserves; reorganising the army into a brigade system; reorganising air forces into an air base system instead of regiments.</span><sup class="reference" data-dcnode-id="2715" id="cite_ref-military-reform_56-0"><a data-dcnode-id="2716" href="#cite_note-military-reform-56"><span data-dcnode-id="2717" instrument_node="">[56]</span></a></sup><span data-dcnode-id="2714" instrument_node="">
</span></p><p data-dcnode-id="2705"><span data-dcnode-id="2712" instrument_node="">The number of Russia's </span><a data-dcnode-id="2710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_district" title="Military district"><span data-dcnode-id="2711" instrument_node="">military districts</span></a><span data-dcnode-id="2709" instrument_node=""> was reduced to just 4. The term of draft service was reduced from two years to one, which put an end to the old </span><a class="mw-redirect" data-dcnode-id="2707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dedovschina" title="Dedovschina"><span data-dcnode-id="2708" instrument_node="">harassment</span></a><span data-dcnode-id="2706" instrument_node=""> traditions in the army, since all conscripts became very close by draft age. The gradual transition to the majority professional army by the late 2010s was announced, and a large programme of supplying the Armed Forces with new military equipment and ships was started.
</span></p><p data-dcnode-id="2696"><span data-dcnode-id="2704" instrument_node="">In spite of Putin's call for major investments in strategic nuclear weapons, these will fall well below the </span><a data-dcnode-id="2702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_START" title="New START"><span data-dcnode-id="2703" instrument_node="">New START</span></a><span data-dcnode-id="2701" instrument_node=""> limits due to the retirement of aging systems.</span><sup class="reference" data-dcnode-id="2698" id="cite_ref-57"><a data-dcnode-id="2699" href="#cite_note-57"><span data-dcnode-id="2700" instrument_node="">[57]</span></a></sup><span data-dcnode-id="2697" instrument_node="">
</span></p><span data-dcnode-id="2695" instrument_node="">
</span><h2 data-dcnode-id="2685"><span class="mw-headline" data-dcnode-id="2693" id="Constitutional_reforms"><span data-dcnode-id="2694" instrument_node="">Constitutional reforms</span></span><span class="mw-editsection" data-dcnode-id="2686"><span class="mw-editsection-bracket" data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">[</span></span><a data-dcnode-id="2689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDomestic_policy_of_Vladimir_Putin%26action%3Dedit%26section%3D7" title="Edit section: Constitutional reforms"><span data-dcnode-id="2690" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2684" instrument_node="">
</span><link data-dcnode-id="2683" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2679" role="note"><span data-dcnode-id="2682" instrument_node="">Main article: </span><a data-dcnode-id="2680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2020_Russian_constitutional_referendum" title="2020 Russian constitutional referendum"><span data-dcnode-id="2681" instrument_node="">2020 Russian constitutional referendum</span></a></div><span data-dcnode-id="2678" instrument_node="">
</span><p data-dcnode-id="2660"><span data-dcnode-id="2677" instrument_node="">On 20 January 2020, President Vladimir Putin submitted </span><a data-dcnode-id="2675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2020_amendments_to_the_Constitution_of_Russia" title="2020 amendments to the Constitution of Russia"><span data-dcnode-id="2676" instrument_node="">the draft amendments</span></a><span data-dcnode-id="2674" instrument_node=""> to the State Duma, expecting 14 articles to be changed in total:</span><sup class="reference" data-dcnode-id="2671" id="cite_ref-Law_58-0"><a data-dcnode-id="2672" href="#cite_note-Law-58"><span data-dcnode-id="2673" instrument_node="">[58]</span></a></sup><sup class="reference" data-dcnode-id="2668" id="cite_ref-59"><a data-dcnode-id="2669" href="#cite_note-59"><span data-dcnode-id="2670" instrument_node="">[59]</span></a></sup><sup class="reference" data-dcnode-id="2665" id="cite_ref-60"><a data-dcnode-id="2666" href="#cite_note-60"><span data-dcnode-id="2667" instrument_node="">[60]</span></a></sup><sup class="reference" data-dcnode-id="2662" id="cite_ref-#proposals_61-0"><a data-dcnode-id="2663" href="#cite_note-%23proposals-61"><span data-dcnode-id="2664" instrument_node="">[61]</span></a></sup><span data-dcnode-id="2661" instrument_node="">
</span></p><span data-dcnode-id="2659" instrument_node="">
</span><ul data-dcnode-id="2556"><li data-dcnode-id="2654"><span data-dcnode-id="2658" instrument_node="">the Russian constitution will supersede </span><a data-dcnode-id="2656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_law" title="International law"><span data-dcnode-id="2657" instrument_node="">international law</span></a><span data-dcnode-id="2655" instrument_node="">;</span></li><span data-dcnode-id="2653" instrument_node="">
</span><li data-dcnode-id="2637"><span data-dcnode-id="2652" instrument_node="">the </span><a data-dcnode-id="2650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_Duma" title="State Duma"><span data-dcnode-id="2651" instrument_node="">State Duma</span></a><span data-dcnode-id="2649" instrument_node=""> will have the right to approve a </span><a data-dcnode-id="2647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prime_Minister_of_Russia" title="Prime Minister of Russia"><span data-dcnode-id="2648" instrument_node="">Prime Minister</span></a><span data-dcnode-id="2646" instrument_node="">'s candidacy (currently it only gives consent to the appointment), and it will also be able to approve candidates for Deputy Prime Minister and Federal Minister;</span><sup class="noprint Inline-Template" data-dcnode-id="2639" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="2645" instrument_node="">[</span><i data-dcnode-id="2641"><a data-dcnode-id="2642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APlease_clarify" title="Wikipedia:Please clarify"><span data-dcnode-id="2643" title="The text near this tag may need clarification or removal of jargon. (July 2020)"><span data-dcnode-id="2644" instrument_node="">clarification needed</span></span></a></i><span data-dcnode-id="2640" instrument_node="">]</span></sup><span data-dcnode-id="2638" instrument_node=""> the President will not be able to refuse their appointment, but in some cases will be able to remove them from office;</span></li><span data-dcnode-id="2636" instrument_node="">
</span><li data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">the eligibility term requiring competing candidates for high-profile offices (President, Ministers, judges, heads of regions) to have no foreign citizenship or permit of residence in foreign countries, or have it at the time of their work in the office or, at any time before running for the President;</span></li><span data-dcnode-id="2633" instrument_node="">
</span><li data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">the minimal residency requirement for presidential candidates will be raised from 10 years to 25;</span></li><span data-dcnode-id="2630" instrument_node="">
</span><li data-dcnode-id="2619"><span data-dcnode-id="2629" instrument_node="">the </span><a data-dcnode-id="2627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federation_Council_%28Russia%29" title="Federation Council (Russia)"><span data-dcnode-id="2628" instrument_node="">Federation Council</span></a><span data-dcnode-id="2626" instrument_node=""> will be able to propose to the President to dismiss Federal judges; in some cases, the Federation Council, on the proposal of the President, will have the right to remove judges of the </span><a data-dcnode-id="2624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitutional_Court_of_Russia" title="Constitutional Court of Russia"><span data-dcnode-id="2625" instrument_node="">Constitutional</span></a><span data-dcnode-id="2623" instrument_node=""> and </span><a data-dcnode-id="2621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Court_of_Russia" title="Supreme Court of Russia"><span data-dcnode-id="2622" instrument_node="">Supreme</span></a><span data-dcnode-id="2620" instrument_node=""> courts;</span></li><span data-dcnode-id="2618" instrument_node="">
</span><li data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">heads of law enforcement agencies must be appointed by the President in consultation with the Federation Council;</span></li><span data-dcnode-id="2615" instrument_node="">
</span><li data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">the minimum wage cannot be lower than the subsistence minimum;</span></li><span data-dcnode-id="2612" instrument_node="">
</span><li data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">regular indexation of pensions;</span></li><span data-dcnode-id="2609" instrument_node="">
</span><li data-dcnode-id="2604"><span data-dcnode-id="2608" instrument_node="">consolidation of the status and role of the </span><a data-dcnode-id="2606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_Council_%28Russia%29" title="State Council (Russia)"><span data-dcnode-id="2607" instrument_node="">State Council</span></a><span data-dcnode-id="2605" instrument_node=""> (at present it is only an advisory body and is not prescribed in the Constitution);</span></li><span data-dcnode-id="2603" instrument_node="">
</span><li data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">granting the Constitutional Court the ability to check the constitutionality of laws adopted by the Federal Assembly of the Russian Federation at the request of the President before they are signed by the President;</span></li><span data-dcnode-id="2600" instrument_node="">
</span><li data-dcnode-id="2581"><span data-dcnode-id="2599" instrument_node="">removal of the term "in a row" (</span><a data-dcnode-id="2597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_language" title="Russian language"><span data-dcnode-id="2598" instrument_node="">Russian</span></a><span data-dcnode-id="2596" instrument_node="">: </span><span data-dcnode-id="2594" lang="ru"><span data-dcnode-id="2595" instrument_node="">подряд</span></span><span data-dcnode-id="2593" instrument_node="">, </span><small data-dcnode-id="2589"><a data-dcnode-id="2591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romanization_of_Russian" title="Romanization of Russian"><span data-dcnode-id="2592" instrument_node="">romanized</span></a><span data-dcnode-id="2590" instrument_node="">:&nbsp;</span></small><span data-dcnode-id="2586" title="Russian-language romanization"><i data-dcnode-id="2587" lang="ru-Latn"><span data-dcnode-id="2588" instrument_node="">podryad</span></i></span><span data-dcnode-id="2585" instrument_node="">) from the article regulating presidential </span><a data-dcnode-id="2583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Term_limit" title="Term limit"><span data-dcnode-id="2584" instrument_node="">term limits</span></a><span data-dcnode-id="2582" instrument_node="">, discounting previous and current terms before the amendment entered into force;</span></li><span data-dcnode-id="2580" instrument_node="">
</span><li data-dcnode-id="2569"><span data-dcnode-id="2579" instrument_node="">defining marriage as a relationship between one man and one woman;</span><sup class="reference" data-dcnode-id="2576" id="cite_ref-Times-3Mar20_62-0"><a data-dcnode-id="2577" href="#cite_note-Times-3Mar20-62"><span data-dcnode-id="2578" instrument_node="">[62]</span></a></sup><sup class="reference" data-dcnode-id="2573" id="cite_ref-Guardian-2Mar20_63-0"><a data-dcnode-id="2574" href="#cite_note-Guardian-2Mar20-63"><span data-dcnode-id="2575" instrument_node="">[63]</span></a></sup><sup class="reference" data-dcnode-id="2570" id="cite_ref-MosTimes-2Mar20_64-0"><a data-dcnode-id="2571" href="#cite_note-MosTimes-2Mar20-64"><span data-dcnode-id="2572" instrument_node="">[64]</span></a></sup></li><span data-dcnode-id="2568" instrument_node="">
</span><li data-dcnode-id="2557"><span data-dcnode-id="2567" instrument_node="">enshrine the status of the </span><a data-dcnode-id="2565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_language" title="Russian language"><span data-dcnode-id="2566" instrument_node="">Russian language</span></a><span data-dcnode-id="2564" instrument_node=""> in the country's constitution.</span><sup class="reference" data-dcnode-id="2561" id="cite_ref-65"><a data-dcnode-id="2562" href="#cite_note-65"><span data-dcnode-id="2563" instrument_node="">[65]</span></a></sup><sup class="reference" data-dcnode-id="2558" id="cite_ref-66"><a data-dcnode-id="2559" href="#cite_note-66"><span data-dcnode-id="2560" instrument_node="">[66]</span></a></sup></li></ul><span data-dcnode-id="2555" instrument_node="">
