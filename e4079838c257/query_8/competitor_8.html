</span><ul data-dcnode-id="1648" style="font-family:arial; font-size:small; color:#525252; margin-top:3px; margin-bottom:0px; margin-left:5px; padding-left:15px;" type="square"><span data-dcnode-id="1653" instrument_node="">
</span><li class="graylink" data-dcnode-id="1650"><a data-dcnode-id="1651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//he.gatestoneinstitute.org/18073/%25D7%25A4%25D7%2595%25D7%2598%25D7%2599%25D7%259F-%25D7%25A8%25D7%2595%25D7%25A6%25D7%2594-%25D7%2590%25D7%2595%25D7%25A7%25D7%25A8%25D7%2590%25D7%2599%25D7%25A0%25D7%2594"><span data-dcnode-id="1652" instrument_node="">Hebrew</span></a></li><span data-dcnode-id="1649" instrument_node="">

</span><div data-dcnode-id="1019" id="print_content_3"><div data-dcnode-id="1605" itemprop="description"><span data-dcnode-id="1639" instrument_node="">
</span><ul class="content_preface_bullets" data-dcnode-id="1607"><li data-dcnode-id="1636"><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">In July, Putin published a 7,000-word article — "On the Historical Unity of Russians and Ukrainians" — in which he wrote that he was convinced that the "true sovereignty of Ukraine is possible only in partnership with Russia."</span></p></li><span data-dcnode-id="1635" instrument_node="">
</span><li data-dcnode-id="1632"><p data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">"The Russian regime's foremost interest is its own hold on power. All policy, internal and external, stems from this overriding goal." — Edward Lucas, Ben Hodges and Carsten Schmiedl, Center for European Policy Analysis.</span></p></li><span data-dcnode-id="1631" instrument_node="">
</span><li data-dcnode-id="1628"><p data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">"The Russian Federation...has two main options: to escalate the armed conflict in the Donbas in order to achieve a rapid breakthrough, or to intensify long-term pressure, i.e. to play for Kyiv's gradual exhaustion. The choice of strategy depends on the Russian perception of the situation, the attitude of Ukraine itself, and the behavior of key Western actors." — Marek Menkiszak, Center for Eastern Studies.</span></p></li><span data-dcnode-id="1627" instrument_node="">
</span><li data-dcnode-id="1624"><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">The first important factor here is Moscow's likely perception of the relative weakness of the US. The Kremlin's initial fear of 'retribution' from the new Joe Biden administration for its interference in the 2016 presidential election seems to have given way to the belief that Washington is focused on domestic problems and the challenge from China, so it is seeking to improve relations with the Russian Federation. — Marek Menkiszak.</span></p></li><span data-dcnode-id="1623" instrument_node="">
</span><li data-dcnode-id="1620"><p data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">"Do not make the mistake of handing an essential part of Europe's future to a country that is demonstratively not the EU's friend. Time will not be kind to such decision or to those who made it." — Olexander Scherba, Ukrainian diplomat, Jamestown Foundation.</span></p></li><span data-dcnode-id="1619" instrument_node="">
</span><li data-dcnode-id="1616"><p data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">"Russia has a clear aim: to weaken Ukraine so much that it will be relatively easy to control the country's politics. Moscow can achieve this by forcing Kyiv to implement the Minsk agreement on its terms — which would establish a de facto Russian veto on Ukrainian domestic affairs — and by starting...anti-government revolts. Alternatively, Moscow could pressure Washington to 'deliver' Ukraine by signing security guarantees that favored Russia. These guarantees would prohibit Ukraine from not only joining NATO but also engaging in any form of cooperation with the West that would strengthen its resilience. This would eventually force Ukraine back into Moscow's sphere of influence." — Gustav Gressel, European Council on Foreign Relations.</span></p></li><span data-dcnode-id="1615" instrument_node="">
</span><li data-dcnode-id="1612"><p data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">"If Russia's coercive strategy works well, there is no guarantee that it will stop with Ukraine." — Gustav Gressel.</span></p></li><span data-dcnode-id="1611" instrument_node="">
</span><li data-dcnode-id="1608"><p data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">"Many European leaders do not seem to grasp the seriousness of the situation.... Ukraine has a gun to its head, but the German government only seems worried about the survival of its pipeline.... This is just the kind of poor judgement that enables Russian military aggression." — Gustav Gressel.</span></p></li></ul><span data-dcnode-id="1606" instrument_node="">
</span></div><span data-dcnode-id="1604" instrument_node="">
</span><div class="article_body itemprop_articlebody" data-dcnode-id="1108" itemprop="articleBody"><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1602"></p><span data-dcnode-id="1601" instrument_node="">
</span><span data-dcnode-id="1600" instrument_node="">
</span><span data-dcnode-id="1593" instrument_node="">
</span><span data-dcnode-id="1591" instrument_node="">
</span><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="1589" style="max-width:100%;"><tbody data-dcnode-id="1590"><tr data-dcnode-id="1592"><td data-dcnode-id="1594" style="max-width:600px; border:1px solid black;"><img border="0" data-dcnode-id="1599" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gatestoneinstitute.org/pics/1823.jpg&amp;raw" style="max-width:100%;"><p data-dcnode-id="1596" style="font-size:82%; margin:4px 6px;"><span data-dcnode-id="1597" instrument_node="">A massive build-up of Russian troops along the Ukrainian border is fueling speculation of an imminent invasion. Pictured: A Ukrainian soldier observes Russia-backed separatists through a periscope at a position near Donetsk, on April 22, 2021. (Photo by Anatolii Stepanov/AFP via Getty Images)</span></p></td></tr></tbody></table><p data-dcnode-id="1588"></p><span data-dcnode-id="1587" instrument_node="">
</span><p data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">A massive build-up of Russian troops along the Ukrainian border is fueling speculation of an imminent invasion. Western leaders have warned Russian President Vladimir Putin against military action, but, especially after the catastrophic American withdrawal from Afghanistan, they appear divided and weak and may be unable to stop him.</span></p><span data-dcnode-id="1584" instrument_node="">
</span><p data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">A Russian invasion of Ukraine, if successful, would expand Moscow's sphere of influence along its western border and pave the way for Eastern Europe and the Baltics to come under Russian domination once again.</span></p><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1580" instrument_node="">On December 3, the </span><i data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Washington Post</span></i><span data-dcnode-id="1577" instrument_node=""> </span><a data-dcnode-id="1575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/national-security/russia-ukraine-invasion/2021/12/03/98a3760e-546b-11ec-8769-2f4ecdf7a2ad_story.html"><span data-dcnode-id="1576" instrument_node="">reported</span></a><span data-dcnode-id="1574" instrument_node=""> that it had obtained an American intelligence document which assessed that Russia is planning a multi-front offensive involving nearly 200,000 troops within the next few months. The unclassified document, which includes satellite photos, shows Russian forces massing in four locations near Ukraine.</span></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1571" instrument_node="">The document states that Russia already has roughly half the units — 50 battlefield strike groups consisting of a total of 70,000 troops — it needs for an invasion deployed near the border. Most of those units have arrived since September. A Biden administration official, speaking on the condition of anonymity, </span><a data-dcnode-id="1569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/national-security/russia-ukraine-invasion/2021/12/03/98a3760e-546b-11ec-8769-2f4ecdf7a2ad_story.html"><span data-dcnode-id="1570" instrument_node="">said</span></a><span data-dcnode-id="1568" instrument_node="">:</span></p><span data-dcnode-id="1566" instrument_node="">
</span><blockquote data-dcnode-id="1562"><p data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">"The Russian plans call for a military offensive against Ukraine as soon as early 2022 with a scale of forces twice what we saw this past spring during Russia's snap exercise near Ukraine's borders. The plans involve extensive movement of 100 battalion tactical groups with an estimated 175,000 personnel, along with armor, artillery and equipment."</span></p><span data-dcnode-id="1563" instrument_node="">
</span></blockquote><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1553"><span data-dcnode-id="1560" instrument_node="">The American intelligence assessment — leaked on the same day that Ukrainian Defense Minister Oleksii Reznikov </span><a data-dcnode-id="1558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/europe/large-scale-russian-offensive-possible-january-ukraine-says-2021-12-03/"><span data-dcnode-id="1559" instrument_node="">said</span></a><span data-dcnode-id="1557" instrument_node=""> that Russia has amassed nearly 100,000 troops near the border and will be ready to invade in late January 2022 — comes after U.S. Secretary of State Antony Blinken discussed the Ukraine situation with his European counterparts. On December 1, after a NATO summit in Latvia, Blinken </span><a data-dcnode-id="1555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/secretary-antony-j-blinken-at-a-press-availability-at-the-nato-ministerial/"><span data-dcnode-id="1556" instrument_node="">said</span></a><span data-dcnode-id="1554" instrument_node="">:</span></p><span data-dcnode-id="1552" instrument_node="">
</span><blockquote data-dcnode-id="1545"><p data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">"We don't know whether President Putin has made the decision to invade. We do know that he is putting in place the capacity to do so on short order should he so decide. We must prepare for all contingencies.</span></p><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">"We've made it clear to the Kremlin that we will respond resolutely, including with a range of high impact economic measures that we've refrained from using in the past."</span></p><span data-dcnode-id="1546" instrument_node="">
</span></blockquote><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1543" instrument_node="">On December 2, Blinken </span><a data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/secretary-blinkens-meeting-with-russian-foreign-minister-lavrov-2/"><span data-dcnode-id="1542" instrument_node="">met</span></a><span data-dcnode-id="1540" instrument_node=""> with Russian Foreign Minister Sergei Lavrov on the sidelines of a ministerial meeting of the Organization of Security and Cooperation in Europe (OSCE) in Stockholm. Blinken </span><a data-dcnode-id="1538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/secretary-blinkens-meeting-with-russian-foreign-minister-lavrov-2/"><span data-dcnode-id="1539" instrument_node="">demanded</span></a><span data-dcnode-id="1537" instrument_node=""> that Russia withdraw troops from the Ukrainian border. Lavrov </span><a data-dcnode-id="1535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mid.ru/en/foreign_policy/news/-/asset_publisher/cKNonkJE02Bw/content/id/4978006"><span data-dcnode-id="1536" instrument_node="">deflected</span></a><span data-dcnode-id="1534" instrument_node=""> by warning that his country regarded the eastward expansion of the NATO military alliance as a "fundamental" security threat.</span></p><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1531" instrument_node="">"No one should strengthen their security at the expense of the security of others," Lavrov </span><a data-dcnode-id="1529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mid.ru/en/foreign_policy/news/-/asset_publisher/cKNonkJE02Bw/content/id/4978006"><span data-dcnode-id="1530" instrument_node="">said</span></a><span data-dcnode-id="1528" instrument_node="">. "NATO's further eastward expansion will obviously affect our fundamental security interests."</span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1521"><span data-dcnode-id="1525" instrument_node="">Putin, speaking at an investment forum in Moscow, </span><a data-dcnode-id="1523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/markets/stocks/putin-warns-russia-will-act-if-nato-crosses-its-red-lines-ukraine-2021-11-30/"><span data-dcnode-id="1524" instrument_node="">warned</span></a><span data-dcnode-id="1522" instrument_node=""> that Russia would act if its "red lines" on Ukraine were crossed by NATO.</span></p><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">NATO has not agreed to grant Ukraine membership, nor has the alliance deployed troops or weapons to Ukraine. NATO views Ukraine as a "partner" and has provided training and other forms of military support.</span></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1512"><span data-dcnode-id="1516" instrument_node="">NATO Secretary General Jens Stoltenberg </span><a data-dcnode-id="1514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/opinions_188767.htm"><span data-dcnode-id="1515" instrument_node="">indicated</span></a><span data-dcnode-id="1513" instrument_node=""> that the alliance would not defend Ukraine if it was attacked by Russia:</span></p><span data-dcnode-id="1511" instrument_node="">
</span><blockquote data-dcnode-id="1504"><p data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">"It is important to distinguish between NATO allies and partner Ukraine. NATO allies, there we provide [Article 5] guarantees, collective defense guarantees, and we will defend and protect all allies.</span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">"Ukraine is a partner, a highly-valued partner. There's a difference between a partner Ukraine and an ally like, for instance, Latvia. We need to understand the difference between a NATO ally, Latvia, other Baltic countries, Poland, Romania, and a close and highly valued partner, Ukraine. We provide support for Ukraine ... for the NATO allies we have the security guarantees, Article 5."</span></p><span data-dcnode-id="1505" instrument_node="">
</span></blockquote><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">NATO did not defend Ukraine after Russia's first invasion in 2014, when Moscow occupied and then annexed the Crimean Peninsula, nor did it defend Georgia, another NATO "partner," after Russia's invasion in 2008.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1495"><span data-dcnode-id="1499" instrument_node="">Stoltenberg </span><a data-dcnode-id="1497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//euobserver.com/world/153689"><span data-dcnode-id="1498" instrument_node="">hinted</span></a><span data-dcnode-id="1496" instrument_node=""> that the Western response to any Russian invasion would be limited to economic sanctions:</span></p><span data-dcnode-id="1494" instrument_node="">
</span><blockquote data-dcnode-id="1490"><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">"There will be a high price to pay for Russia if they once again use force against the independent, sovereign nation Ukraine. We have demonstrated our ability to impose costs, economic, political actions."</span></p><span data-dcnode-id="1491" instrument_node="">
</span></blockquote><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1484"><span data-dcnode-id="1488" instrument_node="">Stoltenberg also </span><a data-dcnode-id="1486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/opinions_189152.htm%3FselectedLocale%3Den"><span data-dcnode-id="1487" instrument_node="">said</span></a><span data-dcnode-id="1485" instrument_node=""> that Russia has no right to extend its "sphere of influence" over Ukraine:</span></p><span data-dcnode-id="1483" instrument_node="">
</span><blockquote data-dcnode-id="1467"><p data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">"It is only Ukraine and 30 NATO allies that decide when Ukraine is ready to join NATO. Russia has no veto. Russia has no say. And Russia has no right to establish a sphere of influence, trying to control their neighbors....</span></p><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">"They try to re-establish some kind of acceptance that Russia has the right to control what neighbors do, or not do....</span></p><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">"I, myself, I'm coming from a small country bordering Russia. And I'm very glad that our NATO allies have never respected that Russia has the kind of right to establish a sphere of influence in the North, trying to decide what Norway, as a small, independent country can do or not do.</span></p><span data-dcnode-id="1474" instrument_node="">
</span><p data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">"And that's exactly the same for Ukraine. Ukraine is an independent, sovereign nation with internationally recognized borders, guaranteed by Russia and all the other powers. And those borders, those internationally recognized borders should be respected. And that includes, of course, Crimea as part of Ukraine, and Donbas as part of Ukraine. So, this idea that NATO's support to a sovereign nation is the provocation, is just wrong. It's to respect the sovereignty of, the will of, the Ukrainian people.</span></p><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">"So I think that tells more about Russia than about NATO."</span></p><span data-dcnode-id="1468" instrument_node="">
</span></blockquote><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1465" instrument_node="">On December 3, U.S. President Joe Biden </span><a data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/europe/biden-says-putting-together-comprehensive-plan-russia-ukraine-crisis-2021-12-03/"><span data-dcnode-id="1464" instrument_node="">said</span></a><span data-dcnode-id="1462" instrument_node=""> that his administration was "putting together...the most comprehensive and meaningful set of initiatives to make it very, very difficult for Mr. Putin to go ahead and do what people are worried he's going to do."</span></p><span data-dcnode-id="1460" instrument_node="">
</span><p data-dcnode-id="1455"><span data-dcnode-id="1459" instrument_node="">A spokesperson for the White House's National Security Council said that Washington was "deeply concerned by evidence that Russia is stepping up its planning for significant military action against Ukraine." He </span><a data-dcnode-id="1457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/90873607-8a8a-48fb-8cb0-3414e277bf25"><span data-dcnode-id="1458" instrument_node="">concluded</span></a><span data-dcnode-id="1456" instrument_node="">:</span></p><span data-dcnode-id="1454" instrument_node="">
</span><blockquote data-dcnode-id="1450"><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">"The Biden administration has been consistent in our message to Russia: the United States does not seek conflict, and the best way to avert a crisis and a negative spiral in the broader relationship is through diplomacy and de-escalation."</span></p><span data-dcnode-id="1451" instrument_node="">
</span></blockquote><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1448" instrument_node="">The London-based </span><i data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Financial Times</span></i><span data-dcnode-id="1445" instrument_node=""> </span><a data-dcnode-id="1443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/90873607-8a8a-48fb-8cb0-3414e277bf25"><span data-dcnode-id="1444" instrument_node="">reported</span></a><span data-dcnode-id="1442" instrument_node=""> that some European officials were "surprised" about the strength of the U.S. intelligence assessment and that authorities on both sides of the Atlantic have spent weeks comparing and contrasting their evaluations.</span></p><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1435"><span data-dcnode-id="1439" instrument_node="">The newspaper </span><a data-dcnode-id="1437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/90873607-8a8a-48fb-8cb0-3414e277bf25"><span data-dcnode-id="1438" instrument_node="">added</span></a><span data-dcnode-id="1436" instrument_node=""> that the Biden administration is seeking to announce the consequences to Russia of a Ukraine invasion as part of a diplomatic push to deter Putin from deciding to act.</span></p><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1433" instrument_node="">An American defense official </span><a data-dcnode-id="1431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/90873607-8a8a-48fb-8cb0-3414e277bf25"><span data-dcnode-id="1432" instrument_node="">told</span></a><span data-dcnode-id="1430" instrument_node=""> the </span><i data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Financial Times</span></i><span data-dcnode-id="1427" instrument_node=""> that the Biden administration was considering providing weaponry to Ukraine, but that inter-agency discussions were continuing and no decisions had yet been made.</span></p><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1424" instrument_node="">On December 3, a Biden administration official </span><a data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/90873607-8a8a-48fb-8cb0-3414e277bf25"><span data-dcnode-id="1423" instrument_node="">said</span></a><span data-dcnode-id="1421" instrument_node="">:</span></p><span data-dcnode-id="1419" instrument_node="">
</span><blockquote data-dcnode-id="1415"><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">"Since the beginning of this administration we have demonstrated that the United States and our allies are willing to use a number of tools to address harmful Russian actions, and we will not hesitate from making use of those and other tools in the future."</span></p><span data-dcnode-id="1416" instrument_node="">
</span></blockquote><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1413" instrument_node="">On December 6, in an </span><a data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theglobeandmail.com/world/article-ukraines-defence-minister-urges-military-support-from-canada-us-and/"><span data-dcnode-id="1412" instrument_node="">interview</span></a><span data-dcnode-id="1410" instrument_node=""> with the Canadian newspaper </span><i data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">The Globe and Mail</span></i><span data-dcnode-id="1407" instrument_node="">, Reznikov, the Ukrainian defense minister, urged military support from Britain, Canada and the United States, even if it is outside NATO. He </span><a data-dcnode-id="1405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theglobeandmail.com/world/article-ukraines-defence-minister-urges-military-support-from-canada-us-and/"><span data-dcnode-id="1406" instrument_node="">said</span></a><span data-dcnode-id="1404" instrument_node=""> that the "Anglo-Saxon allies" were more likely to challenge Putin's aggressive behavior than countries like France and Germany, which are more concerned about maintaining their economic relationships with Russia.</span></p><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1399"><b data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">What Does Russia Want?</span></b></p><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Analysts are divided on what is motivating Putin. Some believe that he is using the Ukraine issue to deflect from runaway inflation and a divisive push for Covid vaccine passports. Others say that Putin is fixated on restoring Russian control over Ukraine and other former members of the former Soviet Union.</span></p><span data-dcnode-id="1395" instrument_node="">
</span><p data-dcnode-id="1387"><span data-dcnode-id="1394" instrument_node="">Max Seddon, Moscow correspondent for the </span><i data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Financial Times</span></i><span data-dcnode-id="1391" instrument_node="">, </span><a data-dcnode-id="1389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/f0061a68-82be-415c-bf33-b2f4c6bd2496"><span data-dcnode-id="1390" instrument_node="">wrote</span></a><span data-dcnode-id="1388" instrument_node="">:</span></p><span data-dcnode-id="1386" instrument_node="">
</span><blockquote data-dcnode-id="1376"><p data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">"Analysts say Putin's desire to rid Ukraine of western influence is underpinned by a conviction that it is an inalienable part of the 'Russian world,' a Moscow-centric sphere of influence rooted in the Soviet Union and the Tsarist empire.</span></p><span data-dcnode-id="1383" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">"Putin has described the collapse of the USSR, which separated millions of intermarried families on either side of the Ukrainian border, as 'the greatest geopolitical catastrophe of the 20th century' and has questioned the grounds on which Ukraine broke off from Russia.</span></p><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">"Following Russia's annexation of Crimea in 2014, Putin likened the Ukrainian peninsula, where Vladimir the Great — the first Christian ruler of Rus, a medieval state ruled from Kyiv — was baptized in 988AD, as 'Russia's Temple Mount' — a notion that has no theological basis but cast Putin as the protector of Russians everywhere."</span></p><span data-dcnode-id="1377" instrument_node="">
</span></blockquote><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1370"><span data-dcnode-id="1374" instrument_node="">In July, Putin </span><a data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.kremlin.ru/events/president/news/66181"><span data-dcnode-id="1373" instrument_node="">published</span></a><span data-dcnode-id="1371" instrument_node=""> a 7,000-word article — "On the Historical Unity of Russians and Ukrainians" — in which he wrote that he was convinced that the "true sovereignty of Ukraine is possible only in partnership with Russia." He vowed Moscow would never allow the country to become "anti-Russia."</span></p><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1364"><span data-dcnode-id="1368" instrument_node="">Putin was apparently referring to laws </span><a data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unian.info/politics/10618737-language-law-comes-to-force-in-ukraine.html"><span data-dcnode-id="1367" instrument_node="">introduced</span></a><span data-dcnode-id="1365" instrument_node=""> by the Ukrainian government in July 2019 that aim to promote the primacy of the Ukrainian language. Those laws limit the use of the Russian language in public settings and exclude Russians from a list of Ukraine's "indigenous peoples."</span></p><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1355"><span data-dcnode-id="1362" instrument_node="">In an interview with the </span><i data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Financial Times</span></i><span data-dcnode-id="1359" instrument_node="">, political analyst Tatiana Stanovaya </span><a data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/f0061a68-82be-415c-bf33-b2f4c6bd2496"><span data-dcnode-id="1358" instrument_node="">said</span></a><span data-dcnode-id="1356" instrument_node="">:</span></p><span data-dcnode-id="1354" instrument_node="">
</span><blockquote data-dcnode-id="1350"><p data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">"In Putin's understanding, the people of Ukraine are basically one with Russians, so they should support integration with Russia. But since the country is under the thumb of the West the people are being tricked — they're hostage to geopolitical games. If the Americans left, it'd be a unified state and everything would be great. Or so Putin thinks."</span></p><span data-dcnode-id="1351" instrument_node="">
</span></blockquote><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1348" instrument_node="">Pavlo Klimkin, Ukraine's former foreign minister, </span><a data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/f0061a68-82be-415c-bf33-b2f4c6bd2496"><span data-dcnode-id="1347" instrument_node="">added</span></a><span data-dcnode-id="1345" instrument_node="">:</span></p><span data-dcnode-id="1343" instrument_node="">
</span><blockquote data-dcnode-id="1336"><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">"Putin has a sense of mission on reinstalling a new kind of empire. It's sitting very deep in his mind. Not just Ukraine's success, but also any separate path of Ukraine would be highly damaging to the Russian mythology.</span></p><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">"The narrative in Russia is that there is no Ukrainian identity as such, including history, language, mentality and statehood. Putin's stance on Ukraine is highly irrational. Ukrainians and Russians have two different sets of values."</span></p><span data-dcnode-id="1337" instrument_node="">
</span></blockquote><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1330"><span data-dcnode-id="1334" instrument_node="">Ukrainian MP Oleksiy Goncharenko </span><a data-dcnode-id="1332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atlanticcouncil.org/blogs/ukrainealert/putins-new-ukraine-essay-reflects-imperial-ambitions/"><span data-dcnode-id="1333" instrument_node="">said</span></a><span data-dcnode-id="1331" instrument_node="">:</span></p><span data-dcnode-id="1329" instrument_node="">
</span><blockquote data-dcnode-id="1322"><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">"Putin's article claims to be about history, but in reality it is about the future and not the past. Ukraine holds the key to Putin's dreams of restoring Russia's great power status. He is painfully aware that without Ukraine, this will be impossible.</span></p><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">"Putin's essay does not actually contain anything new. Indeed, we have already heard these same arguments many times before. However, his article does help clarify that the current conflict is not about control over Crimea or eastern Ukraine's Donbas region; it is a war for the whole of Ukraine. Putin makes it perfectly clear that his goal is to keep Ukraine firmly within the Russian sphere of influence and to prevent Ukraine's Euro-Atlantic integration."</span></p><span data-dcnode-id="1323" instrument_node="">
</span></blockquote><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1320" instrument_node="">Swedish scholar Anders Åslund </span><a data-dcnode-id="1318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.project-syndicate.org/commentary/putin-denial-of-ukrainian-independence-could-lead-to-war-by-anders-aslund-2021-07"><span data-dcnode-id="1319" instrument_node="">warned</span></a><span data-dcnode-id="1317" instrument_node="">:</span></p><span data-dcnode-id="1315" instrument_node="">
</span><blockquote data-dcnode-id="1311"><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">"Make no mistake: by denying Ukraine's right to independence, Putin is setting the stage for war. The West must quickly decide what it is willing to do to prevent it."</span></p><span data-dcnode-id="1312" instrument_node="">
</span></blockquote><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1307"><b data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Western Weakness, Energy Dependence</span></b></p><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Putin appears to have become emboldened by perceptions that the West will most likely make public protests but do nothing to stop him.</span></p><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">In Europe, policies promoted for decades by Germany have allowed the European Union to become overly dependent on Russia for its energy supplies. If, in retaliation for a Russian invasion of Ukraine, the EU or the United States were to impose economic sanctions that threatened the survival of the Putin regime, Moscow could stop deliveries of oil and natural gas. Such a move would quickly bring the European Union to its knees and force the bloc to lift its sanctions.</span></p><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1299" instrument_node="">Putin also appears to view the Biden administration as feeble and feckless. In July, for instance, the White House abruptly reversed long-standing bi-partisan policy consensus and reached an </span><a data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gatestoneinstitute.org/17603/germany-russia-nord-stream-biden-administration"><span data-dcnode-id="1298" instrument_node="">agreement</span></a><span data-dcnode-id="1296" instrument_node=""> with German Chancellor Angela Merkel that allows for the completion of a controversial natural gas pipeline between Russia and Germany.</span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1293" instrument_node="">The </span><a data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/joint-statement-of-the-united-states-and-germany-on-support-for-ukraine-european-energy-security-and-our-climate-goals"><span data-dcnode-id="1292" instrument_node="">deal</span></a><span data-dcnode-id="1290" instrument_node=""> to complete the Nord Stream 2 pipeline, which would double shipments of Russian natural gas to Germany by transporting the gas under the Baltic Sea, angered the leaders of many countries in Eastern and Western Europe; they argued that it will effectively give Moscow a stranglehold over European gas supplies and open the continent to Russian blackmail.</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Both the Obama and Trump administrations opposed the pipeline on the grounds that, once completed, it would strengthen Putin's energy stranglehold over Europe.</span></p><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">The Trump administration was especially critical of the pipeline because it will funnel billions of dollars to Russia at a time when Germany is free-riding on the U.S. defense umbrella that protects Germany from that same Russia.</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1281" instrument_node="">Just one day before the Biden-Merkel deal was announced, State Department Spokesman Ned Price </span><a data-dcnode-id="1279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/business/energy/us-germany-vow-action-russia-nord-stream-2-deal-sources-2021-07-21/"><span data-dcnode-id="1280" instrument_node="">criticized</span></a><span data-dcnode-id="1278" instrument_node=""> the pipeline as a "Kremlin geopolitical project that is intended to expand Russia's influence over Europe's energy resources and to circumvent Ukraine." White House Press Secretary Jen Psaki had also previously </span><a data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/us-usa-biden-nord-stream/white-house-says-biden-believes-nord-stream-2-pipeline-is-bad-deal-for-europe-idUSKBN29V29X"><span data-dcnode-id="1277" instrument_node="">asserted</span></a><span data-dcnode-id="1275" instrument_node=""> that the Biden administration "continues to believe that Nord Stream 2 is a bad deal for Europe."</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1265"><span data-dcnode-id="1272" instrument_node="">The Biden administration has not explained why or how completion of the pipeline would promote American or European strategic interests. The White House reportedly </span><a data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.com/news/2021/07/20/us-ukraine-russia-pipeline-500334"><span data-dcnode-id="1271" instrument_node="">urged</span></a><span data-dcnode-id="1269" instrument_node=""> Ukraine to withhold public criticism of the deal with Germany and also asked Ukrainian officials not to discuss the agreement with members of the U.S. Congress. The Biden administration </span><a data-dcnode-id="1267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.com/news/2021/07/20/us-ukraine-russia-pipeline-500334"><span data-dcnode-id="1268" instrument_node="">warned</span></a><span data-dcnode-id="1266" instrument_node=""> Ukraine that going public with opposition to Nord Stream 2 could "damage the Washington-Kyiv bilateral relationship."</span></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1263" instrument_node="">In November 2021, a classified German government document </span><a data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.axios.com/germany-nord-stream-sanctions-congress-ukraine-4d28940b-dc3b-4b19-9d16-c122da6d113c.html"><span data-dcnode-id="1262" instrument_node="">leaked</span></a><span data-dcnode-id="1260" instrument_node=""> to Axios, an American news website, showed that Germany urged the U.S. Congress not to impose sanctions on the Nord Stream 2 pipeline. The document </span><a data-dcnode-id="1258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.documentcloud.org/documents/21118732-germany-non-paper"><span data-dcnode-id="1259" instrument_node="">stated</span></a><span data-dcnode-id="1257" instrument_node=""> that opposition to the pipeline would "weaken the credibility of the U.S. government" and "seriously weaken transatlantic unity on Russia." It also </span><a data-dcnode-id="1255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.documentcloud.org/documents/21118732-germany-non-paper"><span data-dcnode-id="1256" instrument_node="">claimed</span></a><span data-dcnode-id="1254" instrument_node=""> that the Nord Stream 2 pipeline poses "no threat" to Ukraine.</span></p><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Geopolitical analysts on both sides of the Atlantic say that the pipeline deal will: 1) weaken American and strengthen Russian influence in Europe; 2) heighten divisions between the Eastern and Western European members of the European Union; 3) push some of the EU's eastern periphery closer to China; 4) deprive Ukraine of the transit fees it now collects on gas pumped through an existing pipeline and thereby undermine Kiev's struggle against Russian aggression; and 5) allow Putin to strong-arm Germany and the European Union by turning off deliveries of natural gas whenever he wants.</span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1246"><b data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Failed Peace Talks</span></b></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Russia and Ukraine have been engaged in an armed conflict since February 2014, when Russia occupied and annexed the Crimean Peninsula. Russia subsequently occupied much of the industrial Donbas region in eastern Ukraine. Russia is accused of arming and financing a separatist uprising in Ukraine. The conflict has cost over 14,000 lives and left millions displaced.</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1241" instrument_node="">In September 2014, Russia and Ukraine signed a peace plan — the Minsk Protocol — for eastern Ukraine. The Minsk-1 agreement was drafted by the Trilateral Contact Group on Ukraine, which consisted of representatives from Ukraine, Russia, and the OSCE. It failed to stop fighting in Donbas. The Minsk-2 agreement, </span><a data-dcnode-id="1239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//peacemaker.un.org/sites/peacemaker.un.org/files/UA_150212_MinskAgreement_en.pdf"><span data-dcnode-id="1240" instrument_node="">signed</span></a><span data-dcnode-id="1238" instrument_node=""> in February 2015, was mediated by the leaders of France and Germany in the so-called Normandy Format. The new agreement contained 13 provisions, hardly any of which have been implemented. Russia and Ukraine have each accused each other of failing to honor the agreement.</span></p><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1228"><span data-dcnode-id="1235" instrument_node="">In 2021, Russia built-up troops on Ukraine's borders on two separate occasions. In May, Moscow </span><a data-dcnode-id="1233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/europe/ukraine-says-russia-still-has-100000-troops-near-its-border-2021-05-11/"><span data-dcnode-id="1234" instrument_node="">deployed</span></a><span data-dcnode-id="1232" instrument_node=""> around 100,000 troops near the border and in Crimea. In September, Russia </span><a data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breakingdefense.com/2021/10/biggest-takeaway-from-russias-zapad-exercise-putins-forces-linger-in-belarus/"><span data-dcnode-id="1231" instrument_node="">deployed</span></a><span data-dcnode-id="1229" instrument_node=""> nearly 200,000 troops to Belarus, which shares a long border with Ukraine. Some military analysts described the deployments as rehearsals for a full-scale Russian offensive.</span></p><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">On December 2, during their meeting in Stockholm, Blinken, sitting alongside Lavrov, called for Russia to resume negotiations with Ukraine over the Minsk-2 agreement within the "Normandy Format," sponsored by France and Germany. Lavrov demanded that the United States create an alternate channel of dialogue directly with the Kremlin.</span></p><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1223" instrument_node="">Some analysts believe the latest Russian troop build-up on the border is designed, at least in part, to force direct negotiations between Moscow and Washington, </span><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.eu/article/antony-blinken-sergey-lavrov-ukraine/"><span data-dcnode-id="1222" instrument_node="">according</span></a><span data-dcnode-id="1220" instrument_node=""> to David Herszenhorn, chief Brussels correspondent for </span><i data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Politico</span></i><span data-dcnode-id="1217" instrument_node="">. A separate channel of dialogue could undermine the Normandy Format and further divide the West by prying apart Europe and the United States.</span></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1214" instrument_node="">In a recent column, David Ignatius, foreign affairs commentator for the </span><i data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Washington Post</span></i><span data-dcnode-id="1211" instrument_node="">, revealed that such a separate channel may already be in operation. The Biden administration, he </span><a data-dcnode-id="1209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/opinions/2021/11/30/why-cia-worried-russia-ukraine/"><span data-dcnode-id="1210" instrument_node="">wrote</span></a><span data-dcnode-id="1208" instrument_node="">, "had signaled support for an eventual diplomatic deal on Ukraine that would give Putin much of what he wanted."</span></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1203"><b data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Select Commentary</span></b></p><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1201" instrument_node="">In an essay published by the Center for European Policy Analysis, analysts Edward Lucas, Ben Hodges and Carsten Schmiedl </span><a data-dcnode-id="1199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cepa.org/baltic-sea-security-what-russia-wants/"><span data-dcnode-id="1200" instrument_node="">wrote</span></a><span data-dcnode-id="1198" instrument_node="">:</span></p><span data-dcnode-id="1196" instrument_node="">
</span><blockquote data-dcnode-id="1186"><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">"The Russian regime's foremost interest is its own hold on power. All policy, internal and external, stems from this overriding goal. The Kremlin sees the West, the European Union (EU), and NATO as threats to this stability, and as potential instigators of 'color revolutions' that will exploit Russia's ethnic, religious, political, and other fissures.</span></p><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">"The long-term goal is, therefore, a polycentric or multipolar world in which multilateral, rules-based organizations are unable to dictate terms to Russia. Instead, the Kremlin aims to be the dominant power in Eurasia, using Russia's size to exert strong influence over its neighbors and over small countries, and to bargain with big countries on an equal basis....</span></p><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">"The ongoing war in Ukraine gives Russia a semi-permanent seat in European security discussions, and exploits underlying differences between France and Germany on one side, and the United States and other European countries on the other."</span></p><span data-dcnode-id="1187" instrument_node="">
</span></blockquote><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1184" instrument_node="">Writing for the Poland-based Center for Eastern Studies, Russia expert Marek Menkiszak </span><a data-dcnode-id="1182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.osw.waw.pl/en/publikacje/osw-commentary/2021-11-19/russias-ukrainian-dilemma-moscows-strategy-towards-kyiv"><span data-dcnode-id="1183" instrument_node="">noted</span></a><span data-dcnode-id="1181" instrument_node="">:</span></p><span data-dcnode-id="1179" instrument_node="">
</span><blockquote data-dcnode-id="1169"><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">"Recent weeks have brought further displays of Russia's escalating aggressive rhetoric and actions towards Ukraine, including troop movements near its border, as well as use of energy as leverage. This raises questions about Moscow's intentions. Both the statements of Russian leaders and the policy of the Russian Federation in recent years indicate that it has not abandoned attempts to achieve one of its main policy objectives: restoring control over Ukraine. This is despite the fact that its actions to date — both limited military aggression and political, economic, and propaganda pressure — have only moved it further away from this goal. In the current conditions, with the stalemate in the Donbas conflict continuing, the Russian Federation is faced with a choice of its future strategy towards Ukraine. It has two main options: to escalate the armed conflict in the Donbas in order to achieve a rapid breakthrough, or to intensify long-term pressure, i.e. to play for Kyiv's gradual exhaustion. The choice of strategy depends on the Russian perception of the situation, the attitude of Ukraine itself, and the behavior of key Western actors....</span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">"There are several arguments in favor of the escalation scenario. Firstly, Moscow is apparently impatient with the lack of results from its previous policy of pressure on Kyiv. Secondly, the longer Ukraine remains outside Moscow's strategic control, the further it distances itself from Moscow in all respects, and the stronger its independent existence becomes. Third, the Kremlin may see the current international situation as conducive to the implementation of such a plan.</span></p><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">"The first important factor here is Moscow's likely perception of the relative weakness of the US — a key actor that could prevent it from pursuing aggressive action against Ukraine. The Kremlin's initial fear of 'retribution' from the new Joe Biden administration for its interference in the 2016 presidential election seems to have given way to the belief that Washington is focused on domestic problems and the challenge from China, so it is seeking to improve relations with the Russian Federation. This may be evidenced by, among other things, decisions to drop further restrictions targeting the Nord Stream 2 pipeline, a rather mild response to dangerous Russian cyberattacks on the United States (including on elements of its critical infrastructure), and an intensification of political and security (including arms control) dialogue with Moscow."</span></p><span data-dcnode-id="1170" instrument_node="">
</span></blockquote><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1167" instrument_node="">In an essay published by the US-based Jamestown Foundation, Ukrainian diplomat Olexander Scherba </span><a data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jamestown.org/the-many-faces-of-nord-stream-two/"><span data-dcnode-id="1166" instrument_node="">wrote</span></a><span data-dcnode-id="1164" instrument_node="">:</span></p><span data-dcnode-id="1162" instrument_node="">
</span><blockquote data-dcnode-id="1149"><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">"It is now November 2021, and Ukraine's warnings about Nord Stream Two were not heard. The pipeline, whose main purpose is to make Europe more dependent on Russia, was built — on Europe's dime but under Russian Gazprom's ownership and control. Nord Stream Two has yet to be certified, but it is already causing substantial problems.</span></p><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">"Because of the pipeline, the European Union is divided and Russia is all the more convinced that the EU is weak and corruptible. Moscow lobbyists around the world pontificate that, with energy demand as well as prices soaring, the West's 'green delusion' is finally over, and the world is back to an era of rule by nations that have what really counts: oil, gas and coal.</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">"For quite a while, Moscow has pursued a three-fold strategy: fool Europe, corrupt Europe, seduce Europe. The Nord Stream Two saga included all three elements. It fooled Europe by promising an unnecessary pipeline that was rooted in geopolitical expediency. It corrupted Europe, by hiring its former leaders to lucrative advisory contracts and allowing Europe to finance what it promised would eventually be a cash cow. With the pipeline certification under consideration, Russia is now in the seduction phase, promising that once Nord Stream Two is certified, gas supply problems, will go away. Of course, that is like saying that one more bottle of vodka will make alcoholism go away....</span></p><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">"Do not make the mistake of handing an essential part of Europe's future to a country that is demonstratively not the EU's friend. Time will not be kind to such decision or to those who made it."</span></p><span data-dcnode-id="1150" instrument_node="">
</span></blockquote><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1147" instrument_node="">In an essay published by the European Council on Foreign Relations, analyst Gustav Gressel </span><a data-dcnode-id="1145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ecfr.eu/article/why-russia-could-invade-ukraine-again/"><span data-dcnode-id="1146" instrument_node="">concluded</span></a><span data-dcnode-id="1144" instrument_node="">:</span></p><span data-dcnode-id="1142" instrument_node="">
</span><blockquote data-dcnode-id="1123"><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">"Russia has a clear aim: to weaken Ukraine so much that it will be relatively easy to control the country's politics. Moscow can achieve this by forcing Kyiv to implement the Minsk agreement on its terms — which would establish a de facto Russian veto on Ukrainian domestic affairs — and by starting and exploiting anti-government revolts.</span></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Alternatively, Moscow could pressure Washington to 'deliver' Ukraine by signing security guarantees that favored Russia. These guarantees would prohibit Ukraine from not only joining NATO but also engaging in any form of cooperation with the West that would strengthen its resilience. This would eventually force Ukraine back into Moscow's sphere of influence.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">"Given these considerations, Kyiv may believe that it can either fight for independence now or be forced to do so later — probably in more challenging circumstances. Therefore, Kyiv may believe that it is worth standing up against a militarily superior enemy....</span></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">"If Russia's coercive strategy works well, there is no guarantee that it will stop with Ukraine. Russia's current alteration of the force structure in its Western Military District is partly directed against NATO. With Chinese-Russian military cooperation increasing, today's imponderables may become tomorrow's possibilities. American generals have long warned Europeans that, in the coming decades, the US may not be in a position to simultaneously protect its Asian and European allies against the threat of both China and Russia....</span></p><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">"Many European leaders do not seem to grasp the seriousness of the situation. One can see this in the defense of Nord Stream 2 in recently leaked German cables to members of the US Congress: Ukraine has a gun to its head, but the German government only seems worried about the survival of its pipeline. Berlin and Paris are resistant to a stronger NATO reaction — citing fears that Russia may feel threatened by a military capable Ukrainian state that has the support of the alliance. This is just the kind of poor judgement that enables Russian military aggression.</span></p><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">"For now, many eastern and central European nations may feel secure in the assumption that Washington will protect them by placing Moscow under diplomatic and military pressure. But they should not be complacent: while certain groups of think-tankers have been arguing for concessions to Russia since 2014, their ideas have gained a new resonance this time. A Washington preoccupied with countering Beijing may soon be willing to turn these arguments into policy — not for their brilliance, but for their convenience."</span></p><span data-dcnode-id="1124" instrument_node="">
</span></blockquote><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1110"><a data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.soerenkern.com/"><i data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Soeren Kern</span></i></a><i data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node=""> is a Senior Fellow at the New York-based</span></i><span data-dcnode-id="1116" instrument_node=""> </span><a data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gatestoneinstitute.org/"><i data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Gatestone Institute</span></i></a><i data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">.</span></i></p><span data-dcnode-id="1109" instrument_node="">
</span></div><span data-dcnode-id="1107" instrument_node="">
</span><span class="no_print" data-dcnode-id="1095"><ul data-dcnode-id="1097" style="font-style:italic;"><span data-dcnode-id="1106" instrument_node="">

</span></ul><span data-dcnode-id="1096" instrument_node="">
</span></span><div data-dcnode-id="1092" style="text-align:center; margin:auto; margin-top:15px; margin-bottom:5px; border-top:1px dotted gray; padding-top:15px;"><a data-dcnode-id="1093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gatestoneinstitute.org/contribute.php"><img data-dcnode-id="1094" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gatestoneinstitute.org/images/donate-button.png&amp;raw" style="max-width:100px;"></a></div><span data-dcnode-id="1091" instrument_node="">

</span><div class="dont-break-out" data-dcnode-id="905"><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Putin has made a huge mistake - he has actually turned his own people against him. He will be remembered as a failed leader worse than Stalin, who killed 20m of his own people.</span></p></div><span data-dcnode-id="904" instrument_node="">

</span><div data-dcnode-id="888" style="margin-bottom:5px;"><b data-dcnode-id="892" style="color:#DA5724;"><span data-dcnode-id="893" instrument_node="">Andre D.</span></b><span data-dcnode-id="891" instrument_node="">  • </span><span data-dcnode-id="889" style="font-size:95%;"><span data-dcnode-id="890" instrument_node="">Dec 10, 2021 at 21:20</span></span></div><span data-dcnode-id="887" instrument_node="">
</span><div class="dont-break-out" data-dcnode-id="884"><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">AP is reporting that the Biden administration wants to compel Ukraine to agree to the Minsk agreements, namely, grant the breakaway regions some degree of autonomy. But would this not simply be rewarding Russia for its support of military aggression and illegal 'annexation?' Does it not recall Neville Chamberlain selling out Czechoslovakia for "Peace in our Time?"</span></p></div><span data-dcnode-id="883" instrument_node="">

</span><div class="reply_form" data-dcnode-id="877" style="margin:10px 0 0 0;"><span class="reply_link" data-dcnode-id="878" form_id="190093" style="color:gray; text-decoration:none; cursor:pointer;"><b data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Reply-&gt;</span></b></span></div><span data-dcnode-id="876" instrument_node="">

</span><div data-dcnode-id="867" style="margin-bottom:5px;"><b data-dcnode-id="871" style="color:#DA5724;"><span data-dcnode-id="872" instrument_node="">Manuele Lui</span></b><span data-dcnode-id="870" instrument_node="">  • </span><span data-dcnode-id="868" style="font-size:95%;"><span data-dcnode-id="869" instrument_node="">Dec 7, 2021 at 03:03</span></span></div><span data-dcnode-id="866" instrument_node="">
</span><div class="dont-break-out" data-dcnode-id="863"><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Here's what I think that's going to happen. Russia will invade Ukraine to distract America so that the Chinese Communist Government invade Taiwan. Knowing now where America is at a world standing under the current corrupt power crapping Democrat Party Biden administration. America is weak under the Biden administration and there's no question about it. So these two Communist countries will have a field day. If anyone thinks that Europeans e.g. German and Nordic countries have the guts to challenge Russia or the Chinese Communist Government, then Ukraine and Taiwan can forget about any help coming but fight it out themselves. The small non-Europeans countries should stick together to fight the Communists advancing on to land/borders to bully them. I think the third world war will be fought not in one specific area in the world but will be two separate parts. Now my question is, Where will be the United Nations going to be? The UN is not the same United Nations of old. The PC has been running amok in this organization, so afraid of offending anybody but instead of addressing the issue head-on. Only God knows what is gonna happen or what is coming. As the saying goes, Rusts Never Sleep but I say that the devil never rests, even his evil goals reached its target/s. Only prayers/lots of prayers will defeat these communist murderers.</span></p></div><span data-dcnode-id="862" instrument_node="">
</span></div><span data-dcnode-id="860" instrument_node="">
</span><div class="reply_form" data-dcnode-id="856" style="margin:10px 0 0 0;"><span class="reply_link" data-dcnode-id="857" form_id="189910" style="color:gray; text-decoration:none; cursor:pointer;"><b data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Reply-&gt;</span></b></span></div><span data-dcnode-id="855" instrument_node="">

</span><div data-dcnode-id="846" style="margin-bottom:5px;"><b data-dcnode-id="850" style="color:#DA5724;"><span data-dcnode-id="851" instrument_node="">PJ Moran</span></b><span data-dcnode-id="849" instrument_node="">  • </span><span data-dcnode-id="847" style="font-size:95%;"><span data-dcnode-id="848" instrument_node="">Dec 6, 2021 at 16:26</span></span></div><span data-dcnode-id="845" instrument_node="">
</span><div class="dont-break-out" data-dcnode-id="842"><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">For years after WWI, the then USSR and Germany secretly cooperated on weapon and industrial development that included the ability to produce indigenous weapon systems. See: The Faustian Bargain: the Soviet-German Partnership and Origins of the Second World War by Ian Ona Johnson. Stalin realized, almost too late, that his real enemy was his co-conspirator and ally. President Putin needs to get out the history books and he needs to watch China's creeping 'annexation' of Russia's sparsely populated eastern and very oil rich provinces.</span></p></div><span data-dcnode-id="841" instrument_node="">
</span></div><span data-dcnode-id="839" instrument_node="">
</span><div class="reply_form" data-dcnode-id="835" style="margin:10px 0 0 0;"><span class="reply_link" data-dcnode-id="836" form_id="189902" style="color:gray; text-decoration:none; cursor:pointer;"><b data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Reply-&gt;</span></b></span></div><span data-dcnode-id="834" instrument_node="">

</span><div data-dcnode-id="825" style="margin-bottom:5px;"><b data-dcnode-id="829" style="color:#DA5724;"><span data-dcnode-id="830" instrument_node="">Conrad Kalish</span></b><span data-dcnode-id="828" instrument_node="">  • </span><span data-dcnode-id="826" style="font-size:95%;"><span data-dcnode-id="827" instrument_node="">Dec 6, 2021 at 16:13</span></span></div><span data-dcnode-id="824" instrument_node="">
</span><div class="dont-break-out" data-dcnode-id="818"><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">This business may be as much about Belarus as Ukraine. Unlike Ukraine, there is no ethnic enclave of Russians that Putin can seize or manipulate in Belarus. It is merely all or nothing under Lukashenko, whose hold on power is due to servility to Moscow and outright election fraud. Putin would have to occupy the entire country, and face guerilla resistance spanning the border with Ukraine to the Pripet Marshes. Belarus in Moscow's eyes is even more a non-nation than Ukraine: The evidence is Belarus is so heavily Russified linguistically through Russian media, that its entire culture can feel better of putting issues of ethnic determination to sleep than engaging in a neo-czarist family dispute. The 'greatest tragedy of the 20th century' to Putin is not the demise of the USSR per se, but the absence of a consensus of something like communism to legitimize a military takeover of his neighbors a la Jaruzelski, Husak, or Kadar. As no Yalta-like sphere of influence was ever granted to Russia, there is no truly fair and free government on earth that would grant one now.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">As for the oil and gas, it would be sweet justice to invoke the Monroe doctrine and end all Russo-Chinese influence in our Hemisphere, and make Venezuela once again a marketer of oil to the EU. After all, the US has national interests too!</span></p></div><span data-dcnode-id="817" instrument_node="">
</span></div><span data-dcnode-id="815" instrument_node="">
</span><div class="reply_form" data-dcnode-id="811" style="margin:10px 0 0 0;"><span class="reply_link" data-dcnode-id="812" form_id="189901" style="color:gray; text-decoration:none; cursor:pointer;"><b data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Reply-&gt;</span></b></span></div><span data-dcnode-id="810" instrument_node="">

</span><div class="dont-break-out" data-dcnode-id="797"><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Originally there were disagreements between Moscow and Kiev over how much money Kiev owed or was owed for the gas lines that go through to Europe which was a central cause for the pipeline that involved Hunter more recently. As a means for the Russians to skirt the Ukraine altogether. That Moscow "communists" lived much better lives because the imperial territories provided continuing profits has continued as an entitlement in the Muscovite mind set. This is about nothing more than Putin and his partners in crony capitalist oil ventures which they control the major profits of to tighten down in this period of COVID economic gloom that is global in reach. They did to Georgia, Chechnya what they want to do to the Ukraine oil and gas will be a big part of the greed motivated Muscovites and other and any prosperity. What the former Soviets want to do and exploit the Ukraine is why at the end of the Cold War we had begun to develop neutron bombs to kill people but leave infrastructure intact and usable.</span></p></div><span data-dcnode-id="796" instrument_node="">
</span></div><span data-dcnode-id="794" instrument_node="">

</span><div data-dcnode-id="780" style="margin-bottom:5px;"><b data-dcnode-id="784" style="color:#DA5724;"><span data-dcnode-id="785" instrument_node="">Bob Yoder</span></b><span data-dcnode-id="783" instrument_node="">  • </span><span data-dcnode-id="781" style="font-size:95%;"><span data-dcnode-id="782" instrument_node="">Dec 6, 2021 at 13:50</span></span></div><span data-dcnode-id="779" instrument_node="">
</span><div class="dont-break-out" data-dcnode-id="774"><p data-dcnode-id="775"><span data-dcnode-id="778" instrument_node="">To Blinken, Stoltenberg, Aslund, Gressel, Grizzle, and all the rest:</span><br data-dcnode-id="777"><span data-dcnode-id="776" instrument_node="">It's more than time to quit minding everybody else's business and to shore up our own crumbling empire here at home. In the wake of the dissolution of the Soviet Union, the fact that Russia stands at odds with us is our own doing, not theirs -- and as for the Nord Stream 2, whatever became of our longstanding policy objective of free markets; or does that only apply when convenient? Finally, as for NATO, its members are not our children; so why do we insist on treating them as such? A monster without a mission since that dissolution, NATO has but become the spearhead of expansion of that bastion of one-worldism, the EU. Time for us to back off and fire all these neocons.</span></p></div><span data-dcnode-id="773" instrument_node="">
</span></div><span data-dcnode-id="771" instrument_node="">

</span><div class="dont-break-out" data-dcnode-id="753"><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">As I recall the Crimea was with the Russians. I am also informed that part of the deal with Russia giving back East Germany we would not meddle in Russian and its sphere internal affairs. Keeping track as much as I can, it would seem we are not keeping our part of the bargain with respect of the Ukraine, after all what was the problem with Cuban missiles? Prof Arthur Noble Belfast, check British Church Newspaper. OK it was in the Morning Star here in the UK, but a high ranking Ukrainian official a neo nazi was a speaker at a conference in Scotland. It took a communist paper to inform us, where was the main stream papers? In short we are poking the Russian bear up the rear end with a sharp stick and think all the bear will do is go growly growly</span></p></div><span data-dcnode-id="752" instrument_node="">

</span><div class="dont-break-out" data-dcnode-id="728"><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Tony, Bob and PJ all are making important points not mentioned in the above article. Russia/Putin's issues can easily be negotiated in a fair way, and have not been, especially since the deployment of missiles in NATO countries and NATO expansion. We do not need to corner a wounded bear, when making deals that benefit them and us, especially as regards to China and the Middle East/Iran/Syria/Iraq/Afghanistan would be better. China is the real problem, and the alliance of Big Tech and international hedge funds with the CCP, as described in the other article today in this journal. Thank you though for the intellgient discussion. "Good Intel" can help avoid destructive conflict, be it on the personal, local or international level.</span></p></div><span data-dcnode-id="727" instrument_node="">

</span><div class="dont-break-out" data-dcnode-id="703"><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">So sad.... I love my country, but I find it hard to believe we will be blessed as a country when it seems the priorities is killing babies in the womb and sexual perversions promoted as normal. If the current leadership in US stays the same perhaps Ukraine would be better off as part of Russia. The USA abandoned its own people so I find it hard to believe they would do more than just talk about helping anyone else.</span></p></div><span data-dcnode-id="702" instrument_node="">
