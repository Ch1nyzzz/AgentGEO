                    By 
                        </span><a class="bold author-name" data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/author/james-stavridis/"><span data-dcnode-id="1208" instrument_node="">

</span><div class="timestamp published-date padding-12-left" data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">
                  January 10, 2022 12:02 PM EST
                </span></div><span data-dcnode-id="1201" instrument_node="">
</span><div class="author-bio" data-dcnode-id="1193"><em data-dcnode-id="1194"><span data-dcnode-id="1200" instrument_node="">Admiral Stavridis (Ret.), a TIME Contributing Editor, was the 16th Supreme Allied Commander at NATO and is Vice Chair, Global Affairs at The Carlyle Group and Chair of the Board of the Rockefeller Foundation. He is the co-author of </span><a data-dcnode-id="1198" data-saferedirecturl="https://www.google.com/url?q=https://bookshop.org/a/4973/9781984881250&amp;source=gmail&amp;ust=1647308555917000&amp;usg=AOvVaw04VPf5KJkZzSgu14z26ZSB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bookshop.org/a/4973/9781984881250" rel="noopener" target="_blank"><span data-dcnode-id="1199" instrument_node="">2034: A Novel of the Next World War</span></a><span data-dcnode-id="1197" instrument_node="">. His most recent nonfiction book is </span><a data-dcnode-id="1195" data-saferedirecturl="https://www.google.com/url?q=https://admiralstav.com/the-sailors-bookshelf/&amp;source=gmail&amp;ust=1647308555917000&amp;usg=AOvVaw3Tb4dmhEiCnHKff3HzNIh7" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//admiralstav.com/the-sailors-bookshelf/" rel="noopener" target="_blank"><span data-dcnode-id="1196" instrument_node="">"The Sailor's Bookshelf: 50 Books to Know the Sea."</span></a></em></div><span data-dcnode-id="1192" instrument_node="">
</span></div><span data-dcnode-id="1190" instrument_node="">
</span></div><span data-dcnode-id="1188" instrument_node="">
</span></div><span data-dcnode-id="1186" instrument_node="">
</span><span data-dcnode-id="1184" instrument_node="">
</span><div class="article content body clearfix" data-dcnode-id="879" data-tracking-zone="body" id="article-body"><span data-dcnode-id="1183" instrument_node="">
</span><div class="padded" data-dcnode-id="881"><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1169"><span class="dropcap" data-dcnode-id="1180" role="presentation"><span data-dcnode-id="1181" instrument_node="">F</span></span><span data-dcnode-id="1179" instrument_node="">or the past several months, Ukraine and its western partners have been watching Russia methodically build up a powerful force of over 100,000 soldiers on their shared border. While he claims not to intend an invasion, President Vladimir Putin has </span><a data-dcnode-id="1177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/6122671/vladimir-putin-ukraine/"><span data-dcnode-id="1178" instrument_node="">several objectives</span></a><span data-dcnode-id="1176" instrument_node="">. He wants to appear strong and decisive to his domestic base; divide the </span><a data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/5564207/russia-nato-relationship/"><span data-dcnode-id="1175" instrument_node="">U.S. and NATO</span></a><span data-dcnode-id="1173" instrument_node=""> over the response to a potential strike; impress his allies, especially President Xi Jinping of China; prevent Ukraine from joining NATO and the E.U., tying them Russia’s sphere of influence; and make the Biden administration appear weak and indecisive in the run-up to the 2021 midterms—especially after the U.S. failed to support former ally </span><a data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/6090523/biden-afghanistan-withdrawal-taliban/"><span data-dcnode-id="1172" instrument_node="">Afghanistan</span></a><span data-dcnode-id="1170" instrument_node="">.</span></p><span data-dcnode-id="1168" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250;320x480 instream-ad mobile-ad" data-dcnode-id="1166" data-dimensions="300x250;320x480" data-tgxlazy="200" data-tgxtargeting="%7B%7D" data-tgxupdatecorrelator="true" id="ad-300x250_320x480_LL_m_1" role="complementary"><span data-dcnode-id="1167" instrument_node="">
</span></div><span data-dcnode-id="1165" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-728x90;300x250 instream-ad type-728-flex tablet-ad desktop-ad x2" data-dcnode-id="1163" data-dimensions="728x90;300x250" data-tgxlazy="200" data-tgxtargeting="%7B%7D" id="ad-728x90_300x250_LL_td_1" role="complementary"><span data-dcnode-id="1164" instrument_node="">
</span></div><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">For the U.S., NATO, and the world’s democracies, this is a challenging moment. Above all, the Biden Administration wants to show that it can be relied upon to support a fellow democracy. Ukraine, while not a formal NATO member, has been a loyal partner to NATO and sent troops on NATO missions—and they desperately want to join the Alliance. Putin insists that Russia be afforded a veto of any further NATO expansion, and also wants military troops removed from former members of the Cold War Warsaw Pact—which includes many current allies like Poland, Romania, Bulgaria, Hungary and others. NATO cannot afford to give him such sway.</span></p><span data-dcnode-id="1159" instrument_node=""> </span><div class="component video-jw" data-autostart="viewable" data-dcnode-id="1134" data-description="All the trappings of a major international summit were on full display as President Joe Biden and Russia’s leader Vladimir Putin met Wednesday in an 18th century manor house overlooking the mountains of Switzerland and waters of Lake Geneva." data-media-id="VQUPChzw" data-player-id="1BWlFwPe" data-playlist-id="" data-title="Biden’s Summit Gave Putin the World Stage He Craves"><span data-dcnode-id="1158" instrument_node="">
</span><div class="partial aspect-ratio-box" data-dcnode-id="1136" style="--aspect-ratio:1.7777777777777777; --mobile-aspect-ratio:1.7777777777777777;"><span data-dcnode-id="1157" instrument_node="">
</span><div aria-label="Video Player" class="jwplayer jw-reset jw-state-setup jw-stretch-uniform jw-flag-aspect-mode" data-dcnode-id="1138" id="jw-1BWlFwPe-65c783aa-547e-4a87-976b-49cddc664cd2" role="application" style="width: 100%;" tabindex="0"><div class="jw-aspect jw-reset" data-dcnode-id="1156" style="padding-top: 56.25%;"></div><div class="jw-wrapper jw-reset" data-dcnode-id="1141"><div class="jw-top jw-reset" data-dcnode-id="1155"></div><div class="jw-aspect jw-reset" data-dcnode-id="1154" style="padding-top: 56.25%;"></div><div class="jw-media jw-reset" data-dcnode-id="1153"></div><div class="jw-preview jw-reset" data-dcnode-id="1152"></div><div class="jw-captions jw-reset" data-dcnode-id="1149"><div class="jw-captions-window jw-reset" data-dcnode-id="1150"><span class="jw-captions-text jw-reset" data-dcnode-id="1151"></span></div></div><div class="jw-title jw-reset-text" data-dcnode-id="1146" dir="auto"><div class="jw-title-primary jw-reset-text" data-dcnode-id="1148"></div><div class="jw-title-secondary jw-reset-text" data-dcnode-id="1147"></div></div><div class="jw-overlays jw-reset" data-dcnode-id="1145"></div><div class="jw-hidden-accessibility" data-dcnode-id="1142"><span aria-live="assertive" class="jw-time-update" data-dcnode-id="1144"></span><span aria-live="assertive" class="jw-volume-update" data-dcnode-id="1143"></span></div></div><div class="afs_ads ad-placement" data-dcnode-id="1139" style="width: 1px; height: 1px; position: absolute; background: transparent;"><span data-dcnode-id="1140" instrument_node="">&nbsp;</span></div></div><span data-dcnode-id="1137" instrument_node="">
</span></div><span data-dcnode-id="1135" instrument_node=""> </span></div><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">This is a significant confrontation, and the stakes are high. How should we think about the challenges on the edge of Europe, and above all what will Putin do next?</span></p><span data-dcnode-id="1130" instrument_node=""> </span><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">When I was Supreme Allied Commander at NATO, I spent a fair amount of time looking at Russian military options around the periphery of Europe. I had taken command of NATO military operations after Moscow’s invasion of Georgia in 2008, which resulted in the conquest of two provinces of that small, western aligned democracy. It was a straight forward offensive attack against the tiny nation of under four million—Russian tanks, troops, bombs, fighter jet, infantry, and artillery strikes provided the heavy punch.</span></p><span data-dcnode-id="1127" instrument_node=""> </span><p data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">A few years later, Putin decided to invade a much-larger neighbor, Ukraine. In that case, he decided to use what has come to be known as “hybrid warfare,” a witches’ brew of non-uniformed soldiers (the so-called “little green men,”), high end special forces, sophisticated offensive cyber against command centers and the electric grid, social media disinformation, and amphibious operations. These relatively unconventional tactics were combined with more traditional elements—hence the sobriquet “hybrid”—with effect in 2014.</span></p><span data-dcnode-id="1124" instrument_node=""> </span><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Here we are eight years later wondering what approach Putin will embrace if he does decide to invade Ukraine in the new year, perhaps as soon as late January as the ground freezes hard to support heavy armor and transport.</span></p><span data-dcnode-id="1121" instrument_node=""> </span><p data-dcnode-id="1116"><span data-dcnode-id="1120" instrument_node="">Putin and his generals are tactically innovative, and have a variety of options in front of them. They are a blooded army with commanders experienced in a wide variety of combat scenarios, most recently in the ongoing civil war in Syria and of course during their engagement in Ukraine itself. The combat in Ukraine continues both overtly (in occupied Crimea) and covertly (supporting a virulent separatist movement in the </span><a data-dcnode-id="1118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apnews.com/article/ukraine-shootings-donetsk-moscow-russia-3d2e732cc1a88c0d1b36fe856b45a8a9" target="_blank"><span data-dcnode-id="1119" instrument_node="">Donbass region</span></a><span data-dcnode-id="1117" instrument_node=""> in the southeast of the country, where 15,000 have been killed over the past decade).</span></p><span data-dcnode-id="1115" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250;320x480 instream-ad mobile-ad" data-dcnode-id="1113" data-dimensions="300x250;320x480" data-tgxlazy="200" data-tgxtargeting="%7B%7D" data-tgxupdatecorrelator="true" id="ad-300x250_320x480_LL_m_2" role="complementary"><span data-dcnode-id="1114" instrument_node="">
</span></div><span data-dcnode-id="1112" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-728x90;300x250 instream-ad type-728-flex tablet-ad desktop-ad x2" data-dcnode-id="1110" data-dimensions="728x90;300x250" data-tgxlazy="200" data-tgxtargeting="%7B%7D" id="ad-728x90_300x250_LL_td_2" role="complementary"><span data-dcnode-id="1111" instrument_node="">
</span></div><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">In 2022, the first option they will consider would be simple: a highly traditional blitzkrieg, much as was used against Georgia. This will require not only the 100,000 troops currently on the border, but an additional 75,000 who would “fall in” on prepositioned equipment that the U.S. showed the world in intelligence photos around Christmas.</span></p><span data-dcnode-id="1106" instrument_node=""> </span><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">This approach would include heavy air strikes against Ukrainian command and control, artillery bombardment, strikes from naval vessels in the Black Sea, and surface-to-surface missiles. All of this would be accompanied by offensive military cyberattacks against Ukrainian defensive weapons systems, communication capabilities, and possibly against parts of the nation’s electric grid.</span></p><span data-dcnode-id="1103" instrument_node=""> </span><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Helicopters would move shock troops forward fast, probably behind Ukrainian front lines. They would confuse and destabilize Ukrainian logistics and higher command authorities. Heavy infantry units would then cross the weakened border, and thrust deep into Ukraine, probably as far as the Dnieper River. The ethnically Russian southeast of Ukraine (especially Donetsk, Luhansk, and Mariupol) would be consolidated, creating a “land bridge” connecting Russia with Crimea, and grabbing another significant check of Black Sea waterfront.</span></p><span data-dcnode-id="1100" instrument_node=""> </span><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">At that point, Putin would pause, assess the situation, and decide whether to push forward to Kiev in order to effect regime change before pulling his troops back. He would likely go on to actually annex the southeast of the country, support a puppet regime in Kiev, and wait for the response of the west. This is the riskiest but also the highest payoff for the Kremlin, and is probably a 20% probability—not likely, but uncomfortable to contemplate.</span></p><span data-dcnode-id="1097" instrument_node=""> </span><div class="component inline image margin-32-tb" data-dcnode-id="1073"><span data-dcnode-id="1096" instrument_node="">
</span><div class="image-wrapper" data-dcnode-id="1075"><span data-dcnode-id="1095" instrument_node="">

</span><div class="inner-container js-inner-container" data-dcnode-id="1079" style="max-width: 800px;"><img alt="" data-dcnode-id="1090" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//api.time.com/wp-content/uploads/2022/01/GettyImages-1237622758.jpg%3Fw%3D800%26quality%3D85&amp;raw" style="width: 800px;" title=""><span data-dcnode-id="1089" instrument_node="">

</span><div class="credit body-caption padding-8-top" data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">A rally "Say no to Putin" is held in Kiev, Ukraine on January 9, 2021. Ukrainian nationalists are displeased with the interference of Russian President Vladimir Putin in the internal affairs of Kazakhstan. Russia sent about 3,000 troops to Kazakhstan to quell protests.</span></div><span data-dcnode-id="1085" instrument_node="">
</span><div class="credit body-credit padding-8-top padding-8-bottom" data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Anadolu Agency-Getty Images</span></div><span data-dcnode-id="1082" instrument_node="">
</span></div><span data-dcnode-id="1080" instrument_node="">
</span></div><span data-dcnode-id="1078" instrument_node="">
</span></div><span data-dcnode-id="1076" instrument_node=""> </span></div><span data-dcnode-id="1074" instrument_node="">
</span></div><span data-dcnode-id="1072" instrument_node=""> </span><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">A second option for the Kremlin would be to try and create a layer of deniability by using a strictly unconventional approach. This would be more akin to what he did in 2014 in Ukraine, and would include a massive cyberattack on the Ukrainian society, knocking out everything from gas stations to ATMs to rail and air systems. Using covert Russian forces already implanted in the Donbass region, he could unleash attacks across Ukraine—car bombs, mysterious criminal activities, assassination of military and civilian leaders. Social media would be central, discrediting the current government, documenting fictitious “massacres” of ethnic Russians in Ukrainian dominated sectors, and undermining confidence of the society as a whole.</span></p><span data-dcnode-id="1069" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250;320x480 instream-ad mobile-ad" data-dcnode-id="1067" data-dimensions="300x250;320x480" data-tgxlazy="200" data-tgxtargeting="%7B%7D" data-tgxupdatecorrelator="true" id="ad-300x250_320x480_LL_m_3" role="complementary"><span data-dcnode-id="1068" instrument_node="">
</span></div><span data-dcnode-id="1066" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-728x90;300x250 instream-ad type-728-flex tablet-ad desktop-ad x2" data-dcnode-id="1064" data-dimensions="728x90;300x250" data-tgxlazy="200" data-tgxtargeting="%7B%7D" id="ad-728x90_300x250_LL_td_3" role="complementary"><span data-dcnode-id="1065" instrument_node="">
</span></div><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">When western critics decried his actions, he would call it “fake news” and the Ukrainian version of the “big lie,” saying that Russian engagement is key to maintaining stability on the shared border. This is a hyped-up version of what he is already doing, and increasing these tactics would make it harder for NATO to consider Ukraine for membership, one of his key objectives. It would also generate public support within Russia for his actions (protecting “Russian patriots” living in Ukraine) without the costs of a full-scale invasion. This seems a more likely approach than an all-out invasion, and poses less risk to Moscow. This is roughly a 40% probability and the likely approach Putin will take if talks in mid-January do not accomplish his objectives.</span></p><span data-dcnode-id="1060" instrument_node=""> </span><p data-dcnode-id="1055"><span data-dcnode-id="1059" instrument_node="">Finally, he is hoping he can achieve what he wants via the talks which will unfold this week—U.S.-Russia on 10 Jan., Russia-NATO on 12 Jan., and at the Organization for Security and Cooperation in Europe on 13 Jan. Putin wants assurances that Ukraine will never be allowed to join NATO; that NATO nations along the long Russian / NATO border will never be permitted to host significant NATO military forces; and that sanctions imposed on him over the 2014 invasion, the Skirpal nerve attacks in the U.K., and the attempted assassination of his political opponent </span><a data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/5930595/alexei-navalny-return-russia-why/"><span data-dcnode-id="1058" instrument_node="">Alexander Navalny</span></a><span data-dcnode-id="1056" instrument_node=""> will be lifted.</span></p><span data-dcnode-id="1054" instrument_node=""> </span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">While the chances of achieving those sweeping objectives at the negotiating table appear low-to-impossible, he might be willing to settle for something less than everything he is demanding. His minimum is probably a federalist structure in Ukraine that gives real autonomy to the Russian speaking southeast of the country; at least a tacit acceptance of the annexation of Crimea; an under-the-table recognition that Ukraine (and Georgia) will not join NATO; and some sanctions relief that would increase over time.</span></p><span data-dcnode-id="1051" instrument_node=""> </span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">If the west gives him some of what he seeks, Putin may be willing to put both the massive invasion and the amped up hybrid approach on hold, at least for the moment. He also has his eye on elections in the U.S., both this fall and more importantly in 2024. The idea of demonstrating weakness on the part of the Biden team is very appealing to him, and he may judge that he should hold back until that part of his strategy can have maximal effect—thus improving the changes he will accept some kind of negotiated outcome this round. Thus this option comes in around 40% as well, about equal to the chances of the hybrid approach.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250;320x480 instream-ad mobile-ad" data-dcnode-id="1046" data-dimensions="300x250;320x480" data-tgxlazy="200" data-tgxtargeting="%7B%7D" data-tgxupdatecorrelator="true" id="ad-300x250_320x480_LL_m_4" role="complementary"><span data-dcnode-id="1047" instrument_node="">
</span></div><span data-dcnode-id="1045" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-728x90;300x250 instream-ad type-728-flex tablet-ad desktop-ad x2" data-dcnode-id="1043" data-dimensions="728x90;300x250" data-tgxlazy="200" data-tgxtargeting="%7B%7D" id="ad-728x90_300x250_LL_td_4" role="complementary"><span data-dcnode-id="1044" instrument_node="">
</span></div><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1041" instrument_node="">The U.S. and NATO should do all we can to use diplomacy to defuse the situation and avoid giving Putin an easy and obvious win. That means ensuring the west in general and NATO in particular speak with one voice on the level and lethality of economic sanctions that would be applied if Putin crosses another sovereign border in anger. We should also use the next month or two to rush defensive but lethal weapons to Ukraine, which would serve as a further deterrent. </span><a data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/2021/dec/23/nord-stream-2-how-putins-pipeline-paralysed-the-west" target="_blank"><span data-dcnode-id="1040" instrument_node="">Nord Stream 2</span></a><span data-dcnode-id="1038" instrument_node=""> represents real leverage at this point, and looking at some sanctions relief could be possible—but not while Russia effectively has a dagger at the throat of Ukraine.</span></p><span data-dcnode-id="1036" instrument_node=""> </span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">As talks unfold the Biden administration is signaling a willingness to provide some strategic flexibility. This could include reducing the capability of NATO anti-ballistic missile systems in Poland and Romania; discussing balancing troop levels between Russia and the west in NATO nations on Russia’s border; and reducing military exercises on both sides. But there is a great deal of animosity between the sides.</span></p><span data-dcnode-id="1033" instrument_node=""> </span><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Putin and his generals like maintaining the west off-balance, something they have done to good effect over the past decade. One thing I learned studying their approach to warfare at the SACEUR is how much they like to preserve optionality. Count on the Russian President to threaten the massive attack, see what he can get at the table in January that can go in his pocket, but be back with the hybrid approach as the year goes along. Unfortunately, this is a long-simmering crisis that will come closer and closer to a full boil at different times as the year unfolds.</span></p><span data-dcnode-id="1030" instrument_node=""> </span><div class="component inline-article-recirc" data-dcnode-id="965"><span data-dcnode-id="1029" instrument_node="">
