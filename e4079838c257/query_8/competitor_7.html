</span><h1 class="entry-title" data-dcnode-id="868" itemprop="headline"><span data-dcnode-id="869" instrument_node="">What Russia Wants in Ukraine</span></h1><span data-dcnode-id="867" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="854"><span data-dcnode-id="866" instrument_node="">
</span><span class="posted-on" data-dcnode-id="863"><time class="entry-date published" data-dcnode-id="864" datetime="2021-12-06T16:28:27+00:00" itemprop="datePublished"><span data-dcnode-id="865" instrument_node="">December 6, 2021</span></time></span><span data-dcnode-id="862" instrument_node=""> </span><span class="byline" data-dcnode-id="856"><span data-dcnode-id="861" instrument_node="">by </span><span class="author vcard" data-dcnode-id="857" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="url fn n" data-dcnode-id="858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//infoarmed.com/author/informer/" itemprop="url" rel="author" title="View all posts by InfoArmed"><span class="author-name" data-dcnode-id="859" itemprop="name"><span data-dcnode-id="860" instrument_node="">InfoArmed</span></span></a></span></span><span data-dcnode-id="855" instrument_node=""> </span></div><span data-dcnode-id="853" instrument_node="">
</span></header><span data-dcnode-id="851" instrument_node="">
</span><div class="entry-content" data-dcnode-id="356" itemprop="text"><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">&nbsp;</span></p><span data-dcnode-id="847" instrument_node="">
</span><span data-dcnode-id="846" instrument_node="">
</span><span data-dcnode-id="845" instrument_node="">

</span><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="828"><tbody data-dcnode-id="830"><tr data-dcnode-id="832"><td data-dcnode-id="834"><img border="0" data-dcnode-id="843" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gatestoneinstitute.org/pics/1823.jpg&amp;raw"><p data-dcnode-id="841"></p><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">A massive build-up of Russian troops along the Ukrainian border is fueling speculation of an imminent invasion. Pictured: A Ukrainian soldier observes Russia-backed separatists through a periscope at a position near Donetsk, on April 22, 2021. (Photo by Anatolii Stepanov/AFP via Getty Images)</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"></p></td></tr></tbody></table><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">A massive build-up of Russian troops along the Ukrainian border is fueling speculation of an imminent invasion. Western leaders have warned Russian President Vladimir Putin against military action, but, especially after the catastrophic American withdrawal from Afghanistan, they appear divided and weak and may be unable to stop him.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">A Russian invasion of Ukraine, if successful, would expand Moscow’s sphere of influence along its western border and pave the way for Eastern Europe and the Baltics to come under Russian domination once again.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="820" instrument_node="">On December 3, the </span><i data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Washington Post</span></i><span data-dcnode-id="817" instrument_node=""> </span><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/national-security/russia-ukraine-invasion/2021/12/03/98a3760e-546b-11ec-8769-2f4ecdf7a2ad_story.html" rel="noopener"><span data-dcnode-id="816" instrument_node="">reported</span></a><span data-dcnode-id="814" instrument_node=""> that it had obtained an American intelligence document which assessed that Russia is planning a multi-front offensive involving nearly 200,000 troops within the next few months. The unclassified document, which includes satellite photos, shows Russian forces massing in four locations near Ukraine.</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="811" instrument_node="">The document states that Russia already has roughly half the units — 50 battlefield strike groups consisting of a total of 70,000 troops — it needs for an invasion deployed near the border. Most of those units have arrived since September. A Biden administration official, speaking on the condition of anonymity, </span><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/national-security/russia-ukraine-invasion/2021/12/03/98a3760e-546b-11ec-8769-2f4ecdf7a2ad_story.html" rel="noopener"><span data-dcnode-id="810" instrument_node="">said</span></a><span data-dcnode-id="808" instrument_node="">:</span></p><span data-dcnode-id="806" instrument_node="">
</span><blockquote data-dcnode-id="803"><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">“The Russian plans call for a military offensive against Ukraine as soon as early 2022 with a scale of forces twice what we saw this past spring during Russia’s snap exercise near Ukraine’s borders. The plans involve extensive movement of 100 battalion tactical groups with an estimated 175,000 personnel, along with armor, artillery and equipment.”</span></p></blockquote><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="801" instrument_node="">The American intelligence assessment — leaked on the same day that Ukrainian Defense Minister Oleksii Reznikov </span><a data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/europe/large-scale-russian-offensive-possible-january-ukraine-says-2021-12-03/" rel="noopener"><span data-dcnode-id="800" instrument_node="">said</span></a><span data-dcnode-id="798" instrument_node=""> that Russia has amassed nearly 100,000 troops near the border and will be ready to invade in late January 2022 — comes after U.S. Secretary of State Antony Blinken discussed the Ukraine situation with his European counterparts. On December 1, after a NATO summit in Latvia, Blinken </span><a data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/secretary-antony-j-blinken-at-a-press-availability-at-the-nato-ministerial/" rel="noopener"><span data-dcnode-id="797" instrument_node="">said</span></a><span data-dcnode-id="795" instrument_node="">:</span></p><span data-dcnode-id="793" instrument_node="">
</span><blockquote data-dcnode-id="787"><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">“We don’t know whether President Putin has made the decision to invade. We do know that he is putting in place the capacity to do so on short order should he so decide. We must prepare for all contingencies.</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">“We’ve made it clear to the Kremlin that we will respond resolutely, including with a range of high impact economic measures that we’ve refrained from using in the past.”</span></p></blockquote><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="785" instrument_node="">On December 2, Blinken </span><a data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/secretary-blinkens-meeting-with-russian-foreign-minister-lavrov-2/" rel="noopener"><span data-dcnode-id="784" instrument_node="">met</span></a><span data-dcnode-id="782" instrument_node=""> with Russian Foreign Minister Sergei Lavrov on the sidelines of a ministerial meeting of the Organization of Security and Cooperation in Europe (OSCE) in Stockholm. Blinken </span><a data-dcnode-id="780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/secretary-blinkens-meeting-with-russian-foreign-minister-lavrov-2/" rel="noopener"><span data-dcnode-id="781" instrument_node="">demanded</span></a><span data-dcnode-id="779" instrument_node=""> that Russia withdraw troops from the Ukrainian border. Lavrov </span><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mid.ru/en/foreign_policy/news/-/asset_publisher/cKNonkJE02Bw/content/id/4978006" rel="noopener"><span data-dcnode-id="778" instrument_node="">deflected</span></a><span data-dcnode-id="776" instrument_node=""> by warning that his country regarded the eastward expansion of the NATO military alliance as a “fundamental” security threat.</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="773" instrument_node="">“No one should strengthen their security at the expense of the security of others,” Lavrov </span><a data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mid.ru/en/foreign_policy/news/-/asset_publisher/cKNonkJE02Bw/content/id/4978006" rel="noopener"><span data-dcnode-id="772" instrument_node="">said</span></a><span data-dcnode-id="770" instrument_node="">. “NATO’s further eastward expansion will obviously affect our fundamental security interests.”</span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="767" instrument_node="">Putin, speaking at an investment forum in Moscow, </span><a data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/markets/stocks/putin-warns-russia-will-act-if-nato-crosses-its-red-lines-ukraine-2021-11-30/" rel="noopener"><span data-dcnode-id="766" instrument_node="">warned</span></a><span data-dcnode-id="764" instrument_node=""> that Russia would act if its “red lines” on Ukraine were crossed by NATO.</span></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">NATO has not agreed to grant Ukraine membership, nor has the alliance deployed troops or weapons to Ukraine. NATO views Ukraine as a “partner” and has provided training and other forms of military support.</span></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="758" instrument_node="">NATO Secretary General Jens Stoltenberg </span><a data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/opinions_188767.htm" rel="noopener"><span data-dcnode-id="757" instrument_node="">indicated</span></a><span data-dcnode-id="755" instrument_node=""> that the alliance would not defend Ukraine if it was attacked by Russia:</span></p><span data-dcnode-id="753" instrument_node="">
</span><blockquote data-dcnode-id="747"><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">“It is important to distinguish between NATO allies and partner Ukraine. NATO allies, there we provide [Article 5] guarantees, collective defense guarantees, and we will defend and protect all allies.</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">“Ukraine is a partner, a highly-valued partner. There’s a difference between a partner Ukraine and an ally like, for instance, Latvia. We need to understand the difference between a NATO ally, Latvia, other Baltic countries, Poland, Romania, and a close and highly valued partner, Ukraine. We provide support for Ukraine … for the NATO allies we have the security guarantees, Article 5.”</span></p></blockquote><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">NATO did not defend Ukraine after Russia’s first invasion in 2014, when Moscow occupied and then annexed the Crimean Peninsula, nor did it defend Georgia, another NATO “partner,” after Russia’s invasion in 2008.</span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="742" instrument_node="">Stoltenberg </span><a data-dcnode-id="740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//euobserver.com/world/153689" rel="noopener"><span data-dcnode-id="741" instrument_node="">hinted</span></a><span data-dcnode-id="739" instrument_node=""> that the Western response to any Russian invasion would be limited to economic sanctions:</span></p><span data-dcnode-id="737" instrument_node="">
</span><blockquote data-dcnode-id="734"><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">“There will be a high price to pay for Russia if they once again use force against the independent, sovereign nation Ukraine. We have demonstrated our ability to impose costs, economic, political actions.”</span></p></blockquote><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="732" instrument_node="">Stoltenberg also </span><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/opinions_189152.htm%3FselectedLocale%3Den" rel="noopener"><span data-dcnode-id="731" instrument_node="">said</span></a><span data-dcnode-id="729" instrument_node=""> that Russia has no right to extend its “sphere of influence” over Ukraine:</span></p><span data-dcnode-id="727" instrument_node="">
</span><blockquote data-dcnode-id="712"><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">“It is only Ukraine and 30 NATO allies that decide when Ukraine is ready to join NATO. Russia has no veto. Russia has no say. And Russia has no right to establish a sphere of influence, trying to control their neighbors….</span></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">“They try to re-establish some kind of acceptance that Russia has the right to control what neighbors do, or not do….</span></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">“I, myself, I’m coming from a small country bordering Russia. And I’m very glad that our NATO allies have never respected that Russia has the kind of right to establish a sphere of influence in the North, trying to decide what Norway, as a small, independent country can do or not do.</span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">“And that’s exactly the same for Ukraine. Ukraine is an independent, sovereign nation with internationally recognized borders, guaranteed by Russia and all the other powers. And those borders, those internationally recognized borders should be respected. And that includes, of course, Crimea as part of Ukraine, and Donbas as part of Ukraine. So, this idea that NATO’s support to a sovereign nation is the provocation, is just wrong. It’s to respect the sovereignty of, the will of, the Ukrainian people.</span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">“So I think that tells more about Russia than about NATO.”</span></p></blockquote><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="710" instrument_node="">On December 3, U.S. President Joe Biden </span><a data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/europe/biden-says-putting-together-comprehensive-plan-russia-ukraine-crisis-2021-12-03/" rel="noopener"><span data-dcnode-id="709" instrument_node="">said</span></a><span data-dcnode-id="707" instrument_node=""> that his administration was “putting together…the most comprehensive and meaningful set of initiatives to make it very, very difficult for Mr. Putin to go ahead and do what people are worried he’s going to do.”</span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="704" instrument_node="">A spokesperson for the White House’s National Security Council said that Washington was “deeply concerned by evidence that Russia is stepping up its planning for significant military action against Ukraine.” He </span><a data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/90873607-8a8a-48fb-8cb0-3414e277bf25" rel="noopener"><span data-dcnode-id="703" instrument_node="">concluded</span></a><span data-dcnode-id="701" instrument_node="">:</span></p><span data-dcnode-id="699" instrument_node="">
</span><blockquote data-dcnode-id="696"><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">“The Biden administration has been consistent in our message to Russia: the United States does not seek conflict, and the best way to avert a crisis and a negative spiral in the broader relationship is through diplomacy and de-escalation.”</span></p></blockquote><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="694" instrument_node="">The London-based </span><i data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Financial Times</span></i><span data-dcnode-id="691" instrument_node=""> </span><a data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/90873607-8a8a-48fb-8cb0-3414e277bf25" rel="noopener"><span data-dcnode-id="690" instrument_node="">reported</span></a><span data-dcnode-id="688" instrument_node=""> that some European officials were “surprised” about the strength of the U.S. intelligence assessment and that authorities on both sides of the Atlantic have spent weeks comparing and contrasting their evaluations.</span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="685" instrument_node="">The newspaper </span><a data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/90873607-8a8a-48fb-8cb0-3414e277bf25" rel="noopener"><span data-dcnode-id="684" instrument_node="">added</span></a><span data-dcnode-id="682" instrument_node=""> that the Biden administration is seeking to announce the consequences to Russia of a Ukraine invasion as part of a diplomatic push to deter Putin from deciding to act.</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="679" instrument_node="">An American defense official </span><a data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/90873607-8a8a-48fb-8cb0-3414e277bf25" rel="noopener"><span data-dcnode-id="678" instrument_node="">told</span></a><span data-dcnode-id="676" instrument_node=""> the </span><i data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Financial Times</span></i><span data-dcnode-id="673" instrument_node=""> that the Biden administration was considering providing weaponry to Ukraine, but that inter-agency discussions were continuing and no decisions had yet been made.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="670" instrument_node="">On December 3, a Biden administration official </span><a data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/90873607-8a8a-48fb-8cb0-3414e277bf25" rel="noopener"><span data-dcnode-id="669" instrument_node="">said</span></a><span data-dcnode-id="667" instrument_node="">:</span></p><span data-dcnode-id="665" instrument_node="">
</span><blockquote data-dcnode-id="662"><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">“Since the beginning of this administration we have demonstrated that the United States and our allies are willing to use a number of tools to address harmful Russian actions, and we will not hesitate from making use of those and other tools in the future.”</span></p></blockquote><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="660" instrument_node="">On December 6, in an </span><a data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theglobeandmail.com/world/article-ukraines-defence-minister-urges-military-support-from-canada-us-and/" rel="noopener"><span data-dcnode-id="659" instrument_node="">interview</span></a><span data-dcnode-id="657" instrument_node=""> with the Canadian newspaper </span><i data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">The Globe and Mail</span></i><span data-dcnode-id="654" instrument_node="">, Reznikov, the Ukrainian defense minister, urged military support from Britain, Canada and the United States, even if it is outside NATO. He </span><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theglobeandmail.com/world/article-ukraines-defence-minister-urges-military-support-from-canada-us-and/" rel="noopener"><span data-dcnode-id="653" instrument_node="">said</span></a><span data-dcnode-id="651" instrument_node=""> that the “Anglo-Saxon allies” were more likely to challenge Putin’s aggressive behavior than countries like France and Germany, which are more concerned about maintaining their economic relationships with Russia.</span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="646"><b data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">What Does Russia Want?</span></b></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Analysts are divided on what is motivating Putin. Some believe that he is using the Ukraine issue to deflect from runaway inflation and a divisive push for Covid vaccine passports. Others say that Putin is fixated on restoring Russian control over Ukraine and other former members of the former Soviet Union.</span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="641" instrument_node="">Max Seddon, Moscow correspondent for the </span><i data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Financial Times</span></i><span data-dcnode-id="638" instrument_node="">, </span><a data-dcnode-id="636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/f0061a68-82be-415c-bf33-b2f4c6bd2496" rel="noopener"><span data-dcnode-id="637" instrument_node="">wrote</span></a><span data-dcnode-id="635" instrument_node="">:</span></p><span data-dcnode-id="633" instrument_node="">
</span><blockquote data-dcnode-id="624"><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">“Analysts say Putin’s desire to rid Ukraine of western influence is underpinned by a conviction that it is an inalienable part of the ‘Russian world,’ a Moscow-centric sphere of influence rooted in the Soviet Union and the Tsarist empire.</span></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">“Putin has described the collapse of the USSR, which separated millions of intermarried families on either side of the Ukrainian border, as ‘the greatest geopolitical catastrophe of the 20th century’ and has questioned the grounds on which Ukraine broke off from Russia.</span></p><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">“Following Russia’s annexation of Crimea in 2014, Putin likened the Ukrainian peninsula, where Vladimir the Great — the first Christian ruler of Rus, a medieval state ruled from Kyiv — was baptized in 988AD, as ‘Russia’s Temple Mount’ — a notion that has no theological basis but cast Putin as the protector of Russians everywhere.”</span></p></blockquote><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="622" instrument_node="">In July, Putin </span><a data-dcnode-id="620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.kremlin.ru/events/president/news/66181" rel="noopener"><span data-dcnode-id="621" instrument_node="">published</span></a><span data-dcnode-id="619" instrument_node=""> a 5,000-word article — “On the Historical Unity of Russians and Ukrainians” — in which he wrote that he was convinced that the “true sovereignty of Ukraine is possible only in partnership with Russia.” He vowed Moscow would never allow the country to become “anti-Russia.”</span></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="616" instrument_node="">Putin was apparently referring to laws </span><a data-dcnode-id="614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unian.info/politics/10618737-language-law-comes-to-force-in-ukraine.html" rel="noopener"><span data-dcnode-id="615" instrument_node="">introduced</span></a><span data-dcnode-id="613" instrument_node=""> by the Ukrainian government in July 2019 that aim to promote the primacy of the Ukrainian language. Those laws limit the use of the Russian language in public settings and exclude Russians from a list of Ukraine’s “indigenous peoples.”</span></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="610" instrument_node="">In an interview with the </span><i data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Financial Times</span></i><span data-dcnode-id="607" instrument_node="">, political analyst Tatiana Stanovaya </span><a data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/f0061a68-82be-415c-bf33-b2f4c6bd2496" rel="noopener"><span data-dcnode-id="606" instrument_node="">said</span></a><span data-dcnode-id="604" instrument_node="">:</span></p><span data-dcnode-id="602" instrument_node="">
</span><blockquote data-dcnode-id="599"><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">“In Putin’s understanding, the people of Ukraine are basically one with Russians, so they should support integration with Russia. But since the country is under the thumb of the West the people are being tricked — they’re hostage to geopolitical games. If the Americans left, it’d be a unified state and everything would be great. Or so Putin thinks.”</span></p></blockquote><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="597" instrument_node="">Pavlo Klimkin, Ukraine’s former foreign minister, </span><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/f0061a68-82be-415c-bf33-b2f4c6bd2496" rel="noopener"><span data-dcnode-id="596" instrument_node="">added</span></a><span data-dcnode-id="594" instrument_node="">:</span></p><span data-dcnode-id="592" instrument_node="">
</span><blockquote data-dcnode-id="586"><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">“Putin has a sense of mission on reinstalling a new kind of empire. It’s sitting very deep in his mind. Not just Ukraine’s success, but also any separate path of Ukraine would be highly damaging to the Russian mythology.</span></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">“The narrative in Russia is that there is no Ukrainian identity as such, including history, language, mentality and statehood. Putin’s stance on Ukraine is highly irrational. Ukrainians and Russians have two different sets of values.”</span></p></blockquote><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="584" instrument_node="">Ukrainian MP Oleksiy Goncharenko </span><a data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atlanticcouncil.org/blogs/ukrainealert/putins-new-ukraine-essay-reflects-imperial-ambitions/" rel="noopener"><span data-dcnode-id="583" instrument_node="">said</span></a><span data-dcnode-id="581" instrument_node="">:</span></p><span data-dcnode-id="579" instrument_node="">
</span><blockquote data-dcnode-id="573"><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">“Putin’s article claims to be about history, but in reality it is about the future and not the past. Ukraine holds the key to Putin’s dreams of restoring Russia’s great power status. He is painfully aware that without Ukraine, this will be impossible.</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">“Putin’s essay does not actually contain anything new. Indeed, we have already heard these same arguments many times before. However, his article does help clarify that the current conflict is not about control over Crimea or eastern Ukraine’s Donbas region; it is a war for the whole of Ukraine. Putin makes it perfectly clear that his goal is to keep Ukraine firmly within the Russian sphere of influence and to prevent Ukraine’s Euro-Atlantic integration.”</span></p></blockquote><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="571" instrument_node="">Swedish scholar Anders Åslund </span><a data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.project-syndicate.org/commentary/putin-denial-of-ukrainian-independence-could-lead-to-war-by-anders-aslund-2021-07" rel="noopener"><span data-dcnode-id="570" instrument_node="">warned</span></a><span data-dcnode-id="568" instrument_node="">:</span></p><span data-dcnode-id="566" instrument_node="">
</span><blockquote data-dcnode-id="563"><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">“Make no mistake: by denying Ukraine’s right to independence, Putin is setting the stage for war. The West must quickly decide what it is willing to do to prevent it.”</span></p></blockquote><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="559"><b data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Western Weakness, Energy Dependence</span></b></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Putin appears to have become emboldened by perceptions that the West will most likely make public protests but do nothing to stop him.</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">In Europe, policies promoted for decades by Germany have allowed the European Union to become overly dependent on Russia for its energy supplies. If, in retaliation for a Russian invasion of Ukraine, the EU or the United States were to impose economic sanctions that threatened the survival of the Putin regime, Moscow could stop deliveries of oil and natural gas. Such a move would quickly bring the European Union to its knees and force the bloc to lift its sanctions.</span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="551" instrument_node="">Putin also appears to view the Biden administration as feeble and feckless. In July, for instance, the White House abruptly reversed long-standing bi-partisan policy consensus and reached an </span><a data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gatestoneinstitute.org/17603/germany-russia-nord-stream-biden-administration" rel="noopener"><span data-dcnode-id="550" instrument_node="">agreement</span></a><span data-dcnode-id="548" instrument_node=""> with German Chancellor Angela Merkel that allows for the completion of a controversial natural gas pipeline between Russia and Germany.</span></p><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="545" instrument_node="">The </span><a data-dcnode-id="543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/joint-statement-of-the-united-states-and-germany-on-support-for-ukraine-european-energy-security-and-our-climate-goals" rel="noopener"><span data-dcnode-id="544" instrument_node="">deal</span></a><span data-dcnode-id="542" instrument_node=""> to complete the Nord Stream 2 pipeline, which would double shipments of Russian natural gas to Germany by transporting the gas under the Baltic Sea, angered the leaders of many countries in Eastern and Western Europe; they argued that it will effectively give Moscow a stranglehold over European gas supplies and open the continent to Russian blackmail.</span></p><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Both the Obama and Trump administrations opposed the pipeline on the grounds that, once completed, it would strengthen Putin’s energy stranglehold over Europe.</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">The Trump administration was especially critical of the pipeline because it will funnel billions of dollars to Russia at a time when Germany is free-riding on the U.S. defense umbrella that protects Germany from that same Russia.</span></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="533" instrument_node="">Just one day before the Biden-Merkel deal was announced, State Department Spokesman Ned Price </span><a data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/business/energy/us-germany-vow-action-russia-nord-stream-2-deal-sources-2021-07-21/" rel="noopener"><span data-dcnode-id="532" instrument_node="">criticized</span></a><span data-dcnode-id="530" instrument_node=""> the pipeline as a “Kremlin geopolitical project that is intended to expand Russia’s influence over Europe’s energy resources and to circumvent Ukraine.” White House Press Secretary Jen Psaki had also previously </span><a data-dcnode-id="528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/us-usa-biden-nord-stream/white-house-says-biden-believes-nord-stream-2-pipeline-is-bad-deal-for-europe-idUSKBN29V29X" rel="noopener"><span data-dcnode-id="529" instrument_node="">asserted</span></a><span data-dcnode-id="527" instrument_node=""> that the Biden administration “continues to believe that Nord Stream 2 is a bad deal for Europe.”</span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="524" instrument_node="">The Biden administration has not explained why or how completion of the pipeline would promote American or European strategic interests. The White House reportedly </span><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.com/news/2021/07/20/us-ukraine-russia-pipeline-500334" rel="noopener"><span data-dcnode-id="523" instrument_node="">urged</span></a><span data-dcnode-id="521" instrument_node=""> Ukraine to withhold public criticism of the deal with Germany and also asked Ukrainian officials not to discuss the agreement with members of the U.S. Congress. The Biden administration </span><a data-dcnode-id="519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.com/news/2021/07/20/us-ukraine-russia-pipeline-500334" rel="noopener"><span data-dcnode-id="520" instrument_node="">warned</span></a><span data-dcnode-id="518" instrument_node=""> Ukraine that going public with opposition to Nord Stream 2 could “damage the Washington-Kyiv bilateral relationship.”</span></p><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="515" instrument_node="">In November 2021, a classified German government document </span><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.axios.com/germany-nord-stream-sanctions-congress-ukraine-4d28940b-dc3b-4b19-9d16-c122da6d113c.html" rel="noopener"><span data-dcnode-id="514" instrument_node="">leaked</span></a><span data-dcnode-id="512" instrument_node=""> to Axios, an American news website, showed that Germany urged the U.S. Congress not to impose sanctions on the Nord Stream 2 pipeline. The document </span><a data-dcnode-id="510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.documentcloud.org/documents/21118732-germany-non-paper" rel="noopener"><span data-dcnode-id="511" instrument_node="">stated</span></a><span data-dcnode-id="509" instrument_node=""> that opposition to the pipeline would “weaken the credibility of the U.S. government” and “seriously weaken transatlantic unity on Russia.” It also </span><a data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.documentcloud.org/documents/21118732-germany-non-paper" rel="noopener"><span data-dcnode-id="508" instrument_node="">claimed</span></a><span data-dcnode-id="506" instrument_node=""> that the Nord Stream 2 pipeline poses “no threat” to Ukraine.</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Geopolitical analysts on both sides of the Atlantic say that the pipeline deal will: 1) weaken American and strengthen Russian influence in Europe; 2) heighten divisions between the Eastern and Western European members of the European Union; 3) push some of the EU’s eastern periphery closer to China; 4) deprive Ukraine of the transit fees it now collects on gas pumped through an existing pipeline and thereby undermine Kiev’s struggle against Russian aggression; and 5) allow Putin to strong-arm Germany and the European Union by turning off deliveries of natural gas whenever he wants.</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="498"><b data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Failed Peace Talks</span></b></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Russia and Ukraine have been engaged in an armed conflict since February 2014, when Russia occupied and annexed the Crimean Peninsula. Russia subsequently occupied much of the industrial Donbas region in eastern Ukraine. Russia is accused of arming and financing a separatist uprising in Ukraine. The conflict has cost over 14,000 lives and left millions displaced.</span></p><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="493" instrument_node="">In September 2014, Russia and Ukraine signed a peace plan — the Minsk Protocol — for eastern Ukraine. The Minsk-1 agreement was drafted by the Trilateral Contact Group on Ukraine, which consisted of representatives from Ukraine, Russia, and the OSCE. It failed to stop fighting in Donbas. The Minsk-2 agreement, </span><a data-dcnode-id="491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//peacemaker.un.org/sites/peacemaker.un.org/files/UA_150212_MinskAgreement_en.pdf" rel="noopener"><span data-dcnode-id="492" instrument_node="">signed</span></a><span data-dcnode-id="490" instrument_node=""> in February 2015, was mediated by the leaders of France and Germany in the so-called Normandy Format. The new agreement contained 13 provisions, hardly any of which have been implemented. Russia and Ukraine have each accused each other of failing to honor the agreement.</span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="487" instrument_node="">In 2021, Russia built-up troops on Ukraine’s borders on two separate occasions. In May, Moscow </span><a data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/europe/ukraine-says-russia-still-has-100000-troops-near-its-border-2021-05-11/" rel="noopener"><span data-dcnode-id="486" instrument_node="">deployed</span></a><span data-dcnode-id="484" instrument_node=""> around 100,000 troops near the border and in Crimea. In September, Russia </span><a data-dcnode-id="482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breakingdefense.com/2021/10/biggest-takeaway-from-russias-zapad-exercise-putins-forces-linger-in-belarus/" rel="noopener"><span data-dcnode-id="483" instrument_node="">deployed</span></a><span data-dcnode-id="481" instrument_node=""> nearly 200,000 troops to Belarus, which shares a long border with Ukraine. Some military analysts described the deployments as rehearsals for a full-scale Russian offensive.</span></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">On December 2, during their meeting in Stockholm, Blinken, sitting alongside Lavrov, called for Russia to resume negotiations with Ukraine over the Minsk-2 agreement within the “Normandy Format,” sponsored by France and Germany. Lavrov demanded that the United States create an alternate channel of dialogue directly with the Kremlin.</span></p><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="468"><span data-dcnode-id="475" instrument_node="">Some analysts believe the latest Russian troop build-up on the border is designed, at least in part, to force direct negotiations between Moscow and Washington, </span><a data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.eu/article/antony-blinken-sergey-lavrov-ukraine/" rel="noopener"><span data-dcnode-id="474" instrument_node="">according</span></a><span data-dcnode-id="472" instrument_node=""> to David Herszenhorn, chief Brussels correspondent for </span><i data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Politico</span></i><span data-dcnode-id="469" instrument_node="">. A separate channel of dialogue could undermine the Normandy Format and further divide the West by prying apart Europe and the United States.</span></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="466" instrument_node="">In a recent column, David Ignatius, foreign affairs commentator for the </span><i data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Washington Post</span></i><span data-dcnode-id="463" instrument_node="">, revealed that such a separate channel may already be in operation. The Biden administration, he </span><a data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/opinions/2021/11/30/why-cia-worried-russia-ukraine/" rel="noopener"><span data-dcnode-id="462" instrument_node="">wrote</span></a><span data-dcnode-id="460" instrument_node="">, “had signaled support for an eventual diplomatic deal on Ukraine that would give Putin much of what he wanted.”</span></p><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="455"><b data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Select Commentary</span></b></p><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="449"><span data-dcnode-id="453" instrument_node="">In an essay published by the Center for European Policy Analysis, analysts Edward Lucas, Ben Hodges and Carsten Schmiedl </span><a data-dcnode-id="451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cepa.org/baltic-sea-security-what-russia-wants/" rel="noopener"><span data-dcnode-id="452" instrument_node="">wrote</span></a><span data-dcnode-id="450" instrument_node="">:</span></p><span data-dcnode-id="448" instrument_node="">
</span><blockquote data-dcnode-id="439"><p data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">“The Russian regime’s foremost interest is its own hold on power. All policy, internal and external, stems from this overriding goal. The Kremlin sees the West, the European Union (EU), and NATO as threats to this stability, and as potential instigators of ‘color revolutions’ that will exploit Russia’s ethnic, religious, political, and other fissures.</span></p><span data-dcnode-id="445" instrument_node="">
</span><p data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">“The long-term goal is, therefore, a polycentric or multipolar world in which multilateral, rules-based organizations are unable to dictate terms to Russia. Instead, the Kremlin aims to be the dominant power in Eurasia, using Russia’s size to exert strong influence over its neighbors and over small countries, and to bargain with big countries on an equal basis….</span></p><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">“The ongoing war in Ukraine gives Russia a semi-permanent seat in European security discussions, and exploits underlying differences between France and Germany on one side, and the United States and other European countries on the other.”</span></p></blockquote><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="433"><span data-dcnode-id="437" instrument_node="">Writing for the Poland-based Center for Eastern Studies, Russia expert Marek Menkiszak </span><a data-dcnode-id="435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.osw.waw.pl/en/publikacje/osw-commentary/2021-11-19/russias-ukrainian-dilemma-moscows-strategy-towards-kyiv" rel="noopener"><span data-dcnode-id="436" instrument_node="">noted</span></a><span data-dcnode-id="434" instrument_node="">:</span></p><span data-dcnode-id="432" instrument_node="">
</span><blockquote data-dcnode-id="423"><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">“Recent weeks have brought further displays of Russia’s escalating aggressive rhetoric and actions towards Ukraine, including troop movements near its border, as well as use of energy as leverage. This raises questions about Moscow’s intentions. Both the statements of Russian leaders and the policy of the Russian Federation in recent years indicate that it has not abandoned attempts to achieve one of its main policy objectives: restoring control over Ukraine. This is despite the fact that its actions to date — both limited military aggression and political, economic, and propaganda pressure — have only moved it further away from this goal. In the current conditions, with the stalemate in the Donbas conflict continuing, the Russian Federation is faced with a choice of its future strategy towards Ukraine. It has two main options: to escalate the armed conflict in the Donbas in order to achieve a rapid breakthrough, or to intensify long-term pressure, i.e. to play for Kyiv’s gradual exhaustion. The choice of strategy depends on the Russian perception of the situation, the attitude of Ukraine itself, and the behavior of key Western actors….</span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">“There are several arguments in favor of the escalation scenario. Firstly, Moscow is apparently impatient with the lack of results from its previous policy of pressure on Kyiv. Secondly, the longer Ukraine remains outside Moscow’s strategic control, the further it distances itself from Moscow in all respects, and the stronger its independent existence becomes. Third, the Kremlin may see the current international situation as conducive to the implementation of such a plan.</span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">“The first important factor here is Moscow’s likely perception of the relative weakness of the US — a key actor that could prevent it from pursuing aggressive action against Ukraine. The Kremlin’s initial fear of ‘retribution’ from the new Joe Biden administration for its interference in the 2016 presidential election seems to have given way to the belief that Washington is focused on domestic problems and the challenge from China, so it is seeking to improve relations with the Russian Federation. This may be evidenced by, among other things, decisions to drop further restrictions targeting the Nord Stream 2 pipeline, a rather mild response to dangerous Russian cyberattacks on the United States (including on elements of its critical infrastructure), and an intensification of political and security (including arms control) dialogue with Moscow.”</span></p></blockquote><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="417"><span data-dcnode-id="421" instrument_node="">In an essay published by the US-based Jamestown Foundation, Ukrainian diplomat Olexander Scherba </span><a data-dcnode-id="419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jamestown.org/the-many-faces-of-nord-stream-two/" rel="noopener"><span data-dcnode-id="420" instrument_node="">wrote</span></a><span data-dcnode-id="418" instrument_node="">:</span></p><span data-dcnode-id="416" instrument_node="">
</span><blockquote data-dcnode-id="404"><p data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">“It is now November 2021, and Ukraine’s warnings about Nord Stream Two were not heard. The pipeline, whose main purpose is to make Europe more dependent on Russia, was built — on Europe’s dime but under Russian Gazprom’s ownership and control. Nord Stream Two has yet to be certified, but it is already causing substantial problems.</span></p><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">“Because of the pipeline, the European Union is divided and Russia is all the more convinced that the EU is weak and corruptible. Moscow lobbyists around the world pontificate that, with energy demand as well as prices soaring, the West’s ‘green delusion’ is finally over, and the world is back to an era of rule by nations that have what really counts: oil, gas and coal.</span></p><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">“For quite a while, Moscow has pursued a three-fold strategy: fool Europe, corrupt Europe, seduce Europe. The Nord Stream Two saga included all three elements. It fooled Europe by promising an unnecessary pipeline that was rooted in geopolitical expediency. It corrupted Europe, by hiring its former leaders to lucrative advisory contracts and allowing Europe to finance what it promised would eventually be a cash cow. With the pipeline certification under consideration, Russia is now in the seduction phase, promising that once Nord Stream Two is certified, gas supply problems, will go away. Of course, that is like saying that one more bottle of vodka will make alcoholism go away….</span></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">“Do not make the mistake of handing an essential part of Europe’s future to a country that is demonstratively not the EU’s friend. Time will not be kind to such decision or to those who made it.”</span></p></blockquote><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="402" instrument_node="">In an essay published by the European Council on Foreign Relations, analyst Gustav Gressel </span><a data-dcnode-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ecfr.eu/article/why-russia-could-invade-ukraine-again/" rel="noopener"><span data-dcnode-id="401" instrument_node="">concluded</span></a><span data-dcnode-id="399" instrument_node="">:</span></p><span data-dcnode-id="397" instrument_node="">
</span><blockquote data-dcnode-id="379"><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">“Russia has a clear aim: to weaken Ukraine so much that it will be relatively easy to control the country’s politics. Moscow can achieve this by forcing Kyiv to implement the Minsk agreement on its terms — which would establish a de facto Russian veto on Ukrainian domestic affairs — and by starting and exploiting anti-government revolts.</span></p><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Alternatively, Moscow could pressure Washington to ‘deliver’ Ukraine by signing security guarantees that favored Russia. These guarantees would prohibit Ukraine from not only joining NATO but also engaging in any form of cooperation with the West that would strengthen its resilience. This would eventually force Ukraine back into Moscow’s sphere of influence.</span></p><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">“Given these considerations, Kyiv may believe that it can either fight for independence now or be forced to do so later — probably in more challenging circumstances. Therefore, Kyiv may believe that it is worth standing up against a militarily superior enemy….</span></p><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">“If Russia’s coercive strategy works well, there is no guarantee that it will stop with Ukraine. Russia’s current alteration of the force structure in its Western Military District is partly directed against NATO. With Chinese-Russian military cooperation increasing, today’s imponderables may become tomorrow’s possibilities. American generals have long warned Europeans that, in the coming decades, the US may not be in a position to simultaneously protect its Asian and European allies against the threat of both China and Russia….</span></p><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">“Many European leaders do not seem to grasp the seriousness of the situation. One can see this in the defense of Nord Stream 2 in recently leaked German cables to members of the US Congress: Ukraine has a gun to its head, but the German government only seems worried about the survival of its pipeline. Berlin and Paris are resistant to a stronger NATO reaction — citing fears that Russia may feel threatened by a military capable Ukrainian state that has the support of the alliance. This is just the kind of poor judgement that enables Russian military aggression.</span></p><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">“For now, many eastern and central European nations may feel secure in the assumption that Washington will protect them by placing Moscow under diplomatic and military pressure. But they should not be complacent: while certain groups of think-tankers have been arguing for concessions to Russia since 2014, their ideas have gained a new resonance this time. A Washington preoccupied with countering Beijing may soon be willing to turn these arguments into policy — not for their brilliance, but for their convenience.”</span></p></blockquote><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="366"><a data-dcnode-id="375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.soerenkern.com/" rel="noopener"><i data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Soeren Kern</span></i></a><i data-dcnode-id="373"><span data-dcnode-id="374" instrument_node=""> is a Senior Fellow at the New York-based</span></i><span data-dcnode-id="372" instrument_node=""> </span><a data-dcnode-id="369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gatestoneinstitute.org/" rel="noopener"><i data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Gatestone Institute</span></i></a><i data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">.</span></i></p><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="358"><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//infoarmed.com/"><img alt="" class="alignnone size-full wp-image-10805" data-dcnode-id="364" height="47" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//infoarmed.com/wp-content/uploads/2021/12/End-Page-InfoArmed-1.jpg&amp;raw" width="52"></a><br data-dcnode-id="362"><span data-dcnode-id="361" instrument_node="">
</span><a data-dcnode-id="359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gatestoneinstitute.org/" rel="noopener"><span data-dcnode-id="360" instrument_node="">Source: Gatestone Institute</span></a></p><span data-dcnode-id="357" instrument_node="">
