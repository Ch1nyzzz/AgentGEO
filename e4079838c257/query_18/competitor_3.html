</span><header data-dcnode-id="3942"><span data-dcnode-id="3946" instrument_node="">
</span><h1 class="article-heading" data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">How politics influences consumers</span></h1><span data-dcnode-id="3943" instrument_node="">
</span></header><span data-dcnode-id="3941" instrument_node="">
</span><div class="post-container" data-dcnode-id="3688"><span data-dcnode-id="3940" instrument_node="">
</span><p class="post-info" data-dcnode-id="3930"><img alt="Posted on" data-dcnode-id="3939" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmoment.com/images/site/ico-clock.svg&amp;raw" width="13"><span data-dcnode-id="3938" instrument_node=""> &nbsp;</span><time data-dcnode-id="3936" datetime="2016-11-18"><span data-dcnode-id="3937" instrument_node="">18th November 2016</span></time><span data-dcnode-id="3935" instrument_node=""> &nbsp; </span><img alt="Category" data-dcnode-id="3934" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmoment.com/images/site/ico-category.svg&amp;raw" width="15"><span data-dcnode-id="3933" instrument_node=""> &nbsp;PR Research&nbsp; </span><img alt="Read time" data-dcnode-id="3932" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmoment.com/images/site/ico-readtime.svg&amp;raw" width="13"><span data-dcnode-id="3931" instrument_node=""> &nbsp;3 minute read</span></p><span data-dcnode-id="3929" instrument_node="">
</span><p data-dcnode-id="3924"><span data-dcnode-id="3928" instrument_node="">From the implications of Brexit to the election of Donald Trump, politics is having a massive effect on consumers and how they relate to brands. A report from marketing agency </span><a data-dcnode-id="3926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jwtintelligence.com/" target="_blank"><span data-dcnode-id="3927" instrument_node="">J. Walter Thompson’s Innovation Group</span></a><span data-dcnode-id="3925" instrument_node=""> called The Political Consumer, looks at the impact politics has on consumers.</span></p><span data-dcnode-id="3923" instrument_node="">
</span><p data-dcnode-id="3921"><span data-dcnode-id="3922" instrument_node="">Discussing why everyones seems to be so political these days, Shepherd Laughlin, director of trend forecasting at J Walter Thompson Worldwide, says this isn’t just because of recent events: “Political discussions have reached fever pitch this year, but when it comes to ongoing social movements such as feminism, racial politics, immigration and LGBT rights, debates were already becoming louder and more contentious even before the Brexit vote and the US election, and they’re likely to continue to do so. Even for brands, it’s becoming more difficult to avoid taking a stand – those that sit on the sidelines risk missing out on important conversations, or even alienating consumers who seek a better alignment with their values.</span></p><span data-dcnode-id="3920" instrument_node="">
</span><p data-dcnode-id="3917"><a data-dcnode-id="3918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.prmoment.com/images/cms/files/how-politics-influences-consumers.pdf"><img alt="" data-dcnode-id="3919" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.prmoment.com/images/cms/trump-impact.png&amp;raw" style="width: 600px; height: 434px;"></a></p><span data-dcnode-id="3916" instrument_node="">
</span><p data-dcnode-id="3911"><strong data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">The youth of today</span></strong><br data-dcnode-id="3913"><span data-dcnode-id="3912" instrument_node="">
The people most likely to buy differently for political reasons are younger consumers, Laughlin explains: “Younger generations appear to be much more aware of brands that have taken political stances, and more interested in buying brands that align with their values. More than half of US millennials, 51%, say they appreciate when a brand takes a political stance in its advertising, compared to 40% for the general population. Americans are also overwhelmingly supportive of brands that take stances on issues: 78% agree that companies should take action to address the important issues facing society, while 88% agree that corporations have the power to influence social change.”</span></p><span data-dcnode-id="3910" instrument_node="">
</span><p data-dcnode-id="3903"><strong data-dcnode-id="3908"><span data-dcnode-id="3909" instrument_node="">Political marketing</span></strong><strong data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">&nbsp;</span></strong><br data-dcnode-id="3905"><span data-dcnode-id="3904" instrument_node="">
So how should brands change their marketing strategies in this politicised climate? Laughlin says that there’s no one-size-fits-all strategy for brands in this environment, but there are particular tactics they can try. “Our study identified ‘kindness campaigns’ in which brands acknowledge partisan divisions, before shifting to a unifying message about shared values. ‘Movement brands’ align themselves directly with social movements, a strategy that risks alienating some consumers, but potentially forging a stronger bond with sympathetic ones. ‘Generation Z brands’ often partner with politically outspoken celebrities, whilst remaining silent on political issues themselves.”</span></p><span data-dcnode-id="3902" instrument_node="">
</span><p data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">Whatever the strategy, brands need to consider in advance how they will relate to politics in these divided times, before being pulled into a conversation and caught off guard. Laughline concludes: “PROs should consider whether keeping politics at arm’s length still makes sense in a world where polarised political outlooks increasingly shape psychographics and buying behaviours.”</span></p><span data-dcnode-id="3899" instrument_node="">
</span><p data-dcnode-id="3894"><strong data-dcnode-id="3897"><span data-dcnode-id="3898" instrument_node="">Methodology</span></strong><br data-dcnode-id="3896"><span data-dcnode-id="3895" instrument_node="">
Research for The Political Consumer combined qualitative and quantitative methods. Background trends from press reports and outside data sources were analysed, as well as examples of recent advertisements featuring political content, and a survey was conducted of US consumers using SONAR, J. Walter Thompson’s proprietary research unit. The survey examined attitudes toward politics, media, brands, and the relationships between all three, and was representative of the general US population, with a sample size of 1,001 consumers.</span></p><span data-dcnode-id="3893" instrument_node="">

</span><div class="window__info-podcast" data-dcnode-id="3197"><span data-dcnode-id="3198" instrument_node="">PRmoment Podcast</span></div><span data-dcnode-id="3196" instrument_node="">
</span><div class="window__info-episode" data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">A PR Q1 update with W founder and MD Warren Johnson </span></div><span data-dcnode-id="3193" instrument_node="">
</span><div class="window__info-details" data-dcnode-id="3188"><span data-dcnode-id="3192" instrument_node="">
</span><span data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">Apr 12, 2022</span></span><span data-dcnode-id="3189" instrument_node="">
</span></div><span data-dcnode-id="3187" instrument_node="">
</span><div class="window__info-artist" data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node="">Warren Johnson, W founder and MD </span></div><span data-dcnode-id="3184" instrument_node="">
</span><div class="window__info-description" data-dcnode-id="3097" dir="auto"><span data-dcnode-id="3183" instrument_node="">
</span><p data-dcnode-id="3178"><span data-dcnode-id="3182" instrument_node="">Welcome to the </span><a data-dcnode-id="3180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmoment.com/podcasts" target="_blank"><span data-dcnode-id="3181" instrument_node="">PRmoment Podcast</span></a><span data-dcnode-id="3179" instrument_node="">.</span></p><p data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">Time flies doesn't it. We’re well over a quarter of the way through 2022 - remember those plans and hopes we all had on Jan 1st? Well, it’s time for a progress report!</span></p><p data-dcnode-id="3174"><span data-dcnode-id="3175" instrument_node="">PR land seems to continue to be pretty frantic - it’s a hot market both in terms of the amount of work going through in house teams, agencies are as busy as ever and the pressure for talent intensifies.</span></p><p data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">That all seems kinda crazy bearing in mind the horrific scenes we see on our scenes from Putin’s war in Ukraine and the imminent cost of living crisis we’re about to witness in the UK.</span></p><p data-dcnode-id="3167"><span data-dcnode-id="3171" instrument_node="">So I thought it was time to catch up with a </span><a data-dcnode-id="3169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wcommunications.co.uk/" target="_blank"><span data-dcnode-id="3170" instrument_node="">W’</span></a><span data-dcnode-id="3168" instrument_node="">s Warren Johnson for PR’s Q1 Report!</span></p><p data-dcnode-id="3162"><span data-dcnode-id="3166" instrument_node="">Before that - just to let you know tickets are genuinely flying for the </span><a data-dcnode-id="3164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmomentawards.com/" target="_blank"><span data-dcnode-id="3165" instrument_node="">PRmoment Awards</span></a><span data-dcnode-id="3163" instrument_node=""> in London on April 28th. I've no doubt the London Awards is going to be our biggest ever event and an absolute who’s who of the UK PR scene - so make sure you get your ticket.</span></p><p data-dcnode-id="3155"><span data-dcnode-id="3161" instrument_node="">Also, thanks to our PRmoment Podcast sponsors, </span><a data-dcnode-id="3159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prca.org.uk/" target="_blank"><span data-dcnode-id="3160" instrument_node="">The PRCA.</span></a><br data-dcnode-id="3158"><br data-dcnode-id="3157"><span data-dcnode-id="3156" instrument_node="">Here is a summary of what Warren and I discussed:</span></p><p data-dcnode-id="3151"><b data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">2 mins </span></b><span data-dcnode-id="3152" instrument_node="">How are you seeing the PR market now that Q1 2022 is done and dusted?</span></p><p data-dcnode-id="3147"><b data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">2.30 mins “</span></b><span data-dcnode-id="3148" instrument_node="">The resourcing game has got expermentally harder!”</span></p><p data-dcnode-id="3140"><b data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">4 mins</span></b><span data-dcnode-id="3144" instrument_node=""> </span><b data-dcnode-id="3141"><em data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">“In terms of the overall marketing mix, PR still offers phenomenal bang for buck”</span></em></b></p><p data-dcnode-id="3134"><b data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">4.30 mins</span></b><span data-dcnode-id="3137" instrument_node=""> Warren updates us on W’s purchase of travel communications specialist </span><a data-dcnode-id="3135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wearelotus.co.uk/" target="_blank"><span data-dcnode-id="3136" instrument_node="">Lotus Communications.</span></a></p><p data-dcnode-id="3130"><b data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">5.30 mins </span></b><span data-dcnode-id="3131" instrument_node="">The headcount of W in London is over 100, with revenues of over £10m and 20% growth.</span></p><p data-dcnode-id="3126"><b data-dcnode-id="3128"><span data-dcnode-id="3129" instrument_node="">6.30 mins</span></b><span data-dcnode-id="3127" instrument_node=""> The PR industry is yet to understand how to run a business in a high inflationary market.</span></p><p data-dcnode-id="3122"><b data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">7 mins </span></b><span data-dcnode-id="3123" instrument_node="">Warren talks about the importance of a return to growth of live events and hospitality for PR.</span></p><p data-dcnode-id="3118"><b data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">9 mins </span></b><span data-dcnode-id="3119" instrument_node="">Warren outlines the implications of Rish Sunak’s change to entrepreneurs' tax law for PR entrepreneurs looking to sell their business.</span></p><p data-dcnode-id="3114"><b data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">10 mins </span></b><span data-dcnode-id="3115" instrument_node="">How is W defining the metaverse and what is the metaverse opportunity for PR firms?</span></p><p data-dcnode-id="3110"><b data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">14 mins</span></b><span data-dcnode-id="3111" instrument_node=""> Is the metaverse just another channel?</span></p><p data-dcnode-id="3103"><b data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">16 mins</span></b><span data-dcnode-id="3107" instrument_node=""> </span><b data-dcnode-id="3104"><em data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">“Once the new generation of hardware launches, and is adopted, we’ll see scale.”</span></em></b></p><p data-dcnode-id="3099"><b data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">17 mins </span></b><span data-dcnode-id="3100" instrument_node="">What does a PR agency's metaverse strategy need to look like?</span></p><span data-dcnode-id="3098" instrument_node="">
</span></div><span data-dcnode-id="3096" instrument_node="">

</span><div class="window__info-artist" data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">Andrew Bloch, co-founder at Frank PR</span></div><span data-dcnode-id="2894" instrument_node="">
</span><div class="window__info-description" data-dcnode-id="2823" dir="auto"><span data-dcnode-id="2893" instrument_node="">
</span><p data-dcnode-id="2885"><span data-dcnode-id="2892" instrument_node="">Welcome to the </span><a data-dcnode-id="2890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmoment.com/podcasts" target="_blank"><span data-dcnode-id="2891" instrument_node="">PRmoment Podcast</span></a><span data-dcnode-id="2889" instrument_node="">.</span><br data-dcnode-id="2888"><br data-dcnode-id="2887"><span data-dcnode-id="2886" instrument_node="">This is a quick bonus pod - we’re chatting to Andrew Bloch about PR Pitches and merger &amp; acquisition trends in the UK PR scene.</span></p><p data-dcnode-id="2877"><span data-dcnode-id="2884" instrument_node="">&nbsp;Andrew is a co-founder and Non Executive Director at Frank PR and is now Head of PR at the new business consultancy firm </span><a data-dcnode-id="2882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aargroup.co.uk/about-us/andrew-bloch/" target="_blank"><span data-dcnode-id="2883" instrument_node="">AAR</span></a><span data-dcnode-id="2881" instrument_node="">. He is also a partner at </span><a data-dcnode-id="2879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pcbpartners.co.uk/" target="_blank"><span data-dcnode-id="2880" instrument_node="">PCB Partners</span></a><span data-dcnode-id="2878" instrument_node=""> where he advises on buying and selling marketing services agencies.&nbsp;</span></p><p data-dcnode-id="2872"><span data-dcnode-id="2876" instrument_node="">The shortlist for </span><a data-dcnode-id="2874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmomentawards.com/" target="_blank"><span data-dcnode-id="2875" instrument_node="">The PRmoment Awards </span></a><span data-dcnode-id="2873" instrument_node="">is now out, so do get your tickets for the awards nights, all the details are on the homepage of the PRmoment Awards microsite</span></p><p data-dcnode-id="2865"><span data-dcnode-id="2871" instrument_node="">Finally, thanks to our PRmoment Podcast sponsors, </span><a data-dcnode-id="2869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prca.org.uk/" target="_blank"><span data-dcnode-id="2870" instrument_node="">The PRCA.</span></a><br data-dcnode-id="2868"><br data-dcnode-id="2867"><span data-dcnode-id="2866" instrument_node="">Here’s a summary of what Andrew and PRmoment founder Ben Smith discuss:</span></p><p data-dcnode-id="2861"><b data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">1 min</span></b><span data-dcnode-id="2862" instrument_node=""> What are the biggest and the most significant pitches you've seen over the last few months?</span></p><p data-dcnode-id="2857"><b data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">4 mins </span></b><span data-dcnode-id="2858" instrument_node="">How many agencies should be involved with a pitch?</span></p><p data-dcnode-id="2853"><b data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">5 mins</span></b><span data-dcnode-id="2854" instrument_node=""> A discussion of Next Fifteen’s acquisition of Engine MHP Mischief</span></p><p data-dcnode-id="2846"><b data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">7 mins</span></b><span data-dcnode-id="2850" instrument_node=""> “</span><b data-dcnode-id="2847"><em data-dcnode-id="2848"><span data-dcnode-id="2849" instrument_node="">The M&amp;A market is as busy as it’s ever been - it’s extremely buoyant”</span></em></b></p><p data-dcnode-id="2842"><b data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">9 mins</span></b><span data-dcnode-id="2843" instrument_node=""> Who’s buying and who’s selling?</span></p><p data-dcnode-id="2838"><b data-dcnode-id="2839"><em data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">“Private equity has been prolific in (PR) acquisitions”12 mins”</span></em></b></p><p data-dcnode-id="2834"><b data-dcnode-id="2835"><em data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">12 mins “Some of the valuations are eyewatering”</span></em></b></p><p data-dcnode-id="2829"><b data-dcnode-id="2831"><em data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">14 mins </span></em></b><span data-dcnode-id="2830" instrument_node="">What ratio of profit are PR firms currently selling for?</span></p><p data-dcnode-id="2825"><b data-dcnode-id="2826"><em data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">“There are buyers for everything”</span></em></b></p><span data-dcnode-id="2824" instrument_node="">

</span><div class="window__info-artist" data-dcnode-id="2621"><span data-dcnode-id="2622" instrument_node="">Lara Gould, founder of Goldbug Communications </span></div><span data-dcnode-id="2620" instrument_node="">
</span><div class="window__info-description" data-dcnode-id="2547" dir="auto"><span data-dcnode-id="2619" instrument_node="">
</span><p data-dcnode-id="2614"><span data-dcnode-id="2618" instrument_node="">Welcome to the </span><a data-dcnode-id="2616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmoment.com/podcasts" target="_blank"><span data-dcnode-id="2617" instrument_node="">PRmoment Podcast</span></a><span data-dcnode-id="2615" instrument_node="">.</span></p><p data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">This week we’re chatting to Lara Gould about whether journalists make good PR people.&nbsp;</span></p><p data-dcnode-id="2607"><span data-dcnode-id="2611" instrument_node="">Lara used to work at The Mail On Sunday and the Sunday Mirror. In 2014 she left journalism for PR and set up </span><a data-dcnode-id="2609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goldbug.agency/" target="_blank"><span data-dcnode-id="2610" instrument_node="">Goldbug Communications</span></a><span data-dcnode-id="2608" instrument_node=""> in 2016.</span></p><p data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">For those of you that don’t know, Goldbug is a brand communication consultancy with revenue of £2.7 million.</span></p><p data-dcnode-id="2600"><span data-dcnode-id="2604" instrument_node="">The shortlist for </span><a data-dcnode-id="2602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmomentawards.com/" target="_blank"><span data-dcnode-id="2603" instrument_node="">The PRmoment Awards </span></a><span data-dcnode-id="2601" instrument_node="">is now out, so do get your tickets for the awards nights, all the details are on the homepage of the PRmoment Awards microsite.</span></p><p data-dcnode-id="2594"><span data-dcnode-id="2599" instrument_node="">Do take a look at </span><a data-dcnode-id="2596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patreon.com/prmoment%3Ffan_landing%3Dtrue" target="_blank"><b data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">PRmoment’s Patron Scheme</span></b></a><span data-dcnode-id="2595" instrument_node="">. We have three different Patron Tiers—The Daney Parker Tier, The Chadlington Tier and Edward Bernays Tier.</span></p><p data-dcnode-id="2590"><span data-dcnode-id="2593" instrument_node="">Finally, thanks to our PRmoment Podcast sponsors, </span><a data-dcnode-id="2591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prca.org.uk/" target="_blank"><span data-dcnode-id="2592" instrument_node="">The PRCA.</span></a></p><p data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">Here’s a summary of what Lara and PRmoment founder Ben Smith talked about:</span></p><p data-dcnode-id="2584"><b data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">2 mins</span></b><span data-dcnode-id="2585" instrument_node=""> Why did Sara leave journalism to work in PR?</span></p><p data-dcnode-id="2580"><b data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node="">4 mins </span></b><span data-dcnode-id="2581" instrument_node="">There seems to be quite a bit of resentment in the PR sector when a top journo makes the move and gets a top PR/comms job. Is that resentment is fair?</span></p><p data-dcnode-id="2576"><b data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">6 mins </span></b><span data-dcnode-id="2577" instrument_node="">Why would a journalist understand how to manage a brand's reputation?</span></p><p data-dcnode-id="2572"><b data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">12 mins </span></b><span data-dcnode-id="2573" instrument_node="">Should all PR teams have an ex-journalist in them?</span></p><p data-dcnode-id="2565"><b data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">13 mins</span></b><span data-dcnode-id="2569" instrument_node=""> Why Lara believes</span><b data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node=""> </span></b><span data-dcnode-id="2566" instrument_node="">a journalist's skills for pubic relations need not be focused on the media relations channel, they should be insight related.</span></p><p data-dcnode-id="2561"><b data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">14 mins and 18 mins</span></b><span data-dcnode-id="2562" instrument_node=""> What mistakes do journalists who make the move from journalism to PR make?</span></p><p data-dcnode-id="2557"><b data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">15 mins</span></b><span data-dcnode-id="2558" instrument_node=""> Ex journos often get lots of coverage for their clients when they make the move into PR - but do they get the right sort of coverage?</span></p><p data-dcnode-id="2553"><b data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">21 mins </span></b><span data-dcnode-id="2554" instrument_node="">Lara talks about the challenges she faced as an ex-journalist launching a PR business</span></p><p data-dcnode-id="2549"><b data-dcnode-id="2550"><em data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">“I had to learn the career at the same time as learning to run a business”</span></em></b></p><span data-dcnode-id="2548" instrument_node="">

</span><div class="window__info-artist" data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">Kat McGettigan, founder of Fine Lines</span></div><span data-dcnode-id="2344" instrument_node="">
</span><div class="window__info-description" data-dcnode-id="2197" dir="auto"><span data-dcnode-id="2343" instrument_node="">
</span><p data-dcnode-id="2338"><span data-dcnode-id="2342" instrument_node="">Welcome to the </span><a data-dcnode-id="2340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmoment.com/podcasts" target="_blank"><span data-dcnode-id="2341" instrument_node="">PRmoment Podcast</span></a><span data-dcnode-id="2339" instrument_node="">.</span></p><p data-dcnode-id="2333"><span data-dcnode-id="2337" instrument_node="">This week we’re chatting to Kat McGettigan, founder of </span><a data-dcnode-id="2335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//finelines.london/about-kat" target="_blank"><span data-dcnode-id="2336" instrument_node="">Fine Lines</span></a><span data-dcnode-id="2334" instrument_node="">.</span></p><p data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Kat describes Fine Lines as an “agency-growth agency.” Previously she worked at Grayling, M&amp;C Saatchi and Weber Shandwick.</span></p><p data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">On the show, we talk about how agencies can improve their pitch techniques but we’re also going to take a step back and look at the broader area of growth strategies for PR firms.</span></p><p data-dcnode-id="2324"><span data-dcnode-id="2328" instrument_node="">The shortlist for </span><a data-dcnode-id="2326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmomentawards.com/" target="_blank"><span data-dcnode-id="2327" instrument_node="">The PRmoment Awards </span></a><span data-dcnode-id="2325" instrument_node="">is now out, so do get your tickets for the awards nights, all the details are on the homepage of the PRmoment Awards microsite.</span></p><p data-dcnode-id="2318"><span data-dcnode-id="2323" instrument_node="">Do take a look at </span><a data-dcnode-id="2320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patreon.com/prmoment%3Ffan_landing%3Dtrue" target="_blank"><b data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">PRmoment’s Patron Scheme</span></b></a><span data-dcnode-id="2319" instrument_node="">. We have three different Patron Tiers—The Daney Parker Tier, The Chadlington Tier and Edward Bernays Tier.</span></p><p data-dcnode-id="2314"><span data-dcnode-id="2317" instrument_node="">Finally, thanks to our PRmoment Podcast sponsors, </span><a data-dcnode-id="2315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prca.org.uk/" target="_blank"><span data-dcnode-id="2316" instrument_node="">The PRCA.</span></a></p><p data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">Here’s a summary of what Kat and PRmoment founder Ben Smith discussed:</span></p><p data-dcnode-id="2308"><b data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">2 mins</span></b><span data-dcnode-id="2309" instrument_node=""> How can a PR agency set itself up to grow?&nbsp;</span></p><p data-dcnode-id="2304"><b data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">5 mins </span></b><span data-dcnode-id="2305" instrument_node="">What are the key elements of a successful pitch from an agency's perspective?</span></p><p data-dcnode-id="2300"><b data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">7 mins</span></b><span data-dcnode-id="2301" instrument_node=""> What is a good win rate for agencies when pitching?</span></p><p data-dcnode-id="2296"><b data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">7.30 mins </span></b><span data-dcnode-id="2297" instrument_node="">When should an agency go for a pitch out of its comfort zone?</span></p><p data-dcnode-id="2292"><b data-dcnode-id="2293"><em data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">“Two or three people should own the pitch…and mustn’t pass the batten.”</span></em></b></p><p data-dcnode-id="2288"><b data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">9 mins </span></b><span data-dcnode-id="2289" instrument_node="">When can a transformational pitch win enable an agency to invest in its team and its skills?</span></p><p data-dcnode-id="2282"><b data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">10 mins </span></b><b data-dcnode-id="2283"><em data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">“Pitching is like dating”</span></em></b></p><p data-dcnode-id="2278"><b data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">11 mins</span></b><span data-dcnode-id="2279" instrument_node=""> How to create that winnable chemistry with a potential client</span></p><p data-dcnode-id="2272"><b data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">13.30 mins </span></b><b data-dcnode-id="2273"><em data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">“If you don’t know anyone on the buy-side you are very unlikely to win it.”</span></em></b></p><p data-dcnode-id="2268"><b data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">16 mins</span></b><span data-dcnode-id="2269" instrument_node=""> What’s the difference between a tissue and a chemistry session?</span></p><p data-dcnode-id="2264"><b data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">17.30 mins</span></b><span data-dcnode-id="2265" instrument_node=""> “We’ve all become too subservient”</span></p><p data-dcnode-id="2260"><b data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">19 mins</span></b><span data-dcnode-id="2261" instrument_node=""> How to prep for the pitch?</span></p><p data-dcnode-id="2256"><b data-dcnode-id="2257"><em data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">“We’ve all got too beholden to decks!”</span></em></b></p><p data-dcnode-id="2251"><b data-dcnode-id="2253"><em data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">20 mins </span></em></b><span data-dcnode-id="2252" instrument_node="">Why you must not create a frankendeck</span></p><p data-dcnode-id="2246"><b data-dcnode-id="2248"><em data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">20.30 mins</span></em></b><span data-dcnode-id="2247" instrument_node=""> What is the role of a pitch doctor?</span></p><p data-dcnode-id="2242"><b data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">21 mins</span></b><span data-dcnode-id="2243" instrument_node=""> How many pitch rehearsals should you have?</span></p><p data-dcnode-id="2238"><b data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">26 mins </span></b><span data-dcnode-id="2239" instrument_node="">Why you should always try and have the pitch at the agency’s office.</span></p><p data-dcnode-id="2232"><b data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">29 mins </span></b><b data-dcnode-id="2233"><em data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">“It blows my mind that so much effort is put into producing all these pitch ideas that are hardly ever used”</span></em></b></p><p data-dcnode-id="2228"><b data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">34 mins</span></b><span data-dcnode-id="2229" instrument_node=""> How reliable is a pitch process in finding a client: agency match? Are there better ways?</span></p><p data-dcnode-id="2224"><b data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">38 mins</span></b><span data-dcnode-id="2225" instrument_node=""> Currently, what percentage of pitches are face-to-face compared to virtual?</span></p><p data-dcnode-id="2220"><b data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">39 mins</span></b><span data-dcnode-id="2221" instrument_node=""> Why is a hybrid pitch the hardest of the lot!</span></p><p data-dcnode-id="2216"><b data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">40 mins </span></b><span data-dcnode-id="2217" instrument_node="">Let’s talk about procurement! Is this where a lot of smaller and medium-sized agencies start to struggle?&nbsp;</span></p><p data-dcnode-id="2212"><b data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">42 mins</span></b><span data-dcnode-id="2213" instrument_node=""> Kat’s guide to dealing with procurement!</span></p><p data-dcnode-id="2208"><b data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">49 mins </span></b><span data-dcnode-id="2209" instrument_node="">Will paid-for pitches ever be common in PR?</span></p><p data-dcnode-id="2203"><span data-dcnode-id="2207" instrument_node=""> </span><b data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">52 mins</span></b><span data-dcnode-id="2204" instrument_node=""> Kat’s red flags for agencies of when to walk away from a pitch?</span></p><p data-dcnode-id="2199"><b data-dcnode-id="2200"><em data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">“It does pay to be a nice person to work for!”</span></em></b></p><span data-dcnode-id="2198" instrument_node="">

</span><div class="window__info-description" data-dcnode-id="1914" dir="auto"><span data-dcnode-id="1993" instrument_node="">
</span><p data-dcnode-id="1988"><span data-dcnode-id="1992" instrument_node="">Welcome to the </span><a data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmoment.com/podcasts" target="_blank"><span data-dcnode-id="1991" instrument_node="">PRmoment Podcast</span></a><span data-dcnode-id="1989" instrument_node="">.</span></p><p data-dcnode-id="1980"><span data-dcnode-id="1987" instrument_node="">This week we’re chatting to Anna Geffert, founder of </span><a data-dcnode-id="1985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heracomms.com/" target="_blank"><span data-dcnode-id="1986" instrument_node="">Hera Communications</span></a><span data-dcnode-id="1984" instrument_node="">. Anna is the current President of</span><a data-dcnode-id="1982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//womeninpr.org.uk/" target="_blank"><span data-dcnode-id="1983" instrument_node=""> Women in PR</span></a><span data-dcnode-id="1981" instrument_node=""> and we’re talking to her today about the 60th Anniversary of Women in PR.</span></p><p data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">The organisation was founded in 1962 and on the show today we’re going to discuss how it started and how it’s changed over the last 60 years.</span></p><p data-dcnode-id="1973"><span data-dcnode-id="1977" instrument_node="">As you’ve probably seen, the shortlist for </span><a data-dcnode-id="1975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmomentawards.com/" target="_blank"><span data-dcnode-id="1976" instrument_node="">The PRmoment Awards </span></a><span data-dcnode-id="1974" instrument_node="">is now out, so do get your tickets for the awards nights, all the details are on the homepage of the PRmoment Awards microsite.</span></p><p data-dcnode-id="1967"><span data-dcnode-id="1972" instrument_node="">Do take a look at </span><a data-dcnode-id="1969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patreon.com/prmoment%3Ffan_landing%3Dtrue" target="_blank"><b data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">PRmoment’s Patron Scheme</span></b></a><span data-dcnode-id="1968" instrument_node="">. We have three different Patron Tiers—The Daney Parker Tier, The Chadlington Tier and Edward Bernays Tier.</span></p><p data-dcnode-id="1960"><span data-dcnode-id="1966" instrument_node="">Finally, thanks to our PRmoment Podcast sponsors, </span><a data-dcnode-id="1964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prca.org.uk/" target="_blank"><span data-dcnode-id="1965" instrument_node="">The PRCA.</span></a><br data-dcnode-id="1963"><br data-dcnode-id="1962"><span data-dcnode-id="1961" instrument_node="">Here’s a flavour of what Anna and PRmoment founder Ben Smith talked about:</span></p><p data-dcnode-id="1946"><b data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">1.30 mins </span></b><span data-dcnode-id="1957" instrument_node="">Anna talks us through when was WIPR formed, by who and why.</span><br data-dcnode-id="1956"><br data-dcnode-id="1955"><b data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">4 mins </span></b><span data-dcnode-id="1952" instrument_node="">How have the objectives of Women in PR changed over the last 60 years?</span><br data-dcnode-id="1951"><br data-dcnode-id="1950"><b data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">6 mins</span></b><span data-dcnode-id="1947" instrument_node=""> What progress has been made to increase the number of women in senior positions in public relations?</span></p><p data-dcnode-id="1942"><b data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">10 mins</span></b><span data-dcnode-id="1943" instrument_node=""> We test Anna’s knowledge: with a timeline of the history of Women in PR.</span></p><p data-dcnode-id="1938"><b data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">11.30 min</span></b><span data-dcnode-id="1939" instrument_node=""> Why Sue Hardwick and Angela Oakes had to save the WIPR as an organisation in 2012.</span></p><p data-dcnode-id="1934"><b data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">14 mins </span></b><span data-dcnode-id="1935" instrument_node="">Anna tells us why she volunteers her time to lead Women in PR</span></p><p data-dcnode-id="1930"><b data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">22 mins </span></b><span data-dcnode-id="1931" instrument_node="">The trend of women-led PR start-ups during lockdown</span></p><p data-dcnode-id="1916"><b data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">24.30 mins</span></b><span data-dcnode-id="1927" instrument_node=""> When the past presidents get together to compare notes - what are the themes and challenges that have come, gone and remained over the generations?</span><br data-dcnode-id="1926"><br data-dcnode-id="1925"><b data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">28 mins</span></b><span data-dcnode-id="1922" instrument_node=""> Women in PR only has 260 members in the UK, why is that?</span><br data-dcnode-id="1921"><br data-dcnode-id="1920"><b data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">29.30 mins</span></b><span data-dcnode-id="1917" instrument_node=""> What are the challenges for younger women working in PR at the moment?</span></p><span data-dcnode-id="1915" instrument_node="">

</span><div class="window__info-artist" data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Louise Turner, managing director at Edelman Data &amp; Intelligence</span></div><span data-dcnode-id="1711" instrument_node="">
</span><div class="window__info-description" data-dcnode-id="1631" dir="auto"><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1705"><span data-dcnode-id="1709" instrument_node="">Welcome to the </span><a data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmoment.com/podcasts" target="_blank"><span data-dcnode-id="1708" instrument_node="">PRmoment Podcast</span></a><span data-dcnode-id="1706" instrument_node="">.</span></p><p data-dcnode-id="1700"><span data-dcnode-id="1704" instrument_node="">This week we’re talking to Louise Turner, managing director at Edelman Data &amp; Intelligence, about the </span><a data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edelman.co.uk/2022-edelman-uk-trust-barometer" target="_blank"><span data-dcnode-id="1703" instrument_node="">UK results of The Edelman Trust Barometer 2022</span></a><span data-dcnode-id="1701" instrument_node="">.</span></p><p data-dcnode-id="1695"><span data-dcnode-id="1699" instrument_node="">Before we start just to say tickets for the </span><a data-dcnode-id="1697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmomentawards.com/" target="_blank"><span data-dcnode-id="1698" instrument_node="">PRmoment Awards</span></a><span data-dcnode-id="1696" instrument_node=""> have now gone on sale.&nbsp;</span></p><p data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">They will be the first PRmoment face-to-face awards since 2019!&nbsp;</span></p><p data-dcnode-id="1656"><span data-dcnode-id="1692" instrument_node="">Thanks to our PRmoment Podcast sponsors, </span><a data-dcnode-id="1690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prca.org.uk/" target="_blank"><span data-dcnode-id="1691" instrument_node="">The PRCA.</span></a><br data-dcnode-id="1689"><br data-dcnode-id="1688"><span data-dcnode-id="1687" instrument_node="">Here’s a summary of what Louise and I chatted about:</span><b data-dcnode-id="1683"><br data-dcnode-id="1686"><br data-dcnode-id="1685"><span data-dcnode-id="1684" instrument_node="">3 min</span></b><span data-dcnode-id="1682" instrument_node=""> What are the top trends coming out of the UK results of the Edelman Trust Barometer this year?</span><b data-dcnode-id="1678"><br data-dcnode-id="1681"><br data-dcnode-id="1680"><span data-dcnode-id="1679" instrument_node="">4 mins</span></b><span data-dcnode-id="1677" instrument_node=""> Why the UK now has a record trust gap between high and low-income groups.</span><b data-dcnode-id="1673"><br data-dcnode-id="1676"><br data-dcnode-id="1675"><span data-dcnode-id="1674" instrument_node="">5 mins </span></b><span data-dcnode-id="1672" instrument_node="">The impact of Partygate: Louise talks us through the differences in the trust in the UK Government from Nov 2021 to Jan 2022 results.</span><b data-dcnode-id="1668"><br data-dcnode-id="1671"><br data-dcnode-id="1670"><span data-dcnode-id="1669" instrument_node="">6 mins </span></b><span data-dcnode-id="1667" instrument_node="">In November 2021, the UK Government had a trust score of 42%. In January this dropped to 29%—the lowest score for the UK Government in a decade.</span><b data-dcnode-id="1663"><br data-dcnode-id="1666"><br data-dcnode-id="1665"><span data-dcnode-id="1664" instrument_node="">7 mins</span></b><span data-dcnode-id="1662" instrument_node=""> Louise explains how The Trust Barometer has picked up growing consumer cynicism around purpose and greenwashing this year.</span><b data-dcnode-id="1658"><br data-dcnode-id="1661"><br data-dcnode-id="1660"><span data-dcnode-id="1659" instrument_node="">10 mins</span></b><span data-dcnode-id="1657" instrument_node=""> Louise talks us through the 2022 and 2021 year on year trust scores for the Government, employers, the media, business and NGOs.</span></p><p data-dcnode-id="1652"><b data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">17 mins</span></b><span data-dcnode-id="1653" instrument_node=""> Louise talks through the trend of trust increasing the more local, or the more personal the institution.&nbsp;</span></p><p data-dcnode-id="1645"><b data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">18 mins</span></b><span data-dcnode-id="1649" instrument_node=""> Why is ‘</span><em data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">your employer’</span></em><span data-dcnode-id="1646" instrument_node=""> by miles the most trusted institution?</span></p><p data-dcnode-id="1641"><b data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">19 mins</span></b><span data-dcnode-id="1642" instrument_node=""> What are the 2021 and the 2022 trust scores for the different media channels?</span></p><p data-dcnode-id="1637"><b data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">22 mins </span></b><span data-dcnode-id="1638" instrument_node="">Traditional media, including broadcast and online, has had a very good year, trust wise. In that sense, it won the trust league this year?</span></p><p data-dcnode-id="1633"><b data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">26 mins</span></b><span data-dcnode-id="1634" instrument_node=""> What’s a good trust score and what’s a bad trust score? (A score of below 50% is mistrusted and a score of over 50% is trusted.)</span></p><span data-dcnode-id="1632" instrument_node="">

</span><span data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Feb 21, 2022</span></span><span data-dcnode-id="1433" instrument_node="">

</span><div class="window__info-artist" data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Will Sturgeon, head of content and thought leadership at PwC</span></div><span data-dcnode-id="1428" instrument_node="">
</span><div class="window__info-description" data-dcnode-id="1327" dir="auto"><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1422"><span data-dcnode-id="1426" instrument_node="">Welcome to the </span><a data-dcnode-id="1424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmoment.com/podcasts" target="_blank"><span data-dcnode-id="1425" instrument_node="">PRmoment Podcast</span></a><span data-dcnode-id="1423" instrument_node="">.</span></p><p data-dcnode-id="1418"><span data-dcnode-id="1421" instrument_node="">This week we’re chatting to Will Sturgeon, head of content and thought leadership at </span><a data-dcnode-id="1419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pwc.co.uk/ceo-survey.html" target="_blank"><span data-dcnode-id="1420" instrument_node="">PwC UK about its CEO Report.</span></a></p><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">PwC’s 25th Annual CEO Report reveals a growing trend towards more purposeful business practices, including a greater focus on trust, transparency and personal accountability from CEOs on issues such as climate change and inequality.&nbsp;</span></p><p data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">These are all issues where the contribution of the PR and communications team should be critical, so we invited Will on the show to talk us through the key issues from this report from a PR and comms perspective.</span></p><p data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">The UK data of PwC’s 25 Annual CEO Report is based on a survey of 177 UK CEOs conducted 6 October - 12 November 2021.</span></p><p data-dcnode-id="1404"><span data-dcnode-id="1411" instrument_node="">Before we start just a reminder, if you haven’t got your ticket already, do check out PRmoment’s next webinar on </span><a data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmoment.com/event/pr-analytics-2022" target="_blank"><span data-dcnode-id="1410" instrument_node="">PR Analytics</span></a><span data-dcnode-id="1408" instrument_node="">. We’ve got </span><em data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">the </span></em><span data-dcnode-id="1405" instrument_node="">top experts on to talk you through the key issues of the intersection of PR and data. Tickets are only £45 + vat, it’s a great format where you’ll get useful information and insight in a non-patronising tone!</span></p><p data-dcnode-id="1399"><span data-dcnode-id="1403" instrument_node="">Thanks to a couple of new</span><a data-dcnode-id="1401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patreon.com/prmoment%3Ffan_landing%3Dtrue" target="_blank"><span data-dcnode-id="1402" instrument_node=""> PRmoment Patrons.</span></a><span data-dcnode-id="1400" instrument_node=""> First up Nigel Sarbutts from the PR Cavalry who’s joined as a Daney Parker Tier Patron and thanks also to Darryl Sparrey from Hard Numbers who is signed up as an Edward Bernays Tier Patron.</span></p><p data-dcnode-id="1392"><span data-dcnode-id="1398" instrument_node="">Thanks to our PRmoment Podcast sponsors, </span><a data-dcnode-id="1396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prca.org.uk/" target="_blank"><span data-dcnode-id="1397" instrument_node="">The PRCA.</span></a><br data-dcnode-id="1395"><br data-dcnode-id="1394"><span data-dcnode-id="1393" instrument_node="">Here’s a summary of what Will and PRmoment founder Ben Smith discussed on the show:</span></p><p data-dcnode-id="1388"><b data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">3 mins</span></b><span data-dcnode-id="1389" instrument_node=""> What are the top CEO concerns at the moment, according to the report?</span></p><p data-dcnode-id="1381"><b data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">4 mins</span></b><span data-dcnode-id="1385" instrument_node=""> “</span><b data-dcnode-id="1382"><em data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">CEOs are very concerned about any issues that are going to limit their ability to hire. ”</span></em></b></p><p data-dcnode-id="1374"><b data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">4.30 mins</span></b><span data-dcnode-id="1378" instrument_node=""> </span><b data-dcnode-id="1375"><em data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">“There’s a greater commitment to purpose and conversations about ESG because they (CEOs) recognise that’s important when they go to the market and compete for talent.”</span></em></b></p><p data-dcnode-id="1370"><b data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">8 mins </span></b><span data-dcnode-id="1371" instrument_node="">CEOs are pretty confident about future economic growth, both in the UK and globally.</span></p><p data-dcnode-id="1366"><b data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">11.30 mins </span></b><span data-dcnode-id="1367" instrument_node="">What do CEOs want from their PR and comms teams?</span></p><p data-dcnode-id="1360"><b data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">12 mins </span></b><b data-dcnode-id="1361"><em data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">“Comms professionals need to be more demanding of the brands they work for.”</span></em></b></p><p data-dcnode-id="1356"><b data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">13.30 mins</span></b><span data-dcnode-id="1357" instrument_node=""> Why talking about something publicly is a key part of accountability for businesses.</span></p><p data-dcnode-id="1352"><b data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">15 mins</span></b><span data-dcnode-id="1353" instrument_node=""> CEOs are very aware of the need for authenticity—there was an anti-greenwashing theme throughout the interviews in the report.</span></p><p data-dcnode-id="1348"><b data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">16.30 mins</span></b><span data-dcnode-id="1349" instrument_node=""> How successful have CEOs been in building trust with their stakeholders in the last few years?</span></p><p data-dcnode-id="1344"><b data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">20 mins</span></b><span data-dcnode-id="1345" instrument_node=""> How has the role of the CEO changed?</span></p><p data-dcnode-id="1337"><b data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">24 mins</span></b><span data-dcnode-id="1341" instrument_node=""> </span><b data-dcnode-id="1338"><em data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">“Purpose used to be an area of differentiation…it’s now moving to an area of expectation.”&nbsp;</span></em></b></p><p data-dcnode-id="1333"><b data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">25 mins</span></b><span data-dcnode-id="1334" instrument_node=""> Are the trends around CEOs prioritising purpose and ESG global?&nbsp;</span></p><p data-dcnode-id="1329"><b data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">26.30 mins</span></b><span data-dcnode-id="1330" instrument_node=""> Are we likely to see a different type of CEO in the future?</span></p><span data-dcnode-id="1328" instrument_node="">

</span><div class="window__info-artist" data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Marcus Gault, managing director UK and Ireland of Onclusive</span></div><span data-dcnode-id="1124" instrument_node="">
</span><div class="window__info-description" data-dcnode-id="1026" dir="auto"><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1122" instrument_node="">Welcome to the </span><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmoment.com/podcasts" target="_blank"><span data-dcnode-id="1121" instrument_node="">PRmoment Podcast</span></a><span data-dcnode-id="1119" instrument_node="">.</span></p><p data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">This week we’re chatting to Marcus Gault, managing director UK and Ireland of Onclusive.</span></p><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Dare I say many of you may not be aware but Onclusive is the new name for the Reputation Intelligence division of Kantar that was recently acquired by Symphony Technology Group.</span></p><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Onclusive has over 9,000 clients, across 130 markets and over 1,100 employees. So it’s a big beast in the PR measurement and evaluation game.</span></p><p data-dcnode-id="1100"><span data-dcnode-id="1111" instrument_node="">Before we start, just to tell you about </span><a data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patreon.com/prmoment%3Ffan_landing%3Dtrue" target="_blank"><b data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">PRmoment’s new Patron Scheme</span></b></a><span data-dcnode-id="1107" instrument_node="">. If you are a regular consumer of our content, including this </span><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmoment.com/podcasts" target="_blank"><span data-dcnode-id="1106" instrument_node="">podcast</span></a><span data-dcnode-id="1104" instrument_node="">, and you’re getting value from it, if you fancy making a contribution to help fund </span><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmoment.com/" target="_blank"><span data-dcnode-id="1103" instrument_node="">PRmoment</span></a><span data-dcnode-id="1101" instrument_node="">, now you can.</span></p><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">We have three different Patron Tiers—The Daney Parker Tier, The Chadlington Tier and Edward Bernays Tier.</span></p><p data-dcnode-id="1094"><span data-dcnode-id="1097" instrument_node="">Also, thanks to our PRmoment Podcast sponsors, </span><a data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prca.org.uk/" target="_blank"><span data-dcnode-id="1096" instrument_node="">The PRCA.</span></a></p><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Here’s a summary of what Marcus and PRoment founder Ben Smith spoke about:</span></p><p data-dcnode-id="1088"><b data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">1.30 mins</span></b><span data-dcnode-id="1089" instrument_node=""> Is there a difference between the data and insight demands of your agency clients and your in-house/corporate clients?</span></p><p data-dcnode-id="1084"><b data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">3.30 mins</span></b><span data-dcnode-id="1085" instrument_node=""> Most data suppliers use a mix of human and automated (AI) analysis these days. Marcus talks us through the pros and cons of each approach.</span></p><p data-dcnode-id="1080"><b data-dcnode-id="1081"><em data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">“The sweat spot is a hybrid approach: you use AI to do the heavy lifting but then you sample code with people a proportion of the coverage to get the deeper insight.”</span></em></b></p><p data-dcnode-id="1076"><b data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">7.30 mins</span></b><span data-dcnode-id="1077" instrument_node=""> Do companies like Onclusive tend to supply the raw data or do you interpret it? How do you see yourselves these days, as data providers or insight consultants?</span></p><p data-dcnode-id="1072"><b data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">9.30 mins </span></b><span data-dcnode-id="1073" instrument_node="">Is the measurement of PR and comms always likely to be imperfect? Just because PR and comms is nearly always part of an integrated marketing strategy?</span></p><p data-dcnode-id="1068"><b data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">13 mins</span></b><span data-dcnode-id="1069" instrument_node=""> Marcus talks about how he’d advise the measurement of a consumer campaign.</span></p><p data-dcnode-id="1064"><b data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">15 mins </span></b><span data-dcnode-id="1065" instrument_node="">And he compares that to how he’d suggest measuring a firms reputation, so corporate PR.</span></p><p data-dcnode-id="1057"><b data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">18 mins</span></b><span data-dcnode-id="1061" instrument_node=""> </span><b data-dcnode-id="1058"><em data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">“The key insight is what is hurting and what is helping your reputation.”</span></em></b></p><p data-dcnode-id="1053"><b data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">19.30 mins</span></b><span data-dcnode-id="1054" instrument_node=""> Measurement professionals working in the PR and comms sector spend a lot of time talking about outcome measurement. But not many PR campaigns measure their outcomes. Why is that? Is outcome measurement a false hope?</span></p><p data-dcnode-id="1049"><b data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">20.30 mins </span></b><span data-dcnode-id="1050" instrument_node="">The integrated nature of most marketing campaigns makes outcome measurement difficult.PR and comms is not in isolation much of the time.</span></p><p data-dcnode-id="1042"><b data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">21.30 min</span></b><span data-dcnode-id="1046" instrument_node="">s </span><b data-dcnode-id="1043"><em data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">“I would advise PR and comms professionals to clearly define what they are trying to achieve in their comms activity, and then identify what sources of data they might have access to that will help them understand the impact of that work.”</span></em></b></p><p data-dcnode-id="1036"><b data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">23 mins</span></b><em data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node=""> </span></em><span data-dcnode-id="1037" instrument_node="">Don’t forget: our colleagues/rivals (?) in marketing may have bigger budgets but they also struggle to measure the impact of their integrated campaigns.</span></p><p data-dcnode-id="1032"><b data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">23.30 mins</span></b><span data-dcnode-id="1033" instrument_node=""> What are the most popular measurement KPIs for Onclusive’s clients?</span></p><p data-dcnode-id="1028"><b data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">26.30 mins </span></b><span data-dcnode-id="1029" instrument_node="">They’ll be a section of listeners of this podcast who are part of PR’s measurement clan. Marcus gives us an update on why, having left the sector for a few years, he’s been tempted back!</span></p><span data-dcnode-id="1027" instrument_node="">

</span><span data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Feb 08, 2022</span></span><span data-dcnode-id="828" instrument_node="">

</span><div class="window__info-artist" data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Jon Rhodes, partner at BOLDT </span></div><span data-dcnode-id="823" instrument_node="">
</span><div class="window__info-description" data-dcnode-id="716" dir="auto"><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="821" instrument_node="">Welcome to the </span><a data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmoment.com/podcasts" target="_blank"><span data-dcnode-id="820" instrument_node="">PRmoment Podcast</span></a><span data-dcnode-id="818" instrument_node="">.</span></p><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">This week we’re talking to Jon Rhodes, partner at BOLDT about what the important data points behind an organisation’s reputation are.</span></p><p data-dcnode-id="808"><span data-dcnode-id="814" instrument_node="">BOLDT and </span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mettlecappartners.com/" target="_blank"><span data-dcnode-id="813" instrument_node="">Mettle Capital</span></a><span data-dcnode-id="811" instrument_node=""> recently released their </span><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.boldtpartners.com/trust-in-european-businesses-and-their-ceos-rebounds-with-sustainability-action-now-the-driving-factor/" target="_blank"><span data-dcnode-id="810" instrument_node="">Trust in 2021 report.</span></a></p><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">The report analysed more than 40 million conversations and pieces of content across more than 2,500 companies.</span></p><p data-dcnode-id="794"><span data-dcnode-id="805" instrument_node="">Before we start, just to tell you about </span><a data-dcnode-id="802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patreon.com/prmoment%3Ffan_landing%3Dtrue" target="_blank"><b data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">PRmoment’s new Patron Scheme</span></b></a><span data-dcnode-id="801" instrument_node="">. If you are a regular consumer of our content, including this </span><a data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmoment.com/podcasts" target="_blank"><span data-dcnode-id="800" instrument_node="">podcast</span></a><span data-dcnode-id="798" instrument_node="">, and you’re getting value from it, if you fancy making a contribution to help fund </span><a data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmoment.com/" target="_blank"><span data-dcnode-id="797" instrument_node="">PRmoment </span></a><span data-dcnode-id="795" instrument_node="">- now you can.</span></p><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">We have three different Patron Tiers—The Daney Parker Tier, The Chadlington Tier and Edward Bernays Tier.</span></p><p data-dcnode-id="785"><span data-dcnode-id="791" instrument_node="">Finally, thanks to our PRmoment Podcast sponsors, </span><a data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prca.org.uk/" target="_blank"><span data-dcnode-id="790" instrument_node="">The PRCA.</span></a><br data-dcnode-id="788"><br data-dcnode-id="787"><span data-dcnode-id="786" instrument_node="">Here’s a summary of what Jon and PRmoment founder Ben Smith discussed:</span></p><p data-dcnode-id="781"><b data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">2 mins</span></b><span data-dcnode-id="782" instrument_node=""> Jon explains how, with this research, like many PR people before him, he’s trying to put some science into reputation management and corporate PR.</span></p><p data-dcnode-id="774"><b data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">3.30 mins</span></b><span data-dcnode-id="778" instrument_node=""> </span><b data-dcnode-id="775"><em data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">“I was fed up of having the worst looking slides in the management pack”.</span></em></b></p><p data-dcnode-id="770"><b data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">5 mins </span></b><span data-dcnode-id="771" instrument_node="">Why integrating bug data is the best way to understand the success of corporate PR and reputation management.</span></p><p data-dcnode-id="760"><b data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">5.30 mins </span></b><span data-dcnode-id="767" instrument_node="">Jon talks about how this Trust Report uses a big data approach and is then curated against 3 standatised models: An ESG model based on </span><a data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sasb.org/" target="_blank"><span data-dcnode-id="766" instrument_node="">SASB</span></a><span data-dcnode-id="764" instrument_node="">, The World Economic Forum’s </span><a data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.weforum.org/whitepapers/rebuilding-trust-and-governance-towards-data-free-flow-with-trust-dfft" target="_blank"><span data-dcnode-id="763" instrument_node="">Trust Model</span></a><span data-dcnode-id="761" instrument_node=""> and a reputation model.&nbsp;</span></p><p data-dcnode-id="756"><b data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">6.30 mins</span></b><span data-dcnode-id="757" instrument_node=""> Jon explains where the source data is taken for this report.</span></p><p data-dcnode-id="752"><b data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">9 mins</span></b><span data-dcnode-id="753" instrument_node=""> What, according to this research, are the important numbers behind an organisation's trust?</span></p><p data-dcnode-id="748"><b data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">10 mins</span></b><span data-dcnode-id="749" instrument_node=""> This is a 10 year data set so Jon talks about some long term reputational trends.</span></p><p data-dcnode-id="744"><b data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">13 mins</span></b><span data-dcnode-id="745" instrument_node=""> Many people believe public relations has a measurement problem, but corporate PR has never really tried to measure its impact, has it?</span></p><p data-dcnode-id="739"><span data-dcnode-id="743" instrument_node="">BS:</span><b data-dcnode-id="740"><em data-dcnode-id="741"><span data-dcnode-id="742" instrument_node=""> “I know corporate PR people who have never considered the idea of measuring their impact”.</span></em></b></p><p data-dcnode-id="735"><b data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">17 mins</span></b><span data-dcnode-id="736" instrument_node=""> Jon talks about the potential of using this data set to model and predict reputation fluctuations, specifically related to ESG data which is currently not sufficiently robust.</span></p><p data-dcnode-id="731"><b data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">18 mins</span></b><span data-dcnode-id="732" instrument_node=""> Jon reveals the correlation between reputation and share price: apparently “a good reputation precedes share price by about 3 months.” (Depending on the company and the sector!)</span></p><p data-dcnode-id="727"><b data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">23 mins </span></b><span data-dcnode-id="728" instrument_node="">Jon discusses the 2 most dominant issues impacting trust: problem solving and the CEO.</span></p><p data-dcnode-id="723"><b data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">28 mins </span></b><span data-dcnode-id="724" instrument_node="">The implications of this big data approach to measuring reputation and corporate PR.</span></p><p data-dcnode-id="718"><span data-dcnode-id="722" instrument_node="">If you’d like a copy of the report email </span><a data-dcnode-id="720" href="mailto:jon.rhodes@boldtpartners.com" target="_blank"><span data-dcnode-id="721" instrument_node="">jon.rhodes@boldtpartners.com</span></a><span data-dcnode-id="719" instrument_node="">.</span></p><span data-dcnode-id="717" instrument_node="">

</span><div class="window__info-artist" data-dcnode-id="514"><span data-dcnode-id="515" instrument_node=""> Graz Belli, co-founder of Third City</span></div><span data-dcnode-id="513" instrument_node="">
</span><div class="window__info-description" data-dcnode-id="393" dir="auto"><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="511" instrument_node="">Welcome to the </span><a data-dcnode-id="509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmoment.com/podcasts" target="_blank"><span data-dcnode-id="510" instrument_node="">PRmoment Podcast</span></a><span data-dcnode-id="508" instrument_node="">.</span></p><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">This week we’re chatting to Graz Belli, Co-Founder of Third City. Third City has a fee income of about £2.5 million and grew by 20% in 2021. It was founded 11 years ago. Third City sees itself as a corpsumer PR firm, offering both brand and reputational advice.</span></p><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Clients include the likes of BUPA, Starling, Zurich and G-Network.</span></p><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Previously Graz was managing director of Band &amp; Brown.&nbsp;</span></p><p data-dcnode-id="489"><span data-dcnode-id="500" instrument_node="">Before we start, just to tell you about </span><a data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patreon.com/prmoment%3Ffan_landing%3Dtrue" target="_blank"><b data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">PRmoment’s new Patron Scheme</span></b></a><span data-dcnode-id="496" instrument_node="">. If you are a regular consumer of our content, including this </span><a data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmoment.com/podcasts" target="_blank"><span data-dcnode-id="495" instrument_node="">podcast</span></a><span data-dcnode-id="493" instrument_node="">, and you’re getting value from it, if you fancy making a contribution to help fund </span><a data-dcnode-id="491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmoment.com/" target="_blank"><span data-dcnode-id="492" instrument_node="">PRmoment</span></a><span data-dcnode-id="490" instrument_node="">, now you can.</span></p><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">We have three different Patron Tiers—The Daney Parker Tier, The Chadlington Tier and Edward Bernays Tier.</span></p><p data-dcnode-id="483"><span data-dcnode-id="486" instrument_node="">Thanks to our PRmoment Podcast sponsors, </span><a data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prca.org.uk/" target="_blank"><span data-dcnode-id="485" instrument_node="">The PRCA.</span></a></p><p data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Here’s a summary of what Graz and Ben Smith talked about:</span></p><p data-dcnode-id="477"><b data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">2 mins</span></b><span data-dcnode-id="478" instrument_node=""> Graz’s Italian parents moved to Wales to find work and she grew up living above a fish and chip shop in Newport. Graz is now a co-owner of a successful PR business which is a nice story. I asked Graz what 10-year-old Graz would have thought about it all?</span></p><p data-dcnode-id="473"><b data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">4 mins</span></b><span data-dcnode-id="474" instrument_node=""> The importance of role models and resilience in entrepreneurship.</span></p><p data-dcnode-id="469"><b data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">5 mins</span></b><span data-dcnode-id="470" instrument_node=""> Graz talks about why her work passion is the planning and strategy side of PR.</span></p><p data-dcnode-id="462"><b data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">8 mins</span></b><span data-dcnode-id="466" instrument_node=""> Graz reveals her </span><a data-dcnode-id="464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eu.themyersbriggs.com/en/tools/MBTI/MBTI-Colour-guide" target="_blank"><span data-dcnode-id="465" instrument_node="">Myers Brigg</span></a><span data-dcnode-id="463" instrument_node=""> colour!</span></p><p data-dcnode-id="458"><b data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">11 mins</span></b><span data-dcnode-id="459" instrument_node=""> How do you maximise the likelihood that a campaign is going to have an impact?</span></p><p data-dcnode-id="454"><b data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">13 mins </span></b><span data-dcnode-id="455" instrument_node="">How PR planning has evolved but it’s still a mix of art and science.</span></p><p data-dcnode-id="450"><b data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">15 mins </span></b><span data-dcnode-id="451" instrument_node="">What percentage of PR campaigns actually create behaviour change?&nbsp;</span></p><p data-dcnode-id="441"><b data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">17 mins </span></b><span data-dcnode-id="447" instrument_node="">Why</span><em data-dcnode-id="445"><span data-dcnode-id="446" instrument_node=""> </span></em><b data-dcnode-id="442"><em data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">“PR is the most persuasive part of the marcomms mix”</span></em></b></p><p data-dcnode-id="437"><b data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">18 mins</span></b><span data-dcnode-id="438" instrument_node=""> Graz joined Band &amp; Brown in the early 90s as an account exec and became the managing director. What was it about Band &amp; Brown that made it such an iconic agency of the 1990s?</span></p><p data-dcnode-id="433"><b data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">20 mins </span></b><span data-dcnode-id="434" instrument_node="">Graz talks about the sprinkling of ex Brand &amp; Brown people around the PR sector.</span></p><p data-dcnode-id="429"><b data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">21 mins</span></b><span data-dcnode-id="430" instrument_node=""> Graz reveals the reasons behind the rapid fall of Band &amp; Brown.</span></p><p data-dcnode-id="425"><b data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">23 mins</span></b><span data-dcnode-id="426" instrument_node=""> Why did Graz decide to launch Third City with Mark Lowe and Gill Brown?</span></p><p data-dcnode-id="421"><b data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">26 mins</span></b><span data-dcnode-id="422" instrument_node=""> A discussion of whether brand comms and corporate comms have not always needed to be aligned? Has anything really changed?</span></p><p data-dcnode-id="417"><b data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">29 mins</span></b><span data-dcnode-id="418" instrument_node=""> What contribution do you think PR and comms people should make to a firm's ESG strategy?</span></p><p data-dcnode-id="413"><b data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">32 mins</span></b><span data-dcnode-id="414" instrument_node=""> How has the work of PR agencies changed during the pandemic?</span></p><p data-dcnode-id="406"><b data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">36 mins</span></b><span data-dcnode-id="410" instrument_node=""> Graz talks about her role as a mentor of </span><a data-dcnode-id="408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//womeninpr.org.uk/" target="_blank"><span data-dcnode-id="409" instrument_node="">Women in PR</span></a><span data-dcnode-id="407" instrument_node=""> and what she believes can be done to help women who work in PR thrive.</span></p><p data-dcnode-id="399"><b data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">38 mins</span></b><span data-dcnode-id="403" instrument_node=""> </span><b data-dcnode-id="400"><em data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">“Why we need to redefine what’s meant by great leadership and performance.”</span></em></b></p><p data-dcnode-id="395"><b data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">40 mins</span></b><span data-dcnode-id="396" instrument_node=""> Graz tells us about why she’s recently started training for a marathon!</span></p><span data-dcnode-id="394" instrument_node="">
