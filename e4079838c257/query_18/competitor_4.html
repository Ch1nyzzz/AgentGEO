</span><p data-dcnode-id="5316" style="text-align:center"><span data-dcnode-id="5319" instrument_node="">Guest post by Noel Holston</span><br data-dcnode-id="5318"><br data-dcnode-id="5317"></p><span data-dcnode-id="5315" instrument_node="">
</span><p data-dcnode-id="5311"><span data-dcnode-id="5314" instrument_node="">News item from&nbsp;</span><em data-dcnode-id="5312"><span data-dcnode-id="5313" instrument_node="">The Washington Post:</span></em></p><span data-dcnode-id="5310" instrument_node="">
</span><p data-dcnode-id="5306"><strong data-dcnode-id="5307"><em data-dcnode-id="5308"><span data-dcnode-id="5309" instrument_node="">“According to the American Library Association, conservative activists in several states, including Texas, Montana and Louisiana, have joined forces with like-minded officials to dissolve libraries’ governing bodies, rewrite or delete censorship protections, and remove books outside of official challenge procedures.</span></em></strong></p><span data-dcnode-id="5305" instrument_node="">
</span><p data-dcnode-id="5298"><strong data-dcnode-id="5299"><em data-dcnode-id="5303"><span data-dcnode-id="5304" instrument_node="">“Leaders have taken works as seemingly innocuous as the popular children’s picture book&nbsp;</span></em><span data-dcnode-id="5302" instrument_node="">In the Night Kitchen</span><em data-dcnode-id="5300"><span data-dcnode-id="5301" instrument_node="">&nbsp;by Maurice Sendak off the shelves (and) closed library board meetings to the public. . . .”</span></em></strong></p><span data-dcnode-id="5297" instrument_node="">
</span><p data-dcnode-id="5295"><span data-dcnode-id="5296" instrument_node="">All I can say is, IT’S ABOUT TIME!</span></p><span data-dcnode-id="5294" instrument_node="">
</span><p data-dcnode-id="5292"><span data-dcnode-id="5293" instrument_node="">Public libraries are a public menace, especially for young, impressionable minds. I am living proof — living, permanently scarred proof.</span></p><span data-dcnode-id="5291" instrument_node="">
</span><p data-dcnode-id="5286"><span data-dcnode-id="5290" instrument_node="">I grew up in Laurel, Mississippi, now best known as the star of HGTV’s popular house-makeover show&nbsp;</span><em data-dcnode-id="5288"><span data-dcnode-id="5289" instrument_node="">Home Town</span></em><span data-dcnode-id="5287" instrument_node="">. In the late 1950s and 1960s, when I was in my formative youth, it was better known for its shady mayor, Klan activity and a stinky Masonite plant.</span></p><span data-dcnode-id="5285" instrument_node="">
</span><p data-dcnode-id="5283"><span data-dcnode-id="5284" instrument_node="">Laurel, however, did have a great public library. I was a regular from an early age, especially in summer, when you got a star on a big poster board for every book you consumed.</span></p><span data-dcnode-id="5282" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="5280"><img alt="" class="wp-image-10784" data-attachment-id="10784" data-comments-opened="1" data-dcnode-id="5281" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Screen-Shot-2022-04-24-at-1.16.43-PM" data-large-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/04/Screen-Shot-2022-04-24-at-1.16.43-PM.png" data-medium-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/04/Screen-Shot-2022-04-24-at-1.16.43-PM-300x222.png" data-orig-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/04/Screen-Shot-2022-04-24-at-1.16.43-PM.png" data-orig-size="874,646" data-permalink="https://www.wrywingpolitics.com/public-libraries-public-enemies/screen-shot-2022-04-24-at-1-16-43-pm/" sizes="(max-width: 874px) 100vw, 874px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/wp-content/uploads/2022/04/Screen-Shot-2022-04-24-at-1.16.43-PM.png&amp;raw" srcset="https://www.wrywingpolitics.com/wp-content/uploads/2022/04/Screen-Shot-2022-04-24-at-1.16.43-PM.png 874w, https://www.wrywingpolitics.com/wp-content/uploads/2022/04/Screen-Shot-2022-04-24-at-1.16.43-PM-300x222.png 300w, https://www.wrywingpolitics.com/wp-content/uploads/2022/04/Screen-Shot-2022-04-24-at-1.16.43-PM-768x568.png 768w, https://www.wrywingpolitics.com/wp-content/uploads/2022/04/Screen-Shot-2022-04-24-at-1.16.43-PM-406x300.png 406w"></figure><span data-dcnode-id="5279" instrument_node="">
</span><p data-dcnode-id="5277"><span data-dcnode-id="5278" instrument_node="">As I moved into my tweens, I was still happily reading Hardy Boys mysteries, inspirational, youth-oriented biographies of great men like Admiral Richard Byrd, Thomas Edison and Yogi Berra, and occasionally a mystery by Agatha Christie or Sir Arthur Conan Doyle. I saved my money and even bought books occasionally at Laurel’s Baptist Bible and Book Shop.</span></p><span data-dcnode-id="5276" instrument_node="">
</span><p data-dcnode-id="5274"><span data-dcnode-id="5275" instrument_node="">At some point, I decided I should read something from the best seller list. I asked at the front desk of the library for recommendations, little knowing there was a subversive librarian just waiting for any easy mark to pounce on.</span></p><span data-dcnode-id="5273" instrument_node="">
</span><p data-dcnode-id="5271"><span data-dcnode-id="5272" instrument_node="">Miss Eva Mae, a soft-spoken gray-haired lady with a sweet smile, said, in essence, “You know, Noel, there are many better books here than what’s on those best-seller lists.”</span></p><span data-dcnode-id="5270" instrument_node="">
</span><p data-dcnode-id="5268"><span data-dcnode-id="5269" instrument_node="">“Really?” I said.</span></p><span data-dcnode-id="5267" instrument_node="">
</span><p data-dcnode-id="5265"><span data-dcnode-id="5266" instrument_node="">“Come with me,” she said with a nod of her head, leading me deep into an adult-section aisle.</span></p><span data-dcnode-id="5264" instrument_node="">
</span><p data-dcnode-id="5262"><span data-dcnode-id="5263" instrument_node="">She showed me several books. They tended to be slightly worn looking and lacking the fancy, pictorial dust jackets of the newest arrivals.</span></p><span data-dcnode-id="5261" instrument_node="">
</span><p data-dcnode-id="5247"><span data-dcnode-id="5260" instrument_node="">I passed on&nbsp;</span><em data-dcnode-id="5258"><span data-dcnode-id="5259" instrument_node="">David Copperfield</span></em><span data-dcnode-id="5257" instrument_node="">&nbsp;and</span><em data-dcnode-id="5255"><span data-dcnode-id="5256" instrument_node="">&nbsp;Wuthering Heights.</span></em><span data-dcnode-id="5254" instrument_node="">&nbsp;I’d seen the movie versions on TV. I settled on John Steinbeck’s&nbsp;</span><em data-dcnode-id="5252"><span data-dcnode-id="5253" instrument_node="">The Grapes of</span></em><span data-dcnode-id="5251" instrument_node="">&nbsp;</span><em data-dcnode-id="5249"><span data-dcnode-id="5250" instrument_node="">Wrath,</span></em><span data-dcnode-id="5248" instrument_node="">&nbsp;the fattest, heaviest book I had ever checked out.</span></p><span data-dcnode-id="5246" instrument_node="">
</span><p data-dcnode-id="5244"><span data-dcnode-id="5245" instrument_node="">And that’s how I was lost. The story of the Joad family, hardscrabble farmers like my ancestors, told of poverty and bad luck, desperation, mean bosses, heartless bankers, courage, anger.</span></p><span data-dcnode-id="5243" instrument_node="">
</span><p data-dcnode-id="5241"><span data-dcnode-id="5242" instrument_node="">Just like that, I outgrew Joe and Frank Hardy. Tom Swift, too. I was soon checking out books by James Baldwin, J.D. Salinger, Carson McCullers, William Faulkner.</span></p><span data-dcnode-id="5240" instrument_node="">
</span><p data-dcnode-id="5230"><span data-dcnode-id="5239" instrument_node="">And so it was that I gradually morphed into a free-thinking, questing liberal. I couldn’t stop myself. I read books like&nbsp;</span><em data-dcnode-id="5237"><span data-dcnode-id="5238" instrument_node="">I Know Why the Caged Bird Sings</span></em><span data-dcnode-id="5236" instrument_node="">,&nbsp;</span><em data-dcnode-id="5234"><span data-dcnode-id="5235" instrument_node="">The Women’s Room, Slaughterhouse 5&nbsp;</span></em><span data-dcnode-id="5233" instrument_node="">and The&nbsp;</span><em data-dcnode-id="5231"><span data-dcnode-id="5232" instrument_node="">Other America.</span></em></p><span data-dcnode-id="5229" instrument_node="">
</span><p data-dcnode-id="5221"><span data-dcnode-id="5228" instrument_node="">When I had kids, two sons, I read&nbsp;</span><em data-dcnode-id="5226"><span data-dcnode-id="5227" instrument_node="">In the Night Kitchen</span></em><span data-dcnode-id="5225" instrument_node="">&nbsp;to them — many, many times — despite the fact that it included a couple of illustrations of the hero, a boy named Mickey, in his birthday suit. I let them read&nbsp;</span><em data-dcnode-id="5223"><span data-dcnode-id="5224" instrument_node="">To Kill a Mockingbird</span></em><span data-dcnode-id="5222" instrument_node="">&nbsp;before they reached puberty.</span></p><span data-dcnode-id="5220" instrument_node="">
</span><p data-dcnode-id="5218"><span data-dcnode-id="5219" instrument_node="">They became even more progressive and free thinking than I.</span></p><span data-dcnode-id="5217" instrument_node="">
</span><p data-dcnode-id="5215"><span data-dcnode-id="5216" instrument_node="">So, you see, those Texas folks are right. Public libraries are dangerous places, especially for the young.</span></p><span data-dcnode-id="5214" instrument_node="">
</span><p data-dcnode-id="5212"><span data-dcnode-id="5213" instrument_node="">They might get ideas.</span></p><span data-dcnode-id="5211" instrument_node="">
</span><p data-dcnode-id="5200"><em data-dcnode-id="5209"><span data-dcnode-id="5210" instrument_node="">Note: Noel&nbsp;</span></em><span data-dcnode-id="5208" instrument_node="">H</span><em data-dcnode-id="5203"><span data-dcnode-id="5207" instrument_node="">olston is a freelance writer who lives in Athens, Georgia. He regularly shares his insights and wit at Wry Wing Politics. He’s also a contributing essayist to&nbsp;Medium.com, TVWorthWatching.com,&nbsp;and other websites.&nbsp;He previously wrote about television and radio at Newsday (200-2005) and, as a crosstown counterpart to the Pioneer Press’s Brian Lambert, at the Star Tribune &nbsp;(1986-2000). &nbsp;He’s the author&nbsp;of&nbsp;</span><a data-dcnode-id="5205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newsday.com/entertainment/books/life-after-deaf-noel-holston-1.39152688"><span data-dcnode-id="5206" instrument_node="">“Life After Deaf: My Misadventures in Hearing Loss and Recovery</span></a><span data-dcnode-id="5204" instrument_node="">,” by Skyhorse.</span></em><br data-dcnode-id="5202"><br data-dcnode-id="5201"></p><span data-dcnode-id="5199" instrument_node="">
</span><div class="sharedaddy sd-sharing-enabled" data-dcnode-id="5168"><div class="robots-nocontent sd-block sd-social sd-social-icon-text sd-sharing" data-dcnode-id="5169"><h3 class="sd-title" data-dcnode-id="5197"><span data-dcnode-id="5198" instrument_node="">Share this:</span></h3><div class="sd-content" data-dcnode-id="5170"><ul data-dcnode-id="5171"><li class="share-linkedin" data-dcnode-id="5193"><a class="share-linkedin sd-button share-icon" data-dcnode-id="5194" data-shared="sharing-linkedin-10783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/public-libraries-public-enemies/%3Fshare%3Dlinkedin%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on LinkedIn"><span data-dcnode-id="5195"><span data-dcnode-id="5196" instrument_node="">LinkedIn</span></span></a></li><li class="share-facebook" data-dcnode-id="5189"><a class="share-facebook sd-button share-icon" data-dcnode-id="5190" data-shared="sharing-facebook-10783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/public-libraries-public-enemies/%3Fshare%3Dfacebook%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Facebook"><span data-dcnode-id="5191"><span data-dcnode-id="5192" instrument_node="">Facebook</span></span></a></li><li class="share-print" data-dcnode-id="5185"><a class="share-print sd-button share-icon" data-dcnode-id="5186" data-shared="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/public-libraries-public-enemies/" rel="nofollow noopener noreferrer" target="_blank" title="Click to print"><span data-dcnode-id="5187"><span data-dcnode-id="5188" instrument_node="">Print</span></span></a></li><li class="share-twitter" data-dcnode-id="5181"><a class="share-twitter sd-button share-icon" data-dcnode-id="5182" data-shared="sharing-twitter-10783" href="https://chatnoir-webcontent </span><article class="post-10778 post type-post status-publish format-standard hentry category-poltiics tag-cdc-mask-mandate tag-charlie-pierce tag-kathryn-mizelle" data-dcnode-id="4960" id="post-10778"><span data-dcnode-id="5139" instrument_node="">
</span><header class="entry-header" data-dcnode-id="5109"><span data-dcnode-id="5138" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="5135"><a data-dcnode-id="5136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/it-was-time-for-the-mask-mandate-to-go/" rel="bookmark"><span data-dcnode-id="5137" instrument_node="">It Was Time for the Mask Mandate to Go.</span></a></h1><span data-dcnode-id="5134" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="5118"><span data-dcnode-id="5133" instrument_node="">
</span><span class="sep" data-dcnode-id="5131"><span data-dcnode-id="5132" instrument_node="">Posted on </span></span><a data-dcnode-id="5128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/it-was-time-for-the-mask-mandate-to-go/" rel="bookmark" title="10:51 am"><time class="entry-date" data-dcnode-id="5129" datetime="2022-04-20T10:51:03-05:00"><span data-dcnode-id="5130" instrument_node="">April 20, 2022</span></time></a><span class="by-author" data-dcnode-id="5120"><span data-dcnode-id="5127" instrument_node=""> </span><span class="sep" data-dcnode-id="5125"><span data-dcnode-id="5126" instrument_node=""> by </span></span><span data-dcnode-id="5124" instrument_node=""> </span><span class="author vcard" data-dcnode-id="5121"><a class="url fn n" data-dcnode-id="5122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/author/brian-lambert/" rel="author" title="View all posts by Brian Lambert"><span data-dcnode-id="5123" instrument_node="">Brian Lambert</span></a></span></span><span data-dcnode-id="5119" instrument_node=""> </span></div><span data-dcnode-id="5116" instrument_node="">
</span><div class="comments-link" data-dcnode-id="5111"><span data-dcnode-id="5115" instrument_node="">
</span><a data-dcnode-id="5113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/it-was-time-for-the-mask-mandate-to-go/%23comments"><span data-dcnode-id="5114" instrument_node="">8</span></a><span data-dcnode-id="5112" instrument_node=""> </span></div><span data-dcnode-id="5110" instrument_node="">
</span></header><span data-dcnode-id="5107" instrument_node="">
</span><div class="entry-content" data-dcnode-id="5003"><span data-dcnode-id="5106" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="5104"><img alt="The best mask to wear on an airplane" data-dcnode-id="5105" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.hdnux.com/photos/01/21/45/42/21387452/3/rawImage.jpg&amp;raw"></figure><span data-dcnode-id="5103" instrument_node="">
</span><p data-dcnode-id="5101"><span data-dcnode-id="5102" instrument_node="">Personally, I’m just fine with pulling the plug on the public transportation mask mandate. At the risk of sounding like a raging, bug-eyed Trump goober — or Bill Maher — masks, as a universal mandate have served what purpose they could and it’s time to move on into the next phase of COVID protection.</span></p><span data-dcnode-id="5100" instrument_node="">
</span><p data-dcnode-id="5090"><em data-dcnode-id="5098"><span data-dcnode-id="5099" instrument_node="">How</span></em><span data-dcnode-id="5097" instrument_node=""> the mandate has been ended is a whole other story. </span><a data-dcnode-id="5095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.esquire.com/news-politics/politics/a39753211/mask-mandate-airplanes-trump-judge/"><span data-dcnode-id="5096" instrument_node="">I am not alone in thinking</span></a><span data-dcnode-id="5094" instrument_node=""> it bizarre-to-appalling that in a highly-developed society of 320 million people one strategically placed partisan with precious little legal and no medical qualifications can dictate/induce a health policy for everyone. Really folks, WTF? Can we get some half-baked judge somewhere to require every pot hole in the country get fixed </span><em data-dcnode-id="5092"><span data-dcnode-id="5093" instrument_node="">today</span></em><span data-dcnode-id="5091" instrument_node="">? </span></p><span data-dcnode-id="5089" instrument_node="">
</span><p data-dcnode-id="5084"><span data-dcnode-id="5088" instrument_node="">(This on the judge from Charlie Pierce:  </span><em data-dcnode-id="5086"><span data-dcnode-id="5087" instrument_node="">“You see, Judge [Kathryn] Mizelle is one of those folks that the Federalist Society sent up the pneumatic tube that led from its labs to the White House. She clerked for Supreme Court Justice Clarence Thomas, and was rated as “not qualified” by the American Bar Association. She was 33 when she was nominated and confirmed as the 2020 lame-duck session was winding down. She was eight years out of law school and had never tried a case of any kind. Her husband was chosen to be acting general counsel at the Department of Homeland Security through his connection to that noted devotee of the Constitution, Stephen Miller. She had no experience, but she had the golden resume.</span></em><span data-dcnode-id="5085" instrument_node="">“)</span></p><span data-dcnode-id="5083" instrument_node="">
</span><p data-dcnode-id="5081"><span data-dcnode-id="5082" instrument_node="">Have you read her argument on “sanitation”? What for godssake is the woman babbling about?</span></p><span data-dcnode-id="5080" instrument_node="">
</span><p data-dcnode-id="5079"></p><span data-dcnode-id="5078" instrument_node="">
</span><p data-dcnode-id="5076"><span data-dcnode-id="5077" instrument_node="">But the science of masked airplane travel has escaped me for a while. If every environment in which we spend time in close quarters with other humans was as well ventilated and filtered as an airplane I seriously doubt COVID would have spread as far and as deep as it has.</span></p><span data-dcnode-id="5075" instrument_node="">
</span><p data-dcnode-id="5073"><span data-dcnode-id="5074" instrument_node="">The larger point is that after two years, and after everything we’ve learned about the virus, after the vaccines and boosters and all that is readily knowable about transmission and individual vulnerability, we are truly at the point where it is up to each of us to protect ourselves. Pre-vaccine I wouldn’t have said so. But now I do.</span></p><span data-dcnode-id="5072" instrument_node="">
</span><p data-dcnode-id="5070"><span data-dcnode-id="5071" instrument_node="">Feel free to tell me how completely wrong I am, but two shots and two boosters later and with no underlying conditions (other than general mule-headedness and irritability) I’m not seeing myself as particularly vulnerable to serious infection from COVID as it exists today, even in its sub-variants. Likewise, based on my understanding, if I’m carrying any level of the virus, (which immunologically may actually help me avoid a more serious infection) my viral load isn’t potent enough to do much if any damage to another similarly vaccinated, otherwise healthy person.</span></p><span data-dcnode-id="5069" instrument_node="">
</span><p data-dcnode-id="5067"><span data-dcnode-id="5068" instrument_node="">Which gets us obviously to those who are either not vaccinated or afflicted with some other significant health problem.</span></p><span data-dcnode-id="5066" instrument_node="">
</span><p data-dcnode-id="5064"><span data-dcnode-id="5065" instrument_node="">At this point in the pandemic everybody has had enough time and has access to enough information to have made an adult decision about vaccinations. Not that “adult” means “good”, you undersatand. </span></p><span data-dcnode-id="5063" instrument_node="">
</span><p data-dcnode-id="5061"><span data-dcnode-id="5062" instrument_node="">For those still avoiding vaccination because of some utterly imbecilic hyper-partisan political reason (which usually covers both “religious” issues and athletes with “body purity” excuses) … well, good luck to you. If your fierce stand for “personal freedom” gets a tube jammed down your throat and an early grave, you can hope that Donald Trump or Ron DeSantis or Kristi Noem or some other sociopathic right-wing grifter will show up and say a few appreciative words at your funeral.</span></p><span data-dcnode-id="5060" instrument_node="">
</span><p data-dcnode-id="5058"><span data-dcnode-id="5059" instrument_node="">For people with emphysema, diabetes, etc., they absolutely should continue protecting themselves with masks in public settings. More to the point, they should have been doing that before COVID. It unfortunately comes with their territory.</span></p><span data-dcnode-id="5057" instrument_node="">
</span><p data-dcnode-id="5055"><span data-dcnode-id="5056" instrument_node="">For the rest of us, we’ve followed science, as opposed to cable TV entertainment theory, and have every good reason now to move on. Exercising, mind you, similar basic cautions we use to avoid harm from… well, pick as many as you like … spinal meningitis, hepatitis, diptheria, measles, strolling blind across six lanes of freeway, jumping out of airplanes without a parachute, French kissing Matt Gaetz … (sorry about that last one) …  and on and on … and on.</span></p><span data-dcnode-id="5054" instrument_node="">
</span><p data-dcnode-id="5052"><span data-dcnode-id="5053" instrument_node="">Point being, there’s something out there somewhere for everyone, given the right circumstances and bad luck.</span></p><span data-dcnode-id="5051" instrument_node="">
</span><p data-dcnode-id="5049"><span data-dcnode-id="5050" instrument_node="">Life is like that.</span></p><span data-dcnode-id="5048" instrument_node="">

</span><article class="post-10772 post type-post status-publish format-standard hentry category-poltiics tag-corey-lewandowski tag-jason-ravnsborg tag-joe-boever tag-kristi-nowm tag-south-dakota-trusts tag-trump" data-dcnode-id="4729" id="post-10772"><span data-dcnode-id="4957" instrument_node="">
</span><header class="entry-header" data-dcnode-id="4927"><span data-dcnode-id="4956" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="4953"><a data-dcnode-id="4954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/what-do-you-say-we-build-a-wall-around-south-dakota/" rel="bookmark"><span data-dcnode-id="4955" instrument_node="">What Do You Say We Build a Wall Around South Dakota?</span></a></h1><span data-dcnode-id="4952" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="4936"><span data-dcnode-id="4951" instrument_node="">
</span><span class="sep" data-dcnode-id="4949"><span data-dcnode-id="4950" instrument_node="">Posted on </span></span><a data-dcnode-id="4946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/what-do-you-say-we-build-a-wall-around-south-dakota/" rel="bookmark" title="11:27 am"><time class="entry-date" data-dcnode-id="4947" datetime="2022-04-13T11:27:39-05:00"><span data-dcnode-id="4948" instrument_node="">April 13, 2022</span></time></a><span class="by-author" data-dcnode-id="4938"><span data-dcnode-id="4945" instrument_node=""> </span><span class="sep" data-dcnode-id="4943"><span data-dcnode-id="4944" instrument_node=""> by </span></span><span data-dcnode-id="4942" instrument_node=""> </span><span class="author vcard" data-dcnode-id="4939"><a class="url fn n" data-dcnode-id="4940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/author/brian-lambert/" rel="author" title="View all posts by Brian Lambert"><span data-dcnode-id="4941" instrument_node="">Brian Lambert</span></a></span></span><span data-dcnode-id="4937" instrument_node=""> </span></div><span data-dcnode-id="4934" instrument_node="">
</span><div class="comments-link" data-dcnode-id="4929"><span data-dcnode-id="4933" instrument_node="">
</span><a data-dcnode-id="4931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/what-do-you-say-we-build-a-wall-around-south-dakota/%23comments"><span data-dcnode-id="4932" instrument_node="">2</span></a><span data-dcnode-id="4930" instrument_node=""> </span></div><span data-dcnode-id="4928" instrument_node="">
</span></header><span data-dcnode-id="4925" instrument_node="">
</span><div class="entry-content" data-dcnode-id="4781"><span data-dcnode-id="4924" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="4922"><img alt="A deer doesn't look like a human&quot;: Republican attorney general involved in  fatal South Dakota crash | Salon.com" data-dcnode-id="4923" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mediaproxy.salon.com/width/1200/https%3A//media.salon.com/2020/09/noem-ravnsborg-0914201.jpg&amp;raw"></figure><span data-dcnode-id="4921" instrument_node="">
</span><p data-dcnode-id="4919"><span data-dcnode-id="4920" instrument_node="">[Updated: With the proper use of “lying.”] With everything going on in the world you can be forgiven if you haven’t paid a lot of attention to … South Dakota. I mean, to most of us it’s just that big flat place “over there”. A place where unless you’re counting pheasants and super spreader motorcycle rallies nothing much ever happens.</span></p><span data-dcnode-id="4918" instrument_node="">
</span><p data-dcnode-id="4916"><span data-dcnode-id="4917" instrument_node="">But then you get a story like the one where the state’s top law enforcement officer — protecting and serving, y’know — kills a guy with his car — and given the place’s 90% Republican control, gets off with a hand-slap, essentially Scot-free, at least until he doesn’t.</span></p><span data-dcnode-id="4915" instrument_node="">
</span><p data-dcnode-id="4913"><span data-dcnode-id="4914" instrument_node="">Yesterday the South Dakota legislature finally summoned the courage to impeach Attorney General Jason Ravnsborg for, A: Killing 55 year-old Joe Boever by hitting him as he walked alongside a rural highway, and then B: Flagrantly lying about it, claiming he thought Boever, a guy whose head came through Ravnsborg’s windshield, was a deer.</span></p><span data-dcnode-id="4912" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="4910"><img alt="South Dakota AG Ravnsborg was 'distracted' when he hit, killed pedestrian  with car: Investigation - ABC News" data-dcnode-id="4911" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.abcnews.com/images/GMA/fordtaurus-01-ht-iwb-201102_1604339735752_hpMain_16x9_992.jpg&amp;raw"></figure><span data-dcnode-id="4909" instrument_node="">
</span><p data-dcnode-id="4895"><span data-dcnode-id="4908" instrument_node="">The story has played here in Minnesota and nationally, but usually without </span><a data-dcnode-id="4906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dakotafreepress.com/2022/04/05/sdhp-trooper-ravnsborg-fully-on-shoulder-doing-68-when-he-killed-boever/"><span data-dcnode-id="4907" instrument_node="">the telling details</span></a><span data-dcnode-id="4905" instrument_node="">, some of which were only partly known until the full North Dakota BCI report was released several weeks ago. (The incident took place Sept. 12, 2020.) Having already established that the dead man’s glasses were lying on the passenger seat of Ravnsborg’s car, thereby making it, well, pretty damned unlikely the Attorney General didn’t know he’d hit a human being, the report revealed that far from Boever walking on the road, Ravnsborg — a guy who at at age 46 has</span><a data-dcnode-id="4903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.argusleader.com/story/news/2022/03/30/south-dakota-ag-jason-ravnsborg-crash-documents-released-impeachment-committee/7185520001/"><span data-dcnode-id="4904" instrument_node=""> already accumulated 25 traffic citations — </span></a><span data-dcnode-id="4902" instrument_node="">was completely </span><em data-dcnode-id="4900"><span data-dcnode-id="4901" instrument_node="">off the road</span></em><span data-dcnode-id="4899" instrument_node="">, as in his entire car, a full-size Ford, was on </span><em data-dcnode-id="4897"><span data-dcnode-id="4898" instrument_node="">the other side of the rumble strips</span></em><span data-dcnode-id="4896" instrument_node=""> and fog lines, practicaly in the ditch, when he hit Boever, who was carrying a flashlight, so hard Boever’s head not only came through the windshield but one of his legs was torn completely off.</span></p><span data-dcnode-id="4894" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="4892"><img alt="Ravnsborg crash: What we know about how it happened | KELOLAND.com" data-dcnode-id="4893" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.keloland.com/wp-content/uploads/sites/103/2021/02/Ravnsorg-crash-scene-with-annotations-3.jpg%3Fw%3D900&amp;raw"></figure><span data-dcnode-id="4891" instrument_node="">
</span><p data-dcnode-id="4889"><span data-dcnode-id="4890" instrument_node="">And about that flashlight … . A local sheriff rolled out to the scene in response to Ravnsborg calling in a report of hitting a deer, (something you have to do for insurance reasons). Neither of them bothered to check around for the deer. So neither noticed the light from the flashlight lying in the ditch back near the point of impact. (The car – traveling at 68 mph — carried Boever about 100 feet before throwing him off.) When Ravnsborg and other cops returned to the scene the next day and found Boever’s body,  the flashlight was still on.</span></p><span data-dcnode-id="4888" instrument_node="">
</span><p data-dcnode-id="4886"><span data-dcnode-id="4887" instrument_node="">So much for thorough law enforcement work. </span></p><span data-dcnode-id="4885" instrument_node="">
</span><p data-dcnode-id="4883"><span data-dcnode-id="4884" instrument_node="">So now Ravnsborg will face a Senate trial that like — pick your Trump impeachment — requires a 2/3 vote to convict. How that goes is anyone’s guess. But — and here we get into more wildly dysfunctional, contemporary South Dakota politics — he does not have friends in high places. You see, Ravnsborg is in a death match feud with South Dakota’s “presidential contender” governor, former beauty queen Kristi Noem. She wants him gone real bad, and right now, she carries more water in South Dakota than he does.</span></p><span data-dcnode-id="4882" instrument_node="">
</span><p data-dcnode-id="4878"><span data-dcnode-id="4881" instrument_node="">Noem needs far less introduction than Ravnsborg. She is best known to anyone with a conscience as the appalling Trumpist politician who so resolutely denied COVID that South Dakota for a time (around when Ravnsborg killed Boever) had </span><a data-dcnode-id="4879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nbcnews.com/health/health-news/north-dakota-south-dakota-set-global-covid-records-how-did-n1257004"><span data-dcnode-id="4880" instrument_node="">the highest death rate per capita of any place in the world. </span></a></p><span data-dcnode-id="4877" instrument_node="">
</span><p data-dcnode-id="4875"><span data-dcnode-id="4876" instrument_node="">For her brave stand for “personal freedoms” Noem became a darling of FoxNews and was catapulted into the pantheon of self-serving gargoyles considered suitable successors to the Trump mantle. (Semi-notorious Trump “adviser” Corey Lewandowski has become a, mmm, regular traveling companion as Noem makes the required CPAC/Trump rally circuit of activities having nothing to do with responsibly governing South Dakota.)</span></p><span data-dcnode-id="4874" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="4872"><img alt="South Dakota Governor DENIES having an affair with ex-Trump aide Corey  Lewandowski | Daily Mail Online" data-dcnode-id="4873" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.dailymail.co.uk/1s/2021/09/29/22/48565549-0-image-a-46_1632952090091.jpg&amp;raw"></figure><span data-dcnode-id="4871" instrument_node="">
</span><p data-dcnode-id="4866"><span data-dcnode-id="4870" instrument_node="">I could go on about Noem’s scandal-ette over big-footing her daughter’s real estate license, then pushing out the bureaucrat who denied it, and </span><a data-dcnode-id="4868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbsnews.com/news/south-dakota-governor-kristi-noem-security-fence/"><span data-dcnode-id="4869" instrument_node="">the $400,000 fence she had put up around the Governor’s residence</span></a><span data-dcnode-id="4867" instrument_node=""> (with no hint at all of any unique threat to her), or the constant use of state aircraft to get her and Lewandowski to MAGA rallies. But, in the annals of South Dakota today there’s something better … but far more opaque.</span></p><span data-dcnode-id="4865" instrument_node="">
</span><p data-dcnode-id="4861"><span data-dcnode-id="4864" instrument_node="">With all the news about sanctions on Russian oligarchs, seizing their super yachts and chasing their extremely murky finances all over the planet, it’s worth noting that flat, boring South Dakota is today a rival to Switzerland when it comes to — let’s call it what it is —</span><em data-dcnode-id="4862"><span data-dcnode-id="4863" instrument_node=""> hiding money.</span></em></p><span data-dcnode-id="4860" instrument_node="">
</span><p data-dcnode-id="4855"><span data-dcnode-id="4859" instrument_node="">Back in the ’80s another Republican governor, Bill Janklow, yet another Republican politician with a notorious driving record — 13 citations — and a guy who while speeding killed a Minnesota motorcyclist on a South Dakota highway, opened the doors to the industry of remarkably air-and-light tight trusts. Over the last ten years alone, as every millionaire-billionaire with a reason to hide money has set up such “legitimate financial tools” the amount of cash stashed in South Dakota has risen seven-fold,</span><a data-dcnode-id="4857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/2019/nov/14/the-great-american-tax-haven-why-the-super-rich-love-south-dakota-trust-laws"><span data-dcnode-id="4858" instrument_node=""> from $50 billion to $355 billion as of late 2020</span></a><span data-dcnode-id="4856" instrument_node="">.</span></p><span data-dcnode-id="4854" instrument_node="">
</span><p data-dcnode-id="4852"><span data-dcnode-id="4853" instrument_node="">That’s a third of a trillion dollars protected from prying eyes and taxes by … South Dakota.</span></p><span data-dcnode-id="4851" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="4849"><img alt="South Dakota Foreign Grantor Trust – Bridgeford Trust Company" data-dcnode-id="4850" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bridgefordtrust.com/wp-content/uploads/2017/11/Foreign-Grantor-Trust-Graphic-1024x640.jpg&amp;raw"></figure><span data-dcnode-id="4848" instrument_node="">
</span><p data-dcnode-id="4846"><span data-dcnode-id="4847" instrument_node="">How much of those billions is utterly nefarious, maybe even from Russian mobsters? No one knows and South Dakota certainly isn’t going to do anything to make it easier for investigators to find out. (Amazingly South Dakota — tough negotiators over there — doesn’t get even the tiniest of a percentage of a taste for hiding all that loot.)</span></p><span data-dcnode-id="4845" instrument_node="">
</span><p data-dcnode-id="4840"><span data-dcnode-id="4844" instrument_node="">It almost goes without saying that aggressive journalism is a deeply endangered species in full-on, proudly red and merrily Trumpian South Dakota of 2022. But </span><a data-dcnode-id="4842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/2019/nov/14/the-great-american-tax-haven-why-the-super-rich-love-south-dakota-trust-laws"><span data-dcnode-id="4843" instrument_node="">there are a few brave souls doing what they can</span></a><span data-dcnode-id="4841" instrument_node="">.</span></p><span data-dcnode-id="4839" instrument_node="">
</span><p data-dcnode-id="4837"><span data-dcnode-id="4838" instrument_node="">South Dakota’s descent into The Alabama of the Midwest was taking root back when Tom Daschle was a top Democrat. But I can only imagine what George McGovern and James Abourezk think of their once dull, fly-over home state?</span></p><span data-dcnode-id="4836" instrument_node="">
</span><p data-dcnode-id="4834"><span data-dcnode-id="4835" instrument_node="">As for us here in Minnesota, thank god we’ve got Wisconsin. </span></p><span data-dcnode-id="4833" instrument_node="">
</span><p data-dcnode-id="4831"><span data-dcnode-id="4832" instrument_node=""> </span></p><span data-dcnode-id="4830" instrument_node="">
</span><p data-dcnode-id="4828"><span data-dcnode-id="4829" instrument_node=""> </span></p><span data-dcnode-id="4827" instrument_node="">
</span><p data-dcnode-id="4825"><span data-dcnode-id="4826" instrument_node=""> </span></p><span data-dcnode-id="4824" instrument_node="">
</span><p data-dcnode-id="4823"></p><span data-dcnode-id="4822" instrument_node="">

</span><article class="post-10769 post type-post status-publish format-standard hentry category-poltiics tag-apollo-10-1-2 tag-nasa tag-richard-linklater" data-dcnode-id="4541" id="post-10769"><span data-dcnode-id="4726" instrument_node="">
</span><header class="entry-header" data-dcnode-id="4695"><span data-dcnode-id="4725" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="4722"><a data-dcnode-id="4723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/remembering-when-crime-didnt-pay/" rel="bookmark"><span data-dcnode-id="4724" instrument_node="">Remembering When Crime Didn’t Pay</span></a></h1><span data-dcnode-id="4721" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="4705"><span data-dcnode-id="4720" instrument_node="">
</span><span class="sep" data-dcnode-id="4718"><span data-dcnode-id="4719" instrument_node="">Posted on </span></span><a data-dcnode-id="4715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/remembering-when-crime-didnt-pay/" rel="bookmark" title="11:19 am"><time class="entry-date" data-dcnode-id="4716" datetime="2022-04-08T11:19:02-05:00"><span data-dcnode-id="4717" instrument_node="">April 8, 2022</span></time></a><span class="by-author" data-dcnode-id="4707"><span data-dcnode-id="4714" instrument_node=""> </span><span class="sep" data-dcnode-id="4712"><span data-dcnode-id="4713" instrument_node=""> by </span></span><span data-dcnode-id="4711" instrument_node=""> </span><span class="author vcard" data-dcnode-id="4708"><a class="url fn n" data-dcnode-id="4709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/author/brian-lambert/" rel="author" title="View all posts by Brian Lambert"><span data-dcnode-id="4710" instrument_node="">Brian Lambert</span></a></span></span><span data-dcnode-id="4706" instrument_node=""> </span></div><span data-dcnode-id="4703" instrument_node="">
</span><div class="comments-link" data-dcnode-id="4697"><span data-dcnode-id="4702" instrument_node="">
</span><a data-dcnode-id="4699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/remembering-when-crime-didnt-pay/%23respond"><span class="leave-reply" data-dcnode-id="4700"><span data-dcnode-id="4701" instrument_node="">Reply</span></span></a><span data-dcnode-id="4698" instrument_node=""> </span></div><span data-dcnode-id="4696" instrument_node="">
</span></header><span data-dcnode-id="4693" instrument_node="">
</span><div class="entry-content" data-dcnode-id="4583"><span data-dcnode-id="4692" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="4688"><img alt="Richard Linklater's new film 'Apollo 10 1/2' premieres at SXSW" data-dcnode-id="4691" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.hdnux.com/photos/01/24/51/37/22190048/3/rawImage.jpg&amp;raw"><figcaption data-dcnode-id="4689"><span data-dcnode-id="4690" instrument_node="">Director Richard Linklater</span></figcaption></figure><span data-dcnode-id="4687" instrument_node="">
</span><p data-dcnode-id="4685"><span data-dcnode-id="4686" instrument_node="">So I’m trying to remember when I stopped believing, “Crime doesn’t pay”? As a teenager, I suppose. But the question connects to why I believed it in the first place? Where did that reassuring, fanciful notion come from in the first place?</span></p><span data-dcnode-id="4684" instrument_node="">
</span><p data-dcnode-id="4682"><span data-dcnode-id="4683" instrument_node="">Mom and Dad? As I recall they were quite clear in their belief that the bastards were always getting away with things. The nuns at St. Joe’s Catholic School? Well, if impure thoughts about cute little Marcia with the pigtails was a crime, I knew for sure I was going to burn in eternal hell. Something in the water in rural Minnesota? Mmm, maybe. It was an awful long ways from the crimes I saw on the evening news.</span></p><span data-dcnode-id="4681" instrument_node="">
</span><p data-dcnode-id="4679"><span data-dcnode-id="4680" instrument_node="">This all rattled through my alleged mind while watching director Richard Linklater’s latest film, “Apollo 10 1/2” on Netflix the other night. For those unfamiliar with Linklater, I regard him as one of the most acute and compassionate observers of modern American mores working today. He’s most famous for films like, “Dazed and Confused”, the “Before Sunrise/Sunset/Midnight” trilogy with Ethan Hawke and Julie Delpy and “Boyhood”, which somehow lost out for Best Picture in 2015. (In 2022 Hollywood it would of course have to be re-titled “Identifies as Non-BinaryHood.”)</span></p><span data-dcnode-id="4678" instrument_node="">
</span><p data-dcnode-id="4676"><span data-dcnode-id="4677" instrument_node="">Technically, “Apollo” is a re-visit of the rotoscope animation Linklater used in his 2001 film “Waking Life”, which explored American culture via dream states. (Highly recommended.)  Thematically though, “Apollo” is one of the most charming and evocative strolls any Boomer can take down through the mediums of an era that formed us far more, says I, than Mom, Dad or any nun or minister.</span></p><span data-dcnode-id="4675" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="4673"><img alt="Apollo 10 1⁄2' review: Richard Linklater's dreams of childhood - Los  Angeles Times" data-dcnode-id="4674" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ca-times.brightspotcdn.com/dims4/default/b775100/2147483647/strip/true/crop/2048x1152%2B0%2B0/resize/1486x836%21/quality/90/%3Furl%3Dhttps%253A%252F%252Fcalifornia-times-brightspot.s3.amazonaws.com%252F4e%252F47%252F944ee3bd40eeafbdd367b5411932%252Fapollotenandahalf2.jpg&amp;raw"></figure><span data-dcnode-id="4672" instrument_node="">
</span><p data-dcnode-id="4670"><span data-dcnode-id="4671" instrument_node="">Set among a big, loving, idiosyncratic family in suburban Houston during the rise of NASA and the race to the moon, it is chock full of references — reminders — of where our arguably naive notions of truth, justice and the American way came from. Which is to say … from television and pop culture, far more than strict, sterile religious authority figures.</span></p><span data-dcnode-id="4669" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="4667"><img alt="Apollo 10½: A Space Age Childhood (2022) - IMDb" data-dcnode-id="4668" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//m.media-amazon.com/images/M/MV5BMDAwODQ1Y2QtMDUxZS00OWVjLThlMDgtN2MyNTBlM2IwNzJkXkEyXkFqcGdeQWxiaWFtb250._V1_.jpg&amp;raw"></figure><span data-dcnode-id="4666" instrument_node="">
</span><p data-dcnode-id="4664"><span data-dcnode-id="4665" instrument_node="">The story — built around one of the son’s/narrator’s fantasy of being sent to the moon before Apollo 11 — is basically a hang-out with the family enjoying the innocence of the era. Its like a long, carefree summer full of TV shows — “I Dream of Jeannie”, “Bewitched”, “Bonanza”, “Gunsmoke”. Pop music like “Sugar, Sugar” by The Archies, Herb Alpert’s “Whipped Cream and Other Delights”, Janis Joplin on Dick Cavett. And movies like “The Shakiest Gun in the West” (at the drive-in where half the kids are snuck in under blankets in the back of Dad’s station wagon) and “2001” (with the narrator trying to explain the ending to his glazey-eyed buddy.) And days at space-themed amusement parks like AstroWorld.</span></p><span data-dcnode-id="4663" instrument_node="">
</span><p data-dcnode-id="4661"><span data-dcnode-id="4662" instrument_node="">It’s a lovely little film, full of bittersweet nostalgia.</span></p><span data-dcnode-id="4660" instrument_node="">
</span><p data-dcnode-id="4658"><span data-dcnode-id="4659" instrument_node="">Bittersweet, because I wonder what 10 year-old now, much less any 16 year-old still believes “crime doesn’t pay” or that “the bad guys always lose in the end.”?</span></p><span data-dcnode-id="4657" instrument_node="">
</span><p data-dcnode-id="4655"><span data-dcnode-id="4656" instrument_node="">What sort of sensory deprivation would such a kid have to be living in to not see:</span></p><span data-dcnode-id="4654" instrument_node="">
</span><p data-dcnode-id="4652"><span data-dcnode-id="4653" instrument_node="">The President of the United States, defeated in a fair election, set off a riot at the Capitol and (to date) face no consequences for it?</span></p><span data-dcnode-id="4651" instrument_node="">
</span><p data-dcnode-id="4649"><span data-dcnode-id="4650" instrument_node="">Or the same guy on TV, lying to everyone’s face thousands of times a year, killing tens of thousands of his own voters with venality and gross incompetence, not to mention defrauding banks and insurance companies for years and avoiding any kind of day of reckoning?</span></p><span data-dcnode-id="4648" instrument_node="">
</span><p data-dcnode-id="4646"><span data-dcnode-id="4647" instrument_node="">Or watch greed-crazed bankers and manipulators crash a world economy without a single top executive ever going to jail?</span></p><span data-dcnode-id="4645" instrument_node="">
</span><p data-dcnode-id="4643"><span data-dcnode-id="4644" instrument_node="">Or a dumb kid practically their age kill a couple people with a rifle in full view of police and be acquitted by a jury of his peers?</span></p><span data-dcnode-id="4642" instrument_node="">
</span><p data-dcnode-id="4640"><span data-dcnode-id="4641" instrument_node="">Or, hell, a Russian sociopath unleashing genocide on a neighboring country and continuing to enjoy the fruits of two decades of outrageous kleptocracy?</span></p><span data-dcnode-id="4639" instrument_node="">
</span><p data-dcnode-id="4637"><span data-dcnode-id="4638" instrument_node="">The sweet summery innocence Richard Linklater shows in “Apollo 10 1/2” was of course an illusion even then.</span></p><span data-dcnode-id="4636" instrument_node="">
</span><p data-dcnode-id="4634"><span data-dcnode-id="4635" instrument_node="">But I can’t help but think that the illusions of Boomer youth were stronger and therefore more real than whatever lessons the kids of 2022 are taking away from what they’re watching today.  </span></p><span data-dcnode-id="4633" instrument_node="">
</span><p data-dcnode-id="4632"></p><span data-dcnode-id="4631" instrument_node="">
</span><p data-dcnode-id="4630"></p><span data-dcnode-id="4629" instrument_node="">
</span><p data-dcnode-id="4628"></p><span data-dcnode-id="4627" instrument_node="">

</span><header class="entry-header" data-dcnode-id="4508"><span data-dcnode-id="4537" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="4534"><a data-dcnode-id="4535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/boring-biden/" rel="bookmark"><span data-dcnode-id="4536" instrument_node="">Biden’s Real Problem</span></a></h1><span data-dcnode-id="4533" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="4517"><span data-dcnode-id="4532" instrument_node="">
</span><span class="sep" data-dcnode-id="4530"><span data-dcnode-id="4531" instrument_node="">Posted on </span></span><a data-dcnode-id="4527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/boring-biden/" rel="bookmark" title="2:52 pm"><time class="entry-date" data-dcnode-id="4528" datetime="2022-04-06T14:52:57-05:00"><span data-dcnode-id="4529" instrument_node="">April 6, 2022</span></time></a><span class="by-author" data-dcnode-id="4519"><span data-dcnode-id="4526" instrument_node=""> </span><span class="sep" data-dcnode-id="4524"><span data-dcnode-id="4525" instrument_node=""> by </span></span><span data-dcnode-id="4523" instrument_node=""> </span><span class="author vcard" data-dcnode-id="4520"><a class="url fn n" data-dcnode-id="4521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/author/admin/" rel="author" title="View all posts by Joe Loveland"><span data-dcnode-id="4522" instrument_node="">Joe Loveland</span></a></span></span><span data-dcnode-id="4518" instrument_node=""> </span></div><span data-dcnode-id="4515" instrument_node="">
</span><div class="comments-link" data-dcnode-id="4510"><span data-dcnode-id="4514" instrument_node="">
</span><a data-dcnode-id="4512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/boring-biden/%23comments"><span data-dcnode-id="4513" instrument_node="">1</span></a><span data-dcnode-id="4511" instrument_node=""> </span></div><span data-dcnode-id="4509" instrument_node="">
</span></header><span data-dcnode-id="4506" instrument_node="">
</span><div class="entry-content" data-dcnode-id="4385"><span data-dcnode-id="4505" instrument_node="">
</span><p data-dcnode-id="4503" style="text-align:center"><span data-dcnode-id="4504" instrument_node="">Guest post by Noel Holston</span></p><span data-dcnode-id="4502" instrument_node="">
</span><p data-dcnode-id="4500"><span data-dcnode-id="4501" instrument_node="">You know what
Joe Biden’s biggest problem is? He’s boring.</span></p><span data-dcnode-id="4499" instrument_node="">
</span><p data-dcnode-id="4497"><span data-dcnode-id="4498" instrument_node="">That ought to be a good thing, because he’s boring in the positive sense of the term, boring like President Dwight D. Eisenhower was boring. Like Ike, Joe gets things done, maintains his composure, doesn’t dance.</span></p><span data-dcnode-id="4496" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="4494"><img alt="" class="wp-image-10765" data-attachment-id="10765" data-comments-opened="1" data-dcnode-id="4495" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image" data-large-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/04/image-1024x680.png" data-medium-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/04/image-300x199.png" data-orig-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/04/image.png" data-orig-size="3458,2296" data-permalink="https://www.wrywingpolitics.com/boring-biden/image-5/" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/wp-content/uploads/2022/04/image-1024x680.png&amp;raw" srcset="https://www.wrywingpolitics.com/wp-content/uploads/2022/04/image-1024x680.png 1024w, https://www.wrywingpolitics.com/wp-content/uploads/2022/04/image-300x199.png 300w, https://www.wrywingpolitics.com/wp-content/uploads/2022/04/image-768x510.png 768w, https://www.wrywingpolitics.com/wp-content/uploads/2022/04/image-452x300.png 452w"></figure><span data-dcnode-id="4493" instrument_node="">
</span><p data-dcnode-id="4492"></p><span data-dcnode-id="4491" instrument_node="">
</span><p data-dcnode-id="4489"><span data-dcnode-id="4490" instrument_node="">Remember how
they called Biden’s Democratic predecessor “no drama Obama”? Comparatively
speaking, Obama is Jim Carrey to Joe’s Gary Cooper.</span></p><span data-dcnode-id="4488" instrument_node="">
</span><p data-dcnode-id="4483"><span data-dcnode-id="4487" instrument_node="">Some of us
believed that this was what we wanted — and what the nation needed — after four
years of Donald J. Trump’s tweeting, bleating, bragging, lying, bitching and
preening. But whether you worshiped The Donald or recoiled at the sight of him,
he got us all accustomed to having a President who was a noisy, ongoing public
spectacle, a </span><em data-dcnode-id="4485"><span data-dcnode-id="4486" instrument_node="">Fast and Furious</span></em><span data-dcnode-id="4484" instrument_node=""> binge-watch.</span></p><span data-dcnode-id="4482" instrument_node="">
</span><p data-dcnode-id="4480"><span data-dcnode-id="4481" instrument_node="">Trump only
accelerated a trend, however. Climb aboard the Wayback Machine with me for a
moment.</span></p><span data-dcnode-id="4479" instrument_node="">
</span><p data-dcnode-id="4477"><span data-dcnode-id="4478" instrument_node="">Barrack Obama
didn’t call himself a rock star or sell himself as such, but once the label was
suggested, he took to the role with ease and enthusiasm. Silver spooner George
W. Bush had has good ol’ boy act and his flight suit. Bill Clinton had his
Arkansas drawl, his sax and his sex appeal. Ronald Reagan was our first
“acting” President.</span></p><span data-dcnode-id="4476" instrument_node="">
</span><p data-dcnode-id="4474"><span data-dcnode-id="4475" instrument_node="">The trend is
usually traced back to JFK. He was our first made-by-TV President, quick with
the quip, athletic, married to glamour. He probably wouldn’t have beaten
Richard Nixon — a one-man psychodrama to come — if he hadn’t been better
looking.</span></p><span data-dcnode-id="4473" instrument_node="">
</span><p data-dcnode-id="4471"><span data-dcnode-id="4472" instrument_node="">Biden, then, is
at a distinct disadvantage. He’s just plain Joe, and he’s gotten plainer and
paler and slower moving with age.</span></p><span data-dcnode-id="4470" instrument_node="">
</span><p data-dcnode-id="4468"><span data-dcnode-id="4469" instrument_node="">Which is not to
say he’s incompetent. Far from it. It’s just that he doesn’t make the applause
meters go haywire. As result, his administration’s real, impressive
accomplishments don’t get the respect they’re due.</span></p><span data-dcnode-id="4467" instrument_node="">
</span><p data-dcnode-id="4465"><span data-dcnode-id="4466" instrument_node="">He’s been
President 14 months. He got his historic, decades overdue infrastructure bill
passed in 10. The Affordable Health Care Act — Obamacare — took 14.</span></p><span data-dcnode-id="4464" instrument_node="">
</span><p data-dcnode-id="4462"><span data-dcnode-id="4463" instrument_node="">Dealing with the
pandemic, Biden has acted methodically and scientifically to limit the spread
and slow the Covid death toll despite the efforts of the anti-maskers and
anti-vaxxers that his predecessor had encouraged.</span></p><span data-dcnode-id="4461" instrument_node="">
</span><p data-dcnode-id="4456"><span data-dcnode-id="4460" instrument_node="">On his greatest
foreign policy challenge, Biden has been caught between Americans who want us
to boot the Russians out of Ukraine militarily and the who’d like a Putin type,
if not Putin himself, to be</span><em data-dcnode-id="4458"><span data-dcnode-id="4459" instrument_node=""> our</span></em><span data-dcnode-id="4457" instrument_node=""> President. And that’s just the
Republicans.</span></p><span data-dcnode-id="4455" instrument_node="">
</span><p data-dcnode-id="4453"><span data-dcnode-id="4454" instrument_node="">Still, Biden has
handled the crisis with resolve and caution, encouraging our NATO allies
without hogging the spotlight. His worst “gaffe,” supposedly, was to intimate
that Vladimir Putin murderous assault cannot be forgiven. I’ll take a President
who feels moral outrage over one who’s morally outrageous any day.</span></p><span data-dcnode-id="4452" instrument_node="">
</span><p data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">Biden’s great
bungle, supposedly, was our military withdrawal from Afghanistan last year. It
probably could have been handled better, though whatever “better” might have
looked like would have been panned in some quarters anyway.</span></p><span data-dcnode-id="4449" instrument_node="">
</span><p data-dcnode-id="4447"><span data-dcnode-id="4448" instrument_node="">Just don’t
forget that he bit that bullet, shouldered that responsibility, and foreclosed
a boondoggle that three previous Presidents did not. And in doing so, he
incalculably improved the standing from which we could condemn Russia’s
aggression in Ukraine.</span></p><span data-dcnode-id="4446" instrument_node="">
</span><p data-dcnode-id="4444"><span data-dcnode-id="4445" instrument_node="">Yes, inflation
is cancelling some of the gains of an otherwise booming economy, and while
economists point out that pent-up pandemic demand and complicated supply chain
snarls would be inflationary factors no matter who was President, Biden is the
one who (really, truly) won the election. Inflation is his problem to deal
with, and he is.</span></p><span data-dcnode-id="4443" instrument_node="">
</span><p data-dcnode-id="4441"><span data-dcnode-id="4442" instrument_node="">He hasn’t fixed
immigration, reversed income inequality, halted climate change, stopped crime
or cured cancer yet, either, but he has committed to those fights. And he
hasn’t even served half his term yet.</span></p><span data-dcnode-id="4440" instrument_node="">
</span><p data-dcnode-id="4438"><span data-dcnode-id="4439" instrument_node="">His approval
rating is stuck at a worrisome 41 percent, but I’d wager that if he just
weren’t so unexciting, he’d be 10 or 15 points higher.</span></p><span data-dcnode-id="4437" instrument_node="">
</span><p data-dcnode-id="4435"><span data-dcnode-id="4436" instrument_node="">Maybe if he dyed
his hair an unnatural color and learned to play the saxophone.</span></p><span data-dcnode-id="4434" instrument_node="">
</span><p data-dcnode-id="4432"><span data-dcnode-id="4433" instrument_node="">We do love a show.</span></p><span data-dcnode-id="4431" instrument_node="">
</span><p data-dcnode-id="4430"></p><span data-dcnode-id="4429" instrument_node="">
</span><p data-dcnode-id="4419"><em data-dcnode-id="4427"><span data-dcnode-id="4428" instrument_node="">Note: Noel&nbsp;</span></em><span data-dcnode-id="4426" instrument_node="">H</span><em data-dcnode-id="4421"><span data-dcnode-id="4425" instrument_node="">olston is a freelance writer who lives in Athens, Georgia. He regularly shares his brilliance and wit at Wry Wing Politics.  He’s also a contributing essayist to&nbsp;Medium.com, TVWorthWatching.com,&nbsp;and other websites.&nbsp;He previously wrote about television and radio at Newsday (200-2005) and, as a crosstown counterpart to the Pioneer Press’s Brian Lambert, at the Star Tribune &nbsp;(1986-2000). &nbsp;He’s the author&nbsp;of&nbsp;</span><a data-dcnode-id="4423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newsday.com/entertainment/books/life-after-deaf-noel-holston-1.39152688"><span data-dcnode-id="4424" instrument_node="">“Life After Deaf: My Misadventures in Hearing Loss and Recovery</span></a><span data-dcnode-id="4422" instrument_node="">,” by Skyhorse.</span></em><br data-dcnode-id="4420"></p><span data-dcnode-id="4418" instrument_node="">
</span><div class="sharedaddy sd-sharing-enabled" data-dcnode-id="4387"><div class="robots-nocontent sd-block sd-social sd-social-icon-text sd-sharing" data-dcnode-id="4388"><h3 class="sd-title" data-dcnode-id="4416"><span data-dcnode-id="4417" instrument_node="">Share this:</span></h3><div class="sd-content" data-dcnode-id="4389"><ul data-dcnode-id="4390"><li class="share-linkedin" data-dcnode-id="4412"><a class="share-linkedin sd-button share-icon" data-dcnode-id="4413" data-shared="sharing-linkedin-10764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/boring-biden/%3Fshare%3Dlinkedin%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on LinkedIn"><span data-dcnode-id="4414"><span data-dcnode-id="4415" instrument_node="">LinkedIn</span></span></a></li><li class="share-facebook" data-dcnode-id="4408"><a class="share-facebook sd-button share-icon" data-dcnode-id="4409" data-shared="sharing-facebook-10764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/boring-biden/%3Fshare%3Dfacebook%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Facebook"><span data-dcnode-id="4410"><span data-dcnode-id="4411" instrument_node="">Facebook</span></span></a></li><li class="share-print" data-dcnode-id="4404"><a class="share-print sd-button share-icon" data-dcnode-id="4405" data-shared="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/boring-biden/" rel="nofollow noopener noreferrer" target="_blank" title="Click to print"><span data-dcnode-id="4406"><span data-dcnode-id="4407" instrument_node="">Print</span></span></a></li><li class="share-twitter" data-dcnode-id="4400"><a class="share-twitter sd-button share-icon" data-dcnode-id="4401" data-shared="sharing-twitter-10764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpol </span><article class="post-10755 post type-post status-publish format-standard hentry category-poltiics tag-andrei-rublev tag-david-remnick tag-putin tag-russia tag-stephen-kotkin tag-ukraine" data-dcnode-id="4164" id="post-10755"><span data-dcnode-id="4357" instrument_node="">
</span><header class="entry-header" data-dcnode-id="4333"><span data-dcnode-id="4356" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="4353"><a data-dcnode-id="4354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/russias-great-shame/" rel="bookmark"><span data-dcnode-id="4355" instrument_node="">Russia’s Great Shame</span></a></h1><span data-dcnode-id="4352" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="4336"><span data-dcnode-id="4351" instrument_node="">
</span><span class="sep" data-dcnode-id="4349"><span data-dcnode-id="4350" instrument_node="">Posted on </span></span><a data-dcnode-id="4346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/russias-great-shame/" rel="bookmark" title="11:27 am"><time class="entry-date" data-dcnode-id="4347" datetime="2022-03-21T11:27:51-05:00"><span data-dcnode-id="4348" instrument_node="">March 21, 2022</span></time></a><span class="by-author" data-dcnode-id="4338"><span data-dcnode-id="4345" instrument_node=""> </span><span class="sep" data-dcnode-id="4343"><span data-dcnode-id="4344" instrument_node=""> by </span></span><span data-dcnode-id="4342" instrument_node=""> </span><span class="author vcard" data-dcnode-id="4339"><a class="url fn n" data-dcnode-id="4340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/author/brian-lambert/" rel="author" title="View all posts by Brian Lambert"><span data-dcnode-id="4341" instrument_node="">Brian Lambert</span></a></span></span><span data-dcnode-id="4337" instrument_node=""> </span></div><span data-dcnode-id="4334" instrument_node="">
</span></header><span data-dcnode-id="4331" instrument_node="">
</span><div class="entry-content" data-dcnode-id="4207"><span data-dcnode-id="4330" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="4328"><img alt="andrei rublev tarkovsky - Google Search | Film, Klasik filmler, Klasik" data-dcnode-id="4329" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.pinimg.com/originals/43/58/a9/4358a9df082b6e962094563fbd27e086.jpg&amp;raw"></figure><span data-dcnode-id="4327" instrument_node="">
</span><p data-dcnode-id="4325"><span data-dcnode-id="4326" instrument_node="">Among the torrent of stories coming out of Russia’s invasion of Ukraine — military atrocities, blunders, sanctions, seized super-yachts, top-level spies and generals under house arrest and on and on, are regular reports of Russians, captured soldiers but self-exiled Russians in particular, expressing shame. Shame for what their country is doing and for what they didn’t do to prevent it.</span></p><span data-dcnode-id="4324" instrument_node="">
</span><p data-dcnode-id="4322"><span data-dcnode-id="4323" instrument_node="">You don’t have to be raised Catholic to agree that shame is a powerful human emotion. Few emotions motivate civilized people more. (My Jewish friends and I argue over who was raised in a denser cult of shame. But that’s a topic for another day.)</span></p><span data-dcnode-id="4321" instrument_node="">
</span><p data-dcnode-id="4316"><span data-dcnode-id="4320" instrument_node="">Simultaneous with these stories, I dropped in my DVD of </span><a data-dcnode-id="4318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.criterion.com/films/300-andrei-rublev"><span data-dcnode-id="4319" instrument_node="">“Andrei Rublev”</span></a><span data-dcnode-id="4317" instrument_node=""> , the classic 1966 film that is really more of a biography of 15th century Russia than the legendary painter of Eastern Orthodox icons. I don’t expect many of you to have have seen it, although I encourage you to give it a try. All three and half hours of it. (Shot in 2:35:1 “CinemaScope” black and white by the equally legendary Andrei Tarkovsky. ) Along with its mesmerizing imagery and epic scale, the film is often mentioned as the most vivid depiction of medieval Russian rural life ever put on film.</span></p><span data-dcnode-id="4315" instrument_node="">
</span><p data-dcnode-id="4313"><span data-dcnode-id="4314" instrument_node="">And, following the life of the ever-conscience stricken monk, Rublev, it simmers in shame.</span></p><span data-dcnode-id="4312" instrument_node="">
</span><p data-dcnode-id="4310"><span data-dcnode-id="4311" instrument_node="">The question I’ve been asking myself as I follow Putin’s invasion is, “What responsibility do common Russians have for what their leaders are doing in their name … again?” And, is it ever fair (or meaningful) to hold an entire culture responsible, with shaming, for repeated cycles of kleptocracy, despotism and psychopathology in its ruling class?</span></p><span data-dcnode-id="4309" instrument_node="">
</span><p data-dcnode-id="4307"><span data-dcnode-id="4308" instrument_node="">I ask this because Russia, of the world’s so-called “great powers”, is demonstrating again that it is unique in its inability to prevent regular devolutions into violent autocracy.</span></p><span data-dcnode-id="4306" instrument_node="">
</span><p data-dcnode-id="4304"><span data-dcnode-id="4305" instrument_node="">“Andrei Rublev” opens in 1400 with the peasant class living in farm animal squallor, periodically raided by rival villages if not Tartars from the Far East and wholly subservient to a regal class defending its status with vicious militaristic policing. Midway the film depicts the 1408 sacking of the city of Vladimir, organized by a Russian prince conspiring with marauding Tartars, in an attempt to kill his twin brother. (Although financed by the Soviet bureaucracy, Leonid Brezhnev’s Kremlin refused to release the film for years and cut it by almost 50%. The Criterion edition runs the original, full 209 minutes.)</span></p><span data-dcnode-id="4303" instrument_node="">
</span><p data-dcnode-id="4301"><span data-dcnode-id="4302" instrument_node="">And 1400 was already at least five centuries into Russia’s organized despotism, not even halfway through, with the calamitous eras of Ivan the Terrible, Peter the Great, various weaker but no less vicious Czars, Josef Stalin, the grim, grey Soviets and now … Vladimir Putin still to come. In all, a truly remarkable thousand-year cavalcade of sociopaths … accepted, tolerated and often revered.</span></p><span data-dcnode-id="4300" instrument_node="">
</span><p data-dcnode-id="4298"><span data-dcnode-id="4299" instrument_node="">The informed will argue, “But every culture experiences this!” And the most woke liberals will point out the United States’ genocide of the Indians, racism toward Blacks and innumerable military misadventures. All of which is fair. As is the fact that Russia’s history is pock-marked with invasions from almost every direction.</span></p><span data-dcnode-id="4297" instrument_node="">
</span><p data-dcnode-id="4295"><span data-dcnode-id="4296" instrument_node="">But I still believe Russia is different. Not only is the violence of Russia’s despots borderline irrational and invariably unapologetic, but the common Russian, even today, in an era of Twitter, TikTok, McDonalds and Boeing jets, remains largely subdued, cowed and mute. For all our failures, the West, meaning the US, Europe, Japan, the Commonwealth and the like, has largely brought what you might call “the despotic impulse” under control.  Certainly to the point where one man, a flagrant gangster, is not likely to be able to commandeer a vast army to attack a neighbor. Even repressive China sees that a better, stronger (near-term) future lies in providing cheap manufacturing for Western corporations.</span></p><span data-dcnode-id="4294" instrument_node="">
</span><p data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">So what is about Russian psychology that keeps its culture in this endlessly repeating, violent, self-destructive trap?</span></p><span data-dcnode-id="4291" instrument_node="">
</span><p data-dcnode-id="4289"><span data-dcnode-id="4290" instrument_node="">I’m asking. I don’t know.</span></p><span data-dcnode-id="4288" instrument_node="">
</span><p data-dcnode-id="4283"><span data-dcnode-id="4287" instrument_node="">But the eminent Russian </span><a data-dcnode-id="4285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/news/q-and-a/stephen-kotkin-putin-russia-ukraine-stalin"><span data-dcnode-id="4286" instrument_node="">historian Stephen Kotkin</span></a><span data-dcnode-id="4284" instrument_node="">, recently interviewed by New Yorker editor and Russian authority in his own right, David Remnick, suggested that in addition to Russians’ historically heavy indoctrination in threats from “others”, they have also been fed a wildly disproportionate belief in their “exceptionalism.” (The FoxNews, American right-wing echo chamber comparison is right there to behold in all its naked ignominy.) </span></p><span data-dcnode-id="4282" instrument_node="">
</span><p data-dcnode-id="4280"><span data-dcnode-id="4281" instrument_node="">It’s as though having produced Rublev, Rachmaninoff, Tolstoy, Dostoevsky, Sakharov and Tarkovsky (indisputably one of film world’s all time greats) they believe themselves every bit the cultural, technological and inventive equal of democracies like the United States, Britain, etc.</span></p><span data-dcnode-id="4279" instrument_node="">
</span><p data-dcnode-id="4274"><span data-dcnode-id="4278" instrument_node="">(Kotkin is a fellow at the Hoover Institute and has been regularly interviewed on all things Russian. </span><a data-dcnode-id="4276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DylaC0MUleZs"><span data-dcnode-id="4277" instrument_node="">Here’s one recent video.</span></a><span data-dcnode-id="4275" instrument_node="">)  </span></p><span data-dcnode-id="4273" instrument_node="">
</span><p data-dcnode-id="4271"><span data-dcnode-id="4272" instrument_node="">The problem, says Kotkin, is that they are not. Not even close. Their repeated cycles of repression, kleptocratic corruption and violence pushes them back every time — as with Gorbachev — they showed the possibility of shaking off neo-Czar-ism or whatever you might want to call it. Consequently, because it regularly slides back into medieval tyranny and isolation, Russia simply hasn’t achieved like the “super power” it insists it is. </span></p><span data-dcnode-id="4270" instrument_node="">
</span><p data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">And today — with the world watching horrified and in real time as Russia bombards maternity hospitals in an obscenely irrational assault on a peaceful-enough neighbor — the shunning and shaming of Russia, all Russians, not just Putin, is going to be worse and more immediately punishing than it has ever been.</span></p><span data-dcnode-id="4267" instrument_node="">
</span><p data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">So the mostly younger, urban, elite, “modernist” class — the very people a retrograde culture needs to shake off the “despotic impulse” — is fleeing Russia in droves unlikely to ever return. (If you were young and bright how long would you wait abroad before you were convinced Father Russia had fully and permanently exorcised Putinism?)</span></p><span data-dcnode-id="4264" instrument_node="">
</span><p data-dcnode-id="4262"><span data-dcnode-id="4263" instrument_node="">From Turkey, or Europe or wherever will take them, they’re looking back, rightfully ashamed at their native land for what is doing, again, and for what they didn’t do to stop it from doing … again.   </span></p><span data-dcnode-id="4261" instrument_node="">
</span><p data-dcnode-id="4260"></p><span data-dcnode-id="4259" instrument_node="">
</span><p data-dcnode-id="4257"><span data-dcnode-id="4258" instrument_node=""> </span></p><span data-dcnode-id="4256" instrument_node="">
</span><p data-dcnode-id="4254"><span data-dcnode-id="4255" instrument_node=""> </span></p><span data-dcnode-id="4253" instrument_node="">
