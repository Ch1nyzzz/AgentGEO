</span><header class="entry-header" data-dcnode-id="4137"><span data-dcnode-id="4160" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="4157"><a data-dcnode-id="4158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/lt-governor-matt-birk-we-need-to-know-a-lot-more/" rel="bookmark"><span data-dcnode-id="4159" instrument_node="">Lt. Governor Matt Birk?  We Need to Know a Lot More</span></a></h1><span data-dcnode-id="4156" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="4140"><span data-dcnode-id="4155" instrument_node="">
</span><span class="sep" data-dcnode-id="4153"><span data-dcnode-id="4154" instrument_node="">Posted on </span></span><a data-dcnode-id="4150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/lt-governor-matt-birk-we-need-to-know-a-lot-more/" rel="bookmark" title="9:01 am"><time class="entry-date" data-dcnode-id="4151" datetime="2022-03-11T09:01:47-05:00"><span data-dcnode-id="4152" instrument_node="">March 11, 2022</span></time></a><span class="by-author" data-dcnode-id="4142"><span data-dcnode-id="4149" instrument_node=""> </span><span class="sep" data-dcnode-id="4147"><span data-dcnode-id="4148" instrument_node=""> by </span></span><span data-dcnode-id="4146" instrument_node=""> </span><span class="author vcard" data-dcnode-id="4143"><a class="url fn n" data-dcnode-id="4144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/author/admin/" rel="author" title="View all posts by Joe Loveland"><span data-dcnode-id="4145" instrument_node="">Joe Loveland</span></a></span></span><span data-dcnode-id="4141" instrument_node=""> </span></div><span data-dcnode-id="4138" instrument_node="">
</span></header><span data-dcnode-id="4135" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3968"><span data-dcnode-id="4134" instrument_node="">
</span><p data-dcnode-id="4126"><span data-dcnode-id="4133" instrument_node="">Former Minnesota State Senator Scott Jensen (R-Chaska) </span><a data-dcnode-id="4131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.twincities.com/2022/03/08/scott-jensen-picks-ex-viking-matt-birk-as-running-mate-in-campaign-for-governor/"><span data-dcnode-id="4132" instrument_node="">announced</span></a><span data-dcnode-id="4130" instrument_node=""> who he believes is the second most qualified Minnesotan, after him, to run Minnesota’s state government during very challenging times.&nbsp;&nbsp;Jensen picked — </span><a data-dcnode-id="4128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.startribune.com/sounding-the-gjallarhorn-powerful-vikings-pregame-tradition-since-2007/571412602/"><span data-dcnode-id="4129" instrument_node="">fake gjallarhorn</span></a><span data-dcnode-id="4127" instrument_node="">, please! — the Minnesota Vikings’ former Center Matt Birk.&nbsp; </span></p><span data-dcnode-id="4125" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="4123"><img alt="" class="wp-image-10737" data-attachment-id="10737" data-comments-opened="1" data-dcnode-id="4124" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Screen-Shot-2022-03-10-at-3.12.50-PM" data-large-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/03/Screen-Shot-2022-03-10-at-3.12.50-PM-e1647007667256.png" data-medium-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/03/Screen-Shot-2022-03-10-at-3.12.50-PM-199x300.png" data-orig-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/03/Screen-Shot-2022-03-10-at-3.12.50-PM-e1647007667256.png" data-orig-size="427,643" data-permalink="https://www.wrywingpolitics.com/lt-governor-matt-birk-we-need-to-know-a-lot-more/screen-shot-2022-03-10-at-3-12-50-pm/" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/wp-content/uploads/2022/03/Screen-Shot-2022-03-10-at-3.12.50-PM.png&amp;raw"></figure><span data-dcnode-id="4122" instrument_node="">
</span><p data-dcnode-id="4117"><span data-dcnode-id="4121" instrument_node="">A celebrity!  Intriguing!  Fresh! </span><br data-dcnode-id="4120"><br data-dcnode-id="4119"><span data-dcnode-id="4118" instrument_node="">An all-white male ticket!  That has got to be first for Republicans, right?</span></p><span data-dcnode-id="4116" instrument_node="">
</span><p data-dcnode-id="4111"><span data-dcnode-id="4115" instrument_node="">Predictably, the Birk announcement got a lot of uncritical news coverage in Minnesota, particularly from local TV and radio newsrooms.&nbsp; These are some of the same </span><a data-dcnode-id="4113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.urbandictionary.com/define.php%3Fterm%3Djock%2520sniffer"><span data-dcnode-id="4114" instrument_node="">jock sniffers</span></a><span data-dcnode-id="4112" instrument_node=""> who spend roughly one-third of most news broadcasts building up local athletes as heroes.  </span></p><span data-dcnode-id="4110" instrument_node="">
</span><p data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">And who knows, the Birk stunt just might work, politically speaking.&nbsp; After all, this is a state that “shocked the world” and elected an outlandish and churlish former fake wrestler, and then was shocked when he turned out to be an outlandish and churlish fake Governor.</span></p><span data-dcnode-id="4107" instrument_node="">
</span><p data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">To be fair, Birk is certainly no Ventura. The Saint Paul native is Harvard educated, and not clownish like Ventura . He’s also done a lot of admirable charitable work in the community. On many levels, I admire him.  </span></p><span data-dcnode-id="4104" instrument_node="">
</span><p data-dcnode-id="4102"><span data-dcnode-id="4103" instrument_node="">But he’s applying to be Governor, and he is largely an unknown quantity on policy issues.  So maybe the local media should pump the breaks just a bit on the Birk bandwagon. You know, like maybe ask him a few questions about his actual plans and positions?&nbsp; </span></p><span data-dcnode-id="4101" instrument_node="">
</span><p data-dcnode-id="4098" style="text-align:center"><strong data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">Reasons for Skepticism</span></strong></p><span data-dcnode-id="4097" instrument_node="">
</span><p data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">Here’s a few reasons why skepticism is warranted:</span></p><span data-dcnode-id="4094" instrument_node="">
</span><p data-dcnode-id="4075"><strong data-dcnode-id="4092"><span data-dcnode-id="4093" instrument_node="">He’s  an Extremist Abortion Banner</span></strong><span data-dcnode-id="4091" instrument_node="">.&nbsp; One of the few Birk policy positions we know about is that he supports overturning the 1973 Roe v. Wade U.S. Supreme Court decision that legalized abortion during the first trimester of pregnancy.&nbsp; Birk feels so strongly about this that he </span><a data-dcnode-id="4089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nfl.com/news/matt-birk-explains-skipping-ravens-white-house-visit-0ap1000000209977"><span data-dcnode-id="4090" instrument_node="">refused</span></a><span data-dcnode-id="4088" instrument_node=""> to join his Baltimore Ravens teammates in being honored at the White House, because Birk would have had to stand in proximity with then-President Barack Obama, who opposes overturning Roe. &nbsp;</span><br data-dcnode-id="4087"><br data-dcnode-id="4086"><span data-dcnode-id="4085" instrument_node="">Citizen Birk obviously had every right to express that opinion.  But he is now applying to be Lieutenant Governor for all of Minnesota, and this position puts him at odds with the a huge majority of the people he seeks to represent.  Surveys show that two-thirds (67%) of Minnesotans </span><a data-dcnode-id="4083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unrestrictmn.org/wp-content/uploads/2019/09/PerryUndem_MNVotersSurvey_2019.pdf"><span data-dcnode-id="4084" instrument_node="">oppose</span></a><span data-dcnode-id="4082" instrument_node=""> overturning Roe.&nbsp; </span><br data-dcnode-id="4081"><br data-dcnode-id="4080"><span data-dcnode-id="4079" instrument_node="">At a time when it looks </span><a data-dcnode-id="4077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/news/daily-comment/the-supreme-court-looks-ready-to-overturn-roe"><span data-dcnode-id="4078" instrument_node="">likely</span></a><span data-dcnode-id="4076" instrument_node=""> that the court is about to overturn Roe and start allowing state governments to take away women’s abortion rights, Birk’s refusal to listen to two-thirds of his constituents on this timely issue is a particularly big deal.</span></p><span data-dcnode-id="4074" instrument_node="">
</span><p data-dcnode-id="4055"><strong data-dcnode-id="4072"><span data-dcnode-id="4073" instrument_node="">He’s an Extremist Marriage Equality</span></strong><span data-dcnode-id="4071" instrument_node=""> </span><strong data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">Banner</span></strong><span data-dcnode-id="4068" instrument_node="">.&nbsp; Abortion isn’t the only issue where Birk is out of step with a majority of Minnesotans.  In 2012, he very actively </span><a data-dcnode-id="4066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.startribune.com/nfl-s-matt-birk-let-s-protect-marriage-and-speech/171850721/"><span data-dcnode-id="4067" instrument_node="">campaigned</span></a><span data-dcnode-id="4065" instrument_node=""> in favor of the&nbsp;Minnesota Marriage Amendment&nbsp;that would have changed the Minnesota constitution to specifically prohibit marriage equality for same-sex couples.&nbsp; </span><br data-dcnode-id="4064"><br data-dcnode-id="4063"><span data-dcnode-id="4062" instrument_node="">Once again, Birk is on the right wing fringe, ignoring the opinions of two-thirds of his would-be constituents. A 2018 </span><a data-dcnode-id="4060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outleadership.com/states/minnesota/"><span data-dcnode-id="4061" instrument_node="">poll</span></a><span data-dcnode-id="4059" instrument_node=""> shows 67 percent of Minnesotans support same sex marriage.&nbsp; </span><br data-dcnode-id="4058"><br data-dcnode-id="4057"><span data-dcnode-id="4056" instrument_node="">Birk’s positions on abortion rights and marriage equality would seem to portend how he would come down on other socially conservative changes being pushed by the far-right, such as book banning and “don’t say gay” laws.</span></p><span data-dcnode-id="4054" instrument_node="">
</span><p data-dcnode-id="4050"><strong data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">He’s Unqualified for the Job.</span></strong><span data-dcnode-id="4051" instrument_node="">  Then there’s the small matter of qualifications.  Birk currently has as much directly relevant experience to be a heartbeat away from the top position in state government as current Lt. Governor Peggy Flanagan has to be a professional football player. &nbsp;</span></p><span data-dcnode-id="4049" instrument_node="">
</span><p data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">After electing a wealthy celebrity with no governing experience President blew up in the nation’s face, maybe we should be a little more cautious about hiring someone who has never done any actual state governance to lead a very complex $48.5 billion per biennium endeavor.  How many times do we have to make this same mistake?</span></p><span data-dcnode-id="4046" instrument_node="">
</span><p data-dcnode-id="4036"><strong data-dcnode-id="4044"><span data-dcnode-id="4045" instrument_node="">He’s Hitched His Wagon to a Extremist Quack.&nbsp; </span></strong><span data-dcnode-id="4043" instrument_node="">Even if you like Birk as a player, philanthropist, and sports analyst, and I do, you should learn a little more about his running mate Scott Jensen before signing up to be a Jensen-Birk supporter. &nbsp;</span><br data-dcnode-id="4042"><br data-dcnode-id="4041"><span data-dcnode-id="4040" instrument_node="">For instance, the non-partisan fact-checking organization Politifact&nbsp;</span><a data-dcnode-id="4038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politifact.com/article/2020/dec/16/lie-year-coronavirus-downplay-and-denial/"><span data-dcnode-id="4039" instrument_node="">cited</span></a><span data-dcnode-id="4037" instrument_node="">&nbsp;Jensen as a major source of its 2020 “Lie of the Year 2020 about coronavirus downplaying and denial. This is arguably the most lethal political lie of our times, and Jensen played a very prominent and destructive role spreading it.&nbsp; </span></p><span data-dcnode-id="4035" instrument_node="">
</span><p data-dcnode-id="4030"><span data-dcnode-id="4034" instrument_node="">Jensen also joined U.S. Capitol insurrectionist Simone Gold and others in&nbsp;</span><a data-dcnode-id="4032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medpagetoday.com/special-reports/exclusives/92807"><span data-dcnode-id="4033" instrument_node="">suing</span></a><span data-dcnode-id="4031" instrument_node="">&nbsp;the federal government to prevent children from receiving COVID-19 vaccines.  </span></p><span data-dcnode-id="4029" instrument_node="">
</span><p data-dcnode-id="4027"><span data-dcnode-id="4028" instrument_node="">But apparently none of this bothered Birk.</span></p><span data-dcnode-id="4026" instrument_node="">
</span><p data-dcnode-id="4024"><span data-dcnode-id="4025" instrument_node="">COVID denial and anti-vax messaging earned Jensen a lot of love on Fox News and other far-right outlets, but now he is trying to win a plurality of votes in Minnesota, a state with the second highest rate or boosted residents, and where about three-fourths (74%) of voting age residents rejected Jensen’s ignorant, irresponsible medical quackery and got themselves vaccinated.  </span></p><span data-dcnode-id="4023" instrument_node="">
</span><p data-dcnode-id="4020" style="text-align:center"><strong data-dcnode-id="4021"><span data-dcnode-id="4022" instrument_node="">What We Don’t Know</span></strong></p><span data-dcnode-id="4019" instrument_node="">
</span><p data-dcnode-id="4017"><span data-dcnode-id="4018" instrument_node="">Beyond the handful of issues cited here, Minnesotans have no idea where Birk stands on a whole host of other important issues.&nbsp; </span></p><span data-dcnode-id="4016" instrument_node="">
</span><p data-dcnode-id="4002"><span data-dcnode-id="4015" instrument_node="">Paid family and medical leave?&nbsp; Public funding for free birth control, which is proven to dramatically reduce unplanned pregnancies and abortions?&nbsp; Giving Minnesotans the option to buy into MinnesotCare?&nbsp; Prayer in public schools?  Which religion’s prayer?  Taxpayers subsidizing billionaire sports team owners’ stadiums?&nbsp; Making the wealthiest 1% of Minnesotans, which includes Birk, pay higher taxes to fund education improvements?&nbsp; Accepting Obamacare funding for Medicare expansion in Minnesota?  Maintaining the MNsure Obamacare insurance exchange?  “Don’t say gay” laws to punish teachers who mention gay people in school? Allowing parents  to ban books from school libraries?&nbsp; </span><br data-dcnode-id="4014"><br data-dcnode-id="4013"><span data-dcnode-id="4012" instrument_node="">In addition, the state where a majority  (52.4%) of 2020 voters rejected Trump should know whether Birk voted for Trump in 2016 and 2020, and whether he plans to vote for the insurrection inciter in 2024.&nbsp; We also must know whether Birk supports the Big Lie that Trump didn’t lose the 2020 election.  </span><br data-dcnode-id="4011"><br data-dcnode-id="4010"><span data-dcnode-id="4009" instrument_node="">I’m very interested to know the answers to these questions.  Is Birk Trumpy enough to win far-right primary votes, but too Trumpy to win swing voters in the general election? Or will Birk expose himself to be insufficiently Trumpy, and subsequently be a “kiss of death” for Jensen in the primaries, where Trump loyalists are dominant and demand total obedience.</span><br data-dcnode-id="4008"><br data-dcnode-id="4007"><span data-dcnode-id="4006" instrument_node=""> To be clear, I deeply respect the man’s ability to calmly read a defense with another man’s hands nestled firmly in his buttocks.  Skol!  </span><br data-dcnode-id="4005"><br data-dcnode-id="4004"><span data-dcnode-id="4003" instrument_node="">But maybe Minnesotans deserve to know more about Matt Birk than that.</span></p><span data-dcnode-id="4001" instrument_node="">

</span><article class="post-10727 post type-post status-publish format-standard has-post-thumbnail hentry category-poltiics tag-gas-price tag-next-generation-nuclear tag-putin tag-tom-friedman tag-ukraine" data-dcnode-id="3742" id="post-10727"><span data-dcnode-id="3901" instrument_node="">
</span><header class="entry-header" data-dcnode-id="3877"><span data-dcnode-id="3900" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="3897"><a data-dcnode-id="3898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/thanks-to-vlad-the-greatest-tranformation-ever-is-now-beginning/" rel="bookmark"><span data-dcnode-id="3899" instrument_node="">Thanks to Vlad, The Greatest Tranformation Ever is Now Beginning</span></a></h1><span data-dcnode-id="3896" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="3880"><span data-dcnode-id="3895" instrument_node="">
</span><span class="sep" data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">Posted on </span></span><a data-dcnode-id="3890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/thanks-to-vlad-the-greatest-tranformation-ever-is-now-beginning/" rel="bookmark" title="11:33 am"><time class="entry-date" data-dcnode-id="3891" datetime="2022-03-09T11:33:29-05:00"><span data-dcnode-id="3892" instrument_node="">March 9, 2022</span></time></a><span class="by-author" data-dcnode-id="3882"><span data-dcnode-id="3889" instrument_node=""> </span><span class="sep" data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node=""> by </span></span><span data-dcnode-id="3886" instrument_node=""> </span><span class="author vcard" data-dcnode-id="3883"><a class="url fn n" data-dcnode-id="3884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/author/brian-lambert/" rel="author" title="View all posts by Brian Lambert"><span data-dcnode-id="3885" instrument_node="">Brian Lambert</span></a></span></span><span data-dcnode-id="3881" instrument_node=""> </span></div><span data-dcnode-id="3878" instrument_node="">
</span></header><span data-dcnode-id="3875" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3782"><span data-dcnode-id="3874" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="3872"><img alt="Billions poured into electric-vehicle companies, but much more will be  needed before the auto industry changes - MarketWatch" data-dcnode-id="3873" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.mktw.net/im-309602%3Fwidth%3D700%26height%3D487&amp;raw"></figure><span data-dcnode-id="3871" instrument_node="">
</span><p data-dcnode-id="3869"><span data-dcnode-id="3870" instrument_node="">At the risk of sounding like a poor man’s Tom Friedman, I’m watching the truly astonishing turns of events in response to Vladimir Putin’s invasion of Ukraine and thinking that this holds potential to be the single most transformative global episode since WWII. And not just militarily.</span></p><span data-dcnode-id="3868" instrument_node="">
</span><p data-dcnode-id="3866"><span data-dcnode-id="3867" instrument_node="">Just a few things that come to mind:</span></p><span data-dcnode-id="3865" instrument_node="">
</span><p data-dcnode-id="3863"><span data-dcnode-id="3864" instrument_node="">In automotive terms, the rubber is truly meeting the road in the US of A. I see no one expecting the price of gas to return to pre-invasion levels for months, if ever. In fact, based on my diet of articles and YouTube videos of economists, finance ministers, etc. there isn’t anyone who does not see prices continuing to escalate upwards all summer long. $6 a gallon and higher in Minnesota is not out of the question this year.</span></p><span data-dcnode-id="3862" instrument_node="">
</span><p data-dcnode-id="3857"><span data-dcnode-id="3861" instrument_node="">The effect on vacation travel — by car </span><a data-dcnode-id="3859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nbc12.com/2022/03/08/rising-jet-fuel-costs-could-impact-ticket-prices-coming-months/"><span data-dcnode-id="3860" instrument_node="">or plane </span></a><span data-dcnode-id="3858" instrument_node="">— and commuting habits is plain to be imagined . (And this just as businesses, post-COVID, were coaxing employees back into the office.)</span></p><span data-dcnode-id="3856" instrument_node="">
</span><p data-dcnode-id="3854"><span data-dcnode-id="3855" instrument_node="">Then imagine consumer demand for immediate alternatives to the average family’s 5000-pound SUV and pickup. With the US cutting off the 8% of oil it gets from Russia, and Europeans slapped across the face with the existential dilemma they’ve created buying billions of euros of gas from a homicidal maniac, an even more dramatic/disruptive tightening of the tap is inevitable.</span></p><span data-dcnode-id="3853" instrument_node="">
</span><p data-dcnode-id="3851"><span data-dcnode-id="3852" instrument_node="">(In a couple months, I expect to see some real bargains for people shopping for a 13 mpg Ford F-150. Computer chip shortage be damned.)  </span></p><span data-dcnode-id="3850" instrument_node="">
</span><p data-dcnode-id="3845"><span data-dcnode-id="3849" instrument_node="">“Transformative” also applies here to the no doubt </span><a data-dcnode-id="3847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nbcnews.com/news/latino/us-reaches-venezuela-possible-russia-oil-embargo-rcna19033"><span data-dcnode-id="3848" instrument_node="">foul-smelling deals</span></a><span data-dcnode-id="3846" instrument_node=""> being cooked up with the Saudis, Iranians and Venezuelans to reduce cost-at-the-pump issues here and make up for fuel Europeans will need next winter when — not if — they stop doing business with Vlad the Invader.</span></p><span data-dcnode-id="3844" instrument_node="">
</span><p data-dcnode-id="3839"><span data-dcnode-id="3843" instrument_node="">So let’s imagine the new-found demand for electric transportation. Mass and personal transportation-wise. It’s been a common understanding for years now that cost is the critical factor in any transition to electric vehicles. Well, a 50%-80% increase in gas prices is pretty much what the good green doctor has always ordered if you want to dramatically increase the US’s 2% electric vehicle fleet substantially and permanently higher. True, </span><a data-dcnode-id="3841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techspot.com/news/93671-russia-invasion-ukraine-puts-damper-dream-cheaper-electric.html"><span data-dcnode-id="3842" instrument_node="">there are basic material issues </span></a><span data-dcnode-id="3840" instrument_node="">related to the invasion, but I’d bet the longer term viability of electric wins out over ever more impractical internal combustion cars.  (It would be nice if we could capture some of that gas price increase for state and national treasuries but … share-holder value, you know.)</span></p><span data-dcnode-id="3838" instrument_node="">
</span><p data-dcnode-id="3830"><span data-dcnode-id="3837" instrument_node="">Then we get to </span><a data-dcnode-id="3835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qz.com/1985911/how-much-energy-will-the-us-need-for-electric-cars-and-buildings/"><span data-dcnode-id="3836" instrument_node="">the power required to both manufacture and charge not thousands but tens of millions more electric vehicles.</span></a><span data-dcnode-id="3834" instrument_node=""> Solar and wind and other nice green renewables are simply not sufficient — currently — to handle such demand. Which is where </span><a data-dcnode-id="3832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.mit.edu/2021/two-pronged-campaign-against-climate-change-robb-stewart-0715"><span data-dcnode-id="3833" instrument_node="">next generation nuclear </span></a><span data-dcnode-id="3831" instrument_node="">becomes a serious part of any grand energy (and climate) transformation.</span></p><span data-dcnode-id="3829" instrument_node="">
</span><p data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">When I think of the great, convulsive events that have taken place in my lifetime — the Cold War/Cuban missile crisis, Vietnam, various assassinations, the fall of the Berlin Wall, 9/11, the crash of 2008 — none of them set off the combined shift or reinvigoration of alliances, reexamination of national priorities and changes in day-to-day consumer habits and lifestyle that we can see erupting here from Putin’s hellish blunder.</span></p><span data-dcnode-id="3826" instrument_node="">
</span><p data-dcnode-id="3824"><span data-dcnode-id="3825" instrument_node="">And this is all based on the situation as it stands today, before a truly desperate Putin — a man for whom “losing” equals death, figuratively and quite possibly literally — escalates this war into something truly catastrophic.</span></p><span data-dcnode-id="3823" instrument_node="">
</span><p data-dcnode-id="3821"><span data-dcnode-id="3822" instrument_node="">Please feel free to tell me where I’m mistaken about any of this.</span></p><span data-dcnode-id="3820" instrument_node="">
</span><p data-dcnode-id="3818"><span data-dcnode-id="3819" instrument_node=""> </span></p><span data-dcnode-id="3817" instrument_node="">
</span><p data-dcnode-id="3816"></p><span data-dcnode-id="3815" instrument_node="">

</span><article class="post-10721 post type-post status-publish format-standard hentry category-poltiics tag-where-everything-is-true-and-nothing-is-possible tag-abramovich tag-fifa tag-londongrad tag-romanovs tag-vladimir-putin" data-dcnode-id="3552" id="post-10721"><span data-dcnode-id="3739" instrument_node="">
</span><header class="entry-header" data-dcnode-id="3715"><span data-dcnode-id="3738" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="3735"><a data-dcnode-id="3736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/who-tastes-putins-food-tasters-food/" rel="bookmark"><span data-dcnode-id="3737" instrument_node="">Who Tastes Putin’s Food Taster’s Food?</span></a></h1><span data-dcnode-id="3734" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="3718"><span data-dcnode-id="3733" instrument_node="">
</span><span class="sep" data-dcnode-id="3731"><span data-dcnode-id="3732" instrument_node="">Posted on </span></span><a data-dcnode-id="3728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/who-tastes-putins-food-tasters-food/" rel="bookmark" title="1:05 pm"><time class="entry-date" data-dcnode-id="3729" datetime="2022-02-27T13:05:00-05:00"><span data-dcnode-id="3730" instrument_node="">February 27, 2022</span></time></a><span class="by-author" data-dcnode-id="3720"><span data-dcnode-id="3727" instrument_node=""> </span><span class="sep" data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node=""> by </span></span><span data-dcnode-id="3724" instrument_node=""> </span><span class="author vcard" data-dcnode-id="3721"><a class="url fn n" data-dcnode-id="3722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/author/brian-lambert/" rel="author" title="View all posts by Brian Lambert"><span data-dcnode-id="3723" instrument_node="">Brian Lambert</span></a></span></span><span data-dcnode-id="3719" instrument_node=""> </span></div><span data-dcnode-id="3716" instrument_node="">
</span></header><span data-dcnode-id="3713" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3595"><span data-dcnode-id="3712" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="3710"><img alt="Could Anyone Have Saved the Romanovs? - HISTORY" data-dcnode-id="3711" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/.image/t_share/MTU3OTIzNjU0NzY4MDEwODk4/image-placeholder-title.jpg&amp;raw"></figure><span data-dcnode-id="3709" instrument_node="">
</span><p data-dcnode-id="3707"><span data-dcnode-id="3708" instrument_node="">For years I’ve been making the joke about Vladimir Putin’s food taster. As in: Who is that guy? How did he get the job? How does he keep the job? What’s his pulse rate when he tries out the caviar? And, if he’s only the latest, how long do Vlad’s Official Tasters last?</span></p><span data-dcnode-id="3706" instrument_node="">
</span><p data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">Now, with Putin feeling pressure on a number of fronts, I’ve begun wondering Who Tastes Putin’s Food Taster’s Food? I mean, we are talking Russia here, where a long line of kings and czars and leaders of one stripe or another have, um, “succumbed to nefarious retribution” by one time loyalists suddenly in the mood for their blood.</span></p><span data-dcnode-id="3703" instrument_node="">
</span><p data-dcnode-id="3702"></p><span data-dcnode-id="3701" instrument_node="">
</span><p data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">Obviously, I am no Russia expert. But Russia and Russians have occupied a significant space in my alleged mind nearly my entire life. I was 11 years old during the Cuban missile crisis. We actually did the “duck and cover” drills in grade school. The godless Russian Red Menace was a regular feature of my Catholic upbringing as well as the evening news when I toddled home from school.</span></p><span data-dcnode-id="3698" instrument_node="">
</span><p data-dcnode-id="3684"><span data-dcnode-id="3697" instrument_node="">As a result, over the years, I’ve padded out the usual consumption of news stories and analyses of Russian government behavior</span><a data-dcnode-id="3695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nyrb.com/products/stalingrad%3Fvariant%3D9488902225972"><span data-dcnode-id="3696" instrument_node=""> with books</span></a><span data-dcnode-id="3694" instrument_node=""> about the country, </span><a data-dcnode-id="3692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0079944/"><span data-dcnode-id="3693" instrument_node="">films from the old Soviet Union</span></a><span data-dcnode-id="3691" instrument_node=""> and more lately, </span><a data-dcnode-id="3689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DMfnj-ykkr-Q"><span data-dcnode-id="3690" instrument_node="">YouTube series</span></a><span data-dcnode-id="3688" instrument_node=""> from Russian vloggers. Eventually, you do get a grasp of something like the “average Russian mind set”. A mentality set in a startlingly shambolic realm where, to quote the title of one of the better recent books I’ve read, </span><a data-dcnode-id="3686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.powells.com/book/-9781610394550/1-12"><span data-dcnode-id="3687" instrument_node="">“… Nothing Is True and Everything is Possible.</span></a><span data-dcnode-id="3685" instrument_node="">“</span></p><span data-dcnode-id="3683" instrument_node="">
</span><p data-dcnode-id="3672"><span data-dcnode-id="3682" instrument_node="">Consuming the reporting and punditry of the past five days, I note that plenty is being said about the sanctions on Putin and his closest circle of oligarchs — iuncluding very high profile characters like </span><a data-dcnode-id="3680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/football/2022/feb/27/chelsea-praying-for-peace-in-ukraine-after-russias-invasion"><span data-dcnode-id="3681" instrument_node="">Chelsea football team owner Roman Abramovich,</span></a><span data-dcnode-id="3679" instrument_node=""> an early “investor” in Russia’s oil and aluminum businesses. Few believe </span><a data-dcnode-id="3677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fortune.com/2017/07/29/vladimir-putin-russia-jeff-bezos-bill-gates-worlds-richest-man/"><span data-dcnode-id="3678" instrument_node="">Putin’s fortune</span></a><span data-dcnode-id="3676" instrument_node="">, thought to be well protected in Swiss banks and other off-shore accounts, is in any immediate danger, as in next month or next year. But there have been noisy public statements from European countries — Britain in particular, where </span><a data-dcnode-id="3674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/world/2022/02/26/londongrad-uk-russian-money/"><span data-dcnode-id="3675" instrument_node="">the capital has been so saturated with Russian mobster money it has been nicknamed “Londongrad”</span></a><span data-dcnode-id="3673" instrument_node=""> — that they will at long, long last make life difficult for flagrant thieves who own not one, but two 400-foot yachts, their own personal 787 and … a Premier League football team.</span></p><span data-dcnode-id="3671" instrument_node="">
</span><p data-dcnode-id="3666"><span data-dcnode-id="3670" instrument_node="">A side story of great interest to me is what the </span><a data-dcnode-id="3668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//newrepublic.com/article/165505/european-soccer-putin-russia-abramovich"><span data-dcnode-id="3669" instrument_node="">notoriously corrupt international soccer agency, FIFA</span></a><span data-dcnode-id="3667" instrument_node="">, floating on gobs of Russian mob money, does in response — to the response — to Putin’s invasion? (Imagine the reaction of American chuckleheads of Biden did something that obliterated the NFL?) </span></p><span data-dcnode-id="3665" instrument_node="">
</span><p data-dcnode-id="3660"><span data-dcnode-id="3664" instrument_node="">(Another not at all far-fetched notion is what a Spanish Civil War-like call for freedom fighters — from all over the world — to come to Ukraine’s aid might do? Do you doubt there are millions who see this as </span><em data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">the moment</span></em><span data-dcnode-id="3661" instrument_node=""> to make a heroic stand against authoritarian criminals?) </span></p><span data-dcnode-id="3659" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="3654"><img alt="My ship is bigger than Russian Billionare Abramovich's new yacht... Just  Barely" data-dcnode-id="3658" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//gcaptain.com/wp-content/uploads/2008/10/article-1069270-02E963E300000578-437_468x186_popup.jpg&amp;raw"><figcaption data-dcnode-id="3655"><span data-dcnode-id="3657" instrument_node="">One of Abramovich’s yachts</span><br data-dcnode-id="3656"></figcaption></figure><span data-dcnode-id="3653" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="3651"><img alt="Inside 162.5m Blohm+Voss megayacht Eclipse" data-dcnode-id="3652" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.boatinternational.com/files/2021/05/cb78e590-b322-11eb-b59b-bfd1177c77f4-eclipse-exterior-do-not-use-outside-feature.jpg&amp;raw"></figure><span data-dcnode-id="3650" instrument_node="">
</span><p data-dcnode-id="3646"><span data-dcnode-id="3649" instrument_node="">What then does that crowd do to Putin if they are refused access to Western ultra-rich society, have their London, Paris and Miami mansions seized, their children expelled from the toniest British schools and their byzantine financial transactions/money-laundering hobbled by banking restrictions? Is their loyalty to Putin — who made them, despite getting a reported 50% kickback on their lootings —  really all enduring? If not, at one point do they in effect, or in reality, gather the Putin family </span><a data-dcnode-id="3647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Execution_of_the_Romanov_family"><span data-dcnode-id="3648" instrument_node="">in the basement of a dacha in Yekaterinburg?</span></a></p><span data-dcnode-id="3645" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="3643"><img alt="Why the Romanov Family's Fate Was a Secret Until the Fall of the Soviet  Union - HISTORY" data-dcnode-id="3644" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/.image/t_share/MTU5MjM2MzEwMzIwNTU1MjIy/romanov-execution-919806548.jpg&amp;raw"></figure><span data-dcnode-id="3642" instrument_node="">
</span><p data-dcnode-id="3637"><span data-dcnode-id="3641" instrument_node="">The idea of someone — or some cabal — taking out Putin would be preposterous if his invasion of Ukraine didn’t appear so ill-conceived and delusional, so completely divorced from reality. I mean, the guy was on TV the other day ranting — Trump-like — about “</span><a data-dcnode-id="3639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/video/2022/feb/25/putin-references-neo-nazis-and-drug-addicts-in-bizarre-speech-to-russian-security-council-video"><span data-dcnode-id="3640" instrument_node="">drug addicted neo-Nazis”</span></a><span data-dcnode-id="3638" instrument_node="">, a reference apparently to Ukraine’s Jewish president, Volodymyr Zelenskyy. (Abramovich is also Jewish.) </span></p><span data-dcnode-id="3636" instrument_node="">
</span><p data-dcnode-id="3634"><span data-dcnode-id="3635" instrument_node="">If your billions in ill-gotten gains are dependent on a character sounding as histrionic and unhinged as that, how long before you start looking for a food taster who knows his way around a vial of Novichuk?     </span></p><span data-dcnode-id="3633" instrument_node="">
</span><p data-dcnode-id="3632"></p><span data-dcnode-id="3631" instrument_node="">
</span><p data-dcnode-id="3629"><span data-dcnode-id="3630" instrument_node=""> </span></p><span data-dcnode-id="3628" instrument_node="">

</span><article class="post-10717 post type-post status-publish format-standard hentry category-poltiics tag-donald-trump tag-mike-pompeo tag-steve-bannon tag-tucker-carlson tag-vladimir-putin-ukraine" data-dcnode-id="3350" id="post-10717"><span data-dcnode-id="3549" instrument_node="">
</span><header class="entry-header" data-dcnode-id="3525"><span data-dcnode-id="3548" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="3545"><a data-dcnode-id="3546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/i-think-putins-getting-himself-in-a-pickle/" rel="bookmark"><span data-dcnode-id="3547" instrument_node="">I Think Putin’s Getting Himself in a Pickle</span></a></h1><span data-dcnode-id="3544" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="3528"><span data-dcnode-id="3543" instrument_node="">
</span><span class="sep" data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">Posted on </span></span><a data-dcnode-id="3538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/i-think-putins-getting-himself-in-a-pickle/" rel="bookmark" title="2:00 pm"><time class="entry-date" data-dcnode-id="3539" datetime="2022-02-24T14:00:56-05:00"><span data-dcnode-id="3540" instrument_node="">February 24, 2022</span></time></a><span class="by-author" data-dcnode-id="3530"><span data-dcnode-id="3537" instrument_node=""> </span><span class="sep" data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node=""> by </span></span><span data-dcnode-id="3534" instrument_node=""> </span><span class="author vcard" data-dcnode-id="3531"><a class="url fn n" data-dcnode-id="3532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/author/brian-lambert/" rel="author" title="View all posts by Brian Lambert"><span data-dcnode-id="3533" instrument_node="">Brian Lambert</span></a></span></span><span data-dcnode-id="3529" instrument_node=""> </span></div><span data-dcnode-id="3526" instrument_node="">
</span></header><span data-dcnode-id="3523" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3390"><span data-dcnode-id="3522" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="3520"><img alt="How to talk to Mr Putin | The Economist" data-dcnode-id="3521" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.economist.com/img/b/1280/720/90/sites/default/files/images/2022/01/articles/main/20220108_ldd001_0.jpg&amp;raw"></figure><span data-dcnode-id="3519" instrument_node="">
</span><p data-dcnode-id="3517"><span data-dcnode-id="3518" instrument_node="">At this moment in the drama I’m probably in the minority who thinks this will end badly for Vladimir Putin. In these first moments he seems to hold all the best cards. But the consequences for this kind of naked aggression in the 21st century are yet to be felt.</span></p><span data-dcnode-id="3516" instrument_node="">
</span><p data-dcnode-id="3511"><span data-dcnode-id="3515" instrument_node="">Leading up to yesterday’s invasion of Ukraine there was plenty of discussion of why Putin would risk something like this? The most common answers being that he sees himself as the Grand Restorer of the Russian (i.e. Soviet) empire, and he’s doing it now while he still has the kind of economic leverage over the West that comes with pumping so much gas onto the world markets. It’s a leverage even he must know will dry up once western Europe in particular goes green (or nuclear) and stops sending him — and I do mean him, personally — billions of dollars </span><a data-dcnode-id="3513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/briefing-room/statements-releases/2022/02/22/fact-sheet-united-states-imposes-first-tranche-of-swift-and-severe-costs-on-russia/"><span data-dcnode-id="3514" instrument_node="">(and they’re mostly dollars) </span></a><span data-dcnode-id="3512" instrument_node="">in exchange.</span></p><span data-dcnode-id="3510" instrument_node="">
</span><p data-dcnode-id="3508"><span data-dcnode-id="3509" instrument_node="">But Putin’s bigger problem is also largely of his own making. He is administering a shockingly sick country. 20% of Russians don’t have indoor plumbing. The country is ranked 70th in the world standard of living. It has a GDP 20% smaller than Italy. Russian conscripts are paid the equivalent of $28 a month. (One pundit joked that this war would end today if the European Union offered citizenship to every Russian soldier who laid down his rifle and migrated west.)</span></p><span data-dcnode-id="3507" instrument_node="">
</span><p data-dcnode-id="3502"><span data-dcnode-id="3506" instrument_node="">Under Putin’s 23 year rule, he has orchestrated a partnering with a cadre of mob-like oligarchs to whom he is Vito Corleone. Each of these characters are not just looting Russian resources — gas, aluminum, etc. — for their private fiefdoms but are kicking back so much cash to Putin he is </span><a data-dcnode-id="3504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/forbeswealthteam/2022/01/27/as-biden-mulls-sanctions-three-theories--on-how-putin-makes-his-millions/%3Fsh%3D72cca8525b43"><span data-dcnode-id="3505" instrument_node="">widely regarded as the wealthiest person on the planet</span></a><span data-dcnode-id="3503" instrument_node=""> as of this morning, far beyond the wildest dreams of Jeff Bezos and Elon Musk.</span></p><span data-dcnode-id="3501" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="3499"><img alt="How Putin's Oligarchs Got Inside the Trump Team | Time" data-dcnode-id="3500" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//api.time.com/wp-content/uploads/2018/09/putin-russian-president-oligarch.jpg&amp;raw"></figure><span data-dcnode-id="3498" instrument_node="">
</span><p data-dcnode-id="3496"><span data-dcnode-id="3497" instrument_node="">And every (thinking) Russian knows this.</span></p><span data-dcnode-id="3495" instrument_node="">
</span><p data-dcnode-id="3493"><span data-dcnode-id="3494" instrument_node="">Whether the sanctions — and other retaliations by the West — cyber attacks and the like, will be enough to incite revolt inside Russia remains to be seen. Russian history is after all a tale of an endless series of semi-god-like strong men tolerated by the woefully abused masses out of fear that Oppresive Leader is their only protection from another invasion — from the Asian east or the imperial/fascist West (Napoleon and Hitler).</span></p><span data-dcnode-id="3492" instrument_node="">
</span><p data-dcnode-id="3490"><span data-dcnode-id="3491" instrument_node="">But that was before the internet. Before a constantly interconnected liberal intelligentsia could see and hear in real time what was true and what was just the hysterical war-mongering of Putin’s state media.</span></p><span data-dcnode-id="3489" instrument_node="">
</span><p data-dcnode-id="3485"><span data-dcnode-id="3488" instrument_node="">Here by the way is a sample of what Russian TV (your average Rooskie’s FoxNews) was saying prior to the invasion. </span><a data-dcnode-id="3486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jabberwocking.com/the-view-from-moscow-is-a-grim-one/"><span data-dcnode-id="3487" instrument_node="">(Via the Los Angeles Times:</span></a></p><span data-dcnode-id="3484" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="3424"><p data-dcnode-id="3479"><span data-dcnode-id="3483" instrument_node="">“To hear Russian media tell it, </span><strong data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">the government of Ukraine is run by neo-Nazis waging a genocidal campaign against ethnic Russians in the country’s east,</span></strong><span data-dcnode-id="3480" instrument_node="">  where Moscow-backed authorities regularly uncover mass graves full of  the corpses of women and children with bound hands and bludgeoned heads  even as they face the hell of constant shelling.</span></p><p data-dcnode-id="3474"><span data-dcnode-id="3478" instrument_node="">“</span><strong data-dcnode-id="3476"><span data-dcnode-id="3477" instrument_node="">Such false images and narratives have become a daily staple in Russia</span></strong><span data-dcnode-id="3475" instrument_node="">….The  Russian media have gone into overdrive with stories depicting a  government in Kyiv so cruel that Moscow has no choice but to swoop in  and protect the ethnic Russians in eastern Ukraine’s Donbas region.</span></p><p data-dcnode-id="3469"><span data-dcnode-id="3473" instrument_node="">“ ‘It’s a war between the Ukrainian government and its own people….  People are dying there every day. Thousands of civilians died there. </span><strong data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">Thousands of children lost their limbs there, buried in little coffins’,</span></strong><span data-dcnode-id="3470" instrument_node="">” Margarita Simonyan, head of the state-funded broadcaster RT, said on a talk show on the Russia-1 channel.”</span></p><p data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">Having successfully undermined international confidence in the United States through his manipulation of social media and fluffing up Donald Trump, and by degrading Great Britain with Brexit, Putin appears to believe he’s succeeded in splitting the West. To the point that the principal forces of NATO are now so polarized and fragmented they are incapable of wreaking any serious economic damage on him personally.</span></p><p data-dcnode-id="3453"><span data-dcnode-id="3466" instrument_node="">Judging by </span><a data-dcnode-id="3464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/opinions/2022/02/23/trump-praises-putin-ukraine-refuting-claims-tough-on-russia/"><span data-dcnode-id="3465" instrument_node="">Trump </span></a><span data-dcnode-id="3463" instrument_node="">and </span><a data-dcnode-id="3461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2022/02/24/business/fox-news-russia-ukraine.html"><span data-dcnode-id="3462" instrument_node="">Tucker Carlson</span></a><span data-dcnode-id="3460" instrument_node=""> and </span><a data-dcnode-id="3458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newsweek.com/former-trump-adviser-steve-bannon-backs-anti-woke-vladimir-putin-1682122"><span data-dcnode-id="3459" instrument_node="">Steve Bannon</span></a><span data-dcnode-id="3457" instrument_node=""> and </span><a data-dcnode-id="3455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.salon.com/2022/02/22/trump-former-secretary-of-state-mike-pompeo-praise-putin-while-bashing-biden/"><span data-dcnode-id="3456" instrument_node="">Mike Pompeo </span></a><span data-dcnode-id="3454" instrument_node="">and the other usual suspects aligning themselves more with Putin than the United States and NATO, it’s tempting to think he’s right.</span></p><p data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">But I think he’s delusional. A creature of his own bubble. I believe NATO in particular, and world markets in general, are tired of the constant corruption-induced chaos they’re suffering at Putin’s hand. To the point that, with something as unquivocally outrageous as this invasion, they’re united enough to want him — Putin — to suffer a resounding defeat.</span></p><p data-dcnode-id="3446"><span data-dcnode-id="3450" instrument_node="">You’re hearing it from many quarters: Direct, personal sanctions on Putin and his high-flying mob cronies. Freezing of their accounts, confiscation of their property, (much of it likely acquired via money-laundering — hello again,</span><a data-dcnode-id="3448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.palmbeachpost.com/story/news/2020/09/15/trumps-sale-palm-beach-mansion-gains-scrutiny-again/5798386002/"><span data-dcnode-id="3449" instrument_node=""> Donald J. Trump</span></a><span data-dcnode-id="3447" instrument_node="">), expulsion from Western communities, colleges, etc.</span></p><p data-dcnode-id="3441"><span data-dcnode-id="3445" instrument_node="">The tough nut on the personal finance front is — as usual — getting international bankers, our good friends</span><a data-dcnode-id="3443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/europe/swiss-tighten-measures-targeting-russia-2022-02-24/"><span data-dcnode-id="3444" instrument_node=""> the Swiss in particular</span></a><span data-dcnode-id="3442" instrument_node="">, to accept that playing cute with the Third Reich wasn’t lesson enough. If you want credibility in the 21st century, you cut ties with indisputable, war-criminal gangsters.</span></p><p data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">America’s Trumpist media will continue align with Putin, and more loudly as gas prices spike up towards  $5 and $6 a gallon. But I don’t see them convincing a majority of Americans – other than the 20% of Republicans who view Putin more favorably than Joe Biden —  that this is anyone’s fault other than Putin’s and that things will only get worse if he prevails.    </span></p><p data-dcnode-id="3438"></p><p data-dcnode-id="3437"></p><p data-dcnode-id="3436"></p><p data-dcnode-id="3435"></p><p data-dcnode-id="3434"></p><p data-dcnode-id="3433"></p><p data-dcnode-id="3432"></p><p data-dcnode-id="3431"></p><p data-dcnode-id="3430"></p><p data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node=""> </span></p><p data-dcnode-id="3427"></p><p data-dcnode-id="3426"></p><p data-dcnode-id="3425"></p></blockquote><span data-dcnode-id="3423" instrument_node="">

</span><article class="post-10711 post type-post status-publish format-standard hentry category-poltiics tag-minnesota-parents-bill-of-rights tag-paul-gazelka" data-dcnode-id="3195" id="post-10711"><span data-dcnode-id="3347" instrument_node="">
</span><header class="entry-header" data-dcnode-id="3323"><span data-dcnode-id="3346" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="3343"><a data-dcnode-id="3344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/sharing-curriculum-and-the-gops-ceaseless-parade-of-naked-cynicism/" rel="bookmark"><span data-dcnode-id="3345" instrument_node="">“Sharing Curriculum” and the GOP’s Ceaseless Parade of Naked Cynicism</span></a></h1><span data-dcnode-id="3342" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="3326"><span data-dcnode-id="3341" instrument_node="">
</span><span class="sep" data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">Posted on </span></span><a data-dcnode-id="3336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/sharing-curriculum-and-the-gops-ceaseless-parade-of-naked-cynicism/" rel="bookmark" title="10:37 am"><time class="entry-date" data-dcnode-id="3337" datetime="2022-02-15T10:37:55-05:00"><span data-dcnode-id="3338" instrument_node="">February 15, 2022</span></time></a><span class="by-author" data-dcnode-id="3328"><span data-dcnode-id="3335" instrument_node=""> </span><span class="sep" data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node=""> by </span></span><span data-dcnode-id="3332" instrument_node=""> </span><span class="author vcard" data-dcnode-id="3329"><a class="url fn n" data-dcnode-id="3330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/author/brian-lambert/" rel="author" title="View all posts by Brian Lambert"><span data-dcnode-id="3331" instrument_node="">Brian Lambert</span></a></span></span><span data-dcnode-id="3327" instrument_node=""> </span></div><span data-dcnode-id="3324" instrument_node="">
</span></header><span data-dcnode-id="3321" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3226"><span data-dcnode-id="3320" instrument_node="">
</span><figure class="wp-block-image is-resized" data-dcnode-id="3316"><img alt="" class="wp-image-10714" data-attachment-id="10714" data-comments-opened="1" data-dcnode-id="3319" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image" data-large-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/02/image.jpeg" data-medium-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/02/image-300x136.jpeg" data-orig-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/02/image.jpeg" data-orig-size="333,151" data-permalink="https://www.wrywingpolitics.com/sharing-curriculum-and-the-gops-ceaseless-parade-of-naked-cynicism/image-4/" height="266" sizes="(max-width: 587px) 100vw, 587px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/wp-content/uploads/2022/02/image.jpeg&amp;raw" srcset="https://www.wrywingpolitics.com/wp-content/uploads/2022/02/image.jpeg 333w, https://www.wrywingpolitics.com/wp-content/uploads/2022/02/image-300x136.jpeg 300w" width="587"><figcaption data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">Puppet Master and Paul Gazelka                                                                    </span></figcaption></figure><span data-dcnode-id="3315" instrument_node="">
</span><p data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">Many years ago I was talking with a veteran local TV political reporter. It was the Newt Gingrich era. You know, “balanced budgets” and “term limits” and all that other transparently cynical “revolutionary” bullshit.</span></p><span data-dcnode-id="3312" instrument_node="">
</span><p data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">My question was, “Why are you taking this seriously? Why even give it respectful attention?”</span></p><span data-dcnode-id="3309" instrument_node="">
</span><p data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">His answer was, “At least there are some ideas there”, avoiding any acknowledgment that the Gingrich PR machinery was “the hot issue” at the moment and, in straight pendulum terms it was time for the press to shift balance after a couple years of mostly favorable Bill Clinton coverage.</span></p><span data-dcnode-id="3306" instrument_node="">
</span><p data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">The overwhelming scent of bad faith politics, of the “loyal opposition” doing nothing other than throwing gravel in the gearworks of government was, you know, a “speculative”  judgment. Reacting to manufactured topicality was a better position, journalistically speaking.</span></p><span data-dcnode-id="3303" instrument_node="">
</span><p data-dcnode-id="3298"><span data-dcnode-id="3302" instrument_node="">This comes to mind with the latest “revolutionary” proposal from Minnesota’s anything-but-loyal opposition. Namely, </span><a data-dcnode-id="3300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.startribune.com/minnesota-senate-republicans-introduce-bills-requiring-teachers-to-share-curriculum-with-parents/600146705/"><span data-dcnode-id="3301" instrument_node="">the transparently cynical proposal by top Republicans,</span></a><span data-dcnode-id="3299" instrument_node=""> including gubernatorial candidate Paul (Cotton Mather) Gazelka, to require the state’s teachers to “share” curriculum with parents — and should parents object to heretical texts like, oh I don’t know, “To Kill a Mockingbird”  — offer “alternatives”, like, who knows? “The Selected Sermons of Jerry Falwell Jr.”</span></p><span data-dcnode-id="3297" instrument_node="">
</span><p data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node="">With Tim Walz still in office and Democrats controlling the House, this latest exercise in shameless pandering — dubbed the “Minnesota Parents’ Bill of Rights” — isn’t likely to go anywhere. But, still, there it is.</span></p><span data-dcnode-id="3294" instrument_node="">
</span><p data-dcnode-id="3292"><span data-dcnode-id="3293" instrument_node="">After two years of throwing up nothing but impediments to combating an international pandemic, and dismissing the impacts of police violence, this naked appeal to Critical Race Theory racists … (there, I said it) … is what Republicans are selling as a fresh idea. Something that truly improves the safety, prosperity and happiness of all concerned. </span></p><span data-dcnode-id="3291" instrument_node="">
</span><p data-dcnode-id="3286"><span data-dcnode-id="3290" instrument_node="">I have several teachers and ex-teachers among my family and circle of friends and it’s safe to describe them as universally disgusted. On top of Republicans regularly deriding the work of public school teachers for decades, (because as a group they tend to read a lot of books, have a union and vote Democrat they are a threat to Trump-era conservative ambitions), this latest brainstorm would add hours … and hours … of uncompensated time to every teacher’s workload. (Feel free to suspect that this “fresh idea” was handed down to Minnesota’s deep-thinking Republicans by some </span><a data-dcnode-id="3288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/environment/2022/feb/08/rightwing-lobby-alec-blacklist-companies-boycott-oil-industry"><span data-dcnode-id="3289" instrument_node="">ALEC-like dark money cabal</span></a><span data-dcnode-id="3287" instrument_node=""> which is simultaneously sliding cash to their campaign funds.)</span></p><span data-dcnode-id="3285" instrument_node="">
</span><p data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">My problem, on the beat reporter/editor level, is declining to aggressively confront the naked pandering of this and other even more cynical positions taken up by 2022 conservatives.</span></p><span data-dcnode-id="3282" instrument_node="">
</span><p data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">Like, for example, the “fraudulent 2020 election” claims pushed by Trumpists and widely-to-unanimously accepted (publicly) by Minnesota Republicans.</span></p><span data-dcnode-id="3279" instrument_node="">
</span><p data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">Post January 6 there was a brief moment when a truly revolutionary idea kicked around professional journalism circles. Namely, every interview with any politician would begin with the simple question, “Did Joe Biden win the 2020 election fair and square?”</span></p><span data-dcnode-id="3276" instrument_node="">
</span><p data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">Any answer other than, “Of course he did”, meant the interview was over and the politician, self-revealed to be a pathetic toady for a corrupt reality TV performer, would have to get his free publicity from some other outlet. (Working reporters could hand him business cards for Joe Rogan.)</span></p><span data-dcnode-id="3273" instrument_node="">
</span><p data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">That moment dissipated an instant later. Which means we have returned to treating cynical nonsense like “sharing curriculum”, (more accurately described as “censoring” or “canceling curriculum”) as though it is a good faith proposal to improve the academic outcomes of Minnesota students.</span></p><span data-dcnode-id="3270" instrument_node="">
</span><p data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">So I ask again, does this crowd have even one constructive idea?</span></p><span data-dcnode-id="3267" instrument_node="">
</span><p data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">Don’t everyone answer at once.</span></p><span data-dcnode-id="3264" instrument_node="">
</span><p data-dcnode-id="3263"></p><span data-dcnode-id="3262" instrument_node="">
</span><p data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node=""> </span></p><span data-dcnode-id="3259" instrument_node="">
</span><div class="sharedaddy sd-sharing-enabled" data-dcnode-id="3228"><div class="robots-nocontent sd-block sd-social sd-social-icon-text sd-sharing" data-dcnode-id="3229"><h3 class="sd-title" data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">Share this:</span></h3><div class="sd-content" data-dcnode-id="3230"><ul data-dcnode-id="3231"><li class="share-linkedin" data-dcnode-id="3253"><a class="share-linkedin sd-button share-icon" data-dcnode-id="3254" data-shared="sharing-linkedin-10711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/sharing-curriculum-and-the-gops-ceaseless-parade-of-naked-cynicism/%3Fshare%3Dlinkedin%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on LinkedIn"><span data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">LinkedIn</span></span></a></li><li class="share-facebook" data-dcnode-id="3249"><a class="share-facebook sd-button share-icon" data-dcnode-id="3250" data-shared="sharing-facebook-10711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/sharing-curriculum-and-the-gops-ceaseless-parade-of-naked-cynicism/%3Fshare%3Dfacebook%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Facebook"><span data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">Facebook</span></span></a></li><li class="share-print" data-dcnode-id="3245"><a class="share-print sd-button share-icon" data-dcnode-id="3246" data-shared="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/sharing-curriculum-and-the-gops-ceaseless-parade-of-naked-cynicism/" rel="nofollow noopener noreferrer" target="_blank" title="Click to print"><span data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">Print</span></span></a></li><li class="share-twitter" data-dcnode-id="3241"><a class="share-twitter sd-butto </span><article class="post-10707 post type-post status-publish format-standard hentry category-poltiics tag-gabbie-giffords tag-james-bennet tag-new-york-times tag-sarah-palin tag-tom-cotton" data-dcnode-id="3026" id="post-10707"><span data-dcnode-id="3192" instrument_node="">
</span><header class="entry-header" data-dcnode-id="3168"><span data-dcnode-id="3191" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="3188"><a data-dcnode-id="3189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/im-feeling-another-sarah-palin-payday/" rel="bookmark"><span data-dcnode-id="3190" instrument_node="">I’m Feeling Another Sarah Palin Payday</span></a></h1><span data-dcnode-id="3187" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="3171"><span data-dcnode-id="3186" instrument_node="">
</span><span class="sep" data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">Posted on </span></span><a data-dcnode-id="3181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/im-feeling-another-sarah-palin-payday/" rel="bookmark" title="11:53 am"><time class="entry-date" data-dcnode-id="3182" datetime="2022-02-14T11:53:52-05:00"><span data-dcnode-id="3183" instrument_node="">February 14, 2022</span></time></a><span class="by-author" data-dcnode-id="3173"><span data-dcnode-id="3180" instrument_node=""> </span><span class="sep" data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node=""> by </span></span><span data-dcnode-id="3177" instrument_node=""> </span><span class="author vcard" data-dcnode-id="3174"><a class="url fn n" data-dcnode-id="3175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/author/brian-lambert/" rel="author" title="View all posts by Brian Lambert"><span data-dcnode-id="3176" instrument_node="">Brian Lambert</span></a></span></span><span data-dcnode-id="3172" instrument_node=""> </span></div><span data-dcnode-id="3169" instrument_node="">
</span></header><span data-dcnode-id="3166" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3066"><span data-dcnode-id="3165" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="3163"><img alt="One-time vice presidential candidate Sarah Palin is joined by&nbsp;&quot;Duck Dynasty&quot; star Phil Robertson&nbsp;during a tea party rally against the international nuclear agreement with Iran in Washington, D.C., on Sept. 9." data-dcnode-id="3164" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.courant.com/resizer/bSaZvROYENlTXjfarbnMqSDKPy4%3D/800x450/top/arc-anglerfish-arc2-prod-tronc.s3.amazonaws.com/public/EQYGFIGVXNGQZGOKRJXCF74OZ4.jpg&amp;raw"></figure><span data-dcnode-id="3162" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="3160"><img alt="" data-dcnode-id="3161"></figure><span data-dcnode-id="3159" instrument_node="">
</span><p data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">Purely as a distraction you understand, I’ve taken an interest in Sarah Palin’s defamation trial against The New York Times. A decision may come down today, and betting money says she’ll lose. But losing could likely mean yet another in a series of pop culture paydays for the ex-mayor, ex-governor, ex-vice presidential candidate and ex-Masked Singer.</span></p><span data-dcnode-id="3156" instrument_node="">
</span><p data-dcnode-id="3154"><span data-dcnode-id="3155" instrument_node="">If you haven’t followed this at all, the very short story is this: Palin is accusing the Times, its editorial department and its editor at the time, James Bennet, of sullying her reputation in 2017 when he referenced an ad her “team” ran in 2011. The ad, fairly typical of other rabble-rousing pro-Second Amendment fund raising appeals, used gunsight imagery — a collection of crosshairs — over 20 Democrat-held congressional districts. You know, “They’re in our sights.”</span></p><span data-dcnode-id="3153" instrument_node="">
</span><p data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">Truly clever stuff. But invariably effective in ginning up small dollar contributions from the right-wing base.</span></p><span data-dcnode-id="3150" instrument_node="">
</span><p data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">The issue is that one of the “targeted” districts belonged to Gabby Giffords, who not long after was seriously wounded by a lunatic in a Tucson rampage that killed six people, including a nine year-old girl. (After being shown the ad prior to the attack, Giffords herself said, “We’re on Sarah Palin’s targeted list, but the thing is that the way that she has it depicted has the crosshairs of a gun sight over our district, and when people do that, they’ve got to realize there are consequences to that action’.”</span></p><span data-dcnode-id="3147" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="3145"><img alt="Sarah Palin vs. Ernie Chambers – Ricochet" data-dcnode-id="3146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ricochet.com/wp-content/uploads/2015/05/palin.jpg&amp;raw"></figure><span data-dcnode-id="3144" instrument_node="">
</span><p data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">Six years later Bennet added in a reference to the ad as he edited an opinion piece in the wake of the baseball field shooting — by a Bernie Sanders supporter — that seriously wounded Republican congressman Steve Scalise. His intended point, he says, being to draw attention to how violent rhetoric and imagery can lead to truly violent actions by the unstable.</span></p><span data-dcnode-id="3141" instrument_node="">
</span><p data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">Palin wasn’t having it. She had been sullied! And by god and mama grizzlies she was going to take the Times to court.</span></p><span data-dcnode-id="3138" instrument_node="">
</span><p data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">The truly ludicrous part of Palin’s claim is that the editorial — which Bennet and the Times corrected within hours — had “damaged” her in some way. Which way, she couldn’t say exactly, as Times’ lawyers pointed out that her standing in her political community and by extension her finances didn’t diminish much at all in the aftermath. </span></p><span data-dcnode-id="3135" instrument_node="">
</span><p data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">Put in another, less polite manner; being accused of anything by a citadel of godless, anti-freedom, elitist-liberal intolerance like The New York Times is — as everyone knows — like a monsoon of gold from the hillbilly firmament. In other words, mam, “Exactly what damage have you suffered?”</span></p><span data-dcnode-id="3132" instrument_node="">
</span><p data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">True to form, court room observers have noted that Palin hasn’t lost her touch when it comes to self-parody. At one point she declared that this editorial was just another example of how the Times had “lied” about her.  The only problem with that being was that no one, not even her, could come up with that other, um, you know, example. Said Palin when pressed in court, “I don’t have the specific references in front of me.”</span></p><span data-dcnode-id="3129" instrument_node="">
</span><p data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">Right. Well, we understand you’ve only been preparing for this trial for five years. But you get back to us when you’ve done some more research.</span></p><span data-dcnode-id="3126" instrument_node="">
</span><p data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">Then you factor in Palin being a very high profile-to-notorious public figure and how difficult it is to make a case abut defaming any famous personality.</span></p><span data-dcnode-id="3123" instrument_node="">
</span><p data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">So how a jury possibly rules in her favor will be a fascinating thing to see.</span></p><span data-dcnode-id="3120" instrument_node="">
</span><p data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">But the behavior of Mr. Bennet does expose the Times to a standard criticism of bias, certainly in the eyes of the usual right-wing echo chamber suspects.  I mean, he did reach back six years for an example of a conservative politician using violent imagery. That leaves him open to accusations of fixed bias.</span></p><span data-dcnode-id="3117" instrument_node="">
</span><p data-dcnode-id="3112"><span data-dcnode-id="3116" instrument_node="">However, as Bennet — who was later driven out of the Times by the Times itself after running </span><a data-dcnode-id="3114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2020/06/03/opinion/tom-cotton-protests-military.html"><span data-dcnode-id="3115" instrument_node="">an incendiary opinion piece</span></a><span data-dcnode-id="3113" instrument_node=""> by Republican Sen. Tom Cotton demanding troops be sent in to subdue George Floyd protestors — explained in court, he was unable to find even one example of a liberal politician using similar violent imagery. In other words, its kind of a PalinWorld thing, that “targeted”, “get ’em in our gun sights” money raising pitch.</span></p><span data-dcnode-id="3111" instrument_node="">
</span><p data-dcnode-id="3109"><span data-dcnode-id="3110" instrument_node="">If Palin loses today or tomorrow I do hope someone keeps tabs on the speaking circuit/cheesy singing show/reality TV/FoxNews appearance/fund-raising haul that comes her way in the wake of being treated so cruelly and predictably by … a jury of New Yorkers.</span></p><span data-dcnode-id="3108" instrument_node="">
</span><p data-dcnode-id="3106"><span data-dcnode-id="3107" instrument_node="">I tell you, there’s gold in being a perpetual victim of elitist liberals.     </span></p><span data-dcnode-id="3105" instrument_node="">
</span><p data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node=""> </span></p><span data-dcnode-id="3102" instrument_node="">
</span><p data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node=""> </span></p><span data-dcnode-id="3099" instrument_node="">
