</span><header class="entry-header" data-dcnode-id="2999"><span data-dcnode-id="3022" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="3019"><a data-dcnode-id="3020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/how-much-of-a-fool-do-you-have-to-be-to-even-listen-to-joe-rogan/" rel="bookmark"><span data-dcnode-id="3021" instrument_node="">How Much of a Fool Do You Have to Be to Even Listen to Joe Rogan?</span></a></h1><span data-dcnode-id="3018" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="3002"><span data-dcnode-id="3017" instrument_node="">
</span><span class="sep" data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">Posted on </span></span><a data-dcnode-id="3012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/how-much-of-a-fool-do-you-have-to-be-to-even-listen-to-joe-rogan/" rel="bookmark" title="3:04 pm"><time class="entry-date" data-dcnode-id="3013" datetime="2022-01-31T15:04:39-05:00"><span data-dcnode-id="3014" instrument_node="">January 31, 2022</span></time></a><span class="by-author" data-dcnode-id="3004"><span data-dcnode-id="3011" instrument_node=""> </span><span class="sep" data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node=""> by </span></span><span data-dcnode-id="3008" instrument_node=""> </span><span class="author vcard" data-dcnode-id="3005"><a class="url fn n" data-dcnode-id="3006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/author/brian-lambert/" rel="author" title="View all posts by Brian Lambert"><span data-dcnode-id="3007" instrument_node="">Brian Lambert</span></a></span></span><span data-dcnode-id="3003" instrument_node=""> </span></div><span data-dcnode-id="3000" instrument_node="">
</span></header><span data-dcnode-id="2997" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2880"><span data-dcnode-id="2996" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="2994"><img alt="" class="wp-image-10705" data-attachment-id="10705" data-comments-opened="1" data-dcnode-id="2995" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1381939995&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="JoeRogan-PhotoCreditPaulMobley" data-large-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/JoeRogan-PhotoCreditPaulMobley.jpg" data-medium-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/JoeRogan-PhotoCreditPaulMobley-300x202.jpg" data-orig-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/JoeRogan-PhotoCreditPaulMobley.jpg" data-orig-size="1000,673" data-permalink="https://www.wrywingpolitics.com/how-much-of-a-fool-do-you-have-to-be-to-even-listen-to-joe-rogan/joerogan-photocreditpaulmobley/" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/wp-content/uploads/2022/01/JoeRogan-PhotoCreditPaulMobley.jpg&amp;raw" srcset="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/JoeRogan-PhotoCreditPaulMobley.jpg 1000w, https://www.wrywingpolitics.com/wp-content/uploads/2022/01/JoeRogan-PhotoCreditPaulMobley-300x202.jpg 300w, https://www.wrywingpolitics.com/wp-content/uploads/2022/01/JoeRogan-PhotoCreditPaulMobley-768x517.jpg 768w, https://www.wrywingpolitics.com/wp-content/uploads/2022/01/JoeRogan-PhotoCreditPaulMobley-446x300.jpg 446w"></figure><span data-dcnode-id="2993" instrument_node="">
</span><p data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">By the strictest rules of commentary I shouldn’t say anything about this Joe Rogan business. Why?  Because I’ve never listened to a second of his podcast, nor do I have any use for Spotify. But thanks to our amazing world of bubble-specific watchdogs and punditry, Rogan’s shtick gets regular coverage on websites I patronize, and I at least know what Spotify is.</span></p><span data-dcnode-id="2990" instrument_node="">
</span><p data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">My general impression of Rogan, based on a few YouTube clips and the near constant reporting on his dialogues with various guests is: Another one of those guys.</span></p><span data-dcnode-id="2987" instrument_node="">
</span><p data-dcnode-id="2980"><span data-dcnode-id="2986" instrument_node="">If you know nothing about him,</span><a data-dcnode-id="2984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/2022/01/27/us/joe-rogan-jordan-peterson-climate-science-intl/index.html"><span data-dcnode-id="2985" instrument_node=""> check out this recent conversation</span></a><span data-dcnode-id="2983" instrument_node=""> with self-acclaimed revolutionary thinker, Jordan Peterson. </span><a data-dcnode-id="2981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independent.co.uk/arts-entertainment/tv/news/trevor-noah-joe-rogan-jordan-peterson-b2003406.html"><span data-dcnode-id="2982" instrument_node="">It’s an epic in the annals of clap-trap. </span></a></p><span data-dcnode-id="2979" instrument_node="">
</span><p data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">Rogan is yet another self-satisfied dude (always a guy) selling the image of the blue-collar provocateur-savant. A guy — stop me when you’ve heard this before — up from the hardscrabble. He’s a “comedian, television host and mixed martial arts commentator” mixing it up with and putting it to the prissy, pedigreed class. It’s a decades-old media shtick that persistently sells the notion to a mass audience of his educational and cultural peers (mostly younger men with masculinity issues, IMHO) that he, and therefore they, are really every bit as savvy as the snobby elites with their titles and actual experience in politics, arts and science.</span></p><span data-dcnode-id="2976" instrument_node="">
</span><p data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">We’ve seen this act hundreds of times before. It’s just another variation on FM morning drive radio, a forum steeped in reassuring the chronically aggrieved that the “smart asses” aren’t any smarter or moral ethical than you, me and Buddy down there at the end of the bar. (Even though we all make jokes about how f**kin’ dim Buddy is.)</span></p><span data-dcnode-id="2973" instrument_node="">
</span><p data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">Because this kind of act only succeeds by practicing The First Rule of Show Biz, i.e. “Give the people what they want”,  Rogan-like theater means stirring in ripe accents of class and racial resentments, the sort of thing that puts out a stink to … well, precisely the prissy elites that it’s designed to annoy.</span></p><span data-dcnode-id="2970" instrument_node="">
</span><p data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">So, you know, kind of a “win win.”</span></p><span data-dcnode-id="2967" instrument_node="">
</span><p data-dcnode-id="2962"><span data-dcnode-id="2966" instrument_node="">For some time the issue with Rogan, in addition to his always “mass audience”-friendly side trips into trans-phobia, Islamophobia, etc.,  has been his “real American”, blue collar disinformation about COVID vaccines. (</span><a data-dcnode-id="2964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsj.com/articles/spotify-strikes-exclusive-podcast-deal-with-joe-rogan-11589913814"><span data-dcnode-id="2965" instrument_node="">His contract with Spotify is worth $100 million, FYI.</span></a><span data-dcnode-id="2963" instrument_node="">) I won’t pretend to know who inspired him down this path. But it goes without saying that the “freedom of choice”, “I’ve done my own research” shtick, whipped up into a lighter-than-air frappe with standard issue anti-“big gummint overreach” has a large, ready and receptive audience … of easily confused men. (IMHO, again.)</span></p><span data-dcnode-id="2961" instrument_node="">
</span><p data-dcnode-id="2956"><span data-dcnode-id="2960" instrument_node="">Rogan’s own recent history with COVID should have been disqualifying as anything but an illiterate. We do remember that after telling “young healthy people” they couldn’t get seriously ill from COVID, the heavily-tattoed 52 year-old </span><a data-dcnode-id="2958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2021/09/01/1033485152/joe-rogan-covid-ivermectin"><span data-dcnode-id="2959" instrument_node="">Rogan contracted the disease, supposedly treated himself</span></a><span data-dcnode-id="2957" instrument_node=""> (and pitched to his credulous fans) the value of the horse de-wormer ivermectin as opposed to “vaccine mandates.”</span></p><span data-dcnode-id="2955" instrument_node="">
</span><p data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">In an enlightened world he’d be written off as a fool. But the baritoned-morning-radio-jock-savant shtick is so powerful, especially with men who don’t know what to believe, acts like his become their gold standard for credibility. </span></p><span data-dcnode-id="2952" instrument_node="">
</span><p data-dcnode-id="2947"><span data-dcnode-id="2951" instrument_node="">With big name pop stars, beginning with Neil Young and Joni Mitchell now yanking their music from Spotify, the pressure is on for the streaming music to “do something about Rogan.” But, with that $100 million on the line and his low-information audience to avoid displeasing, no corporation is going to get rash. Not even after  270 doctors and scientists issue a publc statement complaining about Rogan giving regular exposure to … well, </span><a data-dcnode-id="2949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spotifyopenletter.wordpress.com/2022/01/10/an-open-letter-to-spotify/"><span data-dcnode-id="2950" instrument_node="">charlatans pushing bullshit quasi-scien</span></a><span data-dcnode-id="2948" instrument_node="">ce.</span></p><span data-dcnode-id="2946" instrument_node="">
</span><p data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">(Spotify charges roughly $10 a month to stream hundreds of thousands of songs, meaning artists see very, very little in the way of royalties. It’s no big deal if you’re Young or Mitchell or The Rolling Stones, but it snuffs out plenty of CD and Apple Music sales if you’re farther down the ladder of fame.)</span></p><span data-dcnode-id="2943" instrument_node="">
</span><p data-dcnode-id="2938"><span data-dcnode-id="2942" instrument_node="">As of </span><a data-dcnode-id="2940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2022/01/30/1076849204/spotify-covid-advisory-joe-rogan-neil-young"><span data-dcnode-id="2941" instrument_node="">today Spotify’s response is</span></a><span data-dcnode-id="2939" instrument_node=""> that it will not be a “content censor.” But it will offer Rogan’s audience an advisory anytime he applies his deep thinking to, you know, COVID science. Because after all, Spotify’s CEO says, ” … it’s become clear to me that we have an obligation to do more to provide balance and access to widely-accepted information from the medical and scientific communities guiding us through this unprecedented time … .”</span></p><span data-dcnode-id="2937" instrument_node="">
</span><p data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">Uh huh. Right.</span></p><span data-dcnode-id="2934" instrument_node="">
</span><p data-dcnode-id="2932"><span data-dcnode-id="2933" instrument_node="">But excuse me. Because what I hear him saying is he’s going to provide “balance and access” to accurate information about a global pandemic that has already killed 5.4 million people and staggered hospital staffs across the planet … but in no way is he going to instruct a guy he is paying $100 million to stop spreading outright lies about the very same disease. </span></p><span data-dcnode-id="2931" instrument_node="">
</span><p data-dcnode-id="2927"><span data-dcnode-id="2930" instrument_node="">Being good capitalists, we understand the CEO’s problem.  I mean, what if Rogan gets pissed off at being told he can’t spread disinformation about a fatal disease? What if — horrors — he dumps Spotify and gets a sweeter deal at, I don’t know, </span><a data-dcnode-id="2928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnbc.com/2021/12/04/trumps-social-media-venture-to-raise-about-1-billion-in-funds.html"><span data-dcnode-id="2929" instrument_node="">Donald Trump’s new media empire? </span></a></p><span data-dcnode-id="2926" instrument_node="">
</span><p data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">How would the CEO replace him? I mean other than with any of a thousand guys working the same bogus shtick every day?</span></p><span data-dcnode-id="2923" instrument_node="">
</span><p data-dcnode-id="2922"></p><span data-dcnode-id="2921" instrument_node="">
</span><p data-dcnode-id="2920"></p><span data-dcnode-id="2919" instrument_node="">
</span><p data-dcnode-id="2918"></p><span data-dcnode-id="2917" instrument_node="">
</span><p data-dcnode-id="2916"></p><span data-dcnode-id="2915" instrument_node="">
</span><p data-dcnode-id="2914"></p><span data-dcnode-id="2913" instrument_node="">
</span><div class="sharedaddy sd-sharing-enabled" data-dcnode-id="2882"><div class="robots-nocontent sd-block sd-social sd-social-icon-text sd-sharing" data-dcnode-id="2883"><h3 class="sd-title" data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">Share this:</span></h3><div class="sd-content" data-dcnode-id="2884"><ul data-dcnode-id="2885"><li class="share-linkedin" data-dcnode-id="2907"><a class="share-linkedin sd-button share-icon" data-dcnode-id="2908" data-shared="sharing-linkedin-10703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/how-much-of-a-fool-do-you-have-to-be-to-even-listen-to-joe-rogan/%3Fshare%3Dlinkedin%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on LinkedIn"><span data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">LinkedIn</span></span></a></li><li class="share-facebook" data-dcnode-id="2903"><a class="share-facebook sd-button share-icon" data-dcnode-id="2904" data-shared="sharing-facebook-10703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/how-much-of-a-fool-do-you-have-to-be-to-even-listen-to-joe-rogan/%3Fshare%3Dfacebook%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Facebook"><span data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">Facebook</span></span></a></li><li class="share-print" data-dcnode-id="2899"><a class="share-print sd-button share-icon" data-dcnode-id="2900" data-shared="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/how-much-of-a-fool-do-you-have-to-be-to-even-listen-to-joe-rogan/" rel="nofollow noopener noreferrer" target="_blank" title="Click to print"><span data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">Print</span></span></a></li><li class="share-twitter" data-dcnode-id="2895"><a class="share-twitter sd-button shar </span><article class="post-10700 post type-post status-publish format-standard hentry category-poltiics tag-new-york-times tag-scott-quiner tag-star-tribune tag-stew-peters tag-washington-post" data-dcnode-id="2661" id="post-10700"><span data-dcnode-id="2840" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2816"><span data-dcnode-id="2839" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2836"><a data-dcnode-id="2837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/how-did-local-media-or-the-times-or-the-post-know-scott-quiner-was-anywhere/" rel="bookmark"><span data-dcnode-id="2838" instrument_node="">How Did Local Media — or the Times or the Post — Know Scott Quiner Was Anywhere?</span></a></h1><span data-dcnode-id="2835" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="2819"><span data-dcnode-id="2834" instrument_node="">
</span><span class="sep" data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">Posted on </span></span><a data-dcnode-id="2829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/how-did-local-media-or-the-times-or-the-post-know-scott-quiner-was-anywhere/" rel="bookmark" title="11:47 am"><time class="entry-date" data-dcnode-id="2830" datetime="2022-01-24T11:47:53-05:00"><span data-dcnode-id="2831" instrument_node="">January 24, 2022</span></time></a><span class="by-author" data-dcnode-id="2821"><span data-dcnode-id="2828" instrument_node=""> </span><span class="sep" data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node=""> by </span></span><span data-dcnode-id="2825" instrument_node=""> </span><span class="author vcard" data-dcnode-id="2822"><a class="url fn n" data-dcnode-id="2823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/author/brian-lambert/" rel="author" title="View all posts by Brian Lambert"><span data-dcnode-id="2824" instrument_node="">Brian Lambert</span></a></span></span><span data-dcnode-id="2820" instrument_node=""> </span></div><span data-dcnode-id="2817" instrument_node="">
</span></header><span data-dcnode-id="2814" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2701"><span data-dcnode-id="2813" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="2811"><img alt="" class="wp-image-10701" data-attachment-id="10701" data-comments-opened="1" data-dcnode-id="2812" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="1383dc80-7823-11ec-846b-af5720fdcbca_800_420" data-large-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/1383dc80-7823-11ec-846b-af5720fdcbca_800_420.jpeg" data-medium-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/1383dc80-7823-11ec-846b-af5720fdcbca_800_420-300x158.jpeg" data-orig-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/1383dc80-7823-11ec-846b-af5720fdcbca_800_420.jpeg" data-orig-size="800,420" data-permalink="https://www.wrywingpolitics.com/how-did-local-media-or-the-times-or-the-post-know-scott-quiner-was-anywhere/1383dc80-7823-11ec-846b-af5720fdcbca_800_420/" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/wp-content/uploads/2022/01/1383dc80-7823-11ec-846b-af5720fdcbca_800_420.jpeg&amp;raw" srcset="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/1383dc80-7823-11ec-846b-af5720fdcbca_800_420.jpeg 800w, https://www.wrywingpolitics.com/wp-content/uploads/2022/01/1383dc80-7823-11ec-846b-af5720fdcbca_800_420-300x158.jpeg 300w, https://www.wrywingpolitics.com/wp-content/uploads/2022/01/1383dc80-7823-11ec-846b-af5720fdcbca_800_420-768x403.jpeg 768w, https://www.wrywingpolitics.com/wp-content/uploads/2022/01/1383dc80-7823-11ec-846b-af5720fdcbca_800_420-500x263.jpeg 500w"></figure><span data-dcnode-id="2810" instrument_node="">
</span><p data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">First … my condolences to the family of Scott Quiner. No matter the circumstances, someone’s death, especially an entirely preventable death, is a sad occasion. That said, the telling and reporting on Mr. Quiner’s last days leaves several questions unanswered and a lot to be desired.</span></p><span data-dcnode-id="2807" instrument_node="">
</span><p data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">Quiner is the now nationally famous man from exurban Minneapolis who, unvaccinated by choice, contracted COVID in late October. He was hospitalized and intubated since early November before his wife sued to prevent Mercy Hospital in Coon Rapids from disconnecting him. Then just last week, we’re told she flew him to “a hospital in Texas”. At that point her lawyer … told the press (which promptly reported) that though badly malnourished Quiner was once again responsive … before then relaying on that he died two days ago.</span></p><span data-dcnode-id="2804" instrument_node="">
</span><p data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">My issue with this story from the get-go was how we knew much of anything about what was really happening here?</span></p><span data-dcnode-id="2801" instrument_node="">
</span><p data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">Like every other hospital, Mercy in Coon Rapids, has laws and rules about disclosing patient information. So it has said little to nothing about Quiner’s condition or it’s reasons for planning to disconnect him … after two and a half months on a ventilator amid a new crush of COVID patients and a dire lack of ICU capacity for “normal” emergencies. (The average ICU stay is three days.) </span></p><span data-dcnode-id="2798" instrument_node="">
</span><p data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">Everything after that is the word of Mrs. Quiner or her attorney, including where exactly he was being treated in Texas … if anywhere.</span></p><span data-dcnode-id="2795" instrument_node="">
</span><p data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">This from a Jan. 17 Strib story, “Scott is now in a hospital in  Texas getting critical care’, said Marjorie Holsten, a local attorney  hired by Quiner’s wife, Anne. ‘The doctor said Scott was the most  undernourished patient he has ever seen. The last update I got was  yesterday afternoon after some tests had been run; all organs are  working except his lungs’. Holsten did not name the Texas hospital.”</span></p><span data-dcnode-id="2792" instrument_node="">
</span><p data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">How do we know any of that is true and accurate?</span></p><span data-dcnode-id="2789" instrument_node="">
</span><p data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">What is known, but has only been hinted at, is that Mrs. Quiner — to her credit, some might say — played every card in her hand to get her husband treated as she saw proper. A January 14 Star Tribune story says, “Anne Quiner repeatedly had asked  the hospital to try various treatments, including some that are not  widely used. But the hospital refused, she said. ‘They basically said they have the authority to do this no matter what I  say’, Anne Quiner said Thursday on the Stew Peters Show, a podcast that  broadcasts from the Twin Cities and has been critical of COVID vaccines.”</span></p><span data-dcnode-id="2786" instrument_node="">
</span><p data-dcnode-id="2781"><span data-dcnode-id="2785" instrument_node="">” </span><em data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">… has been critical of COVID vaccines</span></em><span data-dcnode-id="2782" instrument_node="">.” Hmmm. That’s applying a very light hand to (yet another) MAGA-fueled podcaster regularly pumping out COVID misinformation and inflaming the ill-informed. Nor does it even hint at the barrage of outraged anti-Vaxxers, ivermectin enthusiasts and the conspiracy-deluded who, I’m told by a first-hand source,  bombarded newsrooms across the Twin Cities demanding, you know, truth and justice for Scott Quiner. (As is so often the case, the callers, outraged at the lame stream media cover-up sounded as though they were reading from the same script.)</span></p><span data-dcnode-id="2780" instrument_node="">
</span><p data-dcnode-id="2775"><span data-dcnode-id="2779" instrument_node="">A </span><a data-dcnode-id="2777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2022/01/23/world/scott-quiner-covid-ventilator-fight.html"><span data-dcnode-id="2778" instrument_node="">New York Times story</span></a><span data-dcnode-id="2776" instrument_node=""> at least said this, “On Jan. 12, Ms. Quiner pleaded for a lawyer’s help on the ‘Stew Peters Show’, a podcast whose host has falsely called Covid vaccines ‘poisonous shots’ and given a platform to pandemic conspiracy theories.”</span></p><span data-dcnode-id="2774" instrument_node="">
</span><p data-dcnode-id="2769"><span data-dcnode-id="2773" instrument_node="">Want to know a bit more about Minnesota’s own Mr. Peters? </span><a data-dcnode-id="2771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thedailybeast.com/magas-new-shock-jock-is-a-bounty-hunter-with-a-troubled-past"><span data-dcnode-id="2772" instrument_node="">Try reading this, </span></a><span data-dcnode-id="2770" instrument_node="">and drop me a line if you can find where any Minnesota news outlet wrote a similar piece, or hell, has “reported” on Mr. Peters at all.</span></p><span data-dcnode-id="2768" instrument_node="">
</span><p data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">What this looks and sounds like, but has not been acknowledged by any news organization — that I have yet found — is that local newsrooms were badgered by political partisans into covering a story where by every plausible assumption the victim(s) — all adults — made conscious choices that resulted in severe illness, hospitalization (at staggering cost) and death. Moreover, the news organizations then relented, likely justifying coverage on the grounds that a judge issued a rare restraining order against a hospital.</span></p><span data-dcnode-id="2765" instrument_node="">
</span><p data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">But, I’m sorry, that is a long ways from telling the whole story of what went on with Scott Quiner. Nor does it explain why any news room would accept the word of the family’s lawyer in lieu of any verification that what she was saying was true.</span></p><span data-dcnode-id="2762" instrument_node="">
</span><p data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">Perhaps, the Strib and other local news rooms can explain how they verified Quiner had been flown anywhere? (The family raised roughly $40,000 via GoFundMe-style appeals.) Or that he was actually in a hospital or “care facility” in Texas and that his condition was improving … until, he died. Or, now that we’re told he died, will any of them follow up and seek a copy of the death certificate?</span></p><span data-dcnode-id="2759" instrument_node="">
</span><p data-dcnode-id="2754"><span data-dcnode-id="2758" instrument_node="">The Washington Post says, “Quiner died at the Houston hospital where he was flown for care during the legal battle, according to Marjorie Holsten, an attorney for the family. He remained on a ventilator at the time, Holsten said, but </span><strong data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">she declined to identify the facility or provide additional details on the circumstances of his death.</span></strong><span data-dcnode-id="2755" instrument_node="">“</span></p><span data-dcnode-id="2753" instrument_node="">
</span><p data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">Fear of pitchfork mobs, even in the form of a tidal wave of spittle-flecked raging via telephone, is a sad reality in modern newsrooms … so assert I. Would any of the same newsrooms care to dispute that they weren’t goaded/badgered/threatened into giving the Quiner story the coverage it got? And whether — or why they didn’t ask — the basic journalistic question of, “Where exactly is he now? So, you know, we can confirm what you’re telling us.”</span></p><span data-dcnode-id="2750" instrument_node="">
</span><p data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">An attorney refusing to supply “news basics” like that would, to my mind, mean putting the story on hold until she did, or it could be confirmed in some other way.</span></p><span data-dcnode-id="2747" instrument_node="">
</span><p data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">After that, let me suggest that there may be a “feature profile” on Stew Peters, who is clearly a local character with enough potency and influence to whip up sufficient anger that he manufactured soft, fundamentally sympathetic coverage in major media for a family that made a series of extremely bad choices, against all science and logic, and lost. </span></p><span data-dcnode-id="2744" instrument_node="">
</span><p data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node=""> </span></p><span data-dcnode-id="2741" instrument_node="">
</span><p data-dcnode-id="2740"></p><span data-dcnode-id="2739" instrument_node="">
</span><p data-dcnode-id="2738"></p><span data-dcnode-id="2737" instrument_node="">
</span><p data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node=""> </span></p><span data-dcnode-id="2734" instrument_node="">

</span><article class="post-10695 post type-post status-publish format-standard hentry category-poltiics" data-dcnode-id="2486" id="post-10695"><span data-dcnode-id="2658" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2634"><span data-dcnode-id="2657" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2654"><a data-dcnode-id="2655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/have-things-really-never-been-worse-or-are-we-just-getting-older/" rel="bookmark"><span data-dcnode-id="2656" instrument_node="">Have Things Really Never Been Worse Or Are We Just Getting Older?</span></a></h1><span data-dcnode-id="2653" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="2637"><span data-dcnode-id="2652" instrument_node="">
</span><span class="sep" data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">Posted on </span></span><a data-dcnode-id="2647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/have-things-really-never-been-worse-or-are-we-just-getting-older/" rel="bookmark" title="12:32 pm"><time class="entry-date" data-dcnode-id="2648" datetime="2022-01-18T12:32:57-05:00"><span data-dcnode-id="2649" instrument_node="">January 18, 2022</span></time></a><span class="by-author" data-dcnode-id="2639"><span data-dcnode-id="2646" instrument_node=""> </span><span class="sep" data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node=""> by </span></span><span data-dcnode-id="2643" instrument_node=""> </span><span class="author vcard" data-dcnode-id="2640"><a class="url fn n" data-dcnode-id="2641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/author/brian-lambert/" rel="author" title="View all posts by Brian Lambert"><span data-dcnode-id="2642" instrument_node="">Brian Lambert</span></a></span></span><span data-dcnode-id="2638" instrument_node=""> </span></div><span data-dcnode-id="2635" instrument_node="">
</span></header><span data-dcnode-id="2632" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2502"><span data-dcnode-id="2631" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="2629"><img alt="" class="wp-image-10698" data-attachment-id="10698" data-comments-opened="1" data-dcnode-id="2630" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;14&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;ILCE-6300&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1672260689&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;16&quot;,&quot;iso&quot;:&quot;100&quot;,&quot;shutter_speed&quot;:&quot;0.008&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="DSC8300" data-large-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/DSC8300-1024x442.jpeg" data-medium-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/DSC8300-300x130.jpeg" data-orig-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/DSC8300.jpeg" data-orig-size="6000,2590" data-permalink="https://www.wrywingpolitics.com/have-things-really-never-been-worse-or-are-we-just-getting-older/dsc8300/" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/wp-content/uploads/2022/01/DSC8300-1024x442.jpeg&amp;raw" srcset="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/DSC8300-1024x442.jpeg 1024w, https://www.wrywingpolitics.com/wp-content/uploads/2022/01/DSC8300-300x130.jpeg 300w, https://www.wrywingpolitics.com/wp-content/uploads/2022/01/DSC8300-768x332.jpeg 768w, https://www.wrywingpolitics.com/wp-content/uploads/2022/01/DSC8300-500x216.jpeg 500w"></figure><span data-dcnode-id="2628" instrument_node="">
</span><p data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">The mind tends to wander a bit on a long, solo road trip. There’s only so much singing along to your own music anyone can take, (especially if you have to listen to voice like mine.) Eventually you check out local radio — in Nebraska, Kansas, Oklahoma and on — and counter-balance that with a few select podcasts.*</span></p><span data-dcnode-id="2625" instrument_node="">
</span><p data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">That said, the take away from a recent spin listening to AM radio out West, reading local papers and catching up on sage punditry is that things have never been worse. This can’t go on much longer. A day of reckoning is coming. Survival is not assured.</span></p><span data-dcnode-id="2622" instrument_node="">
</span><p data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">It’s enough to make a guy pull over, abandon the vehicle (along with all hope) and like a diseased bull elk, wander off toward the high mountains and accept the end of days.</span></p><span data-dcnode-id="2619" instrument_node="">
</span><p data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">But is this accurate description of January 2022? Is this the worst “things” have ever been? Furthermore, how do you begin to judge such a thing?</span></p><span data-dcnode-id="2616" instrument_node="">
</span><p data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">After 70 comparatively comfortable and happy years on this planet I find it very difficult to buy into the thinking that humankind has never experienced a worse confluence of perils. Still, it’s a question worth posing every so often, if only to regulate your temperature.</span></p><span data-dcnode-id="2613" instrument_node="">
</span><p data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">If you’re an age-peer of mine you remember the Sixties. A cold war with the omnipresent threat of nuclear annihilation. Assassinations of enormously popular (liberal) leaders. An immensely foolish, ill-conceived hot war. Near constant racial violence. The white, male power structure mashing the fire alarm over drugged-out, over-sexed hippies “rioting” in the streets and angry, fed-up women calling the old boys out for the sclerotic anachronisms they were.</span></p><span data-dcnode-id="2610" instrument_node="">
</span><p data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">It was a wild time. But not unlike the proverbial frog in the cookpot, the average teenager, tucked away on a Midwest prairie, thought of it all as nothing other than normal. Bad. But normal. More craziness like what has always gone on.</span></p><span data-dcnode-id="2607" instrument_node="">
</span><p data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">The fever of that era broke, mostly. The war ended. Bull Connor-style racial violence subsided. Doped-up kids got jobs. Women were heartened by the gains they made, albeit still a long way from cracking the glass ceiling. In a way time itself was an analgesic.</span></p><span data-dcnode-id="2604" instrument_node="">
</span><p data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">So it’s tempting to regard our moment today as essentially similar to then, or to any other spasm of rage and horror. Whether WWII, the repeated waves of Mongol hordes, the religious-based genocides of the Dark Ages or, hell, the stone-club and spear attacks of one Cro-Magnon tribe on another. Mayhem has always been with us.</span></p><span data-dcnode-id="2601" instrument_node="">
</span><p data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">But … but … there are several powerful differences between 2022 and any other era of stress and chaos.</span></p><span data-dcnode-id="2598" instrument_node="">
</span><p data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">At no other time has the entire human race faced a common looming lethality like climate change. Plagues have come and gone. But climate change will, by any and every estimation, inflict enormous physical, financial and emotional damage … and remain, likely escalating its chaos year after year.</span></p><span data-dcnode-id="2595" instrument_node="">
</span><p data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">I’m among those who think most of the insanity of this era is due to our inability to comprehend and adjust to the effects of social media, a revolution in human community-building, delusion-spreading and anger-inflammation unprecedented in the 200,000 or so years we’ve “cooperated” with one another. Never before has so much superstition and ill-will been able to spread so quickly and with such virality across the entire planet.</span></p><span data-dcnode-id="2592" instrument_node="">
</span><p data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">Compounding that menace is of course a segment of the leadership class exploiting superstition and ill-will for personal gain. That sort of thing too though is as old as the aforementioned cave men. But the number of exploitables, is now thousands of times greater than the Stone Age, and looking at population growth, easily double what it was when I was a teenager.</span></p><span data-dcnode-id="2589" instrument_node="">
</span><p data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">Of coyurse, age itself has to be acknowledged. With its remorsely increasing frailities aging enhances our sense of peril. We aren’t as strong or as psychologically flexible as we were in youth. We then become more isolated and fearful as a consequence of feeling susceptible to street crime and mutating viruses. Simultaneously, having a measure the young don’t have for how things once were, we are less able/willing to see a clean path forward. Hopelessness adds to our sense of doom.</span></p><span data-dcnode-id="2586" instrument_node="">
</span><p data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">The young may not have such feelings in the same depth. But I’m sobered by how many 20, 30 and 40 year-olds acknowledge climate change (and the leadership class’s inability to be serious about it) as a very dark cloud on their personal horizons.</span></p><span data-dcnode-id="2583" instrument_node="">
</span><p data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">I came to no definitive conclusion on the question of whether this is as bad as it has ever been. Clearly, raging ignorance withstanding, there are millions of people of intelligence and conscience determined to forestall and counter the impacts of climate change. So that glimmer of hope exists.</span></p><span data-dcnode-id="2580" instrument_node="">
</span><p data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">A lot of this sort of thing was rolling around my alleged mind as I took a side trip in western Kansas to see a geological anomaly known as Monument Rocks. It’s barely five acres of bizarre chalk towers, standing up to 70 feet tall amid the wide prairie of grazing cattle. The rocks are an 80 million year-old remnant of an island in the once vast inland sea that split incipient North America way back then. Every inch of the towers representing 700 years of accumulating sea creatures and sediment.</span></p><span data-dcnode-id="2577" instrument_node="">
</span><p data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">The point? </span></p><span data-dcnode-id="2574" instrument_node="">
</span><p data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">You can look at these strange pillars and arches and see only an accumulation of death. Or … you can see tens of millions of years orf life that has given way to grassland sustaining a new generation. </span></p><span data-dcnode-id="2571" instrument_node="">
</span><p data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">Which is to say that, while not supremely comforting, we can accept with certainty that life will go on long past this chaotic moment. You and I may not experience the same comparatively comfortable and happy style of living 20th and 21st century America provided us. But in some form life will survive.</span></p><span data-dcnode-id="2568" instrument_node="">
</span><p data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node=""> </span></p><span data-dcnode-id="2565" instrument_node="">

</span><header class="entry-header" data-dcnode-id="2459"><span data-dcnode-id="2482" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2479"><a data-dcnode-id="2480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/whos-pro-and-whos-con-about-dont-look-up/" rel="bookmark"><span data-dcnode-id="2481" instrument_node="">Who’s “Pro” and Who’s “Con’ About  “Don’t Look Up”?</span></a></h1><span data-dcnode-id="2478" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="2462"><span data-dcnode-id="2477" instrument_node="">
</span><span class="sep" data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">Posted on </span></span><a data-dcnode-id="2472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/whos-pro-and-whos-con-about-dont-look-up/" rel="bookmark" title="4:44 pm"><time class="entry-date" data-dcnode-id="2473" datetime="2022-01-14T16:44:26-05:00"><span data-dcnode-id="2474" instrument_node="">January 14, 2022</span></time></a><span class="by-author" data-dcnode-id="2464"><span data-dcnode-id="2471" instrument_node=""> </span><span class="sep" data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node=""> by </span></span><span data-dcnode-id="2468" instrument_node=""> </span><span class="author vcard" data-dcnode-id="2465"><a class="url fn n" data-dcnode-id="2466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/author/brian-lambert/" rel="author" title="View all posts by Brian Lambert"><span data-dcnode-id="2467" instrument_node="">Brian Lambert</span></a></span></span><span data-dcnode-id="2463" instrument_node=""> </span></div><span data-dcnode-id="2460" instrument_node="">
</span></header><span data-dcnode-id="2457" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2327"><span data-dcnode-id="2456" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="2454"><img alt="" class="wp-image-10691" data-attachment-id="10691" data-comments-opened="1" data-dcnode-id="2455" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="AAAABf07Ihf0o-BL7ks_pjwU1BfBJzxgHA8Ao8jMZ5dfJA8PZ_R7l-NyvQHtTj1TpmnL7lnR2SA8Nv4VGzEO9yJkmJ_fwArM" data-large-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/AAAABf07Ihf0o-BL7ks_pjwU1BfBJzxgHA8Ao8jMZ5dfJA8PZ_R7l-NyvQHtTj1TpmnL7lnR2SA8Nv4VGzEO9yJkmJ_fwArM-1024x576.jpg" data-medium-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/AAAABf07Ihf0o-BL7ks_pjwU1BfBJzxgHA8Ao8jMZ5dfJA8PZ_R7l-NyvQHtTj1TpmnL7lnR2SA8Nv4VGzEO9yJkmJ_fwArM-300x169.jpg" data-orig-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/AAAABf07Ihf0o-BL7ks_pjwU1BfBJzxgHA8Ao8jMZ5dfJA8PZ_R7l-NyvQHtTj1TpmnL7lnR2SA8Nv4VGzEO9yJkmJ_fwArM.jpg" data-orig-size="1280,720" data-permalink="https://www.wrywingpolitics.com/whos-pro-and-whos-con-about-dont-look-up/aaaabf07ihf0o-bl7ks_pjwu1bfbjzxgha8ao8jmz5dfja8pz_r7l-nyvqhttj1tpmnl7lnr2sa8nv4vgzeo9yjkmj_fwarm/" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/wp-content/uploads/2022/01/AAAABf07Ihf0o-BL7ks_pjwU1BfBJzxgHA8Ao8jMZ5dfJA8PZ_R7l-NyvQHtTj1TpmnL7lnR2SA8Nv4VGzEO9yJkmJ_fwArM-1024x576.jpg&amp;raw" srcset="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/AAAABf07Ihf0o-BL7ks_pjwU1BfBJzxgHA8Ao8jMZ5dfJA8PZ_R7l-NyvQHtTj1TpmnL7lnR2SA8Nv4VGzEO9yJkmJ_fwArM-1024x576.jpg 1024w, https://www.wrywingpolitics.com/wp-content/uploads/2022/01/AAAABf07Ihf0o-BL7ks_pjwU1BfBJzxgHA8Ao8jMZ5dfJA8PZ_R7l-NyvQHtTj1TpmnL7lnR2SA8Nv4VGzEO9yJkmJ_fwArM-300x169.jpg 300w, https://www.wrywingpolitics.com/wp-content/uploads/2022/01/AAAABf07Ihf0o-BL7ks_pjwU1BfBJzxgHA8Ao8jMZ5dfJA8PZ_R7l-NyvQHtTj1TpmnL7lnR2SA8Nv4VGzEO9yJkmJ_fwArM-768x432.jpg 768w, https://www.wrywingpolitics.com/wp-content/uploads/2022/01/AAAABf07Ihf0o-BL7ks_pjwU1BfBJzxgHA8Ao8jMZ5dfJA8PZ_R7l-NyvQHtTj1TpmnL7lnR2SA8Nv4VGzEO9yJkmJ_fwArM-500x281.jpg 500w, https://www.wrywingpolitics.com/wp-content/uploads/2022/01/AAAABf07Ihf0o-BL7ks_pjwU1BfBJzxgHA8Ao8jMZ5dfJA8PZ_R7l-NyvQHtTj1TpmnL7lnR2SA8Nv4VGzEO9yJkmJ_fwArM.jpg 1280w"></figure><span data-dcnode-id="2453" instrument_node="">
</span><p data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">I can’t say how telling it is. But there’s a sociologically and culturally interesting schism currently on display over the Netflix movie, “Don’t Look Up.” Maybe you’ve seen it. Maybe you thought it was hilarious. Or important. Or heavy-handed. Or so unspeakably dull you turned it off 10 minutes after Leonardo Di Caprio and Jennifer Lawrence discover a Mt. Everest-size comet heading straight for Earth.</span></p><span data-dcnode-id="2450" instrument_node="">
</span><p data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">Movies, like music and fashion and every other damn thing you can think of comes with a lot of subjectivity. “Consider the source” is usually the best you can say about someone calling “Transformers 4” “really cool” and “2001: A Space Odyssey”, “unbelievably dull, except for the monkeys at the beginning.”</span></p><span data-dcnode-id="2447" instrument_node="">
</span><p data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">“Don’t Look Up”, is a star-packed satire of modern America’s utter inability to take anything seriously. Not even to the point of uniting long enough to deflect our own doom. Released Christmas Eve, it has not just dropped a cleaver between the usual tribes. It has also divided a majority of critics from a generally pretty bright chunk of the audience.</span></p><span data-dcnode-id="2444" instrument_node="">
</span><p data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">Because it is ambitious, and energetic and full of ideas and more than a little angry, it is also illuminating the short-comings of another sub-set of modern America. </span></p><span data-dcnode-id="2441" instrument_node="">
</span><p data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">The film is the latest from Adam McKay, a guy with a very long list of producing and directing credits, including “Talladega Nights: The Legend of Ricky Bobby”, HBO’s “Succession”, “The Big Short”, “Vice” (the Dick Cheney story) and the two “Anchorman” movies. McKay is as Ron Burgundy would say, “kind of a big deal.”</span></p><span data-dcnode-id="2438" instrument_node="">
</span><p data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">So big that Cate Blanchett, Jonah Hill, Mark Rylance, Ariana Grande, Timothee Chalamet, Tyler Perry and Meryl Streep, (as the Trumpier-than-Trump POTUS) and a dozen others signed on at fees significantly below their starring rates.</span></p><span data-dcnode-id="2435" instrument_node="">
</span><p data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">With the mere mention of that list of names, the MAGA crowd is already on its hind legs howling about “liberal Hollywood elites”.</span></p><span data-dcnode-id="2432" instrument_node="">
</span><p data-dcnode-id="2427"><span data-dcnode-id="2431" instrument_node="">Hence you get this from The National Review: “</span><em data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">Don’t Look Up</span></em><span data-dcnode-id="2428" instrument_node=""> is Netflix’s evasive, misstated excuse for  political satire that fails very badly because writer-director Adam  McKay doesn’t grasp his own political prejudices. Unlike Jude, McKay has  no real sense of humor, just sophomoric ridicule. He brazenly  broadcasts the entitled sense of obnoxiousness encouraged in Hollywood  or Broadway environs, where liberalism has turned into progressivism.  And as essayist David Horowitz observed, “inside every progressive is a totalitarian screaming to get out.” [The guy’s quoting David Horowitz with a straight face. Jeeezus.]</span></p><span data-dcnode-id="2426" instrument_node="">
</span><p data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">And then there’s the far-from-Hollywood-and-only-dreaming-I-was-elites, like me, who find it hilarious. And not just the Streep White House. Where characters can’t focus on doomsday because of bad polling over (and looming mid-terms) over a lunk-headed Supreme Court candidate revealed as a one-time porn actor (with whom POTUS once canoodled). That’s funny. But better, richer and even more relevant is the dead-on, can’t be over-stated satire of a culture so addled by entertaining itself it has lost the ability to find seriousness in anything that doesn’t deliver celebrity-scented sex appeal, charm and, you know, constant distraction from “all that ugly stuff out there.”</span></p><span data-dcnode-id="2423" instrument_node="">
</span><p data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">Beyond the salaried critics who have given it a low 55% score on Rotten Tomatoes, most complaining about “lack of focus”, “heavy-handedness”, “too long” and how it is “aggressively mean-spirited and smug”, there’s the social media backlash, (ironically a constant target of the movie.)</span></p><span data-dcnode-id="2420" instrument_node="">
</span><p data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">Here’s a hot take from a local PR guy: “Just  watched the worst movie we have seen in five years. Make it 10. It’s on Netflix and is called ‘Don’t Look Up’. Everyone in its all-star cast should be embarrassed. Storyline, acting, concept all awful. Total waste  of time!”</span></p><span data-dcnode-id="2417" instrument_node="">
</span><p data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">And these responses from his “friends.”</span></p><span data-dcnode-id="2414" instrument_node="">
</span><p data-dcnode-id="2410"><span data-dcnode-id="2413" instrument_node="">“It  was a weird one… that presidential role played by Streep turned me off  and tuned me out.  I can’t believe an HOFer like her signed off on this.” [Who remembers The Orange God King </span><a data-dcnode-id="2411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//variety.com/2017/film/awards/donald-trump-calls-meryl-streep-overrated-actress-1201955800/"><span data-dcnode-id="2412" instrument_node="">calling Streep “overrated”?]</span></a></p><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">“Yep,  it’s a total satire &amp; sad whim of Hollywood’s elite directed at a young audience. Several of my educated &amp; arts-cultured friends under 40 loved it.”</span></p><span data-dcnode-id="2406" instrument_node="">
</span><p data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">And this from someone who obviously had no trouble identifying with the film’s fattest targets, “What, you didn’t like a bunch of Hollywood snobs telling us how stupid we are?!?”</span></p><span data-dcnode-id="2403" instrument_node="">
</span><p data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">Now, as I say, people disagree about everything … all the time … (another point McKay plays with.) But the need to jump out and get on record … about a movie … is interesting and kinda goads me into the following conjecture.</span></p><span data-dcnode-id="2400" instrument_node="">
</span><p data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">Among all our tribes, there is the one I refer to as the Traditionalists. They’re a significant bunch. </span></p><span data-dcnode-id="2397" instrument_node="">
</span><p data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">In my experience over lo these many years this crowd works its way into respected institutions because they have some talent. But primarily, they clean up well, show up and do exactly the job they were hired to do. Soon upon arrival they burrow into the bureaucracy and usually flourish … because they, like their institution, they respect and never seriously question the status quo.</span></p><span data-dcnode-id="2394" instrument_node="">
</span><p data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">“Challenging” equals trouble.</span></p><span data-dcnode-id="2391" instrument_node="">
</span><p data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">Basic fact of life here: institutional movie critics are expected to be in step with the institution’s audience. Those who regularly wet their pants over obscure Bulgarian dramas are usually not hired to begin with, and certainly find themselves in a difficult place, newsroom-wise, if they can’t get on board with the latest “Spiderman Returns for the Fourteenth Time” re-boot.</span></p><span data-dcnode-id="2388" instrument_node="">
</span><p data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">Other Traditionalists include people who have respected the norms of American commerce, especially of the media-manipulation variety, where the status quo sells things to each other, again something McKay ridicules with exuberant relish. “Don’t Look Up” is an almost wall-to-wall mockery of The Great American Shill. The arena where people are products and ideas are interchangeable frostings.</span></p><span data-dcnode-id="2385" instrument_node="">
</span><p data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">My bet with “Don’t Look Up” — which I’m not saying competes with “Citizen Kane”, “The Seventh Seal” or “2001” in terms of art, (although there’s a heavy dose of “Dr. Strangelove” at play here) — is that it is one of those cultural artifacts that will grow in popular estimation as the months and years go by.</span></p><span data-dcnode-id="2382" instrument_node="">
</span><p data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">I.e. “cult status.” (We can sell that!)</span></p><span data-dcnode-id="2379" instrument_node="">
</span><p data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">‘Don’t Look Up” is the sort of thing Traditional minds may never accept as anything but “terrible”. But it I strongly suspect so many others appreciate it they’ll turn it into a cultural touchstone. A “classic.” Thereby, long after first blush, embarrassing those refusing to see the sad comedy of the world around them.</span></p><span data-dcnode-id="2376" instrument_node="">

</span><article class="post-10679 post type-post status-publish format-standard hentry category-donald-trump category-poltiics tag-beth-dutton tag-john-dutton tag-kelly-reilly tag-kevin-costner tag-mafia tag-mafia-shows tag-montana tag-paramount-network tag-privilege tag-rorschach-test tag-sopranos tag-yellowstone" data-dcnode-id="2079" id="post-10679"><span data-dcnode-id="2293" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2269"><span data-dcnode-id="2292" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2289"><a data-dcnode-id="2290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/yellowstone-offers-a-maga-era-rorschach-test/" rel="bookmark"><span data-dcnode-id="2291" instrument_node="">Yellowstone Offers a MAGA-era Rorschach Test</span></a></h1><span data-dcnode-id="2288" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="2272"><span data-dcnode-id="2287" instrument_node="">
</span><span class="sep" data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">Posted on </span></span><a data-dcnode-id="2282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/yellowstone-offers-a-maga-era-rorschach-test/" rel="bookmark" title="11:02 am"><time class="entry-date" data-dcnode-id="2283" datetime="2022-01-06T11:02:15-05:00"><span data-dcnode-id="2284" instrument_node="">January 6, 2022</span></time></a><span class="by-author" data-dcnode-id="2274"><span data-dcnode-id="2281" instrument_node=""> </span><span class="sep" data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node=""> by </span></span><span data-dcnode-id="2278" instrument_node=""> </span><span class="author vcard" data-dcnode-id="2275"><a class="url fn n" data-dcnode-id="2276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/author/admin/" rel="author" title="View all posts by Joe Loveland"><span data-dcnode-id="2277" instrument_node="">Joe Loveland</span></a></span></span><span data-dcnode-id="2273" instrument_node=""> </span></div><span data-dcnode-id="2270" instrument_node="">
</span></header><span data-dcnode-id="2267" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2143"><span data-dcnode-id="2266" instrument_node="">
</span><p data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">Paramount Network’s television series Yellowstone is a huge hit, and I’ve been pondering why.&nbsp; After all, raising cattle is not something that one would guess most contemporary Americans would likely find particularly riveting. </span></p><span data-dcnode-id="2263" instrument_node="">
</span><p data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">It strikes me that there are two very different ways to view Yellowstone.&nbsp; To many like me, it’s consumed as a mafia story. Mafia families use extortion, violence, and other criminal methods to make money and preserve power and privilege, and that is precisely what Yellowstone’s Dutton family is all about, episode after episode.</span></p><span data-dcnode-id="2260" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="2258"><img alt="" class="wp-image-10680" data-attachment-id="10680" data-comments-opened="1" data-dcnode-id="2259" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image" data-large-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/image-1024x520.png" data-medium-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/image-300x152.png" data-orig-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/image.png" data-orig-size="1214,616" data-permalink="https://www.wrywingpolitics.com/yellowstone-offers-a-maga-era-rorschach-test/image-3/" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/wp-content/uploads/2022/01/image-1024x520.png&amp;raw" srcset="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/image-1024x520.png 1024w, https://www.wrywingpolitics.com/wp-content/uploads/2022/01/image-300x152.png 300w, https://www.wrywingpolitics.com/wp-content/uploads/2022/01/image-768x390.png 768w, https://www.wrywingpolitics.com/wp-content/uploads/2022/01/image-500x254.png 500w, https://www.wrywingpolitics.com/wp-content/uploads/2022/01/image.png 1214w"></figure><span data-dcnode-id="2257" instrument_node="">
</span><p data-dcnode-id="2251"><span data-dcnode-id="2256" instrument_node="">There’s a lot to like about Yellowstone.  It is entertaining, beautifully shot, and well-acted.&nbsp; As with many a mafia story, the story about what will become of the family members pulling out all the stops to maintain their power and privilege has been worth watching. &nbsp;Before watching it, I might not have believed that a Montana-based Sopranos yarn would work, but it does for me.</span><br data-dcnode-id="2255"><span data-dcnode-id="2254" instrument_node=""> </span><br data-dcnode-id="2253"><span data-dcnode-id="2252" instrument_node=""> It’s far from perfect. The story line gets preposterous at times, the trash-talk scripting often feels particularly contrived, the level of violence displayed is gratuitous, and the simplistic characters seem mostly unwilling or unable to see gray areas in the situations they encounter. &nbsp;Talented actresses like Kelly Reilly could have been even more interesting to watch with scripts that weren’t so simplistic and over-the-top. &nbsp;</span></p><span data-dcnode-id="2250" instrument_node="">
</span><p data-dcnode-id="2244"><span data-dcnode-id="2249" instrument_node="">But beyond the familiar mafia formula, there is another very different way to view Yellowstone.&nbsp; Many viewers see mega-rancher John Dutton and his loyal family as superheroes, not criminals.&nbsp;  They see an ultra-honorable family fighting for what they believe was once great about America – more hard work, more family loyalty, more agrarian lifestyles, less “politically correct” nonsense, and a might-is-right approach to ensure you always get your way.&nbsp; </span><br data-dcnode-id="2248"><span data-dcnode-id="2247" instrument_node=""> </span><br data-dcnode-id="2246"><span data-dcnode-id="2245" instrument_node=""> In this case, the superheroes’ superpowers involve guns-a-plenty, humiliating trash-talking, bullying of dissenters, corruption of state and local government, and an unflagging certainty that it’s their God-given right to control anything they damn well want, despite what “the others” – urbanites, environmentalists, the insufficiently macho, and Native Americans – do or say.</span></p><span data-dcnode-id="2243" instrument_node="">
</span><p data-dcnode-id="2238"><span data-dcnode-id="2242" instrument_node="">A lot of people seem to see Yellowstone this way.&nbsp; Go to any rural or small town area, and you’re going to see folks wearing Yellowstone gear, just the way people wear Captain America, Superman, and Wonder Woman gear.&nbsp; These folks not only want to watch the Duttons, they want to </span><em data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">be</span></em><span data-dcnode-id="2239" instrument_node=""> them. </span></p><span data-dcnode-id="2237" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="2235"><img alt="" class="wp-image-10684" data-attachment-id="10684" data-comments-opened="1" data-dcnode-id="2236" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-1" data-large-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/image-1.png" data-medium-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/image-1-300x269.png" data-orig-file="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/image-1.png" data-orig-size="1010,904" data-permalink="https://www.wrywingpolitics.com/yellowstone-offers-a-maga-era-rorschach-test/image-1-2/" sizes="(max-width: 1010px) 100vw, 1010px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/wp-content/uploads/2022/01/image-1.png&amp;raw" srcset="https://www.wrywingpolitics.com/wp-content/uploads/2022/01/image-1.png 1010w, https://www.wrywingpolitics.com/wp-content/uploads/2022/01/image-1-300x269.png 300w, https://www.wrywingpolitics.com/wp-content/uploads/2022/01/image-1-768x687.png 768w, https://www.wrywingpolitics.com/wp-content/uploads/2022/01/image-1-335x300.png 335w"></figure><span data-dcnode-id="2234" instrument_node="">
</span><p data-dcnode-id="2229"><span data-dcnode-id="2233" instrument_node="">Indeed, the Wall Street Journal </span><a data-dcnode-id="2231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsj.com/articles/yellowstone-season-4-finale-paramount-11640897788"><span data-dcnode-id="2232" instrument_node="">reported</span></a><span data-dcnode-id="2230" instrument_node=""> that Yellowstone first became a hit in smaller, more rural markets, not on the coasts.  </span></p><span data-dcnode-id="2228" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="2217"><p data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">The show wrapped its fourth season Sunday night with an average 10.4 million total viewers on the Paramount Network, up from 4.5 million in season 1.&nbsp; The unconventional path “Yellowstone” took to ratings dominance shows how audiences can accrue and change over a series’ lifespan and how regional differences still matter…</span></p><p data-dcnode-id="2218"><span data-dcnode-id="2225" instrument_node="">Lafayette, Ind., is a “Yellowstone” stronghold. The area around Purdue University had the highest proportion of viewers during season 1 of any small market outside Montana and Wyoming, the region where “Yellowstone” is set, according to Nielsen data on viewers ages 25 to 54.</span><br data-dcnode-id="2224"><br data-dcnode-id="2223"><span data-dcnode-id="2222" instrument_node="">Loyalists there include Jim Hedrick, 62, whose company Horizon Ag Consulting works with farmers across the Midwest. He says “Yellowstone” mines issues that matter in his circles, such as family cohesion and the development of rural areas.</span><br data-dcnode-id="2221"><br data-dcnode-id="2220"><span data-dcnode-id="2219" instrument_node="">When “Yellowstone” premiered in 2018, the show ranked fourth in the 25-to-54 age group in the least-populated TV markets, categorized by Nielsen as D markets. In the country’s most populous areas—dubbed A markets, which include New York and Los Angeles—“Yellowstone” didn’t crack the top 50.</span></p></blockquote><span data-dcnode-id="2216" instrument_node="">
</span><p data-dcnode-id="2211"><span data-dcnode-id="2215" instrument_node="">Like other superhero tales, Yellowstone sometimes gets pretty unrealistic.&nbsp; In the real world, no business, including ranching, is immune from criminal law enforcement, environmental protections, eminent domain rules, and political realities.&nbsp; Deep red rural states trend in those directions, but they’re not nearly as extreme as the Dutton-dominated Montana. </span><br data-dcnode-id="2214"><br data-dcnode-id="2213"><span data-dcnode-id="2212" instrument_node="">As such, the Yellowstone fantasy offers an escape for viewers who dream of a world where people who look and act like them find ways to control everything.  That seems like the “secret sauce” that makes Yellowstone so delicious for so many.</span></p><span data-dcnode-id="2210" instrument_node="">
</span><p data-dcnode-id="2199"><span data-dcnode-id="2209" instrument_node="">Why are the Duttons viewed by so many as heroes rather than criminals?&nbsp; For many viewers, the Dutton’s brutal crimes are forgiven – lustily cheered on, even – because of the </span><em data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">enemies</span></em><span data-dcnode-id="2206" instrument_node=""> involved.&nbsp; The Duttons hate the same people that Trumpists hate — fakey latte-sipping urban dwellers, clueless environmentalist brats, rule-bound government dweebs, hopelessly soft beta male, snowflake cucks, and coddled minorities. </span><br data-dcnode-id="2205"><br data-dcnode-id="2204"><span data-dcnode-id="2203" instrument_node="">And who doesn’t want to see someone stick it to </span><em data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">those guys</span></em><span data-dcnode-id="2200" instrument_node="">?</span></p><span data-dcnode-id="2198" instrument_node="">
</span><p data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">Yellowstone is a kind of Rorschach test that is being seen different ways depending on the individual viewer’s biases and values.&nbsp; How you interpret it reveals personality characteristics, such as an authoritarian instinct and willingness to rationalize violence and other crimes.&nbsp; </span></p><span data-dcnode-id="2195" instrument_node="">
</span><p data-dcnode-id="2190"><span data-dcnode-id="2194" instrument_node="">I have no proof of this, but it seems a safe bet that there is a strong correlation between Trump fans and people who view the corrupt, murderous Duttons as righteous superheros rather than a privileged, power-obsessed crime family. </span><br data-dcnode-id="2193"><br data-dcnode-id="2192"><span data-dcnode-id="2191" instrument_node="">(By the way, the other way that Yellowstone is fantasy is that the actors like Kevin Costner and Kelly Reilly who are playing right wingers’ heroes are not conservative in their real lives. After campaigning for Reagan earlier in his life, Costner has campaigned for Barack Obama and the Biden Administration’s Pete Buttigieg. And the English actress Reilly is reportedly a Democrat.)</span></p><span data-dcnode-id="2189" instrument_node="">
</span><p data-dcnode-id="2177"><span data-dcnode-id="2188" instrument_node="">Because Yellowstone has proven so overwhelmingly popular, we surely will see more programming like it. We can expect more “us against them” narratives giving comfort and encouragement to viewers whose fondest wish is to own the libs without pesky laws in the way.&nbsp; </span><br data-dcnode-id="2187"><br data-dcnode-id="2186"><span data-dcnode-id="2185" instrument_node="">If I were a right-wing billionaire intent on fanning the culture war flames as a means to maintain and grow my financial power and privilege, I’d bankroll more Yellowstone-like shows to provide entertaining propaganda tools to compliment the news-like propaganda tools that those billionaires already control to great effect. </span><br data-dcnode-id="2184"><span data-dcnode-id="2183" instrument_node=""> </span><br data-dcnode-id="2182"><span data-dcnode-id="2181" instrument_node="">Everyone likes to fantasize about being a superhero, and shows like Yellowstone offers heroic role models and road maps for white people bending and breaking laws to maintain their privilege in a rapidly changing world.&nbsp; </span><br data-dcnode-id="2180"><br data-dcnode-id="2179"><span data-dcnode-id="2178" instrument_node="">And you know what?  If the acting, story, scenery, and production levels are as good as they are in Yellowstone, the chances are that plenty of liberals like me will probably watch the coming Yellowstone clones, though through a very different lens.</span></p><span data-dcnode-id="2176" instrument_node="">
