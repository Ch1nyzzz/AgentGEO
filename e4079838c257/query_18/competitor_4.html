</span><header class="entry-header" data-dcnode-id="2052"><span data-dcnode-id="2075" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2072"><a data-dcnode-id="2073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/kim-potter-is-unequiviocally-guilty-of-failing-to-be-a-professional/" rel="bookmark"><span data-dcnode-id="2074" instrument_node="">Kim Potter is Unequivocally Guilty of Failing to be a Professional</span></a></h1><span data-dcnode-id="2071" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="2055"><span data-dcnode-id="2070" instrument_node="">
</span><span class="sep" data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">Posted on </span></span><a data-dcnode-id="2065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/kim-potter-is-unequiviocally-guilty-of-failing-to-be-a-professional/" rel="bookmark" title="10:44 am"><time class="entry-date" data-dcnode-id="2066" datetime="2021-12-21T10:44:31-05:00"><span data-dcnode-id="2067" instrument_node="">December 21, 2021</span></time></a><span class="by-author" data-dcnode-id="2057"><span data-dcnode-id="2064" instrument_node=""> </span><span class="sep" data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node=""> by </span></span><span data-dcnode-id="2061" instrument_node=""> </span><span class="author vcard" data-dcnode-id="2058"><a class="url fn n" data-dcnode-id="2059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/author/brian-lambert/" rel="author" title="View all posts by Brian Lambert"><span data-dcnode-id="2060" instrument_node="">Brian Lambert</span></a></span></span><span data-dcnode-id="2056" instrument_node=""> </span></div><span data-dcnode-id="2053" instrument_node="">
</span></header><span data-dcnode-id="2050" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1974"><span data-dcnode-id="2049" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="2047"><img alt="Kim Potter on Daunte Wright death: 'I'm sorry it happened' | WKBN.com" data-dcnode-id="2048" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wkbn.com/wp-content/uploads/sites/48/2021/12/kim-potter.jpg%3Fw%3D1280&amp;raw"></figure><span data-dcnode-id="2046" instrument_node="">
</span><p data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">The jury is still out as I write this Tuesday morning. And I concede I’ve never had high expectations for a conviction in the Kim Potter trial. But that said, I was startled and relieved that not even one juror in the Derek Chauvin case clung to the “my cops for good or bad” line of thinking.</span></p><span data-dcnode-id="2043" instrument_node="">
</span><p data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">First degree manslaughter was always going to be a stretch. Potter would have to be a persistent, unbridled, nearly sociopathic menace to public safety (a la Chauvin) for a jury to go that far. But second degree should be a slam dunk.</span></p><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Deep in ForWhatIt’sWorth land, my view of Potter’s guilt, her culpability, is built around her failure to be the experienced cop, the Alpha Dog, of the incident that ended with Daunte Wright’s death.</span></p><span data-dcnode-id="2037" instrument_node="">
</span><p data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">In her testimony she admitted that the trainee cop riding with her that day instigated the stop. Her failure, as a 26-year veteran, was not saying, “Uh, no. We’re not going to bother with expired tabs and an air freshner hanging off his mirror.” Moreover, as a veteran training a newby, she should have admonished the rookie that just because he spotted a young black kid driving a late model car was not a satisfactory reason to rolling in closer and look for some kind — any kind — of “stop-worthy” (revenue-enhancing) violation.</span></p><span data-dcnode-id="2034" instrument_node="">
</span><p data-dcnode-id="2029"><span data-dcnode-id="2033" instrument_node="">But rather than exert veteran, professional influence, Potter allowed the stop to go forward, then got so swept up in the bully boy(s) confrontation she panicked — </span><em data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">panicked</span></em><span data-dcnode-id="2030" instrument_node=""> — mistook a yellow Taser for a black gun … and killed the kid.</span></p><span data-dcnode-id="2028" instrument_node="">
</span><p data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">A good number of people were moved by her emotional, sobbing testimony last week. Maybe it was real. Or maybe every reckless Minneapolis cop’s best friend, attorney Earl Gray, advised her that a good tissue-grabbing crying jag might work as well for her as it did for Kyle Rittenhouse over in Wisconsin.</span></p><span data-dcnode-id="2025" instrument_node="">
</span><p data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">(And on the subject of Mr. Gray, has anyone ever seen the precise numbers of the payouts to him for his defense in lo so many panicked cop cases?) </span></p><span data-dcnode-id="2022" instrument_node="">
</span><p data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">And speaking of theater, I loved Officer Potter’s costuming. Not a uniform. (She’s no longer on any force.) Or anything too, you know, “authoritarian.” But instead, a soft, cream-white embroidered Christmas-y blouse. By which, with tears and tissue, she was transformed from an out-of-control, gun-wielding assailant into everyone’s favorite middle-aged Minnesota mom.</span></p><span data-dcnode-id="2019" instrument_node="">
</span><p data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">There are reasons I’d never make the jury on a case like this.</span></p><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">If it were in my power to re-write sentencing guidelines, I couldn’t care less if Potter ever does a day in jail. Unlike Chauvin, a career thug with more than a dozen complaints for unnecessary violence against him, not to mention that $460,000 tax fraud he and the Mrs. were running when he killed George Floyd over a maybe fake $20 bill, Potter presents no on-going threat to the (mainly black) citizens of the Twin Cities.</span></p><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">But she is indisputably guilty, of failing to maintain command over subordinates and her own professional composure. Is it really asking too much that a court and a jury assert, with a verdict, that cops have a legal responsibility to control their biases and emotions?</span></p><span data-dcnode-id="2010" instrument_node="">
</span><p data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node=""> </span></p><span data-dcnode-id="2007" instrument_node="">
</span><div class="sharedaddy sd-sharing-enabled" data-dcnode-id="1976"><div class="robots-nocontent sd-block sd-social sd-social-icon-text sd-sharing" data-dcnode-id="1977"><h3 class="sd-title" data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">Share this:</span></h3><div class="sd-content" data-dcnode-id="1978"><ul data-dcnode-id="1979"><li class="share-linkedin" data-dcnode-id="2001"><a class="share-linkedin sd-button share-icon" data-dcnode-id="2002" data-shared="sharing-linkedin-10673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/kim-potter-is-unequiviocally-guilty-of-failing-to-be-a-professional/%3Fshare%3Dlinkedin%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on LinkedIn"><span data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">LinkedIn</span></span></a></li><li class="share-facebook" data-dcnode-id="1997"><a class="share-facebook sd-button share-icon" data-dcnode-id="1998" data-shared="sharing-facebook-10673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/kim-potter-is-unequiviocally-guilty-of-failing-to-be-a-professional/%3Fshare%3Dfacebook%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Facebook"><span data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">Facebook</span></span></a></li><li class="share-print" data-dcnode-id="1993"><a class="share-print sd-button share-icon" data-dcnode-id="1994" data-shared="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/kim-potter-is-unequiviocally-guilty-of-failing-to-be-a-professional/" rel="nofollow noopener noreferrer" target="_blank" title="Click to print"><span data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">Print</span></span></a></li><li class="share-twitter" data-dcnode-id="1989"><a class="share-twitter sd-bu </span><h1 class="entry-title" data-dcnode-id="1951"><a data-dcnode-id="1952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/california-goes-full-logan-roy-on-texas-and-the-supreme-court/" rel="bookmark"><span data-dcnode-id="1953" instrument_node="">California Goes Full Logan Roy on Texas and the Supreme Court</span></a></h1><span data-dcnode-id="1950" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1934"><span data-dcnode-id="1949" instrument_node="">
</span><span class="sep" data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">Posted on </span></span><a data-dcnode-id="1944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/california-goes-full-logan-roy-on-texas-and-the-supreme-court/" rel="bookmark" title="1:08 pm"><time class="entry-date" data-dcnode-id="1945" datetime="2021-12-14T13:08:02-05:00"><span data-dcnode-id="1946" instrument_node="">December 14, 2021</span></time></a><span class="by-author" data-dcnode-id="1936"><span data-dcnode-id="1943" instrument_node=""> </span><span class="sep" data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node=""> by </span></span><span data-dcnode-id="1940" instrument_node=""> </span><span class="author vcard" data-dcnode-id="1937"><a class="url fn n" data-dcnode-id="1938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/author/brian-lambert/" rel="author" title="View all posts by Brian Lambert"><span data-dcnode-id="1939" instrument_node="">Brian Lambert</span></a></span></span><span data-dcnode-id="1935" instrument_node=""> </span></div><span data-dcnode-id="1932" instrument_node="">
</span></header><span data-dcnode-id="1929" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1788"><span data-dcnode-id="1928" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1926"><img alt="For the First Time on 'Succession,' Logan Roy Might Lose - The Ringer" data-dcnode-id="1927" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.vox-cdn.com/thumbor/orSZIXHRiInvW1pIb2f-49V51qo%3D/0x0%3A3000x2000/1200x800/filters%3Afocal%281711x731%3A2191x1211%29/cdn.vox-cdn.com/uploads/chorus_image/image/65354735/logan_fallability_hbo_ringer.0.jpg&amp;raw"></figure><span data-dcnode-id="1925" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1923"><img alt="" data-dcnode-id="1924"></figure><span data-dcnode-id="1922" instrument_node="">
</span><p data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">In Logan Roy, the sociopathic Rupert Murdoch-like patriarch of the”Succession” clan, we truly have a philosopher for our gamed-out, laws-are-for-chumps, post (and maybe pre-) Trump era. Old man Roy sees 21st century America as it is.</span></p><span data-dcnode-id="1919" instrument_node="">
</span><ul class="wp-block-gallery columns-0 is-cropped" data-carousel-extra="{&quot;blog_id&quot;:1,&quot;permalink&quot;:&quot;https:\/\/www.wrywingpolitics.com\/california-goes-full-logan-roy-on-texas-and-the-supreme-court\/&quot;}" data-dcnode-id="1918"></ul><span data-dcnode-id="1917" instrument_node="">
</span><p data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">In last week’s penultimate episode (of the best series on TV) the elder Roy explained the harsh reality of life to his hapless son Kendall, a classic soft millennial who thought doing the right thing was everything he needed to do to win.</span></p><span data-dcnode-id="1914" instrument_node="">
</span><p data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Said the billionaire baron to his benighted off-spring, “Life’s not knights on horseback. It’s a number on a piece of paper. It’s a fight for a knife in the mud.”</span></p><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1906"><span data-dcnode-id="1910" instrument_node="">There are so many contemporary scenarios that fit that paradigm it’s hard to know where to begin. But there’s always this: the constant complaint that liberals or anyone still clutching some level of respect for both the letter and </span><em data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">spirit </span></em><span data-dcnode-id="1907" instrument_node="">of the law are forever playing a losing game against conservative adversaries gleefully and shamelessly flaunting the “norms” of good faith, common civility and legislated standards.</span></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">For many it gets translated to “liberals gotta learn to play dirty.”</span></p><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">While that might be a tough sell for the progressive-liberal base, i.e. better than average educated civic-minded types who prefer a rule-based society to whoever bellows the loudest and waves the most guns. A better suggestion would be to, “play more offense against the bastards and be more cunning.”</span></p><span data-dcnode-id="1899" instrument_node="">
</span><p data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">Like the move a couple days ago by California Gov. Gavin Newsom and his think tank to replicate Texas’ vigilante bounty attack on abortion rights, only with guns, gun merchants and gun manufacturers as the victims, not pregnant women.</span></p><span data-dcnode-id="1896" instrument_node="">
</span><p data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">As usual, the proposal, which has a ways to go before becoming law, was quickly submerged beneath the next day’s headlines.</span></p><span data-dcnode-id="1893" instrument_node="">
</span><p data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">A massive tornado in Kentucky (with arch Libertarian Rand Paul pleading for a federal/socialist rescue he blathered against when hurricanes hit Texas, Florida and the eastern seaboard), news that a Trump moron actually put together a goddam PowerPoint for overthrowing the government and today, text messages from FoxNews hosts pleading with … Mark Meadows? … to get Trump to stop the January 6 riot because it reflected bad on all of “us.”</span></p><span data-dcnode-id="1890" instrument_node="">
</span><p data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">I’m trying to imagine Walter Cronkite, so confident in his control over Lyndon Johnson, that he puts in a call to the White House to stop the Vietnam War.</span></p><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">Anyway … this move by Newsom/California is the kind of “in-your-face dickwad” aggression and cunning that liberals need.</span></p><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">The basic idea is to craft a law against guns as precisely — and as cynically, some might say — as Texas has contrived its vigilante abortion law. (A law whereby any zealot gets a $10,000 check from Texas for suing anyone involved in an abortion, from doctors and nurses to Uber drivers.)</span></p><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">Done right, and quickly, California could — at the least — force the Supreme Court into conceding its naked partisanship. To separate Califoernia from Texas, Roberts’ court would have to apply an even finer chef’s knife to the intent of the Constitution than they already have. Which is a lotr, considering the hearing they’re giving a preposterous argument for a case and a cause never supported by more than 15% of the public.</span></p><span data-dcnode-id="1878" instrument_node="">
</span><p data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">Not that contravening established law and the will of the majority means all that much to blindered zealots like Amy Coney Barrett, Sam Alito, Clarence Thomas and the rest of The Handmaid’s Tale crew clogging The Highest Court of the Land.</span></p><span data-dcnode-id="1875" instrument_node="">
</span><p data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">Said Newsom in a statement last Saturday, “If states can now shield their laws from review by the federal courts that compare assault weapons to Swiss Army knives, then California will use that authority to protect people’s lives, where Texas used it to put women in harm’s way.” Just like Texas, Californians could win up to $10,000 per gun violation plus other costs and attorneys fees against “anyone who  manufactures, distributes, or sells an assault weapon” in California.</span></p><span data-dcnode-id="1872" instrument_node="">
</span><p data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">“If the most efficient way to keep these devastating weapons off our  streets is to add the threat of private lawsuits, we should do just  that,” Newsom said.</span></p><span data-dcnode-id="1869" instrument_node="">
</span><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Amen, brother. </span></p><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">With the help of Mitch McConnell, Senate Republicans, Trump and The Federalist Society, John Roberts’ court is one titanic decision — repealing Roe v. Wade — away from rendering itself illegitimate in the eyes of the 60-70% of the country that has been opposed to repealing abortion rights for the past 50 years.</span></p><span data-dcnode-id="1863" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">Again, this is in contrast to polling that regularly shows upwards of 80% of Americans in favor of some kind of enhanced regulation of guns.</span></p><span data-dcnode-id="1860" instrument_node="">
</span><p data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">The insider’s prediction is that in the end (next spring) the court’s conservatives will go full-Scalia and convolute a decision into the most pretentious, tortured pretzel logic imaginable, in order to argue they’re really just, you know, protecting “states’ rights.”</span></p><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">Recognizing the mud and understanding the potential of the knife, California could force Barrett, boozy frat boy Kavanaugh and the rest to shame and discredit themselves in a way that offers their credibility no possibility of historical restoration.</span></p><span data-dcnode-id="1854" instrument_node="">
</span><p data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">My read is that only Roberts himself is concerned enough about history’s verdict on his court’s reputation to argue against such bald-faced partisanship. Which means he may be the only one of bunch that sees the knife in California’s hands as a real threat.</span></p><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">But watch the hysteria build against it.</span></p><span data-dcnode-id="1848" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">Like this today from the (wholly corrupt and literally bankrupt) NRA:</span></p><span data-dcnode-id="1845" instrument_node="">
</span><p data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">“Gov. Newsom misunderstands the actions of the Supreme Court – and the limits of his war on lawful gun ownership. His promise to run roughshod over the Second Amendment is little more than political theater. He and fellow Democrats should proceed at their own peril: the American people will not tolerate another taxpayer-funded assault on constitutional freedom.”</span></p><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Heh, I like the sweat. </span></p><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node=""> </span></p><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1835"></p><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1833"></p><span data-dcnode-id="1832" instrument_node="">
</span><p data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node=""> </span></p><span data-dcnode-id="1829" instrument_node="">
</span><p data-dcnode-id="1828"></p><span data-dcnode-id="1827" instrument_node="">
</span><p data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node=""> </span></p><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node=""> </span></p><span data-dcnode-id="1821" instrument_node="">

</span><h1 class="entry-title" data-dcnode-id="1741"><a data-dcnode-id="1742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/fauci-mengele-and-plastic/" rel="bookmark"><span data-dcnode-id="1743" instrument_node="">Fauci, Mengele and Plastic</span></a></h1><span data-dcnode-id="1740" instrument_node="">

</span><figure class="wp-block-image" data-dcnode-id="1714"><img alt="" class="wp-image-10658" data-attachment-id="10658" data-comments-opened="1" data-dcnode-id="1717" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="IMG_7264" data-large-file="https://www.wrywingpolitics.com/wp-content/uploads/2021/12/IMG_7264.jpg" data-medium-file="https://www.wrywingpolitics.com/wp-content/uploads/2021/12/IMG_7264-300x246.jpg" data-orig-file="https://www.wrywingpolitics.com/wp-content/uploads/2021/12/IMG_7264.jpg" data-orig-size="679,556" data-permalink="https://www.wrywingpolitics.com/fauci-mengele-and-plastic/img_7264/" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/wp-content/uploads/2021/12/IMG_7264-300x246.jpg&amp;raw" srcset="https://www.wrywingpolitics.com/wp-content/uploads/2021/12/IMG_7264-300x246.jpg 300w, https://www.wrywingpolitics.com/wp-content/uploads/2021/12/IMG_7264-366x300.jpg 366w, https://www.wrywingpolitics.com/wp-content/uploads/2021/12/IMG_7264.jpg 679w"><figcaption data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Yeah … a new picture.</span></figcaption></figure><span data-dcnode-id="1713" instrument_node="">
</span><p data-dcnode-id="1708"><span data-dcnode-id="1712" instrument_node="">I don’t know about you, but I wake up every morning — grab a cup of coffee, walk the dog — and register amazement at just how many things I </span><em data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">could</span></em><span data-dcnode-id="1709" instrument_node=""> rant about, how many things are so deeply crazy I could spend all day dabbing at the foam around the corners of my mouth and bemoaning the barely Cro-Magnon state of some of the world.</span></p><span data-dcnode-id="1707" instrument_node="">
</span><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">I mean, here’s a quick re-hash of the past month:</span></p><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">A Republican Congressman shunned by his own family for being a vile idiot posts an anime of himself stabbing a congressional colleague in the neck.</span></p><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">A Republican congresswoman is caught — twice — telling (and gilding) a likely entirely bogus story of her confronting a congressional colleague as “a terrorist sympathizer.”</span></p><span data-dcnode-id="1698" instrument_node="">
</span><p data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">A former “60 Minutes” correspondent, long since dismissed for fabricating a story about the Benghazi incident pops up on FoxNews — where she is currently employed — comparing Dr. Anthony Fauci to Joseph Mengele.</span></p><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">And here in Minnesota, St. Paul cops, allegedly hired to protect the public, are playing the Joe Rogan/Tucker Carlson “personal choice” card in the context of refusing to vaccinate themselves — to avoid spreading a contagious, deadly disease to that same public, i.e. the people who employ them and pay their salaries.</span></p><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">I mean … it just goes on and on … .  Where do you start, if you choose to start at all? Sadly, like many people I talk to these days, the post-Trump moment, this interregnum we’re in, isn’t providing the necessary respite from the exhaustion of the Orange God King’s constant vulgar grifting. People want to forget about all the stupidity, racism, fraud and shame and “get back to normal.” Except that “normal”, when Christmas shopping, football and “The Bachelorette” could fully consume our attention, keeps back-drifting off toward the horizon.</span></p><span data-dcnode-id="1689" instrument_node="">
</span><p data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Which explains why I just want to say something about … plastic.</span></p><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1681"><span data-dcnode-id="1685" instrument_node="">Yesterday, there was </span><a data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/climate-environment/2021/12/01/plastic-waste-ocean-us/"><span data-dcnode-id="1684" instrument_node="">this story in The Washington Post</span></a><span data-dcnode-id="1682" instrument_node="">, reporting on a long-in-development congressional survey of plastic consumption/production. </span></p><span data-dcnode-id="1680" instrument_node="">
</span><p data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node=""> </span></p><span data-dcnode-id="1677" instrument_node="">
</span><p data-dcnode-id="1672"><span data-dcnode-id="1676" instrument_node="">“The United States contributes more to this deluge than any other nation, according to the analysis, </span><strong data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">generating about 287 pounds of plastics per person.</span></strong><span data-dcnode-id="1673" instrument_node=""> Overall, the United States produced 42 million metric tons of plastic waste in 2016 — almost twice as much as China, and more than the entire European Union combined.”</span></p><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">TWICE AS MUCH AS … CHINA.</span></p><span data-dcnode-id="1668" instrument_node="">
</span><p data-dcnode-id="1663"><span data-dcnode-id="1667" instrument_node="">Since I became deeply obsessed with plastic a couple years ago, and I began regularly filling a (plastic) bag with all the plastic wrappings we accumulate every day, I haven’t stopped being amazed at the beach ball-sized glob of plastic waste the </span><em data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">two </span></em><span data-dcnode-id="1664" instrument_node="">of us here at La Casa Lambert accumulate in a given week.</span></p><span data-dcnode-id="1662" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1661" instrument_node="">And worse, I’ve become convinced that our recycling efforts are </span><strong data-dcnode-id="1658"><a data-dcnode-id="1659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greenthatlife.com/plastic-recycling-red-herring/"><span data-dcnode-id="1660" instrument_node="">largely illusory.</span></a></strong><span data-dcnode-id="1657" instrument_node=""> (“Plastics  accounted for 12 percent of the 292 million tons of municipal solid  waste generated in the U.S. in 2018, totaling some 35.7 million tons.  However, the volume of plastic waste recycled in the U.S. that year was  3.1 million tons, giving a recycling rate of just </span><strong data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">8.7 percent</span></strong><span data-dcnode-id="1654" instrument_node="">.  Nov 22, 2021.”)</span></p><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Probably once a week I stroll through Costco — one of the more enlightened major retailers — and stare at water, bottled in plastic, swaddled by the case in another layer of plastic and then wrapped together on shipping pallets in yet another layer of plastic. </span></p><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Water.</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1641"><span data-dcnode-id="1645" instrument_node="">Here’s </span><a data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.change.org/p/costco-wholesale-stop-costco-s-use-of-plastic"><span data-dcnode-id="1644" instrument_node="">a petition you can sign</span></a><span data-dcnode-id="1642" instrument_node=""> to tell Costco they can do a lot better than they’re doing in terms of wrapping everything they sell — from water to bananas to socket wrenches — in plastic. (Usually I doubt any big company will give this a second thought. But Costco has demonstrated a heightened interest in civic-minded retailing in the past.)</span></p><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">Among the crazy, socialist ideas for weaning ourselves off plastic — 287 pounds per American, per year! — is … buying less. How about fixing or restoring what you already have? (It’s insanity, I know.) Screw keeping up with the fashion of the minute. Use what you’ve already got. Instead of complaining about how Biden has clogged up the ports so bad you can’t get all that plastic/plastic-wrapped Chinese Christmas crap out off ships floating outside LA and Long Beach.</span></p><span data-dcnode-id="1637" instrument_node="">
</span><p data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Anyway, before I take a deep breath and plunge back in to the flaming sewer hole of conservative America, where a conscientious scientist is compared to a Nazi mass murderer because … he wants to stop a pandemic that has already killed 750,000 Americans … I had to cough up the plastic twine ball logged in my throat. </span></p><span data-dcnode-id="1634" instrument_node="">
</span><p data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node=""> </span></p><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node=""> </span></p><span data-dcnode-id="1628" instrument_node="">
</span><p data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node=""> </span></p><span data-dcnode-id="1625" instrument_node="">
</span><div class="sharedaddy sd-sharing-enabled" data-dcnode-id="1594"><div class="robots-nocontent sd-block sd-social sd-social-icon-text sd-sharing" data-dcnode-id="1595"><h3 class="sd-title" data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Share this:</span></h3><div class="sd-content" data-dcnode-id="1596"><ul data-dcnode-id="1597"><li class="share-linkedin" data-dcnode-id="1619"><a class="share-linkedin sd-button share-icon" data-dcnode-id="1620" data-shared="sharing-linkedin-10656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/fauci-mengele-and-plastic/%3Fshare%3Dlinkedin%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on LinkedIn"><span data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">LinkedIn</span></span></a></li><li class="share-facebook" data-dcnode-id="1615"><a class="share-facebook sd-button share-icon" data-dcnode-id="1616" data-shared="sharing-facebook-10656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/fauci-mengele-and-plastic/%3Fshare%3Dfacebook%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Facebook"><span data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Facebook</span></span></a></li><li class="share-print" data-dcnode-id="1611"><a class="share-print sd-button share-icon" data-dcnode-id="1612" data-shared="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wrywingpolitics.com/fauci-mengele-and-plastic/" rel="nofollow noopener noreferrer" target="_blank" title="Click to print"><span data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Print</span></span></a></li><li class="share-twitter" data-dcnode-id="1607"><a class="share-twitter sd-button share-icon" data-dcnode-id="1608" data-shared="sharing-twitter-10656" href="https://chatnoir-webcontent.chatnoir.eu/?inde
