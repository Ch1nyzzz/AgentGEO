</span><span data-dcnode-id="326" instrument_node=""> </span><div class="content-area" data-dcnode-id="208" id="primary"><span data-dcnode-id="325" instrument_node="">
</span><section class="single-hero" data-dcnode-id="311" style="background: url(https://dhjhkxawhe8q4.cloudfront.net/cornell-university-press-wp/wp-content/uploads/2020/09/28200436/soviet-artefacts-h2bjmdzc_Jo-unsplash-scaled.jpg)"><span data-dcnode-id="324" instrument_node="">
</span><div class="single-hero__content container" data-dcnode-id="313"><span data-dcnode-id="323" instrument_node="">
</span><div class="single-hero__cats" data-dcnode-id="318"><span data-dcnode-id="322" instrument_node="">
</span><span class="cat-item" data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Cornell University Press</span></span><span data-dcnode-id="319" instrument_node="">
</span></div><span data-dcnode-id="317" instrument_node="">
</span><h1 class="single-hero__title" data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Racial Politics in Putin’s Russia</span></h1><span data-dcnode-id="314" instrument_node="">
</span></div><span data-dcnode-id="312" instrument_node="">
</span></section><span data-dcnode-id="310" instrument_node="">
</span><div class="container" data-dcnode-id="212"><span data-dcnode-id="309" instrument_node="">
</span><article class="post-type-post" data-dcnode-id="214" id="post-15360"><span data-dcnode-id="308" instrument_node="">
</span><section class="article-content" data-dcnode-id="216"><span data-dcnode-id="307" instrument_node="">
</span><a class="go-back" data-dcnode-id="303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cornellpress.cornell.edu/"><span data-dcnode-id="306" instrument_node="">
</span><span class="fa fa-arrow-left" data-dcnode-id="305"></span><span data-dcnode-id="304" instrument_node="">
                Return to Home</span></a><span data-dcnode-id="302" instrument_node="">
</span><div class="article-body" data-dcnode-id="218"><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="290"><span data-dcnode-id="300" instrument_node="">Black Lives Matter has flowered well beyond the US to become a global movement, giving us an opportunity—and a moral obligation—to think more critically about how racism functions in diverse societies. In some national-political contexts, protesters have directed their outrage toward symbols of specifically Black oppression, </span><a aria-label="undefined (opens in a new tab)" data-dcnode-id="298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/2020/06/07/europe/edward-colston-statue-bristol/index.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="299" instrument_node="">toppling statues of slave traders</span></a><span data-dcnode-id="297" instrument_node="">. In other contexts with histories of colonialism, the movement has become about oppression more generally, an impetus, from </span><a aria-label="undefined (opens in a new tab)" data-dcnode-id="295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//globalnews.ca/news/7018563/manitoba-indigenous-community-black-lives-matter/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="296" instrument_node="">Manitoba</span></a><span data-dcnode-id="294" instrument_node=""> to </span><a aria-label="undefined (opens in a new tab)" data-dcnode-id="292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abc.net.au/news/2020-06-06/black-lives-matter-rallies-held-across-australia/12325442" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="293" instrument_node="">Australia</span></a><span data-dcnode-id="291" instrument_node="">, to reckon with the structural violence directed at colonized peoples.</span></p><span data-dcnode-id="289" instrument_node="">
</span><span data-dcnode-id="287" instrument_node="">
</span><h2 data-dcnode-id="284"><strong data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">In Russia, the Moment Is… Complicated</span></strong></h2><span data-dcnode-id="283" instrument_node="">
</span><p data-dcnode-id="278"><span data-dcnode-id="282" instrument_node="">The Black Lives Matter movement has </span><a aria-label="undefined (opens in a new tab)" data-dcnode-id="280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ponarseurasia.org/memo/do-black-lives-matter-russia" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="281" instrument_node="">struck a nerve, but it has not prompted widespread empathetic protests or a real reckoning with Russia’s own race relations</span></a><span data-dcnode-id="279" instrument_node="">. Most Russian commentators have focused on isolated incidents of looting and unruliness among protesters. More crucially, they have treated BLM and the structural inequality that provoked it as essentially American problems, such that they don’t see any reason to turn criticism inward.</span></p><span data-dcnode-id="277" instrument_node="">
</span><h2 data-dcnode-id="274"><strong data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Is Russian Racism Definitionally Impossible?</span></strong></h2><span data-dcnode-id="273" instrument_node="">
</span><p data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">This attitude has a long history. Soviet discourse during the Cold War held that racism was a problem of the capitalist West, particularly the United States. Soviet nationalities policies focused on mixing rather than segregation, encouraging extensive internal migration between far-flung parts of the Soviet Union and its “brother republics.” Early Soviet biologists studied the physiological benefits of racial mixing in border republics like Buryatia, directly challenging Nazi “race science.” Linguists emphasized the mutual influence of languages on one another.</span></p><span data-dcnode-id="270" instrument_node="">
</span><p data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Some of this might sound like colonialism. But indigenous peoples were supposed to have been liberated from Russian colonialism by Soviet socialism, so it was definitionally impossible for Soviet minorities to be colonial subjects. This narrative has had remarkable staying power, and racism within contemporary Russia remains, even in the era of BLM, largely undiscussed. So, is Russian racism impossible?</span></p><span data-dcnode-id="267" instrument_node="">
</span><h2 data-dcnode-id="264"><strong data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Short Answer: No</span></strong></h2><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Most non-Slavic people understand themselves as racialized within Russia, without necessarily using the term. Racism especially impacts labor migrants from Central Asia and the Caucasus, as well as members of Russia’s many ethnolinguistic minorities.</span></p><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="255"><span data-dcnode-id="259" instrument_node="">My book, </span><a aria-label="undefined (opens in a new tab)" data-dcnode-id="257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cornellpress.cornell.edu/book/9781501750519/mixed-messages/%23bookTabs%3D4" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="258" instrument_node="">Mixed Messages: Mediating Native Belonging in Asian Russia</span></a><span data-dcnode-id="256" instrument_node="">, examines the history and politics of one such native minority, the Buryats of southeastern Siberia. I focus on language, which has been the main criterion for ethnonational belonging in the Buryat territories, and on the media that reify expectations about who speaks “good” Buryat and, thus, is a “good Buryat.”</span></p><span data-dcnode-id="254" instrument_node="">
</span><p data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Drawing on ethnographic research conducted since 2005, I argue in the book that contemporary native Siberians like the Buryats negotiate impossible expectations, leveled by both themselves and others. They are racialized within Russia as exotic Asians, but they are also supposed to be somehow European and quintessentially modern, a “bridge” for European Russians to a wilder East. The core tension examined in the book is that people expect local Buryat institutions such as newspapers to affirm indigenous language and culture—and, as illustrated throughout the book, they genuinely do represent key means for negotiating Buryat belonging—but the forms they take are also assimilatory and hyperinstitutional.</span></p><span data-dcnode-id="251" instrument_node="">
</span><h2 data-dcnode-id="248"><strong data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">Local Institutions Are Also Operating within a Broader Sociopolitical Context in Russia That Has Become Increasingly Racist</span></strong></h2><span data-dcnode-id="247" instrument_node="">
</span><p data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">In Moscow, St. Petersburg, and other cities far from Buryatia, people routinely mistake Buryats for Chinese immigrants, based on racialized assumptions about Russia’s citizenry and who inhabits its cities. Xenophobia, graffiti proclaiming “Russia for the (ethnic) Russians!,” and periodic hate crimes against Buryats in western Russian cities remind Buryats of their precarious status in Russia’s racial hierarchy. Young people sometimes identify as “Black” based on this racialized inequality and what they see as a shared urban or working-class lifestyle.</span></p><span data-dcnode-id="244" instrument_node="">
</span><p data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">Whether this perceived likeness grows into political action for racial justice remains to be seen. At present, it seems unlikely that BLM will be the catalyst for reckoning with racism in Russia, for reasons unpacked further in the book. But that doesn’t make the problem go away.</span></p><span data-dcnode-id="241" instrument_node="">
</span><p data-dcnode-id="236"><span data-dcnode-id="240" instrument_node="">*Featured photo by </span><a aria-label="undefined (opens in a new tab)" data-dcnode-id="238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/%40soviet_artefacts%3Futm_source%3Dunsplash%26utm_medium%3Dreferral%26utm_content%3DcreditCopyText" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="239" instrument_node="">Soviet Artefacts</span></a><span data-dcnode-id="237" instrument_node="">.</span></p><span data-dcnode-id="235" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="229"><figure class="aligncenter size-large is-resized" data-dcnode-id="230"><img alt="" class="wp-image-15361" data-dcnode-id="234" height="498" sizes="(max-width: 332px) 100vw, 332px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dhjhkxawhe8q4.cloudfront.net/cornell-university-press-wp/wp-content/uploads/2020/09/28200305/grabthis.jpg&amp;raw" srcset="https://dhjhkxawhe8q4.cloudfront.net/cornell-university-press-wp/wp-content/uploads/2020/09/28200305/grabthis.jpg 298w, https://dhjhkxawhe8q4.cloudfront.net/cornell-university-press-wp/wp-content/uploads/2020/09/28200305/grabthis-200x300.jpg 200w" width="332"><figcaption data-dcnode-id="231"><a aria-label="undefined (opens in a new tab)" data-dcnode-id="232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cornellpress.cornell.edu/book/9781501750519/mixed-messages/%23bookTabs%3D4" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="233" instrument_node="">Read more.</span></a></figcaption></figure></div><span data-dcnode-id="228" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="227"><span data-dcnode-id="226" instrument_node="">
</span><p data-dcnode-id="220"><strong data-dcnode-id="221"><span data-dcnode-id="225" instrument_node="">Kathryn E. Graber is Assistant Professor of Anthropology and Central Eurasian Studies at Indiana University. She writes about language, media, and materiality and is co-editor of </span><em data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Storytelling as Narrative Practice: Ethnographic Approaches to the Tales We Tell</span></em><span data-dcnode-id="222" instrument_node="">.</span></strong></p><span data-dcnode-id="219" instrument_node="">
</span></div><span data-dcnode-id="217" instrument_node="">
</span></section><span data-dcnode-id="215" instrument_node="">
