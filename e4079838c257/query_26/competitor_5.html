</span><div class="tei-div2" data-dcnode-id="543" id="d1"><span data-dcnode-id="1074" instrument_node="">
</span><h3 class="tei-head7" data-dcnode-id="1068"><span data-dcnode-id="1073" instrument_node="">1. Intelligence Memorandum Prepared in the Central Intelligence
                                Agency</span><span data-dcnode-id="1070" id="fnref:1.5.4.4.8.9.8.2"><a class="note" data-dcnode-id="1071" data-original-title="" href="#fn:1.5.4.4.8.9.8.2" rel="footnote" title=""><span data-dcnode-id="1072" instrument_node="">1</span></a></span><span data-dcnode-id="1069" instrument_node="">
</span></h3><span data-dcnode-id="1067" instrument_node="">
</span><div class="tei-opener" data-dcnode-id="1056"><span data-dcnode-id="1066" instrument_node="">
</span><div class="tei-dateline" data-dcnode-id="1058"><span data-dcnode-id="1065" instrument_node="">
</span><span class="tei-placeName" data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Washington,</span></span><span data-dcnode-id="1062" instrument_node="">
</span><span class="tei-date" data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">January 21,
                                    1969.</span></span><span data-dcnode-id="1059" instrument_node="">
</span></div><span data-dcnode-id="1057" instrument_node="">
</span></div><span data-dcnode-id="1055" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">OCI No. 0549/69</span></p><span data-dcnode-id="1052" instrument_node="">
</span><p class="tei-p1" data-dcnode-id="1047"><span data-dcnode-id="1051" instrument_node="">Current Problems in </span><span class="tei-gloss" data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">NATO</span></span><span data-dcnode-id="1048" instrument_node="">
</span></p><span data-dcnode-id="1046" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Introduction</span></p><span data-dcnode-id="1043" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="1028"><span data-dcnode-id="1042" instrument_node="">The Czechoslovak crisis</span><span data-dcnode-id="1039" id="fnref:1.5.4.4.8.9.18.2"><a class="note" data-dcnode-id="1040" data-original-title="" href="#fn:1.5.4.4.8.9.18.2" rel="footnote" title=""><span data-dcnode-id="1041" instrument_node="">2</span></a></span><span data-dcnode-id="1038" instrument_node=""> generated a new impulse
                            toward united action in </span><span class="tei-gloss" data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">NATO</span></span><span data-dcnode-id="1035" instrument_node="">—symbolized by expanded consultation and the postponement
                            of troop reductions. It has not, however, altered the European </span><span class="tei-gloss" data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">NATO</span></span><span data-dcnode-id="1032" instrument_node=""> members’ basic view that the danger
                            of an all-out Soviet assault remains low. The allies therefore find
                            themselves in a state of heightened activity and momentum that will be
                            difficult to sustain so long as no new long-range goal or purpose is
                            found. The chances for a meaningful </span><span class="tei-gloss" data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">NATO</span></span><span data-dcnode-id="1029" instrument_node=""> role in the continuing search for détente have been
                            blighted by Moscow’s determination to maintain its grip in Eastern
                            Europe. Thus the coming months are likely to see a growing paradox, in
                            which the alliance actually works better while dissatisfaction about it
                            increases. Meanwhile, the growing rivalries among the European
                            members—for influence in Europe and in Washington—make it difficult for
                            them to organize effectively for the larger collective role they believe
                            they should play in the alliance.</span></p><span data-dcnode-id="1027" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Czechoslovakia and After</span></p><span data-dcnode-id="1024" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="1006"><span data-dcnode-id="1023" instrument_node="">1. Most of the </span><span class="tei-gloss" data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">NATO</span></span><span data-dcnode-id="1020" instrument_node=""> allies believe
                            that, despite the initial shock, the Czechoslovak crisis has done little
                            more than introduce a new ele</span><a class="tei-pb1" data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.state.gov/historicaldocuments/frus1969-76v41/pg_2" id="pg_2"><span data-dcnode-id="1019" instrument_node="">[Page 2]</span></a><span data-dcnode-id="1017" instrument_node="">ment
                            of uncertainty into East-West relations. The crisis has led few of the
                            allies to disavow the goal of “peaceful engagement” with the Soviet
                            bloc. Only the Greeks and the Turks still argue for prolonging the
                            “period of mourning” over the Soviet action. Although the British,
                            Germans, and Dutch view the new “</span><span class="tei-persName" data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Brezhnev</span></span><span data-dcnode-id="1014" instrument_node=""> doctrine” of discretionary intervention</span><span data-dcnode-id="1011" id="fnref:1.5.4.4.8.9.22.8"><a class="note" data-dcnode-id="1012" data-original-title="" href="#fn:1.5.4.4.8.9.22.8" rel="footnote" title=""><span data-dcnode-id="1013" instrument_node="">3</span></a></span><span data-dcnode-id="1010" instrument_node=""> as a new and permanent danger, they
                            have joined Canada and the Scandinavian members in opposing a resumption
                            of cold-war politics. Even the Soviet buildup in the Mediterranean is
                            seen more as a problem of political rivalry than as a direct military
                            threat to </span><span class="tei-gloss" data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">NATO</span></span><span data-dcnode-id="1007" instrument_node="">’s southern flank.</span></p><span data-dcnode-id="1005" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="993"><span data-dcnode-id="1004" instrument_node="">2. This restored confidence is reflected in the allies’ continuing
                            efforts to develop bridgeheads to the Eastern bloc. Even after the
                            invasion few of the allies were ready to cut down trade or cultural ties
                            with the invading “five.”</span><span data-dcnode-id="1001" id="fnref:1.5.4.4.8.9.24.2"><a class="note" data-dcnode-id="1002" data-original-title="" href="#fn:1.5.4.4.8.9.24.2" rel="footnote" title=""><span data-dcnode-id="1003" instrument_node="">4</span></a></span><span data-dcnode-id="1000" instrument_node=""> After some bickering, several member governments
                            last September endorsed a list of short-term commercial sanctions, such
                            as withholding credits and reducing participation in Eastern European
                            trade fairs. These early intentions, however, were soon forgotten. In
                            late September, for instance, only Greece and the US abided by an
                            agreement not to take part in the Plovdiv trade fair in Bulgaria; most
                            of the other </span><span class="tei-gloss" data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">NATO</span></span><span data-dcnode-id="997" instrument_node=""> allies were
                            officially represented. By late October, </span><span class="tei-gloss" data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">NATO</span></span><span data-dcnode-id="994" instrument_node="">’s economic advisers admitted that there had been no
                            significant change in allied economic policies toward Eastern Europe.
                            The allies will probably renew all low-level commercial contacts with
                            the East during 1969.</span></p><span data-dcnode-id="992" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">3. Most of the European allies also have resumed cultural exchanges with
                            Eastern Europe, though generally on a restricted basis. Visits by
                            top-ranking dignitaries are moving forward after a brief hiatus.</span></p><span data-dcnode-id="989" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Détente</span></p><span data-dcnode-id="986" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="974"><span data-dcnode-id="985" instrument_node="">4. The allies have accepted two conditions in their continued search for
                            détente. First, by pledging to uphold current force levels, they have
                            acknowledged—as they did in the </span><span class="tei-persName" data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Harmel</span></span><span data-dcnode-id="982" instrument_node=""> Exercise</span><span data-dcnode-id="979" id="fnref:1.5.4.4.8.9.30.4"><a class="note" data-dcnode-id="980" data-original-title="" href="#fn:1.5.4.4.8.9.30.4" rel="footnote" title=""><span data-dcnode-id="981" instrument_node="">5</span></a></span><span data-dcnode-id="978" instrument_node="">—that </span><a class="tei-pb1" data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.state.gov/historicaldocuments/frus1969-76v41/pg_3" id="pg_3"><span data-dcnode-id="977" instrument_node="">[Page 3]</span></a><span data-dcnode-id="975" instrument_node=""> strong defense is the prerequisite for safe pursuit
                            of détente. Second, they have asserted that bridge-building must not
                            jeopardize their newly reaffirmed political solidarity.</span></p><span data-dcnode-id="973" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">5. Thus the central question is not whether to seek to resume détente,
                            but how to achieve it in light of the still-uncertain implications of
                            Czechoslovakia. Previously it was assumed that East-West contacts could
                            so improve the atmosphere that agreements, even on troop reductions, the
                            German question, and European security, might become possible. Now the
                            allies, including the Germans, define détente more as an interim
                            accommodation to the existing order.</span></p><span data-dcnode-id="970" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="964"><span data-dcnode-id="969" instrument_node="">6. The earlier concept of détente allowed greater leeway for an active
                            alliance role. For example, when the allies called on the Soviets last
                            June to discuss mutual force reductions,</span><span data-dcnode-id="966" id="fnref:1.5.4.4.8.9.34.2"><a class="note" data-dcnode-id="967" data-original-title="" href="#fn:1.5.4.4.8.9.34.2" rel="footnote" title=""><span data-dcnode-id="968" instrument_node="">6</span></a></span><span data-dcnode-id="965" instrument_node=""> they were aiming
                            in part at heading off unilateral troop cuts by several allies, but they
                            were also trying to confirm a role for the alliance in the détente
                            process.</span></p><span data-dcnode-id="963" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="955"><span data-dcnode-id="962" instrument_node="">7. The Czechoslovak crisis has led to a narrowing of this role, at least
                            temporarily. Mutual force reductions are no longer a priority item on
                                </span><span class="tei-gloss" data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">NATO</span></span><span data-dcnode-id="959" instrument_node="">’s agenda, and a scheduled
                            review of the subject last September was postponed. Several West German
                            officials have stressed their support for strictly bilateral approaches
                            to the East, while the Danes and the Dutch continue to emphasize the
                            dangers of too deep an involvement of </span><span class="tei-gloss" data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">NATO</span></span><span data-dcnode-id="956" instrument_node=""> in the détente process. The French, quite predictably,
                            insist on doing business with the Communists as they see fit.</span></p><span data-dcnode-id="954" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="948"><span data-dcnode-id="953" instrument_node="">8. Even so, the allies have been able to agree on the need for continued
                            collaboration on détente matters. The British have been particularly
                            insistent on prior consultation and were much offended, along with a
                            number of other allies, by the failure of the US to brief them on a
                            recent proposal to the Soviets for enlarging the Eighteen Nation
                            Disarmament Conference.</span><span data-dcnode-id="950" id="fnref:1.5.4.4.8.9.38.2"><a class="note" data-dcnode-id="951" data-original-title="" href="#fn:1.5.4.4.8.9.38.2" rel="footnote" title=""><span data-dcnode-id="952" instrument_node="">7</span></a></span><span data-dcnode-id="949" instrument_node=""> Most of the member governments
                            are reconciled to the fact that the US, by virtue of its power alone,
                            must frequently deal directly with Moscow, but even those who accept
                            this necessity are determined to keep a close check on US initiatives
                            through expanded interallied consultation.</span></p><span data-dcnode-id="947" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="927"><span data-dcnode-id="946" instrument_node="">9. Other potentially important functions of </span><span class="tei-gloss" data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">NATO</span></span><span data-dcnode-id="943" instrument_node=""> in “détente management” may be emerging. </span><span class="tei-gloss" data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">NATO</span></span><span data-dcnode-id="940" instrument_node="">’s political committee has studied
                            the peaceful and military uses of the sea floor as a guide for allied
                                </span><a class="tei-pb1" data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.state.gov/historicaldocuments/frus1969-76v41/pg_4" id="pg_4"><span data-dcnode-id="939" instrument_node="">[Page 4]</span></a><span data-dcnode-id="937" instrument_node=""> positions in </span><span class="tei-gloss" data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">UN</span></span><span data-dcnode-id="934" instrument_node=""> discussions. Belgium has proposed that
                                </span><span class="tei-gloss" data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">NATO</span></span><span data-dcnode-id="931" instrument_node=""> develop a common policy on
                            arms sales in the Middle East, although Britain and other “supplier”
                            nations may continue to oppose this. The Council has already agreed in
                            principle that it should establish a disarmament section in the allied
                            secretariat to coordinate </span><span class="tei-gloss" data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">NATO</span></span><span data-dcnode-id="928" instrument_node="">’s
                            activity in this field.</span></p><span data-dcnode-id="926" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="921"><span data-dcnode-id="925" instrument_node="">10. Whatever comes of these projected extensions of </span><span class="tei-gloss" data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">NATO</span></span><span data-dcnode-id="922" instrument_node="">’s role in policy coordination, some
                            basic problems will still remain. For the US, the requirements imposed
                            by its position as a prime architect of détente may on occasion compete
                            with its responsibilities as an alliance member. In responding to
                            European demands for improved relations with the Soviets, the US risks
                            setting itself apart from its allies. Despite the extensive
                            consultations on the nonproliferation treaty, many Europeans remain
                            suspicious that the treaty is an attempt to formalize the hegemonic
                            position of the US and the USSR. A few of the member governments,
                            notably West Germany, view the projected US-Soviet talks on strategic
                            arms limitation as a potential threat to the US nuclear guarantee. These
                            fears will be calmed only if the allies can be convinced that the
                            superpowers themselves intend to make real sacrifices in the name of
                            disarmament.</span></p><span data-dcnode-id="920" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Consultation and Cohesion</span></p><span data-dcnode-id="917" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="905"><span data-dcnode-id="916" instrument_node="">11. Since the report of the “Three Wisemen” in 1956</span><span data-dcnode-id="913" id="fnref:1.5.4.4.8.9.46.2"><a class="note" data-dcnode-id="914" data-original-title="" href="#fn:1.5.4.4.8.9.46.2" rel="footnote" title=""><span data-dcnode-id="915" instrument_node="">8</span></a></span><span data-dcnode-id="912" instrument_node=""> laid down
                            new guidelines, consultation has evolved into a continuous and vital
                            alliance function, with the channels of communications among the members
                            constantly proliferating and improving. </span><span class="tei-gloss" data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">NATO</span></span><span data-dcnode-id="909" instrument_node="">’s more recent efforts to equip itself for “crisis
                            management” have created still further possibilities for informational
                            exchange and discussion. Techniques developed in </span><span class="tei-gloss" data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">NATO</span></span><span data-dcnode-id="906" instrument_node="">’s situation center have been
                            upgraded to meet the needs of the North Atlantic Council and the
                            Military Committee in peacetime and periods of tension. High-level
                            exercises, most recently Hilex and Fallex, have tested the Council’s
                            capacity to consult and make decisions under pressure. A major
                            civil-military logistics exercise next May will reveal whether civilian
                            support agencies in the allied capitals can be coordinated in a
                            crisis.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="881"><span data-dcnode-id="903" instrument_node="">12. Technological innovations are likewise improving consultation in
                                </span><span class="tei-gloss" data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">NATO</span></span><span data-dcnode-id="900" instrument_node="">. A new </span><span class="tei-gloss" data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">NATO</span></span><span data-dcnode-id="897" instrument_node="">-wide communications system
                            connecting each of the allied capitals and the major command
                            headquarters became operational last May and will be expanded. Nine
                                </span><span class="tei-gloss" data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">NATO</span></span><span data-dcnode-id="894" instrument_node=""> coun</span><a class="tei-pb1" data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.state.gov/historicaldocuments/frus1969-76v41/pg_5" id="pg_5"><span data-dcnode-id="893" instrument_node="">[Page 5]</span></a><span data-dcnode-id="891" instrument_node="">tries are now taking part in the experimental phase
                            of a </span><span class="tei-gloss" data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">NATO</span></span><span data-dcnode-id="888" instrument_node=""> Satellite Communications
                            Program (</span><span class="tei-gloss" data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">SATCOM</span></span><span data-dcnode-id="885" instrument_node="">). </span><span class="tei-gloss" data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">NATO</span></span><span data-dcnode-id="882" instrument_node=""> also is scheduled to receive two
                            satellites to be operational in late 1970.</span></p><span data-dcnode-id="880" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="875"><span data-dcnode-id="879" instrument_node="">13. Two recent crises have led the allies to supplement the regular
                            consultative mechanisms with several less formal ones. During the
                            Greek-Turkish dispute over Cyprus in 1967, the secretary general was
                            given a “watching brief,” permitting him to mediate. The Czechoslovak
                            crisis brought still other innovations, including the use of the
                            Situation Center for the dissemination of “political” as well as
                            military advisories. The political committee chairman’s report was also
                            developed into a source of continuous instruction to </span><span class="tei-gloss" data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">NATO</span></span><span data-dcnode-id="876" instrument_node=""> commanders.</span></p><span data-dcnode-id="874" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Nuclear Planning Group</span></p><span data-dcnode-id="871" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="854"><span data-dcnode-id="870" instrument_node="">14. On balance, these numerous commitments to consult have had favorable
                            results. Through the Nuclear Planning Group (</span><span class="tei-gloss" data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">NPG</span></span><span data-dcnode-id="867" instrument_node="">), for example, the allies have arrived at a better
                            understanding of the role of the host country in the storage and release
                            of tactical nuclear weapons, the impracticability of an </span><span class="tei-gloss" data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">ABM</span></span><span data-dcnode-id="864" instrument_node=""> force for Europe, and the limited
                            usefulness of atomic demolition devices. The US has allayed to some
                            extent European concern that the decision to build a “light” </span><span class="tei-gloss" data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">ABM</span></span><span data-dcnode-id="861" instrument_node=""> system might point toward a “fortress
                            America” strategy. Of the active members of the </span><span class="tei-gloss" data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">NPG</span></span><span data-dcnode-id="858" instrument_node="">, only the Germans continue to belabor the strategy of
                            flexible response, and even they seem concerned less with replacing the
                            strategy than with turning it into a new argument against the </span><span class="tei-gloss" data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">NPT</span></span><span data-dcnode-id="855" instrument_node="">.</span></p><span data-dcnode-id="853" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="839"><span data-dcnode-id="852" instrument_node="">15. Most important, the </span><span class="tei-gloss" data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">NPG</span></span><span data-dcnode-id="849" instrument_node=""> has enabled
                            the nonnuclear allies to participate actively in </span><span class="tei-gloss" data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">NATO</span></span><span data-dcnode-id="846" instrument_node="">’s nuclear affairs. [</span><span class="tei-hi1 font-italic" data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">7 lines not declassified</span></span><span data-dcnode-id="843" instrument_node="">] Not all of these
                            efforts have been successful, but it is clear that the </span><span class="tei-gloss" data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">NPG</span></span><span data-dcnode-id="840" instrument_node=""> has reduced earlier pressures for more
                            direct access to the US nuclear trigger.</span></p><span data-dcnode-id="838" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Limitations</span></p><span data-dcnode-id="835" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="827"><span data-dcnode-id="834" instrument_node="">16. The gains from consultation should not obscure its limitations. The
                            allies tend to consult formally only after guidelines have been
                            established nationally and only when a consensus is expected. Unlimited
                            consultation will not resolve basic conflicts of interest. Lisbon’s
                            cajoling has not induced the </span><span class="tei-gloss" data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">NATO</span></span><span data-dcnode-id="831" instrument_node="">
                            allies to rally behind Portuguese policies in Africa. Nor has the US
                            found that consultation necessarily yields support for undertakings
                            outside </span><span class="tei-gloss" data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">NATO</span></span><span data-dcnode-id="828" instrument_node="">’s traditional
                            purview.</span></p><span data-dcnode-id="826" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="818"><span data-dcnode-id="825" instrument_node="">17. After 20 years, </span><span class="tei-gloss" data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">NATO</span></span><span data-dcnode-id="822" instrument_node="">’s consultative
                            process on political and economic affairs still cannot match the
                            cooperation that exists in the military sphere. Anything like an
                            Atlantic community remains distant, and is probably impracticable. The
                            Atlantic Policy Group, which was supposed to find new areas for common
                            Atlantic action, has created no momentum in that direction. In short,
                            allied consultation is likely to re</span><a class="tei-pb1" data-dcnode-id="820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.state.gov/historicaldocuments/frus1969-76v41/pg_6" id="pg_6"><span data-dcnode-id="821" instrument_node="">[Page 6]</span></a><span data-dcnode-id="819" instrument_node="">main a constructive and unifying factor only if its objectives are not
                            set too high.</span></p><span data-dcnode-id="817" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Burden-sharing and European Responsibility</span></p><span data-dcnode-id="814" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">18. The question of whether the European members are bearing their fair
                            share of the burden of the alliance will remain a perennial issue. In a
                            defense system that depends ultimately on the deterrent power supplied
                            by one member, it is difficult for the others to calculate the relevance
                            of their particular contributions or to defend them before their
                            parliaments. The US objects that its allies are purchasing their
                            security at bargain rates; the Europeans respond that the defense of
                            Western Europe is an acknowledged US interest which has involved huge
                            expenditures but has paid huge dividends—political as well as
                            economic.</span></p><span data-dcnode-id="811" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="803"><span data-dcnode-id="810" instrument_node="">19. Statistics on relative contributions do not resolve the issue. Since
                            the early 1950s, the European </span><span class="tei-gloss" data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">NATO</span></span><span data-dcnode-id="807" instrument_node="">
                            countries have steadily increased their financial support of the allied
                            infrastructure program—from less than 50 percent of the total in
                            1951–1956 to over 65 percent currently. But the precise return from
                            these projects to the economies of the host countries—all European—can
                            hardly be measured. Although from 1963 through 1967, defense
                            expenditures of the European members gradually increased, these outlays
                            were a declining percentage of </span><span class="tei-gloss" data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">GNP</span></span><span data-dcnode-id="804" instrument_node="">, and
                            there was a sharp downturn in the expenditures for 1968. In the same
                            six-year period (1963–68), European manpower levels (minus France) also
                            increased, but the gains were mostly among the southern flank countries,
                            and all the central region countries reduced their forces.</span></p><span data-dcnode-id="802" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="796"><span data-dcnode-id="801" instrument_node="">20. In the wake of the Czechoslovak crisis, the European allies seem to
                            have realized that, regardless of their past performances, they may have
                            to do better in the future if they are to assure continued US support.
                            In the November ministerial meeting,</span><span data-dcnode-id="798" id="fnref:1.5.4.4.8.9.70.2"><a class="note" data-dcnode-id="799" data-original-title="" href="#fn:1.5.4.4.8.9.70.2" rel="footnote" title=""><span data-dcnode-id="800" instrument_node="">9</span></a></span><span data-dcnode-id="797" instrument_node=""> 11 of them
                            pledged to maintain and/or upgrade current force commitments, while
                            three—West Germany, Norway, and the Netherlands—offered to increase
                            projected expenditures. These improvements were promised without request
                            for US reciprocity; indeed, in the communiqué, the Europeans recognized
                            formally a vague but unmistakable responsibility to help the US with its
                            balance-of-payments problem.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="790"><span data-dcnode-id="794" instrument_node="">21. In separate negotiations over troop-offset costs, the Germans have
                            shown a bit more flexibility. While resisting any additional military
                            functions or troop support costs, they have decided to “freeze” existing
                            deposits in the US treasury, and have offered to pay for military </span><a class="tei-pb1" data-dcnode-id="792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.state.gov/historicaldocuments/frus1969-76v41/pg_7" id="pg_7"><span data-dcnode-id="793" instrument_node="">[Page 7]</span></a><span data-dcnode-id="791" instrument_node=""> purchases directly without drawing
                            on these funds, in order to benefit the US balance of payments. The
                            Germans have promised that their expenditures for US military goods and
                            services will be maintained at about $350 million annually in fiscal
                            year 1970 and 1971—a level somewhat less than what the US would have
                            liked.</span></p><span data-dcnode-id="789" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="784"><span data-dcnode-id="788" instrument_node="">New Roles for </span><span class="tei-gloss" data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">NATO</span></span><span data-dcnode-id="785" instrument_node=""> and Europe</span></p><span data-dcnode-id="783" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="772"><span data-dcnode-id="782" instrument_node="">22. None of these developments foreshadows a massive shift of
                            responsibility in the alliance, but the European allies are looking for
                            ways to expand their </span><span class="tei-gloss" data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">NATO</span></span><span data-dcnode-id="779" instrument_node=""> role. The
                            British have been particularly eager to do so—as much perhaps to
                            demonstrate their new commitment to Europe as to assure continued US
                            protection. During the November ministerial meeting. British Defense
                            Secretary </span><span class="tei-persName" data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Healey</span></span><span data-dcnode-id="776" instrument_node=""> and Foreign
                            Secretary </span><span class="tei-persName" data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Stewart</span></span><span data-dcnode-id="773" instrument_node=""> discussed with
                            their continental colleagues a possible “European identity” that might
                            help the allies head off pressures for US disengagement. The talks were
                            inconclusive, but the fact they were held at all reflected the interest
                            of the allies in a stronger European voice in allied affairs.</span></p><span data-dcnode-id="771" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="766"><span data-dcnode-id="770" instrument_node="">23. It remains doubtful that promising new formulas will soon be found
                            for redressing unequal burden-sharing within the alliance. Although the
                            French have hinted that they might consider coordinating their strike
                            force with Britain’s in exchange for a resumption of US nuclear
                            assistance to France, the prospects for such cooperation remain poor in
                            view of the massive emphasis </span><span class="tei-persName" data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">De
                                Gaulle</span></span><span data-dcnode-id="767" instrument_node=""> places on national sovereignty. Moreover, while
                            the Germans reiterate interest in some kind of multilateral nuclear
                            force—the “European option”—British officials rule it out except in the
                            context of a fully federated Europe. For their part, the Germans will
                            most likely continue to balk at any arrangement that would threaten to
                            subordinate them to a formal British-French directorate.</span></p><span data-dcnode-id="765" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">24. In any case, a truly European nuclear force poses formidable problems
                            apart from the political ones. To illustrate, the Institute for
                            Strategic Studies (ISS) in London calculates that such a force would
                            have to be two and one half times the size of the British and French
                            deterrents combined, if it is to provide credible “assured-destruction”
                            capabilities. To build, deploy, and protect no more than 500 missiles or
                            supersonic bombers, according to the ISS, would cost $20 to $40 billion,
                            entailing an increase in European defense expenditures of between an
                            eighth and a quarter. Only within a “fully federated Europe” with a
                            central tax-levying authority could such outlays become feasible.</span></p><span data-dcnode-id="762" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="751"><span data-dcnode-id="761" instrument_node="">25. Other less ambitious schemes might be more immediately relevant. A
                            European technological community, for example, with authority over
                            military as well as civil research and development, might meet the
                            problem of adjusting responsibilities between the US and </span><a class="tei-pb1" data-dcnode-id="759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.state.gov/historicaldocuments/frus1969-76v41/pg_8" id="pg_8"><span data-dcnode-id="760" instrument_node="">[Page 8]</span></a><span data-dcnode-id="758" instrument_node=""> Europe. </span><span class="tei-persName" data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Harold Wilson</span></span><span data-dcnode-id="755" instrument_node="">, eager to underline Britain’s European
                            aspirations, has frequently endorsed the idea. The Germans have proposed
                            as an alternative an increase in selective cooperation among European
                            countries, along the lines of the </span><span class="tei-gloss" data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">UK</span></span><span data-dcnode-id="752" instrument_node="">–German–Dutch–Italian joint enterprise to produce a multirole
                            combat aircraft (MRCA).</span></p><span data-dcnode-id="750" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="742"><span data-dcnode-id="749" instrument_node="">26. Obviously, great problems confront the organization of a European
                            research and development program. Most technological cooperation among
                            the European members of </span><span class="tei-gloss" data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">NATO</span></span><span data-dcnode-id="746" instrument_node="">—outside
                            the European community—has been either bilateral or based on American
                            design, as in the construction of the F-104G interceptor-bomber and the
                            Hawk missile. The problems of European Launch Development Organization
                            (ELDO) have tended to dispute the practicability of purely
                            intergovernmental cooperation in technological fields. Even the highly
                            touted MRCA project remains in doubt [</span><span class="tei-hi1 font-italic" data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">2 lines not
                                declassified</span></span><span data-dcnode-id="743" instrument_node="">]</span></p><span data-dcnode-id="741" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="736"><span data-dcnode-id="740" instrument_node="">27. Many Europeans also fear that greater European self-sufficiency in
                            matériel might in the end drive the US out of Europe by depriving it of
                            the arms markets needed to offset its </span><span class="tei-gloss" data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">NATO</span></span><span data-dcnode-id="737" instrument_node="">-related expenditures overseas.</span></p><span data-dcnode-id="735" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">European Caucus</span></p><span data-dcnode-id="732" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="709"><span data-dcnode-id="731" instrument_node="">28. Belgian Foreign Minister </span><span class="tei-persName" data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Harmel</span></span><span data-dcnode-id="728" instrument_node=""> has advanced another scheme for organizing a
                            European identity in the alliance. In his report a year ago on the
                            future tasks of the alliance, </span><span class="tei-persName" data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Harmel</span></span><span data-dcnode-id="725" instrument_node=""> urged that a “European caucus” be created to
                            serve as a single mouthpiece for the European allies. The French
                            predictably objected to this on the grounds that their sovereignty would
                            be violated and the idea was ultimately stricken from the working paper
                            based on </span><span class="tei-persName" data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Harmel</span></span><span data-dcnode-id="722" instrument_node="">’s
                            recommendations. Nevertheless, after the Soviet invasion in August,
                                </span><span class="tei-persName" data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Harmel</span></span><span data-dcnode-id="719" instrument_node=""> sought to resurrect
                            the proposal in the seven-nation Western European Union (</span><span class="tei-gloss" data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">WEU</span></span><span data-dcnode-id="716" instrument_node="">), which he now regarded as the logical
                            nucleus for any expanded cooperation between Britain and the friendly
                            European “five.” His new plan, closely resembling one advanced last
                            January by the </span><span class="tei-gloss" data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Benelux</span></span><span data-dcnode-id="713" instrument_node=""> countries,
                            called for the coordination of British and European activities in such
                                non-</span><span class="tei-gloss" data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">EEC</span></span><span data-dcnode-id="710" instrument_node=""> fields as foreign and
                            defense policy and monetary, technological, and youth affairs.</span></p><span data-dcnode-id="708" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="700"><span data-dcnode-id="707" instrument_node="">29. Those sympathetic to the </span><span class="tei-persName" data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Harmel</span></span><span data-dcnode-id="704" instrument_node=""> approach have yet to find a way to overcome basic
                            French hostility to Britain and to any real integration of Europe. In an
                            effort to circumvent a French veto of the creation of study groups
                            needed to put the plan in motion, the Italians last November called
                            several of their European colleagues together and asked them to draw up
                            working guidelines to be submitted as an Italian initiative at the next
                                </span><span class="tei-gloss" data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">WEU</span></span><span data-dcnode-id="701" instrument_node=""> ministerial meeting in
                            February. The issue will remain on dead center, however, so long as a
                            crucial party to the exercise, West Germany, refuses to offend the
                            French and fears that a European grouping would divide rather than unite
                            the alliance.</span></p><span data-dcnode-id="699" instrument_node="">
</span><a class="tei-pb1" data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.state.gov/historicaldocuments/frus1969-76v41/pg_9" id="pg_9"><span data-dcnode-id="698" instrument_node="">[Page 9]</span></a><span data-dcnode-id="696" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="688"><span data-dcnode-id="695" instrument_node="">30. Thus the idea of a European caucus—whether within </span><span class="tei-gloss" data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">NATO</span></span><span data-dcnode-id="692" instrument_node="">, </span><span class="tei-gloss" data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">WEU</span></span><span data-dcnode-id="689" instrument_node="">, or independent of any existing structure—is unlikely
                            to produce significant early results, mostly because the individual
                            countries continue to find it easier to deal with the US than with each
                            other.</span></p><span data-dcnode-id="687" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Traditional Liabilities</span></p><span data-dcnode-id="684" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="679"><span data-dcnode-id="683" instrument_node="">31. The varying interests of the 15 allies and the rivalries that lie
                            just beneath the surface of daily relations seem certain to make it hard
                            to solve the immediately visible issues. The tendency to pluralism and
                            fragmentation is obviously aggravated within the alliance whenever
                            tensions in East-West relations subside. With the Soviet threat
                            presumably reduced to manageable proportions, the differences among the
                            allies could mushroom into sources of potential division. Size itself
                            has tended to become a political boundary separating ally from ally.
                            Unlike the larger partners, the small </span><span class="tei-gloss" data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">NATO</span></span><span data-dcnode-id="680" instrument_node=""> countries much prefer multilateral channels in dealing
                            with the US, and consequently remain the leading exponents of expanded
                            consultations within the alliance.</span></p><span data-dcnode-id="678" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="662"><span data-dcnode-id="677" instrument_node="">32. Military and geographic factors have created still other problems.
                            The military withdrawal of France</span><span data-dcnode-id="674" id="fnref:1.5.4.4.8.9.102.2"><a class="note" data-dcnode-id="675" data-original-title="" href="#fn:1.5.4.4.8.9.102.2" rel="footnote" title=""><span data-dcnode-id="676" instrument_node="">10</span></a></span><span data-dcnode-id="673" instrument_node=""> has
                            heightened the importance of the </span><span class="tei-gloss" data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Benelux</span></span><span data-dcnode-id="670" instrument_node=""> members well beyond their force contributions. [</span><span class="tei-hi1 font-italic" data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">3 lines not declassified</span></span><span data-dcnode-id="667" instrument_node="">] Two of the three
                            Mediterranean powers, Greece and Turkey, continue to be concerned as
                            much with their bilateral tensions (Cyprus) as with the Soviet threat.
                            Nine other members in or around the Central European theater represent a
                            separate community of interest based on the proximity of the Soviet
                            threat and the immediacy of the German problem. Geopolitical
                            considerations have tended to isolate both Iceland and Canada from the
                            concerns of their European allies, while Canada has been further set
                            apart by its special relation to the senior partner. Distaste for
                            political systems of some members—e.g., the new military regime in
                                Greece</span><span data-dcnode-id="664" id="fnref:1.5.4.4.8.9.102.8"><a class="note" data-dcnode-id="665" data-original-title="" href="#fn:1.5.4.4.8.9.102.8" rel="footnote" title=""><span data-dcnode-id="666" instrument_node="">11</span></a></span><span data-dcnode-id="663" instrument_node=""> added obstacles to
                            interallied cooperation.</span></p><span data-dcnode-id="661" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="647"><span data-dcnode-id="660" instrument_node="">33. For the foreseeable future this pluralistic trend threatens the
                            cohesion, but not the continuation, of the alliance. A further erosion
                            of membership down to those ten allies—including the US—whose fate is
                            most intimately linked to the continued division of Europe is
                            conceivable. Prime Minister </span><span class="tei-persName" data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Trudeau</span></span><span data-dcnode-id="657" instrument_node=""> has often emphasized that Canada has not ruled
                            out complete withdrawal. Portugal has likewise threatened to withdraw in
                            an attempt to gain </span><span class="tei-gloss" data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">NATO</span></span><span data-dcnode-id="654" instrument_node=""> support for
                            the Portuguese policies in Africa. The alliance would undoubtedly be
                            shaken, but hardly doomed, should either country leave. </span><span class="tei-gloss" data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">NATO</span></span><span data-dcnode-id="651" instrument_node="">’s viability depends less </span><a class="tei-pb1" data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.state.gov/historicaldocuments/frus1969-76v41/pg_10" id="pg_10"><span data-dcnode-id="650" instrument_node="">[Page 10]</span></a><span data-dcnode-id="648" instrument_node=""> on the scope of its membership than on
                            its capacity to come to grips with the problems most affecting the
                            pivotal ten members.</span></p><span data-dcnode-id="646" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="638"><span data-dcnode-id="645" instrument_node="">34. The tendency to fragmentation impresses upon the alliance the need
                            for expanding consultation and pragmatic cooperation. The infrastructure
                            program, one of the few </span><span class="tei-gloss" data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">NATO</span></span><span data-dcnode-id="642" instrument_node=""> military
                            efforts in which France still participates, will be more important in
                            the future as an instrument of allied solidarity. Such multinational
                            undertakings as the allied mobile force (important to the protection of
                                </span><span class="tei-gloss" data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">NATO</span></span><span data-dcnode-id="639" instrument_node="">’s flanks), the newly
                            established on-call force for the Atlantic, and the projected one for
                            the Mediterranean will also help reconcile differences and keep the
                            alliance together.</span></p><span data-dcnode-id="637" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">French Obstruction and Feelers</span></p><span data-dcnode-id="634" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="626"><span data-dcnode-id="633" instrument_node="">35. Alliance cohesion will not be helped, however, by the obstructions of
                            President de Gaulle, which continue although on a more subtle level. To
                            be sure, his decision to pull French forces out of </span><span class="tei-gloss" data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">NATO</span></span><span data-dcnode-id="630" instrument_node="">’s integrated command has not proved
                            so destructive as originally feared. It has not severely tempted any
                            other ally to follow suit, but it has forced awkward adjustments in
                            allied relationships that have hampered consultation and complicated the
                            exigencies of </span><span class="tei-gloss" data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">NATO</span></span><span data-dcnode-id="627" instrument_node=""> defense. The
                            elimination of France as a base of allied operations has required that
                            supply lines to US forces in Bavaria be strung out parallel rather than
                            perpendicular to the assumed line of engagement, thus making them more
                            vulnerable. France’s ambiguous position remains an obstacle to almost
                            every new integrated undertaking. It often necessitates time-consuming
                            and potentially costly examination of the question of what France’s
                            relation to such-and-such a project should be.</span></p><span data-dcnode-id="625" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="620"><span data-dcnode-id="624" instrument_node="">36. The French again seem to be pushing for a special relationship with
                            the US that could drive a wedge between the senior partner and the rest
                            of the alliance. What they have in mind specifically remains unclear.
                            Since October 1968, they have put out feelers to the US which suggest
                            that they would like the US to grant France equality with the </span><span class="tei-gloss" data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">UK</span></span><span data-dcnode-id="621" instrument_node=""> in acquiring nuclear equipment and
                            knowledge. The possibility of French-British nuclear cooperation as the
                            basis of greater European responsibility for its own defense has also
                            been the subject of renewed speculation.</span></p><span data-dcnode-id="619" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="602"><span data-dcnode-id="618" instrument_node="">37. In support of these feelers, French officials have held out the
                            prospect in word and—to some limited extent—in deed that France might in
                            return increase its cooperation with the alliance. French military men
                            have quietly expanded their contacts with US officers assigned directly
                            to </span><span class="tei-gloss" data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">NATO</span></span><span data-dcnode-id="615" instrument_node="">, especially the regularly
                            scheduled talks with General </span><span class="tei-persName" data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Lemnitzer</span></span><span data-dcnode-id="612" instrument_node="">. Defense Minister </span><span class="tei-persName" data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Messmer</span></span><span data-dcnode-id="609" instrument_node=""> has stated that Paris is willing to undertake
                            appropriate planning for French-</span><span class="tei-gloss" data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">NATO</span></span><span data-dcnode-id="606" instrument_node="">
                            coordination of conventional forces in wartime, and a high Defense
                            Ministry of</span><a class="tei-pb1" data-dcnode-id="604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.state.gov/historicaldocuments/frus1969-76v41/pg_11" id="pg_11"><span data-dcnode-id="605" instrument_node="">[Page 11]</span></a><span data-dcnode-id="603" instrument_node="">ficial has said that
                            some coordination of nuclear forces, including targeting, might be
                            possible.</span></p><span data-dcnode-id="601" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="587"><span data-dcnode-id="600" instrument_node="">38. Nevertheless, there is no reason to believe that Paris is willing to
                            concede very much in return for nuclear help from the US. </span><span class="tei-persName" data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Messmer</span></span><span data-dcnode-id="597" instrument_node=""> has made it clear that such an
                            arrangement would be outside the formal structure of </span><span class="tei-gloss" data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">NATO</span></span><span data-dcnode-id="594" instrument_node="">, and he has stated unequivocally
                            that France would not rejoin </span><span class="tei-gloss" data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">NATO</span></span><span data-dcnode-id="591" instrument_node="">’s
                            integrated command, despite increasing pressure from the French military
                            to do so. Budgetary strictures resulting from the recent monetary crisis
                            are expected to complicate the planned coordination of French and </span><span class="tei-gloss" data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">NATO</span></span><span data-dcnode-id="588" instrument_node=""> military exercises during 1969.</span></p><span data-dcnode-id="586" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">39. In any case, a US-French nuclear deal would prove highly divisive.
                            The West German Government has leaked a steady stream of stories on the
                            possibility in order to demonstrate its concern. The smaller allies
                            would surely react negatively to any attempt to erect a new edifice of
                            nuclear defense outside the alliance.</span></p><span data-dcnode-id="583" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">German Problems</span></p><span data-dcnode-id="580" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">40. The division of Germany and the problem of isolated West Berlin will
                            also continue to impinge on alliance cohesion. Despite a subtle shift in
                            Western outlook in 1966, which effectively placed détente ahead of
                            German reunification, the allies continue to endorse the German desire
                            for national unity. The November ministerial communiqué echoed a
                            familiar litany when it proclaimed, with the support of the French, that
                            the allies “reject all claims that would tend to perpetuate the division
                            of Germany against the will of the German people.”</span></p><span data-dcnode-id="577" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="572"><span data-dcnode-id="576" instrument_node="">41. Beneath the facade of unanimity on the German question, however, the
                            depth of Western differences often emerges. The French have occasionally
                            denied that their forces would be automatically available for the
                            defense of Germany. They have also done their best to maintain a
                            distinction between </span><span class="tei-gloss" data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">NATO</span></span><span data-dcnode-id="573" instrument_node=""> and the
                            problem of Berlin, which they have steadfastly argued is the exclusive
                            concern of the three wartime allies. The rest of the alliance members
                            have generally accepted this view, although they have insisted that any
                            joint statements on Berlin be at least shown to them before
                            publication.</span></p><span data-dcnode-id="571" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="563"><span data-dcnode-id="570" instrument_node="">42. Germany’s resentment of allied indifference to its principal national
                            aspiration can complicate allied relations in numerous ways. For
                            example, London’s recent decision—after speeding up British withdrawal
                            from east of Suez—to re-emphasize its continental defense commitments
                            requires German support. In the latest </span><span class="tei-gloss" data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">NPG</span></span><span data-dcnode-id="567" instrument_node=""> meeting the Germans agreed to join with London in
                            drawing up guidelines on the use of tactical nuclear weapons by the
                            alliance—a move that serves to reinforce Britain’s identification with a
                            clearly European concern. They have also been reasonably generous in
                            meeting Britain’s offset require</span><a class="tei-pb1" data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.state.gov/historicaldocuments/frus1969-76v41/pg_12" id="pg_12"><span data-dcnode-id="566" instrument_node="">[Page 12]</span></a><span data-dcnode-id="564" instrument_node="">ments and have tolerated London’s initiative toward a European caucus
                            despite their own reservations.</span></p><span data-dcnode-id="562" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="557"><span data-dcnode-id="561" instrument_node="">43. A frustrated Germany could be expected, however, to be far less
                            cooperative than at present. Bonn’s unwillingness to challenge </span><span class="tei-persName" data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">De Gaulle</span></span><span data-dcnode-id="558" instrument_node=""> directly might well be
                            reinforced if the other Western allies should seem slow in responding to
                            West German interests. Though it is hardly likely that the Germans would
                            let their grievances jeopardize the alliance that has so long assured
                            their survival, their support for British aspirations on the continent
                            could well diminish.</span></p><span data-dcnode-id="556" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">The British Contribution</span></p><span data-dcnode-id="553" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">44. As for Britain, the pullback from east of Suez does not necessarily
                            have as a corollary an expanded military input into the alliance.
                            Despite an expected realignment of forces in the Mediterranean, the
                            army’s strength in Europe will not increase, and the Royal Air Force of
                            the 1970s will be hard-pressed to assume a much larger role than at
                            present. By 1970, when London intends to have demobilized more than
                            75,000 men, its armed forces will quite possibly rank fifth in size in
                            Western Europe.</span></p><span data-dcnode-id="550" instrument_node="">
</span><p class="tei-p2" data-dcnode-id="545"><span data-dcnode-id="549" instrument_node="">45. These slashes will discount Britain’s credit as an ally and advocate
                            of a stronger Europe. Several political factors could, however, offset
                            these consequences. Well aware of its tenuous standing as a “European
                            power,” Britain has sponsored various proposals for developing a
                            European identity and has sought to exploit bilateral contacts with
                            continental governments to improve its image as a “good European.”
                            Whether or not these efforts get Britain into the Common Market any time
                            soon, they serve tangentially to further </span><span class="tei-gloss" data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">NATO</span></span><span data-dcnode-id="546" instrument_node=""> solidarity, which in turn strengthens the affinity
                            between Britain and Europe. In the long term, Britain’s fresh
                            concentration on strictly European defense matters may serve to promote
                            not only its own stake in Europe’s future, but also the development of
                            the alliance into a more viable organization, combining a continued US
                            guarantee with a much enhanced European role.</span></p><span data-dcnode-id="544" instrument_node="">
</span></div><span data-dcnode-id="542" instrument_node="">

</span><li class="footnote" data-dcnode-id="496" id="fn:1.5.4.4.8.9.22.8" value="3"><span class="fn-content" data-dcnode-id="499"><span data-dcnode-id="509" instrument_node="">Reference is to Soviet claims to a right to
                                intervene in the internal affairs of Bloc states. The </span><span class="tei-persName" data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Brezhnev</span></span><span data-dcnode-id="506" instrument_node=""> Doctrine was originally
                                set out by Soviet Communist Party spokesman Sergei Kovalev in a
                                September 26, 1968, </span><span class="tei-hi1 font-italic" data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Pravda</span></span><span data-dcnode-id="503" instrument_node=""> article,
                                “Sovereignty and Internationalist Obligations of Socialist
                                Countries.” A translation is printed in </span><span class="tei-hi1 font-italic" data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Current
                                    Digest of the Soviet Press,</span></span><span data-dcnode-id="500" instrument_node=""> volume XX, number 39 (October
                                16, 1968), pp. 10–12.</span></span><a class="fn-back" data-dcnode-id="497" href="#fnref:1.5.4.4.8.9.22.8"><span data-dcnode-id="498" instrument_node="">↩</span></a></li><span data-dcnode-id="495" instrument_node="">
</span><li class="footnote" data-dcnode-id="490" id="fn:1.5.4.4.8.9.24.2" value="4"><span class="fn-content" data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">The invading “five”
                                refers to the Soviet Union, East Germany, Poland, Hungary, and
                                Bulgaria. Romania did not participate in the Warsaw Pact
                                invasion.</span></span><a class="fn-back" data-dcnode-id="491" href="#fnref:1.5.4.4.8.9.24.2"><span data-dcnode-id="492" instrument_node="">↩</span></a></li><span data-dcnode-id="489" instrument_node="">
</span><li class="footnote" data-dcnode-id="463" id="fn:1.5.4.4.8.9.30.4" value="5"><span class="fn-content" data-dcnode-id="466"><span data-dcnode-id="488" instrument_node="">At the
                                December 1966 </span><span class="tei-gloss" data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">NATO</span></span><span data-dcnode-id="485" instrument_node=""> Ministerial
                                meeting, the </span><span class="tei-gloss" data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">NAC</span></span><span data-dcnode-id="482" instrument_node=""> adopted a
                                resolution proposed by </span><span class="tei-persName" data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Pierre
                                    Harmel</span></span><span data-dcnode-id="479" instrument_node="">, the Belgian Foreign Minister, to analyze
                                international developments since the creation of </span><span class="tei-gloss" data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">NATO</span></span><span data-dcnode-id="476" instrument_node=""> in 1949 and determine ways to
                                strengthen the alliance. This study, known as the </span><span class="tei-persName" data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Harmel</span></span><span data-dcnode-id="473" instrument_node=""> Exercise, culminated in the
