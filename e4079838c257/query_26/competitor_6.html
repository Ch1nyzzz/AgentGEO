</span><center data-dcnode-id="1161"><h1 data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node=""> Col. Declan O'Carroll, President 2009-2012</span></h1></center><span data-dcnode-id="1160" instrument_node="">
</span><br data-dcnode-id="1159"><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">The 36th President of the County Donegal Historical Society is Col. Declan O'Carroll, a native of Bundoran who now, resides in Letterkenny. He served in the Defence Forces for 42 years before retiring in 2005 in the rank of Colonel.</span></p><span data-dcnode-id="1155" instrument_node="">
</span><center data-dcnode-id="1153"><img data-dcnode-id="1154" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/declan.jpg&amp;raw"></center><span data-dcnode-id="1152" instrument_node="">
</span><br data-dcnode-id="1151"><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Declan joined the Army as a Cadet in 1963 and was commissioned into the 6 Inf Bn in Custume Barracks, Athlone in 1965. He was posted to Donegal at the outbreak of the conflict in Northern Ireland in 1969 and served in a variety of appointments with the 24 Inf Bn FCA and the 28 Inf Bn within the county. He later had the honour and distinction of commanding both battalions.</span></p><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Declan moved to Defence Forces HQ., in Dublin when he was promoted to Lt. Col and was appointed Director of Public Relations for the Defence Forces. In 1998 he returned to Donegal as Officer Commanding  28 Inf Bn in Finner Camp until 2001.</span></p><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">During his career he served with the United Nations in Cyprus, Lebanon, Israel, Syria on the Golan Heights and finally in Croatia in 1996.</span></p><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">On promotion to Col. in 2001 Declan became Director of Administration in Defence Forces HQ., Dublin. Following a year in that appointment he finished his military career in as head of the Irish Military Office on the Partnership for Peace programme at NATO HQ.in Brussels for over three years from 2002-2005.</span></p><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Col. O'Carroll played Gaelic football for Donegal (1961-1974) and was a member of the first Donegal team to win an Ulster Championship in 1972. He is the holder of two Railway Cup medals with Ulster.</span></p><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">An enthusiastic local historian, our President has written and published histories of Finner Camp Ballyshannon, Rockhill Ho. Letterkenny, Fort Dunree, the Battle of Scarrifollis 1650 and a biography of Lt Col James McMonagle as well as being a regular contributor on historical matters to the DHS Annual and the Letterkenny Community Christmas annual.</span></p><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">He is married to Eleanor with three adult children Emma, John and David.</span></p><br data-dcnode-id="1129"><br data-dcnode-id="1128"><hr data-dcnode-id="1127"><br data-dcnode-id="1126"><span data-dcnode-id="1125" instrument_node="">
</span><p align="center" data-dcnode-id="1122"><font data-dcnode-id="1123" size="6"><span data-dcnode-id="1124" instrument_node="">2011 Events</span></font></p><br data-dcnode-id="1121"><hr data-dcnode-id="1120"><br data-dcnode-id="1119"><span data-dcnode-id="1118" instrument_node="">
</span><h1 data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">FIELD DAY AT DOE (Sept. 4th)</span></h1><br data-dcnode-id="1115"><br data-dcnode-id="1114"><span data-dcnode-id="1113" instrument_node="">


"The great McSwyne lies buried</span><br data-dcnode-id="1112"><span data-dcnode-id="1111" instrument_node="">
Without the castle wall,</span><br data-dcnode-id="1110"><span data-dcnode-id="1109" instrument_node="">
And silent gloom pervades each room</span><br data-dcnode-id="1108"><span data-dcnode-id="1107" instrument_node="">
Beneath those turrets tall."</span><br data-dcnode-id="1106"><br data-dcnode-id="1105"><p align="left" data-dcnode-id="1100"><span data-dcnode-id="1104" instrument_node="">

That opening verse of a poem called, "Doe Castle" reminded us that we were in McSwyne Doe territory for our last Field Day of 2011 with Tom Sweeney, Chieftain of the clann, as our guide.</span><br data-dcnode-id="1103"><br data-dcnode-id="1102"><span data-dcnode-id="1101" instrument_node="">
</span></p><center data-dcnode-id="1096"><img data-dcnode-id="1099" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/doecastle.JPG&amp;raw"><br data-dcnode-id="1098"><span data-dcnode-id="1097" instrument_node="">
Members of the Donegal Historical Society at Doe Castle.</span></center><br data-dcnode-id="1095"><br data-dcnode-id="1094"><p align="left" data-dcnode-id="1083"><span data-dcnode-id="1093" instrument_node="">

The solitude and peace to be found in the castle environs these days are in complete contrast to 6 centuries of its history, its prime location overlooking Sheephaven Bay, a few kilometres from Creeslough. It was constructed c.1425AD and reputedly given to the McSwyne clann when peace was made between Owen O'Neill, Prince of Tyrone and Nachtan O'Donnell, Prince of Tirconaill.. Many a tenant lived there down through the centuries, including Sir Henry Dowcra  in 1603.</span><br data-dcnode-id="1092"><br data-dcnode-id="1091"><span data-dcnode-id="1090" instrument_node="">

In more recent times, the Office of Public Works undertook the task of preserving the castle against one of the most powerful forces of them all - Mother Nature. McSwyne's famous tombstone has been moved inside and protected within a strong glass container.</span><br data-dcnode-id="1089"><br data-dcnode-id="1088"><span data-dcnode-id="1087" instrument_node="">

In popular folklore, the castle has been immortalised by the Creeslough poet, Niall MacGiolla Bhride, taking as his theme the romance between Turlough Og O'Boyle and Aileen McSweeney, a romance that ended in tragedy. The local sean-nos singer, Denis Sweeney, gave a wonderful rendition of some local songs in one of the rooms of the castle, the light rain falling at the time adding to the atmosphere.</span><br data-dcnode-id="1086"><br data-dcnode-id="1085"><span data-dcnode-id="1084" instrument_node="">
</span></p><center data-dcnode-id="1079"><img data-dcnode-id="1082" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/sweeneys.jpg&amp;raw"><br data-dcnode-id="1081"><span data-dcnode-id="1080" instrument_node="">
Our President, Col. Declan McCarrol, Denis Sweeney, sean-nós singer and Tom Sweeney, guide for the day.</span></center><br data-dcnode-id="1078"><br data-dcnode-id="1077"><p align="left" data-dcnode-id="1073"><span data-dcnode-id="1076" instrument_node="">

The group then made their way to Ards friary. A welcome sight to conclude the event was the tea and refreshments in the Creeslough community centre. Thanks to all involved for a most pleasant visit despite the weather.</span><br data-dcnode-id="1075"><br data-dcnode-id="1074"></p><hr data-dcnode-id="1072"><br data-dcnode-id="1071"><br data-dcnode-id="1070"><span data-dcnode-id="1069" instrument_node="">
</span><h1 data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">FIELD DAY IN PORTHALL  (August 14th 2011)</span></h1><br data-dcnode-id="1066"><br data-dcnode-id="1065"><p align="left" data-dcnode-id="1039"><span data-dcnode-id="1064" instrument_node="">
</span><b data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Cavanacor House</span></b><span data-dcnode-id="1061" instrument_node="">, near Lifford, one of the earliest Plantation houses in Donegal was our meeting point for the August Field Day. It has been in continuous occupation since the 17th century and we were welcomed by the present occupants - Eddie and Joanna O'Kane.  A book could be written on its history; no room here for such but hopefully a few snippets will suffice. </span><br data-dcnode-id="1060"><br data-dcnode-id="1059"><span data-dcnode-id="1058" instrument_node="">

In 1689 King James 2nd dined at Cavanacor House prior to the Siege of Derry. The house has a commanding view of the River Deele, a main fording point for east Donegal, so it was obviously a perfect venue to combine military vigilance with culinary enjoyment! </span><br data-dcnode-id="1057"><br data-dcnode-id="1056"><span data-dcnode-id="1055" instrument_node="">

A former resident and who was also  born at the house, Magdalene Tasker,  married a Capt. Pollock. Both emigrated to Maryland, abbreviated their surname to Polk and one of their descendants - James Knox Polk - became 11th President of the USA. </span><br data-dcnode-id="1054"><br data-dcnode-id="1053"><span data-dcnode-id="1052" instrument_node="">

Eddie gave us a conducted tour of the rooms of the house open to the public. Understandably, no interior photography was permitted as it is fundamentally a family home. Joanna then showed us around the adjacent art gallery and informed us of the artists, their works and achievements.</span><br data-dcnode-id="1051"><br data-dcnode-id="1050"><span data-dcnode-id="1049" instrument_node="">

Next stop was the </span><b data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Ulster Scots - Scots Irish Heritage and Education Centre </span></b><span data-dcnode-id="1046" instrument_node="">at Monreagh, Carrigans. This is a restored 19th century manse. Brendan, our guide, explained who the Ulster Scots were, a story which goes also back to the Plantation. The Centre contains a wealth of information on the Ulster Scots and Scots Irish and also their extended influences in the new world and is committed to preserving the rich heritage of the Laggan district of east Donegal.
</span><br data-dcnode-id="1045"><br data-dcnode-id="1044"><span data-dcnode-id="1043" instrument_node="">
The day ended here with welcome refreshments and it was such a large turn-out that at both venues we were split into groups of 20 to facilitate the tours. </span><br data-dcnode-id="1042"><br data-dcnode-id="1041"><span data-dcnode-id="1040" instrument_node="">
</span></p><center data-dcnode-id="141"><img data-dcnode-id="1038" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/cav.jpg&amp;raw"><br data-dcnode-id="1037"><span data-dcnode-id="1036" instrument_node="">
Cavanacor House
</span><center data-dcnode-id="1032"><img data-dcnode-id="1035" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/mon.jpg&amp;raw"><br data-dcnode-id="1034"><span data-dcnode-id="1033" instrument_node="">
The Heritage Centre at Moneagh</span></center><br data-dcnode-id="1031"><br data-dcnode-id="1030"><span data-dcnode-id="1029" instrument_node="">
</span><br data-dcnode-id="1028"><br data-dcnode-id="1027"><hr data-dcnode-id="1026"><br data-dcnode-id="1025"><br data-dcnode-id="1024"><span data-dcnode-id="1023" instrument_node="">
</span><h1 data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">CARROWMENAGH FIELD DAY (July 10th  2011) </span></h1><br data-dcnode-id="1020"><br data-dcnode-id="1019"><p align="left" data-dcnode-id="1014"><span data-dcnode-id="1018" instrument_node="">

Carrowmenagh, near Culdaff, on the Inishowen peninsula, is a townland abundant in heritage, steeped in history and with a very strong community spirit. Local historian, John A. McLaughlin was our guide for the occasion.</span><br data-dcnode-id="1017"><br data-dcnode-id="1016"><span data-dcnode-id="1015" instrument_node="">
</span></p><center data-dcnode-id="1012"><img data-dcnode-id="1013" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/2011fd2a.jpg&amp;raw"></center><br data-dcnode-id="1011"><br data-dcnode-id="1010"><p align="left" data-dcnode-id="996"><span data-dcnode-id="1009" instrument_node="">

The Community Centre, for example where our day began, is a former National School erected 90 years ago; most of the original building is still intact, even the old wall maps! Nevertheless, it is a well-maintained structure with all mod cons, as they say, and in use every night of the week.</span><br data-dcnode-id="1008"><br data-dcnode-id="1007"><span data-dcnode-id="1006" instrument_node="">

This small part of Inishowen knew the pain of evictions. Our first stop was the Garden of Remembrance where in December 1881 stood a house whose tenants were the victims of that awful deed. The gable and chimney brace are still there - a sad and poignant reminder of what was once a vibrant homestead. Twelve other families in the locality suffered the same fate.</span><br data-dcnode-id="1005"><br data-dcnode-id="1004"><span data-dcnode-id="1003" instrument_node="">

Two strands featured on our programme. Tremone strand has a plaque to the memory of Thomas D'Arcy McGee (1825-1868), the Young Irelander who escaped at Tremone Bay and went to Canada, where he played a leading role in that country's Confederation history. The stone was unveiled by the Canadian Ambassador, Mr. Michael Philips, in August 1998.</span><br data-dcnode-id="1002"><br data-dcnode-id="1001"><span data-dcnode-id="1000" instrument_node="">

Kinnagoe Bay, spectacular from our elevated viewpoint, was the landing place in 1688 of La Trinidad Valencera. The wreck of this magnificent ship and many of her contents were discovered in 1971 by the City of Derry sub-aqua club. Amazingly, 350 Spaniards survived the shipwreck and reached shore.</span><br data-dcnode-id="999"><br data-dcnode-id="998"><span data-dcnode-id="997" instrument_node="">
</span></p><center data-dcnode-id="994"><img data-dcnode-id="995" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/2011fd2c.jpg&amp;raw"></center><br data-dcnode-id="993"><br data-dcnode-id="992"><p align="left" data-dcnode-id="987"><span data-dcnode-id="991" instrument_node="">

One of the final stops was the old threshing mill with its working machinery and we had a most enjoyable demonstration of it in action. Also shown was the skill of making straw ropes. What a joy it is to see these skills being kept alive and promoted in their original location.</span><br data-dcnode-id="990"><br data-dcnode-id="989"><span data-dcnode-id="988" instrument_node="">
</span></p><center data-dcnode-id="985"><img data-dcnode-id="986" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/2011fd2b.jpg&amp;raw"></center><br data-dcnode-id="984"><br data-dcnode-id="983"><p align="left" data-dcnode-id="975"><span data-dcnode-id="982" instrument_node="">

The above is a selection of the many stops made on our itinerary. The occasion ended back in at the Centre with lashins of tea, sandwiches and buns followed with some musical entertainment from the younger generation. In conclusion, our President, Col. Declan O'Carroll thanked everyone who made us so welcome and organised our visit.</span><br data-dcnode-id="981"><br data-dcnode-id="980"><span data-dcnode-id="979" instrument_node="">

</span><p data-dcnode-id="888"><font data-dcnode-id="889" size="5"><span data-dcnode-id="890" instrument_node="">Emerson Lecture</span></font></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="886" instrument_node="">
</span><br data-dcnode-id="885"><span data-dcnode-id="884" instrument_node="">
</span><b data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Wed. Nov. 10th</span></b><span data-dcnode-id="881" instrument_node=""> -&nbsp; 
		</span></p><p data-dcnode-id="875"><span data-dcnode-id="879" instrument_node="">
		A large and representative crowd attended the Annual Emerson lecture in 
		Coláiste Cholmcille Ballyshannon recently. Mr. Anthony Begley, Museum 
		Curator, welcomed the attendance to the fourth annual lecture organised 
		by County Donegal Historical Society, in memory of Kathleen and Louis 
		Emerson who had contributed so much to the development of local studies 
		in County Donegal. The guest lecturer was Mr. Michael MacDonagh, Senior 
		Archaeologist with the National Roads Authority (NRA), who had been in 
		charge of the Ballyhanna excavations before the construction of the 
		Ballyshannon-Bundoran By-Pass. The title of his lecture was: 
		“Ballyhanna- The Story of a Lost Church and its People.” Thanking the 
		Society for the invitation, Mr MacDonagh expressed his honour at 
		delivering a talk dedicated to the memory of the Emersons, reminiscing 
		on Lucius’ delight upon the discovery of the site back in 2003. Setting 
		the important archaeological discovery within its landscape setting, 
		Michael explained the importance of Ballyhanna townland in the life of 
		medieval Ballyshannon. The townland had been at the strategic fording 
		point across the Erne River and Ballyshannon would have been a bustling 
		town throughout the medieval centuries, its port facilities and salmon 
		fisheries being of huge economic importance. The fording point of </span><i data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Ath 
		Seanaigh</span></i><span data-dcnode-id="876" instrument_node=""> was the only safe crossing point on the&nbsp;western reaches of 
		the Erne into the kingdom of Tyrconnell. </span></p><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="866"><span data-dcnode-id="873" instrument_node="">
			
			The discovery of a medieval church and graveyard at Ballyhanna, one 
			of the largest such sites ever excavated in Ireland, was remarkable, 
			explained Michael, and it was somewhat surprising that its existence 
			had fallen out of folk memory. It was explained that this may have 
			been due to it having been walled off behind the estate walls of 
			Rockville House in the 17</span><sup data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">th</span></sup><span data-dcnode-id="870" instrument_node=""> century. Once out of sight, 
			it became out of mind, and over time memory of it faded. Historical 
			documents from the 17</span><sup data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">th</span></sup><span data-dcnode-id="867" instrument_node=""> century refer to a chapel of ease 
			at Ballyhanna under the administration of the diocese of Clogher and 
			Michael explained that it is now believed that this is the site that 
			was discovered</span></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="864" instrument_node="">
</span><br data-dcnode-id="863"><span data-dcnode-id="862" instrument_node="">
</span><br data-dcnode-id="861"><span data-dcnode-id="860" instrument_node="">
&nbsp;</span></p><hr data-dcnode-id="858"><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="846"><br data-dcnode-id="856"><br data-dcnode-id="855"><span data-dcnode-id="854" instrument_node="">
</span><font data-dcnode-id="852" size="5"><span data-dcnode-id="853" instrument_node="">Mairéad</span></font><font data-dcnode-id="850" size="5"><span data-dcnode-id="851" instrument_node=""> Ní Mhaoinigh launches this year's "Donegal Annual."</span></font><br data-dcnode-id="849"><br data-dcnode-id="848"><span data-dcnode-id="847" instrument_node="">
 
Donegal Person of the year, Mairéad Ní Mhaoinigh, launched this year's "Donegal Annual", the Journal of the County Donegal Historical Society,&nbsp; 
	in Jackson's Hotel, Ballybofey on 2nd of November last. It was a lovely 
	evening crowned by Mairéad ending the launch by playing a few of Johnnie 
	Doherty's reels.</span></p><span data-dcnode-id="845" instrument_node="">
</span><p align="center" data-dcnode-id="842"><span data-dcnode-id="844" instrument_node="">
</span><img border="0" data-dcnode-id="843" height="336" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/MNM1.jpg&amp;raw" width="504"></p><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">&nbsp;</span></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="837" instrument_node="">Once again edited by Sean Beattie, this edition contains 20 main articles and a wealth of other material, including book reviews, books about Donegal published in 2010,  and a detailed account of the proceedings of the Society. The scope of the articles is wide and varied, ranging from the Donegal Militia and the 1798 Rebellion, the history of Freemasonry in Donegal to a contemporary article about Donegal and the N.I. conflict.</span><br data-dcnode-id="836"><br data-dcnode-id="835"><span data-dcnode-id="834" instrument_node="">
 
November 1947 was the date the first Annual appeared and it has been in print ever since, a truly remarkable achievement. From small beginnings at the inaugural meeting in the County House, Lifford in December 1946, today the Society has over 900 members across the world. Many of them plan a visit to Donegal each Summer in order to take part in at least one of the four Field Days. A very poignant and emotional Field Day this year was our very first one and we went out to Arranmore Island to remember the Arranmore disaster which happened 75 years ago.  Keeping in touch with all the members these days is so much easier than it was back in the 1940's as the Society has a website at www.donegalhistory.com. Every event of the Society is featured there. (This website will be revamped over the next few months).</span><br data-dcnode-id="833"><br data-dcnode-id="832"><span data-dcnode-id="831" instrument_node="">
 
The Donegal Historical Society also works in conjunction with local historical and heritage groups throughout the county, something that can only be of mutual benefit to us all. The invitation is always there to any newly formed group to contact us. Our aims and objectives are similar; our Constitution sums it up as follows, "the study and preservation of the historical antiquities of County Donegal." </span><br data-dcnode-id="830"><br data-dcnode-id="829"><span data-dcnode-id="828" instrument_node="">
 
			President of the Society, Col. Declan O'Carroll says, "If you are 
			considering a Christmas gift for relatives and friends in Ireland or 
			overseas, then this is the perfect choice." The Annual is available 
			from the Secretary and in bookshops across the county. </span><br data-dcnode-id="827"><br data-dcnode-id="826"><span data-dcnode-id="825" instrument_node="">
</span></p><span data-dcnode-id="823" instrument_node="">

</span><a data-dcnode-id="820" name="coach"></a><span data-dcnode-id="819" instrument_node="">
</span><h1 data-dcnode-id="815"><span data-dcnode-id="816" style="font-weight: 400"><font data-dcnode-id="817" size="5"><span data-dcnode-id="818" instrument_node="">2010 Coach Outing</span></font></span></h1><span data-dcnode-id="814" instrument_node="">
</span><div class="descr" data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">3-day trip to Glendalough</span></div><span data-dcnode-id="811" instrument_node="">
</span><center data-dcnode-id="809"><img data-dcnode-id="810" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/glendalough.jpg&amp;raw"></center><span data-dcnode-id="808" instrument_node="">
</span><br data-dcnode-id="807"><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Members of the Donegal Historical Society in Glendalough during the 2010  coach outing.</span></p><span data-dcnode-id="803" instrument_node="">
</span><br data-dcnode-id="802"><span data-dcnode-id="801" instrument_node="">
</span><center data-dcnode-id="799"><img data-dcnode-id="800" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/cavan.jpg&amp;raw"></center><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Members of the Donegal Historical Society at Cavan County Museum during the 2010  coach outing.</span></p><span data-dcnode-id="795" instrument_node="">
</span><br data-dcnode-id="794"><hr data-dcnode-id="793"><br data-dcnode-id="792"><span data-dcnode-id="791" instrument_node="">
</span><font data-dcnode-id="789" size="5"><span data-dcnode-id="790" instrument_node="">Arranmore</span></font><font data-dcnode-id="787" size="5"><span data-dcnode-id="788" instrument_node=""> Field Day 2010</span></font><br data-dcnode-id="786"><span data-dcnode-id="785" instrument_node="">
</span><center data-dcnode-id="783"><img data-dcnode-id="784" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/Arainn1.jpg&amp;raw"></center><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="781" instrument_node="">Members of the Donegal Historical Society at grave of some of the victims of the 1935 boat tragedy during the Arannmore Island Field Day. </span><br data-dcnode-id="780"><br data-dcnode-id="779"><span data-dcnode-id="778" instrument_node="">

Our first Field Day of 2010 was one of poignant and sad remembrance as we recalled the Arranmore disaster in this the 75th anniversary of that awful tragedy. For any emigrant, homecoming is the most joyful emotion, an experience shared by the entire family at home waiting with anticipation and excitement. What presents from Glasgow would be in their suitcases?  What football matches had they been to and would relate to their their younger siblings? What films did they enjoy seeing in Scotland? </span><br data-dcnode-id="777"><br data-dcnode-id="776"><span data-dcnode-id="775" instrument_node="">

On Saturday evening, November 9th 1935, 19 islanders perished in the sea just off Arranmore on the last leg of their homeward journey, having spent the previous months tattie-hoking (harvesting potatoes) in Scotland. There was just one survivor, Patrick Gallagher. "The whole island was weeping," wrote Barney Gallagher in his book, 'Arranmore Links' . Barney was an islander and was there at the time. </span><br data-dcnode-id="774"><br data-dcnode-id="773"><span data-dcnode-id="772" instrument_node="">
  
Our Field Day began in the Ionad Culturlann, part of the island co-operative's holiday village, with an illustrated talk by Seán Boner about the disaster. We then walked the short distance to the graveyard to visit the mass grave in which 17 of the victims lie buried. Its location is close to the Chapel strand, the mainland in the distance and numerous islands in between. Sadly, not all the bodies were recovered. </span><br data-dcnode-id="771"><br data-dcnode-id="770"><span data-dcnode-id="769" instrument_node="">
   
We strolled from there along a path close to the shore, past the old graveyard they call 'the Caiseal' which brought us to St. Crone's, the beautiful island church and inside Seán gave us a brief history of the church. It was built in 1825 as a barn style church but extended into a cruciform structure in 1917. We were then bussed to the lighthouse, originally built in 1798, and we were fortunate to be able to enter and climb up the narrow spiral staircase to experience a truly magnificent view. Some of the more intrepid of the group went down a few of the cliff steps, certainly not an experience for the faint-hearted. </span><br data-dcnode-id="768"><br data-dcnode-id="767"><span data-dcnode-id="766" instrument_node="">
  
Finally, on to the Glen Hotel for another very welcome view - copious amounts of tea and sandwiches! The hotel itself is steeped in history; it was once the home or 'The Big House' of the island landlord, John Stoupe Charley and the building, on a slight rise overlooking the sea, still retains its old-world atmosphere. </span><br data-dcnode-id="765"><br data-dcnode-id="764"><span data-dcnode-id="763" instrument_node="">
   
The highest degree of thanks is extended to everyone on Arranmore who made the Field Day so memorable: the staff we met at the Coop, on the Siob buses, up at the lighthouse, at the Glen Hotel and on the fast ferry. And of course, a special word of thanks to Seán Boner, our guide and seanchai for the occasion, himself a native of Arranmore and whose father Packie taught for many years at Aphort school.. </span></p><span data-dcnode-id="761" instrument_node="">
</span><br data-dcnode-id="760"><hr data-dcnode-id="759"><br data-dcnode-id="758"><span data-dcnode-id="757" instrument_node="">
</span><font data-dcnode-id="755" size="5"><span data-dcnode-id="756" instrument_node="">FIELD DAY AT GARTAN </span></font><span data-dcnode-id="754" instrument_node=""> </span><br data-dcnode-id="753"><br data-dcnode-id="752"><span data-dcnode-id="751" instrument_node="">
   
St. Colmcille, (521AD - 597AD)  one of Ireland's greatest saints was born at Gartan, baptised in Templedouglas and first went to school in Kilmacrennan. For our second Field Day of 2010, Christy Gillespie, Principal of Schoil Cholmcille, An Tearmann, was our guide as we sojourned, "in Colmcille's footsteps." </span><br data-dcnode-id="750"><br data-dcnode-id="749"><span data-dcnode-id="748" instrument_node="">
</span><center data-dcnode-id="746"><img data-dcnode-id="747" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/Christy.jpg&amp;raw"></center><br data-dcnode-id="745"><br data-dcnode-id="744"><span data-dcnode-id="743" instrument_node="">

The first stop en route was the newly-constructed Columban monument near the National School, modelled on the abbey at Kilmacrennan. Here we were shown the famous mitred head, said to represent Archbishop Art O'Friel.  This is a stone with an absolute wealth of history behind it, eg,  it would have witnessed the inauguration of Red Hugh O'Donnell. 
</span><br data-dcnode-id="742"><br data-dcnode-id="741"><span data-dcnode-id="740" instrument_node="">
</span><center data-dcnode-id="738"><img data-dcnode-id="739" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/mitredhead%2520.jpg&amp;raw"></center><span data-dcnode-id="737" instrument_node="">
</span><br data-dcnode-id="736"><br data-dcnode-id="735"><span data-dcnode-id="734" instrument_node="">
One of the most poignant moments of the Field Day was the visit to Ethne's Well (Ethne was Colmcille's mother). On the path up to the well, there is a child's burial ground, marked on the old maps as the Calluragh burial ground. This was the era when babies who died before they received the Sacrament of Baptism were buried close to a sacred place. This site used to be packed on June 9th each year, Colmcille's feast-day, for a turas. Sadly, that lovely old tradition has long gone. </span><br data-dcnode-id="733"><br data-dcnode-id="732"><span data-dcnode-id="731" instrument_node="">
   
Then on to Rath Cno, once the home of Colmcille.  Later a monastery was erected on the site. In the nearby graveyard, Christy showed us the grave of Manus a Phice (Manus the Pikeman), a great hero of 1798. </span><br data-dcnode-id="730"><br data-dcnode-id="729"><span data-dcnode-id="728" instrument_node="">
</span><center data-dcnode-id="726"><img data-dcnode-id="727" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/RathCno.jpg&amp;raw"></center><br data-dcnode-id="725"><br data-dcnode-id="724"><span data-dcnode-id="723" instrument_node="">
   
The final two venues were Doon Well, probably the most famous holy well in Donegal, and then on to Doon rock with its wonderful panoramic view, once the place of inauguration of each new O'Donnell chieftain. From here, they could survey their entire kingdom from the Swilly to Gweedore. Cahir O'Doherty made his last stand here at Doon to try and keep the Irish way of life alive after the Flight of the Earls, but without success. </span><br data-dcnode-id="722"><br data-dcnode-id="721"><span data-dcnode-id="720" instrument_node="">
   


The  Gartan district is truly spectacular and has been fairly-well spared the concrete intrusion that unfortunately has been the fate of other rural havens. This Field Day complemented the one in Derry last year, with Dr. Billy Kelly as our guide, as we toured the city named in the saint's honour - Doire Cholmcille. </span><br data-dcnode-id="719"><hr data-dcnode-id="718"><br data-dcnode-id="717"><span data-dcnode-id="716" instrument_node="">
</span><font data-dcnode-id="714" size="5"><span data-dcnode-id="715" instrument_node="">FIELD DAY IN DOOCHARY</span></font><span data-dcnode-id="713" instrument_node="">, August 2010</span><br data-dcnode-id="712"><br data-dcnode-id="711"><span data-dcnode-id="710" instrument_node="">
 
Beside the placid waters of the Gweebara river, Col. Declan O'Carroll, President of the Donegal Historical Society, introduced our guide for the occasion, Mrs. May McClintock, one of the best-known and most erudite historians in the county. We were soon to discover that Doochary may be a small quiet village but it has a wealth of history.</span><br data-dcnode-id="709"><span data-dcnode-id="708" instrument_node="">
</span><center data-dcnode-id="706"><img data-dcnode-id="707" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/doohary3.jpg&amp;raw"></center><br data-dcnode-id="705"><span data-dcnode-id="704" instrument_node="">
The Placid river at Doochary </span><br data-dcnode-id="703"><br data-dcnode-id="702"><span data-dcnode-id="701" instrument_node="">

May began with a detailed account of the era of landlordism in the vicinity - Marquis Conyngham owned land on the southern bank of the tidal part of the Gweebara estuary. In 1906, a large number of locals fished the estuary in tidal waters below the bridge in order to enact a legal test case.
Conyngham brought the case to court, as he had to, if he believed he could control the estuary fishing which he had been doing up to then. The lower court found in his favour but the High Court reversed on appeal.</span><br data-dcnode-id="700"><span data-dcnode-id="699" instrument_node="">
Historically, the legalities are utterly fascinating, though quite complex, and one of the central issues was when the Magna Carta of  1215 AD was first applied to Donegal. It was argued that it applied in SE Ireland soon after its completion but was not applied to the Doochary district until 1541 AD when Manus O'Donnell surrendered his lands to King Henry 8th and then had them regranted back to him. The Doochary case held that the notion of a private fishery did not exist under Brehon law and, that being so, the fishery belonged to the State and so could not be granted to Conyngham's predecessor under a Plantation Grant or Patent of the 1670's.</span><br data-dcnode-id="698"><span data-dcnode-id="697" instrument_node="">
 May then paid tribute to a Doochary native, Dominic O'Kelly (1897 - 1970), a poet, teacher and journalist, also known by his pseudonym, "An Ceallach." He was May's teacher in the Prior School in Lifford  and she informed us that her appreciation of the history and folklore of Donegal was due to his influence. Dominic was educated at St. Eunan's College, Letterkenny and later in Rome, where he obtained a degree in Philosophy. A native Irish speaker, he wrote for several Irish language publications, eg Amarach, Inniu, and An tUltach. and did a weekly column in the People's Press for some years on "Wild West Donegal." He was Principal of schools in Donegal, Sligo and Mayo. In 1934 he founded Cumann Gaelach na Rossan.</span><br data-dcnode-id="696"><span data-dcnode-id="695" instrument_node="">
Peadar O'Baoighill then gave us a wonderful rendition of, "Gaoth Barra na dTonn", written by Donall MacDiarmada, also known as File Ghaoth Barra."  This song has been recorded by many musicians down through the years including Clannad.</span><br data-dcnode-id="694"><span data-dcnode-id="693" instrument_node="">
We then walked the short distance to a local holy well, Tobar Sorcha, and from there to St. Conall's Church. This Church was built in 1896 and still has the book presented by Lord Mayo, the local landlord, for the opening ceremony - St Patrick's Day, 1897. Dr. Patrick O'Donnell, Bishop of Raphoe officiated at the occasion.</span><br data-dcnode-id="692"><span data-dcnode-id="691" instrument_node="">
</span><center data-dcnode-id="689"><img data-dcnode-id="690" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/doohary2.JPG&amp;raw"></center><br data-dcnode-id="688"><span data-dcnode-id="687" instrument_node="">
St. Conal's Church. </span><br data-dcnode-id="686"><br data-dcnode-id="685"><span data-dcnode-id="684" instrument_node="">
Mr. J.C.T. MacDonagh of Ballybofey was the Society's founder; he became President of the Society in 1958/59. His son, Terence, who now resides in England, and his daughter Etta, who resides in the USA were in Doochary for the Field Day. They expressed their utmost appreciation of the sterling work being done to continue the work and aspirations of the Society's founders which began at that first meeting in Lifford in December 1946.</span><br data-dcnode-id="683"><span data-dcnode-id="682" instrument_node="">
</span><center data-dcnode-id="680"><img data-dcnode-id="681" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/doohary1.JPG&amp;raw"></center><br data-dcnode-id="679"><span data-dcnode-id="678" instrument_node="">
L to R, Terence MacDonagh, May McClintock,Rev.  Dr. O'Baoighill, Col. Declan O'Carroll &amp; Etta MacDonagh-Dumler</span><br data-dcnode-id="677"><br data-dcnode-id="676"><hr data-dcnode-id="675"><span data-dcnode-id="674" instrument_node="">
</span><font data-dcnode-id="672" size="5"><span data-dcnode-id="673" instrument_node="">FIELD DAY IN BALLYSHANNON</span></font><span data-dcnode-id="671" instrument_node="">  (August 29th)</span><br data-dcnode-id="670"><br data-dcnode-id="669"><span data-dcnode-id="668" instrument_node="">
 
"William Allingham country" was the theme of our last Field Day of 2010 and Ballyshannon our destination.</span><br data-dcnode-id="667"><span data-dcnode-id="666" instrument_node="">
 
Anthony Begley acted as our guide for this occasion; this was a subject very close to his heart - understandably, of course, both being natives of the town.</span><br data-dcnode-id="665"><br data-dcnode-id="664"><span data-dcnode-id="663" instrument_node="">
 
We visited many of the places associated with the poet and the town is fortunate in that most of them are still extant (especially when one must consider that he was born in 1824).</span><br data-dcnode-id="662"><br data-dcnode-id="661"><span data-dcnode-id="660" instrument_node="">

 
 
The poet began his working life in the Provincial Bank and so we stopped opposite there to view it and then strolled a short distance to his birth-place on the Mall. At each stop, Conor Carney, a local school Principal, recited extracts from his poetry and this contributed immensely to our appreciation of his literary skill.</span><br data-dcnode-id="659"><br data-dcnode-id="658"><span data-dcnode-id="657" instrument_node="">
</span><center data-dcnode-id="654"><img data-dcnode-id="656" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/mallhouse.jpg&amp;raw"><span data-dcnode-id="655" instrument_node="">
The house on the Mall where Allingham was born.</span></center><br data-dcnode-id="653"><br data-dcnode-id="652"><span data-dcnode-id="651" instrument_node="">
 
And William Allingham was indeed a major literary figure, much highly thought of by his contemporaries, eg. Tennyson and Rosetti. He corresponded with them a lot.</span><br data-dcnode-id="650"><br data-dcnode-id="649"><span data-dcnode-id="648" instrument_node="">
 
We visited the poet's grave in the grounds of St. Anne's Church of Ireland and were kindly granted access to view the interior. In his final words of tribute there, Anthony gave great prominence to a most interesting facet of his life - his marriage to Helen in 1874; she established  a superb reputation as a water-colour artist and is recognised as such today. The town has a Helen Allingham gallery and there is a Helen Allingham Society in the USA. A google search will show the magnificence of her work which now command very high prices.</span><br data-dcnode-id="647"><br data-dcnode-id="646"><span data-dcnode-id="645" instrument_node="">
</span><center data-dcnode-id="642"><img data-dcnode-id="644" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/stanne.jpg&amp;raw"><span data-dcnode-id="643" instrument_node="">
Anthony addressing the group at St. Anne's.</span></center><br data-dcnode-id="641"><br data-dcnode-id="640"><span data-dcnode-id="639" instrument_node="">
 
The poet, who died in 1889, is also highly celebrated in his native place. There is the Allingham Park, a memorial plaque on the bridge named in his honour, also a plaque on the house in which he was born and a commemorative bust by Arthur Breen in the bank where he worked.</span><br data-dcnode-id="638"><br data-dcnode-id="637"><span data-dcnode-id="636" instrument_node="">
</span><center data-dcnode-id="633"><img data-dcnode-id="635" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/plaque.jpg&amp;raw"><span data-dcnode-id="634" instrument_node="">
The plaque on the bridge.</span></center><br data-dcnode-id="632"><br data-dcnode-id="631"><span data-dcnode-id="630" instrument_node="">
 
After our President, Col. Declan O'Carroll, thanked everyone who had made the day so enjoyable, we bade a fond farewell to Ballyshannon recalling the poet's own words as he departured from the same town many, many years earlier.</span><br data-dcnode-id="629"><br data-dcnode-id="628"><i data-dcnode-id="612"><span data-dcnode-id="627" instrument_node="">
 
"Adieu to Ballyshannon! where I was bred and born;</span><br data-dcnode-id="626"><span data-dcnode-id="625" instrument_node="">
Go where I may, I'll think of you, as sure as night and morn,</span><br data-dcnode-id="624"><span data-dcnode-id="623" instrument_node="">
The kindly spot, the friendly town, where everyone is known,</span><br data-dcnode-id="622"><span data-dcnode-id="621" instrument_node="">
And not a face in all the place but partly seems my own;</span><br data-dcnode-id="620"><span data-dcnode-id="619" instrument_node="">
There's not a house or window, there's not a field or hill,</span><br data-dcnode-id="618"><span data-dcnode-id="617" instrument_node="">
But, east or west, in foreign lands, I'll recollect them still.</span><br data-dcnode-id="616"><span data-dcnode-id="615" instrument_node="">
I leave my warm heart with you, though my back I'm forced to turn -</span><br data-dcnode-id="614"><span data-dcnode-id="613" instrument_node="">
So adieu to Ballyshannon, and the winding banks of Erne!"</span></i><br data-dcnode-id="611"><br data-dcnode-id="610"><span data-dcnode-id="609" instrument_node="">

("The winding banks of Erne", verse 1)</span><br data-dcnode-id="608"><br data-dcnode-id="607"><hr data-dcnode-id="606"><span data-dcnode-id="605" instrument_node="">
</span><p align="center" data-dcnode-id="602"><font data-dcnode-id="603" size="6"><span data-dcnode-id="604" instrument_node="">2009 Events</span></font></p><span data-dcnode-id="601" instrument_node="">
</span><hr data-dcnode-id="600"><span data-dcnode-id="599" instrument_node="">
</span><h1 data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Unique historical meeting in Ballybofey...</span></h1><span data-dcnode-id="596" instrument_node="">
</span><div class="descr" data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Ballybofey, Nov 2009</span></div><span data-dcnode-id="593" instrument_node="">
</span><br data-dcnode-id="592"><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">The County Donegal Historical Society has organised a unique meeting of local historical societies/groups throughout the county in Jackson's Hotel, Ballybofey on November 24th at 8 pm.</span></p><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">The President of the Society, Col. Declan O'Carroll says that the purpose of this special meeting is to examine all the ways the various historical groups can be of mutual benefit to each other in preserving and promoting the rich heritage of the county. Declan adds:</span></p><span data-dcnode-id="585" instrument_node="">
</span><blockquote data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">To date, we have identified and notified 20 such groups, but there may may others unknown to the Society and this is an invitation to them. If you are a member of any history group within the county, feel invited to this meeting.</span></blockquote><span data-dcnode-id="582" instrument_node="">
</span><br data-dcnode-id="581"><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Two representatives of each group are welcome to attend and each group will have the chance to introduce themselves and say a few words to the assembled audience about their work. Any group not yet contacted and who would like to attend this meeting should notify the Hon. Secretary, Una Mc Garrigle, Parkhill, Ballyshannon. Telephone 087 2261378, or via the Contacts part of this website.</span></p><span data-dcnode-id="577" instrument_node="">
</span><br data-dcnode-id="576"><hr data-dcnode-id="575"><br data-dcnode-id="574"><span data-dcnode-id="573" instrument_node="">
</span><h1 data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Donegal Historical Society - 4th Field Day</span></h1><span data-dcnode-id="570" instrument_node="">
</span><div class="descr" data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Derry, Aug 2009</span></div><span data-dcnode-id="567" instrument_node="">
</span><br data-dcnode-id="566"><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">The fourth and last Field Day of 2009 was across the border in Derry. This city, of course, has many links with Donegal, perhaps the best-known being the site of a monastery founded by St. Colmcille in 546 AD. The monastery in the oak grove led to the settlement being called Doire Colmcille, perhaps the only city in the world named after a Donegal native.</span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">On the walls above Bishop's Gate, our President, Col. Declan O'Carroll introduced us to our guide, Dr. Billy Kelly, Research Projects Co-ordinator at the Institute of Ulster Scots Studies, University of Ulster, Magee.</span></p><span data-dcnode-id="559" instrument_node="">
</span><br data-dcnode-id="558"><span data-dcnode-id="557" instrument_node="">
</span><center data-dcnode-id="552"><img data-dcnode-id="556" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/cathedral.jpg&amp;raw"><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">On the walls at the Guildhall, Dr. Kelly our guide on left along with our President, Col. Declan O'Carroll</span></p></center><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Over the next few hours, Dr. Kelly took us through the history of the city, especially the times of the Plantation and the Siege. Apart from the "academic" he also regaled us with numerous anecdotes regarding day to day matters of life in the city. One of these concerned a request to the crown to send a full supply of salted fish to the city during the Plantation, as food was running low. The reply from England pointed out that the Foyle was one of the best salmon rivers anywhere and nets would be sent from England instead.</span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Dr. Kelly also explained the London connection with the city. In 1613, Derry was renamed Londonderry, having been granted a Royal Charter by James 1 and the involvement of the London companies.</span></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">The walls of the city are the most important surviving 17th century fortifications in the British Isles and we walked about half way around them. Their full length is just over one mile. On the way we stopped at St. Augustine's Church (1872, C of I) and the nearby St. Columb's Cathedral (C of I).</span></p><span data-dcnode-id="542" instrument_node="">
</span><center data-dcnode-id="537"><img data-dcnode-id="541" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/guildhall.jpg&amp;raw"><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">In front of St. Columb's Cathedral</span></p></center><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">The next stop on the walls was facing the Guildhall (1812) among the row of cannon. There was also a reminder at this point that Derry is a city proud of its past but also looking to the present and the future, with a multi-million pound urban renewal project ongoing in front of the Guildhall over to Waterloo Place.</span></p><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">The weather was rather inclement during most of the afternoon but it did not spoil a most enjoyable Field Day. In thanking Dr. Kelly, Declan described him as a magnificent raconteur and with an encyclopaedic knowledge of Derry's history.</span></p><span data-dcnode-id="530" instrument_node="">
</span><br data-dcnode-id="529"><hr data-dcnode-id="528"><br data-dcnode-id="527"><span data-dcnode-id="526" instrument_node="">
</span><h1 data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Donegal Historical Society - 3rd Field Day</span></h1><span data-dcnode-id="523" instrument_node="">
</span><div class="descr" data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Kilclooney, Aug 2009</span></div><span data-dcnode-id="520" instrument_node="">
</span><br data-dcnode-id="519"><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Our third Field Day of 2009 was to Kilclooney, near Portnoo. A large attendance filled the hall of the very fine Dolmen Centre. The President of the Society, Col. Declan O'Carroll welcomed everyone and introduced our Guide, Ms. Paula Harvey, Lecturer in UCD and who, as a former curator of the Donegal County Museum and Field Monument Officer with Donegal County Council, is a well known and highly regarded authority on Donegal's ancient heritage.</span></p><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Paula began with an informative, illustrated talk on the various types of megalithic tombs, their purpose and current states of preservation, particularly those in Donegal. This whetted the appetite of the audience, eager now to set out and view the local examples of these awe-inspiring structures.</span></p><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">A short walk brought us to the first monument, the large portal tomb of Kilclooney, the one seen in many tourist guide books and archaeological journals. This funerary monument has dominated the local landscape for more than 5,000 years. We could only marvel at the engineering skills that enabled its construction in the Neolithic Age. This site is unique in that, within the same mound, there is a second portal tomb, an exact replica of the larger tomb and only about nine metres from it.</span></p><span data-dcnode-id="509" instrument_node="">
</span><br data-dcnode-id="508"><span data-dcnode-id="507" instrument_node="">
</span><center data-dcnode-id="500"><img data-dcnode-id="506" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/dolmen.jpg&amp;raw"><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="504" instrument_node="">Portal Dolmen </span><i data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">(Capstone ~ 13 tons)</span></i></p></center><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Our next stop was the court tomb of Kilclooney. The massive entrance-jambs lead into a larger chamber, the place of burial. The knowledge and enthusiasm of our Guide opened our minds and stirred all our imaginations as we considered the effort required in the construction of these massive monuments and their possible uses in funeral rituals and community ceremonies.</span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">The Field Day concluded with some very interesting questions and creative speculation, making for a most enjoyable experience. Declan then thanked Paula for acting as our Guide for the occasion and enlightening all present about the significance of the Kilclooney monuments.</span></p><span data-dcnode-id="493" instrument_node="">
</span><br data-dcnode-id="492"><span data-dcnode-id="491" instrument_node="">
</span><center data-dcnode-id="486"><img data-dcnode-id="490" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/dolmengroup.jpg&amp;raw"><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Some of the group at the Kilclooney Field Day</span></p></center><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="484" instrument_node="">The final Field Day of 2009 will be in Derry on August 30th, with Dr. William Kelly as Guide. We will visit the historical areas of the plantation city. See </span><a data-dcnode-id="482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/field.html"><span data-dcnode-id="483" instrument_node="">Field Days</span></a><span data-dcnode-id="481" instrument_node=""> for more information.</span></p><span data-dcnode-id="479" instrument_node="">
</span><br data-dcnode-id="478"><hr data-dcnode-id="477"><br data-dcnode-id="476"><span data-dcnode-id="475" instrument_node="">
</span><h1 data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Donegal Historical Society - 2nd Field Day</span></h1><span data-dcnode-id="472" instrument_node="">
</span><div class="descr" data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Carrigart, Jul 2009</span></div><span data-dcnode-id="469" instrument_node="">
</span><br data-dcnode-id="468"><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Our second Field Day of 2009 was in Carrigart and well over 100 people turned up for this event. The first venue was Holy Trinity Church of Ireland, Parish of Mevagh, a very fine building dating back to 1895. The President of the Society, Mr. Declan O'Carroll, welcomed all present and extended a particular cead mile failte to some fellow historical society members from Armagh - Seanchas Ard Mhacha. Also welcomed were those from other countries, e.g. the USA and Austria.</span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Declan then introduced our guide for the day, Mr. P.J. Boyce. Mr. Boyce began by extending a very cordial greeting to everyone, adding that it would be his pleasure as a native of the area to act as our guide and he hoped that the weather would be in our favour for the afternoon. He went on to give us a summary of the history of the church and informed us that it was built on the same site as a previous one which had been built in 1675.</span></p><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">From there it was on to Manorvaughan House, home of the Hon. Hedley Strutt, who is also a member of the Historical Society. Now in his 94th year, he began by expressing his delight at seeing members and guests of the Society at Manorvaughan, adding that as a member of the Society, it was an occasion that meant so much to him, having the Society in attendance. He gave us some of his own biographical information and how he came to live in the house, his formative years had been in England.</span></p><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Driving from there around Rosguill peninsula, we parked the cars and made a short dander down a narrow lane to Mevagh graveyard to see the old cross there. This cross fascinated the early Victorian photographers, such as R.J. Welch. Sadly, the wishing stone that used to be close to the cross in those old photos has disappeared.</span></p><span data-dcnode-id="455" instrument_node="">
</span><br data-dcnode-id="454"><span data-dcnode-id="453" instrument_node="">
</span><center data-dcnode-id="448"><img data-dcnode-id="452" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/mevaghcross.jpg&amp;raw"><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Old Mevagh Cross</span></p></center><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">There is no rule saying that something new cannot be on the itinerary, and that came next. We were taken to see the Harry Blaney bridge over scenic Mulroy Bay, and it's hard not to sing John Kerr's song lauding the magnificence of Mulroy. No doubt about it, this new bridge is a landmark in the locality; there are footpaths on the bridge allowing visitors the chance to view the splendour of the bay and surrounding countryside.</span></p><p data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">
</span></p><center data-dcnode-id="438"><img data-dcnode-id="442" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/blaneybridge.jpg&amp;raw"><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">The new Harry Blaney bridge at Mulroy Bay</span></p></center><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">And to finish the day, some levity. On second thoughts, that's  not quite accurate, because we were taken to see a 13 ton glacial lump of granite. The joy of a Field Day is the opportunity to see some of the hidden gems of Donegal and there it was near Lackagh bridge, on its own, a complete unknown...a rolling stone. This is the shuggling stone of Lackagh, which can only be described as being like a rocking chair. Its unique feature was discovered in 1834 by Ltnt. Lancey during the first Ordnance Survey of Ireland. He noted that it could be rocked back and forth with one finger. On Sunday's field day, there was a queue to verify his observation, thus ending the occasion on a note of mirth.</span></p><span data-dcnode-id="434" instrument_node="">
</span><center data-dcnode-id="429"><img data-dcnode-id="433" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/shuggling.jpg&amp;raw"><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">The Shuggling Stone near Lackagh bridge</span></p></center><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Even better, the weather did indeed stay dry for us. A wonderful day and thanks to all involved. Next Field day is in Portnoo on August 9th.</span></p><span data-dcnode-id="425" instrument_node="">
</span><br data-dcnode-id="424"><hr data-dcnode-id="423"><br data-dcnode-id="422"><span data-dcnode-id="421" instrument_node="">
</span><a data-dcnode-id="420" name="coach"></a><span data-dcnode-id="419" instrument_node="">
</span><h1 data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Donegal Historical Society - Coach Outing</span></h1><span data-dcnode-id="416" instrument_node="">
</span><div class="descr" data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Clonmacnoise, May 2009</span></div><span data-dcnode-id="413" instrument_node="">
</span><br data-dcnode-id="412"><span data-dcnode-id="411" instrument_node="">
</span><center data-dcnode-id="406"><img data-dcnode-id="410" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/clonmac2009.jpg&amp;raw"><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Visiting Clonmacnoise during the 2009 coach outing</span></p></center><span data-dcnode-id="405" instrument_node="">
</span><br data-dcnode-id="404"><hr data-dcnode-id="403"><br data-dcnode-id="402"><span data-dcnode-id="401" instrument_node="">
</span><h1 data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">60 Years of the Donegal Annual</span></h1><span data-dcnode-id="398" instrument_node="">
</span><div class="descr" data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Ballybofey, 10 Mar 2009</span></div><span data-dcnode-id="395" instrument_node="">
</span><br data-dcnode-id="394"><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">The launch of this year's edition of the Donegal Annual, the publication of the County Donegal Historical Society, marks a superb achievement, i.e. its Diamond Jubilee. From the first print run of 250 copies 60 years ago, the recent editions are well into 4 figures, such is the status of and demand for it.</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Sean Beattie and his editorial team have spent the winter months bringing to fruition this first-class publication. The full-colour cover is very eye catching, featuring a very classy watercolour of Lifford in the year 1815. This rare painting of the county town is a real gem in itself, showing how the area looked all those years ago.</span></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">One constant feature of the Annual is the geographical spread of the articles - there is hardly any part of the county omitted among the 344 pages. A quick skim through these pages shows the range and diversity therein. The Royal and Prior School, Raphoe; the GAA and Association Football, 1884-1914; the monastery in Fahan; the Drumboe martyrs; Donegal's farming heritage; the Lough Swilly Railway; the lost tombs of Finner; cottage industries in the county, 1880-1920. That is just a small selection of the 20+ articles.</span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">A full account of the work of the Society and the Field Days for 2009 are also included.</span></p><span data-dcnode-id="381" instrument_node="">
</span><p align="center" data-dcnode-id="378"><font data-dcnode-id="379" size="6"><span data-dcnode-id="380" instrument_node="">2008 Events</span></font></p><span data-dcnode-id="377" instrument_node="">

</span><h1 data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Emerson Memorial Lecture</span></h1><span data-dcnode-id="299" instrument_node="">
</span><div class="descr" data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Ballyshannon, 07 Nov 2007</span></div><span data-dcnode-id="296" instrument_node="">
</span><br data-dcnode-id="295"><span data-dcnode-id="294" instrument_node="">
</span><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">The first Emerson Memorial Lecture was held in Ballyshannon on the 7th November 2007.</span></p><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">The committee had secured a room in Scoil Cholmcille and had set out about 30 chairs but it soon became evident that it would be too few. More and more chairs had to be brought in until the room was packed to capacity with people standing along the walls.</span></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">The lecture, The Flight of the Earls and its effects on Ballyshannon, illustrated and delivered by Anthony Begley, a past president of the Society, was excellent (as is everything done by Anthony!). Anthony was ably assisted by Conor Carney who sang and read extracts from various texts.</span></p><span data-dcnode-id="285" instrument_node="">
</span><p data-dcnode-id="280"><span data-dcnode-id="284" instrument_node="">It was a fitting tribute to </span><a data-dcnode-id="282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/emerson.html%23lucius"><span data-dcnode-id="283" instrument_node="">Lucius</span></a><span data-dcnode-id="281" instrument_node=""> and his passion for history.</span></p><span data-dcnode-id="279" instrument_node="">
</span><center data-dcnode-id="262"><img data-dcnode-id="278" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/emersonlecture.jpg&amp;raw"><span data-dcnode-id="277" instrument_node="">
</span><br data-dcnode-id="276"><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="271"><b data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Back:</span></b><span data-dcnode-id="272" instrument_node=""> Matt McNulty, Declan O'Carroll, Conor Carney</span></p><span data-dcnode-id="270" instrument_node="">
</span><p data-dcnode-id="263"><b data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Front:</span></b><span data-dcnode-id="267" instrument_node=""> Anthony Begly, Helen Meehan </span><i data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">(President)</span></i><span data-dcnode-id="264" instrument_node="">, Vincent O'Donnell</span></p></center><span data-dcnode-id="261" instrument_node="">
</span><br data-dcnode-id="260"><hr data-dcnode-id="259"><br data-dcnode-id="258"><span data-dcnode-id="257" instrument_node="">
</span><h1 data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">2007 Coach Outing</span></h1><span data-dcnode-id="254" instrument_node="">
</span><div class="descr" data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">22-24 Jun 2007</span></div><span data-dcnode-id="251" instrument_node="">
</span><br data-dcnode-id="250"><span data-dcnode-id="249" instrument_node="">
</span><p data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Our annual coach outing took place on 22-24 June 2007. 36 people in all travelled. En route to Westport we made 3 stops - Foxford Woollen Mills, Straide Abbey &amp; Michael Davitt Museum and Ballintubber Abbey. After dinner on Friday night we were entertained by local Church of Ireland Rector, Garry Hastings and his feadóg mhór.</span></p><span data-dcnode-id="246" instrument_node="">
</span><p data-dcnode-id="238"><span data-dcnode-id="245" instrument_node="">On Saturday morning we met our guide, Brona Joyce who took us out to Murrisk where we saw the remains of the abbey where Gráinne Mhaol was baptised and married </span><i data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">(1st time)</span></i><span data-dcnode-id="242" instrument_node="">, famine memorial and some of us climbed </span><i data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">(part of)</span></i><span data-dcnode-id="239" instrument_node=""> Croach Patrick. From there we journeyed to Achill Island where we got a grand tour and as much history as we could absorb, not to mind the beautiful scenery. After dinner we sang and danced till bedtime.</span></p><span data-dcnode-id="237" instrument_node="">
</span><p data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">On Sunday morning we went to 9.30 Mass in the Catholic Church. Afterwards some went on a walking tour of Westport led again by Brona Joyce while a dozen or more attended Garry Hastings' Anglican Mass in the Church of the Holy Trinity. Afterwards both the walkers and those coming out from Garry's service had to shelter from a heavy shower. Then it was onto the coach and off to Newport for lunch. After lunch we had a slide show by Peter Mullowney depicting the rise and fall of the Newport O'Donnells. We then visited the local Catholic Church to admire a Harry Clarke window.</span></p><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">From there we travelled to Burrisule Abbey where lies the remains of Rory O'Donnell of Lifford who along with 2000 of his kinsmen was banished to Connacht sometime around 1660 by Oliver Cromwell. Peter Mullowney filled us in on the history of the Abbey. There also we saw the grave of Fr. Sweeney who was hanged in Newport for acting as translator for the French in 1798. We then made our way to Bundoran where we dined and agreed we had had a wonderful weekend. A huge thanks is due to our secretary Una McGarrigle for all the planning and organising. The one big question on everybody's lips as we said goodbye to one another was, "Where are we going next year?"</span></p><span data-dcnode-id="231" instrument_node="">
</span><center data-dcnode-id="218"><img data-dcnode-id="230" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/newport.jpg&amp;raw"><span data-dcnode-id="229" instrument_node="">
</span><br data-dcnode-id="228"><span data-dcnode-id="227" instrument_node="">
</span><p data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">Outside Newport Church</span></p><span data-dcnode-id="224" instrument_node="">
</span><p data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">The tall grey-haired man at the back is Peter Mullowney</span></p><span data-dcnode-id="221" instrument_node="">
</span><p data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">Photo taken by Una McGarrigle who, alas, is not in the picture</span></p></center><span data-dcnode-id="217" instrument_node="">
</span><br data-dcnode-id="216"><hr data-dcnode-id="215"><br data-dcnode-id="214"><span data-dcnode-id="213" instrument_node="">

</span><br data-dcnode-id="206"><span data-dcnode-id="205" instrument_node="">
</span><p data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">On the 17th April 2007 the Donegal Historical Society handed over the minutes books for the first 50 years of the Society to the County Donegal Archives.</span></p><span data-dcnode-id="202" instrument_node="">
</span><center data-dcnode-id="175"><img data-dcnode-id="201" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/minutes.jpg&amp;raw"><span data-dcnode-id="200" instrument_node="">
</span><br data-dcnode-id="199"><span data-dcnode-id="198" instrument_node="">
</span><p data-dcnode-id="188"><b data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">Back:</span></b><span data-dcnode-id="195" instrument_node=""> Eamonn McEntire, Helen Meehan </span><i data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">(current President)</span></i><span data-dcnode-id="192" instrument_node="">, Una McGarrigle </span><i data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">(Secretary)</span></i><span data-dcnode-id="189" instrument_node="">, Eddie O'Kane, Patrick Perry
			</span></p><p data-dcnode-id="176"><b data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">Front:</span></b><span data-dcnode-id="185" instrument_node=""> Arthur Spears, Vincent O'Donnell </span><i data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">(then President)</span></i><span data-dcnode-id="182" instrument_node="">, Niamh Brennan </span><i data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">(Archivist)</span></i><span data-dcnode-id="179" instrument_node="">, Kiera Joyce </span><i data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">(Assistant Archivist)</span></i></p></center><span data-dcnode-id="174" instrument_node="">
</span><br data-dcnode-id="173"><span data-dcnode-id="172" instrument_node="">
</span><p data-dcnode-id="164"><span data-dcnode-id="171" instrument_node="">Liam MacMenamin </span><i data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">(Falcarrach)</span></i><span data-dcnode-id="168" instrument_node="">, the Society's first secretary was replaced in 1960 by </span><a data-dcnode-id="166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/emerson.html"><span data-dcnode-id="167" instrument_node="">Kathleen Emerson</span></a><span data-dcnode-id="165" instrument_node=""> who served in that role until 2004. Both kept accurate and copious minutes of meetings and proceedings. Along with the minutes were many press clippings of the Society's activities. All are now part of the County Archives and are available to anyone, especially members of the Historical Society.</span></p><span data-dcnode-id="163" instrument_node="">
</span><br data-dcnode-id="162"><hr data-dcnode-id="161"><br data-dcnode-id="160"><span data-dcnode-id="159" instrument_node="">
