</span><div class="content" data-dcnode-id="124"><span data-dcnode-id="2562" instrument_node="">
</span><h1 data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">Past Events</span></h1><span data-dcnode-id="2559" instrument_node="">
</span><br data-dcnode-id="2558"><span data-dcnode-id="2557" instrument_node="">
</span><p data-dcnode-id="2552"><span data-dcnode-id="2556" instrument_node="">Here we keep a record of the highlights of our annual proceedings, mainly photographs and news that featured on the </span><a data-dcnode-id="2554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/news.html"><span data-dcnode-id="2555" instrument_node="">NEWS</span></a><span data-dcnode-id="2553" instrument_node=""> page but removed when no longer topical.</span></p><br data-dcnode-id="2551"><hr data-dcnode-id="2550"><br data-dcnode-id="2549"><span data-dcnode-id="2548" instrument_node="">
</span><hr data-dcnode-id="2547"><br data-dcnode-id="2546"><span data-dcnode-id="2545" instrument_node="">
</span><p align="center" data-dcnode-id="2542"><font data-dcnode-id="2543" size="6"><span data-dcnode-id="2544" instrument_node="">2016 Events</span></font></p><hr data-dcnode-id="2541"><br data-dcnode-id="2540"><span data-dcnode-id="2539" instrument_node="">
</span><b data-dcnode-id="2536"><font data-dcnode-id="2537" size="4"><span data-dcnode-id="2538" instrument_node="">The Emerson Lecture with Anthony Begley</span></font></b><br data-dcnode-id="2535"><br data-dcnode-id="2534"><span data-dcnode-id="2533" instrument_node="">
</span><p data-dcnode-id="2527"><font data-dcnode-id="2528" size="2"><span data-dcnode-id="2532" instrument_node="">"Local Memories of World War 1 and the Battle of the Somme" An illustrated talk by Anthony Begley, local Historian, will reveal new research on how Ballyshannon people were involved in the war. This talk will include letters, correspondence, songs, images and poetry from local participants in World War 1.
</span><b data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">A LECTURE NOT TO BE MISSED.. Free entry.</span></b><span data-dcnode-id="2529" instrument_node="">
</span></font></p><p align="center" data-dcnode-id="2522"><font data-dcnode-id="2523" size="2"><img data-dcnode-id="2526" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/emlect16.jpg&amp;raw"><br data-dcnode-id="2525"><br data-dcnode-id="2524"></font></p><hr data-dcnode-id="2521"><hr data-dcnode-id="2520"><font data-dcnode-id="125" size="2"><br data-dcnode-id="2519"><br data-dcnode-id="2518"><span data-dcnode-id="2517" instrument_node="">
</span><b data-dcnode-id="2514"><font data-dcnode-id="2515" size="4"><span data-dcnode-id="2516" instrument_node="">The 2016 Donegal Annual</span></font></b><br data-dcnode-id="2513"><br data-dcnode-id="2512"><span data-dcnode-id="2511" instrument_node="">
</span><p align="center" data-dcnode-id="2508"><img data-dcnode-id="2510" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/a16.jpg&amp;raw"><span data-dcnode-id="2509" instrument_node="">
The cover of the Annual is a most atmospheric painting by Norman Teeling, "Sackville Street before the Rising."</span></p><br data-dcnode-id="2507"><br data-dcnode-id="2506"><span data-dcnode-id="2505" instrument_node="">
</span><p data-dcnode-id="2484"><font data-dcnode-id="2485" size="2"><span data-dcnode-id="2504" instrument_node="">This is a special centenary edition of the Donegal Annual to commemorate the main events of 1916 - the Easter Rising and WW1.</span><br data-dcnode-id="2503"><span data-dcnode-id="2502" instrument_node="">
From the 20+ articles in this edition it is appropriate to focus on two in particular. Helen Meehan writes about Patrick Pearse and the MacManus brothers and this is Helen's 25th consecutive year contributing to the Annual. Rev. Dr. John Silke has a detailed article about Donegal and 1916. This sadly is believed to be Dr. Silke's final piece of writing and the Annual includes an obituary in his memory, written by Timothy O'Sullivan.</span><br data-dcnode-id="2501"><span data-dcnode-id="2500" instrument_node="">
The first RIC officer to die in the Rising was Constable Charles McGee, a native Irish speaker from the Donegal island of Innisboffin. He is the subject of two articles in the Annual, one by Dr. Méadhbha Ní Bhaoill and the other by Dr. Seosamh Ó Ceallaigh. In a similar vein Seán Boner writes about Private Con Duggan of the Royal Irish Rifles who also died in the Rising.</span><br data-dcnode-id="2499"><span data-dcnode-id="2498" instrument_node="">
Seán Beattie, the editor of the Annual, examines early reactions to the Rising in the North-West, while John Cunningham peruses the local press for that year with a selection of interesting snippets.  Rev Raymond Blair similarly examines "The Donegal Vindicator" which described the Rising as "an outbreak of criminal folly"  and that's the title he uses for his article.</span><br data-dcnode-id="2497"><span data-dcnode-id="2496" instrument_node="">
Emerson Herdman from Sion Mills was in Dublin and photographed the city in the days after the Rising. Seán Boner prints some of these in his article and tells us that the entire collection is in the National Library, including ones he took in the Rosses where the Herdmans also had extensive business interests.</span><br data-dcnode-id="2495"><span data-dcnode-id="2494" instrument_node="">
Standing back to reflect on the entire spectrum of commemoration and memory is thoughtfully achieved  by Dr. Desmond Murphy, a barrister from Derry. Dr. Sandra Buchanan focuses on the Rising in a wider global context, backed up with an immense amount of bibliography.</span><br data-dcnode-id="2493"><span data-dcnode-id="2492" instrument_node="">
And the events of WW1 are also in the Annual. Rachel Magowan features Dorothy Young, a Belfast trained nurse who served in war time hospitals in France and who had spent her youthful summers in Culdaff. She later moved to Jersey and named her house Inishowen, evidence surely of the serenity she had found in that beautiful peninsula.</span><br data-dcnode-id="2491"><span data-dcnode-id="2490" instrument_node="">
We must never forget the excellent service provided by the Donegal County Archives Centre for a lot of our information and Dr. Niamh Brennan, the Head of Archives, details the 1916 collection held at Lifford, "a small but intriguing collection" is how she describes the 1916 material.</span><br data-dcnode-id="2489"><span data-dcnode-id="2488" instrument_node="">
This is not the full extent of the Annual - see the Index on our website for that. It was launched by Prof. Gearóid Ó Tuathaigh, Emeritus Professor, NUI, Galway.</span><br data-dcnode-id="2487"><span data-dcnode-id="2486" instrument_node="">
Full credit to Seán Beattie and his editorial staff in bringing to fruition this milestone publication to remember a significant year in Irish history.</span></font></p><br data-dcnode-id="2483"><br data-dcnode-id="2482"><br data-dcnode-id="2481"><br data-dcnode-id="2480"><span data-dcnode-id="2479" instrument_node="">
</span><hr data-dcnode-id="2478"><span data-dcnode-id="2477" instrument_node="">
</span><b data-dcnode-id="2474"><font data-dcnode-id="2475" size="4"><span data-dcnode-id="2476" instrument_node="">Field Day in Marble Hill and Gortahork   (August 2016)</span></font></b><hr data-dcnode-id="2473"><br data-dcnode-id="2472"><br data-dcnode-id="2471"><span data-dcnode-id="2470" instrument_node="">
</span><font data-dcnode-id="2439" size="2"><span data-dcnode-id="2469" instrument_node="">The scenic splendour of Marble Hill, deep Sheephaven Bay and Gortahork were our final destinations for this year's field days. But we were there to enjoy much more than the breath-taking views.
Our President, Dr. Lochlann McGill, welcomed a very large group to Marble Hill.  Our first stop was its gate-lodge where our guide, Charlie Gallagher pointed out a most interesting feature of the lovely lodge , ie the still intact roof made from the local Roshine slate. </span><br data-dcnode-id="2468"><span data-dcnode-id="2467" instrument_node="">
</span><p align="center" data-dcnode-id="2465"><img data-dcnode-id="2466" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/x1.jpg&amp;raw"></p><br data-dcnode-id="2464"><span data-dcnode-id="2463" instrument_node="">
The house itself was once owned by Mr. Hugh Law, MP and TD. Robin Law, his grandson, who lives nearby, was also in attendance. We then walked to the dance hall and this was the first time in more than 50 years that it  was opened to the public. Patrick Pearse knew the hall well, as we were soon to find out.  Andrew MacIntyre, a postman from nearby Ballymore, played the fiddle at ceilidh evenings held in the hall when Pearse came.</span><br data-dcnode-id="2462"><span data-dcnode-id="2461" instrument_node="">
</span><p align="center" data-dcnode-id="2459"><img data-dcnode-id="2460" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/x2.jpg&amp;raw"></p><br data-dcnode-id="2458"><span data-dcnode-id="2457" instrument_node="">
 Eamonn MacIntyre, his grandson, read a letter his father Eddie had written in 1966 to Dr. McGill's father about  Patrick  Pearse's visit to the house as Mr. Law's guest.  Eddie wrote, "I often heard my father  say that Pearse was a frequent visitor...and collected a large quantity of Irish folklore in the district around Marble Hill. It was in Law's house too that Pearse learned the Fairy Reel, a dance then peculiar to that part of Ireland. My father played the fiddle on that occasion and was personally thanked by Pearse."  For his work in preserving the local musical culture of the district, Mr Law in 1904 presented Andrew with a violin case with a silver plaque on it and Patrick Pearse contributed to the purchase. Andrew and Eddie were founder members of the Donegal Historical Society.</span><br data-dcnode-id="2456"><span data-dcnode-id="2455" instrument_node="">
Charlie Gallagher spoke next and recalled the popularity of Marble Hill with many other distinguished guests at the house. They  afterwards wrote about the locality and we are most fortunate, noted Charlie, in having such a wonderful amount of writings and art-work from that era relating to the district. He mentioned quite a few of these people and what they had to say and Charlie's power of recall was amazing. Entertainment was then provided by two fiddlers,Seamus McGowan and Liana MacIntyre. The Society would like to take this opportunity to thank the present owner of Marble Hill House, Ms Juliet Joblin-Purser,  for allowing us access to the dance hall and environs.  NB...It must be pointed out that the house, gate-lodge, dance hall and grounds are private property and not open to the public.</span><br data-dcnode-id="2454"><span data-dcnode-id="2453" instrument_node="">
On then to Coláiste Uladh, Gortahork where Dr. Seosamh ÓCeallaigh gave an illustrated lecture on the immense contribution the college has made to the language and culture of the district. Patrick Pearse, Joseph Plunkett and Roger Casement attended the college and immersed themselves in the local culture and ways of life.  The college itself is in immaculate condition and a joy to behold. Our day ended with a wonderful tea at the college. Go raibh maith agaibh go léir.</span><p data-dcnode-id="2452"></p><span data-dcnode-id="2451" instrument_node="">
</span><p align="center" data-dcnode-id="2449"><img data-dcnode-id="2450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/x3.jpg&amp;raw"></p><br data-dcnode-id="2448"><span data-dcnode-id="2447" instrument_node="">
</span><p align="center" data-dcnode-id="2445"><img data-dcnode-id="2446" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/x4.jpg&amp;raw"></p><br data-dcnode-id="2444"><span data-dcnode-id="2443" instrument_node="">

As the Society come to the end of our  commemorations for 1916, it is surely fitting that we give the last word to Joseph Plunkett, one of the seven signatories of the Proclamation and who was executed at Kilmainham Gaol on May 4th 1916. Years earlier, as a young man at Coláiste Uladh, enjoying the carefree days at the college amidst the heather-clad hills of  NW Donegal, it was the arrows of Cupid that struck him.  Here is the first verse of his poem, "Coláiste Uladh"  which he wrote to his beloved, a local girl whose surname was O'Carroll.</span><br data-dcnode-id="2442"><br data-dcnode-id="2441"><span data-dcnode-id="2440" instrument_node="">
</span></font><p align="center" data-dcnode-id="2422"><font data-dcnode-id="2423" size="2"><span data-dcnode-id="2438" instrument_node="">Cloughaneely Irish College</span><br data-dcnode-id="2437"><span data-dcnode-id="2436" instrument_node="">
Has a wealth of wit and knowledge,</span><br data-dcnode-id="2435"><span data-dcnode-id="2434" instrument_node="">
Not to speak of health and beauty</span><br data-dcnode-id="2433"><span data-dcnode-id="2432" instrument_node="">
Grace and graciousness go leor.</span><br data-dcnode-id="2431"><span data-dcnode-id="2430" instrument_node="">
But among its charms entrancing</span><br data-dcnode-id="2429"><span data-dcnode-id="2428" instrument_node="">
Men and maidens, songs and dancing,</span><br data-dcnode-id="2427"><span data-dcnode-id="2426" instrument_node="">
There is nothing so delightful</span><br data-dcnode-id="2425"><span data-dcnode-id="2424" instrument_node="">
As yourself, mo mhile stór.</span></font></p><br data-dcnode-id="2421"><br data-dcnode-id="2420"><span data-dcnode-id="2419" instrument_node="">
</span><b data-dcnode-id="2416"><font data-dcnode-id="2417" size="4"><span data-dcnode-id="2418" instrument_node="">Launch of Donegal Annual</span></font></b><hr data-dcnode-id="2415"><br data-dcnode-id="2414"><br data-dcnode-id="2413"><span data-dcnode-id="2412" instrument_node="">
</span><b data-dcnode-id="2399"><font data-dcnode-id="2400" size="3"><br data-dcnode-id="2411"><br data-dcnode-id="2410"><span data-dcnode-id="2409" instrument_node="">




Saturday 10th Sept</span><br data-dcnode-id="2408"><span data-dcnode-id="2407" instrument_node="">
Jacksons hotel</span><br data-dcnode-id="2406"><span data-dcnode-id="2405" instrument_node="">
Ballybofey</span><br data-dcnode-id="2404"><span data-dcnode-id="2403" instrument_node="">
3 pm</span><br data-dcnode-id="2402"><span data-dcnode-id="2401" instrument_node="">
With lecture on commemorations by Gearóid O Tuathaigh
Emeritus professor NUI G
</span></font></b><br data-dcnode-id="2398"><br data-dcnode-id="2397"><hr data-dcnode-id="2396"><span data-dcnode-id="2395" instrument_node="">

</span><p data-dcnode-id="2289"><span data-dcnode-id="2331" instrument_node="">
 
The 2015 Donegal Annual, which has just been printed, marks another milestone in the numerous achievements of the Co. Donegal Historical Society since its foundation in 1946.
Sixteen articles span the county, followed by book reviews, a list of officers and members, plus the schools' competition.</span><br data-dcnode-id="2330"><span data-dcnode-id="2329" instrument_node="">
Notable to begin with is that of Helen Meehan's. She has been a regular contributor for the 24th consecutive year and in this edition she looks at the astronomical features of pre-Plantation Donegal.
On a related theme, Ross Cooper focuses on the stone circle at Beltany near Raphoe, regarding the winter solstice.  Raphoe does well in this year's edition. Myra D. Kavanagh writes about Sarah Porterfield's emigration to the USA in 1741 and Frank Sweeney details a tragic incident at a fair day in the town in 1850. The area around Raphoe is known as the Laggan and Sam Hanna documents the Laggan Army and Land Leases 1642-1665.</span><br data-dcnode-id="2328"><span data-dcnode-id="2327" instrument_node="">
Mervyn Watson shows the significance to the county of cultural tourism in the early 1900's, greatly helped by the extensive railway system and the increasing number of new hotels.</span><br data-dcnode-id="2326"><span data-dcnode-id="2325" instrument_node="">
Hibernian Sunday Schools in Donegal, 1809 -1847 are examined by Seán Beattie, the Editor of the Annual.</span><br data-dcnode-id="2324"><span data-dcnode-id="2323" instrument_node="">
Music to the ears of many readers will be Eddie Ward's article on "The Rose of Arranmore."  It's poignant to read the real-life story of Grace O'Donnell, the islander who inspired this lovely song.</span><br data-dcnode-id="2322"><span data-dcnode-id="2321" instrument_node="">
Brian Lacey's feature reminds us that it's the 1500th anniversary of the birth of St. Colmcille.</span><br data-dcnode-id="2320"><span data-dcnode-id="2319" instrument_node="">
Several buildings also come under the spotlight. Port Hall, near Lifford, built in 1746, played an important role in recent history. Martin McGuinness came here to meet members of Margaret Thatcher's cabinet. A previous owner of the house, Anthony Marreco, founded Amnesty International in 1961 while he was living there. Belinda Mahaffy has thoroughly researched the history of this house on the banks of the River Foyle. (N.B.  The house and grounds are not open to the public).</span><br data-dcnode-id="2318"><span data-dcnode-id="2317" instrument_node="">
Donald Munro remembers life in a Glencolmcille rectory while nearby Malinbeg is the focus of Seán Ó hEochaidh's Irish language diary from a visit there in 1935, edited by Lillis Ó Laoire.</span><br data-dcnode-id="2316"><span data-dcnode-id="2315" instrument_node="">
Michael Kennedy writes about  Inishowen's wartime coast watchers 1939-1945. The cover of the Annual is a photo of the look-out post at Malin Head, taken by Adam R. Porter of Buncrana.</span><br data-dcnode-id="2314"><span data-dcnode-id="2313" instrument_node="">
Born in nearby Greencastle in 1786, Gen Frederick Young founded the senior battalion of the Gurkhas and Rachel Magowan relates his achievements.</span><br data-dcnode-id="2312"><span data-dcnode-id="2311" instrument_node="">
Around the 1870's,  Hugh Dorian of Fanad chronicled the everyday life and customs of the area. Rev. Raymond Blair's article summarises letters and other writings by him, giving a fascinating insight into a vanished world.</span><br data-dcnode-id="2310"><span data-dcnode-id="2309" instrument_node="">
The longest article in this year's Annual is Notes on Medieval Donegal by Tomás G. Ó Canann. He begins by informing readers that in the 12th century the abbey of Assaroe at Ballyshannon was known by its Latin name of Samaria, from the capital of the northern kingdom of Israel.</span><br data-dcnode-id="2308"><span data-dcnode-id="2307" instrument_node="">
The history of Donegal continues to fascinate the inquisitive mind and here we have a gem of a publication. Full credit to the Editor, Seán Beattie and his editorial team. All information about the Society is on its website at donegalhistory.com  [END] </span><br data-dcnode-id="2306"><span data-dcnode-id="2305" instrument_node="">

Field day in Finner Army Camp 16th August 2015 </span><br data-dcnode-id="2285"><br data-dcnode-id="2284"><span data-dcnode-id="2283" instrument_node="">

Finner's history is pedigree in status. "In the Middle Ages Finner appears to have been the residence of a Chief who lived on the strategic Finner hill above the old Finner  church and graveyard." So writes  Col. Declan O'Carroll in his definitive history of the  camp * and who acted as our guide for this field day. Declan is also a former President of the Donegal Historical Society and in his professional career he served in Finner, and also overseas  with the Irish Defence Forces.</span><br data-dcnode-id="2282"><span data-dcnode-id="2281" instrument_node="">
Our day began in the Officers' Mess with some light refreshments;  then a short walk to the lecture hall where Declan gave us an illustrated history of the camp. And it's a fascinating history. The Royal Inniskilling Fusiliers were based here at the end of the 19th century, training for the Boer War and the Great War. The British handed it over to the Irish authorities in 1922. In 1969 in the aftermath of the Battle of the Bogside, Finner housed refugees from the North.</span><br data-dcnode-id="2280"><span data-dcnode-id="2279" instrument_node="">
In more recent decades a major rebuilding programme was completed and today Finner is an impressive sight with its modernity. We walked around the camp and heard historical details of the various locations visited. The panorama is magnificent -  everything to please the eye: sea, sand dunes, Ben Bulben in the distance, an unbroken vista of nature at its most scenic. Only the chapel remains from the early days - it too has a most eye-catching interior featuring the stained glass artwork of Irish artist George Walsh. Here our day ended with our President, Dr. Lochlann McGill extending our gratitude to Declan and to 28 Infantry Battalion who all made our visit so enjoyable.</span><br data-dcnode-id="2278"><br data-dcnode-id="2277"><span data-dcnode-id="2276" instrument_node="">

 
 
* " Finner camp - a history"  2007, published by the Defence Forces.</span><br data-dcnode-id="2275"><br data-dcnode-id="2274"><span data-dcnode-id="2273" instrument_node="">

Field day in Rathmullan and Oughterlinn  (July 2015)</span><br data-dcnode-id="2256"><span data-dcnode-id="2255" instrument_node="">
  
Our July field day began at the home of Dermot and Jacinta Hardy where we received an interesting history of Rathmullan and its abbey from Áine Ní Dhuibhne. Their house is at the location of the 16th century  McSweeny's castle. Sadly, the abbey is closed at the moment due to its condition.</span><br data-dcnode-id="2254"><span data-dcnode-id="2253" instrument_node="">
We then went out to St. Catherine's Church, Oughterlinn where John McCreadie gave us an illustrated talk on the history of this wonderful edifice. This is an area of great peace and quiet with commanding views of the nearby hills and sea. Then a short walk followed to the mass rock, another of those hidden gems in the county.</span><br data-dcnode-id="2252"><span data-dcnode-id="2251" instrument_node="">
Finally, we were treated to tea and refreshments in the St. Vincent de Paul Centre in Rathmullan by members of the local historical society in the town.</span></p><p data-dcnode-id="2239"><span data-dcnode-id="2249" instrument_node="">

Retired Falcarragh-based GP Dr Lochlann McGill is the new president of the Donegal Historical Society. He was elected at its annual general meeting which was held in Jackson’s Hotel, Ballybofey last Friday night.</span><br data-dcnode-id="2210"><span data-dcnode-id="2209" instrument_node="">

In his final address following the end of his three year term in office, the outgoing president, Gweedore Parish Priest, Rev. Dr. Pádraig Ó Baoighill said he thoroughly enjoyed his tenure which, he added, was in no small way due to co-operation and helpfulness of the executive and membership and those who conducted field day trips throughout the year.</span><br data-dcnode-id="2208"><span data-dcnode-id="2207" instrument_node="">



In his inaugural address to the society the unanimously elected new president, Dr Lochlann McGill spoke with passion for the need to engage with the public on a number of fronts if they were to progress.
He thanked the outgoing president for all his work over the past three years and outlined to the meeting his personal connections with the society from his formative years and particularly as his late father, Paddy McGill was one of the founding fathers of the society back in 1946.</span><br data-dcnode-id="2206"><span data-dcnode-id="2205" instrument_node="">

</span><p data-dcnode-id="1934"><bold data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">REVIEW OF 2014 DONEGAL ANNUAL</span></bold><br data-dcnode-id="1936"><span data-dcnode-id="1935" instrument_node="">

(Launch in Jackson's Hotel, Oct 21st at 8 pm by Liam ÓCuinneagáin, Donegal Person of the Year. All welcome)</span></p><br data-dcnode-id="1933"><br data-dcnode-id="1932"><span data-dcnode-id="1931" instrument_node="">
</span><img data-dcnode-id="1930" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/DA14.JPG&amp;raw"><br data-dcnode-id="1929"><span data-dcnode-id="1928" instrument_node="">
</span><p data-dcnode-id="1908"><span data-dcnode-id="1927" instrument_node="">They say you should never judge a book by its cover but, in the case of the "Donegal Annual", this advice can be ignored. From its cover right through to the last of its 160 pages, this is a superb production from the County Donegal Historical Society.</span><br data-dcnode-id="1926"><span data-dcnode-id="1925" instrument_node="">
"Errigal in Autumn" by Carey Clarke, RHA, is the striking work of art on the cover.  The Annual  consists of  twenty one articles, followed by book reviews, details of the schools' competition and a comprehensive Donegal bibliography. Also included is the diary of events for next year.</span><br data-dcnode-id="1924"><span data-dcnode-id="1923" instrument_node="">
Worthy of special note is that for the 23rd consecutive year Helen Meehan is a contributor to the Annual. This year she examines the history of Cumann na mBan in Donegal. In this centenary year of the start of WW1, Richard Doherty writes about Donegal and the First World War.  Uinsionn Ó Breisleáin also focuses on that era and surrounding years in Comóradh agus Céiliúradh 1912 - 1922, as does William Holmes in The War of Independence and the Laggan.</span><br data-dcnode-id="1922"><span data-dcnode-id="1921" instrument_node="">
Further back in time, Tomás G.Ó Canann concentrates on Medieval Donegal and Terry Dolan looks at the Surveys and Rentals of the Manor of Castlefinn, 1631 - 1835,  while Rev.Bernard Canning details the local history of the Cistercians from 1218 to 2013.</span><br data-dcnode-id="1920"><span data-dcnode-id="1919" instrument_node="">
The excavations at Carrickbraghy Castle are extensively reported by Richard Crumlish;  Lillis Ó Laoire focuses on St. Colmcille's well at Ardsbeg where in the days of yore the well was a gathering point for  religious practice and social celebrations.    The intriguing origin of the nearby townland name of Bedlam is now so obvious. René Balthasar, the noted German archaeologist, delves into the history of the Malinmore portal tomb complex.</span><br data-dcnode-id="1918"><span data-dcnode-id="1917" instrument_node="">
The Annual is noted for its fresh look at the county's history. Rev. Raymond Blair examines the business interests of George Adair who achieved notoriety as a result of the Derryveagh evictions. Rev. Blair concludes his article by noting, "one might even end up with a grudging admiration for the entrepreneurial flair of John George Adair."  </span><br data-dcnode-id="1916"><span data-dcnode-id="1915" instrument_node="">
Donegal's Penny Nurses are the subject of Seán Beattie's article in the era 1903 - 1923. This is a fascinating look at the local health service of 100 years ago.
Sport is not forgotten. Dr. Conor Curran, a FIFA Havelange Research Fellow, puts the spotlight on Donegal players in the English soccer leagues from 1945 to 2010.  For the record, the first Donegal player to feature in the English leagues after the war was Chris Fletcher, a native of Buncrana.</span><br data-dcnode-id="1914"><span data-dcnode-id="1913" instrument_node="">
The above is a glimpse of some of the articles in this year's Annual and once again Seán Beattie and his editorial team have produced a truly magnificent book. It can be purchased in local bookshops at €25 or by visiting the Society's website at donegalhistory.com.</span><br data-dcnode-id="1912"><span data-dcnode-id="1911" instrument_node="">
The Annual will be launched in Jackson's Hotel on October 21st at 8 pm by Liam Ó Cunneagáin,  Donegal Person of the Year. Everyone welcome.           (E MacI)</span><br data-dcnode-id="1910"><br data-dcnode-id="1909"></p><hr data-dcnode-id="1907"><br data-dcnode-id="1906"><br data-dcnode-id="1905"><span data-dcnode-id="1904" instrument_node="">

August 31st Fielday in Ranafast</span><br data-dcnode-id="1883"><br data-dcnode-id="1882"><span data-dcnode-id="1881" instrument_node="">
In spite of Donegal playing Dublin in two major mathces (minor semi-final and senior semi-final) and inclement weather a group of eighteen arrived in Ranafast for the last field-day of 2014. Vincent O'Donnell, a native of Ranafast was guide for the day. Vincent, due to the unpredictable weather (misty and threatening to rain) decide to cut short the walking tour and do half his talk in the Áislann. Having given a brief history of Ranafast (first people in modern times settled there in 1736) in the cosiness of the Áislann, all ventured forth to Coláiste Bhríde which had a huge influence on Ranafast for almost a century, it was then on to the memorial of the late Cardinal Tomas Ó Fiach, 'Ranafast's adopted son' to hear of his association with the area. Other sites visited during the walk included, a standing stone and the remains of the old school (1869 -1910) often mentioned in the writings of Séamus and Seosamh Mac Grianna. As we were on the last hundred yards back to the Áislann the rain came down. On arrival there, the tea was ready. For the next hour Vincent gave more history and answered questions and indeed several discussions took place. All through the afternoon Vincent kept the group informed of the happenings in Croke Park which were being relayed to him by text messages.A most memorable day in many ways.</span><br data-dcnode-id="1880"><span data-dcnode-id="1879" instrument_node="">

July Field Day 13th July 2014</span><br data-dcnode-id="1870"><br data-dcnode-id="1869"><span data-dcnode-id="1868" instrument_node="">

On July 13th a very successful field day was held in which in excess of 300 people joined guide Dr.Lochlann Mc Gill in walking out to Inishkeel island to tour the historic sites. An added bonus for many people was the presence of a number of pairs of corncrakes on the island, many hearing the corncrake for the first time.</span><br data-dcnode-id="1867"><span data-dcnode-id="1866" instrument_node="">
Dr.Mc Gill divided the tour into three parts. At the Church Pool he gave a talk on the surrounding area of the mainland &amp; explained the meaning of local placenames.</span><br data-dcnode-id="1865"><span data-dcnode-id="1864" instrument_node="">
All then proceeded to the interior of St. Conall's church where Dr. Mc Gill spoke at length. He explained that the 'caol' element in St. Conall Caol's name could not, in grammatical Gaelic, be attached to the saint or the island and was in fact a reference to an early monastic, Caolán of Nendrum in Co.Down, whose monastery introduced Christianity to south west Donegal. Another who brought Christianity to SW Donegal from Co.Down was St. Dallan Forgaill who is said to be buried on Inishkeel. A modern hymn, 'Be Thou My Vision', attributed to Dallan Forgaill was beautifully sung by soprano Cara Wilson from Lisburn. Musical accompaniment was by Shane Bracken.</span><br data-dcnode-id="1863"><span data-dcnode-id="1862" instrument_node="">
The third part of the tour was what Dr. Mc Gill described as visiting an 'open-air art gallery' where Dr. Mc Gill explained the many ornamental carved stone slabs on the island. In this he was assisted by his extended family who held up large detailed etchings of the slabs so that everyone could see what was being described. The tour concluded with a rehearsed reading by Carmel McGill and Brendan Twomey of an extract from Brian Friel's play 'Wonderful Tennesse' which is based on the concept of Inishkeel and its turas.</span><br data-dcnode-id="1861"><br data-dcnode-id="1860"><span data-dcnode-id="1859" instrument_node="">

June Field Day 22nd June 2014</span><br data-dcnode-id="1832"><br data-dcnode-id="1831"><span data-dcnode-id="1830" instrument_node="">

Members of Cumann Staire agus Seanchais Dhún na nGall (The County Donegal Historical Society) met on Magheroarty Pier at 11.00 am last Sunday 22nd June 2014 for a field trip on Tory Island. The group were met by Maureen Doohan who welcomed everyone and provided details of the day's activities on the island. Other guides joining the party included Lochlann McGill and Sean Boner who gave a short talk at Magheroarty Pier before boarding the ferry.</span><br data-dcnode-id="1829"><br data-dcnode-id="1828"><span data-dcnode-id="1827" instrument_node="">
 
On arrival at Tory Pier, the King of Tory Patsy Dan Rogers,warmly welcomed the group.</span><br data-dcnode-id="1826"><span data-dcnode-id="1825" instrument_node="">
Maureen Doohan and Sean Boner later gave the group an interesting talk in Tory Hotel on the Island's history. </span><br data-dcnode-id="1824"><span data-dcnode-id="1823" instrument_node="">
Following refreshments in the hotel the group of forty plus assembled at the Tau Cross for a talk given by Pasty Dan, before proceeding to Moirsheisear/Grave of the Seven where Sean Boner related its history. </span><br data-dcnode-id="1822"><span data-dcnode-id="1821" instrument_node="">
This grave commemorates six men and a woman who were washed ashore in a Curragh on Tory. The clay from the woman’s grave is believed to be sacred and used to protect fishermen at sea.  According to local legend it also has mystical powers of preventing rats from inhabiting the island.</span><br data-dcnode-id="1820"><span data-dcnode-id="1819" instrument_node="">
There followed a walk to The Commonwealth Graveyard adjacent to the Lighthouse at the southern end of the Island where Pasty Dan gave another interesting talk before the group returned to the village in time to catch the ferry back to the mainland. Thus ended a most enjoyable and interesting day trip.</span><br data-dcnode-id="1818"><span data-dcnode-id="1817" instrument_node="">
The County Donegal Historical Society would like to thank the people of Tory, Pasty Dan, The Tory Island Ferry, The Tory Hotel and guides Maureen Doohan, Sean Boner and Lochlann McGill.</span><br data-dcnode-id="1816"><br data-dcnode-id="1815"><span data-dcnode-id="1814" instrument_node="">

AGM of County Donegal Historical Society 2014</span><br data-dcnode-id="1788"><span data-dcnode-id="1787" instrument_node="">

President speaks about exciting project in year ahead</span><br data-dcnode-id="1786"><span data-dcnode-id="1785" instrument_node="">

An Dr. Oirmh Pádraig Ó Baoighill, President of the County Donegal Historical Society, was delighted to welcome a packed hall for the Society's 2014 AGM in Jackson's Hotel." Is deas sibh a fheiceáil anseo agus tugann sé léargas ar an tsuim agus ar an spéis atá agaibh i stair agus i seanchas bhur gcondae dhúchais."
He continued by thanking the officers of the Society in the year ended "for their hard work, their enthusiasm and their co-operation." Dr. Ó Baoighill then outlined the raison d'etre of the Society ."On an occasion such as this, it is important to remind ourselves of the objectives of the Society: namely to preserve the history of our county and to encourage people to document events of historical significance which enrich the historical and cultural life of our native county."
Members were then delighted to hear of a most generous and altruistic offer. In 2011 the Society reprinted in one volume the first seven editions of the Donegal Annual (1947 - 1953). So popular were they that all the hard-back editions were pre-ordered before the launch and the print run had to be increased.
Now the rest of the 1950 editions will be reprinted and Dr. Ó Baoighill gave members the great news that a benefactor has come forward to guarantee the project's success. "I would like to thank Mr. Hugh Friel for a very generous financial offer to the Society. He has made this kind offer in order to enable our Society to issue more volumes of past Annuals. Hugh is a native of Fanad but he has been living in Kerry for many years where he was the CEO of Kerry Co-op. One thing is obvious - he never lost interest in his native county and he also kept a close eye on the activities of the Society."
In conclusion, Dr. Ó Baoighill expressed disappointment  with the County Council. "One of my observations over the past few years has been the lack of interest and hence the lack of action by Donegal County Council in the preservation and upkeep of old historic buildings. At this moment in time there is nothing being done by the Council to list historic buildings as protected structures. I would therefore urge the Council to take a more proactive approach in protecting and preserving our  historical heritage."
The Honorary Secretary, Mrs. Una McGarrigle,then detailed the previous year's busy calendar of events and thanked all those who assisted the Society, especially the guides for the field days: Michael Kelly and Pauric O Donnell at St. Eunan's College; Belinda Mahaffy and Mary Harte at Raphoe and the Beltony  stone circle; Joe Kelly at Cloughaneely and Brid Ward at St. John's Point.
Una flagged up the quality of the current Donegal Annual, thanks to the sterling work by Seán Beattie the Editor, and she finished by thanking the committee for all the assistance they gave to her during the year.
Pat Shallow, Director of the Schools' Competition, spoke of his sadness at the numbers of schools participating. "The competition has struggled to attract significant numbers of entries over the past few years. However, the standard has remained very high and the enthusiasm of those who do take part is most encouraging for the future of local history."
Reports were also read from the Honorary Treasurer, Helen Meehan and the Curator of the Society's Museum in Rossnowlagh, Liam Thomas.  
A poignant moment during the AGM was the bestowal of honorary life membership of the Society to two previous Presidents: Helen Meehan and Declan O'Carroll. Three new members were also elected to the committee: Michael Meehan, Rita Mc Ginty and Joe Kelly. </span><br data-dcnode-id="1784"><br data-dcnode-id="1783"><span data-dcnode-id="1782" instrument_node="">

</span><p data-dcnode-id="1760"><b data-dcnode-id="1761"><font data-dcnode-id="1762" size="3"><span data-dcnode-id="1763" instrument_node="">Launch of 2013 "Donegal Annual."</span></font></b></p><b data-dcnode-id="1757"><br data-dcnode-id="1759"><span data-dcnode-id="1758" instrument_node="">
</span></b><p data-dcnode-id="1754"><b data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Dr. Joe Mulholland, Director of the MacGill Summer School, Glenties, and former Donegal Person of the Year,  launched this year's "Donegal Annual" in Jackson's Hotel, Ballybofey on Tuesday November 12th last.</span></b></p><br <p="" data-dcnode-id="1753"><span data-dcnode-id="1752" instrument_node="">REVIEW OF THE 2013 DONEGAL ANNUAL</span><br data-dcnode-id="1751"><br data-dcnode-id="1750"><span data-dcnode-id="1749" instrument_node="">
</span><img data-dcnode-id="1748" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/DA13.jpg&amp;raw"><br data-dcnode-id="1747"><span data-dcnode-id="1746" instrument_node="">

Its cover features a Derek Hill painting "Harvesting at St. Columb's" (his former home near Gartan lough) and in the 150 pages of this year's Donegal Annual, published by the Co. Donegal Historical Society, a rich historical harvest is to be found in abundance.</span><br data-dcnode-id="1745"><span data-dcnode-id="1744" instrument_node="">
The entire county is spanned in the 20 articles within; this, along with a section on book reviews, recent Donegal bibliography and the schools' competition, makes for a most enjoyable and informative read.</span><br data-dcnode-id="1743"><span data-dcnode-id="1742" instrument_node="">
A snapshot of the contents is what follows. On that note, Seán Beattie, the editor of the Annual, looks at the history of photography in the county with plenty of photos included.</span><br data-dcnode-id="1741"><span data-dcnode-id="1740" instrument_node="">
Worthy of note is another contributor, Helen Meehan from Mountcharles who focuses on the early Gaelic revival in the Donegal Bay area. This is Helen's 23rd year in a row to write for the Annual, a magnificent achievement in literary local history.</span><br data-dcnode-id="1739"><span data-dcnode-id="1738" instrument_node="">
Three Donegal towns that received Charters in 1613 are featured by Matthew Potter: Donegal town, Ballyshannon and Lifford.</span><br data-dcnode-id="1737"><span data-dcnode-id="1736" instrument_node="">
Donegal and the Irish Boundary Commission is examined by Paul Murray i.e. the creation of the border. And Northern Ireland is not forgotten. Desmond Murphy looks at Derry and Donegal politics (1800 - 1921); and Frank Sweeney chronicles the history of the Londonderry and Lough Swilly railway.</span><br data-dcnode-id="1735"><span data-dcnode-id="1734" instrument_node="">
Ecclesiastical history is also prominent. Rev. Dr. Silke writes about Bishop Patrick O'Donnell (1856-1927) and Rome and Canon Bernard Canning relates the return home of a chalice from the trenches of France in World War 1 back to the Derry Diocese.</span><br data-dcnode-id="1733"><span data-dcnode-id="1732" instrument_node="">
Arnold Bax is a name many people will not be familiar with. Kenneth Dodds explains how this Englishman came to spend much of his time in Donegal 100 years ago, mastered the Irish language, visited remote regions e.g. Glencolmcille, Arranmore and Innishkeeragh. A writer and classical musician, whose time in Donegal influenced him and his writings immensely. He described the Glencolmcille people as the best in Ireland.</span><br data-dcnode-id="1731"><span data-dcnode-id="1730" instrument_node="">
Rev. Raymond Blair writes in similar vein. "Opposing high taxation and praising the Irish people", in which he examines some aspects of landlordism.</span><br data-dcnode-id="1729"><span data-dcnode-id="1728" instrument_node="">
Éamonn Ó'Ceallaigh contributes an article in Irish on "Domhnall MacDiarmada: File Ghaothbearra", the poet from Gweebarra.
Where is the castle that gives Castlefinn its name? Ross Cooper solves that mystery. Anthony Begley celebrates the historians from the Ballyshannon area from the early 1800's to the present.</span><br data-dcnode-id="1727"><span data-dcnode-id="1726" instrument_node="">
Inishowen is not forgotten; at least 3 articles focus on the peninsula e.g. the O'Doherty castle at the Isle of Doagh; the Illies in the 19th century and Carrowmore.</span><br data-dcnode-id="1725"><span data-dcnode-id="1724" instrument_node="">
Seán and his editorial team must be congratulated for another wonderful Annual. </span><b data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">It will be launched by Dr. Joe Mulholland, Director of the MacGill Summer School in Jackson's Hotel, Ballybofey, on November 12th at 8.30 pm. Everyone welcome.</span></b><span data-dcnode-id="1721" instrument_node="">
(E.MacI) &gt;</span><br data-dcnode-id="1720"><br data-dcnode-id="1719"><span data-dcnode-id="1718" instrument_node="">
</span><hr data-dcnode-id="1717"><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1713"><b data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">August Field Day</span></b></p><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">The August 'Field Day' this year was centered around the Killatee and St. John's Point area of south Donegal, the guides for the day being Bríd Ward and Helen Meehan. Particular epmhasis was placed on the window and the few other remains of the abbey at Ballysagart which is at present in the process of being restored.</span></p><br data-dcnode-id="1709"><br data-dcnode-id="1708"><span data-dcnode-id="1707" instrument_node="">
</span><img data-dcnode-id="1706" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/point6.jpg&amp;raw"><br data-dcnode-id="1705"><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">The first stop  was at the Bruckless Drowning Memorial below Castlemurray House where guide Brid Ward gave a brief description of the tragedy which took place in 1813 in Bruckless Bay when 200 sailing yawls were fishing herring and a sudden squall swamped the boats with the loss of 60 lives.  The monument was erected for the bicentennial of the tragedy. From this vantage point Brid gave a brief history of the monuments which were visible in the surrounding area - the McSwyne's Castle, Standing Stones, Stone Rath, Killaghtee Church and the Killaghtee Cross. Helen Meehan then gave an account of the Ulster Plantation in the area.</span></p><span data-dcnode-id="1701" instrument_node="">
</span><img data-dcnode-id="1700" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/point1.jpg&amp;raw"><br data-dcnode-id="1699"><span data-dcnode-id="1698" instrument_node="">
</span><img data-dcnode-id="1697" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/point2.jpg&amp;raw"><br data-dcnode-id="1696"><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">The group then moved on to the remains of the 15 century church at Ballysaggart with its distinctive east gable window and the link between the church and it's founder Niall Mor McSwyne (McSwiney) - one branch of the McSwyne family who were also to be found in Doe and Fanad.  Brid outlined the known history of the church and the adjoining graveyard, the folklore of the removal of the famous McSwyne grave slab to Killybegs in 1868 and the proposed efforts of the heritage committee to repair the church window which is in danger of falling. (The initial phase of this work has now taken place).</span></p><span data-dcnode-id="1692" instrument_node="">
</span><img data-dcnode-id="1691" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/point10.jpg&amp;raw"><br data-dcnode-id="1690"><span data-dcnode-id="1689" instrument_node="">
</span><p data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Finally the group stopped at the deserted village of Pulldugh - a pre-famine settlement of cabins with adjoining school.  Brid was able to give first hand accounts of the people and their lives in this unique settlement - the ruins of which are still visible.  Brid finished with a brief history of the Point lighthouse b. 1831 which is also to be turned into a tourist accommodation for a unique 'Lighthouse Trail' which is to link lighthouses along the coast.  They then adjourned for tea and the weather stayed dry and an enjoyable day was had by all.</span></p><span data-dcnode-id="1686" instrument_node="">
</span><br data-dcnode-id="1685"><hr data-dcnode-id="1684"><span data-dcnode-id="1683" instrument_node="">
</span><p data-dcnode-id="1680"><b data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">July Field Day</span></b></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1678" instrument_node="">
Port Hall, a few miles from Lifford, "one of the finest small houses in the area, built in 1746...presumably by Michael Priestley, the architect of Lifford Courthouse."</span><br data-dcnode-id="1677"><br data-dcnode-id="1676"><span data-dcnode-id="1675" instrument_node="">
Thus writes Alastair Rowan in "The buildings of Ireland." And this was the first venue on our July Field Day as guests of the present owners, the Lusby family.</span><br data-dcnode-id="1674"><br data-dcnode-id="1673"><span data-dcnode-id="1672" instrument_node="">
Belinda Mahaffy, our guide, outlined the history of the house and it certainly has plenty of that. Perhaps its most famous owner was Anthony Marreco (1915-2006), one of the founders of Amnesty International. He imported hand painted wallpaper from Latin America and it still adorns a room in the house. It was a cause of much admiration on our visit. The house also has a fine library where one could spend hours, if not longer, admiring the books and fixtures.</span><br data-dcnode-id="1671"><br data-dcnode-id="1670"><span data-dcnode-id="1669" instrument_node="">
We must stress that the house and grounds are NOT open to the public; this is a private residence. Incidentally, the Historical Society had a most enjoyable evening in this house c.1970 as guests of Mr. Marreco, in which the invited speaker was Dr. J. G. Simms from Trinity College, Dublin who delivered a lecture about the history of Lifford, he being a native of the town, of course.</span><br data-dcnode-id="1668"><br data-dcnode-id="1667"><span data-dcnode-id="1666" instrument_node="">
Then on to the stone circle at Raphoe with Mary Harte was our guide. Mary lives near the stone circle and she has devoted much time and research into finding out as much as she can about it. She has also invited leading academics and experts. The trend of thought, she said, is that the stone circle was an astronomical construction, marking the equinox, but of course we will never know the full facts - the stones quietly hold their secrets. It was certainly most interesting to hear about all the research findings. It must be said that the view from there is spectacular.</span><br data-dcnode-id="1665"><br data-dcnode-id="1664"><span data-dcnode-id="1663" instrument_node="">
Our final stop was St. Eunan's Cathedral (C of I). The Cathedral is one of the great land-marks in the Diamond. It is remarkable in possessing a Consistory Court, dating from 1740, in which the Bishop, as Chief Magistrate, could dispense justice. It is now used as a Baptistry. Belinda detailed many aspects of the Church's history down through the years.
She also  pointed out the many fine stained-glass windows e.g. the Good Shepherd and the Ascension. We also visited the adjoining cemetery to see some of the earliest graves. This Church was featured last year in the UTV programme, "Lesser Spotted Ulster."</span><br data-dcnode-id="1662"><br data-dcnode-id="1661"><span data-dcnode-id="1660" instrument_node="">
The day ended with tea and light refreshments across the road in Friel's Hotel.</span><br data-dcnode-id="1659"><br data-dcnode-id="1658"><span data-dcnode-id="1657" instrument_node="">

</span><p data-dcnode-id="1620"><b data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Tour of St. Eunan's College, Letterkenny,  (June 23rd 2013)</span></b></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1604"><span data-dcnode-id="1618" instrument_node="">Our first Field Day of 2013 was a historical tour of St. Eunan's College, Letterkenny, situated just above the Cathedral honouring the same Donegal saint.</span><br data-dcnode-id="1617"><span data-dcnode-id="1616" instrument_node="">
"The one obvious piece of architecture after the churches in Letterkenny", writes Alastair Rowan in his book The buildings of Ireland. And indeed it is an architectural work of art and craftsmanship.</span><br data-dcnode-id="1615"><span data-dcnode-id="1614" instrument_node="">
Opened in 1906 as a minor seminary with just 12 pupils and providing them with a classical education, today there are 800 pupils on the rolls; later on, extensions were added to the original building in the 1930's and in 1979. At one time it had a huge intake of boarders; today there are none due to the increase in second level schools across the county. </span><br data-dcnode-id="1613"><br data-dcnode-id="1612"><span data-dcnode-id="1611" instrument_node="">

We were welcomed by the Principal, Mr. Chris Darby and our President, An Dr. Oirmh, Pádraig Ó'Baoighill in reply said how much we were looking forward to the afternoon. Unable to attend in person, Mr. Edward Harvey, the co-ordinator of our visit, pre-recorded his speech and said he hoped we would enjoy our tour of the school and its environs.</span><br data-dcnode-id="1610"><span data-dcnode-id="1609" instrument_node="">
Mr. Michael Kelly then spoke to us about the key milestones in the College's history and Mr. Pauric O'Donnell complemented his talk with historic slides e.g. previous Presidents and early photos of the school, including sports' teams.</span><br data-dcnode-id="1608"><span data-dcnode-id="1607" instrument_node="">
We then had an extensive conducted tour of the school. Many of our members were particularly impressed by the lovely chapel. The day ended with tea and refreshments.</span><br data-dcnode-id="1606"><span data-dcnode-id="1605" instrument_node="">
CDHS would like to thank everyone from St. Eunan's College who made us very welcome during what is believed to be our first ever visit to this famous academy.</span></p><br data-dcnode-id="1603"><br data-dcnode-id="1602"><span data-dcnode-id="1601" instrument_node="">

Rory Kavanagh was welcomed to the launch of the 2012 "Donegal Annual" by our President, An Dr. Oirmh. Pádraig Ó Baoighill. As our President said, Rory as a member of the current Donegal GAA team, has already contributed to the sporting history of this county with the winning of the Sam Maguire Cup in Croke Park in September.</span><br data-dcnode-id="1511"><br data-dcnode-id="1510"><span data-dcnode-id="1509" instrument_node="">

Rory then spoke and delivered  a most eloquent speech in which he acknowledged the importance of history in all our lives and he realised through his profession as a teacher the immense value of encouraging his pupils to appreciate their rich history and culture. He really enjoyed the Annual and said that the article on the history of hurling in the county told him much he was unaware of.</span><br data-dcnode-id="1508"><br data-dcnode-id="1507"><span data-dcnode-id="1506" instrument_node="">

After the speeches it was time for tea and light refreshments and an opportunity for photographs and Rory was more than happy to oblige. </span><br data-dcnode-id="1505"><br data-dcnode-id="1504"><span data-dcnode-id="1503" instrument_node="">

The County Donegal Historical Society's 2012 Annual has just been published and among its 160 pages are articles covering every locality in the county. What follows is a dip into this superb publication.</span><br data-dcnode-id="1468"><br data-dcnode-id="1467"><span data-dcnode-id="1466" instrument_node="">

Alastair Lings has carried out extensive research on the history of silica sand quarrying on Muckish mountain, a fascinating insight into how a sophisticated industrialised endeavour impinged on the lives of those in the Ards district and the role of the local landlord - the whole enterprise being dedicated to glass production across the water.</span><br data-dcnode-id="1465"><br data-dcnode-id="1464"><span data-dcnode-id="1463" instrument_node="">

Inishowen features in several articles, eg Archaeology in Inishowen (Henry Doherty); Tip O'Neill's Buncrana links (Leonard Roarty); and William O'Doherty, M.P., North Donegal, 1900-1905 (Seán Beattie).</span><br data-dcnode-id="1462"><br data-dcnode-id="1461"><span data-dcnode-id="1460" instrument_node="">

Ecclesiastical history is thoroughly examined, eg Church of Ireland Parish Churches in the Donegal Group (Canon Harry Trimble); St. Isodore's College, Rome and Donegal (Canon Bernard J. Canning) and Stair Eaglasta Bhaile na Finne ( An tAthair Pádraig Ó Baoighill).</span><br data-dcnode-id="1459"><br data-dcnode-id="1458"><span data-dcnode-id="1457" instrument_node="">

And of course the significance of fishing in the history of the county is recognised with the Bruckless Bay fishing disaster (Aidan Mc Connell) and Fisheries on the Donegal coast, 1836 (Frank Sweeney).</span><br data-dcnode-id="1456"><br data-dcnode-id="1455"><span data-dcnode-id="1454" instrument_node="">

All aspects of Donegal's history are thoroughly catered for. Read here the story of Neal McNamee from Convoy who lost his life on the Titanic. Sports historians will enjoy Martin McGonigle's in-depth research into hurling in Donegal before the time of the GAA. Rev. Raymond Blair writes about an abduction that took place in Fermanagh in 1839, the abductor was Thomas Russell from Castlefinn and the victim was Miss Catherine Hoey from Irvinestown.</span><br data-dcnode-id="1453"><br data-dcnode-id="1452"><span data-dcnode-id="1451" instrument_node="">

Mingled among all those articles are wonderful little gems such as Donegal Design, 1950 by Alan Hemmings. He relates how he decided to set up a small textile enterprise in Dungloe. One of his initial headaches is that all the looms and other equipment ordered from England were transported by mistake to Dunloe, Co. Kerry and took quite a while to reach Donegal. Let's not spoil things by telling you any more than that!</span><br data-dcnode-id="1450"><br data-dcnode-id="1449"><span data-dcnode-id="1448" instrument_node="">

This Annual documents all work of the Society during the year; it's a great credit to Seán Beattie and his editorial team. The cover is a painting of Raphoe Castle in 1800AD by Jane Allott. It is available from major bookshops across the county. Full information about the Society and how to become a member are on the Society's website at www.donegalhistory.com. </span></p><br data-dcnode-id="1446"><br data-dcnode-id="1445"><hr data-dcnode-id="1444"><span data-dcnode-id="1443" instrument_node="">
</span><font data-dcnode-id="1440" size="4"><b data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Field Day on Rutland island,  August 2012</span></b></font><br data-dcnode-id="1439"><br data-dcnode-id="1438"><span data-dcnode-id="1437" instrument_node="">

Rutland island, or Inis Mhic a'Duirn, its original name,  lies a few miles off Burtonport and is a quiet hidden gem these days. Hundreds of years ago, however, it was a bustling, commercial fishing enterprise, a jewel in the crown.
Dr. Pádraig O'Baoighill, our President, welcomed us all to the island and handed proceedings over to Seán Boner, an Arranmore native and our guide for the afternoon. We heard about the island's former landlord, Col. Burton Conyngham who named the island after the then Lord Lieutenant and who is himself immortalised in the mainland village of Burtonport.
In 1784 and 1785, 300 boats landed £40,000 of herrings in each of those years so a street of houses was built on the island for the employees and their families along with ancillary stores to handle the bumper harvest. Fishing vessels from England and Scotland frequented Rutland.</span><br data-dcnode-id="1436"><br data-dcnode-id="1435"><span data-dcnode-id="1434" instrument_node="">
In 1798 a French corvette, the Anacréon, landed and on board was General James Napper Tandy, one of the chief organisers of the United Irishmen along with 180 Frenchmen. This is without doubt the best-known incident in Rutland's history and vividly described by Rupert S. O'Cochlain's article, "Napper Tandy's raid on Rutland in 1798". (Donegal Annual, 1970) We stood at the plaque erected around the spot where he came ashore.  So famous did Napper Tandy become that several years later Napoleon refused to sign a treaty with England until Napper Tandy was safely back on French soil.
Rutland became deserted around the late 1960's and holiday homes are now starting to be seen there, including the original street. Nevertheless, this is a place of stillness and silence these days in contrast to previous centuries, a scenic oasis in this corner of the Rosses.</span><br data-dcnode-id="1433"><br data-dcnode-id="1432"><span data-dcnode-id="1431" instrument_node="">
Seán also outlined for us the fascinating history of its nearest neighbour, Inishcoo, but that's another story or maybe another Field Day.</span><br data-dcnode-id="1430"><br data-dcnode-id="1429"><span data-dcnode-id="1428" instrument_node="">
</span><center data-dcnode-id="127"><img data-dcnode-id="1427" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/rut1.jpg&amp;raw"><br data-dcnode-id="1426"><span data-dcnode-id="1425" instrument_node="">
</span><center data-dcnode-id="128"><img data-dcnode-id="1424" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/rut2.jpg&amp;raw"><br data-dcnode-id="1423"><span data-dcnode-id="1422" instrument_node="">
</span><center data-dcnode-id="129"><img data-dcnode-id="1421" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/rut3.jpg&amp;raw"><br data-dcnode-id="1420"><br data-dcnode-id="1419"><hr data-dcnode-id="1418"><span data-dcnode-id="1417" instrument_node="">
</span><font data-dcnode-id="1414" size="4"><b data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">FIELD DAY IN STRANORLAR, JULY 2012</span></b></font><br data-dcnode-id="1413"><br data-dcnode-id="1412"><span data-dcnode-id="1411" instrument_node="">

Our second Field Day of 2012 was in Stranorlar Parish Church and its adjoining graveyard. Aubrey Oliver, the Church Archivist, was our guide for the occasion.</span><br data-dcnode-id="1410"><br data-dcnode-id="1409"><span data-dcnode-id="1408" instrument_node="">

The Church of Ireland has a long history in this area dating back to the late 1500's. By 1622, the Parish Church is decayed and is being repaired at the parishioners' expense.</span><br data-dcnode-id="1407"><br data-dcnode-id="1406"><span data-dcnode-id="1405" instrument_node="">

Over the centuries the Church has undergone several enlargements and, of course, maintenance, with donations of fittings installed during all this time in memory of parishioners and this continues up to the present. For example, in 2000AD new quarter foil stained glass windows were added and in 2009 a new lighting system was fitted.

The graveyard contains headstones dating back centuries and Aubrey took us around many of the graves. Isaac Butt is buried here (his father Robert was Curate from 1814 to 1829) and also the family of Frances Browne, the blind poetess. (She herself is buried in Richmond upon Thames). Many of those interred here were in military service in Europe and Africa, all now at their rest in the tranquillity of this secluded corner of the Finn valley.</span><br data-dcnode-id="1404"><br data-dcnode-id="1403"><span data-dcnode-id="1402" instrument_node="">

The afternoon ended with light refreshments in the nearby hall. We also had the opportunity to peruse old parish records and the magnificent penmanship skills from more than a century ago was the focus of much praise.  The CDHS would like to thank most sincerely Rev. Tony Adamson, who welcomed us warmly to his Church; Mr. Aubrey Oliver, our guide and the staff of the hall who had tea and refreshments waiting for us at the end of our visit. </span><br data-dcnode-id="1401"><br data-dcnode-id="1400"><span data-dcnode-id="1399" instrument_node="">
</span><center data-dcnode-id="130"><img data-dcnode-id="1398" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/stran2.jpg&amp;raw"><br data-dcnode-id="1397"><span data-dcnode-id="1396" instrument_node="">
</span><center data-dcnode-id="131"><img data-dcnode-id="1395" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/stran1.jpg&amp;raw"><br data-dcnode-id="1394"><span data-dcnode-id="1393" instrument_node="">
</span><center data-dcnode-id="132"><img data-dcnode-id="1392" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/stran3.jpg&amp;raw"><br data-dcnode-id="1391"><br data-dcnode-id="1390"><hr data-dcnode-id="1389"><span data-dcnode-id="1388" instrument_node="">
</span><font data-dcnode-id="1385" size="4"><b data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Isle of Doagh Field Day ( June 24th 2012)</span></b></font><br data-dcnode-id="1384"><br data-dcnode-id="1383"><span data-dcnode-id="1382" instrument_node="">
</span><font data-dcnode-id="133" size="2"><span data-dcnode-id="1381" instrument_node="">Our first Field Day of 2012 was to the Isle of Doagh, near Clonmany, with Marius Harkin and some of his colleagues as our guides. </span><br data-dcnode-id="1380"><br data-dcnode-id="1379"><span data-dcnode-id="1378" instrument_node="">

The first stop was Carrickabraghy castle. Here we stood the foot of one of the O'Doherty castles of Inishowen and were given a most informative talk on its history. Sadly, only part of this 16th century castle now remains. "The view from this spot on a fine summer's evening is singularly beautiful", wrote Maghtochair the local historian over 100 years ago and luckily we were blessed with the weather and able to agree unanimously with his observation.</span><br data-dcnode-id="1377"><br data-dcnode-id="1376"><span data-dcnode-id="1375" instrument_node="">

We also heard about Sir Cahir O'Doherty's sister, Rosa, who left Ireland with the Earls in 1607 and became a most influential leader of the Irish community in Flanders. She died in 1660 and is buried in the Irish Franciscan college in Louvain.</span><br data-dcnode-id="1374"><br data-dcnode-id="1373"><span data-dcnode-id="1372" instrument_node="">

From there we drove back to the Famine Village, dedicated to the history of Ireland from famine times up to the present. This is a most impressive museum, full of artefacts reflecting everyday life in the area especially over the last century and our guide was a mine of knowledge regarding the social history of rural Ireland. A visit of this nature is a stark  reminder of the incredible changes in Ireland in our own time and the rapidity of progress, if indeed progress is the right word for such.</span><br data-dcnode-id="1371"><br data-dcnode-id="1370"><span data-dcnode-id="1369" instrument_node="">

Our afternoon in the Isle of Doagh finished with light refreshments in the café and most welcome too.</span><br data-dcnode-id="1368"><br data-dcnode-id="1367"><hr data-dcnode-id="1366"><span data-dcnode-id="1365" instrument_node="">
</span><font data-dcnode-id="1362" size="4"><b data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Our New President( March 6th 2012)</span></b></font><br data-dcnode-id="1361"><br data-dcnode-id="1360"><span data-dcnode-id="1359" instrument_node="">
</span><center data-dcnode-id="134"><img data-dcnode-id="1358" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/doctor.jpg&amp;raw"><br data-dcnode-id="1357"><span data-dcnode-id="1356" instrument_node="">
Our new President, An Doctor Oirmh. Pádraig Ó Baoighill, elected at this year's AGM on the 6th March last.</span><br data-dcnode-id="1355"><br data-dcnode-id="1354"><span data-dcnode-id="1353" instrument_node="">
</span><center data-dcnode-id="135"><img data-dcnode-id="1352" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/coiste.jpg&amp;raw"><br data-dcnode-id="1351"><span data-dcnode-id="1350" instrument_node="">
The Executive Committee elected at the AGM on the 6th March last.</span><br data-dcnode-id="1349"><br data-dcnode-id="1348"><span data-dcnode-id="1347" instrument_node="">

</span><font data-dcnode-id="1338" size="4"><b data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Launch of 2011 Donegal Annual</span></b></font><br data-dcnode-id="1337"><br data-dcnode-id="1336"><span data-dcnode-id="1335" instrument_node="">
</span><font data-dcnode-id="1321" size="2"><span data-dcnode-id="1334" instrument_node="">

The 2011 Donegal Annual was launched recently in Jackson's Hotel, Ballybofey.  A unique feature of this year's launch was that it was done so by relatives of those who were present when the Society began back in the 1940's.</span><br data-dcnode-id="1333"><br data-dcnode-id="1332"><span data-dcnode-id="1331" instrument_node="">

Editor, Seán Beattie and his team have once again excelled themselves with a truly superb publication. The front cover is a drawing of Dunlewy by James Humbert Craig (1877-1944)  and one of the paintings on the back cover is a dramatic scene of the wreck of the Sydney in 1870 by R. Kent which occurred off Glencolmcille.</span><br data-dcnode-id="1330"><br data-dcnode-id="1329"><span data-dcnode-id="1328" instrument_node="">

A full  list of the contents can be found on the Previous Annuals  section of our website. Members of the Society  always receive this Annual in the post; it is also for sale in shops across the county or it may also be ordered from our Honorary Secretary.</span><br data-dcnode-id="1327"><br data-dcnode-id="1326"><span data-dcnode-id="1325" instrument_node="">

Photo shows (left to right)  Dr. Louchlann McGill;  Eamonn MacIntyre;  Donaill McLaughlin; Dolores O'Kelly;   Ernan Coughlan; Col. Declan O'Carroll, President CDHS and Seán Beattie, Editor of the Annual.</span><br data-dcnode-id="1324"><br data-dcnode-id="1323"><span data-dcnode-id="1322" instrument_node="">

This was the final event in the Society's calendar for 2011, one of the busiest years in its existence. Thanks to all involved who contributed to what has been a truly successful and rewarding year. The next general date for the diary is the AGM in March 2012. </span></font><br data-dcnode-id="1320"><br data-dcnode-id="1319"><center data-dcnode-id="136"><img data-dcnode-id="1318" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/img/launch11.jpg&amp;raw"><br data-dcnode-id="1317"><span data-dcnode-id="1316" instrument_node="">
</span><hr data-dcnode-id="1315"><span data-dcnode-id="1314" instrument_node="">
</span><font data-dcnode-id="1311" size="4"><b data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">County Donegal Historical Society launches its first seven Annuals (1947 to 1953)</span></b></font><br data-dcnode-id="1310"><br data-dcnode-id="1309"><span data-dcnode-id="1308" instrument_node="">
</span><font data-dcnode-id="137" size="2"><span data-dcnode-id="1307" instrument_node="">

"Truly fabulous" was how Donegal County Manager, Mr. Seamus Neely,  described the contents of the book which he launched in the County Council chamber on October 7th, 2011. He was referring  to a major project undertaken by the Historical Society, ie the re-issuing of its first seven annuals in one volume.</span><br data-dcnode-id="1306"><br data-dcnode-id="1305"><span data-dcnode-id="1304" instrument_node="">

Emphasising the importance of the publication, Mr. Neely said that  to understand where we're going we have to know where we've come from in order to establish our identity. He also noted that the Irish diaspora would find the volume of immense value and it would strengthen the bonds among us all, resulting in benefits for the tourism sector.</span><br data-dcnode-id="1303"><br data-dcnode-id="1302"><span data-dcnode-id="1301" instrument_node="">

Little did the founding fathers of the Society realise back at the inaugural meeting in this same chamber in December 1946 how the world would change in the decades to follow. For example, the launch made history in that it was the first event involving the Society to be streamed via live internet TV across the globe. Check the Council's website to see the launch.The early print runs were about 200, mainly in the county; today the Society membership edges towards the 1,000 mark with members all over the world.</span><br data-dcnode-id="1300"><br data-dcnode-id="1299"><span data-dcnode-id="1298" instrument_node="">

Speaker after speaker at the launch praised the Society for its immense contribution to the cultural life of the county, preserving and promoting Donegal's tremendously unique past.</span><br data-dcnode-id="1297"><br data-dcnode-id="1296"><span data-dcnode-id="1295" instrument_node="">

Browse through the pages of these seven annuals, scanned as they first appeared all those years ago, and you'll be in complete appreciation of the range and depth of the articles to be found there. Even the advertisements evoke a wonderful atmosphere of an era long gone.

It is now available in the major bookshops. The good news is if you're far from the county we can send it on. It is available in HARDBACK (40 euro) and PAPERBACK (25 euro). Postage is extra. Click </span><a data-dcnode-id="1293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//donegalhistory.com/order.pdf"><span data-dcnode-id="1294" instrument_node="">here </span></a><span data-dcnode-id="1292" instrument_node=""> for an application form to be returned to our Honorary Secretary, Mrs. Una McGarrigle   087221378.</span><br data-dcnode-id="1291"><br data-dcnode-id="1290"><span data-dcnode-id="1289" instrument_node="">
