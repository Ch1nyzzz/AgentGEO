</span><h2 class="slideTitle" data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">1950-1989: Fight for Freedom</span></h2><span data-dcnode-id="1629" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Protest-for-Baltic-independence.jpg" tabindex="0"><span data-dcnode-id="1628" instrument_node="">
</span><img alt="Protest for Baltic independence" data-dcnode-id="1627" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Protest-for-Baltic-independence.jpg&amp;raw" width="290"><span data-dcnode-id="1626" instrument_node="">
</span></a><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">
            Hundreds of thousands of Estonians, Latvians, and Lithuanians were forced to flee their homelands during World War II and tens of thousands came to America, setting up new lives and organizations in their adopted home. Some older organizations, especially among the Lithuanians, had already existed in the U.S. for decades. With a deep desire to see their homelands become free again, Baltic-Americans also organized politically.


        </span></p><span data-dcnode-id="1621" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Congressional-Record-Liberty-for-Lithuania-Latvia-Estonia-1979.jpg" tabindex="0"><span data-dcnode-id="1620" instrument_node="">
</span><img alt="Congressional Record Liberty for Lithuania-Latvia-Estonia 1979.jpg" data-dcnode-id="1619" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Congressional-Record-Liberty-for-Lithuania-Latvia-Estonia-1979.jpg&amp;raw" width="103"><span data-dcnode-id="1618" instrument_node="">
</span></a><span data-dcnode-id="1616" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/JBANC-declaration-1961.jpg" tabindex="0"><span data-dcnode-id="1615" instrument_node="">
</span><img alt="JBANC declaration 1961" data-dcnode-id="1614" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/JBANC-declaration-1961.jpg&amp;raw" width="95"><span data-dcnode-id="1613" instrument_node="">
</span></a><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">
           Since the 1950s, the Baltic-American community played an active role in efforts to raise awareness about Baltic issues in the United States, and worked with U.S. officials to gather support for the restoration of independence of Estonia, Latvia, and Lithuania.

        </span></p><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">
            One of the milestones was the establishment of the Joint Baltic American National Committee (JBANC) in 1961 by its three parent organizations, the American Latvian Association, the Estonian American National Council, and the Lithuanian American Council. It allowed to better coordinate common efforts, and after regaining independence, one of the most important goals was to work towards NATO membership.
        </span></p><span data-dcnode-id="1605" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Baltic-Freedom-Day-Proclamation.jpg" tabindex="0"><span data-dcnode-id="1604" instrument_node="">
</span><img alt="Baltic Freedom Day Proclamation" data-dcnode-id="1603" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Baltic-Freedom-Day-Proclamation.jpg&amp;raw" width="200"><span data-dcnode-id="1602" instrument_node="">
</span></a><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">
            Some of the examples of the advocacy efforts between the 1950s and 1990 include regular communication with the U.S. Administration and members of the U.S. House of Representatives and Senate, organizing protests, raising awareness in the U.S. media, and recognizing friends and supporters with Baltic Freedom awards. One of the symbolic highlights during this period was the proclamation of June 14 as  Baltic Freedom Day by President Ronald Reagan in the 1980s. A pivotal turning point in the Baltic fight for freedom was the peaceful Baltic Way demonstration on August 23, 1989, which received  widespread international recognition.

        </span></p><span data-dcnode-id="1597" instrument_node="">
</span></div><span data-dcnode-id="1595" instrument_node="">
</span></div><span data-dcnode-id="1593" instrument_node="">
</span></div><span data-dcnode-id="1591" instrument_node="">
</span></div><div class="timelineSlide slick-slide" data-dcnode-id="1535" data-slick-index="1" style="width: 1024px; position: relative; left: -1024px; top: 0px; z-index: 998; opacity: 0; height: 650px;" tabindex="-1"><span data-dcnode-id="1589" instrument_node="">
</span><p class="timelineDate" data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">1990-1991</span></p><span data-dcnode-id="1586" instrument_node="">
</span><div class="slideContent" data-dcnode-id="1537"><span data-dcnode-id="1585" instrument_node="">
</span><div class="mediaWrap" data-dcnode-id="1575"><span data-dcnode-id="1584" instrument_node="">
</span><a class="imageWrap js_imagePopup" data-dcnode-id="1580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/slides/1990-1991.jpg" tabindex="-1"><span data-dcnode-id="1583" instrument_node="">
</span><img alt="1990-1991: Restoring Independence" class="slideImage" data-dcnode-id="1582" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/slides/1990-1991.jpg&amp;raw" style="opacity: 1;"><span data-dcnode-id="1581" instrument_node="">
</span></a><span data-dcnode-id="1579" instrument_node="">
</span><p class="caption" data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Demonstration in Riga, Latvia on May 4, 1990. Photo by Uldis Briedis</span></p><span data-dcnode-id="1576" instrument_node="">
</span></div><span data-dcnode-id="1574" instrument_node="">
</span><div class="contentWrap" data-dcnode-id="1539"><span data-dcnode-id="1573" instrument_node="">
</span><div class="contentInnerWrap" data-dcnode-id="1541" style="max-height: 394.016px;"><span data-dcnode-id="1572" instrument_node="">
</span><h2 class="slideTitle" data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">1990-1991: Restoring Independence</span></h2><span data-dcnode-id="1569" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Estonia-Latvia-Lithuania-freedom.jpg" tabindex="-1"><span data-dcnode-id="1568" instrument_node="">
</span><img alt="Estonia Latvia -Lithuania freedom" class="" data-dcnode-id="1567" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Estonia-Latvia-Lithuania-freedom.jpg&amp;raw" style="opacity: 1;"><span data-dcnode-id="1566" instrument_node="">
</span></a><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">
            Events in 1990 and 1991 marked the end of a half century of occupation of the Baltic countries by the Soviet Union, with the Supreme Councils in Estonia, Latvia, and Lithuania declaring the restoration of independence in each country. International recognition followed.

        </span></p><span data-dcnode-id="1561" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Red-Army-Go-Home-Rally-1990.jpg" tabindex="-1"><span data-dcnode-id="1560" instrument_node="">
</span><img alt="Red Army Go Home Rally 1990" class="" data-dcnode-id="1559" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Red-Army-Go-Home-Rally-1990.jpg&amp;raw" style="opacity: 1;"><span data-dcnode-id="1558" instrument_node="">
</span></a><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">
            Although the restoration of independence in the Baltic countries happened relatively peacefully (witness the “Singing Revolution”), Soviet military actions resulted in the loss of lives and injuries during events in 1991 in the three Baltic countries. 

        </span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">
            The United States never recognized the Soviet occupation of the Baltic countries, famously setting a standard of non-recognition via the Welles Declaration issued on July 23, 1940. This helped Baltic diplomats over the years in their efforts to preserve legitimacy and continue to work in the interests of the Baltic nations. On September 2, 1991, the U.S once again formally recognized the independence of Estonia, Latvia, and Lithuania. 
 
        </span></p><span data-dcnode-id="1550" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/US-Congratulations-Latvia-1991.jpg" tabindex="-1"><span data-dcnode-id="1549" instrument_node="">
</span><img alt="US Congratulations Latvia 1991" class="" data-dcnode-id="1548" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/US-Congratulations-Latvia-1991.jpg&amp;raw" style="opacity: 1;"><span data-dcnode-id="1547" instrument_node="">
</span></a><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">
            During this period, the Baltic Institute (BI) was established in the United States. The BI helped coordinate and support defense and security ties between the U.S. and Baltic countries, and was led by Baltic-Americans with experience in the U.S. military.
        </span></p><span data-dcnode-id="1542" instrument_node="">
</span></div><span data-dcnode-id="1540" instrument_node="">
</span></div><span data-dcnode-id="1538" instrument_node="">
</span></div><span data-dcnode-id="1536" instrument_node="">
</span></div><div class="timelineSlide slick-slide" data-dcnode-id="1438" data-slick-index="2" style="width: 1024px; position: relative; left: -2048px; top: 0px; z-index: 998; opacity: 0; height: 650px;" tabindex="-1"><span data-dcnode-id="1534" instrument_node="">
</span><p class="timelineDate" data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">1992-1993</span></p><span data-dcnode-id="1531" instrument_node="">
</span><div class="slideContent" data-dcnode-id="1440"><span data-dcnode-id="1530" instrument_node="">
</span><div class="mediaWrap" data-dcnode-id="1520"><span data-dcnode-id="1529" instrument_node="">
</span><a class="imageWrap js_imagePopup" data-dcnode-id="1525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/slides/1992-93.jpg" tabindex="-1"><span data-dcnode-id="1528" instrument_node="">
</span><img alt="1992-1993: First steps" class="slideImage slick-loading" data-dcnode-id="1527" data-lazy="/nato/images/slides/1992-93.jpg"><span data-dcnode-id="1526" instrument_node="">
</span></a><span data-dcnode-id="1524" instrument_node="">
</span><p class="caption" data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">NATO Going East. AMMER/Cartoonists &amp; Writers Syndicate</span></p><span data-dcnode-id="1521" instrument_node="">
</span></div><span data-dcnode-id="1519" instrument_node="">
</span><div class="contentWrap" data-dcnode-id="1442"><span data-dcnode-id="1518" instrument_node="">
</span><div class="contentInnerWrap" data-dcnode-id="1444" style="max-height: 394.016px;"><span data-dcnode-id="1517" instrument_node="">
</span><h2 class="slideTitle" data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">1992-1993: First steps</span></h2><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1513" instrument_node="">
</span><b data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">The year 1992</span></b><span data-dcnode-id="1510" instrument_node=""> marked the first steps in renewing meaningful transatlantic ties and starting cooperation with NATO, the United States, and with other allies.
        </span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">
            For instance, in March, NATO Secretary-General Manfred Wörner consulted with Latvian leaders on the withdrawal of Russian troops from Latvia and the protection of Latvian borders. In July, representatives of the US government were invited to participate in a NATO sponsored visit to Latvia.
        </span></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">
            During the year, the administration of the U.S. National Guard prepared a concept paper for National Guard participation in the development of the Latvian Home Guard. The Military Liaison Team concept was established and strong cooperation developed between the Michigan National Guard units with Latvia, the Pennsylvania Guard with Lithuania, and the Maryland Guard with Estonia.  
        </span></p><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">
            In a broader context of  NATO enlargement, the leaders of Czechoslovakia, Poland, and Hungary publicly announced for the first time their desire to seek full NATO membership at the Visegrad Summit in Prague on May 6.  
        </span></p><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1494"><span data-dcnode-id="1498" instrument_node="">
</span><b data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">The year 1993</span></b><span data-dcnode-id="1495" instrument_node=""> marked the establishment of the Central and East European Coalition (CEEC) to counter a perceived faltering of United States policy with regard to the Russian Federation. 
        </span></p><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1492" instrument_node="">
            During a meeting in May, U.S. Deputy Secretary of State Strobe Talbott recalled that Lennart Meri, President of Estonia, </span><em data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">"… was looking down the road to when Russian troops might re-occupy his country since Yeltsin was sure to give way to a more traditional Russian leader. The only way to protect Estonia was with membership in NATO under the American nuclear umbrella."</span></em><span data-dcnode-id="1489" instrument_node="">
</span></p><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1482"><span data-dcnode-id="1486" instrument_node="">
            The U.S. began to  work on a new policy toward Central and Eastern Europe </span><em data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">"…to bolster democracy, reduce trade barriers,  and reward nations undertaking economic reform and developed a guide for the U.S, policy toward NATO.” </span></em><span data-dcnode-id="1483" instrument_node="">
</span></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1480" instrument_node="">
            Significantly, on November 30, U.S. Secretary of State Warren Christopher said at the CSCE Plenary Session in Rome, Italy, that:  </span><em data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">"…We have proposed to our NATO allies a Partnership for Peace that will extend practical security cooperation to the North Atlantic Cooperation Council partners and other European nations. At the same time, we propose to open the door to an evolutionary expansion of NATO membership."</span></em><span data-dcnode-id="1477" instrument_node="">
</span></p><span data-dcnode-id="1475" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/JCTP-group-photo.jpg" tabindex="-1"><span data-dcnode-id="1474" instrument_node="">
</span><img alt="JCTP group photo" class="slick-loading" data-dcnode-id="1473" data-lazy="/nato/images/content/JCTP-group-photo.jpg"><span data-dcnode-id="1472" instrument_node="">
</span></a><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1469" instrument_node="">During 1991-1993, United States European Command (USEUCOM), headquartered in Stuttgart, Germany, played a major role in establishing cooperation programs with the nations that became newly independent after the breakup of the Soviet Union.  Through an interagency process that began in 1990, USEUCOM was tasked with forming teams to develop cooperation programs initially in 12 countries.  The programs’ goals included 
            </span><em data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">"promoting the development of non-political militaries accountable to democratically elected civilian leadership…moving toward friendly security relationships…and helping the military understand U.S. defense policies and Western society,"</span></em><span data-dcnode-id="1466" instrument_node="">  while remaining </span><em data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">"sensitive to democratic civilian concerns and avoid[ing] programs undermining the authority of civilian leadership."</span></em><span data-dcnode-id="1463" instrument_node="">
</span></p><span data-dcnode-id="1461" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Estonia-MLT-4.jpg" tabindex="-1"><span data-dcnode-id="1460" instrument_node="">
</span><img alt="Estonia MLT 4" class="slick-loading" data-dcnode-id="1459" data-lazy="/nato/images/content/Estonia-MLT-4.jpg"><span data-dcnode-id="1458" instrument_node="">
</span></a><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">
            Awareness of Russia’s sensitivities around what it considered to be U.S. expansion into its former territory was another guiding concern. 

        </span></p><span data-dcnode-id="1453" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Estonia-MLT-Stebner.jpg" tabindex="-1"><span data-dcnode-id="1452" instrument_node="">
</span><img alt="Estonia MLT Stebner" class="slick-loading" data-dcnode-id="1451" data-lazy="/nato/images/content/Estonia-MLT-Stebner.jpg"><span data-dcnode-id="1450" instrument_node="">
</span></a><span data-dcnode-id="1448" instrument_node="">
</span><p data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">
            Under USEUCOM’s Joint Contact Team Program (JCTP), Military Liaison Teams were established in Estonia, Latvia, and Lithuania in 1993.  Of the 40 active duty, reserve, and National Guard military personnel who worked for the JCTP or on these teams on behalf of the Baltic nations, at least 15 were Americans of Baltic descent eager for the unique opportunity to serve in their U.S. military capacity while helping  bring their countries of heritage into the Western security fold.  The teams facilitated the National Guard State Partnership programs later that year and eventually evolved into the state National Guard-led Offices of Defense Cooperation that manage military cooperation programs, training, and exchanges today.

        </span></p><span data-dcnode-id="1445" instrument_node="">
</span></div><span data-dcnode-id="1443" instrument_node="">
</span></div><span data-dcnode-id="1441" instrument_node="">
</span></div><span data-dcnode-id="1439" instrument_node="">
</span></div><div class="timelineSlide slick-slide" data-dcnode-id="1374" data-slick-index="3" style="width: 1024px; position: relative; left: -3072px; top: 0px; z-index: 998; opacity: 0; height: 650px;" tabindex="-1"><span data-dcnode-id="1437" instrument_node="">
</span><p class="timelineDate" data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">1994-1995</span></p><span data-dcnode-id="1434" instrument_node="">
</span><div class="slideContent" data-dcnode-id="1376"><span data-dcnode-id="1433" instrument_node="">
</span><div class="mediaWrap" data-dcnode-id="1423"><span data-dcnode-id="1432" instrument_node="">
</span><a class="imageWrap js_imagePopup" data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/slides/1994-95.jpg" tabindex="-1"><span data-dcnode-id="1431" instrument_node="">
</span><img alt="1994-1995: Partnership for Peace" class="slideImage slick-loading" data-dcnode-id="1430" data-lazy="/nato/images/slides/1994-95.jpg"><span data-dcnode-id="1429" instrument_node="">
</span></a><span data-dcnode-id="1427" instrument_node="">
</span><p class="caption" data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">On July 6, 1994, in a historic visit Bill Clinton went to Latvia - first U.S. president in office to do so. Photo by Imants Predelis</span></p><span data-dcnode-id="1424" instrument_node="">
</span></div><span data-dcnode-id="1422" instrument_node="">
</span><div class="contentWrap" data-dcnode-id="1378"><span data-dcnode-id="1421" instrument_node="">
</span><div class="contentInnerWrap" data-dcnode-id="1380" style="max-height: 394.016px;"><span data-dcnode-id="1420" instrument_node="">
</span><h2 class="slideTitle" data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">1994-1995: Partnership for Peace</span></h2><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1416" instrument_node="">
</span><b data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">The year 1994</span></b><span data-dcnode-id="1413" instrument_node=""> marked significant progress in closer Baltic transatlantic integration. On February 14, Estonia, Latvia, and Lithuania joined NATO’s Partnership for Peace (PfP) program. Following that, on March 22 the U.S. allowed the Baltic countries to receive U.S. defense technologies and to participate in the Foreign Military Sales Program.

        </span></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">
            On May 5, The NATO Revitalization Act (H.R. 4358), introduced by Rep. Henry Hyde (R-IL), called for the Administration to “…establish special benchmarks &amp; a timetable for enlargement,” and mentioned the Baltics.
        </span></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">
            On July 6, in a historic visit, President Bill Clinton traveled to Latvia – the first U.S. president in office to do so. During his visit he met with presidents of all three Baltic countries to discuss U.S.-Baltic cooperation and  the Russian troop withdrawal process from the Baltic states. 
        </span></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">
            On July 14, the U.S. Senate adopted the NATO Participation Act by a vote of 76-22. It was introduced by Senators Hank Brown (R-CO), Paul Simon (D-IL), Barbara Mikulski (D-MD), and others. It proposed to make qualified CEE countries eligible to purchase excess defense equipment.
        </span></p><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">
            On July 26, an agreement was signed between Russia and Estonia to withdraw troops from Estonia by August 31, 1994, and paved the way for troop withdrawals from Latvia by the same date. Russian troops had left Lithuania exactly a year earlier.
        </span></p><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">
            On October 7, the U.S. House of Representatives passed the NATO Participation Act of 1994 defining U.S. commitment to expand NATO. Following that, on December 1, Warren Christopher, the U.S. Secretary of State, in an address at the meeting of members of the North Atlantic Council in Brussels, said: “The United States believes it is time to begin the process - to begin deliberate consideration of the practical requirements for adding new members to the Alliance…The process of expansion should be steady, deliberate,  and transparent. Each nation should be considered individually. No country outside of NATO will have a vote over any other.”
        </span></p><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">
           On January 11, 1995, Valdis Birkavs, Minister of Foreign Affairs of Latvia, during a visit to Washington, DC, introduced “Latvia’s ‘Checkerboard’ NATO Integration Plan” to members of the Clinton Administration.
        </span></p><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">
            On January 31, Linas Kojelis, President of the U.S.-Baltic Foundation (USBF) in his letter to Rep. Benjamin Gilman (R-NY), Chairman of the House Committee on International Relations, stressed the importance of the Baltic states to be permitted to join NATO. He also emphasized that “…blockage of Baltic entry into NATO, or making them ‘second class candidates,’ is effectively a veto by Russia.” 
        </span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">
            On February 8, all three presidents of the Baltic states inaugurated the United Nation’s first Baltic peacekeeping battalion.
        </span></p><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">
            On March 24-26, JBANC organized its first “Conference on Baltic Affairs” in Washington, DC. In April, the Latvian Parliament adopted a new foreign policy which included the objective to become a NATO member.
        </span></p><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">
            On November 21, 32 members of the U.S. House of Representatives signed a letter to President Clinton expressing concern over reports that the General Staff of the Russian Armed Forces was considering a new military doctrine that called for moving Russian troops into Estonia, Latvia and Lithuania, if they were to join NATO. On November 22, during a press conference in Riga, U.S. Secretary of Defense William Perry stated that Latvia was making rapid progress and conforming to the five standards NATO had set for new members.
        </span></p><span data-dcnode-id="1381" instrument_node="">
</span></div><span data-dcnode-id="1379" instrument_node="">
</span></div><span data-dcnode-id="1377" instrument_node="">
</span></div><span data-dcnode-id="1375" instrument_node="">
</span></div><div class="timelineSlide slick-slide" data-dcnode-id="1305" data-slick-index="4" style="width: 1024px; position: relative; left: -4096px; top: 0px; z-index: 998; opacity: 0; height: 650px;" tabindex="-1"><span data-dcnode-id="1373" instrument_node="">
</span><p class="timelineDate" data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">1996 Part 1</span></p><span data-dcnode-id="1370" instrument_node="">
</span><div class="slideContent" data-dcnode-id="1307"><span data-dcnode-id="1369" instrument_node="">
</span><div class="mediaWrap" data-dcnode-id="1359"><span data-dcnode-id="1368" instrument_node="">
</span><a class="imageWrap js_imagePopup" data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/slides/1996-part-1.jpg" tabindex="-1"><span data-dcnode-id="1367" instrument_node="">
</span><img alt="1996 - Enlargement takes shape - Part 1" class="slideImage slick-loading" data-dcnode-id="1366" data-lazy="/nato/images/slides/1996-part-1.jpg"><span data-dcnode-id="1365" instrument_node="">
</span></a><span data-dcnode-id="1363" instrument_node="">
</span><p class="caption" data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">The flags of Estonia, Latvia and Lithuania. Photo by Estonian Government</span></p><span data-dcnode-id="1360" instrument_node="">
</span></div><span data-dcnode-id="1358" instrument_node="">
</span><div class="contentWrap" data-dcnode-id="1309"><span data-dcnode-id="1357" instrument_node="">
</span><div class="contentInnerWrap" data-dcnode-id="1311" style="max-height: 394.016px;"><span data-dcnode-id="1356" instrument_node="">
</span><h2 class="slideTitle" data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">1996 - Enlargement takes shape - Part 1</span></h2><span data-dcnode-id="1353" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Letter-NATO-expansion-act.jpg" tabindex="-1"><span data-dcnode-id="1352" instrument_node="">
</span><img alt="Letter NATO expansion act" class="slick-loading" data-dcnode-id="1351" data-lazy="/nato/images/content/Letter-NATO-expansion-act.jpg"><span data-dcnode-id="1350" instrument_node="">
</span></a><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">
            The year 1996 marked increased readiness for the Baltic countries to move towards the goal of joining NATO.

        </span></p><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">
            On January 16 in Riga, Latvia, commanders of the Baltic navies agreed that their fleets would participate in NATO Partnership for Peace exercises to be held in the Baltic Sea in 1996. These exercises included the summer BALTOPS and autumn Baltic Circle operations. In addition, the commanders agreed that in July there would be a joint Baltic navy exercise under the operational name Amber Sea.
        </span></p><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">
            On January 19, an American aeronautics delegation met with Baltic specialists in Riga to discuss Baltic regional airspace control and monitoring. The Americans proposed to upgrade Baltic airspace control systems to align them with Western European standards. Assistance was to  be provided within the context of the NATO Partnership for Peace program.

        </span></p><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">
            On January 24, speaking in Brussels after meeting with NATO Secretary General Javier Solana, Estonia’s Prime Minister Tiit Vähi stated that Russian extremists posed a threat to the security of the Baltic countries. Therefore, concluded Mr. Vähi, NATO should assist the Baltic countries militarily, encourage their military cooperation, and in due course, admit them into NATO. This was to be a strictly defensive measure because Estonian membership in NATO was not to be considered an anti-Russian action, but as a step toward achieving regional stability. 

        </span></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">
            On February 2, the first joint maneuvers of the Baltic Peacekeeping Battalion began at the Ādaži military camp near Riga. This was the first time that soldiers from all three Baltic nations had participated in such maneuvers, which represented a new phase in the development of the battalion, which was scheduled to be ready for deployment in 1997.

        </span></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">
            On February 12, President Clinton in a meeting with representatives from the CEEC said he wouldn`t delay the NATO enlargement timetable, and stated his Administration would respond appropriately if Russia engaged in aggressive behavior. 
        </span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">
            On March 13, Latvian President Guntis Ulmanis told ambassadors from the EU and NATO countries that the existence of Latvia in the modern world cannot be linked to a status of neutrality. Latvia, a small country, cannot hope to maintain its integrity standing alone. Therefore, Latvia must join the states of Europe in matters of trade and security. His wish is that there be a `modern and European-like Latvia` within Europe. On March 20, in a meeting in Prague, U.S. Secretary of State Warren Christopher announced that “NATO has made a commitment to take in new members and it will not keep new democracies in the waiting room forever.”

        </span></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">
            On April 3, Estonian Prime Minister Tiit Vähi stated that in view of the current communist resurgence in Russia, western nations should guarantee the security of those nations left out of NATO, including the Baltic nations.

        </span></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">
            Throughout the process, we also saw attempts of disinformation and scare tactics employed by Russia. For example, on April 11, in an article by Lt. Gen. Valeriy Dementyev and Anton Surikov of the Defense Research Institute of Russia, NATO and the U.S. were labeled as “potential adversaries” and the Baltic states as “enemies.” On April 27, in an interview, Anton Surikov, with the Defense Research Institute of the Russian Federation, stated that “...if NATO expanded to the Baltic states, Russia  would position its troops in the countries; and if the West defended the Baltics, Russia would launch its nuclear weapons.”
        </span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">
            On April 17, NATO Secretary General Javier Solana ended his Baltics visit in Riga by stating at a press conference that NATO membership was still possible for all three Baltic nations, but did not answer questions regarding what type of, if any, protection would be offered to countries left out of NATO. Estonian President Lennart Meri stated that if NATO expansion comes at the expense of the security of other countries, then it follows that NATO will not be fulfilling its purpose.
        </span></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">
            On April 26, at a symposium in Washington, DC, sponsored by the National Confederation of American Ethnic Groups, the ambassadors of the Baltic states (Toomas Hendrik Ilves of Estonia, Ojars Kalnins of Latvia  and Alfonsas Eidintas of Lithuania) discussed NATO expansion and stressed the necessity for the Baltic countries to join NATO.	
        </span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">
            On May 5, delegates to the American Latvian Association (ALA) 45th Annual Congress in DC adopted a resolution calling for the U.S. government “...to introduce a NATO resolution declaring that any attempt to restrict the sovereignty of any democratic country in Central and Eastern Europe by force, threat of force, or economic extortion will be  opposed collectively by the member countries of the NATO alliance by means considered adequate to ensure stability and peace…”
        </span></p><span data-dcnode-id="1312" instrument_node="">
</span></div><span data-dcnode-id="1310" instrument_node="">
</span></div><span data-dcnode-id="1308" instrument_node="">
</span></div><span data-dcnode-id="1306" instrument_node="">
</span></div><div class="timelineSlide slick-slide" data-dcnode-id="1218" data-slick-index="5" style="width: 1024px; position: relative; left: -5120px; top: 0px; z-index: 998; opacity: 0; height: 650px;" tabindex="-1"><span data-dcnode-id="1304" instrument_node="">
</span><p class="timelineDate" data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">1996 Part 2</span></p><span data-dcnode-id="1301" instrument_node="">
</span><div class="slideContent" data-dcnode-id="1220"><span data-dcnode-id="1300" instrument_node="">
</span><div class="mediaWrap" data-dcnode-id="1290"><span data-dcnode-id="1299" instrument_node="">
</span><a class="imageWrap js_imagePopup" data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/slides/1996-part-2.jpg" tabindex="-1"><span data-dcnode-id="1298" instrument_node="">
</span><img alt="1996 - Enlargement takes shape - Part 2" class="slideImage slick-loading" data-dcnode-id="1297" data-lazy="/nato/images/slides/1996-part-2.jpg"><span data-dcnode-id="1296" instrument_node="">
</span></a><span data-dcnode-id="1294" instrument_node="">
</span><p class="caption" data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Capitol Hill, Washington D.C. Photo by Eduards Ozoliņš</span></p><span data-dcnode-id="1291" instrument_node="">
</span></div><span data-dcnode-id="1289" instrument_node="">
</span><div class="contentWrap" data-dcnode-id="1222"><span data-dcnode-id="1288" instrument_node="">
</span><div class="contentInnerWrap" data-dcnode-id="1224" style="max-height: 394.016px;"><span data-dcnode-id="1287" instrument_node="">
</span><h2 class="slideTitle" data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">1996 - Enlargement takes shape - Part 2</span></h2><span data-dcnode-id="1284" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/NATO-enlargement-statement.jpg" tabindex="-1"><span data-dcnode-id="1283" instrument_node="">
</span><img alt="NATO enlargement statement" class="slick-loading" data-dcnode-id="1282" data-lazy="/nato/images/content/NATO-enlargement-statement.jpg"><span data-dcnode-id="1281" instrument_node="">
</span></a><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">
            On June 4, NATO Enlargement Facilitation Act of 1996 (S. 1830, H.R. 3564) bills were introduced by Senator Robert Dole (R-KS) and by Representative Benjamin Gillman (R-NY). 
They amended the NATO Participation Act of 1994 by expediting the transition of emerging democracies in Central and Eastern Europe into full membership in NATO. 
  
        </span></p><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">
            On June 25, the presidents of the three Baltic states (Lennart Meri of Estonia, Guntis Ulmanis of Latvia, Algridas Brazauskas of Lithuania) met with President Bill Clinton at the White House where they “expressed satisfaction with their cooperation through the Partnership for Peace programs…” and also noted “...that NATO enlargement remains on track…”
        </span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">
            On July 1, Russian President Boris Yeltsin, as part of his reelection campaign, stated that Russia will never leave the Baltic region, and that Russia would never permit the Baltic countries to join NATO. Previously he also expressed in a letter to President Clinton that he did not publicly support NATO membership for the Baltics.
        </span></p><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">
            On July 19, Operation Baltic Challenge, the first NATO run land-based military exercises held in the Baltic countries, commenced at the Latvian Army Training Center at Ādaži. United States Marines and National Guard soldiers from three states joined soldiers from the military establishments of Estonia, Latvia, and Lithuania in the maneuvers.
        </span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">
            On July 23, by a vote of 353 to 55, the U.S. House of Representatives passed a bill calling for the expansion of NATO and the granting of up to sixty million dollars to assist the three leading candidates for NATO membership, as well as any other country, as designated by the President. Many House members criticized the Clinton administration for its slowness in fostering NATO expansion.
        </span></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">
            On July 25, the U.S. Senate approved S. 1830, the NATO Enlargement Facilitation Act of 1996 by a vote 81-16. 
        </span></p><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">
            On August 20, the fourth meeting of the Baltic and Nordic foreign ministers convened in Riga, with issues focusing on regional cooperation, Baltic security, and Baltic integration into European and Atlantic structures. Represented at the meeting were the classic ‘3 + 5’ Baltic and Nordic countries: Estonia, Latvia, and, Lithuania, plus, Denmark, Finland, Iceland, Norway, and Sweden...The foreign ministers also agreed there was no substitute for NATO membership for the Baltic countries as far as their security was concerned. 
        </span></p><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">
            On August 28, Germany’s Foreign Minister Klaus Kinkel met with his Baltic counterparts in Leipzig to discuss how to facilitate their entry into both the EU and NATO. The meeting marked the fifth anniversary of the restoration of diplomatic relations between Germany and the three Baltic countries. He not only assured the visitors of German assistance in joining the EU and NATO but also in dealing with their relations with Russia. 
        </span></p><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">
            In September, responding to the statement of U.S. Secretary of Defense William Perry that the Baltic countries were not ready because of their armed forces capabilities, the Baltic presidents promised to make necessary steps to fulfill all NATO membership eligibility requirements.  
        </span></p><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">
            On September 10, Lithuania’s defense council decided to double Lithuania’s defense expenditures in 1997. The move was seen by commentators both as a means to bolster Lithuania’s campaign to join NATO and also as a necessary step due to recent signals from the West that NATO admission may not be forthcoming, and that the Baltic nations may be left to fend for themselves.  
        </span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">
            On September 28, in the wake of comments by the U.S. Defense Secretary William Perry on the previous day, the three Baltic presidents issued a joint statement stating that the Baltic nations would make a renewed commitment to gain NATO membership as soon as possible by intensifying diplomatic efforts and making necessary sacrifices to upgrade their military forces to meet NATO standards and to defend themselves better.
        </span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">
            On September 30, President Clinton signed an omnibus appropriations act into law, which included an amendment to the NATO Enlargement Facilitation Act of 1996 and a statement that the forcible incorporation of the Baltics into the USSR should not be a disadvantage to their NATO aspirations.
        </span></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">
            On October 10, NATO Secretary General Javier Solana, speaking in Denmark, echoed  Secretary Perry, stated that the Baltic nations have not been ruled out as candidates for NATO membership. 
        </span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">
            On October 16, Valdis Pavlovskis of the Baltic American Freedom League met with Daniel Fried, Special Assistant to the President on Central and Eastern Europe) to discuss Baltic security, NATO enlargement, Baltic-Russian relations and the U.S. role. 
        </span></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">
            In Brussels, in a speech before delegates from each NATO member nation, Lithuanian President Algridas Brazauskas made a strong pitch to the assembly for Lithuania’s admission to NATO. Brazauskas urged that such admission would go towards repairing the historical wrong of Western Europe standing by while the Soviet Union annexed Lithuania in 1940. 
        </span></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">
            On October 26, representatives of seven Baltic American organizations participated in a meeting held at the White House to discuss Baltic security and the importance of  U.S. efforts to stabilize the region. Members of the meeting were presented with copies of the U.S/. Department of State “Baltic Action Plan” on the integration of the Baltic countries into the West outlining multilateral, neighborly, and bilateral relations.
        </span></p><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">
            On November 1, the U.S. Committee to Expand NATO, committed to the admission of additional European nations to NATO, was incorporated as a DC-based non-profit. Its goal was to seek bipartisan political and public support for NATO enlargement. The group strongly believed that a united, democratic, and free Europe wouldn’t need to rely on American troops.
        </span></p><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">
            On November 26, during a summit in Riga, the Baltic presidents issued a joint declaration confirming Baltic determination to work for NATO membership.

        </span></p><span data-dcnode-id="1225" instrument_node="">
</span></div><span data-dcnode-id="1223" instrument_node="">
</span></div><span data-dcnode-id="1221" instrument_node="">
</span></div><span data-dcnode-id="1219" instrument_node="">
</span></div><div class="timelineSlide slick-slide" data-dcnode-id="1066" data-slick-index="6" style="width: 1024px; position: relative; left: -6144px; top: 0px; z-index: 998; opacity: 0; height: 650px;" tabindex="-1"><span data-dcnode-id="1217" instrument_node="">
</span><p class="timelineDate" data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">1997</span></p><span data-dcnode-id="1214" instrument_node="">
</span><div class="slideContent" data-dcnode-id="1068"><span data-dcnode-id="1213" instrument_node="">
</span><div class="mediaWrap" data-dcnode-id="1206"><span data-dcnode-id="1212" instrument_node="">
</span><a class="imageWrap js_imagePopup" data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/slides/1997.jpg" tabindex="-1"><span data-dcnode-id="1211" instrument_node="">
</span><img alt="1997" class="slideImage slick-loading" data-dcnode-id="1210" data-lazy="/nato/images/slides/1997.jpg"><span data-dcnode-id="1209" instrument_node="">
</span></a><span data-dcnode-id="1207" instrument_node="">
</span></div><span data-dcnode-id="1205" instrument_node="">
</span><div class="contentWrap" data-dcnode-id="1070"><span data-dcnode-id="1204" instrument_node="">
</span><div class="contentInnerWrap" data-dcnode-id="1072" style="max-height: 394.016px;"><span data-dcnode-id="1203" instrument_node="">
</span><h2 class="slideTitle" data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">1997</span></h2><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">
            On January 21, Representative Gerald B.H. Solomon (R-NY) introduced H.Con.Res. 10 advocating for early membership in NATO for the Baltics, which was supported by 42 co-sponsors.  
        </span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">
            On February 12, the Embassy of the Russian Federation discussed Russia`s long-term policy towards the Baltics by stating: “The entry of Baltic countries into NATO would become a serious barrier between these states and Russia, [and, ed.] would have an extremely negative impact on the prospects of formation of a long-term model of constructive cooperation in the region.” 
        </span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">
            On March 5, the President Boris Yeltsin of Russia warned the rest of Europe about the supposed danger of eastward NATO expansion. He threatened that “no one in Europe could ever feel secure,” while also “insisting that Russia had no imperialism designs on the three Baltic countries.” 

        </span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">
            On March 18, the Baltic American Freedom League (BAFL) sent a letter to President Clinton asking him to tell President Yeltsin to stop falsely accusing and threatening the Baltics, as well as to reiterate support of the Baltics. 
        </span></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">
            On March 21, during the Helsinki summit, President Yeltsin had asked President Clinton “for private assurance that NATO should not bring in former captive Soviet republics.” Following this exchange, President Clinton told reporters “NATO enlargement at the Madrid summit will proceed and President Yeltsin made it clear that he thinks it’s a mistake.” 
        </span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">
            On March 22, in a reference to the recent summit, Russian Foreign Minister Yevgeni Primakov stated “I hope the Baltic states will not join NATO, because this would shatter the whole relationship between Russia and NATO.”  
        </span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">
            On April 3, the defense ministers of the Baltic states met in Vilnius to sign a mutual cooperation communique. An Estonian spokesman warned that the signing of the communique should “not be interpreted to be the formation of a defense union” but instead “is designed to increase the changes of NATO admission for the three Baltic nations.” 
        </span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">
            An editorial, published on April 9 in the Washington Post, argued that Baltic nations “should be admitted to NATO as they more than other nations need NATO protection from Russia.” 
        </span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">
            On April 24, Representative Benjamin A Gilman (R-NY) introduced the European Security Act of 1997 (H.R. 1431) seeking to ensure that NATO`s door will remain open and recommending that the Baltics gain membership when they satisfy all pre-conditions. Also on April 24, the ambassadors to the United States from the Baltics testified at the Helsinki Commission hearings on NATO admission in Washington, DC The co-chairman of the commission, Senator Alfonse D`Amato of New York “stated he favors admission of all three Baltic nations into NATO at the July summit in Madrid.”  
        </span></p><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">
            On May 14, Russia declared that it would “reconsider the [NATO-Russia Charter] agreement if the Baltics were to be considered as candidates for NATO membership.” Though Baltic government officials “welcomed with caution” the agreement that was reached between NATO and Russia, Latvia`s Foreign Ministry also gave approval “so long as [NATO and Russia] do not use Baltic membership as a bargaining chip.”  
        </span></p><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">
            On May 23, Senator Slade Gorton (R-WA) introduced S.Con.Res.29, a companion resolution to Representative Solomon`s H.Con.Res.10 supporting early NATO membership. 
 
        </span></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">
            On May 27, The NATO-Russia Founding Act was signed in Paris. The Act specified that Russia: a) “had a voice, not a veto,” b) “will not be a part of the North Atlantic Council,” c) “statements in the Act concerning NATO’s unclear and conventional posture policies were unilateral NATO statements,” and d) “NATO can use this forum to raise its own concerns with Russia.” That same day, the three Baltic presidents met with the presidents of Poland and Ukraine in Tallinn, where they “discussed regional cooperation, security, and European integration.” They also “expressed approval for the signing of the Founding Act.” 
        </span></p><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">
            On June 11, the European Security Act of 1997 was reintroduced by Representative Benjamin A Gilman (R-NY) on June 3 as H.R. 1758. It passed by voice vote and was incorporated into the State Department Authorization Act (H.R. 1757). The Act called for Baltic membership into NATO as early as possible and designated the Baltic countries for NATO transition assistance. It did not pass until October 21, 1998. 
        </span></p><span data-dcnode-id="1161" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/JBANC%2520Chronicle%2520Summer%2520%2797%2520.jpg" tabindex="-1"><span data-dcnode-id="1160" instrument_node="">
</span><img alt="JBANC Chronicle Summer '97" class="slick-loading" data-dcnode-id="1159" data-lazy="/nato/images/content/JBANC Chronicle Summer '97 .jpg"><span data-dcnode-id="1158" instrument_node="">
</span></a><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">
            On June 13, before meeting with Latvian Foreign Minister Valdis Birkavs, U.S. Secretary of State Madeleine Albright stated “that Latvia had a chance of joining NATO after the first round of expansion.” Minister Birkavs stated that “he hoped that NATO expansion would be like the Olympics, an event which comes around every two or four years, and not like the Hale-Bopp Comet, which occurs once in a lifetime.” 
        </span></p><span data-dcnode-id="1153" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/JBANC%2520PR%2520Clinton%2520Admin.%2520Names%2520New%2520NATO%2520count_pledges%2520commitment%2520June%252013%2C%252097%2520.jpg" tabindex="-1"><span data-dcnode-id="1152" instrument_node="">
</span><img alt="JBANC PR Clinton Admin. Names New NATO count_pledges commitment June 13, 97" class="slick-loading" data-dcnode-id="1151" data-lazy="/nato/images/content/JBANC PR Clinton Admin. Names New NATO count_pledges commitment June 13, 97 .jpg"><span data-dcnode-id="1150" instrument_node="">
</span></a><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">
            On June 16, Senators Dick Durbin (D-IL) and Slade Gorton (R-WA) incorporated S.Con.Res. 29, introduced on May 23, into the State Department Authorization bill (S.903). 
        </span></p><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">
            On June 17, the U.S. Senate passed the State Department Authorization Act S.903 (H.R. 1757), by a vote of 90-5. The bill included a 180-day military assistance eligibility amendment of $20 million to the Baltics to upgrade their defense forces. 
        </span></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">
            On June 23, U.S. Deputy Assistant Secretary of State, Ronald Asmus, in a visit to Tallinn, discussed the proposal of the U.S.-Baltic Charter with Estonian, Latvian, and Lithuanian officials.  
        </span></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">
            On June 26, while in Riga, Deputy Assistant Secretary of State Asmus, stated “the U.S. would not recommend a timetable for any nation’s admission to NATO until that nation fully achieves qualification for NATO membership.” 
        </span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">
            At the Madrid Summit, from July 7-9, members of NATO extended invitations to Poland, Hungary, and the Czech Republic to join NATO. In the invitation, the Baltics were regarded as “aspiring members.” 
        </span></p><span data-dcnode-id="1133" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/NATO%2520or%2520bust%2520the%2520road%2520to%2520Madrid%2520BT%2520July%25203-9%2C%252097%2520.jpg" tabindex="-1"><span data-dcnode-id="1132" instrument_node="">
</span><img alt="NATO or bust the road to Madrid BT July 3-9, 97" class="slick-loading" data-dcnode-id="1131" data-lazy="/nato/images/content/NATO or bust the road to Madrid BT July 3-9, 97 .jpg"><span data-dcnode-id="1130" instrument_node="">
</span></a><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">
            On July 18, British Prime Minister Tony Blair sent a letter to Estonian President Meri to express his support for the Baltic`s aspirations to join the European Union and NATO. 
        </span></p><span data-dcnode-id="1125" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/WH%2520Berger%2520letter%2520to%2520Koiva%2520July%252029%2C%252097%2520.jpg" tabindex="-1"><span data-dcnode-id="1124" instrument_node="">
</span><img alt="WH Berger letter to Koiva July 29, 97" class="slick-loading" data-dcnode-id="1123" data-lazy="/nato/images/content/WH Berger letter to Koiva July 29, 97 .jpg"><span data-dcnode-id="1122" instrument_node="">
</span></a><span data-dcnode-id="1120" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Senate%2520passes%2520For.%2520Ops.%2520Approps.%2520Act%2520Jul%252018%2C%252097%2520.jpg" tabindex="-1"><span data-dcnode-id="1119" instrument_node="">
</span><img alt="Senate passes For. Ops. Approps. Act Jul 18, 97" class="slick-loading" data-dcnode-id="1118" data-lazy="/nato/images/content/Senate passes For. Ops. Approps. Act Jul 18, 97 .jpg"><span data-dcnode-id="1117" instrument_node="">
</span></a><span data-dcnode-id="1115" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/NATO%2520summit%2520reviewed%2520in%2520good%2520humor%2520BT%2520July%252017-23%2C%252097%2520.jpg" tabindex="-1"><span data-dcnode-id="1114" instrument_node="">
</span><img alt="NATO summit reviewed in good humor BT July 17-23, 97" class="slick-loading" data-dcnode-id="1113" data-lazy="/nato/images/content/NATO summit reviewed in good humor BT July 17-23, 97 .jpg"><span data-dcnode-id="1112" instrument_node="">
</span></a><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">
            On September 7, the Cooperative Best Effort `97, a Partnership for Peace training exercise, started in Latvia, in which 800 soldiers participated from fourteen countries. Latvian Defense Minister Tālavs Jundzis stated “the exercises will help Latvia`s Armed Forces to achieve greater integration into NATO military structures.” 
        </span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">
            On September 9,  a joint statement by Richard Holbrooke, Jeane Kirkpatrick, Anthony Lake and Paul Wolfowitz gave support to NATO expansion as a means to “strengthen the alliance, reinforce new democracies, renew the American commitment to Europe, and reaffirm American leadership.” 
        </span></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">
            On September 23, some anti-NATO deputies in the Russian Duma launched a verbal attack against the Baltic countries, singling out Latvia for proposed economic sanctions. 
        </span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">
            On October 7, Joint Baltic American National Committee (JBANC) representatives met with Susan Eisenhower, of the Center for Political and Strategic Studies and a leading NATO enlargement skeptic, to discuss opposition to NATO expansion. In her opinion, NATO expansion would decrease Allied security and European stability. 
        </span></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">
            On October 9, Former National Security Advisor Zbigniew Brzezinski stated that “NATO expansion is central to the vitality of the American European connection, to the scope of a democratic and secure Europe, and to the ability of America and Europe to work together in promoting international security.” 
        </span></p><span data-dcnode-id="1095" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Durbin_Gorton%2520Senate%2520letter%2520to%2520Albright%2520Oct%25208%2C%252097%2520.jpg" tabindex="-1"><span data-dcnode-id="1094" instrument_node="">
</span><img alt="Durbin_Gorton Senate letter to Albright Oct 8, 97" class="slick-loading" data-dcnode-id="1093" data-lazy="/nato/images/content/Durbin_Gorton Senate letter to Albright Oct 8, 97 .jpg"><span data-dcnode-id="1092" instrument_node="">
</span></a><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">
            On November 5, President of the Estonian American National Council, Mati Kõiva, testified on behalf of the Joint Baltic American National Committee (JBANC) at the Senate Foreign Relations Committee hearing on NATO enlargement. The Baltic American Freedom League (BAFL) submitted a policy statement to the SFRC, along with testimonies from the Lithuanian American Community and the U.S.-Baltic Foundation. 
        </span></p><span data-dcnode-id="1087" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Debate%2520on%2520NATO%2520Enlargement%2520Hearings%2520Comm.%2520on%2520For.%2520Rel.%2520Senate%2520Oct.%2520%2797%2520.jpg" tabindex="-1"><span data-dcnode-id="1086" instrument_node="">
</span><img alt="Debate on NATO Enlargement Hearings Comm. on For. Rel. Senate Oct. '97" class="slick-loading" data-dcnode-id="1085" data-lazy="/nato/images/content/Debate on NATO Enlargement Hearings Comm. on For. Rel. Senate Oct. '97 .jpg"><span data-dcnode-id="1084" instrument_node="">
</span></a><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">
            On November 14, the Foreign Operations Appropriations Act passed in Congress. The Act included $18.3 million in assistance for the Baltics to upgrade their defense structures, as well as $485 million of Support for East European Democracy funding, including some funding for the Baltics.  
        </span></p><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">
            On December 3, Russian President Boris Yeltsin, in Stockholm before the Swedish parliament, announced “Russia would reduce the size of its military forces in northwest Russia, in hopes of convincing the Baltic nations not to join NATO.” 
        </span></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">
            On December 4, the U.S. State Department issued a statement indicating that while President Yeltsin`s troop reduction announcement was a positive sign, the Baltics should not feel coerced to abandon their efforts to join NATO. 
        </span></p><span data-dcnode-id="1073" instrument_node="">
</span></div><span data-dcnode-id="1071" instrument_node="">
</span></div><span data-dcnode-id="1069" instrument_node="">
</span></div><span data-dcnode-id="1067" instrument_node="">
</span></div><div class="timelineSlide slick-slide" data-dcnode-id="957" data-slick-index="7" style="width: 1024px; position: relative; left: -7168px; top: 0px; z-index: 998; opacity: 0; height: 650px;" tabindex="-1"><span data-dcnode-id="1065" instrument_node="">
</span><p class="timelineDate" data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">1998</span></p><span data-dcnode-id="1062" instrument_node="">
</span><div class="slideContent" data-dcnode-id="959"><span data-dcnode-id="1061" instrument_node="">
</span><div class="mediaWrap" data-dcnode-id="1054"><span data-dcnode-id="1060" instrument_node="">
</span><a class="imageWrap js_imagePopup" data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/slides/1998.jpg" tabindex="-1"><span data-dcnode-id="1059" instrument_node="">
</span><img alt="1998" class="slideImage slick-loading" data-dcnode-id="1058" data-lazy="/nato/images/slides/1998.jpg"><span data-dcnode-id="1057" instrument_node="">
</span></a><span data-dcnode-id="1055" instrument_node="">
</span></div><span data-dcnode-id="1053" instrument_node="">
</span><div class="contentWrap" data-dcnode-id="961"><span data-dcnode-id="1052" instrument_node="">
</span><div class="contentInnerWrap" data-dcnode-id="963" style="max-height: 394.016px;"><span data-dcnode-id="1051" instrument_node="">
</span><h2 class="slideTitle" data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">1998</span></h2><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">
            On January 6, on the eve of the signing of the U.S.-Baltic Charter, Deputy Secretary of State Strobe Talbott, and other administration officials, met with members of the Central and East European Coalition (CEEC), the American Latvian Association (ALA), the Joint Baltic American National Committee (JBANC) and other Baltic organizations. 
        </span></p><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">
            On January 16, the U.S.-Baltic Partnership Charter was signed in Washington, DC, which committed all sides to work toward the inclusion of the Baltic states in Euro-Atlantic institutions. Presidents Clinton, Meri, Ulmanis, and Brazauskas signed the Charter. After the signing of the Charter, President Clinton declared that this “furthers America`s commitment to help. 
        </span></p><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">
            On January 23, Russia`s Duma passed a resolution calling NATO expansion “the biggest threat to Russia since the end of World War II.”  
        </span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">
            On February 27, Senator John Warner (R-VA), the Chairman of the Armed Services Committee, and Ranking Member of the Committee, Senator Carl Levin (D-MI) proposed “a moratorium on NATO’s further enlargement for three years.” In response, the Baltic American Freedom League (BAFL) sent letters to Senator Warner and other members opposing the moratorium. 

        </span></p><span data-dcnode-id="1036" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Dept.%2520of%2520State%2520Comm.%2520Meeting%2520on%2520NATO%2520Enlargemetn%2520Ratification%2520Jan%252022%2C%252098%2520.jpg" tabindex="-1"><span data-dcnode-id="1035" instrument_node="">
</span><img alt="Dept. of State Comm. Meeting on NATO Enlargemetn Ratification Jan 22, 98" class="slick-loading" data-dcnode-id="1034" data-lazy="/nato/images/content/Dept. of State Comm. Meeting on NATO Enlargemetn Ratification Jan 22, 98 .jpg"><span data-dcnode-id="1033" instrument_node="">
</span></a><span data-dcnode-id="1031" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Virginia%2520Balts%2520JBANC%2520letter%2520Feb%25206%2C%2520%2798%2520.jpg" tabindex="-1"><span data-dcnode-id="1030" instrument_node="">
</span><img alt="Virginia Balts JBANC letter Feb 6, '98" class="slick-loading" data-dcnode-id="1029" data-lazy="/nato/images/content/Virginia Balts JBANC letter Feb 6, '98 .jpg"><span data-dcnode-id="1028" instrument_node="">
</span></a><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">
            On March 20, the Minnesota Legislature adopted resolutions supporting the admission of the Baltics to NATO. An American-Latvian constituent from Minnesota, Lia Ozols, was the driving force behind passing the resolutions. 
        </span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">
            
            On March 26, the House of Representatives passed the Appropriations Conference Committee report for the State Department Authorization Act of 1998 (H.R. 1757), which designated the Baltic as eligible to receive assistance under the NATO Participation Act of 1994. It also included a provision urging full membership once all countries fulfilled their requirements.
 
        </span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">
            On March 27, the French Embassy in Vilnius denied Russian press reports that French President Chirac had expressed opposition to Baltic membership in NATO during the “troika” summit. The reports were based on statements by a presidential  spokesman who claimed that President Chirac had “made it clear” that he opposed Baltic admission to NATO. The embassy stated that this was “absolutely wrong” and that “words were improperly attributed” to President Chirac. 
        </span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">
            On April 30, the U.S. Senate approved, by a vote of 80-19, the NATO Accession Treaty (Treaty No: 105-36) for Poland, Hungary, and the Czech Republic without Senator Warner`s February 27th amendment. Senators Jeff Bingaman (D-NM) and Daniel Moynihan (D-NY) were also among others in support of Senator Warner`s amendment, which would have limited any future possibilities for Baltic accession to NATO. 

        </span></p><span data-dcnode-id="1014" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Sen%2520votes%252080-19%2520to%2520Enlarge%2520NATO%2520May%25201%2C%252098%2520.jpg" tabindex="-1"><span data-dcnode-id="1013" instrument_node="">
</span><img alt="Sen votes 80-19 to Enlarge NATO May 1, 98" class="slick-loading" data-dcnode-id="1012" data-lazy="/nato/images/content/Sen votes 80-19 to Enlarge NATO May 1, 98 .jpg"><span data-dcnode-id="1011" instrument_node="">
</span></a><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">
            On May 15, Baltic diplomats and Baltic Americans met to exchange information about how to speed up Baltic membership in NATO. In an interview with the Guardian, Russian president Yeltsin stated that “in NATO expansion, there is a red line for Russia which should not be crossed...otherwise, European stability might not withstand the new tension.” An EMOR poll in Estonia showed that 50 percent of Estonian citizens were in support of NATO membership and 35 percent were opposed. 
        </span></p><span data-dcnode-id="1006" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="1002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/NATO%2520Expansion%2520in%2520US%2520interest%2520Sunday%2520News%2520Leader%2520May%252024%2C%2520%2798%2520.jpg" tabindex="-1"><span data-dcnode-id="1005" instrument_node="">
</span><img alt="NATO Expansion in US interest Sunday News Leader May 24, '98" class="slick-loading" data-dcnode-id="1004" data-lazy="/nato/images/content/NATO Expansion in US interest Sunday News Leader May 24, '98 .jpg"><span data-dcnode-id="1003" instrument_node="">
</span></a><span data-dcnode-id="1001" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/US%2520Comm%2520to%2520Expand%2520NATO%2520Facsimile%2520Transmission%2520from%2520Bruce%2520Jackson%2520March%252017%2C%2520%2798%2520.jpg" tabindex="-1"><span data-dcnode-id="1000" instrument_node="">
</span><img alt="US Comm to Expand NATO Facsimile Transmission from Bruce Jackson March 17, '98" class="slick-loading" data-dcnode-id="999" data-lazy="/nato/images/content/US Comm to Expand NATO Facsimile Transmission from Bruce Jackson March 17, '98 .jpg"><span data-dcnode-id="998" instrument_node="">
</span></a><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">
            On July 9, the Joint Baltic American National Committee (JBANC) and the Baltic American Freedom League jointly urged Senator Robert Livingston (R-LA), Chairman of the Senate Appropriations Committee, to support the continuation of $18.3 million in Foreign Military Financing grant assistance to the Baltics and $650,000 for each Baltic country for International Military Education and Training programs. 
        </span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">
            On July 15, U.S. Senate European Affairs Subcommittee Chairman Gordon Smith (R-OR) conducted a hearing on the Baltics and U.S.-Baltic Policy.  
        </span></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">
