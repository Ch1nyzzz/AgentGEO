            On August 5, U.S. Representatives John Shimkus (R-IL) and Dennis Kucinich (D-OH) introduced H.Con.Res.320 condemning the Hitler-Stalin Pact of 1939 and urging the President and Secretary of State to “ensure that Russia understands that the Nazi-Soviet Pact of Non-Aggression should be considered illegal and null and void.” 

        </span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">
            On October 15, President of Latvia, Guntis Ulmanis, in an address at the Intensified Dialogue meeting with the North Atlantic Council in Brussels states “NATO and EU membership has been, is and will remain our highest strategic priority.” While in Brussels, President  Ulmanis met and spoke with NATO officials, presenting Latvia’s plan to join NATO. 

        </span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">
            On October 20, the House of Representatives passed the Omnibus Appropriations Bill, which included military-related funding for the Baltic states. 
        </span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">
            On October 21, the U.S. Senate passed the Omnibus Appropriations Bill. The legislation allocated $15.3 million for military assistance (FMF) for the Baltics. It also included the European Security of 1997, which was signed into law (Public Law No: 105-277) by President Clinton that same day. 
        </span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">
            On October 24, in an article, Zbigniew Brzezinski stated that “Lithuania and Slovenia should be seriously considered as candidates for NATO admission in the next round of NATO admissions. He stated “that while Lithuania has managed to fulfill requirements for such admission, at the same time Latvia and Estonia have not.”  
        </span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">
            On December 2, NATO`s commander of Central Europe General Joachim Spiering and NATO Northwest Europe Air Chief Marshall John Chesire visited Estonia. Spiering stated that “while NATO recommends that applicant nations spend 2% of GDP on defense such is not a requirement...only a recommendation, and other factors were more important in judging membership eligibility.” 
        </span></p><span data-dcnode-id="972" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Russia%2520steps%2520up%2520its%2520anti-NATO%2520campaign%2520BT%2520Dec%252017-30%2C%252098%2520.jpg" tabindex="-1"><span data-dcnode-id="971" instrument_node="">
</span><img alt="Russia steps up its anti-NATO campaign BT Dec 17-30, 98" class="slick-loading" data-dcnode-id="970" data-lazy="/nato/images/content/Russia steps up its anti-NATO campaign BT Dec 17-30, 98 .jpg"><span data-dcnode-id="969" instrument_node="">
</span></a><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">
            On December 16, Latvian President Guntis Ulmanis and Defense Minister Ģirts Kristovskis criticized the Latvian government`s plan to cut defense spending, noting that defense spending should be at the previously planned figure of 1% of GDP. They noted that such a cut in spending would harm Latvia’s chances of gaining NATO membership. 
        </span></p><span data-dcnode-id="964" instrument_node="">
</span></div><span data-dcnode-id="962" instrument_node="">
</span></div><span data-dcnode-id="960" instrument_node="">
</span></div><span data-dcnode-id="958" instrument_node="">
</span></div><div class="timelineSlide slick-slide" data-dcnode-id="896" data-slick-index="8" style="width: 1024px; position: relative; left: -8192px; top: 0px; z-index: 998; opacity: 0; height: 650px;" tabindex="-1"><span data-dcnode-id="956" instrument_node="">
</span><p class="timelineDate" data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">1999</span></p><span data-dcnode-id="953" instrument_node="">
</span><div class="slideContent" data-dcnode-id="898"><span data-dcnode-id="952" instrument_node="">
</span><div class="mediaWrap" data-dcnode-id="942"><span data-dcnode-id="951" instrument_node="">
</span><a class="imageWrap js_imagePopup" data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/slides/1999.jpg" tabindex="-1"><span data-dcnode-id="950" instrument_node="">
</span><img alt="1999" class="slideImage slick-loading" data-dcnode-id="949" data-lazy="/nato/images/slides/1999.jpg"><span data-dcnode-id="948" instrument_node="">
</span></a><span data-dcnode-id="946" instrument_node="">
</span><p class="caption" data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">One of the JBANC publications dedicated to the enlargement efforts, February, 1999</span></p><span data-dcnode-id="943" instrument_node="">
</span></div><span data-dcnode-id="941" instrument_node="">
</span><div class="contentWrap" data-dcnode-id="900"><span data-dcnode-id="940" instrument_node="">
</span><div class="contentInnerWrap" data-dcnode-id="902" style="max-height: 394.016px;"><span data-dcnode-id="939" instrument_node="">
</span><h2 class="slideTitle" data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">1999</span></h2><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">
            In January, according to a draft resolution proposed in the United States Senate, it was recommended that all three Baltic countries be invited to become full status members of NATO. The text of the resolution, formally submitted by Senator William Durbin (D-IL), referred to the Baltic countries as ”undergoing a historic process of democratic and free-market transformation after emerging from decades of brutal Soviet occupation.” Their governments were said to have made “consistent progress” toward qualifying for NATO membership through civilian control of their military establishments and through participation in Partnership for Peace (PfP) programs and NATO peace support operations, and were deserving  of commendation. The Baltic countries were further said to be in compliance with NATO guidelines and criteria for membership, would prove to be assets to NATO, and as such, be ‘contributors to the stability, freedom, and peace in the Baltic region and Europe as a whole.”

        </span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">
            On March 5-6, the third Conference on Baltic Security organized by JBANC took place in Washington, DC, featuring several panels, one devoted to Baltic candidacy for NATO membership. A nine-point Joint Declaration of Baltic-American organizations urged President Clinton’s administration and Congress to “...insist Russia stop false verbal attacks and covert action against the Baltic countries in what is obvious pressure to dissuade NATO from considering them for membership.” 
 
        </span></p><span data-dcnode-id="930" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/BATUN%2520sticker%2520March%25201999%2520.jpg" tabindex="-1"><span data-dcnode-id="929" instrument_node="">
</span><img alt="BATUN sticker March 1999" class="slick-loading" data-dcnode-id="928" data-lazy="/nato/images/content/BATUN sticker March 1999 .jpg"><span data-dcnode-id="927" instrument_node="">
</span></a><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">
            On April 22, in Washington DC, the three Baltic presidents met with the U.S. Secretary of State Madeleine Albright, reaffirming their desire to join NATO. Albright reportedly stated that all three nations will be mentioned in the NATO summit`s final declaration, and that the Kosovo crisis will not interfere with the Baltic nations NATO quest. Albright thanked the Baltic nations for their humanitarian aid for Kosovo and for their support for NATO’s actions in Kosovo.

        </span></p><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">On April 25, the final communique of the three-day Washington DC NATO summit, stated that the three newest members of the NATO alliance will not be the last ones, obliging itself to add new members in the future, though not setting a timetable for future expansion. The statement mentioned the Baltic nations individually. The mentioning of the three Baltic nations individually was hailed to be a step forward, as at the previous NATO conference they were not so mentioned. The summit also adopted a Membership Action Plan to be used as a guide for NATO aspirants in preparing for NATO membership.

        </span></p><span data-dcnode-id="919" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/JBANC-letter-President.jpg" tabindex="-1"><span data-dcnode-id="918" instrument_node="">
</span><img alt="JBANC letter President" class="slick-loading" data-dcnode-id="917" data-lazy="/nato/images/content/JBANC-letter-President.jpg"><span data-dcnode-id="916" instrument_node="">
</span></a><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">
            On April 26, Lithuanian President Valdas Adamkus stated that as a result of the NATO summit, Lithuania would be a member of NATO by the time he leaves the presidency. The summit indicates NATO`s `open door policy` for future admissions. The Latvian government issued a positive assessment of the NATO summit, noting that the summit communique clearly recognizes Latvia as an eligible candidate country. It noted that the Membership Action Plan offers opportunities that Poland, the Czech Republic, and Hungary only received after joining NATO. Upon his return from the NATO summit, Estonian President Lennart Meri stated that NATO does not expect Estonia to acquire the latest weapons but it does expect it to demonstrate good organization of defense forces and convincing proof of defensive will. He noted that Estonia must act fast, as the next wave of NATO enlargement could even take place prior to the next NATO summit in 2002.


        </span></p><span data-dcnode-id="911" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/President-Clinton-Letter-Baltics.jpg" tabindex="-1"><span data-dcnode-id="910" instrument_node="">
</span><img alt="President Clinton Letter Baltics" class="slick-loading" data-dcnode-id="909" data-lazy="/nato/images/content/President-Clinton-Letter-Baltics.jpg"><span data-dcnode-id="908" instrument_node="">
</span></a><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">
            In May during the Washington NATO Summit the Baltic countries were mentioned as candidates for NATO membership, but there was no consensus on whether any invitation would be extended. This  produced statements from member states who recognized that after the first round of invitations to Poland, Hungary and the Czech Republic, there would be a second round in three years.

        </span></p><span data-dcnode-id="903" instrument_node="">
</span></div><span data-dcnode-id="901" instrument_node="">
</span></div><span data-dcnode-id="899" instrument_node="">
</span></div><span data-dcnode-id="897" instrument_node="">
</span></div><div class="timelineSlide slick-slide" data-dcnode-id="803" data-slick-index="9" style="width: 1024px; position: relative; left: -9216px; top: 0px; z-index: 998; opacity: 0; height: 650px;" tabindex="-1"><span data-dcnode-id="895" instrument_node="">
</span><p class="timelineDate" data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">2000</span></p><span data-dcnode-id="892" instrument_node="">
</span><div class="slideContent" data-dcnode-id="805"><span data-dcnode-id="891" instrument_node="">
</span><div class="mediaWrap" data-dcnode-id="884"><span data-dcnode-id="890" instrument_node="">
</span><a class="imageWrap js_imagePopup" data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/slides/2000.jpg" tabindex="-1"><span data-dcnode-id="889" instrument_node="">
</span><img alt="2000 – The Beginning of the Accession" class="slideImage slick-loading" data-dcnode-id="888" data-lazy="/nato/images/slides/2000.jpg"><span data-dcnode-id="887" instrument_node="">
</span></a><span data-dcnode-id="885" instrument_node="">
</span></div><span data-dcnode-id="883" instrument_node="">
</span><div class="contentWrap" data-dcnode-id="807"><span data-dcnode-id="882" instrument_node="">
</span><div class="contentInnerWrap" data-dcnode-id="809" style="max-height: 394.016px;"><span data-dcnode-id="881" instrument_node="">
</span><h2 class="slideTitle" data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">2000 – The Beginning of the Accession</span></h2><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">
            2000 marked the beginning of the official accession process as the first year of the three nations' 
            Membership Action Plan (MAP), working toward full membership in 2002 at the earliest. The process 
            progressed as U.S. and NATO officials made visits to Estonia, Latvia and Lithuania, the U.S. Congress 
            considered the question of NATO membership for the three nations, and the countries themselves and their 
            neighbor to the east held their own debates.  
        </span></p><span data-dcnode-id="875" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/4-6-00-BT.jpg" tabindex="-1"><span data-dcnode-id="874" instrument_node="">
</span><img alt="2000" class="slick-loading" data-dcnode-id="873" data-lazy="/nato/images/content/4-6-00-BT.jpg"><span data-dcnode-id="872" instrument_node="">
</span></a><span data-dcnode-id="870" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/4-20-00-BT.jpg" tabindex="-1"><span data-dcnode-id="869" instrument_node="">
</span><img alt="2000" class="slick-loading" data-dcnode-id="868" data-lazy="/nato/images/content/4-20-00-BT.jpg"><span data-dcnode-id="867" instrument_node="">
</span></a><span data-dcnode-id="865" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/5-31-00-BT.jpg" tabindex="-1"><span data-dcnode-id="864" instrument_node="">
</span><img alt="2000" class="slick-loading" data-dcnode-id="863" data-lazy="/nato/images/content/5-31-00-BT.jpg"><span data-dcnode-id="862" instrument_node="">
</span></a><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">
            NATO leaders made visits to the Baltic nations in April and May, noting the impressive progress they had 
            already made toward their MAP goals.  NATO Secretary General George Robertson and Supreme Allied Commander 
            Europe (or SACEUR, the title of the NATO top commander position) U.S. General Wesley Clark were among the 
            visiting NATO leadership, meeting with national leaders and making positive observations during their 
            visits.  
        </span></p><span data-dcnode-id="857" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/5-25-00-BT.jpg" tabindex="-1"><span data-dcnode-id="856" instrument_node="">
</span><img alt="2000" class="slick-loading" data-dcnode-id="855" data-lazy="/nato/images/content/5-25-00-BT.jpg"><span data-dcnode-id="854" instrument_node="">
</span></a><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">
            In May, the foreign ministers or deputy foreign ministers of the NATO candidate countries at the time 
            signed the Vilnius Statement urging NATO to issue invitations for full membership in the Alliance. Both 
            U.S. presidential candidates in the 2000 election, George W. Bush and Al Gore, expressed support for the
            goals of the Vilnius conference.  Bush also stated that Russia should have no say in NATO’s decisions on 
            enlargement.
        </span></p><span data-dcnode-id="849" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/6-15-00-BT.jpg" tabindex="-1"><span data-dcnode-id="848" instrument_node="">
</span><img alt="2000" class="slick-loading" data-dcnode-id="847" data-lazy="/nato/images/content/6-15-00-BT.jpg"><span data-dcnode-id="846" instrument_node="">
</span></a><span data-dcnode-id="844" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/6-29-00-BT-2.jpg" tabindex="-1"><span data-dcnode-id="843" instrument_node="">
</span><img alt="2000" class="slick-loading" data-dcnode-id="842" data-lazy="/nato/images/content/6-29-00-BT-2.jpg"><span data-dcnode-id="841" instrument_node="">
</span></a><span data-dcnode-id="839" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/7-13-00-BT.jpg" tabindex="-1"><span data-dcnode-id="838" instrument_node="">
</span><img alt="2000" class="slick-loading" data-dcnode-id="837" data-lazy="/nato/images/content/7-13-00-BT.jpg"><span data-dcnode-id="836" instrument_node="">
</span></a><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">
            Debates in the Baltic nations and the U.S. during the summer included whether joining NATO would benefit 
            the Baltic candidate countries, whether they should be admitted at once or in stages, whether concerns 
            expressed by the Kremlin should hold any sway over NATO’s process, and whether Western relations with 
            Russia would improve or decline because of enlargement.  U.S. President Bill Clinton predicted that former 
            Soviet countries opposed to NATO enlargement would "eventually come to see NATO as partners and not 
            adversaries" (BT 6-8, page 1) while Defense Secretary William Cohen stated that the Kremlin would not have 
            veto power over NATO’s decision to expand into the Baltic nations. (BT 6-15, page 6) NATO Secretary General 
            Robertson held the same position during his visit to Tallinn in May.
        </span></p><span data-dcnode-id="831" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/8-25-00-NG-mag.jpg" tabindex="-1"><span data-dcnode-id="830" instrument_node="">
</span><img alt="2000" class="slick-loading" data-dcnode-id="829" data-lazy="/nato/images/content/8-25-00-NG-mag.jpg"><span data-dcnode-id="828" instrument_node="">
</span></a><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">
            The National Guard State Partnerships were well-established by this time and making an impact beyond just 
            military exchanges.  The relationships had evolved into programs that forged ties between civic leaders 
            and business interests, and fostered political, economic and social connections that contributed to 
            stability on many levels.  Latvian President Vaira Vike-Freiberga praised the Michigan National Guard 
            partnership with Latvia for helping the nation overcome lingering Soviet era influences.  She told National 
            Guard Magazine that, "Both the expertise of the Michigan National Guard and their investments have been 
            truly crucial.  You can see the results." U.S. Ambassador to Latvia, James Holmes added that the program 
            provided "a dimension of diplomacy that we cannot get elsewhere."  (Photo 8-25 NG mag)  
        </span></p><span data-dcnode-id="823" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/11-23-00-BT.jpg" tabindex="-1"><span data-dcnode-id="822" instrument_node="">
</span><img alt="2000" class="slick-loading" data-dcnode-id="821" data-lazy="/nato/images/content/11-23-00-BT.jpg"><span data-dcnode-id="820" instrument_node="">
</span></a><span data-dcnode-id="818" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/12-3-00-BT.jpg" tabindex="-1"><span data-dcnode-id="817" instrument_node="">
</span><img alt="2000" class="slick-loading" data-dcnode-id="816" data-lazy="/nato/images/content/12-3-00-BT.jpg"><span data-dcnode-id="815" instrument_node="">
</span></a><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">
            In November, the NATO Parliamentary Assembly (NATO PA) held its 46th session in berlin, where it adopted a 
            resolution in support of inviting Lithuania, Slovenia, and Slovakia into the alliance by 2002. In December, 
            the U.S. issued a report supporting membership for all three Baltic nations, although it didn’t specify 
            when consensus among alliance members would be reached on issuing the invitation.  The report acknowledged 
            several key points, including the importance to the Baltic nations that no non-NATO nation have veto power 
            over alliance decisions; the demonstrated commitment among the three nations to promote security and 
            stability in northeastern Europe; and the continuing special relationship between the U.S. and the three 
            nations established by the 1998 signing of the U.S.-Baltic charter.
        </span></p><span data-dcnode-id="810" instrument_node="">
</span></div><span data-dcnode-id="808" instrument_node="">
</span></div><span data-dcnode-id="806" instrument_node="">
</span></div><span data-dcnode-id="804" instrument_node="">
</span></div><div class="timelineSlide slick-slide" data-dcnode-id="712" data-slick-index="10" style="width: 1024px; position: relative; left: -10240px; top: 0px; z-index: 998; opacity: 0; height: 650px;" tabindex="-1"><span data-dcnode-id="802" instrument_node="">
</span><p class="timelineDate" data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">2001</span></p><span data-dcnode-id="799" instrument_node="">
</span><div class="slideContent" data-dcnode-id="714"><span data-dcnode-id="798" instrument_node="">
</span><div class="mediaWrap" data-dcnode-id="791"><span data-dcnode-id="797" instrument_node="">
</span><a class="imageWrap js_imagePopup" data-dcnode-id="793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/slides/2001.jpg" tabindex="-1"><span data-dcnode-id="796" instrument_node="">
</span><img alt="2001 - Increasing support" class="slideImage slick-loading" data-dcnode-id="795" data-lazy="/nato/images/slides/2001.jpg"><span data-dcnode-id="794" instrument_node="">
</span></a><span data-dcnode-id="792" instrument_node="">
</span></div><span data-dcnode-id="790" instrument_node="">
</span><div class="contentWrap" data-dcnode-id="716"><span data-dcnode-id="789" instrument_node="">
</span><div class="contentInnerWrap" data-dcnode-id="718" style="max-height: 394.016px;"><span data-dcnode-id="788" instrument_node="">
</span><h2 class="slideTitle" data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">2001 - Increasing support</span></h2><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">
            The year 2001 marked the continuation of working towards increasing support for the Baltic membership at every level. A variety of public events, close diplomatic cooperation, and work of  civil society took place.
        </span></p><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">
            On February 9, the conference “NATO - No. 1 Priority” was held in Riga, Latvia. United States Ambassador to Latvia James Holmes reiterated the support of the U.S. for NATO enlargement. 

        </span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">
            On February 21, the Senate of Michigan adopted Senate Concurrent Resolution No. 6, introduced by Sen. Thaddeus McCotter, calling for support of the addition of Estonia, Latvia, and Lithuania into NATO. It was adopted on March 6, 2002.
        </span></p><span data-dcnode-id="776" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/pg.%252023%2520Res%2520on%2520NATO%2520Enlargement%2520by%2520NATO%2520Par.%2520Ass.%2520October%25209%2C%25202001%2520Vol%252018.jpg" tabindex="-1"><span data-dcnode-id="775" instrument_node="">
</span><img alt="pg. 23 Res on NATO Enlargement by NATO Par. Ass. October 9, 2001 Vol 18" class="slick-loading" data-dcnode-id="774" data-lazy="/nato/images/content/pg. 23 Res on NATO Enlargement by NATO Par. Ass. October 9, 2001 Vol 18.jpg"><span data-dcnode-id="773" instrument_node="">
</span></a><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">
            During the spring, the candidate countries met in Bratislava, Slovakia, where Czech president Václav Havel advanced the agenda by singling out the Baltic states as countries that should be among the invitees at the next NATO Summit.
        </span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">
            On March 8-10, JBANC held its fourth Baltic Security Conference in DC on the topic of “Estonia, Latvia, Lithuania: The Next Ten Years.” NATO enlargement was one of the core topics of discussion during the conference and soon after, JBANC urged its grassroots network to contact the U.S. administration, and Members of Congress for support on NATO expansion that would include the Baltics. 
        </span></p><span data-dcnode-id="765" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/pg.%25201%2520JBANC%25204th%2520Conference%2520March%25208-10%2C%25202001%2520Vol.%252016.png" tabindex="-1"><span data-dcnode-id="764" instrument_node="">
</span><img alt="pg. 1 JBANC 4th Conference March 8-10, 2001 Vol. 16" class="slick-loading" data-dcnode-id="763" data-lazy="/nato/images/content/pg. 1 JBANC 4th Conference March 8-10, 2001 Vol. 16.png"><span data-dcnode-id="762" instrument_node="">
</span></a><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">
            On June 8, in a letter to President George W. Bush before his trip to Brussels, six senators – Richard Durbin (D-IL), George Voinovich (R-OH), Barbara A. Mikulski (D-MD), Jesse Helms (R-NC), Gordon Smith (R-OR), and George Allen (R-VA) urged him “...to include Lithuania, Latvia, and Estonia and other nations that are ready and prepared to assume the responsibilities of membership” in the next phase of NATO enlargement.”
        </span></p><span data-dcnode-id="757" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/pg.%25205%2520Ambassadors%27%2520Letter%2520to%2520the%2520Senators%2520April%252012%2C%25202001%2520Vol.%252017%2520.jpg" tabindex="-1"><span data-dcnode-id="756" instrument_node="">
</span><img alt="pg. 5 Ambassadors' Letter to the Senators April 12, 2001 Vol. 17" class="slick-loading" data-dcnode-id="755" data-lazy="/nato/images/content/pg. 5 Ambassadors' Letter to the Senators April 12, 2001 Vol. 17 .jpg"><span data-dcnode-id="754" instrument_node="">
</span></a><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">
            On June 13, Sen. Richard Lugar (R-IN) in addressing the CSIS Washington Roundtable on Capitol Hill, stated that “Latvia, Lithuania, and Estonia are among the great success stories of Europe’s post-communist transition. Their illegal annexation by the Soviet Union sixty years ago should not determine Western policy today.” 
        </span></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">
            On September 10, 20 Baltic-American leaders presented a petition signed by 25,000 Baltic-Americans from 50 states to White House officials urging the Bush administration to support NATO membership for the Baltics.This was the day before the terrorist attacks of 9-11.

        </span></p><span data-dcnode-id="746" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/20201219_150931.jpg" tabindex="-1"><span data-dcnode-id="745" instrument_node="">
</span><img alt="2001" class="slick-loading" data-dcnode-id="744" data-lazy="/nato/images/content/20201219_150931.jpg"><span data-dcnode-id="743" instrument_node="">
</span></a><span data-dcnode-id="741" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/20201219_151121.jpg" tabindex="-1"><span data-dcnode-id="740" instrument_node="">
</span><img alt="2001" class="slick-loading" data-dcnode-id="739" data-lazy="/nato/images/content/20201219_151121.jpg"><span data-dcnode-id="738" instrument_node="">
</span></a><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">
            On October 5, the heads of the participating nations in the Sofia Summit, Bulgaria signed a joint declaration stating that “Our aspiration to become members of NATO and the European Union reflects our commitment to the common values of the Euro-Atlantic community embodied by NATO...NATO enlargement is a strategic imperative for overall Euro-Atlantic security…”  

        </span></p><span data-dcnode-id="733" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/20201219_150329.jpg" tabindex="-1"><span data-dcnode-id="732" instrument_node="">
</span><img alt="2001" class="slick-loading" data-dcnode-id="731" data-lazy="/nato/images/content/20201219_150329.jpg"><span data-dcnode-id="730" instrument_node="">
</span></a><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">
            On November 7, The Gerald B. H. Solomon Freedom Consolidation Act (H.R. 3167) endorsing further enlargement of NATO passed the House of Representatives by a vote of 372-46. It authorized continued military funding for seven countries including Baltics.


        </span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">
            On November 28, White House officials discussed progress on the NATO enlargement process with representatives from the CEEC, including JBANC. 
 
        </span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">
            During December, the American Latvian Association urged their members to contact their Representatives, Senators and the U.S. administration about including the Baltics in NATO enlargement.
        </span></p><span data-dcnode-id="719" instrument_node="">
</span></div><span data-dcnode-id="717" instrument_node="">
</span></div><span data-dcnode-id="715" instrument_node="">
</span></div><span data-dcnode-id="713" instrument_node="">
</span></div><div class="timelineSlide slick-slide" data-dcnode-id="660" data-slick-index="11" style="width: 1024px; position: relative; left: -11264px; top: 0px; z-index: 998; opacity: 0; height: 650px;" tabindex="-1"><span data-dcnode-id="711" instrument_node="">
</span><p class="timelineDate" data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">2002-2004 Part 1</span></p><span data-dcnode-id="708" instrument_node="">
</span><div class="slideContent" data-dcnode-id="662"><span data-dcnode-id="707" instrument_node="">
</span><div class="mediaWrap" data-dcnode-id="700"><span data-dcnode-id="706" instrument_node="">
</span><a class="imageWrap js_imagePopup" data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/slides/2002-2004-part-1.jpg" tabindex="-1"><span data-dcnode-id="705" instrument_node="">
</span><img alt="2002 - 2004: Advocacy Heightens, Invitation, Ratification and Membership - Part 1" class="slideImage slick-loading" data-dcnode-id="704" data-lazy="/nato/images/slides/2002-2004-part-1.jpg"><span data-dcnode-id="703" instrument_node="">
</span></a><span data-dcnode-id="701" instrument_node="">
</span></div><span data-dcnode-id="699" instrument_node="">
</span><div class="contentWrap" data-dcnode-id="664"><span data-dcnode-id="698" instrument_node="">
</span><div class="contentInnerWrap" data-dcnode-id="666" style="max-height: 394.016px;"><span data-dcnode-id="697" instrument_node="">
</span><h2 class="slideTitle" data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">2002 - 2004: Advocacy Heightens, Invitation, Ratification and Membership - Part 1</span></h2><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">
            2002 was an intensive last lap to cement NATO Membership. At the beginning of the year, nothing was yet 100% certain, but one could sense the day was coming closer. There was still plenty of homework and hard work ahead. 

        </span></p><span data-dcnode-id="691" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Lithuanian-President-meets-US-President-White-House.png" tabindex="-1"><span data-dcnode-id="690" instrument_node="">
</span><img alt="Lithuanian President meets US President White House" class="slick-loading" data-dcnode-id="689" data-lazy="/nato/images/content/Lithuanian-President-meets-US-President-White-House.png"><span data-dcnode-id="688" instrument_node="">
</span></a><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">
            The winter of early 2002 witnessed a blitz of high-level Baltic visitors to the nation`s capital. First to come was Lithuania`s President Valdas Adamkus in January, who met with President Bush. He was continuing the official visit that began the previous September and had been cut short by the tragic events of September 11. Among the topics discussed was NATO enlargement. JBANC, the U.S.-Baltic Foundation and the Baltic American Freedom League, organized a presidential reception on February 5 at the Capitol. This time, it was in honor of President Vaira Vīķe-Freiberga of Latvia. Among the 150 guests were Senators Daniel Inouye, Richard Durbin, and Paul Sarbanes. Congressmen Tim Holden, Doug Bereuter, Porter Goss, Dennis Kucinich, Tom Lantos with his wife, Annette, Connie Morella, and John Shimkus attended. During her trip to the United States, President Vīķe-Freiberga met with President Bush, Vice President Cheney, and other high Administration officials. She also participated at the World Economic Forum in New York City, met business leaders and the city mayor at Houston, Texas, and cheered the Latvian Olympic team at Salt Lake City.On March 13, 2002, JBANC and the Aspen Institute-Berlin cosponsored a conference in the U.S. Congress with visiting Baltic Defense Ministers Sven Mikser of Estonia, Ģirts Valdis Kristovskis of Latvia, and Linas Linkevičius of Lithuania. Attended by a standing room-only audience, the conference consisted of a panel of the Defense Ministers, former CIA Director James Woolsey, and Washington Post reporter Jackson Diehl. Focus of the discussion was on the Baltic’s preparedness to undertake military obligations of the Alliance and their participation in the U.S.-led anti-terrorism coalition Enduring Freedom. The main thread running through the Defense Ministers` remarks was Baltic preparedness for NATO membership and current and increasing military cooperation among them. All said they were ready for NATO. They suggested that Russia will adapt to Baltics in NATO very quickly. Former CIA Director Woolsey was strongly optimistic about the Baltics getting invitations to join NATO during the Prague Summit in November. Diehl, while not denying the possibility of Baltic membership, said that the process is not yet over, especially because NATO needs to define its own future.

        </span></p><span data-dcnode-id="683" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/March-2002-Conference-DC.png" tabindex="-1"><span data-dcnode-id="682" instrument_node="">
</span><img alt="March 2002 Conference DC" class="slick-loading" data-dcnode-id="681" data-lazy="/nato/images/content/March-2002-Conference-DC.png"><span data-dcnode-id="680" instrument_node="">
</span></a><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">
</span></p><span data-dcnode-id="675" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Estonian-Foreign-Minister-meets-Senator-McCain.png" tabindex="-1"><span data-dcnode-id="674" instrument_node="">
</span><img alt="Estonian Foreign Minister meets Senator McCain" class="slick-loading" data-dcnode-id="673" data-lazy="/nato/images/content/Estonian-Foreign-Minister-meets-Senator-McCain.png"><span data-dcnode-id="672" instrument_node="">
</span></a><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">
            Over 100 leaders of American Central and East European ethnic organizations met on March 16 in Washington to address grassroots cooperation in support of NATO enlargement. JBANC Board members and staff participated. The gathering heard presentations by the ambassadors of the various NATO aspirant countries. Together they comprise a grouping known as the Vilnius 10 (V-10). The name stems from the joint declaration signed in May 2000 at the Lithuanian capital. It expressed the mutual commitment of Albania, Bulgaria, Estonia, Latvia, Lithuania, Macedonia, Romania, Slovakia, and Slovenia to cooperate in their mutual wish to become NATO members. Croatia later joined the group. A key point in the Vilnius declaration was the following: "While each country should be considered on its own merits, we believe that the integration of each democracy will be a success for us all and the integration of all our countries will be a success for Europe and NATO." 
        </span></p><span data-dcnode-id="667" instrument_node="">
</span></div><span data-dcnode-id="665" instrument_node="">
</span></div><span data-dcnode-id="663" instrument_node="">
</span></div><span data-dcnode-id="661" instrument_node="">
</span></div><div class="timelineSlide slick-slide" data-dcnode-id="587" data-slick-index="12" style="width: 1024px; position: relative; left: -12288px; top: 0px; z-index: 998; opacity: 0; height: 650px;" tabindex="-1"><span data-dcnode-id="659" instrument_node="">
</span><p class="timelineDate" data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">2002-2004 Part 2</span></p><span data-dcnode-id="656" instrument_node="">
</span><div class="slideContent" data-dcnode-id="589"><span data-dcnode-id="655" instrument_node="">
</span><div class="mediaWrap" data-dcnode-id="645"><span data-dcnode-id="654" instrument_node="">
</span><a class="imageWrap js_imagePopup" data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/slides/2002-2004-part-2.jpg" tabindex="-1"><span data-dcnode-id="653" instrument_node="">
</span><img alt="2002 - 2004: Advocacy Heightens, Invitation, Ratification and Membership - Part 2" class="slideImage slick-loading" data-dcnode-id="652" data-lazy="/nato/images/slides/2002-2004-part-2.jpg"><span data-dcnode-id="651" instrument_node="">
</span></a><span data-dcnode-id="649" instrument_node="">
</span><p class="caption" data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Baltic-American organizations actively gathered support for NATO enlargement within the U.S. population</span></p><span data-dcnode-id="646" instrument_node="">
</span></div><span data-dcnode-id="644" instrument_node="">
</span><div class="contentWrap" data-dcnode-id="591"><span data-dcnode-id="643" instrument_node="">
</span><div class="contentInnerWrap" data-dcnode-id="593" style="max-height: 394.016px;"><span data-dcnode-id="642" instrument_node="">
</span><h2 class="slideTitle" data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">2002 - 2004: Advocacy Heightens, Invitation, Ratification and Membership - Part 2</span></h2><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">
            A conference focusing on the U.S.-Russia relationship and its implications for Central and East Europe attracted Capitol Hill attention on May 15. Coinciding with President George W. Bush`s summit meeting with Russian President Vladimir Putin, the conference was hosted by the Central and East European Coalition (CEEC) and focused on two issues – Security and a New Europe, and U.S., Russia, European Union – Economic Interests.

        </span></p><span data-dcnode-id="636" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/CEEC-Conference.jpg" tabindex="-1"><span data-dcnode-id="635" instrument_node="">
</span><img alt="CEEC Conference" class="slick-loading" data-dcnode-id="634" data-lazy="/nato/images/content/CEEC-Conference.jpg"><span data-dcnode-id="633" instrument_node="">
</span></a><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">
           JBANC and other Baltic American organizations saw an increase in grassroots interest and media support for the Baltics to be invited into NATO. For example, there was a great response from across the United States in writing and calling their Senators in support of the passage of the Freedom Consolidation Act. This legislation passed the House by an overwhelming margin on November 7, 2001 and in the Senate on May 17, 2002. On June 10, 2002 President George W. Bush signed into law the Gerald B. H. Solomon Freedom Consolidation Act of 2001 (Public Law No: 107-187). The legislation gave  support to the principle of NATO enlargement, and further authorized continued Foreign Military Finance funding to the Baltic countries. FY03 levels requested by President Bush were a little over $21 million for the three countries combined. In a letter to President Bush thanking him for signing the Act, JBANC Chairman Vello Ederma wrote, “Your steadfast support for the principles of trans-Atlantic cooperation is now more significant in the wake of September 11.”
        </span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">
           House International Relations Committee European subcommittee chairman Elton Gallegly (R-CA) introduced H. Res.468 on June 27, affirming the importance and relevance of NATO, and support for the NATO enlargement process. Original co-sponsors of the bill were Republican congressmen Doug Bereuter of Nebraska and Christopher Cox from California, along with Democrat Tom Lantos of California, the Ranking Member of the International Relations Committee. The language of H.Res.468 sought to ensure that the “enlargement of NATO proceeds in a manner consistent with United States interests.”

        </span></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">
           In early July,  a discussion of enlargement prospects before the Prague Summit in November occurred at the “Riga 2002 – The Bridge to Prague” conference, the final of a series of NATO aspirant country meetings, following  the founding aspirant Summit held in Vilnius in May 2000. It was not yet certain if four, five or even seven aspirant countries were to receive invitations to join the alliance when NATO members meet in Prague.

        </span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">
           U.S. Ambassador to Latvia Brian Carlson remarked: “Standing shoulder to shoulder with the Presidents of Latvia, Lithuania and Estonia in the bright television lights, U.S. Senate Minority Leader Trent Lott told the gathered journalists: “There is a special feeling in America about these three countries. They stand a very excellent chance to be invited (to NATO), and I expect that will be the result. If I could cast my vote, I`d say yes.” This was just one of many extraordinary moments in the Riga Summit. The energy and enthusiasm over the past week has been palpable. During their three-day visit to Latvia, Senator Lott, accompanied by Senators Robert Bennett (UT), Craig Thomas (WY), Jim Bunning (KY) and Ben Nelson (NE), relaxed with President Vaira Vīķe-Freiberga  on a sun-drenched lawn at Jurmala. They chatted politics with Prime Minister Bērziņš as they strolled Old Riga`s cobblestoned streets. A memorial service at the Riga Synagogue touched everyone deeply. At the Summit in Latvia University, Senator Lott`s keynote address was a bell-ringer. “The last century teaches us that when America and Europe are united, peace follows,” he said. “We can never again tolerate the division of this great continent. No more Munichs. No more Yaltas,” Lott intoned. I thought it remarkable that all the participants, including President Bush and U.K. Prime Minister Blair, called for a robust enlargement. There is no doubt NATO invitations will be issued in Prague.”
        </span></p><span data-dcnode-id="619" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/NATO-support-urge.jpg" tabindex="-1"><span data-dcnode-id="618" instrument_node="">
</span><img alt="NATO support urge" class="slick-loading" data-dcnode-id="617" data-lazy="/nato/images/content/NATO-support-urge.jpg"><span data-dcnode-id="616" instrument_node="">
</span></a><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">
           On July 20, a Baltic-NATO Conference, organized by Artis Inka, Chairman of the Midwest Baltic Coalition held in Chicago; with guest speakers from the Baltic countries and Baltic-American communities. It was held during the Latvian Song and Dance Festival happening there.

        </span></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">
           On October 7, 2002, the U.S. House of Representatives passed resolutions reaffirming continued American commitment to NATO, and supporting the candidacies of Estonia, Latvia, and Lithuania to join the Alliance. The resolution introduced by Rep. Elton Gallegly (R-CA) passed by a wide margin, while the resolution introduced by Rep. John Shimkus (R-IL) passed by unanimous consent. The Gallegly resolution, H.Res.468, was amended to endorse member candidacies of seven aspirant countries, including Estonia, Latvia, and Lithuania. Gallegly had recently spent a week visiting the Baltics,and was then Chairman of the Subcommittee on Europe in the International Relations Committee. The Shimkus resolution, H.Con.Res.116, supporting membership of Estonia, Latvia, and Lithuania was originally introduced in April 2001 and eventually garnered 56 cosponsors. Shimkus remarked that it is “important for the House of Representatives to send a message to NATO leaders before the 2002 summit that the United States stands firmly behind the Baltics’ candidacy.”

        </span></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">
           NATO Road Show informational meetings, originally conceived by the American Latvian Association and President Jānis Kukainis, and assisted by JBANC members, were held in Orlando, Florida in early March, and Atlanta, Georgia on September 13 and Knoxville, Tennessee on September 14. About 50 individuals participated in the Atlanta meeting, some coming from as far as Savannah. Presenters included Renatas Norkus from the Embassy of Lithuania, Janis Eichmanis from the Embassy of Latvia, Karl Altau from JBANC and Roberts Kukainis, President of the American Latvian Youth Association, from Greenville, South Carolina. An informative slide-show presentation detailed the background of NATO enlargement, while the embassy representatives gave specific Baltic perspectives. As at similar information meetings, JBANC disseminated copies of the “Handbook on Activities in Support of NATO Enlargement”, with information on contacting and informing legislators and opinion-makers, which is especially critical in an election year. The Handbook was regularly updated since being first issued in 2000. On its website, a corresponding “NATO E-book” was published by JBANC. Since 2000, JBANC helped organize and took part in nearly 30 informational meetings in over 20 states.

        </span></p><span data-dcnode-id="605" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/JBANC-handbook-NATO-support.jpg" tabindex="-1"><span data-dcnode-id="604" instrument_node="">
</span><img alt="JBANC handbook NATO support" class="slick-loading" data-dcnode-id="603" data-lazy="/nato/images/content/JBANC-handbook-NATO-support.jpg"><span data-dcnode-id="602" instrument_node="">
</span></a><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">
           Michigan Governor John Engler visited Latvia in September. The trip came on the eve of the tenth anniversary of the State Partnership Program signed between Michigan and Latvia. A strong friendship, developed to help Latvia to reach rigorous military qualification standards to qualify for NATO enlargement, contributed highly in helping Latvia to finish needed military reforms before the NATO Summit in Prague in November. 
 
        </span></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">
           JBANC continued its series of online webcasts in 2002. Dr. Ronald Asmus was JBANC`s guest in its seventh interactive webcast on November 18, 2002. That week, NATO allies met in Prague to issue invitations to seven new potential members, including the Baltics. Asmus, whose book "Opening NATO`s Door" was published in November, was a Senior Transatlantic Fellow at the German Marshall Fund of the United States, and Adjunct Senior Fellow at the Council on Foreign Relations. Previously, Asmus served at the State Department as Deputy Assistant Secretary of State for European Affairs. On August 8, JBANC featured Stephen J. Flanagan, who was then Director of the Institute for National Strategic Studies at the National Defense University. He served as Special Assistant to the President and Senior Director for Central and Eastern Europe at the National Security Council Staff from 1997 to 1999. On June 5, Ojārs Kalniņš, Director of the Latvian Institute spoke. And on February 12, 2002, JBANC`s webcast featured interviews with the Estonian, Latvian, and Lithuanian ambassadors Sven Jürgenson, Aivars Ronis, and Vygaudas Usackas, respectively.

        </span></p><span data-dcnode-id="594" instrument_node="">
</span></div><span data-dcnode-id="592" instrument_node="">
</span></div><span data-dcnode-id="590" instrument_node="">
</span></div><span data-dcnode-id="588" instrument_node="">
</span></div><div class="timelineSlide slick-slide" data-dcnode-id="457" data-slick-index="13" style="width: 1024px; position: relative; left: -13312px; top: 0px; z-index: 998; opacity: 0; height: 650px;" tabindex="-1"><span data-dcnode-id="586" instrument_node="">
</span><p class="timelineDate" data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">2002-2004 Part 3</span></p><span data-dcnode-id="583" instrument_node="">
</span><div class="slideContent" data-dcnode-id="459"><span data-dcnode-id="582" instrument_node="">
</span><div class="mediaWrap" data-dcnode-id="572"><span data-dcnode-id="581" instrument_node="">
</span><a class="imageWrap js_imagePopup" data-dcnode-id="577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/slides/2002-2004-part-3.jpg" tabindex="-1"><span data-dcnode-id="580" instrument_node="">
</span><img alt="2002 - 2004: Advocacy Heightens, Invitation, Ratification and Membership - Part 3" class="slideImage slick-loading" data-dcnode-id="579" data-lazy="/nato/images/slides/2002-2004-part-3.jpg"><span data-dcnode-id="578" instrument_node="">
</span></a><span data-dcnode-id="576" instrument_node="">
</span><p class="caption" data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Accession Ceremony on the South Lawn of the White House for 7 new NATO Members on March 29, 2004</span></p><span data-dcnode-id="573" instrument_node="">
</span></div><span data-dcnode-id="571" instrument_node="">
</span><div class="contentWrap" data-dcnode-id="461"><span data-dcnode-id="570" instrument_node="">
</span><div class="contentInnerWrap" data-dcnode-id="463" style="max-height: 394.016px;"><span data-dcnode-id="569" instrument_node="">
</span><h2 class="slideTitle" data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">2002 - 2004: Advocacy Heightens, Invitation, Ratification and Membership - Part 3</span></h2><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">
           A NATO Enlargement Daily Brief (NEDB) was launched, providing a constant flow of information about important news and updates on the NATO enlargement front. NEDB served as an information exchange tool for professionals interested in NATO enlargement and related issues. It was based on keyword searches of Internet news sources, as well as contributions from list members.
        </span></p><span data-dcnode-id="563" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/NATO-summit-2002.jpg" tabindex="-1"><span data-dcnode-id="562" instrument_node="">
</span><img alt="NATO summit 2002" class="slick-loading" data-dcnode-id="561" data-lazy="/nato/images/content/NATO-summit-2002.jpg"><span data-dcnode-id="560" instrument_node="">
</span></a><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">
           The decision to issue invitations to seven countries to join NATO was announced on November 21 at the beginning of a two-day Summit meeting of Heads of State and Government in Prague. Following the opening of the Summit at the Prague Congress Center, NATO Secretary General Lord George Robertson made the long-awaited announcement: "This is a crucially important decision where consensus among Allies has emerged gradually over the past months. I believe that a consensus has now been reached. Therefore, I would like to ask that the Heads of State and Government agree to invite the following nations to the Accession talks with NATO: Bulgaria, Estonia, Latvia, Lithuania, Romania, Slovakia and Slovenia." President George W. Bush was among many world leaders participating at the Summit. Bush remarked that "by welcoming seven members, we will not only add to our military capabilities, we will refresh the spirit of this great democratic alliance." The U.S. delegation also included Secretary of Defense Donald Rumsfeld, Secretary of State Colin Powell, and National Security Advisor Condoleezza Rice. 

        </span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">
           Following the Prague Summit, President Bush visited Vilnius on November 23 to meet with the three Baltic presidents, and to lend words of congratulations and encouragement as the countries began to concentrate on the ratification process. He told those gathered in the Town Hall Square that there would be “No more Munichs. No more Yaltas. The long night of fear, uncertainty and loneliness is over. You`re joining the strong and growing family of NATO. Our Alliance has made a solemn pledge of protection, and anyone who would choose Lithuania as an enemy has also made an enemy of the United States of America. In the face of aggression, the brave people of Lithuania, Latvia, and Estonia will never again stand alone.” 

        </span></p><span data-dcnode-id="552" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/NATO-enlargement-Baltic.jpg" tabindex="-1"><span data-dcnode-id="551" instrument_node="">
</span><img alt="NATO enlargement Baltic" class="slick-loading" data-dcnode-id="550" data-lazy="/nato/images/content/NATO-enlargement-Baltic.jpg"><span data-dcnode-id="549" instrument_node="">
</span></a><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">
           A delegation of “Friends of the Baltics” flew with Lithuanian President Adamkus to Vilnius to participate in events on November 22-23. Besides the highlight of President Bush`s address, events in the Lithuanian capital included a reception organized by Lithuanian business leaders and a luncheon with the three Baltic Presidents.  

        </span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">
           On March 6-8, 2003, JBANC held its Fifth Conference on Baltic Security in DC. The main message of the conference was clear - no obstacles were seen to impede the enlargement of NATO to include Estonia, Latvia, and Lithuania. This message was also evident from the statements of high-ranking officials from the Baltic countries who participated at the conference.
        </span></p><span data-dcnode-id="541" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/JBANC-Conference-2003.jpg" tabindex="-1"><span data-dcnode-id="540" instrument_node="">
</span><img alt="JBANC Conference 2003" class="slick-loading" data-dcnode-id="539" data-lazy="/nato/images/content/JBANC-Conference-2003.jpg"><span data-dcnode-id="538" instrument_node="">
</span></a><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">
           On March 21, 2003, JBANC sent a letter to Members of Congress on the eve of the Senate hearings asking for support for enlargement and pointing out how far Estonia, Latvia and Lithuania have come in their partnership with the United States. The letter was submitted for the Congressional Record at the time of the March 27 SFRC hearing, chaired by Sen. George Allen (R-VA). Two NATO member countries had by that time ratified the NATO Treaty: Canada and Norway. Following the vote of the U.S. Senate in May, the legislatures of the remaining 16 member countries had to do the same.
        </span></p><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">
           On March 26, 2003, foreign ministers of seven NATO invitees gathered in Brussels to sign the Protocols of Accession. The Protocols were then transmitted to the NATO member parliaments for ratification. President Bush formally sent the Protocols to the Senate on April 11.

        </span></p><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">
           The U.S. Senate Foreign Relations Committee voted on the accession of the seven candidate countries on April 30.   
        </span></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">
           By this time, NATO enlargement ratification had almost become a foregone conclusion. Three years earlier, the prospects did not seem as obvious, but the changing world situation and the persistence of its believers fostered an almost natural evolution of the process, supplemented by supportive congressional legislation. In March and April, a series of hearings on NATO enlargement were held, as the Senate moved closer to a decisive vote. The Senate Foreign Relations committee held five hearings on NATO enlargement and the Armed Services committee two.
        </span></p><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">
          The minds of Baltic-Americans were made up a long time ago. A successful petition campaign, with 25,000 signatures collected by individuals and organizations around the country and in all 50 states and presented to the White House on September 10, 2001, only reinforced the public`s support and determination to see enlargement include Estonia, Latvia, and Lithuania. 
        </span></p><span data-dcnode-id="521" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Baltic-White-House-advocacy.jpg" tabindex="-1"><span data-dcnode-id="520" instrument_node="">
</span><img alt="Baltic White House advocacy" class="slick-loading" data-dcnode-id="519" data-lazy="/nato/images/content/Baltic-White-House-advocacy.jpg"><span data-dcnode-id="518" instrument_node="">
</span></a><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">
           On May 6, the Wisconsin Senate passed a Baltic NATO Resolution. Many other U.S. states had also passed supportive resolutions during the enlargement process.

        </span></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">
           The U.S. Senate debate for Treaty Document 108-4 began on May 6 and lasted four hours. The debate in 1998, by comparison, went over a week. The strongest statements of support came from Senators Richard Lugar, Joe Biden, Richard Durbin, George Voinovich, George Allen, and Gordon Smith.
        </span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">
           Senator Richard Lugar (R-IN), chairman of the Senate Foreign Relations Committee, along with Senator Joe Biden (D-DE), the committee`s lead Democrat, managed the debate.
        </span></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">
           There was strong support for the Baltics given by all those who spoke, perhaps most notably from Senator Richard Durbin (D-IL). While mentioning his Lithuanian roots, Sen. Durbin emphasized the importance of remembering just how long the Baltics suffered to get to where they were as  nations, and that they were actively participating in many peacekeeping operations and acting as de-facto members of the Alliance.

        </span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">
           The Protocols to the North Atlantic Treaty of 1949 on the Accession of Bulgaria, Estonia, Latvia, Lithuania, Romania, Slovakia, and Slovenia were ratified on May 8, 2003 in the U.S. Senate by a vote of 96-0. With this, Estonia, Latvia, Lithuania and four other countries from Central and Eastern Europe received conclusive support from the United States to join the Alliance.

        </span></p><span data-dcnode-id="501" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/Senate-ratification-NATO-membership.jpg" tabindex="-1"><span data-dcnode-id="500" instrument_node="">
</span><img alt="Senate ratification NATO membership" class="slick-loading" data-dcnode-id="499" data-lazy="/nato/images/content/Senate-ratification-NATO-membership.jpg"><span data-dcnode-id="498" instrument_node="">
</span></a><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">
           On February 19, 2004, the World Federation of Free Latvians-sponsored internet domain ExpandNATO.org was discontinued after four years of operation; it was visited by 631,000 people.
        </span></p><span data-dcnode-id="493" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/expand-NATO-website-.jpg" tabindex="-1"><span data-dcnode-id="492" instrument_node="">
</span><img alt="expand NATO website" class="slick-loading" data-dcnode-id="491" data-lazy="/nato/images/content/expand-NATO-website-.jpg"><span data-dcnode-id="490" instrument_node="">
</span></a><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">
           It all became official in Washington on March 29, 2004 when the Prime Ministers of the seven new member states presented the protocols of accession to United States Secretary of State Colin Powell. The seven prime ministers of the new member states attended a formal ceremony at the White House on March 29th where they were received by President George W. Bush, members of his Cabinet and Congress, the Joint Chiefs of Staff and other officials and dignitaries. Among those participating was NATO Secretary General Jaap de Hoop Scheffer who greeted some two thousand participants attending the White House ceremony on the South Lawn of the White House. The three Baltic countries were represented by their respective prime ministers Indulis Emsis of Latvia, Juhan Parts of Estonia, and Algirdas Brazauskas of Lithuania. 
        </span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">
           Noting that NATO is strengthened by the admission of the seven new member states, President Bush emphasized the historical significance of the admission of the seven new members to NATO: “As witness to some of the great crimes of the last century, our new members bring moral clarity to the purposes of the Alliance. They understand our cause in Afghanistan and in Iraq, because tyranny for them is still a fresh memory. These nations know that when great democracies fail to confront danger, far worse peril can follow.” 

        </span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">
            Other participants at the ceremony included Vice President Dick Cheney, Secretary of Defense Donald Rumsfeld, National Security Advisor Condoleezza Rice, as well as Senators John Warner and Majority Leader Bill Frist. The prime ministers of Croatia, Macedonia and Albania also participated in the White House ceremony, representing countries awaiting admission to NATO at some future date. Following the White House event, a news conference with the Prime Ministers was held at the National Press Club. 

        </span></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">
           Celebrations were concluded with a gala reception at the Corcoran Gallery of Art in Washington, DC. The Central and East European Coalition (CEEC), representing 18 national organizations and 13 ethnic communities in the U.S. cooperated with the embassies of the new NATO member states in organizing the event. Secretary of Defense Donald Rumsfeld delivered the keynote address at the reception, at which there were some 1000 participants. The premiers of the “Vilnius 10” countries, along with other delegation members and representatives of the CEEC joined Secretary Rumsfeld on the marble staircase in the grand hall of the Gallery. JBANC and Lithuanian American Council President Saulius Kuprys, American Latvian Association President Dace Copeland and Estonian American National Council President Mati Kõiva also joined in the program. Regina Narusis of the Lithuanian American Community was master of ceremonies, and Frank Koszorus of the Hungarian American Coalition spoke on behalf of the CEEC, emphasizing the need to further broaden the Transatlantic Alliance. The Joint Baltic American National Committee, Inc. (JBANC), has supported NATO enlargement to the Baltic countries and warmly welcomed Estonia, Latvia, and Lithuania into NATO.

        </span></p><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">
           Sen. Richard Durbin (D-IL) and Rep. John Shimkus (R- IL) met in their Washington offices with the group of about 15 constituents prominent Lithuanian Americans from the Midwest on March 30, 2004 to discuss issues vital to the Baltic–American community. Saulius Kuprys, President of the Lithuanian American Council, Inc. and JBANC; Stanley Balzekas, President of the Balzekas Museum of Lithuanian Culture in Chicago and Lithuanian Honorary Consul in Palm Beach; and Patricia Annette Streeter, President of the Lithuanian American Bar Association were among the group of primarily Chicago constituents participating in the meetings. The meetings took place a day after celebrations in Washington to mark the historic expansion of NATO to Estonia, Latvia, and Lithuania, among seven countries of Central and Eastern Europe. As co-Chairs of the Senate Baltic Freedom Caucus and House Baltic Caucus, Sen. Durbin and Rep. Shimkus have been strong supporters of efforts by the Baltics to join the Trans-Atlantic alliance.

        </span></p><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">
            The flags of Estonia, Latvia, Lithuania, Slovakia, Romania, Bulgaria, and Slovenia were raised on April 2 at NATO Headquarters in Brussels, Belgium, marking the admission of these countries to NATO. The number of NATO members was thus increased to 26.

        </span></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">
             In June 2004, seven new NATO members (Estonia, Latvia, Lithuania, Bulgaria, Slovakia, and Slovenia) participated in their first Summit in Istanbul as full-fledged members of the alliance. As Stephen D. Mull, U.S. Ambassador to Lithuania said during a June conference at the Lithuanian Parliament, “It is a proud day for NATO to accept new members.” The enlargement of NATO on March 29 was a landmark day in the history of Europe as the continent reshaped its geopolitical map. With security and stability now broadened, NATO brings new challenges for its fledgling Central and East European members.

        </span></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">
            Three new members joined the House Baltic Caucus in July: Representatives Roy Blunt (R-MO), Kay Granger (R-TX), and Roger Wicker (R-LA). All three visited Latvia in June. In August, additional delegations from both the House and Senate visited the Baltics. Members included Senator John McCain (R-AZ) and four other Senators: Susan Collins (R-ME), Lindsey Graham (R-SC), John Sununu (R-NH), and Hillary Clinton (D-NY), plus a delegation of House members, led by Water Resources and Environment Subcommittee Chairman John Duncan (R-TN).
        </span></p><span data-dcnode-id="464" instrument_node="">
</span></div><span data-dcnode-id="462" instrument_node="">
</span></div><span data-dcnode-id="460" instrument_node="">
</span></div><span data-dcnode-id="458" instrument_node="">
</span></div><div class="timelineSlide slick-slide" data-dcnode-id="209" data-slick-index="14" style="width: 1024px; position: relative; left: -14336px; top: 0px; z-index: 998; opacity: 0; height: 650px;" tabindex="-1"><span data-dcnode-id="456" instrument_node="">
</span><p class="timelineDate" data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">2030</span></p><span data-dcnode-id="453" instrument_node="">
</span><div class="slideContent" data-dcnode-id="211"><span data-dcnode-id="452" instrument_node="">
</span><div class="mediaWrap" data-dcnode-id="445"><span data-dcnode-id="451" instrument_node="">
</span><a class="imageWrap js_imagePopup" data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/slides/LookingForward.jpg" tabindex="-1"><span data-dcnode-id="450" instrument_node="">
</span><img alt="Looking Forward" class="slideImage slick-loading" data-dcnode-id="449" data-lazy="/nato/images/slides/LookingForward.jpg"><span data-dcnode-id="448" instrument_node="">
</span></a><span data-dcnode-id="446" instrument_node="">
</span></div><span data-dcnode-id="444" instrument_node="">
</span><div class="contentWrap" data-dcnode-id="213"><span data-dcnode-id="443" instrument_node="">
</span><div class="contentInnerWrap" data-dcnode-id="215" style="max-height: 394.016px;"><span data-dcnode-id="442" instrument_node="">
</span><h2 class="slideTitle" data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Looking Forward</span></h2><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="434"><span data-dcnode-id="438" instrument_node="">
</span><em data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">As stated in the NATO 2030 initiative, "NATO 2030 is about making sure our Alliance remains ready today to face tomorrow's challenges. And 
            how NATO will continue to keep us safe in the next decade and beyond."</span></em><span data-dcnode-id="435" instrument_node="">
</span></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">
            Since the Baltic countries joined NATO back in 2004, the world has seen a rapid increase in globalization and the importance of online networks, which meant the necessity to improve capabilities in dealing with hybrid threats, disinformation and increasing cyber and energy security capacity.

        </span></p><span data-dcnode-id="430" instrument_node="">
</span><a class="contentImage js_imagePopup" data-dcnode-id="426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jbanc.org/nato/images/content/NATO-Enhanced-Forward-Presence.jpg" tabindex="-1"><span data-dcnode-id="429" instrument_node="">
</span><img alt="NATO Enhanced Forward Presence" class="slick-loading" data-dcnode-id="428" data-lazy="/nato/images/content/NATO-Enhanced-Forward-Presence.jpg"><span data-dcnode-id="427" instrument_node="">
</span></a><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">
            We have seen a very active Baltic role in dealing with these new threats and challenges. Each of the Baltic countries hosts a NATO Centre of Excellence. NATO’s StratCom Centre dedicated to strategic communication has been based in Riga, Latvia, since 2014. In 2008, the NATO-accredited cyber defense hub was established in Tallinn, Estonia. And in 2012, a NATO Energy Security Centre of Excellence was opened in Vilnius, Lithuania.
