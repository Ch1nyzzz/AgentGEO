        </span></p><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">
            Notably, the Baltic countries have also been a part of the biggest reinforcement of NATO’s collective defense in a generation. Following the Wales Summit in 2014, NATO enhanced its presence along its eastern borders again by establishing four rotational battlegroups in Estonia, Latvia, Lithuania, and Poland. These battlegroups, led by the United Kingdom, Canada, Germany, and the United States, respectively, are multinational, and combat-ready, demonstrating the strength of the transatlantic bond. Their presence makes clear that an attack on one Ally will be considered an attack on the whole alliance. 
        </span></p><span data-dcnode-id="419" instrument_node="">
</span><iframe class="survey" data-dcnode-id="217" frameborder="0" height="450" marginheight="0" marginwidth="0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.google.com/forms/d/e/1FAIpQLSchxLbvoecjoAQ6x4w8qnHSoxaqNhH2MiXUXhr984V7mVQ0HQ/viewform%3Fembedded%3Dtrue&amp;raw" title="The Baltic Journey to NATO questionery" width="100%"><html class="XkWAb" data-dcnode-id="219" lang="en"><head data-dcnode-id="385"><meta charset="utf-8"><link data-dcnode-id="417" href="https://ssl.gstatic.com/docs/spreadsheets/forms/favicon_qp2.png" rel="shortcut icon" sizes="16x16"/><link data-dcnode-id="416" href="https://fonts.googleapis.com/icon?family=Material+Icons+Extended" nonce="" rel="stylesheet"/><title data-dcnode-id="414">The Baltic Journey to NATO Questionnaire</title><link data-dcnode-id="413" data-id="_cl" href="https://www.gstatic.com/_/freebird/_/ss/k=freebird.v.9Z7sazdeFdg.L.W.O/d=1/rs=AMjVe6iejQQEHruOhq8Eea3A7YBB9xc1eA" nonce="" rel="stylesheet"/><link data-dcnode-id="412" href="https://fonts.googleapis.com/css?family=Google+Sans:400,500%7CRoboto:300,400,400i,500,700&amp;subset=latin,vietnamese,latin-ext,cyrillic,greek,cyrillic-ext,greek-ext" nonce="" rel="stylesheet"/><link data-dcnode-id="411" href="https://fonts.googleapis.com/css?family=Product+Sans&amp;subset=latin,vietnamese,latin-ext,cyrillic,greek,cyrillic-ext,greek-ext" nonce="" rel="stylesheet" type="text/css"/><meta content="width=device-width, initial-scale=1" data-dcnode-id="410" name="viewport"/><meta content="origin" data-dcnode-id="409" name="referrer"/><link data-dcnode-id="404" href="https://ssl.gstatic.com/docs/forms/device_home/android_192.png" rel="icon" sizes="192x192"/><link data-dcnode-id="403" href="https://ssl.gstatic.com/docs/forms/device_home/ios_120.png" rel="apple-touch-icon" sizes="120x120"/><link data-dcnode-id="402" href="https://ssl.gstatic.com/docs/forms/device_home/ios_152.png" rel="apple-touch-icon" sizes="152x152"/><meta content="//ssl.gstatic.com/do </span><div data-dcnode-id="11" id="aboutContent"><span data-dcnode-id="32" instrument_node="">
</span><img alt="JBANC" class="image" data-dcnode-id="31" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.google.com/nato/images/Baltic-NATO-project-mainvisual.jpg&amp;raw"><span data-dcnode-id="30" instrument_node="">
</span><p data-dcnode-id="25"><span data-dcnode-id="29" instrument_node="">
            The Joint Baltic American National Committee (JBANC) has launched an online platform </span><em data-dcnode-id="27"><span data-dcnode-id="28" instrument_node="">The Baltic Journey
            to NATO: Exploring the role of civil society, diaspora, governments, and media</span></em><span data-dcnode-id="26" instrument_node="">, which takes a look at
            the milestones of the events that led to a successful NATO enlargement and membership for Estonia,
            Latvia and Lithuania. The project is supported by the NATO Public Diplomacy Division grant.
        </span></p><span data-dcnode-id="24" instrument_node="">
</span><p data-dcnode-id="22"><span data-dcnode-id="23" instrument_node="">
            The exhibit features a timeline of key dates and events that led to the Baltic inclusion into NATO in 2004,
            exploring a variety of decisions made by the Baltic and the U.S. governments. It also provides an in-depth
            look at the role of civil society and Baltic-American organizations such as JBANC, and how they played a
            vital part in the process of enlargement.
        </span></p><span data-dcnode-id="21" instrument_node="">
</span><p data-dcnode-id="19"><span data-dcnode-id="20" instrument_node="">
            The goal of the platform is to promote and expand the knowledge of the NATO enlargement within the general
            public in the United States and other transatlantic community countries, promoting NATO as a cornerstone
            in ensuring the safety of the transatlantic community. The exhibit hopefully serves as a reflection of the
            importance of NATO and provides perspectives for moving forward.
        </span></p><span data-dcnode-id="18" instrument_node="">
</span><p data-dcnode-id="13"><span data-dcnode-id="17" instrument_node="">

</span></p><span data-dcnode-id="12" instrument_node="">
