otate(180, 10, 10)"></path></svg></span></button><div class="xray-cards-gradient-mask xray-cards-gradient-mask-next xray-cards-gradient-mask-enabled" data-dcnode-id="1056"></div><div class="xray-cards-gradient-mask xray-cards-gradient-mask-previous" data-dcnode-id="1055"></div></div></div></div><div class="caas-body" data-dcnode-id="911"><figure class="caas-figure" data-dcnode-id="1042"><div class="caas-figure-with-pb" data-dcnode-id="1048" style="max-height: 353px"><div data-dcnode-id="1049"><div class="caas-img-container" data-dcnode-id="1050" style="padding-bottom:50%;"><img alt="Russian President Vladimir Putin" class="caas-img has-preview" data-dcnode-id="1051" data-src="https://s.yimg.com/ny/api/res/1.2/2ZwYG_8defx9O4nPeBAG0Q--/YXBwaWQ9aGlnaGxhbmRlcjt3PTcwNTtoPTM1Mw--/https://s.yimg.com/uu/api/res/1.2/KMI_0IpjrHdP67Hah5dRYw--~B/aD0xMDAwO3c9MjAwMDthcHBpZD15dGFjaHlvbg--/https://media.zenfs.com/en/business_insider_articles_888/10a4f05ba1b538d674ba26a1f41ebba6" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.yimg.com/ny/api/res/1.2/2ZwYG_8defx9O4nPeBAG0Q--/YXBwaWQ9aGlnaGxhbmRlcjt3PTcwNTtoPTM1Mw--/https%3A//s.yimg.com/uu/api/res/1.2/KMI_0IpjrHdP67Hah5dRYw--~B/aD0xMDAwO3c9MjAwMDthcHBpZD15dGFjaHlvbg--/https%3A//media.zenfs.com/en/business_insider_articles_888/10a4f05ba1b538d674ba26a1f41ebba6&amp;raw"></div></div></div><div class="caption-wrapper caption-aligned-with-image" data-dcnode-id="1043"><figcaption class="caption-collapse" data-dcnode-id="1044"><span data-dcnode-id="1047" instrument_node="">Russian President Vladimir Putin speaks during the plenary session of the 30th Congress of Russian Union of Industrialists and Entrepreneurs at the State Kremlin Palace on December 17, 2021 in Moscow, Russia.</span><span class="copyright" data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Mikhail Svetlov/Getty Images</span></span></figcaption></div></figure><ul class="caas-list caas-list-bullet" data-dcnode-id="1032"><li data-dcnode-id="1039"><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Putin is looking for an excuse to invade Ukraine and blame the West, experts say.</span></p></li><li data-dcnode-id="1036"><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">The Russian president is ratcheting up warnings of a military response to alleged NATO aggression.</span></p></li><li data-dcnode-id="1033"><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">In reality, Putin created the tensions of Ukraine by annexing Crimea and supporting rebels in the Donbass region.</span></p></li></ul><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Russian President Vladimir Putin is seemingly searching for a pretext to invade Ukraine as he continues to blame tensions on NATO and the US while ratcheting up talk of a military response.</span></p><p data-dcnode-id="1025"><span data-dcnode-id="1029" instrument_node="">"What the US is doing in Ukraine is at our doorstep ... And they should understand that we have nowhere further to retreat to. Do they think we'll just watch idly?" Putin said during a speech to Russian military leaders on Tuesday, </span><a class="link" data-dcnode-id="1027" data-ylk="slk:per Reuters." href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usnews.com/news/world/articles/2021-12-21/putin-says-russia-has-nowhere-to-retreat-over-ukraine" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1028" instrument_node="">per Reuters.</span></a><span data-dcnode-id="1026" instrument_node=""> "If the aggressive line of our Western colleagues continues, we will take adequate military-technical response measures and react harshly to unfriendly steps."</span></p><p data-dcnode-id="1020"><span data-dcnode-id="1024" instrument_node="">Russia's defense secretary also claimed without evidence that over 100 US mercenaries were on the ground in eastern Ukraine and threatening Russia with chemical weapons, an accusation that experts dismissed as groundless and bordering on fantasy; the Pentagon </span><a class="link" data-dcnode-id="1022" data-ylk="slk:called" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/idreesali114/status/1473336024097034242%3Fs%3D20" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1023" instrument_node="">called</span></a><span data-dcnode-id="1021" instrument_node=""> it "completely false."</span></p><p data-dcnode-id="1015"><span data-dcnode-id="1019" instrument_node="">Evelyn Farkas, who served as deputy assistant secretary of defense for Russia, Ukraine, and Eurasia under the Obama administration, in </span><a class="link" data-dcnode-id="1017" data-ylk="slk:a tweet" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/EvelynNFarkas/status/1473302635965030401%3Fs%3D20" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1018" instrument_node="">a tweet</span></a><span data-dcnode-id="1016" instrument_node=""> said that Putin "just declared war on Ukraine (pretending it's war against the US and its allies, provoked by us)."</span></p><p data-dcnode-id="1010"><span data-dcnode-id="1014" instrument_node="">Echoing these sentiments, Alina Polyakova, the president of the Center for European Policy Analysis, </span><a class="link" data-dcnode-id="1012" data-ylk="slk:said" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/apolyakova/status/1473358608566034432%3Fs%3D20" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1013" instrument_node="">said</span></a><span data-dcnode-id="1011" instrument_node=""> that Putin's "framing of Russia as a victim is disinformation."</span></p><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">"Ukraine didn't invade Russia," Polyakova added. "Russia has been the aggressor in every recent conflict — but it serves a purpose: justifying military aggression to the Russian people."</span></p><p data-dcnode-id="1004"><span data-dcnode-id="1007" instrument_node="">Putin's comments came as Russia has amassed tens of thousands of troops along Ukraine's borders, prompting fears of an invasion </span><a class="link" data-dcnode-id="1005" data-ylk="slk:for the second time this year." href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/russia-suddenly-says-its-pulling-back-troops-from-ukraine-borders-2021-4%3Futm_medium%3Dreferral%26utm_source%3Dyahoo.com" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1006" instrument_node="">for the second time this year.</span></a></p><div class="caas-readmore caas-readmore-collapse" data-dcnode-id="1001"><button aria-label="" class="link caas-button collapse-button" data-dcnode-id="1002" data-ylk="elm:readmore;slk:Story continues" title=""><span data-dcnode-id="1003" instrument_node="">Story continues</span></button></div><p data-dcnode-id="996"><span data-dcnode-id="1000" instrument_node="">The Russian leader, who invaded and unilaterally annexed Crimea from Ukraine in 2014, has repeatedly accused the West of not respecting the Kremlin's "red lines" in the region. Since the 2014 annexation of Crimea, the Kremlin has backed separatists in a war against Ukrainian troops in the eastern Donbass region that's claimed over 13,000 lives. Russia, for its part, claims to have no involvement in the Donbass conflict despite </span><a class="link" data-dcnode-id="998" data-ylk="slk:evidence" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbsnews.com/news/russia-ukraine-troops-in-donbas-court-document-amid-concern-invasion/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="999" instrument_node="">evidence</span></a><span data-dcnode-id="997" instrument_node=""> to the contrary.</span></p><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">The Russian government in recent days has made demands that NATO and the US would be unlikely to agree to in any context — including a firm commitment that the alliance will never accept Ukraine and Georgia as members.</span></p><p data-dcnode-id="986"><span data-dcnode-id="993" instrument_node="">Ukraine has sought to join NATO for years, and maintains a robust partnership with the alliance that's coincided with members offering security assistance. In addition to </span><a class="link" data-dcnode-id="991" data-ylk="slk:training Ukrainian special forces" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.defense.gov/News/News-Stories/Article/Article/1256847/us-special-operations-forces-train-with-ukrainian-counterparts/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="992" instrument_node="">training Ukrainian special forces</span></a><span data-dcnode-id="990" instrument_node="">, the US has provided Ukraine with </span><a class="link" data-dcnode-id="988" data-ylk="slk:Javelin anti-tank missiles," href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.defenseone.com/technology/2020/06/us-will-send-ukraine-another-250m-weapons-gear-and-other-aid/166088/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="989" instrument_node="">Javelin anti-tank missiles,</span></a><span data-dcnode-id="987" instrument_node=""> armored Humvees, radios, and unarmed drones.</span></p><div class="twitter-tweet-wrapper" data-dcnode-id="979"><blockquote class="twitter-tweet" data-dcnode-id="980" data-theme="light" placeholder=""><div class="caas-card-loader small fixed-height" data-dcnode-id="985"></div><p data-dcnode-id="981"><span data-dcnode-id="984" instrument_node="">—Christopher Miller (@ChristopherJM) </span><a class="link" data-dcnode-id="982" data-ylk="slk:December 21, 2021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/mims/statuses/1473274123681992706%3Fref_src%3Dtwsrc%255Etfw" rel="nofollow noopener" target="_blank"><span data-dcnode-id="983" instrument_node="">December 21, 2021</span></a></p></blockquote></div><h2 data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">'Completely nuts'</span></h2><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Meanwhile, Russian Defense Minister Sergei Shoigu on Tuesday baselessly claimed that US mercenaries were in eastern Ukraine and preparing a "provocation using unknown chemical components."</span></p><p data-dcnode-id="970"><span data-dcnode-id="974" instrument_node="">"We have identified the presence of over 120 members of U.S. mercenary groups in the cities of Avdiivka and Krasny Liman to commit provocations … Tanks filled with unidentified chemical components were delivered to the cities of Avdeevka and Krasny Liman to commit provocations," Shoigu said, </span><a class="link" data-dcnode-id="972" data-ylk="slk:the Moscow Times reported" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.themoscowtimes.com/2021/12/21/us-mercenaries-preparing-donbass-provocation-russian-defense-chief-a75892" rel="nofollow noopener" target="_blank"><span data-dcnode-id="973" instrument_node="">the Moscow Times reported</span></a><span data-dcnode-id="971" instrument_node="">, citing a state-run news agency.</span></p><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">The Russian defense minister was essentially alleging that the West was poised to commit war crimes against it, as international law prohibits the use of chemical weapons.</span></p><figure class="caas-figure" data-dcnode-id="956"><div class="caas-figure-with-pb" data-dcnode-id="962" style="max-height: 467px"><div data-dcnode-id="963"><div class="caas-img-container caas-img-loader" data-dcnode-id="964" style="padding-bottom:66%;"><img alt="Russia Crimea amphibious military landing" class="caas-img caas-lazy has-preview" data-dcnode-id="967" data-src="https://s.yimg.com/ny/api/res/1.2/0Tb6SVa8XlXt7dxCYsqR5w--/YXBwaWQ9aGlnaGxhbmRlcjt3PTcwNTtoPTQ2Nw--/https://s.yimg.com/uu/api/res/1.2/1m_Q9o7CrYj4gws3z3m8RA--~B/aD0xMzI0O3c9MjAwMDthcHBpZD15dGFjaHlvbg--/https://media.zenfs.com/en/business_insider_articles_888/6bddb2e761900ca0f53ec8795dd8427d"><noscript data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">&lt;img alt="Russia Crimea amphibious military landing" src="https://s.yimg.com/ny/api/res/1.2/0Tb6SVa8XlXt7dxCYsqR5w--/YXBwaWQ9aGlnaGxhbmRlcjt3PTcwNTtoPTQ2Nw--/https://s.yimg.com/uu/api/res/1.2/1m_Q9o7CrYj4gws3z3m8RA--~B/aD0xMzI0O3c9MjAwMDthcHBpZD15dGFjaHlvbg--/https://media.zenfs.com/en/business_insider_articles_888/6bddb2e761900ca0f53ec8795dd8427d" class="caas-img"&gt;</span></noscript></div></div></div><div class="caption-wrapper caption-aligned-with-image" data-dcnode-id="957"><figcaption class="caption-collapse" data-dcnode-id="958"><span data-dcnode-id="961" instrument_node="">Russian landing ships and military vehicles during an exercise at the Opuk training ground in Crimea, April 22, 2021.</span><span class="copyright" data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Sergei Malgavko\TASS via Getty Images</span></span></figcaption></div></figure><p data-dcnode-id="951"><span data-dcnode-id="955" instrument_node="">Michael McFaul, the former US ambassador to Russia, in </span><a class="link" data-dcnode-id="953" data-ylk="slk:a tweet" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/McFaul/status/1473330169460912132%3Fs%3D20" rel="nofollow noopener" target="_blank"><span data-dcnode-id="954" instrument_node="">a tweet</span></a><span data-dcnode-id="952" instrument_node=""> responding to Shoigu's groundless assertions said, "These are not the words a rational actor seeking to discuss 'legitimate' concerns about European security. These are the false words of someone looking for an excuse for war. Hoping it's all still bluff; fearing it's not."</span></p><p data-dcnode-id="947"><span data-dcnode-id="950" instrument_node="">McFaul dismissed Shoigu's claims as </span><a class="link" data-dcnode-id="948" data-ylk="slk:&quot;completely nuts.&quot;" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/McFaul/status/1473329299293814784%3Fs%3D20" rel="nofollow noopener" target="_blank"><span data-dcnode-id="949" instrument_node="">"completely nuts."</span></a></p><p data-dcnode-id="943"><span data-dcnode-id="946" instrument_node="">Similarly, Eurasia Group president Ian Bremmer said that "Putin faking some serious anger" at the West for "forcing Russia's hand" when it comes to Ukraine. "If you only watch Russian state media, you'd think war is inevitable and NATO's fault," </span><a class="link" data-dcnode-id="944" data-ylk="slk:Bremmer said." href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/ianbremmer/status/1473292428501307394%3Fs%3D20" rel="nofollow noopener" target="_blank"><span data-dcnode-id="945" instrument_node="">Bremmer said.</span></a></p><p data-dcnode-id="938"><span data-dcnode-id="942" instrument_node="">To his point, a recent poll found that </span><a class="link" data-dcnode-id="940" data-ylk="slk:half of the Russian public" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.themoscowtimes.com/2021/12/14/2-in-5-russians-believe-war-with-ukraine-likely-poll-a75816" rel="nofollow noopener" target="_blank"><span data-dcnode-id="941" instrument_node="">half of the Russian public</span></a><span data-dcnode-id="939" instrument_node=""> blames the US and NATO for the tensions over Ukraine, while just 4% blamed the Russian government.</span></p><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">In reality, Putin has manufactured the recent crisis. His actions in Crimea in 2014 and support for rebels in the Donbass pushed Ukraine closer to the West, increasing the tensions with NATO and the US that he's now banging the war drum over. But he continues to portray Russia as the victim, characterizing NATO's growing influence in Ukraine as an existential threat to his country.</span></p><p data-dcnode-id="931"><span data-dcnode-id="935" instrument_node="">Experts say that Putin views Ukraine, a former Soviet republic, as unfinished business. The Russian president has referred to Russians and Ukrainians as "one people." Steven Pifer, the former US ambassador to Ukraine, in a recent op-ed said such rhetoric from Putin is </span><a class="link" data-dcnode-id="933" data-ylk="slk:&quot;utterly tone-deaf,&quot;" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.themoscowtimes.com/2021/12/21/does-the-kremlin-understand-ukraine-apparently-not-a75887" rel="nofollow noopener" target="_blank"><span data-dcnode-id="934" instrument_node="">"utterly tone-deaf,"</span></a><span data-dcnode-id="932" instrument_node=""> adding that "millions of ethnic Ukrainians heard it as a denial of their culture, history and language."</span></p><p data-dcnode-id="923"><span data-dcnode-id="930" instrument_node="">The US has warned of </span><a class="link" data-dcnode-id="928" data-ylk="slk:severe economic consequences" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbsnews.com/news/kamala-harris-margaret-brennan-russia-ukraine/%3Fftag%3DCNM-00-10aab7e%26linkId%3D145179922" rel="nofollow noopener" target="_blank"><span data-dcnode-id="929" instrument_node="">severe economic consequences</span></a><span data-dcnode-id="927" instrument_node=""> if Russia invades Ukraine, but President Joe Biden recently said the US </span><a class="link" data-dcnode-id="925" data-ylk="slk:would not be obligated to send in troops" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/biden-us-not-obligated-war-russia-invades-ukraine-2021-12%3Futm_medium%3Dreferral%26utm_source%3Dyahoo.com" rel="nofollow noopener" target="_blank"><span data-dcnode-id="926" instrument_node="">would not be obligated to send in troops</span></a><span data-dcnode-id="924" instrument_node=""> in the event of a Russian incursion.</span></p><p data-dcnode-id="918"><span data-dcnode-id="922" instrument_node="">US Assistant Secretary of State for Europe Karen Donfried, the top US diplomat for Europe, in </span><a class="link" data-dcnode-id="920" data-ylk="slk:a call with reporters" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/ChristopherJM/status/1473285346464993280%3Fs%3D20" rel="nofollow noopener" target="_blank"><span data-dcnode-id="921" instrument_node="">a call with reporters</span></a><span data-dcnode-id="919" instrument_node=""> on Tuesday warned "we are poised to move in a dramatic way if Russia does undertake further military aggression against Ukraine."</span></p><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Donfried said the US would be prepared to provide military equipment "above and beyond" what's already been sent.</span></p><p data-dcnode-id="912"><span data-dcnode-id="915" instrument_node="">Read the original article on </span><a class="link" data-dcnode-id="913" data-ylk="slk:Business Insider" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/putin-looking-for-excuse-to-invade-ukraine-blame-it-nato-us-2021-12" rel="nofollow noopener" target="_blank"><span data-dcnode-id="914" instrument_node="">Business Insider</span></a></p></div></div></div></div></div></div></div></article></div></div></div></div></div><div class="Pos(r) Pend(10%) Mb($gridMargin) Mt(-20px) Pstart(183px)" data-dcnode-id="898" id="postArticle"></div><div class="wafer-rapid-module Pos(r) Mb(40px)" data-dcnode-id="771" id="module-spotIm"><section data-dcnode-id="772" id="spot-im-comments"><div data-dcnode-id="773" id="spotIm-conversations-module-wrapper"><div class="jac-cont
