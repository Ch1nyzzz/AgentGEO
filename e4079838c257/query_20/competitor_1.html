ir Putin;elm:pill-open;cpos:1"></button><div class="xray-card-content" data-dcnode-id="983"><div class="xray-card-left-column" data-dcnode-id="991"><div class="xray-card-image-container" data-dcnode-id="992"><img alt="Vladimir Putin" class="caas-img has-width xray-card-image" data-dcnode-id="993" data-src="https://s.yimg.com/ny/api/res/1.2/ZmFSbbfcFuXGMFJO86FARA--/YXBwaWQ9aGlnaGxhbmRlcjt3PTgwO2g9ODA-/https://s.yimg.com/zb/imgv1/ba6a72dc-832f-3783-a696-dd166bd8cd6a/s_500x500" height="32" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.yimg.com/ny/api/res/1.2/ZmFSbbfcFuXGMFJO86FARA--/YXBwaWQ9aGlnaGxhbmRlcjt3PTgwO2g9ODA-/https%3A//s.yimg.com/zb/imgv1/ba6a72dc-832f-3783-a696-dd166bd8cd6a/s_500x500&amp;raw" style="object-fit:cover;" width="32"></div></div><div class="xray-card-right-column" data-dcnode-id="984"><div class="xray-card-row-title" data-dcnode-id="988"><span class="xray-entity-title-link" data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Vladimir Putin</span></span></div><div class="xray-card-row-subtitle" data-dcnode-id="985"><span data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">President of Russia</span></span></div></div></div></div><div class="xray-fetch-trigger wafer-toggle wafer-fetch wafer-loader-success has-fetch-click has-wafer-click has-toggle-click" data-dcnode-id="981" data-wf-body="{&quot;articleId&quot;:&quot;f3493917-34de-3201-99c7-625d0d2ff191&quot;,&quot;bucket&quot;:[&quot;news-US-en-US-def&quot;],&quot;device&quot;:&quot;desktop&quot;,&quot;entityId&quot;:&quot;Vladimir_Putin&quot;,&quot;entityType&quot;:&quot;wiki&quot;,&quot;lang&quot;:&quot;en-US&quot;,&quot;m_id&quot;:&quot;x-ray&quot;,&quot;m_mode&quot;:&quot;json&quot;,&quot;region&quot;:&quot;US&quot;,&quot;site&quot;:&quot;news&quot;,&quot;theme&quot;:&quot;light&quot;,&quot;config&quot;:{&quot;features&quot;:{&quot;enableAthleteHeaderV2&quot;:true,&quot;enableFollowButtonV1&quot;:false,&quot;enableFollowButtonV2&quot; 2.3194363-.83061107-.0024763-1.1478866-.3252143-.32052964-.8444016-.31890259-1.1646634-.00244058L6.66666667 10.0007114l5.25790623 5.1813535c.3153093.3107673.8427507.3156485 1.1646633-.0024406.3243889-.3197161.3235635-.8314246.0024763-1.1478866l-4.08994118-4.0310263z" data-dcnode-id="974" transform="rotate(180, 10, 10)"></path></svg></span></button><div class="xray-cards-gradient-mask xray-cards-gradient-mask-next xray-cards-gradient-mask-enabled" data-dcnode-id="970"></div><div class="xray-cards-gradient-mask xray-cards-gradient-mask-previous" data-dcnode-id="969"></div></div></div></div><div class="caas-body" data-dcnode-id="905"><p data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">MOSCOW (AP) — Russian President Vladimir Putin on Tuesday sternly warned NATO against deploying its troops and weapons to Ukraine, saying it represents a red line for Russia and would trigger a strong response.</span></p><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Commenting on Western concerns about Russia's alleged intention to invade Ukraine, he said that Moscow is equally worried about NATO drills near its borders.</span></p><div class="caas-rmp-container wafer-fetch wafer-rapid" data-dcnode-id="961" data-wf-replace="1" data-wf-retry-count="2" data-wf-state-body="{&quot;ctrl&quot;:&quot;RelatedStoriesHulk&quot;,&quot;m_id&quot;:&quot;tdv2-wafer-content-list&quot;,&quot;m_mode&quot;:&quot;json&quot;,&quot;module&quot;:&quot;RelatedStoriesHulk&quot;,&quot;config&quot;:{&quot;ncpQueryParams&quot;:{&quot;dedupUuids&quot;:&quot;f3493917-34de-3201-99c7-625d0d2ff191&quot;,&quot;uuid&quot;:&quot;f3493917-34de-3201-99c7-625d0d2ff191&quot;},&quot;configName&quot;:&quot;RelatedStoriesHulk/componentLayoutD&quot;,&quot;categoryName&quot;:&quot;relatedArticles&quot;,&quot;showTimestamp&quot;:&quot;true&quot;,&quot;maxItemCount&quot;:2,&quot;pageContext&quot;:&quot;[state.publisherBlobPageContext]&quot;,&quot;i13n&quot;:{&quot;mab_test&quot;:&quot;eyJ1IjoiaHVsa19tYWJfcmVsYXRlZF9zdG9yaWVzX2Rlc2lnbl92YXJpYW50c19kZXNrdG9wX25ldyIsImIiOiIyNjI1NDQ1IiwiZSI6IjY0NjkwMiJ9&quot;}}}" data-wf-timeout="5000" data-wf-trigger="viewport" data-wf-trigger-offset="600 0" data-wf-url="/nel_ms/_rcv/remote?m_id=tdv2-wafer-content-list&amp;ctrl=RelatedStoriesHulk&amp;module=RelatedStoriesHulk&amp;site=news&amp;device=desktop&amp;lang=en-US&amp;region=US&amp;rid=fm8s6elhbvh65&amp;m_mode=json" id="caas-article-client-rmp-s1"></div><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Speaking to participants of an online investment forum. Putin said that NATO's eastward expansion has threatened Russia's core security interests. He expressed concern that NATO could eventually use the Ukrainian territory to deploy missiles capable of reaching Moscow in just five minutes.</span></p><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">“The emergence of such threats represents a ‘red line’ for us,” Putin said. “I hope that it will not get to that and common sense and responsibility for their own countries and the global community will eventually prevail.”</span></p><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">He added that Russia has been forced to counter the growing threats by developing new hypersonic weapons.</span></p><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">“What should we do?” Putin said. “We would need to develop something similar to target those who threaten us. And we can do that even now.”</span></p><div class="caas-da" data-dcnode-id="951"><div data-dcnode-id="952" id="sda-INARTICLE"></div></div><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">He said a new hypersonic missile that is set to enter service with the Russian navy early next year would be capable of reaching targets in comparable time.</span></p><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">“It would also need just five minutes to reach those who issue orders,” Putin said.</span></p><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">The Zircon hypersonic cruise missile, capable of flying at nine times the speed of sound to a range of 1,000 kilometers (620 miles), has undergone a series of tests, most recently Monday.</span></p><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Ukrainian and Western officials have expressed worries this month that a Russian military buildup near Ukraine could signal plans by Moscow to invade its ex-Soviet neighbor. NATO foreign ministers warned Russia on Tuesday that any attempt to further destabilize Ukraine would be a costly mistake.</span></p><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">The Kremlin has insisted it has no such intention and has accused Ukraine and its Western backers of making the claims to cover up their own allegedly aggressive designs.</span></p><div class="caas-readmore caas-readmore-collapse" data-dcnode-id="938"><button aria-label="" class="link caas-button collapse-button" data-dcnode-id="939" data-ylk="elm:readmore;slk:Story continues" title=""><span data-dcnode-id="940" instrument_node="">Story continues</span></button></div><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Russia annexed Ukraine’s Crimean Peninsula in 2014 after the country’s Kremlin-friendly president was driven from power by mass protests and also threw its weight behind a separatist insurgency that broke out in Ukraine’s east.</span></p><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Earlier this year, a spike in cease-fire violations in the east and a Russian troop concentration near Ukraine fueled war fears, but tensions abated when Moscow pulled back the bulk of its forces after maneuvers in April.</span></p><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Putin argued that to avoid tensions, Russia and the West should negotiate agreements that would safeguard each party's security interests.</span></p><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">“The matter is not whether to send troops or not, go to war or not, but to establish a more fair and stable development and taking into account security interests of all international players,” he replied when asked if Russia was going to invade Ukraine. “If we sincerely strive for that, no one will fear any threats.”</span></p><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">The Russian leader noted that Russia has worried about NATO drills near its borders, pointing at a recent exercise that involved U.S. strategic bombers.</span></p><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">“Strategic bombers, which carry precision weapons and are capable of carrying nuclear weapons, were flying as close as 20 kilometers (12 miles) to our border,” Putin said. “That represents a threat for us.”</span></p><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">After the buildup of Russian troops near Ukraine early this year, Putin and U.S. President Joe Biden held a June summit in Geneva, where they agreed to launch a dialogue on strategic stability and cybersecurity. Putin on Tuesday hailed the cybersecurity discussions between Russian and U.S. experts, saying “just as with the pandemic, it's necessary to pool efforts to work efficiently.”</span></p><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Asked about reports on plans for a Biden-Putin call next month, White House press secretary Jen Psaki told reporters Tuesday aboard Air Force One that she doesn’t have “anything to predict or preview at this point,” adding that “obviously, we remain in touch as a follow up to the summit this summer, at a high level with Russian counterparts.”</span></p><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Responding to a question about the threat of a Russian invasion in Ukraine, Psaki said “we’re deeply concerned about the heightened rhetoric, about the reported military buildup on the border.”</span></p><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">In Russia, when asked about Biden possibly seeking a second term, Putin said he thought that would help political stability in the U.S. The Russian leader drew a parallel with his own reelection plans.</span></p><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Even though Putin hasn't decided yet whether to seek another term before his current one ends in 2024, he said the possibility of him staying on has helped Russia's stability.</span></p><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">The 69-year-old president has been in power for more than two decades — longer than any other Kremlin leader since Soviet dictator Josef Stalin. Constitutional amendments approved in 2020 reset Putin’s previous term limits, allowing him to run for president two more times and hold onto power until 2036.</span></p><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">“In line with the constitution, I have the right to get elected to seek a new term, but I haven't yet made up my mind whether to do it or not," Putin said. “But the very existence of that right already stabilizes the domestic political situation.”</span></p><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Asked about China's nuclear buildup, Putin said that Russia isn't worried about it, adding that close ties between Moscow and Beijing are a “major factor of global stability.”</span></p><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">___</span></p><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Associated Press writer Alexandra Jaffe contributed to this report from aboard Air Force One.</span></p></div></div></div></div></div></div></div></article></div></div></div></div></div><div class
