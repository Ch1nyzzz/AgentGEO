kara’s relationship with Moscow is multi-faceted and often misunderstood. Turkey was a bulwark against the Soviet Union during the Cold War, but Turkish national elites have always been aware of the country’s close proximity to its larger neighbor, and have sought to manage ties with the leadership in Moscow. In the decades following the collapse of the Soviet Union, Turkish elites have debated Ankara’s role in the world, the country’s alliance with the United States, and how best to maximize Turkish interests in the former Soviet space. In general, </span><strong data-dcnode-id="506"><u data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">there is a consensus in Turkey that Ankara has considerable economic and political interests in deepening its relationships with all of its neighbors, including Russia. Turkey’s current ruling party</span></u></strong><span data-dcnode-id="505" instrument_node="">, the Justice and Development Party (AKP) adopted this basic philosophy, </span><strong data-dcnode-id="502"><u data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">but fused elements of it with Islamist tropes about colonialism and identity in the Middle East. As the AKP has radicalized, it has sought common cause with elements of the far right in Turkish politics,</span></u></strong><span data-dcnode-id="501" instrument_node=""> the MHP, and the group’s argument that Ankara’s alliance with the West is detrimental to the country’s future and that Turkey should explore deepening ties with Russia and the ethnic Turkic states along its periphery. Turkish domestic politics changed considerably after a failed coup attempt in July 2016. The attempted putsch further isolated current President Recep Tayyip Erdoğan and justified his complete overhaul of government. </span><strong data-dcnode-id="498"><u data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">The result has been the erosion of Turkey’s liberal institutions and the emergence of an authoritarian state, dependent on the fiat of the country’s president. At the same time, Ankara’s relationship with the United States and the European Union has cratered, following severe disagreements about strategy and tactics to defeat Islamic State in Syria and over Ankara’s own democratic failings back home</span></u></strong><span data-dcnode-id="497" instrument_node="">. The Turkish-Russian relationship has flourished during the same period; especially since Russian President Vladimir Putin was the first world leader to call Erdoğan after putschists tried to kill him. The leader-to-leader relationship has since flourished, giving way to joint efforts to manage conflict in Syria and Nagorno-Karabakh, and the Turkish decision to purchase the Russian-made S-400 air and missile defense system.</span></p><span data-dcnode-id="495" instrument_node="">
</span><h4 data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Turkish invasion of Syrian has undermined US efforts against ISIS</span></h4><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="485"><strong data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Stein, January 2022</span></strong><span data-dcnode-id="489" instrument_node="">, Dr. Aaron Stein is the Director of Research at the Foreign Policy Research Institute. He is the coeditor of The Russian Way of War in Syria: Implications for the West, an edited volume examining Russian operations in the civil war. He is also the author of the forthcoming book, The U.S. War Against ISIS: How America and its Allies Defeated the Caliphate (I.B. Tauris, 2022). Previously, Dr. Stein was a resident senior fellow of the Atlantic Council. He also hosts the Arms Control Wonk and the Chain Reaction podcasts. Dr. Stein was previously a doctoral fellow at the Geneva Center for Security Policy (Switzerland), an Associate Fellow of the Royal United Services Institute (London), and Nonproliferation Program Manager at the Center for Economics and Foreign Policy Studies (Istanbul), </span><em data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Turkey’s Response to the Russia-Ukraine Crisis</span></em><span data-dcnode-id="486" instrument_node="">, https://www.fpri.org/wp-content/uploads/2022/01/turkeys-response-to-the-russia-ukraine-crisis.pdf</span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="483" instrument_node="">In the weeks following the failed coup, Ankara moved ahead with an invasion of northern Syria. </span><strong data-dcnode-id="480"><u data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">The United States had formed a close partnership with the Syrian Kurds to fight the Islamic State</span></u></strong><span data-dcnode-id="479" instrument_node="">. The main Kurdish militia, the Peoples’ Protection Units, is an affiliate of the Kurdistan Workers’ Party (PKK</span><strong data-dcnode-id="476"><u data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">). The PKK has been fighting inside Turkey since 1984</span></u></strong><span data-dcnode-id="475" instrument_node="">. The group is listed in Turkey, the United States, and the European Union. </span><strong data-dcnode-id="472"><u data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Turkish officials accuse the United States of supporting terrorism and have justified three separate invasions of Syria on the basis of fighting terrorism. These interventions, however, have hindered the US-led war against ISIS, raising tensions between Ankara and much of the Western alliance.</span></u></strong></p><span data-dcnode-id="470" instrument_node="">
</span><h4 data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Russia could easily defeat drones provided by Turkey</span></h4><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="460"><strong data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Stein, January 2022</span></strong><span data-dcnode-id="464" instrument_node="">, Dr. Aaron Stein is the Director of Research at the Foreign Policy Research Institute. He is the coeditor of The Russian Way of War in Syria: Implications for the West, an edited volume examining Russian operations in the civil war. He is also the author of the forthcoming book, The U.S. War Against ISIS: How America and its Allies Defeated the Caliphate (I.B. Tauris, 2022). Previously, Dr. Stein was a resident senior fellow of the Atlantic Council. He also hosts the Arms Control Wonk and the Chain Reaction podcasts. Dr. Stein was previously a doctoral fellow at the Geneva Center for Security Policy (Switzerland), an Associate Fellow of the Royal United Services Institute (London), and Nonproliferation Program Manager at the Center for Economics and Foreign Policy Studies (Istanbul), </span><em data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Turkey’s Response to the Russia-Ukraine Crisis</span></em><span data-dcnode-id="461" instrument_node="">, https://www.fpri.org/wp-content/uploads/2022/01/turkeys-response-to-the-russia-ukraine-crisis.pdf</span></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="458" instrument_node="">Ankara, however, is acutely aware of its need to have functional relations with the United States. The Russian build-up in Ukraine has, therefore, given Turkish policymakers a tool to try and tout its anti-Russian bonafides. The centerpiece of this argument is Ankara’s relationship with Kyiv. </span><strong data-dcnode-id="455"><u data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">The United States has some interest in supporting Turkey’s defense industrial relationship with Kyiv, but should understand the limits of the TB2. The small Turkish drone has considerable value in Kyiv’s clashes against Russian backed separatists. However, in a true shooting war with Russian forces, the drone could be destroyed on the ground or picked off by orbiting fighters or Russian air defenses. The small number of drones does not alter the balance of power. The TB2, in this sense, is functionally irrelevant in a high-intensity conflict.</span></u></strong></p><span data-dcnode-id="453" instrument_node="">
</span><h4 data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Russia can offset the TB12 drone and its provision could be used to justify an invasion</span></h4><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="443"><strong data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Stein, January 2022</span></strong><span data-dcnode-id="447" instrument_node="">, Dr. Aaron Stein is the Director of Research at the Foreign Policy Research Institute. He is the coeditor of The Russian Way of War in Syria: Implications for the West, an edited volume examining Russian operations in the civil war. He is also the author of the forthcoming book, The U.S. War Against ISIS: How America and its Allies Defeated the Caliphate (I.B. Tauris, 2022). Previously, Dr. Stein was a resident senior fellow of the Atlantic Council. He also hosts the Arms Control Wonk and the Chain Reaction podcasts. Dr. Stein was previously a doctoral fellow at the Geneva Center for Security Policy (Switzerland), an Associate Fellow of the Royal United Services Institute (London), and Nonproliferation Program Manager at the Center for Economics and Foreign Policy Studies (Istanbul), </span><em data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Turkey’s Response to the Russia-Ukraine Crisis</span></em><span data-dcnode-id="444" instrument_node="">, https://www.fpri.org/wp-content/uploads/2022/01/turkeys-response-to-the-russia-ukraine-crisis.pdf</span></p><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="428"><span data-dcnode-id="441" instrument_node="">For the Ukraine situation, more specifically, Ankara can pursue a variation of this “fencesitting” policy. Ankara can continue to export defense items to Kyiv, while simultaneously engaging Moscow, and resisting any US calls to independently support any coercive actions against Russia. Instead, Turkey is more likely to operate within the alliance, but resist calls to join US or EU calls to impose sanctions in response to an invasion. These sanctions would undermine Turkish economic policy, which depends on cooperation with Russia on issues ranging from energy to agriculture to tourism. It is not in Ankara’s interests to isolate Russia. For these reasons, Akinci drone on display at Teknofest 2019 (Wikimeda Commons/ Talha Işık) 20 FOREIGN POLICY RESEARCH INSTITUTE the </span><strong data-dcnode-id="438"><u data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">US has to contend with a Turkish arms policy that risks irking Russia, but which provides both Kyiv and Washington with few tangible benefits. The TB2 and the Akinci (if it is ever exported) do not alter the balance of power. Instead, any tangible gain Kyiv attains over the Donbas insurgents is mitigated by an increased Russian commitment to the enclaves it has seized. Moscow, in short, has escalation dominance. </span></u></strong><span data-dcnode-id="437" instrument_node="">The US, in turn, is called upon to guarantee the security of the eastern NATO states and to deploy forces to reassure allies. </span><strong data-dcnode-id="434"><u data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Turkey is an important NATO member, but it does not guarantee the security of the alliance</span></u></strong><span data-dcnode-id="433" instrument_node="">. This reality means that the US has an interest in how allied actions impact broader alliance security. In this case, the current level of TurkishUkrainian cooperation has greater positive outcomes for Ankara. The Ukrainian supply of engines has enabled the development of a larger turbo-prop powered drone and may power the next generation of Turkish air power. This relationship has helped to insulate Turkey from a downturn in relations with the United States. The future of the relationship could also further Ankara’s interest in developing its own, autarkic defense industry. </span><strong data-dcnode-id="430"><u data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">The Turkish support for Kyiv does enhance the armed forces’ capabilities against the separatists. It does not have a tangible impact on the balance of power with Russia. Instead, the potential negative outcome from continued and deeper cooperation — to include the provision of long-range strike systems — could actually make the situation worse and give Moscow a narrative to justify military action.</span></u></strong><span data-dcnode-id="429" instrument_node=""> The United States will be embroiled in the outcome of this tripartite balancing act. Washington guarantees Turkish and NATO security, protecting Ankara from escalation with Moscow. The Russian armed forces are certain to retain military overmatch against its smaller neighbors. Absent a credible US guarantee, Ukraine may forever be susceptible to Russian military coercion. The Turkish role, in this scenario, is beneficial for certain contingencies, but also not determinative in shifting the asymmetry of power.</span></p><span data-dcnode-id="427" instrument_node="">
</span><h4 data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Turkey working to resolve the Ukraine crisis and secure the Black Sea</span></h4><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Arzu Addison, January 12, 2012, TURKEY ASKS AMERICA AND RUSSIA TO REST https://www.campuslately.com/turkey-asks-america-and-russia-to-rest/</span></p><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="412"><strong data-dcnode-id="418"><u data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Turkey’s defense minister said further escalation of tensions should be avoided, a</span></u></strong><span data-dcnode-id="417" instrument_node="">s he believed that any sudden and bad move could easily lead to a chain reaction. </span><strong data-dcnode-id="414"><u data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">It is especially important for Turkey not to get out of the conflict between Russia and Ukraine, which are close to it, since inflation in the country will almost certainly rise sharply, and the tourism sector, which is vital for Ankara, may be hit hard. . Turkey, which has the second largest force in NATO, proposes to implement the 1936 Montreux Convention to ensure stability in the Black Sea region. This means that the fleet of the countries bordering the Black Sea will not be allowed to stay in the region for more than 21 day</span></u></strong><span data-dcnode-id="413" instrument_node="">s, but it will also limit the number of foreign warships allowed to enter the Black Sea through the Turkish Strait and generally prohibit the stationing of foreign warships. Aircraft carriers. Turkey has so far refrained from confronting Russia over the Ukraine crisis, with President Recep Tayyip Erdogan’s foreign policy maneuvering playing a major role. Indeed, Erdogan seeks to maintain Turkish influence in regions such as the Caucasus, Libya or Syria, where Russia is also present militarily.</span></p><span data-dcnode-id="411" instrument_node="">
</span><h4 data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Turkey working to resolve the Ukraine crisis and secure the Black Sea</span></h4><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Arzu Addison, January 12, 2012, TURKEY ASKS AMERICA AND RUSSIA TO REST https://www.campuslately.com/turkey-asks-america-and-russia-to-rest/</span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="396"><strong data-dcnode-id="402"><u data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">Turkey’s defense minister said further escalation of tensions should be avoided, a</span></u></strong><span data-dcnode-id="401" instrument_node="">s he believed that any sudden and bad move could easily lead to a chain reaction. </span><strong data-dcnode-id="398"><u data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">It is especially important for Turkey not to get out of the conflict between Russia and Ukraine, which are close to it, since inflation in the country will almost certainly rise sharply, and the tourism sector, which is vital for Ankara, may be hit hard. . Turkey, which has the second largest force in NATO, proposes to implement the 1936 Montreux Convention to ensure stability in the Black Sea region. This means that the fleet of the countries bordering the Black Sea will not be allowed to stay in the region for more than 21 day</span></u></strong><span data-dcnode-id="397" instrument_node="">s, but it will also limit the number of foreign warships allowed to enter the Black Sea through the Turkish Strait and generally prohibit the stationing of foreign warships. Aircraft carriers. Turkey has so far refrained from confronting Russia over the Ukraine crisis, with President Recep Tayyip Erdogan’s foreign policy maneuvering playing a major role. Indeed, Erdogan seeks to maintain Turkish influence in regions such as the Caucasus, Libya or Syria, where Russia is also present militarily.</span></p><span data-dcnode-id="395" instrument_node="">
</span><h4 data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Even if Erdogan is more authoritarian, this is transitional and Turkey is a democracy</span></h4><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="387"><span data-dcnode-id="391" instrument_node="">Özgür Ünlühisarcıklı Director, Ankara Office, Gkreen Marchall Fund, January 12, 2022, </span><a data-dcnode-id="389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gmfus.org/news/it-not-too-early-think-about-political-change-turkey"><span data-dcnode-id="390" instrument_node="">https://www.gmfus.org/news/it-not-too-early-think-about-political-change-turkey</span></a><span data-dcnode-id="388" instrument_node="">, It Is Not Too Early to Think About Political Change in Turkey</span></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="365"><strong data-dcnode-id="383"><u data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">After almost 20 years of uninterrupted rule</span></u></strong><span data-dcnode-id="382" instrument_node=""> by Recep Tayyip Erdoğan, first as prime minister and then as president, </span><strong data-dcnode-id="379"><u data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Turkey may be on the verge of political change. </span></u></strong><span data-dcnode-id="378" instrument_node="">While this is a possibility rather than a foregone conclusion, its allies and partners should be prepared for such an outcome. Not too long ago, it was widely believed that Erdoğan could not be defeated in an election due to several factors, including the devotion of his supporters, his political savvy, and the lack of a viable opposition. After the failed coup attempt in July 2016 and the repressive state of emergency that followed, a new narrative emerged: Turkey was now an authoritarian state where election outcomes would be predetermined. Others argued that, while they are unfair, elections are real and competitive, with the opposition having a genuine chance of winning. The latter argument was proven correct in the March 2019 local elections. The opposition won in most of the metropolitan cities, including Ankara and İstanbul. The rerun of the elections in İstanbul, based on flimsy arguments, cast a shadow over Turkey’s electoral democracy, but ultimately the city’s voters made their will indisputably clear and the opposition won by an even bigger margin in the rerun. </span><strong data-dcnode-id="375"><u data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">The next presidential and parliamentary elections are scheduled for June 2023, but early ones cannot be ruled out. Erdoğan has been sliding significantly in opinion polls since the local elections, indicating </span></u></strong><span data-dcnode-id="374" instrument_node="">that his reelection cannot be taken for granted. Several factors have contributed to this situation. First, the change from a parliamentary to a presidential system of government has not worked well for Erdoğan. In the new system, his Justice and Development Party (AKP) has been sidelined by presidential bureaucrats and advisors who do not necessarily have connections to the party grassroots. As a result of this and of losing major municipalities in 2019, the clientelist network that the AKP and Erdoğan used to enjoy has been largely disrupted. The presidential system came with two other changes that had negative outcomes for Erdoğan. The 50 percent plus one threshold to be elected president and the legalization of formal electoral alliances led him to ally the AKP with the far-right Nationalist Action Party (MHP). His dependence on the MHP has not only limited his policy choices but also alienated some AKP voters such as conservative Kurds. While the audience for the opposition’s message is growing by the day, that of Erdoğan is gradually but steadily shrinking. Second, the social democratic Republican People’s Party (CHP) was able to form an alliance with a diverse set of parties—including one moderate nationalist, one hardcore Islamist, and one center-right party—gaining the ability to address a wider audience. The CHP then changed its political discourse. In the past, it engaged in a rigid secular, antireligious, and nationalist rhetoric, and it “othered” religious conservatives and Kurds. It supported repressive measures such as the infamous headscarf ban of the 1990s. This approach had confined CHP to a marginal ideological corner. Under its current president, Kemal Kılıçdaroğlu, the party has gradually pivoted away from this approach, hesitantly at first and more decisively recently. He went so far as to publicly apologize to those his party has wronged in the past. While the audience for the opposition’s message is growing by the day, that of Erdoğan is gradually but steadily shrinking. The opposition bloc had another problem: cohesion and coherence. Initially, its common denominator was little more than anti-Erdoğanism. However, it has recently begun building a proactive and positive shared agenda, such as restoring the parliamentary system and advancing democratic freedoms. Third, Turkey is experiencing its worst currency crisis since the 2001 economic crisis that propelled the AKP to power. Due to the increasing political risks, the impact of the coronavirus pandemic, and most notably unorthodox monetary policies such as keeping the interest rate below inflation, which Erdoğan insists on, the Turkish lira has devalued by more than 50 percent in a year. The devaluation was partially curbed only through the guarantee by the Treasury to indemnify holders of lira deposits if devaluation exceeds the interest rate. As a result of the devaluation, inflation has jumped to 36 percent as of the start of the year. Unless there is an unexpected development, Erdoğan, the opposition candidate, and likely the candidate of the Peoples’ Democratic Party, (HDP) will face off in the presidential election. The HDP was never invited to join the opposition bloc because it was thought that this would not go down well with the voters of the other opposition parties. The HDP has not taken issue with this and in the case of a second round, which is more likely than not, its voters are expected to support the opposition bloc candidate. Under these conditions, one can envision three scenarios for the country. More of the Same Erdoğan could be reelected despite the disadvantages he is now experiencing. Any combination of unexpected improvements in the economy, a crisis that looks like a national emergency, making the vote counting less transparent, and finding other ways to make the election even less fair—or mistakes by the opposition, such as picking the wrong candidate—could result in another victory for Erdoğan. This scenario would likely see more of the same trajectory in Turkey, but accelerated. Some observers take this scenario further—to the election not taking place in an orderly fashion or to Erdoğan not conceding if he loses. Given that that the AKP candidate, under instructions from Erdoğan, did not concede after losing the local elections in İstanbul and that the stakes would be much higher in the presidential election, this perspective must not be dismissed. However, </span><strong data-dcnode-id="371"><u data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Turkey has a long tradition of democratic elections and a vibrant opposition, and the system monitoring the ballots and protecting votes has proved resilient so far. Moreover, Turkey is an open market economy that needs foreign capital inflows to sustain its growth, and for this reason it cannot afford a Belarus scenario for long. </span></u></strong><span data-dcnode-id="370" instrument_node="">Change of Season This is a scenario in which the opposition wins the presidential election. This could lead to a bare minimum of democratization steps or political paralysis. The former will represent a slow transition, the latter a transition crisis that can scuttle the transition. B</span><strong data-dcnode-id="367"><u data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">ecause a new president would be elected with the support of a very diverse group of political parties and would need their support in the parliament, he or she would have an incentive to adopt an inclusive, consensual, and pluralistic governing style. This would pave the way to the reversal of some of the recent democratic backsliding. The rule of law, media freedom, and human rights would improve and the space for civil society would grow. </span></u></strong><span data-dcnode-id="366" instrument_node="">However, ideological differences among the parties supporting the new president could prevent them from making constitutional changes to advance and consolidate democratic reforms. Even if the parliamentary system is restored, Turkey’s democracy would look a lot like the one before the failed coup attempt in 2016—a nominal democracy in need of comprehensive modernization. This would be a shaky and reversable democratization. It would still be spring, but winter would likely follow.</span></p><span data-dcnode-id="364" instrument_node="">
</span><h4 data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Kazakhstan proves turkey fails at regional peacekeeping</span></h4><span data-dcnode-id="361" instrument_node="">
</span><p data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">News.am, January 12, 2022, Turkey’s Turkic world ambitions face reality check in Kazakhstan, https://news.am/eng/news/681665.html</span></p><span data-dcnode-id="358" instrument_node="">
</span><p data-dcnode-id="325"><strong data-dcnode-id="355"><u data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Turkey’s aspirations to lead the greater Turkic world and become a Eurasian heavyweight has met a “reality check,”</span></u></strong><span data-dcnode-id="354" instrument_node=""> analysts said, </span><strong data-dcnode-id="351"><u data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">as violence erupted in the ex-Soviet, Turkic nation of Kazakhstan last week. </span></u></strong><span data-dcnode-id="350" instrument_node="">Here’s the full text of the article: When the oil, gas and uranium-rich country needed security assistance to maintain order, it was the Russia-dominated Collective Security Treaty Organization (CSTO) that it turned to. Russian President Vladimir </span><strong data-dcnode-id="347"><u data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Putin claimed victor</span></u></strong><span data-dcnode-id="346" instrument_node="">y Monday, </span><strong data-dcnode-id="343"><u data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">after swiftly deploying CSTO forces to guard critical Kazakh infrastructure, allowing Kazakh forces to concentrate on tackling protesters. </span></u></strong><span data-dcnode-id="342" instrument_node="">“I am confident that our joint efforts will make it possible to fully reestablish control over the situation nationwide and to stabilize it,” Putin told fellow CSTO members in an emergency session. “We must make sure that events similar to the tragedy happening in the brotherly country of Kazakhstan will not catch us by surprise again and that we are fully mobilized and ready to push back against any new provocation,” he said, hinting to leaders of other ex-Soviet states that the alliance would protect them too. Geopolitical analyst Michael Tanchum noted that the </span><strong data-dcnode-id="339"><u data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">intervention by Russia and the CSTO in Kazakhstan was “an important cautionary signal” for Turkey and the freshly revamped Organization of Turkic States, “that their ambitions should not outrun their capacity.” </span></u></strong><span data-dcnode-id="338" instrument_node="">In the wake of the Turkish-assisted victory by Azerbaijan in its war with Armenia in 2020, “a certain ‘Turan’ (greater Turkic world) euphoria took hold on social media,” Tanchum, a senior fellow at the Austrian Institute for European and Security Policy and a non-resident fellow at the Middle East Institute in Washington, said. This gained further momentum last November, when Turkey became the rotating president of the Organization of Turkic States and changed the group’s name from the Cooperation Council of Turkic Speaking States (Turkic Council). The leaders opened a new headquarters in Istanbul and adopted a strategy document titled “Turkic World Vision 2040.” Ambitious maps of a “Turkic World” emerged on social media after the gathering, with some engulfing western China’s Xinjiang Autonomous Region and parts of eastern Russia. “Russia confronts a new geopolitical reality of Turkey as a rising Eurasian agenda-setter with its own capacity to reorient connectivity across the Caspian basin and Central Asia,” Tanchum said. “This potential was greatly enhanced by the November 2020 ceasefire agreement that created a corridor through Armenia connecting Azerbaijan to its exclave of Nakhchivan, providing Ankara direct connectivity with Azerbaijan and all of Turkic Central Asia.” “Russia looks on all of these developments with concern. China does as well,” Tanchum said. Rich Outzen, a former U.S. military officer and State Department policy-planning official, said, “</span><strong data-dcnode-id="335"><u data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">This has been a great reality check” for Turkey’s ambitions via the Organization of Turkic States. “Just because a great power like the United States is less interested in the region, with the Afghanistan pullout, it doesn’t mean that other great powers like Russia or China are also less interested and there is a free hand to shape anything the way other countries of the region want to.” “Russians have near-imperial interests in the area and absolutely want to shape it according to their wishes. Chinese as well</span></u></strong><span data-dcnode-id="334" instrument_node="">,” Outzen said. </span><strong data-dcnode-id="331"><u data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">He said the Organization of Turkic States was about “three years late” in terms of Kazakhstan, and Turkey’s success in assisting fellow Turkic state Azerbaijan in its 2020 war could not be used as a comparison to measure Ankara’s growing influence in the region. Relations with other Turkic countries like Kazakhstan are developing at a comparatively slower pace, Outzen noted. </span></u></strong><span data-dcnode-id="330" instrument_node="">Although not an international security body like the CSTO, the Organization of Turkic States promotes the integration of Turkic-speaking countries in a wide range of areas from culture to connectivity. Members span from Turkey to Central Asia and include Azerbaijan, Kazakhstan, Uzbekistan and Kyrgyzstan. Turkmenistan, which embraces a “permanent neutrality” policy, is the newest observer member and joins Hungary on the sidelines of the body. Ukraine has expressed interest in joining as an observer. On Jan. 6, as violence spread in Kazakhstan, Turkey’s President Recep Tayyip Erdogan held separate calls with leaders of the Central Asian Turkic states, including Kazakhstan President Kassym-Jomart Tokayev. Erdogan told Tokayev that Turkey was closely following the developments taking place in the “friendly and brotherly” Kazakhstan. To the other Turkic leaders, Erdogan underscored the importance of stability and security in Kazakhstan in terms of its neighbors and the entire region. On Tuesday, Turkey conveyed a video conference of the foreign ministers of the Organization of Turkic States. A joint statement issued after the meeting drew attention to the Turkic World Vision 2040 document as a “guideline for coordination, cooperation and mutual assistance in addressing domestic and international challenges.” Speaking to Nikkei Asia, Kazakhstan’s Ambassador to Ankara Abzal Saparbekuly explained that Kazakhstani Foreign Minister Mukhtar Tileuberdi did not put forward any request to the Turkic organization during the video conference, “but gave a detailed explanation of the accounts to member states.” “That was what the members wanted to hear, firsthand,” Saparbekuly said. “From here going forward, what kind of cooperation can be done will be decided at the next face-to-face meeting of member states,” he added. The Turkic World Vision 2040 document refers to building “a network for cooperation and information sharing among member states to combat threats of radicalization, violent extremism, Islamophobia, xenophobia and terrorism, and to ensure border security.” It also talks of jointly fighting organized crime, illegal drug trade, irregular migration as well as economic, financial and cybercrimes, but no reference is made to joint peace-keeping missions among member states. While Turkish officials have taken a careful and neutral stance on Russia and CSTO involvement in Kazakhstan, Turkish hawks have begun to call for a similar “Greater Turkic army” that can respond to such incidents. Retired Rear Admiral Cihat Yayci, who served as chief of staff of Turkish Naval Forces until 2020, told local media: “A Turan army should be established.” Yayci said it is unacceptable that Armenian forces entered Kazakhstan in the name of peace-keeping forces. Such comments will surely be monitored closely in Moscow and Beijing. Asked about the possibility of a future peace-keeping mission mandate for the organization on Saturday, Turkish Defense Minister Hulusi Akar told reporters: “These are all possibilities and all possibilities are on the table. As developments unfold, any such measures can be taken.” Akar added that Erdogan’s statement that Turkey is ready to share all kinds of information and experience with Kazakhstan “is an instruction for us.” “When any request, demand arrives and if we are instructed and ordered as such, we are ready to provide all kinds of help and support to our Kazakhstani brothers,” he said. Saparbekuly, the Kazakh envoy, said that while the Vision 2040 document does not discuss peace-keeping missions, “After the recent developments in Kazakhstan, every country will evaluate its sovereign decision” on whether to take part in such missions if they were introduced by the Turkic organization, “in line with their respective national interests and international agreements.” Saparbekuly previously served as deputy secretary general of the organization. </span><strong data-dcnode-id="327"><u data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Although Turkey has recently stepped up security cooperation with Kazakhstan through defense industry exports, education and training of Kazakh military personnel in Turkey and joint military drills, its security cooperation is no match for Russia. In Kazakhstan, Russia rents an anti-ballistic missile testing range as well as a spaceport known as Baikonur Cosmodrome. </span></u></strong><span data-dcnode-id="326" instrument_node="">Saparbekuly confirmed media reports that Kazakhstan has acquired Turkish ANKA armed drones from Turkish Aerospace, saying: “We reached an agreement in principle probably two months ago but still deliveries, financial matters etc. have not been completed.” On Tuesday, Tokayev appointed Alikhan Smailov as new prime minister and announced that around 2,000 CSTO peace-keeping forces will start to withdraw from Kazakhstan in two days time as the “main mission of the CSTO peacekeeping forces has been successfully completed,” adding the withdrawal process will take “no more than 10 days.” The Turkish Foreign Ministry, meanwhile, announced Tuesday that Foreign Minister Mevlut Cavusoglu will travel to China on Wednesday. “It would be appropriate to see in Cavusoglu’s visit an attempt to tamp down concerns, or narratives, that the events in Kazakhstan were a product of pan-Turkist agitation, as some in China have intimated,” Outzen said. Turkey can also explain to Beijing that the Organization of Turkic States does not threaten Chinese interests, he said. Ogul Tuna, a researcher of post-Soviet studies at University of California, Irvine said that Cavusoglu’s upcoming visit to China can be an effort to balance Russia’s move as well as to reassure the Chinese that Ankara does not have a Pan-Turkist agenda.</span></p><span data-dcnode-id="324" instrument_node="">
</span><h4 data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Turkey helps to deter a Russian invasion of Azerbaijan</span></h4><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">JAMI News, January 11, 2022, Op-ed: How does Turkey-Azerbaijan military alliance fit into Russia’s demands for NATO?, https://jam-news.net/op-ed-how-does-turkey-azerbaijan-military-alliance-fit-into-russias-demands-for-nato/</span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="288"><span data-dcnode-id="317" instrument_node="">With regard to the expansion of NATO’s influence to the east, Russia calls the post-Soviet space its “red line”. However, </span><strong data-dcnode-id="314"><u data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Azerbaijan is actively cooperating with Turkey, a NATO member, in the military field. Turkey and Azerbaijan created a military alliance</span></u></strong><span data-dcnode-id="313" instrument_node="">, which is enshrined in the declaration signed in 2021 in Shusha (Shushi). A vicious circle in Azerbaijan: electoral violations and belated decisions of the ECHR CSTO Security Council meeting: threat to Kazakhstan or the CSTO? According to the Shusha Declaration, signed on June 15, 2021, Azerbaijan and Turkey enter a military alliance. The document indicates the obligation of the parties of mutual military assistance in case of danger to sovereignty and territorial integrity. Azerbaijan and Turkey agree on mutual military assistance A declaration of alliance between Azerbaijan and Turkey has been signed in the city of Shusha (Armenian Shushi) liberated as a result of the second Karabakh war </span><strong data-dcnode-id="310"><u data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">In addition, Turkey and Azerbaijan are conducting planned joint military exercises on the territory of both countri</span></u></strong><span data-dcnode-id="309" instrument_node="">es. The said declaration does not exclude the establishment of Turkish military bases on the territory of Azerbaijan. </span><strong data-dcnode-id="306"><u data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">The Turkish army is the second most powerful army in NATO. </span></u></strong><span data-dcnode-id="305" instrument_node="">During the Geneva talks between Russia and NATO, Moscow put forward a demand for the alliance not to extend its influence over the post-Soviet space, including the countries of the Caucasus. How can cooperation with a NATO member affect Azerbaijan’s relations with Russia? JAMnews addressed this question to the political observer Agshin Kerimov. “Russia’s demands are a clear threat” Since 1997, NATO has expanded its political geography in such a way that would have Russia surrounded in Eastern Europe. Russia’s concern stems from the fact that NATO is practically ‘under its nose’, and the situation itself is developing according to the Cold War scenario. The Ukrainian issue has brought the already turbulent, mutually zealous relationship to extreme escalation. Since 2004, when the former Soviet republics of Latvia, Lithuania and Estonia became NATO members, enraged Russia has been rapidly expanding its military capabilities and has repeatedly conducted military maneuvers along its western borders. But despite Russia’s strategic and military advantage over the Baltic states, the Kremlin will not succeed in subordinating them to its political will for the simple reason that even during the Soviet era, this region was distinguished by its aggressiveness towards Russia. After the region came under NATO’s zone of influence, the expansion of the North Atlantic alliance to other post-Soviet countries became a “red line” for the Kremlin, and the question of Ukraine exacerbates the situation even more. For the same reason, Russia cannot stomach Georgia’s aspirations to join NATO; Moscow’s rhetoric is not any softer on this issue either. Russia demands from neighboring countries to clarify the boundaries of participation in NATO programs with integration into this Western alliance. This is an obvious threat. “Russia is trying to pull Baku into its orbit” </span><strong data-dcnode-id="302"><u data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">As for Azerbaijan, Russia is trying to drag Baku into its orbit. Strategists of the Azerbaijani state understand the futility of this path, but are also trying to pursue a policy aimed at appeasing the Kremlin’s anger. Ultimately, this meets the interests of both the West and Moscow. </span></u></strong><span data-dcnode-id="301" instrument_node="">Despite the fact that our region is now going through a post-war period, the principle of balance in Azerbaijan’s foreign policy has not been significantly violated. The West plays an important role in facilitating moments of Azerbaijan’s closeness to the Kremlin. During the second Karabakh war, Azerbaijan did not receive support from Western countries, with the exception of Great Britain. Baku predicted this in advance, and, therefore, took advantage of the tandem of Ankara and Moscow. “Azerbaijan is Turkey’s “red line” Naturally, the Kremlin’s warnings against NATO are also related to Azerbaijan, a country that has deepened cooperation with the North Atlantic alliance. At the moment, the Azerbaijani government is acting very carefully. Despite all this, </span><strong data-dcnode-id="298"><u data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">the presence of the Turkish factor plays an important role in repelling any aggression. </span></u></strong><span data-dcnode-id="297" instrument_node="">In this sense, the voicing of some open threats against Azerbaijan from Russia is associated with the factor of Turkey. The signing of the Shusha Declaration was an integral part of preventive measures, and it was very timely. This declaration itself is a continuation of the agreement signed between the two countries in 2010, and in fact can be called a document that creates new instruments for the post-war period. In addition</span><strong data-dcnode-id="294"><u data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">, Azerbaijan and Turkey periodically conduct joint military exercises, and the Azerbaijani army is increasing its power. </span></u></strong><span data-dcnode-id="293" instrument_node="">Perhaps the Kremlin has its own unspoken plans for Azerbaijan. But you shouldn’t take them seriously. </span><strong data-dcnode-id="290"><u data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Russia will not want to spoil relations with Turkey. And Azerbaijan is the same “red line” for Turkey. </span></u></strong><span data-dcnode-id="289" instrument_node="">The most effective instrument in the hands of Russia is the peacekeepers deployed on the territory of Azerbaijan, and in this matter Baku does not find adequate support from Ankara. Despite all that has been said, Baku is convinced that Ankara, together with the Azerbaijani authorities, is trying to achieve the withdrawal of Russian peacekeepers from Karabakh.</span></p><span data-dcnode-id="287" instrument_node="">
</span><h4 data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Turkey provides important conflict mediation, including over Kazakhastan and the Ukraine. It’s membership in NATO makes it a unique negotiator</span></h4><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Nur Ozkan Erbay, January 6, 2022, Turkish foreign policy is starting 2022 at a fast and sharp pace, https://www.dailysabah.com/politics/news-analysis/turkish-foreign-policy-is-starting-2022-at-a-fast-and-sharp-pace</span></p><span data-dcnode-id="281" instrument_node="">
</span><p data-dcnode-id="246"><span data-dcnode-id="280" instrument_node="">With the increased diplomatic traffic in the last quarter of 2021, it has become clear which areas </span><strong data-dcnode-id="277"><u data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Turkey will focus on to achieve tangible gains in foreign policy in 2022</span></u></strong><span data-dcnode-id="276" instrument_node="">. In particular, Turkey, which has started the process of normalization with several countries on both a bilateral and regional level, seems intent to continue these steps in the new year. A</span><strong data-dcnode-id="273"><u data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">nkara has been looking for ways to create common solutions in line with its win-win strategy despite differences of opinion on bilateral relations and regional issues with important partners such as Russia, the United States and the European Union. </span></u></strong><span data-dcnode-id="272" instrument_node="">On the one hand, Turkey’s strategic approach, which continues to seek regional alliances, should be evaluated within the steps of normalization with the Gulf states, Saudi Arabia, Israel, Egypt and Armenia, especially in the last quarter of 2021. On the other hand, it would not be a surprise to say that </span><strong data-dcnode-id="269"><u data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">Turkey, which continues to act as a mediator in global and regional crises as well as a critical member of NATO, will be much more active in helping to calm crises in 2022. </span></u></strong><span data-dcnode-id="268" instrument_node="">Therefore, it would be useful to analyze the meetings of President Recep Tayyip Erdoğan and Foreign Minister Mevlüt Çavuşoğlu to find clues and follow their footsteps to make pointed assessments for the new year. E</span><strong data-dcnode-id="265"><u data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">rdoğan conducted his first telephone conversation of 2022 with his Russian counterpart, Vladimir Putin</span></u></strong><span data-dcnode-id="264" instrument_node="">, over the weekend. Erdoğan evaluated regional issues and international developments, especially in the Caucasus, Syria and Libya, which will continue to be on the agenda of Turkey and Russia in the new year. A statement by the Presidential Communications Office said that both leaders would maintain their decisiveness and commitment to promoting cooperation between Turkey and Russia in all areas during the meeting, while the Kremlin statement also said </span><strong data-dcnode-id="261"><u data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">that Russia’s proposals for various security guarantees to the United States and NATO were discussed. </span></u></strong><span data-dcnode-id="260" instrument_node="">In another interesting development, </span><strong data-dcnode-id="257"><u data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Çavuşoğlu held a meeting over the phone with his U.S. counterpart, Antony Blinken, on Tuesday. The main topic was the tension between Russia and NATO over Ukraine. D</span></u></strong><span data-dcnode-id="256" instrument_node="">uring the meeting, the developments in Turkey-U.S. bilateral relations, the border crisis between Sudan and Ethiopia, the normalization process and </span><strong data-dcnode-id="253"><u data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">the revitalization of strategic mechanism in the Caucasus and the Russian-Ukrainian tension were discussed before the upcoming NATO and OSCE gatheri</span></u></strong><span data-dcnode-id="252" instrument_node="">ngs, the Foreign Ministry said in a statement. The statement of the U.S. State Department regarding the meeting also said that the two ministers discussed developments in the Horn of Africa, as well as the appointment of a special envoy to discuss the Turkish-Armenian normalization process and efforts to deepen bilateral cooperation. Among the other important developments in the first days of the new year, Erdoğan announced that he would travel to Saudi Arabia in February. This will be his first visit to Saudi Arabia since the murder of Saudi journalist Jamal Khashoggi in 2018. In the same month, Erdoğan will also travel to Abu Dhabi to pay a visit to United Arab Emirates (UAE) Crown Prince Sheikh Mohammed bin Zayed Al Nahyan (MBZ), who visited Turkey after a long absence in November 2021. Meanwhile, regarding the normalization steps with the UAE, Çavusoglu said Abu Dhabi had submitted an offer on ground transportation and that Turkey was also considering warmly. Answering Daily Sabah’s question at the annual press conference, Çavuşoğlu also stated that UAE officials told Ankara that Turkey, Qatar and the UAE could operate the Kabul airport on a tripartite basis. As another remarkable step, following years of frozen ties, the neighboring countries of Turkey and Armenia have announced they seek to normalize relations amid efforts for regional integration and cooperation in the South Caucasus. Special envoys from Turkey and Armenia will hold the first round of talks aimed at normalizing ties in Moscow on Jan. 14, the Turkish Foreign Ministry said Wednesday, as the two countries work to mend ties after years of animosity. Armenia also announced that it is lifting an embargo on Turkish goods starting Jan. 1, as one of the first results of the process in addition to mutual flights recommencing between the two countries soon. In the light of all these developments, if these normalization steps form an important strategic dimension of Turkey’s foreign policy in 2022, the other step will be to form an important role for mediation that will aid in resolving regional and global crises. Çavuşoğlu also spoke over the phone with NATO Secretary-General Jens Stoltenberg on Wednesday. According to the Foreign Ministry’s statement, Çavuşoğlu and Stoltenberg spoke to exchanged views ahead of the meeting of NATO foreign ministers and the NATO-Russia Council meeting, set for Jan. 12, amid rising tension over Ukraine and political turmoil in Kazakhstan. As another indication of the intense diplomatic traffic in Ankara, Çavuşoğlu on Thursday spoke over the phone with Russian Foreign Minister Sergey Lavrov. The two discussed the NATO-Russia council meeting, current developments in Kazakhstan, Bosnia-Herzegovina and the Caucasus. </span><strong data-dcnode-id="248"><em data-dcnode-id="249"><u data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">It will not be difficult to guess that Turkey will likely play an important mediating role in Russia-West tensions, as well as in the Ukraine and Kazakhstan case. Turkey, which has historical and cultural ties with these countries as well as being a NATO member, is in a unique, if not inevitable, position to mediate international and regional disputes. </span></u></em></strong><span data-dcnode-id="247" instrument_node="">It is likely in the new year that not only the countries where normalization steps are ongoing but also NATO and the EU will knock on Turkey’s door much more in 2022, as is the case with Russia. Overall, the greatest strength of Turkish foreign policy in this period will be its flexibility in all these areas and countries, its inclusive approach and the fact that it respects the principle of multilateralism with sincerity and reliability.</span></p><span data-dcnode-id="245" instrument_node="">
</span><h4 data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Turkey undemocratic and won’t. cooperate with NATO</span></h4><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Cagaptay, 1-4, 22, Foreign Affairs, Erdogan’s End Game: Will He Undermine Turkish Democracy to Stay in Power? https://www.foreignaffairs.com/articles/middle-east/2022-01-04/erdogans-end-game</span></p><span data-dcnode-id="239" instrument_node="">
</span><p data-dcnode-id="205"><span data-dcnode-id="238" instrument_node="">Over the past few months, Turkish President Recep Tayyip </span><strong data-dcnode-id="235"><u data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Erdogan has looked increasingly desperate</span></u></strong><span data-dcnode-id="234" instrument_node="">. </span><strong data-dcnode-id="231"><u data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">He has stepped up his repression of critics and political opponents</span></u></strong><span data-dcnode-id="230" instrument_node="">, including, most recently, Metin Gurcan, a founding member of the opposition Democracy and Progress Party (DEVA), who was arrested in November on espionage charges. </span><strong data-dcnode-id="227"><u data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">He has threatened to expel diplomats from the United States and some of Turkey’s NATO allies</span></u></strong><span data-dcnode-id="226" instrument_node="">. And as his popularity at home has nosedived, he has embarked on a reckless experiment to lower interest rates amid already high inflation, a policy that has pitched the country into economic turmoil. Meanwhile, he faces an emboldened—and increasingly united—opposition that for the first time poses a direct threat to his rule. The shift has been dramatic. For much of the past two decades, first as prime minister between 2003 and 2014 and then as president since 2014, Erdogan has seemed invincible. Bringing new prosperity to Turkey’s middle classes, he has pushed his Justice and Development Party (AKP) to victory in more than a dozen nationwide elections. He has weathered wars on his doorstep and, in 2016, an attempted coup. Styling himself as a new sultan, he has gained sweeping control over the judiciary, the media, the police, and other institutions of the state and civil society, even as he has ruthlessly cracked down on political opponents. In recent years, however, Erdogan’s authoritarian populism has lost its magic. Since the coup attempt, </span><strong data-dcnode-id="223"><u data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">his government has become increasingly paranoid, going after not only suspected coup plotters but also members of the democratic opposition</span></u></strong><span data-dcnode-id="222" instrument_node=""> and subsequently arresting tens of thousands of people and forcing more than 150,000 academics, journalists, and others out of their jobs on suspicion of ties to the coup or simply for standing up to Erdogan. And his growing willingness to meddle in elections—including a bungled effort to reverse the outcome of Istanbul’s 2019 mayoral election—has galvanized the opposition. Now, with his support drastically eroding, the leader of the oldest democracy and biggest economy between Italy and India faces a reckoning</span><strong data-dcnode-id="219"><u data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">: in 18 months’ time, Turkey will hold a presidential election that Erdogan is very unlikely to win. And because of his long legacy of corruption and abuse of power, he could well be prosecuted if ousted. It seems clear that Erdogan will try to do everything he can to stay in office, including undermining a fair vote, disregarding the result, or even fomenting a January 6–like insurrection</span></u></strong><span data-dcnode-id="218" instrument_node="">. The urgent challenge confronting the country, then, is how to engineer a transfer of power that does not threaten the foundations of Turkish democracy itself, potentially sending shock waves of instability beyond the country’s borders into Europe and the Middle East. DEMOCRACY DIVERTED When he came to power in 2003, Erdogan was greeted as a reformer who would build and strengthen the country’s democratic institutions. At first, he and the AKP seemed to deliver on those promises. He improved access to services, such as health care, and delivered a decade of low unemployment and strong economic growth. Under Erdogan, Turkey became a majority middle-class society for the first time. He also expanded some freedoms, notably offering some minority language rights to Turkey’s Kurds. For awhile, these policies made Erdogan popular both at home and abroad. Domestically, he built a base of adoring supporters, who were mostly conservative, rural, working, lower-middle-class voters who reliably voted for the AKP in election after election. Meanwhile, his government was held up by the United States and Europe as a model of Muslim liberal democracy, a country that was seriously considered for membership in the European Union. But before long, Erdogan began to show far more authoritarian tendencies. In 2008, he unleashed the so-called Ergenekon case, a sweeping and largely inconclusive investigation into Turkey’s “deep state” in which more than 140 people were charged with plotting a coup against the democratically elected government. In fact, it quickly became clear that Erdogan—with help from the cleric Fethullah Gulen, the leader of the Gulen movement and an ally at the time, whose followers in the police, media, and judiciary helped concoct evidence targeting Erdogan’s democratic opponents—was attempting to root out the secularists who had long controlled state institutions. </span><strong data-dcnode-id="215"><u data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">In his second decade in office, Erdogan resorted to harsher tactics to maintain power. In 2013, he used force to crack down on the Gezi protests</span></u></strong><span data-dcnode-id="214" instrument_node="">, in which millions of antigovernment protesters took to the streets in Istanbul and other Turkish cities. After the protests, the government tightened the screws on civil society, and the space for political activism narrowed. Then, following the 2016 coup attempt, Erdogan used a prolonged state of emergency to further repress perceived threats to his rule. He launched a sweeping retribution campaign against his former allies in the Gulen movement, purging thousands of alleged and known Gulenists from government posts and throwing them in jail. And they were joined by growing numbers of socialists, social democrats, the Alevis (a liberal Muslim sect), liberals, leftists, Turkish and Kurdish nationalists, centrists, and even some conservatives opposed to Erdogan’s strong-arm populism. Meanwhile</span><strong data-dcnode-id="210"><em data-dcnode-id="211"><u data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">, Erdogan began to pivot away from Turkey’s longstanding ties to Europe and the United States</span></u></em></strong><span data-dcnode-id="209" instrument_node="">. In 2013, he blamed President Barack Obama for General Abdel Fattah el-Sisi’s coup in Egypt, aligning himself increasingly with political Islamist forces in the Middle East, especially the Muslim Brotherhood. Although they were initially on opposite sides of the Syrian civil war, Erdogan and Russian President Vladimir Putin also eventually entered an entente. Following Putin’s outreach to him in the aftermath of the 2016 coup attempt, Putin agreed to allow Turkey to go after the Syrian Kurdish People’s Protection Units (YPG), which the United States had relied on to fight the Islamic State (or ISIS), and Erdogan committed to buying the Russian-made S-400 missile defense system</span><strong data-dcnode-id="206"><u data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">. By 2020, Erdogan faced tough U.S. sanctions for the Russian defense agreement, and the seven-decade alliance between Washington and Ankara was entering its greatest crisis in recent memory.</span></u></strong></p><span data-dcnode-id="204" instrument_node="">
</span><h4 data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">Millions dead within minutes of a Russia-US nuclear war</span></h4><span data-dcnode-id="201" instrument_node="">
</span><p data-dcnode-id="196"><span data-dcnode-id="200" instrument_node="">ICAN Campaign, September 18, 2019, </span><a data-dcnode-id="198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icanw.org/new_study_on_us_russia_nuclear_war"><span data-dcnode-id="199" instrument_node="">https://www.icanw.org/new_study_on_us_russia_nuclear_war</span></a><span data-dcnode-id="197" instrument_node="">, New Study on US-Russia nuclear war: 91.5 million casualties in first few hours</span></p><span data-dcnode-id="195" instrument_node="">
</span><p data-dcnode-id="186"><strong data-dcnode-id="192"><u data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">34.1 million people could die, and another 57.4 million could be injured, within the first few hours of the start of a nuclear war between Russia and the United States triggered by one low-yield nuclear weapon,</span></u></strong><span data-dcnode-id="191" instrument_node=""> according to a new simulation by researcher’s at Princeton‘s Science and Global Security programme. But that’s not all. </span><strong data-dcnode-id="188"><u data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">The overall death toll would be even higher due to long-term consequences of a nuclear war, including radioactive fallout and global cooling of the Earth’s atmosphere, researchers add. Even a limited nuclear exchange between India and Pakistan could put one billion people at risk of starvation and another 1.3 billion at risk of severe food insecurity due to global coolin</span></u></strong><span data-dcnode-id="187" instrument_node="">g, according to a 2013 study by International Physicians for the Prevention of Nuclear War. The Princeton simulation, ironically entitled “Plan A,” comes as the United States works to develop brand new low-yield nuclear weapons, despite the opposition of leading Democratic members of Congress, and demonstrates that even lower-yield nuclear weapons can have devastating consequences. The researchers used independent assessments of current U.S. and Russian nuclear force postures, including the number of warheads deployed and their yields, war plans and targets to create the simulation. Equally alarming as the casualty toll of this nuclear war simulation is the growing probability that it becomes a reality. “The risk of nuclear war has increased dramatically in the past two years as the United States and Russia have abandoned long-standing nuclear arms control treaties, started to develop new kinds of nuclear weapons and expanded the circumstances in which they might use nuclear weapons,” wrote the Princeton researchers on the project website. “‘Plan A’ shows that there is no sane plan once a nuclear weapon is launched,” said Alicia Sanders-Zakre, Policy and Research Coordinator at the International Campaign to Abolish Nuclear Weapons. “A better plan is to reject nightmare nuclear scenarios and support the Treaty on the Prohibition of Nuclear Weapons.”</span></p><span data-dcnode-id="185" instrument_node="">
