</span><h4 data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">Despite any Russia ties, Turkey is a strong NATO partner</span></h4><span data-dcnode-id="2269" instrument_node="">
</span><p data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">Galip Dalay , Daria Isachenko, February 18, 2022, Ukraine crisis: What is Turkey’s stake in Russia-Nato rivalry?, https://www.middleeasteye.net/opinion/ukraine-crisis-russia-turkey-stake-nato-rivalry</span></p><span data-dcnode-id="2266" instrument_node="">
</span><p data-dcnode-id="2232"><span data-dcnode-id="2265" instrument_node="">On the other hand, </span><strong data-dcnode-id="2262"><u data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">despite its close rela­tionship with Russia, Turkey is an exemplary Nato ally</span></u></strong><span data-dcnode-id="2261" instrument_node="">. In fact, </span><strong data-dcnode-id="2258"><u data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">Turkey’s policy towards the Ukraine crisis is very much in line with the general Nato approach to Russia, name­ly deterrence and dialogue. In beefing up Ukraine’s defence capabilities by providing Kyiv with military items, Turkey pursues a policy of deterrence towards Russia.</span></u></strong><span data-dcnode-id="2257" instrument_node=""> Rhetorically, however, Ankara favours diplomacy over escalation. Turkey thus appears eager to refrain from joining any attempt that seeks to slap Russia with heavy punitive sanc­tions or military confrontation. Indeed, Turkish President Recep Tayyip </span><strong data-dcnode-id="2254"><u data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">Erdogan has a number of times expressed his readiness to mediate between Russia and Ukraine. </span></u></strong><span data-dcnode-id="2253" instrument_node="">The stakes are high for Turkey in the cur­rent crisis. It involves the security of its northern neighbour, Ukraine, the balance of power in the Black Sea region, its com­plex relations with Russia, and the future of the European security order. urkey and Ukraine are, in the words of Ukrainian foreign minister Dmytro Kuleba, “truly friends in need”. Their mutual interest has proven to be most pressing in military-technical cooperation. The acqui­sition of the S-400, military operations in Syria and direct military support of Azer­baijan during the latest Nagorno-Karabakh conflict have left Ankara with sanctions from its western allies. As a result, Turkey faced severe gaps in military procure­ment and production. Most acute of these is the lack of engines for Turkey’s drones and fighter jets. It’s a shortage Ankara counts on solving, inter alia, with the help of Ukrainian manufacturers. Azerbaijan’s military victory in the Nagorno-Karabakh conflict in the autumn of 2020 boosted Ukraine’s interest in Turkish drones.Further­more, to increase its naval capacity, Ukraine ordered two Turkish Ada-class corvettes. Re­garding Ukraine’s long-standing ambitions, </span><strong data-dcnode-id="2250"><u data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">in the joint declaration of April 2021 of the High-Level Strategic Council between Ukraine and Turkey, both underlined their “support to Ukraine’s Nato membership perspective in particular, in its intentions to be granted Membership Action Plan in the near future and aim to contribute to the interoperabil­ity of Ukraine’s Armed Forces with Allies”. </span></u></strong><span data-dcnode-id="2249" instrument_node="">Ukraine is also an indispensable partner for Turkey in the Black Sea. More specifically, according to one Turkish official: “Ukraine is like a dam that stops further Russian in­fluence and pressure in the region.” Among all their shared neighbourhoods, the Black Sea has been the most sensitive area in the his­tory of Turkey-Russia relations. The Crimean peninsula was a cornerstone of the Otto­man-Russian struggle for dominance in the region, with the Ottomans losing it to the Rus­sian Empire in 1774. Later, the Soviet Union never felt at ease with Ankara’s control of the Turk­ish straits that connect the Black Sea with the Aegean and Mediterranean seas. However, in the post-Cold War period, despite past grievances, Turkey and Russia have found a way to cooperate in the Black Sea, with Ankara trying to stike a delicate balance between Russia and its Nato allies. Should hostilities prevail over dialogue in the current confrontational negotiations between Russia and the West, Turkey will find itself in a rather difficult position, and its Nato identity will come under pressure. In the event of a Russian-Turkish confrontation, Syria is likely to be the most obvious arena for Moscow’s retaliation Back in 2014, Turkey declared Russia’s seizure of Crimea an illegal annexation, yet did not side with its western partners in the sanctions regime against Moscow. Turkey’s economic dependency on Russia in areas such as energy, tourism and trade played a significant role in this decision. Since then, the Turkey-Russia relationship has become more interdependent, covering regional conflict management, nuclear technology and sophisticated weapons systems. If the balance in one area is disturbed, it may well spill over into other areas, including regional conflicts, espe­cially in the Middle East and the South Cau­casus. In the event of a Russian-Turkish confrontation, Syria is likely to be the most obvious arena for Moscow’s retaliation, as it remains Ankara’s Achilles’ heel in its relations with Russia. By contrast, the post-Soviet space represents Russia’s sphere of relative vulnerability in its ties with Ankara. While striving to deepen military-tech­nical cooperation with Ukraine on the one hand and to limit its geopolitical exposure towards Russia in the Black Sea on the other, Turkey’s attempt to mediate between Russia and Ukraine is, however, unlikely to bear fruit. Istanbul has already been con­sidered as a possible alternative to Minsk for meetings of the Trilateral Contact Group on Ukraine, which includes representatives of Ukraine, Russia and the Organization for Security and Cooperation in Europe (OSCE). However, the chance of Ukrainian and Rus­sian presidents meeting in Turkey, as en­visaged by Ankara, has little prospect for now, since Russia’s overall agenda in this crisis concerns not only Ukraine. Rather, Moscow’s key worry is about how the West designs Europe’s security archi­tecture, namely against and in con­fron­tation to Russia. By implication, Mos­cow is primarily concerned by the presence of Nato military infrastructure in Eastern Europe and a potential military confrontation over Crimea – both of which trump any alarm it may harbour over Turkish drones. European security and the international order in transition On 18 November 2021, Russian President Vladimir Putin stated in the expanded meeting of Russia’s foreign ministry board, that “our recent warnings have had a certain effect: tensions have arisen… It is impor­tant for them to remain in this state for as long as possible”. He urged Russia’s foreign ministry “to push for serious long-term guar­antees that ensure Russia’s security”. Putin’s demands on security guarantees include preventing Nato’s expansion east­ward, ending its military cooperation with post-Soviet states and withdrawing nuclear weapons from Europe, as well as the ab­sence of any strike systems that could potentially threaten Russia. Ukraine crisis: Why global conflict is no longer unthinkable Read More » In brief, what Moscow wants is to change the current European security architecture. But why now? From the Russian perspective, two decisions made in Washington last year have been significant. First is the with­drawal of Nato forces from Afghanistan in August 2021. Second is the announcement of the trilateral security deal between Australia, the UK and the US (Aukus) in September 2021. Importantly, both – Nato withdrawal from Afghanistan and Aukus – have been interpreted in Ankara in a similar way, namely as signalling the lack of unity in the West, as well as Wash­ing­ton’s overall shift in geo-strategic priorities. More importantly for Ankara, Greece and France’s defence pact, which was signed in the autumn of 2021 and driven by an anti-Tur­key disposition, illustrates the new parallel security partnerships emerging within west­ern security architecture. Such frag­mentation, especially within Nato, would further motivate Turkey to pursue bilateral security arrangements whenever necessary. Nevertheless, </span><strong data-dcnode-id="2246"><u data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">Ankara seems to share the West’s vision of how to uphold the post-Cold War European security order, even though it is anxious about the ongoing debate on a new European security design, as Turkey’s role within that remains unclear</span></u></strong><span data-dcnode-id="2245" instrument_node="">. So far, in the current Ukraine crisis, Turkey and other Nato members appear to be on the same page in opposing Russian revi­sion­ism. Ankara is aware of the fact that the cost of maintaining the post-Cold War geo­political status quo is growing and growing. However, the cost of geopolitical re­vision­ism appears to be incomparably higher. Therefore, for Ankara, maintaining the status quo is not a matter of preference, but rather one of choosing the lesser evil. The main problem, however, is that there is a lack of consensus within Nato on how to approach this conflict, which pro­vides individual countries, including Turkey, with greater room for manoeuvre. On the one hand, non-EU members of Nato, namely the US, the UK and Turkey, have adopted a much more active foreign policy towards Ukraine, particularly when it comes to providing Kyiv with military equipment – specifically armed drones, in the case of Ankara. On the other hand, Turkey’s emphasis on dialogue over complete deterence echoes EU members of Nato, like Germany. In this way, Turkey is actually decoupling itself from the US and the UK, as it does not want to risk crossing Russia’s red lines. </span><strong data-dcnode-id="2242"><u data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">If Russia did push its current escalation strategy</span></u></strong><span data-dcnode-id="2241" instrument_node="">, though, </span><strong data-dcnode-id="2238"><u data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">western powers would be more likely to converge, rather than engage in a grand bargain with Moscow over the future of European security. </span></u></strong><span data-dcnode-id="2237" instrument_node="">Despite its clear interest in what is unravelling between Ukraine and Russia, Turkey has been been conspicuously absent in both western consultations over the Ukraine crisis and the general debate on Euro­pean security. A video conference held by US President Joe Biden on Russia and Ukraine on 24 January included European Commission presi­dent Ursula von der Leyen, European Coun­cil president Charles Michel, French President Em­manuel Macron, Olaf Scholz of Germany, Italian Prime Minister Mario Draghi, Nato Secretary-General Jens Stoltenberg, Andrzej Duda of Poland and UK Prime Minister Boris Johnson. Erdogan was not present. Outlook If the Ukraine crisis continues in its current form, meaning that it does not result in an open conflict, then Turkey can benefit from it, by showcasing and selling further defence items to Ukraine and forging even closer relations with it, improving its relations with the West, and partially balancing its geopolitical vulnerability with regards to Russia in a tit-for-tat fashion. Indeed, Tur­key’s track record in recent years illustrates that through gaining a foothold in different conflict zones, it has acquired levers of influence with different actors. This logic appears in play in the Ukraine crisis. The challenge for Ankara is that the difficulty of striking the right balance between deterrence and dialogue in its partnership with Moscow has increased tremendously. Thus far, both sides have illustrated a suf­ficient level of strategic flexibility and patience in preventing a rupture in their relations. This distinction defines Moscow’s level of flexibility towards Tur­key’s moves. Ukraine is a crisis of first-degree importance for Russia, as well as for Europe’s security. If the Ukraine crisis gets out of hand, then the strategic flexibility that has thus far sustained Turk­ish-Russian relations might reach its limits. Turkey might then have to make choices that it has thus far strived to avoid. Ankara has pursued a geopolitical balancing act through its role in certain conflict zones such as Syria, Libya and Nagor­no-Karabakh. But for Moscow, there is a significant difference between crises in the Middle East and Africa and those in its immediate neighbourhood. Moscow looks at the former through the lenses of geo­political power, influence and status projec­tion. The post-Soviet space on the other hand, is seen as its backyard and is a question of national security. </span><strong data-dcnode-id="2234"><u data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">Regarding Turkish-western relations, the current set of crises in Turkey’s sur­rounding regions opens up more ground between Ankara and Washington, but also with European partners. </span></u></strong><span data-dcnode-id="2233" instrument_node="">This is the case in Ukraine, in Afghanistan and with regards to the Bosnian-Serb leader Milorad Dodik’s separatist agenda, which may prove to be highly explosive for Bosnia and Herzegovi­na. The potential for cooperation between Tur­key and the West in these areas is yet to be fully explored. Nevertheless, Turkey’s tradi­tional policy of balancing Russia through its Nato geopolitical identity might become more accentuated going forward. So, what does the Ukrainian crisis mean for Turkey in a changing European security order? During the Clinton, Bush and Obama years (until 2014), Russian-western rela­tions were largely discussed within the so-called framework of detente. As for Ankara, in the late 90s and during the first decade of the 2000s, Turkish-European relations revolved around whether or not Turkey would join the EU. In spite of their own specific dynamics and particularities, both frame­works are no longer in place. Russian-west­ern relations have long entered a post-detente phase, and Turkish-European rela­tions are now in a post-accession to the EU era. How­ever, current debates about the future of European security have not got to grips with this reality completely.</span></p><span data-dcnode-id="2231" instrument_node="">
</span><h4 data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">Turkey committed to NATO</span></h4><span data-dcnode-id="2228" instrument_node="">
</span><p data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">Daily Sabah, 2-18, 22, Turkey stands at center of NATO’s geopolitical future: Altun, https://www.dailysabah.com/politics/diplomacy/turkey-stands-at-center-of-natos-geopolitical-future-altun</span></p><span data-dcnode-id="2225" instrument_node="">
</span><p data-dcnode-id="2203"><span data-dcnode-id="2224" instrument_node="">Turkey expects more support from NATO and its allies for activities aimed at stabilizing the region and the world as a country at the core of the alliance’s geopolitical future, Turkey’s </span><strong data-dcnode-id="2221"><u data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Presidential Communications Director Fahrettin Altun said </span></u></strong><span data-dcnode-id="2220" instrument_node="">on Thursday. Speaking at the opening of the panel discussion on “Changing Dynamics and Longstanding Alliance: Stronger with Turkiye for 70 Years,” in Ankara, Altun highlighted Turkey’s contributions to NATO missions and operations as well as relations with the pact. </span><strong data-dcnode-id="2217"><u data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">NATO stands as the largest and most institutionally advanced alliance in the history of the world and it has made significant contributions to peace and stability across the globe ever since its establishment, according to Altun</span></u></strong><span data-dcnode-id="2216" instrument_node="">. “NATO today is not just an alliance, it has gone beyond alliance and transformed into an international institution where many countries cooperate in the name of security,” he said, adding that alliances were expected to dissolve following the disintegration of an enemy figure but that has not been the case with NATO. Turkey joined the military alliance of 30 North American and European countries in 1952. The country has also been providing permanent naval assistance to NATO missions in the Aegean Sea while leading regional initiatives, including the Standing NATO Maritime Group’s (SNMG) activities in the Black Sea region. </span><strong data-dcnode-id="2213"><u data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Turkey also hosts many NATO initiatives. There is a NATO headquarters in the western Izmir province, an air base in southern Adana province, another one in Diyarbakır and a NATO Rapid Deployable Corps in Istanbul. It also hosts the AN/TPY-2 radar in eastern Malatya province as part of the organization’s missile shield project. Apart from all these, in 2018 alone, Turkey contributed $101 million (TL 1.3 billion) to the common funding of NATO. </span></u></strong><span data-dcnode-id="2212" instrument_node="">Although some claimed NATO expired and was referred to as “brain dead” by a leader of a NATO-member country, the organization still maintains its position in global politics, said Altun, also noting that the alliance was a strong international organization stretching from continental America to the borders of Asia with 30 members. He said that Turkey had always viewed NATO as a strategic and valuable alliance bringing peace and stability to not only the member states but the globe. “Like all countries, Turkey also has relations with non-NATO countries. These ties should not be regarded as an alternative to NATO,” he said. “Turkey is one of NATO’s most active, most reliable allies and it did not join NATO solely as a result of its geographical features,” he said, stressing that Ankara made contributions to the pact even prior to becoming a member. The official went on to say that </span><strong data-dcnode-id="2209"><u data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Turkey was among the top five alliance members making the most contributions to missions and operations,</span></u></strong><span data-dcnode-id="2208" instrument_node=""> as seen in Kosovo, Afghanistan and Iraq, and Turkey undertook the responsibility for NATO’s Very High Readiness Joint Task Force (VJTF) in 2021. Emphasizing that Turkey has always viewed the alliance as an important instrument of its agenda for security and foreign policy, he said his country was standing at the very center of the geopolitical future of NATO. While Turkey fulfills its responsibilities toward the international organization, it also has expectations from NATO and member countries to contribute to stability and peace across its region and the world, said Altun. He called on NATO to support efforts for stability on European borders more intensively as developments in Syria in the past decade demonstrated the fact that instability could spread to the whole world and issues such as terror and migration emanating from the Syrian crisis were still awaiting solutions. Altun said his country simultaneously fought multiple terrorist groups in Syria, such as the Daesh and the PKK, but failed to get the expected support from NATO allies. </span><strong data-dcnode-id="2205"><u data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">Turkey’s counterterrorism efforts for sake of self-defense also serve anti-terror expectations of NATO and global terrorism</span></u></strong><span data-dcnode-id="2204" instrument_node="">, threat, according to Altun, who was critical of some NATO allies who he said were “hand-to-hand” with terrorist groups, let alone supporting Turkey in its battle against terrorism, and it was “unacceptable” for Ankara that some allies were trying to use one terrorist group to fight another.</span></p><span data-dcnode-id="2202" instrument_node="">
</span><h4 data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">Turkey-Israel relations have improved</span></h4><span data-dcnode-id="2199" instrument_node="">
</span><p data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">Dov Zakheim, 2-18, 22, The Hil, Thanks to the Ukraine crisis, Turkey and Israel have begun to reconcile, https://thehill.com/opinion/national-security/594770-thanks-to-the-ukraine-crisis-turkey-and-israel-have-begun-to</span></p><span data-dcnode-id="2196" instrument_node="">
</span><p data-dcnode-id="2182"><span data-dcnode-id="2195" instrument_node="">Naftali Bennet’s visit to Bahrain, the first ever by an Israeli prime minister, the warm welcome that the country’s King Hamad bin Isa bin Salman Al Khalifa extended to him at the royal palace, and the announcement that Crown Prince Salman bin Hamad Al Khalifa will visit Israel all have garnered considerable attention among the news media and Middle East observers. That Israel will station a military official in the country — no doubt without objection from Saudi Arabia, Bahrain’s neighbor across the causeway that links them — is yet another indication of the growing security cooperation between Gulf Arabs and the Jewish state. There is, however, another relationship with Israel that is developing at the same time in the eastern Mediterranean. After years of friction and vocal support for Israel’s arch enemy, Hamas, Recep Tayyip </span><strong data-dcnode-id="2192"><u data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">Erdoğan’s Turkey has begun to reach out to Jerusalem. Erdoğan also has been mending fences with other regional actors, most notably the</span></u></strong><span data-dcnode-id="2191" instrument_node=""> United Arab Emirates (</span><strong data-dcnode-id="2188"><u data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">UAE)</span></u></strong><span data-dcnode-id="2187" instrument_node="">. He recently visited the UAE for the first time in a decade and had what was described as an “excellent meeting” with Crown Prince Sheikh Mohamed bin Zayed. The outreach to Israel takes on special significance, however, because of the overt hostility that dominated interaction between the two countries for years. Relations spiraled downward after the Israeli war with Hamas in 2008-09. They hit a low point after the May 2010 Mavi Marmara incident, when Israeli commandos seeking to prevent the “Gaza Freedom Flotilla” from reaching Hamas-ruled Gaza, boarded the ship and killed nine passengers, of whom eight were Turkish nationals. In 2016, there was a short-lived improvement in relations between the two countries, including restoration of full diplomatic relations, when their parliaments ratified an agreement that included compensation to the families of those who had died or were injured on the Mavi Marmara. Within two years, however, relations plummeted once again when Washington recognized Jerusalem as the capital of Israel, a move to which Erdoğan bitterly objected. Throughout the period of political friction, however, Israel and Turkey maintained significant trade relations, exceeding $6 billion by the beginning of this year. Over $4.5 billion of that sum consisted of Turkish exports to Israel, making it an important trading partner for Ankara. In addition, Turkish Airlines did not cease to fly to Tel Aviv, though El Al suspended its flights to Turkey for a decade, because of security concerns, until it resumed them in 2020. A week ago, Turkish Foreign Minister Mevlüt Çavuşoğlu phoned his Israeli counterpart, Yair Lapid. The call was ostensibly to enquire after Lapid’s health; the Israeli had come down with COVID-19. Such Turkish solicitousness for an Israeli official was highly unusual — it was the first conversation between Turkish and Israeli foreign ministers in 13 years. Yet the phone call followed a condolence call from Erdoğan to Israeli President Isaac Herzog on the loss of his mother. Erdoğan’s new warmth toward a state that he consistently has vilified is happening in part because of the Ukraine crisis. To begin with, Erdoğan had hoped to act as a mediator between Ukraine and Russia, because he thought he had a close relationship with Russian President Vladimir Putin. Putin evidently was not interested, much to Erdoğan’s annoyance. Moreover, despite its good relations with Russia, Turkey supported Azerbaijan in its latest conflict with Armenia, which long has been close to Moscow. Even more tellingly, Turkey denounced Russia’s 2014 annexation of Crimea and has expanded its military cooperation with Ukraine. The prospect of both the cancellation of the Nord Stream 2 gas pipeline and the possibility that sanctions could target the TurkStream pipeline that carries gas from Russia to Turkey, which is then pumped to Europe, has led Erdoğan to consider an arrangement that would enable Turkey to supply Europe with Israeli gas. How far Turkish-Israeli relations can develop is an open question. To begin with, Israel has developed close ties with Greece, Cyprus and Bulgaria, all of which have less-than-warm relations with Ankara. In addition, it is not at all clear that Putin will actually invade Ukraine. Indeed, even if he were only to take a small slice of that country — for example, the territory between Crimea and the breakaway Donetsk and Luhansk provinces — the West might not respond with tougher sanctions and, in particular, Germany might not cancel the Nord Stream 2 project. Nevertheless, </span><strong data-dcnode-id="2184"><u data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">the Ukraine crisis clearly has accelerated an Israeli-Turkish rapprochement</span></u></strong><span data-dcnode-id="2183" instrument_node="">. Taken together with Ankara’s outreach to the UAE and other Gulf states, Turkey’s warmer relationship with Israel promises to realign the balance of power yet further in the always volatile Middle East.Even during times of difficulty, Turkey has been a strong NATO partner</span></p><span data-dcnode-id="2181" instrument_node="">
</span><p data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Kemal Kirişci, Nonresident Senior Fellow – Foreign Policy, Center on the United States and Europe, The Turkey Project, 2-16, 22, Can the Russia-Ukraine crisis offer an opportunity to re-anchor Turkey in NATO?, https://www.brookings.edu/blog/order-from-chaos/2022/02/16/can-the-russia-ukraine-crisis-offer-an-opportunity-to-re-anchor-turkey-in-nato/</span></p><span data-dcnode-id="2178" instrument_node="">
</span><p data-dcnode-id="2154"><strong data-dcnode-id="2175"><u data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">The crisis over Ukraine has reignited the geopolitical relevance of Turkey and NATO for each other. In recent years Western skepticism about Turkey’s NATO membership and reliability had grown significantly</span></u></strong><span data-dcnode-id="2174" instrument_node="">. There have been multiple reasons for this. NATO has been a target of constant populist abuse in Turkey. In the aftermath of the coup attempt in 2016, deputies from the ruling Justice and Development Party (AKP) alleged NATO involvement, without presenting a shred of evidence, and even called it a “terror organization.” This allegation has been periodically nurtured by the government and most recently by a member of President Recep Tayyip Erdoğan’s cabinet. Damage was also done by Ankara’s decision to purchase S-400 missiles from Russia, and a relentless diplomatic battle over them saw Turkey sanctioned by the United States and thrown out of the F-35 program. Turkish experts remain puzzled over the rationale behind the decision. Erdoğan’s threat to expel 10 Western ambassadors, seven of them from NATO allies, for criticizing the indefinite detention of philanthropist Osman Kavala fueled further skepticism about Turkey’s place in the alliance. </span><strong data-dcnode-id="2171"><u data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">Yet, below the radar, throughout this period Turkey has been a regular contributor to NATO missions. In Afghanistan it performed a wide range of tasks from providing security </span></u></strong><span data-dcnode-id="2170" instrument_node="">for Kabul’s airport to leading a Provincial Reconstruction Team in Wardak province. </span><strong data-dcnode-id="2167"><u data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">During 2021 Turkey led NATO’s Very High Readiness Joint Task Force</span></u></strong><span data-dcnode-id="2166" instrument_node="">, placing thousands of its soldiers on standby ready to deploy within days for allied missions. Simultaneously</span><strong data-dcnode-id="2163"><u data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node=""> it continued to participate with F-16s in the Baltic and Poland air policing missions and fulfilled NATO air surveillance tasks. </span></u></strong><span data-dcnode-id="2162" instrument_node="">&nbsp;</span><strong data-dcnode-id="2159"><u data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">With the Russian annexation of Crimea threatening to dramatically alter the military balance in the Black Sea, Turkey stepped up its efforts to support allied cooperation in the region. Turkish naval and air force assets regularly participate in exercises, such as the U.S. and Ukraine-hosted Sea Breeze, and patrol missions with units from NATO member countries.</span></u></strong><span data-dcnode-id="2158" instrument_node=""> Lastly, independently of the state of its relations with the Soviet Union and later Russia, </span><strong data-dcnode-id="2155"><u data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">Turkey has persistently supported NATO’s enlargement including the “open door” policy.</span></u></strong></p><span data-dcnode-id="2153" instrument_node="">
</span><h4 data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">Turkey not successfully negotiating the Russia-Ukraine dispute</span></h4><span data-dcnode-id="2150" instrument_node="">
</span><p data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">Kemal Kirişci, Nonresident Senior Fellow – Foreign Policy, Center on the United States and Europe, The Turkey Project, 2-16, 22, Can the Russia-Ukraine crisis offer an opportunity to re-anchor Turkey in NATO?, https://www.brookings.edu/blog/order-from-chaos/2022/02/16/can-the-russia-ukraine-crisis-offer-an-opportunity-to-re-anchor-turkey-in-nato/</span></p><span data-dcnode-id="2147" instrument_node="">
</span><p data-dcnode-id="2138"><span data-dcnode-id="2146" instrument_node="">The issue is not so much Turkey’s dependence on Russia per se but the fact that Ankara is not much more actively engaged in Western efforts to deter Moscow and resolve the current crisis. </span><strong data-dcnode-id="2143"><u data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">Erdoğan, in spite of his unequivocal support for Ukraine’s territorial integrity as well as enthusiasm for finding a negotiated solution to the crisis, is conspicuously absent from the high-level diplomatic efforts to coordinate a unified trans-Atlantic response,</span></u></strong><span data-dcnode-id="2142" instrument_node=""> while Biden does not appear to consider Turkey as a core ally. </span><strong data-dcnode-id="2139"><u data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Contacts have been limited to polite telephone calls between Secretary of State Antony Blinken and Turkish Foreign Minister Mevlüt Çavuşoğlu, and national security adviser Jake Sullivan and Erdoğan’s advisor İbrahim Kalın.</span></u></strong></p><span data-dcnode-id="2137" instrument_node="">
</span><h4 data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">Lack of democracy distances Turkey from the West</span></h4><span data-dcnode-id="2134" instrument_node="">
</span><p data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Kemal Kirişci, Nonresident Senior Fellow – Foreign Policy, Center on the United States and Europe, The Turkey Project, 2-16, 22, Can the Russia-Ukraine crisis offer an opportunity to re-anchor Turkey in NATO?, https://www.brookings.edu/blog/order-from-chaos/2022/02/16/can-the-russia-ukraine-crisis-offer-an-opportunity-to-re-anchor-turkey-in-nato/</span></p><span data-dcnode-id="2131" instrument_node="">
</span><p data-dcnode-id="2126"><strong data-dcnode-id="2128"><u data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">The problem lies in Turkey’s broader drift away from the West and the dramatic rise in the authoritarianism of its governance, taking Turkey well away from the shared democratic values which are supposed to bond NATO members. The most recent manifestation of this occurred when Erdoğan categorically dismissed the decision of the Council of Europe to initiate disciplinary action against Turkey&nbsp; for failing to abide by a European Court of Human Rights (ECHR) ruling calling for Kavala’s release.</span></u></strong><span data-dcnode-id="2127" instrument_node=""> It was especially ironic that this occurred just as Erdoğan was leaving for a visit to Ukraine, a country which has risked — and experienced — war to be able to join the West and sustain a democratic way of life. Membership in the council, since its inception in 1949, and commitment to abide with by ECHR rulings had long been regarded as an affirmation of Turkey’s Western vocation.</span></p><span data-dcnode-id="2125" instrument_node="">
</span><h4 data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">Turkish mediation can solve the Ukraine crisis</span></h4><span data-dcnode-id="2122" instrument_node="">
</span><p data-dcnode-id="2118"><strong data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">Daily Sabah, 2-15</span></strong><span data-dcnode-id="2119" instrument_node="">, 22, Russia crisis can be solved with Turkish mediation: Ukrainian envoy, https://www.dailysabah.com/politics/diplomacy/russia-crisis-can-be-solved-with-turkish-mediation-ukrainian-envoy</span></p><span data-dcnode-id="2117" instrument_node="">
</span><p data-dcnode-id="2095"><span data-dcnode-id="2116" instrument_node="">The ongoing </span><strong data-dcnode-id="2113"><u data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">tension between Russia and Ukraine can be resolved peacefully with Turkey’s mediation, the Ukrainian ambassador</span></u></strong><span data-dcnode-id="2112" instrument_node=""> to Ankara </span><strong data-dcnode-id="2109"><u data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">said </span></u></strong><span data-dcnode-id="2108" instrument_node="">on Monday. Speaking to reporters after opening the Turkey-Ukraine memorial forest in the southern Turkish province of Adana, Vasyl Bodnar said </span><strong data-dcnode-id="2105"><u data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Russia is amassing soldiers along Ukrainian borders. </span></u></strong><span data-dcnode-id="2104" instrument_node="">“We expect this situation to be resolved peacefully. But of course, we are ready to defend ourselves, if necessary,” he said. The Ukrainian envoy hoped Russia will end this crisis before it turns into a war, adding: “We can resolve this situation peacefully with Turkey’s mediation.” About a recent visit by President Recep Tayyip Erdoğan to Ukraine, Bodnar said </span><strong data-dcnode-id="2101"><u data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">the visit displayed Turkey’s high level of support. </span></u></strong><span data-dcnode-id="2100" instrument_node="">Following his visit to Kyiv earlier this month, Erdoğan said that he offered to host a summit of Russian and Ukrainian leaders in Turkey to de-escalate tensions and find a diplomatic solution to the current crisis. While there he reiterated that Turkey stands by its decision not to recognize the annexation of Crimea and declared Ankara’s support for Ukraine’s Crimean Platform initiative. The several deals signed between the two countries also showed “how serious and strong strategic partners we are,” Bodnar said. “That’s why we see the support and solidarity of both the government and the people of Turkey.” “We should not listen to the rumors that there is a crisis between Russia and the West, because this is actually a crisis between Russia and Ukraine,” the envoy added. Moscow and Kyiv have been locked in a conflict since hostilities in the eastern Donbass region broke out in 2014 after Russia annexed the Crimean Peninsula. Russia has amassed more than 100,000 troops near Ukraine’s borders, prompting fears it could be planning another military offensive against the former Soviet republic. The United States and its allies have warned of an imminent attack, and threatened Russia with “severe consequences.” Moscow, however, has denied it is preparing to invade Ukraine and said its troops are there for exercises. The Kremlin also issued a list of security demands from the West, including a rollback of troop deployments to some ex-Soviet states and guarantees that Ukraine and Georgia will not join NATO. Turkey has been closely following the developments and is in close contact with both Kyiv and Moscow. Ankara has also offered to mediate talks between them. Russian President Vladimir Putin has accepted President Recep Tayyip Erdoğan’s invitation to visit Turkey amid the tensions and will make the trip once the pandemic and schedules allow, the Kremlin said. If Turkey is assigned a mediator role following the meeting with Putin, Ankara will accept the offer to help in the Ukrainian crisis in this capacity and will try to do its part, Erdoğan also said. </span><strong data-dcnode-id="2097"><u data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">Turkey shares the Black Sea with Ukraine and Russia. While forging cooperation on defense and energy, Turkey has opposed Moscow’s policies in Syria and Libya, as well as its annexation of the Crimean Peninsula in 2014. It has also sold sophisticated drones to Ukraine, angering Russia</span></u></strong><span data-dcnode-id="2096" instrument_node="">. Turkey has good ties with Kyiv and Moscow but has said it would do what is necessary as a NATO member if Russia invades. Turkey has expressed that it is willing to mediate between the two sides if they accept. The Organization for Security and Co-operation in Europe (OSCE) has suggested holding the Minsk trilateral meeting in Turkey, which Ankara has welcomed, since the gathering cannot be held in Belarus due to tensions with other countries.</span></p><span data-dcnode-id="2094" instrument_node="">
</span><h4 data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">Russia does not want Turkey’s mediation</span></h4><span data-dcnode-id="2091" instrument_node="">
</span><p data-dcnode-id="2086"><span data-dcnode-id="2090" instrument_node="">Stein, 2-14, 22, Turkey’s Careful And Risky Fence-Sitting Between Ukraine And Russia – Analysis, </span><a data-dcnode-id="2088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eurasiareview.com/14022022-turkeys-careful-and-risky-fence-sitting-between-ukraine-and-russia-analysis/"><span data-dcnode-id="2089" instrument_node="">https://www.eurasiareview.com/14022022-turkeys-careful-and-risky-fence-sitting-between-ukraine-and-russia-analysis/</span></a><span data-dcnode-id="2087" instrument_node="">, Aaron Stein is the Director of Research at the Foreign Policy Research Institute (FPRI).</span></p><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2079"><span data-dcnode-id="2084" instrument_node="">The security situation in Turkey’s near-abroad can change rapidly and at any moment. Ankara has few good options to manage Russian actions, but it appears committed to trying to meet with Putin and to mediate a solution. </span><strong data-dcnode-id="2081"><u data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">The Russian government, at this time, appears to have no interest in any Turkish role</span></u></strong><span data-dcnode-id="2080" instrument_node="">. A large-scale war would test recent Turkish elite assumptions about the future of great power conflict and could have broader implications for the defense industry. Only time will tell, but, at some point, Ankara may have to make broader decisions about its future foreign policy that either risk its relations with Moscow or strain its ties with the West.</span></p><span data-dcnode-id="2078" instrument_node="">
</span><h4 data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">Russia does not want Turkey’s mediation</span></h4><span data-dcnode-id="2075" instrument_node="">
</span><p data-dcnode-id="2070"><span data-dcnode-id="2074" instrument_node="">Stein, 2-14, 22, Turkey’s Careful And Risky Fence-Sitting Between Ukraine And Russia – Analysis, </span><a data-dcnode-id="2072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eurasiareview.com/14022022-turkeys-careful-and-risky-fence-sitting-between-ukraine-and-russia-analysis/"><span data-dcnode-id="2073" instrument_node="">https://www.eurasiareview.com/14022022-turkeys-careful-and-risky-fence-sitting-between-ukraine-and-russia-analysis/</span></a><span data-dcnode-id="2071" instrument_node="">, Aaron Stein is the Director of Research at the Foreign Policy Research Institute (FPRI).</span></p><span data-dcnode-id="2069" instrument_node="">
</span><p data-dcnode-id="2063"><span data-dcnode-id="2068" instrument_node="">The security situation in Turkey’s near-abroad can change rapidly and at any moment. Ankara has few good options to manage Russian actions, but it appears committed to trying to meet with Putin and to mediate a solution. </span><strong data-dcnode-id="2065"><u data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">The Russian government, at this time, appears to have no interest in any Turkish role</span></u></strong><span data-dcnode-id="2064" instrument_node="">. A large-scale war would test recent Turkish elite assumptions about the future of great power conflict and could have broader implications for the defense industry. Only time will tell, but, at some point, Ankara may have to make broader decisions about its future foreign policy that either risk its relations with Moscow or strain its ties with the West.</span></p><span data-dcnode-id="2062" instrument_node="">
