</span><li data-dcnode-id="1074"><span data-dcnode-id="1078" instrument_node="">The above is easier said than done, but the main interests of, and critical issues that concern Western countries, NATO and the EU, and Turkey have been on the table for years, and should be solved one by one. None of these issues, from the refugees and Turkey’s membership in the EU, to the Patriot versus S-400 systems, are unsolvable, or can be shelved indefinitely. </span><strong data-dcnode-id="1075"><u data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">All sides have made mistakes, but through good will reasonable compromises can be achieved for the common benefit. Western-Turkish relations need a success story/ a good news story soon.</span></u></strong></li><span data-dcnode-id="1073" instrument_node="">
</span><li data-dcnode-id="1069"><strong data-dcnode-id="1070"><u data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Western criticism of Turkey’s current democracy deficiencies is legitimate, but it should not block the path to improving mutual relations. Turkey is a NATO ally, not an adversary of the Alliance. There is no reason to treat Turkey like Russia and differently, for example, from Poland or Hungary.</span></u></strong></li><span data-dcnode-id="1068" instrument_node="">
</span><li data-dcnode-id="1063"><span data-dcnode-id="1067" instrument_node="">Time cannot be turned back and the Turkish economic and democratisation “miracle” of the 2000s cannot be repeated in the same fashion under the current government, but </span><strong data-dcnode-id="1064"><u data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">the West has a duty and a vested interest in preventing Turkey from unbalancing its policies and strategic choices in favour of Russia (and China).</span></u></strong></li><span data-dcnode-id="1062" instrument_node="">
</span><li data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Turkey’s membership of the EU – that is full membership – depends on achieving consensus between member states. Turkey should be given clear answers regarding the accession negotiations that should be unfrozen in exchange for Ankara’s pledge and tangible steps made towards improving its democracy record.</span></li><span data-dcnode-id="1059" instrument_node="">
</span><li data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">The customs union agreement between the EU and Turkey could be complemented with clauses that allow Turkish exports of agricultural products to the EU, as a bonus for making steps that improve the state of democracy and freedoms before the elections in 2023.</span></li><span data-dcnode-id="1056" instrument_node="">
</span><li data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">The EU should negotiate with Turkey a reasonable/acceptable way for visa liberalisation for Turkish citizens.</span></li><span data-dcnode-id="1053" instrument_node="">
</span><li data-dcnode-id="1049"><strong data-dcnode-id="1050"><u data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">A renewed peace process, aimed at resolving issues related to Kurdish organisations vis-à-vis fighting terrorism in Syria and elsewhere, could help pave the way to lasting security in Turkey and the region. The West could provide economic incentives to bring all counterparts, including relevant actors in the Kurdish political movements, to the negotiation table. Respect for human rights, territorial integrity and sovereignty of states, and of security arrangements are crucial ingredients of a peace process.</span></u></strong></li><span data-dcnode-id="1048" instrument_node="">
</span></ul><span data-dcnode-id="1046" instrument_node="">
</span><h4 data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Russia will cooperate with Turkey on security issues if NATO does not</span></h4><span data-dcnode-id="1043" instrument_node="">

</span><p data-dcnode-id="1017"><span data-dcnode-id="1034" instrument_node="">The US has declined Turkey’s repeated request for a technology transfer for the purchase of Patriot air defence surface-to-air missile (SAM) systems. In December 2018, the US State Department ultimately cleared the purchase by Turkey of a package of Patriot systems (for about USD 3.5 billion), but the technology transfer issue remains unsettled.18 </span><strong data-dcnode-id="1031"><u data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Russia would surely be seeking to profit from Turkey’s inability to purchase the newest generation multirole aircraft and mid-range air defence systems, as well as to acquire technology</span></u></strong><span data-dcnode-id="1030" instrument_node=""> from and participate in joint armaments programs with other NATO Allies. </span><strong data-dcnode-id="1027"><u data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Moscow stands ready to sell to Turkey whatever it needs (for </span></u></strong><span data-dcnode-id="1026" instrument_node="">example, a second batch of S-400 systems) </span><strong data-dcnode-id="1023"><u data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">and to develop bilateral </span></u></strong><span data-dcnode-id="1022" instrument_node="">16 Melike Günaydın, “An overview of the Turkish Defence and Aerospace Industry 2020 Performance Report,” Defence Turk, 1 July 2021. 17 Arda Mevlutoğlu, “Turkey’s exclusion from the F-35 Project,” The Topchubashov Center, 28 April 2021. 18 Aaron Mehta, “Turkey cleared by US for $3.5 billion Patriot missile deal, despite S-400 row,” Defense News, 19 December 2018. </span><strong data-dcnode-id="1019"><u data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">cooperation in the defence and aerospace industry sector</span></u></strong><span data-dcnode-id="1018" instrument_node="">.</span></p><span data-dcnode-id="1016" instrument_node="">
</span><h4 data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Turkey committed to NATO</span></h4><span data-dcnode-id="1013" instrument_node="">

 in International Relations and Middle Eastern Studies from Istanbul Bilgi University. TThe Ministry of Foreign Affairs of Estonia recognised Hille Hanso for her contribution to developing Estonian-Turkish relations in 2020</span></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="988"><strong data-dcnode-id="1002"><u data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Turkey’s </span></u></strong><span data-dcnode-id="1001" instrument_node="">domestic and foreign policy debate has been unsettled since the coup in 2016. Nevertheless, its </span><strong data-dcnode-id="998"><u data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">commitment to NATO, including the development of a new Strategic Concept of the Alliance, remains strong. </span></u></strong><span data-dcnode-id="997" instrument_node="">Interviewees agreed on this point, referring to </span><strong data-dcnode-id="994"><u data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">the communiqué of the Brussels summit, in June 2021, to which Turkey fully subscribed. </span></u></strong><span data-dcnode-id="993" instrument_node="">On the other hand, </span><strong data-dcnode-id="990"><u data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Turkey’s so-called Eurasianists, as well as many Islamists, pose questions as to whether the country should stay in or leave NATO. These doubts are on the margins of Turkey’s political landscape,</span></u></strong><span data-dcnode-id="989" instrument_node=""> but they do affect the domestic public debate and the results of opinion polls.</span></p><span data-dcnode-id="987" instrument_node="">

ernational Relations and Middle Eastern Studies from Istanbul Bilgi University. TThe Ministry of Foreign Affairs of Estonia recognised Hille Hanso for her contribution to developing Estonian-Turkish relations in 2020</span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="959"><strong data-dcnode-id="973"><u data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Turkey’s views on NATO’s enlargement are officially in contradiction with Russia’s position. Ankara supports the bids for NATO membership for both Ukraine and Georgia. Turkey also wants NATO to help more in Libya </span></u></strong><span data-dcnode-id="972" instrument_node="">and display stronger commitment, upholding the country’s legitimate/ internationally recognised government in Tripoli, although NATO probably will not make any decisions to that end in the near future</span><strong data-dcnode-id="969"><u data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">. In Afghanistan, Turkey played a major role in NATO’s efforts. It was the only Ally present and one of the six countries invite</span></u></strong><span data-dcnode-id="968" instrument_node="">d (together with Russia, China, Iran, Pakistan and Qatar) </span><strong data-dcnode-id="965"><u data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">to the inauguration of the Taliban-ruled government in Kabul,</span></u></strong><span data-dcnode-id="964" instrument_node=""> in a way representing both itself and the recently departed Alliance. </span><strong data-dcnode-id="961"><u data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Turkey was prepared to keep the Kabul Airport under control after the withdrawal of NATO troops</span></u></strong><span data-dcnode-id="960" instrument_node="">, but there is no agreement with the new Taliban regime.</span></p><span data-dcnode-id="958" instrument_node="">

</span><p data-dcnode-id="938"><strong data-dcnode-id="944"><u data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">In 2021, Turkey took over from Germany the land component of the NATO Response Force (NRF), providing a Rapid Deployable Corps</span></u></strong><span data-dcnode-id="943" instrument_node="">.21 In addition, France contributes the French AeroNaval Rapid Reaction Force (FRAMARFOR) to the NRF’s maritime component. The ACC Ramstein (Article 5 and Collective Defence) and Italy’s JFAC (crisis response) make up the air component, and Command and Control (C2) and Special Forces from Denmark, Belgium, and the Netherlands contribute to the special operations components. </span><strong data-dcnode-id="940"><u data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Turkey contributes also routinely to NATO’s maritime groups and operations in the Mediterranean (</span></u></strong><span data-dcnode-id="939" instrument_node="">Standing NATO Maritime Group 1, Standing NATO Mine Countermeasures Group 1 and Operation Sea Guardian).</span></p><span data-dcnode-id="937" instrument_node="">

</span><p data-dcnode-id="918"><strong data-dcnode-id="923"><u data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">The United States should certainly speak up and openly criticise Erdoğan’s deepening autocracy, but in the meantime, it should also face reality. For all his faults, Erdoğan nevertheless leads an important country. He is, for now, the only person that the US can attempt to do business with and work with to solve major problems between the two countries.28</span></u></strong><span data-dcnode-id="922" instrument_node=""> Yet, the US should keep pushing for constructive relations in Turkey at the institutional level, such as ministries and parliament, to avoid accelerating the concentration of power to a very narrow group of people in Turkey. 26 Andrew Wilks, “Turkey’s Erdoğan lifts threat to expel Western ambassadors,” AP News, 25 October 2021. 27 Jeff Mason, “Biden to warn Turkey’s Erdoğan against ‘precipitous’ actions,” Reuters, 31 October 2021. 28 Michael E. O’Hanlon and Ömer Taşpınar, “Repairing the rift with Turkey,” Brooking Institution, 18 November 2020. </span><strong data-dcnode-id="919"><u data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Turkey can be a critical player in helping the US to handle Russia, Iran and many issues in the Middle East and the Mediterranean</span></u></strong></p><span data-dcnode-id="917" instrument_node="">

ernational Relations and Middle Eastern Studies from Istanbul Bilgi University. TThe Ministry of Foreign Affairs of Estonia recognised Hille Hanso for her contribution to developing Estonian-Turkish relations in 2020</span></p><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="905" instrument_node="">The US Secretary of State Anthony Blinken called Greece a “pillar of stability the region”, as Athens and Washington agreed to the US gaining greater access to Greek military bases in October 2021.36 </span><strong data-dcnode-id="902"><u data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">The agreement is indefinite and allows US forces to train and operate more broadly in Greece. This means the US has significant military assets deployed in both Turkey and Greece that surely would play a key role in preventing conflict between the two Allies and historic rivals. This agreement may signal to Ankara that it is time to solve disputes with Greece for the sake of strengthening the Alliance, and that solutions could be found by negotiations and/or international mechanisms/ bodie</span></u></strong><span data-dcnode-id="901" instrument_node="">s (for example, the International Court of Justice, in the case of the maritime EEZ) rather than unilateral actions.</span></p><span data-dcnode-id="899" instrument_node="">

</span><p data-dcnode-id="883"><strong data-dcnode-id="885"><u data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Standing by ready to fill every gap (by providing political support and economic advantages, but also by selling military equipment), Russia will use, in its own interest, every dispute between Turkey and the West. Moscow would enjoy Ankara’s continuous conflicts with and alienation from NATO Allies and the EU. The bottom line, particularly from NATO’s perspective, would be Turkey’s further rapprochement with Russia (and China) in the defence/military field.</span></u></strong><span data-dcnode-id="884" instrument_node=""> However, one should not disregard the fact that Turkey would be willing, for example, to be reinstated (most probably not unconditionally by the US) in the F-35 project and to purchase Patriot systems (and F-16 jets) from the US. The bridges have not yet been burned.</span></p><span data-dcnode-id="882" instrument_node="">

ernational Relations and Middle Eastern Studies from Istanbul Bilgi University. TThe Ministry of Foreign Affairs of Estonia recognised Hille Hanso for her contribution to developing Estonian-Turkish relations in 2020</span></p><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="866"><strong data-dcnode-id="868"><u data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">A new defence plan for Poland and the Baltic states was approved by NATO, in June 2020, only after Turkey lifted its veto</span></u></strong><span data-dcnode-id="867" instrument_node="">.37 An interviewee claimed that Turkey did not intend to take the four countries hostage, but instead sought to achieve consensus in the Alliance on labelling the Syrian Kurdish YPG a terrorist organisation. Diplomatic/political bargaining between Allies at NATO’s HQ rarely spills out to the public, even in the most contentious cases, but the defence plan issue did come out and rang bells particularly in the Baltics states and Poland. The issue soon disappeared from the media, but left behind some important lessons. Turkey’s behaviour is not excusable, but the Allies need to define/agree on common threats, as clearly as possible, and strengthen solidarity, to avoid hampering NATO’s core task of collective defence.</span></p><span data-dcnode-id="865" instrument_node="">
</span><h4 data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Turkey supporting Baltic state security</span></h4><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="855"><strong data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Soicescu &amp; Hanso, January 2022, </span></strong><span data-dcnode-id="859" instrument_node="">Turkey’s Future Role in NATO: An Indispensable and Difficult Ally, </span><a data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//icds.ee/wp-content/uploads/2022/01/ICDS_Policy_Paper_Turkey%25C2%25B4s_Future_Role_in_NATO_Stoicescu_Hanso_January_2022-1.pdf"><span data-dcnode-id="858" instrument_node="">https://icds.ee/wp-content/uploads/2022/01/ICDS_Policy_Paper_Turkey%C2%B4s_Future_Role_in_NATO_Stoicescu_Hanso_January_2022-1.pdf</span></a><span data-dcnode-id="856" instrument_node="">, Kalev Stoicescu Kalev Stoicescu is a Research Fellow at ICDS. A former Estonian Ministry of Foreign Affairs and Ministry of Defence official, he joined the ICDS in August 2014. Among other fields, he specialises in issues related to Russian foreign and domestic policy, as well as developments in the field of NATO’s defence and security. Stoicescu served at the Ministry of Foreign Affairs from 1991–2000, including as Ambassador to the OSCE and Ambassador to US and Canada. He was a member of the Estonian delegation in border negotiations with Russia and Latvia. He worked for the Ministry of Defence from 2002–2014, first as civilian-military cooperation department head and then, from 2007, as counsellor on defence policy at the Estonian Embassy in Paris. Hille Hanso Hille Hanso is an independent researcher and analyst, based in Istanbul. Her articles, interviews, essays and commentaries have appeared in all media outlets in Estonia and abroad. Her expertise and research interests include Turkish culture and language, nationalism, security and defence in the regional context, Turkish domestic and foreign policy; Estonia-Turkey relations in the 1920s and 30s, minorities and forced migration in the Middle East. Her latest graduate degree is in International Relations and Middle Eastern Studies from Istanbul Bilgi University. TThe Ministry of Foreign Affairs of Estonia recognised Hille Hanso for her contribution to developing Estonian-Turkish relations in 2020</span></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="833"><strong data-dcnode-id="851"><u data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">The rise of Polish and Baltic interest in Turkey</span></u></strong><span data-dcnode-id="850" instrument_node="">, and also in the opposite direction, became evident </span><strong data-dcnode-id="847"><u data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">after Presidents Recep Tayyip Erdoğan</span></u></strong><span data-dcnode-id="846" instrument_node=""> 37 “Turkey drops objections to NATO defence plan for Poland and the Baltics,” NATO Watch, 3 July 2020. and Andrzej Duda </span><strong data-dcnode-id="843"><u data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">signed an agreement for the purchase by Poland of Bayraktar TB2 </span></u></strong><span data-dcnode-id="842" instrument_node="">drones at the presidential complex in Ankara, in May 2021.</span><strong data-dcnode-id="839"><u data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">38 The agreement signed by the Turkish and Polish ministers of defence and worth USD 270 million, made Poland the first NATO member state to purchase a batch of 24 Bayraktar UAVs, with the first drones due to be delivered in 202</span></u></strong><span data-dcnode-id="838" instrument_node="">2.39 For now, it is hard to say whether this is a new trend or an isolated arms deal. Azerbaijan, Ukraine, Qatar and Libya have purchased similar models of the Bayraktar TB2 drones with a range of 150 kilometres and readiness to be armed with anti-tank missiles. </span><strong data-dcnode-id="835"><u data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Latvia’s defence minister Artis Pabriks and Lithuania’s foreign minister Gabrielius Landsbergis visited Turkey in June and July 2021, respectively. Turkey is interested in selling variants of the Bayraktar TB2 to these Allies, as well. It is possible that Latvia and Lithuania, in addition to Poland and Ukraine, could purchase and start to operate the combat proven and capable Turkish drones, a development that would certainly enhance deterrence and defence in the region. In early July 2021, Turkey deployed four F-16s and an 80-strong detachment from its 6th Main Jet Base at Bandırma to the Malbork Air Base in Poland, to support the enhanced Baltic Air Policing (BAP) Mission40. This was the second contribution by Turkey to upholding NATO’s north-eastern flank, a</span></u></strong><span data-dcnode-id="834" instrument_node="">fter a single rotation in the BAP from April to July 2006 (in Šiauliai, Lithuania). The deployment of Turkey’s F-16s to Poland demonstrated the power of political dialogue, and also of defence procurements between Allies. Interestingly, three Allies from the south – Spain, Italy and Turkey – contributed together to the BAP mission in Lithuania, Estonia and Poland, an excellent example of Allied solidarity. However, Turkey has not yet contributed troops to NATO’s enhanced Forward Presence. Last but not least, Poland and the Baltic states have expressed support for continuing accession negotiations between Turkey and the European Union.</span></p><span data-dcnode-id="832" instrument_node="">
</span><h4 data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">The West should continue to work with Turkey</span></h4><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="822"><strong data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Soicescu &amp; Hanso, January 2022, </span></strong><span data-dcnode-id="826" instrument_node="">Turkey’s Future Role in NATO: An Indispensable and Difficult Ally, </span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//icds.ee/wp-content/uploads/2022/01/ICDS_Policy_Paper_Turkey%25C2%25B4s_Future_Role_in_NATO_Stoicescu_Hanso_January_2022-1.pdf"><span data-dcnode-id="825" instrument_node="">https://icds.ee/wp-content/uploads/2022/01/ICDS_Policy_Paper_Turkey%C2%B4s_Future_Role_in_NATO_Stoicescu_Hanso_January_2022-1.pdf</span></a><span data-dcnode-id="823" instrument_node="">, Kalev Stoicescu Kalev Stoicescu is a Research Fellow at ICDS. A former Estonian Ministry of Foreign Affairs and Ministry of Defence official, he joined the ICDS in August 2014. Among other fields, he specialises in issues related to Russian foreign and domestic policy, as well as developments in the field of NATO’s defence and security. Stoicescu served at the Ministry of Foreign Affairs from 1991–2000, including as Ambassador to the OSCE and Ambassador to US and Canada. He was a member of the Estonian delegation in border negotiations with Russia and Latvia. He worked for the Ministry of Defence from 2002–2014, first as civilian-military cooperation department head and then, from 2007, as counsellor on defence policy at the Estonian Embassy in Paris. Hille Hanso Hille Hanso is an independent researcher and analyst, based in Istanbul. Her articles, interviews, essays and commentaries have appeared in all media outlets in Estonia and abroad. Her expertise and research interests include Turkish culture and language, nationalism, security and defence in the regional context, Turkish domestic and foreign policy; Estonia-Turkey relations in the 1920s and 30s, minorities and forced migration in the Middle East. Her latest graduate degree is in International Relations and Middle Eastern Studies from Istanbul Bilgi University. TThe Ministry of Foreign Affairs of Estonia recognised Hille Hanso for her contribution to developing Estonian-Turkish relations in 2020</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">The authors propose, on the basis of these conclusions, the following recommendations:</span></p><span data-dcnode-id="818" instrument_node="">
</span><ul data-dcnode-id="750"><span data-dcnode-id="817" instrument_node="">
</span><li data-dcnode-id="808"><span data-dcnode-id="816" instrument_node="">T</span><strong data-dcnode-id="813"><u data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">he West</span></u></strong><span data-dcnode-id="812" instrument_node=""> – meaning NATO Allies and the EU institutions and non-NATO member states– </span><strong data-dcnode-id="809"><u data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">should adopt a double-track approach to Turkey by strengthening relations both personally, given Turkey’s present governance and President Erdoğan’s role/ style, and institutionally, contemplating a long-term perspective.</span></u></strong></li><span data-dcnode-id="807" instrument_node="">
</span><li data-dcnode-id="799"><strong data-dcnode-id="804"><u data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">The relations between the West and Turkey do not need more irritants</span></u></strong><span data-dcnode-id="803" instrument_node=""> (disputes and conflicts of interest), </span><strong data-dcnode-id="800"><u data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">but rather a problemsolving agenda, a positive atmosphere, and constructive contacts and communication.</span></u></strong></li><span data-dcnode-id="798" instrument_node="">
</span><li data-dcnode-id="792"><span data-dcnode-id="797" instrument_node="">The above is easier said than done, but the main interests of, </span><strong data-dcnode-id="794"><u data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">and critical issues that concern Western countries, NATO and the EU, and Turkey have been on the table for years, and should be solved one by one. None of these issues, from the refugees and Turkey’s membership in the EU, to the Patriot versus S-400 systems, are unsolvable, or can be shelved indefinitely. All sides have made mistakes, but through good will they can achieve reasonable compromises for the common benefit. </span></u></strong><span data-dcnode-id="793" instrument_node="">Western-Turkish relations need a success story/ a good news story soon.</span></li><span data-dcnode-id="791" instrument_node="">
</span><li data-dcnode-id="787"><strong data-dcnode-id="788"><u data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Western criticism of Turkey’s current democracy deficiencies is legitimate, but this should not block the path to improving mutual relations. Turkey is a NATO ally, not an adversary of the Alliance. There is no reason to treat Turkey like Russia and differently, for example, from Poland or Hungary.</span></u></strong></li><span data-dcnode-id="786" instrument_node="">
</span><li data-dcnode-id="780"><span data-dcnode-id="785" instrument_node="">Time cannot be turned back, and the Turkish economic and democratisation “miracle” of the 2000s cannot be repeated in the same fashion under the current government, but </span><strong data-dcnode-id="782"><u data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">the West has the duty and a vested interest in preventing Turkey from unbalancing its policy and strategic choices in favour of Russia (and China</span></u></strong><span data-dcnode-id="781" instrument_node="">).</span></li><span data-dcnode-id="779" instrument_node="">
</span><li data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Turkey’s membership of the EU – that is full membership – depends on achieving consensus between member states. Turkey should be given clear answers regarding the accession negotiations that should be unfrozen in exchange for Ankara’s pledge and tangible steps made towards improving its democracy record.</span></li><span data-dcnode-id="776" instrument_node="">
</span><li data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">The customs union agreement between the EU and Turkey could be complemented with clauses that allow Turkish exports of agricultural products to the EU, as a bonus for making steps that improve the state of democracy and freedoms before the elections in 2023.</span></li><span data-dcnode-id="773" instrument_node="">
</span><li data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">The EU should negotiate with Turkey a reasonable/acceptable way for visa liberalisation for Turkish citizens.</span></li><span data-dcnode-id="770" instrument_node="">
</span><li data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">A renewed peace process, aimed at resolving issues related to Kurdish organisations vis-à-vis fighting terrorism in Syria and elsewhere, could help pave the way to lasting security in Turkey and the region. The West could provide economic incentives to bring all counterparts, including relevant actors in the Kurdish political movements, to the negotiation table. Respect for human rights, territorial integrity and sovereignty of states, and of security arrangements are crucial ingredients of a peace process.</span></li><span data-dcnode-id="767" instrument_node="">
</span><li data-dcnode-id="762"><strong data-dcnode-id="764"><u data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Turkey has the ambition to develop its defence industry, but it has also military capability gaps that it would not be likely to be able to fill by itself</span></u></strong><span data-dcnode-id="763" instrument_node="">. Ideally, Turkey and also Greece should stop blocking cooperation and interaction between NATO and the EU for the benefit of all parties. Turkey could profit from participating in projects under Turkey’s Future Role in NATO 23 China-Russia “Alliance” the Permanent Structured Cooperation (PESCO), provided it meets conditions set by the EU for third countries.57</span></li><span data-dcnode-id="761" instrument_node="">
</span><li data-dcnode-id="755"><span data-dcnode-id="760" instrument_node="">The US could clear the sale of Patriot systems to Turkey, as Ankara expressed its wish to purchase the equipment, to prevent Turkey from buying a second batch of S-400 systems from </span><strong data-dcnode-id="757"><u data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Russia. It is in the interest of all Allies that Turkey not continue to purchase Russian (and Chinese) military equipment. </span></u></strong><span data-dcnode-id="756" instrument_node="">An acceptable and viable solution could be found regarding the S-400 systems already bought, but not yet activated by Turkey. The US could purchase them from Turkey.</span></li><span data-dcnode-id="754" instrument_node="">
</span><li data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Turkey’s primary goal is to get compensated by the US for the payments already made rather than seeking to return to the F-35 project.58 However, Turkey needs to replace (at least partially) its F-16 fleet in the foreseeable future. Turkey and other Allies, particularly the US, should find a solution as to how Turkey could acquire last generation multipurpose aircraft.</span></li><span data-dcnode-id="751" instrument_node="">
</span></ul><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">This is key to the integrity of the Alliance, including NATO’s integrated air defence.</span></p><span data-dcnode-id="746" instrument_node="">
</span><ul data-dcnode-id="738"><span data-dcnode-id="745" instrument_node="">
</span><li data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Ankara’s claim for a larger Turkish maritime EEZ in the eastern Mediterranean cannot be solved unilaterally, or through the NATO-sponsored bilateral (Greek-Turkish) de-confliction mechanism established in October 2020.59 Turkey should address the issue to the International Court of Justice in The Hague.</span></li><span data-dcnode-id="742" instrument_node="">
</span><li data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Turkey and the Baltic states, as well as Poland, should multiply their contacts, including at the highest level, and continue to strengthen their defence cooperation. The Baltic states should employ additional incentives for Turkey to become more active in defence and deterrence in the northeastern flank, including contributions to NATO’s enhanced Forward Presence and the enhanced Baltic Air Policing mission.</span></li><span data-dcnode-id="739" instrument_node="">
</span></ul><span data-dcnode-id="737" instrument_node="">
</span><h4 data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Turkey is undermining, not strengthening, NATO’s Black Sea defense</span></h4><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Skyler Blake, January 17, 2021, Countering the growing Russian naval threat in the Black Sea region, https://www.atlanticcouncil.org/blogs/ukrainealert/countering-the-growing-russian-naval-threat-in-the-black-sea-region/</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="730" instrument_node="">A week of high-stakes talks between Russian and Western officials have failed to reduce the geopolitical tension in Eastern Europe, where Moscow has concentrated over 100,000 troops on the border with Ukraine and is threatening unspecified “military-technical measures” if its ultimatums on ending Ukrainian-NATO cooperation are not met. While the Baltic Sea has received considerable attention from NATO strategic planners in recent years, </span><strong data-dcnode-id="727"><u data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">the need for a cohesive NATO Black Sea Defense Strategy is now more evident than</span></u></strong><span data-dcnode-id="726" instrument_node=""> ever. As current unclassified intelligence suggests, Russian-occupied Crimea could be used as a military staging ground for the southern flank of a potential full-scale invasion of Ukraine. Growing Russian dominance in the Black Sea also raises the possibility of a naval blockade targeting merchant shipping or amphibious landings along Ukraine’s southern coastline in the region around Odesa. U</span><strong data-dcnode-id="723"><u data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">nfortunately, the current NATO strategy to deter Russian aggression in the Black Sea region is dangerously underdeveloped. The region’s three NATO member states Romania, Bulgaria and Turkey have so far been unable to establish a comprehensive Black Sea security strategy together with NATO partners Ukraine and Georgia to counter the challenges posed by Russia. </span></u></strong><span data-dcnode-id="722" instrument_node="">The kind of cooperation required for an effective NATO Black Sea Defense Strategy has so far proved elusive amid political differences between member states. While there is little prospect of progress in Ukraine and Georgia’s membership bids, these two NATO partner nations also have an important role to play in the alliance’s Black Sea strategy. Subscribe for more from UkraineAlert UkraineAlert is a comprehensive online publication that provides regular news and analysis on developments in Ukraine’s politics, economy, civil society, and culture. Email* An achievable first step towards a more coherent NATO position in the Black Sea would be greater Western assistance in rebuilding Ukrainian and Georgian maritime strength. </span><strong data-dcnode-id="719"><u data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">The 1936 Montreux Convention makes maintaining a consistent NATO Black Sea presence difficult, as Turkey retains control over the straits and places considerable constraints on the number, transit time, and tonnage of naval vessels</span></u></strong><span data-dcnode-id="718" instrument_node="">. This enhances the potential role of Black Sea partners Ukraine and Georgia. Ukraine lost the majority of its navy to the Russian occupation of Crimea in 2014, while much of Georgia’s navy was destroyed during the country’s 2008 conflict with Russia. Additional funding would enable Ukraine and Georgia to rebuild their naval capabilities according to NATO standards. This would result in more vessels permanently stationed in the Black Sea. This is already happening to a degree, but efforts need to be expedited with regards to the current crisis. The West, however, should be wary of supplying Ukraine and Georgia with corvette-class ships, as larger vessels are expensive to operate. They are also more vulnerable to Russia’s superior naval strength, while the shallow water ports of Odesa and Mykolaiv do not provide suitable infrastructure. With this in mind, the West should continue assisting Ukraine in the assembly of a fleet capable of carrying out its mosquito defense strategy. This should include small, inexpensive patrol boats, amphibious boats capable of landing infantry, and missile attack vessels capable of preventing Russian troop landings. EURASIA CONGRESSIONAL FELLOWSHIP The Atlantic Council’s Eurasia Congressional Fellowship Program aims to educate Congressional staff on current events in the Eurasia region and engage staff with the Council’s latest research. The program connects Congressional fellows with our larger community, which includes leading experts on Ukraine, Russia, Central Asia, and the South Caucasus. Applications are open! For questions about the program, please contact Shelby Magid. APPLY TODAY In the event of a major military escalation by Moscow, the NATO goal in the Black Sea would be to adopt an effective “sea denial” strategy. This strategy would entail a force that is capable of at least limiting Russian freedom of navigation in illegally occupied areas. To achieve this presence, NATO could further merge military exercises with its partners Ukraine and Georgia. At this point, Romania is by far the most enthusiastic supporter of a greater alliance presence in the region and, after signing a 10-year cooperation agreement with the US, can be considered a stable anchor for NATO in the Black Sea. The NATO maritime presence in the Black Sea has been steadily decreasing after the initial years of Russian aggression against Ukraine. In February 2017, NATO Secretary General Jens Stoltenberg pledged to increase the NATO presence in the region, but progress has been suboptimal. The Romanian, Ukrainian and Georgian navies could contribute to the establishment of a permanent Black Sea presence in line with the Montreux Convention, with significantly increased size, scale, and sophistication of their current exercises. It is imperative that a unified land, air, and sea defense strategy should not be excluded. NATO in this area could attempt to replicate the contemporary strategy for the Baltic Sea in the Black Sea. Ukraine holds a regular Black Sea exercise with NATO known as Sea Breeze, as well as the Rapid Trident land exercise and several others. Georgia hosts the Noble Partner army exercise, while the US and Romania jointly organize Saber Guardian. Ben Hodges of the Center for European Policy Analysis has suggested that these should not be isolated exercises, but instead should be linked together as a show of unified Black Sea regional defense. Western planners must remember that Russia respects strength above all else. The fact that there is currently no unified policy within NATO on Black Sea security is a major weakness. Internal differences within the alliance present Russia with opportunities at a highly inopportune moment in relations with the Kremlin. Many in NATO are currently looking for ways to re-engage with Russia by combining deterrence with dialogue. A clear and coherent strategy in the Black Sea would project the kind of strength that Moscow understands and respects.</span></p><span data-dcnode-id="716" instrument_node="">
</span><h4 data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Turkey’s sale of a drone to the Ukraine may trigger a Russian invasion of the Ukraine and won’t change the power balance</span></h4><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="712" instrument_node="">Isabelle Khurshudyan and David L. Stern, 1-16, 22, Washington Post, </span><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/world/2022/01/15/ukraine-russia-drones-turkey/"><span data-dcnode-id="711" instrument_node="">https://www.washingtonpost.com/world/2022/01/15/ukraine-russia-drones-turkey/</span></a><span data-dcnode-id="709" instrument_node="">, Why Ukraine’s Turkish-made drone became a flash point in tensions with Russia</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="706" instrument_node="">KYIV — In the drone’s-eye video released by Ukraine’s military, a small, blue targeting square hovers over an image on the ground. After several seconds, a large plume of smoke bursts up from the spot. Two people are then seen running away from the site, where Ukraine claims it destroyed a D-30 howitzer used by Russian-backed separatists in the eastern Donbas region. But the strike on Oct. 26 — from a </span><strong data-dcnode-id="703"><u data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Bayraktar TB2 drone made by NATO-member Turkey — represented more than another clash in nearly eight years of fighting in eastern Ukraine. For Russia, it was another signal that Ukraine is boosting its arsenal to potentially change the military balance in the region — and why Moscow is demanding NATO end all defense cooperation with Ukraine and other former Soviet republics such as Georg</span></u></strong><span data-dcnode-id="702" instrument_node="">ia. The United States and its NATO allies say that Russia can never dictate its policies. Stark differences over Ukraine overshadow high-stakes Russia-NATO talks The impasse was clear during high-stakes diplomatic talks in Europe this week between the West and Russia, leaving Russian officials to suggest that future dialogue is pointless. Russia has threatened that it will take “military technical” measures if its requests are rejected Moscow has denied that its buildup of more than 100,000 troops and military hardware near the Ukrainian border is preparation for an attack on the country, though U.S. intelligence has warned that a multipronged invasion could come as soon as this month. </span><strong data-dcnode-id="699"><u data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Russia planning massive military offensive against Ukraine involving 175,000 troops, U.S. intelligence warns “Russia is seeing a trend where all of these NATO countries are delivering more and more weaponry to Ukraine,” said Rob Lee, a Russian military expert and fellow at the Foreign Policy Research Institute. “It’s not necessarily that significant yet, but I think they see the trend line, and they don’t like where that trend line is going.” </span></u></strong><span data-dcnode-id="698" instrument_node="">Russian President Vladimir Putin has repeatedly claimed that NATO could position a long-range missile system in Ukraine before long, though there’s no indication that the military alliance has considered such a step. While the U.S.-provided weapons, such as the Javelin antitank missiles, have garnered the most headlines of Ukraine’s armory, Kyiv’s less-hyped backing from Turkey has raised alarms in Moscow. Not only did the purchase of the Bayraktar TB2 drones come without any apparent conditions on use, but Turkey and Ukraine have agreed to launch a production site of the drones in Ukraine. “I think that, of course, this creates completely different conditions for hostilities,” said Serhiy Zgurets, a Ukrainian military expert. “It is an element of emotional and real influence on the enemy. Liudmyla Kulik stands near her damaged hen house and a fallen tree on Dec. 14. The damage was caused by shelling in October in Hranitne, Ukraine. (Serhiy Morgunov for The Washington Post) Though Ukraine bought its first Bayraktar TB2 drones in 2019, it had held off on using them for strikes in the Donbas conflict until the front-line village of Hranitne came under heavy shelling on Oct. 26. The drones had been used for reconnaissance flights. The artillery strikes from the separatists in October leveled civilian homes and wounded two Ukrainian armed servicemen, one of whom died. In a statement, Ukraine’s Defense Ministry said it first demanded a cease-fire through the Organization for Security and Cooperation in Europe Special Monitoring Mission to Ukraine, but “the reaction from the Russian occupation forces was negative.” The single drone strike followed. “The Armed Forces of Ukraine will continue to increase tactics and methods of combat use of Bayraktars to deter Russian aggression and protect Ukraine’s interests,” the statement said. On Ukraine’s front, a real war overshadows worries about a possible future one with Russia </span><strong data-dcnode-id="695"><u data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">In a December phone conversation between Putin and Turkish President Recep Tayyip Erdogan, Putin brought up the Ukrainians’ use of Turkish-made drones, calling it a “destructive” behavior and “provocative activity</span></u></strong><span data-dcnode-id="694" instrument_node="">,” according to the Kremlin readout. Turkish Foreign Minister Melvut Cavusoglu has said Ankara can’t be blamed for Ukraine’s deployment of the weapons. “This is already completely unpleasant news for the Russians, because this is a dramatic increase in combat capabilities,” said Oleksiy Arestovych, a Kyiv-based military blogger. “Ukraine is acquiring what is considered a ‘game changing app.’ ” The Bayraktar TB2 drones offer countries stealthy air power at a fraction of the cost of maintaining a traditional air force. They have featured prominently in conflicts in Libya and Syria, but it was perhaps Azerbaijan’s use of them in 2020 against Armenia that offered Ukraine an inspiring model. Across 44 days of fighting over the breakaway Nagorno-Karabakh enclave, the drones targeted Armenian and Nagorno-Karabakh soldiers and destroyed tanks, artillery and air defense systems. They tilted the scales in the more-than-three-decade conflict for Azerbaijan, which took back some territory under a cease-fire deal with Armenia Destroyed cars and a crater in the road are the result of a reported drone strike the previous day, Oct. 1, 2020, in Martakert in the Nagorno-Karabakh region, located within the internationally recognized borders of Azerbaijan but widely controlled by ethnic Armenians. (Brendan Hoffman/Getty Images) </span><strong data-dcnode-id="691"><u data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">While some NATO countries are cautious about weapons sales to Ukraine, Turkey is a “wild card,” said Lee, the Russian military exper</span></u></strong><span data-dcnode-id="690" instrument_node="">t. Germany, for example, has blocked Ukraine’s purchase of defensive weapons through the NATO Support and Procurement Agency, Ukrainian officials have said Russia and Germany have economic cooperation via the Nord Stream 2 gas pipeline that runs through Danish waters to Germany, bypassing existing supply routes through Ukraine. Some Western countries are wary of supplying Ukraine with more weapons because that could be deemed a provocation for Russia, or even serve as a pretext for an attack. “They’re afraid,” Oleksiy Danilov, secretary of Ukraine’s National Security and Defense Council, said of the Germans. “They constantly stick rods in our tires over this issue.” </span><strong data-dcnode-id="687"><u data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">In their shared sea, Ukraine and Russia already risk direct conflict every day </span></u></strong><span data-dcnode-id="686" instrument_node="">Sinan Ulgen, director of the Istanbul-based Center for Economics and Foreign Policy Studies, said Turkey’s support for Ukraine was a “delicate and difficult balancing act” because of Turkey’s relationship with Russia, which has “elements of cooperation but elements of competition and rivalry.” It has resulted in a complicated geopolitical relationship between Moscow and Ankara over the past few years. Turkish and Russian soldiers and mercenaries have faced off in armed conflict in Syria and Libya. At the same time, Turkey has purchased a sophisticated air defense system from Russia, a move that angered its NATO partners and resulted in sanctions from the United States. While Erdogan’s government has taken a hard line in refusing to recognize Russia’s 2014 annexation of Crimea from Ukraine, it has not followed Europe and the United States in sanctioning Moscow. Turkey also sees in Ukraine an opportunity to expand the growing list of customers for its armed drones and take advantage of Ukraine’s defense production capabilities, including its ability to manufacture rocket engines, Ulgen said. At the mention of “Turkish drones,” Danilov responded: “They’re ours, which we bought. … Engines for these drones are being made in our country.” Ukraine’s foreign minister wants West to clarify its sanction threats to Moscow </span><strong data-dcnode-id="683"><u data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">But while the drones were a “game-changer” in other battles between countries with less sophisticated military hardware, it’s unlikely they would make much of a difference against Russia, Lee said. Russia’s Defense Ministry has already posted images of training exercises for how to counter Bayraktar TB2 drones. “If Ukraine gets into a fight with Russia, Russia will destroy them</span></u></strong><span data-dcnode-id="682" instrument_node="">,” Lee said. </span><strong data-dcnode-id="679"><u data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">“Russia could shoot them down, or even before that, they can destroy the airfields where TB2s operate, or they can destroy the ground control station.” “The TB2s have never faced an integrated air-defense system like the one Russia has,” he</span></u></strong><span data-dcnode-id="678" instrument_node=""> added.</span></p><span data-dcnode-id="676" instrument_node="">
</span><h4 data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Turkey successfully challenged Russia in the Armenia-Azerbaijan conflict</span></h4><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Chauvsky, 1-14, 22, Eugene Chausovsky is a nonresident fellow at the Newlines Institute. Chausovsky previously served as senior Eurasia analyst at the geopolitical analysis firm Stratfor for more than 10 years. His work focuses on political, economic, and security issues pertaining to Russia, Eurasia, and the Middle East, Foreign Policy, Russia Is Worried About Challenges in the Caucasus, https://foreignpolicy.com/2022/01/14/russia-csto-caucasus-nagorno-karabakh/</span></p><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="669" instrument_node="">Stepping in was meant also to limit the influence of T</span><strong data-dcnode-id="666"><u data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">urkey</span></u></strong><span data-dcnode-id="665" instrument_node="">, whose </span><strong data-dcnode-id="662"><u data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">security support for Azerbaijan via weaponry including TB2 drones proved pivotal in helping the country’s forces break through Armenian defenses.</span></u></strong><span data-dcnode-id="661" instrument_node=""> Thus</span><strong data-dcnode-id="658"><u data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">, Russia intervened as a mediator to oversee a cease-fire and transfer of territory in and around Nagorno-Karabakh from Armenia to Azerbaijan</span></u></strong><span data-dcnode-id="657" instrument_node="">, which was painful to accept for Yerevan but at the same time was much less than what Armenian forces would have otherwise likely lost on the battlefield. Armenia and Azerbaijan both agreed to the Moscow-brokered armistice, with its implementation consisting of the deployment of 2,000 Russian peacekeepers in November 2020. The Nagorno-Karabakh conflict highlighted Russia’s regional power status and Moscow’s continued ability to shape events, but it also revealed that Moscow’s influence has limitations. After all, </span><strong data-dcnode-id="654"><u data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Russia’s preferred outcome would have been the prewar status quo, but Azerbaijan, along with its own ally in Turkey, was able to forcefully challenge this status quo. This challenge substantially raised the profile of Ankara in the region, </span></u></strong><span data-dcnode-id="653" instrument_node="">with Moscow agreeing to a joint Russian-Turkish monitoring center to oversee the cease-fire implementation and Russia having no choice but to acknowledge the important regional power role played by Turkey. The year since has also revealed key constraints to Russia’s influence in the region. Despite the presence of Russian peacekeepers in Nagorno-Karabakh, both Armenian and Azerbaijani forces have violated the cease-fire on a periodic and sometimes deadly basis. And Turkey has been able to leverage its increased influence for its own political and economic gains, most notably in its support for Azerbaijan’s regional transport and infrastructure initiatives and its diplomatic outreach to Armenia to resume trade and flights, and to revive the long-dormant process of political normalization. To be sure, Russia has played an important part in all of these discussions, but Moscow is no longer the only major actor in shaping the geopolitics of the Caucasus. While Russia’s military presence in the region mitigated the conflict between Armenia and Azerbaijan, it has not been enough to prevent eruptions of violence or to bring about a sustainable peace. In the meantime, </span><strong data-dcnode-id="650"><u data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Turkey has proved its willingness and ability to directly challenge Russia in the region, even as the two countries cooperate in other spheres such as energy and weapons sales.</span></u></strong><span data-dcnode-id="649" instrument_node=""> The world is becoming more multipolar, which can serve as both a benefit and a challenge to entrenched powers—including Moscow. This brings us back to the unfolding events in Ukraine and Kazakhstan. In the Ukrainian case, Russia is still trying to push back against the political, economic, and security influence of the West, while seeking guarantees against the prospects of NATO enlargement it has fought to avoid. In Kazakhstan, Russia is less worried about the West, but it could see its position as the dominant external power giving way to others, including China and perhaps even Turkey. While Russia has established a pragmatic division of labor of sorts with China in Central Asia, Moscow cannot be sure this working arrangement will last forever. </span><strong data-dcnode-id="646"><u data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">And Russia can be even less sure of Turkey’s intentions, considering that the two have been on opposing sides of conflicts in such areas as Syria and Libya, and that Turkish TB2 drones are now being sold to the likes of Ukraine and Kyrgyzstan</span></u></strong><span data-dcnode-id="645" instrument_node="">. Thus, there is a broader connection between what is happening in the Caucasus and the events that are unfolding in Eastern Europe and Central Asia. The Kremlin finds its dominant power status in the former Soviet periphery being challenged from numerous directions, and Russia’s CSTO deployment in Kazakhstan and its military maneuvers along the Ukrainian border are intended to show that Moscow is both able and willing to use military force to maintain its position as the dominant regional power in the post-Soviet space. However, such military actions may only take Russia so far, and they have their own risk of blowback. For example, Russia has to consider that its CSTO deployment to Kazakhstan may set a dangerous precedent, as other member states like Armenia are no strangers to mass protests and unrest. For example, if violent demonstrations were to erupt in Armenia in the future, would Russia have to intervene again? And if so, could it be certain such an intervention will succeed? Such questions could become increasingly relevant as Armenia and Azerbaijan continue to stare each other down and Turkey and others look to expand their position in the region. The Caucasus may soon prove to be no less dynamic and consequential than Eastern Europe or Central Asia, both for Russia and the powers with which it contends.</span></p><span data-dcnode-id="643" instrument_node="">
</span><h4 data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Turkey will work to diffuse the Ukraine conflict but side with NATO if push comes to shove</span></h4><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Asli Aydintasbas, Senior Fellow, Council on Foreign Relations, January 14, 2022, War in Ukraine: Erdogan’s greatest challenge yet, https://ecfr.eu/article/war-in-ukraine-erdogans-greatest-challenge-yet/</span></p><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="600"><strong data-dcnode-id="634"><u data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">As the spectre of war in Ukraine looms over Europe, what individual NATO members do</span></u></strong><span data-dcnode-id="633" instrument_node=""> – or choose not to do – </span><strong data-dcnode-id="630"><u data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">will have a geopolitical impact on how any conflict unfolds</span></u></strong><span data-dcnode-id="629" instrument_node="">. </span><strong data-dcnode-id="626"><u data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">When it comes to Ukraine, Turkey is no ordinary NATO member. It has recently been selling armed drones to Kyiv – some of which the Ukrainian military has already used in Donbas</span></u></strong><span data-dcnode-id="625" instrument_node="">, to great effect, against pro-Russian targets</span><strong data-dcnode-id="622"><u data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">. Turkey is also a close ally of Russia, and a key trading partner – and Ankara has been careful not to step on Moscow’s toes across different conflict zone</span></u></strong><span data-dcnode-id="621" instrument_node="">s. Under Recep Tayyip Erdogan and Vladimir Putin, Turkey and Russia share much more than meets the eye. The two resurgent powers want to shake up the post-Soviet world order, they each have a disdain for liberal norms, and they both want a greater role on the world stage for their respective countries</span><strong data-dcnode-id="618"><u data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">. Turkey and Russia have also developed a unique form of relationship, often dubbed “competitive cooperatio</span></u></strong><span data-dcnode-id="617" instrument_node="">n,” whereby they back opposing sides in conflicts in Libya, Syria, and the South Caucasus but do so in a way that recognises each other’s expanding sphere of influence. This unique relationship between Erdogan and Putin can be hard for Western countries to fully comprehend. In 2014, Turkey criticised the Russian invasion of Crimea but did not join the US-led sanctions against Russia. In 2017, Turkey signed a deal to buy the Russian-made S-400 missile system and, against American objections, received it in 2019, despite the threat of US sanctions. </span><strong data-dcnode-id="614"><u data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">No doubt Ankara will want to stay out of any military conflict with Russia over Ukraine. Despite its growing defence sales to Ukraine, its instinct will be to try to sit on the fence. In all likelihood, Ankara would join with its NATO partners in condemning a Russian invasion; but it would not go with them in imposing sanctions. Erdogan will aim to continue cooperation with Russia in Syria and in the economic sphere; but he would also step up engagement with NATO, with the aim of improving his global standing and reducing international criticism of him for his domestic conduct</span></u></strong><span data-dcnode-id="613" instrument_node="">. This last point is becoming more important for the Turkish leader as a united opposition emerges against him and opinion polls show an anti-Erdogan majority. This is a tough course to follow, though. If an invasion happens and NATO starts supplying weapons to the Ukrainian forces, would Ankara continue to deliver armed drones to Kyiv? Would it facilitate NATO access to the Black Sea? Would it slow its burgeoning relations with Russia? It is too early to know the answers to these questions. But, given the significant leverage Russia has over Turkey in Syria, and over its tottering economy, Ankara would likely seek to do just enough to elevate its standing with NATO (and use this as an opportunity to improve ties with Washington) but less than what it would take to trigger a Russian reprisal. Here is why. In Syria, Ankara depends on Moscow’s consent to continue to control the safe zone Turkish troops established after mounting successive incursions into the country. Russia controls the air space and everything else around. And it is largely Russia’s presence that holds together the fragile ceasefire in northern Syria between the Syrian opposition, the Syrian regime, Turkey, and the Syrian Kurds. Turkey would pay a huge price in Syria if Russia turned against it over its stance on Ukraine Turkey would therefore pay a huge price in Syria if Russia turned against it over its stance on Ukraine. For example, in Idlib, several million Syrians live in a safe haven run by the Syrian opposition, with Turkish support. But this part of the country is vulnerable to a regime offensive, should Russia sign off on this. It would only take a few sorties by the Syrian or the Russian air force to create panic among the Sunni population in Idlib and force millions of Syrians towards the Turkish border – something that Ankara cannot afford to have, given the presence of already four million Syrian refugees in Turkey and growing anti-Syrian sentiments among the public. Russia also has great economic leverage over Turkey. In addition to the S-400s, Russia is building Turkey’s first nuclear reactor, it has recently constructed a pipeline underneath the Black Sea to Turkey, and it is supplying the bulk of Turkey’s natural gas. Despite Ankara’s desire for energy diversification, Turkish cities still need Russian natural gas to stay warm. This does not mean Ankara is a Russian vassal or happy about this dependence on Moscow. But it does mean </span><strong data-dcnode-id="610"><u data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Turks will tread gingerly when it comes to Ukraine. Meanwhile, Ankara also has a close relationship with Kyiv and has consistently supported the independence of Ukraine, Moldova, and other post-Soviet countries</span></u></strong><span data-dcnode-id="609" instrument_node=""> – in the much same way that the Ottomans sought to prevent Russian expansion for centuries, for example, aligning with Western powers against Russia in the Crimean war. Kemalist Turkey initially aligned itself with the Soviet Union but later sought to limit its influence by joining NATO in 1952. Erdogan met Volodymyr Zelensky several times in 2021, and Ukraine has also purchased at least a dozen Bayraktar TB2 drones from Turkey – which eventually irritated Moscow enough to prompt a telephone conversation between Erdogan and Putin. Ukrainian firms have what Turkey’s defence industry lacks – know-how about how to produce diesel engines for Turkey’s ambitious defence projects, including tanks and fighter jets. </span><strong data-dcnode-id="606"><u data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">If an invasion happens, Turkey would be under pressure from NATO to keep supplying Ukraine with drones and other equipment. There might be demands for entry into and out of the Black Sea, controlled at the Bosporus by Turkey. And if Turkey wants an exemption from Western sanctions on Russia, it would be asked to do more to help an anti-Russian insurgency in Ukraine – which American officials have said they are prepared to support if diplomacy fails. </span></u></strong><span data-dcnode-id="605" instrument_node="">But, while Ukraine may be a useful partner for Turkey, and a good vehicle to improve Ankara’s troubled relations with NATO, from a Turkish perspective the country is not a strategic prize worth going to war over. In the crucible of conflict, </span><strong data-dcnode-id="602"><u data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">neither NATO nor Russia will appreciate Turkish ambiguity, and each will seek subtle ways to pressure Turkey to take a stand. Turkey has been here before – it attempted a similar approach in both the first and second world war, succeeding in the latter case but failing miserably and catastrophically in the first</span></u></strong><span data-dcnode-id="601" instrument_node="">. Erdogan has in the past proven himself a master of such geopolitical balancing. But, with a weakened position at home and alienated partners abroad, a war in Ukraine would be his greatest challenge to date.</span></p><span data-dcnode-id="599" instrument_node="">
</span><h4 data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Turkey destroying human rights</span></h4><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Human Rights Watch, January 13, 2022, Turkey Defies International Human Rights Law, https://www.hrw.org/news/2022/01/13/turkey-defies-international-human-rights-law</span></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="575"><span data-dcnode-id="592" instrument_node="">The government of Recep Tayyip </span><strong data-dcnode-id="589"><u data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Erdoğan has set back Turkey’s human rights record by decades and flagrantly defies international human rights law</span></u></strong><span data-dcnode-id="588" instrument_node="">, Human Rights Watch said today in its World Report 2022. </span><strong data-dcnode-id="585"><u data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">In 2021 Turkey was the first country to withdraw from the Council of Europe Convention on Preventing and Combating Violence against Women and Domestic Violence</span></u></strong><span data-dcnode-id="584" instrument_node="">, known as the Istanbul Convention. In December Turkey’s refusal to free the human rights defender Osman Kavala, prompted the Council of Europe to begin the process for sanctioning the government’s persistent defiance of a binding European Court of Human Rights judgment ordering his release. Turkey is the second country in the history of the Council of Europe to face such a sanctions process. “</span><strong data-dcnode-id="581"><u data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">President Erdogan has over the past year followed a course to dispense with Turkey’s adherence to the framework of international human rights law,</span></u></strong><span data-dcnode-id="580" instrument_node="">” said Hugh Williamson, Europe and Central Asia director at Human Rights Watch. “Withdrawal from the Istanbul Convention is a setback for women’s rights and efforts to combat domestic violence; and opting to be sanctioned by the Council of Europe rather than release Osman Kavala from arbitrary and unlawful detention demonstrates contempt for the European Court of Human Rights.” In the 752-page World Report 2022, its 32nd edition, Human Rights Watch reviews human rights practices in nearly 100 countries. Executive Director Kenneth Roth challenges the conventional wisdom that autocracy is ascendent. In country after country, large numbers of people have recently taken to the streets, even at the risk of being arrested or shot, showing that the appeal of democracy remains strong. Meanwhile, autocrats are finding it more difficult to manipulate elections in their favor. Still, he says, democratic leaders must do a better job of meeting national and global challenges and of making sure that democracy delivers on its promised dividends. </span><strong data-dcnode-id="577"><u data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Turkey has a restrictive environment for the media, for human rights defenders, for the LGBT community, for Kurdish political activists, and for other perceived government critics.</span></u></strong><span data-dcnode-id="576" instrument_node=""> Former leading politicians from the parliamentary opposition Peoples’ Democratic Party (HDP) have been detained for five years and a closure case against the whole party is before the Constitutional Court. Political control over courts is at the core of the deep erosion of rule of law in Turkey. Impunity remains entrenched for police abuses and for cases of enforced disappearances. Turkey remains host to the highest number of refugees in the world, with an estimated 3.7 million Syrian refugees in the country, in addition to asylum seekers from other countries. Turkey continued building a wall in 2021 along its eastern border with Iran, and summarily pushed back Afghans and others apprehended attempting to cross the border.</span></p><span data-dcnode-id="574" instrument_node="">
</span><h4 data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Turkey’s provision of drones to the Ukraine risks war and won’t deter war</span></h4><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="564"><strong data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Stein, January 2022</span></strong><span data-dcnode-id="568" instrument_node="">, Dr. Aaron Stein is the Director of Research at the Foreign Policy Research Institute. He is the coeditor of The Russian Way of War in Syria: Implications for the West, an edited volume examining Russian operations in the civil war. He is also the author of the forthcoming book, The U.S. War Against ISIS: How America and its Allies Defeated the Caliphate (I.B. Tauris, 2022). Previously, Dr. Stein was a resident senior fellow of the Atlantic Council. He also hosts the Arms Control Wonk and the Chain Reaction podcasts. Dr. Stein was previously a doctoral fellow at the Geneva Center for Security Policy (Switzerland), an Associate Fellow of the Royal United Services Institute (London), and Nonproliferation Program Manager at the Center for Economics and Foreign Policy Studies (Istanbul), </span><em data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Turkey’s Response to the Russia-Ukraine Crisis</span></em><span data-dcnode-id="565" instrument_node="">, https://www.fpri.org/article/2022/01/turkeys-response-to-the-russia-ukraine-crisis/</span></p><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="537"><strong data-dcnode-id="560"><u data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">On October 26, 2021, Ukraine’s Ministry of Defense released video of a TB2</span></u></strong><span data-dcnode-id="559" instrument_node=""> unmanned combat aerial vehicle (</span><strong data-dcnode-id="556"><u data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">UCAV) striking a separatist D-30 howitzer in Russian-occupied Donbas. The strike was Ukraine’s first confirmed use of the now ubiquitous TB2, the</span></u></strong><span data-dcnode-id="555" instrument_node=""> Bayraktar-</span><strong data-dcnode-id="552"><u data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">manufactured drone that the Turkish military has used to great tactical effect in Syria, Libya, and Nagorno-Karabakh</span></u></strong><span data-dcnode-id="551" instrument_node="">. The Turkish-Ukrainian defense relationship is understudied, but it </span><strong data-dcnode-id="548"><u data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">could become an important factor in how Russian elites view</span></u></strong><span data-dcnode-id="547" instrument_node=""> North Atlantic Treaty Organization </span><strong data-dcnode-id="543"><em data-dcnode-id="544"><u data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">(NATO) support for non-member Ukraine, and be used to justify an invasion to assuage Moscow’s concerns about a US-allied military presence along its borders. </span></u></em></strong><span data-dcnode-id="542" instrument_node="">The Turkish support for Ukraine is not the main driver of Russian discomfort about the future of Ukraine. </span><strong data-dcnode-id="539"><u data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">The TB2 is also not a decisive game changer, and the use of UCAVs is almost certain to have little impact on how Russian leadership weighs risk during debates about the efficacy of armed conflict in a neighboring state</span></u></strong><span data-dcnode-id="538" instrument_node="">. Nevertheless, Turkish-Ukrainian defense ties are worthy of deeper study, precisely because Ankara’s relationships with Kyiv and Moscow have a secondary impact on American interests in Eastern Europe.</span></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">CONTINUES</span></p><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="532" instrument_node="">These two actions are in contradiction with one another, but also demonstrate how Turkish leaders are comfortable compartmentalizing the country’s international relationship to pursue policies that elites have decided are in its best interests. The Turkish-Ukrainian relationship is almost certain to continue. The two sides have a mutually beneficial defense industry relationship. Ankara will have to balance any such cooperation with Kyiv with its very real interests in managing ties with Moscow. Russia and Turkey can, in theory, manage their disagreements about Ukraine, precisely because each side has an interest in retaining functioning relations. </span><strong data-dcnode-id="529"><u data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Turkey’s NATO membership</span></u></strong><span data-dcnode-id="528" instrument_node="">, however, </span><strong data-dcnode-id="524"><em data-dcnode-id="525"><u data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">creates secondary issues for the United States. Moscow can point to NATO support for Ukraine — to include Turkish support for Kyiv — as a reason for future military action</span></u></em></strong><span data-dcnode-id="523" instrument_node="">.</span></p><span data-dcnode-id="521" instrument_node="">
</span><h4 data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Turkey strengthening its relationship with Russia and becoming undemocratic</span></h4><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="511"><strong data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Stein, January 2022</span></strong><span data-dcnode-id="515" instrument_node="">, Dr. Aaron Stein is the Director of Research at the Foreign Policy Research Institute. He is the coeditor of The Russian Way of War in Syria: Implications for the West, an edited volume examining Russian operations in the civil war. He is also the author of the forthcoming book, The U.S. War Against ISIS: How America and its Allies Defeated the Caliphate (I.B. Tauris, 2022). Previously, Dr. Stein was a resident senior fellow of the Atlantic Council. He also hosts the Arms Control Wonk and the Chain Reaction podcasts. Dr. Stein was previously a doctoral fellow at the Geneva Center for Security Policy (Switzerland), an Associate Fellow of the Royal United Services Institute (London), and Nonproliferation Program Manager at the Center for Economics and Foreign Policy Studies (Istanbul), </span><em data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Turkey’s Response to the Russia-Ukraine Crisis</span></em><span data-dcnode-id="512" instrument_node="">, https://www.fpri.org/article/2022/01/turkeys-response-to-the-russia-ukraine-crisis/</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="509" instrument_node="">On October 26, 2021, Ukraine’s Ministry of Defense released video of a TB2 unmanned combat aerial vehicle (UCAV) striking a separatist D-30 howitzer in Russian-occupied Donbas. The strike was Ukraine’s first confirmed use of the now ubiquitous TB2, the Bayraktar-manufactured drone that the Turkish military has used to great tactical effect in Syria, Libya, and Nagorno-Karabakh. The Turkish-Ukrainian defense relationship is understudied, but it could become an important factor in how Russian elites view North Atlantic Treaty Organization (NATO) support for non-member Ukraine, and be used to justify an invasion to assuage Moscow’s concerns about a US-allied military presence along its borders. The Turkish support for Ukraine is not the main driver of Russian discomfort about the future of Ukraine. The TB2 is also not a decisive game changer, and the use of UCAVs is almost certain to have little impact on how Russian leadership weighs risk during debates about the efficacy of armed conflict in a neighboring state. Nevertheless, Turkish-Ukrainian defense ties are worthy of deeper study, precisely because Ankara’s relationships with Kyiv and Moscow have a secondary impact on American interests in Eastern Europe. The Turkish-Russian relationship is marred by bureaucratic distrust, which is papered over by a very functional leader-to-leader dynamic that enables the two Black Sea neighbors to cooperate and manage numerous regional conflicts. The Turkish-Ukrainian dynamic, in turn, is part of a broader Turkish effort to establish itself as an independent actor, committed to pursuing a foreign policy that often clashes with much of the NATO alliance. This paper will explore Turkish-Russian and Turkish-Ukrainian relations; the reasons for Turkey’s efforts to “fence sit” and establish itself as a neutral political actor in the Black Sea; and what these efforts portend for US interests in the region. An
