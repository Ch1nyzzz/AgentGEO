llow NATO members, Greece and France, in the eastern Mediterranean in recent years. Much of the controversy also stemmed from Ankara’s growing relations with Moscow over the years, which the United States and Western nations saw as a threat to the alliance. Turkey, however, has consistently stressed that its relations with Russia and its purchase of Russia’s S-400 anti-missile defence system do not breach any NATO security measures. Last week, T</span><strong data-dcnode-id="1473"><u data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">urkish President, Recep Tayyip Erdogan, reiterated that there “should be no doubt” about his country honouring “its commitments as a NATO ally”.</span></u></strong><span data-dcnode-id="1472" instrument_node=""> Regarding those relations with Moscow, the official said “Turkey puts a premium on talking with Russia,” but that it “fulfils all of its obligations as a NATO member”. They confirmed that “by the narrow confines of [the NATO treaty],” Turkey is allowed to “do a lot in terms of its own defence and national policy”.</span></p><span data-dcnode-id="1470" instrument_node="">
</span><h4 data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Russia is a threat a threat to Europe, NATO not currently prepared</span></h4><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Walsh, 1-31, 22, Garvan Walshe is a former national and international security policy advisor to the British Conservative Party and the founder and CEO of Article7., Europe Must Shed Its Illusions About Russia, https://foreignpolicy.com/2022/01/31/europe-russia-putin-ukraine-germany-france-nato-uk-illusions/</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1421"><span data-dcnode-id="1463" instrument_node="">Russian President Vladimir Putin’s troop buildup along Ukraine’s borders initially caught Western powers off guard. Russia’s first invasion in 2014 didn’t get the West to abandon its post-Cold War daydreams. But there are signs that </span><strong data-dcnode-id="1460"><u data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Putin’s threat of another invasion i</span></u></strong><span data-dcnode-id="1459" instrument_node="">s now </span><strong data-dcnode-id="1456"><u data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">forcing the West to shed its illusions. </span></u></strong><span data-dcnode-id="1455" instrument_node="">The United States, France, Britain, and Germany each have their own fantasies: Wa</span><strong data-dcnode-id="1452"><u data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">shington wants to think Europe is done and the United States can now focus on</span></u></strong><span data-dcnode-id="1451" instrument_node=""> confronting a proper superpower rival, </span><strong data-dcnode-id="1448"><u data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">China,</span></u></strong><span data-dcnode-id="1447" instrument_node=""> forgetting that Putin’s rearmed post-Soviet Russia is still strong enough to menace America’s allies. France wants strategic autonomy for Europe—being able to act independently of the United States on the world stage­—while thinking it can control European foreign policy with only 13 percent of democratic Europe’s population. Britain would like to forget its own continent from which, in former U.K. Prime Minister Margaret Thatcher’s words, “all our troubles came” and recreate a maritime relationship with trading hubs in Asia, forgetting the great game that lies between. Germany still clings to the belief that just because it has abandoned force as an instrument of policy, its eastern neighbors, even authoritarian Russia, must have done so as well, and that Russia’s Nord Stream 2 pipeline, which bypasses Eastern Europe to supply Germany with gas directly, is just a “private sector project.” </span><strong data-dcnode-id="1444"><u data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Each figment avoids uncomfortable facts: As</span></u></strong><span data-dcnode-id="1443" instrument_node=""> much as China might be the only “peer competitor” (to use the language of the U.S. Defense Department’s 2010 Quadrennial Defense Review), Russia is currently powerful enough to project power in Syria and Libya as well as destabilize Europe by sponsoring a coup in Montenegro, cutting off gas to Moldova, stirring up irredentism in </span><strong data-dcnode-id="1440"><u data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Bosnia, and, of course, seizing Crimea and invading the Donbass. </span></u></strong><span data-dcnode-id="1439" instrument_node="">Germany still clings to the belief that just because it has abandoned force as an instrument of policy, its eastern neighbors, even authoritarian Russia, must have done so as well. Notwithstanding China’s speedy economic development, U.S. trade volumes with Europe are almost double those with China ($1.1 trillion compared to $643 billion in goods and services, according to the Office of the U.S. Trade Representative). The discrepancy in investment figures is starker. The United States and European Union invest around $2 trillion each way. Investment flows to and from China are less than 5 percent of those that cross the Atlantic Ocean. Even if cultural ties and shared democratic values are discounted, a stable and prosperous Europe is in the United States’ interest. France, like Britain, is a globally minded power that no longer has the global resources to back its ambitions. But unlike Britain, it has, through the EU, an instrument for global power it wants to use. French differences with the United States have often been exaggerated for domestic political consumption. France was reportedly ready to launch airstrikes against Syrian President Bashar al-Assad with the Americans even after the British pulled out, and I have even heard from French sources who wish to remain anonymous that Paris scoped out unilaterally liberating Crimea in 2014. However, such muscularity is not the same as turning the EU into a geopolitical actor capable of acting on its own. Poland, the Baltic states, and Nordic countries still suspect that Paris, which was on the verge of selling Russia an advanced amphibious landing craft until those “little green men” appeared in Crimea, can’t be counted on if things turn ugly. Poles, especially, haven’t forgotten how France lived up to its guarantee of defending Poland from the Nazis by hiding behind the Maginot Line. Britain, which these days self-defines as global, is finding that stability in Europe is not so much an impediment as a precondition for its global ambitions. Notwithstanding cultural and political ties to the United States and other prosperous former colonies as well as the security benefits from initiatives like the Five Eyes intelligence sharing network—also involving the United States, Canada, Australia, and New Zealand—the United Kingdom is physically located in Europe, and it is only from European Russia that state-level threats to British security can emerge. The U.K. has very publicly supported Ukraine; British Defense Secretary Ben Wallace took Putin to task and supplied it with advanced anti-tank weapons. It has been less than assiduous, however, in clamping down on what the world might call Bank Stream 2: money flows of questionable provenance into London, including from Russian oligarchs enriched by Putin’s regime. Upholding global democratic values while laundering the world’s kleptocrats’ money might, with British understatement, be described as not entirely consistent. Germany’s problem is, in many ways, the most acute. It goes beyond embarrassments like former German Chancellor Gerhard Schröder working for Russian government gas pipeline operator Rosneft, the country’s inability to muster more than 5,000 helmets for Ukraine (Can the Bundeswehr’s logistics problems really be that bad?). Berlin must accept that good relations with former Soviet satellites, like Poland and the Baltic states, and with a Russia determined to reestablish the Soviet empire they escaped from are not simultaneously possible. It is not even due to Germany’s understandable pacifism. It is rather that Berlin must face up to a deeper contradiction in its Ostpolitik: that good relations with former Soviet satellites, like Poland and the Baltic states, and with a Russia determined to reestablish the Soviet empire they escaped from are not simultaneously possible. Even if it is getting harder these days to justify taking, say, Poland’s side on democratic grounds, the global economic balance is now in favor of the satellites. German trade with Russia amounts to $51 billion a year, whereas that with the other former Soviet satellites now in the European Union is worth $384 billion. </span><strong data-dcnode-id="1436"><u data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Putin’s aggression is forcing all these powers to confront their post-Cold War naive</span></u></strong><span data-dcnode-id="1435" instrument_node="">ty. The United States is now ready to base troops in Eastern Europe, where NATO’s presence has been limited to rotational deployments in an evidently unsuccessful attempt to appease Russia. France has announced it would send around 1,000 ground troops as well as air assets to Romania. Tanks in Poland or the Baltic states would be better still. Britain will also step up arms shipments and training. Joining the EU’s military mobility Permanent Structured Cooperation project (which the United States has also joined) would mark a shift to a form of Brexit where Britain coexisted constructively with Brussels. There are even reports of movement in Berlin: If weapons exports to Ukraine are still out of the question, Germany’s new no-nonsense foreign minister, Annalena Baerbock, has put blocking Nord Stream 2 and financial sanctions back on the table. </span><strong data-dcnode-id="1432"><u data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">There is still some way to go before European powers fully face reality. Deploying NATO forces, including a significant French presence, permanently to Eastern Europe is one step. Reinforcing infrastructure to ensure they can arrive on time from as far away as Britain is another. </span></u></strong><span data-dcnode-id="1431" instrument_node="">Systematic financial sanctions on Russian economic and financial activity would show resolve, as would large-scale economic support and weapons supplies so Ukraine can defend itself. Finally, the EU and Britain need to rapidly reduce their energy dependence on Russia and carry out a comprehensive crackdown on money laundering and influence operations. </span><strong data-dcnode-id="1428"><u data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">This is what fully abandoning those post-Cold War illusions would involve: realizing that the best way to avert war with Putin’s Russia is to confront the Kremlin by all other means. </span></u></strong><span data-dcnode-id="1427" instrument_node="">These changes may come too late to deter Putin from invading Ukraine, but they make an invasion considerably more costly and limit his room for maneuver. </span><strong data-dcnode-id="1422"><u data-dcnode-id="1423"><span data-dcnode-id="1426" instrument_node="">More than 30 years after the end of the first Cold War, European powers and the United States may finally be recognizing that a second one cannot be avoided.</span><br data-dcnode-id="1425"><span data-dcnode-id="1424" instrument_node="">
</span></u></strong></p><span data-dcnode-id="1420" instrument_node="">
</span><h4 data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">US-Turkey-NATO relationship is zero-sum: Losing Turkey means they go to Russia</span></h4><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1416" instrument_node="">Dr. Dania Koleilat Kh</span><strong data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">atib is </span></strong><span data-dcnode-id="1413" instrument_node="">a specialist in US-Arab relations with a focus on lobbying. She is co-founder of the Research Center for Cooperation and Peace Building, a Lebanese nongovernmental organization focused on Track II</span><strong data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">, 1-30, </span></strong><span data-dcnode-id="1410" instrument_node="">22, Can Turkey turn a crisis into an opportunity?, https://www.arabnews.com/node/2014996</span></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1383"><span data-dcnode-id="1407" instrument_node="">Meanwhile US President Joe Biden has made it clear that there will be no military intervention in Ukraine, and that any response will be limited to economic sanctions. The role of Turkey is therefore of prime importance. </span><strong data-dcnode-id="1404"><u data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Turkey has already sent drones to Kyiv</span></u></strong><span data-dcnode-id="1403" instrument_node="">, upsetting Vladimir Putin, which the US would want to encourage. </span><strong data-dcnode-id="1400"><u data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Turkey has been swinging between the camps, and the US would definitely not want it to strengthen ties with Moscow. </span></u></strong><span data-dcnode-id="1399" instrument_node="">Again, Turkey can find a sweet spot where it can have leverage with the US. The relationship has been mainly transactional, and based on mutual blackmail. Will Turkey put pressure on the US to halt, or at least reduce, its support for Kurdish forces in Syria? That is a tricky issue for the US. It cannot withdraw support while Daesh appears to be re-emerging and gaining momentum in previously liberated areas. Turkey may also try to reopen the issue of the S-400 missile defense system and the F-35 fighter jet program. As for NATO, the Turks’ main bone of contention was the alliance’s removal of Patriot missiles in 2015. As my Turkish friend told me: “What about common defense and Article 5? Isn’t that the raison d’etre of NATO? But they remove the defenses when we need them the most.” At the heart of NATO, Turkey has been having quarrels with France and Greece. With the Ukraine crisis, NATO needs to show unity more than ever. </span><strong data-dcnode-id="1396"><u data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Will Turkey</span></u></strong><span data-dcnode-id="1395" instrument_node=""> use it to repair relations with those two countries, or will it </span><strong data-dcnode-id="1392"><u data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">turn its back on the 70-year-old alliance and resume business as usual with Russia? </span></u></strong><span data-dcnode-id="1391" instrument_node="">Though Turkey is lying low, avoiding any blunt statements and trying to keep the balance between the West and Russia, the current situation offers Erdogan an excellent opportunity to mend his relations with the West. However, </span><strong data-dcnode-id="1388"><u data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">it is a zero-sum game; better relations with NATO</span></u></strong><span data-dcnode-id="1387" instrument_node="">, the EU and </span><strong data-dcnode-id="1384"><u data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">the US will mean worse relations with Russia. We still have to see how Erdogan will play his cards.</span></u></strong></p><span data-dcnode-id="1382" instrument_node="">
</span><h4 data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">All of their evidence is old, Turkey is a strong NATO member</span></h4><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Sean Matthews, 1-28, 2022, Middle East Eye, Turkey was Nato’s wayward member, then came the crisis in Ukraine, https://www.middleeasteye.net/news/turkey-nato-wayward-member-then-ukraine-crisis-happened</span></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1333"><strong data-dcnode-id="1373"><u data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Nato has for years been plagued by tensions between Turkey and fellow member states, but with the looming threat of a Russian invasion of Ukraine, Ankara has recently found greater cohesion with its alliance partners</span></u></strong><span data-dcnode-id="1372" instrument_node="">. Turkish President Recep Tayyip </span><strong data-dcnode-id="1369"><u data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Erdogan said on Wednesday there “should be no doubt” about his country honouring “its commitments as a Nato ally”.</span></u></strong><span data-dcnode-id="1368" instrument_node=""> Like other countries in the region, Turkey has been watching the crisis along its Black Sea neighbour’s borders carefully. Last week </span><strong data-dcnode-id="1365"><u data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">Erdogan tried to dissuade Russia from launching an invasion, stating: “Ukraine is not an ordinary country. Ukraine is a strong country.”</span></u></strong><span data-dcnode-id="1364" instrument_node=""> He offered to moderate between Kiev and Moscow and plans to visit Ukraine on 3 Febuary. </span><strong data-dcnode-id="1360"><em data-dcnode-id="1361"><u data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">‘You can see some elements of tension between countries in Europe [over Ukraine], but Turkey hasn’t been one of those actors’ </span></u></em></strong><span data-dcnode-id="1359" instrument_node="">– European Nato official</span><strong data-dcnode-id="1355"><span data-dcnode-id="1358" instrument_node=""> </span><u data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">“Turkey is showing itself to be a credible and important ally [during this crisis],” a European Nato official told Middle East Eye on condition of anonymity when discussing the sensitive topic</span></u></strong><span data-dcnode-id="1354" instrument_node="">. Critics have long argued that, under Erdogan, the country with the second-largest army in Nato was drifting away, perhaps irrevocably, from the alliance. Turkey was censured in the West for launching its own invasions into Syria. It clashed openly with Nato allies Greece and France in the Eastern Mediterranean, and has drawn criticism for a crackdown on dissent at home. The fallout was exacerbated by Erdogan’s overtures to Russian President Vladimir Putin and the purchase of Russia’s S-400 missile system. That move triggered Turkey’s ejection from the US flagship F-35 fighter jet programme and the subsequent imposition of sanctions by Washington. “Sanctions are imposed on our country, a Nato member,” Erdogan bemoaned last year following the announcement. “What kind of an alliance is this?” Hardcore Nato business Beneath the simmering feuds, </span><strong data-dcnode-id="1351"><u data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Ankara, in large part driven by its own security concerns, has emerged as a key backer of the pro-West government in Kiev.</span></u></strong><span data-dcnode-id="1350" instrument_node=""> Erdogan has met his Ukrainian counterpart, Volodymyr Zelensky, at least five times since 2019. Zelensky has met no other leader as frequently. Erdogan has also committed publicly to Ukraine’s territorial integrity and resisted Russian appeals to recognise the annexation of Crimea. “</span><strong data-dcnode-id="1347"><u data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">The Turks haven’t backed off on their unwavering support for Ukraine, even though it’s clear Russia hasn’t been happy with </span></u></strong><span data-dcnode-id="1346" instrument_node="">that,” Stephen Flanagan, a senior political scientist with Rand, told MEE. “If anything, they have been among those countries most supportive.” In 2019, to the fury of Russia, Turkey began selling armed drones to Ukraine. The country subsequently deployed them in a precision strike against Russian-backed separatists in October. Plans to build a factory to produce the Bayraktar TB2 drones in Ukraine are underway. As Russian troops, now estimated at around 120,000, continue to mount near Ukraine’s border, more Nato members have increased military assistance. Estonia is sending Javelin anti-tank missiles, and fellow Baltic countries Latvia and Lithuania are providing Stinger anti-aircraft missiles. Russia is our enemy too, say Muslim fighters readying for war in Ukraine Read More » The Biden administration released an additional $200m in security assistance for Ukraine last week, and Washington’s military aid has been augmented by a UK airlift of more than 2,000 short-range anti-tank missiles to the country. James Jeffrey, a former US ambassador to Turkey currently with the Wilson Center think-tank in Washington DC, said the White House was working quietly with Turkey at both bilateral and Nato levels. “Both Washington and Nato recognise the key role Turkey has been playing in the Ukraine crisis but fear of a sudden Erdogan ‘flip’ limits public acknowledgement,” he said. So far the greatest challenge to Nato’s efforts to show a united front appear to be coming from the West, not the East. President Emmanuel Macron of France, who has sparred repeatedly with Erdogan, was set to hold a call with Russian leader Vladimir Putin on Friday. His remarks about Europe charting a separate policy on Russia have unsettled Nato members close to Ukraine. At the same time, Germany has been criticised for not staking out a clear position on the Nord Stream 2 pipeline, which would transport Russian gas to Europe and bypass Ukraine. It has also broken with other Nato members by refusing to export lethal weapons to Kiev. “You can see some elements of tension between countries in Europe [over Ukraine], but Turkey hasn’t been one of those actors,” the Nato official said. </span><strong data-dcnode-id="1343"><u data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">“[While] it doesn’t shy away from publicly presenting differences it might have with alliance members, when it comes to the hardcore part of Nato business, Turkey has not been a stumbling block</span></u></strong><span data-dcnode-id="1342" instrument_node="">,” the official added. Russian lake Turkey and Russia are on opposing sides in conflicts in Syria and Libya, yet they have formed an uneasy partnership to manage their differences. </span><strong data-dcnode-id="1339"><u data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">“Turkey is in this balancing act between Russia and the West</span></u></strong><span data-dcnode-id="1338" instrument_node="">,” Rand’s Flanagan said. </span><strong data-dcnode-id="1335"><u data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">One area where Turkey has watched Russia with particular wariness is in the Black Sea, where Moscow has emerged as the dominant power following its annexation of Crimea. </span></u></strong><span data-dcnode-id="1334" instrument_node="">Russia’s Black Sea naval fleet, stationed on the peninsula, has ballooned in recent years. It includes submarines and warships with Kalibr cruise missiles capable of hitting targets 2,400km (1,500 miles) away, and state-of-the-art intelligence-gathering ships. The militarisation of Crimea has had a deep impact on Ankara’s strategic thinking towards Nato. “Before 2014 Turkey would say ‘we don’t need Nato here. We can take care of it’,” Mamuka Tsereteli, a scholar with the Middle East Institute’s Frontier Europe Initiative, told MEE. “Now they are more willing to allow a greater Nato presence in the Black Sea than at any other time in decades,” he said. Ukraine conflict: Why it really matters to Turkey In 2016, Erdogan gave a speech in which he warned the Black Sea was becoming a “Russian lake” and cautioned, “if we do not take action, history will not forgive us”. Turkey has also positioned itself as a staunch advocate of both Ukraine and Georgia’s admission into Nato. It is also a participant in naval exercises with fellow Black Sea Nato countries including Romania and Bulgaria. Still, with the prospect of war rising in recent weeks, Erdogan has measured some of his rhetoric. In an interview on Wednsday he called for dialogue “that will listen to Russia and eliminate their reasonable security concerns”. The Turkish leader’s offer to serve as a mediator also suggests he is eager to tap into the relationship he has developed with Putin and perhaps strike a more neutral tone. “We work closely with the US within Nato,” a Turkish official told MEE. But the country’s ventures into overseas hotspots also mean it is constantly rubbing up against Russia, and treads carefully. “Turkey puts a premium on talking with Russia,” the Nato official said. There are limits to how far cohesion on Ukraine has gone, and stumbling blocks in Turkey’s relationship with the West persist. Despite its muscular support for Kiev, there is scant evidence Ankara is willing to back down on one of its most contentious moves: the S-400 purchase. “Turkey fulfills all of its obligations as a Nato member, but by the narrow confines of [the Nato treaty] it can do a lot in terms of its own defence and national policy,” the official said. “Turkey looks at its role differently.”</span></p><span data-dcnode-id="1332" instrument_node="">
</span><h4 data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Ukraine invasion results in a supply chain crisis and a food crisis</span></h4><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1328" instrument_node="">Washigton Post, 1-27, 22, Wasshgton Post, </span><a data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msn.com/en-us/news/world/an-invasion-of-ukraine-could-drive-up-global-food-prices-and-spark-unrest-far-from-the-front-lines/ar-AATdZZs"><span data-dcnode-id="1327" instrument_node="">https://www.msn.com/en-us/news/world/an-invasion-of-ukraine-could-drive-up-global-food-prices-and-spark-unrest-far-from-the-front-lines/ar-AATdZZs</span></a><span data-dcnode-id="1325" instrument_node="">, An invasion of Ukraine could drive up global food prices and spark unrest far from the front lines</span></p><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1277"><span data-dcnode-id="1322" instrument_node="">More than 100,000 Russian troops are massed near Ukraine amid a flurry of diplomatic efforts to defuse the prospect of conflict. Should peace not prevail, western-gazing Ukrainians would pay the highest price. But in a worst-case scenario, the cost of a major Russian invasion of Ukraine — one of the world’s largest grain exporters — could ripple across the globe, driving up already surging food prices and increasing the risk of social unrest well beyond Eastern Europe. As tensions mount, one focus of economic concern is the global impact of extreme sanctions on Russia, a major exporter of agricultural goods, metals and fuel, particularly to Western Europe and China. </span><strong data-dcnode-id="1319"><u data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Should the crisis escalate to the point of triggering staggering sanctions, the blow could spike prices and worsen global supply chain woes by tightening markets for commodities including natural gas and metals such as nickel, copper and platinum used in the manufacturing of everything from cars to spacecraft. </span></u></strong><span data-dcnode-id="1318" instrument_node="">Yet perhaps just as crucially</span><strong data-dcnode-id="1315"><u data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">, a major Russian incursion would also affect the flow of goods from Ukraine, the world’s fourth-largest supplier of wheat and corn. A major disruption of Ukrainian exports — especially in conjunction with any interruption in even larger Russian grain exports — could pile onto a global inflationary cycle that in many countries is already the worst in decades</span></u></strong><span data-dcnode-id="1314" instrument_node="">. Concern is especially focused on fuel and food. Last year, global food prices surged 28 percent to their highest level in a decade, according to the United Nations food agency. Worries of war have already driven corn futures to their highest levels since June and sent wheat futures to two-month highs before a recent easing. </span><strong data-dcnode-id="1311"><u data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Over the past 20 years, bountiful Ukrainian harvests boosted the country’s role as a global breadbasket</span></u></strong><span data-dcnode-id="1310" instrument_node="">. </span><strong data-dcnode-id="1307"><u data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Some of its biggest clients are economically battered, war-torn or otherwise fragile states in the Middle East and Africa, including Yemen, Lebanon and Libya, where grain shortages or cost surges could not only deepen misery but churn up unpredictable social consequences</span></u></strong><span data-dcnode-id="1306" instrument_node="">. Andrey Sizov, head of Russia-based consultancy SovEcon, told me this week that he still sees the risk of </span><strong data-dcnode-id="1303"><u data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">a Russian invasion</span></u></strong><span data-dcnode-id="1302" instrument_node=""> as low. But </span><strong data-dcnode-id="1299"><u data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">should one happen, and exports are deeply disrupted, “that would mean big problems for all large food importers, especially in northern Africa, Iran, Sudan, Afghanistan and Egypt.” He added, “The risk in all those countries of social unrest increases under this scenario</span></u></strong><span data-dcnode-id="1298" instrument_node="">.” Alex Smith, an agriculture analyst at the Breakthrough Institute, wrote in Foreign Policy that threats to Ukraine’s wheat exports pose the greatest risk to global food security. Its customers include China and the European Union, “but the developing world is where Ukrainian wheat has become an essential import,” he wrote. U.S. and Russia still far apart on Ukraine Smith noted that in 2020, half of all wheat consumed in </span><strong data-dcnode-id="1295"><u data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Lebanon — a country critically dependent on bread as a staple and slammed by a crippling economic crisis — came from Ukraine. Yemen and Libya respectively import 22 percent and 43 percent of their total wheat consumption from Ukraine. In 2020, Ukraine also supplied more than 20 percent of wheat consumption in Malaysia, Indonesia and Bangladesh. </span></u></strong><span data-dcnode-id="1294" instrument_node="">For Egypt, a major Ukrainian buyer of wheat and a nation where rising food prices sparked massive street riots in 1977, sourcing challenges and price hikes would come just as the government is now seeking to roll back all-important bread subsidies. “Of the 14 countries that rely on Ukrainian imports for more than 10 percent of their wheat consumption, a significant number already face food insecurity from ongoing political instability or outright violence,” Smith wrote. It is worth noting that fears of similar disruptions also ran high during Russia’s covert, and later overt, aggression against Ukraine nearly a decade ago that resulted in the annexation of Crimea and the occupation by Russia-backed separatists of the eastern Donbas region. Fears then, Sizov told me, turned out to be overblown, with markets recovering rapidly. That was true in large part because of the limited nature of the Russian incursion. </span><strong data-dcnode-id="1291"><u data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">A full-on invasion</span></u></strong><span data-dcnode-id="1290" instrument_node="">, however</span><strong data-dcnode-id="1287"><u data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">, could be different, with the geography of Ukrainian agricultural production placing the disruption risk especially high</span></u></strong><span data-dcnode-id="1286" instrument_node="">. A large part of Ukraine’s wheat, Smith notes, is grown in Kharkiv, Dnipropetrovsk, Zaporizhia and Kherson oblasts, or regions located just beyond the parts of eastern Ukraine that are already largely under the control of Russian-backed separatists. That puts them in the early path of a Russian march to the west. Smith wrote that </span><strong data-dcnode-id="1283"><u data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">if an attack on Ukraine turns into “a Russian land grab,” then wheat production could plummet amid farmers fleeing and the destruction of infrastructure.</span></u></strong><span data-dcnode-id="1282" instrument_node=""> </span><strong data-dcnode-id="1279"><u data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">He added, “Whoever controls the land will ultimately extract its riches, but if conditions in the Russian-controlled eastern parts of Ukraine are any guide, instability and paralysis may lie over the region and seriously impact production far beyond the initial invasion.” </span></u></strong><span data-dcnode-id="1278" instrument_node="">In 2020, Ukraine exported more than 8 million tons of corn to China, accounting for just over a quarter of Ukraine’s total corn exports that year, according to the United States Department of Agriculture. Given the agricultural cycle, a significant chunk of Ukraine’s seasonal corn exports — much of it purchased by China — has already shipped. But Peter Meyer, head of grains analysis at S&amp;P Global Platts, told me there’s word on the street that the Chinese have been quietly shopping around for U.S. corn in the event the Ukrainians can’t make good on deliveries later this year. A short-term concern, Meyer said, is whether Russia would try to put a “stranglehold” on Ukraine’s economy by blockading Black Sea exports. Longer term, images of “Ukrainian housewives buying guns” and questions over whether farmers might abandoned their fields to “fight,” have also sowed doubts over Ukraine’s 2022 corn crop, which, Meyer said, “needs to be planted in the next few months.” The impact on global consumers could be far worse should the Russians seek to take steps — including higher export tariffs — to corral their own wheat production to ensure food security during any prospective war.</span></p><span data-dcnode-id="1276" instrument_node="">
</span><h4 data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Turkey supports deterrence against Russia now</span></h4><span data-dcnode-id="1273" instrument_node="">
</span><h4 data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Turkey supporting NATO on the Ukraine</span></h4><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">CNN, 1-27, 22, Turkish president to meet with Putin, offers to mediate talks between Ukraine and Russia, https://www.cnn.com/europe/live-news/ukraine-russia-news-01-27-22/index.html</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1266" instrument_node="">Russian President Vladimir Putin will visit Turkey for annual talks with Turkish President Recep Tayyip Erdoğan, Kremlin spokesman Dmitry Peskov told reporters on Thursday. “President Putin gratefully accepted this invitation,” Peskov said. “They agreed that as soon as there is a resolution on a) the epidemiological situation and b) schedules, he will definitely take advantage of this invitation.” No date has been arranged yet, but Turkish Foreign Minister Mevlüt Çavuşoğlu told reporters Thursday he had been informed by the Kremlin it will be after Putin returns from the Beijing Olympic Games, which begin Feb. 4. Speaking in a TV interview broadcast live on Turkish news channel NTV Wednesday, Erdoğan invited Putin for a summit as part of Turkey’s High Level Strategic Cooperation Council Mechanisms, which it shares with both Russia and Ukraine. </span><strong data-dcnode-id="1263"><u data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Erdoğan also offered to mediate talks between Russia and Ukraine</span></u></strong><span data-dcnode-id="1262" instrument_node=""> as global efforts continue to de-escalate tensions. “</span><strong data-dcnode-id="1259"><u data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">We want the current tension between Russia and Ukraine to be resolved before it turns into a new crisis</span></u></strong><span data-dcnode-id="1258" instrument_node="">,” he told NTV. “I repeat that we are ready to give support as much as we can. I told this to Putin and [Ukrainian President Volodymyr] Zelensky and I will keep telling them that. We want peace and stability in our region,” he said. “If they wish, we can bring the two leaders together in our country and pave the way for the re-establishment of the peace environment,” he added. </span><strong data-dcnode-id="1253"><u data-dcnode-id="1254"><span data-dcnode-id="1257" instrument_node="">Erdoğan warned that “war between two countries” will cause harm to the region and reaffirmed Turkey – a NATO member – will continue to support Ukraine’s territorial integrity. </span><em data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">“It is our greatest wish that the efforts of NATO on this issue will be successful</span></em></u></strong><span data-dcnode-id="1252" instrument_node="">. Our country has supported Ukraine’s territorial integrity and sovereignty from the very beginning,” he said. “We had a clear stance against Russia when it targets Ukraine’s territorial integrity such as Crimea annexation. Our attitude is not going to change. I hope that Russia will not conduct an armed attack or occupation of Ukraine. This is not rational for Russia and [the] region,” Erdoğan continued.</span></p><span data-dcnode-id="1250" instrument_node="">
</span><h4 data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Turkey’s NATO membership on desirable, no strong Russia ties</span></h4><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Benjamin Brimelow, 1-24, 2022, Business Insider, How NATO’s most troublesome member became frenemies with Russia, and why it might not last, https://www.businessinsider.com/turkey-growing-ties-with-russia-have-caused-problem-for-nato-2022-1</span></p><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1243" instrument_node="">Turkey’s improving ties with Russia has been a headache for NATO amid the alliance’s tensions with Moscow. Relations between Ankara and Moscow have warmed because of changing regional dynamics, including mutual frustrations with Europe. But there are still fault lines in their relationship, and the embrace could quickly become a confrontation. Of the 30 countries in NATO, none have caused the alliance more recent headaches than Turkey. </span><strong data-dcnode-id="1237"><u data-dcnode-id="1238"><span data-dcnode-id="1242" instrument_node="">Turkey has NATO’s second-largest standing army and is centrally located in a strategically significant region, which makes it an i</span><em data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">ndispensable ally.</span></em><span data-dcnode-id="1239" instrument_node=""> Turkey has</span></u></strong><span data-dcnode-id="1236" instrument_node=""> also </span><strong data-dcnode-id="1233"><u data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">shown a willingness to confront Russia, a longstanding rival, and continues to support NATO interests and missions in the region and around the world</span></u></strong><span data-dcnode-id="1232" instrument_node="">. But Ankara’s warming relationship with Moscow has complicated things for the alliance. The current state of relations between Turkey and Russia is the product of changing dynamics and shifting priorities after the Cold War and of changes to the balance of power in the region over the last decade. Their relationship is unlikely to bloom into an alliance of its own, but their apparent closeness and its effect on NATO’s interests has vexed policymakers and analysts alike. Historically, Russo-Turkish relations have been troubled, as evidenced by the fact that they fought over a dozen wars between the 16th and 20th centuries. There was some limited cooperation early in the 20th century, but after post-World War II disputes led to Turkey’s accession to NATO in 1952 (alongside Greece) Ankara and Moscow were firmly on opposing sides on most issues — Turkey even agreed to host US nuclear weapons, dozens of which are still based there. As the Cold War ended, however, their relationship thawed. In 1987, Turkey began importing Soviet gas, and Russia eventually became Turkey’s primary energy supplier. Russo-Turkish economic ties also grew after the dissolution of the Soviet Union. Russia, less of a military threat than the USSR, became Turkey’s second-largest trading partner (after the EU) in 2008. In 2010 they signed a visa-free travel agreement. The relationship between Turkish President Recep Tayyip Erdoğan and Russian President Vladimir Putin has facilitated closer cooperation. Those ties have only gotten closer as Erdoğan has become more autocratic, especially after a failed coup in 2016. A ‘balancing act’ Turkish President Recep Tayyip Erdogan at NATO Turkey’s purchase of Russia’s advanced S-400 air-defense missile system, its invasion of northern Syria and operations against Kurds there, and Erdoğan’s continued suppression of dissent have prompted many Western countries to apply sanctions and reduce their cooperation with Ankara. That Western backlash, combined with Turkish resentment over perceived double standards, tensions with European countries over issues like Cyprus and migration, and Turkey’s stalled bid to join the EU, has led Turkey look toward Russia even more. Consequently, Turkey has shifted away from being a largely reliable partner for Western countries and now carefully balances between the West and Russia. But </span><strong data-dcnode-id="1229"><u data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Turkey is by no means totally comfortable with Russia’s recent actions and ambitions.</span></u></strong><span data-dcnode-id="1228" instrument_node=""> </span><strong data-dcnode-id="1225"><u data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Moscow’s ongoing military modernization, its annexation of Crimea in 2014 and intervention in Syria in 2015, and its growing influence in the Black Sea and the Caucasus have all increased Turkish anxiety about its larger neighbor. </span></u></strong><span data-dcnode-id="1224" instrument_node="">“Turkey is trying to continue this balancing act that is driven by the fact that they fundamentally do not trust the Russians, but they are also unsure about Western support,” Stephen Flanagan, a senior political scientist at the RAND corporation, told Insider. Clashes and confrontations Russia Turkey troops soldiers patrol in Syria That lack of trust is underlined by multiple deadly clashes between the Turkish and Russian militaries, particularly in Syria, where the fundamental differences between Ankara’s and Moscow’s ambitions are on display. US officials have said that they believe “dozens” of Turkish soldiers have been killed by Russian military operations in Syria. Turkey has also shot down a Russian jet there and launched operations directly against Moscow’s Syrian allies. Turkey has also clashed with Russia’s proxies in Libya. </span><strong data-dcnode-id="1221"><u data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">Turkey has provided military support to nearby countries that have clashed with Russia or Russia’s allies, including helping build up the navies of Russia’s Caspian Sea neighbors. </span></u></strong><span data-dcnode-id="1220" instrument_node="">Ankara has also built a close relationship with Ukraine since 2014, selling Ukraine armed drones that Kyiv has already used on the frontlines and helping rebuild the Ukrainian navy. Ankara has even openly advocated full NATO membership for Ukraine and Georgia, which many alliance members have resisted or argued against. While Turkey’s purchase of Russia’s S-400 is a sign of closer cooperation, its ongoing military modernization efforts are largely a response to Russia’s own increased military capabilities. Ankara has also never sworn off its Western military partnerships. Although the US kicked it out of the F-35 program over the S-400, Turkey recently asked the US to sell it 40 new F-16s and 80 modernization kits for its current fleet. The Russo-Turkish relationship “is on a knife’s edge on any given day,” Flanagan said. “Turkey is still very much anxious to protect its own interests in the broader region and still very worried of the Russians.” Risks in the future Russia Turkey troops patrol in Syria Despite its concerns, Turkey continues to have extensive engagement with Russia. Russia is building several nuclear reactors for Turkey, and Erdogan has refused to rule out purchasing more Russian military equipment. That ongoing cooperation is in part a reflection of Ankara’s acceptance of geopolitical reality. “The Turks, at some level, have no choice but to have a somewhat cooperative relationship with Russia given that Russia controls the endgame in Syria” and has increased its strength in the Black Sea, Flanagan said. While Turkey supports an increased NATO presence in the Black Sea to counter Russia, it also does not want to provoke a crisis. Ankara “would like to lead efforts to support whatever NATO is doing to deter further Russian aggression in the Black Sea region, but they don’t want to over-militarize the region,” Flanagan said. “What they don’t want is overly zealous US deployments that provoke a crisis that then leads to the [Turkish] Straits being somehow closed or see major fighting along its territorial waters.” </span><strong data-dcnode-id="1217"><u data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Russia and Turkey’s relations seem destined to hover between rivalry and partnership, but their competing interests in the Black Sea, the Middle East, and North Africa give that relationship the potential to become confrontational quickly. </span></u></strong><span data-dcnode-id="1216" instrument_node="">“It remains kind of volatile,” Flanagan said. “Either side could miscalculate.”</span></p><span data-dcnode-id="1214" instrument_node="">
</span><h4 data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Turkey no longer has a security relationship with Russia, working as a NATO member</span></h4><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Giorgio Cafiero, 1-22, 2022, Turkey’s perspective on the crisis in Ukraine, https://english.alaraby.co.uk/analysis/turkeys-perspective-crisis-ukraine</span></p><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1207" instrument_node="">The situation in Ukraine has led to global fears about the possibility of a large-scale military conflict on the European continent. Turkey, which has strongly backed Kyiv, has high stakes in the outcome of Ukraine’s crisis. </span><strong data-dcnode-id="1204"><u data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">As a NATO member that shares the Black Sea with Ukraine, Turkey is backing Kyiv in various ways that are significant. </span></u></strong><span data-dcnode-id="1203" instrument_node="">Yet Turkish support for Ukraine comes with logical limits. Considering efforts by President Recep Tayyip Erdogan’s government to continue cooperating with Russia in numerous areas while avoiding a major confrontation with Moscow, Ankara will only go so far in terms of putting itself at risk vis-à-vis the standoff in Ukraine. Mindful of Turkey’s current economic problems</span><strong data-dcnode-id="1200"><u data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">, Ankara is</span></u></strong><span data-dcnode-id="1199" instrument_node=""> </span><strong data-dcnode-id="1196"><u data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">particularly determined to avoid sliding into a conflict with Russia. This is not to say, however, that Turkey won’t want to continue supporting Ukraine in ways aimed at strengthening the eastern European country’s position against Moscow</span></u></strong><span data-dcnode-id="1195" instrument_node="">. Despite major growth in Turkish-Russian cooperation in energy, tourism, and other sectors in recent years, </span><strong data-dcnode-id="1192"><u data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Ankara finds itself unsettled by much about Russia’s foreign policy</span></u></strong><span data-dcnode-id="1191" instrument_node="">. From Russia’s support to the Syrian government and Libya’s General Khalifa Haftar to Moscow’s actions vis-à-vis Ukraine, the Kremlin has spent years advancing agendas that conflict with Ankara’s interests. “</span><strong data-dcnode-id="1188"><u data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Since 2014, Turkey’s leadership has strongly opposed Russia’s annexation of Crimea and voiced support for the Ukrainian state’s territorial integrity, social cohesion, and national sovereignty”</span></u></strong><span data-dcnode-id="1187" instrument_node=""> “Russia is increasingly acting as a revisionist and resurgent power in Europe and elsewhere, which disturbs Turkey,” said Serhat S. Çubukçuoğlu, a senior researcher in geopolitics and a doctoral candidate in International Affairs at Johns Hopkins SAIS in Washington, DC, in an interview with The New Arab. “Turkey and Russia have developed close ties after the 2016 failed coup attempt, but Russia is acting more aggressively in the region and that creates anxiety in Ankara.” Turkey’s interests in Ukraine Since 2014, Turkey’s leadership has strongly opposed Russia’s annexation of Crimea and voiced support for the Ukrainian state’s territorial integrity, social cohesion, and national sovereignty. Ankara’s interests in standing by Ukraine and condemning Russia’s actions in relation to Crimea and Donbas stem from geopolitical and security concerns, plus many cultural and historic factors too. Aside from strong diplomatic, rhetorical, and moral support, </span><strong data-dcnode-id="1184"><u data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Turkish support for Ukraine has been most significant in the sphere of defence. In the Ukrainian military’s armed conflict with separatists in Donbas, the Bayraktar TB2 drones which Ankara has sold Kyiv have been making a difference. The Turks have also built corvettes for the Ukrainian Navy’s Black Sea fleet and there has been engine technology cooperation. </span></u></strong><span data-dcnode-id="1183" instrument_node="">Turkey worries about Russia’s actions in relation to Ukraine for various reasons that have motivated Ankara to provide Kyiv with such support. A primary concern for the Turks, which other NATO members share, “was based on the assumption that [Russia’s actions vis-à-vis Crimea and Donbas] would create a new balance of power in the region and beyond, by disrupting the international order which was created after the Cold War,” Dr Valeria Giannotta, a Turkey-based Italian academic and expert, told TNA. “Those occupied lands are of great importance for Turkey both from a historical and symbolic point of view,” she explained. “The legacy of the Crimean War and the strong link with the Crimean Tatar community plays a discriminant role in Ankara’s support to Ukraine to the extent that Turkey has been warming [up to] the [idea of] Ukrainian membership in NATO. Hence, many cooperation defence agreements, along several bilateral visits, regular diplomatic contacts, and other contracts have been signed between Ankara and Kyiv.” By the same token, Turkey’s defence partnership with Ukraine unsettles Moscow. “Altogether Turkey and Ukraine have a developing defence partnership that adds to the anxiety in Moscow [with] the NATO alliance getting closer to Russia’s soft underbelly and prompting [Russia to seek] ways to counter that perceived threat from the south and the west,” Çubukçuoğlu told TNA. Last year, Russia’s Foreign Minister Sergey Lavrov said that Ankara’s support for Kyiv’s ambitions of retaking control of Crimea constitutes an “encroachment on Russia’s territorial integrity” which has been “feeding Kyiv’s militaristic sentiment”. Turkey’s perspective on the crisis in Ukraine Turkey’s defence partnership with Ukraine unsettles Moscow. [Getty] Balancing the West and the East It is simply not possible to examine Ankara’s position in relation to the Ukrainian crisis without seeing Turkey as a NATO member. “Turkish actions regarding concrete support to Ukraine should be expected in accordance and in coordination with NATO,” explained Dr Murat Aslan, a researcher at the SETA Foundation and a faculty member at Istanbul Sabahattin Zaim University, in an interview with TNA. “It must be more than a single country. It should cover an overall alliance just to stop Russian advances…towards Europe.” Within this context, </span><strong data-dcnode-id="1180"><u data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">the Ukrainian crisis has helped Turkey improve relations with the US and other NATO allies.</span></u></strong><span data-dcnode-id="1179" instrument_node=""> Considering several issues that have caused tension between Ankara and its traditional allies – including the S-400 missile defence spat, Western governments’ sponsorship of the Peoples’ Protection Units (YPG) in Syria, Turkey’s domestic affairs, etc. – Turkey benefits from the fact that the situation in Ukraine is showing how useful Ankara is as an ally of the US and other member-countries in the alliance. The EastMed Pipeline project is a case in point. Although Washington was never involved in this pipeline connecting Israel, Cyprus, and Greece, the Trump administration backed it. Now the Biden administration has told Tel Aviv and Athens that Washington ceases to support this multibillion-dollar project, which was meant to counter Ankara’s position in the eastern Mediterranean while making Europe less dependent on Russian gas. </span><strong data-dcnode-id="1176"><u data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">“Turkey and Russia have developed close ties after the 2016 failed coup attempt, but Russia is acting more aggressively in the region and that creates anxiety in Ankara” </span></u></strong><span data-dcnode-id="1175" instrument_node="">Various analysts largely attribute this decision on the Biden administration’s part to the White House’s desire to improve ties with Turkey because of the tense situation in Ukraine. But there are many real limits to how closely Turkey wants to align with its NATO allies against Russia. “Turkey is treading a fine line of balance between NATO and Moscow,” Çubukçuoğlu told TNA. Experts seem to agree that Turkey will probably continue selling more armed UAVs to Kyiv. But Turkish support will stop short of any level that could subject Ankara to serious risks of a direct conflict with Russia. “Erdogan cannot afford another fallout with Putin,” explained Çubukçuoğlu. “Thinking of examples in the past – from the downing of the Russian Su-24M in 2015 to the airstrike in Idlib, Syria that killed 34 Turkish soldiers in 2020 – Ankara can’t afford another crisis like that. Turkey’s interests lay in a stable, secure, and cooperative environment in the Black Sea. But it doesn’t have power to alter the facts on the ground,” he said. “Expected gains from a military intervention on behalf of Kyiv are minuscule compared to the collateral damage that Russia would inflict on Turkey if hostilities break out into an armed conflict. Anyhow, Turkey is not obliged under binding treaty articles to assist Ukraine in any [Russian invasion] – neither is NATO.” Trade is also an important factor. Bilateral trade between Turkey and Russia sits around $30 billion with the balance very much in the latter’s favour. As the Turks grapple with very serious economic problems, there is a huge interest in keeping Russian tourists coming to their country each year and keeping the flow of Russian gas into Turkey. Indeed, any interruption to the energy relationship between these two countries could make Turkey suffer severely. “Turkey would be on the receiving end of damages in the event of a major fallout with Russia,” emphasised Çubukçuoğlu. “Almost a third of Turkish gas imports are sourced from Russia, and of course there’s the potential use of energy as a weapon as we saw in Europe as a risk premium on Turkey’s economic outlook. Turkey’s going through dire straits in terms of its economy.” At the end of the day, Turkey will approach the crisis in Ukraine in a way that is highly pragmatic. Ankara’s strategies for standing against Moscow in relation to Ukraine will be cautious and mindful of the various ways in which Russia has leverage over Turkey. When it comes to Crimea, Donbas, and other sensitive international files concerning Moscow, Erdogan’s government will probably continue playing eastern and western powers off each other to Ankara’s own advantage. Ukraine has unquestionably complicated this strategy, which aims to assert Turkey as an increasingly independent country that can rely on the NATO alliance to push back against Russia’s foreign policy agenda while also preventing Ankara from becoming too dependent on North American and European powers. “Erdogan cannot afford another fallout with Putin” Can Turkey be key to a diplomatic breakthrough? An optimistic view of Turkey’s foreign policy suggests that Ankara’s unique position vis-à-vis Kyiv and Moscow could enable Turkey to help deescalate the Ukrainian crisis. Although Russia has previously rejected the idea of permitting Turkey to mediate in the conflict because of its NATO membership, this month Kremlin spokesman Dmitry Peskov spoke to the media about Ankara’s proposals for cooling the tensions in Ukraine. Peskov said, “If our Turkish partners are able to influence Kyiv and the implementation of the earlier reached agreements, this could only be welcomed.” The Turkish head of state recently stated that he has plans to go to Ukraine next month and hopefully bring Russia and Ukraine’s leaders together for talks. “A psychology of war in the region upsets us, as a country that has ties with both sides,” explained President Erdogan at a press conference in Ankara. “Our wish is to bring Mr Putin and Mr Zelenskiy together as soon as possible.” It would behove both NATO and Russia to welcome Ankara’s efforts to move the sides toward reaching a middle ground that averts further escalation. Yet time will tell whether Turkey’s diplomatic energy can help bring about this outcome, which would be desirable for the whole world.</span></p><span data-dcnode-id="1173" instrument_node="">
</span><h4 data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Turkey will turn to Russia without NATO</span></h4><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Jared Malsin, 1-22, 2022, WSJ, F-16 Sale Could Mend U.S., Turkey Ties, but Tension With Russia Intrudes, https://www.wsj.com/articles/f-16-sale-could-mend-u-s-turkey-ties-but-tension-with-russia-intrudes-11642847406?mod=hp_lead_pos3</span></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1132"><strong data-dcnode-id="1164"><u data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">The Biden administration is weighing a Turkish proposal to buy a fleet of F-16 jet fighters that officials in Ankara say would mend ruptured security links between the countries</span></u></strong><span data-dcnode-id="1163" instrument_node="">, but the sale faces opposition from members of Congress critical of Turkey’s growing ties to Russia. Senior Turkish officials say the deal could be a lifeline for their relationship with the U.S., which has suffered for years over Turkey’s purchases of Russian arms, clashing interests in the war in Syria and U.S. criticism of Ankara’s human-rights record. And in both countries, analysts say blocking the sale could push Ankara closer to Russia. </span><strong data-dcnode-id="1160"><u data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">The prospect of F-16 sales to Turkey, a member of the North Atlantic Treaty Organization, comes as Russia is testing the alliance’s resolve on the Ukrainian border, where Moscow has deployed tens of thousands of troops and prompted fears of an invasion</span></u></strong><span data-dcnode-id="1159" instrument_node="">. The deal has its origin in 1999, when Turkey joined the American-led international consortium building the F-35 advanced jet fighter. In 2017, Ankara decided to buy the Russian S-400 air defense system over objections from the U.S., which feared it could hack into the F-35s. In response, two years later the U.S. expelled Turkey from the F-35 program. With the F-35 out of reach, the new F-16s would replace aging F-16s and F-4 jets in Turkey’s fleet. But the proposed sale faces resistance from lawmakers who take a dim view of the S-400 purchase, Turkish President Recep Tayyip Erdogan’s close relationship with Russian President Vladimir Putin, and Turkish policies in the eastern Mediterranean, U.S. officials and congressional aides said. The Biden administration hasn’t signaled whether it will back the F-16 deal. U.S. arms export control laws require the administration to notify Congress of proposed foreign military sales, giving lawmakers a chance to review and oppose or try to block a deal. The administration hasn’t formally notified Congress about the proposed F-16 sale. “It would hit speed bumps,” a congressional aide said. “The question is would those speed bumps break it apart, or would it be able to make it over them?” The proposed deal illustrates the complex national-security issues in the U.S. relationship with Turkey, a NATO ally and regional power that hosts thousands of American soldiers. The decades-old security relationship between Ankara and Washington has become strained in recent years as Mr. Erdogan has formed closer ties with Russia. Turkey has also attacked U.S.-backed Kurdish militias in Syria. Meanwhile, Mr. </span><strong data-dcnode-id="1156"><u data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Erdogan said in November that Turkey was ready to mediate between Ukraine and Russia.</span></u></strong><span data-dcnode-id="1155" instrument_node=""> The U.S. is negotiating with Turkish officials over the sale, according to Turkish officials. A chief adviser to Mr. Erdogan, Ibrahim Kalin, inquired about the deal during a call on Jan. 10 with White House national security adviser Jake Sullivan, according to a person familiar with the discussion. A National Security Council spokesman declined to comment. “The United States and Turkey have longstanding and deep bilateral defense ties, and Turkey’s continued NATO interoperability remains a priority,” a State Department spokesman said. Several NATO member states fly F-16s, including Turkey. Current and former Turkish officials </span><strong data-dcnode-id="1152"><u data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">said the F-16 deal</span></u></strong><span data-dcnode-id="1151" instrument_node="">, if approved, </span><strong data-dcnode-id="1147"><em data-dcnode-id="1148"><u data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">would arrest the NATO ally’s drift toward Russia</span></u></em></strong><span data-dcnode-id="1146" instrument_node="">. Beyond the S-400 deal, Mr. Erdogan last fall said he had discussed with Russia ramping up defense cooperation, including on fighter planes and jet engines. “</span><strong data-dcnode-id="1142"><em data-dcnode-id="1143"><u data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Turkey is an important player in the game and it has to be kept in the Western fold</span></u></em></strong><span data-dcnode-id="1141" instrument_node="">,” said Ilnur Cevik, a chief foreign-policy adviser to Mr. Erdogan. The S-400 purchase drove a rift between the two countries that has resisted repair. Mr. Cevik said the country hasn’t yet deployed the missile batteries, though Mr. Erdogan has said he wants to buy more. Russian S-400 air defense systems in Moscow last May. PHOTO: MAXIM SHIPENKOV/SHUTTERSTOCK “[The F-16 sale] is a brilliant way out,” said James Jeffrey, a former U.S. ambassador to Turkey who is now with the Wilson Center, a Washington think tank. “The problem is there’s such a negative attitude about Turkey, particularly in the U.S. Congress, that I’m afraid people are going to stumble over it.” The deal faces significant skepticism among key senators who object to Turkey’s purchase of the Russian missile system, according to congressional aides. The leaders of the Senate Foreign Relations Committee, Sens. Robert Menendez (D., N.J.) and James Risch (R., Idaho), have yet to take public positions on the deal. In the House, a group of members from both parties, including members of the pro-Greek Hellenic Caucus, objected to the deal in letters to Secretary of State Antony Blinken last year, citing Ankara’s Russian arms purchases and Turkey’s dispute with Greece over maritime borders in the Mediterranean. “Our concern is, if we’re giving them military equipment, if they are going to be continuing to act in this aggressive manner towards Cyprus, toward the Greek islands,” said Rep. Nicole Malliotakis (R., N.Y.). “We’re concerned about our intellectual property being shared with Russia. [Turkey] is acting in many ways like an adversary.” SHARE YOUR THOUGHTS Should Congress support the sale of F-16 jet fighters to Turkey? Why or why not? Join the conversation below. Current and former Turkish officials say sinking the F-16 deal would punish Turkey’s defense establishment, which remains broadly aligned with the U.S. and opposed to Russia despite Mr. Erdogan’s relationship with Mr. Putin. “They do need these aircraft,” said Charles Forrester, a lead analyst for Janes, a defense industry publication. “The challenge for them, though, is that the S-400 situation hasn’t really been resolved in a public way.” </span><strong data-dcnode-id="1138"><u data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">If Turkey can’t buy the U.S. jets, it could go shopping in Moscow, which offers its Su-35 fighter and Su-57 stealth fighter, as well as the Checkmate, Russia’s proposed fifth-generation, single-engine stealth fighter, analysts said. </span></u></strong><span data-dcnode-id="1137" instrument_node="">British sanctions over Turkey’s incursion into Syria would hinder Ankara’s purchase of the Eurofighter Typhoon, and France is unlikely to approve a sale of its Dassault Rafale fighters, in part because it sold planes to Turkey’s rival Greece last year, said Mr. Forrester. Senior Turkish officials have said Ankara wouldn’t join the Russian camp, but analysts say the possible collapse of the F-16 deal could drive Erdogan closer to Moscow. “</span><strong data-dcnode-id="1134"><u data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">They may go to the Russians</span></u></strong><span data-dcnode-id="1133" instrument_node="">,” Mr. Jeffrey, the former ambassador, said. “And then you’ll have a descending spiral of accusations and bad feelings, and it will just reinforce going in the wrong direction. That’s why the F-16 is so important.”</span></p><span data-dcnode-id="1131" instrument_node="">
</span><h4 data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Turkey will negotiate an end to the Ukraine crisis</span></h4><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Daily Sabah, 1-21, 22, , Turkey wants peace to prevail in region: Erdoğan on Ukraine crisis, https://www.dailysabah.com/politics/diplomacy/turkey-wants-peace-to-prevail-in-region-erdogan-on-ukraine-crisis</span></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1108"><strong data-dcnode-id="1122"><u data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Turkey aims for peace to prevail and hopes no other adverse developments will take place in the region</span></u></strong><span data-dcnode-id="1121" instrument_node="">, President Recep Tayyip Erdoğan said </span><strong data-dcnode-id="1118"><u data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">as Turkey has intensified its diplomatic efforts for a mediator role to de-escalate tensions between Russia and Ukraine</span></u></strong><span data-dcnode-id="1117" instrument_node=""> while the international community is worried about a large-scale war. “A psychology of war in the region upsets us, as a country that has ties with both sides. Our hope is to bring together Mr. (Russian President Vladimir) Putin and (Ukrainian President Volodymyr) Zelenskyy as soon as possible and to ensure that they have a face-to-face meeting,” Erdoğan said Thursday after a joint news conference with El Salvador President Nayib Bukele in the Turkish capital Ankara, in which they signed six agreements as both countries pledged to enhance their ties in several fields. Erdoğan underlined that he places great importance on both his visit to Ukraine and Putin’s visit to Turkey. “I will visit Ukraine at the beginning of next month,” he noted. Also addressing reporters on Friday, Erdoğan reiterated that Turkey can be the broker to establish peace between Ukraine and Russia. “Any development towards the occupation or the outbreak of a war constitutes a very serious violation for the peace of the region. As Turkey, we do not accept the emergence of unrest here,” he said. “We want peace to prevail in the region, and for this, we are ready to do whatever comes our way,” he said and added that may talk with Putin on phone or visit him in Moscow in addition to his planned Ukraine visit. Underlining that Russia invading Ukraine is not a realistic scenario, Erdoğan warned Tuesday that the region could not endure another war. </span><strong data-dcnode-id="1114"><u data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Turkey is ready to play a role in de-escalating tensions between Russia and Ukraine</span></u></strong><span data-dcnode-id="1113" instrument_node="">, Presidential Spokesperson Ibrahim Kalın also said Tuesday, announcing Erdoğan will be traveling to Kyiv to hold talks with Zelenskyy in a couple of weeks. Russia will only welcome efforts if Turkish partners can encourage Ukraine to implement the Minsk Protocol, Kremlin spokesperson Dmitry Peskov said Wednesday in their initial response. Meanwhile, both Russia and Ukraine are open to the idea of Turkey playing a role in easing tensions between the two countries, as proposed by Ankara in November, Turkish diplomatic sources said Thursday. Turkey is discussing the possibility of hosting the next meeting of the Organization for Security and Co-operation in Europe’s (OSCE) Minsk Group, during which Ukraine’s eastern Donbass region will be discussed, the sources told reporters on condition of anonymity. No date has been set for an Istanbul meeting but representatives from Russia, Ukraine, the OSCE Minsk Group and Donbass are expected to attend, they said, adding the group would meet “frequently.” According to the Kremlin, however, Peskov told RIA news agency that there have been no preparations for such a meeting. “There is nothing on this meeting,” he was quoted as saying, adding that Ukraine has not abided by the Minsk accords on the settlement of the conflict with pro-Moscow rebels, while weapons are supplied to Ukraine. Western countries say they fear Russia is planning a new offensive against Ukraine after it massed tens of thousands of troops near the border in recent months. Moscow denies planning an attack. One source said that both Russia and Ukraine responded positively to Turkey’s offer to mediate. </span><strong data-dcnode-id="1110"><u data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">NATO member Turkey has friendly ties with both Kyiv and Moscow but opposes Russian policies in Syria and Libya, as well as its annexation of the Crimean Peninsula in 2014. </span></u></strong><span data-dcnode-id="1109" instrument_node="">Ukraine has welcomed Turkey’s involvement in negotiations with Russia. Zelenskyy said in November he had asked Erdoğan to pass on a list of prisoners to Putin for a potential prisoner swap, though the swap never took place. Kyiv has also bought Turkish drones to possibly use against Russian-backed forces in eastern Ukraine, angering Moscow, and agreed with Ankara to manufacture the drones locally this year. Ankara said that it was ready to be a mediator in the crisis two months ago, an offer Moscow dismissed at the time. It has also said sanctions on Russia are not a solution, though the European Union threatened “massive” sanctions on Thursday if there is an attack. Speaking about Turkey’s proposals, Peskov told reporters on Wednesday, “If our Turkish partners can influence Kyiv and the implementation of the earlier reached agreements, this could only be welcomed.”</span></p><span data-dcnode-id="1107" instrument_node="">
</span><h4 data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Turkey’s role as a NATO ally is on-balance desirable</span></h4><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1097"><strong data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Soicescu &amp; Hanso, January 2022, </span></strong><span data-dcnode-id="1101" instrument_node="">Turkey’s Future Role in NATO: An Indispensable and Difficult Ally, </span><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//icds.ee/wp-content/uploads/2022/01/ICDS_Policy_Paper_Turkey%25C2%25B4s_Future_Role_in_NATO_Stoicescu_Hanso_January_2022-1.pdf"><span data-dcnode-id="1100" instrument_node="">https://icds.ee/wp-content/uploads/2022/01/ICDS_Policy_Paper_Turkey%C2%B4s_Future_Role_in_NATO_Stoicescu_Hanso_January_2022-1.pdf</span></a><span data-dcnode-id="1098" instrument_node="">, Kalev Stoicescu Kalev Stoicescu is a Research Fellow at ICDS. A former Estonian Ministry of Foreign Affairs and Ministry of Defence official, he joined the ICDS in August 2014. Among other fields, he specialises in issues related to Russian foreign and domestic policy, as well as developments in the field of NATO’s defence and security. Stoicescu served at the Ministry of Foreign Affairs from 1991–2000, including as Ambassador to the OSCE and Ambassador to US and Canada. He was a member of the Estonian delegation in border negotiations with Russia and Latvia. He worked for the Ministry of Defence from 2002–2014, first as civilian-military cooperation department head and then, from 2007, as counsellor on defence policy at the Estonian Embassy in Paris. Hille Hanso Hille Hanso is an independent researcher and analyst, based in Istanbul. Her articles, interviews, essays and commentaries have appeared in all media outlets in Estonia and abroad. Her expertise and research interests include Turkish culture and language, nationalism, security and defence in the regional context, Turkish domestic and foreign policy; Estonia-Turkey relations in the 1920s and 30s, minorities and forced migration in the Middle East. Her latest graduate degree is in International Relations and Middle Eastern Studies from Istanbul Bilgi University. TThe Ministry of Foreign Affairs of Estonia recognised Hille Hanso for her contribution to developing Estonian-Turkish relations in 2020</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Executive Summary</span></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1092" instrument_node="">Turkey is one of the key Allies in NATO. </span><strong data-dcnode-id="1089"><u data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Turkey’s relations with and attitude towards the West will have a significant impact on the future of the Alliance and its capabilities and influence in the Black Sea region, the Eastern Mediterranean and the Middle East</span></u></strong><span data-dcnode-id="1088" instrument_node="">. Turkey’s regional power ambitions and interventionist policy, departure from democracy, unsettled disputes with NATO Allies and rapprochement with Russia and China create a very complex picture. The authors present the following recommendations from the perspective of reviving Turkey’s Western orientation, as much as possible, and strengthening NATO:</span></p><span data-dcnode-id="1086" instrument_node="">
</span><ul data-dcnode-id="1047"><span data-dcnode-id="1085" instrument_node="">
</span><li data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">The West – meaning NATO Allies and the EU institutions and non-NATO member states – should adopt a double-track approach to Turkey by strengthening relations both personally, given Turkey’s present governance and President Erdoğan’s role/style, and institutionally, contemplating a longterm perspective.</span></li><span data-dcnode-id="1082" instrument_node="">
</span><li data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">The relations between the West and Turkey do not need more irritants (disputes and conflicts of interest), but rather a problem-solving agenda, a positive atmosphere, and constructive contacts and communication.</span></li><span data-dcnode-id="1079" instrument_node="">
