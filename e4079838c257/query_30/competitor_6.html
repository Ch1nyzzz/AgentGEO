</span><h4 data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Turkey buried troubles with NATO to support the Ukraine</span></h4><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2020" style="font-weight: 400;"><span data-dcnode-id="2023" instrument_node="">Peter Aitken, 2-10, 22, Fox News, Turkey steps up Ukraine support as Germany remains distant,&nbsp;</span><a data-dcnode-id="2021" data-saferedirecturl="https://www.google.com/url?q=https://www.foxnews.com/world/turkey-ukraine-support-germany-distant&amp;source=gmail&amp;ust=1645010260173000&amp;usg=AOvVaw3ZdC5fYrm_3dc4n92VHVqg" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foxnews.com/world/turkey-ukraine-support-germany-distant"><span data-dcnode-id="2022" instrument_node="">https://www.foxnews.com/world/turkey-ukraine-support-germany-distant</span></a></p><span data-dcnode-id="2019" instrument_node="">
</span><p data-dcnode-id="1994" style="font-weight: 400;"><strong data-dcnode-id="2016"><u data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">Turkey’s support of Ukraine in the face of a possible invasion by Russia, despite recent troubles with Europe,</span></u></strong><span data-dcnode-id="2015" instrument_node="">&nbsp;highlights Germany’s hesitancy as tensions remain high. “On the particular issue of Russia’s possible invasion of Ukraine, I think&nbsp;</span><strong data-dcnode-id="2012"><u data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Turkey’s playing a helpful role,”</span></u></strong><span data-dcnode-id="2011" instrument_node="">&nbsp;James Anderson, President of the Institute of World Politics and former Deputy Under Secretary of Defense for Policy under President Trump, told Fox News Digital. “They have stated quite clearly that they oppose any further Russian invasion of Ukraine. They have clearly stated their opposition to Russia’s intervention in Georgia a few years ago. Those statements are welcome.” Turkish President Recep Tayyip Erdogan in January approved the sale of drones to Ukraine and last week clearly stated Turkey’s willingness to “stand by … and help” Ukraine. Erdogan also stressed that “Turkey continues to support the sovereignty and territorial integrity of Ukraine, including Crimea,” during a meeting last week with Ukrainian President Volodymyr Zelenskyy. Ukrainian President Volodymyr Zelenskyy and Turkish President Recep Tayyip Erdogan attend a welcoming ceremony at the Mariyinsky Palace in Kyiv, Ukraine, Feb. 3, 2022. (Reuters) NATO member states have not deployed any troops to Ukraine, but they have provided assistance in the form of lethal aid, including missiles, drones and munitions. Germany, perhaps the most vital European member of NATO with its largest economy, shocked Kyiv when it provided just 5,000 helmets for Ukrainian troops, falling well short of the 100,000 helmets and protective vests requested. ‘Maturing’ relationship&nbsp;</span><strong data-dcnode-id="2008"><u data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">But Turkey, the second-largest nation in NATO, has stepped up to support Ukraine as part of a “maturing and growing relationship,”</span></u></strong><span data-dcnode-id="2007" instrument_node="">&nbsp;Anderson said. Turkey in September 2021 also commenced building the first of four Ada-Class corvette warships it will provide to Ukraine, the first of which may arrive as early as 2023, Naval News reported.&nbsp;</span><strong data-dcnode-id="2004"><u data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">Turkey’s strong support for Ukraine may surprise the West after recent strain on relations.&nbsp;</span></u></strong><span data-dcnode-id="2003" instrument_node="">Then-President Obama’s silence following a failed coup attempt in 2016 led Erdogan to accuse the U.S. of supporting the would-be rebels, and President Biden exchanged critical barbs with Erdogan shortly after taking office, criticizing Turkey’s withdrawal from an international agreement to protect women’s rights. “Turkey has been trending in the wrong direction on certain human rights issues,” Anderson explained, also citing recent trouble with Cyprus and Greece. “To include, you know, locking up journalists and members of the press, cracking down on civil society. That’s also a challenge.” Turkey’s ongoing saga over activist and philanthropist Osman Kavala hit a boiling point over the past two months. The Council of Europe in December signaled its intent to sanction Turkey over Kavala’s continued imprisonment after the European Court of Human Rights ordered Turkey to refer Kavala’s case to the European body. Erdogan responded by saying Turkey will not respect the Council of Europe, according to Reuters. Troubles aside&nbsp;</span><strong data-dcnode-id="1999"><em data-dcnode-id="2000"><u data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">But Turkey has put its troubles aside in order to help Ukraine, even if that help is more or less self-interested</span></u></em></strong><span data-dcnode-id="1998" instrument_node="">, Turkish scholar Kemal Kirisci told Fox News Digital. “I’m coming to recognize, more and more, how correct are a lot of friends and colleagues in the Turkish Foreign Ministry,” Kirisci, a non-resident scholar with the Brookings Institution, said.&nbsp;</span><strong data-dcnode-id="1995"><u data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">“For all the abuse coming out of Erdogan’s mouth about the U.S., Europe and NATO as well, that Turkey has diligently abided by its obligations to NATO, including the running of the VJTF.” Turkey has run the Very High Readiness Joint Task Force (VJTF) in Romania since the start of 2021 as an additional commitment to NATO. It also had maintained a defense expenditure of roughly 1.8% of GDP, short of the NATO-dictated 2% but well above the spending of Canada, Italy and, most notably, Germany, which only spends around 1.5% of GDP as a small increase from its roughly 1.2% for most of the past decade.</span></u></strong></p><span data-dcnode-id="1993" instrument_node="">
</span><h4 data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">On-balance, Turkey has been a good ally and it controls access to the Black Sea</span></h4><span data-dcnode-id="1990" instrument_node="">
</span><p data-dcnode-id="1986" style="font-weight: 400;"><span data-dcnode-id="1989" instrument_node="">Prince Michael of Liechtenstein is the founder of GIS, 2-10, 22, Turkey: An important neighbor of Ukraine,&nbsp;</span><a data-dcnode-id="1987" data-saferedirecturl="https://www.google.com/url?q=https://www.gisreportsonline.com/r/turkey-ukraine-mediate/&amp;source=gmail&amp;ust=1645010260173000&amp;usg=AOvVaw0-wtwvEc9yA2MOpoZ6n6NN" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gisreportsonline.com/r/turkey-ukraine-mediate/"><span data-dcnode-id="1988" instrument_node="">https://www.gisreportsonline.com/r/turkey-ukraine-mediate/</span></a></p><span data-dcnode-id="1985" instrument_node="">
</span><p data-dcnode-id="1972" style="font-weight: 400;"><strong data-dcnode-id="1982"><u data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">Turkey is an important regional power. It has long been geopolitical rivals with Russia in the Black Sea region, the Caucasus, the Balkans and the Middle East. It is also a staunch, longtime member of NATO,</span></u></strong><span data-dcnode-id="1981" instrument_node="">&nbsp;though recently its ties with the rest of the alliance have been strained. The tensions are widely due to diverging interests. Turkey is located in an extremely challenging geostrategic location, and must defend its own interests, which are not always strictly aligned with NATO’s. What is in Turkey’s vital interest is a strong, independent Ukraine to balance Russia’s power in the Black Sea region. Already,&nbsp;</span><strong data-dcnode-id="1978"><u data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">Ankara has made clear that its arms sales to Ukraine will continue,</span></u></strong><span data-dcnode-id="1977" instrument_node="">&nbsp;and recently inked a deal for the joint production of drones. Turkey has a highly developed defense industry and regularly engages in technological exchange with Ukraine. Moreover, t</span><strong data-dcnode-id="1974"><u data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">he 1936 Montreux Convention gives Turkey control of the Bosporus and Dardanelles Straits,&nbsp;</span></u></strong><span data-dcnode-id="1973" instrument_node="">making it the guardian of naval access to the Black Sea. An armed conflict in the Sea would put huge stress on that international agreement, which Turkey sees as vital to its interests. Though the two are not friends, President Putin respects Turkish President Recep Tayyip Erdogan, Turkey as a country, and its defense forces. Moscow and Ankara communicate regularly to keep their differences from escalating into bigger conflicts. President Erdogan has offered to mediate between Kyiv and Moscow in the current crisis. Both sides seem to be open to this option. Both Ukraine and Moscow say they are adhering to the Minsk Protocol, meant to diffuse the conflict in the Donbas region. However, their interpretations of the agreement diverge, and transgressions occur regularly. Russia refuses to admit any blame. Ankara has a deep understanding of the region and the interests of the various players. If Turkey were to mediate, it could benefit Ukraine, keeping it from becoming a geopolitical football that is continually kicked around by the global powers. It could also help to remove some of the exaggerated emotion in the overall security discussion between Moscow and the West.</span></p><span data-dcnode-id="1971" instrument_node="">
</span><h4 data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">Russia and China have formed an anti-Democratic alliance</span></h4><span data-dcnode-id="1968" instrument_node="">
</span><p data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">David Leonhardt, 2-9, 22, New York Times, A New Axis China and Russia have formed an “alliance of autocracies.”, https://www.nytimes.com/2022/02/09/briefing/china-russia-alliance.html</span></p><span data-dcnode-id="1965" instrument_node="">
</span><p data-dcnode-id="1911"><span data-dcnode-id="1964" instrument_node="">The last time Xi Jinping left China was more than two years ago, for a diplomatic trip to Myanmar. Days later, he ordered the lockdown of Wuhan, which began China’s aggressive “zero Covid” policy. By staying home, Xi has reduced his chances of contracting the virus and has sent a message that he is playing by at least some of the same pandemic rules as other Chinese citizens. Until last week</span><strong data-dcnode-id="1961"><u data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">, Xi had </span></u></strong><span data-dcnode-id="1960" instrument_node="">also </span><strong data-dcnode-id="1957"><u data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">not met with a single other world leader since 2020</span></u></strong><span data-dcnode-id="1956" instrument_node="">. He had conducted his diplomacy by phone and videoconference. </span><strong data-dcnode-id="1953"><u data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">When he finally broke that streak</span></u></strong><span data-dcnode-id="1952" instrument_node=""> and met in Beijing on Friday with another head of state, </span><strong data-dcnode-id="1949"><u data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">who was it? Vladimir Putin</span></u></strong><span data-dcnode-id="1948" instrument_node="">. </span><strong data-dcnode-id="1945"><u data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">Their meeting led to a joint statement, running more than 5,000 words, that announced a new closeness between China and Russia. It proclaimed a “redistribution of power in the world” and mentioned the U.S. six times, all critically. The Washington Post called the meeting “a bid to make the world safe for dictatorship</span></u></strong><span data-dcnode-id="1944" instrument_node="">.” Kevin Rudd, a former prime minister of Australia, told The Wall Street Journal, “The world should get ready for a further significant deepening of the China-Russia security and economic relationship.” Ukraine and Taiwan The current phase of the relationship has its roots in Russia’s 2014 annexation of the Crimean peninsula from Ukraine. The European Union and the U.S. responded with economic sanctions on Russia that forced it to trade more with Asia, Anton Troianovski, The Times’s Moscow bureau chief, notes. China stepped in, buying Russian oil, investing in Russian companies and more. </span><strong data-dcnode-id="1941"><u data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">“The conventional wisdom used to be that Putin didn’t want to get too close to China</span></u></strong><span data-dcnode-id="1940" instrument_node="">,” Anton said. </span><strong data-dcnode-id="1937"><u data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">That’s no longer the case. </span></u></strong><span data-dcnode-id="1936" instrument_node="">Russia returned the favor in recent years, buying equipment from Huawei, a Chinese tech giant, after the Trump administration tried to isolate the company. In the grandest sense, </span><strong data-dcnode-id="1933"><u data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">China and Russia are creating a kind of “alliance of autocracies</span></u></strong><span data-dcnode-id="1932" instrument_node="">,” as Steven Lee Myers, The Times’s Beijing bureau chief, puts it. They don’t use that phrase and even claim to be democracies. “Democracy is a universal human value, rather than a privilege of a limited number of states,” their joint statement read. “It is only up to the people of the country to decide whether their state is a democratic one.” But the message that China and Russia have sent to other countries is clear — and undemocratic. They will not pressure other governments to respect human rights or hold elections</span><strong data-dcnode-id="1929"><u data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">. In Xi’s and Putin’s model, an autocratic government can provide enough economic security and nationalistic pride to minimize public opposition — and crush any that arises. </span></u></strong><span data-dcnode-id="1928" instrument_node="">“There are probably more countries than Washington would like to think that are happy to have China and Russia as an alternative model,” Steven told us. “Look how many countries showed up at the opening ceremony of Beijing 2022, despite Biden’s ‘diplomatic boycott.’ They included some — Egypt, Saudi Arabia — that had long been in the American camp.” </span><strong data-dcnode-id="1925"><u data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">Russia’s threat to invade Ukraine has added a layer to the relationship between Moscow and Beijin</span></u></strong><span data-dcnode-id="1924" instrument_node="">g. The threat reflects Putin’s view — which Xi shares — that a powerful country should be able to impose its will within its declared sphere of influence. The country should even be able to topple a weaker nearby government without the world interfering. Beside Ukraine, of course, another potential example is Taiwan. For all these common interests, China and Russia do still have major points of tension. For decades, they have competed for influence in Asia. That competition continues today, with China now in the more powerful role, and many Russians, across political ideologies, fear a future of Chinese hegemony. Even their joint statement — which stopped short of being a formal alliance — had to elide some tensions. It did not mention Ukraine by name, partly because China has economic interests that an invasion would threaten. The two countries are also competing for influence in the melting waters of the Arctic. And China is nervous about Russia’s moves to control Kazakhstan, where many people are descended from modern-day China. “China and Russia are competing for influence around much of the world — Central Asia, Africa, the Middle East and South America,” Lara Jakes, who covers the State Department from Washington, said. “The two powers have less than more in common, and a deep or enduring relationship that goes beyond transactional strategies seems unlikely.” As part of its larger effort to check China’s rise — and keep Russia from undermining global stability — the Biden administration is likely to look for ways to exacerbate any tensions between China and Russia, in Kazakhstan and elsewhere. </span><strong data-dcnode-id="1921"><u data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">The “alliance of autocracies” </span></u></strong><span data-dcnode-id="1920" instrument_node="">remains informal for now. But it </span><strong data-dcnode-id="1917"><u data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">is real, and it extends beyond China and Russia to include other countries — like Hungary, Turkey and Venezuela</span></u></strong><span data-dcnode-id="1916" instrument_node=""> — that work together to minimize the effect of economic sanctions and diplomatic pressure</span><strong data-dcnode-id="1913"><u data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">. The world’s democracies face a growing and interconnected challenge</span></u></strong><span data-dcnode-id="1912" instrument_node=""> from a very different political model.</span></p><span data-dcnode-id="1910" instrument_node="">
</span><h4 data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">Turkey will join Russia if abandoned by NATO</span></h4><span data-dcnode-id="1907" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1906" instrument_node="">Alexandros Diakopoulos is former national security adviser to the Greek prime minister, 2-8, 22, Ukraine and Russia’s complex relationship with Turkey,&nbsp;</span><a data-dcnode-id="1904" data-saferedirecturl="https://www.google.com/url?q=https://www.ekathimerini.com/opinion/1177080/ukraine-and-russias-complex-relationship-with-turkey/&amp;source=gmail&amp;ust=1645010260173000&amp;usg=AOvVaw1RqoLdETcwpgROUd47g1TC" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ekathimerini.com/opinion/1177080/ukraine-and-russias-complex-relationship-with-turkey/"><span data-dcnode-id="1905" instrument_node="">https://www.ekathimerini.com/opinion/1177080/ukraine-and-russias-complex-relationship-with-turkey/</span></a></p><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1887"><span data-dcnode-id="1901" instrument_node="">Historically, as far back as the Ottoman era,&nbsp;</span><strong data-dcnode-id="1898"><u data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Turkey</span></u></strong><span data-dcnode-id="1897" instrument_node="">&nbsp;played one great power off another. It wanted to deftly pick neutrality and sit on the fence, waiting to be approached by the side that has the most to offer.&nbsp;</span><strong data-dcnode-id="1889"><u data-dcnode-id="1893"><span data-dcnode-id="1896" instrument_node="">Whenever it has an issue with Russia, it calls on NATO. Whenever it has a problem with the West, it threatens to&nbsp;</span><em data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">join Russia</span></em></u><em data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">.</span></em><span data-dcnode-id="1890" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1888" instrument_node="">And it works. Indicatively, when Turkish warships threatened the French frigate Courbet, a clear violation of NATO tenets, only eight countries sided with France. The rest were afraid of “losing Turkey” to Russia.</span></p><span data-dcnode-id="1886" instrument_node="">
</span><h4 data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">Answers to: S-400 purchase from Russia: The US abandoned Turkey’s Turkey has tried to negotiate a solution</span></h4><span data-dcnode-id="1883" instrument_node="">
</span><p data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">Dr. Dania Koleilat Khatib is a specialist in US-Arab relations with a focus on lobbying. She is a member of the steering committee of the National Agenda of the Future of Syria, and an advocacy consultant for the United Nations Economic and Social Commission for Western Asia. She is co-founder of the Research Center for Cooperation and Peace Building, a Lebanese nongovernmental organization focused on Track II diplomacy, 2-10, 22, Why a new missile system could solve Turkey’s US-Russia conundrum, https://www.atlanticcouncil.org/blogs/turkeysource/why-a-new-missile-system-could-solve-turkeys-us-russia-conundrum/</span></p><span data-dcnode-id="1880" instrument_node="">
</span><p data-dcnode-id="1862"><span data-dcnode-id="1879" instrument_node="">Turkey continues to grapple with this problem a decade after seeking to bolster its defenses. In 2012, Syria shot down a Turkish jet, causing tensions to increase with Russia, the principal backer of the Bashar al-Assad regime. NATO members responded by deploying defense systems on the border with Syria. </span><strong data-dcnode-id="1876"><u data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">In October 2015, however, the United States (followed by other allies) started withdrawing Patriot missile-defense batteries, which the Turks saw as their first line of defense against Russian harassments</span></u></strong><span data-dcnode-id="1875" instrument_node="">. The United States did not plan to renew the deployment, but reassured Turkey of the capability to come back within a week, if needed. </span><strong data-dcnode-id="1872"><u data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">The Turks felt abandoned by NATO amid Russian aggression,</span></u></strong><span data-dcnode-id="1871" instrument_node=""> given that the raison d’être of NATO is joint defense. Engaging with Putin Seventeen seconds prompted a rethink in Ankara. That’s how long a Russian jet spent in Turkish airspace in November 2015—before the Turks shot it down. Would a clash between Russia and Turkey ensue? NATO did not want to be dragged into a war with Russia. Sensing a lack of Western backup, President Recep Tayyip Erdogan hedged his bet. He engaged with Russian President Vladimir Putin, and negotiations calmed tensions. Another factor in this shift: his growing suspicion that American allies were bolstering the People’s Protection Units (YPG), long regarded by the Turkish government as the Syrian branch of the Kurdistan Workers’ Party, its archenemy. In the summer of 2016, the Turkish incursion into northern Syria met no real resistance from Russia. A </span><strong data-dcnode-id="1868"><u data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">few months later, Erdogan and Putin announced that Turkey would buy the S-4</span></u></strong><span data-dcnode-id="1867" instrument_node="">00. The deal raised eyebrows in Washington and Western European capitals, leading the United States to remove Turkey from its F-35 program. The rationale: protecting the highly advanced technology of the fighter jet from being captured by Russia. </span><strong data-dcnode-id="1864"><u data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">Tensions between the two NATO allies escalated as the United States cultivated Turkey’s neighbor and rival, Greece. Turkey is nonetheless a natural ally for the United States and the West, and vice versa. Turkey can counterbalance Russia in the Middle East as well as in Central Asia. Turkey is at odds with Russia in Syria, Libya, and the Caucasus. In private conversations, Turkish politicians assured their Western counterparts that the S-400 would remain in boxes,</span></u></strong><span data-dcnode-id="1863" instrument_node=""> a German official told me on condition of anonymity. Yet as tensions increased with the United States, especially over support for the YPG, Erdogan played the S-400 card. During his US visit in September, he talked about buying a new tranche of the missile-defense system. The Turks, however, realize this point of pressure comes with a high political cost.</span></p><span data-dcnode-id="1861" instrument_node="">
</span><h4 data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">Turkey buried troubles with NATO to support the Ukraine</span></h4><span data-dcnode-id="1858" instrument_node="">
</span><p data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">Peter Aitken, 2-10, 22, Fox News, Turkey steps up Ukraine support as Germany remains distant, https://www.foxnews.com/world/turkey-ukraine-support-germany-distant</span></p><span data-dcnode-id="1855" instrument_node="">
</span><p data-dcnode-id="1830"><strong data-dcnode-id="1852"><u data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">Turkey’s support of Ukraine in the face of a possible invasion by Russia, despite recent troubles with Europe,</span></u></strong><span data-dcnode-id="1851" instrument_node=""> highlights Germany’s hesitancy as tensions remain high. “On the particular issue of Russia’s possible invasion of Ukraine, I think </span><strong data-dcnode-id="1848"><u data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">Turkey’s playing a helpful role,”</span></u></strong><span data-dcnode-id="1847" instrument_node=""> James Anderson, President of the Institute of World Politics and former Deputy Under Secretary of Defense for Policy under President Trump, told Fox News Digital. “They have stated quite clearly that they oppose any further Russian invasion of Ukraine. They have clearly stated their opposition to Russia’s intervention in Georgia a few years ago. Those statements are welcome.” Turkish President Recep Tayyip Erdogan in January approved the sale of drones to Ukraine and last week clearly stated Turkey’s willingness to “stand by … and help” Ukraine. Erdogan also stressed that “Turkey continues to support the sovereignty and territorial integrity of Ukraine, including Crimea,” during a meeting last week with Ukrainian President Volodymyr Zelenskyy. Ukrainian President Volodymyr Zelenskyy and Turkish President Recep Tayyip Erdogan attend a welcoming ceremony at the Mariyinsky Palace in Kyiv, Ukraine, Feb. 3, 2022. (Reuters) NATO member states have not deployed any troops to Ukraine, but they have provided assistance in the form of lethal aid, including missiles, drones and munitions. Germany, perhaps the most vital European member of NATO with its largest economy, shocked Kyiv when it provided just 5,000 helmets for Ukrainian troops, falling well short of the 100,000 helmets and protective vests requested. ‘Maturing’ relationship </span><strong data-dcnode-id="1844"><u data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">But Turkey, the second-largest nation in NATO, has stepped up to support Ukraine as part of a “maturing and growing relationship,”</span></u></strong><span data-dcnode-id="1843" instrument_node=""> Anderson said. Turkey in September 2021 also commenced building the first of four Ada-Class corvette warships it will provide to Ukraine, the first of which may arrive as early as 2023, Naval News reported. </span><strong data-dcnode-id="1840"><u data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">Turkey’s strong support for Ukraine may surprise the West after recent strain on relations. </span></u></strong><span data-dcnode-id="1839" instrument_node="">Then-President Obama’s silence following a failed coup attempt in 2016 led Erdogan to accuse the U.S. of supporting the would-be rebels, and President Biden exchanged critical barbs with Erdogan shortly after taking office, criticizing Turkey’s withdrawal from an international agreement to protect women’s rights. “Turkey has been trending in the wrong direction on certain human rights issues,” Anderson explained, also citing recent trouble with Cyprus and Greece. “To include, you know, locking up journalists and members of the press, cracking down on civil society. That’s also a challenge.” Turkey’s ongoing saga over activist and philanthropist Osman Kavala hit a boiling point over the past two months. The Council of Europe in December signaled its intent to sanction Turkey over Kavala’s continued imprisonment after the European Court of Human Rights ordered Turkey to refer Kavala’s case to the European body. Erdogan responded by saying Turkey will not respect the Council of Europe, according to Reuters. Troubles aside </span><strong data-dcnode-id="1835"><em data-dcnode-id="1836"><u data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">But Turkey has put its troubles aside in order to help Ukraine, even if that help is more or less self-interested</span></u></em></strong><span data-dcnode-id="1834" instrument_node="">, Turkish scholar Kemal Kirisci told Fox News Digital. “I’m coming to recognize, more and more, how correct are a lot of friends and colleagues in the Turkish Foreign Ministry,” Kirisci, a non-resident scholar with the Brookings Institution, said. </span><strong data-dcnode-id="1831"><u data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">“For all the abuse coming out of Erdogan’s mouth about the U.S., Europe and NATO as well, that Turkey has diligently abided by its obligations to NATO, including the running of the VJTF.” Turkey has run the Very High Readiness Joint Task Force (VJTF) in Romania since the start of 2021 as an additional commitment to NATO. It also had maintained a defense expenditure of roughly 1.8% of GDP, short of the NATO-dictated 2% but well above the spending of Canada, Italy and, most notably, Germany, which only spends around 1.5% of GDP as a small increase from its roughly 1.2% for most of the past decade.</span></u></strong></p><span data-dcnode-id="1829" instrument_node="">
</span><h4 data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">On-balance, Turkey has been a good ally and it controls access to the Black Sea</span></h4><span data-dcnode-id="1826" instrument_node="">
</span><p data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">Prince Michael of Liechtenstein is the founder of GIS, 2-10, 22, Turkey: An important neighbor of Ukraine, https://www.gisreportsonline.com/r/turkey-ukraine-mediate/</span></p><span data-dcnode-id="1823" instrument_node="">
</span><p data-dcnode-id="1810"><strong data-dcnode-id="1820"><u data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">Turkey is an important regional power. It has long been geopolitical rivals with Russia in the Black Sea region, the Caucasus, the Balkans and the Middle East. It is also a staunch, longtime member of NATO,</span></u></strong><span data-dcnode-id="1819" instrument_node=""> though recently its ties with the rest of the alliance have been strained. The tensions are widely due to diverging interests. Turkey is located in an extremely challenging geostrategic location, and must defend its own interests, which are not always strictly aligned with NATO’s. What is in Turkey’s vital interest is a strong, independent Ukraine to balance Russia’s power in the Black Sea region. Already, </span><strong data-dcnode-id="1816"><u data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Ankara has made clear that its arms sales to Ukraine will continue,</span></u></strong><span data-dcnode-id="1815" instrument_node=""> and recently inked a deal for the joint production of drones. Turkey has a highly developed defense industry and regularly engages in technological exchange with Ukraine. Moreover, t</span><strong data-dcnode-id="1812"><u data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">he 1936 Montreux Convention gives Turkey control of the Bosporus and Dardanelles Straits, </span></u></strong><span data-dcnode-id="1811" instrument_node="">making it the guardian of naval access to the Black Sea. An armed conflict in the Sea would put huge stress on that international agreement, which Turkey sees as vital to its interests. Though the two are not friends, President Putin respects Turkish President Recep Tayyip Erdogan, Turkey as a country, and its defense forces. Moscow and Ankara communicate regularly to keep their differences from escalating into bigger conflicts. President Erdogan has offered to mediate between Kyiv and Moscow in the current crisis. Both sides seem to be open to this option. Both Ukraine and Moscow say they are adhering to the Minsk Protocol, meant to diffuse the conflict in the Donbas region. However, their interpretations of the agreement diverge, and transgressions occur regularly. Russia refuses to admit any blame. Ankara has a deep understanding of the region and the interests of the various players. If Turkey were to mediate, it could benefit Ukraine, keeping it from becoming a geopolitical football that is continually kicked around by the global powers. It could also help to remove some of the exaggerated emotion in the overall security discussion between Moscow and the West.</span></p><span data-dcnode-id="1809" instrument_node="">
</span><h4 data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">Turkey balancing relations with Russia but siding with the West</span></h4><span data-dcnode-id="1806" instrument_node="">
</span><h4 data-dcnode-id="1802"><span data-dcnode-id="1805" instrument_node="">Gaber, 2-9, 22, </span><strong data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">Yevgeniya Gaber is a PhD candidate in political science and senior analyst at the Centre for Contemporary Turkey Studies at Carleton University (Canada). She was formerly deputy director of the Ukrainian Diplomatic Academy. Her main area of interest is the foreign policy of Ukraine, Turkey, and the security problems of the Black Sea region, Turkey’s shuttle diplomacy in the Black Sea region, https://www.ips-journal.eu/topics/foreign-and-security-policy/turkeys-shuttle-diplomacy-in-the-black-sea-region-5705/</span></strong></h4><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1775"><span data-dcnode-id="1800" instrument_node="">The </span><strong data-dcnode-id="1797"><u data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">strategic partnership with the US and American sanctions against the Turkish defence industry, Turkey’s membership of NATO and its purchase of air defence systems from Russia, cooperation with Moscow in regional forums and standoffs in several frozen and ongoing armed conflicts all over the world</span></u></strong><span data-dcnode-id="1796" instrument_node=""> – somewhat surprisingly</span><strong data-dcnode-id="1793"><u data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">, the Turkish government has managed to combine all these apparently incompatible components in its multi-pronged and consistently pragmatic foreign policy. </span></u></strong><span data-dcnode-id="1792" instrument_node="">Consistent in its inconsistency, Ankara’s ambiguous position on many foreign policy issues has significantly enriched not only diplomatic practice but also the language of politics. ‘Cooperative conflict’, ‘agreeing to disagree’ and even the difficult to negotiate ‘compartmentalisation’ (willingness to promote dialogue in certain spheres, while closing its eyes to irreconcilable contradictions in others) – different terms have been used by observers to describe the complex dynamic of Russian-Turkish relationsHowever, it seems that this time, the tone Russia has taken in its dialogue with the West and the threat of a direct intervention in Ukraine has left Ankara with little room for geopolitical manoeuvre in the Black Sea region. Turkey’s dependence on Russi Turkey’s attempts to maintain working relations with Russia even in the midst of serious crisis are completely understandable. In addition to their shared aversion to the prospect of NATO strengthening its military capacity close to their borders, Ankara and Moscow are connected through a tangled web of political arrangements in regions where they have overlapping interests. They also have close economic ties and common energy projects (from the Blue Stream and the TurkStream pipelines pumping Russian gas under the Black Sea to the Akkuyu nuclear power plant currently being constructed by Rosatom on the shores of the Mediterranean) Against the background of Russian-Turkish relations, strategic partnership with Ukraine is an example of a ‘natural alliance’. Obviously, any deterioration in relations with Moscow would automatically mean the loss of both the Russian market, which is important for Turkish manufacturers, and of the Russian tourists who are such welcome visitors in Turkish resorts. Besides, if necessary, Russia always has the option of ‘gas blackmail’ (the Russian Federation supplies around 40 per cent of Turkey’s domestic gas consumption) or the development of a new humanitarian crisis in Syria, triggering another wave of refugees on the Turkish borders. Against the backdrop of the economic crisis caused by the Covid-19 pandemic and the unprecedented devaluation of the national currency over the last year, the weight of such problems risks overwhelming the already weakened Turkish economy. Lastly, there is Russia’s trump card of hybrid diplomacy. The possibility of ‘thawing’ unresolved conflicts through Russian peacekeeping efforts, the use of the Kurdish factor and the creation of another local hotbed of tension close to the Turkish border could allow Russia to place pressure on uncooperative ‘strategic partners’ in those cases where the ‘partners’ strategies’ do not coincide. In the majority of regional conflicts – whether Syria and Libya or the occupied territories of the GUAM countries (Georgia, Ukraine, Azerbaijan, and Moldova) – Ankara and Moscow have been on opposite sides of the barricades, if not in direct military action, then at the very least at the negotiating table. And this does not exactly make the life of Turkish diplomats any easier. The Turkish courting of Ukrain Against the background of Russian-Turkish relations, encumbered by problems of the two countries’ complex past and an even more intricate geopolitical present, strategic partnership with Ukraine is an example of a ‘natural alliance’, based on almost complete convergence of interests with no significant controversies or tensions. Hence, the recent signing of a free trade agreement, among other deals, between the two countries. In 2021, Turkish investment in Ukraine’s economy to the tune of USD 4.5bn and USD 7.4bn in bilateral trade saw Turkey become Ukraine’s largest foreign investor. The containment of Russian military presence in the region and ensuring freedom of navigation on the Black Sea, the de-occupation of the Crimea and protecting the rights of Crimean Tartars, increasing bilateral trade and investment are just a few of the two countries’ shared priorities. The active development of cooperation in the military-technical sphere and in the defence industry – culminating in plans for the construction of a joint production plant for a new generation of drones – gradually elevated the bilateral relationship from ‘economically beneficial’ to ‘strategically important’. That said, the economic factor should certainly not be discounted: in 2021, Turkish investment in Ukraine’s economy to the tune of USD 4.5bn and USD 7.4bn in bilateral trade saw Turkey become Ukraine’s largest foreign investor and one of its top five foreign trade partners. In the event of a full-scale Russian military invasion, however, Ankara would have to forget about these figures, as well as the record two million Ukrainian tourists holidaying in Turkish resorts. How Turkey is helping itsel </span><strong data-dcnode-id="1789"><u data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Thanks to Turkey’s foreign policy pragmatism and skilful balancing, so far it has managed to avoid the pitfalls of Black Sea politics and maintain cordial relations with both partners</span></u></strong><span data-dcnode-id="1788" instrument_node="">, who have already been at war with each other for eight years. Nevertheless, the threat of a new Russian incursion in Ukraine may still force Ankara to make an uncomfortable choice.None of the dilemmas that could arise in the event of further escalation will have a clear solution: whether or not to support the decision regarding sanctions against Moscow, when and how to implement the mechanisms of the Montreux Document, whether to participate in NATO’s Allied Maritime Command at sea or to remain a non-participating observer of Russian expansion on the ground. In this case, it would be easier to prevent such issues arising than try to resolve them</span><strong data-dcnode-id="1785"><u data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">. Turkey is no longer under the illusion that Russia has any real intentions of a ‘strategic partnership’. </span></u></strong><span data-dcnode-id="1784" instrument_node="">In this sense, by helping Ukraine prevent Russian escalation, Turkey is also helping itself – avoiding having to face a complex and undesirable choice, where there are no favourable outcomes. Moreover, if mediation initiatives are successful, through its ‘shuttle’ diplomacy, Ankara will be able to significantly strengthen its position, not only in the unsettled waters of the Black Sea but on the far shores of the Atlantic. Dominance over the Black Sea</span><strong data-dcnode-id="1781"><u data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node=""> The constructive position of the Turkish leadership on the Ukrainian issue (refusing to recognise the annexation of the Crimean Peninsula, consistently supporting Ukraine’s membership of NATO, and now also Erdogan’s attempts to act as a mediator between Zelensky and Putin by proposing Istanbul as a potential location for face-to-face meetings of the Trilateral Contact Group on Ukraine) may significantly improve Ankara’s image in the eyes of its international partners. </span></u></strong><span data-dcnode-id="1780" instrument_node="">In addition, </span><strong data-dcnode-id="1777"><u data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">after the death of Turkish troops as a result of the Russian airstrike in Idlib and the standoff in Nagorno-Karabakh during the second Karabakh war, it seems as though Turkey is no longer under the illusion that Russia has any real intentions of a ‘strategic partnership’. </span></u></strong><span data-dcnode-id="1776" instrument_node="">The occupation and subsequent militarisation of Crimea, the increased military presence of Russia in the Middle East, the eastern Mediterranean, and the South Caucasus are, for Turkish experts, reminiscent of the centuries of Russian-Ottoman wars, which began with the decline of the Crimean Khanate and resulted in the fall of the entire Ottoman Empire. The de-facto annexation of Belarus and the deployment of CSTO forces in Kazakhstan called Ankara’s ambitions for regional leadership in the post-Soviet space into question. A new incursion in Ukraine would mean a de facto transformation of the Black Sea into a ‘Russian lake’ with direct access to ‘warm seas’ – a long-held dream of Moscow’s. This is something that Ankara must prevent – even if, to remain credible, the ‘shuttle’ diplomacy between the shores of the Black Sea needs the support of drones in the skies.</span></p><span data-dcnode-id="1774" instrument_node="">
</span><h4 data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Russia not interested in Turkey’s conflict mediation</span></h4><span data-dcnode-id="1771" instrument_node="">
</span><p data-dcnode-id="1767"><span data-dcnode-id="1770" instrument_node="">Aaron Stein is the Director of Research at the Foreign Policy Research Institute (FPRI), 2-8, 22, </span><strong data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">Turkey’s Careful and Risky Fence-Sitting between Ukraine &amp; Russia, https://www.fpri.org/article/2022/02/turkeys-careful-and-risky-fence-sitting-between-ukraine-and-russia/</span></strong></p><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1760"><span data-dcnode-id="1765" instrument_node="">The Turkish-Russian relationship is multi-faceted, so Ankara faces an equally difficult challenge in severing ties with Moscow. Ankara, therefore, may not join the United States and Brussels in sanctioning Russia and, instead, continue to position itself as a potential arbiter between the two sides, even after a Russian invasion. The tensions between Ukraine and Russia have obvious implications for Turkish security. </span><strong data-dcnode-id="1762"><u data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Ankara has ample incentives to “fence-sit” in the near term. This policy does not preclude defense cooperation with Ukraine, or even supporting</span></u></strong><span data-dcnode-id="1761" instrument_node=""> broader NATO responses to reassure member states and to punish Moscow for an invasion. However, it does not mean that the United States should expect Erdogan to second U.S. actions and seek to engage with Russia continuously, even in the event of a conflict. The broader challenges that Ankara will face, though, are going to be outside of its control. The scope and size of a Russian military response depends on thinking in the Kremlin. For now, the signs point to a large-scale offensive. The Turkish relationship with Ukraine may, in fact, be at risk in such a scenario, and, beyond this, the security environment in the Black Sea could degrade and negatively impact Turkish interests. The Ukrainian-Turkish relationship is nuanced and complicated, but it also impacts Ankara’s thinking about its place in the world, as well as its defense relationship with the United States.</span></p><span data-dcnode-id="1759" instrument_node="">
</span><p data-dcnode-id="1753"><span data-dcnode-id="1758" instrument_node="">The security situation in Turkey’s near-abroad can change rapidly and at any moment. Ankara has few good options to manage Russian actions, but it appears committed to trying to meet with Putin and to mediate a solution. </span><strong data-dcnode-id="1755"><u data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">The Russian government, at this time, appears to have no interest in any Turkish role.</span></u></strong><span data-dcnode-id="1754" instrument_node=""> A large-scale war would test recent Turkish elite assumptions about the future of great power conflict and could have broader implications for the defense industry. Only time will tell, but, at some point, Ankara may have to make broader decisions about its future foreign policy that either risk its relations with Moscow or strain its ties with the West.</span></p><span data-dcnode-id="1752" instrument_node="">

</span><h4 data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">NATO praising Turkey for its role in the Ukraine</span></h4><span data-dcnode-id="1681" instrument_node="">
</span><p data-dcnode-id="1676"><span data-dcnode-id="1680" instrument_node="">Saily Sabah, 2-7, 22, </span><a data-dcnode-id="1678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailysabah.com/politics/diplomacy/nato-chief-thanks-erdogan-for-efforts-to-solve-ukraine-russia-crisis"><span data-dcnode-id="1679" instrument_node="">https://www.dailysabah.com/politics/diplomacy/nato-chief-thanks-erdogan-for-efforts-to-solve-ukraine-russia-crisis</span></a><span data-dcnode-id="1677" instrument_node="">, NATO chief thanks Erdoğan for efforts to solve Ukraine-Russia crisis</span></p><span data-dcnode-id="1675" instrument_node="">
</span><p data-dcnode-id="1643"><strong data-dcnode-id="1672"><u data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">NATO Secretary</span></u></strong><span data-dcnode-id="1671" instrument_node="">-General Jens </span><strong data-dcnode-id="1668"><u data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Stoltenberg </span></u></strong><span data-dcnode-id="1667" instrument_node="">on Monday t</span><strong data-dcnode-id="1664"><u data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">hanked </span></u></strong><span data-dcnode-id="1663" instrument_node="">President Recep Tayyip </span><strong data-dcnode-id="1660"><u data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Erdoğan for his contribution to finding a political solution for the Russia-Ukraine crisis and his personal efforts. </span></u></strong><span data-dcnode-id="1659" instrument_node="">In a message he posted on Twitter, Stoltenberg said they discussed Russia’s buildup in and around Ukraine. “I thanked him for his active support and personal engagement to find a political solution, and welcomed Turkey’s strong practical support to Ukraine,” he said. </span><strong data-dcnode-id="1656"><u data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">Stoltenberg continued by noting that the bloc remains ready to find a solution through dialogue. </span></u></strong><span data-dcnode-id="1655" instrument_node="">A latter statement released by Ankara also underlined the phone call between the two leaders. According to the statement, Erdoğan and Stoltenberg discussed regional developments, particularly the tensions between Russia and Ukraine. Underlining that T</span><strong data-dcnode-id="1652"><u data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">urkey has been spending efforts for an end to the crisis,</span></u></strong><span data-dcnode-id="1651" instrument_node=""> Erdoğan said that Ankara has been acting based on a logic of calming the existing tensions. Expressing that he shared his opinion with all his counterparts that the crisis will be ended by peaceful and diplomatic means within the framework of the Minsk Agreements on the basis of Ukraine’s territorial integrity and international law, Erdoğan added that he shared with Russian President Vladimir Putin and Ukrainian President Volodymyr Zelenskyy on several occasions that Turkey would gladly host a summit at the leadership level or talks at the technical level. If Turkey is assigned a mediator role following the meeting with Putin, Ankara will accept the offer to help in the Ukrainian crisis in this capacity and will try to do its part, Erdoğan said Friday. Speaking to reporters on his way back from Ukraine where he met with Ukrainian President Zelenskyy, Erdoğan said that the Western countries were unable to contribute to the solution to the Ukraine-Russia tensions and there are no European leaders fit to resolve it. Ukraine and Russia have been locked in conflict since hostilities in the eastern Donbass region broke out in 2014 after Russia illegally annexed the Crimean Peninsula. Erdoğan’s visit to Turkey’s fellow Black Sea nation came after visits to Kyiv by leaders of NATO members Britain, Poland and the Netherlands amid the standoff. Turkey has good ties with Kyiv and Moscow but has said it would do what is necessary as a NATO member if Russia invades. Russia has denied plans to invade Ukraine amid concern by many Western nations over its buildup of more than 100,000 troops near the border, but has demanded sweeping security guarantees from the West and says it could take unspecified military measures if its demands are not met. </span><strong data-dcnode-id="1648"><u data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">Ankara has previously offered to help defuse the standoff and Turkish diplomatic sources have said both Russia and Ukraine were open to the idea</span></u></strong><span data-dcnode-id="1647" instrument_node="">. Turkey has opposed the sanctions threatened by other NATO members in response to a military incursion by Russia. Turkey shares the Black Sea with Ukraine and Russia. Erdoğan has said the conflict would be unacceptable in the region and warned Russia that an invasion would be unwise. While forging cooperation on defense and energy, </span><strong data-dcnode-id="1644"><u data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">Turkey has opposed Moscow’s policies in Syria and Libya, as well as its annexation of the Crimean Peninsula in 2014. It has also sold sophisticated drones to Ukraine, angering Russia.</span></u></strong></p><span data-dcnode-id="1642" instrument_node="">
</span><h4 data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Ukraine war will kill 85,000 people and trigger a flood of 5 million refugees</span></h4><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Hurriety Daily, 2-7, 22, Diplomatic flurry to avert Russia-NATO clash over Ukraine, https://www.hurriyetdailynews.com/diplomatic-flurry-to-avert-russia-nato-clash-over-ukraine-171333</span></p><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1627"><strong data-dcnode-id="1633"><u data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">They said Russia is on track to amass a large enough force — some 150,000 soldiers</span></u></strong><span data-dcnode-id="1632" instrument_node=""> — for a full-scale invasion by mid-February. </span><strong data-dcnode-id="1629"><u data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Such a force would be capable of taking the capital Kyiv in a matter of 48 hours in an onslaught that would kill up to 50,000 civilians, 25,000 Ukrainian soldiers and 10,000 Russian troops and trigger a refugee flood of up to five million people, mainly into Poland</span></u></strong><span data-dcnode-id="1628" instrument_node="">, the officials added. On top of the potential human cost, Ukraine fears further damage to its already struggling economy. And if Moscow attacks Ukraine it could face retaliation over the Nord Stream 2 pipeline — set to double natural gas supplies from Russia to Germany — with Berlin threatening to block it.</span></p><span data-dcnode-id="1626" instrument_node="">
</span><h4 data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Turkey will support NATO over Russia on the Ukraine</span></h4><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1616"><strong data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">WION, 2-6,</span></strong><span data-dcnode-id="1620" instrument_node=""> 22, </span><a data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wionews.com/world/erdogan-reiterates-turkeys-determination-to-support-ukraines-territorial-integrity-450943"><span data-dcnode-id="1619" instrument_node="">https://www.wionews.com/world/erdogan-reiterates-turkeys-determination-to-support-ukraines-territorial-integrity-450943</span></a><span data-dcnode-id="1617" instrument_node="">, Erdogan reiterates Turkey’s determination to support Ukraine’s territorial integrity</span></p><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1600"><span data-dcnode-id="1614" instrument_node="">He reiterated Turkey’s determination to support Ukraine’s territorial integrity added that US President Joe Biden “has not yet been able to demonstrate a positive approach”. His comments come days after his visit to his counterpart Ukrainian President Volodymyr Zelensky in Kyiv. </span><strong data-dcnode-id="1611"><u data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Erdogan has tried to position Turkey, which is a member of the NATO defence </span></u></strong><span data-dcnode-id="1610" instrument_node="">alliance, as a neutral mediator close to both Moscow and Kyiv. Also see | Beyond full scale attack on Ukraine, what are other risky options does Russia have? </span><strong data-dcnode-id="1606"><em data-dcnode-id="1607"><u data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Turkey has good ties with Kyiv and Moscow but has said it would do what is necessary as a NATO member if Russia invades</span></u></em></strong><span data-dcnode-id="1605" instrument_node="">. Russia has denied plans to invade Ukraine amid concern by many Western nations over its build up of more than 100,000 troops near the border, but has demanded sweeping security guarantees from the West and says it could take unspecified military measures if its demands are not met. With growing nervousness in Eastern Europe over Russia’s buildup, much attention is focused on its placement of thousands of troops in Belarus, which shares a border not only with Ukraine but also with three NATO nations, Poland, Lithuania and Latvia </span><strong data-dcnode-id="1602"><u data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">Erdogan and Zelensky also signed an agreement expanding the production of parts in Ukraine for a Turkish combat drone</span></u></strong><span data-dcnode-id="1601" instrument_node=""> whose sale to Kyiv has angered Moscow. Ankara has previously offered to help to defuse the standoff and Turkish diplomatic sources have said both Russia and Ukraine were open to the idea. Turkey has opposed the sanctions threatened by other NATO members in response to a military incursion by Russia</span></p><span data-dcnode-id="1599" instrument_node="">
</span><h4 data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Turkey mediated talks fail</span></h4><span data-dcnode-id="1596" instrument_node="">
</span><p data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">Nicholas Morgan, 2-6, 22, Erdoğan’s uphill battle to make peace in the Donbas, https://ahvalnews.com/turkey-ukraine/erdogans-uphill-battle-make-peace-donbas</span></p><span data-dcnode-id="1593" instrument_node="">
</span><p data-dcnode-id="1535"><span data-dcnode-id="1592" instrument_node="">For months, the United States and NATO warned that Russia was preparing for a military offensive into Ukraine as Russian military units and equipment from as far away as Siberia mass along their border. Moscow denies it is contemplating invasion, but President Putin has demanded that the West offer Russia security guarantees that include a withdrawal of NATO forces to its 1997 borders and formally renounce any possibility of Ukraine joining the alliance. NATO has refused and successive rounds of talks between Washington and Moscow have failed to achieve any breakthroughs. If a war was to take place to its north, Turkey would be forced into a precarious situation because of its good ties with Russia and Ukraine. Before heading to Ukraine, Erdoğan said that any “negative developments” in the region would “not be right for us” and he reiterated a willingness to mediate between his two partners. But despite sincere hopes to resolve the conflict in Ukraine’s Donbas, the Turkish leader has taken upon himself a tall task with uncertain prospects for success. Though maligned by the West for his good relations with Putin, for Zelensky, this may actually work as an advantage for negotiations. The first and last time Zelensky met with Putin was in December 2019 as part of negotiations of the Normandy Format in Paris alongside the leaders of France and Germany, but the Ukrainian president has spoken of his readiness to resume talks with Russia. However, Putin, who is said to not view Zelensky as an equal partner, has not yet been receptive to any talks. “The Ukrainian president is trying to use every opportunity to arrange a meeting with Putin in order to avoid a war,” Petro Burkovskyi, a senior fellow at the Ilko Kucheriv Democratic Initiatives Foundation in Kyiv, told Ahval. “Turkey is a NATO member, U.S. ally, and a Russian rival that is treated with respect by Putin. Zelensky’s advisors hope that this can help.” But bringing all the parties of the conflict to the negotiating table, including the separatist leadership in Donbas, promises to be a challenge. </span><strong data-dcnode-id="1589"><u data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Turkish media reports that the next meeting of the Trilateral Contact Group (TC</span></u></strong><span data-dcnode-id="1588" instrument_node="">G), the forum responsible for facilitating peace in Donbas, </span><strong data-dcnode-id="1585"><u data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">will take place in Istanbul </span></u></strong><span data-dcnode-id="1584" instrument_node="">at an unspecified date, something that has not been confirmed by Russia or Ukraine. </span><strong data-dcnode-id="1581"><u data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">There are also technical issues </span></u></strong><span data-dcnode-id="1580" instrument_node="">that Turkey would need to solve before any negotiations. For instance, Sergiy Garmash, a Ukrainian delegate to the TCG, said </span><strong data-dcnode-id="1577"><u data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">that moving the forum to Istanbul was not well-received by pro-Russian separatists, who complained that visa problems could prevent them from going to Istanbul for talks. He added that the Russians also expressed that they would rather see them move to a city in eastern Ukraine or Moscow if they were to leave Minsk. On the presidential level,</span></u></strong><span data-dcnode-id="1576" instrument_node=""> the problems become more complicated. Officially, </span><strong data-dcnode-id="1573"><u data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Russia denies that it is a participant in the war in the Donba</span></u></strong><span data-dcnode-id="1572" instrument_node="">s, a position Moscow referred to when it rejected Erdoğan’s initial offer to host Putin and Zelensky together. If Erdoğan’s invitation was accepted, </span><strong data-dcnode-id="1569"><u data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Putin would be acting in contradiction to Russia’s stance of being uninvolved in the Donbas</span></u></strong><span data-dcnode-id="1568" instrument_node="">, said Dr. Kerim Has, a Moscow-based analyst on Turkish-Russian relations and Russian foreign policy. </span><strong data-dcnode-id="1565"><u data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">“Moscow rejects the idea of sitting around the table with Kyiv to discuss the Donbas as it will strengthen the perception that is ‘de jure’ the opposite side of the c</span></u></strong><span data-dcnode-id="1564" instrument_node="">onflict,” Has explained to Ahval. Before heading to Ukraine, Erdoğan told reporters that Putin had agreed to visit Turkey following the latter’s trip to China for the opening ceremony of the Winter Olympics in Beijing. The Kremlin acknowledged this, but conditioned any visit by Putin on the COVID-19 situation in Turkey before a date is confirmed. </span><strong data-dcnode-id="1561"><u data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">On Friday, Putin’s press secretary Dmitriy Peskov stressed that “there is no understanding” or “practical discussion” on Putin attending any talks with Zelensky in Turkey. </span></u></strong><span data-dcnode-id="1560" instrument_node="">“The President says that he is ready to meet with anyone for the sake of business, but this requires an understanding of what is the output and what will be discussed. There is no such understanding yet,” said Peskov. Daria Isachenko, a research fellow at the Centre for Applied Turkey Studies of the German Institute for International and Security Affairs (SWP) in Berlin, said that </span><strong data-dcnode-id="1557"><u data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">it was possible that Turkey would play a role in hosting TCG talks, but expressed doubt on whether Erdoğan would succeed in bringing Putin and Zelensky into the same room. Putin’s positions on Donbas as well as Crimea are “not unknown to Erdoğa</span></u></strong><span data-dcnode-id="1556" instrument_node="">n”, she said, adding that it was imperative for Turkey to not risk upsetting Russia. “It is not in the interests of Turkey to antagonise Russia, nor the other way around,” Isachenko told Ahval. “Both sides are keen to keep their working relationship going as it covers not only bilateral ties such as nuclear energy, but also conflict management in the Middle East and South Caucasus.” For the last five years, Ankara and Moscow have conducted a complicated dance of competition and cooperation in both regions, backing opposing sides only to later cut deals that secure their interests. But Ukraine is no ordinary arena for competition between the two, given the personal importance it carries for Putin as well as the country being at the heart of what Russia perceives as its sphere of influence. Has, the Moscow-based expert, said that </span><strong data-dcnode-id="1553"><u data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Russia is disinclined to accept a further role for Turkey in Ukraine because of its overall desire to limit Turkish involvement in the realm of the former Soviet Union, a point echoed by members of the Russian State Duma. “Russia doesn’t want to include Erdoğan and his ambitions more into the post-Soviet space after the second Karabakh war and play any role in facilitating [Turkey’s] influence in its ‘backyard’,” </span></u></strong><span data-dcnode-id="1552" instrument_node="">said Has. Russia, he continued, is conscientious of Erdoğan’s domestic political woes and does not want him to “use Russia’s problems as an instrument to strengthen his own image” back home. </span><strong data-dcnode-id="1549"><u data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">“I don’t think Moscow is willing to give Erdoğan such credit</span></u></strong><span data-dcnode-id="1548" instrument_node="">,” the analyst added. </span><strong data-dcnode-id="1545"><u data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Even if Erdoğan is ultimately successful in bringing together Putin and Zelensky, it remains unclear what he hopes to achieve beyond talks under his watch</span></u></strong><span data-dcnode-id="1544" instrument_node="">. Since last year, Erdoğan said he believes that a solution must come through implementation of the existing Minsk Agreement, a point he repeated during his visit to Ukraine. This position is seen as being tilted in Russia’s favour. Zelensky’s advisors said that they would look for ways to implement the deal. However, Ukraine has consistently balked at provisions that call for constitutional changes that they see as a backdoor for Russian influence over its domestic affairs. </span><strong data-dcnode-id="1541"><u data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">If Turkey does succeed in convincing Ukraine to move ahead on Minsk as Russia hopes, Burkovskyi warned that any arrangement that resembles previous Russian-Turkish dealmaking would come at the risk of leaving Ukraine “without guarantees that Russia would not start everything again”. </span></u></strong><span data-dcnode-id="1540" instrument_node="">Ultimately</span><strong data-dcnode-id="1537"><u data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">, Erdoğan may also be running into the limits of his influence to alter the situation. To many observers,</span></u></strong><span data-dcnode-id="1536" instrument_node=""> Russia’s threats to Ukraine are less central than its desire to renegotiate the entire post-Cold War security architecture in Europe. This is something the Kremlin believes can only be achieved through concessions from the United States as the West’s leading power. As for Turkey, Isachenko said that Russia’s main expectation of it would be to continue to remain neutral. “The current position of Moscow now seems to stick to its ultimatum on security guarantee questions negotiating with the United States and hoping that as far as Donbas is concerned, Kyiv’s Western partners would be doing something to convince Ukraine to implement the Minsk agreements,” said Isachenko</span></p><span data-dcnode-id="1534" instrument_node="">
</span><h4 data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">New Turkey-Ukraine drone deal and free trade agreement</span></h4><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Charlotte Pence-Bond, 2-3, 22, Ukraine, Turkey Secure Deals Amid Russia Tension, https://www.dailywire.com/news/ukraine-turkey-secure-deals-amid-russia-tension</span></p><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1519"><strong data-dcnode-id="1525"><u data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">The leaders of Ukraine and Turkey met on Thursday amid ongoing escalating tension between Ukraine and Russia, signing a free-trade deal and securing an agreement for Ukraine to create Turkish armed drones.</span></u></strong><span data-dcnode-id="1524" instrument_node="">Turkish President Recep Tayyip </span><strong data-dcnode-id="1521"><u data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">Erdogan proposed to mediate discussions between Russia and Ukraine.</span></u></strong><span data-dcnode-id="1520" instrument_node=""> Erdogan said Turkey was “prepared to undertake its part in order to end the crisis between two friendly nations that are its neighbors in the Black Sea.” “I have stressed that we would be happy to host a summit meeting at a leadership level or technical level talks,” Erdogan said hours of discussion with Ukrainian President Volodymyr Zelensky. “Instead of fueling the fire, we act with the logical aim of reducing the tensions.” “We will continue to support the sovereignty and territorial integrity of Ukraine, including Crimea,” Erdogan said after a signing ceremony in Kyiv. When Erdogan left the Mariinsky Palace in Kyiv, he turned toward the Ukrainian honor guard and, speaking Ukrainian, said, “Glory to Ukraine!” The honor guard responded with the traditional phrase, “Glory to heroes!” The Wall Street Journal reported: Bilateral trade between Ankara and Kyiv has grown sharply in recent years, jumping 60% in 2021 from a year earlier to $7.5 billion. The free-trade agreement signed during Mr. Erdogan’s visit to Kyiv aims to increase bilateral trade to $10 billion, the Turkish president said. In a joint briefing, Ukrainian President Volodymyr Zelensky praised the deal to broaden manufacturing infrastructure for Turkish Bayraktar TB2 drones in Ukraine. “These are new technologies, new workplaces, and an increase in Ukraine’s ability to defend itself,” he said. Ukraine’s Defense Minister Oleksii Reznikov told Reuters that the drones agreement created “favourable conditions for Turkish manufacturers to build a drone factory in Ukraine so that we can produce the entire line of drones and get their high technologies.” “I would like to thank President Erdogan for his initiative to become a mediator between Ukraine and Russia on the way to ending the war,” Zelensky said. The two leaders did not provide specifics about their discussions regarding Russia and reportedly did not answer questions. In the past, Erdogan created tension in the West after deciding in 2017 to purchase the S-400 air-defense system from Russia. However, Erdogan has reportedly been attempting to improve relationships with the United States, as well as Saudi Arabia, the United Arab Emirates, and Israel. “All this is prompted by Erdogan’s need to show the Turkish public that Turkey is a regional, even a global power,” a former senior Turkish official said, per the Journal. “The Ukraine mediation effort is another link in the chain.” On Thursday, U.S. officials said they had gathered intelligence regarding Russia conspiring to utilize a false video in order to invent an excuse to invade Ukraine. The New York Times reported that the U.S. is hoping to ruin the strategy by publicizing it</span></p><span data-dcnode-id="1518" instrument_node="">
</span><h4 data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Turkey supports NATO on the Ukraine and opposes Russia on key issues</span></h4><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Daily Sabah, 2-1, 22, Turkey’s dialogue with Russia, Ukraine continues: Defense Minister, https://www.dailysabah.com/politics/diplomacy/turkeys-dialogue-with-russia-ukraine-continues-defense-minister</span></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1495"><strong data-dcnode-id="1509"><u data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Turkey’s dialogue with both Moscow and Kyiv continues</span></u></strong><span data-dcnode-id="1508" instrument_node=""> amid tensions between the two countries, Defense Minister Hulusi Akar said Monday, underlining that Ankara also upholds its NATO responsibilities within this scope. “The status of the straits (regarding the rules on the passage of ships of the Black Sea and non-Black Sea countries) set by the convention benefits all parties. In the current circumstances, there is no question of abandoning this convention</span><strong data-dcnode-id="1505"><u data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">. As for the Black Sea dialogue, Turkey is doing everything it should. We will continue our dialogue with Russia and Ukraine and we will fulfill our NATO obligatio</span></u></strong><span data-dcnode-id="1504" instrument_node="">ns,” Akar was quoted by Turkish broadcaster TRT as saying. Akar elaborated on the situation in the Black Sea region, saying Turkey’s dialogue with both Ukraine and Russia continues while it undertakes its responsibilities within NATO as part of the alliance. He underlined that the Montreux Convention of 1936 regulated the use of the Turkish Straits and the transit of naval warships to the Black Sea is essential to security and stability in the region. Referring to the latest tensions between Russia and Ukraine and the West, he warned that this posed the danger of uncontrolled escalation. “As such, we, as Turkey, urge all parties concerned to remain calm and engage in coordination, cooperation and dialogue,” he added. The U.S. with its European allies has been warning that Russia is setting the stage for an invasion of Ukraine and has pre-positioned over 100,000 troops on its border with the former Soviet republic alongside significant artillery and tank deployments. Moscow has denied preparing for a military offensive, saying its troops are there for regular exercises. Turkey has been closely following the developments and is in close contact with both Kyiv and Moscow. President Recep Tayyip Erdoğan had said Turkey could mediate between the neighbors amid increasing tensions in the region and recently announced a visit to Ukraine on Feb. 3 to help defuse tensions; likewise, Putin said he would visit Turkey upon Erdoğan’s invitation when the pandemic situation and schedules allow. </span><strong data-dcnode-id="1501"><u data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">NATO member Turkey has friendly ties with both Kyiv and Moscow but opposes Russian policies in Syria and Libya, as well as its annexation of the Crimean Peninsula in 2014. </span></u></strong><span data-dcnode-id="1500" instrument_node="">Ky</span><strong data-dcnode-id="1497"><u data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">iv has also bought Turkish drones to possibly use against Russian-backed forces in eastern Ukraine, angering Moscow, and agreed with Ankara to manufacture the drones locally this year. </span></u></strong><span data-dcnode-id="1496" instrument_node="">Since 2014, Russia has been supporting separatist rebels in eastern Ukraine, a policy it has maintained for the past eight years. In response to Russia’s actions, NATO enhanced its presence in the eastern bloc, with four multinational battalion-size battle groups deployed to Estonia, Latvia, Lithuania and Poland on a rotational basis.</span></p><span data-dcnode-id="1494" instrument_node="">
</span><h4 data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Turkey aligned with NATO on core issues</span></h4><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Middle East Monitor, 1-31, 22, Turkey is ‘credible and important ally,’ says NATO official, https://www.middleeastmonitor.com/20220131-turkey-is-credible-and-important-ally-says-nato-official/</span></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1471"><strong data-dcnode-id="1485"><u data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">A NATO official has confirmed Turkey’s role as a “credible and important” ally, dispelling rumours of Ankara’s expulsion from the alliance. </span></u></strong><span data-dcnode-id="1484" instrument_node="">According to the London-based news outlet, Middle East Eye, </span><strong data-dcnode-id="1481"><u data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">a European NATO official told it on the condition of anonymity that “Turkey is showing itself to be a credible and important ally” during the ongoing Ukraine crisis. </span></u></strong><span data-dcnode-id="1480" instrument_node="">As tensions continue to mount in Ukraine between NATO and Russia, Turkey has maintained its largely neutral and mediatory stance, despite having supplied Kyiv with armed combat drones and warning Moscow against conducting an invasion of the country. Earlier this month, reports emerged that the Turkish government’s offer to mediate between Russia and Ukraine was being considered by the two adversaries. </span><strong data-dcnode-id="1477"><u data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">The unnamed NATO official praised Ankara’s ability to hold its neutral position, saying, “You can see some elements of tension between countries in Europe [over Ukraine], but Turkey hasn’t been one of those actors”. They acknowledged that while “it doesn’t shy away from publicly presenting differences it might have with alliance members, when it comes to the hardcore part of NATO business, Turkey has not been a stumbling block.” </span></u></strong><span data-dcnode-id="1476" instrument_node="">The official’s comments contradict the view long held amongst many that Turkey is on the brink of expulsion from the alliance, as it has launched its own foreign policy initiatives by intervening in Syria and Libya, as well as clashing with fe
