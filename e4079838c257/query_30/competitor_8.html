</span><ul data-dcnode-id="1977" style="font-family:arial; font-size:small; color:#525252; margin-top:3px; margin-bottom:0px; margin-left:5px; padding-left:15px;" type="square"><span data-dcnode-id="1982" instrument_node="">
</span><li class="graylink" data-dcnode-id="1979"><a data-dcnode-id="1980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cs.gatestoneinstitute.org/18141/rusko-putin-nato"><span data-dcnode-id="1981" instrument_node="">Czech</span></a></li><span data-dcnode-id="1978" instrument_node="">

</span><div data-dcnode-id="1438" id="print_content_3"><div data-dcnode-id="1935" itemprop="description"><span data-dcnode-id="1968" instrument_node="">
</span><ul class="content_preface_bullets" data-dcnode-id="1937"><li data-dcnode-id="1965"><p data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">The Russian demands, which effectively require NATO to commit suicide, are so obviously outrageous and unmeetable that Western analysts are split over interpreting Russian President Vladimir Putin's motives. Some say he is using the impossible list of demands as a pretext to invade Ukraine. Others think he is playing a weak hand to try to divide the West and reorder Europe's security architecture in Russia's favor.</span></p></li><span data-dcnode-id="1964" instrument_node="">
</span><li data-dcnode-id="1958"><p data-dcnode-id="1959"><span data-dcnode-id="1963" instrument_node="">Germany appears to be the West's weak link the face of Russian pressure. On January 3, the German newspaper </span><i data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">Bild</span></i><span data-dcnode-id="1960" instrument_node=""> reported that Scholz is seeking "a new beginning" in relations with Moscow. This has alarmed smaller European countries which fear that Germany will reach an accommodation with Putin behind their backs.</span></p></li><span data-dcnode-id="1957" instrument_node="">
</span><li data-dcnode-id="1954"><p data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">"The Russian leader... believes he has a window of opportunity to act. He is worried that the risk of Kiev joining NATO will increase if a stronger U.S. leader... comes to power.... Regretfully, the Biden administration's 'experts,' like Obama's before them who fecklessly sought a 'reset' with Russia, are likely to fall into Putin's trap." — Rebekah Koffler, a Russian-born U.S. intelligence expert.</span></p></li><span data-dcnode-id="1953" instrument_node="">
</span><li data-dcnode-id="1950"><p data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">"A second Russian attack on Ukraine, should it happen, ought to serve as a long-overdue wake-up call for the West about Russia's intentions to establish an exclusive sphere of influence in Eastern Europe and assert Moscow's claims to exercising influence in Central Europe, within NATO's perimeter.... Europe's security would deteriorate dramatically. The zone of competition would shift from Eastern Europe to Central Europe and the Baltic states." — Andrew Michta, geopolitical analyst</span></p></li><span data-dcnode-id="1949" instrument_node="">
</span><li data-dcnode-id="1946"><p data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">"The West should immediately impose tough sanctions on Russia, provide serious defense assistance to Ukraine, demonstrate unambivalent support for Ukrainian sovereignty, and project moral and strategic resolve. Unfortunately, current trends and past behavior provide little cause for optimism that the 'free world' will rise to the challenge." — Anne Pierce, foreign policy expert</span></p></li><span data-dcnode-id="1945" instrument_node="">
</span><li data-dcnode-id="1942"><p data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">"Westerners do not seem to understand what is at stake. They think that only the fate of Ukraine is being decided, which is of less concern to them than that of Armenia.... They resemble those who in 1939 believed that Hitler's demands would be limited to Danzig. However, one only has to look at the texts proposed by Moscow to understand that the stakes are quite different." — Françoise Thom, French historian of Russia.</span></p></li><span data-dcnode-id="1941" instrument_node="">
</span><li data-dcnode-id="1938"><p data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">"In 1946-7 we knew that freedom was worth dying for, something that is obviously forgotten today. After Munich in 1938, the West was ashamed to have abandoned Czechoslovakia into Hitler's clutches. Today we are cowardly letting down Ukraine, but we do not even realize our dishonor, nor the danger of giving in to an aggressor. We are like the Byzantines who were discussing the sex of angels while the Ottoman forces were destroying the city walls." — Françoise Thom.</span></p></li></ul><span data-dcnode-id="1936" instrument_node="">
</span></div><span data-dcnode-id="1934" instrument_node="">
</span><div class="article_body itemprop_articlebody" data-dcnode-id="1534" itemprop="articleBody"><span data-dcnode-id="1933" instrument_node="">
</span><p data-dcnode-id="1932"></p><span data-dcnode-id="1931" instrument_node="">
</span><span data-dcnode-id="1930" instrument_node="">
</span><span data-dcnode-id="1923" instrument_node="">
</span><span data-dcnode-id="1921" instrument_node="">
</span><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="1919" style="max-width:100%;"><tbody data-dcnode-id="1920"><tr data-dcnode-id="1922"><td data-dcnode-id="1924" style="max-width:600px; border:1px solid black;"><img border="0" data-dcnode-id="1929" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gatestoneinstitute.org/pics/1937.jpg&amp;raw" style="max-width:100%;"><p data-dcnode-id="1926" style="font-size:82%; margin:4px 6px;"><span data-dcnode-id="1927" instrument_node="">Russia has threatened war if the United States and its NATO allies fail to comply — unconditionally — with sweeping demands for a new security arrangement in Europe. Western analysts are split over interpreting Russian President Vladimir Putin's motives. Some say he is using the impossible list of demands as a pretext to invade Ukraine. Others think he is playing a weak hand to try to divide the West and reorder Europe's security architecture in Russia's favor. (Photo by Mikhail Metzel/Sputnik/AFP via Getty Images)</span></p></td></tr></tbody></table><p data-dcnode-id="1918"></p><span data-dcnode-id="1917" instrument_node="">
</span><p data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">Russia has threatened war if the United States and its NATO allies fail to comply — unconditionally — with sweeping demands for a new security arrangement in Europe.</span></p><span data-dcnode-id="1914" instrument_node="">
</span><p data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">The demands, issued by the Russian Foreign Ministry, require the United States to remove its nuclear umbrella from Europe and allow Russia to reestablish its Soviet-era sphere of influence over Eastern Europe.</span></p><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">The Russian demands, which effectively require NATO to commit suicide, are so obviously outrageous and unmeetable that Western analysts are split over interpreting Russian President Vladimir Putin's motives. Some say he is using the impossible list of demands as a pretext to invade Ukraine. Others think he is playing a weak hand to try to divide the West and reorder Europe's security architecture in Russia's favor.</span></p><span data-dcnode-id="1908" instrument_node="">
</span><p data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">Nearly all Western analysts agree: Putin is taking advantage of the weakness of U.S. President Joe Biden, divisions between the United States and Europe, disagreements within the European Union, and the fecklessness of the leaders of Europe's largest countries, particularly France and Germany.</span></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">On December 17, the Russian Foreign Ministry published two draft treaties: one between Russia and the United States, and the other between Russia and NATO.</span></p><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1897"><span data-dcnode-id="1901" instrument_node="">Russia's draft "</span><a data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mid.ru/ru/foreign_policy/rso/nato/1790818/%3Flang%3Den"><span data-dcnode-id="1900" instrument_node="">Treaty between the United States of America and the Russian Federation on Security Guarantees</span></a><span data-dcnode-id="1898" instrument_node="">" listed more than a dozen demands, including:</span></p><span data-dcnode-id="1896" instrument_node="">
</span><ul data-dcnode-id="1877"><li data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">NATO membership must be denied to all states of the former Union of Soviet Socialist Republics (USSR), including the Baltic states of Estonia, Latvia and Lithuania, which have been members of the alliance since 2004.</span></li><span data-dcnode-id="1893" instrument_node="">
</span><li data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">NATO is prohibited from expanding further eastward, including to countries such as Sweden and Finland.</span></li><span data-dcnode-id="1890" instrument_node="">
</span><li data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">The United States is prohibited from flying bombers or deploying warships, including within the framework of NATO, in areas outside of its national airspace and national territorial waters, respectively.</span></li><span data-dcnode-id="1887" instrument_node="">
</span><li data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">The United States is prohibited from deploying its armed forces or armaments, including within the framework of NATO, in any area where such deployment could be perceived by Russia as a threat to its national security.</span></li><span data-dcnode-id="1884" instrument_node="">
</span><li data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">The United States must remove all its nuclear weapons from Europe.</span></li><span data-dcnode-id="1881" instrument_node="">
</span><li data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">The United States is prohibited from deploying ground-launched intermediate-range and shorter-range missiles outside of its territory.</span></li><span data-dcnode-id="1878" instrument_node="">
</span></ul><span data-dcnode-id="1876" instrument_node="">
</span><p data-dcnode-id="1871"><span data-dcnode-id="1875" instrument_node="">Russia's draft "</span><a data-dcnode-id="1873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mid.ru/ru/foreign_policy/rso/nato/1790803/%3Flang%3Den"><span data-dcnode-id="1874" instrument_node="">Agreement on Measures to Ensure the Security of the Russian Federation and Member States of the North Atlantic Treaty Organization</span></a><span data-dcnode-id="1872" instrument_node="">" put forward additional demands:</span></p><span data-dcnode-id="1870" instrument_node="">
</span><ul data-dcnode-id="1854"><li data-dcnode-id="1865"><span data-dcnode-id="1869" instrument_node="">NATO member states are prohibited from deploying military forces to any country that became a member of the alliance after May 27, 1997, when NATO and Russia signed the </span><a data-dcnode-id="1867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/docu/comm/1997/970527/home.htm"><span data-dcnode-id="1868" instrument_node="">Founding Act on Mutual Relations</span></a><span data-dcnode-id="1866" instrument_node="">. This includes 14 countries that have become NATO members during the past 25 years: Albania, Bulgaria, Croatia, Czechia, Estonia, Hungary, Latvia, Lithuania, Montenegro, North Macedonia, Poland, Romania, Slovakia and Slovenia.</span></li><span data-dcnode-id="1864" instrument_node="">
</span><li data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">NATO is prohibited from deploying land-based intermediate- and short-range missiles to anywhere where such missiles can reach Russia.</span></li><span data-dcnode-id="1861" instrument_node="">
</span><li data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">NATO is prohibited from any further enlargement, including the accession of Ukraine as well as any other state.</span></li><span data-dcnode-id="1858" instrument_node="">
</span><li data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">NATO is prohibited from military cooperation with Ukraine as well as other states in Eastern Europe, the South Caucasus and in Central Asia.</span></li><span data-dcnode-id="1855" instrument_node="">
</span></ul><span data-dcnode-id="1853" instrument_node="">
</span><p data-dcnode-id="1848"><span data-dcnode-id="1852" instrument_node="">Russian Deputy Foreign Minister Sergei Ryabkov </span><a data-dcnode-id="1850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//svpressa.ru/war21/article/319616/"><span data-dcnode-id="1851" instrument_node="">declared</span></a><span data-dcnode-id="1849" instrument_node=""> that both texts are part of a whole and are not to be understood as being "a menu, where you can choose one or the other."</span></p><span data-dcnode-id="1847" instrument_node="">
</span><p data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">While Russia expects NATO and the United States to comply with its demands, Moscow, in return, has offered only a vague commitment to "not create conditions or situations that threaten the national security of the other parties." The draft treaty imposes no requirements for Moscow to redeploy Russian forces.</span></p><span data-dcnode-id="1844" instrument_node="">
</span><p data-dcnode-id="1836"><span data-dcnode-id="1843" instrument_node="">On December 20, Konstantin Gavrilov, a Russian diplomat in Vienna, </span><a data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/russia-seeks-urgent-us-response-security-demands-2021-12-20/"><span data-dcnode-id="1842" instrument_node="">said</span></a><span data-dcnode-id="1840" instrument_node=""> that relations between Moscow and NATO had reached a "moment of truth." He </span><a data-dcnode-id="1838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/russia-seeks-urgent-us-response-security-demands-2021-12-20/"><span data-dcnode-id="1839" instrument_node="">added</span></a><span data-dcnode-id="1837" instrument_node="">:</span></p><span data-dcnode-id="1835" instrument_node="">
</span><blockquote data-dcnode-id="1831"><p data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">"The conversation needs to be serious and everyone in NATO understands perfectly well despite their strength and power that concrete political action needs to be taken, otherwise the alternative is a military-technical and military response from Russia."</span></p><span data-dcnode-id="1832" instrument_node="">
</span></blockquote><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1829" instrument_node="">On December 23, Putin, during a four-hour press conference, </span><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.euronews.com/2021/12/23/ukraine-and-covid-on-the-agenda-as-putin-delivers-annual-speech"><span data-dcnode-id="1828" instrument_node="">repeated</span></a><span data-dcnode-id="1826" instrument_node=""> his stance that "any further NATO movement to the east is unacceptable." A few days later, the Kremlin </span><a data-dcnode-id="1824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ria.ru/20211226/nato-1765541099.html"><span data-dcnode-id="1825" instrument_node="">described</span></a><span data-dcnode-id="1823" instrument_node=""> NATO expansion as "a matter of life and death" for Russia.</span></p><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1813"><span data-dcnode-id="1820" instrument_node="">On December 26, Russia </span><a data-dcnode-id="1818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rt.com/russia/544413-nato-sweden-finland-russia/"><span data-dcnode-id="1819" instrument_node="">warned</span></a><span data-dcnode-id="1817" instrument_node=""> Finland and Sweden against joining NATO. "It is quite obvious that the accession of Finland and Sweden to NATO would have serious military and political consequences that would require an adequate response from Russia," </span><a data-dcnode-id="1815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rt.com/russia/544413-nato-sweden-finland-russia/"><span data-dcnode-id="1816" instrument_node="">said</span></a><span data-dcnode-id="1814" instrument_node=""> Russian foreign ministry spokeswoman Maria Zakharova.</span></p><span data-dcnode-id="1812" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1811" instrument_node="">Russia hopes to obtain new security guarantees during a series of upcoming meetings with American and European officials. Russian Deputy Foreign Minister Sergei Ryabkov and U.S. Deputy Secretary of State Wendy Sherman are </span><a data-dcnode-id="1809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/senior-officials-lead-russia-us-security-talks-geneva-jan-10-2021-12-30/"><span data-dcnode-id="1810" instrument_node="">scheduled</span></a><span data-dcnode-id="1808" instrument_node=""> to lead bilateral security talks in Geneva on January 10.</span></p><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1798"><span data-dcnode-id="1805" instrument_node="">Russia is </span><a data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/senior-officials-lead-russia-us-security-talks-geneva-jan-10-2021-12-30/"><span data-dcnode-id="1804" instrument_node="">set</span></a><span data-dcnode-id="1802" instrument_node=""> to hold talks with NATO in Brussels on January 12, before a broader </span><a data-dcnode-id="1800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/senior-officials-lead-russia-us-security-talks-geneva-jan-10-2021-12-30/"><span data-dcnode-id="1801" instrument_node="">meeting</span></a><span data-dcnode-id="1799" instrument_node=""> in Vienna on January 13 involving the Organization for Security and Cooperation in Europe (OSCE), which includes the United States and its NATO allies, as well as Russia, Ukraine and other former Soviet states.</span></p><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1792"><span data-dcnode-id="1796" instrument_node="">Meanwhile, Russia has </span><a data-dcnode-id="1794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsj.com/articles/russias-military-buildup-near-ukraine-is-an-open-secret-11641292202"><span data-dcnode-id="1795" instrument_node="">amassed</span></a><span data-dcnode-id="1793" instrument_node=""> an estimated 100,000 troops on Ukraine's eastern border amid fears of an imminent invasion.</span></p><span data-dcnode-id="1791" instrument_node="">
</span><h3 data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">Evaluating Russian Demands</span></h3><span data-dcnode-id="1788" instrument_node="">
</span><p data-dcnode-id="1780"><span data-dcnode-id="1787" instrument_node="">Françoise Thom, a renowned French historian of Russia, </span><a data-dcnode-id="1785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.desk-russie.eu/2021/12/30/what-does-the-russian-ultimatum.html"><span data-dcnode-id="1786" instrument_node="">wrote</span></a><span data-dcnode-id="1784" instrument_node=""> that Putin is trying to "bind NATO through the United States, the United States through NATO." She </span><a data-dcnode-id="1782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.desk-russie.eu/2021/12/30/what-does-the-russian-ultimatum.html"><span data-dcnode-id="1783" instrument_node="">added</span></a><span data-dcnode-id="1781" instrument_node="">: "There is nothing to negotiate, you have to accept everything as a whole."</span></p><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1771"><span data-dcnode-id="1778" instrument_node="">Thom, in a lengthy and incisive </span><a data-dcnode-id="1776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.desk-russie.eu/2021/12/30/what-does-the-russian-ultimatum.html"><span data-dcnode-id="1777" instrument_node="">analysis</span></a><span data-dcnode-id="1775" instrument_node=""> of the Russian demands, </span><a data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.desk-russie.eu/2021/12/30/what-does-the-russian-ultimatum.html"><span data-dcnode-id="1774" instrument_node="">described</span></a><span data-dcnode-id="1772" instrument_node=""> them as "an orchestrated blackmail":</span></p><span data-dcnode-id="1770" instrument_node="">
</span><blockquote data-dcnode-id="1736"><p data-dcnode-id="1762"><span data-dcnode-id="1769" instrument_node="">"The Russian blackmail is explicit and is directed at both the Americans and the Europeans. If the West does not accept the Russian ultimatum, they will have to face 'a military and technical alternative,' </span><a data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gazeta.ru/politics/2021/12/18_a_14331211.shtml"><span data-dcnode-id="1768" instrument_node="">according</span></a><span data-dcnode-id="1766" instrument_node=""> to Deputy Foreign Minister Alexander Grushko: 'The Europeans must also think about whether they want to avoid making their continent </span><a data-dcnode-id="1764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//russtrat.ru/analytics/22-dekabrya-2021-0010-7741"><span data-dcnode-id="1765" instrument_node="">the scene of a military confrontation</span></a><span data-dcnode-id="1763" instrument_node="">. They have a choice. Either they take seriously what is put on the table, or they face a military-technical alternative.'</span></p><span data-dcnode-id="1761" instrument_node="">
</span><p data-dcnode-id="1756"><span data-dcnode-id="1760" instrument_node="">"After the publication of the draft treaty, the possibility of a pre-emptive strike against NATO targets (similar to those that Israel inflicted on Iran), was </span><a data-dcnode-id="1758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vz.ru/opinions/2021/12/27/1135477.html"><span data-dcnode-id="1759" instrument_node="">confirmed</span></a><span data-dcnode-id="1757" instrument_node=""> by former Deputy Minister of Defense Andrei Kartapolov (Duma Defense Committee): 'Our partners must understand that the longer they drag out the examination of our proposals and the adoption of real measures to create these guarantees, the greater the likelihood that they will suffer a pre-emptive strike.'</span></p><span data-dcnode-id="1755" instrument_node="">
</span><p data-dcnode-id="1747"><span data-dcnode-id="1754" instrument_node="">"To make things clear Russia fired a 'salvo' of Zircon hypersonic missiles on December 24. Dmitry Peskov, the Kremlin spokesman, </span><a data-dcnode-id="1752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//m.lenta.ru/news/2021/12/26/tsrkn/"><span data-dcnode-id="1753" instrument_node="">commented</span></a><span data-dcnode-id="1751" instrument_node=""> on this event: 'Well, I hope that the notes [of December 17] will be more convincing.' Editorialist Vladimir Mozhegov </span><a data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vz.ru/opinions/2021/12/27/1135477.html"><span data-dcnode-id="1750" instrument_node="">added</span></a><span data-dcnode-id="1748" instrument_node="">: 'What are our arguments? First and foremost, of course, our most reliable allies — the army and the navy. To be more precise, the hypersonic Zircon missile (the 'carrier killer,' as it is affectionately called in the West), which makes it absurd for the United States to have a fleet of aircraft carriers. The impact of the Zircon cracks a destroyer like a nut. Several Zircons will inevitably sink an aircraft carrier. The Zircon simply does its job: it methodically shoots huge, clumsy aircraft carriers like a gun at cans.'</span></p><span data-dcnode-id="1746" instrument_node="">
</span><p data-dcnode-id="1738"><span data-dcnode-id="1745" instrument_node="">"An article in the digital newspaper Svpressa eloquently titled 'Putin's ultimatum: </span><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//svpressa.ru/war21/article/319616/"><span data-dcnode-id="1744" instrument_node="">Russia ... will bury all of Europe and two-thirds of the United States in 30 minutes</span></a><span data-dcnode-id="1742" instrument_node="">' dots the i's: 'The Kremlin will have to prove its position with deeds. It is probably only possible to force the 'partners' to sit at the negotiating table by coercion. Economically, the Russian Federation cannot compete with the West. There remains war.' Military expert Konstantin Sivkov believes that 'to bring the United States and NATO to the negotiating table, some kind of super weapon is needed to... demonstrate our determination to strike if NATO expands. After that, I can assure you that they [the West] will be afraid.... It is naive to rely on diplomatic procedures. [...] Russia's move is a signal that already radical measures are going to be taken. You refused, so </span><a data-dcnode-id="1740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//svpressa.ru/war21/article/319616/"><span data-dcnode-id="1741" instrument_node="">you will have yourselves to blame</span></a><span data-dcnode-id="1739" instrument_node="">...'"</span></p><span data-dcnode-id="1737" instrument_node="">
</span></blockquote><span data-dcnode-id="1735" instrument_node="">
</span><h3 data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Official Responses</span></h3><span data-dcnode-id="1732" instrument_node="">
</span><p data-dcnode-id="1727"><span data-dcnode-id="1731" instrument_node="">White House press secretary Jen Psaki </span><a data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/russia-unveils-security-guarantees-says-western-response-not-encouraging-2021-12-17/"><span data-dcnode-id="1730" instrument_node="">said</span></a><span data-dcnode-id="1728" instrument_node=""> that the United States would consult with its allies.</span></p><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1721"><span data-dcnode-id="1725" instrument_node="">Polish Foreign Ministry spokesperson Lukasz Jasina </span><a data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/russia-unveils-security-guarantees-says-western-response-not-encouraging-2021-12-17/"><span data-dcnode-id="1724" instrument_node="">added</span></a><span data-dcnode-id="1722" instrument_node="">: "Russia is not a member of NATO and doesn't decide on matters related to NATO."</span></p><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1715"><span data-dcnode-id="1719" instrument_node="">Ukraine's foreign ministry </span><a data-dcnode-id="1717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/russia-unveils-security-guarantees-says-western-response-not-encouraging-2021-12-17/"><span data-dcnode-id="1718" instrument_node="">said</span></a><span data-dcnode-id="1716" instrument_node=""> Kyiv had an "exclusive sovereign right" to run its own foreign policy, and only it and NATO could determine the relationship between them, including the question of Ukrainian membership.</span></p><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1713" instrument_node="">Finland, an officially neutral country which shares a border with Russia, underscored its right to seek NATO membership at any time. "Let it be stated once again," </span><a data-dcnode-id="1711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/28e104d4-bee1-4685-acd1-ff7cd0186ddf"><span data-dcnode-id="1712" instrument_node="">said</span></a><span data-dcnode-id="1710" instrument_node=""> Finland's president, Sauli Niinistö. "Finland's room to maneuver and freedom of choice also include the possibility of military alignment and of applying for NATO membership, should we ourselves so decide."</span></p><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1703"><span data-dcnode-id="1707" instrument_node="">Swedish Foreign Minister Ann Linde </span><a data-dcnode-id="1705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.euractiv.com/section/politics/short_news/sweden-firmly-rejects-russias-call-for-safeguards-against-natos-eastward-expansion/"><span data-dcnode-id="1706" instrument_node="">added</span></a><span data-dcnode-id="1704" instrument_node="">:</span></p><span data-dcnode-id="1702" instrument_node="">
</span><blockquote data-dcnode-id="1698"><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">"We must have a rules-based world order, where we have international law and each country has the right to make its own security policy choices. Rejecting any future expansion of NATO will reduce the opportunities to make independent political choices."</span></p><span data-dcnode-id="1699" instrument_node="">
</span></blockquote><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">Germany appears to be the West's weak link the face of Russian pressure. German Chancellor Olaf Scholz wants to reset relations with Moscow and is planning a face-to-face meeting with Putin sometime this January.</span></p><span data-dcnode-id="1694" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1693" instrument_node="">On January 3, the German newspaper </span><i data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Bild</span></i><span data-dcnode-id="1690" instrument_node=""> </span><a data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bild.de/bild-plus/politik/inland/politik-inland/kanzler-gegen-gruene-und-eu-scholz-macht-russlandpolitik-zur-chefsache-78702006%2Cview%3DconversionToLogin.bild.html"><span data-dcnode-id="1689" instrument_node="">reported</span></a><span data-dcnode-id="1687" instrument_node=""> that Scholz is seeking "a new beginning" in relations with Moscow. This has alarmed smaller European countries which fear that Germany will reach an accommodation with Putin behind their backs. In an interview with </span><i data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Bild</span></i><span data-dcnode-id="1684" instrument_node="">, former Estonian President Toomas Hendrik Ilves </span><a data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bild.de/politik/ausland/politik-ausland/auf-kuschelkurs-mit-putin-und-xi-auslandspresse-rueffelt-scholz-aussenpolitik-78721926.bild.html"><span data-dcnode-id="1683" instrument_node="">said</span></a><span data-dcnode-id="1681" instrument_node="">:</span></p><span data-dcnode-id="1679" instrument_node="">
</span><blockquote data-dcnode-id="1675"><p data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">"Everyone saw [German Foreign Minister] Annalena Baerbock and hoped that she could shift the German foreign policy focus to human rights and the observance of basic values. Europe basically hoped that the new government would mean an end to mercantilism, but then Mr. Scholz took over the helm. What we see now is unfortunately more of what we already know and not a good start to his term in office and not a good sign for European unity."</span></p><span data-dcnode-id="1676" instrument_node="">
</span></blockquote><span data-dcnode-id="1674" instrument_node="">
</span><h3 data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Select Commentary</span></h3><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1663"><span data-dcnode-id="1670" instrument_node="">Former NATO Secretary-General Anders Fogh Rasmussen, in an opinion article published by </span><i data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Politico</span></i><span data-dcnode-id="1667" instrument_node="">, </span><a data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.eu/article/russia-nato-vladimir-putin-ukraine/"><span data-dcnode-id="1666" instrument_node="">warned</span></a><span data-dcnode-id="1664" instrument_node=""> that Putin is seeking Russian control over the security of Central and Eastern Europe:</span></p><span data-dcnode-id="1662" instrument_node="">
</span><blockquote data-dcnode-id="1643"><p data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">"Under the new Russian proposals, NATO would have to seek consent from Moscow to deploy troops in Central and Eastern Europe, refrain from 'any military activity' across Eastern Europe, the southern Caucuses and Central Asia, and halt any NATO drills near Russia. The agreement also demands a written guarantee that Ukraine will not be offered NATO membership, and a draft treaty with the United States would ban it from sending warships and aircrafts to 'areas where they can strike targets on the territory of the other party,' like the Baltics and the Black Sea.</span></p><span data-dcnode-id="1659" instrument_node="">
</span><p data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">"This is not a serious proposal from a man who wants peace.</span></p><span data-dcnode-id="1656" instrument_node="">
</span><p data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">"Putin is skilled at creating crises only to later extinguish them, like a firefighter trying to douse his own arson attack, and by threatening to invade Ukraine, he has calculated that the U.S. and other Western powers might negotiate directly with the Kremlin — potentially over their Eastern European and Baltic allies — offering concessions and allowing him to maintain influence over former Soviet countries in exchange for peace.</span></p><span data-dcnode-id="1653" instrument_node="">
</span><p data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">"Putin plays a bad hand well — but his tactics will only work if we fold. And it's time for NATO to call Putin's bluff.</span></p><span data-dcnode-id="1650" instrument_node="">
</span><p data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">"Under no circumstances should the U.S. or NATO give commitments on future enlargement, real or de facto.... NATO cannot have an open-door policy on enlargement in which it continues to allow Putin to act as the doorman.</span></p><span data-dcnode-id="1647" instrument_node="">
</span><p data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">"NATO cannot negotiate down the barrel of a gun. And if we back down now, that signal will be heard loud and clear by both the democracies that rely on us, and the autocrats who lament and fear our freedom."</span></p><span data-dcnode-id="1644" instrument_node="">
</span></blockquote><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1641" instrument_node="">Rebekah Koffler, a Russian-born U.S. intelligence expert, </span><a data-dcnode-id="1639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foxnews.com/opinion/russia-ukraine-putin-biden-nato-rebekah-koffler"><span data-dcnode-id="1640" instrument_node="">argued</span></a><span data-dcnode-id="1638" instrument_node=""> that the evidence is overwhelming that Russia is about to invade Ukraine, and that Putin was taking advantage of the weakness of the United States under President Joe Biden:</span></p><span data-dcnode-id="1636" instrument_node="">
</span><blockquote data-dcnode-id="1626"><p data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">"The Russian leader... believes he has a window of opportunity to act. He is worried that the risk of Kiev joining NATO will increase if a stronger U.S. leader...comes to power. He also knows that the Pentagon is only beginning its transition from counter-terrorism operations onto a new footing focused on major states such as China and Russia.</span></p><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">"Russian troops are primed to fight in the cold, as they always have been, and Putin likely believes the West won't wade into the snow to help Ukraine. Emboldened by his ability to blindside the West, such as by previously invading Georgia and taking Crimea, and by extorting concessions from Joe Biden, Putin is positioning to outmaneuver Washington.</span></p><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">"Regretfully, the Biden administration's 'experts,' like Obama's before them who fecklessly sought a 'reset' with Russia, are likely to fall into Putin's trap."</span></p><span data-dcnode-id="1627" instrument_node="">
</span></blockquote><span data-dcnode-id="1625" instrument_node="">
</span><p data-dcnode-id="1620"><span data-dcnode-id="1624" instrument_node="">Steven Pifer, a foreign policy expert at the Brookings Institution, </span><a data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brookings.edu/blog/order-from-chaos/2021/12/21/russias-draft-agreements-with-nato-and-the-united-states-intended-for-rejection/"><span data-dcnode-id="1623" instrument_node="">wrote</span></a><span data-dcnode-id="1621" instrument_node=""> that the substance of the Russian demands, and the way they were publicized, suggest that Putin is not serious about negotiating with the West:</span></p><span data-dcnode-id="1619" instrument_node="">
</span><blockquote data-dcnode-id="1615"><p data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">"The unacceptable provisions in the two draft agreements, their quick publication by the Russian government, and the peremptory terms used by Russian officials to describe Moscow's demands raise concern that the Kremlin may want rejection. With large forces near Ukraine, Moscow could then cite that as another pretext for military action against its neighbor."</span></p><span data-dcnode-id="1616" instrument_node="">
</span></blockquote><span data-dcnode-id="1614" instrument_node="">
</span><p data-dcnode-id="1609"><span data-dcnode-id="1613" instrument_node="">Veteran geopolitical analyst Andrew Michta, writing for the inestimable blog 19fourtyfive, </span><a data-dcnode-id="1611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.19fortyfive.com/2021/12/how-nato-must-respond-if-russia-invades-ukraine/"><span data-dcnode-id="1612" instrument_node="">argued</span></a><span data-dcnode-id="1610" instrument_node=""> that Putin is trying to divide NATO, humiliate the West and eject the United States from Europe:</span></p><span data-dcnode-id="1608" instrument_node="">
</span><blockquote data-dcnode-id="1595"><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">"Judging by the scope of the demands presented by Russia in the two so-called 'draft treaties' with NATO and the United States, respectively, Moscow must have no illusions that these would be accepted, for they would remake Euro-Atlantic security, creating conditions that would undermine NATO and America's ability to work with its allies. Putin may have already decided to move militarily, and calls for the West to negotiate could create a 'maskirovka' [Russian military deception] and in doing so provide a casus belli for Moscow, which would try to claim that Washington had refused to consider its terms.</span></p><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">"If the demands to negotiate have a larger aim it is to divide the alliance. Most importantly, the idea that Russia would need a written treaty guarantee to forestall Ukraine or Georgia's accession to NATO is absurd. Putin knows that so long as he occupies Donetsk and Luhansk in Ukraine and Abkhazia and South Ossetia in Georgia, the countries have no chance of making it into NATO, for a vote to enlarge the alliance would mean in effect a vote to go to war with Russia. Moscow's demand that the effective status quo be confirmed by treaty is thus nothing short of an attempt to humiliate the West.</span></p><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">"It is critical to consider what might happen should Russia invade Ukraine, and what might happen if we do not start thinking long-term about the impact of this crisis. A second Russian attack on Ukraine, should it happen, ought to serve as a long-overdue wake-up call for the West about Russia's intentions to establish an exclusive sphere of influence in Eastern Europe and assert Moscow's claims to exercising influence in Central Europe, within NATO's perimeter....</span></p><span data-dcnode-id="1599" instrument_node="">
</span><p data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">"Should the response to Russia's invasion of Ukraine be more of the same, Europe's security would deteriorate dramatically. The zone of competition would shift from Eastern Europe to Central Europe and the Baltic states, where the next round of Putin's demands could be a de facto 'Finlandization' of the Baltic States and pressure on the United States and NATO to remove military assets from the intermarium [Central and Eastern European countries] between the Baltic and the Black Seas, especially from Poland and Romania. In this scenario Putin would target Germany as his 'partner of preference,' with the expectation that by applying its energy weapon Moscow could eventually coax Berlin into a 'neo-Bismarckian' [German dominance of the European Union] accommodation that would in effect divide Europe into two spheres of influence, rendering the United States increasingly irrelevant to the overall strategic balance in Europe."</span></p><span data-dcnode-id="1596" instrument_node="">
</span></blockquote><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1593" instrument_node="">American foreign policy expert Anne Pierce </span><a data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonexaminer.com/restoring-america/patriotism-unity/putin-in-the-drivers-seat"><span data-dcnode-id="1592" instrument_node="">warned</span></a><span data-dcnode-id="1590" instrument_node=""> that the United States and Europe are at a "tipping point":</span></p><span data-dcnode-id="1588" instrument_node="">
</span><blockquote data-dcnode-id="1575"><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">"If they do not move decisively to stop Russia from taking over Ukraine, they will send a dangerous message to China vis-a-vis Taiwan, position Russia to coerce more former Soviet satellite states, and further ruin their international reputation, which is already in tatters after the betrayal of Afghanistan and failed diplomatic overtures to Iran. The window is closing to deter Russia from instigating major war or from conquering Ukraine by intensifying its current campaign of paramilitary assaults, disinformation, energy blackmail, and threats backed by escalation.</span></p><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">"It is nearly past time to alter Vladimir Putin's shrewd calculus and deny Russia crucial geopolitical territory and a defining anti-democratic victory. The West should immediately impose tough sanctions on Russia, provide serious defense assistance to Ukraine, demonstrate unambivalent support for Ukrainian sovereignty, and project moral and strategic resolve. Unfortunately, current trends and past behavior provide little cause for optimism that the 'free world' will rise to the challenge....</span></p><span data-dcnode-id="1582" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">"In the face of Russia's alarming advances and brazen disregard for international norms, Western leaders have hesitated to impose serious costs. They've issued 'expressions of concern,' agreed to treaties that give Russia an advantage, failed to enforce those treaties, haltingly imposed weak sanctions, and generally exhibited inertia that contrasts with Putin's drive....</span></p><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">"Recent Western responses to Russian aggression resemble the Munich peace process. In hopes of satisfying Adolf Hitler from wanting more, the West buried its head in the sand about Hitler's vast ambitions and escalating atrocities and forced Czechoslovakia into concessions that facilitated German occupation. History, and the failure of generous compromise to stop Putin so far, tells us where all this is likely to lead."</span></p><span data-dcnode-id="1576" instrument_node="">
</span></blockquote><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1573" instrument_node="">Françoise Thom, the French historian, </span><a data-dcnode-id="1571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.desk-russie.eu/2021/12/30/what-does-the-russian-ultimatum.html"><span data-dcnode-id="1572" instrument_node="">urged</span></a><span data-dcnode-id="1570" instrument_node=""> the West to wake up:</span></p><span data-dcnode-id="1568" instrument_node="">
</span><blockquote data-dcnode-id="1549"><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">"Reading the Western press, one is under the impression that nothing is happening. Westerners do not seem to understand what is at stake. They think that only the fate of Ukraine is being decided, which is of less concern to them than that of Armenia.... They resemble those who in 1939 believed that Hitler's demands would be limited to Danzig. However, one only has to look at the texts proposed by Moscow to understand that the stakes are quite different....</span></p><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">"In a word, Russia is demanding that NATO commit suicide, and that the United States be reduced to the role of a regional power.... As a result, Russia will have the upper hand in Europe. The countries of Western Europe are already taken for granted, with Moscow counting on the pool of collaborators that it has cultivated for years within the European ruling elites: it has just sent them a strong signal by appointing François Fillon [former prime minister of France] as director of the petrochemical giant Sibur. Deprived of American support, the 'Russophobic' countries that crystallize the resistance to Moscow's hegemony will only have to bow to the inevitable....</span></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">"Westerners must first perceive the situation as it is, however unpleasant it may be for our democratic states more accustomed to futile undertakings than to ensuring their preservation. To do this, we must extricate ourselves from the Russian lie....</span></p><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">"When Moscow talks about 'security' one must understand 'Russian domination' and 'impunity,' because that is what it is all about. In the Kremlin's view, everything it does not control can jeopardize the regime.... What Moscow fears in Ukraine is not a few NATO instructors, but freedom. It wants a disarmed Ukraine so that it can intimidate the Kiev rebels and set up a regime hated by its people, thus totally dependent on the Kremlin....</span></p><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">"If Russia succeeds in driving the United States out of Europe, it will soon feel threatened by the freedoms of Western European countries, and under the pretext of ensuring its 'security,' it will display the same determination in our country [France] as in its own to enslave the media, to eradicate democratic institutions and independent parties....</span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">"In 1946-7 we knew that freedom was worth dying for, something that is obviously forgotten today. After Munich in 1938, the West was ashamed to have abandoned Czechoslovakia into Hitler's clutches. Today we are cowardly letting down Ukraine, but we do not even realize our dishonor, nor the danger of giving in to an aggressor. We are like the Byzantines who were discussing the sex of angels while the Ottoman forces were destroying the city walls."</span></p><span data-dcnode-id="1550" instrument_node="">
</span></blockquote><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1536"><a data-dcnode-id="1545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.soerenkern.com/"><i data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Soeren Kern</span></i></a><i data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node=""> is a Senior Fellow at the New York-based</span></i><span data-dcnode-id="1542" instrument_node=""> </span><a data-dcnode-id="1539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gatestoneinstitute.org/"><i data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Gatestone Institute</span></i></a><i data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">.</span></i></p><span data-dcnode-id="1535" instrument_node="">
</span></div><span data-dcnode-id="1533" instrument_node="">

have been betrayed cant be financially compensated for that loss of security, influence, and economic clout. The majority effect is A loss of A stabilizing tool. A moral standard with benefits, that has been lost. If both sides wish to restore such commitments they are welcome to do so. It will take time and in the short term, the likely starting negotiating point will be where the balance of power border would be in an average war. The failure of respecting signed agreements also diminishes the notion of offering freedom of choice to citizens, which as I previously pointed out had already been disregarded by both sides.</span><br data-dcnode-id="1115"><span data-dcnode-id="1114" instrument_node="">Third is measuring the world from the perspective of net power, versus respecting the sovereign rights of all nations. This is simplistic, it leaves little room in A range, and wars are decided quickly, especially if one side is having difficulty accepting reality.</span><br data-dcnode-id="1113"><span data-dcnode-id="1112" instrument_node="">Sometimes wars are preferable for other reasons, which can influence the balance of power. A dictator may want A distraction, in the form of A new enemy for his people, but you always have the option of manning up and accepting the fight.</span><br data-dcnode-id="1111"><span data-dcnode-id="1110" instrument_node="">Interestingly with my current thinking that some peoples in the world, due to low IQ scores, or low access to Judaism, are inclined to tyrannies who are inclined to desire perpetual wars. This might be an unavoidable strength of the forces of evil. They have many weaknesses.</span><br data-dcnode-id="1109"><span data-dcnode-id="1108" instrument_node="">Finally, there is the issue often alluded to, that compromising with evil, signing agreements with evil, is an invitation to further aggression, that all agreements are meaningless with such an aggressive entity, which inclines the conclusion that our best course of action is to hold steadfast, and express our acceptance of death and war. As long as the door of communication is somewhat open between the free world and the world of the tyrannical dictatorships, the advantage for who undermines who more seems to go to the free nations more.</span><br data-dcnode-id="1107"><span data-dcnode-id="1106" instrument_node="">This notion of perpetual vigilance against evil implies A stupid relationship with foreign nations. It almost means diplomacy is meaningless, which it may be. If assertion of what is right over what is wrong is the deciding factor, then we westerners would need greater clarity as to the badness of the Russian regime. Not to say that there aren't already examples of press being arrested, but we need differentiation with our allies and other business partners who either arrest journalists, or have little to no free speech at all. Multiple youtube videos by Rebel news in Canada comes to mind. So does Erdogan, the BBC, CNN, Peter Schiff, the Israeli media, the entire EU and the entire muslim world, come to mind.</span><br data-dcnode-id="1105"><span data-dcnode-id="1104" instrument_node="">Obviously, some combinations of these 4 factors is possible, even probable. I think moral superiority has diminished for the west, which is compelling A new balance of power. There are champions of truth remaining in America, but they appear to be A minority power in America. If democracy makes them combat ineffective, then their existence has reduced meaning. Perhaps there is free speech released by the need to censor them.</span><br data-dcnode-id="1103"><span data-dcnode-id="1102" instrument_node="">People might vote for A candidate because they think the alternative is worse, but that does not mean they support the government's legitimacy.</span></p></div><span data-dcnode-id="1099" instrument_node="">

</span><div class="dont-break-out" data-dcnode-id="890"><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Russia has deep historical ties to the Ukraine going back 1400 years when Russia itself was founded in the Ukraine. The West including the U.S. particularly and the EU generally would be wise to keep their noses out of the Ukraine-Russian relationship. We shouldn't forget that the U.S. Obama Government staged and funded a recent coup that overthrew the Government of the Ukraine and replaced it with a Government which would be Pro Western and anti-Russian. We should also not forget that the Cuban crisis was initiated by John Kennedy who had ICBMs located in Turkey and directed at Moscow, the heart of Russia. The Russians have good reasons to view NATO as a Western military alliance which threatens their security. The West should be careful that it does not get into an accidental nuclear exchange with Russia over an unwise and a totally hypocritical foreign policy. The Earth will be a dead planet after any nuclear war.</span></p></div><span data-dcnode-id="889" instrument_node="">

</span><div class="dont-break-out" data-dcnode-id="855"><p data-dcnode-id="856"><span data-dcnode-id="867" instrument_node="">Very well said,</span><br data-dcnode-id="866"><span data-dcnode-id="865" instrument_node="">Glad to see reasonable people here and not only war-hawks.</span><br data-dcnode-id="864"><span data-dcnode-id="863" instrument_node="">Ukraine is not in NATO, and NATO has no business being there.</span><br data-dcnode-id="862"><span data-dcnode-id="861" instrument_node="">Ukraine and Russia are family, they will sort themselves out.</span><br data-dcnode-id="860"><span data-dcnode-id="859" instrument_node="">I hear the UK talking about their right to help; but they have even a stronger right, that is to refuse that help.</span><br data-dcnode-id="858"><span data-dcnode-id="857" instrument_node="">Donbas and Crimea and the entire south Ukraine are Russians in their vast majority and like to remain attached to Russia.</span></p></div><span data-dcnode-id="854" instrument_node="">

</span><div class="dont-break-out" data-dcnode-id="768"><p data-dcnode-id="769"><span data-dcnode-id="784" instrument_node="">Putin has nothing to worry about. He can do as he pleases. There won't be any response from the US at all except to capitulate to Russian demands.</span><br data-dcnode-id="783"><span data-dcnode-id="782" instrument_node="">NATO nations, especially the US, will negotiate and obtain some signatures on papers, but these are primarily for domestic consumption and it's unlikely Putin will ever actually abide by any agreements.</span><br data-dcnode-id="781"><span data-dcnode-id="780" instrument_node="">Usually these treaties just turn out to be empty promises. If NATO can't actually defend itself, it's time will have passed.</span><br data-dcnode-id="779"><span data-dcnode-id="778" instrument_node="">I certainly wouldn't expect any resistance by Germany, which is in process of completing the Nordstream 2 pipeline from Russia, and has just shut down a couple of nuclear plants, making itself even more energy dependent on Russia, and practically the first thing Biden did on entering the White House was removing Trump's holdup of Nordstream 2, saying it was almost completed already.</span><br data-dcnode-id="777"><span data-dcnode-id="776" instrument_node="">One thing you can say about Putin, he recognizes weakness when he sees it.</span><br data-dcnode-id="775"><span data-dcnode-id="774" instrument_node="">He is issuing ultimatums to NATO countries, which are really surrender documents.</span><br data-dcnode-id="773"><span data-dcnode-id="772" instrument_node="">Expect Versailles like agreements between Russia and NATO countries, while Ukraine, at least occupied territories such as Donbass and Crimea, will be signed over to Russia permanently, plus side agreements such as financial and trade concessions, essentially reparations to Russia from NATO and Ukraine.</span><br data-dcnode-id="771"><span data-dcnode-id="770" instrument_node="">The documents Russia is putting forward to NATO and Ukraine are surrender documents, make no mistake about what they are, and are essentially the blueprints for surrender of the West.</span></p></div><span data-dcnode-id="767" instrument_node="">

</span><div class="dont-break-out" data-dcnode-id="380"><p data-dcnode-id="381"><span data-dcnode-id="398" instrument_node="">Trump did attempt to rally the NATO countries, or at least persuade them to participate in their own defense.</span><br data-dcnode-id="397"><span data-dcnode-id="396" instrument_node="">The NATO nations were horrified, although some Baltic nations did increase defense spending to meet their pledge, but certainly not Germany, which was steadfast in its resistance to increasing expenditures too pay for its own defense, although it did commit troops to Afghanistan under NATO obligations. The German Air Force was largely incapable of combat, only 8 or 10 Eurofighters combat capable due to defective infrared imaging which wouldn't signal if the aircraft was under missile attack.</span><br data-dcnode-id="395"><span data-dcnode-id="394" instrument_node="">I haven't heard recently if deficiencies have been corrected.</span><br data-dcnode-id="393"><span data-dcnode-id="392" instrument_node="">Trump's attempts to persuade European countries to meet their pledge of 2% of GDP was met with widespread hostility, not from our enemies, but from our friends.</span><br data-dcnode-id="391"><span data-dcnode-id="390" instrument_node="">Why wouldn't Putin consider NATO a hopeless invalid incapable of defense, and now the Biden administration is committed to a nuclear agreement with Iran, the Iranians threatening annihilation of the US on a regular basis.</span><br data-dcnode-id="389"><span data-dcnode-id="388" instrument_node="">The US is not a reliable ally, deserting millions in Vietnam, then more recently in Afghanistan,</span><br data-dcnode-id="387"><span data-dcnode-id="386" instrument_node="">Even France recalled its diplomat from Washington after being left out of negotiations between Australia and the US on a 40 billion dollar nuclear submarine deal, while Australia had a prior agreement about buying submarines from France, the agreement being broken, apparently behind France's back, referred to as a "stab in the back".</span><br data-dcnode-id="385"><span data-dcnode-id="384" instrument_node="">Churchill apparently was able to rally the English to save themselves while their Army was in defeat on the very beaches of Dunkirk, but I wouldn't expect anyone to be able to persuade the European NATO partners if Putin massing 200,000 Russian troops on the border of Ukraine can't do it.</span><br data-dcnode-id="383"><span data-dcnode-id="382" instrument_node="">They deserve their fate, or rather doom.</span></p></div><span data-dcnode-id="379" instrument_node="">
