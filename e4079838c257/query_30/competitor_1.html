</span><h4 data-dcnode-id="2916"><span data-dcnode-id="2917" style="color: #1a206c; font-style: inherit;"><span data-dcnode-id="2918" instrument_node="">ATAUK is delighted to announce that NATO’s Public Diplomacy Division has agreed to sponsor a pioneering ATAUK project in the Leicester area.</span></span></h4><span data-dcnode-id="2915" instrument_node="">
</span><h4 data-dcnode-id="2912"><span data-dcnode-id="2913" style="color: #1a206c; font-style: inherit;"><span data-dcnode-id="2914" instrument_node="">ATAUK’s “Promoting NATO across communities” will, through interactive engagement, explain the broad scope of today’s international security challenges and NATO’s role in addressing them.</span></span></h4><span data-dcnode-id="2911" instrument_node=""> </span></div><span data-dcnode-id="2909" instrument_node="">

</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1883"><span data-dcnode-id="1920" instrument_node="">
</span><h5 data-dcnode-id="1909"><span data-dcnode-id="1919" instrument_node="">I, as President of the </span><strong data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">Atlantic Treaty Association, with the full support of the ATA Bureau after today’s special meeting,</span></strong><span data-dcnode-id="1916" instrument_node=""> </span><strong data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">firmly condemn the brutal attack</span></strong><span data-dcnode-id="1913" instrument_node=""> upon the </span><strong data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">sovereign nation of Ukraine</span></strong><span data-dcnode-id="1910" instrument_node="">.&nbsp;</span></h5><h5 data-dcnode-id="1904"><span data-dcnode-id="1908" instrument_node="">This attack is a clear and flagrant violation of </span><strong data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">international laws and treaties, </span></strong><span data-dcnode-id="1905" instrument_node="">including the UN Charter, the Helsinki Final Act, the Charter of Paris, the Budapest Memorandum, and the NATO-Russia Founding Act.&nbsp;&nbsp;</span></h5><h5 data-dcnode-id="1899"><span data-dcnode-id="1903" instrument_node="">This unprecedented </span><strong data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">act of aggression</span></strong><span data-dcnode-id="1900" instrument_node=""> by the Russian Federation, with the full support of Belarus, violates Ukraine’s territorial integrity. It is a shameful return to an era of war and destruction on the European continent, which threatens the fundamental security of the EuroAtlantic region. It is utterly without justification.&nbsp;</span></h5><h5 data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">I am sure our governments can rely on their national ATA bodies – dedicated to building public support for NATO – to support their firm condemnations of the ongoing violent attacks and their calls for an immediate cessation of military hostilities against civilian and military targets.&nbsp;</span></h5><h5 data-dcnode-id="1889"><span data-dcnode-id="1896" instrument_node="">Through consultations </span><strong data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">under Article 4 of the Washington Treaty </span></strong><span data-dcnode-id="1893" instrument_node="">allies should seek preventive, proportionate and non-escalatory measures. Our alliance’s </span><strong data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">commitment to Article 5 of the Washington Treaty is an iron-clad </span></strong><span data-dcnode-id="1890" instrument_node="">commitment to defend each other and our common values, our citizens, and our societies.</span></h5><h5 data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">I am sure that all ATA national bodies in member and partner countries will join me in declaring support and solidarity with the people of Ukraine and with Ukrainian civil society.&nbsp;&nbsp;&nbsp;</span></h5><h5 data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">As the Secretary General of NATO, Jens Stoltenberg stated, “this is the most dangerous moment in European Security for a Generation”.&nbsp; We must all in the Euro Atlantic community stand united and voice our condemnation of brutal acts of force and transgression.&nbsp;&nbsp;&nbsp;</span></h5><span data-dcnode-id="1884" instrument_node=""> </span></div><span data-dcnode-id="1882" instrument_node="">

</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1780"><span data-dcnode-id="1796" instrument_node="">
</span><h5 data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">The Atlantic Treaty Association of the United Kingdom (ATA UK) utterly condemns the invasion of Ukraine ordered by the regime of President Vladimir Putin.</span></h5><h5 data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">This illegal and unjustified invasion violates international law, agreements, norms and commitments.</span></h5><h5 data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Ukraine is an independent, democratic and peaceful country that poses no threat to anyone, yet the Putin regime has inflicted indiscriminate violence upon its people among whom there are both Ukrainian and Russian speakers, and people of many cultures and faiths.</span></h5><h5 data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">This barbaric invasion has killed, injured and displaced hundreds of thousands of innocent people, showing yet again the Putin regime’s willingness to resort to violence and disregard for human suffering.</span></h5><h5 data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">ATA UK supports the imposition of comprehensive sanctions on Russia and anyone supporting them, the provision of defensive military equipment to Ukraine and the supply of humanitarian assistance to relieve the dreadful suffering this invasion is causing.</span></h5><h5 data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">We pay tribute to the neighbouring countries which have opened their doors to the displaced.</span></h5><h5 data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">The international community must maintain its resolve in opposing the Putin regime’s appalling aggression and must re-evaluate its economic dependence upon that regime.</span></h5><span data-dcnode-id="1781" instrument_node=""> </span></div><span data-dcnode-id="1779" instrument_node="">

Voyager is the RAFs sole air-to-air refuelling (AAR) tanker and operates as a strategic air transport.  

The aircraft is in service as the Voyager KC.Mk 2, equipped with two underwing pods for refuelling fast jets, and as the Voyager KC.Mk 3, with an additional centreline hose for use by large aircraft." class="swiper-slide-image" data-dcnode-id="753" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//atauk.org/wp-content/uploads/2021/05/45168165-768x492.jpg&amp;raw"></figure></div><div class="swiper-slide swiper-slide-duplicate" data-dcnode-id="748" data-swiper-slide-index="24" style="width: 334.667px;"><figure class="swiper-slide-inner" data-dcnode-id="749"><img alt="Pictured, HMS Lancaster navigates the network of inlets surrounded by the Fjords of Norway

Guided by Norwegian Frigate THNoMS Thor Heyerdahl - HMS Lancaster anchored off in the aptly named Godfjorden 45 nautical miles inland from the Norwegian Sea.

During the route in, sailors were treated to magical views with snow-capped mountains, before setting out in the sub-zero temperatures to release the anchor in the Fjord.

HNoMS Thor Heyerdahl is one of four Fridtjof Nansen-class frigates which are the main surface combatant units of the Royal Norwegian Navy. They were built with a primary focus on anti-submarine warfare (ASW) but then evolved into a more multi-role vessel to include air defence." class="swiper-slide-image" data-dcnode-id="750" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//atauk.org/wp-content/uploads/2021/05/45168086-768x513.jpg&amp;raw"></figure></div><div class="swiper-slide swiper-slide-duplicate" data-dcnode-id="745" data-swiper-slide-index="25" style="width: 334.667px;"><figure class="swiper-slide-inner" data-dcnode-id="746"><img alt="Soldiers from 3 Rifles in their Jackals prepare for a Recce Screen during Exercise Saber Guardian in Romania.

The 3rd Battalion the Rifles (3 RIFLES) are deployed on the US Army Europe led Exercise Saber Guardian in Romania.  The Support and Headquarters Companies of 3 RIFLES are at Cincu Training Area, Romania, to partner with the UKs NATO Allies.

3 RIFLES are working alongside the 66th Turkish Brigade, as well as elements of the Italian, Spanish and US Armies.  The Exercise will see the soldiers of different nationalities conduct interoperability training together as part of the VJTF(L) (Very High Readiness Task Force (Land))

Despite COVID restrictions, the Army is still conducting demanding training overseas, with covid 19 precautions in place.  All personnel deployed had to have proof of a negative PCR covid test 72 hours before deployment." class="swiper-slide-image" data-dcnode-id="747" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//atauk.org/wp-content/uploads/2021/07/45168836-768x514.jpg&amp;raw"></figure></div><span data-dcnode-id="744" instrument_node="">

The 3rd Battalion the Rifles (3 RIFLES) are deployed on the US Army Europe led Exercise Saber Guardian in Romania.  The Support and Headquarters Companies of 3 RIFLES are at Cincu Training Area, Romania, to partner with the UKs NATO Allies.

3 RIFLES are working alongside the 66th Turkish Brigade, as well as elements of the Italian, Spanish and US Armies.  The Exercise will see the soldiers of different nationalities conduct interoperability training together as part of the VJTF(L) (Very High Readiness Task Force (Land))

Despite COVID restrictions, the Army is still conducting demanding training overseas, with covid 19 precautions in place.  All personnel deployed had to have proof of a negative PCR covid test 72 hours before deployment." class="swiper-slide-image" data-dcnode-id="668" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//atauk.org/wp-content/uploads/2021/07/45168836-768x514.jpg&amp;raw"></figure></div><span data-dcnode-id="665" instrument_node=""> </span><div class="swiper-slide swiper-slide-duplicate" data-dcnode-id="662" data-swiper-slide-index="0" style="width: 334.667px;"><figure class="swiper-slide-inner" data-dcnode-id="663"><img alt="F-35B Lightening Jets from 617 Sqn RAF carry out launches and landings from the flight deck of HMS Queen Elizabeth.

Strike Warrior is the third and last in a series of pre-deployment exercises undertaken by the Carrier Strike Group over the past year, each more demanding and complex than the last.

The Challenger 2 is a main battle tank, designed to destroy other tanks. It has been used by the British Army on operations in Bosnia and Herzegovina, Kosovo and Iraq, and has never experienced a loss at the hands of the enemy.  

Built in the UK by Vickers Defence Systems, now BAE Systems and Land Armaments, it was designed as a replacement to the Challenger 1 tank in 1986 and has been in service with the British Army since July 1994." class="swiper-slide-image" data-dcnode-id="661" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//atauk.org/wp-content/uploads/2021/05/45167102-768x513.jpg&amp;raw"></figure></div><div class="swiper-slide swiper-slide-duplicate" data-dcnode-id="656" data-swiper-slide-index="2" style="width: 334.667px;"><figure class="swiper-slide-inner" data-dcnode-id="657"><img alt="Pictured are members of B Company 2 Battalion the Parachute Regiment conducting a live fire Company attack on Salisbury Plain, as part of Exercise Wessex Storm.
