</span><div class="body" data-dcnode-id="1939"><span data-dcnode-id="1944" instrument_node="">
</span><div class="clearfix text-formatted field field--name-field-summary field--type-text-long field--label-hidden field__item" data-dcnode-id="1941"><p data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">The overarching question imparting urgency to this exploration is: Can U.S.-Russian contention in cyberspace cause the two nuclear superpowers to stumble into war? In considering this question we were constantly reminded of recent comments by a prominent U.S. arms control expert: At least as dangerous as the risk of an actual cyberattack, he observed, is cyber operations’ “blurring of the line between peace and war.” Or, as Nye wrote, “in the cyber realm, the difference between a weapon and a non-weapon may come down to a single line of code, or simply the intent of a computer program’s user.”</span></p></div><span data-dcnode-id="1940" instrument_node="">

</span><div class="clearfix text-formatted field field--name-field-summary field--type-text-long field--label-hidden field__item" data-dcnode-id="1897"><p data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">Renewables are widely perceived as an opportunity to shatter the hegemony of fossil fuel-rich states and democratize the energy landscape. Virtually all countries have access to some renewable energy resources (especially solar and wind power) and could thus substitute foreign supply with local resources. Our research shows, however, that the role countries are likely to assume in decarbonized energy systems will be based not only on their resource endowment but also on their policy choices.</span></p></div><span data-dcnode-id="1896" instrument_node="">

</span><article about="/publication/defining-natos-purpose" class="pub-detail-main" data-dcnode-id="230" id="node-86846" role="article"><span data-dcnode-id="1429" instrument_node="">
</span><p class="pub-type-and-name" data-dcnode-id="1424"><span data-dcnode-id="1428" instrument_node="">
</span><span class="pub-type book-chapter" data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">  Book Chapter

</span></p><span data-dcnode-id="1423" instrument_node="">
</span><h1 class="page-title" data-dcnode-id="1420"><span class="field field--name-title field--type-string field--label-hidden" data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Defining NATO's Purpose</span></span></h1><span data-dcnode-id="1419" instrument_node="">
</span><div class="view-publication-author-and-date" data-dcnode-id="1394"><span data-dcnode-id="1418" instrument_node="">
</span><ul class="people-group author-group" data-dcnode-id="1402"><span data-dcnode-id="1417" instrument_node="">
</span><span class="author-label" data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Authors:</span></span><span data-dcnode-id="1414" instrument_node="">
</span><li class="author" data-dcnode-id="1411"><a data-dcnode-id="1412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.belfercenter.org/person/ash-carter" rel="author"><span data-dcnode-id="1413" instrument_node="">Ash Carter</span></a></li><span data-dcnode-id="1410" instrument_node="">
</span><li class="author" data-dcnode-id="1407"><a data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.belfercenter.org/person/dr-william-j-perry" rel="author"><span data-dcnode-id="1409" instrument_node="">Dr. William J. Perry</span></a></li><span data-dcnode-id="1406" instrument_node="">
</span><li class="author" data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Hilary D. Driscoll</span></li><span data-dcnode-id="1403" instrument_node="">
</span></ul><span data-dcnode-id="1401" instrument_node="">
</span><span class="pub-date" data-dcnode-id="1396"><span data-dcnode-id="1400" instrument_node="">
</span><span class="divider" data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node=""> | </span></span><span data-dcnode-id="1397" instrument_node="">    1999

            </span></span><span data-dcnode-id="1395" instrument_node="">
</span></div><span data-dcnode-id="1393" instrument_node="">
</span><div data-dcnode-id="1299" id="field-page-content"><span data-dcnode-id="1392" instrument_node="">
</span><div class="field field--name-field-page-content field--type-entity-reference-revisions field--label-hidden field__items" data-dcnode-id="1316"><span data-dcnode-id="1391" instrument_node="">
</span><div class="paragraph paragraph--type--full-text paragraph--view-mode--default" data-dcnode-id="1318"><span data-dcnode-id="1390" instrument_node="">
</span><div class="clearfix text-formatted field field--name-field-text field--type-text-long field--label-hidden field__item" data-dcnode-id="1320"><p data-dcnode-id="1387"><b data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Defining NATO's Purpose</span></b></p><p data-dcnode-id="1384"><em data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">William J. Perry, Ashton B. Carter, and Hilary D. Driscoll</span></em></p><p data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">NATO serves a vital purpose in post-Cold War Europe. NATO should not, as some argue, be disestablished now that its founding purpose of deterring attack from the Warsaw Pact has been fulfilled. On the contrary, NATO provides much of the security framework for realizing at last George Marshall's vision of a Europe united in freedom, peace, and prosperity. NATO anchors the United States in Europe to the benefit of both Europe and the United States. It constitutes the world's only standing, readily usable coalition of military capability, which is critical to defeating Iraq's Saddam Hussein in Desert Storm and bringing peacekeeping to the Balkans. It exercises a stabilizing influence on current and future members as their militaries learn to plan together rather than against one another, thereby avoiding the nationalization of defense across Europe. NATO is the expression of the shared values and interests of a community of member nations.</span></p><p data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">As a matter of principle, NATO's membership rolls have never been closed and never should be closed. But while enlargement of NATO's membership has benefits, it also carries costs and risks. Adding members is a grave matter and should not become automatic or routine. The U.S. Senate rightly ratified the addition of Poland, Hungary, and the Czech Republic to NATO, recognizing that to do otherwise would have been a major setback to U.S. credibility and to the U.S. position in Europe. Even the most pessimistic estimates of the risks and costs of expansion portrayed in the Senate debate could not justify such a setback. But the next steps in NATO's future adaptation to the post-Cold War world should be analyzed and debated openly before being taken, and a clear course with broad bipartisan and international support should be charted.</span></p><p data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Adding new members is not the only, or even the most important, adaptation of NATO to the post-Cold War security environment. A much larger issue looms for the Alliance: What is NATO's purpose? In fact, NATO does not serve a single purpose; it serves three purposes, the first two military and the third politico-military. First, and originally paramount, is territorial defense, enshrined in Article 5's pledge that an attack on any member "shall be considered an attack against them all." Second, deriving from Article 4 as well as Article 5 is NATO's provision of a standing mechanism for the rapid formation of combined military forces with prearranged mechanisms for command and control and for a habit of working together. These forces can be mobilized to protect common interests either in Europe, as in the Bosnian peacekeeping force, or outside Europe, as when the U.S.-led coalition that defeated Iraq in 1991 drew upon forces and habits of cooperation forged in NATO. Third is NATO's historic role of drawing members together, encouraging them to resolve disputes peacefully, causing them to plan and work with rather than against one another, and fostering respect for democratic values and institutions.</span></p><p data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">The relative emphasis given to the first two military roles for NATO is changing in response to the changing security environment of Europe and the needs of its members for combined military capabilities. This evolution results because the requirement for the first role-territorial defense-has decreased, while the requirement for the second role-coalition operations in pursuit of common interests-has increased.</span></p><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">NATO needs to adapt its military strategy to today's reality: the primary danger to the security of NATO's members in this historical era is not potential aggression to their collective territory, but threats to their collective interests beyond NATO territory. These threats require attention to preventing deadly conflict, restoring and preserving peace, preventing regional conflict, stemming proliferation of weapons of mass destruction, ensuring supplies of key resources such as oil, and responding effectively to transnational dangers such as terrorism. NATO's principal strategic and military purpose in the post-Cold War era should be to provide a mechanism for the rapid formation of militarily potent "coalitions of the willing" that are able to project power beyond NATO territory. In NATO parlance, such a power projection force for "out-of-area" operations is called a Combined Joint Task Force. Shifting NATO's emphasis in an evolutionary manner from defense of member territory to defense of common interests beyond NATO territory is the strategic imperative for NATO in the post-Cold War era.</span></p><p data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Such a shift in military mission would not supplant territorial defense. Defense of members' territory, according to Article 5 of the NATO treaty, would remain a solemn commitment of Allies. But NATO territory-including the territory of its new members-is not threatened today. Nor is it likely to be in the foreseeable future. Russia has neither the intention nor the prospective military capability to threaten the Alliance. In the absence of imminent threat, American and allied publics will not continue to support an Alliance-enlarged or unenlarged-that appears to focus on nonexistent threats of aggression in Europe rather than on today's security problems.</span></p><p data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Neither will a shift in emphasis in NATO's military strategy from territorial defense to power projection supplant its important politico-military role. Indeed, this role deserves strong emphasis in the next phase of NATO's history.</span></p><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">The evolving emphasis in NATO's mission from homeland defense to coalition operations has two important consequences for relations with Russia. First, because territorial defense is not currently at issue, it should be clear that NATO is not drawing new lines across Europe nor is it directed at Russia. Second, because "coalitions of the willing" organized by NATO will include some-but not necessarily all-NATO members, and will generally include nonmembers drawn from the Partnership for Peace (like Bosnia's peacekeeping force), the distinction between full membership and partnership will be less important in the new NATO. In particular, Russia can and should be an anticipated partner in future coalition operations.</span></p><p data-dcnode-id="1365"><b data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">Further NATO Expansion?</span></b></p><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">NATO should, in principle, remain open to membership by all states of the Euro-Atlantic Partnership Council without exception, contingent upon their meeting NATO's stringent standards for admission. But no additional members should be designated for admission until the three candidates named at Madrid are fully prepared to bear the responsibilities of membership and have been integrated into the Alliance.</span></p><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Therefore, other security relationships and structures designed to extend stability to non-NATO members are of the highest importance and require more attention than they have received. This is particularly true of the Partnership for Peace (PfP), which has consistently failed to receive the resources and attention it needs to succeed.</span></p><p data-dcnode-id="1358"><b data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">NATO-Russia Relations</span></b></p><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Russia's relationship with the West cannot and should not be seen apart from NATO's own evolution. The success of Russian democracy and reform is profoundly important to the NATO allies. But because of NATO's importance and the burden posed by a history of antagonism between Russia and NATO, forging a productive NATO-Russia relationship will require imaginative policy followed by vigorous implementation.</span></p><p data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">The NATO-Russia Founding Act provides an important vehicle for pursuing the NATO-Russia relationship. Implementation of the political provisions of the Founding Act will require responsible actions by NATO Allies and Russia. But implementation of the Founding Act's military provisions is less problematic and can provide strong benefits in both the long and short terms. Moreover, military implementation is, in effect, already under way in Bosnia. The objective of implementing the military provisions of the Founding Act should be the establishment of military-to-military relationships modeled on those forged between the NATO and Russian contingents in Bosnia. Practical cooperation in dealing with real-world problems of mutual concern is more valuable than meetings and councils. Military-to-military cooperation changes attitudes by creating new, positive shared experiences to supplant the historical memory of dedicated antagonism between NATO and Russia. Military-to-military cooperation also engages critical constituencies in the formation of the new Eurasian security order: the Russian and NATO militaries.</span></p><p data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">To make the NATO-Russia military cooperation forged in Bosnia broader, deeper, permanent, and institutionalized, the following steps need to be taken:</span></p><p data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">  -  Completing the posting of Russian liaison officers at each of NATO's major headquarters, including, in particular, at the planning cell for Combined Joint Task Forces, with NATO sharing the cost of such postings with the Russian government; </span></p><p data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">  -  Posting of reciprocal NATO liaison officers at corresponding Russian headquarters; </span></p><p data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">  -  Deepening cooperation in the fields of hastening nuclear reductions, ensuring safety and control of nuclear weapons, counterproliferation, and emergency planning; </span></p><p data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">  -  Coordinating support for and assistance with Russian military reform, using Western experience and example, where applicable; </span></p><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">  -  Continuing efforts to involve Russia in CJTFs, when and where appropriate; </span></p><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">  -  Establishing an initiative to work with Russia on enhancing the competence of the Organization for Security and Cooperation in Europe in resolving regional conflicts, such as the struggle over Nagorno-Karabakh; </span></p><p data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">  -  Ensuring an "open door" policy for Russian arms and spare parts sales to Central and Eastern European states; </span></p><p data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">  -  Encouraging Russia to participate more vigorously in Partnership for Peace (NATO should be prepared to help defray the costs of Russian participation in PfP's exercises and other activities); and </span></p><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">  -  Continuing and enhancing U.S.-Russia bilateral military cooperation, including those initiatives that were overseen by the Gore-Chernomyrdin Commission.</span></p><p data-dcnode-id="1331"><b data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">NATO's Relationships with Other Non-Members</span></b></p><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Only three of the twenty-three members of the Euro-Atlantic Partnership Council are being admitted to NATO. The security concerns of the great majority of the new Eurasian states will need to be addressed outside the context of membership. But the United States and NATO will play a crucial role.</span></p><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">As with Russia, military-to-military cooperation is a central mechanism by which stability can be extended eastward to states and regions not designated to join NATO. NATO's principal mechanism for military-to-military cooperation is the Partnership for Peace, which should receive attention comparable to that devoted to enlargement. In particular, PfP should receive substantial additional funding from NATO members at the same time they provide funds for enlargement.</span></p><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">Moreover, PfP's military content should be enhanced beyond today's emphasis on peacekeeping. The objective of PfP should be to prepare partners to operate alongside NATO members in "coalitions of the willing" that cover the full range of NATO's new power-projection missions. NATO's objective should be to make the experience of PfP membership for non-NATO members as similar as possible to the experience of NATO membership.</span></p><p data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">The NATO-Ukraine Charter, like the NATO-Russia Founding Act, should be vigorously implemented with an emphasis on practical military cooperation. NATO should continue to encourage and support regional military cooperation among PfP members, such as the Baltbatt, the Centrasbatt, and the Polish-Ukrainian joint peacekeeping battalion.</span></p><p data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">The United States should strengthen its bilateral programs of military-to-military cooperation with PfP members who are not members of NATO. These relationships were inaugurated with great vision, but the resources devoted to their implementation have not been commensurate with the stakes that the United States has in Eurasia. In addition, the United States should continue to encourage good relations between nonmembers and Russia.</span></p></div><span data-dcnode-id="1319" instrument_node="">
</span></div><span data-dcnode-id="1317" instrument_node="">
</span></div><span data-dcnode-id="1315" instrument_node="">
