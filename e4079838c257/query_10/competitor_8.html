</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="470" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="479"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="5837" style="display:none"><span data-dcnode-id="5838" instrument_node="">History of the North Atlantic Treaty Organization</span></div><span data-dcnode-id="5836" instrument_node="">
</span><p data-dcnode-id="5765"><span data-dcnode-id="5835" instrument_node="">The </span><b data-dcnode-id="5831"><span data-dcnode-id="5834" instrument_node="">history of </span><a data-dcnode-id="5832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="5833" instrument_node="">NATO</span></a></b><span data-dcnode-id="5830" instrument_node=""> begins in the immediate aftermath of </span><a data-dcnode-id="5828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="5829" instrument_node="">World War II</span></a><span data-dcnode-id="5827" instrument_node=""> when  British diplomacy set the stage to contain the </span><a data-dcnode-id="5825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="5826" instrument_node="">Soviet Union</span></a><span data-dcnode-id="5824" instrument_node=""> and to stop the expansion of </span><a data-dcnode-id="5822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communism" title="Communism"><span data-dcnode-id="5823" instrument_node="">communism</span></a><span data-dcnode-id="5821" instrument_node=""> in Europe. The </span><a data-dcnode-id="5819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="5820" instrument_node="">United Kingdom</span></a><span data-dcnode-id="5818" instrument_node=""> and </span><a data-dcnode-id="5816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/France" title="France"><span data-dcnode-id="5817" instrument_node="">France</span></a><span data-dcnode-id="5815" instrument_node=""> signed, in 1947, the </span><a data-dcnode-id="5813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Dunkirk" title="Treaty of Dunkirk"><span data-dcnode-id="5814" instrument_node="">Treaty of Dunkirk</span></a><span data-dcnode-id="5812" instrument_node="">, a defensive pact, which was expanded in 1948 with the </span><a data-dcnode-id="5810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Brussels" title="Treaty of Brussels"><span data-dcnode-id="5811" instrument_node="">Treaty of Brussels</span></a><span data-dcnode-id="5809" instrument_node=""> to add the three </span><a data-dcnode-id="5807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Benelux" title="Benelux"><span data-dcnode-id="5808" instrument_node="">Benelux</span></a><span data-dcnode-id="5806" instrument_node=""> countries (</span><a data-dcnode-id="5804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belgium" title="Belgium"><span data-dcnode-id="5805" instrument_node="">Belgium</span></a><span data-dcnode-id="5803" instrument_node="">, the </span><a data-dcnode-id="5801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Netherlands" title="Netherlands"><span data-dcnode-id="5802" instrument_node="">Netherlands</span></a><span data-dcnode-id="5800" instrument_node="">, and </span><a data-dcnode-id="5798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Luxembourg" title="Luxembourg"><span data-dcnode-id="5799" instrument_node="">Luxembourg</span></a><span data-dcnode-id="5797" instrument_node="">) and committed them to collective defense against an armed attack for fifty years. The British worked with Washington to expand the alliance into NATO in 1949, adding the </span><a data-dcnode-id="5795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="5796" instrument_node="">United States</span></a><span data-dcnode-id="5794" instrument_node=""> and </span><a data-dcnode-id="5792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canada" title="Canada"><span data-dcnode-id="5793" instrument_node="">Canada</span></a><span data-dcnode-id="5791" instrument_node=""> as well as </span><a data-dcnode-id="5789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Italy" title="Italy"><span data-dcnode-id="5790" instrument_node="">Italy</span></a><span data-dcnode-id="5788" instrument_node="">, </span><a data-dcnode-id="5786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Portugal" title="Portugal"><span data-dcnode-id="5787" instrument_node="">Portugal</span></a><span data-dcnode-id="5785" instrument_node="">, </span><a data-dcnode-id="5783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Norway" title="Norway"><span data-dcnode-id="5784" instrument_node="">Norway</span></a><span data-dcnode-id="5782" instrument_node="">, </span><a data-dcnode-id="5780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Denmark" title="Denmark"><span data-dcnode-id="5781" instrument_node="">Denmark</span></a><span data-dcnode-id="5779" instrument_node="">, and </span><a data-dcnode-id="5777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iceland" title="Iceland"><span data-dcnode-id="5778" instrument_node="">Iceland</span></a><span data-dcnode-id="5776" instrument_node="">.</span><sup class="reference" data-dcnode-id="5773" id="cite_ref-1"><a data-dcnode-id="5774" href="#cite_note-1"><span data-dcnode-id="5775" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5772" instrument_node=""> </span><a data-dcnode-id="5770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_Germany" title="West Germany"><span data-dcnode-id="5771" instrument_node="">West Germany</span></a><span data-dcnode-id="5769" instrument_node=""> joined in 1955 and </span><a data-dcnode-id="5767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spain" title="Spain"><span data-dcnode-id="5768" instrument_node="">Spain</span></a><span data-dcnode-id="5766" instrument_node=""> joined in 1982.
</span></p><p data-dcnode-id="5747"><span data-dcnode-id="5764" instrument_node="">The </span><a data-dcnode-id="5762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Structure_of_NATO" title="Structure of NATO"><span data-dcnode-id="5763" instrument_node="">structure of NATO</span></a><span data-dcnode-id="5761" instrument_node=""> evolved throughout the </span><a data-dcnode-id="5759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="5760" instrument_node="">Cold War</span></a><span data-dcnode-id="5758" instrument_node=""> and its aftermath. An integrated military structure for NATO was first established in 1950 as it became clear that NATO would need to enhance its defences for the longer term against a potential Soviet attack. In April 1951, </span><a class="mw-redirect" data-dcnode-id="5756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied_Command_Europe" title="Allied Command Europe"><span data-dcnode-id="5757" instrument_node="">Allied Command Europe</span></a><span data-dcnode-id="5755" instrument_node=""> and its headquarters (</span><a data-dcnode-id="5753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Headquarters_Allied_Powers_Europe" title="Supreme Headquarters Allied Powers Europe"><span data-dcnode-id="5754" instrument_node="">SHAPE</span></a><span data-dcnode-id="5752" instrument_node="">) were established; later, four subordinate headquarters were added in Northern and Central Europe, the Southern Region, and the Mediterranean.</span><sup class="reference" data-dcnode-id="5749" id="cite_ref-2"><a data-dcnode-id="5750" href="#cite_note-2"><span data-dcnode-id="5751" instrument_node="">[2]</span></a></sup><span data-dcnode-id="5748" instrument_node="">
</span></p><p data-dcnode-id="5739"><span data-dcnode-id="5746" instrument_node="">From the 1950s to 2003, the Strategic Commanders were the </span><a data-dcnode-id="5744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Allied_Commander_Europe" title="Supreme Allied Commander Europe"><span data-dcnode-id="5745" instrument_node="">Supreme Allied Commander Europe</span></a><span data-dcnode-id="5743" instrument_node=""> (SACEUR) and the </span><a data-dcnode-id="5741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Allied_Commander_Atlantic" title="Supreme Allied Commander Atlantic"><span data-dcnode-id="5742" instrument_node="">Supreme Allied Commander Atlantic</span></a><span data-dcnode-id="5740" instrument_node=""> (SACLANT). 
</span></p><span data-dcnode-id="5738" instrument_node="">

</span><h2 data-dcnode-id="5544"><span class="mw-headline" data-dcnode-id="5552" id="Beginnings"><span data-dcnode-id="5553" instrument_node="">Beginnings</span></span><span class="mw-editsection" data-dcnode-id="5545"><span class="mw-editsection-bracket" data-dcnode-id="5550"><span data-dcnode-id="5551" instrument_node="">[</span></span><a data-dcnode-id="5548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_NATO%26action%3Dedit%26section%3D1" title="Edit section: Beginnings"><span data-dcnode-id="5549" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5546"><span data-dcnode-id="5547" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5543" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="5534" role="note"><span data-dcnode-id="5540" instrument_node="">Main articles: </span><a data-dcnode-id="5538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Union_%28alliance%29" title="Western Union (alliance)"><span data-dcnode-id="5539" instrument_node="">Western Union (alliance)</span></a><span data-dcnode-id="5537" instrument_node=""> and </span><a data-dcnode-id="5535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Atlantic_Treaty" title="North Atlantic Treaty"><span data-dcnode-id="5536" instrument_node="">North Atlantic Treaty</span></a></div><span data-dcnode-id="5533" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5521"><div class="thumbinner" data-dcnode-id="5522" style="width:222px;"><a class="image" data-dcnode-id="5531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATruman_signing_North_Atlantic_Treaty.jpg"><img alt="Eleven men in suits stand around a large desk at which another man is signing a document." class="thumbimage" data-dcnode-id="5532" data-file-height="2359" data-file-width="2968" decoding="async" height="175" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Truman_signing_North_Atlantic_Treaty.jpg/220px-Truman_signing_North_Atlantic_Treaty.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Truman_signing_North_Atlantic_Treaty.jpg/330px-Truman_signing_North_Atlantic_Treaty.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Truman_signing_North_Atlantic_Treaty.jpg/440px-Truman_signing_North_Atlantic_Treaty.jpg 2x" width="220"></a><span data-dcnode-id="5530" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5523"><div class="magnify" data-dcnode-id="5528"><a class="internal" data-dcnode-id="5529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATruman_signing_North_Atlantic_Treaty.jpg" title="Enlarge"></a></div><span data-dcnode-id="5527" instrument_node="">The North Atlantic Treaty was signed by US President Harry S. Truman in </span><a class="mw-redirect" data-dcnode-id="5525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washington%2C_DC" title="Washington, DC"><span data-dcnode-id="5526" instrument_node="">Washington, DC</span></a><span data-dcnode-id="5524" instrument_node="">, on 4 April 1949 and was ratified by the United States in August 1949.</span></div></div></div><span data-dcnode-id="5520" instrument_node="">
</span><p data-dcnode-id="5489"><span data-dcnode-id="5519" instrument_node="">The </span><a data-dcnode-id="5517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Brussels" title="Treaty of Brussels"><span data-dcnode-id="5518" instrument_node="">Treaty of Brussels</span></a><span data-dcnode-id="5516" instrument_node=""> was a mutual defense treaty against the Soviet threat at the start of the Cold War. It was signed on 17 March 1948 by Belgium, the Netherlands, Luxembourg, France, and the United Kingdom and was the precursor to NATO. The Soviet threat became immediate with the </span><a data-dcnode-id="5514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Berlin_Blockade" title="Berlin Blockade"><span data-dcnode-id="5515" instrument_node="">Berlin Blockade</span></a><span data-dcnode-id="5513" instrument_node=""> in 1948, leading to the creation of a multinational defense organization, the </span><a data-dcnode-id="5511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Union_Defence_Organisation" title="Western Union Defence Organisation"><span data-dcnode-id="5512" instrument_node="">Western Union Defence Organisation</span></a><span data-dcnode-id="5510" instrument_node="">, in September 1948.</span><sup class="reference" data-dcnode-id="5507" id="cite_ref-FOOTNOTEIsbyKamps_Jr.198513_3-0"><a data-dcnode-id="5508" href="#cite_note-FOOTNOTEIsbyKamps_Jr.198513-3"><span data-dcnode-id="5509" instrument_node="">[3]</span></a></sup><span data-dcnode-id="5506" instrument_node=""> However, the parties were too weak militarily to counter the </span><a data-dcnode-id="5504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Armed_Forces" title="Soviet Armed Forces"><span data-dcnode-id="5505" instrument_node="">Soviet Armed Forces</span></a><span data-dcnode-id="5503" instrument_node="">. In addition, the communist </span><a data-dcnode-id="5501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1948_Czechoslovak_coup_d%27%25C3%25A9tat" title="1948 Czechoslovak coup d'état"><span data-dcnode-id="5502" instrument_node="">1948 Czechoslovak coup d'état</span></a><span data-dcnode-id="5500" instrument_node=""> had overthrown a democratic government, and British Foreign Minister </span><a data-dcnode-id="5498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ernest_Bevin" title="Ernest Bevin"><span data-dcnode-id="5499" instrument_node="">Ernest Bevin</span></a><span data-dcnode-id="5497" instrument_node=""> reiterated that the best way to prevent another Czechoslovakia was to evolve a joint Western military strategy. He got a receptive hearing in the United States, especially with the American anxiety over Italy and the </span><a data-dcnode-id="5495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Italian_Communist_Party" title="Italian Communist Party"><span data-dcnode-id="5496" instrument_node="">Italian Communist Party</span></a><span data-dcnode-id="5494" instrument_node="">.</span><sup class="reference" data-dcnode-id="5491" id="cite_ref-FOOTNOTEPedaliu200397_4-0"><a data-dcnode-id="5492" href="#cite_note-FOOTNOTEPedaliu200397-4"><span data-dcnode-id="5493" instrument_node="">[4]</span></a></sup><span data-dcnode-id="5490" instrument_node="">
</span></p><p data-dcnode-id="5456"><span data-dcnode-id="5488" instrument_node="">In 1948, European leaders met with US defense, military, and diplomatic officials at the Pentagon, exploring a framework for a new and unprecedented association.</span><sup class="reference" data-dcnode-id="5485" id="cite_ref-5"><a data-dcnode-id="5486" href="#cite_note-5"><span data-dcnode-id="5487" instrument_node="">[5]</span></a></sup><span data-dcnode-id="5484" instrument_node=""> The talks resulted in the </span><a data-dcnode-id="5482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Atlantic_Treaty" title="North Atlantic Treaty"><span data-dcnode-id="5483" instrument_node="">North Atlantic Treaty</span></a><span data-dcnode-id="5481" instrument_node="">, and the United States signed on 4 April 1949. It included the five Treaty of Brussels states, as well as the United States, Canada, Portugal, Italy, Norway, Denmark and Iceland.</span><sup class="reference" data-dcnode-id="5478" id="cite_ref-history_6-0"><a data-dcnode-id="5479" href="#cite_note-history-6"><span data-dcnode-id="5480" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5477" instrument_node=""> The first </span><a data-dcnode-id="5475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secretary_General_of_NATO" title="Secretary General of NATO"><span data-dcnode-id="5476" instrument_node="">NATO Secretary General</span></a><span data-dcnode-id="5474" instrument_node="">, </span><a data-dcnode-id="5472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hastings_Ismay%2C_1st_Baron_Ismay" title="Hastings Ismay, 1st Baron Ismay"><span data-dcnode-id="5473" instrument_node="">Lord Ismay</span></a><span data-dcnode-id="5471" instrument_node="">, stated in 1949 that the organization's goal was "to keep the Russians out, the Americans in, and the Germans down".</span><sup class="reference" data-dcnode-id="5468" id="cite_ref-FOOTNOTEReynolds199413_7-0"><a data-dcnode-id="5469" href="#cite_note-FOOTNOTEReynolds199413-7"><span data-dcnode-id="5470" instrument_node="">[7]</span></a></sup><span data-dcnode-id="5467" instrument_node=""> Popular support for the Treaty was not unanimous, and some Icelanders participated in a </span><a data-dcnode-id="5465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1949_anti-NATO_riot_in_Iceland" title="1949 anti-NATO riot in Iceland"><span data-dcnode-id="5466" instrument_node="">pro-neutrality, anti-membership riot</span></a><span data-dcnode-id="5464" instrument_node=""> in March 1949. The creation of NATO can be seen as the primary institutional consequence of a school of thought called </span><a data-dcnode-id="5462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atlanticism" title="Atlanticism"><span data-dcnode-id="5463" instrument_node="">Atlanticism</span></a><span data-dcnode-id="5461" instrument_node="">, which stressed the importance of trans-Atlantic cooperation.</span><sup class="reference" data-dcnode-id="5458" id="cite_ref-Straus_8-0"><a data-dcnode-id="5459" href="#cite_note-Straus-8"><span data-dcnode-id="5460" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5457" instrument_node="">
</span></p><span data-dcnode-id="5455" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="5443"><div class="thumbinner" data-dcnode-id="5444" style="width:222px;"><a class="image" data-dcnode-id="5453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANATO_3c_1952_issue_U.S._stamp.jpg"><img alt="" class="thumbimage" data-dcnode-id="5454" data-file-height="844" data-file-width="729" decoding="async" height="255" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a7/NATO_3c_1952_issue_U.S._stamp.jpg/220px-NATO_3c_1952_issue_U.S._stamp.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a7/NATO_3c_1952_issue_U.S._stamp.jpg/330px-NATO_3c_1952_issue_U.S._stamp.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a7/NATO_3c_1952_issue_U.S._stamp.jpg/440px-NATO_3c_1952_issue_U.S._stamp.jpg 2x" width="220"></a><span data-dcnode-id="5452" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5445"><div class="magnify" data-dcnode-id="5450"><a class="internal" data-dcnode-id="5451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANATO_3c_1952_issue_U.S._stamp.jpg" title="Enlarge"></a></div><span data-dcnode-id="5449" instrument_node="">A 1952 US </span><a data-dcnode-id="5447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Postage_stamp" title="Postage stamp"><span data-dcnode-id="5448" instrument_node="">postage stamp</span></a><span data-dcnode-id="5446" instrument_node=""> commemorating the third anniversary of NATO. Stamps honoring the organization were issued by many member countries.</span></div></div></div><span data-dcnode-id="5442" instrument_node="">
</span><p data-dcnode-id="5430"><span data-dcnode-id="5441" instrument_node="">The members agreed that an armed attack against any of them in Europe or North America would be considered an attack against them all. Consequently, they agreed that if an armed attack occurred, each of them, in the exercise of the right of individual or collective self-defense, would assist the member being attacked and take such action as it deemed necessary, including the use of armed force, to restore and maintain the security of the North Atlantic area. The treaty does not require members to respond with military action against an aggressor. Although obliged to respond, they maintain the freedom to choose the method by which they do so. That differs from Article IV of the Treaty of Brussels, which clearly states that the response is military in nature. NATO members are nonetheless assumed to aid the attacked member militarily. The treaty was later clarified to include both the member's territory and their "vessels, forces or aircraft" North of the </span><a data-dcnode-id="5439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tropic_of_Cancer" title="Tropic of Cancer"><span data-dcnode-id="5440" instrument_node="">Tropic of Cancer</span></a><span data-dcnode-id="5438" instrument_node="">, including some </span><a class="mw-redirect" data-dcnode-id="5436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Overseas_departments" title="Overseas departments"><span data-dcnode-id="5437" instrument_node="">overseas departments</span></a><span data-dcnode-id="5435" instrument_node=""> of France.</span><sup class="reference" data-dcnode-id="5432" id="cite_ref-9"><a data-dcnode-id="5433" href="#cite_note-9"><span data-dcnode-id="5434" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5431" instrument_node="">
</span></p><p data-dcnode-id="5392"><span data-dcnode-id="5429" instrument_node="">The creation of NATO brought about some </span><a data-dcnode-id="5427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Standardization" title="Standardization"><span data-dcnode-id="5428" instrument_node="">standardization</span></a><span data-dcnode-id="5426" instrument_node=""> of allied </span><a data-dcnode-id="5424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_terminology" title="Military terminology"><span data-dcnode-id="5425" instrument_node="">military terminology</span></a><span data-dcnode-id="5423" instrument_node="">, procedures, and technology, which, in many cases, meant European countries adopting US practices. Roughly 1300 </span><a data-dcnode-id="5421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Standardization_Agreement" title="Standardization Agreement"><span data-dcnode-id="5422" instrument_node="">Standardization Agreements</span></a><span data-dcnode-id="5420" instrument_node=""> (STANAG) codified many of the common practices that NATO has achieved. The </span><a data-dcnode-id="5418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/7.62%25C3%259751mm_NATO" title="7.62×51mm NATO"><span data-dcnode-id="5419" instrument_node="">7.62×51mm NATO</span></a><span data-dcnode-id="5417" instrument_node=""> rifle cartridge was thus introduced in the 1950s as a standard firearm cartridge among many NATO countries.</span><sup class="reference" data-dcnode-id="5414" id="cite_ref-10"><a data-dcnode-id="5415" href="#cite_note-10"><span data-dcnode-id="5416" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5413" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="5411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fabrique_Nationale_de_Herstal" title="Fabrique Nationale de Herstal"><span data-dcnode-id="5412" instrument_node="">Fabrique Nationale de Herstal</span></a><span data-dcnode-id="5410" instrument_node="">'s </span><a data-dcnode-id="5408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/FN_FAL" title="FN FAL"><span data-dcnode-id="5409" instrument_node="">FAL</span></a><span data-dcnode-id="5407" instrument_node="">, which used the 7.62mm NATO cartridge, was adopted by 75 countries, including many outside NATO.</span><sup class="reference" data-dcnode-id="5404" id="cite_ref-FOOTNOTEWillbanks2004129–130_11-0"><a data-dcnode-id="5405" href="#cite_note-FOOTNOTEWillbanks2004129%E2%80%93130-11"><span data-dcnode-id="5406" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5403" instrument_node=""> Also, </span><a class="new" data-dcnode-id="5401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAircraft_marshaling%26action%3Dedit%26redlink%3D1" title="Aircraft marshaling (page does not exist)"><span data-dcnode-id="5402" instrument_node="">aircraft marshaling signals</span></a><span data-dcnode-id="5400" instrument_node=""> were standardized so that any NATO aircraft could land at any NATO base. Other standards such as the </span><a data-dcnode-id="5398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO_phonetic_alphabet" title="NATO phonetic alphabet"><span data-dcnode-id="5399" instrument_node="">NATO phonetic alphabet</span></a><span data-dcnode-id="5397" instrument_node=""> have made their way beyond NATO into civilian use.</span><sup class="reference" data-dcnode-id="5394" id="cite_ref-12"><a data-dcnode-id="5395" href="#cite_note-12"><span data-dcnode-id="5396" instrument_node="">[12]</span></a></sup><span data-dcnode-id="5393" instrument_node="">
</span></p><span data-dcnode-id="5391" instrument_node="">
</span><h2 data-dcnode-id="5381"><span class="mw-headline" data-dcnode-id="5389" id="Cold_War"><span data-dcnode-id="5390" instrument_node="">Cold War</span></span><span class="mw-editsection" data-dcnode-id="5382"><span class="mw-editsection-bracket" data-dcnode-id="5387"><span data-dcnode-id="5388" instrument_node="">[</span></span><a data-dcnode-id="5385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_NATO%26action%3Dedit%26section%3D2" title="Edit section: Cold War"><span data-dcnode-id="5386" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5383"><span data-dcnode-id="5384" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5380" instrument_node="">
</span><link data-dcnode-id="5379" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5375" role="note"><span data-dcnode-id="5378" instrument_node="">Main article: </span><a data-dcnode-id="5376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="5377" instrument_node="">Cold War</span></a></div><span data-dcnode-id="5374" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5356"><div class="thumbinner" data-dcnode-id="5357" style="width:222px;"><a class="image" data-dcnode-id="5372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANATO_and_the_Warsaw_Pact_1973.svg"><img alt="A map of Europe showing several countries on the left in blue, and ones on the right are in red. Other unaffiliated countries are in white." class="thumbimage" data-dcnode-id="5373" data-file-height="456" data-file-width="450" decoding="async" height="223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/7c/NATO_and_the_Warsaw_Pact_1973.svg/220px-NATO_and_the_Warsaw_Pact_1973.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/7c/NATO_and_the_Warsaw_Pact_1973.svg/330px-NATO_and_the_Warsaw_Pact_1973.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/7c/NATO_and_the_Warsaw_Pact_1973.svg/440px-NATO_and_the_Warsaw_Pact_1973.svg.png 2x" width="220"></a><span data-dcnode-id="5371" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5358"><div class="magnify" data-dcnode-id="5369"><a class="internal" data-dcnode-id="5370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANATO_and_the_Warsaw_Pact_1973.svg" title="Enlarge"></a></div><span data-dcnode-id="5368" instrument_node="">During the Cold War, most of Europe was divided between two alliances. Members of NATO are shown in blue, with members of the </span><a data-dcnode-id="5366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw_Pact" title="Warsaw Pact"><span data-dcnode-id="5367" instrument_node="">Warsaw Pact</span></a><span data-dcnode-id="5365" instrument_node=""> in red and unaffiliated countries are in grey. Yugoslavia, although communist, had </span><a class="mw-redirect" data-dcnode-id="5363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tito%25E2%2580%2593Stalin_Split" title="Tito–Stalin Split"><span data-dcnode-id="5364" instrument_node="">left the Soviet sphere</span></a><span data-dcnode-id="5362" instrument_node=""> in 1948, and Albania was a Warsaw Pact member-only </span><a class="mw-redirect" data-dcnode-id="5360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet%25E2%2580%2593Albanian_split" title="Soviet–Albanian split"><span data-dcnode-id="5361" instrument_node="">until 1968</span></a><span data-dcnode-id="5359" instrument_node="">.</span></div></div></div><span data-dcnode-id="5355" instrument_node="">
</span><p data-dcnode-id="5304"><span data-dcnode-id="5354" instrument_node="">The outbreak of the </span><a data-dcnode-id="5352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Korean_War" title="Korean War"><span data-dcnode-id="5353" instrument_node="">Korean War</span></a><span data-dcnode-id="5351" instrument_node=""> in June 1950 was crucial for NATO, as it raised the apparent threat of all Communist countries working together and forced the alliance to develop concrete military plans.</span><sup class="reference" data-dcnode-id="5348" id="cite_ref-FOOTNOTEIsbyKamps_Jr.198513–14_13-0"><a data-dcnode-id="5349" href="#cite_note-FOOTNOTEIsbyKamps_Jr.198513%E2%80%9314-13"><span data-dcnode-id="5350" instrument_node="">[13]</span></a></sup><span data-dcnode-id="5347" instrument_node=""> </span><a data-dcnode-id="5345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Headquarters_Allied_Powers_Europe" title="Supreme Headquarters Allied Powers Europe"><span data-dcnode-id="5346" instrument_node="">Supreme Headquarters Allied Powers Europe</span></a><span data-dcnode-id="5344" instrument_node=""> (SHAPE) was formed to direct forces in Europe and began work under Supreme Allied Commander </span><a class="mw-redirect" data-dcnode-id="5342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dwight_Eisenhower" title="Dwight Eisenhower"><span data-dcnode-id="5343" instrument_node="">Dwight Eisenhower</span></a><span data-dcnode-id="5341" instrument_node=""> in January 1951.</span><sup class="reference" data-dcnode-id="5338" id="cite_ref-pace_14-0"><a data-dcnode-id="5339" href="#cite_note-pace-14"><span data-dcnode-id="5340" instrument_node="">[14]</span></a></sup><span data-dcnode-id="5337" instrument_node=""> In September 1950, the </span><a data-dcnode-id="5335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO_Military_Committee" title="NATO Military Committee"><span data-dcnode-id="5336" instrument_node="">NATO Military Committee</span></a><span data-dcnode-id="5334" instrument_node=""> called for an ambitious buildup of conventional forces to meet the Soviets and reaffirmed that position at the February 1952 meeting of the </span><a data-dcnode-id="5332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Atlantic_Council" title="North Atlantic Council"><span data-dcnode-id="5333" instrument_node="">North Atlantic Council</span></a><span data-dcnode-id="5331" instrument_node=""> in </span><a data-dcnode-id="5329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lisbon" title="Lisbon"><span data-dcnode-id="5330" instrument_node="">Lisbon</span></a><span data-dcnode-id="5328" instrument_node="">. The conference, seeking to provide the forces necessary for NATO's Long-Term Defence Plan, called for an expansion to 96 </span><a data-dcnode-id="5326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Division_%28military%29" title="Division (military)"><span data-dcnode-id="5327" instrument_node="">divisions</span></a><span data-dcnode-id="5325" instrument_node="">. However, that requirement was dropped the following year to roughly 35 divisions, with heavier use to be made of nuclear weapons. At this time, NATO could call on about 15 ready divisions in </span><a data-dcnode-id="5323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_Europe" title="Central Europe"><span data-dcnode-id="5324" instrument_node="">Central Europe</span></a><span data-dcnode-id="5322" instrument_node=""> and another 10 in Italy and Scandinavia.</span><sup class="reference" data-dcnode-id="5319" id="cite_ref-FOOTNOTEOsgood196276_15-0"><a data-dcnode-id="5320" href="#cite_note-FOOTNOTEOsgood196276-15"><span data-dcnode-id="5321" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="5316" id="cite_ref-FOOTNOTEPark198628_16-0"><a data-dcnode-id="5317" href="#cite_note-FOOTNOTEPark198628-16"><span data-dcnode-id="5318" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5315" instrument_node=""> Also at Lisbon, the post of </span><a data-dcnode-id="5313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secretary_General_of_NATO" title="Secretary General of NATO"><span data-dcnode-id="5314" instrument_node="">Secretary General of NATO</span></a><span data-dcnode-id="5312" instrument_node=""> as the organization's chief civilian was created, and </span><a data-dcnode-id="5310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hastings_Ismay%2C_1st_Baron_Ismay" title="Hastings Ismay, 1st Baron Ismay"><span data-dcnode-id="5311" instrument_node="">Lord Ismay</span></a><span data-dcnode-id="5309" instrument_node=""> was eventually appointed to the post.</span><sup class="reference" data-dcnode-id="5306" id="cite_ref-17"><a data-dcnode-id="5307" href="#cite_note-17"><span data-dcnode-id="5308" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5305" instrument_node="">
</span></p><p data-dcnode-id="5267"><span data-dcnode-id="5303" instrument_node="">In September 1952, the first major NATO </span><a data-dcnode-id="5301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_exercise" title="Military exercise"><span data-dcnode-id="5302" instrument_node="">maritime exercises</span></a><span data-dcnode-id="5300" instrument_node=""> began. </span><a data-dcnode-id="5298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exercise_Mainbrace" title="Exercise Mainbrace"><span data-dcnode-id="5299" instrument_node="">Exercise Mainbrace</span></a><span data-dcnode-id="5297" instrument_node=""> brought together 200 ships and over 50,000 personnel to practice the defence of Denmark and Norway.</span><sup class="reference" data-dcnode-id="5294" id="cite_ref-18"><a data-dcnode-id="5295" href="#cite_note-18"><span data-dcnode-id="5296" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5293" instrument_node=""> Other major exercises that followed included </span><a data-dcnode-id="5291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exercise_Grand_Slam" title="Exercise Grand Slam"><span data-dcnode-id="5292" instrument_node="">Exercise Grand Slam</span></a><span data-dcnode-id="5290" instrument_node=""> and </span><a data-dcnode-id="5288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exercise_Longstep" title="Exercise Longstep"><span data-dcnode-id="5289" instrument_node="">Exercise Longstep</span></a><span data-dcnode-id="5287" instrument_node="">, naval and amphibious exercises in the </span><a data-dcnode-id="5285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mediterranean_Sea" title="Mediterranean Sea"><span data-dcnode-id="5286" instrument_node="">Mediterranean Sea</span></a><span data-dcnode-id="5284" instrument_node="">, Italic Weld, a combined air-naval-ground exercise in </span><a data-dcnode-id="5282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Northern_Italy" title="Northern Italy"><span data-dcnode-id="5283" instrument_node="">northern Italy</span></a><span data-dcnode-id="5281" instrument_node="">, Grand Repulse, involving the </span><a class="mw-redirect" data-dcnode-id="5279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Army_on_the_Rhine" title="British Army on the Rhine"><span data-dcnode-id="5280" instrument_node="">British Army on the Rhine</span></a><span data-dcnode-id="5278" instrument_node=""> (BAOR), the Netherlands Corps and </span><a data-dcnode-id="5276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied_Air_Forces_Central_Europe" title="Allied Air Forces Central Europe"><span data-dcnode-id="5277" instrument_node="">Allied Air Forces Central Europe</span></a><span data-dcnode-id="5275" instrument_node=""> (AAFCE), Monte Carlo, a simulated atomic air-ground exercise involving the </span><a class="mw-redirect" data-dcnode-id="5273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied_Force_Command_Heidelberg" title="Allied Force Command Heidelberg"><span data-dcnode-id="5274" instrument_node="">Central Army Group</span></a><span data-dcnode-id="5272" instrument_node="">, and Weldfast, a combined amphibious landing exercise in the Mediterranean Sea involving American, British, Greek, Italian, and Turkish naval forces.</span><sup class="reference" data-dcnode-id="5269" id="cite_ref-19"><a data-dcnode-id="5270" href="#cite_note-19"><span data-dcnode-id="5271" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5268" instrument_node="">
</span></p><p data-dcnode-id="5237"><a data-dcnode-id="5265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greece" title="Greece"><span data-dcnode-id="5266" instrument_node="">Greece</span></a><span data-dcnode-id="5264" instrument_node=""> and </span><a data-dcnode-id="5262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkey" title="Turkey"><span data-dcnode-id="5263" instrument_node="">Turkey</span></a><span data-dcnode-id="5261" instrument_node=""> also joined the alliance in 1952, which forced a series of controversial negotiations, mainly between United States and Britain, over how to bring both countries into the military command structure.</span><sup class="reference" data-dcnode-id="5258" id="cite_ref-pace_14-1"><a data-dcnode-id="5259" href="#cite_note-pace-14"><span data-dcnode-id="5260" instrument_node="">[14]</span></a></sup><span data-dcnode-id="5257" instrument_node=""> While that overt military preparation was going on, covert </span><a data-dcnode-id="5255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stay-behind" title="Stay-behind"><span data-dcnode-id="5256" instrument_node="">stay-behind</span></a><span data-dcnode-id="5254" instrument_node=""> arrangements initially made by the Western European Union to continue resistance after a successful Soviet invasion, including </span><a data-dcnode-id="5252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Gladio" title="Operation Gladio"><span data-dcnode-id="5253" instrument_node="">Operation Gladio</span></a><span data-dcnode-id="5251" instrument_node="">, were transferred to NATO control. Ultimately, unofficial bonds began to grow between NATO's armed forces, such as the </span><a data-dcnode-id="5249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO_Tiger_Association" title="NATO Tiger Association"><span data-dcnode-id="5250" instrument_node="">NATO Tiger Association</span></a><span data-dcnode-id="5248" instrument_node=""> and competitions such as the </span><a data-dcnode-id="5246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canadian_Army_Trophy" title="Canadian Army Trophy"><span data-dcnode-id="5247" instrument_node="">Canadian Army Trophy</span></a><span data-dcnode-id="5245" instrument_node=""> for tank gunnery.</span><sup class="reference" data-dcnode-id="5242" id="cite_ref-20"><a data-dcnode-id="5243" href="#cite_note-20"><span data-dcnode-id="5244" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="5239" id="cite_ref-21"><a data-dcnode-id="5240" href="#cite_note-21"><span data-dcnode-id="5241" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5238" instrument_node="">
</span></p><span data-dcnode-id="5236" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="5221"><div class="thumbinner" data-dcnode-id="5222" style="width:222px;"><a class="image" data-dcnode-id="5234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWest_German_Bundeswehr_1960.jpg"><img alt="Two soldiers crouch under a tree while a tank sits on a road in front of them." class="thumbimage" data-dcnode-id="5235" data-file-height="1000" data-file-width="1350" decoding="async" height="163" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/65/West_German_Bundeswehr_1960.jpg/220px-West_German_Bundeswehr_1960.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/65/West_German_Bundeswehr_1960.jpg/330px-West_German_Bundeswehr_1960.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/65/West_German_Bundeswehr_1960.jpg/440px-West_German_Bundeswehr_1960.jpg 2x" width="220"></a><span data-dcnode-id="5233" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5223"><div class="magnify" data-dcnode-id="5231"><a class="internal" data-dcnode-id="5232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWest_German_Bundeswehr_1960.jpg" title="Enlarge"></a></div><span data-dcnode-id="5230" instrument_node="">The German </span><a data-dcnode-id="5228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bundeswehr" title="Bundeswehr"><span data-dcnode-id="5229" instrument_node="">Bundeswehr</span></a><span data-dcnode-id="5227" instrument_node=""> provided the largest element of the allied land forces guarding the frontier in </span><a data-dcnode-id="5225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_Europe" title="Central Europe"><span data-dcnode-id="5226" instrument_node="">Central Europe</span></a><span data-dcnode-id="5224" instrument_node="">.</span></div></div></div><span data-dcnode-id="5220" instrument_node="">
</span><p data-dcnode-id="5211"><span data-dcnode-id="5219" instrument_node="">In 1954, the Soviet Union suggested that it should join NATO to preserve peace in Europe.</span><sup class="reference" data-dcnode-id="5216" id="cite_ref-22"><a data-dcnode-id="5217" href="#cite_note-22"><span data-dcnode-id="5218" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5215" instrument_node=""> The NATO countries, fearing that the Soviet Union's motive was to weaken the alliance, ultimately rejected that proposal. On 17 December 1954, the North Atlantic Council approved MC 48, a key document in the evolution of NATO nuclear thought. MC 48 emphasized that NATO had to use atomic weapons from the outset of a war with the Soviet Union, whether or not the Soviets chose to use them first. That gave SACEUR the same prerogatives for automatic use of nuclear weapons that existed for the commander-in-chief of the US </span><a data-dcnode-id="5213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Strategic_Air_Command" title="Strategic Air Command"><span data-dcnode-id="5214" instrument_node="">Strategic Air Command</span></a><span data-dcnode-id="5212" instrument_node="">.
</span></p><p data-dcnode-id="5183"><span data-dcnode-id="5210" instrument_node="">The incorporation of </span><a data-dcnode-id="5208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_Germany" title="West Germany"><span data-dcnode-id="5209" instrument_node="">West Germany</span></a><span data-dcnode-id="5207" instrument_node=""> into the organization on 9 May 1955 was described as "a decisive turning point in the history of our continent" by </span><a data-dcnode-id="5205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Halvard_Lange" title="Halvard Lange"><span data-dcnode-id="5206" instrument_node="">Halvard Lange</span></a><span data-dcnode-id="5204" instrument_node="">, then the Norwegian </span><a data-dcnode-id="5202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minister_of_Foreign_Affairs_%28Norway%29" title="Minister of Foreign Affairs (Norway)"><span data-dcnode-id="5203" instrument_node="">Foreign Affairs Minister</span></a><span data-dcnode-id="5201" instrument_node="">.</span><sup class="reference" data-dcnode-id="5198" id="cite_ref-23"><a data-dcnode-id="5199" href="#cite_note-23"><span data-dcnode-id="5200" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5197" instrument_node=""> A major reason was that German manpower was necessary to have enough conventional forces to resist a Soviet invasion.</span><sup class="reference" data-dcnode-id="5194" id="cite_ref-FOOTNOTEIsbyKamps_Jr.198515_24-0"><a data-dcnode-id="5195" href="#cite_note-FOOTNOTEIsbyKamps_Jr.198515-24"><span data-dcnode-id="5196" instrument_node="">[24]</span></a></sup><span data-dcnode-id="5193" instrument_node=""> One of the immediate results of West German entry was the creation of the </span><a data-dcnode-id="5191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw_Pact" title="Warsaw Pact"><span data-dcnode-id="5192" instrument_node="">Warsaw Pact</span></a><span data-dcnode-id="5190" instrument_node="">, which was signed on 14 May 1955 by the Soviet Union, Hungary, Czechoslovakia, Poland, Bulgaria, </span><a data-dcnode-id="5188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_Republic_of_Romania" title="Socialist Republic of Romania"><span data-dcnode-id="5189" instrument_node="">Romania</span></a><span data-dcnode-id="5187" instrument_node="">, Albania, and East Germany, thereby delineating the two opposing sides of the </span><a data-dcnode-id="5185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="5186" instrument_node="">Cold War</span></a><span data-dcnode-id="5184" instrument_node="">.
</span></p><p data-dcnode-id="5171"><span data-dcnode-id="5182" instrument_node="">Three major exercises were held concurrently in the northern autumn of 1957. Operation Counter Punch, </span><a class="mw-redirect" data-dcnode-id="5180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Strikeback" title="Operation Strikeback"><span data-dcnode-id="5181" instrument_node="">Operation Strikeback</span></a><span data-dcnode-id="5179" instrument_node="">, and </span><a data-dcnode-id="5177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Deep_Water" title="Operation Deep Water"><span data-dcnode-id="5178" instrument_node="">Operation Deep Water</span></a><span data-dcnode-id="5176" instrument_node=""> were the most ambitious military undertaking for the alliance so far, involving more than 250,000 men, 300 ships, and 1,500 aircraft operating from Norway to Turkey.</span><sup class="reference" data-dcnode-id="5173" id="cite_ref-25"><a data-dcnode-id="5174" href="#cite_note-25"><span data-dcnode-id="5175" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5172" instrument_node="">
</span></p><p data-dcnode-id="5168"><span class="anchor" data-dcnode-id="5170" id="French_withdrawal"></span><span data-dcnode-id="5169" instrument_node="">
</span></p><span data-dcnode-id="5167" instrument_node="">
</span><h2 data-dcnode-id="5157"><span class="mw-headline" data-dcnode-id="5165" id="Partial_withdrawal_of_France"><span data-dcnode-id="5166" instrument_node="">Partial withdrawal of France</span></span><span class="mw-editsection" data-dcnode-id="5158"><span class="mw-editsection-bracket" data-dcnode-id="5163"><span data-dcnode-id="5164" instrument_node="">[</span></span><a data-dcnode-id="5161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_NATO%26action%3Dedit%26section%3D3" title="Edit section: Partial withdrawal of France"><span data-dcnode-id="5162" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5159"><span data-dcnode-id="5160" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5156" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5144"><div class="thumbinner" data-dcnode-id="5145" style="width:222px;"><a class="image" data-dcnode-id="5154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANATO_AB_in_France_map-en.svg"><img alt="A map of France with red and blue markings indicating air force bases in 1966." class="thumbimage" data-dcnode-id="5155" data-file-height="1030" data-file-width="1025" decoding="async" height="221" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f0/NATO_AB_in_France_map-en.svg/220px-NATO_AB_in_France_map-en.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f0/NATO_AB_in_France_map-en.svg/330px-NATO_AB_in_France_map-en.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f0/NATO_AB_in_France_map-en.svg/440px-NATO_AB_in_France_map-en.svg.png 2x" width="220"></a><span data-dcnode-id="5153" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5146"><div class="magnify" data-dcnode-id="5151"><a class="internal" data-dcnode-id="5152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANATO_AB_in_France_map-en.svg" title="Enlarge"></a></div><span data-dcnode-id="5150" instrument_node="">Map of the NATO air bases in France before </span><a data-dcnode-id="5148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_de_Gaulle" title="Charles de Gaulle"><span data-dcnode-id="5149" instrument_node="">Charles de Gaulle</span></a><span data-dcnode-id="5147" instrument_node="">'s 1966 withdrawal from NATO military integrated command</span></div></div></div><span data-dcnode-id="5143" instrument_node="">
</span><p data-dcnode-id="5121"><span data-dcnode-id="5142" instrument_node="">NATO's unity was breached early in its history with a crisis occurring during </span><a data-dcnode-id="5140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_de_Gaulle" title="Charles de Gaulle"><span data-dcnode-id="5141" instrument_node="">Charles de Gaulle</span></a><span data-dcnode-id="5139" instrument_node="">'s presidency of France.</span><sup class="reference" data-dcnode-id="5136" id="cite_ref-26"><a data-dcnode-id="5137" href="#cite_note-26"><span data-dcnode-id="5138" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5135" instrument_node=""> De Gaulle protested the strong role of the United States in NATO and what he perceived as a </span><a class="mw-redirect" data-dcnode-id="5133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Special_relationship" title="Special relationship"><span data-dcnode-id="5134" instrument_node="">special relationship</span></a><span data-dcnode-id="5132" instrument_node=""> between it and the United Kingdom. In a memorandum sent to US President </span><a class="mw-redirect" data-dcnode-id="5130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dwight_Eisenhower" title="Dwight Eisenhower"><span data-dcnode-id="5131" instrument_node="">Dwight Eisenhower</span></a><span data-dcnode-id="5129" instrument_node=""> and British Prime Minister </span><a data-dcnode-id="5127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harold_Macmillan" title="Harold Macmillan"><span data-dcnode-id="5128" instrument_node="">Harold Macmillan</span></a><span data-dcnode-id="5126" instrument_node=""> on 17 September 1958, he argued for the creation of a tripartite directorate, which would put France on an equal footing with the US and the UK.</span><sup class="reference" data-dcnode-id="5123" id="cite_ref-FOOTNOTEWengerNuenlistLocher200767–69_27-0"><a data-dcnode-id="5124" href="#cite_note-FOOTNOTEWengerNuenlistLocher200767%E2%80%9369-27"><span data-dcnode-id="5125" instrument_node="">[27]</span></a></sup><span data-dcnode-id="5122" instrument_node="">
</span></p><p data-dcnode-id="5096"><span data-dcnode-id="5120" instrument_node="">Considering the response to be unsatisfactory, de Gaulle began constructing an independent defense force for his country. He wanted to give France, in the event of an </span><a class="mw-redirect" data-dcnode-id="5118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East_German" title="East German"><span data-dcnode-id="5119" instrument_node="">East German</span></a><span data-dcnode-id="5117" instrument_node=""> incursion into West Germany, the option of coming to a separate peace with the </span><a class="mw-redirect" data-dcnode-id="5115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_bloc" title="Eastern bloc"><span data-dcnode-id="5116" instrument_node="">Eastern bloc</span></a><span data-dcnode-id="5114" instrument_node="">, instead of being drawn into a larger war between NATO and the Warsaw Pact.</span><sup class="reference" data-dcnode-id="5111" id="cite_ref-28"><a data-dcnode-id="5112" href="#cite_note-28"><span data-dcnode-id="5113" instrument_node="">[28]</span></a></sup><span data-dcnode-id="5110" instrument_node=""> In February 1959, France withdrew its </span><a class="mw-redirect" data-dcnode-id="5108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mediterranean_Fleet_%28France%29" title="Mediterranean Fleet (France)"><span data-dcnode-id="5109" instrument_node="">Mediterranean Fleet</span></a><span data-dcnode-id="5107" instrument_node=""> from NATO command,</span><sup class="reference" data-dcnode-id="5104" id="cite_ref-FOOTNOTENational_Defense_University199750_29-0"><a data-dcnode-id="5105" href="#cite_note-FOOTNOTENational_Defense_University199750-29"><span data-dcnode-id="5106" instrument_node="">[29]</span></a></sup><span data-dcnode-id="5103" instrument_node=""> and it later banned the stationing of foreign </span><a class="mw-redirect" data-dcnode-id="5101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_weapons" title="Nuclear weapons"><span data-dcnode-id="5102" instrument_node="">nuclear weapons</span></a><span data-dcnode-id="5100" instrument_node=""> on French soil. That caused the United States to transfer 300 military aircraft out of France and to return control of the </span><a data-dcnode-id="5098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Air_Force_in_France" title="United States Air Force in France"><span data-dcnode-id="5099" instrument_node="">air force bases that it had operated in France</span></a><span data-dcnode-id="5097" instrument_node=""> since 1950 to the French by 1967.
</span></p><p data-dcnode-id="5066"><span data-dcnode-id="5095" instrument_node="">Though France showed solidarity with the rest of NATO during the </span><a data-dcnode-id="5093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuban_Missile_Crisis" title="Cuban Missile Crisis"><span data-dcnode-id="5094" instrument_node="">Cuban Missile Crisis</span></a><span data-dcnode-id="5092" instrument_node=""> in 1962, de Gaulle continued his pursuit of an independent defense by removing France's Atlantic and English Channel  fleets from NATO command.</span><sup class="reference" data-dcnode-id="5089" id="cite_ref-FOOTNOTEvan_der_Eyden2003104–106_30-0"><a data-dcnode-id="5090" href="#cite_note-FOOTNOTEvan_der_Eyden2003104%E2%80%93106-30"><span data-dcnode-id="5091" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5088" instrument_node=""> In 1966, all French armed forces were removed from NATO's integrated military command, and all non-French NATO troops were asked to leave France.</span><sup class="reference" data-dcnode-id="5085" id="cite_ref-31"><a data-dcnode-id="5086" href="#cite_note-31"><span data-dcnode-id="5087" instrument_node="">[31]</span></a></sup><span data-dcnode-id="5084" instrument_node=""> The withdrawal forced the relocation of </span><a data-dcnode-id="5082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Headquarters_Allied_Powers_Europe" title="Supreme Headquarters Allied Powers Europe"><span data-dcnode-id="5083" instrument_node="">SHAPE</span></a><span data-dcnode-id="5081" instrument_node=""> from </span><a data-dcnode-id="5079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rocquencourt%2C_Yvelines" title="Rocquencourt, Yvelines"><span data-dcnode-id="5080" instrument_node="">Rocquencourt</span></a><span data-dcnode-id="5078" instrument_node="">, near Paris, to </span><a data-dcnode-id="5076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Casteau" title="Casteau"><span data-dcnode-id="5077" instrument_node="">Casteau</span></a><span data-dcnode-id="5075" instrument_node="">, Belgium, by 16 October 1967.</span><sup class="reference" data-dcnode-id="5072" id="cite_ref-bigmove_32-0"><a data-dcnode-id="5073" href="#cite_note-bigmove-32"><span data-dcnode-id="5074" instrument_node="">[32]</span></a></sup><span data-dcnode-id="5071" instrument_node=""> France remained a member of the alliance and committed to the defense of Europe from possible Warsaw Pact attack with its own forces stationed in West Germany throughout the Cold War. A series of secret accords between the US and French officials, the Lemnitzer–Ailleret Agreements, detailed how French forces would dovetail back into NATO's command structure if East-West hostilities broke out.</span><sup class="reference" data-dcnode-id="5068" id="cite_ref-WP-France_33-0"><a data-dcnode-id="5069" href="#cite_note-WP-France-33"><span data-dcnode-id="5070" instrument_node="">[33]</span></a></sup><span data-dcnode-id="5067" instrument_node="">
</span></p><p data-dcnode-id="5057"><span data-dcnode-id="5065" instrument_node="">When de Gaulle announced his decision to withdraw from the integrated NATO command, US President </span><a class="mw-redirect" data-dcnode-id="5063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lyndon_Johnson" title="Lyndon Johnson"><span data-dcnode-id="5064" instrument_node="">Lyndon Johnson</span></a><span data-dcnode-id="5062" instrument_node=""> suggested that when de Gaulle "comes rushing down like a locomotive on the track, why the Germans and ourselves, we just stand aside and let him go on by, then we are back together again."</span><sup class="reference" data-dcnode-id="5059" id="cite_ref-34"><a data-dcnode-id="5060" href="#cite_note-34"><span data-dcnode-id="5061" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5058" instrument_node="">
</span></p><p data-dcnode-id="5048"><span data-dcnode-id="5056" instrument_node="">That vision came true when France announced its return to full participation at the </span><a data-dcnode-id="5054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2009_Strasbourg%25E2%2580%2593Kehl_summit" title="2009 Strasbourg–Kehl summit"><span data-dcnode-id="5055" instrument_node="">2009 Strasbourg–Kehl summit</span></a><span data-dcnode-id="5053" instrument_node="">.</span><sup class="reference" data-dcnode-id="5050" id="cite_ref-DPC_35-0"><a data-dcnode-id="5051" href="#cite_note-DPC-35"><span data-dcnode-id="5052" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5049" instrument_node="">
</span></p><span data-dcnode-id="5047" instrument_node="">
</span><h2 data-dcnode-id="5036"><span data-dcnode-id="5046" id="D.C3.A9tente_and_escalation"></span><span class="mw-headline" data-dcnode-id="5044" id="Détente_and_escalation"><span data-dcnode-id="5045" instrument_node="">Détente and escalation</span></span><span class="mw-editsection" data-dcnode-id="5037"><span class="mw-editsection-bracket" data-dcnode-id="5042"><span data-dcnode-id="5043" instrument_node="">[</span></span><a data-dcnode-id="5040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_NATO%26action%3Dedit%26section%3D4" title="Edit section: Détente and escalation"><span data-dcnode-id="5041" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5038"><span data-dcnode-id="5039" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5035" instrument_node="">
</span><link data-dcnode-id="5034" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5030" role="note"><span data-dcnode-id="5033" instrument_node="">Main article: </span><a data-dcnode-id="5031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/D%25C3%25A9tente" title="Détente"><span data-dcnode-id="5032" instrument_node="">Détente</span></a></div><span data-dcnode-id="5029" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="5020"><div class="thumbinner" data-dcnode-id="5021" style="width:222px;"><a class="image" data-dcnode-id="5027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALeonid_Brezhnev_and_Richard_Nixon_talks_in_1973.png"><img alt="US President Richard Nixon talked with Soviet leader Leonid Brezhnev in 1973." class="thumbimage" data-dcnode-id="5028" data-file-height="1998" data-file-width="2944" decoding="async" height="149" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Leonid_Brezhnev_and_Richard_Nixon_talks_in_1973.png/220px-Leonid_Brezhnev_and_Richard_Nixon_talks_in_1973.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Leonid_Brezhnev_and_Richard_Nixon_talks_in_1973.png/330px-Leonid_Brezhnev_and_Richard_Nixon_talks_in_1973.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Leonid_Brezhnev_and_Richard_Nixon_talks_in_1973.png/440px-Leonid_Brezhnev_and_Richard_Nixon_talks_in_1973.png 2x" width="220"></a><span data-dcnode-id="5026" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5022"><div class="magnify" data-dcnode-id="5024"><a class="internal" data-dcnode-id="5025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALeonid_Brezhnev_and_Richard_Nixon_talks_in_1973.png" title="Enlarge"></a></div><span data-dcnode-id="5023" instrument_node="">Détente led to many high-level meetings between leaders from both NATO and the Warsaw Pact.</span></div></div></div><span data-dcnode-id="5019" instrument_node="">
</span><p data-dcnode-id="5004"><span data-dcnode-id="5018" instrument_node="">During most of the Cold War, NATO's watch against the Soviet Union and Warsaw Pact did not actually lead to direct military action. On 1 July 1968, the </span><a data-dcnode-id="5016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_on_the_Non-Proliferation_of_Nuclear_Weapons" title="Treaty on the Non-Proliferation of Nuclear Weapons"><span data-dcnode-id="5017" instrument_node="">Treaty on the Non-Proliferation of Nuclear Weapons</span></a><span data-dcnode-id="5015" instrument_node=""> opened for signature. NATO argued that its </span><a data-dcnode-id="5013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_sharing" title="Nuclear sharing"><span data-dcnode-id="5014" instrument_node="">nuclear sharing</span></a><span data-dcnode-id="5012" instrument_node=""> arrangements did not breach the treaty since US forces controlled the weapons until a decision was made to go to war when the treaty would no longer be controlling. Few states then knew of the NATO nuclear sharing arrangements, which were not challenged. In May 1978, NATO countries officially defined two complementary aims of the Alliance: to maintain security and pursue détente. That was supposed to mean matching defenses at the level rendered necessary by the Warsaw Pact's offensive capabilities without spurring a further </span><a data-dcnode-id="5010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arms_race" title="Arms race"><span data-dcnode-id="5011" instrument_node="">arms race</span></a><span data-dcnode-id="5009" instrument_node="">.</span><sup class="reference" data-dcnode-id="5006" id="cite_ref-FOOTNOTEGarthoff1994659–661_36-0"><a data-dcnode-id="5007" href="#cite_note-FOOTNOTEGarthoff1994659%E2%80%93661-36"><span data-dcnode-id="5008" instrument_node="">[36]</span></a></sup><span data-dcnode-id="5005" instrument_node="">
</span></p><p data-dcnode-id="4972"><span data-dcnode-id="5003" instrument_node="">On 12 December 1979, in light of a build-up of Warsaw Pact nuclear capabilities in Europe, ministers approved the deployment of US </span><a data-dcnode-id="5001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/BGM-109G_Ground_Launched_Cruise_Missile" title="BGM-109G Ground Launched Cruise Missile"><span data-dcnode-id="5002" instrument_node="">GLCM</span></a><span data-dcnode-id="5000" instrument_node=""> </span><a data-dcnode-id="4998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cruise_missile" title="Cruise missile"><span data-dcnode-id="4999" instrument_node="">cruise missiles</span></a><span data-dcnode-id="4997" instrument_node=""> and </span><a data-dcnode-id="4995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pershing_II" title="Pershing II"><span data-dcnode-id="4996" instrument_node="">Pershing II</span></a><span data-dcnode-id="4994" instrument_node=""> theatre nuclear weapons in Europe.</span><sup class="reference" data-dcnode-id="4991" id="cite_ref-37"><a data-dcnode-id="4992" href="#cite_note-37"><span data-dcnode-id="4993" instrument_node="">[37]</span></a></sup><span data-dcnode-id="4990" instrument_node=""> The new warheads were also meant to strengthen the West's negotiating position regarding nuclear disarmament. That policy was called the </span><a data-dcnode-id="4988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO_Double-Track_Decision" title="NATO Double-Track Decision"><span data-dcnode-id="4989" instrument_node="">Dual Track</span></a><span data-dcnode-id="4987" instrument_node=""> policy.</span><sup class="reference" data-dcnode-id="4984" id="cite_ref-FOOTNOTENjølstad2004280–282_38-0"><a data-dcnode-id="4985" href="#cite_note-FOOTNOTENj%C3%B8lstad2004280%E2%80%93282-38"><span data-dcnode-id="4986" instrument_node="">[38]</span></a></sup><span data-dcnode-id="4983" instrument_node=""> Similarly, in 1983 and 1984, responding to the stationing of Warsaw Pact </span><a data-dcnode-id="4981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/RSD-10_Pioneer" title="RSD-10 Pioneer"><span data-dcnode-id="4982" instrument_node="">SS-20</span></a><span data-dcnode-id="4980" instrument_node=""> medium-range missiles in Europe, NATO deployed modern Pershing II missiles tasked to hit military targets such as tank formations in the event of war.</span><sup class="reference" data-dcnode-id="4977" id="cite_ref-FOOTNOTENjølstad2004278–279_39-0"><a data-dcnode-id="4978" href="#cite_note-FOOTNOTENj%C3%B8lstad2004278%E2%80%93279-39"><span data-dcnode-id="4979" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4976" instrument_node=""> That action led to </span><a data-dcnode-id="4974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peace_movement" title="Peace movement"><span data-dcnode-id="4975" instrument_node="">peace movement</span></a><span data-dcnode-id="4973" instrument_node=""> protests throughout Western Europe, and support for their deployment wavered, as many doubted whether the push for deployment could be sustained.
</span></p><span data-dcnode-id="4971" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4960"><div class="thumbinner" data-dcnode-id="4961" style="width:222px;"><a class="image" data-dcnode-id="4969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAankomst_Amerikaanse_militairen_i.v.m._oefening_Reforger_op_Schiphol_minister_V%2C_Bestanddeelnr_934-0596.jpg"><img alt="" class="thumbimage" data-dcnode-id="4970" data-file-height="2475" data-file-width="3749" decoding="async" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Aankomst_Amerikaanse_militairen_i.v.m._oefening_Reforger_op_Schiphol_minister_V%252C_Bestanddeelnr_934-0596.jpg/220px-Aankomst_Amerikaanse_militairen_i.v.m._oefening_Reforger_op_Schiphol_minister_V%252C_Bestanddeelnr_934-0596.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Aankomst_Amerikaanse_militairen_i.v.m._oefening_Reforger_op_Schiphol_minister_V%2C_Bestanddeelnr_934-0596.jpg/330px-Aankomst_Amerikaanse_militairen_i.v.m._oefening_Reforger_op_Schiphol_minister_V%2C_Bestanddeelnr_934-0596.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Aankomst_Amerikaanse_militairen_i.v.m._oefening_Reforger_op_Schiphol_minister_V%2C_Bestanddeelnr_934-0596.jpg/440px-Aankomst_Amerikaanse_militairen_i.v.m._oefening_Reforger_op_Schiphol_minister_V%2C_Bestanddeelnr_934-0596.jpg 2x" width="220"></a><span data-dcnode-id="4968" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4962"><div class="magnify" data-dcnode-id="4966"><a class="internal" data-dcnode-id="4967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAankomst_Amerikaanse_militairen_i.v.m._oefening_Reforger_op_Schiphol_minister_V%2C_Bestanddeelnr_934-0596.jpg" title="Enlarge"></a></div><a data-dcnode-id="4964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wim_van_Eekelen" title="Wim van Eekelen"><span data-dcnode-id="4965" instrument_node="">Wim van Eekelen</span></a><span data-dcnode-id="4963" instrument_node="">, Minister of Defence of the Netherlands, greeting US soldiers deploying to NATO bases in 1987</span></div></div></div><span data-dcnode-id="4959" instrument_node="">
</span><p data-dcnode-id="4940"><span data-dcnode-id="4958" instrument_node="">The membership of the organization was then largely static. In 1974, as a consequence of the </span><a data-dcnode-id="4956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkish_invasion_of_Cyprus" title="Turkish invasion of Cyprus"><span data-dcnode-id="4957" instrument_node="">Turkish invasion of Cyprus</span></a><span data-dcnode-id="4955" instrument_node="">, Greece withdrew its forces from NATO's military command structure but, with Turkish co-operation, was readmitted in 1980.</span><sup class="reference" data-dcnode-id="4952" id="cite_ref-40"><a data-dcnode-id="4953" href="#cite_note-40"><span data-dcnode-id="4954" instrument_node="">[40]</span></a></sup><span data-dcnode-id="4951" instrument_node=""> The </span><a data-dcnode-id="4949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Falklands_War" title="Falklands War"><span data-dcnode-id="4950" instrument_node="">Falklands War</span></a><span data-dcnode-id="4948" instrument_node=""> between the United Kingdom and Argentina did not result in NATO involvement because Article 6 of the North Atlantic Treaty specifies that collective self-defense is applicable only to attacks on member state territories north of the </span><a data-dcnode-id="4946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tropic_of_Cancer" title="Tropic of Cancer"><span data-dcnode-id="4947" instrument_node="">Tropic of Cancer</span></a><span data-dcnode-id="4945" instrument_node="">.</span><sup class="reference" data-dcnode-id="4942" id="cite_ref-FOOTNOTEKaplan200489–91_41-0"><a data-dcnode-id="4943" href="#cite_note-FOOTNOTEKaplan200489%E2%80%9391-41"><span data-dcnode-id="4944" instrument_node="">[41]</span></a></sup><span data-dcnode-id="4941" instrument_node="">
</span></p><p data-dcnode-id="4931"><span data-dcnode-id="4939" instrument_node="">On 30 May 1982, NATO gained a new member when the newly-democratic Spain joined the alliance, as was confirmed by </span><a data-dcnode-id="4937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1986_Spanish_NATO_membership_referendum" title="1986 Spanish NATO membership referendum"><span data-dcnode-id="4938" instrument_node="">referendum in 1986</span></a><span data-dcnode-id="4936" instrument_node="">. At the peak of the Cold War, 16 member nations maintained an approximate strength of 5,252,800 active militaries, including as many as 435,000 forward-deployed US forces, under a command structure that reached a peak of 78 headquarters, organized into four echelons.</span><sup class="reference" data-dcnode-id="4933" id="cite_ref-42"><a data-dcnode-id="4934" href="#cite_note-42"><span data-dcnode-id="4935" instrument_node="">[42]</span></a></sup><span data-dcnode-id="4932" instrument_node="">
</span></p><span data-dcnode-id="4930" instrument_node="">
