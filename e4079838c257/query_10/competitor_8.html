</span><h2 data-dcnode-id="4920"><span class="mw-headline" data-dcnode-id="4928" id="After_the_Cold_War"><span data-dcnode-id="4929" instrument_node="">After the Cold War</span></span><span class="mw-editsection" data-dcnode-id="4921"><span class="mw-editsection-bracket" data-dcnode-id="4926"><span data-dcnode-id="4927" instrument_node="">[</span></span><a data-dcnode-id="4924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_NATO%26action%3Dedit%26section%3D5" title="Edit section: After the Cold War"><span data-dcnode-id="4925" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4922"><span data-dcnode-id="4923" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4919" instrument_node="">
</span><link data-dcnode-id="4918" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4914" role="note"><span data-dcnode-id="4917" instrument_node="">Main article: </span><a data-dcnode-id="4915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russia%25E2%2580%2593NATO_relations" title="Russia–NATO relations"><span data-dcnode-id="4916" instrument_node="">Russia–NATO relations</span></a></div><span data-dcnode-id="4913" instrument_node="">
</span><p data-dcnode-id="4891"><span data-dcnode-id="4912" instrument_node="">The Revolutions of 1989 and the dissolution of the Warsaw Pact in 1991 removed the </span><i data-dcnode-id="4910"><span data-dcnode-id="4911" instrument_node="">de facto</span></i><span data-dcnode-id="4909" instrument_node=""> main adversary of NATO and caused a strategic re-evaluation of NATO's purpose, nature, tasks, and focus on the continent of Europe. The shift started, with the 1990 signing in Paris of the </span><a data-dcnode-id="4907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_on_Conventional_Armed_Forces_in_Europe" title="Treaty on Conventional Armed Forces in Europe"><span data-dcnode-id="4908" instrument_node="">Treaty on Conventional Armed Forces in Europe</span></a><span data-dcnode-id="4906" instrument_node=""> between NATO and the Soviet Union, which mandated specific military reductions across the continent, which continued after the </span><a data-dcnode-id="4904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_Soviet_Union" title="Dissolution of the Soviet Union"><span data-dcnode-id="4905" instrument_node="">dissolution of the Soviet Union</span></a><span data-dcnode-id="4903" instrument_node=""> in December 1991.</span><sup class="reference" data-dcnode-id="4900" id="cite_ref-43"><a data-dcnode-id="4901" href="#cite_note-43"><span data-dcnode-id="4902" instrument_node="">[43]</span></a></sup><span data-dcnode-id="4899" instrument_node=""> European countries then accounted for 34 percent of NATO's military spending; by 2012, that had fallen to 21 percent.</span><sup class="reference" data-dcnode-id="4896" id="cite_ref-44"><a data-dcnode-id="4897" href="#cite_note-44"><span data-dcnode-id="4898" instrument_node="">[44]</span></a></sup><span data-dcnode-id="4895" instrument_node=""> NATO also began a gradual expansion to include countries of </span><a data-dcnode-id="4893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_and_Eastern_Europe" title="Central and Eastern Europe"><span data-dcnode-id="4894" instrument_node="">Central and Eastern Europe</span></a><span data-dcnode-id="4892" instrument_node=""> and extended its activities into political and humanitarian situations that had not been thought of as NATO concerns.
</span></p><span data-dcnode-id="4890" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="4875"><div class="thumbinner" data-dcnode-id="4876" style="width:222px;"><a class="image" data-dcnode-id="4888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APresident_George_H._W._Bush_and_Mikhail_Gorbachev.jpg"><img alt="Two men in suits sit signing documents at a large table in front of their countries' flags while two others stand outside watching them." class="thumbimage" data-dcnode-id="4889" data-file-height="1409" data-file-width="2100" decoding="async" height="148" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/59/President_George_H._W._Bush_and_Mikhail_Gorbachev.jpg/220px-President_George_H._W._Bush_and_Mikhail_Gorbachev.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/59/President_George_H._W._Bush_and_Mikhail_Gorbachev.jpg/330px-President_George_H._W._Bush_and_Mikhail_Gorbachev.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/59/President_George_H._W._Bush_and_Mikhail_Gorbachev.jpg/440px-President_George_H._W._Bush_and_Mikhail_Gorbachev.jpg 2x" width="220"></a><span data-dcnode-id="4887" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4877"><div class="magnify" data-dcnode-id="4885"><a class="internal" data-dcnode-id="4886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APresident_George_H._W._Bush_and_Mikhail_Gorbachev.jpg" title="Enlarge"></a></div><span data-dcnode-id="4884" instrument_node="">Reforms made under Soviet leader </span><a data-dcnode-id="4882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Gorbachev" title="Mikhail Gorbachev"><span data-dcnode-id="4883" instrument_node="">Mikhail Gorbachev</span></a><span data-dcnode-id="4881" instrument_node=""> led to the end of the </span><a data-dcnode-id="4879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw_Pact" title="Warsaw Pact"><span data-dcnode-id="4880" instrument_node="">Warsaw Pact</span></a><span data-dcnode-id="4878" instrument_node="">.</span></div></div></div><span data-dcnode-id="4874" instrument_node="">
</span><p data-dcnode-id="4801"><span data-dcnode-id="4873" instrument_node="">An expansion of NATO came with </span><a data-dcnode-id="4871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_reunification" title="German reunification"><span data-dcnode-id="4872" instrument_node="">German reunification</span></a><span data-dcnode-id="4870" instrument_node=""> on 3 October 1990, when the former East Germany became part of the </span><a class="mw-redirect" data-dcnode-id="4868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_Republic_of_Germany" title="Federal Republic of Germany"><span data-dcnode-id="4869" instrument_node="">Federal Republic of Germany</span></a><span data-dcnode-id="4867" instrument_node=""> and of the alliance. That had been agreed in the </span><a data-dcnode-id="4865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_on_the_Final_Settlement_with_Respect_to_Germany" title="Treaty on the Final Settlement with Respect to Germany"><span data-dcnode-id="4866" instrument_node="">Two Plus Four Treaty</span></a><span data-dcnode-id="4864" instrument_node=""> earlier that year. To secure Soviet approval of a united Germany remaining in NATO, it was agreed that foreign troops and nuclear weapons would not be stationed in the east. There was no formal commitment in the agreement not to expand NATO to the east, but there are diverging views on whether negotiators gave informal commitments regarding further NATO expansion.</span><sup class="reference" data-dcnode-id="4861" id="cite_ref-Kramer_2017_45-0"><a data-dcnode-id="4862" href="#cite_note-Kramer_2017-45"><span data-dcnode-id="4863" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="4858" id="cite_ref-International_Security_46-0"><a data-dcnode-id="4859" href="#cite_note-International_Security-46"><span data-dcnode-id="4860" instrument_node="">[46]</span></a></sup><sup class="reference" data-dcnode-id="4855" id="cite_ref-47"><a data-dcnode-id="4856" href="#cite_note-47"><span data-dcnode-id="4857" instrument_node="">[47]</span></a></sup><span data-dcnode-id="4854" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="4852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jack_Matlock" title="Jack Matlock"><span data-dcnode-id="4853" instrument_node="">Jack Matlock</span></a><span data-dcnode-id="4851" instrument_node="">, the American ambassador to the Soviet Union during its final years, said that the West gave a "clear commitment" not to expand, and declassified documents indicate that Soviet negotiators had the impression that NATO membership was off the table for countries such as Czechoslovakia, Hungary, or Poland.</span><sup class="reference" data-dcnode-id="4848" id="cite_ref-Spiegel_review_48-0"><a data-dcnode-id="4849" href="#cite_note-Spiegel_review-48"><span data-dcnode-id="4850" instrument_node="">[48]</span></a></sup><span data-dcnode-id="4847" instrument_node=""> </span><a data-dcnode-id="4845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hans-Dietrich_Genscher" title="Hans-Dietrich Genscher"><span data-dcnode-id="4846" instrument_node="">Hans-Dietrich Genscher</span></a><span data-dcnode-id="4844" instrument_node="">, the West German foreign minister, said in a conversation with </span><a data-dcnode-id="4842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eduard_Shevardnadze" title="Eduard Shevardnadze"><span data-dcnode-id="4843" instrument_node="">Eduard Shevardnadze</span></a><span data-dcnode-id="4841" instrument_node="">, "For us, however, one thing is certain: NATO will not expand to the east."</span><sup class="reference" data-dcnode-id="4838" id="cite_ref-Spiegel_review_48-1"><a data-dcnode-id="4839" href="#cite_note-Spiegel_review-48"><span data-dcnode-id="4840" instrument_node="">[48]</span></a></sup><span data-dcnode-id="4837" instrument_node=""> In 1996, Gorbachev wrote in his </span><i data-dcnode-id="4835"><span data-dcnode-id="4836" instrument_node="">Memoirs</span></i><span data-dcnode-id="4834" instrument_node=""> that "during the negotiations on the unification of Germany they gave assurances that NATO would not extend its zone of operation to the east,"</span><sup class="reference" data-dcnode-id="4831" id="cite_ref-FOOTNOTEGorbachev1996675_49-0"><a data-dcnode-id="4832" href="#cite_note-FOOTNOTEGorbachev1996675-49"><span data-dcnode-id="4833" instrument_node="">[49]</span></a></sup><span data-dcnode-id="4830" instrument_node=""> and he repeated that view in an interview in 2008.</span><sup class="reference" data-dcnode-id="4827" id="cite_ref-me_50-0"><a data-dcnode-id="4828" href="#cite_note-me-50"><span data-dcnode-id="4829" instrument_node="">[50]</span></a></sup><span data-dcnode-id="4826" instrument_node=""> However, in 2014 Gorbachev stated the opposite: "The topic of 'NATO expansion' was not discussed at all [in 1990], and it wasn't brought up in those years. I say this with full responsibility. Western leaders didn't bring it up, either."</span><sup class="reference" data-dcnode-id="4823" id="cite_ref-Kramer_2017_45-1"><a data-dcnode-id="4824" href="#cite_note-Kramer_2017-45"><span data-dcnode-id="4825" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="4820" id="cite_ref-51"><a data-dcnode-id="4821" href="#cite_note-51"><span data-dcnode-id="4822" instrument_node="">[51]</span></a></sup><span data-dcnode-id="4819" instrument_node=""> According to </span><a data-dcnode-id="4817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Zoellick" title="Robert Zoellick"><span data-dcnode-id="4818" instrument_node="">Robert Zoellick</span></a><span data-dcnode-id="4816" instrument_node="">, a </span><a class="mw-redirect" data-dcnode-id="4814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/US_State_Department" title="US State Department"><span data-dcnode-id="4815" instrument_node="">US State Department</span></a><span data-dcnode-id="4813" instrument_node=""> official involved in the Two Plus Four negotiating process, that appears to be a misperception, and no formal commitment regarding enlargement was made.</span><sup class="reference" data-dcnode-id="4810" id="cite_ref-52"><a data-dcnode-id="4811" href="#cite_note-52"><span data-dcnode-id="4812" instrument_node="">[52]</span></a></sup><span data-dcnode-id="4809" instrument_node=""> Harvard University historian Mark Kramer also rejects that an informal agreement existed.</span><sup class="reference" data-dcnode-id="4806" id="cite_ref-Kramer_2017_45-2"><a data-dcnode-id="4807" href="#cite_note-Kramer_2017-45"><span data-dcnode-id="4808" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="4803" id="cite_ref-53"><a data-dcnode-id="4804" href="#cite_note-53"><span data-dcnode-id="4805" instrument_node="">[53]</span></a></sup><span data-dcnode-id="4802" instrument_node="">
</span></p><p data-dcnode-id="4780"><span data-dcnode-id="4800" instrument_node="">As part of restructuring, NATO's military structure was cut back and reorganized, with new forces such as the </span><a data-dcnode-id="4798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied_Rapid_Reaction_Corps" title="Allied Rapid Reaction Corps"><span data-dcnode-id="4799" instrument_node="">Headquarters Allied Command Europe Rapid Reaction Corps</span></a><span data-dcnode-id="4797" instrument_node=""> established. The changes brought about by the collapse of the Soviet Union on the military balance in Europe were recognized in the </span><a data-dcnode-id="4795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adapted_Conventional_Armed_Forces_in_Europe_Treaty" title="Adapted Conventional Armed Forces in Europe Treaty"><span data-dcnode-id="4796" instrument_node="">Adapted Conventional Armed Forces in Europe Treaty</span></a><span data-dcnode-id="4794" instrument_node="">, which was signed by 30 countries in 1999, ratified by Russia in 2000, but never ratified by any NATO member, and therefore never came into effect. The policies of French President </span><a data-dcnode-id="4792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nicolas_Sarkozy" title="Nicolas Sarkozy"><span data-dcnode-id="4793" instrument_node="">Nicolas Sarkozy</span></a><span data-dcnode-id="4791" instrument_node=""> resulted in a major reform of France's military position, culminating with the return to full membership on 4 April 2009, which also included France rejoining the </span><a class="mw-redirect" data-dcnode-id="4789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO_Military_Command_Structure" title="NATO Military Command Structure"><span data-dcnode-id="4790" instrument_node="">NATO Military Command Structure</span></a><span data-dcnode-id="4788" instrument_node=""> but maintaining an independent nuclear deterrent.</span><sup class="reference" data-dcnode-id="4785" id="cite_ref-WP-France_33-1"><a data-dcnode-id="4786" href="#cite_note-WP-France-33"><span data-dcnode-id="4787" instrument_node="">[33]</span></a></sup><sup class="reference" data-dcnode-id="4782" id="cite_ref-guardian-france_54-0"><a data-dcnode-id="4783" href="#cite_note-guardian-france-54"><span data-dcnode-id="4784" instrument_node="">[54]</span></a></sup><span data-dcnode-id="4781" instrument_node="">
</span></p><span data-dcnode-id="4779" instrument_node="">
</span><h2 data-dcnode-id="4769"><span class="mw-headline" data-dcnode-id="4777" id="Enlargement_and_reform"><span data-dcnode-id="4778" instrument_node="">Enlargement and reform</span></span><span class="mw-editsection" data-dcnode-id="4770"><span class="mw-editsection-bracket" data-dcnode-id="4775"><span data-dcnode-id="4776" instrument_node="">[</span></span><a data-dcnode-id="4773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_NATO%26action%3Dedit%26section%3D6" title="Edit section: Enlargement and reform"><span data-dcnode-id="4774" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4771"><span data-dcnode-id="4772" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4768" instrument_node="">
</span><link data-dcnode-id="4767" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4763" role="note"><span data-dcnode-id="4766" instrument_node="">Further information: </span><a data-dcnode-id="4764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enlargement_of_NATO" title="Enlargement of NATO"><span data-dcnode-id="4765" instrument_node="">Enlargement of NATO</span></a></div><span data-dcnode-id="4762" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4747"><div class="thumbinner" data-dcnode-id="4748" style="width:172px;"><a class="image" data-dcnode-id="4760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASvecanost_podizanja_NATOve_zastave_Zagreb.jpg"><img alt="A pale yellow building with square columns with three flags hanging in front and soldiers and dignitaries saluting them." class="thumbimage" data-dcnode-id="4761" data-file-height="1684" data-file-width="1280" decoding="async" height="224" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/06/Svecanost_podizanja_NATOve_zastave_Zagreb.jpg/170px-Svecanost_podizanja_NATOve_zastave_Zagreb.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/06/Svecanost_podizanja_NATOve_zastave_Zagreb.jpg/255px-Svecanost_podizanja_NATOve_zastave_Zagreb.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/06/Svecanost_podizanja_NATOve_zastave_Zagreb.jpg/340px-Svecanost_podizanja_NATOve_zastave_Zagreb.jpg 2x" width="170"></a><span data-dcnode-id="4759" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4749"><div class="magnify" data-dcnode-id="4757"><a class="internal" data-dcnode-id="4758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASvecanost_podizanja_NATOve_zastave_Zagreb.jpg" title="Enlarge"></a></div><span data-dcnode-id="4756" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="4754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO_flag" title="NATO flag"><span data-dcnode-id="4755" instrument_node="">NATO flag</span></a><span data-dcnode-id="4753" instrument_node=""> being raised in a ceremony marking </span><a data-dcnode-id="4751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Croatia" title="Croatia"><span data-dcnode-id="4752" instrument_node="">Croatia</span></a><span data-dcnode-id="4750" instrument_node="">'s joining of the alliance in 2009</span></div></div></div><span data-dcnode-id="4746" instrument_node="">
</span><p data-dcnode-id="4729"><span data-dcnode-id="4745" instrument_node="">Between 1994 and 1997, wider forums for regional cooperation between NATO and its neighbors were set up, like the </span><a data-dcnode-id="4743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Partnership_for_Peace" title="Partnership for Peace"><span data-dcnode-id="4744" instrument_node="">Partnership for Peace</span></a><span data-dcnode-id="4742" instrument_node="">, the </span><a data-dcnode-id="4740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mediterranean_Dialogue" title="Mediterranean Dialogue"><span data-dcnode-id="4741" instrument_node="">Mediterranean Dialogue</span></a><span data-dcnode-id="4739" instrument_node=""> initiative, and the </span><a data-dcnode-id="4737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Euro-Atlantic_Partnership_Council" title="Euro-Atlantic Partnership Council"><span data-dcnode-id="4738" instrument_node="">Euro-Atlantic Partnership Council</span></a><span data-dcnode-id="4736" instrument_node="">. In 1998, the </span><a class="mw-redirect" data-dcnode-id="4734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO%25E2%2580%2593Russia_relations" title="NATO–Russia relations"><span data-dcnode-id="4735" instrument_node="">NATO–Russia Permanent Joint Council</span></a><span data-dcnode-id="4733" instrument_node=""> was established. On 8 July 1997, three former communist countries (Hungary, the Czech Republic, and Poland) were invited to join NATO, which was accepted by all three, with Hungarian acceptance being endorsed in </span><a data-dcnode-id="4731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1997_Hungarian_NATO_membership_referendum" title="1997 Hungarian NATO membership referendum"><span data-dcnode-id="4732" instrument_node="">a referendum</span></a><span data-dcnode-id="4730" instrument_node=""> in which 85.3% of voters supported joining NATO.
</span></p><p data-dcnode-id="4708"><span data-dcnode-id="4728" instrument_node="">Czech President </span><a class="mw-redirect" data-dcnode-id="4726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vaclav_Havel" title="Vaclav Havel"><span data-dcnode-id="4727" instrument_node="">Vaclav Havel</span></a><span data-dcnode-id="4725" instrument_node=""> welcomed the expansion: "Never have we been part of such a broad, solid and binding security alliance, which at the same time respects in its essence the sovereignty and will of our nation." Polish Foreign Minister </span><a class="mw-redirect" data-dcnode-id="4723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bronislaw_Geremek" title="Bronislaw Geremek"><span data-dcnode-id="4724" instrument_node="">Bronislaw Geremek</span></a><span data-dcnode-id="4722" instrument_node=""> also welcomed the expansion: "Poland forever returns where she has always belonged: the free world." Hungarian Foreign Minister </span><a class="mw-redirect" data-dcnode-id="4720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Janos_Martonyi" title="Janos Martonyi"><span data-dcnode-id="4721" instrument_node="">Janos Martonyi</span></a><span data-dcnode-id="4719" instrument_node=""> stated that the expansion showed that Hungary was returning "to her natural habitat." The expansion was also welcomed by US Secretary of State </span><a data-dcnode-id="4717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Madeleine_Albright" title="Madeleine Albright"><span data-dcnode-id="4718" instrument_node="">Madeleine Albright</span></a><span data-dcnode-id="4716" instrument_node="">, who stated that the expansion would do "for Europe's east what NATO has already helped to do for Europe's west: steadily and systematically, we will continue erasing – without replacing – the line drawn in Europe by </span><a class="mw-redirect" data-dcnode-id="4714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stalin" title="Stalin"><span data-dcnode-id="4715" instrument_node="">Stalin</span></a><span data-dcnode-id="4713" instrument_node="">'s bloody boot."</span><sup class="reference" data-dcnode-id="4710" id="cite_ref-55"><a data-dcnode-id="4711" href="#cite_note-55"><span data-dcnode-id="4712" instrument_node="">[55]</span></a></sup><span data-dcnode-id="4709" instrument_node="">
</span></p><p data-dcnode-id="4689"><span data-dcnode-id="4707" instrument_node="">The expansion was criticized in the US by some policy experts as a "policy error of historic proportions."</span><sup class="reference" data-dcnode-id="4704" id="cite_ref-56"><a data-dcnode-id="4705" href="#cite_note-56"><span data-dcnode-id="4706" instrument_node="">[56]</span></a></sup><span data-dcnode-id="4703" instrument_node=""> According to </span><a data-dcnode-id="4701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_F._Kennan" title="George F. Kennan"><span data-dcnode-id="4702" instrument_node="">George F. Kennan</span></a><span data-dcnode-id="4700" instrument_node="">, an American diplomat and former advocate of the </span><a data-dcnode-id="4698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Containment" title="Containment"><span data-dcnode-id="4699" instrument_node="">containment</span></a><span data-dcnode-id="4697" instrument_node=""> policy, the decision "may be expected to have an adverse effect on the development of Russian democracy; to restore the atmosphere of the cold war to </span><a class="mw-redirect" data-dcnode-id="4695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East-West_relations" title="East-West relations"><span data-dcnode-id="4696" instrument_node="">East-West relations</span></a><span data-dcnode-id="4694" instrument_node="">, to impel Russian foreign policy in directions decidedly not to our liking."</span><sup class="reference" data-dcnode-id="4691" id="cite_ref-57"><a data-dcnode-id="4692" href="#cite_note-57"><span data-dcnode-id="4693" instrument_node="">[57]</span></a></sup><span data-dcnode-id="4690" instrument_node="">
</span></p><p data-dcnode-id="4645"><span data-dcnode-id="4688" instrument_node="">Membership went on expanding with the accession of seven more Central and Eastern European countries to NATO: </span><a data-dcnode-id="4686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Estonia" title="Estonia"><span data-dcnode-id="4687" instrument_node="">Estonia</span></a><span data-dcnode-id="4685" instrument_node="">, </span><a data-dcnode-id="4683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latvia" title="Latvia"><span data-dcnode-id="4684" instrument_node="">Latvia</span></a><span data-dcnode-id="4682" instrument_node="">, </span><a data-dcnode-id="4680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithuania" title="Lithuania"><span data-dcnode-id="4681" instrument_node="">Lithuania</span></a><span data-dcnode-id="4679" instrument_node="">, </span><a data-dcnode-id="4677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slovenia" title="Slovenia"><span data-dcnode-id="4678" instrument_node="">Slovenia</span></a><span data-dcnode-id="4676" instrument_node="">, </span><a data-dcnode-id="4674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slovakia" title="Slovakia"><span data-dcnode-id="4675" instrument_node="">Slovakia</span></a><span data-dcnode-id="4673" instrument_node="">, </span><a data-dcnode-id="4671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bulgaria" title="Bulgaria"><span data-dcnode-id="4672" instrument_node="">Bulgaria</span></a><span data-dcnode-id="4670" instrument_node="">, and </span><a data-dcnode-id="4668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romania" title="Romania"><span data-dcnode-id="4669" instrument_node="">Romania</span></a><span data-dcnode-id="4667" instrument_node="">. They were first invited to start talks of membership during the 2002 Prague summit and joined NATO on 29 March 2004, shortly before the </span><a data-dcnode-id="4665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2004_Istanbul_summit" title="2004 Istanbul summit"><span data-dcnode-id="4666" instrument_node="">2004 Istanbul summit</span></a><span data-dcnode-id="4664" instrument_node="">. Slovenian membership was endorsed in </span><a data-dcnode-id="4662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2003_Slovenian_European_Union_and_NATO_membership_referendum" title="2003 Slovenian European Union and NATO membership referendum"><span data-dcnode-id="4663" instrument_node="">a referendum</span></a><span data-dcnode-id="4661" instrument_node=""> in which 66.02% of voters supported joining.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4654" style="white-space:nowrap;"><span data-dcnode-id="4660" instrument_node="">[</span><i data-dcnode-id="4656"><a data-dcnode-id="4657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4658" title="This claim needs references to reliable sources. (March 2022)"><span data-dcnode-id="4659" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4655" instrument_node="">]</span></sup><span data-dcnode-id="4653" instrument_node=""> The entry of Romania into NATO is particularly notable as it put the strategic </span><a data-dcnode-id="4651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foc%25C8%2599ani_Gate" title="Focșani Gate"><span data-dcnode-id="4652" instrument_node="">Focșani Gate</span></a><span data-dcnode-id="4650" instrument_node=""> under NATO control.</span><sup class="reference" data-dcnode-id="4647" id="cite_ref-58"><a data-dcnode-id="4648" href="#cite_note-58"><span data-dcnode-id="4649" instrument_node="">[58]</span></a></sup><span data-dcnode-id="4646" instrument_node="">
</span></p><p data-dcnode-id="4600"><span data-dcnode-id="4644" instrument_node="">New NATO structures were also formed while old ones were abolished. In 1997, NATO reached agreement on a significant downsizing of its command structure from 65 headquarters to 20.</span><sup class="reference" data-dcnode-id="4641" id="cite_ref-59"><a data-dcnode-id="4642" href="#cite_note-59"><span data-dcnode-id="4643" instrument_node="">[59]</span></a></sup><span data-dcnode-id="4640" instrument_node=""> The </span><a data-dcnode-id="4638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO_Response_Force" title="NATO Response Force"><span data-dcnode-id="4639" instrument_node="">NATO Response Force</span></a><span data-dcnode-id="4637" instrument_node=""> (NRF) was launched at the </span><a data-dcnode-id="4635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2002_Prague_summit" title="2002 Prague summit"><span data-dcnode-id="4636" instrument_node="">2002 Prague summit</span></a><span data-dcnode-id="4634" instrument_node=""> on 21 November, the first summit in a former </span><a data-dcnode-id="4632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Comecon" title="Comecon"><span data-dcnode-id="4633" instrument_node="">Comecon</span></a><span data-dcnode-id="4631" instrument_node=""> country. On 19 June 2003, a further restructuring of the NATO military commands began as the Headquarters of the Supreme Allied Commander, Atlantic were abolished and a new command, </span><a data-dcnode-id="4629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied_Command_Transformation" title="Allied Command Transformation"><span data-dcnode-id="4630" instrument_node="">Allied Command Transformation</span></a><span data-dcnode-id="4628" instrument_node=""> (ACT), was established in </span><a data-dcnode-id="4626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Norfolk%2C_Virginia" title="Norfolk, Virginia"><span data-dcnode-id="4627" instrument_node="">Norfolk, Virginia</span></a><span data-dcnode-id="4625" instrument_node="">, United States, and the Supreme Headquarters Allied Powers Europe (SHAPE) became the Headquarters of </span><a data-dcnode-id="4623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Headquarters_Allied_Powers_Europe" title="Supreme Headquarters Allied Powers Europe"><span data-dcnode-id="4624" instrument_node="">Allied Command Operations</span></a><span data-dcnode-id="4622" instrument_node=""> (ACO). ACT is responsible for driving transformation (future capabilities) in NATO while ACO is responsible for current operations.</span><sup class="reference" data-dcnode-id="4619" id="cite_ref-aco_60-0"><a data-dcnode-id="4620" href="#cite_note-aco-60"><span data-dcnode-id="4621" instrument_node="">[60]</span></a></sup><span data-dcnode-id="4618" instrument_node=""> In March 2004, NATO's </span><a data-dcnode-id="4616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baltic_Air_Policing" title="Baltic Air Policing"><span data-dcnode-id="4617" instrument_node="">Baltic Air Policing</span></a><span data-dcnode-id="4615" instrument_node=""> began, which supported the sovereignty of Latvia, Lithuania, and Estonia by providing jet fighters to react to any unwanted aerial intrusions. Eight multinational jet fighters are based in Lithuania, the number of which was increased from four in 2014.</span><sup class="reference" data-dcnode-id="4612" id="cite_ref-61"><a data-dcnode-id="4613" href="#cite_note-61"><span data-dcnode-id="4614" instrument_node="">[61]</span></a></sup><span data-dcnode-id="4611" instrument_node=""> Also at the 2004 Istanbul summit, NATO launched the </span><a data-dcnode-id="4609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Istanbul_Cooperation_Initiative" title="Istanbul Cooperation Initiative"><span data-dcnode-id="4610" instrument_node="">Istanbul Cooperation Initiative</span></a><span data-dcnode-id="4608" instrument_node=""> with four </span><a data-dcnode-id="4606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persian_Gulf" title="Persian Gulf"><span data-dcnode-id="4607" instrument_node="">Persian Gulf</span></a><span data-dcnode-id="4605" instrument_node=""> nations.</span><sup class="reference" data-dcnode-id="4602" id="cite_ref-62"><a data-dcnode-id="4603" href="#cite_note-62"><span data-dcnode-id="4604" instrument_node="">[62]</span></a></sup><span data-dcnode-id="4601" instrument_node="">
</span></p><span data-dcnode-id="4599" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="4587"><div class="thumbinner" data-dcnode-id="4588" style="width:222px;"><a class="image" data-dcnode-id="4597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMsc_2007-Saturday%2C_11.00_-_13.00_Uhr-Wildgrube056_Scheffer_Juschtschenko.jpg"><img alt="Two older men in black suits and red ties sit facing each other in a room with green, white, and gold-trimmed walls." class="thumbimage" data-dcnode-id="4598" data-file-height="1368" data-file-width="2604" decoding="async" height="116" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/78/Msc_2007-Saturday%252C_11.00_-_13.00_Uhr-Wildgrube056_Scheffer_Juschtschenko.jpg/220px-Msc_2007-Saturday%252C_11.00_-_13.00_Uhr-Wildgrube056_Scheffer_Juschtschenko.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/78/Msc_2007-Saturday%2C_11.00_-_13.00_Uhr-Wildgrube056_Scheffer_Juschtschenko.jpg/330px-Msc_2007-Saturday%2C_11.00_-_13.00_Uhr-Wildgrube056_Scheffer_Juschtschenko.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/78/Msc_2007-Saturday%2C_11.00_-_13.00_Uhr-Wildgrube056_Scheffer_Juschtschenko.jpg/440px-Msc_2007-Saturday%2C_11.00_-_13.00_Uhr-Wildgrube056_Scheffer_Juschtschenko.jpg 2x" width="220"></a><span data-dcnode-id="4596" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4589"><div class="magnify" data-dcnode-id="4594"><a class="internal" data-dcnode-id="4595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMsc_2007-Saturday%2C_11.00_-_13.00_Uhr-Wildgrube056_Scheffer_Juschtschenko.jpg" title="Enlarge"></a></div><span data-dcnode-id="4593" instrument_node="">Meetings between the government of Ukrainian President </span><a data-dcnode-id="4591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Viktor_Yushchenko" title="Viktor Yushchenko"><span data-dcnode-id="4592" instrument_node="">Viktor Yushchenko</span></a><span data-dcnode-id="4590" instrument_node=""> and NATO leaders led to the Intensified Dialogue program.</span></div></div></div><span data-dcnode-id="4586" instrument_node="">
</span><p data-dcnode-id="4549"><span data-dcnode-id="4585" instrument_node="">The </span><a data-dcnode-id="4583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2006_Riga_summit" title="2006 Riga summit"><span data-dcnode-id="4584" instrument_node="">2006 Riga summit</span></a><span data-dcnode-id="4582" instrument_node=""> was held in Riga, Latvia, and highlighted the issue of energy security. It was the first </span><a data-dcnode-id="4580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO_summit" title="NATO summit"><span data-dcnode-id="4581" instrument_node="">NATO summit</span></a><span data-dcnode-id="4579" instrument_node=""> to be held in a country that had been part of the old Soviet Union. At the </span><a data-dcnode-id="4577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2008_Bucharest_summit" title="2008 Bucharest summit"><span data-dcnode-id="4578" instrument_node="">April 2008 summit</span></a><span data-dcnode-id="4576" instrument_node=""> in Bucharest, Romania, NATO agreed to the accession of </span><a data-dcnode-id="4574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Croatia" title="Croatia"><span data-dcnode-id="4575" instrument_node="">Croatia</span></a><span data-dcnode-id="4573" instrument_node=""> and </span><a data-dcnode-id="4571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albania" title="Albania"><span data-dcnode-id="4572" instrument_node="">Albania</span></a><span data-dcnode-id="4570" instrument_node="">, both of which joined NATO in April 2009. Ukraine and Georgia were also told that they could eventually become members.</span><sup class="reference" data-dcnode-id="4567" id="cite_ref-63"><a data-dcnode-id="4568" href="#cite_note-63"><span data-dcnode-id="4569" instrument_node="">[63]</span></a></sup><span data-dcnode-id="4566" instrument_node=""> The issue of Georgian and Ukrainian membership in NATO prompted harsh criticism from Russia, as did NATO plans for a </span><a data-dcnode-id="4564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO_missile_defence_system" title="NATO missile defence system"><span data-dcnode-id="4565" instrument_node="">missile defence system</span></a><span data-dcnode-id="4563" instrument_node="">. Studies for the system had begun in 2002, with negotiations centered on </span><a data-dcnode-id="4561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-ballistic_missile" title="Anti-ballistic missile"><span data-dcnode-id="4562" instrument_node="">anti-ballistic missiles</span></a><span data-dcnode-id="4560" instrument_node=""> being stationed in Poland and the Czech Republic. Though NATO leaders gave assurances that the system was not targeting Russia, Russian Presidents </span><a data-dcnode-id="4558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Putin" title="Vladimir Putin"><span data-dcnode-id="4559" instrument_node="">Vladimir Putin</span></a><span data-dcnode-id="4557" instrument_node=""> and </span><a data-dcnode-id="4555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dmitry_Medvedev" title="Dmitry Medvedev"><span data-dcnode-id="4556" instrument_node="">Dmitry Medvedev</span></a><span data-dcnode-id="4554" instrument_node=""> criticized the system as a threat.</span><sup class="reference" data-dcnode-id="4551" id="cite_ref-64"><a data-dcnode-id="4552" href="#cite_note-64"><span data-dcnode-id="4553" instrument_node="">[64]</span></a></sup><span data-dcnode-id="4550" instrument_node="">
</span></p><p data-dcnode-id="4514"><span data-dcnode-id="4548" instrument_node="">In 2009, US President </span><a data-dcnode-id="4546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barack_Obama" title="Barack Obama"><span data-dcnode-id="4547" instrument_node="">Barack Obama</span></a><span data-dcnode-id="4545" instrument_node=""> proposed using the ship-based </span><a data-dcnode-id="4543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aegis_Combat_System" title="Aegis Combat System"><span data-dcnode-id="4544" instrument_node="">Aegis Combat System</span></a><span data-dcnode-id="4542" instrument_node="">, but the plan still includes stations being built in Turkey, Spain, Portugal, Romania, and Poland.</span><sup class="reference" data-dcnode-id="4539" id="cite_ref-65"><a data-dcnode-id="4540" href="#cite_note-65"><span data-dcnode-id="4541" instrument_node="">[65]</span></a></sup><span data-dcnode-id="4538" instrument_node=""> NATO will also maintain the "status quo" in its nuclear deterrent in Europe by upgrading the targeting capabilities of the "tactical" </span><a data-dcnode-id="4536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/B61_nuclear_bomb" title="B61 nuclear bomb"><span data-dcnode-id="4537" instrument_node="">B61 nuclear bombs</span></a><span data-dcnode-id="4535" instrument_node=""> stationed there and deploying them on the stealthier </span><a data-dcnode-id="4533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lockheed_Martin_F-35_Lightning_II" title="Lockheed Martin F-35 Lightning II"><span data-dcnode-id="4534" instrument_node="">Lockheed Martin F-35 Lightning II</span></a><span data-dcnode-id="4532" instrument_node="">.</span><sup class="reference" data-dcnode-id="4529" id="cite_ref-66"><a data-dcnode-id="4530" href="#cite_note-66"><span data-dcnode-id="4531" instrument_node="">[66]</span></a></sup><sup class="reference" data-dcnode-id="4526" id="cite_ref-67"><a data-dcnode-id="4527" href="#cite_note-67"><span data-dcnode-id="4528" instrument_node="">[67]</span></a></sup><span data-dcnode-id="4525" instrument_node=""> After the 2014 </span><a data-dcnode-id="4523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Annexation_of_Crimea_by_the_Russian_Federation" title="Annexation of Crimea by the Russian Federation"><span data-dcnode-id="4524" instrument_node="">annexation of Crimea by Russia</span></a><span data-dcnode-id="4522" instrument_node="">, NATO committed to forming a new "spearhead" force of 5000 troops at bases in Estonia, Lithuania, Latvia, Poland, Romania, and Bulgaria.</span><sup class="reference" data-dcnode-id="4519" id="cite_ref-68"><a data-dcnode-id="4520" href="#cite_note-68"><span data-dcnode-id="4521" instrument_node="">[68]</span></a></sup><sup class="reference" data-dcnode-id="4516" id="cite_ref-69"><a data-dcnode-id="4517" href="#cite_note-69"><span data-dcnode-id="4518" instrument_node="">[69]</span></a></sup><span data-dcnode-id="4515" instrument_node="">
</span></p><span data-dcnode-id="4513" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4498"><div class="thumbinner" data-dcnode-id="4499" style="width:222px;"><a class="image" data-dcnode-id="4511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASecretary_Kerry_Puts_the_Cap_Back_on_His_Pen_After_Signing_an_Accession_Protocol_to_Continue_Montenegro%2527s_Admission_to_NATO_in_Brussels_%2827045333901%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="4512" data-file-height="2970" data-file-width="4455" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Secretary_Kerry_Puts_the_Cap_Back_on_His_Pen_After_Signing_an_Accession_Protocol_to_Continue_Montenegro%2527s_Admission_to_NATO_in_Brussels_%252827045333901%2529.jpg/220px-Secretary_Kerry_Puts_the_Cap_Back_on_His_Pen_After_Signing_an_Accession_Protocol_to_Continue_Montenegro%2527s_Admission_to_NATO_in_Brussels_%252827045333901%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Secretary_Kerry_Puts_the_Cap_Back_on_His_Pen_After_Signing_an_Accession_Protocol_to_Continue_Montenegro%27s_Admission_to_NATO_in_Brussels_%2827045333901%29.jpg/330px-Secretary_Kerry_Puts_the_Cap_Back_on_His_Pen_After_Signing_an_Accession_Protocol_to_Continue_Montenegro%27s_Admission_to_NATO_in_Brussels_%2827045333901%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Secretary_Kerry_Puts_the_Cap_Back_on_His_Pen_After_Signing_an_Accession_Protocol_to_Continue_Montenegro%27s_Admission_to_NATO_in_Brussels_%2827045333901%29.jpg/440px-Secretary_Kerry_Puts_the_Cap_Back_on_His_Pen_After_Signing_an_Accession_Protocol_to_Continue_Montenegro%27s_Admission_to_NATO_in_Brussels_%2827045333901%29.jpg 2x" width="220"></a><span data-dcnode-id="4510" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4500"><div class="magnify" data-dcnode-id="4508"><a class="internal" data-dcnode-id="4509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASecretary_Kerry_Puts_the_Cap_Back_on_His_Pen_After_Signing_an_Accession_Protocol_to_Continue_Montenegro%2527s_Admission_to_NATO_in_Brussels_%2827045333901%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="4507" instrument_node="">NATO foreign ministers and </span><a data-dcnode-id="4505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Montenegro" title="Montenegro"><span data-dcnode-id="4506" instrument_node="">Montenegro</span></a><span data-dcnode-id="4504" instrument_node="">'s Prime Minister </span><a data-dcnode-id="4502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milo_%25C4%2590ukanovi%25C4%2587" title="Milo Đukanović"><span data-dcnode-id="4503" instrument_node="">Milo Đukanović</span></a><span data-dcnode-id="4501" instrument_node=""> signed a protocol at the NATO Council in 2016</span></div></div></div><span data-dcnode-id="4497" instrument_node="">
</span><p data-dcnode-id="4461"><span data-dcnode-id="4496" instrument_node="">The 2014 </span><a data-dcnode-id="4494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Annexation_of_Crimea_by_the_Russian_Federation" title="Annexation of Crimea by the Russian Federation"><span data-dcnode-id="4495" instrument_node="">Russian annexation of Crimea</span></a><span data-dcnode-id="4493" instrument_node=""> led to strong condemnation by NATO nations, and Poland invoked Article 4 in meetings.</span><sup class="reference" data-dcnode-id="4490" id="cite_ref-70"><a data-dcnode-id="4491" href="#cite_note-70"><span data-dcnode-id="4492" instrument_node="">[70]</span></a></sup><span data-dcnode-id="4489" instrument_node=""> Then, at the </span><a data-dcnode-id="4487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2014_Wales_summit" title="2014 Wales summit"><span data-dcnode-id="4488" instrument_node="">2014 Wales summit</span></a><span data-dcnode-id="4486" instrument_node="">, the leaders of NATO's member states formally committed for the first time spend the equivalent of at least 2% of their </span><a data-dcnode-id="4484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gross_domestic_product" title="Gross domestic product"><span data-dcnode-id="4485" instrument_node="">gross domestic product</span></a><span data-dcnode-id="4483" instrument_node=""> on defence by 2024, which was previously only an informal guideline.</span><sup class="reference" data-dcnode-id="4480" id="cite_ref-71"><a data-dcnode-id="4481" href="#cite_note-71"><span data-dcnode-id="4482" instrument_node="">[71]</span></a></sup><span data-dcnode-id="4479" instrument_node=""> In 2015, five of its 28 members met that goal.</span><sup class="reference" data-dcnode-id="4476" id="cite_ref-72"><a data-dcnode-id="4477" href="#cite_note-72"><span data-dcnode-id="4478" instrument_node="">[72]</span></a></sup><sup class="reference" data-dcnode-id="4473" id="cite_ref-73"><a data-dcnode-id="4474" href="#cite_note-73"><span data-dcnode-id="4475" instrument_node="">[73]</span></a></sup><sup class="reference" data-dcnode-id="4470" id="cite_ref-74"><a data-dcnode-id="4471" href="#cite_note-74"><span data-dcnode-id="4472" instrument_node="">[74]</span></a></sup><span data-dcnode-id="4469" instrument_node=""> At the beginning of 2018, eight members either were meeting the target or were close to it; six others had laid out plans to reach the target by 2024 as promised; and Norway and Denmark had unveiled plans to substantially boost defense spending, including Norway's planned purchase 52 new </span><a data-dcnode-id="4467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lockheed_Martin_F-35_Lightning_II" title="Lockheed Martin F-35 Lightning II"><span data-dcnode-id="4468" instrument_node="">F-35 fighter jets</span></a><span data-dcnode-id="4466" instrument_node="">.</span><sup class="reference" data-dcnode-id="4463" id="cite_ref-Gramer2018_75-0"><a data-dcnode-id="4464" href="#cite_note-Gramer2018-75"><span data-dcnode-id="4465" instrument_node="">[75]</span></a></sup><span data-dcnode-id="4462" instrument_node="">
</span></p><p data-dcnode-id="4442"><span data-dcnode-id="4460" instrument_node="">On 15 June 2016, NATO officially recognized </span><a data-dcnode-id="4458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cyberwarfare" title="Cyberwarfare"><span data-dcnode-id="4459" instrument_node="">cyberwarfare</span></a><span data-dcnode-id="4457" instrument_node=""> as an operational domain of war, just like land, sea, and aerial warfare. That means that any cyber attack on NATO members can trigger Article 5 of the North Atlantic Treaty.</span><sup class="reference" data-dcnode-id="4454" id="cite_ref-76"><a data-dcnode-id="4455" href="#cite_note-76"><span data-dcnode-id="4456" instrument_node="">[76]</span></a></sup><span data-dcnode-id="4453" instrument_node=""> </span><a data-dcnode-id="4451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Montenegro" title="Montenegro"><span data-dcnode-id="4452" instrument_node="">Montenegro</span></a><span data-dcnode-id="4450" instrument_node=""> became the 29th member of NATO on 5 June 2017, amid strong objections from Russia.</span><sup class="reference" data-dcnode-id="4447" id="cite_ref-77"><a data-dcnode-id="4448" href="#cite_note-77"><span data-dcnode-id="4449" instrument_node="">[77]</span></a></sup><sup class="reference" data-dcnode-id="4444" id="cite_ref-78"><a data-dcnode-id="4445" href="#cite_note-78"><span data-dcnode-id="4446" instrument_node="">[78]</span></a></sup><span data-dcnode-id="4443" instrument_node="">
</span></p><p data-dcnode-id="4410"><span data-dcnode-id="4441" instrument_node="">On 1 August 2018, the </span><a class="mw-redirect" data-dcnode-id="4439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/US_Department_of_Treasury" title="US Department of Treasury"><span data-dcnode-id="4440" instrument_node="">US Department of Treasury</span></a><span data-dcnode-id="4438" instrument_node=""> sanctioned two senior </span><a data-dcnode-id="4436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cabinet_Erdo%25C4%259Fan_IV" title="Cabinet Erdoğan IV"><span data-dcnode-id="4437" instrument_node="">Turkish government ministers</span></a><span data-dcnode-id="4435" instrument_node=""> who were involved in the detention of American pastor </span><a data-dcnode-id="4433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andrew_Brunson" title="Andrew Brunson"><span data-dcnode-id="4434" instrument_node="">Andrew Brunson</span></a><span data-dcnode-id="4432" instrument_node="">.</span><sup class="reference" data-dcnode-id="4429" id="cite_ref-79"><a data-dcnode-id="4430" href="#cite_note-79"><span data-dcnode-id="4431" instrument_node="">[79]</span></a></sup><span data-dcnode-id="4428" instrument_node=""> Turkish President </span><a data-dcnode-id="4426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Recep_Tayyip_Erdo%25C4%259Fan" title="Recep Tayyip Erdoğan"><span data-dcnode-id="4427" instrument_node="">Recep Tayyip Erdoğan</span></a><span data-dcnode-id="4425" instrument_node=""> said that the US behavior would force Turkey to look for new friends and allies.</span><sup class="reference" data-dcnode-id="4422" id="cite_ref-80"><a data-dcnode-id="4423" href="#cite_note-80"><span data-dcnode-id="4424" instrument_node="">[80]</span></a></sup><span data-dcnode-id="4421" instrument_node=""> The </span><a data-dcnode-id="4419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkey%25E2%2580%2593United_States_relations" title="Turkey–United States relations"><span data-dcnode-id="4420" instrument_node="">US–Turkey dispute</span></a><span data-dcnode-id="4418" instrument_node=""> appears to be one of the most serious diplomatic crisis between the NATO allies in years.</span><sup class="reference" data-dcnode-id="4415" id="cite_ref-81"><a data-dcnode-id="4416" href="#cite_note-81"><span data-dcnode-id="4417" instrument_node="">[81]</span></a></sup><sup class="reference" data-dcnode-id="4412" id="cite_ref-82"><a data-dcnode-id="4413" href="#cite_note-82"><span data-dcnode-id="4414" instrument_node="">[82]</span></a></sup><span data-dcnode-id="4411" instrument_node="">
</span></p><p data-dcnode-id="4401"><span data-dcnode-id="4409" instrument_node="">On 4 December 2019, NATO officially recognized </span><a data-dcnode-id="4407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Space_warfare" title="Space warfare"><span data-dcnode-id="4408" instrument_node="">space warfare</span></a><span data-dcnode-id="4406" instrument_node=""> as an operational domain of war, just like land, sea, aerial, and cyber warfare. That means that any space attack on NATO members can trigger Article 5 of the North Atlantic Treaty.</span><sup class="reference" data-dcnode-id="4403" id="cite_ref-83"><a data-dcnode-id="4404" href="#cite_note-83"><span data-dcnode-id="4405" instrument_node="">[83]</span></a></sup><span data-dcnode-id="4402" instrument_node="">
</span></p><p data-dcnode-id="4389"><span data-dcnode-id="4400" instrument_node="">On 27 March 2020, </span><a data-dcnode-id="4398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Macedonia" title="North Macedonia"><span data-dcnode-id="4399" instrument_node="">North Macedonia</span></a><span data-dcnode-id="4397" instrument_node=""> became the 30th and newest member after a dispute about its name had been resolved with Greece.</span><sup class="reference" data-dcnode-id="4394" id="cite_ref-84"><a data-dcnode-id="4395" href="#cite_note-84"><span data-dcnode-id="4396" instrument_node="">[84]</span></a></sup><sup class="reference" data-dcnode-id="4391" id="cite_ref-85"><a data-dcnode-id="4392" href="#cite_note-85"><span data-dcnode-id="4393" instrument_node="">[85]</span></a></sup><span data-dcnode-id="4390" instrument_node="">
</span></p><span data-dcnode-id="4388" instrument_node="">
</span><h2 data-dcnode-id="4378"><span class="mw-headline" data-dcnode-id="4386" id="Structural_changes"><span data-dcnode-id="4387" instrument_node="">Structural changes</span></span><span class="mw-editsection" data-dcnode-id="4379"><span class="mw-editsection-bracket" data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">[</span></span><a data-dcnode-id="4382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_NATO%26action%3Dedit%26section%3D7" title="Edit section: Structural changes"><span data-dcnode-id="4383" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4380"><span data-dcnode-id="4381" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4377" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4368"><div class="thumbinner" data-dcnode-id="4369" style="width:222px;"><a class="image" data-dcnode-id="4375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1952_NATO_organizational_chart.jpg"><img alt="" class="thumbimage" data-dcnode-id="4376" data-file-height="469" data-file-width="1036" decoding="async" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/ba/1952_NATO_organizational_chart.jpg/220px-1952_NATO_organizational_chart.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/ba/1952_NATO_organizational_chart.jpg/330px-1952_NATO_organizational_chart.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/ba/1952_NATO_organizational_chart.jpg/440px-1952_NATO_organizational_chart.jpg 2x" width="220"></a><span data-dcnode-id="4374" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4370"><div class="magnify" data-dcnode-id="4372"><a class="internal" data-dcnode-id="4373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1952_NATO_organizational_chart.jpg" title="Enlarge"></a></div><span data-dcnode-id="4371" instrument_node="">1952 NATO organisational chart</span></div></div></div><span data-dcnode-id="4367" instrument_node="">
</span><p data-dcnode-id="4365"><span data-dcnode-id="4366" instrument_node="">The Defence Planning Committee was a former senior decision-making body on matters relating to the integrated military structure of the Alliance. It was dissolved after a major committee review in June 2010, with its responsibilities absorbed by the North Atlantic Council.
</span></p><span data-dcnode-id="4364" instrument_node="">
</span><h3 data-dcnode-id="4354"><span class="mw-headline" data-dcnode-id="4362" id="Civilian_structure"><span data-dcnode-id="4363" instrument_node="">Civilian structure</span></span><span class="mw-editsection" data-dcnode-id="4355"><span class="mw-editsection-bracket" data-dcnode-id="4360"><span data-dcnode-id="4361" instrument_node="">[</span></span><a data-dcnode-id="4358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_NATO%26action%3Dedit%26section%3D8" title="Edit section: Civilian structure"><span data-dcnode-id="4359" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4356"><span data-dcnode-id="4357" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4353" instrument_node="">
</span><p data-dcnode-id="4344"><span data-dcnode-id="4352" instrument_node="">In </span><i data-dcnode-id="4350"><span data-dcnode-id="4351" instrument_node="">NATO: The First Five Years</span></i><span data-dcnode-id="4349" instrument_node="">, Lord Ismay described the civilian structure as follows:</span><sup class="reference" data-dcnode-id="4346" id="cite_ref-chapter6_86-0"><a data-dcnode-id="4347" href="#cite_note-chapter6-86"><span data-dcnode-id="4348" instrument_node="">[86]</span></a></sup><span data-dcnode-id="4345" instrument_node="">
</span></p><span data-dcnode-id="4343" instrument_node="">
</span><blockquote data-dcnode-id="4340"><p data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">The ..Office of the Secretary-General [is] directed by an Executive Secretary, Captain R.D. Coleridge (UK), who is also Secretary to the Council. He is responsible for supervising the general processing of the work of the Council and their committees, including the provision of all secretarial assistance, as well as supervision of the administrative services of the Staff/Secretariat itself. Thus the Secretariat provides secretaries to all the Council's principal committees and working groups - apart from those of a strictly technical nature - and ensures coordination between them... On the Staff side, there are three main divisions corresponding to the three principal aspects of NATO's work, each under an Assistant Secretary-General. Ambassador Sergio Fenoaltea (Italy) heads the Political Affairs Division, M. Rene Sergent (France) the Economics and Finance Division, and Mr. Lowell P. Weicker (USA) the Production and Logistics Division. The Divisions' tasks are to prepare, in close touch with delegations, proposed action in their respective fields for consideration by the appropriate committee or by the Council. In addition to the main divisions, there are three other offices working directly to the Secretary-General. These are the Office of Statistics (Mr. Loring Wood of the USA), the Financial Comptroller's Office (M. A. J. Bastin of Belgium), and the Division of Information (Mr. Geoffrey Parsons, Jr. of the USA). The Information Division, besides providing material about NATO for the use of member governments, (it does not engage in independent operations), is also the press and public relations branch of the civilian authority.</span></p></blockquote><span data-dcnode-id="4339" instrument_node="">
</span><h3 data-dcnode-id="4329"><span class="mw-headline" data-dcnode-id="4337" id="Military_structure"><span data-dcnode-id="4338" instrument_node="">Military structure</span></span><span class="mw-editsection" data-dcnode-id="4330"><span class="mw-editsection-bracket" data-dcnode-id="4335"><span data-dcnode-id="4336" instrument_node="">[</span></span><a data-dcnode-id="4333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_NATO%26action%3Dedit%26section%3D9" title="Edit section: Military structure"><span data-dcnode-id="4334" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4331"><span data-dcnode-id="4332" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4328" instrument_node="">
</span><p data-dcnode-id="4315"><span data-dcnode-id="4327" instrument_node="">The Strategic Commanders were the former Major NATO Commanders, who sat atop a command hierarchy consisting of Major Subordinate Commanders (MSCs), Principal Subordinate Commanders (PSCs), and Sub-PSCs.</span><sup class="reference" data-dcnode-id="4324" id="cite_ref-87"><a data-dcnode-id="4325" href="#cite_note-87"><span data-dcnode-id="4326" instrument_node="">[87]</span></a></sup><span data-dcnode-id="4323" instrument_node=""> The Military Committee had an executive body, the Standing Group, made up of representatives from France, the United States, and the United Kingdom. The Standing Group was abolished during the major reform of 1967 that resulted from France's departure from the </span><a class="mw-redirect" data-dcnode-id="4321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO_Military_Command_Structure" title="NATO Military Command Structure"><span data-dcnode-id="4322" instrument_node="">NATO Military Command Structure</span></a><span data-dcnode-id="4320" instrument_node="">.</span><sup class="reference" data-dcnode-id="4317" id="cite_ref-PedlowNATO_88-0"><a data-dcnode-id="4318" href="#cite_note-PedlowNATO-88"><span data-dcnode-id="4319" instrument_node="">[88]</span></a></sup><span data-dcnode-id="4316" instrument_node="">
</span></p><span data-dcnode-id="4314" instrument_node="">
