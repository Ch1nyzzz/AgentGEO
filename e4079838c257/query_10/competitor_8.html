</span><h4 data-dcnode-id="4184"><span class="mw-headline" data-dcnode-id="4192" id="Beginnings_2"><span data-dcnode-id="4193" instrument_node="">Beginnings</span></span><span class="mw-editsection" data-dcnode-id="4185"><span class="mw-editsection-bracket" data-dcnode-id="4190"><span data-dcnode-id="4191" instrument_node="">[</span></span><a data-dcnode-id="4188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_NATO%26action%3Dedit%26section%3D10" title="Edit section: Beginnings"><span data-dcnode-id="4189" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4186"><span data-dcnode-id="4187" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4183" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4174"><div class="thumbinner" data-dcnode-id="4175" style="width:222px;"><a class="image" data-dcnode-id="4181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANATO_Commands_1954.jpg"><img alt="" class="thumbimage" data-dcnode-id="4182" data-file-height="844" data-file-width="1342" decoding="async" height="138" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/9f/NATO_Commands_1954.jpg/220px-NATO_Commands_1954.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/9f/NATO_Commands_1954.jpg/330px-NATO_Commands_1954.jpg 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/9f/NATO_Commands_1954.jpg/440px-NATO_Commands_1954.jpg 2x" width="220"></a><span data-dcnode-id="4180" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4176"><div class="magnify" data-dcnode-id="4178"><a class="internal" data-dcnode-id="4179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANATO_Commands_1954.jpg" title="Enlarge"></a></div><span data-dcnode-id="4177" instrument_node="">NATO military command and areas of responsibilities (1954)</span></div></div></div><span data-dcnode-id="4173" instrument_node="">
</span><p data-dcnode-id="4142"><span data-dcnode-id="4172" instrument_node="">A key step in establishing the NATO Command Structure was the North Atlantic Council's selection of General </span><a class="mw-redirect" data-dcnode-id="4170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dwight_Eisenhower" title="Dwight Eisenhower"><span data-dcnode-id="4171" instrument_node="">Dwight Eisenhower</span></a><span data-dcnode-id="4169" instrument_node=""> as the first </span><a data-dcnode-id="4167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Allied_Commander_Europe" title="Supreme Allied Commander Europe"><span data-dcnode-id="4168" instrument_node="">Supreme Allied Commander Europe</span></a><span data-dcnode-id="4166" instrument_node=""> (SACEUR) in December 1950.</span><sup class="reference" data-dcnode-id="4163" id="cite_ref-PedlowNATO_88-1"><a data-dcnode-id="4164" href="#cite_note-PedlowNATO-88"><span data-dcnode-id="4165" instrument_node="">[88]</span></a></sup><span data-dcnode-id="4162" instrument_node=""> After Eisenhower arrived in Paris in January 1951, he and the other members of the multinational </span><a data-dcnode-id="4160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Headquarters_Allied_Powers_Europe" title="Supreme Headquarters Allied Powers Europe"><span data-dcnode-id="4161" instrument_node="">Supreme Headquarters Allied Powers Europe</span></a><span data-dcnode-id="4159" instrument_node=""> (SHAPE) Planning Group immediately began to devise a structure for the new Allied Command Europe. NATO official documents state, "The cornerstone of the NATO Military Command Structure was laid... when the North Atlantic Council approved D.C. 24/3 on 18 December 1951."</span><sup class="reference" data-dcnode-id="4156" id="cite_ref-89"><a data-dcnode-id="4157" href="#cite_note-89"><span data-dcnode-id="4158" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4155" instrument_node=""> They quickly decided to divide Allied Command Europe into three regions: </span><a data-dcnode-id="4153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied_Forces_Northern_Europe" title="Allied Forces Northern Europe"><span data-dcnode-id="4154" instrument_node="">Allied Forces Northern Europe</span></a><span data-dcnode-id="4152" instrument_node="">, containing Scandinavia, the North Sea, and the Baltic; </span><a class="mw-redirect" data-dcnode-id="4150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied_Forces_Central_Europe" title="Allied Forces Central Europe"><span data-dcnode-id="4151" instrument_node="">Allied Forces Central Europe</span></a><span data-dcnode-id="4149" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="4147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied_Forces_Southern_Europe" title="Allied Forces Southern Europe"><span data-dcnode-id="4148" instrument_node="">Allied Forces Southern Europe</span></a><span data-dcnode-id="4146" instrument_node=""> (AFSOUTH), covering Italy and the Mediterranean. SHAPE was established at </span><a data-dcnode-id="4144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rocquencourt%2C_Yvelines" title="Rocquencourt, Yvelines"><span data-dcnode-id="4145" instrument_node="">Rocquencourt</span></a><span data-dcnode-id="4143" instrument_node="">, west of Paris.
</span></p><p data-dcnode-id="4121"><span data-dcnode-id="4141" instrument_node="">The British post of Commander in Chief </span><a data-dcnode-id="4139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mediterranean_Fleet" title="Mediterranean Fleet"><span data-dcnode-id="4140" instrument_node="">Mediterranean Fleet</span></a><span data-dcnode-id="4138" instrument_node=""> was given a dual-hatted role as </span><a data-dcnode-id="4136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="4137" instrument_node="">NATO</span></a><span data-dcnode-id="4135" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="4133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commander_in_Chief" title="Commander in Chief"><span data-dcnode-id="4134" instrument_node="">Commander in Chief</span></a><span data-dcnode-id="4132" instrument_node=""> of </span><a data-dcnode-id="4130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied_Forces_Mediterranean" title="Allied Forces Mediterranean"><span data-dcnode-id="4131" instrument_node="">Allied Forces Mediterranean</span></a><span data-dcnode-id="4129" instrument_node=""> in charge of all forces assigned to NATO in the Mediterranean Area. The British made strong representations in discussions regarding the Mediterranean NATO command structure since they wished to retain their direction of NATO naval command in the Mediterranean to protect their </span><a data-dcnode-id="4127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sea_lines_of_communication" title="Sea lines of communication"><span data-dcnode-id="4128" instrument_node="">sea lines of communication</span></a><span data-dcnode-id="4126" instrument_node=""> running through the Mediterranean to the Middle East and the Far East.</span><sup class="reference" data-dcnode-id="4123" id="cite_ref-90"><a data-dcnode-id="4124" href="#cite_note-90"><span data-dcnode-id="4125" instrument_node="">[90]</span></a></sup><span data-dcnode-id="4122" instrument_node="">
</span></p><p data-dcnode-id="4109"><span data-dcnode-id="4120" instrument_node="">In 1952, after Greece and Turkey joined NATO </span><sup class="reference" data-dcnode-id="4117" id="cite_ref-chapter7_91-0"><a data-dcnode-id="4118" href="#cite_note-chapter7-91"><span data-dcnode-id="4119" instrument_node="">[91]</span></a></sup><span data-dcnode-id="4116" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="4114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied_Land_Forces_South-Eastern_Europe" title="Allied Land Forces South-Eastern Europe"><span data-dcnode-id="4115" instrument_node="">Allied Land Forces South-Eastern Europe</span></a><span data-dcnode-id="4113" instrument_node=""> (LANDSOUTHEAST) was created in </span><a class="mw-redirect" data-dcnode-id="4111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Izmir" title="Izmir"><span data-dcnode-id="4112" instrument_node="">Izmir</span></a><span data-dcnode-id="4110" instrument_node="">, Turkey, under a US Army General because of the geographic distance of both countries from the LANDSOUTH headquarters as well as political disagreements over which nation should be the overall commander for its ground forces.
</span></p><p data-dcnode-id="4069"><span data-dcnode-id="4108" instrument_node="">With the establishment of </span><a class="mw-redirect" data-dcnode-id="4106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied_Command_Atlantic" title="Allied Command Atlantic"><span data-dcnode-id="4107" instrument_node="">Allied Command Atlantic</span></a><span data-dcnode-id="4105" instrument_node=""> (ACLANT) on 30 January 1952, the </span><a data-dcnode-id="4103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Allied_Commander_Atlantic" title="Supreme Allied Commander Atlantic"><span data-dcnode-id="4104" instrument_node="">Supreme Allied Commander Atlantic</span></a><span data-dcnode-id="4102" instrument_node=""> joined the previously created </span><a data-dcnode-id="4100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Allied_Commander_Europe" title="Supreme Allied Commander Europe"><span data-dcnode-id="4101" instrument_node="">Supreme Allied Commander Europe</span></a><span data-dcnode-id="4099" instrument_node=""> as one of the alliance's two Major NATO Commanders.</span><sup class="reference" data-dcnode-id="4096" id="cite_ref-92"><a data-dcnode-id="4097" href="#cite_note-92"><span data-dcnode-id="4098" instrument_node="">[92]</span></a></sup><span data-dcnode-id="4095" instrument_node=""> A third was added when </span><a data-dcnode-id="4093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied_Command_Channel" title="Allied Command Channel"><span data-dcnode-id="4094" instrument_node="">Allied Command Channel</span></a><span data-dcnode-id="4092" instrument_node=""> was established on 21 February 1952 to control the </span><a data-dcnode-id="4090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/English_Channel" title="English Channel"><span data-dcnode-id="4091" instrument_node="">English Channel</span></a><span data-dcnode-id="4089" instrument_node=""> and </span><a data-dcnode-id="4087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Sea" title="North Sea"><span data-dcnode-id="4088" instrument_node="">North Sea</span></a><span data-dcnode-id="4086" instrument_node=""> area and deny them to the enemy and to protect the sea lanes of communication.</span><sup class="reference" data-dcnode-id="4083" id="cite_ref-93"><a data-dcnode-id="4084" href="#cite_note-93"><span data-dcnode-id="4085" instrument_node="">[93]</span></a></sup><sup class="reference" data-dcnode-id="4080" id="cite_ref-94"><a data-dcnode-id="4081" href="#cite_note-94"><span data-dcnode-id="4082" instrument_node="">[94]</span></a></sup><span data-dcnode-id="4079" instrument_node=""> The establishment of this post and the agreement that it was to be filled by the British </span><a data-dcnode-id="4077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commander-in-Chief%2C_Portsmouth" title="Commander-in-Chief, Portsmouth"><span data-dcnode-id="4078" instrument_node="">Commander-in-Chief, Portsmouth</span></a><span data-dcnode-id="4076" instrument_node="">, was part of the compromise that allowed an American officer to take up the SACLANT post. Previously Commander-in-Chief Portsmouth had controlled multinational naval operations in the area under </span><a class="mw-redirect" data-dcnode-id="4074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/WUDO" title="WUDO"><span data-dcnode-id="4075" instrument_node="">WUDO</span></a><span data-dcnode-id="4073" instrument_node=""> auspices. In due course, the CINCHAN role was assumed by the British </span><a data-dcnode-id="4071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commander-in-Chief_Fleet" title="Commander-in-Chief Fleet"><span data-dcnode-id="4072" instrument_node="">Commander-in-Chief Fleet</span></a><span data-dcnode-id="4070" instrument_node="">.
</span></p><p data-dcnode-id="4049"><span data-dcnode-id="4068" instrument_node="">In 1966, when French President </span><a data-dcnode-id="4066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_de_Gaulle" title="Charles de Gaulle"><span data-dcnode-id="4067" instrument_node="">Charles de Gaulle</span></a><span data-dcnode-id="4065" instrument_node=""> withdrew French forces from the military command structure, NATO's headquarters was forced to move to Belgium. SHAPE was moved to </span><a data-dcnode-id="4063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Casteau" title="Casteau"><span data-dcnode-id="4064" instrument_node="">Casteau</span></a><span data-dcnode-id="4062" instrument_node="">, north of the Belgian city of </span><a data-dcnode-id="4060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mons" title="Mons"><span data-dcnode-id="4061" instrument_node="">Mons</span></a><span data-dcnode-id="4059" instrument_node="">. Headquarters </span><a class="mw-redirect" data-dcnode-id="4057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied_Forces_Central_Europe" title="Allied Forces Central Europe"><span data-dcnode-id="4058" instrument_node="">Allied Forces Central Europe</span></a><span data-dcnode-id="4056" instrument_node=""> was moved from the </span><a class="mw-redirect" data-dcnode-id="4054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chateau_de_Fontainebleau" title="Chateau de Fontainebleau"><span data-dcnode-id="4055" instrument_node="">Chateau de Fontainebleau</span></a><span data-dcnode-id="4053" instrument_node="">, near Paris to </span><a data-dcnode-id="4051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brunssum" title="Brunssum"><span data-dcnode-id="4052" instrument_node="">Brunssum</span></a><span data-dcnode-id="4050" instrument_node="">, in the Netherlands.

</span><p data-dcnode-id="3625"><span data-dcnode-id="3633" instrument_node="">By June 1991, it was clear that Allied Forces Central Europe, a Major Subordinate Command, could be reduced, with the Soviet threat disappearing. Six multinational corps were to replace the previous eight.</span><sup class="reference" data-dcnode-id="3630" id="cite_ref-96"><a data-dcnode-id="3631" href="#cite_note-96"><span data-dcnode-id="3632" instrument_node="">[96]</span></a></sup><span data-dcnode-id="3629" instrument_node=""> Announcements in June 1991 presaged main defensive forces consisting of six multinational corps. Two were to be under German command, one with a US division, one under Belgian command with a pending offer of a U.S. brigade, one under U.S. command with a German division, one under joint German-Danish command (LANDJUT), and one under Dutch command. The new German </span><a class="new" data-dcnode-id="3627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DIV_Corps_%28Bundeswehr%29%26action%3Dedit%26redlink%3D1" title="IV Corps (Bundeswehr) (page does not exist)"><span data-dcnode-id="3628" instrument_node="">IV Corps</span></a><span data-dcnode-id="3626" instrument_node=""> was to be stationed in eastern German and was not to be associated with the NATO structure.
</span></p><p data-dcnode-id="3613"><span data-dcnode-id="3624" instrument_node="">On July 1, 1994, the Alliance disestablished </span><a data-dcnode-id="3622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied_Command_Channel" title="Allied Command Channel"><span data-dcnode-id="3623" instrument_node="">Allied Command Channel</span></a><span data-dcnode-id="3621" instrument_node=""> but retained many of its subordinate structures after the reshuffling. Most of the headquarters were absorbed within ACE, particularly within the new </span><a class="mw-redirect" data-dcnode-id="3619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied_Forces_Northwestern_Europe" title="Allied Forces Northwestern Europe"><span data-dcnode-id="3620" instrument_node="">Allied Forces Northwestern Europe</span></a><span data-dcnode-id="3618" instrument_node="">.</span><sup class="reference" data-dcnode-id="3615" id="cite_ref-97"><a data-dcnode-id="3616" href="#cite_note-97"><span data-dcnode-id="3617" instrument_node="">[97]</span></a></sup><span data-dcnode-id="3614" instrument_node="">
</span></p><span data-dcnode-id="3612" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3594"><div class="thumbinner" data-dcnode-id="3595" style="width:222px;"><a class="image" data-dcnode-id="3610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANato_awacs.jpg"><img alt="" class="thumbimage" data-dcnode-id="3611" data-file-height="1123" data-file-width="1500" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/61/Nato_awacs.jpg/220px-Nato_awacs.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/61/Nato_awacs.jpg/330px-Nato_awacs.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/61/Nato_awacs.jpg/440px-Nato_awacs.jpg 2x" width="220"></a><span data-dcnode-id="3609" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3596"><div class="magnify" data-dcnode-id="3607"><a class="internal" data-dcnode-id="3608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANato_awacs.jpg" title="Enlarge"></a></div><span data-dcnode-id="3606" instrument_node="">NATO </span><a class="mw-redirect" data-dcnode-id="3604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/E-3_Sentry" title="E-3 Sentry"><span data-dcnode-id="3605" instrument_node="">E-3A</span></a><span data-dcnode-id="3603" instrument_node=""> flying with </span><a data-dcnode-id="3601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Air_Force" title="United States Air Force"><span data-dcnode-id="3602" instrument_node="">United States Air Force</span></a><span data-dcnode-id="3600" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="3598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/F-16_Fighting_Falcon" title="F-16 Fighting Falcon"><span data-dcnode-id="3599" instrument_node="">F-16 Fighting Falcons</span></a><span data-dcnode-id="3597" instrument_node=""> in a NATO exercise.</span></div></div></div><span data-dcnode-id="3593" instrument_node="">
</span><p data-dcnode-id="3580"><span data-dcnode-id="3592" instrument_node="">From 1994 to 1999, ACE had three Major Subordinate Commands, AFNORTHWEST, AFCENT, and AFSOUTH. In 1995 NATO began a Long Term Study to examine post-Cold War strategy and structure. Recommendations from the study for a new, streamlined structure emerged in 1996.</span><sup class="reference" data-dcnode-id="3589" id="cite_ref-98"><a data-dcnode-id="3590" href="#cite_note-98"><span data-dcnode-id="3591" instrument_node="">[98]</span></a></sup><span data-dcnode-id="3588" instrument_node=""> The European and Atlantic commands were to be retained, but the number of major commands in Europe was to be cut from three to two, Regional Command North Europe and Regional Command South Europe. Activation of the new RC SOUTH occurred in September 1999, and in March 2000 Headquarters AFNORTHWEST closed and the new RC NORTH was activated.</span><sup class="reference" data-dcnode-id="3585" id="cite_ref-99"><a data-dcnode-id="3586" href="#cite_note-99"><span data-dcnode-id="3587" instrument_node="">[99]</span></a></sup><span data-dcnode-id="3584" instrument_node=""> The headquarters of the two Regional Commands were known as Regional Headquarters South (RHQ South) and RHQ NORTH respectively. Each was to supervise air, naval, and land commands for their region as well as a number of Joint Subregional Commands (JSRCs). Among the new JSRCs was </span><a class="new" data-dcnode-id="3582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DJoint_Headquarters_Southwest%26action%3Dedit%26redlink%3D1" title="Joint Headquarters Southwest (page does not exist)"><span data-dcnode-id="3583" instrument_node="">Joint Headquarters Southwest</span></a><span data-dcnode-id="3581" instrument_node="">, which was activated in Madrid in September 1999.
</span></p><span data-dcnode-id="3579" instrument_node="">
