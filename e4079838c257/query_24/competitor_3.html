</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab0005&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abs0005&quot;><p id=&quot;sp0025&quot;>This article discusses the geopolitical dimension of maritime security, which has been neglected by scholars despite the growing number of studies devoted to a variety of aspects related to maritime security. The first step consists in clarifying the definitions of the two concepts; ‘geopolitics’ and ‘maritime security’. Then the article introduces the geopolitical dimension of maritime security from a conceptual perspective, and then analyses three practical examples of maritime security geo-strategies released in 2014. The results demonstrate that states’ and international institutions’ maritime security objectives and interests are indirectly and directly influenced by geographical and geopolitical considerations, although this link is only tacitly acknowledged in official documents. Scholars and practitioners interested in maritime security are encouraged to further engage with this dimension.</p></div></div></div>" data-dcnode-id="1900" lang="en" name="citation_abstract"><span data-dcnode-id="1899" instrument_node="">

04 0.9-6.2s-0.32-4.22-0.9-6.2l28.42-15.28c4.04 4.58 9.92 7.48 16.48 7.48 12.14 0 22-9.86 22-22s-9.86-22-22-22-22 9.86-22 22c0 1.98 0.28 3.9 0.78 5.72l-28.64 15.38c-4.02-4.34-9.76-7.1-16.14-7.1-12.14 0-22 9.86-22 22s9.86 22 22 22c6.38 0 12.12-2.76 16.14-7.12l28.64 15.38c-0.5 1.84-0.78 3.76-0.78 5.74 0 12.14 9.86 22 22 22s22-9.86 22-22-9.86-22-22-22z" data-dcnode-id="1533"></path></svg><span class="button-text" data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Share</span></span></button></div></div></div><div class="ExportCitation u-display-inline-block" data-dcnode-id="1518" id="export-citation"><div class="popover export-citation-popover" data-dcnode-id="1519" id="export-citation-popover"><div data-dcnode-id="1520" id="popover-trigger-export-citation-popover"><button aria-expanded="false" aria-haspopup="true" class="button button-anchor" data-dcnode-id="1521" type="button"><svg class="icon icon-cited-by-66" data-dcnode-id="1524" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="1525" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="1511" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="1514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.marpol.2014.12.013" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="1515" instrument_node="">https://doi.org/10.1016/j.marpol.2014.12.013</span></a><a class="rights-and-content" data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0308597X14003509%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1513" instrument_node="">Get rights and content</span></a></div><div class="LicenseInfo" data-dcnode-id="1502"><div class="License" data-dcnode-id="1506"><span data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Under a Creative Commons </span></span><a data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by/4.0/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1508" instrument_node="">license</span></a></div><div class="OpenAccessLabel" data-dcnode-id="1503"><span class="access-indicator" data-dcnode-id="1505"></span><span data-dcnode-id="1504" instrument_node="">Open access</span></div></div><section class="ReferencedArticles" data-dcnode-id="1501"></section><section class="ReferencedArticles" data-dcnode-id="1500"></section><div class="PageDivider" data-dcnode-id="1499"></div><div class="Abstracts u-font-serif" data-dcnode-id="1492" id="abstracts"><div class="abstract author" data-dcnode-id="1493" id="ab0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Abstract</span></h2><div data-dcnode-id="1494" id="abs0005"><p data-dcnode-id="1495" id="sp0025"><span data-dcnode-id="1496" instrument_node="">This article discusses the geopolitical dimension of maritime security, which has been neglected by scholars despite the growing number of studies devoted to a variety of aspects related to maritime security. The first step consists in clarifying the definitions of the two concepts; ‘geopolitics’ and ‘maritime security’. Then the article introduces the geopolitical dimension of maritime security from a conceptual perspective, and then analyses three practical examples of maritime security geo-strategies released in 2014. The results demonstrate that states’ and international institutions’ maritime security objectives and interests are indirectly and directly influenced by geographical and geopolitical considerations, although this link is only tacitly acknowledged in official documents. Scholars and practitioners interested in maritime security are encouraged to further engage with this dimension.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="1469" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="1481"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0308597X14003558"><svg class="icon icon-navigate-left" data-dcnode-id="1490" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="1491"></path></svg><span class="button-alternative-text" data-dcnode-id="1483"><strong data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="1470"><button class="button-alternative button-alternative-tertiary" data-dcnode-id="1471" disabled="" type="button"><span class="button-alternative-text" data-dcnode-id="1474"><strong data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="1472" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="1473"></path></svg></button></li></ul><div class="Keywords u-font-serif" data-dcnode-id="1453"><div class="keywords-section" data-dcnode-id="1454" id="keys0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="1464" id="key0005"><span data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Maritime security</span></span></div><div class="keyword" data-dcnode-id="1461" id="key0010"><span data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Geopolitics</span></span></div><div class="keyword" data-dcnode-id="1458" id="key0015"><span data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Maritime security strategy</span></span></div><div class="keyword" data-dcnode-id="1455" id="key0020"><span data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Projection</span></span></div></div></div><span data-dcnode-id="1452" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="970" id="body"><div data-dcnode-id="994"><section data-dcnode-id="1382" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1446" id="sect0015"><span data-dcnode-id="1451" instrument_node="">1</span><span data-dcnode-id="1449" instrument_node="">. </span><span data-dcnode-id="1447" instrument_node="">Introduction</span></h2><div data-dcnode-id="1406"><p data-dcnode-id="1432" id="p0005"><span data-dcnode-id="1445" instrument_node="">Maritime security is a fairly recent expression, which has become a buzzword in the past decade </span><a class="workspace-trigger" data-dcnode-id="1443" href="#bib2" name="bbib2"><span data-dcnode-id="1444" instrument_node="">[2]</span></a><span data-dcnode-id="1442" instrument_node="">, especially within the maritime community. Maritime security can be understood as a </span><em data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">concept</span></em><span data-dcnode-id="1439" instrument_node=""> referring to the security of the maritime domain or as a </span><em data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">set of policies, regulations, measures and operations</span></em><span data-dcnode-id="1436" instrument_node=""> to secure the maritime domain. In academia, the term ‘maritime security’ was almost absent from the debates about the security of the maritime domain until the beginning of the 2000׳s. Since 2002, the number of references to maritime security in the academic literature has increased linearly (c.f. </span><a class="workspace-trigger" data-dcnode-id="1434" href="#f0005" name="bf0005"><span data-dcnode-id="1435" instrument_node="">Fig. 1</span></a><span data-dcnode-id="1433" instrument_node="">). This increase in academic literature on maritime security can be explained by the conjunction of the three following factors: 1) the impacts of the 9/11 terrorist attacks (notably the launch of counter-terrorist operations at sea), 2) the occurrence of three high visibility terrorist acts against ships (USS Cole in 2001, French tanker Limburg in 2002 and Filipino passenger ship SuperFerry 14 in 2004), and 3) the rise of piratical attacks in the Strait of Malacca at the beginning of the century. Then the surge of piracy at the Horn of Africa between 2007 and 2012 largely contributed to generating academic debates beyond strategic and security studies, with scholars from various disciplines discussing the legal, criminal, cultural, economic, military, environmental and energy dimensions of piracy in particular and maritime security in general.</span></p><figure class="figure text-xs" data-dcnode-id="1407" id="f0005"><span data-dcnode-id="1422"><img alt="" aria-describedby="cap0005" data-dcnode-id="1431" height="208" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0308597X14003509-gr1.jpg&amp;raw"><span data-dcnode-id="1430" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="1423"><li data-dcnode-id="1424"><a class="anchor download-link u-font-sans" data-dcnode-id="1425" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0308597X14003509-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="1426"><span data-dcnode-id="1429" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="1408"><span data-dcnode-id="1415" id="cap0005"><p data-dcnode-id="1416" id="sp0005"><span class="label" data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Fig. 1</span></span><span data-dcnode-id="1419" instrument_node="">. </span><span data-dcnode-id="1417" instrument_node="">Evolution between 1989 and 2014 of the number of academic publications mentioning ‘maritime security’ listed by Google Scholars.</span></p></span><span data-dcnode-id="1409"><em data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Source</span></em><span data-dcnode-id="1412" instrument_node="">: Google Scholars search </span><a class="workspace-trigger" data-dcnode-id="1410" href="#bib13" name="bbib13"><span data-dcnode-id="1411" instrument_node="">[13]</span></a></span></span></figure></div><p data-dcnode-id="1383" id="p0010"><span data-dcnode-id="1405" instrument_node="">Between 1989 and 2014, Google Scholars lists more than 16,000 references comprising the exact phrase ‘maritime security’ compared to only 218 between 1914 and 1988 (Google Scholar Search, </span><a class="workspace-trigger" data-dcnode-id="1403" href="#bib13" name="bbib13"><span data-dcnode-id="1404" instrument_node="">[13]</span></a><span data-dcnode-id="1402" instrument_node="">). However, despite this academic interest, the geopolitical dimension of maritime security has been overlooked by practitioners and scholars alike. Only a handful of scholars have started to discuss the link between maritime security and geopolitics, mainly focusing on the Indian Ocean, the European Union (EU) or both (e.g. </span><a class="workspace-trigger" data-dcnode-id="1400" href="#bib12" name="bbib12"><span data-dcnode-id="1401" instrument_node="">[12]</span></a><span data-dcnode-id="1399" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="1397" href="#bib14" name="bbib14"><span data-dcnode-id="1398" instrument_node="">[14]</span></a><span data-dcnode-id="1396" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="1394" href="#bib17" name="bbib17"><span data-dcnode-id="1395" instrument_node="">[17]</span></a><span data-dcnode-id="1393" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="1391" href="#bib18" name="bbib18"><span data-dcnode-id="1392" instrument_node="">[18]</span></a><span data-dcnode-id="1390" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="1388" href="#bib19" name="bbib19"><span data-dcnode-id="1389" instrument_node="">[19]</span></a><span data-dcnode-id="1387" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="1385" href="#bib20" name="bbib20"><span data-dcnode-id="1386" instrument_node="">[20]</span></a><span data-dcnode-id="1384" instrument_node="">). The aim of this article is to shed light on this overlooked dimension and to propose ways to integrate it within the emergent field of maritime security studies. The first step consists in clarifying the definitions of the two concepts; ‘geopolitics’ and ‘maritime security’, since both of them are open to various, often divergent and modular, interpretations. Then the article introduces the geopolitical dimension of maritime security from a conceptual perspective and analyses three practical examples of maritime security geo-strategies released in 2014, which demonstrate the importance of geographical and geopolitical considerations for maritime security studies.</span></p></section><section data-dcnode-id="1348" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1376" id="sect0020"><span data-dcnode-id="1381" instrument_node="">2</span><span data-dcnode-id="1379" instrument_node="">. </span><span data-dcnode-id="1377" instrument_node="">Definitions</span></h2><p data-dcnode-id="1371" id="p0015"><span data-dcnode-id="1375" instrument_node="">The term ‘geopolitics’ has been employed indiscriminately by both practitioners and scholars in reference to states’ zones of interest or influence and how they clash with each other’s. This meaning is both vague and limited; it does not account for the full significance of the term, and even bears a negative connotation due to the emphasis on power politics. After all, Nazi Germany’s expansionist foreign policy goals were justified using ‘geopolitical’ arguments based on simplistic (and erroneous) geographical naturalisations. In the 21</span><sup data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">st</span></sup><span data-dcnode-id="1372" instrument_node=""> century, geopolitics as an academic discipline has lost its prescriptive nature. It actually aims at explaining how geography somewhat constrains politics, how states try to bypass those constraints, and (in the case of critical geopolitics) how they try to use geography to their advantage, including in discourses through series of geo-informed representations. In practice states and other international actors take into account the constraining impacts of geographical factors. They develop and tacitly or explicitly endorse ‘geopolitical visions’ or ‘geo-strategies’ that directly or indirectly guide their foreign and security policy goals and activities. In other words, both in practice and in the collective imaginaries, geography contributes to defining the boundaries of what is possible to achieve in international relations along with other material and ideational factors.</span></p><p data-dcnode-id="1351" id="p0020"><span data-dcnode-id="1370" instrument_node="">The expression ‘maritime security’ is recent. Before the end of the Cold War it was rarely used and primarily in reference to sea control over maritime areas in the context of the superpower confrontation, that is to say in a naval context. It is thus not surprising that during the Cold War maritime security was more frequently employed in references to geopolitical considerations (such as sovereignty claims over maritime territories, the status of coastal waters, and the control over maritime zones) than in the 21</span><sup data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">st</span></sup><span data-dcnode-id="1367" instrument_node=""> century. Since the end of the 1990׳s and the beginning of the 2000׳s, maritime security was increasingly used to describe preventive measures set up to respond to illegal activities at sea or from the sea (including the protection of shipping and ports). Terrorism (post 9/11) and piracy (especially after 2007 and the rise of attacks at the Horn of Africa) attracted most of the media’s attention. However, arms and drug trafficking, people smuggling, illegal, unregulated and unreported fishing (IUUF), and deliberate pollution still represent the bulk of illegal and disruptive activities at sea. Today, states and international actors such as the EU have adopted a more comprehensive and pro-active approach to maritime security, which centres around the exercise of the monopoly on the legitimate use of violence at sea to implement and maintain security, safety and good governance within the maritime domain, with both preventive measures (e.g. port security regulations) and reactive measures (e.g. counter-piracy operations). Maritime security is increasingly linked to economic and environmental considerations, as illustrated by the EU </span><em data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Integrated Maritime Policy</span></em><span data-dcnode-id="1364" instrument_node=""> (IMP) adopted in 2007 and the </span><em data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">Blue Growth</span></em><span data-dcnode-id="1361" instrument_node=""> initiative adopted in 2012 </span><a class="workspace-trigger" data-dcnode-id="1359" href="#bib4" name="bbib4"><span data-dcnode-id="1360" instrument_node="">[4]</span></a><span data-dcnode-id="1358" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="1356" href="#bib5" name="bbib5"><span data-dcnode-id="1357" instrument_node="">[5]</span></a><span data-dcnode-id="1355" instrument_node="">. Indeed, although the main driver of the IMP has been economic growth, the success of the </span><em data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Blue Growth</span></em><span data-dcnode-id="1352" instrument_node=""> strategy rests on a safe and secure maritime domain, which grants economic agents with the stability and certainties they expect to see before they make any investment. Marine environment and fisheries protection as well as maritime surveillance initiatives have been instrumental in raising maritime security objectives to the top of the security agenda of various state and non-state actors.</span></p><p data-dcnode-id="1349" id="p0025"><span data-dcnode-id="1350" instrument_node="">The geopolitical dimension of maritime security accounts for the way geography constrains and informs (directly or indirectly) maritime security policies, regulations, measures and operations, as well as how states take (tacitly or explicitly) geography into account when developing their maritime security strategies.</span></p></section><section data-dcnode-id="1256" id="s0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1342" id="sect0025"><span data-dcnode-id="1347" instrument_node="">3</span><span data-dcnode-id="1345" instrument_node="">. </span><span data-dcnode-id="1343" instrument_node="">Geography and maritime security</span></h2><p data-dcnode-id="1334" id="p0030"><span data-dcnode-id="1341" instrument_node="">Geographical ‘permanence’ such as the length of a country’s coastline or the absence of direct access to the high seas constrains seapower in general (e.g. </span><a class="workspace-trigger" data-dcnode-id="1339" href="#bib16" name="bbib16"><span data-dcnode-id="1340" instrument_node="">[16]</span></a><span data-dcnode-id="1338" instrument_node="">) and maritime security policies in particular, “for geography does not argue. It simply is” (</span><a class="workspace-trigger" data-dcnode-id="1336" href="#bib19" name="bbib19"><span data-dcnode-id="1337" instrument_node="">[19]</span></a><span data-dcnode-id="1335" instrument_node="">: 236). This in no way means that politics and policies are determined by geography but that geographical factors need to be taken into account in the list of explanatory factors along with other material, structural and ideational factors.</span></p><p data-dcnode-id="1329" id="p0035"><span data-dcnode-id="1333" instrument_node="">Maritime security has to do with (illegal and disruptive) human activities in the maritime </span><em data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">milieu</span></em><span data-dcnode-id="1330" instrument_node="">, that is to say a certain geographically delimited space. Thus, states are differently impacted by maritime security threats depending on their actual geographical location. For example, in the case of illegal immigration by sea, Italy is more directly impacted than (for instance) the United Kingdom, because of its very geographical location. Sicily and especially the island of Lampedusa are located directly on the main (and one of the shortest) immigration route from North Africa to the EU and have thus sustained a constant flow of illegal migrants for the past decades. In other words, even if Britain, France or Germany may be the ultimate destination goal of illegal migrants crossing the Mediterranean on small boats, Italy, Spain (through the Gibraltar Strait) and Malta are more easily, quickly (and relatively safely) accessible by boat than the UK or even France, due to evident geographical factors. As a result Italy has to spend more resources on counter-immigration than many other EU states, which explains its recent request for the EU’s assistance in dealing with counter-immigration at sea in central Mediterranean, leading to the launch of FRONTEX operation Triton in November 2014. This example illustrates that simple geographical realities have constraining impacts on states’ maritime security policies, notably when it comes to regulating human activities at sea.</span></p><div data-dcnode-id="1278"><p data-dcnode-id="1320" id="p0040"><span data-dcnode-id="1328" instrument_node="">The same reasoning works for other types of illegal flow within the maritime domain. For example, drug smuggling directly impacts countries located on the main routes, such as Spain through the Gibraltar Strait, or those whose coasts are difficult to monitor due to a negative ratio between the length of the coast to police and the resources at the disposal of the navy/coast-guard. This can be the case for small states such as for example Ireland with limited resources and a rather extended coastline or powerful states such as the United States, which despite the resources at the disposal of its coast-guard service has such a long coast to monitor and is the intended destination goal of so much drug trafficking that it still struggles to ‘seal’ its maritime borders. Here the geographical factor (length of coasts) is clearly not sufficient to explain the burden of counter-narcotics. Material power (such as the coast-guard budget) and drug traffickers’ business strategies (privileged destination countries) need to be factored in the explanation. As shown in </span><a class="workspace-trigger" data-dcnode-id="1326" href="#t0005" name="bt0005"><span data-dcnode-id="1327" instrument_node="">Table 1</span></a><span data-dcnode-id="1325" instrument_node="">, the geographical factor is still very relevant. Despite the US deploying almost 20 times more coast-guard vessels, each of those vessels have a theoretical length of coast to monitor that is just 62</span><span data-dcnode-id="1323" instrument_node="">&nbsp;</span><span data-dcnode-id="1321" instrument_node="">km shorter than the one devoted to each Irish offshore patrol vessels (OPV).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="1279" id="t0005"><span class="captions" data-dcnode-id="1310"><span data-dcnode-id="1311" id="cap0010"><p data-dcnode-id="1312" id="sp0010"><span class="label" data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Table 1</span></span><span data-dcnode-id="1317" instrument_node="">. </span><span data-dcnode-id="1315" instrument_node="">Ratio between length of coast and coast-guard resources </span><strong data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">(comparison Ireland –USA).</span></strong></p></span></span><div class="groups" data-dcnode-id="1280"><table data-dcnode-id="1281"><thead data-dcnode-id="1301"><tr class="rowsep-1" data-dcnode-id="1302"><th data-dcnode-id="1309" scope="col"></th><th data-dcnode-id="1307" scope="col"><span data-dcnode-id="1308" instrument_node="">Length of coast (in km)</span></th><th data-dcnode-id="1305" scope="col"><span data-dcnode-id="1306" instrument_node="">Number of coast-guard vessels</span></th><th data-dcnode-id="1303" scope="col"><span data-dcnode-id="1304" instrument_node="">Ratio (km of coast per ship)</span></th></tr></thead><tbody data-dcnode-id="1282"><tr data-dcnode-id="1292"><td data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Ireland</span></td><td class="align-char" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">1500</span></td><td data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">8 OPV</span></td><td class="align-char" data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">187</span></td></tr><tr data-dcnode-id="1283"><td data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">USA</span></td><td class="align-char" data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">20,000</span></td><td data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">More than 159 coast-guard vessels</span></td><td class="align-char" data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">125</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="1273" id="p0045"><span data-dcnode-id="1277" instrument_node="">States’ involvement in maritime security also depends on non-geographical factors such as governments’ capabilities and/or will to tackle maritime security threats. For example, Somalia has not been in a position to control illegal activities in its own territorial waters (hence the need for foreign maritime capacity-building operations, such as EUCAP Nestor). Empowering secessionist Somaliland’s and autonomist Puntland’s own coast-guard forces shows the importance of political will and material realities as explanatory factors. It has also been argued that in certain South East Asian countries, police or naval forces are reluctant to engage in counter-piracy activities and could even be “complicit in these crimes, especially in areas where a culture of corruption (possibly boosted by underpaid maritime security forces or smuggling activities) has evolved under years of authoritarian governments” (</span><a class="workspace-trigger" data-dcnode-id="1275" href="#bib3" name="bbib3"><span data-dcnode-id="1276" instrument_node="">[3]</span></a><span data-dcnode-id="1274" instrument_node="">: 79).</span></p><p data-dcnode-id="1262" id="p0050"><span data-dcnode-id="1272" instrument_node="">Due to the global nature of the maritime domain and to the transnational nature of many of the current maritime security threats (immigration, drug smuggling, piracy, etc.), countries not directly impacted by the threats coming from the sea can nevertheless decide to contribute to the policing efforts, based on the understanding that they will eventually be impacted later. For example the EU has set up the FRONTEX agency to deal with illegal immigration and coordinate member states’ activities in this field, based on the principle that member states are all impacted by the consequences of illegal immigration to the EU whatever their geographical location. Counter-immigration at sea represents a major part of FRONTEX’s budget and activities; in 2012, the largest share (42.3%) of the agency’s operational budget (excluding risk analyses and research &amp; technology) went to sea borders joint operations (Frontex, </span><a class="workspace-trigger" data-dcnode-id="1270" href="#bib9" name="bbib9"><span data-dcnode-id="1271" instrument_node="">[9]</span></a><span data-dcnode-id="1269" instrument_node="">: 32). In 2013, within the FRONTEX framework, North European countries such as Denmark, Iceland, Finland, Latvia and landlocked countries such as Austria, Luxembourg and even non-EU member Switzerland have contributed to counter-immigration operations taking place in the wider Mediterranean area (Frontex, </span><a class="workspace-trigger" data-dcnode-id="1267" href="#bib10" name="bbib10"><span data-dcnode-id="1268" instrument_node="">[10]</span></a><span data-dcnode-id="1266" instrument_node="">: 59). This shows that states include geographically distant maritime regions into their security perimeter, for transnational threats need to be tackled beyond one’s external boundary. Controlling the sea far away from home is of strategic value. It represents a means to expand one’s zone of control and competencies beyond one’s external boundary, which can be considered as a form of post-modern territorial expansion (e.g. </span><a class="workspace-trigger" data-dcnode-id="1264" href="#bib11" name="bbib11"><span data-dcnode-id="1265" instrument_node="">[11]</span></a><span data-dcnode-id="1263" instrument_node="">). It must however be noted that overseas possessions imply the right and the duty to maintain a (naval) presence there, which is mainly about affirming one’s sovereignty, although overseas naval bases and prepositioning can also contribute to power projection and naval diplomacy.</span></p><p data-dcnode-id="1257" id="p0055"><span data-dcnode-id="1261" instrument_node="">Maritime security threats are also used in geopolitical discourses as an argument (amongst others) justifying the projection of security beyond one’s external boundary </span><a class="workspace-trigger" data-dcnode-id="1259" href="#bib12" name="bbib12"><span data-dcnode-id="1260" instrument_node="">[12]</span></a><span data-dcnode-id="1258" instrument_node="">. In other words, geographical representations framed within the ‘safe/inside’ versus ‘unsafe/outside’ dichotomy encompass maritime elements. For example, the seas surrounding Europe are represented as vectors of threats in both EU’s and member states’ discourses, which may then justify various (sometimes controversial) projection activities in the maritime periphery of Europe. Securing the freedom of the seas and policing the ‘global commons’ justifies projecting regulations, norms but also police and naval forces beyond one’s territorial or jurisdictional waters. In other words, maritime security has a geopolitical dimension. The control of distant maritime areas is presented as vital to assure security on land. This construction of threats along geographical lines and the practical consequences in terms of power and forces projection are strengthened by the fact that the boundary between naval deployments and maritime security operations is growingly blurred, which is illustrated by counter-terrorist and counter-piracy operations currently taking place at the Horn of Africa, which result in the deployment of frigates within war-like coalitions. It is interesting to note that the deployment of frigates instead of patrol vessels is mainly due to geographical considerations; the units sent by the US, the Europeans or the Chinese need to sustain operating for a long period far away from their bases, which is beyond the capacity of many coast-guard patrol vessels. As will be discussed below, the geopolitical dimension of maritime security also reflects in current maritime security strategies.</span></p></section><section data-dcnode-id="1026" id="s0020"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1250" id="sect0030"><span data-dcnode-id="1255" instrument_node="">4</span><span data-dcnode-id="1253" instrument_node="">. </span><span data-dcnode-id="1251" instrument_node="">Maritime security (geo) strategies</span></h2><div data-dcnode-id="1199"><p data-dcnode-id="1245" id="p0060"><span data-dcnode-id="1249" instrument_node="">States and regional organisations such as NATO and the EU have interests linked to maritime security, which go beyond securing the freedom of the seas. Thus maritime security concerns integrate within broader geo-strategies. A number of states, as well as the EU, have recently elaborated specific maritime security strategies. These documents tend to include a geopolitical dimension, although sometimes rather tacitly. This section analyses three maritime security strategies, all released in 2014: the UK National Strategy for Maritime Security (NSMS), the EU Maritime Security Strategy (EU MSS), and the EU Strategy on the Gulf of Guinea (GoG). This choice of text responds to the need to discuss current narrative practices, since the concept of maritime security has only recently been broadened (as discussed above). The texts are located in different planes, since the first was elaborated by a state (the UK) whereas the second and the third by a supranational actor (the EU). This allows conducting a comparison between the UK (that is to say a state with pro-active security policies and substantial material power to back it) and the EU (that is to say a supranational actor whose security policies reflect compromises between all member states and which suffers from a deficit of means when it comes to applying security policies). Two variables are under scrutiny: 1) the ‘geopolitical approach towards maritime security’, for which two categories are defined; a tacit versus an explicit approach, and 2) the ‘extent to which geopolitical considerations inform policy objectives’, for which two categories are defined; a direct versus indirect influence. The indicators employed for the coding are exposed in </span><a class="workspace-trigger" data-dcnode-id="1247" href="#t0010" name="bt0010"><span data-dcnode-id="1248" instrument_node="">Table 2</span></a><span data-dcnode-id="1246" instrument_node="">. They are then applied to the analysis of the three above-mentioned strategies (codes in brackets). The presence of an explicit link between maritime security and geopolitics is measured by the occurrence of unequivocal references to the concept of geopolitics and to the fact that geography influences maritime security. The direct influence of geopolitical factors on maritime security objectives is measured by the occurrence of unequivocal references to geopolitical interests in the maritime domain and to geographical locations when referring to maritime security objectives.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="1200" id="t0010"><span class="captions" data-dcnode-id="1237"><span data-dcnode-id="1238" id="cap0015"><p data-dcnode-id="1239" id="sp0015"><span class="label" data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Table 2</span></span><span data-dcnode-id="1242" instrument_node="">. </span><span data-dcnode-id="1240" instrument_node="">Indicators for coding.</span></p></span></span><div class="groups" data-dcnode-id="1201"><table data-dcnode-id="1202"><thead data-dcnode-id="1232"><tr class="rowsep-1" data-dcnode-id="1233"><th data-dcnode-id="1236" scope="col"></th><th class="align-left" colspan="2" data-dcnode-id="1234" scope="col"><span data-dcnode-id="1235" instrument_node="">Indicators</span></th></tr></thead><tbody data-dcnode-id="1203"><tr data-dcnode-id="1225"><td data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Tacit link between maritime security and geopolitics</span></td><td data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Geographical definition of MS risks and threats (Tgeopol1)</span></td><td data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Recurrent geographical references throughout the text (Tgeopol2)</span></td></tr><tr data-dcnode-id="1218"><td data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Explicit link between maritime security and geopolitics</span></td><td data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Reference to the concept of geopolitics (Egeopol1)</span></td><td data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Reference to the influence of geography re MS (Egeopol2)</span></td></tr><tr data-dcnode-id="1211"><td data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Indirect influence of geographical and/or geopolitical factors on maritime security objectives</span></td><td data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Reference to the need to tackle MS threats beyond one’s boundary and/or territorial waters (IgeoInfl1)</span></td><td data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Reference to the need to police the ‘global’ maritime domain (IgeoInfl2)</span></td></tr><tr data-dcnode-id="1204"><td data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Direct influence of geographical and/or geopolitical factors on maritime security objectives</span></td><td data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Direct reference to geopolitical interests in the maritime domain (DgeoInfl1)</span></td><td data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Mention of geographical locations when referring to MS objectives (DgeoInfl2)</span></td></tr></tbody></table></div></div></div><section data-dcnode-id="1182" id="s0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="1193" id="sect0035"><span data-dcnode-id="1198" instrument_node="">4.1</span><span data-dcnode-id="1196" instrument_node="">. </span><span data-dcnode-id="1194" instrument_node="">The UK National Strategy for Maritime Security (NSMS)</span></h3><p data-dcnode-id="1185" id="p0065"><span data-dcnode-id="1192" instrument_node="">The NSMS stresses that the UK is “an island trading nation” (</span><a class="workspace-trigger" data-dcnode-id="1190" href="#bib15" name="bbib15"><span data-dcnode-id="1191" instrument_node="">[15]</span></a><span data-dcnode-id="1189" instrument_node="">: 18) with overseas territories and global interests. Consequently, maritime security is very important for Britain both in terms of economic and national security: fisheries protection in the territorial waters and EEZs of Great Britain and overseas territories, security of sea lanes of communication, energy security, and drug-interdiction represent vital interests (Tgeopol1). Some regions are specifically described as prone to maritime security issues and of interest to the UK’s security: the Arctic, the South and East China seas, the Horn of Africa, the Gulf of Guinea and the Caribbean (26–37) (Tgeopol2). The UK NSSM explicitly acknowledges the UK’s political will and capabilities to protect British maritime security interests wherever needed, i.e. with no geographical limitation (DgeoInfl2):</span></p><blockquote data-dcnode-id="1186"><p data-dcnode-id="1187" id="sp0030"><span data-dcnode-id="1188" instrument_node="">We deploy Royal Navy ships acting independently or as part of an international force to maintain vital trade routes and ensure freedom of navigation, including a persistent forward presence in the Atlantic, Indian Ocean and the Persian Gulf. We also deploy specialised Naval shipping and capabilities to key chokepoints in order to understand and influence these areas, and if necessary to take action to prevent and respond (33).</span></p></blockquote><p></p><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Following the traditional British approach to seapower as an economic and security enabler, the NSMS highlights the fact that the high seas are part of the “global commons” (25), which implies freedom of navigation and a common responsibility for the maintenance of security (IGeoInfl2). Leading maritime nations such as the UK must then adopt a leading role in policing and securing the global commons, as well as in maritime capacity building, since “promoting a secure international maritime domain […] will benefit all nations” (18). The NSMS has thus a clear geo-strategic and geo-security dimension, since it justifies and further encourages British forces to operate beyond jurisdictional waters, “within the UK Marine Area and beyond” (41), that is to say “across the maritime domain” and “on a global scale” (19) so as to contribute to maritime security in general and to fulfil British national interest in particular (IGeoInfl1).</span></p></section><section data-dcnode-id="1140" id="s0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="1176" id="sect0040"><span data-dcnode-id="1181" instrument_node="">4.2</span><span data-dcnode-id="1179" instrument_node="">. </span><span data-dcnode-id="1177" instrument_node="">The European Union Maritime Security Strategy (EU MSS)</span></h3><p data-dcnode-id="1171" id="p0075"><span data-dcnode-id="1175" instrument_node="">The EU MSS was drafted by the Commission in March 2014 (Commission, </span><a class="workspace-trigger" data-dcnode-id="1173" href="#bib6" name="bbib6"><span data-dcnode-id="1174" instrument_node="">[6]</span></a><span data-dcnode-id="1172" instrument_node="">), then the Council adopted a revised version on 24 June 2014. The two documents do not diverge much, although some important omissions are to be found in the Council’s approved version, which reflect member states’ reservations about the deployment of the EU’s seapower.</span></p><p data-dcnode-id="1154" id="p0080"><span data-dcnode-id="1170" instrument_node="">The EU stresses its will, interests and responsibility to contribute to promoting “better maritime governance” (</span><a class="workspace-trigger" data-dcnode-id="1168" href="#bib8" name="bbib8"><span data-dcnode-id="1169" instrument_node="">[8]</span></a><span data-dcnode-id="1167" instrument_node="">: 8), for example by launching maritime capacity building missions (such as EUCAP Nestor at the Horn of Africa or EUBAM in Libya) focusing on coast-guard and maritime governance capabilities (IgeoInfl2). But beyond the stewardship of the oceans, the EU’s maritime security strategy is informed by geopolitical elements. Maritime areas in the periphery of Europe and beyond have a “strategic value” (</span><a class="workspace-trigger" data-dcnode-id="1165" href="#bib8" name="bbib8"><span data-dcnode-id="1166" instrument_node="">[8]</span></a><span data-dcnode-id="1164" instrument_node="">: 4) to the EU (Tgeopol1, Tgeopol2 and DgeoInfl2):</span></p><blockquote data-dcnode-id="1155"><p data-dcnode-id="1156" id="sp0035"><span data-dcnode-id="1163" instrument_node="">Some maritime zones or areas within the global maritime domain are, because of their strategic value or potential for crisis or instability, of particular importance to the EU and its Member States. The Mediterranean, the Atlantic and the global network of shipping lanes to and from Asia, Africa and the Americas are of critical importance (Commission, </span><a class="workspace-trigger" data-dcnode-id="1161" href="#bib6" name="bbib6"><span data-dcnode-id="1162" instrument_node="">[6]</span></a><span data-dcnode-id="1160" instrument_node="">: 6).This Strategy takes particular regard of each of the European sea and subsea basins, namely the Baltic Sea, the Black Sea, the Mediterranean and the North Sea, as well as of the Arctic waters, the Atlantic Ocean and the outermost regions (</span><a class="workspace-trigger" data-dcnode-id="1158" href="#bib8" name="bbib8"><span data-dcnode-id="1159" instrument_node="">[8]</span></a><span data-dcnode-id="1157" instrument_node="">: 4).</span></p></blockquote><p></p><p data-dcnode-id="1143"><span data-dcnode-id="1153" instrument_node="">Contributing to the security of the seas beyond the EU’s jurisdictional waters also serves the Union global geo-strategy, which requires visual presence. The Commission advocated regular “EU-flagged maritime exercises with third countries […] in order to improve the visibility of the EU in the global maritime domain” (2014: 7). Without mentioning this very possibility, the Council nevertheless stressed the fact that the EU has interests to defend over the world’s oceans, which are not bounded by geographical considerations. Although they revolve around the ‘liberal’ notions of the freedom of the sea and the promotion of good governance at sea, they are nonetheless informed by ‘realist’ power politics considerations (DgeoInfl1):</span></p><blockquote data-dcnode-id="1144"><p data-dcnode-id="1145" id="sp0040"><span data-dcnode-id="1152" instrument_node="">The Union stresses the importance of its assuming increased responsibilities as a global security provider, at the international level and in particular in its neighbourhood, thereby also enhancing its own security and its role as a strategic global actor. (</span><a class="workspace-trigger" data-dcnode-id="1150" href="#bib8" name="bbib8"><span data-dcnode-id="1151" instrument_node="">[8]</span></a><span data-dcnode-id="1149" instrument_node="">: 8)Member States’ Armed Forces should play a strategic role at sea and from the sea and provide global reach, flexibility and access that enable the EU and its Member States to contribute to the full spectrum of maritime responsibilities. (</span><a class="workspace-trigger" data-dcnode-id="1147" href="#bib8" name="bbib8"><span data-dcnode-id="1148" instrument_node="">[8]</span></a><span data-dcnode-id="1146" instrument_node="">: 10)</span></p></blockquote><p></p><p data-dcnode-id="1141" id="p0090"><span data-dcnode-id="1142" instrument_node="">In sum, despite the fact that it originates in the Commission’s Maritime Affairs department’s work related to the security of the maritime domain, which was mainly informed by economic considerations (c.f. IMP), and despite the fact that the EU MSS needed to be approved by the member states, this strategy tacitly acknowledges the geographical if not the geopolitical dimension of maritime security and directly takes those factors into account to inform the EU’s objectives.</span></p></section><section data-dcnode-id="1027" id="s0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="1134" id="sect0045"><span data-dcnode-id="1139" instrument_node="">4.3</span><span data-dcnode-id="1137" instrument_node="">. </span><span data-dcnode-id="1135" instrument_node="">The EU Strategy on the Gulf of Guinea (GoG)</span></h3><p data-dcnode-id="1129" id="p0105"><span data-dcnode-id="1133" instrument_node="">One maritime region which has attracted the EU’s attention is the GoG, for which the Council has adopted in March 2014 a Strategy. This strategy highlights the various regional threats, including IUUF, illicit dumping of waste, piracy and armed robbery at sea, trafficking of human beings, narcotics, arms and counterfeit goods, smuggling of migrants, as well as oil theft (</span><a class="workspace-trigger" data-dcnode-id="1131" href="#bib7" name="bbib7"><span data-dcnode-id="1132" instrument_node="">[7]</span></a><span data-dcnode-id="1130" instrument_node="">: 2). In other words, the EU has acknowledged the need to be more active in the GoG due to maritime security threats (Tgeopol1). This is a striking example of how maritime security issues, even very distant from home, can engender and justify the need to take into consideration distant (maritime) regions. In practice, the EU is committed to “identify geographic and thematic priority zones to focus the EU response, including in cooperation with other international actors” (9) and to help “states to strengthen their maritime capabilities, the rule of law and effective governance across the region, including improvements in maritime administration and law enforcement through multiagency cooperation by police, navy, military, coastguard, customs and immigration services” (3). In 2013, the Union launched the Critical Maritime Routes programme (CRIMGO) “to reinforce regional and international initiatives against piracy and armed robbery at sea in the Gulf of Guinea” (7) (IgeoInfl1).</span></p><div data-dcnode-id="1028"><p data-dcnode-id="1121" id="p0110"><span data-dcnode-id="1128" instrument_node="">As summarised in </span><a class="workspace-trigger" data-dcnode-id="1126" href="#t0015" name="bt0015"><span data-dcnode-id="1127" instrument_node="">Table 3</span></a><span data-dcnode-id="1125" instrument_node="">, in the three cases, the geopolitical approach to maritime security is present although tacitly acknowledged. In both the UK NSMS and the EU MSS, policy objectives are indirectly </span><em data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">and</span></em><span data-dcnode-id="1122" instrument_node=""> directly informed by geographical or even geopolitical considerations. Indicators are found throughout the texts. In the case of the GoG strategy, the influence is indirect (i.e. the need to tackle threats), but the very existence of an EU GoG strategy indicates the Union’s increasing geopolitical thinking.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="1029" id="t0015"><span class="captions" data-dcnode-id="1113"><span data-dcnode-id="1114" id="cap0020"><p data-dcnode-id="1115" id="sp0020"><span class="label" data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Table 3</span></span><span data-dcnode-id="1118" instrument_node="">. </span><span data-dcnode-id="1116" instrument_node="">The geopolitical dimension of three maritime security strategies.</span></p></span></span><div class="groups" data-dcnode-id="1030"><table data-dcnode-id="1031"><thead data-dcnode-id="1078"><tr data-dcnode-id="1107"><th data-dcnode-id="1112" scope="col"></th><th class="rowsep-1" colspan="4" data-dcnode-id="1110" scope="col"><span data-dcnode-id="1111" instrument_node="">Geopolitical approach to maritime security</span></th><th class="rowsep-1" colspan="4" data-dcnode-id="1108" scope="col"><span data-dcnode-id="1109" instrument_node="">Policy objectives informed by geopolitical considerations</span></th></tr><tr data-dcnode-id="1097"><th data-dcnode-id="1106" scope="col"></th><th class="rowsep-1" colspan="2" data-dcnode-id="1104" scope="col"><span data-dcnode-id="1105" instrument_node="">Tacit</span></th><th class="rowsep-1" colspan="2" data-dcnode-id="1102" scope="col"><span data-dcnode-id="1103" instrument_node="">Explicit</span></th><th class="rowsep-1" colspan="2" data-dcnode-id="1100" scope="col"><span data-dcnode-id="1101" instrument_node="">Indirect</span></th><th class="rowsep-1" colspan="2" data-dcnode-id="1098" scope="col"><span data-dcnode-id="1099" instrument_node="">Direct</span></th></tr><tr class="rowsep-1" data-dcnode-id="1079"><th data-dcnode-id="1096" scope="col"></th><th data-dcnode-id="1094" scope="col"><span data-dcnode-id="1095" instrument_node="">Tgeopol1</span></th><th data-dcnode-id="1092" scope="col"><span data-dcnode-id="1093" instrument_node="">Tgeopol2</span></th><th data-dcnode-id="1090" scope="col"><span data-dcnode-id="1091" instrument_node="">Egeopol1</span></th><th data-dcnode-id="1088" scope="col"><span data-dcnode-id="1089" instrument_node="">Egeopol2</span></th><th data-dcnode-id="1086" scope="col"><span data-dcnode-id="1087" instrument_node="">IgeoInfl1</span></th><th data-dcnode-id="1084" scope="col"><span data-dcnode-id="1085" instrument_node="">IgeoInfl2</span></th><th data-dcnode-id="1082" scope="col"><span data-dcnode-id="1083" instrument_node="">DgeoInfl1</span></th><th data-dcnode-id="1080" scope="col"><span data-dcnode-id="1081" instrument_node="">DgeoInfl2</span></th></tr></thead><tbody data-dcnode-id="1032"><tr data-dcnode-id="1062"><td data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">UK NSMS</span></td><td data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">✓</span></td><td data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">✓</span></td><td data-dcnode-id="1071"></td><td data-dcnode-id="1070"></td><td data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">✓</span></td><td data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">✓</span></td><td data-dcnode-id="1065"></td><td data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">✓</span></td></tr><tr data-dcnode-id="1046"><td data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">EU MSS</span></td><td data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">✓</span></td><td data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">✓</span></td><td data-dcnode-id="1055"></td><td data-dcnode-id="1054"></td><td data-dcnode-id="1053"></td><td data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">✓</span></td><td data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">✓</span></td><td data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">✓</span></td></tr><tr data-dcnode-id="1033"><td data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">EU GoG</span></td><td data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">✓</span></td><td data-dcnode-id="1041"></td><td data-dcnode-id="1040"></td><td data-dcnode-id="1039"></td><td data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">✓</span></td><td data-dcnode-id="1036"></td><td data-dcnode-id="1035"></td><td data-dcnode-id="1034"></td></tr></tbody></table></div></div></div></section></section><section data-dcnode-id="1008" id="s0040"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1020" id="sect0050"><span data-dcnode-id="1025" instrument_node="">5</span><span data-dcnode-id="1023" instrument_node="">. </span><span data-dcnode-id="1021" instrument_node="">Discussion</span></h2><p data-dcnode-id="1018" id="p0115"><span data-dcnode-id="1019" instrument_node="">Maritime security is intrinsically geopolitical, since it is about projecting public power beyond one’s external boundary within the ‘global’ maritime domain. The results from the analysis of the three above-discussed examples show that geographical and geopolitical considerations do inform states’ and the EU’s maritime security objectives and goals, although geopolitical considerations remain tacit. The fact that the EU MSS was approved by 27 member states allows some generalisations beyond the very EU’s dynamics. Not only geography does impact on the boundary of what is possible to achieve in terms of freedom of the seas and good governance at sea, but states (and the EU) have also developed maritime geopolitical visions, based on the fact that securing adjacent and distant maritime spaces will positively impact on one’s security on land. Furthermore, contributing to global maritime governance may well ‘hide’ more ‘realist’ policy agendas in the form of a justification for power and forces projection beyond one’s legal zone of competencies.</span></p><p data-dcnode-id="1016" id="p0120"><span data-dcnode-id="1017" instrument_node="">It is interesting to note that the difference between the UK and the EU documents is limited despite the fact that they are very different actors. References to geopolitical considerations are tacit in both the UK and EU documents whereas policy objectives are directly and indirectly influenced by geographical considerations. This shows that, despite its peculiar decision-making process that often reduces foreign and security policy decisions to the smaller common denominator between member states, geopolitical considerations have been taken into account by the EU. This may indicate that member states have successfully uploaded their strategic and security policy objectives into the European Union. In the case of the EU MSS, since it originated in the Commission’s IMP and subsequent initiatives, it is not surprising to find that it advocates a global vision for the EU and thus frames maritime security objectives within the broader role and place of the EU as a global actor.</span></p><p data-dcnode-id="1014" id="p0125"><span data-dcnode-id="1015" instrument_node="">The fact that geopolitics is only tacitly acknowledged but that it does influence states’ and the EU’s policies and objectives shows that the geopolitical dimension of maritime security exists and matters but is still not acknowledged explicitly, which may be due to the enduring negative connotation of the term ‘geopolitics’ discussed above. Practitioners, especially in the Western liberal democratic world tend to negate their using geopolitical (or simply power politics) factors when it comes to foreign and security policy decisions-making. This can be explained by their accountability to a (supposedly) peaceful public opinion that will expect ‘liberal’ justifications for the projection of power into the maritime domain (such as ‘contributing to the security of the global commons’) rather than ‘realist’ arguments (such as ‘the need to control space beyond one’s external boundary’). For their part, academics who overlook the geopolitical dimension of maritime security take out of the equation a factor that contributes to explaining states’ and the EU’s maritime security policies.</span></p><p data-dcnode-id="1009" id="p0130"><span data-dcnode-id="1013" instrument_node="">So, could geopolitical approaches be included in maritime security studies? Maritime security scholars form a very eclectic group comprising political scientists, geographers, lawyers, economists, criminologists, anthropologists, etc, resulting in different ontologies, epistemologies and methodologies. Referring to the case of piracy studies, Christian Bueger showed that various scholars with diverging approaches and methodologies are nevertheless united by their “shared interest in understanding piracy and developing responses to it through the use of a scientific method” (</span><a class="workspace-trigger" data-dcnode-id="1011" href="#bib1" name="bbib1"><span data-dcnode-id="1012" instrument_node="">[1]</span></a><span data-dcnode-id="1010" instrument_node="">: 408). This is true, however their approaches are not always commensurable and maritime security studies remain scholarly very fragmented as of today. Lawyers focus on jurisdictional and legal issues, criminologists on criminals’ business models and culture, and so on so forth. Despite practitioners’ increasing tendency to acknowledge the geopolitical dimension of maritime security, this has left almost no room for geopolitical considerations within maritime security studies, except perhaps in the case of some political geographers and strategic studies analysts as mentioned in the introduction. The results discussed above should serve to highlight the indirect and direct links between geographical/geopolitical considerations and maritime security policies, as well as the fact that they are at least tacitly acknowledged in high level strategic documents.</span></p></section><section data-dcnode-id="995" id="s0045"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1002" id="sect0055"><span data-dcnode-id="1007" instrument_node="">6</span><span data-dcnode-id="1005" instrument_node="">. </span><span data-dcnode-id="1003" instrument_node="">Conclusion</span></h2><p data-dcnode-id="1000" id="p0135"><span data-dcnode-id="1001" instrument_node="">Be it understood as a concept or a set of practices, maritime security has a geopolitical dimension. The maritime domain is a space within which human actors operate, either to perform illegal, disruptive and damaging activities or to police and secure the sea in order to fight criminal actors. Maritime security refers to a geographical space, that is to say the sea, which has different characteristics compared to the land. The location of threats impacts on the way states and non-sate actors’ security is affected. States’ maritime security interests result in a practice consisting in projecting security beyond their external boundary into the global maritime domain. Thus, zones of interests are defined, which extend beyond one’s legal zone of competencies. In security narratives, those maritime zones are represented as vital for one’s security, which justifies power projection activities. In sum, as demonstrated by the analysis of three recent maritime security strategies, the geopolitical dimension of maritime security indirectly and directly informs states’ and the EU’s maritime security policies.</span></p><p data-dcnode-id="998" id="p0140"><span data-dcnode-id="999" instrument_node="">Beyond technical, operational, legal/judicial, economic, military and cultural elements, there is a geopolitical dimension of maritime security, which is tacitly acknowledged by practitioners who are nevertheless still reluctant to talk about geo-strategy. This dimension is also rather neglected by scholars who tend to focus on other dimensions due to the fragmentation of social science in general and of maritime security studies in particular.</span></p><p data-dcnode-id="996" id="p0145"><span data-dcnode-id="997" instrument_node="">When states and regional organisations stress their need, will or duty to ‘secure the freedom of the seas’, to ‘police the global commons’, to ‘promote good governance at sea’, or to ‘assure the stewardship of the ocean’, there are geopolitical forces and factors at play and not only ‘benign’ intentions. The goal of this article is to initiate debates within maritime security studies, so as scholars acknowledge the relevance of this geopolitical dimension and further engage with it.</span></p></section></div><section data-dcnode-id="971" id="ack0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="992" id="sect0065"><span data-dcnode-id="993" instrument_node="">Acknowledgements</span></h2><p data-dcnode-id="972" id="p0155"><span data-dcnode-id="991" instrument_node="">This article is based on a paper I presented during the workshop </span><em data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Into the Blue: Rethinking Maritime Security</span></em><span data-dcnode-id="988" instrument_node=""> held at Cardiff University, 26–27 June 2014. I would like to thank Dr Christian Bueger and all the participants for their valuable comments. I also would like to thank the editor of </span><em data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Marine Policy</span></em><span data-dcnode-id="985" instrument_node=""> and the reviewers for their helpful comments. Research underlying this article was supported in part by a grant from the </span><span data-dcnode-id="983" id="gs1"><span data-dcnode-id="984" instrument_node="">University of Lancaster Research Committee</span></span><span data-dcnode-id="982" instrument_node=""> (Grant reference: </span><a data-dcnode-id="980" href="#gs1"><span data-dcnode-id="981" instrument_node="">SGS/18/04</span></a><span data-dcnode-id="979" instrument_node="">) with additional support by the </span><span data-dcnode-id="977" id="gs2"><span data-dcnode-id="978" instrument_node="">ESRC-funded Centre for Corpus Approaches to Social Science</span></span><span data-dcnode-id="976" instrument_node=""> (grant reference: </span><a data-dcnode-id="974" href="#gs2"><span data-dcnode-id="975" instrument_node="">ES/K002155/1</span></a><span data-dcnode-id="973" instrument_node="">). The findings and views expressed in this article are wholly those of the author.</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="966"><button class="button button-anchor" data-dcnode-id="967" type="button"><span class="button-text" data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="965"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="368" id="bibliog0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="369" id="bb0005"><dl class="references" data-dcnode-id="370" id="reference-links-bb0005"><dt class="label" data-dcnode-id="960"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="961" href="#bbib1" id="ref-id-bib1"><span data-dcnode-id="962" instrument_node="">[1]</span></a></dt><dd class="reference" data-dcnode-id="912" id="
