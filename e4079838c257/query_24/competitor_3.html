40" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="241"><div class="PageDivider" data-dcnode-id="367"></div><header data-dcnode-id="364" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Cited by (44)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="242"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="243"><ul data-dcnode-id="249"><li class="ListArticleItem" data-dcnode-id="346"><div class="sub-heading" data-dcnode-id="358"><a data-dcnode-id="361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0308597X21005261" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="362" id="citing-articles-article0-title"><span data-dcnode-id="363" instrument_node="">The maritime security fallout from North Korea's fisheries policy</span></h3></a><div class="article-source ellipsis" data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">2022, Marine Policy</span></div></div><div class="buttons" data-dcnode-id="352"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="353" type="button"><span class="button-link-text" data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="354" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="355"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="347"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="348" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="349"><p data-dcnode-id="350" id="sp0025"><span data-dcnode-id="351" instrument_node="">North Korea's fisheries policy has created a wide range of maritime security challenges within the larger Northeast Asia region. North Korea has focused on increasing fish production and bringing in income, but its political economy has resulted in fisheries exploitation that is neither monitored nor controlled directly by the state. This is further complicated by United Nations sanctions that prohibit the legal export of fisheries product, and a series of maritime boundary disputes between North Korea and other countries. Combined, these factors lead to a range of maritime security problems, including fisheries smuggling, IUU fishing in both North Korean waters and elsewhere in the region, inter-state maritime clashes, arms proliferation, and maritime piracy. This has a number of policy implications for fisheries management and engagement with North Korea on maritime issues.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="328"><div class="sub-heading" data-dcnode-id="340"><a data-dcnode-id="343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0301421520305061" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="344" id="citing-articles-article1-title"><span data-dcnode-id="345" instrument_node="">The significance of the Baltic Sea Region for natural gas supplies to the V4 countries</span></h3></a><div class="article-source ellipsis" data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">2020, Energy Policy</span></div></div><div class="buttons" data-dcnode-id="334"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="335" type="button"><span class="button-link-text" data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="336" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="337"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="329"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="330" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="331"><p data-dcnode-id="332" id="abspara0010"><span data-dcnode-id="333" instrument_node="">The policy of diversification of natural gas supplies requires the extension of appropriate energy infrastructure. The V4 countries consume over 42 bcm natural gas a year. The dominant position in the region is held by the Russian Federation, which supplies the gas to different countries at different prices. Hence, the aim of the paper is to determine what role the Baltic Sea region is going to play for V4 countries as an opportunity to break this dominance. An added value of this article is the identification of the policy factors influencing the strategic importance of the Baltic Sea Region in the context of diversification of energy supply sources. The research hypothesis has been put forward that the development of gas infrastructure in the Baltic Sea Region will have an impact on strengthening the geoeconomic space of the Visegrad Group countries. The author will attempt to answer the following research questions: How should the potential of the Baltic Sea be used to strengthen the energy security of V4 countries? In what way should the gas infrastructure between the Visegrad Group states be developed?</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="310"><div class="sub-heading" data-dcnode-id="322"><a data-dcnode-id="325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0965856419311437" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="326" id="citing-articles-article2-title"><span data-dcnode-id="327" instrument_node="">Impact of the belt and road initiative on commercial maritime power</span></h3></a><div class="article-source ellipsis" data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">2020, Transportation Research Part A: Policy and Practice</span></div></div><div class="buttons" data-dcnode-id="316"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="317" type="button"><span class="button-link-text" data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="318" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="319"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="311"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="312" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="313"><p data-dcnode-id="314" id="sp0010"><span data-dcnode-id="315" instrument_node="">Since the Belt and Road (B&amp;R) Initiative was launched in 2013, China’s investment in ports across the globe has promoted maritime connectivity, driven performance in shipping, and strengthened its commercial maritime power. With the objective of quantitatively evaluating a country’s commercial maritime power, we develop an evaluation system based on the literature and the analytic hierarchy process (AHP)-entropy method. We analyze the evolution of 32 countries’ commercial maritime power since the inception of the B&amp;R Initiative. The main findings are as follows. First, our evaluation system of commercial maritime power consists of a hierarchy containing 4 components, 7 elements, and 32 factors. Second, the evolution of a country’s commercial maritime power can be assessed. The results show that countries along the routes of the initiative show good performances in the evolution of commercial maritime power. Third, we find that Vietnam not China shows the highest average annual growth rate.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="292"><div class="sub-heading" data-dcnode-id="304"><a data-dcnode-id="307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1366554519308816" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="308" id="citing-articles-article3-title"><span data-dcnode-id="309" instrument_node="">Geopolitical risk and corporate cash holdings in the shipping industry</span></h3></a><div class="article-source ellipsis" data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">2020, Transportation Research Part E: Logistics and Transportation Review</span></div></div><div class="buttons" data-dcnode-id="298"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="299" type="button"><span class="button-link-text" data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="300" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="301"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="293"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="294" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="295"><p data-dcnode-id="296" id="sp0010"><span data-dcnode-id="297" instrument_node="">We examine the cash holding decisions of global shipping firms in response to a change in geopolitical risk (GPR). Our results show that shipping companies significantly increase their cash reserves after GPR rises. The positive impact of GPR is more pronounced for firms with greater financial constraints. A further analysis shows that GPR positively and significantly affects dry bulk and container firms, but has an insignificant impact on tanker and logistics firms. We also find that GPR positively affects the corporate cash decisions of Asian listed shipping companies, but not those of other globally listed shipping companies. This study calls for policymakers to implement appropriate monetary and fiscal policies.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="274"><div class="sub-heading" data-dcnode-id="286"><a data-dcnode-id="289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128179451000356" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="290" id="citing-articles-article4-title"><span data-dcnode-id="291" instrument_node="">Exploring the knowns and unknowns of international fishery conflicts</span></h3></a><div class="article-source ellipsis" data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">2019, Predicting Future Oceans: Sustainability of Ocean and Human Systems Amidst Global Environmental Change</span></div></div><div class="buttons" data-dcnode-id="280"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="281" type="button"><span class="button-link-text" data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="282" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="283"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="275"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="276" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="277"><p data-dcnode-id="278" id="sp0015"><span data-dcnode-id="279" instrument_node="">Fishery conflicts that occur between states are increasingly becoming a concern for policy makers, as incidences of international fishery conflict as well as suspected environmental drivers of conflict (climate change and resource scarcity) are ramping up. Avoiding fishery conflicts that occur between states is not only vital to ensure national security, but also important to safeguard future human security due to the vital role fisheries play in providing employment and nutrition. Despite the debilitating impacts of fishery conflicts, there is still limited knowledge on the occurrence and nature of international fishery conflicts. This chapter explores the knowns and unknowns of international conflicts over fish, suggests directions for future research, and discusses fishery conflict in the wider context of maritime security.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="250"><div class="sub-heading" data-dcnode-id="262"><a data-dcnode-id="271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0308597X18306365" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="272" id="citing-articles-article5-title"><span data-dcnode-id="273" instrument_node="">Climate change and maritime security</span></h3></a><div class="article-source ellipsis" data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">2019, Marine Policy</span></div><div class="CitedSection" data-dcnode-id="263"><div class="snippet" data-dcnode-id="264"><div class="cite-header" data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">We analysed a series of indicative documents that demonstrate enough variation. The documents were selected based on the following criteria: a) Narrative scale: they must have the terms ‘maritime security’ or ‘maritime strategy’ in the title, b) Temporal scale: they must be published since 2001, which is when the concept of maritime security started to be employed with the meaning it has today [21], and c) Administrative scale: they must be released by states or international governmental organisations that possess the discursive power to set up political and security agendas. The European Union (EU) released its Maritime Security Strategy (MSS) in 2014.</span></p></div></div></div><div class="buttons" data-dcnode-id="256"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="257" type="button"><span class="button-link-text" data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="258" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="259"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="251"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="252" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="253"><p data-dcnode-id="254" id="sp0010"><span data-dcnode-id="255" instrument_node="">Climate change has been recognised as a major issue for coastal populations. Under this context, the potential socio-economic, environmental and health impacts at local, regional and global scales have received considerable attention by scientists. The knowledge gained feed official strategic documents, which aim to increase awareness but also propose and apply management and mitigation measures towards reducing risks for human beings and the natural environment. Dependencies between human security, social vulnerability of coastal communities and the occurrence of maritime crime have also been studied. There is a consensus on the need to deepen the understanding of the links between climate change effects and threats to maritime security, but it remains to be seen if existing knowledge on the interplay between climate change and maritime security has been translated into policy. This article offers a synthesis on recent evidence and knowledge gained to elaborate the nexus between climate change impacts, social vulnerabilities and the occurrence of maritime criminality. We further explore the extent to which official documents account for the maritime dimension of climate change security. Despite the existence of an embryonic official discourse linking climate change and maritime security, our analysis reveals significant gaps between the concerns raised by the academic community and what is acknowledged in national and regional official strategic documents. Informing decision-makers and stakeholders about the possible dependencies between climate change and maritime security is thus a crucial step towards improving global ocean governance.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-84922682042%26md5%3Dbc1366312d822d7a8618447f6c416c" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="247" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="248"></path></svg><span class="button-alternative-text" data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Copyright © 2014 The Author. Published by Elsevier Ltd.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="229" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id="230" type="button"><span class="button-link-text" data-dcnode-id="233"><h2 class="section-title u-h4" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Recommended articles</span></h2></span><svg class="icon icon-navigate-down" data-dcnode-id="231" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38
