</span><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">The most agile companies can turn geopolitical risk or flux into an advantage. By spotting trends as they take off – such as climate risk reporting and adopting it gaining knowledge and a competitive advantage.</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Trade and economic disruption causes pain and those with lengthy supply chains suffer. But those who are more flexible or can see the rise of tariffs and protectionism can act. The onset of a trade war between China and the US has seen many firms move operations or source commodities from different places to avoid the worst effects. </span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">The warning signs of trade war between China and the US were visible early on in Trump’s administration. A geopolitically aware firm that operates between the two countries would be sensibly assessing the situation and identifying how any risks could be mitigated. This could include moving some supply chains to Vietnam or other countries. </span></p><span data-dcnode-id="1000" instrument_node="">
</span><h2 data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Conclusion</span></h2><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="996" instrument_node="">At time of writing Disney was struggling with a torrent of </span><a data-dcnode-id="994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/world-54064654"><span data-dcnode-id="995" instrument_node="">bad publicity</span></a><span data-dcnode-id="993" instrument_node=""> due to its new live action Mulan movie. Part of the film had been shot in Xinjiang province and Disney thanked the region’s publicity department in the credits. </span></p><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">The region has been troubled by multiple reports of internment or re-education camps. Up to a million ethnic Uyghur citizens are said to be in these camps. Disney were condemned by many commentators for working with officials from the region. </span></p><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">The film failed to make an impression on the Chinese public and the bad publicity has not helped Disney make friends in Beijing. Having strong political capital with the Chinese government is key to gaining further market share in the country. </span></p><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Its not clear whether Disney failed to spot the dangers of working in Xinjiang. Or if they did spot the dangers they did not act on them or anticipate them. Either way those responsible for their geopolitical risk management failed to protect the firm.</span></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">The ethical choices behind wanting to film in Xinjiang were also questionable, but Disney and others would argue that plenty of other firms operate in the region and in China without criticism. But perception is important – Disney has a high profile and a family brand. By appearing to align with a regional government associated with internment camps was a step too far.</span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Above I have tried to outline the main geopolitical risks facing companies across the world. Of course geopolitical risks are international in nature but they vary in their impact depending which country you are in. The corporate sector is also extremely diverse, so different global risks matter to different firms. For example climate risk is a bigger deal for the infrastructure sector than the media industry.</span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="975" instrument_node="">Once risks are identified the next step for a company is preparing and mitigating these risks. Although some risks cannot be identified in advance (</span><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0951832014002440"><span data-dcnode-id="974" instrument_node="">Black Swans</span></a><span data-dcnode-id="972" instrument_node="">). Others can be tackled in advance. Some risks are relatively slow moving and there will be time to prepare and adapt. Others will need a crisis team to respond when time is of the essence. </span></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Geopolitical risk is real, ever changing and often unpredictable. Firms that fail to prepare will face serious consequences in terms of financial, operational and reputational damage. </span></p><span data-dcnode-id="967" instrument_node="">
