</span><main class="site-main" data-dcnode-id="453" id="main"><span data-dcnode-id="1764" instrument_node="">
</span><article class="post-91 post type-post status-publish format-standard hentry category-geopolitical-risk tag-geopolitical-risk tag-global-risk tag-managing-geopolitical-risk" data-dcnode-id="857" id="post-91"><span data-dcnode-id="1763" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1758"><span data-dcnode-id="1762" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">How to Manage Geopolitical&nbsp;Risk</span></h1><span data-dcnode-id="1759" instrument_node=""> </span></header><span data-dcnode-id="1756" instrument_node="">
</span><div class="entry-content" data-dcnode-id="897"><span data-dcnode-id="1755" instrument_node="">
</span><p data-dcnode-id="1754"></p><span data-dcnode-id="1753" instrument_node="">
</span><h2 data-dcnode-id="1750"><strong data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">The Merchant of Prato</span></strong></h2><span data-dcnode-id="1749" instrument_node="">
</span><p data-dcnode-id="1745"><a data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medievalists.net/2020/11/merchant-prato/"><span data-dcnode-id="1748" instrument_node="">Francesco di Marco Datini</span></a><span data-dcnode-id="1746" instrument_node=""> was a fourteen century Italian Merchant who from humble beginnings created a wealthy pan European trading empire over the course of 50 years. </span></p><span data-dcnode-id="1744" instrument_node="">
</span><p data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Datini dealt in anything that would make money, from armour and weapons, saffron and jewellery, money lending to art dealing. Key to his success was a network of informants and agents which allowed him to stay abreast of and take advantage of events across a tumultuous era in Europe. The fourteen century had more than its fair share of warfare, plague and religious schism.</span></p><span data-dcnode-id="1741" instrument_node="">
</span><p data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">Datini’s shrewd management, his access to information and above all his ability to adapt to a changing world were key to his success. This what we now might call successfully managing risk. </span></p><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">War between France and England was an opportunity to sell weapons and armour. While peace and royal weddings were a chance to sell luxury goods like spices and fine cloth. Lending money to monarchs and the nobility were generally avoided thanks their unreliability in repaying loans. </span></p><span data-dcnode-id="1735" instrument_node="">
</span><p data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Natural disasters like storms and made hazards like brigands were sometimes unavoidable, but careful diversification ensured they were not calamitous.</span></p><span data-dcnode-id="1732" instrument_node="">
</span><p data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">Datini understood managing geopolitical risk was key to his Pan-European trading empire. While times have changed since the fourteenth century, geopolitical risk remains a harsh reality for organisations and one which can catch the unprepared unaware time and time again. </span></p><span data-dcnode-id="1729" instrument_node="">
</span><h2 data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Introduction</span></h2><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">In this guide I outline the major global and geopolitical risks faced by international organisations and how they can be successfully managed. </span></p><span data-dcnode-id="1723" instrument_node="">
</span><p data-dcnode-id="1718"><span data-dcnode-id="1722" instrument_node=""> </span><a data-dcnode-id="1720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.willistowerswatson.com/en-GB/Insights/trending-topics/geopolitical-risk"><span data-dcnode-id="1721" instrument_node="">Willis Tower Watson</span></a><span data-dcnode-id="1719" instrument_node=""> a leading global insurance firm labelled geopolitics the number one risk corporate risk faced by multi-national companies. From war to climate change to failures of national governance, threats to organisations worldwide are diverse and always evolving.</span></p><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">After identifying the risks I provide ideas about how they can be managed and how to develop a resilient enterprise which can handle a rapidly changing world. Lastly I look at how best to spot geopolitical shifts and global trends and turn them to your advantage. </span></p><span data-dcnode-id="1714" instrument_node="">
</span><h2 data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">What is Geopolitical Risk?</span></h2><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1707"><a data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kroll.com/en/insights/publications/compliance-risk/companies-respond-geopolitical-risk"><span data-dcnode-id="1710" instrument_node="">Geopolitical Risk is messy</span></a><span data-dcnode-id="1708" instrument_node="">, hard to define and even more difficult to predict. The Covid-19 pandemic is a great example. Narrowly defined the virus poses a healthcare risk. However, differing government responses and lack of international cooperation and the economic, social and political fallout seen across the world is a geopolitical risk.</span></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Geopolitical risk is the probability of a political action negatively or positively affecting a company. Global Risks mostly overlap with geopolitical risks and include topics such the shadow economy, environmental risks and cyber risks.</span></p><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Geopolitical risks can be identified but acting on them can be much harder. Even more difficult is proactively managing risks and turning them into opportunities.</span></p><span data-dcnode-id="1700" instrument_node="">
</span><p data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Many companies view geopolitical risk as something that happens to them. Often it can feel that geopolitical risks are out of our hands, and we or the organisations we work for are a passive recipients of global events. </span></p><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">But companies can monitor, engage and even shape geopolitical risks and turn them to their advantage.&nbsp; But to do this they need to prepare, monitor and understand risks, but above all be ready to act when they arrive.</span></p><span data-dcnode-id="1694" instrument_node="">
</span><h2 data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">Conflict</span></h2><span data-dcnode-id="1691" instrument_node="">
</span><h2 data-dcnode-id="1688"><strong data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Interstate war or internal conflict</span></strong></h2><span data-dcnode-id="1687" instrument_node="">
</span><p data-dcnode-id="1682"><span data-dcnode-id="1686" instrument_node="">Since the dawn of civilisation, countries and empires have gone to war. It is no surprise to us that war and conflict cause misery, death and can make normal life very difficult. Serious widespread conflict or war may seem remote to most people in developed nations. But many parts of particularly the developing world continue to </span><a data-dcnode-id="1684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.crisisgroup.org/crisiswatch"><span data-dcnode-id="1685" instrument_node="">suffer from conflict</span></a><span data-dcnode-id="1683" instrument_node="">. </span></p><span data-dcnode-id="1681" instrument_node="">
</span><p data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">An arc of conflict cuts through through Africa, the Middle East and Asia. Any company considering investing in emerging economies in these regions have to weigh up the likelihood of conflict in their target country.</span></p><span data-dcnode-id="1678" instrument_node="">
</span><p data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Many wars rage on for years but are relatively underreported in the international press. For example, the Yemeni conflict which has drawn in Saudi Arabia the Gulf States as well as western states and Iran. Others like Syria remained more in the public eye, perhaps because of the migrant crisis that affected Europe. </span></p><span data-dcnode-id="1675" instrument_node="">
</span><h2 data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">Predicting War</span></h2><span data-dcnode-id="1672" instrument_node="">
</span><p data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">While it is difficult to predict wars and conflicts. It is possible to carefully monitor a country’s political climate, relations with its neighbours and crucially its history of violence. This analysis can at least can give an indication of the likelihood of future war and conflict.</span></p><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">War can break out over resources, nationalist sentiment as well as perceived ethnic or ideological differences. Many modern wars are at first glance civil wars. Syria, Sudan and Somalia are all recent examples. But civil conflicts always end up dragging in neighbouring states. Syria has drawn in Turkey, the USA, Russia and France and others into the country. It is always worth taking a regional view of how a conflict can spread. &nbsp;</span></p><span data-dcnode-id="1666" instrument_node="">
</span><p data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">When a war starts a firm’s assets come under threat. In some cases such as consultancy firm they can easily pull out of a country. Others focused on natural resources or infrastructure cannot easily pull out their mines, roads, tunnels and physical infrastructure. </span></p><span data-dcnode-id="1663" instrument_node="">
</span><p data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">How staff threatened by war are cared for by the firm is also crucial. Very often staff can be moved out of the country fairly easily before the conflict spreads. However locally hired staff may not want to move from their home, nor is it always possible due to immigration rules. </span></p><span data-dcnode-id="1660" instrument_node="">
</span><h2 data-dcnode-id="1656"><strong data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">Cyber</span></strong><span data-dcnode-id="1657" instrument_node=""> Conflict</span></h2><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1650"><span data-dcnode-id="1654" instrument_node="">Conventional wars across land, sea and air are familiar sights across the globe. But the last decade has seen the new theatre of cyber conflict emerge. Cyber conflict has had a low profile but the </span><a data-dcnode-id="1652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/project/geopolitics-cyberspace"><span data-dcnode-id="1653" instrument_node="">world is slowly waking</span></a><span data-dcnode-id="1651" instrument_node=""> up to the reality of cyberwarfare. </span></p><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1644"><span data-dcnode-id="1648" instrument_node="">The raging </span><a data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.economist.com/leaders/2020/01/25/huawei-is-a-cyber-security-risk"><span data-dcnode-id="1647" instrument_node="">global debates</span></a><span data-dcnode-id="1645" instrument_node=""> over allowing Chinese firm Huawei to develop critical infrastructure in many western states has brought cyber concerns to the top of the security agenda. </span></p><span data-dcnode-id="1643" instrument_node="">
</span><p data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">The cost of conventional war is high in terms of human life, but also diplomatic and economic fallout. </span></p><span data-dcnode-id="1640" instrument_node="">
</span><h3 data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">Cyberwar as an Alternative</span></h3><span data-dcnode-id="1637" instrument_node="">
</span><p data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Cyberwar offers a powerful alternative. By infiltrating government agencies or critical infrastructure through phishing attacks, systems and networks can be compromised. This can demoralise the enemy and cripple critical infrastructure such as power or water supplies. </span></p><span data-dcnode-id="1634" instrument_node="">
</span><p data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Cyber attacks can also be used to steal valuable information. The theft of the US Democratic party emails in 2016 helped changed the result of the US election.</span></p><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Best of all cyber attacks can be carried out in secret or through proxies. This gives governments valuable cover and plausible deniability. Attacks over the internet are far less obvious than an old fashioned invasion or bombing raid.</span></p><span data-dcnode-id="1628" instrument_node="">
</span><h3 data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Geopolitics and Cyberwar</span></h3><span data-dcnode-id="1625" instrument_node="">
</span><p data-dcnode-id="1620"><span data-dcnode-id="1624" instrument_node="">A shadow cyber war between Iran and Israel has been ongoing for many years involving </span><a data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foreignpolicy.com/2020/06/05/israel-and-iran-just-showed-us-the-future-of-cyberwar-with-their-unusual-attacks/"><span data-dcnode-id="1623" instrument_node="">disruption to water supplies</span></a><span data-dcnode-id="1621" instrument_node=""> and alleged attacks on nuclear facilities. </span></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Companies are vulnerable to cyberattacks by criminals but also governments if they hold important strategic assets or information. Defence and military contractors, national infrastructure (powerlines, ports, systemic banks, rail &amp; road), shipping and firms in the medical sectors are all potential targets. </span></p><span data-dcnode-id="1616" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1615" instrument_node="">Recently Australia has recently been the subject of a </span><a data-dcnode-id="1613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/us-australia-cyber/australia-sees-china-as-main-suspect-in-state-based-cyberattacks-sources-say-idUSKBN23P3T5"><span data-dcnode-id="1614" instrument_node="">wide number</span></a><span data-dcnode-id="1612" instrument_node=""> of cyber attacks which were blamed on China. Australian government agencies were hacked in a major attack which prompted a rare public warning by the head of the Australian Intelligence agency.</span></p><span data-dcnode-id="1610" instrument_node="">
</span><h3 data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">The Attack on Maersk </span></h3><span data-dcnode-id="1607" instrument_node="">
</span><p data-dcnode-id="1602"><span data-dcnode-id="1606" instrument_node="">The Danish Shipping firm Maersk was hit by a </span><a data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wired.com/story/notpetya-cyberattack-ukraine-russia-code-crashed-the-world/"><span data-dcnode-id="1605" instrument_node="">ransomware attack</span></a><span data-dcnode-id="1603" instrument_node=""> in 2017. Experts believe the attack originated from the North Korean government was in fact deployed by accident. The attack shut down all the Maersk IT systems. It took two week for IT systems to be restored and cost the company over 300 million Euros to fix and repair the damage.</span></p><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">This form of warfare is on the rise and companies as well as governments will be in the crosshairs. For some companies and organisations the threats will be obvious. Other companies should consider their vulnerability to cyber attacks with a geopolitical motive by thinking about:</span></p><span data-dcnode-id="1598" instrument_node="">
</span><div class="wp-container-1 wp-block-group" data-dcnode-id="1583"><div class="wp-block-group__inner-container" data-dcnode-id="1584"><span data-dcnode-id="1597" instrument_node="">
</span><ul data-dcnode-id="1594"><li data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Are they doing business in countries with a history of using cyber attacks to gain commercial &amp; political advantage such as China</span></li></ul><span data-dcnode-id="1593" instrument_node="">
</span><ul data-dcnode-id="1590"><li data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">Do they partner with sensitive government agencies or ministries that might make them a proxy target or hold valuable information.</span></li></ul><span data-dcnode-id="1589" instrument_node="">
</span><ul data-dcnode-id="1586"><li data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Are staff easily able to bypass company security and use personal accounts and devices to store information.</span></li></ul><span data-dcnode-id="1585" instrument_node="">
</span></div></div><span data-dcnode-id="1582" instrument_node="">
</span><h2 data-dcnode-id="1579"><strong data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Terrorism</span></strong></h2><span data-dcnode-id="1578" instrument_node="">
</span><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Militant groups continue to plot and carry out violent acts across the world impacting both security forces and civilians. Terrorism is widely feared in Western countries for good reason. But in fact it is developing countries such as Iraq and Afghanistan that suffer the most at the hands of such groups. </span></p><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">Widespread terrorism drives instability in countries, terrifying the people and driving away business. Business people are unwilling to travel to danger zones and require additional protection to operate where terrorism is a risk.</span></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Terror groups are closely linked to poor governance as they undermine legitimate governments through violence and in some cases morph in states of their own. The most notable example of this was the Islamic State in Iraq. Terror groups are also linked to crime as very often they engage in drug smuggling, money laundering or wildlife poaching as way to fund their activities.</span></p><span data-dcnode-id="1569" instrument_node="">
</span><h2 data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">The Shadow Economy</span></h2><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1561"><span data-dcnode-id="1565" instrument_node="">Financial crime, drug smuggling, people trafficking, and many </span><a data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//globalinitiative.net/"><span data-dcnode-id="1564" instrument_node="">other activities</span></a><span data-dcnode-id="1562" instrument_node=""> earn criminals billions a year globally. One estimate puts the shadow economy at US$870 billion in revenues. But these costs companies, governments and society untold damage. Many of these activities cross borders and can be considered global risks.</span></p><span data-dcnode-id="1560" instrument_node="">
</span><p data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Networks like Mexican drug cartels can undermine legitimate governments and provoke something close to a state of civil war in that country. In 2018, 33,341 murders were recorded in Mexico. Other networks make alliances with political networks which results in corruption, the undermining of institutions and markets. In some countries such as Afghanistan the distinction between government and criminal enterprise is almost non-existent.&nbsp;</span></p><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Criminals can infiltrate supply chains through illegally produced timber, illicitly mined minerals such as blood diamonds, even using slave labour to produce goods. This type of activity feeds corruption and crime but when otherwise legitimate companies are involved it can damage hard won credibility. </span></p><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1549"><span data-dcnode-id="1553" instrument_node="">Supply chains can be long and opaque with many companies unaware or turning a blind eye to potential criminality. Poor publicity around supply chains can lead to </span><a data-dcnode-id="1551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.raconteur.net/business-innovation/future-procurement-2019/ethical-procurement-business"><span data-dcnode-id="1552" instrument_node="">long lasting reputational damage</span></a><span data-dcnode-id="1550" instrument_node=""> to those involved. </span></p><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Money laundering is perhaps the biggest element of the shadow economy. In order to legitimatise illicit earnings, criminals need to clean their money. They do this by laundering their gains through legitimate businesses and banks. Some estimates put place illegal earning at 5 percent of the world economy.</span></p><span data-dcnode-id="1545" instrument_node="">
</span><h2 data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">New Political Actors</span></h2><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Individuals, NGOs, activist groups thanks to social media and modern campaign techniques can make major political waves. Groups such as Black Lives Matter or Extinction Rebellion have made headlines throughout the globe. These groups have been spurred on by widespread racism and the threat of climate change and their protests have inspired local copycat groups across the world.</span></p><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1534"><span data-dcnode-id="1538" instrument_node="">The </span><a data-dcnode-id="1536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.seaworldofhurt.com/features/blackfish-documentary-exposes-seaworld/"><span data-dcnode-id="1537" instrument_node="">Blackfish documentary</span></a><span data-dcnode-id="1535" instrument_node=""> exposed cruelty to Orcas at Seaworld Florida. The documentary caught the attention of the public and activists, quickly becoming a viral hit. Eventually it resulted in a major downturn in visitors at the iconic US park. The film cost just US$ 76,000 to make, but made a major dent in Seaworld’s profits with its stock price falling 60% the year it was released.</span></p><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">A small group or individual with the right cause and a savvy media presence can change perceptions and ruin the reputation of a company or institution (like US police forces) and inspire change in companies (witness the promotion of Black Life Matters messages across corporate social media in June 2020).</span></p><span data-dcnode-id="1530" instrument_node="">
</span><h2 data-dcnode-id="1527"><strong data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Environmental Risks</span></strong></h2><span data-dcnode-id="1526" instrument_node="">
</span><h2 data-dcnode-id="1523"><strong data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Climate Risk the impact of Climate change</span></strong></h2><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1521" instrument_node="">Human activity has raised the concentration of carbon dioxide to over 400 parts per million. It is no coincidence that nine of the ten hottest years on record have occurred since 2005. The world is heating fast and this brings </span><a data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rising-powers.com/the-dawning-reality-of-physical-climate-risks-in-the-emerging-world/"><span data-dcnode-id="1520" instrument_node="">extreme risk</span></a><span data-dcnode-id="1518" instrument_node="">.</span></p><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Given the rate that Co2 levels are continuing to rise the world is on track to experience a 2 C rise in the next few decades. The world faces drought, extreme weather, water shortages and sea level rise on scale never experienced before. The pace of change will leave traditional infrastructure unable to cope with rising seas and higher temperatures.</span></p><span data-dcnode-id="1513" instrument_node="">
</span><p data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Crop yields will decline and vast areas of farmland will dry out and become unusable. Extreme weather events will multiply in number causing businesses billions in damages and ever-increasing insurance costs. At the same time rising sea levels will push seaside dwellers inland putting many of the world’s major cities such as New York and Shanghai at risk.</span></p><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Climate change is a threat multiplier. Existing risks such as extreme weather, drought and heatwaves will increase in frequency and severity.  In the long term and given its global nature climate change represents the biggest threat to humankind. </span></p><span data-dcnode-id="1507" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Climate change will create unprecedented disruption to life in the next decades ahead which can only be partly offset by adaptation measures. All organisations should be considering the risks that climate change present. </span></p><span data-dcnode-id="1504" instrument_node="">
</span><h2 data-dcnode-id="1501"><strong data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Environmental Risks</span></strong></h2><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Agriculture and ultimately all human activity is dependent on a functioning natural world, insects to pollinate crops, clean water to drink, fertile soil to grow crops as well as countless other natural commodities.</span></p><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">Deforestation, conflict over resources and water and the degradation of the world’s oceans and rivers all pose a threat to our way of life. The world’s oceans are being plundered by fishing legal and illegal, threatened by pollution and acidification and oxygen depletion.</span></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Huge islands of rubbish have formed in the Pacific Ocean. The world’s forests, jungles and wilderness are also under assault by loggers and developers as humans expand farms and settlements. Deforestation threatens a key carbon sink and habitat to much of the world’s animal and plant life. </span></p><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Environmentalists have been warning the world about these risks for many years and now the threats are materialising.</span></p><span data-dcnode-id="1488" instrument_node="">
</span><h3 data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">The Blue Economy</span></h3><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1480"><span data-dcnode-id="1484" instrument_node="">The “</span><a data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldbank.org/en/news/infographic/2017/06/06/blue-economy"><span data-dcnode-id="1483" instrument_node="">blue economy</span></a><span data-dcnode-id="1481" instrument_node="">” (economic value of seas and oceans) has been valued at US$ 24 trillion but in reality is incalculable. Protecting oceans just like climate change depends on collective action among nations. </span></p><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">The open nature of the world’s oceans has meant they have been an easy target for exploitation by fishing fleets  </span></p><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Companies that are that damage the environment will see their reputation under threat from activists and eventually the public who increasingly shun goods they believe unethical. &nbsp;</span></p><span data-dcnode-id="1473" instrument_node="">
</span><h3 data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Biodiversity Loss</span></h3><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1463"><a data-dcnode-id="1468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fao.org/news/story/en/item/1180463/icode/"><span data-dcnode-id="1469" instrument_node="">Biodiversity loss is of increasing concern</span></a><span data-dcnode-id="1467" instrument_node=""> and not just among environmentalists. The 6</span><sup data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">th</span></sup><span data-dcnode-id="1464" instrument_node=""> mass extinction is accelerating and threats to wipe out not just large charismatic animals like tigers and whales but also insects, plant life and birds.</span></p><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Climate change, habitat loss, use of pesticides, hunting and poaching have led to spectacular declines in wildlife. Mass die outs of animals can set off catastrophic cascades where entire ecosystems are destroyed. This loss also threatens humans as many indigenous people rely on natural habitats as homes. But those living in the rest of the world will eventually pay for destroying nature.</span></p><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Farming and is ultimately dependent on healthy ecosystems, clean water and pollinating insects. Depleting farm yields, loss of pollinating insects and loss of natural carbon sinks like forests along with climate change will accelerate a food crisis where previously strong agricultural yields disappear.</span></p><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">A world of declining food yields will create political and economic crisis as more people are pushed into food insecurity and famine. China for example has destroyed much fertile land thanks to pollution and using it for housing and industry. But thanks to its relative wealth is able to import more food to make up the shortfall. </span></p><span data-dcnode-id="1453" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">However in the future countries may find it harder to spend their way of food shortages if there are widespread global crop failures and rapidly increasing prices. </span></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1449" instrument_node="">Many will wonder if biodiversity loss will really impact on businesses or whether they will care. But there are moves underway to create a </span><a data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.climatechangenews.com/2020/01/31/un-relocates-biodiversity-talks-italy-china-coronavirus-emergency/"><span data-dcnode-id="1448" instrument_node="">global framework</span></a><span data-dcnode-id="1446" instrument_node=""> for protecting biodiversity in the same way there has been for global emissions and climate risk. </span></p><span data-dcnode-id="1444" instrument_node="">
</span><h2 data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Resource Conflict</span></h2><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1440" instrument_node="">Wars may be driven by </span><a data-dcnode-id="1438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//merlinlinehan.com/2020/07/01/the-fight-for-blue-gold-water-and-geopolitical-risk/"><span data-dcnode-id="1439" instrument_node="">water conflicts</span></a><span data-dcnode-id="1437" instrument_node=""> such as the Ethiopia – Egypt dispute. The Grand Renaissance Dam in Ethiopia threatens to cut the water flow of the river Nile which would devastate Egyptian agriculture, industry and society.  </span></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">No country is more dependent on a river than the Egypt is on the Nile. Hopefully the dispute can be settled peacefully, but given what is at stake war could become a reality.</span></p><span data-dcnode-id="1432" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1424"><p data-dcnode-id="1427"><span data-dcnode-id="1431" instrument_node="">“</span><em data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Egypt is the Nile, and the Nile is Egypt</span></em><span data-dcnode-id="1428" instrument_node="">”</span></p><cite data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Herodotus</span></cite></blockquote><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1420"><strong data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Oil and gas deposits, diamond and other minerals can also attract war and violence. Conflicts driven by resources include:</span></strong></p><span data-dcnode-id="1419" instrument_node="">
</span><div class="wp-container-2 wp-block-group" data-dcnode-id="1404"><div class="wp-block-group__inner-container" data-dcnode-id="1405"><span data-dcnode-id="1418" instrument_node="">
</span><ul data-dcnode-id="1407"><li data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Conflict in the Democratic Republic of Congo driven by coltan and other minerals.</span></li><li data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">The Gulf Wars in Iraq were driven in part by the desire to control or stabilize a region valued for its oil deposits and strategic significance.</span></li><li data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Rakine Province in Myanmar: armed militias, warlords and individuals battle for control of the jade rich, but lawless province of the South East Asian country.</span></li><li data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Baloch Separatists in Pakistan who claim the central government and now China are benefiting from the region’s resources rather than the locals.</span></li><li data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">The Libyan civil war which pits various factions (backed by outside powers such as Turkey and Egypt) the prize being an oil rich country bordering Europe.</span></li></ul><span data-dcnode-id="1406" instrument_node="">
</span></div></div><span data-dcnode-id="1403" instrument_node="">
</span><h2 data-dcnode-id="1400"><strong data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Governance Risks</span></strong></h2><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">In 1914, little over 100 years ago the world was dominated by multi-ethnic European centred empires. The United Kingdom, France, Germany, Austria-Hungary and Russia ruled massive regional and global empires. The decades before 1914 had seen many colonial wars but overall relative geopolitical stability.</span></p><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">This was all punctured by the calamitous events of August of 1914 where events in Europe spun out of control into a global war. Although the causes of the war have been explained in retrospect by historians, at the time it was a major shock. </span></p><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1388"><span data-dcnode-id="1392" instrument_node="">Now after many years of US dominance there is a feeling the world is moving into a new unpredictable phase – what author Ian Bremmer called </span><a data-dcnode-id="1390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gzeromedia.com/"><span data-dcnode-id="1391" instrument_node="">G-Zero</span></a><span data-dcnode-id="1389" instrument_node="">. A geopolitical landscape where every country are working towards their own interests rather than trying to work together. As a result global public goods (such as security, global warming mitigation &amp; knowledge production) become harder to provide. </span></p><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">A number of trends are pushing global trade wars and economic dislocation:</span></p><span data-dcnode-id="1384" instrument_node="">
</span><div class="wp-container-3 wp-block-group" data-dcnode-id="1371"><div class="wp-block-group__inner-container" data-dcnode-id="1372"><span data-dcnode-id="1383" instrument_node="">
</span><ul data-dcnode-id="1374"><li data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Surging global migration</span></li><li data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Fraying international alliances</span></li><li data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Growing competition between state  </span></li><li data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">The rise of nationalism and populist governments</span></li></ul><span data-dcnode-id="1373" instrument_node="">
</span></div></div><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1365"><span data-dcnode-id="1369" instrument_node="">Trends such as the decline of fossil fuels and the rise of renewable technology could shape geopolitics in new unexpected ways. Could states like Saudi Arabia decline along with oil. But new </span><a data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//merlinlinehan.com/2020/06/10/the-geopolitics-of-renewable-energy/"><span data-dcnode-id="1368" instrument_node="">resource powers</span></a><span data-dcnode-id="1366" instrument_node=""> based on lithium (a key ingredient in electric car batteries) such as Bolivia rise? </span></p><span data-dcnode-id="1364" instrument_node="">
</span><h2 data-dcnode-id="1361"><strong data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">Failure of National Governance</span></strong></h2><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Government regulation, interference, and expropriation pose a major threat to companies, usually in developing countries. While many governments taking a long term view and are keen to provide a stable investment framework. </span></p><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Others seek to extract value from unwary investors. This can come in the form of nationalisation or favourable treatment to local or well-connected firms. Some governments prefer to heavily tax firms which can make their operations unviable. </span></p><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Uncertainty in legislation or tax regimes leads to friction between companies and governments. The rise of global nationalism and trade barriers threaten to make governments even more hostile to foreign companies. Outsiders, particularly those involved in the extraction of natural resources are often considered an easy target. </span></p><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">For investors understanding the target country and its government and political reality is key. Without this overseas expansions easily fall apart. Western tech giants Google, Facebook and Twitter have all been blocked in China because their business model clashes with the Chinese government’s plans to develop its own tech champions. Tech companies have a great deal of influence over the flow of information, something the Chinese government is keen to control for itself.</span></p><span data-dcnode-id="1348" instrument_node="">
</span><h2 data-dcnode-id="1345"><strong data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Global Migration</span></strong></h2><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">The movement of people is often linked to economic dislocation, climate and environmental issues. Mass migration of people within or across borders can lead to geopolitical risks as governments squabble over the impacts of migration. Global migration is predicted to rise as the impact of climate change increases.</span></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Migration from Syria to Europe was triggered by the long lasting conflict afflicting the country. The prospect of further conflict in Africa and the Middle East, along with widespread youth unemployment and climate change raise the prospect that millions of potential migrants will try and enter Europe. </span></p><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">The political response in Europe to Syrian refugees was largely negative with many European  leaders making political capital out of demonising migration. In other words gaining popularity by promising to keep out immigrants.</span></p><span data-dcnode-id="1335" instrument_node="">
</span><h3 data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Religious and Ethnic Persecution</span></h3><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Other migrants like the Royingha people of Myanmar many of which have been forced out of their homes into Bangladesh are subject to ethnic and/or religious persecution.</span></p><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Global migration may be slow thanks to the Covid-19 pandemic, countries closing borders and implementing stricter immigration regimes. In the longer term this will not deter migrants trying to move nor the anti-immigration sentiment pushing governments to reduce immigration. </span></p><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Migration is primarily an opportunity for companies. They can pick staff from different countries, widening their talent pool. Migrants often fill jobs which locals cannot or will not do. This can be highly skilled tech work or more routine agricultural work. </span></p><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">The risk around migration is that is sometimes leads to a political backlash which nationalist politicians can take advantage of to take or keep power. In turn extremist politicians create their own uncertainty which can be damaging for the business sector. </span></p><span data-dcnode-id="1320" instrument_node="">
</span><h2 data-dcnode-id="1317"><strong data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Technological Competition</span></strong></h2><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">The world’s powers and corporations are in a technological arms race to develop the most advanced artificial intelligence, big data applications, the internet of things and cyber capabilities. The advantages in terms of commerce, espionage and military applications are huge. </span></p><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Countries have always used new technology to gain advantages over their competitors, from using gunpowder weapons in medieval battles, to the 20th Century space race. Now the technologies are different but the competition between states just as real. These areas in tech are the battlegrounds of the present and future. </span></p><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Weaponization of social media, states use social media to promote propaganda, spread misinformation with the aim of shifting opinion or even winning elections.</span></p><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1306" instrument_node="">Cyber attacks can be used to harvest data (such as the </span><a data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//techcrunch.com/2020/03/31/marriott-hotels-breached-again/%3Fguccounter%3D1%26guce_referrer%3DaHR0cHM6Ly93d3cuZ29vZ2xlLmNvbS8%26guce_referrer_sig%3DAQAAAAqKyRZ2Fsq0u_zObfQ7oLKeGzax2WrbURdjewgFsz_Kjz-JYsNSQjlmoXg6hzMKb-Jhg7pLWmz2E7VHP6uv4gWWT60qvYqQkZ8Kw8hyW3GUYQm0dtIWB7jA9LXGZlxRyPQE5L05hEFFmLmd6sShdXWEwS8cSVmdaqE1H27Z_2zM"><span data-dcnode-id="1305" instrument_node="">Marriott Hotel data breach</span></a><span data-dcnode-id="1303" instrument_node="">) such as the movements of diplomats, military and politicians. Nation states that retain the best techniques for cyber warfare gain a major advantage over rivals. </span></p><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1300" instrument_node="">Artificial Intelligence has become a hot topic, although its yet to realise its potential, becoming a leader in this area will create new opportunities in military and commercial applications. Vladimir Putin </span><a data-dcnode-id="1298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theverge.com/2017/9/4/16251226/russia-ai-putin-rule-the-world"><span data-dcnode-id="1299" instrument_node="">said in 2017</span></a><span data-dcnode-id="1297" instrument_node=""> the nation that leads in AI ‘will be the ruler of the world”</span></p><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">First mover advantage in technology gives country’s a competitive advantage. The race to build Silicon Valleys full of tech firms has increased as the new products and services created are seen as vital to a modern economy. </span></p><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">The success of major tech firms and their control over the flow of information has gained them enemies. Tech firms monopoly power, dubious data practices and willingness to overlook widespread misinformation on their sites could lead to many protracted legal and political battles. </span></p><span data-dcnode-id="1289" instrument_node="">
</span><h2 data-dcnode-id="1286"><strong data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Global Diplomatic Architecture</span></strong></h2><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">The alliances, institutions and governance that have dominated the world in the last 80 years are now under strain. NATO, WHO, IMF have all been heavily criticised by members and outsiders alike in recent years. The roles and usefulness of these institutions have been questioned.</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Many have questioned NATO’s role given it was an alliance designed to counter the threat of Communism in Eastern Europe. A threat which is long gone. Meanwhile the rise of China and its financial firepower means it can form its own financial architecture.</span></p><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">New Chinese influenced, some say dominated institutions like the Asian Infrastructure Investment Bank (AIIB) have been set up to emulate or rival traditional relations. At the same time poor relations between the US and European countries have undermined NATO. </span></p><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1275" instrument_node="">Multipolarity – the growing divisions between the world’s powers and the growing strength of rising powers is a major risk. Foremost of these rising powers is China and its flagship foreign policy project the </span><a data-dcnode-id="1273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rising-powers.com/chinas-belt-and-road-strategy-reality-vs-ambition/"><span data-dcnode-id="1274" instrument_node="">Belt and Road Initiative</span></a><span data-dcnode-id="1272" instrument_node="">. The Belt and Road initiative is a label given to China’s outbound investment and trade. It has become a highly visible form of commercial diplomacy with countries queuing up to be a Belt and Road partner. </span></p><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">These shifts in alliance and power projection create uncertainty and change which create risks – such as a trade war between China and the US. It can also be an opportunity – for example Pakistan has seen an influx of Chinese money which has helped boost its economy. Although some say that has come at the price of increased dependence on China. </span></p><span data-dcnode-id="1267" instrument_node="">
</span><h3 data-dcnode-id="1264"><strong data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Nationalism, Populism and Social Cohesion</span></strong></h3><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Fraying social Cohesion driven by narrow political groups, unpopularity with political elites, hate and misinformation spread by social and traditional media along with inequality, unemployment and generational divides has all made the world a more angry, dangerous and harder to govern. </span></p><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Nationalism and populism are on the rise across the world. The US, India, Hungary, Brazil and the Philippines have all seen the nationalistic leaders rise to power. Populist leaders have tapped into the unpopularity of perceived elites and fear of unemployment, economic uncertainity and migration.</span></p><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">This trend has made it easier for authoritarian states like Russia and China to operate feeling less need to pay lip service to liberal values. The spectre of another recession may make accelerate this trend. </span></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Nationalist leaders also have a tendency towards corruption, nepotism and incompetency – which eventually catches up with them. Nationalist states are also more prone to conflict with its own citizens and other countries. All this helps add to the current feeling of uncertainty, change and pessimism in global politics.</span></p><span data-dcnode-id="1251" instrument_node="">
</span><h3 data-dcnode-id="1248"><strong data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Trade Wars and Economic Nationalism</span></strong></h3><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Many observers see globalisation going in reverse which will disrupt supply chains, create currency disputes and made foreign investment more difficult. The so called weaponization of finance has seen embargos, sanctions and tariffs used in place of warfare. </span></p><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">The most significant examples have been the sanctions on Iran imposed by the USA and others which have put severe pressure on the Iranian economy and made it hard for banks to do business with Iran or face fines enforced by US authorities. </span></p><span data-dcnode-id="1241" instrument_node="">
</span><p data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Russia faced similar sanctions following its annexation of Crimea. These sanctions driven by the EU did not have the same impact. Russian gas and oil remain indispensable to Europe. Russia’s economy managed to escape the worst predictions of doom, but undoubtedly suffered. Sanctions are likely to remain a policy of choice for mainly western countries who can punish countries they deemed to have. </span></p><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Russia and others have criticised sanctions viewing them as hypocritical – pointing out the the US and UK faced none for their invasion of Iraq. </span></p><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1230"><span data-dcnode-id="1234" instrument_node="">However for a company facing sanctions it is a serious matter, major fines, loss of revenue and markets are a reality for the likes of Societe Generale. The French Bank </span><a data-dcnode-id="1232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/us-usa-fed-socgen/societe-generale-to-pay-1-4-billion-to-settle-cases-in-the-u-s-idUSKCN1NO26B%3FfeedType%3DRSS"><span data-dcnode-id="1233" instrument_node="">were hit</span></a><span data-dcnode-id="1231" instrument_node=""> by US imposed fines (worth US$1.3 billion for dealing with Iranian and Cuban companies. </span></p><span data-dcnode-id="1229" instrument_node="">
</span><h3 data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Supply Chain Risk</span></h3><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Supply chain risk has rapidly increased in recent years. A world economy reliant on international trade routes is one vulnerable to disruption by trade disputes, natural disasters, or reputational issues around the source of manufactured goods or minerals. </span></p><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Covid-19 has compounded these fears. Many companies are reconsidering supply chains fearful of being left short by factories in China closing or at the mercy of US-China trade wars. Some firms are looking to countries like Vietnam to provide goods, while others may decide to bring manufacturing closer to home</span></p><span data-dcnode-id="1220" instrument_node="">
</span><h3 data-dcnode-id="1217"><strong data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Covid-19 and the Great Reset</span></strong></h3><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1211"><span data-dcnode-id="1215" instrument_node="">Covid-19 is a global health crisis, but the economic and social changes that are still emerging and could </span><a data-dcnode-id="1213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prmia.org/Public/News/2020-News/Intelligent_Risk_Highlight_-_July_Edition_-_5.aspx"><span data-dcnode-id="1214" instrument_node="">create long term risks</span></a><span data-dcnode-id="1212" instrument_node="">. While much good can come of a reset, the risks are also apparent. </span></p><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Economic dislocation and depression, unemployment, rising government debt and in some parts of the world widespread disaffection and anger towards government. To add to that overstrained healthcare systems, disrupted supply chains, corporate and government debt levels and there is a great cause for concern.</span></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">For multinationals the geopolitical risks can be clear, but even SMEs and small firms the second order effects can be devastating. For examples see the Covid pandemic or the effect of US-China trade wars on the economies of agricultural states in the US.</span></p><span data-dcnode-id="1204" instrument_node="">
</span><h2 data-dcnode-id="1200"><strong data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">How Can My Firm Manage Geopolitical Risk?</span></strong><a data-dcnode-id="1201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//merlinlinehan.com/2020/09/19/how-to-manage-geopolitical-risk"></a></h2><span data-dcnode-id="1199" instrument_node="">
</span><h3 data-dcnode-id="1196"><strong data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Consider the big picture: Scan, Focus and Act</span></strong></h3><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1192"><strong data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">The first step is understanding the geopolitical risk landscape, and how it applies to your firm.</span></strong></p><span data-dcnode-id="1191" instrument_node="">
</span><div class="wp-container-4 wp-block-group" data-dcnode-id="1168"><div class="wp-block-group__inner-container" data-dcnode-id="1169"><span data-dcnode-id="1190" instrument_node="">
</span><ul data-dcnode-id="1171"><li data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Scanning the environment to monitor, identify and assess geopolitical risk.</span></li><li data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">What appetite does for Geopolitical Risk does my firm have, are we willing to take big risks if there is an upside.</span></li><li data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">What are the firm’s most valuable assets and which are exposed to risk</span></li><li data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Some firms may prefer to use a outside expertise, but using existing internal knowledge is also invaluable.</span></li><li data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Remove institutional blindspots – this is where outside expertise can help.</span></li><li data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Next is to map the company’s profile to the geopolitical risks. This allows focus – which risks are likely to be most important.</span></li><li data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Does the firm have the capability to manage geopolitical risk.</span></li><li data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">How can it become proactive – managing political stakeholders for example? </span></li><li data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Does the firm have the right skills/staff to deal with the risk. Can staff be trained or is it preferable to hire outside expertise.</span></li></ul><span data-dcnode-id="1170" instrument_node="">
</span></div></div><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1160"><strong data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Once Geopolitical Risks have been framed what specific actions can a firm take</span></strong><span data-dcnode-id="1164" instrument_node=""> </span><strong data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">to develop resilience</span></strong><span data-dcnode-id="1161" instrument_node="">:</span></p><span data-dcnode-id="1159" instrument_node="">
</span><h3 data-dcnode-id="1156"><strong data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Political Analysis of your firm’s footprint</span></strong></h3><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1151"><strong data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">By analysing and monitoring the countries and regions your</span></strong><span data-dcnode-id="1152" instrument_node=""> firm operate in. Emerging economies which are characterised by unstable politics and seesaw like economic conditions. Analysing, monitoring the country is an obvious action. But more difficult is linking change too how it might affect your firm. If your firm is in a sensitive industry it will be more exposed to political interference.</span></p><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">For example if a new government hostile to foreign companies comes into power in a country you are doing business this should be considered when making investments. Analysis can be done from afar, remotely, but the best information often comes from the ground. Staff and contacts in the country can often give you the best intelligence. This local knowledge combined with a macro view should provide a comprehensive analysis of the target country.</span></p><span data-dcnode-id="1147" instrument_node="">
</span><h2 data-dcnode-id="1144"><strong data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Creating a Resilient Firm</span></strong></h2><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Central to developing a resilient firm is identifying critical functions and activities and how they could be recovered or protected during a crisis. Engaging a business continuity or resilience expert is usually a must, especially for a larger firm. Creating and exercising (see below) crisis plans through simulations or exercises will test their effectiveness. Exercises also help ensure effective communication channels between employees.</span></p><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Many firms have seen their resilience tested by recent events such as the Covid pandemic. Many companies will not recover from the crisis, most will survive if weakened, a minority will come out stronger. Partly due to luck or government bailouts. </span></p><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">A select few will come back strong thanks to their resilience ability to adapt to new circumstances. Unsurprisingly tech firms have profited from the crisis as people have flocked to social media and ordered more online goods from the likes of Amazon.</span></p><span data-dcnode-id="1134" instrument_node="">
</span><h3 data-dcnode-id="1131"><strong data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Disaster Recovery</span></strong></h3><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Accept that you cannot foresee every risk, but a resilient firm should be able to recover from a major traumatic incidents be it a fire, flood or IT failure. Some of these risks are purely operational in nature (faulty wires leading to a fire). Others disaster such as bombs, wars and some cyber-attacks have a geopolitical element. </span></p><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1126" instrument_node="">Developing a comprehensive disaster recovery plan that will allow for the firm to continue following a disaster is critical. </span><strong data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">The major features of a disaster recovery plan would be:</span></strong></p><span data-dcnode-id="1122" instrument_node="">
</span><ol data-dcnode-id="1113"><li data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Establishing an IT plan disaster recovery plan (such as data centre separate from the firm’s HQ or main centre). </span></li><li data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Creating disaster recovery plans the entire organisation detailing actions and procedures following an incident. Crucially these plans need to be tested using an exercise (see below).  </span></li><li data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">Developing an alternative communication system if there is a widespread IT failure and normal communication routes are not available. </span></li><li data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Developing a business impact analysis (BIA). A business impact analysis is a major piece of work which identified each critical activity an organisation undertakes and how important it is following a major incident. A well executed BIA can help an organisation effectively recover from a disaster. </span></li></ol><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">For example a shoe manufacturer may plan that following a major incident shutting down part of its manufacturing that continuing to make its biggest selling shoes is critical. But niche shoes and those lines which are soon to be discontinued could be delayed until fully capacity can be restored.</span></p><span data-dcnode-id="1109" instrument_node="">
</span><h3 data-dcnode-id="1105"><strong data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Red teaming – Table Top Exercises – War Gaming – Simulation</span></strong><span data-dcnode-id="1106" instrument_node="">s</span></h3><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">There are many different variants, but a simulation or exercise should confront participants in a realistic scenario. These exercises should usually be based on the disaster recovery plans created. Although exercises can be based on any scenario, not just disasters. </span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">The exercise will also bring together teams, cutting across silos in the organisation. Scenarios can be remote, desktop or a live action. They can be run in real time or can look at events occurring over days, weeks or event years. Acting out a scenario will help uncover your strengths and more importantly your weaknesses.</span></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Only direct confrontation with a political, security situation  or &nbsp;and putting executives on the spot will any real knowledge be made. Exercises should generally be run by an outsider to the firm, who will be best placed to challenge the Executives and avoid group think</span></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">A crisis response team should be populated by executives. Other staff will provide specific expertise it is unrealistic that the C-Suite would not take charge in a major crisis. However, the CEO of the organisation should not be directly involved in crisis management. As a prolonged crisis will divert their attention from running the business.</span></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">A variant on the above is scenario planning which can be done via tabletop. But scenarios can be expanded and transformed into more detailed work which focuses on the response to a realistic scenario. So a firms operating in a conflict zone would develop and workshop plans covering response to attacks on assets, kidnappings, shifts in governments and thousands of other possibilities. &nbsp;</span></p><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">The result of these exercises should be to develop a crisis response team or teams that are well prepared, have strong communication lines, understand their roles clearly and are prepared to act decisively in a crisis. </span></p><span data-dcnode-id="1086" instrument_node="">
</span><h3 data-dcnode-id="1083"><strong data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Horizon Scanning</span></strong></h3><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Horizon scanning is looking at longer term threats to an organisation. Scanning does not attempt to predict the future. Instead horizon scanning considers potential threats and risks and attempts to develop risk scenarios of events that might affect the firm. The power of horizon scanning is making people aware of future possibilities, challenge assumptions and change mind-sets.</span></p><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">There is no set rules or framework for horizon scanning. The key is to focus on the issues that will affect your firm. Market dynamics in your sector, government action or regulation. Information gathering can be done on desktop, but talking to relevant contacts and monitoring social media is also useful. </span></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">The idea is to identify trends and issues which may present challenges or opportunities to the organisation. Not everything identified in horizon scanning will be relevant but an organisation can spot trends early and adapt accordingly. </span></p><span data-dcnode-id="1073" instrument_node="">
</span><h3 data-dcnode-id="1070"><strong data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Adopting Climate Risk Analysis</span></strong></h3><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1065"><a data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rising-powers.com/the-dawning-reality-of-physical-climate-risks-in-the-emerging-world/"><span data-dcnode-id="1068" instrument_node="">Climate Risk</span></a><span data-dcnode-id="1066" instrument_node=""> is a new addition to geopolitical risk. This new field looks to analyse the physical risks faced by companies and countries posed by climate risks such as sea level rise, extreme weather and heat waves. Climate risks also include what is called transition risk.</span></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Transition risk is the changes in government policy faced by firms as a result of climate change. This could include governments closing down coal plants to reduce greenhouse gas emissions. &nbsp;</span></p><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1060" instrument_node="">Companies across the world are rushing to adopt the Task Force for Climate  Related Financial Disclosures (TCFD) which </span><a data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rising-powers.com/putting-a-price-on-climate-risk/"><span data-dcnode-id="1059" instrument_node="">will identify</span></a><span data-dcnode-id="1057" instrument_node=""> which projects face the highest climate risks. </span></p><span data-dcnode-id="1055" instrument_node="">
</span><h2 data-dcnode-id="1052"><strong data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Opportunities from Geopolitical Flux</span></strong></h2><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1048"><strong data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Acting on Geopolitical Risks and turning them into opportunities</span></strong></p><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">While predictions about Geopolitics are a dangerous proposition, the world appears to be heading towards a more unstable chaotic period thanks to divisions between the main powers and the growing effects of Climate change.</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Geopolitical Risk is not all bad news. Shrewd observers can take advantage of geopolitical trends by investing in industries and countries that stand to benefit.</span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1040" instrument_node="">Geopolitical analyst Milena Rodban coined the term </span><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milenarodban.com/philosophy"><span data-dcnode-id="1039" instrument_node="">Geopolitical Flux</span></a><span data-dcnode-id="1037" instrument_node=""> which to me is more apt description. Another way to benefit from geopolitical change is antifragility: Nassim Nicholas Taleb developed this concept in the book </span><a data-dcnode-id="1035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.co.uk/Antifragile-Things-that-Gain-Disorder/dp/0141038225"><span data-dcnode-id="1036" instrument_node="">Antifragile</span></a><span data-dcnode-id="1034" instrument_node="">. </span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">The thrust of the book is that a truly resilient organisation benefits from change, chaos and flux, even thriving from disorder. An antifragile company can thrive in difficult times while competitors fall away, unable to cope with a new world.</span></p><span data-dcnode-id="1029" instrument_node="">
</span><h3 data-dcnode-id="1026"><strong data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Post Conflict Zones</span></strong></h3><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1020"><span data-dcnode-id="1024" instrument_node="">Post conflict countries or fragile states </span><a data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rising-powers.com/why-invest-in-post-conflict-countries/"><span data-dcnode-id="1023" instrument_node="">represent an opportunity.</span></a><span data-dcnode-id="1021" instrument_node=""> As a war ends and peace returns, a country or region can present new opportunities. Many companies will be fearful, but very often assets are relatively cheap and there is little or no competition. The catch of course is that many conflict die down only to be rekindled a few years later.</span></p><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">The end of the Iraq war attracted many western firms particularly in the oil sector. But the resurgence of violence and the rise of the Islamic state soon made the country a war zone again. </span></p><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">However, Angola ended its long running civil war in the 1990s but the country maintained a no go zone for many companies. Chinese oil firms took a chance and built relations with the political and business elite of the country and Angola soon became a major oil exporter to China.</span></p><span data-dcnode-id="1013" instrument_node="">
</span><h3 data-dcnode-id="1010"><strong data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Boat Spotting: Watching out for new emerging opportunities and risks</span></strong></h3><span data-dcnode-id="1009" instrument_node="">
