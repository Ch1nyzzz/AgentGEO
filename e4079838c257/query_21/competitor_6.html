and influence them through their distinct gifts, abilities, skills and
knowledge. A leader focuses on the follower and puts out a roadmap to
the overall mission and vision; hereby the follower is influenced to
willingly and enthusiastically in achieving the mission and vision. The
leader achieves this influence by humbly delivering a visionary
perception of the future in clear terms that resonates with the follower
in terms of their believes and values. Leaders have several key skills
and attributes, which are highly important such as critical decision
making, critical thinking, holistic insight, intuition and the use of
persuasive communication as well as interpersonal commination that
include active listening and positive charismatic conversations.

1.6.4 Readiness of the Followers or Group (Hersey and
Blanchard)
Another leadership theory such as situational leadership model
developed by professor Paul Hersey and Ken Blanchard, focuses on how
leaders can attempt influencing the ‘readiness’ of a group or individual
in effective way towards achieving a task and reaching organizational
goals in a given situation.

Moreover, the model assesses through three different variables the
guidance and direction the leader wants to lead his followers are; Task
behavior, Relationship behavior and Readiness.

Task behavior is usually done in a one-way communication by the
leader who gives direction and explains to his follower what the
follower is expected to do, when, where and how the tasks are required
to be accomplished.
Relationship behavior. Once the directions of the tasks are clear, the
leader continues to establish a relationship behavior by engaging with
his followers in a two-way communication. In this way, the leader
communicates by listening, supporting and encouraging to the
followers.
Readiness. After combining both the Task and Relationship stages in a
successful way, the ‘readiness’’ stage is established. When the
‘follower’ has reached this level, he is able in doing the task, possesses
the right knowledge and skills, is willing and confident in following and
performing the specific task.

1.7 Transformational Leadership (Transactional /
transformational)
Macgregor Burns, a leadership expert and presidential biographer, was
the first who introduced the concept of transformational leadership and
the difference between the ‘’transactional’ and ‘transformational’ form
of leadership.

Transformational Leadership
Burns explains that a transformational leader is someone who
“recognizes and exploits an existing need or demand of a potential
follower… (And) looks for potential motives in followers, seeks to
satisfy higher needs, and engages the full person of the follower” (1) . In
other words transformational leadership is a process used by leaders
who communicate a clear vision, ideas and a common goal and
encourage and by transforming through motivation an increasing and
higher sense of morality
and commitment. This form of leadership style involves and inspires
positives changes of its followers who are change orientated as well.

Researcher Bernard Bass expanded and further developed Burns ideas
on transformational leadership, and identified the concept of this
particular style into the following four basic behavior components:
      Idealized Influence: the leader functions as a role model for his
   followers; the people trust, admires and respects the leader.
   Moreover, the followers identifies the leader as someone who is very
   capable, intelligent, shows and possesses both determination and
   persistence as well as reliable holding high morals and ethical
   standards.



                                                                                  19
f   Inspirational Motivation: The leader is able to create a sense of
    shared vision and commitment amongst his followers to accomplish
    their goals together. Inspirational leaders look beyond self-interest
    and possess the ability to inspire and motivate their followers who
    feel they are a part of the team and are enthusiastic to work as a
    group. Through a two-way communication the leader is able to
    motivate his followers.

      Individualized Consideration: The Leader accepts that
    everyone is different and is genuinely concerned about the needs
    and feelings of followers and demonstrates this through personal
    attention given to each follower. Moreover, the leader should
    provide a supportive environment to his followers where the needs
    for achievement and growth are taken care of.
       Intellectual Stimulation: the leader encourages and challenges
    followers to be creative and come with innovative solutions.
    Criticizing publically does not take place and should be avoided at
    all costs.
Transactional leadership
In contrary to the transformational leader, Burns describes the
transactional form of leadership, as a leader who´ approaches followers
with an eye to exchanging one thing for another´, in other words a
transactional leadership is a form of leadership where the leader makes
clear what he requires of his followers (subordinates).
The task is essential to be carried out based on an exchange or in
return of a reward or punishment they will receive from the leader for
following or not following his orders, however, punishment is not always
mentioned but the followers know it is there. According to Bass,
Transactional leaders ‘ pursues a cost benefit, economic exchange to
meet subordinates current material and psychic needs in return for
“contracted” services rendered by the subordinate’ (2), this style of
leadership can be seen in organizations for example where an
employee either in return of their effort and compliance on a task is
being paid or be punished (i.e. getting fired from the job) in case they
do not meet the standard of the required work.

The exchange could be anything and is not necessarily expressed in
material or money. As there is more exchange taking place between a
leader and his follower takes place, the relationship becomes stronger.
This transaction, however, can be both positive and negative. The
positive side is that ambitious employees can earn rewards such as
bonuses or promotion based on their outstanding performances, while

staff if they do not meet the expected standard.

20.12 Theory X and Theory Y management

Douglas McGregor, a Harvard academic, came up with a theory in his
book “The Human Side of Enterprise”, originally published in 1960
where he divided management styles into the so-called Theory X and
Theory Y.

Theory X is described best as the classic command-and-control type of
management, an authoritarian style in what McGregor states: “Reflects
an underlying belief that management must counteract an inherent
human tendency to avoid work.” In other words, people in general are
lazy and do not want to carry responsibility. Therefore, in this situation,
people need firm supervision, specific tasks and duties and need to be
coerced into achieving organizational goals. This style requires a very
autocratic approach that in the end will lead to mistrust and/or
resentment from the workforce.

Theory Y stands for the natural contrast of theory X. According to
McGregor Theory Y “assumes that people will exercise self-direction
and self-control in the achievement of organizational objectives to the
degree that they are committed to those objectives” (McGraw-Hill,
1960). This indicates stimulating as opposed to controlling. This
                                                                       36
fsuggests a more relaxed approach as to supervision and shifts the
focus to intrinsically motivating the workforce, which eventually leads
to active participation and motivation in aligning of self in the
achievement of organizational objectives.
So far it can be concluded from this model that Theory X is built on the
autocratic principle of formulating ways to enforce work-shy labor ;
Theory Y looks at how to actively involve and self-motivate.
When applying this theory to Vladimir Putin, his style of preference
seems to be Theory X. But this is not without reason. Apart from the
negative connotation we have from Theory X there seems to be
historical evidence, why Putin might have chosen this to be the most
effective style for this specific case. In the “Russian Civil Society”
(Evans, Henry, McIntosh Sandstorm 2014) it seems to shed some light
as to his motivations:
 “Vladimir Putin's outlook on the relationship between state and

 he instinctively frames the answer in terms of relationships of

 stands over society.”
The above captures one of many reasons just as to why Putin might

unprofessional behavior, but for showing disloyalty to the "family."

Putin is well aware that he cannot achieve the state of constant control
alone. In order to get things done he must be able to motivate his
workforce he seemingly does this, in case of utmost loyalty, by giving
them the feeling of inclusion and rewarding them with the perks that
come with it to enforce perception as a leader.

The Moscow times goes on in saying: “A minimum degree of repression
is needed to protect the family business from a hostile takeover. It is
necessary to have a very severe punishment for protestors, but to
apply it very selectively.” This statement only enforces the idea that
their lies a considerable amount of thought in managing the way he
does, supporting the regime by implementation of carefully thought-of
                                                                        41
frepercussions for the percentage of people going against his
leadership. This is an indication of autonomously managing areas of the
workforce with and through people, by creating a sense of urgency in
order for them to fulfill the loyalty mandate.

2.16 Measures of effectiveness

Mullins (2010) explores some “Measures Of Effectiveness”. He goes on
in stating that management entitles working with and through people
to achieve objectives.

“Managers are most likely to be judged not just on their own
performance but also on the results achieved by other staff. The
manager’s effectiveness may be assessed in part. Therefore, by such
factors as:
■ the strength of motivation and morale of staff;
■ the success of their training and development; and
■ the creation of an organizational environment in which staff works
willingly and effectively.”

If one is to analyze “the strength of motivation and morale of staff”,
and in this respect, see the Russian society as staff to measure the
effectiveness of how Vladimir Putin “manages” or governs his country
within his current style. We can measure the level of satisfaction
instilled by an insatiable sense of mutual belonging. A tool that Putin
clearly has used to his advantage, as he enters his 11th year of power in
Russia, is undeniably Nationalism. As indicated by PEW Global (2015):
“As the Putin era draws on, Russian nationalism is getting stronger.
More than nine-in-ten Russians (93%) have a favorable opinion of their
own country. And in the past year, the percentage who have a very
favorable opinion of their homeland is up 12 percentage points.”

It can be concluded from these numbers that, even though Putin is
being scrutinized by Western society because of how he chooses to do
things, it seems to be well received in the environment where he
applies his style of governance.

2.17 Management Systems

The theory derived from McGregor, and by Blake and Mouton, indicates
that an organization tends to harness its workforce effectively if the
                                                                       42
fstyle of management is a participative one (Mullins, 2010). If we
critically look at the style of management of Vladimir Putin, which in
previous paragraphs has become self-evident, can be described as
authoritarian and directive. To illustrate this even more, Evans, Henry
and McIntosh Sundstrom (2014b) state the following:
“It is also part of Putin's mode of operation to offer rewards for
organizations that are integrated into his pyramid of support, while he
makes clear, usually by deeds rather than words, in a manner that
makes it possible for him to deny responsibility, that there will be
penalties for resisting subordination to centralized authority.”

This passage is one of many in which it can be clearly concluded that
Putin's management certainly is not a participative one. Imposing his
direction on his workforce and controlling an organization driven by
threats seems to be classified as “Exploitive Authoritative” by Likert
(1961) as one of the 4 systems. These are named the following: System
1 Exploitive authoritative, System 2 Benevolent authoritative, System 3
Consultative, and System 4 Participative. The system associated with
Putin is highlighted below:“ System 1 – Exploitive authoritative.
Decisions are imposed on subordinates, motivation is based on threats,
there is very little teamwork or communication; responsibility is
centered at the top of the organizational hierarchy.”

2.18 Management by Objectives (MBO)

Mullins (2010, pp. 467) learns that “the underlying basis of a system of
MBO is:
■ the setting of objectives and targets;
■ participation by individual managers in agreeing unit objectives and
criteria of performance; and
■ the continual review and appraisal of results.”

Taking Putin’s foreign policy as an example. One can state that
objectives are consistent; Putin possesses a single-minded focus since
he became Russia’s leader in 2000. One of his main objectives was to
defeat the global threat of Islamic jihad, which has been the primary
military concern for Russia itself, ever since the First Chechen War,
during 1994-96, radicalized the predominantly Sunni (Saudi-based)
Muslim Chechen Republic, to separate themselves from the
predominantly Orthodox Catholic Russia (Zuesse 2015). By the time of
Putin’s run for Presidency in 2000, Putin’s firm stand against religious
                                                                       43
fdisunion became one of the biggest victories during his electoral
campaign. This of course leads to an “active participation” in achieving
a, in this case, societal objective with Vladimir Putin as it's commander-
in-chief.

2.19 The Management of time

Looking at Vladimir Putin's ability to show effective leadership through
his own style, he has managed to create the illusion that he will be
around for a long time, which might not be very surprising as his reign
of power has been going on for 11 years now. Careful planning and
execution of long-term plans contribute to the illusion of him being
around long enough to supervise implementation an execution. Of
course Putin's political power will once come to an end, but in the
meantime, he is maximizing efforts to efficiently use (his reigning) time
to accomplish all that encompasses his envisioned Russian state.

Long-term goals can be set in the form of a political agenda. This can
be a tricky move as you cannot guarantee that the next will share the
same principles as you do. Foreign policy is a clear example of setting
long-term goals and remain in power long enough to implement and
execute. As James Goody (2014) puts it:
“Putin and the “Siloviki”—his former colleagues in the KGB who now
occupy key positions in the Russian government—are disposed to
confront Washington if American activities seem to be encouraging too
much independence within “post-Soviet space.” Putin’s rollback of the
democratic institutions in Russia that his predecessor, Boris Yeltsin, had
encouraged underscores the fact that joining a Western-oriented
community is not one of Putin’s strategic objectives. He is positioning
his nation so that it cannot truly be part of Europe in the sense of
shared values and shared self-identification.”

Clearly, positioning of a whole country is not achievable if there is no
long-term plan into place. His strategic objectives are therefore
considered to be realized in extended periods of time, where he makes
efficient use of time, considering all of the above takes a serious
amount of careful planning into consideration.



2.20 Managerial effectiveness

According to polls taken form PEW Global (2015) Russians have high
confidence in Putin’s handling of international affairs this goes hand-in-


                                                                        44
fhand with their high approval ratings for Putin’s policies both
international and domestic, as portrayed in Figure 2.

Mullins (2010) says that effectiveness is “the manner in which the
manager achieves results and the effects on other people”

Russians therefore have great confidence in their leader’s ability to
handle international affairs.

Their confidence level, in this respect, may go as far in saying that,
when it comes to world affairs at least, Putin exercises managerial
effectiveness as he is “doing the right things” which relates to outputs
of the job.

Conclusion
Going through the different principles, theories of leadership,
management and the role they have within an organization, we see
                                                                        45
fthat they complement and are dependent of each other as well as
important keys to reach organizational success. One can say that a
leader needs a manager and a manager supports a good leader.
Leaders in any organization are dependent on a group of people or
individuals who are ready to follow. As stated earlier in this report, for a
leader to be able to carry out his work, it is of great importance that he
is able to have people who are willing to follow, are capable and skilled
and strive towards a common goal. Without vision, good strategy and
a clear understanding of running an organization, it will be very hard or
impossible to reach your objectives.

It is clear that most Russian leaders still have significant pitfalls to
improve their leadership styles, and although there were hardships
within the country from decades of the centrally planned Soviet Union
system, as well as the corrupted business environment during the
presidency of Boris Yeltsin, a lot of development has been made.
Vladimir Putin was ready for a change, compete domestically and move
into highly competitive countries within Europe and the world. Our
report also illustrates that change through the new leadership of
Vladimir Putin would bring a leadership style that would not only
compete with the world, but would bring economic opportunities and
stability to Russia. If we look at the history of Russia and the style of
leadership of Vladimir Putin, we will see a few points that are
highlighted in what his vision was as a leader of Russia. Some of which
includes:
      The plan to determine and forecast Russia’s position in the global
       markets.
      Organizing the resources necessary, such as oil, to achieve these
       objectives
      Command people to do things.
      Coordinate the different activities
      Control the activities and make sure they are completed as planned.
Vladimir Putin understood the dynamics of what the country needed
and what was needed of him in order to fulfill his vision for Russia.
When he was elected, despite what he promised to the powerful
families that supported him in his rise to presidency, Putin took control
of activities within Russia such as the media and free press to push his
own agenda. He understood that public opinion mattered in the image
that he wanted to portray and took command in the eyes of the general
public by crushing the opposition in Russia. At the costs of freedom,
Putin brought stability and a sense of security to Russia. He also kept
some of his agreements, made some tactical moves within the political
office which positioned him in the future to be president again.
In this report we can conclude that although Putin has his own personal
agenda, changing the way that Russia was viewed domestically and
globally was one of his goals and also part of his vision. Therefore, he
may not be the most conventional political leader we know and
                                                                             46
fcriticized by his opponents extremely harsh on his policies, but whether
those policies are grounded or not, is not the question, but it remains a
fact that it was Putin who brought back Russia from its lost glories and
back to the world stage.
