</span><h2 class="abstract-title js-splitscreen-abstract-title" data-dcnode-id="6993" id="127897112" scrollto-destination="127897112"><span data-dcnode-id="6994" instrument_node="">Abstract</span></h2><span data-dcnode-id="6992" instrument_node="">
</span><section class="abstract" data-dcnode-id="6989"><p class="chapter-para" data-dcnode-id="6990"><span data-dcnode-id="6991" instrument_node="">What drives Russia's Baltic policy? To answer this question, I develop a neoclassical realist framework that explains how local great powers act toward neighboring small states. In brief, the framework argues that local great powers face strong systemic incentives to establish a sphere of influence around their borders. Toward that end, they can employ positive and negative incentives. The general rule is that the higher the level of external pressure, the more assertive the policies pursued by the local great power. However, this simple relationship between external pressure and regional assertiveness is moderated by two variables: (1) the ability of small states to obtain security guarantees from extra regional powers; and (2) the level of state capacity of the local great power. The article develops this theoretical argument and shows that it goes a long way to explain the overall pattern and evolution of Russia's Baltic policy over the last two decades.</span></p></section><span data-dcnode-id="6988" instrument_node=""> </span><div class="article-metadata-panel clearfix at-ArticleMetadata" data-dcnode-id="6979"><div class="article-metadata-tocSections" data-dcnode-id="6980"><span data-dcnode-id="6987" instrument_node="">
</span><div class="article-metadata-tocSections-title" data-dcnode-id="6985"><span data-dcnode-id="6986" instrument_node="">Issue Section:</span></div><span data-dcnode-id="6984" instrument_node="">
</span><a data-dcnode-id="6982" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/fpa/search-results%3Ff_TocHeadingTitle%3DOriginal%2BArticle"><span data-dcnode-id="6983" instrument_node="">Original Article</span></a><span data-dcnode-id="6981" instrument_node="">
</span></div></div><span data-dcnode-id="6978" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6964"><span data-dcnode-id="6977" instrument_node="">In the wake of the Ukraine crisis, the question of security in the Baltics has received increased attention from policymakers, think-tankers, and academics. In particular, a lively debate has ensued among Western observers on whether Russia will launch a Crimea-style operation or perhaps even a conventional military strike in the region (see, e.g., </span><span class="xrefLink" data-dcnode-id="6976" id="jumplink-bib6"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6974" data-google-interstitial="false" data-open="bib6" href="javascript:;" reveal-id="bib6"><span data-dcnode-id="6975" instrument_node="">Carpenter 2014</span></a><span data-dcnode-id="6973" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="6972" id="jumplink-bib8"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6970" data-google-interstitial="false" data-open="bib8" href="javascript:;" reveal-id="bib8"><span data-dcnode-id="6971" instrument_node="">Chivvis 2015</span></a><span data-dcnode-id="6969" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="6968" id="jumplink-bib41"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6966" data-google-interstitial="false" data-open="bib41" href="javascript:;" reveal-id="bib41"><span data-dcnode-id="6967" instrument_node="">Lucas 2015</span></a><span data-dcnode-id="6965" instrument_node="">). This paper puts the issue into a larger theoretical and temporal perspective and examines the evolution of Moscow's policies toward the Baltic states from 1995—after the last Soviet/Russian troops had been withdrawn from the area—to the present.</span></p><p class="chapter-para" data-dcnode-id="6962"><span data-dcnode-id="6963" instrument_node="">During this two-decade-long period, Russia's Baltic policy has been marked by many zigs and zags. Nonetheless, two major phases can be distinguished. In the first, from 1995 to 2003, Russia's policy was characterized by rhetorical opposition to the pro-Western orientation of the three Baltic states. Moscow launched a barrage of threats of what would happen if they established close ties to the West in the military and security fields. Beyond the realm of rhetoric, however, relatively little happened—quite the opposite. Russia's Baltic policy became increasingly incoherent, self-contradictory, and less assertive. In the second phase, which runs from 2004 to the present, Russia has adopted a more coherent and tough-minded approach. Moscow has exerted pressure on the Baltic states through cyberattacks, shows of force, attempts at internal subversion, and economic sanctions. But, at the same time, it has abstained from the direct use of force.</span></p><p class="chapter-para" data-dcnode-id="6960"><span data-dcnode-id="6961" instrument_node="">The evolution of Russia's Baltic policy raises three questions. First, how can one explain the discrepancy between words and deeds in the latter half of the 1990s? Second, what accounts for the shift in Russia's approach toward the Baltics in the middle of the 2000s? And third, what are the underlying drivers and ambitions that guide Russia's policies in the region?</span></p><p class="chapter-para" data-dcnode-id="6946"><span data-dcnode-id="6959" instrument_node="">The existing literature provides some potential answers, highlighting factors such as the Kremlin's turn toward authoritarianism and the resurgence of ethnonationalist sentiments in Russia (for an overview, see </span><span class="xrefLink" data-dcnode-id="6958" id="jumplink-bib72"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6956" data-google-interstitial="false" data-open="bib72" href="javascript:;" reveal-id="bib72"><span data-dcnode-id="6957" instrument_node="">Sleivyte 2010</span></a><span data-dcnode-id="6955" instrument_node="">, 120–22). Perhaps the most prominent explanation is provided by scholars working in the status perspective. They suggest that Russia pursued a Western-oriented policy throughout large stretches of the 1990s and early 2000s to gain recognition from the United States as an equal partner. Accordingly, Moscow's policy toward the Baltics was marked by moderation and restraint. By the mid-2000s, however, it became increasingly clear that Washington was unwilling to treat Moscow as a coequal in diplomatic and military affairs. In response, Moscow adopted a more anti-Western stance. Concomitantly, Moscow began to pursue a tough-minded policy vis-à-vis neighboring countries, including the Baltic states, to reassert Russia's great-power status (see, e.g., </span><span class="xrefLink" data-dcnode-id="6954" id="jumplink-bib39"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6952" data-google-interstitial="false" data-open="bib39" href="javascript:;" reveal-id="bib39"><span data-dcnode-id="6953" instrument_node="">Larson and Shevchenko 2014</span></a><span data-dcnode-id="6951" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="6950" id="jumplink-bib80"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6948" data-google-interstitial="false" data-open="bib80" href="javascript:;" reveal-id="bib80"><span data-dcnode-id="6949" instrument_node="">Tsygankov 2013</span></a><span data-dcnode-id="6947" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="6944"><span data-dcnode-id="6945" instrument_node="">In this article, I present an alternative answer to the questions raised above. More specifically, I develop a neoclassical realist framework that explains how local great powers deal with neighboring small states. My framework shows that local great powers face strong systemic incentives to establish a sphere of influence around their borders. Toward that end, they can apply a wide range of diplomatic, economic, and military instruments. The basic argument is that if the level of external pressure increases (that is, if smaller neighbors make attempts to join forces with extraregional powers), the local great power will tighten the screws on its neighbors and adopt more coercive policies—including the threat and use of force, if needed—to prevent them from teaming up with outsiders.</span></p><p class="chapter-para" data-dcnode-id="6930"><span data-dcnode-id="6943" instrument_node="">However, this simple, quasi-linear relationship between external pressure and regional assertiveness must be qualified in two ways. First, once a neighboring small state has entered into a security partnership with a major extraregional power, the local great power will avoid the direct use of force. After all, it may lead to a costly military confrontation with a more powerful adversary. Instead, the local power will seek to destabilize the foreign-aligned small state through various forms of political and economic subversion. Second, the link between external pressure and regional assertiveness presupposes that the local great power can be treated as a unitary and strategic actor. This is not always the case, however. As neoclassical realists have shown, countries that lack state capacity are unable to act upon systemic incentives in a strategic fashion (</span><span class="xrefLink" data-dcnode-id="6942" id="jumplink-bib69"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6940" data-google-interstitial="false" data-open="bib69" href="javascript:;" reveal-id="bib69"><span data-dcnode-id="6941" instrument_node="">Schweller 2004</span></a><span data-dcnode-id="6939" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="6938" id="jumplink-bib75"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6936" data-google-interstitial="false" data-open="bib75" href="javascript:;" reveal-id="bib75"><span data-dcnode-id="6937" instrument_node="">Taliaferro 2006</span></a><span data-dcnode-id="6935" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="6934" id="jumplink-bib88"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6932" data-google-interstitial="false" data-open="bib88" href="javascript:;" reveal-id="bib88"><span data-dcnode-id="6933" instrument_node="">Zakaria 1998</span></a><span data-dcnode-id="6931" instrument_node="">). Accordingly, shifts in the level of state capacity also affect the neighborhood policies of the local great power. Overall, I find that this framework—which combines international, regional, and domestic factors—goes a long way toward explaining the course of Russia's Baltic policy from the mid-1990s to the present.</span></p><p class="chapter-para" data-dcnode-id="6916"><span data-dcnode-id="6929" instrument_node="">The contribution of this article is threefold. First, it provides a theoretically informed account of Russia's Baltic policy. Second, it advances neoclassical realist scholarship, which has been criticized for its focus on Western great powers and historical cases (</span><span class="xrefLink" data-dcnode-id="6928" id="jumplink-bib64"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6926" data-google-interstitial="false" data-open="bib64" href="javascript:;" reveal-id="bib64"><span data-dcnode-id="6927" instrument_node="">Ripsman, Taliaferro, and Lobell 2016</span></a><span data-dcnode-id="6925" instrument_node="">, 182–83). Third, the article develops a theoretical framework of a phenomenon that has remained undertheorized—namely how local great powers act toward smaller neighbors that are aligned with a major extraregional power (for a partial exception, see </span><span class="xrefLink" data-dcnode-id="6924" id="jumplink-bib33"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6922" data-google-interstitial="false" data-open="bib33" href="javascript:;" reveal-id="bib33"><span data-dcnode-id="6923" instrument_node="">Knudsen 1988</span></a><span data-dcnode-id="6921" instrument_node="">). This topic is likely to gain in importance in the years ahead. After all, the United States has established strong politico-military ties with a number of smaller countries in Central Eurasia and East Asia over the last decades (</span><span class="xrefLink" data-dcnode-id="6920" id="jumplink-bib70"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6918" data-google-interstitial="false" data-open="bib70" href="javascript:;" reveal-id="bib70"><span data-dcnode-id="6919" instrument_node="">Selden 2013</span></a><span data-dcnode-id="6917" instrument_node="">). At present, however, regional great powers such as Russia and China are re-emerging in these parts of the world. The question thus becomes how these powers will deal with neighboring small states that have entered into security partnerships with Washington. The framework developed in this paper makes a step toward answering this broader question.</span></p><p class="chapter-para" data-dcnode-id="6910"><span data-dcnode-id="6915" instrument_node="">In short, I provide a theory of foreign policy that explains state choices and strategies—a Type II neoclassical realist theory (</span><span class="xrefLink" data-dcnode-id="6914" id="jumplink-bib64"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6912" data-google-interstitial="false" data-open="bib64" href="javascript:;" reveal-id="bib64"><span data-dcnode-id="6913" instrument_node="">Ripsman, Taliaferro, and Lobell 2016</span></a><span data-dcnode-id="6911" instrument_node="">, 29–31)—and apply it to the case of Russia's Baltic policy. Moreover, my theoretical argument contributes to our understanding of regional security dynamics in the Baltic area and, potentially at least, in other parts of the world.</span></p><p class="chapter-para" data-dcnode-id="6908"><span data-dcnode-id="6909" instrument_node="">The remainder of this article proceeds as follows. The first section lays out the theoretical argument and derives some expectations about Russia's Baltic policy. The second and third sections examine to what extent these expectations hold up against the track record of Russia's Baltic policy from the mid-1990s to the present. The concluding section compares my neoclassical account of Russia's Baltic policy to the arguments of the status perspective, briefly outlined above, and suggests directions for future scholarship.</span></p><span data-dcnode-id="6907" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="6905" data-legacy-id="sec2" id="127897123" scrollto-destination="127897123"><span data-dcnode-id="6906" instrument_node="">Neoclassical Realism and the Pursuit of Regional Primacy</span></h2><span data-dcnode-id="6904" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6894"><span data-dcnode-id="6903" instrument_node="">Neoclassical realism's central argument is that a country's foreign policy is shaped by the interplay of international and domestic conditions (</span><span class="xrefLink" data-dcnode-id="6902" id="jumplink-bib65"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6900" data-google-interstitial="false" data-open="bib65" href="javascript:;" reveal-id="bib65"><span data-dcnode-id="6901" instrument_node="">Rose 1998</span></a><span data-dcnode-id="6899" instrument_node="">). Thus, any neoclassical realist theory worth its salt must accomplish two tasks: explicate how systemic factors incentivize and constrain the formation of foreign policy, and specify the unit-level factors that moderate the link between systemic influences and actual state behavior (</span><span class="xrefLink" data-dcnode-id="6898" id="jumplink-bib58"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6896" data-google-interstitial="false" data-open="bib58" href="javascript:;" reveal-id="bib58"><span data-dcnode-id="6897" instrument_node="">Rathbun 2008</span></a><span data-dcnode-id="6895" instrument_node="">).</span></p><span data-dcnode-id="6893" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="6891" data-legacy-id="sec3" id="127897125" scrollto-destination="127897125"><span data-dcnode-id="6892" instrument_node="">International Conditions: Systemic Incentives and Constraints</span></h2><span data-dcnode-id="6890" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6876"><span data-dcnode-id="6889" instrument_node="">How do systemic influences shape the neighborhood policies of major powers? According to offensive realism, the structure of the international system—marked by anarchy and the ever-present uncertainty over others’ intentions—pushes major powers to pursue regional hegemony (</span><span class="xrefLink" data-dcnode-id="6888" id="jumplink-bib48"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6886" data-google-interstitial="false" data-open="bib48" href="javascript:;" reveal-id="bib48"><span data-dcnode-id="6887" instrument_node="">Mearsheimer 2001</span></a><span data-dcnode-id="6885" instrument_node="">). Defensive realists, on the other hand, hold that the international system only provides incentives for balancing behavior—not for power maximization. But, notwithstanding this point of contention, many defensive realists agree that there are good reasons for major powers to surround themselves with a zone of influence. As Robert </span><span class="xrefLink" data-dcnode-id="6884" id="jumplink-bib32"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6882" data-google-interstitial="false" data-open="bib32" href="javascript:;" reveal-id="bib32"><span data-dcnode-id="6883" instrument_node="">Jervis (1978</span></a><span data-dcnode-id="6881" instrument_node="">, 169) notes, “In order to protect themselves, states seek to control, or at least to neutralize, areas on their borders.” In short, when it comes to the neighborhood policies of major powers, there appears to be room for combining elements from offensive and defensive realism.</span><sup data-dcnode-id="6877"><span class="xrefLink" data-dcnode-id="6880" id="jumplink-fn1"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="6878" data-google-interstitial="false" data-open="fn1" href="javascript:;" reveal-id="fn1"><span data-dcnode-id="6879" instrument_node="">1</span></a></sup></p><p class="chapter-para" data-dcnode-id="6866"><span data-dcnode-id="6875" instrument_node="">If one fuses insights from the two theoretical strands, three important reasons can be identified as to why major powers want to carve out spheres of influence near their home territories. First of all, major powers seek to prevent neighboring states from entering into alliances or security partnerships with great-power rivals from other parts of the world. Nobody, after all, wants to have client states of potential adversaries on their doorstep (</span><span class="xrefLink" data-dcnode-id="6874" id="jumplink-bib48"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6872" data-google-interstitial="false" data-open="bib48" href="javascript:;" reveal-id="bib48"><span data-dcnode-id="6873" instrument_node="">Mearsheimer 2001</span></a><span data-dcnode-id="6871" instrument_node="">, 142–43). The underlying reason is simple. The projection of power, especially military power, increases with proximity (</span><span class="xrefLink" data-dcnode-id="6870" id="jumplink-bib82"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6868" data-google-interstitial="false" data-open="bib82" href="javascript:;" reveal-id="bib82"><span data-dcnode-id="6869" instrument_node="">Walt 1987</span></a><span data-dcnode-id="6867" instrument_node="">, 23–24). It is therefore important to prevent extraregional powers from establishing forward-operating sites like airfields and army bases next to one's home territory. This, in turn, provides a strong incentive for major powers to have some degree of control over the external relations and defense policies of smaller neighboring states.</span></p><p class="chapter-para" data-dcnode-id="6860"><span data-dcnode-id="6865" instrument_node="">Second, and relatedly, major powers have an incentive to maintain access to transport infrastructure and military installations on the territory of neighboring countries. After all, access to such installations—for example, early warning radar sites and intelligence-gathering facilities—can be vital for protecting the land, air, and sea approaches to one's home territory. What is more, airfields and seaports in neighboring states can serve as stepping stones for the local power to project influence into regions further afield (</span><span class="xrefLink" data-dcnode-id="6864" id="jumplink-bib24"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6862" data-google-interstitial="false" data-open="bib24" href="javascript:;" reveal-id="bib24"><span data-dcnode-id="6863" instrument_node="">Harkavy 2007</span></a><span data-dcnode-id="6861" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="6858"><span data-dcnode-id="6859" instrument_node="">Third, major powers want to maintain some form of control over lines of communication and transport routes in their geographical vicinity. There are several reasons for this. For one thing, it reduces the risk of being cut off from important resources and export markets during times of international crisis. For another, it enables the local power to constrict the freedom of maneuver of potential adversaries in one's home region. Additionally, control over trade and transport arteries can be used to exert pressure on smaller neighboring states, if deemed necessary.</span></p><p class="chapter-para" data-dcnode-id="6856"><span data-dcnode-id="6857" instrument_node="">In essence, the combination of international anarchy and uncertainty, coupled with the effects of geographic proximity (a “structural modifier” in the terminology of neoclassical realism), incentivizes powerful states to pursue regional primacy. To achieve this aim, they can employ a range of diplomatic, economic, and military instruments.</span></p><p class="chapter-para" data-dcnode-id="6850"><span data-dcnode-id="6855" instrument_node="">Elsewhere, I have shown that diplomatic, economic, and military instruments can take the form of positive incentives (carrots) or negative incentives (sticks). In brief, positive incentives refer to forms of statecraft such as diplomatic blandishments, the provision of economic assistance, and weapons transfers. Negative incentives refer to forms of statecraft such as the cut-off of diplomatic relations, the imposition of economic sanctions, and the threat and use of force (for more on this, see </span><span class="xrefLink" data-dcnode-id="6854" id="jumplink-bib19"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6852" data-google-interstitial="false" data-open="bib19" href="javascript:;" reveal-id="bib19"><span data-dcnode-id="6853" instrument_node="">Götz 2016</span></a><span data-dcnode-id="6851" instrument_node="">, 304–6). The question that remains is: what determines the choice of policy tools through which states pursue regional primacy?</span></p><p class="chapter-para" data-dcnode-id="6840"><span data-dcnode-id="6849" instrument_node="">My theory suggests that the choice of policy tools is largely driven by the intensity, or level, of external pressure. For the purposes of this article, the level of external pressure on the local great power is defined as a function of the relationship between great-power rivals (actual or potential) from other parts of the world and small states in the immediate vicinity of the local power. Simply put, the closer the politico-military ties between extraregional powers and small states in the local power's vicinity, the higher the level of external pressure (for similar arguments, see </span><span class="xrefLink" data-dcnode-id="6848" id="jumplink-bib33"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6846" data-google-interstitial="false" data-open="bib33" href="javascript:;" reveal-id="bib33"><span data-dcnode-id="6847" instrument_node="">Knudsen 1988</span></a><span data-dcnode-id="6845" instrument_node="">, 15–19; </span><span class="xrefLink" data-dcnode-id="6844" id="jumplink-bib42"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6842" data-google-interstitial="false" data-open="bib42" href="javascript:;" reveal-id="bib42"><span data-dcnode-id="6843" instrument_node="">MacFarlane 2003</span></a><span data-dcnode-id="6841" instrument_node="">, 126–27).</span></p><p class="chapter-para" data-dcnode-id="6838"><span data-dcnode-id="6839" instrument_node="">Accordingly, the local power is exposed to a high level of external pressure if small states in its vicinity make attempts to forge close security ties with extraregional powers and extraregional powers indicate a willingness to engage in substantial military cooperation with them (e.g., through troop deployments or defense agreements). In such situations, the local power will rely on negative incentives to constrict the foreign-policy autonomy of smaller neighboring states. The aim is to coerce their governments to cut off ties with outsiders. Conversely, the level of external pressure is low if smaller neighboring states have aligned their military and defense policies with the local power. In such situations, the local power will use positive incentives to keep smaller neighbors in its orbit of influence.</span></p><p class="chapter-para" data-dcnode-id="6836"><span data-dcnode-id="6837" instrument_node="">This is, of course, a stylized picture. In reality, the level of external pressure is not always high or low but often hovers somewhere between the two. It may be useful, therefore, to think of external pressure as a continuum. As the level of external pressure increases and smaller neighboring states deepen their security ties with extraregional powers, the local power will gradually move from the application of positive incentives to the use of negative incentives. In other words, there exists a quasi-linear relationship between the severity of external pressure and the assertiveness of the local power vis-à-vis neighboring small states.</span></p><p class="chapter-para" data-dcnode-id="6826"><span data-dcnode-id="6835" instrument_node="">That said, one important qualification must be added. If a neighboring small state manages to establish a close politico-military relationship with a major extraregional power—which means that the level of external pressure is very high—the local power will refrain from any direct application of military force against this small state. The reason is simple. The local power fears that the employment of highly assertive policies—an armed intervention, for example—might lead to a major confrontation with the extraregional power that serves as the small state's security patron. Thus, the local power will accept a degree of restraint (</span><span class="xrefLink" data-dcnode-id="6834" id="jumplink-bib33"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6832" data-google-interstitial="false" data-open="bib33" href="javascript:;" reveal-id="bib33"><span data-dcnode-id="6833" instrument_node="">Knudsen 1988</span></a><span data-dcnode-id="6831" instrument_node="">, 17; also see </span><span class="xrefLink" data-dcnode-id="6830" id="jumplink-bib31"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6828" data-google-interstitial="false" data-open="bib31" href="javascript:;" reveal-id="bib31"><span data-dcnode-id="6829" instrument_node="">Huth 1988</span></a><span data-dcnode-id="6827" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="6824"><span data-dcnode-id="6825" instrument_node="">This does not mean, however, that the local power will stand idly by and do nothing. Instead, the local power will resort to means short of the application of force. This may include economic pressure, intelligence operations, and interference in the internal affairs of the foreign-aligned small state. In the best-case scenario, the local power will be able to reverse the strategic direction of the foreign-aligned small state through such activities. At minimum, such activities contribute to keeping the neighboring small state off-balance and destabilize it from within. In short, in situations in which the level of external pressure is high but the use of force is considered too risky and dangerous, the local power will seek to subvert foreign-aligned small states through coercive measures that stop short of military force.</span></p><p class="chapter-para" data-dcnode-id="6818"><span data-dcnode-id="6823" instrument_node="">One example of these dynamics is the US approach toward Cuba during the Cold War. In the late 1940s and 1950s, the United States used positive incentives such as economic and military assistance to maintain a pro-American regime in Havana. However, as a result of the 1959 revolution, the level of external pressure increased. The new government in Cuba made clear that it wanted to establish close ties with the Soviet Union. In response, Washington began using negative incentives and pursued an increasingly assertive policy toward Cuba. Think, for instance, of the failed Bay of Pigs invasion. US policy changed again after the Cuban missile crisis. A major reason for this was that Moscow had indicated its readiness to protect the Castro regime in a future conflict with the United States. Thus, in subsequent years and decades, Washington refrained from the direct application of military force vis-à-vis Havana. Instead, Washington resorted to softer forms of hard power—such as internal subversion and economic pressure—to destabilize Cuba and, if possible, effect a regime change (for an overview of US-Cuba relations, see </span><span class="xrefLink" data-dcnode-id="6822" id="jumplink-bib54"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6820" data-google-interstitial="false" data-open="bib54" href="javascript:;" reveal-id="bib54"><span data-dcnode-id="6821" instrument_node="">Perez 2003</span></a><span data-dcnode-id="6819" instrument_node="">, 238–62). This case nicely illustrates that a close security partnership between a small state (Cuba) and a major extraregional power (Soviet Union) can induce some restraint in the local great power (United States).</span></p><p class="chapter-para" data-dcnode-id="6816"><span data-dcnode-id="6817" instrument_node="">Of course, the local power will give up its self-effacement if there is a clear and present danger that an extraregional power plans to use the small state's territory as launching pad for an attack on the local power's homeland. In such situations, the local power will resort to military means—even accepting the possibility that it may lead to a major military conflict with the extraregional power. After all, if an attack is imminent, there is nothing that holds back the local power from striking against the foreign-aligned small state. For instance, if Washington had received information that the Soviets planned to use Cuba as a bridgehead to launch an attack on the United States, it seems not far-fetched to assume that Washington had carried out a preemptive strike on the island.</span></p><p class="chapter-para" data-dcnode-id="6811"><span data-dcnode-id="6815" instrument_node="">In sum, the level of external pressure is a </span><em data-dcnode-id="6813"><span data-dcnode-id="6814" instrument_node="">moderating variable</span></em><span data-dcnode-id="6812" instrument_node=""> that affects the selection of tools and tactics employed by powerful states in the pursuit of regional primacy. That said, it is worth reiterating that the incentive to pursue regional primacy in the first place derives from the mix of international anarchy, uncertainty, and geography. In other words, the structure of the international system pushes states to make bids for regional primacy (goals), whereas the level of external pressure affects the way in which states seek to achieve this aim (means).</span></p><p class="chapter-para" data-dcnode-id="6805"><span data-dcnode-id="6810" instrument_node="">Before proceeding, one should note that neoclassical realism is a broad school of thought that identifies a number of international-level variables, including the clarity of signals about threats and opportunities, the relative permissiveness/restrictiveness of states’ environments, and time horizons (</span><span class="xrefLink" data-dcnode-id="6809" id="jumplink-bib64"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6807" data-google-interstitial="false" data-open="bib64" href="javascript:;" reveal-id="bib64"><span data-dcnode-id="6808" instrument_node="">Ripsman, Taliaferro, and Lobell 2016</span></a><span data-dcnode-id="6806" instrument_node="">, 46–56). In this study, I consciously limit myself to basic features of the international system (anarchy, uncertainty, and geography), along with the level of external pressure, in order to isolate their effect on the neighborhood policies of major powers. Moreover, doing so enables me to theorize how systemic incentives interact with variations in state capacity in the formation of foreign policy.</span></p><span data-dcnode-id="6804" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="6802" data-legacy-id="sec4" id="127897141" scrollto-destination="127897141"><span data-dcnode-id="6803" instrument_node="">Domestic Conditions: The Importance of State Capacity</span></h2><span data-dcnode-id="6801" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6792"><span data-dcnode-id="6800" instrument_node="">Thus far, my theory suggests that external factors determine the strategic behavior of major powers vis-à-vis neighboring small states. This line of reasoning rests upon the assumption that major powers can be treated as rational and unitary actors—an assumption that guides many structural realist analyses of world politics. However, its usefulness has been called into question, not least by </span><em data-dcnode-id="6798"><span data-dcnode-id="6799" instrument_node="">Innenpolitik</span></em><span data-dcnode-id="6797" instrument_node=""> theorists who emphasize the role of domestic political actors and societal forces (see, e.g., </span><span class="xrefLink" data-dcnode-id="6796" id="jumplink-bib49"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6794" data-google-interstitial="false" data-open="bib49" href="javascript:;" reveal-id="bib49"><span data-dcnode-id="6795" instrument_node="">Moravcsik 1997</span></a><span data-dcnode-id="6793" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="6778"><span data-dcnode-id="6791" instrument_node="">Building upon the work of neoclassical realist scholars, I strike a middle-ground and argue that major powers act as if they were unitary actors—if they have a sufficient level of state capacity. This line of reasoning is based on the observation that well-functioning states (regardless of regime type) tend to act in a unitary fashion when it comes to major economic and military matters that affect the country's security (see, e.g., </span><span class="xrefLink" data-dcnode-id="6790" id="jumplink-bib14"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6788" data-google-interstitial="false" data-open="bib14" href="javascript:;" reveal-id="bib14"><span data-dcnode-id="6789" instrument_node="">Dueck 2009</span></a><span data-dcnode-id="6787" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="6786" id="jumplink-bib35"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6784" data-google-interstitial="false" data-open="bib35" href="javascript:;" reveal-id="bib35"><span data-dcnode-id="6785" instrument_node="">Krasner 1978</span></a><span data-dcnode-id="6783" instrument_node="">). To be sure, the timing and style of individual policies may be affected by intragovernmental disputes and bureaucratic maneuvering. The broader pattern of behavior, however, is determined to a large extent by external factors and strategic considerations (for a defense of the unitary-actor assumption, see </span><span class="xrefLink" data-dcnode-id="6782" id="jumplink-bib20"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6780" data-google-interstitial="false" data-open="bib20" href="javascript:;" reveal-id="bib20"><span data-dcnode-id="6781" instrument_node="">Grieco 1997</span></a><span data-dcnode-id="6779" instrument_node="">, 168–69).</span></p><p class="chapter-para" data-dcnode-id="6765"><span data-dcnode-id="6777" instrument_node="">If, on the other hand, countries lack state capacity, they are best understood as composite rather than unitary actors. That is to say, their behavior is shaped by the self-serving agendas and interests of subnational actors. It follows that government authorities in countries with weak state capacity are unable to respond effectively to system-level impulses (</span><span class="xrefLink" data-dcnode-id="6776" id="jumplink-bib69"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6774" data-google-interstitial="false" data-open="bib69" href="javascript:;" reveal-id="bib69"><span data-dcnode-id="6775" instrument_node="">Schweller 2004</span></a><span data-dcnode-id="6773" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="6772" id="jumplink-bib88"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6770" data-google-interstitial="false" data-open="bib88" href="javascript:;" reveal-id="bib88"><span data-dcnode-id="6771" instrument_node="">Zakaria 1998</span></a><span data-dcnode-id="6769" instrument_node="">). In short, state capacity is a </span><em data-dcnode-id="6767"><span data-dcnode-id="6768" instrument_node="">moderating variable</span></em><span data-dcnode-id="6766" instrument_node=""> that conditions the impact of system-level impulses on actual foreign policy behavior.</span></p><p class="chapter-para" data-dcnode-id="6751"><span data-dcnode-id="6764" instrument_node="">This proposition raises an important conceptual issue: what exactly is meant by state capacity here? State capacity, after all, has become a term with many meanings (for overviews, see </span><span class="xrefLink" data-dcnode-id="6763" id="jumplink-bib9"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6761" data-google-interstitial="false" data-open="bib9" href="javascript:;" reveal-id="bib9"><span data-dcnode-id="6762" instrument_node="">Cingolani 2013</span></a><span data-dcnode-id="6760" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="6759" id="jumplink-bib25"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6757" data-google-interstitial="false" data-open="bib25" href="javascript:;" reveal-id="bib25"><span data-dcnode-id="6758" instrument_node="">Hendrix 2010</span></a><span data-dcnode-id="6756" instrument_node="">). For the purposes of this article, I conceptualize state capacity in a relatively narrow sense. I focus on the so-called “foreign policy executive”—which comprises the leadership, foreign and defense ministries, and other government officials responsible for formulating and conducting foreign security policy—rather than on the state machinery as a whole (</span><span class="xrefLink" data-dcnode-id="6755" id="jumplink-bib3"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6753" data-google-interstitial="false" data-open="bib3" href="javascript:;" reveal-id="bib3"><span data-dcnode-id="6754" instrument_node="">Blanchard and Ripsman 2013</span></a><span data-dcnode-id="6752" instrument_node="">, 7–8). Moreover, with regard to “capacity,” I do not look at factors such as administrative and bureaucratic quality. Instead, I concentrate on two dimensions that appear most relevant to our discussion: extraction capacity and autonomy.</span></p><p class="chapter-para" data-dcnode-id="6741"><span data-dcnode-id="6750" instrument_node="">Extraction capacity refers to the ability of government authorities to mobilize resources and collect taxes from society. Its importance is hard to overstate: if government authorities cannot levy taxes, they lack the ability to convert the country's raw power resources into actual economic and military capabilities (</span><span class="xrefLink" data-dcnode-id="6749" id="jumplink-bib75"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6747" data-google-interstitial="false" data-open="bib75" href="javascript:;" reveal-id="bib75"><span data-dcnode-id="6748" instrument_node="">Taliaferro 2006</span></a><span data-dcnode-id="6746" instrument_node="">, 487–91; for background, see </span><span class="xrefLink" data-dcnode-id="6745" id="jumplink-bib76"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6743" data-google-interstitial="false" data-open="bib76" href="javascript:;" reveal-id="bib76"><span data-dcnode-id="6744" instrument_node="">Thies, Chyzh, and Nieman 2016</span></a><span data-dcnode-id="6742" instrument_node="">). Moreover, if government authorities lack extractive capacity, they are unable to finance major foreign policy programs such as the pursuit of regional primacy. After all, no matter if regional primacy is pursued through positive incentives (e.g., provision of aid, arms transfers) or negative incentives (e.g., imposition of sanctions, threat of force), it is costly in economic terms. Hence, extraction capacity is a precondition for major powers to exert influence over neighboring countries.</span></p><p class="chapter-para" data-dcnode-id="6727"><span data-dcnode-id="6740" instrument_node="">Autonomy, on the other hand, refers to the ability of state officials to formulate and implement decisions against the wishes of powerful societal actors such as NGOs, financial-industrial groups, and ethnic communities (</span><span class="xrefLink" data-dcnode-id="6739" id="jumplink-bib62"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6737" data-google-interstitial="false" data-open="bib62" href="javascript:;" reveal-id="bib62"><span data-dcnode-id="6738" instrument_node="">Ripsman 2002</span></a><span data-dcnode-id="6736" instrument_node="">, 43–58; for background, see </span><span class="xrefLink" data-dcnode-id="6735" id="jumplink-bib44"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6733" data-google-interstitial="false" data-open="bib44" href="javascript:;" reveal-id="bib44"><span data-dcnode-id="6734" instrument_node="">Mann 1984</span></a><span data-dcnode-id="6732" instrument_node="">). Naturally, these actors lobby the government to advance their own goals and objectives; in itself, that is not a problem. It can become a problem, however, if government authorities are so weak that they cannot withstand the prodding and cajoling of societal actors. If this is the case, the state as an institution is effectively captured by interest groups. As a result, government authorities will pursue policies that suit the narrower objectives of societal actors with little regard for the country as a whole (</span><span class="xrefLink" data-dcnode-id="6731" id="jumplink-bib63"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6729" data-google-interstitial="false" data-open="bib63" href="javascript:;" reveal-id="bib63"><span data-dcnode-id="6730" instrument_node="">Ripsman 2009</span></a><span data-dcnode-id="6728" instrument_node="">). This in turn makes it extremely difficult, if not impossible, for the foreign policy executive to develop and implement a concerted approach vis-à-vis smaller neighbors. In essence, the pursuit of regional primacy presupposes that the local power possesses both extraction capacity and some degree of state autonomy vis-à-vis societal actors.</span></p><p class="chapter-para" data-dcnode-id="6721"><span data-dcnode-id="6726" instrument_node="">As depicted in </span><span class="xrefLink" data-dcnode-id="6725" id="jumplink-fig1"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="6723" data-google-interstitial="false" data-open="fig1" href="javascript:;" reveal-id="fig1"><span data-dcnode-id="6724" instrument_node="">Figure 1</span></a><span data-dcnode-id="6722" instrument_node="">, the gist of the argument is that major powers have a system-induced incentive to pursue regional primacy (A). Toward that end, major powers will engage in soft-line or hard-line policies, depending on the level of external pressure (B). Lastly, the argument suggests that the pursuit of regional primacy is moderated by the level of state capacity (C).</span></p><span data-dcnode-id="6720" instrument_node=""> </span><a data-dcnode-id="6719" data-google-interstitial="false" id="127897149" scrollto-destination="127897149"></a><span data-dcnode-id="6718" instrument_node="">
</span><div class="fig fig-section js-fig-section" data-dcnode-id="6705" data-id="fig1"><div class="label fig-label" data-dcnode-id="6716"><span data-dcnode-id="6717" instrument_node="">Figure 1:</span></div><div class="graphic-wrap" data-dcnode-id="6709"><img alt="A Neoclassical Realist Theory of the Pursuit of Regional Primacy" class="content-image" data-dcnode-id="6715" data-path-from-xml="orx011fig1.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/fpa/15/1/10.1093_fpa_orx011/1/m_orx011fig1.jpeg%3FExpires%3D1653835749%26Signature%3DRZSFmAdun3aQOK68tsuglhaCs81PNi0e5vYZK4PBOFlixrQduSX4qj6qmjjQqatn7EPMjySxXTRJFcDNDJCD8jCUu~nKb97SB4nbxmiB7UpgM0dBG0WBmC8rHo7ArL-52zk5~8ba0medH9u8YVh9P~n5BiphLverJOojX5GpJ-xN5QF7CIVmN9C~~2zN8Na9wbVPTbbnEG7XHQ~nHy1miXelbJ~6DETl3akLc2SlONtvoCebP0N0sBXsXrkqQCQM0lffneHrqOOq6VU3~AvvODypq6vTjD6do~Bd3BPhnCdKyVENRv8wgUTiMXfwJBXwVDvQbmtQh8Uz5FexMN-XZw__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA&amp;raw"><div class="fig-orig original-slide" data-dcnode-id="6710"><a class="fig-view-orig js-view-large openInAnotherWindow" data-dcnode-id="6713" data-google-interstitial="false" data-path-from-xml="orx011fig1.jpg" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/view-large/figure/127897149/orx011fig1.jpg" target="_blank"><span data-dcnode-id="6714" instrument_node="">Open in new tab</span></a><a class="download-slide" data-dcnode-id="6711" data-google-interstitial="false" data-path-from-xml="orx011fig1.jpg" data-section="127897149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/DownloadFile/DownloadImage.aspx%3Fimage%3Dhttps%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/fpa/15/1/10.1093_fpa_orx011/1/orx011fig1.jpeg%3FExpires%3D1653835749%26Signature%3DfekexqlKcHnRo0LY7ZBMY7m-iqomF5GzoldKKDwEUlUvwjpwvkak3kJlhRbX-pvoMmKgmFCxzpBE813ZMOxt~Hk3q5jOOdjslaBApQ2bXiVdipUZ %3A//academic.oup.com/view-large/figure/127897149/orx011fig1.jpg" target="_blank"><span data-dcnode-id="6701" instrument_node="">Open in new tab</span></a><a class="download-slide" data-dcnode-id="6698" data-google-interstitial="false" data-path-from-xml="orx011fig1.jpg" data-section="127897149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/DownloadFile/DownloadImage.aspx%3Fimage%3Dhttps%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/fpa/15/1/10.1093_fpa_orx011/1/orx011fig1.jpeg%3FExpires%3D1653835749%26Signature%3DfekexqlKcHnRo0LY7ZBMY7m-iqomF5GzoldKKDwEUlUvwjpwvkak3kJlhRbX-pvoMmKgmFCxzpBE813ZMOxt~Hk3q5jOOdjslaBApQ2bXiVdipUZdcZllWfC7cR13yRu9fPUqyQz0nEkbidwBn18NgJWQ5WK3XvS3ecNraZgqNMMZ4bCBSkGii1Ijn8SCuDuuNQWfGRLwXZPIr6heQa0bTq6FPTaqEPH7~xsMERtsJx6dBJiCyebZW5UyawCjUPINAlDJ1QEAG1NBoX22ECwe~~o~hs8vvcV3TsVVjZaUav84odsDD9jFTw36d9bFMwmJMgtBag5BPHFpgz6PJgp9A__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA%26sec%3D127897149%26ar%3D4601762%26xsltPath%3D~/UI/app/XSLT%26imagename%3D%26siteId%3D5388"><span data-dcnode-id="6699" instrument_node="">Download slide</span></a></div></div><div class="caption fig-caption" data-dcnode-id="6693"><p class="chapter-para" data-dcnode-id="6694"><span data-dcnode-id="6695" instrument_node="">A Neoclassical Realist Theory of the Pursuit of Regional Primacy</span></p></div></div><span data-dcnode-id="6691" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="6689" data-legacy-id="sec5" id="127897150" scrollto-destination="127897150"><span data-dcnode-id="6690" instrument_node="">Neoclassical Realism and Russia's Baltic Policy: Theoretical Expectations</span></h2><span data-dcnode-id="6688" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6686"><span data-dcnode-id="6687" instrument_node="">What does the neoclassical realist theory just described imply for Russia's Baltic policy? First of all, it becomes clear that the Baltic states, despite their small size, are of strategic importance to Russia. A peek at the map shows why. Estonia and Latvia have common land borders with Russia and are situated close to the political heartland of the Russian Federation. Estonia, for example, is less than 160 km from St. Petersburg and no more than 850 km from Moscow. In addition, several important trade arteries and transport corridors run through the Baltic region. Of particular importance here is Lithuania, which serves as a land bridge connecting Russia (via Belarus) with the Kaliningrad exclave. Thus, the baseline expectation is that, for geopolitical reasons alone, Russia wants to have some form of control over the foreign-policy orientation of the Baltic states.</span></p><p class="chapter-para" data-dcnode-id="6684"><span data-dcnode-id="6685" instrument_node="">Second, my neoclassical realist theory suggests that the level of external pressure shapes Russia's strategic behavior toward the Baltic states. Accordingly, as the Baltics moved toward membership in NATO in the late 1990s, one would expect that Russia would have used all means available, including the threat and use of force, to derail this process. Furthermore, one would expect that Russia would have abstained from the direct use of force vis-à-vis the Baltics after they joined NATO, for fear of provoking a major military conflict with the alliance. Finally, one would expect that Moscow would consider launching strikes on the Baltic states, if there were a clear danger that NATO would use their territory for military operations against Russia.</span></p><p class="chapter-para" data-dcnode-id="6682"><span data-dcnode-id="6683" instrument_node="">Third, my neoclassical realist theory suggests that the link between external pressure and Russia's Baltic policy is moderated by variations in state capacity. This means that government authorities in Moscow will be unable to act upon system-level incentives and constraints, if the Russian state lacks extraction capacity and autonomy. Under such circumstances, the level of external pressure has little effect on Moscow's policies in the Baltic region. Instead, Russia's actions are guided by the narrower interests of societal actors.</span></p><p class="chapter-para" data-dcnode-id="6677"><span data-dcnode-id="6681" instrument_node="">The following two sections examine to what extent these expectations measure up to Russia's Baltic policy. Toward that end, I analyze the development of Moscow's behavior vis-à-vis the Baltics over the last two decades. To be clear, the purpose of my analysis is </span><em data-dcnode-id="6679"><span data-dcnode-id="6680" instrument_node="">not</span></em><span data-dcnode-id="6678" instrument_node=""> to provide an exhaustive explanation of the case. This would require a thorough engagement with alternative explanations, the investigation of causal mechanisms, and access to internal government documents that are not available at present. My aim, therefore, is more modest: to illustrate the workings of my neoclassical theory, test its plausibility against the existing empirical evidence, and in the process of doing so, provide a theoretically informed interpretation of Russia's Baltic policy.</span></p><span data-dcnode-id="6676" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="6674" data-legacy-id="sec6" id="127897155" scrollto-destination="127897155"><span data-dcnode-id="6675" instrument_node="">Phase I: Russia's Baltic Policy, 1995–2003</span></h2><span data-dcnode-id="6673" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6667"><span data-dcnode-id="6672" instrument_node="">In the mid-1990s, Western states and organizations began establishing closer ties with the Baltic countries in the political, economic, and military spheres. Russian government officials protested vehemently against these moves. On the ground, however, relatively little happened. As the scholar Raimo </span><span class="xrefLink" data-dcnode-id="6671" id="jumplink-bib84"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6669" data-google-interstitial="false" data-open="bib84" href="javascript:;" reveal-id="bib84"><span data-dcnode-id="6670" instrument_node="">Väyrynen (1999</span></a><span data-dcnode-id="6668" instrument_node="">, 221) noted, “Russia has continued to express its opposition to NATO membership for the Baltic states, but otherwise it has been rather passive in relation to them.” There is, in other words, a twin puzzle: why did Russia not respond more strongly to the budding partnership between the Baltic countries and the West, and how can one explain the discrepancy between Moscow's assertive rhetoric and less assertive actions? As I show in this section, the interplay of growing external pressure and declining state capacity can account for Moscow's contradictory approach.</span></p><span data-dcnode-id="6666" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="6664" data-legacy-id="sec6-1" id="127897157" scrollto-destination="127897157"><span data-dcnode-id="6665" instrument_node="">External Pressure</span></h3><span data-dcnode-id="6663" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6637"><span data-dcnode-id="6662" instrument_node="">All three Baltic states had joined NATO's Partnership for Peace (PfP) program in 1994. In the following years, they participated in a number of NATO-led training exercises, expressed their intent to become full members of the alliance, and engaged in several so-called BALT-projects. These projects aimed at promoting inter-Baltic cooperation but also at creating economic, technological, and military structures in the Baltic states that were interoperable with those of the West (</span><span class="xrefLink" data-dcnode-id="6661" id="jumplink-bib22"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6659" data-google-interstitial="false" data-open="bib22" href="javascript:;" reveal-id="bib22"><span data-dcnode-id="6660" instrument_node="">Grissom 2003</span></a><span data-dcnode-id="6658" instrument_node="">, 20–23; </span><span class="xrefLink" data-dcnode-id="6657" id="jumplink-bib30"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6655" data-google-interstitial="false" data-open="bib30" href="javascript:;" reveal-id="bib30"><span data-dcnode-id="6656" instrument_node="">Huang 2003</span></a><span data-dcnode-id="6654" instrument_node="">, 37–41; </span><span class="xrefLink" data-dcnode-id="6653" id="jumplink-bib34"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6651" data-google-interstitial="false" data-open="bib34" href="javascript:;" reveal-id="bib34"><span data-dcnode-id="6652" instrument_node="">Kramer 2002</span></a><span data-dcnode-id="6650" instrument_node="">, 744–45). The United States, for example, helped to set up a Baltic airspace surveillance system, known as BALTNET, which was “designed to be fully compatible with NATO systems” (</span><span class="xrefLink" data-dcnode-id="6649" id="jumplink-bib30"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6647" data-google-interstitial="false" data-open="bib30" href="javascript:;" reveal-id="bib30"><span data-dcnode-id="6648" instrument_node="">Huang 2003</span></a><span data-dcnode-id="6646" instrument_node="">, 39). In 1998, moreover, Washington signed a Charter of Partnership with the Baltic states, which included a commitment for closer cooperation in the security realm and a promise to support Baltic membership in NATO (</span><span class="xrefLink" data-dcnode-id="6645" id="jumplink-bib2"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6643" data-google-interstitial="false" data-open="bib2" href="javascript:;" reveal-id="bib2"><span data-dcnode-id="6644" instrument_node="">Black 1999</span></a><span data-dcnode-id="6642" instrument_node="">, 260; </span><span class="xrefLink" data-dcnode-id="6641" id="jumplink-bib34"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6639" data-google-interstitial="false" data-open="bib34" href="javascript:;" reveal-id="bib34"><span data-dcnode-id="6640" instrument_node="">Kramer 2002</span></a><span data-dcnode-id="6638" instrument_node="">, 741). Although the Baltic states were not included in the first round of NATO enlargement, they received Membership Action Plans in 1999. Three years later, in November 2002, they were invited to join the alliance.</span></p><p class="chapter-para" data-dcnode-id="6611"><span data-dcnode-id="6636" instrument_node="">Moscow strongly opposed the increasingly close ties between the Baltic states and NATO. Already in 1996, President Yeltsin warned Washington that “the Baltic states’ admission to NATO is absolutely unacceptable. Any steps in that direction would directly challenge Russia's national security interests and undermine European stability and security” (quoted in “Yeltsin Denounces Balts to Clinton </span><span class="xrefLink" data-dcnode-id="6635" id="jumplink-bib87"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6633" data-google-interstitial="false" data-open="bib87" href="javascript:;" reveal-id="bib87"><span data-dcnode-id="6634" instrument_node="">1996</span></a><span data-dcnode-id="6632" instrument_node="">”). The opposition to NATO expansion became official state policy in February 1997, when Moscow issued a document entitled “Russian Policy Guidelines towards the Baltic States.” The document listed an array of political and economic objectives, but it also made clear that the highest priority was to prevent Baltic membership in NATO (</span><span class="xrefLink" data-dcnode-id="6631" id="jumplink-bib26"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6629" data-google-interstitial="false" data-open="bib26" href="javascript:;" reveal-id="bib26"><span data-dcnode-id="6630" instrument_node="">Herd 1999a</span></a><span data-dcnode-id="6628" instrument_node="">, 200–1; </span><span class="xrefLink" data-dcnode-id="6627" id="jumplink-bib50"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6625" data-google-interstitial="false" data-open="bib50" href="javascript:;" reveal-id="bib50"><span data-dcnode-id="6626" instrument_node="">Oldberg 2003</span></a><span data-dcnode-id="6624" instrument_node="">, 10; </span><span class="xrefLink" data-dcnode-id="6623" id="jumplink-bib89"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6621" data-google-interstitial="false" data-open="bib89" href="javascript:;" reveal-id="bib89"><span data-dcnode-id="6622" instrument_node="">Ziugzda 1999</span></a><span data-dcnode-id="6620" instrument_node="">, 7–8). Moreover, both the 1997 and 2000 National Security Concepts explicitly identified the “eastward expansion” of NATO as a threat to Russian security (</span><span class="xrefLink" data-dcnode-id="6619" id="jumplink-bib59"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6617" data-google-interstitial="false" data-open="bib59" href="javascript:;" reveal-id="bib59"><span data-dcnode-id="6618" instrument_node="">RF 1997</span></a><span data-dcnode-id="6616" instrument_node="">, 2 and 8; </span><span class="xrefLink" data-dcnode-id="6615" id="jumplink-bib60"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6613" data-google-interstitial="false" data-open="bib60" href="javascript:;" reveal-id="bib60"><span data-dcnode-id="6614" instrument_node="">RF 2000a</span></a><span data-dcnode-id="6612" instrument_node="">, 5).</span></p><p class="chapter-para" data-dcnode-id="6589"><span data-dcnode-id="6610" instrument_node="">Particularly noteworthy in this context is that opposition to NATO expansion was widely shared across the political spectrum, including communists, nationalists, and liberals (</span><span class="xrefLink" data-dcnode-id="6609" id="jumplink-bib2"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6607" data-google-interstitial="false" data-open="bib2" href="javascript:;" reveal-id="bib2"><span data-dcnode-id="6608" instrument_node="">Black 1999</span></a><span data-dcnode-id="6606" instrument_node="">). Some observers have suggested that this can be explained by deep-seated historical animosities toward the alliance and “lingering Cold War attitudes” (</span><span class="xrefLink" data-dcnode-id="6605" id="jumplink-bib18"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6603" data-google-interstitial="false" data-open="bib18" href="javascript:;" reveal-id="bib18"><span data-dcnode-id="6604" instrument_node="">Gorenburg et al. 2002</span></a><span data-dcnode-id="6602" instrument_node="">, 32 and 33–35). There may be something to it. Above all, however, Moscow's opposition to NATO expansion was driven by geopolitical factors and military-strategic concerns. In the words of then–foreign minister Yevgeny Primakov, “Russia cannot remain indifferent to the factor of distance—the Baltic countries’ proximity to our vital centers. Should NATO advance to new staging grounds, the Russian Federation's major cities would be within striking range of not only strategic missiles, but also tactical aircraft” (quoted in Donaldson and Nogee </span><span class="xrefLink" data-dcnode-id="6601" id="jumplink-bib13"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6599" data-google-interstitial="false" data-open="bib13" href="javascript:;" reveal-id="bib13"><span data-dcnode-id="6600" instrument_node="">2009</span></a><span data-dcnode-id="6598" instrument_node="">, 216). Likewise, the Russian scholar </span><span class="xrefLink" data-dcnode-id="6597" id="jumplink-bib74"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6595" data-google-interstitial="false" data-open="bib74" href="javascript:;" reveal-id="bib74"><span data-dcnode-id="6596" instrument_node="">Nikolai Sokov (1999</span></a><span data-dcnode-id="6594" instrument_node="">, 18), hardly known to be a hardliner, wrote in a commentary for the Atlantic Council, “The Baltic states’ membership in NATO would mean U.S. troops in the immediate vicinity of key Russian political and economic centers, making it particularly vulnerable to air strikes.” Even some Western analysts acknowledged that “tactical aircraft operating from Baltic airfields would be within easy un-refuelled striking distance [of nuclear submarine bases on the Kola Peninsula]. Aircraft based in the Baltic countries would also be within an hour's flying time to political and military command centres in the Moscow and St. Petersburg metro areas” (</span><span class="xrefLink" data-dcnode-id="6593" id="jumplink-bib22"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6591" data-google-interstitial="false" data-open="bib22" href="javascript:;" reveal-id="bib22"><span data-dcnode-id="6592" instrument_node="">Grissom 2003</span></a><span data-dcnode-id="6590" instrument_node="">, 24).</span></p><p class="chapter-para" data-dcnode-id="6579"><span data-dcnode-id="6588" instrument_node="">Western policymakers, for their part, tried to allay Russian fears by asserting that the alliance had no aggressive intentions. In May 1997, moreover, the NATO-Russia Founding Act was signed, which stated that NATO did not intend to deploy significant numbers of troops or nuclear weapons on the territory of new members. Notwithstanding these assurances, policymakers in Moscow remained deeply suspicious. After all, intentions could change and, in the event of a conflict, NATO could rapidly establish forward-operating sites and military infrastructure on the territory of the Baltic states (</span><span class="xrefLink" data-dcnode-id="6587" id="jumplink-bib74"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6585" data-google-interstitial="false" data-open="bib74" href="javascript:;" reveal-id="bib74"><span data-dcnode-id="6586" instrument_node="">Sokov 1999</span></a><span data-dcnode-id="6584" instrument_node="">, 13–15). To quote, once again, then–foreign minister Primakov, “If NATO .&nbsp;.&nbsp;. comes to engulf the territory of the Warsaw Pact, from our point of view, the geopolitical situation will deteriorate. Why? Because intentions change. .&nbsp;.&nbsp;. Obviously I do not believe that NATO will attack us. However, on a hypothetical level a situation might emerge in which we will be forced to act in a way which is not in our best interest” (quoted in </span><span class="xrefLink" data-dcnode-id="6583" id="jumplink-bib83"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6581" data-google-interstitial="false" data-open="bib83" href="javascript:;" reveal-id="bib83"><span data-dcnode-id="6582" instrument_node="">Wolczuk 2003</span></a><span data-dcnode-id="6580" instrument_node="">, 120).</span></p><p class="chapter-para" data-dcnode-id="6577"><span data-dcnode-id="6578" instrument_node="">In short, the cooperation of the Baltic states with the US-led NATO alliance increased the level of external pressure on Russia. Thus, going by a purely structural perspective, one would expect that Moscow resorted to coercive tools and tactics vis-à-vis the Baltics to prevent them from joining the alliance and, if possible, to gain greater influence over their foreign-policy orientation.</span></p><span data-dcnode-id="6576" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="6574" data-legacy-id="sec6-2" id="127897163" scrollto-destination="127897163"><span data-dcnode-id="6575" instrument_node="">State Capacity</span></h3><span data-dcnode-id="6573" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6551"><span data-dcnode-id="6572" instrument_node="">On the domestic level, the Russian state was marred by a number of problems throughout the 1990s. One of the most serious problems was the inability to raise revenues and collect taxes. As one scholar pointed out, “In 1996 only 16 percent of companies and organizations were without serious tax trespasses and 34 percent did not pay taxes at all” (</span><span class="xrefLink" data-dcnode-id="6571" id="jumplink-bib57"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6569" data-google-interstitial="false" data-open="bib57" href="javascript:;" reveal-id="bib57"><span data-dcnode-id="6570" instrument_node="">Puheloinen 1999</span></a><span data-dcnode-id="6568" instrument_node="">, 31). Moreover, and partly as a result of this, the ratio of tax revenues-to-GDP declined from 20.3 percent in 1992 to 9.2 percent in 1998, even though Russia's economy substantially contracted over the same period (</span><span class="xrefLink" data-dcnode-id="6567" id="jumplink-bib53"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6565" data-google-interstitial="false" data-open="bib53" href="javascript:;" reveal-id="bib53"><span data-dcnode-id="6566" instrument_node="">Orban 2008</span></a><span data-dcnode-id="6564" instrument_node="">, 26). Meanwhile, the work of tax inspectors had become an increasingly dangerous occupation in Russia. “In 1996 alone,” one report noted, “26 tax collectors were killed, 74 wounded, 6 kidnapped, and 41 burned out of their homes” (</span><span class="xrefLink" data-dcnode-id="6563" id="jumplink-bib7"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6561" data-google-interstitial="false" data-open="bib7" href="javascript:;" reveal-id="bib7"><span data-dcnode-id="6562" instrument_node="">Chang 1999</span></a><span data-dcnode-id="6560" instrument_node="">, 80). In short, the tax-collection system was in tatters. On top of that, there was widespread capital flight. As a result, government authorities in Moscow lacked resources to finance major policy programs (</span><span class="xrefLink" data-dcnode-id="6559" id="jumplink-bib52"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6557" data-google-interstitial="false" data-open="bib52" href="javascript:;" reveal-id="bib52"><span data-dcnode-id="6558" instrument_node="">Oliker and Charlick-Paley 2002</span></a><span data-dcnode-id="6556" instrument_node="">, 27–33; </span><span class="xrefLink" data-dcnode-id="6555" id="jumplink-bib79"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6553" data-google-interstitial="false" data-open="bib79" href="javascript:;" reveal-id="bib79"><span data-dcnode-id="6554" instrument_node="">Treisman 1998</span></a><span data-dcnode-id="6552" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="6541"><span data-dcnode-id="6550" instrument_node="">Equally detrimental was the lack of state autonomy. In the mid-1990s, Russian business tycoons—known as “oligarchs”—acquired control of many of the country's most lucrative assets. In parallel, they began expanding their influence into the political sphere. Of course, lobbying activities are common to most countries in the world. In Russia, however, the problem was that some oligarchs had become so powerful that they were able to capture parts of the state machinery. For instance, Vladimir Potanin was appointed to serve as Russia's first deputy prime minister in 1997. Another case in point is Boris Berezovsky, who became deputy secretary of the Russian Security Council. In effect, business tycoons played an important role in the formation of Russian state policy (McFaul </span><span class="xrefLink" data-dcnode-id="6549" id="jumplink-bib47"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6547" data-google-interstitial="false" data-open="bib47" href="javascript:;" reveal-id="bib47"><span data-dcnode-id="6548" instrument_node="">1998</span></a><span data-dcnode-id="6546" instrument_node="">, 318–19; </span><span class="xrefLink" data-dcnode-id="6545" id="jumplink-bib68"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6543" data-google-interstitial="false" data-open="bib68" href="javascript:;" reveal-id="bib68"><span data-dcnode-id="6544" instrument_node="">Schroder 1999</span></a><span data-dcnode-id="6542" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="6531"><span data-dcnode-id="6540" instrument_node="">In addition, Russia fragmented along regional lines. The Chechnya problem was merely the most obvious example. A number of regional entities within Russia sat up their own border posts and began establishing state-like structures. Some regions even created “ministries” for external relations and began conducting their own, semi-independent foreign policies. Tatarstan, for instance, refused to send its conscripts outside the republic and supported NATO's military intervention in Kosovo (</span><span class="xrefLink" data-dcnode-id="6539" id="jumplink-bib52"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6537" data-google-interstitial="false" data-open="bib52" href="javascript:;" reveal-id="bib52"><span data-dcnode-id="6538" instrument_node="">Oliker and Charlick-Paley 2002</span></a><span data-dcnode-id="6536" instrument_node="">, 11–16; </span><span class="xrefLink" data-dcnode-id="6535" id="jumplink-bib55"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6533" data-google-interstitial="false" data-open="bib55" href="javascript:;" reveal-id="bib55"><span data-dcnode-id="6534" instrument_node="">Perovic 2000</span></a><span data-dcnode-id="6532" instrument_node="">). In short, regional entities undermined the authority and autonomy of the foreign policy executive in Moscow.</span></p><span data-dcnode-id="6530" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="6528" data-legacy-id="sec6-3" id="127897167" scrollto-destination="127897167"><span data-dcnode-id="6529" instrument_node="">Russia's Baltic Policy in Action</span></h3><span data-dcnode-id="6527" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6521"><span data-dcnode-id="6526" instrument_node="">Defense planners in Moscow stressed that the Baltic region was of utmost geopolitical importance to Russia, both because of military installations in the area and because of lines of communication and trade routes (</span><span class="xrefLink" data-dcnode-id="6525" id="jumplink-bib57"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6523" data-google-interstitial="false" data-open="bib57" href="javascript:;" reveal-id="bib57"><span data-dcnode-id="6524" instrument_node="">Puheloinen 1999</span></a><span data-dcnode-id="6522" instrument_node="">, 55–66 and 74–80). Accordingly, they wanted to maintain some influence over the foreign-policy orientation of the Baltic states. Members of the Russian foreign policy executive proposed a number of steps to achieve this aim.</span></p><p class="chapter-para" data-dcnode-id="6487"><span data-dcnode-id="6520" instrument_node="">In 1997, for instance, President Yeltsin laid out a plan according to which Russia would provide security guarantees to the Baltic states. In return, they should pledge to abstain from joining any military bloc or organization, effectively leading to a Finlandization of the area (</span><span class="xrefLink" data-dcnode-id="6519" id="jumplink-bib2"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6517" data-google-interstitial="false" data-open="bib2" href="javascript:;" reveal-id="bib2"><span data-dcnode-id="6518" instrument_node="">Black 1999</span></a><span data-dcnode-id="6516" instrument_node="">, 256–58; </span><span class="xrefLink" data-dcnode-id="6515" id="jumplink-bib26"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6513" data-google-interstitial="false" data-open="bib26" href="javascript:;" reveal-id="bib26"><span data-dcnode-id="6514" instrument_node="">Herd 1999a</span></a><span data-dcnode-id="6512" instrument_node="">, 201–2; </span><span class="xrefLink" data-dcnode-id="6511" id="jumplink-bib72"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6509" data-google-interstitial="false" data-open="bib72" href="javascript:;" reveal-id="bib72"><span data-dcnode-id="6510" instrument_node="">Sleivyte 2010</span></a><span data-dcnode-id="6508" instrument_node="">, 129–30). In parallel, Moscow issued thinly-veiled threats. For example, Russian Deputy Foreign Minister Nikolai Afanasievski warned that a Baltic bid for NATO membership “would not serve the interests of their security, and on the contrary would create immense tensions” (quoted in </span><span class="xrefLink" data-dcnode-id="6507" id="jumplink-bib89"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6505" data-google-interstitial="false" data-open="bib89" href="javascript:;" reveal-id="bib89"><span data-dcnode-id="6506" instrument_node="">Ziugzda 1999</span></a><span data-dcnode-id="6504" instrument_node="">, 9). Members of the Russian foreign policy executive also threatened to station nuclear weapons in Kaliningrad and beef up the Baltic Sea Fleet. According to documents leaked to the press, there were even contingency plans to invade the Baltics if they joined NATO (</span><span class="xrefLink" data-dcnode-id="6503" id="jumplink-bib10"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6501" data-google-interstitial="false" data-open="bib10" href="javascript:;" reveal-id="bib10"><span data-dcnode-id="6502" instrument_node="">Clemens 2001</span></a><span data-dcnode-id="6500" instrument_node="">, 188–89; </span><span class="xrefLink" data-dcnode-id="6499" id="jumplink-bib40"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6497" data-google-interstitial="false" data-open="bib40" href="javascript:;" reveal-id="bib40"><span data-dcnode-id="6498" instrument_node="">Lieven 1996</span></a><span data-dcnode-id="6496" instrument_node="">, 175; </span><span class="xrefLink" data-dcnode-id="6495" id="jumplink-bib71"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6493" data-google-interstitial="false" data-open="bib71" href="javascript:;" reveal-id="bib71"><span data-dcnode-id="6494" instrument_node="">Sergounin 1997</span></a><span data-dcnode-id="6492" instrument_node="">, 333–34; </span><span class="xrefLink" data-dcnode-id="6491" id="jumplink-bib72"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6489" data-google-interstitial="false" data-open="bib72" href="javascript:;" reveal-id="bib72"><span data-dcnode-id="6490" instrument_node="">Sleivyte 2010</span></a><span data-dcnode-id="6488" instrument_node="">, 132–33).</span></p><p class="chapter-para" data-dcnode-id="6473"><span data-dcnode-id="6486" instrument_node="">The assertive rhetoric of Russian officials corresponds well with the growing level of external pressure. Words, however, were not matched by deeds. To be sure, Russia brought to bear some economic pressure on the Baltics. Moreover, Moscow stalled border treaties with Latvia and Estonia and missed no opportunity to complain about the mistreatment of Russian-speaking communities there. This had partly to do with genuine concern for its compatriots and partly with instrumental reasons. After all, Russian strategists knew fairly well that countries with unresolved border disputes or ethnic conflicts were unlikely to be included into NATO (</span><span class="xrefLink" data-dcnode-id="6485" id="jumplink-bib50"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6483" data-google-interstitial="false" data-open="bib50" href="javascript:;" reveal-id="bib50"><span data-dcnode-id="6484" instrument_node="">Oldberg 2003</span></a><span data-dcnode-id="6482" instrument_node="">, 21–23 and 33–34; </span><span class="xrefLink" data-dcnode-id="6481" id="jumplink-bib74"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6479" data-google-in
