terstitial="false" data-open="bib74" href="javascript:;" reveal-id="bib74"><span data-dcnode-id="6480" instrument_node="">Sokov 1999</span></a><span data-dcnode-id="6478" instrument_node="">, 12; </span><span class="xrefLink" data-dcnode-id="6477" id="jumplink-bib84"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6475" data-google-interstitial="false" data-open="bib84" href="javascript:;" reveal-id="bib84"><span data-dcnode-id="6476" instrument_node="">Väyrynen 1999</span></a><span data-dcnode-id="6474" instrument_node="">, 221). For the most part, however, relatively little happened. Indeed, as the level of external pressure increased and the Baltics established ever-closer ties with NATO in the late 1990s, Russia's behavior became more inchoate and less assertive. This can be explained by the lack of state capacity, which impaired Russia's ability to pursue an assertive policy vis-à-vis the Baltics in three major ways.</span></p><p class="chapter-para" data-dcnode-id="6447"><span data-dcnode-id="6472" instrument_node="">First of all, the fall in tax income amplified the need for military cutbacks and downsizing. In 1998, for example, Moscow reduced its troops in the St. Petersburg Military District and the country's northwestern region, which abuts the Baltic area, by more than 40 percent. Moscow also considerably reduced the size of Russian forces stationed in Kaliningrad (</span><span class="xrefLink" data-dcnode-id="6471" id="jumplink-bib16"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6469" data-google-interstitial="false" data-open="bib16" href="javascript:;" reveal-id="bib16"><span data-dcnode-id="6470" instrument_node="">Freudenstein 2015</span></a><span data-dcnode-id="6468" instrument_node="">, 121; </span><span class="xrefLink" data-dcnode-id="6467" id="jumplink-bib50"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6465" data-google-interstitial="false" data-open="bib50" href="javascript:;" reveal-id="bib50"><span data-dcnode-id="6466" instrument_node="">Oldberg 2003</span></a><span data-dcnode-id="6464" instrument_node="">, 30; </span><span class="xrefLink" data-dcnode-id="6463" id="jumplink-bib72"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6461" data-google-interstitial="false" data-open="bib72" href="javascript:;" reveal-id="bib72"><span data-dcnode-id="6462" instrument_node="">Sleivyte 2010</span></a><span data-dcnode-id="6460" instrument_node="">, 130; </span><span class="xrefLink" data-dcnode-id="6459" id="jumplink-bib89"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6457" data-google-interstitial="false" data-open="bib89" href="javascript:;" reveal-id="bib89"><span data-dcnode-id="6458" instrument_node="">Ziugzda 1999</span></a><span data-dcnode-id="6456" instrument_node="">, 12–13). Of course, the sorry state of Russia's economy must be taken into account as well. However, in terms of material capabilities and power resources—such as money and manpower—Russia hovered like a giant over the Baltic states. The main problem was that the Russian state lacked the capacity to extract these resources from society. This led to a “hollowing out” of the military. As one observer reported, “In 1997 the military received only 56 percent of its budgeted appropriation. It was given only 43 percent of its budget allocation for medical services, 41 percent of monies earmarked for clothing and equipment, and only 50 percent of what was promised to feed its soldiers” (</span><span class="xrefLink" data-dcnode-id="6455" id="jumplink-bib28"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6453" data-google-interstitial="false" data-open="bib28" href="javascript:;" reveal-id="bib28"><span data-dcnode-id="6454" instrument_node="">Herspring 1998</span></a><span data-dcnode-id="6452" instrument_node="">, 325). As a result, Russia's fighting power and its ability to conduct military operations was limited. Indeed, in November 1998, the Duma Defense Committee concluded that “the armed forces are in the deepest imaginable crisis, which is effectively full-scale disintegration, and unable .&nbsp;.&nbsp;. to carry out strategic operations” (quoted in </span><span class="xrefLink" data-dcnode-id="6451" id="jumplink-bib27"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6449" data-google-interstitial="false" data-open="bib27" href="javascript:;" reveal-id="bib27"><span data-dcnode-id="6450" instrument_node="">Herd 1999b</span></a><span data-dcnode-id="6448" instrument_node="">, 265). In short, weak extraction capacity hampered Russia's ability to exert military pressure on the Baltic states.</span></p><p class="chapter-para" data-dcnode-id="6429"><span data-dcnode-id="6446" instrument_node="">Second, oligarchs and their financial-industrial groups affected and, at times, counteracted the Kremlin's policy toward the Baltics. In the summer of 1998, for example, Moscow decided to impose sanctions on Latvia. Many Russian companies, however, continued to trade with Latvia and thus undermined official state policy (</span><span class="xrefLink" data-dcnode-id="6445" id="jumplink-bib74"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6443" data-google-interstitial="false" data-open="bib74" href="javascript:;" reveal-id="bib74"><span data-dcnode-id="6444" instrument_node="">Sokov 1999</span></a><span data-dcnode-id="6442" instrument_node="">, 28–30). Another example occurred in late 1998, when the Lithuanian government decided to sell a major stake in the Mazeikiai refinery complex, the largest in the Baltics, to the US company Williams International and not to Russia's state-affiliated company Lukoil. The Kremlin responded by cutting off oil supplies to Lithuania. Yet, at the same time, Russia's largest private energy company, Yukos, began cooperating with Williams International and expanded its operations in Lithuania (</span><span class="xrefLink" data-dcnode-id="6441" id="jumplink-bib36"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6439" data-google-interstitial="false" data-open="bib36" href="javascript:;" reveal-id="bib36"><span data-dcnode-id="6440" instrument_node="">Krickus 2006</span></a><span data-dcnode-id="6438" instrument_node="">, 23–25; </span><span class="xrefLink" data-dcnode-id="6437" id="jumplink-bib50"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6435" data-google-interstitial="false" data-open="bib50" href="javascript:;" reveal-id="bib50"><span data-dcnode-id="6436" instrument_node="">Oldberg 2003</span></a><span data-dcnode-id="6434" instrument_node="">, 56–59). The details of the case are complex, but the larger point is simple: oligarch-owned energy companies acted sometimes at cross-purposes with Russia's state-affiliated companies in neighboring countries. This undermined Moscow's ability to exert economic pressure on the Baltics (</span><span class="xrefLink" data-dcnode-id="6433" id="jumplink-bib26"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6431" data-google-interstitial="false" data-open="bib26" href="javascript:;" reveal-id="bib26"><span data-dcnode-id="6432" instrument_node="">Herd 1999a</span></a><span data-dcnode-id="6430" instrument_node="">, 202–3).</span></p><p class="chapter-para" data-dcnode-id="6423"><span data-dcnode-id="6428" instrument_node="">Third, Russia's Baltic policy was impaired by the decentralization of power. Regional entities in northwestern Russia (Pskov, Novgorod, Leningrad, and Karelia) began to develop their own foreign policies. Some regions even “signed their own agreements with the Baltic states” (</span><span class="xrefLink" data-dcnode-id="6427" id="jumplink-bib50"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6425" data-google-interstitial="false" data-open="bib50" href="javascript:;" reveal-id="bib50"><span data-dcnode-id="6426" instrument_node="">Olberg 2003</span></a><span data-dcnode-id="6424" instrument_node="">, 58). Needless to say, this made it very difficult for government authorities in Moscow to pursue a cohesive and assertive policy in the Baltic area.</span></p><p class="chapter-para" data-dcnode-id="6405"><span data-dcnode-id="6422" instrument_node="">The domestic constraints that affected Moscow's Baltic policy were reflected in Russia's 1997 Security Concept. While the expansion of extraregional powers toward Russian borders figured prominently in the document, as mentioned above, the concept stressed that the most pressing and immediate threats facing Russia “are of predominantly internal nature” (</span><span class="xrefLink" data-dcnode-id="6421" id="jumplink-bib59"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6419" data-google-interstitial="false" data-open="bib59" href="javascript:;" reveal-id="bib59"><span data-dcnode-id="6420" instrument_node="">RF 1997</span></a><span data-dcnode-id="6418" instrument_node="">, 9). Accordingly, the incoming Putin administration committed itself to solve the country's internal problems and placed a high priority on strengthening the Russian state apparatus. At least until 2003, however, Russia remained weak in terms of extraction capacity and state autonomy. Moreover, the efforts to rebuild the state diverted attention and resources from foreign-policy issues. The perhaps most graphic example is the second Chechen war, which tied up not only many of Russia's most capable fighting units but also money and political capital. Thus, when NATO announced the admission of the three Baltic states in November 2002, many Kremlin officials kept a relatively low profile (</span><span class="xrefLink" data-dcnode-id="6417" id="jumplink-bib18"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6415" data-google-interstitial="false" data-open="bib18" href="javascript:;" reveal-id="bib18"><span data-dcnode-id="6416" instrument_node="">Gorenburg et al. 2002</span></a><span data-dcnode-id="6414" instrument_node="">, 35–36; </span><span class="xrefLink" data-dcnode-id="6413" id="jumplink-bib34"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6411" data-google-interstitial="false" data-open="bib34" href="javascript:;" reveal-id="bib34"><span data-dcnode-id="6412" instrument_node="">Kramer 2002</span></a><span data-dcnode-id="6410" instrument_node="">, 747–749; </span><span class="xrefLink" data-dcnode-id="6409" id="jumplink-bib50"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6407" data-google-interstitial="false" data-open="bib50" href="javascript:;" reveal-id="bib50"><span data-dcnode-id="6408" instrument_node="">Oldberg 2003</span></a><span data-dcnode-id="6406" instrument_node="">, 26–27).</span></p><p class="chapter-para" data-dcnode-id="6403"><span data-dcnode-id="6404" instrument_node="">Summing up: Lack of state capacity hobbled Moscow's attempts to pursue a coherent and combative policy toward the Baltics in the face of growing external pressure. Instead, drift and self-contradictions characterized Russian behavior throughout the latter half of the 1990s and early 2000s. This, however, would soon change.</span></p><span data-dcnode-id="6402" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="6400" data-legacy-id="sec7" id="127897176" scrollto-destination="127897176"><span data-dcnode-id="6401" instrument_node="">Phase II: Russia's Baltic Policy, 2004–Present</span></h2><span data-dcnode-id="6399" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6397"><span data-dcnode-id="6398" instrument_node="">From 2004 onward, Russia began to systematically apply a number of policy tools—including military provocations, economic sanctions, propaganda campaigns, cyberattacks, and domestic political interferences—to destabilize the Baltic states. Yet, at the same time, Russia has abstained from direct military actions. How can one explain this pattern of behavior? The answer, I argue, is found in the interplay of external pressure and the strengthening of Russian state capacity.</span></p><span data-dcnode-id="6396" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="6394" data-legacy-id="sec7-1" id="127897178" scrollto-destination="127897178"><span data-dcnode-id="6395" instrument_node="">External Pressure</span></h3><span data-dcnode-id="6393" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6379"><span data-dcnode-id="6392" instrument_node="">In 2004, the Baltic states officially joined NATO, much to Moscow's dismay. Russian defense officials were particularly concerned about the possibility that NATO would construct military facilities in the region. This concern was expressed repeatedly in security planning and defense documents. For example, the 2000 National Security Concept identified as a main threat “the possible emergence of foreign military bases and major military presences in the immediate proximity of Russian borders” (</span><span class="xrefLink" data-dcnode-id="6391" id="jumplink-bib60"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6389" data-google-interstitial="false" data-open="bib60" href="javascript:;" reveal-id="bib60"><span data-dcnode-id="6390" instrument_node="">RF 2000a</span></a><span data-dcnode-id="6388" instrument_node="">, 5). Likewise, the 2000 Military Doctrine warned of the “creation (buildup) of groups of troops .&nbsp;.&nbsp;. close to the Russian Federation's state border” (</span><span class="xrefLink" data-dcnode-id="6387" id="jumplink-bib61"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6385" data-google-interstitial="false" data-open="bib61" href="javascript:;" reveal-id="bib61"><span data-dcnode-id="6386" instrument_node="">RF 2000b</span></a><span data-dcnode-id="6384" instrument_node="">, 3). Similar threat assessments can be found in subsequent Military Doctrines and National Security Concepts. It comes as no surprise, therefore, that Moscow emphasized in the run-up to NATO's 2004 enlargement that it would “not tolerate the US-led military alliance stationing troops or equipment in the Baltic states” (</span><span class="xrefLink" data-dcnode-id="6383" id="jumplink-bib12"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6381" data-google-interstitial="false" data-open="bib12" href="javascript:;" reveal-id="bib12"><span data-dcnode-id="6382" instrument_node="">Dempsey 2004</span></a><span data-dcnode-id="6380" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="6369"><span data-dcnode-id="6378" instrument_node="">In accordance with the Founding Act, NATO refrained from deploying substantial combat forces in the Baltic states. This helped to allay some of the worst Russian fears. Nonetheless, after the Baltic states had joined the alliance, NATO immediately launched the Baltic Air Policing mission and stationed a handful of fighter jets at the Siauliai airbase in northern Lithuania. Furthermore, NATO installed in all three Baltic states modern air surveillance and radar systems that “can look deep into Russia” (</span><span class="xrefLink" data-dcnode-id="6377" id="jumplink-bib72"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6375" data-google-interstitial="false" data-open="bib72" href="javascript:;" reveal-id="bib72"><span data-dcnode-id="6376" instrument_node="">Sleivyte 2010</span></a><span data-dcnode-id="6374" instrument_node="">, 150). Russian policymakers protested vocally against these moves. To be clear, government officials in Moscow did not expect that NATO would attack their country “tomorrow.” The concern was that the alliance, in the event of a crisis, could use the Baltic region as a staging area for military operations against Russia (</span><span class="xrefLink" data-dcnode-id="6373" id="jumplink-bib72"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6371" data-google-interstitial="false" data-open="bib72" href="javascript:;" reveal-id="bib72"><span data-dcnode-id="6372" instrument_node="">Sleivyte 2010</span></a><span data-dcnode-id="6370" instrument_node="">, 133–34).</span></p><p class="chapter-para" data-dcnode-id="6367"><span data-dcnode-id="6368" instrument_node="">From a military-strategic perspective, the Baltics’ entry into NATO undoubtedly increased Russia's vulnerabilities and limited its possibilities to project power into the Baltic Sea region. To put it into the terms of my neoclassical realist theory, the level of external pressure was high. But, at the same time, Baltic membership in NATO meant that Estonia, Latvia, and Lithuania were now covered by the alliance's Article V collective defense provision, according to which an attack on one member is considered an attack on all. In other words, the Baltics had obtained a de facto security guarantee from a major extraregional power: the United States. This provided a strong disincentive for Russia to apply direct military force against the Baltics—more on which below.</span></p><span data-dcnode-id="6366" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="6364" data-legacy-id="sec7-2" id="127897182" scrollto-destination="127897182"><span data-dcnode-id="6365" instrument_node="">State Capacity</span></h3><span data-dcnode-id="6363" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6361"><span data-dcnode-id="6362" instrument_node="">As noted in the previous section, the rebuilding of the Russian state became the top priority during the first term of Putin's presidency. Toward this end, the Putin administration adopted a three-part strategy.</span></p><p class="chapter-para" data-dcnode-id="6343"><span data-dcnode-id="6360" instrument_node="">First, the Putin administration worked hard to strengthen the state's extraction capacity. Among other things, it introduced a new tax code; it removed tax concessions that had been granted to regional entities during the Yeltsin years; and it restructured the Federal Tax Service. As a result, the ability of the state to collect taxes improved greatly (</span><span class="xrefLink" data-dcnode-id="6359" id="jumplink-bib52"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6357" data-google-interstitial="false" data-open="bib52" href="javascript:;" reveal-id="bib52"><span data-dcnode-id="6358" instrument_node="">Oliker and Charlick-Paley 2002</span></a><span data-dcnode-id="6356" instrument_node="">, 19; </span><span class="xrefLink" data-dcnode-id="6355" id="jumplink-bib81"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6353" data-google-interstitial="false" data-open="bib81" href="javascript:;" reveal-id="bib81"><span data-dcnode-id="6354" instrument_node="">Tsygankov 2014</span></a><span data-dcnode-id="6352" instrument_node="">, 118–19; </span><span class="xrefLink" data-dcnode-id="6351" id="jumplink-bib86"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6349" data-google-interstitial="false" data-open="bib86" href="javascript:;" reveal-id="bib86"><span data-dcnode-id="6350" instrument_node="">Yakovlev 2006</span></a><span data-dcnode-id="6348" instrument_node="">, 1042–43). According to one statistic, the ratio of tax revenues-to-GDP increased from 9.2 percent in 1998 to 24.5 percent in 2006 (</span><span class="xrefLink" data-dcnode-id="6347" id="jumplink-bib53"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6345" data-google-interstitial="false" data-open="bib53" href="javascript:;" reveal-id="bib53"><span data-dcnode-id="6346" instrument_node="">Orban 2008</span></a><span data-dcnode-id="6344" instrument_node="">, 26).</span></p><p class="chapter-para" data-dcnode-id="6329"><span data-dcnode-id="6342" instrument_node="">Second, the Putin administration took several steps to increase the Kremlin's control over regional entities. For example, it divided the country's 89 regions into seven super-districts headed by presidential envoys; it reformed the Federation Council (the upper house of the Russian parliament); and it introduced a controversial law that allowed the Russian president to appoint governors. Some of these measures were more successful than others. Overall, however, there is no question that Putin's reforms contributed to strengthen the federal center vis-à-vis the regions (</span><span class="xrefLink" data-dcnode-id="6341" id="jumplink-bib52"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6339" data-google-interstitial="false" data-open="bib52" href="javascript:;" reveal-id="bib52"><span data-dcnode-id="6340" instrument_node="">Oliker and Charlick-Paley 2002</span></a><span data-dcnode-id="6338" instrument_node="">, 16–20; </span><span class="xrefLink" data-dcnode-id="6337" id="jumplink-bib66"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6335" data-google-interstitial="false" data-open="bib66" href="javascript:;" reveal-id="bib66"><span data-dcnode-id="6336" instrument_node="">Ross 2005</span></a><span data-dcnode-id="6334" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="6333" id="jumplink-bib81"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6331" data-google-interstitial="false" data-open="bib81" href="javascript:;" reveal-id="bib81"><span data-dcnode-id="6332" instrument_node="">Tsygankov 2014</span></a><span data-dcnode-id="6330" instrument_node="">, 109–11).</span></p><p class="chapter-para" data-dcnode-id="6307"><span data-dcnode-id="6328" instrument_node="">Third, the Putin administration reined in the oligarchs, at least those not loyal to the Kremlin. The best example is the prosecution of Mikhail Khodorkovsky and the dismemberment of his energy empire Yukos (</span><span class="xrefLink" data-dcnode-id="6327" id="jumplink-bib78"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6325" data-google-interstitial="false" data-open="bib78" href="javascript:;" reveal-id="bib78"><span data-dcnode-id="6326" instrument_node="">Tompson 2005</span></a><span data-dcnode-id="6324" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="6323" id="jumplink-bib81"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6321" data-google-interstitial="false" data-open="bib81" href="javascript:;" reveal-id="bib81"><span data-dcnode-id="6322" instrument_node="">Tsygankov 2014</span></a><span data-dcnode-id="6320" instrument_node="">, 106 and 120–25). Relatedly, Putin and his team sought to reassert state control over strategic branches of the economy—including energy production, arms manufacturing, aerospace, and mining. To that end, the Kremlin placed representatives on the boards of the country's largest companies and corporations. This prompted one observer to quip that “state capture gave way to business capture” (</span><span class="xrefLink" data-dcnode-id="6319" id="jumplink-bib67"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6317" data-google-interstitial="false" data-open="bib67" href="javascript:;" reveal-id="bib67"><span data-dcnode-id="6318" instrument_node="">Sakwa 2008</span></a><span data-dcnode-id="6316" instrument_node="">, 189; also see </span><span class="xrefLink" data-dcnode-id="6315" id="jumplink-bib23"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6313" data-google-interstitial="false" data-open="bib23" href="javascript:;" reveal-id="bib23"><span data-dcnode-id="6314" instrument_node="">Hanson and Teague 2005</span></a><span data-dcnode-id="6312" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="6311" id="jumplink-bib86"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6309" data-google-interstitial="false" data-open="bib86" href="javascript:;" reveal-id="bib86"><span data-dcnode-id="6310" instrument_node="">Yakovlev 2006</span></a><span data-dcnode-id="6308" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="6297"><span data-dcnode-id="6306" instrument_node="">By introducing these measures, many of which had an authoritarian ring, the Putin administration managed to strengthen the Russian state in a relatively short period of time. There is no denying that Putin's state-building project was driven in part by the effort to consolidate his personal power. As the late Charles </span><span class="xrefLink" data-dcnode-id="6305" id="jumplink-bib77"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6303" data-google-interstitial="false" data-open="bib77" href="javascript:;" reveal-id="bib77"><span data-dcnode-id="6304" instrument_node="">Tilly (2007</span></a><span data-dcnode-id="6302" instrument_node="">, 137) put it, “Putin's regime was aggressively expanding state capacity as it squeezed out democracy.” Indeed, some scholars have suggested that Putin's turn toward authoritarianism is the root cause of Moscow's increasingly assertive policies in the post-Soviet space (see, e.g., </span><span class="xrefLink" data-dcnode-id="6301" id="jumplink-bib1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6299" data-google-interstitial="false" data-open="bib1" href="javascript:;" reveal-id="bib1"><span data-dcnode-id="6300" instrument_node="">Ambrosio 2009</span></a><span data-dcnode-id="6298" instrument_node="">). The argument advanced here is different. Putin's authoritarian tendencies are not the root cause but rather a facilitating factor, in the sense that they have allowed the Russian government to rebuild state capacity within a short time span. This, in turn, has enabled Moscow to act upon external pressures and opportunities in a more systematic fashion.</span></p><span data-dcnode-id="6296" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="6294" data-legacy-id="sec7-3" id="127897189" scrollto-destination="127897189"><span data-dcnode-id="6295" instrument_node="">Russia's Baltic Policy in Action</span></h3><span data-dcnode-id="6293" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6287"><span data-dcnode-id="6292" instrument_node="">The Putin administration needed the first years in office to strengthen the Russian state. As described above, the Kremlin's policies in the Baltics remained incoherent during this time. By around 2004, however, the state had become a more unified actor and was able to curtail the international activities of Russia's regions. Especially interesting for the purposes of this paper, Foreign Minister Sergey Lavrov explicitly “warned the leaders of Russian regions not to pursue any relations with the Baltic States that would not be at first endorsed by Moscow” (</span><span class="xrefLink" data-dcnode-id="6291" id="jumplink-bib72"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6289" data-google-interstitial="false" data-open="bib72" href="javascript:;" reveal-id="bib72"><span data-dcnode-id="6290" instrument_node="">Sleivyte 2010</span></a><span data-dcnode-id="6288" instrument_node="">, 161). Furthermore, the Russian state curtailed the influence of oligarchs. This enabled the Kremlin to better coordinate the activities between private and state-run businesses in the Baltic area. Finally, the increase in extraction capacity meant that the central government had more financial resources at its disposal to fund major policy programs. Among other things, it led to a substantial increase in defense spending, which laid the foundation for the rebuilding and modernization of the Russian military.</span></p><p class="chapter-para" data-dcnode-id="6285"><span data-dcnode-id="6286" instrument_node="">There can be no doubt that Russia had the capacity to conduct military operations against the Baltics in the latter half of the 2000s. The problem was that the Baltics had used the window of opportunity provided by Russia's internal weakness in the previous years to join NATO. Of course, many Balts have questioned the political will of Washington and other Western governments to honor their treaty obligations and defend the Baltic states in the event of a Russian attack. From Moscow's perspective, however, the calculus is different. There is a nontrivial chance (or perhaps better, risk) that military operations against the Baltics—either direct or Crimea-style—will lead to a major confrontation with NATO. Needless to say, this would be extremely costly and dangerous for Russia. After all, NATO is far superior to Russia in terms of economic and military capabilities.</span></p><p class="chapter-para" data-dcnode-id="6283"><span data-dcnode-id="6284" instrument_node="">In short, the Baltic membership in NATO made the application of military means very risky. Hence, although there was a high level of external pressure, Moscow refrained from the use of force. Instead, it began pursuing a four-pronged approach toward the Baltics to regain some influence.</span></p><p class="chapter-para" data-dcnode-id="6261"><span data-dcnode-id="6282" instrument_node="">First of all, Moscow expanded its support for pro-Russian parties in the area. In Estonia, it cultivated close ties with the Center Party, which represents large sections of the country's Russian-speaking community. For instance, state-connected companies like Russian Railways are believed to have provided campaign funds to Edgar Savisaar, who until recently was the Center Party's leader and mayor of Tallinn (</span><span class="xrefLink" data-dcnode-id="6281" id="jumplink-bib21"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6279" data-google-interstitial="false" data-open="bib21" href="javascript:;" reveal-id="bib21"><span data-dcnode-id="6280" instrument_node="">Grigas 2012</span></a><span data-dcnode-id="6278" instrument_node="">, 12). Moreover, already in 2004, the Kremlin's United Russia party signed a cooperation agreement with the Center Party (</span><span class="xrefLink" data-dcnode-id="6277" id="jumplink-bib5"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6275" data-google-interstitial="false" data-open="bib5" href="javascript:;" reveal-id="bib5"><span data-dcnode-id="6276" instrument_node="">Bulakh et al. 2014</span></a><span data-dcnode-id="6274" instrument_node="">, 49–52). In Latvia, United Russia signed a cooperation agreement with the center-left Harmony party. Moscow is also believed to support the pro-Russian fringe party “Latvian Russian Union” (</span><span class="xrefLink" data-dcnode-id="6273" id="jumplink-bib46"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6271" data-google-interstitial="false" data-open="bib46" href="javascript:;" reveal-id="bib46"><span data-dcnode-id="6272" instrument_node="">McDonald-Gibson 2014</span></a><span data-dcnode-id="6270" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="6269" id="jumplink-bib37"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6267" data-google-interstitial="false" data-open="bib37" href="javascript:;" reveal-id="bib37"><span data-dcnode-id="6268" instrument_node="">Kudors 2014</span></a><span data-dcnode-id="6266" instrument_node="">, 76 and 82–84). In Lithuania, which has no sizeable Russian community, Moscow has extended logistical and financial support to the country's Polish minority party. This indicates that not only ethnonationalist sentiments but also larger politico-strategic interests are behind Russia's meddling in the domestic-political affairs of the Baltic countries (</span><span class="xrefLink" data-dcnode-id="6265" id="jumplink-bib43"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6263" data-google-interstitial="false" data-open="bib43" href="javascript:;" reveal-id="bib43"><span data-dcnode-id="6264" instrument_node="">Maliukevicius 2014</span></a><span data-dcnode-id="6262" instrument_node="">, 115–23).</span></p><p class="chapter-para" data-dcnode-id="6233"><span data-dcnode-id="6260" instrument_node="">Second, and relatedly, Moscow has provided logistical and financial support to various Russia-friendly groups and societal organizations in the region. For example, the state-sponsored </span><em data-dcnode-id="6258"><span data-dcnode-id="6259" instrument_node="">Russkiy Mir</span></em><span data-dcnode-id="6257" instrument_node=""> Foundation has established several centers in the Baltics and backs pro-Russian NGOs there, such as the Latvian Human Rights Committee and the Legal Information for Human Rights in Estonia. Likewise, Russia's </span><em data-dcnode-id="6255"><span data-dcnode-id="6256" instrument_node="">Rossotrudnichestvo</span></em><span data-dcnode-id="6254" instrument_node=""> agency, which was founded in 2008, has established branches in all three Baltic states. In parallel, Moscow has stepped up its support for Russian language schools and Russian-speaking media outlets in the region (</span><span class="xrefLink" data-dcnode-id="6253" id="jumplink-bib4"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6251" data-google-interstitial="false" data-open="bib4" href="javascript:;" reveal-id="bib4"><span data-dcnode-id="6252" instrument_node="">Braw 2015</span></a><span data-dcnode-id="6250" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="6249" id="jumplink-bib5"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6247" data-google-interstitial="false" data-open="bib5" href="javascript:;" reveal-id="bib5"><span data-dcnode-id="6248" instrument_node="">Bulakh et al. 2014</span></a><span data-dcnode-id="6246" instrument_node="">, 40–49; </span><span class="xrefLink" data-dcnode-id="6245" id="jumplink-bib21"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6243" data-google-interstitial="false" data-open="bib21" href="javascript:;" reveal-id="bib21"><span data-dcnode-id="6244" instrument_node="">Grigas 2012</span></a><span data-dcnode-id="6242" instrument_node="">, 9–10; </span><span class="xrefLink" data-dcnode-id="6241" id="jumplink-bib56"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6239" data-google-interstitial="false" data-open="bib56" href="javascript:;" reveal-id="bib56"><span data-dcnode-id="6240" instrument_node="">Persson 2014</span></a><span data-dcnode-id="6238" instrument_node="">, 25–27). Of course, not all Russia-sponsored cultural and social activities in the Baltics are guided by Machiavellian calculations of power and influence. Nor can the Russian communities in the Baltics be simply regarded as a “fifth column” of the Kremlin. Large swathes of the Baltic Russians have developed their own, distinct identity and interests (</span><span class="xrefLink" data-dcnode-id="6237" id="jumplink-bib38"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6235" data-google-interstitial="false" data-open="bib38" href="javascript:;" reveal-id="bib38"><span data-dcnode-id="6236" instrument_node="">Laitin 1998</span></a><span data-dcnode-id="6234" instrument_node="">). That said, there can be no doubt that Moscow has tried to use economic and social grievances of the Baltic Russians for instrumental purposes.</span></p><p class="chapter-para" data-dcnode-id="6215"><span data-dcnode-id="6232" instrument_node="">Third, Russia has stepped up its efforts to destabilize the Baltic countries. Perhaps the best example here is the April 2007 statue crisis, which erupted when Estonian authorities relocated a Red Army memorial from the center of Tallinn to the outskirts. This decision sparked violent street riots that were reportedly stoked by members of Night Watch, a right-wing group with ties to Russian authorities, and the pro-Kremlin youth organization Nashi. What is more, Estonian government and banking sites became subject to a major cyberattack, which is widely believed to have originated in Russia (</span><span class="xrefLink" data-dcnode-id="6231" id="jumplink-bib16"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6229" data-google-interstitial="false" data-open="bib16" href="javascript:;" reveal-id="bib16"><span data-dcnode-id="6230" instrument_node="">Freudenstein 2015</span></a><span data-dcnode-id="6228" instrument_node="">, 121–22; </span><span class="xrefLink" data-dcnode-id="6227" id="jumplink-bib21"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6225" data-google-interstitial="false" data-open="bib21" href="javascript:;" reveal-id="bib21"><span data-dcnode-id="6226" instrument_node="">Grigas 2012</span></a><span data-dcnode-id="6224" instrument_node="">, 5). Similar cyberattacks were launched against all three Baltic states in November 2013, during a large-scale NATO exercise in Poland (</span><span class="xrefLink" data-dcnode-id="6223" id="jumplink-bib11"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6221" data-google-interstitial="false" data-open="bib11" href="javascript:;" reveal-id="bib11"><span data-dcnode-id="6222" instrument_node="">Coffey and Kochis 2015</span></a><span data-dcnode-id="6220" instrument_node="">, 9). On several occasions, moreover, Russia has disrupted trade with the Baltic states. For example, in the run-up to the EU's Vilnius summit in November 2013, Russia imposed an embargo on Lithuanian dairy products (</span><span class="xrefLink" data-dcnode-id="6219" id="jumplink-bib73"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6217" data-google-interstitial="false" data-open="bib73" href="javascript:;" reveal-id="bib73"><span data-dcnode-id="6218" instrument_node="">Socor 2013</span></a><span data-dcnode-id="6216" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="6201"><span data-dcnode-id="6214" instrument_node="">Fourth, in lockstep with the rebuilding of Russia's armed forces, Moscow has increased its military activities in the Baltic area. No doubt, the number of Russian air incursions has shot up in recent years. But it is nothing entirely new. Over the course of the last decade, Russian planes have repeatedly violated Baltic airspace. In one particularly spectacular incident, which occurred in October 2005, a Russian SU-27 fighter jet crashed near Kaunas in Lithuania (</span><span class="xrefLink" data-dcnode-id="6213" id="jumplink-bib15"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6211" data-google-interstitial="false" data-open="bib15" href="javascript:;" reveal-id="bib15"><span data-dcnode-id="6212" instrument_node="">Ehin and Berg 2009</span></a><span data-dcnode-id="6210" instrument_node="">, 4–5). Russia also started to boost its military presence in the Kaliningrad exclave, effectively transforming it into a force-projection platform that can serve both offensive and defensive purposes (</span><span class="xrefLink" data-dcnode-id="6209" id="jumplink-bib51"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6207" data-google-interstitial="false" data-open="bib51" href="javascript:;" reveal-id="bib51"><span data-dcnode-id="6208" instrument_node="">Oldberg 2015</span></a><span data-dcnode-id="6206" instrument_node="">). Concurrently, Russia began conducting a number of large-scale training exercises (e.g., the Zapad 2009, Zapad 2013, and Zapad 2017 military exercises) close to the Baltics (</span><span class="xrefLink" data-dcnode-id="6205" id="jumplink-bib72"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6203" data-google-interstitial="false" data-open="bib72" href="javascript:;" reveal-id="bib72"><span data-dcnode-id="6204" instrument_node="">Sleivyte 2010</span></a><span data-dcnode-id="6202" instrument_node="">, 146–48). The purpose of these exercises has been manifold—to test new weapon systems, to practice for worst-case scenarios, to send a signal to the West—but also to intimidate the Baltic countries and induce their governments to redirect resources and attention from domestic challenges. In other words, these maneuvers can be understood, at least in part, in terms of Russia's attempts to undermine the internal stability of the Baltic states.</span></p><p class="chapter-para" data-dcnode-id="6199"><span data-dcnode-id="6200" instrument_node="">Summing up: Compared to the previous period, Moscow's Baltic policy has become more cohesive and assertive since the middle of the 2000s. My analysis suggests that this can be explained by the rebuilding of Russian state capacity, which enables Moscow to respond more effectively to external pushes and pulls. Still, Russia has so far abstained from the direct use of force in the Baltic area. This can be explained by the membership of the Baltic states in NATO, which deters Russia from carrying out a military intervention in the region.</span></p><span data-dcnode-id="6198" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="6196" data-legacy-id="sec8" id="127897198" scrollto-destination="127897198"><span data-dcnode-id="6197" instrument_node="">Conclusion</span></h2><span data-dcnode-id="6195" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6193"><span data-dcnode-id="6194" instrument_node="">This article has developed a neoclassical realist theory that explains how the combined impact of systemic imperatives and variations in state capacity shapes the neighborhood policies of major powers. The previous two sections have shown that this approach provides a useful prism through which the evolution of Russia's Baltic policy can be understood.</span></p><p class="chapter-para" data-dcnode-id="6191"><span data-dcnode-id="6192" instrument_node="">How does my neoclassical account of Russia's Baltic policy compare to the status perspective outlined in the article's introduction? As noted, the status perspective holds that Russia adopted a policy of restraint vis-à-vis the Baltics in the 1990s and early 2000s as part of its quest for recognition as a coequal partner of the West. By contrast, my neoclassical account suggests that Russia was unable to pursue a more assertive policy vis-à-vis the Baltics in these years, although it faced strong systemic incentives to do so, due to lack of state capacity. In this regard, the two accounts stand in opposition to one another. Given the limited access to internal policy documents, transcripts of high-level meetings, and the like, it is difficult to adjudicate between these competing interpretations at present. I leave this important task for future research.</span></p><p class="chapter-para" data-dcnode-id="6177"><span data-dcnode-id="6190" instrument_node="">In other regards, my neoclassical account and the status perspective seem to complement rather than contradict each other. For example, a number of scholars have documented that in Russian identity discourses the notion of “great power status” is closely associated with regional spheres of influence and the right to exert control over neighboring small states (see, e.g., </span><span class="xrefLink" data-dcnode-id="6189" id="jumplink-bib29"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6187" data-google-interstitial="false" data-open="bib29" href="javascript:;" reveal-id="bib29"><span data-dcnode-id="6188" instrument_node="">Hopf 2002</span></a><span data-dcnode-id="6186" instrument_node="">; </span><span class="xrefLink" data-dcnode-id="6185" id="jumplink-bib45"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6183" data-google-interstitial="false" data-open="bib45" href="javascript:;" reveal-id="bib45"><span data-dcnode-id="6184" instrument_node="">Matz 2001</span></a><span data-dcnode-id="6182" instrument_node="">). Others have shown that higher status tends to enhance a state's ability to influence others and pursue its strategic interests more effectively in the international arena. As Thomas Volgy and his coauthors put it, “Attribution of major power status by the community of states to a handful of others provides members of the club with a form of soft power with which to complement material capabilities (</span><span class="xrefLink" data-dcnode-id="6181" id="jumplink-bib85"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="6179" data-google-interstitial="false" data-open="bib85" href="javascript:;" reveal-id="bib85"><span data-dcnode-id="6180" instrument_node="">Volgy et al. 2014</span></a><span data-dcnode-id="6178" instrument_node="">, 60–61).” If this is so, it is not far-fetched to suggest that status concerns and systemic imperatives form a mutually reinforcing incentive structure that pushes Russia to pursue regional primacy. Future research should investigate and theorize how status and power politics interact with each other in shaping Moscow's neighborhood policy.</span></p><p class="chapter-para" data-dcnode-id="6175"><span data-dcnode-id="6176" instrument_node="">Moreover, work remains to be done to evaluate the generalizability of the neoclassical model developed in this article. On the face of it, the fact that Russia has pursued a more assertive policy since around 2004, not only toward the Baltic states but in the post-Soviet space more generally, fits well with my neoclassical model. My model would suggest, for example, that Russia's military interventions in Georgia (2008) and Ukraine (2014) can be largely explained by the interplay of three factors: (1) systemic incentives to exert geopolitical control over neighboring countries, (2) improvements in Russian state capacity under the Putin regime, and (3) high levels of external pressure emanating from the pro-Western policies adopted by governments in Tbilisi and Kiev. Of course, additional research is needed to develop this argument in greater detail and test it against the available evidence.</span></p><p class="chapter-para" data-dcnode-id="6173"><span data-dcnode-id="6174" instrument_node="">Finally, one could test the portability of my theoretical argument more generally. That is to say, one could examine how well the theoretical model travels to other cases—say, the neighborhood policies of the United States or China. In doing so, one could establish the theory's scope conditions and, at the same time, learn more about the commonalities and differences in the neighborhood policies of major powers.</span></p><span data-dcnode-id="6172" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="6170" id="127897205" scrollto-destination="127897205"><span data-dcnode-id="6171" instrument_node="">Notes</span></h3><span data-dcnode-id="6169" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="6167"><span data-dcnode-id="6168" instrument_node="">Elias Götz is a postdoctoral researcher at the Uppsala Center for Russian and Eurasian Studies, Uppsala University. His main areas of expertise are security studies, international relations theory, and Russian foreign policy.</span></p><p class="chapter-para" data-dcnode-id="6163"><em data-dcnode-id="6165"><span data-dcnode-id="6166" instrument_node="">Author's Note:</span></em><span data-dcnode-id="6164" instrument_node=""> I would like to thank Matthew Kott and Elena Korosteleva; the participants at the January 2017 UPTAKE training school at the University of Kent; and the anonymous reviewers for their helpful comments and suggestions.</span></p><span data-dcnode-id="6162" instrument_node=""> </span><h2 class="backfootnotegroup-title js-splitscreen-backfootnotegroup-title" data-dcnode-id="6160" id="127897208" scrollto-destination="127897208"><span data-dcnode-id="6161" instrument_node="">Footnotes</span></h2><span data-dcnode-id="6159" instrument_node="">
