</span><book-view-pharos-heading data-dcnode-id="2512" data-pharos-component="PharosHeading" data-qa="book-info-title" level="3" preset="3"><span data-dcnode-id="2520" instrument_node="">
</span><h3 class="heading" data-dcnode-id="2515"><span data-dcnode-id="2519" instrument_node="">
</span><slot data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">The New Autocracy
        </span></slot><span data-dcnode-id="2516" instrument_node="">
</span></h3><span data-dcnode-id="2514" instrument_node="">
</span></book-view-pharos-heading><span data-dcnode-id="2511" instrument_node="">
</span><div data-dcnode-id="2499" data-qa="book-description"><strong data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">Book Description:</span></strong><span data-dcnode-id="2508" instrument_node=""> </span><p data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">Corruption, fake news, and the "informational autocracy" sustaining Putin in power</span></p><p data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">After fading into the background for many years following the collapse of the Soviet Union, Russia suddenly has emerged as a new threat-at least in the minds of many Westerners. But Western assumptions about Russia, and in particular about political decision-making in Russia, tend to be out of date or just plain wrong.</span></p><p data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">Under the leadership of Vladimir Putin since 2000, Russia is neither a somewhat reduced version of the Soviet Union nor a classic police state. Corruption is prevalent at all levels of government and business, but Russia's leaders pursue broader and more complex goals than one would expect in a typical kleptocracy, such as those in many developing countries. Nor does Russia fit the standard political science model of a "competitive authoritarian" regime; its parliament, political parties, and other political bodies are neither fakes to fool the West nor forums for bargaining among the elites.</span></p><p data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">The result of a two-year collaboration between top Russian experts and Western political scholars, Autocracy explores the complex roles of Russia's presidency, security services, parliament, media and other actors. The authors argue that Putin has created an "informational autocracy," which relies more on media manipulation than on the comprehensive repression of traditional dictatorships. The fake news, hackers, and trolls that featured in Russia's foreign policy during the 2016 U.S. presidential election are also favored tools of Putin's domestic regime-along with internet restrictions, state television, and copious in-house surveys. While these tactics have been successful in the short run, the regime that depends on them already shows signs of age: over-centralization, a narrowing of information flows, and a reliance on informal fixers to bypass the bureaucracy. The regime's challenge will be to continue to block social modernization without undermining the leadership's own capabilities.</span></p></div><span data-dcnode-id="2498" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="1747"><p data-dcnode-id="1748"><span data-dcnode-id="1752" instrument_node="">When the Western media talk about Russia’s government, they talk about Vladimir Putin. Journalists and political commentators usually take for granted that understanding the country’s political order must involve the analysis of Putin’s psychology. The United States–based NPR, CNN, and Fox News and the United Kingdom–based</span><em data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Daily Telegraph</span></em><span data-dcnode-id="1749" instrument_node="">have all run stories on “what’s inside Putin’s mind?”—and whether that mind can be changed (NPR 2014; Gingrich 2014; Ablow 2014; Robertson 2015). This preoccupation with Putin’s thinking is understandable given that political scientists often classify Russia as a personalist autocracy, in which key decisions cannot be predicted from...</span></p></div><span data-dcnode-id="1746" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="1647"><p data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">The State Duma—the lower chamber of Russia’s bicameral legislature, the Federal Assembly—is often dismissed as a “rubber stamp.”¹ This popular metaphor for legislatures in nondemocratic regimes portrays such assemblies as completely subservient, slavishly following the orders of their executive principals. These are bodies dominated by the executive, with legislators providing unquestioning support—and a thin veneer of legitimacy—for decisions taken and finalized elsewhere. The executive is the monopoly supplier of bills, all of which become laws without amendment or critical debate; rubber stamp parliaments do not introduce “viscosity” into the policymaking process.²</span></p><p data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Beyond the rubber stamp moniker,...</span></p></div><span data-dcnode-id="1646" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="1544"><p data-dcnode-id="1547"><span data-dcnode-id="1551" instrument_node="">Who holds power and makes political decisions in contemporary Russia? A brief survey of available literature in any well-stocked bookshop in the United States or Europe will quickly lead one to the answer: Vladimir Putin and the “siloviki” (see, for example, LeVine 2009; Soldatov and Borogan 2010; Harding 2011; Felshtinsky and Pribylovsky 2012; Lucas 2012, 2014; Dawisha 2014).</span><em data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Sila</span></em><span data-dcnode-id="1548" instrument_node="">in Russian means “force,” and the siloviki are the members of Russia’s so-called force ministries those state agencies authorized to use violence to respond to threats to national security.</span></p><p data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">These armed agents are often portrayed by journalists and scholars alike...</span></p></div><span data-dcnode-id="1543" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="1446"><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">President Vladimir Putin is widely believed to have fundamentally recast relations between Russia’s central authorities and the country’s regional elites. He is seen as having reversed a disastrous slide into anarchic decentralization that began with the disintegration of the Soviet Union and lasted through the 1990s. Rather than merely redressing the balance, however, Putin is accused by critics of having completely neutered the institutions of federalism, replacing almost all elements of local and regional selfgovernment with his “vertical of power.” Along the way, analysts add, he has used the centralized bureaucracies of the security services and police to re-impose control...</span></p></div><span data-dcnode-id="1445" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="1248"><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Two trends have transformed the Russian media since the end of Soviet rule. The first is the modernization of the sector. Starting in the late 1980s, what had been a tightly controlled instrument of communist agitprop evolved into something closer to the Western concept of professional journalism based on editorial independence. Then, the 2000s saw the transformation of what had been an economically struggling sector into a multibillion-dollar business, boasting new technologies, state-of-the-art formats, and a broad range of broadcasts and publications to meet a variety of tastes.</span></p><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">The second trend, evident from the early 2000s, is the increasing effort...</span></p></div><span data-dcnode-id="1247" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="1147"><p data-dcnode-id="1148"><span data-dcnode-id="1152" instrument_node="">What is the role of public opinion in Russian politics today? Does it affect decisionmaking, or is it merely shaped by state propaganda to support the decisions that are made? On this, scholars and writers—in both Russia and the West—offer radically different answers. Some view public opinion as mainly manipulated through controlled media and see the strong backing for Vladimir Putin’s policies as the result of such manipulations. Rather than the demands of citizens prompting responses from the authorities, the authorities engineer support from citizens for</span><em data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">their</span></em><span data-dcnode-id="1149" instrument_node="">demands (Pomerantsev 2014; Lipman 2009). Others emphasize that Putin’s policies are...</span></p></div><span data-dcnode-id="1146" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="946"><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">What role have civic and political activism played in Russian political decisionmaking over the past twenty-five years? What role do they play today? By civic and political activism, we mean the actions of citizens who organize to pursue collective and humanitarian goals or to demand changes in state policy. Civic activists focus mainly on social issues (including local affairs, ecology, human rights, and the defense of vulnerable social groups), while political activists aim to change both government policies and, often, government personnel. At times, they may seek to participate in political institutions themselves, either to accomplish policy objectives or to...</span></p></div><span data-dcnode-id="945" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="843"><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">President Vladimir Putin’s decision to seize the Crimean peninsula from Ukraine and incorporate it into Russia was the most consequential of his first fifteen years in power. It had profound implications for both foreign and domestic policy as well as for how Russia was viewed around the world. The intervention also took most observers—both in Russia and in the West—by surprise. For these reasons, it is a promising case from which to seek insight into the concerns and pro cesses that drive Kremlin decisionmaking on high-stakes issues.</span></p><p data-dcnode-id="844"><span data-dcnode-id="848" instrument_node="">One can distinguish two key questions:</span><em data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">why</span></em><span data-dcnode-id="845" instrument_node="">Putin chose to do...</span></p></div><span data-dcnode-id="842" instrument_node="">
