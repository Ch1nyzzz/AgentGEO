text-block" data-dcnode-id="1061"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1062"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1063"><b class="ssrcss-hmf8ql-BoldText e5tfeyi3" data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">War in Ukraine and the threat of conflict in the Baltics raise fundamental questions about the West's military alliance. What is </span></b><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/world-europe-18023383"><span data-dcnode-id="1067" instrument_node="">Nato - the North Atlantic Treaty Organisation</span></a><b class="ssrcss-hmf8ql-BoldText e5tfeyi3" data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node=""> - for? And is it up to the job? </span></b></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1057"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1058"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Do would-be aggressors still believe that - as stated in Article 5 of Nato's founding treaty - an attack on one Nato member would be treated as an attack on all? </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1050"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1051"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1052"><span data-dcnode-id="1056" instrument_node="">Four expert witnesses including Anders Fogh Rasmussen - who led the organisation until a few months ago - share their insights with the BBC World Service's </span><a class="ssrcss-1gfaiii-InlineLink e1no5rhv0" data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.co.uk/programmes/p029399x"><span data-dcnode-id="1055" instrument_node="">The Inquiry</span></a><span data-dcnode-id="1053" instrument_node="">.  </span></p></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="1042"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="1043"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="1044"><span class="ssrcss-1wnw6kc-Placeholder e16icw910" data-dcnode-id="1045"><span data-dcnode-id="1046"><img alt="line" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="1049" height="2" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/464/mcs/media/images/75306000/jpg/_75306515_line976.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/mcs/media/images/75306000/jpg/_75306515_line976.jpg 240w, https://ichef.bbci.co.uk/news/320/mcs/media/images/75306000/jpg/_75306515_line976.jpg 320w, https://ichef.bbci.co.uk/news/480/mcs/media/images/75306000/jpg/_75306515_line976.jpg 480w, https://ichef.bbci.co.uk/news/624/mcs/media/images/75306000/jpg/_75306515_line976.jpg 624w, https://ichef.bbci.co.uk/news/800/mcs/media/images/75306000/jpg/_75306515_line976.jpg 800w, https://ichef.bbci.co.uk/news/976/mcs/media/images/75306000/jpg/_75306515_line976.jpg 976w" width="464"><noscript data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">&lt;img alt="line" srcSet="https://ichef.bbci.co.uk/news/240/mcs/media/images/75306000/jpg/_75306515_line976.jpg 240w, https://ichef.bbci.co.uk/news/320/mcs/media/images/75306000/jpg/_75306515_line976.jpg 320w, https://ichef.bbci.co.uk/news/480/mcs/media/images/75306000/jpg/_75306515_line976.jpg 480w, https://ichef.bbci.co.uk/news/624/mcs/media/images/75306000/jpg/_75306515_line976.jpg 624w, https://ichef.bbci.co.uk/news/800/mcs/media/images/75306000/jpg/_75306515_line976.jpg 800w, https://ichef.bbci.co.uk/news/976/mcs/media/images/75306000/jpg/_75306515_line976.jpg 976w" src="https://ichef.bbci.co.uk/news/464/mcs/media/images/75306000/jpg/_75306515_line976.jpg" width="464" height="2" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span></div></figure></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="1038"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="1039" id="Dangerous-decline-in-defence-spending-Professor-Alexander-Matelaar" tabindex="-1"><span data-dcnode-id="1040" role="text"><span data-dcnode-id="1041" instrument_node="">'Dangerous decline in defence spending': Professor Alexander Matelaar</span></span></h2></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1033"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1034"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1035"><i class="ssrcss-xbdn93-ItalicText e5tfeyi2" data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Research Professor Alexander Matelaar from the University of Brussels argues that defence spending among Nato members must be restructured.</span></i></p></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="1020"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="1021"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="1027"><span class="ssrcss-1hq4gmv-Placeholder e16icw910" data-dcnode-id="1028"><span data-dcnode-id="1029"><img alt="Professor Alexander Matelaar" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="1032" height="171" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/304/mcs/media/images/81060000/jpg/_81060330_alexandermatelaar.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/mcs/media/images/81060000/jpg/_81060330_alexandermatelaar.jpg 240w, https://ichef.bbci.co.uk/news/320/mcs/media/images/81060000/jpg/_81060330_alexandermatelaar.jpg 320w, https://ichef.bbci.co.uk/news/480/mcs/media/images/81060000/jpg/_81060330_alexandermatelaar.jpg 480w, https://ichef.bbci.co.uk/news/624/mcs/media/images/81060000/jpg/_81060330_alexandermatelaar.jpg 624w, https://ichef.bbci.co.uk/news/800/mcs/media/images/81060000/jpg/_81060330_alexandermatelaar.jpg 800w, https://ichef.bbci.co.uk/news/976/mcs/media/images/81060000/jpg/_81060330_alexandermatelaar.jpg 976w" width="304"><noscript data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">&lt;img alt="Professor Alexander Matelaar" srcSet="https://ichef.bbci.co.uk/news/240/mcs/media/images/81060000/jpg/_81060330_alexandermatelaar.jpg 240w, https://ichef.bbci.co.uk/news/320/mcs/media/images/81060000/jpg/_81060330_alexandermatelaar.jpg 320w, https://ichef.bbci.co.uk/news/480/mcs/media/images/81060000/jpg/_81060330_alexandermatelaar.jpg 480w, https://ichef.bbci.co.uk/news/624/mcs/media/images/81060000/jpg/_81060330_alexandermatelaar.jpg 624w, https://ichef.bbci.co.uk/news/800/mcs/media/images/81060000/jpg/_81060330_alexandermatelaar.jpg 800w, https://ichef.bbci.co.uk/news/976/mcs/media/images/81060000/jpg/_81060330_alexandermatelaar.jpg 976w" src="https://ichef.bbci.co.uk/news/304/mcs/media/images/81060000/jpg/_81060330_alexandermatelaar.jpg" width="304" height="171" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span></div><figcaption class="ssrcss-name08-StyledFigureCaption e34k3c22" data-dcnode-id="1022"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Image caption, </span></span><div class="ssrcss-y7krbn-Stack e1y4nx260" data-dcnode-id="1023" spacing="6"><span data-dcnode-id="1024" instrument_node="">Professor Alexander Matelaar fears declining defence expenditure puts Nato's effectiveness at risk</span></div></figcaption></figure></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1016"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1017"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">"I think there is a dawning realisation that the downward trend in defence expenditures needs to bottom out at some point. In the middle of Europe, they're sort of bottoming out, and they're still declining in western Europe."</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1012"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1013"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">This year, only five of Nato's 28 members reached the target of spending 2% of GDP on defence. </span></p></div></div><div data-dcnode-id="1011" id="piano-inline1"></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1007"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1008"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">But it's not just cuts to defence budgets that are causing concern. It's what that defence budget is being spent on. Take Belgium.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="1003"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1004"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">"At present, nearly three-quarters of the budget goes on personnel spending [with] 24-25% going on operating costs for current operations and training. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="999"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="1000"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">"But that leaves... at present less than 1% for signing new contracts for purchasing new kit, and modernising the equipment. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="995"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="996"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">"And of course on that basis, you can keep things afloat for a short period, but it's an absolute killer over the longer haul."</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="991"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="992"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">It's a similar picture across many of Nato's member-states. Entire divisions and weapons systems have been dismantled over the past few decades. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="987"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="988"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">But why not cut defence? After all, Nato was founded to block Soviet expansion into Europe - so with the collapse of the Soviet Union, hadn't it served its purpose?</span></p></div></div><div data-dcnode-id="986" id="piano-inline2"></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="982"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="983"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">"As the Cold War started softening up in the late 1980s, there was a justifiable call for reaping the so-called peace dividend, and reshuffle government spending away from defence to other policy areas. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="978"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="979"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">"That established a trend of decreasing defence expenditures that has now carried through roughly three decades."</span></p></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="970"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="971"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="972"><span class="ssrcss-1wnw6kc-Placeholder e16icw910" data-dcnode-id="973"><span data-dcnode-id="974"><img alt="line" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="977" height="2" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/464/mcs/media/images/75306000/jpg/_75306515_line976.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/mcs/media/images/75306000/jpg/_75306515_line976.jpg 240w, https://ichef.bbci.co.uk/news/320/mcs/media/images/75306000/jpg/_75306515_line976.jpg 320w, https://ichef.bbci.co.uk/news/480/mcs/media/images/75306000/jpg/_75306515_line976.jpg 480w, https://ichef.bbci.co.uk/news/624/mcs/media/images/75306000/jpg/_75306515_line976.jpg 624w, https://ichef.bbci.co.uk/news/800/mcs/media/images/75306000/jpg/_75306515_line976.jpg 800w, https://ichef.bbci.co.uk/news/976/mcs/media/images/75306000/jpg/_75306515_line976.jpg 976w" width="464"><noscript data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">&lt;img alt="line" srcSet="https://ichef.bbci.co.uk/news/240/mcs/media/images/75306000/jpg/_75306515_line976.jpg 240w, https://ichef.bbci.co.uk/news/320/mcs/media/images/75306000/jpg/_75306515_line976.jpg 320w, https://ichef.bbci.co.uk/news/480/mcs/media/images/75306000/jpg/_75306515_line976.jpg 480w, https://ichef.bbci.co.uk/news/624/mcs/media/images/75306000/jpg/_75306515_line976.jpg 624w, https://ichef.bbci.co.uk/news/800/mcs/media/images/75306000/jpg/_75306515_line976.jpg 800w, https://ichef.bbci.co.uk/news/976/mcs/media/images/75306000/jpg/_75306515_line976.jpg 976w" src="https://ichef.bbci.co.uk/news/464/mcs/media/images/75306000/jpg/_75306515_line976.jpg" width="464" height="2" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span></div></figure></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="966"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="967" id="Identity-crisis-Professor-Rebecca-Moore-" tabindex="-1"><span data-dcnode-id="968" role="text"><span data-dcnode-id="969" instrument_node="">'Identity crisis': Professor Rebecca Moore </span></span></h2></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="961"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="962"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="963"><i class="ssrcss-xbdn93-ItalicText e5tfeyi2" data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Nato expert Rebecca Moore is professor of political science at Concordia College in Minnesota, and has written widely about the alliance. She argues Nato embraced a new more political mission after the collapse of the Soviet Union, but may have lost its way in recent years.</span></i></p></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="948"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="949"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="955"><span class="ssrcss-xan4ss-Placeholder e16icw910" data-dcnode-id="956"><span data-dcnode-id="957"><img alt="Rebecca Moore" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="960" height="404.99999999999994" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/304/mcs/media/images/81057000/jpg/_81057928_rebeccamoore.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/mcs/media/images/81057000/jpg/_81057928_rebeccamoore.jpg 240w, https://ichef.bbci.co.uk/news/320/mcs/media/images/81057000/jpg/_81057928_rebeccamoore.jpg 320w, https://ichef.bbci.co.uk/news/480/mcs/media/images/81057000/jpg/_81057928_rebeccamoore.jpg 480w, https://ichef.bbci.co.uk/news/624/mcs/media/images/81057000/jpg/_81057928_rebeccamoore.jpg 624w, https://ichef.bbci.co.uk/news/800/mcs/media/images/81057000/jpg/_81057928_rebeccamoore.jpg 800w, https://ichef.bbci.co.uk/news/976/mcs/media/images/81057000/jpg/_81057928_rebeccamoore.jpg 976w" width="304"><noscript data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">&lt;img alt="Rebecca Moore" srcSet="https://ichef.bbci.co.uk/news/240/mcs/media/images/81057000/jpg/_81057928_rebeccamoore.jpg 240w, https://ichef.bbci.co.uk/news/320/mcs/media/images/81057000/jpg/_81057928_rebeccamoore.jpg 320w, https://ichef.bbci.co.uk/news/480/mcs/media/images/81057000/jpg/_81057928_rebeccamoore.jpg 480w, https://ichef.bbci.co.uk/news/624/mcs/media/images/81057000/jpg/_81057928_rebeccamoore.jpg 624w, https://ichef.bbci.co.uk/news/800/mcs/media/images/81057000/jpg/_81057928_rebeccamoore.jpg 800w, https://ichef.bbci.co.uk/news/976/mcs/media/images/81057000/jpg/_81057928_rebeccamoore.jpg 976w" src="https://ichef.bbci.co.uk/news/304/mcs/media/images/81057000/jpg/_81057928_rebeccamoore.jpg" width="304" height="404.99999999999994" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span></div><figcaption class="ssrcss-name08-StyledFigureCaption e34k3c22" data-dcnode-id="950"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Image caption, </span></span><div class="ssrcss-y7krbn-Stack e1y4nx260" data-dcnode-id="951" spacing="6"><span data-dcnode-id="952" instrument_node="">Rebecca Moore fears the enlarged alliance has lost sight of its ultimate political purpose</span></div></figcaption></figure></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="944"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="945"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">"The idea was that Nato had a critical role to play in uniting and democratising the European continent and that there was an opportunity now to create a new European security order, a security order that would be based on liberal democratic principles rather than spheres of influence or blocs or the balance of power."</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="940"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="941"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Professor Moore says this unity was summed up by a book she heard about while travelling in the late 1990s - a collection of folk-tales gathered from Nato member-states.  </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="936"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="937"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">"It was actually being distributed in Prague at the time that I was there by a Czech ministry of defence official to schoolchildren, and was quoted as having said that 'the book was important to teach people that Nato is not just about armies, it's about a broader relationship between countries'.</span></p></div></div><div data-dcnode-id="935" id="piano-inline3"></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="931"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="932"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">"That would be... a harder case to make today than it was at that time."</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="927"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="928"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">The key reason? Nato's size. At the end of the Cold War, the alliance had 16 members. Now it has 28. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="923"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="924"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">"I would say that there is perhaps a lack of a really common vision, as to what the alliance's ultimate political purpose is."</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="919"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="920"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Some want the alliance to perform a more global role, conducting training and crisis-management missions such as those Nato carried out in Iraq, Afghanistan and Libya. Others say it should return to its original goal - defending Europe's borders. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="915"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="916"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">"I think that's probably the disagreement that's been the most pronounced and that's had greatest impact on Nato decision-making in recent years."</span></p></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="907"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="908"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="909"><span class="ssrcss-1wnw6kc-Placeholder e16icw910" data-dcnode-id="910"><span data-dcnode-id="911"><img alt="line" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="914" height="2" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/464/mcs/media/images/75306000/jpg/_75306515_line976.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/mcs/media/images/75306000/jpg/_75306515_line976.jpg 240w, https://ichef.bbci.co.uk/news/320/mcs/media/images/75306000/jpg/_75306515_line976.jpg 320w, https://ichef.bbci.co.uk/news/480/mcs/media/images/75306000/jpg/_75306515_line976.jpg 480w, https://ichef.bbci.co.uk/news/624/mcs/media/images/75306000/jpg/_75306515_line976.jpg 624w, https://ichef.bbci.co.uk/news/800/mcs/media/images/75306000/jpg/_75306515_line976.jpg 800w, https://ichef.bbci.co.uk/news/976/mcs/media/images/75306000/jpg/_75306515_line976.jpg 976w" width="464"><noscript data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">&lt;img alt="line" srcSet="https://ichef.bbci.co.uk/news/240/mcs/media/images/75306000/jpg/_75306515_line976.jpg 240w, https://ichef.bbci.co.uk/news/320/mcs/media/images/75306000/jpg/_75306515_line976.jpg 320w, https://ichef.bbci.co.uk/news/480/mcs/media/images/75306000/jpg/_75306515_line976.jpg 480w, https://ichef.bbci.co.uk/news/624/mcs/media/images/75306000/jpg/_75306515_line976.jpg 624w, https://ichef.bbci.co.uk/news/800/mcs/media/images/75306000/jpg/_75306515_line976.jpg 800w, https://ichef.bbci.co.uk/news/976/mcs/media/images/75306000/jpg/_75306515_line976.jpg 976w" src="https://ichef.bbci.co.uk/news/464/mcs/media/images/75306000/jpg/_75306515_line976.jpg" width="464" height="2" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span></div></figure></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="903"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="904" id="Putin-exploiting-Natos-weakness-Former-Supreme-Allied-Commander-General-Wesley-Clark" tabindex="-1"><span data-dcnode-id="905" role="text"><span data-dcnode-id="906" instrument_node="">'Putin exploiting Nato's weakness': Former Supreme Allied Commander General Wesley Clark</span></span></h2></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="898"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="899"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="900"><i class="ssrcss-xbdn93-ItalicText e5tfeyi2" data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">US General Wesley Clark was Nato's supreme allied commander in Europe. Before air-strikes began in Kosovo in 1999, he threatened Serbian President Slobodan Milosevic that he would "bomb him, and bomb him good," if he didn't withdraw his forces. Gen Clark says it's that readiness to take action which gives the organisation its strength:</span></i></p></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="881"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="882"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="888"><span class="ssrcss-xan4ss-Placeholder e16icw910" data-dcnode-id="893"><span data-dcnode-id="894"><img alt="Former NATO Supreme Commander US General Wesley Clark (pictured in Albania in 1999)" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="897" height="404.99999999999994" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/304/mcs/media/images/81057000/jpg/_81057927_wesleyclark_ap.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/mcs/media/images/81057000/jpg/_81057927_wesleyclark_ap.jpg 240w, https://ichef.bbci.co.uk/news/320/mcs/media/images/81057000/jpg/_81057927_wesleyclark_ap.jpg 320w, https://ichef.bbci.co.uk/news/480/mcs/media/images/81057000/jpg/_81057927_wesleyclark_ap.jpg 480w, https://ichef.bbci.co.uk/news/624/mcs/media/images/81057000/jpg/_81057927_wesleyclark_ap.jpg 624w, https://ichef.bbci.co.uk/news/800/mcs/media/images/81057000/jpg/_81057927_wesleyclark_ap.jpg 800w, https://ichef.bbci.co.uk/news/976/mcs/media/images/81057000/jpg/_81057927_wesleyclark_ap.jpg 976w" width="304"><noscript data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">&lt;img alt="Former NATO Supreme Commander US General Wesley Clark (pictured in Albania in 1999)" srcSet="https://ichef.bbci.co.uk/news/240/mcs/media/images/81057000/jpg/_81057927_wesleyclark_ap.jpg 240w, https://ichef.bbci.co.uk/news/320/mcs/media/images/81057000/jpg/_81057927_wesleyclark_ap.jpg 320w, https://ichef.bbci.co.uk/news/480/mcs/media/images/81057000/jpg/_81057927_wesleyclark_ap.jpg 480w, https://ichef.bbci.co.uk/news/624/mcs/media/images/81057000/jpg/_81057927_wesleyclark_ap.jpg 624w, https://ichef.bbci.co.uk/news/800/mcs/media/images/81057000/jpg/_81057927_wesleyclark_ap.jpg 800w, https://ichef.bbci.co.uk/news/976/mcs/media/images/81057000/jpg/_81057927_wesleyclark_ap.jpg 976w" src="https://ichef.bbci.co.uk/news/304/mcs/media/images/81057000/jpg/_81057927_wesleyclark_ap.jpg" width="304" height="404.99999999999994" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span><span class="ssrcss-1hn5d7b-StyledFigureCopyright e34k3c20" data-dcnode-id="889" role="text"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Image source, </span></span><span data-dcnode-id="890" instrument_node="">AP</span></span></div><figcaption class="ssrcss-name08-StyledFigureCaption e34k3c22" data-dcnode-id="883"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Image caption, </span></span><div class="ssrcss-y7krbn-Stack e1y4nx260" data-dcnode-id="884" spacing="6"><span data-dcnode-id="885" instrument_node="">Gen Wesley Clark fears the Russians are exploiting the West's reluctance to use force</span></div></figcaption></figure></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="877"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="878"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">"Every country who signs the Nato pledge when it joins says that an attack on one is an attack against all. So Nato is conceptually the strongest alliance that's ever been built."</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="873"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="874"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">But he acknowledges that strength isn't realised if aggressors don't believe that Nato will act when a member is attacked:</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="869"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="870"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">"Western democracies always have, traditionally, been slow to respond to these kinds of threats. It was after all France and Britain who failed to respond to Hitler's reoccupation of the Rhineland in 1936. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="865"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="866"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">"Today the democracies have a difficult time coming to grips with the challenge of military force... and they don't want to admit that Putin, while he's trying to broker peace [is] a main proponent of war."</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="861"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="862"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Gen Clark argues President Putin is exploiting this hesitance. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="857"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="858"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">"He's playing the politics. He's playing the media, he's playing the economic card and he's manoeuvring. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="853"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="854"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">"He understands the way western democracies work. Europe had two devastating wars in the 20th Century [and] nobody wants another one. He's learned that because Western democracies don't want to use force that he can get away with it."</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="849"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="850"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">And with shrinking defence budgets, and war-weary populations Gen Clark says politicians need to work harder to get the public onside. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="845"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="846"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">"It's the political leadership in member-states who have to help shape public opinion, and they have to see the situation clearly and call it as it is, not run from it. So Western leaders can't be so shy that they're intimidated by the bluster of a Vladimir Putin."</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="841"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="842"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Others say Western leaders are being justifiably cautious. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="837"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="838"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">How do you decide what constitutes an attack when the nature of warfare has changed: no longer state on state warfare, but little green men - Russian special forces in unmarked military uniform - crossing the border, and supporting separatists? </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="833"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="834"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">"The little green men are no different than the ploy that Hitler used to start World War II's attack against Poland where he dressed up German soldiers in Polish uniforms and had them attack a German radio station and kill a bunch of people, and claimed that was a provocation and used it for an attack. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="829"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="830"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">"So there have always been tricks and ruses. These little green men are nothing more than Russian Special Forces people and the evidence is right in front of your face but we couldn't bring ourselves to admit it because we didn't want to admit the implications of direct Russian aggression."</span></p></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="821"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="822"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="823"><span class="ssrcss-1wnw6kc-Placeholder e16icw910" data-dcnode-id="824"><span data-dcnode-id="825"><img alt="line" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="828" height="2" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/464/mcs/media/images/75306000/jpg/_75306515_line976.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/mcs/media/images/75306000/jpg/_75306515_line976.jpg 240w, https://ichef.bbci.co.uk/news/320/mcs/media/images/75306000/jpg/_75306515_line976.jpg 320w, https://ichef.bbci.co.uk/news/480/mcs/media/images/75306000/jpg/_75306515_line976.jpg 480w, https://ichef.bbci.co.uk/news/624/mcs/media/images/75306000/jpg/_75306515_line976.jpg 624w, https://ichef.bbci.co.uk/news/800/mcs/media/images/75306000/jpg/_75306515_line976.jpg 800w, https://ichef.bbci.co.uk/news/976/mcs/media/images/75306000/jpg/_75306515_line976.jpg 976w" width="464"><noscript data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">&lt;img alt="line" srcSet="https://ichef.bbci.co.uk/news/240/mcs/media/images/75306000/jpg/_75306515_line976.jpg 240w, https://ichef.bbci.co.uk/news/320/mcs/media/images/75306000/jpg/_75306515_line976.jpg 320w, https://ichef.bbci.co.uk/news/480/mcs/media/images/75306000/jpg/_75306515_line976.jpg 480w, https://ichef.bbci.co.uk/news/624/mcs/media/images/75306000/jpg/_75306515_line976.jpg 624w, https://ichef.bbci.co.uk/news/800/mcs/media/images/75306000/jpg/_75306515_line976.jpg 800w, https://ichef.bbci.co.uk/news/976/mcs/media/images/75306000/jpg/_75306515_line976.jpg 976w" src="https://ichef.bbci.co.uk/news/464/mcs/media/images/75306000/jpg/_75306515_line976.jpg" width="464" height="2" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span></div></figure></div><div class="ssrcss-dm4ypg-ComponentWrapper-HeadlineComponentWrapper e1xue1i89" data-component="subheadline-block" data-dcnode-id="817"><h2 class="ssrcss-y2fd7s-StyledHeading e1fj1fc10" data-dcnode-id="818" id="Russian-aggression-is-a-wakeup-call-former-Nato-SecretaryGeneral-Anders-Fogh-Rasmussen" tabindex="-1"><span data-dcnode-id="819" role="text"><span data-dcnode-id="820" instrument_node="">'Russian aggression is a wake-up call': former Nato Secretary-General Anders Fogh Rasmussen</span></span></h2></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="812"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="813"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="814"><i class="ssrcss-xbdn93-ItalicText e5tfeyi2" data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Anders Fogh Rasmussen's first speech as Nato secretary-general in September 2009 focussed on the importance of the Alliance's relationship with Russia. But when he left Nato in October after five years at the helm, his great dream for a new partnership with Russia was unrealised.</span></i></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="808"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="809"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">"On a personal basis I am indeed very disappointed. I think we had... a generational obligation to include Russia in a constructive partnership. </span></p></div></div><div class="ssrcss-18mjolk-ComponentWrapper e1xue1i810" data-component="image-block" data-dcnode-id="791"><figure class="ssrcss-wpgbih-StyledFigure e34k3c23" data-dcnode-id="792"><div class="ssrcss-ab5fd8-StyledFigureContainer e34k3c21" data-dcnode-id="798"><span class="ssrcss-xan4ss-Placeholder e16icw910" data-dcnode-id="803"><span data-dcnode-id="804"><img alt="Former Nato Secretary General Anders Fogh Rasmussen" class="ssrcss-1drmwog-Image ee0ct7c0" data-dcnode-id="807" height="404.99999999999994" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ichef.bbci.co.uk/news/304/mcs/media/images/81057000/jpg/_81057926_rasmussen_getty.jpg&amp;raw" srcset="https://ichef.bbci.co.uk/news/240/mcs/media/images/81057000/jpg/_81057926_rasmussen_getty.jpg 240w, https://ichef.bbci.co.uk/news/320/mcs/media/images/81057000/jpg/_81057926_rasmussen_getty.jpg 320w, https://ichef.bbci.co.uk/news/480/mcs/media/images/81057000/jpg/_81057926_rasmussen_getty.jpg 480w, https://ichef.bbci.co.uk/news/624/mcs/media/images/81057000/jpg/_81057926_rasmussen_getty.jpg 624w, https://ichef.bbci.co.uk/news/800/mcs/media/images/81057000/jpg/_81057926_rasmussen_getty.jpg 800w, https://ichef.bbci.co.uk/news/976/mcs/media/images/81057000/jpg/_81057926_rasmussen_getty.jpg 976w" width="304"><noscript data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">&lt;img alt="Former Nato Secretary General Anders Fogh Rasmussen" srcSet="https://ichef.bbci.co.uk/news/240/mcs/media/images/81057000/jpg/_81057926_rasmussen_getty.jpg 240w, https://ichef.bbci.co.uk/news/320/mcs/media/images/81057000/jpg/_81057926_rasmussen_getty.jpg 320w, https://ichef.bbci.co.uk/news/480/mcs/media/images/81057000/jpg/_81057926_rasmussen_getty.jpg 480w, https://ichef.bbci.co.uk/news/624/mcs/media/images/81057000/jpg/_81057926_rasmussen_getty.jpg 624w, https://ichef.bbci.co.uk/news/800/mcs/media/images/81057000/jpg/_81057926_rasmussen_getty.jpg 800w, https://ichef.bbci.co.uk/news/976/mcs/media/images/81057000/jpg/_81057926_rasmussen_getty.jpg 976w" src="https://ichef.bbci.co.uk/news/304/mcs/media/images/81057000/jpg/_81057926_rasmussen_getty.jpg" width="304" height="404.99999999999994" loading="lazy" class="ssrcss-1drmwog-Image ee0ct7c0"/&gt;</span></noscript></span></span><span class="ssrcss-1hn5d7b-StyledFigureCopyright e34k3c20" data-dcnode-id="799" role="text"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Image source, </span></span><span data-dcnode-id="800" instrument_node="">Getty Images</span></span></div><figcaption class="ssrcss-name08-StyledFigureCaption e34k3c22" data-dcnode-id="793"><span class="visually-hidden ssrcss-1f39n02-VisuallyHidden e1y6uwnp0" data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Image caption, </span></span><div class="ssrcss-y7krbn-Stack e1y4nx260" data-dcnode-id="794" spacing="6"><span data-dcnode-id="795" instrument_node="">Anders Fogh Rasmussen: Nato Secretary General 2009 - 2014</span></div></figcaption></figure></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="787"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="788"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">"The crash of communism and the Soviet Union offered a new opportunity for Europeans to realise the dream of a Europe whole, free and at peace, so I think we did the right thing to try and include Russia in this vision. However, Russia didn't share that vision. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="783"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="784"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">"I think we are now entering a new era that could be very much similar to the Cold War.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="779"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="780"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">He says that the Baltic states are right to be worried about Russia's ambitions: </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="775"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="776"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">"Our Baltic friends and allies are concerned about the Russian behaviour, not least because one of the Russian doctrines is that Russia preserves the right to intervene in other countries, to protect what they consider the interests of Russian-speaking communities in other countries. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="771"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="772"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">"And as we all know, particularly in Estonia and Latvia, we have significant Russian speaking minorities."</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="767"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="768"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">And he argues Russia's provocations aren't just aimed at the Baltic states: they're also targeting Nato itself.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="763"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="764"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">"Russia is constantly testing Nato resolve. We have seen a number of attempts to violate Nato airspace. We have seen very unfortunate incidents, for instance the capture of an Estonian military officer, the detention of a Lithuanian vessel, just to mention a couple of examples. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="759"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="760"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">"We are now faced with this new hybrid warfare... so we have to adapt to improve our capability to address [it]."</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="755"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="756"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Does Russia's use of hybrid warfare make it harder, then, for Nato to decide what constitutes an attack on a member state?</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="751"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="752"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">"Yes it makes it more difficult, and that's also I think the single most important purpose of this Russian hybrid warfare to try to circumvent the activation of Nato's Article 5. But we are prepared for that and they won't succeed.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="747"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="748"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">So how do you then define when an attack has happened which breaches Article 5?</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="743"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="744"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">"We never answer that question, because it is part of our deterrence that a potential aggressor never knows how and when an activation of Article 5 will be triggered."</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="736"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="737"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="738"><span data-dcnode-id="742" instrument_node="">But he says there's something else that Nato needs to make more obvious - and that's its resolve to respond once Article 5 </span><i class="ssrcss-xbdn93-ItalicText e5tfeyi2" data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">has </span></i><span data-dcnode-id="739" instrument_node="">been triggered. </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="732"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="733"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">"We need to make it clearer. We have learned lessons from the Russian attack on Ukraine, we have seen that the Russians can act very fast. The single most important thing is to increase Nato presence in the east, and strengthen our collective defence so that the Russians know that if they were to attack a Nato ally they would cross a red line and they would meet not only troops from that specific country but from all Nato allies.</span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="728"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="729"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">"The Russian aggression against Ukraine is a wake up call for everybody and Nato must adapt to that new situation." </span></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="723"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="724"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="725"><i class="ssrcss-xbdn93-ItalicText e5tfeyi2" data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">The Inquiry is broadcast on the BBC World Service, Tuesdays from 13:05 GMT. Listen online or download the podcast. </span></i></p></div></div><div class="ssrcss-uf6wea-RichTextComponentWrapper e1xue1i86" data-component="text-block" data-dcnode-id="716"><div class="ssrcss-7uxr49-RichTextContainer e5tfeyi1" data-dcnode-id="717"><p class="ssrcss-1q0x1qg-Paragraph eq5iqo00" data-dcnode-id="718"><b class="ssrcss-hmf8ql-BoldText e5tfeyi3" data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">CORRECTION, 19 Feb 15: </span></b><i class="ssrcss-xbdn93-ItalicText e5tfeyi2" data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">An earlier version of this piece referred incorrectly to "applicant" nations - that has now been corrected to read: "Aspirant nations: Georgia, Bosnia, Macedonia, Montenegro". </span></i></p></div></div><div class="ssrcss-5i1hhv-LinksComponentWrapper e1xue1i83" data-component="links-block" data-dcnode-id="632"><section class="ssrcss-msolhr-LinksWrapper e3eyuya4" data-dcnode-id="633"><div class="ssrcss-1lqqmgw-LinksHeadingWrapper e3eyuya3" data-dcnode-id="713"><h2 class="ssrcss-axlwsg-StyledHeading e1fj1fc10" data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">More on this story</span></h2></div><ul class="ssrcss-10bv2vf-EndOfContentLinksGrid e3eyuya1" data-dcnode-id="634" role="list"><li class="s
