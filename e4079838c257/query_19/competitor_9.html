</span><div class="corpsTexte" data-dcnode-id="351"><span data-dcnode-id="5194" instrument_node=""> </span><h1 data-dcnode-id="5192"><span data-dcnode-id="5193" instrument_node="">Analysis of Vladimir Putin's astrological chart</span></h1><span data-dcnode-id="5191" instrument_node="">
</span><h2 data-dcnode-id="5189"><span data-dcnode-id="5190" instrument_node="">Astrology at the service of character analysis</span></h2><span data-dcnode-id="5188" instrument_node="">
</span><p data-dcnode-id="5186"><span data-dcnode-id="5187" instrument_node="">Daily news regularly puts the spotlight on all sorts of famous people. Although we are not fond of juicy information, we inevitably have an idea about a given political figure, a movie star, a Royal Highness, or a skilled sportsman.</span></p><span data-dcnode-id="5185" instrument_node="">
</span><div data-dcnode-id="5170" style="margin: 18px auto; text-align: center"><span data-dcnode-id="5184" instrument_node="">
</span><div data-dcnode-id="5172" id="centralAd" style="margin: 0"><span data-dcnode-id="5183" instrument_node="">
</span><div data-dcnode-id="5181"><span data-dcnode-id="5182" instrument_node="">Advertisements</span></div><span data-dcnode-id="5180" instrument_node="">
</span><span data-dcnode-id="5178" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-9109616861492963" data-ad-slot="9102422335" data-dcnode-id="5177" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="5176" instrument_node="">
</span><span data-dcnode-id="5173" instrument_node="">
</span></div><span data-dcnode-id="5171" instrument_node="">
</span></div><span data-dcnode-id="5169" instrument_node="">
</span><p data-dcnode-id="5167"><span data-dcnode-id="5168" instrument_node="">Those well-known faces draw our interest and seem familiar to us, because we watch their successes or their setbacks day by day.</span></p><span data-dcnode-id="5166" instrument_node="">
</span><p data-dcnode-id="5149"><span data-dcnode-id="5165" instrument_node="">Astrology may also be considered as an interesting filter to better define their </span><a data-dcnode-id="5163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/files/astrology-and-personality.php"><span data-dcnode-id="5164" instrument_node="">personality</span></a><span data-dcnode-id="5162" instrument_node="">, and to guess whether the events they experience are confirmed by their planets' activities. </span><a data-dcnode-id="5160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/files/the_usefulness_of_astrology.php"><span data-dcnode-id="5161" instrument_node="">Astrology</span></a><span data-dcnode-id="5159" instrument_node=""> does not reveal everything, of course, but using the </span><a data-dcnode-id="5157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/planetary-dominants.php"><span data-dcnode-id="5158" instrument_node="">dominants</span></a><span data-dcnode-id="5156" instrument_node=""> and other peculiarities of the </span><a data-dcnode-id="5154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/horoscope_chart_sign_ascendant.php"><span data-dcnode-id="5155" instrument_node="">natal chart</span></a><span data-dcnode-id="5153" instrument_node="">, we can see whether the </span><a data-dcnode-id="5151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/portrait/Comprehensive_Astrological_Portrait"><span data-dcnode-id="5152" instrument_node="">astrological portrait</span></a><span data-dcnode-id="5150" instrument_node=""> matches the collective image or offers unsuspected additional nuances.</span></p><span data-dcnode-id="5148" instrument_node="">
</span><p data-dcnode-id="5140"><span data-dcnode-id="5147" instrument_node="">After </span><a data-dcnode-id="5145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/Focus-Astro-celebrity-Jared-Leto.php"><span data-dcnode-id="5146" instrument_node="">Jared Leto</span></a><span data-dcnode-id="5144" instrument_node=""> and </span><a data-dcnode-id="5142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/Focus-Astro-celebrity-Jim-Carrey.php"><span data-dcnode-id="5143" instrument_node="">Jim Carrey</span></a><span data-dcnode-id="5141" instrument_node="">, here is an article about the powerful Vladimir Putin.</span></p><span data-dcnode-id="5139" instrument_node="">
</span><p data-dcnode-id="5134"><span data-dcnode-id="5138" instrument_node="">You can also read </span><a data-dcnode-id="5136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/astrological-articles-celebrities.php"><span data-dcnode-id="5137" instrument_node="">all the articles</span></a><span data-dcnode-id="5135" instrument_node=""> about personalities who hit the headlines.</span></p><span data-dcnode-id="5133" instrument_node="">
</span><div data-dcnode-id="5131" style="margin: 3px 0 6px 12px; float: right"><img alt="Vladimir Putin" data-dcnode-id="5132" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/Vladimir-Putin.jpg&amp;raw" style="border: 1px solid #000" title="Vladimir Putin"></div><span data-dcnode-id="5130" instrument_node="">
</span><h2 data-dcnode-id="5128"><span data-dcnode-id="5129" instrument_node="">An utterly cold sign of Libra</span></h2><span data-dcnode-id="5127" instrument_node="">
</span><p data-dcnode-id="5111"><a data-dcnode-id="5125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/astrology/Russia"><span data-dcnode-id="5126" instrument_node="">Russia</span></a><span data-dcnode-id="5124" instrument_node="">'s very powerful leader is often thought to be the most influential person of the world, ahead of </span><a data-dcnode-id="5122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/astrology/Xi_Jinping"><span data-dcnode-id="5123" instrument_node="">Xi Jinping</span></a><span data-dcnode-id="5121" instrument_node=""> and </span><a data-dcnode-id="5119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/Focus_Astro_celebrity_Donald_Trump.php"><span data-dcnode-id="5120" instrument_node="">Donald Trump</span></a><span data-dcnode-id="5118" instrument_node="">. At first sight, </span><a data-dcnode-id="5116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/astrology/Vladimir_Putin"><span data-dcnode-id="5117" instrument_node="">Vladimir Putin</span></a><span data-dcnode-id="5115" instrument_node="">'s </span><a data-dcnode-id="5113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/horoscope_chart_sign_ascendant.php"><span data-dcnode-id="5114" instrument_node="">natal chart</span></a><span data-dcnode-id="5112" instrument_node=""> may be surprising, unless the astrologer analyzes it in detail.</span></p><span data-dcnode-id="5110" instrument_node="">
</span><p data-dcnode-id="5081"><span data-dcnode-id="5109" instrument_node="">First of all, Putin was born with </span><a data-dcnode-id="5107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/files/sun_your_motivation_part1.php"><span data-dcnode-id="5108" instrument_node="">the Sun</span></a><span data-dcnode-id="5106" instrument_node=""> in </span><a data-dcnode-id="5104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/libra-zodiac-sign.php"><span data-dcnode-id="5105" instrument_node="">Libra</span></a><span data-dcnode-id="5103" instrument_node="">, a </span><a data-dcnode-id="5101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/astrology_signs.php"><span data-dcnode-id="5102" instrument_node="">sign</span></a><span data-dcnode-id="5100" instrument_node=""> very </span><a data-dcnode-id="5098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/astrology_and_planetary_dominants_method.php"><span data-dcnode-id="5099" instrument_node="">highlighted</span></a><span data-dcnode-id="5097" instrument_node=""> in his chart, because it is tenanted by four planets: the Sun in very tight </span><a data-dcnode-id="5095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/astrology_aspects.php"><span data-dcnode-id="5096" instrument_node="">conjunction</span></a><span data-dcnode-id="5094" instrument_node=""> with </span><a data-dcnode-id="5092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/files/saturn_your_part_of_seriousness.php"><span data-dcnode-id="5093" instrument_node="">Saturn</span></a><span data-dcnode-id="5091" instrument_node="">, then </span><a data-dcnode-id="5089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/files/neptune_inspiration_and_illusion.php"><span data-dcnode-id="5090" instrument_node="">Neptune</span></a><span data-dcnode-id="5088" instrument_node="">, and </span><a data-dcnode-id="5086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/files/mercury_a_penny_for_your_thoughts.php"><span data-dcnode-id="5087" instrument_node="">Mercury</span></a><span data-dcnode-id="5085" instrument_node="">. The distance between these </span><a data-dcnode-id="5083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/astrology_planets.php"><span data-dcnode-id="5084" instrument_node="">planets</span></a><span data-dcnode-id="5082" instrument_node=""> allows to consider that they are all conjunct.</span></p><span data-dcnode-id="5080" instrument_node="">
</span><p data-dcnode-id="5078"><span data-dcnode-id="5079" instrument_node="">They can also be analysed in pairs: Sun-Saturn and Mercury-Neptune, before carrying out their synthesis. This is how we shall proceed, before discussing the other equally interesting features of the chart.</span></p><span data-dcnode-id="5077" instrument_node="">
</span><p data-dcnode-id="5069"><span data-dcnode-id="5076" instrument_node="">Let us recall that Saturn is one of the </span><a data-dcnode-id="5074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/astrology_planetary-rulerships.php"><span data-dcnode-id="5075" instrument_node="">rulers</span></a><span data-dcnode-id="5073" instrument_node=""> of Libra, along with </span><a data-dcnode-id="5071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/files/venus_the_way_you_love_part1.php"><span data-dcnode-id="5072" instrument_node="">Venus</span></a><span data-dcnode-id="5070" instrument_node="">. In the company of Saturn, the Sun describes a personality which finds its structure in people's opinion.</span></p><span data-dcnode-id="5068" instrument_node="">
</span><p data-dcnode-id="5063"><span data-dcnode-id="5067" instrument_node="">Let us get back to well-known information: Putin was born in a Russian family which underwent tragedies. During the siege of </span><a data-dcnode-id="5065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/astrology/Saint_Petersburg"><span data-dcnode-id="5066" instrument_node="">Leningrad</span></a><span data-dcnode-id="5064" instrument_node=""> (Saint Petersburg now), his father was severely wounded in the leg and returned home just in time to rescue the future leader's mother, who was left for dead.</span></p><span data-dcnode-id="5062" instrument_node="">
</span><p data-dcnode-id="5060"><span data-dcnode-id="5061" instrument_node="">Finally, her husband took her to the hospital and saved her. The couple has had two children who died in infancy. As a result, Putin grew up surrounded by parents who transferred upon him, voluntarily or not, a heavy responsibility. Therefore, we are dealing with an entirely Saturnian pattern, i.e. a character hardened by hardship and poverty, the mask of coldness enabling to conceal all sensitivity.</span></p><span data-dcnode-id="5059" instrument_node="">
</span><p data-dcnode-id="5045"><span data-dcnode-id="5058" instrument_node="">As for Mercury, he underlines that Putin has exceptional intellectual abilities, because the planet makes many positive aspects: sextile with </span><a data-dcnode-id="5056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/files/mars_what_makes_you_tick.php"><span data-dcnode-id="5057" instrument_node="">Mars</span></a><span data-dcnode-id="5055" instrument_node="">, with </span><a data-dcnode-id="5053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/files/pluto_eros_and_thanatos.php"><span data-dcnode-id="5054" instrument_node="">Pluto</span></a><span data-dcnode-id="5052" instrument_node="">, and with </span><a data-dcnode-id="5050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/astrology_houses.php"><span data-dcnode-id="5051" instrument_node="">the Midheaven</span></a><span data-dcnode-id="5049" instrument_node="">. In addition, Mercury conjuncts Neptune in the 12th House, pointing to the hidden potency of an ideology, of a dream of a better life. Here, the planet of the mind relies on the cloudy influence of the ruler of </span><a data-dcnode-id="5047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/pisces-zodiac-sign.php"><span data-dcnode-id="5048" instrument_node="">Pisces</span></a><span data-dcnode-id="5046" instrument_node="">.</span></p><span data-dcnode-id="5044" instrument_node="">
</span><p data-dcnode-id="5042"><span data-dcnode-id="5043" instrument_node="">Given their position in the most secretive house of the zodiac, Mercury and Neptune form an alliance for a kind of "survival technique". It is probably owing to this combination that Putin had worked for the KGB for a long time and that he knew how to use skilfully the resources of espionage. He did not refrain from doing so during his two mandates, or perhaps even earlier.</span></p><span data-dcnode-id="5041" instrument_node="">
</span><p data-dcnode-id="5036"><span data-dcnode-id="5040" instrument_node="">However, let us note that Mercury squares </span><a data-dcnode-id="5038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/files/uranus_bolts_from_the_blues.php"><span data-dcnode-id="5039" instrument_node="">Uranus</span></a><span data-dcnode-id="5037" instrument_node=""> and indicates complete unpredictability in the field of communication.</span></p><span data-dcnode-id="5035" instrument_node="">
</span><h2 data-dcnode-id="5033"><span data-dcnode-id="5034" instrument_node="">The Saturn-Neptune cycle and communism</span></h2><span data-dcnode-id="5032" instrument_node="">
</span><p data-dcnode-id="5030"><span data-dcnode-id="5031" instrument_node="">Now, if we examine these four planets together, we notice that the Sun is the only planet in the 11th House (associations, projects), whereas the three others conjuncting him, i.e. Saturn, Neptune, and Mercury, are in the 12th House.</span></p><span data-dcnode-id="5029" instrument_node="">
</span><p data-dcnode-id="5027"><span data-dcnode-id="5028" instrument_node="">Putin's ego is steeped in the values of communism, if one considers that in mundane astrology, this current is represented by the Saturn-Neptune cycle. Given this DNA, Putin exploited this generational trend (people born between 1952 and 1953 are affected by this Saturn-Neptune conjunction, but all of them do not have the Sun conjunct with it).</span></p><span data-dcnode-id="5026" instrument_node="">
</span><p data-dcnode-id="5024"><span data-dcnode-id="5025" instrument_node="">Stalin died in 1953, which confirms the impact of this cycle on leaders and USSR. As for Putin, he climbed all the steps in the shadows, in line with the image of a personality dominated by the 12th House (influence amounting to 30%, in the natal chart, which is considerable).</span></p><span data-dcnode-id="5023" instrument_node="">
</span><h2 data-dcnode-id="5021"><span data-dcnode-id="5022" instrument_node="">Libra and the art of diplomacy</span></h2><span data-dcnode-id="5020" instrument_node="">
</span><p data-dcnode-id="5018"><span data-dcnode-id="5019" instrument_node="">This Saturnian and Neptunian Libra also manifests itself in its talents as a diplomat. We are not referring here to several very blunt declarations Putin may have made (we shall see further down to which planets they should be attributed), but to how he smartly pulled the strings.</span></p><span data-dcnode-id="5017" instrument_node="">
</span><p data-dcnode-id="5012"><span data-dcnode-id="5016" instrument_node="">For instance, in 2008, when he realized that the constitution forbade him from seeking a third term of office, he performed an extremely clever sleight of hand. He had </span><a data-dcnode-id="5014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/astrology/Dmitry_Medvedev"><span data-dcnode-id="5015" instrument_node="">Dmitry Medvedev</span></a><span data-dcnode-id="5013" instrument_node=""> elected, and the latter appointed him head of the government. Thus, in 2012, he could take back the reins.</span></p><span data-dcnode-id="5011" instrument_node="">
</span><p data-dcnode-id="5009"><span data-dcnode-id="5010" instrument_node="">Whether one appreciates Putin or not, one must admit that the longevity of the power of this man driven by Saturn is more than exceptional. Notwithstanding the state of Russia, which went through economic crises, and got involved in numerous conflicts which were costly for its people, the country ended up re-electing Putin.</span></p><span data-dcnode-id="5008" instrument_node="">
</span><h2 data-dcnode-id="5006"><span data-dcnode-id="5007" instrument_node="">The principles of Scorpio and those of Pluto</span></h2><span data-dcnode-id="5005" instrument_node="">
</span><p data-dcnode-id="5000"><span data-dcnode-id="5004" instrument_node="">Would Putin be so domineering despite the tendencies described above? Of course not. However, the man born in Saint-Petersburg has the Ascendant in </span><a data-dcnode-id="5002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/scorpio-zodiac-sign.php"><span data-dcnode-id="5003" instrument_node="">Scorpio</span></a><span data-dcnode-id="5001" instrument_node="">.</span></p><span data-dcnode-id="4999" instrument_node="">
</span><p data-dcnode-id="4997"><span data-dcnode-id="4998" instrument_node="">Moreover, Pluto, ruler of this sign, stands alone, literally clinging to the Midheaven. This points indisputably to an overweening ambition kept secret for a long time.</span></p><span data-dcnode-id="4996" instrument_node="">
</span><p data-dcnode-id="4994"><span data-dcnode-id="4995" instrument_node="">At the KGB, Putin has held low-ranking positions for quite many years. However, nothing could stop such a temperament capable of waiting patiently and of gaining strength from challenges.</span></p><span data-dcnode-id="4993" instrument_node="">
</span><p data-dcnode-id="4991"><span data-dcnode-id="4992" instrument_node="">The dominant Pluto-Ascendant Scorpio combination suits the image of the tough and merciless leader that Putin has become. This is proven by his public bellicose declarations, some of which flowery, for example in 1999, when he promised to hunt down Chechen terrorists even in the toilet, or other similar statements attributed to him. He believes that revenge is a dish best served cold; his enemies have every reason to worry, for he has plenty of time to find them and to get rid of them using more or less stealthy means.</span></p><span data-dcnode-id="4990" instrument_node="">
</span><p data-dcnode-id="4979"><span data-dcnode-id="4989" instrument_node="">His path mostly shows that he is obsessed by power. Pluto on the MC is in </span><a data-dcnode-id="4987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/leo-zodiac-sign.php"><span data-dcnode-id="4988" instrument_node="">Leo</span></a><span data-dcnode-id="4986" instrument_node="">, a directive sign par excellence, in square with </span><a data-dcnode-id="4984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/files/jupiter_heaven_sent_gift.php"><span data-dcnode-id="4985" instrument_node="">Jupiter</span></a><span data-dcnode-id="4983" instrument_node=""> in </span><a data-dcnode-id="4981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/taurus-zodiac-sign.php"><span data-dcnode-id="4982" instrument_node="">Taurus</span></a><span data-dcnode-id="4980" instrument_node="">. Therefore, Putin has no limits.</span></p><span data-dcnode-id="4978" instrument_node="">
</span><p data-dcnode-id="4976"><span data-dcnode-id="4977" instrument_node="">Furthermore, his Pluto is strong, in trine with Mars, and in sextile with Mercury and Neptune. This prompts us to deduce that, whether one likes him or not, Putin's force relies on the meaningful assets backing him.</span></p><span data-dcnode-id="4975" instrument_node="">
</span><p data-dcnode-id="4973"><span data-dcnode-id="4974" instrument_node="">The way he fulfills his huge responsibilities is intelligent, inspired, intentionally vague and full of brio.</span></p><span data-dcnode-id="4972" instrument_node="">
</span><p data-dcnode-id="4970"><span data-dcnode-id="4971" instrument_node="">Here are a few additional words about Mars, who supports Pluto so very well. This is a clue to Putin's liking for sports – especially martial arts. He loves to show himself practicing wrestling, judo, or sambo (a typically Soviet combat sport). Although he might have seemed insignificant in his youth, he has developed a muscular structure mirroring his stamina and his perseverance.</span></p><span data-dcnode-id="4969" instrument_node="">
</span><p data-dcnode-id="4967"><span data-dcnode-id="4968" instrument_node="">To sum up, Putin is unfathomable, complex, and unavoidable. For nearly 20 years, he has been controlling the destiny of a great power with approximately 147 million inhabitants, the world's largest country (by land area), having sprawling military might, and possessing nuclear weapons. Enough to feel dizzy. It is undeniable that such a natal chart reflects only partially Putin's outstanding destiny.</span></p><span data-dcnode-id="4966" instrument_node="">
</span><p data-dcnode-id="4955"><span data-dcnode-id="4965" instrument_node="">In </span><a data-dcnode-id="4963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/transits_ephemerides_chart.php"><span data-dcnode-id="4964" instrument_node="">2020</span></a><span data-dcnode-id="4962" instrument_node="">, </span><a data-dcnode-id="4960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the-method-of-transits-and-prognostic-reports.php"><span data-dcnode-id="4961" instrument_node="">transits</span></a><span data-dcnode-id="4959" instrument_node=""> are not too propitious for him, since the trio of planets transiting </span><a data-dcnode-id="4957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/capricorn-zodiac-sign.php"><span data-dcnode-id="4958" instrument_node="">Capricorn</span></a><span data-dcnode-id="4956" instrument_node=""> will conflict the natal Mercury-Neptune conjunction, and transiting Saturn will square the natal Ascendant in spring.</span></p><span data-dcnode-id="4954" instrument_node="">
</span><p data-dcnode-id="4952"><span data-dcnode-id="4953" instrument_node="">On the other hand, as a good Plutonian, Putin is familiar with tensions and difficulties. It is likely that he will make use of these challenges to impose himself even better.</span></p><span data-dcnode-id="4951" instrument_node="">

</span><div data-dcnode-id="4074" style="float: left; margin: 14px 8px 2px 0px;padding: 4px 4px 2px;background: #ffffff;border: 1px solid;border-radius: 6px"><img alt="" data-dcnode-id="4075" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/chart/sun.gif&amp;raw" style="width: 68px"></div><span data-dcnode-id="4073" instrument_node="">
</span><p data-dcnode-id="4069" style="margin: 10px auto"><b data-dcnode-id="4071"><span data-dcnode-id="4072" instrument_node="">The Sun</span></b><span data-dcnode-id="4070" instrument_node=""> represents vitality, individuality, will-power and creative energy and honours. For a woman, it also represents her father, and later her husband. The Sun is one of  the most important symbols in the birth chart, as much as the Ascendant, then the Moon (a bit less for a man), the ruler of the Ascendant and the fast-moving planets.</span></p><span data-dcnode-id="4068" instrument_node="">
</span><p data-dcnode-id="4066" style="margin: 10px auto"><span data-dcnode-id="4067" instrument_node="">It's element is fire; it is hot and dry, it governs Leo, is in exaltation in Aries and is in analogy with the heart. It represents the boss, authority, beside the father and the husband ; the age of the Sun goes from 20 years old to about 40, following the Venus age when one is aware of his seductive power.</span></p><span data-dcnode-id="4065" instrument_node="">
</span><p data-dcnode-id="4061"><span data-dcnode-id="4063" style="font-style: italic; text-decoration: underline; font-weight: bold"><span data-dcnode-id="4064" instrument_node="">Temperament</span></span><span data-dcnode-id="4062" instrument_node="">: Bilious</span></p><span data-dcnode-id="4060" instrument_node="">
</span><p data-dcnode-id="4056"><span data-dcnode-id="4058" style="font-style: italic; text-decoration: underline; font-weight: bold"><span data-dcnode-id="4059" instrument_node="">Characterology</span></span><span data-dcnode-id="4057" instrument_node="">: Emotive, Active, Secondary, passionate type.</span></p><span data-dcnode-id="4055" instrument_node="">
</span><p data-dcnode-id="4050" style="margin: 10px auto"><span data-dcnode-id="4054" instrument_node="">For more information, see the page dedicated to </span><a data-dcnode-id="4052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/files/sun_your_motivation_part1.php"><span data-dcnode-id="4053" instrument_node="">the Sun</span></a><span data-dcnode-id="4051" instrument_node="">.</span></p><span data-dcnode-id="4049" instrument_node="">
</span><div data-dcnode-id="4001"><div class="detailTextes" data-dcnode-id="4003"><span data-dcnode-id="4048" instrument_node="">
</span><h3 data-dcnode-id="4046"><span data-dcnode-id="4047" instrument_node="">Sun in Libra</span></h3><span data-dcnode-id="4045" instrument_node="">
</span><p data-dcnode-id="4043" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="4044" instrument_node="">You are naturally sociable and you need harmony and alternatives in your life. You loathe violence and you appreciate flexible and balanced behaviours. Who mentioned hesitation? Actually, you prefer to ask yourself questions rather than to answer them. You always put off your decisions in order to keep all your choices open. But appearances may be misleading: Libra is often more determined than she may seem. Certainly, the sign's sociability is legendary. Libra's flexibility is unparalleled, she is even-tempered, capable of bringing harmony into a team and dispelling tensions...  She is very sensitive regarding her balance. You do not mistake black and white, yes and no. If Libra is so anxious to listen to all opposing parties and to examine all the different possible options, it is often with a view to better decide. Without this ability, there may be a danger that you indulge in dubious adherences, or even in dishonest compromises. Your forte is probably that you allow antinomical alternatives to be expressed, as long as it is necessary, until a clear decision can be taken.</span></p><span data-dcnode-id="4042" instrument_node="">
</span><h3 data-dcnode-id="4040"><span data-dcnode-id="4041" instrument_node="">Sun in House XI</span></h3><span data-dcnode-id="4039" instrument_node="">
</span><p data-dcnode-id="4037" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="4038" instrument_node="">With the Sun in the 11th House of your natal chart, you are able to recreate the world, provided that you can rely on loyal friends. Your idealism prompts you to give of your best to great causes, and to believe in the virtues of friendship, dedication, and universal love. So many disillusions lie ahead of you! But also so many hopes and so many moments of exaltation! In some way, you feel that your mission is to change other people's life in order to enliven them and to restore hope. Friendship rules!</span></p><span data-dcnode-id="4036" instrument_node="">
</span><h3 data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">Sun Dominant</span></h3><span data-dcnode-id="4033" instrument_node="">
</span><p data-dcnode-id="4031" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="4032" instrument_node="">If the Sun is part of your natal chart's planetary dominants, in astrology, you are said to be a Solarian: you loathe pettiness and Machiavellian manoeuvre, and you are fond of natural nobleness as well as of direct and honest attitudes. You endeavour to get out of muddled or dark situations as quickly as possible. Your need for transparency may lead you to make cut-and-dried judgments such as yes or no, and black or white. However, your honesty commands your entourage's consideration. At times, you come across as authoritarian. It is true that you never want to be thought of the notable absentee, and that you manage to make people pay attention to you, as well as to your plans and your assessments. To this end, the Solarian sometimes develops a great talent for placing himself under the spotlight without missing a single opportunity to arouse interest. Some other Solarians, although more discreet, still manage to be the focus of any debate, even in situations of exclusion. It is your way of being present even though you are actually not there... More than other people, you appreciate the esteem extended to you. It is useless to cheat with you, since in all areas you consider establishing enduring relationships only with those who love you, admire you, respect you, or express some degree of affection to you. Your will to straighten out your inter-personal relationships is your strength and sometimes, your Achilles' heel. You cannot achieve anything behind the scenes. Therefore, your comportment is marked with heroism, and your stands are devoid of ambiguity, in the sense that your commitments are unfailing, and your rebuffs, final.</span></p><span data-dcnode-id="4030" instrument_node="">
</span><div data-dcnode-id="4013" style="border-top: 1px dotted #000; margin: 10px auto"><span data-dcnode-id="4029" instrument_node="">
</span><h3 data-dcnode-id="4027"><span data-dcnode-id="4028" instrument_node="">Interpretation of the 13° Libra symbolic degree</span></h3><span data-dcnode-id="4026" instrument_node="">
</span><h4 data-dcnode-id="4021" style="margin: 0;font-style: italic;font-size: 14px;font-weight: normal;padding: 0 4px 8px 8px"><span data-dcnode-id="4025" instrument_node="">"Masks, wigs, and other accessories meant for disguise are lain on a table below a mirror. Hidden behind drapes, a man and a woman spy on one another." (</span><a data-dcnode-id="4023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the_360_symbolic_degrees.php"><span data-dcnode-id="4024" instrument_node="">Janduz</span></a><span data-dcnode-id="4022" instrument_node=""> version)</span></h4><span data-dcnode-id="4020" instrument_node=""> </span><p data-dcnode-id="4018" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="4019" instrument_node="">Shrewd, subtle, and manipulative character endowed with numerous gifts, including artistic and acting skills. One is capable of simulating a wide range of feelings in order to reach one's goals, both in the professional and the affective spheres. In most cases, one is driven by self-interest.</span></p><span data-dcnode-id="4017" instrument_node=""> </span><p data-dcnode-id="4015" style="margin: 11px 0 3px 8px; text-align: justify; font-style: italic"><span data-dcnode-id="4016" instrument_node="">N.B.: symbolic degrees belong to a branch of fatalistic astrology. Their interpretation must be regarded with the utmost caution, especially given the fact that different authors give different meanings to symbolic degrees. This is the reason why they are not included in our Astrotheme reports.</span></p><span data-dcnode-id="4014" instrument_node=""> </span></div><span data-dcnode-id="4012" instrument_node="">
</span><div data-dcnode-id="4011" style="border-top: 1px dotted #000; margin: 10px auto"></div><span data-dcnode-id="4010" instrument_node="">
</span><p data-dcnode-id="4005" style="margin: 13px 0 3px 8px; text-align: justify"><span data-dcnode-id="4009" instrument_node="">If you wish, you can receive immediately in your mailbox your </span><a data-dcnode-id="4007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/portrait/Comprehensive_Astrological_Portrait" onclick="window.open(this.href,'PortraitComplet'); return false"><span data-dcnode-id="4008" instrument_node="">detailed astrological portrait</span></a><span data-dcnode-id="4006" instrument_node="">, a nice gift for yourself or for your close friends and relatives, who will deeply appreciate it.</span></p><span data-dcnode-id="4004" instrument_node="">

</span><div data-dcnode-id="3982" style="float: left; padding-top: 2px; text-align: left"><span data-dcnode-id="3996" instrument_node="">Moon 2°55' Gemini, in House VIII</span><div data-dcnode-id="3983" style="text-align: left"><br data-dcnode-id="3995"><span data-dcnode-id="3993" style="font-style: italic; text-decoration: underline"><span data-dcnode-id="3994" instrument_node="">Moon Aspects</span></span><br data-dcnode-id="3992"><span data-dcnode-id="3990" style="color: #008500"><span data-dcnode-id="3991" instrument_node="">Moon inconjunction Ascendant orb +0°17'</span></span><br data-dcnode-id="3989"><span data-dcnode-id="3987" style="color: #c03c9d"><span data-dcnode-id="3988" instrument_node="">Moon sesqui-quadrate Saturn orb -0°27'</span></span><br data-dcnode-id="3986"><span data-dcnode-id="3984" style="color: #c03c9d"><span data-dcnode-id="3985" instrument_node="">Moon semi-square Uranus orb +0°29'</span></span></div></div><span data-dcnode-id="3981" instrument_node="">
</span><div data-dcnode-id="3979" style="float: right"><img alt="" data-dcnode-id="3980" id="bascule_13" onclick="basculer(this.id)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/developper.gif&amp;raw" style="border: 0; cursor: pointer; width: 24px"></div><span data-dcnode-id="3978" instrument_node="">
</span><div data-dcnode-id="3977" style="clear: both; line-height: 0.1em; font-size: 1px"></div><span data-dcnode-id="3976" instrument_node="">
</span></div><span data-dcnode-id="3974" instrument_node="">
</span><div data-dcnode-id="3972" style="float: left; margin: 14px 8px 2px 0px;padding: 4px 4px 2px;background: #ffffff;border: 1px solid;border-radius: 6px"><img alt="" data-dcnode-id="3973" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/chart/moon.gif&amp;raw" style="width: 68px"></div><span data-dcnode-id="3971" instrument_node="">
</span><p data-dcnode-id="3967" style="margin: 10px auto"><b data-dcnode-id="3969"><span data-dcnode-id="3970" instrument_node="">The Moon</span></b><span data-dcnode-id="3968" instrument_node=""> represents instinctive reaction, unconscious predestination, everyday mood, sensitivity, emotions, the feminine side of the personality, intuition, imagination. For a man, she represents his mother and later his wife, and his relationship with women in general. For a woman, the Moon is almost as important as the Sun and the Ascendant. Her element is water, she is cold and moist, she rules Cancer, is in exaltation in Taurus and is in analogy with the stomach. </span></p><span data-dcnode-id="3966" instrument_node="">
</span><p data-dcnode-id="3964" style="margin: 10px auto"><span data-dcnode-id="3965" instrument_node="">She symbolizes the mother, wife, the crowd, the Moon is associated with birth and childhood. Tradition also matches her with the end of life, after Saturn the old age, it is thus customary to go back to one's place of birth to die: the end of life meets the very beginning.</span></p><span data-dcnode-id="3963" instrument_node="">
</span><p data-dcnode-id="3959"><span data-dcnode-id="3961" style="font-style: italic; text-decoration: underline; font-weight: bold"><span data-dcnode-id="3962" instrument_node="">Temperament</span></span><span data-dcnode-id="3960" instrument_node="">: Lymphatic</span></p><span data-dcnode-id="3958" instrument_node="">
</span><p data-dcnode-id="3954"><span data-dcnode-id="3956" style="font-style: italic; text-decoration: underline; font-weight: bold"><span data-dcnode-id="3957" instrument_node="">Characterology</span></span><span data-dcnode-id="3955" instrument_node="">: Emotive, non Active and Primary type or Non-Emotive, non Active and Primary, Nervous or Amorphous type.</span></p><span data-dcnode-id="3953" instrument_node="">
</span><p data-dcnode-id="3948" style="margin: 10px auto"><span data-dcnode-id="3952" instrument_node="">For more information, see the page dedicated to </span><a data-dcnode-id="3950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/files/the_moon_instinct_and_emotions.php"><span data-dcnode-id="3951" instrument_node="">the Moon</span></a><span data-dcnode-id="3949" instrument_node="">.</span></p><span data-dcnode-id="3947" instrument_node="">
</span><div data-dcnode-id="3899"><div class="detailTextes" data-dcnode-id="3901"><span data-dcnode-id="3946" instrument_node="">
</span><h3 data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">Moon in Gemini</span></h3><span data-dcnode-id="3943" instrument_node="">
</span><p data-dcnode-id="3941" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3942" instrument_node="">On the day and at the time of your birth, the Moon was in the sign of Gemini. You easily adjust to all kinds of situations because your outgoing nature integrates the characteristics of your environment very quickly. You communicate your emotions, you share your pleasures, your joys...  and your sorrows. Your lunar sign belongs to the Gemini-Sagittarius axis that is decidedly open on the external world. You display strong assimilation abilities and you readily adopt your entourage's habits. Besides, your life setting does not necessarily have the stiff side that others may need to feel safe. You put up with rhythm changes and your balance is not upset by unforeseen events and contacts. On the contrary, you loathe solitude and you are very comfortable when you have to exchange and to relate to others. There is a danger that you very cautiously avoid: your adaptation capacity must not turn you into a chameleon and it is important that you pay due attention to your needs and your personal rhythms.</span></p><span data-dcnode-id="3940" instrument_node="">
</span><h3 data-dcnode-id="3938"><span data-dcnode-id="3939" instrument_node="">Moon in House VIII</span></h3><span data-dcnode-id="3937" instrument_node="">
</span><p data-dcnode-id="3935" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3936" instrument_node="">With the Moon in the 8th House, your private world is filled with ghosts, phantasms, and fantasy. Your sensitivity is in natural harmony with the principles of crisis and transformation. It is most probable that you never feel better than when you have to give up the illusory projects of the day in order to rebuild a different world. Might it be some sort of masochism? This remains to be seen. Evolution develops at the cost of a few sacrifices involving your well-being, your clan, or your private sphere.</span></p><span data-dcnode-id="3934" instrument_node="">
</span><h3 data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">Moon Dominant</span></h3><span data-dcnode-id="3931" instrument_node="">
</span><p data-dcnode-id="3929" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3930" instrument_node="">If the Moon is part of your natal chart's planetary dominants, in astrology, you are said to be a Lunarian: the driving force behind your actions is mainly the pursuit of well-being and tranquillity. Your sensitive and romantic self lives on those periods of rest during which you let your imagination wander at will. This is your way of finding inspiration and balance. Nothing is allowed to disturb your feeling of fulfilment and security within a harmonious cell, be it a family or a clan. More than other people, the Lunarian is attached to those moments during which one forgets one's worries and lets oneself cast adrift aimlessly, with no other goal than to be lulled into an ambiance, a situation, or a perfect moment. Many people do not understand such absences and their meaning, which is to regain strength. These people readily describe you with such unflattering terms as apathy and nonchalance. Never mind! Some inspirations require surrendering as well as striking a balance derived from alternate action and passivity. Your qualities are expressed to the fullest in situations which demand familiarity and privacy. Your capacities to respect and blend into your environment is at least as valuable as some other people's aggressive dispositions. However, you are well-advised to avoid indolence and renunciation out of laziness or indifference.</span></p><span data-dcnode-id="3928" instrument_node="">
</span><div data-dcnode-id="3911" style="border-top: 1px dotted #000; margin: 10px auto"><span data-dcnode-id="3927" instrument_node="">
</span><h3 data-dcnode-id="3925"><span data-dcnode-id="3926" instrument_node="">Interpretation of the 2° Gemini symbolic degree</span></h3><span data-dcnode-id="3924" instrument_node="">
</span><h4 data-dcnode-id="3919" style="margin: 0;font-style: italic;font-size: 14px;font-weight: normal;padding: 0 4px 8px 8px"><span data-dcnode-id="3923" instrument_node="">"By a waterfall, a troubadour plays the lyre while his companion listens." (</span><a data-dcnode-id="3921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the_360_symbolic_degrees.php"><span data-dcnode-id="3922" instrument_node="">Janduz</span></a><span data-dcnode-id="3920" instrument_node=""> version)</span></h4><span data-dcnode-id="3918" instrument_node=""> </span><p data-dcnode-id="3916" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3917" instrument_node="">Carefree, passionate, and whimsical character endowed with great artistic gifts. Success and fame can be achieved in any artistic discipline. Depending on the natal chart, one wastes one's talents or on the contrary, carefully cultivates them.</span></p><span data-dcnode-id="3915" instrument_node=""> </span><p data-dcnode-id="3913" style="margin: 11px 0 3px 8px; text-align: justify; font-style: italic"><span data-dcnode-id="3914" instrument_node="">N.B.: symbolic degrees belong to a branch of fatalistic astrology. Their interpretation must be regarded with the utmost caution, especially given the fact that different authors give different meanings to symbolic degrees. This is the reason why they are not included in our Astrotheme reports.</span></p><span data-dcnode-id="3912" instrument_node=""> </span></div><span data-dcnode-id="3910" instrument_node="">

</span><div data-dcnode-id="3855" style="float: left; margin: 14px 8px 2px 0px;padding: 4px 4px 2px;background: #ffffff;border: 1px solid;border-radius: 6px"><img alt="" data-dcnode-id="3856" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/chart/mercury.gif&amp;raw" style="width: 68px"></div><span data-dcnode-id="3854" instrument_node="">
</span><p data-dcnode-id="3850" style="margin: 10px auto"><b data-dcnode-id="3852"><span data-dcnode-id="3853" instrument_node="">Mercury</span></b><span data-dcnode-id="3851" instrument_node=""> represents communication, logical and rational mind, intellectual skills. Earth is its element, it is cold and dry, and it rules Virgo and Gemini, is in exaltation in Virgo and is in analogy with the arms, hands, nervous system. </span></p><span data-dcnode-id="3849" instrument_node="">
</span><p data-dcnode-id="3847" style="margin: 10px auto"><span data-dcnode-id="3848" instrument_node="">It represents tradesmen, lawyers, messengers; the age of Mercury goes from 8 or10 years old to about 15..</span></p><span data-dcnode-id="3846" instrument_node="">
</span><p data-dcnode-id="3842"><span data-dcnode-id="3844" style="font-style: italic; text-decoration: underline; font-weight: bold"><span data-dcnode-id="3845" instrument_node="">Temperament</span></span><span data-dcnode-id="3843" instrument_node="">: Nervous</span></p><span data-dcnode-id="3841" instrument_node="">
</span><p data-dcnode-id="3837"><span data-dcnode-id="3839" style="font-style: italic; text-decoration: underline; font-weight: bold"><span data-dcnode-id="3840" instrument_node="">Characterology</span></span><span data-dcnode-id="3838" instrument_node="">: Emotive, non Active and Primary type or Non-Emotive, Active and Primary, Nervous or Sanguine type.</span></p><span data-dcnode-id="3836" instrument_node="">
</span><p data-dcnode-id="3831" style="margin: 10px auto"><span data-dcnode-id="3835" instrument_node="">For more information, see the page dedicated to </span><a data-dcnode-id="3833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/files/mercury_a_penny_for_your_thoughts.php"><span data-dcnode-id="3834" instrument_node="">Mercury</span></a><span data-dcnode-id="3832" instrument_node="">.</span></p><span data-dcnode-id="3830" instrument_node="">
</span><div data-dcnode-id="3782"><div class="detailTextes" data-dcnode-id="3784"><span data-dcnode-id="3829" instrument_node="">
</span><h3 data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">Mercury in Libra</span></h3><span data-dcnode-id="3826" instrument_node="">
</span><p data-dcnode-id="3824" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3825" instrument_node="">Mercury describes your relations, your communication skills and the way you relate to the external world. However, other astrological elements also influence these areas. The sign Mercury occupies is significant only if Mercury is part of your planetary dominantes. In your chart, Mercury is in Libra. Communication is one of your assets. You assimilate very rapidly the characteristics of your environment. The flexibility you display in your judgments and your human exchanges gives you the reputation of being sociable. You strive to balance your opinions and to thoroughly weigh up information before dismissing or accepting them. You are fond of nuances and alternatives. As firm as your standpoints may be, they are neither stiff nor final.</span></p><span data-dcnode-id="3823" instrument_node="">
</span><h3 data-dcnode-id="3821"><span data-dcnode-id="3822" instrument_node="">Mercury in House XII</span></h3><span data-dcnode-id="3820" instrument_node="">
</span><p data-dcnode-id="3818" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3819" instrument_node="">With Mercury in the 12th House, you are in search of the unknown. You display keen curiosity about strange topics, the paranormal, as well as unusual people and worlds. Your intuition and your analytical mind form one whole piece, and they perfectly blend into each other. You try to understand what is unexplainable, and to feel what is impalpable, which boils down to squaring the circle! In such conditions, it is most likely that your mode of communication has its own specific rules. Your comportment is pretty bizarre.</span></p><span data-dcnode-id="3817" instrument_node="">
</span><h3 data-dcnode-id="3815"><span data-dcnode-id="3816" instrument_node="">Mercury Dominant</span></h3><span data-dcnode-id="3814" instrument_node="">
</span><p data-dcnode-id="3812" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3813" instrument_node="">If Mercury is part of your natal chart's planetary dominants, in astrology, you are said to be a Mercurian: the tradition points out the importance of communication. From idle but enriching chatters to observation gift, such a dominant endows you with a wide range of expression. Human beings have one thousand facets and one thousand masks they wear according to circumstances and the fortunes of the game of life. You take the role of an observer who is avid for novelties, discoveries, and surprises. Everything catches your attention and becomes an opportunity for new encounters, relationships, and learning. The world amazes you, amuses you sometimes, and stimulates your curiosity. Because the most important thing is to discover, and because you consider that each new situation is packed with potentialities, you try to fill the gaps in your knowledge. Although your open-mindedness may scatter your centres of interest, it also enables you to carefully avoid sticking to only one immutable and rigid view. The slightest sign enables you to perceive the other side of the coin, as well as the infinite complexity of people and of situations. On the human plane, you seek the dialogue and the information without which you know that you are not able to fully grasp the nature of your interlocutor. This keen interest in the Unknown sharpens your inter-relational skills. All these qualities are traditionally associated with Mercury.</span></p><span data-dcnode-id="3811" instrument_node="">
</span><div data-dcnode-id="3794" style="border-top: 1px dotted #000; margin: 10px auto"><span data-dcnode-id="3810" instrument_node="">
</span><h3 data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">Interpretation of the 23° Libra symbolic degree</span></h3><span data-dcnode-id="3807" instrument_node="">
</span><h4 data-dcnode-id="3802" style="margin: 0;font-style: italic;font-size: 14px;font-weight: normal;padding: 0 4px 8px 8px"><span data-dcnode-id="3806" instrument_node="">"In the neighbourhood of a splendid tree on top of a rocky promontory, a centaur shoots arrows at snakes, which are running away in the grass." (</span><a data-dcnode-id="3804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the_360_symbolic_degrees.php"><span data-dcnode-id="3805" instrument_node="">Janduz</span></a><span data-dcnode-id="3803" instrument_node=""> version)</span></h4><span data-dcnode-id="3801" instrument_node=""> </span><p data-dcnode-id="3799" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3800" instrument_node="">Righteous, humble, and independent character. One has the capacity to wisely manage private companies or institutions dealing with public interests. High-ranking positions in the ministry of Finance or the Central Bank are very favoured. However, since success often arouses envy one must beware of jealous people and steer clear of political intrigues, especially if in the natal chart, Mars is dominant. As a matter of rule, this degree is a splendid omen for happiness, wealth, and honour.</span></p><span data-dcnode-id="3798" instrument_node=""> </span><p data-dcnode-id="3796" style="margin: 11px 0 3px 8px; text-align: justify; font-style: italic"><span data-dcnode-id="3797" instrument_node="">N.B.: symbolic degrees belong to a branch of fatalistic astrology. Their interpretation must be regarded with the utmost caution, especially given the fact that different authors give different meanings to symbolic degrees. This is the reason why they are not included in our Astrotheme reports.</span></p><span data-dcnode-id="3795" instrument_node=""> </span></div><span data-dcnode-id="3793" instrument_node="">
</span><div data-dcnode-id="3792" style="border-top: 1px dotted #000; margin: 10px auto"></div><span data-dcnode-id="3791" instrument_node="">
</span><p data-dcnode-id="3786" style="margin: 13px 0 3px 8px; text-align: justify"><span data-dcnode-id="3790" instrument_node="">If you wish, you can receive immediately in your mailbox your </span><a data-dcnode-id="3788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/portrait/Comprehensive_Astrological_Portrait" onclick="window.open(this.href,'PortraitComplet'); return false"><span data-dcnode-id="3789" instrument_node="">detailed astrological portrait</span></a><span data-dcnode-id="3787" instrument_node="">, a nice gift for yourself or for your close friends and relatives, who will deeply appreciate it.</span></p><span data-dcnode-id="3785" instrument_node="">

</span><div data-dcnode-id="3757" style="float: right"><img alt="" data-dcnode-id="3758" id="bascule_15" onclick="basculer(this.id)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/developper.gif&amp;raw" style="border: 0; cursor: pointer; width: 24px"></div><span data-dcnode-id="3756" instrument_node="">

</span><div data-dcnode-id="3750" style="float: left; margin: 14px 8px 2px 0px;padding: 4px 4px 2px;background: #ffffff;border: 1px solid;border-radius: 6px"><img alt="" data-dcnode-id="3751" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/chart/venus.gif&amp;raw" style="width: 68px"></div><span data-dcnode-id="3749" instrument_node="">
</span><p data-dcnode-id="3745" style="margin: 10px auto"><b data-dcnode-id="3747"><span data-dcnode-id="3748" instrument_node="">Venus</span></b><span data-dcnode-id="3746" instrument_node=""> represents the way one loves, relationships, sharing, affectivity, seductive ability. For men, she also corresponds to the kind of woman he's attracted to (but not especially in marriage which is more symbolized by the Moon, Venus is the lover and not the wife). Her element is the Air, she is moist, rules Taurus and Libra, is in exaltation in Pisces and is in analogy with the kidneys, the venous system, the bladder, the neck.</span></p><span data-dcnode-id="3744" instrument_node="">
</span><p data-dcnode-id="3742" style="margin: 10px auto"><span data-dcnode-id="3743" instrument_node="">She represents the artists, tradesmen, occupations linked to beauty and charm; the age of Venus goes from 15 to about 25 years old.</span></p><span data-dcnode-id="3741" instrument_node="">
</span><p data-dcnode-id="3737"><span data-dcnode-id="3739" style="font-style: italic; text-decoration: underline; font-weight: bold"><span data-dcnode-id="3740" instrument_node="">Temperament</span></span><span data-dcnode-id="3738" instrument_node="">: Sanguine and Lymphatic</span></p><span data-dcnode-id="3736" instrument_node="">
</span><p data-dcnode-id="3732"><span data-dcnode-id="3734" style="font-style: italic; text-decoration: underline; font-weight: bold"><span data-dcnode-id="3735" instrument_node="">Characterology</span></span><span data-dcnode-id="3733" instrument_node="">: Emotive, non Active and Primary type or Emotive, non Active and Secondary type.</span></p><span data-dcnode-id="3731" instrument_node="">
</span><p data-dcnode-id="3726" style="margin: 10px auto"><span data-dcnode-id="3730" instrument_node="">For more information, see the page dedicated to </span><a data-dcnode-id="3728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/files/venus_the_way_you_love_part1.php"><span data-dcnode-id="3729" instrument_node="">Venus</span></a><span data-dcnode-id="3727" instrument_node="">.</span></p><span data-dcnode-id="3725" instrument_node="">
</span><div data-dcnode-id="3677"><div class="detailTextes" data-dcnode-id="3679"><span data-dcnode-id="3724" instrument_node="">
</span><h3 data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">Venus in Scorpio</span></h3><span data-dcnode-id="3721" instrument_node="">
</span><p data-dcnode-id="3719" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3720" instrument_node="">Venus describes your affective life. On the day of your birth, she is found in Scorpio. You demonstrate a great instinctive strength that is connected with the complex way in which you feel the world and you experience your passions. You are able to love to distraction and to hate at the same time, with an intensity that appeals to your partners but also disturbs them. It is likely that your sexuality is very strong, demanding and full of dreams and fantasies. Passion is not an empty word for you. For worse or for better, you need to love, to desire, sometimes with outrageousness. Intense passion, developed sensuality, demanding sexuality: all ingredients are brought together for love. The devil takes tepid feelings, love without fire! It is important to experience your couple's relationship intensely, even dangerously. Your charm? Distance. Love is made of surprises and suspense: with malicious pleasure, you fuel crises, tears, tensions, and everything that can keep extreme passion alive. Love is a struggle, a conquest yet to be achieved. Of course, your partner never gets bored with you. Your sentimental vehemence suits couples looking for thrills. You may hurt the person whose heart elected you. Fatality! However, it is likely that your taste for extreme passion allows to experience exceptionally intense moments of happiness.</span></p><span data-dcnode-id="3718" instrument_node="">
</span><h3 data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">Venus in House I</span></h3><span data-dcnode-id="3715" instrument_node="">
</span><p data-dcnode-id="3713" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3714" instrument_node="">Venus expresses her qualities through the values of the 1st House. Your first reactions are affective or sensual. Before you start to think, to accept your interlocutor, or to keep your distance, you follow your dislikes or your infatuations, sometimes quite blindly. You discover the world, the others, and the unknown through your sensations, your instinctive desire, or your natural repulsions. Emotions precede reasoning. The keywords of your personality are charm, seduction, and desire.</span></p><span data-dcnode-id="3712" instrument_node="">
</span><h3 data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">Venus Dominant</span></h3><span data-dcnode-id="3709" instrument_node="">
</span><p data-dcnode-id="3707" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3708" instrument_node="">If Venus is part of your natal chart's planetary dominants, in astrology, you are said to be a Venusian: you are a sensual and emotional person particularly receptive to the natural likes and dislikes aroused by your contact with people. You are prone to frequent instinctive aversions and true passions which are exclusively driven by the feeling of love. The heart has its reasons which Reason knows nothing of... Your balance is based on the richness of your affective life. Without love, the Venusian is resourceless, lost, and deprived of any reason for living. You have an obvious and strong will to charm and to arouse the attachments without which you cannot properly function. Every area of your life is thus marked by your affectivity. The danger is that you may "be taken in" by charm. In such cases, you would prefer to keep your emotions under better control. Thus, hyper-sensitivity has its own inconveniences. Nevertheless, better than anyone else, you know how to play with feelings and attractions. Although you are sometimes caught in the traps of an over sensitive emotionalism, feelings remain your best assets in many circumstances. There is another aspect to the Venusian dominant. According to the Tradition, this planet rules the Arts, and you are endowed with some degree of artistic dispositions, ranging from good to excellent.</span></p><span data-dcnode-id="3706" instrument_node="">
</span><div data-dcnode-id="3689" style="border-top: 1px dotted #000; margin: 10px auto"><span data-dcnode-id="3705" instrument_node="">
</span><h3 data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">Interpretation of the 11° Scorpio symbolic degree</span></h3><span data-dcnode-id="3702" instrument_node="">
</span><h4 data-dcnode-id="3697" style="margin: 0;font-style: italic;font-size: 14px;font-weight: normal;padding: 0 4px 8px 8px"><span data-dcnode-id="3701" instrument_node="">"A snake tries to get rid of a swarm of flies, in vain. In the background, an isolated house is surrounded by a clump of trees." (</span><a data-dcnode-id="3699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the_360_symbolic_degrees.php"><span data-dcnode-id="3700" instrument_node="">Janduz</span></a><span data-dcnode-id="3698" instrument_node=""> version)</span></h4><span data-dcnode-id="3696" instrument_node=""> </span><p data-dcnode-id="3694" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3695" instrument_node="">Reserved, obsessive, and resourceful character. One is surrounded by enemies who claim compensation for an injustice which one is responsible for. This degree sometimes indicates that one is haunted by the remorse for an old mistake or by some secret tragedy.</span></p><span data-dcnode-id="3693" instrument_node=""> </span><p data-dcnode-id="3691" style="margin: 11px 0 3px 8px; text-align: justify; font-style: italic"><span data-dcnode-id="3692" instrument_node="">N.B.: symbolic degrees belong to a branch of fatalistic astrology. Their interpretation must be regarded with the utmost caution, especially given the fact that different authors give different meanings to symbolic degrees. This is the reason why they are not included in our Astrotheme reports.</span></p><span data-dcnode-id="3690" instrument_node=""> </span></div><span data-dcnode-id="3688" instrument_node="">

</span><div data-dcnode-id="3636" style="float: left; margin: 14px 8px 2px 0px;padding: 4px 4px 2px;background: #ffffff;border: 1px solid;border-radius: 6px"><img alt="" data-dcnode-id="3637" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/chart/mars.gif&amp;raw" style="width: 68px"></div><span data-dcnode-id="3635" instrument_node="">
</span><p data-dcnode-id="3631" style="margin: 10px auto"><b data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">Mars</span></b><span data-dcnode-id="3632" instrument_node=""> represents the desire for action and physical energy, sexuality, strength. For a woman, Mars corresponds to the kind of man she's attracted to (but not especially in marriage which is rather symbolized by the Sun, Mars is the lover, not the husband). Fire is its element, it is hot and dry, and it rules Aries and Scorpio (along with Pluto), is in exaltation with Capricorn and is in analogy with the muscles and the spleen. </span></p><span data-dcnode-id="3630" instrument_node="">
</span><p data-dcnode-id="3628" style="margin: 10px auto"><span data-dcnode-id="3629" instrument_node="">It represents the soldiers, sportsmen, warriors, surgeons, blacksmiths... ; the age of Mars goes from 42 to 50 years old.</span></p><span data-dcnode-id="3627" instrument_node="">
</span><p data-dcnode-id="3623"><span data-dcnode-id="3625" style="font-style: italic; text-decoration: underline; font-weight: bold"><span data-dcnode-id="3626" instrument_node="">Temperament</span></span><span data-dcnode-id="3624" instrument_node="">: Bilious</span></p><span data-dcnode-id="3622" instrument_node="">
</span><p data-dcnode-id="3618"><span data-dcnode-id="3620" style="font-style: italic; text-decoration: underline; font-weight: bold"><span data-dcnode-id="3621" instrument_node="">Characterology</span></span><span data-dcnode-id="3619" instrument_node="">: Emotive, Active, Primary type. It is a Choleric.</span></p><span data-dcnode-id="3617" instrument_node="">
</span><p data-dcnode-id="3612" style="margin: 10px auto"><span data-dcnode-id="3616" instrument_node="">For more information, see the page dedicated to </span><a data-dcnode-id="3614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/files/mars_what_makes_you_tick.php"><span data-dcnode-id="3615" instrument_node="">Mars</span></a><span data-dcnode-id="3613" instrument_node="">.</span></p><span data-dcnode-id="3611" instrument_node="">
</span><div data-dcnode-id="3563"><div class="detailTextes" data-dcnode-id="3565"><span data-dcnode-id="3610" instrument_node="">
</span><h3 data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">Mars in Sagittarius</span></h3><span data-dcnode-id="3607" instrument_node="">
</span><p data-dcnode-id="3605" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3606" instrument_node="">The planet Mars indicates how you react to life concrete stimulations. It also describes your fighting spirit, your abilities to stand for yourself and to take action. With Mars in Sagittarius, your dynamism is aroused when you have to go ahead, to discover new life settings and to broaden your horizon. You have the soul of an adventurer! Your nature is straightforward, direct and enthusiastic and it is difficult for you to tell lies and to follow the tortuous paths of diplomacy. You do not fear danger and your scope of action has no limit. Because you feel concerned about all things, you readily commit yourself in collective struggles or actions. You feel that it is important to go beyond your limitations and to take action, especially in favour of events that are not related to you personally. You always inscribe an element into a wider content. This is how original solutions may emerge, even if it means that you have to exercise more pragmatism: reality may be impossible to ignore.</span></p><span data-dcnode-id="3604" instrument_node="">
</span><h3 data-dcnode-id="3602"><span data-dcnode-id="3603" instrument_node="">Mars in House II</span></h3><span data-dcnode-id="3601" instrument_node="">
</span><p data-dcnode-id="3599" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3600" instrument_node="">With Mars in the 2nd House, you fight for your interests with fierce energy. One must deserve a capital and work to acquire it. Acquisition is a unique field of experience for developing and highlighting your personal dynamism. To own an object means to make a move towards it and to conquer it. If you are involved in business, your attitudes are marked by the principle of challenge, which is the sign of an aggressive commercial policy. More often than not, the way you manage your assets is risky.</span></p><span data-dcnode-id="3598" instrument_node="">
</span><h3 data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">Mars Dominant</span></h3><span data-dcnode-id="3595" instrument_node="">
</span><p data-dcnode-id="3593" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3594" instrument_node="">If Mars is part of your natal chart's planetary dominants, in astrology, you are said to be a Marsian: in your hand-to-hand struggle for life, you demonstrate an acute and active sense of confrontation with the world, with other people, and with your own destiny. You need to take action and to fight for your projects and your desires. You perceive all situations with deep intensity, and you react to the here and now without bothering to step back in order to ensure that events are under your control. You take up challenges with excessive foolhardiness as a consequence of your impulsiveness. However, better than anyone else, you know how to mobilise your resources in case of crisis. You take action whenever it is necessary to do so, and you are present in a timely manner. With Mars, your attitudes are dictated by the realities of the moment, by your emotions, and by everything which proved to have worked in the past. When this dominant is not well integrated, it may bring about an aggressive or impulsive behaviour. Therefore, you must learn to control your hyper-sensitivity and your fits of temper. You are also endowed with Marsian qualities: the fighting spirit and the taste for duel without which one may find oneself overwhelmed by events. When this willpower is well channelled, its precious energy enables to cope with all sorts of contingencies. There are a thousand ways to win, and a thousand challenges to take up with the enthusiasm and the dynamism which make life so worthy. A certain idea of life which is wild, passionate, and in tune with events.</span></p><span data-dcnode-id="3592" instrument_node="">
</span><div data-dcnode-id="3575" style="border-top: 1px dotted #000; margin: 10px auto"><span data-dcnode-id="3591" instrument_node="">
</span><h3 data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">Interpretation of the 26° Sagittarius symbolic degree</span></h3><span data-dcnode-id="3588" instrument_node="">
</span><h4 data-dcnode-id="3583" style="margin: 0;font-style: italic;font-size: 14px;font-weight: normal;padding: 0 4px 8px 8px"><span data-dcnode-id="3587" instrument_node="">"A lion tries to catch a man hanged to a tree by the feet." (</span><a data-dcnode-id="3585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the_360_symbolic_degrees.php"><span data-dcnode-id="3586" instrument_node="">Janduz</span></a><span data-dcnode-id="3584" instrument_node=""> version)</span></h4><span data-dcnode-id="3582" instrument_node=""> </span><p data-dcnode-id="3580" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3581" instrument_node="">Courageous, enterprising, and honest character. One may be the victim of unfair, less scrupulous or less skilled superiors. Despite numerous enemies, one reaches a prominent position. Nevertheless, one must remain very careful, adopt a low profile, and be prepared to thwart the machinations concocted by higher-ups.</span></p><span data-dcnode-id="3579" instrument_node=""> </span><p data-dcnode-id="3577" style="margin: 11px 0 3px 8px; text-align: justify; font-style: italic"><span data-dcnode-id="3578" instrument_node="">N.B.: symbolic degrees belong to a branch of fatalistic astrology. Their interpretation must be regarded with the utmost caution, especially given the fact that different authors give different meanings to symbolic degrees. This is the reason why they are not included in our Astrotheme reports.</span></p><span data-dcnode-id="3576" instrument_node=""> </span></div><span data-dcnode-id="3574" instrument_node="">
