</span><div data-dcnode-id="2691" style="clear: both; line-height: 0.1em; font-size: 1px"></div><span data-dcnode-id="2690" instrument_node="">
</span></div><span data-dcnode-id="2688" instrument_node="">
</span><div data-dcnode-id="2686" style="float: left; margin: 14px 8px 2px 0px;padding: 4px 4px 2px;background: #ffffff;border: 1px solid;border-radius: 6px"><img alt="" data-dcnode-id="2687" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/chart/ascenda.gif&amp;raw" style="width: 68px"></div><span data-dcnode-id="2685" instrument_node="">
</span><p data-dcnode-id="2678" style="margin: 10px auto"><b data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">The First House</span></b><span data-dcnode-id="2682" instrument_node=""> or </span><b data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">Ascendant</span></b><span data-dcnode-id="2679" instrument_node=""> represents one's behaviour in the eyes of others, and also one's health. It corresponds to the way the individual acts in the world. It is the image of the personality seen by others and the person's visible behaviour expressed outwardly. The 1st House is in analogy with Aries and thus Mars too, and then the Sun. It is an angular house, the most important one with the Midheaven, maybe even more so due to its link with the body and health.</span></p><span data-dcnode-id="2677" instrument_node="">
</span><div data-dcnode-id="2649"><div class="detailTextes" data-dcnode-id="2666"><span data-dcnode-id="2676" instrument_node="">
</span><h3 data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">Ascendant in Scorpio</span></h3><span data-dcnode-id="2673" instrument_node="">
</span><p data-dcnode-id="2668" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="2672" instrument_node="">Your psychological nature is bilious with aggressive impulses that spur the transformation of your being and of any situation you are involved in. You are constantly struggling to assert yourself. You cannot refrain from testing others with cutting remarks, not because you want to hurt them, but because you want to know them better through their reaction; life and the feeling of aliveness are experienced through rebellion and tension. Your aggressive attitude may equate with sly inquisition as often, you remain silent, introverted and secretive, mulling over turbulent thoughts in the depths of your mind, leaving others puzzled by your quite strange behaviour.</span><br data-dcnode-id="2671"><br data-dcnode-id="2670"><span data-dcnode-id="2669" instrument_node="">  With this Ascendant, you come across as secretive, powerful, dominating, enduring, intuitive, assertive, charismatic, magnetic, wilful, daring, clear-sighted, passionate, creative, independent, vigorous, generous, loyal, hard-working, persevering, indomitable, possessive, shrewd, stubborn, ambitious, instinctive, tenacious, sexual, sexy, proud, intense and competitive. But you may also be aggressive, destructive, stubborn, anxious, tyrannical, perverse, sadistic, violent, self-centered, complex, critical, cruel, nasty, jealous, calculating, vulnerable and dissembling.</span></p><span data-dcnode-id="2667" instrument_node="">
</span></div><span data-dcnode-id="2665" instrument_node="">
</span><div data-dcnode-id="2651" style="border-top: 1px dotted #000; margin: 10px auto"><span data-dcnode-id="2664" instrument_node="">
</span><h3 data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">Interpretation of the 3° Scorpio symbolic degree</span></h3><span data-dcnode-id="2661" instrument_node="">
</span><h4 data-dcnode-id="2656" style="margin: 0;font-style: italic;font-size: 14px;font-weight: normal;padding: 0 4px 8px 8px"><span data-dcnode-id="2660" instrument_node="">"A wreath of laurel is hung on a harpsichord. Violins, a painting palette and brushes are lain on a nearby table." (</span><a data-dcnode-id="2658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the_360_symbolic_degrees.php"><span data-dcnode-id="2659" instrument_node="">Janduz</span></a><span data-dcnode-id="2657" instrument_node=""> version)</span></h4><p data-dcnode-id="2654" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="2655" instrument_node="">Calm, generous, and caring character endowed with great artistic gifts. All forms of art are very favoured, especially music, but also poetry, dance, painting, the cinema, etc. Success and universal fame are achieved through artistic disciplines.</span></p><p data-dcnode-id="2652" style="margin: 11px 0 3px 8px; text-align: justify; font-style: italic"><span data-dcnode-id="2653" instrument_node="">N.B.: symbolic degrees belong to a branch of fatalistic astrology. Their interpretation must be regarded with the utmost caution, especially given the fact that different authors give different meanings to symbolic degrees. This is the reason why they are not included in our Astrotheme reports.</span></p></div><span data-dcnode-id="2650" instrument_node="">
</span></div><span data-dcnode-id="2648" instrument_node="">
</span></div><div class="detailCadre" data-dcnode-id="2572" id="detail_31" style="background: #f9eecc"><span data-dcnode-id="2646" instrument_node="">
</span><div class="detailTitre" data-dcnode-id="2614"><span data-dcnode-id="2645" instrument_node="">
</span><div data-dcnode-id="2621" style="float: left; padding-top: 2px; text-align: left"><span data-dcnode-id="2644" instrument_node="">Midheaven  21°16' Leo</span><div data-dcnode-id="2622" style="text-align: left"><br data-dcnode-id="2643"><span data-dcnode-id="2641" style="font-style: italic; text-decoration: underline"><span data-dcnode-id="2642" instrument_node="">Midheaven Aspects</span></span><br data-dcnode-id="2640"><span data-dcnode-id="2638" style="color: #008500"><span data-dcnode-id="2639" instrument_node="">Pluto conjunction Midheaven orb +1°27'</span></span><br data-dcnode-id="2637"><span data-dcnode-id="2635" style="color: #e00b0f"><span data-dcnode-id="2636" instrument_node="">Jupiter square Midheaven orb +1°30'</span></span><br data-dcnode-id="2634"><span data-dcnode-id="2632" style="color: #1210df"><span data-dcnode-id="2633" instrument_node="">Neptune sextile Midheaven orb -0°05'</span></span><br data-dcnode-id="2631"><span data-dcnode-id="2629" style="color: #1210df"><span data-dcnode-id="2630" instrument_node="">Mercury sextile Midheaven orb +1°54'</span></span><br data-dcnode-id="2628"><span data-dcnode-id="2626" style="color: #1210df"><span data-dcnode-id="2627" instrument_node="">Mars trine Midheaven orb +5°15'</span></span><br data-dcnode-id="2625"><span data-dcnode-id="2623" style="color: #1210df"><span data-dcnode-id="2624" instrument_node="">Saturn sextile Midheaven orb -3°48'</span></span></div></div><span data-dcnode-id="2620" instrument_node="">
</span><div data-dcnode-id="2618" style="float: right"><img alt="" data-dcnode-id="2619" id="bascule_31" onclick="basculer(this.id)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/developper.gif&amp;raw" style="border: 0; cursor: pointer; width: 24px"></div><span data-dcnode-id="2617" instrument_node="">
</span><div data-dcnode-id="2616" style="clear: both; line-height: 0.1em; font-size: 1px"></div><span data-dcnode-id="2615" instrument_node="">
</span></div><span data-dcnode-id="2613" instrument_node="">
</span><div data-dcnode-id="2611" style="float: left; margin: 14px 8px 2px 0px;padding: 4px 4px 2px;background: #ffffff;border: 1px solid;border-radius: 6px"><img alt="" data-dcnode-id="2612" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/chart/midheav.gif&amp;raw" style="width: 68px"></div><span data-dcnode-id="2610" instrument_node="">
</span><p data-dcnode-id="2603" style="margin: 10px auto"><b data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">The Tenth House</span></b><span data-dcnode-id="2607" instrument_node=""> still called </span><b data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">the Midheaven</span></b><span data-dcnode-id="2604" instrument_node="">, is the highest point amidst the houses, at the top of the chart, in the South, and relates to destiny in general and career (and not daily work as meant by the Sixth House). The Midheaven represents our achievements and goals in the social sphere, our social position in society, and becomes more and more important as we get older. It is in analogy with Capricorn and Saturn. The Tenth House is the most important angular house along with the Ascendant.</span></p><span data-dcnode-id="2602" instrument_node="">
</span><div data-dcnode-id="2574"><div class="detailTextes" data-dcnode-id="2591"><span data-dcnode-id="2601" instrument_node="">
</span><h3 data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">Midheaven in Leo</span></h3><span data-dcnode-id="2598" instrument_node="">
</span><p data-dcnode-id="2593" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="2597" instrument_node="">Honours, fame, glamour, and high-ranking positions are your key-words. Your innate authority enables you to rapidly make your way through the higher spheres of power, arts, or business. If you do not achieve celebrity, you strive to rub shoulders with the upper crust and fit into high-society circles, for you believe that they must naturally acknowledge you.</span><br data-dcnode-id="2596"><br data-dcnode-id="2595"><span data-dcnode-id="2594" instrument_node="">  The following professions are most likely to suit you very well: corporate manager, actor of outstanding renown, film director, senior civil servant, ambassador, all positions in the gambling, amusement, or art industry, as well as first-class hotelier, jeweller and all occupations related to the luxury world, fireman, tamer, policeman/woman, or rider.</span></p><span data-dcnode-id="2592" instrument_node="">
</span></div><span data-dcnode-id="2590" instrument_node="">
</span><div data-dcnode-id="2576" style="border-top: 1px dotted #000; margin: 10px auto"><span data-dcnode-id="2589" instrument_node="">
</span><h3 data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">Interpretation of the 21° Leo symbolic degree</span></h3><span data-dcnode-id="2586" instrument_node="">
</span><h4 data-dcnode-id="2581" style="margin: 0;font-style: italic;font-size: 14px;font-weight: normal;padding: 0 4px 8px 8px"><span data-dcnode-id="2585" instrument_node="">"A sparrow hawk glides above a nest of fledglings.  In the nearby thatched cottage, an ailing man lies in bed." (</span><a data-dcnode-id="2583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the_360_symbolic_degrees.php"><span data-dcnode-id="2584" instrument_node="">Janduz</span></a><span data-dcnode-id="2582" instrument_node=""> version)</span></h4><p data-dcnode-id="2579" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="2580" instrument_node="">Naive, indecisive, and weak character. Dangers and deceits crop up since childhood. They come from outsiders but also from the family circle. One tends to seek help from the very people who are envious and willing to harm. It is strongly recommended not to trust anyone, and never to talk about one's successes, even with family members, because some relatives covet the assets of the person born under the influence of this degree. Should the natal chart concur, a sudden disease such as meningitis may affect the head.</span></p><p data-dcnode-id="2577" style="margin: 11px 0 3px 8px; text-align: justify; font-style: italic"><span data-dcnode-id="2578" instrument_node="">N.B.: symbolic degrees belong to a branch of fatalistic astrology. Their interpretation must be regarded with the utmost caution, especially given the fact that different authors give different meanings to symbolic degrees. This is the reason why they are not included in our Astrotheme reports.</span></p></div><span data-dcnode-id="2575" instrument_node="">
</span></div><span data-dcnode-id="2573" instrument_node="">

</span><div data-dcnode-id="2568" style="float: left; padding-top: 2px; text-align: left"><span data-dcnode-id="2569" instrument_node="">Ascendant 3°12' Scorpio</span></div><span data-dcnode-id="2567" instrument_node="">
</span><div data-dcnode-id="2565" style="float: right"><img alt="" data-dcnode-id="2566" id="bascule_32" onclick="basculer(this.id)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/developper.gif&amp;raw" style="border: 0; cursor: pointer; width: 24px"></div><span data-dcnode-id="2564" instrument_node="">

</span><p data-dcnode-id="2553" style="margin: 10px auto"><b data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">The First House</span></b><span data-dcnode-id="2557" instrument_node=""> or </span><b data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">Ascendant</span></b><span data-dcnode-id="2554" instrument_node=""> represents one's behaviour in the eyes of others and also one's health. It corresponds to the way the individual acts in the world.  It is the image of the personality as seen by others and the person's visible behaviour expressed outwardly. The 1st House is in analogy with Aries and thus Mars too and then the Sun. It is an angular house, the most important one with the Midheaven, maybe even more so due to its link with the body and health; the Ascendant is as important as the Sun in a natal chart.</span></p><span data-dcnode-id="2552" instrument_node="">
</span><div data-dcnode-id="2536"><div data-dcnode-id="2538" style="border-top: 1px dotted #000; margin: 10px auto"><span data-dcnode-id="2551" instrument_node="">

</span><h4 data-dcnode-id="2543" style="margin: 0;font-style: italic;font-size: 14px;font-weight: normal;padding: 0 4px 8px 8px"><span data-dcnode-id="2547" instrument_node="">"A wreath of laurel is hung on a harpsichord. Violins, a painting palette and brushes are lain on a nearby table." (</span><a data-dcnode-id="2545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the_360_symbolic_degrees.php"><span data-dcnode-id="2546" instrument_node="">Janduz</span></a><span data-dcnode-id="2544" instrument_node=""> version)</span></h4><p data-dcnode-id="2541" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="2542" instrument_node="">Calm, generous, and caring character endowed with great artistic gifts. All forms of art are very favoured, especially music, but also poetry, dance, painting, the cinema, etc. Success and universal fame are achieved through artistic disciplines.</span></p><p data-dcnode-id="2539" style="margin: 11px 0 3px 8px; text-align: justify; font-style: italic"><span data-dcnode-id="2540" instrument_node="">N.B.: symbolic degrees belong to a branch of fatalistic astrology. Their interpretation must be regarded with the utmost caution, especially given the fact that different authors give different meanings to symbolic degrees. This is the reason why they are not included in our Astrotheme reports.</span></p></div><span data-dcnode-id="2537" instrument_node="">

</span><div data-dcnode-id="2509" style="float: right"><img alt="" data-dcnode-id="2510" id="bascule_34" onclick="basculer(this.id)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/developper.gif&amp;raw" style="border: 0; cursor: pointer; width: 24px"></div><span data-dcnode-id="2508" instrument_node="">

</span><p data-dcnode-id="2482" style="margin: 10px auto"><b data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">The Fourth House</span></b><span data-dcnode-id="2483" instrument_node=""> also called Immum Coeli is the sphere of inner emotions, family, the father, home and roots, but also the home one creates. It's Home Sweet Home, security and cocoon. It is in analogy with Cancer and the Moon. It's an angular and important house.</span></p><span data-dcnode-id="2481" instrument_node="">

</span><h4 data-dcnode-id="2472" style="margin: 0;font-style: italic;font-size: 14px;font-weight: normal;padding: 0 4px 8px 8px"><span data-dcnode-id="2476" instrument_node="">"A furious bull tramples on a dog. A man examines a corpse." (</span><a data-dcnode-id="2474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the_360_symbolic_degrees.php"><span data-dcnode-id="2475" instrument_node="">Janduz</span></a><span data-dcnode-id="2473" instrument_node=""> version)</span></h4><p data-dcnode-id="2470" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="2471" instrument_node="">Violent, excessive, and spiteful character. If one is able to control one's outbursts of fury, success can be attained in the military and in all occupations requiring physical strength, or in surgery and medical research. This degree warns against vengeful deeds because extreme brutality can only result in equally extreme disasters.</span></p><p data-dcnode-id="2468" style="margin: 11px 0 3px 8px; text-align: justify; font-style: italic"><span data-dcnode-id="2469" instrument_node="">N.B.: symbolic degrees belong to a branch of fatalistic astrology. Their interpretation must be regarded with the utmost caution, especially given the fact that different authors give different meanings to symbolic degrees. This is the reason why they are not included in our Astrotheme reports.</span></p></div><span data-dcnode-id="2466" instrument_node="">

</span><div data-dcnode-id="2436" style="clear: both; line-height: 0.1em; font-size: 1px"></div><span data-dcnode-id="2435" instrument_node="">
</span></div><span data-dcnode-id="2433" instrument_node="">
</span><p data-dcnode-id="2429" style="margin: 10px auto"><b data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">The Sixth House</span></b><span data-dcnode-id="2430" instrument_node=""> is the sphere of apprenticeship and effort in the work environment, daily life, health on a daily basis and not operations or long-term diseases, relationships with co-workers or subordinates, desire for improvement, analysis and detail. It is in analogy with Virgo and Mercury. It is a cadent house, less important than the angular and succedent ones.</span></p><span data-dcnode-id="2428" instrument_node="">
</span></div><div class="detailCadre" data-dcnode-id="2389" id="detail_38" style="background: #f9eecc"><span data-dcnode-id="2426" instrument_node="">
</span><div class="detailTitre" data-dcnode-id="2416"><span data-dcnode-id="2425" instrument_node="">
</span><div data-dcnode-id="2423" style="float: left; padding-top: 2px; text-align: left"><span data-dcnode-id="2424" instrument_node="">House VII 3°12' Taurus</span></div><span data-dcnode-id="2422" instrument_node="">
</span><div data-dcnode-id="2420" style="float: right"><img alt="" data-dcnode-id="2421" id="bascule_38" onclick="basculer(this.id)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/developper.gif&amp;raw" style="border: 0; cursor: pointer; width: 24px"></div><span data-dcnode-id="2419" instrument_node="">
</span><div data-dcnode-id="2418" style="clear: both; line-height: 0.1em; font-size: 1px"></div><span data-dcnode-id="2417" instrument_node="">
</span></div><span data-dcnode-id="2415" instrument_node="">
</span><p data-dcnode-id="2408" style="margin: 10px auto"><b data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">The Seventh House</span></b><span data-dcnode-id="2412" instrument_node=""> also called </span><b data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">the Descendant</span></b><span data-dcnode-id="2409" instrument_node=""> (in front of the Ascendant) is the sphere of partnership, marriage, contracts, relationships with others, the outer world. It is in analogy with Libra and Venus, and Saturn to a lesser extent. It is an angular and important house.</span></p><span data-dcnode-id="2407" instrument_node="">
</span><div data-dcnode-id="2391"><div data-dcnode-id="2393" style="border-top: 1px dotted #000; margin: 10px auto"><span data-dcnode-id="2406" instrument_node="">
</span><h3 data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Interpretation of the 3° Taurus symbolic degree</span></h3><span data-dcnode-id="2403" instrument_node="">
</span><h4 data-dcnode-id="2398" style="margin: 0;font-style: italic;font-size: 14px;font-weight: normal;padding: 0 4px 8px 8px"><span data-dcnode-id="2402" instrument_node="">"A lion angered by a piece of burning wood tries to catch it with its paw, while a sort of fury aimlessly cracks a whip." (</span><a data-dcnode-id="2400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the_360_symbolic_degrees.php"><span data-dcnode-id="2401" instrument_node="">Janduz</span></a><span data-dcnode-id="2399" instrument_node=""> version)</span></h4><p data-dcnode-id="2396" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="2397" instrument_node="">Wrathful, demanding, and destructive character. Violence is the cause of many a failure and disappointment in the private and the professional spheres. The family is torn apart by struggles in which rage turned against oneself proves very damaging. This degree sometimes describes an artist or a person who experiences an out of the ordinary situation.</span></p><p data-dcnode-id="2394" style="margin: 11px 0 3px 8px; text-align: justify; font-style: italic"><span data-dcnode-id="2395" instrument_node="">N.B.: symbolic degrees belong to a branch of fatalistic astrology. Their interpretation must be regarded with the utmost caution, especially given the fact that different authors give different meanings to symbolic degrees. This is the reason why they are not included in our Astrotheme reports.</span></p></div><span data-dcnode-id="2392" instrument_node="">
</span></div><span data-dcnode-id="2390" instrument_node="">
</span></div><div class="detailCadre" data-dcnode-id="2371" id="detail_39" style="background: #f9eecc"><span data-dcnode-id="2388" instrument_node="">
</span><div class="detailTitre" data-dcnode-id="2378"><span data-dcnode-id="2387" instrument_node="">
</span><div data-dcnode-id="2385" style="float: left; padding-top: 2px; text-align: left"><span data-dcnode-id="2386" instrument_node="">House VIII 29°44' Taurus</span></div><span data-dcnode-id="2384" instrument_node="">
</span><div data-dcnode-id="2382" style="float: right"><img alt="" data-dcnode-id="2383" id="bascule_39" onclick="basculer(this.id)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/developper.gif&amp;raw" style="border: 0; cursor: pointer; width: 24px"></div><span data-dcnode-id="2381" instrument_node="">
</span><div data-dcnode-id="2380" style="clear: both; line-height: 0.1em; font-size: 1px"></div><span data-dcnode-id="2379" instrument_node="">
</span></div><span data-dcnode-id="2377" instrument_node="">
</span><p data-dcnode-id="2373" style="margin: 10px auto"><b data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">The Eighth House</span></b><span data-dcnode-id="2374" instrument_node=""> is the sphere of emotional security, the depths of the self, secrets and paranormal, transcendence, sexuality, mysteries, upheavals, surgical operations, others' money (investments, inheritances), crises, transformation after evolution, death. It is in analogy with Scorpio and Pluto, and Mars to a lesser extent. It is a succedent and quite important house.</span></p><span data-dcnode-id="2372" instrument_node="">
</span></div><div class="detailCadre" data-dcnode-id="2353" id="detail_40" style="background: #f9eecc"><span data-dcnode-id="2370" instrument_node="">
</span><div class="detailTitre" data-dcnode-id="2360"><span data-dcnode-id="2369" instrument_node="">
</span><div data-dcnode-id="2367" style="float: left; padding-top: 2px; text-align: left"><span data-dcnode-id="2368" instrument_node="">House IX 7°03' Cancer</span></div><span data-dcnode-id="2366" instrument_node="">
</span><div data-dcnode-id="2364" style="float: right"><img alt="" data-dcnode-id="2365" id="bascule_40" onclick="basculer(this.id)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/developper.gif&amp;raw" style="border: 0; cursor: pointer; width: 24px"></div><span data-dcnode-id="2363" instrument_node="">
</span><div data-dcnode-id="2362" style="clear: both; line-height: 0.1em; font-size: 1px"></div><span data-dcnode-id="2361" instrument_node="">
</span></div><span data-dcnode-id="2359" instrument_node="">
</span><p data-dcnode-id="2355" style="margin: 10px auto"><b data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">The Ninth House</span></b><span data-dcnode-id="2356" instrument_node=""> is the sphere of high studies, both physical and mental journeys (philosophy, spirituality), rebelliousness, changes of scenery, desire for dealing with the unknown. It is in analogy with Sagittarius and Jupiter. It is a cadent house, less important than the angular and succedent ones.</span></p><span data-dcnode-id="2354" instrument_node="">
</span></div><div class="detailCadre" data-dcnode-id="2315" id="detail_41" style="background: #f9eecc"><span data-dcnode-id="2352" instrument_node="">
</span><div class="detailTitre" data-dcnode-id="2342"><span data-dcnode-id="2351" instrument_node="">
</span><div data-dcnode-id="2349" style="float: left; padding-top: 2px; text-align: left"><span data-dcnode-id="2350" instrument_node="">Midheaven 21°16' Leo</span></div><span data-dcnode-id="2348" instrument_node="">
</span><div data-dcnode-id="2346" style="float: right"><img alt="" data-dcnode-id="2347" id="bascule_41" onclick="basculer(this.id)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/developper.gif&amp;raw" style="border: 0; cursor: pointer; width: 24px"></div><span data-dcnode-id="2345" instrument_node="">
</span><div data-dcnode-id="2344" style="clear: both; line-height: 0.1em; font-size: 1px"></div><span data-dcnode-id="2343" instrument_node="">
</span></div><span data-dcnode-id="2341" instrument_node="">
</span><p data-dcnode-id="2334" style="margin: 10px auto"><b data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">The Tenth House</span></b><span data-dcnode-id="2338" instrument_node=""> still called </span><b data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">the Midheaven</span></b><span data-dcnode-id="2335" instrument_node="">, is the highest point amidst the houses, at the top of the chart, in the South, and relates to destiny in general and career (and not daily work as meant by the Sixth House). The Midheaven represents our achievements and goals in the social sphere, our social position in society, and becomes more and more important as we get older. It is in analogy with Capricorn and Saturn. The Tenth House is the most important angular house along with the Ascendant.</span></p><span data-dcnode-id="2333" instrument_node="">
</span><div data-dcnode-id="2317"><div data-dcnode-id="2319" style="border-top: 1px dotted #000; margin: 10px auto"><span data-dcnode-id="2332" instrument_node="">
</span><h3 data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">Interpretation of the 21° Leo symbolic degree</span></h3><span data-dcnode-id="2329" instrument_node="">
</span><h4 data-dcnode-id="2324" style="margin: 0;font-style: italic;font-size: 14px;font-weight: normal;padding: 0 4px 8px 8px"><span data-dcnode-id="2328" instrument_node="">"A sparrow hawk glides above a nest of fledglings.  In the nearby thatched cottage, an ailing man lies in bed." (</span><a data-dcnode-id="2326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the_360_symbolic_degrees.php"><span data-dcnode-id="2327" instrument_node="">Janduz</span></a><span data-dcnode-id="2325" instrument_node=""> version)</span></h4><p data-dcnode-id="2322" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="2323" instrument_node="">Naive, indecisive, and weak character. Dangers and deceits crop up since childhood. They come from outsiders but also from the family circle. One tends to seek help from the very people who are envious and willing to harm. It is strongly recommended not to trust anyone, and never to talk about one's successes, even with family members, because some relatives covet the assets of the person born under the influence of this degree. Should the natal chart concur, a sudden disease such as meningitis may affect the head.</span></p><p data-dcnode-id="2320" style="margin: 11px 0 3px 8px; text-align: justify; font-style: italic"><span data-dcnode-id="2321" instrument_node="">N.B.: symbolic degrees belong to a branch of fatalistic astrology. Their interpretation must be regarded with the utmost caution, especially given the fact that different authors give different meanings to symbolic degrees. This is the reason why they are not included in our Astrotheme reports.</span></p></div><span data-dcnode-id="2318" instrument_node="">
</span></div><span data-dcnode-id="2316" instrument_node="">
</span></div><div class="detailCadre" data-dcnode-id="2297" id="detail_42" style="background: #f9eecc"><span data-dcnode-id="2314" instrument_node="">
</span><div class="detailTitre" data-dcnode-id="2304"><span data-dcnode-id="2313" instrument_node="">
</span><div data-dcnode-id="2311" style="float: left; padding-top: 2px; text-align: left"><span data-dcnode-id="2312" instrument_node="">House XI 24°28' Virgo</span></div><span data-dcnode-id="2310" instrument_node="">
</span><div data-dcnode-id="2308" style="float: right"><img alt="" data-dcnode-id="2309" id="bascule_42" onclick="basculer(this.id)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/developper.gif&amp;raw" style="border: 0; cursor: pointer; width: 24px"></div><span data-dcnode-id="2307" instrument_node="">
</span><div data-dcnode-id="2306" style="clear: both; line-height: 0.1em; font-size: 1px"></div><span data-dcnode-id="2305" instrument_node="">
</span></div><span data-dcnode-id="2303" instrument_node="">
</span><p data-dcnode-id="2299" style="margin: 10px auto"><b data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">The Eleventh House</span></b><span data-dcnode-id="2300" instrument_node=""> is the sphere of friendship and protection, projects, search for social acceptance and security, collective and humanitarian actions. It is in analogy with Aquarius and Uranus, and Saturn to a lesser extent. It's a succedent and quite important house.</span></p><span data-dcnode-id="2298" instrument_node="">
</span></div><div class="detailCadre" data-dcnode-id="2279" id="detail_43" style="background: #f9eecc"><span data-dcnode-id="2296" instrument_node="">
</span><div class="detailTitre" data-dcnode-id="2286"><span data-dcnode-id="2295" instrument_node="">
</span><div data-dcnode-id="2293" style="float: left; padding-top: 2px; text-align: left"><span data-dcnode-id="2294" instrument_node="">House XII 17°09' Libra</span></div><span data-dcnode-id="2292" instrument_node="">
</span><div data-dcnode-id="2290" style="float: right"><img alt="" data-dcnode-id="2291" id="bascule_43" onclick="basculer(this.id)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/developper.gif&amp;raw" style="border: 0; cursor: pointer; width: 24px"></div><span data-dcnode-id="2289" instrument_node="">
</span><div data-dcnode-id="2288" style="clear: both; line-height: 0.1em; font-size: 1px"></div><span data-dcnode-id="2287" instrument_node="">
</span></div><span data-dcnode-id="2285" instrument_node="">
</span><p data-dcnode-id="2281" style="margin: 10px auto"><b data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">The Twelfth House</span></b><span data-dcnode-id="2282" instrument_node=""> is the sphere of hidden things, enemies, closed or remote places (hospital, prison, convent etc.), ordeals, secrecy, solitude, long-term illnesses but also sincere devotion and genuine compassion. It is in analogy with Pisces and Neptune.</span></p><span data-dcnode-id="2280" instrument_node="">
</span></div><div class="detailCadre" data-dcnode-id="2232" id="detail_44" style="background: #f0f0f0"><span data-dcnode-id="2278" instrument_node="">
</span><div class="detailTitre" data-dcnode-id="2268"><span data-dcnode-id="2277" instrument_node="">
</span><div data-dcnode-id="2275" style="float: left; padding-top: 2px; text-align: left"><span data-dcnode-id="2276" instrument_node="">Vertex 8°44' Gemini, in House VIII</span></div><span data-dcnode-id="2274" instrument_node="">
</span><div data-dcnode-id="2272" style="float: right"><img alt="" data-dcnode-id="2273" id="bascule_44" onclick="basculer(this.id)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/developper.gif&amp;raw" style="border: 0; cursor: pointer; width: 24px"></div><span data-dcnode-id="2271" instrument_node="">
</span><div data-dcnode-id="2270" style="clear: both; line-height: 0.1em; font-size: 1px"></div><span data-dcnode-id="2269" instrument_node="">
</span></div><span data-dcnode-id="2267" instrument_node="">
</span><div data-dcnode-id="2265" style="float: left; margin: 14px 8px 2px 0px;padding: 4px 4px 2px;background: #ffffff;border: 1px solid;border-radius: 6px"><img alt="" data-dcnode-id="2266" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/vertex.gif&amp;raw" style="width: 68px"></div><span data-dcnode-id="2264" instrument_node="">
</span><p data-dcnode-id="2260" style="margin: 10px auto"><b data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">The Vertex</span></b><span data-dcnode-id="2261" instrument_node="">, sometimes called counter-Ascendant, is a fictitious point which is at the intersection of two great circles, the Ecliptic and the great vertical circle (Prime Vertical) in the West of the birthplace, linking the East, the Zenith, the West, and the Nadir. It is always located in the West of the chart around the Descendant. It is the chart's fifth angle, so to speak, less important than the other angles. Its interpretation is controversial, because certain astrologers pay no attention to it.</span></p><span data-dcnode-id="2259" instrument_node="">
</span><p data-dcnode-id="2257" style="margin: 10px auto"><span data-dcnode-id="2258" instrument_node="">The Vertex is sometimes considered to be the second Descendant because, like the latter, it is related to communication and exchanges. It has to do with associations and fated encounters, those that are not chosen, and reveals the type of sensitivity and reactivity we have in our dealings with other people: a refined and tolerant way in Libra, straightforward and spontaneous in Aries, etc.</span></p><span data-dcnode-id="2256" instrument_node="">
</span><div data-dcnode-id="2234"><span data-dcnode-id="2255" instrument_node=""> </span><div data-dcnode-id="2254" style="clear: both"></div><span data-dcnode-id="2253" instrument_node="">
</span><div data-dcnode-id="2236" style="border-top: 1px dotted #000; margin: 10px auto"><span data-dcnode-id="2252" instrument_node="">
</span><h3 data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Interpretation of the 8° Gemini symbolic degree</span></h3><span data-dcnode-id="2249" instrument_node="">
</span><h4 data-dcnode-id="2244" style="margin: 0;font-style: italic;font-size: 14px;font-weight: normal;padding: 0 4px 8px 8px"><span data-dcnode-id="2248" instrument_node="">"A king and a queen are seated on their throne." (</span><a data-dcnode-id="2246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the_360_symbolic_degrees.php"><span data-dcnode-id="2247" instrument_node="">Janduz</span></a><span data-dcnode-id="2245" instrument_node=""> version)</span></h4><span data-dcnode-id="2243" instrument_node=""> </span><p data-dcnode-id="2241" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="2242" instrument_node="">Noble, ambitious, and proud character endowed with self-confidence, above average intelligence, and strong leadership abilities. There is also a deep concern over the honour and the protection of the family. Talents are numerous and cover various fields. Therefore, one can achieve success in a wide range of occupations, from politics and the military to education, the arts, law, etc. One becomes aware of one's calling quite early, but it is only around middle age that one reaches the peak of one's career. One must never be disheartened when facing hurdles, doubts, and uncertainties, because this degree promises wealth, power, preferment, and fame, along with a good marriage. One often keeps a youthful appearance for a long time.</span></p><span data-dcnode-id="2240" instrument_node=""> </span><p data-dcnode-id="2238" style="margin: 11px 0 3px 8px; text-align: justify; font-style: italic"><span data-dcnode-id="2239" instrument_node="">N.B.: symbolic degrees belong to a branch of fatalistic astrology. Their interpretation must be regarded with the utmost caution, especially given the fact that different authors give different meanings to symbolic degrees. This is the reason why they are not included in our Astrotheme reports.</span></p><span data-dcnode-id="2237" instrument_node=""> </span></div><span data-dcnode-id="2235" instrument_node="">
</span></div><span data-dcnode-id="2233" instrument_node="">
</span></div><div class="detailCadre" data-dcnode-id="2185" id="detail_45" style="background: #f0f0f0"><span data-dcnode-id="2231" instrument_node="">
</span><div class="detailTitre" data-dcnode-id="2221"><span data-dcnode-id="2230" instrument_node="">
</span><div data-dcnode-id="2228" style="float: left; padding-top: 2px; text-align: left"><span data-dcnode-id="2229" instrument_node="">East Point 25°58' Scorpio, in House I</span></div><span data-dcnode-id="2227" instrument_node="">
</span><div data-dcnode-id="2225" style="float: right"><img alt="" data-dcnode-id="2226" id="bascule_45" onclick="basculer(this.id)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/developper.gif&amp;raw" style="border: 0; cursor: pointer; width: 24px"></div><span data-dcnode-id="2224" instrument_node="">
</span><div data-dcnode-id="2223" style="clear: both; line-height: 0.1em; font-size: 1px"></div><span data-dcnode-id="2222" instrument_node="">
</span></div><span data-dcnode-id="2220" instrument_node="">
</span><div data-dcnode-id="2218" style="float: left; margin: 14px 8px 2px 0px;padding: 4px 4px 2px;background: #ffffff;border: 1px solid;border-radius: 6px"><img alt="" data-dcnode-id="2219" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/east_po.gif&amp;raw" style="width: 68px"></div><span data-dcnode-id="2217" instrument_node="">
</span><p data-dcnode-id="2213" style="margin: 10px auto"><b data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">The East Point</span></b><span data-dcnode-id="2214" instrument_node=""> is a fictitious point at the intersection of two great circles, the Ecliptic and the great vertical circle (Prime Vertical) in the East of the birthplace, linking the East, the Zenith, the West, and the Nadir. It is always located in the East of the chart, around the Ascendant.</span></p><span data-dcnode-id="2212" instrument_node="">
</span><p data-dcnode-id="2210" style="margin: 10px auto"><span data-dcnode-id="2211" instrument_node="">The East Point is sometimes considered to be a second Ascendant, less important, but also related to how one is seen by other people, and to how one expresses one's personality.</span></p><span data-dcnode-id="2209" instrument_node="">
</span><div data-dcnode-id="2187"><span data-dcnode-id="2208" instrument_node=""> </span><div data-dcnode-id="2207" style="clear: both"></div><span data-dcnode-id="2206" instrument_node="">
</span><div data-dcnode-id="2189" style="border-top: 1px dotted #000; margin: 10px auto"><span data-dcnode-id="2205" instrument_node="">
</span><h3 data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">Interpretation of the 25° Scorpio symbolic degree</span></h3><span data-dcnode-id="2202" instrument_node="">
</span><h4 data-dcnode-id="2197" style="margin: 0;font-style: italic;font-size: 14px;font-weight: normal;padding: 0 4px 8px 8px"><span data-dcnode-id="2201" instrument_node="">"The rising sun lights up a cross carved into the rock of a hill near a small chapel." (</span><a data-dcnode-id="2199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the_360_symbolic_degrees.php"><span data-dcnode-id="2200" instrument_node="">Janduz</span></a><span data-dcnode-id="2198" instrument_node=""> version)</span></h4><span data-dcnode-id="2196" instrument_node=""> </span><p data-dcnode-id="2194" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="2195" instrument_node="">Loyal, composed, and idealistic character. One is detached from materialistic concerns and concentrates on intellectual, artistic, or religious undertakings. The working place may be located in a remote or restricted area such as in a nuclear research centre, an astronomy observatory, or just a quiet secluded room conducive to inspiration for one's writings. This degree gives a religious vocation and may describe a member of the clergy if the natal chart confirms this tendency.</span></p><span data-dcnode-id="2193" instrument_node=""> </span><p data-dcnode-id="2191" style="margin: 11px 0 3px 8px; text-align: justify; font-style: italic"><span data-dcnode-id="2192" instrument_node="">N.B.: symbolic degrees belong to a branch of fatalistic astrology. Their interpretation must be regarded with the utmost caution, especially given the fact that different authors give different meanings to symbolic degrees. This is the reason why they are not included in our Astrotheme reports.</span></p><span data-dcnode-id="2190" instrument_node=""> </span></div><span data-dcnode-id="2188" instrument_node="">
</span></div><span data-dcnode-id="2186" instrument_node="">
