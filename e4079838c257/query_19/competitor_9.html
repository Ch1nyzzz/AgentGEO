</span><div data-dcnode-id="3519" style="float: left; margin: 14px 8px 2px 0px;padding: 4px 4px 2px;background: #ffffff;border: 1px solid;border-radius: 6px"><img alt="" data-dcnode-id="3520" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/chart/jupiter.gif&amp;raw" style="width: 68px"></div><span data-dcnode-id="3518" instrument_node="">
</span><p data-dcnode-id="3514" style="margin: 10px auto"><b data-dcnode-id="3516"><span data-dcnode-id="3517" instrument_node="">Jupiter</span></b><span data-dcnode-id="3515" instrument_node=""> represents expansion and power, benevolence, large vision and generosity. Its element is Air, it is hot and moist, and it rules Sagittarius and Pisces (along with Neptune), is in exaltation with Cancer and is in analogy with the hips and endocrinal system. </span></p><span data-dcnode-id="3513" instrument_node="">
</span><p data-dcnode-id="3511" style="margin: 10px auto"><span data-dcnode-id="3512" instrument_node="">It represents the governors, magistrates, professors, religious men too; the age of Jupiter goes from 50 to 55 or even 70 years old.</span></p><span data-dcnode-id="3510" instrument_node="">
</span><p data-dcnode-id="3506"><span data-dcnode-id="3508" style="font-style: italic; text-decoration: underline; font-weight: bold"><span data-dcnode-id="3509" instrument_node="">Temperament</span></span><span data-dcnode-id="3507" instrument_node="">: Sanguine</span></p><span data-dcnode-id="3505" instrument_node="">
</span><p data-dcnode-id="3501"><span data-dcnode-id="3503" style="font-style: italic; text-decoration: underline; font-weight: bold"><span data-dcnode-id="3504" instrument_node="">Characterology</span></span><span data-dcnode-id="3502" instrument_node="">: Emotive, Active, Primary type; it is an extrovert Choleric. Actually the humid version of Mars, inclined to action like him.</span></p><span data-dcnode-id="3500" instrument_node="">
</span><p data-dcnode-id="3495" style="margin: 10px auto"><span data-dcnode-id="3499" instrument_node="">For more information, see the page dedicated to </span><a data-dcnode-id="3497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/files/jupiter_heaven_sent_gift.php"><span data-dcnode-id="3498" instrument_node="">Jupiter</span></a><span data-dcnode-id="3496" instrument_node="">.</span></p><span data-dcnode-id="3494" instrument_node="">
</span><div data-dcnode-id="3446"><div class="detailTextes" data-dcnode-id="3448"><span data-dcnode-id="3493" instrument_node="">
</span><h3 data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">Jupiter in Taurus</span></h3><span data-dcnode-id="3490" instrument_node="">
</span><p data-dcnode-id="3488" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3489" instrument_node="">The planet Jupiter symbolizes expansion, broadness and generosity. Jupiter is associated with the functions of synthesis, enthusiasm and optimism. In your natal chart, his house position is more important than his sign position because, like Saturn, Uranus, Neptune and Pluto, he is a slow planet. Many people born in the same period have Jupiter in the same sign. This is the reason why the sign occupied here is less meaningful than when it is occupied by the so-called fast planets, i.e. the Sun, the Moon, Mercury, Venus and Mars. Therefore, some caution is to be exercised as you read what follows. 

Jupiter in Taurus amplifies your practical sense and your capacity to improve your material life. You can experience a long-lasting fulfilment. You are often a bon viveur who likes life's good things. You manage and develop your patrimony with a lot of luck and generosity. Your taste is very good and your loyalty is genuine.</span></p><span data-dcnode-id="3487" instrument_node="">
</span><h3 data-dcnode-id="3485"><span data-dcnode-id="3486" instrument_node="">Jupiter in House VII</span></h3><span data-dcnode-id="3484" instrument_node="">
</span><p data-dcnode-id="3482" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3483" instrument_node="">Jupiter is in the 7th House. Jupiter is the planet of language, of adaptation to social norms and to life in community's imperatives. In the 7th House, this planet probably shows its worth. In spite of your sense of modesty, or your reluctances, you know how to be sociable, to adjust to the other person, to the world, and to your partner. You play by the rules of social codes, morals, and social conventions, out of conviction, or out of opportunism. Long live sociability!</span></p><span data-dcnode-id="3481" instrument_node="">
</span><h3 data-dcnode-id="3479"><span data-dcnode-id="3480" instrument_node="">Jupiter Dominant</span></h3><span data-dcnode-id="3478" instrument_node="">
</span><p data-dcnode-id="3476" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3477" instrument_node="">If Jupiter is part of your natal chart's planetary dominants, in astrology, you are said to be a Jupiterian: because this planet brings about a keen interest in social and professional success, the Tradition considers it to be beneficial. Indeed, you know how to adjust to events and to jump at the chance when it arises. The members of your entourage gladly entrust you with high responsibilities because they are often impressed by your learning skills and your adaptation abilities as you deal with new structures and new languages. What is the secret of your good star? It is your self-confidence which wins public support. Now, what is the secret of your charm? Definitely, enthusiasm, euphoria, and exaltation. Exaggeration also. When this dominant is well integrated, it is a factor of affluence and optimism, and a certain degree of joviality enables you to easily fit into various spheres. It constitutes your main asset to manage your life. However, you must at times curb your desire for integration, lest your sense of opportunity turns into extreme opportunism. Here also, the key to success lies in a correct estimate of everyone's chances and possibilities. Although management is one of your forte, and you can adjust your objectives to current realities better than other people, you lack the hindsight which enables  you to avoid short-term vagaries and daily fluctuations. If you strive too much to adapt, you run a risk of betraying yourself. This is the other traditional side of the coin with "The Greater Benefic"!</span></p><span data-dcnode-id="3475" instrument_node="">
</span><div data-dcnode-id="3458" style="border-top: 1px dotted #000; margin: 10px auto"><span data-dcnode-id="3474" instrument_node="">
</span><h3 data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">Interpretation of the 19°  Taurus symbolic degree</span></h3><span data-dcnode-id="3471" instrument_node="">
</span><h4 data-dcnode-id="3466" style="margin: 0;font-style: italic;font-size: 14px;font-weight: normal;padding: 0 4px 8px 8px"><span data-dcnode-id="3470" instrument_node="">"In a large kitchen, a crow perched on a pitcher watches two dogs biting one another." (</span><a data-dcnode-id="3468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the_360_symbolic_degrees.php"><span data-dcnode-id="3469" instrument_node="">Janduz</span></a><span data-dcnode-id="3467" instrument_node=""> version)</span></h4><span data-dcnode-id="3465" instrument_node=""> </span><p data-dcnode-id="3463" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3464" instrument_node="">Cunning, envious, and conceited character. One is evil-minded and uses unimportant details in order to harm people. But such gross malevolence is easily foiled and as a result, one harms oneself only. Slanders targeting relatives and friends bring about long-lasting estrangements.</span></p><span data-dcnode-id="3462" instrument_node=""> </span><p data-dcnode-id="3460" style="margin: 11px 0 3px 8px; text-align: justify; font-style: italic"><span data-dcnode-id="3461" instrument_node="">N.B.: symbolic degrees belong to a branch of fatalistic astrology. Their interpretation must be regarded with the utmost caution, especially given the fact that different authors give different meanings to symbolic degrees. This is the reason why they are not included in our Astrotheme reports.</span></p><span data-dcnode-id="3459" instrument_node=""> </span></div><span data-dcnode-id="3457" instrument_node="">

</span><div data-dcnode-id="3402" style="float: left; margin: 14px 8px 2px 0px;padding: 4px 4px 2px;background: #ffffff;border: 1px solid;border-radius: 6px"><img alt="" data-dcnode-id="3403" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/chart/saturn.gif&amp;raw" style="width: 68px"></div><span data-dcnode-id="3401" instrument_node="">
</span><p data-dcnode-id="3397" style="margin: 10px auto"><b data-dcnode-id="3399"><span data-dcnode-id="3400" instrument_node="">Saturn</span></b><span data-dcnode-id="3398" instrument_node=""> represents concentration, effort, perseverance, time,  the hard reality, inevitable consequences. Earth is its element, it is cold and dry, and it rules Capricorn and Aquarius (along with Uranus), is in exaltation in Libra and is in analogy with the bones (skeleton) and the skin. </span></p><span data-dcnode-id="3396" instrument_node="">
</span><p data-dcnode-id="3394" style="margin: 10px auto"><span data-dcnode-id="3395" instrument_node="">It represents the grandparents, old people, scientists, knowledgeable men, Saturn corresponds to old age; it goes from 70 years old until death.</span></p><span data-dcnode-id="3393" instrument_node="">
</span><p data-dcnode-id="3389"><span data-dcnode-id="3391" style="font-style: italic; text-decoration: underline; font-weight: bold"><span data-dcnode-id="3392" instrument_node="">Temperament</span></span><span data-dcnode-id="3390" instrument_node="">: Nervous</span></p><span data-dcnode-id="3388" instrument_node="">
</span><p data-dcnode-id="3384"><span data-dcnode-id="3386" style="font-style: italic; text-decoration: underline; font-weight: bold"><span data-dcnode-id="3387" instrument_node="">Characterology</span></span><span data-dcnode-id="3385" instrument_node="">: Non-Emotive, Active and Secondary type or Emotive, non Active and Secondary type or sometimes Non-Emotive, non Active and Secondary type; it is a Phlegmatic, a Sentimental or an Empathic type</span></p><span data-dcnode-id="3383" instrument_node="">
</span><p data-dcnode-id="3378" style="margin: 10px auto"><span data-dcnode-id="3382" instrument_node="">For more information, see the page dedicated to </span><a data-dcnode-id="3380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/files/saturn_your_part_of_seriousness.php"><span data-dcnode-id="3381" instrument_node="">Saturn</span></a><span data-dcnode-id="3379" instrument_node="">.</span></p><span data-dcnode-id="3377" instrument_node="">
</span><div data-dcnode-id="3329"><div class="detailTextes" data-dcnode-id="3331"><span data-dcnode-id="3376" instrument_node="">
</span><h3 data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">Saturn in Libra</span></h3><span data-dcnode-id="3373" instrument_node="">
</span><p data-dcnode-id="3371" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3372" instrument_node="">The planet Saturn symbolizes contraction, effort, time, limitation and concentration. Saturn eliminates anything that is not authentic, sooner or later. It is impossible to cheat him as he gives an irresistible desire to form a coherent whole with oneself, in responsible and wise ways. He is the great purifier. He represents our limitations but also our truth. In your natal chart, the house position where Saturn is posited is more important than his sign position because, like Jupiter, Uranus, Neptune and Pluto, he is a slow planet. Many people born in the same period have Saturn in the same sign. This is the reason why the sign occupied here is less meaningful than when it is occupied by the so-called fast planets, i.e. the Sun, the Moon, Mercury, Venus and Mars. Therefore, some caution is to be exercised as you read what follows. 

Saturn in Libra gives you a serious and solemn nature. You may be tough in your contacts: you naturally focus on the essential and you have no concern for the charm you could display. You are irritated by flatteries or by thoughtless compromises. You are genuine and you value justice and authenticity.</span></p><span data-dcnode-id="3370" instrument_node="">
</span><h3 data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">Saturn in House XII</span></h3><span data-dcnode-id="3367" instrument_node="">
</span><p data-dcnode-id="3365" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3366" instrument_node="">Saturn is in the 12th House of your natal chart. This is the mark of some degree of asceticism, and an interest in dark, tedious, sometimes secret works. Far from the outside world's hustle and bustle, you try to bring to fruition your personal and perilous quest, the quest for freedom and renunciation. You experience periods of introversion during which you do not hesitate to give up your social life for the sake of spirituality. Slowly, you are transformed by ordeals.</span></p><span data-dcnode-id="3364" instrument_node="">
</span><h3 data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">Saturn Dominant</span></h3><span data-dcnode-id="3361" instrument_node="">
</span><p data-dcnode-id="3359" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3360" instrument_node="">If Saturn is part of your natal chart's planetary dominants, in astrology, you are said to be a Saturnian: you gladly leave to other people the decision to take life as it comes. As far as you are concerned, you prefer to take advantage of your experiences in order to discover, to grow, and to question yourself.</span></p><span data-dcnode-id="3358" instrument_node="">
</span><div data-dcnode-id="3341" style="border-top: 1px dotted #000; margin: 10px auto"><span data-dcnode-id="3357" instrument_node="">
</span><h3 data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">Interpretation of the 17° Libra symbolic degree</span></h3><span data-dcnode-id="3354" instrument_node="">
</span><h4 data-dcnode-id="3349" style="margin: 0;font-style: italic;font-size: 14px;font-weight: normal;padding: 0 4px 8px 8px"><span data-dcnode-id="3353" instrument_node="">"A nice house with its door and windows wide open." (</span><a data-dcnode-id="3351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the_360_symbolic_degrees.php"><span data-dcnode-id="3352" instrument_node="">Janduz</span></a><span data-dcnode-id="3350" instrument_node=""> version)</span></h4><span data-dcnode-id="3348" instrument_node=""> </span><p data-dcnode-id="3346" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3347" instrument_node="">Quiet, hospitable, and endearing character always willing to help. One comes from a wealthy family, or one earns a fortune without great efforts. This degree describes a peace-loving person who acts as a mediator and takes it to heart to solve conflicts and alleviate deprived people's hardship.</span></p><span data-dcnode-id="3345" instrument_node=""> </span><p data-dcnode-id="3343" style="margin: 11px 0 3px 8px; text-align: justify; font-style: italic"><span data-dcnode-id="3344" instrument_node="">N.B.: symbolic degrees belong to a branch of fatalistic astrology. Their interpretation must be regarded with the utmost caution, especially given the fact that different authors give different meanings to symbolic degrees. This is the reason why they are not included in our Astrotheme reports.</span></p><span data-dcnode-id="3342" instrument_node=""> </span></div><span data-dcnode-id="3340" instrument_node="">
</span><div data-dcnode-id="3339" style="border-top: 1px dotted #000; margin: 10px auto"></div><span data-dcnode-id="3338" instrument_node="">
</span><p data-dcnode-id="3333" style="margin: 13px 0 3px 8px; text-align: justify"><span data-dcnode-id="3337" instrument_node="">If you wish, you can receive immediately in your mailbox your </span><a data-dcnode-id="3335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/portrait/Comprehensive_Astrological_Portrait" onclick="window.open(this.href,'PortraitComplet'); return false"><span data-dcnode-id="3336" instrument_node="">detailed astrological portrait</span></a><span data-dcnode-id="3334" instrument_node="">, a nice gift for yourself or for your close friends and relatives, who will deeply appreciate it.</span></p><span data-dcnode-id="3332" instrument_node="">

</span><div data-dcnode-id="3295" style="float: right"><img alt="" data-dcnode-id="3296" id="bascule_19" onclick="basculer(this.id)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/developper.gif&amp;raw" style="border: 0; cursor: pointer; width: 24px"></div><span data-dcnode-id="3294" instrument_node="">

</span><div data-dcnode-id="3288" style="float: left; margin: 14px 8px 2px 0px;padding: 4px 4px 2px;background: #ffffff;border: 1px solid;border-radius: 6px"><img alt="" data-dcnode-id="3289" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/chart/uranus.gif&amp;raw" style="width: 68px"></div><span data-dcnode-id="3287" instrument_node="">
</span><p data-dcnode-id="3283" style="margin: 10px auto"><b data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">Uranus</span></b><span data-dcnode-id="3284" instrument_node=""> represents individual freedom, originality, independence, marginality, avant guard inspiration, ultra modernism. Fire is its element, it is dry, and it rules Aquarius, is in exaltation with Scorpio and is in analogy with the brain and the nerves. </span></p><span data-dcnode-id="3282" instrument_node="">
</span><p data-dcnode-id="3280" style="margin: 10px auto"><span data-dcnode-id="3281" instrument_node="">It represents inventors, odd characters, revolutionaries.</span></p><span data-dcnode-id="3279" instrument_node="">
</span><p data-dcnode-id="3275"><span data-dcnode-id="3277" style="font-style: italic; text-decoration: underline; font-weight: bold"><span data-dcnode-id="3278" instrument_node="">Temperament</span></span><span data-dcnode-id="3276" instrument_node="">: Nervous to the extreme</span></p><span data-dcnode-id="3274" instrument_node="">
</span><p data-dcnode-id="3270"><span data-dcnode-id="3272" style="font-style: italic; text-decoration: underline; font-weight: bold"><span data-dcnode-id="3273" instrument_node="">Characterology</span></span><span data-dcnode-id="3271" instrument_node="">: Emotive, Active, Secondary type; it is a Passionate type.</span></p><span data-dcnode-id="3269" instrument_node="">
</span><p data-dcnode-id="3264" style="margin: 10px auto"><span data-dcnode-id="3268" instrument_node="">For more information, see the page dedicated to </span><a data-dcnode-id="3266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/files/uranus_bolts_from_the_blues.php"><span data-dcnode-id="3267" instrument_node="">Uranus</span></a><span data-dcnode-id="3265" instrument_node="">.</span></p><span data-dcnode-id="3263" instrument_node="">
</span><div data-dcnode-id="3215"><div class="detailTextes" data-dcnode-id="3217"><span data-dcnode-id="3262" instrument_node="">
</span><h3 data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">Uranus in Cancer</span></h3><span data-dcnode-id="3259" instrument_node="">
</span><p data-dcnode-id="3257" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3258" instrument_node="">The planet Uranus symbolizes originality, independence and cerebral energy bursting suddenly. Uranus triggers the irresistible need for freedom that we have in ourselves. Uranus tends to break the constraints that have become unbearable and gives us the courage and the will to get rid of what has become a burden; when he is well aspected, he also indicates genius. In your natal chart, Uranus' house position is more important than his sign position because, like Jupiter, Saturn, Neptune and Pluto, he is a slow planet. Many people born in the same period have Uranus in the same sign. This is the reason why the sign occupied here is less meaningful than when it is occupied by the so-called fast planets, i.e. the Sun, the Moon, Mercury, Venus and Mars. Therefore, some caution is to be exercised as you read what follows. 

The sign positions of Uranus, Neptune and Pluto have a collective meaning. They do not influence your personality, unless they are involved in numerous aspects or when they emphasize a personal point of your natal chart such as your Ascendant's ruler, an angular planet, i.e. a planet near the Ascendant, the Midheaven, the Nadir or the Descendant. In such cases, the activity of the slow planet is very highlighted. Uranus in Cancer tends to intellectualize your emotions and to detach you from affective considerations. He may bring about sudden surprises and changes within your family or your home in several instances of your life.</span></p><span data-dcnode-id="3256" instrument_node="">
</span><h3 data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">Uranus in House IX</span></h3><span data-dcnode-id="3253" instrument_node="">
</span><p data-dcnode-id="3251" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3252" instrument_node="">With Uranus in the 9th House, you consider that to venture beyond the frontiers of your knowledge, and to renew your concepts is to progress. It is your keyword, and you apply it in your daily life. This planetary configuration translates into a large range of fields of interest, from modern technologies to liberal and libertarian concepts. You believe that growth means doing one's own revolution, and asserting one's morals and models. Intolerance is revolution's distinctive feature...</span></p><span data-dcnode-id="3250" instrument_node="">
</span><h3 data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">Uranus Dominant</span></h3><span data-dcnode-id="3247" instrument_node="">
</span><p data-dcnode-id="3245" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3246" instrument_node="">If Uranus is part of your natal chart's planetary dominants, in astrology, you are said to be a Uranian: personal values are prevailing. Inner certainties fuel an inflexible will and a desire to call attention on yourself as well as to follow your beliefs through. This planet prompts you to behave with determination, to put forward your own truth, and to start your personal revolution. More than other people, you are willing to keep some degree of autonomy in all circumstances, and you often display an individualistic nature. In order to achieve your ideal of freedom and independence, you may act like a despot as you try to convince and to impose your views, whether smoothly or forcefully. Regardless of the flexibility of your comportment, some situations demand an absolute firmness as well as uncompromising, frank and straightforward attitudes. People may criticise you for your intransigence and say that you are a hardliner. Outsider's opinions don't matter! The most important thing is that you act in all conscience and reach your primary objectives. More than anyone else, you know how to use your willpower and to focus your energy on a precise aim, relentlessly, whatever the consequences might be. In the chapter of qualities, let's mention a definite sense of responsibility, an innovative mind open to techniques and modern ideas, as well as a natural self-discipline which overcomes many an obstacle. Therefore, people are well-advised not to hound you into a corner.</span></p><span data-dcnode-id="3244" instrument_node="">
</span><div data-dcnode-id="3227" style="border-top: 1px dotted #000; margin: 10px auto"><span data-dcnode-id="3243" instrument_node="">
</span><h3 data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">Interpretation of the 18° Cancer symbolic degree</span></h3><span data-dcnode-id="3240" instrument_node="">
</span><h4 data-dcnode-id="3235" style="margin: 0;font-style: italic;font-size: 14px;font-weight: normal;padding: 0 4px 8px 8px"><span data-dcnode-id="3239" instrument_node="">"A man in uniform stands on a rostrum with a spear in one hand and a flute in the other. At his feet, a gauntlet and a violin are lain. On a column, a coat of arms displays war and music symbols." (</span><a data-dcnode-id="3237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the_360_symbolic_degrees.php"><span data-dcnode-id="3238" instrument_node="">Janduz</span></a><span data-dcnode-id="3236" instrument_node=""> version)</span></h4><span data-dcnode-id="3234" instrument_node=""> </span><p data-dcnode-id="3232" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3233" instrument_node="">Refined, intelligent, and dual character gifted for war and music. One is driven by noble ideals and the sense of justice. Innate talents may be the source of conceit. One is an excellent serviceman/woman or a virtuoso musician, but, unless the natal chart indicates otherwise, one is neither a strategist nor a creator. One's behaviour often shifts from gentleness to coldness, from playfulness to seriousness, which does not further easy communication.</span></p><span data-dcnode-id="3231" instrument_node=""> </span><p data-dcnode-id="3229" style="margin: 11px 0 3px 8px; text-align: justify; font-style: italic"><span data-dcnode-id="3230" instrument_node="">N.B.: symbolic degrees belong to a branch of fatalistic astrology. Their interpretation must be regarded with the utmost caution, especially given the fact that different authors give different meanings to symbolic degrees. This is the reason why they are not included in our Astrotheme reports.</span></p><span data-dcnode-id="3228" instrument_node=""> </span></div><span data-dcnode-id="3226" instrument_node="">

</span><div data-dcnode-id="3181" style="float: left; padding-top: 2px; text-align: left"><span data-dcnode-id="3210" instrument_node="">Neptune 21°10' Libra, in House XII</span><div data-dcnode-id="3182" style="text-align: left"><br data-dcnode-id="3209"><span data-dcnode-id="3207" style="font-style: italic; text-decoration: underline"><span data-dcnode-id="3208" instrument_node="">Neptune Aspects</span></span><br data-dcnode-id="3206"><span data-dcnode-id="3204" style="color: #008500"><span data-dcnode-id="3205" instrument_node="">Mercury conjunction Neptune orb +2°00'</span></span><br data-dcnode-id="3203"><span data-dcnode-id="3201" style="color: #008500"><span data-dcnode-id="3202" instrument_node="">Saturn conjunction Neptune orb +3°42'</span></span><br data-dcnode-id="3200"><span data-dcnode-id="3198" style="color: #1210df"><span data-dcnode-id="3199" instrument_node="">Neptune sextile Midheaven orb -0°05'</span></span><br data-dcnode-id="3197"><span data-dcnode-id="3195" style="color: #008500"><span data-dcnode-id="3196" instrument_node="">Sun conjunction Neptune orb +7°14'</span></span><br data-dcnode-id="3194"><span data-dcnode-id="3192" style="color: #1210df"><span data-dcnode-id="3193" instrument_node="">Neptune sextile Pluto orb -1°33'</span></span><br data-dcnode-id="3191"><span data-dcnode-id="3189" style="color: #e00b0f"><span data-dcnode-id="3190" instrument_node="">Uranus square Neptune orb +2°45'</span></span><br data-dcnode-id="3188"><span data-dcnode-id="3186" style="color: #008500"><span data-dcnode-id="3187" instrument_node="">Jupiter inconjunction Neptune orb +1°24'</span></span><br data-dcnode-id="3185"><span data-dcnode-id="3183" style="color: #1210df"><span data-dcnode-id="3184" instrument_node="">Mars sextile Neptune orb +5°21'</span></span></div></div><span data-dcnode-id="3180" instrument_node="">

</span><div data-dcnode-id="3171" style="float: left; margin: 14px 8px 2px 0px;padding: 4px 4px 2px;background: #ffffff;border: 1px solid;border-radius: 6px"><img alt="" data-dcnode-id="3172" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/chart/neptune.gif&amp;raw" style="width: 68px"></div><span data-dcnode-id="3170" instrument_node="">
</span><p data-dcnode-id="3166" style="margin: 10px auto"><b data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">Neptune</span></b><span data-dcnode-id="3167" instrument_node=""> represents escapism, impressionability, daydreaming, delusions, carelessness, deception or intuition, dishonesty or inspiration, telepathy. Water is its element, it is moist, it rules Pisces, is in exaltation in Cancer, though some authors say it is Leo, and is in analogy with the vegetative system.</span></p><span data-dcnode-id="3165" instrument_node="">
</span><p data-dcnode-id="3163" style="margin: 10px auto"><span data-dcnode-id="3164" instrument_node="">It represents dreamers, mediums, magicians, merchants of illusion, drug addicts.</span></p><span data-dcnode-id="3162" instrument_node="">
</span><p data-dcnode-id="3158"><span data-dcnode-id="3160" style="font-style: italic; text-decoration: underline; font-weight: bold"><span data-dcnode-id="3161" instrument_node="">Temperament</span></span><span data-dcnode-id="3159" instrument_node="">: rather Lymphatic</span></p><span data-dcnode-id="3157" instrument_node="">
</span><p data-dcnode-id="3153"><span data-dcnode-id="3155" style="font-style: italic; text-decoration: underline; font-weight: bold"><span data-dcnode-id="3156" instrument_node="">Characterology</span></span><span data-dcnode-id="3154" instrument_node="">: Emotive, non Active, Primary or Secondary type; it is a Sentimental, or sometimes Amorphous type.</span></p><span data-dcnode-id="3152" instrument_node="">
</span><p data-dcnode-id="3147" style="margin: 10px auto"><span data-dcnode-id="3151" instrument_node="">For more information, see the page dedicated to </span><a data-dcnode-id="3149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/files/neptune_inspiration_and_illusion.php"><span data-dcnode-id="3150" instrument_node="">Neptune</span></a><span data-dcnode-id="3148" instrument_node="">.</span></p><span data-dcnode-id="3146" instrument_node="">
</span><div data-dcnode-id="3098"><div class="detailTextes" data-dcnode-id="3100"><span data-dcnode-id="3145" instrument_node="">
</span><h3 data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">Neptune in Libra</span></h3><span data-dcnode-id="3142" instrument_node="">
</span><p data-dcnode-id="3140" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3141" instrument_node="">The planet Neptune symbolizes extreme receptivity, intense emotional sharpness, impressionability and inspiration; it is the planet of mediums, mystics and religious faith. In an astrological chart, it indicates dilution, vagueness, understanding one's environment through emotions and the absence of clear and determined limits and structures. In your natal chart, Neptune's house position is more important than his sign position because, like Jupiter, Saturn, Uranus and Pluto, he is a slow planet. Many people born in the same period have Neptune in the same sign. This is the reason why the sign occupied here is less meaningful than when it is occupied by the so-called fast planets, i.e. the Sun, the Moon, Mercury, Venus and Mars. Therefore, some caution is to be exercised as you read what follows. 

The sign positions of Uranus, Neptune and Pluto have a collective meaning. They do not influence your personality, unless they are involved in numerous aspects or when they emphasize a personal point of your natal chart such as your Ascendant's ruler, an angular planet, i.e. a planet near the Ascendant, the Midheaven, the Nadir or the Descendant. In such cases, the activity of the slow planet is very highlighted. Neptune in Libra endows you with idealism and pacifism. You dream of a world of peace, freedom, equality and tolerance. Your exchanges with others are genuine. You are listening to, and on the lookout for, all the emotions that you find to be so deliciously nurturing.</span></p><span data-dcnode-id="3139" instrument_node="">
</span><h3 data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node="">Neptune in House XII</span></h3><span data-dcnode-id="3136" instrument_node="">
</span><p data-dcnode-id="3134" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3135" instrument_node="">Neptune is in the 12th House. This is probably one of the most significant configurations for occultism, the world of mystery, and mysticism. Your sharp intuition lets you perceive what is behind the surface, as well as the existence of a hereafter, or a different, subtle and secret universe. In some cases, this special perception of the world may go as far as to endow you with clairvoyance or channelling gifts. These dormant talents should be practiced during your leisure time!</span></p><span data-dcnode-id="3133" instrument_node="">
</span><h3 data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">Neptune Dominant</span></h3><span data-dcnode-id="3130" instrument_node="">
</span><p data-dcnode-id="3128" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3129" instrument_node="">If Neptune is part of your natal chart's planetary dominants, in astrology, you are said to be a Neptunian: your intuition is highly developed. You are of a contemplative nature, and you are particularly receptive to ambiances, places, and people. You gladly cultivate the art of letting-go, and you allow the natural unfolding of events to construct your world. You follow your inspirations, for better or for worse. At times, you display an extraordinary clairvoyance gift. You seem to be able to read your subconscious like a book, and you track down subtle underlying mechanisms, flaws, or open breaches. This innate intuition might explain the strokes of good luck which the Neptunian is sometimes credited with. However, you may also be the victim of illusions and misleading intuitions. You are an idealist, and you let your deepest aspirations prevail over the realities of the moment. Then, you set off in quest of some quixotic objective, living like a Don Quixote who relentlessly pursues an impossible dream. You have a great talent for psychology and the mysteries of the human soul. Since you instinctively perceive people's intents and motivations, as you swim in the complexity of human nature, you feel in your element. The subtlety of your perceptiveness is the source of both special affections and irrevocable rejections. What is the danger of such a dominant? If it is not offset by other influences in your natal chart, you may not have an iron will. Your trump card is your instinct, which may be developed to the extent that it becomes clairvoyance.</span></p><span data-dcnode-id="3127" instrument_node="">
</span><div data-dcnode-id="3110" style="border-top: 1px dotted #000; margin: 10px auto"><span data-dcnode-id="3126" instrument_node="">
</span><h3 data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">Interpretation of the 21° Libra symbolic degree</span></h3><span data-dcnode-id="3123" instrument_node="">
</span><h4 data-dcnode-id="3118" style="margin: 0;font-style: italic;font-size: 14px;font-weight: normal;padding: 0 4px 8px 8px"><span data-dcnode-id="3122" instrument_node="">"A man sleeps on the grass with several pouches of silver by his side, while his horses are waiting." (</span><a data-dcnode-id="3120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the_360_symbolic_degrees.php"><span data-dcnode-id="3121" instrument_node="">Janduz</span></a><span data-dcnode-id="3119" instrument_node=""> version)</span></h4><span data-dcnode-id="3117" instrument_node=""> </span><p data-dcnode-id="3115" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3116" instrument_node="">Neglectful, unwise, and unrealistic character. As one readily flaunts one's wealth, one is bound to be taken advantage of by friends and relatives. However, since one is intelligent and hard-working, one manages to be successful and to achieve power.</span></p><span data-dcnode-id="3114" instrument_node=""> </span><p data-dcnode-id="3112" style="margin: 11px 0 3px 8px; text-align: justify; font-style: italic"><span data-dcnode-id="3113" instrument_node="">N.B.: symbolic degrees belong to a branch of fatalistic astrology. Their interpretation must be regarded with the utmost caution, especially given the fact that different authors give different meanings to symbolic degrees. This is the reason why they are not included in our Astrotheme reports.</span></p><span data-dcnode-id="3111" instrument_node=""> </span></div><span data-dcnode-id="3109" instrument_node="">

</span><p data-dcnode-id="3102" style="margin: 13px 0 3px 8px; text-align: justify"><span data-dcnode-id="3106" instrument_node="">If you wish, you can receive immediately in your mailbox your </span><a data-dcnode-id="3104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/portrait/Comprehensive_Astrological_Portrait" onclick="window.open(this.href,'PortraitComplet'); return false"><span data-dcnode-id="3105" instrument_node="">detailed astrological portrait</span></a><span data-dcnode-id="3103" instrument_node="">, a nice gift for yourself or for your close friends and relatives, who will deeply appreciate it.</span></p><span data-dcnode-id="3101" instrument_node="">

</span><div data-dcnode-id="3067" style="float: right"><img alt="" data-dcnode-id="3068" id="bascule_21" onclick="basculer(this.id)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/developper.gif&amp;raw" style="border: 0; cursor: pointer; width: 24px"></div><span data-dcnode-id="3066" instrument_node="">
</span><div data-dcnode-id="3065" style="clear: both; line-height: 0.1em; font-size: 1px"></div><span data-dcnode-id="3064" instrument_node="">
</span></div><span data-dcnode-id="3062" instrument_node="">
</span><div data-dcnode-id="3060" style="float: left; margin: 14px 8px 2px 0px;padding: 4px 4px 2px;background: #ffffff;border: 1px solid;border-radius: 6px"><img alt="" data-dcnode-id="3061" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/chart/pluto.gif&amp;raw" style="width: 68px"></div><span data-dcnode-id="3059" instrument_node="">
</span><p data-dcnode-id="3055" style="margin: 10px auto"><b data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">Pluto</span></b><span data-dcnode-id="3056" instrument_node=""> represents deep transformations, mutations and eliminations, sexuality and magnetism, power and secrets, destruction with a view to regeneration, the phoenix rising from the ashes. Its element is indefinite; burning (like lava in fusion ?), it rules Scorpio, is in exaltation in Pisces and is in analogy with the sexual organs and excretion.</span></p><span data-dcnode-id="3054" instrument_node="">
</span><p data-dcnode-id="3052" style="margin: 10px auto"><span data-dcnode-id="3053" instrument_node="">It represents dictators, sadistic people, violent characters, is instinctive and powerful but also mysterious with hidden strengths.</span></p><span data-dcnode-id="3051" instrument_node="">
</span><p data-dcnode-id="3047"><span data-dcnode-id="3049" style="font-style: italic; text-decoration: underline; font-weight: bold"><span data-dcnode-id="3050" instrument_node="">Temperament</span></span><span data-dcnode-id="3048" instrument_node="">: rather Bilious</span></p><span data-dcnode-id="3046" instrument_node="">
</span><p data-dcnode-id="3042"><span data-dcnode-id="3044" style="font-style: italic; text-decoration: underline; font-weight: bold"><span data-dcnode-id="3045" instrument_node="">Characterology</span></span><span data-dcnode-id="3043" instrument_node="">: Emotive or non-Emotive, Active, Primary type; it is a Passionate Choleric type.</span></p><span data-dcnode-id="3041" instrument_node="">
</span><p data-dcnode-id="3036" style="margin: 10px auto"><span data-dcnode-id="3040" instrument_node="">For more information, see the page dedicated to </span><a data-dcnode-id="3038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/files/pluto_eros_and_thanatos.php"><span data-dcnode-id="3039" instrument_node="">Pluto</span></a><span data-dcnode-id="3037" instrument_node="">.</span></p><span data-dcnode-id="3035" instrument_node="">
</span><div data-dcnode-id="2987"><div class="detailTextes" data-dcnode-id="2989"><span data-dcnode-id="3034" instrument_node="">
</span><h3 data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">Pluto in Leo</span></h3><span data-dcnode-id="3031" instrument_node="">
</span><p data-dcnode-id="3029" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3030" instrument_node="">The planet Pluto symbolizes deep disruptions and upheavals, domination and sexual instincts, and the inner power we have in ourselves. Pluto destroys in order to reconstruct and he provokes painful crises that are needed in metamorphosis. Pluto is our deepest instincts' brutal force. It is the hidden and unconscious violence that can explode in us with incredible intensity before being projected in our actions; in itself, the planet is not negative: the might and the intensity of its energy are beyond the conceivable but it can be funnelled. Pluto is the only possibility we have at our disposal to overcome our inner blocks and to eliminate outgrown situations that have become inextricable. Pluto's energy is valuable because of its usefulness for the irreversible destruction of what constitutes a problem and not because of its negative side and its perversity. Pluto allows to reconstruct and to regenerate parts of our personality or whole stretches of our life, provided that we manage to funnel his wild energy and to step back. It is impossible to tame this energy, given its essence. However, it is possible to take advantage of it for a precise aim, through a temporary identification of some parts of us with this energy. In such a case, the outcome is our final evolution and even, our transformation. In your natal chart, Pluto's house position is more important than his sign position because, like Jupiter, Saturn, Uranus and Neptune, Pluto is a slow planet. Many people born in the same period have Pluto in the same sign. This is the reason why the sign occupied here is less meaningful than when it is occupied by the so-called fast planets, i.e. the Sun, the Moon, Mercury, Venus and Mars. Therefore, some caution is to be exercised as you read what follows. 

The sign positions of Uranus, Neptune and Pluto have a collective meaning. They do not influence your personality and they are not to be really taken into account, unless they are involved in numerous aspects or when they emphasize a personal point of your natal chart such as your Ascendant's ruler, an angular planet, i.e. a planet near the Ascendant, the Midheaven, the Nadir or the Descendant. In such cases, the activity of the slow planet is very highlighted. Pluto in Leo may give you an authoritarian and, even, despotic nature. But your charisma and your radiance are intensified.</span></p><span data-dcnode-id="3028" instrument_node="">
</span><h3 data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">Pluto in House X</span></h3><span data-dcnode-id="3025" instrument_node="">
</span><p data-dcnode-id="3023" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3024" instrument_node="">With Pluto in the 10th House, you often play your game well when you face a situation of crisis or a muddled environment. In the professional and social areas, your progression is special and subtle. The art of manipulation behind the scenes turns you into an efficient and formidable partner. You intervene in the dark, far from social niceties. You easily detect weaknesses and false values, and you carry out your work with clear-sightedness, aiming at your self-interests, and with a scheming mind.</span></p><span data-dcnode-id="3022" instrument_node="">
</span><h3 data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">Pluto Dominant</span></h3><span data-dcnode-id="3019" instrument_node="">
</span><p data-dcnode-id="3017" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3018" instrument_node="">If Pluto is part of your natal chart's planetary dominants, in astrology, you are said to be a Plutonian: you sometimes feel like a foreigner who does not belong to the world, to its laws, and its concerns. The rules of life in society are not necessarily yours. You are interested in what is unknown and in the subtle laws of a hidden order. So, you take malicious pleasure in ridiculing the patterns you find too simplistic or too rigid. You also revel in underlining the limits of explanations you deem too common. There is something unconventional about the way you are, the way you think, and the way you act. What is your specificity made of? Is it an extraordinary partner? A life off the beaten path? Or do you only distance yourself from conventional morals? In any case, you have the feeling, sometimes quite vague, that you come from nowhere, and that you do not belong to any definite group... In short, it means that you cannot be simplified in order to conform to existing models. The gap between you and ordinary mortals is also an element of your strength. Your deep clear-sightedness, firstly, enables you to put things into perspective and to grant them only the attention they deserve. Your other remarkable asset is your capacity to intervene from behind the scenes, to secretly organise events, and to bring about the desirable outcome without seeming to impose or to dictate anything. However, you must still overcome one of the major difficulties of this dominant, which is to get people to accept your difference and to smoothly fit into your environment.</span></p><span data-dcnode-id="3016" instrument_node="">
</span><div data-dcnode-id="2999" style="border-top: 1px dotted #000; margin: 10px auto"><span data-dcnode-id="3015" instrument_node="">
</span><h3 data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">Interpretation of the 22° Leo symbolic degree</span></h3><span data-dcnode-id="3012" instrument_node="">
</span><h4 data-dcnode-id="3007" style="margin: 0;font-style: italic;font-size: 14px;font-weight: normal;padding: 0 4px 8px 8px"><span data-dcnode-id="3011" instrument_node="">"A star rises above a two-headed man standing by the shore of a lake." (</span><a data-dcnode-id="3009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the_360_symbolic_degrees.php"><span data-dcnode-id="3010" instrument_node="">Janduz</span></a><span data-dcnode-id="3008" instrument_node=""> version)</span></h4><span data-dcnode-id="3006" instrument_node=""> </span><p data-dcnode-id="3004" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="3005" instrument_node="">Benevolent, discreet, and fair character endowed with powerful intellectual capacities. One has broad knowledge covering a wide range of disciplines, particularly in human sciences. Any career in education and mentoring are favoured. Should the natal chart concur, one is some sort of prophet whose name is most likely to go down in history.</span></p><span data-dcnode-id="3003" instrument_node=""> </span><p data-dcnode-id="3001" style="margin: 11px 0 3px 8px; text-align: justify; font-style: italic"><span data-dcnode-id="3002" instrument_node="">N.B.: symbolic degrees belong to a branch of fatalistic astrology. Their interpretation must be regarded with the utmost caution, especially given the fact that different authors give different meanings to symbolic degrees. This is the reason why they are not included in our Astrotheme reports.</span></p><span data-dcnode-id="3000" instrument_node=""> </span></div><span data-dcnode-id="2998" instrument_node="">

</span><p data-dcnode-id="2966" style="margin: 10px auto"><b data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">Chiron</span></b><span data-dcnode-id="2967" instrument_node=""> is almost renowned and used everywhere. Most astrologers consider it as a kind of "mediator" between Saturn and outer planets. Consequently, Chiron is of Saturn's nature and at the same time is influenced by Uranus, the first slow-moving planet. Astrologically, it symbolizes wisdom, patience and the faculty to reduce others' sufferings: it is said to be the "great healer" of the zodiac. Like all the secondary bodies, it must be in close conjunction with planets or angles in order to fully express its action.</span></p><span data-dcnode-id="2965" instrument_node="">
</span><div data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">%TEXTES_22%</span></div><span data-dcnode-id="2962" instrument_node="">

</span><div data-dcnode-id="2947" style="float: left; margin: 14px 8px 2px 0px;padding: 4px 4px 2px;background: #ffffff;border: 1px solid;border-radius: 6px"><img alt="" data-dcnode-id="2948" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/chart/ceres.gif&amp;raw" style="width: 68px"></div><span data-dcnode-id="2946" instrument_node="">
</span><p data-dcnode-id="2942" style="margin: 10px auto"><b data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">Ceres</span></b><span data-dcnode-id="2943" instrument_node="">, the biggest of the four minor asteroids used besides Chiron, is associated with the mythological goddess of growing plants and harvest and also symbolizes physical constitution, vitality and fertility. She's also known as Demeter, according to the astrologer Zipporah Dobyns, linked to the symbolism of the mother but in a less emotive and more physical way than the Moon. Ceres is thought to be the ruler of Virgo, in exaltation in Gemini, in exile in Pisces and in fall in Sagittarius. Keywords associated with Ceres could be order, practical sense, worry, precision, modesty, method, sobriety, motherhood, fertility, the Earth: a kind of a more cerebral Moon...</span></p><span data-dcnode-id="2941" instrument_node="">
</span><div data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">%TEXTES_23%</span></div><span data-dcnode-id="2938" instrument_node="">

</span><p data-dcnode-id="2894" style="margin: 10px auto"><b data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">Juno</span></b><span data-dcnode-id="2895" instrument_node=""> is the asteroid corresponding to the adaptation to the marital partner and to the defence of individual rights; it is thus used in the field of marriage.</span></p><span data-dcnode-id="2893" instrument_node="">

</span><div data-dcnode-id="2851" style="float: left; margin: 14px 8px 2px 0px;padding: 4px 4px 2px;background: #ffffff;border: 1px solid;border-radius: 6px"><img alt="" data-dcnode-id="2852" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/chart/node.gif&amp;raw" style="width: 68px"></div><span data-dcnode-id="2850" instrument_node="">
</span><p data-dcnode-id="2846" style="margin: 10px auto"><b data-dcnode-id="2848"><span data-dcnode-id="2849" instrument_node="">The North Node</span></b><span data-dcnode-id="2847" instrument_node=""> (True Node here) represents the goals that must be achieved during life, in the karmic sense according to some traditions. Its position in house indicates in what field an effort is necessary in order to evolve. The North Node is often called the Dragon's head, it is usually considered beneficial, a bit like Jupiter with the planets. The Lunar nodes are fictional points and not actual heavenly bodies: they are the intersections of the Moon with the Ecliptic (the path made by the Sun in its orbit as seen from the Earth). The axis of the Lunar nodes moves 19 degrees each year, namely a bit more than three minutes each day.</span></p><span data-dcnode-id="2845" instrument_node="">
</span><p data-dcnode-id="2841" style="margin: 10px auto"><b data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">The South Node</span></b><span data-dcnode-id="2842" instrument_node=""> is diametrically opposed to the North Node, therefore it faces it (it's not drawn here, it's the same symbol but upside down). It symbolizes what has already been achieved or acquired, in a karmic sense: it's the past from which it's advised to move on in order to progress. The South Node is rather negative, of a Saturnian nature: the experience through suffering.</span></p><span data-dcnode-id="2840" instrument_node="">
</span><div data-dcnode-id="2818"><span data-dcnode-id="2839" instrument_node=""> </span><div data-dcnode-id="2838" style="clear: both"></div><span data-dcnode-id="2837" instrument_node="">
</span><div data-dcnode-id="2820" style="border-top: 1px dotted #000; margin: 10px auto"><span data-dcnode-id="2836" instrument_node="">
</span><h3 data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">Interpretation of the 20°  Aquarius symbolic degree</span></h3><span data-dcnode-id="2833" instrument_node="">
</span><h4 data-dcnode-id="2828" style="margin: 0;font-style: italic;font-size: 14px;font-weight: normal;padding: 0 4px 8px 8px"><span data-dcnode-id="2832" instrument_node="">"In a desert, a camel and a turtle progress side by side. Further down, the camel sits and lets the turtle climb on its back." (</span><a data-dcnode-id="2830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the_360_symbolic_degrees.php"><span data-dcnode-id="2831" instrument_node="">Janduz</span></a><span data-dcnode-id="2829" instrument_node=""> version)</span></h4><span data-dcnode-id="2827" instrument_node=""> </span><p data-dcnode-id="2825" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="2826" instrument_node="">Active, observant, and optimistic character endowed with the capacity to turn obstacles into assets. Childhood is clouded by financial setbacks underwent by the parents. For professional purposes, one travels abroad and amasses valuable knowledge which one puts into practice in one's country. Success and decent wealth can be achieved in all careers requiring movement.</span></p><span data-dcnode-id="2824" instrument_node=""> </span><p data-dcnode-id="2822" style="margin: 11px 0 3px 8px; text-align: justify; font-style: italic"><span data-dcnode-id="2823" instrument_node="">N.B.: symbolic degrees belong to a branch of fatalistic astrology. Their interpretation must be regarded with the utmost caution, especially given the fact that different authors give different meanings to symbolic degrees. This is the reason why they are not included in our Astrotheme reports.</span></p><span data-dcnode-id="2821" instrument_node=""> </span></div><span data-dcnode-id="2819" instrument_node="">
</span></div><span data-dcnode-id="2817" instrument_node="">
</span></div><div class="detailCadre" data-dcnode-id="2772" id="detail_28" style="background: #f0f0f0"><span data-dcnode-id="2815" instrument_node="">
</span><div class="detailTitre" data-dcnode-id="2805"><span data-dcnode-id="2814" instrument_node="">
</span><div data-dcnode-id="2812" style="float: left; padding-top: 2px; text-align: left"><span data-dcnode-id="2813" instrument_node="">True Lilith 27°29' Я Leo, in House X</span></div><span data-dcnode-id="2811" instrument_node="">
</span><div data-dcnode-id="2809" style="float: right"><img alt="" data-dcnode-id="2810" id="bascule_28" onclick="basculer(this.id)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/developper.gif&amp;raw" style="border: 0; cursor: pointer; width: 24px"></div><span data-dcnode-id="2808" instrument_node="">
</span><div data-dcnode-id="2807" style="clear: both; line-height: 0.1em; font-size: 1px"></div><span data-dcnode-id="2806" instrument_node="">
</span></div><span data-dcnode-id="2804" instrument_node="">
</span><div data-dcnode-id="2802" style="float: left; margin: 14px 8px 2px 0px;padding: 4px 4px 2px;background: #ffffff;border: 1px solid;border-radius: 6px"><img alt="" data-dcnode-id="2803" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/chart/lilith.gif&amp;raw" style="width: 68px"></div><span data-dcnode-id="2801" instrument_node="">
</span><p data-dcnode-id="2797" style="margin: 10px auto"><b data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">Lilith</span></b><span data-dcnode-id="2798" instrument_node=""> or the Dark Moon (True Lilith here) represents the uncrossable threshold, taboos, the individual's provocative and fascinating side, including on a sexual level. She symbolizes violence and "untameability", the radical and deep-seated refusal to submit. The keywords for Lilith can be sterility, sadism, perversity, castration, sadomasochism, eroticism, orgasm, forbidden fantasies, marginality, cruelty; redemption, illumination, rebelliousness... Lilith's opposite point is called Priapus; it is the Lunar perigee, the position where the Moon is closest to the Earth. It symbolizes man's primitive nature, the horror hidden in our deepest self; masochism, extreme sensuality, impulsiveness, irrationality and excess. Physically speaking, the Dark Moon is the focal point unoccupied by the Earth: it is not a concrete body but a mathematical point.</span></p><span data-dcnode-id="2796" instrument_node="">
</span><div data-dcnode-id="2774"><span data-dcnode-id="2795" instrument_node=""> </span><div data-dcnode-id="2794" style="clear: both"></div><span data-dcnode-id="2793" instrument_node="">
</span><div data-dcnode-id="2776" style="border-top: 1px dotted #000; margin: 10px auto"><span data-dcnode-id="2792" instrument_node="">
</span><h3 data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">Interpretation of the 27°  Leo symbolic degree</span></h3><span data-dcnode-id="2789" instrument_node="">
</span><h4 data-dcnode-id="2784" style="margin: 0;font-style: italic;font-size: 14px;font-weight: normal;padding: 0 4px 8px 8px"><span data-dcnode-id="2788" instrument_node="">"Two golden circles tied by a blue ribbon flutter above two men and a woman walking in the countryside." (</span><a data-dcnode-id="2786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the_360_symbolic_degrees.php"><span data-dcnode-id="2787" instrument_node="">Janduz</span></a><span data-dcnode-id="2785" instrument_node=""> version)</span></h4><span data-dcnode-id="2783" instrument_node=""> </span><p data-dcnode-id="2781" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="2782" instrument_node="">Benevolent, cheerful, and pleasant character. Life is peaceful and happy. One perfectly blends idealism with earthly needs, as described by the two united golden circles. This degree indicates nice friends, wealth, and fulfilled ambitions. The second part of life is enlightened by spirituality. Two marriages are possible.</span></p><span data-dcnode-id="2780" instrument_node=""> </span><p data-dcnode-id="2778" style="margin: 11px 0 3px 8px; text-align: justify; font-style: italic"><span data-dcnode-id="2779" instrument_node="">N.B.: symbolic degrees belong to a branch of fatalistic astrology. Their interpretation must be regarded with the utmost caution, especially given the fact that different authors give different meanings to symbolic degrees. This is the reason why they are not included in our Astrotheme reports.</span></p><span data-dcnode-id="2777" instrument_node=""> </span></div><span data-dcnode-id="2775" instrument_node="">
</span></div><span data-dcnode-id="2773" instrument_node="">
</span></div><div class="detailCadre" data-dcnode-id="2713" id="detail_29" style="background: #f0f0f0"><span data-dcnode-id="2771" instrument_node="">
</span><div class="detailTitre" data-dcnode-id="2761"><span data-dcnode-id="2770" instrument_node="">
</span><div data-dcnode-id="2768" style="float: left; padding-top: 2px; text-align: left"><span data-dcnode-id="2769" instrument_node="">Fortune 22°11' Gemini, in House VIII</span></div><span data-dcnode-id="2767" instrument_node="">
</span><div data-dcnode-id="2765" style="float: right"><img alt="" data-dcnode-id="2766" id="bascule_29" onclick="basculer(this.id)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/developper.gif&amp;raw" style="border: 0; cursor: pointer; width: 24px"></div><span data-dcnode-id="2764" instrument_node="">
</span><div data-dcnode-id="2763" style="clear: both; line-height: 0.1em; font-size: 1px"></div><span data-dcnode-id="2762" instrument_node="">
</span></div><span data-dcnode-id="2760" instrument_node="">
</span><div data-dcnode-id="2758" style="float: left; margin: 14px 8px 2px 0px;padding: 4px 4px 2px;background: #ffffff;border: 1px solid;border-radius: 6px"><img alt="" data-dcnode-id="2759" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.astrotheme.com/images/chart/fortune.gif&amp;raw" style="width: 68px"></div><span data-dcnode-id="2757" instrument_node="">
</span><p data-dcnode-id="2753" style="margin: 10px auto"><b data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">The Part of Fortune</span></b><span data-dcnode-id="2754" instrument_node=""> is an ancient concept, used by Ptolemy and other astrologers before him. Firstly, it has nothing to do with fortune! In modern astrology, it is actually used to enhance a planet or angle when in close conjunction with it: it thus amplifies the meaning associated to the point affected by its presence. It is calculated in the following way:</span></p><span data-dcnode-id="2752" instrument_node="">
</span><p data-dcnode-id="2750" style="margin: 10px auto"><span data-dcnode-id="2751" instrument_node="">Part of Fortune = AS + Moon - Sun (it is the Moons position when the Sun rises)</span></p><span data-dcnode-id="2749" instrument_node="">
</span><p data-dcnode-id="2747" style="margin: 10px auto"><span data-dcnode-id="2748" instrument_node="">The classical Part of Fortune, of which the calculus method is unchanged whether in a diurnal or nocturnal chart, is usually distinguished from the diurnal/nocturnal  Part of Fortune which is calculated by the formula AS + Sun - Moon for a nocturnal chart, and AS + Moon - Sun in a diurnal chart.</span></p><span data-dcnode-id="2746" instrument_node="">
</span><p data-dcnode-id="2744" style="margin: 10px auto"><span data-dcnode-id="2745" instrument_node="">We currently use the latter formula for our astrological programmes.</span></p><span data-dcnode-id="2743" instrument_node="">
</span><p data-dcnode-id="2738" style="margin: 10px auto"><span data-dcnode-id="2742" instrument_node="">For more information, see the page dedicated to the </span><a data-dcnode-id="2740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/astrology_arabian_parts.php"><span data-dcnode-id="2741" instrument_node="">Arabian parts</span></a><span data-dcnode-id="2739" instrument_node="">.</span></p><span data-dcnode-id="2737" instrument_node="">
</span><div data-dcnode-id="2715"><span data-dcnode-id="2736" instrument_node=""> </span><div data-dcnode-id="2735" style="clear: both"></div><span data-dcnode-id="2734" instrument_node="">
</span><div data-dcnode-id="2717" style="border-top: 1px dotted #000; margin: 10px auto"><span data-dcnode-id="2733" instrument_node="">
</span><h3 data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">Interpretation of the 22° Gemini symbolic degree</span></h3><span data-dcnode-id="2730" instrument_node="">
</span><h4 data-dcnode-id="2725" style="margin: 0;font-style: italic;font-size: 14px;font-weight: normal;padding: 0 4px 8px 8px"><span data-dcnode-id="2729" instrument_node="">"A decrepit man stooping on a stick limps off a deserted road. Behind him, is an old, storm-stricken oak." (</span><a data-dcnode-id="2727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrotheme.com/the_360_symbolic_degrees.php"><span data-dcnode-id="2728" instrument_node="">Janduz</span></a><span data-dcnode-id="2726" instrument_node=""> version)</span></h4><span data-dcnode-id="2724" instrument_node=""> </span><p data-dcnode-id="2722" style="margin: 3px 0 3px 8px; text-align: justify"><span data-dcnode-id="2723" instrument_node="">Secretive, subtle, and courageous character. Life starts under the best aegis, but after having reached its heights, the career undergoes numerous ups and downs, and one discovers that the people one has helped, including the family members, behave with ingratitude. One must carefully distinguish between genuine friends and flatterers, if one is to prevent one's life from ending in painful poverty and loneliness. Furthermore, one must never hesitate to fight injustices instead of limiting oneself to cowardly neutrality.</span></p><span data-dcnode-id="2721" instrument_node=""> </span><p data-dcnode-id="2719" style="margin: 11px 0 3px 8px; text-align: justify; font-style: italic"><span data-dcnode-id="2720" instrument_node="">N.B.: symbolic degrees belong to a branch of fatalistic astrology. Their interpretation must be regarded with the utmost caution, especially given the fact that different authors give different meanings to symbolic degrees. This is the reason why they are not included in our Astrotheme reports.</span></p><span data-dcnode-id="2718" instrument_node=""> </span></div><span data-dcnode-id="2716" instrument_node="">
</span></div><span data-dcnode-id="2714" instrument_node="">

</span><div class="detailTitre" data-dcnode-id="2689"><span data-dcnode-id="2711" instrument_node="">
</span><div data-dcnode-id="2696" style="float: left; padding-top: 2px; text-align: left"><span data-dcnode-id="2710" instrument_node="">Ascendant  3°12' Scorpio</span><div data-dcnode-id="2697" style="text-align: left"><br data-dcnode-id="2709"><span data-dcnode-id="2707" style="font-style: italic; text-decoration: underline"><span data-dcnode-id="2708" instrument_node="">Ascendant Aspects</span></span><br data-dcnode-id="2706"><span data-dcnode-id="2704" style="color: #008500"><span data-dcnode-id="2705" instrument_node="">Moon inconjunction Ascendant orb +0°17'</span></span><br data-dcnode-id="2703"><span data-dcnode-id="2701" style="color: #008500"><span data-dcnode-id="2702" instrument_node="">Venus conjunction Ascendant orb +8°30'</span></span><br data-dcnode-id="2700"><span data-dcnode-id="2698" style="color: #008500"><span data-dcnode-id="2699" instrument_node="">Mercury conjunction Ascendant orb +10°01</span></span></div></div><span data-dcnode-id="2695" instrument_node="">
