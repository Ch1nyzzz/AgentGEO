</span></header><figure class="td-media td-media--story" data-dcnode-id="1133" id="td-story-image" itemprop="associatedMedia image" itemscope="" itemtype="http://schema.org/ImageObject"><meta content="https://thediplomat.com/wp-content/uploads/2014/09/sizes/td-story-s-2/thediplomat_2014-09-03_03-46-52.jpg" data-dcnode-id="1142" itemprop="url"><meta content="true" data-dcnode-id="1141" itemprop="representativeOfPage"><div class="td-img" data-dcnode-id="1139"><img alt="Putin’s Chilling Kazakhstan Comments" data-dcnode-id="1140" sizes="(min-width: 915px) 462px, (min-width: 753px) 300px, (min-width: 672px) 624px, calc(100vw - 48px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thediplomat.com/wp-content/uploads/2014/09/sizes/td-story-s-1/thediplomat_2014-09-03_03-46-52.jpg&amp;raw" srcset="https://thediplomat.com/wp-content/uploads/2014/09/sizes/td-story-s-1/thediplomat_2014-09-03_03-46-52.jpg 300w, https://thediplomat.com/wp-content/uploads/2014/09/sizes/td-story-s-2/thediplomat_2014-09-03_03-46-52.jpg 600w, https://thediplomat.com/wp-content/uploads/2014/09/sizes/medium/thediplomat_2014-09-03_03-46-52.jpg 462w" title="Putin’s Chilling Kazakhstan Comments"></div><figcaption class="td-caption" data-dcnode-id="1134" itemprop="description"><span data-dcnode-id="1135"><span data-dcnode-id="1138" instrument_node="">Credit: </span><a data-dcnode-id="1136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eng.kremlin.ru/news/22864" target="_blank"><span data-dcnode-id="1137" instrument_node="">Presidential Press and Information Office, Kremlin</span></a></span></figcaption></figure><section class="td-prose td-pwOn ng-scope" data-dcnode-id="1029" id="td-story-body" itemprop="articleBody" ng-if="dplpw.read"><aside class="td-box td-ad td-ad-vertical td-right" data-dcnode-id="1125"><header data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Advertisement</span></header><div class="td-ad-body" data-dcnode-id="1126"><div class="td-ad td-ad--gpt" data-dcnode-id="1127" id="div-gpt-ad-1343666802946-1"></div></div></aside><p data-dcnode-id="1111"><span data-dcnode-id="1124" instrument_node="">There are few places more </span><a data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thediplomat.com/2014/07/russias-growing-isolation/"><span data-dcnode-id="1123" instrument_node="">dangerous these days</span></a><span data-dcnode-id="1121" instrument_node=""> than to be a friend to the Kremlin. Those in Russian President Vladimir Putin’s inner sanctum have seen their purse-strings snipped and their passports blocked. Those most integrated with the Russian economy – either through trade or gastarbeiter programs – have </span><a data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/2014/05/02/ukraine-crisis-centralasia-growth-idUSL6N0NO1BE20140502"><span data-dcnode-id="1120" instrument_node="">watched their economic potential</span></a><span data-dcnode-id="1118" instrument_node=""> tumble </span><a data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//themoscowtimes.com/business/article/ministry-raises-inflation-forecasts-halves-2015-growth-outlook-/505888.html"><span data-dcnode-id="1117" instrument_node="">alongside Moscow’s</span></a><span data-dcnode-id="1115" instrument_node="">. Over the past six months, the Kremlin’s embrace has morphed into a suffocating squeeze, draining the region’s commercial appeal and </span><a data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//themoscowtimes.com/opinion/article/minsk-meeting-proves-eeu-another-putin-flop/505751.html"><span data-dcnode-id="1114" instrument_node="">gutting any weight</span></a><span data-dcnode-id="1112" instrument_node=""> the Eurasian Union (EEU) could have boasted.</span></p><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">To the Kremlin, friendship is a four-letter word. And it seems that Kazakhstan, which has continuously and publicly supported Russia’s geopolitical flailings, knows this better than anyone. Not only has Kazakhstan President Nursultan Nazarbayev watched his country’s economic surge stumble through the Kremlin’s actions, but he’s witnessed Putin mangle Nazarbayev’s original EEU dream beyond recognition.</span></p><p data-dcnode-id="1104"><span data-dcnode-id="1108" instrument_node="">But if Kazakhstan wasn’t already aware of the potential daggers lining their relationship to the north – for those in the country still believing Russia provided some beacon of righteousness and prosperity – Putin’s </span><a data-dcnode-id="1106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eng.kremlin.ru/news/22864"><span data-dcnode-id="1107" instrument_node="">comments at the recent Seliger Youth Forum</span></a><span data-dcnode-id="1105" instrument_node=""> should give them pause.</span></p><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">A few days after Minsk’s EEU summit, which saw a palpably tired Nazarbayev attempt to broker some kind of mediation, Putin fielded a question from a young woman at Seliger about the role of nationalism in Kazakhstan, and the potential impact the putative jingoism could have on relations with Russia.</span></p><aside class="td-box td-box-m td-left" data-dcnode-id="1081" id="td-box-newsletter"><header data-dcnode-id="1095"><h3 data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Diplomat Brief</span></h3><h4 data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Weekly Newsletter</span></h4><i data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">N</span></i></header><div class="td-main" data-dcnode-id="1082"><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Get briefed on the story of the week, and developing stories to watch across the Asia-Pacific.</span></p><a class="td-btn td-btn--full-width td-btn--no-margin" data-dcnode-id="1083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thediplomat.com/newsletter/"><span data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Get the Newsletter</span></span><i data-dcnode-id="1084"><svg data-dcnode-id="1085" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"></svg><span data-dcnode-id="1090" instrument_node="">
</span><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" data-dcnode-id="1089"></path><span data-dcnode-id="1088" instrument_node="">
</span><path d="M0 0h24v24H0z" data-dcnode-id="1087" fill="none"></path><span data-dcnode-id="1086" instrument_node="">
</span></i></a></div></aside><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Putin answered at relative length, but before getting into the exegesis of his thoughts, it’s worth circling back to the girl’s question. Not only did the woman, an obvious plant, cite Nazarbayev as the most important “restraining factor” in tamping the alleged Kazakh nationalism, she also made a point of Kazakhs not “correctly understanding Russian political rhetoric,” and asked if there was any reason to expect “a Ukrainian scenario upon Nazarbayev’s departure.”</span></p><p class="td-ad-inline td-ad-inline-txt" data-dcnode-id="1074" ng-show="dplpw.ad"><a data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thediplomat.com/subscriptions/"><b data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Enjoying this article?</span></b><span data-dcnode-id="1076" instrument_node=""> Click here to subscribe for full access. Just $5 a month.</span></a></p><p data-dcnode-id="1066"><span data-dcnode-id="1073" instrument_node="">As to her observation of some “growth” of Kazakh nationalism, this is, technically, true. </span><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.foreignpolicy.com/articles/2014/06/05/vladimir_putins_impotent_eurasian_union_kazakhstan_belarus_ukraine"><span data-dcnode-id="1072" instrument_node="">Pushback to the Eurasian Union</span></a><span data-dcnode-id="1070" instrument_node="">, with concomitant concerns about a loss of Kazakhstani sovereignty to an overbearing Russia, has found a public presence in Kazakhstan in 2014. And this was new, especially among the </span><a data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.voanews.com/content/russia-belarus-kazakhstan-agree-to-create-economic-union/1924941.html"><span data-dcnode-id="1069" instrument_node="">handful of protesters</span></a><span data-dcnode-id="1067" instrument_node=""> discussing the “virus” of Russian imperialism. But not only is the concept of a saber-rattling Kazakh nationalism laughable, it pales in comparison to, say, the “Russia for Russians!” crowd. There isn’t a reason for any level-headed person to believe Kazakh chauvinism presents any credible threat to non-Kazakh citizens – all the more against Russians.</span></p><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">And yet, the question was there. But it is the woman’s emphasis on Nazarbayev’s role, and the questions that come upon his departure, that can illustrate a larger point, and dovetail with Putin’s comments. At 74 years old, Nazarbayev has ruled Kazakhstan for a quarter-century, and is the only president independent Kazakhstan has ever known. While Kazakhstan has seen ethnic tensions flare – against Chechens, against Uzbeks – it’s largely avoided the wide-range pogroms Russia and other Central Asian states have seen. As the questioner notes, much of this reality rests, it would appear, with Nazarbayev.</span></p><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">However, the man can rule for only so much longer. And without a clear succession path – without a clear transition ahead – the potential remains for the latent strife to spill over.</span></p><aside class="td-box td-ad td-right" data-dcnode-id="1055"><header data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Advertisement</span></header><div class="td-ad-body" data-dcnode-id="1056"><div class="td-ad td-ad--gpt" data-dcnode-id="1057" id="div-gpt-ad-1343666802946-2"></div></div></aside><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">And this is what Putin highlighted in his response. Putin, it seems, carries some comity for Nazarbayev – both come from thoroughly Soviet stock, and Putin made sure to attribute the notion of the EEU to the Kazakhstani president. He also made sure to note that Kazakhstan was Russia’s “closest strategic ally and partner.” (This despite the fact that, earlier this summer, Putin had noted that Russia maintained no alliances.)</span></p><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">But it’s upon Nazarbayev’s departure that questions come. When a time of transition can turn to a time of turbulence. When a shuffle can slip into a vacuum, and within that vacuum, little green men can find their footing.</span></p><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Following his compliments toward Nazarbayev, a certain dog-whistle chauvinism ran through the rest of Putin’s response. He highlighted Kazakhstan’s large-sprawl emptiness, blatantly underestimating Kazakhstan’s population. He offered a slanted comment about how Kazakhstan must remain within the Russian world, which is part of the “global civilization” – noting, by turn, that Kazakhstan’s culture is apparently not.</span></p><p data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Most notably, though, Putin offered that, prior to Nazarbayev, “Kazakhs had never had statehood.” Not Kazakhstanis, the citizens of the country sharing Russia’s longest border, but Kazakhs. The titular ethnicity of the most prosperous nation in Central Asia, apparently unfamiliar with the intricacies and turnings of statehood. Requiring a Russian hand to guide – especially upon Nazarbayev’s departure.</span></p><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Unfortunately, this wasn’t a simple, ahistorical observation. On multiple occasions, ethnic Russians in northern Kazakhstan have reminded me of their belief that Central Asian states have never existed. Kazakhstan, one told me, is but a Bantustan, with proper civilization brought only by the arrival of Russians. Putin’s comments fall directly within this vein. Kazakhstan can be identified with the persona of Nazarbayev, but once he’s gone, why would there be any reason to continue with this experiment in statehood?</span></p><p data-dcnode-id="1040"><span data-dcnode-id="1044" instrument_node="">Nate Schenkkan, a Central Asian analyst, </span><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.twitlonger.com/show/n_1s705no"><span data-dcnode-id="1043" instrument_node="">offered the most thorough rundown</span></a><span data-dcnode-id="1041" instrument_node=""> of the speech to date. As he concluded, “In sum: this is an extraordinary event. I don’t know how the Kazakh government will respond to this, but assuredly there are people in Astana in very high places who are both scared and furious.” Many were already, following Russian events in Crimea, in eastern Ukraine. Putin’s comments were only one more ingredient increasing the trends already extant.</span></p><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">This, then, is the thanks Kazakhstan receives for remaining close to Russia over the past six months, and over the past two decades. Veiled threats about succession issues, and a reminder of the lack of Kazakhstan’s historic legitimacy – with dark hints about a nationalistic threat that doesn’t exist, but could very well turn self-fulfilling. Putin has unveiled the two-pronged mode of rhetoric Russia could begin accelerating in Kazakhstan in the near future: that nationalism presents a threat to ethnic Russians, and that the people on the territory of this supposed foreign land never actually had a state. Sound familiar?</span></p><p class="td-ad-inline td-ad-inline-txt" data-dcnode-id="1033" ng-show="dplpw.ad"><a data-dcnode-id="1034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thediplomat.com/subscriptions/"><b data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Enjoying this article?</span></b><span data-dcnode-id="1035" instrument_node=""> Click here to subscribe for full access. Just $5 a month.</span></a></p><p data-dcnode-id="1030"><i data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Casey Michel is a graduate student at&nbsp;Columbia’s Harriman Institute, focusing on post-Soviet political development.&nbsp;He can be followed on Twitter at @cjcmichel.</span></i></p></section><div class="ng-hide dpl-pw-msg" data-dcnode-id="972" data-pwmsg="" ng-show="dplpw.message.view"><span data-dcnode-id="1027" instrument_node="">
