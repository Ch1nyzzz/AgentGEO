</span><section class="page_heading" data-dcnode-id="1079"><span data-dcnode-id="1083" instrument_node="">
</span><h1 data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Putin’s Asymmetric Blind Spot</span></h1><span data-dcnode-id="1080" instrument_node="">
</span></section><span data-dcnode-id="1078" instrument_node="">
</span></div><span data-dcnode-id="1076" instrument_node="">
</span></div><span data-dcnode-id="1074" instrument_node="">
</span><div class="page-wrap_content" data-dcnode-id="460"><span data-dcnode-id="1073" instrument_node="">
</span><div class="center" data-dcnode-id="462"><span data-dcnode-id="1072" instrument_node="">
</span><div class="row" data-dcnode-id="638"><span data-dcnode-id="1071" instrument_node="">
</span><section class="span9" data-dcnode-id="916"><span data-dcnode-id="1070" instrument_node="">
</span><div class="post_detail column_detail" data-dcnode-id="917"><span data-dcnode-id="1069" instrument_node="">
</span><div class="column_info" data-dcnode-id="1051"><span data-dcnode-id="1068" instrument_node="">
</span><figure class="column_brand" data-dcnode-id="1064"><span data-dcnode-id="1067" instrument_node="">
</span><img alt="Opinion" class="coltitle" data-dcnode-id="1066" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecipherbrief.com/wp-content/uploads/2019/05/Column-Headers-v4_Opinion.png&amp;raw"><span data-dcnode-id="1065" instrument_node="">
</span></figure><span data-dcnode-id="1063" instrument_node="">
</span><div class="postmeta" data-dcnode-id="1053"><span data-dcnode-id="1062" instrument_node="">
December 24th, 2021 by </span><a data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecipherbrief.com/experts/gregory-sims"><span data-dcnode-id="1061" instrument_node="">Gregory Sims</span></a><span class="separator" data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">,</span></span><span data-dcnode-id="1057" instrument_node=""> | </span><a data-dcnode-id="1055" href="#cipher_comments"><span data-dcnode-id="1056" instrument_node="">0 Comments</span></a><span data-dcnode-id="1054" instrument_node="">
</span></div><span data-dcnode-id="1052" instrument_node="">
</span></div><span data-dcnode-id="1050" instrument_node="">
</span><div class="post_detail_content" data-dcnode-id="961"><span data-dcnode-id="1049" instrument_node="">
</span><div class="at-above-post addthis_tool" data-dcnode-id="1048" data-url="https://www.thecipherbrief.com/column_article/putins-asymmetric-blind-spot"></div><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1043"><strong data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">OPINION</span></strong><span data-dcnode-id="1044" instrument_node=""> — Perhaps it is just a reckless Khrushchevesque opening gambit, but Russia’s recent security demands suggest that Vladimir Putin’s condition for avoiding military action against Ukraine is Western acquiescence in converting Ukraine into a Russian vassal state. Given he also demands NATO roll back deployments of personnel and equipment to its 1997 positions, before Poland or the Baltic republics joined the alliance, it is not just Ukraine he wants to see neutered.&nbsp;</span></p><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1041" instrument_node="">Russian officials never hesitate to raise their country’s genuinely horrific suffering at the hands of the Nazis during World War II when justifying their need for a </span><em data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">cordon sanitaire </span></em><span data-dcnode-id="1038" instrument_node="">at their borders, but their historical self-righteousness is highly selective. What they fail to mention, but what Russia’s neighbors will never forget, is that in 1932-33, Soviet leader Joseph Stalin precipitated a politically driven famine, the “Holodomor,” which killed nearly 5 million Ukrainians. This was followed by the 1937-38 Anti-Kulak campaign (NKVD Order 00844), resulting in the execution of another 400,000 people. The concurrent anti-Polish campaign (NKVD Order 00485) resulted in the execution of 100,000 ethnic Poles, and the Anti-Latvian campaign (NKVD Order 49990) killed more than 16,000 Latvians. Over a 15-month period, these hundreds of thousands of non-Russians were executed for the alleged crime of being “anti-Soviet.” Most were dispatched by a gunshot to the back of the neck and buried in unmarked mass graves. Many thousands more were imprisoned or deported to Siberia or Central Asia.&nbsp;</span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">To this unimaginable slaughter, add the 1939 Nazi-Soviet partition of Poland and the execution of 22,000 captured Polish officers, the 1940 Soviet occupation and annexation of the Baltic states, and the 45 years of imposed communist rule in Central Europe after World War II and crushing of multiple uprisings against it. Can it be surprising that these post-Soviet states, once freed, would gravitate toward a defensive alliance for collective security?&nbsp; Perhaps their worries would have been alleviated had Russia cleanly broken with its Soviet past after 1991, but after halting steps under Boris Yeltsin, Putin turned back the clock on the expansion of civil liberties and candor about the Soviet past, which increasingly glorifies Stalin’s role.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Putin’s focus on NATO is disingenuous. Remember in 2013, Russia pressured then-President Viktor Yanukovych to terminate Ukraine’s steps toward an association agreement with the EU, seeking an economic not a military alliance. This prompted the “Maidan” uprising which ousted Yanukovych, quickly followed by Russia’s use of military force in the Donbas and outright annexation of Crimea. Only after the killing of Ukrainians and occupation of their territory by Russia did joining NATO become a serious Ukrainian national objective. Putin can blame himself for this.</span></p><span data-dcnode-id="1030" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1029"><span data-dcnode-id="1028" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1019"><strong data-dcnode-id="1020"><em data-dcnode-id="1021"><span data-dcnode-id="1027" instrument_node="">The Cipher Brief hosts private briefings with the world’s most experienced national and global security</span><a data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecipherbrief.com/experts"><span data-dcnode-id="1026" instrument_node="">&nbsp;experts</span></a><span data-dcnode-id="1024" instrument_node="">. &nbsp;</span><a data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecipherbrief.com/membership"><span data-dcnode-id="1023" instrument_node="">Become a member today.</span></a></em></strong></p><span data-dcnode-id="1018" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1017"><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Putin’s real fear, however, is not NATO. He knows its decisions are made by consensus, i.e., unanimously by all member states, thus the prospect of offensive military action by NATO against Russian aggression is negligible. His actual fear is that Ukraine will succeed in developing into a Europe-oriented democracy where state power is limited by a free press, independent judiciary, and the rule of law.&nbsp; Success in this endeavor by Ukraine, so close to Russia culturally and linguistically, would serve as an intolerable contrast to Putin’s authoritarian, state-centric vision for Russia’s future, and he must therefore prevent it.</span></p><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">The West understands it cannot afford another Munich moment by allowing fear of armed conflict to lead to passivity while an independent country seeking to join the European family is broken by an authoritarian hegemon intent on blocking its way. The Western democracies, and Central Europeans in particular, vividly remember the harsh lessons of the last century that Russia minimizes and will see Putin’s gambit for what it is. The U.S. and Europe will not negotiate behind Ukraine’s back to sell out its independence, and Putin will then likely move to achieve his objectives by military force.&nbsp;</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Western leaders have already ruled out direct military intervention if Russia invades. Ukrainians will do the fighting and dying. The West will respond asymmetrically, but most of the asymmetric options in their playbook are predictable and have been telegraphed over the years by politicians and pundits, so they have already been factored into Russia’s plans. The most obvious are economic sanctions, an area of chronic asymmetric weakness for Russia, whose economic output is about the same as the state of New York. The West has gone to the sanctions well many times over the years, choosing this over the so-called ‘nuclear-level’ responses that include blocking the Nordstream-2&nbsp;gas pipeline or&nbsp;evicting Russia from the SWIFT&nbsp;financial transactions system. These would indeed bite hard, but a Russian invasion of Ukraine would justify their use.</span></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="1006" instrument_node="">Other, harder government-led asymmetric options would include providing the Ukrainians with more capable military technology and a deeper sharing of intelligence information and collection capabilities. Yet these too are predictable, and the Russians likely assess they can overcome them. If this was purely a tabletop exercise, the Russian logic in theory, is unassailable.&nbsp; However, real-life conflicts unleash powerful human factors that inject far greater uncertainty. Russians fight like lions to defend their motherland but selling an invasion of Ukraine to Russian soldiers and the Russian public as “liberation” will be harder when they find themselves fighting Ukrainians and not NATO. Putin’s&nbsp;</span><em data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">casus belli</span></em><span data-dcnode-id="1003" instrument_node="">&nbsp;is weak. &nbsp;It may resonate with the Russian national security elite, but the&nbsp;</span><em data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">narod</span></em><span data-dcnode-id="1000" instrument_node="">&nbsp;are no fools and are tired of being lied to.</span><strong data-dcnode-id="998"><span data-dcnode-id="999" instrument_node=""> &nbsp;</span></strong><span data-dcnode-id="997" instrument_node="">They will see that in this case, it is the Ukrainians defending their land, homes, and independence who are the lions.</span></p><span data-dcnode-id="995" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="994"><span data-dcnode-id="993" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="983"><strong data-dcnode-id="984"><em data-dcnode-id="985"><span data-dcnode-id="992" instrument_node="">Go beyond the headlines with expert perspectives on today’s news with The Cipher Brief’s&nbsp;</span><a data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecipherbrief.com/podcasts/from-the-cipher-brief-daily"><span data-dcnode-id="991" instrument_node="">Daily Open-Source Podcast</span></a><span data-dcnode-id="989" instrument_node="">.&nbsp;&nbsp;</span><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecipherbrief.com/podcasts/from-the-cipher-brief-daily"><span data-dcnode-id="988" instrument_node="">Listen here</span></a><span data-dcnode-id="986" instrument_node="">&nbsp;or wherever you listen to podcasts.</span></em></strong></p><span data-dcnode-id="982" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="981"><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">The most powerful asymmetric response to a Russian military invasion of Ukraine, however, will not be launched by any government, it will be the visceral reaction of civil society to injustice given voice through a vibrant free press and media-savvy population. The Russian regime’s attempts to control Russians’ access to information exposes Putin’s greatest fear, the fear of all authoritarians, his own people. &nbsp;He is right to worry; his war talk is wearing thin&nbsp;at home. The greatest threat to his plans, especially if they involve war, is that he will not be able to prevent people talking over his head to communicate directly with the Russian population, and he will pull out all the stops to prevent that.&nbsp;</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="976" instrument_node="">Western governments will in turn, do their best to penetrate Russia’s information blockade in the event of a conflict, but the most successful efforts will undoubtedly arise spontaneously from the crowd-sourced ingenuity of independent actors impassioned by displays of brutality who will find inventive ways to link up with like-minded Russians to discover the truth.&nbsp;These will not be governments, but the same sorts of people and organizations who investigated the MH-17 shootdown, the poisonings of Sergei Skripal and Alexei Navalny, and the Panama Papers. Putin will have difficulty defending against this dynamic because he is inherently unable to understand it.&nbsp;To him, civil society is something that is guided by the state, not the other way around.&nbsp;Ukraine’s 2004 “Orange Revolution” and 2014 “Maidan” uprising were in his mind not spontaneous popular events provoked by egregious political blunders, but “operations” or “projects” carried out by foreign special services that were deliberately designed to undermine Russia.&nbsp;He believes this because that is what&nbsp;</span><em data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">he</span></em><span data-dcnode-id="973" instrument_node="">&nbsp;does.&nbsp;In that sense, this would be the purest form of asymmetrical response, one that Vladimir Putin is incapable of seeing.</span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="965"><em data-dcnode-id="966"><strong data-dcnode-id="967"><span data-dcnode-id="970" instrument_node="">Read more expert-driven national security perspective, analysis and opinion in&nbsp;</span><a data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecipherbrief.com/"><span data-dcnode-id="969" instrument_node="">The Cipher Brief</span></a></strong></em></p><span data-dcnode-id="964" instrument_node="">
</span><div class="at-below-post addthis_tool" data-dcnode-id="963" data-url="https://www.thecipherbrief.com/column_article/putins-asymmetric-blind-spot"></div><span data-dcnode-id="962" instrument_node=""> </span></div><span data-dcnode-id="960" instrument_node="">
