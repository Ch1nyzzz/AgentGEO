</span><p cwidth="984" data-dcnode-id="1730" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:1159px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[1];pagepos:198;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:170px;wocalc:98px;hcalc:1159;rend_px_area:112176;rcnt:1;ez_min_text_wdth:103;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1731" instrument_node="">Thomas Paine was born in Thetford, England, on January 29, 1737. He was
raised by a Quaker father and an Anglican mother. He apprenticed as a corset
maker, a profession that he drifted in and out of for many years. In 1764, he
studied for and was admitted as an excise officer, though he was dismissed on
corruption charges. Later, in 1768, he was made an excise officer again, but
in 1774 was dismissed because he had written a pamphlet, something that would
eventually become his true calling. The pamphlet had criticized the salaries
of the excise officers and called on Parliament for raises.</span></p><p cwidth="984" data-dcnode-id="1725" eza="cwidth:984px;;cheight:95px;;wcalc_source:child;wcalc:119px;wocalc:119px;hcalc:855px;rend_px_area:93480;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[2];pagepos:199;cwidth:984px;cheight:95px;wcalc_source:child;wcalc:119px;wocalc:119px;hcalc:855;rend_px_area:93480;rcnt:1;ez_min_text_wdth:122;req_px_area:98154;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1729" instrument_node="">While in Great Britain, Paine met Benjamin Franklin and the two developed a
fast friendship. With a letter of introduction from Franklin, Paine left for
the colonies in 1774. After only a few years in the colonies, Paine decided
that efforts at independence, then fledgling, were the only real solution for
the colonies. He wrote </span><u cwidth="0" data-dcnode-id="1727" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:73px;wocalc:73px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[2]/u;pagepos:201;cwidth:73;cheight:0px;wcalc_source:child;wcalc:73px;wocalc:73px;hcalc:38;rend_px_area:0;rcnt:3;ez_min_text_wdth:56;req_px_area:3796;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1728" instrument_node="">Common Sense</span></u><span data-dcnode-id="1726" instrument_node=""> to illustrate the need for
independence. Its 55 pages were first published anonymously on January 9, 1776.
The pamphlet was an instant hit, and by February 14, 1776, it was in its third
printing.</span></p><p cwidth="984" data-dcnode-id="1723" eza="cwidth:984px;;cheight:57px;;wcalc_source:child;wcalc:92px;wocalc:92px;hcalc:703px;rend_px_area:56088;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[3];pagepos:203;cwidth:984px;cheight:57px;wcalc_source:child;wcalc:170px;wocalc:92px;hcalc:703;rend_px_area:56088;rcnt:1;ez_min_text_wdth:103;req_px_area:58892.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1724" instrument_node="">The third printing included more detail than the first two printings,
including an accounting of the value of the British Navy and a description of
how American resources could build a navy equal to or better than that of the
homeland; it also included a letter to the Quakers, in response to criticism
by members of that sect.</span></p><p cwidth="984" data-dcnode-id="1716" eza="cwidth:984px;;cheight:57px;;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:532px;rend_px_area:56088;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[4];pagepos:204;cwidth:984px;cheight:57px;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:532;rend_px_area:56088;rcnt:1;ez_min_text_wdth:122;req_px_area:58892.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><u cwidth="0" data-dcnode-id="1721" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:73px;wocalc:73px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[4]/u;pagepos:205;cwidth:73;cheight:0px;wcalc_source:child;wcalc:73px;wocalc:73px;hcalc:38;rend_px_area:0;rcnt:4;ez_min_text_wdth:56;req_px_area:3796;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1722" instrument_node="">Common Sense</span></u><span data-dcnode-id="1720" instrument_node=""> was one of the most widely read pamphlets of its time,
and played a unique role in the drive for independence by exciting the public
and by presenting them with a cogent and accessible critique of the monarchy.
Within seven months, Jefferson had penned, and the Continental Congress had
signed, the </span><a cwidth="0" data-dcnode-id="1718" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:115px;wocalc:115px;hcalc:57px;rend_px_area:0;" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usconstitution.net/declar.html" style="background-color:transparent;background-size:auto;color:rgb(0, 0, 238);nodepath:/html/body/div[5]/p[4]/a;pagepos:207;cwidth:115;cheight:0px;wcalc_source:child;wcalc:115px;wocalc:115px;hcalc:57;rend_px_area:0;rcnt:4;ez_min_text_wdth:112;req_px_area:7176;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1719" instrument_node="">Declaration of Independence</span></a><span data-dcnode-id="1717" instrument_node="">.</span></p><p cwidth="984" data-dcnode-id="1711" eza="cwidth:984px;;cheight:171px;;wcalc_source:child;wcalc:113px;wocalc:113px;hcalc:1767px;rend_px_area:168264;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[5];pagepos:209;cwidth:984px;cheight:171px;wcalc_source:child;wcalc:113px;wocalc:113px;hcalc:1767;rend_px_area:168264;rcnt:1;ez_min_text_wdth:122;req_px_area:176677.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1715" instrument_node="">In </span><u cwidth="0" data-dcnode-id="1713" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:73px;wocalc:73px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[5]/u;pagepos:211;cwidth:73;cheight:0px;wcalc_source:child;wcalc:73px;wocalc:73px;hcalc:38;rend_px_area:0;rcnt:3;ez_min_text_wdth:56;req_px_area:3796;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1714" instrument_node="">Common Sense</span></u><span data-dcnode-id="1712" instrument_node="">, Paine outlines his thoughts on a new constitution
for America. Paine wanted the state assemblies to handle all domestic business
and to be subject to veto by a national Congress. Each colony would send at
least 30 members to Congress, and they would choose a president. In his plan,
every colony would have a chance to hold the presidency, one colony's turn not
coming around again until all others had had a chance. Laws would have to pass
in Congress by a three-fifths vote. He also wanted to see a conference held,
with two members from the congressional delegation of each state; two from the
state assembly; and five chosen by the people at large. The business of the
conference would be to create a Charter of the United Colonies. The charter
would define how members of Congress and the assemblies would be chosen,
separating the powers of the national and colonial levels, and protecting the
rights of religion, freedom, and property to all men. As for a king, in Paine's
America, only the law would be king.</span></p><p cwidth="984" data-dcnode-id="1700" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:116px;wocalc:116px;hcalc:779px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[6];pagepos:213;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:116px;wocalc:116px;hcalc:779;rend_px_area:74784;rcnt:1;ez_min_text_wdth:131;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1710" instrument_node="">The source for this text is the </span><a cwidth="0" data-dcnode-id="1708" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:93px;wocalc:93px;hcalc:95px;rend_px_area:0;" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thomaspaine.org/Archives/commonsense.html" style="background-color:transparent;background-size:auto;color:rgb(0, 0, 238);nodepath:/html/body/div[5]/p[6]/a[1];pagepos:215;cwidth:93;cheight:0px;wcalc_source:child;wcalc:93px;wocalc:93px;hcalc:95;rend_px_area:0;rcnt:7;ez_min_text_wdth:93;req_px_area:11606.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1709" instrument_node="">Thomas Paine

thought of, had not the sufferers been aggravated into the inquiry,) and as the
king of England hath undertaken in his </span><i cwidth="0" data-dcnode-id="1642" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:40px;wocalc:40px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[10]/i[1];pagepos:253;cwidth:40;cheight:0px;wcalc_source:child;wcalc:40px;wocalc:40px;hcalc:38;rend_px_area:0;rcnt:5;ez_min_text_wdth:40;req_px_area:2496;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1643" instrument_node="">own right</span></i><span data-dcnode-id="1641" instrument_node="">, to support the

usurpations of either.</span></p><p cwidth="984" data-dcnode-id="1635" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:108px;wocalc:108px;hcalc:684px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[11];pagepos:257;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:170px;wocalc:108px;hcalc:684;rend_px_area:74784;rcnt:1;ez_min_text_wdth:103;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1636" instrument_node="">In the following sheets, the author hath studiously avoided every thing
which is personal among ourselves. Compliments as well as censure to
individuals make no part thereof. The wise and the worthy need not the triumph
of a pamphlet; and those whose sentiments are injudicious or unfriendly, will
cease of themselves, unless too much pains is bestowed upon their
conversion.</span></p><p cwidth="984" data-dcnode-id="1633" eza="cwidth:984px;;cheight:95px;;wcalc_source:child;wcalc:118px;wocalc:118px;hcalc:893px;rend_px_area:93480;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[12];pagepos:258;cwidth:984px;cheight:95px;wcalc_source:child;wcalc:170px;wocalc:118px;hcalc:893;rend_px_area:93480;rcnt:1;ez_min_text_wdth:122;req_px_area:98154;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1634" instrument_node="">The cause of America is, in a great measure, the cause of all mankind. Many
circumstances have, and will arise, which are not local, but universal, and
through which the principles of all lovers of mankind are affected, and in the
event of which, their affections are interested. The laying a country desolate
with fire and sword, declaring war against the natural rights of all mankind,
and extirpating the defenders thereof from the face of the earth, is the
concern of every man to whom nature hath given the power of feeling; of which
class, regardless of party censure, is</span></p><p cwidth="984" data-dcnode-id="1631" eza="cwidth:984px;;cheight:19px;;wcalc_source:child;wcalc:56px;wocalc:56px;hcalc:38px;rend_px_area:18696;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[13];pagepos:259;cwidth:984px;cheight:19px;wcalc_source:child;wcalc:56px;wocalc:56px;hcalc:38;rend_px_area:18696;rcnt:1;ez_min_text_wdth:56;req_px_area:2329.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1632" instrument_node="">The Author</span></p><p cwidth="984" data-dcnode-id="1629" eza="cwidth:984px;;cheight:57px;;wcalc_source:child;wcalc:121px;wocalc:121px;hcalc:494px;rend_px_area:56088;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[14];pagepos:260;cwidth:984px;cheight:57px;wcalc_source:child;wcalc:170px;wocalc:121px;hcalc:494;rend_px_area:56088;rcnt:1;ez_min_text_wdth:122;req_px_area:58892.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1630" instrument_node="">P.S. The Publication of this new Edition hath been delayed, with a View of
taking notice (had it been necessary) of any Attempt to refute the Doctrine of
Independence: As no Answer hath yet appeared, it is now presumed that none
will, the Time needful for getting such a Performance ready for the Public
being considerably past.</span></p><p cwidth="984" data-dcnode-id="1621" eza="cwidth:984px;;cheight:57px;;wcalc_source:child;wcalc:105px;wocalc:105px;hcalc:589px;rend_px_area:56088;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[15];pagepos:261;cwidth:984px;cheight:57px;wcalc_source:child;wcalc:105px;wocalc:105px;hcalc:589;rend_px_area:56088;rcnt:1;ez_min_text_wdth:103;req_px_area:58892.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1628" instrument_node="">Who the Author of this Production is, is wholly unnecessary to the Public,
as the Object for Attention is the </span><i cwidth="0" data-dcnode-id="1626" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:71px;wocalc:71px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[15]/i[1];pagepos:263;cwidth:71;cheight:0px;wcalc_source:child;wcalc:71px;wocalc:71px;hcalc:38;rend_px_area:0;rcnt:5;ez_min_text_wdth:71;req_px_area:4430.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1627" instrument_node="">Doctrine itself</span></i><span data-dcnode-id="1625" instrument_node="">, not the </span><i cwidth="0" data-dcnode-id="1623" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:37px;wocalc:37px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[15]/i[2];pagepos:265;cwidth:37;cheight:0px;wcalc_source:child;wcalc:37px;wocalc:37px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:28;req_px_area:1048.32;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1624" instrument_node="">Man</span></i><span data-dcnode-id="1622" instrument_node="">.
Yet it may not be unnecessary to say, That he is unconnected with any Party,
and under no sort of Influence public or private, but the influence of reason
and principle.</span></p><p cwidth="984" data-dcnode-id="1619" eza="cwidth:984px;;cheight:19px;;wcalc_source:child;wcalc:106px;wocalc:106px;hcalc:57px;rend_px_area:18696;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[16];pagepos:267;cwidth:984px;cheight:19px;wcalc_source:child;wcalc:106px;wocalc:106px;hcalc:57;rend_px_area:18696;rcnt:1;ez_min_text_wdth:122;req_px_area:8819.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1620" instrument_node="">Philadelphia, February 14, 1776.</span></p><hr cwidth="982" data-dcnode-id="1618" eza="cwidth:982px;;cheight:0px;;wcalc_source:child;wcalc:1px;wocalc:3px;hcalc:2px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/hr[4];pagepos:268;cwidth:982px;cheight:0px;wcalc_source:child;wcalc:1px;wocalc:3px;hcalc:2;rend_px_area:0;rcnt:1;ez_min_text_wdth:0;req_px_area:0;obj_px_area:0;req_px_height:0;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1617" instrument_node="">
</span><p cwidth="984" data-dcnode-id="1613" eza="cwidth:984px;;cheight:20px;;wcalc_source:child;wcalc:110px;wocalc:110px;hcalc:200px;rend_px_area:19680;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[17];pagepos:269;cwidth:984px;cheight:20px;wcalc_source:child;wcalc:146px;wocalc:110px;hcalc:200;rend_px_area:19680;rcnt:1;ez_min_text_wdth:112;req_px_area:20664;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><b cwidth="0" data-dcnode-id="1614" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:146px;wocalc:146px;hcalc:160px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[17]/b;pagepos:270;cwidth:146;cheight:0px;wcalc_source:child;wcalc:146px;wocalc:146px;hcalc:160;rend_px_area:0;rcnt:1;ez_min_text_wdth:124;req_px_area:27456;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><a cwidth="0" data-dcnode-id="1615" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:110px;wocalc:110px;hcalc:200px;rend_px_area:0;" name="part1" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[17]/b/a;pagepos:271;cwidth:110;cheight:0px;wcalc_source:child;wcalc:110px;wocalc:110px;hcalc:200;rend_px_area:0;rcnt:1;ez_min_text_wdth:110;req_px_area:27456;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1616" instrument_node="">Of the origin and design of government in general —
With concise remarks on the English constitution</span></a></b></p><p cwidth="984" data-dcnode-id="1606" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:103px;wocalc:103px;hcalc:893px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[18];pagepos:272;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:103px;wocalc:103px;hcalc:893;rend_px_area:74784;rcnt:1;ez_min_text_wdth:122;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><i cwidth="0" data-dcnode-id="1611" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:46px;wocalc:46px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[18]/i[1];pagepos:273;cwidth:46;cheight:0px;wcalc_source:child;wcalc:46px;wocalc:46px;hcalc:19;rend_px_area:0;rcnt:4;ez_min_text_wdth:38;req_px_area:1397.76;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1612" instrument_node="">Some</span></i><span data-dcnode-id="1610" instrument_node=""> writers have so confounded society with government, as to leave
little or no distinction between them; whereas they are not only different, but
have different origins. Society is produced by our wants, and government by our
wickedness; the former promotes our happiness positively by uniting our
affections, the latter </span><i cwidth="0" data-dcnode-id="1608" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:84px;wocalc:84px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[18]/i[2];pagepos:275;cwidth:84;cheight:0px;wcalc_source:child;wcalc:84px;wocalc:84px;hcalc:19;rend_px_area:0;rcnt:4;ez_min_text_wdth:84;req_px_area:3494.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1609" instrument_node="">negatively</span></i><span data-dcnode-id="1607" instrument_node=""> by restraining our vices. The one
encourages intercourse, the other creates distinctions. The first is a patron,
the last a punisher.</span></p><p cwidth="984" data-dcnode-id="1592" eza="cwidth:984px;;cheight:190px;;wcalc_source:child;wcalc:114px;wocalc:114px;hcalc:1805px;rend_px_area:186960;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[19];pagepos:277;cwidth:984px;cheight:190px;wcalc_source:child;wcalc:114px;wocalc:114px;hcalc:1805;rend_px_area:186960;rcnt:1;ez_min_text_wdth:112;req_px_area:196308;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1605" instrument_node="">Society in every state is a blessing, but government even in its best state
is but a necessary evil in its worst state an intolerable one; for when we
suffer, or are exposed to the same miseries </span><i cwidth="0" data-dcnode-id="1603" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[19]/i[1];pagepos:279;cwidth:98;cheight:0px;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:38;rend_px_area:0;rcnt:9;ez_min_text_wdth:94;req_px_area:5096;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1604" instrument_node="">by a government</span></i><span data-dcnode-id="1602" instrument_node="">, which we
might expect in a country </span><i cwidth="0" data-dcnode-id="1600" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[19]/i[2];pagepos:281;cwidth:98;cheight:0px;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:38;rend_px_area:0;rcnt:9;ez_min_text_wdth:94;req_px_area:6115.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1601" instrument_node="">without government</span></i><span data-dcnode-id="1599" instrument_node="">, our calamities is
heightened by reflecting that we furnish the means by which we suffer!
Government, like dress, is the badge of lost innocence; the palaces of kings
are built on the ruins of the bowers of paradise. For were the impulses of
conscience clear, uniform, and irresistibly obeyed, man would need no other
lawgiver; but that not being the case, he finds it necessary to surrender up a
part of his property to furnish means for the protection of the rest; and this
he is induced to do by the same prudence which in every other case advises him
out of two evils to choose the least. </span><i cwidth="0" data-dcnode-id="1597" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:86px;wocalc:86px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[19]/i[3];pagepos:283;cwidth:86;cheight:0px;wcalc_source:child;wcalc:86px;wocalc:86px;hcalc:19;rend_px_area:0;rcnt:9;ez_min_text_wdth:84;req_px_area:3577.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1598" instrument_node="">Wherefore</span></i><span data-dcnode-id="1596" instrument_node="">, security being the true
design and end of government, it unanswerably follows that whatever </span><i cwidth="0" data-dcnode-id="1594" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:39px;wocalc:39px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[19]/i[4];pagepos:285;cwidth:39;cheight:0px;wcalc_source:child;wcalc:39px;wocalc:39px;hcalc:19;rend_px_area:0;rcnt:9;ez_min_text_wdth:38;req_px_area:1622.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1595" instrument_node="">form</span></i><span data-dcnode-id="1593" instrument_node="">
thereof appears most likely to ensure it to us, with the least expense and
greatest benefit, is preferable to all others.</span></p><p cwidth="984" data-dcnode-id="1587" eza="cwidth:984px;;cheight:190px;;wcalc_source:child;wcalc:117px;wocalc:117px;hcalc:1900px;rend_px_area:186960;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[20];pagepos:287;cwidth:984px;cheight:190px;wcalc_source:child;wcalc:117px;wocalc:117px;hcalc:1900;rend_px_area:186960;rcnt:1;ez_min_text_wdth:122;req_px_area:196308;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1591" instrument_node="">In order to gain a clear and just idea of the design and end of government,
let us suppose a small number of persons settled in some sequestered part of
the earth, unconnected with the rest, they will then represent the first
peopling of any country, or of the world. In this state of natural liberty,
society will be their first thought. A thousand motives will excite them
thereto, the strength of one man is so unequal to his wants, and his mind so
unfitted for perpetual solitude, that he is soon obliged to seek assistance and
relief of another, who in his turn requires the same. Four or five united would
be able to raise a tolerable dwelling in the midst of a wilderness, but
</span><i cwidth="0" data-dcnode-id="1589" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:30px;wocalc:30px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[20]/i;pagepos:289;cwidth:30;cheight:0px;wcalc_source:child;wcalc:30px;wocalc:30px;hcalc:19;rend_px_area:0;rcnt:3;ez_min_text_wdth:28;req_px_area:1248;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1590" instrument_node="">one</span></i><span data-dcnode-id="1588" instrument_node=""> man might labor out the common period of life without accomplishing
any thing; when he had felled his timber he could not remove it, nor erect it
after it was removed; hunger in the mean time would urge him from his work, and
every different want call him a different way. Disease, nay even misfortune
would be death, for though neither might be mortal, yet either would disable
him from living, and reduce him to a state in which he might rather be said to
perish than to die.</span></p><p cwidth="984" data-dcnode-id="1585" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:103px;wocalc:103px;hcalc:1311px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[21];pagepos:291;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:200px;wocalc:103px;hcalc:1311;rend_px_area:112176;rcnt:1;ez_min_text_wdth:112;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1586" instrument_node="">Thus necessity, like a gravitating power, would soon form our newly arrived
emigrants into society, the reciprocal blessings of which, would supersede, and
render the obligations of law and government unnecessary while they remained
perfectly just to each other; but as nothing but heaven is impregnable to vice,
it will unavoidably happen, that in proportion as they surmount the first
difficulties of emigration, which bound them together in a common cause, they
will begin to relax in their duty and attachment to each other; and this
remissness, will point out the necessity, of establishing some form of
government to supply the defect of moral virtue.</span></p><p cwidth="984" data-dcnode-id="1580" eza="cwidth:984px;;cheight:58px;;wcalc_source:child;wcalc:113px;wocalc:113px;hcalc:628px;rend_px_area:57072;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[22];pagepos:292;cwidth:984px;cheight:58px;wcalc_source:child;wcalc:113px;wocalc:113px;hcalc:628;rend_px_area:57072;rcnt:1;ez_min_text_wdth:103;req_px_area:59925.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1584" instrument_node="">Some convenient tree will afford them a State-House, under the branches of
which, the whole colony may assemble to deliberate on public matters. It is
more than probable that their first laws will have the title only of
</span><b cwidth="0" data-dcnode-id="1582" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:108px;wocalc:108px;hcalc:20px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[22]/b;pagepos:294;cwidth:108;cheight:0px;wcalc_source:child;wcalc:108px;wocalc:108px;hcalc:20;rend_px_area:0;rcnt:3;ez_min_text_wdth:108;req_px_area:4492.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1583" instrument_node="">Regulations</span></b><span data-dcnode-id="1581" instrument_node="">, and be enforced by no other penalty than public disesteem.
In this first parliament every man, by natural right will have a seat.</span></p><p cwidth="984" data-dcnode-id="1563" eza="cwidth:984px;;cheight:266px;;wcalc_source:child;wcalc:132px;wocalc:132px;hcalc:2204px;rend_px_area:261744;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[23];pagepos:296;cwidth:984px;cheight:266px;wcalc_source:child;wcalc:132px;wocalc:132px;hcalc:2204;rend_px_area:261744;rcnt:1;ez_min_text_wdth:150;req_px_area:274831.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1579" instrument_node="">But as the colony increases, the public concerns will increase likewise, and
the distance at which the members may be separated, will render it too
inconvenient for all of them to meet on every occasion as at first, when their
number was small, their habitations near, and the public concerns few and
trifling. This will point out the convenience of their consenting to leave the
legislative part to be managed by a select number chosen from the whole body,
who are supposed to have the same concerns at stake which those have who
appointed them, and who will act in the same manner as the whole body would act
were they present. If the colony continue increasing, it will become necessary
to augment the number of the representatives, and that the interest of every
part of the colony may be attended to, it will be found best to divide the
whole into convenient parts, each part sending its proper number; and that the
</span><i cwidth="0" data-dcnode-id="1577" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:60px;wocalc:60px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[23]/i[1];pagepos:298;cwidth:60;cheight:0px;wcalc_source:child;wcalc:60px;wocalc:60px;hcalc:19;rend_px_area:0;rcnt:11;ez_min_text_wdth:60;req_px_area:2496;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1578" instrument_node="">elected</span></i><span data-dcnode-id="1576" instrument_node=""> might never form to themselves an interest separate from the
</span><i cwidth="0" data-dcnode-id="1574" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:65px;wocalc:65px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[23]/i[2];pagepos:300;cwidth:65;cheight:0px;wcalc_source:child;wcalc:65px;wocalc:65px;hcalc:19;rend_px_area:0;rcnt:11;ez_min_text_wdth:65;req_px_area:2704;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1575" instrument_node="">electors</span></i><span data-dcnode-id="1573" instrument_node="">, prudence will point out the propriety of having elections
often; because as the </span><i cwidth="0" data-dcnode-id="1571" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:60px;wocalc:60px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[23]/i[3];pagepos:302;cwidth:60;cheight:0px;wcalc_source:child;wcalc:60px;wocalc:60px;hcalc:19;rend_px_area:0;rcnt:11;ez_min_text_wdth:60;req_px_area:2496;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1572" instrument_node="">elected</span></i><span data-dcnode-id="1570" instrument_node=""> might by that means return and mix again
with the general body of the </span><i cwidth="0" data-dcnode-id="1568" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:65px;wocalc:65px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[23]/i[4];pagepos:304;cwidth:65;cheight:0px;wcalc_source:child;wcalc:65px;wocalc:65px;hcalc:19;rend_px_area:0;rcnt:11;ez_min_text_wdth:65;req_px_area:2704;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1569" instrument_node="">electors</span></i><span data-dcnode-id="1567" instrument_node=""> in a few months, their fidelity to
the public will be secured by the prudent reflection of not making a rod for
themselves. And as this frequent interchange will establish a common interest
with every part of the community, they will mutually and naturally support each
other, and on this (not on the unmeaning name of king) depends the </span><i cwidth="0" data-dcnode-id="1565" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:103px;wocalc:103px;hcalc:114px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[23]/i[5];pagepos:306;cwidth:103;cheight:0px;wcalc_source:child;wcalc:103px;wocalc:103px;hcalc:114;rend_px_area:0;rcnt:11;ez_min_text_wdth:103;req_px_area:14996.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1566" instrument_node="">strength
of government, and the happiness of the governed</span></i><span data-dcnode-id="1564" instrument_node="">.</span></p><p cwidth="984" data-dcnode-id="1561" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:124px;wocalc:124px;hcalc:665px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[24];pagepos:308;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:170px;wocalc:124px;hcalc:665;rend_px_area:74784;rcnt:1;ez_min_text_wdth:131;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1562" instrument_node="">Here then is the origin and rise of government; namely, a mode rendered
necessary by the inability of moral virtue to govern the world; here too is the
design and end of government, viz., freedom and security. And however our eyes
may be dazzled with snow, or our ears deceived by sound; however prejudice may
warp our wills, or interest darken our understanding, the simple voice of
nature and of reason will say, it is right.</span></p><p cwidth="984" data-dcnode-id="1559" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:118px;wocalc:118px;hcalc:988px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[25];pagepos:309;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:200px;wocalc:118px;hcalc:988;rend_px_area:112176;rcnt:1;ez_min_text_wdth:122;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1560" instrument_node="">I draw my idea of the form of government from a principle in nature, which
no art can overturn, viz., that the more simple any thing is, the less liable
it is to be disordered, and the easier repaired when disordered; and with this
maxim in view, I offer a few remarks on the so much boasted constitution of
England. That it was noble for the dark and slavish times in which it was
erected is granted. When the world was overrun with tyranny the least therefrom
was a glorious rescue. But that it is imperfect, subject to convulsions, and
incapable of producing what it seems to promise, is easily demonstrated.</span></p><p cwidth="984" data-dcnode-id="1557" eza="cwidth:984px;;cheight:95px;;wcalc_source:child;wcalc:106px;wocalc:106px;hcalc:1007px;rend_px_area:93480;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[26];pagepos:310;cwidth:984px;cheight:95px;wcalc_source:child;wcalc:170px;wocalc:106px;hcalc:1007;rend_px_area:93480;rcnt:1;ez_min_text_wdth:112;req_px_area:98154;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1558" instrument_node="">Absolute governments (though the disgrace of human nature) have this
advantage with them, that they are simple; if the people suffer, they know the
head from which their suffering springs, know likewise the remedy, and are not
bewildered by a variety of causes and cures. But the constitution of England is
so exceedingly complex, that the nation may suffer for years together without
being able to discover in which part the fault lies, some will say in one and
some in another, and every political physician will advise a different
medicine.</span></p><p cwidth="984" data-dcnode-id="1555" eza="cwidth:984px;;cheight:57px;;wcalc_source:child;wcalc:105px;wocalc:105px;hcalc:475px;rend_px_area:56088;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[27];pagepos:311;cwidth:984px;cheight:57px;wcalc_source:child;wcalc:170px;wocalc:105px;hcalc:475;rend_px_area:56088;rcnt:1;ez_min_text_wdth:122;req_px_area:58892.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1556" instrument_node="">I know it is difficult to get over local or long standing prejudices, yet if
we will suffer ourselves to examine the component parts of the English
constitution, we shall find them to be the base remains of two ancient
tyrannies, compounded with some new republican materials.</span></p><p cwidth="984" data-dcnode-id="1553" eza="cwidth:984px;;cheight:19px;;wcalc_source:child;wcalc:101px;wocalc:101px;hcalc:114px;rend_px_area:18696;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[28];pagepos:312;cwidth:984px;cheight:19px;wcalc_source:child;wcalc:110px;wocalc:101px;hcalc:114;rend_px_area:18696;rcnt:1;ez_min_text_wdth:103;req_px_area:19448;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1554" instrument_node="">First — The remains of monarchical tyranny in the person of the
king.</span></p><p cwidth="984" data-dcnode-id="1551" eza="cwidth:984px;;cheight:19px;;wcalc_source:child;wcalc:108px;wocalc:108px;hcalc:133px;rend_px_area:18696;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[29];pagepos:313;cwidth:984px;cheight:19px;wcalc_source:child;wcalc:110px;wocalc:108px;hcalc:133;rend_px_area:18696;rcnt:1;ez_min_text_wdth:131;req_px_area:19630.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1552" instrument_node="">Secondly — The remains of aristocratical tyranny in the persons of the
peers.</span></p><p cwidth="984" data-dcnode-id="1549" eza="cwidth:984px;;cheight:38px;;wcalc_source:child;wcalc:87px;wocalc:87px;hcalc:285px;rend_px_area:37392;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[30];pagepos:314;cwidth:984px;cheight:38px;wcalc_source:child;wcalc:110px;wocalc:87px;hcalc:285;rend_px_area:37392;rcnt:1;ez_min_text_wdth:94;req_px_area:30888;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1550" instrument_node="">Thirdly — The new republican materials, in the persons of the commons,
on whose virtue depends the freedom of England.</span></p><p cwidth="984" data-dcnode-id="1544" eza="cwidth:984px;;cheight:38px;;wcalc_source:child;wcalc:112px;wocalc:112px;hcalc:285px;rend_px_area:37392;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[31];pagepos:315;cwidth:984px;cheight:38px;wcalc_source:child;wcalc:112px;wocalc:112px;hcalc:285;rend_px_area:37392;rcnt:1;ez_min_text_wdth:131;req_px_area:39261.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1548" instrument_node="">The two first, by being hereditary, are independent of the people; wherefore
in a </span><i cwidth="0" data-dcnode-id="1546" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:112px;wocalc:112px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[31]/i;pagepos:317;cwidth:112;cheight:0px;wcalc_source:child;wcalc:112px;wocalc:112px;hcalc:19;rend_px_area:0;rcnt:3;ez_min_text_wdth:112;req_px_area:4659.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1547" instrument_node="">constitutional</span></i><span data-dcnode-id="1545" instrument_node=""> sense they contribute nothing towards the freedom of
the state.</span></p><p cwidth="984" data-dcnode-id="1536" eza="cwidth:984px;;cheight:38px;;wcalc_source:child;wcalc:122px;wocalc:122px;hcalc:266px;rend_px_area:37392;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[32];pagepos:319;cwidth:984px;cheight:38px;wcalc_source:child;wcalc:122px;wocalc:122px;hcalc:266;rend_px_area:37392;rcnt:1;ez_min_text_wdth:140;req_px_area:39261.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1543" instrument_node="">To say that the constitution of England is a </span><i cwidth="0" data-dcnode-id="1541" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:46px;wocalc:46px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[32]/i[1];pagepos:321;cwidth:46;cheight:0px;wcalc_source:child;wcalc:46px;wocalc:46px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:46;req_px_area:1913.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1542" instrument_node="">union</span></i><span data-dcnode-id="1540" instrument_node=""> of three powers
reciprocally </span><i cwidth="0" data-dcnode-id="1538" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:73px;wocalc:73px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[32]/i[2];pagepos:323;cwidth:73;cheight:0px;wcalc_source:child;wcalc:73px;wocalc:73px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:73;req_px_area:3036.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1539" instrument_node="">checking</span></i><span data-dcnode-id="1537" instrument_node=""> each other, is farcical, either the words have no
meaning, or they are flat contradictions.</span></p><p cwidth="984" data-dcnode-id="1534" eza="cwidth:984px;;cheight:19px;;wcalc_source:child;wcalc:102px;wocalc:102px;hcalc:152px;rend_px_area:18696;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[33];pagepos:325;cwidth:984px;cheight:19px;wcalc_source:child;wcalc:110px;wocalc:102px;hcalc:152;rend_px_area:18696;rcnt:1;ez_min_text_wdth:103;req_px_area:18304;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1535" instrument_node="">To say that the commons is a check upon the king, presupposes two
things.</span></p><p cwidth="984" data-dcnode-id="1532" eza="cwidth:984px;;cheight:38px;;wcalc_source:child;wcalc:84px;wocalc:84px;hcalc:361px;rend_px_area:37392;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[34];pagepos:326;cwidth:984px;cheight:38px;wcalc_source:child;wcalc:110px;wocalc:84px;hcalc:361;rend_px_area:37392;rcnt:1;ez_min_text_wdth:84;req_px_area:39261.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1533" instrument_node="">First — That the king is not to be trusted without being looked after,
or in other words, that a thirst for absolute power is the natural disease of
monarchy.</span></p><p cwidth="984" data-dcnode-id="1530" eza="cwidth:984px;;cheight:38px;;wcalc_source:child;wcalc:89px;wocalc:89px;hcalc:285px;rend_px_area:37392;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[35];pagepos:327;cwidth:984px;cheight:38px;wcalc_source:child;wcalc:110px;wocalc:89px;hcalc:285;rend_px_area:37392;rcnt:1;ez_min_text_wdth:94;req_px_area:33176;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1531" instrument_node="">Secondly — That the commons, by being appointed for that purpose, are
either wiser or more worthy of confidence than the crown.</span></p><p cwidth="984" data-dcnode-id="1528" eza="cwidth:984px;;cheight:57px;;wcalc_source:child;wcalc:101px;wocalc:101px;hcalc:684px;rend_px_area:56088;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[36];pagepos:328;cwidth:984px;cheight:57px;wcalc_source:child;wcalc:170px;wocalc:101px;hcalc:684;rend_px_area:56088;rcnt:1;ez_min_text_wdth:112;req_px_area:58892.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1529" instrument_node="">But as the same constitution which gives the commons a power to check the
king by withholding the supplies, gives afterwards the king a power to check
the commons, by empowering him to reject their other bills; it again supposes
that the king is wiser than those whom it has already supposed to be wiser than
him. A mere absurdity! </span></p><p cwidth="984" data-dcnode-id="1526" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:100px;wocalc:100px;hcalc:893px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[37];pagepos:329;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:170px;wocalc:100px;hcalc:893;rend_px_area:74784;rcnt:1;ez_min_text_wdth:112;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1527" instrument_node="">There is something exceedingly ridiculous in the composition of monarchy; it
first excludes a man from the means of information, yet empowers him to act in
cases where the highest judgment is required. The state of a king shuts him
from the world, yet the business of a king requires him to know it thoroughly;
wherefore the different parts, unnaturally opposing and destroying each other,
prove the whole character to be absurd and useless.</span></p><p cwidth="984" data-dcnode-id="1518" eza="cwidth:984px;;cheight:171px;;wcalc_source:child;wcalc:145px;wocalc:145px;hcalc:1311px;rend_px_area:168264;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[38];pagepos:330;cwidth:984px;cheight:171px;wcalc_source:child;wcalc:145px;wocalc:145px;hcalc:1311;rend_px_area:168264;rcnt:1;ez_min_text_wdth:150;req_px_area:176677.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1525" instrument_node="">Some writers have explained the English constitution thus; the king, say
they, is one, the people another; the peers are an house in behalf of the king;
the commons in behalf of the people; but this hath all the distinctions of an
house divided against itself; and though the expressions be pleasantly
arranged, yet when examined they appear idle and ambiguous; and it will always
happen, that the nicest construction that words are capable of, when applied to
the description of something which either cannot exist, or is too
incomprehensible to be within the compass of description, will be words of
sound only, and though they may amuse the ear, they cannot inform the mind, for
this explanation includes a previous question, viz. </span><i cwidth="0" data-dcnode-id="1523" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:61px;wocalc:61px;hcalc:342px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[38]/i[1];pagepos:332;cwidth:61;cheight:0px;wcalc_source:child;wcalc:61px;wocalc:61px;hcalc:342;rend_px_area:0;rcnt:5;ez_min_text_wdth:61;req_px_area:22838.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1524" instrument_node="">How came the king by a
power which the people are afraid to trust, and always obliged to check?</span></i><span data-dcnode-id="1522" instrument_node="">
Such a power could not be the gift of a wise people, neither can any power,
</span><i cwidth="0" data-dcnode-id="1520" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:73px;wocalc:73px;hcalc:57px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[38]/i[2];pagepos:334;cwidth:73;cheight:0px;wcalc_source:child;wcalc:73px;wocalc:73px;hcalc:57;rend_px_area:0;rcnt:5;ez_min_text_wdth:73;req_px_area:6073.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1521" instrument_node="">which needs checking</span></i><span data-dcnode-id="1519" instrument_node="">, be from God; yet the provision, which the
constitution makes, supposes such a power to exist.</span></p><p cwidth="984" data-dcnode-id="1513" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:97px;wocalc:97px;hcalc:1197px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[39];pagepos:336;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:97px;wocalc:97px;hcalc:1197;rend_px_area:112176;rcnt:1;ez_min_text_wdth:112;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1517" instrument_node="">But the provision is unequal to the task; the means either cannot or will
not accomplish the end, and the whole affair is a </span><i cwidth="0" data-dcnode-id="1515" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:31px;wocalc:31px;hcalc:57px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[39]/i;pagepos:338;cwidth:31;cheight:0px;wcalc_source:child;wcalc:31px;wocalc:31px;hcalc:57;rend_px_area:0;rcnt:3;ez_min_text_wdth:31;req_px_area:2579.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1516" instrument_node="">felo de se</span></i><span data-dcnode-id="1514" instrument_node="">; for as the
greater weight will always carry up the less, and as all the wheels of a
machine are put in motion by one, it only remains to know which power in the
constitution has the most weight, for that will govern; and though the others,
or a part of them, may clog, or, as the phrase is, check the rapidity of its
motion, yet so long as they cannot stop it, their endeavors will be
ineffectual; the first moving power will at last have its way, and what it
wants in speed is supplied by time.</span></p><p cwidth="984" data-dcnode-id="1511" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:106px;wocalc:106px;hcalc:684px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[40];pagepos:340;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:170px;wocalc:106px;hcalc:684;rend_px_area:74784;rcnt:1;ez_min_text_wdth:112;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1512" instrument_node="">That the crown is this overbearing part in the English constitution needs
not be mentioned, and that it derives its whole consequence merely from being
the giver of places pensions is self evident, wherefore, though we have and
wise enough to shut and lock a door against absolute monarchy, we at the same
time have been foolish enough to put the crown in possession of the key.</span></p><p cwidth="984" data-dcnode-id="1503" eza="cwidth:984px;;cheight:95px;;wcalc_source:child;wcalc:102px;wocalc:102px;hcalc:1026px;rend_px_area:93480;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[41];pagepos:341;cwidth:984px;cheight:95px;wcalc_source:child;wcalc:102px;wocalc:102px;hcalc:1026;rend_px_area:93480;rcnt:1;ez_min_text_wdth:103;req_px_area:98154;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1510" instrument_node="">The prejudice of Englishmen, in favor of their own government by king,
lords, and commons, arises as much or more from national pride than reason.
Individuals are undoubtedly safer in England than in some other countries, but
the </span><i cwidth="0" data-dcnode-id="1508" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:30px;wocalc:30px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[41]/i[1];pagepos:343;cwidth:30;cheight:0px;wcalc_source:child;wcalc:30px;wocalc:30px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:30;req_px_area:1248;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1509" instrument_node="">will</span></i><span data-dcnode-id="1507" instrument_node=""> of the king is as much the </span><i cwidth="0" data-dcnode-id="1505" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:29px;wocalc:29px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[41]/i[2];pagepos:345;cwidth:29;cheight:0px;wcalc_source:child;wcalc:29px;wocalc:29px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:28;req_px_area:1206.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1506" instrument_node="">law</span></i><span data-dcnode-id="1504" instrument_node=""> of the land in Britain as
in France, with this difference, that instead of proceeding directly from his
mouth, it is handed to the people under the most formidable shape of an act of
parliament. For the fate of Charles the First, hath only made kings more subtle
not — more just.</span></p><p cwidth="984" data-dcnode-id="1498" eza="cwidth:984px;;cheight:57px;;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:513px;rend_px_area:56088;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[42];pagepos:347;cwidth:984px;cheight:57px;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:513;rend_px_area:56088;rcnt:1;ez_min_text_wdth:112;req_px_area:58892.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1502" instrument_node="">Wherefore, laying aside all national pride and prejudice in favor of modes
and forms, the plain truth is, that </span><i cwidth="0" data-dcnode-id="1500" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:190px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[42]/i;pagepos:349;cwidth:98;cheight:0px;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:190;rend_px_area:0;rcnt:3;ez_min_text_wdth:98;req_px_area:24460.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1501" instrument_node="">it is wholly owing to the constitution
of the people, and not to the constitution of the government</span></i><span data-dcnode-id="1499" instrument_node=""> that the crown
is not as oppressive in England as in Turkey.</span></p><p cwidth="984" data-dcnode-id="1493" eza="cwidth:984px;;cheight:95px;;wcalc_source:child;wcalc:115px;wocalc:115px;hcalc:931px;rend_px_area:93480;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[43];pagepos:351;cwidth:984px;cheight:95px;wcalc_source:child;wcalc:115px;wocalc:115px;hcalc:931;rend_px_area:93480;rcnt:1;ez_min_text_wdth:131;req_px_area:98154;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1497" instrument_node="">An inquiry into the </span><i cwidth="0" data-dcnode-id="1495" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:112px;wocalc:112px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[43]/i;pagepos:353;cwidth:112;cheight:0px;wcalc_source:child;wcalc:112px;wocalc:112px;hcalc:19;rend_px_area:0;rcnt:3;ez_min_text_wdth:112;req_px_area:4659.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1496" instrument_node="">constitutional</span></i><span data-dcnode-id="1494" instrument_node=""> errors in the English form of
government is at this time highly necessary; for as we are never in a proper
condition of doing justice to others, while we continue under the influence of
some leading partiality, so neither are we capable of doing it to ourselves
while we remain fettered by any obstinate prejudice. And as a man, who is
attached to a prostitute, is unfitted to choose or judge of a wife, so any
prepossession in favor of a rotten constitution of government will disable us
from discerning a good one.</span></p><p cwidth="984" data-dcnode-id="1489" eza="cwidth:984px;;cheight:20px;;wcalc_source:child;wcalc:97px;wocalc:97px;hcalc:100px;rend_px_area:19680;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[44];pagepos:355;cwidth:984px;cheight:20px;wcalc_source:child;wcalc:133px;wocalc:97px;hcalc:100;rend_px_area:19680;rcnt:1;ez_min_text_wdth:94;req_px_area:10088;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><b cwidth="0" data-dcnode-id="1490" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:133px;wocalc:133px;hcalc:60px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[44]/b;pagepos:356;cwidth:133;cheight:0px;wcalc_source:child;wcalc:133px;wocalc:133px;hcalc:60;rend_px_area:0;rcnt:1;ez_min_text_wdth:103;req_px_area:10088;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><a cwidth="0" data-dcnode-id="1491" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:97px;wocalc:97px;hcalc:100px;rend_px_area:0;" name="part2" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[44]/b/a;pagepos:357;cwidth:97;cheight:0px;wcalc_source:child;wcalc:97px;wocalc:97px;hcalc:100;rend_px_area:0;rcnt:1;ez_min_text_wdth:97;req_px_area:10088;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1492" instrument_node="">Of monarchy and hereditary succession</span></a></b></p><p cwidth="984" data-dcnode-id="1479" eza="cwidth:984px;;cheight:95px;;wcalc_source:child;wcalc:115px;wocalc:115px;hcalc:874px;rend_px_area:93480;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[45];pagepos:358;cwidth:984px;cheight:95px;wcalc_source:child;wcalc:115px;wocalc:115px;hcalc:874;rend_px_area:93480;rcnt:1;ez_min_text_wdth:122;req_px_area:98154;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><i cwidth="0" data-dcnode-id="1487" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:72px;wocalc:72px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[45]/i[1];pagepos:359;cwidth:72;cheight:0px;wcalc_source:child;wcalc:72px;wocalc:72px;hcalc:19;rend_px_area:0;rcnt:6;ez_min_text_wdth:66;req_px_area:2995.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1488" instrument_node="">Mankind</span></i><span data-dcnode-id="1486" instrument_node=""> being originally equals in the order of creation, the
equality could only be destroyed by some subsequent circumstance; the
distinctions of rich, and poor, may in a great measure be accounted for, and
that without having recourse to the harsh, ill-sounding names of oppression and
avarice. Oppression is often the </span><i cwidth="0" data-dcnode-id="1484" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:106px;wocalc:106px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[45]/i[2];pagepos:361;cwidth:106;cheight:0px;wcalc_source:child;wcalc:106px;wocalc:106px;hcalc:19;rend_px_area:0;rcnt:6;ez_min_text_wdth:103;req_px_area:4409.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1485" instrument_node="">consequence</span></i><span data-dcnode-id="1483" instrument_node="">, but seldom or never the
</span><i cwidth="0" data-dcnode-id="1481" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:53px;wocalc:53px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[45]/i[3];pagepos:363;cwidth:53;cheight:0px;wcalc_source:child;wcalc:53px;wocalc:53px;hcalc:19;rend_px_area:0;rcnt:6;ez_min_text_wdth:47;req_px_area:2204.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1482" instrument_node="">means</span></i><span data-dcnode-id="1480" instrument_node=""> of riches; and though avarice will preserve a man from being
necessitously poor, it generally makes him too timorous to be wealthy.</span></p><p cwidth="984" data-dcnode-id="1471" eza="cwidth:984px;;cheight:77px;;wcalc_source:child;wcalc:110px;wocalc:110px;hcalc:819px;rend_px_area:75768;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[46];pagepos:365;cwidth:984px;cheight:77px;wcalc_source:child;wcalc:110px;wocalc:110px;hcalc:819;rend_px_area:75768;rcnt:1;ez_min_text_wdth:122;req_px_area:79556.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1478" instrument_node="">But there is another and greater distinction for which no truly natural or
religious reason can be assigned, and that is, the distinction of men into
</span><b cwidth="0" data-dcnode-id="1476" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:49px;wocalc:49px;hcalc:20px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[46]/b[1];pagepos:367;cwidth:49;cheight:0px;wcalc_source:child;wcalc:49px;wocalc:49px;hcalc:20;rend_px_area:0;rcnt:5;ez_min_text_wdth:49;req_px_area:2038.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1477" instrument_node="">kings</span></b><span data-dcnode-id="1475" instrument_node=""> and </span><b cwidth="0" data-dcnode-id="1473" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:65px;wocalc:65px;hcalc:20px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[46]/b[2];pagepos:369;cwidth:65;cheight:0px;wcalc_source:child;wcalc:65px;wocalc:65px;hcalc:20;rend_px_area:0;rcnt:5;ez_min_text_wdth:65;req_px_area:2704;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1474" instrument_node="">subject</span></b><span data-dcnode-id="1472" instrument_node="">. Male and female are the distinctions of
nature, good and bad the distinctions of heaven; but how a race of men came
into the world so exalted above the rest, and distinguished like some new
species, is worth inquiring into, and whether they are the means of happiness
or of misery to mankind.</span></p><p cwidth="984" data-dcnode-id="1469" eza="cwidth:984px;;cheight:95px;;wcalc_source:child;wcalc:106px;wocalc:106px;hcalc:893px;rend_px_area:93480;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[47];pagepos:371;cwidth:984px;cheight:95px;wcalc_source:child;wcalc:170px;wocalc:106px;hcalc:893;rend_px_area:93480;rcnt:1;ez_min_text_wdth:103;req_px_area:98154;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1470" instrument_node="">In the early ages of the world, according to the scripture chronology, there
were no kings; the consequence of which was there were no wars; it is the pride
of kings which throw mankind into confusion. Holland without a king hath
enjoyed more peace for this last century than any of the monarchial governments
in Europe. Antiquity favors the same remark; for the quiet and rural lives of
the first patriarchs hath a happy something in them, which vanishes away when
we come to the history of Jewish royalty.</span></p><p cwidth="984" data-dcnode-id="1467" eza="cwidth:984px;;cheight:95px;;wcalc_source:child;wcalc:101px;wocalc:101px;hcalc:931px;rend_px_area:93480;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[48];pagepos:372;cwidth:984px;cheight:95px;wcalc_source:child;wcalc:170px;wocalc:101px;hcalc:931;rend_px_area:93480;rcnt:1;ez_min_text_wdth:94;req_px_area:98154;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1468" instrument_node="">Government by kings was first introduced into the world by the Heathens,
from whom the children of Israel copied the custom. It was the most prosperous
invention the Devil ever set on foot for the promotion of idolatry. The
Heathens paid divine honors to their deceased kings, and the Christian world
hath improved on the plan by doing the same to their living ones. How impious
is the title of sacred majesty applied to a worm, who in the midst of his
splendor is crumbling into dust! </span></p><p cwidth="984" data-dcnode-id="1462" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:111px;wocalc:111px;hcalc:1254px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[49];pagepos:373;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:111px;wocalc:111px;hcalc:1254;rend_px_area:112176;rcnt:1;ez_min_text_wdth:112;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1466" instrument_node="">As the exalting one man so greatly above the rest cannot be justified on the
equal rights of nature, so neither can it be defended on the authority of
scripture; for the will of the Almighty, as declared by Gideon and the prophet
Samuel, expressly disapproves of government by kings. All anti-monarchial parts
of scripture have been very smoothly glossed over in monarchial governments,
but they undoubtedly merit the attention of countries which have their
governments yet to form. </span><i cwidth="0" data-dcnode-id="1464" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:70px;wocalc:70px;hcalc:152px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[49]/i;pagepos:375;cwidth:70;cheight:0px;wcalc_source:child;wcalc:70px;wocalc:70px;hcalc:152;rend_px_area:0;rcnt:3;ez_min_text_wdth:70;req_px_area:11648;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1465" instrument_node="">Render unto Caesar the things which are
Caesar's</span></i><span data-dcnode-id="1463" instrument_node=""> is the scriptural doctrine of courts, yet it is no support of
monarchial government, for the Jews at that time were without a king, and in a
state of vassalage to the Romans.</span></p><p cwidth="984" data-dcnode-id="1460" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:112px;wocalc:112px;hcalc:1178px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[50];pagepos:377;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:200px;wocalc:112px;hcalc:1178;rend_px_area:112176;rcnt:1;ez_min_text_wdth:122;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1461" instrument_node="">Near three thousand years passed away from the Mosaic account of the
creation, till the Jews under a national delusion requested a king. Till then
their form of government (except in extraordinary cases, where the Almighty
interposed) was a kind of republic administered by a judge and the elders of
the tribes. Kings they had none, and it was held sinful to acknowledge any
being under that title but the Lords of Hosts. And when a man seriously
reflects on the idolatrous homage which is paid to the persons of kings he need
not wonder, that the Almighty, ever jealous of his honor, should disapprove of
a form of government which so impiously invades the prerogative of heaven.</span></p><p cwidth="984" data-dcnode-id="1458" eza="cwidth:984px;;cheight:38px;;wcalc_source:child;wcalc:93px;wocalc:93px;hcalc:361px;rend_px_area:37392;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[51];pagepos:378;cwidth:984px;cheight:38px;wcalc_source:child;wcalc:110px;wocalc:93px;hcalc:361;rend_px_area:37392;rcnt:1;ez_min_text_wdth:103;req_px_area:39261.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1459" instrument_node="">Monarchy is ranked in scripture as one of the sins of the Jews, for which a
curse in reserve is denounced against them. The history of that transaction is
worth attending to.</span></p><p cwidth="984" data-dcnode-id="1444" eza="cwidth:984px;;cheight:153px;;wcalc_source:child;wcalc:109px;wocalc:109px;hcalc:1505px;rend_px_area:150552;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[52];pagepos:379;cwidth:984px;cheight:153px;wcalc_source:child;wcalc:109px;wocalc:109px;hcalc:1505;rend_px_area:150552;rcnt:1;ez_min_text_wdth:131;req_px_area:158079.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1457" instrument_node="">The children of Israel being oppressed by the Midianites, Gideon marched
against them with a small army, and victory, through the divine interposition,
decided in his favor. The Jews elate with success, and attributing it to the
