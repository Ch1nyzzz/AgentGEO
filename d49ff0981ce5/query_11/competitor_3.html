the continental trustees.</span></p><p cwidth="984" data-dcnode-id="576" eza="cwidth:984px;;cheight:40px;;wcalc_source:child;wcalc:131px;wocalc:131px;hcalc:268px;rend_px_area:39360;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[175];pagepos:881;cwidth:984px;cheight:40px;wcalc_source:child;wcalc:131px;wocalc:131px;hcalc:268;rend_px_area:39360;rcnt:1;ez_min_text_wdth:131;req_px_area:41328;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="583" instrument_node="">I proceed now to the second head, viz. Which is the earliest and most
practicable plan, </span><b cwidth="0" data-dcnode-id="581" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:20px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[175]/b[1];pagepos:883;cwidth:125;cheight:0px;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:20;rend_px_area:0;rcnt:5;ez_min_text_wdth:125;req_px_area:5200;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="582" instrument_node="">reconciliation</span></b><span data-dcnode-id="580" instrument_node=""> or </span><b cwidth="0" data-dcnode-id="578" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:20px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[175]/b[2];pagepos:885;cwidth:125;cheight:0px;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:20;rend_px_area:0;rcnt:5;ez_min_text_wdth:124;req_px_area:5200;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="579" instrument_node="">independence</span></b><span data-dcnode-id="577" instrument_node="">; with some
occasional remarks.</span></p><p cwidth="984" data-dcnode-id="566" eza="cwidth:984px;;cheight:77px;;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:573px;rend_px_area:75768;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[176];pagepos:887;cwidth:984px;cheight:77px;wcalc_source:child;wcalc:193px;wocalc:125px;hcalc:573;rend_px_area:75768;rcnt:1;ez_min_text_wdth:140;req_px_area:79556.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="575" instrument_node="">He who takes nature for his guide is not easily beaten out of his argument,
and on that ground, I answer </span><i cwidth="0" data-dcnode-id="567" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:193px;wocalc:193px;hcalc:269px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[176]/i;pagepos:889;cwidth:193;cheight:0px;wcalc_source:child;wcalc:193px;wocalc:193px;hcalc:269;rend_px_area:0;rcnt:2;ez_min_text_wdth:140;req_px_area:66414.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="574" instrument_node="">generally — That </span><b cwidth="0" data-dcnode-id="572" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:20px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[176]/i/b[1];pagepos:891;cwidth:125;cheight:0px;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:20;rend_px_area:0;rcnt:5;ez_min_text_wdth:124;req_px_area:5200;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="573" instrument_node="">independence</span></b><span data-dcnode-id="571" instrument_node="">
being a </span><b cwidth="0" data-dcnode-id="569" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:60px;wocalc:60px;hcalc:60px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[176]/i/b[2];pagepos:893;cwidth:60;cheight:0px;wcalc_source:child;wcalc:60px;wocalc:60px;hcalc:60;rend_px_area:0;rcnt:5;ez_min_text_wdth:60;req_px_area:4992;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="570" instrument_node="">single simple line</span></b><span data-dcnode-id="568" instrument_node="">, contained within ourselves; and
reconciliation, a matter exceedingly perplexed and complicated, and in which, a
treacherous capricious court is to interfere, gives the answer without a
doubt.</span></i></p><p cwidth="984" data-dcnode-id="564" eza="cwidth:984px;;cheight:228px;;wcalc_source:child;wcalc:115px;wocalc:115px;hcalc:2280px;rend_px_area:224352;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[177];pagepos:895;cwidth:984px;cheight:228px;wcalc_source:child;wcalc:220px;wocalc:115px;hcalc:2280;rend_px_area:224352;rcnt:1;ez_min_text_wdth:112;req_px_area:235569.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="565" instrument_node="">The present state of America is truly alarming to every man who is capable
of reflection. Without law, without government, without any other mode of power
than what is founded on, and granted by courtesy. Held together by an
unexampled concurrence of sentiment, which is nevertheless subject to change,
and which every secret enemy is endeavoring to dissolve. Our present condition,
is, legislation without law; wisdom without a plan; a constitution without a
name; and, what is strangely astonishing, perfect Independence contending for
dependence. The instance is without a precedent; the case never existed before;
and who can tell what may be the event? The property of no man is secure in the
present unbraced system of things. The mind of the multitude is left at random,
and feeling no fixed object before them, they pursue such as fancy or opinion
starts. Nothing is criminal; there is no such thing as treason; wherefore,
every one thinks himself at liberty to act as he pleases. The tories dared not
to have assembled offensively, had they known that their lives, by that act
were forfeited to the laws of the state. A line of distinction should be drawn,
between English soldiers taken in battle, and inhabitants of America taken in
arms. The first are prisoners, but the latter traitors. The one forfeits his
liberty the other his head.</span></p><p cwidth="984" data-dcnode-id="556" eza="cwidth:984px;;cheight:133px;;wcalc_source:child;wcalc:136px;wocalc:136px;hcalc:1007px;rend_px_area:130872;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[178];pagepos:896;cwidth:984px;cheight:133px;wcalc_source:child;wcalc:136px;wocalc:136px;hcalc:1007;rend_px_area:130872;rcnt:1;ez_min_text_wdth:140;req_px_area:137415.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="563" instrument_node="">Notwithstanding our wisdom, there is a visible feebleness in some of our
proceedings which gives encouragement to dissensions. The Continental Belt is
too loosely buckled. And if something is not done in time, it will be too late
to do any thing, and we shall fall into a state, in which, neither
</span><i cwidth="0" data-dcnode-id="561" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:112px;wocalc:112px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[178]/i[1];pagepos:898;cwidth:112;cheight:0px;wcalc_source:child;wcalc:112px;wocalc:112px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:112;req_px_area:4659.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="562" instrument_node="">reconciliation</span></i><span data-dcnode-id="560" instrument_node=""> nor </span><i cwidth="0" data-dcnode-id="558" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:114px;wocalc:114px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[178]/i[2];pagepos:900;cwidth:114;cheight:0px;wcalc_source:child;wcalc:114px;wocalc:114px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:112;req_px_area:4742.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="559" instrument_node="">independence</span></i><span data-dcnode-id="557" instrument_node=""> will be practicable. The king and
his worthless adherents are got at their old game of dividing the continent,
and there are not wanting among us printers, who will be busy spreading
specious falsehoods. The artful and hypocritical letter which appeared a few
months ago in two of the New York papers, and likewise in two others, is an
evidence that there are men who want either judgment or honesty.</span></p><p cwidth="984" data-dcnode-id="542" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:123px;wocalc:123px;hcalc:1064px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[179];pagepos:902;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:123px;wocalc:123px;hcalc:1064;rend_px_area:112176;rcnt:1;ez_min_text_wdth:159;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="555" instrument_node="">It is easy getting into holes and corners and talking of reconciliation: But
do such men seriously consider, how difficult the task is, and how dangerous it
may prove, should the Continent divide thereon. Do they take within their view,
all the various orders of men whose situation and circumstances, as well as
their own, are to be considered therein. Do they put themselves in the place of
the sufferer whose </span><i cwidth="0" data-dcnode-id="553" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:20px;wocalc:20px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[179]/i[1];pagepos:904;cwidth:20;cheight:0px;wcalc_source:child;wcalc:20px;wocalc:20px;hcalc:19;rend_px_area:0;rcnt:9;ez_min_text_wdth:20;req_px_area:832;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="554" instrument_node="">all</span></i><span data-dcnode-id="552" instrument_node=""> is </span><i cwidth="0" data-dcnode-id="550" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:61px;wocalc:61px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[179]/i[2];pagepos:906;cwidth:61;cheight:0px;wcalc_source:child;wcalc:61px;wocalc:61px;hcalc:19;rend_px_area:0;rcnt:9;ez_min_text_wdth:61;req_px_area:2537.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="551" instrument_node="">already</span></i><span data-dcnode-id="549" instrument_node=""> gone, and of the soldier, who
hath quitted </span><i cwidth="0" data-dcnode-id="547" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:20px;wocalc:20px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[179]/i[3];pagepos:908;cwidth:20;cheight:0px;wcalc_source:child;wcalc:20px;wocalc:20px;hcalc:19;rend_px_area:0;rcnt:9;ez_min_text_wdth:20;req_px_area:832;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="548" instrument_node="">all</span></i><span data-dcnode-id="546" instrument_node=""> for the defense of his country. If their ill judged
moderation be suited to their own private situations </span><i cwidth="0" data-dcnode-id="544" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:35px;wocalc:35px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[179]/i[4];pagepos:910;cwidth:35;cheight:0px;wcalc_source:child;wcalc:35px;wocalc:35px;hcalc:19;rend_px_area:0;rcnt:9;ez_min_text_wdth:35;req_px_area:1456;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="545" instrument_node="">only</span></i><span data-dcnode-id="543" instrument_node="">, regardless of
others, the event will convince them, that "they are reckoning without their
Host."</span></p><p cwidth="984" data-dcnode-id="537" eza="cwidth:984px;;cheight:190px;;wcalc_source:child;wcalc:123px;wocalc:123px;hcalc:1786px;rend_px_area:186960;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[180];pagepos:912;cwidth:984px;cheight:190px;wcalc_source:child;wcalc:123px;wocalc:123px;hcalc:1786;rend_px_area:186960;rcnt:1;ez_min_text_wdth:131;req_px_area:196308;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="541" instrument_node="">Put us, says some, on the footing we were in the year 1763: To which I
answer, the request is not </span><i cwidth="0" data-dcnode-id="539" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:34px;wocalc:34px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[180]/i;pagepos:914;cwidth:34;cheight:0px;wcalc_source:child;wcalc:34px;wocalc:34px;hcalc:19;rend_px_area:0;rcnt:3;ez_min_text_wdth:28;req_px_area:1048.32;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="540" instrument_node="">now</span></i><span data-dcnode-id="538" instrument_node="">in the power of Britain to comply with,
neither will she propose it; but if it were, and even should be granted, I ask,
as a reasonable question, By what means is such a corrupt and faithless court
to be kept to its engagements? Another parliament, nay, even the present, may
hereafter repeal the obligation, on the pretense of its being violently
obtained, or unwisely granted; and in that case, Where is our redress? No going
to law with nations; cannon are the barristers of crowns; and the sword, not of
justice, but of war, decides the suit. To be on the footing of 1763, it is not
sufficient, that the laws only be put on the same state, but, that our
circumstances, likewise, be put on the same state; our burnt and destroyed
towns repaired or built up, our private losses made good, our public debts
(contracted for defense) discharged; otherwise, we shall be millions worse than
we were at that enviable period. Such a request had it been complied with a
year ago, would have won the heart and soul of the continent — but now it
is too late, "the Rubicon is passed."</span></p><p cwidth="984" data-dcnode-id="532" eza="cwidth:984px;;cheight:171px;;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:1520px;rend_px_area:168264;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[181];pagepos:916;cwidth:984px;cheight:171px;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:1520;rend_px_area:168264;rcnt:1;ez_min_text_wdth:140;req_px_area:176677.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="536" instrument_node="">Besides the taking up arms, merely to enforce the repeal of a pecuniary law,
seems as unwarrantable by the divine law, and as repugnant to human feelings,
as the taking up arms to enforce obedience thereto. The object, on either side,
doth not justify the ways and means; for the lives of men are too valuable to
be cast away on such trifles. It is the violence which is done and threatened
to our persons; the destruction of our property by an armed force; the invasion
of our country by fire and sword, which conscientiously qualifies the use of
arms: And the instant, in which such a mode of defense became necessary, all
subjection to Britain ought to have ceased; and the independency of America
should have been considered, as dating its era from, and published by, </span><i cwidth="0" data-dcnode-id="534" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:60px;wocalc:60px;hcalc:152px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[181]/i;pagepos:918;cwidth:60;cheight:0px;wcalc_source:child;wcalc:60px;wocalc:60px;hcalc:152;rend_px_area:0;rcnt:3;ez_min_text_wdth:60;req_px_area:11232;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="535" instrument_node="">the
first musket that was fired against her</span></i><span data-dcnode-id="533" instrument_node="">. This line is a line of
consistency; neither drawn by caprice, nor extended by ambition; but produced
by a chain of events, of which the colonies were not the authors.</span></p><p cwidth="984" data-dcnode-id="524" eza="cwidth:984px;;cheight:209px;;wcalc_source:child;wcalc:127px;wocalc:127px;hcalc:1824px;rend_px_area:205656;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[182];pagepos:920;cwidth:984px;cheight:209px;wcalc_source:child;wcalc:127px;wocalc:127px;hcalc:1824;rend_px_area:205656;rcnt:1;ez_min_text_wdth:122;req_px_area:215938.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="531" instrument_node="">I shall conclude these remarks, with the following timely and well intended
hints, We ought to reflect, that there are three different ways by which an
independency may hereafter be effected; and that </span><i cwidth="0" data-dcnode-id="529" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:30px;wocalc:30px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[182]/i[1];pagepos:922;cwidth:30;cheight:0px;wcalc_source:child;wcalc:30px;wocalc:30px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:28;req_px_area:1248;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="530" instrument_node="">one</span></i><span data-dcnode-id="528" instrument_node=""> of those
</span><i cwidth="0" data-dcnode-id="526" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:44px;wocalc:44px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[182]/i[2];pagepos:924;cwidth:44;cheight:0px;wcalc_source:child;wcalc:44px;wocalc:44px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:44;req_px_area:1830.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="527" instrument_node="">three</span></i><span data-dcnode-id="525" instrument_node="">, will one day or other, be the fate of America, viz. By the legal
voice of the people in congress; by a military power; or by a mob: It may not
always happen that our soldiers are citizens, and the multitude a body of
reasonable men; virtue, as I have already remarked, is not hereditary, neither
is it perpetual. Should an independency be brought about by the first of those
means, we have every opportunity and every encouragement before us, to form the
noblest, purest constitution on the face of the earth. We have it in our power
to begin the world over again. A situation, similar to the present, hath not
happened since the days of Noah until now. The birthday of a new world is at
hand, and a race of men perhaps as numerous as all Europe contains, are to
receive their portion of freedom from the event of a few months. The reflection
is awful — and in this point of view, how trifling, how ridiculous, do
the little, paltry cavillings, of a few weak or interested men appear, when
weighed against the business of a world.</span></p><p cwidth="984" data-dcnode-id="516" eza="cwidth:984px;;cheight:191px;;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:1749px;rend_px_area:187944;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[183];pagepos:926;cwidth:984px;cheight:191px;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:1749;rend_px_area:187944;rcnt:1;ez_min_text_wdth:122;req_px_area:197341.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="523" instrument_node="">Should we neglect the present favorable and inviting period, and an
independence be hereafter effected by any other means, we must charge the
consequence to ourselves, or to those rather, whose narrow and prejudiced
souls, are habitually opposing the measure, without either inquiring or
reflecting. There are reasons to be given in support of Independence, which men
should rather privately think of, than be publicly told of. We ought not now to
be debating whether we shall be independent or not, but, anxious to accomplish
it on a firm, secure, and honorable basis, and uneasy rather that it is not yet
began upon. Every day convinces us of its necessity. Even the tories (if such
beings yet remain among us) should, of all men, be the most solicitous to
promote it; for, as the appointment of committees at first, protected them from
popular rage, so, a wise and well established form of government, will be the
only certain means of continuing it securely to them. </span><i cwidth="0" data-dcnode-id="521" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:86px;wocalc:86px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[183]/i;pagepos:928;cwidth:86;cheight:0px;wcalc_source:child;wcalc:86px;wocalc:86px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:84;req_px_area:3577.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="522" instrument_node="">Wherefore</span></i><span data-dcnode-id="520" instrument_node="">, if they
have not virtue enough to be </span><b cwidth="0" data-dcnode-id="518" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:56px;wocalc:56px;hcalc:20px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[183]/b;pagepos:930;cwidth:56;cheight:0px;wcalc_source:child;wcalc:56px;wocalc:56px;hcalc:20;rend_px_area:0;rcnt:5;ez_min_text_wdth:52;req_px_area:1164.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="519" instrument_node="">Whigs</span></b><span data-dcnode-id="517" instrument_node="">, they ought to have prudence enough
to wish for independence.</span></p><p cwidth="984" data-dcnode-id="499" eza="cwidth:984px;;cheight:172px;;wcalc_source:child;wcalc:134px;wocalc:134px;hcalc:1388px;rend_px_area:169248;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[184];pagepos:932;cwidth:984px;cheight:172px;wcalc_source:child;wcalc:134px;wocalc:134px;hcalc:1388;rend_px_area:169248;rcnt:1;ez_min_text_wdth:131;req_px_area:177710.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="515" instrument_node="">In short, independence is the only </span><b cwidth="0" data-dcnode-id="513" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:45px;wocalc:45px;hcalc:20px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[184]/b;pagepos:934;cwidth:45;cheight:0px;wcalc_source:child;wcalc:45px;wocalc:45px;hcalc:20;rend_px_area:0;rcnt:11;ez_min_text_wdth:42;req_px_area:1397.76;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="514" instrument_node="">bond</span></b><span data-dcnode-id="512" instrument_node=""> that can tie and keep us
together. We shall then see our object, and our ears will be legally shut
against the schemes of an intriguing, as well as a cruel enemy. We shall then
too, be on a proper footing, to treat with Britain; for there is reason to
conclude, that the pride of that court, will be less hurt by treating with the
American states for terms of peace, than with those, whom she denominates,
"rebellious subjects," for terms of accommodation. It is our delaying it that
encourages her to hope for conquest, and our backwardness tends only to prolong
the war. As we have, without any good effect therefrom, withheld our trade to
obtain a redress of our grievances, let us </span><i cwidth="0" data-dcnode-id="510" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:34px;wocalc:34px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[184]/i[1];pagepos:936;cwidth:34;cheight:0px;wcalc_source:child;wcalc:34px;wocalc:34px;hcalc:19;rend_px_area:0;rcnt:11;ez_min_text_wdth:28;req_px_area:1048.32;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="511" instrument_node="">now</span></i><span data-dcnode-id="509" instrument_node=""> try the alternative, by
</span><i cwidth="0" data-dcnode-id="507" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:116px;wocalc:116px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[184]/i[2];pagepos:938;cwidth:116;cheight:0px;wcalc_source:child;wcalc:116px;wocalc:116px;hcalc:19;rend_px_area:0;rcnt:11;ez_min_text_wdth:116;req_px_area:4825.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="508" instrument_node="">independently</span></i><span data-dcnode-id="506" instrument_node=""> redressing them ourselves, and then offering to open the
trade. The mercantile and reasonable part of England will be still with us;
because, peace </span><i cwidth="0" data-dcnode-id="504" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:36px;wocalc:36px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[184]/i[3];pagepos:940;cwidth:36;cheight:0px;wcalc_source:child;wcalc:36px;wocalc:36px;hcalc:19;rend_px_area:0;rcnt:11;ez_min_text_wdth:36;req_px_area:1497.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="505" instrument_node="">with</span></i><span data-dcnode-id="503" instrument_node=""> trade, is preferable to war </span><i cwidth="0" data-dcnode-id="501" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:62px;wocalc:62px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[184]/i[4];pagepos:942;cwidth:62;cheight:0px;wcalc_source:child;wcalc:62px;wocalc:62px;hcalc:19;rend_px_area:0;rcnt:11;ez_min_text_wdth:62;req_px_area:2579.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="502" instrument_node="">without</span></i><span data-dcnode-id="500" instrument_node=""> it. And
if this offer be not accepted, other courts may be applied to.</span></p><p cwidth="984" data-dcnode-id="483" eza="cwidth:984px;;cheight:135px;;wcalc_source:child;wcalc:113px;wocalc:113px;hcalc:1356px;rend_px_area:132840;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[185];pagepos:944;cwidth:984px;cheight:135px;wcalc_source:child;wcalc:147px;wocalc:113px;hcalc:1356;rend_px_area:132840;rcnt:1;ez_min_text_wdth:122;req_px_area:139482;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="498" instrument_node="">On these grounds I rest the matter. And as no offer hath yet been made to
refute the doctrine contained in the former editions of this pamphlet, it is a
negative proof, that either the doctrine cannot be refuted, or, that the party
in favor of it are too numerous to be opposed. </span><b cwidth="0" data-dcnode-id="496" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:95px;wocalc:95px;hcalc:20px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[185]/b;pagepos:946;cwidth:95;cheight:0px;wcalc_source:child;wcalc:95px;wocalc:95px;hcalc:20;rend_px_area:0;rcnt:5;ez_min_text_wdth:93;req_px_area:3952;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="497" instrument_node="">Wherefore</span></b><span data-dcnode-id="495" instrument_node="">, instead of
gazing at each other with suspicious or doubtful curiosity, let each of us,
hold out to his neighbor the hearty hand of friendship, and unite in drawing a
line, which, like an act of oblivion, shall bury in forgetfulness every former
dissension. Let the names of Whig and Tory be extinct; and let none other be
heard among us, than those of a </span><i cwidth="0" data-dcnode-id="485" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:147px;wocalc:147px;hcalc:234px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[185]/i;pagepos:948;cwidth:147;cheight:0px;wcalc_source:child;wcalc:147px;wocalc:147px;hcalc:234;rend_px_area:0;rcnt:5;ez_min_text_wdth:103;req_px_area:37962.08;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="494" instrument_node="">good citizen, an open and resolute friend,

nd_px_area:0;" name="quaker" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[186]/b/a;pagepos:958;cwidth:75;cheight:0px;wcalc_source:child;wcalc:75px;wocalc:75px;hcalc:60;rend_px_area:0;rcnt:1;ez_min_text_wdth:72;req_px_area:4680;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="482" instrument_node="">Epistle to Quakers</span></a></b></p><p cwidth="984" data-dcnode-id="475" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:132px;wocalc:132px;hcalc:589px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[187];pagepos:959;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:132px;wocalc:132px;hcalc:589;rend_px_area:74784;rcnt:1;ez_min_text_wdth:140;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><i cwidth="0" data-dcnode-id="477" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:132px;wocalc:132px;hcalc:228px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[187]/i;pagepos:960;cwidth:132;cheight:0px;wcalc_source:child;wcalc:132px;wocalc:132px;hcalc:228;rend_px_area:0;rcnt:2;ez_min_text_wdth:132;req_px_area:38438.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="478" instrument_node="">To the Representatives of the Religious Society of the People called

Renewed With Respect To the King and Government, and Touching the Commotions
Now Prevailing In These and Other Parts of America, Addressed To The People In
General."</span></p><p cwidth="984" data-dcnode-id="471" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:112px;wocalc:112px;hcalc:703px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[188];pagepos:962;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:112px;wocalc:112px;hcalc:703;rend_px_area:74784;rcnt:1;ez_min_text_wdth:112;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><i cwidth="0" data-dcnode-id="473" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:31px;wocalc:31px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[188]/i;pagepos:963;cwidth:31;cheight:0px;wcalc_source:child;wcalc:31px;wocalc:31px;hcalc:19;rend_px_area:0;rcnt:2;ez_min_text_wdth:28;req_px_area:1289.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="474" instrument_node="">The</span></i><span data-dcnode-id="472" instrument_node=""> writer of this is one of those few, who never dishonors religion
either by ridiculing, or cavilling at any denomination whatsoever. To God, and
not to man, are all men accountable on the score of religion. Wherefore, this
epistle is not so properly addressed to you as a religious, but as a political
body, dabbling in matters, which the professed quietude of your Principles
instruct you not to meddle with.</span></p><p cwidth="984" data-dcnode-id="466" eza="cwidth:984px;;cheight:95px;;wcalc_source:child;wcalc:130px;wocalc:130px;hcalc:779px;rend_px_area:93480;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[189];pagepos:965;cwidth:984px;cheight:95px;wcalc_source:child;wcalc:130px;wocalc:130px;hcalc:779;rend_px_area:93480;rcnt:1;ez_min_text_wdth:140;req_px_area:98154;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="470" instrument_node="">As you have, without a proper authority for so doing, put yourselves in the
place of the whole body of the Quakers, so, the writer of this, in order to be
on an equal rank with yourselves, is under the necessity, of putting himself in
the place of all those who approve the very writings and principles, against
which your testimony is directed: And he hath chosen their singular situation,
in order that you might discover in him, that presumption of character which
you cannot see in yourselves. For neither he nor you have any claim or title to
</span><i cwidth="0" data-dcnode-id="468" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[189]/i;pagepos:967;cwidth:125;cheight:0px;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:38;rend_px_area:0;rcnt:3;ez_min_text_wdth:125;req_px_area:7800;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="469" instrument_node="">Political Representation</span></i><span data-dcnode-id="467" instrument_node="">.</span></p><p cwidth="984" data-dcnode-id="464" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:109px;wocalc:109px;hcalc:760px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[190];pagepos:969;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:170px;wocalc:109px;hcalc:760;rend_px_area:74784;rcnt:1;ez_min_text_wdth:122;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="465" instrument_node="">When men have departed from the right way, it is no wonder that they stumble
and fall. And it is evident from the manner in which ye have managed your
testimony, that politics, (as a religious body of men) is not your proper walk;
for however well adapted it might appear to you, it is, nevertheless, a jumble
of good and bad put unwisely together, and the conclusion drawn therefrom, both
unnatural and unjust.</span></p><p cwidth="984" data-dcnode-id="456" eza="cwidth:984px;;cheight:152px;;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:1406px;rend_px_area:149568;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[191];pagepos:970;cwidth:984px;cheight:152px;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:1406;rend_px_area:149568;rcnt:1;ez_min_text_wdth:122;req_px_area:157046.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="463" instrument_node="">The two first pages, (and the whole doth not make four) we give you credit
for, and expect the same civility from you, because the love and desire of
peace is not confined to Quakerism, it is the </span><i cwidth="0" data-dcnode-id="461" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:59px;wocalc:59px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[191]/i[1];pagepos:972;cwidth:59;cheight:0px;wcalc_source:child;wcalc:59px;wocalc:59px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:59;req_px_area:2454.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="462" instrument_node="">natural</span></i><span data-dcnode-id="460" instrument_node="">, as well as the
religious wish of all denominations of men. And on this ground, as men laboring
to establish an Independent Constitution of our own, do we exceed all others in
our hope, end, and aim. </span><i cwidth="0" data-dcnode-id="458" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:48px;wocalc:48px;hcalc:114px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[191]/i[2];pagepos:974;cwidth:48;cheight:0px;wcalc_source:child;wcalc:48px;wocalc:48px;hcalc:114;rend_px_area:0;rcnt:5;ez_min_text_wdth:47;req_px_area:6988.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="459" instrument_node="">Our plan is peace for ever.</span></i><span data-dcnode-id="457" instrument_node=""> We are tired of
contention with Britain, and can see no real end to it but in a final
separation. We act consistently, because for the sake of introducing an endless
and uninterrupted peace, do we bear the evils and burdens of the present day.
We are endeavoring, and will steadily continue to endeavor, to separate and
dissolve a connection which hath already filled our land with blood; and which,
while the name of it remains, will be the fatal cause of future mischiefs to
both countries.</span></p><p cwidth="984" data-dcnode-id="448" eza="cwidth:984px;;cheight:152px;;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:1349px;rend_px_area:149568;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[192];pagepos:976;cwidth:984px;cheight:152px;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:1349;rend_px_area:149568;rcnt:1;ez_min_text_wdth:131;req_px_area:157046.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="455" instrument_node="">We fight neither for revenge nor conquest; neither from pride nor passion;
we are not insulting the world with our fleets and armies, nor ravaging the
globe for plunder. Beneath the shade of our own vines are we attacked; in our
own houses, and on our own lands, is the violence committed against us. We view
our enemies in the characters of highwaymen and housebreakers, and having no
defense for ourselves in the civil law; are obliged to punish them by the
military one, and apply the sword, in the very case, where you have before now,
applied the halter. Perhaps we feel for the ruined and insulted sufferers in
all and every part of the continent, and with a degree of tenderness which hath
not yet made its way into some of your bosoms. But be ye sure that ye mistake
not the cause and ground of your Testimony. Call not coldness of soul,
religion; nor put the </span><i cwidth="0" data-dcnode-id="453" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:42px;wocalc:42px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[192]/i[1];pagepos:978;cwidth:42;cheight:0px;wcalc_source:child;wcalc:42px;wocalc:42px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:42;req_px_area:1747.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="454" instrument_node="">bigot</span></i><span data-dcnode-id="452" instrument_node=""> in the place of the </span><i cwidth="0" data-dcnode-id="450" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:75px;wocalc:75px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[192]/i[2];pagepos:980;cwidth:75;cheight:0px;wcalc_source:child;wcalc:75px;wocalc:75px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:75;req_px_area:3120;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="451" instrument_node="">Christian</span></i><span data-dcnode-id="449" instrument_node="">.</span></p><p cwidth="984" data-dcnode-id="446" eza="cwidth:984px;;cheight:38px;;wcalc_source:child;wcalc:117px;wocalc:117px;hcalc:342px;rend_px_area:37392;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[193];pagepos:982;cwidth:984px;cheight:38px;wcalc_source:child;wcalc:117px;wocalc:117px;hcalc:342;rend_px_area:37392;rcnt:1;ez_min_text_wdth:112;req_px_area:39261.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="447" instrument_node="">O ye partial ministers of your own acknowledged principles! If the bearing
arms be sinful, the first going to war must be more so, by all the difference
between willful attack and unavoidable defence.</span></p><p cwidth="984" data-dcnode-id="421" eza="cwidth:984px;;cheight:173px;;wcalc_source:child;wcalc:105px;wocalc:105px;hcalc:1883px;rend_px_area:170232;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[194];pagepos:983;cwidth:984px;cheight:173px;wcalc_source:child;wcalc:113px;wocalc:105px;hcalc:1883;rend_px_area:170232;rcnt:1;ez_min_text_wdth:103;req_px_area:178743.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="445" instrument_node="">Wherefore, if ye really preach from conscience, and mean not to make a
political hobby-horse of your religion, convince the world thereof, by
proclaiming your doctrine to our enemies, </span><i cwidth="0" data-dcnode-id="441" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:113px;wocalc:113px;hcalc:58px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[194]/i[1];pagepos:985;cwidth:113;cheight:0px;wcalc_source:child;wcalc:113px;wocalc:113px;hcalc:58;rend_px_area:0;rcnt:15;ez_min_text_wdth:75;req_px_area:7575.36;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="444" instrument_node="">for they likewise bear
</span><b cwidth="0" data-dcnode-id="442" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:45px;wocalc:45px;hcalc:20px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[194]/i[1]/b;pagepos:987;cwidth:45;cheight:0px;wcalc_source:child;wcalc:45px;wocalc:45px;hcalc:20;rend_px_area:0;rcnt:2;ez_min_text_wdth:42;req_px_area:1397.76;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="443" instrument_node="">arms</span></b></i><span data-dcnode-id="440" instrument_node="">. Give us proof of your sincerity by publishing it at St.
James's, to the commanders in chief at Boston, to the admirals and captains who
are practically ravaging our coasts, and to all the murdering miscreants who
are acting in authority under HIM whom ye profess to serve. Had ye the honest
soul of </span><i cwidth="0" data-dcnode-id="438" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:62px;wocalc:62px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[194]/i[2];pagepos:989;cwidth:62;cheight:0px;wcalc_source:child;wcalc:62px;wocalc:62px;hcalc:19;rend_px_area:0;rcnt:15;ez_min_text_wdth:62;req_px_area:2579.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="439" instrument_node="">Barclay</span></i><span data-dcnode-id="437" instrument_node="">* ye would preach repentance to </span><i cwidth="0" data-dcnode-id="435" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:37px;wocalc:37px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[194]/i[3];pagepos:991;cwidth:37;cheight:0px;wcalc_source:child;wcalc:37px;wocalc:37px;hcalc:19;rend_px_area:0;rcnt:15;ez_min_text_wdth:37;req_px_area:1539.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="436" instrument_node="">your</span></i><span data-dcnode-id="434" instrument_node=""> king; Ye
would tell the royal tyrant of his sins, and warn him of eternal ruin. Ye would
not spend your partial invectives against the injured and the insulted only,
but like faithful ministers, would cry aloud and </span><i cwidth="0" data-dcnode-id="432" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:46px;wocalc:46px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[194]/i[4];pagepos:993;cwidth:46;cheight:0px;wcalc_source:child;wcalc:46px;wocalc:46px;hcalc:38;rend_px_area:0;rcnt:15;ez_min_text_wdth:46;req_px_area:2870.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="433" instrument_node="">spare none</span></i><span data-dcnode-id="431" instrument_node="">. Say not
that ye are persecuted, neither endeavor to make us the authors of that
reproach, which, ye are bringing upon yourselves; for we testify unto all men,
that we do not complain against you because ye are </span><i cwidth="0" data-dcnode-id="429" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:68px;wocalc:68px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[194]/i[5];pagepos:995;cwidth:68;cheight:0px;wcalc_source:child;wcalc:68px;wocalc:68px;hcalc:19;rend_px_area:0;rcnt:15;ez_min_text_wdth:66;req_px_area:2828.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="430" instrument_node="">Quakers</span></i><span data-dcnode-id="428" instrument_node="">, but because
ye pretend to </span><i cwidth="0" data-dcnode-id="426" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:20px;wocalc:20px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[194]/i[6];pagepos:997;cwidth:20;cheight:0px;wcalc_source:child;wcalc:20px;wocalc:20px;hcalc:19;rend_px_area:0;rcnt:15;ez_min_text_wdth:19;req_px_area:832;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="427" instrument_node="">be</span></i><span data-dcnode-id="425" instrument_node=""> and are </span><b cwidth="0" data-dcnode-id="423" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:30px;wocalc:30px;hcalc:20px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[194]/b;pagepos:999;cwidth:30;cheight:0px;wcalc_source:child;wcalc:30px;wocalc:30px;hcalc:20;rend_px_area:0;rcnt:15;ez_min_text_wdth:30;req_px_area:1248;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="424" instrument_node="">not</span></b><span data-dcnode-id="422" instrument_node=""> Quakers.</span></p><p cwidth="984" data-dcnode-id="417" eza="cwidth:984px;;cheight:152px;;wcalc_source:child;wcalc:130px;wocalc:130px;hcalc:1197px;rend_px_area:149568;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[195];pagepos:1001;cwidth:984px;cheight:152px;wcalc_source:child;wcalc:130px;wocalc:130px;hcalc:1197;rend_px_area:149568;rcnt:1;ez_min_text_wdth:140;req_px_area:157046.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="420" instrument_node="">*"Thou hast tasted of prosperity and adversity; thou knowest what it is to
be banished thy native country, to be overruled as well as to rule, and set
upon the throne; and being oppressed thou hast reason to know now hateful the
oppressor is both to God and man. If after all these warnings and
advertisements, thou dost not turn unto the Lord with all thy heart, but forget
him who remembered thee in thy distress, and give up thyself to follow lust and
vanity, surely great will be thy condemnation. Against which snare, as well as
the temptation of those who may or do feed thee, and prompt thee to evil, the
most excellent and prevalent remedy will be, to apply thyself to that light of
Christ which shineth in thy conscience and which neither can, nor will flatter
thee, nor suffer thee to be at ease in thy sins." — </span><i cwidth="0" data-dcnode-id="418" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:75px;wocalc:75px;hcalc:95px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[195]/i;pagepos:1003;cwidth:75;cheight:0px;wcalc_source:child;wcalc:75px;wocalc:75px;hcalc:95;rend_px_area:0;rcnt:2;ez_min_text_wdth:75;req_px_area:8580;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="419" instrument_node="">Barclay's Address
to Charles II.</span></i></p><p cwidth="984" data-dcnode-id="412" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:122px;wocalc:122px;hcalc:1026px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[196];pagepos:1004;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:122px;wocalc:122px;hcalc:1026;rend_px_area:112176;rcnt:1;ez_min_text_wdth:122;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="416" instrument_node="">Alas! it seems by the particular tendency of some part of your Testimony,
and other parts of your conduct, as if all sin was reduced to, and comprehended
in </span><i cwidth="0" data-dcnode-id="414" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:63px;wocalc:63px;hcalc:76px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[196]/i;pagepos:1006;cwidth:63;cheight:0px;wcalc_source:child;wcalc:63px;wocalc:63px;hcalc:76;rend_px_area:0;rcnt:3;ez_min_text_wdth:63;req_px_area:6552;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="415" instrument_node="">the act of bearing arms</span></i><span data-dcnode-id="413" instrument_node="">, and that by the people only. Ye appear to
us, to have mistaken party for conscience, because the general tenor of your
actions wants uniformity: And it is exceedingly difficult to us to give credit
to many of your pretended scruples; because we see them made by the same men,
who, in the very instant that they are exclaiming against the mammon of this
world, are nevertheless, hunting after it with a step as steady as Time, and an
appetite as keen as Death.</span></p><p cwidth="984" data-dcnode-id="407" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:95px;wocalc:95px;hcalc:760px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[197];pagepos:1008;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:95px;wocalc:95px;hcalc:760;rend_px_area:74784;rcnt:1;ez_min_text_wdth:131;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="411" instrument_node="">The quotation which ye have made from Proverbs, in the third page of your
testimony, that, "when a man's ways please the Lord, he maketh even his enemies
to be at peace with him;" is very unwisely chosen on your part; because it
amounts to a proof, that the king's ways (whom ye are so desirous of
supporting) do </span><i cwidth="0" data-dcnode-id="409" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:27px;wocalc:27px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[197]/i;pagepos:1010;cwidth:27;cheight:0px;wcalc_source:child;wcalc:27px;wocalc:27px;hcalc:19;rend_px_area:0;rcnt:3;ez_min_text_wdth:27;req_px_area:1123.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="410" instrument_node="">not</span></i><span data-dcnode-id="408" instrument_node=""> please the Lord, otherwise, his reign would be in
peace.</span></p><p cwidth="984" data-dcnode-id="405" eza="cwidth:984px;;cheight:19px;;wcalc_source:child;wcalc:106px;wocalc:106px;hcalc:228px;rend_px_area:18696;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[198];pagepos:1012;cwidth:984px;cheight:19px;wcalc_source:child;wcalc:110px;wocalc:106px;hcalc:228;rend_px_area:18696;rcnt:1;ez_min_text_wdth:122;req_px_area:19630.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="406" instrument_node="">I now proceed to the latter part of your testimony, and that, for which all
the foregoing seems only an introduction, viz:</span></p><p cwidth="984" data-dcnode-id="388" eza="cwidth:984px;;cheight:209px;;wcalc_source:child;wcalc:111px;wocalc:111px;hcalc:2052px;rend_px_area:205656;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[199];pagepos:1013;cwidth:984px;cheight:209px;wcalc_source:child;wcalc:111px;wocalc:111px;hcalc:2052;rend_px_area:205656;rcnt:1;ez_min_text_wdth:112;req_px_area:215938.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="404" instrument_node="">"It hath ever been our judgment and principle, since we were called to
profess the light of Christ Jesus, manifested in our consciences unto this day,
that the setting up and putting down kings and governments, is God's peculiar
prerogative; for causes best known to himself: And that it is not our business
to have any hand or contrivance therein; nor to be busy-bodies above our
station, much less to plot and contrive the ruin, or overturn any of them, but
to pray for the king, and safety of our nation, and good of all men: that we
may live a peaceable and quiet life, in all goodliness and honesty; </span><i cwidth="0" data-dcnode-id="402" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:114px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[199]/i[1];pagepos:1015;cwidth:98;cheight:0px;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:114;rend_px_area:0;rcnt:11;ez_min_text_wdth:94;req_px_area:14268.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="403" instrument_node="">under
the government which God is pleased to set over us</span></i><span data-dcnode-id="401" instrument_node="">." If these are
</span><i cwidth="0" data-dcnode-id="399" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:46px;wocalc:46px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[199]/i[2];pagepos:1017;cwidth:46;cheight:0px;wcalc_source:child;wcalc:46px;wocalc:46px;hcalc:19;rend_px_area:0;rcnt:11;ez_min_text_wdth:46;req_px_area:1913.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="400" instrument_node="">really</span></i><span data-dcnode-id="398" instrument_node=""> your principles why do ye not abide by them? Why do ye not leave
that, which ye call God's work, to be managed by himself? These very principles
instruct you to wait with patience and humility, for the event of all public
measures, and to receive </span><i cwidth="0" data-dcnode-id="396" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:45px;wocalc:45px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[199]/i[3];pagepos:1019;cwidth:45;cheight:0px;wcalc_source:child;wcalc:45px;wocalc:45px;hcalc:38;rend_px_area:0;rcnt:11;ez_min_text_wdth:45;req_px_area:2808;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="397" instrument_node="">that event</span></i><span data-dcnode-id="395" instrument_node=""> as the divine will towards you.
</span><i cwidth="0" data-dcnode-id="393" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:86px;wocalc:86px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[199]/i[4];pagepos:1021;cwidth:86;cheight:0px;wcalc_source:child;wcalc:86px;wocalc:86px;hcalc:19;rend_px_area:0;rcnt:11;ez_min_text_wdth:84;req_px_area:3577.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="394" instrument_node="">Wherefore</span></i><span data-dcnode-id="392" instrument_node="">, what occasion is there for your </span><i cwidth="0" data-dcnode-id="390" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:80px;wocalc:80px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[199]/i[5];pagepos:1023;cwidth:80;cheight:0px;wcalc_source:child;wcalc:80px;wocalc:80px;hcalc:38;rend_px_area:0;rcnt:11;ez_min_text_wdth:80;req_px_area:4992;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="391" instrument_node="">political testimony</span></i><span data-dcnode-id="389" instrument_node=""> if
you fully believe what it contains? And the very publishing it proves, that
either, ye do not believe what ye profess, or have not virtue enough to
practice what ye believe.</span></p><p cwidth="984" data-dcnode-id="365" eza="cwidth:984px;;cheight:419px;;wcalc_source:child;wcalc:127px;wocalc:127px;hcalc:3708px;rend_px_area:412296;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[200];pagepos:1025;cwidth:984px;cheight:419px;wcalc_source:child;wcalc:127px;wocalc:127px;hcalc:3708;rend_px_area:412296;rcnt:1;ez_min_text_wdth:131;req_px_area:432910.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="387" instrument_node="">The principles of Quakerism have a direct tendency to make a man the quiet
and inoffensive subject of any, and every government which </span><i cwidth="0" data-dcnode-id="385" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:36px;wocalc:36px;hcalc:76px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[200]/i[1];pagepos:1027;cwidth:36;cheight:0px;wcalc_source:child;wcalc:36px;wocalc:36px;hcalc:76;rend_px_area:0;rcnt:15;ez_min_text_wdth:36;req_px_area:3744;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="386" instrument_node="">is set over
him</span></i><span data-dcnode-id="384" instrument_node="">. And if the setting up and putting down of kings and governments is
God's peculiar prerogative, he most certainly will not be robbed thereof by us;
wherefore, the principle itself leads you to approve of every thing, which ever
happened, or may happen to kings as being his work. </span><b cwidth="0" data-dcnode-id="382" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:85px;wocalc:85px;hcalc:40px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[200]/b[1];pagepos:1029;cwidth:85;cheight:0px;wcalc_source:child;wcalc:85px;wocalc:85px;hcalc:40;rend_px_area:0;rcnt:15;ez_min_text_wdth:83;req_px_area:4420;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="383" instrument_node="">Oliver Cromwell</span></b><span data-dcnode-id="381" instrument_node="">
thanks you. </span><b cwidth="0" data-dcnode-id="379" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:69px;wocalc:69px;hcalc:20px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[200]/b[2];pagepos:1031;cwidth:69;cheight:0px;wcalc_source:child;wcalc:69px;wocalc:69px;hcalc:20;rend_px_area:0;rcnt:15;ez_min_text_wdth:69;req_px_area:2870.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="380" instrument_node="">Charles</span></b><span data-dcnode-id="378" instrument_node="">, then, died not by the hands of man; and should the
present proud imitator of him, come to the same untimely end, the writers and
publishers of the Testimony, are bound by the doctrine it contains, to applaud
the fact. Kings are not taken away by miracles, neither are changes in
governments brought about by any other means than such as are common and human;
and such as we are now using. Even the dispersing of the Jews, though foretold
by our Savior, was effected by arms. Wherefore, as ye refuse to be the means on
one side, ye ought not to be meddlers on the other; but to wait the issue in
silence; and unless you can produce divine authority, to prove, that the
Almighty who hath created and placed this new world, at the greatest distance
it could possibly stand, east and west, from every part of the old, doth,
nevertheless, disapprove of its being independent of the corrupt and abandoned
court of Britain; unless I say, ye can show this, how can ye, on the ground of
your principles, justify the exciting and stirring up of the people "firmly to
unite in the </span><i cwidth="0" data-dcnode-id="376" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:94px;wocalc:94px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[200]/i[2];pagepos:1033;cwidth:94;cheight:0px;wcalc_source:child;wcalc:94px;wocalc:94px;hcalc:19;rend_px_area:0;rcnt:15;ez_min_text_wdth:94;req_px_area:3910.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="377" instrument_node="">abhorrence</span></i><span data-dcnode-id="375" instrument_node=""> of all such </span><i cwidth="0" data-dcnode-id="373" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:67px;wocalc:67px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[200]/i[3];pagepos:1035;cwidth:67;cheight:0px;wcalc_source:child;wcalc:67px;wocalc:67px;hcalc:19;rend_px_area:0;rcnt:15;ez_min_text_wdth:67;req_px_area:2787.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="374" instrument_node="">writings</span></i><span data-dcnode-id="372" instrument_node="">, and
</span><i cwidth="0" data-dcnode-id="370" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:78px;wocalc:78px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[200]/i[4];pagepos:1037;cwidth:78;cheight:0px;wcalc_source:child;wcalc:78px;wocalc:78px;hcalc:19;rend_px_area:0;rcnt:15;ez_min_text_wdth:75;req_px_area:3244.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="371" instrument_node="">measures</span></i><span data-dcnode-id="369" instrument_node="">, as evidence a desire and design to break off the </span><i cwidth="0" data-dcnode-id="367" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:50px;wocalc:50px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[200]/i[5];pagepos:1039;cwidth:50;cheight:0px;wcalc_source:child;wcalc:50px;wocalc:50px;hcalc:19;rend_px_area:0;rcnt:15;ez_min_text_wdth:47;req_px_area:2080;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="368" instrument_node="">happy</span></i><span data-dcnode-id="366" instrument_node="">
connection we have hitherto enjoyed, with the kingdom of Great Britain, and our
just and necessary subordination to the king, and those who are lawfully placed
in authority under him." What a slap in the face is here! the men, who, in the
very paragraph before, have quietly and passively resigned up the ordering,
altering, and disposal of kings and governments, into the hands of God, are now
recalling their principles, and putting in for a share of the business. Is it
possible, that the conclusion, which is here justly quoted, can any ways follow
from the doctrine laid down? The inconsistency is too glaring not to be seen;
the absurdity too great not to be laughed at; and such as could only have been
made by those, whose understandings were darkened by the narrow and crabby
spirit of a despairing political party; for ye are not to be considered as the
whole body of the Quakers but only as a factional and fractional part
thereof.</span></p><p cwidth="984" data-dcnode-id="351" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:100px;wocalc:100px;hcalc:1273px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[201];pagepos:1041;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:100px;wocalc:100px;hcalc:1273;rend_px_area:112176;rcnt:1;ez_min_text_wdth:103;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="364" instrument_node="">Here ends the examination of your testimony; (which I call upon no man to
abhor, as ye have done, but only to read and judge of fairly;) to which I
subjoin the following remark; "That the setting up and putting down of kings,"
most certainly mean, the making him a king, who is yet not so, and the making
him no king who is already one. And pray what hath this to do in the present
case? We neither mean to </span><i cwidth="0" data-dcnode-id="362" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:25px;wocalc:25px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[201]/i[1];pagepos:1043;cwidth:25;cheight:0px;wcalc_source:child;wcalc:25px;wocalc:25px;hcalc:38;rend_px_area:0;rcnt:9;ez_min_text_wdth:25;req_px_area:1560;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="363" instrument_node="">set up</span></i><span data-dcnode-id="361" instrument_node=""> nor to </span><i cwidth="0" data-dcnode-id="359" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:44px;wocalc:44px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[201]/i[2];pagepos:1045;cwidth:44;cheight:0px;wcalc_source:child;wcalc:44px;wocalc:44px;hcalc:38;rend_px_area:0;rcnt:9;ez_min_text_wdth:38;req_px_area:2745.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="360" instrument_node="">put down</span></i><span data-dcnode-id="358" instrument_node="">, neither to
</span><i cwidth="0" data-dcnode-id="356" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:44px;wocalc:44px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[201]/i[3];pagepos:1047;cwidth:44;cheight:0px;wcalc_source:child;wcalc:44px;wocalc:44px;hcalc:19;rend_px_area:0;rcnt:9;ez_min_text_wdth:38;req_px_area:1830.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="357" instrument_node="">make</span></i><span data-dcnode-id="355" instrument_node=""> nor to </span><i cwidth="0" data-dcnode-id="353" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:65px;wocalc:65px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[201]/i[4];pagepos:1049;cwidth:65;cheight:0px;wcalc_source:child;wcalc:65px;wocalc:65px;hcalc:19;rend_px_area:0;rcnt:9;ez_min_text_wdth:56;req_px_area:2704;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="354" instrument_node="">unmake</span></i><span data-dcnode-id="352" instrument_node="">, but to have nothing to do with them.
Wherefore your testimony in whatever light it is viewed serves only to dishonor
your judgment, and for many other reasons had better have been let alone than
published.</span></p><p cwidth="984" data-dcnode-id="349" eza="cwidth:984px;;cheight:38px;;wcalc_source:child;wcalc:79px;wocalc:79px;hcalc:380px;rend_px_area:37392;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[202];pagepos:1051;cwidth:984px;cheight:38px;wcalc_source:child;wcalc:110px;wocalc:79px;hcalc:380;rend_px_area:37392;rcnt:1;ez_min_text_wdth:84;req_px_area:39261.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="350" instrument_node="">First — Because it tends to the decrease and reproach of religion
whatever, and is of the utmost danger to society, to make it a party in
political disputes.</span></p><p cwidth="984" data-dcnode-id="347" eza="cwidth:984px;;cheight:38px;;wcalc_source:child;wcalc:99px;wocalc:99px;hcalc:304px;rend_px_area:37392;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[203];pagepos:1052;cwidth:984px;cheight:38px;wcalc_source:child;wcalc:110px;wocalc:99px;hcalc:304;rend_px_area:37392;rcnt:1;ez_min_text_wdth:112;req_px_area:39261.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="348" instrument_node="">Secondly — Because it exhibits a body of men, numbers of whom disavow
the publishing political testimonies, as being concerned therein and approvers
thereof.</span></p><p cwidth="984" data-dcnode-id="345" eza="cwidth:984px;;cheight:57px;;wcalc_source:child;wcalc:106px;wocalc:106px;hcalc:475px;rend_px_area:56088;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[204];pagepos:1053;cwidth:984px;cheight:57px;wcalc_source:child;wcalc:170px;wocalc:106px;hcalc:475;rend_px_area:56088;rcnt:1;ez_min_text_wdth:112;req_px_area:58892.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="346" instrument_node="">Thirdly — Because it hath a tendency to undo that continental harmony
and friendship which yourselves by your late liberal and charitable donations
hath lent a hand to establish; and the preservation of which, is of the utmost
consequence to us all.</span></p><p cwidth="984" data-dcnode-id="338" eza="cwidth:984px;;cheight:77px;;wcalc_source:child;wcalc:128px;wocalc:128px;hcalc:590px;rend_px_area:75768;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[205];pagepos:1054;cwidth:984px;cheight:77px;wcalc_source:child;wcalc:142px;wocalc:128px;hcalc:590;rend_px_area:75768;rcnt:1;ez_min_text_wdth:140;req_px_area:79556.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="344" instrument_node="">And here, without anger or resentment I bid you farewell. Sincerely wishing,
