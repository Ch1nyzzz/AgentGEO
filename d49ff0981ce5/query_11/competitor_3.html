generalship of Gideon, proposed making him a king, saying, </span><i cwidth="0" data-dcnode-id="1455" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:41px;wocalc:41px;hcalc:228px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[52]/i[1];pagepos:381;cwidth:41;cheight:0px;wcalc_source:child;wcalc:41px;wocalc:41px;hcalc:228;rend_px_area:0;rcnt:9;ez_min_text_wdth:41;req_px_area:12792;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1456" instrument_node="">Rule thou over
us, thou and thy son and thy son's son</span></i><span data-dcnode-id="1454" instrument_node="">. Here was temptation in its fullest
extent; not a kingdom only, but an hereditary one, but Gideon in the piety of
his soul replied, </span><i cwidth="0" data-dcnode-id="1452" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:59px;wocalc:59px;hcalc:209px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[52]/i[2];pagepos:383;cwidth:59;cheight:0px;wcalc_source:child;wcalc:59px;wocalc:59px;hcalc:209;rend_px_area:0;rcnt:9;ez_min_text_wdth:59;req_px_area:14726.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1453" instrument_node="">I will not rule over you, neither shall my son rule over
you</span></i><span data-dcnode-id="1451" instrument_node="">. </span><b cwidth="0" data-dcnode-id="1449" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:44px;wocalc:44px;hcalc:120px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[52]/b;pagepos:385;cwidth:44;cheight:0px;wcalc_source:child;wcalc:44px;wocalc:44px;hcalc:120;rend_px_area:0;rcnt:9;ez_min_text_wdth:44;req_px_area:7321.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1450" instrument_node="">The Lord shall rule over you.</span></b><span data-dcnode-id="1448" instrument_node=""> Words need not be more explicit;
Gideon doth not </span><i cwidth="0" data-dcnode-id="1446" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:59px;wocalc:59px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[52]/i[3];pagepos:387;cwidth:59;cheight:0px;wcalc_source:child;wcalc:59px;wocalc:59px;hcalc:19;rend_px_area:0;rcnt:9;ez_min_text_wdth:59;req_px_area:2454.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1447" instrument_node="">decline</span></i><span data-dcnode-id="1445" instrument_node=""> the honor but denieth their right to give it;
neither doth be compliment them with invented declarations of his thanks, but
in the positive stile of a prophet charges them with disaffection to their
proper sovereign, the King of Heaven.</span></p><p cwidth="984" data-dcnode-id="1432" eza="cwidth:984px;;cheight:172px;;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:1505px;rend_px_area:169248;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[53];pagepos:389;cwidth:984px;cheight:172px;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:1505;rend_px_area:169248;rcnt:1;ez_min_text_wdth:131;req_px_area:177710.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1443" instrument_node="">About one hundred and thirty years after this, they fell again into the same
error. The hankering which the Jews had for the idolatrous customs of the
Heathens, is something exceedingly unaccountable; but so it was, that laying
hold of the misconduct of Samuel's two sons, who were entrusted with some
secular concerns, they came in an abrupt and clamorous manner to Samuel,
saying, </span><i cwidth="0" data-dcnode-id="1441" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:65px;wocalc:65px;hcalc:342px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[53]/i[1];pagepos:391;cwidth:65;cheight:0px;wcalc_source:child;wcalc:65px;wocalc:65px;hcalc:342;rend_px_area:0;rcnt:6;ez_min_text_wdth:65;req_px_area:27040;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1442" instrument_node="">Behold thou art old and thy sons walk not in thy ways, now make us a
king to judge us like all the other nations.</span></i><span data-dcnode-id="1440" instrument_node=""> And here we cannot but observe
that their motives were bad, viz., that they might be like unto other nations,
i.e., the Heathen, whereas their true glory laid in being as much </span><i cwidth="0" data-dcnode-id="1438" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:50px;wocalc:50px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[53]/i[2];pagepos:393;cwidth:50;cheight:0px;wcalc_source:child;wcalc:50px;wocalc:50px;hcalc:19;rend_px_area:0;rcnt:6;ez_min_text_wdth:50;req_px_area:2080;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1439" instrument_node="">unlike</span></i><span data-dcnode-id="1437" instrument_node="">
them as possible. </span><i cwidth="0" data-dcnode-id="1433" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:88px;wocalc:88px;hcalc:670px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[53]/i[3];pagepos:395;cwidth:88;cheight:0px;wcalc_source:child;wcalc:88px;wocalc:88px;hcalc:670;rend_px_area:0;rcnt:6;ez_min_text_wdth:88;req_px_area:73756.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1436" instrument_node="">But the thing displeased Samuel when they said, give us a
king to judge us; and Samuel prayed unto the Lord, and the Lord said unto
Samuel, Hearken unto the voice of the people in all that they say unto thee,
for they have not rejected thee, but they have rejected me, </span><b cwidth="0" data-dcnode-id="1434" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:61px;wocalc:61px;hcalc:120px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[53]/i[3]/b;pagepos:397;cwidth:75;cheight:0px;wcalc_source:child;wcalc:75px;wocalc:61px;hcalc:120;rend_px_area:0;rcnt:2;ez_min_text_wdth:62;req_px_area:9360;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1435" instrument_node="">then I should
not reign over them.</span></b></i></p><p cwidth="984" data-dcnode-id="1392" eza="cwidth:984px;;cheight:592px;;wcalc_source:child;wcalc:133px;wocalc:133px;hcalc:5084px;rend_px_area:582528;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[54];pagepos:398;cwidth:984px;cheight:592px;wcalc_source:child;wcalc:133px;wocalc:133px;hcalc:5084;rend_px_area:582528;rcnt:1;ez_min_text_wdth:140;req_px_area:611654.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><i cwidth="0" data-dcnode-id="1430" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:87px;wocalc:87px;hcalc:760px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[54]/i[1];pagepos:399;cwidth:87;cheight:0px;wcalc_source:child;wcalc:87px;wocalc:87px;hcalc:760;rend_px_area:0;rcnt:20;ez_min_text_wdth:84;req_px_area:81432;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1431" instrument_node="">According to all the works which have done since the day; wherewith they
brought them up out of Egypt, even unto this day; wherewith they have forsaken
me and served other Gods; so do they also unto thee. Now therefore hearken unto
their voice, howbeit, protest solemnly unto them and show them the manner of
the king that shall reign over them,</span></i><span data-dcnode-id="1429" instrument_node=""> i.e., not of any particular king, but
the general manner of the kings of the earth, whom Israel was so eagerly
copying after. And notwithstanding the great distance of time and difference of
manners, the character is still in fashion. </span><i cwidth="0" data-dcnode-id="1427" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:86px;wocalc:86px;hcalc:646px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[54]/i[2];pagepos:401;cwidth:86;cheight:0px;wcalc_source:child;wcalc:86px;wocalc:86px;hcalc:646;rend_px_area:0;rcnt:20;ez_min_text_wdth:84;req_px_area:69763.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1428" instrument_node="">And Samuel told all the words of
the Lord unto the people, that asked of him a king. And he said, This shall be
the manner of the king that shall reign over you; he will take your sons and
appoint them for himself for his chariots, and to be his horsemen, and some
shall run before his chariots</span></i><span data-dcnode-id="1426" instrument_node=""> (this description agrees with the present
mode of impressing men) </span><i cwidth="0" data-dcnode-id="1424" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:437px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[54]/i[3];pagepos:403;cwidth:125;cheight:0px;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:437;rend_px_area:0;rcnt:20;ez_min_text_wdth:125;req_px_area:70200;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1425" instrument_node="">and he will appoint him captains over thousands and
captains over fifties, and will set them to ear his ground and to read his
harvest, and to make his instruments of war, and instruments of his chariots;
and he will take your daughters to be confectionaries and to be cooks and to be
bakers</span></i><span data-dcnode-id="1423" instrument_node=""> (this describes the expense and luxury as well as the oppression of
kings) </span><i cwidth="0" data-dcnode-id="1421" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:84px;wocalc:84px;hcalc:475px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[54]/i[4];pagepos:405;cwidth:84;cheight:0px;wcalc_source:child;wcalc:84px;wocalc:84px;hcalc:475;rend_px_area:0;rcnt:20;ez_min_text_wdth:84;req_px_area:52416;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1422" instrument_node="">and he will take your fields and your olive yards, even the best of
them, and give them to his servants; and he will take the tenth of your seed,
and of your vineyards, and give them to his officers and to his servants</span></i><span data-dcnode-id="1420" instrument_node="">
(by which we see that bribery, corruption, and favoritism are the standing
vices of kings) </span><i cwidth="0" data-dcnode-id="1415" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:104px;wocalc:104px;hcalc:670px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[54]/i[5];pagepos:407;cwidth:104;cheight:0px;wcalc_source:child;wcalc:104px;wocalc:104px;hcalc:670;rend_px_area:0;rcnt:20;ez_min_text_wdth:84;req_px_area:81432;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1419" instrument_node="">and he will take the tenth of your men servants, and your
maid servants, and your goodliest young men and your asses, and put them to his
work; and he will take the tenth of your sheep, and ye shall be his servants,
and ye shall cry out in that day because of your king which ye shall have
chosen, </span><b cwidth="0" data-dcnode-id="1417" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:42px;wocalc:42px;hcalc:200px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[54]/i[5]/b;pagepos:409;cwidth:75;cheight:0px;wcalc_source:child;wcalc:75px;wocalc:42px;hcalc:200;rend_px_area:0;rcnt:3;ez_min_text_wdth:42;req_px_area:10920;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1418" instrument_node="">and the Lord will not hear you in that day</span></b><span data-dcnode-id="1416" instrument_node="">.</span></i><span data-dcnode-id="1414" instrument_node=""> This accounts
for the continuation of monarchy; neither do the characters of the few good
kings which have lived since, either sanctify the title, or blot out the
sinfulness of the origin; the high encomium given of David takes no notice of
him </span><i cwidth="0" data-dcnode-id="1412" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:70px;wocalc:70px;hcalc:57px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[54]/i[6];pagepos:412;cwidth:70;cheight:0px;wcalc_source:child;wcalc:70px;wocalc:70px;hcalc:57;rend_px_area:0;rcnt:20;ez_min_text_wdth:70;req_px_area:5824;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1413" instrument_node="">officially as a king</span></i><span data-dcnode-id="1411" instrument_node="">, but only as a </span><i cwidth="0" data-dcnode-id="1409" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:35px;wocalc:35px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[54]/i[7];pagepos:414;cwidth:35;cheight:0px;wcalc_source:child;wcalc:35px;wocalc:35px;hcalc:19;rend_px_area:0;rcnt:20;ez_min_text_wdth:28;req_px_area:1048.32;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1410" instrument_node="">man</span></i><span data-dcnode-id="1408" instrument_node=""> after God's own
heart. </span><i cwidth="0" data-dcnode-id="1406" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:107px;wocalc:107px;hcalc:380px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[54]/i[8];pagepos:416;cwidth:107;cheight:0px;wcalc_source:child;wcalc:107px;wocalc:107px;hcalc:380;rend_px_area:0;rcnt:20;ez_min_text_wdth:107;req_px_area:53414.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1407" instrument_node="">Nevertheless the People refused to obey the voice of Samuel, and they
said, Nay, but we will have a king over us, that we may be like all the
nations, and that our king may judge us, and go out before us and fight our
battles.</span></i><span data-dcnode-id="1405" instrument_node=""> Samuel continued to reason with them, but to no purpose; he set
before them their ingratitude, but all would not avail; and seeing them fully
bent on their folly, he cried out, </span><i cwidth="0" data-dcnode-id="1403" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:65px;wocalc:65px;hcalc:209px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[54]/i[9];pagepos:418;cwidth:65;cheight:0px;wcalc_source:child;wcalc:65px;wocalc:65px;hcalc:209;rend_px_area:0;rcnt:20;ez_min_text_wdth:65;req_px_area:14872;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1404" instrument_node="">I will call unto the Lord, and he shall
sent thunder and rain</span></i><span data-dcnode-id="1402" instrument_node=""> (which then was a punishment, being the time of wheat
harvest) </span><i cwidth="0" data-dcnode-id="1394" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:113px;wocalc:113px;hcalc:692px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[54]/i[10];pagepos:420;cwidth:113;cheight:0px;wcalc_source:child;wcalc:113px;wocalc:113px;hcalc:692;rend_px_area:0;rcnt:20;ez_min_text_wdth:94;req_px_area:100578.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1401" instrument_node="">that ye may perceive and see that your wickedness is great which ye
have done in the sight of the Lord, </span><b cwidth="0" data-dcnode-id="1399" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:60px;wocalc:60px;hcalc:80px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[54]/i[10]/b[1];pagepos:422;cwidth:60;cheight:0px;wcalc_source:child;wcalc:60px;wocalc:60px;hcalc:80;rend_px_area:0;rcnt:5;ez_min_text_wdth:60;req_px_area:5616;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1400" instrument_node="">in asking you a king</span></b><span data-dcnode-id="1398" instrument_node="">. So Samuel
called unto the Lord, and the Lord sent thunder and rain that day, and all the
people greatly feared the Lord and Samuel. And all the people said unto Samuel,
Pray for thy servants unto the Lord thy God that we die not, for </span><b cwidth="0" data-dcnode-id="1396" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:55px;wocalc:55px;hcalc:220px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[54]/i[10]/b[2];pagepos:424;cwidth:75;cheight:0px;wcalc_source:child;wcalc:75px;wocalc:55px;hcalc:220;rend_px_area:0;rcnt:5;ez_min_text_wdth:52;req_px_area:13260;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1397" instrument_node="">we have
added unto our sins this evil, to ask a king</span></b><span data-dcnode-id="1395" instrument_node="">.</span></i><span data-dcnode-id="1393" instrument_node=""> These portions of
scripture are direct and positive. They admit of no equivocal construction.
That the Almighty hath here entered his protest against monarchial government
is true, or the scripture is false. And a man hath good reason to believe that
there is as much of kingcraft, as priestcraft in withholding the scripture from
the public in Popish countries. For monarchy in every instance is the Popery of
government.</span></p><p cwidth="984" data-dcnode-id="1378" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:133px;wocalc:133px;hcalc:988px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[55];pagepos:427;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:133px;wocalc:133px;hcalc:988;rend_px_area:112176;rcnt:1;ez_min_text_wdth:140;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1391" instrument_node="">To the evil of monarchy we have added that of hereditary succession; and as
the first is a degradation and lessening of ourselves, so the second, claimed
as a matter of right, is an insult and an imposition on posterity. For all men
being originally equals, no </span><i cwidth="0" data-dcnode-id="1389" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:30px;wocalc:30px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[55]/i[1];pagepos:429;cwidth:30;cheight:0px;wcalc_source:child;wcalc:30px;wocalc:30px;hcalc:19;rend_px_area:0;rcnt:9;ez_min_text_wdth:28;req_px_area:1248;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1390" instrument_node="">one</span></i><span data-dcnode-id="1388" instrument_node=""> by </span><i cwidth="0" data-dcnode-id="1386" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:40px;wocalc:40px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[55]/i[2];pagepos:431;cwidth:40;cheight:0px;wcalc_source:child;wcalc:40px;wocalc:40px;hcalc:19;rend_px_area:0;rcnt:9;ez_min_text_wdth:40;req_px_area:1664;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1387" instrument_node="">birth</span></i><span data-dcnode-id="1385" instrument_node=""> could have a right to
set up his own family in perpetual preference to all others for ever, and
though himself might deserve some decent degree of honors of his
contemporaries, yet his descendants might be far too unworthy to inherit them.
One of the strongest </span><i cwidth="0" data-dcnode-id="1383" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:59px;wocalc:59px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[55]/i[3];pagepos:433;cwidth:59;cheight:0px;wcalc_source:child;wcalc:59px;wocalc:59px;hcalc:19;rend_px_area:0;rcnt:9;ez_min_text_wdth:59;req_px_area:2454.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1384" instrument_node="">natural</span></i><span data-dcnode-id="1382" instrument_node=""> proofs of the folly of hereditary right in
kings, is, that nature disapproves it, otherwise she would not so frequently
turn it into ridicule by giving mankind an </span><i cwidth="0" data-dcnode-id="1380" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:31px;wocalc:31px;hcalc:76px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[55]/i[4];pagepos:435;cwidth:31;cheight:0px;wcalc_source:child;wcalc:31px;wocalc:31px;hcalc:76;rend_px_area:0;rcnt:9;ez_min_text_wdth:31;req_px_area:3868.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1381" instrument_node="">ass for a lion</span></i><span data-dcnode-id="1379" instrument_node="">.</span></p><p cwidth="984" data-dcnode-id="1370" eza="cwidth:984px;;cheight:152px;;wcalc_source:child;wcalc:103px;wocalc:103px;hcalc:1577px;rend_px_area:149568;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[56];pagepos:437;cwidth:984px;cheight:152px;wcalc_source:child;wcalc:103px;wocalc:103px;hcalc:1577;rend_px_area:149568;rcnt:1;ez_min_text_wdth:122;req_px_area:157046.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1377" instrument_node="">Secondly, as no man at first could possess any other public honors than were
bestowed upon him, so the givers of those honors could have no power to give
away the right of posterity, and though they might say, "We choose you for
</span><i cwidth="0" data-dcnode-id="1375" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:28px;wocalc:28px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[56]/i[1];pagepos:439;cwidth:28;cheight:0px;wcalc_source:child;wcalc:28px;wocalc:28px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:28;req_px_area:1164.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1376" instrument_node="">our</span></i><span data-dcnode-id="1374" instrument_node=""> head," they could not, without manifest injustice to their children,
say, "that your children and your children's children shall reign over
</span><i cwidth="0" data-dcnode-id="1372" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:36px;wocalc:36px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[56]/i[2];pagepos:441;cwidth:36;cheight:0px;wcalc_source:child;wcalc:36px;wocalc:36px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:36;req_px_area:1497.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1373" instrument_node="">ours</span></i><span data-dcnode-id="1371" instrument_node=""> for ever." Because such an unwise, unjust, unnatural compact might
(perhaps) in the next succession put them under the government of a rogue or a
fool. Most wise men, in their private sentiments, have ever treated hereditary
right with contempt; yet it is one of those evils, which when once established
is not easily removed; many submit from fear, others from superstition, and the
more powerful part shares with the king the plunder of the rest.</span></p><p cwidth="984" data-dcnode-id="1368" eza="cwidth:984px;;cheight:266px;;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:2565px;rend_px_area:261744;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[57];pagepos:443;cwidth:984px;cheight:266px;wcalc_source:child;wcalc:220px;wocalc:120px;hcalc:2565;rend_px_area:261744;rcnt:1;ez_min_text_wdth:131;req_px_area:274831.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1369" instrument_node="">This is supposing the present race of kings in the world to have had an
honorable origin; whereas it is more than probable, that could we take off the
dark covering of antiquity, and trace them to their first rise, that we should
find the first of them nothing better than the principal ruffian of some
restless gang, whose savage manners of preeminence in subtlety obtained him the
title of chief among plunderers; and who by increasing in power, and extending
his depredations, overawed the quiet and defenseless to purchase their safety
by frequent contributions. Yet his electors could have no idea of giving
hereditary right to his descendants, because such a perpetual exclusion of
themselves was incompatible with the free and unrestrained principles they
professed to live by. Wherefore, hereditary succession in the early ages of
monarchy could not take place as a matter of claim, but as something casual or
complemental; but as few or no records were extant in those days, and
traditionary history stuffed with fables, it was very easy, after the lapse of
a few generations, to trump up some superstitious tale, conveniently timed,
Mahomet like, to cram hereditary right down the throats of the vulgar. Perhaps
the disorders which threatened, or seemed to threaten on the decease of a
leader and the choice of a new one (for elections among ruffians could not be
very orderly) induced many at first to favor hereditary pretensions; by which
means it happened, as it hath happened since, that what at first was submitted
to as a convenience, was afterwards claimed as a right.</span></p><p cwidth="984" data-dcnode-id="1363" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:118px;wocalc:118px;hcalc:1102px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[58];pagepos:444;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:118px;wocalc:118px;hcalc:1102;rend_px_area:112176;rcnt:1;ez_min_text_wdth:122;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1367" instrument_node="">England, since the conquest, hath known some few good monarchs, but groaned
beneath a much larger number of bad ones, yet no man in his senses can say that
their claim under William the Conqueror is a very honorable one. A French
bastard landing with an armed </span><i cwidth="0" data-dcnode-id="1365" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:64px;wocalc:64px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[58]/i;pagepos:446;cwidth:64;cheight:0px;wcalc_source:child;wcalc:64px;wocalc:64px;hcalc:19;rend_px_area:0;rcnt:3;ez_min_text_wdth:64;req_px_area:2662.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1366" instrument_node="">banditti</span></i><span data-dcnode-id="1364" instrument_node="">, and establishing himself king of
England against the consent of the natives, is in plain terms a very paltry
rascally original. It certainly hath no divinity in it. However, it is needless
to spend much time in exposing the folly of hereditary right, if there are any
so weak as to believe it, let them promiscuously worship the ass and lion, and
welcome. I shall neither copy their humility, nor disturb their devotion.</span></p><p cwidth="984" data-dcnode-id="1358" eza="cwidth:984px;;cheight:228px;;wcalc_source:child;wcalc:114px;wocalc:114px;hcalc:2242px;rend_px_area:224352;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[59];pagepos:448;cwidth:984px;cheight:228px;wcalc_source:child;wcalc:114px;wocalc:114px;hcalc:2242;rend_px_area:224352;rcnt:1;ez_min_text_wdth:112;req_px_area:235569.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1362" instrument_node="">Yet I should be glad to ask how they suppose kings came at first? The
question admits but of three answers, viz., either by lot, by election, or by
usurpation. If the first king was taken by lot, it establishes a precedent for
the next, which excludes hereditary succession. Saul was by lot, yet the
succession was not hereditary, neither does it appear from that transaction
there was any intention it ever should. If the first king of any country was by
election, that likewise establishes a precedent for the next; for to say, that
the </span><i cwidth="0" data-dcnode-id="1360" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:40px;wocalc:40px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[59]/i;pagepos:450;cwidth:40;cheight:0px;wcalc_source:child;wcalc:40px;wocalc:40px;hcalc:19;rend_px_area:0;rcnt:3;ez_min_text_wdth:40;req_px_area:1664;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1361" instrument_node="">right</span></i><span data-dcnode-id="1359" instrument_node=""> of all future generations is taken away, by the act of the
first electors, in their choice not only of a king, but of a family of kings
for ever, hath no parallel in or out of scripture but the doctrine of original
sin, which supposes the free will of all men lost in Adam; and from such
comparison, and it will admit of no other, hereditary succession can derive no
glory. For as in Adam all sinned, and as in the first electors all men obeyed;
as in the one all mankind were subjected to Satan, and in the other to
Sovereignty; as our innocence was lost in the first, and our authority in the
last; and as both disable us from reassuming some former state and privilege,
it unanswerably follows that original sin and hereditary succession are
parallels. Dishonorable rank! Inglorious connection! Yet the most subtle
sophist cannot produce a juster simile.</span></p><p cwidth="984" data-dcnode-id="1356" eza="cwidth:984px;;cheight:38px;;wcalc_source:child;wcalc:108px;wocalc:108px;hcalc:380px;rend_px_area:37392;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[60];pagepos:452;cwidth:984px;cheight:38px;wcalc_source:child;wcalc:110px;wocalc:108px;hcalc:380;rend_px_area:37392;rcnt:1;ez_min_text_wdth:122;req_px_area:39261.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1357" instrument_node="">As to usurpation, no man will be so hardy as to defend it; and that William
the Conqueror was an usurper is a fact not to be contradicted. The plain truth
is, that the antiquity of English monarchy will not bear looking into.</span></p><p cwidth="984" data-dcnode-id="1345" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:1444px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[61];pagepos:453;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:1444;rend_px_area:112176;rcnt:1;ez_min_text_wdth:103;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1355" instrument_node="">But it is not so much the absurdity as the evil of hereditary succession
which concerns mankind. Did it ensure a race of good and wise men it would have
the seal of divine authority, but as it opens a door to the </span><i cwidth="0" data-dcnode-id="1353" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:54px;wocalc:54px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[61]/i[1];pagepos:455;cwidth:54;cheight:0px;wcalc_source:child;wcalc:54px;wocalc:54px;hcalc:19;rend_px_area:0;rcnt:7;ez_min_text_wdth:54;req_px_area:2246.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1354" instrument_node="">foolish</span></i><span data-dcnode-id="1352" instrument_node="">, the
</span><i cwidth="0" data-dcnode-id="1350" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:58px;wocalc:58px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[61]/i[2];pagepos:457;cwidth:58;cheight:0px;wcalc_source:child;wcalc:58px;wocalc:58px;hcalc:19;rend_px_area:0;rcnt:7;ez_min_text_wdth:56;req_px_area:2412.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1351" instrument_node="">wicked</span></i><span data-dcnode-id="1349" instrument_node="">; and the </span><i cwidth="0" data-dcnode-id="1347" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:76px;wocalc:76px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[61]/i[3];pagepos:459;cwidth:76;cheight:0px;wcalc_source:child;wcalc:76px;wocalc:76px;hcalc:19;rend_px_area:0;rcnt:7;ez_min_text_wdth:75;req_px_area:3161.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1348" instrument_node="">improper</span></i><span data-dcnode-id="1346" instrument_node="">, it hath in it the nature of oppression.
Men who look upon themselves born to reign, and others to obey, soon grow
insolent; selected from the rest of mankind their minds are early poisoned by
importance; and the world they act in differs so materially from the world at
large, that they have but little opportunity of knowing its true interests, and
when they succeed to the government are frequently the most ignorant and unfit
of any throughout the dominions.</span></p><p cwidth="984" data-dcnode-id="1343" eza="cwidth:984px;;cheight:95px;;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:1007px;rend_px_area:93480;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[62];pagepos:461;cwidth:984px;cheight:95px;wcalc_source:child;wcalc:170px;wocalc:98px;hcalc:1007;rend_px_area:93480;rcnt:1;ez_min_text_wdth:112;req_px_area:98154;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1344" instrument_node="">Another evil which attends hereditary succession is, that the throne is
subject to be possessed by a minor at any age; all which time the regency,
acting under the cover of a king, have every opportunity and inducement to
betray their trust. The same national misfortune happens, when a king worn out
with age and infirmity, enters the last stage of human weakness. In both these
cases the public becomes a prey to every miscreant, who can tamper successfully
with the follies either of age or infancy.</span></p><p cwidth="984" data-dcnode-id="1341" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:94px;wocalc:94px;hcalc:1216px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[63];pagepos:462;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:200px;wocalc:94px;hcalc:1216;rend_px_area:112176;rcnt:1;ez_min_text_wdth:103;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1342" instrument_node="">The most plausible plea, which hath ever been offered in favor of hereditary
succession, is, that it preserves a nation from civil wars; and were this true,
it would be weighty; whereas, it is the most barefaced falsity ever imposed
upon mankind. The whole history of England disowns the fact. Thirty kings and
two minors have reigned in that distracted kingdom since the conquest, in which
time there have been (including the Revolution) no less than eight civil wars
and nineteen rebellions. Wherefore instead of making for peace, it makes
against it, and destroys the very foundation it seems to stand on.</span></p><p cwidth="984" data-dcnode-id="1339" eza="cwidth:984px;;cheight:133px;;wcalc_source:child;wcalc:93px;wocalc:93px;hcalc:1558px;rend_px_area:130872;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[64];pagepos:463;cwidth:984px;cheight:133px;wcalc_source:child;wcalc:200px;wocalc:93px;hcalc:1558;rend_px_area:130872;rcnt:1;ez_min_text_wdth:103;req_px_area:137415.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1340" instrument_node="">The contest for monarchy and succession, between the houses of York and
Lancaster, laid England in a scene of blood for many years. Twelve pitched
battles, besides skirmishes and sieges, were fought between Henry and Edward.
Twice was Henry prisoner to Edward, who in his turn was prisoner to Henry. And
so uncertain is the fate of war and the temper of a nation, when nothing but
personal matters are the ground of a quarrel, that Henry was taken in triumph
from a prison to a palace, and Edward obliged to fly from a palace to a foreign
land; yet, as sudden transitions of temper are seldom lasting, Henry in his
turn was driven from the throne, and Edward recalled to succeed him. The
parliament always following the strongest side.</span></p><p cwidth="984" data-dcnode-id="1337" eza="cwidth:984px;;cheight:38px;;wcalc_source:child;wcalc:105px;wocalc:105px;hcalc:342px;rend_px_area:37392;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[65];pagepos:464;cwidth:984px;cheight:38px;wcalc_source:child;wcalc:110px;wocalc:105px;hcalc:342;rend_px_area:37392;rcnt:1;ez_min_text_wdth:112;req_px_area:39261.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1338" instrument_node="">This contest began in the reign of Henry the Sixth, and was not entirely
extinguished till Henry the Seventh, in whom the families were united.
Including a period of 67 years, viz., from 1422 to 1489.</span></p><p cwidth="984" data-dcnode-id="1335" eza="cwidth:984px;;cheight:38px;;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:437px;rend_px_area:37392;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[66];pagepos:465;cwidth:984px;cheight:38px;wcalc_source:child;wcalc:110px;wocalc:98px;hcalc:437;rend_px_area:37392;rcnt:1;ez_min_text_wdth:94;req_px_area:39261.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1336" instrument_node="">In short, monarchy and succession have laid (not this or that kingdom only)
but the world in blood and ashes. 'Tis a form of government which the word of
God bears testimony against, and blood will attend it.</span></p><p cwidth="984" data-dcnode-id="1330" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:95px;wocalc:95px;hcalc:1254px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[67];pagepos:466;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:95px;wocalc:95px;hcalc:1254;rend_px_area:112176;rcnt:1;ez_min_text_wdth:94;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1334" instrument_node="">If we inquire into the business of a king, we shall find that (in some
countries they have none) and after sauntering away their lives without
pleasure to themselves or advantage to the nation, withdraw from the scene, and
leave their successors to tread the same idle round. In absolute monarchies the
whole weight of business civil and military, lies on the king; the children of
Israel in their request for a king, urged this plea "that he may judge us, and
go out before us and fight our battles." But in countries where he is neither a
judge nor a general, as in England, a man would be puzzled to know what
</span><i cwidth="0" data-dcnode-id="1332" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:14px;wocalc:14px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[67]/i;pagepos:468;cwidth:14;cheight:0px;wcalc_source:child;wcalc:14px;wocalc:14px;hcalc:19;rend_px_area:0;rcnt:3;ez_min_text_wdth:14;req_px_area:582.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1333" instrument_node="">is</span></i><span data-dcnode-id="1331" instrument_node=""> his business.</span></p><p cwidth="984" data-dcnode-id="1328" eza="cwidth:984px;;cheight:171px;;wcalc_source:child;wcalc:119px;wocalc:119px;hcalc:1615px;rend_px_area:168264;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[68];pagepos:470;cwidth:984px;cheight:171px;wcalc_source:child;wcalc:200px;wocalc:119px;hcalc:1615;rend_px_area:168264;rcnt:1;ez_min_text_wdth:122;req_px_area:176677.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1329" instrument_node="">The nearer any government approaches to a republic, the less business there
is for a king. It is somewhat difficult to find a proper name for the
government of England. Sir William Meredith calls it a republic; but in its
present state it is unworthy of the name, because the corrupt influence If the
crown, by having all the places in its disposal, hath so effectually swallowed
up the power, and eaten out the virtue of the house of commons (the republican
part in the constitution) that the government of England is nearly as
monarchical as that of France or Spain. Men fall out with names without
understanding them. For it is the republican and not the monarchical part of
the constitution of England which Englishmen glory in, viz., the liberty of
choosing a house of commons from out of their own body — and it is easy
to see that when the republican virtue fails, slavery ensues. My is the
constitution of England sickly, but because monarchy hath poisoned the
republic, the crown hath engrossed the commons?</span></p><p cwidth="984" data-dcnode-id="1326" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:95px;wocalc:95px;hcalc:798px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[69];pagepos:471;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:170px;wocalc:95px;hcalc:798;rend_px_area:74784;rcnt:1;ez_min_text_wdth:94;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1327" instrument_node="">In England a king hath little more to do than to make war and give away
places; which in plain terms, is to impoverish the nation and set it together
by the ears. A pretty business indeed for a man to be allowed eight hundred
thousand sterling a year for, and worshipped into the bargain! Of more worth is
one honest man to society, and in the sight of God, than all the crowned
ruffians that ever lived.</span></p><p cwidth="984" data-dcnode-id="1322" eza="cwidth:984px;;cheight:20px;;wcalc_source:child;wcalc:86px;wocalc:86px;hcalc:120px;rend_px_area:19680;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[70];pagepos:472;cwidth:984px;cheight:20px;wcalc_source:child;wcalc:94px;wocalc:86px;hcalc:120;rend_px_area:19680;rcnt:1;ez_min_text_wdth:75;req_px_area:12521.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><b cwidth="0" data-dcnode-id="1323" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:94px;wocalc:94px;hcalc:120px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[70]/b;pagepos:473;cwidth:94;cheight:0px;wcalc_source:child;wcalc:94px;wocalc:94px;hcalc:120;rend_px_area:0;rcnt:1;ez_min_text_wdth:83;req_px_area:12521.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><a cwidth="0" data-dcnode-id="1324" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:86px;wocalc:86px;hcalc:120px;rend_px_area:0;" name="part3" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[70]/b/a;pagepos:474;cwidth:86;cheight:0px;wcalc_source:child;wcalc:86px;wocalc:86px;hcalc:120;rend_px_area:0;rcnt:1;ez_min_text_wdth:83;req_px_area:12521.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1325" instrument_node="">Thoughts of the present state of American
affairs</span></a></b></p><p cwidth="984" data-dcnode-id="1312" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:665px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[71];pagepos:475;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:665;rend_px_area:74784;rcnt:1;ez_min_text_wdth:131;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><i cwidth="0" data-dcnode-id="1320" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:17px;wocalc:17px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[71]/i[1];pagepos:476;cwidth:17;cheight:0px;wcalc_source:child;wcalc:17px;wocalc:17px;hcalc:19;rend_px_area:0;rcnt:6;ez_min_text_wdth:17;req_px_area:707.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1321" instrument_node="">In</span></i><span data-dcnode-id="1319" instrument_node=""> the following pages I offer nothing more than simple facts, plain
arguments, and common sense; and have no other preliminaries to settle with the
reader, than that he will divest himself of prejudice and prepossession, and
suffer his reason and his feelings to determine for themselves; that he will
put </span><i cwidth="0" data-dcnode-id="1317" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:20px;wocalc:20px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[71]/i[2];pagepos:478;cwidth:20;cheight:0px;wcalc_source:child;wcalc:20px;wocalc:20px;hcalc:19;rend_px_area:0;rcnt:6;ez_min_text_wdth:19;req_px_area:832;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1318" instrument_node="">on</span></i><span data-dcnode-id="1316" instrument_node="">, or rather that he will not put </span><i cwidth="0" data-dcnode-id="1314" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:22px;wocalc:22px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[71]/i[3];pagepos:480;cwidth:22;cheight:0px;wcalc_source:child;wcalc:22px;wocalc:22px;hcalc:19;rend_px_area:0;rcnt:6;ez_min_text_wdth:22;req_px_area:915.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1315" instrument_node="">off</span></i><span data-dcnode-id="1313" instrument_node=""> the true character of
a man, and generously enlarge his views beyond the present day.</span></p><p cwidth="984" data-dcnode-id="1310" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:99px;wocalc:99px;hcalc:798px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[72];pagepos:482;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:170px;wocalc:99px;hcalc:798;rend_px_area:74784;rcnt:1;ez_min_text_wdth:112;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1311" instrument_node="">Volumes have been written on the subject of the struggle between England and
America. Men of all ranks have embarked in the controversy, from different
motives, and with various designs; but all have been ineffectual, and the
period of debate is closed. Arms, as the last resource, decide the contest; the
appeal was the choice of the king, and the continent hath accepted the
challenge.</span></p><p cwidth="984" data-dcnode-id="1305" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:104px;wocalc:104px;hcalc:779px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[73];pagepos:483;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:104px;wocalc:104px;hcalc:779;rend_px_area:74784;rcnt:1;ez_min_text_wdth:112;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1309" instrument_node="">It hath been reported of the late Mr. Pelham (who tho' an able minister was
not without his faults) that on his being attacked in the house of commons, on
the score, that his measures were only of a temporary kind, replied, </span><i cwidth="0" data-dcnode-id="1307" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:49px;wocalc:49px;hcalc:95px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[73]/i;pagepos:485;cwidth:49;cheight:0px;wcalc_source:child;wcalc:49px;wocalc:49px;hcalc:95;rend_px_area:0;rcnt:3;ez_min_text_wdth:49;req_px_area:6624.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1308" instrument_node="">"they
will fast my time."</span></i><span data-dcnode-id="1306" instrument_node=""> Should a thought so fatal and unmanly possess the
colonies in the present contest, the name of ancestors will be remembered by
future generations with detestation.</span></p><p cwidth="984" data-dcnode-id="1303" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:100px;wocalc:100px;hcalc:1159px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[74];pagepos:487;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:200px;wocalc:100px;hcalc:1159;rend_px_area:112176;rcnt:1;ez_min_text_wdth:103;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1304" instrument_node="">The sun never shined on a cause of greater worth. 'Tis not the affair of a
city, a country, a province, or a kingdom, but of a continent — of at
least one eighth part of the habitable globe. 'Tis not the concern of a day, a
year, or an age; posterity are virtually involved in the contest, and will be
more or less affected, even to the end of time, by the proceedings now. Now is
the seed time of continental union, faith and honor. The least fracture now
will be like a name engraved with the point of a pin on the tender rind of a
young oak; The wound will enlarge with the tree, and posterity read it in full
grown characters.</span></p><p cwidth="984" data-dcnode-id="1301" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:129px;wocalc:129px;hcalc:988px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[75];pagepos:488;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:200px;wocalc:129px;hcalc:988;rend_px_area:112176;rcnt:1;ez_min_text_wdth:112;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1302" instrument_node="">By referring the matter from argument to arms, a new area for politics is
struck; a new method of thinking hath arisen. All plans, proposals, etc. prior
to the nineteenth of April, i.e., to the commencement of hostilities, are like
the almanacs of the last year; which, though proper then, are superseded and
useless now. Whatever was advanced by the advocates on either side of the
question then, terminated in one and the same point, viz., a union with Great
Britain; the only difference between the parties was the method of effecting
it; the one proposing force, the other friendship; but it hath so far happened
that the first hath failed, and the second hath withdrawn her influence.</span></p><p cwidth="984" data-dcnode-id="1299" eza="cwidth:984px;;cheight:95px;;wcalc_source:child;wcalc:117px;wocalc:117px;hcalc:893px;rend_px_area:93480;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[76];pagepos:489;cwidth:984px;cheight:95px;wcalc_source:child;wcalc:170px;wocalc:117px;hcalc:893;rend_px_area:93480;rcnt:1;ez_min_text_wdth:140;req_px_area:98154;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1300" instrument_node="">As much hath been said of the advantages of reconciliation, which, like an
agreeable dream, hath passed away and left us as we were, it is but right, that
we should examine the contrary side of the argument, and inquire into some of
the many material injuries which these colonies sustain, and always will
sustain, by being connected with, and dependent on Great Britain. To examine
that connection and dependence, on the principles of nature and common sense,
to see what we have to trust to, if separated, and what we are to expect, if
dependant.</span></p><p cwidth="984" data-dcnode-id="1297" eza="cwidth:984px;;cheight:133px;;wcalc_source:child;wcalc:95px;wocalc:95px;hcalc:1653px;rend_px_area:130872;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[77];pagepos:490;cwidth:984px;cheight:133px;wcalc_source:child;wcalc:200px;wocalc:95px;hcalc:1653;rend_px_area:130872;rcnt:1;ez_min_text_wdth:103;req_px_area:137415.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1298" instrument_node="">I have heard it asserted by some, that as America hath flourished under her
former connection with Great Britain, that the same connection is necessary
towards her future happiness, and will always have the same effect. Nothing can
be more fallacious than this kind of argument. We may as well assert, that
because a child has thrived upon milk, that it is never to have meat; or that
the first twenty years of our lives is to become a precedent for the next
twenty. But even this is admitting more than is true, for I answer roundly,
that America would have flourished as much, and probably much more, had no
European power had any thing to do with her. The commerce by which she hath
enriched herself are the necessaries of life, and will always have a market
while eating is the custom of Europe.</span></p><p cwidth="984" data-dcnode-id="1295" eza="cwidth:984px;;cheight:57px;;wcalc_source:child;wcalc:84px;wocalc:84px;hcalc:589px;rend_px_area:56088;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[78];pagepos:491;cwidth:984px;cheight:57px;wcalc_source:child;wcalc:110px;wocalc:84px;hcalc:589;rend_px_area:56088;rcnt:1;ez_min_text_wdth:84;req_px_area:57200;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1296" instrument_node="">But she has protected us, say some. That she hath engrossed us is true, and
defended the continent at our expense as well as her own is admitted, and she
would have defended Turkey from the same motive, viz., the sake of trade and
dominion.</span></p><p cwidth="984" data-dcnode-id="1275" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:104px;wocalc:104px;hcalc:1235px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[79];pagepos:492;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:104px;wocalc:104px;hcalc:1235;rend_px_area:112176;rcnt:1;ez_min_text_wdth:122;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1294" instrument_node="">Alas, we have been long led away by ancient prejudices and made large
sacrifices to superstition. We have boasted the protection of Great Britain,
without considering, that her motive was </span><i cwidth="0" data-dcnode-id="1292" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:64px;wocalc:64px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[79]/i[1];pagepos:494;cwidth:64;cheight:0px;wcalc_source:child;wcalc:64px;wocalc:64px;hcalc:19;rend_px_area:0;rcnt:13;ez_min_text_wdth:64;req_px_area:2662.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1293" instrument_node="">interest</span></i><span data-dcnode-id="1291" instrument_node=""> not </span><i cwidth="0" data-dcnode-id="1289" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:93px;wocalc:93px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[79]/i[2];pagepos:496;cwidth:93;cheight:0px;wcalc_source:child;wcalc:93px;wocalc:93px;hcalc:19;rend_px_area:0;rcnt:13;ez_min_text_wdth:93;req_px_area:3868.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1290" instrument_node="">attachment</span></i><span data-dcnode-id="1288" instrument_node="">;
that she did not protect us from our </span><i cwidth="0" data-dcnode-id="1286" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:68px;wocalc:68px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[79]/i[3];pagepos:498;cwidth:68;cheight:0px;wcalc_source:child;wcalc:68px;wocalc:68px;hcalc:19;rend_px_area:0;rcnt:13;ez_min_text_wdth:66;req_px_area:2828.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1287" instrument_node="">enemies</span></i><span data-dcnode-id="1285" instrument_node=""> on </span><i cwidth="0" data-dcnode-id="1283" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:65px;wocalc:65px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[79]/i[4];pagepos:500;cwidth:65;cheight:0px;wcalc_source:child;wcalc:65px;wocalc:65px;hcalc:38;rend_px_area:0;rcnt:13;ez_min_text_wdth:65;req_px_area:3380;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1284" instrument_node="">our account</span></i><span data-dcnode-id="1282" instrument_node="">, but
from her enemies on her own account, from those who had no quarrel with us on
any </span><i cwidth="0" data-dcnode-id="1280" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:65px;wocalc:65px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[79]/i[5];pagepos:502;cwidth:65;cheight:0px;wcalc_source:child;wcalc:65px;wocalc:65px;hcalc:38;rend_px_area:0;rcnt:13;ez_min_text_wdth:65;req_px_area:4056;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1281" instrument_node="">other account</span></i><span data-dcnode-id="1279" instrument_node="">, and who will always be our enemies on the </span><i cwidth="0" data-dcnode-id="1277" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:65px;wocalc:65px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[79]/i[6];pagepos:504;cwidth:65;cheight:0px;wcalc_source:child;wcalc:65px;wocalc:65px;hcalc:38;rend_px_area:0;rcnt:13;ez_min_text_wdth:65;req_px_area:4056;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1278" instrument_node="">same
account</span></i><span data-dcnode-id="1276" instrument_node="">. Let Britain wave her pretensions to the continent, or the
continent throw off the dependence, and we should be at peace with France and
Spain were they at war with Britain. The miseries of Hanover last war, ought to
warn us against connections.</span></p><p cwidth="984" data-dcnode-id="1267" eza="cwidth:984px;;cheight:95px;;wcalc_source:child;wcalc:106px;wocalc:106px;hcalc:950px;rend_px_area:93480;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[80];pagepos:506;cwidth:984px;cheight:95px;wcalc_source:child;wcalc:106px;wocalc:106px;hcalc:950;rend_px_area:93480;rcnt:1;ez_min_text_wdth:112;req_px_area:98154;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1274" instrument_node="">It hath lately been asserted in parliament, that the colonies have no
relation to each other but through the parent country, i.e., that Pennsylvania
and the Jerseys, and so on for the rest, are sister colonies by the way of
England; this is certainly a very roundabout way of proving relation ship, but
it is the nearest and only true way of proving enemyship, if I may so call it.
France and Spain never were, nor perhaps ever will be our enemies as
</span><i cwidth="0" data-dcnode-id="1272" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:86px;wocalc:86px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[80]/i[1];pagepos:508;cwidth:86;cheight:0px;wcalc_source:child;wcalc:86px;wocalc:86px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:84;req_px_area:3577.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1273" instrument_node="">Americans</span></i><span data-dcnode-id="1271" instrument_node="">, but as our being the </span><i cwidth="0" data-dcnode-id="1269" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:67px;wocalc:67px;hcalc:57px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[80]/i[2];pagepos:510;cwidth:67;cheight:0px;wcalc_source:child;wcalc:67px;wocalc:67px;hcalc:57;rend_px_area:0;rcnt:5;ez_min_text_wdth:67;req_px_area:6968;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1270" instrument_node="">subjects of Great Britain</span></i><span data-dcnode-id="1268" instrument_node="">.</span></p><p cwidth="984" data-dcnode-id="1256" eza="cwidth:984px;;cheight:152px;;wcalc_source:child;wcalc:102px;wocalc:102px;hcalc:1710px;rend_px_area:149568;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[81];pagepos:512;cwidth:984px;cheight:152px;wcalc_source:child;wcalc:102px;wocalc:102px;hcalc:1710;rend_px_area:149568;rcnt:1;ez_min_text_wdth:112;req_px_area:157046.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1266" instrument_node="">But Britain is the parent country, say some. Then the more shame upon her
conduct. Even brutes do not devour their young; nor savages make war upon their
families; wherefore the assertion, if true, turns to her reproach; but it
happens not to be true, or only partly so, and the phrase </span><i cwidth="0" data-dcnode-id="1264" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:54px;wocalc:54px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[81]/i[1];pagepos:514;cwidth:54;cheight:0px;wcalc_source:child;wcalc:54px;wocalc:54px;hcalc:19;rend_px_area:0;rcnt:7;ez_min_text_wdth:54;req_px_area:2246.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1265" instrument_node="">parent</span></i><span data-dcnode-id="1263" instrument_node=""> or
</span><i cwidth="0" data-dcnode-id="1261" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:63px;wocalc:63px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[81]/i[2];pagepos:516;cwidth:63;cheight:0px;wcalc_source:child;wcalc:63px;wocalc:63px;hcalc:38;rend_px_area:0;rcnt:7;ez_min_text_wdth:63;req_px_area:3931.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1262" instrument_node="">mother country</span></i><span data-dcnode-id="1260" instrument_node=""> hath been jesuitically adopted by the king and his
parasites, with a low papistical design of gaining an unfair bias on the
credulous weakness of our minds. Europe, and not England, is the parent country
of America. This new world hath been the asylum for the persecuted lovers off
civil and religious liberty from </span><i cwidth="0" data-dcnode-id="1258" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:45px;wocalc:45px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[81]/i[3];pagepos:518;cwidth:45;cheight:0px;wcalc_source:child;wcalc:45px;wocalc:45px;hcalc:38;rend_px_area:0;rcnt:7;ez_min_text_wdth:45;req_px_area:2808;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1259" instrument_node="">every Part</span></i><span data-dcnode-id="1257" instrument_node=""> of Europe. Hither have they
fled, not from the tender embraces of the mother, but from the cruelty of the
monster; and it is so far true of England, that the same tyranny which drove
the first emigrants from home pursues their descendants still.</span></p><p cwidth="984" data-dcnode-id="1254" eza="cwidth:984px;;cheight:57px;;wcalc_source:child;wcalc:102px;wocalc:102px;hcalc:532px;rend_px_area:56088;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[82];pagepos:520;cwidth:984px;cheight:57px;wcalc_source:child;wcalc:170px;wocalc:102px;hcalc:532;rend_px_area:56088;rcnt:1;ez_min_text_wdth:103;req_px_area:58892.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1255" instrument_node="">In this extensive quarter of the globe, we forget the narrow limits of three
hundred and sixty miles (the extent of England) and carry our friendship on a
larger scale; we claim brotherhood with every European Christian, and triumph
in the generosity of the sentiment.</span></p><p cwidth="984" data-dcnode-id="1240" eza="cwidth:984px;;cheight:228px;;wcalc_source:child;wcalc:114px;wocalc:114px;hcalc:2318px;rend_px_area:224352;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[83];pagepos:521;cwidth:984px;cheight:228px;wcalc_source:child;wcalc:114px;wocalc:114px;hcalc:2318;rend_px_area:224352;rcnt:1;ez_min_text_wdth:112;req_px_area:235569.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1253" instrument_node="">It is pleasant to observe by what regular gradations we surmount the force
of local prejudice, as we enlarge our acquaintance with the world. A man born
in any town in England divided into parishes, will naturally associate most
with his fellow parishioners (because their interests in many cases will be
common) and distinguish him by the name of </span><i cwidth="0" data-dcnode-id="1251" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:73px;wocalc:73px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[83]/i[1];pagepos:523;cwidth:73;cheight:0px;wcalc_source:child;wcalc:73px;wocalc:73px;hcalc:19;rend_px_area:0;rcnt:9;ez_min_text_wdth:73;req_px_area:3036.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1252" instrument_node="">neighbor</span></i><span data-dcnode-id="1250" instrument_node="">; if he meet him but
a few miles from home, he drops the narrow idea of a street, and salutes him by
the name of </span><i cwidth="0" data-dcnode-id="1248" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:84px;wocalc:84px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[83]/i[2];pagepos:525;cwidth:84;cheight:0px;wcalc_source:child;wcalc:84px;wocalc:84px;hcalc:19;rend_px_area:0;rcnt:9;ez_min_text_wdth:75;req_px_area:3494.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1249" instrument_node="">townsman</span></i><span data-dcnode-id="1247" instrument_node="">; if he travels out of the county, and meet him in
any other, he forgets the minor divisions of street and town, and calls him
</span><i cwidth="0" data-dcnode-id="1245" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[83]/i[3];pagepos:527;cwidth:98;cheight:0px;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:19;rend_px_area:0;rcnt:9;ez_min_text_wdth:94;req_px_area:4076.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1246" instrument_node="">countryman</span></i><span data-dcnode-id="1244" instrument_node="">; i.e., </span><i cwidth="0" data-dcnode-id="1242" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:90px;wocalc:90px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[83]/i[4];pagepos:529;cwidth:90;cheight:0px;wcalc_source:child;wcalc:90px;wocalc:90px;hcalc:19;rend_px_area:0;rcnt:9;ez_min_text_wdth:84;req_px_area:3744;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1243" instrument_node="">countyman</span></i><span data-dcnode-id="1241" instrument_node="">; but if in their foreign excursions
they should associate in France or any other part of Europe, their local
remembrance would be enlarged into that of Englishmen. And by a just parity of
reasoning, all Europeans meeting in America, or any other quarter of the globe,
are countrymen; for England, Holland, Germany, or Sweden, when compared with
the whole, stand in the same places on the larger scale, which the divisions of
street, town, and county do on the smaller ones; distinctions too limited for
continental minds. Not one third of the inhabitants, even of this province, are
of English descent. Wherefore, I reprobate the phrase of parent or mother
country applied to England only, as being false, selfish, narrow and
ungenerous.</span></p><p cwidth="984" data-dcnode-id="1238" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:112px;wocalc:112px;hcalc:798px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[84];pagepos:531;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:170px;wocalc:112px;hcalc:798;rend_px_area:74784;rcnt:1;ez_min_text_wdth:131;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1239" instrument_node="">But admitting that we were all of English descent, what does it amount to?
Nothing. Britain, being now an open enemy, extinguishes every other name and
