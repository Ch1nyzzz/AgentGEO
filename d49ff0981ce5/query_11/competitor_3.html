title: And to say that reconciliation is our duty, is truly farcical. The first
king of England, of the present line (William the Conqueror) was a Frenchman,
and half the peers of England are descendants from the same country; wherefore
by the same method of reasoning, England ought to be governed by France.</span></p><p cwidth="984" data-dcnode-id="1236" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:109px;wocalc:109px;hcalc:665px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[85];pagepos:532;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:170px;wocalc:109px;hcalc:665;rend_px_area:74784;rcnt:1;ez_min_text_wdth:112;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1237" instrument_node="">Much hath been said of the united strength of Britain and the colonies, that
in conjunction they might bid defiance to the world. But this is mere
presumption; the fate of war is uncertain, neither do the expressions mean
anything; for this continent would never suffer itself to be drained of
inhabitants to support the British arms in either Asia, Africa, or Europe.</span></p><p cwidth="984" data-dcnode-id="1231" eza="cwidth:984px;;cheight:57px;;wcalc_source:child;wcalc:91px;wocalc:91px;hcalc:703px;rend_px_area:56088;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[86];pagepos:533;cwidth:984px;cheight:57px;wcalc_source:child;wcalc:91px;wocalc:91px;hcalc:703;rend_px_area:56088;rcnt:1;ez_min_text_wdth:103;req_px_area:58892.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1235" instrument_node="">Besides, what have we to do with setting the world at defiance? Our plan is
commerce, and that, well attended to,will secure us the peace and friendship of
all Europe; because it is the interest of all Europe to have America a </span><i cwidth="0" data-dcnode-id="1233" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:34px;wocalc:34px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[86]/i;pagepos:535;cwidth:34;cheight:0px;wcalc_source:child;wcalc:34px;wocalc:34px;hcalc:38;rend_px_area:0;rcnt:3;ez_min_text_wdth:34;req_px_area:2475.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1234" instrument_node="">free
port</span></i><span data-dcnode-id="1232" instrument_node="">. Her trade will always be a protection, and her barrenness of gold and
silver secure her from invaders.</span></p><p cwidth="984" data-dcnode-id="1229" eza="cwidth:984px;;cheight:57px;;wcalc_source:child;wcalc:117px;wocalc:117px;hcalc:532px;rend_px_area:56088;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[87];pagepos:537;cwidth:984px;cheight:57px;wcalc_source:child;wcalc:170px;wocalc:117px;hcalc:532;rend_px_area:56088;rcnt:1;ez_min_text_wdth:140;req_px_area:58892.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1230" instrument_node="">I challenge the warmest advocate for reconciliation, to show, a single
advantage that this continent can reap, by being connected with Great Britain.
I repeat the challenge, not a single advantage is derived. Our corn will fetch
its price in any market in Europe, and our imported goods must be paid for buy
them where we will.</span></p><p cwidth="984" data-dcnode-id="1227" eza="cwidth:984px;;cheight:133px;;wcalc_source:child;wcalc:117px;wocalc:117px;hcalc:1216px;rend_px_area:130872;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[88];pagepos:538;cwidth:984px;cheight:133px;wcalc_source:child;wcalc:200px;wocalc:117px;hcalc:1216;rend_px_area:130872;rcnt:1;ez_min_text_wdth:122;req_px_area:137415.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1228" instrument_node="">But the injuries and disadvantages we sustain by that connection, are
without number; and our duty to mankind I at large, as well as to ourselves,
instruct us to renounce the alliance: Because, any submission to, or dependence
on Great Britain, tends directly to involve this continent in European wars and
quarrels; and sets us at variance with nations, who would otherwise seek our
friendship, and against whom, we have neither anger nor complaint. As Europe is
our market for trade, we ought to form no partial connection with any part of
it. It is the true interest of America to steer clear of European contentions,
which she never can do, while by her dependence on Britain, she is made the
make-weight in the scale of British politics.</span></p><p cwidth="984" data-dcnode-id="1219" eza="cwidth:984px;;cheight:191px;;wcalc_source:child;wcalc:112px;wocalc:112px;hcalc:1883px;rend_px_area:187944;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[89];pagepos:539;cwidth:984px;cheight:191px;wcalc_source:child;wcalc:112px;wocalc:112px;hcalc:1883;rend_px_area:187944;rcnt:1;ez_min_text_wdth:131;req_px_area:197341.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1226" instrument_node="">Europe is too thickly planted with kingdoms to be long at peace, and
whenever a war breaks out between England and any foreign power, the trade of
America goes to ruin, </span><i cwidth="0" data-dcnode-id="1224" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:90px;wocalc:90px;hcalc:95px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[89]/i;pagepos:541;cwidth:90;cheight:0px;wcalc_source:child;wcalc:90px;wocalc:90px;hcalc:95;rend_px_area:0;rcnt:5;ez_min_text_wdth:90;req_px_area:10296;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1225" instrument_node="">because of her connection with Britain</span></i><span data-dcnode-id="1223" instrument_node="">. The next
war may not turn out like the Past, and should it not, the advocates for
reconciliation now will be wishing for separation then, because, neutrality in
that case, would be a safer convoy than a man of war. Every thing that is right
or natural pleads for separation. The blood of the slain, the weeping voice of
nature cries, </span><b cwidth="0" data-dcnode-id="1221" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:41px;wocalc:41px;hcalc:80px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[89]/b;pagepos:543;cwidth:41;cheight:0px;wcalc_source:child;wcalc:41px;wocalc:41px;hcalc:80;rend_px_area:0;rcnt:5;ez_min_text_wdth:41;req_px_area:4264;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1222" instrument_node="">'tis time to part</span></b><span data-dcnode-id="1220" instrument_node="">. Even the distance at which the Almighty
hath placed England and America, is a strong and natural proof, that the
authority of the one, over the other, was never the design of Heaven. The time
likewise at which the continent was discovered, adds weight to the argument,
and the manner in which it was peopled increases the force of it. The
reformation was preceded by the discovery of America, as if the Almighty
graciously meant to open a sanctuary to the persecuted in future years, when
home should afford neither friendship nor safety.</span></p><p cwidth="984" data-dcnode-id="1214" eza="cwidth:984px;;cheight:133px;;wcalc_source:child;wcalc:105px;wocalc:105px;hcalc:1558px;rend_px_area:130872;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[90];pagepos:545;cwidth:984px;cheight:133px;wcalc_source:child;wcalc:105px;wocalc:105px;hcalc:1558;rend_px_area:130872;rcnt:1;ez_min_text_wdth:122;req_px_area:137415.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1218" instrument_node="">The authority of Great Britain over this continent, is a form of government,
which sooner or later must have an end: And a serious mind can draw no true
pleasure by looking forward, under the painful and positive conviction, that
what he calls "the present constitution" is merely temporary. As parents, we
can have no joy, knowing that </span><i cwidth="0" data-dcnode-id="1216" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[90]/i;pagepos:547;cwidth:98;cheight:0px;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:38;rend_px_area:0;rcnt:3;ez_min_text_wdth:94;req_px_area:5096;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1217" instrument_node="">this government</span></i><span data-dcnode-id="1215" instrument_node=""> is not sufficiently
lasting to ensure any thing which we may bequeath to posterity: And by a plain
method of argument, as we are running the next generation into debt, we ought
to do the work of it, otherwise we use them meanly and pitifully. In order to
discover the line of our duty rightly, we should take our children in our hand,
and fix our station a few years farther into life; that eminence will present a
prospect, which a few present fears and prejudices conceal from our sight.</span></p><p cwidth="984" data-dcnode-id="1212" eza="cwidth:984px;;cheight:38px;;wcalc_source:child;wcalc:117px;wocalc:117px;hcalc:323px;rend_px_area:37392;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[91];pagepos:549;cwidth:984px;cheight:38px;wcalc_source:child;wcalc:117px;wocalc:117px;hcalc:323;rend_px_area:37392;rcnt:1;ez_min_text_wdth:140;req_px_area:39261.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1213" instrument_node="">Though I would carefully avoid giving unnecessary offense, yet I am inclined
to believe, that all those who espouse the doctrine of reconciliation, may be
included within the following descriptions:</span></p><p cwidth="984" data-dcnode-id="1204" eza="cwidth:984px;;cheight:57px;;wcalc_source:child;wcalc:104px;wocalc:104px;hcalc:589px;rend_px_area:56088;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[92];pagepos:550;cwidth:984px;cheight:57px;wcalc_source:child;wcalc:104px;wocalc:104px;hcalc:589;rend_px_area:56088;rcnt:1;ez_min_text_wdth:122;req_px_area:58892.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1211" instrument_node="">Interested men, who are not to be trusted; weak men who </span><i cwidth="0" data-dcnode-id="1209" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:56px;wocalc:56px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[92]/i[1];pagepos:552;cwidth:56;cheight:0px;wcalc_source:child;wcalc:56px;wocalc:56px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:56;req_px_area:2329.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1210" instrument_node="">cannot</span></i><span data-dcnode-id="1208" instrument_node=""> see;
prejudiced men who </span><i cwidth="0" data-dcnode-id="1206" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:30px;wocalc:30px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[92]/i[2];pagepos:554;cwidth:30;cheight:0px;wcalc_source:child;wcalc:30px;wocalc:30px;hcalc:38;rend_px_area:0;rcnt:5;ez_min_text_wdth:30;req_px_area:2184;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1207" instrument_node="">will not</span></i><span data-dcnode-id="1205" instrument_node=""> see; and a certain set of moderate men, who
think better of the European world than it deserves; and this last class by an
ill-judged deliberation, will be the cause of more calamities to this continent
than all the other three.</span></p><p cwidth="984" data-dcnode-id="1196" eza="cwidth:984px;;cheight:152px;;wcalc_source:child;wcalc:123px;wocalc:123px;hcalc:1349px;rend_px_area:149568;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[93];pagepos:556;cwidth:984px;cheight:152px;wcalc_source:child;wcalc:123px;wocalc:123px;hcalc:1349;rend_px_area:149568;rcnt:1;ez_min_text_wdth:131;req_px_area:157046.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1203" instrument_node="">It is the good fortune of many to live distant from the scene of sorrow; the
evil is not sufficiently brought to </span><i cwidth="0" data-dcnode-id="1201" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:39px;wocalc:39px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[93]/i[1];pagepos:558;cwidth:39;cheight:0px;wcalc_source:child;wcalc:39px;wocalc:39px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:39;req_px_area:1622.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1202" instrument_node="">their</span></i><span data-dcnode-id="1200" instrument_node=""> doors to make </span><i cwidth="0" data-dcnode-id="1198" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:42px;wocalc:42px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[93]/i[2];pagepos:560;cwidth:42;cheight:0px;wcalc_source:child;wcalc:42px;wocalc:42px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:38;req_px_area:1747.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1199" instrument_node="">them</span></i><span data-dcnode-id="1197" instrument_node=""> feel
the precariousness with which all American property is possessed. But let our
imaginations transport us for a few moments to Boston, that seat of
wretchedness will teach us wisdom, and instruct us for ever to renounce a power
in whom we can have no trust. The inhabitants of that unfortunate city, who but
a few months ago were in ease and affluence, have now no other alternative than
to stay and starve, or turn out to beg. Endangered by the fire of their friends
if they continue within the city, and plundered by the soldiery if they leave
it. In their present condition they are prisoners without the hope of
redemption, and in a general attack for their relief, they would be exposed to
the fury of both armies.</span></p><p cwidth="984" data-dcnode-id="1191" eza="cwidth:984px;;cheight:228px;;wcalc_source:child;wcalc:112px;wocalc:112px;hcalc:2280px;rend_px_area:224352;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[94];pagepos:562;cwidth:984px;cheight:228px;wcalc_source:child;wcalc:112px;wocalc:112px;hcalc:2280;rend_px_area:224352;rcnt:1;ez_min_text_wdth:131;req_px_area:235569.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1195" instrument_node="">Men of passive tempers look somewhat lightly over the offenses of Britain,
and, still hoping for the best, are apt to call out, </span><i cwidth="0" data-dcnode-id="1193" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:57px;wocalc:57px;hcalc:152px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[94]/i;pagepos:564;cwidth:57;cheight:0px;wcalc_source:child;wcalc:57px;wocalc:57px;hcalc:152;rend_px_area:0;rcnt:3;ez_min_text_wdth:57;req_px_area:10670.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1194" instrument_node="">Come we shall be
friends again for all this.</span></i><span data-dcnode-id="1192" instrument_node=""> But examine the passions and feelings of
mankind. Bring the doctrine of reconciliation to the touchstone of nature, and
then tell me, whether you can hereafter love, honor, and faithfully serve the
power that hath carried fire and sword into your land? If you cannot do all
these, then are you only deceiving yourselves, and by your delay bringing ruin
upon posterity. Your future connection with Britain, whom you can neither love
nor honor, will be forced and unnatural, and being formed only on the plan of
present convenience, will in a little time fall into a relapse more wretched
than the first. But if you say, you can still pass the violations over, then I
ask, Hath your house been burnt? Hath you property been destroyed before your
face? Are your wife and children destitute of a bed to lie on, or bread to live
on? Have you lost a parent or a child by their hands, and yourself the ruined
and wretched survivor? If you have not, then are you not a judge of those who
have. But if you have, and can still shake hands with the murderers, then are
you unworthy the name of husband, father, friend, or lover, and whatever may be
your rank or title in life, you have the heart of a coward, and the spirit of a
sycophant.</span></p><p cwidth="984" data-dcnode-id="1189" eza="cwidth:984px;;cheight:133px;;wcalc_source:child;wcalc:114px;wocalc:114px;hcalc:1368px;rend_px_area:130872;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[95];pagepos:566;cwidth:984px;cheight:133px;wcalc_source:child;wcalc:200px;wocalc:114px;hcalc:1368;rend_px_area:130872;rcnt:1;ez_min_text_wdth:122;req_px_area:137415.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1190" instrument_node="">This is not inflaming or exaggerating matters, but trying them by those
feelings and affections which nature justifies, and without which, we should be
incapable of discharging the social duties of life, or enjoying the felicities
of it. I mean not to exhibit horror for the purpose of provoking revenge, but
to awaken us from fatal and unmanly slumbers, that we may pursue determinately
some fixed object. It is not in the power of Britain or of Europe to conquer
America, if she do not conquer herself by delay and timidity. The present
winter is worth an age if rightly employed, but if lost or neglected, the whole
continent will partake of the misfortune; and there is no punishment which that
man will not deserve, be he who, or what, or where he will, that may be the
means of sacrificing a season so precious and useful.</span></p><p cwidth="984" data-dcnode-id="1184" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:116px;wocalc:116px;hcalc:1045px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[96];pagepos:567;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:116px;wocalc:116px;hcalc:1045;rend_px_area:112176;rcnt:1;ez_min_text_wdth:131;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1188" instrument_node="">It is repugnant to reason, to the universal order of things, to all examples
from the former ages, to suppose, that this continent can longer remain subject
to any external power. The most sanguine in Britain does not think so. The
utmost stretch of human wisdom cannot, at this time compass a plan short of
separation, which can promise the continent even a year's security.
Reconciliation is </span><i cwidth="0" data-dcnode-id="1186" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:34px;wocalc:34px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[96]/i;pagepos:569;cwidth:34;cheight:0px;wcalc_source:child;wcalc:34px;wocalc:34px;hcalc:19;rend_px_area:0;rcnt:3;ez_min_text_wdth:28;req_px_area:1048.32;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1187" instrument_node="">now</span></i><span data-dcnode-id="1185" instrument_node=""> a fallacious dream. Nature hath deserted the
connection, and Art cannot supply her place. For, as Milton wisely expresses,
"never can true reconcilement grow where wounds of deadly hate have pierced so
deep."</span></p><p cwidth="984" data-dcnode-id="1182" eza="cwidth:984px;;cheight:95px;;wcalc_source:child;wcalc:95px;wocalc:95px;hcalc:1159px;rend_px_area:93480;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[97];pagepos:571;cwidth:984px;cheight:95px;wcalc_source:child;wcalc:170px;wocalc:95px;hcalc:1159;rend_px_area:93480;rcnt:1;ez_min_text_wdth:112;req_px_area:98154;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1183" instrument_node="">Every quiet method for peace hath been ineffectual. Our prayers have been
rejected with disdain; and only tended to convince us, that nothing flatters
vanity, or confirms obstinacy in kings more than repeated petitioning —
and nothing hath contributed more than that very measure to make the kings of
Europe absolute: Witness Denmark and Sweden. Wherefore since nothing but blows
will do, for God's sake, let us come to a final separation, and not leave the
next generation to be cutting throats, under the violated unmeaning names of
parent and child.</span></p><p cwidth="984" data-dcnode-id="1177" eza="cwidth:984px;;cheight:57px;;wcalc_source:child;wcalc:93px;wocalc:93px;hcalc:475px;rend_px_area:56088;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[98];pagepos:572;cwidth:984px;cheight:57px;wcalc_source:child;wcalc:93px;wocalc:93px;hcalc:475;rend_px_area:56088;rcnt:1;ez_min_text_wdth:94;req_px_area:58892.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1181" instrument_node="">To say, they will never attempt it again is idle and visionary, we thought
so at the repeal of the </span><a cwidth="0" data-dcnode-id="1179" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:50px;wocalc:50px;hcalc:38px;rend_px_area:0;" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usconstitution.net/stamp.html" style="background-color:transparent;background-size:auto;color:rgb(0, 0, 238);nodepath:/html/body/div[5]/p[98]/a;pagepos:574;cwidth:50;cheight:0px;wcalc_source:child;wcalc:50px;wocalc:50px;hcalc:38;rend_px_area:0;rcnt:3;ez_min_text_wdth:47;req_px_area:3120;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1180" instrument_node="">stamp act</span></a><span data-dcnode-id="1178" instrument_node="">, yet a year or two
undeceived us; as well me we may suppose that nations, which have been once
defeated, will never renew the quarrel.</span></p><p cwidth="984" data-dcnode-id="1175" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:107px;wocalc:107px;hcalc:1102px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[99];pagepos:576;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:200px;wocalc:107px;hcalc:1102;rend_px_area:112176;rcnt:1;ez_min_text_wdth:112;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1176" instrument_node="">As to government matters, it is not in the powers of Britain to do this
continent justice: The business of it will soon be too weighty, and intricate,
to be managed with any tolerable degree of convenience, by a power, so distant
from us, and so very ignorant of us; for if they cannot conquer us, they cannot
govern us. To be always running three or four thousand miles with a tale or a
petition, waiting four or five months for an answer, which when obtained
requires five or six more to explain it in, will in a few years be looked upon
as folly and childishness — there was a time when it was proper, and
there is a proper time for it to cease.</span></p><p cwidth="984" data-dcnode-id="1173" eza="cwidth:984px;;cheight:95px;;wcalc_source:child;wcalc:96px;wocalc:96px;hcalc:931px;rend_px_area:93480;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[100];pagepos:577;cwidth:984px;cheight:95px;wcalc_source:child;wcalc:170px;wocalc:96px;hcalc:931;rend_px_area:93480;rcnt:1;ez_min_text_wdth:103;req_px_area:98154;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1174" instrument_node="">Small islands not capable of protecting themselves, are the proper objects
for kingdoms to take under their care; but there is something very absurd, in
supposing a continent to be perpetually governed by an island. In no instance
hath nature made the satellite larger than its primary planet, and as England
and America, with respect to each Other, reverses the common order of nature,
it is evident they belong to different systems: England to Europe —
America to itself.</span></p><p cwidth="984" data-dcnode-id="1168" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:684px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[101];pagepos:578;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:684;rend_px_area:74784;rcnt:1;ez_min_text_wdth:140;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1172" instrument_node="">I am not induced by motives of pride, party, or resentment to espouse the
doctrine of separation and independence; I am clearly, positively, and
conscientiously persuaded that it is the true interest of this continent to be
so; that every thing short of </span><i cwidth="0" data-dcnode-id="1170" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:33px;wocalc:33px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[101]/i;pagepos:580;cwidth:33;cheight:0px;wcalc_source:child;wcalc:33px;wocalc:33px;hcalc:19;rend_px_area:0;rcnt:3;ez_min_text_wdth:33;req_px_area:1372.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1171" instrument_node="">that</span></i><span data-dcnode-id="1169" instrument_node=""> is mere patchwork, that it can afford
no lasting felicity, — that it is leaving the sword to our children, and
shrinking back at a time, when, a little more, a little farther, would have
rendered this continent the glory of the earth.</span></p><p cwidth="984" data-dcnode-id="1166" eza="cwidth:984px;;cheight:57px;;wcalc_source:child;wcalc:105px;wocalc:105px;hcalc:456px;rend_px_area:56088;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[102];pagepos:582;cwidth:984px;cheight:57px;wcalc_source:child;wcalc:170px;wocalc:105px;hcalc:456;rend_px_area:56088;rcnt:1;ez_min_text_wdth:103;req_px_area:58892.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1167" instrument_node="">As Britain hath not manifested the least inclination towards a compromise,
we may be assured that no terms can be obtained worthy the acceptance of the
continent, or any ways equal to the expense of blood and treasure we have been
already put to.</span></p><p cwidth="984" data-dcnode-id="1158" eza="cwidth:984px;;cheight:267px;;wcalc_source:child;wcalc:122px;wocalc:122px;hcalc:2510px;rend_px_area:262728;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[103];pagepos:583;cwidth:984px;cheight:267px;wcalc_source:child;wcalc:122px;wocalc:122px;hcalc:2510;rend_px_area:262728;rcnt:1;ez_min_text_wdth:131;req_px_area:275864.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1165" instrument_node="">The object contended for, ought always to bear some just proportion to the
expense. The removal of the North, or the whole detestable </span><i cwidth="0" data-dcnode-id="1163" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:42px;wocalc:42px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[103]/i;pagepos:585;cwidth:42;cheight:0px;wcalc_source:child;wcalc:42px;wocalc:42px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:42;req_px_area:1747.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1164" instrument_node="">junto</span></i><span data-dcnode-id="1162" instrument_node="">, is a
matter unworthy the millions we have expended. A temporary stoppage of trade,
was an inconvenience, which would have sufficiently balanced the repeal of all
the acts complained of, had such repeals been obtained; but if the whole
continent must take up arms, if every man must be a soldier, it is scarcely
worth our while to fight against a contemptible ministry only. Dearly, dearly,
do we pay for the repeal of the acts, if that is all we fight for; for in a
just estimation, it is as great a folly to pay a Bunker Hill price for law, as
for land. As I have always considered the independency of this continent, as an
event, which sooner or later must arrive, so from the late rapid progress of
the continent to maturity, the event could not be far off. Wherefore, on the
breaking out of hostilities, it was not worth the while to have disputed a
matter, which time would have finally redressed, unless we meant to be in
earnest; otherwise, it is like wasting an estate of a suit at law, to regulate
the trespasses of a tenant, whose lease is just expiring. No man was a warmer
wisher for reconciliation than myself, before the fatal nineteenth of April,
1775 (Massacre at Lexington), but the moment the event of that day was made
known, I rejected the hardened, sullen tempered Pharaoh of England for ever;
and disdain the wretch, that with the pretended title of </span><b cwidth="0" data-dcnode-id="1160" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:60px;wocalc:60px;hcalc:60px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[103]/b;pagepos:587;cwidth:60;cheight:0px;wcalc_source:child;wcalc:60px;wocalc:60px;hcalc:60;rend_px_area:0;rcnt:5;ez_min_text_wdth:60;req_px_area:5616;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1161" instrument_node="">Father of his
people</span></b><span data-dcnode-id="1159" instrument_node="">, can unfeelingly hear of their slaughter, and composedly sleep with
their blood upon his soul.</span></p><p cwidth="984" data-dcnode-id="1156" eza="cwidth:984px;;cheight:38px;;wcalc_source:child;wcalc:82px;wocalc:82px;hcalc:342px;rend_px_area:37392;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[104];pagepos:589;cwidth:984px;cheight:38px;wcalc_source:child;wcalc:110px;wocalc:82px;hcalc:342;rend_px_area:37392;rcnt:1;ez_min_text_wdth:94;req_px_area:33176;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1157" instrument_node="">But admitting that matters were now made up, what would be the event? I
answer, the ruin of the continent. And that for several reasons:</span></p><p cwidth="984" data-dcnode-id="1140" eza="cwidth:984px;;cheight:266px;;wcalc_source:child;wcalc:114px;wocalc:114px;hcalc:2603px;rend_px_area:261744;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[105];pagepos:590;cwidth:984px;cheight:266px;wcalc_source:child;wcalc:114px;wocalc:114px;hcalc:2603;rend_px_area:261744;rcnt:1;ez_min_text_wdth:122;req_px_area:274831.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1155" instrument_node="">First — The powers of governing still remaining in the hands of the
king, he will have a negative over the whole legislation of this continent. And
as he hath shown himself such an inveterate enemy to liberty, and discovered
such a thirst for arbitrary power, is he, or is he not, a proper man to say to
these colonies, </span><i cwidth="0" data-dcnode-id="1153" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:60px;wocalc:60px;hcalc:152px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[105]/i[1];pagepos:592;cwidth:60;cheight:0px;wcalc_source:child;wcalc:60px;wocalc:60px;hcalc:152;rend_px_area:0;rcnt:10;ez_min_text_wdth:60;req_px_area:10608;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1154" instrument_node="">"You shall make no laws but what I please"</span></i><span data-dcnode-id="1152" instrument_node="">? And is there
any inhabitants in America so ignorant, as not to know, that according to what
is called the present constitution, that this continent can make no laws but
what the king gives leave to? and is there any man so unwise, as not to see,
that (considering what has happened) he will suffer no Law to be made here, but
such as suit </span><i cwidth="0" data-dcnode-id="1150" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:24px;wocalc:24px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[105]/i[2];pagepos:594;cwidth:24;cheight:0px;wcalc_source:child;wcalc:24px;wocalc:24px;hcalc:19;rend_px_area:0;rcnt:10;ez_min_text_wdth:24;req_px_area:998.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1151" instrument_node="">his</span></i><span data-dcnode-id="1149" instrument_node=""> purpose? We may be as effectually enslaved by the want
of laws in America, as by submitting to laws made for us in England. After
matters are make up (as it is called) can there be any doubt but the whole
power of the crown will be exerted, to keep this continent as low and humble as
possible? Instead of going forward we shall go backward, or be perpetually
quarrelling or ridiculously petitioning. We are already greater than the king
wishes us to be, and will he not hereafter endeavor to make us less? To bring
the matter to one point. Is the power who is jealous of our prosperity, a
proper power to govern us? Whoever says </span><i cwidth="0" data-dcnode-id="1147" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:24px;wocalc:24px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[105]/i[3];pagepos:596;cwidth:24;cheight:0px;wcalc_source:child;wcalc:24px;wocalc:24px;hcalc:19;rend_px_area:0;rcnt:10;ez_min_text_wdth:19;req_px_area:698.88;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1148" instrument_node="">No</span></i><span data-dcnode-id="1146" instrument_node=""> to this question is an
</span><i cwidth="0" data-dcnode-id="1144" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:102px;wocalc:102px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[105]/i[4];pagepos:598;cwidth:102;cheight:0px;wcalc_source:child;wcalc:102px;wocalc:102px;hcalc:19;rend_px_area:0;rcnt:10;ez_min_text_wdth:102;req_px_area:4243.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1145" instrument_node="">independent</span></i><span data-dcnode-id="1143" instrument_node="">, for independency means no more, than, whether we shall make
our own laws, or whether the king, the greatest enemy this continent hath, or
can have, shall tell us, </span><i cwidth="0" data-dcnode-id="1141" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:51px;wocalc:51px;hcalc:171px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[105]/i[5];pagepos:600;cwidth:51;cheight:0px;wcalc_source:child;wcalc:51px;wocalc:51px;hcalc:171;rend_px_area:0;rcnt:10;ez_min_text_wdth:51;req_px_area:11138.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1142" instrument_node="">"there shall be now laws but such as I
like."</span></i></p><p cwidth="984" data-dcnode-id="1135" eza="cwidth:984px;;cheight:133px;;wcalc_source:child;wcalc:86px;wocalc:86px;hcalc:1843px;rend_px_area:130872;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[106];pagepos:601;cwidth:984px;cheight:133px;wcalc_source:child;wcalc:86px;wocalc:86px;hcalc:1843;rend_px_area:130872;rcnt:1;ez_min_text_wdth:103;req_px_area:137415.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1139" instrument_node="">But the king you will say has a negative in England; the people there can
make no laws without his consent. in point of right and good order, there is
something very ridiculous, that a youth of twenty-one (which hath often
happened) shall say to several millions of people, older and wiser than
himself, I forbid this or that act of yours to be law. But in this place I
decline this sort of reply, though I will never cease to expose the absurdity
of it, and only answer, that England being the king's residence, and America
not so, make quite another case. The king's negative </span><i cwidth="0" data-dcnode-id="1137" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:37px;wocalc:37px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[106]/i;pagepos:603;cwidth:37;cheight:0px;wcalc_source:child;wcalc:37px;wocalc:37px;hcalc:19;rend_px_area:0;rcnt:3;ez_min_text_wdth:37;req_px_area:1539.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1138" instrument_node="">here</span></i><span data-dcnode-id="1136" instrument_node=""> is ten times
more dangerous and fatal than it can be in England, for there he will scarcely
refuse his consent to a bill for putting England into as strong a state of
defense as possible, and in America he would never suffer such a bill to be
passed.</span></p><p cwidth="984" data-dcnode-id="1115" eza="cwidth:984px;;cheight:154px;;wcalc_source:child;wcalc:116px;wocalc:116px;hcalc:1494px;rend_px_area:151536;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[107];pagepos:605;cwidth:984px;cheight:154px;wcalc_source:child;wcalc:116px;wocalc:116px;hcalc:1494;rend_px_area:151536;rcnt:1;ez_min_text_wdth:131;req_px_area:159112.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1134" instrument_node="">America is only a secondary object in the system of British politics —
England consults the good of </span><i cwidth="0" data-dcnode-id="1132" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:31px;wocalc:31px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[107]/i[1];pagepos:607;cwidth:31;cheight:0px;wcalc_source:child;wcalc:31px;wocalc:31px;hcalc:19;rend_px_area:0;rcnt:13;ez_min_text_wdth:31;req_px_area:1289.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1133" instrument_node="">this</span></i><span data-dcnode-id="1131" instrument_node=""> country, no farther than it answers
her </span><i cwidth="0" data-dcnode-id="1129" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:34px;wocalc:34px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[107]/i[2];pagepos:609;cwidth:34;cheight:0px;wcalc_source:child;wcalc:34px;wocalc:34px;hcalc:19;rend_px_area:0;rcnt:13;ez_min_text_wdth:28;req_px_area:1048.32;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1130" instrument_node="">own</span></i><span data-dcnode-id="1128" instrument_node=""> purpose. Wherefore, her own interest leads her to suppress the
growth of </span><i cwidth="0" data-dcnode-id="1126" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:36px;wocalc:36px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[107]/i[3];pagepos:611;cwidth:36;cheight:0px;wcalc_source:child;wcalc:36px;wocalc:36px;hcalc:19;rend_px_area:0;rcnt:13;ez_min_text_wdth:36;req_px_area:1497.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1127" instrument_node="">ours</span></i><span data-dcnode-id="1125" instrument_node=""> in every case which doth not promote her advantage, or in
the least interfere with it. A pretty state we should soon be in under such a
second-hand government, considering what has happened! Men do not change from
enemies to friends by the alteration of a name; and in order to show that
reconciliation </span><i cwidth="0" data-dcnode-id="1123" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:34px;wocalc:34px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[107]/i[4];pagepos:613;cwidth:34;cheight:0px;wcalc_source:child;wcalc:34px;wocalc:34px;hcalc:19;rend_px_area:0;rcnt:13;ez_min_text_wdth:28;req_px_area:1048.32;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1124" instrument_node="">now</span></i><span data-dcnode-id="1122" instrument_node=""> is a dangerous doctrine, I affirm, </span><i cwidth="0" data-dcnode-id="1120" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:285px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[107]/i[5];pagepos:615;cwidth:98;cheight:0px;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:285;rend_px_area:0;rcnt:13;ez_min_text_wdth:98;req_px_area:34652.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1121" instrument_node="">that it would
be policy in the kingdom at this time, to repeal the acts for the sake of
reinstating himself in the government of the provinces</span></i><span data-dcnode-id="1119" instrument_node="">; in order, </span><b cwidth="0" data-dcnode-id="1117" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:102px;wocalc:102px;hcalc:280px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[107]/b;pagepos:617;cwidth:110;cheight:0px;wcalc_source:child;wcalc:110px;wocalc:102px;hcalc:280;rend_px_area:0;rcnt:13;ez_min_text_wdth:103;req_px_area:29744;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1118" instrument_node="">that
he may accomplish by craft and subtlety, in the long run, what he cannot do by
force and violence in the short one</span></b><span data-dcnode-id="1116" instrument_node="">. Reconciliation and ruin are nearly
related.</span></p><p cwidth="984" data-dcnode-id="1113" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:112px;wocalc:112px;hcalc:1045px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[108];pagepos:619;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:200px;wocalc:112px;hcalc:1045;rend_px_area:112176;rcnt:1;ez_min_text_wdth:122;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1114" instrument_node="">Secondly — That as even the best terms, which we can expect to obtain,
can amount to no more than a temporary expedient, or a kind of government by
guardianship, which can last no longer than till the colonies come of age, so
the general face and state of things, in the interim, will be unsettled and
unpromising. Emigrants of property will not choose to come to a country whose
form of government hangs but by a thread, and who is every day tottering on the
brink of commotion and disturbance; and numbers of the present inhabitant would
lay hold of the interval, to dispose of their effects, and quit the
continent.</span></p><p cwidth="984" data-dcnode-id="1111" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:119px;wocalc:119px;hcalc:646px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[109];pagepos:620;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:170px;wocalc:119px;hcalc:646;rend_px_area:74784;rcnt:1;ez_min_text_wdth:131;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1112" instrument_node="">But the most powerful of all arguments, is, that nothing but independence,
i.e., a continental form of government, can keep the peace of the continent and
preserve it inviolate from civil wars. I dread the event of a reconciliation
with Britain now, as it is more than probable, that it will be followed by a
revolt somewhere or other, the consequences of which may be far more fatal than
all the malice of Britain.</span></p><p cwidth="984" data-dcnode-id="1106" eza="cwidth:984px;;cheight:228px;;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:2033px;rend_px_area:224352;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[110];pagepos:621;cwidth:984px;cheight:228px;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:2033;rend_px_area:224352;rcnt:1;ez_min_text_wdth:140;req_px_area:235569.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1110" instrument_node="">Thousands are already ruined by British barbarity; (thousands more will
probably suffer the same fate.) Those men have other feelings than us who have
nothing suffered. All they </span><i cwidth="0" data-dcnode-id="1108" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:34px;wocalc:34px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[110]/i;pagepos:623;cwidth:34;cheight:0px;wcalc_source:child;wcalc:34px;wocalc:34px;hcalc:19;rend_px_area:0;rcnt:3;ez_min_text_wdth:28;req_px_area:1048.32;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1109" instrument_node="">now</span></i><span data-dcnode-id="1107" instrument_node=""> possess is liberty, what they before
enjoyed is sacrificed to its service, and having nothing more to lose, they
disdain submission. Besides, the general temper of the colonies, towards a
British government, will be like that of a youth, who is nearly out of his
time, they will care very little about her. And a government which cannot
preserve the peace, is no government at all, and in that case we pay our money
for nothing; and pray what is it that Britain can do, whose power will be
wholly on paper, should a civil tumult break out the very day after
reconciliation? I have heard some men say, many of whom I believe spoke without
thinking, that they dreaded independence, fearing that it would produce civil
wars. It is but seldom that our first thoughts are truly correct, and that is
the case here; for there are ten times more to dread from a patched up
connection than from independence. I make the sufferers case my own, and I
protest, that were I driven from house and home, my property destroyed, and my
circumstances ruined, that as man, sensible of injuries, I could never relish
the doctrine of reconciliation, or consider myself bound thereby.</span></p><p cwidth="984" data-dcnode-id="1104" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:103px;wocalc:103px;hcalc:684px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[111];pagepos:625;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:170px;wocalc:103px;hcalc:684;rend_px_area:74784;rcnt:1;ez_min_text_wdth:103;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1105" instrument_node="">The colonies have manifested such a spirit of good order and obedience to
continental government, as is sufficient to make every reasonable person easy
and happy on that head. No man can assign the least pretense for his fears, on
any other grounds, that such as are truly childish and ridiculous, viz., that
one colony will be striving for superiority over another.</span></p><p cwidth="984" data-dcnode-id="1099" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:111px;wocalc:111px;hcalc:1026px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[112];pagepos:626;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:111px;wocalc:111px;hcalc:1026;rend_px_area:112176;rcnt:1;ez_min_text_wdth:112;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1103" instrument_node="">Where there are no distinctions there can be no superiority, perfect
equality affords no temptation. The republics of Europe are all (and we may say
always) in peace. Holland and Switzerland are without wars, foreign or
domestic; monarchical governments, it is true, are never long at rest: the
crown itself is a temptation to enterprising ruffians at </span><i cwidth="0" data-dcnode-id="1101" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:45px;wocalc:45px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[112]/i;pagepos:628;cwidth:45;cheight:0px;wcalc_source:child;wcalc:45px;wocalc:45px;hcalc:19;rend_px_area:0;rcnt:3;ez_min_text_wdth:38;req_px_area:1397.76;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1102" instrument_node="">home</span></i><span data-dcnode-id="1100" instrument_node="">; and that
degree of pride and insolence ever attendant on regal authority swells into a
rupture with foreign powers, in instances where a republican government, by
being formed on more natural principles, would negotiate the mistake.</span></p><p cwidth="984" data-dcnode-id="1097" eza="cwidth:984px;;cheight:95px;;wcalc_source:child;wcalc:114px;wocalc:114px;hcalc:817px;rend_px_area:93480;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[113];pagepos:630;cwidth:984px;cheight:95px;wcalc_source:child;wcalc:170px;wocalc:114px;hcalc:817;rend_px_area:93480;rcnt:1;ez_min_text_wdth:112;req_px_area:98154;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1098" instrument_node="">If there is any true cause of fear respecting independence it is because no
plan is yet laid down. Men do not see their way out; wherefore, as an opening
into that business I offer the following hints; at the same time modestly
affirming, that I have no other opinion of them myself, than that they may be
the means of giving rise to something better. Could the straggling thoughts of
individuals be collected, they would frequently form materials for wise and
able men to improve to useful matter.</span></p><p cwidth="984" data-dcnode-id="1095" eza="cwidth:984px;;cheight:38px;;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:266px;rend_px_area:37392;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[114];pagepos:631;cwidth:984px;cheight:38px;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:266;rend_px_area:37392;rcnt:1;ez_min_text_wdth:131;req_px_area:39261.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1096" instrument_node="">Let the assemblies be annual, with a President only. The representation more
equal. Their business wholly domestic, and subject to the authority of a
continental congress.</span></p><p cwidth="984" data-dcnode-id="1090" eza="cwidth:984px;;cheight:171px;;wcalc_source:child;wcalc:105px;wocalc:105px;hcalc:1824px;rend_px_area:168264;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[115];pagepos:632;cwidth:984px;cheight:171px;wcalc_source:child;wcalc:105px;wocalc:105px;hcalc:1824;rend_px_area:168264;rcnt:1;ez_min_text_wdth:131;req_px_area:176677.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1094" instrument_node="">Let each colony be divided into six, eight, or ten, convenient districts,
each district to send a proper number of delegates to congress, so that each
colony send at least thirty. The whole number in congress will be at least
three hundred ninety. Each congress to sit ___ and to choose a president by the
following method. When the delegates are met, let a colony be taken from the
whole thirteen colonies by lot, after which let the whole congress choose (by
ballot) a president from out of the delegates of </span><i cwidth="0" data-dcnode-id="1092" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:33px;wocalc:33px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[115]/i;pagepos:634;cwidth:33;cheight:0px;wcalc_source:child;wcalc:33px;wocalc:33px;hcalc:19;rend_px_area:0;rcnt:3;ez_min_text_wdth:33;req_px_area:1372.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1093" instrument_node="">that</span></i><span data-dcnode-id="1091" instrument_node=""> province. In the
next Congress, let a colony be taken by lot from twelve only, omitting that
colony from which the president was taken in the former congress, and so
proceeding on till the whole thirteen shall have had their proper rotation. And
in order that nothing may pass into a law but what is satisfactorily just, not
less than three fifths of the congress to be called a majority. He that will
promote discord, under a government so equally formed as this, would join
Lucifer in his revolt.</span></p><p cwidth="984" data-dcnode-id="1085" eza="cwidth:984px;;cheight:77px;;wcalc_source:child;wcalc:106px;wocalc:106px;hcalc:686px;rend_px_area:75768;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[116];pagepos:636;cwidth:984px;cheight:77px;wcalc_source:child;wcalc:106px;wocalc:106px;hcalc:686;rend_px_area:75768;rcnt:1;ez_min_text_wdth:112;req_px_area:79556.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1089" instrument_node="">But as there is a peculiar delicacy, from whom, or in what manner, this
business must first arise, and as it seems most agreeable and consistent, that
it should come from some intermediate body between the governed and the
governors, that is between the Congress and the people, let a </span><b cwidth="0" data-dcnode-id="1087" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:106px;wocalc:106px;hcalc:40px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[116]/b;pagepos:638;cwidth:106;cheight:0px;wcalc_source:child;wcalc:106px;wocalc:106px;hcalc:40;rend_px_area:0;rcnt:3;ez_min_text_wdth:106;req_px_area:6614.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1088" instrument_node="">Continental
Conference</span></b><span data-dcnode-id="1086" instrument_node=""> be held, in the following manner, and for the following
purpose:</span></p><p cwidth="984" data-dcnode-id="1077" eza="cwidth:984px;;cheight:152px;;wcalc_source:child;wcalc:127px;wocalc:127px;hcalc:1197px;rend_px_area:149568;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[117];pagepos:640;cwidth:984px;cheight:152px;wcalc_source:child;wcalc:127px;wocalc:127px;hcalc:1197;rend_px_area:149568;rcnt:1;ez_min_text_wdth:140;req_px_area:157046.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1084" instrument_node="">A committee of twenty-six members of Congress, viz., two for each colony.
Two members for each house of assembly, or provincial convention; and five
representatives of the people at large, to be chosen in the capital city or
town of each province, for, and in behalf of the whole province, by as many
qualified voters as shall think proper to attend from all parts of the province
for that purpose; or, if more convenient, the representatives may be chosen in
two or three of the most populous parts thereof. In this conference, thus
assembled, will be united, the two grand principles of business,
</span><i cwidth="0" data-dcnode-id="1082" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:88px;wocalc:88px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[117]/i[1];pagepos:642;cwidth:88;cheight:0px;wcalc_source:child;wcalc:88px;wocalc:88px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:84;req_px_area:3660.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1083" instrument_node="">knowledge</span></i><span data-dcnode-id="1081" instrument_node=""> and </span><i cwidth="0" data-dcnode-id="1079" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:51px;wocalc:51px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[117]/i[2];pagepos:644;cwidth:51;cheight:0px;wcalc_source:child;wcalc:51px;wocalc:51px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:47;req_px_area:2121.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1080" instrument_node="">power</span></i><span data-dcnode-id="1078" instrument_node="">. The members of Congress, Assemblies, or
Conventions, by having had experience in national concerns, will be able and
useful counselors, and the whole, being empowered by the people will have a
truly legal authority.</span></p><p cwidth="984" data-dcnode-id="1069" eza="cwidth:984px;;cheight:153px;;wcalc_source:child;wcalc:115px;wocalc:115px;hcalc:1522px;rend_px_area:150552;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[118];pagepos:646;cwidth:984px;cheight:153px;wcalc_source:child;wcalc:115px;wocalc:115px;hcalc:1522;rend_px_area:150552;rcnt:1;ez_min_text_wdth:112;req_px_area:158079.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1076" instrument_node="">The conferring members being met, let their business be to frame a
</span><b cwidth="0" data-dcnode-id="1074" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:106px;wocalc:106px;hcalc:40px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[118]/b;pagepos:648;cwidth:106;cheight:0px;wcalc_source:child;wcalc:106px;wocalc:106px;hcalc:40;rend_px_area:0;rcnt:5;ez_min_text_wdth:106;req_px_area:6614.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1075" instrument_node="">Continental Charter</span></b><span data-dcnode-id="1073" instrument_node="">, or Charter of the United Colonies; (answering to
what is called the </span><a cwidth="0" data-dcnode-id="1071" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:56px;wocalc:56px;hcalc:38px;rend_px_area:0;" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usconstitution.net/magna.html" style="background-color:transparent;background-size:auto;color:rgb(0, 0, 238);nodepath:/html/body/div[5]/p[118]/a;pagepos:650;cwidth:56;cheight:0px;wcalc_source:child;wcalc:56px;wocalc:56px;hcalc:38;rend_px_area:0;rcnt:5;ez_min_text_wdth:56;req_px_area:3494.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1072" instrument_node="">Magna Charta</span></a><span data-dcnode-id="1070" instrument_node=""> of England) fixing the
number and manner of choosing members of Congress, members of Assembly, with
their date of sitting, and drawing the line of business and jurisdiction
between them: always remembering, that our strength is continental, not
provincial: Securing freedom and property to all men, and above all things the
free exercise of religion, according to the dictates of conscience; with such
other matter as is necessary for a charter to contain. Immediately after which,
the said conference to dissolve, and the bodies which shall be chosen
conformable to the said charter, to be the legislators and governors of this
continent for the time being: Whose peace and happiness, may God preserve,
Amen.</span></p><p cwidth="984" data-dcnode-id="1062" eza="cwidth:984px;;cheight:95px;;wcalc_source:child;wcalc:106px;wocalc:106px;hcalc:931px;rend_px_area:93480;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[119];pagepos:652;cwidth:984px;cheight:95px;wcalc_source:child;wcalc:106px;wocalc:106px;hcalc:931;rend_px_area:93480;rcnt:1;ez_min_text_wdth:103;req_px_area:98154;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1068" instrument_node="">Should any body of men be hereafter delegated for this or some similar
purpose, I offer them the following extracts from that wise observer on
governments </span><i cwidth="0" data-dcnode-id="1066" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:88px;wocalc:88px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[119]/i[1];pagepos:654;cwidth:88;cheight:0px;wcalc_source:child;wcalc:88px;wocalc:88px;hcalc:19;rend_px_area:0;rcnt:4;ez_min_text_wdth:88;req_px_area:3660.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1067" instrument_node="">Dragonetti</span></i><span data-dcnode-id="1065" instrument_node="">. "The science" says he, "of the politician
consists in fixing the true point of happiness and freedom. Those men would
deserve the gratitude of ages, who should discover a mode of government that
contained the greatest sum of individual happiness, with the least national
expense." — </span><i cwidth="0" data-dcnode-id="1063" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:88px;wocalc:88px;hcalc:76px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[119]/i[2];pagepos:656;cwidth:88;cheight:0px;wcalc_source:child;wcalc:88px;wocalc:88px;hcalc:76;rend_px_area:0;rcnt:4;ez_min_text_wdth:88;req_px_area:9152;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1064" instrument_node="">Dragonetti on Virtue and Rewards.</span></i></p><p cwidth="984" data-dcnode-id="1054" eza="cwidth:984px;;cheight:134px;;wcalc_source:child;wcalc:106px;wocalc:106px;hcalc:1370px;rend_px_area:131856;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[120];pagepos:657;cwidth:984px;cheight:134px;wcalc_source:child;wcalc:106px;wocalc:106px;hcalc:1370;rend_px_area:131856;rcnt:1;ez_min_text_wdth:103;req_px_area:138448.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1061" instrument_node="">But where says some is the king of America? I'll tell you Friend, he reigns
above, and doth not make havoc of mankind like the Royal of Britain. Yet that
we may not appear to be defective even in earthly honors, let a day be solemnly
set apart for proclaiming the charter; let it be brought forth placed on the
divine law, the word of God; let a crown be placed thereon, by which the world
may know, that so far as we approve of monarchy, that in America </span><b cwidth="0" data-dcnode-id="1059" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:40px;wocalc:40px;hcalc:80px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[120]/b;pagepos:659;cwidth:40;cheight:0px;wcalc_source:child;wcalc:40px;wocalc:40px;hcalc:80;rend_px_area:0;rcnt:5;ez_min_text_wdth:40;req_px_area:4160;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1060" instrument_node="">the law is
king</span></b><span data-dcnode-id="1058" instrument_node="">. For as in absolute governments the king is law, so in free countries
the law </span><i cwidth="0" data-dcnode-id="1056" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:47px;wocalc:47px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[120]/i;pagepos:661;cwidth:47;cheight:0px;wcalc_source:child;wcalc:47px;wocalc:47px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:47;req_px_area:1955.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1057" instrument_node="">ought</span></i><span data-dcnode-id="1055" instrument_node=""> to be king; and there ought to be no other. But lest any
ill use should afterwards arise, let the crown at the conclusion of the
ceremony be demolished, and scattered among the people whose right it is.</span></p><p cwidth="984" data-dcnode-id="1052" eza="cwidth:984px;;cheight:190px;;wcalc_source:child;wcalc:123px;wocalc:123px;hcalc:1748px;rend_px_area:186960;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[121];pagepos:663;cwidth:984px;cheight:190px;wcalc_source:child;wcalc:200px;wocalc:123px;hcalc:1748;rend_px_area:186960;rcnt:1;ez_min_text_wdth:131;req_px_area:196308;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1053" instrument_node="">A government of our own is our natural right: And when a man seriously
reflects on the precariousness of human affairs, he will become convinced, that
it is in finitely wiser and safer, to form a constitution of our own in a cool
deliberate manner, while we have it in our power, than to trust such an
interesting event to time and chance. If we omit it now, some Massenello* may
hereafter arise, who laying hold of popular disquietudes, may collect together
the desperate and the discontented, and by assuming to themselves the powers of
government, may sweep away the liberties of the continent like a deluge. Should
the government of America return again into the hands of Britain, the tottering
situation of things, will be a temptation for some desperate adventurer to try
his fortune; and in such a case, what relief can Britain give? Ere she could
hear the news the fatal business might be done, and ourselves suffering like
the wretched Britons under the oppression of the Conqueror. Ye that oppose
independence now, ye know not what ye do; ye are opening a door to eternal
tyranny, by keeping vacant the seat of government.</span></p><p cwidth="984" data-dcnode-id="1050" eza="cwidth:984px;;cheight:57px;;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:551px;rend_px_area:56088;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[122];pagepos:664;cwidth:984px;cheight:57px;wcalc_source:child;wcalc:170px;wocalc:98px;hcalc:551;rend_px_area:56088;rcnt:1;ez_min_text_wdth:103;req_px_area:58892.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1051" instrument_node="">(*Thomas Anello, otherwise Massenello, a fisherman of Naples, who after
spiriting up his countrymen in the public market place, against the oppression
of the Spaniards, to whom the place was then subject, prompted them to revolt,
and in the space of a day became king.) </span></p><p cwidth="984" data-dcnode-id="1048" eza="cwidth:984px;;cheight:133px;;wcalc_source:child;wcalc:112px;wocalc:112px;hcalc:1292px;rend_px_area:130872;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[123];pagepos:665;cwidth:984px;cheight:133px;wcalc_source:child;wcalc:200px;wocalc:112px;hcalc:1292;rend_px_area:130872;rcnt:1;ez_min_text_wdth:122;req_px_area:137415.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1049" instrument_node="">There are thousands and tens of thousands; who would think it glorious to
expel from the continent, that barbarous and hellish power, which hath stirred
up the Indians and Negroes to destroy us; the cruelty hath a double guilt, it
is dealing brutally by us, and treacherously by them. To talk of friendship
with those in whom our reason forbids us to have faith, and our affections,
(wounded through a thousand pores) instruct us to detest, is madness and folly.
Every day wears out the little remains of kindred between us and them, and can
there be any reason to hope, that as the relationship expires, the affection
will increase, or that we shall agree better, when we have ten times more and
greater concerns to quarrel over than ever?</span></p><p cwidth="984" data-dcnode-id="1046" eza="cwidth:984px;;cheight:171px;;wcalc_source:child;wcalc:135px;wocalc:135px;hcalc:1311px;rend_px_area:168264;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[124];pagepos:666;cwidth:984px;cheight:171px;wcalc_source:child;wcalc:200px;wocalc:135px;hcalc:1311;rend_px_area:168264;rcnt:1;ez_min_text_wdth:150;req_px_area:176677.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1047" instrument_node="">Ye that tell us of harmony and reconciliation, can ye restore to us the time
that is past? Can ye give to prostitution its former innocence? Neither can ye
reconcile Britain and America. The last cord now is broken, the people of
England are presenting addresses against us. There are injuries which nature
cannot forgive; she would cease to be nature if she did. As well can the lover
forgive the ravisher of his mistress, as the continent forgive the murders of
Britain. The Almighty hath implanted in us these inextinguishable feelings for
good and wise purposes. They are the guardians of his image in our hearts. They
distinguish us from the herd of common animals. The social compact would
dissolve, and justice be extirpated the earth, of have only a casual existence
were we callous to the touches of affection. The robber and the murderer, would
often escape unpunished, did not the injuries which our tempers sustain,
provoke us into justice.</span></p><p cwidth="984" data-dcnode-id="1044" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:94px;wocalc:94px;hcalc:855px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[125];pagepos:667;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:170px;wocalc:94px;hcalc:855;rend_px_area:74784;rcnt:1;ez_min_text_wdth:103;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1045" instrument_node="">O ye that love mankind! Ye that dare oppose, not only the tyranny, but the
tyrant, stand forth! Every spot of the old world is overrun with oppression.
