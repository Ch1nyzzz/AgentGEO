Freedom hath been hunted round the globe. Asia, and Africa, have long expelled
her. Europe regards her like a stranger, and England hath given her warning to
depart. O! receive the fugitive, and prepare in time an asylum for mankind.</span></p><p cwidth="984" data-dcnode-id="1040" eza="cwidth:984px;;cheight:20px;;wcalc_source:child;wcalc:128px;wocalc:128px;hcalc:140px;rend_px_area:19680;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[126];pagepos:668;cwidth:984px;cheight:20px;wcalc_source:child;wcalc:132px;wocalc:128px;hcalc:140;rend_px_area:19680;rcnt:1;ez_min_text_wdth:122;req_px_area:18636.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><b cwidth="0" data-dcnode-id="1041" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:132px;wocalc:132px;hcalc:120px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[126]/b;pagepos:669;cwidth:132;cheight:0px;wcalc_source:child;wcalc:132px;wocalc:132px;hcalc:120;rend_px_area:0;rcnt:1;ez_min_text_wdth:132;req_px_area:18636.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><a cwidth="0" data-dcnode-id="1042" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:128px;wocalc:128px;hcalc:140px;rend_px_area:0;" name="part4" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[126]/b/a;pagepos:670;cwidth:128;cheight:0px;wcalc_source:child;wcalc:128px;wocalc:128px;hcalc:140;rend_px_area:0;rcnt:1;ez_min_text_wdth:128;req_px_area:18636.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1043" instrument_node="">Of the present ability of America, with some
miscellaneous reflections</span></a></b></p><p cwidth="984" data-dcnode-id="1036" eza="cwidth:984px;;cheight:57px;;wcalc_source:child;wcalc:119px;wocalc:119px;hcalc:532px;rend_px_area:56088;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[127];pagepos:671;cwidth:984px;cheight:57px;wcalc_source:child;wcalc:119px;wocalc:119px;hcalc:532;rend_px_area:56088;rcnt:1;ez_min_text_wdth:122;req_px_area:58892.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><i cwidth="0" data-dcnode-id="1038" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:39px;wocalc:39px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[127]/i;pagepos:672;cwidth:39;cheight:0px;wcalc_source:child;wcalc:39px;wocalc:39px;hcalc:38;rend_px_area:0;rcnt:2;ez_min_text_wdth:38;req_px_area:2028;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1039" instrument_node="">I have</span></i><span data-dcnode-id="1037" instrument_node=""> never met with a man, either in England or America, who hath
not confessed his opinion, that a separation between the countries, would take
place one time or other. And there is no instance in which we have shown less
judgment, than in endeavoring to describe, what we call, the ripeness or
fitness of the Continent for independence.</span></p><p cwidth="984" data-dcnode-id="1028" eza="cwidth:984px;;cheight:57px;;wcalc_source:child;wcalc:107px;wocalc:107px;hcalc:589px;rend_px_area:56088;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[128];pagepos:674;cwidth:984px;cheight:57px;wcalc_source:child;wcalc:107px;wocalc:107px;hcalc:589;rend_px_area:56088;rcnt:1;ez_min_text_wdth:112;req_px_area:58892.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1035" instrument_node="">As all men allow the measure, and vary only in their opinion of the time,
let us, in order to remove mistakes, take a general survey of things and
endeavor if possible, to find out the </span><i cwidth="0" data-dcnode-id="1033" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:36px;wocalc:36px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[128]/i[1];pagepos:676;cwidth:36;cheight:0px;wcalc_source:child;wcalc:36px;wocalc:36px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:36;req_px_area:1497.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1034" instrument_node="">very</span></i><span data-dcnode-id="1032" instrument_node=""> time. But we need not go far,
the inquiry ceases at once, for the </span><i cwidth="0" data-dcnode-id="1030" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:47px;wocalc:47px;hcalc:76px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[128]/i[2];pagepos:678;cwidth:47;cheight:0px;wcalc_source:child;wcalc:47px;wocalc:47px;hcalc:76;rend_px_area:0;rcnt:5;ez_min_text_wdth:47;req_px_area:4888;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1031" instrument_node="">time hath found us</span></i><span data-dcnode-id="1029" instrument_node="">. The general
concurrence, the glorious union of all things prove the fact.</span></p><p cwidth="984" data-dcnode-id="1026" eza="cwidth:984px;;cheight:152px;;wcalc_source:child;wcalc:101px;wocalc:101px;hcalc:1729px;rend_px_area:149568;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[129];pagepos:680;cwidth:984px;cheight:152px;wcalc_source:child;wcalc:200px;wocalc:101px;hcalc:1729;rend_px_area:149568;rcnt:1;ez_min_text_wdth:112;req_px_area:157046.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1027" instrument_node="">It is not in numbers but in unity, that our great strength lies; yet our
present numbers are sufficient to repel the force of all the world. The
Continent hath, at this time, the largest body of armed and disciplined men of
any power under Heaven; and is just arrived at that pitch of strength, in which
no single colony is able to support itself, and the whole, who united can
accomplish the matter, and either more, or, less than this, might be fatal in
its effects. Our land force is already sufficient, and as to naval affairs, we
cannot be insensible, that Britain would never suffer an American man of war to
be built while the continent remained in her hands. Wherefore we should be no
forwarder an hundred years hence in that branch, than we are now; but the truth
is, we should be less so, because the timber of the country is every day
diminishing, and that which will remain at last, will be far off and difficult
to procure.</span></p><p cwidth="984" data-dcnode-id="1024" eza="cwidth:984px;;cheight:171px;;wcalc_source:child;wcalc:118px;wocalc:118px;hcalc:1729px;rend_px_area:168264;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[130];pagepos:681;cwidth:984px;cheight:171px;wcalc_source:child;wcalc:200px;wocalc:118px;hcalc:1729;rend_px_area:168264;rcnt:1;ez_min_text_wdth:131;req_px_area:176677.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1025" instrument_node="">Were the continent crowded with inhabitants, her sufferings under the
present circumstances would be intolerable. The more sea port towns we had, the
more should we have both to defend and to loose. Our present numbers are so
happily proportioned to our wants, that no man need be idle. The diminution of
trade affords an army, and the necessities of an army create a new trade. Debts
we have none; and whatever we may contract on this account will serve as a
glorious memento of our virtue. Can we but leave posterity with a settled form
of government, an independent constitution of its own, the purchase at any
price will be cheap. But to expend millions for the sake of getting a few we
acts repealed, and routing the present ministry only, is unworthy the charge,
and is using posterity with the utmost cruelty; because it is leaving them the
great work to do, and a debt upon their backs, from which they derive no
advantage. Such a thought is unworthy a man of honor, and is the true
characteristic of a narrow heart and a peddling politician.</span></p><p cwidth="984" data-dcnode-id="1022" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:116px;wocalc:116px;hcalc:1064px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[131];pagepos:682;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:200px;wocalc:116px;hcalc:1064;rend_px_area:112176;rcnt:1;ez_min_text_wdth:122;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1023" instrument_node="">The debt we may contract doth not deserve our regard if the work be but
accomplished. No nation ought to be without a debt. A national debt is a
national bond; and when it bears no interest, is in no case a grievance.
Britain is oppressed with a debt of upwards of one hundred and forty millions
sterling, for which she pays upwards of four millions interest. And as a
compensation for her debt, she has a large navy; America is without a debt, and
without a navy; yet for the twentieth part of the English national debt, could
have a navy as large again. The navy of England is not worth, at this time,
more than three millions and a half sterling.</span></p><p cwidth="984" data-dcnode-id="1017" eza="cwidth:984px;;cheight:38px;;wcalc_source:child;wcalc:103px;wocalc:103px;hcalc:456px;rend_px_area:37392;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[132];pagepos:683;cwidth:984px;cheight:38px;wcalc_source:child;wcalc:103px;wocalc:103px;hcalc:456;rend_px_area:37392;rcnt:1;ez_min_text_wdth:122;req_px_area:39261.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="1021" instrument_node="">The first and second editions of this pamphlet were published without the

more than it cost. And is that nice point in national policy, in which commerce

by that means replace our paper currency with ready gold and silver.</span></p><p cwidth="984" data-dcnode-id="736" eza="cwidth:984px;;cheight:228px;;wcalc_source:child;wcalc:108px;wocalc:108px;hcalc:2337px;rend_px_area:224352;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[137];pagepos:778;cwidth:984px;cheight:228px;wcalc_source:child;wcalc:220px;wocalc:108px;hcalc:2337;rend_px_area:224352;rcnt:1;ez_min_text_wdth:112;req_px_area:235569.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="737" instrument_node="">In point of manning a fleet, people in general run into great errors; it is
not necessary that one-fourth part should be sailors. The privateer Terrible,
Captain Death, stood the hottest engagement of any ship last war, yet had not
twenty sailors on board, though her complement of men was upwards of two
hundred. A few able and social sailors will soon instruct a sufficient number
of active landsmen in the common work of a ship. Wherefore, we never can be
more capable to begin on maritime matters than now, while our timber is
standing, our fisheries blocked up, and our sailors and shipwrights out of
employ. Men of war of seventy and eighty guns were built forty years ago in New
England, and why not the same now? Ship building is America's greatest pride,
and in which, she will in time excel the whole world. The great empires of the
east are mostly inland, and consequently excluded from the possibility of
rivaling her. Africa is in a state of barbarism; and no power in Europe, hath
either such an extent or coast, or such an internal supply of materials. Where
nature hath given the one, she has withheld the other; to America only hath she
been liberal of both. The vast empire of Russia is almost shut out from the
sea; wherefore, her boundless forests, her tar, iron, and cordage are only
articles of commerce.</span></p><p cwidth="984" data-dcnode-id="734" eza="cwidth:984px;;cheight:133px;;wcalc_source:child;wcalc:118px;wocalc:118px;hcalc:1292px;rend_px_area:130872;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[138];pagepos:779;cwidth:984px;cheight:133px;wcalc_source:child;wcalc:200px;wocalc:118px;hcalc:1292;rend_px_area:130872;rcnt:1;ez_min_text_wdth:122;req_px_area:137415.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="735" instrument_node="">In point of safety, ought we to be without a fleet? We are not the little
people now, which we were sixty years ago; at that time we might have trusted
our property in the streets, or fields rather; and slept securely without locks
or bolts to our doors or windows. The case now is altered, and our methods of
defense ought to improve with our increase of property. A common pirate, twelve
months ago, might have come up the Delaware, and laid the city of Philadelphia
under instant contribution, for what sum he pleased; and the same might have
happened to other places. Nay, any daring fellow, in a brig of fourteen or
sixteen guns, might have robbed the whole Continent, and carried off half a
million of money. These are circumstances which demand our attention, and point
out the necessity of naval protection.</span></p><p cwidth="984" data-dcnode-id="732" eza="cwidth:984px;;cheight:133px;;wcalc_source:child;wcalc:109px;wocalc:109px;hcalc:1330px;rend_px_area:130872;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[139];pagepos:780;cwidth:984px;cheight:133px;wcalc_source:child;wcalc:200px;wocalc:109px;hcalc:1330;rend_px_area:130872;rcnt:1;ez_min_text_wdth:112;req_px_area:137415.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="733" instrument_node="">Some, perhaps, will say, that after we have made it up with Britain, she
will protect us. Can we be so unwise as to mean, that she shall keep a navy in
our harbors for that purpose? Common sense will tell us, that the power which
hath endeavored to subdue us, is of all others the most improper to defend us.
Conquest may be effected under the pretense of friendship; and ourselves, after
a long and brave resistance, be at last cheated into slavery. And if her ships
are not to be admitted into our harbors, I would ask, how is she to protect us?
A navy three or four thousand miles off can be of little use, and on sudden
emergencies, none at all. Wherefore, if we must hereafter protect ourselves,
why not do it for ourselves? Why do it for another.</span></p><p cwidth="984" data-dcnode-id="730" eza="cwidth:984px;;cheight:266px;;wcalc_source:child;wcalc:127px;wocalc:127px;hcalc:2280px;rend_px_area:261744;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[140];pagepos:781;cwidth:984px;cheight:266px;wcalc_source:child;wcalc:220px;wocalc:127px;hcalc:2280;rend_px_area:261744;rcnt:1;ez_min_text_wdth:131;req_px_area:274831.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="731" instrument_node="">The English list of ships of war is long and formidable, but not a tenth
part of them are at any one time fit for service, numbers of them not in being;
yet their names are pompously continued in the list, if only a plank be left of
the ship: and not a fifth part, of such as are fit for service, can be spared
on any one station at one time. The East, and West Indies, Mediterranean,
Africa, and other parts over which Britain extends her claim, make large
demands upon her navy. From a mixture of prejudice and inattention, we have
contracted a false notion respecting the navy of England, and have talked as if
we should have the whole of it to encounter at once, and for that reason,
supposed that we must have one as large; which not being instantly practicable,
have been made use of by a set of disguised tories to discourage our beginning
thereon. Nothing can be farther from truth than this; for if America had only a
twentieth part of the naval force of Britain, she would be by far an over match
for her; because, as we neither have, nor claim any foreign dominion, our whole
force would be employed on our own coast, where we should, in the long run,
have two to one the advantage of those who had three or four thousand miles to
sail over, before they could attack us, and the same distance to return in
order to refit and recruit. And although Britain by her fleet, hath a check
over our trade to Europe, we have as large a one over her trade to the West
Indies, which, by laying in the neighborhood of the Continent, is entirely at
its mercy.</span></p><p cwidth="984" data-dcnode-id="728" eza="cwidth:984px;;cheight:133px;;wcalc_source:child;wcalc:94px;wocalc:94px;hcalc:1577px;rend_px_area:130872;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[141];pagepos:782;cwidth:984px;cheight:133px;wcalc_source:child;wcalc:200px;wocalc:94px;hcalc:1577;rend_px_area:130872;rcnt:1;ez_min_text_wdth:94;req_px_area:137415.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="729" instrument_node="">Some method might be fallen on to keep up a naval force in time of peace, if
we should not judge it necessary to support a constant navy. If premiums were
to be given to merchants, to build and employ in their service, ships mounted
with twenty, thirty, forty, or fifty guns, (the premiums to be in proportion to
the loss of bulk to the merchants) fifty or sixty of those ships, with a few
guard ships on constant duty, would keep up a sufficient navy, and that without
burdening ourselves with the evil so loudly complained of in England, of
suffering their fleet, in time of peace to lie rotting in the docks. To unite
the sinews of commerce and defense is sound policy; for when our strength and
our riches, play into each other's hand, we need fear no external enemy.

</span></p><span data-dcnode-id="727" instrument_node="">
</span><p cwidth="984" data-dcnode-id="725" eza="cwidth:984px;;cheight:171px;;wcalc_source:child;wcalc:113px;wocalc:113px;hcalc:1843px;rend_px_area:168264;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[142];pagepos:783;cwidth:984px;cheight:171px;wcalc_source:child;wcalc:200px;wocalc:113px;hcalc:1843;rend_px_area:168264;rcnt:1;ez_min_text_wdth:131;req_px_area:176677.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="726" instrument_node="">In almost every article of defense we abound. Hemp flourishes even to
rankness, so that we need not want cordage. Our iron is superior to that of
other countries. Our small arms equal to any in the world. Cannon we can cast
at pleasure. Saltpetre and gunpowder we are every day producing. Our knowledge
is hourly improving. Resolution is our inherent character, and courage hath
never yet forsaken us. Wherefore, what is it that we want? Why is it that we
hesitate? From Britain we can expect nothing but ruin. If she is once admitted
to the government of America again, this Continent will not be worth living in.
Jealousies will be always arising; insurrections will be constantly happening;
and who will go forth to quell them? Who will venture his life to reduce his
own countrymen to a foreign obedience? The difference between Pennsylvania and
Connecticut, respecting some unlocated lands, shows the insignificance of a
British government, and fully proves, that nothing but Continental authority
can regulate Continental matters.</span></p><p cwidth="984" data-dcnode-id="723" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:103px;wocalc:103px;hcalc:703px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[143];pagepos:784;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:170px;wocalc:103px;hcalc:703;rend_px_area:74784;rcnt:1;ez_min_text_wdth:103;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="724" instrument_node="">Another reason why the present time is preferable to all others, is, that
the fewer our numbers are, the more land there is yet unoccupied, which instead
of being lavished by the king on his worthless dependents, may be hereafter
applied, not only to the discharge of the present debt, but to the constant
support of government. No nation under heaven hath such an advantage as
this.</span></p><p cwidth="984" data-dcnode-id="721" eza="cwidth:984px;;cheight:171px;;wcalc_source:child;wcalc:133px;wocalc:133px;hcalc:1463px;rend_px_area:168264;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[144];pagepos:785;cwidth:984px;cheight:171px;wcalc_source:child;wcalc:200px;wocalc:133px;hcalc:1463;rend_px_area:168264;rcnt:1;ez_min_text_wdth:140;req_px_area:176677.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="722" instrument_node="">The infant state of the Colonies, as it is called, so far from being
against, is an argument in favor of independence. We are sufficiently numerous,
and were we more so, we might be less united. It is a matter worthy of
observation, that the more a country is peopled, the smaller their armies are.
In military numbers, the ancients far exceeded the moderns: and the reason is
evident, for trade being the consequence of population, men become too much
absorbed thereby to attend to anything else. Commerce diminishes the spirit,
both of patriotism and military defense. And history sufficiently informs us,
that the bravest achievements were always accomplished in the non-age of a
nation. With the increase of commerce England hath lost its spirit. The city of
London, notwithstanding its numbers, submits to continued insults with the
patience of a coward. The more men have to lose, the less willing are they to
venture. The rich are in general slaves to fear, and submit to courtly power
with the trembling duplicity of a spaniel.</span></p><p cwidth="984" data-dcnode-id="713" eza="cwidth:984px;;cheight:152px;;wcalc_source:child;wcalc:100px;wocalc:100px;hcalc:1786px;rend_px_area:149568;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[145];pagepos:786;cwidth:984px;cheight:152px;wcalc_source:child;wcalc:100px;wocalc:100px;hcalc:1786;rend_px_area:149568;rcnt:1;ez_min_text_wdth:122;req_px_area:157046.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="720" instrument_node="">Youth is the seed-time of good habits, as well in nations as in individuals.
It might be difficult, if not impossible, to form the Continent into one
government half a century hence. The vast variety of interests, occasioned by
an increase of trade and population, would create confusion. Colony would be
against colony. Each being able might scorn each other's assistance: and while
the proud and foolish gloried in their little distinctions, the wise would
lament that the union had not been formed before. Wherefore, the </span><i cwidth="0" data-dcnode-id="718" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:62px;wocalc:62px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[145]/i[1];pagepos:788;cwidth:62;cheight:0px;wcalc_source:child;wcalc:62px;wocalc:62px;hcalc:38;rend_px_area:0;rcnt:5;ez_min_text_wdth:62;req_px_area:3868.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="719" instrument_node="">present
time</span></i><span data-dcnode-id="717" instrument_node=""> is the </span><i cwidth="0" data-dcnode-id="715" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:37px;wocalc:37px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[145]/i[2];pagepos:790;cwidth:37;cheight:0px;wcalc_source:child;wcalc:37px;wocalc:37px;hcalc:38;rend_px_area:0;rcnt:5;ez_min_text_wdth:37;req_px_area:2693.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="716" instrument_node="">true time</span></i><span data-dcnode-id="714" instrument_node=""> for establishing it. The intimacy which is
contracted in infancy, and the friendship which is formed in misfortune, are,
of all others, the most lasting and unalterable. Our present union is marked
with both these characters: we are young, and we have been distressed; but our
concord hath withstood our troubles, and fixes a memorable area for posterity
to glory in.</span></p><p cwidth="984" data-dcnode-id="709" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:104px;wocalc:104px;hcalc:1121px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[146];pagepos:792;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:104px;wocalc:104px;hcalc:1121;rend_px_area:112176;rcnt:1;ez_min_text_wdth:112;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="712" instrument_node="">The present time, likewise, is that peculiar time, which never happens to a
nation but once, viz., the time of forming itself into a government. Most
nations have let slip the opportunity, and by that means have been compelled to
receive laws from their conquerors, instead of making laws for themselves.
First, they had a king, and then a form of government; whereas, the articles or
charter of government, should be formed first, and men delegated to execute
them afterwards: but from the errors of other nations, let us learn wisdom, and
lay hold of the present opportunity — </span><i cwidth="0" data-dcnode-id="710" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:76px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[146]/i;pagepos:794;cwidth:98;cheight:0px;wcalc_source:child;wcalc:98px;wocalc:98px;hcalc:76;rend_px_area:0;rcnt:2;ez_min_text_wdth:94;req_px_area:10192;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="711" instrument_node="">to begin government at the right
end.</span></i></p><p cwidth="984" data-dcnode-id="707" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:551px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[147];pagepos:795;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:170px;wocalc:120px;hcalc:551;rend_px_area:74784;rcnt:1;ez_min_text_wdth:140;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="708" instrument_node="">When William the Conqueror subdued England he gave them law at the point of
the sword; and until we consent that the seat of government in America, be
legally and authoritatively occupied, we shall be in danger of having it filled
by some fortunate ruffian, who may treat us in the same manner, and then, where
will be our freedom? where our property?</span></p><p cwidth="984" data-dcnode-id="705" eza="cwidth:984px;;cheight:152px;;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:1425px;rend_px_area:149568;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[148];pagepos:796;cwidth:984px;cheight:152px;wcalc_source:child;wcalc:200px;wocalc:125px;hcalc:1425;rend_px_area:149568;rcnt:1;ez_min_text_wdth:140;req_px_area:157046.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="706" instrument_node="">As to religion, I hold it to be the indispensable duty of all government, to
protect all conscientious professors thereof, and I know of no other business
which government hath to do therewith. Let a man throw aside that narrowness of
soul, that selfishness of principle, which the niggards of all professions are
so unwilling to part with, and he will be at once delivered of his fears on
that head. Suspicion is the companion of mean souls, and the bane of all good
society. For myself I fully and conscientiously believe, that it is the will of
the Almighty, that there should be diversity of religious opinions among us: It
affords a larger field for our Christian kindness. Were we all of one way of
thinking, our religious dispositions would want matter for probation; and on
this liberal principle, I look on the various denominations among us, to be
like children of the same family, differing only, in what is called their
Christian names.</span></p><p cwidth="984" data-dcnode-id="703" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:110px;wocalc:110px;hcalc:817px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[149];pagepos:797;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:170px;wocalc:110px;hcalc:817;rend_px_area:74784;rcnt:1;ez_min_text_wdth:112;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="704" instrument_node="">Earlier in this work, I threw out a few thoughts on the propriety of a
Continental Charter, (for I only presume to offer hints, not plans) and in this
place, I take the liberty of rementioning the subject, by observing, that a
charter is to be understood as a bond of solemn obligation, which the whole
enters into, to support the right of every separate part, whether of religion,
personal freedom, or property, A firm bargain and a right reckoning make long
friends.</span></p><p cwidth="984" data-dcnode-id="692" eza="cwidth:984px;;cheight:228px;;wcalc_source:child;wcalc:132px;wocalc:132px;hcalc:2014px;rend_px_area:224352;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[150];pagepos:798;cwidth:984px;cheight:228px;wcalc_source:child;wcalc:132px;wocalc:132px;hcalc:2014;rend_px_area:224352;rcnt:1;ez_min_text_wdth:150;req_px_area:235569.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="702" instrument_node="">In a former page I likewise mentioned the necessity of a large and equal
representation; and there is no political matter which more deserves our
attention. A small number of electors, or a small number of representatives,
are equally dangerous. But if the number of the representatives be not only
small, but unequal, the danger is increased. As an instance of this, I mention
the following; when the Associators petition was before the House of Assembly
of Pennsylvania; twenty-eight members only were present, all the Bucks County
members, being eight, voted against it, and had seven of the Chester members
done the same, this whole province had been governed by two counties only, and
this danger it is always exposed to. The unwarrantable stretch likewise, which
that house made in their last sitting, to gain an undue authority over the
delegates of that province, ought to warn the people at large, how they trust
power out of their own hands. A set of instructions for the Delegates were put
together, which in point of sense and business would have dishonored a
school-boy, and after being approved by a </span><i cwidth="0" data-dcnode-id="700" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:30px;wocalc:30px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[150]/i[1];pagepos:800;cwidth:30;cheight:0px;wcalc_source:child;wcalc:30px;wocalc:30px;hcalc:19;rend_px_area:0;rcnt:7;ez_min_text_wdth:28;req_px_area:1248;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="701" instrument_node="">few</span></i><span data-dcnode-id="699" instrument_node="">, a </span><i cwidth="0" data-dcnode-id="697" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:36px;wocalc:36px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[150]/i[2];pagepos:802;cwidth:36;cheight:0px;wcalc_source:child;wcalc:36px;wocalc:36px;hcalc:38;rend_px_area:0;rcnt:7;ez_min_text_wdth:36;req_px_area:2246.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="698" instrument_node="">very few</span></i><span data-dcnode-id="696" instrument_node=""> without
doors, were carried into the house, and there passed in </span><i cwidth="0" data-dcnode-id="694" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:53px;wocalc:53px;hcalc:76px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[150]/i[3];pagepos:804;cwidth:53;cheight:0px;wcalc_source:child;wcalc:53px;wocalc:53px;hcalc:76;rend_px_area:0;rcnt:7;ez_min_text_wdth:53;req_px_area:6614.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="695" instrument_node="">behalf of the whole
colony</span></i><span data-dcnode-id="693" instrument_node="">; whereas, did the whole colony know, with what ill-will that House
hath entered on some necessary public measures, they would not hesitate a
moment to think them unworthy of such a trust.</span></p><p cwidth="984" data-dcnode-id="684" eza="cwidth:984px;;cheight:153px;;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:1426px;rend_px_area:150552;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[151];pagepos:806;cwidth:984px;cheight:153px;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:1426;rend_px_area:150552;rcnt:1;ez_min_text_wdth:131;req_px_area:158079.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="691" instrument_node="">Immediate necessity makes many things convenient, which if continued would
grow into oppressions. Expedience and right are different things. When the
calamities of America required a consultation, there was no method so ready, or
at that time so proper, as to appoint persons from the several Houses of
Assembly for that purpose and the wisdom with which they have proceeded hath
preserved this continent from ruin. But as it is more than probable that we
shall never be without a </span><b cwidth="0" data-dcnode-id="689" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:83px;wocalc:83px;hcalc:20px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[151]/b;pagepos:808;cwidth:83;cheight:0px;wcalc_source:child;wcalc:83px;wocalc:83px;hcalc:20;rend_px_area:0;rcnt:5;ez_min_text_wdth:83;req_px_area:3452.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="690" instrument_node="">Congress</span></b><span data-dcnode-id="688" instrument_node="">, every well-wisher to good order, must
own, that the mode for choosing members of that body, deserves consideration.
And I put it as a question to those, who make a study of mankind, whether
</span><i cwidth="0" data-dcnode-id="686" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[151]/i;pagepos:810;cwidth:120;cheight:0px;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:38;rend_px_area:0;rcnt:5;ez_min_text_wdth:120;req_px_area:7488;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="687" instrument_node="">representation and election</span></i><span data-dcnode-id="685" instrument_node=""> is not too great a power for one and the
same body of men to possess? When we are planning for posterity, we ought to
remember that virtue is not hereditary.</span></p><p cwidth="984" data-dcnode-id="679" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:93px;wocalc:93px;hcalc:893px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[152];pagepos:812;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:93px;wocalc:93px;hcalc:893;rend_px_area:74784;rcnt:1;ez_min_text_wdth:103;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="683" instrument_node="">It is from our enemies that we often gain excellent maxims, and are
frequently surprised into reason by their mistakes. Mr. Cornwall (one of the
Lords of the Treasury) treated the petition of the New York Assembly with
contempt, because </span><i cwidth="0" data-dcnode-id="681" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:33px;wocalc:33px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[152]/i;pagepos:814;cwidth:33;cheight:0px;wcalc_source:child;wcalc:33px;wocalc:33px;hcalc:19;rend_px_area:0;rcnt:3;ez_min_text_wdth:33;req_px_area:1372.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="682" instrument_node="">that</span></i><span data-dcnode-id="680" instrument_node=""> House, he said, consisted but of twenty-six
members, which trifling number, he argued, could not with decency be put for
the whole. We thank him for his involuntary honesty.* </span></p><p cwidth="984" data-dcnode-id="677" eza="cwidth:984px;;cheight:38px;;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:247px;rend_px_area:37392;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[153];pagepos:816;cwidth:984px;cheight:38px;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:247;rend_px_area:37392;rcnt:1;ez_min_text_wdth:131;req_px_area:37440;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="678" instrument_node="">*Those who would fully understand of what great consequence a large and
equal representation is to a state, should read Burgh's political
Disquisitions.</span></p><p cwidth="984" data-dcnode-id="673" eza="cwidth:984px;;cheight:58px;;wcalc_source:child;wcalc:119px;wocalc:119px;hcalc:533px;rend_px_area:57072;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[154];pagepos:817;cwidth:984px;cheight:58px;wcalc_source:child;wcalc:119px;wocalc:119px;hcalc:533;rend_px_area:57072;rcnt:1;ez_min_text_wdth:122;req_px_area:59925.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><b cwidth="0" data-dcnode-id="675" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:87px;wocalc:87px;hcalc:40px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[154]/b;pagepos:818;cwidth:87;cheight:0px;wcalc_source:child;wcalc:87px;wocalc:87px;hcalc:40;rend_px_area:0;rcnt:2;ez_min_text_wdth:87;req_px_area:3619.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="676" instrument_node="">To conclude:</span></b><span data-dcnode-id="674" instrument_node=""> However strange it may appear to some, or however
unwilling they may be to think so, matters not, but many strong and striking
reasons may be given, to show, that nothing can settle our affairs so
expeditiously as an open and determined declaration for independence. Some of
which are:</span></p><p cwidth="984" data-dcnode-id="671" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:109px;wocalc:109px;hcalc:646px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[155];pagepos:820;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:170px;wocalc:109px;hcalc:646;rend_px_area:74784;rcnt:1;ez_min_text_wdth:122;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="672" instrument_node="">First — It is the custom of nations, when any two are at war, for some
other powers, not engaged in the quarrel, to step in as mediators, and bring
about the preliminaries of a peace: but while America calls herself the subject
of Great Britain, no power, however well disposed she may be, can offer her
mediation. Wherefore, in our present state we may quarrel on for ever.</span></p><p cwidth="984" data-dcnode-id="669" eza="cwidth:984px;;cheight:57px;;wcalc_source:child;wcalc:119px;wocalc:119px;hcalc:532px;rend_px_area:56088;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[156];pagepos:821;cwidth:984px;cheight:57px;wcalc_source:child;wcalc:170px;wocalc:119px;hcalc:532;rend_px_area:56088;rcnt:1;ez_min_text_wdth:122;req_px_area:58892.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="670" instrument_node="">Secondly — It is unreasonable to suppose, that France or Spain will
give us any kind of assistance, if we mean only to make use of that assistance
for the purpose of repairing the breach, and strengthening the connection
between Britain and America; because, those powers would be sufferers by the
consequences.</span></p><p cwidth="984" data-dcnode-id="664" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:124px;wocalc:124px;hcalc:570px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[157];pagepos:822;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:124px;wocalc:124px;hcalc:570;rend_px_area:74784;rcnt:1;ez_min_text_wdth:131;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="668" instrument_node="">Thirdly — While we profess ourselves the subjects of Britain, we must,
in the eye of foreign nations, be considered as rebels. The precedent is
somewhat dangerous to </span><i cwidth="0" data-dcnode-id="666" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:48px;wocalc:48px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[157]/i;pagepos:824;cwidth:48;cheight:0px;wcalc_source:child;wcalc:48px;wocalc:48px;hcalc:38;rend_px_area:0;rcnt:3;ez_min_text_wdth:47;req_px_area:2995.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="667" instrument_node="">their peace</span></i><span data-dcnode-id="665" instrument_node="">, for men to be in arms under the name
of subjects; we on the spot, can solve the paradox: but to unite resistance and
subjection, requires an idea much too refined for common understanding.</span></p><p cwidth="984" data-dcnode-id="662" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:101px;wocalc:101px;hcalc:1349px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[158];pagepos:826;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:200px;wocalc:101px;hcalc:1349;rend_px_area:112176;rcnt:1;ez_min_text_wdth:122;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="663" instrument_node="">Fourthly — Were a manifesto to be published, and dispatched to foreign
courts, setting forth the miseries we have endured, and the peaceable methods
we have ineffectually used for redress; declaring, at the same time, that not
being able, any longer to live happily or safely under the cruel disposition of
the British court, we had been driven to the necessity of breaking off all
connection with her; at the same time assuring all such courts of our peaceable
disposition towards them, and of our desire of entering into trade with them.
Such a memorial would produce more good effects to this Continent, than if a
ship were freighted with petitions to Britain.</span></p><p cwidth="984" data-dcnode-id="660" eza="cwidth:984px;;cheight:38px;;wcalc_source:child;wcalc:119px;wocalc:119px;hcalc:323px;rend_px_area:37392;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[159];pagepos:827;cwidth:984px;cheight:38px;wcalc_source:child;wcalc:119px;wocalc:119px;hcalc:323;rend_px_area:37392;rcnt:1;ez_min_text_wdth:122;req_px_area:39261.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="661" instrument_node="">Under our present denomination of British subjects we can neither be
received nor heard abroad: The custom of all courts is against us, and will be
so, until, by an independence, we take rank with other nations.</span></p><p cwidth="984" data-dcnode-id="658" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:114px;wocalc:114px;hcalc:741px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[160];pagepos:828;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:170px;wocalc:114px;hcalc:741;rend_px_area:74784;rcnt:1;ez_min_text_wdth:112;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="659" instrument_node="">These proceedings may at first appear strange and difficult; but, like all
other steps which we have already passed over, will in a little time become
familiar and agreeable; and, until an independence is declared, the continent
will feel itself like a man who continues putting off some unpleasant business
from day to day, yet knows it must be done, hates to set about it, wishes it
over, and is continually haunted with the thoughts of its necessity.</span></p><p cwidth="984" data-dcnode-id="654" eza="cwidth:984px;;cheight:20px;;wcalc_source:child;wcalc:84px;wocalc:84px;hcalc:20px;rend_px_area:19680;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[161];pagepos:829;cwidth:984px;cheight:20px;wcalc_source:child;wcalc:120px;wocalc:84px;hcalc:20;rend_px_area:19680;rcnt:1;ez_min_text_wdth:75;req_px_area:3494.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><b cwidth="0" data-dcnode-id="655" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:20px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[161]/b;pagepos:830;cwidth:120;cheight:0px;wcalc_source:child;wcalc:120px;wocalc:120px;hcalc:20;rend_px_area:0;rcnt:1;ez_min_text_wdth:83;req_px_area:3494.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><a cwidth="0" data-dcnode-id="656" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:84px;wocalc:84px;hcalc:20px;rend_px_area:0;" name="app" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[161]/b/a;pagepos:831;cwidth:84;cheight:0px;wcalc_source:child;wcalc:84px;wocalc:84px;hcalc:20;rend_px_area:0;rcnt:1;ez_min_text_wdth:83;req_px_area:3494.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="657" instrument_node="">Appendix</span></a></b></p><p cwidth="984" data-dcnode-id="650" eza="cwidth:984px;;cheight:95px;;wcalc_source:child;wcalc:119px;wocalc:119px;hcalc:855px;rend_px_area:93480;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[162];pagepos:832;cwidth:984px;cheight:95px;wcalc_source:child;wcalc:119px;wocalc:119px;hcalc:855;rend_px_area:93480;rcnt:1;ez_min_text_wdth:122;req_px_area:98154;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><i cwidth="0" data-dcnode-id="652" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:45px;wocalc:45px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[162]/i;pagepos:833;cwidth:45;cheight:0px;wcalc_source:child;wcalc:45px;wocalc:45px;hcalc:19;rend_px_area:0;rcnt:2;ez_min_text_wdth:45;req_px_area:1872;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="653" instrument_node="">Since</span></i><span data-dcnode-id="651" instrument_node=""> the publication of the first edition of this pamphlet, or
rather, on the same day on which it came out, the king's speech made its
appearance in this city. Had the spirit of prophecy directed the birth of this
production, it could not have brought it forth, at a more seasonable juncture,
or a more necessary time. The bloody-mindedness of the one, show the necessity
of pursuing the doctrine of the other. Men read by way of revenge. And the
speech instead of terrifying, prepared a way for the manly principles of
independence.</span></p><p cwidth="984" data-dcnode-id="630" eza="cwidth:984px;;cheight:286px;;wcalc_source:child;wcalc:118px;wocalc:118px;hcalc:2719px;rend_px_area:281424;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[163];pagepos:835;cwidth:984px;cheight:286px;wcalc_source:child;wcalc:118px;wocalc:118px;hcalc:2719;rend_px_area:281424;rcnt:1;ez_min_text_wdth:122;req_px_area:295495.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="649" instrument_node="">Ceremony, and even, silence, from whatever motive they may arise, have a
hurtful tendency, when they give the least degree of countenance to base and
wicked performances; wherefore, if this maxim be admitted, it naturally
follows, that the king's speech, as being a piece of finished villainy,
deserved, and still deserves, a general execration both by the congress and the
people. Yet as the domestic tranquility of a nation, depends greatly on the
</span><i cwidth="0" data-dcnode-id="647" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:64px;wocalc:64px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[163]/i[1];pagepos:837;cwidth:64;cheight:0px;wcalc_source:child;wcalc:64px;wocalc:64px;hcalc:19;rend_px_area:0;rcnt:13;ez_min_text_wdth:64;req_px_area:2662.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="648" instrument_node="">chastity</span></i><span data-dcnode-id="646" instrument_node=""> of what may properly be called </span><b cwidth="0" data-dcnode-id="644" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:79px;wocalc:79px;hcalc:40px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[163]/b;pagepos:839;cwidth:79;cheight:0px;wcalc_source:child;wcalc:79px;wocalc:79px;hcalc:40;rend_px_area:0;rcnt:13;ez_min_text_wdth:79;req_px_area:4929.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="645" instrument_node="">national manners</span></b><span data-dcnode-id="643" instrument_node="">, it is
often better, to pass some things over in silent disdain, than to make use of
such new methods of dislike, as might introduce the least innovation, on that
guardian of our peace and safety. And perhaps, it is chiefly owing to this
prudent delicacy, that the king's speech, hath not before now, suffered a
public execution. The speech if it may be called one, is nothing better than a
willful audacious libel against the truth, the common good, and the existence of
mankind; and is a formal and pompous method of offering up human sacrifices to
the pride of tyrants. But this general massacre of mankind, is one of the
privileges, and the certain consequences of kings; for as nature knows them
</span><i cwidth="0" data-dcnode-id="641" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:27px;wocalc:27px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[163]/i[2];pagepos:841;cwidth:27;cheight:0px;wcalc_source:child;wcalc:27px;wocalc:27px;hcalc:19;rend_px_area:0;rcnt:13;ez_min_text_wdth:27;req_px_area:1123.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="642" instrument_node="">not</span></i><span data-dcnode-id="640" instrument_node="">, they know </span><i cwidth="0" data-dcnode-id="638" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:28px;wocalc:28px;hcalc:38px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[163]/i[3];pagepos:843;cwidth:28;cheight:0px;wcalc_source:child;wcalc:28px;wocalc:28px;hcalc:38;rend_px_area:0;rcnt:13;ez_min_text_wdth:28;req_px_area:2038.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="639" instrument_node="">not her</span></i><span data-dcnode-id="637" instrument_node="">, and although they are beings of our
</span><i cwidth="0" data-dcnode-id="635" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:34px;wocalc:34px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[163]/i[4];pagepos:845;cwidth:34;cheight:0px;wcalc_source:child;wcalc:34px;wocalc:34px;hcalc:19;rend_px_area:0;rcnt:13;ez_min_text_wdth:28;req_px_area:1048.32;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="636" instrument_node="">own</span></i><span data-dcnode-id="634" instrument_node=""> creating, they know not </span><i cwidth="0" data-dcnode-id="632" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:19px;wocalc:19px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[163]/i[5];pagepos:847;cwidth:19;cheight:0px;wcalc_source:child;wcalc:19px;wocalc:19px;hcalc:19;rend_px_area:0;rcnt:13;ez_min_text_wdth:19;req_px_area:790.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="633" instrument_node="">us</span></i><span data-dcnode-id="631" instrument_node="">, and are become the gods of their
creators. The speech hath one good quality, which is, that it is not calculated
to deceive, neither can we, even if we would, be deceived by it. Brutality and
tyranny appear on the face of it. It leaves us at no loss: And every line
convinces, even in the moment of reading, that He, who hunts the woods for
prey, the naked and untutored Indian, is less a savage than the king of
Britain.</span></p><p cwidth="984" data-dcnode-id="619" eza="cwidth:984px;;cheight:191px;;wcalc_source:child;wcalc:124px;wocalc:124px;hcalc:1598px;rend_px_area:187944;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[164];pagepos:849;cwidth:984px;cheight:191px;wcalc_source:child;wcalc:124px;wocalc:124px;hcalc:1598;rend_px_area:187944;rcnt:1;ez_min_text_wdth:140;req_px_area:197341.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="629" instrument_node="">Sir John Dalrymple, the putative father of a whining jesuitical piece,
fallaciously called, </span><i cwidth="0" data-dcnode-id="627" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:92px;wocalc:92px;hcalc:133px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[164]/i[1];pagepos:851;cwidth:92;cheight:0px;wcalc_source:child;wcalc:92px;wocalc:92px;hcalc:133;rend_px_area:0;rcnt:5;ez_min_text_wdth:92;req_px_area:17222.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="628" instrument_node="">The address of the people of England to the inhabitants
of America</span></i><span data-dcnode-id="626" instrument_node="">, hath, perhaps from a vain supposition, that the people here
were to be frightened at the pomp and description of a king, given, (though
very unwisely on his part) the real character of the present one: "But," says
this writer, "if you are inclined to pay compliments to an administration,
which we do not complain of," (meaning the Marquis of Rockingham's at the
repeal of the Stamp Act) "it is very unfair in you to withhold them from that
prince, </span><i cwidth="0" data-dcnode-id="621" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:109px;wocalc:109px;hcalc:135px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[164]/i[2];pagepos:853;cwidth:109;cheight:0px;wcalc_source:child;wcalc:109px;wocalc:109px;hcalc:135;rend_px_area:0;rcnt:5;ez_min_text_wdth:84;req_px_area:15028;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="625" instrument_node="">by whose </span><b cwidth="0" data-dcnode-id="623" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:49px;wocalc:49px;hcalc:40px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[164]/i[2]/b;pagepos:855;cwidth:49;cheight:0px;wcalc_source:child;wcalc:49px;wocalc:49px;hcalc:40;rend_px_area:0;rcnt:3;ez_min_text_wdth:49;req_px_area:3057.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="624" instrument_node="">nod alone</span></b><span data-dcnode-id="622" instrument_node=""> they were permitted to do anything.</span></i><span data-dcnode-id="620" instrument_node="">"
This is toryism with a witness! Here is idolatry even without a mask: And he
who can calmly hear, and digest such doctrine, hath forfeited his claim to
rationality an apostate from the order of manhood; and ought to be considered
— as one, who hath, not only given up the proper dignity of a man, but
sunk himself beneath the rank of animals, and contemptibly crawl through the
world like a worm.</span></p><p cwidth="984" data-dcnode-id="614" eza="cwidth:984px;;cheight:171px;;wcalc_source:child;wcalc:132px;wocalc:132px;hcalc:1463px;rend_px_area:168264;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[165];pagepos:858;cwidth:984px;cheight:171px;wcalc_source:child;wcalc:132px;wocalc:132px;hcalc:1463;rend_px_area:168264;rcnt:1;ez_min_text_wdth:131;req_px_area:176677.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="618" instrument_node="">However, it matters very little now, what the king of England either says or
does; he hath wickedly broken through every moral and human obligation,
trampled nature and conscience beneath his feet; and by a steady and
constitutional spirit of insolence and cruelty, procured for himself an
universal hatred. It is </span><i cwidth="0" data-dcnode-id="616" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:34px;wocalc:34px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[165]/i;pagepos:860;cwidth:34;cheight:0px;wcalc_source:child;wcalc:34px;wocalc:34px;hcalc:19;rend_px_area:0;rcnt:3;ez_min_text_wdth:28;req_px_area:1048.32;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="617" instrument_node="">now</span></i><span data-dcnode-id="615" instrument_node=""> the interest of America to provide for
herself. She hath already a large and young family, whom it is more her duty to
take care of, than to be granting away her property, to support a power who is
become a reproach to the names of men and Christians. Ye, whose office it is to
watch over the morals of a nation, of whatsoever sect or denomination ye are
of, as well as ye, who are more immediately the guardians of the public
liberty, if ye wish to preserve your native country uncontaminated by European
corruption, ye must in secret wish a separation But leaving the moral part to
private reflection, I shall chiefly confine my farther remarks to the following
heads:</span></p><p cwidth="984" data-dcnode-id="612" eza="cwidth:984px;;cheight:19px;;wcalc_source:child;wcalc:81px;wocalc:81px;hcalc:190px;rend_px_area:18696;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[166];pagepos:862;cwidth:984px;cheight:19px;wcalc_source:child;wcalc:110px;wocalc:81px;hcalc:190;rend_px_area:18696;rcnt:1;ez_min_text_wdth:84;req_px_area:19630.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="613" instrument_node="">First — That it is the interest of America to be separated from
Britain.</span></p><p cwidth="984" data-dcnode-id="604" eza="cwidth:984px;;cheight:39px;;wcalc_source:child;wcalc:134px;wocalc:134px;hcalc:230px;rend_px_area:38376;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[167];pagepos:863;cwidth:984px;cheight:39px;wcalc_source:child;wcalc:134px;wocalc:134px;hcalc:230;rend_px_area:38376;rcnt:1;ez_min_text_wdth:131;req_px_area:37585.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="611" instrument_node="">Secondly — Which is the easiest and most practicable plan,
</span><b cwidth="0" data-dcnode-id="609" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:20px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[167]/b[1];pagepos:865;cwidth:125;cheight:0px;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:20;rend_px_area:0;rcnt:5;ez_min_text_wdth:125;req_px_area:5200;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="610" instrument_node="">reconciliation</span></b><span data-dcnode-id="608" instrument_node=""> or </span><b cwidth="0" data-dcnode-id="606" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:20px;rend_px_area:0;" style="background-color:transparent;background-size:auto;font-weight:bold;nodepath:/html/body/div[5]/p[167]/b[2];pagepos:867;cwidth:125;cheight:0px;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:20;rend_px_area:0;rcnt:5;ez_min_text_wdth:124;req_px_area:5200;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="607" instrument_node="">independence</span></b><span data-dcnode-id="605" instrument_node="">? with some occasional remarks.</span></p><p cwidth="984" data-dcnode-id="602" eza="cwidth:984px;;cheight:228px;;wcalc_source:child;wcalc:114px;wocalc:114px;hcalc:2337px;rend_px_area:224352;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[168];pagepos:869;cwidth:984px;cheight:228px;wcalc_source:child;wcalc:220px;wocalc:114px;hcalc:2337;rend_px_area:224352;rcnt:1;ez_min_text_wdth:112;req_px_area:235569.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="603" instrument_node="">In support of the first, I could, if I judged it proper, produce the opinion
of some of the ablest and most experienced men on this continent; and whose
sentiments, on that head, are not yet publicly known. It is in reality a
self-evident position: For no nation in a state of foreign dependence, limited
in its commerce, and cramped and fettered in its legislative powers, can ever
arrive at any material eminence. America doth not yet know what opulence is;
and although the progress which she hath made stands unparalleled in the
history of other nations, it is but childhood, compared with what she would be
capable of arriving at, had she, as she ought to have, the legislative powers
in her own hands. England is, at this time, proudly coveting what would do her
no good, were she to accomplish it; and the Continent hesitating on a matter,
which will be her final ruin if neglected. It is the commerce and not the
conquest of America, by which England is to be benefited, and that would in a
great measure continue, were the countries as independent of each other as
France and Spain; because in many articles, neither can go to a better market.
But it is the independence of this country on Britain or any other which is now
the main and only object worthy of contention, and which, like all other truths
discovered by necessity, will appear clearer and stronger every day.</span></p><p cwidth="984" data-dcnode-id="600" eza="cwidth:984px;;cheight:19px;;wcalc_source:child;wcalc:68px;wocalc:68px;hcalc:133px;rend_px_area:18696;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[169];pagepos:870;cwidth:984px;cheight:19px;wcalc_source:child;wcalc:110px;wocalc:68px;hcalc:133;rend_px_area:18696;rcnt:1;ez_min_text_wdth:66;req_px_area:16016;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="601" instrument_node="">First — Because it will come to that one time or other.</span></p><p cwidth="984" data-dcnode-id="598" eza="cwidth:984px;;cheight:19px;;wcalc_source:child;wcalc:97px;wocalc:97px;hcalc:152px;rend_px_area:18696;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[170];pagepos:871;cwidth:984px;cheight:19px;wcalc_source:child;wcalc:110px;wocalc:97px;hcalc:152;rend_px_area:18696;rcnt:1;ez_min_text_wdth:103;req_px_area:19630.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="599" instrument_node="">Secondly — Because the longer it is delayed the harder it will be to
accomplish.</span></p><p cwidth="984" data-dcnode-id="590" eza="cwidth:984px;;cheight:209px;;wcalc_source:child;wcalc:114px;wocalc:114px;hcalc:2223px;rend_px_area:205656;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[171];pagepos:872;cwidth:984px;cheight:209px;wcalc_source:child;wcalc:114px;wocalc:114px;hcalc:2223;rend_px_area:205656;rcnt:1;ez_min_text_wdth:112;req_px_area:215938.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="597" instrument_node="">I have frequently amused myself both in public and private companies, with
silently remarking the spacious errors of those who speak without reflecting.
And among the many which I have heard, the following seems the most general,
viz., that had this rupture happened forty or fifty years hence, instead of
</span><i cwidth="0" data-dcnode-id="595" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:34px;wocalc:34px;hcalc:19px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[171]/i[1];pagepos:874;cwidth:34;cheight:0px;wcalc_source:child;wcalc:34px;wocalc:34px;hcalc:19;rend_px_area:0;rcnt:5;ez_min_text_wdth:28;req_px_area:1048.32;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="596" instrument_node="">now</span></i><span data-dcnode-id="594" instrument_node="">, the Continent would have been more able to have shaken off the
dependence. To which I reply, that our military ability </span><i cwidth="0" data-dcnode-id="592" eza="cwidth:0px;;cheight:0px;;wcalc_source:child;wcalc:37px;wocalc:37px;hcalc:57px;rend_px_area:0;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[171]/i[2];pagepos:876;cwidth:37;cheight:0px;wcalc_source:child;wcalc:37px;wocalc:37px;hcalc:57;rend_px_area:0;rcnt:5;ez_min_text_wdth:37;req_px_area:3078.4;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:;vertical_margin:0;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="593" instrument_node="">at this time</span></i><span data-dcnode-id="591" instrument_node="">,
arises from the experience gained in the last war, and which in forty or fifty
years time, would have been totally extinct. The Continent, would not, by that
time, have had a General, or even a military officer left; and we, or those who
may succeed us, would have been as ignorant of martial matters as the ancient
Indians: And this single position, closely attended to, will unanswerably
prove, that the present time is preferable to all others: The argument turns
thus — at the conclusion of the last war, we had experience, but wanted
numbers; and forty or fifty years hence, we should have numbers, without
experience; wherefore, the proper point of time, must be some particular point
between the two extremes, in which a sufficiency of the former remains, and a
proper increase of the latter is obtained: And that point of time is the
present time.</span></p><p cwidth="984" data-dcnode-id="588" eza="cwidth:984px;;cheight:38px;;wcalc_source:child;wcalc:90px;wocalc:90px;hcalc:380px;rend_px_area:37392;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[172];pagepos:878;cwidth:984px;cheight:38px;wcalc_source:child;wcalc:110px;wocalc:90px;hcalc:380;rend_px_area:37392;rcnt:1;ez_min_text_wdth:103;req_px_area:39261.6;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="589" instrument_node="">The reader will pardon this digression, as it does not properly come under
the head I first set out with, and to which I again return by the following
position, viz.:</span></p><p cwidth="984" data-dcnode-id="586" eza="cwidth:984px;;cheight:114px;;wcalc_source:child;wcalc:125px;wocalc:125px;hcalc:931px;rend_px_area:112176;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[173];pagepos:879;cwidth:984px;cheight:114px;wcalc_source:child;wcalc:200px;wocalc:125px;hcalc:931;rend_px_area:112176;rcnt:1;ez_min_text_wdth:131;req_px_area:117784.8;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="587" instrument_node="">Should affairs be patched up with Britain, and she to remain the governing
and sovereign power of America, (which as matters are now circumstanced, is
giving up the point entirely) we shall deprive ourselves of the very means of
sinking the debt we have or may contract. The value of the back lands which
some of the provinces are clandestinely deprived of, by the unjust extension of
the limits of Canada, valued only at five pounds sterling per hundred acres,
amount to upwards of twenty-five millions, Pennsylvania currency; and the
quit-rents at one penny sterling per acre, to two millions yearly.</span></p><p cwidth="984" data-dcnode-id="584" eza="cwidth:984px;;cheight:76px;;wcalc_source:child;wcalc:103px;wocalc:103px;hcalc:779px;rend_px_area:74784;" style="background-color:transparent;background-size:auto;nodepath:/html/body/div[5]/p[174];pagepos:880;cwidth:984px;cheight:76px;wcalc_source:child;wcalc:170px;wocalc:103px;hcalc:779;rend_px_area:74784;rcnt:1;ez_min_text_wdth:103;req_px_area:78523.2;obj_px_area:0;req_px_height:20.8;req_margin_and_padding:0;req_ns_height:32;vertical_margin:0;parent-text-align:left;parent-line-height:normal;margin-for-scale:0px 0px 0px 0px;padding-for-scale:0px 0px 0px 0px;"><span data-dcnode-id="585" instrument_node="">It is by the sale of those lands that the debt may be sunk, without burden
to any, and the quit-rent reserved thereon, will always lessen, and in time,
will wholly support the yearly expense of government. It matters not how long
the debt is in paying, so that the lands when sold be applied to the discharge
of it, and for the execution of which, the Congress for the time being, will be
