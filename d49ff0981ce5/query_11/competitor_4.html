</span><h2 data-dcnode-id="2058" id="Resource_Person:_Professor_Heaven_Crawley"><span data-dcnode-id="2059" instrument_node="">Resource Person: Professor Heaven Crawley</span></h2><span data-dcnode-id="2057" instrument_node="">
</span><p data-dcnode-id="2051"><span data-dcnode-id="2056" instrument_node="">Tel: +44 (0)1 7813 12712 </span><br data-dcnode-id="2055"><span data-dcnode-id="2054" instrument_node=""> Email: </span><a class="spamspan" data-dcnode-id="2052" href="mailto:heaven.crawley%40coventry.ac.uk"><span data-dcnode-id="2053" instrument_node="">heaven.crawley@coventry.ac.uk</span></a></p><span data-dcnode-id="2050" instrument_node="">
</span><p data-dcnode-id="2048"><img alt="" data-dcnode-id="2049" height="307" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pureportal.coventry.ac.uk/files-asset/25179965/Crawley_small.jpg&amp;raw" width="230"></p><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2042"><span data-dcnode-id="2046" instrument_node="">Professor Heaven Crawley joined the Centre for Trust, Peace and Social Relations at Coventry University in September 2014 and leads research on Migration, Displacement and Belonging. Educated at the Universities of Sussex (1989-1994) and Oxford (1995-1999), Heaven has more than 20 years' experience of undertaking research on international migration in a wide range of institutional settings (government, voluntary sector, national and international organisations, academia). She was previously head of asylum and migration research at the UK Home Office (2000-2), Associate Director at the Institute for Public Policy Research (IPPR) (2002-4) and managed an international research consultancy (2004-6) before returning to academia to establish the Centre for Migration Policy Research at Swansea University (2006-14). Heaven has written extensively on gender issues in the asylum claim including in her book </span><em data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node=""> Refugees and Gender: Law and Process </span></em><span data-dcnode-id="2043" instrument_node=""> (Jordan Publishing 2001) and has undertaken research on this issue for UNHCR. She was a founder member of the Refugee Women’s Legal Group (RWLG) in the UK which drafted gender guidelines which were subsequently adopted by the UK Home Office in 2004. She has also delivered training on gender issues to Home Office caseworkers, lawyers and community representatives.&nbsp;</span></p><span data-dcnode-id="2041" instrument_node="">
</span><h3 data-dcnode-id="2039" id="Resource_Person:_Chloe_Lewis"><span data-dcnode-id="2040" instrument_node="">Resource Person: Chloé Lewis</span></h3><span data-dcnode-id="2038" instrument_node="">
</span><p data-dcnode-id="2033"><span data-dcnode-id="2037" instrument_node="">Email:&nbsp;</span><span data-dcnode-id="2034"><a class="spamspan" data-dcnode-id="2035" href="mailto:chloe.lewis7%40gmail.com"><span data-dcnode-id="2036" instrument_node="">chloe.lewis7@gmail.com</span></a></span></p><span data-dcnode-id="2032" instrument_node="">
</span><p data-dcnode-id="2030"><img alt="" data-dcnode-id="2031" height="466" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refugeelegalaidinformation.org/sites/default/files/uploads/images/Chloe%2520Lewis.png&amp;raw" width="311"></p><span data-dcnode-id="2029" instrument_node="">
</span><p data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">Chloé Lewis is a DPhil candidate in International Development at the University of Oxford where she is exploring responses to sexual violence in the Democratic Republic of the Congo. Alongside her doctoral research, Chloé has completed a Policy Research Fellowship with the NGO Working Group on Women, Peace and Security in New York and worked with the Human Rights Center Sexual Violence Program at the University of California, Berkeley, School of Law researching accountability for sexual violence in eastern DRC. She is currently working with The World Bank Gender Innovation Lab exploring opportunities and limits for promoting gender equitable norms through a gender sensitisation programme in North and South Kivu. She completed her undergraduate degree in Politics and International Studies at the University of Warwick and has an MSc in Refugee and Forced Migration Studies from the University of Oxford.</span></p><span data-dcnode-id="2026" instrument_node="">
</span><h3 data-dcnode-id="2024" id="GENDER_ISSUES_IN_THE_ASYLUM_CLAIM"><span data-dcnode-id="2025" instrument_node="">GENDER ISSUES IN THE ASYLUM CLAIM</span></h3><span data-dcnode-id="2023" instrument_node="">
</span><h3 data-dcnode-id="2021" id="What_is_gender"><span data-dcnode-id="2022" instrument_node="">What is gender?</span></h3><span data-dcnode-id="2020" instrument_node="">
</span><p data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">There is a tendency to assume a gendered approach means exclusively addressing the experiences of women, and sometimes girls. As women and girls are disproportionately affected by gender inequality – as a result of their unequal access to rights, resources, and political power, as well as other gendered power imbalances - a focus on women and girls is often necessary. In recent years, however, the gendered experiences of men and the roles of masculinities are increasingly being recognised and understood. Importantly, and regardless of who is making the asylum claim, a gendered approach focuses not on individual women and men but on the system which determines gender roles and responsibilities, access to and control over resources, and decision-making potentials.</span></p><span data-dcnode-id="2017" instrument_node="">
</span><p data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">It is important to understand that‘gender’ is not the same as ‘sex’, which is biologically defined. ‘Gender’ is a concept which is used to refer to those characteristics of men and women which are socially rather than biologically determined. The use of the term gender emphasises that with the exception of their sexually distinct functions (childbearing and breastfeeding), everything that women and men do – and everything expected of them – can and does change over time and according to changing and varied political, economic, social and cultural factors. Gender relations, and therefore gender differences, are historically, geographically and culturally specific, so that what it means to be a woman or a man varies over place and time</span></p><span data-dcnode-id="2014" instrument_node="">
</span><p data-dcnode-id="2009"><span data-dcnode-id="2013" instrument_node="">Gender can also be understood as distinct to ‘gender identity’ , which refers to a person’s internal sense and experience of their gender. This may or may not correspond to the sex they were assigned at birth or within the traditional categories of woman/female and man/male. In broad terms, individuals whose sexual orientation, gender identity, or sexual practices fall outside of – or are perceived to by others – traditional categories and norms are increasingly referred to as sexual and gender minorities (SGM). They may more commonly be referred to by the acronym LGBTI, which stands for lesbian, gay, bisexual, trans, intersex. For more information about the ways in which sexuality can impact on experiences of forced migration, see </span><a data-dcnode-id="2011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refugeelegalaidinformation.org/sexual-orientation-and-gender-identity-lgbti"><span data-dcnode-id="2012" instrument_node="">this page on the Rights in Exile website</span></a><span data-dcnode-id="2010" instrument_node="">.</span></p><span data-dcnode-id="2008" instrument_node="">
</span><h3 data-dcnode-id="2006" id="The_importance_of_gender_in_the_refugee_context"><span data-dcnode-id="2007" instrument_node="">The importance of gender in the refugee context</span></h3><span data-dcnode-id="2005" instrument_node="">
</span><p data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">Gender has typically been neglected in the dominant interpretation of the 1951 Convention Relating to the Status of Refugees (‘the Refugee Convention’) because unlike other aspects of difference including race, religion and nationality, it is not listed as one of the enumerated Convention Grounds that can form the basis of a claim for protection under international law. But gender can play an important role in shaping experiences of persecution. In many countries women suffer the same deprivation and harm that is common to other refugees. For example, they may be targeted because they are political activists, community organisers, members of women’s movements or persist in demanding that their rights or those of their relatives or community members are respected. In addition however, the experiences of women often differ significantly from those of men because women’s political protest, activism and resistance may manifest itself in different ways. For example:</span></p><span data-dcnode-id="2002" instrument_node="">
</span><ol data-dcnode-id="1985"><span data-dcnode-id="2001" instrument_node="">
</span><li data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">Women may hide people, pass messages or provide community services, food, clothing and medical care;</span></li><span data-dcnode-id="1998" instrument_node="">
</span><li data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">The authorities in some countries exploit family relationships to intensify harm;</span></li><span data-dcnode-id="1995" instrument_node="">
</span><li data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">Women who do not conform to the moral or ethical standards imposed on them may suffer cruel or inhuman treatment;</span></li><span data-dcnode-id="1992" instrument_node="">
</span><li data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">Women may be targeted because they are particularly vulnerable, for example, those with caring responsibilities or young women who can easily be sexually abused;</span></li><span data-dcnode-id="1989" instrument_node="">
</span><li data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Women may be persecuted by members of their family and/or community.</span></li><span data-dcnode-id="1986" instrument_node="">
</span></ol><span data-dcnode-id="1984" instrument_node="">
</span><p data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">There is evidence that these women are sometimes unable to benefit equitably from protection under the Refugee Convention. The reasons are two-fold:</span></p><span data-dcnode-id="1981" instrument_node="">
</span><ol data-dcnode-id="1973"><span data-dcnode-id="1980" instrument_node="">
</span><li data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Procedural and evidential barriers prevent women’s access to the asylum determination process;</span></li><span data-dcnode-id="1977" instrument_node="">
</span><li data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">In interpreting the Refugee Convention, women’s experiences have been marginalised. For example, whilst overt expression of a political opinion through conventional means such as involvement in political parties may be considered as a basis for political asylum, less conventional forms of political resistance, such as refusal to abide by discriminatory laws or to follow prescribed rules of conduct, are often wrongly categorised as ‘personal conduct’.</span></li><span data-dcnode-id="1974" instrument_node="">
</span></ol><span data-dcnode-id="1972" instrument_node="">
</span><p data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">In addition, decision-makers may ignore cultural and social prohibitions on women travelling or living alone, the ability of women being able to survive economically without family support in societies where women’s rights to work are curtailed, or they may face greater risk of harassment, exploitation and violence.</span></p><span data-dcnode-id="1969" instrument_node="">
</span><p data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">Men’s gendered experiences of forced migration and displacement are increasingly being recognised across a diversity of contexts. As is the case for women, gender interacts with other facets of men’s identities and can influence their reasons to flee, the nature of their journey, as well as their access (or not) to formal and informal protection mechanisms, including refugee status. Men, for instance, are more likely to be forcibly conscribed into national armies or recruited by non-state armed groups to fight in wars and armed conflict. Men may also lose their livelihood and be unable to fulfil their roles as breadwinners for their family, which is often core to their identity as men, as husbands, and as fathers. Men can also be targeted or otherwise socially sanctioned if they do not – or are not perceived to – adhere to traditional norms of masculinity.</span></p><span data-dcnode-id="1966" instrument_node="">
</span><p data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Research and work with refugee and asylum-seeking men has shed light their often unheard and unseen experiences and vulnerabilities, including to sexual violence. The use of sexual violence against men has been identified in over 25 armed conflicts, and is often perpetrated against men held in detention. It can be especially challenging for men to disclose experiences of sexual violence (including rape), as this is heavily stigmatised and there are rarely response and support mechanisms in place for male survivors. As a result of these factors and the broader silence surrounding this issue, sexual violence perpetrated against men is overlooked and is not counted in existing statistics on sexual violence in conflict. Moreover, in legal and asylum contexts, sexual violations are often recorded and treated under the ambit of torture.</span></p><span data-dcnode-id="1963" instrument_node="">
</span><p data-dcnode-id="1958"><span data-dcnode-id="1962" instrument_node="">To a lesser degree, the experiences of sexual and gender minorities in conflict and refugee contexts are also slowly being recognised. In a recent report on this issue, International Alert highlights the diverse and multi-layered vulnerabilities to violence, threats, and discrimination of individuals that can arise on the basis of their sexual and/or gender identities in addition to their national and legal identities (See Special Issues: </span><a data-dcnode-id="1960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.refugeelegalaidinformation.org/sexual-orientation-and-gender-identity-lgbti"><span data-dcnode-id="1961" instrument_node=""> http://www.refugeelegalaidinformation.org/sexual-orientation-and-gender-identity-lgbti </span></a><span data-dcnode-id="1959" instrument_node=""> ). Precarious situations can arise in varying forms and to varying degrees in different contexts and at different stages of forced migration from individuals’ countries and communities of origin to their host countries and communities. The risks that sexual and gender minorities face may be comparable to those of heterosexual women and men, but may be exacerbated if their clandestine or peer support systems break down and/or if their gender identity, sexual orientation, or sexual practices are revealed. The degrees of risks faced may also vary depending on how ‘visibly’ non-conventional or heterosexual an individual is, or is perceived to be.</span></p><span data-dcnode-id="1957" instrument_node="">
</span><h3 data-dcnode-id="1955" id="Gender-specific_and_gender-related_persecution"><span data-dcnode-id="1956" instrument_node="">Gender-specific and gender-related persecution</span></h3><span data-dcnode-id="1954" instrument_node="">
</span><p data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">It is important to understand the difference between gender-related persecution and gender-specific forms of harm.</span></p><span data-dcnode-id="1951" instrument_node="">
</span><p data-dcnode-id="1943"><span data-dcnode-id="1950" instrument_node="">The concept of women being persecuted as women is not the same as women being persecuted </span><em data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node=""> because </span></em><span data-dcnode-id="1947" instrument_node=""> they are women. The concept of gender-specific&nbsp; persecution addresses forms of persecution that are specific or more likely to happen to women including, for example, sexual violence, female genital mutilation (see Special Issues: </span><a data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.refugeelegalaidinformation.org/female-genital-mutilation-grounds-seeking-asylum"><span data-dcnode-id="1946" instrument_node=""> http://www.refugeelegalaidinformation.org/female-genital-mutilation-grounds-seeking-asylum </span></a><span data-dcnode-id="1944" instrument_node=""> ), forced abortion and sterilisation and denial of access to contraception. Understanding the ways in which women are violated as women is critical to naming as persecution those forms of harm that only or mostly affect women.</span></p><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">To say that a woman fears persecution because she is a woman (gender-related persecution) addresses the causal relationship between gender (as socially constructed) and persecution. For example, sexual activity outside a socially condoned relationship may result in persecution.</span></p><span data-dcnode-id="1939" instrument_node="">
</span><p data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">Equally, it is important to recognise that gender-specific violations do not necessarily constitute persecution because of gender. For example, if a man’s genitals are subjected to electric shocks, he is being tortured in a gender-specific way, but it does not necessarily follow that he is being persecuted because of his gender: rather he may be persecuted because of his political or religious identity or activities. Similarly many women experience gender-specific forms of persecution, including rape and sexual violence, because of their actual or imputed political or religious identity or activities. It is important not to assume that all women experience gender-related persecution even where this persecution takes a gender-specific form. The reasons for the persecution are critical in establishing the appropriate Convention ground within the meaning of the Refugee Convention.</span></p><span data-dcnode-id="1936" instrument_node="">
</span><h3 data-dcnode-id="1934" id="Interpreting_gendered_experiences_of_persecution"><span data-dcnode-id="1935" instrument_node="">Interpreting gendered experiences of persecution</span></h3><span data-dcnode-id="1933" instrument_node="">
</span><p data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">Proper interpretation of the Refugee Convention means taking account of the ways in which gender may shape the applicant’s experiences when assessing whether or not an individual is in need of international protection. This means establishing whether an applicant fears or has experienced ‘serious harm’, whether there is a failure of State protection and whether an applicant’s experiences are directly related to one of the grounds enumerated within the Refugee Convention.</span></p><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1927"><em data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node=""> Serious harm </span></em></p><span data-dcnode-id="1926" instrument_node="">
</span><p data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">There are many forms of harm that are only or more frequently used against women that may constitute serious harm and, if combined with a failure of state protection, rise to the level of persecution. Such persecution, if for a Convention reason could result in the woman being recognised as a refugee. Some of these forms of harm, most notably sexual violence and abuse and rape may also be used against men.</span></p><span data-dcnode-id="1923" instrument_node="">
</span><p data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">Gender-specific forms of persecution include, but are not limited to:</span></p><span data-dcnode-id="1920" instrument_node="">
</span><ul data-dcnode-id="1894"><span data-dcnode-id="1919" instrument_node="">
</span><li data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">Marriage-related harm;</span></li><span data-dcnode-id="1916" instrument_node="">
</span><li data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">Violence within the family or community;</span></li><span data-dcnode-id="1913" instrument_node="">
</span><li data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">Domestic slavery;</span></li><span data-dcnode-id="1910" instrument_node="">
</span><li data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">Forced abortion;</span></li><span data-dcnode-id="1907" instrument_node="">
</span><li data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">Forced sterilisation;</span></li><span data-dcnode-id="1904" instrument_node="">
</span><li data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">Trafficking;</span></li><span data-dcnode-id="1901" instrument_node="">
</span><li data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Female genital mutilation;</span></li><span data-dcnode-id="1898" instrument_node="">
</span><li data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">Sexual violence and abuse and rape.</span></li><span data-dcnode-id="1895" instrument_node="">
</span></ul><span data-dcnode-id="1893" instrument_node="">
</span><p data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Gender-specific harm is not different from other forms of ill treatment and violence that are commonly held to amount to persecution. The fact that violence against women is common and widespread in a particular society does not mean that it cannot amount to persecution. Each case should be considered on its own merits against country information and not disregarded because such treatment is common and widespread.</span></p><span data-dcnode-id="1890" instrument_node="">
</span><p data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">Some forms of harm can have implications beyond the physical, social and psychological consequences with which they are most obviously associated. Sexual violence in particular carries traumatic social repercussions for both women and men that may be affected by their cultural origins or social status. These may include, but are not limited to, rejection by (or of) the spouse and by family or community members, stigmatisation or ostracism by the wider community, and punishment and/or deprivation of education, employment and other types of assistance and protection. Where a victim of sexual violence may have no alternative but to marry her attacker or become a prostitute, these are also human rights violations. Equally, sexual violence and rape may be used against may be used as a form of emasculation and/or may have connotations of homosexuality that are associated with social stigma and shame.</span></p><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1882"><span data-dcnode-id="1886" instrument_node="">Social and cultural norms regarding appropriate gender roles and behaviour may mean that lesbians face violations of their human rights. Lesbians may experience different forms of ‘serious harm’ than those characteristically targeted at gay men. For example, many lesbians have effectively been denied the right to sexual orientation because they have been forced into marriage (See Special Issues: </span><a data-dcnode-id="1884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.refugeelegalaidinformation.org/sexual-orientation-and-gender-identity-lgbti"><span data-dcnode-id="1885" instrument_node=""> http://www.refugeelegalaidinformation.org/sexual-orientation-and-gender-identity-lgbti </span></a><span data-dcnode-id="1883" instrument_node=""> ).</span></p><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">In addition there are certain discriminatory measures which, in themselves or cumulatively with others may amount to persecution. For example, if the discrimination has consequences of a substantially prejudicial nature for the person concerned, this may amount to persecution. Examples of such discrimination, some of which can be seen more often to affect women, include:</span></p><span data-dcnode-id="1878" instrument_node="">
</span><p data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">• &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Serious restrictions on rights to earn a livelihood;</span></p><span data-dcnode-id="1875" instrument_node="">
</span><p data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">• &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Restrictions on political enfranchisement;</span></p><span data-dcnode-id="1872" instrument_node="">
</span><p data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">• &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Restrictions on whether to practise or not practise a religion;</span></p><span data-dcnode-id="1869" instrument_node="">
</span><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">• &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Restrictions on access to public places;</span></p><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">• &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Restrictions from normally available educational, legal, welfare and health provision.</span></p><span data-dcnode-id="1863" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">Women in particular may be subjected to discriminatory treatment that is enforced through law or through the imposition of social or religious norms that restrict their opportunities and rights. This can include, but is not limited to:</span></p><span data-dcnode-id="1860" instrument_node="">
</span><p data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">• &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Family and personal laws;</span></p><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">• &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Dress codes;</span></p><span data-dcnode-id="1854" instrument_node="">
</span><p data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">• &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Employment or education restrictions;</span></p><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">• &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Restrictions on women's freedom of movement and/or activities.</span></p><span data-dcnode-id="1848" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">Such restrictions may in themselves constitute ‘serious harm’. For example, dress codes may violate a woman’s right to freedom of conscience, expression or religion, either in and of themselves or because of the consequences of the refusal, failure or inability to comply. A broad range of penalties may be imposed for disobeying restrictions placed on women. Such penalties will often constitute ‘serious harm’, particularly where the level of punishment for violating discriminatory norms is disproportionately severe.</span></p><span data-dcnode-id="1845" instrument_node="">
</span><h3 data-dcnode-id="1843" id="Failure_of_state_protection"><span data-dcnode-id="1844" instrument_node="">Failure of state protection</span></h3><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">In addition to establishing a well-founded fear of ‘serious harm’, a woman must also show that the state has failed to protect her. A failure of state protection exists in the following situations:</span></p><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">• &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; If ‘serious harm’ has been inflicted by the authorities or by associated organisations or groups or;</span></p><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">• &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; If ‘serious harm’ has been committed by others and the authorities are unwilling to give effective protection or;</span></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">• &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; If ‘serious harm’ has been committed by others, and the authorities are unable to give effective protection.</span></p><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">• &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Conduct by those associated with the state, including sexual violence, is the responsibility of the state. The existence of particular laws or social policies/practices (including traditions and cultural practices) or the manner in which they are implemented may themselves constitute or involve a failure of protection. Thus, for example:</span></p><span data-dcnode-id="1827" instrument_node="">
</span><p data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">-&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; A law, policy or practice could be inherently persecutory; or</span></p><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">-&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; It may have a ‘legitimate’ (for example, population control) goal but be administered unfairly in a discriminatory fashion or through persecutory means; or</span></p><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">-&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The penalty for non-compliance with the law or policy may be disproportionately severe against certain persons/groups</span></p><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Women in particular may be subject to gender-related abuse resulting from social customs or conventions because there is no effective means of legal recourse to prevent, investigate or punish such acts. Such failure of state protection may occur but is not limited to, legislation (e.g. marital rape exemptions in law), lack of police response to pleas for assistance and/or a reluctance, refusal or failure to investigate, prosecute or punish individuals and encouragement or toleration of particular social/religious/customary laws, practices and behavioural norms or an unwillingness or inability to take action against them.</span></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">State protection must be meaningful, accessible, effective and available to an individual regardless of their gender, race, ethnicity, sexual orientation, disability, religion, class, age, occupation or any other aspect of their identity. In some cases there may be protection in theory, but actual practice must be examined. Corroborative evidence will not always be available.</span></p><span data-dcnode-id="1812" instrument_node="">
</span><p data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">It is not always reasonable or possible for a woman to alert the authorities to her need for protection, for example, if by doing so she risks violence, harassment or rejection by her society or even persecution. Men may be reluctant to report sexual violence and rape because of the stigma and shame with which it is associated.</span></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">The implications of gender in determining the reasonableness of an internal flight alternative should also be recognised in decision making.</span></p><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">The question to be asked in deciding whether it is reasonable to expect an asylum seeker to relocate is: would it be unduly harsh for the asylum seeker to relocate within their country of origin? The caseworker may need to take into account the implications of gender in determining the reasonableness of an internal flight alternative. For example, in certain countries, financial, logistical, social, cultural and other factors may result in particular difficulties for women or for particular women e.g. widows or single parents. Women may have family ties i.e. children which may have a bearing on the reasonableness of internal flight.</span></p><span data-dcnode-id="1803" instrument_node="">
</span><h3 data-dcnode-id="1801" id="The_Convention_grounds"><span data-dcnode-id="1802" instrument_node="">The Convention grounds</span></h3><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">In the absence of gender as an enumerated Convention ground within the Refugee Convention means that there is considerable debate about how gender issues in the asylum claim are dealt with under international law. It is important to understand that claims for asylum based on gender can, more often than not, be properly recognised within the meaning of the Convention if these experiences are properly understood within the social and political context within which they occur. This is made clear in the international guidance on how to interpret the Refugee Convention provided by UNHCR:</span></p><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">'Even though gender is not specifically referenced in the refugee definition, it is widely accepted that it can influence, or dictate, the type of persecution or harm suffered and the reasons for this treatment. The refugee definition, properly interpreted, therefore covers gender-related claims. As such, there is no need to add an additional ground to the 1951Convention definition'. (UNHCR 2002 Guidelines on International Protection No. 1: Gender-Related Persecution, paragraph 6)</span></p><span data-dcnode-id="1794" instrument_node="">
</span><h3 data-dcnode-id="1792" id="Race"><span data-dcnode-id="1793" instrument_node="">Race</span></h3><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">Whilst actual or attributed racial identity is not specific to either women or men, it may operate in tandem with gender to explain why a particular woman or man fears persecution. For example, whilst the destruction of ethnic identity and/or prosperity of a racial group may be through killing, maiming or incarcerating men, women may be viewed as propagating ethnic identity through their reproductive role, and may be persecuted through, for example, sexual violence or control of reproduction.&nbsp;Equally rape and sexual violence may be used as a weapon of war aimed at emasculating men and reducing their capacity or willingness to fight.</span></p><span data-dcnode-id="1788" instrument_node="">
</span><h3 data-dcnode-id="1786" id="Religion"><span data-dcnode-id="1787" instrument_node="">Religion</span></h3><span data-dcnode-id="1785" instrument_node="">
</span><p data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Both women and men may face harm for their adherence to, or rejection of, a religious belief or practice. Religion as the ground of persecution may include but is not limited to, the freedom to hold a belief system of one's choice or not to hold a particular belief system and the freedom to practise a religion of one's choice or not to practise a proscribed religion.</span></p><span data-dcnode-id="1782" instrument_node="">
</span><p data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Where the religion assigns particular roles or behavioural codes to women and men, a woman who refuses or fails to fulfil her assigned role or abide by the codes may have a well-founded fear of persecution on the ground of religion. Failure to abide by the behavioural codes set out for woman and men may be perceived as evidence that an individual holds unacceptable religious opinions regardless of what he or she actually believes about religion.</span></p><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">It is important to note that a woman's religious identity may be aligned with that of other members of her family or community regardless of what she actually believes. Imputed or attributed religious identity may therefore be important.</span></p><span data-dcnode-id="1776" instrument_node="">
</span><p data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">There may be considerable overlap between religious and political persecution. This may occur, for example, where the state supports or favours a particular religious persuasion or tolerates or otherwise fails to provide protection against the activities of non-state agents who are supporters of a particular religious persuasion.</span></p><span data-dcnode-id="1773" instrument_node="">
</span><h3 data-dcnode-id="1771" id="Nationality"><span data-dcnode-id="1772" instrument_node="">Nationality</span></h3><span data-dcnode-id="1770" instrument_node="">
</span><p data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">The term 'nationality' does not only mean 'citizenship'. It can include membership of an ethnic or linguistic group and may overlap with 'race'.</span></p><span data-dcnode-id="1767" instrument_node="">
</span><p data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Whilst actual or attributed national identity is not gender specific, it may operate in tandem with gender to explain why a woman or man fears persecution. Women may be deprived of full citizenship rights in certain circumstances, for example, if they marry a foreign national. In such circumstances it may be necessary to consider what harm results from this loss and whether it amounts to persecution on the basis of nationality.</span></p><span data-dcnode-id="1764" instrument_node="">
</span><h3 data-dcnode-id="1762" id="Political_opinion"><span data-dcnode-id="1763" instrument_node="">Political opinion</span></h3><span data-dcnode-id="1761" instrument_node="">
</span><p data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Holding political opinions different from those of the home government is not in itself a ground for refugee status. An applicant must show that they have a fear of persecution for holding such opinions. Persecution 'for reasons of political opinion' implies an applicant holds an opinion that either has been expressed or has come to the attention of the authorities. There may however, also be situations in which the applicant has not given any expression of their opinions but an opinion has been imputed to them because of something they have, or have not, done.</span></p><span data-dcnode-id="1758" instrument_node="">
</span><p data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Persecution ‘for reasons of’ political opinion is typically seen in terms of male experience i.e. due to direct involvement in conventional political activity such as membership of a political organisation. Claims on these grounds will often involve an openly expressed opinion, which is directed against and is not tolerated by the state.</span></p><span data-dcnode-id="1755" instrument_node="">
</span><p data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">Whilst many women will be involved in such conventional political activities and raise similar claims this does not always correspond to the reality of the experiences of women in some societies because of the gendered roles and responsibilities outlined above. Gender roles in many countries mean that women will more often be involved in low level political activities for instance hiding people, passing messages or providing community services, food, clothing or medical care. Decision makers should beware of equating so-called ‘low-level’ political activity with low-risk. The response of the state to such activity may be disproportionately persecutory because of the involvement of a section of society, namely women, who because of their gender it is considered inappropriate for them to be involved at all.</span></p><span data-dcnode-id="1752" instrument_node="">
</span><p data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Involvement in such activities could be seen to imply that the person holds a political opinion: indeed such activities may be the outward expression of a political opinion although it is not necessary for a person to have formed a specific opinion in their own mind in order for their actions to imply that they hold a political opinion.</span></p><span data-dcnode-id="1749" instrument_node="">
</span><p data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">Furthermore a person may be attributed a political opinion that they do not actually hold. In these circumstances it is essential to look at what motivates the persecutor, as they will be attributing the political opinion to the individual. For instance a woman who is forced to provide food for a rebel group may be attributed a political opinion by the state even though she does not support the group.</span></p><span data-dcnode-id="1746" instrument_node="">
</span><p data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">It is important not to underestimate or overlook the political dimensions of a woman's experiences of persecution even though a woman may not regard herself as making a political statement. Non-conformist opinions or behaviour may in certain circumstances be the expression of a political opinion or may result in a woman having a political opinion attributed to her whether she holds one or not. For instance opposition to institutionalised discrimination against women in society can be seen to constitute a political opinion. Non-conformist behaviour in certain cultures such as refusing to wear a veil, pursuing an education or choosing a partner could also lead to a woman having a political opinion attributed to her. Equally the refusal of men to grow a beard or dress accordingly to social norms may be interpreted as meaning that men hold a particular political opinion.</span></p><span data-dcnode-id="1743" instrument_node="">
</span><h3 data-dcnode-id="1741" id="Membership_of_a_Particular_Social_Group"><span data-dcnode-id="1742" instrument_node="">Membership of a Particular Social Group</span></h3><span data-dcnode-id="1740" instrument_node="">
</span><p data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">Most claims on the basis of gender will be covered by other Convention grounds i.e. race, religion, nationality and political opinion, whether actual or imputed. However in some cases gender may be a factor in recognising membership of a particular social group (PSG) or an identifying characteristic of such a group.</span></p><span data-dcnode-id="1737" instrument_node="">
</span><p data-dcnode-id="1732"><span data-dcnode-id="1736" instrument_node="">In 2002 UNHCR issued guidelines on&nbsp; </span><a data-dcnode-id="1734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refugeelegalaidinformation.org/sites/default/files/uploads/UNHCR-2002-MPSG.pdf"><span data-dcnode-id="1735" instrument_node=""> the interpretation of membership of a PSG within the meaning of the Refugee Convention </span></a><span data-dcnode-id="1733" instrument_node=""> . These guidelines and existing case law indicate that particular social groups can be identified by reference to innate or unchangeable characteristics. Examples of such characteristics may include, but are not limited to, sex, age, marital status, religion, family and kinship, past economic status/class, occupational history, disability, sexual history and ethnic, tribal or clan affiliation. There are cases where women are persecuted solely because of their family or kinship relationships, for example, a woman may be persecuted as a means of demoralising or punishing members of her family or community, or in order to pressurise her into revealing information. An applicant need not show that the members of a PSG know each other or associate with each other as a group. Neither must an applicant demonstrate that all members of a PSG are at risk of persecution in order to establish the existence of that group in the perception of others.</span></p><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">The fact that the particular social group consists of large numbers of the female population in the country concerned is irrelevant. Race, religion, nationality and political opinion are also characteristics that are shared by large numbers of people.</span></p><span data-dcnode-id="1728" instrument_node="">
</span><h3 data-dcnode-id="1726" id="Procedural_issues"><span data-dcnode-id="1727" instrument_node="">Procedural issues</span></h3><span data-dcnode-id="1725" instrument_node="">
</span><p data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Procedural issues can mean that gender issues may not come to light at an early stage in the determination process. Although some women asylum seekers arrive alone, others arrive as part of a family unit and are sometimes not interviewed or are cursorily interviewed about their experiences even when it is possible that they, rather than, or as well as, their male relatives, have been persecuted. Male relatives or associates may not raise relevant issues because they are unaware of the details or their importance or are ashamed to report them. It is important not to assume that a woman’s status is derivative: a woman’s claim to refugee status may in some cases be as strong as, or stronger than, that of her male relative or associate.</span></p><span data-dcnode-id="1722" instrument_node="">
</span><p data-dcnode-id="1717"><span data-dcnode-id="1721" instrument_node="">It is important that the right questions are asked during the interview in order that all of the information that is of relevance to the decision can be properly assessed. For example, interviewers should not focus their questions on narrowly defined&nbsp;political activities. Political activities also include, community activism, providing food or shelter, message taking, hiding people or refusing to conform to particular social norms. Women may also have a different perception of torture, which may not equate with the types of harm they fear, for example sexual violence, violence within the family, marriage-related harm, female genital mutilation (See Special Issues: </span><a data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.refugeelegalaidinformation.org/female-genital-mutilation-grounds-seeking-asylum"><span data-dcnode-id="1720" instrument_node=""> http://www.refugeelegalaidinformation.org/female-genital-mutilation-grounds-seeking-asylum </span></a><span data-dcnode-id="1718" instrument_node=""> ), and forced abortion and sterilisation. Ensuring that the right questions are asked during the interview will ensure familiarity with the status and roles of women in the applicant’s country of origin.</span></p><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">In addition interviewers should be aware of the need for culturally sensitive communication to ensure as much information about the basis of the application is available as is possible. Cultural and other differences and trauma can play an important role in determining demeanour i.e. how a woman presents herself physically, for example, whether she maintains eye contact, shifts her posture or hesitates when speaking.</span></p><span data-dcnode-id="1713" instrument_node="">
</span><p data-dcnode-id="1708"><span data-dcnode-id="1712" instrument_node="">Information to support a woman’s claim may not be readily available </span><a data-dcnode-id="1710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//icinspector.independent.gov.uk/wp-content/uploads/2011/02/Evaluation-of-the-Country-of-Origin-Report-on-Women3.pdf"><span data-dcnode-id="1711" instrument_node=""> See Crawley, H. Thematic review on the coverage of women in Country of Origin Information (COI) reports, prepared for the Independent Advisory Group on Country Information (IAGCI), September 2011.&nbsp; </span></a><span data-dcnode-id="1709" instrument_node=""> Women’s experiences of persecution frequently differ from those of men and they may be unable to document their experiences. For example, they may not be able to provide membership cards or newspaper cuttings relating to their political involvement because they have been indirectly involved through a supporting role or because the political opinion has been imputed to them. Similarly, information about violence within the family or community may be difficult to find. Background reports and country information often lack analysis of the position and status of women. Statistical data on the incidence of sexual or other violence is often inadequate or lacking. It is important that those working with, or representing, refugee women are familiar with the role, status, and treatment of women in the country from which a woman has fled. It is essential to consider a number of issues when gathering information. These include, but are not limited to:</span></p><span data-dcnode-id="1707" instrument_node="">
</span><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">• &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Position of women before the law including their standing in court, the right to bring a complaint and give evidence, divorce and custody law, the right to own property, reproductive rights, freedom to travel, and the political, social and economic rights referred to below;</span></p><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">• &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Political and civil rights of women including the right to vote, to hold office and belong to a political party;</span></p><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">• &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Social and economic rights of women including the right to marry the person of their choice, the right not to marry and the right to divorce, the right to determine their own sexuality, the right to an education, a career, and a job or remunerated activities, the status of single women, widows or divorcees, and freedom of dress;</span></p><span data-dcnode-id="1698" instrument_node="">
</span><p data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">• &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Consequences for women who refuse to abide by or who challenge social, religious or cultural norms regarding their behaviour including, for example, norms regarding virginity and pre-or extra marital sex or pregnancy, norms around the institution of marriage including arranged marriages and divorce, and norms about behaviour and dress;</span></p><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">• &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Incidence and form of violence against women such as, but not limited to, violence within the family, sexual abuse, honour killings, bride- burning;</span></p><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">• Efficacy of protection available to women and the sanctions or penalties on those who perpetuate the violence;</span></p><span data-dcnode-id="1689" instrument_node="">
</span><p data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">• &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Consequences that may befall a woman on her return.</span></p><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1681"><span data-dcnode-id="1685" instrument_node="">Information about sources of country of origin information can be found&nbsp; </span><a data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.refugeelegalaidinformation.org/country-origin-information-experts"><span data-dcnode-id="1684" instrument_node=""> here </span></a><span data-dcnode-id="1682" instrument_node=""> .</span></p><span data-dcnode-id="1680" instrument_node="">
</span><p data-dcnode-id="1675"><span data-dcnode-id="1679" instrument_node="">The UNHCR’s guidelines on international protection in cases involving gender-related persecution&nbsp; </span><a data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/3d58ddef4.pdf"><span data-dcnode-id="1678" instrument_node=""> list a number of good practices </span></a><span data-dcnode-id="1676" instrument_node=""> &nbsp;in relation to gender-sensitive asylum procedures.</span></p><span data-dcnode-id="1674" instrument_node="">
</span><h3 data-dcnode-id="1672" id="Gender_and_the_asylum_claims_of_women"><span data-dcnode-id="1673" instrument_node="">Gender and the asylum claims of women</span></h3><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1642"><span data-dcnode-id="1670" instrument_node="">Although the Refugee Convention does not include an explicit reference to sex and/or gender, the importance of gender in shaping the experiences of refugees is increasingly recognised.&nbsp; </span><a data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/3d4f915e4.html"><span data-dcnode-id="1669" instrument_node=""> Guidelines on the Protection of Refugee Women </span></a><span data-dcnode-id="1667" instrument_node=""> &nbsp;were first issued by UNHCR in 1991 and were followed in 1995 by guidelines specifically on responding to&nbsp; </span><a data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/3b9cc26c4.html"><span data-dcnode-id="1666" instrument_node=""> cases involving sexual violence </span></a><span data-dcnode-id="1664" instrument_node=""> . In 2002, UNHCR updated its guidelines ( </span><a data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/3d58ddef4.pdf"><span data-dcnode-id="1663" instrument_node=""> Guidelines on International Protection No. 1: Gender-Related Persecution </span></a><span data-dcnode-id="1661" instrument_node=""> )to include explicit reference to the ways in which gender should be taken into account when deciding whether an individual is in need of international protection. These guidelines are intended to provide legal interpretative guidance for governments, legal practitioners, decision-makers and the judiciary, as well as UNHCR staff carrying out refugee status determination in the field. Most recently, in 2008, the UNHCR produced a&nbsp; </span><a data-dcnode-id="1659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/protect/PROTECTION/47cfae612.html"><span data-dcnode-id="1660" instrument_node=""> Handbook for the Protection of Women and Girls </span></a><span data-dcnode-id="1658" instrument_node=""> . This Handbook describes some of the protection challenges faced by women and girls of concern to UNHCR. It sets out the legal standards and principles that guide UNHCR’s work to protect women and girls and outlines the different roles and responsibilities of States and other actors. UNHCR has also issued&nbsp; </span><a data-dcnode-id="1656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/3d58de2da.html"><span data-dcnode-id="1657" instrument_node=""> guidelines on membership of a particular social group </span></a><span data-dcnode-id="1655" instrument_node=""> , on the application of the Refugee Convention in cases involving those who have been, or are at risk of being,&nbsp; </span><a data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/443b626b2.html"><span data-dcnode-id="1654" instrument_node=""> trafficked </span></a><span data-dcnode-id="1652" instrument_node=""> , and in relation to Female Genital Mutilation (FGM) that may of relevance in some claims involving gender issues. You can find more information about FGM </span><a data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.refugeelegalaidinformation.org/female-genital-mutilation-grounds-seeking-asylum"><span data-dcnode-id="1651" instrument_node=""> here </span></a><span data-dcnode-id="1649" instrument_node=""> , and more information about smuggling and trafficking </span><a data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.refugeelegalaidinformation.org/smuggling-and-trafficking"><span data-dcnode-id="1648" instrument_node=""> here </span></a><span data-dcnode-id="1646" instrument_node=""> . A number of countries including Canada, the United States, Australia, Germany, Ireland, the Netherlands, South Africa, Sweden and the UK have now included explicit reference to gender or sex as grounds for refugee status in their domestic refugee legislation, or have recognised that particular forms of gender-related violence or harm constitute forms of persecution. In 1993 the Canadian government published the first national gender guidelines entitled&nbsp; </span><a data-dcnode-id="1644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.refworld.org/docid/4713831e2.html"><span data-dcnode-id="1645" instrument_node=""> Guidelines on Women Refugee Claimants Fearing Gender-Related Persecution </span></a><span data-dcnode-id="1643" instrument_node=""> . The Canadian gender guidelines were subsequently updated in 1996 and have formed the template for many of the guidelines subsequently published in other countries including in the United States (1995), Australia (1996) and more recently Sweden, the Netherlands and South Africa. Web links to the gender guidelines produced in the UK and elsewhere can be found below.</span></p><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1636"><span data-dcnode-id="1640" instrument_node="">Detailed information about national legislation and policy relating to gender issues in the asylum claim can be found&nbsp; </span><a data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cgrs.uchastings.edu/search-materials/gender-asylum-guidelines"><span data-dcnode-id="1639" instrument_node=""> here </span></a><span data-dcnode-id="1637" instrument_node=""> .</span></p><span data-dcnode-id="1635" instrument_node="">
</span><h3 data-dcnode-id="1633" id="Gender_and_the_asylum_claims_of_men"><span data-dcnode-id="1634" instrument_node="">Gender and the asylum claims of men</span></h3><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1621"><span data-dcnode-id="1631" instrument_node="">Through its Gender and Sexuality Issues project, the Refugee Law Project based at Makerere University in Kampala, Uganda, in particular has drawn attention to refugee men’s experiences of sexual violence in contexts of armed conflicts. Their video advocacy documentaries </span><a data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DmJSl99HQYXc"><span data-dcnode-id="1630" instrument_node=""> Gender Against Men </span></a><span data-dcnode-id="1628" instrument_node=""> and </span><a data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D6dxaFqezrXg"><span data-dcnode-id="1627" instrument_node=""> They Slept with Me </span></a><span data-dcnode-id="1625" instrument_node=""> have been particularly effective in this regard. There have since been a number of </span><a data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/society/2011/jul/17/the-rape-of-men"><span data-dcnode-id="1624" instrument_node=""> media reports </span></a><span data-dcnode-id="1622" instrument_node=""> addressing this question.</span></p><span data-dcnode-id="1620" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1619" instrument_node="">UNHCR has issued a </span><a data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.refworld.org/pdfid/5006aa262.pdf"><span data-dcnode-id="1618" instrument_node=""> Guidance Note on Working with Men and Boy Survivors of Sexual and Gender-Based Violence in Forced Displacement </span></a><span data-dcnode-id="1616" instrument_node=""> . Similarly, the Geneva Centre for the Democratic Control of Armed Forces (DCAF) published guidance notes for security sector institutions on </span><a data-dcnode-id="1611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dcaf.ch/Publications/Preventing-and-Responding-to-Sexual-and-Domestic-Violence-against-Men-A-Guidance-Note-for-Security-Sector-Institutions"><span data-dcnode-id="1615" instrument_node=""> Preventing and Responding to Sexual and Domestic Violence against Me </span><em data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node=""> n </span></em><span data-dcnode-id="1612" instrument_node=""> </span></a><span data-dcnode-id="1610" instrument_node=""> , while the UK government’s Foreign and Commonwealth Office Prevention of Sexual Violence Initiative published its own </span><a data-dcnode-id="1608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/publications/guidelines-for-investigating-conflict-related-sexual-and-gender-based-violence-against-men-and-boys"><span data-dcnode-id="1609" instrument_node=""> Guidelines for investigating conflict-related sexual violence against men and boys </span></a><span data-dcnode-id="1607" instrument_node=""> . For the updated version of the Minimum Standards for Prevention and Response to Gender-Based Violence in Emergencies, </span><a data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//reliefweb.int/report/world/minimum-standards-prevention-and-response-gender-based-violence-emergencies"><span data-dcnode-id="1606" instrument_node=""> see this link </span></a><span data-dcnode-id="1604" instrument_node=""> . Looking more specifically at the </span><a data-dcnode-id="1602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//uk.reuters.com/article/us-usa-trafficking-florida-idUKKBN0UC0YH20151229"><span data-dcnode-id="1603" instrument_node=""> trafficking of men </span></a><span data-dcnode-id="1601" instrument_node=""> , IOM produced a report on the </span><a data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//publications.iom.int/system/files/pdf/mrs_36.pdf"><span data-dcnode-id="1600" instrument_node=""> less considered experiences of trafficked men from Belarus and Ukraine. </span></a></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1568"><span data-dcnode-id="1596" instrument_node="">For a more general overview of masculinities in conflict and peacebuilding context, Saferworld produced a comprehensive report on </span><a data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.saferworld.org.uk/resources/view-resource/862-masculinities-conflict-and-peacebuilding-perspectives-on-men-through-a-gender-lens"><span data-dcnode-id="1595" instrument_node=""> Masculinities, conflict and peacebuilding: perspectives on men through a gender lens </span></a><span data-dcnode-id="1593" instrument_node=""> , which complements International Alert’s report on </span><a data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.international-alert.org/publications/re-thinking-gender-peacebuilding"><span data-dcnode-id="1592" instrument_node=""> Re-thinking gender in peacebuilding. </span></a><span data-dcnode-id="1590" instrument_node=""> For questions surrounding men, forced migration and resettlement, Forced Migration Review recently published a piece exploring </span><a data-dcnode-id="1588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fmreview.org/resettlement/turner.html"><span data-dcnode-id="1589" instrument_node=""> Who will resettle single Syrian men? </span></a><span data-dcnode-id="1587" instrument_node=""> </span><em data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node=""> , </span></em><span data-dcnode-id="1584" instrument_node=""> while other </span><a data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opendemocracy.net/5050/chlo%25C3%25A9-lewis/invisible-migrant-man-questioning-gender-privileges"><span data-dcnode-id="1583" instrument_node=""> articles </span></a><span data-dcnode-id="1581" instrument_node=""> in have explored some of the multiple and sometimes unexpected ways in which gender can impact on </span><a data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eprints.mdx.ac.uk/17656/"><span data-dcnode-id="1580" instrument_node=""> men’s experiences of migration </span></a><span data-dcnode-id="1578" instrument_node=""> </span><a data-dcnode-id="1576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mei.edu/content/map/are-syrian-men-vulnerable-too-gendering-syria-refugee-response"><span data-dcnode-id="1577" instrument_node=""> and displacement </span></a><span data-dcnode-id="1575" instrument_node=""> . Scholarly research has also started to critically explore </span><a data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tandfonline.com/doi/abs/10.1080/23337486.2016.1262658%3FjournalCode%3Drcms20"><span data-dcnode-id="1574" instrument_node=""> masculinities in conflict </span></a><span data-dcnode-id="1572" instrument_node=""> , as well as the </span><a data-dcnode-id="1570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.routledge.com/A-Gendered-Approach-to-the-Syrian-Refugee-Crisis/Freedman-Kivilcim-Baklacioglu/p/book/9781138693722"><span data-dcnode-id="1571" instrument_node=""> roles of intersecting masculinities in the European refugee crisis </span></a><span data-dcnode-id="1569" instrument_node=""> .</span></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1566" instrument_node="">Finally, for more information about the experiences of sexual and gender minorities in conflict, displacement and peacebuilding, see International Alert’s report on </span><a data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.international-alert.org/sites/default/files/Gender_SexualGenderMinorities_2017.pdf"><span data-dcnode-id="1565" instrument_node=""> Merely Existing is a Risk </span></a><span data-dcnode-id="1563" instrument_node=""> .&nbsp;</span></p><span data-dcnode-id="1561" instrument_node="">

</span><p data-dcnode-id="956"><span data-dcnode-id="960" instrument_node="">The </span><a data-dcnode-id="958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www1.umn.edu/humanrts"><span data-dcnode-id="959" instrument_node=""> University of Minnesota Human Rights Library </span></a><span data-dcnode-id="957" instrument_node=""> contains useful information on treaties and human rights case law.</span></p><span data-dcnode-id="955" instrument_node="">

</span><p data-dcnode-id="944"><span data-dcnode-id="948" instrument_node="">The website of the </span><a data-dcnode-id="946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.iarlj.nl/"><span data-dcnode-id="947" instrument_node=""> International Association of Refugee Law Judges </span></a><span data-dcnode-id="945" instrument_node=""> includes a database of cases from many (mostly European) jurisdictions.</span></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="942" instrument_node="">The </span><a data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.refugeelawreader.org/"><span data-dcnode-id="941" instrument_node=""> Hungarian Helsinki Committee Refugee Law Reader </span></a><span data-dcnode-id="939" instrument_node=""> provides excellent case summaries and identifies and provides links to key academic articles on various topics, general and European-focused.</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="933"><a data-dcnode-id="935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rsdwatch.wordpress.com/"><span data-dcnode-id="936" instrument_node=""> RDS Watch </span></a><span data-dcnode-id="934" instrument_node=""> collects information on UNHCR refugee status determination (RSD) in states that do not have their own RSD laws and procedures.</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="931" instrument_node="">The </span><a data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.asylumaid.org.uk/womens-project/"><span data-dcnode-id="930" instrument_node=""> Refugee Women’s Resource Project at Asylum Aid </span></a><span data-dcnode-id="928" instrument_node=""> aims to enable women seeking asylum in the UK to obtain protection and security, to maintain their dignity and to be treated with respect during the asylum process. It undertakes research into women’s experiences in country of origin and during the asylum process.</span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="925" instrument_node="">The </span><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.womensrefugeecommission.org/"><span data-dcnode-id="924" instrument_node=""> Women's Refugee Commission </span></a><span data-dcnode-id="922" instrument_node=""> advocates vigorously for laws, policies and programs to improve the lives and protect the rights of refugee and internally displaced women, children and young people, including those seeking asylum—bringing about lasting, measurable change.</span></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="919" instrument_node="">The </span><a data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.refugeelawproject.org/our-work/gender-and-sexuality-programme"><span data-dcnode-id="918" instrument_node=""> Gender and Sexuality Programme </span></a><span data-dcnode-id="916" instrument_node=""> at the </span><a data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.refugeelawproject.org/"><span data-dcnode-id="915" instrument_node=""> Refugee Law Project </span></a><span data-dcnode-id="913" instrument_node=""> works to ensure that all people can access and enjoy their sexual and gender being and rights, and to raise global awareness of the close relationship between violations of sexuality and gender, and patterns of forced migration.</span></p><span data-dcnode-id="911" instrument_node="">
