</span><h3 data-dcnode-id="4839"><span class="mw-headline" data-dcnode-id="4847" id="Freedom_of_religion"><span data-dcnode-id="4848" instrument_node="">Freedom of religion</span></span><span class="mw-editsection" data-dcnode-id="4840"><span class="mw-editsection-bracket" data-dcnode-id="4845"><span data-dcnode-id="4846" instrument_node="">[</span></span><a data-dcnode-id="4843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D13" title="Edit section: Freedom of religion"><span data-dcnode-id="4844" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4841"><span data-dcnode-id="4842" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4838" instrument_node="">
</span><link data-dcnode-id="4837" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4833" role="note"><span data-dcnode-id="4836" instrument_node="">Main article: </span><a data-dcnode-id="4834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_of_religion_in_Japan" title="Freedom of religion in Japan"><span data-dcnode-id="4835" instrument_node="">Freedom of religion in Japan</span></a></div><span data-dcnode-id="4832" instrument_node="">
</span><p data-dcnode-id="4827"><span data-dcnode-id="4831" instrument_node="">The Constitution provides for </span><a data-dcnode-id="4829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_of_religion" title="Freedom of religion"><span data-dcnode-id="4830" instrument_node="">freedom of religion</span></a><span data-dcnode-id="4828" instrument_node="">.
</span></p><p data-dcnode-id="4825"><span data-dcnode-id="4826" instrument_node="">Article 20 states:
</span></p><span data-dcnode-id="4824" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="4811"><span data-dcnode-id="4821" instrument_node="">
</span><p data-dcnode-id="4819"><span data-dcnode-id="4820" instrument_node="">Freedom of religion is guaranteed to all. No religious organization shall receive any privileges from the State, nor exercise any political authority.
</span></p><p data-dcnode-id="4817"><span data-dcnode-id="4818" instrument_node="">(2) No person shall be compelled to take part in any religious act, celebration, rite or practice.
</span></p><p data-dcnode-id="4812"><span data-dcnode-id="4816" instrument_node="">
(3) The State and its organs shall refrain from religious education or any other religious activity.</span><sup class="reference" data-dcnode-id="4813" id="cite_ref-35"><a data-dcnode-id="4814" href="#cite_note-35"><span data-dcnode-id="4815" instrument_node="">[35]</span></a></sup></p></blockquote><span data-dcnode-id="4810" instrument_node="">
</span><p data-dcnode-id="4788"><span data-dcnode-id="4809" instrument_node="">Members of the </span><a data-dcnode-id="4807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unification_Church" title="Unification Church"><span data-dcnode-id="4808" instrument_node="">Unification Church</span></a><span data-dcnode-id="4806" instrument_node=""> alleged that police did not respond to allegations of forced </span><a data-dcnode-id="4804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deprogramming" title="Deprogramming"><span data-dcnode-id="4805" instrument_node="">deprogramming</span></a><span data-dcnode-id="4803" instrument_node=""> of church members. While deprogramming cases decreased during the year, a Unification Church spokesman reported that prosecutors dropped two cases due to insufficient evidence. Although one member reportedly was kidnapped by her family during the year, the Unification Church did not report the case to police. Concerns remained regarding the tendency of officials to judge </span><a data-dcnode-id="4801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deprogramming" title="Deprogramming"><span data-dcnode-id="4802" instrument_node="">deprogramming</span></a><span data-dcnode-id="4800" instrument_node=""> as a family matter. Unlike in previous years, </span><a data-dcnode-id="4798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jehovah%2527s_Witnesses" title="Jehovah's Witnesses"><span data-dcnode-id="4799" instrument_node="">Jehovah's Witnesses</span></a><span data-dcnode-id="4797" instrument_node=""> reported that their religious rights were respected by the Government during the year.</span><sup class="noprint Inline-Template" data-dcnode-id="4790" style="white-space:nowrap;"><span data-dcnode-id="4796" instrument_node="">[</span><i data-dcnode-id="4792"><a data-dcnode-id="4793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Dates_and_numbers%23Chronological_items" title="Wikipedia:Manual of Style/Dates and numbers"><span data-dcnode-id="4794" title="The time period mentioned near this tag is ambiguous. (March 2014)"><span data-dcnode-id="4795" instrument_node="">when?</span></span></a></i><span data-dcnode-id="4791" instrument_node="">]</span></sup><span data-dcnode-id="4789" instrument_node="">
</span></p><span data-dcnode-id="4787" instrument_node="">
</span><h3 data-dcnode-id="4777"><span class="mw-headline" data-dcnode-id="4785" id="Freedom_of_movement"><span data-dcnode-id="4786" instrument_node="">Freedom of movement</span></span><span class="mw-editsection" data-dcnode-id="4778"><span class="mw-editsection-bracket" data-dcnode-id="4783"><span data-dcnode-id="4784" instrument_node="">[</span></span><a data-dcnode-id="4781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D14" title="Edit section: Freedom of movement"><span data-dcnode-id="4782" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4779"><span data-dcnode-id="4780" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4776" instrument_node="">
</span><p data-dcnode-id="4758"><span data-dcnode-id="4775" instrument_node="">The </span><a data-dcnode-id="4773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_Japan" title="Constitution of Japan"><span data-dcnode-id="4774" instrument_node="">Constitution</span></a><span data-dcnode-id="4772" instrument_node=""> provides for the freedom of movement within the country, foreign travel, immigration, and repatriation, and the </span><a data-dcnode-id="4770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Government_of_Japan" title="Government of Japan"><span data-dcnode-id="4771" instrument_node="">Government</span></a><span data-dcnode-id="4769" instrument_node=""> generally respects them in practice. Citizens have the right to travel freely both within the country and abroad, to change their place of residence, to emigrate, and to repatriate voluntarily. </span><a data-dcnode-id="4767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Citizenship" title="Citizenship"><span data-dcnode-id="4768" instrument_node="">Citizenship</span></a><span data-dcnode-id="4766" instrument_node=""> may be forfeited by naturalization in a foreign country or by failure of persons born with dual nationality to elect citizenship at the required age. The law does not permit forced </span><a data-dcnode-id="4764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exile" title="Exile"><span data-dcnode-id="4765" instrument_node="">exile</span></a><span data-dcnode-id="4763" instrument_node="">, and it is not used.</span><sup class="reference" data-dcnode-id="4760" id="cite_ref-HR2006_26-1"><a data-dcnode-id="4761" href="#cite_note-HR2006-26"><span data-dcnode-id="4762" instrument_node="">[26]</span></a></sup><span data-dcnode-id="4759" instrument_node="">
</span></p><p data-dcnode-id="4747"><span data-dcnode-id="4757" instrument_node="">The law provides for the granting of </span><a data-dcnode-id="4755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refugee" title="Refugee"><span data-dcnode-id="4756" instrument_node="">refugee</span></a><span data-dcnode-id="4754" instrument_node=""> status or asylum to persons in accordance with the 1951 </span><a data-dcnode-id="4752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_Relating_to_the_Status_of_Refugees" title="Convention Relating to the Status of Refugees"><span data-dcnode-id="4753" instrument_node="">U.N. Convention Relating to the Status of Refugees</span></a><span data-dcnode-id="4751" instrument_node=""> or its 1967 Protocol. In practice, the government provided protection against refoulement, the return of persons to a country where they feared persecution, but did not routinely grant refugee or asylum status. The Government cooperated with the office of the </span><a data-dcnode-id="4749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_High_Commissioner_for_Refugees" title="United Nations High Commissioner for Refugees"><span data-dcnode-id="4750" instrument_node="">United Nations High Commissioner for Refugees</span></a><span data-dcnode-id="4748" instrument_node=""> and other humanitarian organizations in assisting refugees.
</span></p><p data-dcnode-id="4741"><span data-dcnode-id="4746" instrument_node="">In May 2003, the Diet passed a bill abolishing the 60-day application deadline previously required for aliens seeking refugee status. The previous refugee recognition law stipulated that those seeking refugee status had to apply within 60 days upon arriving in Japan or within 60 days of learning that they were likely to be persecuted in their home country. An alien recognized as a refugee has access to educational facilities, public relief and aid, and social welfare benefits.</span><sup class="reference" data-dcnode-id="4743" id="cite_ref-HR2003_36-0"><a data-dcnode-id="4744" href="#cite_note-HR2003-36"><span data-dcnode-id="4745" instrument_node="">[36]</span></a></sup><span data-dcnode-id="4742" instrument_node="">
</span></p><p data-dcnode-id="4732"><span data-dcnode-id="4740" instrument_node="">Government records indicated that 523,617 persons were detained in 2003 at immigration detention centers. According to media reports, several deportations were carried out in secret. In July, two Kurdish families staged a 72-day protest against their deportation orders in front of the </span><a data-dcnode-id="4738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_University" title="United Nations University"><span data-dcnode-id="4739" instrument_node="">United Nations University</span></a><span data-dcnode-id="4737" instrument_node=""> in Tokyo.</span><sup class="reference" data-dcnode-id="4734" id="cite_ref-HR2004_27-1"><a data-dcnode-id="4735" href="#cite_note-HR2004-27"><span data-dcnode-id="4736" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4733" instrument_node="">
</span></p><p data-dcnode-id="4704"><span data-dcnode-id="4731" instrument_node="">As of 2005, the government has granted refugee and asylum status to those claiming fear of persecution in only a small number of cases.</span><sup class="reference" data-dcnode-id="4728" id="cite_ref-HR2005_37-0"><a data-dcnode-id="4729" href="#cite_note-HR2005-37"><span data-dcnode-id="4730" instrument_node="">[37]</span></a></sup><span data-dcnode-id="4727" instrument_node=""> A nongovernmental organization (NGO), in a statement to the </span><a data-dcnode-id="4725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sub-Commission_on_the_Promotion_and_Protection_of_Human_Rights" title="Sub-Commission on the Promotion and Protection of Human Rights"><span data-dcnode-id="4726" instrument_node="">Sub-Commission on the Promotion and Protection of Human Rights</span></a><span data-dcnode-id="4724" instrument_node="">, noted that, from 1982 to December 2002, 301 persons were accepted as refugees. The Government considered that most persons seeking asylum in the country did so for economic reasons. In 2003, there were approximately 7,900 refugees and asylum seekers in the country, of whom an estimated 7,700 were </span><a data-dcnode-id="4722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam" title="Vietnam"><span data-dcnode-id="4723" instrument_node="">Vietnamese</span></a><span data-dcnode-id="4721" instrument_node=""> and </span><a data-dcnode-id="4719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cambodia" title="Cambodia"><span data-dcnode-id="4720" instrument_node="">Cambodian</span></a><span data-dcnode-id="4718" instrument_node=""> refugees. Out of 336 refugee claims submitted in 2003, the Government granted asylum to 10 persons from </span><a data-dcnode-id="4716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Myanmar" title="Myanmar"><span data-dcnode-id="4717" instrument_node="">Burma</span></a><span data-dcnode-id="4715" instrument_node="">, </span><a data-dcnode-id="4713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Burundi" title="Burundi"><span data-dcnode-id="4714" instrument_node="">Burundi</span></a><span data-dcnode-id="4712" instrument_node="">, and </span><a data-dcnode-id="4710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran" title="Iran"><span data-dcnode-id="4711" instrument_node="">Iran</span></a><span data-dcnode-id="4709" instrument_node=""> and issued long-term residence permits based on humanitarian considerations to 16. As part of its ongoing family-reunification program for close relatives of Indochinese refugees resettled in earlier years, the Government admitted 147 refugees from Vietnam and Cambodia in 2003.</span><sup class="reference" data-dcnode-id="4706" id="cite_ref-HR2004_27-2"><a data-dcnode-id="4707" href="#cite_note-HR2004-27"><span data-dcnode-id="4708" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4705" instrument_node="">
</span></p><p data-dcnode-id="4686"><span data-dcnode-id="4703" instrument_node="">In May 2003, a law was passed granting the </span><a data-dcnode-id="4701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minister_of_Justice_%28Japan%29" title="Minister of Justice (Japan)"><span data-dcnode-id="4702" instrument_node="">Justice Minister</span></a><span data-dcnode-id="4700" instrument_node=""> authority to issue temporary stay permits to persons seeking asylum.</span><sup class="reference" data-dcnode-id="4697" id="cite_ref-HR2003_36-1"><a data-dcnode-id="4698" href="#cite_note-HR2003-36"><span data-dcnode-id="4699" instrument_node="">[36]</span></a></sup><span data-dcnode-id="4696" instrument_node=""> While this law provides a way for </span><a data-dcnode-id="4694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asylum_seeker" title="Asylum seeker"><span data-dcnode-id="4695" instrument_node="">asylum seekers</span></a><span data-dcnode-id="4693" instrument_node=""> to have legal status in the country during the refugee recognition process, in practice it was quite difficult to obtain such permits. In January 2003, the </span><a class="new" data-dcnode-id="4691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DImmigration_Bureau%26action%3Dedit%26redlink%3D1" title="Immigration Bureau (page does not exist)"><span data-dcnode-id="4692" instrument_node="">Immigration Bureau</span></a><span data-dcnode-id="4690" instrument_node=""> began to give detailed, written explanations of decisions not to grant refugee status to asylum-seekers and opened an information office at </span><a data-dcnode-id="4688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Narita_International_Airport" title="Narita International Airport"><span data-dcnode-id="4689" instrument_node="">Narita Airport</span></a><span data-dcnode-id="4687" instrument_node=""> for potential asylum seekers.
</span></p><span data-dcnode-id="4685" instrument_node="">
</span><h2 data-dcnode-id="4675"><span class="mw-headline" data-dcnode-id="4683" id="Political_rights"><span data-dcnode-id="4684" instrument_node="">Political rights</span></span><span class="mw-editsection" data-dcnode-id="4676"><span class="mw-editsection-bracket" data-dcnode-id="4681"><span data-dcnode-id="4682" instrument_node="">[</span></span><a data-dcnode-id="4679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D15" title="Edit section: Political rights"><span data-dcnode-id="4680" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4677"><span data-dcnode-id="4678" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4674" instrument_node="">
</span><table class="box-Update plainlinks metadata ambox ambox-content ambox-Update" data-dcnode-id="4653" role="presentation"><tbody data-dcnode-id="4654"><tr data-dcnode-id="4655"><td class="mbox-image" data-dcnode-id="4671"><div data-dcnode-id="4672" style="width:52px"><img alt="Ambox current red Asia Australia.svg" data-dcnode-id="4673" data-file-height="290" data-file-width="360" decoding="async" height="34" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_current_red_Asia_Australia.svg/42px-Ambox_current_red_Asia_Australia.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_current_red_Asia_Australia.svg/63px-Ambox_current_red_Asia_Australia.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_current_red_Asia_Australia.svg/84px-Ambox_current_red_Asia_Australia.svg.png 2x" width="42"></div></td><td class="mbox-text" data-dcnode-id="4656"><div class="mbox-text-span" data-dcnode-id="4657"><span data-dcnode-id="4670" instrument_node="">This section needs to be </span><b data-dcnode-id="4668"><span data-dcnode-id="4669" instrument_node="">updated</span></b><span data-dcnode-id="4667" instrument_node="">. The reason given is: The information about how many women have positions in the National Diet is based on the early 2000s elections, and needs to be updated to reflect the current Diet.</span><span class="hide-when-compact" data-dcnode-id="4665"><span data-dcnode-id="4666" instrument_node=""> Please help update this article to reflect recent events or newly available information.</span></span><span data-dcnode-id="4664" instrument_node=""> </span><span class="date-container" data-dcnode-id="4658"><i data-dcnode-id="4659"><span data-dcnode-id="4663" instrument_node="">(</span><span class="date" data-dcnode-id="4661"><span data-dcnode-id="4662" instrument_node="">August 2021</span></span><span data-dcnode-id="4660" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="4652" instrument_node="">
</span><p data-dcnode-id="4629"><span data-dcnode-id="4651" instrument_node="">The Constitution provides citizens with the right to change their government peacefully, and citizens exercised this right in practice through periodic, free, and fair </span><a data-dcnode-id="4649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elections_in_Japan" title="Elections in Japan"><span data-dcnode-id="4650" instrument_node="">elections</span></a><span data-dcnode-id="4648" instrument_node=""> held on the basis of </span><a data-dcnode-id="4646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_suffrage" title="Universal suffrage"><span data-dcnode-id="4647" instrument_node="">universal suffrage</span></a><span data-dcnode-id="4645" instrument_node="">. The country is a </span><a class="mw-redirect" data-dcnode-id="4643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parliamentary_democracy" title="Parliamentary democracy"><span data-dcnode-id="4644" instrument_node="">parliamentary democracy</span></a><span data-dcnode-id="4642" instrument_node=""> governed by the political party or parties able to form a majority in the lower house of its bicameral </span><a class="mw-redirect" data-dcnode-id="4640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diet_of_Japan" title="Diet of Japan"><span data-dcnode-id="4641" instrument_node="">Diet</span></a><span data-dcnode-id="4639" instrument_node="">. The </span><a data-dcnode-id="4637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberal_Democratic_Party_%28Japan%29" title="Liberal Democratic Party (Japan)"><span data-dcnode-id="4638" instrument_node="">LDP</span></a><span data-dcnode-id="4636" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="4634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Komeito_Party" title="New Komeito Party"><span data-dcnode-id="4635" instrument_node="">New Komeito Party</span></a><span data-dcnode-id="4633" instrument_node=""> formed the existing coalition government. Except for a brief hiatus in the 1990s, the LDP has been the dominant party in every government since the mid-1950s. The last general elections were held on October 22, 2017, and elections for the </span><a class="mw-redirect" data-dcnode-id="4631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Councillors" title="House of Councillors"><span data-dcnode-id="4632" instrument_node="">Upper House</span></a><span data-dcnode-id="4630" instrument_node=""> were held on July 21, 2019.
</span></p><p data-dcnode-id="4614"><span data-dcnode-id="4628" instrument_node="">According to </span><a data-dcnode-id="4626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Police_Agency_%28Japan%29" title="National Police Agency (Japan)"><span data-dcnode-id="4627" instrument_node="">National Police Agency</span></a><span data-dcnode-id="4625" instrument_node=""> figures for January through June 2003, there were 43 arrests involving political corruption for such charges as bribery, bid-rigging, and violation of the </span><a class="new" data-dcnode-id="4623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPolitical_Funds_Control_Law%26action%3Dedit%26redlink%3D1" title="Political Funds Control Law (page does not exist)"><span data-dcnode-id="4624" instrument_node="">Political Funds Control Law</span></a><span data-dcnode-id="4622" instrument_node="">. This was an increase of 14 cases from the previous year for the same time period.</span><sup class="reference" data-dcnode-id="4619" id="cite_ref-HR2004_27-3"><a data-dcnode-id="4620" href="#cite_note-HR2004-27"><span data-dcnode-id="4621" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4618" instrument_node=""> In recent years, the numbers of women holding public office has slowly increased. As of July 2003, women held 34 of 480 seats in the Lower House of the Diet and 33 seats in the 242-seat Upper House. As of September 2003, there were two women in the </span><a data-dcnode-id="4616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cabinet_of_Japan" title="Cabinet of Japan"><span data-dcnode-id="4617" instrument_node="">Cabinet</span></a><span data-dcnode-id="4615" instrument_node="">. As of April 2003, 4 of the country's 47 governors were women.
</span></p><p data-dcnode-id="4603"><span data-dcnode-id="4613" instrument_node="">As of May 2019, Japan had not ratified the </span><a data-dcnode-id="4611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genocide_Convention" title="Genocide Convention"><span data-dcnode-id="4612" instrument_node="">Genocide Convention</span></a><span data-dcnode-id="4610" instrument_node="">, the </span><a data-dcnode-id="4608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1926_Slavery_Convention" title="1926 Slavery Convention"><span data-dcnode-id="4609" instrument_node="">1926 Slavery Convention</span></a><span data-dcnode-id="4607" instrument_node=""> or the </span><a class="mw-redirect" data-dcnode-id="4605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_1956_Supplementary_Convention_on_the_Abolition_of_Slavery" title="United Nations 1956 Supplementary Convention on the Abolition of Slavery"><span data-dcnode-id="4606" instrument_node="">United Nations 1956 Supplementary Convention on the Abolition of Slavery</span></a><span data-dcnode-id="4604" instrument_node="">.
</span></p><span data-dcnode-id="4602" instrument_node="">
</span><h2 data-dcnode-id="4592"><span class="mw-headline" data-dcnode-id="4600" id="Discrimination"><span data-dcnode-id="4601" instrument_node="">Discrimination</span></span><span class="mw-editsection" data-dcnode-id="4593"><span class="mw-editsection-bracket" data-dcnode-id="4598"><span data-dcnode-id="4599" instrument_node="">[</span></span><a data-dcnode-id="4596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D16" title="Edit section: Discrimination"><span data-dcnode-id="4597" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4594"><span data-dcnode-id="4595" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4591" instrument_node="">
</span><p data-dcnode-id="4580"><span data-dcnode-id="4590" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="4588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japanese_constitution%23Individual_rights" title="Japanese constitution"><span data-dcnode-id="4589" instrument_node="">Constitution</span></a><span data-dcnode-id="4587" instrument_node=""> prohibits </span><a data-dcnode-id="4585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Discrimination" title="Discrimination"><span data-dcnode-id="4586" instrument_node="">discrimination</span></a><span data-dcnode-id="4584" instrument_node=""> of citizens on the basis of race, creed, </span><a data-dcnode-id="4582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gender" title="Gender"><span data-dcnode-id="4583" instrument_node="">gender</span></a><span data-dcnode-id="4581" instrument_node="">, social status, or family origin; non-citizens are not protected from these forms of discrimination by the constitution nor the law as of 2014.
</span></p><span data-dcnode-id="4579" instrument_node="">
</span><h3 data-dcnode-id="4569"><span class="mw-headline" data-dcnode-id="4577" id="Gender_identity_harassment"><span data-dcnode-id="4578" instrument_node="">Gender identity harassment</span></span><span class="mw-editsection" data-dcnode-id="4570"><span class="mw-editsection-bracket" data-dcnode-id="4575"><span data-dcnode-id="4576" instrument_node="">[</span></span><a data-dcnode-id="4573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D17" title="Edit section: Gender identity harassment"><span data-dcnode-id="4574" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4571"><span data-dcnode-id="4572" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4568" instrument_node="">
</span><p data-dcnode-id="4556"><span data-dcnode-id="4567" instrument_node="">For the first time ever, MHLW, the Ministry of Internal Affairs and Communications, and MEXT issued ministerial regulations and formal notices requiring corporations, local governments, and schools attend to issues pertaining </span><a data-dcnode-id="4565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexual_orientation" title="Sexual orientation"><span data-dcnode-id="4566" instrument_node="">sexual orientation</span></a><span data-dcnode-id="4564" instrument_node=""> and gender identity harassment and publicly outing a person as </span><a data-dcnode-id="4562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/LGBT" title="LGBT"><span data-dcnode-id="4563" instrument_node="">LGBT</span></a><span data-dcnode-id="4561" instrument_node="">. This took place in May 2019.</span><sup class="reference" data-dcnode-id="4558" id="cite_ref-:0_38-0"><a data-dcnode-id="4559" href="#cite_note-:0-38"><span data-dcnode-id="4560" instrument_node="">[38]</span></a></sup><span data-dcnode-id="4557" instrument_node="">
</span></p><span data-dcnode-id="4555" instrument_node="">
</span><h2 data-dcnode-id="4545"><span class="mw-headline" data-dcnode-id="4553" id="Violence_against_women"><span data-dcnode-id="4554" instrument_node="">Violence against women</span></span><span class="mw-editsection" data-dcnode-id="4546"><span class="mw-editsection-bracket" data-dcnode-id="4551"><span data-dcnode-id="4552" instrument_node="">[</span></span><a data-dcnode-id="4549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D18" title="Edit section: Violence against women"><span data-dcnode-id="4550" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4547"><span data-dcnode-id="4548" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4544" instrument_node="">
</span><p data-dcnode-id="4535"><span data-dcnode-id="4543" instrument_node="">Violence against women, particularly </span><a data-dcnode-id="4541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Domestic_violence" title="Domestic violence"><span data-dcnode-id="4542" instrument_node="">domestic violence</span></a><span data-dcnode-id="4540" instrument_node="">, often goes unreported due to social and cultural concerns about shaming one's family or endangering the reputation of one's spouse or children. NPA statistics on violence against women probably understated the magnitude of the problem. According to NPA statistics, there were 12,568 cases of alleged domestic violence and 1,499 restraining orders issued in 2003. Police took action in 41 cases in which court orders were violated. Between April and September, the 120 preferential consultation centers received 24,818 cases of domestic violence consultations. Of the total 103,986 consultations since fiscal 2002, 99.6% were for women.</span><sup class="reference" data-dcnode-id="4537" id="cite_ref-HR2004_27-4"><a data-dcnode-id="4538" href="#cite_note-HR2004-27"><span data-dcnode-id="4539" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4536" instrument_node="">
</span></p><p data-dcnode-id="4526"><span data-dcnode-id="4534" instrument_node="">The law allows district courts to impose 6-month restraining orders on perpetrators of domestic violence and to sentence violators up to 1 year in prison or impose fines of up to 1 million yen. According to </span><a data-dcnode-id="4532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Court_of_Japan" title="Supreme Court of Japan"><span data-dcnode-id="4533" instrument_node="">Supreme Court</span></a><span data-dcnode-id="4531" instrument_node=""> figures from January through September 2003, 1,579 applications for restraining orders against abusive spouses were sought, and 1,256 were issued.</span><sup class="reference" data-dcnode-id="4528" id="cite_ref-HR2004_27-5"><a data-dcnode-id="4529" href="#cite_note-HR2004-27"><span data-dcnode-id="4530" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4527" instrument_node=""> The orders either banned perpetrators from approaching their victims or ordered them to move away from the home, or both. The law also covers common-law marriages and divorced individuals; it also encourages prefectures to expand shelter facilities for domestic abuse victims and stipulates that local governments offer financial assistance to 40 private institutions already operating such shelters.
</span></p><p data-dcnode-id="4524"><span data-dcnode-id="4525" instrument_node="">The revision to the Law for the Prevention of Spousal Violence and the Protection of Victims passed in May expanded the definition of spousal violence to include mental, sexual, and physical abuse and increased the length of restraining orders from 2 weeks to 2 months.
</span></p><p data-dcnode-id="4518"><span data-dcnode-id="4523" instrument_node="">The Supreme Court ruled in favor of article 750 of the Civil Code in December 2015. That article requires a husband and wife to adopt the same surname.</span><sup class="reference" data-dcnode-id="4520" id="cite_ref-39"><a data-dcnode-id="4521" href="#cite_note-39"><span data-dcnode-id="4522" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4519" instrument_node="">
</span></p><span data-dcnode-id="4517" instrument_node="">
</span><h2 data-dcnode-id="4507"><span class="mw-headline" data-dcnode-id="4515" id="Rape"><span data-dcnode-id="4516" instrument_node="">Rape</span></span><span class="mw-editsection" data-dcnode-id="4508"><span class="mw-editsection-bracket" data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node="">[</span></span><a data-dcnode-id="4511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D19" title="Edit section: Rape"><span data-dcnode-id="4512" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4509"><span data-dcnode-id="4510" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4506" instrument_node="">
</span><p data-dcnode-id="4483"><span data-dcnode-id="4505" instrument_node="">NPA statistics reported 2,472 rapes in 2003.</span><sup class="reference" data-dcnode-id="4502" id="cite_ref-HR2004_27-6"><a data-dcnode-id="4503" href="#cite_note-HR2004-27"><span data-dcnode-id="4504" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4501" instrument_node=""> Husbands have been prosecuted for spousal rape; usually these cases involved a third party who assisted in the rape. In light of several high-profile gang rapes in 2003 involving college students at Waseda University, the Upper House passed a bill in December making gang rape an offense punishable by a minimum penalty of 4 years in prison. In November 2004, a former student was sentenced to 14 years in prison for raping two women at a party organized by the "</span><a data-dcnode-id="4499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Super_Free" title="Super Free"><span data-dcnode-id="4500" instrument_node="">Super Free</span></a><span data-dcnode-id="4498" instrument_node="">" student group, as well as a third woman in December 2001. All 13 other defendants received jail sentences of up to 10 years. Many local governments responded to the need for confidential assistance for abused women by establishing special women's consultation departments in police and prefectural offices.</span><sup class="reference" data-dcnode-id="4495" id="cite_ref-CNN2018-04-22a_40-0"><a data-dcnode-id="4496" href="#cite_note-CNN2018-04-22a-40"><span data-dcnode-id="4497" instrument_node="">[40]</span></a></sup><span data-dcnode-id="4494" instrument_node=""> However,  as of 2018, women were still deterred from reporting rape and sexual assault by legal and practical obstacles, by the treatment of women who speak out, such as </span><a data-dcnode-id="4492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shiori_It%25C5%258D" title="Shiori Itō"><span data-dcnode-id="4493" instrument_node="">Shiori Itō</span></a><span data-dcnode-id="4491" instrument_node="">, and by many other  difficulties.</span><sup class="reference" data-dcnode-id="4488" id="cite_ref-CNN2018-04-22a_40-1"><a data-dcnode-id="4489" href="#cite_note-CNN2018-04-22a-40"><span data-dcnode-id="4490" instrument_node="">[40]</span></a></sup><sup class="reference" data-dcnode-id="4485" id="cite_ref-BBC2018-06-28a_41-0"><a data-dcnode-id="4486" href="#cite_note-BBC2018-06-28a-41"><span data-dcnode-id="4487" instrument_node="">[41]</span></a></sup><span data-dcnode-id="4484" instrument_node="">
</span></p><span data-dcnode-id="4482" instrument_node="">
</span><h2 data-dcnode-id="4472"><span class="mw-headline" data-dcnode-id="4480" id="Comfort_women"><span data-dcnode-id="4481" instrument_node="">Comfort women</span></span><span class="mw-editsection" data-dcnode-id="4473"><span class="mw-editsection-bracket" data-dcnode-id="4478"><span data-dcnode-id="4479" instrument_node="">[</span></span><a data-dcnode-id="4476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D20" title="Edit section: Comfort women"><span data-dcnode-id="4477" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4474"><span data-dcnode-id="4475" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4471" instrument_node="">
</span><link data-dcnode-id="4470" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4466" role="note"><span data-dcnode-id="4469" instrument_node="">See also: </span><a data-dcnode-id="4467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Comfort_women" title="Comfort women"><span data-dcnode-id="4468" instrument_node="">Comfort women</span></a></div><span data-dcnode-id="4465" instrument_node="">
</span><p data-dcnode-id="4444"><span data-dcnode-id="4464" instrument_node="">Several cases filed by women forced to work as "</span><a data-dcnode-id="4462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Comfort_women" title="Comfort women"><span data-dcnode-id="4463" instrument_node="">comfort women</span></a><span data-dcnode-id="4461" instrument_node="">" (women and girls forced into sexual slavery) during World War II were finalized during 2004. In February,</span><sup class="noprint Inline-Template" data-dcnode-id="4454" style="white-space:nowrap;"><span data-dcnode-id="4460" instrument_node="">[</span><i data-dcnode-id="4456"><a data-dcnode-id="4457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Dates_and_numbers%23Chronological_items" title="Wikipedia:Manual of Style/Dates and numbers"><span data-dcnode-id="4458" title="The time period mentioned near this tag is ambiguous. (September 2011)"><span data-dcnode-id="4459" instrument_node="">when?</span></span></a></i><span data-dcnode-id="4455" instrument_node="">]</span></sup><span data-dcnode-id="4453" instrument_node=""> the Tokyo High Court rejected an appeal by 7 Taiwanese former "comfort women", while in November the Supreme Court dismissed a damage suit filed in 1991 by 35 Korean wartime "comfort women". In December 2004 the Tokyo High Court dismissed an appeal by 4 Chinese former "comfort women",</span><sup class="reference" data-dcnode-id="4450" id="cite_ref-42"><a data-dcnode-id="4451" href="#cite_note-42"><span data-dcnode-id="4452" instrument_node="">[42]</span></a></sup><span data-dcnode-id="4449" instrument_node=""> and the Supreme Court rejected a suit filed in 1993 by 46 Filipina wartime "comfort women".</span><sup class="reference" data-dcnode-id="4446" id="cite_ref-43"><a data-dcnode-id="4447" href="#cite_note-43"><span data-dcnode-id="4448" instrument_node="">[43]</span></a></sup><span data-dcnode-id="4445" instrument_node="">
</span></p><span data-dcnode-id="4443" instrument_node="">
</span><h2 data-dcnode-id="4433"><span class="mw-headline" data-dcnode-id="4441" id="Marriage_and_divorce"><span data-dcnode-id="4442" instrument_node="">Marriage and divorce</span></span><span class="mw-editsection" data-dcnode-id="4434"><span class="mw-editsection-bracket" data-dcnode-id="4439"><span data-dcnode-id="4440" instrument_node="">[</span></span><a data-dcnode-id="4437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D21" title="Edit section: Marriage and divorce"><span data-dcnode-id="4438" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4435"><span data-dcnode-id="4436" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4432" instrument_node="">
</span><h3 data-dcnode-id="4422"><span class="mw-headline" data-dcnode-id="4430" id="Custody"><span data-dcnode-id="4431" instrument_node="">Custody</span></span><span class="mw-editsection" data-dcnode-id="4423"><span class="mw-editsection-bracket" data-dcnode-id="4428"><span data-dcnode-id="4429" instrument_node="">[</span></span><a data-dcnode-id="4426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D22" title="Edit section: Custody"><span data-dcnode-id="4427" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4424"><span data-dcnode-id="4425" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4421" instrument_node="">
</span><p data-dcnode-id="4409"><span data-dcnode-id="4420" instrument_node="">When couples divorce there is a strong bias in Japanese </span><a class="mw-redirect" data-dcnode-id="4418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Family_courts" title="Family courts"><span data-dcnode-id="4419" instrument_node="">family courts</span></a><span data-dcnode-id="4417" instrument_node=""> which gives 80% of the mothers custody of children according to 2004 statistics from the National Institute of Population and Social Security Research.</span><sup class="reference" data-dcnode-id="4414" id="cite_ref-JT_44-0"><a data-dcnode-id="4415" href="#cite_note-JT-44"><span data-dcnode-id="4416" instrument_node="">[44]</span></a></sup><span data-dcnode-id="4413" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="4411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joint_physical_custody" title="Joint physical custody"><span data-dcnode-id="4412" instrument_node="">Joint physical custody</span></a><span data-dcnode-id="4410" instrument_node=""> or shared parenting is uncommon.
</span></p><span data-dcnode-id="4408" instrument_node="">
</span><h3 data-dcnode-id="4398"><span class="mw-headline" data-dcnode-id="4406" id="Abduction"><span data-dcnode-id="4407" instrument_node="">Abduction</span></span><span class="mw-editsection" data-dcnode-id="4399"><span class="mw-editsection-bracket" data-dcnode-id="4404"><span data-dcnode-id="4405" instrument_node="">[</span></span><a data-dcnode-id="4402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D23" title="Edit section: Abduction"><span data-dcnode-id="4403" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4400"><span data-dcnode-id="4401" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4397" instrument_node="">
</span><link data-dcnode-id="4396" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4392" role="note"><span data-dcnode-id="4395" instrument_node="">Main article: </span><a data-dcnode-id="4393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_child_abduction_in_Japan" title="International child abduction in Japan"><span data-dcnode-id="4394" instrument_node="">International child abduction in Japan</span></a></div><span data-dcnode-id="4391" instrument_node="">
</span><p data-dcnode-id="4370"><span data-dcnode-id="4390" instrument_node="">There is major criticism about divorced Japanese parents and foreign parents who are denied access to their children post-divorce.</span><sup class="reference" data-dcnode-id="4387" id="cite_ref-child-abduction_45-0"><a data-dcnode-id="4388" href="#cite_note-child-abduction-45"><span data-dcnode-id="4389" instrument_node="">[45]</span></a></sup><span data-dcnode-id="4386" instrument_node=""> Many of these divorced people lose access and contact with their children.</span><sup class="reference" data-dcnode-id="4383" id="cite_ref-child-abduction_45-1"><a data-dcnode-id="4384" href="#cite_note-child-abduction-45"><span data-dcnode-id="4385" instrument_node="">[45]</span></a></sup><span data-dcnode-id="4382" instrument_node=""> Foreign parents post-divorce can suffer from child-abduction.</span><sup class="reference" data-dcnode-id="4379" id="cite_ref-child-abduction_45-2"><a data-dcnode-id="4380" href="#cite_note-child-abduction-45"><span data-dcnode-id="4381" instrument_node="">[45]</span></a></sup><span data-dcnode-id="4378" instrument_node=""> In 2020, lawmakers of the </span><a data-dcnode-id="4376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="4377" instrument_node="">European Union</span></a><span data-dcnode-id="4375" instrument_node=""> adopted a non-binding resolution for Japan to adhere to parental access, visitation rights and to return abducted children.</span><sup class="reference" data-dcnode-id="4372" id="cite_ref-child-abduction_45-3"><a data-dcnode-id="4373" href="#cite_note-child-abduction-45"><span data-dcnode-id="4374" instrument_node="">[45]</span></a></sup><span data-dcnode-id="4371" instrument_node="">
</span></p><span data-dcnode-id="4369" instrument_node="">
</span><h3 data-dcnode-id="4359"><span class="mw-headline" data-dcnode-id="4367" id="Corporal_punishments"><span data-dcnode-id="4368" instrument_node="">Corporal punishments</span></span><span class="mw-editsection" data-dcnode-id="4360"><span class="mw-editsection-bracket" data-dcnode-id="4365"><span data-dcnode-id="4366" instrument_node="">[</span></span><a data-dcnode-id="4363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D24" title="Edit section: Corporal punishments"><span data-dcnode-id="4364" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4361"><span data-dcnode-id="4362" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4358" instrument_node="">
</span><p data-dcnode-id="4352"><span data-dcnode-id="4357" instrument_node="">In February 2020 all use of corporal punishments against children in Japan ended after the Ministry of Health, Labour and Welfare (MHLW) issued guidelines to implement 2019 amendments made to laws on children.</span><sup class="reference" data-dcnode-id="4354" id="cite_ref-:0_38-1"><a data-dcnode-id="4355" href="#cite_note-:0-38"><span data-dcnode-id="4356" instrument_node="">[38]</span></a></sup><span data-dcnode-id="4353" instrument_node="">
</span></p><span data-dcnode-id="4351" instrument_node="">
</span><h2 data-dcnode-id="4341"><span class="mw-headline" data-dcnode-id="4349" id="Rights_of_children"><span data-dcnode-id="4350" instrument_node="">Rights of children</span></span><span class="mw-editsection" data-dcnode-id="4342"><span class="mw-editsection-bracket" data-dcnode-id="4347"><span data-dcnode-id="4348" instrument_node="">[</span></span><a data-dcnode-id="4345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D25" title="Edit section: Rights of children"><span data-dcnode-id="4346" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4343"><span data-dcnode-id="4344" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4340" instrument_node="">
</span><p data-dcnode-id="4326"><span data-dcnode-id="4339" instrument_node="">Boys and girls have equal access to </span><a data-dcnode-id="4337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Health_care" title="Health care"><span data-dcnode-id="4338" instrument_node="">health care</span></a><span data-dcnode-id="4336" instrument_node=""> and other public services. </span><a data-dcnode-id="4334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Education_in_Japan" title="Education in Japan"><span data-dcnode-id="4335" instrument_node="">Education</span></a><span data-dcnode-id="4333" instrument_node=""> is mostly free and </span><a data-dcnode-id="4331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Compulsory_education" title="Compulsory education"><span data-dcnode-id="4332" instrument_node="">compulsory</span></a><span data-dcnode-id="4330" instrument_node=""> through the lower secondary level (age 14 or </span><a data-dcnode-id="4328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ninth_grade" title="Ninth grade"><span data-dcnode-id="4329" instrument_node="">ninth grade</span></a><span data-dcnode-id="4327" instrument_node="">). Education was available widely to students who met minimum academic standards at the upper secondary level through the age of 18. Society places an extremely high value on education, and enrollment levels for both boys and girls through the free upper secondary level exceeded 96%.
</span></p><p data-dcnode-id="4297"><span data-dcnode-id="4325" instrument_node="">Children under the age of 14 cannot be held criminally responsible for their actions. Under juvenile </span><a data-dcnode-id="4323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Law" title="Law"><span data-dcnode-id="4324" instrument_node="">law</span></a><span data-dcnode-id="4322" instrument_node="">, juvenile suspects are tried in family court and have the right of appeal to an appellate court. </span><a data-dcnode-id="4320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Family_court" title="Family court"><span data-dcnode-id="4321" instrument_node="">Family court</span></a><span data-dcnode-id="4319" instrument_node=""> proceedings are not open to the public, a policy that has been criticized by family members of juvenile crime victims. For the last several years, juvenile crime has shown a trend toward more serious offenses such as </span><a data-dcnode-id="4317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Murder" title="Murder"><span data-dcnode-id="4318" instrument_node="">murder</span></a><span data-dcnode-id="4316" instrument_node="">, </span><a data-dcnode-id="4314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robbery" title="Robbery"><span data-dcnode-id="4315" instrument_node="">robbery</span></a><span data-dcnode-id="4313" instrument_node="">, </span><a data-dcnode-id="4311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arson" title="Arson"><span data-dcnode-id="4312" instrument_node="">arson</span></a><span data-dcnode-id="4310" instrument_node="">, and </span><a data-dcnode-id="4308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rape" title="Rape"><span data-dcnode-id="4309" instrument_node="">rape</span></a><span data-dcnode-id="4307" instrument_node="">. The </span><a data-dcnode-id="4305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tokyo" title="Tokyo"><span data-dcnode-id="4306" instrument_node="">Tokyo</span></a><span data-dcnode-id="4304" instrument_node=""> prefectural government continued programs to protect the welfare of stateless children, whose births their </span><a class="mw-redirect" data-dcnode-id="4302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Illegal_immigrant" title="Illegal immigrant"><span data-dcnode-id="4303" instrument_node="">illegal immigrant</span></a><span data-dcnode-id="4301" instrument_node=""> mothers had refused to register for fear of forcible </span><a data-dcnode-id="4299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Repatriation" title="Repatriation"><span data-dcnode-id="4300" instrument_node="">repatriation</span></a><span data-dcnode-id="4298" instrument_node="">.
</span></p><span data-dcnode-id="4296" instrument_node="">
</span><h3 data-dcnode-id="4286"><span class="mw-headline" data-dcnode-id="4294" id="Child_abuse_and_neglect"><span data-dcnode-id="4295" instrument_node="">Child abuse and neglect</span></span><span class="mw-editsection" data-dcnode-id="4287"><span class="mw-editsection-bracket" data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">[</span></span><a data-dcnode-id="4290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D26" title="Edit section: Child abuse and neglect"><span data-dcnode-id="4291" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4288"><span data-dcnode-id="4289" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4285" instrument_node="">
</span><p data-dcnode-id="4270"><span data-dcnode-id="4284" instrument_node="">Public attention has focused increasingly on reports of frequent </span><a data-dcnode-id="4282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Child_abuse" title="Child abuse"><span data-dcnode-id="4283" instrument_node="">child abuse</span></a><span data-dcnode-id="4281" instrument_node=""> in the home.</span><sup class="reference" data-dcnode-id="4278" id="cite_ref-46"><a data-dcnode-id="4279" href="#cite_note-46"><span data-dcnode-id="4280" instrument_node="">[46]</span></a></sup><span data-dcnode-id="4277" instrument_node=""> The law grants </span><a class="mw-redirect" data-dcnode-id="4275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Child_welfare" title="Child welfare"><span data-dcnode-id="4276" instrument_node="">child welfare</span></a><span data-dcnode-id="4274" instrument_node=""> officials the authority to prohibit abusive parents from meeting or communicating with their children, although due to Japanese cultural views on family matters being "private", this enforcement option is rarely exercised. The law also bans abuse under the guise of </span><a data-dcnode-id="4272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Discipline" title="Discipline"><span data-dcnode-id="4273" instrument_node="">discipline</span></a><span data-dcnode-id="4271" instrument_node=""> and obliges teachers, doctors, and welfare officials to report any suspicious circumstances to 1 of the 182 nationwide local child counseling centers or to a municipal welfare center. In May 2003, the Ministry of Health, Labor, and Welfare reported that 108 children died as a result of child abuse since the enactment of the Child Abuse Prevention Law in 2000.
</span></p><p data-dcnode-id="4259"><span data-dcnode-id="4269" instrument_node="">In 2003, there were a record 23,738 cases of child abuse, up almost 2% from 2002, according to the Cabinet Office. Approximately 50% of the cases involved </span><a data-dcnode-id="4267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Violence" title="Violence"><span data-dcnode-id="4268" instrument_node="">violence</span></a><span data-dcnode-id="4266" instrument_node="">, and 40% were cases of parental </span><a data-dcnode-id="4264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neglect" title="Neglect"><span data-dcnode-id="4265" instrument_node="">neglect</span></a><span data-dcnode-id="4263" instrument_node="">. Child welfare centers likewise reported a record 26,573 calls in 2003, an increase of 2,800 calls from the previous year. Generally accepted statistics indicate that upwards of 70% of child abuse cases involve a female perpetrator, usually the child's </span><a data-dcnode-id="4261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mother" title="Mother"><span data-dcnode-id="4262" instrument_node="">mother</span></a><span data-dcnode-id="4260" instrument_node="">. Although the Government offered subsidies to local governments to combat record-high child abuse, only 13% accepted the offer. Most of the local governments declining the subsidies stated they could not afford to pay their share of the bill.
</span></p><p data-dcnode-id="4241"><span data-dcnode-id="4258" instrument_node="">in 2014  the police reported 13,037 cases of child abuse including sexual abuse and death.</span><sup class="reference" data-dcnode-id="4255" id="cite_ref-47"><a data-dcnode-id="4256" href="#cite_note-47"><span data-dcnode-id="4257" instrument_node="">[47]</span></a></sup><sup class="reference" data-dcnode-id="4252" id="cite_ref-48"><a data-dcnode-id="4253" href="#cite_note-48"><span data-dcnode-id="4254" instrument_node="">[48]</span></a></sup><sup class="reference" data-dcnode-id="4249" id="cite_ref-49"><a data-dcnode-id="4250" href="#cite_note-49"><span data-dcnode-id="4251" instrument_node="">[49]</span></a></sup><sup class="reference" data-dcnode-id="4246" id="cite_ref-50"><a data-dcnode-id="4247" href="#cite_note-50"><span data-dcnode-id="4248" instrument_node="">[50]</span></a></sup><sup class="reference" data-dcnode-id="4243" id="cite_ref-51"><a data-dcnode-id="4244" href="#cite_note-51"><span data-dcnode-id="4245" instrument_node="">[51]</span></a></sup><span data-dcnode-id="4242" instrument_node="">
</span></p><p data-dcnode-id="4225"><span data-dcnode-id="4240" instrument_node="">On July 20, 2020, a report by </span><a class="mw-redirect" data-dcnode-id="4238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/HRW" title="HRW"><span data-dcnode-id="4239" instrument_node="">HRW</span></a><span data-dcnode-id="4237" instrument_node=""> revealed that child athletes in </span><a data-dcnode-id="4235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japan" title="Japan"><span data-dcnode-id="4236" instrument_node="">Japan</span></a><span data-dcnode-id="4234" instrument_node=""> have routinely suffered physical, sexual and verbal abuse from their coaches, which led some of them to take their own lives. The report “‘I Was Hit So Many Times I Can’t Count’: Abuse of Child Athletes in Japan,</span><sup class="reference" data-dcnode-id="4231" id="cite_ref-52"><a data-dcnode-id="4232" href="#cite_note-52"><span data-dcnode-id="4233" instrument_node="">[52]</span></a></sup><span data-dcnode-id="4230" instrument_node=""> documented the country's history of corporal punishment in sport, known as taibatsu in Japanese, and revealed child abuse in sports training throughout Japanese schools, federations, and elite sports.</span><sup class="reference" data-dcnode-id="4227" id="cite_ref-53"><a data-dcnode-id="4228" href="#cite_note-53"><span data-dcnode-id="4229" instrument_node="">[53]</span></a></sup><span data-dcnode-id="4226" instrument_node="">
</span></p><span data-dcnode-id="4224" instrument_node="">
</span><h2 data-dcnode-id="4214"><span class="mw-headline" data-dcnode-id="4222" id="Trafficking_of_persons"><span data-dcnode-id="4223" instrument_node="">Trafficking of persons</span></span><span class="mw-editsection" data-dcnode-id="4215"><span class="mw-editsection-bracket" data-dcnode-id="4220"><span data-dcnode-id="4221" instrument_node="">[</span></span><a data-dcnode-id="4218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D27" title="Edit section: Trafficking of persons"><span data-dcnode-id="4219" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4216"><span data-dcnode-id="4217" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4213" instrument_node="">
</span><table class="box-Unreferenced_section plainlinks metadata ambox ambox-content ambox-Unreferenced" data-dcnode-id="4170" role="presentation"><tbody data-dcnode-id="4171"><tr data-dcnode-id="4172"><td class="mbox-image" data-dcnode-id="4209"><div data-dcnode-id="4210" style="width:52px"><a class="image" data-dcnode-id="4211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="4212" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="4173"><div class="mbox-text-span" data-dcnode-id="4174"><span data-dcnode-id="4208" instrument_node="">This section </span><b data-dcnode-id="4201"><span data-dcnode-id="4207" instrument_node="">does not </span><a data-dcnode-id="4205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources" title="Wikipedia:Citing sources"><span data-dcnode-id="4206" instrument_node="">cite</span></a><span data-dcnode-id="4204" instrument_node=""> any </span><a data-dcnode-id="4202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="4203" instrument_node="">sources</span></a></b><span data-dcnode-id="4200" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="4189"><span data-dcnode-id="4199" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="4197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit"><span data-dcnode-id="4198" instrument_node="">improve this section</span></a><span data-dcnode-id="4196" instrument_node=""> by </span><a data-dcnode-id="4194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="4195" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="4193" instrument_node="">. Unsourced material may be challenged and </span><a data-dcnode-id="4191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability%23Burden_of_evidence" title="Wikipedia:Verifiability"><span data-dcnode-id="4192" instrument_node="">removed</span></a><span data-dcnode-id="4190" instrument_node="">.</span></span><span data-dcnode-id="4188" instrument_node=""> </span><span class="date-container" data-dcnode-id="4182"><i data-dcnode-id="4183"><span data-dcnode-id="4187" instrument_node="">(</span><span class="date" data-dcnode-id="4185"><span data-dcnode-id="4186" instrument_node="">March 2019</span></span><span data-dcnode-id="4184" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="4175"><i data-dcnode-id="4176"><span data-dcnode-id="4181" instrument_node=""> (</span><small data-dcnode-id="4178"><a data-dcnode-id="4179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="4180" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="4177" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="4169" instrument_node="">
</span><p data-dcnode-id="4164"><span data-dcnode-id="4168" instrument_node="">The Constitution prohibits holding persons in bondage, and the government employed a variety of labor and immigration statutes to carry out limited trafficking-related prosecutions; however, there are no specific laws that prohibit </span><a data-dcnode-id="4166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_trafficking" title="Human trafficking"><span data-dcnode-id="4167" instrument_node="">trafficking in persons</span></a><span data-dcnode-id="4165" instrument_node="">. In April, the government created a senior coordinator presiding over an inter-ministerial committee for anti-trafficking efforts. In December, the Government released its Action Plan to combat trafficking in persons. Focusing on prevention, prosecution, and protection of trafficking victims, the Action Plan calls for a review of "entertainer" visas, strengthened immigration control, revision of the penal code to make trafficking in persons a crime, and added protection of victims through shelters, counseling, and repatriation assistance.
</span></p><p data-dcnode-id="4153"><span data-dcnode-id="4163" instrument_node="">As of May 2019, Japan has ratified the </span><a class="mw-redirect" data-dcnode-id="4161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_against_Transnational_Organized_Crime" title="Convention against Transnational Organized Crime"><span data-dcnode-id="4162" instrument_node="">Convention against Transnational Organized Crime</span></a><span data-dcnode-id="4160" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protocol_to_Prevent%2C_Suppress_and_Punish_Trafficking_in_Persons%2C_especially_Women_and_Children" title="Protocol to Prevent, Suppress and Punish Trafficking in Persons, especially Women and Children"><span data-dcnode-id="4159" instrument_node="">Protocol to Prevent, Suppress and Punish Trafficking in Persons, especially Women and Children</span></a><span data-dcnode-id="4157" instrument_node=""> and </span><a data-dcnode-id="4155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Convention_Against_Corruption" title="United Nations Convention Against Corruption"><span data-dcnode-id="4156" instrument_node="">United Nations Convention Against Corruption</span></a><span data-dcnode-id="4154" instrument_node="">.
</span></p><span data-dcnode-id="4152" instrument_node="">
</span><h3 data-dcnode-id="4142"><span class="mw-headline" data-dcnode-id="4150" id="Sexual_exploitation"><span data-dcnode-id="4151" instrument_node="">Sexual exploitation</span></span><span class="mw-editsection" data-dcnode-id="4143"><span class="mw-editsection-bracket" data-dcnode-id="4148"><span data-dcnode-id="4149" instrument_node="">[</span></span><a data-dcnode-id="4146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D28" title="Edit section: Sexual exploitation"><span data-dcnode-id="4147" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4144"><span data-dcnode-id="4145" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4141" instrument_node="">
</span><p data-dcnode-id="4127"><a class="mw-redirect" data-dcnode-id="4139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Woman_trafficking" title="Woman trafficking"><span data-dcnode-id="4140" instrument_node="">Trafficking of women and girls</span></a><span data-dcnode-id="4138" instrument_node=""> into the country has been a problem.</span><sup class="reference" data-dcnode-id="4135" id="cite_ref-54"><a data-dcnode-id="4136" href="#cite_note-54"><span data-dcnode-id="4137" instrument_node="">[54]</span></a></sup><span data-dcnode-id="4134" instrument_node=""> Women and girls, primarily from Thailand, the Philippines, and Eastern Europe, were trafficked into the country for </span><a data-dcnode-id="4132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexual_slavery" title="Sexual slavery"><span data-dcnode-id="4133" instrument_node="">sexual exploitation</span></a><span data-dcnode-id="4131" instrument_node=""> and </span><a data-dcnode-id="4129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forced_labour" title="Forced labour"><span data-dcnode-id="4130" instrument_node="">forced labour</span></a><span data-dcnode-id="4128" instrument_node="">. Women and girls from Colombia, Brazil, Mexico, South Korea, Malaysia, Burma, and Indonesia also were trafficked into the country in smaller numbers. The country was a destination for illegal immigrants from China who were trafficked by organized crime groups and held in debt bondage for sexual exploitation and indentured servitude in sweatshops and restaurants. The Government reported that some smugglers used killings and abduction to enforce cooperation.
</span></p><p data-dcnode-id="4121"><span data-dcnode-id="4126" instrument_node="">Although reliable statistics on the number of women trafficked to the country were unavailable, human rights groups reported that up to 200,000 persons, mostly Southeast Asian women, are smuggled annually into the country and forced to work in the sex industry. In 2003, the NPA arrested 41 individuals for trafficking-related offenses, 8 of whom were traffickers. Of these individuals, 36 were convicted, 14 received prison terms, 17 received fines, and 5 received both a fine and prison term. In February 2003, 17 prefecture police offices and the Tokyo Metropolitan police simultaneously raided 24 strip clubs and rescued 68 trafficking victims.</span><sup class="reference" data-dcnode-id="4123" id="cite_ref-55"><a data-dcnode-id="4124" href="#cite_note-55"><span data-dcnode-id="4125" instrument_node="">[55]</span></a></sup><span data-dcnode-id="4122" instrument_node="">
</span></p><span data-dcnode-id="4120" instrument_node="">
</span><h2 data-dcnode-id="4110"><span class="mw-headline" data-dcnode-id="4118" id="Rights_of_persons_with_disabilities"><span data-dcnode-id="4119" instrument_node="">Rights of persons with disabilities</span></span><span class="mw-editsection" data-dcnode-id="4111"><span class="mw-editsection-bracket" data-dcnode-id="4116"><span data-dcnode-id="4117" instrument_node="">[</span></span><a data-dcnode-id="4114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D29" title="Edit section: Rights of persons with disabilities"><span data-dcnode-id="4115" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4112"><span data-dcnode-id="4113" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4109" instrument_node="">
</span><table class="box-Unreferenced_section plainlinks metadata ambox ambox-content ambox-Unreferenced" data-dcnode-id="4066" role="presentation"><tbody data-dcnode-id="4067"><tr data-dcnode-id="4068"><td class="mbox-image" data-dcnode-id="4105"><div data-dcnode-id="4106" style="width:52px"><a class="image" data-dcnode-id="4107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="4108" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="4069"><div class="mbox-text-span" data-dcnode-id="4070"><span data-dcnode-id="4104" instrument_node="">This section </span><b data-dcnode-id="4097"><span data-dcnode-id="4103" instrument_node="">does not </span><a data-dcnode-id="4101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources" title="Wikipedia:Citing sources"><span data-dcnode-id="4102" instrument_node="">cite</span></a><span data-dcnode-id="4100" instrument_node=""> any </span><a data-dcnode-id="4098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="4099" instrument_node="">sources</span></a></b><span data-dcnode-id="4096" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="4085"><span data-dcnode-id="4095" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="4093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit"><span data-dcnode-id="4094" instrument_node="">improve this section</span></a><span data-dcnode-id="4092" instrument_node=""> by </span><a data-dcnode-id="4090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="4091" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="4089" instrument_node="">. Unsourced material may be challenged and </span><a data-dcnode-id="4087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability%23Burden_of_evidence" title="Wikipedia:Verifiability"><span data-dcnode-id="4088" instrument_node="">removed</span></a><span data-dcnode-id="4086" instrument_node="">.</span></span><span data-dcnode-id="4084" instrument_node=""> </span><span class="date-container" data-dcnode-id="4078"><i data-dcnode-id="4079"><span data-dcnode-id="4083" instrument_node="">(</span><span class="date" data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">March 2019</span></span><span data-dcnode-id="4080" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="4071"><i data-dcnode-id="4072"><span data-dcnode-id="4077" instrument_node=""> (</span><small data-dcnode-id="4074"><a data-dcnode-id="4075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="4076" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="4073" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="4065" instrument_node="">
</span><link data-dcnode-id="4064" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4060" role="note"><span data-dcnode-id="4063" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="4061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disability_rights_in_Japan" title="Disability rights in Japan"><span data-dcnode-id="4062" instrument_node="">Disability rights in Japan</span></a></div><span data-dcnode-id="4059" instrument_node="">
