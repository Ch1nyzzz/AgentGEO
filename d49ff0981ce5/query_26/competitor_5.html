</span><p data-dcnode-id="5984"><a data-dcnode-id="6011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japan" title="Japan"><span data-dcnode-id="6012" instrument_node="">Japan</span></a><span data-dcnode-id="6010" instrument_node=""> is a </span><a data-dcnode-id="6008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitutional_monarchy" title="Constitutional monarchy"><span data-dcnode-id="6009" instrument_node="">constitutional monarchy</span></a><span data-dcnode-id="6007" instrument_node="">. According to </span><a data-dcnode-id="6005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Justice_%28Japan%29" title="Ministry of Justice (Japan)"><span data-dcnode-id="6006" instrument_node="">Ministry of Justice</span></a><span data-dcnode-id="6004" instrument_node=""> (MOJ) figures, the Japanese Legal Affairs Bureau offices and civil liberties volunteers dealt with 359,971 human rights related complaints and 18,786 reports of suspected human rights violations during 2003.</span><sup class="reference" data-dcnode-id="6001" id="cite_ref-1"><a data-dcnode-id="6002" href="#cite_note-1"><span data-dcnode-id="6003" instrument_node="">[1]</span></a></sup><span data-dcnode-id="6000" instrument_node=""> Many of these cases were ultimately resolved in the court. Human rights issues occur in present-day Japan, as modernization history of Japan only reached in the non-humanity areas</span><sup class="noprint Inline-Template" data-dcnode-id="5993" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="5999" instrument_node="">[</span><i data-dcnode-id="5995"><a data-dcnode-id="5996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APlease_clarify" title="Wikipedia:Please clarify"><span data-dcnode-id="5997" title="The text near this tag may need clarification or removal of jargon. (October 2017)"><span data-dcnode-id="5998" instrument_node="">clarification needed</span></span></a></i><span data-dcnode-id="5994" instrument_node="">]</span></sup><span data-dcnode-id="5992" instrument_node=""> with the rise of military expansion of </span><a data-dcnode-id="5990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empire_of_Japan" title="Empire of Japan"><span data-dcnode-id="5991" instrument_node="">Empire of Japan</span></a><span data-dcnode-id="5989" instrument_node=""> in the 20th century.</span><sup class="reference" data-dcnode-id="5986" id="cite_ref-2"><a data-dcnode-id="5987" href="#cite_note-2"><span data-dcnode-id="5988" instrument_node="">[2]</span></a></sup><span data-dcnode-id="5985" instrument_node="">
</span></p><p data-dcnode-id="5950"><span data-dcnode-id="5983" instrument_node="">The Human Rights Scores Dataverse ranked Japan somewhere the middle among </span><a data-dcnode-id="5981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Group_of_Seven" title="Group of Seven"><span data-dcnode-id="5982" instrument_node="">G7</span></a><span data-dcnode-id="5980" instrument_node=""> countries on its human rights performance, below </span><a data-dcnode-id="5978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_rights_in_Germany" title="Human rights in Germany"><span data-dcnode-id="5979" instrument_node="">Germany</span></a><span data-dcnode-id="5977" instrument_node=""> and </span><a data-dcnode-id="5975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_rights_in_Canada" title="Human rights in Canada"><span data-dcnode-id="5976" instrument_node="">Canada</span></a><span data-dcnode-id="5974" instrument_node=""> and above the </span><a data-dcnode-id="5972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_rights_in_the_United_Kingdom" title="Human rights in the United Kingdom"><span data-dcnode-id="5973" instrument_node="">United Kingdom</span></a><span data-dcnode-id="5971" instrument_node="">, </span><a data-dcnode-id="5969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_rights_in_France" title="Human rights in France"><span data-dcnode-id="5970" instrument_node="">France</span></a><span data-dcnode-id="5968" instrument_node="">, </span><a data-dcnode-id="5966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_rights_in_Italy" title="Human rights in Italy"><span data-dcnode-id="5967" instrument_node="">Italy</span></a><span data-dcnode-id="5965" instrument_node="">, and the </span><a data-dcnode-id="5963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_rights_in_the_United_States" title="Human rights in the United States"><span data-dcnode-id="5964" instrument_node="">United States</span></a><span data-dcnode-id="5962" instrument_node="">.</span><sup class="reference" data-dcnode-id="5959" id="cite_ref-3"><a data-dcnode-id="5960" href="#cite_note-3"><span data-dcnode-id="5961" instrument_node="">[3]</span></a></sup><span data-dcnode-id="5958" instrument_node=""> The </span><a data-dcnode-id="5956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fragile_States_Index" title="Fragile States Index"><span data-dcnode-id="5957" instrument_node="">Fragile States Index</span></a><span data-dcnode-id="5955" instrument_node=""> ranked Japan second last in the G7 after the United States on its "Human Rights and Rule of Law" sub-indicator.</span><sup class="reference" data-dcnode-id="5952" id="cite_ref-4"><a data-dcnode-id="5953" href="#cite_note-4"><span data-dcnode-id="5954" instrument_node="">[4]</span></a></sup><span data-dcnode-id="5951" instrument_node="">
</span></p><p data-dcnode-id="5935"><span data-dcnode-id="5949" instrument_node="">Foreigners in Japan may face human-rights violations that Japanese citizens do not. In recent years, Western media has reported that Japanese firms frequently confiscate the </span><a class="mw-redirect" data-dcnode-id="5947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Passports" title="Passports"><span data-dcnode-id="5948" instrument_node="">passports</span></a><span data-dcnode-id="5946" instrument_node=""> of guest workers in Japan, particularly unskilled laborers from the Philippines and other poorer Asian countries.</span><sup class="reference" data-dcnode-id="5943" id="cite_ref-5"><a data-dcnode-id="5944" href="#cite_note-5"><span data-dcnode-id="5945" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="5940" id="cite_ref-6"><a data-dcnode-id="5941" href="#cite_note-6"><span data-dcnode-id="5942" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5939" instrument_node=""> Critics call this practice, which is legal in Japan, coercive and a form of </span><a data-dcnode-id="5937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_trafficking" title="Human trafficking"><span data-dcnode-id="5938" instrument_node="">human trafficking</span></a><span data-dcnode-id="5936" instrument_node="">. 
</span></p><span data-dcnode-id="5934" instrument_node="">

</span><p data-dcnode-id="5528"><span data-dcnode-id="5538" instrument_node="">Article 14 of the </span><a data-dcnode-id="5536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_Japan" title="Constitution of Japan"><span data-dcnode-id="5537" instrument_node="">Japanese Constitution</span></a><span data-dcnode-id="5535" instrument_node=""> guarantees equality between the sexes. The percentage of women in full-time jobs grew steadily during the 1980s and early 1990s. The </span><a class="mw-redirect" data-dcnode-id="5533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diet_of_Japan" title="Diet of Japan"><span data-dcnode-id="5534" instrument_node="">Diet's</span></a><span data-dcnode-id="5532" instrument_node=""> passage of the Law for Equal Opportunity in Employment for Men and Women in 1985 is of some help in securing women's rights, even though the law is a "guideline" and entails no legal penalties for employers who discriminate (see </span><a class="mw-redirect" data-dcnode-id="5530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Working_women_in_Japan" title="Working women in Japan"><span data-dcnode-id="5531" instrument_node="">Working women in Japan</span></a><span data-dcnode-id="5529" instrument_node="">).
</span></p><p data-dcnode-id="5491"><span data-dcnode-id="5527" instrument_node="">Japan has a conviction rate of over 99%.</span><sup class="reference" data-dcnode-id="5524" id="cite_ref-7"><a data-dcnode-id="5525" href="#cite_note-7"><span data-dcnode-id="5526" instrument_node="">[7]</span></a></sup><span data-dcnode-id="5523" instrument_node=""> In several cases, courts have acknowledged confessions were forced and released those imprisoned. To combat this, a law was passed in 2016 requiring some interrogations to be videotaped. However, this only applies to people accused of serious crimes, such as murder, arson and kidnapping, which make up only 3% of cases.</span><sup class="reference" data-dcnode-id="5520" id="cite_ref-8"><a data-dcnode-id="5521" href="#cite_note-8"><span data-dcnode-id="5522" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5519" instrument_node=""> In common law countries which practice trial by jury, a high conviction rate may indicate that defendants are not receiving a </span><a class="mw-redirect" data-dcnode-id="5517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fair_trial" title="Fair trial"><span data-dcnode-id="5518" instrument_node="">fair trial</span></a><span data-dcnode-id="5516" instrument_node="">. Sometimes Japanese prosecutors </span><a data-dcnode-id="5514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nolle_prosequi" title="Nolle prosequi"><span data-dcnode-id="5515" instrument_node="">decide not to prosecute</span></a><span data-dcnode-id="5513" instrument_node=""> in the case of minor crimes or when there is a high possibility of innocence.</span><sup class="reference" data-dcnode-id="5510" id="cite_ref-9"><a data-dcnode-id="5511" href="#cite_note-9"><span data-dcnode-id="5512" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5509" instrument_node=""> 
Some Japanese researchers believe that is one of the causes of the high conviction rate in Japan.</span><sup class="reference" data-dcnode-id="5506" id="cite_ref-10"><a data-dcnode-id="5507" href="#cite_note-10"><span data-dcnode-id="5508" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5505" instrument_node=""> The prosecution rate in Japan is 33.4%.</span><sup class="reference" data-dcnode-id="5502" id="cite_ref-11"><a data-dcnode-id="5503" href="#cite_note-11"><span data-dcnode-id="5504" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5501" instrument_node=""> 64.3% was not pursued. Japan also practices the </span><a class="mw-redirect" data-dcnode-id="5499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Death_penalty" title="Death penalty"><span data-dcnode-id="5500" instrument_node="">death penalty</span></a><span data-dcnode-id="5498" instrument_node="">, to which the U.N. objects, as do several prominent NGOs and the </span><a data-dcnode-id="5496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="5497" instrument_node="">European Union</span></a><span data-dcnode-id="5495" instrument_node=""> (see </span><a data-dcnode-id="5493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_punishment_in_Japan" title="Capital punishment in Japan"><span data-dcnode-id="5494" instrument_node="">Capital punishment in Japan</span></a><span data-dcnode-id="5492" instrument_node="">).
</span></p><p data-dcnode-id="5460"><span data-dcnode-id="5490" instrument_node="">There is much controversy surrounding the social and legal treatment of </span><a data-dcnode-id="5488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minority_group" title="Minority group"><span data-dcnode-id="5489" instrument_node="">minorities</span></a><span data-dcnode-id="5487" instrument_node="">. Although the Japanese consider themselves to be a homogeneous people, minorities do exist, and they often suffer discrimination. The largest indigenous minority are the two to four million </span><i data-dcnode-id="5484"><a data-dcnode-id="5485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Burakumin" title="Burakumin"><span data-dcnode-id="5486" instrument_node="">hisabetsu buraku</span></a></i><span data-dcnode-id="5483" instrument_node=""> ("discriminated communities"), descendants of the outcast communities of feudal Japan. Other such minorities include the </span><a data-dcnode-id="5481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ainu_people" title="Ainu people"><span data-dcnode-id="5482" instrument_node="">Ainu</span></a><span data-dcnode-id="5480" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="5478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indigenous_people" title="Indigenous people"><span data-dcnode-id="5479" instrument_node="">indigenous inhabitants</span></a><span data-dcnode-id="5477" instrument_node=""> of northern Japan, and the people of </span><a class="mw-redirect" data-dcnode-id="5475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Okinawa" title="Okinawa"><span data-dcnode-id="5476" instrument_node="">Okinawa</span></a><span data-dcnode-id="5474" instrument_node="">. Japan also has several hundred thousand native residents of </span><a class="mw-redirect" data-dcnode-id="5472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Korean_people" title="Korean people"><span data-dcnode-id="5473" instrument_node="">Korean</span></a><span data-dcnode-id="5471" instrument_node=""> and </span><a data-dcnode-id="5469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Han_Chinese" title="Han Chinese"><span data-dcnode-id="5470" instrument_node="">Chinese</span></a><span data-dcnode-id="5468" instrument_node=""> descent who together with other </span><a class="mw-redirect" data-dcnode-id="5466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gaikokujin" title="Gaikokujin"><span data-dcnode-id="5467" instrument_node="">foreign residents</span></a><span data-dcnode-id="5465" instrument_node=""> experience varying forms and degrees of discrimination.</span><sup class="reference" data-dcnode-id="5462" id="cite_ref-12"><a data-dcnode-id="5463" href="#cite_note-12"><span data-dcnode-id="5464" instrument_node="">[12]</span></a></sup><span data-dcnode-id="5461" instrument_node="">
</span></p><span data-dcnode-id="5459" instrument_node="">
</span><h2 data-dcnode-id="5449"><span class="mw-headline" data-dcnode-id="5457" id="Judicial_system"><span data-dcnode-id="5458" instrument_node="">Judicial system</span></span><span class="mw-editsection" data-dcnode-id="5450"><span class="mw-editsection-bracket" data-dcnode-id="5455"><span data-dcnode-id="5456" instrument_node="">[</span></span><a data-dcnode-id="5453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D2" title="Edit section: Judicial system"><span data-dcnode-id="5454" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5451"><span data-dcnode-id="5452" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5448" instrument_node="">
</span><h3 data-dcnode-id="5438"><span class="mw-headline" data-dcnode-id="5446" id="Confessions"><span data-dcnode-id="5447" instrument_node="">Confessions</span></span><span class="mw-editsection" data-dcnode-id="5439"><span class="mw-editsection-bracket" data-dcnode-id="5444"><span data-dcnode-id="5445" instrument_node="">[</span></span><a data-dcnode-id="5442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D3" title="Edit section: Confessions"><span data-dcnode-id="5443" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5440"><span data-dcnode-id="5441" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5437" instrument_node="">
</span><p data-dcnode-id="5428"><span data-dcnode-id="5436" instrument_node="">The Constitution and the </span><a class="mw-redirect" data-dcnode-id="5434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Criminal_Code_of_Japan" title="Criminal Code of Japan"><span data-dcnode-id="5435" instrument_node="">Criminal Code</span></a><span data-dcnode-id="5433" instrument_node=""> include safeguards to ensure that no criminal suspect can be compelled to make a self-incriminating conviction. In 2003, the use of leather restraining body belts was abolished.  Softer leather handcuffs without body belts were instituted as substitute restraining devices. Amnesty International has urged Japan to reform its police interrogation methods.</span><sup class="reference" data-dcnode-id="5430" id="cite_ref-13"><a data-dcnode-id="5431" href="#cite_note-13"><span data-dcnode-id="5432" instrument_node="">[13]</span></a></sup><span data-dcnode-id="5429" instrument_node="">
</span></p><span data-dcnode-id="5427" instrument_node="">
</span><h3 data-dcnode-id="5417"><span class="mw-headline" data-dcnode-id="5425" id="Deaths_of_prisoners"><span data-dcnode-id="5426" instrument_node="">Deaths of prisoners</span></span><span class="mw-editsection" data-dcnode-id="5418"><span class="mw-editsection-bracket" data-dcnode-id="5423"><span data-dcnode-id="5424" instrument_node="">[</span></span><a data-dcnode-id="5421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D4" title="Edit section: Deaths of prisoners"><span data-dcnode-id="5422" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5419"><span data-dcnode-id="5420" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5416" instrument_node="">
</span><p data-dcnode-id="5411"><span data-dcnode-id="5415" instrument_node="">There have been accounts of prisoners in Japan that have died under suspicious circumstances </span><a data-dcnode-id="5413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Death_in_custody" title="Death in custody"><span data-dcnode-id="5414" instrument_node="">while in custody</span></a><span data-dcnode-id="5412" instrument_node="">.
</span></p><span data-dcnode-id="5410" instrument_node="">
</span><ul data-dcnode-id="5364"><li data-dcnode-id="5405"><span data-dcnode-id="5409" instrument_node="">On June 20, 1994, Iranian national Arjang Mehrpooran died from unknown causes while in custody for a visa violation at the Minami Senju police station. Allegations have been made that his death was caused by assault.</span><sup class="reference" data-dcnode-id="5406" id="cite_ref-14"><a data-dcnode-id="5407" href="#cite_note-14"><span data-dcnode-id="5408" instrument_node="">[14]</span></a></sup></li><span data-dcnode-id="5404" instrument_node="">
</span><li data-dcnode-id="5399"><span data-dcnode-id="5403" instrument_node="">On August 9, 1997, Mousavi Abarbe Kouh Mir Hossein, an Iranian national, had his neck broken and died while in the custody of the Kita Ward Immigration Detention Center.</span><sup class="reference" data-dcnode-id="5400" id="cite_ref-15"><a data-dcnode-id="5401" href="#cite_note-15"><span data-dcnode-id="5402" instrument_node="">[15]</span></a></sup></li><span data-dcnode-id="5398" instrument_node="">
</span><li data-dcnode-id="5386"><span data-dcnode-id="5397" instrument_node="">In 2001, two </span><a data-dcnode-id="5395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nagoya" title="Nagoya"><span data-dcnode-id="5396" instrument_node="">Nagoya</span></a><span data-dcnode-id="5394" instrument_node=""> prison guards reportedly sprayed a high-power water </span><a class="mw-redirect" data-dcnode-id="5392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hose_%28tubing%29" title="Hose (tubing)"><span data-dcnode-id="5393" instrument_node="">hose</span></a><span data-dcnode-id="5391" instrument_node=""> at an "unruly" inmate's anus, resulting in his death the following day.</span><sup class="reference" data-dcnode-id="5388" id="cite_ref-16"><a data-dcnode-id="5389" href="#cite_note-16"><span data-dcnode-id="5390" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5387" instrument_node=""> In the outcome of his March 2003 trial, the warden was warned to prevent further abuses by his subordinates.</span></li><span data-dcnode-id="5385" instrument_node="">
</span><li data-dcnode-id="5377"><span data-dcnode-id="5384" instrument_node="">In 2002, an inmate at </span><a data-dcnode-id="5382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nagoya" title="Nagoya"><span data-dcnode-id="5383" instrument_node="">Nagoya</span></a><span data-dcnode-id="5381" instrument_node=""> Prison died after guards, as a disciplinary measure, used leather handcuffs and body belts too tightly clinched.</span><sup class="reference" data-dcnode-id="5378" id="cite_ref-17"><a data-dcnode-id="5379" href="#cite_note-17"><span data-dcnode-id="5380" instrument_node="">[17]</span></a></sup></li><span data-dcnode-id="5376" instrument_node="">
</span><li data-dcnode-id="5365"><span data-dcnode-id="5375" instrument_node="">On March 22, 2010, Abubaka Awudu Suraj, a citizen of </span><a data-dcnode-id="5373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ghana" title="Ghana"><span data-dcnode-id="5374" instrument_node="">Ghana</span></a><span data-dcnode-id="5372" instrument_node="">, died while in the custody of the Japanese Immigration Bureau while being deported from Japan.</span><sup class="reference" data-dcnode-id="5369" id="cite_ref-18"><a data-dcnode-id="5370" href="#cite_note-18"><span data-dcnode-id="5371" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="5366" id="cite_ref-19"><a data-dcnode-id="5367" href="#cite_note-19"><span data-dcnode-id="5368" instrument_node="">[19]</span></a></sup></li></ul><span data-dcnode-id="5363" instrument_node="">
</span><p data-dcnode-id="5354"><span data-dcnode-id="5362" instrument_node="">In 2003, Justice Ministry formed a special team to investigate 1,566 prisoner deaths from 1993 to 2002. A preliminary report suggested that nearly one third of the cases involved suspicious circumstances. However, in June, the Ministry announced that there was evidence of abuse only in the two Nagoya fatalities. Regarding the other suspicious deaths, the Ministry said that approximately 10 deaths could be attributed to poor medical care. The authorities reported they had lost the documentation on nine deaths in Tokyo's </span><a data-dcnode-id="5360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fuch%25C5%25AB_Prison" title="Fuchū Prison"><span data-dcnode-id="5361" instrument_node="">Fuchū Prison</span></a><span data-dcnode-id="5359" instrument_node="">. The remaining deaths were determined to be "not suspicious".</span><sup class="reference" data-dcnode-id="5356" id="cite_ref-20"><a data-dcnode-id="5357" href="#cite_note-20"><span data-dcnode-id="5358" instrument_node="">[20]</span></a></sup><span data-dcnode-id="5355" instrument_node="">
</span></p><p data-dcnode-id="5349"><span data-dcnode-id="5353" instrument_node="">As of May 2019, Japan has not signed nor ratified the </span><a class="mw-redirect" data-dcnode-id="5351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optional_Protocol_to_the_Convention_against_Torture_and_other_Cruel%2C_Inhuman_or_Degrading_Treatment_or_Punishment" title="Optional Protocol to the Convention against Torture and other Cruel, Inhuman or Degrading Treatment or Punishment"><span data-dcnode-id="5352" instrument_node="">Optional Protocol to the Convention against Torture and other Cruel, Inhuman or Degrading Treatment or Punishment</span></a><span data-dcnode-id="5350" instrument_node="">.
</span></p><span data-dcnode-id="5348" instrument_node="">
</span><h3 data-dcnode-id="5338"><span class="mw-headline" data-dcnode-id="5346" id="Prison_system"><span data-dcnode-id="5347" instrument_node="">Prison system</span></span><span class="mw-editsection" data-dcnode-id="5339"><span class="mw-editsection-bracket" data-dcnode-id="5344"><span data-dcnode-id="5345" instrument_node="">[</span></span><a data-dcnode-id="5342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D5" title="Edit section: Prison system"><span data-dcnode-id="5343" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5340"><span data-dcnode-id="5341" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5337" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="5331" role="note"><span data-dcnode-id="5334" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="5332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prisons_in_Japan" title="Prisons in Japan"><span data-dcnode-id="5333" instrument_node="">Prisons in Japan</span></a></div><span data-dcnode-id="5330" instrument_node="">

316" instrument_node=""> by </span><a data-dcnode-id="5314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="5315" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="5313" instrument_node="">. Unsourced material may be challenged and removed.</span><br data-dcnode-id="5312"><small data-dcnode-id="5278"><span class="plainlinks" data-dcnode-id="5279"><i data-dcnode-id="5310"><span data-dcnode-id="5311" instrument_node="">Find sources:</span></i><span data-dcnode-id="5309" instrument_node="">&nbsp;</span><a class="external text" data-dcnode-id="5307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/search%3Fas_eq%3Dwikipedia%26q%3D%2522Human%2Brights%2Bin%2BJapan%2522" rel="nofollow"><span data-dcnode-id="5308" instrument_node="">"Human rights in Japan"</span></a><span data-dcnode-id="5306" instrument_node="">&nbsp;–&nbsp;</span><a class="external text" data-dcnode-id="5304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/search%3Ftbm%3Dnws%26q%3D%2522Human%2Brights%2Bin%2BJapan%2522%2B-wikipedia%26tbs%3Dar%3A1" rel="nofollow"><span data-dcnode-id="5305" instrument_node="">news</span></a><span data-dcnode-id="5303" instrument_node="">&nbsp;</span><b data-dcnode-id="5301"><span data-dcnode-id="5302" instrument_node="">·</span></b><span data-dcnode-id="5300" instrument_node=""> </span><a class="external text" data-dcnode-id="5298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/search%3F%26q%3D%2522Human%2Brights%2Bin%2BJapan%2522%26tbs%3Dbkt%3As%26tbm%3Dbks" rel="nofollow"><span data-dcnode-id="5299" instrument_node="">newspapers</span></a><span data-dcnode-id="5297" instrument_node="">&nbsp;</span><b data-dcnode-id="5295"><span data-dcnode-id="5296" instrument_node="">·</span></b><span data-dcnode-id="5294" instrument_node=""> </span><a class="external text" data-dcnode-id="5292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/search%3Ftbs%3Dbks%3A1%26q%3D%2522Human%2Brights%2Bin%2BJapan%2522%2B-wikipedia" rel="nofollow"><span data-dcnode-id="5293" instrument_node="">books</span></a><span data-dcnode-id="5291" instrument_node="">&nbsp;</span><b data-dcnode-id="5289"><span data-dcnode-id="5290" instrument_node="">·</span></b><span data-dcnode-id="5288" instrument_node=""> </span><a class="external text" data-dcnode-id="5286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3D%2522Human%2Brights%2Bin%2BJapan%2522" rel="nofollow"><span data-dcnode-id="5287" instrument_node="">scholar</span></a><span data-dcnode-id="5285" instrument_node="">&nbsp;</span><b data-dcnode-id="5283"><span data-dcnode-id="5284" instrument_node="">·</span></b><span data-dcnode-id="5282" instrument_node=""> </span><a class="external text" data-dcnode-id="5280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/action/doBasicSearch%3FQuery%3D%2522Human%2Brights%2Bin%2BJapan%2522%26acc%3Don%26wc%3Don" rel="nofollow"><span data-dcnode-id="5281" instrument_node="">JSTOR</span></a></span></small></span><span data-dcnode-id="5276" instrument_node=""> </span><span class="date-container" data-dcnode-id="5270"><i data-dcnode-id="5271"><span data-dcnode-id="5275" instrument_node="">(</span><span class="date" data-dcnode-id="5273"><span data-dcnode-id="5274" instrument_node="">March 2019</span></span><span data-dcnode-id="5272" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="5263"><i data-dcnode-id="5264"><span data-dcnode-id="5269" instrument_node=""> (</span><small data-dcnode-id="5266"><a data-dcnode-id="5267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="5268" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="5265" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="5257" instrument_node="">
</span><p data-dcnode-id="5247"><span data-dcnode-id="5256" instrument_node="">Prison conditions met international standards;</span><sup class="reference" data-dcnode-id="5253" id="cite_ref-21"><a data-dcnode-id="5254" href="#cite_note-21"><span data-dcnode-id="5255" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5252" instrument_node=""> although some lacked adequate medical care and sufficient heating in the winter or cooling in the summer and some facilities were overcrowded. Prisoners were not allowed to purchase or receive supplementary food. While death records are kept for 10 years, many of them were missing, which sparked an ongoing review of the prison system. Prisons operated at an average 117% capacity.</span><sup class="reference" data-dcnode-id="5249" id="cite_ref-22"><a data-dcnode-id="5250" href="#cite_note-22"><span data-dcnode-id="5251" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5248" instrument_node=""> In some institutions, two inmates were placed in cells designed for one inmate, and thirty or sixty in cells meant for 15.
</span></p><p data-dcnode-id="5239"><span data-dcnode-id="5246" instrument_node="">According to prison officials at </span><a class="mw-redirect" data-dcnode-id="5244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fuchu" title="Fuchu"><span data-dcnode-id="5245" instrument_node="">Fuchu</span></a><span data-dcnode-id="5243" instrument_node=""> and </span><a data-dcnode-id="5241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yokohama" title="Yokohama"><span data-dcnode-id="5242" instrument_node="">Yokohama</span></a><span data-dcnode-id="5240" instrument_node=""> prisons, medical attention was inadequate. The MOJ's Corrections Bureau likewise acknowledged that correctional facilities lacked medical preparedness. The Government's Project Team on Medical Issues of Correctional Institutions continued to consult with related organizations on such issues as increasing medical staff, upgrading medical conditions during nights and weekends, and strengthening cooperative relationships with medical institutions in the community. In May, the Minister formed a subcommittee to improve prison medical facilities.
</span></p><p data-dcnode-id="5230"><span data-dcnode-id="5238" instrument_node="">In some institutions clothing and blankets were insufficient to protect inmates against cold weather. Most prisons did not provide heating during nighttime hours in winter despite freezing temperatures, subjecting inmates to a range of preventable cold injuries. Foreign prisoners in the Tokyo area continued to present to visiting diplomats during the year  fingers and toes affected by </span><a class="mw-redirect" data-dcnode-id="5236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chillblain" title="Chillblain"><span data-dcnode-id="5237" instrument_node="">chillblains</span></a><span data-dcnode-id="5235" instrument_node=""> of varying severity, the direct result of long-term exposure to cold.</span><sup class="reference" data-dcnode-id="5232" id="cite_ref-23"><a data-dcnode-id="5233" href="#cite_note-23"><span data-dcnode-id="5234" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5231" instrument_node="">
</span></p><p data-dcnode-id="5222"><span data-dcnode-id="5229" instrument_node="">According to the </span><a class="new" data-dcnode-id="5227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DJapan_Federation_of_Bar_Associations%26action%3Dedit%26redlink%3D1" title="Japan Federation of Bar Associations (page does not exist)"><span data-dcnode-id="5228" instrument_node="">Japan Federation of Bar Associations</span></a><span data-dcnode-id="5226" instrument_node="">, the authorities are permitted to read letters sent or received by prisoners and they are not required to disclose this practice to prisoners. If the content is deemed "inappropriate", the letter may be </span><a data-dcnode-id="5224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Censorship" title="Censorship"><span data-dcnode-id="5225" instrument_node="">censored</span></a><span data-dcnode-id="5223" instrument_node=""> or confiscated. All visits with convicted prisoners were monitored; however, prisoners whose cases were pending were allowed private access to their legal representatives.
</span></p><p data-dcnode-id="5220"><span data-dcnode-id="5221" instrument_node="">The MOJ is not required to inform a condemned inmate's family prior to the person's execution. Human rights organizations reported that lawyers also were not told of an execution until after the fact and that death row prisoners were held for years in solitary confinement with little contact with anyone but prison guards. Parole may not be granted for any reason, including medical and humanitarian reasons, until an inmate has served two thirds of his or her sentence.
</span></p><p data-dcnode-id="5215"><span data-dcnode-id="5219" instrument_node="">The JFBA and human rights groups have criticized the prison system, with its emphasis on strict discipline and obedience to numerous rules. Prison rules remained confidential. While the </span><a class="new" data-dcnode-id="5217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrison_Law_Enforcement_Regulation%26action%3Dedit%26redlink%3D1" title="Prison Law Enforcement Regulation (page does not exist)"><span data-dcnode-id="5218" instrument_node="">Prison Law Enforcement Regulation</span></a><span data-dcnode-id="5216" instrument_node=""> stipulates that the maximum time prisoners may be held in single cells is 6 months, activists claim that wardens continued to have broad leeway in enforcing punishments selectively, including "minor solitary confinement", which may be imposed for a minimum of 1 and not more than 60 days. Claims have also been made that prisoners were sometimes forced to kneel motionless in an empty cell for several hours at a time; however, foreigners and the handicapped were allowed to sit on a hard stool, at the discretion of the prison warden.
</span></p><p data-dcnode-id="5196"><span data-dcnode-id="5214" instrument_node="">In December,</span><sup class="noprint Inline-Template" data-dcnode-id="5207" style="white-space:nowrap;"><span data-dcnode-id="5213" instrument_node="">[</span><i data-dcnode-id="5209"><a data-dcnode-id="5210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Dates_and_numbers%23Chronological_items" title="Wikipedia:Manual of Style/Dates and numbers"><span data-dcnode-id="5211" title="The time period mentioned near this tag is ambiguous. (March 2019)"><span data-dcnode-id="5212" instrument_node="">when?</span></span></a></i><span data-dcnode-id="5208" instrument_node="">]</span></sup><span data-dcnode-id="5206" instrument_node=""> the </span><a class="mw-redirect" data-dcnode-id="5204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Councillors" title="House of Councillors"><span data-dcnode-id="5205" instrument_node="">Upper House</span></a><span data-dcnode-id="5203" instrument_node=""> passed both a </span><a class="new" data-dcnode-id="5201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrime-Victims_law%26action%3Dedit%26redlink%3D1" title="Crime-Victims law (page does not exist)"><span data-dcnode-id="5202" instrument_node="">Crime-Victims law</span></a><span data-dcnode-id="5200" instrument_node=""> and a revision to the 1908 </span><a class="new" data-dcnode-id="5198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrison_Law%26action%3Dedit%26redlink%3D1" title="Prison Law (page does not exist)"><span data-dcnode-id="5199" instrument_node="">Prison Law</span></a><span data-dcnode-id="5197" instrument_node="">. The Crime-Victims law calls for compensation and counseling for crime victims, upholding victims' rights, and providing victims with criminal investigation information. Aimed at toughening penalties against felons, the Penal Code revision establishes new charges for gang rape, increases maximum prison terms and penalties for life-threatening crimes, and extends the statute of limitations for prosecuting capital offenses from 15 to 29 years.
</span></p><p data-dcnode-id="5184"><span data-dcnode-id="5195" instrument_node="">In February 2003, the government ratified the </span><a data-dcnode-id="5193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_on_the_Transfer_of_Sentenced_Persons" title="Convention on the Transfer of Sentenced Persons"><span data-dcnode-id="5194" instrument_node="">Convention on the Transfer of Sentenced Persons</span></a><span data-dcnode-id="5192" instrument_node="">, allowing foreign prisoners to petition to serve their sentences in their home country. The government added the stipulation that prisoners must serve at least one third of their sentence in Japan before petitions will be considered. As of June 2007, 10 American prisoners have been transferred to the </span><a data-dcnode-id="5190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="5191" instrument_node="">United States</span></a><span data-dcnode-id="5189" instrument_node=""> to complete their sentences.</span><sup class="reference" data-dcnode-id="5186" id="cite_ref-24"><a data-dcnode-id="5187" href="#cite_note-24"><span data-dcnode-id="5188" instrument_node="">[24]</span></a></sup><span data-dcnode-id="5185" instrument_node="">
</span></p><p data-dcnode-id="5182"><span data-dcnode-id="5183" instrument_node="">Women and juveniles were housed separately from men; however, male prison guards sometimes guarded female prisoners. During the year, a male prison warden was charged with "violence and cruelty by a special public officer" for engaging in sexual acts with a female inmate awaiting trial. During the year, some women's detention facilities were operating over stated capacity. Pretrial detainees were held separately from convicted prisoners.
</span></p><p data-dcnode-id="5173"><span data-dcnode-id="5181" instrument_node="">While the government limited access by human rights groups to detention facilities, prison visits were allowed. However, </span><a data-dcnode-id="5179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amnesty_International" title="Amnesty International"><span data-dcnode-id="5180" instrument_node="">Amnesty International</span></a><span data-dcnode-id="5178" instrument_node=""> claimed that human rights groups were not allowed access to Nagoya prison because of ongoing court cases related to alleged abuses.</span><sup class="reference" data-dcnode-id="5175" id="cite_ref-25"><a data-dcnode-id="5176" href="#cite_note-25"><span data-dcnode-id="5177" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5174" instrument_node="">
</span></p><span data-dcnode-id="5172" instrument_node="">
</span><h3 data-dcnode-id="5162"><span class="mw-headline" data-dcnode-id="5170" id="Prohibition_of_arbitrary_arrest_or_detention"><span data-dcnode-id="5171" instrument_node="">Prohibition of arbitrary arrest or detention</span></span><span class="mw-editsection" data-dcnode-id="5163"><span class="mw-editsection-bracket" data-dcnode-id="5168"><span data-dcnode-id="5169" instrument_node="">[</span></span><a data-dcnode-id="5166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D6" title="Edit section: Prohibition of arbitrary arrest or detention"><span data-dcnode-id="5167" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5164"><span data-dcnode-id="5165" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5161" instrument_node="">
</span><p data-dcnode-id="5156"><span data-dcnode-id="5160" instrument_node="">The Constitution prohibits </span><a data-dcnode-id="5158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arbitrary_arrest_and_detention" title="Arbitrary arrest and detention"><span data-dcnode-id="5159" instrument_node="">arbitrary arrest and detention</span></a><span data-dcnode-id="5157" instrument_node="">, and the Government generally observes these prohibitions. The law provides for judicial determination of the legality of detention. Persons may not be detained without charge, and prosecuting authorities must be prepared to demonstrate that probable cause exists to detain the accused. Under the law, a suspect may be held in detention at either a regular detention facility or "substitute" (police) detention facility for up to 72 hours. A judge must interview suspects prior to detention. A judge may extend preindictment custody by up to two consecutive 10-day periods based on a prosecutor's application. These extensions were sought and granted routinely. Under extraordinary circumstances, prosecutors may seek an additional 5-day extension, bringing the maximum period of preindictment custody to 28 days.
</span></p><p data-dcnode-id="5148"><span data-dcnode-id="5155" instrument_node="">The </span><a class="new" data-dcnode-id="5153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNational_Police_Safety_Commission%26action%3Dedit%26redlink%3D1" title="National Police Safety Commission (page does not exist)"><span data-dcnode-id="5154" instrument_node="">National Police Safety Commission</span></a><span data-dcnode-id="5152" instrument_node=""> oversees the </span><a data-dcnode-id="5150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Police_Agency_%28Japan%29" title="National Police Agency (Japan)"><span data-dcnode-id="5151" instrument_node="">National Police Agency</span></a><span data-dcnode-id="5149" instrument_node=""> (NPA). In addition, each prefecture has a prefectural police safety commission as well as a prefectural police agency, which was primarily funded by the prefecture's budget. Corruption and impunity were not problems within either the national or the prefectural police forces.
</span></p><p data-dcnode-id="5143"><span data-dcnode-id="5147" instrument_node="">Under the </span><a class="mw-redirect" data-dcnode-id="5145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Criminal_Procedure_Code" title="Criminal Procedure Code"><span data-dcnode-id="5146" instrument_node="">Criminal Procedure Code</span></a><span data-dcnode-id="5144" instrument_node="">, police and prosecutors have the power to control or limit access by legal counsel when deemed necessary for the sake of an investigation. Counsel may not be present during interrogations at any time before or after indictment. As a court-appointed attorney is not approved until after indictment, suspects must rely on their own resources to hire an attorney before indictment, although local bar associations provided detainees with limited free counseling. Critics charged that access to counsel was limited both in duration and frequency; however, the Government denied that this was the case. Incommunicado detention could be used for up to 23 days.
</span></p><p data-dcnode-id="5141"><span data-dcnode-id="5142" instrument_node="">Critics charged that allowing suspects to be detained by the same authorities who interrogated them heightened the potential for abuse and coercion. The Government countered that cases of persons sent to police detention facilities tended to be those in which the facts were not in dispute. An MOJ regulation permits officials to limit the amount of documentation related to ongoing court cases retained by prisoners.
</span></p><p data-dcnode-id="5132"><span data-dcnode-id="5140" instrument_node="">The </span><a class="new" data-dcnode-id="5138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DLaw_for_Expediting_Court_Procedure%26action%3Dedit%26redlink%3D1" title="Law for Expediting Court Procedure (page does not exist)"><span data-dcnode-id="5139" instrument_node="">Law for Expediting Court Procedure</span></a><span data-dcnode-id="5137" instrument_node=""> became effective in 2003. The average trial period in 2005 was 3.2 months for criminal cases</span><sup class="reference" data-dcnode-id="5134" id="cite_ref-HR2006_26-0"><a data-dcnode-id="5135" href="#cite_note-HR2006-26"><span data-dcnode-id="5136" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5133" instrument_node=""> and 8.2 months for civil cases. The length of time before a suspect was brought to trial depended on the nature of the crime, but rarely exceeded 3 months from the date of arrest; the average was 1 to 2 months.
</span></p><span data-dcnode-id="5131" instrument_node="">
</span><h3 data-dcnode-id="5121"><span class="mw-headline" data-dcnode-id="5129" id="Trials"><span data-dcnode-id="5130" instrument_node="">Trials</span></span><span class="mw-editsection" data-dcnode-id="5122"><span class="mw-editsection-bracket" data-dcnode-id="5127"><span data-dcnode-id="5128" instrument_node="">[</span></span><a data-dcnode-id="5125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D7" title="Edit section: Trials"><span data-dcnode-id="5126" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5123"><span data-dcnode-id="5124" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5120" instrument_node="">
</span><link data-dcnode-id="5119" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5115" role="note"><span data-dcnode-id="5118" instrument_node="">See also: </span><a data-dcnode-id="5116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Judicial_system_of_Japan" title="Judicial system of Japan"><span data-dcnode-id="5117" instrument_node="">Judicial system of Japan</span></a></div><span data-dcnode-id="5114" instrument_node="">
</span><p data-dcnode-id="5109"><span data-dcnode-id="5113" instrument_node="">The Constitution provides for an independent judiciary, and the Government has generally respected this provision in practice. The Cabinet appoints judges for 10-year terms, which can be renewed until judges reach the age of 65. Justices of the </span><a data-dcnode-id="5111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Court_of_Japan" title="Supreme Court of Japan"><span data-dcnode-id="5112" instrument_node="">Supreme Court</span></a><span data-dcnode-id="5110" instrument_node=""> can serve until the age of 70, but face periodic review through popular referendums.
</span></p><p data-dcnode-id="5101"><span data-dcnode-id="5108" instrument_node="">There are several levels of court, including high courts, district courts, family courts, and summary courts, with the Supreme Court serving as the final court of appeal. Normally a trial begins at the district court level, and a verdict may be appealed to a higher court, and ultimately, to the Supreme Court. The government generally respected in practice the constitutional provisions for the right to a </span><a data-dcnode-id="5106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Speedy_trial" title="Speedy trial"><span data-dcnode-id="5107" instrument_node="">speedy</span></a><span data-dcnode-id="5105" instrument_node=""> and </span><a data-dcnode-id="5103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_trial" title="Public trial"><span data-dcnode-id="5104" instrument_node="">public trial</span></a><span data-dcnode-id="5102" instrument_node=""> by an impartial tribunal in all criminal cases. Although most criminal trials were completed within a reasonable length of time, cases occasionally took several years to work their way through the trial and appeals process.
</span></p><p data-dcnode-id="5095"><span data-dcnode-id="5100" instrument_node="">In July 2003, the Diet passed legislation aimed at reducing the average time required to complete criminal trials and civil trials that include witness examination. Its provisions include hiring substantial numbers of additional court and MOJ personnel, revising bar examinations, establishing new graduate law schools to increase the overall number of legal professionals threefold by 2010, and requiring that courts and opposing litigants jointly work to improve trial planning by allowing for earlier evidence collection and disclosure. The advisory panel on judicial reform released the official standards for setting up graduate law schools, and in March 2004, 68 universities (22 public and 46 private) opened new law schools.</span><sup class="reference" data-dcnode-id="5097" id="cite_ref-HR2004_27-0"><a data-dcnode-id="5098" href="#cite_note-HR2004-27"><span data-dcnode-id="5099" instrument_node="">[27]</span></a></sup><span data-dcnode-id="5096" instrument_node="">
</span></p><p data-dcnode-id="5093"><span data-dcnode-id="5094" instrument_node="">The July 2003, law also makes the Supreme Court responsible for accelerating proceedings in lower courts, imposes a 2-year time limit for courts to bring criminal and civil trials to conclusion, and requires the government to take the legal and financial measures necessary to accomplish these goals. A defendant is informed of the charges upon arrest and is assured a public trial by an independent civilian court with defense counsel and the right of cross-examination. There was no trial by jury; however, a judicial reform bill passed in May will allow serious criminal cases to be tried by a six-person, randomly selected jury and panel of judges. The law was scheduled to take effect in 2009.
</span></p><p data-dcnode-id="5091"><span data-dcnode-id="5092" instrument_node="">The defendant is presumed innocent. The Constitution provides defendants with the right not to be compelled to testify against themselves as well as to free and private access to counsel; however, the Government contended that the right to consult with attorneys is not absolute and can be restricted if such restriction is compatible with the spirit of the Constitution. Access sometimes was abridged in practice; for example, the law allows prosecutors to control access to counsel before indictment, and there were allegations of coerced confessions. Defendants are protected from the retroactive application of laws and have the right of access to incriminating evidence after a formal indictment. However, the law does not require full disclosure by prosecutors, and material that the prosecution does not use in court may be suppressed. Critics claimed that legal representatives of defendants did not always have access to all needed relevant material in the police record. A defendant who is dissatisfied with the decision of a trial court of first instance may appeal to a higher court.
</span></p><p data-dcnode-id="5089"><span data-dcnode-id="5090" instrument_node="">No guidelines mandate the acceptable quality of communications between judges, lawyers, and non-Japanese speaking defendants, and no standard licensing or qualification system for certifying court interpreters exists. A trial may proceed even if the accused does not understand what is happening or being said. Foreign detainees frequently claimed that police urged them to sign statements in Japanese that they could not read and were not translated adequately.
</span></p><p data-dcnode-id="5081"><span data-dcnode-id="5088" instrument_node="">As of May 2019, Japan has not signed nor ratified the </span><a data-dcnode-id="5086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Optional_Protocol_to_the_International_Covenant_on_Civil_and_Political_Rights" title="First Optional Protocol to the International Covenant on Civil and Political Rights"><span data-dcnode-id="5087" instrument_node="">First Optional Protocol to the International Covenant on Civil and Political Rights</span></a><span data-dcnode-id="5085" instrument_node=""> and </span><a data-dcnode-id="5083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Optional_Protocol_to_the_International_Covenant_on_Civil_and_Political_Rights" title="Second Optional Protocol to the International Covenant on Civil and Political Rights"><span data-dcnode-id="5084" instrument_node="">Second Optional Protocol to the International Covenant on Civil and Political Rights</span></a><span data-dcnode-id="5082" instrument_node="">.
</span></p><p data-dcnode-id="5079"><span data-dcnode-id="5080" instrument_node="">There were no reports of political prisoners.
</span></p><span data-dcnode-id="5078" instrument_node="">
</span><h3 data-dcnode-id="5068"><span class="mw-headline" data-dcnode-id="5076" id="Other_issues"><span data-dcnode-id="5077" instrument_node="">Other issues</span></span><span class="mw-editsection" data-dcnode-id="5069"><span class="mw-editsection-bracket" data-dcnode-id="5074"><span data-dcnode-id="5075" instrument_node="">[</span></span><a data-dcnode-id="5072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D8" title="Edit section: Other issues"><span data-dcnode-id="5073" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5070"><span data-dcnode-id="5071" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5067" instrument_node="">
</span><ul data-dcnode-id="5025"><li data-dcnode-id="5038"><span data-dcnode-id="5066" instrument_node="">The Constitution does not prohibit arbitrary interference with </span><a data-dcnode-id="5064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Privacy" title="Privacy"><span data-dcnode-id="5065" instrument_node="">privacy</span></a><span data-dcnode-id="5063" instrument_node="">, family, home, or correspondence but prohibit them by </span><a data-dcnode-id="5061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Case_law" title="Case law"><span data-dcnode-id="5062" instrument_node="">case law</span></a><span data-dcnode-id="5060" instrument_node=""> on interpretation on Article 13 of the Constitution, and the government generally respects these prohibitions in practice.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5053" style="white-space:nowrap;"><span data-dcnode-id="5059" instrument_node="">[</span><i data-dcnode-id="5055"><a data-dcnode-id="5056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5057" title="This claim needs references to reliable sources. (May 2007)"><span data-dcnode-id="5058" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5054" instrument_node="">]</span></sup><span data-dcnode-id="5052" instrument_node=""> In April 2003, the Public Security Investigation Agency extended surveillance of the terrorist group Aleph (formerly known as </span><a data-dcnode-id="5050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aum_Shinrikyo" title="Aum Shinrikyo"><span data-dcnode-id="5051" instrument_node="">Aum Shinrikyo</span></a><span data-dcnode-id="5049" instrument_node="">) because the government declared the group still posed a danger to society. In 2002, the </span><a data-dcnode-id="5047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Defense_%28Japan%29" title="Ministry of Defense (Japan)"><span data-dcnode-id="5048" instrument_node="">Defense Agency</span></a><span data-dcnode-id="5046" instrument_node=""> confirmed reports that it had violated a law protecting personal information when it compiled lists of citizens seeking official documents. A privacy bill to prevent such actions passed the Diet on May 2, 2003.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5039" style="white-space:nowrap;"><span data-dcnode-id="5045" instrument_node="">[</span><i data-dcnode-id="5041"><a data-dcnode-id="5042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5043" title="This claim needs references to reliable sources. (June 2021)"><span data-dcnode-id="5044" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5040" instrument_node="">]</span></sup></li><span data-dcnode-id="5037" instrument_node="">
</span><li data-dcnode-id="5035"><span data-dcnode-id="5036" instrument_node="">The government's attitude regarding international and nongovernmental investigation of alleged violations of human rights is generally cooperative and responsive to human rights groups' views, although the government restricts their access to detention facilities. A number of domestic and international human rights groups generally operated without governmental restrictions, investigating and publishing their findings on human rights cases. Government officials generally were cooperative and responsive to their views, although the Government restricted access by human rights groups to detention facilities.</span></li><span data-dcnode-id="5034" instrument_node="">
</span><li data-dcnode-id="5026"><span data-dcnode-id="5033" instrument_node="">In December 2008 </span><a data-dcnode-id="5031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Human_Rights_Committee" title="United Nations Human Rights Committee"><span data-dcnode-id="5032" instrument_node="">United Nations Human Rights Committee</span></a><span data-dcnode-id="5030" instrument_node=""> gave a recommendation to Japan relating to public welfare in Article 12 and 13 of the Constitution that "while taking note of the State party's explanation that 'public welfare' cannot be relied on as a ground on placing arbitrary restrictions on human rights, the Committee reiterate its concern that the concept of 'public welfare' is vague and open-ended and may permit restrictions exceeding those permissible under the Covenant (art. 2)."</span><sup class="reference" data-dcnode-id="5027" id="cite_ref-28"><a data-dcnode-id="5028" href="#cite_note-28"><span data-dcnode-id="5029" instrument_node="">[28]</span></a></sup></li></ul><span data-dcnode-id="5024" instrument_node="">
</span><h2 data-dcnode-id="5014"><span class="mw-headline" data-dcnode-id="5022" id="Civil_liberties"><span data-dcnode-id="5023" instrument_node="">Civil liberties</span></span><span class="mw-editsection" data-dcnode-id="5015"><span class="mw-editsection-bracket" data-dcnode-id="5020"><span data-dcnode-id="5021" instrument_node="">[</span></span><a data-dcnode-id="5018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D9" title="Edit section: Civil liberties"><span data-dcnode-id="5019" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5016"><span data-dcnode-id="5017" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5013" instrument_node="">
</span><h3 data-dcnode-id="5003"><span class="mw-headline" data-dcnode-id="5011" id="Freedom_of_speech_and_of_the_press"><span data-dcnode-id="5012" instrument_node="">Freedom of speech and of the press</span></span><span class="mw-editsection" data-dcnode-id="5004"><span class="mw-editsection-bracket" data-dcnode-id="5009"><span data-dcnode-id="5010" instrument_node="">[</span></span><a data-dcnode-id="5007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D10" title="Edit section: Freedom of speech and of the press"><span data-dcnode-id="5008" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5005"><span data-dcnode-id="5006" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5002" instrument_node="">
</span><link data-dcnode-id="5001" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4997" role="note"><span data-dcnode-id="5000" instrument_node="">See also: </span><a data-dcnode-id="4998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Censorship_in_Japan" title="Censorship in Japan"><span data-dcnode-id="4999" instrument_node="">Censorship in Japan</span></a></div><span data-dcnode-id="4996" instrument_node="">
</span><p data-dcnode-id="4985"><span data-dcnode-id="4995" instrument_node="">The </span><a data-dcnode-id="4993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_Japan%23Individual_rights_%28Articles_10%25E2%2580%259340%29" title="Constitution of Japan"><span data-dcnode-id="4994" instrument_node="">Japanese Constitution</span></a><span data-dcnode-id="4992" instrument_node=""> provides for freedom of speech and of the press. In theory, an independent press, an effective judiciary, and a functioning democratic political system combine to ensure freedom of speech and of the press. However, Japan's system of exclusive </span><a data-dcnode-id="4990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kisha_club" title="Kisha club"><span data-dcnode-id="4991" instrument_node="">press clubs</span></a><span data-dcnode-id="4989" instrument_node=""> has been criticised by press freedom groups. The clubs often provide major media outlets with exclusive access to news sources, while generally barring foreign and freelance reporters. The clubs provide the establishment press with access to official press conferences and background briefings with politicians, lawyers and business leaders. Critics say the club system allows the authorities to </span><a data-dcnode-id="4987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Censorship" title="Censorship"><span data-dcnode-id="4988" instrument_node="">suppress</span></a><span data-dcnode-id="4986" instrument_node=""> news that they consider unfavorable to them and that it lowers the quality of news coverage.
</span></p><p data-dcnode-id="4983"><span data-dcnode-id="4984" instrument_node="">Free speech and press issues include:
</span></p><span data-dcnode-id="4982" instrument_node="">
</span><ul data-dcnode-id="4954"><li data-dcnode-id="4980"><span data-dcnode-id="4981" instrument_node="">In July 2003, the Diet passed legislation prohibiting the solicitation of sex from minors through the Internet. The Japan Internet Providers Association and the Telecom Services Association expressed concerns about the definitions of child prohibited sites and about the actions providers are required to take to prevent illegal use of Internet sites.</span></li><span data-dcnode-id="4979" instrument_node="">
</span><li data-dcnode-id="4955"><span data-dcnode-id="4978" instrument_node="">In 2015 journalists and political experts report that the government of Prime Minister </span><a class="mw-redirect" data-dcnode-id="4976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shinz%25C5%258D_Abe" title="Shinzō Abe"><span data-dcnode-id="4977" instrument_node="">Shinzō Abe</span></a><span data-dcnode-id="4975" instrument_node=""> is engineering a fundamental shift in the balance of power between his administration and the news media, using tactics to silence criticism that go beyond anything his predecessors tried.</span><sup class="reference" data-dcnode-id="4972" id="cite_ref-29"><a data-dcnode-id="4973" href="#cite_note-29"><span data-dcnode-id="4974" instrument_node="">[29]</span></a></sup><span data-dcnode-id="4971" instrument_node=""> These include:
</span><ul data-dcnode-id="4956"><li data-dcnode-id="4969"><span data-dcnode-id="4970" instrument_node="">more aggressive complaints to the bosses of critical journalists and commentators, causing some reporters and commentators to lose their jobs;</span></li><span data-dcnode-id="4968" instrument_node="">
</span><li data-dcnode-id="4966"><span data-dcnode-id="4967" instrument_node="">more blatant retaliation against outlets that persist in faulting the administration;</span></li><span data-dcnode-id="4965" instrument_node="">
</span><li data-dcnode-id="4960"><span data-dcnode-id="4964" instrument_node="">appointing a new chairman to the national public broadcaster, </span><a data-dcnode-id="4962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NHK" title="NHK"><span data-dcnode-id="4963" instrument_node="">NHK</span></a><span data-dcnode-id="4961" instrument_node="">, who declared that the network will not deviate too far from the government's views; and</span></li><span data-dcnode-id="4959" instrument_node="">
</span><li data-dcnode-id="4957"><span data-dcnode-id="4958" instrument_node="">openly hinting at revoking the broadcasting licenses of overly critical networks under a law that requires that TV news reports not intentionally twist facts.</span></li></ul></li></ul><span data-dcnode-id="4953" instrument_node="">
</span><p data-dcnode-id="4948"><span data-dcnode-id="4952" instrument_node="">Journalists, commentators and media experts say that news outlets are now </span><a data-dcnode-id="4950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-censorship" title="Self-censorship"><span data-dcnode-id="4951" instrument_node="">censoring their own coverage</span></a><span data-dcnode-id="4949" instrument_node=""> or removing critical voices to avoid drawing official ire.
</span></p><p data-dcnode-id="4931"><span data-dcnode-id="4947" instrument_node="">Under Article 4 of the Broadcasting Law, Japanese television broadcasting requires political fairness, and there are penalties such as license revocation. This law has existed since before the Abe administration. The license revocation issue was an answer to the opposition party's question on the Broadcasting law.</span><sup class="reference" data-dcnode-id="4944" id="cite_ref-30"><a data-dcnode-id="4945" href="#cite_note-30"><span data-dcnode-id="4946" instrument_node="">[30]</span></a></sup><span data-dcnode-id="4943" instrument_node=""> However, Japanese media strongly opposed this.
</span><a class="mw-redirect" data-dcnode-id="4941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UNCHR" title="UNCHR"><span data-dcnode-id="4942" instrument_node="">UNCHR</span></a><span data-dcnode-id="4940" instrument_node=""> calls for the removal of Article 4,</span><sup class="reference" data-dcnode-id="4937" id="cite_ref-31"><a data-dcnode-id="4938" href="#cite_note-31"><span data-dcnode-id="4939" instrument_node="">[31]</span></a></sup><span data-dcnode-id="4936" instrument_node=""> but many Japanese media strongly oppose the removal of Article 4.</span><sup class="reference" data-dcnode-id="4933" id="cite_ref-32"><a data-dcnode-id="4934" href="#cite_note-32"><span data-dcnode-id="4935" instrument_node="">[32]</span></a></sup><span data-dcnode-id="4932" instrument_node="">
</span></p><p data-dcnode-id="4920"><a data-dcnode-id="4929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ichiro_Furutachi" title="Ichiro Furutachi"><span data-dcnode-id="4930" instrument_node="">Ichiro Furutachi</span></a><span data-dcnode-id="4928" instrument_node=""> is a journalist who lost his job. He told </span><a data-dcnode-id="4926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sankei_Shimbun" title="Sankei Shimbun"><span data-dcnode-id="4927" instrument_node="">Sankei Shimbun</span></a><span data-dcnode-id="4925" instrument_node="">, “The administration is not putting pressure,” “If our report is lie, our program will be crushed, so there is a self-regulation to make a safe report afraid of it.”</span><sup class="reference" data-dcnode-id="4922" id="cite_ref-33"><a data-dcnode-id="4923" href="#cite_note-33"><span data-dcnode-id="4924" instrument_node="">[33]</span></a></sup><span data-dcnode-id="4921" instrument_node="">
</span></p><span data-dcnode-id="4919" instrument_node="">
</span><h4 data-dcnode-id="4909"><span class="mw-headline" data-dcnode-id="4917" id="Internet_freedom"><span data-dcnode-id="4918" instrument_node="">Internet freedom</span></span><span class="mw-editsection" data-dcnode-id="4910"><span class="mw-editsection-bracket" data-dcnode-id="4915"><span data-dcnode-id="4916" instrument_node="">[</span></span><a data-dcnode-id="4913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D11" title="Edit section: Internet freedom"><span data-dcnode-id="4914" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4911"><span data-dcnode-id="4912" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4908" instrument_node="">
</span><link data-dcnode-id="4907" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4903" role="note"><span data-dcnode-id="4906" instrument_node="">Further information: </span><a data-dcnode-id="4904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internet_in_Japan%23Internet_censorship_and_surveillance" title="Internet in Japan"><span data-dcnode-id="4905" instrument_node="">Internet in Japan §&nbsp;Internet censorship and surveillance</span></a></div><span data-dcnode-id="4902" instrument_node="">
</span><p data-dcnode-id="4898"><a data-dcnode-id="4900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_House" title="Freedom House"><span data-dcnode-id="4901" instrument_node="">Freedom House</span></a><span data-dcnode-id="4899" instrument_node=""> rated Japan's Internet access as “free” with scores as low as 22.
</span></p><p data-dcnode-id="4875"><span data-dcnode-id="4897" instrument_node="">Internet access in Japan is absolutely unrestricted. There are neither government restrictions on Internet access nor reports that the government checks on </span><a class="mw-redirect" data-dcnode-id="4895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/E-mail" title="E-mail"><span data-dcnode-id="4896" instrument_node="">e-mail</span></a><span data-dcnode-id="4894" instrument_node=""> or Internet </span><a class="mw-redirect" data-dcnode-id="4892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chat_rooms" title="Chat rooms"><span data-dcnode-id="4893" instrument_node="">chat rooms</span></a><span data-dcnode-id="4891" instrument_node=""> without appropriate legal authority in the country. The constitution and law broadly protects </span><a class="mw-redirect" data-dcnode-id="4889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_expression" title="Free expression"><span data-dcnode-id="4890" instrument_node="">free expression</span></a><span data-dcnode-id="4888" instrument_node="">, and the government respects this right in practice. The government does not interfere with access to Internet publications.</span><sup class="reference" data-dcnode-id="4885" id="cite_ref-USDOS-HRR-JAPAN_34-0"><a data-dcnode-id="4886" href="#cite_note-USDOS-HRR-JAPAN-34"><span data-dcnode-id="4887" instrument_node="">[34]</span></a></sup><span data-dcnode-id="4884" instrument_node=""> Individuals and groups engage in the pleasant expression of views via the Internet, including e‑mail. The law and constitution prohibit arbitrary interference with privacy, family, home, or correspondence, and the government generally respects these prohibitions in practice.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4877" style="white-space:nowrap;"><span data-dcnode-id="4883" instrument_node="">[</span><i data-dcnode-id="4879"><a data-dcnode-id="4880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4881" title="This claim needs references to reliable sources. (October 2020)"><span data-dcnode-id="4882" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4878" instrument_node="">]</span></sup><span data-dcnode-id="4876" instrument_node="">
</span></p><span data-dcnode-id="4874" instrument_node="">
</span><h3 data-dcnode-id="4864"><span class="mw-headline" data-dcnode-id="4872" id="Freedom_of_peaceful_assembly_and_association"><span data-dcnode-id="4873" instrument_node="">Freedom of peaceful assembly and association</span></span><span class="mw-editsection" data-dcnode-id="4865"><span class="mw-editsection-bracket" data-dcnode-id="4870"><span data-dcnode-id="4871" instrument_node="">[</span></span><a data-dcnode-id="4868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D12" title="Edit section: Freedom of peaceful assembly and association"><span data-dcnode-id="4869" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4866"><span data-dcnode-id="4867" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4863" instrument_node="">
</span><p data-dcnode-id="4850"><span data-dcnode-id="4862" instrument_node="">The Constitution provides for the </span><a data-dcnode-id="4860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_of_assembly" title="Freedom of assembly"><span data-dcnode-id="4861" instrument_node="">freedom of assembly</span></a><span data-dcnode-id="4859" instrument_node=""> and association, and the Government generally respects these rights in practice.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4852" style="white-space:nowrap;"><span data-dcnode-id="4858" instrument_node="">[</span><i data-dcnode-id="4854"><a data-dcnode-id="4855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4856" title="This claim needs references to reliable sources. (May 2010)"><span data-dcnode-id="4857" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4853" instrument_node="">]</span></sup><span data-dcnode-id="4851" instrument_node="">
</span></p><span data-dcnode-id="4849" instrument_node="">
