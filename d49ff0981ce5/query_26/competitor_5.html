</span><p data-dcnode-id="4045"><span data-dcnode-id="4058" instrument_node="">There were an estimated 3.4 million persons over the age of 18 with </span><a class="mw-redirect" data-dcnode-id="4056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Physical_disabilities" title="Physical disabilities"><span data-dcnode-id="4057" instrument_node="">physical disabilities</span></a><span data-dcnode-id="4055" instrument_node=""> and roughly 3 million with </span><a class="mw-redirect" data-dcnode-id="4053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mental_disabilities" title="Mental disabilities"><span data-dcnode-id="4054" instrument_node="">mental disabilities</span></a><span data-dcnode-id="4052" instrument_node="">. Although not generally subject to overt discrimination in employment, education, or in the provision of other state services, persons with disabilities faced limited access to public transportation, "mainstream" public education, and other facilities. The Deliberation Panel on the Employment of the </span><a class="mw-redirect" data-dcnode-id="4050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Handicapped" title="Handicapped"><span data-dcnode-id="4051" instrument_node="">Handicapped</span></a><span data-dcnode-id="4049" instrument_node="">, which operates within the </span><a data-dcnode-id="4047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Health%2C_Labour_and_Welfare" title="Ministry of Health, Labour and Welfare"><span data-dcnode-id="4048" instrument_node="">Ministry of Health, Labour and Welfare</span></a><span data-dcnode-id="4046" instrument_node="">, has mandated that private companies with 300 or more employees hire a fixed minimum proportion of persons with disabilities. The penalty for noncompliance is a fine.
</span></p><p data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">The law does not mandate accessibility to buildings for persons with disabilities; however, the law on construction standards for public facilities allows operators of hospitals, theaters, hotels, and similar enterprises to receive low-interest loans and tax benefits if they build wider entrances and elevators to accommodate persons with disabilities.
</span></p><p data-dcnode-id="4030"><a class="new" data-dcnode-id="4041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Law_to_Promote_the_Employment_of_the_Handicapped%26action%3Dedit%26redlink%3D1" title="The Law to Promote the Employment of the Handicapped (page does not exist)"><span data-dcnode-id="4042" instrument_node="">The Law to Promote the Employment of the Handicapped</span></a><span data-dcnode-id="4040" instrument_node=""> includes those with mental disabilities. The law also loosened the licensing requirements for community support centers that promote employment for persons with disabilities, and it introduced government subsidies for the employment of persons with mental disabilities in part-time jobs. In 2003, workers with disabilities employed by private companies comprised on average 1.5% of the total number of regular employees, somewhat less than the legally stipulated rate of 1.8%. While nearly 70% of large corporations (1,000 or more employees) fell short of this goal, several large corporations had special divisions for workers with disabilities, including </span><a data-dcnode-id="4038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Omron" title="Omron"><span data-dcnode-id="4039" instrument_node="">Omron</span></a><span data-dcnode-id="4037" instrument_node="">, </span><a data-dcnode-id="4035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sony" title="Sony"><span data-dcnode-id="4036" instrument_node="">Sony</span></a><span data-dcnode-id="4034" instrument_node="">, and </span><a data-dcnode-id="4032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Honda" title="Honda"><span data-dcnode-id="4033" instrument_node="">Honda</span></a><span data-dcnode-id="4031" instrument_node="">. For example, 80% of Omron's Kyoto factory staff of 82 had disabilities, with the majority having severe disabilities. These employees earn an average of 3 million yen per year, which is above the minimum wage.
</span></p><p data-dcnode-id="4025"><span data-dcnode-id="4029" instrument_node="">At the end of 2002, all prefectural governments and 91.5% of local city governments had developed basic plans for citizens with disabilities. In June, the </span><a class="new" data-dcnode-id="4027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDisabled_Persons_Fundamental_Law%26action%3Dedit%26redlink%3D1" title="Disabled Persons Fundamental Law (page does not exist)"><span data-dcnode-id="4028" instrument_node="">Disabled Persons Fundamental Law</span></a><span data-dcnode-id="4026" instrument_node=""> was revised, obligating all municipalities to draw up formal plans for the disabled.
</span></p><p data-dcnode-id="4013"><span data-dcnode-id="4024" instrument_node="">As of June 2015, Japan has ratified the </span><a data-dcnode-id="4022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_on_the_Rights_of_Persons_with_Disabilities" title="Convention on the Rights of Persons with Disabilities"><span data-dcnode-id="4023" instrument_node="">Convention on the Rights of Persons with Disabilities</span></a><span data-dcnode-id="4021" instrument_node=""> but not signed nor ratified the </span><a data-dcnode-id="4019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optional_Protocol_to_the_Convention_on_the_Rights_of_Persons_with_Disabilities" title="Optional Protocol to the Convention on the Rights of Persons with Disabilities"><span data-dcnode-id="4020" instrument_node="">Optional Protocol to the Convention on the Rights of Persons with Disabilities</span></a><span data-dcnode-id="4018" instrument_node="">.</span><sup class="reference" data-dcnode-id="4015" id="cite_ref-56"><a data-dcnode-id="4016" href="#cite_note-56"><span data-dcnode-id="4017" instrument_node="">[56]</span></a></sup><span data-dcnode-id="4014" instrument_node="">
</span></p><span data-dcnode-id="4012" instrument_node="">
</span><h2 data-dcnode-id="4002"><span class="mw-headline" data-dcnode-id="4010" id="Minorities"><span data-dcnode-id="4011" instrument_node="">Minorities</span></span><span class="mw-editsection" data-dcnode-id="4003"><span class="mw-editsection-bracket" data-dcnode-id="4008"><span data-dcnode-id="4009" instrument_node="">[</span></span><a data-dcnode-id="4006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D30" title="Edit section: Minorities"><span data-dcnode-id="4007" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4001" instrument_node="">
</span><link data-dcnode-id="4000" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3993" role="note"><span data-dcnode-id="3999" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="3997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnic_issues_in_Japan" title="Ethnic issues in Japan"><span data-dcnode-id="3998" instrument_node="">Ethnic issues in Japan</span></a><span data-dcnode-id="3996" instrument_node=""> and </span><a data-dcnode-id="3994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Burakumin" title="Burakumin"><span data-dcnode-id="3995" instrument_node="">Burakumin</span></a></div><span data-dcnode-id="3992" instrument_node="">
</span><link data-dcnode-id="3991" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3960" role="note"><span data-dcnode-id="3990" instrument_node="">Main articles: </span><a data-dcnode-id="3988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Americans_in_Japan" title="Americans in Japan"><span data-dcnode-id="3989" instrument_node="">Americans in Japan</span></a><span data-dcnode-id="3987" instrument_node="">, </span><a data-dcnode-id="3985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bangladeshis_in_Japan" title="Bangladeshis in Japan"><span data-dcnode-id="3986" instrument_node="">Bangladeshis in Japan</span></a><span data-dcnode-id="3984" instrument_node="">, </span><a data-dcnode-id="3982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Filipinos_in_Japan" title="Filipinos in Japan"><span data-dcnode-id="3983" instrument_node="">Filipinos in Japan</span></a><span data-dcnode-id="3981" instrument_node="">, </span><a data-dcnode-id="3979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iranians_in_Japan" title="Iranians in Japan"><span data-dcnode-id="3980" instrument_node="">Iranians in Japan</span></a><span data-dcnode-id="3978" instrument_node="">, </span><a data-dcnode-id="3976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indonesians_in_Japan" title="Indonesians in Japan"><span data-dcnode-id="3977" instrument_node="">Indonesians in Japan</span></a><span data-dcnode-id="3975" instrument_node="">, </span><a data-dcnode-id="3973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnamese_people_in_Japan" title="Vietnamese people in Japan"><span data-dcnode-id="3974" instrument_node="">Vietnamese people in Japan</span></a><span data-dcnode-id="3972" instrument_node="">, </span><a data-dcnode-id="3970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mongolians_in_Japan" title="Mongolians in Japan"><span data-dcnode-id="3971" instrument_node="">Mongolians in Japan</span></a><span data-dcnode-id="3969" instrument_node="">, </span><a data-dcnode-id="3967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russians_in_Japan" title="Russians in Japan"><span data-dcnode-id="3968" instrument_node="">Russians in Japan</span></a><span data-dcnode-id="3966" instrument_node="">, </span><a data-dcnode-id="3964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turks_in_Japan" title="Turks in Japan"><span data-dcnode-id="3965" instrument_node="">Turks in Japan</span></a><span data-dcnode-id="3963" instrument_node="">, and </span><a data-dcnode-id="3961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_Jews_in_Japan" title="History of the Jews in Japan"><span data-dcnode-id="3962" instrument_node="">History of the Jews in Japan</span></a></div><span data-dcnode-id="3959" instrument_node="">
</span><p data-dcnode-id="3942"><a data-dcnode-id="3957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Burakumin" title="Burakumin"><span data-dcnode-id="3958" instrument_node="">Burakumin</span></a><span data-dcnode-id="3956" instrument_node="">, </span><a data-dcnode-id="3954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Koreans_in_Japan" title="Koreans in Japan"><span data-dcnode-id="3955" instrument_node="">Koreans</span></a><span data-dcnode-id="3953" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_in_Japan" title="Chinese in Japan"><span data-dcnode-id="3952" instrument_node="">Chinese</span></a><span data-dcnode-id="3950" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="3948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gaikokujin" title="Gaikokujin"><span data-dcnode-id="3949" instrument_node="">alien workers</span></a><span data-dcnode-id="3947" instrument_node=""> experienced varying degrees of societal discrimination, some of it severe and longstanding. The approximately 3 million Burakumin (descendants of feudal era "outcasts"), although not subject to governmental discrimination, frequently were victims of entrenched societal discrimination, including restricted access to housing and employment opportunities.</span><sup class="reference" data-dcnode-id="3944" id="cite_ref-57"><a data-dcnode-id="3945" href="#cite_note-57"><span data-dcnode-id="3946" instrument_node="">[57]</span></a></sup><span data-dcnode-id="3943" instrument_node="">
</span></p><p data-dcnode-id="3912"><span data-dcnode-id="3941" instrument_node="">According to the </span><a data-dcnode-id="3939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Justice_%28Japan%29" title="Ministry of Justice (Japan)"><span data-dcnode-id="3940" instrument_node="">MOJ</span></a><span data-dcnode-id="3938" instrument_node="">, there were nearly 1.85 million legal foreign residents as of 2002. The largest group, at approximately 625,400, was ethnic Koreans, followed by </span><a data-dcnode-id="3936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Han_Chinese" title="Han Chinese"><span data-dcnode-id="3937" instrument_node="">Chinese</span></a><span data-dcnode-id="3935" instrument_node="">, </span><a data-dcnode-id="3933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brazil" title="Brazil"><span data-dcnode-id="3934" instrument_node="">Brazilians</span></a><span data-dcnode-id="3932" instrument_node="">, and </span><a data-dcnode-id="3930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Filipinos_in_Japan" title="Filipinos in Japan"><span data-dcnode-id="3931" instrument_node="">Filipinos</span></a><span data-dcnode-id="3929" instrument_node="">. Despite improvements in legal safeguards against discrimination, Korean permanent residents (so-called </span><a class="mw-redirect" data-dcnode-id="3927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zainichi_Korean" title="Zainichi Korean"><span data-dcnode-id="3928" instrument_node="">Zainichi Koreans</span></a><span data-dcnode-id="3926" instrument_node="">, most of whom were born, raised, and educated in Japan) were subject to various forms of deeply entrenched societal discrimination. Harassment and threats against pro-</span><a data-dcnode-id="3924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Korea" title="North Korea"><span data-dcnode-id="3925" instrument_node="">North Korean</span></a><span data-dcnode-id="3923" instrument_node=""> organizations and persons reportedly have increased since the 2002 admission by North Korea that it had </span><a class="mw-redirect" data-dcnode-id="3921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Korean_abductions_of_Japanese" title="North Korean abductions of Japanese"><span data-dcnode-id="3922" instrument_node="">kidnapped more than a dozen Japanese citizens</span></a><span data-dcnode-id="3920" instrument_node="">. Other foreigners also were subject to discrimination. There was a widespread perception among Japanese citizens that foreigners committed many </span><a data-dcnode-id="3918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crime_in_Japan" title="Crime in Japan"><span data-dcnode-id="3919" instrument_node="">crimes</span></a><span data-dcnode-id="3917" instrument_node="">. According to a government survey, more than 70% of citizens worried that an increase in the number of illegally employed foreign workers could undermine public safety and result in human rights abuses against the workers themselves. Nevertheless, more than 80% said the country should accept foreign laborers conditionally or unconditionally.</span><sup class="reference" data-dcnode-id="3914" id="cite_ref-58"><a data-dcnode-id="3915" href="#cite_note-58"><span data-dcnode-id="3916" instrument_node="">[58]</span></a></sup><span data-dcnode-id="3913" instrument_node="">
</span></p><p data-dcnode-id="3903"><span data-dcnode-id="3911" instrument_node="">As of May 2019, Japan has not ratified the </span><a data-dcnode-id="3909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_against_Discrimination_in_Education" title="Convention against Discrimination in Education"><span data-dcnode-id="3910" instrument_node="">Convention against Discrimination in Education</span></a><span data-dcnode-id="3908" instrument_node="">.</span><sup class="reference" data-dcnode-id="3905" id="cite_ref-59"><a data-dcnode-id="3906" href="#cite_note-59"><span data-dcnode-id="3907" instrument_node="">[59]</span></a></sup><span data-dcnode-id="3904" instrument_node="">
</span></p><span data-dcnode-id="3902" instrument_node="">
</span><table class="box-Unreferenced_section plainlinks metadata ambox ambox-content ambox-Unreferenced" data-dcnode-id="3859" role="presentation"><tbody data-dcnode-id="3860"><tr data-dcnode-id="3861"><td class="mbox-image" data-dcnode-id="3898"><div data-dcnode-id="3899" style="width:52px"><a class="image" data-dcnode-id="3900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="3901" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="3862"><div class="mbox-text-span" data-dcnode-id="3863"><span data-dcnode-id="3897" instrument_node="">This section </span><b data-dcnode-id="3890"><span data-dcnode-id="3896" instrument_node="">does not </span><a data-dcnode-id="3894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources" title="Wikipedia:Citing sources"><span data-dcnode-id="3895" instrument_node="">cite</span></a><span data-dcnode-id="3893" instrument_node=""> any </span><a data-dcnode-id="3891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="3892" instrument_node="">sources</span></a></b><span data-dcnode-id="3889" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="3878"><span data-dcnode-id="3888" instrument_node=""> Please help </span><a class="external text 8" instrument_node="">
</span><h2 data-dcnode-id="3848"><span class="mw-headline" data-dcnode-id="3856" id="Worker_rights"><span data-dcnode-id="3857" instrument_node="">Worker rights</span></span><span class="mw-editsection" data-dcnode-id="3849"><span class="mw-editsection-bracket" data-dcnode-id="3854"><span data-dcnode-id="3855" instrument_node="">[</span></span><a data-dcnode-id="3852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D31" title="Edit section: Worker rights"><span data-dcnode-id="3853" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3847" instrument_node="">
</span><h3 data-dcnode-id="3837"><span class="mw-headline" data-dcnode-id="3845" id="Right_of_association"><span data-dcnode-id="3846" instrument_node="">Right of association</span></span><span class="mw-editsection" data-dcnode-id="3838"><span class="mw-editsection-bracket" data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">[</span></span><a data-dcnode-id="3841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D32" title="Edit section: Right of association"><span data-dcnode-id="3842" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3839"><span data-dcnode-id="3840" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3836" instrument_node="">
</span><p data-dcnode-id="3831"><span data-dcnode-id="3835" instrument_node="">The Constitution provides for the right of workers to associate freely in </span><a data-dcnode-id="3833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labor_unions_in_Japan" title="Labor unions in Japan"><span data-dcnode-id="3834" instrument_node="">unions</span></a><span data-dcnode-id="3832" instrument_node="">.
</span></p><span data-dcnode-id="3830" instrument_node="">
</span><h3 data-dcnode-id="3820"><span class="mw-headline" data-dcnode-id="3828" id="Sexual_harassment_law_in_the_workplace"><span data-dcnode-id="3829" instrument_node="">Sexual harassment law in the workplace</span></span><span class="mw-editsection" data-dcnode-id="3821"><span class="mw-editsection-bracket" data-dcnode-id="3826"><span data-dcnode-id="3827" instrument_node="">[</span></span><a data-dcnode-id="3824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D33" title="Edit section: Sexual harassment law in the workplace"><span data-dcnode-id="3825" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3822"><span data-dcnode-id="3823" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3819" instrument_node="">
</span><p data-dcnode-id="3814"><span data-dcnode-id="3818" instrument_node="">The Equal Employment Opportunity Law of Japan created in 1972 only advises or recommends employers to take measures to prevent sexual harassment. Sexual harassment is the most reported category labor cases at the </span><a class="mw-redirect" data-dcnode-id="3816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Health%2C_Labour%2C_and_Welfare" title="Ministry of Health, Labour, and Welfare"><span data-dcnode-id="3817" instrument_node="">Ministry of Health, Labour, and Welfare</span></a><span data-dcnode-id="3815" instrument_node=""> in Japan.
</span></p><p data-dcnode-id="3808"><span data-dcnode-id="3813" instrument_node="">In 1999 the Equal Employment Opportunity Act was revised and a provision was added that required employers to take measures to prevent sexual harassment against women in the workplace.  It was revised again in 2007 to include male victims, and it was revised again in 2014 to include same-sex sexual harassment.</span><sup class="reference" data-dcnode-id="3810" id="cite_ref-60"><a data-dcnode-id="3811" href="#cite_note-60"><span data-dcnode-id="3812" instrument_node="">[60]</span></a></sup><span data-dcnode-id="3809" instrument_node="">
</span></p><span data-dcnode-id="3807" instrument_node="">
</span><h3 data-dcnode-id="3797"><span class="mw-headline" data-dcnode-id="3805" id="Right_to_organize_and_bargain_collectively"><span data-dcnode-id="3806" instrument_node="">Right to organize and bargain collectively</span></span><span class="mw-editsection" data-dcnode-id="3798"><span class="mw-editsection-bracket" data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">[</span></span><a data-dcnode-id="3801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D34" title="Edit section: Right to organize and bargain collectively"><span data-dcnode-id="3802" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3799"><span data-dcnode-id="3800" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3796" instrument_node="">
</span><p data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">The Constitution provides unions with the right to organize, bargain, and act collectively.
</span></p><span data-dcnode-id="3793" instrument_node="">
</span><h3 data-dcnode-id="3783"><span class="mw-headline" data-dcnode-id="3791" id="Prohibition_of_forced_or_compulsory_labor"><span data-dcnode-id="3792" instrument_node="">Prohibition of forced or compulsory labor</span></span><span class="mw-editsection" data-dcnode-id="3784"><span class="mw-editsection-bracket" data-dcnode-id="3789"><span data-dcnode-id="3790" instrument_node="">[</span></span><a data-dcnode-id="3787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D35" title="Edit section: Prohibition of forced or compulsory labor"><span data-dcnode-id="3788" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3785"><span data-dcnode-id="3786" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3782" instrument_node="">
</span><p data-dcnode-id="3780"><span data-dcnode-id="3781" instrument_node="">The Constitution provides that no person shall be held in bondage of any kind. Involuntary servitude, except as punishment for crime, is prohibited.
</span></p><span data-dcnode-id="3779" instrument_node="">
</span><h3 data-dcnode-id="3769"><span class="mw-headline" data-dcnode-id="3777" id="Prohibition_of_child_labor"><span data-dcnode-id="3778" instrument_node="">Prohibition of child labor</span></span><span class="mw-editsection" data-dcnode-id="3770"><span class="mw-editsection-bracket" data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">[</span></span><a data-dcnode-id="3773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D36" title="Edit section: Prohibition of child labor"><span data-dcnode-id="3774" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3771"><span data-dcnode-id="3772" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3768" instrument_node="">
</span><p data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">The Constitution bans the employment of children.
</span></p><span data-dcnode-id="3765" instrument_node="">
</span><h3 data-dcnode-id="3755"><span class="mw-headline" data-dcnode-id="3763" id="Acceptable_work_conditions_and_minimum_wage"><span data-dcnode-id="3764" instrument_node="">Acceptable work conditions and minimum wage</span></span><span class="mw-editsection" data-dcnode-id="3756"><span class="mw-editsection-bracket" data-dcnode-id="3761"><span data-dcnode-id="3762" instrument_node="">[</span></span><a data-dcnode-id="3759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D37" title="Edit section: Acceptable work conditions and minimum wage"><span data-dcnode-id="3760" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3757"><span data-dcnode-id="3758" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3754" instrument_node="">
</span><table class="box-Unreferenced_section plainlinks metadata ambox ambox-content ambox-Unreferenced" data-dcnode-id="3711" role="presentation"><tbody data-dcnode-id="3712"><tr data-dcnode-id="3713"><td class="mbox-image" data-dcnode-id="3750"><div data-dcnode-id="3751" style="width:52px"><a class="image" data-dcnode-id="3752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="3753" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="3714"><div class="mbox-text-span" data-dcnode-id="3715"><span data-dcnode-id="3749" instrument_node="">This section </span><b data-dcnode-id="3742"><span data-dcnode-id="3748" instrument_node="">does not </span><a data-dcnode-id="3746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources" title="Wikipedia:Citing sources"><span data-dcnode-id="3747" instrument_node="">cite</span></a><span data-dcnode-id="3745" instrument_node=""> any </span><a data-dcnode-id="3743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="3744" instrument_node="">sources</span></a></b><span data-dcnode-id="3741" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="3730"><span data-dcnode-id="3740" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="3738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit"><span data-dcnode-id="3739" instrument_node="">improve this section</span></a><span data-dcnode-id="3737" instrument_node=""> by </span><a data-dcnode-id="3735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="3736" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="3734" instrument_node="">. Unsourced material may be challenged and </span><a data-dcnode-id="3732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability%23Burden_of_evidence" title="Wikipedia:Verifiability"><span data-dcnode-id="3733" instrument_node="">removed</span></a><span data-dcnode-id="3731" instrument_node="">.</span></span><span data-dcnode-id="3729" instrument_node=""> </span><span class="date-container" data-dcnode-id="3723"><i data-dcnode-id="3724"><span data-dcnode-id="3728" instrument_node="">(</span><span class="date" data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">March 2019</span></span><span data-dcnode-id="3725" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="3716"><i data-dcnode-id="3717"><span data-dcnode-id="3722" instrument_node=""> (</span><small data-dcnode-id="3719"><a data-dcnode-id="3720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="3721" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="3718" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="3710" instrument_node="">
</span><p data-dcnode-id="3703"><a data-dcnode-id="3708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minimum_wage" title="Minimum wage"><span data-dcnode-id="3709" instrument_node="">Minimum wages</span></a><span data-dcnode-id="3707" instrument_node=""> are set on a regional (prefectural) and industry basis, with the input of tripartite (workers, employers, public interest) advisory councils. Employers covered by a minimum wage must post the concerned minimum wages, and compliance with minimum wages was considered widespread. Minimum wage rates ranged according to prefecture from 606 to 710 yen per hour. Minimum wage rates were considered sufficient to provide a worker and family with a decent </span><a data-dcnode-id="3705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Standard_of_living" title="Standard of living"><span data-dcnode-id="3706" instrument_node="">standard of living</span></a><span data-dcnode-id="3704" instrument_node="">.
</span></p><p data-dcnode-id="3698"><span data-dcnode-id="3702" instrument_node="">The Labor Standards Law provides for a 40-hour work week for most industries and mandates premium pay for hours worked over 40 in a week, or 8 in a day. However, labor unions frequently criticized the government for failing to enforce maximum </span><a class="mw-redirect" data-dcnode-id="3700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Working_hours" title="Working hours"><span data-dcnode-id="3701" instrument_node="">working hours</span></a><span data-dcnode-id="3699" instrument_node=""> regulations in smaller firms. Activist groups claimed that employers exploited or discriminated against foreign workers, who often had little or no knowledge of the Japanese language or their legal rights.
</span></p><p data-dcnode-id="3693"><span data-dcnode-id="3697" instrument_node="">The government tried to reduce the inflow of illegal foreign workers by prosecuting employers of such workers. According to NPA figures, 175 persons were charged with "illegal employment assistance" during the first half of 2002. The </span><a class="mw-redirect" data-dcnode-id="3695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immigration_Law" title="Immigration Law"><span data-dcnode-id="3696" instrument_node="">Immigration Law</span></a><span data-dcnode-id="3694" instrument_node=""> provides for penalties against employers of undocumented foreign workers. Maximum fines for illegal employment assistance were raised to 3 million yen in December. Suspected foreign workers also may be denied entry for passport, visa, and entry application irregularities. The Government continued to study the foreign worker issue, and several citizens' groups were working with illegal foreign workers to improve their access to information on worker rights.
</span></p><p data-dcnode-id="3688"><span data-dcnode-id="3692" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="3690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Health%2C_Labour_and_Welfare_%28Japan%29" title="Ministry of Health, Labour and Welfare (Japan)"><span data-dcnode-id="3691" instrument_node="">Ministry of Labor</span></a><span data-dcnode-id="3689" instrument_node=""> effectively administered various laws and regulations governing occupational health and safety, principal among which is the Industrial Safety and Health Law. Standards were set by the Ministry of Labor and issued after consultation with the Standing Committee on Safety and Health of the Central Labor Standards Council. Labor inspectors have the authority to suspend unsafe operations immediately, and the law provides that workers may voice concerns over occupational safety and remove themselves from unsafe working conditions without jeopardizing their continued employment.
</span></p><p data-dcnode-id="3679"><span data-dcnode-id="3687" instrument_node="">According to new reports of Business &amp; Human Rights Resource Center, approximately 197 allegations of </span><a data-dcnode-id="3685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_rights" title="Human rights"><span data-dcnode-id="3686" instrument_node="">human rights</span></a><span data-dcnode-id="3684" instrument_node=""> abuses have been revealed against renewable energy projects. In 2019, a London-based group that promotes human rights, documented 47 attacks, ranging from frivolous lawsuits, to violence on individuals who raised concerns about human rights abuses in the industry.</span><sup class="reference" data-dcnode-id="3681" id="cite_ref-61"><a data-dcnode-id="3682" href="#cite_note-61"><span data-dcnode-id="3683" instrument_node="">[61]</span></a></sup><span data-dcnode-id="3680" instrument_node="">
</span></p><span data-dcnode-id="3678" instrument_node="">
</span><h3 data-dcnode-id="3668"><span class="mw-headline" data-dcnode-id="3676" id="Foreign_worker_issues"><span data-dcnode-id="3677" instrument_node="">Foreign worker issues</span></span><span class="mw-editsection" data-dcnode-id="3669"><span class="mw-editsection-bracket" data-dcnode-id="3674"><span data-dcnode-id="3675" instrument_node="">[</span></span><a data-dcnode-id="3672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D38" title="Edit section: Foreign worker issues"><span data-dcnode-id="3673" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3670"><span data-dcnode-id="3671" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3667" instrument_node="">
</span><h4 data-dcnode-id="3657"><span class="mw-headline" data-dcnode-id="3665" id="Passport_confiscation"><span data-dcnode-id="3666" instrument_node="">Passport confiscation</span></span><span class="mw-editsection" data-dcnode-id="3658"><span class="mw-editsection-bracket" data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">[</span></span><a data-dcnode-id="3661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Japan%26action%3Dedit%26section%3D39" title="Edit section: Passport confiscation"><span data-dcnode-id="3662" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3659"><span data-dcnode-id="3660" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3656" instrument_node="">
</span><p data-dcnode-id="3623"><span data-dcnode-id="3655" instrument_node="">It is common practice for Japanese companies to take the passport of foreign employees.</span><sup class="reference" data-dcnode-id="3652" id="cite_ref-passport-confiscation_62-0"><a data-dcnode-id="3653" href="#cite_note-passport-confiscation-62"><span data-dcnode-id="3654" instrument_node="">[62]</span></a></sup><span data-dcnode-id="3651" instrument_node=""> It is illegal for companies to confiscate passports of Japanese citizens, but not of foreign workers.</span><sup class="reference" data-dcnode-id="3648" id="cite_ref-passport-confiscation_62-1"><a data-dcnode-id="3649" href="#cite_note-passport-confiscation-62"><span data-dcnode-id="3650" instrument_node="">[62]</span></a></sup><span data-dcnode-id="3647" instrument_node=""> There are only government guidelines against confiscation.</span><sup class="reference" data-dcnode-id="3644" id="cite_ref-passport-confiscation_62-2"><a data-dcnode-id="3645" href="#cite_note-passport-confiscation-62"><span data-dcnode-id="3646" instrument_node="">[62]</span></a></sup><span data-dcnode-id="3643" instrument_node=""> Companies fear that foreign employees could run away.</span><sup class="reference" data-dcnode-id="3640" id="cite_ref-passport-confiscation_62-3"><a data-dcnode-id="3641" href="#cite_note-passport-confiscation-62"><span data-dcnode-id="3642" instrument_node="">[62]</span></a></sup><span data-dcnode-id="3639" instrument_node=""> According to activist lawyers, forcing people to work while taking their passports is akin to </span><a class="mw-redirect" data-dcnode-id="3637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unfree_labour" title="Unfree labour"><span data-dcnode-id="3638" instrument_node="">forced labor</span></a><span data-dcnode-id="3636" instrument_node="">.</span><sup class="reference" data-dcnode-id="3633" id="cite_ref-passport-confiscation_62-4"><a data-dcnode-id="3634" href="#cite_note-passport-confiscation-62"><span data-dcnode-id="3635" instrument_node="">[62]</span></a></sup><span data-dcnode-id="3632" instrument_node=""> They have implored the Japanese government to make it illegal in order to protect human rights.</span><sup class="reference" data-dcnode-id="3629" id="cite_ref-passport-confiscation_62-5"><a data-dcnode-id="3630" href="#cite_note-passport-confiscation-62"><span data-dcnode-id="3631" instrument_node="">[62]</span></a></sup><span data-dcnode-id="3628" instrument_node=""> The specific number of cases is unclear, but many cases are underreported due to language barriers and threats of deportation.</span><sup class="reference" data-dcnode-id="3625" id="cite_ref-passport-confiscation_62-6"><a data-dcnode-id="3626" href="#cite_note-passport-confiscation-62"><span data-dcnode-id="3627" instrument_node="">[62]</span></a></sup><span data-dcnode-id="3624" instrument_node="">
</span></p><span data-dcnode-id="3622" instrument_node="">
