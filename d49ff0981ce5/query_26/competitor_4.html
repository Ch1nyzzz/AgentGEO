l=https%3A//en.wikipedia.org/wiki/Electoral_reform" title="Electoral reform"><span data-dcnode-id="3121" instrument_node="">electoral reform</span></a><span data-dcnode-id="3119" instrument_node=""> in Malaysia and about 50,000 people took to the streets.</span><sup class="reference" data-dcnode-id="3116" id="cite_ref-52"><a data-dcnode-id="3117" href="#cite_note-52"><span data-dcnode-id="3118" instrument_node="">[52]</span></a></sup><span data-dcnode-id="3115" instrument_node=""> The rally was attended by at least 10,000 protesters, mainly ethnic Indians, demanding equal social and economic rights from the </span><i data-dcnode-id="3112"><a class="mw-redirect" data-dcnode-id="3113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bumiputra" title="Bumiputra"><span data-dcnode-id="3114" instrument_node="">Bumiputras</span></a></i><span data-dcnode-id="3111" instrument_node="">.</span><sup class="reference" data-dcnode-id="3108" id="cite_ref-53"><a data-dcnode-id="3109" href="#cite_note-53"><span data-dcnode-id="3110" instrument_node="">[53]</span></a></sup><span data-dcnode-id="3107" instrument_node=""> Tamil politicians from India such as </span><a data-dcnode-id="3105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/M._Karunanidhi" title="M. Karunanidhi"><span data-dcnode-id="3106" instrument_node="">M. Karunanidhi</span></a><span data-dcnode-id="3104" instrument_node=""> also came out in support of ethnic Indians in Malaysia by demanding that the Indian government take up their matter with their Malaysian counterparts.
</span></p><p data-dcnode-id="3078"><span data-dcnode-id="3102" instrument_node="">In a letter dated 10 December 2007, the </span><a data-dcnode-id="3100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Internal_Security_%28Malaysia%29" title="Ministry of Internal Security (Malaysia)"><span data-dcnode-id="3101" instrument_node="">Ministry of Internal Security</span></a><span data-dcnode-id="3099" instrument_node=""> banned the Malay-language section of the </span><i data-dcnode-id="3096"><a data-dcnode-id="3097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catholic_Herald" title="Catholic Herald"><span data-dcnode-id="3098" instrument_node="">Catholic Herald</span></a></i><span data-dcnode-id="3095" instrument_node=""> due to its use of "</span><a data-dcnode-id="3093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allah" title="Allah"><span data-dcnode-id="3094" instrument_node="">Allah</span></a><span data-dcnode-id="3092" instrument_node="">" to refer to </span><a data-dcnode-id="3090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/God_in_Christianity" title="God in Christianity"><span data-dcnode-id="3091" instrument_node="">God in Christianity</span></a><span data-dcnode-id="3089" instrument_node="">.</span><sup class="reference" data-dcnode-id="3086" id="cite_ref-54"><a data-dcnode-id="3087" href="#cite_note-54"><span data-dcnode-id="3088" instrument_node="">[54]</span></a></sup><span data-dcnode-id="3085" instrument_node=""> This led to </span><a data-dcnode-id="3083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Titular_Roman_Catholic_Archbishop_of_Kuala_Lumpur_v_Menteri_Dalam_Negeri" title="Titular Roman Catholic Archbishop of Kuala Lumpur v Menteri Dalam Negeri"><span data-dcnode-id="3084" instrument_node="">a court case</span></a><span data-dcnode-id="3082" instrument_node="">, in which the </span><a data-dcnode-id="3080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_Court_of_Malaysia" title="Federal Court of Malaysia"><span data-dcnode-id="3081" instrument_node="">Federal Court of Malaysia</span></a><span data-dcnode-id="3079" instrument_node=""> ruled that there was no constitutional right for non-Muslims to use the word "Allah".
</span></p><p data-dcnode-id="3050"><span data-dcnode-id="3077" instrument_node="">On 14 May 2014, Prime Minister </span><a data-dcnode-id="3075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Najib_Razak" title="Najib Razak"><span data-dcnode-id="3076" instrument_node="">Najib Razak</span></a><span data-dcnode-id="3074" instrument_node=""> was quoted as saying that said </span><a data-dcnode-id="3072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islam" title="Islam"><span data-dcnode-id="3073" instrument_node="">Islam</span></a><span data-dcnode-id="3071" instrument_node=""> and its followers are now being tested by new threats under the guise of </span><a data-dcnode-id="3069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Humanism" title="Humanism"><span data-dcnode-id="3070" instrument_node="">humanism</span></a><span data-dcnode-id="3068" instrument_node="">, </span><a data-dcnode-id="3066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secularism" title="Secularism"><span data-dcnode-id="3067" instrument_node="">secularism</span></a><span data-dcnode-id="3065" instrument_node="">, </span><a data-dcnode-id="3063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberalism" title="Liberalism"><span data-dcnode-id="3064" instrument_node="">liberalism</span></a><span data-dcnode-id="3062" instrument_node=""> and </span><a data-dcnode-id="3060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_rights" title="Human rights"><span data-dcnode-id="3061" instrument_node="">human rights</span></a><span data-dcnode-id="3059" instrument_node="">,</span><sup class="reference" data-dcnode-id="3056" id="cite_ref-55"><a data-dcnode-id="3057" href="#cite_note-55"><span data-dcnode-id="3058" instrument_node="">[55]</span></a></sup><span data-dcnode-id="3055" instrument_node=""> although he later reversed his position three days later after coming under criticism.</span><sup class="reference" data-dcnode-id="3052" id="cite_ref-56"><a data-dcnode-id="3053" href="#cite_note-56"><span data-dcnode-id="3054" instrument_node="">[56]</span></a></sup><span data-dcnode-id="3051" instrument_node="">
</span></p><span data-dcnode-id="3049" instrument_node="">
</span><h2 data-dcnode-id="3039"><span class="mw-headline" data-dcnode-id="3047" id="NGOs"><span data-dcnode-id="3048" instrument_node="">NGOs</span></span><span class="mw-editsection" data-dcnode-id="3040"><span class="mw-editsection-bracket" data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">[</span></span><a data-dcnode-id="3043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D43" title="Edit section: NGOs"><span data-dcnode-id="3044" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3038" instrument_node="">
