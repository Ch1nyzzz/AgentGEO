</span><h2 data-dcnode-id="3880"><span class="mw-headline" data-dcnode-id="3888" id="Disability_rights"><span data-dcnode-id="3889" instrument_node="">Disability rights</span></span><span class="mw-editsection" data-dcnode-id="3881"><span class="mw-editsection-bracket" data-dcnode-id="3886"><span data-dcnode-id="3887" instrument_node="">[</span></span><a data-dcnode-id="3884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D24" title="Edit section: Disability rights"><span data-dcnode-id="3885" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3879" instrument_node="">
</span><p data-dcnode-id="3857"><span data-dcnode-id="3878" instrument_node="">Discrimination against the disabled is legal, but the government promotes the acceptance and employment of such persons. While new government buildings are designed with disabled people in mind, older buildings and public-transportation vehicles are not. A lower excise duty is charged on cars and motorcycles designed for disabled persons. The </span><a data-dcnode-id="3876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Human_Resources_%28Malaysia%29" title="Ministry of Human Resources (Malaysia)"><span data-dcnode-id="3877" instrument_node="">Ministry of Human Resources</span></a><span data-dcnode-id="3875" instrument_node=""> is tasked with protecting disabled rights. A Persons with Disabilities Act was passed in 2008 but violators are not penalised.</span><sup class="reference" data-dcnode-id="3872" id="cite_ref-state_15-5"><a data-dcnode-id="3873" href="#cite_note-state-15"><span data-dcnode-id="3874" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3871" instrument_node=""> In the wake of the </span><a data-dcnode-id="3869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Human_Rights_Council" title="United Nations Human Rights Council"><span data-dcnode-id="3870" instrument_node="">United Nations Human Rights Council</span></a><span data-dcnode-id="3868" instrument_node="">'s </span><a data-dcnode-id="3866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_Periodic_Review" title="Universal Periodic Review"><span data-dcnode-id="3867" instrument_node="">Universal Periodic Review</span></a><span data-dcnode-id="3865" instrument_node=""> of Malaysia in 2009, Malaysia ratified the </span><a data-dcnode-id="3863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_on_the_Rights_of_Persons_with_Disabilities" title="Convention on the Rights of Persons with Disabilities"><span data-dcnode-id="3864" instrument_node="">Convention on the Rights of Persons with Disabilities</span></a><span data-dcnode-id="3862" instrument_node="">, though with certain reservations.</span><sup class="reference" data-dcnode-id="3859" id="cite_ref-nst_5-4"><a data-dcnode-id="3860" href="#cite_note-nst-5"><span data-dcnode-id="3861" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3858" instrument_node="">
</span></p><span data-dcnode-id="3856" instrument_node="">
</span><h2 data-dcnode-id="3845"><span data-dcnode-id="3855" id="Indigenous_people.27s_rights"></span><span class="mw-headline" data-dcnode-id="3853" id="Indigenous_people's_rights"><span data-dcnode-id="3854" instrument_node="">Indigenous people's rights</span></span><span class="mw-editsection" data-dcnode-id="3846"><span class="mw-editsection-bracket" data-dcnode-id="3851"><span data-dcnode-id="3852" instrument_node="">[</span></span><a data-dcnode-id="3849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D25" title="Edit section: Indigenous people's rights"><span data-dcnode-id="3850" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3844" instrument_node="">
</span><p data-dcnode-id="3836"><span data-dcnode-id="3843" instrument_node="">For the most part, indigenous people do not participate in decisions affecting their lives, and their rights are not effectively protected. Under the Aboriginal People's Act, members of indigenous groups do not have land rights, and logging firms encroach on their traditional lands. Although for a long time indigenous persons were often deprived of their lands without due process, this situation has improved in recent years. Malaysia is signatory to the </span><a data-dcnode-id="3841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="3842" instrument_node="">United Nations</span></a><span data-dcnode-id="3840" instrument_node=""> </span><a data-dcnode-id="3838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Declaration_on_the_Rights_of_Indigenous_Peoples" title="Declaration on the Rights of Indigenous Peoples"><span data-dcnode-id="3839" instrument_node="">Declaration on the Rights of Indigenous Peoples</span></a><span data-dcnode-id="3837" instrument_node=""> (UNDRIP), but has still not ratified ILO Convention 169.
</span></p><p data-dcnode-id="3820"><span data-dcnode-id="3835" instrument_node="">The 20-point agreement, or the 20-point memorandum, is a list of 20 points drawn up for </span><a data-dcnode-id="3833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Borneo" title="North Borneo"><span data-dcnode-id="3834" instrument_node="">North Borneo</span></a><span data-dcnode-id="3832" instrument_node="">, proposing terms for its incorporation into the new federation as Sabah, during negotiations prior to the formation of Malaysia on 16 September 1963.</span><sup class="noprint Inline-Template" data-dcnode-id="3825" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="3831" instrument_node="">[</span><i data-dcnode-id="3827"><a data-dcnode-id="3828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APlease_clarify" title="Wikipedia:Please clarify"><span data-dcnode-id="3829" title="The text near this tag may need clarification or removal of jargon. (October 2020)"><span data-dcnode-id="3830" instrument_node="">clarification needed</span></span></a></i><span data-dcnode-id="3826" instrument_node="">]</span></sup><span data-dcnode-id="3824" instrument_node=""> Some of the twenty points were incorporated, to varying degrees, into what became the </span><a data-dcnode-id="3822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_Malaysia" title="Constitution of Malaysia"><span data-dcnode-id="3823" instrument_node="">Constitution of Malaysia</span></a><span data-dcnode-id="3821" instrument_node="">; others were merely accepted orally, thus not gaining legal status. Point 12: Special position of indigenous races ~ "In principle the indigenous races of North Borneo should enjoy special rights analogous to those enjoyed by Malays in Malaya, but the present Malaya formula in this regard is not necessarily applicable in North Borneo".
</span></p><span data-dcnode-id="3819" instrument_node="">
</span><h2 data-dcnode-id="3809"><span class="mw-headline" data-dcnode-id="3817" id="Trafficking_in_persons"><span data-dcnode-id="3818" instrument_node="">Trafficking in persons</span></span><span class="mw-editsection" data-dcnode-id="3810"><span class="mw-editsection-bracket" data-dcnode-id="3815"><span data-dcnode-id="3816" instrument_node="">[</span></span><a data-dcnode-id="3813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D26" title="Edit section: Trafficking in persons"><span data-dcnode-id="3814" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3811"><span data-dcnode-id="3812" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3808" instrument_node="">
</span><p data-dcnode-id="3799"><span data-dcnode-id="3807" instrument_node="">Malaysia, according to </span><a data-dcnode-id="3805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amnesty_International" title="Amnesty International"><span data-dcnode-id="3806" instrument_node="">Amnesty International</span></a><span data-dcnode-id="3804" instrument_node="">, "is a destination and, to a lesser extent, a source and transit country for women and children trafficked for the purpose of commercial sexual exploitation, and men, women, and children for forced labour... Malaysia improved from Tier 3 to the Tier 2 Watch List for 2008 when it enacted comprehensive anti-trafficking legislation in July 2007."</span><sup class="reference" data-dcnode-id="3801" id="cite_ref-27"><a data-dcnode-id="3802" href="#cite_note-27"><span data-dcnode-id="3803" instrument_node="">[27]</span></a></sup><span data-dcnode-id="3800" instrument_node="">
</span></p><p data-dcnode-id="3793"><span data-dcnode-id="3798" instrument_node="">As of 2021, Malaysia is listed as a Tier-3 country.</span><sup class="reference" data-dcnode-id="3795" id="cite_ref-28"><a data-dcnode-id="3796" href="#cite_note-28"><span data-dcnode-id="3797" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3794" instrument_node="">
</span></p><span data-dcnode-id="3792" instrument_node="">
</span><h2 data-dcnode-id="3782"><span class="mw-headline" data-dcnode-id="3790" id="Official_persecution_of_minorities"><span data-dcnode-id="3791" instrument_node="">Official persecution of minorities</span></span><span class="mw-editsection" data-dcnode-id="3783"><span class="mw-editsection-bracket" data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">[</span></span><a data-dcnode-id="3786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D27" title="Edit section: Official persecution of minorities"><span data-dcnode-id="3787" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3781" instrument_node="">
</span><link data-dcnode-id="3780" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3776" role="note"><span data-dcnode-id="3779" instrument_node="">Main article: </span><a data-dcnode-id="3777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Racism_in_Malaysia" title="Racism in Malaysia"><span data-dcnode-id="3778" instrument_node="">Racism in Malaysia</span></a></div><span data-dcnode-id="3775" instrument_node="">
</span><h3 data-dcnode-id="3765"><span class="mw-headline" data-dcnode-id="3773" id="Islamist_supremacist_Bumiputra_laws"><span data-dcnode-id="3774" instrument_node="">Islamist supremacist Bumiputra laws</span></span><span class="mw-editsection" data-dcnode-id="3766"><span class="mw-editsection-bracket" data-dcnode-id="3771"><span data-dcnode-id="3772" instrument_node="">[</span></span><a data-dcnode-id="3769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D28" title="Edit section: Islamist supremacist Bumiputra laws"><span data-dcnode-id="3770" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3764" instrument_node="">
</span><link data-dcnode-id="3763" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3759" role="note"><span data-dcnode-id="3762" instrument_node="">Main article: </span><a data-dcnode-id="3760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bumiputera_%28Malaysia%29" title="Bumiputera (Malaysia)"><span data-dcnode-id="3761" instrument_node="">Bumiputera (Malaysia)</span></a></div><span data-dcnode-id="3758" instrument_node="">
</span><p data-dcnode-id="3732"><a data-dcnode-id="3756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islam" title="Islam"><span data-dcnode-id="3757" instrument_node="">Islam</span></a><span data-dcnode-id="3755" instrument_node=""> is the sole official religion of Malaysia. The </span><a data-dcnode-id="3753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_Malaysia" title="Constitution of Malaysia"><span data-dcnode-id="3754" instrument_node="">Constitution of Malaysia</span></a><span data-dcnode-id="3752" instrument_node=""> declares that Islam is the only religion of the Malay people and that native Malays are required to be Muslims.</span><sup class="reference" data-dcnode-id="3749" id="cite_ref-29"><a data-dcnode-id="3750" href="#cite_note-29"><span data-dcnode-id="3751" instrument_node="">[29]</span></a></sup><span data-dcnode-id="3748" instrument_node=""> Conversion from Islam to another religion is against the law, but the conversion of non-Muslims to Islam is actively pursued through institutionalised means and discriminatory laws against non-Muslims. The government actively promotes conversion to Islam in the country.</span><sup class="reference" data-dcnode-id="3745" id="cite_ref-gandg_30-0"><a data-dcnode-id="3746" href="#cite_note-gandg-30"><span data-dcnode-id="3747" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3744" instrument_node=""> The discriminatory law requires that any non-Muslims who wish to marry a Muslim must first convert to Islam, or else the marriage is considered illegal and void.</span><sup class="reference" data-dcnode-id="3741" id="cite_ref-gandg_30-1"><a data-dcnode-id="3742" href="#cite_note-gandg-30"><span data-dcnode-id="3743" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3740" instrument_node=""> While in a non-Muslim family, should one parent decides to become a Muslim, the children (under the legal age of 18) may be forcibly declared as Muslims, even against the children's will or without the consent of the other parent.</span><sup class="reference" data-dcnode-id="3737" id="cite_ref-2011report_31-0"><a data-dcnode-id="3738" href="#cite_note-2011report-31"><span data-dcnode-id="3739" instrument_node="">[31]</span></a></sup><sup class="reference" data-dcnode-id="3734" id="cite_ref-32"><a data-dcnode-id="3735" href="#cite_note-32"><span data-dcnode-id="3736" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3733" instrument_node="">
</span></p><span data-dcnode-id="3731" instrument_node="">
</span><h3 data-dcnode-id="3721"><span class="mw-headline" data-dcnode-id="3729" id="Persecution_of_Hindus"><span data-dcnode-id="3730" instrument_node="">Persecution of Hindus</span></span><span class="mw-editsection" data-dcnode-id="3722"><span class="mw-editsection-bracket" data-dcnode-id="3727"><span data-dcnode-id="3728" instrument_node="">[</span></span><a data-dcnode-id="3725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D29" title="Edit section: Persecution of Hindus"><span data-dcnode-id="3726" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3723"><span data-dcnode-id="3724" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3720" instrument_node="">
</span><link data-dcnode-id="3719" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3715" role="note"><span data-dcnode-id="3718" instrument_node="">Main article: </span><a data-dcnode-id="3716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hinduism_in_Malaysia%23Persecution_of_Hindus" title="Hinduism in Malaysia"><span data-dcnode-id="3717" instrument_node="">Persecution of Hindus in Malaysia</span></a></div><span data-dcnode-id="3714" instrument_node="">
</span><p data-dcnode-id="3677"><span data-dcnode-id="3713" instrument_node="">Human rights of religious and ethnic minorities in Malaysia, including </span><a data-dcnode-id="3711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buddhism_in_Malaysia%23persecution" title="Buddhism in Malaysia"><span data-dcnode-id="3712" instrument_node="">Buddhists</span></a><span data-dcnode-id="3710" instrument_node="">, </span><a data-dcnode-id="3708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hinduism_in_Malaysia%23persecution" title="Hinduism in Malaysia"><span data-dcnode-id="3709" instrument_node="">Hindus</span></a><span data-dcnode-id="3707" instrument_node="">, </span><a data-dcnode-id="3705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sikhism_in_Malaysia%23persecution" title="Sikhism in Malaysia"><span data-dcnode-id="3706" instrument_node="">Sikhs</span></a><span data-dcnode-id="3704" instrument_node="">, </span><a data-dcnode-id="3702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malaysian_Indians%23persecution" title="Malaysian Indians"><span data-dcnode-id="3703" instrument_node="">Indians</span></a><span data-dcnode-id="3701" instrument_node=""> and </span><a data-dcnode-id="3699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malaysian_Chinese%23persecution" title="Malaysian Chinese"><span data-dcnode-id="3700" instrument_node="">Chinese</span></a><span data-dcnode-id="3698" instrument_node="">, are </span><a data-dcnode-id="3696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_Islam" title="Political Islam"><span data-dcnode-id="3697" instrument_node="">systematically, officially and legally violated</span></a><span data-dcnode-id="3695" instrument_node=""> regularly in an institutionalised manner to induce </span><a data-dcnode-id="3693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forced_conversion" title="Forced conversion"><span data-dcnode-id="3694" instrument_node="">forced conversions</span></a><span data-dcnode-id="3692" instrument_node=""> and </span><a data-dcnode-id="3690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnic_cleansing" title="Ethnic cleansing"><span data-dcnode-id="3691" instrument_node="">ethnic cleansing</span></a><span data-dcnode-id="3689" instrument_node=""> to </span><a data-dcnode-id="3687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jihadism" title="Jihadism"><span data-dcnode-id="3688" instrument_node="">homogenise society to Islam</span></a><span data-dcnode-id="3686" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3679" style="white-space:nowrap;"><span data-dcnode-id="3685" instrument_node="">[</span><i data-dcnode-id="3681"><a data-dcnode-id="3682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3683" title="This claim needs references to reliable sources. (October 2020)"><span data-dcnode-id="3684" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3680" instrument_node="">]</span></sup><span data-dcnode-id="3678" instrument_node="">
</span></p><p data-dcnode-id="3660"><span data-dcnode-id="3676" instrument_node="">People of Indian descent are derogatorily called </span><i data-dcnode-id="3673"><a data-dcnode-id="3674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Keling" title="Keling"><span data-dcnode-id="3675" instrument_node="">keling</span></a></i><span data-dcnode-id="3672" instrument_node=""> in Malaysia.</span><sup class="reference" data-dcnode-id="3669" id="cite_ref-33"><a data-dcnode-id="3670" href="#cite_note-33"><span data-dcnode-id="3671" instrument_node="">[33]</span></a></sup><span data-dcnode-id="3668" instrument_node=""> In many modern cases, </span><i data-dcnode-id="3666"><span data-dcnode-id="3667" instrument_node="">keling</span></i><span data-dcnode-id="3665" instrument_node=""> is used as a derogatory term. It was used in 2005 by members of parliament because of misconception about ethnic Indians, which resulted in an uproar accusing the members of parliament of racism.</span><sup class="reference" data-dcnode-id="3662" id="cite_ref-34"><a data-dcnode-id="3663" href="#cite_note-34"><span data-dcnode-id="3664" instrument_node="">[34]</span></a></sup><span data-dcnode-id="3661" instrument_node="">
</span></p><span data-dcnode-id="3659" instrument_node="">
</span><h3 data-dcnode-id="3649"><span class="mw-headline" data-dcnode-id="3657" id="Sharia_and_Bumiputera_laws"><span data-dcnode-id="3658" instrument_node="">Sharia and Bumiputera laws</span></span><span class="mw-editsection" data-dcnode-id="3650"><span class="mw-editsection-bracket" data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">[</span></span><a data-dcnode-id="3653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D30" title="Edit section: Sharia and Bumiputera laws"><span data-dcnode-id="3654" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3651"><span data-dcnode-id="3652" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3648" instrument_node="">
</span><p data-dcnode-id="3632"><span data-dcnode-id="3647" instrument_node="">There are numerous cases in Malaysian courts relating to official persecution of Hindus. For example, in August 2010, a Malaysian woman, Siti Hasnah Banggarma, was denied the right to convert to </span><a data-dcnode-id="3645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hinduism" title="Hinduism"><span data-dcnode-id="3646" instrument_node="">Hinduism</span></a><span data-dcnode-id="3644" instrument_node=""> by a Malaysian court. Siti Hasnah Banggarma, who was born a Hindu, but was </span><a data-dcnode-id="3642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forced_conversion" title="Forced conversion"><span data-dcnode-id="3643" instrument_node="">forcibly converted</span></a><span data-dcnode-id="3641" instrument_node=""> to Islam at age 7, desired to reconvert back to Hinduism and appealed to the courts to recognise her reconversion. The appeal was denied.</span><sup class="reference" data-dcnode-id="3638" id="cite_ref-35"><a data-dcnode-id="3639" href="#cite_note-35"><span data-dcnode-id="3640" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3637" instrument_node=""> In 2016, an association of eight Hindu NGOs found that about 7,000 Hindus in Malaysia wrongly documented as Muslims. This problem was widespread throughout Peninsular Malaysia and involved mostly practising Hindus from the lower income group who are documented as Muslims.</span><sup class="reference" data-dcnode-id="3634" id="cite_ref-36"><a data-dcnode-id="3635" href="#cite_note-36"><span data-dcnode-id="3636" instrument_node="">[36]</span></a></sup><span data-dcnode-id="3633" instrument_node="">
</span></p><span data-dcnode-id="3631" instrument_node="">
</span><h3 data-dcnode-id="3621"><span class="mw-headline" data-dcnode-id="3629" id="Destruction_of_Hindu_temples"><span data-dcnode-id="3630" instrument_node="">Destruction of Hindu temples</span></span><span class="mw-editsection" data-dcnode-id="3622"><span class="mw-editsection-bracket" data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">[</span></span><a data-dcnode-id="3625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D31" title="Edit section: Destruction of Hindu temples"><span data-dcnode-id="3626" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3620" instrument_node="">
</span><link data-dcnode-id="3619" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3612" role="note"><span data-dcnode-id="3618" instrument_node="">See also: </span><a data-dcnode-id="3616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/HINDRAF" title="HINDRAF"><span data-dcnode-id="3617" instrument_node="">HINDRAF</span></a><span data-dcnode-id="3615" instrument_node=""> and </span><a data-dcnode-id="3613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2007_HINDRAF_rally" title="2007 HINDRAF rally"><span data-dcnode-id="3614" instrument_node="">2007 HINDRAF rally</span></a></div><span data-dcnode-id="3611" instrument_node="">
</span><p data-dcnode-id="3598"><span data-dcnode-id="3610" instrument_node="">Between April to May 2006, several Hindu temples were demolished by city hall authorities in the country, accompanied by violence against Hindus.</span><sup class="reference" data-dcnode-id="3607" id="cite_ref-37"><a data-dcnode-id="3608" href="#cite_note-37"><span data-dcnode-id="3609" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3606" instrument_node=""> On 21 April 2006, the Malaimel Sri Selva Kaliamman Temple in </span><a data-dcnode-id="3604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kuala_Lumpur" title="Kuala Lumpur"><span data-dcnode-id="3605" instrument_node="">Kuala Lumpur</span></a><span data-dcnode-id="3603" instrument_node=""> was reduced to rubble after the city hall sent in bulldozers.</span><sup class="reference" data-dcnode-id="3600" id="cite_ref-38"><a data-dcnode-id="3601" href="#cite_note-38"><span data-dcnode-id="3602" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3599" instrument_node=""> The authorities' excuse was that these temples were unlicensed and squatting on government land.
</span></p><span data-dcnode-id="3597" instrument_node="">
</span><h2 data-dcnode-id="3587"><span class="mw-headline" data-dcnode-id="3595" id="LGBT_rights"><span data-dcnode-id="3596" instrument_node="">LGBT rights</span></span><span class="mw-editsection" data-dcnode-id="3588"><span class="mw-editsection-bracket" data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">[</span></span><a data-dcnode-id="3591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D32" title="Edit section: LGBT rights"><span data-dcnode-id="3592" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3586" instrument_node="">
</span><link data-dcnode-id="3585" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3581" role="note"><span data-dcnode-id="3584" instrument_node="">Main article: </span><a data-dcnode-id="3582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/LGBT_rights_in_Malaysia" title="LGBT rights in Malaysia"><span data-dcnode-id="3583" instrument_node="">LGBT rights in Malaysia</span></a></div><span data-dcnode-id="3580" instrument_node="">
</span><p data-dcnode-id="3556"><span data-dcnode-id="3579" instrument_node="">Both section 377 of the Penal Code as well as several state-level laws criminalise </span><a data-dcnode-id="3577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homosexuality" title="Homosexuality"><span data-dcnode-id="3578" instrument_node="">homosexuality</span></a><span data-dcnode-id="3576" instrument_node=""> and </span><a data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sodomy" title="Sodomy"><span data-dcnode-id="3575" instrument_node="">sodomy</span></a><span data-dcnode-id="3573" instrument_node="">.</span><sup class="reference" data-dcnode-id="3570" id="cite_ref-malaysianbar_39-0"><a data-dcnode-id="3571" href="#cite_note-malaysianbar-39"><span data-dcnode-id="3572" instrument_node="">[39]</span></a></sup><span data-dcnode-id="3569" instrument_node=""> Laws forbidding sodomy and unnatural carnal intercourse are occasionally enforced, and there is considerable social prejudice founded in the Islamic view of homosexuality,</span><sup class="reference" data-dcnode-id="3566" id="cite_ref-state_15-6"><a data-dcnode-id="3567" href="#cite_note-state-15"><span data-dcnode-id="3568" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3565" instrument_node=""> although the situation in this regard is reportedly improving. Gays are not permitted to appear in the state media,</span><sup class="reference" data-dcnode-id="3562" id="cite_ref-40"><a data-dcnode-id="3563" href="#cite_note-40"><span data-dcnode-id="3564" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3561" instrument_node=""> and cannot be depicted in films unless they "repent" or die.</span><sup class="reference" data-dcnode-id="3558" id="cite_ref-41"><a data-dcnode-id="3559" href="#cite_note-41"><span data-dcnode-id="3560" instrument_node="">[41]</span></a></sup><span data-dcnode-id="3557" instrument_node="">
</span></p><p data-dcnode-id="3545"><span data-dcnode-id="3555" instrument_node="">In two speeches given in June and July 2012 to Muslim groups, </span><a data-dcnode-id="3553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prime_Minister_of_Malaysia" title="Prime Minister of Malaysia"><span data-dcnode-id="3554" instrument_node="">Prime Minister</span></a><span data-dcnode-id="3552" instrument_node=""> </span><a data-dcnode-id="3550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Najib_Razak" title="Najib Razak"><span data-dcnode-id="3551" instrument_node="">Najib Razak</span></a><span data-dcnode-id="3549" instrument_node=""> described gays as a "deviant culture" that had no place in Malaysia. In December of that year, </span><a data-dcnode-id="3547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_Rights_Watch" title="Human Rights Watch"><span data-dcnode-id="3548" instrument_node="">Human Rights Watch</span></a><span data-dcnode-id="3546" instrument_node=""> decried Najib's remarks, saying that his "actions against LGBT people are a glaring contradiction to his self-proclaimed profile as a 'global moderate' leader." Those actions include shutting down a November 2011 sexual-diversity festival and a government programme to train people to "convert gays".
</span></p><p data-dcnode-id="3536"><span data-dcnode-id="3544" instrument_node="">The Malaysian establishment's view of LGBT rights was reflected in a 12 September 2012, letter to a Malaysian newspaper by the vice president of the Muslim Lawyers Association of Malaysia, Azril Mohd Amin. Writing about the proposed declaration of human rights by the </span><a data-dcnode-id="3542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ASEAN" title="ASEAN"><span data-dcnode-id="3543" instrument_node="">ASEAN</span></a><span data-dcnode-id="3541" instrument_node=""> countries, Azril, wrote that: "There will be attempts by LGBTs, NGOs, and various other activists to include LGBT rights and the right of absolute freedom of religion in the declaration." But if such rights were included in the declaration, "Malaysia as a Muslim-majority country would have to reiterate her strong objections; as such a policy clearly contradicts the principles enshrined in the religion of Islam." According social recognition to LGBT people "would be confusing and destructive to the development and witness of our own children... Malaysian and those who are against LGBT rights are thereby protecting the human race from the secular fallacy, perpetrated by the United Nations, that human beings may do as they please, within their so-called 'sovereign borders' (as laid down by the European powers)."</span><sup class="reference" data-dcnode-id="3538" id="cite_ref-malaysianbar_39-1"><a data-dcnode-id="3539" href="#cite_note-malaysianbar-39"><span data-dcnode-id="3540" instrument_node="">[39]</span></a></sup><span data-dcnode-id="3537" instrument_node="">
</span></p><span data-dcnode-id="3535" instrument_node="">
</span><h2 data-dcnode-id="3525"><span class="mw-headline" data-dcnode-id="3533" id="Rights_of_refugees_and_asylum_seekers"><span data-dcnode-id="3534" instrument_node="">Rights of refugees and asylum seekers</span></span><span class="mw-editsection" data-dcnode-id="3526"><span class="mw-editsection-bracket" data-dcnode-id="3531"><span data-dcnode-id="3532" instrument_node="">[</span></span><a data-dcnode-id="3529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D33" title="Edit section: Rights of refugees and asylum seekers"><span data-dcnode-id="3530" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3524" instrument_node="">
</span><p data-dcnode-id="3509"><span data-dcnode-id="3523" instrument_node="">Malaysia is not a party to the </span><a data-dcnode-id="3521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_Relating_to_the_Status_of_Refugees" title="Convention Relating to the Status of Refugees"><span data-dcnode-id="3522" instrument_node="">1951 United Nations Convention Relating to the Status of Refugees</span></a><span data-dcnode-id="3520" instrument_node=""> and its </span><a data-dcnode-id="3518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protocol_Relating_to_the_Status_of_Refugees" title="Protocol Relating to the Status of Refugees"><span data-dcnode-id="3519" instrument_node="">1967 Protocol</span></a><span data-dcnode-id="3517" instrument_node="">, and it has no provision for the granting of asylum or refugee status or for protecting persons from being returned to countries where their lives are in danger. Nonetheless, Malaysia does co-operate with the </span><a data-dcnode-id="3515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Human_Rights_Council" title="United Nations Human Rights Council"><span data-dcnode-id="3516" instrument_node="">United Nations Human Rights Council (UNHRC)</span></a><span data-dcnode-id="3514" instrument_node=""> by not deporting registered refugees whose resettlement in other nations is being arranged. Illegal immigrants and asylum seekers are held in immigration detention centres (IDCs). Since 2009, Malaysia has not deported persons carrying UNHRC refugee cards. Refugees may work but are not provided with access to education. Immigration officials used to be accused of trafficking IDC-held refugees to Thailand to be sold into slavery, but no such accusations were made in 2010.</span><sup class="reference" data-dcnode-id="3511" id="cite_ref-state_15-7"><a data-dcnode-id="3512" href="#cite_note-state-15"><span data-dcnode-id="3513" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3510" instrument_node="">
</span></p><p data-dcnode-id="3500"><span data-dcnode-id="3508" instrument_node="">According to </span><a data-dcnode-id="3506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amnesty_International" title="Amnesty International"><span data-dcnode-id="3507" instrument_node="">Amnesty International</span></a><span data-dcnode-id="3505" instrument_node="">, officers of RELA (Ikatan Relawan Rakyat), a civilian volunteer force empowered to arrest migrants and refugees, "often extort money from migrants and refugees, and sometimes beat them."</span><sup class="reference" data-dcnode-id="3502" id="cite_ref-amnestyusa_42-0"><a data-dcnode-id="3503" href="#cite_note-amnestyusa-42"><span data-dcnode-id="3504" instrument_node="">[42]</span></a></sup><span data-dcnode-id="3501" instrument_node="">
</span></p><span data-dcnode-id="3499" instrument_node="">
</span><h3 data-dcnode-id="3489"><span class="mw-headline" data-dcnode-id="3497" id="Rohingya_refugee_detainees"><span data-dcnode-id="3498" instrument_node="">Rohingya refugee detainees</span></span><span class="mw-editsection" data-dcnode-id="3490"><span class="mw-editsection-bracket" data-dcnode-id="3495"><span data-dcnode-id="3496" instrument_node="">[</span></span><a data-dcnode-id="3493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D34" title="Edit section: Rohingya refugee detainees"><span data-dcnode-id="3494" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3488" instrument_node="">
</span><p data-dcnode-id="3476"><span data-dcnode-id="3487" instrument_node="">Tens of thousands of </span><a data-dcnode-id="3485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rohingya_people" title="Rohingya people"><span data-dcnode-id="3486" instrument_node="">Rohingya</span></a><span data-dcnode-id="3484" instrument_node="">, a mostly Muslim minority who have long been persecuted in </span><a data-dcnode-id="3482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Myanmar" title="Myanmar"><span data-dcnode-id="3483" instrument_node="">Myanmar</span></a><span data-dcnode-id="3481" instrument_node="">, have sought safety in Malaysia with many risking dangerous boat journeys to get to the country following a brutal military crackdown in 2017. Malaysia detains these individuals in detention centers in order to deter others from entering the country. The United Nations refugee agency UNHCR It said it was ready to work with the Malaysian government on alternatives to detention, especially for children and the elderly. “Depriving individuals of their liberty in order to deter others from entering the country is unlawful, inhumane and ineffective,” the statement said. “Seeking asylum is not an unlawful act. In all cases detention should be a measure of last resort, should be authorized by the law and only undertaken if necessary and reasonable in all the circumstances, and proportionate to a legitimate aim.</span><sup class="reference" data-dcnode-id="3478" id="cite_ref-43"><a data-dcnode-id="3479" href="#cite_note-43"><span data-dcnode-id="3480" instrument_node="">[43]</span></a></sup><span data-dcnode-id="3477" instrument_node="">
</span></p><span data-dcnode-id="3475" instrument_node="">
</span><h2 data-dcnode-id="3465"><span class="mw-headline" data-dcnode-id="3473" id="Employee_rights"><span data-dcnode-id="3474" instrument_node="">Employee rights</span></span><span class="mw-editsection" data-dcnode-id="3466"><span class="mw-editsection-bracket" data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">[</span></span><a data-dcnode-id="3469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D35" title="Edit section: Employee rights"><span data-dcnode-id="3470" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3464" instrument_node="">
</span><p data-dcnode-id="3436"><span data-dcnode-id="3463" instrument_node="">Most workers can join unions, but this right is restricted by the Trade Unions Act (TUA) and the Industrial Relations Act (IRA), as well as by other laws limiting the </span><a data-dcnode-id="3461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_of_association" title="Freedom of association"><span data-dcnode-id="3462" instrument_node="">freedom of association</span></a><span data-dcnode-id="3460" instrument_node="">. The right to </span><a data-dcnode-id="3458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Strike_action" title="Strike action"><span data-dcnode-id="3459" instrument_node="">strike</span></a><span data-dcnode-id="3457" instrument_node=""> is so severely limited that stringent that striking is effectively all but possible. Private-sector workers are allowed to engage in </span><a data-dcnode-id="3455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collective_bargaining" title="Collective bargaining"><span data-dcnode-id="3456" instrument_node="">collective bargaining</span></a><span data-dcnode-id="3454" instrument_node="">. Malaysia's minimum wages policy is decided under the National Wages Consultative Council Act 2011 (Act 732). </span><a data-dcnode-id="3452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forced_labour" title="Forced labour"><span data-dcnode-id="3453" instrument_node="">Forced labour</span></a><span data-dcnode-id="3451" instrument_node=""> is illegal, but occurs, with many women and children essentially being forced to work in households, and many of them suffering abuse. Children under 14 are not allowed to work but some exceptions are permitted. The Employment Act limits working hours and imposes other restrictions, but they are not enforced strictly. The </span><a data-dcnode-id="3449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Department_of_Labor" title="United States Department of Labor"><span data-dcnode-id="3450" instrument_node="">United States Department of Labor</span></a><span data-dcnode-id="3448" instrument_node="">'s </span><i data-dcnode-id="3445"><a data-dcnode-id="3446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_Goods_Produced_by_Child_Labor_or_Forced_Labor" title="List of Goods Produced by Child Labor or Forced Labor"><span data-dcnode-id="3447" instrument_node="">List of Goods Produced by Child Labor or Forced Labor</span></a></i><span data-dcnode-id="3444" instrument_node=""> indicates that instances of child labour and forced labour have been observed in the electronics and the textile industries as well as in the </span><a data-dcnode-id="3442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palm_oil_production_in_Malaysia" title="Palm oil production in Malaysia"><span data-dcnode-id="3443" instrument_node="">production of palm oil</span></a><span data-dcnode-id="3441" instrument_node="">. Many foreign employees work under unfair and abusive conditions, with employers withholding pay and confiscating passports. There is an Occupational Safety and Health Act, but workers who walk out of dangerous workplaces are subject to dismissal.</span><sup class="reference" data-dcnode-id="3438" id="cite_ref-state_15-8"><a data-dcnode-id="3439" href="#cite_note-state-15"><span data-dcnode-id="3440" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3437" instrument_node="">
</span></p><span data-dcnode-id="3435" instrument_node="">
</span><h3 data-dcnode-id="3425"><span class="mw-headline" data-dcnode-id="3433" id="Forced_labour_concerns"><span data-dcnode-id="3434" instrument_node="">Forced labour concerns</span></span><span class="mw-editsection" data-dcnode-id="3426"><span class="mw-editsection-bracket" data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">[</span></span><a data-dcnode-id="3429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D36" title="Edit section: Forced labour concerns"><span data-dcnode-id="3430" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3424" instrument_node="">
</span><p data-dcnode-id="3398"><span data-dcnode-id="3423" instrument_node="">In 2020, the U.S. Customs and Border Protection (CBP) had banned Malaysian products of </span><a data-dcnode-id="3421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sime_Darby" title="Sime Darby"><span data-dcnode-id="3422" instrument_node="">Sime Darby Plantation</span></a><span data-dcnode-id="3420" instrument_node="">, the world's biggest palm oil planter by land size, from entering the United States, citing reasonable suspicion of use of forced labour. That allowed the authorities to detain goods at ports.</span><sup class="reference" data-dcnode-id="3417" id="cite_ref-44"><a data-dcnode-id="3418" href="#cite_note-44"><span data-dcnode-id="3419" instrument_node="">[44]</span></a></sup><span data-dcnode-id="3416" instrument_node=""> In January 2022, the </span><a data-dcnode-id="3414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._Customs_and_Border_Protection" title="U.S. Customs and Border Protection"><span data-dcnode-id="3415" instrument_node="">U.S. Customs and Border Protection</span></a><span data-dcnode-id="3413" instrument_node=""> (CBP) published a finding that </span><a data-dcnode-id="3411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sime_Darby" title="Sime Darby"><span data-dcnode-id="3412" instrument_node="">Sime Darby</span></a><span data-dcnode-id="3410" instrument_node=""> Plantation was using forced labour on its plantations in Malaysia to harvest fresh fruit bunches used to extract palm oil and produce derivatives. This finding would allow CBP to seize the firm's products.</span><sup class="reference" data-dcnode-id="3407" id="cite_ref-45"><a data-dcnode-id="3408" href="#cite_note-45"><span data-dcnode-id="3409" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3406" instrument_node=""> In April 2022, </span><a data-dcnode-id="3404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cargill" title="Cargill"><span data-dcnode-id="3405" instrument_node="">Cargil</span></a><span data-dcnode-id="3403" instrument_node=""> announced that it had halted palm oil purchases from Sime Darby as the company had not presented sufficient information to address forced labor allegations by the U.S.</span><sup class="reference" data-dcnode-id="3400" id="cite_ref-46"><a data-dcnode-id="3401" href="#cite_note-46"><span data-dcnode-id="3402" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3399" instrument_node="">
</span></p><span data-dcnode-id="3397" instrument_node="">
</span><h3 data-dcnode-id="3387"><span class="mw-headline" data-dcnode-id="3395" id="Migrant_worker_housing_standards"><span data-dcnode-id="3396" instrument_node="">Migrant worker housing standards</span></span><span class="mw-editsection" data-dcnode-id="3388"><span class="mw-editsection-bracket" data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">[</span></span><a data-dcnode-id="3391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D37" title="Edit section: Migrant worker housing standards"><span data-dcnode-id="3392" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3386" instrument_node="">
</span><p data-dcnode-id="3373"><span data-dcnode-id="3385" instrument_node="">The vast majority of Malaysia's 2 million documented migrant workers live in accommodation that does not meet Malaysia's housing standards, according to the </span><a data-dcnode-id="3383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Human_Resources_%28Malaysia%29" title="Ministry of Human Resources (Malaysia)"><span data-dcnode-id="3384" instrument_node="">Ministry of Human Resources</span></a><span data-dcnode-id="3382" instrument_node="">.</span><sup class="reference" data-dcnode-id="3379" id="cite_ref-:0_47-0"><a data-dcnode-id="3380" href="#cite_note-:0-47"><span data-dcnode-id="3381" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3378" instrument_node=""> Companies have been accused of demanding excessive overtime, not paying wages, retaining workers’ identity documents and keeping them in debt bondage.</span><sup class="reference" data-dcnode-id="3375" id="cite_ref-:0_47-1"><a data-dcnode-id="3376" href="#cite_note-:0-47"><span data-dcnode-id="3377" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3374" instrument_node="">
</span></p><p data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">Pact with Indonesia
</span></p><p data-dcnode-id="3365"><span data-dcnode-id="3370" instrument_node="">On 1 April 2022, Malaysia and Indonesia signed a memorandum of understanding on the placement and protection on Indonesian migrant workers in Malaysia. The One Channel System regulates the entire process of recruiting, placing and repatriating Indonesian migrant workers in Malaysia.</span><sup class="reference" data-dcnode-id="3367" id="cite_ref-48"><a data-dcnode-id="3368" href="#cite_note-48"><span data-dcnode-id="3369" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3366" instrument_node="">
</span></p><span data-dcnode-id="3364" instrument_node="">
</span><h2 data-dcnode-id="3354"><span class="mw-headline" data-dcnode-id="3362" id="Rights_of_persons_under_arrest"><span data-dcnode-id="3363" instrument_node="">Rights of persons under arrest</span></span><span class="mw-editsection" data-dcnode-id="3355"><span class="mw-editsection-bracket" data-dcnode-id="3360"><span data-dcnode-id="3361" instrument_node="">[</span></span><a data-dcnode-id="3358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D38" title="Edit section: Rights of persons under arrest"><span data-dcnode-id="3359" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3353" instrument_node="">
</span><p data-dcnode-id="3335"><span data-dcnode-id="3352" instrument_node="">Warrantless arrests are not permitted, and suspects may be held without charge for up to three weeks with a magistrate's permission. Suspects are sometimes released and then re-arrested, often questioned without being offered legal representation, and occasionally denied family visits. Detention of material witnesses in criminal cases is permitted. Pre-trial detention can last several years. Several laws permit the detention of suspects without judicial review or the filing of charges.</span><sup class="reference" data-dcnode-id="3349" id="cite_ref-state_15-9"><a data-dcnode-id="3350" href="#cite_note-state-15"><span data-dcnode-id="3351" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3348" instrument_node=""> In addition, there have been several cases of extra-judicial </span><a data-dcnode-id="3346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enforced_disappearance" title="Enforced disappearance"><span data-dcnode-id="3347" instrument_node="">enforced disappearances</span></a><span data-dcnode-id="3345" instrument_node="">: </span><a data-dcnode-id="3343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raymond_Koh" title="Raymond Koh"><span data-dcnode-id="3344" instrument_node="">Raymond Koh</span></a><span data-dcnode-id="3342" instrument_node=""> and </span><a data-dcnode-id="3340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amri_Che_Mat" title="Amri Che Mat"><span data-dcnode-id="3341" instrument_node="">Amri Che Mat</span></a><span data-dcnode-id="3339" instrument_node=""> were abducted by agents of the </span><a data-dcnode-id="3337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malaysian_Special_Branch" title="Malaysian Special Branch"><span data-dcnode-id="3338" instrument_node="">Malaysian Special Branch</span></a><span data-dcnode-id="3336" instrument_node="">.
</span></p><p data-dcnode-id="3323"><span data-dcnode-id="3334" instrument_node="">Under the Internal Security Act (ISA), police were permitted to arrest and detain for 60 days, without warrant or counsel or judicial review, persons who acted "in a manner prejudicial to the national security or economic life of Malaysia." The ISA did not permit judicial review of most ISA decisions, and the </span><a data-dcnode-id="3332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Human_Rights_Council" title="United Nations Human Rights Council"><span data-dcnode-id="3333" instrument_node="">United Nations Human Rights Council</span></a><span data-dcnode-id="3331" instrument_node=""> considered the ISA inconsistent with the </span><a data-dcnode-id="3329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_Declaration_of_Human_Rights" title="Universal Declaration of Human Rights"><span data-dcnode-id="3330" instrument_node="">Universal Declaration of Human Rights</span></a><span data-dcnode-id="3328" instrument_node="">. Under SOSMA, "initial police detention is cut to a maximum of 28 days, after which the attorney-general must decide whether to prosecute and on what charges." But "judicial oversight is notably absent during the first 24 hours of police custody and such absence can be extended to the entire 28-day investigatory period." While SOSMA "promised to ease incommunicado detention by mandating immediate notification of next-of-kin and access to a lawyer chosen by the suspect," in fact "initial access can be postponed for 48 hours should a higher level police officer consider it prudent; another serious violation of an individual's due process rights."</span><sup class="reference" data-dcnode-id="3325" id="cite_ref-hrw_49-0"><a data-dcnode-id="3326" href="#cite_note-hrw-49"><span data-dcnode-id="3327" instrument_node="">[49]</span></a></sup><span data-dcnode-id="3324" instrument_node="">
</span></p><p data-dcnode-id="3318"><span data-dcnode-id="3322" instrument_node="">The Emergency Ordinance (EO) empowers the </span><a data-dcnode-id="3320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Home_Affairs_%28Malaysia%29" title="Ministry of Home Affairs (Malaysia)"><span data-dcnode-id="3321" instrument_node="">Home Affairs Minister</span></a><span data-dcnode-id="3319" instrument_node=""> to issue an order to detain persons for up to two years to preserve public order or prevent violent crimes. In 2009, 548 persons were held under the EO. Suspected drug traffickers, including those already freed by ordinary court processes, may be arrested and held for 39 days without trial or a detention order, and thereafter held without charge indefinitely, with their detention approved every two years by an advisory board. In 2009, over 1,000 persons were detained in this fashion. Under the Restricted Residence Act, the Home Affairs Minister may compel individuals to live in residences other than their homes and to remain within the neighbourhood; such an order can be renewed indefinitely by authorities.
</span></p><p data-dcnode-id="3312"><span data-dcnode-id="3317" instrument_node="">In 2009 alone, police killed 108 persons during arrests. Torture as such is not illegal. In the past there were many allegations of abuse in immigration detention centres and of persons detained under the ISA, but the number of such allegations declined considerably in 2010.</span><sup class="reference" data-dcnode-id="3314" id="cite_ref-state_15-10"><a data-dcnode-id="3315" href="#cite_note-state-15"><span data-dcnode-id="3316" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3313" instrument_node="">
</span></p><p data-dcnode-id="3306"><span data-dcnode-id="3311" instrument_node="">In 2017, Ri Jong Chol, a North Korean citizen living in Malaysia, was arrested as a murder suspect. After his release, Ri told the media that he was coerced into making false accusations and that the police had threatened to hurt his wife and two children.</span><sup class="reference" data-dcnode-id="3308" id="cite_ref-50"><a data-dcnode-id="3309" href="#cite_note-50"><span data-dcnode-id="3310" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3307" instrument_node="">
</span></p><span data-dcnode-id="3305" instrument_node="">
</span><h2 data-dcnode-id="3295"><span class="mw-headline" data-dcnode-id="3303" id="Rights_of_persons_on_trial"><span data-dcnode-id="3304" instrument_node="">Rights of persons on trial</span></span><span class="mw-editsection" data-dcnode-id="3296"><span class="mw-editsection-bracket" data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">[</span></span><a data-dcnode-id="3299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D39" title="Edit section: Rights of persons on trial"><span data-dcnode-id="3300" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3294" instrument_node="">
</span><link data-dcnode-id="3293" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3289" role="note"><span data-dcnode-id="3292" instrument_node="">Main article: </span><a data-dcnode-id="3290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Law_of_Malaysia" title="Law of Malaysia"><span data-dcnode-id="3291" instrument_node="">Law of Malaysia</span></a></div><span data-dcnode-id="3288" instrument_node="">
</span><p data-dcnode-id="3274"><span data-dcnode-id="3287" instrument_node="">The </span><a data-dcnode-id="3285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_Malaysia" title="Constitution of Malaysia"><span data-dcnode-id="3286" instrument_node="">Constitution of Malaysia</span></a><span data-dcnode-id="3284" instrument_node=""> is self-contradictory on the judiciary; on one hand it provides for the country's independence while on the other hand it limits that independence. The Constitution provides for a dual justice system, under which secular law and </span><a data-dcnode-id="3282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sharia" title="Sharia"><span data-dcnode-id="3283" instrument_node="">sharia</span></a><span data-dcnode-id="3281" instrument_node=""> (syariah) law are both recognised, and secular criminal and civil courts co-exist with sharia courts. Sharia law applies only to, and sharia courts have jurisdiction over, only Muslims. In some states, sharia courts solely or principally adjudicate </span><a data-dcnode-id="3279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Family_law" title="Family law"><span data-dcnode-id="3280" instrument_node="">family and personal law</span></a><span data-dcnode-id="3278" instrument_node="">, while in other states they are empowered to pass judgment on </span><a data-dcnode-id="3276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Criminal_law" title="Criminal law"><span data-dcnode-id="3277" instrument_node="">criminal matters</span></a><span data-dcnode-id="3275" instrument_node="">.
</span></p><p data-dcnode-id="3269"><span data-dcnode-id="3273" instrument_node="">Malaysia's secular law is based on </span><a data-dcnode-id="3271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/English_law" title="English law"><span data-dcnode-id="3272" instrument_node="">English common law</span></a><span data-dcnode-id="3270" instrument_node="">. Defendants in serious criminal cases are entitled to government-paid lawyers. Pre-trial discovery in criminal cases is limited. Testimony by witnesses is sometimes disallowed. Defendants are not routinely entitled to see evidence held by the government. The right to appeal is sometimes restricted.
</span></p><p data-dcnode-id="3259"><a data-dcnode-id="3267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Due_process" title="Due process"><span data-dcnode-id="3268" instrument_node="">Due process</span></a><span data-dcnode-id="3266" instrument_node=""> rights are sometimes compromised. Women do not enjoy equal treatment in sharia courts, especially in </span><a data-dcnode-id="3264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Divorce" title="Divorce"><span data-dcnode-id="3265" instrument_node="">divorce</span></a><span data-dcnode-id="3263" instrument_node=""> and </span><a data-dcnode-id="3261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Child_custody" title="Child custody"><span data-dcnode-id="3262" instrument_node="">child custody</span></a><span data-dcnode-id="3260" instrument_node=""> cases.
</span></p><p data-dcnode-id="3246"><a data-dcnode-id="3257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right_to_privacy" title="Right to privacy"><span data-dcnode-id="3258" instrument_node="">Privacy rights</span></a><span data-dcnode-id="3256" instrument_node=""> are sometimes infringed upon, with the authorities monitoring emails sent to websites and police permitted to search homes, confiscate items, and take people into custody without a warrant. Officials from the </span><a data-dcnode-id="3254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Department_of_Islamic_Development_Malaysia" title="Department of Islamic Development Malaysia"><span data-dcnode-id="3255" instrument_node="">Department of Islamic Development Malaysia (JAKIM)</span></a><span data-dcnode-id="3253" instrument_node=""> may even enter private premises without a warrant if they suspect Muslims are gambling, consuming alcohol, or committing adultery. Messages sent or received by individuals suspected of </span><a data-dcnode-id="3251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corruption" title="Corruption"><span data-dcnode-id="3252" instrument_node="">corruption</span></a><span data-dcnode-id="3250" instrument_node=""> or </span><a data-dcnode-id="3248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terrorism" title="Terrorism"><span data-dcnode-id="3249" instrument_node="">terrorism</span></a><span data-dcnode-id="3247" instrument_node=""> may be intercepted.
</span></p><p data-dcnode-id="3234"><span data-dcnode-id="3245" instrument_node="">Under the new </span><a data-dcnode-id="3243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Security_Offences_%28Special_Measures%29_Act_2012" title="Security Offences (Special Measures) Act 2012"><span data-dcnode-id="3244" instrument_node="">SOSMA</span></a><span data-dcnode-id="3242" instrument_node=""> legislation, the prosecutor at a trial is permitted to keep secret the identity of prosecution witnesses, thus preventing </span><a data-dcnode-id="3240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cross-examination" title="Cross-examination"><span data-dcnode-id="3241" instrument_node="">cross-examination</span></a><span data-dcnode-id="3239" instrument_node="">. SOSMA also revised the rules of evidence, enabling prosecutors to use information without disclosing sources.</span><sup class="reference" data-dcnode-id="3236" id="cite_ref-hrw_49-1"><a data-dcnode-id="3237" href="#cite_note-hrw-49"><span data-dcnode-id="3238" instrument_node="">[49]</span></a></sup><span data-dcnode-id="3235" instrument_node="">
</span></p><span data-dcnode-id="3233" instrument_node="">
</span><h2 data-dcnode-id="3223"><span class="mw-headline" data-dcnode-id="3231" id="Rights_of_inmates"><span data-dcnode-id="3232" instrument_node="">Rights of inmates</span></span><span class="mw-editsection" data-dcnode-id="3224"><span class="mw-editsection-bracket" data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">[</span></span><a data-dcnode-id="3227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D40" title="Edit section: Rights of inmates"><span data-dcnode-id="3228" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3222" instrument_node="">
</span><p data-dcnode-id="3213"><span data-dcnode-id="3221" instrument_node="">Prisoners suffer from overcrowding, poor food, and irregular water supplies. Inmates are allowed visitors. Religious observance is allowed, provided the religion in question is not one of 56 Islamic sects considered "deviant". Medical care is poor, with hundreds dying of communicable diseases in immigration detention centres, prisons, and jails from 2001 to 2007. Non-governmental organisations and the media are usually not allowed to monitor conditions in prison. Preventive and investigative detention are permitted. Police are provided with human rights training. </span><a data-dcnode-id="3219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caning_in_Malaysia" title="Caning in Malaysia"><span data-dcnode-id="3220" instrument_node="">Caning</span></a><span data-dcnode-id="3218" instrument_node=""> is allowed as a disciplinary measure for aggravated offences committed by inmates while they are serving their sentences in prison.</span><sup class="reference" data-dcnode-id="3215" id="cite_ref-state_15-11"><a data-dcnode-id="3216" href="#cite_note-state-15"><span data-dcnode-id="3217" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3214" instrument_node="">
</span></p><span data-dcnode-id="3212" instrument_node="">
</span><h2 data-dcnode-id="3202"><span class="mw-headline" data-dcnode-id="3210" id="Capital_and_corporal_punishment"><span data-dcnode-id="3211" instrument_node="">Capital and corporal punishment</span></span><span class="mw-editsection" data-dcnode-id="3203"><span class="mw-editsection-bracket" data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">[</span></span><a data-dcnode-id="3206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D41" title="Edit section: Capital and corporal punishment"><span data-dcnode-id="3207" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3204"><span data-dcnode-id="3205" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3201" instrument_node="">
</span><link data-dcnode-id="3200" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3193" role="note"><span data-dcnode-id="3199" instrument_node="">Main articles: </span><a data-dcnode-id="3197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_punishment_in_Malaysia" title="Capital punishment in Malaysia"><span data-dcnode-id="3198" instrument_node="">Capital punishment in Malaysia</span></a><span data-dcnode-id="3196" instrument_node=""> and </span><a data-dcnode-id="3194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caning_in_Malaysia" title="Caning in Malaysia"><span data-dcnode-id="3195" instrument_node="">Caning in Malaysia</span></a></div><span data-dcnode-id="3192" instrument_node="">
</span><p data-dcnode-id="3168"><span data-dcnode-id="3191" instrument_node="">Malaysia retains both </span><a data-dcnode-id="3189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_punishment" title="Capital punishment"><span data-dcnode-id="3190" instrument_node="">capital punishment</span></a><span data-dcnode-id="3188" instrument_node=""> (in the form of </span><a data-dcnode-id="3186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hanging%23Long_drop" title="Hanging"><span data-dcnode-id="3187" instrument_node="">long-drop hanging</span></a><span data-dcnode-id="3185" instrument_node="">) and </span><a data-dcnode-id="3183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Judicial_corporal_punishment" title="Judicial corporal punishment"><span data-dcnode-id="3184" instrument_node="">corporal punishment</span></a><span data-dcnode-id="3182" instrument_node=""> (in the form of </span><a data-dcnode-id="3180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caning" title="Caning"><span data-dcnode-id="3181" instrument_node="">caning</span></a><span data-dcnode-id="3179" instrument_node=""> on the bare buttocks) for certain criminal offences; the latter is applicable only to male criminals. A 6 December 2010 report by </span><a data-dcnode-id="3177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amnesty_International" title="Amnesty International"><span data-dcnode-id="3178" instrument_node="">Amnesty International</span></a><span data-dcnode-id="3176" instrument_node=""> entitled </span><i data-dcnode-id="3174"><span data-dcnode-id="3175" instrument_node="">A Blow to Humanity</span></i><span data-dcnode-id="3173" instrument_node=""> criticises the practice of judicial caning in Malaysia and concludes the punishment "subjects thousands of people each year to systematic torture and ill-treatment, leaving them with permanent physical and psychological scars". The report describes the process as follows: "In Malaysian prisons specially trained caning officers tear into victims' bodies with a metre-long cane swung with both hands at high speed. The cane rips into the victim’s naked skin, pulps the fatty tissue below, and leaves scars that extend to muscle fibre. The pain is so severe that victims often lose consciousness."</span><sup class="reference" data-dcnode-id="3170" id="cite_ref-51"><a data-dcnode-id="3171" href="#cite_note-51"><span data-dcnode-id="3172" instrument_node="">[51]</span></a></sup><span data-dcnode-id="3169" instrument_node="">
</span></p><p data-dcnode-id="3156"><span data-dcnode-id="3167" instrument_node="">Under </span><a data-dcnode-id="3165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sharia" title="Sharia"><span data-dcnode-id="3166" instrument_node="">sharia</span></a><span data-dcnode-id="3164" instrument_node=""> law, several dozen offences, such as alcohol consumption, are punishable by </span><a data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caning_in_Malaysia%23Sharia_caning" title="Caning in Malaysia"><span data-dcnode-id="3163" instrument_node="">sharia-style caning</span></a><span data-dcnode-id="3161" instrument_node="">, which is different from judicial caning and is applicable to both male and female Muslims.</span><sup class="reference" data-dcnode-id="3158" id="cite_ref-state_15-12"><a data-dcnode-id="3159" href="#cite_note-state-15"><span data-dcnode-id="3160" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3157" instrument_node="">
</span></p><p data-dcnode-id="3150"><span data-dcnode-id="3155" instrument_node="">Under Malaysian criminal law, the death penalty is mandatory for persons found guilty of possessing illegal drugs above certain quantities; in 2010, 114 people were sentenced to death.</span><sup class="reference" data-dcnode-id="3152" id="cite_ref-amnestyusa_42-1"><a data-dcnode-id="3153" href="#cite_note-amnestyusa-42"><span data-dcnode-id="3154" instrument_node="">[42]</span></a></sup><span data-dcnode-id="3151" instrument_node="">
</span></p><span data-dcnode-id="3149" instrument_node="">
</span><h2 data-dcnode-id="3139"><span class="mw-headline" data-dcnode-id="3147" id="Political_controversies"><span data-dcnode-id="3148" instrument_node="">Political controversies</span></span><span class="mw-editsection" data-dcnode-id="3140"><span class="mw-editsection-bracket" data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">[</span></span><a data-dcnode-id="3143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D42" title="Edit section: Political controversies"><span data-dcnode-id="3144" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3138" instrument_node="">
</span><p data-dcnode-id="3103"><span data-dcnode-id="3137" instrument_node="">In November 2007, two of the largest political rallies since 1998 took place in </span><a data-dcnode-id="3135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kuala_Lumpur" title="Kuala Lumpur"><span data-dcnode-id="3136" instrument_node="">Kuala Lumpur</span></a><span data-dcnode-id="3134" instrument_node="">, challenging the government of </span><a data-dcnode-id="3132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prime_Minister_of_Malaysia" title="Prime Minister of Malaysia"><span data-dcnode-id="3133" instrument_node="">Prime Minister</span></a><span data-dcnode-id="3131" instrument_node=""> </span><a data-dcnode-id="3129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abdullah_Ahmad_Badawi" title="Abdullah Ahmad Badawi"><span data-dcnode-id="3130" instrument_node="">Abdullah Badawi</span></a><span data-dcnode-id="3128" instrument_node="">. The </span><a data-dcnode-id="3126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2007_Bersih_rally" title="2007 Bersih rally"><span data-dcnode-id="3127" instrument_node="">Bersih rally</span></a><span data-dcnode-id="3125" instrument_node=""> was held on 10 November and the </span><a class="mw-redirect" data-dcnode-id="3123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hindu_Rights_Action_Force" title="Hindu Rights Action Force"><span data-dcnode-id="3124" instrument_node="">Hindu Rights Action Force</span></a><span data-dcnode-id="3122" instrument_node=""> rally on 25 November. The Bersih rally was organised by a number of non-governmental organisations and opposition political parties to demand </span><a data-dcnode-id="3120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;ur
