</span><p data-dcnode-id="5074"><span data-dcnode-id="5091" instrument_node="">The protection of basic human rights is enshrined in </span><a data-dcnode-id="5089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_Malaysia" title="Constitution of Malaysia"><span data-dcnode-id="5090" instrument_node="">Constitution of Malaysia</span></a><span data-dcnode-id="5088" instrument_node="">. These include liberty of the person (Article 5) and prohibition of slavery and forced labour (Article 6).  At the national level, legislative measures that exist to prevent human rights violations and abuses can be found in acts and laws on issues that either have a human rights component or relate to certain groups of society whose rights may be at risk of being violated. Human rights groups are generally critical of the Malaysian government and the </span><a data-dcnode-id="5086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_Malaysia_Police" title="Royal Malaysia Police"><span data-dcnode-id="5087" instrument_node="">Royal Malaysia Police</span></a><span data-dcnode-id="5085" instrument_node="">. Preventive detention laws such as the </span><a class="mw-redirect" data-dcnode-id="5083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internal_Security_Act_%28Malaysia%29" title="Internal Security Act (Malaysia)"><span data-dcnode-id="5084" instrument_node="">Internal Security Act</span></a><span data-dcnode-id="5082" instrument_node=""> and the Emergency (Public Order and Prevention of Crime) Ordinance 1969 allow for detention without trial or charge and as such are a source of concern for human rights organizations like </span><a data-dcnode-id="5080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suara_Rakyat_Malaysia" title="Suara Rakyat Malaysia"><span data-dcnode-id="5081" instrument_node="">Suara Rakyat Malaysia</span></a><span data-dcnode-id="5079" instrument_node="">.</span><sup class="reference" data-dcnode-id="5076" id="cite_ref-1"><a data-dcnode-id="5077" href="#cite_note-1"><span data-dcnode-id="5078" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5075" instrument_node="">

</span><h2 data-dcnode-id="4659"><span class="mw-headline" data-dcnode-id="4667" id="Legislation"><span data-dcnode-id="4668" instrument_node="">Legislation</span></span><span class="mw-editsection" data-dcnode-id="4660"><span class="mw-editsection-bracket" data-dcnode-id="4665"><span data-dcnode-id="4666" instrument_node="">[</span></span><a data-dcnode-id="4663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D1" title="Edit section: Legislation"><span data-dcnode-id="4664" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4661"><span data-dcnode-id="4662" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4658" instrument_node="">
</span><p data-dcnode-id="4656"><span data-dcnode-id="4657" instrument_node="">Several Malaysian laws are said to restrict basic human rights. Recent sweeping changes in these laws have been described by the government as human rights reforms but, according to critics, have actually, in some regards, made restrictions even more stringent.
</span></p><p data-dcnode-id="4641"><span data-dcnode-id="4655" instrument_node="">The </span><a data-dcnode-id="4653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Foreign_Affairs_%28Malaysia%29" title="Ministry of Foreign Affairs (Malaysia)"><span data-dcnode-id="4654" instrument_node="">Ministry of Foreign Affairs</span></a><span data-dcnode-id="4652" instrument_node=""> has defended the country's strict controls on human rights with the explanation that the nation "takes a holistic approach to human rights in that it views all rights as indivisible and interdependent. In Malaysia, the rights of every citizen are protected by legal provisions in the </span><a data-dcnode-id="4650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_Malaysia" title="Constitution of Malaysia"><span data-dcnode-id="4651" instrument_node="">Federal Constitution</span></a><span data-dcnode-id="4649" instrument_node="">... But these rights are not absolute and are subject to, among others, public order, morality and security of the country." Hence, while claiming to "uphold... the universal principles of human rights," Malaysia finds it important to "take into account the history of the country as well as the religious, social and cultural diversities of its communities. This is to ensure that the respect for social harmony is preserved and protected. The practices of human rights in Malaysia are reflections of </span><a data-dcnode-id="4647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asian_values" title="Asian values"><span data-dcnode-id="4648" instrument_node="">a wider Asian value system</span></a><span data-dcnode-id="4646" instrument_node=""> where welfare and collective well-being of the community are more significant compared to individual rights."</span><sup class="reference" data-dcnode-id="4643" id="cite_ref-2"><a data-dcnode-id="4644" href="#cite_note-2"><span data-dcnode-id="4645" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4642" instrument_node="">
</span></p><span data-dcnode-id="4640" instrument_node="">
</span><h3 data-dcnode-id="4630"><span class="mw-headline" data-dcnode-id="4638" id="Traditional_restrictive_legislation"><span data-dcnode-id="4639" instrument_node="">Traditional restrictive legislation</span></span><span class="mw-editsection" data-dcnode-id="4631"><span class="mw-editsection-bracket" data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">[</span></span><a data-dcnode-id="4634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D2" title="Edit section: Traditional restrictive legislation"><span data-dcnode-id="4635" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4632"><span data-dcnode-id="4633" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4629" instrument_node="">
</span><p data-dcnode-id="4614"><span data-dcnode-id="4628" instrument_node="">There are several strong and sweeping pieces of legislation that have long been used by Malaysia to restrict the human rights of individuals and thus preserve, in its view, social order. In 2008, </span><a data-dcnode-id="4626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amnesty_International" title="Amnesty International"><span data-dcnode-id="4627" instrument_node="">Amnesty International</span></a><span data-dcnode-id="4625" instrument_node=""> summed up the state of human rights in Malaysia, in part, by noting that the government had "tightened control of dissent and curtailed the right to </span><a data-dcnode-id="4623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_of_speech" title="Freedom of speech"><span data-dcnode-id="4624" instrument_node="">freedom of expression</span></a><span data-dcnode-id="4622" instrument_node=""> and </span><a data-dcnode-id="4620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_of_religion" title="Freedom of religion"><span data-dcnode-id="4621" instrument_node="">religion</span></a><span data-dcnode-id="4619" instrument_node="">," arresting bloggers under the Sedition Act, using the Printing Presses and Publications Act (PPPA) to control the content of newspapers, and arbitrarily arresting several individuals under the Internal Security Act (ISA).</span><sup class="reference" data-dcnode-id="4616" id="cite_ref-3"><a data-dcnode-id="4617" href="#cite_note-3"><span data-dcnode-id="4618" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4615" instrument_node=""> In 2012 there were major changes in a number of these laws that were officially described as human rights reforms but that have been widely criticised either for not going far enough or for, in fact, further restricting human rights.
</span></p><span data-dcnode-id="4613" instrument_node="">
</span><h3 data-dcnode-id="4603"><span class="mw-headline" data-dcnode-id="4611" id="Internal_Security_Act"><span data-dcnode-id="4612" instrument_node="">Internal Security Act</span></span><span class="mw-editsection" data-dcnode-id="4604"><span class="mw-editsection-bracket" data-dcnode-id="4609"><span data-dcnode-id="4610" instrument_node="">[</span></span><a data-dcnode-id="4607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D3" title="Edit section: Internal Security Act"><span data-dcnode-id="4608" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4605"><span data-dcnode-id="4606" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4602" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="4596" role="note"><span data-dcnode-id="4599" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="4597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internal_Security_Act_%28Malaysia%29" title="Internal Security Act (Malaysia)"><span data-dcnode-id="4598" instrument_node="">Internal Security Act (Malaysia)</span></a></div><span data-dcnode-id="4595" instrument_node="">
</span><p data-dcnode-id="4589"><span data-dcnode-id="4594" instrument_node="">Perhaps the best known of these laws is the Internal Security Act, which was passed in 1960, three years after Malaysia gained its independence from Britain. Widely viewed as draconian, it permits long-term detention without trial, and over the decades has been used systematically against individuals who have been viewed, for various reasons, as threats to Malaysia's government or to the "social order."</span><sup class="reference" data-dcnode-id="4591" id="cite_ref-4"><a data-dcnode-id="4592" href="#cite_note-4"><span data-dcnode-id="4593" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4590" instrument_node="">
</span></p><span data-dcnode-id="4588" instrument_node="">
</span><h3 data-dcnode-id="4578"><span class="mw-headline" data-dcnode-id="4586" id="Sedition_Act"><span data-dcnode-id="4587" instrument_node="">Sedition Act</span></span><span class="mw-editsection" data-dcnode-id="4579"><span class="mw-editsection-bracket" data-dcnode-id="4584"><span data-dcnode-id="4585" instrument_node="">[</span></span><a data-dcnode-id="4582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D4" title="Edit section: Sedition Act"><span data-dcnode-id="4583" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4580"><span data-dcnode-id="4581" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4577" instrument_node="">
</span><p data-dcnode-id="4575"><span data-dcnode-id="4576" instrument_node="">Another powerful and widely employed piece of legislation, which dates back to 1948, when Malaysia was still a British colony, is the Sedition Act, which criminalizes speech or writing that is considered to be seditious. A great many critics and political opponents of the Malaysian government have been arrested and held under the Sedition Act, the effect of which has been to restrict freedom of expression in Malaysia.
</span></p><span data-dcnode-id="4574" instrument_node="">
</span><h3 data-dcnode-id="4564"><span class="mw-headline" data-dcnode-id="4572" id="Printing_Presses_and_Publications_Act"><span data-dcnode-id="4573" instrument_node="">Printing Presses and Publications Act</span></span><span class="mw-editsection" data-dcnode-id="4565"><span class="mw-editsection-bracket" data-dcnode-id="4570"><span data-dcnode-id="4571" instrument_node="">[</span></span><a data-dcnode-id="4568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D5" title="Edit section: Printing Presses and Publications Act"><span data-dcnode-id="4569" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4566"><span data-dcnode-id="4567" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4563" instrument_node="">
</span><link data-dcnode-id="4562" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4558" role="note"><span data-dcnode-id="4561" instrument_node="">Main article: </span><a data-dcnode-id="4559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Printing_Presses_and_Publications_Act_1984" title="Printing Presses and Publications Act 1984"><span data-dcnode-id="4560" instrument_node="">Printing Presses and Publications Act 1984</span></a></div><span data-dcnode-id="4557" instrument_node="">
</span><p data-dcnode-id="4552"><span data-dcnode-id="4556" instrument_node="">Passed in 1984, the Printing Presses and Publications Act, which makes it a crime to publish anything without a government licence that must be renewed every year by the </span><a data-dcnode-id="4554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Home_Affairs_%28Malaysia%29" title="Ministry of Home Affairs (Malaysia)"><span data-dcnode-id="4555" instrument_node="">Home Affairs Ministry</span></a><span data-dcnode-id="4553" instrument_node="">, has been used to silence government critics and to ban various publications for a variety of reasons. As with the Sedition Act, the practical effect of the Printing Presses and Publications Act has been to severely restrict freedom of speech in Malaysia. Meanwhile, in East Malaysia (Sabah and Sarawak), the press is more free as there is less concern of controversy happening there.
</span></p><span data-dcnode-id="4551" instrument_node="">
</span><h3 data-dcnode-id="4541"><span class="mw-headline" data-dcnode-id="4549" id="Police_Act"><span data-dcnode-id="4550" instrument_node="">Police Act</span></span><span class="mw-editsection" data-dcnode-id="4542"><span class="mw-editsection-bracket" data-dcnode-id="4547"><span data-dcnode-id="4548" instrument_node="">[</span></span><a data-dcnode-id="4545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D6" title="Edit section: Police Act"><span data-dcnode-id="4546" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4540" instrument_node="">
</span><link data-dcnode-id="4539" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4535" role="note"><span data-dcnode-id="4538" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="4536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Police_Act_1967_%28Malaysia%29" title="Police Act 1967 (Malaysia)"><span data-dcnode-id="4537" instrument_node="">Police Act 1967 (Malaysia)</span></a></div><span data-dcnode-id="4534" instrument_node="">
</span><p data-dcnode-id="4526"><span data-dcnode-id="4533" instrument_node="">The Police Act of 1967 allows the </span><a data-dcnode-id="4531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_Malaysia_Police" title="Royal Malaysia Police"><span data-dcnode-id="4532" instrument_node="">Royal Malaysia Police</span></a><span data-dcnode-id="4530" instrument_node=""> to detain persons without warrants, and has been used especially to restrict the </span><a data-dcnode-id="4528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_of_assembly" title="Freedom of assembly"><span data-dcnode-id="4529" instrument_node="">freedom of assembly</span></a><span data-dcnode-id="4527" instrument_node="">. Under the Police Act, until recently, police permits were required for gatherings of over four people, other than strikes.
</span></p><span data-dcnode-id="4525" instrument_node="">
</span><h3 data-dcnode-id="4515"><span class="mw-headline" data-dcnode-id="4523" id="Changes_in_restrictive_laws"><span data-dcnode-id="4524" instrument_node="">Changes in restrictive laws</span></span><span class="mw-editsection" data-dcnode-id="4516"><span class="mw-editsection-bracket" data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">[</span></span><a data-dcnode-id="4519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D7" title="Edit section: Changes in restrictive laws"><span data-dcnode-id="4520" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4514" instrument_node="">
</span><p data-dcnode-id="4506"><span data-dcnode-id="4513" instrument_node="">On 15 September 2011, </span><a data-dcnode-id="4511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prime_Minister_of_Malaysia" title="Prime Minister of Malaysia"><span data-dcnode-id="4512" instrument_node="">Prime Minister</span></a><span data-dcnode-id="4510" instrument_node=""> </span><a data-dcnode-id="4508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Najib_Razak" title="Najib Razak"><span data-dcnode-id="4509" instrument_node="">Najib Razak</span></a><span data-dcnode-id="4507" instrument_node=""> announced that the Internal Security Act would be totally repealed and "be replaced by a new law that incorporates far more judicial oversight and limits the powers of the police to detain suspects for preventive reasons." The government also committed itself to the repeal of some of its other best known legal instruments for restricting human rights, including the Sedition Act and Emergency Declarations and Banishment Act. In addition, the government agreed to review several laws, including Section 27 of the Police Act, the Printing Presses and Publications Act and the Official Secrets Act.
</span></p><span data-dcnode-id="4505" instrument_node="">
</span><h3 data-dcnode-id="4494"><span data-dcnode-id="4504" id="Security_Offences_.28Special_Measures.29_Act"></span><span class="mw-headline" data-dcnode-id="4502" id="Security_Offences_(Special_Measures)_Act"><span data-dcnode-id="4503" instrument_node="">Security Offences (Special Measures) Act</span></span><span class="mw-editsection" data-dcnode-id="4495"><span class="mw-editsection-bracket" data-dcnode-id="4500"><span data-dcnode-id="4501" instrument_node="">[</span></span><a data-dcnode-id="4498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D8" title="Edit section: Security Offences (Special Measures) Act"><span data-dcnode-id="4499" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4496"><span data-dcnode-id="4497" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4493" instrument_node="">
</span><link data-dcnode-id="4492" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4488" role="note"><span data-dcnode-id="4491" instrument_node="">Main article: </span><a data-dcnode-id="4489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Security_Offences_%28Special_Measures%29_Act_2012" title="Security Offences (Special Measures) Act 2012"><span data-dcnode-id="4490" instrument_node="">Security Offences (Special Measures) Act 2012</span></a></div><span data-dcnode-id="4487" instrument_node="">
</span><p data-dcnode-id="4469"><span data-dcnode-id="4486" instrument_node="">In a June 2012 article published in the </span><a data-dcnode-id="4484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East%25E2%2580%2593West_Center" title="East–West Center"><span data-dcnode-id="4485" instrument_node="">East–West Center</span></a><span data-dcnode-id="4483" instrument_node="">'s Asia Pacific Bulletin and reprinted in the </span><i data-dcnode-id="4480"><a data-dcnode-id="4481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bangkok_Post" title="Bangkok Post"><span data-dcnode-id="4482" instrument_node="">Bangkok Post</span></a></i><span data-dcnode-id="4479" instrument_node=""> and on </span><a data-dcnode-id="4477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_Rights_Watch" title="Human Rights Watch"><span data-dcnode-id="4478" instrument_node="">Human Rights Watch</span></a><span data-dcnode-id="4476" instrument_node="">'s website, writer Mickey Spiegel noted that in April 2012, the </span><a data-dcnode-id="4474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parliament_of_Malaysia" title="Parliament of Malaysia"><span data-dcnode-id="4475" instrument_node="">Malaysian parliament</span></a><span data-dcnode-id="4473" instrument_node=""> had passed the replacement for the Internal Security Act (ISA), called the Security Offences (Special Measures) 2012 Act (SOSMA). Spiegel complained that SOSMA "does not go far enough to protect the fundamental rights and freedoms of Malaysians." In fact, asserted Spiegel, SOSMA is "actually more repressive and retrograde" than the ISA in some ways, an indication that the government was "playing '</span><a data-dcnode-id="4471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bait-and-switch" title="Bait-and-switch"><span data-dcnode-id="4472" instrument_node="">bait-and-switch</span></a><span data-dcnode-id="4470" instrument_node="">' with human rights."
</span></p><p data-dcnode-id="4459"><span data-dcnode-id="4468" instrument_node="">For example, "coupled with amendments to other laws," SOSMA "tightened restrictions or banned outright activities already under constraint, added limits to previously unrestricted activities, and broadened police apprehension and surveillance powers in new and innovative ways." In addition, it "further erodes citizens' individual protections, for example by ceding to the police rather than judges the power to intercept communications."</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4461" style="white-space:nowrap;"><span data-dcnode-id="4467" instrument_node="">[</span><i data-dcnode-id="4463"><a data-dcnode-id="4464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4465" title="This claim needs references to reliable sources. (November 2020)"><span data-dcnode-id="4466" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4462" instrument_node="">]</span></sup><span data-dcnode-id="4460" instrument_node="">
</span></p><span data-dcnode-id="4458" instrument_node="">
</span><h3 data-dcnode-id="4448"><span class="mw-headline" data-dcnode-id="4456" id="Peaceful_Assembly_Act"><span data-dcnode-id="4457" instrument_node="">Peaceful Assembly Act</span></span><span class="mw-editsection" data-dcnode-id="4449"><span class="mw-editsection-bracket" data-dcnode-id="4454"><span data-dcnode-id="4455" instrument_node="">[</span></span><a data-dcnode-id="4452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D9" title="Edit section: Peaceful Assembly Act"><span data-dcnode-id="4453" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4447" instrument_node="">
</span><link data-dcnode-id="4446" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4442" role="note"><span data-dcnode-id="4445" instrument_node="">Main article: </span><a data-dcnode-id="4443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peaceful_Assembly_Act_2012" title="Peaceful Assembly Act 2012"><span data-dcnode-id="4444" instrument_node="">Peaceful Assembly Act 2012</span></a></div><span data-dcnode-id="4441" instrument_node="">
</span><p data-dcnode-id="4412"><span data-dcnode-id="4440" instrument_node="">The Peaceful Assembly Act replaced Section 27 of the Police Act, which required police permits for large gatherings. Under the new law, such permits are not necessary. Instead, organisers must give the police ten days' notice of any planned gathering, after which the police will reply, outlining any restrictions they wish to place on the gathering.</span><sup class="reference" data-dcnode-id="4437" id="cite_ref-nst_5-0"><a data-dcnode-id="4438" href="#cite_note-nst-5"><span data-dcnode-id="4439" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4436" instrument_node=""> The new act forbids street protest,</span><sup class="reference" data-dcnode-id="4433" id="cite_ref-6"><a data-dcnode-id="4434" href="#cite_note-6"><span data-dcnode-id="4435" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4432" instrument_node=""> prohibits persons under 15 from taking part in gatherings,</span><sup class="reference" data-dcnode-id="4429" id="cite_ref-7"><a data-dcnode-id="4430" href="#cite_note-7"><span data-dcnode-id="4431" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4428" instrument_node=""> prohibits persons under 21 from organising them,</span><sup class="reference" data-dcnode-id="4425" id="cite_ref-nst_5-1"><a data-dcnode-id="4426" href="#cite_note-nst-5"><span data-dcnode-id="4427" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4424" instrument_node=""> and bars them from taking place near schools, mosques, airports, railway stations, and other designated places.</span><sup class="reference" data-dcnode-id="4421" id="cite_ref-nst_5-2"><a data-dcnode-id="4422" href="#cite_note-nst-5"><span data-dcnode-id="4423" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4420" instrument_node=""> Though touted as a reform of Section 27 of the Police Act, the Peaceful Assembly Act has been severely criticised by the </span><a data-dcnode-id="4418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Opposition_%28Malaysia%29" title="Opposition (Malaysia)"><span data-dcnode-id="4419" instrument_node="">political opposition</span></a><span data-dcnode-id="4417" instrument_node=""> and others as more restrictive than the legislation it replaced, with one opposition leader saying that the it gives "absolute powers to the police."</span><sup class="reference" data-dcnode-id="4414" id="cite_ref-8"><a data-dcnode-id="4415" href="#cite_note-8"><span data-dcnode-id="4416" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4413" instrument_node="">
</span></p><span data-dcnode-id="4411" instrument_node="">
</span><h3 data-dcnode-id="4401"><span class="mw-headline" data-dcnode-id="4409" id="ASEAN_human-rights_declaration"><span data-dcnode-id="4410" instrument_node="">ASEAN human-rights declaration</span></span><span class="mw-editsection" data-dcnode-id="4402"><span class="mw-editsection-bracket" data-dcnode-id="4407"><span data-dcnode-id="4408" instrument_node="">[</span></span><a data-dcnode-id="4405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D10" title="Edit section: ASEAN human-rights declaration"><span data-dcnode-id="4406" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4400" instrument_node="">
</span><p data-dcnode-id="4369"><span data-dcnode-id="4399" instrument_node="">In November 2012, </span><a data-dcnode-id="4397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prime_Minister_of_Malaysia" title="Prime Minister of Malaysia"><span data-dcnode-id="4398" instrument_node="">Prime Minister</span></a><span data-dcnode-id="4396" instrument_node=""> </span><a data-dcnode-id="4394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Najib_Razak" title="Najib Razak"><span data-dcnode-id="4395" instrument_node="">Najib Razak</span></a><span data-dcnode-id="4393" instrument_node=""> signed the first </span><a data-dcnode-id="4391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ASEAN_Human_Rights_Declaration" title="ASEAN Human Rights Declaration"><span data-dcnode-id="4392" instrument_node="">human rights declaration</span></a><span data-dcnode-id="4390" instrument_node=""> by the </span><a data-dcnode-id="4388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ASEAN" title="ASEAN"><span data-dcnode-id="4389" instrument_node="">ASEAN</span></a><span data-dcnode-id="4387" instrument_node=""> nations, an action that officially committed Malaysia "to its first foreign convention to promote fair treatment of every individual irrespective of race, religion and political opinion." This signing, it was noted, took place at a time when Malaysia had "come under close international scrutiny for its alleged mishandling of several recent human rights issues," including crackdowns on two major pro-democracy protests in </span><a data-dcnode-id="4385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bersih_2.0_rally" title="Bersih 2.0 rally"><span data-dcnode-id="4386" instrument_node="">July 2011</span></a><span data-dcnode-id="4384" instrument_node=""> and </span><a data-dcnode-id="4382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bersih_3.0_rally" title="Bersih 3.0 rally"><span data-dcnode-id="4383" instrument_node="">April 2012</span></a><span data-dcnode-id="4381" instrument_node="">.</span><sup class="reference" data-dcnode-id="4378" id="cite_ref-9"><a data-dcnode-id="4379" href="#cite_note-9"><span data-dcnode-id="4380" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4377" instrument_node=""> The </span><a data-dcnode-id="4375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_Rights_Commission_of_Malaysia" title="Human Rights Commission of Malaysia"><span data-dcnode-id="4376" instrument_node="">Human Rights Commission of Malaysia</span></a><span data-dcnode-id="4374" instrument_node=""> expressed its disappointment that the declaration permits "restrictions to be made on grounds wider than what are accepted internationally," and pointed especially to General Principle 7, "which declares on the one hand, that all human rights are universal, indivisible, interdependent and interrelated, recognises on the other, that Member States may take into consideration their political, economic, legal, socio-cultural, and historical backgrounds in the realisation of human rights in their countries."</span><sup class="reference" data-dcnode-id="4371" id="cite_ref-10"><a data-dcnode-id="4372" href="#cite_note-10"><span data-dcnode-id="4373" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4370" instrument_node="">
</span></p><span data-dcnode-id="4368" instrument_node="">
</span><h3 data-dcnode-id="4357"><span data-dcnode-id="4367" id="Employment_Act_.28Minimum_Wage.29"></span><span class="mw-headline" data-dcnode-id="4365" id="Employment_Act_(Minimum_Wage)"><span data-dcnode-id="4366" instrument_node="">Employment Act (Minimum Wage)</span></span><span class="mw-editsection" data-dcnode-id="4358"><span class="mw-editsection-bracket" data-dcnode-id="4363"><span data-dcnode-id="4364" instrument_node="">[</span></span><a data-dcnode-id="4361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D11" title="Edit section: Employment Act (Minimum Wage)"><span data-dcnode-id="4362" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4359"><span data-dcnode-id="4360" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4356" instrument_node="">
</span><p data-dcnode-id="4344"><span data-dcnode-id="4355" instrument_node="">As in February 2020, minimum monthly payable wage binding by Employment act of Malaysia was RM 1,200 for principal 56 cities and municipality areas whereas minimum hourly wage payable stood as RM 5.77. For other areas, the same are RM 1,100 per month and RM 5.29 per hour respectively.</span><sup class="reference" data-dcnode-id="4352" id="cite_ref-11"><a data-dcnode-id="4353" href="#cite_note-11"><span data-dcnode-id="4354" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="4349" id="cite_ref-12"><a data-dcnode-id="4350" href="#cite_note-12"><span data-dcnode-id="4351" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="4346" id="cite_ref-13"><a data-dcnode-id="4347" href="#cite_note-13"><span data-dcnode-id="4348" instrument_node="">[13]</span></a></sup><span data-dcnode-id="4345" instrument_node="">
</span></p><span data-dcnode-id="4343" instrument_node="">
</span><h2 data-dcnode-id="4333"><span class="mw-headline" data-dcnode-id="4341" id="Human_Rights_Commission_of_Malaysia"><span data-dcnode-id="4342" instrument_node="">Human Rights Commission of Malaysia</span></span><span class="mw-editsection" data-dcnode-id="4334"><span class="mw-editsection-bracket" data-dcnode-id="4339"><span data-dcnode-id="4340" instrument_node="">[</span></span><a data-dcnode-id="4337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D12" title="Edit section: Human Rights Commission of Malaysia"><span data-dcnode-id="4338" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4335"><span data-dcnode-id="4336" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4332" instrument_node="">
</span><link data-dcnode-id="4331" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4327" role="note"><span data-dcnode-id="4330" instrument_node="">Main article: </span><a data-dcnode-id="4328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_Rights_Commission_of_Malaysia" title="Human Rights Commission of Malaysia"><span data-dcnode-id="4329" instrument_node="">Human Rights Commission of Malaysia</span></a></div><span data-dcnode-id="4326" instrument_node="">
</span><p data-dcnode-id="4324"><span data-dcnode-id="4325" instrument_node="">The Human Rights Commission of Malaysia, better known in the country as Suhakam (which is short for Suruhanjaya Hak Asasi Malaysia), is the country's major agency for addressing human-rights issues.
</span></p><span data-dcnode-id="4323" instrument_node="">
</span><h2 data-dcnode-id="4313"><span class="mw-headline" data-dcnode-id="4321" id="Human_rights_groups"><span data-dcnode-id="4322" instrument_node="">Human rights groups</span></span><span class="mw-editsection" data-dcnode-id="4314"><span class="mw-editsection-bracket" data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">[</span></span><a data-dcnode-id="4317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D13" title="Edit section: Human rights groups"><span data-dcnode-id="4318" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4315"><span data-dcnode-id="4316" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4312" instrument_node="">
</span><p data-dcnode-id="4303"><span data-dcnode-id="4311" instrument_node="">The leading human rights organisation in Malaysia is </span><a data-dcnode-id="4309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suara_Rakyat_Malaysia" title="Suara Rakyat Malaysia"><span data-dcnode-id="4310" instrument_node="">Suara Rakyat Malaysia</span></a><span data-dcnode-id="4308" instrument_node="">. On 17 September 2012, several dozen international human rights groups issued a joint press release protesting what they described as "the Malaysian government's ongoing harassment" of Suara Rakyat Malaysia.</span><sup class="reference" data-dcnode-id="4305" id="cite_ref-14"><a data-dcnode-id="4306" href="#cite_note-14"><span data-dcnode-id="4307" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4304" instrument_node="">
</span></p><span data-dcnode-id="4302" instrument_node="">
</span><h2 data-dcnode-id="4292"><span class="mw-headline" data-dcnode-id="4300" id="Basic_rights"><span data-dcnode-id="4301" instrument_node="">Basic rights</span></span><span class="mw-editsection" data-dcnode-id="4293"><span class="mw-editsection-bracket" data-dcnode-id="4298"><span data-dcnode-id="4299" instrument_node="">[</span></span><a data-dcnode-id="4296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D14" title="Edit section: Basic rights"><span data-dcnode-id="4297" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4294"><span data-dcnode-id="4295" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4291" instrument_node="">
</span><p data-dcnode-id="4279"><span data-dcnode-id="4290" instrument_node="">The </span><a data-dcnode-id="4288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_Malaysia" title="Constitution of Malaysia"><span data-dcnode-id="4289" instrument_node="">Constitution of Malaysia</span></a><span data-dcnode-id="4287" instrument_node=""> forbids discrimination against citizens based on sex, religion, and race, but also accords a "special position" in Article 153 of the Constitution, to </span><a data-dcnode-id="4285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bumiputera_%28Malaysia%29" title="Bumiputera (Malaysia)"><span data-dcnode-id="4286" instrument_node="">Bumiputera</span></a><span data-dcnode-id="4284" instrument_node="">, the indigenous peoples of Malaysia including ethnic Malays and members of tribes indigenous to the states of Sabah and Sarawak in eastern Malaysia. Those who are not members of the ethnic Malay majority are treated according to article 153 of the Malaysian Federal Constitution where special privileges to ethnic Malays and the natives of Sabah and Sarawak are to be provided in education, employment, and other spheres.</span><sup class="reference" data-dcnode-id="4281" id="cite_ref-state_15-0"><a data-dcnode-id="4282" href="#cite_note-state-15"><span data-dcnode-id="4283" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4280" instrument_node="">
</span></p><span data-dcnode-id="4278" instrument_node="">
</span><h3 data-dcnode-id="4268"><span class="mw-headline" data-dcnode-id="4276" id="Freedom_of_speech"><span data-dcnode-id="4277" instrument_node="">Freedom of speech</span></span><span class="mw-editsection" data-dcnode-id="4269"><span class="mw-editsection-bracket" data-dcnode-id="4274"><span data-dcnode-id="4275" instrument_node="">[</span></span><a data-dcnode-id="4272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D15" title="Edit section: Freedom of speech"><span data-dcnode-id="4273" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4270"><span data-dcnode-id="4271" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4267" instrument_node="">
</span><p data-dcnode-id="4254"><span data-dcnode-id="4266" instrument_node="">Freedom of speech in Malaysia has been widely disputed upon as many rallies and protests, including </span><a data-dcnode-id="4264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bersih" title="Bersih"><span data-dcnode-id="4265" instrument_node="">Bersih</span></a><span data-dcnode-id="4263" instrument_node="">, have been seen to have their members arrested without warrant.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4256" style="white-space:nowrap;"><span data-dcnode-id="4262" instrument_node="">[</span><i data-dcnode-id="4258"><a data-dcnode-id="4259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4260" title="This claim needs references to reliable sources. (October 2020)"><span data-dcnode-id="4261" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4257" instrument_node="">]</span></sup><span data-dcnode-id="4255" instrument_node="">
</span></p><p data-dcnode-id="4245"><span data-dcnode-id="4253" instrument_node="">On 8 July 2020, </span><a class="mw-redirect" data-dcnode-id="4251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_Right_Watch" title="Human Right Watch"><span data-dcnode-id="4252" instrument_node="">Human Right Watch</span></a><span data-dcnode-id="4250" instrument_node=""> reported that Malaysian authorities have initiated criminal investigations against people criticising the government. Journalists, civil society activists, and ordinary people have faced police questioning for peaceful speech.</span><sup class="reference" data-dcnode-id="4247" id="cite_ref-16"><a data-dcnode-id="4248" href="#cite_note-16"><span data-dcnode-id="4249" instrument_node="">[16]</span></a></sup><span data-dcnode-id="4246" instrument_node="">
</span></p><p data-dcnode-id="4233"><span data-dcnode-id="4244" instrument_node="">On July 30, 2020, Human Rights Watch appealed to the Malaysian authorities for the release of Mohamed Rayhan Kabir, a Bangladeshi migrant worker, who was arrested for his criticism of government policies towards migrants. He was featured in an </span><a data-dcnode-id="4242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Al_Jazeera" title="Al Jazeera"><span data-dcnode-id="4243" instrument_node="">Al Jazeera</span></a><span data-dcnode-id="4241" instrument_node=""> documentary that aired on July 3 about the treatment of migrant workers during the </span><a data-dcnode-id="4239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/COVID-19_pandemic_in_Malaysia" title="COVID-19 pandemic in Malaysia"><span data-dcnode-id="4240" instrument_node="">COVID-19 pandemic in Malaysia</span></a><span data-dcnode-id="4238" instrument_node="">.</span><sup class="reference" data-dcnode-id="4235" id="cite_ref-17"><a data-dcnode-id="4236" href="#cite_note-17"><span data-dcnode-id="4237" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4234" instrument_node="">
</span></p><span data-dcnode-id="4232" instrument_node="">
</span><h3 data-dcnode-id="4222"><span class="mw-headline" data-dcnode-id="4230" id="Freedom_of_assembly_and_movement"><span data-dcnode-id="4231" instrument_node="">Freedom of assembly and movement</span></span><span class="mw-editsection" data-dcnode-id="4223"><span class="mw-editsection-bracket" data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node="">[</span></span><a data-dcnode-id="4226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D16" title="Edit section: Freedom of assembly and movement"><span data-dcnode-id="4227" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4224"><span data-dcnode-id="4225" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4221" instrument_node="">
</span><p data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">Although citizens technically enjoy the right to assembly, public gatherings are subject to police approval. The Societies Act requires organisations of seven or more people to register, with the government denying registration to certain groups, including human rights organisations, and the Universities and University Colleges Act restricts the formation of student groups. While Malaysians generally enjoy freedom to travel within the country and abroad, and to move abroad and move back to Malaysia, residents of peninsula Malaysia require passports or national IDs to enter the states of Sabah and Sarawak, and citizens cannot travel to Israel without official permission.
</span></p><span data-dcnode-id="4218" instrument_node="">
</span><h3 data-dcnode-id="4208"><span class="mw-headline" data-dcnode-id="4216" id="Freedom_of_religion"><span data-dcnode-id="4217" instrument_node="">Freedom of religion</span></span><span class="mw-editsection" data-dcnode-id="4209"><span class="mw-editsection-bracket" data-dcnode-id="4214"><span data-dcnode-id="4215" instrument_node="">[</span></span><a data-dcnode-id="4212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D17" title="Edit section: Freedom of religion"><span data-dcnode-id="4213" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4210"><span data-dcnode-id="4211" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4207" instrument_node="">
</span><p data-dcnode-id="4153"><span data-dcnode-id="4206" instrument_node="">The constitution guarantees </span><a data-dcnode-id="4204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_of_religion_in_Malaysia" title="Freedom of religion in Malaysia"><span data-dcnode-id="4205" instrument_node="">freedom of religion</span></a><span data-dcnode-id="4203" instrument_node="">, but also states that </span><a data-dcnode-id="4201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islam" title="Islam"><span data-dcnode-id="4202" instrument_node="">Islam</span></a><span data-dcnode-id="4200" instrument_node=""> is the official religion. Among the official </span><a data-dcnode-id="4198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_holidays_in_Malaysia" title="Public holidays in Malaysia"><span data-dcnode-id="4199" instrument_node="">public holidays in Malaysia</span></a><span data-dcnode-id="4197" instrument_node=""> (varying by area) are Muslim, Buddhist, Hindu, and Christian holy days. Marriages between Muslims and non-Muslims are not recognised;</span><sup class="reference" data-dcnode-id="4194" id="cite_ref-state_15-1"><a data-dcnode-id="4195" href="#cite_note-state-15"><span data-dcnode-id="4196" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4193" instrument_node=""> ethnic Malays are considered Muslim by law.</span><sup class="reference" data-dcnode-id="4190" id="cite_ref-state_religion_18-0"><a data-dcnode-id="4191" href="#cite_note-state_religion-18"><span data-dcnode-id="4192" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4189" instrument_node=""> Non-</span><a data-dcnode-id="4187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sunni_Islam" title="Sunni Islam"><span data-dcnode-id="4188" instrument_node="">Sunni</span></a><span data-dcnode-id="4186" instrument_node=""> interpretations of Islam are illegal.</span><sup class="reference" data-dcnode-id="4183" id="cite_ref-state_religion_18-1"><a data-dcnode-id="4184" href="#cite_note-state_religion-18"><span data-dcnode-id="4185" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4182" instrument_node=""> Islamic courts enforce </span><a data-dcnode-id="4180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sharia" title="Sharia"><span data-dcnode-id="4181" instrument_node="">sharia</span></a><span data-dcnode-id="4179" instrument_node=""> law in certain areas of responsibility.</span><sup class="reference" data-dcnode-id="4176" id="cite_ref-state_religion_18-2"><a data-dcnode-id="4177" href="#cite_note-state_religion-18"><span data-dcnode-id="4178" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4175" instrument_node=""> In practice, non-Muslims face religious discrimination, including the right to own land.</span><sup class="reference" data-dcnode-id="4172" id="cite_ref-state_religion_18-3"><a data-dcnode-id="4173" href="#cite_note-state_religion-18"><span data-dcnode-id="4174" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4171" instrument_node=""> Furthermore, in several states, </span><a data-dcnode-id="4169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apostasy" title="Apostasy"><span data-dcnode-id="4170" instrument_node="">apostasy</span></a><span data-dcnode-id="4168" instrument_node=""> by Muslims is, depending on the state, punishable by imprisonment, detention, </span><a data-dcnode-id="4166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caning_in_Malaysia%23Sharia_caning" title="Caning in Malaysia"><span data-dcnode-id="4167" instrument_node="">whipping</span></a><span data-dcnode-id="4165" instrument_node=""> or fines.</span><sup class="reference" data-dcnode-id="4162" id="cite_ref-Malay_Mail_graphic_19-0"><a data-dcnode-id="4163" href="#cite_note-Malay_Mail_graphic-19"><span data-dcnode-id="4164" instrument_node="">[19]</span></a></sup><span data-dcnode-id="4161" instrument_node=""> Two states have the </span><a data-dcnode-id="4159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_punishment_in_Malaysia" title="Capital punishment in Malaysia"><span data-dcnode-id="4160" instrument_node="">death penalty</span></a><span data-dcnode-id="4158" instrument_node=""> on apostasy, but federal law prevents the implementation of the death penalty for apostasy.</span><sup class="reference" data-dcnode-id="4155" id="cite_ref-20"><a data-dcnode-id="4156" href="#cite_note-20"><span data-dcnode-id="4157" instrument_node="">[20]</span></a></sup><span data-dcnode-id="4154" instrument_node=""> Malaysia will also not register interfaith marriages with Muslims.
</span></p><span data-dcnode-id="4152" instrument_node="">
</span><h3 data-dcnode-id="4142"><span class="mw-headline" data-dcnode-id="4150" id="Political_freedoms"><span data-dcnode-id="4151" instrument_node="">Political freedoms</span></span><span class="mw-editsection" data-dcnode-id="4143"><span class="mw-editsection-bracket" data-dcnode-id="4148"><span data-dcnode-id="4149" instrument_node="">[</span></span><a data-dcnode-id="4146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D18" title="Edit section: Political freedoms"><span data-dcnode-id="4147" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4144"><span data-dcnode-id="4145" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4141" instrument_node="">
</span><p data-dcnode-id="4117"><span data-dcnode-id="4140" instrument_node="">Though Malaysia has a </span><a data-dcnode-id="4138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Multi-party_system" title="Multi-party system"><span data-dcnode-id="4139" instrument_node="">multi-party</span></a><span data-dcnode-id="4137" instrument_node=""> </span><a data-dcnode-id="4135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parliamentary_system" title="Parliamentary system"><span data-dcnode-id="4136" instrument_node="">parliamentary</span></a><span data-dcnode-id="4134" instrument_node=""> system of government with a </span><a data-dcnode-id="4132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitutional_monarchy" title="Constitutional monarchy"><span data-dcnode-id="4133" instrument_node="">constitutional monarchy</span></a><span data-dcnode-id="4131" instrument_node="">, the </span><a data-dcnode-id="4129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Malays_National_Organisation" title="United Malays National Organisation"><span data-dcnode-id="4130" instrument_node="">United Malays National Organisation</span></a><span data-dcnode-id="4128" instrument_node=""> (UMNO) had held power since 1957 and opposition parties do not compete on a level playing ground. However, UMNO was voted out of office in 2018, ending its 61-year reign as Malaysia's ruling party. Over the years, the </span><a data-dcnode-id="4126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prime_Minister_of_Malaysia" title="Prime Minister of Malaysia"><span data-dcnode-id="4127" instrument_node="">Prime Minister</span></a><span data-dcnode-id="4125" instrument_node="">'s powers have increased and </span><a data-dcnode-id="4123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parliament_of_Malaysia" title="Parliament of Malaysia"><span data-dcnode-id="4124" instrument_node="">Parliament</span></a><span data-dcnode-id="4122" instrument_node="">'s have declined. The only elected officials are members of state assemblies and of the federal parliament. Since 1969, municipal and other officials have been appointed.</span><sup class="reference" data-dcnode-id="4119" id="cite_ref-state_15-2"><a data-dcnode-id="4120" href="#cite_note-state-15"><span data-dcnode-id="4121" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4118" instrument_node="">
</span></p><p data-dcnode-id="4101"><span data-dcnode-id="4116" instrument_node="">However, there are signs of improvement in recent years, as Malaysia's ranking in the 2020 </span><a data-dcnode-id="4114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Press_Freedom_Index" title="Press Freedom Index"><span data-dcnode-id="4115" instrument_node="">Press Freedom Index</span></a><span data-dcnode-id="4113" instrument_node=""> increased by 22 places to 101st compared to the previous year, making it the only country in Southeast Asia (besides East Timor) without a 'Difficult situation' or 'Very Serious situation' with regards to press freedom.</span><sup class="reference" data-dcnode-id="4110" id="cite_ref-21"><a data-dcnode-id="4111" href="#cite_note-21"><span data-dcnode-id="4112" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4109" instrument_node=""> Likewise, Malaysia's ranking increased by nine places in the 2019 </span><a data-dcnode-id="4107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democracy_Index" title="Democracy Index"><span data-dcnode-id="4108" instrument_node="">Democracy Index</span></a><span data-dcnode-id="4106" instrument_node=""> to 43th compared to the previous year, and is classified as a 'flawed democracy'.</span><sup class="reference" data-dcnode-id="4103" id="cite_ref-22"><a data-dcnode-id="4104" href="#cite_note-22"><span data-dcnode-id="4105" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4102" instrument_node="">
</span></p><span data-dcnode-id="4100" instrument_node="">
</span><h2 data-dcnode-id="4089"><span data-dcnode-id="4099" id="Children.27s_rights"></span><span class="mw-headline" data-dcnode-id="4097" id="Children's_rights"><span data-dcnode-id="4098" instrument_node="">Children's rights</span></span><span class="mw-editsection" data-dcnode-id="4090"><span class="mw-editsection-bracket" data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">[</span></span><a data-dcnode-id="4093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D19" title="Edit section: Children's rights"><span data-dcnode-id="4094" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4088" instrument_node="">
</span><link data-dcnode-id="4087" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4083" role="note"><span data-dcnode-id="4086" instrument_node="">Main article: </span><a data-dcnode-id="4084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Children%2527s_rights_in_Malaysia" title="Children's rights in Malaysia"><span data-dcnode-id="4085" instrument_node="">Children's rights in Malaysia</span></a></div><span data-dcnode-id="4082" instrument_node="">
</span><p data-dcnode-id="4045"><span data-dcnode-id="4081" instrument_node="">Malaysians inherit citizenship from their parents. Persons who cannot prove that their parents were married, or whose parents were of different religions, are denied citizenship and considered </span><a data-dcnode-id="4079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Statelessness" title="Statelessness"><span data-dcnode-id="4080" instrument_node="">stateless</span></a><span data-dcnode-id="4078" instrument_node="">. Children who lack birth certificates cannot attend public or private schools. Primary education is compulsory, but this requirement is not enforced. </span><a data-dcnode-id="4076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Incest" title="Incest"><span data-dcnode-id="4077" instrument_node="">Incest</span></a><span data-dcnode-id="4075" instrument_node=""> and other forms of </span><a data-dcnode-id="4073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commercial_sexual_exploitation_of_children" title="Commercial sexual exploitation of children"><span data-dcnode-id="4074" instrument_node="">sexual exploitation of children</span></a><span data-dcnode-id="4072" instrument_node=""> are common, as is the </span><a data-dcnode-id="4070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Female_genital_mutilation" title="Female genital mutilation"><span data-dcnode-id="4071" instrument_node="">genital mutilation of girls</span></a><span data-dcnode-id="4069" instrument_node="">. While </span><a data-dcnode-id="4067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Statutory_rape" title="Statutory rape"><span data-dcnode-id="4068" instrument_node="">statutory rape</span></a><span data-dcnode-id="4066" instrument_node=""> is illegal, enforcement is complicated by the fact that sharia law regards menstruating girls as adults. Child prostitutes are often treated not as victims but as delinquents. Many children of illegal immigrants live on the street and work menial jobs, commit crimes, or engage in prostitution. Malaysia is not a party to the 1980 </span><a data-dcnode-id="4064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hague_Convention_on_the_Civil_Aspects_of_International_Child_Abduction" title="Hague Convention on the Civil Aspects of International Child Abduction"><span data-dcnode-id="4065" instrument_node="">Hague Convention on the Civil Aspects of International Child Abduction</span></a><span data-dcnode-id="4063" instrument_node="">,</span><sup class="reference" data-dcnode-id="4060" id="cite_ref-state_15-3"><a data-dcnode-id="4061" href="#cite_note-state-15"><span data-dcnode-id="4062" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4059" instrument_node=""> but after the </span><a data-dcnode-id="4057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Human_Rights_Council" title="United Nations Human Rights Council"><span data-dcnode-id="4058" instrument_node="">United Nations Human Rights Council</span></a><span data-dcnode-id="4056" instrument_node="">'s </span><a data-dcnode-id="4054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_Periodic_Review" title="Universal Periodic Review"><span data-dcnode-id="4055" instrument_node="">Universal Periodic Review</span></a><span data-dcnode-id="4053" instrument_node=""> of Malaysia in 2009, the government withdrew several but not all of its reservations under the </span><a data-dcnode-id="4051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_on_the_Rights_of_the_Child" title="Convention on the Rights of the Child"><span data-dcnode-id="4052" instrument_node="">Convention on the Rights of the Child</span></a><span data-dcnode-id="4050" instrument_node=""> (CRC) and acceded to the two optional protocols to the CRC.</span><sup class="reference" data-dcnode-id="4047" id="cite_ref-nst_5-3"><a data-dcnode-id="4048" href="#cite_note-nst-5"><span data-dcnode-id="4049" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4046" instrument_node="">
</span></p><span data-dcnode-id="4044" instrument_node="">
</span><h2 data-dcnode-id="4033"><span data-dcnode-id="4043" id="Women.27s_rights"></span><span class="mw-headline" data-dcnode-id="4041" id="Women's_rights"><span data-dcnode-id="4042" instrument_node="">Women's rights</span></span><span class="mw-editsection" data-dcnode-id="4034"><span class="mw-editsection-bracket" data-dcnode-id="4039"><span data-dcnode-id="4040" instrument_node="">[</span></span><a data-dcnode-id="4037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D20" title="Edit section: Women's rights"><span data-dcnode-id="4038" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4032" instrument_node="">
</span><link data-dcnode-id="4031" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4027" role="note"><span data-dcnode-id="4030" instrument_node="">Main article: </span><a data-dcnode-id="4028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Women_in_Malaysia" title="Women in Malaysia"><span data-dcnode-id="4029" instrument_node="">Women in Malaysia</span></a></div><span data-dcnode-id="4026" instrument_node="">
</span><p data-dcnode-id="4011"><span data-dcnode-id="4025" instrument_node="">Malaysia ratified the </span><a data-dcnode-id="4023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_on_the_Elimination_of_All_Forms_of_Discrimination_Against_Women" title="Convention on the Elimination of All Forms of Discrimination Against Women"><span data-dcnode-id="4024" instrument_node="">Convention on the Elimination of All Forms of Discrimination Against Women</span></a><span data-dcnode-id="4022" instrument_node=""> (CEDAW) in August 1995 with reservations.</span><sup class="reference" data-dcnode-id="4019" id="cite_ref-23"><a data-dcnode-id="4020" href="#cite_note-23"><span data-dcnode-id="4021" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4018" instrument_node=""> Certain reservations were removed in 2010 but some were maintained, namely Articles 9(2), 16(1)(a), 16(1)(c), 16(1)(f) and 16(1)(g) as these Articles were said to be in conflict with the </span><a class="mw-redirect" data-dcnode-id="4016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malaysian_Federal_Constitution" title="Malaysian Federal Constitution"><span data-dcnode-id="4017" instrument_node="">Malaysian Federal Constitution</span></a><span data-dcnode-id="4015" instrument_node=""> and </span><a data-dcnode-id="4013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sharia" title="Sharia"><span data-dcnode-id="4014" instrument_node="">sharia</span></a><span data-dcnode-id="4012" instrument_node=""> law.
</span></p><span data-dcnode-id="4010" instrument_node="">
</span><h3 data-dcnode-id="4000"><span class="mw-headline" data-dcnode-id="4008" id="Controversial_rape_laws"><span data-dcnode-id="4009" instrument_node="">Controversial rape laws</span></span><span class="mw-editsection" data-dcnode-id="4001"><span class="mw-editsection-bracket" data-dcnode-id="4006"><span data-dcnode-id="4007" instrument_node="">[</span></span><a data-dcnode-id="4004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D21" title="Edit section: Controversial rape laws"><span data-dcnode-id="4005" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4002"><span data-dcnode-id="4003" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3999" instrument_node="">
</span><p data-dcnode-id="3991"><span data-dcnode-id="3998" instrument_node="">There are crisis centres at many government hospitals where victims can report acts of </span><a data-dcnode-id="3996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rape" title="Rape"><span data-dcnode-id="3997" instrument_node="">rape</span></a><span data-dcnode-id="3995" instrument_node=""> and </span><a data-dcnode-id="3993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Domestic_violence" title="Domestic violence"><span data-dcnode-id="3994" instrument_node="">domestic abuse</span></a><span data-dcnode-id="3992" instrument_node="">, but owing to cultural attitudes and other factors about 90 percent of rape victims remain silent. Domestic abuse cases are often complicated, moreover, by provisions of sharia law that forbid wives to disobey their husbands, including in bed. Medical treatment for women is adequate, including pre- and postpartum care.
</span></p><p data-dcnode-id="3986"><span data-dcnode-id="3990" instrument_node="">The punishment for rape in Malaysia is a prison term of up to 30 years, plus </span><a data-dcnode-id="3988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caning_in_Malaysia" title="Caning in Malaysia"><span data-dcnode-id="3989" instrument_node="">whipping</span></a><span data-dcnode-id="3987" instrument_node=""> and a fine; the law against rape is enforced effectively. Despite effective rape enforcement, however, there is also a complicated issue concerning the way the law limits, much to the detriment of rape victims, what actually constitutes as rape. Under Section 375A of the Penal Code, page 45, rape only happens when a man's penis enters a woman's vagina sans prior consent. The penetration of women via other orifices, and by objects other than the penis, may not be considered as rape, as so was a case in 2011 in which a man who had impregnated a 15-year-old girl was released by the High Court only because he used his finger, prompting public outcry and an ensuing rally.
</span></p><p data-dcnode-id="3981"><span data-dcnode-id="3985" instrument_node="">This same section under the Penal Code also allows men to perform intercourse against their spouses without permission. </span><a data-dcnode-id="3983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marital_rape" title="Marital rape"><span data-dcnode-id="3984" instrument_node="">Marital rape</span></a><span data-dcnode-id="3982" instrument_node=""> is not officially recognised as a crime in Malaysia, but since 2007 the government has outlawed husbands from deliberately hurting their wives for sex. Despite that, it can still be a problem for victims who have not sustained injury.
</span></p><p data-dcnode-id="3975"><span data-dcnode-id="3980" instrument_node="">Adding to the issue of marital rape is also the fact that sharia courts allow the release of rapists who decide to marry their own victims. One case involved a man in his 20s who sexually abused an underaged girl 14 years of age, but was acquitted by the Bornean court for having married her.</span><sup class="reference" data-dcnode-id="3977" id="cite_ref-theborneopost_24-0"><a data-dcnode-id="3978" href="#cite_note-theborneopost-24"><span data-dcnode-id="3979" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3976" instrument_node="">
</span></p><span data-dcnode-id="3974" instrument_node="">
</span><h3 data-dcnode-id="3964"><span class="mw-headline" data-dcnode-id="3972" id="Sharia_courts"><span data-dcnode-id="3973" instrument_node="">Sharia courts</span></span><span class="mw-editsection" data-dcnode-id="3965"><span class="mw-editsection-bracket" data-dcnode-id="3970"><span data-dcnode-id="3971" instrument_node="">[</span></span><a data-dcnode-id="3968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D22" title="Edit section: Sharia courts"><span data-dcnode-id="3969" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3966"><span data-dcnode-id="3967" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3963" instrument_node="">
</span><link data-dcnode-id="3962" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3958" role="note"><span data-dcnode-id="3961" instrument_node="">Main article: </span><a data-dcnode-id="3959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Syariah_Court" title="Syariah Court"><span data-dcnode-id="3960" instrument_node="">Syariah Court</span></a></div><span data-dcnode-id="3957" instrument_node="">
</span><p data-dcnode-id="3951"><span data-dcnode-id="3956" instrument_node="">Women are discriminated against in sharia courts, especially in family-law matters. Sharia allows men to have multiple wives and favours males in inheritance cases. Non-Muslim women, and Muslim women in four states, enjoy equal parental rights. There is employment discrimination against women. In Kedah, women performers can appear only before female audiences.</span><sup class="reference" data-dcnode-id="3953" id="cite_ref-state_15-4"><a data-dcnode-id="3954" href="#cite_note-state-15"><span data-dcnode-id="3955" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3952" instrument_node="">
</span></p><span data-dcnode-id="3950" instrument_node="">
</span><h3 data-dcnode-id="3940"><span class="mw-headline" data-dcnode-id="3948" id="Sexual_harassment"><span data-dcnode-id="3949" instrument_node="">Sexual harassment</span></span><span class="mw-editsection" data-dcnode-id="3941"><span class="mw-editsection-bracket" data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">[</span></span><a data-dcnode-id="3944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Malaysia%26action%3Dedit%26section%3D23" title="Edit section: Sexual harassment"><span data-dcnode-id="3945" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3942"><span data-dcnode-id="3943" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3939" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3927"><div class="thumbinner" data-dcnode-id="3928" style="width:222px;"><a class="image" data-dcnode-id="3937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKoc_Wanita.jpg"><img alt="" class="thumbimage" data-dcnode-id="3938" data-file-height="2848" data-file-width="4288" decoding="async" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Koc_Wanita.jpg/220px-Koc_Wanita.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Koc_Wanita.jpg/330px-Koc_Wanita.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Koc_Wanita.jpg/440px-Koc_Wanita.jpg 2x" width="220"></a><span data-dcnode-id="3936" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3929"><div class="magnify" data-dcnode-id="3934"><a class="internal" data-dcnode-id="3935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKoc_Wanita.jpg" title="Enlarge"></a></div><span data-dcnode-id="3933" instrument_node="">A designated commuter section for women only in </span><a data-dcnode-id="3931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kuala_Lumpur" title="Kuala Lumpur"><span data-dcnode-id="3932" instrument_node="">Kuala Lumpur</span></a><span data-dcnode-id="3930" instrument_node="">.</span></div></div></div><span data-dcnode-id="3926" instrument_node="">
</span><link data-dcnode-id="3925" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3921" role="note"><span data-dcnode-id="3924" instrument_node="">Main article: </span><a data-dcnode-id="3922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexual_harassment_in_Malaysia" title="Sexual harassment in Malaysia"><span data-dcnode-id="3923" instrument_node="">Sexual harassment in Malaysia</span></a></div><span data-dcnode-id="3920" instrument_node="">
</span><p data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">In Malaysia, sexual harassment as defined by the Employment Act 1955, is "any unwanted conduct of a sexual nature, whether verbal, non-verbal, visual, gestural or physical, directed at a person which is offensive, humiliating or a threat to their well-being." The Act does not distinguish between male and female or employer and employee. As such, sexual harassment can be committed by a female against a male, or an employee against an employer.
</span></p><p data-dcnode-id="3891"><span data-dcnode-id="3917" instrument_node="">Sexual harassment is common, and since 2010 trains on </span><a data-dcnode-id="3915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rail_transport_in_Malaysia" title="Rail transport in Malaysia"><span data-dcnode-id="3916" instrument_node="">Malaysian railways</span></a><span data-dcnode-id="3914" instrument_node=""> have included pink-coloured </span><a data-dcnode-id="3912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Women-only_passenger_car" title="Women-only passenger car"><span data-dcnode-id="3913" instrument_node="">women-only cars</span></a><span data-dcnode-id="3911" instrument_node=""> as a means of cutting down on it.</span><sup class="reference" data-dcnode-id="3908" id="cite_ref-buses_25-0"><a data-dcnode-id="3909" href="#cite_note-buses-25"><span data-dcnode-id="3910" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3907" instrument_node=""> There are also women-only buses in Kuala Lumpur since 2010.</span><sup class="reference" data-dcnode-id="3904" id="cite_ref-buses_25-1"><a data-dcnode-id="3905" href="#cite_note-buses-25"><span data-dcnode-id="3906" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3903" instrument_node=""> In 2011, the government launched a women-only taxi service in the greater </span><a data-dcnode-id="3901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kuala_Lumpur" title="Kuala Lumpur"><span data-dcnode-id="3902" instrument_node="">Kuala Lumpur</span></a><span data-dcnode-id="3900" instrument_node=""> area.</span><sup class="reference" data-dcnode-id="3897" id="cite_ref-taxis_26-0"><a data-dcnode-id="3898" href="#cite_note-taxis-26"><span data-dcnode-id="3899" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3896" instrument_node=""> The taxis have women drivers, and operate on an on-call basis.</span><sup class="reference" data-dcnode-id="3893" id="cite_ref-taxis_26-1"><a data-dcnode-id="3894" href="#cite_note-taxis-26"><span data-dcnode-id="3895" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3892" instrument_node="">
</span></p><span data-dcnode-id="3890" instrument_node="">
