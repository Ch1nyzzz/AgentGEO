</span><p data-dcnode-id="7855"><b data-dcnode-id="7917"><span data-dcnode-id="7918" instrument_node="">Human rights in Cuba</span></b><span data-dcnode-id="7916" instrument_node=""> are under the scrutiny of Western human rights organizations, which accuse the </span><a data-dcnode-id="7914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuba" title="Cuba"><span data-dcnode-id="7915" instrument_node="">Cuban</span></a><span data-dcnode-id="7913" instrument_node=""> government of committing systematic human rights abuses against the Cuban people, including </span><a class="mw-redirect" data-dcnode-id="7911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arbitrary_imprisonment" title="Arbitrary imprisonment"><span data-dcnode-id="7912" instrument_node="">arbitrary imprisonment</span></a><span data-dcnode-id="7910" instrument_node=""> and unfair trials.</span><sup class="reference" data-dcnode-id="7907" id="cite_ref-1"><a data-dcnode-id="7908" href="#cite_note-1"><span data-dcnode-id="7909" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="7904" id="cite_ref-2"><a data-dcnode-id="7905" href="#cite_note-2"><span data-dcnode-id="7906" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="7901" id="cite_ref-3"><a data-dcnode-id="7902" href="#cite_note-3"><span data-dcnode-id="7903" instrument_node="">[3]</span></a></sup><span data-dcnode-id="7900" instrument_node=""> International human rights organizations such as </span><a data-dcnode-id="7898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amnesty_International" title="Amnesty International"><span data-dcnode-id="7899" instrument_node="">Amnesty International</span></a><span data-dcnode-id="7897" instrument_node=""> and </span><a data-dcnode-id="7895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_Rights_Watch" title="Human Rights Watch"><span data-dcnode-id="7896" instrument_node="">Human Rights Watch</span></a><span data-dcnode-id="7894" instrument_node=""> have drawn attention to the actions of the human rights movement and designated members of it as </span><a data-dcnode-id="7892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prisoner_of_conscience" title="Prisoner of conscience"><span data-dcnode-id="7893" instrument_node="">prisoners of conscience</span></a><span data-dcnode-id="7891" instrument_node="">, such as </span><a data-dcnode-id="7889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2593scar_El%25C3%25ADas_Biscet" title="Óscar Elías Biscet"><span data-dcnode-id="7890" instrument_node="">Óscar Elías Biscet</span></a><span data-dcnode-id="7888" instrument_node="">. In addition, the </span><a data-dcnode-id="7886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Committee_for_Democracy_in_Cuba" title="International Committee for Democracy in Cuba"><span data-dcnode-id="7887" instrument_node="">International Committee for Democracy in Cuba</span></a><span data-dcnode-id="7885" instrument_node=""> led by former statesmen </span><a data-dcnode-id="7883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/V%25C3%25A1clav_Havel" title="Václav Havel"><span data-dcnode-id="7884" instrument_node="">Václav Havel</span></a><span data-dcnode-id="7882" instrument_node=""> of the </span><a data-dcnode-id="7880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Czech_Republic" title="Czech Republic"><span data-dcnode-id="7881" instrument_node="">Czech Republic</span></a><span data-dcnode-id="7879" instrument_node="">, </span><a data-dcnode-id="7877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jos%25C3%25A9_Mar%25C3%25ADa_Aznar" title="José María Aznar"><span data-dcnode-id="7878" instrument_node="">José María Aznar</span></a><span data-dcnode-id="7876" instrument_node=""> of </span><a data-dcnode-id="7874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spain" title="Spain"><span data-dcnode-id="7875" instrument_node="">Spain</span></a><span data-dcnode-id="7873" instrument_node=""> and </span><a data-dcnode-id="7871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Patricio_Aylwin" title="Patricio Aylwin"><span data-dcnode-id="7872" instrument_node="">Patricio Aylwin</span></a><span data-dcnode-id="7870" instrument_node=""> of </span><a data-dcnode-id="7868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chile" title="Chile"><span data-dcnode-id="7869" instrument_node="">Chile</span></a><span data-dcnode-id="7867" instrument_node=""> was created to support the "civic movement".</span><sup class="noprint Inline-Template" data-dcnode-id="7860" style="white-space:nowrap;"><span data-dcnode-id="7866" instrument_node="">[</span><i data-dcnode-id="7862"><a class="mw-redirect" data-dcnode-id="7863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AAvoid_weasel_words" title="Wikipedia:Avoid weasel words"><span data-dcnode-id="7864" title="The material near this tag possibly uses too vague attribution or weasel words. (March 2021)"><span data-dcnode-id="7865" instrument_node="">which?</span></span></a></i><span data-dcnode-id="7861" instrument_node="">]</span></sup><sup class="reference" data-dcnode-id="7857" id="cite_ref-4"><a data-dcnode-id="7858" href="#cite_note-4"><span data-dcnode-id="7859" instrument_node="">[4]</span></a></sup><span data-dcnode-id="7856" instrument_node="">
</span></p><p data-dcnode-id="7820"><span data-dcnode-id="7854" instrument_node="">Concerns have been expressed about the operation of </span><a data-dcnode-id="7852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Due_process" title="Due process"><span data-dcnode-id="7853" instrument_node="">due process</span></a><span data-dcnode-id="7851" instrument_node="">. According to Human Rights Watch, even though Cuba, officially </span><a data-dcnode-id="7849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_atheism" title="State atheism"><span data-dcnode-id="7850" instrument_node="">atheist</span></a><span data-dcnode-id="7848" instrument_node=""> until 1992, now "permits greater opportunities for religious expression than it did in past years, and has allowed several religious-run humanitarian groups to operate, the government still maintains tight control on religious institutions, affiliated groups, and individual believers".</span><sup class="reference" data-dcnode-id="7845" id="cite_ref-hrw1999_5-0"><a data-dcnode-id="7846" href="#cite_note-hrw1999-5"><span data-dcnode-id="7847" instrument_node="">[5]</span></a></sup><span data-dcnode-id="7844" instrument_node=""> </span><a data-dcnode-id="7842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Censorship_in_Cuba" title="Censorship in Cuba"><span data-dcnode-id="7843" instrument_node="">Censorship in Cuba</span></a><span data-dcnode-id="7841" instrument_node=""> has also been at the center of complaints.</span><sup class="reference" data-dcnode-id="7838" id="cite_ref-RWB-Index2008_6-0"><a data-dcnode-id="7839" href="#cite_note-RWB-Index2008-6"><span data-dcnode-id="7840" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="7835" id="cite_ref-cubaonline_7-0"><a data-dcnode-id="7836" href="#cite_note-cubaonline-7"><span data-dcnode-id="7837" instrument_node="">[7]</span></a></sup><span data-dcnode-id="7834" instrument_node=""> According to the report of Human Rights Watch from 2017 the </span><a data-dcnode-id="7832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Government" title="Government"><span data-dcnode-id="7833" instrument_node="">government</span></a><span data-dcnode-id="7831" instrument_node=""> continues to rely on arbitrary detention to harass and intimidate critics, independent activists, </span><a data-dcnode-id="7829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissident" title="Dissident"><span data-dcnode-id="7830" instrument_node="">political opponents</span></a><span data-dcnode-id="7828" instrument_node="">, and others. This report added that the Cuban Commission for Human Rights and </span><a data-dcnode-id="7826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Reconciliation" title="National Reconciliation"><span data-dcnode-id="7827" instrument_node="">National Reconciliation</span></a><span data-dcnode-id="7825" instrument_node="">, an independent human rights group that lacks official authorization and is therefore considered illegal by the government, received more than 7,900 reports of arbitrary detentions from January through August 2016. This represents the highest monthly average of detentions in the past six years.</span><sup class="reference" data-dcnode-id="7822" id="cite_ref-Cuba_Events_of_2016_8-0"><a data-dcnode-id="7823" href="#cite_note-Cuba_Events_of_2016-8"><span data-dcnode-id="7824" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7821" instrument_node="">
</span></p><p data-dcnode-id="7805"><span data-dcnode-id="7819" instrument_node="">Amnesty International's 2017–2018 Annual Report also noted more </span><a data-dcnode-id="7817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arbitrary_arrest_and_detention" title="Arbitrary arrest and detention"><span data-dcnode-id="7818" instrument_node="">arbitrary detentions</span></a><span data-dcnode-id="7816" instrument_node="">, discriminatory layoffs by state agencies and harassments in </span><a data-dcnode-id="7814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-employment" title="Self-employment"><span data-dcnode-id="7815" instrument_node="">self-employment</span></a><span data-dcnode-id="7813" instrument_node=""> with the aim of making them silent in criticism. Regarding any progress in </span><a data-dcnode-id="7811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Education" title="Education"><span data-dcnode-id="7812" instrument_node="">education</span></a><span data-dcnode-id="7810" instrument_node="">, Amnesty International reported that advances in education were undermined by ongoing online and offline censorship. Cuba remained mostly closed to independent human rights monitors.</span><sup class="reference" data-dcnode-id="7807" id="cite_ref-:0_9-0"><a data-dcnode-id="7808" href="#cite_note-:0-9"><span data-dcnode-id="7809" instrument_node="">[9]</span></a></sup><span data-dcnode-id="7806" instrument_node="">
</span></p><p data-dcnode-id="7791"><span data-dcnode-id="7804" instrument_node="">With regard to </span><a data-dcnode-id="7802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arbitrary_arrest_and_detention" title="Arbitrary arrest and detention"><span data-dcnode-id="7803" instrument_node="">arbitrary arrests and detentions</span></a><span data-dcnode-id="7801" instrument_node="">, the report added that human rights activists and political activists continued to be </span><a data-dcnode-id="7799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harassment" title="Harassment"><span data-dcnode-id="7800" instrument_node="">harassed</span></a><span data-dcnode-id="7798" instrument_node="">, </span><a data-dcnode-id="7796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intimidation" title="Intimidation"><span data-dcnode-id="7797" instrument_node="">intimidated</span></a><span data-dcnode-id="7795" instrument_node=""> and arbitrarily detained in high numbers. The Cuban Commission for Human Rights and National Reconciliation, a Cuban </span><a data-dcnode-id="7793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-governmental_organization" title="Non-governmental organization"><span data-dcnode-id="7794" instrument_node="">NGO</span></a><span data-dcnode-id="7792" instrument_node=""> which is not officially recognized by the state, recorded 5,155 arbitrary detentions in 2017, in contrast to 9,940 in 2016.
</span></p><span data-dcnode-id="7790" instrument_node="">

</span><p data-dcnode-id="7000"><span data-dcnode-id="7033" instrument_node="">During </span><a class="mw-redirect" data-dcnode-id="7031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spanish_colonization" title="Spanish colonization"><span data-dcnode-id="7032" instrument_node="">Spanish colonization</span></a><span data-dcnode-id="7030" instrument_node="">, the oppression of the indigenous populations was chronicled at length by clergyman </span><a data-dcnode-id="7028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bartolom%25C3%25A9_de_las_Casas" title="Bartolomé de las Casas"><span data-dcnode-id="7029" instrument_node="">Bartolomé de las Casas</span></a><span data-dcnode-id="7027" instrument_node="">. The subsequent transportation of African slaves to the island, which lasted over 300 years, led to </span><a data-dcnode-id="7025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="7026" instrument_node="">British</span></a><span data-dcnode-id="7024" instrument_node=""> military intervention and a determination "to put a stop to these abuses".</span><sup class="reference" data-dcnode-id="7021" id="cite_ref-10"><a data-dcnode-id="7022" href="#cite_note-10"><span data-dcnode-id="7023" instrument_node="">[10]</span></a></sup><span data-dcnode-id="7020" instrument_node=""> Since Cuba achieved independence in 1902, successive Cuban governments have been criticised and condemned by various groups, both within Cuba and internationally, for human rights violations on the island. During the latter part of the Spanish colonial era in Cuba, human rights on the island became a particular international concern. After a visit to the region in 1898, </span><a class="mw-redirect" data-dcnode-id="7018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._Senator" title="U.S. Senator"><span data-dcnode-id="7019" instrument_node="">U.S. Senator</span></a><span data-dcnode-id="7017" instrument_node=""> </span><a data-dcnode-id="7015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Redfield_Proctor" title="Redfield Proctor"><span data-dcnode-id="7016" instrument_node="">Redfield Proctor</span></a><span data-dcnode-id="7014" instrument_node=""> estimated that up to 200,000 Cubans had died from starvation and disease within "</span><a class="mw-redirect" data-dcnode-id="7012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Valeriano_Weyler%2C_1st_Duke_of_Rub%25C3%25AD%23Cuba" title="Valeriano Weyler, 1st Duke of Rubí"><span data-dcnode-id="7013" instrument_node="">Spanish forts</span></a><span data-dcnode-id="7011" instrument_node="">", essentially </span><a class="mw-redirect" data-dcnode-id="7009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Concentration_camps" title="Concentration camps"><span data-dcnode-id="7010" instrument_node="">concentration camps</span></a><span data-dcnode-id="7008" instrument_node="">.</span><sup class="reference" data-dcnode-id="7005" id="cite_ref-11"><a data-dcnode-id="7006" href="#cite_note-11"><span data-dcnode-id="7007" instrument_node="">[11]</span></a></sup><span data-dcnode-id="7004" instrument_node=""> The concern was a contributory factor in garnering support for the </span><a data-dcnode-id="7002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spanish%25E2%2580%2593American_War" title="Spanish–American War"><span data-dcnode-id="7003" instrument_node="">Spanish–American War</span></a><span data-dcnode-id="7001" instrument_node=""> in the U.S.
</span></p><p data-dcnode-id="6982"><span data-dcnode-id="6999" instrument_node="">After independence, and following a sustained period of instability, the 1924–33 capitalist government of </span><a data-dcnode-id="6997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gerardo_Machado" title="Gerardo Machado"><span data-dcnode-id="6998" instrument_node="">Gerardo Machado</span></a><span data-dcnode-id="6996" instrument_node=""> proved to be authoritarian. Machado extended his rule until </span><a data-dcnode-id="6994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fulgencio_Batista" title="Fulgencio Batista"><span data-dcnode-id="6995" instrument_node="">Fulgencio Batista</span></a><span data-dcnode-id="6993" instrument_node=""> led an uprising called the Revolt of the Sergeants, as part of a coup which deposed Machado in 1933. Batista then became the strongman behind a succession of puppet presidents until he was himself elected president in 1940. According to </span><a class="mw-redirect" data-dcnode-id="6991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hugh_Thomas_%28writer%29" title="Hugh Thomas (writer)"><span data-dcnode-id="6992" instrument_node="">Hugh Thomas</span></a><span data-dcnode-id="6990" instrument_node="">, the post-Machado period was marked by violent reprisals, mass lynchings and a deterioration towards corruption and </span><i data-dcnode-id="6988"><span data-dcnode-id="6989" instrument_node="">gansterismo</span></i><span data-dcnode-id="6987" instrument_node=""> throughout the island.</span><sup class="reference" data-dcnode-id="6984" id="cite_ref-12"><a data-dcnode-id="6985" href="#cite_note-12"><span data-dcnode-id="6986" instrument_node="">[12]</span></a></sup><span data-dcnode-id="6983" instrument_node="">
</span></p><p data-dcnode-id="6970"><span data-dcnode-id="6981" instrument_node="">From 1940, Cuba had a multiparty electoral system until </span><a data-dcnode-id="6979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fulgencio_Batista" title="Fulgencio Batista"><span data-dcnode-id="6980" instrument_node="">Fulgencio Batista</span></a><span data-dcnode-id="6978" instrument_node=""> (President from 1940–1944) staged a coup with military backing on March 10, 1952.</span><sup class="reference" data-dcnode-id="6975" id="cite_ref-Bethell-Cuba_13-0"><a data-dcnode-id="6976" href="#cite_note-Bethell-Cuba-13"><span data-dcnode-id="6977" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="6972" id="cite_ref-Sweig-Inside_14-0"><a data-dcnode-id="6973" href="#cite_note-Sweig-Inside-14"><span data-dcnode-id="6974" instrument_node="">[14]</span></a></sup><span data-dcnode-id="6971" instrument_node="">
</span></p><p data-dcnode-id="6965"><span data-dcnode-id="6969" instrument_node="">In 1958, </span><i data-dcnode-id="6967"><span data-dcnode-id="6968" instrument_node="">Time</span></i><span data-dcnode-id="6966" instrument_node=""> magazine wrote: "Cuba's fanatic, poorly armed rebels last week tried to smash President Fulgencio Batista with the ultimate weapon of civilian revolutions: the general strike.&nbsp;... Fulgencio Batista got ready for the strike by offering immunity to anyone who killed a striker and by threatening to jail any employer who closed shop." During the strike, militants and youths stole guns, and threw bombs (one of which may have set up a gas-mains fire), after which some people were killed in clashes.
</span></p><p data-dcnode-id="6949"><span data-dcnode-id="6964" instrument_node="">The strike was short-lived: "With the upper hand, Batista drove boldly around the city while his cops proceeded to make their supremacy complete. When a patrol car radioed that it had clashed with rebels and had 'a dead man and a prisoner', the dispatcher ordered: 'Shoot him.' At midafternoon, cops burst into a boardinghouse, grabbed three young men who were leaders of Cuba's lay Catholic Action movement, which sympathizes with Castro. Two hours later their stripped, </span><a data-dcnode-id="6962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torture" title="Torture"><span data-dcnode-id="6963" instrument_node="">tortured</span></a><span data-dcnode-id="6961" instrument_node=""> and bullet-torn bodies were turned over to relatives. Total dead: 43."</span><sup class="noprint Inline-Template" data-dcnode-id="6954" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="6960" instrument_node="">[</span><i data-dcnode-id="6956"><a data-dcnode-id="6957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AAttribution_needed" title="Wikipedia:Attribution needed"><span data-dcnode-id="6958" title="This sentence may contain perspectives and opinions without stating whose they are. (November 2016)"><span data-dcnode-id="6959" instrument_node="">attribution needed</span></span></a></i><span data-dcnode-id="6955" instrument_node="">]</span></sup><sup class="reference" data-dcnode-id="6951" id="cite_ref-15"><a data-dcnode-id="6952" href="#cite_note-15"><span data-dcnode-id="6953" instrument_node="">[15]</span></a></sup><span data-dcnode-id="6950" instrument_node="">
</span></p><p data-dcnode-id="6934"><span data-dcnode-id="6948" instrument_node="">In 1959, </span><a data-dcnode-id="6946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fidel_Castro" title="Fidel Castro"><span data-dcnode-id="6947" instrument_node="">Fidel Castro</span></a><span data-dcnode-id="6945" instrument_node=""> and his forces succeeded in displacing Batista from power. At that time there were fundamental changes in the judicial and political process. During this transitional period there were some concerns voiced about </span><a data-dcnode-id="6943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Due_process" title="Due process"><span data-dcnode-id="6944" instrument_node="">due process</span></a><span data-dcnode-id="6942" instrument_node="">.</span><sup class="reference" data-dcnode-id="6939" id="cite_ref-16"><a data-dcnode-id="6940" href="#cite_note-16"><span data-dcnode-id="6941" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="6936" id="cite_ref-17"><a data-dcnode-id="6937" href="#cite_note-17"><span data-dcnode-id="6938" instrument_node="">[17]</span></a></sup><span data-dcnode-id="6935" instrument_node="">
</span></p><p data-dcnode-id="6922"><span data-dcnode-id="6933" instrument_node="">The "Cuban National Reconciliation movement", a U.S.-based organisation that claims to act as a forum for discussing Cuban society, has detailed what it believes are complex variables when analysing human rights immediately after the revolution. In the 1960s, violent confrontations known as the </span><a class="mw-redirect" data-dcnode-id="6931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Escambray_Rebellion" title="Escambray Rebellion"><span data-dcnode-id="6932" instrument_node="">Escambray Rebellion</span></a><span data-dcnode-id="6930" instrument_node=""> between the Cuban government and armed opposition were ongoing, but had declined by the early 1970s. The group asserts that by the time international human rights movements flourished in the 1970s, the most severe period of repression was over, making non-partisan retrospective assessments of the period difficult. The reconciliation movement also cite the difficulties in assessing accounts of abuses that are commonly split upon partisan lines. According to the group, </span><a class="mw-redirect" data-dcnode-id="6928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuban_exiles" title="Cuban exiles"><span data-dcnode-id="6929" instrument_node="">Cuban exiles</span></a><span data-dcnode-id="6927" instrument_node=""> who were often the first to denounce the Cuban government, largely shared an anti-Communist ideology and overlooked violations committed by other regimes, whilst many left leaning observers did not give the claims of Cuban victims due consideration.</span><sup class="reference" data-dcnode-id="6924" id="cite_ref-18"><a data-dcnode-id="6925" href="#cite_note-18"><span data-dcnode-id="6926" instrument_node="">[18]</span></a></sup><span data-dcnode-id="6923" instrument_node="">
</span></p><p data-dcnode-id="6913"><span data-dcnode-id="6921" instrument_node="">After coming to power in 1959, Fidel Castro's government built a highly effective machinery of </span><a data-dcnode-id="6919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_repression" title="Political repression"><span data-dcnode-id="6920" instrument_node="">repression</span></a><span data-dcnode-id="6918" instrument_node="">, according to Human Rights Watch.</span><sup class="reference" data-dcnode-id="6915" id="cite_ref-hrw1999_5-1"><a data-dcnode-id="6916" href="#cite_note-hrw1999-5"><span data-dcnode-id="6917" instrument_node="">[5]</span></a></sup><span data-dcnode-id="6914" instrument_node="">
</span></p><p data-dcnode-id="6888"><span data-dcnode-id="6912" instrument_node="">As early as September 1959, Vadim Kotchergin (or Kochergin), a </span><a data-dcnode-id="6910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/KGB" title="KGB"><span data-dcnode-id="6911" instrument_node="">KGB</span></a><span data-dcnode-id="6909" instrument_node=""> agent, was seen in Cuba.</span><sup class="reference" data-dcnode-id="6906" id="cite_ref-19"><a data-dcnode-id="6907" href="#cite_note-19"><span data-dcnode-id="6908" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="6903" id="cite_ref-20"><a data-dcnode-id="6904" href="#cite_note-20"><span data-dcnode-id="6905" instrument_node="">[20]</span></a></sup><span data-dcnode-id="6902" instrument_node=""> Jorge Luis Vasquez, a Cuban who was imprisoned in </span><a data-dcnode-id="6900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East_Germany" title="East Germany"><span data-dcnode-id="6901" instrument_node="">East Germany</span></a><span data-dcnode-id="6899" instrument_node="">, states that the East German secret police </span><a data-dcnode-id="6897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stasi" title="Stasi"><span data-dcnode-id="6898" instrument_node="">Stasi</span></a><span data-dcnode-id="6896" instrument_node=""> trained the personnel of the </span><a class="new" data-dcnode-id="6894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCuban_Interior_Ministry%26action%3Dedit%26redlink%3D1" title="Cuban Interior Ministry (page does not exist)"><span data-dcnode-id="6895" instrument_node="">Cuban Interior Ministry</span></a><span data-dcnode-id="6893" instrument_node=""> (MININT).</span><sup class="reference" data-dcnode-id="6890" id="cite_ref-21"><a data-dcnode-id="6891" href="#cite_note-21"><span data-dcnode-id="6892" instrument_node="">[21]</span></a></sup><span data-dcnode-id="6889" instrument_node="">
</span></p><span data-dcnode-id="6887" instrument_node="">
</span><h3 data-dcnode-id="6877"><span class="mw-headline" data-dcnode-id="6885" id="Political_executions"><span data-dcnode-id="6886" instrument_node="">Political executions</span></span><span class="mw-editsection" data-dcnode-id="6878"><span class="mw-editsection-bracket" data-dcnode-id="6883"><span data-dcnode-id="6884" instrument_node="">[</span></span><a data-dcnode-id="6881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D2" title="Edit section: Political executions"><span data-dcnode-id="6882" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6879"><span data-dcnode-id="6880" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6876" instrument_node="">
</span><p data-dcnode-id="6799"><span data-dcnode-id="6875" instrument_node="">Various estimates have been made in order to ascertain the number of political executions which have been carried out on behalf of the Cuban government since the revolution.  During the first two months of 1959, Castro's government executed more than 300 Batista officials,</span><sup class="reference" data-dcnode-id="6872" id="cite_ref-APfeb59_22-0"><a data-dcnode-id="6873" href="#cite_note-APfeb59-22"><span data-dcnode-id="6874" instrument_node="">[22]</span></a></sup><span data-dcnode-id="6871" instrument_node=""> with Latin American historian Thomas E. Skidmore says that there had been 550 executions in the first six months of 1959.</span><sup class="reference" data-dcnode-id="6868" id="cite_ref-Atlas_23-0"><a data-dcnode-id="6869" href="#cite_note-Atlas-23"><span data-dcnode-id="6870" instrument_node="">[23]</span></a></sup><span data-dcnode-id="6867" instrument_node=""> In an April 1961 </span><a class="mw-redirect" data-dcnode-id="6865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UPI" title="UPI"><span data-dcnode-id="6866" instrument_node="">UPI</span></a><span data-dcnode-id="6864" instrument_node=""> story, the agency stated that about "700 have died before Castro's firing squads" between 1959 and 1961.</span><sup class="reference" data-dcnode-id="6861" id="cite_ref-24"><a data-dcnode-id="6862" href="#cite_note-24"><span data-dcnode-id="6863" instrument_node="">[24]</span></a></sup><span data-dcnode-id="6860" instrument_node=""> </span><i data-dcnode-id="6858"><span data-dcnode-id="6859" instrument_node="">The World Handbook of Political and Social Indicators</span></i><span data-dcnode-id="6857" instrument_node=""> ascertained that there had been 2,113 political executions between the years 1958–67,</span><sup class="reference" data-dcnode-id="6854" id="cite_ref-Atlas_23-1"><a data-dcnode-id="6855" href="#cite_note-Atlas-23"><span data-dcnode-id="6856" instrument_node="">[23]</span></a></sup><span data-dcnode-id="6853" instrument_node=""> while British historian </span><a class="mw-redirect" data-dcnode-id="6851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hugh_Thomas_%28writer%29" title="Hugh Thomas (writer)"><span data-dcnode-id="6852" instrument_node="">Hugh Thomas</span></a><span data-dcnode-id="6850" instrument_node="">, stated in his study </span><i data-dcnode-id="6848"><span data-dcnode-id="6849" instrument_node="">Cuba or the pursuit of freedom</span></i><sup class="reference" data-dcnode-id="6845" id="cite_ref-25"><a data-dcnode-id="6846" href="#cite_note-25"><span data-dcnode-id="6847" instrument_node="">[25]</span></a></sup><span data-dcnode-id="6844" instrument_node=""> that "perhaps" 5,000 executions had taken place by 1970.</span><sup class="reference" data-dcnode-id="6841" id="cite_ref-Atlas_23-2"><a data-dcnode-id="6842" href="#cite_note-Atlas-23"><span data-dcnode-id="6843" instrument_node="">[23]</span></a></sup><span data-dcnode-id="6840" instrument_node=""> According to Amnesty International, the total number of death sentences issued from 1959–87 was 237, of which all but 21 were actually carried out.</span><sup class="reference" data-dcnode-id="6837" id="cite_ref-26"><a data-dcnode-id="6838" href="#cite_note-26"><span data-dcnode-id="6839" instrument_node="">[26]</span></a></sup><span data-dcnode-id="6836" instrument_node=""> </span><i data-dcnode-id="6833"><a data-dcnode-id="6834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Black_Book_of_Communism" title="The Black Book of Communism"><span data-dcnode-id="6835" instrument_node="">The Black Book of Communism</span></a></i><span data-dcnode-id="6832" instrument_node=""> estimated that between 15,000 and 17,000 people were executed by the state.</span><sup class="reference" data-dcnode-id="6829" id="cite_ref-27"><a data-dcnode-id="6830" href="#cite_note-27"><span data-dcnode-id="6831" instrument_node="">[27]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="6822" style="white-space:nowrap;"><span data-dcnode-id="6828" instrument_node="">[</span><i data-dcnode-id="6824"><a data-dcnode-id="6825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="6826" title="The material near this tag failed verification of its source citation(s). (July 2021)"><span data-dcnode-id="6827" instrument_node="">failed verification</span></span></a></i><span data-dcnode-id="6823" instrument_node="">]</span></sup><span data-dcnode-id="6821" instrument_node=""> The anti-Castro Archivo Cuba estimates that 4,000 people were executed in Cuba between 1959 and 2016. It claims there have been 4,309 confirmed executions or extrajudicial killings since 1952; the actual death toll of the Cuban Revolution is estimated to be higher, but an exact count of victims is unavailable, given a lack of available records and political transparency in Cuba.</span><sup class="reference" data-dcnode-id="6818" id="cite_ref-28"><a data-dcnode-id="6819" href="#cite_note-28"><span data-dcnode-id="6820" instrument_node="">[28]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="6811" style="white-space:nowrap;"><span data-dcnode-id="6817" instrument_node="">[</span><i data-dcnode-id="6813"><a data-dcnode-id="6814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="6815" title="Source links to front page, database link is broken. (April 2022)"><span data-dcnode-id="6816" instrument_node="">failed verification</span></span></a></i><span data-dcnode-id="6812" instrument_node="">]</span></sup><sup class="reference" data-dcnode-id="6808" id="cite_ref-29"><a data-dcnode-id="6809" href="#cite_note-29"><span data-dcnode-id="6810" instrument_node="">[29]</span></a></sup><sup class="noprint Inline-Template noprint noexcerpt Template-Fact" data-dcnode-id="6801" style="white-space:nowrap;"><span data-dcnode-id="6807" instrument_node="">[</span><i data-dcnode-id="6803"><a class="mw-redirect" data-dcnode-id="6804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANOTRS" title="Wikipedia:NOTRS"><span data-dcnode-id="6805" title="Source is a Miami news article that addresses a tangential issue. A scholarly/academic source would be higher quality. (April 2022)"><span data-dcnode-id="6806" instrument_node="">better&nbsp;source&nbsp;needed</span></span></a></i><span data-dcnode-id="6802" instrument_node="">]</span></sup><span data-dcnode-id="6800" instrument_node="">
</span></p><p data-dcnode-id="6771"><span data-dcnode-id="6798" instrument_node="">The vast majority of those executed directly following the 1959 revolution were policemen, politicians and informers for the Batista regime who were accused of crimes such as torture and murder, and their public trials and executions enjoyed widespread popular support among the Cuban population. Most scholars agree that those executed were probably guilty as charged, but their trials did not follow </span><a data-dcnode-id="6796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Due_process" title="Due process"><span data-dcnode-id="6797" instrument_node="">due process</span></a><span data-dcnode-id="6795" instrument_node="">.</span><sup class="reference" data-dcnode-id="6792" id="cite_ref-30"><a data-dcnode-id="6793" href="#cite_note-30"><span data-dcnode-id="6794" instrument_node="">[30]</span></a></sup><sup class="reference" data-dcnode-id="6789" id="cite_ref-31"><a data-dcnode-id="6790" href="#cite_note-31"><span data-dcnode-id="6791" instrument_node="">[31]</span></a></sup><span data-dcnode-id="6788" instrument_node=""> The Cuban Government justified such measures on the grounds that in Cuba, the application of the death penalty against </span><a data-dcnode-id="6786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_crime" title="War crime"><span data-dcnode-id="6787" instrument_node="">war criminals</span></a><span data-dcnode-id="6785" instrument_node=""> and others followed the same procedure which had previously been followed by the </span><a data-dcnode-id="6783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allies_of_World_War_II" title="Allies of World War II"><span data-dcnode-id="6784" instrument_node="">Allies</span></a><span data-dcnode-id="6782" instrument_node=""> during the </span><a data-dcnode-id="6780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuremberg_trials" title="Nuremberg trials"><span data-dcnode-id="6781" instrument_node="">Nuremberg trials</span></a><span data-dcnode-id="6779" instrument_node="">. Some Cuban scholars maintain that if the government had not imposed severe legislation against the torturers, </span><a data-dcnode-id="6777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terrorism" title="Terrorism"><span data-dcnode-id="6778" instrument_node="">terrorists</span></a><span data-dcnode-id="6776" instrument_node="">, and other criminals who had been employed by the Batista regime, the people themselves would have taken justice into their own hands.</span><sup class="reference" data-dcnode-id="6773" id="cite_ref-32"><a data-dcnode-id="6774" href="#cite_note-32"><span data-dcnode-id="6775" instrument_node="">[32]</span></a></sup><span data-dcnode-id="6772" instrument_node="">
</span></p><span data-dcnode-id="6770" instrument_node="">
</span><h3 data-dcnode-id="6760"><span class="mw-headline" data-dcnode-id="6768" id="Refugees"><span data-dcnode-id="6769" instrument_node="">Refugees</span></span><span class="mw-editsection" data-dcnode-id="6761"><span class="mw-editsection-bracket" data-dcnode-id="6766"><span data-dcnode-id="6767" instrument_node="">[</span></span><a data-dcnode-id="6764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D3" title="Edit section: Refugees"><span data-dcnode-id="6765" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6762"><span data-dcnode-id="6763" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6759" instrument_node="">
</span><p data-dcnode-id="6740"><span data-dcnode-id="6758" instrument_node="">According to the US government, some 1,200,000 Cubans (about 10% of the current population</span><sup class="noprint Inline-Template" data-dcnode-id="6746" style="white-space:nowrap;"><span data-dcnode-id="6757" instrument_node="">[</span><i data-dcnode-id="6748"><a data-dcnode-id="6754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANeutral_point_of_view%23Due_and_undue_weight" title="Wikipedia:Neutral point of view"><span data-dcnode-id="6755" title="The material near this tag may be giving undue weight to a viewpoint or idea. (July 2021)"><span data-dcnode-id="6756" instrument_node="">undue weight?</span></span></a><span data-dcnode-id="6753" instrument_node=""> </span><span class="metadata" data-dcnode-id="6749"><span data-dcnode-id="6752" instrument_node=""> – </span><a data-dcnode-id="6750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talk%3AHuman_rights_in_Cuba%23undue" title="Talk:Human rights in Cuba"><span data-dcnode-id="6751" instrument_node="">discuss</span></a></span></i><span data-dcnode-id="6747" instrument_node="">]</span></sup><span data-dcnode-id="6745" instrument_node="">) left the island for the United States between 1959 and 1993.</span><sup class="reference" data-dcnode-id="6742" id="cite_ref-census.gov_33-0"><a data-dcnode-id="6743" href="#cite_note-census.gov-33"><span data-dcnode-id="6744" instrument_node="">[33]</span></a></sup><span data-dcnode-id="6741" instrument_node="">
</span></p><span data-dcnode-id="6739" instrument_node="">
</span><h3 data-dcnode-id="6729"><span class="mw-headline" data-dcnode-id="6737" id="Alleged_forced_labor_camps_and_abuse_of_prisoners"><span data-dcnode-id="6738" instrument_node="">Alleged forced labor camps and abuse of prisoners</span></span><span class="mw-editsection" data-dcnode-id="6730"><span class="mw-editsection-bracket" data-dcnode-id="6735"><span data-dcnode-id="6736" instrument_node="">[</span></span><a data-dcnode-id="6733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D4" title="Edit section: Alleged forced labor camps and abuse of prisoners"><span data-dcnode-id="6734" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6731"><span data-dcnode-id="6732" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6728" instrument_node="">
</span><p data-dcnode-id="6703"><span data-dcnode-id="6727" instrument_node="">In 1987, a "Tribunal on Cuba" was held in </span><a data-dcnode-id="6725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris" title="Paris"><span data-dcnode-id="6726" instrument_node="">Paris</span></a><span data-dcnode-id="6724" instrument_node=""> in order to present testimonies by former prisoners of </span><a class="mw-redirect" data-dcnode-id="6722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuban_penal_system" title="Cuban penal system"><span data-dcnode-id="6723" instrument_node="">Cuba's penal system</span></a><span data-dcnode-id="6721" instrument_node=""> to the international media. The gathering was sponsored by a US-funded anti-communist group which was named </span><a data-dcnode-id="6719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Resistance_International" title="Resistance International"><span data-dcnode-id="6720" instrument_node="">Resistance International</span></a><span data-dcnode-id="6718" instrument_node=""> and "The Coalition of Committees for the Rights of Man in Cuba". The testimonies which were presented at the tribunal, before an international panel, alleged that a pattern of </span><a data-dcnode-id="6716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torture" title="Torture"><span data-dcnode-id="6717" instrument_node="">torture</span></a><span data-dcnode-id="6715" instrument_node=""> existed in Cuba's prisons and "hard labor camps". The torture consisted of beatings, biological experiments which included dietary restrictions, violent interrogations and extremely unsanitary living conditions. The jury concurred with allegations of arbitrary arrest; sentencing by court martial with no public audience or defender; periods of time which prisoners spent in hard labour camps without sufficient food, clothing or medical care; and the arrest of children who were over nine years old.</span><sup class="reference" data-dcnode-id="6712" id="cite_ref-34"><a data-dcnode-id="6713" href="#cite_note-34"><span data-dcnode-id="6714" instrument_node="">[34]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="6705" style="white-space:nowrap;"><span data-dcnode-id="6711" instrument_node="">[</span><i data-dcnode-id="6707"><a data-dcnode-id="6708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AReliable_sources" title="Wikipedia:Reliable sources"><span data-dcnode-id="6709" title="The material near this tag relies on an unreliable source. Resistance International was a US-funded anti-communist organisation, making it an extremely biased source. (July 2021)"><span data-dcnode-id="6710" instrument_node="">unreliable source</span></span></a></i><span data-dcnode-id="6706" instrument_node="">]</span></sup><span data-dcnode-id="6704" instrument_node="">
</span></p><span data-dcnode-id="6702" instrument_node="">
</span><h3 data-dcnode-id="6692"><span class="mw-headline" data-dcnode-id="6700" id="Political_abuse_of_psychiatry"><span data-dcnode-id="6701" instrument_node="">Political abuse of psychiatry</span></span><span class="mw-editsection" data-dcnode-id="6693"><span class="mw-editsection-bracket" data-dcnode-id="6698"><span data-dcnode-id="6699" instrument_node="">[</span></span><a data-dcnode-id="6696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D5" title="Edit section: Political abuse of psychiatry"><span data-dcnode-id="6697" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6694"><span data-dcnode-id="6695" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6691" instrument_node="">
</span><p data-dcnode-id="6613"><span data-dcnode-id="6690" instrument_node="">Although Cuba has been politically connected to the Soviet Union since the United States broke off relations with Cuba shortly after its prime minister </span><a data-dcnode-id="6688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fidel_Castro" title="Fidel Castro"><span data-dcnode-id="6689" instrument_node="">Fidel Castro</span></a><span data-dcnode-id="6687" instrument_node=""> came to power in 1959, few considerable allegations regarding the </span><a data-dcnode-id="6685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_abuse_of_psychiatry" title="Political abuse of psychiatry"><span data-dcnode-id="6686" instrument_node="">political abuse of psychiatry</span></a><span data-dcnode-id="6684" instrument_node=""> in that country emerged before the late 1980s.</span><sup class="reference" data-dcnode-id="6681" id="cite_ref-Medicine_betrayed_35-0"><a data-dcnode-id="6682" href="#cite_note-Medicine_betrayed-35"><span data-dcnode-id="6683" instrument_node="">[35]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6678"><span data-dcnode-id="6679" title="Page / location: 74"><span data-dcnode-id="6680" instrument_node="">: 74 </span></span></sup><span data-dcnode-id="6677" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="6675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Americas_Watch" title="Americas Watch"><span data-dcnode-id="6676" instrument_node="">Americas Watch</span></a><span data-dcnode-id="6674" instrument_node=""> and </span><a data-dcnode-id="6672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amnesty_International" title="Amnesty International"><span data-dcnode-id="6673" instrument_node="">Amnesty International</span></a><span data-dcnode-id="6671" instrument_node=""> published reports which alluded to cases of possible unwarranted hospitalization and ill-treatment of political prisoners.</span><sup class="reference" data-dcnode-id="6668" id="cite_ref-Medicine_betrayed_35-1"><a data-dcnode-id="6669" href="#cite_note-Medicine_betrayed-35"><span data-dcnode-id="6670" instrument_node="">[35]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6665"><span data-dcnode-id="6666" title="Page / location: 75"><span data-dcnode-id="6667" instrument_node="">: 75 </span></span></sup><span data-dcnode-id="6664" instrument_node=""> These reports concerned the Gustavo Machin hospital in </span><a data-dcnode-id="6662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Santiago_de_Cuba" title="Santiago de Cuba"><span data-dcnode-id="6663" instrument_node="">Santiago de Cuba</span></a><span data-dcnode-id="6661" instrument_node=""> in the southeast of the country and the major mental hospital in </span><a data-dcnode-id="6659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Havana" title="Havana"><span data-dcnode-id="6660" instrument_node="">Havana</span></a><span data-dcnode-id="6658" instrument_node="">.</span><sup class="reference" data-dcnode-id="6655" id="cite_ref-Medicine_betrayed_35-2"><a data-dcnode-id="6656" href="#cite_note-Medicine_betrayed-35"><span data-dcnode-id="6657" instrument_node="">[35]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6652"><span data-dcnode-id="6653" title="Page / location: 75"><span data-dcnode-id="6654" instrument_node="">: 75 </span></span></sup><span data-dcnode-id="6651" instrument_node=""> In 1977, a report on the alleged abuse of psychiatry in Cuba was published in the United States and it presented cases of ill-treatment in Cuban mental hospitals which dated back to the early 1970s.</span><sup class="reference" data-dcnode-id="6648" id="cite_ref-Medicine_betrayed_35-3"><a data-dcnode-id="6649" href="#cite_note-Medicine_betrayed-35"><span data-dcnode-id="6650" instrument_node="">[35]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6645"><span data-dcnode-id="6646" title="Page / location: 75"><span data-dcnode-id="6647" instrument_node="">: 75 </span></span></sup><span data-dcnode-id="6644" instrument_node=""> It presents grave allegations which claim that prisoners who end up in the forensic wards of mental hospitals in Santiago de Cuba and Havana are subjected to methods of ill-treatment which include </span><a data-dcnode-id="6642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electroconvulsive_therapy" title="Electroconvulsive therapy"><span data-dcnode-id="6643" instrument_node="">electroconvulsive therapy</span></a><span data-dcnode-id="6641" instrument_node=""> without the use of </span><a data-dcnode-id="6639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muscle_relaxant" title="Muscle relaxant"><span data-dcnode-id="6640" instrument_node="">muscle relaxants</span></a><span data-dcnode-id="6638" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="6636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anaesthesia" title="Anaesthesia"><span data-dcnode-id="6637" instrument_node="">anaesthesia</span></a><span data-dcnode-id="6635" instrument_node="">.</span><sup class="reference" data-dcnode-id="6632" id="cite_ref-Medicine_betrayed_35-4"><a data-dcnode-id="6633" href="#cite_note-Medicine_betrayed-35"><span data-dcnode-id="6634" instrument_node="">[35]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6629"><span data-dcnode-id="6630" title="Page / location: 75"><span data-dcnode-id="6631" instrument_node="">: 75 </span></span></sup><span data-dcnode-id="6628" instrument_node=""> The reported application of ECT in the forensic wards seems, at least in many of the cited cases, not to be an adequate clinical treatment for the diagnosed state of the prisoner—in some cases the prisoners do not seem to have been diagnosed at all.</span><sup class="reference" data-dcnode-id="6625" id="cite_ref-Medicine_betrayed_35-5"><a data-dcnode-id="6626" href="#cite_note-Medicine_betrayed-35"><span data-dcnode-id="6627" instrument_node="">[35]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6622"><span data-dcnode-id="6623" title="Page / location: 75"><span data-dcnode-id="6624" instrument_node="">: 75 </span></span></sup><span data-dcnode-id="6621" instrument_node=""> Conditions in the forensic wards have been described in repulsive terms and they are apparently in striking contrast to the conditions in the other parts of the mental hospitals that are said to be well-kept and modern.</span><sup class="reference" data-dcnode-id="6618" id="cite_ref-Medicine_betrayed_35-6"><a data-dcnode-id="6619" href="#cite_note-Medicine_betrayed-35"><span data-dcnode-id="6620" instrument_node="">[35]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6615"><span data-dcnode-id="6616" title="Page / location: 75"><span data-dcnode-id="6617" instrument_node="">: 75 </span></span></sup><span data-dcnode-id="6614" instrument_node="">
</span></p><p data-dcnode-id="6597"><span data-dcnode-id="6612" instrument_node="">In August 1981, the Marxist historian Ariel Hidalgo was apprehended and accused of "incitement against the social order, international solidarity and the Socialist State" and sentenced to eight years' imprisonment.</span><sup class="reference" data-dcnode-id="6609" id="cite_ref-Medicine_betrayed_35-7"><a data-dcnode-id="6610" href="#cite_note-Medicine_betrayed-35"><span data-dcnode-id="6611" instrument_node="">[35]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6606"><span data-dcnode-id="6607" title="Page / location: 75"><span data-dcnode-id="6608" instrument_node="">: 75 </span></span></sup><span data-dcnode-id="6605" instrument_node=""> In September 1981, he was transported from State Security Headquarters to the Carbó-Serviá (forensic) ward of the Havana Psychiatric Hospital and stayed there for several weeks.</span><sup class="reference" data-dcnode-id="6602" id="cite_ref-Medicine_betrayed_35-8"><a data-dcnode-id="6603" href="#cite_note-Medicine_betrayed-35"><span data-dcnode-id="6604" instrument_node="">[35]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6599"><span data-dcnode-id="6600" title="Page / location: 76"><span data-dcnode-id="6601" instrument_node="">: 76 </span></span></sup><span data-dcnode-id="6598" instrument_node="">
</span></p><span data-dcnode-id="6596" instrument_node="">
</span><h2 data-dcnode-id="6586"><span class="mw-headline" data-dcnode-id="6594" id="Contemporary_Cuba"><span data-dcnode-id="6595" instrument_node="">Contemporary Cuba</span></span><span class="mw-editsection" data-dcnode-id="6587"><span class="mw-editsection-bracket" data-dcnode-id="6592"><span data-dcnode-id="6593" instrument_node="">[</span></span><a data-dcnode-id="6590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D6" title="Edit section: Contemporary Cuba"><span data-dcnode-id="6591" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6588"><span data-dcnode-id="6589" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6585" instrument_node="">
</span><h3 data-dcnode-id="6575"><span class="mw-headline" data-dcnode-id="6583" id="Political_repression"><span data-dcnode-id="6584" instrument_node="">Political repression</span></span><span class="mw-editsection" data-dcnode-id="6576"><span class="mw-editsection-bracket" data-dcnode-id="6581"><span data-dcnode-id="6582" instrument_node="">[</span></span><a data-dcnode-id="6579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D7" title="Edit section: Political repression"><span data-dcnode-id="6580" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6577"><span data-dcnode-id="6578" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6574" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="6568" role="note"><span data-dcnode-id="6571" instrument_node="">Further information: </span><a class="mw-redirect" data-dcnode-id="6569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuban_dissidents" title="Cuban dissidents"><span data-dcnode-id="6570" instrument_node="">Cuban dissidents</span></a></div><span data-dcnode-id="6567" instrument_node="">
</span><p data-dcnode-id="6558"><span data-dcnode-id="6566" instrument_node="">A 2009 report by </span><a data-dcnode-id="6564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_Rights_Watch" title="Human Rights Watch"><span data-dcnode-id="6565" instrument_node="">Human Rights Watch</span></a><span data-dcnode-id="6563" instrument_node=""> concluded that "Raúl Castro has kept Cuba's repressive machinery firmly in place...since being handed power by his brother Fidel Castro."</span><sup class="reference" data-dcnode-id="6560" id="cite_ref-HRW_2009_36-0"><a data-dcnode-id="6561" href="#cite_note-HRW_2009-36"><span data-dcnode-id="6562" instrument_node="">[36]</span></a></sup><span data-dcnode-id="6559" instrument_node=""> The report found that "[s]cores of political prisoners arrested under Fidel continue to languish in prison, and Raúl has used draconian laws and sham trials to incarcerate scores more who have dared to exercise their fundamental rights."
</span></p><p data-dcnode-id="6526"><span data-dcnode-id="6557" instrument_node="">US government-funded </span><a data-dcnode-id="6555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_House" title="Freedom House"><span data-dcnode-id="6556" instrument_node="">Freedom House</span></a><span data-dcnode-id="6554" instrument_node=""> classifies Cuba as being "Not Free",</span><sup class="reference" data-dcnode-id="6551" id="cite_ref-FH_Cuba1_37-0"><a data-dcnode-id="6552" href="#cite_note-FH_Cuba1-37"><span data-dcnode-id="6553" instrument_node="">[37]</span></a></sup><span data-dcnode-id="6550" instrument_node=""> and notes that "Cuba is the only country in the Americas that consistently makes Freedom House's list of the Worst of the Worst: the World's Most Repressive Societies for widespread abuses of </span><a data-dcnode-id="6548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_and_political_rights" title="Civil and political rights"><span data-dcnode-id="6549" instrument_node="">political rights</span></a><span data-dcnode-id="6547" instrument_node=""> and </span><a data-dcnode-id="6545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_liberties" title="Civil liberties"><span data-dcnode-id="6546" instrument_node="">civil liberties</span></a><span data-dcnode-id="6544" instrument_node="">."</span><sup class="reference" data-dcnode-id="6541" id="cite_ref-FH_Cuba1_37-1"><a data-dcnode-id="6542" href="#cite_note-FH_Cuba1-37"><span data-dcnode-id="6543" instrument_node="">[37]</span></a></sup><span data-dcnode-id="6540" instrument_node=""> The 2017 World Report by Human Rights Watch writes that independent </span><a data-dcnode-id="6538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Journalist" title="Journalist"><span data-dcnode-id="6539" instrument_node="">journalists</span></a><span data-dcnode-id="6537" instrument_node=""> who publish information considered critical of the </span><a data-dcnode-id="6535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Government" title="Government"><span data-dcnode-id="6536" instrument_node="">government</span></a><span data-dcnode-id="6534" instrument_node=""> are subject to smear campaigns and arbitrary arrests, as are artists and academics who demand greater </span><a data-dcnode-id="6532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_freedom" title="Political freedom"><span data-dcnode-id="6533" instrument_node="">freedoms</span></a><span data-dcnode-id="6531" instrument_node="">.</span><sup class="reference" data-dcnode-id="6528" id="cite_ref-Cuba_Events_of_2016_8-1"><a data-dcnode-id="6529" href="#cite_note-Cuba_Events_of_2016-8"><span data-dcnode-id="6530" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6527" instrument_node="">
</span></p><span data-dcnode-id="6525" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6511"><div class="thumbinner" data-dcnode-id="6512" style="width:222px;"><a class="image" data-dcnode-id="6523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APress_conference%2C_Havana.jpg"><img alt="" class="thumbimage" data-dcnode-id="6524" data-file-height="484" data-file-width="860" decoding="async" height="124" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/29/Press_conference%252C_Havana.jpg/220px-Press_conference%252C_Havana.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/29/Press_conference%2C_Havana.jpg/330px-Press_conference%2C_Havana.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/29/Press_conference%2C_Havana.jpg/440px-Press_conference%2C_Havana.jpg 2x" width="220"></a><span data-dcnode-id="6522" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6513"><div class="magnify" data-dcnode-id="6520"><a class="internal" data-dcnode-id="6521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APress_conference%2C_Havana.jpg" title="Enlarge"></a></div><a data-dcnode-id="6518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jorge_Luis_Garc%25C3%25ADa_P%25C3%25A9rez" title="Jorge Luis García Pérez"><span data-dcnode-id="6519" instrument_node="">Jorge Luis García Pérez</span></a><span data-dcnode-id="6517" instrument_node=""> assailed the </span><a data-dcnode-id="6515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuban_thaw" title="Cuban thaw"><span data-dcnode-id="6516" instrument_node="">Cuban thaw</span></a><span data-dcnode-id="6514" instrument_node=""> as a capitulation to the Castro's regime</span></div></div></div><span data-dcnode-id="6510" instrument_node="">
</span><p data-dcnode-id="6496"><span data-dcnode-id="6509" instrument_node="">A 1999 Human Rights Watch report notes that the Interior Ministry's principal responsibility is to monitor the Cuban population for signs of dissent.</span><sup class="reference" data-dcnode-id="6506" id="cite_ref-HRW-Cuba1999-VIII_38-0"><a data-dcnode-id="6507" href="#cite_note-HRW-Cuba1999-VIII-38"><span data-dcnode-id="6508" instrument_node="">[38]</span></a></sup><span data-dcnode-id="6505" instrument_node=""> In 1991 two new mechanisms for internal surveillance and control emerged. Communist Party leaders organized the Singular Systems of Vigilance and Protection (Sistema Unico de Vigilancia y Protección, SUVP). Rapid Action Brigades (Brigadas de Acción Rapida, also referred to as Rapid Response Brigades, or Brigadas de Respuesta Rápida) observe and control dissidents.</span><sup class="reference" data-dcnode-id="6502" id="cite_ref-HRW-Cuba1999-VIII_38-1"><a data-dcnode-id="6503" href="#cite_note-HRW-Cuba1999-VIII-38"><span data-dcnode-id="6504" instrument_node="">[38]</span></a></sup><span data-dcnode-id="6501" instrument_node=""> The government also "maintains academic and labor files (expedientes escolares y laborales) for each citizen, in which officials record actions or statements that may bear on the person's loyalty to the revolution. Before advancing to a new school or position, the individual's record must first be deemed acceptable".</span><sup class="reference" data-dcnode-id="6498" id="cite_ref-HRW-Cuba1999-VIII_38-2"><a data-dcnode-id="6499" href="#cite_note-HRW-Cuba1999-VIII-38"><span data-dcnode-id="6500" instrument_node="">[38]</span></a></sup><span data-dcnode-id="6497" instrument_node="">
</span></p><p data-dcnode-id="6460"><span data-dcnode-id="6495" instrument_node="">The opposition movement in Cuba is a widespread collection of individuals and nongovernmental organizations, most of whom are working for the respect of </span><a class="mw-redirect" data-dcnode-id="6493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Individual_rights" title="Individual rights"><span data-dcnode-id="6494" instrument_node="">individual rights</span></a><span data-dcnode-id="6492" instrument_node=""> on the island.</span><sup class="reference" data-dcnode-id="6489" id="cite_ref-39"><a data-dcnode-id="6490" href="#cite_note-39"><span data-dcnode-id="6491" instrument_node="">[39]</span></a></sup><span data-dcnode-id="6488" instrument_node=""> Some of the best known Cuban members of the opposition include the </span><a data-dcnode-id="6486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ladies_in_White" title="Ladies in White"><span data-dcnode-id="6487" instrument_node="">Ladies in White</span></a><span data-dcnode-id="6485" instrument_node=""> (recipients of the </span><a data-dcnode-id="6483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sakharov_Prize" title="Sakharov Prize"><span data-dcnode-id="6484" instrument_node="">Sakharov Prize</span></a><span data-dcnode-id="6482" instrument_node=""> for Freedom of Thought), Human Rights Center and Cuban community leader </span><a data-dcnode-id="6480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jesus_Permuy" title="Jesus Permuy"><span data-dcnode-id="6481" instrument_node="">Jesus Permuy</span></a><span data-dcnode-id="6479" instrument_node="">, </span><a data-dcnode-id="6477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marta_Beatriz_Roque" title="Marta Beatriz Roque"><span data-dcnode-id="6478" instrument_node="">Marta Beatriz Roque</span></a><span data-dcnode-id="6476" instrument_node="">, and </span><a data-dcnode-id="6474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nobel_Peace_Prize" title="Nobel Peace Prize"><span data-dcnode-id="6475" instrument_node="">Nobel Peace Prize</span></a><span data-dcnode-id="6473" instrument_node=""> nominee and </span><a data-dcnode-id="6471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sakharov_Prize" title="Sakharov Prize"><span data-dcnode-id="6472" instrument_node="">Sakharov Prize</span></a><span data-dcnode-id="6470" instrument_node=""> winner </span><a data-dcnode-id="6468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oswaldo_Pay%25C3%25A1" title="Oswaldo Payá"><span data-dcnode-id="6469" instrument_node="">Oswaldo Payá</span></a><span data-dcnode-id="6467" instrument_node="">, as well as </span><a data-dcnode-id="6465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2593scar_El%25C3%25ADas_Biscet" title="Óscar Elías Biscet"><span data-dcnode-id="6466" instrument_node="">Óscar Elías Biscet</span></a><span data-dcnode-id="6464" instrument_node="">, and </span><a data-dcnode-id="6462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jorge_Luis_Garc%25C3%25ADa_P%25C3%25A9rez" title="Jorge Luis García Pérez"><span data-dcnode-id="6463" instrument_node="">Jorge Luis García Pérez</span></a><span data-dcnode-id="6461" instrument_node=""> "Antúnez."
</span></p><p data-dcnode-id="6436"><span data-dcnode-id="6459" instrument_node="">On October 18, 2019, the </span><a data-dcnode-id="6457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Department_of_Commerce" title="United States Department of Commerce"><span data-dcnode-id="6458" instrument_node="">U.S. Commerce Department</span></a><span data-dcnode-id="6456" instrument_node=""> announced that the United States will impose new </span><a data-dcnode-id="6454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sanctions_%28law%29" title="Sanctions (law)"><span data-dcnode-id="6455" instrument_node="">sanctions</span></a><span data-dcnode-id="6453" instrument_node=""> against </span><a data-dcnode-id="6451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuba" title="Cuba"><span data-dcnode-id="6452" instrument_node="">Cuba</span></a><span data-dcnode-id="6450" instrument_node=""> following its poor </span><a data-dcnode-id="6448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_rights" title="Human rights"><span data-dcnode-id="6449" instrument_node="">human rights</span></a><span data-dcnode-id="6447" instrument_node=""> records and its support of the Venezuelan government. In particular, </span><a data-dcnode-id="6445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jos%25C3%25A9_Daniel_Ferrer" title="José Daniel Ferrer"><span data-dcnode-id="6446" instrument_node="">José Daniel Ferrer's</span></a><span data-dcnode-id="6444" instrument_node=""> continued detention was brought into notice in a different statement which was issued by the </span><a data-dcnode-id="6442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Department_of_State" title="United States Department of State"><span data-dcnode-id="6443" instrument_node="">U.S. State Department</span></a><span data-dcnode-id="6441" instrument_node="">. Ferrer, who heads the Patriotic Union of Cuba (UNPACU), has been kept in detention by the Cuban government and his whereabouts have not been revealed.</span><sup class="reference" data-dcnode-id="6438" id="cite_ref-40"><a data-dcnode-id="6439" href="#cite_note-40"><span data-dcnode-id="6440" instrument_node="">[40]</span></a></sup><span data-dcnode-id="6437" instrument_node="">
</span></p><span data-dcnode-id="6435" instrument_node="">
</span><h3 data-dcnode-id="6425"><span class="mw-headline" data-dcnode-id="6433" id="Censorship"><span data-dcnode-id="6434" instrument_node="">Censorship</span></span><span class="mw-editsection" data-dcnode-id="6426"><span class="mw-editsection-bracket" data-dcnode-id="6431"><span data-dcnode-id="6432" instrument_node="">[</span></span><a data-dcnode-id="6429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D8" title="Edit section: Censorship"><span data-dcnode-id="6430" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6427"><span data-dcnode-id="6428" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6424" instrument_node="">
</span><link data-dcnode-id="6423" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6419" role="note"><span data-dcnode-id="6422" instrument_node="">Main article: </span><a data-dcnode-id="6420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Censorship_in_Cuba" title="Censorship in Cuba"><span data-dcnode-id="6421" instrument_node="">Censorship in Cuba</span></a></div><span data-dcnode-id="6418" instrument_node="">
</span><p data-dcnode-id="6399"><span data-dcnode-id="6417" instrument_node="">Cuba officially adopted the civil and political rights enumerated in the </span><a data-dcnode-id="6415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_Declaration_of_Human_Rights" title="Universal Declaration of Human Rights"><span data-dcnode-id="6416" instrument_node="">Universal Declaration of Human Rights</span></a><span data-dcnode-id="6414" instrument_node=""> in 1948. One of the key principles in the declaration was the insistence on </span><a class="mw-redirect" data-dcnode-id="6412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_of_Speech" title="Freedom of Speech"><span data-dcnode-id="6413" instrument_node="">Freedom of expression and opinion</span></a><span data-dcnode-id="6411" instrument_node="">. The </span><a class="mw-redirect" data-dcnode-id="6409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuban_constitution" title="Cuban constitution"><span data-dcnode-id="6410" instrument_node="">Cuban constitution</span></a><span data-dcnode-id="6408" instrument_node=""> says that free speech is allowed "in keeping with the objectives of socialist society" and that artistic creation is allowed "as long as its content is not contrary to the Revolution".</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6401" style="white-space:nowrap;"><span data-dcnode-id="6407" instrument_node="">[</span><i data-dcnode-id="6403"><a data-dcnode-id="6404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6405" title="This claim needs references to reliable sources. (July 2021)"><span data-dcnode-id="6406" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6402" instrument_node="">]</span></sup><span data-dcnode-id="6400" instrument_node="">
</span></p><p data-dcnode-id="6380"><span data-dcnode-id="6398" instrument_node="">Cuba's ranking was on the bottom of the </span><a data-dcnode-id="6396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Press_Freedom_Index" title="Press Freedom Index"><span data-dcnode-id="6397" instrument_node="">Press Freedom Index</span></a><span data-dcnode-id="6395" instrument_node=""> 2008 compiled by the </span><a data-dcnode-id="6393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reporters_Without_Borders" title="Reporters Without Borders"><span data-dcnode-id="6394" instrument_node="">Reporters Without Borders</span></a><span data-dcnode-id="6392" instrument_node=""> (RWB).</span><sup class="reference" data-dcnode-id="6389" id="cite_ref-RWB-Index2008_6-1"><a data-dcnode-id="6390" href="#cite_note-RWB-Index2008-6"><span data-dcnode-id="6391" instrument_node="">[6]</span></a></sup><span data-dcnode-id="6388" instrument_node=""> Cuba was named one of the ten most censored countries in the world by the </span><a data-dcnode-id="6386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Committee_to_Protect_Journalists" title="Committee to Protect Journalists"><span data-dcnode-id="6387" instrument_node="">Committee to Protect Journalists</span></a><span data-dcnode-id="6385" instrument_node="">.</span><sup class="reference" data-dcnode-id="6382" id="cite_ref-CPJ-2006_41-0"><a data-dcnode-id="6383" href="#cite_note-CPJ-2006-41"><span data-dcnode-id="6384" instrument_node="">[41]</span></a></sup><span data-dcnode-id="6381" instrument_node="">
</span></p><p data-dcnode-id="6370"><span data-dcnode-id="6379" instrument_node="">Books, newspapers, radio channels, television channels, movies and music are supposedly censored, although a lot of foreign media, particularly movies and music, have notably been heard and seen without any police interference.</span><sup class="noprint Inline-Template" data-dcnode-id="6372" style="white-space:nowrap;"><span data-dcnode-id="6378" instrument_node="">[</span><i data-dcnode-id="6374"><a data-dcnode-id="6375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANo_original_research" title="Wikipedia:No original research"><span data-dcnode-id="6376" title="The material near this tag possibly contains original research. (July 2021)"><span data-dcnode-id="6377" instrument_node="">original research?</span></span></a></i><span data-dcnode-id="6373" instrument_node="">]</span></sup><span data-dcnode-id="6371" instrument_node="">
</span></p><p data-dcnode-id="6355"><span data-dcnode-id="6369" instrument_node="">According to American group </span><a data-dcnode-id="6367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Committee_to_Protect_Journalists" title="Committee to Protect Journalists"><span data-dcnode-id="6368" instrument_node="">Committee to Protect Journalists</span></a><span data-dcnode-id="6366" instrument_node="">, the media in Cuba are operated under the supervision of the </span><a data-dcnode-id="6364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Party_of_Cuba" title="Communist Party of Cuba"><span data-dcnode-id="6365" instrument_node="">Communist Party's</span></a><span data-dcnode-id="6363" instrument_node=""> </span><i data-dcnode-id="6361"><span data-dcnode-id="6362" instrument_node="">Department of Revolutionary Orientation</span></i><span data-dcnode-id="6360" instrument_node="">, which "develops and coordinates propaganda strategies".</span><sup class="reference" data-dcnode-id="6357" id="cite_ref-CPJ-2006_41-1"><a data-dcnode-id="6358" href="#cite_note-CPJ-2006-41"><span data-dcnode-id="6359" instrument_node="">[41]</span></a></sup><span data-dcnode-id="6356" instrument_node="">
