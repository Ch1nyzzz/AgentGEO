</span><p data-dcnode-id="5509"><span data-dcnode-id="5566" instrument_node="">In the years following the </span><a data-dcnode-id="5564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuban_Revolution" title="Cuban Revolution"><span data-dcnode-id="5565" instrument_node="">Cuban Revolution</span></a><span data-dcnode-id="5563" instrument_node="">, the activities of the </span><a class="mw-redirect" data-dcnode-id="5561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roman_Catholic_Church" title="Roman Catholic Church"><span data-dcnode-id="5562" instrument_node="">Roman Catholic Church</span></a><span data-dcnode-id="5560" instrument_node=""> were severely limited and in 1961 all property held by religious organizations was confiscated without compensation. Hundreds of members of the </span><a data-dcnode-id="5558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clergy" title="Clergy"><span data-dcnode-id="5559" instrument_node="">clergy</span></a><span data-dcnode-id="5557" instrument_node="">, including a </span><a data-dcnode-id="5555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bishop" title="Bishop"><span data-dcnode-id="5556" instrument_node="">bishop</span></a><span data-dcnode-id="5554" instrument_node="">, were permanently expelled from the nation. The Cuban leadership was officially </span><a data-dcnode-id="5552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atheism" title="Atheism"><span data-dcnode-id="5553" instrument_node="">atheist</span></a><span data-dcnode-id="5551" instrument_node=""> until 1992 when the </span><a data-dcnode-id="5549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Party_of_Cuba" title="Communist Party of Cuba"><span data-dcnode-id="5550" instrument_node="">Communist Party</span></a><span data-dcnode-id="5548" instrument_node=""> agreed to allow religious followers to join the party. In 1998, </span><a data-dcnode-id="5546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pope_John_Paul_II" title="Pope John Paul II"><span data-dcnode-id="5547" instrument_node="">Pope John Paul II</span></a><span data-dcnode-id="5545" instrument_node=""> visited the island and was allowed to conduct large outdoor </span><a data-dcnode-id="5543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mass_%28liturgy%29" title="Mass (liturgy)"><span data-dcnode-id="5544" instrument_node="">masses</span></a><span data-dcnode-id="5542" instrument_node=""> and
</span><a class="mw-redirect" data-dcnode-id="5540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Visa_%28document%29" title="Visa (document)"><span data-dcnode-id="5541" instrument_node="">visas</span></a><span data-dcnode-id="5539" instrument_node=""> were issued for nineteen foreign priests taking up residence in the country. In addition, other religious groups in Cuba such as the </span><a class="mw-redirect" data-dcnode-id="5537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jew" title="Jew"><span data-dcnode-id="5538" instrument_node="">Jewish</span></a><span data-dcnode-id="5536" instrument_node=""> community are now permitted to hold public services and to import religious materials and </span><a class="mw-redirect" data-dcnode-id="5534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kosher" title="Kosher"><span data-dcnode-id="5535" instrument_node="">kosher</span></a><span data-dcnode-id="5533" instrument_node=""> food for </span><a data-dcnode-id="5531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Passover" title="Passover"><span data-dcnode-id="5532" instrument_node="">Passover</span></a><span data-dcnode-id="5530" instrument_node="">, as well as to receive </span><a data-dcnode-id="5528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rabbi" title="Rabbi"><span data-dcnode-id="5529" instrument_node="">rabbis</span></a><span data-dcnode-id="5527" instrument_node=""> and other religious visitors from abroad. In October 2008, Cuba marked the opening of a </span><a data-dcnode-id="5525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Orthodox_Church" title="Russian Orthodox Church"><span data-dcnode-id="5526" instrument_node="">Russian Orthodox</span></a><span data-dcnode-id="5524" instrument_node=""> Cathedral in Havana in a ceremony attended by Raúl Castro, Vice President </span><a class="mw-redirect" data-dcnode-id="5522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Esteban_Lazo" title="Esteban Lazo"><span data-dcnode-id="5523" instrument_node="">Esteban Lazo</span></a><span data-dcnode-id="5521" instrument_node="">, Parliament leader </span><a data-dcnode-id="5519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ricardo_Alarc%25C3%25B3n" title="Ricardo Alarcón"><span data-dcnode-id="5520" instrument_node="">Ricardo Alarcón</span></a><span data-dcnode-id="5518" instrument_node="">, and other figures.</span><sup class="reference" data-dcnode-id="5515" id="cite_ref-Orthodox_Cathedral_70-0"><a data-dcnode-id="5516" href="#cite_note-Orthodox_Cathedral-70"><span data-dcnode-id="5517" instrument_node="">[70]</span></a></sup><span data-dcnode-id="5514" instrument_node=""> The Cuban press noted that the cathedral was the first of its kind in Latin America.</span><sup class="reference" data-dcnode-id="5511" id="cite_ref-Orthodox_Cathedral_70-1"><a data-dcnode-id="5512" href="#cite_note-Orthodox_Cathedral-70"><span data-dcnode-id="5513" instrument_node="">[70]</span></a></sup><span data-dcnode-id="5510" instrument_node="">
</span></p><span data-dcnode-id="5508" instrument_node="">
</span><h3 data-dcnode-id="5498"><span class="mw-headline" data-dcnode-id="5506" id="Rights_of_women"><span data-dcnode-id="5507" instrument_node="">Rights of women</span></span><span class="mw-editsection" data-dcnode-id="5499"><span class="mw-editsection-bracket" data-dcnode-id="5504"><span data-dcnode-id="5505" instrument_node="">[</span></span><a data-dcnode-id="5502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D18" title="Edit section: Rights of women"><span data-dcnode-id="5503" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5500"><span data-dcnode-id="5501" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5497" instrument_node="">
</span><link data-dcnode-id="5496" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5492" role="note"><span data-dcnode-id="5495" instrument_node="">Main article: </span><a data-dcnode-id="5493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Women_in_Cuba" title="Women in Cuba"><span data-dcnode-id="5494" instrument_node="">Women in Cuba</span></a></div><span data-dcnode-id="5491" instrument_node="">
</span><p data-dcnode-id="5482"><span data-dcnode-id="5490" instrument_node="">Women have high representation in the country, with women holding 48.9% of the parliamentary seats in the </span><a class="mw-redirect" data-dcnode-id="5488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuban_National_Assembly" title="Cuban National Assembly"><span data-dcnode-id="5489" instrument_node="">Cuban National Assembly</span></a><span data-dcnode-id="5487" instrument_node="">.</span><sup class="reference" data-dcnode-id="5484" id="cite_ref-71"><a data-dcnode-id="5485" href="#cite_note-71"><span data-dcnode-id="5486" instrument_node="">[71]</span></a></sup><span data-dcnode-id="5483" instrument_node="">
</span></p><span data-dcnode-id="5481" instrument_node="">
</span><h3 data-dcnode-id="5471"><span class="mw-headline" data-dcnode-id="5479" id="Torture"><span data-dcnode-id="5480" instrument_node="">Torture</span></span><span class="mw-editsection" data-dcnode-id="5472"><span class="mw-editsection-bracket" data-dcnode-id="5477"><span data-dcnode-id="5478" instrument_node="">[</span></span><a data-dcnode-id="5475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D19" title="Edit section: Torture"><span data-dcnode-id="5476" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5473"><span data-dcnode-id="5474" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5470" instrument_node="">
</span><p data-dcnode-id="5393"><span data-dcnode-id="5469" instrument_node="">In 2005 a group of culture personalities, including several </span><a data-dcnode-id="5467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nobel_Prize" title="Nobel Prize"><span data-dcnode-id="5468" instrument_node="">Nobel Prize</span></a><span data-dcnode-id="5466" instrument_node=""> laureates, have signed an appeal on </span><i data-dcnode-id="5463"><a data-dcnode-id="5464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Guardian" title="The Guardian"><span data-dcnode-id="5465" instrument_node="">The Guardian</span></a></i><span data-dcnode-id="5462" instrument_node=""> in defense of Cuba, claiming that "the government of the US has no moral authority to elect itself as the judge over human rights in Cuba, where there has not been a single case of disappearance, torture or extrajudicial execution since 1959, and where despite the economic blockade, there are levels of health, education and culture that are internationally recognised." The appeal is signed, for example, by </span><a class="mw-redirect" data-dcnode-id="5460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rigoberta_Mench%25C3%25BA_Tum" title="Rigoberta Menchú Tum"><span data-dcnode-id="5461" instrument_node="">Rigoberta Menchú Tum</span></a><span data-dcnode-id="5459" instrument_node="">, </span><a data-dcnode-id="5457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adolfo_P%25C3%25A9rez_Esquivel" title="Adolfo Pérez Esquivel"><span data-dcnode-id="5458" instrument_node="">Adolfo Pérez Esquivel</span></a><span data-dcnode-id="5456" instrument_node="">, </span><a data-dcnode-id="5454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jos%25C3%25A9_Saramago" title="José Saramago"><span data-dcnode-id="5455" instrument_node="">José Saramago</span></a><span data-dcnode-id="5453" instrument_node="">, </span><a data-dcnode-id="5451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Claudio_Abbado" title="Claudio Abbado"><span data-dcnode-id="5452" instrument_node="">Claudio Abbado</span></a><span data-dcnode-id="5450" instrument_node="">, </span><a data-dcnode-id="5448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manu_Chao" title="Manu Chao"><span data-dcnode-id="5449" instrument_node="">Manu Chao</span></a><span data-dcnode-id="5447" instrument_node="">, </span><a data-dcnode-id="5445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walter_Salles" title="Walter Salles"><span data-dcnode-id="5446" instrument_node="">Walter Salles</span></a><span data-dcnode-id="5444" instrument_node="">, </span><a data-dcnode-id="5442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nadine_Gordimer" title="Nadine Gordimer"><span data-dcnode-id="5443" instrument_node="">Nadine Gordimer</span></a><span data-dcnode-id="5441" instrument_node="">, </span><a data-dcnode-id="5439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harold_Pinter" title="Harold Pinter"><span data-dcnode-id="5440" instrument_node="">Harold Pinter</span></a><span data-dcnode-id="5438" instrument_node="">, </span><a data-dcnode-id="5436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tariq_Ali" title="Tariq Ali"><span data-dcnode-id="5437" instrument_node="">Tariq Ali</span></a><span data-dcnode-id="5435" instrument_node="">, </span><a data-dcnode-id="5433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harry_Belafonte" title="Harry Belafonte"><span data-dcnode-id="5434" instrument_node="">Harry Belafonte</span></a><span data-dcnode-id="5432" instrument_node="">, </span><a data-dcnode-id="5430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Danny_Glover" title="Danny Glover"><span data-dcnode-id="5431" instrument_node="">Danny Glover</span></a><span data-dcnode-id="5429" instrument_node="">, </span><a data-dcnode-id="5427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ernesto_Cardenal" title="Ernesto Cardenal"><span data-dcnode-id="5428" instrument_node="">Ernesto Cardenal</span></a><span data-dcnode-id="5426" instrument_node="">, </span><a data-dcnode-id="5424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alice_Walker" title="Alice Walker"><span data-dcnode-id="5425" instrument_node="">Alice Walker</span></a><span data-dcnode-id="5423" instrument_node="">, </span><a data-dcnode-id="5421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ramsey_Clark" title="Ramsey Clark"><span data-dcnode-id="5422" instrument_node="">Ramsey Clark</span></a><span data-dcnode-id="5420" instrument_node=""> and </span><a data-dcnode-id="5418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Danielle_Mitterrand" title="Danielle Mitterrand"><span data-dcnode-id="5419" instrument_node="">Danielle Mitterrand</span></a><span data-dcnode-id="5417" instrument_node="">.</span><sup class="reference" data-dcnode-id="5414" id="cite_ref-72"><a data-dcnode-id="5415" href="#cite_note-72"><span data-dcnode-id="5416" instrument_node="">[72]</span></a></sup><span data-dcnode-id="5413" instrument_node=""> However, the American </span><a data-dcnode-id="5411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Center_for_a_Free_Cuba" title="Center for a Free Cuba"><span data-dcnode-id="5412" instrument_node="">Center for a Free Cuba</span></a><span data-dcnode-id="5410" instrument_node=""> claimed the opposite.</span><sup class="reference" data-dcnode-id="5407" id="cite_ref-73"><a data-dcnode-id="5408" href="#cite_note-73"><span data-dcnode-id="5409" instrument_node="">[73]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="5395" style="white-space:nowrap;"><span data-dcnode-id="5406" instrument_node="">[</span><i data-dcnode-id="5397"><a data-dcnode-id="5403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANeutral_point_of_view%23Due_and_undue_weight" title="Wikipedia:Neutral point of view"><span data-dcnode-id="5404" title="The material near this tag may be giving undue weight to a viewpoint or idea. (March 2021)"><span data-dcnode-id="5405" instrument_node="">undue weight?</span></span></a><span data-dcnode-id="5402" instrument_node=""> </span><span class="metadata" data-dcnode-id="5398"><span data-dcnode-id="5401" instrument_node=""> – </span><a data-dcnode-id="5399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talk%3AHuman_rights_in_Cuba%23undue" title="Talk:Human rights in Cuba"><span data-dcnode-id="5400" instrument_node="">discuss</span></a></span></i><span data-dcnode-id="5396" instrument_node="">]</span></sup><span data-dcnode-id="5394" instrument_node="">
</span></p><span data-dcnode-id="5392" instrument_node="">
</span><h2 data-dcnode-id="5382"><span class="mw-headline" data-dcnode-id="5390" id="Race_relations"><span data-dcnode-id="5391" instrument_node="">Race relations</span></span><span class="mw-editsection" data-dcnode-id="5383"><span class="mw-editsection-bracket" data-dcnode-id="5388"><span data-dcnode-id="5389" instrument_node="">[</span></span><a data-dcnode-id="5386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D20" title="Edit section: Race relations"><span data-dcnode-id="5387" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5384"><span data-dcnode-id="5385" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5381" instrument_node="">
</span><link data-dcnode-id="5380" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5376" role="note"><span data-dcnode-id="5379" instrument_node="">Main article: </span><a data-dcnode-id="5377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Racism_in_Cuba" title="Racism in Cuba"><span data-dcnode-id="5378" instrument_node="">Racism in Cuba</span></a></div><span data-dcnode-id="5375" instrument_node="">
</span><p data-dcnode-id="5352"><span data-dcnode-id="5374" instrument_node="">Esteban Morales Dominguez has pointed to </span><a class="mw-redirect" data-dcnode-id="5372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Institutionalized_racism" title="Institutionalized racism"><span data-dcnode-id="5373" instrument_node="">institutionalized racism</span></a><span data-dcnode-id="5371" instrument_node=""> in his book </span><i data-dcnode-id="5368"><a class="new" data-dcnode-id="5369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Challenges_of_the_Racial_Problem_in_Cuba%26action%3Dedit%26redlink%3D1" title="The Challenges of the Racial Problem in Cuba (page does not exist)"><span data-dcnode-id="5370" instrument_node="">The Challenges of the Racial Problem in Cuba</span></a></i><span data-dcnode-id="5367" instrument_node=""> (</span><span data-dcnode-id="5364" title="Spanish-language text"><i data-dcnode-id="5365" lang="es"><span data-dcnode-id="5366" instrument_node="">Fundación Fernando Ortiz</span></i></span><span data-dcnode-id="5363" instrument_node="">). </span><i data-dcnode-id="5361"><span data-dcnode-id="5362" instrument_node="">Racial Politics in Post-Revolutionary Cuba</span></i><span data-dcnode-id="5360" instrument_node=""> discusses the </span><a data-dcnode-id="5358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Racial_politics" title="Racial politics"><span data-dcnode-id="5359" instrument_node="">racial politics</span></a><span data-dcnode-id="5357" instrument_node=""> prevalent in communist Cuba.</span><sup class="reference" data-dcnode-id="5354" id="cite_ref-74"><a data-dcnode-id="5355" href="#cite_note-74"><span data-dcnode-id="5356" instrument_node="">[74]</span></a></sup><span data-dcnode-id="5353" instrument_node="">
</span></p><p data-dcnode-id="5329"><a class="new" data-dcnode-id="5350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEnrique_Patterson%26action%3Dedit%26redlink%3D1" title="Enrique Patterson (page does not exist)"><span data-dcnode-id="5351" instrument_node="">Enrique Patterson</span></a><span data-dcnode-id="5349" instrument_node="">, writing in the </span><i data-dcnode-id="5346"><a data-dcnode-id="5347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Miami_Herald" title="Miami Herald"><span data-dcnode-id="5348" instrument_node="">Miami Herald</span></a></i><span data-dcnode-id="5345" instrument_node="">, describes race as a "social bomb" and he says, "If the Cuban government were to permit black Cubans to organize and raise their problems before [authorities]&nbsp;... totalitarianism would fall".</span><sup class="reference" data-dcnode-id="5342" id="cite_ref-barrier_75-0"><a data-dcnode-id="5343" href="#cite_note-barrier-75"><span data-dcnode-id="5344" instrument_node="">[75]</span></a></sup><span data-dcnode-id="5341" instrument_node=""> </span><a data-dcnode-id="5339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carlos_Moore_%28writer%29" title="Carlos Moore (writer)"><span data-dcnode-id="5340" instrument_node="">Carlos Moore</span></a><span data-dcnode-id="5338" instrument_node="">, who has authored extensively on the issue, says that "There is an unstated threat, blacks in Cuba know that whenever you raise race in Cuba, you go to jail. Therefore, the struggle in Cuba is different. There cannot be a civil rights movement. You will have instantly 10,000 black people dead".</span><sup class="reference" data-dcnode-id="5335" id="cite_ref-barrier_75-1"><a data-dcnode-id="5336" href="#cite_note-barrier-75"><span data-dcnode-id="5337" instrument_node="">[75]</span></a></sup><span data-dcnode-id="5334" instrument_node=""> He says that a new generation of black Cubans are looking at politics in another way.</span><sup class="reference" data-dcnode-id="5331" id="cite_ref-barrier_75-2"><a data-dcnode-id="5332" href="#cite_note-barrier-75"><span data-dcnode-id="5333" instrument_node="">[75]</span></a></sup><span data-dcnode-id="5330" instrument_node="">
</span></p><p data-dcnode-id="5313"><a data-dcnode-id="5327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jorge_Luis_Garc%25C3%25ADa_P%25C3%25A9rez" title="Jorge Luis García Pérez"><span data-dcnode-id="5328" instrument_node="">Jorge Luis García Pérez</span></a><span data-dcnode-id="5326" instrument_node="">, a well-known Afro-Cuban human rights and democracy activist who was imprisoned for 17 years, in an interview with the Florida-based</span><sup class="reference" data-dcnode-id="5323" id="cite_ref-directorio_76-0"><a data-dcnode-id="5324" href="#cite_note-directorio-76"><span data-dcnode-id="5325" instrument_node="">[76]</span></a></sup><span data-dcnode-id="5322" instrument_node=""> </span><i data-dcnode-id="5319"><a class="mw-redirect" data-dcnode-id="5320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Directorio_Democr%25C3%25A1tico_Cubano" title="Directorio Democrático Cubano"><span data-dcnode-id="5321" instrument_node="">Directorio Democrático Cubano</span></a></i><span data-dcnode-id="5318" instrument_node=""> states "The authorities in my country have never tolerated that a black person oppose the revolution. During the trial, the color of my skin aggravated the situation. Later when I was mistreated in prison by guards, they always referred to me as being black".</span><sup class="reference" data-dcnode-id="5315" id="cite_ref-directorio_76-1"><a data-dcnode-id="5316" href="#cite_note-directorio-76"><span data-dcnode-id="5317" instrument_node="">[76]</span></a></sup><span data-dcnode-id="5314" instrument_node="">
</span></p><p data-dcnode-id="5295"><span data-dcnode-id="5312" instrument_node="">Despite these barriers however, Cuba has oftentimes been praised for advances of the Cuban Revolution in the areas of racial equality. During his leadership, Castro abolished segregation in businesses and public spaces while also ushering in egalitarian reforms in areas such as employment, wages, social security, and education. The proportion of high school graduates was actually higher among blacks than among whites in Cuba, whereas the opposite was true in both Brazil and the United States.</span><sup class="reference" data-dcnode-id="5309" id="cite_ref-:1_77-0"><a data-dcnode-id="5310" href="#cite_note-:1-77"><span data-dcnode-id="5311" instrument_node="">[77]</span></a></sup><span data-dcnode-id="5308" instrument_node=""> In the area of life expectancy,  The life expectancy of nonwhite Cubans was only one year lower
than that of whites; life expectancy was basically identical for all racial groups. A powerful indicator of social wellbeing, linked to access to health services (as reflected, particularly, in infant mortality), nutrition and education, the Cuban race gap in life expectancy was significantly lower than those found in more affluent multiracial societies such as Brazil (about 6.7 years) and the United States (about 6.3 years) during the same period.</span><sup class="reference" data-dcnode-id="5305" id="cite_ref-:1_77-1"><a data-dcnode-id="5306" href="#cite_note-:1-77"><span data-dcnode-id="5307" instrument_node="">[77]</span></a></sup><span data-dcnode-id="5304" instrument_node="">.Because of these social reforms the Afro Cuban population is the healthiest longest living black population in the world.</span><sup class="reference" data-dcnode-id="5301" id="cite_ref-78"><a data-dcnode-id="5302" href="#cite_note-78"><span data-dcnode-id="5303" instrument_node="">[78]</span></a></sup><span data-dcnode-id="5300" instrument_node=""> In the area of national leadership the vestiges of the pre revolutionary era are still visible when it comes to the question of colour, with Afro Cubans having yet to achieve parity when it comes to representation. Nevertheless, reforms have been introduced since in the 1970s when Castro "worked to increase the number of Afro-Cuban political representatives, with the percentage of Black members on the Council of State expanding from 12.9% in 1976 to 25.8% by 2003".</span><sup class="reference" data-dcnode-id="5297" id="cite_ref-79"><a data-dcnode-id="5298" href="#cite_note-79"><span data-dcnode-id="5299" instrument_node="">[79]</span></a></sup><span data-dcnode-id="5296" instrument_node="">
</span></p><span data-dcnode-id="5294" instrument_node="">
</span><h2 data-dcnode-id="5284"><span class="mw-headline" data-dcnode-id="5292" id="Black_Spring"><span data-dcnode-id="5293" instrument_node="">Black Spring</span></span><span class="mw-editsection" data-dcnode-id="5285"><span class="mw-editsection-bracket" data-dcnode-id="5290"><span data-dcnode-id="5291" instrument_node="">[</span></span><a data-dcnode-id="5288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D21" title="Edit section: Black Spring"><span data-dcnode-id="5289" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5286"><span data-dcnode-id="5287" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5283" instrument_node="">
</span><link data-dcnode-id="5282" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5278" role="note"><span data-dcnode-id="5281" instrument_node="">Main article: </span><a data-dcnode-id="5279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_Spring_%28Cuba%29" title="Black Spring (Cuba)"><span data-dcnode-id="5280" instrument_node="">Black Spring (Cuba)</span></a></div><span data-dcnode-id="5277" instrument_node="">
</span><p data-dcnode-id="5243"><span data-dcnode-id="5276" instrument_node="">In March 2003, the government of Cuba arrested dozens of people (including self-identified journalists and </span><a class="mw-redirect" data-dcnode-id="5274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_rights_activist" title="Human rights activist"><span data-dcnode-id="5275" instrument_node="">human rights activists</span></a><span data-dcnode-id="5273" instrument_node="">), and charged them with </span><a data-dcnode-id="5271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sedition" title="Sedition"><span data-dcnode-id="5272" instrument_node="">sedition</span></a><span data-dcnode-id="5270" instrument_node=""> due to their alleged cooperation with </span><a data-dcnode-id="5268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Cason" title="James Cason"><span data-dcnode-id="5269" instrument_node="">James Cason</span></a><span data-dcnode-id="5267" instrument_node="">, head of the </span><a data-dcnode-id="5265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Interests_Section_in_Havana" title="United States Interests Section in Havana"><span data-dcnode-id="5266" instrument_node="">United States Interests Section in Havana</span></a><span data-dcnode-id="5264" instrument_node="">.</span><sup class="reference" data-dcnode-id="5261" id="cite_ref-80"><a data-dcnode-id="5262" href="#cite_note-80"><span data-dcnode-id="5263" instrument_node="">[80]</span></a></sup><span data-dcnode-id="5260" instrument_node=""> The accused were tried and sentenced to prison terms ranging from 15 to 28 years. In all, 75 people were given lengthy sentences averaging 17 years each. Among those sentenced were </span><a data-dcnode-id="5258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ra%25C3%25BAl_Rivero" title="Raúl Rivero"><span data-dcnode-id="5259" instrument_node="">Raúl Rivero</span></a><span data-dcnode-id="5257" instrument_node="">, </span><a data-dcnode-id="5255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marta_Beatriz_Roque" title="Marta Beatriz Roque"><span data-dcnode-id="5256" instrument_node="">Marta Beatriz Roque</span></a><span data-dcnode-id="5254" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="5252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oscar_El%25C3%25ADas_Biscet" title="Oscar Elías Biscet"><span data-dcnode-id="5253" instrument_node="">Oscar Elías Biscet</span></a><span data-dcnode-id="5251" instrument_node="">. </span><a data-dcnode-id="5249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amnesty_International" title="Amnesty International"><span data-dcnode-id="5250" instrument_node="">Amnesty International</span></a><span data-dcnode-id="5248" instrument_node=""> described the trials as "hasty and manifestly unfair."</span><sup class="reference" data-dcnode-id="5245" id="cite_ref-81"><a data-dcnode-id="5246" href="#cite_note-81"><span data-dcnode-id="5247" instrument_node="">[81]</span></a></sup><span data-dcnode-id="5244" instrument_node="">
</span></p><p data-dcnode-id="5234"><span data-dcnode-id="5242" instrument_node="">Cuban Foreign Minister </span><a data-dcnode-id="5240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Felipe_P%25C3%25A9rez_Roque" title="Felipe Pérez Roque"><span data-dcnode-id="5241" instrument_node="">Felipe Pérez Roque</span></a><span data-dcnode-id="5239" instrument_node=""> denied these accusations and responded: "Cuba has the right to defend itself and apply punishment just like other nations do, like the United States punishes those who cooperate with a foreign power to inflict damage on their people and territory."</span><sup class="reference" data-dcnode-id="5236" id="cite_ref-82"><a data-dcnode-id="5237" href="#cite_note-82"><span data-dcnode-id="5238" instrument_node="">[82]</span></a></sup><span data-dcnode-id="5235" instrument_node="">
</span></p><p data-dcnode-id="5232"><span data-dcnode-id="5233" instrument_node="">During the trial, evidence was presented that the defendants had received funds from the U.S. Interests Section. Cuban officials claim that the goal of this funding was to undermine the Cuban state, disrupt internal order, and damage the Cuban economy. For his part, Cason denies offering funds to anyone in Cuba.
</span></p><p data-dcnode-id="5194"><span data-dcnode-id="5231" instrument_node="">On November 29, 2004, the Cuban government released three of those arrested in the March 2003: </span><a data-dcnode-id="5229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oscar_Espinosa_Chepe" title="Oscar Espinosa Chepe"><span data-dcnode-id="5230" instrument_node="">Oscar Espinosa Chepe</span></a><span data-dcnode-id="5228" instrument_node="">, </span><a class="new" data-dcnode-id="5226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMarcelo_L%25C3%25B3pez%26action%3Dedit%26redlink%3D1" title="Marcelo López (page does not exist)"><span data-dcnode-id="5227" instrument_node="">Marcelo López</span></a><span data-dcnode-id="5225" instrument_node="">, and </span><a class="new" data-dcnode-id="5223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMargarito_Broche%26action%3Dedit%26redlink%3D1" title="Margarito Broche (page does not exist)"><span data-dcnode-id="5224" instrument_node="">Margarito Broche</span></a><span data-dcnode-id="5222" instrument_node="">. The action followed a meeting between the Spanish ambassador and Cuba's foreign minister.</span><sup class="reference" data-dcnode-id="5219" id="cite_ref-83"><a data-dcnode-id="5220" href="#cite_note-83"><span data-dcnode-id="5221" instrument_node="">[83]</span></a></sup><span data-dcnode-id="5218" instrument_node=""> In subsequent days four more dissidents were released: </span><a data-dcnode-id="5216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ra%25C3%25BAl_Rivero" title="Raúl Rivero"><span data-dcnode-id="5217" instrument_node="">Raúl Rivero</span></a><span data-dcnode-id="5215" instrument_node="">, </span><a class="new" data-dcnode-id="5213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOsvaldo_Alfonso_Vald%25C3%25A9s%26action%3Dedit%26redlink%3D1" title="Osvaldo Alfonso Valdés (page does not exist)"><span data-dcnode-id="5214" instrument_node="">Osvaldo Alfonso Valdés</span></a><span data-dcnode-id="5212" instrument_node="">,</span><sup class="reference" data-dcnode-id="5209" id="cite_ref-84"><a data-dcnode-id="5210" href="#cite_note-84"><span data-dcnode-id="5211" instrument_node="">[84]</span></a></sup><span data-dcnode-id="5208" instrument_node=""> </span><a class="new" data-dcnode-id="5206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEdel_Jos%25C3%25A9_Garc%25C3%25ADa%26action%3Dedit%26redlink%3D1" title="Edel José García (page does not exist)"><span data-dcnode-id="5207" instrument_node="">Edel José García</span></a><sup class="reference" data-dcnode-id="5203" id="cite_ref-85"><a data-dcnode-id="5204" href="#cite_note-85"><span data-dcnode-id="5205" instrument_node="">[85]</span></a></sup><span data-dcnode-id="5202" instrument_node=""> and </span><a class="new" data-dcnode-id="5200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DJorge_Olivera%26action%3Dedit%26redlink%3D1" title="Jorge Olivera (page does not exist)"><span data-dcnode-id="5201" instrument_node="">Jorge Olivera</span></a><span data-dcnode-id="5199" instrument_node="">.</span><sup class="reference" data-dcnode-id="5196" id="cite_ref-86"><a data-dcnode-id="5197" href="#cite_note-86"><span data-dcnode-id="5198" instrument_node="">[86]</span></a></sup><span data-dcnode-id="5195" instrument_node=""> Seven other prisoners had previously been released for health reasons.
</span></p><span data-dcnode-id="5193" instrument_node="">
</span><h2 data-dcnode-id="5183"><span class="mw-headline" data-dcnode-id="5191" id="Campaigns_against_homosexual_behavior"><span data-dcnode-id="5192" instrument_node="">Campaigns against homosexual behavior</span></span><span class="mw-editsection" data-dcnode-id="5184"><span class="mw-editsection-bracket" data-dcnode-id="5189"><span data-dcnode-id="5190" instrument_node="">[</span></span><a data-dcnode-id="5187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D22" title="Edit section: Campaigns against homosexual behavior"><span data-dcnode-id="5188" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5185"><span data-dcnode-id="5186" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5182" instrument_node="">
</span><link data-dcnode-id="5181" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5174" role="note"><span data-dcnode-id="5180" instrument_node="">Main articles: </span><a data-dcnode-id="5178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/LGBT_rights_in_Cuba" title="LGBT rights in Cuba"><span data-dcnode-id="5179" instrument_node="">LGBT rights in Cuba</span></a><span data-dcnode-id="5177" instrument_node=""> and </span><a data-dcnode-id="5175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_Units_to_Aid_Production" title="Military Units to Aid Production"><span data-dcnode-id="5176" instrument_node="">Military Units to Aid Production</span></a></div><span data-dcnode-id="5173" instrument_node="">
</span><p data-dcnode-id="5147"><span data-dcnode-id="5172" instrument_node="">Thousands of </span><a class="mw-redirect" data-dcnode-id="5170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homosexual" title="Homosexual"><span data-dcnode-id="5171" instrument_node="">homosexuals</span></a><span data-dcnode-id="5169" instrument_node="">, </span><a data-dcnode-id="5167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jehovah%2527s_Witnesses" title="Jehovah's Witnesses"><span data-dcnode-id="5168" instrument_node="">Jehovah's Witnesses</span></a><span data-dcnode-id="5166" instrument_node="">, conscientious objectors, and dissidents were forced to conduct their compulsory military service in the 1960s at UMAP camps, where they were subject to political "</span><a class="extiw" data-dcnode-id="5164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wiktionary.org/wiki/reeducation" title="wikt:reeducation"><span data-dcnode-id="5165" instrument_node="">reeducation</span></a><span data-dcnode-id="5163" instrument_node="">".</span><sup class="reference" data-dcnode-id="5160" id="cite_ref-Hirschfeld-since1898_69-4"><a data-dcnode-id="5161" href="#cite_note-Hirschfeld-since1898-69"><span data-dcnode-id="5162" instrument_node="">[69]</span></a></sup><sup class="reference" data-dcnode-id="5157" id="cite_ref-87"><a data-dcnode-id="5158" href="#cite_note-87"><span data-dcnode-id="5159" instrument_node="">[87]</span></a></sup><span data-dcnode-id="5156" instrument_node=""> Military commanders brutalized the inmates.</span><sup class="reference" data-dcnode-id="5153" id="cite_ref-Lumsden_88-0"><a data-dcnode-id="5154" href="#cite_note-Lumsden-88"><span data-dcnode-id="5155" instrument_node="">[88]</span></a></sup><span data-dcnode-id="5152" instrument_node=""> Carlos Alberto Montaner says "Camps of forced labour were instituted with all speed to "correct" such deviations&nbsp;... Verbal and physical mistreatment, shaved heads, work from dawn to dusk, hammocks, dirt floors, scarce food&nbsp;... The camps became increasingly crowded as the methods of arrest became more expedient".</span><sup class="reference" data-dcnode-id="5149" id="cite_ref-Hirschfeld-since1898_69-5"><a data-dcnode-id="5150" href="#cite_note-Hirschfeld-since1898-69"><span data-dcnode-id="5151" instrument_node="">[69]</span></a></sup><span data-dcnode-id="5148" instrument_node="">
</span></p><p data-dcnode-id="5137"><span data-dcnode-id="5146" instrument_node="">In the late 1960s, because of "revolutionary social hygiene", the Castro government claimed to cleanse the arts of "fraudulent sodomitic" writers and "sick effeminate" dancers.</span><sup class="reference" data-dcnode-id="5143" id="cite_ref-Lumsden_88-1"><a data-dcnode-id="5144" href="#cite_note-Lumsden-88"><span data-dcnode-id="5145" instrument_node="">[88]</span></a></sup><span data-dcnode-id="5142" instrument_node=""> Additionally, men with long hair were locked up and their hair was cut.</span><sup class="reference" data-dcnode-id="5139" id="cite_ref-Lumsden_88-2"><a data-dcnode-id="5140" href="#cite_note-Lumsden-88"><span data-dcnode-id="5141" instrument_node="">[88]</span></a></sup><span data-dcnode-id="5138" instrument_node="">
</span></p><p data-dcnode-id="5120"><span data-dcnode-id="5136" instrument_node="">Castro is reported to once have asserted that, "in the country[side], there are no homosexuals", before claiming in 1992 that homosexuality is a "natural human tendency that must simply be respected".</span><sup class="reference" data-dcnode-id="5133" id="cite_ref-Tatchell_89-0"><a data-dcnode-id="5134" href="#cite_note-Tatchell-89"><span data-dcnode-id="5135" instrument_node="">[89]</span></a></sup><span data-dcnode-id="5132" instrument_node=""> Another source reports Castro as having denounced "maricones" ("</span><a data-dcnode-id="5130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Faggot_%28slang%29" title="Faggot (slang)"><span data-dcnode-id="5131" instrument_node="">faggots</span></a><span data-dcnode-id="5129" instrument_node="">") as "agents of imperialism".</span><sup class="reference" data-dcnode-id="5126" id="cite_ref-90"><a data-dcnode-id="5127" href="#cite_note-90"><span data-dcnode-id="5128" instrument_node="">[90]</span></a></sup><span data-dcnode-id="5125" instrument_node=""> Castro has also reportedly asserted that "homosexuals should not be allowed in positions where they are able to exert influence upon young people".</span><sup class="reference" data-dcnode-id="5122" id="cite_ref-91"><a data-dcnode-id="5123" href="#cite_note-91"><span data-dcnode-id="5124" instrument_node="">[91]</span></a></sup><span data-dcnode-id="5121" instrument_node="">
</span></p><span data-dcnode-id="5119" instrument_node="">
</span><h3 data-dcnode-id="5109"><span class="mw-headline" data-dcnode-id="5117" id="Recent_changes"><span data-dcnode-id="5118" instrument_node="">Recent changes</span></span><span class="mw-editsection" data-dcnode-id="5110"><span class="mw-editsection-bracket" data-dcnode-id="5115"><span data-dcnode-id="5116" instrument_node="">[</span></span><a data-dcnode-id="5113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D23" title="Edit section: Recent changes"><span data-dcnode-id="5114" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5111"><span data-dcnode-id="5112" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5108" instrument_node="">
</span><p data-dcnode-id="5075"><span data-dcnode-id="5107" instrument_node="">Cuba has made some reforms in the 21st century.</span><sup class="reference" data-dcnode-id="5104" id="cite_ref-92"><a data-dcnode-id="5105" href="#cite_note-92"><span data-dcnode-id="5106" instrument_node="">[92]</span></a></sup><span data-dcnode-id="5103" instrument_node=""> In 2003, Carlos Sanchez of the </span><a class="mw-redirect" data-dcnode-id="5101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Lesbian_and_Gay_Association" title="International Lesbian and Gay Association"><span data-dcnode-id="5102" instrument_node="">International Lesbian and Gay Association</span></a><span data-dcnode-id="5100" instrument_node=""> issued a report on the status of gay people in Cuba which claimed that the Cuban government no longer imposes any legal punishments on its gay citizens, that there is a greater level of tolerance among Cubans for gay, bisexual, and transgender people, and that the Cuban government was open to endorsing a gay and lesbian rights plank at the </span><a data-dcnode-id="5098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="5099" instrument_node="">United Nations</span></a><span data-dcnode-id="5097" instrument_node="">.</span><sup class="reference" data-dcnode-id="5094" id="cite_ref-93"><a data-dcnode-id="5095" href="#cite_note-93"><span data-dcnode-id="5096" instrument_node="">[93]</span></a></sup><span data-dcnode-id="5093" instrument_node=""> Since 2005 </span><a data-dcnode-id="5091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sex_reassignment_surgery" title="Sex reassignment surgery"><span data-dcnode-id="5092" instrument_node="">sex reassignment surgeries</span></a><span data-dcnode-id="5090" instrument_node=""> for transgender individuals are free under law, and are paid for by the government.</span><sup class="reference" data-dcnode-id="5087" id="cite_ref-sexchange_94-0"><a data-dcnode-id="5088" href="#cite_note-sexchange-94"><span data-dcnode-id="5089" instrument_node="">[94]</span></a></sup><sup class="reference" data-dcnode-id="5084" id="cite_ref-95"><a data-dcnode-id="5085" href="#cite_note-95"><span data-dcnode-id="5086" instrument_node="">[95]</span></a></sup><span data-dcnode-id="5083" instrument_node=""> Also </span><a data-dcnode-id="5081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Havana" title="Havana"><span data-dcnode-id="5082" instrument_node="">Havana</span></a><span data-dcnode-id="5080" instrument_node=""> now has a "lively and vibrant" gay and lesbian scene.</span><sup class="reference" data-dcnode-id="5077" id="cite_ref-96"><a data-dcnode-id="5078" href="#cite_note-96"><span data-dcnode-id="5079" instrument_node="">[96]</span></a></sup><span data-dcnode-id="5076" instrument_node="">
</span></p><p data-dcnode-id="5060"><span data-dcnode-id="5074" instrument_node="">In a 2010 interview with Mexican newspaper </span><i data-dcnode-id="5072"><span data-dcnode-id="5073" instrument_node="">La Jornada</span></i><span data-dcnode-id="5071" instrument_node="">, the </span><a data-dcnode-id="5069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Secretary_of_the_Communist_Party_of_Cuba" title="First Secretary of the Communist Party of Cuba"><span data-dcnode-id="5070" instrument_node="">First Secretary of the Communist Party of Cuba</span></a><span data-dcnode-id="5068" instrument_node="">, Fidel Castro, called the persecution of homosexuals whilst he was in power "a great injustice, great injustice!" Taking responsibility for the persecution, he said, "If anyone is responsible, it's me&nbsp;... We had so many and such terrible problems, problems of life or death. In those moments I was not able to deal with that matter [of homosexuals]. I found myself immersed, principally, in the </span><a data-dcnode-id="5066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuban_Missile_Crisis" title="Cuban Missile Crisis"><span data-dcnode-id="5067" instrument_node="">Crisis of October</span></a><span data-dcnode-id="5065" instrument_node="">, in the war, in policy questions." Castro personally believed that the negative treatment of gays in Cuba arose out of the country's pre-revolutionary attitudes toward homosexuality.</span><sup class="reference" data-dcnode-id="5062" id="cite_ref-97"><a data-dcnode-id="5063" href="#cite_note-97"><span data-dcnode-id="5064" instrument_node="">[97]</span></a></sup><span data-dcnode-id="5061" instrument_node="">
</span></p><p data-dcnode-id="5043"><a data-dcnode-id="5058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mariela_Castro" title="Mariela Castro"><span data-dcnode-id="5059" instrument_node="">Mariela Castro</span></a><span data-dcnode-id="5057" instrument_node="">, daughter of </span><a data-dcnode-id="5055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Secretary_of_the_Communist_Party_of_Cuba" title="First Secretary of the Communist Party of Cuba"><span data-dcnode-id="5056" instrument_node="">Communist Party First Secretary</span></a><span data-dcnode-id="5054" instrument_node=""> </span><a data-dcnode-id="5052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ra%25C3%25BAl_Castro" title="Raúl Castro"><span data-dcnode-id="5053" instrument_node="">Raúl Castro</span></a><span data-dcnode-id="5051" instrument_node="">, has been pushing for lesbian rights with the pro-lesbian government sponsored </span><a class="new" data-dcnode-id="5049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCuban_National_Center_for_Sexual_Education%26action%3Dedit%26redlink%3D1" title="Cuban National Center for Sexual Education (page does not exist)"><span data-dcnode-id="5050" instrument_node="">Cuban National Center for Sexual Education</span></a><span data-dcnode-id="5048" instrument_node=""> which she leads. Mariela has stated her father fully supports her initiatives, saying that her father has overcome his initial homophobia to support his daughter.</span><sup class="reference" data-dcnode-id="5045" id="cite_ref-98"><a data-dcnode-id="5046" href="#cite_note-98"><span data-dcnode-id="5047" instrument_node="">[98]</span></a></sup><span data-dcnode-id="5044" instrument_node="">
</span></p><span data-dcnode-id="5042" instrument_node="">
</span><h2 data-dcnode-id="5032"><span class="mw-headline" data-dcnode-id="5040" id="United_Nations_Human_Rights_Commission"><span data-dcnode-id="5041" instrument_node="">United Nations Human Rights Commission</span></span><span class="mw-editsection" data-dcnode-id="5033"><span class="mw-editsection-bracket" data-dcnode-id="5038"><span data-dcnode-id="5039" instrument_node="">[</span></span><a data-dcnode-id="5036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D24" title="Edit section: United Nations Human Rights Commission"><span data-dcnode-id="5037" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5034"><span data-dcnode-id="5035" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5031" instrument_node="">
</span><p data-dcnode-id="5015"><span data-dcnode-id="5030" instrument_node="">Cuban human rights have been repeatedly discussed and debated in the </span><a class="mw-redirect" data-dcnode-id="5028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Human_Rights_Commission" title="United Nations Human Rights Commission"><span data-dcnode-id="5029" instrument_node="">United Nations Human Rights Commission</span></a><span data-dcnode-id="5027" instrument_node=""> since the Cuban Revolution. It would become a recurring flashpoint in the backdrop of international dynamic during the </span><a data-dcnode-id="5025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="5026" instrument_node="">Cold War</span></a><span data-dcnode-id="5024" instrument_node=""> and into the years following.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5017" style="white-space:nowrap;"><span data-dcnode-id="5023" instrument_node="">[</span><i data-dcnode-id="5019"><a data-dcnode-id="5020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5021" title="This claim needs references to reliable sources. (July 2021)"><span data-dcnode-id="5022" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5018" instrument_node="">]</span></sup><span data-dcnode-id="5016" instrument_node="">
</span></p><p data-dcnode-id="4932"><span data-dcnode-id="5014" instrument_node="">The organized and sustained international effort launched by prominent Cuban dissident groups (e.g. Miami's Center for Human Rights,</span><sup class="reference" data-dcnode-id="5011" id="cite_ref-Verdeja_99-0"><a data-dcnode-id="5012" href="#cite_note-Verdeja-99"><span data-dcnode-id="5013" instrument_node="">[99]</span></a></sup><span data-dcnode-id="5010" instrument_node=""> UNIDAD Cubana,</span><sup class="reference" data-dcnode-id="5007" id="cite_ref-100"><a data-dcnode-id="5008" href="#cite_note-100"><span data-dcnode-id="5009" instrument_node="">[100]</span></a></sup><span data-dcnode-id="5006" instrument_node=""> </span><a data-dcnode-id="5004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christian_Democratic_Party_of_Cuba" title="Christian Democratic Party of Cuba"><span data-dcnode-id="5005" instrument_node="">Christian Democratic Party of Cuba</span></a><span data-dcnode-id="5003" instrument_node="">, and others) and affiliated </span><a class="mw-redirect" data-dcnode-id="5001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NGOs" title="NGOs"><span data-dcnode-id="5002" instrument_node="">NGOs</span></a><span data-dcnode-id="5000" instrument_node="">  (such as </span><a data-dcnode-id="4998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_Rights_Watch" title="Human Rights Watch"><span data-dcnode-id="4999" instrument_node="">Human Rights Watch</span></a><span data-dcnode-id="4997" instrument_node="">) made their way to the UNHRC and would become a growing presence in </span><a data-dcnode-id="4995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geneva" title="Geneva"><span data-dcnode-id="4996" instrument_node="">Geneva</span></a><span data-dcnode-id="4994" instrument_node="">. These groups sometimes represented a spectrum of different Cuban interests, such as </span><a class="mw-redirect" data-dcnode-id="4992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Religious_liberty" title="Religious liberty"><span data-dcnode-id="4993" instrument_node="">religious liberty</span></a><span data-dcnode-id="4991" instrument_node=""> (e.g. </span><a class="mw-redirect" data-dcnode-id="4989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christian-Democrat" title="Christian-Democrat"><span data-dcnode-id="4990" instrument_node="">Christian-Democrat</span></a><span data-dcnode-id="4988" instrument_node=""> movements, parties, and organizations)</span><sup class="reference" data-dcnode-id="4985" id="cite_ref-101"><a data-dcnode-id="4986" href="#cite_note-101"><span data-dcnode-id="4987" instrument_node="">[101]</span></a></sup><sup class="reference" data-dcnode-id="4982" id="cite_ref-102"><a data-dcnode-id="4983" href="#cite_note-102"><span data-dcnode-id="4984" instrument_node="">[102]</span></a></sup><span data-dcnode-id="4981" instrument_node=""> and education (e.g. the International Association of Educators for World Peace),</span><sup class="reference" data-dcnode-id="4978" id="cite_ref-103"><a data-dcnode-id="4979" href="#cite_note-103"><span data-dcnode-id="4980" instrument_node="">[103]</span></a></sup><sup class="reference" data-dcnode-id="4975" id="cite_ref-104"><a data-dcnode-id="4976" href="#cite_note-104"><span data-dcnode-id="4977" instrument_node="">[104]</span></a></sup><span data-dcnode-id="4974" instrument_node=""> that coalesced around the issue of human rights. An influential force credited with crafting and spearheading the international Cuban human rights effort, particularly in the </span><a data-dcnode-id="4972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="4973" instrument_node="">United Nations</span></a><span data-dcnode-id="4971" instrument_node="">, was activist and Cuban community leader </span><a data-dcnode-id="4969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jesus_Permuy" title="Jesus Permuy"><span data-dcnode-id="4970" instrument_node="">Jesus Permuy</span></a><span data-dcnode-id="4968" instrument_node="">.</span><sup class="reference" data-dcnode-id="4965" id="cite_ref-105"><a data-dcnode-id="4966" href="#cite_note-105"><span data-dcnode-id="4967" instrument_node="">[105]</span></a></sup><span data-dcnode-id="4964" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="4962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Miami_Herald" title="The Miami Herald"><span data-dcnode-id="4963" instrument_node="">The Miami Herald</span></a><span data-dcnode-id="4961" instrument_node="">'s profile of the Cuban Christian Democrat Movement stated that Permuy spearheaded the international diplomatic strategy to call out the Castro regime's human rights abuses and work with other </span><a class="mw-redirect" data-dcnode-id="4959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christian-Democrat" title="Christian-Democrat"><span data-dcnode-id="4960" instrument_node="">Christian-Democratic</span></a><span data-dcnode-id="4958" instrument_node=""> governments to withhold international support until governmental changes were made to address human rights abuses.</span><sup class="reference" data-dcnode-id="4955" id="cite_ref-Ducassi_106-0"><a data-dcnode-id="4956" href="#cite_note-Ducassi-106"><span data-dcnode-id="4957" instrument_node="">[106]</span></a></sup><span data-dcnode-id="4954" instrument_node=""> Though the coalition's NGO-driven human rights effort for Cuba initially struggled to gain traction in the UNHRC, their influence gradually grew, especially as key groups secured Consultative Status which significantly expanded their resources and exposure there.</span><sup class="reference" data-dcnode-id="4951" id="cite_ref-107"><a data-dcnode-id="4952" href="#cite_note-107"><span data-dcnode-id="4953" instrument_node="">[107]</span></a></sup><span data-dcnode-id="4950" instrument_node=""> A significant turning point in these efforts came in 1984 when Permuy's Miami-based Center for Human Rights successfully lobbied to have Cuba's diplomatic representative, Luis Sola Vila, removed from a key subcommittee of the United Nations Human Rights Commission and replaced with a representative from </span><a data-dcnode-id="4948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ireland" title="Ireland"><span data-dcnode-id="4949" instrument_node="">Ireland</span></a><span data-dcnode-id="4947" instrument_node="">, a Christian-Democratic ally in opposition of the Castro government.</span><sup class="reference" data-dcnode-id="4944" id="cite_ref-Ducassi_106-1"><a data-dcnode-id="4945" href="#cite_note-Ducassi-106"><span data-dcnode-id="4946" instrument_node="">[106]</span></a></sup><span data-dcnode-id="4943" instrument_node=""> Another key moment came in 1987 when US President </span><a data-dcnode-id="4941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_Reagan" title="Ronald Reagan"><span data-dcnode-id="4942" instrument_node="">Ronald Reagan</span></a><span data-dcnode-id="4940" instrument_node=""> appointed </span><a data-dcnode-id="4938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Armando_Valladares" title="Armando Valladares"><span data-dcnode-id="4939" instrument_node="">Armando Valladares</span></a><span data-dcnode-id="4937" instrument_node="">, former Cuban political prisoner of 22 years, as the US Ambassador to the Commission. By 1992, there had been a substantial change in Geneva as the UNHRC representatives had shifted from initial rejection, then indifference and towards embrace of the anti-Castro Cuban human rights movement's diplomatic efforts.</span><sup class="reference" data-dcnode-id="4934" id="cite_ref-108"><a data-dcnode-id="4935" href="#cite_note-108"><span data-dcnode-id="4936" instrument_node="">[108]</span></a></sup><span data-dcnode-id="4933" instrument_node="">
</span></p><p data-dcnode-id="4907"><span data-dcnode-id="4931" instrument_node="">Since 1990, the United States itself has presented various resolutions to the annual </span><a class="mw-redirect" data-dcnode-id="4929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UN_Human_Rights_Commission" title="UN Human Rights Commission"><span data-dcnode-id="4930" instrument_node="">UN Human Rights Commission</span></a><span data-dcnode-id="4928" instrument_node=""> criticizing Cuba's human rights record. The proposals and subsequent diplomatic disagreements have been described as a "nearly annual ritual".</span><sup class="reference" data-dcnode-id="4925" id="cite_ref-Herald_109-0"><a data-dcnode-id="4926" href="#cite_note-Herald-109"><span data-dcnode-id="4927" instrument_node="">[109]</span></a></sup><span data-dcnode-id="4924" instrument_node=""> Long-term consensus between Latin American nations has not emerged.</span><sup class="reference" data-dcnode-id="4921" id="cite_ref-coha-OAS-UNHRC_110-0"><a data-dcnode-id="4922" href="#cite_note-coha-OAS-UNHRC-110"><span data-dcnode-id="4923" instrument_node="">[110]</span></a></sup><span data-dcnode-id="4920" instrument_node=""> The resolutions were passed 1990–1997, but were rejected in 1998.</span><sup class="reference" data-dcnode-id="4917" id="cite_ref-Herald_109-1"><a data-dcnode-id="4918" href="#cite_note-Herald-109"><span data-dcnode-id="4919" instrument_node="">[109]</span></a></sup><span data-dcnode-id="4916" instrument_node=""> Subsequent efforts by the U.S. have succeeded by narrow voting margins. In the Americas, some governments back the criticism, others oppose it, seeing it as a cynical manipulation of a serious human rights issue in order to promote the isolation of the island and to justify the decades-old embargo.</span><sup class="reference" data-dcnode-id="4913" id="cite_ref-coha-OAS-UNHRC_110-1"><a data-dcnode-id="4914" href="#cite_note-coha-OAS-UNHRC-110"><span data-dcnode-id="4915" instrument_node="">[110]</span></a></sup><span data-dcnode-id="4912" instrument_node=""> European Union nations have universally voted against Cuba since 1990, though requests that the resolution should contain references to the negative effects of the economic embargo have been made.</span><sup class="reference" data-dcnode-id="4909" id="cite_ref-111"><a data-dcnode-id="4910" href="#cite_note-111"><span data-dcnode-id="4911" instrument_node="">[111]</span></a></sup><span data-dcnode-id="4908" instrument_node="">
</span></p><span data-dcnode-id="4906" instrument_node="">
