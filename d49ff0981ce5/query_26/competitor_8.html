</span></p><p data-dcnode-id="6320"><span data-dcnode-id="6354" instrument_node="">Human rights groups and international organizations</span><sup class="noprint Inline-Template" data-dcnode-id="6347" style="white-space:nowrap;"><span data-dcnode-id="6353" instrument_node="">[</span><i data-dcnode-id="6349"><a class="mw-redirect" data-dcnode-id="6350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AAvoid_weasel_words" title="Wikipedia:Avoid weasel words"><span data-dcnode-id="6351" title="The material near this tag possibly uses too vague attribution or weasel words. (July 2021)"><span data-dcnode-id="6352" instrument_node="">which?</span></span></a></i><span data-dcnode-id="6348" instrument_node="">]</span></sup><span data-dcnode-id="6346" instrument_node=""> believe that these articles subordinate the exercise of freedom of expression to the state. The </span><a data-dcnode-id="6344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inter-American_Commission_on_Human_Rights" title="Inter-American Commission on Human Rights"><span data-dcnode-id="6345" instrument_node="">Inter-American Commission on Human Rights</span></a><span data-dcnode-id="6343" instrument_node=""> assess that: "It is evident that the exercise of the right to freedom of expression under this article of the Constitution is governed by two fundamental determinants: on the one hand, the preservation and strengthening of the communist State; on the other, the need to muzzle any criticism of the group in power."</span><sup class="reference" data-dcnode-id="6340" id="cite_ref-42"><a data-dcnode-id="6341" href="#cite_note-42"><span data-dcnode-id="6342" instrument_node="">[42]</span></a></sup><span data-dcnode-id="6339" instrument_node=""> Human rights group </span><a data-dcnode-id="6337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amnesty_International" title="Amnesty International"><span data-dcnode-id="6338" instrument_node="">Amnesty International</span></a><span data-dcnode-id="6336" instrument_node=""> assert that the universal state ownership of the media means that freedom of expression is restricted. Thus the exercise of the right to freedom of expression is restricted by the lack of means of mass communication falling outside state control.</span><sup class="reference" data-dcnode-id="6333" id="cite_ref-43"><a data-dcnode-id="6334" href="#cite_note-43"><span data-dcnode-id="6335" instrument_node="">[43]</span></a></sup><span data-dcnode-id="6332" instrument_node=""> </span><a data-dcnode-id="6330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_Rights_Watch" title="Human Rights Watch"><span data-dcnode-id="6331" instrument_node="">Human Rights Watch</span></a><span data-dcnode-id="6329" instrument_node=""> states: "Refusing to recognize human rights monitoring as a legitimate activity, the government denies legal status to local human rights groups. Individuals who belong to these groups face systematic harassment, with the government putting up obstacles to impede them from documenting human rights conditions. In addition, international human rights groups such as Human Rights Watch and Amnesty International are barred from sending fact-finding missions to Cuba. It remains one of the few countries in the world to deny the International Committee of the Red Cross access to its prisons."</span><sup class="reference" data-dcnode-id="6326" id="cite_ref-HumanRightsWatch_44-0"><a data-dcnode-id="6327" href="#cite_note-HumanRightsWatch-44"><span data-dcnode-id="6328" instrument_node="">[44]</span></a></sup><span data-dcnode-id="6325" instrument_node="">
Yet, activists' networks like Eye on Cuba and Cubalog.eu have continued working with the intention to raise awareness about the true situation concerning human and civil rights on the "island of freedom" and appeal to Europe Union and its members to apply responsible approach to Cuba in their foreign policy. Financial support and legal representation is provided by foreign NGOs as part of the EU Cuba Network.</span><sup class="reference" data-dcnode-id="6322" id="cite_ref-People_in_Need_45-0"><a data-dcnode-id="6323" href="#cite_note-People_in_Need-45"><span data-dcnode-id="6324" instrument_node="">[45]</span></a></sup><span data-dcnode-id="6321" instrument_node="">
</span></p><p data-dcnode-id="6303"><span data-dcnode-id="6319" instrument_node="">A formal structure and system of reporting news not approved by the government was first attempted in 1993.</span><sup class="reference" data-dcnode-id="6316" id="cite_ref-The_Miami_Herald_46-0"><a data-dcnode-id="6317" href="#cite_note-The_Miami_Herald-46"><span data-dcnode-id="6318" instrument_node="">[46]</span></a></sup><span data-dcnode-id="6315" instrument_node=""> The effort for an independent, uncensored news agency was spearheaded by Cuban human rights activist and then-President of Christian Democratic Movement </span><a data-dcnode-id="6313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jesus_Permuy" title="Jesus Permuy"><span data-dcnode-id="6314" instrument_node="">Jesus Permuy</span></a><span data-dcnode-id="6312" instrument_node="">.</span><sup class="reference" data-dcnode-id="6309" id="cite_ref-The_Miami_Herald_46-1"><a data-dcnode-id="6310" href="#cite_note-The_Miami_Herald-46"><span data-dcnode-id="6311" instrument_node="">[46]</span></a></sup><span data-dcnode-id="6308" instrument_node=""> It formally began in May of that year as Members of Civic Democratic Action, an umbrella group of nearly twenty Castro opposition organizations, formed an alliance with the Independent Cuban Journalists Association.</span><sup class="reference" data-dcnode-id="6305" id="cite_ref-The_Miami_Herald_46-2"><a data-dcnode-id="6306" href="#cite_note-The_Miami_Herald-46"><span data-dcnode-id="6307" instrument_node="">[46]</span></a></sup><span data-dcnode-id="6304" instrument_node=""> The effort ultimately failed.
</span></p><p data-dcnode-id="6294"><span data-dcnode-id="6302" instrument_node="">A </span><a data-dcnode-id="6300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reporters_Without_Borders" title="Reporters Without Borders"><span data-dcnode-id="6301" instrument_node="">Reporters Without Borders</span></a><span data-dcnode-id="6299" instrument_node=""> report as of October 2006 finds that Internet use is very restricted and under tight surveillance. Access is only possible with government permission and equipment is rationed. E-mail is monitored.</span><sup class="reference" data-dcnode-id="6296" id="cite_ref-47"><a data-dcnode-id="6297" href="#cite_note-47"><span data-dcnode-id="6298" instrument_node="">[47]</span></a></sup><span data-dcnode-id="6295" instrument_node="">
</span></p><p data-dcnode-id="6285"><span data-dcnode-id="6293" instrument_node="">Foreign journalists are systematically expelled from Cuba, e.g. notable journalists of </span><a data-dcnode-id="6291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gazeta_Wyborcza" title="Gazeta Wyborcza"><span data-dcnode-id="6292" instrument_node="">Gazeta Wyborcza</span></a><span data-dcnode-id="6290" instrument_node="">, Anna Bikont and Seweryn Blumsztahn, were expelled in 2005.</span><sup class="reference" data-dcnode-id="6287" id="cite_ref-48"><a data-dcnode-id="6288" href="#cite_note-48"><span data-dcnode-id="6289" instrument_node="">[48]</span></a></sup><span data-dcnode-id="6286" instrument_node="">
</span></p><span data-dcnode-id="6284" instrument_node="">
</span><h3 data-dcnode-id="6274"><span class="mw-headline" data-dcnode-id="6282" id="Restrictions_on_assembly"><span data-dcnode-id="6283" instrument_node="">Restrictions on assembly</span></span><span class="mw-editsection" data-dcnode-id="6275"><span class="mw-editsection-bracket" data-dcnode-id="6280"><span data-dcnode-id="6281" instrument_node="">[</span></span><a data-dcnode-id="6278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D9" title="Edit section: Restrictions on assembly"><span data-dcnode-id="6279" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6276"><span data-dcnode-id="6277" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6273" instrument_node="">
</span><p data-dcnode-id="6241"><span data-dcnode-id="6272" instrument_node="">Human Rights Watch states that "</span><a data-dcnode-id="6270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_of_assembly" title="Freedom of assembly"><span data-dcnode-id="6271" instrument_node="">freedom of assembly</span></a><span data-dcnode-id="6269" instrument_node=""> is severely restricted in Cuba, and political dissidents are generally prohibited from meeting in large groups.</span><sup class="reference" data-dcnode-id="6266" id="cite_ref-HumanRightsWatch_44-1"><a data-dcnode-id="6267" href="#cite_note-HumanRightsWatch-44"><span data-dcnode-id="6268" instrument_node="">[44]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="6258"><span data-dcnode-id="6259" style="white-space: nowrap;"><span data-dcnode-id="6265" instrument_node="">[</span><i data-dcnode-id="6261"><a data-dcnode-id="6262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ALink_rot" title="Wikipedia:Link rot"><span data-dcnode-id="6263" title="&nbsp;Dead link tagged March 2021"><span data-dcnode-id="6264" instrument_node="">dead link</span></span></a></i><span data-dcnode-id="6260" instrument_node="">]</span></span></sup><span data-dcnode-id="6257" instrument_node=""> </span><a data-dcnode-id="6255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amnesty_International" title="Amnesty International"><span data-dcnode-id="6256" instrument_node="">Amnesty</span></a><span data-dcnode-id="6254" instrument_node=""> states that "All human rights, civil and professional associations and unions that exist today in Cuba outside the officialdom of the state apparatus and mass organizations controlled by the government are barred from having legal status. This often puts at risk the individuals who belong to these associations of facing harassment, intimidation or criminal charges for activities which constitute the legitimate exercise of the fundamental freedoms of expression, association and assembly."</span><sup class="noprint Inline-Template" data-dcnode-id="6246"><span data-dcnode-id="6247" style="white-space: nowrap;"><span data-dcnode-id="6253" instrument_node="">[</span><i data-dcnode-id="6249"><a data-dcnode-id="6250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ALink_rot" title="Wikipedia:Link rot"><span data-dcnode-id="6251" title="&nbsp;Dead link tagged September 2012"><span data-dcnode-id="6252" instrument_node="">dead link</span></span></a></i><span data-dcnode-id="6248" instrument_node="">]</span></span></sup><sup class="reference" data-dcnode-id="6243" id="cite_ref-49"><a data-dcnode-id="6244" href="#cite_note-49"><span data-dcnode-id="6245" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6242" instrument_node="">
</span></p><p data-dcnode-id="6203"><span data-dcnode-id="6240" instrument_node="">The Cuban authorities only recognize a single national trade union centre, the </span><a class="mw-redirect" data-dcnode-id="6238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_de_Trabajadores_de_Cuba" title="Central de Trabajadores de Cuba"><span data-dcnode-id="6239" instrument_node="">Central de Trabajadores de Cuba</span></a><span data-dcnode-id="6237" instrument_node=""> (CTC), heavily controlled</span><sup class="noprint Inline-Template" data-dcnode-id="6230" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="6236" instrument_node="">[</span><i data-dcnode-id="6232"><a class="mw-redirect" data-dcnode-id="6233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AAvoid_weasel_words" title="Wikipedia:Avoid weasel words"><span data-dcnode-id="6234" title="Who says this? (July 2021)"><span data-dcnode-id="6235" instrument_node="">weasel&nbsp;words</span></span></a></i><span data-dcnode-id="6231" instrument_node="">]</span></sup><span data-dcnode-id="6229" instrument_node=""> by the State and the Communist Party which appoints its leaders. Membership is compulsory for all workers. Before a worker can be hired, they must sign a contract in which they promise to support the Communist Party and everything it represents.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6222" style="white-space:nowrap;"><span data-dcnode-id="6228" instrument_node="">[</span><i data-dcnode-id="6224"><a data-dcnode-id="6225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6226" title="This claim needs references to reliable sources. (April 2018)"><span data-dcnode-id="6227" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6223" instrument_node="">]</span></sup><span data-dcnode-id="6221" instrument_node=""> The government explicitly prohibits independent trade unions, there is systematic harassment and detention of labor activists, and the leaders of attempted independent unions have been imprisoned. The right to strike is not recognized in law.</span><sup class="reference" data-dcnode-id="6218" id="cite_ref-50"><a data-dcnode-id="6219" href="#cite_note-50"><span data-dcnode-id="6220" instrument_node="">[50]</span></a></sup><sup class="reference" data-dcnode-id="6215" id="cite_ref-51"><a data-dcnode-id="6216" href="#cite_note-51"><span data-dcnode-id="6217" instrument_node="">[51]</span></a></sup><sup class="reference" data-dcnode-id="6212" id="cite_ref-52"><a data-dcnode-id="6213" href="#cite_note-52"><span data-dcnode-id="6214" instrument_node="">[52]</span></a></sup><sup class="noprint Inline-Template noprint noexcerpt Template-Fact" data-dcnode-id="6205" style="white-space:nowrap;"><span data-dcnode-id="6211" instrument_node="">[</span><i data-dcnode-id="6207"><a class="mw-redirect" data-dcnode-id="6208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANOTRS" title="Wikipedia:NOTRS"><span data-dcnode-id="6209" title="This claim needs references to better sources. (March 2021)"><span data-dcnode-id="6210" instrument_node="">better&nbsp;source&nbsp;needed</span></span></a></i><span data-dcnode-id="6206" instrument_node="">]</span></sup><span data-dcnode-id="6204" instrument_node="">
</span></p><span data-dcnode-id="6202" instrument_node="">
</span><h3 data-dcnode-id="6192"><span class="mw-headline" data-dcnode-id="6200" id="Society"><span data-dcnode-id="6201" instrument_node="">Society</span></span><span class="mw-editsection" data-dcnode-id="6193"><span class="mw-editsection-bracket" data-dcnode-id="6198"><span data-dcnode-id="6199" instrument_node="">[</span></span><a data-dcnode-id="6196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D10" title="Edit section: Society"><span data-dcnode-id="6197" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6194"><span data-dcnode-id="6195" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6191" instrument_node="">
</span><p data-dcnode-id="6146"><span data-dcnode-id="6190" instrument_node="">In 2001 an attempt was made by </span><a class="mw-redirect" data-dcnode-id="6188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oswaldo_Pay%25C3%25A1_Sardi%25C3%25B1as" title="Oswaldo Payá Sardiñas"><span data-dcnode-id="6189" instrument_node="">Oswaldo Payá Sardiñas</span></a><span data-dcnode-id="6187" instrument_node=""> and others from the Christian Liberation Movement, operating as the </span><a data-dcnode-id="6185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Varela_Project" title="Varela Project"><span data-dcnode-id="6186" instrument_node="">Varela Project</span></a><span data-dcnode-id="6184" instrument_node="">, to have a national </span><a class="mw-redirect" data-dcnode-id="6182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plebiscite" title="Plebiscite"><span data-dcnode-id="6183" instrument_node="">plebiscite</span></a><span data-dcnode-id="6181" instrument_node=""> using provisions in the </span><a data-dcnode-id="6179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_Cuba" title="Constitution of Cuba"><span data-dcnode-id="6180" instrument_node="">Constitution of Cuba</span></a><span data-dcnode-id="6178" instrument_node=""> which provided for </span><a data-dcnode-id="6176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Initiative" title="Initiative"><span data-dcnode-id="6177" instrument_node="">citizen initiative</span></a><span data-dcnode-id="6175" instrument_node="">. If accepted by the government and approved by public vote, the amendments would have established such things as </span><a data-dcnode-id="6173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_of_association" title="Freedom of association"><span data-dcnode-id="6174" instrument_node="">freedom of association</span></a><span data-dcnode-id="6172" instrument_node="">, </span><a data-dcnode-id="6170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_of_speech" title="Freedom of speech"><span data-dcnode-id="6171" instrument_node="">freedom of speech</span></a><span data-dcnode-id="6169" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_of_press" title="Freedom of press"><span data-dcnode-id="6168" instrument_node="">freedom of press</span></a><span data-dcnode-id="6166" instrument_node="">, as well as starting private businesses. The </span><a data-dcnode-id="6164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petition" title="Petition"><span data-dcnode-id="6165" instrument_node="">petition</span></a><span data-dcnode-id="6163" instrument_node=""> was refused by the National Assembly and in response a referendum was held in support of socialism being a permanent fixture of the constitution, for which the government claimed</span><sup class="noprint Inline-Template" data-dcnode-id="6156" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="6162" instrument_node="">[</span><i data-dcnode-id="6158"><a class="mw-redirect" data-dcnode-id="6159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AAvoid_weasel_words" title="Wikipedia:Avoid weasel words"><span data-dcnode-id="6160" title="Who says this? (July 2021)"><span data-dcnode-id="6161" instrument_node="">weasel&nbsp;words</span></span></a></i><span data-dcnode-id="6157" instrument_node="">]</span></sup><span data-dcnode-id="6155" instrument_node=""> 99% voter approval.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6148" style="white-space:nowrap;"><span data-dcnode-id="6154" instrument_node="">[</span><i data-dcnode-id="6150"><a data-dcnode-id="6151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6152" title="This claim needs references to reliable sources. (March 2021)"><span data-dcnode-id="6153" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6149" instrument_node="">]</span></sup><span data-dcnode-id="6147" instrument_node="">
</span></p><p data-dcnode-id="6136"><span data-dcnode-id="6145" instrument_node="">Another important project is the establishment of the Assembly to Promote Civil Society. The Assembly to Promote Civil Society in Cuba is a coalition of 365 independent civil society groups with the stated aims of "forming a democratic culture", "developing a social movement", strengthening the Assembly's organization, communicating among groups to promote the civil society, using all available means to combat poverty and seeking the betterment of the community's life conditions, developing a true knowledge of Cuba's history, in all its dimensions: economic, social and political, undertaking activities and projects aimed at the protection and conservation of natural resources and the ecosystem, and promoting a true culture on labor rights.</span><sup class="reference" data-dcnode-id="6142" id="cite_ref-53"><a data-dcnode-id="6143" href="#cite_note-53"><span data-dcnode-id="6144" instrument_node="">[53]</span></a></sup><span data-dcnode-id="6141" instrument_node=""> The Assembly had its first meeting in May 2005.</span><sup class="reference" data-dcnode-id="6138" id="cite_ref-54"><a data-dcnode-id="6139" href="#cite_note-54"><span data-dcnode-id="6140" instrument_node="">[54]</span></a></sup><span data-dcnode-id="6137" instrument_node="">
</span></p><span data-dcnode-id="6135" instrument_node="">
</span><h3 data-dcnode-id="6125"><span class="mw-headline" data-dcnode-id="6133" id="Capital_punishment"><span data-dcnode-id="6134" instrument_node="">Capital punishment</span></span><span class="mw-editsection" data-dcnode-id="6126"><span class="mw-editsection-bracket" data-dcnode-id="6131"><span data-dcnode-id="6132" instrument_node="">[</span></span><a data-dcnode-id="6129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D11" title="Edit section: Capital punishment"><span data-dcnode-id="6130" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6127"><span data-dcnode-id="6128" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6124" instrument_node="">
</span><link data-dcnode-id="6123" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6119" role="note"><span data-dcnode-id="6122" instrument_node="">Main article: </span><a data-dcnode-id="6120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_punishment_in_Cuba" title="Capital punishment in Cuba"><span data-dcnode-id="6121" instrument_node="">Capital punishment in Cuba</span></a></div><span data-dcnode-id="6118" instrument_node="">
</span><p data-dcnode-id="6109"><span data-dcnode-id="6117" instrument_node="">Cuba placed a moratorium on the use of </span><a data-dcnode-id="6115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_punishment" title="Capital punishment"><span data-dcnode-id="6116" instrument_node="">capital punishment</span></a><span data-dcnode-id="6114" instrument_node=""> in 1999. However, an exception was made when, in 2003, three members of a gang of ten were executed for a ferry hijacking. The hijackers were attempting to reach Florida, but ran out of fuel only halfway to their destination. After a two-day stand-off, the ferry was escorted by coast guard patrol boats back to a Cuban port, ostensibly to refuel; when hostages began jumping over the sides of the ship, however, the authorities subdued the hijackers and regained control. Four other men were given life sentences, and the remaining three women involved received 1-5 years in prison.</span><sup class="reference" data-dcnode-id="6111" id="cite_ref-55"><a data-dcnode-id="6112" href="#cite_note-55"><span data-dcnode-id="6113" instrument_node="">[55]</span></a></sup><span data-dcnode-id="6110" instrument_node="">
</span></p><span data-dcnode-id="6108" instrument_node="">
</span><h3 data-dcnode-id="6098"><span class="mw-headline" data-dcnode-id="6106" id="Acts_of_repudiation"><span data-dcnode-id="6107" instrument_node="">Acts of repudiation</span></span><span class="mw-editsection" data-dcnode-id="6099"><span class="mw-editsection-bracket" data-dcnode-id="6104"><span data-dcnode-id="6105" instrument_node="">[</span></span><a data-dcnode-id="6102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D12" title="Edit section: Acts of repudiation"><span data-dcnode-id="6103" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6100"><span data-dcnode-id="6101" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6097" instrument_node="">
</span><link data-dcnode-id="6096" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6092" role="note"><span data-dcnode-id="6095" instrument_node="">Main article: </span><a data-dcnode-id="6093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acts_of_repudiation" title="Acts of repudiation"><span data-dcnode-id="6094" instrument_node="">Acts of repudiation</span></a></div><span data-dcnode-id="6091" instrument_node="">
</span><p data-dcnode-id="6076"><span data-dcnode-id="6090" instrument_node="">Human rights groups including Amnesty International have long been critical of what the Cuban authorities have termed "Acts of repudiation" (</span><i data-dcnode-id="6088"><span data-dcnode-id="6089" instrument_node="">actos de repudio</span></i><span data-dcnode-id="6087" instrument_node="">). These acts occur when large groups of citizens verbally abuse, intimidate and sometimes physically assault and throw stones and other objects at the homes of Cubans who are considered </span><a data-dcnode-id="6085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Counter-revolutionary" title="Counter-revolutionary"><span data-dcnode-id="6086" instrument_node="">counter-revolutionaries</span></a><span data-dcnode-id="6084" instrument_node="">. Human rights groups suspect that these acts are often carried out in collusion with the security forces and sometimes involve the </span><a class="mw-redirect" data-dcnode-id="6082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Committees_for_the_Defence_of_the_Revolution" title="Committees for the Defence of the Revolution"><span data-dcnode-id="6083" instrument_node="">Committees for the Defence of the Revolution</span></a><span data-dcnode-id="6081" instrument_node=""> or the Rapid Response Brigades.</span><sup class="reference" data-dcnode-id="6078" id="cite_ref-56"><a data-dcnode-id="6079" href="#cite_note-56"><span data-dcnode-id="6080" instrument_node="">[56]</span></a></sup><span data-dcnode-id="6077" instrument_node="">
</span></p><span data-dcnode-id="6075" instrument_node="">
</span><h3 data-dcnode-id="6065"><span class="mw-headline" data-dcnode-id="6073" id="Notable_prisoners_of_conscience"><span data-dcnode-id="6074" instrument_node="">Notable prisoners of conscience</span></span><span class="mw-editsection" data-dcnode-id="6066"><span class="mw-editsection-bracket" data-dcnode-id="6071"><span data-dcnode-id="6072" instrument_node="">[</span></span><a data-dcnode-id="6069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D13" title="Edit section: Notable prisoners of conscience"><span data-dcnode-id="6070" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6067"><span data-dcnode-id="6068" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6064" instrument_node="">
</span><table class="box-More_citations_needed plainlinks metadata ambox ambox-content ambox-Refimprove" data-dcnode-id="5992" role="presentation"><tbody data-dcnode-id="5993"><tr data-dcnode-id="5994"><td class="mbox-image" data-dcnode-id="6060"><div data-dcnode-id="6061" style="width:52px"><a class="image" data-dcnode-id="6062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="6063" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="5995"><div class="mbox-text-span" data-dcnode-id="5996"><span data-dcnode-id="6059" instrument_node="">This section </span><b data-dcnode-id="6055"><span data-dcnode-id="6058" instrument_node="">needs additional citations for </span><a data-dcnode-id="6056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="6057" instrument_node="">verification</span></a></b><span data-dcnode-id="6054" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="6011"><span data-dcnode-id="6053" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="6051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit"><span data-dcnode-id="6052" instrument_node="">improve this article</span></a><span data-dcnode-id="60 /span></b><span data-dcnode-id="6028" instrument_node=""> </span><a class="external text" data-dcnode-id="6026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/search%3Ftbs%3Dbks%3A1%26q%3D%2522Human%2Brights%2Bin%2BCuba%2522%2B-wikipedia" rel="nofollow"><span data-dcnode-id="6027" instrument_node="">books</span></a><span data-dcnode-id="6025" instrument_node="">&nbsp;</span><b data-dcnode-id="6023"><span data-dcnode-id="6024" instrument_node="">·</span></b><span data-dcnode-id="6022" instrument_node=""> </span><a class="external text" data-dcnode-id="6020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3D%2522Human%2Brights%2Bin%2BCuba%2522" rel="nofollow"><span data-dcnode-id="6021" instrument_node="">scholar</span></a><span data-dcnode-id="6019" instrument_node="">&nbsp;</span><b data-dcnode-id="6017"><span data-dcnode-id="6018" instrument_node="">·</span></b><span data-dcnode-id="6016" instrument_node=""> </span><a class="external text" data-dcnode-id="6014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/action/doBasicSearch%3FQuery%3D%2522Human%2Brights%2Bin%2BCuba%2522%26acc%3Don%26wc%3Don" rel="nofollow"><span data-dcnode-id="6015" instrument_node="">JSTOR</span></a></span></small></span><span data-dcnode-id="6010" instrument_node=""> </span><span class="date-container" data-dcnode-id="6004"><i data-dcnode-id="6005"><span data-dcnode-id="6009" instrument_node="">(</span><span class="date" data-dcnode-id="6007"><span data-dcnode-id="6008" instrument_node="">March 2021</span></span><span data-dcnode-id="6006" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="5997"><i data-dcnode-id="5998"><span data-dcnode-id="6003" instrument_node=""> (</span><small data-dcnode-id="6000"><a data-dcnode-id="6001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="6002" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="5999" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="5991" instrument_node="">
</span><ul data-dcnode-id="5868"><li data-dcnode-id="5966"><span data-dcnode-id="5990" instrument_node="">In 1960, </span><a data-dcnode-id="5988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Armando_Valladares" title="Armando Valladares"><span data-dcnode-id="5989" instrument_node="">Armando Valladares</span></a><span data-dcnode-id="5987" instrument_node=""> was convicted on a charge of placing bombs in public places and was sentenced to thirty years in prison.</span><sup class="reference" data-dcnode-id="5984" id="cite_ref-57"><a data-dcnode-id="5985" href="#cite_note-57"><span data-dcnode-id="5986" instrument_node="">[57]</span></a></sup><span data-dcnode-id="5983" instrument_node=""> He and his supporters contend that he was never part of the Batista police as alleged by Castro supporters, and that his imprisonment was the result of his vocal opposition to the Castro government. Valladares claims to have been tortured and humiliated while he was on a </span><a data-dcnode-id="5981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hunger_strike" title="Hunger strike"><span data-dcnode-id="5982" instrument_node="">hunger strike</span></a><span data-dcnode-id="5980" instrument_node=""> in order to protest against prison abuses; he claims the guards denied him water until he became delirious, and they proceeded to urinate in his mouth and on his face. Furthermore, he claimed to be wheelchair-bound following his longest hunger strike. The Cuban government denied both claims, and provided video evidence to </span><a class="mw-redirect" data-dcnode-id="5978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Regis_Debray" title="Regis Debray"><span data-dcnode-id="5979" instrument_node="">Regis Debray</span></a><span data-dcnode-id="5977" instrument_node=""> of Valladares standing and walking.</span><sup class="reference" data-dcnode-id="5974" id="cite_ref-58"><a data-dcnode-id="5975" href="#cite_note-58"><span data-dcnode-id="5976" instrument_node="">[58]</span></a></sup><span data-dcnode-id="5973" instrument_node=""> Valladares was released from prison after serving twenty-two years of his sentence, due in part to the intercession of France's Socialist President </span><a data-dcnode-id="5971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fran%25C3%25A7ois_Mitterrand" title="François Mitterrand"><span data-dcnode-id="5972" instrument_node="">François Mitterrand</span></a><span data-dcnode-id="5970" instrument_node="">. Conservative author </span><a class="mw-redirect" data-dcnode-id="5968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Horowitz_%28conservative_writer%29" title="David Horowitz (conservative writer)"><span data-dcnode-id="5969" instrument_node="">David Horowitz</span></a><span data-dcnode-id="5967" instrument_node=""> has since called him a "Human Rights Hero."</span></li><span data-dcnode-id="5965" instrument_node="">
</span><li data-dcnode-id="5954"><span data-dcnode-id="5964" instrument_node="">In 1973, gay writer </span><a data-dcnode-id="5962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reinaldo_Arenas" title="Reinaldo Arenas"><span data-dcnode-id="5963" instrument_node="">Reinaldo Arenas</span></a><span data-dcnode-id="5961" instrument_node=""> was sent to prison after being charged and convicted of 'ideological deviation' and for publishing abroad without official consent. He escaped from prison and tried to leave Cuba by launching himself from the shore on a tire inner tube. The attempt failed and he was re-arrested near Lenin Park and imprisoned at the notorious El Morro Castle alongside murderers and rapists. After escaping from Cuba, Arenas described the horrors he endured under the Cuban government in his autobiography </span><i data-dcnode-id="5959"><span data-dcnode-id="5960" instrument_node="">Antes que anochezca</span></i><span data-dcnode-id="5958" instrument_node=""> (1992), English translation </span><i data-dcnode-id="5956"><span data-dcnode-id="5957" instrument_node="">Before Night Falls</span></i><span data-dcnode-id="5955" instrument_node=""> (1993).</span></li><span data-dcnode-id="5953" instrument_node="">
</span><li data-dcnode-id="5945"><span data-dcnode-id="5952" instrument_node="">On August 28, 1998, a Havana court sentenced </span><a class="new" data-dcnode-id="5950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReynaldo_Alfaro_Garc%25C3%25ADa%26action%3Dedit%26redlink%3D1" title="Reynaldo Alfaro García (page does not exist)"><span data-dcnode-id="5951" instrument_node="">Reynaldo Alfaro García</span></a><span data-dcnode-id="5949" instrument_node="">, a member of the </span><a data-dcnode-id="5947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratic_Solidarity_Party" title="Democratic Solidarity Party"><span data-dcnode-id="5948" instrument_node="">Democratic Solidarity Party</span></a><span data-dcnode-id="5946" instrument_node="">, to three years in prison for "spreading enemy propaganda" and "rumour-mongering".</span></li><span data-dcnode-id="5944" instrument_node="">
</span><li data-dcnode-id="5927"><span data-dcnode-id="5943" instrument_node="">Desi Mendoza, a Cuban doctor, was imprisoned for making statements criticizing Cuba's response to an </span><a data-dcnode-id="5941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epidemic" title="Epidemic"><span data-dcnode-id="5942" instrument_node="">epidemic</span></a><span data-dcnode-id="5940" instrument_node=""> of </span><a data-dcnode-id="5938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dengue_fever" title="Dengue fever"><span data-dcnode-id="5939" instrument_node="">dengue fever</span></a><span data-dcnode-id="5937" instrument_node=""> in </span><a data-dcnode-id="5935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Santiago_de_Cuba" title="Santiago de Cuba"><span data-dcnode-id="5936" instrument_node="">Santiago de Cuba</span></a><span data-dcnode-id="5934" instrument_node=""> which he alleged had caused several deaths. Dr. Mendoza had previously been fired from his job in a Cuban hospital three years earlier for establishing an independent medical association. He was later released due to ill-health, subject to his leaving the country.</span><sup class="reference" data-dcnode-id="5931" id="cite_ref-59"><a data-dcnode-id="5932" href="#cite_note-59"><span data-dcnode-id="5933" instrument_node="">[59]</span></a></sup><sup class="reference" data-dcnode-id="5928" id="cite_ref-60"><a data-dcnode-id="5929" href="#cite_note-60"><span data-dcnode-id="5930" instrument_node="">[60]</span></a></sup></li><span data-dcnode-id="5926" instrument_node="">
</span><li data-dcnode-id="5922"><a data-dcnode-id="5924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2593scar_El%25C3%25ADas_Biscet" title="Óscar Elías Biscet"><span data-dcnode-id="5925" instrument_node="">Óscar Elías Biscet</span></a><span data-dcnode-id="5923" instrument_node="">, a medical doctor, has been sentenced to jail for 25 years for his non-violent, but vocal opposition to Castro.</span></li><span data-dcnode-id="5921" instrument_node="">
</span><li data-dcnode-id="5916"><span data-dcnode-id="5920" instrument_node="">In early 2003, dozens of persons, including independent journalists, librarians and other opponents of the Castro government were jailed after summary </span><a data-dcnode-id="5918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Show_trial" title="Show trial"><span data-dcnode-id="5919" instrument_node="">show trials</span></a><span data-dcnode-id="5917" instrument_node="">, with some sentences in excess of 20 years, on the charge of receiving money from the United States in order to carry out anti-government activities.</span></li><span data-dcnode-id="5915" instrument_node="">
</span><li data-dcnode-id="5901"><span data-dcnode-id="5914" instrument_node="">An </span><a data-dcnode-id="5912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amnesty_International" title="Amnesty International"><span data-dcnode-id="5913" instrument_node="">Amnesty International</span></a><span data-dcnode-id="5911" instrument_node=""> report, </span><a class="external text" data-dcnode-id="5909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20060518055507/http%3A//web.amnesty.org/library/Index/ENGAMR250012006%3Fopen%26of%3DENG-CUB" rel="nofollow"><span data-dcnode-id="5910" instrument_node="">CUBA: fundamental freedoms still under attack</span></a><span data-dcnode-id="5908" instrument_node=""> from </span><a data-dcnode-id="5906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amnesty_International" title="Amnesty International"><span data-dcnode-id="5907" instrument_node="">Amnesty International</span></a><span data-dcnode-id="5905" instrument_node=""> calls for the "Cuban authorities to release all prisoners of conscience immediately and unconditionally" and to "revoke all legislation that restricts freedom of expression, assembly and association, and to put a halt to all actions to harass and intimidate dissidents, journalists, and </span><a data-dcnode-id="5903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_rights_defender" title="Human rights defender"><span data-dcnode-id="5904" instrument_node="">human rights defenders</span></a><span data-dcnode-id="5902" instrument_node="">".</span></li><span data-dcnode-id="5900" instrument_node="">
</span><li data-dcnode-id="5890"><a data-dcnode-id="5898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jorge_Luis_Garc%25C3%25ADa_P%25C3%25A9rez" title="Jorge Luis García Pérez"><span data-dcnode-id="5899" instrument_node="">Jorge Luis García Pérez</span></a><span data-dcnode-id="5897" instrument_node=""> was reported to have been released from prison in April 2007 after serving his full sentence of 17 years and 34 days for having, at the age of 25, shouted slogans against Fidel Castro. García Antúnez was convicted of sabotage after authorities accused him of setting fire to sugar cane fields, sabotage, spreading "enemy propaganda", and being in illegal possession of a weapon.</span><sup class="reference" data-dcnode-id="5894" id="cite_ref-61"><a data-dcnode-id="5895" href="#cite_note-61"><span data-dcnode-id="5896" instrument_node="">[61]</span></a></sup><sup class="reference" data-dcnode-id="5891" id="cite_ref-62"><a data-dcnode-id="5892" href="#cite_note-62"><span data-dcnode-id="5893" instrument_node="">[62]</span></a></sup></li><span data-dcnode-id="5889" instrument_node="">
</span><li data-dcnode-id="5887"><span data-dcnode-id="5888" instrument_node="">Dr. Ariel Ruiz Urquiola, whom Amnesty International had declared "a prisoner of conscience" and demanded that he be released "immediately and without conditions".</span></li><span data-dcnode-id="5886" instrument_node="">
</span><li data-dcnode-id="5869"><span data-dcnode-id="5885" instrument_node="">On September 2, 2020, </span><a data-dcnode-id="5883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Article_19" title="Article 19"><span data-dcnode-id="5884" instrument_node="">Article 19</span></a><span data-dcnode-id="5882" instrument_node="">, </span><a data-dcnode-id="5880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Institute_for_War_and_Peace_Reporting" title="Institute for War and Peace Reporting"><span data-dcnode-id="5881" instrument_node="">Institute for War and Peace Reporting</span></a><span data-dcnode-id="5879" instrument_node=""> and </span><a data-dcnode-id="5877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amnesty_International" title="Amnesty International"><span data-dcnode-id="5878" instrument_node="">Amnesty International</span></a><span data-dcnode-id="5876" instrument_node=""> urged the Cuban government to immediately release </span><a data-dcnode-id="5874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prisoner_of_conscience" title="Prisoner of conscience"><span data-dcnode-id="5875" instrument_node="">prisoner of conscience</span></a><span data-dcnode-id="5873" instrument_node=""> and independent journalist, Roberto Quiñones Haces. Following the trial in August 2019 and he was sentenced to one-year imprisonment for resistance and disobedience concerning his work as an independent journalist.</span><sup class="reference" data-dcnode-id="5870" id="cite_ref-63"><a data-dcnode-id="5871" href="#cite_note-63"><span data-dcnode-id="5872" instrument_node="">[63]</span></a></sup></li></ul><span data-dcnode-id="5867" instrument_node="">
</span><h3 data-dcnode-id="5857"><span class="mw-headline" data-dcnode-id="5865" id="Travel_and_emigration"><span data-dcnode-id="5866" instrument_node="">Travel and emigration</span></span><span class="mw-editsection" data-dcnode-id="5858"><span class="mw-editsection-bracket" data-dcnode-id="5863"><span data-dcnode-id="5864" instrument_node="">[</span></span><a data-dcnode-id="5861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D14" title="Edit section: Travel and emigration"><span data-dcnode-id="5862" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5859"><span data-dcnode-id="5860" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5856" instrument_node="">
</span><p data-dcnode-id="5847"><span data-dcnode-id="5855" instrument_node="">As of January 14, 2013, all Cuban government-imposed travel restrictions and controls have been abolished.</span><sup class="reference" data-dcnode-id="5852" id="cite_ref-64"><a data-dcnode-id="5853" href="#cite_note-64"><span data-dcnode-id="5854" instrument_node="">[64]</span></a></sup><sup class="reference" data-dcnode-id="5849" id="cite_ref-65"><a data-dcnode-id="5850" href="#cite_note-65"><span data-dcnode-id="5851" instrument_node="">[65]</span></a></sup><span data-dcnode-id="5848" instrument_node=""> Since that date, any Cuban citizen, with a valid passport, can leave the country at will, without let or hindrance from the Cuban authorities. Visa requirements for Cuban citizens are administrative entry restrictions by the authorities of other states placed on citizens of Cuba. In 2014, Cuban citizens had visa-free or visa on arrival access to 61 countries and territories, ranking the Cuban passport 69th in the world. Persons holding dual Spanish and Cuban citizenships are now allowed to travel freely, using their Spanish passport in lieu of a visa for countries normally requiring a visa for the Cuban passport. Moreover, ever since that date, the Cuban government extended the allowable time abroad from 11 to 24 months, allowing Cubans who return within the 24-month time frame to retain their status and benefits of "Cuban Resident of the Interior". Should the citizen remain out of Cuba for more than 24 months, then his status would change to "Cuban Resident of the Exterior" and he would lose his privileges within. By this change, there is no longer such a thing as "illegal" or "unauthorized" travel, and therefore persons who leave Cuba via unconventional means (boats etc.) are no longer violating Cuban law, and therefore not subject to detention or imprisonment.
</span></p><p data-dcnode-id="5820"><span data-dcnode-id="5846" instrument_node="">Prior to January 13, 2013, Cuban citizens could not travel abroad, leave or return to Cuba without first obtaining official permission along with applying for a government issued passport and travel visa, which was often denied.</span><sup class="reference" data-dcnode-id="5843" id="cite_ref-travel_66-0"><a data-dcnode-id="5844" href="#cite_note-travel-66"><span data-dcnode-id="5845" instrument_node="">[66]</span></a></sup><span data-dcnode-id="5842" instrument_node=""> Unauthorized travel abroad had sometimes resulted in criminal prosecution. It was common, in those days, that certain citizens who were authorized travel (primarily medical personnel and other professionals deemed essential to the country) were not permitted to take their children with them overseas. In the event that Cuban doctors defect to the United States when they are sent to a "mission" out of Cuba to any foreign country, any children left behind would not be allowed to join their defector parent for a minimum of ten years, even if they had received a foreign visa, and regardless of their age.</span><sup class="reference" data-dcnode-id="5839" id="cite_ref-travel_66-1"><a data-dcnode-id="5840" href="#cite_note-travel-66"><span data-dcnode-id="5841" instrument_node="">[66]</span></a></sup><span data-dcnode-id="5838" instrument_node=""> Castro opposition leader </span><a data-dcnode-id="5836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oswaldo_Pay%25C3%25A1" title="Oswaldo Payá"><span data-dcnode-id="5837" instrument_node="">Oswaldo Payá</span></a><span data-dcnode-id="5835" instrument_node=""> has been allowed to travel abroad to receive his </span><a data-dcnode-id="5833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sakharov_Prize" title="Sakharov Prize"><span data-dcnode-id="5834" instrument_node="">Sakharov Prize</span></a><span data-dcnode-id="5832" instrument_node="">, but </span><a data-dcnode-id="5830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ladies_in_White" title="Ladies in White"><span data-dcnode-id="5831" instrument_node="">Ladies in White</span></a><span data-dcnode-id="5829" instrument_node=""> was not.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5822" style="white-space:nowrap;"><span data-dcnode-id="5828" instrument_node="">[</span><i data-dcnode-id="5824"><a data-dcnode-id="5825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5826" title="This claim needs references to reliable sources. (July 2021)"><span data-dcnode-id="5827" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5823" instrument_node="">]</span></sup><span data-dcnode-id="5821" instrument_node="">
</span></p><p data-dcnode-id="5796"><span data-dcnode-id="5819" instrument_node="">From 1959 through 1993, some 1.2 million Cubans (about 10% of the current population) left the island for the United States,</span><sup class="reference" data-dcnode-id="5816" id="cite_ref-census.gov_33-1"><a data-dcnode-id="5817" href="#cite_note-census.gov-33"><span data-dcnode-id="5818" instrument_node="">[33]</span></a></sup><span data-dcnode-id="5815" instrument_node=""> often by sea in small boats and fragile rafts. In the early years, a number of those who could claim dual Spanish-Cuban citizenship left for </span><a data-dcnode-id="5813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spain" title="Spain"><span data-dcnode-id="5814" instrument_node="">Spain</span></a><span data-dcnode-id="5812" instrument_node="">. Over time a number of </span><a class="mw-redirect" data-dcnode-id="5810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuban_Jews" title="Cuban Jews"><span data-dcnode-id="5811" instrument_node="">Cuban Jews</span></a><span data-dcnode-id="5809" instrument_node=""> were allowed to emigrate to </span><a data-dcnode-id="5807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israel" title="Israel"><span data-dcnode-id="5808" instrument_node="">Israel</span></a><span data-dcnode-id="5806" instrument_node=""> after quiet negotiations; the majority of the 10,000 or so Jews who were in Cuba in 1959 have left. Since the collapse of the Soviet Union, many Cubans now reside in a diverse number of countries, some ending up in countries of the </span><a data-dcnode-id="5804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="5805" instrument_node="">European Union</span></a><span data-dcnode-id="5803" instrument_node="">. A large number of Cubans live in </span><a data-dcnode-id="5801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mexico" title="Mexico"><span data-dcnode-id="5802" instrument_node="">Mexico</span></a><span data-dcnode-id="5800" instrument_node=""> and </span><a data-dcnode-id="5798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canada" title="Canada"><span data-dcnode-id="5799" instrument_node="">Canada</span></a><span data-dcnode-id="5797" instrument_node="">.
</span></p><p data-dcnode-id="5780"><span data-dcnode-id="5795" instrument_node="">At times the exodus was tolerated by the Cuban government as a "release valve"; at other times the government has impeded it. Some Cubans left for economic reasons and some for political ones. Others emigrated by way of the </span><a data-dcnode-id="5793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Navy" title="United States Navy"><span data-dcnode-id="5794" instrument_node="">U.S. Naval Base</span></a><span data-dcnode-id="5792" instrument_node=""> at </span><a data-dcnode-id="5790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guantanamo_Bay_Naval_Base" title="Guantanamo Bay Naval Base"><span data-dcnode-id="5791" instrument_node="">Guantanamo Bay</span></a><span data-dcnode-id="5789" instrument_node="">, which is blocked on the Cuban (land) side by barbed-wired fences and land mines.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5782" style="white-space:nowrap;"><span data-dcnode-id="5788" instrument_node="">[</span><i data-dcnode-id="5784"><a data-dcnode-id="5785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5786" title="This claim needs references to reliable sources. (July 2021)"><span data-dcnode-id="5787" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5783" instrument_node="">]</span></sup><span data-dcnode-id="5781" instrument_node="">
</span></p><p data-dcnode-id="5764"><span data-dcnode-id="5779" instrument_node="">In 1995 the US government entered into an agreement with the Cuban government to resolve the emigration crisis that created the </span><a class="mw-redirect" data-dcnode-id="5777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mariel_Boatlift" title="Mariel Boatlift"><span data-dcnode-id="5778" instrument_node="">Mariel Boatlift</span></a><span data-dcnode-id="5776" instrument_node=""> of 1980, when Castro opened the docks to anyone who wanted to leave. The result of the negotiations was an agreement under which the United States was required to issue 20,000 visas annually to Cuban emigrants. This quota is rarely filled; the </span><a class="mw-redirect" data-dcnode-id="5774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_W._Bush_administration" title="George W. Bush administration"><span data-dcnode-id="5775" instrument_node="">Bush administration</span></a><span data-dcnode-id="5773" instrument_node=""> refused to comply with the act, issuing only 505 visas to Cubans in the first six months of 2003. It also blocked some Cubans who have visas.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5766" style="white-space:nowrap;"><span data-dcnode-id="5772" instrument_node="">[</span><i data-dcnode-id="5768"><a data-dcnode-id="5769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5770" title="This claim needs references to reliable sources. (July 2021)"><span data-dcnode-id="5771" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5767" instrument_node="">]</span></sup><span data-dcnode-id="5765" instrument_node="">
</span></p><p data-dcnode-id="5744"><span data-dcnode-id="5763" instrument_node="">On July 13, 1994, 72 Cubans attempted to leave the Island on a </span><a data-dcnode-id="5761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="5762" instrument_node="">World War II</span></a><span data-dcnode-id="5760" instrument_node=""> era </span><a data-dcnode-id="5758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tugboat" title="Tugboat"><span data-dcnode-id="5759" instrument_node="">tugboat</span></a><span data-dcnode-id="5757" instrument_node=""> named the </span><i data-dcnode-id="5754"><a class="mw-redirect" data-dcnode-id="5755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/13_de_Marzo_Incident" title="13 de Marzo Incident"><span data-dcnode-id="5756" instrument_node="">13 de Marzo</span></a></i><span data-dcnode-id="5753" instrument_node="">. In an attempt by the Cuban Navy to stop the tugboat, patrol boats were sent out to intercept the tug. Crewmen and survivors reported that the interception vessels rammed the tugboat and sprayed its passengers with high-pressure fire hoses, sweeping many overboard.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5746" style="white-space:nowrap;"><span data-dcnode-id="5752" instrument_node="">[</span><i data-dcnode-id="5748"><a data-dcnode-id="5749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5750" title="This claim needs references to reliable sources. (July 2021)"><span data-dcnode-id="5751" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5747" instrument_node="">]</span></sup><span data-dcnode-id="5745" instrument_node="">
</span></p><p data-dcnode-id="5738"><span data-dcnode-id="5743" instrument_node="">The US Coast Guard reported that the interceptions in high seas have been characterized as violent confrontations with authorities and by the deaths of immigrants. According to the same authorities, the Cubans are taken to the US on speed boats by a network of criminals specialized in human trafficking, former drug traffickers, based in southern Florida which now find contraband of humans more lucrative than drugs. These criminals charge 8 to 12 thousand dollars per person, overcrowding the small vessels. The majority of those that attempt to emigrate are individuals that have relatives in the United States, others who do not qualify to be considered as legal immigrants in the US, or those who do not want to wait their turn in the annual quota, assigned under the migratory treaties for legal immigrants </span><sup class="reference" data-dcnode-id="5740" id="cite_ref-Gomez_67-0"><a data-dcnode-id="5741" href="#cite_note-Gomez-67"><span data-dcnode-id="5742" instrument_node="">[67]</span></a></sup><span data-dcnode-id="5739" instrument_node="">
</span></p><p data-dcnode-id="5725"><span data-dcnode-id="5737" instrument_node="">Since November 1966, the </span><a data-dcnode-id="5735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuban_Adjustment_Act" title="Cuban Adjustment Act"><span data-dcnode-id="5736" instrument_node="">Cuban Adjustment Act</span></a><span data-dcnode-id="5734" instrument_node=""> provides automatic permanent residency for almost all Cubans arriving legally or illegally after one year and one day in the US. No immigrant from any other nation has this privilege. Controversy over this policy centers around the loss of Cuba's scientists, professionals, technicians and other skilled individuals, but it has also prompted concerns of a migratory crisis.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5727" style="white-space:nowrap;"><span data-dcnode-id="5733" instrument_node="">[</span><i data-dcnode-id="5729"><a data-dcnode-id="5730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5731" title="This claim needs references to reliable sources. (July 2021)"><span data-dcnode-id="5732" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5728" instrument_node="">]</span></sup><span data-dcnode-id="5726" instrument_node="">
</span></p><p data-dcnode-id="5715"><span data-dcnode-id="5724" instrument_node="">At the end of the 2005 fiscal year which ended September 30, the US Coast Guard Service reported having intercepted 2,712 Cubans at sea, more than double the 1,225 reported in 2004</span><sup class="reference" data-dcnode-id="5721" id="cite_ref-Gomez_67-1"><a data-dcnode-id="5722" href="#cite_note-Gomez-67"><span data-dcnode-id="5723" instrument_node="">[67]</span></a></sup><span data-dcnode-id="5720" instrument_node=""> The figure for 2005 is the third highest of Cubans intercepted in the Florida straights during the last 12 years. The highest had been reported in 1993 with 3,656 and 1994 when over 30,000 Cubans emigrated illegally due to the so-called migratory crisis between the two countries.</span><sup class="reference" data-dcnode-id="5717" id="cite_ref-Gomez_67-2"><a data-dcnode-id="5718" href="#cite_note-Gomez-67"><span data-dcnode-id="5719" instrument_node="">[67]</span></a></sup><span data-dcnode-id="5716" instrument_node="">
</span></p><p data-dcnode-id="5705"><span data-dcnode-id="5714" instrument_node="">The 1994 and 1995 migratory accords signed between Havana and Washington, and which emerged due to the crisis in August 1994, are still in effect. These accords force the US to return all those intercepted at sea by US authorities to Cuba, except the cases in which political persecution can be proven to justify exile in the United States.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5707" style="white-space:nowrap;"><span data-dcnode-id="5713" instrument_node="">[</span><i data-dcnode-id="5709"><a data-dcnode-id="5710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5711" title="This claim needs references to reliable sources. (July 2021)"><span data-dcnode-id="5712" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5708" instrument_node="">]</span></sup><span data-dcnode-id="5706" instrument_node="">
</span></p><p data-dcnode-id="5691"><span data-dcnode-id="5704" instrument_node="">The accords were designed to discourage those who would consider emigrating illegally by sea but the Bush administration has not complied with Washington's part of the agreements.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5697" style="white-space:nowrap;"><span data-dcnode-id="5703" instrument_node="">[</span><i data-dcnode-id="5699"><a data-dcnode-id="5700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5701" title="This claim needs references to reliable sources. (March 2012)"><span data-dcnode-id="5702" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5698" instrument_node="">]</span></sup><span data-dcnode-id="5696" instrument_node=""> Although the Coast Guard says that only 2.5 percent of the Cubans intercepted are granted political asylum, the public understanding, the public perception in Cuba and among the Cuban community in Miami, is not the same. And since that is not the perception, more and more people continue to illegally leave the island by sea causing fatal consequences. According to studies carried out by Cuban experts on the island, it is estimated that at least 15 percent of those that attempt to cross the sea die before reaching the US.</span><sup class="reference" data-dcnode-id="5693" id="cite_ref-Gomez_67-3"><a data-dcnode-id="5694" href="#cite_note-Gomez-67"><span data-dcnode-id="5695" instrument_node="">[67]</span></a></sup><span data-dcnode-id="5692" instrument_node="">
</span></p><p data-dcnode-id="5682"><span data-dcnode-id="5690" instrument_node="">However, figures of those fleeing other Latin American or Caribbean countries of origin compare similarly with those of Cuba. During the 2005 fiscal year, 3,612 Dominicans were picked up at high seas attempting to illegally reach the US (900 more than Cubans intercepted) and in 2004, 3,229 Haitians were also picked up (2,000 more than the 1,225 Cubans that fiscal year). The Brazilian daily </span><i data-dcnode-id="5688"><span data-dcnode-id="5689" instrument_node="">O Globo</span></i><span data-dcnode-id="5687" instrument_node=""> published an article on illegal immigrants in the US, quoting official sources, pointing out that during the first semester of 2005, 27,396 Brazilians were stopped from illegally crossing US borders, an average of 4,556 per month and 152 a day. In 2004, a total of 1,160,000 foreigners, were stopped when attempting to illegally enter the US, 93 percent of them (close to 1,080,000) were Mexicans.</span><sup class="reference" data-dcnode-id="5684" id="cite_ref-Gomez_67-4"><a data-dcnode-id="5685" href="#cite_note-Gomez-67"><span data-dcnode-id="5686" instrument_node="">[67]</span></a></sup><span data-dcnode-id="5683" instrument_node="">
</span></p><span data-dcnode-id="5681" instrument_node="">
</span><h3 data-dcnode-id="5671"><span class="mw-headline" data-dcnode-id="5679" id="Education"><span data-dcnode-id="5680" instrument_node="">Education</span></span><span class="mw-editsection" data-dcnode-id="5672"><span class="mw-editsection-bracket" data-dcnode-id="5677"><span data-dcnode-id="5678" instrument_node="">[</span></span><a data-dcnode-id="5675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D15" title="Edit section: Education"><span data-dcnode-id="5676" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5673"><span data-dcnode-id="5674" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5670" instrument_node="">
</span><link data-dcnode-id="5669" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5665" role="note"><span data-dcnode-id="5668" instrument_node="">Main article: </span><a data-dcnode-id="5666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Education_in_Cuba" title="Education in Cuba"><span data-dcnode-id="5667" instrument_node="">Education in Cuba</span></a></div><span data-dcnode-id="5664" instrument_node="">
</span><p data-dcnode-id="5662"><span data-dcnode-id="5663" instrument_node="">Education in Cuba is free at all levels and led by the Ministry for Education. In 1961 the government nationalized all private educational institutions and introduced a state-directed education system.
</span></p><span data-dcnode-id="5661" instrument_node="">
</span><h3 data-dcnode-id="5651"><span class="mw-headline" data-dcnode-id="5659" id="Healthcare"><span data-dcnode-id="5660" instrument_node="">Healthcare</span></span><span class="mw-editsection" data-dcnode-id="5652"><span class="mw-editsection-bracket" data-dcnode-id="5657"><span data-dcnode-id="5658" instrument_node="">[</span></span><a data-dcnode-id="5655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D16" title="Edit section: Healthcare"><span data-dcnode-id="5656" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5653"><span data-dcnode-id="5654" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5650" instrument_node="">
</span><link data-dcnode-id="5649" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5645" role="note"><span data-dcnode-id="5648" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="5646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Healthcare_of_Cuba" title="Healthcare of Cuba"><span data-dcnode-id="5647" instrument_node="">Healthcare of Cuba</span></a></div><span data-dcnode-id="5644" instrument_node="">
</span><p data-dcnode-id="5639"><span data-dcnode-id="5643" instrument_node="">The Cuban government operates on national health system and assumes full fiscal and administrative responsibility for the health care of its citizens. The government prohibits any private alternatives to the national health system. In 1976, Cuba's healthcare program was enshrined in Article 50 of the revised constitution which states, "Everyone has the </span><a data-dcnode-id="5641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right_to_health" title="Right to health"><span data-dcnode-id="5642" instrument_node="">right to health</span></a><span data-dcnode-id="5640" instrument_node=""> protection and care". Healthcare in Cuba is also free.
</span></p><p data-dcnode-id="5613"><span data-dcnode-id="5638" instrument_node="">However, there is no right to privacy, or a patient's informed consent, or the right to protest or sue a doctor or clinic for malpractice.</span><sup class="reference" data-dcnode-id="5635" id="cite_ref-Hirschfeld_68-0"><a data-dcnode-id="5636" href="#cite_note-Hirschfeld-68"><span data-dcnode-id="5637" instrument_node="">[68]</span></a></sup><sup class="reference" data-dcnode-id="5632" id="cite_ref-Hirschfeld-since1898_69-0"><a data-dcnode-id="5633" href="#cite_note-Hirschfeld-since1898-69"><span data-dcnode-id="5634" instrument_node="">[69]</span></a></sup><span data-dcnode-id="5631" instrument_node=""> Moreover, the patient does not have right to refuse treatment (for example, a </span><a class="mw-redirect" data-dcnode-id="5629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rastafarian" title="Rastafarian"><span data-dcnode-id="5630" instrument_node="">Rastafarian</span></a><span data-dcnode-id="5628" instrument_node=""> cannot refuse an </span><a data-dcnode-id="5626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amputation" title="Amputation"><span data-dcnode-id="5627" instrument_node="">amputation</span></a><span data-dcnode-id="5625" instrument_node=""> on grounds that his religion forbids it.)</span><sup class="reference" data-dcnode-id="5622" id="cite_ref-Hirschfeld_68-1"><a data-dcnode-id="5623" href="#cite_note-Hirschfeld-68"><span data-dcnode-id="5624" instrument_node="">[68]</span></a></sup><sup class="reference" data-dcnode-id="5619" id="cite_ref-Hirschfeld-since1898_69-1"><a data-dcnode-id="5620" href="#cite_note-Hirschfeld-since1898-69"><span data-dcnode-id="5621" instrument_node="">[69]</span></a></sup><span data-dcnode-id="5618" instrument_node=""> Many Cubans complain about politics in medical treatment and health care decision-making.</span><sup class="reference" data-dcnode-id="5615" id="cite_ref-Hirschfeld_68-2"><a data-dcnode-id="5616" href="#cite_note-Hirschfeld-68"><span data-dcnode-id="5617" instrument_node="">[68]</span></a></sup><span data-dcnode-id="5614" instrument_node="">
</span></p><p data-dcnode-id="5595"><span data-dcnode-id="5612" instrument_node="">After spending nine months in Cuban clinics, right-wing anthropologist Katherine Hirschfeld wrote "My increased awareness of Cuba's criminalization of dissent raised a very provocative question: to what extent is the favorable international image of the Cuban health care system maintained by the state's practice of suppressing dissent and covertly intimidating or imprisoning would-be critics?"</span><sup class="reference" data-dcnode-id="5609" id="cite_ref-Hirschfeld_68-3"><a data-dcnode-id="5610" href="#cite_note-Hirschfeld-68"><span data-dcnode-id="5611" instrument_node="">[68]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="5597" style="white-space:nowrap;"><span data-dcnode-id="5608" instrument_node="">[</span><i data-dcnode-id="5599"><a data-dcnode-id="5605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANeutral_point_of_view%23Due_and_undue_weight" title="Wikipedia:Neutral point of view"><span data-dcnode-id="5606" title="The material near this tag may be giving undue weight to a viewpoint or idea. (April 2022)"><span data-dcnode-id="5607" instrument_node="">undue weight?</span></span></a><span data-dcnode-id="5604" instrument_node=""> </span><span class="metadata" data-dcnode-id="5600"><span data-dcnode-id="5603" instrument_node=""> – </span><a data-dcnode-id="5601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talk%3AHuman_rights_in_Cuba%23undue" title="Talk:Human rights in Cuba"><span data-dcnode-id="5602" instrument_node="">discuss</span></a></span></i><span data-dcnode-id="5598" instrument_node="">]</span></sup><span data-dcnode-id="5596" instrument_node="">
</span></p><p data-dcnode-id="5585"><span data-dcnode-id="5594" instrument_node="">Family doctors are expected to keep records of their patients' "political integration."</span><sup class="reference" data-dcnode-id="5591" id="cite_ref-Hirschfeld-since1898_69-2"><a data-dcnode-id="5592" href="#cite_note-Hirschfeld-since1898-69"><span data-dcnode-id="5593" instrument_node="">[69]</span></a></sup><span data-dcnode-id="5590" instrument_node=""> Epidemiological surveillance has become juxtaposed with political surveillance.</span><sup class="reference" data-dcnode-id="5587" id="cite_ref-Hirschfeld-since1898_69-3"><a data-dcnode-id="5588" href="#cite_note-Hirschfeld-since1898-69"><span data-dcnode-id="5589" instrument_node="">[69]</span></a></sup><span data-dcnode-id="5586" instrument_node="">
</span></p><span data-dcnode-id="5584" instrument_node="">
</span><h3 data-dcnode-id="5574"><span class="mw-headline" data-dcnode-id="5582" id="Religious_freedom"><span data-dcnode-id="5583" instrument_node="">Religious freedom</span></span><span class="mw-editsection" data-dcnode-id="5575"><span class="mw-editsection-bracket" data-dcnode-id="5580"><span data-dcnode-id="5581" instrument_node="">[</span></span><a data-dcnode-id="5578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Cuba%26action%3Dedit%26section%3D17" title="Edit section: Religious freedom"><span data-dcnode-id="5579" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5576"><span data-dcnode-id="5577" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5573" instrument_node="">
</span><link data-dcnode-id="5572" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5568" role="note"><span data-dcnode-id="5571" instrument_node="">Main article: </span><a data-dcnode-id="5569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Religion_in_Cuba" title="Religion in Cuba"><span data-dcnode-id="5570" instrument_node="">Religion in Cuba</span></a></div><span data-dcnode-id="5567" instrument_node="">
