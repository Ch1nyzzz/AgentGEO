</span><h2 data-dcnode-id="4360"><span class="mw-headline" data-dcnode-id="4368" id="Human_rights_concerns"><span data-dcnode-id="4369" instrument_node="">Human rights concerns</span></span><span class="mw-editsection" data-dcnode-id="4361"><span class="mw-editsection-bracket" data-dcnode-id="4366"><span data-dcnode-id="4367" instrument_node="">[</span></span><a data-dcnode-id="4364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Tanzania%26action%3Dedit%26section%3D1" title="Edit section: Human rights concerns"><span data-dcnode-id="4365" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4362"><span data-dcnode-id="4363" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4359" instrument_node="">
</span><p data-dcnode-id="4354"><span data-dcnode-id="4358" instrument_node="">The </span><a data-dcnode-id="4356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Human_Rights_Council" title="United Nations Human Rights Council"><span data-dcnode-id="4357" instrument_node="">United Nations Human Rights Council</span></a><span data-dcnode-id="4355" instrument_node=""> in October 2011 at its meeting in Geneva completed a Universal Periodic Review (UPR) of the human rights situation in Tanzania. At this UPR, the United Nations Country Team (UNCT) and several countries addressed various problems in Tanzania.
</span></p><span data-dcnode-id="4353" instrument_node="">
</span><h3 data-dcnode-id="4343"><span class="mw-headline" data-dcnode-id="4351" id="Gender_equality"><span data-dcnode-id="4352" instrument_node="">Gender equality</span></span><span class="mw-editsection" data-dcnode-id="4344"><span class="mw-editsection-bracket" data-dcnode-id="4349"><span data-dcnode-id="4350" instrument_node="">[</span></span><a data-dcnode-id="4347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Tanzania%26action%3Dedit%26section%3D2" title="Edit section: Gender equality"><span data-dcnode-id="4348" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4345"><span data-dcnode-id="4346" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4342" instrument_node="">
</span><p data-dcnode-id="4340"><span data-dcnode-id="4341" instrument_node="">The UNCT said,
</span></p><span data-dcnode-id="4339" instrument_node="">
</span><blockquote data-dcnode-id="4330"><p data-dcnode-id="4331"><span data-dcnode-id="4338" instrument_node="">National reviews and assessments of equality between men and women ... have identified a range of challenges ..., which continue to prevail. These include the persistent and increasing burden of poverty on women; inequalities in arrangements for productive activities and access to resources; inequalities in the sharing of power and decision-making; lack of respect for and inadequate promotion and protection of the human rights of women; and inequalities in managing natural resources and safeguarding the environment. ... Particular attention should be drawn to the widespread marginalization of the girl child in different spheres of life, including education, and the total exclusion caused for many by early and forced marriage. ... Gender-based violence is prevalent. According to a 2005 World Health Organization survey, 41 percent of ever-partnered women in Dar es Salaam have experienced physical or sexual violence at the hands of a partner.</span><sup class="reference" data-dcnode-id="4335" id="cite_ref-UNCT_3-0"><a data-dcnode-id="4336" href="#cite_note-UNCT-3"><span data-dcnode-id="4337" instrument_node="">[3]</span></a></sup><sup class="reference nowrap" data-dcnode-id="4332"><span data-dcnode-id="4333" title="Page / location: ¶¶ 24–6, page 6"><span data-dcnode-id="4334" instrument_node="">: ¶¶ 24–6, page 6 </span></span></sup></p></blockquote><span data-dcnode-id="4329" instrument_node="">
</span><p data-dcnode-id="4313"><span data-dcnode-id="4328" instrument_node="">Tanzania expressed support for Denmark's recommendation to, "Put in place a comprehensive strategy and effective legislation to eliminate practices that discriminate against women...</span><sup class="reference" data-dcnode-id="4325" id="cite_ref-Response_4-0"><a data-dcnode-id="4326" href="#cite_note-Response-4"><span data-dcnode-id="4327" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="4322"><span data-dcnode-id="4323" title="Page / location: ¶ 85.22, page 14"><span data-dcnode-id="4324" instrument_node="">: ¶ 85.22, page 14 </span></span></sup><span data-dcnode-id="4321" instrument_node=""> Tanzania also supported Ghana's recommendation to, "Put in place a comprehensive strategy ... to modify or eliminate cultural practices and stereotypes that discriminate against women...</span><sup class="reference" data-dcnode-id="4318" id="cite_ref-Response_4-1"><a data-dcnode-id="4319" href="#cite_note-Response-4"><span data-dcnode-id="4320" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="4315"><span data-dcnode-id="4316" title="Page / location: ¶ 85.23, page 14"><span data-dcnode-id="4317" instrument_node="">: ¶ 85.23, page 14 </span></span></sup><span data-dcnode-id="4314" instrument_node="">
</span></p><span data-dcnode-id="4312" instrument_node="">
</span><h3 data-dcnode-id="4302"><span class="mw-headline" data-dcnode-id="4310" id="Indigenous_peoples"><span data-dcnode-id="4311" instrument_node="">Indigenous peoples</span></span><span class="mw-editsection" data-dcnode-id="4303"><span class="mw-editsection-bracket" data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node="">[</span></span><a data-dcnode-id="4306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Tanzania%26action%3Dedit%26section%3D3" title="Edit section: Indigenous peoples"><span data-dcnode-id="4307" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4304"><span data-dcnode-id="4305" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4301" instrument_node="">
</span><p data-dcnode-id="4299"><span data-dcnode-id="4300" instrument_node="">The UNCT said,
</span></p><span data-dcnode-id="4298" instrument_node="">
</span><blockquote data-dcnode-id="4289"><p data-dcnode-id="4290"><span data-dcnode-id="4297" instrument_node="">The rights of indigenous peoples to access ancestral lands have been denied or limited for economic exploitation, in particular in game reserves. ... [T]he Government would be urged to reconsider its policy by which the notion of indigenous peoples is unrecognized and to take steps to ensure their right to practice their own culture in parity with the majority population. The Government should also consider developing human rights-based standard operating procedures for evictions, clearly setting it out as a matter of last resort to resolve disputes over land use between public interests, private investors, and pastoralists.</span><sup class="reference" data-dcnode-id="4294" id="cite_ref-UNCT_3-1"><a data-dcnode-id="4295" href="#cite_note-UNCT-3"><span data-dcnode-id="4296" instrument_node="">[3]</span></a></sup><sup class="reference nowrap" data-dcnode-id="4291"><span data-dcnode-id="4292" title="Page / location: ¶ 23, page 6"><span data-dcnode-id="4293" instrument_node="">: ¶ 23, page 6 </span></span></sup></p></blockquote><span data-dcnode-id="4288" instrument_node="">
</span><p data-dcnode-id="4269"><span data-dcnode-id="4287" instrument_node="">During the UPR, Finland noted the forceful and unlawful evictions of indigenous people. It also asked Tanzania about its actions to implement the recommendations of the </span><a data-dcnode-id="4285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_special_rapporteur" title="United Nations special rapporteur"><span data-dcnode-id="4286" instrument_node="">Special Rapporteur</span></a><span data-dcnode-id="4284" instrument_node=""> on the rights of indigenous peoples and whether the government would take legislative measures to effectively protect the rights of indigenous peoples.</span><sup class="reference" data-dcnode-id="4281" id="cite_ref-Response_4-2"><a data-dcnode-id="4282" href="#cite_note-Response-4"><span data-dcnode-id="4283" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="4278"><span data-dcnode-id="4279" title="Page / location: ¶ 36, page 7"><span data-dcnode-id="4280" instrument_node="">: ¶ 36, page 7 </span></span></sup><span data-dcnode-id="4277" instrument_node=""> Denmark was concerned by the denial or curtailing of indigenous people's rights to ancestral lands, resulting in numerous forced evictions.</span><sup class="reference" data-dcnode-id="4274" id="cite_ref-Response_4-3"><a data-dcnode-id="4275" href="#cite_note-Response-4"><span data-dcnode-id="4276" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="4271"><span data-dcnode-id="4272" title="Page / location: ¶ 61, page 10"><span data-dcnode-id="4273" instrument_node="">: ¶ 61, page 10 </span></span></sup><span data-dcnode-id="4270" instrument_node="">
</span></p><span data-dcnode-id="4268" instrument_node="">
</span><h3 data-dcnode-id="4258"><span class="mw-headline" data-dcnode-id="4266" id="Same-sex_relations"><span data-dcnode-id="4267" instrument_node="">Same-sex relations</span></span><span class="mw-editsection" data-dcnode-id="4259"><span class="mw-editsection-bracket" data-dcnode-id="4264"><span data-dcnode-id="4265" instrument_node="">[</span></span><a data-dcnode-id="4262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Tanzania%26action%3Dedit%26section%3D4" title="Edit section: Same-sex relations"><span data-dcnode-id="4263" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4260"><span data-dcnode-id="4261" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4257" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="4251" role="note"><span data-dcnode-id="4254" instrument_node="">Main article: </span><a data-dcnode-id="4252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/LGBT_rights_in_Tanzania" title="LGBT rights in Tanzania"><span data-dcnode-id="4253" instrument_node="">LGBT rights in Tanzania</span></a></div><span data-dcnode-id="4250" instrument_node="">
</span><p data-dcnode-id="4248"><span data-dcnode-id="4249" instrument_node="">The UNCT said,
</span></p><span data-dcnode-id="4247" instrument_node="">
</span><blockquote data-dcnode-id="4238"><p data-dcnode-id="4239"><span data-dcnode-id="4246" instrument_node="">Homosexuality is considered contrary to cultural norms; same-sex sexual relations are criminalized. Group arrests in connection to peaceful assemblies, non-attendance to HIV patients, as well as forcible evictions of persons due to their sexual orientation by local and religious communities have been reported. Moreover, representatives of the groups and other human rights defenders may not be willing to make public statements in favor of tolerance and decriminalization for fear of reprisals. The Government is urged to take a proactive stance ... and repeal any criminal provision against persons based on their sexual orientation.</span><sup class="reference" data-dcnode-id="4243" id="cite_ref-UNCT_3-2"><a data-dcnode-id="4244" href="#cite_note-UNCT-3"><span data-dcnode-id="4245" instrument_node="">[3]</span></a></sup><sup class="reference nowrap" data-dcnode-id="4240"><span data-dcnode-id="4241" title="Page / location: ¶ 27, page 7"><span data-dcnode-id="4242" instrument_node="">: ¶ 27, page 7 </span></span></sup></p></blockquote><span data-dcnode-id="4237" instrument_node="">
</span><p data-dcnode-id="4221"><span data-dcnode-id="4236" instrument_node="">During the UPR, Sweden noted that the "criminalization of sexual minorities contributed to the stigmatization and vulnerability of lesbian, gay, bisexual and transgender persons".</span><sup class="reference" data-dcnode-id="4233" id="cite_ref-Response_4-4"><a data-dcnode-id="4234" href="#cite_note-Response-4"><span data-dcnode-id="4235" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="4230"><span data-dcnode-id="4231" title="Page / location: ¶ 50, page 9"><span data-dcnode-id="4232" instrument_node="">: ¶ 50, page 9 </span></span></sup><span data-dcnode-id="4229" instrument_node=""> Slovenia expressed concern that consensual same-sex sexual acts remained criminalized.</span><sup class="reference" data-dcnode-id="4226" id="cite_ref-Response_4-5"><a data-dcnode-id="4227" href="#cite_note-Response-4"><span data-dcnode-id="4228" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="4223"><span data-dcnode-id="4224" title="Page / location: ¶ 53, page 9"><span data-dcnode-id="4225" instrument_node="">: ¶ 53, page 9 </span></span></sup><span data-dcnode-id="4222" instrument_node="">
</span></p><span data-dcnode-id="4220" instrument_node="">
</span><h3 data-dcnode-id="4210"><span class="mw-headline" data-dcnode-id="4218" id="Workplace_discrimination"><span data-dcnode-id="4219" instrument_node="">Workplace discrimination</span></span><span class="mw-editsection" data-dcnode-id="4211"><span class="mw-editsection-bracket" data-dcnode-id="4216"><span data-dcnode-id="4217" instrument_node="">[</span></span><a data-dcnode-id="4214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Tanzania%26action%3Dedit%26section%3D5" title="Edit section: Workplace discrimination"><span data-dcnode-id="4215" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4212"><span data-dcnode-id="4213" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4209" instrument_node="">
</span><p data-dcnode-id="4207"><span data-dcnode-id="4208" instrument_node="">The UNCT said,
</span></p><span data-dcnode-id="4206" instrument_node="">
</span><blockquote data-dcnode-id="4197"><p data-dcnode-id="4198"><span data-dcnode-id="4205" instrument_node="">Although the Convention on Equal Remuneration ... and the Convention on Discrimination in Employment and Occupation ... have been ratified and domestic laws to their effect have been introduced, the Government has yet to elaborate measures to address wage discrimination and disparities between job values in the private and public sectors. ... [D]espite the Government has put in place the HIV/AIDS (Prevention and Control) Act 2008 and the Employment and Labour Relations (Code of Good Practice) Rules 2007, HIV/AIDS-related discrimination remains institutionalized in the workplace in both the public and private spheres.</span><sup class="reference" data-dcnode-id="4202" id="cite_ref-UNCT_3-3"><a data-dcnode-id="4203" href="#cite_note-UNCT-3"><span data-dcnode-id="4204" instrument_node="">[3]</span></a></sup><sup class="reference nowrap" data-dcnode-id="4199"><span data-dcnode-id="4200" title="Page / location: ¶ 28, page 7"><span data-dcnode-id="4201" instrument_node="">: ¶ 28, page 7 </span></span></sup></p></blockquote><span data-dcnode-id="4196" instrument_node="">
</span><h3 data-dcnode-id="4186"><span class="mw-headline" data-dcnode-id="4194" id="Commercial_sex_workers"><span data-dcnode-id="4195" instrument_node="">Commercial sex workers</span></span><span class="mw-editsection" data-dcnode-id="4187"><span class="mw-editsection-bracket" data-dcnode-id="4192"><span data-dcnode-id="4193" instrument_node="">[</span></span><a data-dcnode-id="4190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Tanzania%26action%3Dedit%26section%3D6" title="Edit section: Commercial sex workers"><span data-dcnode-id="4191" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4188"><span data-dcnode-id="4189" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4185" instrument_node="">
</span><p data-dcnode-id="4183"><span data-dcnode-id="4184" instrument_node="">The UNCT said,
</span></p><span data-dcnode-id="4182" instrument_node="">
</span><blockquote data-dcnode-id="4173"><p data-dcnode-id="4174"><span data-dcnode-id="4181" instrument_node="">Commercial sex workers are another group at risk of social exclusion and harsh treatment by law enforcement. Considered as an offense under applicable criminal law, commercial sex continues to fuel harassment and abuse. The Government is encouraged to study the effects of the arrests of these workers, the majority of whom are women.</span><sup class="reference" data-dcnode-id="4178" id="cite_ref-UNCT_3-4"><a data-dcnode-id="4179" href="#cite_note-UNCT-3"><span data-dcnode-id="4180" instrument_node="">[3]</span></a></sup><sup class="reference nowrap" data-dcnode-id="4175"><span data-dcnode-id="4176" title="Page / location: ¶ 29, page 7"><span data-dcnode-id="4177" instrument_node="">: ¶ 29, page 7 </span></span></sup></p></blockquote><span data-dcnode-id="4172" instrument_node="">
</span><h3 data-dcnode-id="4162"><span class="mw-headline" data-dcnode-id="4170" id="Albinism"><span data-dcnode-id="4171" instrument_node="">Albinism</span></span><span class="mw-editsection" data-dcnode-id="4163"><span class="mw-editsection-bracket" data-dcnode-id="4168"><span data-dcnode-id="4169" instrument_node="">[</span></span><a data-dcnode-id="4166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Tanzania%26action%3Dedit%26section%3D7" title="Edit section: Albinism"><span data-dcnode-id="4167" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4161" instrument_node="">
</span><link data-dcnode-id="4160" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4156" role="note"><span data-dcnode-id="4159" instrument_node="">Main article: </span><a data-dcnode-id="4157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persecution_of_people_with_albinism" title="Persecution of people with albinism"><span data-dcnode-id="4158" instrument_node="">Persecution of people with albinism</span></a></div><span data-dcnode-id="4155" instrument_node="">
</span><p data-dcnode-id="4131"><span data-dcnode-id="4154" instrument_node="">The killing and mutilation of people that suffer from </span><a data-dcnode-id="4152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albinism" title="Albinism"><span data-dcnode-id="4153" instrument_node="">albinism</span></a><span data-dcnode-id="4151" instrument_node=""> continue. Some </span><a class="mw-redirect" data-dcnode-id="4149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Witch_doctors" title="Witch doctors"><span data-dcnode-id="4150" instrument_node="">witch doctors</span></a><span data-dcnode-id="4148" instrument_node=""> believe the </span><a data-dcnode-id="4146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Witchcraft" title="Witchcraft"><span data-dcnode-id="4147" instrument_node="">witchcraft</span></a><span data-dcnode-id="4145" instrument_node=""> to be more powerful if the victim screams during an </span><a data-dcnode-id="4143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amputation" title="Amputation"><span data-dcnode-id="4144" instrument_node="">amputation</span></a><span data-dcnode-id="4142" instrument_node="">. </span><a data-dcnode-id="4140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Navi_Pillay" title="Navi Pillay"><span data-dcnode-id="4141" instrument_node="">Navi Pillay</span></a><span data-dcnode-id="4139" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="4137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_High_Commissioner_for_Human_Rights" title="United Nations High Commissioner for Human Rights"><span data-dcnode-id="4138" instrument_node="">United Nations High Commissioner for Human Rights</span></a><span data-dcnode-id="4136" instrument_node="">, said in March 2013 that prosecutions for these crimes are rarely successful with only five known cases of convictions out of the 72 murders of people with albinism documented in Tanzania since 2000.</span><sup class="reference" data-dcnode-id="4133" id="cite_ref-5"><a data-dcnode-id="4134" href="#cite_note-5"><span data-dcnode-id="4135" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4132" instrument_node="">
</span></p><p data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">The UNCT said,
</span></p><span data-dcnode-id="4128" instrument_node="">
</span><blockquote data-dcnode-id="4119"><p data-dcnode-id="4120"><span data-dcnode-id="4127" instrument_node="">From 2006 to 2010, at least 58 persons with albinism were killed, the majority of whom were children. Also, there were nine cases of attempted murder and reports of the desecration of graves. ... Efforts have been made to prosecute the murderers. Tackling the national and international trade in body parts is also essential to ending the killings. In terms of protection, the Government has established special shelter centers for children with albinism. However, in the long-term, this measure results in the children's isolation from society and separation from family. Therefore, the Government should explore alternative ways of protecting people with albinism, including options that promote social inclusion and tolerance.</span><sup class="reference" data-dcnode-id="4124" id="cite_ref-UNCT_3-5"><a data-dcnode-id="4125" href="#cite_note-UNCT-3"><span data-dcnode-id="4126" instrument_node="">[3]</span></a></sup><sup class="reference nowrap" data-dcnode-id="4121"><span data-dcnode-id="4122" title="Page / location: ¶¶ 31–32, page 8"><span data-dcnode-id="4123" instrument_node="">: ¶¶ 31–32, page 8 </span></span></sup></p></blockquote><span data-dcnode-id="4118" instrument_node="">
</span><h3 data-dcnode-id="4108"><span class="mw-headline" data-dcnode-id="4116" id="Maternal_mortality"><span data-dcnode-id="4117" instrument_node="">Maternal mortality</span></span><span class="mw-editsection" data-dcnode-id="4109"><span class="mw-editsection-bracket" data-dcnode-id="4114"><span data-dcnode-id="4115" instrument_node="">[</span></span><a data-dcnode-id="4112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Tanzania%26action%3Dedit%26section%3D8" title="Edit section: Maternal mortality"><span data-dcnode-id="4113" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4110"><span data-dcnode-id="4111" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4107" instrument_node="">
</span><p data-dcnode-id="4101"><span data-dcnode-id="4106" instrument_node="">Maternal mortality is very high in Tanzania. Many of these deaths are related to being provoked by indirect or direct obstetric causes.</span><sup class="reference" data-dcnode-id="4103" id="cite_ref-:0_6-0"><a data-dcnode-id="4104" href="#cite_note-:0-6"><span data-dcnode-id="4105" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4102" instrument_node="">
</span></p><p data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">The UNCT said,
</span></p><span data-dcnode-id="4098" instrument_node="">
</span><blockquote data-dcnode-id="4088"><p data-dcnode-id="4089"><span data-dcnode-id="4097" instrument_node="">Maternal health outcomes have shown slow improvement over the past two decades. ... [A]n important recommendation is that the Government increase access to and availability of basic emergency obstetric care services, skilled health workers – currently attending less than 50 percent of live births – as well as supplies. Access to family planning could reduce maternal deaths by a third and child death by as much as 20 percent. ... Also needed is a consideration of the current restrictiveness of safe abortion services, which, under the Penal Code, is considered illegal. Reports suggest that this restrictiveness costs the lives of many women and girls seeking to conduct the act secretly, without professional guidance and under unhygienic conditions.</span><sup class="reference" data-dcnode-id="4094" id="cite_ref-UNCT_3-6"><a data-dcnode-id="4095" href="#cite_note-UNCT-3"><span data-dcnode-id="4096" instrument_node="">[3]</span></a></sup><sup class="reference nowrap" data-dcnode-id="4091"><span data-dcnode-id="4092" title="Page / location: ¶¶ 33–34, page 8"><span data-dcnode-id="4093" instrument_node="">: ¶¶ 33–34, page 8 </span></span></sup><span data-dcnode-id="4090" instrument_node="">
</span></p></blockquote><span data-dcnode-id="4087" instrument_node="">
</span><h3 data-dcnode-id="4077"><span class="mw-headline" data-dcnode-id="4085" id="Under-five_child_mortality"><span data-dcnode-id="4086" instrument_node="">Under-five child mortality</span></span><span class="mw-editsection" data-dcnode-id="4078"><span class="mw-editsection-bracket" data-dcnode-id="4083"><span data-dcnode-id="4084" instrument_node="">[</span></span><a data-dcnode-id="4081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Tanzania%26action%3Dedit%26section%3D9" title="Edit section: Under-five child mortality"><span data-dcnode-id="4082" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4079"><span data-dcnode-id="4080" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4076" instrument_node="">
</span><p data-dcnode-id="4074"><span data-dcnode-id="4075" instrument_node="">The UNCT said,
</span></p><span data-dcnode-id="4073" instrument_node="">
</span><blockquote data-dcnode-id="4064"><p data-dcnode-id="4065"><span data-dcnode-id="4072" instrument_node="">After more than a decade of stagnation during the 1980s and 1990s, major gains in child survival have been reported since mid-2000. ... This progress is equivalent to saving nearly 100,000 children every year. ... Nonetheless, the toll of under-five deaths still amounts to roughly 155,000 deaths per year – more than 400 deaths in Tanzania every day.</span><sup class="reference" data-dcnode-id="4069" id="cite_ref-UNCT_3-7"><a data-dcnode-id="4070" href="#cite_note-UNCT-3"><span data-dcnode-id="4071" instrument_node="">[3]</span></a></sup><sup class="reference nowrap" data-dcnode-id="4066"><span data-dcnode-id="4067" title="Page / location: ¶ 35, pages 8–9"><span data-dcnode-id="4068" instrument_node="">: ¶ 35, pages 8–9 </span></span></sup></p></blockquote><span data-dcnode-id="4063" instrument_node="">
</span><h3 data-dcnode-id="4053"><span class="mw-headline" data-dcnode-id="4061" id="Forced_labor"><span data-dcnode-id="4062" instrument_node="">Forced labor</span></span><span class="mw-editsection" data-dcnode-id="4054"><span class="mw-editsection-bracket" data-dcnode-id="4059"><span data-dcnode-id="4060" instrument_node="">[</span></span><a data-dcnode-id="4057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Tanzania%26action%3Dedit%26section%3D10" title="Edit section: Forced labor"><span data-dcnode-id="4058" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4052" instrument_node="">
</span><p data-dcnode-id="4050"><span data-dcnode-id="4051" instrument_node="">The UNCT said,
</span></p><span data-dcnode-id="4049" instrument_node="">
</span><blockquote data-dcnode-id="4037"><p data-dcnode-id="4038"><span data-dcnode-id="4048" instrument_node="">The Local Government (District Authorities) Act (1982) allows the Government to compel individuals and groups to forcibly work for purposes of economic development. Many laws also permit the imposition of forced or compulsory labor as a punishment for a range of offenses, including the expression of political views and the failure to engage in socially useful work. ... These provisions are incompatible with relevant </span><a data-dcnode-id="4046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Labour_Organization" title="International Labour Organization"><span data-dcnode-id="4047" instrument_node="">International Labour Organization</span></a><span data-dcnode-id="4045" instrument_node=""> conventions and the Government should revise these provisions as a matter of priority.</span><sup class="reference" data-dcnode-id="4042" id="cite_ref-UNCT_3-8"><a data-dcnode-id="4043" href="#cite_note-UNCT-3"><span data-dcnode-id="4044" instrument_node="">[3]</span></a></sup><sup class="reference nowrap" data-dcnode-id="4039"><span data-dcnode-id="4040" title="Page / location: ¶ 36, page 9"><span data-dcnode-id="4041" instrument_node="">: ¶ 36, page 9 </span></span></sup></p></blockquote><span data-dcnode-id="4036" instrument_node="">
</span><h3 data-dcnode-id="4026"><span class="mw-headline" data-dcnode-id="4034" id="Trafficking_in_persons"><span data-dcnode-id="4035" instrument_node="">Trafficking in persons</span></span><span class="mw-editsection" data-dcnode-id="4027"><span class="mw-editsection-bracket" data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">[</span></span><a data-dcnode-id="4030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Tanzania%26action%3Dedit%26section%3D11" title="Edit section: Trafficking in persons"><span data-dcnode-id="4031" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4028"><span data-dcnode-id="4029" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4025" instrument_node="">
</span><p data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node="">The UNCT said,
</span></p><span data-dcnode-id="4022" instrument_node="">
</span><blockquote data-dcnode-id="4013"><p data-dcnode-id="4014"><span data-dcnode-id="4021" instrument_node="">Tanzania is a source, transit, and destination country for men, women, and children subjected to trafficking, specifically under conditions of forced labor and forced prostitution. The incidence of internal trafficking is higher than that of transnational trafficking, largely from rural to urban areas, affecting primarily children for their exploitation in domestic servitude, petty trade, and prostitution. Family members and friends who offer assistance with education or lucrative employment in urban areas usually facilitate trafficking. The use of young girls for forced domestic labor continues to be the country‟s largest human trafficking problem. Due to the lack of establishment of an Anti-Trafficking Committee, the governmental agencies tasked with prevention and protection are unable to implement 2008 Anti-Trafficking in Persons Act as there are no regulations for them to follow. Thus, most government officials remain unfamiliar with the Act's provisions, and no budgetary resources allocated to combating the crime and assisting the victims have been secured... Law enforcement officials often fail to see human trafficking as a crime but rather a moral issue that can be remedied by financial compensation. ... From the enactment of the law to the end of January 2011, three cases were successfully prosecuted...</span><sup class="reference" data-dcnode-id="4018" id="cite_ref-UNCT_3-9"><a data-dcnode-id="4019" href="#cite_note-UNCT-3"><span data-dcnode-id="4020" instrument_node="">[3]</span></a></sup><sup class="reference nowrap" data-dcnode-id="4015"><span data-dcnode-id="4016" title="Page / location: ¶¶ 37–39, pages 9–10"><span data-dcnode-id="4017" instrument_node="">: ¶¶ 37–39, pages 9–10 </span></span></sup></p></blockquote><span data-dcnode-id="4012" instrument_node="">
</span><h3 data-dcnode-id="4001"><span data-dcnode-id="4011" id="Incarceration.2C_prisons.2C_and_access_to_justice"></span><span class="mw-headline" data-dcnode-id="4009" id="Incarceration,_prisons,_and_access_to_justice"><span data-dcnode-id="4010" instrument_node="">Incarceration, prisons, and access to justice</span></span><span class="mw-editsection" data-dcnode-id="4002"><span class="mw-editsection-bracket" data-dcnode-id="4007"><span data-dcnode-id="4008" instrument_node="">[</span></span><a data-dcnode-id="4005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Tanzania%26action%3Dedit%26section%3D12" title="Edit section: Incarceration, prisons, and access to justice"><span data-dcnode-id="4006" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4003"><span data-dcnode-id="4004" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4000" instrument_node="">
</span><p data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">The UNCT said,
</span></p><span data-dcnode-id="3997" instrument_node="">
</span><blockquote data-dcnode-id="3988"><p data-dcnode-id="3989"><span data-dcnode-id="3996" instrument_node="">There is an acute shortage of courts, as well as judges and magistrates to preside over cases, severely affecting access to competent tribunals. Pointedly, [33.6 percent of] ... cases ... in the primary and district courts ... have been pending for 2 years or more. Likewise, the number of cases pending in the High Court (for murder, serious offenses, and appeals) is rising due to fewer court sittings. Besides, justice is further delayed by prolonged investigations by the police, the courts' adjourning of cases based on flimsy technical grounds, and the non-appearance of witnesses. There is also a dearth of lawyers who are qualified to provide representation in court, the great majority of whom are based in Dar es Salaam. ... While the law allows for legal aid in criminal cases, those accused of murder and treason are provided with free representation in practice only. Detention facilities struggle to cater to the basic needs of the ever-growing number of inmates, most of whom are remandees. Convicted and unconvinced are mixed together, often under inhumane conditions. Some prisons are housing more than twice their capacity, as is the case with the Ruanda Central Prison, which has a capacity of 400 prisoners and holds 838.</span><sup class="reference" data-dcnode-id="3993" id="cite_ref-UNCT_3-10"><a data-dcnode-id="3994" href="#cite_note-UNCT-3"><span data-dcnode-id="3995" instrument_node="">[3]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3990"><span data-dcnode-id="3991" title="Page / location: ¶¶ 41–43, page 10"><span data-dcnode-id="3992" instrument_node="">: ¶¶ 41–43, page 10 </span></span></sup></p></blockquote><span data-dcnode-id="3987" instrument_node="">
</span><p data-dcnode-id="3985"><span data-dcnode-id="3986" instrument_node="">In its 2013 human rights report, the United States State Department said,
</span></p><span data-dcnode-id="3984" instrument_node="">
</span><blockquote data-dcnode-id="3975"><p data-dcnode-id="3976"><span data-dcnode-id="3983" instrument_node="">Despite some improvements, prison conditions remained harsh and life threatening. Inadequate food, overcrowding, poor sanitation, and inadequate medical care were pervasive. There were allegations that authorities meted out inhumane treatment. Serious threats to life continued in detention centers. ... As of October 17, [2013,] the prisons held 34,404 inmates--16 percent above the total capacity of 29,552. Among the prisoners, 17,180 were convicts and 17,224 were pretrial detainees. Pretrial detainees and convicted prisoners were held together. ... Authorities held minors together with adults in several prisons due to a lack of detention facilities.
According to government officials, there were deaths in prison due to HIV/AIDS in prisons. The most common health complaints by prisoners were malaria, tuberculosis, HIV/AIDS, and other diseases related to poor sanitation. Prison dispensaries offered only limited treatment, and friends and family members of prisoners generally had to provide medications or the funds to purchase them. Limited transportation also affected the ability of prison staff to take prisoners to health clinics and hospitals. Prison staff complained of water shortages and a lack of electricity as well as inadequate medical supplies. ... Recordkeeping in prisons was inadequate and resulted in discrepancies in reporting. On the mainland[,] the law allows judges and magistrates to grant parole or impose alternative sentences such as community service ..., but these options were rarely used. The law authorizes early release for good behavior but has burdensome evidentiary requirements. On the mainland[,] authorities often moved prisoners to different prisons without notifying their families. ... The number of probation officers remained inadequate. ... On the mainland[,] prisoners were permitted to submit complaints to judicial authorities, but it was alleged that the letters were censored.</span><sup class="reference" data-dcnode-id="3980" id="cite_ref-US_Report_7-0"><a data-dcnode-id="3981" href="#cite_note-US_Report-7"><span data-dcnode-id="3982" instrument_node="">[7]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3977"><span data-dcnode-id="3978" title="Page / location: pages 4–5"><span data-dcnode-id="3979" instrument_node="">: pages 4–5 </span></span></sup></p></blockquote><span data-dcnode-id="3974" instrument_node="">
</span><blockquote data-dcnode-id="3965"><p data-dcnode-id="3966"><span data-dcnode-id="3973" instrument_node="">Detainees charged with criminal matters generally waited three to four years for trial due to a lack of judges to hear cases, an inadequate judicial budget, and the lengthy time required to complete police investigations.</span><sup class="reference" data-dcnode-id="3970" id="cite_ref-US_Report_7-1"><a data-dcnode-id="3971" href="#cite_note-US_Report-7"><span data-dcnode-id="3972" instrument_node="">[7]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3967"><span data-dcnode-id="3968" title="Page / location: page 9"><span data-dcnode-id="3969" instrument_node="">: page 9 </span></span></sup></p></blockquote><span data-dcnode-id="3964" instrument_node="">
</span><h3 data-dcnode-id="3954"><span class="mw-headline" data-dcnode-id="3962" id="Juvenile_justice"><span data-dcnode-id="3963" instrument_node="">Juvenile justice</span></span><span class="mw-editsection" data-dcnode-id="3955"><span class="mw-editsection-bracket" data-dcnode-id="3960"><span data-dcnode-id="3961" instrument_node="">[</span></span><a data-dcnode-id="3958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Tanzania%26action%3Dedit%26section%3D13" title="Edit section: Juvenile justice"><span data-dcnode-id="3959" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3956"><span data-dcnode-id="3957" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3953" instrument_node="">
</span><p data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">The UNCT said,
</span></p><span data-dcnode-id="3950" instrument_node="">
</span><blockquote data-dcnode-id="3941"><p data-dcnode-id="3942"><span data-dcnode-id="3949" instrument_node="">Children are routinely held pre- and post-trial in adult detention centers even in regions in which juvenile detention centers exist. The prisons are not staffed or equipped to provide specialist services, and although generally under-18s or under-21s are separated at night, they mix with adults during the day. There are only two post detention centers and five retention homes (with two more openings in the near future) for under-18s in the country. There is no separate criminal system for under-18s and, apart from one juvenile court in Dar Es Salaam, juvenile cases are heard in regular courts. Under-18s without the means to pay for a lawyer are often left without legal assistance. There is no system of diversion and no community rehabilitation schemes provided for by law, or implemented in practice. Non-custodial sentencing is limited. Boys may receive corporal punishment or stroking. Other punishments relate to fines, compensation or costs, and probation with supervision. Zanzibar equally lacks a separate system for children and, with no separate detention centers, under-18s are mixed with adults in the prison.</span><sup class="reference" data-dcnode-id="3946" id="cite_ref-UNCT_3-11"><a data-dcnode-id="3947" href="#cite_note-UNCT-3"><span data-dcnode-id="3948" instrument_node="">[3]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3943"><span data-dcnode-id="3944" title="Page / location: ¶¶ 44–45, pages 10–11"><span data-dcnode-id="3945" instrument_node="">: ¶¶ 44–45, pages 10–11 </span></span></sup></p></blockquote><span data-dcnode-id="3940" instrument_node="">
</span><p data-dcnode-id="3938"><span data-dcnode-id="3939" instrument_node="">In its 2013 human rights report, the United States State Department said,
</span></p><span data-dcnode-id="3937" instrument_node="">
</span><blockquote data-dcnode-id="3928"><p data-dcnode-id="3929"><span data-dcnode-id="3936" instrument_node="">The [Commission for Human Rights and Good Governance] ... visited a sampling of prisons and detention facilities in 2011 and found 441 minors detained in the adult prisons visited. Among these, 64 were convicted, and the remaining 377 were pretrial detainees. ... There was one prison for minors in the Mbeya Region and five remand homes across the country. Officials attributed the shortage of appropriate detention facilities to a lack of coordination between the judiciary, police, and prison department.</span><sup class="reference" data-dcnode-id="3933" id="cite_ref-US_Report_7-2"><a data-dcnode-id="3934" href="#cite_note-US_Report-7"><span data-dcnode-id="3935" instrument_node="">[7]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3930"><span data-dcnode-id="3931" title="Page / location: pages 4–5"><span data-dcnode-id="3932" instrument_node="">: pages 4–5 </span></span></sup></p></blockquote><span data-dcnode-id="3927" instrument_node="">
</span><h3 data-dcnode-id="3916"><span data-dcnode-id="3926" id="Excessive_use_of_force.2C_torture.2C_arbitrary_arrests.2C_and_corruption"></span><span class="mw-headline" data-dcnode-id="3924" id="Excessive_use_of_force,_torture,_arbitrary_arrests,_and_corruption"><span data-dcnode-id="3925" instrument_node="">Excessive use of force, torture, arbitrary arrests, and corruption</span></span><span class="mw-editsection" data-dcnode-id="3917"><span class="mw-editsection-bracket" data-dcnode-id="3922"><span data-dcnode-id="3923" instrument_node="">[</span></span><a data-dcnode-id="3920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Tanzania%26action%3Dedit%26section%3D14" title="Edit section: Excessive use of force, torture, arbitrary arrests, and corruption"><span data-dcnode-id="3921" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3915" instrument_node="">
</span><p data-dcnode-id="3893"><span data-dcnode-id="3914" instrument_node="">During the UPR, the United States expressed concern about reports of arbitrary arrests, excessive use of force by police and the military, and </span><a data-dcnode-id="3912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Police_corruption" title="Police corruption"><span data-dcnode-id="3913" instrument_node="">corruption in law enforcement</span></a><span data-dcnode-id="3911" instrument_node="">.</span><sup class="reference" data-dcnode-id="3908" id="cite_ref-Response_4-6"><a data-dcnode-id="3909" href="#cite_note-Response-4"><span data-dcnode-id="3910" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3905"><span data-dcnode-id="3906" title="Page / location: ¶ 58, page 10"><span data-dcnode-id="3907" instrument_node="">: ¶ 58, page 10 </span></span></sup><span data-dcnode-id="3904" instrument_node=""> Denmark was concerned about reports of law enforcement officers engaging in disproportionate use of force, including </span><a data-dcnode-id="3902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torture" title="Torture"><span data-dcnode-id="3903" instrument_node="">torture</span></a><span data-dcnode-id="3901" instrument_node="">.</span><sup class="reference" data-dcnode-id="3898" id="cite_ref-Response_4-7"><a data-dcnode-id="3899" href="#cite_note-Response-4"><span data-dcnode-id="3900" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3895"><span data-dcnode-id="3896" title="Page / location: ¶ 61, page 10"><span data-dcnode-id="3897" instrument_node="">: ¶ 61, page 10 </span></span></sup><span data-dcnode-id="3894" instrument_node="">
</span></p><p data-dcnode-id="3884"><span data-dcnode-id="3892" instrument_node="">Tanzania expressed support for the U.S. recommendations to, "Implement a national action plan to combat corruption, including enhanced laws and enforcement, more resources dedicated to anti-corruption bodies, a review of law enforcement compensation, and a nation-wide educational campaign...." and to provide human rights training to security forces.</span><sup class="reference" data-dcnode-id="3889" id="cite_ref-Response_4-8"><a data-dcnode-id="3890" href="#cite_note-Response-4"><span data-dcnode-id="3891" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3886"><span data-dcnode-id="3887" title="Page / location: ¶¶ 85.18, 85.21 page 14"><span data-dcnode-id="3888" instrument_node="">: ¶¶ 85.18, 85.21 page 14 </span></span></sup><span data-dcnode-id="3885" instrument_node="">
</span></p><p data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">In its 2013 human rights report, the United States State Department said,
</span></p><span data-dcnode-id="3881" instrument_node="">
</span><blockquote data-dcnode-id="3872"><p data-dcnode-id="3873"><span data-dcnode-id="3880" instrument_node="">During the year[,] there were several reports that agents of the government (specifically police and other security units) committed unlawful killings. Nongovernmental organizations (NGOs) and local news agencies documented several cases of police officers mistreating, beating, and causing the deaths of civilians. ... The Legal and Human Rights Center (LHRC) announced that police brutality, domestic violence, and extrajudicial killings rose during [2013].... ... According to the LHRC, by July police and other security personnel killed 22 persons (compared with 31 in all of 2012).
In October[,] several members of parliament (MPs) and local NGOs raised concerns about alleged human rights abuses related to a controversial anti-poaching campaign initiated by the government. Some MPs alleged that government officials used excessive force in questioning individuals about poaching activities, seized and killed cattle grazing on protected land, and burned houses of pastoralists allegedly involved in illegal grazing. ... On December 20, President Kikwete dismissed four cabinet ministers ... in response to continued parliamentary concern....</span><sup class="reference" data-dcnode-id="3877" id="cite_ref-US_Report_7-3"><a data-dcnode-id="3878" href="#cite_note-US_Report-7"><span data-dcnode-id="3879" instrument_node="">[7]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3874"><span data-dcnode-id="3875" title="Page / location: pages 1–2"><span data-dcnode-id="3876" instrument_node="">: pages 1–2 </span></span></sup></p></blockquote><span data-dcnode-id="3871" instrument_node="">
</span><blockquote data-dcnode-id="3862"><p data-dcnode-id="3863"><span data-dcnode-id="3870" instrument_node="">The constitution and law prohibit ... [torture and other cruel, inhuman, or degrading treatment or punishment], but there were reports that police officers, prison guards, and soldiers who abused, threatened, and otherwise mistreated civilians, suspected criminals, and prisoners faced limited accountability. The abuse most commonly involved beatings. ... On June 19, Human Rights Watch and the Wake Up and Step Forward Coalition released a report including several detailed allegations of torture and abuse of lesbian, gay, bisexual, and transgender ... individuals while in police custody. ... The law allows caning. Local government officials and courts occasionally used caning as a punishment for both juvenile and adult offenders. ... Caning and other corporal punishment were also used routinely in schools.</span><sup class="reference" data-dcnode-id="3867" id="cite_ref-US_Report_7-4"><a data-dcnode-id="3868" href="#cite_note-US_Report-7"><span data-dcnode-id="3869" instrument_node="">[7]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3864"><span data-dcnode-id="3865" title="Page / location: pages 3–4"><span data-dcnode-id="3866" instrument_node="">: pages 3–4 </span></span></sup></p></blockquote><span data-dcnode-id="3861" instrument_node="">
</span><blockquote data-dcnode-id="3852"><p data-dcnode-id="3853"><span data-dcnode-id="3860" instrument_node="">[T]he Tanzanian Police Force has primary responsibility for maintaining law and order both on the mainland and in Zanzibar. ... During ... [2013,] there were reports of excessive force, police corruption, and impunity. Low pay contributed to perceived corruption in certain units, as reported widely by citizens and the press. Newspaper articles, civil complaints, and reports of police corruption from the Prevention and Combating of Corruption Bureau ... as well as the Ministry of Home Affairs, also continued. ... Sungusungu, or citizens' patrols, are traditional neighborhood anticrime groups that exist throughout the mainland. The People’s Militia Act of 1973 grants them the power to make arrests. ... Sungusungu members are not permitted to carry firearms or machetes, but they did carry sticks or clubs. They ... operated independently from the police. ... In June, LHRC reported that Sungusungu militias were responsible for the death of four people during the year in Shinyanga, Mbeya, and Iringa regions.</span><sup class="reference" data-dcnode-id="3857" id="cite_ref-US_Report_7-5"><a data-dcnode-id="3858" href="#cite_note-US_Report-7"><span data-dcnode-id="3859" instrument_node="">[7]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3854"><span data-dcnode-id="3855" title="Page / location: pages 6–7"><span data-dcnode-id="3856" instrument_node="">: pages 6–7 </span></span></sup></p></blockquote><span data-dcnode-id="3851" instrument_node="">
</span><blockquote data-dcnode-id="3842"><p data-dcnode-id="3843"><span data-dcnode-id="3850" instrument_node="">On the mainland[,] the law ... requires that a person arrested for a crime, other than a national security detainee, be charged before a magistrate within 24 hours of arrest ..., but police failed to comply consistently with this requirement. There were reports of police using a rolling process of releasing and immediately re-arresting individuals so that they would remain in custody while police ... developed the required information for the accused to be charged. The law gives accused persons the right to contact a lawyer or talk with family members, but at times they were denied this right. Prompt access to counsel was often limited by the lack of lawyers in rural areas, lack of communication systems and infrastructure, and illiteracy and poverty of the accused. ... The government provided legal representation for some indigent defendants and all suspects charged with murder or treason. ... In the primary and district courts, bribes sometimes determined whether bail was granted.</span><sup class="reference" data-dcnode-id="3847" id="cite_ref-US_Report_7-6"><a data-dcnode-id="3848" href="#cite_note-US_Report-7"><span data-dcnode-id="3849" instrument_node="">[7]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3844"><span data-dcnode-id="3845" title="Page / location: page 8"><span data-dcnode-id="3846" instrument_node="">: page 8 </span></span></sup></p></blockquote><span data-dcnode-id="3841" instrument_node="">
</span><h3 data-dcnode-id="3831"><span class="mw-headline" data-dcnode-id="3839" id="Justice_for_survivors_of_gender-based_violence"><span data-dcnode-id="3840" instrument_node="">Justice for survivors of gender-based violence</span></span><span class="mw-editsection" data-dcnode-id="3832"><span class="mw-editsection-bracket" data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">[</span></span><a data-dcnode-id="3835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Tanzania%26action%3Dedit%26section%3D15" title="Edit section: Justice for survivors of gender-based violence"><span data-dcnode-id="3836" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3830" instrument_node="">
</span><p data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">The UNCT said,
</span></p><span data-dcnode-id="3827" instrument_node="">
</span><blockquote data-dcnode-id="3818"><p data-dcnode-id="3819"><span data-dcnode-id="3826" instrument_node="">Survivors of sexual abuse and violence, struggle to secure justice and social support. The vast majority of police, prosecutors, and magistrates are not trained to meet the needs of survivors. Many officers recommend out of court settlements. Stigma and community pressure often dissuade families from lodging cases, with the community preferring that the case is handled outside the justice system. This often leads to impunity for perpetrators. Since 2008, a system is emerging to improve the reception of survivors and responses to their needs. ... However, continued training and skills development, in conjunction with awareness raising initiatives, is necessary.... For instance, ... only 320 officers of the 35,000-strong police force have received training.</span><sup class="reference" data-dcnode-id="3823" id="cite_ref-UNCT_3-12"><a data-dcnode-id="3824" href="#cite_note-UNCT-3"><span data-dcnode-id="3825" instrument_node="">[3]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3820"><span data-dcnode-id="3821" title="Page / location: ¶¶ 46–47, page 11"><span data-dcnode-id="3822" instrument_node="">: ¶¶ 46–47, page 11 </span></span></sup></p></blockquote><span data-dcnode-id="3817" instrument_node="">
</span><h3 data-dcnode-id="3806"><span data-dcnode-id="3816" id="Freedom_of_association.2C_opinion.2C_and_expression"></span><span class="mw-headline" data-dcnode-id="3814" id="Freedom_of_association,_opinion,_and_expression"><span data-dcnode-id="3815" instrument_node="">Freedom of association, opinion, and expression</span></span><span class="mw-editsection" data-dcnode-id="3807"><span class="mw-editsection-bracket" data-dcnode-id="3812"><span data-dcnode-id="3813" instrument_node="">[</span></span><a data-dcnode-id="3810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Tanzania%26action%3Dedit%26section%3D16" title="Edit section: Freedom of association, opinion, and expression"><span data-dcnode-id="3811" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3805" instrument_node="">
</span><p data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">The UNCT said,
</span></p><span data-dcnode-id="3802" instrument_node="">
</span><blockquote data-dcnode-id="3793"><p data-dcnode-id="3794"><span data-dcnode-id="3801" instrument_node="">Under commitments made in MKUKUTA II, more efforts to increase access to independent information are underway. Therein, an expansion from the current twelve community media to at least one community media in each district is forecast. To deliver on that commitment, it will be necessary to alleviate the lengthy and bureaucratic procedures in licensing such radio stations, which may take between one to three years. The Government should further be concerned about reports from the independent 2010 general election monitors, which point to instances of intimidation against these radio stations as a means to hinder broadcasting voters' education programs. Another important recommendation for the Government would be the fast-tracking of freedom of information legislation; code of ethics for advertisements; and the introduction of public broadcasting in Zanzibar.</span><sup class="reference" data-dcnode-id="3798" id="cite_ref-UNCT_3-13"><a data-dcnode-id="3799" href="#cite_note-UNCT-3"><span data-dcnode-id="3800" instrument_node="">[3]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3795"><span data-dcnode-id="3796" title="Page / location: ¶ 50, page 12"><span data-dcnode-id="3797" instrument_node="">: ¶ 50, page 12 </span></span></sup></p></blockquote><span data-dcnode-id="3792" instrument_node="">
</span><h3 data-dcnode-id="3782"><span class="mw-headline" data-dcnode-id="3790" id="Treatment_of_school_pupils"><span data-dcnode-id="3791" instrument_node="">Treatment of school pupils</span></span><span class="mw-editsection" data-dcnode-id="3783"><span class="mw-editsection-bracket" data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">[</span></span><a data-dcnode-id="3786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Tanzania%26action%3Dedit%26section%3D17" title="Edit section: Treatment of school pupils"><span data-dcnode-id="3787" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3781" instrument_node="">
</span><p data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">The UNCT said,
</span></p><span data-dcnode-id="3778" instrument_node="">
</span><blockquote data-dcnode-id="3769"><p data-dcnode-id="3770"><span data-dcnode-id="3777" instrument_node="">In 2008, only 0.4 percent of children with disabilities were enrolled and the trend is decreasing. In most cases, these children attend special needs schools rather than enjoying inclusive education. While the Government has developed an Inclusive Education Strategy, immediate efforts should be taken to ensure its implementation and hence increase the inclusion of orphans and other vulnerable children, many of whom are likely to be among the 5 percent of primary age children missing in schools. A 2002 regulation allows for the expulsion of pregnant girls from school. Existing protection and special programs for girls are inadequate and result in many girls being unable to fulfill the compulsory education program in place in the country. Corporal punishment is not prohibited in any environment, including in schools, and its use is widespread. Preliminary results from a forthcoming study on violence against children records high levels of physical violence in school. Over 50 percent of children have been subjected to physical violence – being punched, kicked, slapped, whipped, or threatened with a weapon – by their teachers before the age of 18.</span><sup class="reference" data-dcnode-id="3774" id="cite_ref-UNCT_3-14"><a data-dcnode-id="3775" href="#cite_note-UNCT-3"><span data-dcnode-id="3776" instrument_node="">[3]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3771"><span data-dcnode-id="3772" title="Page / location: ¶¶ 57–58, page 13"><span data-dcnode-id="3773" instrument_node="">: ¶¶ 57–58, page 13 </span></span></sup></p></blockquote><span data-dcnode-id="3768" instrument_node="">
</span><p data-dcnode-id="3759"><span data-dcnode-id="3767" instrument_node="">During the UPR, Finland commented on Tanzania's restrictions on the education of persons with disabilities and asked the government about its actions to fully implement the act on persons with disabilities and the strategy on inclusive education.</span><sup class="reference" data-dcnode-id="3764" id="cite_ref-Response_4-9"><a data-dcnode-id="3765" href="#cite_note-Response-4"><span data-dcnode-id="3766" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3761"><span data-dcnode-id="3762" title="Page / location: ¶ 36, page 7"><span data-dcnode-id="3763" instrument_node="">: ¶ 36, page 7 </span></span></sup><span data-dcnode-id="3760" instrument_node="">
</span></p><span data-dcnode-id="3758" instrument_node="">
</span><h3 data-dcnode-id="3747"><span data-dcnode-id="3757" id="Persons_living_with_HIV.2FAIDS"></span><span class="mw-headline" data-dcnode-id="3755" id="Persons_living_with_HIV/AIDS"><span data-dcnode-id="3756" instrument_node="">Persons living with HIV/AIDS</span></span><span class="mw-editsection" data-dcnode-id="3748"><span class="mw-editsection-bracket" data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">[</span></span><a data-dcnode-id="3751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Tanzania%26action%3Dedit%26section%3D18" title="Edit section: Persons living with HIV/AIDS"><span data-dcnode-id="3752" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3746" instrument_node="">
</span><link data-dcnode-id="3745" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3741" role="note"><span data-dcnode-id="3744" instrument_node="">Main article: </span><a data-dcnode-id="3742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/HIV/AIDS_in_Tanzania" title="HIV/AIDS in Tanzania"><span data-dcnode-id="3743" instrument_node="">HIV/AIDS in Tanzania</span></a></div><span data-dcnode-id="3740" instrument_node="">
</span><p data-dcnode-id="3738"><span data-dcnode-id="3739" instrument_node="">The UNCT said,
</span></p><span data-dcnode-id="3737" instrument_node="">
</span><blockquote data-dcnode-id="3728"><p data-dcnode-id="3729"><span data-dcnode-id="3736" instrument_node="">Stereotyping in HIV/AIDS infection has continued fueling stigma and discrimination, particularly against women due to gender norms that label women as "vectors" of transmission for HIV. ... Another contributor to the stigmatization of HIV or AIDS affected individuals is the criminalization of "intentional" transmission of HIV/AIDS, with a punishment of up to ten years. As it is difficult to find out who, among adults, has knowingly infected another person, the added value of this approach is questioned. In addition, with mother to child transmission, it raises an additional concern for women.</span><sup class="reference" data-dcnode-id="3733" id="cite_ref-UNCT_3-15"><a data-dcnode-id="3734" href="#cite_note-UNCT-3"><span data-dcnode-id="3735" instrument_node="">[3]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3730"><span data-dcnode-id="3731" title="Page / location: ¶¶ 61–62, page 14"><span data-dcnode-id="3732" instrument_node="">: ¶¶ 61–62, page 14 </span></span></sup></p></blockquote><span data-dcnode-id="3727" instrument_node="">
</span><h2 data-dcnode-id="3717"><span class="mw-headline" data-dcnode-id="3725" id="Zanzibar"><span data-dcnode-id="3726" instrument_node="">Zanzibar</span></span><span class="mw-editsection" data-dcnode-id="3718"><span class="mw-editsection-bracket" data-dcnode-id="3723"><span data-dcnode-id="3724" instrument_node="">[</span></span><a data-dcnode-id="3721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Tanzania%26action%3Dedit%26section%3D19" title="Edit section: Zanzibar"><span data-dcnode-id="3722" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3716" instrument_node="">
</span><p data-dcnode-id="3694"><span data-dcnode-id="3715" instrument_node="">Historically, the human rights situation on </span><a data-dcnode-id="3713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zanzibar" title="Zanzibar"><span data-dcnode-id="3714" instrument_node="">Zanzibar</span></a><span data-dcnode-id="3712" instrument_node=""> has been more problematic than the situation on the mainland. The original constitution of the united republic gave mainland authorities almost no recourse to intervene in matters of law and justice. Mainland officials were thus powerless to stop a wave of arbitrary arrests and imprisonments on the islands.</span><sup class="reference" data-dcnode-id="3709" id="cite_ref-8"><a data-dcnode-id="3710" href="#cite_note-8"><span data-dcnode-id="3711" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3708" instrument_node=""> The Zanzibar branch of the </span><a data-dcnode-id="3706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chama_Cha_Mapinduzi" title="Chama Cha Mapinduzi"><span data-dcnode-id="3707" instrument_node="">Revolutionary Party</span></a><span data-dcnode-id="3705" instrument_node=""> (known as the </span><a data-dcnode-id="3703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afro-Shirazi_Party" title="Afro-Shirazi Party"><span data-dcnode-id="3704" instrument_node="">Afro-Shirazi Party</span></a><span data-dcnode-id="3702" instrument_node=""> before merging with the mainland </span><a data-dcnode-id="3700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tanganyika_African_National_Union" title="Tanganyika African National Union"><span data-dcnode-id="3701" instrument_node="">Tanganyika African National Union</span></a><span data-dcnode-id="3699" instrument_node=""> in 1977) has historically been significantly more authoritarian than its mainland counterpart, a situation that has remained the case even after opposition parties were legalized in 1992.</span><sup class="reference" data-dcnode-id="3696" id="cite_ref-Dickovick_9-0"><a data-dcnode-id="3697" href="#cite_note-Dickovick-9"><span data-dcnode-id="3698" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3695" instrument_node="">
</span></p><span data-dcnode-id="3693" instrument_node="">
</span><h2 data-dcnode-id="3683"><span class="mw-headline" data-dcnode-id="3691" id="Refugees_from_Burundi"><span data-dcnode-id="3692" instrument_node="">Refugees from Burundi</span></span><span class="mw-editsection" data-dcnode-id="3684"><span class="mw-editsection-bracket" data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">[</span></span><a data-dcnode-id="3687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Tanzania%26action%3Dedit%26section%3D20" title="Edit section: Refugees from Burundi"><span data-dcnode-id="3688" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3685"><span data-dcnode-id="3686" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3682" instrument_node="">
</span><p data-dcnode-id="3677"><span data-dcnode-id="3681" instrument_node="">After a February 2012 meeting among Tanzania, Burundi, and the </span><a data-dcnode-id="3679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_High_Commissioner_for_Refugees" title="United Nations High Commissioner for Refugees"><span data-dcnode-id="3680" instrument_node="">United Nations High Commissioner for Refugees</span></a><span data-dcnode-id="3678" instrument_node=""> (UNHCR), the decision was made to close the Mtabila camp – home to approximately 38,000 Burundian refugees – on 31 December 2012. Tanzania refused to grant citizenship to any of these refugees after having done so for 162,000 Burundian refugees in 2010.
</span></p><p data-dcnode-id="3663"><span data-dcnode-id="3676" instrument_node="">Following a detailed questionnaire conducted by UNHCR and Tanzanian officials in December 2011, 33,708 refugees in Mtabila were found to be "not in need of international protection" and those who "are unwilling, without justifiable grounds, to return to Burundi, will find themselves liable to be dealt with under relevant Tanzanian laws, including those for immigration control and management".</span><sup class="reference" data-dcnode-id="3673" id="cite_ref-10"><a data-dcnode-id="3674" href="#cite_note-10"><span data-dcnode-id="3675" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3672" instrument_node=""> In August 2012, based on screening interviews conducted with UNHCR, only 2,715 of the refugees were determined to remain entitled to refugee status.</span><sup class="reference" data-dcnode-id="3669" id="cite_ref-11"><a data-dcnode-id="3670" href="#cite_note-11"><span data-dcnode-id="3671" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3668" instrument_node=""> In November 2012, the UNHCR reported that around 1,000 people per day were being assisted to voluntarily return to Burundi.</span><sup class="reference" data-dcnode-id="3665" id="cite_ref-12"><a data-dcnode-id="3666" href="#cite_note-12"><span data-dcnode-id="3667" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3664" instrument_node="">
</span></p><p data-dcnode-id="3648"><span data-dcnode-id="3662" instrument_node="">Between October 2019 and August 2020, </span><a data-dcnode-id="3660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tanzania" title="Tanzania"><span data-dcnode-id="3661" instrument_node="">Tanzanian</span></a><span data-dcnode-id="3659" instrument_node=""> authorities and intelligence services soberly torture and abused at least 18 </span><a data-dcnode-id="3657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Burundi" title="Burundi"><span data-dcnode-id="3658" instrument_node="">Burundian</span></a><span data-dcnode-id="3656" instrument_node=""> refugees and asylum seekers. After the president </span><a data-dcnode-id="3654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pierre_Nkurunziza" title="Pierre Nkurunziza"><span data-dcnode-id="3655" instrument_node="">Pierre Nkurunziza</span></a><span data-dcnode-id="3653" instrument_node="">’s decision to run for a disputed third term in 2015, more than 1.5 lakh Burundian refugees live in camps in Tanzania to avoid violence in Burundi.</span><sup class="reference" data-dcnode-id="3650" id="cite_ref-13"><a data-dcnode-id="3651" href="#cite_note-13"><span data-dcnode-id="3652" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3649" instrument_node="">
</span></p><span data-dcnode-id="3647" instrument_node="">
</span><h2 data-dcnode-id="3637"><span class="mw-headline" data-dcnode-id="3645" id="Historical_Freedom_House_ratings"><span data-dcnode-id="3646" instrument_node="">Historical Freedom House ratings</span></span><span class="mw-editsection" data-dcnode-id="3638"><span class="mw-editsection-bracket" data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">[</span></span><a data-dcnode-id="3641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHuman_rights_in_Tanzania%26action%3Dedit%26section%3D21" title="Edit section: Historical Freedom House ratings"><span data-dcnode-id="3642" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3636" instrument_node="">
</span><p data-dcnode-id="3621"><span data-dcnode-id="3635" instrument_node="">The following chart shows Tanzania's ratings since 1972 in the </span><a data-dcnode-id="3633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_in_the_World" title="Freedom in the World"><span data-dcnode-id="3634" instrument_node="">Freedom in the World</span></a><span data-dcnode-id="3632" instrument_node=""> reports, published annually by </span><a data-dcnode-id="3630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_House" title="Freedom House"><span data-dcnode-id="3631" instrument_node="">Freedom House</span></a><span data-dcnode-id="3629" instrument_node="">. A rating of 1 is "free"; 7, "not free".</span><sup class="reference" data-dcnode-id="3626" id="cite_ref-FH1972_14-0"><a data-dcnode-id="3627" href="#cite_note-FH1972-14"><span data-dcnode-id="3628" instrument_node="">[14]</span></a></sup><sup class="reference plainlinks nourlexpansion" data-dcnode-id="3623" id="ref_a"><a data-dcnode-id="3624" href="#endnote_a"><span data-dcnode-id="3625" instrument_node="">1</span></a></sup><span data-dcnode-id="3622" instrument_node="">
