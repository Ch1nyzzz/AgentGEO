</span><h3 data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">U.S. Asylum and Border Policies Explained</span></h3><span data-dcnode-id="701" instrument_node="">
</span><div class="sharethis-inline-share-buttons" data-dcnode-id="700"></div><span data-dcnode-id="699" instrument_node="">
</span><div class="details" data-dcnode-id="502"><span data-dcnode-id="698" instrument_node="">
</span><div class="col-right" data-dcnode-id="534"><span data-dcnode-id="697" instrument_node="">
</span><div class="body-2" data-dcnode-id="536"><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">The number of refugees and asylum-seekers from El Salvador, Guatemala and Honduras seeking safety in the United States has soared in recent years. Worsening violence fueled by drug cartels and gangs account for much of the increase, along with fragile institutions and increasing inequalities. Climate change is exacerbating the violence and economic hardship that are spurring increased displacement.</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><img alt="" data-dcnode-id="693" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unrefugees.org/media/d30h2zez/border-02-1200x800.png&amp;raw" width="100%"></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Each day thousands of families are forced to flee their homes because they experience and fear violence and persecution. They are forced to leave everything behind and undertake dangerous journeys just to find a safe place where they can rebuild their lives.</span></p><span data-dcnode-id="688" instrument_node="">
</span><h4 data-dcnode-id="686" style="text-align: left;"><span data-dcnode-id="687" instrument_node="">Here's what you need to know:</span></h4><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="684"></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="680"><a data-dcnode-id="681" href="#Why%20are%20people%20seeking%20asylum%20at%20the%20U.S.%20border?"><span data-dcnode-id="682" instrument_node="">1. Why are people seeking asylum at the U.S. border?</span></a></p><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="676"><a data-dcnode-id="677" href="#Is%20it%20legal%20to%20seek%20asylum%20at%20the%20U.S.%20border?"><span data-dcnode-id="678" instrument_node="">2. Is it legal to seek asylum at the U.S. border?</span></a></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="671"><a data-dcnode-id="673" href="#What%20is%20Title%2042?"><span data-dcnode-id="674" instrument_node="">3. What is Title 42?</span></a><span data-dcnode-id="672" instrument_node="">&nbsp;</span></p><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><a data-dcnode-id="669" name="Why are people seeking asylum at the U.S. border?"></a></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="664"><a data-dcnode-id="665" href="#What%20are%20the%20Migrant%20Protection%20Protocols?"><span data-dcnode-id="666" instrument_node="">4. What are the Migrant Protection Protocols (MPP)?</span></a></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="659"><a data-dcnode-id="661" href="#What%20are%20the%20consequences%20of%20the%20Migrant%20Protection%20Protocols?"><span data-dcnode-id="662" instrument_node="">5. What are the consequences of the Migrant Protection Protocols (MPP)?</span></a><strong data-dcnode-id="660"></strong></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="655"><a data-dcnode-id="656" href="#What%20is%20UNHCR%20doing%20at%20the%20U.S.-Mexico%20border?"><span data-dcnode-id="657" instrument_node="">6. What is UNHCR doing at the U.S.-Mexico border?</span></a></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="652"><strong data-dcnode-id="653"></strong></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="648"><strong data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Why are people seeking asylum at the U.S. border?</span></strong></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="646" instrument_node="">People from Central America, Mexico, Venezuela, Colombia, Cuba, Haiti and beyond – including Asia and Africa – are escaping situations where they fear for their lives. In</span><a data-dcnode-id="644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unrefugees.org/emergencies/central-america/"><span data-dcnode-id="645" instrument_node=""> Central America</span></a><span data-dcnode-id="643" instrument_node="">, hundreds of thousands of families have been victims of violence, extortion and persecution at the hands of local gangs, with no recourse from government institutions. The high levels of violence in the region are only comparable to those experienced in war zones. In Venezuela, 5.9 million people have left the country, many escaping generalized violence and lack of food and medicine.</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><img alt="" data-dcnode-id="640" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unrefugees.org/media/krrl5meu/border-01-1200x800.png&amp;raw" width="100%"></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="637" instrument_node="">“I always remember that day. They called me to tell [my brother] that next time he messed with them, they would kill him,” says</span><a data-dcnode-id="635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unrefugees.org/news/with-love-from-central-america-four-stories-of-central-american-refugees/"><span data-dcnode-id="636" instrument_node=""> Patricia</span></a><span data-dcnode-id="634" instrument_node="">, one of the many victims of gang violence in Honduras. “We moved internally several times looking for a safe place to live. But the fear did not let us live in peace. Gangs find you everywhere in Honduras.”</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><a data-dcnode-id="631" name="Is it legal to seek asylum at the U.S. border?"></a></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="626"><strong data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Is it legal to seek asylum at the U.S. border?</span></strong></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">The right to seek asylum is grounded in both the Universal Declaration of Human Rights (Art. 14) and the 1951 Refugee Convention (including its 1967 Protocol). Anyone who fears violence and persecution has the right to seek asylum and should not be returned to a territory where they fear threats to their lives or freedom (principle of non-refoulement, Art. 33, 1951 Refugee Convention). The U.S. Congress incorporated this definition into U.S. immigration law in the Refugee Act of 1980.</span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">According to the 1967 Protocol, adopting countries including the United States should consider the individual claims of people requesting asylum in their territory or at a port of entry and have the obligation to provide protection and humanitarian assistance to those who need it. The U.S. Refugee Act establishes two paths to obtain refugee status -- either from abroad as a resettled refugee or in the United States as an asylum-seeker.</span></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="617"><img alt="" data-dcnode-id="618" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unrefugees.org/media/ncxftlg2/border-04-1200x800.png&amp;raw" width="100%"></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><a data-dcnode-id="615" name="What is Title 42?"></a></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="610"><strong data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">What is Title 42?</span></strong></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">The United States has long had a legal framework to guarantee the right to seek asylum to individuals who arrive at our borders and ask for protection. But since March 20, 2020, that fundamental right has been largely suspended at U.S. land borders. Since that date, in the context of the COVID-19 pandemic, the majority of people seeking to apply for asylum have been turned away and “expelled” back to Mexico or their home countries under a provision of U.S. health law, section 265 of Title 42, without any consideration of the dangers they might be returned to.</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">UNHCR has maintained since the start of the pandemic that protecting public health and protecting access to asylum, a fundamental human right, are fully compatible. At the height of the public health emergency, many countries put in place protocols such as health screening, testing and quarantine measures for asylum-seeking populations, to simultaneously protect both public health and the right to seek asylum.</span></p><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="602" instrument_node="">In September 2021,</span><a data-dcnode-id="600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/en-us/news/press/2021/9/614a27324/news-comment-un-high-commissioner-refugees-filippo-grandi-conditions-expulsions.html"><span data-dcnode-id="601" instrument_node=""> High Commissioner Filippo Grandi stated</span></a><span data-dcnode-id="599" instrument_node="">, “I reiterate UNHCR’s call for the U.S. government immediately and fully to lift its Title 42 restrictions in effect since March of 2020 which continue to deny most people arriving at the southwest U.S. land border any opportunity to request asylum.”</span></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><a data-dcnode-id="596" name="What are the Migrant Protection Protocols?"></a></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><img alt="" data-dcnode-id="593" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unrefugees.org/media/bacdzbfz/border-05-1200x800.png&amp;raw" width="100%"></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="588"><strong data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">What are the Migrant Protection Protocols (MPP)?</span></strong></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">The Migrant Protection Protocols, also known as the “Remain in Mexico” program, is a border policy first implemented in January 2019 under the Trump Administration whereby tens of thousands of individuals who arrived in the United States at the southwest border were sent back to Mexico to wait outside of the U.S. for the duration of their asylum procedures.&nbsp;</span></p><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">The Biden Administration terminated the use of the Migrant Protection Protocols in early 2021 and worked with UNHCR to facilitate the safe re-entry of over 13,000 asylum-seekers who were waiting in dangerous and inhumane conditions in northern Mexico. The operation was conducted with robust COVID-19 precautions to ensure the health and safety of humanitarian personnel, border authorities and the asylum-seekers themselves.</span></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">However, litigation in the federal courts challenging the administration’s termination of the policy resulted in the reinstatement of the Migrant Protection Protocols in December 2021.</span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Though the Biden Administration has been compelled by court order to reinstate the policy, the administration has also taken steps to re-terminate the policy. UNHCR has urged the administration to continue to follow through with the termination of the policy, which jeopardizes asylum-seekers’ safety and violates due process.</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="573"><a data-dcnode-id="574" name="What are the consequences of the Migrant Protection Protocols?"></a></p><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="569"><strong data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">What are the consequences of the Migrant Protection Protocols (MPP)?</span></strong></p><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Under this policy from January 2019 to January 2021, more than 70,000 asylum-seekers who arrived at the U.S.-Mexico border were sent back to Mexico to wait for their asylum hearings in U.S. immigration courts. Most of the asylum-seekers were from El Salvador, Honduras and Guatemala and accounted for more than 65 percent of the cases during that period. Other asylum-seekers impacted by the policy came from Cuba, Ecuador, Venezuela, Nicaragua and other countries. Human rights organizations reported attacks, kidnappings, extortion and other forms of violence targeting asylum-seekers in Mexico while awaiting their hearings.</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">UNHCR has from the start expressed its serious concerns about the Migrant Protection Protocols and their impact on asylum-seekers’ safety and their due process rights. The adjustments to the policy, reinstated in December 2021, are not sufficient to address these fundamental concerns. UNHCR continues to engage with the U.S. government to support efforts to improve reception and processing arrangements for asylum-seekers arriving at the U.S. southwest border.</span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><a data-dcnode-id="561" name="What is UNHCR doing at the U.S.-Mexico border?"></a></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><img alt="" data-dcnode-id="558" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unrefugees.org/media/o0qnraqz/border-03-1200x800.png&amp;raw" width="100%"></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="553"><strong data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">What is UNHCR doing at the U.S.-Mexico border?</span></strong></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Along both sides of the U.S.-Mexico border, UNHCR partners with civil society, governments, faith-based organizations, legal service providers and others to strengthen the humanitarian response to better protect asylum-seekers, especially the most vulnerable among them.&nbsp;</span></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">UNHCR’s response has focused on supporting non-governmental shelters providing immediate housing and humanitarian assistance to asylum-seekers, expanding access to legal assistance for asylum-seekers, preventing the separation of families, and providing technical advice to government authorities on how to develop fair and efficient asylum systems that respect international refugee law.</span></p><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="543"><strong data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">How you can help…</span></strong></p><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="537"><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//give.unrefugees.org/191101wint_mainpg_p_3000%3F_ga%3D2.5557939.1600642163.1611065545-959856759.1585756438"><strong data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Become a monthly donor today</span></strong></a><span data-dcnode-id="538" instrument_node=""> and support UNHCR’s work to assist asylum-seekers at the U.S.-Mexico border as well as other people around the world fleeing conflict and persecution.</span></p></div><span data-dcnode-id="535" instrument_node="">
