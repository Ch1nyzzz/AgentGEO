</span><div class="col-md-9" data-dcnode-id="728"><span data-dcnode-id="1505" instrument_node="">
</span><div class="field_issue_overview clearfix block" data-dcnode-id="1500"><span data-dcnode-id="1504" instrument_node="">
</span><div class="clearfix field_issue_overview_content" data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">
</span></div><span data-dcnode-id="1501" instrument_node="">
</span></div><span data-dcnode-id="1499" instrument_node="">
</span><div class="field_issue_overview_extended clearfix block" data-dcnode-id="730"><span data-dcnode-id="1498" instrument_node="">
</span><div data-dcnode-id="732"><p data-dcnode-id="1493"><span data-dcnode-id="1497" instrument_node="">U.S. law enshrines the protections of the international Refugee Convention, drafted in the wake of the horrors of World War II. The law provides that any person “physically present in the United States or who arrives in the United States … irrespective of such [person’s] status, </span><a data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law.cornell.edu/uscode/text/8/1158" rel="noopener" target="_blank"><span data-dcnode-id="1496" instrument_node="">may apply for asylum</span></a><span data-dcnode-id="1494" instrument_node="">...”</span></p><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1487"><span data-dcnode-id="1491" instrument_node="">People seeking asylum in the United States come in search of safety from persecution, torture, and sometimes death. But upon their arrival, they face a new odyssey of navigating complex U.S. immigration laws and an increasingly restrictive environment that bars asylum seekers from winning protection. More and more, asylum seekers also face </span><a data-dcnode-id="1489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/research-items/off-shoring-asylum" rel="noopener" target="_blank"><span data-dcnode-id="1490" instrument_node="">push-backs over protection</span></a><span data-dcnode-id="1488" instrument_node="">, while the U.S. evades its obligations under domestic and international laws.</span></p><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1485" instrument_node="">Under the Trump administration, these challenges grew exponentially. Since 2017, the federal government has unleashed </span><a data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/timeline-trump-administrations-efforts-end-asylum" rel="noopener" target="_blank"><span data-dcnode-id="1484" instrument_node="">relentless attacks</span></a><span data-dcnode-id="1482" instrument_node=""> on the U.S. asylum system. Despite vowing to protect the right to asylum, President Biden has made few changes since taking office — and many of those changes have stalled in federal courts.</span></p><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1477" instrument_node="">
</span><h2 data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Recommendations to Repair the U.S. Asylum System and Hold the Biden Administration Accountable</span></h2><span data-dcnode-id="1474" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1473" instrument_node="">Protecting the right to asylum requires dismantling </span><a data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/timeline-trump-administrations-efforts-end-asylum" rel="noopener" target="_blank"><span data-dcnode-id="1472" instrument_node="">Trump’s systemic attacks</span></a><span data-dcnode-id="1470" instrument_node="">, as well as the pre-existing barriers that the prior administration built upon, and building new systems centered around justice and compassion. To begin, President Biden must:&nbsp;</span></p><span data-dcnode-id="1468" instrument_node="">
</span><ul data-dcnode-id="1407"><span data-dcnode-id="1467" instrument_node="">
</span><li data-dcnode-id="1457"><strong data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">End the Weaponization of Public Health</span></strong><span data-dcnode-id="1464" instrument_node=""> | </span><a data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23publichealth"><span data-dcnode-id="1463" instrument_node="">Read more</span></a><br data-dcnode-id="1461"><span data-dcnode-id="1460" instrument_node="">
</span><em data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">The COVID-19 pandemic has been used to ban and push back asylum seekers.&nbsp;</span></em></li><span data-dcnode-id="1456" instrument_node="">
</span><li data-dcnode-id="1444"><strong data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">Protect Immigrant Youth</span></strong><strong data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node=""> </span></strong><span data-dcnode-id="1451" instrument_node="">| </span><a data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23youth"><span data-dcnode-id="1450" instrument_node="">Read more</span></a><br data-dcnode-id="1448"><span data-dcnode-id="1447" instrument_node="">
</span><em data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Immigrant children have long been at the front lines of the broad and comprehensive assault on immigrants and asylum seekers.&nbsp;</span></em></li><span data-dcnode-id="1443" instrument_node="">
</span><li data-dcnode-id="1433"><strong data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Stop Offshoring Asylum </span></strong><span data-dcnode-id="1440" instrument_node="">| </span><a data-dcnode-id="1438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23offshoringasylum"><span data-dcnode-id="1439" instrument_node="">Read more</span></a><br data-dcnode-id="1437"><span data-dcnode-id="1436" instrument_node="">
</span><em data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">The U.S. has a disturbing history of forcing asylum seekers onto ill-equipped nations, rather than abide by its obligation to process them under domestic and international law. This includes pushing asylum seekers back to Mexico and Central American nations.&nbsp;</span></em></li><span data-dcnode-id="1432" instrument_node="">
</span><li data-dcnode-id="1420"><strong data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">End Due Process Violations&nbsp;</span></strong><span data-dcnode-id="1429" instrument_node="">| </span><a data-dcnode-id="1427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23dueprocess"><span data-dcnode-id="1428" instrument_node="">Read more</span></a><strong data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node=""> </span></strong><br data-dcnode-id="1424"><span data-dcnode-id="1423" instrument_node="">
</span><em data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Asylum seekers are frequently barred from seeking protection on technicalities while navigating a system in a language they do not speak and appearing without an attorney.</span></em></li><span data-dcnode-id="1419" instrument_node="">
</span><li data-dcnode-id="1409"><strong data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">End the Carceral Approach to Asylum </span></strong><span data-dcnode-id="1416" instrument_node="">| </span><a data-dcnode-id="1414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23carceralapproach"><span data-dcnode-id="1415" instrument_node="">Read more</span></a><br data-dcnode-id="1413"><span data-dcnode-id="1412" instrument_node="">
</span><em data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Any policy to detain asylum seekers, as a matter of course, finds its roots in mass incarceration and disproportionately targets Black, Brown, and Indigenous immigrants. Such policies should not form the basis for any legitimate government programs today.</span></em></li><span data-dcnode-id="1408" instrument_node="">
</span></ul><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1401"><span data-dcnode-id="1405" instrument_node="">NIJC's timeline highlighting the major events comprising the Trump&nbsp;administration’s assault on asylum seekers has </span><a data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/timeline-trump-administrations-efforts-end-asylum"><span data-dcnode-id="1404" instrument_node="">moved</span></a><span data-dcnode-id="1402" instrument_node="">.</span></p><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1398"><a data-dcnode-id="1399" id="publichealth" name="publichealth"></a></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1394" instrument_node="">
</span><h3 data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">End the Weaponization of Public Health&nbsp;</span></h3><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1388"><em data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">The COVID-19 pandemic has been used to ban and push back asylum seekers.</span></em></p><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1376"><strong data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Previous Administration:&nbsp;</span></strong><br data-dcnode-id="1384"><span data-dcnode-id="1383" instrument_node="">
Under the Trump Administration, the Centers for Disease Control used a 75-year old quarantine law to close the border, resulting in the summary expulsion of hundreds of thousands of adults, families, and children since March 2020. Following this policy, dubbed a “Stephen Miller special” by former Trump officials, the Trump administration proposed a rule that would label virtually all asylum seekers “dangers to national security” on public health grounds.&nbsp;</span><br data-dcnode-id="1382"><span data-dcnode-id="1381" instrument_node="">
</span><br data-dcnode-id="1380"><span data-dcnode-id="1379" instrument_node="">
</span><strong data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Current Status:&nbsp;</span></strong></p><span data-dcnode-id="1375" instrument_node="">
</span><ul data-dcnode-id="1320"><span data-dcnode-id="1374" instrument_node="">
</span><li data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Far from ending Trump’s public health expulsions, the Biden administration has broken records in expelling adults, families, and children back to harm. President Biden has more than doubled expulsions since coming into office, resulting in nearly a million expulsions from March 2020 to July 2021.&nbsp;</span></li><span data-dcnode-id="1371" instrument_node="">
</span><li data-dcnode-id="1363"><span data-dcnode-id="1370" instrument_node="">Biden’s continued summary expulsions have caused </span><a data-dcnode-id="1368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.humanrightsfirst.org/sites/default/files/HumanRightsTravesty_FINAL.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1369" instrument_node="">thousands</span></a><span data-dcnode-id="1367" instrument_node=""> of reported rapes, assaults, kidnappings, and murders of asylum seekers. The Biden administration has also </span><a data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehill.com/latino/572588-advocates-in-utter-disbelief-after-biden-resumes-haitian-repatriations" rel="noopener" target="_blank"><span data-dcnode-id="1366" instrument_node="">resumed expelling Haitian asylum seekers</span></a><span data-dcnode-id="1364" instrument_node="">, despite political turmoil and violence following the Haitian president’s assassination, compounded with a recent earthquake and devastating storms.</span></li><span data-dcnode-id="1362" instrument_node="">
</span><li data-dcnode-id="1354"><span data-dcnode-id="1361" instrument_node="">The </span><a data-dcnode-id="1359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/en-us/news/press/2021/8/6113dfc14/unhcr-concerned-expulsion-flights-under-covid-19-asylum-restrictions.html" rel="noopener" target="_blank"><span data-dcnode-id="1360" instrument_node="">United Nations’ Refugee Agency</span></a><span data-dcnode-id="1358" instrument_node=""> has called on the Biden administration to end these expulsions. Alarmingly, Biden’s continued expulsion policy appears to incentivize other nations to violate international law, following </span><a data-dcnode-id="1356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apnews.com/article/joe-biden-health-immigration-coronavirus-pandemic-4a86cc7bc8eda3c0ae2fd3bfcaebf0b2" rel="noopener" target="_blank"><span data-dcnode-id="1357" instrument_node="">reports</span></a><span data-dcnode-id="1355" instrument_node=""> that the U.S. expelled asylum seekers to Southern Mexico, before Mexican officials pushed them back to Central America.&nbsp;</span></li><span data-dcnode-id="1353" instrument_node="">
</span><li data-dcnode-id="1345"><span data-dcnode-id="1352" instrument_node="">Public health experts, including </span><a data-dcnode-id="1350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houstonchronicle.com/opinion/outlook/article/Opinion-Don-t-close-border-to-asylum-16451127.php%3Futm_source%3Dtwitter.com%26utm_medium%3Dreferral%26utm_campaign%3Dsftwitter" rel="noopener" target="_blank"><span data-dcnode-id="1351" instrument_node="">former CDC officials</span></a><span data-dcnode-id="1349" instrument_node="">, continue to find </span><a data-dcnode-id="1347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.publichealth.columbia.edu/node/76271" rel="noopener" target="_blank"><span data-dcnode-id="1348" instrument_node="">no public health rationale</span></a><span data-dcnode-id="1346" instrument_node=""> for those expulsions and called out the racist premise of presenting migrants as vectors of disease.</span></li><span data-dcnode-id="1344" instrument_node="">
</span><li data-dcnode-id="1328"><span data-dcnode-id="1343" instrument_node="">Despite ongoing </span><a data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aclu.org/cases/huisha-huisha-v-mayorkas" rel="noopener" target="_blank"><span data-dcnode-id="1342" instrument_node="">litigation</span></a><span data-dcnode-id="1340" instrument_node=""> from asylum seeking families, the Biden administration </span><a data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbsnews.com/news/immigration-title-42-migrant-expulsions-aclu-lawsuit/" rel="noopener" target="_blank"><span data-dcnode-id="1339" instrument_node="">has refused to end</span></a><span data-dcnode-id="1337" instrument_node=""> this mass expulsion policy. The Biden administration only exempted one group (unaccompanied children), after a federal judge found their expulsion unlawful under Trump. &nbsp;Asylum-seeking families won a </span><a data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbsnews.com/news/immigration-title-42-migrant-expulsions-aclu-lawsuit/" rel="noopener" target="_blank"><span data-dcnode-id="1336" instrument_node="">temporary</span></a><span data-dcnode-id="1334" instrument_node=""> exemption process for families and then a </span><a data-dcnode-id="1332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pacer-documents.s3.amazonaws.com/36/225870/04518771448.pdf%3Fresponse-content-disposition%3Dinline%253B%2520filename%253D%25222021.09.16.0123%2520MEMORANDUM.pdf%2522%26X-Amz-Expires%3D3600%26X-Amz-Date%3D20210916T175218Z%26X-Amz-Algorithm%3DAWS4-HMAC-SHA256%26X-Amz-Credential%3DAKIAJDK6JKKSMS3DQS4Q%252F20210916%252Fus-east-1%252Fs3%252Faws4_request%26X-Amz-SignedHeaders%3Dhost%26X-Amz-Signature%3Ddec2b2706e08402c1cbe4536dde02df1f7a8291ec9ca8eff803ed343a7e73a1b" rel="noopener" target="_blank"><span data-dcnode-id="1333" instrument_node="">judicial stay</span></a><span data-dcnode-id="1331" instrument_node=""> of Title 42 expulsions after the Biden administration showed no sign of ending its Title 42 expulsion policy. This stay is slated to shield families from expulsions as of October 1, 2021. [</span><em data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Huisha-Huisha v. Mayorkas]</span></em></li><span data-dcnode-id="1327" instrument_node="">
</span><li data-dcnode-id="1322"><span data-dcnode-id="1326" instrument_node="">In a rare glimpse of hope, the Biden administration is planning to </span><a data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reginfo.gov/public/do/eAgendaViewRule%3FpubId%3D202104%26RIN%3D1615-AC69" rel="noopener" target="_blank"><span data-dcnode-id="1325" instrument_node="">modify or rescind</span></a><span data-dcnode-id="1323" instrument_node=""> the Trump-era rule that labeled asylum seekers as dangers to national security.</span></li><span data-dcnode-id="1321" instrument_node="">
</span></ul><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1314"><br data-dcnode-id="1318"><span data-dcnode-id="1317" instrument_node="">
</span><strong data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">NIJC Recommendations:</span></strong></p><span data-dcnode-id="1313" instrument_node="">

</span><li data-dcnode-id="1308"><a data-dcnode-id="1310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/staff/blog/biden-administration-continuing-trumps-unlawful-expulsions-asylum-seekers-name-public" rel="noopener" target="_blank"><span data-dcnode-id="1311" instrument_node="">Rescind the Title 42 Summary Expulsion Order.</span></a><span data-dcnode-id="1309" instrument_node=""> Immediately reopen the border to asylum seekers and end the misuse of public health law for immigration enforcement.</span></li><span data-dcnode-id="1307" instrument_node="">
</span><li data-dcnode-id="1302"><span data-dcnode-id="1306" instrument_node="">Rescind the Trump </span><a data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/staff/blog/trump-exploiting-coronavirus-pandemic-yet-another-attempt-block-asylum-seekers" rel="noopener" target="_blank"><span data-dcnode-id="1305" instrument_node="">proposed rule</span></a><span data-dcnode-id="1303" instrument_node=""> to label asylum seekers dangers to national security on public health grounds.</span></li><span data-dcnode-id="1301" instrument_node="">
</span></ul><span data-dcnode-id="1299" instrument_node="">

</span><li data-dcnode-id="1290"><a data-dcnode-id="1292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/staff/blog/exploiting-pandemic-expel-asylum-seekers-faq-why-title-42-expulsions-must-end"><span data-dcnode-id="1293" instrument_node="">An FAQ on why Title 42 expulsions must end</span></a><span data-dcnode-id="1291" instrument_node=""> (April 2022)</span></li><span data-dcnode-id="1289" instrument_node="">

</span><h3 data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Protect Immigrant Youth</span></h3><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1260"><em data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Immigrant children have long been at the front lines of the broad and comprehensive assault on immigrants and asylum seekers.&nbsp;</span></em></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1254"><strong data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Previous Administration:&nbsp;</span></strong><br data-dcnode-id="1256"><span data-dcnode-id="1255" instrument_node="">
Treating children as both scapegoats and guinea pigs, the prior administration mounted a campaign to villainize immigrant children, keep them in indefinite detention, and incarcerate their parents and sponsors. Systemic separation of children from parents, paired with the mass prosecution of parents, caused life-long trauma to immigrant children.</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1250"><strong data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Current Status:&nbsp;</span></strong></p><span data-dcnode-id="1249" instrument_node="">
</span><ul data-dcnode-id="1208"><span data-dcnode-id="1248" instrument_node="">
</span><li data-dcnode-id="1237"><span data-dcnode-id="1247" instrument_node="">The Flores settlement is a binding agreement providing guidelines for the care of immigrant children who are in U.S. government custody, reached in 1997 as a result of a class action filed on behalf of detained children. Largely gutted under Trump, a federal court of appeals has </span><a data-dcnode-id="1245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ca9.uscourts.gov/datastore/opinions/2020/12/29/19-56326.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1246" instrument_node="">upheld</span></a><span data-dcnode-id="1244" instrument_node=""> key elements of an injunction to continue Flores protections by the end of 2020; upon taking office, the Biden administration has yet to commit to full compliance with Flores and has implemented the broad use of </span><a data-dcnode-id="1242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elpasotimes.com/story/news/2021/05/27/migrant-children-shelter-el-paso-fort-bliss-conditions-unacceptable/7446897002/" rel="noopener" target="_blank"><span data-dcnode-id="1243" instrument_node="">unlicensed facilities</span></a><span data-dcnode-id="1241" instrument_node="">, where children are vulnerable to </span><a data-dcnode-id="1239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whistleblower.org/press-release/press-release-new-detailed-whistleblower-evidence-further-documenting-abuses-of-unaccompanied-immigrant-children-warehoused-by-the-federal-government-at-fort-bliss-and-other-emergency-intake-sites/" rel="noopener" target="_blank"><span data-dcnode-id="1240" instrument_node="">abusive and deeply alarming conditions</span></a><span data-dcnode-id="1238" instrument_node="">.&nbsp;</span></li><span data-dcnode-id="1236" instrument_node="">
</span><li data-dcnode-id="1231"><span data-dcnode-id="1235" instrument_node="">The Biden administration has diminished, but not formally ended the use of family detention, which often ran afoul of the Flores Settlement Agreement. Instead, the administration has continued to detain families in hotels. NIJC advocates, </span><a data-dcnode-id="1233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/staff/blog/calls-grow-investment-border-welcoming-centers-arriving-families" rel="noopener" target="_blank"><span data-dcnode-id="1234" instrument_node="">instead</span></a><span data-dcnode-id="1232" instrument_node="">, for the government to invest in nonprofit shelters where families would have ready access to services (including representation).</span></li><span data-dcnode-id="1230" instrument_node="">
</span><li data-dcnode-id="1219"><span data-dcnode-id="1229" instrument_node="">On the plus side, the Biden administration has taken </span><a data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msn.com/en-us/news/politics/biden-administration-expanding-efforts-to-reunite-separated-migrant-families/ar-AAOoTTa" rel="noopener" target="_blank"><span data-dcnode-id="1228" instrument_node="">constructive steps</span></a><span data-dcnode-id="1226" instrument_node=""> towards the reunification of hundreds of families separated under the Trump administration and rescinded an interagency </span><a data-dcnode-id="1224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/research-items/report-children-bait-impacts-orr-dhs-information-sharing-agreement" rel="noopener" target="_blank"><span data-dcnode-id="1225" instrument_node="">agreement</span></a><span data-dcnode-id="1223" instrument_node=""> that weaponized family reunification and kept unaccompanied children detained indefinitely. Permanency for separated families will require Congressional action, such as the passage of the </span><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//castro.house.gov/media-center/press-releases/castro-and-blumenthal-reintroduce-the-families-belong-together-act-to-reunite-separated-migrant-families" rel="noopener" target="_blank"><span data-dcnode-id="1222" instrument_node="">Families Belong Together Act</span></a><span data-dcnode-id="1220" instrument_node="">.</span></li><span data-dcnode-id="1218" instrument_node="">
</span><li data-dcnode-id="1210"><span data-dcnode-id="1217" instrument_node="">The Biden administration entered into a secretive contract with a juvenile jail in Virginia to </span><a data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/staff/blog/documents-reveal-new-ice-jail-children-virginia" rel="noopener" target="_blank"><span data-dcnode-id="1216" instrument_node="">detain youth in ICE custody</span></a><span data-dcnode-id="1214" instrument_node="">. ICE has a record of detaining youth </span><a data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thenation.com/article/society/ice-juvenile-jail-detention/" rel="noopener" target="_blank"><span data-dcnode-id="1213" instrument_node="">indefinitely</span></a><span data-dcnode-id="1211" instrument_node="">, across administrations.&nbsp;</span></li><span data-dcnode-id="1209" instrument_node="">
</span></ul><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1204"><strong data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">NIJC Recommendations:</span></strong></p><span data-dcnode-id="1203" instrument_node="">
</span><ul data-dcnode-id="1168"><span data-dcnode-id="1202" instrument_node="">
</span><li data-dcnode-id="1195"><strong data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Reinstate protection</span></strong><span data-dcnode-id="1199" instrument_node=""> afforded under the </span><strong data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Flores Settlement Agreement</span></strong><span data-dcnode-id="1196" instrument_node="">.&nbsp;</span></li><span data-dcnode-id="1194" instrument_node="">
</span><li data-dcnode-id="1189"><span data-dcnode-id="1193" instrument_node="">Promote </span><strong data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">transparency and oversight</span></strong><span data-dcnode-id="1190" instrument_node=""> in detention centers where children are being held to ensure their health and safety is not being put at risk.</span></li><span data-dcnode-id="1188" instrument_node="">
</span><li data-dcnode-id="1181"><strong data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Transition away from the detention of families in any form</span></strong><span data-dcnode-id="1185" instrument_node=""> </span><strong data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">and toward reception shelters</span></strong><span data-dcnode-id="1182" instrument_node="">, where families can safely access services and allow families full due process protection to pursue their asylum claims.</span></li><span data-dcnode-id="1180" instrument_node="">
</span><li data-dcnode-id="1175"><span data-dcnode-id="1179" instrument_node="">Install a </span><strong data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">robust firewall</span></strong><span data-dcnode-id="1176" instrument_node=""> that protects unaccompanied children’s private information from their use by Immigration and Customs Enforcement (ICE).</span></li><span data-dcnode-id="1174" instrument_node="">
</span><li data-dcnode-id="1170"><strong data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">End the detention of children and young adults</span></strong><span data-dcnode-id="1171" instrument_node=""> in ICE custody.</span></li><span data-dcnode-id="1169" instrument_node="">
</span></ul><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1164"><strong data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Read More:&nbsp;</span></strong></p><span data-dcnode-id="1163" instrument_node="">
</span><ul data-dcnode-id="1129"><span data-dcnode-id="1162" instrument_node="">
</span><li data-dcnode-id="1157"><span data-dcnode-id="1161" instrument_node="">NIJC Comment on </span><a data-dcnode-id="1159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/staff/blog/nijcs-public-comment-trump-administrations-proposed-regulations-indefinitely-detain" rel="noopener" target="_blank"><span data-dcnode-id="1160" instrument_node="">Flores proposed regulations</span></a><span data-dcnode-id="1158" instrument_node=""> (November 2018)&nbsp;</span></li><span data-dcnode-id="1156" instrument_node="">
</span><li data-dcnode-id="1148"><span data-dcnode-id="1155" instrument_node="">NIJC Joint Report: </span><a data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/press-releases/nijc-applauds-new-memo-ending-hhs-dhs-information-sharing-agreement" rel="noopener" target="_blank"><span data-dcnode-id="1154" instrument_node="">Children as Bait: Impacts of the ORR-DHS Information-Sharing Agreement</span></a><span data-dcnode-id="1152" instrument_node=""> (March 2019); NIJC </span><a data-dcnode-id="1150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/press-releases/nijc-applauds-new-memo-ending-hhs-dhs-information-sharing-agreement" rel="noopener" target="_blank"><span data-dcnode-id="1151" instrument_node="">response</span></a><span data-dcnode-id="1149" instrument_node=""> to Biden rescission of agreement, renewing call for robust firewall (March 2021)&nbsp;</span></li><span data-dcnode-id="1147" instrument_node="">
</span><li data-dcnode-id="1142"><span data-dcnode-id="1146" instrument_node="">On the detention of families: </span><a data-dcnode-id="1144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/staff/blog/calls-grow-investment-border-welcoming-centers-arriving-families" rel="noopener" target="_blank"><span data-dcnode-id="1145" instrument_node="">Calls Grow for Investment in Border Welcoming Centers for Arriving Families</span></a><span data-dcnode-id="1143" instrument_node=""> (July 2021)</span></li><span data-dcnode-id="1141" instrument_node="">
</span><li data-dcnode-id="1137"><a data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/staff/blog/documents-reveal-new-ice-jail-children-virginia%23signatures" rel="noopener" target="_blank"><span data-dcnode-id="1140" instrument_node="">Documents Reveal New ICE Jail for Children in Virginia</span></a><span data-dcnode-id="1138" instrument_node=""> (May &nbsp;2021)</span></li><span data-dcnode-id="1136" instrument_node="">
</span><li data-dcnode-id="1131"><span data-dcnode-id="1135" instrument_node="">Biden administration’s </span><a data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dhs.gov/publication/family-reunification-task-force-progress-reports" rel="noopener" target="_blank"><span data-dcnode-id="1134" instrument_node="">progress report </span></a><span data-dcnode-id="1132" instrument_node="">on the reunification of separated families (August 2021)</span></li><span data-dcnode-id="1130" instrument_node="">
</span></ul><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><a data-dcnode-id="1127" id="offshoringasylum" name="offshoringasylum"></a></p><span data-dcnode-id="1125" instrument_node="">
</span><h3 data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Stop Offshoring Asylum&nbsp;</span></h3><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1119"><em data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">The U.S. has a disturbing history of forcing asylum seekers onto ill-equipped nations, rather than abide by its obligation to process them under domestic and international law. This includes pushing asylum seekers back to Mexico and Central American nations. &nbsp;</span></em></p><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1113"><strong data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">Previous Administration:&nbsp;</span></strong><br data-dcnode-id="1115"><span data-dcnode-id="1114" instrument_node="">
To deter asylum seekers, the Trump Administration entered into unsafe third country agreements with Honduras, El Salvador, and Guatemala. The Migrant Protection Protocols (MPP) program forced over 70,000 adults and children to remain in dangerous situations in Mexico (despite having no roots or caregivers there) while their cases were pending in US immigration courts. Tens of thousands more were forced to wait outside the U.S. under specious pretexts that the U.S. lacked capacity. Finally, the Trump administration continued prior policies of intercepting and pushing back asylum seekers apprehended at sea.</span></p><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1109"><strong data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Current Status:&nbsp;</span></strong></p><span data-dcnode-id="1108" instrument_node="">
</span><ul data-dcnode-id="1058"><span data-dcnode-id="1107" instrument_node="">
</span><li data-dcnode-id="1090"><span data-dcnode-id="1106" instrument_node="">Fortunately, the Biden Administration </span><a data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.gov/suspending-and-terminating-the-asylum-cooperative-agreements-with-the-governments-el-salvador-guatemala-and-honduras/" rel="noopener" target="_blank"><span data-dcnode-id="1105" instrument_node="">announced</span></a><span data-dcnode-id="1103" instrument_node=""> that it is suspending cooperative agreements with El Salvador, Guatemala, and Honduras. Still, there are concerns that the administration’s new </span><a data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/wp-content/uploads/2021/07/Collaborative-Migration-Management-Strategy.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1102" instrument_node="">regional border “management” initiatives</span></a><span data-dcnode-id="1100" instrument_node="">, which entail building migrant processing centers and boosting asylum infrastructure in Central America, will recycle prior offshoring mechanisms. Meanwhile, Biden and his cabinet members are pressuring southern neighbors to </span><a data-dcnode-id="1098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/us-usa-immigration-troops/mexico-honduras-guatemala-to-increase-troops-along-borders-white-house-official-idUSKBN2BZ1V2" rel="noopener" target="_blank"><span data-dcnode-id="1099" instrument_node="">militarize</span></a><span data-dcnode-id="1097" instrument_node=""> their borders and repeatedly telling migrants “</span><a data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.latimes.com/california/story/2021-06-09/kamala-harris-guatemala-immigration-speech-plays-to-voters" rel="noopener" target="_blank"><span data-dcnode-id="1096" instrument_node="">don’t</span></a><span data-dcnode-id="1094" instrument_node=""> </span><a data-dcnode-id="1092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//transcripts.cnn.com/TRANSCRIPTS/2107/21/se.01.html" rel="noopener" target="_blank"><span data-dcnode-id="1093" instrument_node="">come</span></a><span data-dcnode-id="1091" instrument_node="">” to the U.S., despite their right to seek asylum.</span></li><span data-dcnode-id="1089" instrument_node="">
</span><li data-dcnode-id="1078"><span data-dcnode-id="1088" instrument_node="">Although the Biden administration began winding down MPP and processed over 13,000 asylum seekers with active MPP cases, litigation </span><a data-dcnode-id="1086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apnews.com/article/joe-biden-mexico-courts-immigration-8d82420a572999b886928244abc0f1b3" rel="noopener" target="_blank"><span data-dcnode-id="1087" instrument_node="">halted</span></a><span data-dcnode-id="1085" instrument_node=""> their efforts and mandated a reimplementation of the unlawful and deadly program. Rather than terminate it again based on the extensive record of atrocities, the Biden administration has reportedly contemplated </span><a data-dcnode-id="1083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vice.com/en/article/qj8a3d/the-biden-admin-is-considering-reviving-trumps-remain-in-mexico-policy-for-migrants" rel="noopener" target="_blank"><span data-dcnode-id="1084" instrument_node="">creating its own version of the Trump-era program</span></a><span data-dcnode-id="1082" instrument_node="">. [</span><em data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Texas v. Biden</span></em><span data-dcnode-id="1079" instrument_node="">]</span></li><span data-dcnode-id="1077" instrument_node="">
</span><li data-dcnode-id="1066"><span data-dcnode-id="1076" instrument_node="">A federal court declared that the practice of </span><a data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ccrjustice.org/sites/default/files/attach/2021/09/742%2520Order%2520granting%2520in%2520part%2520Plaintiffs%2520Motion%2520for%2520Summary%2520Judgment%25202021.08.02.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1075" instrument_node="">“metering” (or routine turnbacks of asylum seekers at the border) unlawful</span></a><span data-dcnode-id="1073" instrument_node="">. Tens of thousands were forced to wait </span><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.strausscenter.org/publications/metering-update-august-2021/" rel="noopener" target="_blank"><span data-dcnode-id="1072" instrument_node="">months or years</span></a><span data-dcnode-id="1070" instrument_node=""> to exercise their right to seek asylum at U.S. ports of entry. [</span><em data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Al Otro Lado v. Mayorkas</span></em><span data-dcnode-id="1067" instrument_node="">]</span></li><span data-dcnode-id="1065" instrument_node="">
</span><li data-dcnode-id="1060"><span data-dcnode-id="1064" instrument_node="">DHS Secretary Mayorkas recently issued a </span><a data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/immigration/cuba-haiti-migrants-mayorkas/2021/07/13/2234e728-e41d-11eb-a41e-c8442c213fa8_story.html" rel="noopener" target="_blank"><span data-dcnode-id="1063" instrument_node="">stark warning</span></a><span data-dcnode-id="1061" instrument_node=""> to Cuban and Haitian refugees seeking protection at sea: regardless of the dangers they face, none will be processed for asylum in the United States. If not returned to the places they fled, asylum seekers will be sent to third countries.&nbsp;</span></li><span data-dcnode-id="1059" instrument_node="">
</span></ul><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1054"><strong data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">NIJC Recommendations:</span></strong></p><span data-dcnode-id="1053" instrument_node="">
</span><ul data-dcnode-id="1036"><span data-dcnode-id="1052" instrument_node="">
</span><li data-dcnode-id="1048"><strong data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Terminate</span></strong><span data-dcnode-id="1049" instrument_node=""> the Migrant Protection Protocols (MPP) program.</span></li><span data-dcnode-id="1047" instrument_node="">
</span><li data-dcnode-id="1043"><strong data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Prompt and safe pathway for admission</span></strong><span data-dcnode-id="1044" instrument_node=""> into the US for those subjected to “metering,” or fabricated waiting lists that Customs and Border Protection (CBP) used to push back tens of thousands of asylum seekers.</span></li><span data-dcnode-id="1042" instrument_node="">
</span><li data-dcnode-id="1038"><strong data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Suspend any agreement</span></strong><span data-dcnode-id="1039" instrument_node=""> with Mexico or Central American nations to militarize borders or process or detain asylum seekers outside the United States.</span></li><span data-dcnode-id="1037" instrument_node="">
</span></ul><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1032"><strong data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Read More:&nbsp;</span></strong></p><span data-dcnode-id="1031" instrument_node="">
</span><ul data-dcnode-id="1013"><span data-dcnode-id="1030" instrument_node="">
</span><li data-dcnode-id="1025"><span data-dcnode-id="1029" instrument_node="">NIJC’s </span><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supremecourt.gov/DocketPDF/19/19-1212/167002/20210122140606391_19-1212%2520Amicus%2520Brief%2520-%2520Laredo%2520Project%2520-%2520For%2520Printing%2520and%2520Filing.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1028" instrument_node="">amicus brief</span></a><span data-dcnode-id="1026" instrument_node=""> on the devastating harm of MPP to asylum seekers (January 2021)</span></li><span data-dcnode-id="1024" instrument_node="">
</span><li data-dcnode-id="1020"><a data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.humanrightsfirst.org/sites/default/files/NGO%2520Letter%2520on%2520Urgent%2520Actions%2520the%2520Biden%2520Administration%2520Must%2520Take%2520Following%2520Supreme%2520Court%2520Decision%2520on%2520MPP.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1023" instrument_node="">Letter from 108 organizations</span></a><span data-dcnode-id="1021" instrument_node=""> calling on President Biden to urgently terminate MPP (August 2021)</span></li><span data-dcnode-id="1019" instrument_node="">
</span><li data-dcnode-id="1015"><a data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/research-items/off-shoring-asylum" rel="noopener" target="_blank"><span data-dcnode-id="1018" instrument_node="">NIJC Joint Report: Pushing Back Protection: How Offshoring and Externalization Imperil the Right to Asylum </span></a><span data-dcnode-id="1016" instrument_node="">(August 2021)</span></li><span data-dcnode-id="1014" instrument_node="">
</span></ul><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1009" instrument_node="">
</span><h3 data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">End Due Process Violations&nbsp;</span></h3><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="995"><em data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Asylum seekers are frequently barred from seeking protection on technicalities while navigating a system in a language they do not speak and appearing without an attorney.</span></em><br data-dcnode-id="1003"><span data-dcnode-id="1002" instrument_node="">
</span><br data-dcnode-id="1001"><span data-dcnode-id="1000" instrument_node="">
</span><strong data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Previous Administration:&nbsp;</span></strong><br data-dcnode-id="997"><span data-dcnode-id="996" instrument_node="">
The Trump Administration codified rushed asylum processing curtailing access to judicial review, putting asylum seekers at risk for deportation without due process. Yet asylum seekers already face near-insurmountable barriers, as many do not have counsel, are detained, traumatized, and lack access to the necessary evidence.&nbsp;</span></p><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="991"><strong data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Current Status:&nbsp;</span></strong></p><span data-dcnode-id="990" instrument_node="">
</span><ul data-dcnode-id="961"><span data-dcnode-id="989" instrument_node="">
</span><li data-dcnode-id="984"><span data-dcnode-id="988" instrument_node="">The Trump rule which </span><a data-dcnode-id="986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/press-releases/illinois-advocates-advise-immigrants-prepare-trump-extends-expedited-removal-program" rel="noopener" target="_blank"><span data-dcnode-id="987" instrument_node="">expanded expedited removal nationwide</span></a><span data-dcnode-id="985" instrument_node=""> is currently in effect. The Biden administration has not indicated that it plans to rescind this expansion.</span></li><span data-dcnode-id="983" instrument_node="">
</span><li data-dcnode-id="975"><span data-dcnode-id="982" instrument_node="">Similar to other programs, the White House has announced that they are reviewing expedited removal to determine if “</span><a data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/briefing-room/presidential-actions/2021/02/02/executive-order-creating-a-comprehensive-regional-framework-to-address-the-causes-of-migration-to-manage-migration-throughout-north-and-central-america-and-to-provide-safe-and-orderly-processing/" rel="noopener" target="_blank"><span data-dcnode-id="981" instrument_node="">modifying, revoking, or rescinding</span></a><span data-dcnode-id="979" instrument_node="">” is the appropriate course of action. However, President Biden recently </span><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/documents/2021/08/20/2021-17779/procedures-for-credible-fear-screening-and-consideration-of-asylum-withholding-of-removal-and-cat" rel="noopener" target="_blank"><span data-dcnode-id="978" instrument_node="">proposed a regulation that would expand expedited removal</span></a><span data-dcnode-id="976" instrument_node=""> and subject the vast majority of asylum seekers to rushed, unfair proceedings. While this review process is taking place, asylum seekers can continue to be removed without judicial involvement.&nbsp;</span></li><span data-dcnode-id="974" instrument_node="">
</span><li data-dcnode-id="969"><span data-dcnode-id="973" instrument_node="">The Biden Administration has announced that it will subject families to </span><a data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trac.syr.edu/immigration/reports/660/" rel="noopener" target="_blank"><span data-dcnode-id="972" instrument_node="">expedited hearings</span></a><span data-dcnode-id="970" instrument_node=""> in what has already become a chaotic, backlogged, and alarming process that lacks basic safeguards, such as the right to counsel.&nbsp;</span></li><span data-dcnode-id="968" instrument_node="">
</span><li data-dcnode-id="963"><span data-dcnode-id="967" instrument_node="">The Biden administration continues to defend various rules proposed and finalized under Trump, seeking appeals on </span><a data-dcnode-id="965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/press-releases/federal-court-halts-trump-rule-would-have-blocked-access-asylum-process" rel="noopener" target="_blank"><span data-dcnode-id="966" instrument_node="">injunctions</span></a><span data-dcnode-id="964" instrument_node=""> won by asylum seekers and their advocates.</span></li><span data-dcnode-id="962" instrument_node="">
</span></ul><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="957"><strong data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">NIJC Recommendations:&nbsp;</span></strong></p><span data-dcnode-id="956" instrument_node="">
</span><ul data-dcnode-id="931"><span data-dcnode-id="955" instrument_node="">
</span><li data-dcnode-id="951"><span data-dcnode-id="954" instrument_node="">Provide asylum seekers and other vulnerable populations with guaranteed counsel and protect &nbsp;their right to </span><strong data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">fair hearings and appeals processes.</span></strong></li><span data-dcnode-id="950" instrument_node="">
</span><li data-dcnode-id="946"><strong data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Rescind the Trump rule</span></strong><span data-dcnode-id="947" instrument_node=""> that expanded expedited removal nationwide.</span></li><span data-dcnode-id="945" instrument_node="">
</span><li data-dcnode-id="941"><strong data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Exercise discretion NOT to place individuals apprehended at the border into expedited removal. proceedings</span></strong><span data-dcnode-id="942" instrument_node="">, where right to counsel is curtailed and asylum seekers are hastily deported.</span></li><span data-dcnode-id="940" instrument_node="">
</span><li data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Move toward more robust due process protections for asylum seekers’ instead of rolling back current protections.&nbsp;</span></li><span data-dcnode-id="937" instrument_node="">
</span><li data-dcnode-id="933"><strong data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Rescind and forbear implementation of Trump regulations</span></strong><span data-dcnode-id="934" instrument_node=""> related to appeals, increased fees, and expediting asylum application filings.</span></li><span data-dcnode-id="932" instrument_node="">
</span></ul><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="926"><strong data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Read More</span></strong><span data-dcnode-id="927" instrument_node="">:&nbsp;</span></p><span data-dcnode-id="925" instrument_node="">
</span><ul data-dcnode-id="902"><span data-dcnode-id="924" instrument_node="">
</span><li data-dcnode-id="919"><span data-dcnode-id="923" instrument_node="">United States Commission on International Religious Freedom (USCIRF), </span><a data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscirf.gov/sites/default/files/Reportcard%2520Scorecard_0.pdf" rel="noopener" target="_blank"><span data-dcnode-id="922" instrument_node="">Expedited Removal Study Report Card: 2 Years Later</span></a><span data-dcnode-id="920" instrument_node=""> (2007)</span></li><span data-dcnode-id="918" instrument_node="">
</span><li data-dcnode-id="914"><a data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/press-releases/illinois-advocates-advise-immigrants-prepare-trump-extends-expedited-removal-program" rel="noopener" target="_blank"><span data-dcnode-id="917" instrument_node="">Illinois Advocates Advise Immigrants to Prepare as Trump Extends Expedited Removal Program to Entire U.S.</span></a><span data-dcnode-id="915" instrument_node=""> (July 2019)</span></li><span data-dcnode-id="913" instrument_node="">
</span><li data-dcnode-id="909"><a data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/press-releases/us-supreme-court-limits-judicial-review-over-expedited-removal" rel="noopener" target="_blank"><span data-dcnode-id="912" instrument_node="">U.S. Supreme Court Limits Judicial Review Over Expedited Removal </span></a><span data-dcnode-id="910" instrument_node="">(June 2020)</span></li><span data-dcnode-id="908" instrument_node="">
</span><li data-dcnode-id="904"><a data-dcnode-id="906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trac.syr.edu/immigration/reports/660/" rel="noopener" target="_blank"><span data-dcnode-id="907" instrument_node="">Immigration Court Struggling to Manage Its Expanding Dedicated Docket of Asylum-Seeking Families</span></a><span data-dcnode-id="905" instrument_node=""> (September 2021)</span></li><span data-dcnode-id="903" instrument_node="">
</span></ul><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><a data-dcnode-id="900" id="carceralapproach" name="carceralapproach"></a></p><span data-dcnode-id="898" instrument_node="">
</span><h3 data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">End the Carceral Approach to Asylum</span></h3><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="892"><em data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Any policy to detain asylum seekers, as a matter of course, finds its roots in mass incarceration and disproportionately targets Black, Brown, and Indigenous immigrants. Such policies should not form the basis for any legitimate government programs today.</span></em></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="885"><strong data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Previous Administration</span></strong><span data-dcnode-id="888" instrument_node="">:&nbsp;</span><br data-dcnode-id="887"><span data-dcnode-id="886" instrument_node="">
The Trump administration implemented a “Zero-Tolerance” policy in 2018 that all arriving migrants, which includes asylum seekers, were to be criminally prosecuted for illegal entry, and prioritized criminal prosecutions for both unauthorized entry or reentry, dramatically increasing such prosecutions by nearly 50 percent from fiscal years 2017 to 2019. The Trump administration also used detention as deterrence and punishment against asylum seekers.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="881"><strong data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Current Status:&nbsp;</span></strong></p><span data-dcnode-id="880" instrument_node="">
</span><ul data-dcnode-id="818"><span data-dcnode-id="879" instrument_node="">
</span><li data-dcnode-id="871"><span data-dcnode-id="878" instrument_node="">The Justice Department rescinded the Zero-Tolerance directive in January 2021, ending the guidance behind the Trump administration’s family separation program. However, the Biden/Harris administration continues to rely on Section 1326 prosecutions, and still preserved the de facto prosecutorial practice of prioritizing entry and reentry prosecutions. Under this administration, CBP also has launched a “</span><a data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbp.gov/newsroom/national-media-release/cbp-releases-july-2021-operational-update" rel="noopener" target="_blank"><span data-dcnode-id="877" instrument_node="">Repeat Offender initiative</span></a><span data-dcnode-id="875" instrument_node="">” that will lead to an increase in </span><a data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/press-releases/nijc-demands-civil-rights-investigation-migration-related-prosecutions-systematic" rel="noopener" target="_blank"><span data-dcnode-id="874" instrument_node="">prosecutions of asylum seekers</span></a><span data-dcnode-id="872" instrument_node=""> and everyone subject to Title 42 expulsions.</span></li><span data-dcnode-id="870" instrument_node="">
</span><li data-dcnode-id="856"><span data-dcnode-id="869" instrument_node="">Under President Biden, ICE detention has </span><a data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apnews.com/article/joe-biden-health-immigration-coronavirus-pandemic-4d7427ff67d586a77487b7efec58e74d" rel="noopener" target="_blank"><span data-dcnode-id="868" instrument_node="">nearly doubled</span></a><span data-dcnode-id="866" instrument_node="">. The Biden/Harris administration has yet to commit to ending the use of immigration detention (</span><a data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/research-items/policy-brief-5-reasons-end-immigrant-detention" rel="noopener" target="_blank"><span data-dcnode-id="865" instrument_node="">policy brief</span></a><span data-dcnode-id="863" instrument_node="">, renewed calls </span><a data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/press-releases/120-organizations-ask-biden-administration-consider-releasing-immigrants-left" rel="noopener" target="_blank"><span data-dcnode-id="862" instrument_node="">here</span></a><span data-dcnode-id="860" instrument_node="">), despite overwhelming evidence that detention kills, disparately impacts Black &amp; Brown migrants, and </span><a data-dcnode-id="858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/53aa929f6.pdf" rel="noopener" target="_blank"><span data-dcnode-id="859" instrument_node="">particularly harms asylum seekers</span></a><span data-dcnode-id="857" instrument_node="">.</span></li><span data-dcnode-id="855" instrument_node="">
</span><li data-dcnode-id="832"><span data-dcnode-id="854" instrument_node="">The Biden administration has </span><a data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dhs.gov/news/2021/05/20/ice-close-two-detention-centers" rel="noopener" target="_blank"><span data-dcnode-id="853" instrument_node="">closed two ICE jails</span></a><span data-dcnode-id="851" instrument_node=""> rife with abusive conditions (including the forced sterilization of women). However, the administration has extended </span><a data-dcnode-id="849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.seattletimes.com/seattle-news/lawsuit-challenges-new-law-closing-immigrant-detention-center-in-tacoma/" rel="noopener" target="_blank"><span data-dcnode-id="850" instrument_node="">contracts</span></a><span data-dcnode-id="848" instrument_node=""> with private prison </span><a data-dcnode-id="846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.njspotlight.com/2021/08/nj-ice-immigration-detainee-contract-extended-murphy-bill-unsigned/" rel="noopener" target="_blank"><span data-dcnode-id="847" instrument_node="">companies</span></a><span data-dcnode-id="845" instrument_node=""> and entered into new agreements, including an </span><a data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/staff/blog/documents-reveal-new-ice-jail-children-virginia" rel="noopener" target="_blank"><span data-dcnode-id="844" instrument_node="">agreement</span></a><span data-dcnode-id="842" instrument_node=""> to detain immigrant children in Virginia. ICE detention continues to be the site of </span><a data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/press-releases/immigrant-women-ice-custody-file-civil-rights-complaint-requesting-investigation" rel="noopener" target="_blank"><span data-dcnode-id="841" instrument_node="">life-threatening</span></a><span data-dcnode-id="839" instrument_node=""> conditions, </span><a data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/press-releases/immigrants-request-investigation-medical-neglect-ice-custody-illinois-jail" rel="noopener" target="_blank"><span data-dcnode-id="838" instrument_node="">medical abuse</span></a><span data-dcnode-id="836" instrument_node="">, and </span><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/press-releases/lgbtq-asylum-seeker-files-civil-rights-complaint-regarding-abuse-and-discrimination" rel="noopener" target="_blank"><span data-dcnode-id="835" instrument_node="">discrimination</span></a><span data-dcnode-id="833" instrument_node="">.&nbsp;</span></li><span data-dcnode-id="831" instrument_node="">
</span><li data-dcnode-id="820"><span data-dcnode-id="830" instrument_node="">Although President Biden has committed to end the use of </span><a data-dcnode-id="828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/briefing-room/presidential-actions/2021/01/26/executive-order-reforming-our-incarceration-system-to-eliminate-the-use-of-privately-operated-criminal-detention-facilities/" rel="noopener" target="_blank"><span data-dcnode-id="829" instrument_node="">private, for-profit</span></a><span data-dcnode-id="827" instrument_node=""> federal prisons, he has not extended such commitment to for-profit ICE detention. In fact, some private federal prisons </span><a data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2021/09/13/1036576308/biden-ended-contracts-with-private-prisons-so-one-may-turn-to-house-immigrants" rel="noopener" target="_blank"><span data-dcnode-id="826" instrument_node="">may turn</span></a><span data-dcnode-id="824" instrument_node=""> into jails for immigrants and asylum seekers; ICE has already started to </span><a data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theprogressnews.com/news/local/moshannon-valley-correctional-facility-to-reopen/article_4091d4cb-9912-5d30-a05e-48d44affffe8.html" rel="noopener" target="_blank"><span data-dcnode-id="823" instrument_node="">contract</span></a><span data-dcnode-id="821" instrument_node=""> with private companies to take over closing prisons.&nbsp;</span></li><span data-dcnode-id="819" instrument_node="">
</span></ul><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="814"><strong data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">NIJC Recommendations:&nbsp;</span></strong></p><span data-dcnode-id="813" instrument_node="">
</span><ul data-dcnode-id="792"><span data-dcnode-id="812" instrument_node="">
</span><li data-dcnode-id="802"><strong data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">End criminal prosecutions</span></strong><span data-dcnode-id="809" instrument_node=""> for unauthorized entry and reentry violations, including for vulnerable populations and asylum seekers. The Biden Administration, which has the discretion to de-prioritize prosecutions for migration-related offenses, must uphold </span><a data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/staff/blog/nijc-joins-160-organizations-calling-end-migration-related-prosecutions" rel="noopener" target="_blank"><span data-dcnode-id="808" instrument_node="">past commitments</span></a><span data-dcnode-id="806" instrument_node=""> to end mass prosecutions for migration-related offenses. The Administration must also end CBP’s “</span><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbp.gov/newsroom/national-media-release/cbp-releases-july-2021-operational-update" rel="noopener" target="_blank"><span data-dcnode-id="805" instrument_node="">Repeat Offender Initiative</span></a><span data-dcnode-id="803" instrument_node="">,” and any programs that prioritize prosecutions for unauthorized entry or reentry, and should support Congressional efforts to repeal Sections 1325 and 1326 of the U.S. Code.</span></li><span data-dcnode-id="801" instrument_node="">
</span><li data-dcnode-id="794"><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Shut down detention centers and end detention contracts, including with private corporations who profit from the incarceration of immigrants</span></strong><span data-dcnode-id="798" instrument_node="">. Instead of jailing them in unsafe and unsanitary conditions, we urge the Biden administration to parole asylum seekers into the US, given that over </span><a data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//usipc.ucsd.edu/publications/usipc-seeking-asylum-part-2-final.pdf" rel="noopener" target="_blank"><span data-dcnode-id="797" instrument_node="">90% of asylum seekers</span></a><span data-dcnode-id="795" instrument_node=""> have relatives in the US with whom they can safely stay.</span></li><span data-dcnode-id="793" instrument_node="">
</span></ul><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="787"><strong data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Read More</span></strong><span data-dcnode-id="788" instrument_node="">:&nbsp;</span></p><span data-dcnode-id="786" instrument_node="">

</span><h2 class="clearfix block-title" data-dcnode-id="278"><span data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Recommendations</span></span></h2><span data-dcnode-id="277" instrument_node="">
</span><div data-dcnode-id="237"><p data-dcnode-id="273"><strong data-dcnode-id="274"><a data-dcnode-id="276" id="recommendations" name="recommendations"></a><span data-dcnode-id="275" instrument_node="">To uphold the U.S. obligation to provide refuge for families, adults, and children seeking freedom from persecution, NIJC recommends:</span></strong></p><span data-dcnode-id="272" instrument_node="">
</span><ul data-dcnode-id="242"><span data-dcnode-id="271" instrument_node="">
</span><li data-dcnode-id="267"><strong data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Protect due process and eliminate summary removal and expulsion procedure</span></strong><span data-dcnode-id="268" instrument_node="">s that prevent asylum seekers from pursuing existing protections. All asylum seekers should have the opportunity to present their case to an immigration judge, including those who have previously been deported.</span></li><span data-dcnode-id="266" instrument_node="">
</span><li data-dcnode-id="262"><strong data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Appoint counsel to everyone in immigration proceedings</span></strong><span data-dcnode-id="263" instrument_node="">. Access to counsel is critical to help people, especially children, individuals in detention, and vulnerable populations, navigate the complex immigration system.</span></li><span data-dcnode-id="261" instrument_node="">
</span><li data-dcnode-id="254"><strong data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">End U.S. practices of turning back asylum seekers</span></strong><span data-dcnode-id="258" instrument_node=""> or tasking other nations with either detaining or pushing back asylum seekers in </span><a data-dcnode-id="256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//immigrantjustice.org/research-items/off-shoring-asylum"><span data-dcnode-id="257" instrument_node="">violation of international law</span></a><span data-dcnode-id="255" instrument_node="">.</span></li><span data-dcnode-id="253" instrument_node="">
</span><li data-dcnode-id="249"><strong data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">End immigration detention</span></strong><span data-dcnode-id="250" instrument_node="">, including the detention of asylum seekers. Arriving asylum seekers should be released on parole or recognizance and supported in the community with their loved ones while their cases proceed.&nbsp;</span></li><span data-dcnode-id="248" instrument_node="">
</span><li data-dcnode-id="244"><strong data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">End criminal prosecutions </span></strong><span data-dcnode-id="245" instrument_node="">for unauthorized entry (8 U.S.C. § 1325) and reentry (8 U.S.C. § 1326), which violate the rights of asylum seekers, deny due process rights, and discriminate along racial and ethnic lines. The administration should phase out the use of such prosecutions, ensure that involvement in the criminal legal system does not preclude access to asylum, and support Congressional efforts to repeal 8 U.S.C. Sections 1325 and 1326.</span></li><span data-dcnode-id="243" instrument_node="">
</span></ul><span data-dcnode-id="241" instrument_node="">
