fugees in the world category archives."><span data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Refugees in the world</span></span></a></span><span data-dcnode-id="1272" instrument_node=""> &gt; </span><span data-dcnode-id="1268"><a class="post post-post current-item" data-dcnode-id="1269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refugeecouncil.org.au/international-law/" title="Go to Refugees and international law."><span data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Refugees and international law</span></span></a></span><span data-dcnode-id="1267" instrument_node=""> &gt; </span><span class="paged" data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Page 4</span></span></div><div class="entry-category" data-dcnode-id="1258"><span data-dcnode-id="1263" instrument_node=""> </span><a class="gridlove-cat gridlove-cat-9" data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refugeecouncil.org.au/category/getfacts/"><span data-dcnode-id="1262" instrument_node="">Get the facts</span></a><a class="gridlove-cat gridlove-cat-749" data-dcnode-id="1259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refugeecouncil.org.au/category/getfacts/refugees-in-the-world/"><span data-dcnode-id="1260" instrument_node="">Refugees in the world</span></a></div><h1 class="entry-title" data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Refugees and international law</span></h1><div class="entry-meta" data-dcnode-id="1250"><div class="meta-item meta-date" data-dcnode-id="1253"><span class="updated" data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">10 May 2020</span></span></div><div class="meta-item meta-rtime" data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">27 min read</span></div></div></div><div class="entry-content" data-dcnode-id="1140"><h2 data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">OPCAT</span></h2><div class="mpp-toc-container top-left" data-dcnode-id="1213"><div class="mpp-toc-title" data-dcnode-id="1240"><span data-dcnode-id="1246" instrument_node=""> </span><input class="toctogglecheckbox" data-dcnode-id="1245" id="toctogglecheckbox" role="button" style="display: none" type="checkbox"><h2 data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Contents</span></h2><span data-dcnode-id="1242" instrument_node=""> </span></div><nav class="mpp-toc toc" data-dcnode-id="1214"><ul data-dcnode-id="1215"><li data-dcnode-id="1237"><a data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refugeecouncil.org.au/international-law/"><span data-dcnode-id="1239" instrument_node="">Intro</span></a></li><li data-dcnode-id="1234"><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refugeecouncil.org.au/international-law/2/"><span data-dcnode-id="1236" instrument_node="">The Refugee Convention</span></a></li><li data-dcnode-id="1231"><a data-dcnode-id="1232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refugeecouncil.org.au/international-law/3/"><span data-dcnode-id="1233" instrument_node="">Human rights</span></a></li><li data-dcnode-id="1228"><span class="current" data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">OPCAT</span></span></li><li data-dcnode-id="1225"><a data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refugeecouncil.org.au/international-law/5/"><span data-dcnode-id="1227" instrument_node="">UNHCR</span></a></li><li data-dcnode-id="1222"><a data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refugeecouncil.org.au/international-law/6/"><span data-dcnode-id="1224" instrument_node="">IOM</span></a></li><li data-dcnode-id="1219"><a data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refugeecouncil.org.au/international-law/7/"><span data-dcnode-id="1221" instrument_node="">The Global Compact on Refugees</span></a></li><li data-dcnode-id="1216"><a data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refugeecouncil.org.au/international-law/8/"><span data-dcnode-id="1218" instrument_node="">Relevant international law</span></a></li></ul></nav></div><div class="pf-content" data-dcnode-id="1197"><p data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node=""> The Australian government announced in February 2017 that it would ratify the Optional Protocol to the Convention against Torture and other Cruel, Inhuman or Degrading Treatment or Punishment (OPCAT), a vital addition to the Convention Against Torture (CAT).</span></p><h2 data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">What is OPCAT?</span></h2><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">OPCAT is an international agreement aimed at preventing torture and cruel, inhuman or degrading treatment or punishment, building on the Convention Against Torture with the goal of helping States meet their obligations under that Convention. The primary goal of OPCAT is to supplement the CAT in order to prevent the mistreatment of people in detention, establishing an international inspections system for places of detention. Parties that ratify OPCAT must agree to international inspections of places of detention by the UN Subcommittee on the Prevention of Torture (SPT). They must also establish independent National Preventative Mechanisms (NPM) in order to conduct inspections of all places of detention, including prisons, juvenile detention, local and offshore immigration detention facilities and wherever people are systematically deprived of their liberty. The OPCAT was adopted by the United Nations General Assembly in New York on 18 December 2002, entering into force on 22 June 2006. As of October 2016, the Protocol had 75 signatories and 83 parties. Australia is already a party to the CAT and has been a signatory to the OPCAT since 19 May 2009, but has now become the latest country to also ratify the convention.</span></p><h3 data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">What does this mean for refugees and people seeking asylum?</span></h3><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">The ratification of the OPCAT will have significant ramifications for those held in Australian detention facilities, particularly for refugees and people seeking asylum who are being detained by the Australian government. Now that Australia will become a party to the OPCAT, it is required to establish a National Preventative Mechanism, a system of inspections which will work on a largely state-based or national level in order to monitor all places of detention within Australia. The NPM, alongside the SPT, will work to ensure Australia upholds its commitment to eradicate the use of torture through establishing a monitoring process that is both comprehensive and transparent.</span></p><div class="printfriendly pf-button pf-button-content pf-alignright" data-dcnode-id="1198"><a data-dcnode-id="1199" href="#" onclick="window.print(); return false;" rel="nofollow" title="Printer Friendly, PDF &amp; Email"><img alt="Print Friendly, PDF &amp; Email" class="pf-button-img" data-dcnode-id="1202" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.printfriendly.com/icons/printfriendly-icon-md.png&amp;raw" style="width: 16px;height: 16px;" title="Refugees and international law 2"><span class="pf-button-text" data-dcnode-id="1200" id="printfriendly-text2"><span data-dcnode-id="1201" instrument_node="">Print this</span></span></a></div></div><nav class="mpp-post-navigation continue" data-dcnode-id="1191" role="navigation"><div
