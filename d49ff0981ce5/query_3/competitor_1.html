</span><h1 class="page__title title" data-dcnode-id="417" id="page-title"><span data-dcnode-id="418" instrument_node="">Asylum Law and Procedure</span></h1><span data-dcnode-id="416" instrument_node="">
</span><div class="block block-taoti-blocks first odd" data-dcnode-id="394" id="block-taoti-blocks-social-icons"><span data-dcnode-id="415" instrument_node="">

</span><div class="panelizer-view-mode node node-full node-page node-14977" data-dcnode-id="246"><span data-dcnode-id="392" instrument_node="">
</span><div class="panel-2col-stacked clearfix panel-display" data-dcnode-id="248"><span data-dcnode-id="391" instrument_node="">

</span><div class="inside" data-dcnode-id="265"><div class="panel-pane pane-entity-field pane-node-body" data-dcnode-id="267"><span data-dcnode-id="389" instrument_node="">
</span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="269"><div class="field-items" data-dcnode-id="270"><div class="field-item even" data-dcnode-id="271"><h2 data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Asylum</span></h2><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">To be granted asylum, a person must demonstrate that he or she is a “refugee,” that he or she is not barred from asylum for any of the reasons listed in our immigration laws, and that the decision-maker should grant asylum as a matter of discretion.&nbsp;</span></p><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="381" style="margin-left:.5in;"><span data-dcnode-id="382" instrument_node="">A “refugee” is any person who is outside his or her country of nationality (or, if stateless, outside the country of last habitual residence) and is unable or unwilling to return to that country because of persecution or well-founded fear of persecution on account of race, religion, nationality, political opinion, or membership in a particular social group.</span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="376"><a data-dcnode-id="378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.humanrightsfirst.org/resource/asylum-filing-deadline" target="_blank"><img alt="The Asylum Filing Deadline Denying Protection to the Persecuted  and Undermining Governmental Efficiency" data-dcnode-id="379" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.humanrightsfirst.org/sites/default/files/Screen%2520Shot%25202014-06-10%2520at%25204.47.06%2520PM.png&amp;raw" style="width: 250px; height: 270px; float: right; margin-right: 3px; margin-left: 3px;" title="The Asylum Filing Deadline Denying Protection to the Persecuted  and Undermining Governmental Efficiency"></a><span data-dcnode-id="377" instrument_node="">This definition is based on international law, specifically the 1951 UN Convention Relating to the Status of Refugees.&nbsp; The U.S. is not a signatory to this Convention, but did sign on to its 1967 Protocol, which incorporates the Convention by reference.&nbsp; The Refugee Convention requires state parties to protect people living within their borders and prohibits them from sending people to other countries where they would be harmed based on their race, religion, nationality, membership in a particular social group, or political opinion.&nbsp; With the Refugee Act of 1980, the U.S. brought the refugee definition into our domestic law. &nbsp;The refugee definition is found at section 101(a)(42) of the Immigration and Nationality Act (INA).&nbsp;</span></p><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">A person who meets the refugee definition may be granted asylum in the United States if he or she is not barred from asylum for any of the reasons listed in section 208 of that Act and if the adjudicator decides that he or she should be granted asylum as a matter of discretion.</span></p><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="366"><span data-dcnode-id="371" instrument_node="">The bars to asylum include the one-year filing deadline, which states that a person who needs asylum should file the application within one year of the last arrival in the United States.&nbsp; Otherwise, the asylum-seeker must show that he or she qualifies for an exception to the filing deadline and that he or she filed within a reasonable time given that exception.&nbsp; Human Rights First advocates for the elimination of the filing deadline from our asylum law.&nbsp; For background reading on this advocacy, see our </span><u data-dcnode-id="367"><a data-dcnode-id="369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.humanrightsfirst.org/resource/asylum-filing-deadline"><span data-dcnode-id="370" instrument_node="">2010 report</span></a><span data-dcnode-id="368" instrument_node="">.</span></u></p><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="355"><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.humanrightsfirst.org/resource/denial-and-delay-report" target="_blank"><img alt="Denial and Delay: The Impact of the Immigration Law’s “Terrorism Bars” on Asylum Seekers and Refugees in the United States" data-dcnode-id="364" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.humanrightsfirst.org/sites/default/files/Denialanddelay.JPG&amp;raw" style="width: 250px; height: 273px; float: right;"></a><span data-dcnode-id="362" instrument_node="">The bars to asylum also include the so-called “material support bar.”&nbsp; Human Rights First advocates for a more reasonable version of this bar to asylum.&nbsp; For background reading, see </span><a data-dcnode-id="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.humanrightsfirst.org/resource/denial-and-delay-impact-immigration-law%25E2%2580%2599s-%25E2%2580%259Cterrorism-bars%25E2%2580%259D-asylum-seekers-and-refugees"><span data-dcnode-id="361" instrument_node="">our </span></a><u data-dcnode-id="356"><a data-dcnode-id="358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.humanrightsfirst.org/resource/denial-and-delay-impact-immigration-law%25E2%2580%2599s-%25E2%2580%259Cterrorism-bars%25E2%2580%259D-asylum-seekers-and-refugees"><span data-dcnode-id="359" instrument_node="">report</span></a><span data-dcnode-id="357" instrument_node="">.</span></u></p><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Some people who need asylum will have their cases decided at the Asylum Office and others will have their cases decided at the Immigration Court.&nbsp; The standard for asylum is the same in both places, and Human Rights First works on cases at all levels of the system.</span></p><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">People apply for asylum with Form I-589.&nbsp; That application for asylum can also include a request for two related alternative forms of relief, which offer fewer benefits: withholding of removal under section 241(b)(3) of the INA and protection under the UN Convention Against Torture.</span></p><span data-dcnode-id="348" instrument_node="">
</span><h2 data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Withholding of Removal</span></h2><span data-dcnode-id="345" instrument_node="">
</span><p data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">To be granted withholding of removal under section 241(b)(3) of the INA, a person must demonstrate that if returned to the country of origin he or she is more likely than not to be persecuted on account of race, religion, nationality, political opinion, or membership in a particular social group.&nbsp; Some of the bars to asylum, including the one-year filing deadline, do not apply to claims for withholding of removal.&nbsp; There is no discretionary element.&nbsp; This means that if a person is more likely than not to be harmed for one of the reasons listed above, he or she must be granted withholding of removal.&nbsp;</span></p><span data-dcnode-id="342" instrument_node="">
</span><h2 data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">U.N. Convention Against Torture</span></h2><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">To be granted withholding of removal under the U.N. Convention Against Torture, a person must demonstrate that if returned to the country of origin he or she is more likely than not to be tortured.&nbsp; There is no discretionary element.&nbsp; Most of the bars to asylum do not apply to requests for protection under the U.N. Convention Against Torture.&nbsp; The government of the United States has promised that it will not send anyone back to a country where he or she is likely to be tortured and so an immigration judge will consider eligibility for protection under the Torture Convention even if the asylum-seeker does not specifically request it.</span></p><span data-dcnode-id="336" instrument_node="">
</span><h2 data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Procedural Steps for Asylum</span></h2><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">The asylum system has two parts: the U.S. Department of Homeland Security (which includes the Asylum Office) and the U.S. Department of Justice (which includes the Immigration Courts).&nbsp; Cases that are not granted at either of those levels might go to the Board of Immigration Appeals, the U.S. Courts of Appeal, or even to the U.S. Supreme Court.&nbsp; Human Rights First works with asylum-seekers at all levels of the system.&nbsp; A person who meets the definition of a refugee can apply for asylum in various ways, depending on that person’s immigration status at the time they decide to apply.</span></p><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="326"><strong data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Asylum Office</span></strong><span data-dcnode-id="327" instrument_node=""> – When a person has entered the United States, whether or not they were inspected at the border, and our government is not taking any active steps to remove them from the U.S., they can make what is known as an “affirmative” application for asylum.&nbsp; This means that the person will file an I-589 application by mail with the U.S. Department of Homeland Security.&nbsp; Later they will be interviewed by an officer at the local Asylum Office.&nbsp; If the officer grants the application, then the person has asylum.&nbsp; He or she can then petition for their spouse and children to join them in the United States.&nbsp; They are also then on the path toward a green card and eventual U.S. citizenship.&nbsp; If the officer denies the asylum application, and the person has no other immigration status, then they are “referred” to the Immigration Court, where a judge will consider the asylum case.&nbsp;</span></p><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="321"><strong data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Immigration Court</span></strong><span data-dcnode-id="322" instrument_node=""> – When a person has been placed in Immigration Court proceedings before they apply for asylum, the I-589 application should be filed directly with the immigration judge.&nbsp; This is known as a “defensive” application for asylum because the person is requesting asylum as a defense to the government’s charge that they should be removed from the United States.&nbsp; Whether the case starts in the Asylum Office or in the Immigration Court, the judge considers the case from the beginning.&nbsp; If the immigration judge grants the application, then the person has asylum. &nbsp;He or she is then eligible for the same family-reunification and other benefits that a person would be eligible for if granted at the Asylum Office level.&nbsp; If the immigration judge grants only withholding of removal or protection under the U.N. Convention Against Torture, then the person may not petition for relatives but will be permitted to remain in the U.S. and to work to support himself or herself.</span></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Asylum applications filed by unaccompanied children (those who are under age 18) are heard at the Asylum Office, even if the child is otherwise in proceedings in the Immigration Court.&nbsp; This is the result of the Trafficking Victims Protection Reauthorization Act (TVPRA) that went into effect March 23, 2009 and it applies to asylum applications filed on or after that date.&nbsp;</span></p><span data-dcnode-id="317" instrument_node="">
</span><p data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Cases which are denied in the Immigration Court may be appealed to the Board of Immigration Appeals.&nbsp; If the case is not granted at that level, the asylum-seeker may file a petition for review which brings it to the U.S. Court of Appeals in the circuit where the immigration judge denied the case.&nbsp; When asylum cases of genuine refugees are granted at the lower levels, the system works most effectively.&nbsp; Judges at the appellate courts are then available to spend their time on the many other types of cases that they have to decide.&nbsp; Pro bono representation of asylum-seekers can help to ensure that cases are well-prepared and properly decided in the first instance.</span></p><span data-dcnode-id="314" instrument_node="">
</span><h2 data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">How to Seek Asylum While in Immigration Detention</span></h2><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="301"><a data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.humanrightsfirst.org/resource/%25E2%2580%259Cins%25E2%2580%259D-%25E2%2580%259Couts%25E2%2580%259D-immigration-detention" target="_blank"><img alt="Ins-Outs-Immigration-detention.png" data-dcnode-id="310" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.humanrightsfirst.org/sites/default/files/Ins-Outs-Immigration-detention.png&amp;raw" style="opacity: 0.9; width: 250px; height: 191px; float: right;"></a><span data-dcnode-id="308" instrument_node="">The process for seeking asylum is the same for people who are in the Immigration Court whether or not they are detained.&nbsp; The I-589 (asylum application) will be filed with the immigration judge and there will be an opportunity to testify and present evidence in support of the asylum case.&nbsp; However, it is much more difficult to prepare an asylum case from inside an immigration detention center because of limited access to supporting witnesses and documentation, and because detained cases move more quickly.&nbsp; </span><em data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Pro bono</span></em><span data-dcnode-id="305" instrument_node=""> legal assistance can make a tremendous difference in these cases.&nbsp; In addition to helping with the asylum case, a </span><em data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">pro bono</span></em><span data-dcnode-id="302" instrument_node=""> lawyer can help a detained asylum-seeker to request release from detention on bond or parole.&nbsp;</span></p><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="295"><span data-dcnode-id="299" instrument_node="">Please see here for an infographic: </span><a data-dcnode-id="297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.humanrightsfirst.org/resource/%25E2%2580%259Cins%25E2%2580%259D-%25E2%2580%259Couts%25E2%2580%259D-immigration-detention"><span data-dcnode-id="298" instrument_node="">The&nbsp;“Ins” &amp; “Outs” of Immigration Detention</span></a><span data-dcnode-id="296" instrument_node="">.</span></p><span data-dcnode-id="294" instrument_node="">
</span><h2 data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Biometrics</span></h2><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">For cases at the Asylum Office level, the filing of the I-589 will prompt the U.S. Department of Homeland Security (DHS) to send a biometrics appointment notice to the asylum-seeker, who will then go to have his or her fingerprints and photograph taken.&nbsp; This will make it possible for DHS to run a background check.&nbsp; The asylum-seeker will be fingerprinted again on the morning of the interview at the Asylum Office.</span></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="283"><span data-dcnode-id="287" instrument_node="">For cases at the Immigration Court level, the asylum-seeker must send a copy of the first three pages of the completed I-589 (asylum application) with a copy of the instruction sheet to the Nebraska Service Center.&nbsp; This will prompt DHS to send a biometrics appointment notice to the asylum-seeker, who will then go to have his or her fingerprints and photograph taken.&nbsp; These steps must be completed before the immigration judge can grant asylum.&nbsp; </span><u data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">See</span></u><span data-dcnode-id="284" instrument_node=""> 70 FR 19, 4743-4754.&nbsp; Once the biometrics have been processed, they remain valid for 15 months.&nbsp; Asylum-seekers in proceedings with merits hearings that are scheduled more than 15 months from the biometrics appointment may need to ask DHS to run the fingerprints through their system again to make sure that the biometrics are up-to-date at the time of the merits hearing.&nbsp; This is the responsibility of the asylum-seeker and his or her attorney.&nbsp; Please contact someone in the Refugee Representation program at Human Rights First if you need further guidance on how to ensure that the biometrics are updated before the merits hearing in your case or in the case of an asylum-seeker who you represent.&nbsp;</span></p><span data-dcnode-id="282" instrument_node="">
</span><h2 data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Temporary Protected Status (TPS)</span></h2><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="273"><span data-dcnode-id="278" instrument_node="">The U.S. government may designate a foreign country for Temporary Protected Status (TPS) due to conditions in that country which temporarily prevent its citizens from returning safely, or when the country is unable to handle the return of its citizens.&nbsp; A person from a TPS-designated country who is in the United States may apply for this temporary form of protection by filing a Form I-821. &nbsp;Countries may be designated for TPS due to various short-term conditions, including ongoing armed conflict (civil war), environmental disaster (such as earthquake or hurricane), or an epidemic.&nbsp; A person who is granted TPS may not be detained or removed from the United States, can work legally in this country, and may be granted a travel document to leave the U.S. and return.&nbsp; TPS is a temporary benefit and does not lead to lawful permanent residence or any kind of permanent immigration status.&nbsp; However, a person who is granted TPS may also apply for asylum or any other form of more lasting immigration status if eligible for those forms of relief.&nbsp; The list of TPS-designated countries is available on </span><a data-dcnode-id="275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.uscis.gov/tps"><u data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">this part</span></u></a><span data-dcnode-id="274" instrument_node=""> of the USCIS website.&nbsp;</span></p><span data-dcnode-id="272" instrument_node="">
