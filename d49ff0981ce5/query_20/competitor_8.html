</span><h1 data-dcnode-id="3626"><span data-dcnode-id="3627" instrument_node="">Manuscript Group 1087, Newark Orphan Asylum</span></h1><span data-dcnode-id="3625" instrument_node="">
</span><p data-dcnode-id="3624"></p><div class="pf-content" data-dcnode-id="285"><p data-dcnode-id="3622"><span data-dcnode-id="3623" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3621" instrument_node="">
</span><h2 data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">Archives Documents, Manuscripts, Maps, &amp; Photographs</span></h2><span data-dcnode-id="3618" instrument_node="">
</span><p data-dcnode-id="3616"><span data-dcnode-id="3617" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3615" instrument_node="">
</span><p data-dcnode-id="3612"><b data-dcnode-id="3613"><span data-dcnode-id="3614" instrument_node="">Newark Orphan Asylum</span></b></p><span data-dcnode-id="3611" instrument_node="">
</span><p data-dcnode-id="3609"><span data-dcnode-id="3610" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3608" instrument_node="">
</span><p data-dcnode-id="3586"><span data-dcnode-id="3607" instrument_node="">The</span><br data-dcnode-id="3606"><span data-dcnode-id="3605" instrument_node="">
Newark Orphan Asylum was founded on November 5, 1847 by a group</span><br data-dcnode-id="3604"><span data-dcnode-id="3603" instrument_node="">
of Christian women who were concerned for the welfare of the</span><br data-dcnode-id="3602"><span data-dcnode-id="3601" instrument_node="">
children of Newark. The Asylum was established as a home for</span><br data-dcnode-id="3600"><span data-dcnode-id="3599" instrument_node="">
boys and girls whose families for what ever reason were unable to</span><br data-dcnode-id="3598"><span data-dcnode-id="3597" instrument_node="">
take care of them.&nbsp; The children at the Asylum were either</span><br data-dcnode-id="3596"><span data-dcnode-id="3595" instrument_node="">
boarding their or candidates for adoption.&nbsp; For a hundred</span><br data-dcnode-id="3594"><span data-dcnode-id="3593" instrument_node="">
and one years the Newark Orphan Asylum provided a valuable</span><br data-dcnode-id="3592"><span data-dcnode-id="3591" instrument_node="">
service for the city of Newark. In 1948 the Newark Orphan Asylum</span><br data-dcnode-id="3590"><span data-dcnode-id="3589" instrument_node="">
merged with the Protestant Foster Home Society.&nbsp; This merger</span><br data-dcnode-id="3588"><span data-dcnode-id="3587" instrument_node="">
created the Newark Home For Foster Care.</span></p><span data-dcnode-id="3585" instrument_node="">
</span><p data-dcnode-id="3583"><span data-dcnode-id="3584" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3582" instrument_node="">
</span><p data-dcnode-id="3580"><span data-dcnode-id="3581" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3579" instrument_node="">
</span><p data-dcnode-id="3574"><b data-dcnode-id="3575"><span data-dcnode-id="3578" instrument_node="">The Scope and</span><br data-dcnode-id="3577"><span data-dcnode-id="3576" instrument_node="">
Content of the Collection:</span></b></p><span data-dcnode-id="3573" instrument_node="">
</span><p data-dcnode-id="3531"><span data-dcnode-id="3572" instrument_node="">&nbsp;</span><br data-dcnode-id="3571"><span data-dcnode-id="3570" instrument_node="">
The Newark Orphan Asylum collection is contained in five boxes.</span><br data-dcnode-id="3569"><span data-dcnode-id="3568" instrument_node="">
The collection contains board minutes from 1847 to 1948, the</span><br data-dcnode-id="3567"><span data-dcnode-id="3566" instrument_node="">
board minutes proved an understanding of the inner workings of</span><br data-dcnode-id="3565"><span data-dcnode-id="3564" instrument_node="">
the organization.&nbsp; The financial records show how the</span><br data-dcnode-id="3563"><span data-dcnode-id="3562" instrument_node="">
organization earned the money it need to maintain the home and</span><br data-dcnode-id="3561"><span data-dcnode-id="3560" instrument_node="">
take care of the children.&nbsp; The records also show the amount</span><br data-dcnode-id="3559"><span data-dcnode-id="3558" instrument_node="">
of money spent directly on the children and what was purchased in</span><br data-dcnode-id="3557"><span data-dcnode-id="3556" instrument_node="">
way of food and clothing.&nbsp; The collection also has five</span><br data-dcnode-id="3555"><span data-dcnode-id="3554" instrument_node="">
casebooks covering the periods of 1855 to 1909.&nbsp; The</span><br data-dcnode-id="3553"><span data-dcnode-id="3552" instrument_node="">
casebooks offer a look at some of the reasons why children were</span><br data-dcnode-id="3551"><span data-dcnode-id="3550" instrument_node="">
placed in the orphanage.&nbsp; Through these records it is</span><br data-dcnode-id="3549"><span data-dcnode-id="3548" instrument_node="">
possible to see the process that the children went through in the</span><br data-dcnode-id="3547"><span data-dcnode-id="3546" instrument_node="">
Asylum, from being taken in by the Asylum, to one day either</span><br data-dcnode-id="3545"><span data-dcnode-id="3544" instrument_node="">
going back home or being adopted.&nbsp; The collection also has</span><br data-dcnode-id="3543"><span data-dcnode-id="3542" instrument_node="">
the four types of contracts the organization had; Surrender,</span><br data-dcnode-id="3541"><span data-dcnode-id="3540" instrument_node="">
indenture, adoption, and boarding are the four types of contract</span><br data-dcnode-id="3539"><span data-dcnode-id="3538" instrument_node="">
that the organization provided.&nbsp; These contract show the</span><br data-dcnode-id="3537"><span data-dcnode-id="3536" instrument_node="">
kinds of survives that were provided by child welfare</span><br data-dcnode-id="3535"><span data-dcnode-id="3534" instrument_node="">
organizations.&nbsp; They show the amount of choice open to</span><br data-dcnode-id="3533"><span data-dcnode-id="3532" instrument_node="">
families and organization.</span></p><span data-dcnode-id="3530" instrument_node="">
</span><p data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3527" instrument_node="">
</span><p data-dcnode-id="3522"><b data-dcnode-id="3523"><span data-dcnode-id="3526" instrument_node="">Protestant</span><br data-dcnode-id="3525"><span data-dcnode-id="3524" instrument_node="">
Foster Home Society</span></b></p><span data-dcnode-id="3521" instrument_node="">
</span><p data-dcnode-id="3497"><span data-dcnode-id="3520" instrument_node="">&nbsp;</span><br data-dcnode-id="3519"><span data-dcnode-id="3518" instrument_node="">
In February 28, 1849 the Protestant Foster Home of Newark was</span><br data-dcnode-id="3517"><span data-dcnode-id="3516" instrument_node="">
founded.&nbsp; It was governed by a Board of Trustees consisting</span><br data-dcnode-id="3515"><span data-dcnode-id="3514" instrument_node="">
of seven men and a Board of Managers made up women. The Board of</span><br data-dcnode-id="3513"><span data-dcnode-id="3512" instrument_node="">
Trustees took care of&nbsp; the financial and legal matters of</span><br data-dcnode-id="3511"><span data-dcnode-id="3510" instrument_node="">
the society while the Board of Managers dealt with the daily</span><br data-dcnode-id="3509"><span data-dcnode-id="3508" instrument_node="">
operations of the home.&nbsp; The Protestant Foster Home of</span><br data-dcnode-id="3507"><span data-dcnode-id="3506" instrument_node="">
Newark was established to proved a home for children for whom</span><br data-dcnode-id="3505"><span data-dcnode-id="3504" instrument_node="">
adoption or a foster home placement was not an option.&nbsp; The</span><br data-dcnode-id="3503"><span data-dcnode-id="3502" instrument_node="">
home was a temporary placement for the children..&nbsp; In 1948</span><br data-dcnode-id="3501"><span data-dcnode-id="3500" instrument_node="">
the organization formed with the Newark Orphan Asylum to create</span><br data-dcnode-id="3499"><span data-dcnode-id="3498" instrument_node="">
the Newark Home for Foster Care.</span></p><span data-dcnode-id="3496" instrument_node="">
</span><p data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3493" instrument_node="">
</span><p data-dcnode-id="3488"><b data-dcnode-id="3489"><span data-dcnode-id="3492" instrument_node="">Scope and</span><br data-dcnode-id="3491"><span data-dcnode-id="3490" instrument_node="">
Content of the Collection</span></b></p><span data-dcnode-id="3487" instrument_node="">
</span><p data-dcnode-id="3443"><span data-dcnode-id="3486" instrument_node="">&nbsp;</span><br data-dcnode-id="3485"><span data-dcnode-id="3484" instrument_node="">
The collection consists of three boxes that contain records from</span><br data-dcnode-id="3483"><span data-dcnode-id="3482" instrument_node="">
1848 to 1947.&nbsp; Most of the collection is made up of</span><br data-dcnode-id="3481"><span data-dcnode-id="3480" instrument_node="">
financial document such as financial audits, treasurer accounts</span><br data-dcnode-id="3479"><span data-dcnode-id="3478" instrument_node="">
and cash books.&nbsp; The financial audits provide a clear</span><br data-dcnode-id="3477"><span data-dcnode-id="3476" instrument_node="">
picture of the organization from how large their staff was to the</span><br data-dcnode-id="3475"><span data-dcnode-id="3474" instrument_node="">
real-estate they owned.&nbsp; It also shows the kinds of</span><br data-dcnode-id="3473"><span data-dcnode-id="3472" instrument_node="">
financial issues child welfare organizations had.&nbsp; The</span><br data-dcnode-id="3471"><span data-dcnode-id="3470" instrument_node="">
development of this hundred year organization can be seen clearly</span><br data-dcnode-id="3469"><span data-dcnode-id="3468" instrument_node="">
in the financial records. The casework service reports and the</span><br data-dcnode-id="3467"><span data-dcnode-id="3466" instrument_node="">
event book offer the best look at the children and their lives at</span><br data-dcnode-id="3465"><span data-dcnode-id="3464" instrument_node="">
the home.&nbsp;&nbsp; The casework service reports are form 1940</span><br data-dcnode-id="3463"><span data-dcnode-id="3462" instrument_node="">
to 1947.&nbsp; They are the caseworkkers reports on each child</span><br data-dcnode-id="3461"><span data-dcnode-id="3460" instrument_node="">
that was under the care of the home.&nbsp; They explore the</span><br data-dcnode-id="3459"><span data-dcnode-id="3458" instrument_node="">
reasons for why the children were at the home and give detailed</span><br data-dcnode-id="3457"><span data-dcnode-id="3456" instrument_node="">
analysis on the&nbsp; future of the children.&nbsp; Child abuse,</span><br data-dcnode-id="3455"><span data-dcnode-id="3454" instrument_node="">
neglect and juvenile crime are just some of the issues raised in</span><br data-dcnode-id="3453"><span data-dcnode-id="3452" instrument_node="">
these reports.&nbsp; The Event Book is a very unuasal document</span><br data-dcnode-id="3451"><span data-dcnode-id="3450" instrument_node="">
because it is a record of all of the trips and extra curricular</span><br data-dcnode-id="3449"><span data-dcnode-id="3448" instrument_node="">
activities that the children participated in.&nbsp; This book</span><br data-dcnode-id="3447"><span data-dcnode-id="3446" instrument_node="">
allows one to see the kinds of activities the home felt were</span><br data-dcnode-id="3445"><span data-dcnode-id="3444" instrument_node="">
important for the children to experience.</span></p><span data-dcnode-id="3442" instrument_node="">
</span><p data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3439" instrument_node="">
</span><p data-dcnode-id="3434"><b data-dcnode-id="3435"><span data-dcnode-id="3438" instrument_node="">Childrens</span><br data-dcnode-id="3437"><span data-dcnode-id="3436" instrument_node="">
Aid and Society for the Prevention of Cruelty to Children</span></b></p><span data-dcnode-id="3433" instrument_node="">
</span><p data-dcnode-id="3401"><span data-dcnode-id="3432" instrument_node="">&nbsp;</span><br data-dcnode-id="3431"><span data-dcnode-id="3430" instrument_node="">
It is believed that the Childrens Aid and Society for the</span><br data-dcnode-id="3429"><span data-dcnode-id="3428" instrument_node="">
Prevention of Cruelty to Children began in 1868.&nbsp; The</span><br data-dcnode-id="3427"><span data-dcnode-id="3426" instrument_node="">
correspondence of Jared W. Kimbell the superintendent are the</span><br data-dcnode-id="3425"><span data-dcnode-id="3424" instrument_node="">
oldest records of the collection dating from 1890 to 1909.&nbsp; The</span><br data-dcnode-id="3423"><span data-dcnode-id="3422" instrument_node="">
originals purpose of the organization is unknown, but by 1890 the</span><br data-dcnode-id="3421"><span data-dcnode-id="3420" instrument_node="">
Childrens Aid Society had established its self as an</span><br data-dcnode-id="3419"><span data-dcnode-id="3418" instrument_node="">
advocate for the welfare of children.&nbsp; The Society advocated</span><br data-dcnode-id="3417"><span data-dcnode-id="3416" instrument_node="">
for the rights of children in the courts, participating in many</span><br data-dcnode-id="3415"><span data-dcnode-id="3414" instrument_node="">
court cases where they felt children were being neglected or</span><br data-dcnode-id="3413"><span data-dcnode-id="3412" instrument_node="">
abused.&nbsp; It was the Societys goal to find the best</span><br data-dcnode-id="3411"><span data-dcnode-id="3410" instrument_node="">
services for the cases they handled.&nbsp; The organization</span><br data-dcnode-id="3409"><span data-dcnode-id="3408" instrument_node="">
provide adoption, legal aid, and other services for children in</span><br data-dcnode-id="3407"><span data-dcnode-id="3406" instrument_node="">
need. The Childrens Aid Society did not have a home like</span><br data-dcnode-id="3405"><span data-dcnode-id="3404" instrument_node="">
many of the other organization it concentrated solely on</span><br data-dcnode-id="3403"><span data-dcnode-id="3402" instrument_node="">
providing legal services for children</span></p><span data-dcnode-id="3400" instrument_node="">
</span><p data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3397" instrument_node="">
</span><p data-dcnode-id="3392"><b data-dcnode-id="3393"><span data-dcnode-id="3396" instrument_node="">Scope and</span><br data-dcnode-id="3395"><span data-dcnode-id="3394" instrument_node="">
Content of Collection:</span></b></p><span data-dcnode-id="3391" instrument_node="">

</span><p data-dcnode-id="3346"><b data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></b><span data-dcnode-id="3385" instrument_node="">The</span><br data-dcnode-id="3384"><span data-dcnode-id="3383" instrument_node="">
collection is contained in seven boxes dating from 1890 to 1960.</span><br data-dcnode-id="3382"><span data-dcnode-id="3381" instrument_node="">
In the collection one can see the changes that have occurred in</span><br data-dcnode-id="3380"><span data-dcnode-id="3379" instrument_node="">
child welfare over a hundred years.&nbsp; Many of the programs</span><br data-dcnode-id="3378"><span data-dcnode-id="3377" instrument_node="">
and attitudes surrounding this kind of organization are</span><br data-dcnode-id="3376"><span data-dcnode-id="3375" instrument_node="">
discussed. The letters of Jared W. Kimbell the superintendent of</span><br data-dcnode-id="3374"><span data-dcnode-id="3373" instrument_node="">
the Society show how Mr. Kimbell fought in the courts to get</span><br data-dcnode-id="3372"><span data-dcnode-id="3371" instrument_node="">
children from parents it considered unfit.&nbsp; Through out</span><br data-dcnode-id="3370"><span data-dcnode-id="3369" instrument_node="">
these letter the issues of just what make a fit parent is</span><br data-dcnode-id="3368"><span data-dcnode-id="3367" instrument_node="">
discussed.&nbsp; In two case books form 1895 to 1913 one can see</span><br data-dcnode-id="3366"><span data-dcnode-id="3365" instrument_node="">
the steps taken be the Society to rescue children from unsafe</span><br data-dcnode-id="3364"><span data-dcnode-id="3363" instrument_node="">
homes.&nbsp; These case books allow one to see the services</span><br data-dcnode-id="3362"><span data-dcnode-id="3361" instrument_node="">
provided to the children.&nbsp; One would be able to follow a</span><br data-dcnode-id="3360"><span data-dcnode-id="3359" instrument_node="">
child through the orginization can see the Societys success</span><br data-dcnode-id="3358"><span data-dcnode-id="3357" instrument_node="">
with the child.&nbsp; The collection also contains all of the</span><br data-dcnode-id="3356"><span data-dcnode-id="3355" instrument_node="">
surrender and indenture contract from 1895 to 1913. In these</span><br data-dcnode-id="3354"><span data-dcnode-id="3353" instrument_node="">
document one may be able to understand some of the reasons the</span><br data-dcnode-id="3352"><span data-dcnode-id="3351" instrument_node="">
children needed the services of the society.&nbsp; These document</span><br data-dcnode-id="3350"><span data-dcnode-id="3349" instrument_node="">
are highly confidential and only Xeroxed copies can be provided</span><br data-dcnode-id="3348"><span data-dcnode-id="3347" instrument_node="">
with the names of the children blacked out.</span></p><span data-dcnode-id="3345" instrument_node="">
