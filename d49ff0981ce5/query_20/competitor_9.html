</span><span data-dcnode-id="4366" id="freeTextContainer5006193227500162695"><span data-dcnode-id="4373" instrument_node="">The characters in this book are supposed to be 16. </span><b data-dcnode-id="4371"><span data-dcnode-id="4372" instrument_node="">This is supposed to be a suspenseful thriller, a horror, for young adults. It is not. It is middle grade in writing. It is elementary in plot development and characterization</span></b><span data-dcnode-id="4370" instrument_node="">. It is lacking in everything that would make it anything remotely approaching a good read.</span><br data-dcnode-id="4369"><br data-dcnode-id="4368"><span data-dcnode-id="4367" instrument_node="">The writing is not terrible, just forgettable. I usually use a fair number of quotes in my reviews; I have almost nothing at all scribbled down in my notebook for this one: roughly 15 </span></span><span data-dcnode-id="4365" instrument_node="">
</span><span data-dcnode-id="4296" id="freeText5006193227500162695" style="display:none"><span data-dcnode-id="4364" instrument_node="">The characters in this book are supposed to be 16. </span><b data-dcnode-id="4362"><span data-dcnode-id="4363" instrument_node="">This is supposed to be a suspenseful thriller, a horror, for young adults. It is not. It is middle grade in writing. It is elementary in plot development and characterization</span></b><span data-dcnode-id="4361" instrument_node="">. It is lacking in everything that would make it anything remotely approaching a good read.</span><br data-dcnode-id="4360"><br data-dcnode-id="4359"><span data-dcnode-id="4358" instrument_node="">The writing is not terrible, just forgettable. I usually use a fair number of quotes in my reviews; I have almost nothing at all scribbled down in my notebook for this one: roughly 15 words total, really. This book, the writing, and the characterization is absolutely lacking in anything memorable; for better or worse. Do yourself a favor and skip it. Don't even glance at it.</span><br data-dcnode-id="4357"><br data-dcnode-id="4356"><span data-dcnode-id="4355" instrument_node="">Oh, I changed my mind. I do have a quote for you. It's not from the book, but it's my personal opinion of that idiotic ending. No spoilers, by the way.</span><br data-dcnode-id="4354"><blockquote data-dcnode-id="4344"><b data-dcnode-id="4346"><span data-dcnode-id="4353" instrument_node="">“...This type of ending is a special instance of </span><i data-dcnode-id="4351"><span data-dcnode-id="4352" instrument_node="">deus ex machina</span></i><span data-dcnode-id="4350" instrument_node="">, known as the </span><i data-dcnode-id="4348"><span data-dcnode-id="4349" instrument_node="">folie adieu</span></i><span data-dcnode-id="4347" instrument_node="">, which is French for "Are you fucking kidding me?</span></b><span data-dcnode-id="4345" instrument_node="">”- Howard Mittelmark</span></blockquote><span data-dcnode-id="4343" instrument_node="">The book fails as a suspense, because within a suspense novel, </span><i data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">characterization should be key</span></i><span data-dcnode-id="4340" instrument_node="">. There is no character development in this book. The characters do not develop in complexity, they act, they do not think. They do not grow. They do not mature. They are scared, I am not scared for them; I half wished they'd get killed so that there would at least be a spark of excitement in this dull shadow of a horror novel. Stephen King might have written something better in 3rd grade.</span><br data-dcnode-id="4339"><br data-dcnode-id="4338"><span data-dcnode-id="4337" instrument_node="">The characters are strange, I would usually say clichéd, but it's not even that. It is as if the characters cannot decide for themselves which cliché they are supposed to fall into. It is a sad, sad thing when a book fails at writing characters that are so poorly written that they cannot even force themselves into a mold. There is Dan, our main character, a seemingly extra-bright 17-year old, with hints of past psychological trouble. The book is told from his point of view, and he is an utterly unconvincing character. I believe he is a poorly written male character. It is not so much that he acts feminine, or makes observations that are uncharacteristically male (and he does make certain observations about her clothes and hair that do not ring true to a teenaged boy, but there's also something lacking about the way he is written. </span><b data-dcnode-id="4335"><span data-dcnode-id="4336" instrument_node="">There is something about every single one of the three main characters, really, that doesn't make them feel real at all.</span></b><br data-dcnode-id="4334"><br data-dcnode-id="4333"><span data-dcnode-id="4332" instrument_node="">The characters are Dan, the socially awkward but bright teen. Abby, the beautiful, artsy (why are they always fucking artsy?) girl with whom Dan falls into insta-love. Jordan, the brilliant gay math student. The three of them bond almost immediately, but again, we are told this, not shown this. I cannot buy this friendship, the way it was written does not ring true. Their bond feels forced. </span><b data-dcnode-id="4330"><span data-dcnode-id="4331" instrument_node="">I neither like nor believe in any of the three as characters, and I do not believe in their friendship for a moment.</span></b><br data-dcnode-id="4329"><br data-dcnode-id="4328"><span data-dcnode-id="4327" instrument_node="">They lack dynamic. They lack emotion. Their individual personalities are nonexistent. </span><b data-dcnode-id="4325"><span data-dcnode-id="4326" instrument_node="">They are words on paper</span></b><span data-dcnode-id="4324" instrument_node="">. Even through the eyes of our main character, we get no sense of development, of complexity. If this was a character-driven book, it fails utterly.</span><br data-dcnode-id="4323"><br data-dcnode-id="4322"><span data-dcnode-id="4321" instrument_node="">The romance was forced, and it had no room in the plot. It does not play any role of importance whatsoever, it felt merely inserted in the book for the sake of having romance in a book that needed none, and actually ended up making a bad book even worse with its extraneousness. Their romance, their dates, their strained courtship---had no room in the book short of trying to insert some awkwardness in the already poorly crafted credibility of the dynamic that makes up our not-so-dynamic trio of Jordan, Abby, and Dan.</span><br data-dcnode-id="4320"><br data-dcnode-id="4319"><span data-dcnode-id="4318" instrument_node="">For students supposedly so devoted to the pursuit of advanced education, the three seem in a terrible hurry to throw their summer of education away. They break the rules, despite knowing it would get them into trouble. They make stupid decisions, they overreact for no reason at all. Their apparent reasons for acting outside of their character were forced and not well-written as to create a sensible flow within the book. Everything felt incredibly disjointed.</span><br data-dcnode-id="4317"><br data-dcnode-id="4316"><span data-dcnode-id="4315" instrument_node="">The final nail in this book's coffin is the fact that this book fails in delivering a compelling plot. This book fails as a horror, as a thriller, as a suspenseful book. There is no fear to be found within its pages. The photographs are laughable, and does nothing to add to the atmosphere of the book. They actually make it laughable; the picture of the so-called "lobotomy" pictures a girl with a horizontal zigzagging line across her forehead. It looks like someone scrawled a long line of Ws across her forehead; did anyone even bother to research this? There are photographs of other patients, so poorly photographed that they are obviously posed. They do not instill anything within the reader except laughter.</span><br data-dcnode-id="4314"><br data-dcnode-id="4313"><span data-dcnode-id="4312" instrument_node="">The other photographs are that of letters, notes, sceneries. Letters. Yes, I am shaking in my boots. Letters. Terrifying. </span><b data-dcnode-id="4310"><span data-dcnode-id="4311" instrument_node="">I'm actually more frightened by the hideous carpets (paisley?!) on which the notes sometimes are photographed</span></b><span data-dcnode-id="4309" instrument_node="">.</span><br data-dcnode-id="4308"><br data-dcnode-id="4307"><span data-dcnode-id="4306" instrument_node="">I was an easily scared child. I would say with absolute confidence that my five year old self would not be frightened at anything within this books' pages.</span><br data-dcnode-id="4305"><br data-dcnode-id="4304"><span data-dcnode-id="4303" instrument_node="">The plot revolves around telling, not showing. Suspense is never built. The plot is paper thin, the twists are completely dependent upon our suspension of disbelief. For a horror, there is absolutely no suspense, and no fear. It is reliant upon coincidences and </span><i data-dcnode-id="4301"><span data-dcnode-id="4302" instrument_node="">deus ex machina</span></i><span data-dcnode-id="4300" instrument_node="">. There is no subtlety in the attempts at giving us hints. It was so very obvious to me from the very beginning as to whom the villain would turn out to be.</span><br data-dcnode-id="4299"><br data-dcnode-id="4298"><span data-dcnode-id="4297" instrument_node="">There is a hint that this will be part of a series. I was barely intrigued enough to keep reading until the end of this book, and I'm about as eager to read the next book as I am anticipating a visit to my dentist. Skip this book.</span></span><span data-dcnode-id="4295" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="3808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/5136858-bonnie%3Fshelf%3Dya"><span data-dcnode-id="3809" instrument_node="">ya</span></a><span data-dcnode-id="3807" instrument_node="">

</span><span class="readable" data-dcnode-id="3755" id="reviewTextContainer614413224"><span data-dcnode-id="3801" instrument_node="">
</span><span data-dcnode-id="3793" id="freeTextContainer11733536755809318018"><span data-dcnode-id="3800" instrument_node="">A copy of Asylum was provided to me by Harper Children's/Edelweiss for review purposes.</span><br data-dcnode-id="3799"><br data-dcnode-id="3798"><span data-dcnode-id="3797" instrument_node="">The word Asylum alone evokes a feeling of dread. A twinge of apprehension. Unfortunately the title was the only thing that elicited that expected response, because the book was honestly extremely dry and wearisome.</span><br data-dcnode-id="3796"><br data-dcnode-id="3795"><span data-dcnode-id="3794" instrument_node="">The idea behind the story was solid: 16 year-old Dan comes to stay for several weeks over the summer at a college prep program and he finds out their dorms are located in what once was an asylum for </span></span><span data-dcnode-id="3792" instrument_node="">
</span><span data-dcnode-id="3760" id="freeText11733536755809318018" style="display:none"><span data-dcnode-id="3791" instrument_node="">A copy of Asylum was provided to me by Harper Children's/Edelweiss for review purposes.</span><br data-dcnode-id="3790"><br data-dcnode-id="3789"><span data-dcnode-id="3788" instrument_node="">The word Asylum alone evokes a feeling of dread. A twinge of apprehension. Unfortunately the title was the only thing that elicited that expected response, because the book was honestly extremely dry and wearisome.</span><br data-dcnode-id="3787"><br data-dcnode-id="3786"><span data-dcnode-id="3785" instrument_node="">The idea behind the story was solid: 16 year-old Dan comes to stay for several weeks over the summer at a college prep program and he finds out their dorms are located in what once was an asylum for the criminally insane. I'm on board with that. The characters completely destroyed this story though. They were dull, uninteresting and lacking in any sort of dimension.</span><br data-dcnode-id="3784"><br data-dcnode-id="3783"><span data-dcnode-id="3782" instrument_node="">The inconsistency of maturity was awful. Dan would be contemplating Jung one minute and acting like a 12 year old boy the next. He is supposed to be this incredibly socially awkward guy that has the hardest time making friends, yet he finds two people and they're the bestest of friends... instantly. They spend all their time together and they even decide to take some of the same classes together and they talk about their family problems with one another and... it just didn't feel authentic. Their friendship itself may have worked, but the fact that we knew they had JUST met ruined it all. Within a week even the teachers have nicknamed them 'The Hydra'. </span><br data-dcnode-id="3781"><br data-dcnode-id="3780"><span data-dcnode-id="3779" instrument_node="">Dan's two friends, Abby and Jordan, also met each other for the first time on the bus that brought them to the school. The nail in the coffin happened for me when about a week into their stay, Abby forgets to tell Jordan that she won't be able to study with him because she's hanging out with Dan instead. She comes home to find him waiting for her outside her dorm door, drinking, proclaiming that she drove him to drink. </span><br data-dcnode-id="3778"><br data-dcnode-id="3777"><span data-dcnode-id="3776" instrument_node="">Their friendship lacked a necessary composition that would generate these types of responses. But honestly, I'm not sure when I would ever put up with that type of behavior from a friend; it was just unnecessary and dramatic. (Also unnecessary was the incredibly forced romance that could have completely been done without.) It seemed incredibly unrealistic how advanced their relationship seemed to be after such a short amount of time and considering this was a huge basis of the story, it practically ruined the story as a whole for me. </span><br data-dcnode-id="3775"><br data-dcnode-id="3774"><span data-dcnode-id="3773" instrument_node="">The comparison to Miss Peregrine's Home for Peculiar Children is a bit far-fetched and the only link between the two I could determine was the inclusion of black and white pictures. With Miss Peregrine's Home for Peculiar Children though, the pictures felt like they fit with the story much more and appeared to be incredibly authentic. While my ARC copy didn't contain all pictures, the ones I was able to view looked digitally created and many didn't even match up to what was being described which completely defeated the whole purpose. I would consider this to be a far closer match-up to Dennis Lehane's 'Shutter Island'- the YA Version with extremely bad characters.</span><br data-dcnode-id="3772"><br data-dcnode-id="3771"><span data-dcnode-id="3770" instrument_node="">The story was interesting enough but I was really anticipating a much more intense reading experience. The ending doesn't give you all the answers, because apparently this is being made into a series which is completely unnecessary; this could have been a perfect stand-alone story (if it had more solid of characters and maybe a bit more creepy thrown in for flavor). Suffice it to say this was an epic disappointment and I don't consider myself to be interested enough in continuing.</span><br data-dcnode-id="3769"><br data-dcnode-id="3768"><div data-dcnode-id="3761"><span data-dcnode-id="3767" instrument_node="">

</span><span data-dcnode-id="3539" id="freeTextContainer17700570642098999287"><span data-dcnode-id="3552" instrument_node="">See more reviews at </span><a data-dcnode-id="3550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//theyabooklover.blogspot.com.au/" rel="nofollow noopener"><span data-dcnode-id="3551" instrument_node="">YA Midnight Reads</span></a><br data-dcnode-id="3549"><br data-dcnode-id="3548"><b data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node=""> Thank you HarperCollins Australia for sending me this copy. No compensation was given or taken to alter this review. </span></b><br data-dcnode-id="3545"><br data-dcnode-id="3544"><span data-dcnode-id="3543" instrument_node="">Mini review:</span><br data-dcnode-id="3542"><br data-dcnode-id="3541"><span data-dcnode-id="3540" instrument_node="">I highly recommend Asylum if you want to fall asleep in the middle of the day- which mind you, I haven't done since I was 4 years old, and well, now. This book certainly comes with a lot of nostalgic moments, including a writing style that's vehemently juvenile. But of course, read this book if you're feeling lazy, and don't want t</span></span><span data-dcnode-id="3538" instrument_node="">
</span><span data-dcnode-id="3494" id="freeText17700570642098999287" style="display:none"><span data-dcnode-id="3537" instrument_node="">See more reviews at </span><a data-dcnode-id="3535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//theyabooklover.blogspot.com.au/" rel="nofollow noopener"><span data-dcnode-id="3536" instrument_node="">YA Midnight Reads</span></a><br data-dcnode-id="3534"><br data-dcnode-id="3533"><b data-dcnode-id="3531"><span data-dcnode-id="3532" instrument_node=""> Thank you HarperCollins Australia for sending me this copy. No compensation was given or taken to alter this review. </span></b><br data-dcnode-id="3530"><br data-dcnode-id="3529"><span data-dcnode-id="3528" instrument_node="">Mini review:</span><br data-dcnode-id="3527"><br data-dcnode-id="3526"><span data-dcnode-id="3525" instrument_node="">I highly recommend Asylum if you want to fall asleep in the middle of the day- which mind you, I haven't done since I was 4 years old, and well, now. This book certainly comes with a lot of nostalgic moments, including a writing style that's vehemently juvenile. But of course, read this book if you're feeling lazy, and don't want to use your brain as Asylum does a perfect job in these two areas. Apart from that, Asylum was flawed in most other aspect which is re-assuredly much more important than a middle-of-day snooze and no-brainer read.</span><br data-dcnode-id="3524"><br data-dcnode-id="3523"><strong data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">What I enjoyed:</span></strong><br data-dcnode-id="3520"><br data-dcnode-id="3519"><span data-dcnode-id="3518" instrument_node="">The one and only legitimate reason to why Asylum was merely bearable was the plot. Sure, it was horribly executed but the mystery was somewhat there and interesting enough for me to want to know the resolution. While it didn't give off the effect of a thrillingly spooky, the mystery part did give this novel some enjoyment- though insanely miniscule.</span><br data-dcnode-id="3517"><br data-dcnode-id="3516"><strong data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">What was just, bleh:</span></strong><br data-dcnode-id="3513"><br data-dcnode-id="3512"><span data-dcnode-id="3511" instrument_node="">I feel Roux created a bunch of world's randomest characters and threw them into the storyline. Our main character, Dan is exceedingly flat. He's meant to be smart but his dialogue and the way he tackles situations is completely hollow and illogical. Moreover, Abby, the love interest had an undeniably stereotypical ego and Jordan, the other friend was more randomer than this book. He'd pop out of nowhere then show up with some irregular behaviour. The protagonists, to be put candidly, were inconsistent and not carefully constructed.</span><br data-dcnode-id="3510"><br data-dcnode-id="3509"><span data-dcnode-id="3508" instrument_node="">Another undoubtedly lousy aspect was the romance. There is not the slightest layer of depth. Instant love really does not go well with underdeveloped characters and childish chemistry. And by childish I mean utterly awkward and laaaaame.</span><br data-dcnode-id="3507"><br data-dcnode-id="3506"><span data-dcnode-id="3505" instrument_node="">The pace. Hot and Cold by Katy Perry is the ideal song to match this aspect. The range of fast to slow is a distinct dynamic here, really. This took major impact in the mystery. Like I aforementioned, the mystery lost its chilling counterpart due to the poor even, pacing.</span><br data-dcnode-id="3504"><br data-dcnode-id="3503"><span data-dcnode-id="3502" instrument_node="">Asylum, is another good potential gone bad. Unfortunately, I cannot recommend this. (Heck, I couldn't find much effort in reviewing this either.)</span><br data-dcnode-id="3501"><br data-dcnode-id="3500"><span data-dcnode-id="3499" instrument_node="">&nbsp;</span><br data-dcnode-id="3498"><span data-dcnode-id="3497" instrument_node="">***********</span><br data-dcnode-id="3496"><span data-dcnode-id="3495" instrument_node="">LAAAAAAME.</span></span><span data-dcnode-id="3493" instrument_node="">

</span><b data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">No great mind has ever existed without a touch of madness.</span></b><span data-dcnode-id="3392" instrument_node="">
</span></blockquote><br data-dcnode-id="3390"><span data-dcnode-id="3389" instrument_node="">I know a lot of people feel that asylum settings in horror are overdone, or insensitive, and I can fully respect that and see where those people are coming from! That said, even as a woman who probably (definitely) would’ve been locked up with the key thrown away if I’d been alive a couple hundred years ago (I say this only half-jokingly 😂), I adore a good retired asylum setting in a scary story, so when I found out about this little </span></span><span data-dcnode-id="3387" instrument_node="">
</span><span data-dcnode-id="3342" id="freeText1253940932989610221" style="display:none"><blockquote data-dcnode-id="3382"><span data-dcnode-id="3386" instrument_node="">
</span><b data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">No great mind has ever existed without a touch of madness.</span></b><span data-dcnode-id="3383" instrument_node="">
</span></blockquote><br data-dcnode-id="3381"><span data-dcnode-id="3380" instrument_node="">I know a lot of people feel that asylum settings in horror are overdone, or insensitive, and I can fully respect that and see where those people are coming from! That said, even as a woman who probably (definitely) would’ve been locked up with the key thrown away if I’d been alive a couple hundred years ago (I say this only half-jokingly 😂), I adore a good retired asylum setting in a scary story, so when I found out about this little series, I was pretty excited to check it out!</span><br data-dcnode-id="3379"><br data-dcnode-id="3378"><blockquote data-dcnode-id="3373"><span data-dcnode-id="3377" instrument_node="">
</span><b data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">It was a house for those who could not take care of themselves, for those who heard voices, who had strange thoughts and did strange things. The house was meant to keep them in. Once they came, they never left.</span></b><span data-dcnode-id="3374" instrument_node="">
</span></blockquote><br data-dcnode-id="3372"><span data-dcnode-id="3371" instrument_node="">And I have to say, the setting in </span><i data-dcnode-id="3369"><span data-dcnode-id="3370" instrument_node="">Asylum</span></i><span data-dcnode-id="3368" instrument_node=""> really is great. It’s claustrophobic at times, atmospheric as anything, and struck me as the kind of place that I would pay good money to be allowed to explore or even just take a tour through. It seemed like a building that absolutely ought to exist in a million places all over the world, run-down and decrepit and probably terrifying the locals on a daily basis. Unfortunately, the positive things I have to say for this book begin and end there.</span><br data-dcnode-id="3367"><br data-dcnode-id="3366"><blockquote data-dcnode-id="3361"><span data-dcnode-id="3365" instrument_node="">
</span><b data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">It was a fight against the madness, he felt like he was losing. Maybe he already had...</span></b><span data-dcnode-id="3362" instrument_node="">
</span></blockquote><br data-dcnode-id="3360"><span data-dcnode-id="3359" instrument_node="">The characters are all solidly awful, and I don’t think I ever had a moment of liking a single one of them. On top of that, I literally predicted the ‘twist’ a few </span><i data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">pages</span></i><span data-dcnode-id="3356" instrument_node=""> into the book, and having guessed it so early on made it difficult to enjoy the rest, because I kept wondering why the hell these teens couldn’t come anywhere near guessing the truth. I was frustrated, disappointed, and altogether unimpressed that I spent my money on this book or its immediate sequel, which I don’t know if I’ll ever even bother picking up.</span><br data-dcnode-id="3355"><br data-dcnode-id="3354"><b data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">2.5 stars</span></b><br data-dcnode-id="3351"><br data-dcnode-id="3350"><span data-dcnode-id="3349" instrument_node="">———</span><br data-dcnode-id="3348"><br data-dcnode-id="3347"><span data-dcnode-id="3346" instrument_node="">Buddy read with </span><a data-dcnode-id="3344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/2515342897" rel="nofollow noopener"><span data-dcnode-id="3345" instrument_node="">Kaleena</span></a><span data-dcnode-id="3343" instrument_node="">!</span></span><span data-dcnode-id="3341" instrument_node="">

</span><span data-dcnode-id="3266" id="freeTextContainer14884729641939061211"><span data-dcnode-id="3267" instrument_node=""> I wouldn't say this book is amazing. I mean, I liked the book, but I wasn't attached to it. Before reading this book, I had so many expectations. The characters were likable, but I wasn't completely attached to them. Unfortunately, I wasn't a huge fan of the writing style either. From some of the reviews I read, they said that this book was a cheaper version of Miss.Peregrine's Home for Peculiar Children. Unfortunately, I didn't read that book yet so I cannot compare the two. I just didn't enjo</span></span><span data-dcnode-id="3265" instrument_node="">
</span><span data-dcnode-id="3253" id="freeText14884729641939061211" style="display:none"><span data-dcnode-id="3264" instrument_node=""> I wouldn't say this book is amazing. I mean, I liked the book, but I wasn't attached to it. Before reading this book, I had so many expectations. The characters were likable, but I wasn't completely attached to them. Unfortunately, I wasn't a huge fan of the writing style either. From some of the reviews I read, they said that this book was a cheaper version of Miss.Peregrine's Home for Peculiar Children. Unfortunately, I didn't read that book yet so I cannot compare the two. I just didn't enjoy the book as much as I thought I would. It was the reason I was in a reading slump. I kept avoiding the book because I think I got tired of it.</span><br data-dcnode-id="3263"><span data-dcnode-id="3262" instrument_node=""> </span><br data-dcnode-id="3261"><span data-dcnode-id="3260" instrument_node=""> This story is about a boy named Daniel Crawford who is going to summer school. The high school that he is going to is an old asylum, that was renovated into a high school. But parts of the school is not renovated and there are old offices with information about the old asylum. Daniel befriends Abby and Jordan and they go on adventures to the old offices. Throughout the book, there are some images that show where they are. Weird things begin to happy to Daniel and murders begin to occur in the school. Abby, Jordan and Daniel try to figure out what it going on and try to piece everything together.</span><br data-dcnode-id="3259"><br data-dcnode-id="3258"><span data-dcnode-id="3257" instrument_node=""> If you think about it, I feel like the summary really gets you. But when I read the book, I just didn't enjoy it. I found it fast-paced, but I didn't feel like I was Daniel. Usually, when I read a book, I feel like I am the main character. But I didn't feel like that in this book and I don't know why. The book was meant to give you the scares, but it didn't scare me. At parts I would get the creeps, but I never felt terrified. When I read the huge plot twist in this story, I felt like I saw it coming. I already knew who was behind the murders and I wasn't surprised. I suspected one character the entire time and I was right. But the thing is, when it comes to suspense and mystery, I want my predictions to be wrong. I want to be shocked and read a huge plot twist that gets me.</span><br data-dcnode-id="3256"><br data-dcnode-id="3255"><span data-dcnode-id="3254" instrument_node=""> As you can see, I didn't enjoy this very much. Maybe others may enjoy it but I didn't enjoy it as much as I thought I would. I am planning on continuing with this series because some reviewers said that it gets better. I am hoping that it does. Wish me luck, and hopefully I wont go into another reading slump! </span></span><span data-dcnode-id="3252" instrument_node="">

</span><span data-dcnode-id="2866" id="freeTextContainer7819671291962600764"><span data-dcnode-id="2890" instrument_node="">Actually kind of impressed with this Young Adult horror story.</span><br data-dcnode-id="2889"><br data-dcnode-id="2888"><span data-dcnode-id="2887" instrument_node="">Creepy cover ✔</span><br data-dcnode-id="2886"><span data-dcnode-id="2885" instrument_node="">Horrible history ✔</span><br data-dcnode-id="2884"><span data-dcnode-id="2883" instrument_node="">Mysterious happenings ✔</span><br data-dcnode-id="2882"><span data-dcnode-id="2881" instrument_node="">Creepy AF location ✔</span><br data-dcnode-id="2880"><span data-dcnode-id="2879" instrument_node="">Terrifying photos ✔</span><br data-dcnode-id="2878"><br data-dcnode-id="2877"><span data-dcnode-id="2876" instrument_node="">The photos definitely make this book a </span><b data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">hundred times creepier,</span></b><span data-dcnode-id="2873" instrument_node=""> even if most didn't really match the story. I think the shudder effect comes from knowing that people and places like this did actually exist once upon a time.</span><br data-dcnode-id="2872"><br data-dcnode-id="2871"><span data-dcnode-id="2870" instrument_node="">For any horror aficionado, </span><b data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">haunted asylums</span></b><span data-dcnode-id="2867" instrument_node=""> aren't really anything new. They arise constantly in books, films, tv shows ...</span></span><span data-dcnode-id="2865" instrument_node="">
</span><span data-dcnode-id="2798" id="freeText7819671291962600764" style="display:none"><span data-dcnode-id="2864" instrument_node="">Actually kind of impressed with this Young Adult horror story.</span><br data-dcnode-id="2863"><br data-dcnode-id="2862"><span data-dcnode-id="2861" instrument_node="">Creepy cover ✔</span><br data-dcnode-id="2860"><span data-dcnode-id="2859" instrument_node="">Horrible history ✔</span><br data-dcnode-id="2858"><span data-dcnode-id="2857" instrument_node="">Mysterious happenings ✔</span><br data-dcnode-id="2856"><span data-dcnode-id="2855" instrument_node="">Creepy AF location ✔</span><br data-dcnode-id="2854"><span data-dcnode-id="2853" instrument_node="">Terrifying photos ✔</span><br data-dcnode-id="2852"><br data-dcnode-id="2851"><span data-dcnode-id="2850" instrument_node="">The photos definitely make this book a </span><b data-dcnode-id="2848"><span data-dcnode-id="2849" instrument_node="">hundred times creepier,</span></b><span data-dcnode-id="2847" instrument_node=""> even if most didn't really match the story. I think the shudder effect comes from knowing that people and places like this did actually exist once upon a time.</span><br data-dcnode-id="2846"><br data-dcnode-id="2845"><span data-dcnode-id="2844" instrument_node="">For any horror aficionado, </span><b data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">haunted asylums</span></b><span data-dcnode-id="2841" instrument_node=""> aren't really anything new. They arise constantly in books, films, tv shows ... you name it. It's an endless source of fear, possibly because it also forces us to consider what kind of depravity humankind has been responsible for in the past. Those poor departed souls.</span><br data-dcnode-id="2840"><br data-dcnode-id="2839"><span data-dcnode-id="2838" instrument_node="">So it's not a particularly original idea, but there's a reason it's been done on numerous occasions. It's a totally creepy premise.</span><br data-dcnode-id="2837"><br data-dcnode-id="2836"><u data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">Fun fact:</span></u><span data-dcnode-id="2833" instrument_node=""> the place I stayed during my first year of uni was actually once an asylum. </span><br data-dcnode-id="2832"><u data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">Not so fun fact:</span></u><span data-dcnode-id="2829" instrument_node=""> Absolutely zero haunting shenanigans for the entire year I was there. Like, one day I came home from classes and the gas had been left on in the kitchen but I'm pretty sure that was incompetent roomies rather than vengeful spirits.</span><br data-dcnode-id="2828"><br data-dcnode-id="2827"><span data-dcnode-id="2826" instrument_node="">But I digress.</span><br data-dcnode-id="2825"><br data-dcnode-id="2824"><span data-dcnode-id="2823" instrument_node="">One of my favourite songs (aptly titled 'Ghost'), includes the lyrics: </span><i data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">We're not afraid of what we know, more what we don't.</span></i><span data-dcnode-id="2820" instrument_node=""> I think that explains why so many people are fascinated (and easily terrified) by ghosts. Departed souls. Spirits. </span><b data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">NO ONE KNOWS.</span></b><span data-dcnode-id="2817" instrument_node=""> It's a lot harder to stand and fight something that may or may not be there. The best horror stories are the ones where you're not entirely sure what the horror is. Not knowing is part of the fear.</span><br data-dcnode-id="2816"><br data-dcnode-id="2815"><span data-dcnode-id="2814" instrument_node="">I had a few theories in my head reading this, but I was still scratching it by the end. I think that's a lot to do with this being a series: it leads to unanswered questions. I think that's what stopped it from packing a nice hard punch at the end. It kinda tapers out in a weird way and nothing is properly resolved.</span><br data-dcnode-id="2813"><br data-dcnode-id="2812"><span data-dcnode-id="2811" instrument_node="">I liked the characters, but I wasn't too fond of the coincidences. They felt false to me, like the story was trying to hard to link things. I did really appreciate Jordan as a non-conforming character, but I was also thrown by his lack of characterisation. The book kinda tells you he doesn't fit a standard mold but then doesn't give you much more about him? I suspect his personality will come more into play in the sequel. Abby was okay, I liked her just fine, but she was a bit naive for my liking. Dan ... I mean, forgive me for saying so, but the guy seems like a total nut job. I'm definitely keen to see his insanity progress in the next book. (Wait, what?)</span><br data-dcnode-id="2810"><br data-dcnode-id="2809"><span data-dcnode-id="2808" instrument_node="">I guess I really liked the premise and this book scores major points for the creepy factor, but the story itself felt a bit weak to me. Like all the gimmicky stuff came first and then the author was like, </span><i data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">'oh, wait, I guess I kinda need a twisted story to go with this ...'</span></i><span data-dcnode-id="2805" instrument_node=""> I enjoyed it, and it has some great creepy moments and ideas, but the story is a bit ehhhh. Also weird. Rubbish ending.</span><br data-dcnode-id="2804"><br data-dcnode-id="2803"><span data-dcnode-id="2802" instrument_node="">Hoping the sequel amps up the creepiness and brings a stronger story. I'll definitely be reading it. There's got to be something way more sinister lurking underneath this lil horror story.</span><br data-dcnode-id="2801"><br data-dcnode-id="2800"><span data-dcnode-id="2799" instrument_node="">*rubs hands together in anticipation*</span></span><span data-dcnode-id="2797" instrument_node="">

</span><span data-dcnode-id="2712" id="freeTextContainer18076458134770544585"><span data-dcnode-id="2713" instrument_node="">Okay so I have decided to do something outside the box and norm for bloggers. I am going to start a new book shelf on here named "no rating" which means I will not rate it. I firmly believe that sometimes we read a book and it is not OUR cup of tea and we rate it badly by giving it a one or a two or a three stars. I hate doing that just because I read the book and did not like it does not mean you may not like it. As a blogger we influence a lot of readers with our reviews and I just don't want </span></span><span data-dcnode-id="2711" instrument_node="">
</span><span data-dcnode-id="2694" id="freeText18076458134770544585" style="display:none"><span data-dcnode-id="2710" instrument_node="">Okay so I have decided to do something outside the box and norm for bloggers. I am going to start a new book shelf on here named "no rating" which means I will not rate it. I firmly believe that sometimes we read a book and it is not OUR cup of tea and we rate it badly by giving it a one or a two or a three stars. I hate doing that just because I read the book and did not like it does not mean you may not like it. As a blogger we influence a lot of readers with our reviews and I just don't want to do that to an author where others may enjoy the book. So I will state what I liked and what I did not like and the rest is up to the reader to decide whether or not to read it.</span><br data-dcnode-id="2709"><br data-dcnode-id="2708"><span data-dcnode-id="2707" instrument_node="">So here we go......</span><br data-dcnode-id="2706"><br data-dcnode-id="2705"><span data-dcnode-id="2704" instrument_node="">I picked up the book and loved the cover and the opening. I really enjoyed all the pictures of the Asylums in this book. I live in Mass which is the home of a lot of Asylums but I work across the street from one of the most famous Asylums ever and it is called Worcester State Hospital </span><a data-dcnode-id="2702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Worcester_State_Hospital" rel="noopener nofollow" target="_blank"><span data-dcnode-id="2703" instrument_node="">http://en.wikipedia.org/wiki/Worceste...</span></a><span data-dcnode-id="2701" instrument_node=""> and for a good reading and scare read wiki for the info because it is very accurate and has pictures to see what I see everyday. So as I am reading this story about an awkward boy who has no friends and is spending his summer before college at a college prep program I was excited because I figured okay he is going to get some college credits under his belt and get ready for college.</span><br data-dcnode-id="2700"><br data-dcnode-id="2699"><span data-dcnode-id="2698" instrument_node="">Instead I get that he instantly makes friends with two other people Jordan his roommate and Abby his supposed love interest. So as the story goes on it is not made clear whether or not these three are related to things until the middle of the book. That is when we find out the three of then are related to this Asylum that is their dorm. Then things went a little south for me from there but I kept reading because I was like okay everything is going to come into place but it just didn't do it for me. So I finished it and I have decided that yes this was not a book for me but others may love it like it or hate it. It was okay to read but I loved the pictures and hopefully there is going to be a sequel because I had more questions than answers.</span><br data-dcnode-id="2697"><br data-dcnode-id="2696"><span data-dcnode-id="2695" instrument_node="">I hope this review helps and I am sorry but I just can't rate it you have to read it to see for yourself whether or not you liked it.</span></span><span data-dcnode-id="2693" instrument_node="">

</span><span data-dcnode-id="2591" id="freeTextContainer1471701898026476328"><a data-dcnode-id="2600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scottreadsit.blogspot.com/" rel="nofollow noopener"><span data-dcnode-id="2601" instrument_node="">Check out my blog for this review &amp; so much more! </span></a><span data-dcnode-id="2599" instrument_node=""> </span><br data-dcnode-id="2598"><span data-dcnode-id="2597" instrument_node=""> Rating: A Generous 2.5 Stars</span><br data-dcnode-id="2596"><span data-dcnode-id="2595" instrument_node=""> As soon as I saw that Asylum was being compared to Miss Peregrine's Home For Peculiar Children, I immediately downloaded an ARC of it. Miss Peregrine's is one of my favorite books so I had high expectations for Asylum. I'm sorry to say that Asylum is not the next Miss Peregrine's but it is a pretty good horror/thriller.</span><br data-dcnode-id="2594"><br data-dcnode-id="2593"><span data-dcnode-id="2592" instrument_node=""> Miss Peregrine's was such an unique read because all of the photos that accompanied the story wer</span></span><span data-dcnode-id="2590" instrument_node="">
</span><span data-dcnode-id="2570" id="freeText1471701898026476328" style="display:none"><a data-dcnode-id="2588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scottreadsit.blogspot.com/" rel="nofollow noopener"><span data-dcnode-id="2589" instrument_node="">Check out my blog for this review &amp; so much more! </span></a><span data-dcnode-id="2587" instrument_node=""> </span><br data-dcnode-id="2586"><span data-dcnode-id="2585" instrument_node=""> Rating: A Generous 2.5 Stars</span><br data-dcnode-id="2584"><span data-dcnode-id="2583" instrument_node=""> As soon as I saw that Asylum was being compared to Miss Peregrine's Home For Peculiar Children, I immediately downloaded an ARC of it. Miss Peregrine's is one of my favorite books so I had high expectations for Asylum. I'm sorry to say that Asylum is not the next Miss Peregrine's but it is a pretty good horror/thriller.</span><br data-dcnode-id="2582"><br data-dcnode-id="2581"><span data-dcnode-id="2580" instrument_node=""> Miss Peregrine's was such an unique read because all of the photos that accompanied the story were original. Ransom Riggs wrote a story around the creepy photos he had found at flea markets and photograph collectors. It is quite obvious that the photographs in Asylum were staged to complement the story. All of the photos feel very fake and don't really add much to the overall feel of Asylum. There were times when I felt like creepier photos should have been in this book rather than the mundane photos that were included. I know my ARC didn't have all of the interior art and photographs so it's a bit unfair to deride this book based on the visual components. </span><br data-dcnode-id="2579"><br data-dcnode-id="2578"><span data-dcnode-id="2577" instrument_node=""> The characters in this book are definitely developed, but I wasn't the biggest fan of them. Dan acted like a petty child at sometimes and it bothered me how infatuated he was with Abby. Dan would notice such trivial things about Abby's appearance and obsess over it. It was a bit strange in my opinion how he fawned over her hair and how wavy it was. Last time I checked this isn't normal behaviour for a teenage guy. Abby was kind of a strange character but I still kind of liked her. I didn't understand why Dan was so enamored with her but she was definitely an interesting character. I felt like Jordan got the short end of the stick in this book because even though he is a main character, at times he felt kind of arbitrary. There were pages and pages went by where the author didn't even mention Jordan and I really wanted to know what was going on with him. He wasn't under-developed but I would have liked to see his character furthered in this book. </span><br data-dcnode-id="2576"><br data-dcnode-id="2575"><span data-dcnode-id="2574" instrument_node=""> Asylum is a well-done mystery-thriller-horror combination and the plot is executed extremely well. There was a perfect balance of thrill and macabre ingrained in the plot but there were still moments where I felt a need to roll my eyes. Asylum is a very original novel but it still has some of the horror movie cliches. Seriously why would you enter an abandoned mental asylum alone? Besides the cliches, the plot was pretty original and enjoyable up until the ending. The ending felt like a total cop out and just a lame way to expand this book into an entire series. I seriously feel like this book would have worked better as a stand-alone, does every YA book need to be apart of a series? Whatever happened to good ol' stand-alones? </span><br data-dcnode-id="2573"><br data-dcnode-id="2572"><span data-dcnode-id="2571" instrument_node=""> Bottomline: I enjoyed Asylum for the most part and I will reluctantly read the sequel. Asylum is a fast-paced thriller with just enough spookiness to give readers chills. This book isn't the next Miss Peregrine's but it's definitely a must-read for horror fans. </span></span><span data-dcnode-id="2569" instrument_node="">

</span><span data-dcnode-id="2479" id="freeText1773727379378157976" style="display:none"><span data-dcnode-id="2489" instrument_node="">I wanted to read a scary book, something that would chill me to the bone, a dark, deep, twisted read. For me, Asylum ticked all of the boxes.</span><br data-dcnode-id="2488"><br data-dcnode-id="2487"><span data-dcnode-id="2486" instrument_node="">The main character Daniel Crawford is on a summer programme run by the New Hampshire College but instead of staying on a College campus, the students are housed in an ex-run asylum. Dan meets Jordan, Abby and his new roommate Felix but after a short time at the asylum, nothing is quite what it seems. Dan starts to suffer from hallucinations, Jordan and Dan from nightmares and all of the friends from disturbing images and creepy texts that threaten to kill them all. It's then that Dan starts to question his true heritage and because of this, he is determined to get to the bottom of the mystery. Even through all of the local residents who seem to hate his guts.</span><br data-dcnode-id="2485"><br data-dcnode-id="2484"><span data-dcnode-id="2483" instrument_node="">The images in the book are quite disturbing but in all honesty, I feel that the images paint scenes of portrayal throughout and gives the reader more to explore regarding settings in various locations. It's most definitely not a book for anyone under the age of 15, it's violent in places. Please don't read this book before bedtime! For anyone wanting to be scared out of their wits, this is a book that I will recommend to you. </span><br data-dcnode-id="2482"><br data-dcnode-id="2481"><span data-dcnode-id="2480" instrument_node="">Review for the sequel Sanctum to follow soon! </span></span><span data-dcnode-id="2478" instrument_node="">

</span><span data-dcnode-id="2391" id="freeText10762168049138469237" style="display:none"><span data-dcnode-id="2392" instrument_node="">I cannot stress this enough - this is a horrible and poorly executed book, particularly in that there is no way to get a refund for the time I spent reading it. Time that would have been better spent on, oh, maybe reading nutritional facts on a cereal box or perusing depressing obituaries in the newspaper. While the cover sports an eerie image and promises disturbing found photographs to enhance the story - reminiscent of Ransom Riggs' technique in Miss Peregrine's Home For Peculiar Children - the author fails to deliver on this at all. The characters are underdeveloped and rather unlikeable. Despite the fact that you can easily ascertain where the story is heading within the first few chapters, the storyline is plodding at best and fails to pick up the pace until you are more than two-thirds of the way through the book. Even then the supposed plot "twists" were weak and grossly underutilized. Between the lackluster writing, uninspiring characters, and tediously predictable plot, the only satisfying aspect of the book's ending was that my suffering in reading it was finally over.</span></span><span data-dcnode-id="2390" instrument_node="">

</span><span data-dcnode-id="2183" id="freeText3172341330570566069" style="display:none"><span data-dcnode-id="2197" instrument_node="">What would you do if you attended a college that used to be an asylum for the criminally insane?</span><br data-dcnode-id="2196"><br data-dcnode-id="2195"><br data-dcnode-id="2194"><span data-dcnode-id="2193" instrument_node="">In the book “Asylum” by Madeleine Roux, sixteen year old Dan Crawford was attending New Hampshire College Prep, which was just your average summer program - or so he thought. When Dan comes to know that his dorm used to be an insane asylum, he starts noticing a change in the atmosphere of the college. Something just wasn't right.</span><br data-dcnode-id="2192"><br data-dcnode-id="2191"><span data-dcnode-id="2190" instrument_node="">Dan and his newly found friends, Jordan and Abby, discover an abandoned wing of the college that led straight into the asylum. Upon exiting the old hall, the three teenagers regret entering in the first place. Over the next week, Dan was being gifted anonymous letters, each containing a clue to what he would discover in the last weeks of the program. When Abby begs Dan to go back into the asylum once more, she finds a room that contains all the files from patients who checked into the asylum. They each had a paper that said ‘Recovered?’ with either a ‘Y’ or an ‘N’ to signal whether a patient had recovered or not. Most of the cards were checked with a ‘N,’ but one card stood out to Dan, which had been checked ‘Y.’ The recovered patient went by ‘The Sculptor, and he was put in the hospital for murdering many people, and leaving their bodies in certain positions, as if sculpting a statue. </span><br data-dcnode-id="2189"><br data-dcnode-id="2188"><span data-dcnode-id="2187" instrument_node="">As if things weren't crazy enough, Dan and the old warden had the same exact name. Dan starts experiencing visions as if he was seeing through the wardens eyes. This drives him mad, and he is suddenly determined to find out about his biological family’s past. His current parents always told him they couldn't say too much about his blood family, and he never understood why, until now.</span><br data-dcnode-id="2186"><br data-dcnode-id="2185"><span data-dcnode-id="2184" instrument_node="">Join Dan and his friends on all their supernatural occurrences! </span></span><span data-dcnode-id="2182" instrument_node="">

</span><span data-dcnode-id="2072" id="freeTextContainer7327811451014620700"><b data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">This book is nowhere near creepy and horrific.</span></b><span data-dcnode-id="2085" instrument_node=""> I was expecting to read some spine-tingling, creepy haunting but this book is nothing like that. </span><br data-dcnode-id="2084"><br data-dcnode-id="2083"><span data-dcnode-id="2082" instrument_node="">I was really excited to read this, but it was a huge dissapointment. This whole book was meh. </span><br data-dcnode-id="2081"><br data-dcnode-id="2080"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="2079" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1422410443ra/13499613.gif&amp;raw" width="400"><br data-dcnode-id="2078"><br data-dcnode-id="2077"><span data-dcnode-id="2076" instrument_node="">This book was nothing special. Jordon literally had no purpose in this book. The romance was so unnecessary. </span><br data-dcnode-id="2075"><br data-dcnode-id="2074"><span data-dcnode-id="2073" instrument_node="">Some of the pictures in this book were pretty creepy and somewhere in the beginning I actually shivered from the creepiness, but after that nothing reall</span></span><span data-dcnode-id="2071" instrument_node="">
</span><span data-dcnode-id="2045" id="freeText7327811451014620700" style="display:none"><b data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">This book is nowhere near creepy and horrific.</span></b><span data-dcnode-id="2068" instrument_node=""> I was expecting to read some spine-tingling, creepy haunting but this book is nothing like that. </span><br data-dcnode-id="2067"><br data-dcnode-id="2066"><span data-dcnode-id="2065" instrument_node="">I was really excited to read this, but it was a huge dissapointment. This whole book was meh. </span><br data-dcnode-id="2064"><br data-dcnode-id="2063"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="2062" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1422410443ra/13499613.gif&amp;raw" width="400"><br data-dcnode-id="2061"><br data-dcnode-id="2060"><span data-dcnode-id="2059" instrument_node="">This book was nothing special. Jordon literally had no purpose in this book. The romance was so unnecessary. </span><br data-dcnode-id="2058"><br data-dcnode-id="2057"><span data-dcnode-id="2056" instrument_node="">Some of the pictures in this book were pretty creepy and somewhere in the beginning I actually shivered from the creepiness, but after that nothing really made me want to go to my mom's room and sleep with her, scared shitless. </span><br data-dcnode-id="2055"><br data-dcnode-id="2054"><span data-dcnode-id="2053" instrument_node="">The characters were simple and had nothing special about their personalities. They were so bland and dull. I couldn't make myself feel anything for Abby, Jordon, and Dan. The plot was quite slow and took some time for me to get into. The only reason I finished reading this was to find out about the end which was actually unexpected for me.</span><br data-dcnode-id="2052"><br data-dcnode-id="2051"><span data-dcnode-id="2050" instrument_node="">The ending is left off at a cliff-hanger and I really want to find out what happens next. </span><br data-dcnode-id="2049"><br data-dcnode-id="2048"><span data-dcnode-id="2047" instrument_node="">Hopefully the next book is better. </span><br data-dcnode-id="2046"></span><span data-dcnode-id="2044" instrument_node="">

</span><span data-dcnode-id="1863" id="freeTextContainer12342825468440722991"><span data-dcnode-id="1869" instrument_node="">***SPOILERS AHEAD***</span><br data-dcnode-id="1868"><br data-dcnode-id="1867"><span data-dcnode-id="1866" instrument_node="">So many questions...</span><br data-dcnode-id="1865"><span data-dcnode-id="1864" instrument_node="">Dan is going away to New Hampshire College Prep for the summer. This program is to be a once-in-a-lifetime opportunity for Dan to prepare him for college. There's one problem... this college used to be a sanitarium for the criminally insane! When things start to get really weird, Dan will need the help of his friends Abby and Jordan to help him figure out the mystery and catch a killer on the loose. But the question is, will any of them survive the summer?</span></span><span data-dcnode-id="1862" instrument_node="">
</span><span data-dcnode-id="1843" id="freeText12342825468440722991" style="display:none"><span data-dcnode-id="1861" instrument_node="">***SPOILERS AHEAD***</span><br data-dcnode-id="1860"><br data-dcnode-id="1859"><span data-dcnode-id="1858" instrument_node="">So many questions...</span><br data-dcnode-id="1857"><span data-dcnode-id="1856" instrument_node="">Dan is going away to New Hampshire College Prep for the summer. This program is to be a once-in-a-lifetime opportunity for Dan to prepare him for college. There's one problem... this college used to be a sanitarium for the criminally insane! When things start to get really weird, Dan will need the help of his friends Abby and Jordan to help him figure out the mystery and catch a killer on the loose. But the question is, will any of them survive the summer?</span><br data-dcnode-id="1855"><span data-dcnode-id="1854" instrument_node="">This is a good book but it is definitely aimed towards the younger crowd, which I think is awesome that such a cool horror novel is in the YA section. The details in this book are a bit scant and I had trouble clearly envisioning some of the character's world however, that did not take away from the story.</span><br data-dcnode-id="1853"><span data-dcnode-id="1852" instrument_node="">I personally found the three main characters a little mean and annoying but honestly I think that's just the age difference between them and myself. Oh to be young again 😂</span><br data-dcnode-id="1851"><span data-dcnode-id="1850" instrument_node="">One thing I absolutely loved about this book was the insertion of all the black and white photos that were apparently from actual asylums!!! They really help you paint the picture but not enough to where it controls your imagination. They are great helpers in setting the mood for this book and helping you to see through the character's eyes. I can't help but wonder what came first, the photos or the story? The photos seem to fit the story so well it is almost as if the author found these old photos and wrote a story to go along with them. Quite possibly so. Nevertheless they are a great addition and I wish that more horror novels included some illustrations or photos along with their wonderful stories.</span><br data-dcnode-id="1849"><span data-dcnode-id="1848" instrument_node="">The problem that I had with this novel was that there are a lot of questions left unanswered. The end of the book doesn't fully explain a few things such as Daniel's bloodline details and whether or not Felix was indeed possessed by a spirit of the asylum or whether he was actually the killer. It also does not explain whatever happens/will happen to Felix once he is sent to a psychiatric care unit. We don't even know if Jordan went home to his parents or whether he stayed with Dan at the end of the book. These are plot holes that are pretty big and should have been explained more thoroughly.</span><br data-dcnode-id="1847"><span data-dcnode-id="1846" instrument_node="">All things considered it was a very exciting read and it definitely had me turning the pages. Unfortunately, I fear, I cannot give it a higher rating because of the humongous plot holes. We can only hope that the questions that lay unanswered will be answered in the next books in the series. I will most certainly be reading them.</span><br data-dcnode-id="1845"><span data-dcnode-id="1844" instrument_node="">I do recommend this book to those who enjoy YA and a good horror book.</span></span><span data-dcnode-id="1842" instrument_node="">

</span></p><br data-dcnode-id="1709"><p data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">Dan Crawford goes to a college prep at Brookline. There he meets and makes two friends. Abby and Jordan. Right away strange and weird things start happening to Dan. They find an entrance to the old Brookline asylum. Which is just scary and creepy and more and more weird happens to Dan. It doesn't take long for the trio to team together and go deeper into the old asylum looking for answers to secrets from the past.</span></p><br data-dcnode-id="1706"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="1705" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1558465439ra/27551214.gif&amp;raw" width="200"><br data-dcnode-id="1704"><p data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Ok so first off, I scare really easily. Like I scare when noone understands what scared me. However, I did not find this book scary at all. I think that the author was trying to do jump scares which is hard to pull off in a book. Other than that though it was a great book. I found the characters to be wonderful. I relate with the main character especially. I like the friendship that develops between the three character. Its not a magically perfect friendship. There is work involved to keep it together making it realistic. I didn't like the romance though. It felt wrong and forced. The plot was good. I kept thinking I knew exactly what was going on and it turns out I was always wrong. It was fast paced and easy to read. A little too easy maybe as it made for a really quick read. The pictures were great though. They didn't always fit in with the story at the time, but they were till fun to see. All in all I would say its certainly a fun read.</span></p></span><span data-dcnode-id="1700" instrument_node="">

</span><span data-dcnode-id="1611" id="freeTextContainer13652721521079405709"><span data-dcnode-id="1614" instrument_node="">This is a very generous 4 stars, more like a 3.75 stars. It gets a bonus 0.25 stars because of the mini little twist at the end that I wasn't expecting.</span><br data-dcnode-id="1613"><span data-dcnode-id="1612" instrument_node="">This book definitely got better as it went along. It started out with a cheesy really underdeveloped storyline and really juvenile characters. The writing was weird and awkward at times. The romance was introduced really rapidly and had no build up so it didn't really make sense. All of this, however, was solved by the end. The writing got less j</span></span><span data-dcnode-id="1610" instrument_node="">
</span><span data-dcnode-id="1600" id="freeText13652721521079405709" style="display:none"><span data-dcnode-id="1609" instrument_node="">This is a very generous 4 stars, more like a 3.75 stars. It gets a bonus 0.25 stars because of the mini little twist at the end that I wasn't expecting.</span><br data-dcnode-id="1608"><span data-dcnode-id="1607" instrument_node="">This book definitely got better as it went along. It started out with a cheesy really underdeveloped storyline and really juvenile characters. The writing was weird and awkward at times. The romance was introduced really rapidly and had no build up so it didn't really make sense. All of this, however, was solved by the end. The writing got less juvenile and immature as the story went on. The romance plot ended up lessening to the point where it was a nice break. Characters grew up and matured and the story got much more interesting. Overall a really huge improvement.</span><br data-dcnode-id="1606"><br data-dcnode-id="1605"><span data-dcnode-id="1604" instrument_node="">That being said, the setting of the story is definitely the best part. I can picture this old asylum on a college campus, I can picture everything so vividly and I applaud the author for being able to do that. I really enjoy that she made the setting a character itself and did a very good job of that. </span><br data-dcnode-id="1603"><br data-dcnode-id="1602"><span data-dcnode-id="1601" instrument_node="">I'm going to continue on with this series because I really look forward to seeing where book 2 goes with the story.</span></span><span data-dcnode-id="1599" instrument_node="">

</span><a class="left imgcol" data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/user/show/4171731-cyna" title="Cyna"><img alt="Cyna" data-dcnode-id="1462" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/users/1356316087p2/4171731.jpg&amp;raw"></a><span data-dcnode-id="1460" instrument_node="">

        rated it
        </span><span class="staticStars notranslate" data-dcnode-id="1442" title="did not like it"><span class="staticStar p10" data-dcnode-id="1447" size="15x15"><span data-dcnode-id="1448" instrument_node="">did not like it</span></span><span class="staticStar p0" data-dcnode-id="1446" size="15x15"></span><span class="staticStar p0" data-dcnode-id="1445" size="15x15"></span><span class="staticStar p0" data-dcnode-id="1444" size="15x15"></span><span class="staticStar p0" data-dcnode-id="1443" size="15x15"></span></span><span data-dcnode-id="1441" instrument_node="">

</span><span class="readable" data-dcnode-id="1389" id="reviewTextContainer1041697482"><span data-dcnode-id="1437" instrument_node="">
</span><span data-dcnode-id="1435" id="freeTextContainer9552487757075090558"><span data-dcnode-id="1436" instrument_node="">This one was pretty much a bust across the board. Despite a wonderfully creepy cover and an attempt to ape the success of Peregrine’s vintage photography gimmick, Asylum failed to live up to the expectations set by the former, or the promise inherent in the latter. It’s hard not to compare Asylum to Peregrine, given the obvious influence (aaaaaand the fact that I read them back-to-back), but they actually provide an interesting set of contrasting misses. On the one hand, Peregrine, while ultimat</span></span><span data-dcnode-id="1434" instrument_node="">
</span><span data-dcnode-id="1394" id="freeText9552487757075090558" style="display:none"><span data-dcnode-id="1433" instrument_node="">This one was pretty much a bust across the board. Despite a wonderfully creepy cover and an attempt to ape the success of Peregrine’s vintage photography gimmick, Asylum failed to live up to the expectations set by the former, or the promise inherent in the latter. It’s hard not to compare Asylum to Peregrine, given the obvious influence (aaaaaand the fact that I read them back-to-back), but they actually provide an interesting set of contrasting misses. On the one hand, Peregrine, while ultimately not the tone or genre I was expecting, is competently-written, and delivers well enough on the premise that it eventually settles on. Asylum, on the other hand, is exactly what it says on the tin, but is unsuccessful at achieving literally anything it set out to accomplish, because it is terribly written.</span><br data-dcnode-id="1432"><br data-dcnode-id="1431"><span data-dcnode-id="1430" instrument_node="">True story: I actually considered jumping ship from Peregrine to Asylum right around the time I realized that it was going to become X-Men Babies, BUT, after reading through a thirty-page sample of Asylum on break, I sat my ass right back down.</span><br data-dcnode-id="1429"><br data-dcnode-id="1428"><span data-dcnode-id="1427" instrument_node="">I was not prepared for the kind of prose Asylum was selling. The writing is so bad, you guys. It’s bad in like every possible way. It’s technically terrible – there’s not a single thought, action, or motivation that goes untold when it should be shown, and oh god there is so much exposition. It’s got terrible pacing and plotting, which ends up shafting the characterization. It’s terribly bland, with no deft wordsmithing or clever turn of phrase to engage you. The research is shoddy at best, and the world-building reads like a child’s conception of the ~scariest thing evarrr~. But worst of all for a horror novel, there’s absolutely no atmosphere. It’s not scary.</span><br data-dcnode-id="1426"><br data-dcnode-id="1425"><span data-dcnode-id="1424" instrument_node="">It’s that last part that completely breaks this novel. Horror shit lives and dies on its ability to draw you in, to set a mood, and YA horror novels even more so, I’d expect, since they generally can’t rely on gritty shock tactics or explicit gore to bully a reaction out of you. There has to be tension, there has to be suspense, there has to be mystery, or some magical combination of the three for this thing to accomplish its most basic function: scare me. Despite a decent conceptual basis – I mean, hello, haunted mental institution, Asylum just couldn’t accomplish that.</span><br data-dcnode-id="1423"><br data-dcnode-id="1422"><span data-dcnode-id="1421" instrument_node="">So, ok, not creepy. But there’s still a plot, right? Well, yeah, kind of. Except it’s a really, really thin plot that would probably work better with fewer pages to fill. Even this short-ass novel has too much time for it to handle, I guess, so the book just goes wild with plot threads that end up meaning nothing, at least in this installment, just to run the meter out.</span><br data-dcnode-id="1420"><br data-dcnode-id="1419"><span data-dcnode-id="1418" instrument_node="">Seriously, there is so much crap in here that doesn’t amount to anything. Entire characters and subplots prove to be extraneous, and I strongly suspect that they’re thrown in there just to function as red herrings, to distract you from the most obvious conclusion by providing a handful of horror movie cliches for you to choose from.</span><br data-dcnode-id="1417"><br data-dcnode-id="1416"><span data-dcnode-id="1415" instrument_node="">The ultimate conflict only manages to separate itself from the bevy of potential conflicts in the last quarter or so of the novel, and it doesn’t hold the focus of the book long enough to build any tension. We’re swept along from twist to twist in the last few chapters without being made to care. The climax is predictable, given the few possible options, and I think it tries to wrap up the handful of subplots that have been playing out simultaneously, but they don’t come together well at all. The reveal behind the big bad’s motivation – which he is kind enough to monologue for us, by the way – feels contrived, a mish-mash of supernatural and human threat that only seems to serve the backstory delivery method and the ~shocking antagonist reveal~ for our MC.</span><br data-dcnode-id="1414"><br data-dcnode-id="1413"><span data-dcnode-id="1412" instrument_node="">So, the plot’s a bust, the writing’s a bust, how about the characters? Well, we’re three for three, because they’re shallow caricatures who behave wildly inconsistently and get shortchanged by the narrative. Our protagonist, Dan, is really young-sounding – again, we’re talking like middle-grade writing level here – and his romance with love interest Abby is just shoved in there and barely developed. Jordan, the third bff, contributes absolutely nothing to the main plot, and both side characters actually have Distracting Subplots That Go Nowhere. Abby’s, at least, gets a resolution, even if its significance is never made clear, but Jordan’s subplot is terrible, eating up a shitload of page-time before disappearing when it’s time to end the book, with no explanation whatsoever. I assume it’s mostly if not all set-up for the sequel, but, as with the rest of the novel, the execution is shiiiiiiiiiiiiiit.</span><br data-dcnode-id="1411"><br data-dcnode-id="1410"><span data-dcnode-id="1409" instrument_node="">I guess I should at least mention that Abby his Hispanic and Jordan is gay, but honestly they get so goddamn little to do here, that cookie might be best left in its wrapper.</span><br data-dcnode-id="1408"><br data-dcnode-id="1407"><span data-dcnode-id="1406" instrument_node="">So, bad characters, bad writing, bad plot, what’s left? OH YEAH, the gimmick. That couldn’t possibly also be tacked-on and (word of the night) extraneous, could it?</span><br data-dcnode-id="1405"><br data-dcnode-id="1404"><img class="gr-hostedUserImg" data-dcnode-id="1403" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1410367153ra/11098162.gif&amp;raw"><br data-dcnode-id="1402"><br data-dcnode-id="1401"><span data-dcnode-id="1400" instrument_node="">If you thought Peregrine’s creepy photography was shoehorned in, Asylum’s is ten times worse...</span><br data-dcnode-id="1399"><br data-dcnode-id="1398"><span data-dcnode-id="1397" instrument_node="">Read complete review at </span><a data-dcnode-id="1395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//yourekilling.us/%3Fp%3D1912" rel="nofollow noopener"><span data-dcnode-id="1396" instrument_node="">You're Killing.Us</span></a></span><span data-dcnode-id="1393" instrument_node="">
