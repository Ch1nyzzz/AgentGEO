</span><p data-dcnode-id="1213"><span data-dcnode-id="1220" instrument_node="">But Ahmadzai’s first child was delivered at a hospital in Wisconsin and then brought back to </span><a data-dcnode-id="1218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aljazeera.com/news/2021/9/29/i-was-panicking-afghans-at-us-base-share-escape-stories"><span data-dcnode-id="1219" instrument_node="">Fort McCoy</span></a><span data-dcnode-id="1217" instrument_node=""> military base, where his family and thousands of other </span><a data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aljazeera.com/program/the-stream/2021/11/3/whats-next-for-afghans-who-fled-to-the-united-states"><span data-dcnode-id="1216" instrument_node="">Afghan refugees</span></a><span data-dcnode-id="1214" instrument_node=""> are awaiting immigration processing after being evacuated from Afghanistan amid the Taliban takeover.</span></p><span data-dcnode-id="1212" instrument_node="">

-newly-arrived-afghans-in-the-uk"><span data-dcnode-id="1191" instrument_node="">Bridging the digital gap for newly-arrived Afghans in the UK</span></a></h3></article><span class="screen-reader-text" data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">end of list</span></span></div><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Ahmadzai, 25, like other parents of newborns at Fort McCoy, said welcoming a new baby at the camp is bittersweet.</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">“It would have been great if we had the baby in Kabul and were all together with my family,” he told Al Jazeera. “Our happiness would have been doubled.”</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">He expressed gratitude for the safety and opportunity that his new setting offers; he also lamented missing out on the rituals and shared joy of the extended family that come with the birth of a new child in Afghanistan.</span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1175" instrument_node="">Ahmadzai’s new son, Yasir, is one of more than 250 babies born to Afghan evacuees on military bases in the US since American </span><a data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aljazeera.com/news/2021/8/30/us-completes-afghanistan-withdrawal-as-final-flight-leaves-kabul"><span data-dcnode-id="1174" instrument_node="">troops withdrew</span></a><span data-dcnode-id="1172" instrument_node=""> from Afghanistan at the end of August, according to the US army.</span></p><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">“Families of newborns receive necessities such as formula, diapers, wipes and clothes from a variety of both governmental and nongovernmental organizations,” a spokesperson for the United States Northern Command (USNORTHCOM) of the military told Al Jazeera in an email.</span></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">At Fort McCoy, families ask the US army for anything else they might need. The Red Cross is also active on the base to provide humanitarian support.</span></p><span data-dcnode-id="1164" instrument_node="">
</span><h3 data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Missing family</span></h3><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1156"><span data-dcnode-id="1160" instrument_node="">Ahmadzai, who had worked on an American military base in Afghanistan, said he had no choice but to flee his country when the </span><a data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aljazeera.com/news/2021/8/16/how-the-world-reacted-to-taliban-takeover-of-kabul"><span data-dcnode-id="1159" instrument_node="">Taliban took control</span></a><span data-dcnode-id="1157" instrument_node=""> of the capital Kabul in mid-August as US and NATO troops withdrew.</span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1154" instrument_node="">Now he and his family live in one of the two-storey barracks housing thousands of Afghans at Fort McCoy. Each family hangs Red Cross-provided curtains and blankets to create private space inside </span><a data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aljazeera.com/news/2021/10/7/how-afghan-barber-set-up-shop-us-base-housing-thousands"><span data-dcnode-id="1153" instrument_node="">of the buildings</span></a><span data-dcnode-id="1151" instrument_node="">.</span></p><div data-dcnode-id="1118" id="article-newsletter-slot"><div aria-label="Newsletter signup Widget" class="sib-newsletter-form general-style" data-dcnode-id="1119"><div class="sib-form-container" data-dcnode-id="1120"><div class="sib-container--large sib-container--horizontal" data-dcnode-id="1121"><form data-dcnode-id="1122" data-type="subscription" id="sib-form-general" method="POST"><div class="sign-up-for-al-jazeera-container" data-dcnode-id="1147"><h3 class="sign-up-for-al-jazeera" data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Sign up for Al Jazeera</span></h3></div><h4 class="newsletter-title" data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Americas Coverage Newsletter</span></h4><div class="sib-newsletter-form-fields-container" data-dcnode-id="1128"><span aria-hidden="false" class="newsletter-description-line" data-dcnode-id="1141"><span data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">US politics, Canada’s multiculturalism, South America's geopolitical rise—we bring you the stories that matter.</span></span><span data-dcnode-id="1142"></span></span><div aria-hidden="false" class="sib-newsletter-form-fields" data-dcnode-id="1137"><input aria-label="E-mail address" autocomplete="email" class="sib-newsletter-form-input" data-dcnode-id="1140" data-required="true" id="email" name="email" placeholder="E-mail </span><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">About 30 people live on each floor. Families are allocated a space for beds and a small area to socialize and eat.</span></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">“We are happy that our boy was born safe and sound, but we are also disappointed that we are in a foreign country right now,” Ahmadzai said.</span></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">In Kabul, relatives bring gifts for the newborn – clothes, swings, strollers, blankets, cradles and toys.</span></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">The family also gathers for recitation of the Quran in full known as “Khatm ul Quran” on the sixth night of the child’s life.</span></p><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">In the US, Ahmadzai’s family mostly received verbal congratulations from fellow evacuees in their building.</span></p><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">“Everyone’s situation is the same here – what we wear and eat here, everyone does the same, so no complaints,” he said.</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node=""> </span></p><span data-dcnode-id="1096" instrument_node="">

ton aria-disabled="false" class="vjs-close-button vjs-control vjs-button" data-dcnode-id="736" title="Close Modal Dialog" type="button"><span aria-hidden="true" class="vjs-icon-placeholder" data-dcnode-id="739"></span><span aria-live="polite" class="vjs-control-text" data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Close Modal Dialog</span></span></button><p class="vjs-modal-dialog-description vjs-control-text" data-dcnode-id="734" id="vjs_video_718_component_1921_description"><span data-dcnode-id="735" instrument_node="">This is a modal window. This modal can be closed by pressing the Escape key or activating the close button.</span></p><div class="vjs-modal-dialog-content" data-dcnode-id="733" role="document"></div></div></div></div><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="727"></p></div><div class="video-duration__brand-bar" data-dcnode-id="723"><span class="screen-reader-text" data-dcnode-id="725"></span><span aria-hidden="true" class="video-duration__duration" data-dcnode-id="724"></span></div><figcaption data-dcnode-id="722"></figcaption></figure><span data-dcnode-id="720" instrument_node="">
</span><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Another baby, Mohammad, was born on November 2. Abad, his father, said he is thankful for the medical care his wife received during and after her pregnancy.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Mohammad is the family’s third child; they have two daughters aged 5 and 3.</span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">“I am so happy that my son was born as a US citizen,” Abad told Al Jazeera. “As he grows up, he will be in a mixed community of Afghans and Americans, which will be great for him.”</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">He said he is looking forward to organising a ceremony and inviting Afghan and American neighbours for a celebratory meal once he is formally settled in the US.</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">“It would have been hard for my son to study well and become a successful person in Afghanistan because of the fighting and destruction there,” Abad said. “They have very good institutions for education here and my son will have access to them.”</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Originally from Afghanistan’s eastern Khost province, Abad said he will try to teach Afghan culture and customs to his children.</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">“I think my son is very lucky to be born here; we were born and raised in war, and we have seen bloodshed in our country through all our lives, so he is lucky to be born in a peaceful country,” he said.</span></p><span data-dcnode-id="698" instrument_node="">
</span><h3 data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Chaotic evacuations</span></h3><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="694" instrument_node="">While Abad and his family consider themselves fortunate, the chaotic US withdrawal </span><a data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aljazeera.com/news/2021/8/31/after-us-withdrawal-few-answers-for-afghans-left-behind"><span data-dcnode-id="693" instrument_node="">left behind many Afghans</span></a><span data-dcnode-id="691" instrument_node=""> who worked with American forces. The rapid Taliban advance on Kabul in August spurred a huge evacuation operation to help US citizens, allies and third-party nationals leave the country.</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">While the US administration says it helped airlift more than 124,000 from Kabul between the Taliban takeover and the departure of the last American soldier from the country, the operation was plagued by violence and disorder.</span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="685" instrument_node="">Footage showed Afghans </span><a data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aljazeera.com/news/2021/8/19/zaki-anwari-afghan-footballer-fell-to-death-from-us-plane"><span data-dcnode-id="684" instrument_node="">hanging on</span></a><span data-dcnode-id="682" instrument_node=""> to departing aeroplanes from the Kabul airport in the day after the Taliban captured the city. A </span><a data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aljazeera.com/news/2021/8/26/what-we-know-so-far-about-the-explosions-at-kabul-airport"><span data-dcnode-id="681" instrument_node="">suicide bomber</span></a><span data-dcnode-id="679" instrument_node=""> in the crowd of people at one of the airport gates&nbsp;</span><a data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aljazeera.com/news/2021/8/28/us-embassy-in-kabul-warns-americans-to-avoid-airport-live"><span data-dcnode-id="678" instrument_node="">killed at least 175 people</span></a><span data-dcnode-id="676" instrument_node=""> on August 25, including 13 US service members.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">At least three babies were born during the evacuation. One Afghan woman gave birth in the cargo hold of a C-17 plane on an evacuation flight, and two others at the US military base in Ramstein, Germany. US State Department rules mean none of the three are automatic US citizens because the plane and the overseas base are not considered US soil.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="670" instrument_node="">One Afghan family brought to the US during the operation still </span><a data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aljazeera.com/news/2021/11/5/baby-handed-to-us-soldiers-in-chaos-of-afghan-airlift-missing"><span data-dcnode-id="669" instrument_node="">has not found</span></a><span data-dcnode-id="667" instrument_node=""> its infant after passing the then-2-month-old to US forces during the tumult at the Kabul airport.</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node=""> </span></p><span data-dcnode-id="662" instrument_node="">

</span><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="280"><a data-dcnode-id="282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aljazeera.com/news/2021/8/31/us-has-moral-obligation-to-aid-afghanistan-afghan-americans-say"><span data-dcnode-id="283" instrument_node="">Immigration advocates</span></a><span data-dcnode-id="281" instrument_node=""> have criticised Washington for failing to speed up the processing of Special Immigrant Visas for US allies after deciding to pull its forces from the country.</span></p><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Back at Fort McCoy, families say they are relieved to be in the US.</span></p><span data-dcnode-id="276" instrument_node="">
</span><p data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Safi, an Afghan evacuee who had worked with US forces, is expecting a newborn daughter in two months. He said he and his wife are delighted that their child will be born in a more peaceful environment than they had experienced growing up.</span></p><span data-dcnode-id="273" instrument_node="">
</span><p data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">“Look at it this way, I have worked with American forces for many years, then waited for four years to get Special Immigrant Visas but finally got evacuated in a very bad situation,” Safi told Al Jazeera. “But my daughter will automatically become a US citizen when she is born.”</span></p><span data-dcnode-id="270" instrument_node="">
</span><p data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">The expected baby will be the second daughter and fourth child in Safi’s family.</span></p><span data-dcnode-id="267" instrument_node="">
</span><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">“I have always dreamed of a peaceful and free country to live in, where my children can study and build their lives,” he said. “Now that dream of mine has come true by coming to America.”</span></p><span data-dcnode-id="264" instrument_node="">
