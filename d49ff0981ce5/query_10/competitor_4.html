</span><article about="/media/news/2016/jan/refugees-and-social-work" class="node node--article view-mode-full node--full node--article--full" data-dcnode-id="340" role="article" typeof="sioc:Item foaf:Document"><span data-dcnode-id="486" instrument_node="">
</span><header data-dcnode-id="482"><span data-dcnode-id="485" instrument_node="">
</span><span class="rdf-meta element-hidden" content="Refugees and social work" data-dcnode-id="484" property="dc:title"></span><span data-dcnode-id="483" instrument_node=""> </span></header><span data-dcnode-id="481" instrument_node="">
</span><div class="node__content" data-dcnode-id="342"><span data-dcnode-id="480" instrument_node="">
</span><div class="page-content node-details clearfix" data-dcnode-id="344"><span data-dcnode-id="479" instrument_node="">
</span><div class="page-content__main node-details__header" data-dcnode-id="471"><span data-dcnode-id="478" instrument_node="">
</span><div class="field field--name-title field--type-ds field--label-hidden" data-dcnode-id="473"><div class="field__items" data-dcnode-id="474"><div class="field__item field-item even" data-dcnode-id="475" property="dc:title"><h1 data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Refugees and social work</span></h1></div></div></div><span data-dcnode-id="472" instrument_node=""> </span></div><span data-dcnode-id="470" instrument_node="">
</span><div class="page-content__sidebar node-details__sidebar" data-dcnode-id="445"><span data-dcnode-id="469" instrument_node="">
</span><div class="field field--name-post-date field--type-ds field--label-above" data-dcnode-id="463"><div class="field__label" data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Date published</span></div><div class="field__items" data-dcnode-id="464"><div class="field__item field-item even" data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">20 January 2016</span></div></div></div><span data-dcnode-id="462" instrument_node=""> </span><div class="field field--name-field-countries field--type-taxonomy-term-reference field--label-above" data-dcnode-id="456"><div class="field__label" data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Location</span></div><div class="field__items" data-dcnode-id="457"><div class="field__item field-item even" data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">England</span></div></div></div><span data-dcnode-id="455" instrument_node=""> </span><div class="field field--name-field-related-interest field--type-entityreference field--label-above" data-dcnode-id="447"><div class="field__label" data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Related professional interest</span></div><div class="field__items" data-dcnode-id="448"><div class="field__item field-item even" data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Ethics and human rights</span></div><div class="field__item field-item odd" data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Migration, immigration, asylum and refugees</span></div></div></div><span data-dcnode-id="446" instrument_node=""> </span></div><span data-dcnode-id="444" instrument_node="">
</span><div class="page-content__main node-details__main" data-dcnode-id="369"><span data-dcnode-id="443" instrument_node="">
</span><div class="field field--name-body field--type-text-with-summary field--label-hidden rich-text" data-dcnode-id="371"><div class="field__items" data-dcnode-id="372"><div class="field__item field-item even" data-dcnode-id="373" property="content:encoded"><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">
	The recent crisis in Europe has raised humanitarian concerns for people across Europe and the world. It has become a political controversy with a myriad of questions being raised by governments and the wider population. The picture of the child on the beach left an untold story of refugees from Syria. Until then, seemingly, many people had not been moved to a great extent about the sufferings of refugees. For the refugee child on the beach, in relation to social work, it is probably something indirectly familiar. Loss happens in social work in different ways and it impacts people differently. There is loss caused by death, loss caused by disability, loss caused by social circumstances and loss of your entire past that includes home, work, family displacement, loss of identity and statesmanship. Refugees go through most of these losses. The theories of loss in social work seem to be abstract compared to how they are implemented in practice.</span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">
	Anthropological research shows that the movement of people caused by displacement has always happened. It was happening on a small scale when wars were taking place within tribes. There has always been persecution towards people that are different from what others perceive as the norm. Migration has also brought about different cultures and religions living together. What has not changed, unfortunately, is the continuation of wars internationally. From the biblical wars of four thousand years ago, the nature of war remains the same. Empires and dictators have conquered other nations through war. Religion has also caused wars from the First Crusade in 1096 to the current religious, tribal and racial wars. Whole generations of people have never known stability, but rather instability and continuous war as the norm.</span></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">
	The story of the Syrian people is not new - global movement has never ceased to happen - however the scale of the calamity is one that has not been seen since the Second World War. According to the United Nations (UN), the number of refugees has surpassed 50 million, which is more than at any other time in history. No amount of diplomacy has been able to make this influx of refugees go away.</span></p><span data-dcnode-id="434" instrument_node="">
</span><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">
	Reading about other countries, religions and races can support social workers in how to respond through work.</span></p><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">
	A story is the most powerful tool to understand a person, let alone assess their needs. The story conceptualises into a theory, which can then be related back to the person. It is a powerful tool to know how you can support the person without judging them. The story of the little Syrian boy on the beach enabled people to understand the story of what was happening, to some extent, to the boy’s family and thus brought the bigger picture of Syria into context.</span></p><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">
	I will now present my story as a refugee and my work with refugees in the UK as a volunteer in Reading. I am a social worker who has worked in social care services since 2002. I arrived in this country as a refugee having worked within the Foreign Ministry as a Diplomat in various countries. I told my story to the Home Office for my asylum application. I had to retell it several times and relive the journey again and again to convince the authorities of my identity.</span></p><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">
	I am also familiar with social care settings were people can be discussing refugees: “Why are these people coming to our country?” “They are coming to claim benefits!” “There are too many of them!” “They are poor and want to make a life for their children.” The arguments will go on, but they are myopic at best.</span></p><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">
	When I was doing my social work degree at Reading University, my lecturer requested that I tell my story to the class as part of working in an anti-discriminatory/non-judgemental practice. Some of the students said that they couldn’t believe that I had this story of being a ‘refugee’ as I looked different. My story might have changed their preconceived idea of what a refugee is.&nbsp;My identity is not a label, neither is it fixed.</span></p><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="418" instrument_node="">
	A refugee activist who I have met in my work with refugees wrote in an article </span><em data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">‘Wisdom is like a Baobab Tree’</span></em><span data-dcnode-id="415" instrument_node=""> that being in the phase of liminality, one renegotiates their identity. Identity is never fixed. Identity involves elements of continuity and change. People carry multiple identities that are not always based entirely on free choices. The process of creation and recreation of identities takes place within various available contexts. Telling your story is a way to redefine yourself and your identity.</span></p><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">
	During this time, in between looking after my children, working and attending university, I volunteered with a charitable organisation, which supports the needs of refugees. I felt indebted to the organisation after they helped my children and I to settle in the UK. They took the time to listen to my story and understand my needs. I volunteered for them for over seven years, eventually becoming their chairperson - throughout this time I met many refugees and heard their stories.</span></p><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="405"><span data-dcnode-id="409" instrument_node="">
	I am also fortunate to have been a part of a European project entitled, </span><em data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Women Learning Together.</span></em><span data-dcnode-id="406" instrument_node=""> (The project consisted of five European countries, including England.)</span></p><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">
	I listened alongside other refugees to the stories of women who had made the journey into the unknown as a refugee and settled in Europe. Their stories were intense and emotional, but all the women wanted others to hear about their journey. In an article written about the project, reviewing two years of working with over 80 women, researchers claimed female refugees have to go through three stages in order to regain control over their lives. The first stage is that of survival, the second is that of recognition and the third phase is that of feeling at home in the new host country. Parallel to these stages are three phases in the process of empowerment - reliving the pain through storytelling, developing a new perspective and contextualizing the experiences through the identification of patterns.</span></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="400" instrument_node="">
	Whilst anti-discrimination practice does not expand on the ‘how to’ work with refugees, the core values and ethics of social work are based on respect for the inherent worth and dignity of all people. This is expressed in the 1948 </span><em data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">United Nations Universal Declaration of Human Rights</span></em><span data-dcnode-id="397" instrument_node="">, other related UN declarations on rights and the conventions derived from those declarations. The values are built upon the emphasis of respect, being non-judgemental and promoting social inclusion.</span></p><span data-dcnode-id="395" instrument_node="">
</span><p data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">
	I remember how each one of us imparted a light into each other with our passionate stories. There were no judgements made and the women felt they could be themselves without fear of discrimination. In one of the trips to the project, while travelling on the Euro train from Brussels to London, two of us, both women, sat next to two gentlemen. These were high-powered academics – one coming from the EU headquarters and another was a well-known newspaper cartoonist. They were interested in our stories, our past jobs, our current careers and our future as abiding citizens contributing to the future of the country. They were visibly moved. They acknowledged that they had never really thought of refugees in that context. How refugees are viewed, fuels a paradox.</span></p><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">
	According to Ghorashi (2006) who was one of the researchers, in the present political climate in most European countries we see a dominant negative approach to migration and diversity. This negative attitude, according to her has two sides. Firstly, the culture of immigrants and refugees is seen as different and of a lesser value than the European culture. Secondly, there is a blind spot concerning the competencies and qualities of immigrants and refugees. Others focus on their shortcomings (they don’t speak the language well enough; their cultural and educational background does not fit within the context of where they live). Ghorashi argues that much academic research shows how this negative perception influences the way in which refugees position themselves in their new home country. They are seen for what they lack instead of the qualities they bring. An irony when many of them are well educated, with higher academic qualifications, which can be a great asset to a nation.</span></p><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">
	As we remember the Holocaust memorial, lets remember all the refugees who have died while trying to flee persecution, let’s try and return back to humanity and include in our social work the values and ethics that makes this job rewarding. A person’s story will determine how their needs are met. Let's create the space for refugees to thrive and be included in society.</span></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">
	Alice Chigumira</span></p><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">
	In 1996 Alice Chigumira was presented with an award by the then President Chissano of Mozambique for her writing on working with culturally diverse communities. This was achieved while working as a diplomat for the Zimbabwean government in Mozambique and preceded a posting to the former Yugoslavia. She co-foundered the first Secretaries training convention in Zimbabwe and was a speaker.</span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">
	Alice arrived in the UK in 2002. For eight years she volunteered at the Reading Refugee Support Group both as chair and vice-chair. She helped advocate and portray a more positive image of refugees by participating in numerous projects, BBC television and radio interviews and talks; alongside founding the Zimbabwe Community Groups. She furthered her activism by writing on the plight of refugees, and continues to be actively involved with different organisations in promoting human rights.</span></p><span data-dcnode-id="377" instrument_node="">
</span><p data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">
	She has a BA in Social Work and an MA in International Relations from Reading University.&nbsp;In 2014 she was given an Honorary Masters of the Universities by the Open University for her contribution to public services, education and culture. She currently works as a Social Worker with adults in Berkshire.</span></p><span data-dcnode-id="374" instrument_node="">
</span></div></div></div><span data-dcnode-id="370" instrument_node=""> </span></div><span data-dcnode-id="368" instrument_node="">
