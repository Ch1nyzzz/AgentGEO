</span><h4 data-dcnode-id="2711"><span class="mw-headline" data-dcnode-id="2719" id="European_Union"><span data-dcnode-id="2720" instrument_node="">European Union</span></span><span class="mw-editsection" data-dcnode-id="2712"><span class="mw-editsection-bracket" data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">[</span></span><a data-dcnode-id="2715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRight_of_asylum%26action%3Dedit%26section%3D4" title="Edit section: European Union"><span data-dcnode-id="2716" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2710" instrument_node="">
</span><link data-dcnode-id="2709" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2705" role="note"><span data-dcnode-id="2708" instrument_node="">Main article: </span><a data-dcnode-id="2706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asylum_in_the_European_Union" title="Asylum in the European Union"><span data-dcnode-id="2707" instrument_node="">Asylum in the European Union</span></a></div><span data-dcnode-id="2704" instrument_node="">
</span><p data-dcnode-id="2677"><span data-dcnode-id="2703" instrument_node="">Asylum in </span><a data-dcnode-id="2701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="2702" instrument_node="">European Union</span></a><span data-dcnode-id="2700" instrument_node=""> member states formed over a half-century by application of the </span><a class="mw-redirect" data-dcnode-id="2698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_relating_to_the_Status_of_Refugees" title="Convention relating to the Status of Refugees"><span data-dcnode-id="2699" instrument_node="">Geneva Convention of 28 July 1951 on the Status of Refugees</span></a><span data-dcnode-id="2697" instrument_node="">. Common policies appeared in the 1990s in connection with the </span><a data-dcnode-id="2695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Schengen_Agreement" title="Schengen Agreement"><span data-dcnode-id="2696" instrument_node="">Schengen Agreement</span></a><span data-dcnode-id="2694" instrument_node=""> (which suppressed internal borders) so that asylum seekers unsuccessful in one Member State would not reapply in another. The common policy began with the </span><a class="mw-redirect" data-dcnode-id="2692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dublin_Convention" title="Dublin Convention"><span data-dcnode-id="2693" instrument_node="">Dublin Convention</span></a><span data-dcnode-id="2691" instrument_node=""> in 1990. It continued with the implementation of </span><a data-dcnode-id="2689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eurodac" title="Eurodac"><span data-dcnode-id="2690" instrument_node="">Eurodac</span></a><span data-dcnode-id="2688" instrument_node=""> and the </span><a data-dcnode-id="2686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dublin_Regulation" title="Dublin Regulation"><span data-dcnode-id="2687" instrument_node="">Dublin Regulation</span></a><span data-dcnode-id="2685" instrument_node=""> in 2003, and the October 2009 adoption of two proposals by the </span><a data-dcnode-id="2683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Commission" title="European Commission"><span data-dcnode-id="2684" instrument_node="">European Commission</span></a><span data-dcnode-id="2682" instrument_node="">.</span><sup class="reference" data-dcnode-id="2679" id="cite_ref-9"><a data-dcnode-id="2680" href="#cite_note-9"><span data-dcnode-id="2681" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2678" instrument_node="">
</span></p><span data-dcnode-id="2676" instrument_node="">
</span><h5 data-dcnode-id="2666"><span class="mw-headline" data-dcnode-id="2674" id="France"><span data-dcnode-id="2675" instrument_node="">France</span></span><span class="mw-editsection" data-dcnode-id="2667"><span class="mw-editsection-bracket" data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">[</span></span><a data-dcnode-id="2670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRight_of_asylum%26action%3Dedit%26section%3D5" title="Edit section: France"><span data-dcnode-id="2671" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">]</span></span></span></h5><span data-dcnode-id="2665" instrument_node="">
</span><link data-dcnode-id="2664" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2660" role="note"><span data-dcnode-id="2663" instrument_node="">Main article: </span><a data-dcnode-id="2661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asylum_in_France" title="Asylum in France"><span data-dcnode-id="2662" instrument_node="">Asylum in France</span></a></div><span data-dcnode-id="2659" instrument_node="">
</span><p data-dcnode-id="2636"><span data-dcnode-id="2658" instrument_node="">France was the first country to establish a constitutional right to asylum, in Article 120 of the </span><a data-dcnode-id="2656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Constitution_of_1793" title="French Constitution of 1793"><span data-dcnode-id="2657" instrument_node="">Constitution of 1793</span></a><span data-dcnode-id="2655" instrument_node="">, for "foreigners banished from their fatherland for the cause of liberty".</span><sup class="reference" data-dcnode-id="2652" id="cite_ref-10"><a data-dcnode-id="2653" href="#cite_note-10"><span data-dcnode-id="2654" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2651" instrument_node=""> This constitution, however, never entered into force. The Preamble of the </span><a data-dcnode-id="2649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Constitution_of_27_October_1946" title="French Constitution of 27 October 1946"><span data-dcnode-id="2650" instrument_node="">Constitution of 1946</span></a><span data-dcnode-id="2648" instrument_node=""> similarly guaranteed the right of asylum to "anyone persecuted because of his activities in the cause of freedom".</span><sup class="reference" data-dcnode-id="2645" id="cite_ref-11"><a data-dcnode-id="2646" href="#cite_note-11"><span data-dcnode-id="2647" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2644" instrument_node=""> The modern French right of asylum is secured by the Preamble of the </span><a data-dcnode-id="2642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_France" title="Constitution of France"><span data-dcnode-id="2643" instrument_node="">Constitution of 1958</span></a><span data-dcnode-id="2641" instrument_node="">, via a reference to the Preamble of the 1946 Constitution.</span><sup class="reference" data-dcnode-id="2638" id="cite_ref-12"><a data-dcnode-id="2639" href="#cite_note-12"><span data-dcnode-id="2640" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2637" instrument_node="">
</span></p><p data-dcnode-id="2625"><span data-dcnode-id="2635" instrument_node="">In addition to the constitutional right to asylum, the modern French right to asylum (</span><i data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">droit d'asile</span></i><span data-dcnode-id="2632" instrument_node="">) is enshrined on a legal and regulatory basis in the </span><i data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">Code de l'Entree et du Sejour des Etrangers et du Droit d'Asile</span></i><sup class="reference" data-dcnode-id="2627" id="cite_ref-13"><a data-dcnode-id="2628" href="#cite_note-13"><span data-dcnode-id="2629" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2626" instrument_node=""> (CESEDA).
</span></p><p data-dcnode-id="2605"><span data-dcnode-id="2624" instrument_node="">France also adheres to international agreements which provide for application modalities for the right of asylum, such as the 1951 </span><a data-dcnode-id="2622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="2623" instrument_node="">United Nations</span></a><span data-dcnode-id="2621" instrument_node=""> (UN) </span><a data-dcnode-id="2619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_Relating_to_the_Status_of_Refugees" title="Convention Relating to the Status of Refugees"><span data-dcnode-id="2620" instrument_node="">Convention Relating to the Status of Refugees</span></a><span data-dcnode-id="2618" instrument_node=""> (ratified in 1952), the additional 1967 protocol; articles K1 and K2 of the 1992 </span><a data-dcnode-id="2616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maastricht_Treaty" title="Maastricht Treaty"><span data-dcnode-id="2617" instrument_node="">Maastricht Treaty</span></a><span data-dcnode-id="2615" instrument_node=""> as well as the 1985 </span><a data-dcnode-id="2613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Schengen_Agreement" title="Schengen Agreement"><span data-dcnode-id="2614" instrument_node="">Schengen Agreement</span></a><span data-dcnode-id="2612" instrument_node="">, which defined EU </span><a class="mw-redirect" data-dcnode-id="2610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immigration_policy" title="Immigration policy"><span data-dcnode-id="2611" instrument_node="">immigration policy</span></a><span data-dcnode-id="2609" instrument_node="">. Finally, the right of asylum is defined by article 18 of the </span><a data-dcnode-id="2607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charter_of_Fundamental_Rights_of_the_European_Union" title="Charter of Fundamental Rights of the European Union"><span data-dcnode-id="2608" instrument_node="">Charter of Fundamental Rights of the European Union</span></a><span data-dcnode-id="2606" instrument_node="">.
</span></p><p data-dcnode-id="2599"><span data-dcnode-id="2604" instrument_node="">Some of the criteria for which an asylum application can be rejected include: i) Passage via “safe" third country, ii) Safe Country of Origin (An asylum seeker can be a prior refused asylum if they are a national of a country considered to be "safe" by the French asylum authority OFPRA),</span><sup class="reference" data-dcnode-id="2601" id="cite_ref-14"><a data-dcnode-id="2602" href="#cite_note-14"><span data-dcnode-id="2603" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2600" instrument_node=""> iii) Safety Threat (serious threat to the public order), or iv) Fraudulent Application (abuse of the asylum procedure for other reasons).
</span></p><p data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">The December 10, 2003, law limited political asylum through two main restrictions:
</span></p><span data-dcnode-id="2596" instrument_node="">
</span><ul data-dcnode-id="2511"><li data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">The notion of "internal asylum": the request may be rejected if the foreigner may benefit from political asylum on a portion of the territory of their home country.</span></li><span data-dcnode-id="2593" instrument_node="">
</span><li data-dcnode-id="2512"><span data-dcnode-id="2592" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="2590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/OFPRA" title="OFPRA"><span data-dcnode-id="2591" instrument_node="">OFPRA</span></a><span data-dcnode-id="2589" instrument_node=""> (</span><i data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">Office français de protection des réfugiés et apatrides</span></i><span data-dcnode-id="2586" instrument_node=""> – French Office for the Protection of Refugees and </span><a class="mw-redirect" data-dcnode-id="2584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stateless_Persons" title="Stateless Persons"><span data-dcnode-id="2585" instrument_node="">Stateless Persons</span></a><span data-dcnode-id="2583" instrument_node="">)</span><sup class="reference" data-dcnode-id="2580" id="cite_ref-15"><a data-dcnode-id="2581" href="#cite_note-15"><span data-dcnode-id="2582" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2579" instrument_node=""> now makes a list of allegedly "safe countries" which respect </span><a class="mw-redirect" data-dcnode-id="2577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_rights" title="Political rights"><span data-dcnode-id="2578" instrument_node="">political rights</span></a><span data-dcnode-id="2576" instrument_node=""> and principles of </span><a data-dcnode-id="2574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberty" title="Liberty"><span data-dcnode-id="2575" instrument_node="">liberty</span></a><span data-dcnode-id="2573" instrument_node="">. If the demander of asylum comes from such a country, the request is processed in 15 days, and receives no </span><a class="mw-redirect" data-dcnode-id="2571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_assistance" title="Social assistance"><span data-dcnode-id="2572" instrument_node="">social assistance</span></a><span data-dcnode-id="2570" instrument_node=""> protection. They may contest the decision, but this does not suspend any </span><a data-dcnode-id="2568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deportation" title="Deportation"><span data-dcnode-id="2569" instrument_node="">deportation</span></a><span data-dcnode-id="2567" instrument_node=""> order. The first list, enacted in July 2005, included as "safe countries" </span><a data-dcnode-id="2565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Benin" title="Benin"><span data-dcnode-id="2566" instrument_node="">Benin</span></a><span data-dcnode-id="2564" instrument_node="">, </span><a data-dcnode-id="2562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cape_Verde" title="Cape Verde"><span data-dcnode-id="2563" instrument_node="">Cape Verde</span></a><span data-dcnode-id="2561" instrument_node="">, </span><a data-dcnode-id="2559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ghana" title="Ghana"><span data-dcnode-id="2560" instrument_node="">Ghana</span></a><span data-dcnode-id="2558" instrument_node="">, </span><a data-dcnode-id="2556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mali" title="Mali"><span data-dcnode-id="2557" instrument_node="">Mali</span></a><span data-dcnode-id="2555" instrument_node="">, </span><a data-dcnode-id="2553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mauritius" title="Mauritius"><span data-dcnode-id="2554" instrument_node="">Mauritius Island</span></a><span data-dcnode-id="2552" instrument_node="">, </span><a data-dcnode-id="2550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/India" title="India"><span data-dcnode-id="2551" instrument_node="">India</span></a><span data-dcnode-id="2549" instrument_node="">, </span><a data-dcnode-id="2547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Senegal" title="Senegal"><span data-dcnode-id="2548" instrument_node="">Senegal</span></a><span data-dcnode-id="2546" instrument_node="">, </span><a data-dcnode-id="2544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mongolia" title="Mongolia"><span data-dcnode-id="2545" instrument_node="">Mongolia</span></a><span data-dcnode-id="2543" instrument_node="">, </span><a data-dcnode-id="2541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georgia_%28country%29" title="Georgia (country)"><span data-dcnode-id="2542" instrument_node="">Georgia</span></a><span data-dcnode-id="2540" instrument_node="">, </span><a data-dcnode-id="2538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukraine" title="Ukraine"><span data-dcnode-id="2539" instrument_node="">Ukraine</span></a><span data-dcnode-id="2537" instrument_node="">, </span><a data-dcnode-id="2535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bosnia_and_Herzegovina" title="Bosnia and Herzegovina"><span data-dcnode-id="2536" instrument_node="">Bosnia</span></a><span data-dcnode-id="2534" instrument_node=""> and </span><a data-dcnode-id="2532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Croatia" title="Croatia"><span data-dcnode-id="2533" instrument_node="">Croatia</span></a><span data-dcnode-id="2531" instrument_node="">. It had the effect of reducing in six months by about 80% the number of applicants from these countries. The second list, passed in July 2006, included </span><a data-dcnode-id="2529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tanzania" title="Tanzania"><span data-dcnode-id="2530" instrument_node="">Tanzania</span></a><span data-dcnode-id="2528" instrument_node="">, </span><a data-dcnode-id="2526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Madagascar" title="Madagascar"><span data-dcnode-id="2527" instrument_node="">Madagascar</span></a><span data-dcnode-id="2525" instrument_node="">, </span><a data-dcnode-id="2523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Niger" title="Niger"><span data-dcnode-id="2524" instrument_node="">Niger</span></a><span data-dcnode-id="2522" instrument_node="">, </span><a data-dcnode-id="2520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albania" title="Albania"><span data-dcnode-id="2521" instrument_node="">Albania</span></a><span data-dcnode-id="2519" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="2517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_North_Macedonia" title="Republic of North Macedonia"><span data-dcnode-id="2518" instrument_node="">Macedonia</span></a><span data-dcnode-id="2516" instrument_node="">.</span><sup class="reference" data-dcnode-id="2513" id="cite_ref-16"><a data-dcnode-id="2514" href="#cite_note-16"><span data-dcnode-id="2515" instrument_node="">[16]</span></a></sup></li></ul><span data-dcnode-id="2510" instrument_node="">
</span><p data-dcnode-id="2475"><span data-dcnode-id="2509" instrument_node="">While restricted, the right of political asylum has been conserved in France amid various anti-immigration laws. Some people claim that, apart from the purely judicial path, the </span><a data-dcnode-id="2507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bureaucracy" title="Bureaucracy"><span data-dcnode-id="2508" instrument_node="">bureaucratic</span></a><span data-dcnode-id="2506" instrument_node=""> process is used to slow down and ultimately reject what might be considered as valid requests. According to </span><i data-dcnode-id="2503"><a data-dcnode-id="2504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Le_Figaro" title="Le Figaro"><span data-dcnode-id="2505" instrument_node="">Le Figaro</span></a></i><span data-dcnode-id="2502" instrument_node="">, France granted 7,000 people the status of political refugee in 2006, out of a total of 35,000 requests; in 2005, the OFPRA in charge of examining the legitimacy of such requests granted less than 10,000 from a total of 50,000 requests.</span><sup class="reference" data-dcnode-id="2499" id="cite_ref-17"><a data-dcnode-id="2500" href="#cite_note-17"><span data-dcnode-id="2501" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2498" instrument_node=""> Numerous exiles from South American dictatorships, particularly from </span><a data-dcnode-id="2496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Augusto_Pinochet" title="Augusto Pinochet"><span data-dcnode-id="2497" instrument_node="">Augusto Pinochet</span></a><span data-dcnode-id="2495" instrument_node="">'s </span><a data-dcnode-id="2493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chile" title="Chile"><span data-dcnode-id="2494" instrument_node="">Chile</span></a><span data-dcnode-id="2492" instrument_node=""> and the </span><a data-dcnode-id="2490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dirty_War" title="Dirty War"><span data-dcnode-id="2491" instrument_node="">Dirty War</span></a><span data-dcnode-id="2489" instrument_node=""> in </span><a data-dcnode-id="2487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Argentina" title="Argentina"><span data-dcnode-id="2488" instrument_node="">Argentina</span></a><span data-dcnode-id="2486" instrument_node="">, were received in the 1970s-80s. During the </span><a data-dcnode-id="2484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_in_Afghanistan_%282001%25E2%2580%25932021%29" title="War in Afghanistan (2001–2021)"><span data-dcnode-id="2485" instrument_node="">war in Afghanistan (2001–2021)</span></a><span data-dcnode-id="2483" instrument_node="">, tens of thousands of </span><a data-dcnode-id="2481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afghan_refugees" title="Afghan refugees"><span data-dcnode-id="2482" instrument_node="">Afghan refugees</span></a><span data-dcnode-id="2480" instrument_node=""> were granted asylum in France.</span><sup class="reference" data-dcnode-id="2477" id="cite_ref-18"><a data-dcnode-id="2478" href="#cite_note-18"><span data-dcnode-id="2479" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2476" instrument_node="">
</span></p><span data-dcnode-id="2474" instrument_node="">
</span><h4 data-dcnode-id="2464"><span class="mw-headline" data-dcnode-id="2472" id="United_Kingdom"><span data-dcnode-id="2473" instrument_node="">United Kingdom</span></span><span class="mw-editsection" data-dcnode-id="2465"><span class="mw-editsection-bracket" data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">[</span></span><a data-dcnode-id="2468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRight_of_asylum%26action%3Dedit%26section%3D6" title="Edit section: United Kingdom"><span data-dcnode-id="2469" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2463" instrument_node="">
</span><link data-dcnode-id="2462" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2458" role="note"><span data-dcnode-id="2461" instrument_node="">Further information: </span><a data-dcnode-id="2459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asylum_and_Immigration_Tribunal" title="Asylum and Immigration Tribunal"><span data-dcnode-id="2460" instrument_node="">Asylum and Immigration Tribunal</span></a></div><span data-dcnode-id="2457" instrument_node="">
</span><p data-dcnode-id="2416"><span data-dcnode-id="2456" instrument_node="">In the 19th century, the </span><a data-dcnode-id="2454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom_of_Great_Britain_and_Ireland" title="United Kingdom of Great Britain and Ireland"><span data-dcnode-id="2455" instrument_node="">United Kingdom</span></a><span data-dcnode-id="2453" instrument_node=""> accorded political asylum to various persecuted people, among whom were many members of the </span><a class="mw-redirect" data-dcnode-id="2451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist" title="Socialist"><span data-dcnode-id="2452" instrument_node="">socialist</span></a><span data-dcnode-id="2450" instrument_node=""> movement (including </span><a data-dcnode-id="2448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_Marx" title="Karl Marx"><span data-dcnode-id="2449" instrument_node="">Karl Marx</span></a><span data-dcnode-id="2447" instrument_node="">).</span><sup class="reference" data-dcnode-id="2444" id="cite_ref-19"><a data-dcnode-id="2445" href="#cite_note-19"><span data-dcnode-id="2446" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2443" instrument_node=""> With the 1845 attempted </span><a class="mw-redirect" data-dcnode-id="2441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bombing" title="Bombing"><span data-dcnode-id="2442" instrument_node="">bombing</span></a><span data-dcnode-id="2440" instrument_node=""> of the </span><a class="mw-redirect" data-dcnode-id="2438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greenwich_Royal_Observatory" title="Greenwich Royal Observatory"><span data-dcnode-id="2439" instrument_node="">Greenwich Royal Observatory</span></a><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2431" style="white-space:nowrap;"><span data-dcnode-id="2437" instrument_node="">[</span><i data-dcnode-id="2433"><a data-dcnode-id="2434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2435" title="This claim needs references to reliable sources. (May 2015)"><span data-dcnode-id="2436" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2432" instrument_node="">]</span></sup><span data-dcnode-id="2430" instrument_node=""> and the 1911 </span><a data-dcnode-id="2428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Siege_of_Sidney_Street" title="Siege of Sidney Street"><span data-dcnode-id="2429" instrument_node="">Siege of Sidney Street</span></a><span data-dcnode-id="2427" instrument_node=""> in the context of the </span><a data-dcnode-id="2425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Propaganda_of_the_deed" title="Propaganda of the deed"><span data-dcnode-id="2426" instrument_node="">propaganda of the deed</span></a><span data-dcnode-id="2424" instrument_node=""> (</span><a data-dcnode-id="2422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anarchism" title="Anarchism"><span data-dcnode-id="2423" instrument_node="">anarchist</span></a><span data-dcnode-id="2421" instrument_node="">) actions, political asylum was restricted.</span><sup class="reference" data-dcnode-id="2418" id="cite_ref-20"><a data-dcnode-id="2419" href="#cite_note-20"><span data-dcnode-id="2420" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2417" instrument_node="">
</span></p><span data-dcnode-id="2415" instrument_node="">
</span><h4 data-dcnode-id="2405"><span class="mw-headline" data-dcnode-id="2413" id="United_States"><span data-dcnode-id="2414" instrument_node="">United States</span></span><span class="mw-editsection" data-dcnode-id="2406"><span class="mw-editsection-bracket" data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">[</span></span><a data-dcnode-id="2409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRight_of_asylum%26action%3Dedit%26section%3D7" title="Edit section: United States"><span data-dcnode-id="2410" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2404" instrument_node="">
</span><link data-dcnode-id="2403" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2396" role="note"><span data-dcnode-id="2402" instrument_node="">Further information: </span><a data-dcnode-id="2400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asylum_in_the_United_States" title="Asylum in the United States"><span data-dcnode-id="2401" instrument_node="">Asylum in the United States</span></a><span data-dcnode-id="2399" instrument_node=""> and </span><a data-dcnode-id="2397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Removal_proceedings" title="Removal proceedings"><span data-dcnode-id="2398" instrument_node="">Removal proceedings</span></a></div><span data-dcnode-id="2395" instrument_node="">
</span><p data-dcnode-id="2386"><span data-dcnode-id="2394" instrument_node="">The </span><a data-dcnode-id="2392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="2393" instrument_node="">United States</span></a><span data-dcnode-id="2391" instrument_node=""> recognizes the right of asylum of individuals as specified by international and federal law. In accordance with international law, the United States considers asylum candidates on the basis of persecution or fear they will be persecuted on account of race, religion, nationality, and/or membership in a particular social group or political opinion.</span><sup class="reference" data-dcnode-id="2388" id="cite_ref-21"><a data-dcnode-id="2389" href="#cite_note-21"><span data-dcnode-id="2390" instrument_node="">[21]</span></a></sup><span data-dcnode-id="2387" instrument_node="">
</span></p><p data-dcnode-id="2355"><span data-dcnode-id="2385" instrument_node="">Every year, the </span><a data-dcnode-id="2383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_the_United_States" title="President of the United States"><span data-dcnode-id="2384" instrument_node="">President of the United States</span></a><span data-dcnode-id="2382" instrument_node=""> specifies a number of </span><a data-dcnode-id="2380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refugee_law" title="Refugee law"><span data-dcnode-id="2381" instrument_node="">legally defined</span></a><span data-dcnode-id="2379" instrument_node=""> refugees who are granted </span><i data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">refugee status</span></i><span data-dcnode-id="2376" instrument_node=""> outside the United States to be admitted to the country under </span><a data-dcnode-id="2374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Title_8_of_the_United_States_Code" title="Title 8 of the United States Code"><span data-dcnode-id="2375" instrument_node="">8&nbsp;U.S.C.</span></a><span data-dcnode-id="2373" instrument_node="">&nbsp;</span><a class="external text" data-dcnode-id="2371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law.cornell.edu/uscode/text/8/1157" rel="nofollow"><span data-dcnode-id="2372" instrument_node="">§&nbsp;1157</span></a><span data-dcnode-id="2370" instrument_node="">.</span><sup class="reference" data-dcnode-id="2367" id="cite_ref-22"><a data-dcnode-id="2368" href="#cite_note-22"><span data-dcnode-id="2369" instrument_node="">[22]</span></a></sup><span data-dcnode-id="2366" instrument_node=""> Of these, many are recommended for </span><a data-dcnode-id="2364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third_country_resettlement" title="Third country resettlement"><span data-dcnode-id="2365" instrument_node="">firm resettlement</span></a><span data-dcnode-id="2363" instrument_node=""> by the offices of the </span><a data-dcnode-id="2361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_High_Commissioner_for_Refugees" title="United Nations High Commissioner for Refugees"><span data-dcnode-id="2362" instrument_node="">UNHCR</span></a><span data-dcnode-id="2360" instrument_node=""> around the world. The annual number of refugees admitted varies from year to year and is determined by a joint collaboration between the incumbent Presidential administration and Congress. By contrast, the United States does not enforce any such quota for asylum seekers. Rather, the annual number of asylum grants is dependent upon a combination of how many individuals submit applications and how many individuals are able to successfully prove their asylum claim.</span><sup class="reference" data-dcnode-id="2357" id="cite_ref-23"><a data-dcnode-id="2358" href="#cite_note-23"><span data-dcnode-id="2359" instrument_node="">[23]</span></a></sup><span data-dcnode-id="2356" instrument_node="">
</span></p><p data-dcnode-id="2349"><span data-dcnode-id="2354" instrument_node="">According to US law, individuals are eligible for asylum status based on the following conditions:</span><sup class="reference" data-dcnode-id="2351" id="cite_ref-24"><a data-dcnode-id="2352" href="#cite_note-24"><span data-dcnode-id="2353" instrument_node="">[24]</span></a></sup><span data-dcnode-id="2350" instrument_node="">
</span></p><span data-dcnode-id="2348" instrument_node="">
</span><ul data-dcnode-id="2339"><li data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">Meet the definition of refugee</span></li><span data-dcnode-id="2345" instrument_node="">
</span><li data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">Are already inside the United States</span></li><span data-dcnode-id="2342" instrument_node="">
</span><li data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Are seeking admission at a port of entry</span></li></ul><span data-dcnode-id="2338" instrument_node="">
</span><p data-dcnode-id="2332"><span data-dcnode-id="2337" instrument_node="">There are two main types of asylum an applicant can request under US law: affirmative asylum and defensive asylum. To apply for affirmative asylum, applicants must be physically present in the United States, regardless of their current immigration status. In most cases, affirmative asylum applications must be filed within one year of arriving in the United States. Defensive asylum is typically filed by individuals seeking to request a defense against removal or deportation from the United States. The primary distinction between these two processes is whether removal proceedings have been initiated for an applicant. If an individual has been placed in removal proceedings they must seek defensive asylum. If an individual has not been placed in removal proceedings, they are able to seek affirmative asylum. </span><sup class="reference" data-dcnode-id="2334" id="cite_ref-25"><a data-dcnode-id="2335" href="#cite_note-25"><span data-dcnode-id="2336" instrument_node="">[25]</span></a></sup><span data-dcnode-id="2333" instrument_node="">
</span></p><p data-dcnode-id="2309"><span data-dcnode-id="2331" instrument_node="">Because too many people apply for asylum in the United States, majority of asylum claims fail or are rejected. Since World War II, more refugees have found homes here than any other nation. "Since the passage of the </span><a data-dcnode-id="2329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refugee_Act" title="Refugee Act"><span data-dcnode-id="2330" instrument_node="">Refugee Act</span></a><span data-dcnode-id="2328" instrument_node=""> in 1980... the United States has admitted more than 3.1 million refugees."</span><sup class="reference" data-dcnode-id="2325" id="cite_ref-26"><a data-dcnode-id="2326" href="#cite_note-26"><span data-dcnode-id="2327" instrument_node="">[26]</span></a></sup><span data-dcnode-id="2324" instrument_node=""> During much of the 1990s, the United States accepted over 100,000 refugees per year, though this figure has recently decreased to around 50,000 per year in the first decade of the 21st century, due to greater security concerns. As for asylum seekers, the latest statistics show that 86,400 persons sought sanctuary in the United States in 2001.</span><sup class="reference" data-dcnode-id="2321" id="cite_ref-27"><a data-dcnode-id="2322" href="#cite_note-27"><span data-dcnode-id="2323" instrument_node="">[27]</span></a></sup><span data-dcnode-id="2320" instrument_node=""> Before the </span><a data-dcnode-id="2318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/September_11_attacks" title="September 11 attacks"><span data-dcnode-id="2319" instrument_node="">September 11 attacks</span></a><span data-dcnode-id="2317" instrument_node=""> in 2001, individual asylum applicants were evaluated in private proceedings by officers of the former </span><a data-dcnode-id="2315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immigration_and_Naturalization_Service" title="Immigration and Naturalization Service"><span data-dcnode-id="2316" instrument_node="">Immigration and Naturalization Service</span></a><span data-dcnode-id="2314" instrument_node=""> (INS). In the aftermath of the attacks, the United States established three distinct organizations that each handle a different aspect of US immigration law, including the US Citizenship &amp; Immigration Services (USCIS), Immigration &amp; Customs Enforcement (ICE), and Customs &amp; Border Protection (CFB). Asylum applications are handled by the USCIS.</span><sup class="reference" data-dcnode-id="2311" id="cite_ref-28"><a data-dcnode-id="2312" href="#cite_note-28"><span data-dcnode-id="2313" instrument_node="">[28]</span></a></sup><span data-dcnode-id="2310" instrument_node="">
</span></p><p data-dcnode-id="2304"><span data-dcnode-id="2308" instrument_node="">
Despite this, concerns have been raised with the U.S. asylum and refugee determination processes. A recent empirical analysis by three legal scholars described the U.S. asylum process as a game of </span><a data-dcnode-id="2306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refugee_roulette" title="Refugee roulette"><span data-dcnode-id="2307" instrument_node="">refugee roulette</span></a><span data-dcnode-id="2305" instrument_node="">; that is to say that the outcome of asylum determinations depends in large part on the personality of the particular adjudicator to whom an application is randomly assigned, rather than on the merits of the case. The very low numbers of Iraqi refugees accepted between 2003 and 2007 exemplifies concerns about the United States' refugee processes. The Foreign Policy Association reported that:</span></p><blockquote data-dcnode-id="2301"><p data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">Perhaps the most perplexing component of the Iraq refugee crisis... has been the inability for the U.S. to absorb more Iraqis following the 2003 invasion of the country. To date, the U.S. has granted less than 800 Iraqis refugee status, just 133 in 2007. By contrast, the U.S. granted asylum to more than 100,000 Vietnamese refugees during the Vietnam War.</span></p></blockquote><p data-dcnode-id="2295"><span data-dcnode-id="2300" instrument_node="">Refugee and asylum policy advocates have called for a system based upon the "human interest approach" which seeks to allow asylum applicants be assessed on a case-by-case basis, as opposed to being assessed against other applicants. Under the US asylum structure, applicants' cases are often analyzed based on the strength of their educational/professional qualifications or on the level of danger they face in their country of origin. Amongst the academic community, such an approach is considered to be the narrative of the "gifted or traumatized" refugee. By contrast, the human-interest approach experts advocate for seeks to reframe the application process around the individual and focus on each applicant's unique story and experience.</span><sup class="reference" data-dcnode-id="2297" id="cite_ref-29"><a data-dcnode-id="2298" href="#cite_note-29"><span data-dcnode-id="2299" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2296" instrument_node="">
</span></p><h4 data-dcnode-id="2284"><span data-dcnode-id="2294" id="People.27s_Republic_of_China"></span><span class="mw-headline" data-dcnode-id="2292" id="People's_Republic_of_China"><span data-dcnode-id="2293" instrument_node="">People's Republic of China</span></span><span class="mw-editsection" data-dcnode-id="2285"><span class="mw-editsection-bracket" data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">[</span></span><a data-dcnode-id="2288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRight_of_asylum%26action%3Dedit%26section%3D8" title="Edit section: People's Republic of China"><span data-dcnode-id="2289" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2283" instrument_node="">
</span><p data-dcnode-id="2278"><span data-dcnode-id="2282" instrument_node="">Article 32 of the </span><a data-dcnode-id="2280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_the_People%2527s_Republic_of_China" title="Constitution of the People's Republic of China"><span data-dcnode-id="2281" instrument_node="">Constitution of the People's Republic of China</span></a><span data-dcnode-id="2279" instrument_node=""> states that China may grant asylum to foreigners who request it for political reasons.
</span></p><p data-dcnode-id="2273"><span data-dcnode-id="2277" instrument_node="">In 1979, </span><a data-dcnode-id="2275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ho%25C3%25A0ng_V%25C4%2583n_Hoan" title="Hoàng Văn Hoan"><span data-dcnode-id="2276" instrument_node="">Hoàng Văn Hoan</span></a><span data-dcnode-id="2274" instrument_node="">, the Vice Chairman of the National Assembly of Vietnam, was the last foreigner to be granted political asylum in China so far. From 1980 to the present, no individuals have been granted political asylum. The foreigners who have been granted political asylum in the People's Republic of China are all foreign pro-communist political leaders.
</span></p><span data-dcnode-id="2272" instrument_node="">
</span><h2 data-dcnode-id="2262"><span class="mw-headline" data-dcnode-id="2270" id="See_also"><span data-dcnode-id="2271" instrument_node="">See also</span></span><span class="mw-editsection" data-dcnode-id="2263"><span class="mw-editsection-bracket" data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">[</span></span><a data-dcnode-id="2266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRight_of_asylum%26action%3Dedit%26section%3D9" title="Edit section: See also"><span data-dcnode-id="2267" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2261" instrument_node="">
</span><div class="div-col" data-dcnode-id="2225" style="column-width: 21em;"><span data-dcnode-id="2258" instrument_node="">
</span><ul data-dcnode-id="2227"><li data-dcnode-id="2255"><a data-dcnode-id="2256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_fugitives_in_Cuba" title="American fugitives in Cuba"><span data-dcnode-id="2257" instrument_node="">American fugitives in Cuba</span></a></li><span data-dcnode-id="2254" instrument_node="">
</span><li data-dcnode-id="2251"><a data-dcnode-id="2252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asylum_seeker" title="Asylum seeker"><span data-dcnode-id="2253" instrument_node="">Asylum seeker</span></a></li><span data-dcnode-id="2250" instrument_node="">
