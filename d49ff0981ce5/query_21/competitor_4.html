</span><p data-dcnode-id="3348"><span data-dcnode-id="3428" instrument_node="">The </span><b data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">right of asylum</span></b><span data-dcnode-id="3425" instrument_node=""> (sometimes called </span><b data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">right of political asylum</span></b><span data-dcnode-id="3422" instrument_node="">; from </span><a class="mw-redirect" data-dcnode-id="3420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Greek_language" title="Ancient Greek language"><span data-dcnode-id="3421" instrument_node="">Ancient Greek</span></a><span data-dcnode-id="3419" instrument_node=""> </span><i data-dcnode-id="3417"><span data-dcnode-id="3418" instrument_node=""> </span></i><span data-dcnode-id="3414" lang="grc"><a class="extiw" data-dcnode-id="3415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wiktionary.org/wiki/%25E1%25BC%2584%25CF%2583%25CF%2585%25CE%25BB%25CE%25BF%25CE%25BD%23Ancient_Greek" title="wikt:ἄσυλον"><span data-dcnode-id="3416" instrument_node="">ἄσυλον</span></a></span><i data-dcnode-id="3408"><span data-dcnode-id="3413" instrument_node=""> (</span><span data-dcnode-id="3410" lang="grc-Latn" title="Ancient Greek transliteration"><i data-dcnode-id="3411"><span data-dcnode-id="3412" instrument_node="">ásulon</span></i></span><span data-dcnode-id="3409" instrument_node="">)</span></i><span data-dcnode-id="3407" instrument_node="">&nbsp;'sanctuary')</span><sup class="reference" data-dcnode-id="3404" id="cite_ref-1"><a data-dcnode-id="3405" href="#cite_note-1"><span data-dcnode-id="3406" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="3401" id="cite_ref-2"><a data-dcnode-id="3402" href="#cite_note-2"><span data-dcnode-id="3403" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3400" instrument_node=""> is an ancient </span><a data-dcnode-id="3398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jurisprudence" title="Jurisprudence"><span data-dcnode-id="3399" instrument_node="">juridical</span></a><span data-dcnode-id="3397" instrument_node=""> concept, under which people </span><a data-dcnode-id="3395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persecution" title="Persecution"><span data-dcnode-id="3396" instrument_node="">persecuted</span></a><span data-dcnode-id="3394" instrument_node=""> by their own </span><a data-dcnode-id="3392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/King" title="King"><span data-dcnode-id="3393" instrument_node="">rulers</span></a><span data-dcnode-id="3391" instrument_node=""> might be protected by another </span><a data-dcnode-id="3389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sovereignty" title="Sovereignty"><span data-dcnode-id="3390" instrument_node="">sovereign authority</span></a><span data-dcnode-id="3388" instrument_node="">, like a second country or another entity which in </span><a class="mw-redirect" data-dcnode-id="3386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Medieval_times" title="Medieval times"><span data-dcnode-id="3387" instrument_node="">medieval times</span></a><span data-dcnode-id="3385" instrument_node=""> could offer </span><a data-dcnode-id="3383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sanctuary%23legal_sanctuary" title="Sanctuary"><span data-dcnode-id="3384" instrument_node="">sanctuary</span></a><span data-dcnode-id="3382" instrument_node="">. This right was recognized by the </span><a class="mw-redirect" data-dcnode-id="3380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Egyptians" title="Ancient Egyptians"><span data-dcnode-id="3381" instrument_node="">Ancient Egyptians</span></a><span data-dcnode-id="3379" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="3377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Greeks" title="Ancient Greeks"><span data-dcnode-id="3378" instrument_node="">Greeks</span></a><span data-dcnode-id="3376" instrument_node="">, and the </span><a data-dcnode-id="3374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hebrews" title="Hebrews"><span data-dcnode-id="3375" instrument_node="">Hebrews</span></a><span data-dcnode-id="3373" instrument_node="">, from whom it was adopted into </span><a data-dcnode-id="3371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_world" title="Western world"><span data-dcnode-id="3372" instrument_node="">Western</span></a><span data-dcnode-id="3370" instrument_node=""> </span><a data-dcnode-id="3368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tradition" title="Tradition"><span data-dcnode-id="3369" instrument_node="">tradition</span></a><span data-dcnode-id="3367" instrument_node="">. </span><a data-dcnode-id="3365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ren%25C3%25A9_Descartes" title="René Descartes"><span data-dcnode-id="3366" instrument_node="">René Descartes</span></a><span data-dcnode-id="3364" instrument_node=""> fled to the </span><a data-dcnode-id="3362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Netherlands" title="Netherlands"><span data-dcnode-id="3363" instrument_node="">Netherlands</span></a><span data-dcnode-id="3361" instrument_node="">, </span><a data-dcnode-id="3359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voltaire" title="Voltaire"><span data-dcnode-id="3360" instrument_node="">Voltaire</span></a><span data-dcnode-id="3358" instrument_node=""> to </span><a data-dcnode-id="3356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/England" title="England"><span data-dcnode-id="3357" instrument_node="">England</span></a><span data-dcnode-id="3355" instrument_node="">, and </span><a data-dcnode-id="3353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Hobbes" title="Thomas Hobbes"><span data-dcnode-id="3354" instrument_node="">Thomas Hobbes</span></a><span data-dcnode-id="3352" instrument_node=""> to </span><a data-dcnode-id="3350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/France" title="France"><span data-dcnode-id="3351" instrument_node="">France</span></a><span data-dcnode-id="3349" instrument_node="">, because each state offered protection to persecuted foreigners.
</span></p><p data-dcnode-id="3342"><span data-dcnode-id="3347" instrument_node="">The Egyptians, Greeks and Hebrews recognized a religious "right of asylum", protecting people (including those accused of crime) from severe punishments. This principle was later adopted by the established Christian church, and various rules were developed that detailed how to qualify for protection and what degree of protection one would receive.</span><sup class="reference" data-dcnode-id="3344" id="cite_ref-3"><a data-dcnode-id="3345" href="#cite_note-3"><span data-dcnode-id="3346" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3343" instrument_node="">
</span></p><p data-dcnode-id="3325"><span data-dcnode-id="3341" instrument_node="">The </span><a data-dcnode-id="3339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Council_of_Orl%25C3%25A9ans" title="First Council of Orléans"><span data-dcnode-id="3340" instrument_node="">Council of Orleans</span></a><span data-dcnode-id="3338" instrument_node=""> decided in 511, in the presence of </span><a data-dcnode-id="3336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clovis_I" title="Clovis I"><span data-dcnode-id="3337" instrument_node="">Clovis I</span></a><span data-dcnode-id="3335" instrument_node="">, that asylum could be granted to anyone who took refuge in a church or on church property, or at the home of a bishop. This protection was extended to </span><a data-dcnode-id="3333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Murder" title="Murder"><span data-dcnode-id="3334" instrument_node="">murderers</span></a><span data-dcnode-id="3332" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thief" title="Thief"><span data-dcnode-id="3331" instrument_node="">thieves</span></a><span data-dcnode-id="3329" instrument_node=""> and </span><a data-dcnode-id="3327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adultery" title="Adultery"><span data-dcnode-id="3328" instrument_node="">adulterers</span></a><span data-dcnode-id="3326" instrument_node=""> alike.
</span></p><p data-dcnode-id="3304"><span data-dcnode-id="3324" instrument_node="">That "Everyone has the right to seek and to enjoy in other countries asylum from persecution" is enshrined in the </span><a data-dcnode-id="3322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="3323" instrument_node="">United Nations</span></a><span data-dcnode-id="3321" instrument_node=""> </span><a data-dcnode-id="3319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_Declaration_of_Human_Rights" title="Universal Declaration of Human Rights"><span data-dcnode-id="3320" instrument_node="">Universal Declaration of Human Rights</span></a><span data-dcnode-id="3318" instrument_node=""> of 1948 and supported by the 1951 </span><a data-dcnode-id="3316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_Relating_to_the_Status_of_Refugees" title="Convention Relating to the Status of Refugees"><span data-dcnode-id="3317" instrument_node="">Convention Relating to the Status of Refugees</span></a><span data-dcnode-id="3315" instrument_node=""> and the 1967 </span><a data-dcnode-id="3313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protocol_Relating_to_the_Status_of_Refugees" title="Protocol Relating to the Status of Refugees"><span data-dcnode-id="3314" instrument_node="">Protocol Relating to the Status of Refugees</span></a><span data-dcnode-id="3312" instrument_node="">.</span><sup class="reference" data-dcnode-id="3309" id="cite_ref-4"><a data-dcnode-id="3310" href="#cite_note-4"><span data-dcnode-id="3311" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3308" instrument_node=""> Under these agreements, a </span><a data-dcnode-id="3306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refugee" title="Refugee"><span data-dcnode-id="3307" instrument_node="">refugee</span></a><span data-dcnode-id="3305" instrument_node=""> is a person who is outside that person's own country's territory owing to fear of persecution on protected grounds, including race, caste, nationality, religion, political opinions and participation in any particular social group or social activities.
</span></p><span data-dcnode-id="3303" instrument_node="">

itle="Help:Maintenance template removal"><span data-dcnode-id="3112" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="3109" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="3101" instrument_node="">
</span><p data-dcnode-id="3056"><span data-dcnode-id="3100" instrument_node="">In England, King </span><a data-dcnode-id="3098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2586thelberht_of_Kent" title="Æthelberht of Kent"><span data-dcnode-id="3099" instrument_node="">Æthelberht of Kent</span></a><span data-dcnode-id="3097" instrument_node=""> proclaimed the first </span><a class="mw-redirect" data-dcnode-id="3095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglo-Saxon_laws" title="Anglo-Saxon laws"><span data-dcnode-id="3096" instrument_node="">Anglo-Saxon laws</span></a><span data-dcnode-id="3094" instrument_node=""> on </span><a data-dcnode-id="3092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sanctuary" title="Sanctuary"><span data-dcnode-id="3093" instrument_node="">sanctuary</span></a><span data-dcnode-id="3091" instrument_node=""> in about 600 AD. However </span><a data-dcnode-id="3089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geoffrey_of_Monmouth" title="Geoffrey of Monmouth"><span data-dcnode-id="3090" instrument_node="">Geoffrey of Monmouth</span></a><span data-dcnode-id="3088" instrument_node=""> in his </span><i data-dcnode-id="3085"><a data-dcnode-id="3086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Historia_Regum_Britanniae" title="Historia Regum Britanniae"><span data-dcnode-id="3087" instrument_node="">Historia Regum Britanniae</span></a></i><span data-dcnode-id="3084" instrument_node=""> (c. 1136) says that the legendary pre-Saxon king </span><a class="mw-redirect" data-dcnode-id="3082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dunvallo_Molmutius" title="Dunvallo Molmutius"><span data-dcnode-id="3083" instrument_node="">Dunvallo Molmutius</span></a><span data-dcnode-id="3081" instrument_node=""> (4th/5th century BC) enacted sanctuary laws among the </span><a data-dcnode-id="3079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Molmutine_Laws" title="Molmutine Laws"><span data-dcnode-id="3080" instrument_node="">Molmutine Laws</span></a><span data-dcnode-id="3078" instrument_node=""> as recorded by </span><a data-dcnode-id="3076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gildas" title="Gildas"><span data-dcnode-id="3077" instrument_node="">Gildas</span></a><span data-dcnode-id="3075" instrument_node=""> (c. 500–570).</span><sup class="reference" data-dcnode-id="3072" id="cite_ref-5"><a data-dcnode-id="3073" href="#cite_note-5"><span data-dcnode-id="3074" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3071" instrument_node=""> The term </span><i data-dcnode-id="3068"><a class="extiw" data-dcnode-id="3069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wiktionary.org/wiki/grith" title="wiktionary:grith"><span data-dcnode-id="3070" instrument_node="">grith</span></a></i><span data-dcnode-id="3067" instrument_node=""> was used by the laws of king </span><i data-dcnode-id="3064"><a data-dcnode-id="3065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2586thelred_the_Unready" title="Æthelred the Unready"><span data-dcnode-id="3066" instrument_node="">Ethelred</span></a></i><span data-dcnode-id="3063" instrument_node="">.
By the </span><a class="mw-redirect" data-dcnode-id="3061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Norman_era" title="Norman era"><span data-dcnode-id="3062" instrument_node="">Norman era</span></a><span data-dcnode-id="3060" instrument_node=""> that followed 1066, two kinds of sanctuary had evolved: all churches had the lower-level powers and could grant sanctuary within the church proper, but the broader powers of churches licensed by royal </span><a data-dcnode-id="3058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charter" title="Charter"><span data-dcnode-id="3059" instrument_node="">charter</span></a><span data-dcnode-id="3057" instrument_node=""> extended sanctuary to a zone around the church. At least twenty-two churches had charters for this broader sanctuary, including
</span></p><span data-dcnode-id="3055" instrument_node="">
</span><ul data-dcnode-id="3010"><li data-dcnode-id="3052"><a data-dcnode-id="3053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_Abbey" title="Battle Abbey"><span data-dcnode-id="3054" instrument_node="">Battle Abbey</span></a></li><span data-dcnode-id="3051" instrument_node="">
</span><li data-dcnode-id="3047"><a data-dcnode-id="3049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beverley" title="Beverley"><span data-dcnode-id="3050" instrument_node="">Beverley</span></a><span data-dcnode-id="3048" instrument_node=""> (see image, right)</span></li><span data-dcnode-id="3046" instrument_node="">
</span><li data-dcnode-id="3043"><a data-dcnode-id="3044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colchester" title="Colchester"><span data-dcnode-id="3045" instrument_node="">Colchester</span></a></li><span data-dcnode-id="3042" instrument_node="">
</span><li data-dcnode-id="3039"><a data-dcnode-id="3040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Durham%2C_England" title="Durham, England"><span data-dcnode-id="3041" instrument_node="">Durham, England</span></a></li><span data-dcnode-id="3038" instrument_node="">
</span><li data-dcnode-id="3035"><a data-dcnode-id="3036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hexham" title="Hexham"><span data-dcnode-id="3037" instrument_node="">Hexham</span></a></li><span data-dcnode-id="3034" instrument_node="">
</span><li data-dcnode-id="3031"><a data-dcnode-id="3032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Norwich" title="Norwich"><span data-dcnode-id="3033" instrument_node="">Norwich</span></a></li><span data-dcnode-id="3030" instrument_node="">
</span><li data-dcnode-id="3027"><a data-dcnode-id="3028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ripon" title="Ripon"><span data-dcnode-id="3029" instrument_node="">Ripon</span></a></li><span data-dcnode-id="3026" instrument_node="">
</span><li data-dcnode-id="3023"><a data-dcnode-id="3024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wells_Cathedral" title="Wells Cathedral"><span data-dcnode-id="3025" instrument_node="">Wells Cathedral</span></a></li><span data-dcnode-id="3022" instrument_node="">
</span><li data-dcnode-id="3019"><a data-dcnode-id="3020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Winchester_Cathedral" title="Winchester Cathedral"><span data-dcnode-id="3021" instrument_node="">Winchester Cathedral</span></a></li><span data-dcnode-id="3018" instrument_node="">
</span><li data-dcnode-id="3015"><a data-dcnode-id="3016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Westminster_Abbey" title="Westminster Abbey"><span data-dcnode-id="3017" instrument_node="">Westminster Abbey</span></a></li><span data-dcnode-id="3014" instrument_node="">
</span><li data-dcnode-id="3011"><a data-dcnode-id="3012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/York_Minster" title="York Minster"><span data-dcnode-id="3013" instrument_node="">York Minster</span></a></li></ul><span data-dcnode-id="3009" instrument_node="">
</span><p data-dcnode-id="3001"><span data-dcnode-id="3008" instrument_node="">Sometimes the criminal had to get to the chapel itself to be protected, or ring a certain bell, hold a certain ring or </span><a class="mw-redirect" data-dcnode-id="3006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sanctuary_knocker" title="Sanctuary knocker"><span data-dcnode-id="3007" instrument_node="">door-knocker</span></a><span data-dcnode-id="3005" instrument_node="">, or sit on a certain chair ("</span><a data-dcnode-id="3003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frith" title="Frith"><span data-dcnode-id="3004" instrument_node="">frith</span></a><span data-dcnode-id="3002" instrument_node="">-stool"). Some of these items survive at various churches. Elsewhere, sanctuary held in an area around the church or abbey, sometimes extending in radius to as much as a mile and a half. Stone "sanctuary crosses" marked the boundaries of the area; some crosses still exist as well. Thus it could become a race between the felon and the medieval law officers to the nearest sanctuary boundary. Serving of justice upon the fleet of foot could prove a difficult proposition.
</span></p><p data-dcnode-id="2990"><span data-dcnode-id="3000" instrument_node="">Church sanctuaries were regulated by common law. An asylum seeker had to confess his sins, surrender his weapons, and permit supervision by a church or abbey organization with jurisdiction. Seekers then had forty days to decide whether to surrender to secular authorities and stand trial for their alleged crimes, or to confess their guilt, </span><a data-dcnode-id="2998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abjuration%23Abjuration_of_the_realm" title="Abjuration"><span data-dcnode-id="2999" instrument_node="">abjure the realm</span></a><span data-dcnode-id="2997" instrument_node="">, and go into </span><a data-dcnode-id="2995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exile" title="Exile"><span data-dcnode-id="2996" instrument_node="">exile</span></a><span data-dcnode-id="2994" instrument_node=""> by the shortest route and never return without the king's permission. Those who did return faced execution under the law or </span><a class="mw-redirect" data-dcnode-id="2992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Excommunicated" title="Excommunicated"><span data-dcnode-id="2993" instrument_node="">excommunication</span></a><span data-dcnode-id="2991" instrument_node=""> from the Church.
</span></p><p data-dcnode-id="2982"><span data-dcnode-id="2989" instrument_node="">If the suspects chose to confess their guilt and abjure, they did so in a public ceremony, usually at the church gates. They would surrender their possessions to the church, and any </span><a data-dcnode-id="2987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Landed_property" title="Landed property"><span data-dcnode-id="2988" instrument_node="">landed property</span></a><span data-dcnode-id="2986" instrument_node=""> to the crown. The coroner, a medieval official, would then choose a port city from which the fugitive should leave England (though the fugitive sometimes had this privilege). The fugitive would set out barefooted and bareheaded, carrying a wooden cross-staff as a symbol of protection under the church. Theoretically they would stay to the main highway, reach the port and take the first ship out of England. In practice, however, the fugitive could get a safe distance away, abandon the cross-staff and take off and start a new life. However, one can safely assume the friends and relatives of the victim knew of this ploy and would do everything in their power to make sure this did not happen; or indeed that the fugitives never reached their intended port of call, becoming victims of </span><a class="mw-redirect" data-dcnode-id="2984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vigilante" title="Vigilante"><span data-dcnode-id="2985" instrument_node="">vigilante</span></a><span data-dcnode-id="2983" instrument_node=""> justice under the pretense of a fugitive who wandered too far off the main highway while trying to "escape".
</span></p><p data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">Knowing the grim options, some fugitives rejected both choices and opted for an escape from the asylum before the forty days were up. Others simply made no choice and did nothing. Since it was illegal for the victim's friends to break into an asylum, the church would deprive the fugitive of food and water until a decision was made.
</span></p><p data-dcnode-id="2965"><span data-dcnode-id="2979" instrument_node="">In the 14th century, fugitives claiming sanctuary was protected by an Act of 1315. It was stipulated that fugitives should be allowed access outside of the church to urinate and defecate, and also not be allowed to die due to hunger while being protected in church. Sanctuary can only be confirmed under confession to a witness. However, the right of sanctuary is often ignored such as the case of </span><a class="new" data-dcnode-id="2977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DIsabella_de_Bury%26action%3Dedit%26redlink%3D1" title="Isabella de Bury (page does not exist)"><span data-dcnode-id="2978" instrument_node="">Isabella de Bury</span></a><span data-dcnode-id="2976" instrument_node="">, </span><a data-dcnode-id="2974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Folville" title="Richard Folville"><span data-dcnode-id="2975" instrument_node="">Richard Folville</span></a><span data-dcnode-id="2973" instrument_node=""> or the peasants during the </span><a data-dcnode-id="2971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peasants%2527_Revolt" title="Peasants' Revolt"><span data-dcnode-id="2972" instrument_node="">Peasants Revolt</span></a><span data-dcnode-id="2970" instrument_node=""> who took shelter, but were eventually beheaded once forcibly removed from church.</span><sup class="reference" data-dcnode-id="2967" id="cite_ref-6"><a data-dcnode-id="2968" href="#cite_note-6"><span data-dcnode-id="2969" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2966" instrument_node="">
</span></p><p data-dcnode-id="2954"><span data-dcnode-id="2964" instrument_node="">During the </span><a data-dcnode-id="2962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wars_of_the_Roses" title="Wars of the Roses"><span data-dcnode-id="2963" instrument_node="">Wars of the Roses</span></a><span data-dcnode-id="2961" instrument_node="">, when the Yorkists or Lancastrians would suddenly get the upper hand by winning a battle, some adherents of the losing side might find themselves surrounded by adherents of the other side and not able to get back to their own side. Upon realizing this situation they would rush to sanctuary at the nearest church until it was safe to come out. A prime example is Queen </span><a data-dcnode-id="2959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elizabeth_Woodville" title="Elizabeth Woodville"><span data-dcnode-id="2960" instrument_node="">Elizabeth Woodville</span></a><span data-dcnode-id="2958" instrument_node="">, consort of </span><a data-dcnode-id="2956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_IV_of_England" title="Edward IV of England"><span data-dcnode-id="2957" instrument_node="">Edward IV of England</span></a><span data-dcnode-id="2955" instrument_node="">.
</span></p><p data-dcnode-id="2933"><span data-dcnode-id="2953" instrument_node="">In 1470, when the Lancastrians briefly restored </span><a data-dcnode-id="2951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_VI_of_England" title="Henry VI of England"><span data-dcnode-id="2952" instrument_node="">Henry VI</span></a><span data-dcnode-id="2950" instrument_node=""> to the throne, Queen </span><a data-dcnode-id="2948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elizabeth_Woodville" title="Elizabeth Woodville"><span data-dcnode-id="2949" instrument_node="">Elizabeth</span></a><span data-dcnode-id="2947" instrument_node=""> was living in London with several young daughters. She moved with them into </span><a data-dcnode-id="2945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Westminster_Abbey" title="Westminster Abbey"><span data-dcnode-id="2946" instrument_node="">Westminster</span></a><span data-dcnode-id="2944" instrument_node=""> for sanctuary, living there in royal comfort until </span><a data-dcnode-id="2942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_IV_of_England" title="Edward IV of England"><span data-dcnode-id="2943" instrument_node="">Edward IV</span></a><span data-dcnode-id="2941" instrument_node=""> was restored to the throne in 1471 and giving birth to their first son </span><a data-dcnode-id="2939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_V_of_England" title="Edward V of England"><span data-dcnode-id="2940" instrument_node="">Edward V</span></a><span data-dcnode-id="2938" instrument_node=""> during that time. When King Edward IV died in 1483, Elizabeth (who was highly unpopular with even the Yorkists and probably did need protection) took her five daughters and youngest son (Richard, Duke of York) and again moved into sanctuary at Westminster. To be sure she had all the comforts of home, she brought so much furniture and so many chests that the workmen had to knock holes in some of the walls to get everything in fast enough to suit her.</span><sup class="reference" data-dcnode-id="2935" id="cite_ref-7"><a data-dcnode-id="2936" href="#cite_note-7"><span data-dcnode-id="2937" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2934" instrument_node="">
</span></p><p data-dcnode-id="2926"><a class="mw-redirect" data-dcnode-id="2931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_VIII_of_England" title="Henry VIII of England"><span data-dcnode-id="2932" instrument_node="">Henry VIII</span></a><span data-dcnode-id="2930" instrument_node=""> changed the rules of asylum, reducing to a short list the types of crimes for which people were allowed to claim asylum. The medieval system of asylum was finally abolished entirely by </span><a class="mw-redirect" data-dcnode-id="2928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_I_of_England" title="James I of England"><span data-dcnode-id="2929" instrument_node="">James I</span></a><span data-dcnode-id="2927" instrument_node=""> in 1623.
</span></p><span data-dcnode-id="2925" instrument_node="">

</span><div class="thumb tright" data-dcnode-id="2798"><div class="thumbinner" data-dcnode-id="2799" style="width:222px;"><span class="mw-tmh-player video" data-dcnode-id="2835"><video class="thumbimage" data-dcnode-id="2840" data-durationhint="67" data-mwprovider="wikimediacommons" data-mwtitle="Ontheemden_uit_Midden-Europa_vinden_asiel_in_ons_land_Weeknummer_50-48_-_Open_Beelden_-_10692.ogv" disabled="disabled" height="165" id="mwe_player_0_placeholder" poster="//upload.wikimedia.org/wikipedia/commons/thumb/0/06/Ontheemden_uit_Midden-Europa_vinden_asiel_in_ons_land_Weeknummer_50-48_-_Open_Beelden_-_10692.ogv/220px--Ontheemden_uit_Midden-Europa_vinden_asiel_in_ons_land_Weeknummer_50-48_-_Open_Beelden_-_10692.ogv.jpg" preload="none" tabindex="-1" width="220"></video><a class="mw-tmh-play" data-dcnode-id="2838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOntheemden_uit_Midden-Europa_vinden_asiel_in_ons_land_Weeknummer_50-48_-_Open_Beelden_-_10692.ogv" role="button" title="Play media"><span class="mw-tmh-play-icon" data-dcnode-id="2839"></span></a><span aria-label="1 minute and 7 seconds" class="mw-tmh-duration mw-tmh-label" data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">1:07</span></span></span><span data-dcnode-id="2834" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2800"><div class="magnify" data-dcnode-id="2832"><a class="internal" data-dcnode-id="2833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOntheemden_uit_Midden-Europa_vinden_asiel_in_ons_land_Weeknummer_50-48_-_Open_Beelden_-_10692.ogv" title="Enlarge"></a></div><span data-dcnode-id="2831" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="2829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dutch_government" title="Dutch government"><span data-dcnode-id="2830" instrument_node="">Dutch government</span></a><span data-dcnode-id="2828" instrument_node=""> grants asylum to a couple of hundred elderly people from </span><a data-dcnode-id="2826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yugoslavia" title="Yugoslavia"><span data-dcnode-id="2827" instrument_node="">Yugoslavia</span></a><span data-dcnode-id="2825" instrument_node="">, </span><a data-dcnode-id="2823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poland" title="Poland"><span data-dcnode-id="2824" instrument_node="">Poland</span></a><span data-dcnode-id="2822" instrument_node="">, </span><a data-dcnode-id="2820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hungary" title="Hungary"><span data-dcnode-id="2821" instrument_node="">Hungary</span></a><span data-dcnode-id="2819" instrument_node=""> and the </span><a data-dcnode-id="2817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baltic_states" title="Baltic states"><span data-dcnode-id="2818" instrument_node="">Baltic states</span></a><span data-dcnode-id="2816" instrument_node="">. After the end of </span><a data-dcnode-id="2814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="2815" instrument_node="">World War II</span></a><span data-dcnode-id="2813" instrument_node="">, these people stayed in camps in </span><a data-dcnode-id="2811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austria" title="Austria"><span data-dcnode-id="2812" instrument_node="">Austria</span></a><span data-dcnode-id="2810" instrument_node=""> and </span><a data-dcnode-id="2808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_Germany" title="West Germany"><span data-dcnode-id="2809" instrument_node="">West Germany</span></a><span data-dcnode-id="2807" instrument_node="">. (</span><a data-dcnode-id="2805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newsreel" title="Newsreel"><span data-dcnode-id="2806" instrument_node="">Newsreel</span></a><span data-dcnode-id="2804" instrument_node=""> </span><span class="languageicon" data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">(in Dutch)</span></span><span data-dcnode-id="2801" instrument_node="">)</span></div></div></div><span data-dcnode-id="2797" instrument_node="">
</span><p data-dcnode-id="2744"><span data-dcnode-id="2796" instrument_node="">Article 14 of the </span><a data-dcnode-id="2794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_Declaration_of_Human_Rights" title="Universal Declaration of Human Rights"><span data-dcnode-id="2795" instrument_node="">Universal Declaration of Human Rights</span></a><span data-dcnode-id="2793" instrument_node=""> states that "Everyone has the right to seek and to enjoy in other countries asylum from persecution." The </span><a data-dcnode-id="2791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="2792" instrument_node="">United Nations</span></a><span data-dcnode-id="2790" instrument_node=""> 1951 </span><a data-dcnode-id="2788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_Relating_to_the_Status_of_Refugees" title="Convention Relating to the Status of Refugees"><span data-dcnode-id="2789" instrument_node="">Convention Relating to the Status of Refugees</span></a><span data-dcnode-id="2787" instrument_node=""> and the 1967 </span><a data-dcnode-id="2785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protocol_Relating_to_the_Status_of_Refugees" title="Protocol Relating to the Status of Refugees"><span data-dcnode-id="2786" instrument_node="">Protocol Relating to the Status of Refugees</span></a><span data-dcnode-id="2784" instrument_node=""> guides national legislation concerning political asylum. Under these agreements, a </span><a data-dcnode-id="2782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refugee" title="Refugee"><span data-dcnode-id="2783" instrument_node="">refugee</span></a><span data-dcnode-id="2781" instrument_node=""> (or for cases where repressing base means has been applied directly or environmentally to the refugee) is a person who is outside that person's own country's territory (or place of habitual residence if </span><a class="mw-redirect" data-dcnode-id="2779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stateless_person" title="Stateless person"><span data-dcnode-id="2780" instrument_node="">stateless</span></a><span data-dcnode-id="2778" instrument_node="">) owing to fear of </span><a data-dcnode-id="2776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persecution" title="Persecution"><span data-dcnode-id="2777" instrument_node="">persecution</span></a><span data-dcnode-id="2775" instrument_node=""> on protected grounds. Protected grounds include </span><a class="mw-redirect" data-dcnode-id="2773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Race_%28classification_of_human_beings%29" title="Race (classification of human beings)"><span data-dcnode-id="2774" instrument_node="">race</span></a><span data-dcnode-id="2772" instrument_node="">, </span><a data-dcnode-id="2770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caste" title="Caste"><span data-dcnode-id="2771" instrument_node="">caste</span></a><span data-dcnode-id="2769" instrument_node="">, </span><a data-dcnode-id="2767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nationality" title="Nationality"><span data-dcnode-id="2768" instrument_node="">nationality</span></a><span data-dcnode-id="2766" instrument_node="">, </span><a data-dcnode-id="2764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Religion" title="Religion"><span data-dcnode-id="2765" instrument_node="">religion</span></a><span data-dcnode-id="2763" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_opinions" title="Political opinions"><span data-dcnode-id="2762" instrument_node="">political opinions</span></a><span data-dcnode-id="2760" instrument_node=""> and membership or participation in any particular </span><a data-dcnode-id="2758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_group" title="Social group"><span data-dcnode-id="2759" instrument_node="">social group</span></a><span data-dcnode-id="2757" instrument_node=""> or social activities. Rendering true victims of persecution to their persecutor is a violation of a principle called </span><a data-dcnode-id="2755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-refoulement" title="Non-refoulement"><span data-dcnode-id="2756" instrument_node="">non-refoulement</span></a><span data-dcnode-id="2754" instrument_node="">, part of the </span><a data-dcnode-id="2752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Customary_international_law" title="Customary international law"><span data-dcnode-id="2753" instrument_node="">customary</span></a><span data-dcnode-id="2751" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="2749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_law" title="Treaty law"><span data-dcnode-id="2750" instrument_node="">trucial</span></a><span data-dcnode-id="2748" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="2746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_international_law" title="Public international law"><span data-dcnode-id="2747" instrument_node="">Law of Nations</span></a><span data-dcnode-id="2745" instrument_node="">.
</span></p><p data-dcnode-id="2735"><span data-dcnode-id="2743" instrument_node="">These are the accepted terms and criteria as principles and a fundamental part in the 1951 United Nations Convention Relating to the Status of Refugees </span><a data-dcnode-id="2741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-refoulement" title="Non-refoulement"><span data-dcnode-id="2742" instrument_node="">non-refoulement</span></a><span data-dcnode-id="2740" instrument_node=""> order.</span><sup class="reference" data-dcnode-id="2737" id="cite_ref-8"><a data-dcnode-id="2738" href="#cite_note-8"><span data-dcnode-id="2739" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2736" instrument_node="">
</span></p><p data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">Since the 1990s, victims of sexual persecution (which may include domestic violence, or systematic oppression of a gender or sexual minority) have come to be accepted in some countries as a legitimate category for asylum claims, when claimants can prove that the state is unable or unwilling to provide protection.
</span></p><span data-dcnode-id="2732" instrument_node="">
