</span><section class="content-area" data-dcnode-id="421" id="primary"><span data-dcnode-id="713" instrument_node="">
</span><main class="site-main" data-dcnode-id="424" id="main" role="main"><span data-dcnode-id="712" instrument_node="">
</span><article class="post-159 page type-page status-publish hentry" data-dcnode-id="430" id="post-159"><span data-dcnode-id="711" instrument_node="">
</span><header class="entry-header" data-dcnode-id="706"><span data-dcnode-id="710" instrument_node="">
</span><h1 class="page-title" data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">UN Human Rights Treaty Bodies</span></h1><span data-dcnode-id="707" instrument_node="">
</span></header><span data-dcnode-id="704" instrument_node="">
</span><div class="entry-content clearfix" data-dcnode-id="433"><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="695" style="text-align: justify;"><span data-dcnode-id="702" instrument_node="">The </span><b data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">United Nations Human Rights Treaty Bodies</span></b><span data-dcnode-id="699" instrument_node=""> are committees of experts created to monitor governments’ implementation of specific human rights conventions. Currently, </span><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ohchr.org/EN/HRBodies/Pages/HumanRightsBodies.aspx"><span data-dcnode-id="698" instrument_node="">10</span></a><span data-dcnode-id="696" instrument_node="">&nbsp;of the human rights agreements&nbsp;drafted under the auspices of the United Nations are overseen by treaty bodies. Each committee’s mandate is defined in the treaty it oversees or in a protocol to that treaty.</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="683" style="text-align: justify;"><span data-dcnode-id="693" instrument_node="">Each committee – with the exception of the Subcommittee on Prevention of Torture – issues </span><b data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">concluding observations </span></b><span data-dcnode-id="690" instrument_node="">based on its review of each&nbsp;State party’s reports regarding its implementation of the treaty’s provisions, which generally must be submitted every few years. The same nine treaty bodies are also authorized to publish </span><b data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">general comments </span></b><span data-dcnode-id="687" instrument_node="">(also called “general recommendations”) interpreting the scope of each treaty’s provisions or providing guidance on issues related to its mandate. Some treaty bodies also organize </span><b data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">general or thematic discussions</span></b><span data-dcnode-id="684" instrument_node="">, which focus on a particular right or aspect of each convention.</span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="674" style="text-align: justify;"><span data-dcnode-id="681" instrument_node="">Currently, eight of the 10&nbsp;UN treaty bodies may also receive and decide </span><b data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">individual complaints</span></b><span data-dcnode-id="678" instrument_node=""> (also called “communications”) regarding violations allegedly committed by those States that have authorized the committee to receive complaints against them. States generally can accede to the individual complaints mechanism by signing the relevant protocol or submitting the necessary declaration to the treaty. The committee issues a&nbsp;</span><b data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">decision </span></b><span data-dcnode-id="675" instrument_node="">(“views”) regarding each individual complaint, and while these decisions are not generally considered binding on States, they do represent a reasoned interpretation of the relevant treaty to which the States parties have agreed to be legally bound.</span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671" style="text-align: justify;"><span data-dcnode-id="672" instrument_node="">One additional UN treaty body – on the rights of migrant workers – will be authorized to receive individual complaints after 10 States have ratified the necessary instrument.</span></p><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="665" style="text-align: justify;"><span data-dcnode-id="669" instrument_node="">Some treaty bodies also receive </span><b data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">inter-State complaints</span></b><span data-dcnode-id="666" instrument_node="">, which is when one State alleges that another State has violated the relevant treaty.</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="656" style="text-align: justify;"><span data-dcnode-id="663" instrument_node="">Finally, some treaty bodies have the competence to consider requests for&nbsp;</span><b data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">urgent action</span></b><span data-dcnode-id="660" instrument_node="">&nbsp;or </span><b data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">early-warning procedures</span></b><span data-dcnode-id="657" instrument_node="">, which are aimed at preventing or halting serious violations of the relevant convention. Some bodies may initiate confidential inquiries when they receive information regarding grave or systematic violations, so long as the State concerned has agreed to those “inquiry procedures.”</span></p><span data-dcnode-id="655" instrument_node="">
</span><h3 data-dcnode-id="652" style="text-align: justify;"><strong data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">The United Nations Treaty Bodies</span></strong></h3><span data-dcnode-id="651" instrument_node="">
</span><ul data-dcnode-id="637" style="text-align: justify;"><span data-dcnode-id="650" instrument_node="">
</span><li data-dcnode-id="639"><span data-dcnode-id="649" instrument_node="">The </span><a data-dcnode-id="647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ijrcenter.org/un-treaty-bodies/human-rights-committee/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="648" instrument_node="">Human Rights Committee</span></a><span data-dcnode-id="646" instrument_node=""> oversees implementation of the International Covenant on Civil and Political Rights (</span><a data-dcnode-id="644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ohchr.org/EN/ProfessionalInterest/Pages/CCPR.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="645" instrument_node="">ICCPR</span></a><span data-dcnode-id="643" instrument_node="">) and may receive individual communications relating to States parties to the </span><a data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ohchr.org/EN/ProfessionalInterest/Pages/OPCCPR1.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="642" instrument_node="">First Optional Protocol to the ICCPR</span></a><span data-dcnode-id="640" instrument_node="">.</span></li><span data-dcnode-id="638" instrument_node="">
</span></ul><span data-dcnode-id="636" instrument_node="">
</span><ul data-dcnode-id="622" style="text-align: justify;"><span data-dcnode-id="635" instrument_node="">
</span><li data-dcnode-id="624"><span data-dcnode-id="634" instrument_node="">The </span><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ijrcenter.org/un-treaty-bodies/committee-on-economic-social-and-cultural-rights/"><span data-dcnode-id="633" instrument_node="">Committee on Economic, Social and Cultural Rights</span></a><span data-dcnode-id="631" instrument_node="">&nbsp;(CESCR) monitors compliance with the International Covenant on Economic, Social and Cultural Rights (</span><a data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ohchr.org/EN/ProfessionalInterest/Pages/CESCR.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="630" instrument_node="">ICESCR</span></a><span data-dcnode-id="628" instrument_node="">) and may receive individual complaints relating to States parties to the </span><a data-dcnode-id="626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ohchr.org/EN/ProfessionalInterest/Pages/OPCESCR.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="627" instrument_node="">Optional Protocol to the ICESCR</span></a><span data-dcnode-id="625" instrument_node="">.</span></li><span data-dcnode-id="623" instrument_node="">
</span></ul><span data-dcnode-id="621" instrument_node="">
</span><ul data-dcnode-id="610" style="text-align: justify;"><span data-dcnode-id="620" instrument_node="">
</span><li data-dcnode-id="612"><span data-dcnode-id="619" instrument_node="">The </span><a data-dcnode-id="617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ijrcenter.org/un-treaty-bodies/committee-on-the-elimination-of-racial-discrimination/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="618" instrument_node="">Committee on the Elimination of Racial Discrimination</span></a><span data-dcnode-id="616" instrument_node="">&nbsp;(CERD) oversees implementation of the International Convention on the Elimination of All Forms of Racial Discrimination (</span><a data-dcnode-id="614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ohchr.org/EN/ProfessionalInterest/Pages/CERD.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="615" instrument_node="">ICERD</span></a><span data-dcnode-id="613" instrument_node="">) and may receive individual complaints against States parties that have made the relevant declaration under Article 14 of the ICERD.</span></li><span data-dcnode-id="611" instrument_node="">
</span></ul><span data-dcnode-id="609" instrument_node="">
</span><ul data-dcnode-id="595" style="text-align: justify;"><span data-dcnode-id="608" instrument_node="">
</span><li data-dcnode-id="597"><span data-dcnode-id="607" instrument_node="">The </span><a data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ijrcenter.org/un-treaty-bodies/committee-on-the-elimination-of-discrimination-against-women/"><span data-dcnode-id="606" instrument_node="">Committee on the Elimination of Discrimination against Women</span></a><span data-dcnode-id="604" instrument_node="">&nbsp;(CEDAW Committee) monitors compliance with the Convention on the Elimination of All Forms of Discrimination against Women (</span><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ohchr.org/EN/ProfessionalInterest/Pages/CEDAW.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="603" instrument_node="">CEDAW</span></a><span data-dcnode-id="601" instrument_node="">), and may receive individual communications relating to States parties to the </span><a data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ohchr.org/EN/ProfessionalInterest/Pages/OPCEDAW.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="600" instrument_node="">Optional Protocol to CEDAW</span></a><span data-dcnode-id="598" instrument_node="">.</span></li><span data-dcnode-id="596" instrument_node="">
</span></ul><span data-dcnode-id="594" instrument_node="">
</span><ul data-dcnode-id="583" style="text-align: justify;"><span data-dcnode-id="593" instrument_node="">
</span><li data-dcnode-id="585"><span data-dcnode-id="592" instrument_node="">The </span><a data-dcnode-id="590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ijrcenter.org/un-treaty-bodies/committee-against-torture/"><span data-dcnode-id="591" instrument_node="">Committee Against Torture</span></a><span data-dcnode-id="589" instrument_node="">&nbsp;(CAT) oversees implementation of the Convention against Torture and Other Cruel, Inhuman or Degrading Treatment (</span><a data-dcnode-id="587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ohchr.org/EN/ProfessionalInterest/Pages/CAT.aspx"><span data-dcnode-id="588" instrument_node="">Convention against Torture</span></a><span data-dcnode-id="586" instrument_node="">) and may accept individual complaints against States parties that have made the relevant declaration under Article 22 of the CAT.</span></li><span data-dcnode-id="584" instrument_node="">
</span></ul><span data-dcnode-id="582" instrument_node="">
</span><ul data-dcnode-id="571" style="text-align: justify;"><span data-dcnode-id="581" instrument_node="">
</span><li data-dcnode-id="573"><span data-dcnode-id="580" instrument_node="">The </span><a data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ijrcenter.org/un-treaty-bodies/subcommittee-on-prevention-of-torture/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="579" instrument_node="">Subcommittee on Prevention of Torture</span></a><span data-dcnode-id="577" instrument_node="">&nbsp;(SPT), which was established pursuant to the </span><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ohchr.org/EN/ProfessionalInterest/Pages/OPCAT.aspx"><span data-dcnode-id="576" instrument_node="">Optional Protocol to the Convention against Torture</span></a><span data-dcnode-id="574" instrument_node="">&nbsp;(OP-CAT), visits places of detention and advises States and National Preventive Mechanisms on best practices to prevent torture and ill-treatment.</span></li><span data-dcnode-id="572" instrument_node="">
</span></ul><span data-dcnode-id="570" instrument_node="">
</span><ul data-dcnode-id="556" style="text-align: justify;"><span data-dcnode-id="569" instrument_node="">
</span><li data-dcnode-id="558"><span data-dcnode-id="568" instrument_node="">The </span><a data-dcnode-id="566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ijrcenter.org/un-treaty-bodies/committee-on-the-rights-of-the-child/"><span data-dcnode-id="567" instrument_node="">Committee on the Rights of the Child</span></a><span data-dcnode-id="565" instrument_node="">&nbsp;(CRC) monitors compliance with the </span><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ohchr.org/EN/ProfessionalInterest/Pages/CRC.aspx"><span data-dcnode-id="564" instrument_node="">Convention on the Rights of the Child</span></a><span data-dcnode-id="562" instrument_node=""> and its two protocols. The Committee accepts individual complaints against States parties that have ratified the </span><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ohchr.org/EN/ProfessionalInterest/Pages/OPICCRC.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="561" instrument_node="">Third Optional Protocol on a Communications Procedure</span></a><span data-dcnode-id="559" instrument_node="">.</span></li><span data-dcnode-id="557" instrument_node="">
</span></ul><span data-dcnode-id="555" instrument_node="">
</span><ul data-dcnode-id="544" style="text-align: justify;"><span data-dcnode-id="554" instrument_node="">
</span><li data-dcnode-id="546"><span data-dcnode-id="553" instrument_node="">The </span><a data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ijrcenter.org/un-treaty-bodies/committee-on-migrant-workers/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="552" instrument_node="">Committee on Migrant Workers</span></a><span data-dcnode-id="550" instrument_node="">&nbsp;(CMW) oversees implementation of the International Convention on the Protection of the Rights of All Migrant Workers and Members of Their Families (</span><a data-dcnode-id="548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ohchr.org/EN/ProfessionalInterest/Pages/CMW.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="549" instrument_node="">ICMW</span></a><span data-dcnode-id="547" instrument_node="">). An individual complaints mechanism is pending and will begin operating when 10 States parties have made the relevant declaration pursuant to Article 77 of the CMW.</span></li><span data-dcnode-id="545" instrument_node="">
</span></ul><span data-dcnode-id="543" instrument_node="">
</span><ul data-dcnode-id="529" style="text-align: justify;"><span data-dcnode-id="542" instrument_node="">
</span><li data-dcnode-id="531"><span data-dcnode-id="541" instrument_node="">The </span><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ijrcenter.org/un-treaty-bodies/committee-on-the-rights-of-persons-with-disabilities/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="540" instrument_node="">Committee on the Rights of Persons with Disabilities</span></a><span data-dcnode-id="538" instrument_node="">&nbsp;(CRPD) monitors compliance with the International Convention on the Rights of Persons with Disabilities (</span><a data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ohchr.org/EN/HRBodies/CRPD/Pages/ConventionRightsPersonsWithDisabilities.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="537" instrument_node="">ICRPD</span></a><span data-dcnode-id="535" instrument_node="">) and may receive individual complaints against States parties to the </span><a data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ohchr.org/EN/HRBodies/CRPD/Pages/OptionalProtocolRightsPersonsWithDisabilities.aspx"><span data-dcnode-id="534" instrument_node="">Optional Protocol to the Convention</span></a><span data-dcnode-id="532" instrument_node="">.</span></li><span data-dcnode-id="530" instrument_node="">
</span></ul><span data-dcnode-id="528" instrument_node="">
</span><ul data-dcnode-id="517" style="text-align: justify;"><span data-dcnode-id="527" instrument_node="">
</span><li data-dcnode-id="519"><span data-dcnode-id="526" instrument_node="">The </span><a data-dcnode-id="524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ijrcenter.org/un-treaty-bodies/committee-on-enforced-disappearances/"><span data-dcnode-id="525" instrument_node="">Committee on Enforced Disappearances</span></a><span data-dcnode-id="523" instrument_node="">&nbsp;(CED) monitors implementation of the International Convention for the Protection of All Persons from Enforced Disappearance (</span><a data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ohchr.org/EN/HRBodies/CED/Pages/ConventionCED.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="522" instrument_node="">ICPPED</span></a><span data-dcnode-id="520" instrument_node="">) and may consider individual complaints against States parties that have recognized the Committee’s competence pursuant to Article 31 of the Convention.</span></li><span data-dcnode-id="518" instrument_node="">
</span></ul><span data-dcnode-id="516" instrument_node="">
</span><h3 data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Resources for Advocates</span></h3><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">For further information about the mandate, outputs, and jurisdiction of each UN human rights treaty body, see the IJRC page on each committee (linked to above).</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="509" instrument_node="">View the&nbsp;</span><a data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ijrcenter.org/wp-content/uploads/2018/04/8.-Exhaustion-of-Domestic-Remedies-UN-Treaty-Bodies.pdf"><span data-dcnode-id="508" instrument_node="">exhaustion guide</span></a><span data-dcnode-id="506" instrument_node="">&nbsp;for an overview of how the UN human rights treaty bodies interpret and apply the procedural requirement of exhaustion of domestic remedies in their complaints processes.</span></p><span data-dcnode-id="504" instrument_node="">
</span><h3 data-dcnode-id="501" style="text-align: justify;"><strong data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Additional Resources</span></strong></h3><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="489" style="text-align: justify;"><span data-dcnode-id="499" instrument_node="">Each treaty body’s&nbsp;decisions, concluding observations on States’ reports, and general comments on treaty provisions can be most effectively searched through the </span><a data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tbinternet.ohchr.org/_layouts/treatybodyexternal/TBSearch.aspx%3FLang%3Den"><span data-dcnode-id="498" instrument_node="">UN Treaty Body Database</span></a><span data-dcnode-id="496" instrument_node="">, treaty body </span><a data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//juris.ohchr.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="495" instrument_node="">Jurisprudence Database</span></a><span data-dcnode-id="493" instrument_node="">,&nbsp;and&nbsp;other resources listed in the </span><a data-dcnode-id="491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ijrcenter.org/research-aids/jurisprudence-databases/"><span data-dcnode-id="492" instrument_node="">Jurisprudence &amp; Documents Databases</span></a><span data-dcnode-id="490" instrument_node=""> section of this Online Resource Hub.</span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="483" style="text-align: justify;"><span data-dcnode-id="487" instrument_node="">The UN also maintains a list of&nbsp;</span><a data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ohchr.org/EN/HRBodies/Pages/TBGeneralComments.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="486" instrument_node="">general comments</span></a><span data-dcnode-id="484" instrument_node="">&nbsp;issued by the treaty bodies.</span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="468" style="text-align: justify;"><span data-dcnode-id="481" instrument_node="">See IJRC’s </span><a data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ijrcenter.org/country-factsheets/"><span data-dcnode-id="480" instrument_node="">Country Factsheets</span></a><span data-dcnode-id="478" instrument_node=""> for an overview of which UN (and regional) human rights treaties and complaint mechanisms a particular country has accepted. The UN Office of the High Commissioner for Human Rights (OHCHR) also maintains information on the current status of States’ </span><a data-dcnode-id="476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tbinternet.ohchr.org/_layouts/TreatyBodyExternal/Treaty.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="477" instrument_node="">ratification</span></a><span data-dcnode-id="475" instrument_node=""> and </span><a data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tbinternet.ohchr.org/_layouts/TreatyBodyExternal/Countries.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="474" instrument_node="">reporting</span></a><span data-dcnode-id="472" instrument_node=""> on its </span><a data-dcnode-id="470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www2.ohchr.org/english/bodies/"><span data-dcnode-id="471" instrument_node="">Human Rights Bodies</span></a><span data-dcnode-id="469" instrument_node="">&nbsp;page.</span></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="461" style="text-align: justify;"><span data-dcnode-id="465" style="line-height: 1.5em;"><span data-dcnode-id="466" instrument_node="">The UN Dag Hammarskjöld Library’s&nbsp;</span></span><a data-dcnode-id="463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//research.un.org/en/docs/humanrights/treaties" rel="noopener noreferrer" style="line-height: 1.5em;" target="_blank"><span data-dcnode-id="464" instrument_node="">UN Treaty-Based Bodies Research Guide</span></a><span data-dcnode-id="462" instrument_node="">&nbsp;provides useful information on researching, citing, and identifying documents published by the treaty bodies.</span></p><span data-dcnode-id="460" instrument_node="">
</span><div class="sharedaddy sd-sharing-enabled" data-dcnode-id="435"><div class="robots-nocontent sd-block sd-social sd-social-icon sd-sharing" data-dcnode-id="436"><div class="sd-content" data-dcnode-id="437"><ul data-dcnode-id="438"><li class="share-twitter" data-dcnode-id="455"><a class="share-twitter sd-button share-icon no-text" data-dcnode-id="456" data-shared="sharing-twitter-159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ijrcenter.org/un-treaty-bodies/%3Fshare%3Dtwitter%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Twitter"><span data-dcnode-id="459"></span><span class="sharing-screen-reader-text" data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Click to share on Twitter (Opens in new window)</span></span></a></li><li class="share-facebook" data-dcnode-id="450"><a class="share-facebook sd-button share-icon no-text" data-dcnode-id="451" data-shared="sharing-facebook-159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ijrcenter.org/un-treaty-bodies/%3Fshare%3Dfacebook%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Facebook"><span data-dcnode-id="454"></span><span class="sharing-screen-reader-text" data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Click to share on Facebook (Opens in new window)</span></span></a></li><li class="share-linkedin" data-dcnode-id="445"><a class="share-linkedin sd-button share-icon no-text" data-dcnode-id="446" data-shared="sharing-linkedin-159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ijrcenter.org/un-treaty-bodies/%3Fshare%3Dlinkedin%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on LinkedIn"><span data-dcnode-id="449"></span><span class="sharing-screen-reader-text" data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Click to share on LinkedIn (Opens in new window)</span> </span><aside class="widget_text widget widget_custom_html clearfix" data-dcnode-id="395" id="custom_html-2"><div class="widget-header" data-dcnode-id="415"><h3 class="widget-title" data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">COVID-19 &amp; Human Rights Oversight</span></h3></div><div class="textwidget custom-html-widget" data-dcnode-id="396"><p data-dcnode-id="410" style="text-align: justify;"><span data-dcnode-id="414" instrument_node="">See human rights bodies' COVID-19 guidance on our </span><a data-dcnode-id="412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ijrcenter.org/covid-19-guidance-from-supranational-human-rights-bodies/"><span data-dcnode-id="413" instrument_node="">dedicated webpage</span></a><span data-dcnode-id="411" instrument_node="">, organized by mechanism and theme, and updated regularly.</span></p><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="401" style="text-align: justify;"><span data-dcnode-id="408" instrument_node="">For human rights bodies' schedule and activity changes due to the pandemic, see our </span><a data-dcnode-id="406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ijrcenter.org/category/monthly-overview/"><span data-dcnode-id="407" instrument_node="">Monthly Overview</span></a><span data-dcnode-id="405" instrument_node=""> posts or the IJRC Hearings &amp; Sessions </span><a data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ijrcenter.org/events/"><span data-dcnode-id="404" instrument_node="">Calendar</span></a><span data-dcnode-id="402" instrument_node="">.</span></p><span data-dcnode-id="400" instrument_node="">
