</span><h2 data-dcnode-id="4233"><span data-dcnode-id="4234" instrument_node="">Article 18 - Right to asylum </span></h2><span data-dcnode-id="4232" instrument_node="">
</span><div class="field-wrapper field field-node--field-info-body field-name-field-info-body field-type-text-long field-label-hidden" data-dcnode-id="4222"><span data-dcnode-id="4231" instrument_node="">
</span><div class="field-items" data-dcnode-id="4224"><span data-dcnode-id="4230" instrument_node="">
</span><div class="field-item" data-dcnode-id="4226"><p data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node="">The right to asylum shall be guaranteed with due respect for the rules of the Geneva Convention of 28 July 1951 and the Protocol of 31 January 1967 relating to the status of refugees and in accordance with the Treaty on European Union and the Treaty on the Functioning of the European Union (hereinafter referred to as 'the Treaties').</span></p><span data-dcnode-id="4227" instrument_node="">

-field views-field-field-fra-country" data-dcnode-id="2985"><span class="views-label views-label-field-fra-country" data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">Country: </span></span><div class="field-content" data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">Sweden</span></div></div><div class="views-field views-field-field-info-body" data-dcnode-id="2980"><div class="field-content" data-dcnode-id="2981"><p data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">Chapter 2 - Fundamental rights and freedoms: Article 7 No Swedish citizen may be deported from or refused entry into the Realm. No Swedish citizen who is domiciled in the Realm or who has previously been domiciled in the Realm may be deprived of his or her citizenship. It may however be prescribed that children under the age of eighteen shall have the same nationality as their parents or as one parent; Article 25 For foreign nationals within the Realm, special limitations may be introduced to the following rights and freedoms: 1. Freedom of expression, freedom of information, freedom of assembly, freedom to demonstrate, freedom of association and freedom of worship (Article 1, paragraph one); 2. Protection against coercion to divulge an opinion (Article 2, sentence one); 3. Protection against physical violations also in cases other than cases under Articles 4 and 5, against body searches, house searches and other such invasions of privacy, against violations of confidential items of mail or communications and otherwise against violations involving surveillance and monitoring of the individual’s personal circumstances (Article 6); 4. Protection against deprivation of liberty (Article 8, sentence one); 5. The right to have a deprivation of liberty other than a deprivation of liberty on account of a criminal act or on suspicion of having committed such an act examined before a court of law (Article 9, paragraphs two and three); 6. Public court proceedings (Article 11, paragraph two, sentence two); 7. Authors’, artists’ and photographers’ rights to their works (Article 16); 8. the right to trade or practise a profession (Article 17); 9. The right to freedom of research (Article 18, paragraph two); and 10. Protection against violations on grounds of an opinion (Article 21, sentence three). The provisions of Article 22, paragraph one, paragraph two, sentence one and paragraph three shall apply with respect to the special limitations referred to in paragraph one.</span></p><span data-dcnode-id="2982" instrument_node="">
</span></div></div></li><span data-dcnode-id="2978" instrument_node="">
</span><li data-dcnode-id="2947"><div class="views-field views-field-title" data-dcnode-id="2975"><span class="field-content" data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">Kungörelse (1974:152) om beslutad ny regeringsform</span></span></div><div class="views-field views-field-field-info-url" data-dcnode-id="2958"><span class="views-label views-label-field-info-url" data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">URL: </span></span><div class="field-content" data-dcnode-id="2959"><a class="ext" data-dcnode-id="2960" data-extlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.riksdagen.se/sv/dokument-lagar/dokument/svensk-forfattningssamling/kungorelse-1974152-om-beslutad-ny-regeringsform_sfs-1974-152%23K2" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2972" instrument_node="">Kungörelse (1974:152) om beslutad ny regeringsform</span><svg aria-label="(link is external)" class="ext" data-dcnode-id="2961" focusable="false" role="img" viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg"><metadata data-dcnode-id="2966"><sfw data-dcnode-id="2967" xmlns="http://ns.adobe.com/SaveForWeb/1.0/"><slicesourcebounds bottomleftorigin="true" data-dcnode-id="2971" height="16384" width="16389" x="-8165" y="-8160"></slicesourcebounds><optimizationsettings data-dcnode-id="2968"><targetsettings data-dcnode-id="2969" fileformat="PNG24Format" targetsettingsid="0"><png24format data-dcnode-id="2970" filtered="false" interlaced="false" mattecolor="#FFFFFF" nomattecolor="false" transparency="true"></png24format></targetsettings></optimizationsettings></sfw></metadata><title data-dcnode-id="2964">(link is external)</title><path d="M48 26c-1.1 0-2 0.9-2 2v26H10V18h26c1.1 0 2-0.9 2-2s-0.9-2-2-2H8c-1.1 0-2 0.9-2 2v40c0 1.1 0.9 2 2 2h40c1.1 0 2-0.9 2-2V28C50 26.9 49.1 26 48 26z" data-dcnode-id="2963"></path><path d="M56 6H44c-1.1 0-2 0.9-2 2s0.9 2 2 2h7.2L30.6 30.6c-0.8 0.8-0.8 2 0 2.8C31 33.8 31.5 34 32 34s1-0.2 1.4-0.6L54 12.8V20c0 1.1 0.9 2 2 2s2-0.9 2-2V8C58 6.9 57.1 6 56 6z" data-dcnode-id="2962"></path></svg></a></div></div><div class="views-field views-field-field-fra-country" data-dcnode-id="2953"><span class="views-label views-label-field-fra-country" data-dcnode-id="2956"><span data-dcnode-id="2957" instrument_node="">Country: </span></span><div class="field-content" data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">Sweden</span></div></div><div class="views-field views-field-field-info-body" data-dcnode-id="2948"><div class="field-content" data-dcnode-id="2949"><p data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">2 kapitlet - Grundläggande fri- och rättigheter: 7 § Ingen svensk medborgare får landsförvisas eller hindras att resa in i riket. Ingen svensk medborgare som är eller har varit bosatt i riket får fråntas sitt medborgarskap. Det får dock föreskrivas att barn under arton år i fråga om sitt medborgarskap ska följa föräldrarna eller en av dem; 25 § För andra än svenska medborgare här i riket får särskilda begränsningar göras genom lag i fråga om följande fri- och rättigheter: 1. Yttrandefriheten, informationsfriheten, mötesfriheten, demonstrationsfriheten, föreningsfriheten och religionsfriheten (1 § första stycket), 2. Skyddet mot tvång att ge till känna åskådning (2 § första meningen), 3. Skyddet mot kroppsligt ingrepp även i annat fall än som avses i 4 och 5 §§, mot kroppsvisitation, husrannsakan och liknande intrång, mot intrång i förtroliga försändelser och meddelanden samt i övrigt mot intrång som innebär övervakning och kartläggning av den enskildes personliga förhållanden (6 §), 4. Skyddet mot frihetsberövande (8 § första meningen), 5. Rätten till domstolsprövning av frihetsberövande av annan anledning än brott eller misstanke om brott (9 § andra och tredje styckena), 6. Offentligheten vid domstolsförhandling (11 § andra stycket andra meningen), 7. Författares, konstnärers och fotografers rätt till sina verk (16 §), 8. Rätten att driva näring eller utöva yrke (17 §), 9. skyddet för forskningens frihet (18 § andra stycket), och 10. Skyddet mot ingrepp på grund av åskådning (21 § tredje meningen). På sådana föreskrifter om särskilda begränsningar som avses i första stycket ska 22 § första stycket, andra stycket första meningen samt tredje stycket tillämpas. Lag (2010:1408).</span></p><span data-dcnode-id="2950" instrument_node="">
</span></div></div></li><span data-dcnode-id="2946" instrument_node="">
</span><li data-dcnode-id="2915"><div class="views-field views-field-title" data-dcnode-id="2943"><span class="field-content" data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">Constitutión Española</span></span></div><div class="views-field views-field-field-info-url" data-dcnode-id="2926"><span class="views-label views-label-field-info-url" data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node="">URL: </span></span><div class="field-content" data-dcnode-id="2927"><a class="ext" data-dcnode-id="2928" data-extlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.senado.es/web/conocersenado/normas/constitucion/index.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2940" instrument_node="">Constitutión Española</span><svg aria-label="(link is external)" class="ext" data-dcnode-id="2929" focusable="false" role="img" viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg"><metadata data-dcnode-id="2934"><sfw data-dcnode-id="2935" xmlns="http://ns.adobe.com/SaveForWeb/1.0/"><slicesourcebounds bottomleftorigin="true" data-dcnode-id="2939" height="16384" width="16389" x="-8165" y="-8160"></slicesourcebounds><optimizationsettings data-dcnode-id="2936"><targetsettings data-dcnode-id="2937" fileformat="PNG24Format" targetsettingsid="0"><png24format data-dcnode-id="2938" filtered="false" interlaced="false" mattecolor="#FFFFFF" nomattecolor="false" transparency="true"></png24format></targetsettings></optimizationsettings></sfw></metadata><title data-dcnode-id="2932">(link is external)</title><path d="M48 26c-1.1 0-2 0.9-2 2v26H10V18h26c1.1 0 2-0.9 2-2s-0.9-2-2-2H8c-1.1 0-2 0.9-2 2v40c0 1.1 0.9 2 2 2h40c1.1 0 2-0.9 2-2V28C50 26.9 49.1 26 48 26z" data-dcnode-id="2931"></path><path d="M56 6H44c-1.1 0-2 0.9-2 2s0.9 2 2 2h7.2L30.6 30.6c-0.8 0.8-0.8 2 0 2.8C31 33.8 31.5 34 32 34s1-0.2 1.4-0.6L54 12.8V20c0 1.1 0.9 2 2 2s2-0.9 2-2V8C58 6.9 57.1 6 56 6z" data-dcnode-id="2930"></path></svg></a></div></div><div class="views-field views-field-field-fra-country" data-dcnode-id="2921"><span class="views-label views-label-field-fra-country" data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">Country: </span></span><div class="field-content" data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">Spain</span></div></div><div class="views-field views-field-field-info-body" data-dcnode-id="2916"><div class="field-content" data-dcnode-id="2917"><p data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">Artículo 13 1. Los extranjeros gozarán en España de las libertades públicas que garantiza el presente Título en los términos que establezcan los tratados y la ley. 2*. Solamente los españoles serán titulares de los derechos reconocidos en el artículo 23, salvo lo que, atendiendo a criterios de reciprocidad, pueda establecerse por tratado o ley para el derecho de sufragio activo y pasivo en las elecciones municipales. *Redactado conforme a la reforma del artículo 13, apartado 2, de la Constitución Española, de 27 de agosto de 1992. 3. La extradición sólo se concederá en cumplimiento de un tratado o de la ley, atendiendo al principio de reciprocidad. Quedan excluidos de la extradición los delitos políticos, no considerándose como tales los actos de terrorismo. 4. La ley establecerá los términos en que los ciudadanos de otros paises y los apátridas podrán gozar del derecho de asilo en España.</span></p><span data-dcnode-id="2918" instrument_node="">
</span></div></div></li><span data-dcnode-id="2914" instrument_node="">
</span><li data-dcnode-id="2883"><div class="views-field views-field-title" data-dcnode-id="2911"><span class="field-content" data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">Constitution of the Kingdom of Spain</span></span></div><div class="views-field views-field-field-info-url" data-dcnode-id="2894"><span class="views-label views-label-field-info-url" data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">URL: </span></span><div class="field-content" data-dcnode-id="2895"><a class="ext" data-dcnode-id="2896" data-extlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.boe.es/legislacion/documentos/ConstitucionINGLES.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2908" instrument_node="">Constitution of the Kingdom of Spain</span><svg aria-label="(link is external)" class="ext" data-dcnode-id="2897" focusable="false" role="img" viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg"><metadata data-dcnode-id="2902"><sfw data-dcnode-id="2903" xmlns="http://ns.adobe.com/SaveForWeb/1.0/"><slicesourcebounds bottomleftorigin="true" data-dcnode-id="2907" height="16384" width="16389" x="-8165" y="-8160"></slicesourcebounds><optimizationsettings data-dcnode-id="2904"><targetsettings data-dcnode-id="2905" fileformat="PNG24Format" targetsettingsid="0"><png24format data-dcnode-id="2906" filtered="false" interlaced="false" mattecolor="#FFFFFF" nomattecolor="false" transparency="true"></png24format></targetsettings></optimizationsettings></sfw></metadata><title data-dcnode-id="2900">(link is external)</title><path d="M48 26c-1.1 0-2 0.9-2 2v26H10V18h26c1.1 0 2-0.9 2-2s-0.9-2-2-2H8c-1.1 0-2 0.9-2 2v40c0 1.1 0.9 2 2 2h40c1.1 0 2-0.9 2-2V28C50 26.9 49.1 26 48 26z" data-dcnode-id="2899"></path><path d="M56 6H44c-1.1 0-2 0.9-2 2s0.9 2 2 2h7.2L30.6 30.6c-0.8 0.8-0.8 2 0 2.8C31 33.8 31.5 34 32 34s1-0.2 1.4-0.6L54 12.8V20c0 1.1 0.9 2 2 2s2-0.9 2-2V8C58 6.9 57.1 6 56 6z" data-dcnode-id="2898"></path></svg></a></div></div><div class="views-field views-field-field-fra-country" data-dcnode-id="2889"><span class="views-label views-label-field-fra-country" data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">Country: </span></span><div class="field-content" data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">Spain</span></div></div><div class="views-field views-field-field-info-body" data-dcnode-id="2884"><div class="field-content" data-dcnode-id="2885"><p data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">Section 13 (1) Aliens in Spain shall enjoy the public freedoms guaranteed by the present Part, under the terms to be laid down by treaties and the law. (2) Only Spaniards shall have the rights recognized in section 23, except in cases which may be established by treaty or by law concerning the right to vote and the right to be elected in municipal elections, and subject to the principle of reciprocity. (This text includes the first constitutional reform adopted on 27/08/1992; it just added the words "and the right to be elected" to the paragraph). (3) Extradition shall be granted only in compliance with a treaty or with the law, on reciprocal basis. No extradition can be granted for political crimes; but acts of terrorism shall not be regarded as such. (4) The law shall lay down the terms under which citizens from other countries and stateless persons may enjoy the right to asylum in Spain.</span></p><span data-dcnode-id="2886" instrument_node="">
</span></div></div></li><span data-dcnode-id="2882" instrument_node="">

field views-field-field-fra-country" data-dcnode-id="2697"><span class="views-label views-label-field-fra-country" data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">Country: </span></span><div class="field-content" data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">Romania</span></div></div><div class="views-field views-field-field-info-body" data-dcnode-id="2692"><div class="field-content" data-dcnode-id="2693"><p data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">Article 18(1) Aliens and stateless persons living in Romania shall enjoy general protection of persons and assets, as guaranteed by the Constitution and other laws. (2) The right of asylum shall be granted and withdrawn under the provisions of the law, in compliance with the international treaties and conventions Romania is a party to.</span></p><span data-dcnode-id="2694" instrument_node="">

</span><li data-dcnode-id="2659"><div class="views-field views-field-title" data-dcnode-id="2687"><span class="field-content" data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">Constituição da República Portuguesa</span></span></div><div class="views-field views-field-field-info-url" data-dcnode-id="2670"><span class="views-label views-label-field-info-url" data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">URL: </span></span><div class="field-content" data-dcnode-id="2671"><a class="ext" data-dcnode-id="2672" data-extlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.parlamento.pt/Legislacao/Paginas/ConstituicaoRepublicaPortuguesa.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2684" instrument_node="">Constituição da República Portuguesa</span><svg aria-label="(link is external)" class="ext" data-dcnode-id="2673" focusable="false" role="img" viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg"><metadata data-dcnode-id="2678"><sfw data-dcnode-id="2679" xmlns="http://ns.adobe.com/SaveForWeb/1.0/"><slicesourcebounds bottomleftorigin="true" data-dcnode-id="2683" height="16384" width="16389" x="-8165" y="-8160"></slicesourcebounds><optimizationsettings data-dcnode-id="2680"><targetsettings data-dcnode-id="2681" fileformat="PNG24Format" targetsettingsid="0"><png24format data-dcnode-id="2682" filtered="false" interlaced="false" mattecolor="#FFFFFF" nomattecolor="false" transparency="true"></png24format></targetsettings></optimizationsettings></sfw></metadata><title data-dcnode-id="2676">(link is external)</title><path d="M48 26c-1.1 0-2 0.9-2 2v26H10V18h26c1.1 0 2-0.9 2-2s-0.9-2-2-2H8c-1.1 0-2 0.9-2 2v40c0 1.1 0.9 2 2 2h40c1.1 0 2-0.9 2-2V28C50 26.9 49.1 26 48 26z" data-dcnode-id="2675"></path><path d="M56 6H44c-1.1 0-2 0.9-2 2s0.9 2 2 2h7.2L30.6 30.6c-0.8 0.8-0.8 2 0 2.8C31 33.8 31.5 34 32 34s1-0.2 1.4-0.6L54 12.8V20c0 1.1 0.9 2 2 2s2-0.9 2-2V8C58 6.9 57.1 6 56 6z" data-dcnode-id="2674"></path></svg></a></div></div><div class="views-field views-field-field-fra-country" data-dcnode-id="2665"><span class="views-label views-label-field-fra-country" data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">Country: </span></span><div class="field-content" data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">Portugal</span></div></div><div class="views-field views-field-field-info-body" data-dcnode-id="2660"><div class="field-content" data-dcnode-id="2661"><p data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">Artigo 33.º (Expulsão, extradição e direito de asilo) 1. Não é admitida a expulsão de cidadãos portugueses do território nacional. 2. A expulsão de quem tenha entrado ou permaneça regularmente no território nacional, de quem tenha obtido autorização de residência, ou de quem tenha apresentado pedido de asilo não recusado só pode ser determinada por autoridade judicial, assegurando a lei formas expeditas de decisão. 3. A extradição de cidadãos portugueses do território nacional só é admitida, em condições de reciprocidade estabelecidas em convenção internacional, nos casos de terrorismo e de criminalidade internacional organizada, e desde que a ordem jurídica do Estado requisitante consagre garantias de um processo justo e equitativo. 4. Só é admitida a extradição por crimes a que corresponda, segundo o direito do Estado requisitante, pena ou medida de segurança privativa ou restritiva da liberdade com carácter perpétuo ou de duração indefinida, se, nesse domínio, o Estado requisitante for parte de convenção internacional a que Portugal esteja vinculado e oferecer garantias de que tal pena ou medida de segurança não será aplicada ou executada. 5. O disposto nos números anteriores não prejudica a aplicação das normas de cooperação judiciária penal estabelecidas no âmbito da União Europeia. 6. Não é admitida a extradição, nem a entrega a qualquer título, por motivos políticos ou por crimes a que corresponda, segundo o direito do Estado requisitante, pena de morte ou outra de que resulte lesão irreversível da integridade física. 7. A extradição só pode ser determinada por autoridade judicial. 8. É garantido o direito de asilo aos estrangeiros e aos apátridas perseguidos ou gravemente ameaçados de perseguição, em consequência da sua actividade em favor da democracia, da libertação social e nacional, da paz entre os povos, da liberdade e dos direitos da pessoa humana. 9. A lei define o estatuto do refugiado político.</span></p><span data-dcnode-id="2662" instrument_node="">
</span></div></div></li><span data-dcnode-id="2658" instrument_node="">
</span><li data-dcnode-id="2627"><div class="views-field views-field-title" data-dcnode-id="2655"><span class="field-content" data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">Constitution of the Portuguese Republic</span></span></div><div class="views-field views-field-field-info-url" data-dcnode-id="2638"><span class="views-label views-label-field-info-url" data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">URL: </span></span><div class="field-content" data-dcnode-id="2639"><a class="ext" data-dcnode-id="2640" data-extlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.en.parlamento.pt/Legislation/CRP/Constitution7th.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2652" instrument_node="">Constitution of the Portuguese Republic</span><svg aria-label="(link is external)" class="ext" data-dcnode-id="2641" focusable="false" role="img" viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg"><metadata data-dcnode-id="2646"><sfw data-dcnode-id="2647" xmlns="http://ns.adobe.com/SaveForWeb/1.0/"><slicesourcebounds bottomleftorigin="true" data-dcnode-id="2651" height="16384" width="16389" x="-8165" y="-8160"></slicesourcebounds><optimizationsettings data-dcnode-id="2648"><targetsettings data-dcnode-id="2649" fileformat="PNG24Format" targetsettingsid="0"><png24format data-dcnode-id="2650" filtered="false" interlaced="false" mattecolor="#FFFFFF" nomattecolor="false" transparency="true"></png24format></targetsettings></optimizationsettings></sfw></metadata><title data-dcnode-id="2644">(link is external)</title><path d="M48 26c-1.1 0-2 0.9-2 2v26H10V18h26c1.1 0 2-0.9 2-2s-0.9-2-2-2H8c-1.1 0-2 0.9-2 2v40c0 1.1 0.9 2 2 2h40c1.1 0 2-0.9 2-2V28C50 26.9 49.1 26 48 26z" data-dcnode-id="2643"></path><path d="M56 6H44c-1.1 0-2 0.9-2 2s0.9 2 2 2h7.2L30.6 30.6c-0.8 0.8-0.8 2 0 2.8C31 33.8 31.5 34 32 34s1-0.2 1.4-0.6L54 12.8V20c0 1.1 0.9 2 2 2s2-0.9 2-2V8C58 6.9 57.1 6 56 6z" data-dcnode-id="2642"></path></svg></a></div></div><div class="views-field views-field-field-fra-country" data-dcnode-id="2633"><span class="views-label views-label-field-fra-country" data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">Country: </span></span><div class="field-content" data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">Portugal</span></div></div><div class="views-field views-field-field-info-body" data-dcnode-id="2628"><div class="field-content" data-dcnode-id="2629"><p data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">Article 33 (Deportation, extradition and right of asylum) (1) The deportation of Portuguese citizens from Portuguese territory is not permitted. (2) Deportation of anyone who properly entered or is properly remaining in Portuguese territory, has been granted a residence permit or has submitted a request for asylum that has not been refused may only be ordered by a judicial authority. The law shall assure expedite forms of decision in such cases. (3) The extradition of Portuguese citizens from Portuguese territory is only permissible where an international convention has established reciprocal extradition arrangements, in cases of terrorism or international organised crime, and on condition that the applicant state’s legal system enshrines guarantees of just and fair proceedings. (4) Extradition for crimes that are punishable under the applicant state’s law by a sentence or security measure which deprives or restricts freedom in perpetuity or for an undefined duration, is only permissible if the applicant state is a party to an international convention in this domain to which Portugal is bound, and offers guarantees that such a sentence or security measure will not be applied or executed. (5) The provisions of the previous paragraphs do not prejudice the application of the norms governing judicial cooperation in the criminal field that are laid down within the scope of the European Union. (6) The extradition or handing over of a person under any circumstances for political reasons, or for crimes which are punishable under the applicant state’s law by death or by any other sentence that results in irreversible damage to physical integrity, is not permitted. (7) Extradition may only be ordered by a judicial authority. (8) The right of asylum is guaranteed to foreigners and stateless persons who are the object, or are under grave threat, of persecution as a result of their activities in favour of democracy, social and national liberation, peace among peoples, freedom or the rights of the human person. (9) The law shall define the status of political refugee.</span></p><span data-dcnode-id="2630" instrument_node="">
</span></div></div></li><span data-dcnode-id="2626" instrument_node="">

</span><li data-dcnode-id="2370"><div class="views-field views-field-title" data-dcnode-id="2408"><span class="field-content" data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">Directive 2011/95/EU of the European Parliament and of the Council of 13 December 2011 on standards for the qualification of third-country nationals or stateless persons as beneficiaries of international protection, for a uniform status for refugees or...</span></span></div><div class="views-field views-field-field-info-url" data-dcnode-id="2402"><span class="views-label views-label-field-info-url" data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">URL: </span></span><div class="field-content" data-dcnode-id="2403"><a data-dcnode-id="2404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//data.europa.eu/eli/dir/2011/95/oj"><span data-dcnode-id="2405" instrument_node="">(Directive on standards for the qualification of third-country nationals or stateless persons as beneficiaries of international protection)</span></a></div></div><div class="views-field views-field-field-info-body" data-dcnode-id="2371"><div class="field-content" data-dcnode-id="2372"><p data-dcnode-id="2374"><span data-dcnode-id="2401" instrument_node="">‘Article 2</span><br data-dcnode-id="2400"><span data-dcnode-id="2399" instrument_node="">
Definitions</span><br data-dcnode-id="2398"><span data-dcnode-id="2397" instrument_node="">
For the purposes of this Directive the following definitions shall apply:</span><br data-dcnode-id="2396"><span data-dcnode-id="2395" instrument_node="">
(a) ‘international protection’ means refugee status and subsidiary protection status as defined in points (e) and (g);</span><br data-dcnode-id="2394"><span data-dcnode-id="2393" instrument_node="">
(d) ‘refugee’ means a third-country national who, owing to a well-founded fear of being persecuted for reasons of race, religion, nationality, political opinion or membership of a particular social group, is outside the country of nationality and is unable or, owing to such fear, is unwilling to avail himself or herself of the protection of that country, or a stateless person, who, being outside of the country of former habitual residence for the same reasons as mentioned above, is unable or, owing to such fear, unwilling to return to it, and to whom Article 12 does not apply; [...]</span><br data-dcnode-id="2392"><span data-dcnode-id="2391" instrument_node="">
(e) ‘refugee status’ means the recognition by a Member State of a third-country national or a stateless person as a refugee;</span><br data-dcnode-id="2390"><span data-dcnode-id="2389" instrument_node="">
(f) ‘person eligible for subsidiary protection’ means a third-country national or a stateless person who does not qualify as a refugee but in respect of whom substantial grounds have been shown for believing that the person concerned, if returned to his or her country of origin, or in the case of a stateless person, to his or her country of former habitual residence, would face a real risk of suffering serious harm as defined in Article 15, and to whom Article 17(1) and (2) does not apply, and is unable, or, owing to such risk, unwilling to avail himself or herself of the protection of that country;</span><br data-dcnode-id="2388"><span data-dcnode-id="2387" instrument_node="">
(g) ‘subsidiary protection status’ means the recognition by a Member State of a third-country national or a stateless person as a person eligible for subsidiary protection; [...]‘</span><br data-dcnode-id="2386"><span data-dcnode-id="2385" instrument_node="">
‘Article 13</span><br data-dcnode-id="2384"><span data-dcnode-id="2383" instrument_node="">
Granting of refugee status</span><br data-dcnode-id="2382"><span data-dcnode-id="2381" instrument_node="">
Member States shall grant refugee status to a third-country national or a stateless person who qualifies as a refugee in accordance with Chapters II and III.‘</span><br data-dcnode-id="2380"><span data-dcnode-id="2379" instrument_node="">
‘Article 18</span><br data-dcnode-id="2378"><span data-dcnode-id="2377" instrument_node="">
Granting of subsidiary protection status</span><br data-dcnode-id="2376"><span data-dcnode-id="2375" instrument_node="">
Member States shall grant subsidiary protection status to a third-country national or a stateless person eligible for subsidiary protection in accordance with Chapters II and V.‘</span></p><span data-dcnode-id="2373" instrument_node="">
</span></div></div></li><span data-dcnode-id="2369" instrument_node="">
</span><li data-dcnode-id="2306"><div class="views-field views-field-title" data-dcnode-id="2366"><span class="field-content" data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">Directive 2013/32/EU of the European Parliament and of the Council of 26 June 2013 on common procedures for granting and withdrawing international protection</span></span></div><div class="views-field views-field-field-info-url" data-dcnode-id="2360"><span class="views-label views-label-field-info-url" data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">URL: </span></span><div class="field-content" data-dcnode-id="2361"><a data-dcnode-id="2362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//data.europa.eu/eli/dir/2013/32/oj"><span data-dcnode-id="2363" instrument_node="">(Asylum Procedures Directive)</span></a></div></div><div class="views-field views-field-field-info-body" data-dcnode-id="2307"><div class="field-content" data-dcnode-id="2308"><p data-dcnode-id="2310"><span data-dcnode-id="2359" instrument_node="">Preamble:</span><br data-dcnode-id="2358"><span data-dcnode-id="2357" instrument_node="">
‘(12) The main objective of this Directive is to further develop the standards for procedures in Member States for granting and withdrawing international protection with a view to establishing a common asylum procedure in the Union.</span><br data-dcnode-id="2356"><span data-dcnode-id="2355" instrument_node="">
‘(15) With respect to the treatment of persons falling within the scope of this Directive, Member States are bound by obligations under instruments of international law to which they are party.</span><br data-dcnode-id="2354"><span data-dcnode-id="2353" instrument_node="">
‘(16) It is essential that decisions on all applications for international protection be taken on the basis of the facts and, in the first instance, by authorities whose personnel has the appropriate knowledge or has received the necessary training in the field of international protection.</span><br data-dcnode-id="2352"><span data-dcnode-id="2351" instrument_node="">
‘(17) In order to ensure that applications for international protection are examined and decisions thereon are taken objectively and impartially, it is necessary that professionals acting in the framework of the procedures provided for in this Directive perform their activities with due respect for the applicable deontological principles.</span><br data-dcnode-id="2350"><span data-dcnode-id="2349" instrument_node="">
‘(18) It is in the interests of both Member States and applicants for international protection that a decision is made as soon as possible on applications for international protection, without prejudice to an adequate and complete examination being carried out.‘</span><br data-dcnode-id="2348"><span data-dcnode-id="2347" instrument_node="">
Article 1 - Purpose</span><br data-dcnode-id="2346"><span data-dcnode-id="2345" instrument_node="">
The purpose of this Directive is to establish common procedures for granting and withdrawing international protection pursuant to Directive 2011/95/EU.</span><br data-dcnode-id="2344"><span data-dcnode-id="2343" instrument_node="">
Article 2 - Definitions</span><br data-dcnode-id="2342"><span data-dcnode-id="2341" instrument_node="">
For the purposes of this Directive:</span><br data-dcnode-id="2340"><span data-dcnode-id="2339" instrument_node="">
‘(a) ‘Geneva Convention’ means the Convention of 28 July 1951 Relating to the Status of Refugees, as amended by the New York Protocol of 31 January 1967;</span><br data-dcnode-id="2338"><span data-dcnode-id="2337" instrument_node="">
(b) ‘application for international protection’ or ‘application’ means a request made by a third- country national or a stateless person for protection from a Member State, who can be understood to seek refugee status or subsidiary protection status, and who does not explicitly request another kind of protection outside the scope of Directive 2011/95/EU, that can be applied for separately; [...]</span><br data-dcnode-id="2336"><span data-dcnode-id="2335" instrument_node="">
(i) ‘international protection’ means refugee status and subsidiary protection status as defined in points (j) and (k);</span><br data-dcnode-id="2334"><span data-dcnode-id="2333" instrument_node="">
(j) ‘refugee status’ means the recognition by a Member State of a third-country national or a stateless person as a refugee;</span><br data-dcnode-id="2332"><span data-dcnode-id="2331" instrument_node="">
(k) ‘subsidiary protection status’ means the recognition by a Member State of a third-country national or a stateless person as a person eligible for subsidiary protection; [...].‘</span><br data-dcnode-id="2330"><span data-dcnode-id="2329" instrument_node="">
Article 10 - Requirements for the examination of applications</span><br data-dcnode-id="2328"><span data-dcnode-id="2327" instrument_node="">
‘1.   Member States shall ensure that applications for international protection are neither rejected nor excluded from examination on the sole ground that they have not been made as soon as possible.</span><br data-dcnode-id="2326"><span data-dcnode-id="2325" instrument_node="">
2.   When examining applications for international protection, the determining authority shall first determine whether the applicants qualify as refugees and, if not, determine whether the applicants are eligible for subsidiary protection.</span><br data-dcnode-id="2324"><span data-dcnode-id="2323" instrument_node="">
3.   Member States shall ensure that decisions by the determining authority on applications for international protection are taken after an appropriate examination. To that end, Member States shall ensure that:</span><br data-dcnode-id="2322"><span data-dcnode-id="2321" instrument_node="">
(a) applications are examined and decisions are taken individually, objectively and impartially;</span><br data-dcnode-id="2320"><span data-dcnode-id="2319" instrument_node="">
(b) precise and up-to-date information is obtained from various sources, such as EASO and UNHCR and relevant international human rights organisations, as to the general situation prevailing in the countries of origin of applicants and, where necessary, in countries through which they have transited, and that such information is made available to the personnel responsible for examining applications and taking decisions;</span><br data-dcnode-id="2318"><span data-dcnode-id="2317" instrument_node="">
(c) the personnel examining applications and taking decisions know the relevant standards applicable in the field of asylum and refugee law;</span><br data-dcnode-id="2316"><span data-dcnode-id="2315" instrument_node="">
(d) the personnel examining applications and taking decisions have the possibility to seek advice, whenever necessary, from experts on particular issues, such as medical, cultural, religious, child-related or gender issues.</span><br data-dcnode-id="2314"><span data-dcnode-id="2313" instrument_node="">
4.   The authorities referred to in Chapter V shall, through the determining authority or the applicant or otherwise, have access to the general information referred to in paragraph 3(b), necessary for the fulfilment of their task.</span><br data-dcnode-id="2312"><span data-dcnode-id="2311" instrument_node="">
5.   Member States shall provide for rules concerning the translation of documents relevant for the examination of applications.‘</span></p><span data-dcnode-id="2309" instrument_node="">
</span></div></div></li><span data-dcnode-id="2305" instrument_node="">
</span><li data-dcnode-id="2293"><div class="views-field views-field-title" data-dcnode-id="2302"><span class="field-content" data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">Directive 2013/33/EU of the European Parliament and of the Council of 26 June 2013 laying down standards for the reception of applicants for international protection</span></span></div><div class="views-field views-field-field-info-url" data-dcnode-id="2296"><span class="views-label views-label-field-info-url" data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">URL: </span></span><div class="field-content" data-dcnode-id="2297"><a data-dcnode-id="2298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//data.europa.eu/eli/dir/2013/33/oj"><span data-dcnode-id="2299" instrument_node="">(Reception Conditions Directive)</span></a></div></div><div class="views-field views-field-field-info-body" data-dcnode-id="2294"><div class="field-content" data-dcnode-id="2295"></div></div></li><span data-dcnode-id="2292" instrument_node="">
</span><li data-dcnode-id="2267"><div class="views-field views-field-title" data-dcnode-id="2289"><span class="field-content" data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">Regulation (EU) No 604/2013 of the European Parliament and of the Council of 26 June 2013 establishing the criteria and mechanisms for determining the Member State responsible for examining an application for international protection lodged in one of t...</span></span></div><div class="views-field views-field-field-info-url" data-dcnode-id="2283"><span class="views-label views-label-field-info-url" data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">URL: </span></span><div class="field-content" data-dcnode-id="2284"><a data-dcnode-id="2285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//data.europa.eu/eli/reg/2013/604/oj"><span data-dcnode-id="2286" instrument_node="">(Dublin III Regulation)</span></a></div></div><div class="views-field views-field-field-info-body" data-dcnode-id="2268"><div class="field-content" data-dcnode-id="2269"><p data-dcnode-id="2271"><span data-dcnode-id="2282" instrument_node="">Article 3- Access to the procedure for examining an application for international protection</span><br data-dcnode-id="2281"><span data-dcnode-id="2280" instrument_node="">
‘1.   Member States shall examine any application for international protection by a third-country national or a stateless person who applies on the territory of any one of them, including at the border or in the transit zones. The application shall be examined by a single Member State, which shall be the one which the criteria set out in Chapter III indicate is responsible.</span><br data-dcnode-id="2279"><span data-dcnode-id="2278" instrument_node="">
2.   Where no Member State responsible can be designated on the basis of the criteria listed in this Regulation, the first Member State in which the application for international protection was lodged shall be responsible for examining it.</span><br data-dcnode-id="2277"><span data-dcnode-id="2276" instrument_node="">
Where it is impossible to transfer an applicant to the Member State primarily designated as responsible because there are substantial grounds for believing that there are systemic flaws in the asylum procedure and in the reception conditions for applicants in that Member State, resulting in a risk of inhuman or degrading treatment within the meaning of Article 4 of the Charter of Fundamental Rights of the European Union, the determining Member State shall continue to examine the criteria set out in Chapter III in order to establish whether another Member State can be designated as responsible.</span><br data-dcnode-id="2275"><span data-dcnode-id="2274" instrument_node="">
Where the transfer cannot be made pursuant to this paragraph to any Member State designated on the basis of the criteria set out in Chapter III or to the first Member State with which the application was lodged, the determining Member State shall become the Member State responsible.</span><br data-dcnode-id="2273"><span data-dcnode-id="2272" instrument_node="">
3.   Any Member State shall retain the right to send an applicant to a safe third country, subject to the rules and safeguards laid down in Directive 2013/32/EU.‘</span></p><span data-dcnode-id="2270" instrument_node="">
</span></div></div></li><span data-dcnode-id="2266" instrument_node="">

</span><div class="field-item" data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">FRA’s Fundamental Rights Report 2021 reviews major developments in the field in 2020, identifying both achievements and areas of concern. It also presents FRA’s opinions on these developments, including a synopsis of the evidence supporting these opinions. This year’s focus chapter explores the impact of the COVID-19 pandemic on fundamental rights. The remaining chapters cover: the EU Charter of Fundamental Rights; equality and non-discrimination; racism, xenophobia and related intolerance; Roma equality and inclusion; asylum, borders and migration; information society, privacy and data protection; rights of the child; access to justice; and the implementation of the Convention on the Rights of Persons with Disabilities.</span></div><span data-dcnode-id="1184" instrument_node="">

</span><div class="field-item" data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">In 2020 (until 15 December), the International Organization for Migration estimated that about 1,054 people have died or gone missing while crossing the Mediterranean Sea to reach Europe to escape war or persecution or to pursue a better life.  This is an average of almost three people per day. In the past years, a significant number of migrants in distress at sea have been rescued by civil society vessels deployed with a humanitarian mandate to reduce fatalities and bring rescued migrants to safety. Since 2018, however, national authorities initiated some 50 administrative and criminal proceedings against crew members or vessels, also seizing the latter. In some cases, rescue vessels were blocked in harbours due to flag issues or the inability to meet maritime safety-related and other technical requirements. </span></div><span data-dcnode-id="889" instrument_node="">

</span><div class="field-item" data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">The European Convention on Human Rights and European Union law provide an increasingly important framework for the protection of the rights of foreigners. European Union legislation relating to asylum, borders and immigration is developing fast. There is an impressive body of case law by the European Court of Human Rights relating in particular to Articles 3, 5, 8 and 13 of the ECHR. The Court of Justice of the European Union is increasingly asked to pronounce on the interpretation of European Union law provisions in this field. The third edition of this handbook, updated up to July 2020, presents this European Union legislation and the body of case law by the two European courts in an accessible way.</span></div><span data-dcnode-id="783" instrument_node="">

</span><div class="field-items" data-dcnode-id="663"><span data-dcnode-id="667" instrument_node="">
</span><div class="field-item" data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">The EU Fundamental Rights Agency published in 2019 its report on the ‘Integration of young refugees in the EU’. The report explored the challenges of young people who fled armed conflict or persecution and arrived in the EU in 2015 and 2016. The report is based on 426 interviews with experts working in the area of asylum and integration, as well as 163 interviews with young people, aged 16 to 24, conducted between October 2017 and June 2018 in 15 regions and cities located in six Member States: Austria, France, Germany, Greece, Italy and Sweden. The links on this page provide a summary of the information collected during this period for each country about unaccompanied children turning 18 and the change in people’s legal status once international protection is granted. These two issues had at the time been identified as moments requiring sufficient, consistent and systematic support, particularly from lawyers, social workers and guardians, to ensure successful integration.</span></div><span data-dcnode-id="664" instrument_node="">
