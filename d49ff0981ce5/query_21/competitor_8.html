</span><section class="headline grid--lg" data-dcnode-id="510"><span data-dcnode-id="521" instrument_node="">
</span><strong class="h1 headline__type" data-dcnode-id="520"></strong><span data-dcnode-id="519" instrument_node="">
</span><h1 class="headline__title h2" data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">United Nations Binding Treaty on Business and Human Rights</span></h1><span data-dcnode-id="516" instrument_node="">
</span><small data-dcnode-id="512"><time class="headline__date" data-dcnode-id="514" datetime="2017-10-10"><span data-dcnode-id="515" instrument_node="">October 10, 2017</span></time><span data-dcnode-id="513" instrument_node=""> </span></small><span data-dcnode-id="511" instrument_node="">
</span></section><span data-dcnode-id="509" instrument_node="">
</span><section class="grid blockContent__wrapper wrapper" data-dcnode-id="258"><span data-dcnode-id="508" instrument_node="">
</span><div class="cs--12 clg--5" data-dcnode-id="492"><span data-dcnode-id="507" instrument_node="">
</span><div class="blockImage objectFitContainer" data-dcnode-id="494"><span data-dcnode-id="506" instrument_node="">
</span><picture class="objectfit--cover" data-dcnode-id="496"><span data-dcnode-id="505" instrument_node="">
</span><source data-dcnode-id="504" media="(min-width: 1024px)" srcset="https://left.eu/content/uploads/2017/10/video_still_1.png"><span data-dcnode-id="503" instrument_node="">
</span><source data-dcnode-id="502" media="(min-width: 786px)" srcset="https://left.eu/content/uploads/2017/10/video_still_1-1000x568.png"><span data-dcnode-id="501" instrument_node="">
</span><source data-dcnode-id="500" media="(min-width: 320px)" srcset="https://left.eu/content/uploads/2017/10/video_still_1-600x341.png"><span data-dcnode-id="499" instrument_node="">
</span><img alt="United Nations Binding Treaty on Business and Human Rights" data-dcnode-id="498" lazy-src="https://left.eu/content/uploads/2017/10/video_still_1.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//left.eu/content/uploads/2017/10/video_still_1.png&amp;raw" style="opacity: 1; width: 100%; height: 100%;"><span data-dcnode-id="497" instrument_node="">
</span></picture><span data-dcnode-id="495" instrument_node="">
</span></div><span data-dcnode-id="493" instrument_node="">
</span></div><span data-dcnode-id="491" instrument_node="">
</span><div class="c--editor cs--12 clg--6 clg--start--6 cxl--start--7 cxl--5" data-dcnode-id="305"><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">The European Union is participating in the development of a United Nations Binding Treaty on Business and Human Rights.</span></p><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">The treaty has the potential to radically improve respect for human rights in the supply chains of transnational corporations by introducing binding mechanisms to hold companies accountable under international law.</span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="483" instrument_node="">But it won’t just happen automatically. Much support is still needed from EU member states and other countries. Scroll down to find out how you can help to make it happen or </span><a data-dcnode-id="481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/watch/%3Fv%3D1616674475057969"><span data-dcnode-id="482" instrument_node="">watch the video that explains it in 2 minutes</span></a><span data-dcnode-id="480" instrument_node="">.</span></p><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="475"><strong data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">#BindingTreaty</span></strong></p><span data-dcnode-id="474" instrument_node="">
</span><h2 data-dcnode-id="471"><strong data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">What is the proposed UN treaty on transnational corporations and human rights?</span></strong></h2><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="469" instrument_node="">In 2014, the United Nations Human Rights Council appointed an </span><a data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ohchr.org/en/hrbodies/hrc/wgtranscorp/pages/igwgontnc.aspx"><span data-dcnode-id="468" instrument_node="">open-ended intergovernmental working group on transnational corporations (TNCs) and other business enterprises with respect to human rights (OEIGWG)</span></a><span data-dcnode-id="466" instrument_node="">.</span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">The working group has proposed a binding treaty to hold transnational corporations accountable for human rights abuses within their international supply chains. The group is comprised of representatives of several countries that hold seats on the Human Rights Council.</span></p><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Led by Ecuador, the treaty is in the early stages of development. The working group has so far discussed the treaty’s scope, the obligations for transnational corporations and enforcement mechanisms.</span></p><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">This ground-breaking process could lead to major changes for people around the world who experience human rights violations by transnational companies.</span></p><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">By contrast to the UN’s existing voluntary guidelines on business and human rights, the treaty would be binding under international law and would make big companies accountable for human rights abuses in their supply chains.</span></p><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Currently, court cases about human rights abuses in supply chains tend to go nowhere because the companies always find a way to move the case to another country in the supply chain/another jurisdiction, where the case must start all over again. The treaty could make it possible to sue companies that have bad practices in developing countries in the companies’ home countries (eg. suing a US company in a US court for human rights abuses in Latin America).</span></p><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">To date, EU member states on the United Nations Human Rights Council have shown minimal support for the binding treaty.</span></p><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="445" instrument_node="">Left MEPs are calling on EU member states that are represented in the Human Rights Council to support a binding treaty that would have a real impact on the lives of millions of people. The MEPs are also calling for support from parliamentarians around the world via the </span><a data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bindingtreaty.org/"><span data-dcnode-id="444" instrument_node="">Inter-parliamentary Initiative for a UN Binding Treaty</span></a><span data-dcnode-id="442" instrument_node="">.</span></p><span data-dcnode-id="440" instrument_node="">
</span><h2 data-dcnode-id="437"><strong data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">The Inter-parliamentary Initiative for a UN Binding Treaty</span></strong></h2><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">If parliamentarians from around the world put their support behind this treaty it would send a strong signal to the members of the United Nations and the Human Rights Council that the whole world wants this treaty to become a reality.</span></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="428"><span data-dcnode-id="432" instrument_node="">That is why The Left MEPs created the </span><a data-dcnode-id="430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bindingtreaty.org/"><span data-dcnode-id="431" instrument_node="">Inter-parliamentary Initiative for a UN Binding Treaty</span></a><span data-dcnode-id="429" instrument_node=""> which asks parliamentarians from around to world to show their support for a binding treaty.</span></p><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Ask your national and regional parliamentarians to sign today!</span></p><span data-dcnode-id="424" instrument_node="">
</span><h2 data-dcnode-id="421"><strong data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">How you can help to make it happen</span></strong></h2><span data-dcnode-id="420" instrument_node="">
</span><ul data-dcnode-id="409"><span data-dcnode-id="419" instrument_node="">
</span><li data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Contact your country’s representative on the UN Human Rights Council and&nbsp; ask them to support a binding (not voluntary) treaty</span></li><span data-dcnode-id="416" instrument_node="">
</span><li data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Ask your national and regional parliamentarians to sign the Inter-parliamentary Initiative for a UN Binding Treaty</span></li><span data-dcnode-id="413" instrument_node="">
</span><li data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Join the Global Campaign to Reclaim Peoples Sovereignty, Dismantle Corporate Power and Stop Impunity – https://www.stopcorporateimpunity.org/</span></li><span data-dcnode-id="410" instrument_node="">
</span></ul><span data-dcnode-id="408" instrument_node="">
</span><h2 data-dcnode-id="405"><strong data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Case study</span></strong></h2><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="401"><strong data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Chevron-Texaco vs. Ecuador</span></strong></p><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">In the early 1990s, Texaco dumped 18 billion gallons of toxic waste in the Amazon rainforest in Ecuador which polluted waterways and severely contaminated the soil, resulting in an increase in cancer rates, cultural upheaval and devastation of biodiversity.</span></p><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Since 1993, the affected communities have organised themselves and called on Texaco – and its parent company Chevron – to clean up the area and provide care for those affected.</span></p><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">In February 2011, the Ecuadorian Supreme Court ordered Chevron to pay USD$9 billion&nbsp; in compensation.</span></p><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Chevron, however, did not pay the compensation and instead took the case to the Permanent Court of Arbitration in The Hague.</span></p><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">In September 2018, the court in The Hague ruled in favour of Chevron, finding the&nbsp;Ecuadorian Court’s earlier ruling to be in violation of a bilateral investment treaty signed with the United States in 1997.</span></p><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">This case provides a clear example of how current trade policies&nbsp;enable the interests of&nbsp;transnational&nbsp;corporations&nbsp;to override the interests of people and&nbsp;sovereign&nbsp;democracy.</span></p><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">&nbsp;</span></p><span data-dcnode-id="379" instrument_node="">
