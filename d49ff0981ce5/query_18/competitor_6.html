</span><p class="indent-4" data-dcnode-id="742" data-title="208.30(e)(6)(iii)(F)"><span class="paragraph-hierarchy" data-dcnode-id="744"><span class="paren" data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">(</span></span><span data-dcnode-id="747" instrument_node="">F</span><span class="paren" data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">)</span></span></span><span data-dcnode-id="743" instrument_node=""> The Director of USCIS, or the Director's designee, determines, in the exercise of unreviewable discretion, that it is in the public interest to allow the alien to pursue a claim for asylum, withholding of removal, or protection under the Convention Against Torture, in the United States. </span></p><span data-dcnode-id="741" instrument_node="">
</span></div><span data-dcnode-id="739" instrument_node="">
</span></div><span data-dcnode-id="737" instrument_node="">
</span><div data-dcnode-id="717" id="p-208.30(e)(6)(iv)"><span data-dcnode-id="736" instrument_node="">
</span><p class="indent-3" data-dcnode-id="719" data-title="208.30(e)(6)(iv)"><span class="paragraph-hierarchy" data-dcnode-id="730"><span class="paren" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">(</span></span><span data-dcnode-id="733" instrument_node="">iv</span><span class="paren" data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">)</span></span></span><span data-dcnode-id="729" instrument_node=""> As used in </span><a class="cfr external" data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28e%29%286%29%28iii%29%28B%29"><span data-dcnode-id="728" instrument_node="">paragraphs (e)(6)(iii)(B)</span></a><span data-dcnode-id="726" instrument_node="">, </span><a class="cfr external" data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28e%29%286%29%28iii%29%28C%29"><span data-dcnode-id="725" instrument_node="">(C)</span></a><span data-dcnode-id="723" instrument_node="">, and </span><a class="cfr external" data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28e%29%286%29%28iii%29%28D%29"><span data-dcnode-id="722" instrument_node="">(D)</span></a><span data-dcnode-id="720" instrument_node=""> of this section only, “legal guardian” means a person currently vested with legal custody of such an alien or vested with legal authority to act on the alien's behalf, provided that such an alien is both unmarried and less than 18 years of age, and provided further that any dispute with respect to whether an individual is a legal guardian will be resolved on the basis of U.S. law. </span></p><span data-dcnode-id="718" instrument_node="">
</span></div><span data-dcnode-id="716" instrument_node="">
</span></div><span data-dcnode-id="714" instrument_node="">
</span><div data-dcnode-id="577" id="p-208.30(e)(7)"><span data-dcnode-id="713" instrument_node="">
</span><p class="indent-2" data-dcnode-id="690" data-title="208.30(e)(7)"><span class="paragraph-hierarchy" data-dcnode-id="707"><span class="paren" data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">(</span></span><span data-dcnode-id="710" instrument_node="">7</span><span class="paren" data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">)</span></span></span><span data-dcnode-id="706" instrument_node=""> When an immigration officer has made an initial determination that an alien, other than an alien described in </span><a class="cfr external" data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28e%29%286%29"><span data-dcnode-id="705" instrument_node="">paragraph (e)(6)</span></a><span data-dcnode-id="703" instrument_node=""> of this section and regardless of whether the alien is arriving at a port of entry, appears to be subject to the terms of an agreement authorized by section 208(a)(2)(A) of the Act, and seeks the alien's removal consistent with that provision, prior to any determination concerning whether the alien has a credible fear of persecution, reasonable possibility of persecution, or a reasonable possibility of torture, the asylum officer shall conduct a threshold screening interview to determine whether the alien is ineligible to apply for asylum in the United States and is subject to removal to a country (“receiving country”) that is a signatory to the applicable agreement authorized by section 208(a)(2)(A) of the Act, other than the U.S.-Canada Agreement effectuated in 2004. In conducting this threshold screening interview, the asylum officer shall apply all relevant interview procedures outlined in </span><a class="cfr external" data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28d%29"><span data-dcnode-id="702" instrument_node="">paragraph (d)</span></a><span data-dcnode-id="700" instrument_node=""> of this section, except that </span><a class="cfr external" data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28d%29%282%29"><span data-dcnode-id="699" instrument_node="">paragraphs (d)(2)</span></a><span data-dcnode-id="697" instrument_node=""> and </span><a class="cfr external" data-dcnode-id="695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28d%29%284%29"><span data-dcnode-id="696" instrument_node="">(4)</span></a><span data-dcnode-id="694" instrument_node=""> of this section shall not apply to aliens described in this </span><a class="cfr external" data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28e%29%287%29"><span data-dcnode-id="693" instrument_node="">paragraph (e)(7)</span></a><span data-dcnode-id="691" instrument_node="">. The asylum officer shall advise the alien of the applicable agreement's exceptions and question the alien as to applicability of any of these exceptions to the alien's case. The alien shall be provided written notice that if he or she fears removal to the prospective receiving country because of the likelihood of persecution on account of a protected ground or torture in that country and wants the officer to determine whether it is more likely than not that the alien would be persecuted on account of a protected ground or tortured in that country, the alien should affirmatively state to the officer such a fear of removal. If the alien affirmatively states such a fear, the asylum officer will determine whether the individual has demonstrated that it is more likely than not that he or she would be persecuted on account of a protected ground or tortured in that country. </span></p><span data-dcnode-id="689" instrument_node="">
</span><div data-dcnode-id="648" id="p-208.30(e)(7)(i)"><span data-dcnode-id="688" instrument_node="">
</span><p class="indent-3" data-dcnode-id="680" data-title="208.30(e)(7)(i)"><span class="paragraph-hierarchy" data-dcnode-id="682"><span class="paren" data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">(</span></span><span data-dcnode-id="685" instrument_node="">i</span><span class="paren" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">)</span></span></span><span data-dcnode-id="681" instrument_node=""> </span></p><span data-dcnode-id="679" instrument_node="">
</span><div data-dcnode-id="665" id="p-208.30(e)(7)(i)(A)"><span data-dcnode-id="678" instrument_node="">
</span><p class="indent-4" data-dcnode-id="667" data-title="208.30(e)(7)(i)(A)"><span class="paragraph-hierarchy" data-dcnode-id="672"><span class="paren" data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">(</span></span><span data-dcnode-id="675" instrument_node="">A</span><span class="paren" data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">)</span></span></span><span data-dcnode-id="671" instrument_node=""> If the asylum officer, with concurrence from a supervisory asylum officer, determines during the threshold screening interview that an alien does not qualify for an exception under the applicable agreement, and, if applicable, that the alien has not demonstrated that it is more likely than not that he or she would be persecuted on account of a protected ground or tortured in the receiving country, the alien is ineligible to apply for asylum in the United States. Subject to </span><a class="cfr external" data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28e%29%287%29%28i%29%28B%29"><span data-dcnode-id="670" instrument_node="">paragraph (e)(7)(i)(B)</span></a><span data-dcnode-id="668" instrument_node=""> of this section, after the asylum officer's documented finding is reviewed by a supervisory asylum officer, the alien shall be advised that he or she will be removed to the receiving country, as appropriate under the applicable agreement, in order to pursue his or her claims relating to a fear of persecution or torture under the law of the receiving country. Prior to removal to a receiving country under an agreement authorized by section 208(a)(2)(A), the alien shall be informed that, in the receiving country, the alien will have an opportunity to pursue the alien's claim for asylum or equivalent temporary protection. </span></p><span data-dcnode-id="666" instrument_node="">
</span></div><span data-dcnode-id="664" instrument_node="">
</span><div data-dcnode-id="650" id="p-208.30(e)(7)(i)(B)"><span data-dcnode-id="663" instrument_node="">
</span><p class="indent-4" data-dcnode-id="652" data-title="208.30(e)(7)(i)(B)"><span class="paragraph-hierarchy" data-dcnode-id="657"><span class="paren" data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">(</span></span><span data-dcnode-id="660" instrument_node="">B</span><span class="paren" data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">)</span></span></span><span data-dcnode-id="656" instrument_node=""> Aliens found ineligible to apply for asylum under this </span><a class="cfr external" data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28e%29%287%29"><span data-dcnode-id="655" instrument_node="">paragraph (e)(7)</span></a><span data-dcnode-id="653" instrument_node=""> shall be removed to the receiving country, depending on the applicable agreement, unless the alien voluntarily withdraws his or her request for asylum. </span></p><span data-dcnode-id="651" instrument_node="">
</span></div><span data-dcnode-id="649" instrument_node="">
</span></div><span data-dcnode-id="647" instrument_node="">
</span><div data-dcnode-id="630" id="p-208.30(e)(7)(ii)"><span data-dcnode-id="646" instrument_node="">
</span><p class="indent-3" data-dcnode-id="632" data-title="208.30(e)(7)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="640"><span class="paren" data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">(</span></span><span data-dcnode-id="643" instrument_node="">ii</span><span class="paren" data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">)</span></span></span><span data-dcnode-id="639" instrument_node=""> If the alien establishes by a preponderance of the evidence that he or she qualifies for an exception under the terms of the applicable agreement, or would more likely than not be persecuted on account of his or her race, religion, nationality, membership in a particular social group, or tortured, in the receiving country, the asylum officer shall make a written notation to that effect, and may then proceed to determine whether any other agreement is applicable to the alien under the procedures set forth in this </span><a class="cfr external" data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28e%29%287%29"><span data-dcnode-id="638" instrument_node="">paragraph (e)(7)</span></a><span data-dcnode-id="636" instrument_node="">. If the alien establishes by a preponderance of the evidence that he or she qualifies for an exception under the terms of each of the applicable agreements, or would more likely than not be persecuted on account of his or her race, religion, nationality, membership in a particular social group, or tortured, in each of the prospective receiving countries, the asylum officer shall make a written notation to that effect, and then proceed immediately to a determination concerning whether the alien has a credible fear of persecution, reasonable possibility of persecution, or a reasonable possibility of torture, under </span><a class="cfr external" data-dcnode-id="634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28d%29"><span data-dcnode-id="635" instrument_node="">paragraph (d)</span></a><span data-dcnode-id="633" instrument_node=""> of this section. </span></p><span data-dcnode-id="631" instrument_node="">
</span></div><span data-dcnode-id="629" instrument_node="">
</span><div data-dcnode-id="591" id="p-208.30(e)(7)(iii)"><span data-dcnode-id="628" instrument_node="">
</span><p class="indent-3" data-dcnode-id="617" data-title="208.30(e)(7)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="622"><span class="paren" data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">(</span></span><span data-dcnode-id="625" instrument_node="">iii</span><span class="paren" data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">)</span></span></span><span data-dcnode-id="621" instrument_node=""> An exception to an applicable agreement is defined under the terms of the agreement itself. Each agreement, including any exceptions, will be announced in a </span><span class="minor-caps" data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Federal Register</span></span><span data-dcnode-id="618" instrument_node=""> document. If the asylum officer determines that an alien is within one of the classes covered by a section 208(a)(2)(A) agreement, the officer shall next determine whether the alien meets any of the applicable agreement's exceptions. Regardless of whether the text of the applicable agreement provides for the following exceptions, all such agreements, by operation of section 208(a)(2)(A) of the Act, and as applicable to the United States, are deemed to contain the following provisions: </span></p><span data-dcnode-id="616" instrument_node="">
</span><div data-dcnode-id="605" id="p-208.30(e)(7)(iii)(A)"><span data-dcnode-id="615" instrument_node="">
</span><p class="indent-4" data-dcnode-id="607" data-title="208.30(e)(7)(iii)(A)"><span class="paragraph-hierarchy" data-dcnode-id="609"><span class="paren" data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">(</span></span><span data-dcnode-id="612" instrument_node="">A</span><span class="paren" data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">)</span></span></span><span data-dcnode-id="608" instrument_node=""> No alien may be removed, pursuant to an agreement authorized by section 208(a)(2)(A), to the alien's country of nationality, or, if the alien has no nationality, to the alien's country of last habitual residence; and </span></p><span data-dcnode-id="606" instrument_node="">
</span></div><span data-dcnode-id="604" instrument_node="">
</span><div data-dcnode-id="593" id="p-208.30(e)(7)(iii)(B)"><span data-dcnode-id="603" instrument_node="">
</span><p class="indent-4" data-dcnode-id="595" data-title="208.30(e)(7)(iii)(B)"><span class="paragraph-hierarchy" data-dcnode-id="597"><span class="paren" data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">(</span></span><span data-dcnode-id="600" instrument_node="">B</span><span class="paren" data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">)</span></span></span><span data-dcnode-id="596" instrument_node=""> No alien may be removed, pursuant to an agreement authorized by section 208(a)(2)(A), where the Director of USCIS, or the Director's designee, determines, in the exercise of unreviewable discretion, that it is in the public interest for the alien to receive asylum in the United States, and that the alien therefore may apply for asylum, withholding of removal, or protection under the Convention Against Torture, in the United States. </span></p><span data-dcnode-id="594" instrument_node="">
</span></div><span data-dcnode-id="592" instrument_node="">
</span></div><span data-dcnode-id="590" instrument_node="">
</span><div data-dcnode-id="579" id="p-208.30(e)(7)(iv)"><span data-dcnode-id="589" instrument_node="">
</span><p class="indent-3" data-dcnode-id="581" data-title="208.30(e)(7)(iv)"><span class="paragraph-hierarchy" data-dcnode-id="583"><span class="paren" data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">(</span></span><span data-dcnode-id="586" instrument_node="">iv</span><span class="paren" data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">)</span></span></span><span data-dcnode-id="582" instrument_node=""> If the asylum officer determines the alien meets an exception under the applicable agreement, or would more likely than not be persecuted on account of a protected ground or tortured in the prospective receiving country, the officer may consider whether the alien is subject to another agreement and its exceptions or would more likely than not be persecuted on account of a protected ground or tortured in another receiving country. If another section 208(a)(2)(A) agreement may not be applied to the alien, the officer should immediately proceed to a credible fear interview. </span></p><span data-dcnode-id="580" instrument_node="">
</span></div><span data-dcnode-id="578" instrument_node="">
</span></div><span data-dcnode-id="576" instrument_node="">
</span><div data-dcnode-id="565" id="p-208.30(e)(8)"><span data-dcnode-id="575" instrument_node="">
</span><p class="indent-2" data-dcnode-id="567" data-title="208.30(e)(8)"><span class="paragraph-hierarchy" data-dcnode-id="569"><span class="paren" data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">(</span></span><span data-dcnode-id="572" instrument_node="">8</span><span class="paren" data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">)</span></span></span><span data-dcnode-id="568" instrument_node=""> An asylum officer's determination shall not become final until reviewed by a supervisory asylum officer. </span></p><span data-dcnode-id="566" instrument_node="">
</span></div><span data-dcnode-id="564" instrument_node="">
</span></div><span data-dcnode-id="562" instrument_node="">
</span><div data-dcnode-id="515" id="p-208.30(f)"><span data-dcnode-id="561" instrument_node="">
</span><p class="indent-1" data-dcnode-id="547" data-title="208.30(f)"><span class="paragraph-hierarchy" data-dcnode-id="555"><span class="paren" data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">(</span></span><span data-dcnode-id="558" instrument_node="">f</span><span class="paren" data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">)</span></span></span><span data-dcnode-id="554" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Procedures for a positive fear determination.</span></em><span data-dcnode-id="551" instrument_node="">  If, pursuant to </span><a class="cfr external" data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28e%29"><span data-dcnode-id="550" instrument_node="">paragraph (e)</span></a><span data-dcnode-id="548" instrument_node=""> of this section, an alien stowaway or an alien subject to expedited removal establishes either a credible fear of persecution, reasonable possibility of persecution, or a reasonable possibility of torture: </span></p><span data-dcnode-id="546" instrument_node="">
</span><div data-dcnode-id="532" id="p-208.30(f)(1)"><span data-dcnode-id="545" instrument_node="">
</span><p class="indent-2" data-dcnode-id="534" data-title="208.30(f)(1)"><span class="paragraph-hierarchy" data-dcnode-id="539"><span class="paren" data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">(</span></span><span data-dcnode-id="542" instrument_node="">1</span><span class="paren" data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">)</span></span></span><span data-dcnode-id="538" instrument_node=""> DHS shall issue a Notice of Referral to Immigration Judge for asylum-and-withholding-only proceedings under </span><a class="cfr external" data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.2%23p-208.2%28c%29%281%29"><span data-dcnode-id="537" instrument_node="">8 CFR 208.2(c)(1)</span></a><span data-dcnode-id="535" instrument_node="">. </span></p><span data-dcnode-id="533" instrument_node="">
</span></div><span data-dcnode-id="531" instrument_node="">
</span><div data-dcnode-id="517" id="p-208.30(f)(2)"><span data-dcnode-id="530" instrument_node="">
</span><p class="indent-2" data-dcnode-id="519" data-title="208.30(f)(2)"><span class="paragraph-hierarchy" data-dcnode-id="524"><span class="paren" data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">(</span></span><span data-dcnode-id="527" instrument_node="">2</span><span class="paren" data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">)</span></span></span><span data-dcnode-id="523" instrument_node=""> Parole of the alien may be considered only in accordance with section 212(d)(5) of the Act and </span><a class="cfr external" data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-212.5"><span data-dcnode-id="522" instrument_node="">8 CFR 212.5</span></a><span data-dcnode-id="520" instrument_node=""> of this chapter. </span></p><span data-dcnode-id="518" instrument_node="">
</span></div><span data-dcnode-id="516" instrument_node="">
</span></div><span data-dcnode-id="514" instrument_node="">
</span><div data-dcnode-id="400" id="p-208.30(g)"><span data-dcnode-id="513" instrument_node="">
</span><p class="indent-1" data-dcnode-id="502" data-title="208.30(g)"><span class="paragraph-hierarchy" data-dcnode-id="507"><span class="paren" data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">(</span></span><span data-dcnode-id="510" instrument_node="">g</span><span class="paren" data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">)</span></span></span><span data-dcnode-id="506" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Procedures for a negative fear determination.</span></em><span data-dcnode-id="503" instrument_node=""> </span></p><span data-dcnode-id="501" instrument_node="">
</span><div data-dcnode-id="442" id="p-208.30(g)(1)"><span data-dcnode-id="500" instrument_node="">
</span><p class="indent-2" data-dcnode-id="483" data-title="208.30(g)(1)"><span class="paragraph-hierarchy" data-dcnode-id="494"><span class="paren" data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">(</span></span><span data-dcnode-id="497" instrument_node="">1</span><span class="paren" data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">)</span></span></span><span data-dcnode-id="493" instrument_node=""> If, pursuant to </span><a class="cfr external" data-dcnode-id="491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28e%29"><span data-dcnode-id="492" instrument_node="">paragraphs (e)</span></a><span data-dcnode-id="490" instrument_node=""> and </span><a class="cfr external" data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28f%29"><span data-dcnode-id="489" instrument_node="">(f)</span></a><span data-dcnode-id="487" instrument_node=""> of this section, an alien stowaway or an alien subject to expedited removal does not establish a credible fear of persecution, reasonable possibility of persecution, or reasonable possibility of torture, DHS shall provide the alien with a written notice of decision and inquire whether the alien wishes to have an immigration judge review the negative determination, in accordance with section 235(b)(1)(B)(iii)(III) of the Act and this </span><a class="cfr external" data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30"><span data-dcnode-id="486" instrument_node="">§ 208.30</span></a><span data-dcnode-id="484" instrument_node="">. The alien must indicate whether he or she desires such review on a Record of Negative Fear Finding and Request for Review by Immigration Judge. If the alien refuses to make an indication, DHS shall consider such a response as a decision to decline review. </span></p><span data-dcnode-id="482" instrument_node="">
</span><div data-dcnode-id="468" id="p-208.30(g)(1)(i)"><span data-dcnode-id="481" instrument_node="">
</span><p class="indent-3" data-dcnode-id="470" data-title="208.30(g)(1)(i)"><span class="paragraph-hierarchy" data-dcnode-id="475"><span class="paren" data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">(</span></span><span data-dcnode-id="478" instrument_node="">i</span><span class="paren" data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">)</span></span></span><span data-dcnode-id="474" instrument_node=""> If the alien requests such review, DHS shall arrange for detention of the alien and serve him or her with a Notice of Referral to Immigration Judge, for review of the negative fear determination in accordance with </span><a class="cfr external" data-dcnode-id="472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28g%29%282%29"><span data-dcnode-id="473" instrument_node="">paragraph (g)(2)</span></a><span data-dcnode-id="471" instrument_node=""> of this section. </span></p><span data-dcnode-id="469" instrument_node="">
</span></div><span data-dcnode-id="467" instrument_node="">
</span><div data-dcnode-id="456" id="p-208.30(g)(1)(ii)"><span data-dcnode-id="466" instrument_node="">
</span><p class="indent-3" data-dcnode-id="458" data-title="208.30(g)(1)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="460"><span class="paren" data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">(</span></span><span data-dcnode-id="463" instrument_node="">ii</span><span class="paren" data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">)</span></span></span><span data-dcnode-id="459" instrument_node=""> If the alien is not a stowaway and does not request a review by an immigration judge, DHS shall order the alien removed with a Notice and Order of Expedited Removal, after review by a supervisory officer. </span></p><span data-dcnode-id="457" instrument_node="">
</span></div><span data-dcnode-id="455" instrument_node="">
</span><div data-dcnode-id="444" id="p-208.30(g)(1)(iii)"><span data-dcnode-id="454" instrument_node="">
</span><p class="indent-3" data-dcnode-id="446" data-title="208.30(g)(1)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="448"><span class="paren" data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">(</span></span><span data-dcnode-id="451" instrument_node="">iii</span><span class="paren" data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">)</span></span></span><span data-dcnode-id="447" instrument_node=""> If the alien is a stowaway and the alien does not request a review by an immigration judge, DHS shall complete removal proceedings in accordance with section 235(a)(2) of the Act. </span></p><span data-dcnode-id="445" instrument_node="">
</span></div><span data-dcnode-id="443" instrument_node="">
</span></div><span data-dcnode-id="441" instrument_node="">
</span><div data-dcnode-id="402" id="p-208.30(g)(2)"><span data-dcnode-id="440" instrument_node="">
</span><p class="indent-2" data-dcnode-id="429" data-title="208.30(g)(2)"><span class="paragraph-hierarchy" data-dcnode-id="434"><span class="paren" data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">(</span></span><span data-dcnode-id="437" instrument_node="">2</span><span class="paren" data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">)</span></span></span><span data-dcnode-id="433" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Review by immigration judge of a negative fear determination.</span></em><span data-dcnode-id="430" instrument_node=""> </span></p><span data-dcnode-id="428" instrument_node="">
</span><div data-dcnode-id="414" id="p-208.30(g)(2)(i)"><span data-dcnode-id="427" instrument_node="">
</span><p class="indent-3" data-dcnode-id="416" data-title="208.30(g)(2)(i)"><span class="paragraph-hierarchy" data-dcnode-id="421"><span class="paren" data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">(</span></span><span data-dcnode-id="424" instrument_node="">i</span><span class="paren" data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">)</span></span></span><span data-dcnode-id="420" instrument_node=""> Immigration judges shall review negative fear determinations as provided in </span><a class="cfr external" data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-1208.30%23p-1208.30%28g%29"><span data-dcnode-id="419" instrument_node="">8 CFR 1208.30(g)</span></a><span data-dcnode-id="417" instrument_node="">. DHS, however, may reconsider a negative credible fear finding that has been concurred upon by an immigration judge after providing notice of its reconsideration to the immigration judge. </span></p><span data-dcnode-id="415" instrument_node="">
</span></div><span data-dcnode-id="413" instrument_node="">
</span><div data-dcnode-id="404" id="p-208.30(g)(2)(ii)"><p class="indent-3" data-dcnode-id="405" data-title="208.30(g)(2)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="407"><span class="paren" data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">(</span></span><span data-dcnode-id="410" instrument_node="">ii</span><span class="paren" data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">)</span></span></span><span data-dcnode-id="406" instrument_node=""> DHS shall provide the record of any negative fear determinations being reviewed, including copies of the Notice of Referral to Immigration Judge, the asylum officer's notes, the summary of the material facts, and other materials upon which the determination was based, to the immigration judge with the negative fear determination. </span></p></div><span data-dcnode-id="403" instrument_node="">
</span></div><span data-dcnode-id="401" instrument_node="">
</span></div><span data-dcnode-id="399" instrument_node="">
</span><p class="citation" data-dcnode-id="370"><span data-dcnode-id="398" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="396" data-reference="65 FR 76136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/65-FR-76136"><span data-dcnode-id="397" instrument_node="">65 FR 76136</span></a><span data-dcnode-id="395" instrument_node="">, Dec. 6, 2000, as amended at </span><a class="fr-reference" data-dcnode-id="393" data-reference="69 FR 69488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/69-FR-69488"><span data-dcnode-id="394" instrument_node="">69 FR 69488</span></a><span data-dcnode-id="392" instrument_node="">, Nov. 29, 2004; </span><a class="fr-reference" data-dcnode-id="390" data-reference="74 FR 55737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/74-FR-55737"><span data-dcnode-id="391" instrument_node="">74 FR 55737</span></a><span data-dcnode-id="389" instrument_node="">, Oct. 28, 2009; </span><a class="fr-reference" data-dcnode-id="387" data-reference="76 FR 53785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/76-FR-53785"><span data-dcnode-id="388" instrument_node="">76 FR 53785</span></a><span data-dcnode-id="386" instrument_node="">, Aug. 29, 2011; </span><a class="fr-reference" data-dcnode-id="384" data-reference="83 FR 55952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/83-FR-55952"><span data-dcnode-id="385" instrument_node="">83 FR 55952</span></a><span data-dcnode-id="383" instrument_node="">, Nov. 9, 2018; </span><a class="fr-reference" data-dcnode-id="381" data-reference="84 FR 33843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/84-FR-33843"><span data-dcnode-id="382" instrument_node="">84 FR 33843</span></a><span data-dcnode-id="380" instrument_node="">, July 16, 2019; </span><a class="fr-reference" data-dcnode-id="378" data-reference="84 FR 64008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/84-FR-64008"><span data-dcnode-id="379" instrument_node="">84 FR 64008</span></a><span data-dcnode-id="377" instrument_node="">, Nov. 19, 2019; </span><a class="fr-reference" data-dcnode-id="375" data-reference="85 FR 29310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-29310"><span data-dcnode-id="376" instrument_node="">85 FR 29310</span></a><span data-dcnode-id="374" instrument_node="">, May 14, 2020; </span><a class="fr-reference" data-dcnode-id="372" data-reference="85 FR 80389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-80389"><span data-dcnode-id="373" instrument_node="">85 FR 80389</span></a><span data-dcnode-id="371" instrument_node="">, Dec. 11, 2020] </span></p><span data-dcnode-id="369" instrument_node="">
</span></div><span data-dcnode-id="367" instrument_node="">
</span><div class="section" data-dcnode-id="174" id="208.31"><span data-dcnode-id="366" instrument_node="">
</span><h4 data-dcnode-id="363"><a class="direct" data-dcnode-id="364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.31"><span data-dcnode-id="365" instrument_node="">§ 208.31 Reasonable fear of persecution or torture determinations involving aliens ordered removed under section 238(b) of the Act and aliens whose removal is reinstated under section 241(a)(5) of the Act.</span></a></h4><span data-dcnode-id="362" instrument_node="">
</span><div data-dcnode-id="348" id="p-208.31(a)"><span data-dcnode-id="361" instrument_node="">
</span><p class="indent-1" data-dcnode-id="350" data-title="208.31(a)"><span class="paragraph-hierarchy" data-dcnode-id="355"><span class="paren" data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">(</span></span><span data-dcnode-id="358" instrument_node="">a</span><span class="paren" data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">)</span></span></span><span data-dcnode-id="354" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Jurisdiction.</span></em><span data-dcnode-id="351" instrument_node="">  This section shall apply to any alien ordered removed under section 238(b) of the Act or whose deportation, exclusion, or removal order is reinstated under section 241(a)(5) of the Act who, in the course of the administrative removal or reinstatement process, expresses a fear of returning to the country of removal. USCIS has exclusive jurisdiction to make reasonable fear determinations, and EOIR has exclusive jurisdiction to review such determinations. </span></p><span data-dcnode-id="349" instrument_node="">
</span></div><span data-dcnode-id="347" instrument_node="">
</span><div data-dcnode-id="324" id="p-208.31(b)"><span data-dcnode-id="346" instrument_node="">
</span><p class="indent-1" data-dcnode-id="326" data-title="208.31(b)"><span class="paragraph-hierarchy" data-dcnode-id="340"><span class="paren" data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">(</span></span><span data-dcnode-id="343" instrument_node="">b</span><span class="paren" data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">)</span></span></span><span data-dcnode-id="339" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Initiation of reasonable fear determination process.</span></em><span data-dcnode-id="336" instrument_node="">  Upon issuance of a Final Administrative Removal Order under </span><a class="cfr external" data-dcnode-id="334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-238.1"><span data-dcnode-id="335" instrument_node="">§ 238.1 of this chapter</span></a><span data-dcnode-id="333" instrument_node="">, or notice under </span><a class="cfr external" data-dcnode-id="331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-241.8%23p-241.8%28b%29"><span data-dcnode-id="332" instrument_node="">§ 241.8(b) of this chapter</span></a><span data-dcnode-id="330" instrument_node=""> that an alien is subject to removal, an alien described in </span><a class="cfr external" data-dcnode-id="328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.31%23p-208.31%28a%29"><span data-dcnode-id="329" instrument_node="">paragraph (a)</span></a><span data-dcnode-id="327" instrument_node=""> of this section shall be referred to an asylum officer for a reasonable fear determination. In the absence of exceptional circumstances, this determination will be conducted within 10 days of the referral. </span></p><span data-dcnode-id="325" instrument_node="">
</span></div><span data-dcnode-id="323" instrument_node="">
</span><div data-dcnode-id="309" id="p-208.31(c)"><span data-dcnode-id="322" instrument_node="">
</span><p class="indent-1" data-dcnode-id="311" data-title="208.31(c)"><span class="paragraph-hierarchy" data-dcnode-id="316"><span class="paren" data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">(</span></span><span data-dcnode-id="319" instrument_node="">c</span><span class="paren" data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">)</span></span></span><span data-dcnode-id="315" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Interview and procedure.</span></em><span data-dcnode-id="312" instrument_node="">  The asylum officer shall conduct the interview in a non-adversarial manner, separate and apart from the general public. At the time of the interview, the asylum officer shall determine that the alien has an understanding of the reasonable fear determination process. The alien may be represented by counsel or an accredited representative at the interview, at no expense to the Government, and may present evidence, if available, relevant to the possibility of persecution or torture. The alien's representative may present a statement at the end of the interview. The asylum officer, in his or her discretion, may place reasonable limits on the number of persons who may be present at the interview and the length of the statement. If the alien is unable to proceed effectively in English, and if the asylum officer is unable to proceed competently in a language chosen by the alien, the asylum officer shall arrange for the assistance of an interpreter in conducting the interview. The interpreter may not be a representative or employee of the applicant's country or nationality, or if the applicant is stateless, the applicant's country of last habitual residence. The asylum officer shall create a summary of the material facts as stated by the applicant. At the conclusion of the interview, the officer shall review the summary with the alien and provide the alien with an opportunity to correct errors therein. The asylum officer shall create a written record of his or her determination, including a summary of the material facts as stated by the applicant, any additional facts relied on by the officers, and the officer's determination of whether, in light of such facts, the alien has established a reasonable fear of persecution or torture. The alien shall be determined to have a reasonable fear of persecution or torture if the alien establishes a reasonable possibility that he or she would be persecuted on account of his or her race, religion, nationality, membership in a particular social group or political opinion, or a reasonable possibility that he or she would be tortured in the country of removal. For purposes of the screening determination, the bars to eligibility for withholding of removal under section 241(b)(3)(B) of the Act shall not be considered. </span></p><span data-dcnode-id="310" instrument_node="">
</span></div><span data-dcnode-id="308" instrument_node="">
</span><div data-dcnode-id="291" id="p-208.31(d)"><span data-dcnode-id="307" instrument_node="">
</span><p class="indent-1" data-dcnode-id="293" data-title="208.31(d)"><span class="paragraph-hierarchy" data-dcnode-id="301"><span class="paren" data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">(</span></span><span data-dcnode-id="304" instrument_node="">d</span><span class="paren" data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">)</span></span></span><span data-dcnode-id="300" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Authority.</span></em><span data-dcnode-id="297" instrument_node="">  Asylum officers conducting screening determinations under this section shall have the authority described in </span><a class="cfr external" data-dcnode-id="295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.9%23p-208.9%28c%29"><span data-dcnode-id="296" instrument_node="">§ 208.9(c)</span></a><span data-dcnode-id="294" instrument_node="">. </span></p><span data-dcnode-id="292" instrument_node="">
</span></div><span data-dcnode-id="290" instrument_node="">
</span><div data-dcnode-id="273" id="p-208.31(e)"><span data-dcnode-id="289" instrument_node="">
</span><p class="indent-1" data-dcnode-id="275" data-title="208.31(e)"><span class="paragraph-hierarchy" data-dcnode-id="283"><span class="paren" data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">(</span></span><span data-dcnode-id="286" instrument_node="">e</span><span class="paren" data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">)</span></span></span><span data-dcnode-id="282" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Referral to Immigration Judge.</span></em><span data-dcnode-id="279" instrument_node="">  If an asylum officer determines that an alien described in this section has a reasonable fear of persecution or torture, the officer shall so inform the alien and issue a Form I-863, Notice of Referral to the Immigration Judge, for full consideration of the request for withholding of removal only. Such cases shall be adjudicated by the immigration judge in accordance with the provisions of </span><a class="cfr external" data-dcnode-id="277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16"><span data-dcnode-id="278" instrument_node="">§ 208.16</span></a><span data-dcnode-id="276" instrument_node="">. Appeal of the immigration judge's decision shall lie to the Board of Immigration Appeals. </span></p><span data-dcnode-id="274" instrument_node="">
</span></div><span data-dcnode-id="272" instrument_node="">
</span><div data-dcnode-id="258" id="p-208.31(f)"><span data-dcnode-id="271" instrument_node="">
</span><p class="indent-1" data-dcnode-id="260" data-title="208.31(f)"><span class="paragraph-hierarchy" data-dcnode-id="265"><span class="paren" data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">(</span></span><span data-dcnode-id="268" instrument_node="">f</span><span class="paren" data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">)</span></span></span><span data-dcnode-id="264" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">Removal of aliens with no reasonable fear of persecution or torture.</span></em><span data-dcnode-id="261" instrument_node="">  If the asylum officer determines that the alien has not established a reasonable fear of persecution or torture, the asylum officer shall inform the alien in writing of the decision and shall inquire whether the alien wishes to have an immigration judge review the negative decision, using the Record of Negative Reasonable Fear Finding and Request for Review by Immigration Judge, on which the alien must indicate whether he or she desires such review. If the alien refuses to make an indication, DHS shall consider such a response as a decision to decline review. </span></p><span data-dcnode-id="259" instrument_node="">
</span></div><span data-dcnode-id="257" instrument_node="">
</span><div data-dcnode-id="191" id="p-208.31(g)"><span data-dcnode-id="256" instrument_node="">
</span><p class="indent-1" data-dcnode-id="245" data-title="208.31(g)"><span class="paragraph-hierarchy" data-dcnode-id="250"><span class="paren" data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">(</span></span><span data-dcnode-id="253" instrument_node="">g</span><span class="paren" data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">)</span></span></span><span data-dcnode-id="249" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Review by immigration judge.</span></em><span data-dcnode-id="246" instrument_node="">  The asylum officer's negative decision regarding reasonable fear shall be subject to review by an immigration judge upon the alien's request. If the alien requests such review, the asylum officer shall serve him or her with a Notice of Referral to Immigration Judge. The record of determination, including copies of the Notice of Referral to Immigration Judge, the asylum officer's notes, the summary of the material facts, and other materials upon which the determination was based shall be provided to the immigration judge with the negative determination. In the absence of exceptional circumstances, such review shall be conducted by the immigration judge within 10 days of the filing of the Notice of Referral to Immigration Judge with the immigration court. Upon review of the asylum officer's negative reasonable fear determination: </span></p><span data-dcnode-id="244" instrument_node="">
</span><div data-dcnode-id="233" id="p-208.31(g)(1)"><span data-dcnode-id="243" instrument_node="">
</span><p class="indent-2" data-dcnode-id="235" data-title="208.31(g)(1)"><span class="paragraph-hierarchy" data-dcnode-id="237"><span class="paren" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">(</span></span><span data-dcnode-id="240" instrument_node="">1</span><span class="paren" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">)</span></span></span><span data-dcnode-id="236" instrument_node=""> If the immigration judge concurs with the asylum officer's determination that the alien does not have a reasonable fear of persecution or torture, the case shall be returned to DHS for removal of the alien. No appeal shall lie from the immigration judge's decision. </span></p><span data-dcnode-id="234" instrument_node="">
</span></div><span data-dcnode-id="232" instrument_node="">
</span><div data-dcnode-id="193" id="p-208.31(g)(2)"><span data-dcnode-id="231" instrument_node="">
</span><p class="indent-2" data-dcnode-id="223" data-title="208.31(g)(2)"><span class="paragraph-hierarchy" data-dcnode-id="225"><span class="paren" data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">(</span></span><span data-dcnode-id="228" instrument_node="">2</span><span class="paren" data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">)</span></span></span><span data-dcnode-id="224" instrument_node=""> If the immigration judge finds that the alien has a reasonable fear of persecution or torture, the alien may submit an Application for Asylum and for Withholding of Removal. </span></p><span data-dcnode-id="222" instrument_node="">
</span><div data-dcnode-id="208" id="p-208.31(g)(2)(i)"><span data-dcnode-id="221" instrument_node="">
</span><p class="indent-3" data-dcnode-id="210" data-title="208.31(g)(2)(i)"><span class="paragraph-hierarchy" data-dcnode-id="215"><span class="paren" data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">(</span></span><span data-dcnode-id="218" instrument_node="">i</span><span class="paren" data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">)</span></span></span><span data-dcnode-id="214" instrument_node=""> The immigration judge shall consider only the alien's application for withholding of removal under </span><a class="cfr external" data-dcnode-id="212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-1208.16"><span data-dcnode-id="213" instrument_node="">8 CFR 1208.16</span></a><span data-dcnode-id="211" instrument_node=""> and shall determine whether the alien's removal to the country of removal must be withheld or deferred. </span></p><span data-dcnode-id="209" instrument_node="">
</span></div><span data-dcnode-id="207" instrument_node="">
</span><div data-dcnode-id="195" id="p-208.31(g)(2)(ii)"><p class="indent-3" data-dcnode-id="196" data-title="208.31(g)(2)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="201"><span class="paren" data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">(</span></span><span data-dcnode-id="204" instrument_node="">ii</span><span class="paren" data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">)</span></span></span><span data-dcnode-id="200" instrument_node=""> Appeal of the immigration judge's decision whether removal must be withheld or deferred lies with the Board of Immigration Appeals. If the alien or DHS appeals the immigration judge's decision, the Board shall review only the immigration judge's decision regarding the alien's eligibility for withholding or deferral of removal under </span><a class="cfr external" data-dcnode-id="198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-1208.16"><span data-dcnode-id="199" instrument_node="">8 CFR 1208.16</span></a><span data-dcnode-id="197" instrument_node="">. </span></p></div><span data-dcnode-id="194" instrument_node="">
</span></div><span data-dcnode-id="192" instrument_node="">
</span></div><span data-dcnode-id="190" instrument_node="">
</span><p class="citation" data-dcnode-id="176"><span data-dcnode-id="189" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="187" data-reference="64 FR 8493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/64-FR-8493"><span data-dcnode-id="188" instrument_node="">64 FR 8493</span></a><span data-dcnode-id="186" instrument_node="">, Feb. 19, 1999; </span><a class="fr-reference" data-dcnode-id="184" data-reference="64 FR 13881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/64-FR-13881"><span data-dcnode-id="185" instrument_node="">64 FR 13881</span></a><span data-dcnode-id="183" instrument_node="">, Mar. 23, 1999; </span><a class="fr-reference" data-dcnode-id="181" data-reference="76 FR 53785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/76-FR-53785"><span data-dcnode-id="182" instrument_node="">76 FR 53785</span></a><span data-dcnode-id="180" instrument_node="">, Aug. 29, 2011; </span><a class="fr-reference" data-dcnode-id="178" data-reference="85 FR 80392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-80392"><span data-dcnode-id="179" instrument_node="">85 FR 80392</span></a><span data-dcnode-id="177" instrument_node="">, Dec. 11, 2020] </span></p><span data-dcnode-id="175" instrument_node="">
