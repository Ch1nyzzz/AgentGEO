</span><p class="citation" data-dcnode-id="1719"><span data-dcnode-id="1726" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="1724" data-reference="64 FR 8492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/64-FR-8492"><span data-dcnode-id="1725" instrument_node="">64 FR 8492</span></a><span data-dcnode-id="1723" instrument_node="">, Feb. 19, 1999. Revised at </span><a class="fr-reference" data-dcnode-id="1721" data-reference="65 FR 76136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/65-FR-76136"><span data-dcnode-id="1722" instrument_node="">65 FR 76136</span></a><span data-dcnode-id="1720" instrument_node="">, Dec. 6, 2000] </span></p><span data-dcnode-id="1718" instrument_node="">
</span></div><span data-dcnode-id="1716" instrument_node="">
</span><div class="section" data-dcnode-id="1695" id="208.23"><span data-dcnode-id="1715" instrument_node="">
</span><h4 data-dcnode-id="1712"><a class="direct" data-dcnode-id="1713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.23"><span data-dcnode-id="1714" instrument_node="">§ 208.23 Restoration of status.</span></a></h4><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">An alien who was maintaining his or her nonimmigrant status at the time of filing an asylum application and has such application denied may continue in or be restored to that status, if it has not expired. </span></p><span data-dcnode-id="1708" instrument_node="">
</span><p class="citation" data-dcnode-id="1697"><span data-dcnode-id="1707" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="1705" data-reference="62 FR 10337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/62-FR-10337"><span data-dcnode-id="1706" instrument_node="">62 FR 10337</span></a><span data-dcnode-id="1704" instrument_node="">, Mar. 6, 1997. Redesignated at </span><a class="fr-reference" data-dcnode-id="1702" data-reference="64 FR 8490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/64-FR-8490"><span data-dcnode-id="1703" instrument_node="">64 FR 8490</span></a><span data-dcnode-id="1701" instrument_node="">, Feb. 19, 1999 and further redesignated at </span><a class="fr-reference" data-dcnode-id="1699" data-reference="65 FR 76136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/65-FR-76136"><span data-dcnode-id="1700" instrument_node="">65 FR 76136</span></a><span data-dcnode-id="1698" instrument_node="">, Dec. 6, 2000] </span></p><span data-dcnode-id="1696" instrument_node="">
</span></div><span data-dcnode-id="1694" instrument_node="">
</span><div class="section" data-dcnode-id="1453" id="208.24"><span data-dcnode-id="1693" instrument_node="">
</span><h4 data-dcnode-id="1690"><a class="direct" data-dcnode-id="1691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.24"><span data-dcnode-id="1692" instrument_node="">§ 208.24 Termination of asylum or withholding of removal or deportation.</span></a></h4><span data-dcnode-id="1689" instrument_node="">
</span><div data-dcnode-id="1633" id="p-208.24(a)"><span data-dcnode-id="1688" instrument_node="">
</span><p class="indent-1" data-dcnode-id="1674" data-title="208.24(a)"><span class="paragraph-hierarchy" data-dcnode-id="1682"><span class="paren" data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">(</span></span><span data-dcnode-id="1685" instrument_node="">a</span><span class="paren" data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">)</span></span></span><span data-dcnode-id="1681" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Termination of asylum by USCIS.</span></em><span data-dcnode-id="1678" instrument_node="">  Except as provided in </span><a class="cfr external" data-dcnode-id="1676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.24%23p-208.24%28e%29"><span data-dcnode-id="1677" instrument_node="">paragraph (e)</span></a><span data-dcnode-id="1675" instrument_node=""> of this section, an asylum officer may terminate a grant of asylum made under the jurisdiction of USCIS if, following an interview, the asylum officer determines that: </span></p><span data-dcnode-id="1673" instrument_node="">
</span><div data-dcnode-id="1662" id="p-208.24(a)(1)"><span data-dcnode-id="1672" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1664" data-title="208.24(a)(1)"><span class="paragraph-hierarchy" data-dcnode-id="1666"><span class="paren" data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">(</span></span><span data-dcnode-id="1669" instrument_node="">1</span><span class="paren" data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">)</span></span></span><span data-dcnode-id="1665" instrument_node=""> There is a showing of fraud in the alien's application such that he or she was not eligible for asylum at the time it was granted; </span></p><span data-dcnode-id="1663" instrument_node="">
</span></div><span data-dcnode-id="1661" instrument_node="">
</span><div data-dcnode-id="1650" id="p-208.24(a)(2)"><span data-dcnode-id="1660" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1652" data-title="208.24(a)(2)"><span class="paragraph-hierarchy" data-dcnode-id="1654"><span class="paren" data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">(</span></span><span data-dcnode-id="1657" instrument_node="">2</span><span class="paren" data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">)</span></span></span><span data-dcnode-id="1653" instrument_node=""> As to applications filed on or after April 1, 1997, one or more of the conditions described in section 208(c)(2) of the Act exist; or </span></p><span data-dcnode-id="1651" instrument_node="">
</span></div><span data-dcnode-id="1649" instrument_node="">
</span><div data-dcnode-id="1635" id="p-208.24(a)(3)"><span data-dcnode-id="1648" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1637" data-title="208.24(a)(3)"><span class="paragraph-hierarchy" data-dcnode-id="1642"><span class="paren" data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">(</span></span><span data-dcnode-id="1645" instrument_node="">3</span><span class="paren" data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">)</span></span></span><span data-dcnode-id="1641" instrument_node=""> As to applications filed before April 1, 1997, the alien no longer has a well-founded fear of persecution upon return due to a change of country conditions in the alien's country of nationality or habitual residence or the alien has committed any act that would have been grounds for denial of asylum under </span><a class="cfr external" data-dcnode-id="1639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28c%29%282%29"><span data-dcnode-id="1640" instrument_node="">§ 208.13(c)(2)</span></a><span data-dcnode-id="1638" instrument_node="">. </span></p><span data-dcnode-id="1636" instrument_node="">
</span></div><span data-dcnode-id="1634" instrument_node="">
</span></div><span data-dcnode-id="1632" instrument_node="">
</span><div data-dcnode-id="1567" id="p-208.24(b)"><span data-dcnode-id="1631" instrument_node="">
</span><p class="indent-1" data-dcnode-id="1617" data-title="208.24(b)"><span class="paragraph-hierarchy" data-dcnode-id="1625"><span class="paren" data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">(</span></span><span data-dcnode-id="1628" instrument_node="">b</span><span class="paren" data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">)</span></span></span><span data-dcnode-id="1624" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Termination of withholding of deportation or removal by USCIS.</span></em><span data-dcnode-id="1621" instrument_node="">  Except as provided in </span><a class="cfr external" data-dcnode-id="1619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.24%23p-208.24%28e%29"><span data-dcnode-id="1620" instrument_node="">paragraph (e)</span></a><span data-dcnode-id="1618" instrument_node=""> of this section, an asylum officer may terminate a grant of withholding of deportation or removal made under the jurisdiction of USCIS if the asylum officer determines, following an interview, that: </span></p><span data-dcnode-id="1616" instrument_node="">
</span><div data-dcnode-id="1605" id="p-208.24(b)(1)"><span data-dcnode-id="1615" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1607" data-title="208.24(b)(1)"><span class="paragraph-hierarchy" data-dcnode-id="1609"><span class="paren" data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">(</span></span><span data-dcnode-id="1612" instrument_node="">1</span><span class="paren" data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">)</span></span></span><span data-dcnode-id="1608" instrument_node=""> The alien is no longer entitled to withholding of deportation or removal because, owing to a fundamental change in circumstances relating to the original claim, the alien's life or freedom no longer would be threatened on account of race, religion, nationality, membership in a particular social group, or political opinion in the country from which deportation or removal was withheld. </span></p><span data-dcnode-id="1606" instrument_node="">
</span></div><span data-dcnode-id="1604" instrument_node="">
</span><div data-dcnode-id="1593" id="p-208.24(b)(2)"><span data-dcnode-id="1603" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1595" data-title="208.24(b)(2)"><span class="paragraph-hierarchy" data-dcnode-id="1597"><span class="paren" data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">(</span></span><span data-dcnode-id="1600" instrument_node="">2</span><span class="paren" data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">)</span></span></span><span data-dcnode-id="1596" instrument_node=""> There is a showing of fraud in the alien's application such that the alien was not eligible for withholding of removal at the time it was granted; </span></p><span data-dcnode-id="1594" instrument_node="">
</span></div><span data-dcnode-id="1592" instrument_node="">
</span><div data-dcnode-id="1581" id="p-208.24(b)(3)"><span data-dcnode-id="1591" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1583" data-title="208.24(b)(3)"><span class="paragraph-hierarchy" data-dcnode-id="1585"><span class="paren" data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">(</span></span><span data-dcnode-id="1588" instrument_node="">3</span><span class="paren" data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">)</span></span></span><span data-dcnode-id="1584" instrument_node=""> The alien has committed any other act that would have been grounds for denial of withholding of removal under section 241(b)(3)(B) of the Act had it occurred prior to the grant of withholding of removal; or </span></p><span data-dcnode-id="1582" instrument_node="">
</span></div><span data-dcnode-id="1580" instrument_node="">
</span><div data-dcnode-id="1569" id="p-208.24(b)(4)"><span data-dcnode-id="1579" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1571" data-title="208.24(b)(4)"><span class="paragraph-hierarchy" data-dcnode-id="1573"><span class="paren" data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">(</span></span><span data-dcnode-id="1576" instrument_node="">4</span><span class="paren" data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">)</span></span></span><span data-dcnode-id="1572" instrument_node=""> For applications filed in proceedings commenced before April 1, 1997, the alien has committed any act that would have been grounds for denial of withholding of deportation under section 243(h)(2) of the Act. </span></p><span data-dcnode-id="1570" instrument_node="">
</span></div><span data-dcnode-id="1568" instrument_node="">
</span></div><span data-dcnode-id="1566" instrument_node="">
</span><div data-dcnode-id="1549" id="p-208.24(c)"><span data-dcnode-id="1565" instrument_node="">
</span><p class="indent-1" data-dcnode-id="1551" data-title="208.24(c)"><span class="paragraph-hierarchy" data-dcnode-id="1559"><span class="paren" data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">(</span></span><span data-dcnode-id="1562" instrument_node="">c</span><span class="paren" data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">)</span></span></span><span data-dcnode-id="1558" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Procedure.</span></em><span data-dcnode-id="1555" instrument_node="">  Prior to the termination of a grant of asylum or withholding of deportation or removal, the alien shall be given notice of intent to terminate, with the reasons therefor, at least 30 days prior to the interview specified in </span><a class="cfr external" data-dcnode-id="1553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.24%23p-208.24%28a%29"><span data-dcnode-id="1554" instrument_node="">paragraph (a)</span></a><span data-dcnode-id="1552" instrument_node=""> of this section before an asylum officer. The alien shall be provided the opportunity to present evidence showing that he or she is still eligible for asylum or withholding of deportation or removal. If the asylum officer determines that the alien is no longer eligible for asylum or withholding of deportation or removal, the alien shall be given written notice that asylum status or withholding of deportation or removal and any employment authorization issued pursuant thereto, are terminated. </span></p><span data-dcnode-id="1550" instrument_node="">
</span></div><span data-dcnode-id="1548" instrument_node="">
</span><div data-dcnode-id="1534" id="p-208.24(d)"><span data-dcnode-id="1547" instrument_node="">
</span><p class="indent-1" data-dcnode-id="1536" data-title="208.24(d)"><span class="paragraph-hierarchy" data-dcnode-id="1541"><span class="paren" data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">(</span></span><span data-dcnode-id="1544" instrument_node="">d</span><span class="paren" data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">)</span></span></span><span data-dcnode-id="1540" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Termination of derivative status.</span></em><span data-dcnode-id="1537" instrument_node="">  The termination of asylum status for a person who was the principal applicant shall result in termination of the asylum status of a spouse or child whose status was based on the asylum application of the principal. Such termination shall not preclude the spouse or child of such alien from separately asserting an asylum or withholding of deportation or removal claim. </span></p><span data-dcnode-id="1535" instrument_node="">
</span></div><span data-dcnode-id="1533" instrument_node="">
</span><div data-dcnode-id="1516" id="p-208.24(e)"><span data-dcnode-id="1532" instrument_node="">
</span><p class="indent-1" data-dcnode-id="1518" data-title="208.24(e)"><span class="paragraph-hierarchy" data-dcnode-id="1526"><span class="paren" data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">(</span></span><span data-dcnode-id="1529" instrument_node="">e</span><span class="paren" data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">)</span></span></span><span data-dcnode-id="1525" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Removal proceedings.</span></em><span data-dcnode-id="1522" instrument_node="">  When an alien's asylum status or withholding of removal or deportation is terminated under this section, the Service shall initiate removal proceedings, as appropriate, if the alien is not already in exclusion, deportation, or removal proceedings. Removal proceedings may take place in conjunction with a termination hearing scheduled under </span><a class="cfr external" data-dcnode-id="1520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.24%23p-208.24%28f%29"><span data-dcnode-id="1521" instrument_node="">§ 208.24(f)</span></a><span data-dcnode-id="1519" instrument_node="">. </span></p><span data-dcnode-id="1517" instrument_node="">
</span></div><span data-dcnode-id="1515" instrument_node="">
</span><div data-dcnode-id="1489" id="p-208.24(f)"><span data-dcnode-id="1514" instrument_node="">
</span><p class="indent-1" data-dcnode-id="1491" data-title="208.24(f)"><span class="paragraph-hierarchy" data-dcnode-id="1508"><span class="paren" data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">(</span></span><span data-dcnode-id="1511" instrument_node="">f</span><span class="paren" data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">)</span></span></span><span data-dcnode-id="1507" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Termination of asylum, or withholding of deportation or removal, by an immigration judge or the Board of Immigration Appeals.</span></em><span data-dcnode-id="1504" instrument_node="">  An immigration judge or the Board of Immigration Appeals may reopen a case pursuant to </span><a class="cfr external" data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-1003.2"><span data-dcnode-id="1503" instrument_node="">8 CFR 1003.2</span></a><span data-dcnode-id="1501" instrument_node=""> and </span><a class="cfr external" data-dcnode-id="1499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-1003.23"><span data-dcnode-id="1500" instrument_node="">8 CFR 1003.23</span></a><span data-dcnode-id="1498" instrument_node=""> for the purpose of terminating a grant of asylum, or a withholding of deportation or removal. In such a reopened proceeding, the Service must establish, by a preponderance of evidence, one or more of the grounds set forth in </span><a class="cfr external" data-dcnode-id="1496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.24%23p-208.24%28a%29"><span data-dcnode-id="1497" instrument_node="">paragraphs (a)</span></a><span data-dcnode-id="1495" instrument_node=""> or </span><a class="cfr external" data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.24%23p-208.24%28b%29"><span data-dcnode-id="1494" instrument_node="">(b)</span></a><span data-dcnode-id="1492" instrument_node=""> of this section. In addition, an immigration judge may terminate a grant of asylum, or a withholding of deportation or removal, made under the jurisdiction of USCIS at any time after the alien has been provided a notice of intent to terminate by USCIS. Any termination under this paragraph may occur in conjunction with an exclusion, deportation, or removal proceeding. </span></p><span data-dcnode-id="1490" instrument_node="">
</span></div><span data-dcnode-id="1488" instrument_node="">
</span><div data-dcnode-id="1473" id="p-208.24(g)"><p class="indent-1" data-dcnode-id="1474" data-title="208.24(g)"><span class="paragraph-hierarchy" data-dcnode-id="1482"><span class="paren" data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">(</span></span><span data-dcnode-id="1485" instrument_node="">g</span><span class="paren" data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">)</span></span></span><span data-dcnode-id="1481" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Termination of asylum for arriving aliens.</span></em><span data-dcnode-id="1478" instrument_node="">  If the Service determines that an applicant for admission who had previously been granted asylum in the United States falls within conditions set forth in </span><a class="cfr external" data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.24"><span data-dcnode-id="1477" instrument_node="">§ 208.24</span></a><span data-dcnode-id="1475" instrument_node=""> and is inadmissible, the Service shall issue a notice of intent to terminate asylum and initiate removal proceedings under section 240 of the Act. The alien shall present his or her response to the intent to terminate during proceedings before the immigration judge. </span></p></div><span data-dcnode-id="1472" instrument_node="">
</span><p class="citation" data-dcnode-id="1455"><span data-dcnode-id="1471" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="1469" data-reference="62 FR 10337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/62-FR-10337"><span data-dcnode-id="1470" instrument_node="">62 FR 10337</span></a><span data-dcnode-id="1468" instrument_node="">, Mar. 6, 1997. Redesignated at </span><a class="fr-reference" data-dcnode-id="1466" data-reference="64 FR 8490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/64-FR-8490"><span data-dcnode-id="1467" instrument_node="">64 FR 8490</span></a><span data-dcnode-id="1465" instrument_node="">, Feb. 19, 1999, and further redesignated and amended at </span><a class="fr-reference" data-dcnode-id="1463" data-reference="65 FR 76136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/65-FR-76136"><span data-dcnode-id="1464" instrument_node="">65 FR 76136</span></a><span data-dcnode-id="1462" instrument_node="">, Dec. 6, 2000; </span><a class="fr-reference" data-dcnode-id="1460" data-reference="76 FR 53785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/76-FR-53785"><span data-dcnode-id="1461" instrument_node="">76 FR 53785</span></a><span data-dcnode-id="1459" instrument_node="">, Aug. 29, 2011; </span><a class="fr-reference" data-dcnode-id="1457" data-reference="78 FR 22771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/78-FR-22771"><span data-dcnode-id="1458" instrument_node="">78 FR 22771</span></a><span data-dcnode-id="1456" instrument_node="">, Apr. 17, 2013] </span></p><span data-dcnode-id="1454" instrument_node="">
</span></div><span data-dcnode-id="1452" instrument_node="">
</span><div class="section" data-dcnode-id="1437" id="208.25"><span data-dcnode-id="1451" instrument_node="">
</span><h4 data-dcnode-id="1448"><a class="direct" data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.25"><span data-dcnode-id="1450" instrument_node="">§ 208.25 Severability.</span></a></h4><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">The provisions of part 208 are separate and severable from one another. In the event that any provision in part 208 is stayed, enjoined, not implemented, or otherwise held invalid, the remaining provisions shall nevertheless be implemented as an independent rule and continue in effect. </span></p><span data-dcnode-id="1444" instrument_node="">

</span><div class="seal-block seal-block-header" data-dcnode-id="1367"><div class="seal-content" data-dcnode-id="1368"><h6 data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Cross Reference</span></h6></div></div><span data-dcnode-id="1366" instrument_node="">

</span><div class="seal-block seal-block-header" data-dcnode-id="1352"><div class="seal-content" data-dcnode-id="1353"><h6 data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">Cross Reference</span></h6></div></div><span data-dcnode-id="1351" instrument_node="">
</span><div class="content-block" data-dcnode-id="1346"><span data-dcnode-id="1350" instrument_node="">This amendment was further delayed until Dec. 31, 2022, at </span><a class="fr-reference" data-dcnode-id="1348" data-reference="86 FR 73615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/86-FR-73615"><span data-dcnode-id="1349" instrument_node="">86 FR 73615</span></a><span data-dcnode-id="1347" instrument_node="">, Dec. 28, 2021.</span></div><span data-dcnode-id="1345" instrument_node="">
</span></div></div><span data-dcnode-id="1342" instrument_node="">
</span><div data-dcnode-id="1322" id="p-208.30(a)"><span data-dcnode-id="1341" instrument_node="">
</span><p class="indent-1" data-dcnode-id="1324" data-title="208.30(a)"><span class="paragraph-hierarchy" data-dcnode-id="1335"><span class="paren" data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">(</span></span><span data-dcnode-id="1338" instrument_node="">a</span><span class="paren" data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">)</span></span></span><span data-dcnode-id="1334" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Jurisdiction.</span></em><span data-dcnode-id="1331" instrument_node="">  The provisions of this subpart B apply to aliens subject to sections 235(a)(2) and 235(b)(1) of the Act. Pursuant to section 235(b)(1)(B) of the Act, DHS has exclusive jurisdiction to make the determinations described in this subpart B. Except as otherwise provided in this subpart B, </span><a class="cfr external" data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28b%29"><span data-dcnode-id="1330" instrument_node="">paragraphs (b)</span></a><span data-dcnode-id="1328" instrument_node=""> through </span><a class="cfr external" data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28g%29"><span data-dcnode-id="1327" instrument_node="">(g)</span></a><span data-dcnode-id="1325" instrument_node=""> of this section are the exclusive procedures applicable to stowaways and applicants for admission who are found inadmissible pursuant to section 212(a)(6)(C) or 212(a)(7) of the Act and who receive fear interviews, determinations, and reviews under section 235(b)(1)(B) of the Act. Prior to January 1, 2030, an alien physically present in or arriving in the Commonwealth of the Northern Mariana Islands is ineligible to apply for asylum and may only establish eligibility for withholding of removal pursuant to section 241(b)(3) of the Act or withholding or deferral of removal under the regulations issued pursuant to the Convention Against Torture's implementing legislation. </span></p><span data-dcnode-id="1323" instrument_node="">
</span></div><span data-dcnode-id="1321" instrument_node="">
</span><div data-dcnode-id="1304" id="p-208.30(b)"><span data-dcnode-id="1320" instrument_node="">
</span><p class="indent-1" data-dcnode-id="1306" data-title="208.30(b)"><span class="paragraph-hierarchy" data-dcnode-id="1314"><span class="paren" data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">(</span></span><span data-dcnode-id="1317" instrument_node="">b</span><span class="paren" data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">)</span></span></span><span data-dcnode-id="1313" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Process and Authority.</span></em><span data-dcnode-id="1310" instrument_node="">  If an alien subject to section 235(a)(2) or 235(b)(1) of the Act indicates an intention to apply for asylum, or expresses a fear of persecution or torture, or a fear of return to his or her country, the inspecting officer shall not proceed further with removal of the alien until the alien has been referred for an interview by an asylum officer in accordance with this section. An asylum officer shall then screen the alien for a credible fear of persecution, and as necessary, a reasonable possibility of persecution and reasonable possibility of torture. An asylum officer, as defined in section 235(b)(1)(E) of the Act, has the authorities described in </span><a class="cfr external" data-dcnode-id="1308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.9%23p-208.9%28c%29"><span data-dcnode-id="1309" instrument_node="">8 CFR 208.9(c)</span></a><span data-dcnode-id="1307" instrument_node=""> and must conduct an evaluation and make a determination consistent with this section. </span></p><span data-dcnode-id="1305" instrument_node="">
</span></div><span data-dcnode-id="1303" instrument_node="">
</span><div data-dcnode-id="1265" id="p-208.30(c)"><span data-dcnode-id="1302" instrument_node="">
</span><p class="indent-1" data-dcnode-id="1291" data-title="208.30(c)"><span class="paragraph-hierarchy" data-dcnode-id="1296"><span class="paren" data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">(</span></span><span data-dcnode-id="1299" instrument_node="">c</span><span class="paren" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">)</span></span></span><span data-dcnode-id="1295" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Treatment of dependents.</span></em><span data-dcnode-id="1292" instrument_node="">  A spouse or child of an alien may be included in that alien's fear evaluation and determination, if such spouse or child: </span></p><span data-dcnode-id="1290" instrument_node="">
</span><div data-dcnode-id="1279" id="p-208.30(c)(1)"><span data-dcnode-id="1289" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1281" data-title="208.30(c)(1)"><span class="paragraph-hierarchy" data-dcnode-id="1283"><span class="paren" data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">(</span></span><span data-dcnode-id="1286" instrument_node="">1</span><span class="paren" data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">)</span></span></span><span data-dcnode-id="1282" instrument_node=""> Arrived in the United States concurrently with the principal alien; and </span></p><span data-dcnode-id="1280" instrument_node="">
</span></div><span data-dcnode-id="1278" instrument_node="">
</span><div data-dcnode-id="1267" id="p-208.30(c)(2)"><span data-dcnode-id="1277" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1269" data-title="208.30(c)(2)"><span class="paragraph-hierarchy" data-dcnode-id="1271"><span class="paren" data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">(</span></span><span data-dcnode-id="1274" instrument_node="">2</span><span class="paren" data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">)</span></span></span><span data-dcnode-id="1270" instrument_node=""> Desires to be included in the principal alien's determination. However, any alien may have his or her evaluation and determination made separately, if he or she expresses such a desire. </span></p><span data-dcnode-id="1268" instrument_node="">
</span></div><span data-dcnode-id="1266" instrument_node="">
</span></div><span data-dcnode-id="1264" instrument_node="">
</span><div data-dcnode-id="1178" id="p-208.30(d)"><span data-dcnode-id="1263" instrument_node="">
</span><p class="indent-1" data-dcnode-id="1252" data-title="208.30(d)"><span class="paragraph-hierarchy" data-dcnode-id="1257"><span class="paren" data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">(</span></span><span data-dcnode-id="1260" instrument_node="">d</span><span class="paren" data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">)</span></span></span><span data-dcnode-id="1256" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Interview.</span></em><span data-dcnode-id="1253" instrument_node="">  The asylum officer will conduct the interview in a nonadversarial manner, separate and apart from the general public. The purpose of the interview shall be to elicit all relevant and useful information bearing on whether the alien can establish a credible fear of persecution, reasonable possibility of persecution, or reasonable possibility of torture. The asylum officer shall conduct the interview as follows: </span></p><span data-dcnode-id="1251" instrument_node="">
</span><div data-dcnode-id="1240" id="p-208.30(d)(1)"><span data-dcnode-id="1250" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1242" data-title="208.30(d)(1)"><span class="paragraph-hierarchy" data-dcnode-id="1244"><span class="paren" data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">(</span></span><span data-dcnode-id="1247" instrument_node="">1</span><span class="paren" data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">)</span></span></span><span data-dcnode-id="1243" instrument_node=""> If the officer conducting the interview determines that the alien is unable to participate effectively in the interview because of illness, fatigue, or other impediments, the officer may reschedule the interview. </span></p><span data-dcnode-id="1241" instrument_node="">
</span></div><span data-dcnode-id="1239" instrument_node="">
</span><div data-dcnode-id="1228" id="p-208.30(d)(2)"><span data-dcnode-id="1238" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1230" data-title="208.30(d)(2)"><span class="paragraph-hierarchy" data-dcnode-id="1232"><span class="paren" data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">(</span></span><span data-dcnode-id="1235" instrument_node="">2</span><span class="paren" data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">)</span></span></span><span data-dcnode-id="1231" instrument_node=""> At the time of the interview, the asylum officer shall verify that the alien has received in writing the relevant information regarding the fear determination process. The officer shall also determine that the alien has an understanding of the fear determination process. </span></p><span data-dcnode-id="1229" instrument_node="">
</span></div><span data-dcnode-id="1227" instrument_node="">
</span><div data-dcnode-id="1216" id="p-208.30(d)(3)"><span data-dcnode-id="1226" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1218" data-title="208.30(d)(3)"><span class="paragraph-hierarchy" data-dcnode-id="1220"><span class="paren" data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">(</span></span><span data-dcnode-id="1223" instrument_node="">3</span><span class="paren" data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">)</span></span></span><span data-dcnode-id="1219" instrument_node=""> The alien may be required to register his or her identity. </span></p><span data-dcnode-id="1217" instrument_node="">
</span></div><span data-dcnode-id="1215" instrument_node="">
</span><div data-dcnode-id="1204" id="p-208.30(d)(4)"><span data-dcnode-id="1214" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1206" data-title="208.30(d)(4)"><span class="paragraph-hierarchy" data-dcnode-id="1208"><span class="paren" data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">(</span></span><span data-dcnode-id="1211" instrument_node="">4</span><span class="paren" data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">)</span></span></span><span data-dcnode-id="1207" instrument_node=""> The alien may consult with a person or persons of the alien's choosing prior to the interview or any review thereof, and may present other evidence, if available. Such consultation shall be at no expense to the Government and shall not unreasonably delay the process. Any person or persons with whom the alien chooses to consult may be present at the interview and may be permitted, in the discretion of the asylum officer, to present a statement at the end of the interview. The asylum officer, in his or her discretion, may place reasonable limits on the number of persons who may be present at the interview and on the length of the statement. </span></p><span data-dcnode-id="1205" instrument_node="">
</span></div><span data-dcnode-id="1203" instrument_node="">
</span><div data-dcnode-id="1192" id="p-208.30(d)(5)"><span data-dcnode-id="1202" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1194" data-title="208.30(d)(5)"><span class="paragraph-hierarchy" data-dcnode-id="1196"><span class="paren" data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">(</span></span><span data-dcnode-id="1199" instrument_node="">5</span><span class="paren" data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">)</span></span></span><span data-dcnode-id="1195" instrument_node=""> If the alien is unable to proceed effectively in English, and if the asylum officer is unable to proceed competently in a language the alien speaks and understands, the asylum officer shall arrange for the assistance of an interpreter in conducting the interview. The interpreter must be at least 18 years of age and may not be the alien's attorney or representative of record, a witness testifying on the alien's behalf, a representative or employee of the alien's country of nationality, or, if the alien is stateless, the alien's country of last habitual residence. </span></p><span data-dcnode-id="1193" instrument_node="">
</span></div><span data-dcnode-id="1191" instrument_node="">
</span><div data-dcnode-id="1180" id="p-208.30(d)(6)"><span data-dcnode-id="1190" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1182" data-title="208.30(d)(6)"><span class="paragraph-hierarchy" data-dcnode-id="1184"><span class="paren" data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">(</span></span><span data-dcnode-id="1187" instrument_node="">6</span><span class="paren" data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">)</span></span></span><span data-dcnode-id="1183" instrument_node=""> The asylum officer shall create a summary of the material facts as stated by the alien. At the conclusion of the interview, the officer shall review the summary with the alien and provide the alien with an opportunity to correct any errors therein. </span></p><span data-dcnode-id="1181" instrument_node="">
</span></div><span data-dcnode-id="1179" instrument_node="">
</span></div><span data-dcnode-id="1177" instrument_node="">
</span><div data-dcnode-id="563" id="p-208.30(e)"><span data-dcnode-id="1176" instrument_node="">
</span><p class="indent-1" data-dcnode-id="1165" data-title="208.30(e)"><span class="paragraph-hierarchy" data-dcnode-id="1170"><span class="paren" data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">(</span></span><span data-dcnode-id="1173" instrument_node="">e</span><span class="paren" data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">)</span></span></span><span data-dcnode-id="1169" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Procedures for determining credible fear of persecution, reasonable possibility of persecution, and reasonable possibility of torture.</span></em><span data-dcnode-id="1166" instrument_node=""> </span></p><span data-dcnode-id="1164" instrument_node="">
</span><div data-dcnode-id="1117" id="p-208.30(e)(1)"><span data-dcnode-id="1163" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1155" data-title="208.30(e)(1)"><span class="paragraph-hierarchy" data-dcnode-id="1157"><span class="paren" data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">(</span></span><span data-dcnode-id="1160" instrument_node="">1</span><span class="paren" data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">)</span></span></span><span data-dcnode-id="1156" instrument_node=""> An alien establishes a credible fear of persecution if there is a significant possibility the alien can establish eligibility for asylum under section 208 of the Act. “Significant possibility” means a substantial and realistic possibility of succeeding. When making such a determination, the asylum officer shall take into account: </span></p><span data-dcnode-id="1154" instrument_node="">
</span><div data-dcnode-id="1143" id="p-208.30(e)(1)(i)"><span data-dcnode-id="1153" instrument_node="">
</span><p class="indent-3" data-dcnode-id="1145" data-title="208.30(e)(1)(i)"><span class="paragraph-hierarchy" data-dcnode-id="1147"><span class="paren" data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">(</span></span><span data-dcnode-id="1150" instrument_node="">i</span><span class="paren" data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">)</span></span></span><span data-dcnode-id="1146" instrument_node=""> The credibility of the statements made by the alien in support of the alien's claim; </span></p><span data-dcnode-id="1144" instrument_node="">
</span></div><span data-dcnode-id="1142" instrument_node="">
</span><div data-dcnode-id="1131" id="p-208.30(e)(1)(ii)"><span data-dcnode-id="1141" instrument_node="">
</span><p class="indent-3" data-dcnode-id="1133" data-title="208.30(e)(1)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="1135"><span class="paren" data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">(</span></span><span data-dcnode-id="1138" instrument_node="">ii</span><span class="paren" data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">)</span></span></span><span data-dcnode-id="1134" instrument_node=""> Such other facts as are known to the officer, including whether the alien could avoid any future harm by relocating to another part of his or her country, if under all the circumstances it would be reasonable to expect the alien to do so; and </span></p><span data-dcnode-id="1132" instrument_node="">
</span></div><span data-dcnode-id="1130" instrument_node="">
</span><div data-dcnode-id="1119" id="p-208.30(e)(1)(iii)"><span data-dcnode-id="1129" instrument_node="">
</span><p class="indent-3" data-dcnode-id="1121" data-title="208.30(e)(1)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="1123"><span class="paren" data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">(</span></span><span data-dcnode-id="1126" instrument_node="">iii</span><span class="paren" data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">)</span></span></span><span data-dcnode-id="1122" instrument_node=""> The applicability of any bars to being able to apply for asylum or to eligibility for asylum set forth at section 208(a)(2)(B)-(C) and (b)(2) of the Act, including any bars established by regulation under section 208(b)(2)(C) of the Act. </span></p><span data-dcnode-id="1120" instrument_node="">
</span></div><span data-dcnode-id="1118" instrument_node="">
</span></div><span data-dcnode-id="1116" instrument_node="">
</span><div data-dcnode-id="1069" id="p-208.30(e)(2)"><span data-dcnode-id="1115" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1107" data-title="208.30(e)(2)"><span class="paragraph-hierarchy" data-dcnode-id="1109"><span class="paren" data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">(</span></span><span data-dcnode-id="1112" instrument_node="">2</span><span class="paren" data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">)</span></span></span><span data-dcnode-id="1108" instrument_node=""> An alien establishes a reasonable possibility of persecution if there is a reasonable possibility that the alien would be persecuted on account of his or her race, religion, nationality, membership in a particular social group, or political opinion in the country of removal. When making such determination, the officer will take into account: </span></p><span data-dcnode-id="1106" instrument_node="">
</span><div data-dcnode-id="1095" id="p-208.30(e)(2)(i)"><span data-dcnode-id="1105" instrument_node="">
</span><p class="indent-3" data-dcnode-id="1097" data-title="208.30(e)(2)(i)"><span class="paragraph-hierarchy" data-dcnode-id="1099"><span class="paren" data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">(</span></span><span data-dcnode-id="1102" instrument_node="">i</span><span class="paren" data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">)</span></span></span><span data-dcnode-id="1098" instrument_node=""> The credibility of the statements made by the alien in support of the alien's claim; </span></p><span data-dcnode-id="1096" instrument_node="">
</span></div><span data-dcnode-id="1094" instrument_node="">
</span><div data-dcnode-id="1083" id="p-208.30(e)(2)(ii)"><span data-dcnode-id="1093" instrument_node="">
</span><p class="indent-3" data-dcnode-id="1085" data-title="208.30(e)(2)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="1087"><span class="paren" data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">(</span></span><span data-dcnode-id="1090" instrument_node="">ii</span><span class="paren" data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">)</span></span></span><span data-dcnode-id="1086" instrument_node=""> Such other facts as are known to the officer, including whether the alien could avoid a future threat to his or her life or freedom by relocating to another part of the proposed country of removal and, under all circumstances, it would be reasonable to expect the applicant to do so; and </span></p><span data-dcnode-id="1084" instrument_node="">
</span></div><span data-dcnode-id="1082" instrument_node="">
</span><div data-dcnode-id="1071" id="p-208.30(e)(2)(iii)"><span data-dcnode-id="1081" instrument_node="">
</span><p class="indent-3" data-dcnode-id="1073" data-title="208.30(e)(2)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="1075"><span class="paren" data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">(</span></span><span data-dcnode-id="1078" instrument_node="">iii</span><span class="paren" data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">)</span></span></span><span data-dcnode-id="1074" instrument_node=""> The applicability of any bars at section 241(b)(3)(B) of the Act. </span></p><span data-dcnode-id="1072" instrument_node="">
</span></div><span data-dcnode-id="1070" instrument_node="">
</span></div><span data-dcnode-id="1068" instrument_node="">
</span><div data-dcnode-id="1018" id="p-208.30(e)(3)"><span data-dcnode-id="1067" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1044" data-title="208.30(e)(3)"><span class="paragraph-hierarchy" data-dcnode-id="1061"><span class="paren" data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">(</span></span><span data-dcnode-id="1064" instrument_node="">3</span><span class="paren" data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">)</span></span></span><span data-dcnode-id="1060" instrument_node=""> An alien establishes a reasonable possibility of torture if there is a reasonable possibility that the alien would be tortured in the country of removal, consistent with the criteria in </span><a class="cfr external" data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28c%29"><span data-dcnode-id="1059" instrument_node="">8 CFR 208.16(c)</span></a><span data-dcnode-id="1057" instrument_node="">, </span><a class="cfr external" data-dcnode-id="1055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.17"><span data-dcnode-id="1056" instrument_node="">8 CFR 208.17</span></a><span data-dcnode-id="1054" instrument_node="">, and </span><a class="cfr external" data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.18"><span data-dcnode-id="1053" instrument_node="">8 CFR 208.18</span></a><span data-dcnode-id="1051" instrument_node="">. The alien must demonstrate a reasonable possibility that he or she will suffer severe pain or suffering in the country of removal, and that the feared harm would comport with the other requirements of </span><a class="cfr external" data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.18%23p-208.18%28a%29%281%29"><span data-dcnode-id="1050" instrument_node="">8 CFR 208.18(a)(1)</span></a><span data-dcnode-id="1048" instrument_node=""> through </span><a class="cfr external" data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.18%23p-208.18%28a%29%288%29"><span data-dcnode-id="1047" instrument_node="">(8)</span></a><span data-dcnode-id="1045" instrument_node="">. When making such a determination, the asylum officer shall take into account: </span></p><span data-dcnode-id="1043" instrument_node="">
</span><div data-dcnode-id="1032" id="p-208.30(e)(3)(i)"><span data-dcnode-id="1042" instrument_node="">
</span><p class="indent-3" data-dcnode-id="1034" data-title="208.30(e)(3)(i)"><span class="paragraph-hierarchy" data-dcnode-id="1036"><span class="paren" data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">(</span></span><span data-dcnode-id="1039" instrument_node="">i</span><span class="paren" data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">)</span></span></span><span data-dcnode-id="1035" instrument_node=""> The credibility of the statements made by alien in support of the alien's claim, and </span></p><span data-dcnode-id="1033" instrument_node="">
</span></div><span data-dcnode-id="1031" instrument_node="">
</span><div data-dcnode-id="1020" id="p-208.30(e)(3)(ii)"><span data-dcnode-id="1030" instrument_node="">
</span><p class="indent-3" data-dcnode-id="1022" data-title="208.30(e)(3)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="1024"><span class="paren" data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">(</span></span><span data-dcnode-id="1027" instrument_node="">ii</span><span class="paren" data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">)</span></span></span><span data-dcnode-id="1023" instrument_node=""> Such other facts as are known to the officer, including whether the alien could relocate to a part of the country of removal where he or she is not likely to be tortured. </span></p><span data-dcnode-id="1021" instrument_node="">
</span></div><span data-dcnode-id="1019" instrument_node="">
</span></div><span data-dcnode-id="1017" instrument_node="">
</span><div data-dcnode-id="1006" id="p-208.30(e)(4)"><span data-dcnode-id="1016" instrument_node="">
</span><p class="indent-2" data-dcnode-id="1008" data-title="208.30(e)(4)"><span class="paragraph-hierarchy" data-dcnode-id="1010"><span class="paren" data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">(</span></span><span data-dcnode-id="1013" instrument_node="">4</span><span class="paren" data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">)</span></span></span><span data-dcnode-id="1009" instrument_node=""> In all cases, the asylum officer will create a written record of his or her determination, including a summary of the material facts as stated by the alien, any additional facts relied on by the officer, and the officer's determination of whether, in light of such facts, the alien has established a credible fear of persecution, reasonable possibility of persecution, or reasonable possibility of torture. In determining whether the alien has a credible fear of persecution, as defined in section 235(b)(1)(B)(v) of the Act, or a reasonable possibility of persecution or torture, the asylum officer shall consider whether the alien's case presents novel or unique issues that merit consideration in a full hearing before an immigration judge. </span></p><span data-dcnode-id="1007" instrument_node="">
</span></div><span data-dcnode-id="1005" instrument_node="">
</span><div data-dcnode-id="868" id="p-208.30(e)(5)"><span data-dcnode-id="1004" instrument_node="">
</span><p class="indent-2" data-dcnode-id="996" data-title="208.30(e)(5)"><span class="paragraph-hierarchy" data-dcnode-id="998"><span class="paren" data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">(</span></span><span data-dcnode-id="1001" instrument_node="">5</span><span class="paren" data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">)</span></span></span><span data-dcnode-id="997" instrument_node=""> </span></p><span data-dcnode-id="995" instrument_node="">
</span><div data-dcnode-id="924" id="p-208.30(e)(5)(i)"><span data-dcnode-id="994" instrument_node="">
</span><p class="indent-3" data-dcnode-id="986" data-title="208.30(e)(5)(i)"><span class="paragraph-hierarchy" data-dcnode-id="988"><span class="paren" data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">(</span></span><span data-dcnode-id="991" instrument_node="">i</span><span class="paren" data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">)</span></span></span><span data-dcnode-id="987" instrument_node=""> </span></p><span data-dcnode-id="985" instrument_node="">
</span><div data-dcnode-id="968" id="p-208.30(e)(5)(i)(A)"><span data-dcnode-id="984" instrument_node="">
</span><p class="indent-4" data-dcnode-id="970" data-title="208.30(e)(5)(i)(A)"><span class="paragraph-hierarchy" data-dcnode-id="978"><span class="paren" data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">(</span></span><span data-dcnode-id="981" instrument_node="">A</span><span class="paren" data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">)</span></span></span><span data-dcnode-id="977" instrument_node=""> Except as provided in paragraph (e)(5)(ii) or (iii) or </span><a class="cfr external" data-dcnode-id="975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28e%29%286%29"><span data-dcnode-id="976" instrument_node="">paragraph (e)(6)</span></a><span data-dcnode-id="974" instrument_node=""> or </span><a class="cfr external" data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28e%29%287%29"><span data-dcnode-id="973" instrument_node="">(7)</span></a><span data-dcnode-id="971" instrument_node=""> of this section, if an alien would be able to establish a credible fear of persecution but for the fact that the alien is subject to one or more of the mandatory bars to applying for asylum or being eligible for asylum contained in section 208(a)(2)(B)-(D) and (b)(2) of the Act, including any bars established by regulation under section 208(b)(2)(C) of the Act, then the asylum officer will enter a negative credible fear of persecution determination with respect to the alien's eligibility for asylum. </span></p><span data-dcnode-id="969" instrument_node="">
</span></div><span data-dcnode-id="967" instrument_node="">
</span><div data-dcnode-id="950" id="p-208.30(e)(5)(i)(B)"><span data-dcnode-id="966" instrument_node="">
</span><p class="indent-4" data-dcnode-id="952" data-title="208.30(e)(5)(i)(B)"><span class="paragraph-hierarchy" data-dcnode-id="960"><span class="paren" data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">(</span></span><span data-dcnode-id="963" instrument_node="">B</span><span class="paren" data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">)</span></span></span><span data-dcnode-id="959" instrument_node=""> If an alien described in </span><a class="cfr external" data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28e%29%285%29%28i%29%28A%29"><span data-dcnode-id="958" instrument_node="">paragraph (e)(5)(i)(A)</span></a><span data-dcnode-id="956" instrument_node=""> of this section is able to establish either a reasonable possibility of persecution (including by establishing that he or she is not subject to one or more of the mandatory bars to eligibility for withholding of removal contained in section 241(b)(3)(B) of the Act) or a reasonable possibility of torture, then the asylum officer will enter a positive reasonable possibility of persecution or torture determination, as applicable. The Department of Homeland Security shall place the alien in asylum-and-withholding-only proceedings under </span><a class="cfr external" data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.2%23p-208.2%28c%29%281%29"><span data-dcnode-id="955" instrument_node="">8 CFR 208.2(c)(1)</span></a><span data-dcnode-id="953" instrument_node=""> for full consideration of the alien's claim for withholding of removal under section 241(b)(3) of the Act or withholding or deferral of removal under the regulations issued pursuant to the implementing legislation for the Convention Against Torture. </span></p><span data-dcnode-id="951" instrument_node="">
</span></div><span data-dcnode-id="949" instrument_node="">
</span><div data-dcnode-id="926" id="p-208.30(e)(5)(i)(C)"><span data-dcnode-id="948" instrument_node="">
</span><p class="indent-4" data-dcnode-id="928" data-title="208.30(e)(5)(i)(C)"><span class="paragraph-hierarchy" data-dcnode-id="942"><span class="paren" data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">(</span></span><span data-dcnode-id="945" instrument_node="">C</span><span class="paren" data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">)</span></span></span><span data-dcnode-id="941" instrument_node=""> If an alien described in </span><a class="cfr external" data-dcnode-id="939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28e%29%285%29%28i%29%28A%29"><span data-dcnode-id="940" instrument_node="">paragraph (e)(5)(i)(A)</span></a><span data-dcnode-id="938" instrument_node=""> of this section fails to establish either a reasonable possibility of persecution (including by failing to establish that he or she is not subject to one or more of the mandatory bars to eligibility for withholding of removal contained in section 241(b)(3)(B) of the Act) or a reasonable possibility of torture, the asylum officer will provide the alien with a written notice of decision, which will be subject to immigration judge review consistent with </span><a class="cfr external" data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28g%29"><span data-dcnode-id="937" instrument_node="">paragraph (g)</span></a><span data-dcnode-id="935" instrument_node=""> of this section, except that the immigration judge will review the fear findings under the reasonable possibility standard instead of the credible fear of persecution standard described in </span><a class="cfr external" data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28g%29"><span data-dcnode-id="934" instrument_node="">paragraph (g)</span></a><span data-dcnode-id="932" instrument_node=""> of this section and in </span><a class="cfr external" data-dcnode-id="930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-1208.30%23p-1208.30%28g%29"><span data-dcnode-id="931" instrument_node="">8 CFR 1208.30(g)</span></a><span data-dcnode-id="929" instrument_node="">. </span></p><span data-dcnode-id="927" instrument_node="">
</span></div><span data-dcnode-id="925" instrument_node="">
</span></div><span data-dcnode-id="923" instrument_node="">
</span><div data-dcnode-id="897" id="p-208.30(e)(5)(ii)"><span data-dcnode-id="922" instrument_node="">
</span><p class="indent-3" data-dcnode-id="899" data-title="208.30(e)(5)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="916"><span class="paren" data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">(</span></span><span data-dcnode-id="919" instrument_node="">ii</span><span class="paren" data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">)</span></span></span><span data-dcnode-id="915" instrument_node=""> If the alien is found to be an alien described in </span><a class="cfr external" data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28c%29%283%29"><span data-dcnode-id="914" instrument_node="">8 CFR 208.13(c)(3)</span></a><span data-dcnode-id="912" instrument_node="">, then the asylum officer shall enter a negative credible fear determination with respect to the alien's application for asylum. The Department shall nonetheless place the alien in asylum-and-withholding-only proceedings under </span><a class="cfr external" data-dcnode-id="910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.2%23p-208.2%28c%29%281%29"><span data-dcnode-id="911" instrument_node="">8 CFR 208.2(c)(1)</span></a><span data-dcnode-id="909" instrument_node=""> for full consideration of the alien's claim for withholding of removal under section 241(b)(3) of the Act, or for withholding or deferral of removal under the regulations issued pursuant to the implementing legislation for the Convention Against Torture, if the alien establishes, respectively, a reasonable possibility of persecution or torture. However, if an alien fails to establish, during the interview with the asylum officer, a reasonable possibility of either persecution or torture, the asylum officer will provide the alien with a written notice of decision, which will be subject to immigration judge review consistent with </span><a class="cfr external" data-dcnode-id="907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28g%29"><span data-dcnode-id="908" instrument_node="">paragraph (g)</span></a><span data-dcnode-id="906" instrument_node=""> of this section, except that the immigration judge will review the fear of persecution or torture findings under the reasonable possibility standard instead of the credible fear standard described in </span><a class="cfr external" data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28g%29"><span data-dcnode-id="905" instrument_node="">paragraph (g)</span></a><span data-dcnode-id="903" instrument_node=""> of this section and in </span><a class="cfr external" data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-1208.30%23p-1208.30%28g%29"><span data-dcnode-id="902" instrument_node="">8 CFR 1208.30(g)</span></a><span data-dcnode-id="900" instrument_node="">. </span></p><span data-dcnode-id="898" instrument_node="">
</span></div><span data-dcnode-id="896" instrument_node="">
</span><div data-dcnode-id="870" id="p-208.30(e)(5)(iii)"><span data-dcnode-id="895" instrument_node="">
</span><p class="indent-3" data-dcnode-id="872" data-title="208.30(e)(5)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="889"><span class="paren" data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">(</span></span><span data-dcnode-id="892" instrument_node="">iii</span><span class="paren" data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">)</span></span></span><span data-dcnode-id="888" instrument_node=""> If the alien is found to be an alien described in </span><a class="cfr external" data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28c%29%284%29"><span data-dcnode-id="887" instrument_node="">8 CFR 208.13(c)(4)</span></a><span data-dcnode-id="885" instrument_node="">, then the asylum officer shall enter a negative credible fear determination with respect to the alien's application for asylum. The Department shall nonetheless place the alien in asylum-and-withholding-only proceedings under </span><a class="cfr external" data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.2%23p-208.2%28c%29%281%29"><span data-dcnode-id="884" instrument_node="">8 CFR 208.2(c)(1)</span></a><span data-dcnode-id="882" instrument_node=""> for full consideration of the alien's claim for withholding of removal under section 241(b)(3) of the Act or withholding of deferral of removal under the regulations issued pursuant to the implementing legislation for the Convention Against Torture if the alien establishes, respectively, a reasonable possibility of persecution or torture. However, if an alien fails to establish, during the interview with the asylum officer, a reasonable possibility of either persecution or torture, the asylum officer will provide the alien with a written notice of decision, which will be subject to immigration judge review consistent with </span><a class="cfr external" data-dcnode-id="880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28g%29"><span data-dcnode-id="881" instrument_node="">paragraph (g)</span></a><span data-dcnode-id="879" instrument_node=""> of this section, except that the immigration judge will review the fear of persecution or torture findings under the reasonable possibility standard instead of the credible fear standard described in </span><a class="cfr external" data-dcnode-id="877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28g%29"><span data-dcnode-id="878" instrument_node="">paragraph (g)</span></a><span data-dcnode-id="876" instrument_node=""> of this section and in </span><a class="cfr external" data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-1208.30%23p-1208.30%28g%29"><span data-dcnode-id="875" instrument_node="">8 CFR 1208.30(g)</span></a><span data-dcnode-id="873" instrument_node="">. </span></p><span data-dcnode-id="871" instrument_node="">
</span></div><span data-dcnode-id="869" instrument_node="">
</span></div><span data-dcnode-id="867" instrument_node="">
</span><div data-dcnode-id="715" id="p-208.30(e)(6)"><span data-dcnode-id="866" instrument_node="">
</span><p class="indent-2" data-dcnode-id="849" data-title="208.30(e)(6)"><span class="paragraph-hierarchy" data-dcnode-id="860"><span class="paren" data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">(</span></span><span data-dcnode-id="863" instrument_node="">6</span><span class="paren" data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">)</span></span></span><span data-dcnode-id="859" instrument_node=""> Prior to any determination concerning whether an alien arriving in the United States at a U.S.-Canada land border port-of-entry or in transit through the U.S. during removal by Canada has a credible fear of persecution, reasonable possibility of persecution, or reasonable possibility of torture, the asylum officer shall conduct a threshold screening interview to determine whether such an alien is ineligible to apply for asylum pursuant to section 208(a)(2)(A) of the Act and subject to removal to Canada by operation of the Agreement Between the Government of the United States and the Government of Canada For Cooperation in the Examination of Refugee Status Claims from Nationals of Third Countries (“Agreement”). In conducting this threshold screening interview, the asylum officer shall apply all relevant interview procedures outlined in </span><a class="cfr external" data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28d%29"><span data-dcnode-id="858" instrument_node="">paragraph (d)</span></a><span data-dcnode-id="856" instrument_node=""> of this section, provided, however, that </span><a class="cfr external" data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28d%29%282%29"><span data-dcnode-id="855" instrument_node="">paragraph (d)(2)</span></a><span data-dcnode-id="853" instrument_node=""> of this section shall not apply to aliens described in this </span><a class="cfr external" data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28e%29%286%29"><span data-dcnode-id="852" instrument_node="">paragraph (e)(6)</span></a><span data-dcnode-id="850" instrument_node="">. The asylum officer shall advise the alien of the Agreement's exceptions and question the alien as to applicability of any of these exceptions to the alien's case. </span></p><span data-dcnode-id="848" instrument_node="">
</span><div data-dcnode-id="837" id="p-208.30(e)(6)(i)"><span data-dcnode-id="847" instrument_node="">
</span><p class="indent-3" data-dcnode-id="839" data-title="208.30(e)(6)(i)"><span class="paragraph-hierarchy" data-dcnode-id="841"><span class="paren" data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">(</span></span><span data-dcnode-id="844" instrument_node="">i</span><span class="paren" data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">)</span></span></span><span data-dcnode-id="840" instrument_node=""> If the asylum officer, with concurrence from a supervisory asylum officer, determines that an alien does not qualify for an exception under the Agreement during this threshold screening interview, the alien is ineligible to apply for asylum in the United States. After the asylum officer's documented finding is reviewed by a supervisory asylum officer, the alien shall be advised that he or she will be removed to Canada in order to pursue his or her claims relating to a fear of persecution or torture under Canadian law. Aliens found ineligible to apply for asylum under this paragraph shall be removed to Canada. </span></p><span data-dcnode-id="838" instrument_node="">
</span></div><span data-dcnode-id="836" instrument_node="">
</span><div data-dcnode-id="822" id="p-208.30(e)(6)(ii)"><span data-dcnode-id="835" instrument_node="">
</span><p class="indent-3" data-dcnode-id="824" data-title="208.30(e)(6)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="829"><span class="paren" data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">(</span></span><span data-dcnode-id="832" instrument_node="">ii</span><span class="paren" data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">)</span></span></span><span data-dcnode-id="828" instrument_node=""> If the alien establishes by a preponderance of the evidence that he or she qualifies for an exception under the terms of the Agreement, the asylum officer shall make a written notation of the basis of the exception, and then proceed immediately to a determination concerning whether the alien has a credible fear of persecution, reasonable possibility of persecution, or reasonable possibility of torture under </span><a class="cfr external" data-dcnode-id="826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28d%29"><span data-dcnode-id="827" instrument_node="">paragraph (d)</span></a><span data-dcnode-id="825" instrument_node=""> of this section. </span></p><span data-dcnode-id="823" instrument_node="">
</span></div><span data-dcnode-id="821" instrument_node="">
</span><div data-dcnode-id="738" id="p-208.30(e)(6)(iii)"><span data-dcnode-id="820" instrument_node="">
</span><p class="indent-3" data-dcnode-id="812" data-title="208.30(e)(6)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="814"><span class="paren" data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">(</span></span><span data-dcnode-id="817" instrument_node="">iii</span><span class="paren" data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">)</span></span></span><span data-dcnode-id="813" instrument_node=""> An alien qualifies for an exception to the Agreement if the alien is not being removed from Canada in transit through the United States and: </span></p><span data-dcnode-id="811" instrument_node="">
</span><div data-dcnode-id="800" id="p-208.30(e)(6)(iii)(A)"><span data-dcnode-id="810" instrument_node="">
</span><p class="indent-4" data-dcnode-id="802" data-title="208.30(e)(6)(iii)(A)"><span class="paragraph-hierarchy" data-dcnode-id="804"><span class="paren" data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">(</span></span><span data-dcnode-id="807" instrument_node="">A</span><span class="paren" data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">)</span></span></span><span data-dcnode-id="803" instrument_node=""> Is a citizen of Canada or, not having a country of nationality, is a habitual resident of Canada; </span></p><span data-dcnode-id="801" instrument_node="">
</span></div><span data-dcnode-id="799" instrument_node="">
</span><div data-dcnode-id="788" id="p-208.30(e)(6)(iii)(B)"><span data-dcnode-id="798" instrument_node="">
</span><p class="indent-4" data-dcnode-id="790" data-title="208.30(e)(6)(iii)(B)"><span class="paragraph-hierarchy" data-dcnode-id="792"><span class="paren" data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">(</span></span><span data-dcnode-id="795" instrument_node="">B</span><span class="paren" data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">)</span></span></span><span data-dcnode-id="791" instrument_node=""> Has in the United States a spouse, son, daughter, parent, legal guardian, sibling, grandparent, grandchild, aunt, uncle, niece, or nephew who has been granted asylum, refugee, or other lawful status in the United States, provided, however, that this exception shall not apply to an alien whose relative maintains only nonimmigrant visitor status, as defined in section 101(a)(15)(B) of the Act, or whose relative maintains only visitor status based on admission to the United States pursuant to the Visa Waiver Program; </span></p><span data-dcnode-id="789" instrument_node="">
</span></div><span data-dcnode-id="787" instrument_node="">
</span><div data-dcnode-id="776" id="p-208.30(e)(6)(iii)(C)"><span data-dcnode-id="786" instrument_node="">
</span><p class="indent-4" data-dcnode-id="778" data-title="208.30(e)(6)(iii)(C)"><span class="paragraph-hierarchy" data-dcnode-id="780"><span class="paren" data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">(</span></span><span data-dcnode-id="783" instrument_node="">C</span><span class="paren" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">)</span></span></span><span data-dcnode-id="779" instrument_node=""> Has in the United States a spouse, son, daughter, parent, legal guardian, sibling, grandparent, grandchild, aunt, uncle, niece, or nephew who is at least 18 years of age and has an asylum application pending before U.S. Citizenship and Immigration Services, the Executive Office for Immigration Review, or on appeal in federal court in the United States; </span></p><span data-dcnode-id="777" instrument_node="">
</span></div><span data-dcnode-id="775" instrument_node="">
</span><div data-dcnode-id="764" id="p-208.30(e)(6)(iii)(D)"><span data-dcnode-id="774" instrument_node="">
</span><p class="indent-4" data-dcnode-id="766" data-title="208.30(e)(6)(iii)(D)"><span class="paragraph-hierarchy" data-dcnode-id="768"><span class="paren" data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">(</span></span><span data-dcnode-id="771" instrument_node="">D</span><span class="paren" data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">)</span></span></span><span data-dcnode-id="767" instrument_node=""> Is unmarried, under 18 years of age, and does not have a parent or legal guardian in either Canada or the United States; </span></p><span data-dcnode-id="765" instrument_node="">
</span></div><span data-dcnode-id="763" instrument_node="">
</span><div data-dcnode-id="752" id="p-208.30(e)(6)(iii)(E)"><span data-dcnode-id="762" instrument_node="">
</span><p class="indent-4" data-dcnode-id="754" data-title="208.30(e)(6)(iii)(E)"><span class="paragraph-hierarchy" data-dcnode-id="756"><span class="paren" data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">(</span></span><span data-dcnode-id="759" instrument_node="">E</span><span class="paren" data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">)</span></span></span><span data-dcnode-id="755" instrument_node=""> Arrived in the United States with a validly issued visa or other valid admission document, other than for transit, issued by the United States to the alien, or, being required to hold a visa to enter Canada, was not required to obtain a visa to enter the United States; or </span></p><span data-dcnode-id="753" instrument_node="">
</span></div><span data-dcnode-id="751" instrument_node="">
</span><div data-dcnode-id="740" id="p-208.30(e)(6)(iii)(F)"><span data-dcnode-id="750" instrument_node="">
