</span><p class="indent-4" data-dcnode-id="4619" data-title="208.13(c)(6)(vii)(E)"><span class="paragraph-hierarchy" data-dcnode-id="4621"><span class="paren" data-dcnode-id="4625"><span data-dcnode-id="4626" instrument_node="">(</span></span><span data-dcnode-id="4624" instrument_node="">E</span><span class="paren" data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">)</span></span></span><span data-dcnode-id="4620" instrument_node=""> Any other alien against a person who is protected from that alien's acts under the domestic or family violence laws of the United States or any State, tribal government, or unit of local government, even if the acts did not result in a criminal conviction; </span></p><span data-dcnode-id="4618" instrument_node="">
</span></div><span data-dcnode-id="4616" instrument_node="">
</span><div data-dcnode-id="4602" id="p-208.13(c)(6)(vii)(F)"><span data-dcnode-id="4615" instrument_node="">
</span><p class="indent-4" data-dcnode-id="4604" data-title="208.13(c)(6)(vii)(F)"><span class="paragraph-hierarchy" data-dcnode-id="4609"><span class="paren" data-dcnode-id="4613"><span data-dcnode-id="4614" instrument_node="">(</span></span><span data-dcnode-id="4612" instrument_node="">F</span><span class="paren" data-dcnode-id="4610"><span data-dcnode-id="4611" instrument_node="">)</span></span></span><span data-dcnode-id="4608" instrument_node=""> Except that an alien who was convicted of offenses or engaged in conduct described in </span><a class="cfr external" data-dcnode-id="4606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28c%29%286%29%28vii%29"><span data-dcnode-id="4607" instrument_node="">paragraph (c)(6)(vii)</span></a><span data-dcnode-id="4605" instrument_node=""> of this section is not subject to ineligibility for asylum on that basis if the alien would be described in section 237(a)(7)(A) of the Act were the crimes or conduct considered grounds for deportability under section 237(a)(2)(E)(i)-(ii) of the Act. </span></p><span data-dcnode-id="4603" instrument_node="">
</span></div><span data-dcnode-id="4601" instrument_node="">
</span></div><span data-dcnode-id="4599" instrument_node="">
</span></div><span data-dcnode-id="4597" instrument_node="">
</span><div data-dcnode-id="4499" id="p-208.13(c)(7)"><span data-dcnode-id="4596" instrument_node="">
</span><p class="indent-2" data-dcnode-id="4585" data-title="208.13(c)(7)"><span class="paragraph-hierarchy" data-dcnode-id="4590"><span class="paren" data-dcnode-id="4594"><span data-dcnode-id="4595" instrument_node="">(</span></span><span data-dcnode-id="4593" instrument_node="">7</span><span class="paren" data-dcnode-id="4591"><span data-dcnode-id="4592" instrument_node="">)</span></span></span><span data-dcnode-id="4589" instrument_node=""> For purposes of </span><a class="cfr external" data-dcnode-id="4587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28c%29%286%29"><span data-dcnode-id="4588" instrument_node="">paragraph (c)(6)</span></a><span data-dcnode-id="4586" instrument_node=""> of this section: </span></p><span data-dcnode-id="4584" instrument_node="">
</span><div data-dcnode-id="4573" id="p-208.13(c)(7)(i)"><span data-dcnode-id="4583" instrument_node="">
</span><p class="indent-3" data-dcnode-id="4575" data-title="208.13(c)(7)(i)"><span class="paragraph-hierarchy" data-dcnode-id="4577"><span class="paren" data-dcnode-id="4581"><span data-dcnode-id="4582" instrument_node="">(</span></span><span data-dcnode-id="4580" instrument_node="">i</span><span class="paren" data-dcnode-id="4578"><span data-dcnode-id="4579" instrument_node="">)</span></span></span><span data-dcnode-id="4576" instrument_node=""> The term “felony” means any crime defined as a felony by the relevant jurisdiction (Federal, State, tribal, or local) of conviction, or any crime punishable by more than one year of imprisonment. </span></p><span data-dcnode-id="4574" instrument_node="">
</span></div><span data-dcnode-id="4572" instrument_node="">
</span><div data-dcnode-id="4561" id="p-208.13(c)(7)(ii)"><span data-dcnode-id="4571" instrument_node="">
</span><p class="indent-3" data-dcnode-id="4563" data-title="208.13(c)(7)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="4565"><span class="paren" data-dcnode-id="4569"><span data-dcnode-id="4570" instrument_node="">(</span></span><span data-dcnode-id="4568" instrument_node="">ii</span><span class="paren" data-dcnode-id="4566"><span data-dcnode-id="4567" instrument_node="">)</span></span></span><span data-dcnode-id="4564" instrument_node=""> The term “misdemeanor” means any crime defined as a misdemeanor by the relevant jurisdiction (Federal, State, tribal, or local) of conviction, or any crime not punishable by more than one year of imprisonment. </span></p><span data-dcnode-id="4562" instrument_node="">
</span></div><span data-dcnode-id="4560" instrument_node="">
</span><div data-dcnode-id="4549" id="p-208.13(c)(7)(iii)"><span data-dcnode-id="4559" instrument_node="">
</span><p class="indent-3" data-dcnode-id="4551" data-title="208.13(c)(7)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="4553"><span class="paren" data-dcnode-id="4557"><span data-dcnode-id="4558" instrument_node="">(</span></span><span data-dcnode-id="4556" instrument_node="">iii</span><span class="paren" data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">)</span></span></span><span data-dcnode-id="4552" instrument_node=""> Whether any activity or conviction also may constitute a basis for removability under the Act is immaterial to a determination of asylum eligibility. </span></p><span data-dcnode-id="4550" instrument_node="">
</span></div><span data-dcnode-id="4548" instrument_node="">
</span><div data-dcnode-id="4537" id="p-208.13(c)(7)(iv)"><span data-dcnode-id="4547" instrument_node="">
</span><p class="indent-3" data-dcnode-id="4539" data-title="208.13(c)(7)(iv)"><span class="paragraph-hierarchy" data-dcnode-id="4541"><span class="paren" data-dcnode-id="4545"><span data-dcnode-id="4546" instrument_node="">(</span></span><span data-dcnode-id="4544" instrument_node="">iv</span><span class="paren" data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">)</span></span></span><span data-dcnode-id="4540" instrument_node=""> All references to a criminal offense or criminal conviction shall be deemed to include any attempt, conspiracy, or solicitation to commit the offense or any other inchoate form of the offense. </span></p><span data-dcnode-id="4538" instrument_node="">
</span></div><span data-dcnode-id="4536" instrument_node="">
</span><div data-dcnode-id="4501" id="p-208.13(c)(7)(v)"><span data-dcnode-id="4535" instrument_node="">
</span><p class="indent-3" data-dcnode-id="4527" data-title="208.13(c)(7)(v)"><span class="paragraph-hierarchy" data-dcnode-id="4529"><span class="paren" data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">(</span></span><span data-dcnode-id="4532" instrument_node="">v</span><span class="paren" data-dcnode-id="4530"><span data-dcnode-id="4531" instrument_node="">)</span></span></span><span data-dcnode-id="4528" instrument_node=""> No order vacating a conviction, modifying a sentence, clarifying a sentence, or otherwise altering a conviction or sentence, shall have any effect unless the asylum officer determines that - </span></p><span data-dcnode-id="4526" instrument_node="">
</span><div data-dcnode-id="4515" id="p-208.13(c)(7)(v)(A)"><span data-dcnode-id="4525" instrument_node="">
</span><p class="indent-4" data-dcnode-id="4517" data-title="208.13(c)(7)(v)(A)"><span class="paragraph-hierarchy" data-dcnode-id="4519"><span class="paren" data-dcnode-id="4523"><span data-dcnode-id="4524" instrument_node="">(</span></span><span data-dcnode-id="4522" instrument_node="">A</span><span class="paren" data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">)</span></span></span><span data-dcnode-id="4518" instrument_node=""> The court issuing the order had jurisdiction and authority to do so; and </span></p><span data-dcnode-id="4516" instrument_node="">
</span></div><span data-dcnode-id="4514" instrument_node="">
</span><div data-dcnode-id="4503" id="p-208.13(c)(7)(v)(B)"><span data-dcnode-id="4513" instrument_node="">
</span><p class="indent-4" data-dcnode-id="4505" data-title="208.13(c)(7)(v)(B)"><span class="paragraph-hierarchy" data-dcnode-id="4507"><span class="paren" data-dcnode-id="4511"><span data-dcnode-id="4512" instrument_node="">(</span></span><span data-dcnode-id="4510" instrument_node="">B</span><span class="paren" data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">)</span></span></span><span data-dcnode-id="4506" instrument_node=""> The order was not entered for rehabilitative purposes or for purposes of ameliorating the immigration consequences of the conviction or sentence. </span></p><span data-dcnode-id="4504" instrument_node="">
</span></div><span data-dcnode-id="4502" instrument_node="">
</span></div><span data-dcnode-id="4500" instrument_node="">
</span></div><span data-dcnode-id="4498" instrument_node="">
</span><div data-dcnode-id="4460" id="p-208.13(c)(8)"><span data-dcnode-id="4497" instrument_node="">
</span><p class="indent-2" data-dcnode-id="4486" data-title="208.13(c)(8)"><span class="paragraph-hierarchy" data-dcnode-id="4491"><span class="paren" data-dcnode-id="4495"><span data-dcnode-id="4496" instrument_node="">(</span></span><span data-dcnode-id="4494" instrument_node="">8</span><span class="paren" data-dcnode-id="4492"><span data-dcnode-id="4493" instrument_node="">)</span></span></span><span data-dcnode-id="4490" instrument_node=""> For purposes of </span><a class="cfr external" data-dcnode-id="4488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28c%29%287%29%28v%29%28B%29"><span data-dcnode-id="4489" instrument_node="">paragraph (c)(7)(v)(B)</span></a><span data-dcnode-id="4487" instrument_node=""> of this section, the order shall be presumed to be for the purpose of ameliorating immigration consequences if: </span></p><span data-dcnode-id="4485" instrument_node="">
</span><div data-dcnode-id="4474" id="p-208.13(c)(8)(i)"><span data-dcnode-id="4484" instrument_node="">
</span><p class="indent-3" data-dcnode-id="4476" data-title="208.13(c)(8)(i)"><span class="paragraph-hierarchy" data-dcnode-id="4478"><span class="paren" data-dcnode-id="4482"><span data-dcnode-id="4483" instrument_node="">(</span></span><span data-dcnode-id="4481" instrument_node="">i</span><span class="paren" data-dcnode-id="4479"><span data-dcnode-id="4480" instrument_node="">)</span></span></span><span data-dcnode-id="4477" instrument_node=""> The order was entered after the initiation of any proceeding to remove the alien from the United States; or </span></p><span data-dcnode-id="4475" instrument_node="">
</span></div><span data-dcnode-id="4473" instrument_node="">
</span><div data-dcnode-id="4462" id="p-208.13(c)(8)(ii)"><span data-dcnode-id="4472" instrument_node="">
</span><p class="indent-3" data-dcnode-id="4464" data-title="208.13(c)(8)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="4466"><span class="paren" data-dcnode-id="4470"><span data-dcnode-id="4471" instrument_node="">(</span></span><span data-dcnode-id="4469" instrument_node="">ii</span><span class="paren" data-dcnode-id="4467"><span data-dcnode-id="4468" instrument_node="">)</span></span></span><span data-dcnode-id="4465" instrument_node=""> The alien moved for the order more than one year after the date of the original order of conviction or sentencing. </span></p><span data-dcnode-id="4463" instrument_node="">
</span></div><span data-dcnode-id="4461" instrument_node="">
</span></div><span data-dcnode-id="4459" instrument_node="">
</span><div data-dcnode-id="4445" id="p-208.13(c)(9)"><span data-dcnode-id="4458" instrument_node="">
</span><p class="indent-2" data-dcnode-id="4447" data-title="208.13(c)(9)"><span class="paragraph-hierarchy" data-dcnode-id="4452"><span class="paren" data-dcnode-id="4456"><span data-dcnode-id="4457" instrument_node="">(</span></span><span data-dcnode-id="4455" instrument_node="">9</span><span class="paren" data-dcnode-id="4453"><span data-dcnode-id="4454" instrument_node="">)</span></span></span><span data-dcnode-id="4451" instrument_node=""> An asylum officer is authorized to look beyond the face of any order purporting to vacate a conviction, modify a sentence, or clarify a sentence to determine whether the requirements of </span><a class="cfr external" data-dcnode-id="4449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28c%29%287%29%28v%29"><span data-dcnode-id="4450" instrument_node="">paragraph (c)(7)(v)</span></a><span data-dcnode-id="4448" instrument_node=""> of this section have been met in order to determine whether such order should be given any effect under this section. </span></p><span data-dcnode-id="4446" instrument_node="">
</span></div><span data-dcnode-id="4444" instrument_node="">
</span></div><span data-dcnode-id="4442" instrument_node="">
</span><div data-dcnode-id="4041" id="p-208.13(d)"><span data-dcnode-id="4441" instrument_node="">
</span><p class="indent-1" data-dcnode-id="4430" data-title="208.13(d)"><span class="paragraph-hierarchy" data-dcnode-id="4435"><span class="paren" data-dcnode-id="4439"><span data-dcnode-id="4440" instrument_node="">(</span></span><span data-dcnode-id="4438" instrument_node="">d</span><span class="paren" data-dcnode-id="4436"><span data-dcnode-id="4437" instrument_node="">)</span></span></span><span data-dcnode-id="4434" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="4432"><span data-dcnode-id="4433" instrument_node="">Discretion.</span></em><span data-dcnode-id="4431" instrument_node="">  Factors that fall short of grounds of mandatory denial of an asylum application may constitute discretionary considerations. </span></p><span data-dcnode-id="4429" instrument_node="">
</span><div data-dcnode-id="4343" id="p-208.13(d)(1)"><span data-dcnode-id="4428" instrument_node="">
</span><p class="indent-2" data-dcnode-id="4420" data-title="208.13(d)(1)"><span class="paragraph-hierarchy" data-dcnode-id="4422"><span class="paren" data-dcnode-id="4426"><span data-dcnode-id="4427" instrument_node="">(</span></span><span data-dcnode-id="4425" instrument_node="">1</span><span class="paren" data-dcnode-id="4423"><span data-dcnode-id="4424" instrument_node="">)</span></span></span><span data-dcnode-id="4421" instrument_node=""> The following are significant adverse discretionary factors that a decision-maker shall consider, if applicable, in determining whether an alien merits a grant of asylum in the exercise of discretion: </span></p><span data-dcnode-id="4419" instrument_node="">
</span><div data-dcnode-id="4408" id="p-208.13(d)(1)(i)"><span data-dcnode-id="4418" instrument_node="">
</span><p class="indent-3" data-dcnode-id="4410" data-title="208.13(d)(1)(i)"><span class="paragraph-hierarchy" data-dcnode-id="4412"><span class="paren" data-dcnode-id="4416"><span data-dcnode-id="4417" instrument_node="">(</span></span><span data-dcnode-id="4415" instrument_node="">i</span><span class="paren" data-dcnode-id="4413"><span data-dcnode-id="4414" instrument_node="">)</span></span></span><span data-dcnode-id="4411" instrument_node=""> An alien's unlawful entry or unlawful attempted entry into the United States unless such entry or attempted entry was made in immediate flight from persecution in a contiguous country or unless such entry or attempted entry was made by an alien under the age of 18 at the time the entry or attempted entry was made; </span></p><span data-dcnode-id="4409" instrument_node="">
</span></div><span data-dcnode-id="4407" instrument_node="">
</span><div data-dcnode-id="4357" id="p-208.13(d)(1)(ii)"><span data-dcnode-id="4406" instrument_node="">
</span><p class="indent-3" data-dcnode-id="4398" data-title="208.13(d)(1)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="4400"><span class="paren" data-dcnode-id="4404"><span data-dcnode-id="4405" instrument_node="">(</span></span><span data-dcnode-id="4403" instrument_node="">ii</span><span class="paren" data-dcnode-id="4401"><span data-dcnode-id="4402" instrument_node="">)</span></span></span><span data-dcnode-id="4399" instrument_node=""> The failure of an alien to apply for protection from persecution or torture in at least one country outside the alien's country of citizenship, nationality, or last lawful habitual residence through which the alien transited before entering the United States unless: </span></p><span data-dcnode-id="4397" instrument_node="">
</span><div data-dcnode-id="4386" id="p-208.13(d)(1)(ii)(A)"><span data-dcnode-id="4396" instrument_node="">
</span><p class="indent-4" data-dcnode-id="4388" data-title="208.13(d)(1)(ii)(A)"><span class="paragraph-hierarchy" data-dcnode-id="4390"><span class="paren" data-dcnode-id="4394"><span data-dcnode-id="4395" instrument_node="">(</span></span><span data-dcnode-id="4393" instrument_node="">A</span><span class="paren" data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">)</span></span></span><span data-dcnode-id="4389" instrument_node=""> The alien received a final judgment denying the alien protection in such country; </span></p><span data-dcnode-id="4387" instrument_node="">
</span></div><span data-dcnode-id="4385" instrument_node="">
</span><div data-dcnode-id="4371" id="p-208.13(d)(1)(ii)(B)"><span data-dcnode-id="4384" instrument_node="">
</span><p class="indent-4" data-dcnode-id="4373" data-title="208.13(d)(1)(ii)(B)"><span class="paragraph-hierarchy" data-dcnode-id="4378"><span class="paren" data-dcnode-id="4382"><span data-dcnode-id="4383" instrument_node="">(</span></span><span data-dcnode-id="4381" instrument_node="">B</span><span class="paren" data-dcnode-id="4379"><span data-dcnode-id="4380" instrument_node="">)</span></span></span><span data-dcnode-id="4377" instrument_node=""> The alien demonstrates that he or she satisfies the definition of “victim of a severe form of trafficking in persons” provided in </span><a class="cfr external" data-dcnode-id="4375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-214.11"><span data-dcnode-id="4376" instrument_node="">8 CFR 214.11</span></a><span data-dcnode-id="4374" instrument_node="">; or </span></p><span data-dcnode-id="4372" instrument_node="">
</span></div><span data-dcnode-id="4370" instrument_node="">
</span><div data-dcnode-id="4359" id="p-208.13(d)(1)(ii)(C)"><span data-dcnode-id="4369" instrument_node="">
</span><p class="indent-4" data-dcnode-id="4361" data-title="208.13(d)(1)(ii)(C)"><span class="paragraph-hierarchy" data-dcnode-id="4363"><span class="paren" data-dcnode-id="4367"><span data-dcnode-id="4368" instrument_node="">(</span></span><span data-dcnode-id="4366" instrument_node="">C</span><span class="paren" data-dcnode-id="4364"><span data-dcnode-id="4365" instrument_node="">)</span></span></span><span data-dcnode-id="4362" instrument_node=""> Such country or all such countries were, at the time of the transit, not parties to the 1951 Convention relating to the Status of Refugees, the 1967 Protocol relating to the Status of Refugees, or the Convention Against Torture and Other Cruel, Inhuman or Degrading Treatment or Punishment; and </span></p><span data-dcnode-id="4360" instrument_node="">
</span></div><span data-dcnode-id="4358" instrument_node="">
</span></div><span data-dcnode-id="4356" instrument_node="">
</span><div data-dcnode-id="4345" id="p-208.13(d)(1)(iii)"><span data-dcnode-id="4355" instrument_node="">
</span><p class="indent-3" data-dcnode-id="4347" data-title="208.13(d)(1)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="4349"><span class="paren" data-dcnode-id="4353"><span data-dcnode-id="4354" instrument_node="">(</span></span><span data-dcnode-id="4352" instrument_node="">iii</span><span class="paren" data-dcnode-id="4350"><span data-dcnode-id="4351" instrument_node="">)</span></span></span><span data-dcnode-id="4348" instrument_node=""> An alien's use of fraudulent documents to enter the United States, unless the alien arrived in the United States by air, sea, or land directly from the applicant's home country without transiting through any other country. </span></p><span data-dcnode-id="4346" instrument_node="">
</span></div><span data-dcnode-id="4344" instrument_node="">
</span></div><span data-dcnode-id="4342" instrument_node="">
</span><div data-dcnode-id="4043" id="p-208.13(d)(2)"><span data-dcnode-id="4341" instrument_node="">
</span><p class="indent-2" data-dcnode-id="4333" data-title="208.13(d)(2)"><span class="paragraph-hierarchy" data-dcnode-id="4335"><span class="paren" data-dcnode-id="4339"><span data-dcnode-id="4340" instrument_node="">(</span></span><span data-dcnode-id="4338" instrument_node="">2</span><span class="paren" data-dcnode-id="4336"><span data-dcnode-id="4337" instrument_node="">)</span></span></span><span data-dcnode-id="4334" instrument_node=""> </span></p><span data-dcnode-id="4332" instrument_node="">
</span><div data-dcnode-id="4058" id="p-208.13(d)(2)(i)"><span data-dcnode-id="4331" instrument_node="">
</span><p class="indent-3" data-dcnode-id="4320" data-title="208.13(d)(2)(i)"><span class="paragraph-hierarchy" data-dcnode-id="4325"><span class="paren" data-dcnode-id="4329"><span data-dcnode-id="4330" instrument_node="">(</span></span><span data-dcnode-id="4328" instrument_node="">i</span><span class="paren" data-dcnode-id="4326"><span data-dcnode-id="4327" instrument_node="">)</span></span></span><span data-dcnode-id="4324" instrument_node=""> The Secretary, except as provided in </span><a class="cfr external" data-dcnode-id="4322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28d%29%282%29%28ii%29"><span data-dcnode-id="4323" instrument_node="">paragraph (d)(2)(ii)</span></a><span data-dcnode-id="4321" instrument_node=""> of this section, will not favorably exercise discretion under section 208 of the Act for an alien who: </span></p><span data-dcnode-id="4319" instrument_node="">
</span><div data-dcnode-id="4266" id="p-208.13(d)(2)(i)(A)"><span data-dcnode-id="4318" instrument_node="">
</span><p class="indent-4" data-dcnode-id="4310" data-title="208.13(d)(2)(i)(A)"><span class="paragraph-hierarchy" data-dcnode-id="4312"><span class="paren" data-dcnode-id="4316"><span data-dcnode-id="4317" instrument_node="">(</span></span><span data-dcnode-id="4315" instrument_node="">A</span><span class="paren" data-dcnode-id="4313"><span data-dcnode-id="4314" instrument_node="">)</span></span></span><span data-dcnode-id="4311" instrument_node=""> Immediately prior to his arrival in the United States or en route to the United States from the alien's country of citizenship, nationality, or last lawful habitual residence, spent more than 14 days in any one country unless: </span></p><span data-dcnode-id="4309" instrument_node="">
</span><div data-dcnode-id="4297" id="p-208.13(d)(2)(i)(A)(1)"><span data-dcnode-id="4308" instrument_node="">
</span><p class="indent-5" data-dcnode-id="4299" data-title="208.13(d)(2)(i)(A)(<em>1</em>)"><span class="paragraph-hierarchy" data-dcnode-id="4301"><span class="paren" data-dcnode-id="4306"><span data-dcnode-id="4307" instrument_node="">(</span></span><em data-dcnode-id="4304"><span data-dcnode-id="4305" instrument_node="">1</span></em><span class="paren" data-dcnode-id="4302"><span data-dcnode-id="4303" instrument_node="">)</span></span></span><span data-dcnode-id="4300" instrument_node=""> The alien demonstrates that he or she applied for protection from persecution or torture in such country and the alien received a final judgment denying the alien protection in such country; </span></p><span data-dcnode-id="4298" instrument_node="">
</span></div><span data-dcnode-id="4296" instrument_node="">
</span><div data-dcnode-id="4281" id="p-208.13(d)(2)(i)(A)(2)"><span data-dcnode-id="4295" instrument_node="">
</span><p class="indent-5" data-dcnode-id="4283" data-title="208.13(d)(2)(i)(A)(<em>2</em>)"><span class="paragraph-hierarchy" data-dcnode-id="4288"><span class="paren" data-dcnode-id="4293"><span data-dcnode-id="4294" instrument_node="">(</span></span><em data-dcnode-id="4291"><span data-dcnode-id="4292" instrument_node="">2</span></em><span class="paren" data-dcnode-id="4289"><span data-dcnode-id="4290" instrument_node="">)</span></span></span><span data-dcnode-id="4287" instrument_node=""> The alien demonstrates that he or she satisfies the definition of “victim of a severe form of trafficking in persons” provided in </span><a class="cfr external" data-dcnode-id="4285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-214.11"><span data-dcnode-id="4286" instrument_node="">8 CFR 214.11</span></a><span data-dcnode-id="4284" instrument_node="">; or </span></p><span data-dcnode-id="4282" instrument_node="">
</span></div><span data-dcnode-id="4280" instrument_node="">
</span><div data-dcnode-id="4268" id="p-208.13(d)(2)(i)(A)(3)"><span data-dcnode-id="4279" instrument_node="">
</span><p class="indent-5" data-dcnode-id="4270" data-title="208.13(d)(2)(i)(A)(<em>3</em>)"><span class="paragraph-hierarchy" data-dcnode-id="4272"><span class="paren" data-dcnode-id="4277"><span data-dcnode-id="4278" instrument_node="">(</span></span><em data-dcnode-id="4275"><span data-dcnode-id="4276" instrument_node="">3</span></em><span class="paren" data-dcnode-id="4273"><span data-dcnode-id="4274" instrument_node="">)</span></span></span><span data-dcnode-id="4271" instrument_node=""> Such country was, at the time of the transit, not a party to the 1951 Convention relating to the Status of Refugees, the 1967 Protocol relating to the Status of Refugees, or the Convention against Torture and Other Cruel, Inhuman or Degrading Treatment or Punishment; </span></p><span data-dcnode-id="4269" instrument_node="">
</span></div><span data-dcnode-id="4267" instrument_node="">
</span></div><span data-dcnode-id="4265" instrument_node="">
</span><div data-dcnode-id="4212" id="p-208.13(d)(2)(i)(B)"><span data-dcnode-id="4264" instrument_node="">
</span><p class="indent-4" data-dcnode-id="4256" data-title="208.13(d)(2)(i)(B)"><span class="paragraph-hierarchy" data-dcnode-id="4258"><span class="paren" data-dcnode-id="4262"><span data-dcnode-id="4263" instrument_node="">(</span></span><span data-dcnode-id="4261" instrument_node="">B</span><span class="paren" data-dcnode-id="4259"><span data-dcnode-id="4260" instrument_node="">)</span></span></span><span data-dcnode-id="4257" instrument_node=""> Transits through more than one country between his country of citizenship, nationality, or last habitual residence and the United States unless: </span></p><span data-dcnode-id="4255" instrument_node="">
</span><div data-dcnode-id="4243" id="p-208.13(d)(2)(i)(B)(1)"><span data-dcnode-id="4254" instrument_node="">
</span><p class="indent-5" data-dcnode-id="4245" data-title="208.13(d)(2)(i)(B)(<em>1</em>)"><span class="paragraph-hierarchy" data-dcnode-id="4247"><span class="paren" data-dcnode-id="4252"><span data-dcnode-id="4253" instrument_node="">(</span></span><em data-dcnode-id="4250"><span data-dcnode-id="4251" instrument_node="">1</span></em><span class="paren" data-dcnode-id="4248"><span data-dcnode-id="4249" instrument_node="">)</span></span></span><span data-dcnode-id="4246" instrument_node=""> The alien demonstrates that he or she applied for protection from persecution or torture in at least one such country and received a final judgment denying the alien protection in that country; </span></p><span data-dcnode-id="4244" instrument_node="">
</span></div><span data-dcnode-id="4242" instrument_node="">
</span><div data-dcnode-id="4227" id="p-208.13(d)(2)(i)(B)(2)"><span data-dcnode-id="4241" instrument_node="">
</span><p class="indent-5" data-dcnode-id="4229" data-title="208.13(d)(2)(i)(B)(<em>2</em>)"><span class="paragraph-hierarchy" data-dcnode-id="4234"><span class="paren" data-dcnode-id="4239"><span data-dcnode-id="4240" instrument_node="">(</span></span><em data-dcnode-id="4237"><span data-dcnode-id="4238" instrument_node="">2</span></em><span class="paren" data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">)</span></span></span><span data-dcnode-id="4233" instrument_node=""> The alien demonstrates that he or she satisfies the definition of “victim of a severe form of trafficking in persons” provided in </span><a class="cfr external" data-dcnode-id="4231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-214.11"><span data-dcnode-id="4232" instrument_node="">8 CFR 214.11</span></a><span data-dcnode-id="4230" instrument_node="">; or </span></p><span data-dcnode-id="4228" instrument_node="">
</span></div><span data-dcnode-id="4226" instrument_node="">
</span><div data-dcnode-id="4214" id="p-208.13(d)(2)(i)(B)(3)"><span data-dcnode-id="4225" instrument_node="">
</span><p class="indent-5" data-dcnode-id="4216" data-title="208.13(d)(2)(i)(B)(<em>3</em>)"><span class="paragraph-hierarchy" data-dcnode-id="4218"><span class="paren" data-dcnode-id="4223"><span data-dcnode-id="4224" instrument_node="">(</span></span><em data-dcnode-id="4221"><span data-dcnode-id="4222" instrument_node="">3</span></em><span class="paren" data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">)</span></span></span><span data-dcnode-id="4217" instrument_node=""> All such countries were, at the time of the transit, not parties to the 1951 Convention relating to the Status of Refugees, the 1967 Protocol relating to the Status of Refugees, or the Convention against Torture and Other Cruel, Inhuman or Degrading Treatment or Punishment; </span></p><span data-dcnode-id="4215" instrument_node="">
</span></div><span data-dcnode-id="4213" instrument_node="">
</span></div><span data-dcnode-id="4211" instrument_node="">
</span><div data-dcnode-id="4197" id="p-208.13(d)(2)(i)(C)"><span data-dcnode-id="4210" instrument_node="">
</span><p class="indent-4" data-dcnode-id="4199" data-title="208.13(d)(2)(i)(C)"><span class="paragraph-hierarchy" data-dcnode-id="4204"><span class="paren" data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">(</span></span><span data-dcnode-id="4207" instrument_node="">C</span><span class="paren" data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">)</span></span></span><span data-dcnode-id="4203" instrument_node=""> Would otherwise be subject to </span><a class="cfr external" data-dcnode-id="4201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28c%29"><span data-dcnode-id="4202" instrument_node="">§ 208.13(c)</span></a><span data-dcnode-id="4200" instrument_node=""> but for the reversal, vacatur, expungement, or modification of a conviction or sentence, unless the alien was found not guilty; </span></p><span data-dcnode-id="4198" instrument_node="">
</span></div><span data-dcnode-id="4196" instrument_node="">
</span><div data-dcnode-id="4185" id="p-208.13(d)(2)(i)(D)"><span data-dcnode-id="4195" instrument_node="">
</span><p class="indent-4" data-dcnode-id="4187" data-title="208.13(d)(2)(i)(D)"><span class="paragraph-hierarchy" data-dcnode-id="4189"><span class="paren" data-dcnode-id="4193"><span data-dcnode-id="4194" instrument_node="">(</span></span><span data-dcnode-id="4192" instrument_node="">D</span><span class="paren" data-dcnode-id="4190"><span data-dcnode-id="4191" instrument_node="">)</span></span></span><span data-dcnode-id="4188" instrument_node=""> Accrued more than one year of unlawful presence in the United States, as defined in sections 212(a)(9)(B)(ii) and (iii) of the Act, prior to filing an application for asylum; </span></p><span data-dcnode-id="4186" instrument_node="">
</span></div><span data-dcnode-id="4184" instrument_node="">
</span><div data-dcnode-id="4134" id="p-208.13(d)(2)(i)(E)"><span data-dcnode-id="4183" instrument_node="">
</span><p class="indent-4" data-dcnode-id="4175" data-title="208.13(d)(2)(i)(E)"><span class="paragraph-hierarchy" data-dcnode-id="4177"><span class="paren" data-dcnode-id="4181"><span data-dcnode-id="4182" instrument_node="">(</span></span><span data-dcnode-id="4180" instrument_node="">E</span><span class="paren" data-dcnode-id="4178"><span data-dcnode-id="4179" instrument_node="">)</span></span></span><span data-dcnode-id="4176" instrument_node=""> At the time the asylum application is filed with DHS has: </span></p><span data-dcnode-id="4174" instrument_node="">
</span><div data-dcnode-id="4162" id="p-208.13(d)(2)(i)(E)(1)"><span data-dcnode-id="4173" instrument_node="">
</span><p class="indent-5" data-dcnode-id="4164" data-title="208.13(d)(2)(i)(E)(<em>1</em>)"><span class="paragraph-hierarchy" data-dcnode-id="4166"><span class="paren" data-dcnode-id="4171"><span data-dcnode-id="4172" instrument_node="">(</span></span><em data-dcnode-id="4169"><span data-dcnode-id="4170" instrument_node="">1</span></em><span class="paren" data-dcnode-id="4167"><span data-dcnode-id="4168" instrument_node="">)</span></span></span><span data-dcnode-id="4165" instrument_node=""> Failed to timely file (or timely file a request for an extension of time to file) any required Federal, State, or local income tax returns; </span></p><span data-dcnode-id="4163" instrument_node="">
</span></div><span data-dcnode-id="4161" instrument_node="">
</span><div data-dcnode-id="4149" id="p-208.13(d)(2)(i)(E)(2)"><span data-dcnode-id="4160" instrument_node="">
</span><p class="indent-5" data-dcnode-id="4151" data-title="208.13(d)(2)(i)(E)(<em>2</em>)"><span class="paragraph-hierarchy" data-dcnode-id="4153"><span class="paren" data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">(</span></span><em data-dcnode-id="4156"><span data-dcnode-id="4157" instrument_node="">2</span></em><span class="paren" data-dcnode-id="4154"><span data-dcnode-id="4155" instrument_node="">)</span></span></span><span data-dcnode-id="4152" instrument_node=""> Failed to satisfy any outstanding Federal, State, or local tax obligations; or </span></p><span data-dcnode-id="4150" instrument_node="">
</span></div><span data-dcnode-id="4148" instrument_node="">
</span><div data-dcnode-id="4136" id="p-208.13(d)(2)(i)(E)(3)"><span data-dcnode-id="4147" instrument_node="">
</span><p class="indent-5" data-dcnode-id="4138" data-title="208.13(d)(2)(i)(E)(<em>3</em>)"><span class="paragraph-hierarchy" data-dcnode-id="4140"><span class="paren" data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">(</span></span><em data-dcnode-id="4143"><span data-dcnode-id="4144" instrument_node="">3</span></em><span class="paren" data-dcnode-id="4141"><span data-dcnode-id="4142" instrument_node="">)</span></span></span><span data-dcnode-id="4139" instrument_node=""> Has income that would result in tax liability under section 1 of the Internal Revenue Code of 1986 and that was not reported to the Internal Revenue Service; </span></p><span data-dcnode-id="4137" instrument_node="">
</span></div><span data-dcnode-id="4135" instrument_node="">
</span></div><span data-dcnode-id="4133" instrument_node="">
</span><div data-dcnode-id="4122" id="p-208.13(d)(2)(i)(F)"><span data-dcnode-id="4132" instrument_node="">
</span><p class="indent-4" data-dcnode-id="4124" data-title="208.13(d)(2)(i)(F)"><span class="paragraph-hierarchy" data-dcnode-id="4126"><span class="paren" data-dcnode-id="4130"><span data-dcnode-id="4131" instrument_node="">(</span></span><span data-dcnode-id="4129" instrument_node="">F</span><span class="paren" data-dcnode-id="4127"><span data-dcnode-id="4128" instrument_node="">)</span></span></span><span data-dcnode-id="4125" instrument_node=""> Has had two or more prior asylum applications denied for any reason; </span></p><span data-dcnode-id="4123" instrument_node="">
</span></div><span data-dcnode-id="4121" instrument_node="">
</span><div data-dcnode-id="4110" id="p-208.13(d)(2)(i)(G)"><span data-dcnode-id="4120" instrument_node="">
</span><p class="indent-4" data-dcnode-id="4112" data-title="208.13(d)(2)(i)(G)"><span class="paragraph-hierarchy" data-dcnode-id="4114"><span class="paren" data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node="">(</span></span><span data-dcnode-id="4117" instrument_node="">G</span><span class="paren" data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">)</span></span></span><span data-dcnode-id="4113" instrument_node=""> Has withdrawn a prior asylum application with prejudice or been found to have abandoned a prior asylum application; </span></p><span data-dcnode-id="4111" instrument_node="">
</span></div><span data-dcnode-id="4109" instrument_node="">
</span><div data-dcnode-id="4072" id="p-208.13(d)(2)(i)(H)"><span data-dcnode-id="4108" instrument_node="">
</span><p class="indent-4" data-dcnode-id="4100" data-title="208.13(d)(2)(i)(H)"><span class="paragraph-hierarchy" data-dcnode-id="4102"><span class="paren" data-dcnode-id="4106"><span data-dcnode-id="4107" instrument_node="">(</span></span><span data-dcnode-id="4105" instrument_node="">H</span><span class="paren" data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">)</span></span></span><span data-dcnode-id="4101" instrument_node=""> Failed to attend an interview regarding his asylum application with DHS, unless the alien shows by a preponderance of the evidence that: </span></p><span data-dcnode-id="4099" instrument_node="">
</span><div data-dcnode-id="4087" id="p-208.13(d)(2)(i)(H)(1)"><span data-dcnode-id="4098" instrument_node="">
</span><p class="indent-5" data-dcnode-id="4089" data-title="208.13(d)(2)(i)(H)(<em>1</em>)"><span class="paragraph-hierarchy" data-dcnode-id="4091"><span class="paren" data-dcnode-id="4096"><span data-dcnode-id="4097" instrument_node="">(</span></span><em data-dcnode-id="4094"><span data-dcnode-id="4095" instrument_node="">1</span></em><span class="paren" data-dcnode-id="4092"><span data-dcnode-id="4093" instrument_node="">)</span></span></span><span data-dcnode-id="4090" instrument_node=""> Exceptional circumstances prevented the alien from attending the interview; or </span></p><span data-dcnode-id="4088" instrument_node="">
</span></div><span data-dcnode-id="4086" instrument_node="">
</span><div data-dcnode-id="4074" id="p-208.13(d)(2)(i)(H)(2)"><span data-dcnode-id="4085" instrument_node="">
</span><p class="indent-5" data-dcnode-id="4076" data-title="208.13(d)(2)(i)(H)(<em>2</em>)"><span class="paragraph-hierarchy" data-dcnode-id="4078"><span class="paren" data-dcnode-id="4083"><span data-dcnode-id="4084" instrument_node="">(</span></span><em data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">2</span></em><span class="paren" data-dcnode-id="4079"><span data-dcnode-id="4080" instrument_node="">)</span></span></span><span data-dcnode-id="4077" instrument_node=""> The interview notice was not mailed to the last address provided by the alien or his or her representative and neither the alien nor the alien's representative received notice of the interview; or </span></p><span data-dcnode-id="4075" instrument_node="">
</span></div><span data-dcnode-id="4073" instrument_node="">
</span></div><span data-dcnode-id="4071" instrument_node="">
</span><div data-dcnode-id="4060" id="p-208.13(d)(2)(i)(I)"><span data-dcnode-id="4070" instrument_node="">
</span><p class="indent-4" data-dcnode-id="4062" data-title="208.13(d)(2)(i)(I)"><span class="paragraph-hierarchy" data-dcnode-id="4064"><span class="paren" data-dcnode-id="4068"><span data-dcnode-id="4069" instrument_node="">(</span></span><span data-dcnode-id="4067" instrument_node="">I</span><span class="paren" data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node="">)</span></span></span><span data-dcnode-id="4063" instrument_node=""> Was subject to a final order of removal, deportation, or exclusion and did not file a motion to reopen to seek asylum based on changed country conditions within one year of those changes in country conditions. </span></p><span data-dcnode-id="4061" instrument_node="">
</span></div><span data-dcnode-id="4059" instrument_node="">
</span></div><span data-dcnode-id="4057" instrument_node="">
</span><div data-dcnode-id="4045" id="p-208.13(d)(2)(ii)"><p class="indent-3" data-dcnode-id="4046" data-title="208.13(d)(2)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="4051"><span class="paren" data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">(</span></span><span data-dcnode-id="4054" instrument_node="">ii</span><span class="paren" data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">)</span></span></span><span data-dcnode-id="4050" instrument_node=""> Where one or more of the adverse discretionary factors set forth in </span><a class="cfr external" data-dcnode-id="4048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28d%29%282%29%28i%29"><span data-dcnode-id="4049" instrument_node="">paragraph (d)(2)(i)</span></a><span data-dcnode-id="4047" instrument_node=""> of this section are present, the Secretary, in extraordinary circumstances, such as those involving national security or foreign policy considerations, or cases in which an alien, by clear and convincing evidence, demonstrates that the denial or referral (which may result in the denial by an immigration judge) of the application for asylum would result in exceptional and extremely unusual hardship to the alien, may favorably exercise discretion under section 208 of the Act, notwithstanding the applicability of paragraph (d)(2)(i). Depending on the gravity of the circumstances underlying the application of paragraph (d)(2)(i), a showing of extraordinary circumstances might still be insufficient to warrant a favorable exercise of discretion under section 208 of the Act. </span></p></div><span data-dcnode-id="4044" instrument_node="">
</span></div><span data-dcnode-id="4042" instrument_node="">
</span></div><span data-dcnode-id="4040" instrument_node="">
</span><p class="citation" data-dcnode-id="4014"><span data-dcnode-id="4039" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="4037" data-reference="62 FR 10337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/62-FR-10337"><span data-dcnode-id="4038" instrument_node="">62 FR 10337</span></a><span data-dcnode-id="4036" instrument_node="">, Mar. 6, 1997, as amended at </span><a class="fr-reference" data-dcnode-id="4034" data-reference="64 FR 8488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/64-FR-8488"><span data-dcnode-id="4035" instrument_node="">64 FR 8488</span></a><span data-dcnode-id="4033" instrument_node="">, Feb. 19, 1999; </span><a class="fr-reference" data-dcnode-id="4031" data-reference="65 FR 76133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/65-FR-76133"><span data-dcnode-id="4032" instrument_node="">65 FR 76133</span></a><span data-dcnode-id="4030" instrument_node="">, Dec. 6, 2000; </span><a class="fr-reference" data-dcnode-id="4028" data-reference="83 FR 55952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/83-FR-55952"><span data-dcnode-id="4029" instrument_node="">83 FR 55952</span></a><span data-dcnode-id="4027" instrument_node="">, Nov. 9, 2018; </span><a class="fr-reference" data-dcnode-id="4025" data-reference="84 FR 33843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/84-FR-33843"><span data-dcnode-id="4026" instrument_node="">84 FR 33843</span></a><span data-dcnode-id="4024" instrument_node="">, July 16, 2019; </span><a class="fr-reference" data-dcnode-id="4022" data-reference="85 FR 67258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-67258"><span data-dcnode-id="4023" instrument_node="">85 FR 67258</span></a><span data-dcnode-id="4021" instrument_node="">, Oct. 21, 2020; </span><a class="fr-reference" data-dcnode-id="4019" data-reference="85 FR 80387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-80387"><span data-dcnode-id="4020" instrument_node="">85 FR 80387</span></a><span data-dcnode-id="4018" instrument_node="">, Dec. 11, 2020; </span><a class="fr-reference" data-dcnode-id="4016" data-reference="85 FR 82289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-82289"><span data-dcnode-id="4017" instrument_node="">85 FR 82289</span></a><span data-dcnode-id="4015" instrument_node="">, Dec. 17, 2020] </span></p><span data-dcnode-id="4013" instrument_node="">
</span></div><span data-dcnode-id="4011" instrument_node="">
</span><div class="section" data-dcnode-id="3710" id="208.14"><span data-dcnode-id="4010" instrument_node="">
</span><h4 data-dcnode-id="4007"><a class="direct" data-dcnode-id="4008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.14"><span data-dcnode-id="4009" instrument_node="">§ 208.14 Approval, denial, referral, or dismissal of application.</span></a></h4><span data-dcnode-id="4006" instrument_node="">
</span><div class="fr-cross-reference" data-dcnode-id="3992"><div class="box box-enhanced no-footer" data-dcnode-id="3993"><span data-dcnode-id="4005" instrument_node="">
</span><div class="seal-block seal-block-header" data-dcnode-id="4001"><div class="seal-content" data-dcnode-id="4002"><h6 data-dcnode-id="4003"><span data-dcnode-id="4004" instrument_node="">Cross Reference</span></h6></div></div><span data-dcnode-id="4000" instrument_node="">
</span><div class="content-block" data-dcnode-id="3995"><span data-dcnode-id="3999" instrument_node="">Link to an amendment published at </span><a class="fr-reference" data-dcnode-id="3997" data-reference="87 FR 18217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/87-FR-18217"><span data-dcnode-id="3998" instrument_node="">87 FR 18217</span></a><span data-dcnode-id="3996" instrument_node="">, Mar. 29, 2022.</span></div><span data-dcnode-id="3994" instrument_node="">
</span></div></div><span data-dcnode-id="3991" instrument_node="">
</span><div data-dcnode-id="3974" id="p-208.14(a)"><span data-dcnode-id="3990" instrument_node="">
</span><p class="indent-1" data-dcnode-id="3976" data-title="208.14(a)"><span class="paragraph-hierarchy" data-dcnode-id="3984"><span class="paren" data-dcnode-id="3988"><span data-dcnode-id="3989" instrument_node="">(</span></span><span data-dcnode-id="3987" instrument_node="">a</span><span class="paren" data-dcnode-id="3985"><span data-dcnode-id="3986" instrument_node="">)</span></span></span><span data-dcnode-id="3983" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3981"><span data-dcnode-id="3982" instrument_node="">By an immigration judge.</span></em><span data-dcnode-id="3980" instrument_node="">  Unless otherwise prohibited in </span><a class="cfr external" data-dcnode-id="3978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28c%29"><span data-dcnode-id="3979" instrument_node="">§ 208.13(c)</span></a><span data-dcnode-id="3977" instrument_node="">, an immigration judge may grant or deny asylum in the exercise of discretion to an applicant who qualifies as a refugee under section 101(a)(42) of the Act. </span></p><span data-dcnode-id="3975" instrument_node="">
</span></div><span data-dcnode-id="3973" instrument_node="">
</span><div data-dcnode-id="3956" id="p-208.14(b)"><span data-dcnode-id="3972" instrument_node="">
</span><p class="indent-1" data-dcnode-id="3958" data-title="208.14(b)"><span class="paragraph-hierarchy" data-dcnode-id="3966"><span class="paren" data-dcnode-id="3970"><span data-dcnode-id="3971" instrument_node="">(</span></span><span data-dcnode-id="3969" instrument_node="">b</span><span class="paren" data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">)</span></span></span><span data-dcnode-id="3965" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">Approval by an asylum officer.</span></em><span data-dcnode-id="3962" instrument_node="">  In any case within the jurisdiction of the RAIO, unless otherwise prohibited in </span><a class="cfr external" data-dcnode-id="3960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.13%23p-208.13%28c%29"><span data-dcnode-id="3961" instrument_node="">§ 208.13(c)</span></a><span data-dcnode-id="3959" instrument_node="">, an asylum officer may grant, in the exercise of his or her discretion, asylum to an applicant who qualifies as a refugee under section 101(a)(42) of the Act, and whose identity has been checked pursuant to section 208(d)(5)(A)(i) of the Act. </span></p><span data-dcnode-id="3957" instrument_node="">
</span></div><span data-dcnode-id="3955" instrument_node="">
</span><div data-dcnode-id="3797" id="p-208.14(c)"><span data-dcnode-id="3954" instrument_node="">
</span><p class="indent-1" data-dcnode-id="3937" data-title="208.14(c)"><span class="paragraph-hierarchy" data-dcnode-id="3948"><span class="paren" data-dcnode-id="3952"><span data-dcnode-id="3953" instrument_node="">(</span></span><span data-dcnode-id="3951" instrument_node="">c</span><span class="paren" data-dcnode-id="3949"><span data-dcnode-id="3950" instrument_node="">)</span></span></span><span data-dcnode-id="3947" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">Denial, referral, or dismissal by an asylum officer.</span></em><span data-dcnode-id="3944" instrument_node="">  If the asylum officer does not grant asylum to an applicant after an interview conducted in accordance with </span><a class="cfr external" data-dcnode-id="3942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.9"><span data-dcnode-id="3943" instrument_node="">§ 208.9</span></a><span data-dcnode-id="3941" instrument_node="">, or if, as provided in </span><a class="cfr external" data-dcnode-id="3939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.10"><span data-dcnode-id="3940" instrument_node="">§ 208.10</span></a><span data-dcnode-id="3938" instrument_node="">, the applicant is deemed to have waived his or her right to an interview or an adjudication by an asylum officer, the asylum officer shall deny, refer, or dismiss the application, as follows: </span></p><span data-dcnode-id="3936" instrument_node="">
</span><div data-dcnode-id="3919" id="p-208.14(c)(1)"><span data-dcnode-id="3935" instrument_node="">
</span><p class="indent-2" data-dcnode-id="3921" data-title="208.14(c)(1)"><span class="paragraph-hierarchy" data-dcnode-id="3929"><span class="paren" data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">(</span></span><span data-dcnode-id="3932" instrument_node="">1</span><span class="paren" data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">)</span></span></span><span data-dcnode-id="3928" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">Inadmissible or deportable aliens.</span></em><span data-dcnode-id="3925" instrument_node="">  Except as provided in </span><a class="cfr external" data-dcnode-id="3923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.14%23p-208.14%28c%29%284%29"><span data-dcnode-id="3924" instrument_node="">paragraph (c)(4)</span></a><span data-dcnode-id="3922" instrument_node=""> of this section, in the case of an applicant who appears to be inadmissible or deportable under section 212(a) or 237(a) of the Act, the asylum officer shall refer the application to an immigration judge, together with the appropriate charging document, for adjudication in removal proceedings (or, where charging documents may not be issued, shall dismiss the application). </span></p><span data-dcnode-id="3920" instrument_node="">
</span></div><span data-dcnode-id="3918" instrument_node="">
</span><div data-dcnode-id="3904" id="p-208.14(c)(2)"><span data-dcnode-id="3917" instrument_node="">
</span><p class="indent-2" data-dcnode-id="3906" data-title="208.14(c)(2)"><span class="paragraph-hierarchy" data-dcnode-id="3911"><span class="paren" data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">(</span></span><span data-dcnode-id="3914" instrument_node="">2</span><span class="paren" data-dcnode-id="3912"><span data-dcnode-id="3913" instrument_node="">)</span></span></span><span data-dcnode-id="3910" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3908"><span data-dcnode-id="3909" instrument_node="">Alien in valid status.</span></em><span data-dcnode-id="3907" instrument_node="">  In the case of an applicant who is maintaining valid immigrant, nonimmigrant, or Temporary Protected Status at the time the application is decided, the asylum officer shall deny the application for asylum. </span></p><span data-dcnode-id="3905" instrument_node="">
</span></div><span data-dcnode-id="3903" instrument_node="">
</span><div data-dcnode-id="3889" id="p-208.14(c)(3)"><span data-dcnode-id="3902" instrument_node="">
</span><p class="indent-2" data-dcnode-id="3891" data-title="208.14(c)(3)"><span class="paragraph-hierarchy" data-dcnode-id="3896"><span class="paren" data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">(</span></span><span data-dcnode-id="3899" instrument_node="">3</span><span class="paren" data-dcnode-id="3897"><span data-dcnode-id="3898" instrument_node="">)</span></span></span><span data-dcnode-id="3895" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">Alien with valid parole.</span></em><span data-dcnode-id="3892" instrument_node="">  If an applicant has been paroled into the United States and the parole has not expired or been terminated by the Service, the asylum officer shall deny the application for asylum. </span></p><span data-dcnode-id="3890" instrument_node="">
</span></div><span data-dcnode-id="3888" instrument_node="">
</span><div data-dcnode-id="3799" id="p-208.14(c)(4)"><span data-dcnode-id="3887" instrument_node="">
</span><p class="indent-2" data-dcnode-id="3876" data-title="208.14(c)(4)"><span class="paragraph-hierarchy" data-dcnode-id="3881"><span class="paren" data-dcnode-id="3885"><span data-dcnode-id="3886" instrument_node="">(</span></span><span data-dcnode-id="3884" instrument_node="">4</span><span class="paren" data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">)</span></span></span><span data-dcnode-id="3880" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">Alien paroled into the United States whose parole has expired or is terminated</span></em><span data-dcnode-id="3877" instrument_node="">  - </span></p><span data-dcnode-id="3875" instrument_node="">
</span><div data-dcnode-id="3858" id="p-208.14(c)(4)(i)"><span data-dcnode-id="3874" instrument_node="">
</span><p class="indent-3" data-dcnode-id="3860" data-title="208.14(c)(4)(i)"><span class="paragraph-hierarchy" data-dcnode-id="3868"><span class="paren" data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">(</span></span><span data-dcnode-id="3871" instrument_node="">i</span><span class="paren" data-dcnode-id="3869"><span data-dcnode-id="3870" instrument_node="">)</span></span></span><span data-dcnode-id="3867" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">Alien paroled prior to April 1, 1997, or with advance authorization for parole.</span></em><span data-dcnode-id="3864" instrument_node="">  In the case of an applicant who was paroled into the United States prior to April 1, 1997, or who, prior to departure from the United States, had received an advance authorization for parole, the asylum officer shall refer the application, together with the appropriate charging documents, to an immigration judge for adjudication in removal proceedings if the parole has expired, the Service has terminated parole, or the Service is terminating parole through issuance of the charging documents, pursuant to </span><a class="cfr external" data-dcnode-id="3862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-212.5%23p-212.5%28d%29%282%29%28i%29"><span data-dcnode-id="3863" instrument_node="">§ 212.5(d)(2)(i) of this chapter</span></a><span data-dcnode-id="3861" instrument_node="">. </span></p><span data-dcnode-id="3859" instrument_node="">
</span></div><span data-dcnode-id="3857" instrument_node="">
</span><div data-dcnode-id="3801" id="p-208.14(c)(4)(ii)"><span data-dcnode-id="3856" instrument_node="">
</span><p class="indent-3" data-dcnode-id="3842" data-title="208.14(c)(4)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="3850"><span class="paren" data-dcnode-id="3854"><span data-dcnode-id="3855" instrument_node="">(</span></span><span data-dcnode-id="3853" instrument_node="">ii</span><span class="paren" data-dcnode-id="3851"><span data-dcnode-id="3852" instrument_node="">)</span></span></span><span data-dcnode-id="3849" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">Alien paroled on or after April 1, 1997, without advance authorization for parole.</span></em><span data-dcnode-id="3846" instrument_node="">  In the case of an applicant who is an arriving alien or is otherwise subject to removal under </span><a class="cfr external" data-dcnode-id="3844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-235.3%23p-235.3%28b%29"><span data-dcnode-id="3845" instrument_node="">§ 235.3(b) of this chapter</span></a><span data-dcnode-id="3843" instrument_node="">, and was paroled into the United States on or after April 1, 1997, without advance authorization for parole prior to departure from the United States, the asylum officer will take the following actions, if the parole has expired or been terminated: </span></p><span data-dcnode-id="3841" instrument_node="">
</span><div data-dcnode-id="3818" id="p-208.14(c)(4)(ii)(A)"><span data-dcnode-id="3840" instrument_node="">
</span><p class="indent-4" data-dcnode-id="3820" data-title="208.14(c)(4)(ii)(A)"><span class="paragraph-hierarchy" data-dcnode-id="3834"><span class="paren" data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node="">(</span></span><span data-dcnode-id="3837" instrument_node="">A</span><span class="paren" data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">)</span></span></span><span data-dcnode-id="3833" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3831"><span data-dcnode-id="3832" instrument_node="">Inadmissible under section 212(a)(6)(C) or 212(a)(7) of the Act.</span></em><span data-dcnode-id="3830" instrument_node="">  If the applicant appears inadmissible to the United States under section 212(a)(6)(C) or 212(a)(7) of the Act and the asylum officer does not intend to lodge any additional charges of inadmissibility, the asylum officer shall proceed in accordance with </span><a class="cfr external" data-dcnode-id="3828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-235.3%23p-235.3%28b%29"><span data-dcnode-id="3829" instrument_node="">§ 235.3(b) of this chapter</span></a><span data-dcnode-id="3827" instrument_node="">. If such applicant is found to have a credible fear of persecution or torture based on information elicited from the asylum interview, an asylum officer may refer the applicant directly to an immigration judge in removal proceedings under section 240 of the Act, without conducting a separate credible fear interview pursuant to </span><a class="cfr external" data-dcnode-id="3825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30"><span data-dcnode-id="3826" instrument_node="">§ 208.30</span></a><span data-dcnode-id="3824" instrument_node="">. If such applicant is not found to have a credible fear based on information elicited at the asylum interview, an asylum officer will conduct a credible fear interview and the applicant will be subject to the credible fear process specified at </span><a class="cfr external" data-dcnode-id="3822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30%23p-208.30%28b%29"><span data-dcnode-id="3823" instrument_node="">§ 208.30(b)</span></a><span data-dcnode-id="3821" instrument_node="">. </span></p><span data-dcnode-id="3819" instrument_node="">
</span></div><span data-dcnode-id="3817" instrument_node="">
</span><div data-dcnode-id="3803" id="p-208.14(c)(4)(ii)(B)"><span data-dcnode-id="3816" instrument_node="">
</span><p class="indent-4" data-dcnode-id="3805" data-title="208.14(c)(4)(ii)(B)"><span class="paragraph-hierarchy" data-dcnode-id="3810"><span class="paren" data-dcnode-id="3814"><span data-dcnode-id="3815" instrument_node="">(</span></span><span data-dcnode-id="3813" instrument_node="">B</span><span class="paren" data-dcnode-id="3811"><span data-dcnode-id="3812" instrument_node="">)</span></span></span><span data-dcnode-id="3809" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">Inadmissible on other grounds.</span></em><span data-dcnode-id="3806" instrument_node="">  In the case of an applicant who was paroled into the United States on or after April 1, 1997, and will be charged as inadmissible to the United States under provisions of the Act other than, or in addition to, sections 212(a)(6)(C) or 212(a)(7), the asylum officer shall refer the application to an immigration judge for adjudication in removal proceedings. </span></p><span data-dcnode-id="3804" instrument_node="">
</span></div><span data-dcnode-id="3802" instrument_node="">
</span></div><span data-dcnode-id="3800" instrument_node="">
</span></div><span data-dcnode-id="3798" instrument_node="">
</span></div><span data-dcnode-id="3796" instrument_node="">
</span><div data-dcnode-id="3776" id="p-208.14(d)"><span data-dcnode-id="3795" instrument_node="">
</span><p class="indent-1" data-dcnode-id="3778" data-title="208.14(d)"><span class="paragraph-hierarchy" data-dcnode-id="3789"><span class="paren" data-dcnode-id="3793"><span data-dcnode-id="3794" instrument_node="">(</span></span><span data-dcnode-id="3792" instrument_node="">d</span><span class="paren" data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">)</span></span></span><span data-dcnode-id="3788" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3783"><span data-dcnode-id="3787" instrument_node="">Applicability of </span><a class="cfr external" data-dcnode-id="3785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-103.2%23p-103.2%28b%29"><span data-dcnode-id="3786" instrument_node="">§ 103.2(b) of this chapter</span></a><span data-dcnode-id="3784" instrument_node="">.</span></em><span data-dcnode-id="3782" instrument_node="">  No application for asylum or withholding of deportation shall be subject to denial pursuant to </span><a class="cfr external" data-dcnode-id="3780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-103.2%23p-103.2%28b%29"><span data-dcnode-id="3781" instrument_node="">§ 103.2(b) of this chapter</span></a><span data-dcnode-id="3779" instrument_node="">. </span></p><span data-dcnode-id="3777" instrument_node="">
</span></div><span data-dcnode-id="3775" instrument_node="">
</span><div data-dcnode-id="3758" id="p-208.14(e)"><span data-dcnode-id="3774" instrument_node="">
</span><p class="indent-1" data-dcnode-id="3760" data-title="208.14(e)"><span class="paragraph-hierarchy" data-dcnode-id="3768"><span class="paren" data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">(</span></span><span data-dcnode-id="3771" instrument_node="">e</span><span class="paren" data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node="">)</span></span></span><span data-dcnode-id="3767" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3765"><span data-dcnode-id="3766" instrument_node="">Duration.</span></em><span data-dcnode-id="3764" instrument_node="">  If the applicant is granted asylum, the grant will be effective for an indefinite period, subject to termination as provided in </span><a class="cfr external" data-dcnode-id="3762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.24"><span data-dcnode-id="3763" instrument_node="">§ 208.24</span></a><span data-dcnode-id="3761" instrument_node="">. </span></p><span data-dcnode-id="3759" instrument_node="">
</span></div><span data-dcnode-id="3757" instrument_node="">
</span><div data-dcnode-id="3743" id="p-208.14(f)"><span data-dcnode-id="3756" instrument_node="">
</span><p class="indent-1" data-dcnode-id="3745" data-title="208.14(f)"><span class="paragraph-hierarchy" data-dcnode-id="3750"><span class="paren" data-dcnode-id="3754"><span data-dcnode-id="3755" instrument_node="">(</span></span><span data-dcnode-id="3753" instrument_node="">f</span><span class="paren" data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">)</span></span></span><span data-dcnode-id="3749" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3747"><span data-dcnode-id="3748" instrument_node="">Effect of denial of principal's application on separate applications by dependents.</span></em><span data-dcnode-id="3746" instrument_node="">  The denial of an asylum application filed by a principal applicant for asylum shall also result in the denial of asylum status to any dependents of that principal applicant who are included in that same application. Such denial shall not preclude a grant of asylum for an otherwise eligible dependent who has filed a separate asylum application, nor shall such denial result in an otherwise eligible dependent becoming ineligible to apply for asylum due to the provisions of section 208(a)(2)(C) of the Act. </span></p><span data-dcnode-id="3744" instrument_node="">
</span></div><span data-dcnode-id="3742" instrument_node="">
</span><div data-dcnode-id="3730" id="p-208.14(g)"><p class="indent-1" data-dcnode-id="3731" data-title="208.14(g)"><span class="paragraph-hierarchy" data-dcnode-id="3736"><span class="paren" data-dcnode-id="3740"><span data-dcnode-id="3741" instrument_node="">(</span></span><span data-dcnode-id="3739" instrument_node="">g</span><span class="paren" data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">)</span></span></span><span data-dcnode-id="3735" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="3733"><span data-dcnode-id="3734" instrument_node="">Applicants granted lawful permanent residence status.</span></em><span data-dcnode-id="3732" instrument_node="">  If an asylum applicant is granted adjustment of status to lawful permanent resident, the Service may provide written notice to the applicant that his or her asylum application will be presumed abandoned and dismissed without prejudice, unless the applicant submits a written request within 30 days of the notice, that the asylum application be adjudicated. If an applicant does not respond within 30 days of the date the written notice was sent or served, the Service may presume the asylum application abandoned and dismiss it without prejudice. </span></p></div><span data-dcnode-id="3729" instrument_node="">
</span><p class="citation" data-dcnode-id="3712"><span data-dcnode-id="3728" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="3726" data-reference="62 FR 10337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/62-FR-10337"><span data-dcnode-id="3727" instrument_node="">62 FR 10337</span></a><span data-dcnode-id="3725" instrument_node="">, Mar. 6, 1997, as amended at </span><a class="fr-reference" data-dcnode-id="3723" data-reference="63 FR 12986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/63-FR-12986"><span data-dcnode-id="3724" instrument_node="">63 FR 12986</span></a><span data-dcnode-id="3722" instrument_node="">, Mar. 17, 1998; </span><a class="fr-reference" data-dcnode-id="3720" data-reference="64 FR 27875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/64-FR-27875"><span data-dcnode-id="3721" instrument_node="">64 FR 27875</span></a><span data-dcnode-id="3719" instrument_node="">, May 21, 1999; </span><a class="fr-reference" data-dcnode-id="3717" data-reference="65 FR 76134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/65-FR-76134"><span data-dcnode-id="3718" instrument_node="">65 FR 76134</span></a><span data-dcnode-id="3716" instrument_node="">, Dec. 6, 2000; </span><a class="fr-reference" data-dcnode-id="3714" data-reference="76 FR 53784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/76-FR-53784"><span data-dcnode-id="3715" instrument_node="">76 FR 53784</span></a><span data-dcnode-id="3713" instrument_node="">, Aug. 29, 2011] </span></p><span data-dcnode-id="3711" instrument_node="">
</span></div><span data-dcnode-id="3709" instrument_node="">
</span><div class="section" data-dcnode-id="3576" id="208.15"><span data-dcnode-id="3708" instrument_node="">
</span><h4 data-dcnode-id="3705"><a class="direct" data-dcnode-id="3706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.15"><span data-dcnode-id="3707" instrument_node="">§ 208.15 Definition of “firm resettlement.”</span></a></h4><span data-dcnode-id="3704" instrument_node="">
</span><div data-dcnode-id="3597" id="p-208.15(a)"><span data-dcnode-id="3703" instrument_node="">
</span><p class="indent-1" data-dcnode-id="3695" data-title="208.15(a)"><span class="paragraph-hierarchy" data-dcnode-id="3697"><span class="paren" data-dcnode-id="3701"><span data-dcnode-id="3702" instrument_node="">(</span></span><span data-dcnode-id="3700" instrument_node="">a</span><span class="paren" data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">)</span></span></span><span data-dcnode-id="3696" instrument_node=""> An alien is considered to be firmly resettled if, after the events giving rise to the alien's asylum claim: </span></p><span data-dcnode-id="3694" instrument_node="">
</span><div data-dcnode-id="3647" id="p-208.15(a)(1)"><span data-dcnode-id="3693" instrument_node="">
</span><p class="indent-2" data-dcnode-id="3685" data-title="208.15(a)(1)"><span class="paragraph-hierarchy" data-dcnode-id="3687"><span class="paren" data-dcnode-id="3691"><span data-dcnode-id="3692" instrument_node="">(</span></span><span data-dcnode-id="3690" instrument_node="">1</span><span class="paren" data-dcnode-id="3688"><span data-dcnode-id="3689" instrument_node="">)</span></span></span><span data-dcnode-id="3686" instrument_node=""> The alien resided in a country through which the alien transited prior to arriving in or entering the United States and - </span></p><span data-dcnode-id="3684" instrument_node="">
</span><div data-dcnode-id="3673" id="p-208.15(a)(1)(i)"><span data-dcnode-id="3683" instrument_node="">
</span><p class="indent-3" data-dcnode-id="3675" data-title="208.15(a)(1)(i)"><span class="paragraph-hierarchy" data-dcnode-id="3677"><span class="paren" data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">(</span></span><span data-dcnode-id="3680" instrument_node="">i</span><span class="paren" data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">)</span></span></span><span data-dcnode-id="3676" instrument_node=""> Received or was eligible for any permanent legal immigration status in that country; </span></p><span data-dcnode-id="3674" instrument_node="">
</span></div><span data-dcnode-id="3672" instrument_node="">
</span><div data-dcnode-id="3661" id="p-208.15(a)(1)(ii)"><span data-dcnode-id="3671" instrument_node="">
</span><p class="indent-3" data-dcnode-id="3663" data-title="208.15(a)(1)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="3665"><span class="paren" data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">(</span></span><span data-dcnode-id="3668" instrument_node="">ii</span><span class="paren" data-dcnode-id="3666"><span data-dcnode-id="3667" instrument_node="">)</span></span></span><span data-dcnode-id="3664" instrument_node=""> Resided in such a country with any non-permanent but indefinitely renewable legal immigration status (including asylee, refugee, or similar status but excluding status such as of a tourist); or </span></p><span data-dcnode-id="3662" instrument_node="">
</span></div><span data-dcnode-id="3660" instrument_node="">
</span><div data-dcnode-id="3649" id="p-208.15(a)(1)(iii)"><span data-dcnode-id="3659" instrument_node="">
</span><p class="indent-3" data-dcnode-id="3651" data-title="208.15(a)(1)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="3653"><span class="paren" data-dcnode-id="3657"><span data-dcnode-id="3658" instrument_node="">(</span></span><span data-dcnode-id="3656" instrument_node="">iii</span><span class="paren" data-dcnode-id="3654"><span data-dcnode-id="3655" instrument_node="">)</span></span></span><span data-dcnode-id="3652" instrument_node=""> Resided in such a country and could have applied for and obtained any non-permanent but indefinitely renewable legal immigration status in that country; </span></p><span data-dcnode-id="3650" instrument_node="">
</span></div><span data-dcnode-id="3648" instrument_node="">
</span></div><span data-dcnode-id="3646" instrument_node="">
</span><div data-dcnode-id="3635" id="p-208.15(a)(2)"><span data-dcnode-id="3645" instrument_node="">
</span><p class="indent-2" data-dcnode-id="3637" data-title="208.15(a)(2)"><span class="paragraph-hierarchy" data-dcnode-id="3639"><span class="paren" data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">(</span></span><span data-dcnode-id="3642" instrument_node="">2</span><span class="paren" data-dcnode-id="3640"><span data-dcnode-id="3641" instrument_node="">)</span></span></span><span data-dcnode-id="3638" instrument_node=""> The alien physically resided voluntarily, and without continuing to suffer persecution or torture, in any one country for one year or more after departing his country of nationality or last habitual residence and prior to arrival in or entry into the United States, provided that time spent in Mexico by an alien who is not a native or citizen of Mexico solely as a direct result of being returned to Mexico pursuant to section 235(b)(2)(C) of the Act or of being subject to metering would not be counted for purposes of this paragraph; or </span></p><span data-dcnode-id="3636" instrument_node="">
</span></div><span data-dcnode-id="3634" instrument_node="">
</span><div data-dcnode-id="3599" id="p-208.15(a)(3)"><span data-dcnode-id="3633" instrument_node="">
</span><p class="indent-2" data-dcnode-id="3625" data-title="208.15(a)(3)"><span class="paragraph-hierarchy" data-dcnode-id="3627"><span class="paren" data-dcnode-id="3631"><span data-dcnode-id="3632" instrument_node="">(</span></span><span data-dcnode-id="3630" instrument_node="">3</span><span class="paren" data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">)</span></span></span><span data-dcnode-id="3626" instrument_node=""> </span></p><span data-dcnode-id="3624" instrument_node="">
</span><div data-dcnode-id="3613" id="p-208.15(a)(3)(i)"><span data-dcnode-id="3623" instrument_node="">
</span><p class="indent-3" data-dcnode-id="3615" data-title="208.15(a)(3)(i)"><span class="paragraph-hierarchy" data-dcnode-id="3617"><span class="paren" data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">(</span></span><span data-dcnode-id="3620" instrument_node="">i</span><span class="paren" data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">)</span></span></span><span data-dcnode-id="3616" instrument_node=""> The alien is a citizen of a country other than the one where the alien alleges a fear of persecution and the alien was present in that country after departing his country of nationality or last habitual residence and prior to arrival in or entry into the United States; or </span></p><span data-dcnode-id="3614" instrument_node="">
</span></div><span data-dcnode-id="3612" instrument_node="">
</span><div data-dcnode-id="3601" id="p-208.15(a)(3)(ii)"><span data-dcnode-id="3611" instrument_node="">
</span><p class="indent-3" data-dcnode-id="3603" data-title="208.15(a)(3)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="3605"><span class="paren" data-dcnode-id="3609"><span data-dcnode-id="3610" instrument_node="">(</span></span><span data-dcnode-id="3608" instrument_node="">ii</span><span class="paren" data-dcnode-id="3606"><span data-dcnode-id="3607" instrument_node="">)</span></span></span><span data-dcnode-id="3604" instrument_node=""> The alien was a citizen of a country other than the one where the alien alleges a fear of persecution, the alien was present in that country after departing his country of nationality or last habitual residence and prior to arrival in or entry into the United States, and the alien renounced that citizenship after arriving in the United States. </span></p><span data-dcnode-id="3602" instrument_node="">
</span></div><span data-dcnode-id="3600" instrument_node="">
</span></div><span data-dcnode-id="3598" instrument_node="">
</span></div><span data-dcnode-id="3596" instrument_node="">
