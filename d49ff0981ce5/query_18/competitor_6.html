l external" data-dcnode-id="8574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.govinfo.gov/link/plaw/110/public/229" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="8575" instrument_node="">Pub. L. 110-229</span></a><span data-dcnode-id="8573" instrument_node="">; </span><a class="cfr external" data-dcnode-id="8571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/part-2"><span data-dcnode-id="8572" instrument_node="">8 CFR part 2</span></a><span data-dcnode-id="8570" instrument_node="">; </span><a class="publ external" data-dcnode-id="8568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.govinfo.gov/link/plaw/115/public/218" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="8569" instrument_node="">Pub. L. 115-218</span></a><span data-dcnode-id="8567" instrument_node="">. </span></p><span data-dcnode-id="8565" instrument_node="">
</span></div><span data-dcnode-id="8563" instrument_node="">
</span><div class="source" data-dcnode-id="8554"><h4 class="inline-header" data-dcnode-id="8561"><span data-dcnode-id="8562" instrument_node="">Source:</span></h4><span data-dcnode-id="8560" instrument_node="">
</span><p class="inline-paragraph" data-dcnode-id="8556"><a class="fr-reference" data-dcnode-id="8558" data-reference="62 FR 10337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/62-FR-10337"><span data-dcnode-id="8559" instrument_node="">62 FR 10337</span></a><span data-dcnode-id="8557" instrument_node="">, Mar. 6, 1997, unless otherwise noted. </span></p><span data-dcnode-id="8555" instrument_node="">
</span></div><span data-dcnode-id="8553" instrument_node="">
</span><div class="subpart" data-dcnode-id="1429" id="subpart-A"><h2 data-dcnode-id="8548"><a class="direct" data-dcnode-id="8552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/part-/subpart-A"></a><a class="direct" data-dcnode-id="8551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/part-208/subpart-A"></a><a class="direct" data-dcnode-id="8549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/part-208/subpart-A"><span data-dcnode-id="8550" instrument_node="">Subpart A - Asylum and Withholding of Removal</span></a></h2><span data-dcnode-id="8547" instrument_node="">
</span><div class="section" data-dcnode-id="8285" id="208.1"><span data-dcnode-id="8546" instrument_node="">
</span><h4 data-dcnode-id="8543"><a class="direct" data-dcnode-id="8544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.1"><span data-dcnode-id="8545" instrument_node="">§ 208.1 General.</span></a></h4><span data-dcnode-id="8542" instrument_node="">
</span><div data-dcnode-id="8489" id="p-208.1(a)"><span data-dcnode-id="8541" instrument_node="">
</span><p class="indent-1" data-dcnode-id="8530" data-title="208.1(a)"><span class="paragraph-hierarchy" data-dcnode-id="8535"><span class="paren" data-dcnode-id="8539"><span data-dcnode-id="8540" instrument_node="">(</span></span><span data-dcnode-id="8538" instrument_node="">a</span><span class="paren" data-dcnode-id="8536"><span data-dcnode-id="8537" instrument_node="">)</span></span></span><span data-dcnode-id="8534" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="8532"><span data-dcnode-id="8533" instrument_node="">Applicability</span></em><span data-dcnode-id="8531" instrument_node="">  - </span></p><span data-dcnode-id="8529" instrument_node="">
</span><div data-dcnode-id="8506" id="p-208.1(a)(1)"><span data-dcnode-id="8528" instrument_node="">
</span><p class="indent-2" data-dcnode-id="8508" data-title="208.1(a)(1)"><span class="paragraph-hierarchy" data-dcnode-id="8522"><span class="paren" data-dcnode-id="8526"><span data-dcnode-id="8527" instrument_node="">(</span></span><span data-dcnode-id="8525" instrument_node="">1</span><span class="paren" data-dcnode-id="8523"><span data-dcnode-id="8524" instrument_node="">)</span></span></span><span data-dcnode-id="8521" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="8519"><span data-dcnode-id="8520" instrument_node="">General.</span></em><span data-dcnode-id="8518" instrument_node="">  Unless otherwise provided in this chapter I, this subpart A shall apply to all applications for asylum under section 208 of the Act or for withholding of deportation or withholding of removal under section 241(b)(3) of the Act, or under the Convention Against Torture, whether before an asylum officer or an immigration judge, regardless of the date of filing. For purposes of this chapter I, withholding of removal shall also mean withholding of deportation under section 243(h) of the Act, as it appeared prior to April 1, 1997, except as provided in </span><a class="cfr external" data-dcnode-id="8516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.16%23p-208.16%28d%29"><span data-dcnode-id="8517" instrument_node="">§ 208.16(d)</span></a><span data-dcnode-id="8515" instrument_node="">. Such applications are referred to as “asylum applications.” The provisions of this part 208 shall not affect the finality or validity of any decision made by a district director, an immigration judge, or the Board of Immigration Appeals in any such case prior to April 1, 1997. No asylum application that was filed with a district director, asylum officer, or immigration judge prior to April 1, 1997, may be reopened or otherwise reconsidered under the provisions of this part 208 except by motion granted in the exercise of discretion by the Board of Immigration Appeals, an immigration judge, or an asylum officer for proper cause shown. Motions to reopen or reconsider must meet the requirements of sections 240(c)(6) and (c)(7) of the Act, and </span><a class="cfr external" data-dcnode-id="8513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/part-103"><span data-dcnode-id="8514" instrument_node="">8 CFR parts 103</span></a><span data-dcnode-id="8512" instrument_node=""> and </span><a class="cfr external" data-dcnode-id="8510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/part-1003"><span data-dcnode-id="8511" instrument_node="">1003</span></a><span data-dcnode-id="8509" instrument_node="">, as applicable. </span></p><span data-dcnode-id="8507" instrument_node="">
</span></div><span data-dcnode-id="8505" instrument_node="">
</span><div data-dcnode-id="8491" id="p-208.1(a)(2)"><span data-dcnode-id="8504" instrument_node="">
</span><p class="indent-2" data-dcnode-id="8493" data-title="208.1(a)(2)"><span class="paragraph-hierarchy" data-dcnode-id="8498"><span class="paren" data-dcnode-id="8502"><span data-dcnode-id="8503" instrument_node="">(</span></span><span data-dcnode-id="8501" instrument_node="">2</span><span class="paren" data-dcnode-id="8499"><span data-dcnode-id="8500" instrument_node="">)</span></span></span><span data-dcnode-id="8497" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="8495"><span data-dcnode-id="8496" instrument_node="">Commonwealth of the Northern Mariana Islands.</span></em><span data-dcnode-id="8494" instrument_node="">  The provisions of this subpart A shall not apply prior to January 1, 2030, to an alien physically present in or arriving in the Commonwealth of the Northern Mariana Islands seeking to apply for asylum. No application for asylum may be filed prior to January 1, 2030, pursuant to section 208 of the Act by an alien physically present in or arriving in the Commonwealth of the Northern Mariana Islands. Effective on the transition program effective date, the provisions of this subpart A shall apply to aliens physically present in or arriving in the CNMI with respect to withholding of removal under section 241(b)(3) of the Act and withholding and deferral of removal under the Convention Against Torture. </span></p><span data-dcnode-id="8492" instrument_node="">
</span></div><span data-dcnode-id="8490" instrument_node="">
</span></div><span data-dcnode-id="8488" instrument_node="">
</span><div data-dcnode-id="8474" id="p-208.1(b)"><span data-dcnode-id="8487" instrument_node="">
</span><p class="indent-1" data-dcnode-id="8476" data-title="208.1(b)"><span class="paragraph-hierarchy" data-dcnode-id="8481"><span class="paren" data-dcnode-id="8485"><span data-dcnode-id="8486" instrument_node="">(</span></span><span data-dcnode-id="8484" instrument_node="">b</span><span class="paren" data-dcnode-id="8482"><span data-dcnode-id="8483" instrument_node="">)</span></span></span><span data-dcnode-id="8480" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="8478"><span data-dcnode-id="8479" instrument_node="">Training of asylum officers.</span></em><span data-dcnode-id="8477" instrument_node="">  The Associate Director of USCIS Refugee, Asylum, and International Operations (RAIO) shall ensure that asylum officers receive special training in international human rights law, nonadversarial interview techniques, and other relevant national and international refugee laws and principles. The Associate Director of USCIS Refugee, Asylum, and International Operations (RAIO) shall also, in cooperation with the Department of State and other appropriate sources, compile and disseminate to asylum officers information concerning the persecution of persons in other countries on account of race, religion, nationality, membership in a particular social group, or political opinion, torture of persons in other countries, and other information relevant to asylum determinations, and shall maintain a documentation center with information on human rights conditions. </span></p><span data-dcnode-id="8475" instrument_node="">
</span></div><span data-dcnode-id="8473" instrument_node="">
</span><div data-dcnode-id="8459" id="p-208.1(c)"><span data-dcnode-id="8472" instrument_node="">
</span><p class="indent-1" data-dcnode-id="8461" data-title="208.1(c)"><span class="paragraph-hierarchy" data-dcnode-id="8466"><span class="paren" data-dcnode-id="8470"><span data-dcnode-id="8471" instrument_node="">(</span></span><span data-dcnode-id="8469" instrument_node="">c</span><span class="paren" data-dcnode-id="8467"><span data-dcnode-id="8468" instrument_node="">)</span></span></span><span data-dcnode-id="8465" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="8463"><span data-dcnode-id="8464" instrument_node="">Particular social group.</span></em><span data-dcnode-id="8462" instrument_node="">  For purposes of adjudicating an application for asylum under section 208 of the Act or an application for withholding of removal under section 241(b)(3) of the Act, a particular social group is one that is based on an immutable or fundamental characteristic, is defined with particularity, and is recognized as socially distinct in the society at question. Such a particular social group cannot be defined exclusively by the alleged persecutory acts or harms and must also have existed independently of the alleged persecutory acts or harms that form the basis of the claim. The Secretary, in general, will not favorably adjudicate claims of aliens who claim a fear of persecution on account of membership in a particular social group consisting of or defined by the following circumstances: Past or present criminal activity or association (including gang membership); presence in a country with generalized violence or a high crime rate; being the subject of a recruitment effort by criminal, terrorist, or persecutory groups; the targeting of the applicant for criminal activity for financial gain based on perceptions of wealth or affluence; interpersonal disputes of which governmental authorities were unaware or uninvolved; private criminal acts of which governmental authorities were unaware or uninvolved; past or present terrorist activity or association; past or present persecutory activity or association; or status as an alien returning from the United States. This list is nonexhaustive, and the substance of the alleged particular social group, rather than the precise form of its delineation, shall be considered in determining whether the group falls within one of the categories on the list. No alien shall be found to be a refugee or have it decided that the alien's life or freedom would be threatened based on membership in a particular social group in any case unless that person articulates on the record, or provides a basis on the record for determining, the definition and boundaries of the alleged particular social group. A failure to define, or provide a basis for defining, a formulation of a particular social group before an immigration judge shall waive any such claim for all purposes under the Act, including on appeal. Any waived claim on this basis shall not serve as the basis for any motion to reopen or reconsider for any reason, including a claim of ineffective assistance of counsel unless the alien complies with the procedural requirements for such a motion and demonstrates that counsel's failure to define, or provide a basis for defining, a formulation of a particular social group constituted egregious conduct. </span></p><span data-dcnode-id="8460" instrument_node="">
</span></div><span data-dcnode-id="8458" instrument_node="">
</span><div data-dcnode-id="8444" id="p-208.1(d)"><span data-dcnode-id="8457" instrument_node="">
</span><p class="indent-1" data-dcnode-id="8446" data-title="208.1(d)"><span class="paragraph-hierarchy" data-dcnode-id="8451"><span class="paren" data-dcnode-id="8455"><span data-dcnode-id="8456" instrument_node="">(</span></span><span data-dcnode-id="8454" instrument_node="">d</span><span class="paren" data-dcnode-id="8452"><span data-dcnode-id="8453" instrument_node="">)</span></span></span><span data-dcnode-id="8450" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="8448"><span data-dcnode-id="8449" instrument_node="">Political opinion.</span></em><span data-dcnode-id="8447" instrument_node="">  For purposes of adjudicating an application for asylum under section 208 of the Act or an application for withholding of removal under section 241(b)(3) of the Act, a political opinion is one expressed by or imputed to an applicant in which the applicant possesses an ideal or conviction in support of the furtherance of a discrete cause related to political control of a State or a unit thereof. The Secretary, in general, will not favorably adjudicate claims of aliens who claim a fear of persecution on account of a political opinion defined solely by generalized disapproval of, disagreement with, or opposition to criminal, terrorist, gang, guerilla, or other non-state organizations absent expressive behavior in furtherance of a cause against such organizations related to efforts by the State to control such organizations or behavior that is antithetical to or otherwise opposes the ruling legal entity of the State or a legal sub-unit of the State. A person who has been forced to abort a pregnancy or to undergo involuntary sterilization, or who has been persecuted for failure or refusal to undergo such a procedure or for other resistance to a coercive population control program, shall be deemed to have been persecuted on account of political opinion, and a person who has a well-founded fear that he or she will be forced to undergo such a procedure or subject to persecution for such failure, refusal, or resistance shall be deemed to have a well-founded fear of persecution on account of political opinion. </span></p><span data-dcnode-id="8445" instrument_node="">
</span></div><span data-dcnode-id="8443" instrument_node="">
</span><div data-dcnode-id="8429" id="p-208.1(e)"><span data-dcnode-id="8442" instrument_node="">
</span><p class="indent-1" data-dcnode-id="8431" data-title="208.1(e)"><span class="paragraph-hierarchy" data-dcnode-id="8436"><span class="paren" data-dcnode-id="8440"><span data-dcnode-id="8441" instrument_node="">(</span></span><span data-dcnode-id="8439" instrument_node="">e</span><span class="paren" data-dcnode-id="8437"><span data-dcnode-id="8438" instrument_node="">)</span></span></span><span data-dcnode-id="8435" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="8433"><span data-dcnode-id="8434" instrument_node="">Persecution.</span></em><span data-dcnode-id="8432" instrument_node="">  For purposes of screening or adjudicating an application for asylum under section 208 of the Act or an application for withholding of removal under section 241(b)(3) of the Act, persecution requires an intent to target a belief or characteristic, a severe level of harm, and the infliction of a severe level of harm by the government of a country or by persons or an organization that the government was unable or unwilling to control. For purposes of evaluating the severity of the level of harm, persecution is an extreme concept involving a severe level of harm that includes actions so severe that they constitute an exigent threat. Persecution does not encompass the generalized harm that arises out of civil, criminal, or military strife in a country, nor does it encompass all treatment that the United States regards as unfair, offensive, unjust, or even unlawful or unconstitutional. It does not include intermittent harassment, including brief detentions; threats with no actual effort to carry out the threats, except that particularized threats of severe harm of an immediate and menacing nature made by an identified entity may constitute persecution; or, non-severe economic harm or property damage, though this list is nonexhaustive. The existence of laws or government policies that are unenforced or infrequently enforced do not, by themselves, constitute persecution, unless there is credible evidence that those laws or policies have been or would be applied to an applicant personally. </span></p><span data-dcnode-id="8430" instrument_node="">
</span></div><span data-dcnode-id="8428" instrument_node="">
</span><div data-dcnode-id="8318" id="p-208.1(f)"><span data-dcnode-id="8427" instrument_node="">
</span><p class="indent-1" data-dcnode-id="8416" data-title="208.1(f)"><span class="paragraph-hierarchy" data-dcnode-id="8421"><span class="paren" data-dcnode-id="8425"><span data-dcnode-id="8426" instrument_node="">(</span></span><span data-dcnode-id="8424" instrument_node="">f</span><span class="paren" data-dcnode-id="8422"><span data-dcnode-id="8423" instrument_node="">)</span></span></span><span data-dcnode-id="8420" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="8418"><span data-dcnode-id="8419" instrument_node="">Nexus.</span></em><span data-dcnode-id="8417" instrument_node="">  For purposes of adjudicating an application for asylum under section 208 of the Act or an application or withholding of removal under section 241(b)(3) of the Act, the Secretary, in general, will not favorably adjudicate the claims of aliens who claim persecution based on the following list of nonexhaustive circumstances: </span></p><span data-dcnode-id="8415" instrument_node="">
</span><div data-dcnode-id="8404" id="p-208.1(f)(1)"><span data-dcnode-id="8414" instrument_node="">
</span><p class="indent-2" data-dcnode-id="8406" data-title="208.1(f)(1)"><span class="paragraph-hierarchy" data-dcnode-id="8408"><span class="paren" data-dcnode-id="8412"><span data-dcnode-id="8413" instrument_node="">(</span></span><span data-dcnode-id="8411" instrument_node="">1</span><span class="paren" data-dcnode-id="8409"><span data-dcnode-id="8410" instrument_node="">)</span></span></span><span data-dcnode-id="8407" instrument_node=""> Interpersonal animus or retribution; </span></p><span data-dcnode-id="8405" instrument_node="">
</span></div><span data-dcnode-id="8403" instrument_node="">
</span><div data-dcnode-id="8392" id="p-208.1(f)(2)"><span data-dcnode-id="8402" instrument_node="">
</span><p class="indent-2" data-dcnode-id="8394" data-title="208.1(f)(2)"><span class="paragraph-hierarchy" data-dcnode-id="8396"><span class="paren" data-dcnode-id="8400"><span data-dcnode-id="8401" instrument_node="">(</span></span><span data-dcnode-id="8399" instrument_node="">2</span><span class="paren" data-dcnode-id="8397"><span data-dcnode-id="8398" instrument_node="">)</span></span></span><span data-dcnode-id="8395" instrument_node=""> Interpersonal animus in which the alleged persecutor has not targeted, or manifested an animus against, other members of an alleged particular social group in addition to the member who has raised the claim at issue; </span></p><span data-dcnode-id="8393" instrument_node="">
</span></div><span data-dcnode-id="8391" instrument_node="">
</span><div data-dcnode-id="8380" id="p-208.1(f)(3)"><span data-dcnode-id="8390" instrument_node="">
</span><p class="indent-2" data-dcnode-id="8382" data-title="208.1(f)(3)"><span class="paragraph-hierarchy" data-dcnode-id="8384"><span class="paren" data-dcnode-id="8388"><span data-dcnode-id="8389" instrument_node="">(</span></span><span data-dcnode-id="8387" instrument_node="">3</span><span class="paren" data-dcnode-id="8385"><span data-dcnode-id="8386" instrument_node="">)</span></span></span><span data-dcnode-id="8383" instrument_node=""> Generalized disapproval of, disagreement with, or opposition to criminal, terrorist, gang, guerilla, or other non-state organizations absent expressive behavior in furtherance of a discrete cause against such organizations related to control of a State or expressive behavior that is antithetical to the State or a legal unit of the State; </span></p><span data-dcnode-id="8381" instrument_node="">
</span></div><span data-dcnode-id="8379" instrument_node="">
</span><div data-dcnode-id="8368" id="p-208.1(f)(4)"><span data-dcnode-id="8378" instrument_node="">
</span><p class="indent-2" data-dcnode-id="8370" data-title="208.1(f)(4)"><span class="paragraph-hierarchy" data-dcnode-id="8372"><span class="paren" data-dcnode-id="8376"><span data-dcnode-id="8377" instrument_node="">(</span></span><span data-dcnode-id="8375" instrument_node="">4</span><span class="paren" data-dcnode-id="8373"><span data-dcnode-id="8374" instrument_node="">)</span></span></span><span data-dcnode-id="8371" instrument_node=""> Resistance to recruitment or coercion by guerilla, criminal, gang, terrorist or other non-state organizations; </span></p><span data-dcnode-id="8369" instrument_node="">
</span></div><span data-dcnode-id="8367" instrument_node="">
</span><div data-dcnode-id="8356" id="p-208.1(f)(5)"><span data-dcnode-id="8366" instrument_node="">
</span><p class="indent-2" data-dcnode-id="8358" data-title="208.1(f)(5)"><span class="paragraph-hierarchy" data-dcnode-id="8360"><span class="paren" data-dcnode-id="8364"><span data-dcnode-id="8365" instrument_node="">(</span></span><span data-dcnode-id="8363" instrument_node="">5</span><span class="paren" data-dcnode-id="8361"><span data-dcnode-id="8362" instrument_node="">)</span></span></span><span data-dcnode-id="8359" instrument_node=""> The targeting of the applicant for criminal activity for financial gain based on wealth or affluence or perceptions of wealth or affluence; </span></p><span data-dcnode-id="8357" instrument_node="">
</span></div><span data-dcnode-id="8355" instrument_node="">
</span><div data-dcnode-id="8344" id="p-208.1(f)(6)"><span data-dcnode-id="8354" instrument_node="">
</span><p class="indent-2" data-dcnode-id="8346" data-title="208.1(f)(6)"><span class="paragraph-hierarchy" data-dcnode-id="8348"><span class="paren" data-dcnode-id="8352"><span data-dcnode-id="8353" instrument_node="">(</span></span><span data-dcnode-id="8351" instrument_node="">6</span><span class="paren" data-dcnode-id="8349"><span data-dcnode-id="8350" instrument_node="">)</span></span></span><span data-dcnode-id="8347" instrument_node=""> Criminal activity; </span></p><span data-dcnode-id="8345" instrument_node="">
</span></div><span data-dcnode-id="8343" instrument_node="">
</span><div data-dcnode-id="8332" id="p-208.1(f)(7)"><span data-dcnode-id="8342" instrument_node="">
</span><p class="indent-2" data-dcnode-id="8334" data-title="208.1(f)(7)"><span class="paragraph-hierarchy" data-dcnode-id="8336"><span class="paren" data-dcnode-id="8340"><span data-dcnode-id="8341" instrument_node="">(</span></span><span data-dcnode-id="8339" instrument_node="">7</span><span class="paren" data-dcnode-id="8337"><span data-dcnode-id="8338" instrument_node="">)</span></span></span><span data-dcnode-id="8335" instrument_node=""> Perceived, past or present, gang affiliation; or, </span></p><span data-dcnode-id="8333" instrument_node="">
</span></div><span data-dcnode-id="8331" instrument_node="">
</span><div data-dcnode-id="8320" id="p-208.1(f)(8)"><span data-dcnode-id="8330" instrument_node="">
</span><p class="indent-2" data-dcnode-id="8322" data-title="208.1(f)(8)"><span class="paragraph-hierarchy" data-dcnode-id="8324"><span class="paren" data-dcnode-id="8328"><span data-dcnode-id="8329" instrument_node="">(</span></span><span data-dcnode-id="8327" instrument_node="">8</span><span class="paren" data-dcnode-id="8325"><span data-dcnode-id="8326" instrument_node="">)</span></span></span><span data-dcnode-id="8323" instrument_node=""> Gender. </span></p><span data-dcnode-id="8321" instrument_node="">
</span></div><span data-dcnode-id="8319" instrument_node="">
</span></div><span data-dcnode-id="8317" instrument_node="">
</span><div data-dcnode-id="8305" id="p-208.1(g)"><p class="indent-1" data-dcnode-id="8306" data-title="208.1(g)"><span class="paragraph-hierarchy" data-dcnode-id="8311"><span class="paren" data-dcnode-id="8315"><span data-dcnode-id="8316" instrument_node="">(</span></span><span data-dcnode-id="8314" instrument_node="">g</span><span class="paren" data-dcnode-id="8312"><span data-dcnode-id="8313" instrument_node="">)</span></span></span><span data-dcnode-id="8310" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="8308"><span data-dcnode-id="8309" instrument_node="">Evidence based on stereotypes.</span></em><span data-dcnode-id="8307" instrument_node="">  For purposes of adjudicating an application for asylum under section 208 of the Act or an application for withholding of removal under section 241(b)(3) of the Act, evidence offered in support of such an application which promotes cultural stereotypes about a country, its inhabitants, or an alleged persecutor, including stereotypes based on race, religion, nationality, or gender, shall not be admissible in adjudicating that application, provided that nothing in this paragraph shall be construed as prohibiting the submission of evidence that an alleged persecutor holds stereotypical views of the applicant. </span></p></div><span data-dcnode-id="8304" instrument_node="">
</span><p class="citation" data-dcnode-id="8287"><span data-dcnode-id="8303" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="8301" data-reference="64 FR 8487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/64-FR-8487"><span data-dcnode-id="8302" instrument_node="">64 FR 8487</span></a><span data-dcnode-id="8300" instrument_node="">, Feb. 19, 1999, as amended at </span><a class="fr-reference" data-dcnode-id="8298" data-reference="74 FR 55736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/74-FR-55736"><span data-dcnode-id="8299" instrument_node="">74 FR 55736</span></a><span data-dcnode-id="8297" instrument_node="">, Oct. 28, 2009; </span><a class="fr-reference" data-dcnode-id="8295" data-reference="76 FR 53784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/76-FR-53784"><span data-dcnode-id="8296" instrument_node="">76 FR 53784</span></a><span data-dcnode-id="8294" instrument_node="">, Aug. 29, 2011; </span><a class="fr-reference" data-dcnode-id="8292" data-reference="85 FR 29310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-29310"><span data-dcnode-id="8293" instrument_node="">85 FR 29310</span></a><span data-dcnode-id="8291" instrument_node="">, May 14, 2020; </span><a class="fr-reference" data-dcnode-id="8289" data-reference="85 FR 80385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-80385"><span data-dcnode-id="8290" instrument_node="">85 FR 80385</span></a><span data-dcnode-id="8288" instrument_node="">, Dec. 11, 2020] </span></p><span data-dcnode-id="8286" instrument_node="">
</span></div><span data-dcnode-id="8284" instrument_node="">
</span><div class="section" data-dcnode-id="7857" id="208.2"><span data-dcnode-id="8283" instrument_node="">
</span><h4 data-dcnode-id="8280"><a class="direct" data-dcnode-id="8281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.2"><span data-dcnode-id="8282" instrument_node="">§ 208.2 Jurisdiction.</span></a></h4><span data-dcnode-id="8279" instrument_node="">
</span><div class="fr-cross-reference" data-dcnode-id="8265"><div class="box box-enhanced no-footer" data-dcnode-id="8266"><span data-dcnode-id="8278" instrument_node="">
</span><div class="seal-block seal-block-header" data-dcnode-id="8274"><div class="seal-content" data-dcnode-id="8275"><h6 data-dcnode-id="8276"><span data-dcnode-id="8277" instrument_node="">Cross Reference</span></h6></div></div><span data-dcnode-id="8273" instrument_node="">
</span><div class="content-block" data-dcnode-id="8268"><span data-dcnode-id="8272" instrument_node="">Link to an amendment published at </span><a class="fr-reference" data-dcnode-id="8270" data-reference="87 FR 18215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/87-FR-18215"><span data-dcnode-id="8271" instrument_node="">87 FR 18215</span></a><span data-dcnode-id="8269" instrument_node="">, Mar. 29, 2022.</span></div><span data-dcnode-id="8267" instrument_node="">
</span></div></div><span data-dcnode-id="8264" instrument_node="">
</span><div data-dcnode-id="8238" id="p-208.2(a)"><span data-dcnode-id="8263" instrument_node="">
</span><p class="indent-1" data-dcnode-id="8240" data-title="208.2(a)"><span class="paragraph-hierarchy" data-dcnode-id="8257"><span class="paren" data-dcnode-id="8261"><span data-dcnode-id="8262" instrument_node="">(</span></span><span data-dcnode-id="8260" instrument_node="">a</span><span class="paren" data-dcnode-id="8258"><span data-dcnode-id="8259" instrument_node="">)</span></span></span><span data-dcnode-id="8256" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="8254"><span data-dcnode-id="8255" instrument_node="">Refugee, Asylum, and International Operations (RAIO).</span></em><span data-dcnode-id="8253" instrument_node="">  Except as provided in </span><a class="cfr external" data-dcnode-id="8251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.2%23p-208.2%28b%29"><span data-dcnode-id="8252" instrument_node="">paragraph (b)</span></a><span data-dcnode-id="8250" instrument_node=""> or </span><a class="cfr external" data-dcnode-id="8248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.2%23p-208.2%28c%29"><span data-dcnode-id="8249" instrument_node="">(c)</span></a><span data-dcnode-id="8247" instrument_node=""> of this section, RAIO shall have initial jurisdiction over an asylum application filed by an alien physically present in the United States or seeking admission at a port-of-entry. RAIO shall also have initial jurisdiction over credible fear determinations under </span><a class="cfr external" data-dcnode-id="8245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30"><span data-dcnode-id="8246" instrument_node="">§ 208.30</span></a><span data-dcnode-id="8244" instrument_node=""> and reasonable fear determinations under </span><a class="cfr external" data-dcnode-id="8242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.31"><span data-dcnode-id="8243" instrument_node="">§ 208.31</span></a><span data-dcnode-id="8241" instrument_node="">. </span></p><span data-dcnode-id="8239" instrument_node="">
</span></div><span data-dcnode-id="8237" instrument_node="">
</span><div data-dcnode-id="8217" id="p-208.2(b)"><span data-dcnode-id="8236" instrument_node="">
</span><p class="indent-1" data-dcnode-id="8219" data-title="208.2(b)"><span class="paragraph-hierarchy" data-dcnode-id="8230"><span class="paren" data-dcnode-id="8234"><span data-dcnode-id="8235" instrument_node="">(</span></span><span data-dcnode-id="8233" instrument_node="">b</span><span class="paren" data-dcnode-id="8231"><span data-dcnode-id="8232" instrument_node="">)</span></span></span><span data-dcnode-id="8229" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="8227"><span data-dcnode-id="8228" instrument_node="">Jurisdiction of Immigration Court in general.</span></em><span data-dcnode-id="8226" instrument_node="">  Immigration judges shall have exclusive jurisdiction over asylum applications filed by an alien who has been served a Form I-221, Order to Show Cause; Form I-122, Notice to Applicant for Admission Detained for a Hearing before an Immigration Judge; or Form I-862, Notice to Appear, after the charging document has been filed with the Immigration Court. Immigration judges shall also have jurisdiction over any asylum applications filed prior to April 1, 1997, by alien crewmembers who have remained in the United States longer than authorized, by applicants for admission under the Visa Waiver Pilot Program, and by aliens who have been admitted to the United States under the Visa Waiver Pilot Program. Immigration judges shall also have the authority to review reasonable fear determinations referred to the Immigration Court under </span><a class="cfr external" data-dcnode-id="8224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.31"><span data-dcnode-id="8225" instrument_node="">§ 208.31</span></a><span data-dcnode-id="8223" instrument_node="">, and credible fear determinations referred to the Immigration Court under </span><a class="cfr external" data-dcnode-id="8221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30"><span data-dcnode-id="8222" instrument_node="">§ 208.30</span></a><span data-dcnode-id="8220" instrument_node="">. </span></p><span data-dcnode-id="8218" instrument_node="">
</span></div><span data-dcnode-id="8216" instrument_node="">
</span><div data-dcnode-id="7877" id="p-208.2(c)"><span data-dcnode-id="8215" instrument_node="">
</span><p class="indent-1" data-dcnode-id="8204" data-title="208.2(c)"><span class="paragraph-hierarchy" data-dcnode-id="8209"><span class="paren" data-dcnode-id="8213"><span data-dcnode-id="8214" instrument_node="">(</span></span><span data-dcnode-id="8212" instrument_node="">c</span><span class="paren" data-dcnode-id="8210"><span data-dcnode-id="8211" instrument_node="">)</span></span></span><span data-dcnode-id="8208" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="8206"><span data-dcnode-id="8207" instrument_node="">Certain aliens not entitled to proceedings under section 240 of the Act</span></em><span data-dcnode-id="8205" instrument_node="">  - </span></p><span data-dcnode-id="8203" instrument_node="">
</span><div data-dcnode-id="8027" id="p-208.2(c)(1)"><span data-dcnode-id="8202" instrument_node="">
</span><p class="indent-2" data-dcnode-id="8191" data-title="208.2(c)(1)"><span class="paragraph-hierarchy" data-dcnode-id="8196"><span class="paren" data-dcnode-id="8200"><span data-dcnode-id="8201" instrument_node="">(</span></span><span data-dcnode-id="8199" instrument_node="">1</span><span class="paren" data-dcnode-id="8197"><span data-dcnode-id="8198" instrument_node="">)</span></span></span><span data-dcnode-id="8195" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="8193"><span data-dcnode-id="8194" instrument_node="">Asylum applications and withholding of removal applications only.</span></em><span data-dcnode-id="8192" instrument_node="">  After Form I-863, Notice of Referral to Immigration Judge, has been filed with the Immigration Court, an immigration judge shall have exclusive jurisdiction over any asylum application filed on or after April 1, 1997, by: </span></p><span data-dcnode-id="8190" instrument_node="">
</span><div data-dcnode-id="8143" id="p-208.2(c)(1)(i)"><span data-dcnode-id="8189" instrument_node="">
</span><p class="indent-3" data-dcnode-id="8181" data-title="208.2(c)(1)(i)"><span class="paragraph-hierarchy" data-dcnode-id="8183"><span class="paren" data-dcnode-id="8187"><span data-dcnode-id="8188" instrument_node="">(</span></span><span data-dcnode-id="8186" instrument_node="">i</span><span class="paren" data-dcnode-id="8184"><span data-dcnode-id="8185" instrument_node="">)</span></span></span><span data-dcnode-id="8182" instrument_node=""> An alien crewmember who: </span></p><span data-dcnode-id="8180" instrument_node="">
</span><div data-dcnode-id="8169" id="p-208.2(c)(1)(i)(A)"><span data-dcnode-id="8179" instrument_node="">
</span><p class="indent-4" data-dcnode-id="8171" data-title="208.2(c)(1)(i)(A)"><span class="paragraph-hierarchy" data-dcnode-id="8173"><span class="paren" data-dcnode-id="8177"><span data-dcnode-id="8178" instrument_node="">(</span></span><span data-dcnode-id="8176" instrument_node="">A</span><span class="paren" data-dcnode-id="8174"><span data-dcnode-id="8175" instrument_node="">)</span></span></span><span data-dcnode-id="8172" instrument_node=""> Is an applicant for a landing permit; </span></p><span data-dcnode-id="8170" instrument_node="">
</span></div><span data-dcnode-id="8168" instrument_node="">
</span><div data-dcnode-id="8157" id="p-208.2(c)(1)(i)(B)"><span data-dcnode-id="8167" instrument_node="">
</span><p class="indent-4" data-dcnode-id="8159" data-title="208.2(c)(1)(i)(B)"><span class="paragraph-hierarchy" data-dcnode-id="8161"><span class="paren" data-dcnode-id="8165"><span data-dcnode-id="8166" instrument_node="">(</span></span><span data-dcnode-id="8164" instrument_node="">B</span><span class="paren" data-dcnode-id="8162"><span data-dcnode-id="8163" instrument_node="">)</span></span></span><span data-dcnode-id="8160" instrument_node=""> Has been refused permission to land under section 252 of the Act; or </span></p><span data-dcnode-id="8158" instrument_node="">
</span></div><span data-dcnode-id="8156" instrument_node="">
</span><div data-dcnode-id="8145" id="p-208.2(c)(1)(i)(C)"><span data-dcnode-id="8155" instrument_node="">
</span><p class="indent-4" data-dcnode-id="8147" data-title="208.2(c)(1)(i)(C)"><span class="paragraph-hierarchy" data-dcnode-id="8149"><span class="paren" data-dcnode-id="8153"><span data-dcnode-id="8154" instrument_node="">(</span></span><span data-dcnode-id="8152" instrument_node="">C</span><span class="paren" data-dcnode-id="8150"><span data-dcnode-id="8151" instrument_node="">)</span></span></span><span data-dcnode-id="8148" instrument_node=""> On or after April 1, 1997, was granted permission to land under section 252 of the Act, regardless of whether the alien has remained in the United States longer than authorized; </span></p><span data-dcnode-id="8146" instrument_node="">
</span></div><span data-dcnode-id="8144" instrument_node="">
</span></div><span data-dcnode-id="8142" instrument_node="">
</span><div data-dcnode-id="8128" id="p-208.2(c)(1)(ii)"><span data-dcnode-id="8141" instrument_node="">
</span><p class="indent-3" data-dcnode-id="8130" data-title="208.2(c)(1)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="8135"><span class="paren" data-dcnode-id="8139"><span data-dcnode-id="8140" instrument_node="">(</span></span><span data-dcnode-id="8138" instrument_node="">ii</span><span class="paren" data-dcnode-id="8136"><span data-dcnode-id="8137" instrument_node="">)</span></span></span><span data-dcnode-id="8134" instrument_node=""> An alien stowaway who has been found to have a credible fear of persecution or torture pursuant to the procedures set forth in </span><a class="cfr external" data-dcnode-id="8132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/part-208/subpart-B"><span data-dcnode-id="8133" instrument_node="">subpart B of this part</span></a><span data-dcnode-id="8131" instrument_node="">; </span></p><span data-dcnode-id="8129" instrument_node="">
</span></div><span data-dcnode-id="8127" instrument_node="">
</span><div data-dcnode-id="8116" id="p-208.2(c)(1)(iii)"><span data-dcnode-id="8126" instrument_node="">
</span><p class="indent-3" data-dcnode-id="8118" data-title="208.2(c)(1)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="8120"><span class="paren" data-dcnode-id="8124"><span data-dcnode-id="8125" instrument_node="">(</span></span><span data-dcnode-id="8123" instrument_node="">iii</span><span class="paren" data-dcnode-id="8121"><span data-dcnode-id="8122" instrument_node="">)</span></span></span><span data-dcnode-id="8119" instrument_node=""> An alien who is an applicant for admission pursuant to the Visa Waiver Program under section 217 of the Act, except that if such an alien is an applicant for admission to the Commonwealth of the Northern Mariana Islands, then he or she shall not be eligible for asylum prior to January 1, 2030; </span></p><span data-dcnode-id="8117" instrument_node="">
</span></div><span data-dcnode-id="8115" instrument_node="">
</span><div data-dcnode-id="8104" id="p-208.2(c)(1)(iv)"><span data-dcnode-id="8114" instrument_node="">
</span><p class="indent-3" data-dcnode-id="8106" data-title="208.2(c)(1)(iv)"><span class="paragraph-hierarchy" data-dcnode-id="8108"><span class="paren" data-dcnode-id="8112"><span data-dcnode-id="8113" instrument_node="">(</span></span><span data-dcnode-id="8111" instrument_node="">iv</span><span class="paren" data-dcnode-id="8109"><span data-dcnode-id="8110" instrument_node="">)</span></span></span><span data-dcnode-id="8107" instrument_node=""> An alien who was admitted to the United States pursuant to the Visa Waiver Program under section 217 of the Act and has remained longer than authorized or has otherwise violated his or her immigration status, except that if such an alien was admitted to the Commonwealth of the Northern Mariana Islands, then he or she shall not be eligible for asylum in the Commonwealth of the Northern Mariana Islands prior to January 1, 2030; </span></p><span data-dcnode-id="8105" instrument_node="">
</span></div><span data-dcnode-id="8103" instrument_node="">
</span><div data-dcnode-id="8086" id="p-208.2(c)(1)(v)"><span data-dcnode-id="8102" instrument_node="">
</span><p class="indent-3" data-dcnode-id="8088" data-title="208.2(c)(1)(v)"><span class="paragraph-hierarchy" data-dcnode-id="8096"><span class="paren" data-dcnode-id="8100"><span data-dcnode-id="8101" instrument_node="">(</span></span><span data-dcnode-id="8099" instrument_node="">v</span><span class="paren" data-dcnode-id="8097"><span data-dcnode-id="8098" instrument_node="">)</span></span></span><span data-dcnode-id="8095" instrument_node=""> An alien who has been ordered removed under § 235(c) of the Act, as described in </span><a class="cfr external" data-dcnode-id="8093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-235.8%23p-235.8%28a%29"><span data-dcnode-id="8094" instrument_node="">§ 235.8(a) of this chapter</span></a><span data-dcnode-id="8092" instrument_node=""> (applicable only in the event that the alien is referred for proceedings under this paragraph by the Regional Director pursuant to </span><a class="cfr external" data-dcnode-id="8090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-235.8%23p-235.8%28b%29%282%29%28ii%29"><span data-dcnode-id="8091" instrument_node="">section 235.8(b)(2)(ii) of this chapter</span></a><span data-dcnode-id="8089" instrument_node="">); </span></p><span data-dcnode-id="8087" instrument_node="">
</span></div><span data-dcnode-id="8085" instrument_node="">
</span><div data-dcnode-id="8074" id="p-208.2(c)(1)(vi)"><span data-dcnode-id="8084" instrument_node="">
</span><p class="indent-3" data-dcnode-id="8076" data-title="208.2(c)(1)(vi)"><span class="paragraph-hierarchy" data-dcnode-id="8078"><span class="paren" data-dcnode-id="8082"><span data-dcnode-id="8083" instrument_node="">(</span></span><span data-dcnode-id="8081" instrument_node="">vi</span><span class="paren" data-dcnode-id="8079"><span data-dcnode-id="8080" instrument_node="">)</span></span></span><span data-dcnode-id="8077" instrument_node=""> An alien who is an applicant for admission, or has been admitted, as an alien classified under section 101(a)(15)(S) of the Act (applicable only in the event that the alien is referred for proceedings under this paragraph by the district director); </span></p><span data-dcnode-id="8075" instrument_node="">
</span></div><span data-dcnode-id="8073" instrument_node="">
</span><div data-dcnode-id="8062" id="p-208.2(c)(1)(vii)"><span data-dcnode-id="8072" instrument_node="">
</span><p class="indent-3" data-dcnode-id="8064" data-title="208.2(c)(1)(vii)"><span class="paragraph-hierarchy" data-dcnode-id="8066"><span class="paren" data-dcnode-id="8070"><span data-dcnode-id="8071" instrument_node="">(</span></span><span data-dcnode-id="8069" instrument_node="">vii</span><span class="paren" data-dcnode-id="8067"><span data-dcnode-id="8068" instrument_node="">)</span></span></span><span data-dcnode-id="8065" instrument_node=""> An alien who is an applicant for admission to Guam or the Commonwealth of the Northern Mariana Islands pursuant to the Guam-CNMI Visa Waiver Program under section 212(l) of the Act, except that if such an alien is an applicant for admission to the Commonwealth of the Northern Mariana Islands, then he or she shall not be eligible for asylum prior to January 1, 2030; or </span></p><span data-dcnode-id="8063" instrument_node="">
</span></div><span data-dcnode-id="8061" instrument_node="">
</span><div data-dcnode-id="8050" id="p-208.2(c)(1)(viii)"><span data-dcnode-id="8060" instrument_node="">
</span><p class="indent-3" data-dcnode-id="8052" data-title="208.2(c)(1)(viii)"><span class="paragraph-hierarchy" data-dcnode-id="8054"><span class="paren" data-dcnode-id="8058"><span data-dcnode-id="8059" instrument_node="">(</span></span><span data-dcnode-id="8057" instrument_node="">viii</span><span class="paren" data-dcnode-id="8055"><span data-dcnode-id="8056" instrument_node="">)</span></span></span><span data-dcnode-id="8053" instrument_node=""> An alien who was admitted to Guam or the Commonwealth of the Northern Mariana Islands pursuant to the Guam-CNMI Visa Waiver Program under section 212(l) of the Act and has remained longer than authorized or has otherwise violated his or her immigration status, except that if such an alien was admitted to the Commonwealth of the Northern Mariana Islands, then he or she shall not be eligible for asylum in the Commonwealth of the Northern Mariana Islands prior to January 1, 2030. </span></p><span data-dcnode-id="8051" instrument_node="">
</span></div><span data-dcnode-id="8049" instrument_node="">
</span><div data-dcnode-id="8029" id="p-208.2(c)(1)(ix)"><span data-dcnode-id="8048" instrument_node="">
</span><p class="indent-3" data-dcnode-id="8031" data-title="208.2(c)(1)(ix)"><span class="paragraph-hierarchy" data-dcnode-id="8042"><span class="paren" data-dcnode-id="8046"><span data-dcnode-id="8047" instrument_node="">(</span></span><span data-dcnode-id="8045" instrument_node="">ix</span><span class="paren" data-dcnode-id="8043"><span data-dcnode-id="8044" instrument_node="">)</span></span></span><span data-dcnode-id="8041" instrument_node=""> An alien found to have a credible fear of persecution, reasonable possibility of persecution, or reasonable possibility of torture in accordance with </span><a class="cfr external" data-dcnode-id="8039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.30"><span data-dcnode-id="8040" instrument_node="">§§ 208.30</span></a><span data-dcnode-id="8038" instrument_node="">, </span><a class="cfr external" data-dcnode-id="8036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-1003.42"><span data-dcnode-id="8037" instrument_node="">1003.42</span></a><span data-dcnode-id="8035" instrument_node="">, or </span><a class="cfr external" data-dcnode-id="8033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-1208.30"><span data-dcnode-id="8034" instrument_node="">1208.30</span></a><span data-dcnode-id="8032" instrument_node="">. </span></p><span data-dcnode-id="8030" instrument_node="">
</span></div><span data-dcnode-id="8028" instrument_node="">
</span></div><span data-dcnode-id="8026" instrument_node="">
</span><div data-dcnode-id="7988" id="p-208.2(c)(2)"><span data-dcnode-id="8025" instrument_node="">
</span><p class="indent-2" data-dcnode-id="8014" data-title="208.2(c)(2)"><span class="paragraph-hierarchy" data-dcnode-id="8019"><span class="paren" data-dcnode-id="8023"><span data-dcnode-id="8024" instrument_node="">(</span></span><span data-dcnode-id="8022" instrument_node="">2</span><span class="paren" data-dcnode-id="8020"><span data-dcnode-id="8021" instrument_node="">)</span></span></span><span data-dcnode-id="8018" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="8016"><span data-dcnode-id="8017" instrument_node="">Withholding of removal applications only.</span></em><span data-dcnode-id="8015" instrument_node="">  After Form I-863, Notice of Referral to Immigration Judge, has been filed with the Immigration Court, an immigration judge shall have exclusive jurisdiction over any application for withholding of removal filed by: </span></p><span data-dcnode-id="8013" instrument_node="">
</span><div data-dcnode-id="8002" id="p-208.2(c)(2)(i)"><span data-dcnode-id="8012" instrument_node="">
</span><p class="indent-3" data-dcnode-id="8004" data-title="208.2(c)(2)(i)"><span class="paragraph-hierarchy" data-dcnode-id="8006"><span class="paren" data-dcnode-id="8010"><span data-dcnode-id="8011" instrument_node="">(</span></span><span data-dcnode-id="8009" instrument_node="">i</span><span class="paren" data-dcnode-id="8007"><span data-dcnode-id="8008" instrument_node="">)</span></span></span><span data-dcnode-id="8005" instrument_node=""> An alien who is the subject of a reinstated removal order pursuant to section 241(a)(5) of the Act; or </span></p><span data-dcnode-id="8003" instrument_node="">
</span></div><span data-dcnode-id="8001" instrument_node="">
</span><div data-dcnode-id="7990" id="p-208.2(c)(2)(ii)"><span data-dcnode-id="8000" instrument_node="">
</span><p class="indent-3" data-dcnode-id="7992" data-title="208.2(c)(2)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="7994"><span class="paren" data-dcnode-id="7998"><span data-dcnode-id="7999" instrument_node="">(</span></span><span data-dcnode-id="7997" instrument_node="">ii</span><span class="paren" data-dcnode-id="7995"><span data-dcnode-id="7996" instrument_node="">)</span></span></span><span data-dcnode-id="7993" instrument_node=""> An alien who has been issued an administrative removal order pursuant to section 238 of the Act as an alien convicted of committing an aggravated felony. </span></p><span data-dcnode-id="7991" instrument_node="">
</span></div><span data-dcnode-id="7989" instrument_node="">
</span></div><span data-dcnode-id="7987" instrument_node="">
</span><div data-dcnode-id="7879" id="p-208.2(c)(3)"><span data-dcnode-id="7986" instrument_node="">
</span><p class="indent-2" data-dcnode-id="7975" data-title="208.2(c)(3)"><span class="paragraph-hierarchy" data-dcnode-id="7980"><span class="paren" data-dcnode-id="7984"><span data-dcnode-id="7985" instrument_node="">(</span></span><span data-dcnode-id="7983" instrument_node="">3</span><span class="paren" data-dcnode-id="7981"><span data-dcnode-id="7982" instrument_node="">)</span></span></span><span data-dcnode-id="7979" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="7977"><span data-dcnode-id="7978" instrument_node="">Rules of procedure</span></em><span data-dcnode-id="7976" instrument_node="">  - </span></p><span data-dcnode-id="7974" instrument_node="">
</span><div data-dcnode-id="7945" id="p-208.2(c)(3)(i)"><span data-dcnode-id="7973" instrument_node="">
</span><p class="indent-3" data-dcnode-id="7947" data-title="208.2(c)(3)(i)"><span class="paragraph-hierarchy" data-dcnode-id="7967"><span class="paren" data-dcnode-id="7971"><span data-dcnode-id="7972" instrument_node="">(</span></span><span data-dcnode-id="7970" instrument_node="">i</span><span class="paren" data-dcnode-id="7968"><span data-dcnode-id="7969" instrument_node="">)</span></span></span><span data-dcnode-id="7966" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="7964"><span data-dcnode-id="7965" instrument_node="">General.</span></em><span data-dcnode-id="7963" instrument_node="">  Except as provided in this section, proceedings falling under the jurisdiction of the immigration judge pursuant to </span><a class="cfr external" data-dcnode-id="7961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.2%23p-208.2%28c%29%281%29"><span data-dcnode-id="7962" instrument_node="">paragraph (c)(1)</span></a><span data-dcnode-id="7960" instrument_node=""> or </span><a class="cfr external" data-dcnode-id="7958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.2%23p-208.2%28c%29%282%29"><span data-dcnode-id="7959" instrument_node="">(c)(2)</span></a><span data-dcnode-id="7957" instrument_node=""> of this section shall be conducted in accordance with the same rules of procedure as proceedings conducted under </span><a class="cfr external" data-dcnode-id="7955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/part-240/subpart-A"><span data-dcnode-id="7956" instrument_node="">8 CFR part 240, subpart A</span></a><span data-dcnode-id="7954" instrument_node="">. The scope of review in proceedings conducted pursuant to </span><a class="cfr external" data-dcnode-id="7952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.2%23p-208.2%28c%29%281%29"><span data-dcnode-id="7953" instrument_node="">paragraph (c)(1)</span></a><span data-dcnode-id="7951" instrument_node=""> of this section shall be limited to a determination of whether the alien is eligible for asylum or withholding or deferral of removal, and whether asylum shall be granted in the exercise of discretion. The scope of review in proceedings conducted pursuant to </span><a class="cfr external" data-dcnode-id="7949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.2%23p-208.2%28c%29%282%29"><span data-dcnode-id="7950" instrument_node="">paragraph (c)(2)</span></a><span data-dcnode-id="7948" instrument_node=""> of this section shall be limited to a determination of whether the alien is eligible for withholding or deferral of removal. During such proceedings, all parties are prohibited from raising or considering any other issues, including but not limited to issues of admissibility, deportability, eligibility for waivers, and eligibility for any other form of relief. </span></p><span data-dcnode-id="7946" instrument_node="">
</span></div><span data-dcnode-id="7944" instrument_node="">
</span><div data-dcnode-id="7894" id="p-208.2(c)(3)(ii)"><span data-dcnode-id="7943" instrument_node="">
</span><p class="indent-3" data-dcnode-id="7932" data-title="208.2(c)(3)(ii)"><span class="paragraph-hierarchy" data-dcnode-id="7937"><span class="paren" data-dcnode-id="7941"><span data-dcnode-id="7942" instrument_node="">(</span></span><span data-dcnode-id="7940" instrument_node="">ii</span><span class="paren" data-dcnode-id="7938"><span data-dcnode-id="7939" instrument_node="">)</span></span></span><span data-dcnode-id="7936" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="7934"><span data-dcnode-id="7935" instrument_node="">Notice of hearing procedures and in-absentia decisions.</span></em><span data-dcnode-id="7933" instrument_node="">  The alien will be provided with notice of the time and place of the proceeding. The request for asylum and withholding of removal submitted by an alien who fails to appear for the hearing shall be denied. The denial of asylum and withholding of removal for failure to appear may be reopened only upon a motion filed with the immigration judge with jurisdiction over the case. Only one motion to reopen may be filed, and it must be filed within 90 days, unless the alien establishes that he or she did not receive notice of the hearing date or was in Federal or State custody on the date directed to appear. The motion must include documentary evidence, which demonstrates that: </span></p><span data-dcnode-id="7931" instrument_node="">
</span><div data-dcnode-id="7920" id="p-208.2(c)(3)(ii)(A)"><span data-dcnode-id="7930" instrument_node="">
</span><p class="indent-4" data-dcnode-id="7922" data-title="208.2(c)(3)(ii)(A)"><span class="paragraph-hierarchy" data-dcnode-id="7924"><span class="paren" data-dcnode-id="7928"><span data-dcnode-id="7929" instrument_node="">(</span></span><span data-dcnode-id="7927" instrument_node="">A</span><span class="paren" data-dcnode-id="7925"><span data-dcnode-id="7926" instrument_node="">)</span></span></span><span data-dcnode-id="7923" instrument_node=""> The alien did not receive the notice; </span></p><span data-dcnode-id="7921" instrument_node="">
</span></div><span data-dcnode-id="7919" instrument_node="">
</span><div data-dcnode-id="7908" id="p-208.2(c)(3)(ii)(B)"><span data-dcnode-id="7918" instrument_node="">
</span><p class="indent-4" data-dcnode-id="7910" data-title="208.2(c)(3)(ii)(B)"><span class="paragraph-hierarchy" data-dcnode-id="7912"><span class="paren" data-dcnode-id="7916"><span data-dcnode-id="7917" instrument_node="">(</span></span><span data-dcnode-id="7915" instrument_node="">B</span><span class="paren" data-dcnode-id="7913"><span data-dcnode-id="7914" instrument_node="">)</span></span></span><span data-dcnode-id="7911" instrument_node=""> The alien was in Federal or State custody and the failure to appear was through no fault of the alien; or </span></p><span data-dcnode-id="7909" instrument_node="">
</span></div><span data-dcnode-id="7907" instrument_node="">
</span><div data-dcnode-id="7896" id="p-208.2(c)(3)(ii)(C)"><span data-dcnode-id="7906" instrument_node="">
</span><p class="indent-4" data-dcnode-id="7898" data-title="208.2(c)(3)(ii)(C)"><span class="paragraph-hierarchy" data-dcnode-id="7900"><span class="paren" data-dcnode-id="7904"><span data-dcnode-id="7905" instrument_node="">(</span></span><span data-dcnode-id="7903" instrument_node="">C</span><span class="paren" data-dcnode-id="7901"><span data-dcnode-id="7902" instrument_node="">)</span></span></span><span data-dcnode-id="7899" instrument_node=""> “Exceptional circumstances,” as defined in section 240(e)(1) of the Act, caused the failure to appear. </span></p><span data-dcnode-id="7897" instrument_node="">
</span></div><span data-dcnode-id="7895" instrument_node="">
</span></div><span data-dcnode-id="7893" instrument_node="">
</span><div data-dcnode-id="7881" id="p-208.2(c)(3)(iii)"><p class="indent-3" data-dcnode-id="7882" data-title="208.2(c)(3)(iii)"><span class="paragraph-hierarchy" data-dcnode-id="7887"><span class="paren" data-dcnode-id="7891"><span data-dcnode-id="7892" instrument_node="">(</span></span><span data-dcnode-id="7890" instrument_node="">iii</span><span class="paren" data-dcnode-id="7888"><span data-dcnode-id="7889" instrument_node="">)</span></span></span><span data-dcnode-id="7886" instrument_node=""> </span><em class="paragraph-heading" data-dcnode-id="7884"><span data-dcnode-id="7885" instrument_node="">Relief.</span></em><span data-dcnode-id="7883" instrument_node="">  The filing of a motion to reopen shall not stay removal of the alien unless the immigration judge issues an order granting a stay pending disposition of the motion. An alien who fails to appear for a proceeding under this section shall not be eligible for relief under section 240A, 240B, 245, 248, or 249 of the Act for a period of 10 years after the date of the denial, unless the applicant can show exceptional circumstances resulted in his or her failure to appear. </span></p></div><span data-dcnode-id="7880" instrument_node="">
</span></div><span data-dcnode-id="7878" instrument_node="">
</span></div><span data-dcnode-id="7876" instrument_node="">
</span><p class="citation" data-dcnode-id="7859"><span data-dcnode-id="7875" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="7873" data-reference="65 FR 76130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/65-FR-76130"><span data-dcnode-id="7874" instrument_node="">65 FR 76130</span></a><span data-dcnode-id="7872" instrument_node="">, Dec. 6, 2000, as amended at </span><a class="fr-reference" data-dcnode-id="7870" data-reference="74 FR 55736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/74-FR-55736"><span data-dcnode-id="7871" instrument_node="">74 FR 55736</span></a><span data-dcnode-id="7869" instrument_node="">, Oct. 28, 2009; </span><a class="fr-reference" data-dcnode-id="7867" data-reference="76 FR 53784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/76-FR-53784"><span data-dcnode-id="7868" instrument_node="">76 FR 53784</span></a><span data-dcnode-id="7866" instrument_node="">, Aug. 29, 2011; </span><a class="fr-reference" data-dcnode-id="7864" data-reference="85 FR 29310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-29310"><span data-dcnode-id="7865" instrument_node="">85 FR 29310</span></a><span data-dcnode-id="7863" instrument_node="">, May 14, 2020; </span><a class="fr-reference" data-dcnode-id="7861" data-reference="85 FR 80386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-80386"><span data-dcnode-id="7862" instrument_node="">85 FR 80386</span></a><span data-dcnode-id="7860" instrument_node="">, Dec. 11, 2020] </span></p><span data-dcnode-id="7858" instrument_node="">
</span></div><span data-dcnode-id="7856" instrument_node="">
</span><div class="section" data-dcnode-id="7714" id="208.3"><span data-dcnode-id="7855" instrument_node="">
</span><h4 data-dcnode-id="7852"><a class="direct" data-dcnode-id="7853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.3"><span data-dcnode-id="7854" instrument_node="">§ 208.3 Form of application.</span></a></h4><span data-dcnode-id="7851" instrument_node="">
</span><div class="fr-cross-reference" data-dcnode-id="7837"><div class="box box-enhanced no-footer" data-dcnode-id="7838"><span data-dcnode-id="7850" instrument_node="">
</span><div class="seal-block seal-block-header" data-dcnode-id="7846"><div class="seal-content" data-dcnode-id="7847"><h6 data-dcnode-id="7848"><span data-dcnode-id="7849" instrument_node="">Cross Reference</span></h6></div></div><span data-dcnode-id="7845" instrument_node="">
</span><div class="content-block" data-dcnode-id="7840"><span data-dcnode-id="7844" instrument_node="">Link to an amendment published at </span><a class="fr-reference" data-dcnode-id="7842" data-reference="87 FR 18216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/87-FR-18216"><span data-dcnode-id="7843" instrument_node="">87 FR 18216</span></a><span data-dcnode-id="7841" instrument_node="">, Mar. 29, 2022.</span></div><span data-dcnode-id="7839" instrument_node="">
</span></div></div><span data-dcnode-id="7836" instrument_node="">
</span><div data-dcnode-id="7825" id="p-208.3(a)"><span data-dcnode-id="7835" instrument_node="">
</span><p class="indent-1" data-dcnode-id="7827" data-title="208.3(a)"><span class="paragraph-hierarchy" data-dcnode-id="7829"><span class="paren" data-dcnode-id="7833"><span data-dcnode-id="7834" instrument_node="">(</span></span><span data-dcnode-id="7832" instrument_node="">a</span><span class="paren" data-dcnode-id="7830"><span data-dcnode-id="7831" instrument_node="">)</span></span></span><span data-dcnode-id="7828" instrument_node=""> An asylum applicant must file Form I-589, Application for Asylum and for Withholding of Removal, together with any additional supporting evidence in accordance with the instructions on the form. The applicant's spouse and children shall be listed on the application and may be included in the request for asylum if they are in the United States. One additional copy of the principal applicant's Form I-589 must be submitted for each dependent included in the principal's application. </span></p><span data-dcnode-id="7826" instrument_node="">
</span></div><span data-dcnode-id="7824" instrument_node="">
</span><div data-dcnode-id="7813" id="p-208.3(b)"><span data-dcnode-id="7823" instrument_node="">
</span><p class="indent-1" data-dcnode-id="7815" data-title="208.3(b)"><span class="paragraph-hierarchy" data-dcnode-id="7817"><span class="paren" data-dcnode-id="7821"><span data-dcnode-id="7822" instrument_node="">(</span></span><span data-dcnode-id="7820" instrument_node="">b</span><span class="paren" data-dcnode-id="7818"><span data-dcnode-id="7819" instrument_node="">)</span></span></span><span data-dcnode-id="7816" instrument_node=""> An asylum application shall be deemed to constitute at the same time an application for withholding of removal, unless adjudicated in deportation or exclusion proceedings commenced prior to April 1, 1997. In such instances, the asylum application shall be deemed to constitute an application for withholding of deportation under section 243(h) of the Act, as that section existed prior to April 1, 1997. Where a determination is made that an applicant is ineligible to apply for asylum under section 208(a)(2) of the Act, an asylum application shall be construed as an application for withholding of removal. </span></p><span data-dcnode-id="7814" instrument_node="">
</span></div><span data-dcnode-id="7812" instrument_node="">
</span><div data-dcnode-id="7728" id="p-208.3(c)"><span data-dcnode-id="7811" instrument_node="">
</span><p class="indent-1" data-dcnode-id="7803" data-title="208.3(c)"><span class="paragraph-hierarchy" data-dcnode-id="7805"><span class="paren" data-dcnode-id="7809"><span data-dcnode-id="7810" instrument_node="">(</span></span><span data-dcnode-id="7808" instrument_node="">c</span><span class="paren" data-dcnode-id="7806"><span data-dcnode-id="7807" instrument_node="">)</span></span></span><span data-dcnode-id="7804" instrument_node=""> Form I-589 shall be filed under the following conditions and shall have the following consequences: </span></p><span data-dcnode-id="7802" instrument_node="">
</span><div data-dcnode-id="7791" id="p-208.3(c)(1)"><span data-dcnode-id="7801" instrument_node="">
</span><p class="indent-2" data-dcnode-id="7793" data-title="208.3(c)(1)"><span class="paragraph-hierarchy" data-dcnode-id="7795"><span class="paren" data-dcnode-id="7799"><span data-dcnode-id="7800" instrument_node="">(</span></span><span data-dcnode-id="7798" instrument_node="">1</span><span class="paren" data-dcnode-id="7796"><span data-dcnode-id="7797" instrument_node="">)</span></span></span><span data-dcnode-id="7794" instrument_node=""> If the application was filed on or after January 4, 1995, information provided in the application may be used as a basis for the initiation of removal proceedings, or to satisfy any burden of proof in exclusion, deportation, or removal proceedings; </span></p><span data-dcnode-id="7792" instrument_node="">
</span></div><span data-dcnode-id="7790" instrument_node="">
</span><div data-dcnode-id="7779" id="p-208.3(c)(2)"><span data-dcnode-id="7789" instrument_node="">
</span><p class="indent-2" data-dcnode-id="7781" data-title="208.3(c)(2)"><span class="paragraph-hierarchy" data-dcnode-id="7783"><span class="paren" data-dcnode-id="7787"><span data-dcnode-id="7788" instrument_node="">(</span></span><span data-dcnode-id="7786" instrument_node="">2</span><span class="paren" data-dcnode-id="7784"><span data-dcnode-id="7785" instrument_node="">)</span></span></span><span data-dcnode-id="7782" instrument_node=""> The applicant and anyone other than a spouse, parent, son, or daughter of the applicant who assists the applicant in preparing the application must sign the application under penalty of perjury. The applicant's signature establishes a presumption that the applicant is aware of the contents of the application. A person other than a relative specified in this paragraph who assists the applicant in preparing the application also must provide his or her full mailing address; </span></p><span data-dcnode-id="7780" instrument_node="">
</span></div><span data-dcnode-id="7778" instrument_node="">
</span><div data-dcnode-id="7755" id="p-208.3(c)(3)"><span data-dcnode-id="7777" instrument_node="">
</span><p class="indent-2" data-dcnode-id="7757" data-title="208.3(c)(3)"><span class="paragraph-hierarchy" data-dcnode-id="7771"><span class="paren" data-dcnode-id="7775"><span data-dcnode-id="7776" instrument_node="">(</span></span><span data-dcnode-id="7774" instrument_node="">3</span><span class="paren" data-dcnode-id="7772"><span data-dcnode-id="7773" instrument_node="">)</span></span></span><span data-dcnode-id="7770" instrument_node=""> An asylum application must be properly filed in accordance with </span><a class="cfr external" data-dcnode-id="7768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/part-103"><span data-dcnode-id="7769" instrument_node="">8 CFR part 103</span></a><span data-dcnode-id="7767" instrument_node=""> and the filing instructions. Receipt of a properly filed asylum application will commence the 365-day period after which the applicant may file an application for employment authorization in accordance with </span><a class="cfr external" data-dcnode-id="7765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.7"><span data-dcnode-id="7766" instrument_node="">§ 208.7</span></a><span data-dcnode-id="7764" instrument_node=""> and </span><a class="cfr external" data-dcnode-id="7762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-274a.12"><span data-dcnode-id="7763" instrument_node="">8 CFR 274a.12</span></a><span data-dcnode-id="7761" instrument_node=""> and </span><a class="cfr external" data-dcnode-id="7759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-274a.13"><span data-dcnode-id="7760" instrument_node="">274a.13</span></a><span data-dcnode-id="7758" instrument_node="">. </span></p><span data-dcnode-id="7756" instrument_node="">
</span></div><span data-dcnode-id="7754" instrument_node="">
</span><div data-dcnode-id="7743" id="p-208.3(c)(4)"><span data-dcnode-id="7753" instrument_node="">
</span><p class="indent-2" data-dcnode-id="7745" data-title="208.3(c)(4)"><span class="paragraph-hierarchy" data-dcnode-id="7747"><span class="paren" data-dcnode-id="7751"><span data-dcnode-id="7752" instrument_node="">(</span></span><span data-dcnode-id="7750" instrument_node="">4</span><span class="paren" data-dcnode-id="7748"><span data-dcnode-id="7749" instrument_node="">)</span></span></span><span data-dcnode-id="7746" instrument_node=""> Knowing placement of false information on the application may subject the person placing that information on the application to criminal penalties under title 18 of the United States Code and to civil or criminal penalties under section 274C of the Act; and </span></p><span data-dcnode-id="7744" instrument_node="">
</span></div><span data-dcnode-id="7742" instrument_node="">
</span><div data-dcnode-id="7730" id="p-208.3(c)(5)"><p class="indent-2" data-dcnode-id="7731" data-title="208.3(c)(5)"><span class="paragraph-hierarchy" data-dcnode-id="7736"><span class="paren" data-dcnode-id="7740"><span data-dcnode-id="7741" instrument_node="">(</span></span><span data-dcnode-id="7739" instrument_node="">5</span><span class="paren" data-dcnode-id="7737"><span data-dcnode-id="7738" instrument_node="">)</span></span></span><span data-dcnode-id="7735" instrument_node=""> Knowingly filing a frivolous application on or after April 1, 1997, so long as the applicant has received the notice required by section 208(d)(4) of the Act, shall render the applicant permanently ineligible for any benefits under the Act pursuant to </span><a class="cfr external" data-dcnode-id="7733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.20"><span data-dcnode-id="7734" instrument_node="">§ 208.20</span></a><span data-dcnode-id="7732" instrument_node="">. </span></p></div><span data-dcnode-id="7729" instrument_node="">
</span></div><span data-dcnode-id="7727" instrument_node="">
</span><p class="citation" data-dcnode-id="7716"><span data-dcnode-id="7726" instrument_node="">[</span><a class="fr-reference" data-dcnode-id="7724" data-reference="62 FR 10337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/62-FR-10337"><span data-dcnode-id="7725" instrument_node="">62 FR 10337</span></a><span data-dcnode-id="7723" instrument_node="">, Mar. 6, 1997, as amended at </span><a class="fr-reference" data-dcnode-id="7721" data-reference="65 FR 76131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/65-FR-76131"><span data-dcnode-id="7722" instrument_node="">65 FR 76131</span></a><span data-dcnode-id="7720" instrument_node="">, Dec. 6, 2000; </span><a class="fr-reference" data-dcnode-id="7718" data-reference="85 FR 38626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/85-FR-38626"><span data-dcnode-id="7719" instrument_node="">85 FR 38626</span></a><span data-dcnode-id="7717" instrument_node="">, June 26, 2020] </span></p><span data-dcnode-id="7715" instrument_node="">
</span></div><span data-dcnode-id="7713" instrument_node="">
</span><div class="section" data-dcnode-id="7295" id="208.4"><span data-dcnode-id="7712" instrument_node="">
</span><h4 data-dcnode-id="7709"><a class="direct" data-dcnode-id="7710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.4"><span data-dcnode-id="7711" instrument_node="">§ 208.4 Filing the application.</span></a></h4><span data-dcnode-id="7708" instrument_node="">
</span><div class="fr-cross-reference" data-dcnode-id="7694"><div class="box box-enhanced no-footer" data-dcnode-id="7695"><span data-dcnode-id="7707" instrument_node="">
</span><div class="seal-block seal-block-header" data-dcnode-id="7703"><div class="seal-content" data-dcnode-id="7704"><h6 data-dcnode-id="7705"><span data-dcnode-id="7706" instrument_node="">Cross Reference</span></h6></div></div><span data-dcnode-id="7702" instrument_node="">
</span><div class="content-block" data-dcnode-id="7697"><span data-dcnode-id="7701" instrument_node="">Link to an amendment published at </span><a class="fr-reference" data-dcnode-id="7699" data-reference="87 FR 18216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/citation/87-FR-18216"><span data-dcnode-id="7700" instrument_node="">87 FR 18216</span></a><span data-dcnode-id="7698" instrument_node="">, Mar. 29, 2022.</span></div><span data-dcnode-id="7696" instrument_node="">
</span></div></div><span data-dcnode-id="7693" instrument_node="">
</span><p data-dcnode-id="7685"><span data-dcnode-id="7692" instrument_node="">Except as prohibited in </span><a class="cfr external" data-dcnode-id="7690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.4%23p-208.4%28a%29"><span data-dcnode-id="7691" instrument_node="">paragraph (a)</span></a><span data-dcnode-id="7689" instrument_node=""> of this section, asylum applications shall be filed in accordance with </span><a class="cfr external" data-dcnode-id="7687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.gov/current/title-8/section-208.4%23p-208.4%28b%29"><span data-dcnode-id="7688" instrument_node="">paragraph (b)</span></a><span data-dcnode-id="7686" instrument_node=""> of this section. </span></p><span data-dcnode-id="7684" instrument_node="">
</span><div data-dcnode-id="7349" id="p-208.4(a)"><span data-dcnode-id="7683" instrument_node="">
